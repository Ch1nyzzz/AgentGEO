</span><h2 class="has-text-align-center plantheader" data-dcnode-id="1015"><span data-dcnode-id="1016" instrument_node="">Overview</span></h2><span data-dcnode-id="1014" instrument_node="">

"><td data-dcnode-id="969"><strong data-dcnode-id="970"><span data-dcnode-id="971" instrument_node="">Flowers</span></strong></td><td data-dcnode-id="967"><span data-dcnode-id="968" instrument_node="">5 petalled flowers appearing over a long period</span></td></tr><tr data-dcnode-id="960"><td data-dcnode-id="963"><strong data-dcnode-id="964"><span data-dcnode-id="965" instrument_node="">When To Sow</span></strong></td><td data-dcnode-id="961"><span data-dcnode-id="962" instrument_node="">March, April</span></td></tr><tr data-dcnode-id="954"><td data-dcnode-id="957"><strong data-dcnode-id="958"><span data-dcnode-id="959" instrument_node="">Flowering Months</span></strong></td><td data-dcnode-id="955"><span data-dcnode-id="956" instrument_node="">June, July, August, September</span></td></tr><tr data-dcnode-id="948"><td data-dcnode-id="951"><strong data-dcnode-id="952"><span data-dcnode-id="953" instrument_node="">When To Prune</span></strong></td><td data-dcnode-id="949"><span data-dcnode-id="950" instrument_node="">August, September</span></td></tr></tbody></table></figure><span data-dcnode-id="944" instrument_node="">

</span><h5 class="has-text-align-center" data-dcnode-id="940"><span data-dcnode-id="941" instrument_node="">Sunlight</span></h5><span data-dcnode-id="939" instrument_node="">
</span><p data-dcnode-id="934"><strong data-dcnode-id="937"><span data-dcnode-id="938" instrument_node="">Preferred</span></strong><br data-dcnode-id="936"><span data-dcnode-id="935" instrument_node="">Full Sun</span></p><span data-dcnode-id="933" instrument_node="">
</span><p data-dcnode-id="928"><strong data-dcnode-id="931"><span data-dcnode-id="932" instrument_node="">Exposure</span></strong><br data-dcnode-id="930"><span data-dcnode-id="929" instrument_node="">Exposed or Sheltered</span></p><span data-dcnode-id="927" instrument_node="">
</span></div><span data-dcnode-id="925" instrument_node="">
</span><div class="wp-block-column plantcol1" data-dcnode-id="902"><span data-dcnode-id="924" instrument_node="">
</span><h5 class="has-text-align-center" data-dcnode-id="922"><span data-dcnode-id="923" instrument_node="">Size</span></h5><span data-dcnode-id="921" instrument_node="">
</span><p data-dcnode-id="916"><strong data-dcnode-id="919"><span data-dcnode-id="920" instrument_node="">Height</span></strong><br data-dcnode-id="918"><span data-dcnode-id="917" instrument_node="">0.1 – 0.5M</span></p><span data-dcnode-id="915" instrument_node="">
</span><p data-dcnode-id="910"><strong data-dcnode-id="912"><span data-dcnode-id="914" instrument_node="">Spread</span><br data-dcnode-id="913"></strong><span data-dcnode-id="911" instrument_node="">0.1 – 0.5M</span></p><span data-dcnode-id="909" instrument_node="">
</span><p data-dcnode-id="904"><strong data-dcnode-id="907"><span data-dcnode-id="908" instrument_node="">Bloom Time</span></strong><br data-dcnode-id="906"><span data-dcnode-id="905" instrument_node="">June – September</span></p><span data-dcnode-id="903" instrument_node="">
</span></div><span data-dcnode-id="901" instrument_node="">
</span><div class="wp-block-column plantcol1" data-dcnode-id="878"><span data-dcnode-id="900" instrument_node="">
</span><h5 class="has-text-align-center" data-dcnode-id="898"><span data-dcnode-id="899" instrument_node="">Soil</span></h5><span data-dcnode-id="897" instrument_node="">
</span><p data-dcnode-id="892"><strong data-dcnode-id="894"><span data-dcnode-id="896" instrument_node="">Preferred</span><br data-dcnode-id="895"></strong><span data-dcnode-id="893" instrument_node="">Most Soil Types</span></p><span data-dcnode-id="891" instrument_node="">
</span><p data-dcnode-id="886"><strong data-dcnode-id="888"><span data-dcnode-id="890" instrument_node="">Moisture</span><br data-dcnode-id="889"></strong><span data-dcnode-id="887" instrument_node="">Moist but well drained</span></p><span data-dcnode-id="885" instrument_node="">
</span><p data-dcnode-id="880"><strong data-dcnode-id="882"><span data-dcnode-id="884" instrument_node="">pH</span><br data-dcnode-id="883"></strong><span data-dcnode-id="881" instrument_node="">Any</span></p><span data-dcnode-id="879" instrument_node="">
</span></div><span data-dcnode-id="877" instrument_node="">
</span></div><span data-dcnode-id="875" instrument_node="">
</span><p data-dcnode-id="872"><strong data-dcnode-id="873"><span data-dcnode-id="874" instrument_node="">Some plants have so many names that it can be hard to keep track of them, and potentilla is one such candidate. You’ll see this shrub variously referred to as potentilla, cinquefoil, five fingers, silverweeds, and more.</span></strong></p><span data-dcnode-id="871" instrument_node="">
</span><p data-dcnode-id="869"><span data-dcnode-id="870" instrument_node="">Throwing further confusion into the mix is that many varieties are visually similar, centred on a theme of being small, green shrubs with vigorous bouquets of yellow flowers.</span></p><span data-dcnode-id="868" instrument_node="">
</span><figure class="wp-block-image size-large" data-dcnode-id="864"><img alt="Potentilla erecta with bright yellow flowers and dark green foliage" class="wp-image-19201" data-dcnode-id="867" height="667" loading="lazy" sizes="(max-width: 1000px) 100vw, 1000px" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//horticulture.co.uk/wp-content/uploads/2021/04/1-11.jpg&amp;raw" srcset="https://horticulture.co.uk/wp-content/uploads/2021/04/1-11.jpg 1000w, https://horticulture.co.uk/wp-content/uploads/2021/04/1-11-300x200.jpg 300w, https://horticulture.co.uk/wp-content/uploads/2021/04/1-11-768x512.jpg 768w, https://horticulture.co.uk/wp-content/uploads/2021/04/1-11-370x247.jpg 370w, https://horticulture.co.uk/wp-content/uploads/2021/04/1-11-800x534.jpg 800w, https://horticulture.co.uk/wp-content/uploads/2021/04/1-11-20x13.jpg 20w, https://horticulture.co.uk/wp-content/uploads/2021/04/1-11-185x123.jpg 185w, https://horticulture.co.uk/wp-content/uploads/2021/04/1-11-740x494.jpg 740w, https://horticulture.co.uk/wp-content/uploads/2021/04/1-11-400x267.jpg 400w, https://horticulture.co.uk/wp-content/uploads/2021/04/1-11-72x48.jpg 72w" width="1000"><figcaption data-dcnode-id="865"><span data-dcnode-id="866" instrument_node="">Potentilla erecta, one of many stunning varieties</span></figcaption></figure><span data-dcnode-id="863" instrument_node="">
</span><p data-dcnode-id="861"><span data-dcnode-id="862" instrument_node="">What is certain, however, is that potentilla makes a pretty addition to any garden. In this guide, we’re going to run through the information you need to get this shrub established in your garden. We’ll also touch briefly on some of the different varieties available, to give you a taste of the variations on the theme.</span></p><span data-dcnode-id="860" instrument_node="">
</span><h2 data-dcnode-id="858"><span data-dcnode-id="859" instrument_node="">What is potentilla?</span></h2><span data-dcnode-id="857" instrument_node="">
</span><p data-dcnode-id="852"><span data-dcnode-id="856" instrument_node="">The short answer? A bit of a mystery. This genus contains an undefined number of plants – with estimates ranging from three hundred to over five hundred – and there’s contention about the characteristics which </span><em data-dcnode-id="854"><span data-dcnode-id="855" instrument_node="">should </span></em><span data-dcnode-id="853" instrument_node="">define membership. Some potentillas have small berries which resemble strawberries – a plant to which they’re closely related – but the fruit is small and inedible. All varieties have an elegant floral bloom, yet while the majority are yellow, the overall colour palette varies wildly.</span></p><span data-dcnode-id="851" instrument_node="">
</span><h2 data-dcnode-id="849"><span data-dcnode-id="850" instrument_node="">Why grow it?</span></h2><span data-dcnode-id="848" instrument_node="">
</span><p data-dcnode-id="846"><span data-dcnode-id="847" instrument_node="">For a budding British gardener, this is the more important question. We advocate growing potentilla because it is attractive, varied, and well-suited to a wide range of garden backdrops. Their low shrub profiles lend themselves nicely to borders, while their bold colouration adds visual interest to flower beds and displays.</span></p><span data-dcnode-id="845" instrument_node="">
</span><h2 data-dcnode-id="843"><span data-dcnode-id="844" instrument_node="">Types of potentilla</span></h2><span data-dcnode-id="842" instrument_node="">
</span><p data-dcnode-id="840"><span data-dcnode-id="841" instrument_node="">There are potentially hundreds of different types of potentilla, as we mentioned above. To give a small taste of what’s on offer, we’ve rounded up three varieties which have been awarded the RHS Award of Garden Merit: An accolade indicating particular suitability to growth in British gardens. If you’re wondering which potentilla to grow, you won’t go far wrong with one of these.</span></p><span data-dcnode-id="839" instrument_node="">
</span><h3 data-dcnode-id="837"><span data-dcnode-id="838" instrument_node="">Potentilla fruticosa ‘King Cup’</span></h3><span data-dcnode-id="836" instrument_node="">
</span><p data-dcnode-id="834"><span data-dcnode-id="835" instrument_node="">What do we think of when we think of royalty? Bold, regal colours, confidence, and more than a smattering of gold. With these criteria in mind, it’s not hard to see where King Cup got its name. The rich yellow bloom that bursts forth in summer and sticks around well into autumn sets the potentilla scene perfectly.</span></p><span data-dcnode-id="833" instrument_node="">
</span><figure class="wp-block-image size-large" data-dcnode-id="829"><img alt="Potentilla fruticosa 'King Cup' growing in a garden border" class="wp-image-19205" data-dcnode-id="832" height="651" loading="lazy" sizes="(max-width: 1000px) 100vw, 1000px" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//horticulture.co.uk/wp-content/uploads/2021/04/2-11.jpg&amp;raw" srcset="https://horticulture.co.uk/wp-content/uploads/2021/04/2-11.jpg 1000w, https://horticulture.co.uk/wp-content/uploads/2021/04/2-11-300x195.jpg 300w, https://horticulture.co.uk/wp-content/uploads/2021/04/2-11-768x500.jpg 768w, https://horticulture.co.uk/wp-content/uploads/2021/04/2-11-370x241.jpg 370w, https://horticulture.co.uk/wp-content/uploads/2021/04/2-11-800x521.jpg 800w, https://horticulture.co.uk/wp-content/uploads/2021/04/2-11-20x13.jpg 20w, https://horticulture.co.uk/wp-content/uploads/2021/04/2-11-185x120.jpg 185w, https://horticulture.co.uk/wp-content/uploads/2021/04/2-11-740x482.jpg 740w, https://horticulture.co.uk/wp-content/uploads/2021/04/2-11-400x260.jpg 400w, https://horticulture.co.uk/wp-content/uploads/2021/04/2-11-74x48.jpg 74w" width="1000"><figcaption data-dcnode-id="830"><span data-dcnode-id="831" instrument_node="">Bold, regal, and befitting of the monarchic name</span></figcaption></figure><span data-dcnode-id="828" instrument_node="">
</span><h3 data-dcnode-id="826"><span data-dcnode-id="827" instrument_node="">Potentilla fruticosa ‘Medicine Wheel Mountain’</span></h3><span data-dcnode-id="825" instrument_node="">
</span><p data-dcnode-id="823"><span data-dcnode-id="824" instrument_node="">Here we have a mat-forming shrub which spills intriguingly out onto the ground, leaving a green-yellow covering. The dimensions and overall aesthetic of the mat would work well with a rock display, or to provide attractive ground cover somewhere in your garden that doesn’t require much of a vertical contribution.</span></p><span data-dcnode-id="822" instrument_node="">
</span><h3 data-dcnode-id="820"><span data-dcnode-id="821" instrument_node="">Potentilla fruticosa ‘Primrose Beauty’</span></h3><span data-dcnode-id="819" instrument_node="">
</span><p data-dcnode-id="817"><span data-dcnode-id="818" instrument_node="">This variety of potentilla has white flowers with bright yellow centres, rather than fully yellow flowers. We’ve included the Primrose Beauty to give an indication of the variations available within the potentilla colour palette. Not every garden needs more yellow, but we think that any garden could do with a dash of potentilla.</span></p><span data-dcnode-id="816" instrument_node="">
</span><h2 data-dcnode-id="814"><span data-dcnode-id="815" instrument_node="">Potentilla care &amp; growing tips</span></h2><span data-dcnode-id="813" instrument_node="">
</span><p data-dcnode-id="811"><span data-dcnode-id="812" instrument_node="">If you’re sold on potentilla and want to get one growing in your garden, the next sections are for you. We’ll outline where to plant it, how often to water it, methods of propagation, and much more.</span></p><span data-dcnode-id="810" instrument_node="">
</span><h3 data-dcnode-id="808"><span data-dcnode-id="809" instrument_node="">How to plant</span></h3><span data-dcnode-id="807" instrument_node="">
</span><p data-dcnode-id="805"><span data-dcnode-id="806" instrument_node="">Before planting, mix a few centimetres of compost into the soil, working it to a depth of between 15-20 cm. Then simply dig a hole slightly bigger than the root ball, plop the potentilla sapling in, and cover it over. Pat down the soil firmly enough to keep the plant secure, but not too tightly that you stifle it.</span></p><span data-dcnode-id="804" instrument_node="">
</span><p data-dcnode-id="802"><span data-dcnode-id="803" instrument_node="">For best results, plant out your potentilla in spring or autumn, with spring being favourite for giving the roots a chance to get established in time for harsher weather.</span></p><span data-dcnode-id="801" instrument_node="">
</span><p data-dcnode-id="799"><span data-dcnode-id="800" instrument_node="">This type of plant is rarely grown from seed as it’s hard to keep them true to type. Most garden centres will sell young plants which are ready to be transplanted into your garden.</span></p><span data-dcnode-id="798" instrument_node="">
</span><h3 data-dcnode-id="796"><span data-dcnode-id="797" instrument_node="">Where to grow your plant</span></h3><span data-dcnode-id="795" instrument_node="">
</span><p data-dcnode-id="793"><span data-dcnode-id="794" instrument_node="">The answer to this question will depend on the variety you choose. Potentillas range in height from a few inches to several feet, and have a similarly broad range of widths. Take time to understand how big your variety is likely to get and choose a space in your garden accordingly.</span></p><span data-dcnode-id="792" instrument_node="">
</span><p data-dcnode-id="790"><span data-dcnode-id="791" instrument_node="">In terms of preferred climate and prospect, potentillas are very hardy and can withstand lots of buffeting from the elements. This makes them popular choices for beachfront properties, or gardens that are very exposed.</span></p><span data-dcnode-id="789" instrument_node="">
</span><p data-dcnode-id="787"><span data-dcnode-id="788" instrument_node="">Your potentilla will do best in soil that can drain well, with neutral or slightly acidic pH levels. A spot with full sun will help to nurture more flower growth, so bear this in mind if you’re growing potentilla especially for its floral bloom.</span></p><span data-dcnode-id="786" instrument_node="">
</span><h3 data-dcnode-id="784"><span data-dcnode-id="785" instrument_node="">Watering</span></h3><span data-dcnode-id="783" instrument_node="">
</span><p data-dcnode-id="781"><span data-dcnode-id="782" instrument_node="">To encourage strong root growth keep your potentilla well watered during its first year. After that, the plant is sturdy enough to tolerate drought, but will appreciate watering in particularly dry conditions. To insure against various potential health problems (addressed in detail later), try your best to water the roots and soil only, rather than spraying the entire plant. Damp foliage and leaves can cause problems if they’re unable to dry out fully.</span></p><span data-dcnode-id="780" instrument_node="">
</span><h3 data-dcnode-id="778"><span data-dcnode-id="779" instrument_node="">Pruning</span></h3><span data-dcnode-id="777" instrument_node="">
</span><p data-dcnode-id="775"><span data-dcnode-id="776" instrument_node="">You don’t need to deadhead the flowers on your potentilla, as they’re able to take care of themselves. Because of their shrubby nature, potentillas lend themselves well to pruning to keep them in shape. Don’t do this until your plant is at least three years old, however, to ensure it’s strong enough to withstand the treatment.</span></p><span data-dcnode-id="774" instrument_node="">
</span><p data-dcnode-id="772"><span data-dcnode-id="773" instrument_node="">Prune back older plants by a third of their total growth every few years to keep them tame and healthy.</span></p><span data-dcnode-id="771" instrument_node="">
</span><h3 data-dcnode-id="769"><span data-dcnode-id="770" instrument_node="">How to propagate potentilla</span></h3><span data-dcnode-id="768" instrument_node="">
</span><p data-dcnode-id="766"><span data-dcnode-id="767" instrument_node="">In the height of summer you can take cuttings from your potentilla which, when cared for properly, will flourish into new plants. Keep an eye out for new growth free of flowers with woody stems but around 15cm of soft, green growth.</span></p><span data-dcnode-id="765" instrument_node="">
</span><p data-dcnode-id="763"><span data-dcnode-id="764" instrument_node="">Then simply plant the cutting a few centimetres into a pot filled with compost, taking care that the leaves don’t touch the compost. Cover with a plastic bag for the first few weeks, and then remove the bag once the cutting has had a chance to put out roots.</span></p><span data-dcnode-id="762" instrument_node="">
</span><p data-dcnode-id="760"><span data-dcnode-id="761" instrument_node="">In the next growing season your potentilla will be ready to be transplanted into your garden, following the steps outlined above.</span></p><span data-dcnode-id="759" instrument_node="">
</span><h2 data-dcnode-id="757"><span data-dcnode-id="758" instrument_node="">Troubleshooting common problems</span></h2><span data-dcnode-id="756" instrument_node="">
</span><p data-dcnode-id="754"><span data-dcnode-id="755" instrument_node="">While generally very hardy, there are a few problems that can affect potentilla. Here’s what to look out for –</span></p><span data-dcnode-id="753" instrument_node="">
</span><h3 data-dcnode-id="751"><span data-dcnode-id="752" instrument_node="">Mildew or leafspot</span></h3><span data-dcnode-id="750" instrument_node="">
</span><p data-dcnode-id="748"><span data-dcnode-id="749" instrument_node="">If you’re too enthusiastic with watering your potentilla, it’s possible the plant will not be able to dry out properly. Damp leaves and foliage are particularly susceptible to mildew and similar types of rot. Removing affected parts of the plant before the problem spreads is your best means of control, but in this instance, prevention really is the best cure.</span></p><span data-dcnode-id="747" instrument_node="">
</span><h3 data-dcnode-id="745"><span data-dcnode-id="746" instrument_node="">Root rot</span></h3><span data-dcnode-id="744" instrument_node="">
</span><p data-dcnode-id="742"><span data-dcnode-id="743" instrument_node="">In a similar vein, if the soil is unable to drain properly, your potentilla’s roots may begin to rot. If this happens, it’s very hard to reverse the course of the rot, and often the plant must be discarded.</span></p><span data-dcnode-id="741" instrument_node="">
</span><h3 data-dcnode-id="739"><span data-dcnode-id="740" instrument_node="">Aphids</span></h3><span data-dcnode-id="738" instrument_node="">
</span><p data-dcnode-id="736"><span data-dcnode-id="737" instrument_node="">These pesky green critters love to feast on the sweet fluids inside the leaves and stems of pretty much any plant they can get their hands on (figuratively speaking). If you notice an unwelcome gathering of green fiends on the leaves of your potentilla, here’s what to do –</span></p><span data-dcnode-id="735" instrument_node="">
</span><ol data-dcnode-id="728" type="1"><li data-dcnode-id="733"><span data-dcnode-id="734" instrument_node="">Attempt to remove them by hand, staying vigilant for the next few days to see whether they return.</span></li><li data-dcnode-id="731"><span data-dcnode-id="732" instrument_node="">Introduce predatory bugs like ladybirds or similar, who will keep the aphid populations in check while not eating your plants.</span></li><li data-dcnode-id="729"><span data-dcnode-id="730" instrument_node="">Use a pesticide to remove existing populations and discourage further visits. We recommend going for something gentle and humane, although you have a wide range of options when choosing such a product.</span></li></ol><span data-dcnode-id="727" instrument_node="">
</span><figure class="wp-block-image size-large" data-dcnode-id="723"><img alt="magnified view of small aphids on a green leaf" class="wp-image-19207" data-dcnode-id="726" height="693" loading="lazy" sizes="(max-width: 1000px) 100vw, 1000px" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//horticulture.co.uk/wp-content/uploads/2021/04/3-11.jpg&amp;raw" srcset="https://horticulture.co.uk/wp-content/uploads/2021/04/3-11.jpg 1000w, https://horticulture.co.uk/wp-content/uploads/2021/04/3-11-300x208.jpg 300w, https://horticulture.co.uk/wp-content/uploads/2021/04/3-11-768x532.jpg 768w, https://horticulture.co.uk/wp-content/uploads/2021/04/3-11-370x256.jpg 370w, https://horticulture.co.uk/wp-content/uploads/2021/04/3-11-800x554.jpg 800w, https://horticulture.co.uk/wp-content/uploads/2021/04/3-11-185x128.jpg 185w, https://horticulture.co.uk/wp-content/uploads/2021/04/3-11-740x513.jpg 740w, https://horticulture.co.uk/wp-content/uploads/2021/04/3-11-20x14.jpg 20w, https://horticulture.co.uk/wp-content/uploads/2021/04/3-11-400x277.jpg 400w, https://horticulture.co.uk/wp-content/uploads/2021/04/3-11-69x48.jpg 69w" width="1000"><figcaption data-dcnode-id="724"><span data-dcnode-id="725" instrument_node="">Aphid and goliath</span></figcaption></figure><span data-dcnode-id="722" instrument_node="">
</span><h2 data-dcnode-id="720"><span data-dcnode-id="721" instrument_node="">Unleash your true potentilla</span></h2><span data-dcnode-id="719" instrument_node="">
</span><p data-dcnode-id="717"><span data-dcnode-id="718" instrument_node="">The myriad plants under the potentilla banner offer an exciting and rewarding set of blooms for your garden. Whether you want something tall and flamboyant or a mat that barely stands above the ground, this family of shrubs has got you covered. Thanks to their hardiness, flexibility, and comprehensive range of shapes, sizes, and colours, there’s a member of the potentilla family well-suited to the needs of any and all gardeners.</span></p><span data-dcnode-id="716" instrument_node="">
</span><p data-dcnode-id="714"><span data-dcnode-id="715" instrument_node="">And although there are a few things to look out for, this plant really isn’t too demanding, once you get it established in your garden. Take care to choose the right spot and nurture your plant to health, and you’ll be rewarded with a mature bloom that largely takes care of itself.</span></p><span data-dcnode-id="713" instrument_node="">
</span><p data-dcnode-id="711"><span data-dcnode-id="712" instrument_node="">We wish you the best in helping your potentilla to reach its potential!</span></p><span data-dcnode-id="710" instrument_node="">
</span></div><span data-dcnode-id="708" instrument_node="">
