</span><span class="like-count" data-dcnode-id="761"><span data-dcnode-id="764" instrument_node=""> </span><i class="fa fa-thumbs-o-up" data-dcnode-id="763"></i><span data-dcnode-id="762" instrument_node="">0 </span></span></div><div class="afw afw-ga afw_ad afwadid-1050" data-ad-id="1050" data-dcnode-id="747" style="text-align:center; margin-top:px; margin-bottom:px; margin-left:px; margin-right:px;float:none;"><div data-dcnode-id="757" style="font-size:10px;text-align:center;color:#cccccc;"><span data-dcnode-id="758" instrument_node="">Advertisement</span></div><span data-dcnode-id="756" instrument_node=""> </span><span data-dcnode-id="753" instrument_node=""> </span><ins class="adsbygoogle" data-ad-client="ca-pub-5752760918132157" data-ad-format="auto" data-ad-slot="1298174929" data-dcnode-id="751" data-full-width-responsive="true" style="background:none;display:inline-block;max-width:800px;width:100%;height:200px;max-height:200px;"><span data-dcnode-id="752" instrument_node=""> </span></ins><span data-dcnode-id="750" instrument_node=""> </span></div><p data-dcnode-id="742"><span data-dcnode-id="746" instrument_node="">Euonymus is a genus of plants comprising a variety of shrubs, among them there are deciduous and evergreen, in addition to small trees. It is currently distributed by Europe, Asia, Australia, North America and Madagascar. With white flowers and fruit like berries, this shrub is commonly used for garden decoration. It has the peculiarity that all parts of it are poisonous to humans if ingested. In this article we will analyze in a general way everything that concerns the</span><strong data-dcnode-id="744"><span data-dcnode-id="745" instrument_node=""> pruning of Euonymus bush</span></strong><span data-dcnode-id="743" instrument_node="">, how to do it, at what season and with what tools.</span></p><div class="afw afw-ga afw_ad afwadid-1055" data-ad-id="1055" data-dcnode-id="730" style="text-align:center; margin-top:px; margin-bottom:px; margin-left:px; margin-right:px;float:none;"><div data-dcnode-id="740" style="font-size:10px;text-align:center;color:#cccccc;"><span data-dcnode-id="741" instrument_node="">Advertisement</span></div><span data-dcnode-id="739" instrument_node=""> </span><span data-dcnode-id="736" instrument_node=""> </span><ins class="adsbygoogle" data-ad-client="ca-pub-5752760918132157" data-ad-format="auto" data-ad-slot="4181876297" data-dcnode-id="734" data-full-width-responsive="true" style="background:none;display:inline-block;max-width:800px;width:100%;height:200px;max-height:200px;"><span data-dcnode-id="735" instrument_node=""> </span></ins><span data-dcnode-id="733" instrument_node=""> </span></div><div class="content-note" data-dcnode-id="725"><p data-dcnode-id="726"><strong data-dcnode-id="728"><span data-dcnode-id="729" instrument_node="">Note:</span></strong><span data-dcnode-id="727" instrument_node=""> Please note that the advice given here is general, this blog is consulted from many countries in the world, with totally different characteristics, what not all tips will be adapted in the same way in all cases. Once you finish reading the article it will be necessary to analyze all the information and apply what you have learned in the best way. If you have any questions, remember that you can contact us to make your inquiries.</span></p></div><div class="ez-toc-v2_0_18 counter-hierarchy" data-dcnode-id="672" id="ez-toc-container"><div class="ez-toc-title-container" data-dcnode-id="720"><p class="ez-toc-title" data-dcnode-id="723"><span data-dcnode-id="724" instrument_node="">Table of Contents</span></p><span data-dcnode-id="722" instrument_node=""> </span><span class="ez-toc-title-toggle" data-dcnode-id="721"></span></div><nav data-dcnode-id="673"><ul class="ez-toc-list ez-toc-list-level-1" data-dcnode-id="674"><li class="ez-toc-page-1 ez-toc-heading-level-2" data-dcnode-id="717"><a class="ez-toc-link ez-toc-heading-1" data-dcnode-id="718" href="#1_How_to_care_Euonymus_bush" title="1. How to care Euonymus bush"><span data-dcnode-id="719" instrument_node="">1. How to care Euonymus bush</span></a></li><li class="ez-toc-page-1 ez-toc-heading-level-2" data-dcnode-id="710"><a class="ez-toc-link ez-toc-heading-2" data-dcnode-id="715" href="#2_Tools_needed_for_pruning_Euonymus_shrub" title="2. Tools needed for pruning   Euonymus shrub"><span data-dcnode-id="716" instrument_node="">2. Tools needed for pruning   Euonymus shrub</span></a><ul class="ez-toc-list-level-3" data-dcnode-id="711"><li class="ez-toc-heading-level-3" data-dcnode-id="712"><a class="ez-toc-link ez-toc-heading-3" data-dcnode-id="713" href="#21_Needed_care_of_pruning_tools" title="2.1 Needed care of pruning tools"><span data-dcnode-id="714" instrument_node="">2.1 Needed care of pruning tools</span></a></li></ul></li><li class="ez-toc-page-1 ez-toc-heading-level-2" data-dcnode-id="697"><a class="ez-toc-link ez-toc-heading-4" data-dcnode-id="708" href="#3_Pruning_Euonymus_shrub" title="3. Pruning Euonymus shrub"><span data-dcnode-id="709" instrument_node="">3. Pruning Euonymus shrub</span></a><ul class="ez-toc-list-level-3" data-dcnode-id="698"><li class="ez-toc-heading-level-3" data-dcnode-id="705"><a class="ez-toc-link ez-toc-heading-5" data-dcnode-id="706" href="#31_Cleaning_pruning" title="3.1  Cleaning pruning"><span data-dcnode-id="707" instrument_node="">3.1  Cleaning pruning</span></a></li><li class="ez-toc-page-1 ez-toc-heading-level-3" data-dcnode-id="702"><a class="ez-toc-link ez-toc-heading-6" data-dcnode-id="703" href="#32_Pruning_to_shape" title="3.2 Pruning to shape"><span data-dcnode-id="704" instrument_node="">3.2 Pruning to shape</span></a></li><li class="ez-toc-page-1 ez-toc-heading-level-3" data-dcnode-id="699"><a class="ez-toc-link ez-toc-heading-7" data-dcnode-id="700" href="#33_Hard_pruning" title="3.3 Hard pruning"><span data-dcnode-id="701" instrument_node="">3.3 Hard pruning</span></a></li></ul></li><li class="ez-toc-page-1 ez-toc-heading-level-2" data-dcnode-id="681"><a class="ez-toc-link ez-toc-heading-8" data-dcnode-id="695" href="#4_Euonymus_pruning_according_to_its_variety" title="4. Euonymus pruning according to its variety"><span data-dcnode-id="696" instrument_node="">4. Euonymus pruning according to its variety</span></a><ul class="ez-toc-list-level-3" data-dcnode-id="682"><li class="ez-toc-heading-level-3" data-dcnode-id="692"><a class="ez-toc-link ez-toc-heading-9" data-dcnode-id="693" href="#31_Pruning_golden_euonymus" title="3.1 Pruning golden euonymus"><span data-dcnode-id="694" instrument_node="">3.1 Pruning golden euonymus</span></a></li><li class="ez-toc-page-1 ez-toc-heading-level-3" data-dcnode-id="689"><a class="ez-toc-link ez-toc-heading-10" data-dcnode-id="690" href="#32_Pruning_Euonymus_alatus" title="3.2 Pruning Euonymus alatus"><span data-dcnode-id="691" instrument_node="">3.2 Pruning Euonymus alatus</span></a></li><li class="ez-toc-page-1 ez-toc-heading-level-3" data-dcnode-id="686"><a class="ez-toc-link ez-toc-heading-11" data-dcnode-id="687" href="#33_How_to_prune_Euonymus_japonicus" title=" 3.3 How to prune Euonymus japonicus  "><span data-dcnode-id="688" instrument_node=""> 3.3 How to prune Euonymus japonicus </span></a></li><li class="ez-toc-page-1 ez-toc-heading-level-3" data-dcnode-id="683"><a class="ez-toc-link ez-toc-heading-12" data-dcnode-id="684" href="#34_How_to_prune_Euonymus_fortunei" title=" 3.4 How to prune Euonymus fortunei "><span data-dcnode-id="685" instrument_node=""> 3.4 How to prune Euonymus fortunei </span></a></li></ul></li><li class="ez-toc-page-1 ez-toc-heading-level-2" data-dcnode-id="678"><a class="ez-toc-link ez-toc-heading-13" data-dcnode-id="679" href="#4_When_to_prune_Euonymus" title="4. When to prune Euonymus"><span data-dcnode-id="680" instrument_node="">4. When to prune Euonymus</span></a></li><li class="ez-toc-page-1 ez-toc-heading-level-2" data-dcnode-id="675"><a class="ez-toc-link ez-toc-heading-14" data-dcnode-id="676" href="#5_How_to_prune_Euonymus_bush_video" title="5. How to prune Euonymus bush video"><span data-dcnode-id="677" instrument_node="">5. How to prune Euonymus bush video</span></a></li></ul></nav></div><h2 class="has-text-align-center" data-dcnode-id="668"><span class="ez-toc-section" data-dcnode-id="671" id="1_How_to_care_Euonymus_bush"></span><span data-dcnode-id="670" instrument_node="">1. How to care Euonymus bush</span><span class="ez-toc-section-end" data-dcnode-id="669"></span></h2><div class="afw afw-ga afw_ad afwadid-1053" data-ad-id="1053" data-dcnode-id="656" style="text-align:center; margin-top:px; margin-bottom:px; margin-left:px; margin-right:px;float:none;"><div data-dcnode-id="666" style="font-size:10px;text-align:center;color:#cccccc;"><span data-dcnode-id="667" instrument_node="">Advertisement</span></div><span data-dcnode-id="665" instrument_node=""> </span><span data-dcnode-id="662" instrument_node=""> </span><ins class="adsbygoogle" data-ad-client="ca-pub-5752760918132157" data-ad-format="auto" data-ad-slot="4866753061" data-dcnode-id="660" data-full-width-responsive="true" style="background:none;display:inline-block;max-width:800px;width:100%;height:200px;max-height:200px;"><span data-dcnode-id="661" instrument_node=""> </span></ins><span data-dcnode-id="659" instrument_node=""> </span></div><p data-dcnode-id="651"><span data-dcnode-id="655" instrument_node="">Just as pruning is one of the many cares that must be carried out in a Euonymus, and since I want you to know how to give the best conditions to your bush, in this section we will see in a general way </span><strong data-dcnode-id="653"><span data-dcnode-id="654" instrument_node="">the most important cares </span></strong><span data-dcnode-id="652" instrument_node="">that you should take into account.</span></p><ul data-dcnode-id="646"><li data-dcnode-id="647"><strong data-dcnode-id="649"><span data-dcnode-id="650" instrument_node="">Location:</span></strong><span data-dcnode-id="648" instrument_node=""> It is important that you are outside, in full sun. It can also be in semi-shade as long as it receives more hours of light than shade.</span></li></ul><ul data-dcnode-id="641"><li data-dcnode-id="642"><strong data-dcnode-id="644"><span data-dcnode-id="645" instrument_node="">Soil:</span></strong><span data-dcnode-id="643" instrument_node=""> if it is outside your garden it adapts to any soil, it is enough that it has good drainage. If you have it in a pot, you can mix the soil with 30% perlite.</span></li></ul><ul data-dcnode-id="636"><li data-dcnode-id="637"><strong data-dcnode-id="639"><span data-dcnode-id="640" instrument_node="">Temperature:</span></strong><span data-dcnode-id="638" instrument_node=""> in general it can withstand the cold very well, up to -18 ° C.</span></li></ul><div class="wp-block-image" data-dcnode-id="629"><figure class="aligncenter size-large" data-dcnode-id="630"><img alt="Euonymus fortunei " class="wp-image-1003 lazyloaded" data-dcnode-id="635" data-src="https://howandwhentoprune.com/wp-content/uploads/2020/01/Euonymus-fortunei.jpg" data-srcset="https://howandwhentoprune.com/wp-content/uploads/2020/01/Euonymus-fortunei.jpg 400w, https://howandwhentoprune.com/wp-content/uploads/2020/01/Euonymus-fortunei-300x200.jpg 300w, https://howandwhentoprune.com/wp-content/uploads/2020/01/Euonymus-fortunei-60x40.jpg 60w, https://howandwhentoprune.com/wp-content/uploads/2020/01/Euonymus-fortunei-150x100.jpg 150w" height="266" sizes="(max-width: 400px) 100vw, 400px" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//howandwhentoprune.com/wp-content/uploads/2020/01/Euonymus-fortunei.jpg&amp;raw" srcset="https://howandwhentoprune.com/wp-content/uploads/2020/01/Euonymus-fortunei.jpg 400w, https://howandwhentoprune.com/wp-content/uploads/2020/01/Euonymus-fortunei-300x200.jpg 300w, https://howandwhentoprune.com/wp-content/uploads/2020/01/Euonymus-fortunei-60x40.jpg 60w, https://howandwhentoprune.com/wp-content/uploads/2020/01/Euonymus-fortunei-150x100.jpg 150w" width="400"><noscript data-dcnode-id="633"><span data-dcnode-id="634" instrument_node="">&lt;img width="400" height="266" src="https://howandwhentoprune.com/wp-content/uploads/2020/01/Euonymus-fortunei.jpg" alt="Euonymus fortunei " class="wp-image-1003 lazyload" srcset="https://howandwhentoprune.com/wp-content/uploads/2020/01/Euonymus-fortunei.jpg 400w, https://howandwhentoprune.com/wp-content/uploads/2020/01/Euonymus-fortunei-300x200.jpg 300w, https://howandwhentoprune.com/wp-content/uploads/2020/01/Euonymus-fortunei-60x40.jpg 60w, https://howandwhentoprune.com/wp-content/uploads/2020/01/Euonymus-fortunei-150x100.jpg 150w" sizes="(max-width: 400px) 100vw, 400px" /&gt;</span></noscript><figcaption data-dcnode-id="631"><span data-dcnode-id="632" instrument_node=""> Euonymus fortunei</span></figcaption></figure></div><ul data-dcnode-id="624"><li data-dcnode-id="625"><strong data-dcnode-id="627"><span data-dcnode-id="628" instrument_node="">Irrigation: </span></strong><span data-dcnode-id="626" instrument_node="">Depending on the season you can water it three or four times a week in warm seasons, while the rest of the year will be enough with one or two weekly irrigations.</span></li></ul><ul data-dcnode-id="619"><li data-dcnode-id="620"><strong data-dcnode-id="622"><span data-dcnode-id="623" instrument_node="">Fertilization:</span></strong><span data-dcnode-id="621" instrument_node=""> in times of greater development, that is, spring-summer, a monthly fertilization with some organic fertilizer (for example guano) is advisable.</span></li></ul><ul data-dcnode-id="614"><li data-dcnode-id="615"><strong data-dcnode-id="617"><span data-dcnode-id="618" instrument_node="">Multiplication:</span></strong><span data-dcnode-id="616" instrument_node=""> the two most common ways to multiply this shrub is by seed or cutting. The first should be done during the fall, while the second in spring.</span></li></ul><ul data-dcnode-id="609"><li data-dcnode-id="610"><strong data-dcnode-id="612"><span data-dcnode-id="613" instrument_node="">Diseases:</span></strong><span data-dcnode-id="611" instrument_node=""> It is quite prone to contracting fungi, especially when it is located under shade or with excessive irrigation. To avoid it, it should not be exceeded with irrigation and try to locate it in areas with several hours of sunshine. You can also fight it with funjicides.</span></li></ul><ul data-dcnode-id="604"><li data-dcnode-id="605"><strong data-dcnode-id="607"><span data-dcnode-id="608" instrument_node="">Pests:</span></strong><span data-dcnode-id="606" instrument_node=""> the two most common pests are mealybugs and aphids, periodically check these pests to prevent their spread.</span></li></ul><ul data-dcnode-id="599"><li data-dcnode-id="600"><strong data-dcnode-id="602"><span data-dcnode-id="603" instrument_node="">Pruning:</span></strong><span data-dcnode-id="601" instrument_node=""> how could it be otherwise we close the list of care of the Euonymus with the pruning of the same, in the next sections we will develop this point with more depth.</span></li></ul><h2 class="has-text-align-center" data-dcnode-id="595"><span class="ez-toc-section" data-dcnode-id="598" id="2_Tools_needed_for_pruning_Euonymus_shrub"></span><span data-dcnode-id="597" instrument_node="">2. Tools needed for pruning   Euonymus shrub</span><span class="ez-toc-section-end" data-dcnode-id="596"></span></h2><div class="afw afw-ga afw_ad afwadid-1053" data-ad-id="1053" data-dcnode-id="583" style="text-align:center; margin-top:px; margin-bottom:px; margin-left:px; margin-right:px;float:none;"><div data-dcnode-id="593" style="font-size:10px;text-align:center;color:#cccccc;"><span data-dcnode-id="594" instrument_node="">Advertisement</span></div><span data-dcnode-id="592" instrument_node=""> </span><span data-dcnode-id="589" instrument_node=""> </span><ins class="adsbygoogle" data-ad-client="ca-pub-5752760918132157" data-ad-format="auto" data-ad-slot="4866753061" data-dcnode-id="587" data-full-width-responsive="true" style="background:none;display:inline-block;max-width:800px;width:100%;height:200px;max-height:200px;"><span data-dcnode-id="588" instrument_node=""> </span></ins><span data-dcnode-id="586" instrument_node=""> </span></div><p data-dcnode-id="578"><span data-dcnode-id="582" instrument_node="">There are </span><strong data-dcnode-id="580"><span data-dcnode-id="581" instrument_node="">several tools that you will need</span></strong><span data-dcnode-id="579" instrument_node=""> to perform your pruning or trimming of a Euonymus shrub. Each of them is appropriate for different cases depending on age, time of year, type of pruning, etc.</span></p><ul data-dcnode-id="573"><li data-dcnode-id="574"><strong data-dcnode-id="576"><span data-dcnode-id="577" instrument_node="">Hand Pruning Shears: </span></strong><span data-dcnode-id="575" instrument_node="">Stems up to half inch in diameter can be pruned with hand shears.</span></li></ul><ul data-dcnode-id="568"><li data-dcnode-id="569"><strong data-dcnode-id="571"><span data-dcnode-id="572" instrument_node="">Lopping Shears: </span></strong><span data-dcnode-id="570" instrument_node="">It is suitable to use on stems between half inch and 2 inches in diameter.</span></li></ul><ul data-dcnode-id="563"><li data-dcnode-id="564"><strong data-dcnode-id="566"><span data-dcnode-id="567" instrument_node="">Hedge Shears: </span></strong><span data-dcnode-id="565" instrument_node="">Manual and power shears are available for trimming hedges. Manual shears have long, flat blades with relatively short handles and are good for small jobs. Electric shears are a good choice for larger hedges.</span></li></ul><ul data-dcnode-id="558"><li data-dcnode-id="559"><strong data-dcnode-id="561"><span data-dcnode-id="562" instrument_node="">Saws</span></strong><span data-dcnode-id="560" instrument_node="">: A number of pruning saws are available. These saws come with either curved or straight blades and of variable lengths and points. Curved blades that cut on the draw stroke are easy to use.</span></li></ul><p data-dcnode-id="553"><span data-dcnode-id="557" instrument_node="">Keep in mind that you must </span><strong data-dcnode-id="555"><span data-dcnode-id="556" instrument_node="">disinfect all the tools before cut back your Euonymus shrub.</span></strong><span data-dcnode-id="554" instrument_node=""> This will help prevent disease transmission, you will have to do it before you start pruning and every time you change plants.</span></p><div class="content-box-green" data-dcnode-id="523"><p data-dcnode-id="549"><span data-dcnode-id="552" instrument_node="">You may also be interested in </span><strong data-dcnode-id="550"><span data-dcnode-id="551" instrument_node="">knowing about pruning:</span></strong></p><ul data-dcnode-id="544"><li data-dcnode-id="545"><a data-dcnode-id="546" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//howandwhentoprune.com/philadelphus-mock-orange/" rel="noopener noreferrer" target="_blank"><strong data-dcnode-id="547"><span data-dcnode-id="548" instrument_node="">Philadelphus</span></strong></a></li></ul><ul data-dcnode-id="539"><li data-dcnode-id="540"><a data-dcnode-id="541" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//howandwhentoprune.com/escallonia-hedge/" rel="noopener noreferrer" target="_blank"><strong data-dcnode-id="542"><span data-dcnode-id="543" instrument_node="">Escallonia hedge</span></strong></a></li></ul><ul data-dcnode-id="534"><li data-dcnode-id="535"><a data-dcnode-id="536" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//howandwhentoprune.com/iris-plant/" rel="noopener noreferrer" target="_blank"><strong data-dcnode-id="537"><span data-dcnode-id="538" instrument_node="">Iris plant</span></strong></a></li></ul><ul data-dcnode-id="529"><li data-dcnode-id="530"><a data-dcnode-id="531" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//howandwhentoprune.com/clematis-montana/" rel="noopener noreferrer" target="_blank"><strong data-dcnode-id="532"><span data-dcnode-id="533" instrument_node="">Clematis montana</span></strong></a></li></ul><ul data-dcnode-id="524"><li data-dcnode-id="525"><a data-dcnode-id="526" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//howandwhentoprune.com/verbena-bonariensis/" rel="noopener noreferrer" target="_blank"><strong data-dcnode-id="527"><span data-dcnode-id="528" instrument_node="">Verbena bonariensis</span></strong></a></li></ul></div><h3 class="has-text-align-center" data-dcnode-id="519"><span class="ez-toc-section" data-dcnode-id="522" id="21_Needed_care_of_pruning_tools"></span><span data-dcnode-id="521" instrument_node="">2.1 Needed care of pruning tools</span><span class="ez-toc-section-end" data-dcnode-id="520"></span></h3><p data-dcnode-id="517"><span data-dcnode-id="518" instrument_node="">If you want to extend the useful life of your pruning tools there are some basic care.</span></p><ul data-dcnode-id="512"><li data-dcnode-id="513"><strong data-dcnode-id="515"><span data-dcnode-id="516" instrument_node="">Use the right tool</span></strong><span data-dcnode-id="514" instrument_node=""> for a job and avoid twisting or straining it.</span></li></ul><ul data-dcnode-id="507"><li data-dcnode-id="508"><strong data-dcnode-id="510"><span data-dcnode-id="511" instrument_node="">Clean and oil tools regularly</span></strong><span data-dcnode-id="509" instrument_node=""> by wiping an oily cloth on blades and other surfaces.</span></li></ul><ul data-dcnode-id="502"><li data-dcnode-id="503"><strong data-dcnode-id="505"><span data-dcnode-id="506" instrument_node="">Keep cutting edges</span></strong><span data-dcnode-id="504" instrument_node=""> sharp by regularly using an oilstone.</span></li></ul><ul data-dcnode-id="497"><li data-dcnode-id="498"><strong data-dcnode-id="500"><span data-dcnode-id="501" instrument_node="">Wooden handles should be varnished</span></strong><span data-dcnode-id="499" instrument_node=""> or regularly treated with linseed oil to keep them from cracking or splintering.</span></li></ul><p data-dcnode-id="494"><span data-dcnode-id="496" instrument_node="">Carry out the previous care on a regular basis and you will be saving good money on tools. </span><img alt="🙂" class="emoji" data-dcnode-id="495" draggable="false" role="img" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//s.w.org/images/core/emoji/13.1.0/svg/1f642.svg&amp;raw"></p><h2 class="has-text-align-center" data-dcnode-id="490"><span class="ez-toc-section" data-dcnode-id="493" id="3_Pruning_Euonymus_shrub"></span><span data-dcnode-id="492" instrument_node="">3. Pruning Euonymus shrub</span><span class="ez-toc-section-end" data-dcnode-id="491"></span></h2><div class="afw afw-ga afw_ad afwadid-1053" data-ad-id="1053" data-dcnode-id="478" style="text-align:center; margin-top:px; margin-bottom:px; margin-left:px; margin-right:px;float:none;"><div data-dcnode-id="488" style="font-size:10px;text-align:center;color:#cccccc;"><span data-dcnode-id="489" instrument_node="">Advertisement</span></div><span data-dcnode-id="487" instrument_node=""> </span><span data-dcnode-id="484" instrument_node=""> </span><ins class="adsbygoogle" data-ad-client="ca-pub-5752760918132157" data-ad-format="auto" data-ad-slot="4866753061" data-dcnode-id="482" data-full-width-responsive="true" style="background:none;display:inline-block;max-width:800px;width:100%;height:200px;max-height:200px;"><span data-dcnode-id="483" instrument_node=""> </span></ins><span data-dcnode-id="481" instrument_node=""> </span></div><p data-dcnode-id="473"><span data-dcnode-id="477" instrument_node="">As there are many varieties of euonymus, including deciduous and evergreen shrubs, it becomes difficult to adequately cover each variety. Therefore, we will begin by analyzing the </span><strong data-dcnode-id="475"><span data-dcnode-id="476" instrument_node="">aspects of pruning in a general way </span></strong><span data-dcnode-id="474" instrument_node="">and then we will analyze the pruning of the four most popular varideades.</span></p><ul data-dcnode-id="470"><li data-dcnode-id="471"><span data-dcnode-id="472" instrument_node="">Cleaning pruning</span></li></ul><ul data-dcnode-id="467"><li data-dcnode-id="468"><span data-dcnode-id="469" instrument_node="">Pruning to shape</span></li></ul><ul data-dcnode-id="464"><li data-dcnode-id="465"><span data-dcnode-id="466" instrument_node="">Hard pruning</span></li></ul><p data-dcnode-id="462"><span data-dcnode-id="463" instrument_node="">We will analyze each of the previous prunings separately.</span></p><h3 class="has-text-align-center" data-dcnode-id="458"><span class="ez-toc-section" data-dcnode-id="461" id="31_Cleaning_pruning"></span><span data-dcnode-id="460" instrument_node="">3.1  Cleaning pruning</span><span class="ez-toc-section-end" data-dcnode-id="459"></span></h3><p data-dcnode-id="453"><span data-dcnode-id="457" instrument_node="">Like any plant, </span><strong data-dcnode-id="455"><span data-dcnode-id="456" instrument_node="">the Euonymus, needs cleaning pruning</span></strong><span data-dcnode-id="454" instrument_node="">, this will help keep the bush healthier. Step to enumerate which are the branches that must be eliminated when cleaning the pruning.</span></p><ul data-dcnode-id="450"><li data-dcnode-id="451"><span data-dcnode-id="452" instrument_node="">Branches that are dead, dry, broken or diseased.</span></li></ul><ul data-dcnode-id="447"><li data-dcnode-id="448"><span data-dcnode-id="449" instrument_node=""> Dry stumps (pieces of branches that have no shoots and are dead).</span></li></ul><ul data-dcnode-id="440"><li data-dcnode-id="443"><span data-dcnode-id="446" instrument_node=""> Foot rebrotes that are weak or poorly located and we are not interested in their development.</span><br data-dcnode-id="445"><span data-dcnode-id="444" instrument_node=""> &nbsp;</span></li><li data-dcnode-id="441"><span data-dcnode-id="442" instrument_node="">Branches crossed, poorly oriented or very tangled.</span></li></ul><ul data-dcnode-id="437"><li data-dcnode-id="438"><span data-dcnode-id="439" instrument_node=""> Branches that protrude a lot from the bush because of its excess vigor.</span></li></ul><p data-dcnode-id="432"><span data-dcnode-id="436" instrument_node="">It is advisable </span><strong data-dcnode-id="434"><span data-dcnode-id="435" instrument_node="">not to miss many years to perform this pruning</span></strong><span data-dcnode-id="433" instrument_node="">. Otherwise entanglement will appear, the aesthetics of the plant will not be good, and the pruning at the time of doing it will be too strong.</span></p><p data-dcnode-id="427"><span data-dcnode-id="431" instrument_node="">On the other hand, </span><strong data-dcnode-id="429"><span data-dcnode-id="430" instrument_node="">be very careful when disposing of this pruning was</span></strong><span data-dcnode-id="428" instrument_node="">te, especially if it is sick or attacked by a pest. Never leave this waste near other plants, since it will be spreading the disease or pest throughout your garden.</span></p><h3 class="has-text-align-center" data-dcnode-id="423"><span class="ez-toc-section" data-dcnode-id="426" id="32_Pruning_to_shape"></span><span data-dcnode-id="425" instrument_node="">3.2 Pruning to shape</span><span class="ez-toc-section-end" data-dcnode-id="424"></span></h3><p data-dcnode-id="418"><span data-dcnode-id="422" instrument_node="">In general, </span><strong data-dcnode-id="420"><span data-dcnode-id="421" instrument_node="">Euonymus shrubs naturally develop a beautiful form</span></strong><span data-dcnode-id="419" instrument_node="">, but often due to carelessness or by nature itself, they begin to take an elongated and unattractive form. To solve this, they can perform a pruning to form it.</span></p><div class="wp-block-image" data-dcnode-id="411"><figure class="aligncenter size-large" data-dcnode-id="412"><img alt=" Euonymus alatus - Pruning shape" class="wp-image-1004 lazyloaded" data-dcnode-id="417" data-src="https://howandwhentoprune.com/wp-content/uploads/2020/01/Euonymus-alatus.jpg" data-srcset="https://howandwhentoprune.com/wp-content/uploads/2020/01/Euonymus-alatus.jpg 400w, https://howandwhentoprune.com/wp-content/uploads/2020/01/Euonymus-alatus-300x200.jpg 300w, https://howandwhentoprune.com/wp-content/uploads/2020/01/Euonymus-alatus-60x40.jpg 60w, https://howandwhentoprune.com/wp-content/uploads/2020/01/Euonymus-alatus-150x100.jpg 150w" height="266" sizes="(max-width: 400px) 100vw, 400px" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//howandwhentoprune.com/wp-content/uploads/2020/01/Euonymus-alatus.jpg&amp;raw" srcset="https://howandwhentoprune.com/wp-content/uploads/2020/01/Euonymus-alatus.jpg 400w, https://howandwhentoprune.com/wp-content/uploads/2020/01/Euonymus-alatus-300x200.jpg 300w, https://howandwhentoprune.com/wp-content/uploads/2020/01/Euonymus-alatus-60x40.jpg 60w, https://howandwhentoprune.com/wp-content/uploads/2020/01/Euonymus-alatus-150x100.jpg 150w" width="400"><noscript data-dcnode-id="415"><span data-dcnode-id="416" instrument_node="">&lt;img width="400" height="266" src="https://howandwhentoprune.com/wp-content/uploads/2020/01/Euonymus-alatus.jpg" alt=" Euonymus alatus - Pruning shape" class="wp-image-1004 lazyload" srcset="https://howandwhentoprune.com/wp-content/uploads/2020/01/Euonymus-alatus.jpg 400w, https://howandwhentoprune.com/wp-content/uploads/2020/01/Euonymus-alatus-300x200.jpg 300w, https://howandwhentoprune.com/wp-content/uploads/2020/01/Euonymus-alatus-60x40.jpg 60w, https://howandwhentoprune.com/wp-content/uploads/2020/01/Euonymus-alatus-150x100.jpg 150w" sizes="(max-width: 400px) 100vw, 400px" /&gt;</span></noscript><figcaption data-dcnode-id="413"><span data-dcnode-id="414" instrument_node=""> Euonymus alatus</span></figcaption></figure></div><p data-dcnode-id="406"><span data-dcnode-id="410" instrument_node="">If it is the first of these prunings that will give it, it is advisable to </span><strong data-dcnode-id="408"><span data-dcnode-id="409" instrument_node="">start densifying the foliage</span></strong><span data-dcnode-id="407" instrument_node="">, something that is achieved by blunt all its branches. This will force the bush to release new shoots, if it does a couple of times, it achieves a good foliage density.</span></p><p data-dcnode-id="404"><span data-dcnode-id="405" instrument_node="">In case you have already formed the bush with pruning on other occasions, it is always good to recover it. Just look for the cuts of the previous pruning and cut the branches to that level, thus achieving the previous shape.</span></p><h3 class="has-text-align-center" data-dcnode-id="400"><span class="ez-toc-section" data-dcnode-id="403" id="33_Hard_pruning"></span><span data-dcnode-id="402" instrument_node="">3.3 Hard pruning</span><span class="ez-toc-section-end" data-dcnode-id="401"></span></h3><p data-dcnode-id="395"><span data-dcnode-id="399" instrument_node="">In general, the Euonymus </span><strong data-dcnode-id="397"><span data-dcnode-id="398" instrument_node="">needs a hard pruning</span></strong><span data-dcnode-id="396" instrument_node=""> when it begins to see that its foliage is more scarce and not covering the spaces it covered in previous seasons. Its branches are too woody and its shoots grow with less force.</span></p><p data-dcnode-id="390"><span data-dcnode-id="394" instrument_node="">If that is the case with your Euonymus, do not be afraid to perform hard pruning. I waited until all the frosts of the year have passed and then</span><strong data-dcnode-id="392"><span data-dcnode-id="393" instrument_node=""> cut all the branches about 20 cm from the ground</span></strong><span data-dcnode-id="391" instrument_node=""> (this may vary depending on the variety of Euonymus).</span></p><p data-dcnode-id="388"><span data-dcnode-id="389" instrument_node="">During the spring you will see how the bush begins to release new and strong shoots from its base. They will be in charge of forming their structure in the following seasons.</span></p><p data-dcnode-id="386"><span data-dcnode-id="387" instrument_node="">This hard pruning may also be necessary when the bush has been attacked by a pest that we can no longer control.</span></p><h2 class="has-text-align-center" data-dcnode-id="382"><span class="ez-toc-section" data-dcnode-id="385" id="4_Euonymus_pruning_according_to_its_variety"></span><span data-dcnode-id="384" instrument_node="">4. Euonymus pruning according to its variety</span><span class="ez-toc-section-end" data-dcnode-id="383"></span></h2><div class="afw afw-ga afw_ad afwadid-1053" data-ad-id="1053" data-dcnode-id="370" style="text-align:center; margin-top:px; margin-bottom:px; margin-left:px; margin-right:px;float:none;"><div data-dcnode-id="380" style="font-size:10px;text-align:center;color:#cccccc;"><span data-dcnode-id="381" instrument_node="">Advertisement</span></div><span data-dcnode-id="379" instrument_node=""> </span><span data-dcnode-id="376" instrument_node=""> </span><ins class="adsbygoogle" data-ad-client="ca-pub-5752760918132157" data-ad-format="auto" data-ad-slot="4866753061" data-dcnode-id="374" data-full-width-responsive="true" style="background:none;display:inline-block;max-width:800px;width:100%;height:200px;max-height:200px;"><span data-dcnode-id="375" instrument_node=""> </span></ins><span data-dcnode-id="373" instrument_node=""> </span></div><p data-dcnode-id="365"><span data-dcnode-id="369" instrument_node="">Here we will briefly analyze the particularities found in the</span><strong data-dcnode-id="367"><span data-dcnode-id="368" instrument_node=""> pruning of four of the most popular varieties </span></strong><span data-dcnode-id="366" instrument_node="">of Euonymus. They are; Golden Euonymus, Euonymus alatus, Euonymus japonicus and Euonymus fortunei.</span></p><h3 class="has-text-align-center" data-dcnode-id="361"><span class="ez-toc-section" data-dcnode-id="364" id="31_Pruning_golden_euonymus"></span><span data-dcnode-id="363" instrument_node="">3.1 Pruning golden euonymus</span><span class="ez-toc-section-end" data-dcnode-id="362"></span></h3><p data-dcnode-id="359"><span data-dcnode-id="360" instrument_node="">Evergreen shrub with large, bright, oval-shaped leaves that are dark forest green and broadly edged in bright golden yellow. Fast growing: good to use as a colorful hedge or as a bright accent plant.</span></p><p data-dcnode-id="354"><span data-dcnode-id="358" instrument_node="">The golden euonymus </span><strong data-dcnode-id="356"><span data-dcnode-id="357" instrument_node="">should be pruned in spring, just after flowering</span></strong><span data-dcnode-id="355" instrument_node="">. This is the right time for both maintenance pruning, or pruning to shape. It is also a good time if you need to perform hard pruning. Never do an early pruning in winter, since you will be losing all or much of the floral production.</span></p><h3 class="has-text-align-center" data-dcnode-id="350"><span class="ez-toc-section" data-dcnode-id="353" id="32_Pruning_Euonymus_alatus"></span><span data-dcnode-id="352" instrument_node="">3.2 Pruning Euonymus alatus</span><span class="ez-toc-section-end" data-dcnode-id="351"></span></h3><p data-dcnode-id="348"><span data-dcnode-id="349" instrument_node="">This is a deciduous shrub whose size can reach up to three meters high. Its completely smooth and gray-colored bark with its young green branches give a touch of beauty to any garden.</span></p><p data-dcnode-id="343"><span data-dcnode-id="347" instrument_node="">This shrub due to its deciduous characteristics </span><strong data-dcnode-id="345"><span data-dcnode-id="346" instrument_node="">can be renewed with hard prunings</span></strong><span data-dcnode-id="344" instrument_node=""> quite regularly. They must be carried out at the end of spring. You can also perform maintenance prunings, lighter, in the last days of winter.</span></p><h3 class="has-text-align-center" data-dcnode-id="339"><span class="ez-toc-section" data-dcnode-id="342" id="33_How_to_prune_Euonymus_japonicus"></span><span data-dcnode-id="341" instrument_node=""> 3.3 How to prune Euonymus japonicus </span><span class="ez-toc-section-end" data-dcnode-id="340"></span></h3><p data-dcnode-id="337"><span data-dcnode-id="338" instrument_node="">It is an evergreen shrub that can reach 3 or 4 meters high. Its leaves are bright green with yellow or white stripes. They produce red fruits that give Euonymus japonicus a distinctive touch. In general, they are widely used to grow in large pots or planted in isolation in the garden.</span></p><p data-dcnode-id="332"><span data-dcnode-id="336" instrument_node="">As I mentioned with the pruning of the golden Euonymus in this case, you should also wait to perform the p</span><strong data-dcnode-id="334"><span data-dcnode-id="335" instrument_node="">runing once the flowering is finished</span></strong><span data-dcnode-id="333" instrument_node="">. This for light and hard pruning.</span></p><h3 class="has-text-align-center" data-dcnode-id="328"><span class="ez-toc-section" data-dcnode-id="331" id="34_How_to_prune_Euonymus_fortunei"></span><span data-dcnode-id="330" instrument_node=""> 3.4 How to prune Euonymus fortunei </span><span class="ez-toc-section-end" data-dcnode-id="329"></span></h3><p data-dcnode-id="326"><span data-dcnode-id="327" instrument_node="">Finally, Euonymus fortunei is an evergreen shrub that stretches across the ground when it adopts a creeping habit or can also climb ivy-shaped walls through aerial roots. In general it has a fairly low size (1 meter high) with beautiful green leaves with cream-colored edges.</span></p><p data-dcnode-id="321"><span data-dcnode-id="325" instrument_node="">It admits to prune perfectly and lends itself to give them varied forms. The right time to prune is between April or May. </span><strong data-dcnode-id="323"><span data-dcnode-id="324" instrument_node="">To know which branch to cut</span></strong><span data-dcnode-id="322" instrument_node=""> and which not to cut, we suggest that you take a look at the color of the foliage every year or so to identify any which has lost its variegated markings. Prune the affected foliage away to retain the variegated areas.</span></p><h2 class="has-text-align-center" data-dcnode-id="317"><span class="ez-toc-section" data-dcnode-id="320" id="4_When_to_prune_Euonymus"></span><span data-dcnode-id="319" instrument_node="">4. When to prune Euonymus</span><span class="ez-toc-section-end" data-dcnode-id="318"></span></h2><div class="afw afw-ga afw_ad afwadid-1053" data-ad-id="1053" data-dcnode-id="305" style="text-align:center; margin-top:px; margin-bottom:px; margin-left:px; margin-right:px;float:none;"><div data-dcnode-id="315" style="font-size:10px;text-align:center;color:#cccccc;"><span data-dcnode-id="316" instrument_node="">Advertisement</span></div><span data-dcnode-id="314" instrument_node=""> </span><span data-dcnode-id="311" instrument_node=""> </span><ins class="adsbygoogle" data-ad-client="ca-pub-5752760918132157" data-ad-format="auto" data-ad-slot="4866753061" data-dcnode-id="309" data-full-width-responsive="true" style="background:none;display:inline-block;max-width:800px;width:100%;height:200px;max-height:200px;"><span data-dcnode-id="310" instrument_node=""> </span></ins><span data-dcnode-id="308" instrument_node=""> </span></div><p data-dcnode-id="300"><span data-dcnode-id="304" instrument_node="">There are </span><strong data-dcnode-id="302"><span data-dcnode-id="303" instrument_node="">many factors that affect the appropriate moment</span></strong><span data-dcnode-id="301" instrument_node=""> in which the pruning of the Euonymus should be carried out, among the most important is the variety, the type of pruning and the climate.</span></p><p data-dcnode-id="298"><span data-dcnode-id="299" instrument_node="">If you have been careful to read the previous sections, we have made it clear for each case what is the best time to prune.</span></p><p data-dcnode-id="293"><span data-dcnode-id="297" instrument_node="">Here I want to emphasize that in those varieties that bloom in wood of the previous year they should always be </span><strong data-dcnode-id="295"><span data-dcnode-id="296" instrument_node="">pruned once the flowering ends</span></strong><span data-dcnode-id="294" instrument_node="">. Otherwise, and as we have clarified above, I would be losing the flowering.</span></p><h2 class="has-text-align-center" data-dcnode-id="289"><span class="ez-toc-section" data-dcnode-id="292" id="5_How_to_prune_Euonymus_bush_video"></span><span data-dcnode-id="291" instrument_node="">5. How to prune Euonymus bush video</span><span class="ez-toc-section-end" data-dcnode-id="290"></span></h2><div class="afw afw-ga afw_ad afwadid-1053" data-ad-id="1053" data-dcnode-id="277" style="text-align:center; margin-top:px; margin-bottom:px; margin-left:px; margin-right:px;float:none;"><div data-dcnode-id="287" style="font-size:10px;text-align:center;color:#cccccc;"><span data-dcnode-id="288" instrument_node="">Advertisement</span></div><span data-dcnode-id="286" instrument_node=""> </span><span data-dcnode-id="283" instrument_node=""> </span><ins class="adsbygoogle" data-ad-client="ca-pub-5752760918132157" data-ad-format="auto" data-ad-slot="4866753061" data-dcnode-id="281" data-full-width-responsive="true" style="background:none;display:inline-block;max-width:800px;width:100%;height:200px;max-height:200px;"><span data-dcnode-id="282" instrument_node=""> </span></ins><span data-dcnode-id="280" instrument_node=""> </span></div><p data-dcnode-id="268"><span data-dcnode-id="276" instrument_node="">Finally, and as usual in this blog we leave a video (</span><a data-dcnode-id
