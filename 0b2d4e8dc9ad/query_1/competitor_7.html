ment_search" data-dcnode-id="2679" id="document_search" name="document_search" placeholder="Search document" type="text" value=""></div></label></div></div></div><div class="wrapper__doc_page_webpack_doc_page_shared_tooltips_tooltip tooltip_component" data-dcnode-id="2670"><button aria-label="Fullscreen" class="wrapper__text_button fullscreen_button" data-dcnode-id="2671" data-e2e="text-button" type="button"><span class="font_icon_container" data-dcnode-id="2672"><span aria-hidden="true" class="icon icon-ic_fullscreen_window" data-dcnode-id="2673"></span></span></button></div></div></div><div class="document_container is_bot blurred_page" data-dcnode-id="2339"><h1 data-dcnode-id="2666"><span data-dcnode-id="2667" instrument_node="">Important Terms in Forestry</span></h1><p data-dcnode-id="2665"></p><h2 data-dcnode-id="2663"><span data-dcnode-id="2664" instrument_node="">Some important terms in forestry</span></h2><br data-dcnode-id="2662"><span data-dcnode-id="2661" instrument_node="">1. Tending: Operations carried out for the benefit of a</span><br data-dcnode-id="2660"><span data-dcnode-id="2659" instrument_node="">   forest crop at any stage of its life between the seedling</span><br data-dcnode-id="2658"><span data-dcnode-id="2657" instrument_node="">   and the mature stages</span><br data-dcnode-id="2656"><span data-dcnode-id="2655" instrument_node="">2. Tending includes weeding, cleaning, thinning, pruning,</span><br data-dcnode-id="2654"><span data-dcnode-id="2653" instrument_node="">   climber cutting and girdling</span><br data-dcnode-id="2652"><span data-dcnode-id="2651" instrument_node="">3. Purpose of Tending is producing higher quality timber</span><br data-dcnode-id="2650"><span data-dcnode-id="2649" instrument_node="">   and thus maximising income</span><br data-dcnode-id="2648"><span data-dcnode-id="2647" instrument_node="">4. It has to be done several times from seedling to</span><br data-dcnode-id="2646"><span data-dcnode-id="2645" instrument_node="">   maturity stage, requires considerable staff and funds</span><br data-dcnode-id="2644"><span data-dcnode-id="2643" instrument_node="">fSome important terms in forestry (contd)</span><p data-dcnode-id="2642"></p><p data-dcnode-id="2641"></p><h2 data-dcnode-id="2639"><span data-dcnode-id="2640" instrument_node="">• Weeding: a tending operation done in the seedling stage in</span></h2><br data-dcnode-id="2638"><span data-dcnode-id="2637" instrument_node="">  nursery and in forest crop that involves removal or cutting of</span><br data-dcnode-id="2636"><span data-dcnode-id="2635" instrument_node="">  all weeds</span><br data-dcnode-id="2634"><span data-dcnode-id="2633" instrument_node="">• Objects of weeding is to reduce root competition for</span><br data-dcnode-id="2632"><span data-dcnode-id="2631" instrument_node="">  nutrients, moisture, to provide sufficient growing space for</span><br data-dcnode-id="2630"><span data-dcnode-id="2629" instrument_node="">  the desired species and to reduce transpiration water loss. It</span><br data-dcnode-id="2628"><span data-dcnode-id="2627" instrument_node="">  must be carried out for at least 3years from planting and</span><br data-dcnode-id="2626"><span data-dcnode-id="2625" instrument_node="">  should be done before suppression of seedlings by weeds</span><br data-dcnode-id="2624"><span data-dcnode-id="2623" instrument_node="">• Weeding is done in nursery and young plantations</span><br data-dcnode-id="2622"><span data-dcnode-id="2621" instrument_node="">fWeeds are controlled by:</span><br data-dcnode-id="2620"><span data-dcnode-id="2619" instrument_node="">• Mechanical methods</span><br data-dcnode-id="2618"><span data-dcnode-id="2617" instrument_node="">• Biological methods</span><br data-dcnode-id="2616"><span data-dcnode-id="2615" instrument_node="">• Chemical methods</span><br data-dcnode-id="2614"><span data-dcnode-id="2613" instrument_node="">fMechanical methods</span><br data-dcnode-id="2612"><span data-dcnode-id="2611" instrument_node="">• In nurseries, we use instrument like khurpas</span><br data-dcnode-id="2610"><span data-dcnode-id="2609" instrument_node="">• Generally uprooting is done and not cutting of weeds in nursery,</span><br data-dcnode-id="2608"><span data-dcnode-id="2607" instrument_node="">  otherwise they will sprout again</span><br data-dcnode-id="2606"><span data-dcnode-id="2605" instrument_node="">• In field plantation, like teak and eucalyptus, clearing of about 0.6-1.0</span><br data-dcnode-id="2604"><span data-dcnode-id="2603" instrument_node="">  m wide strip is carried out.</span><br data-dcnode-id="2602"><span data-dcnode-id="2601" instrument_node="">• Weeding around the pit is also carried out in some species in many</span><br data-dcnode-id="2600"><span data-dcnode-id="2599" instrument_node="">  areas</span><br data-dcnode-id="2598"><span data-dcnode-id="2597" instrument_node="">fWeeding (line clearing)</span><br data-dcnode-id="2596"><span data-dcnode-id="2595" instrument_node="">fBiological methods</span><br data-dcnode-id="2594"><span data-dcnode-id="2593" instrument_node="">• Use of suitable cover crops, use of insect pests feeding on weed, use</span><br data-dcnode-id="2592"><span data-dcnode-id="2591" instrument_node="">  of suitable degree of fire and grazing</span><br data-dcnode-id="2590"><span data-dcnode-id="2589" instrument_node="">• In Karnataka, Amaranthus spp. and tulsi have been found suitable</span><br data-dcnode-id="2588"><span data-dcnode-id="2587" instrument_node="">  cover crop in moist deciduous forests of teak</span><br data-dcnode-id="2586"><span data-dcnode-id="2585" instrument_node="">• Tall planting has been reported to be successful in heavy weed</span><br data-dcnode-id="2584"><span data-dcnode-id="2583" instrument_node="">  growth areas</span><br data-dcnode-id="2582"><span data-dcnode-id="2581" instrument_node="">• Opuntia spp has been successfully controlled by cockineal insect in</span><br data-dcnode-id="2580"><span data-dcnode-id="2579" instrument_node="">  thorn forests of south India</span><br data-dcnode-id="2578"><span data-dcnode-id="2577" instrument_node="">• Lantana bug (Orthezia insignis) has been used in controlling weed</span><br data-dcnode-id="2576"><span data-dcnode-id="2575" instrument_node="">  Lantana camara. Still in experimenting stage</span><br data-dcnode-id="2574"><span data-dcnode-id="2573" instrument_node="">fChemical methods</span><br data-dcnode-id="2572"><span data-dcnode-id="2571" instrument_node="">• We use weedicides or herbicides for controlling weeds</span><br data-dcnode-id="2570"><span data-dcnode-id="2569" instrument_node="">• Better use bio weedicides</span><br data-dcnode-id="2568"><span data-dcnode-id="2567" instrument_node="">• Chemicals like 2,4 dichloro phenoxyacetic acid (2,4-D); 2,4,5- trichloro</span><br data-dcnode-id="2566"><span data-dcnode-id="2565" instrument_node="">phenoxyacetic acid (2,4,5-T), ethyl esters etc.</span><br data-dcnode-id="2564"><span data-dcnode-id="2563" instrument_node="">These herbicides are usually applied on foliage of plant</span><br data-dcnode-id="2562"><span data-dcnode-id="2561" instrument_node="">Cost is very high, hence not become popular in India</span><br data-dcnode-id="2560"><span data-dcnode-id="2559" instrument_node="">fSome important terms in forestry (contd)</span><p data-dcnode-id="2558"></p><p data-dcnode-id="2557"></p><h2 data-dcnode-id="2555"><span data-dcnode-id="2556" instrument_node="">• Cleaning: A tending operation done in a sapling crop</span></h2><br data-dcnode-id="2554"><span data-dcnode-id="2553" instrument_node="">  which involves removal of inferior growth. Carried out</span><br data-dcnode-id="2552"><span data-dcnode-id="2551" instrument_node="">  when the inferior crop interfere with the main crop</span><br data-dcnode-id="2550"><span data-dcnode-id="2549" instrument_node="">• Objects include to improve light conditions, to reduce</span><br data-dcnode-id="2548"><span data-dcnode-id="2547" instrument_node="">  root competition. Involves cutting of shrubs and</span><br data-dcnode-id="2546"><span data-dcnode-id="2545" instrument_node="">  herbaceous growth, climber cutting, cutting back of</span><br data-dcnode-id="2544"><span data-dcnode-id="2543" instrument_node="">  malformed or diseased individuals of desired species,</span><br data-dcnode-id="2542"><span data-dcnode-id="2541" instrument_node="">  singling of coppice shoots of favoured species</span><br data-dcnode-id="2540"><span data-dcnode-id="2539" instrument_node="">fCleaning – contd.</span><br data-dcnode-id="2538"><span data-dcnode-id="2537" instrument_node="">• In Sal forest, repeated cuttings of Mallotus philippensis, Clerodendron</span><br data-dcnode-id="2536"><span data-dcnode-id="2535" instrument_node="">  viscosum, Milletia spp are necessary</span><br data-dcnode-id="2534"><span data-dcnode-id="2533" instrument_node="">• In Coniferous forests like Deodar and Kail, woody shrubs like</span><br data-dcnode-id="2532"><span data-dcnode-id="2531" instrument_node="">  Indigoifera, Desmodium, Rubus etc are removed in cleaning</span><br data-dcnode-id="2530"><span data-dcnode-id="2529" instrument_node="">• In wet evergreen forests, spp like Callicarpa, Macaranga,</span><br data-dcnode-id="2528"><span data-dcnode-id="2527" instrument_node="">  Strobilanthes etc. interfere with regeneration of important species</span><br data-dcnode-id="2526"><span data-dcnode-id="2525" instrument_node="">  like Dipterocarpus, Vateria, Hopea and t/fore in cleaning these</span><br data-dcnode-id="2524"><span data-dcnode-id="2523" instrument_node="">  infereior spp are removed.</span><br data-dcnode-id="2522"><span data-dcnode-id="2521" instrument_node="">• In teak forests, competing Lantana camara is removed.</span><br data-dcnode-id="2520"><span data-dcnode-id="2519" instrument_node="">fCleaning</span><br data-dcnode-id="2518"><span data-dcnode-id="2517" instrument_node="">fSome important terms in forestry (contd)</span><br data-dcnode-id="2516"><span data-dcnode-id="2515" instrument_node="">• Thinning: A felling done in an immature stand for the</span><br data-dcnode-id="2514"><span data-dcnode-id="2513" instrument_node="">  purpose of improving growth and form of trees</span><br data-dcnode-id="2512"><span data-dcnode-id="2511" instrument_node="">• Thinning cycle refers to the planned interval which</span><br data-dcnode-id="2510"><span data-dcnode-id="2509" instrument_node="">  elapses between successive thinning in the same area</span><br data-dcnode-id="2508"><span data-dcnode-id="2507" instrument_node="">• Objects include to increase the net yield from a unit area,</span><br data-dcnode-id="2506"><span data-dcnode-id="2505" instrument_node="">  to obtain a timber of desired quality and strength, to</span><br data-dcnode-id="2504"><span data-dcnode-id="2503" instrument_node="">  maintain hygienic conditions in stand by removing</span><br data-dcnode-id="2502"><span data-dcnode-id="2501" instrument_node="">  diseased trees, to ensure decomposition of raw humus in</span><br data-dcnode-id="2500"><span data-dcnode-id="2499" instrument_node="">  temperate forests by increasing light and temperature on</span><br data-dcnode-id="2498"><span data-dcnode-id="2497" instrument_node="">  forest floor</span><br data-dcnode-id="2496"><span data-dcnode-id="2495" instrument_node="">fSome important terms in forestry (contd)</span><br data-dcnode-id="2494"><span data-dcnode-id="2493" instrument_node="">• Example of thinning: In Teak plantation, initial spacing is 1.8 m</span><br data-dcnode-id="2492"><span data-dcnode-id="2491" instrument_node="">  x 1.8 m. First mechanical thinning is done when Teak attains</span><br data-dcnode-id="2490"><span data-dcnode-id="2489" instrument_node="">  height of 7.5 m to 9 m. In this alternate plants are removed</span><br data-dcnode-id="2488"><span data-dcnode-id="2487" instrument_node="">  and total plant population is reduced by 50 % of original. After</span><br data-dcnode-id="2486"><span data-dcnode-id="2485" instrument_node="">  5years, again alternate plants are removed and population</span><br data-dcnode-id="2484"><span data-dcnode-id="2483" instrument_node="">  again reduced by 50 % and more space becomes available for</span><br data-dcnode-id="2482"><span data-dcnode-id="2481" instrument_node="">  Teak plants crown to spread and bole to develop.</span><br data-dcnode-id="2480"><span data-dcnode-id="2479" instrument_node="">• Types of thinning:</span><br data-dcnode-id="2478"><span data-dcnode-id="2477" instrument_node="">• Mechanical thinning (alternate diagonal lines are removed)</span><br data-dcnode-id="2476"><span data-dcnode-id="2475" instrument_node="">• Ordinary thinning (also called German thinning or thinning</span><br data-dcnode-id="2474"><span data-dcnode-id="2473" instrument_node="">  from the below)</span><br data-dcnode-id="2472"><span data-dcnode-id="2471" instrument_node="">• Crown thinning (also called French thinning or thinning from</span><br data-dcnode-id="2470"><span data-dcnode-id="2469" instrument_node="">  the above)</span><br data-dcnode-id="2468"><span data-dcnode-id="2467" instrument_node="">• Advance thinning (here thinning is carried out before the</span><br data-dcnode-id="2466"><span data-dcnode-id="2465" instrument_node="">  competition among individual trees has set in)</span><br data-dcnode-id="2464"><span data-dcnode-id="2463" instrument_node="">fGerman thinning or thinning from the below</span><br data-dcnode-id="2462"><span data-dcnode-id="2461" instrument_node="">fCrown thinning or French thinning or thinning</span><br data-dcnode-id="2460"><span data-dcnode-id="2459" instrument_node="">                from above</span><br data-dcnode-id="2458"><span data-dcnode-id="2457" instrument_node="">fSome important terms in forestry (contd)</span><br data-dcnode-id="2456"><span data-dcnode-id="2455" instrument_node="">• Girdling: Cutting through bark and other living layers of</span><br data-dcnode-id="2454"><span data-dcnode-id="2453" instrument_node="">  wood just below bark, in a continuous incision all around</span><br data-dcnode-id="2452"><span data-dcnode-id="2451" instrument_node="">  the pole or stem of a tree</span><br data-dcnode-id="2450"><span data-dcnode-id="2449" instrument_node="">• This is an economical method of killing inferior trees in a</span><br data-dcnode-id="2448"><span data-dcnode-id="2447" instrument_node="">  forest.</span><br data-dcnode-id="2446"><span data-dcnode-id="2445" instrument_node="">• Girdling of stem restricts flow of photosynthates from</span><br data-dcnode-id="2444"><span data-dcnode-id="2443" instrument_node="">  leaves to roots.</span><br data-dcnode-id="2442"><span data-dcnode-id="2441" instrument_node="">• Thus girdling causes death of roots by starvation</span><br data-dcnode-id="2440"><span data-dcnode-id="2439" instrument_node="">• Girdling enhances more fire hazard inside the forests</span><br data-dcnode-id="2438"><span data-dcnode-id="2437" instrument_node="">fGirdling</span><br data-dcnode-id="2436"><span data-dcnode-id="2435" instrument_node="">fXylem and phloem</span><br data-dcnode-id="2434"><span data-dcnode-id="2433" instrument_node="">fSome important terms in forestry (contd)</span><p data-dcnode-id="2432"></p><p data-dcnode-id="2431"></p><h2 data-dcnode-id="2429"><span data-dcnode-id="2430" instrument_node="">• Pruning: Removal of live or dead branches from the stem</span></h2><br data-dcnode-id="2428"><span data-dcnode-id="2427" instrument_node="">  of a standing tree mainly for the improvement of timber</span><br data-dcnode-id="2426"><span data-dcnode-id="2425" instrument_node="">  or to obtain tree with clean bole</span><br data-dcnode-id="2424"><span data-dcnode-id="2423" instrument_node="">• It may be dry pruning (removing dead branches) or green</span><br data-dcnode-id="2422"><span data-dcnode-id="2421" instrument_node="">  pruning (removing green branches)</span><br data-dcnode-id="2420"><span data-dcnode-id="2419" instrument_node="">• These are also called Natural pruning/Self pruning OR</span><br data-dcnode-id="2418"><span data-dcnode-id="2417" instrument_node="">  Artificial punning</span><br data-dcnode-id="2416"><span data-dcnode-id="2415" instrument_node="">• Natural/Self pruning is done by natural agencies like</span><br data-dcnode-id="2414"><span data-dcnode-id="2413" instrument_node="">  wind, snow, hailstorm etc.</span><br data-dcnode-id="2412"><span data-dcnode-id="2411" instrument_node="">fPruning</span><br data-dcnode-id="2410"><span data-dcnode-id="2409" instrument_node="">fSome important terms in forestry (contd)</span><br data-dcnode-id="2408"><span data-dcnode-id="2407" instrument_node="">• Climber cutting or control: Climbers are usually cut</span><br data-dcnode-id="2406"><span data-dcnode-id="2405" instrument_node="">  regularly.</span><br data-dcnode-id="2404"><span data-dcnode-id="2403" instrument_node="">• Thin climbers needs complete uprooting</span><br data-dcnode-id="2402"><span data-dcnode-id="2401" instrument_node="">• Thick climbers may be cut at base and one metre above</span><br data-dcnode-id="2400"><span data-dcnode-id="2399" instrument_node="">• Then climbers are removed and burned</span><br data-dcnode-id="2398"><span data-dcnode-id="2397" instrument_node="">• Climbers are particularly harmful when trees are young</span><br data-dcnode-id="2396"><span data-dcnode-id="2395" instrument_node="">• In older trees, they constrict the stem and deteriorate the</span><br data-dcnode-id="2394"><span data-dcnode-id="2393" instrument_node="">  value of wood e.g. Bauhinia vahlii, Butea superba, B.</span><br data-dcnode-id="2392"><span data-dcnode-id="2391" instrument_node="">  parviflora, Vitis spp, Millettia auriculata, Smilex spp,</span><br data-dcnode-id="2390"><span data-dcnode-id="2389" instrument_node="">  Combretum decundrum etc. are important climbers in</span><br data-dcnode-id="2388"><span data-dcnode-id="2387" instrument_node="">  moist deciduous forests.</span><br data-dcnode-id="2386"><span data-dcnode-id="2385" instrument_node="">fClimber cutting</span><br data-dcnode-id="2384"><span data-dcnode-id="2383" instrument_node="">ffSome important terms in forestry (contd)</span><br data-dcnode-id="2382"><span data-dcnode-id="2381" instrument_node="">• Cultural operations: Carried out after felling in a forest</span><br data-dcnode-id="2380"><span data-dcnode-id="2379" instrument_node="">  area</span><br data-dcnode-id="2378"><span data-dcnode-id="2377" instrument_node="">• It include controlled burning of area</span><br data-dcnode-id="2376"><span data-dcnode-id="2375" instrument_node="">• Main aim is to assist natural regeneration and to</span><br data-dcnode-id="2374"><span data-dcnode-id="2373" instrument_node="">  decrease felling damage</span><br data-dcnode-id="2372"><span data-dcnode-id="2371" instrument_node="">• Main difference between Tending and Cultural</span><br data-dcnode-id="2370"><span data-dcnode-id="2369" instrument_node="">  operations:</span><br data-dcnode-id="2368"><span data-dcnode-id="2367" instrument_node="">• Main object of Tending is to produce better quality of</span><br data-dcnode-id="2366"><span data-dcnode-id="2365" instrument_node="">  timber whereas in Cultural operations main object is</span><br data-dcnode-id="2364"><span data-dcnode-id="2363" instrument_node="">  assisting natural regeneration</span><br data-dcnode-id="2362"><span data-dcnode-id="2361" instrument_node="">• Tending operations continue throughout life of plants in a</span><br data-dcnode-id="2360"><span data-dcnode-id="2359" instrument_node="">  forest whereas Cultural operations are done only after</span><br data-dcnode-id="2358"><span data-dcnode-id="2357" instrument_node="">  fellings</span><br data-dcnode-id="2356"><span data-dcnode-id="2355" instrument_node="">fSome important terms in forestry (contd)</span><p data-dcnode-id="2354"></p><p data-dcnode-id="2353"></p><h2 data-dcnode-id="2351"><span data-dcnode-id="2352" instrument_node="">• Afforestation: Establishment of forest by artificial means</span></h2><br data-dcnode-id="2350"><span data-dcnode-id="2349" instrument_node="">  on an area from which forest vegetation has always or</span><br data-dcnode-id="2348"><span data-dcnode-id="2347" instrument_node="">  long been absent.</span><br data-dcnode-id="2346"><span data-dcnode-id="2345" instrument_node="">• In order to attain the 33% national forest cover,</span><br data-dcnode-id="2344"><span data-dcnode-id="2343" instrument_node="">  afforestation is inevitable one</span><br data-dcnode-id="2342"><span data-dcnode-id="2341" instrument_node="">fThanks</span><p data-dcnode-id="2340"></p></div><div class="after_doc_wrapper is_bot" data-dcnode-id="2319"><div class="wrapper__doc_page_shared_related_categories related_categories_wrapper" data-dcnode-id="2320"><h2 class="title" data-dcnode-id="2337"><span data-dcnode-id="2338" instrument_node="">Related Interests</span></h2><ul class="links_container flex_row" data-dcnode-id="2321"><li class="link_wrapper" data-dcnode-id="2334"><a class="interest_link link" data-category_id="43364" data-dcnode-id="2335" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.scribd.com/interest/Pruning/explore"><span data-dcnode-id="2336" instrument_node="">Pruning</span></a></li><li class="link_wrapper" data-dcnode-id="2331"><a class="interest_link link" data-category_id="28584" data-dcnode-id="2332" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.scribd.com/interest/Forestry/explore"><span data-dcnode-id="2333" instrument_node="">Forestry</span></a></li><li class="link_wrapper" data-dcnode-id="2328"><a class="interest_link link" data-category_id="33014" data-dcnode-id="2329" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.scribd.com/interest/Trees/explore"><span dat
