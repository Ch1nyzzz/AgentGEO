</span><h1 data-dcnode-id="2349"><span data-dcnode-id="2350" instrument_node="">Pruning Apple Trees - When and How to Prune</span></h1><span data-dcnode-id="2348" instrument_node="">
</span><span data-dcnode-id="2345" instrument_node="">
</span><section class="" data-dcnode-id="2326" data-spy="Pruning Apple Trees" data-target="Pruning Apple Trees" id="Pruning Apple Trees" style="padding-top: 10px"><div class="card" data-dcnode-id="2327"><div class="card-header" data-dcnode-id="2342"><h2 data-dcnode-id="2343"><span data-dcnode-id="2344" instrument_node="">Pruning Apple Trees</span></h2></div><div class="articleBody" data-dcnode-id="2328"><p data-dcnode-id="2341"></p><span data-dcnode-id="2340" instrument_node="">
</span><p data-dcnode-id="2338"><span data-dcnode-id="2339" instrument_node="">Regular pruning of apple trees is necessary to promote more fruit 
		bearing growths, and therefore more fruit. There are 2 pruning seasons for apples, being summer and winter. </span></p><span data-dcnode-id="2337" instrument_node="">
</span><p data-dcnode-id="2335"><span data-dcnode-id="2336" instrument_node="">Summer and winter pruning of apple trees both have different results on the nature of the apple tree's future growth - especially in the first season after pruning.</span></p><span data-dcnode-id="2334" instrument_node="">
</span><p data-dcnode-id="2332"><span data-dcnode-id="2333" instrument_node="">Training and pruning an apple tree from its first year of planting is desirable and if carried out properly, will have long term advantages over neglected apple trees. Training pruning should take place in the first year to ensure the start of a good framework of tree which will be easy to maintain, relatively disease free, and ultimately - crop well.</span></p><span data-dcnode-id="2331" instrument_node="">
</span><p data-dcnode-id="2329"><span data-dcnode-id="2330" instrument_node="">Avoid the temptation to leave all the growth on the tree to try and get the biggest tree in the shortest time. It does not work like that. </span></p></div></div></section><span data-dcnode-id="2325" instrument_node="">

</span><section class="" data-dcnode-id="2253" data-spy="Advice and information about pruning apple trees" data-target="Advice and information about pruning apple trees" id="Advice and information about pruning apple trees" style="padding-top: 20px"><div class="card" data-dcnode-id="2254"><div class="card-header" data-dcnode-id="2269"><h2 data-dcnode-id="2270"><span data-dcnode-id="2271" instrument_node="">Advice and information about pruning apple trees.</span></h2></div><div class="articleBody" data-dcnode-id="2255"><p data-dcnode-id="2268"></p><span data-dcnode-id="2267" instrument_node="">
</span><div data-dcnode-id="2264" style="float:left"><div data-dcnode-id="2265" style="padding: 10px"><img alt="The pruning loppers are taken to the overgrown Apple Tree" border="0" class="img-left" data-dcnode-id="2266" data-src="images/iStock_000001223285XSmall.webp" height="207" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//gardenseeker.co.uk/pruning/images/iStock_000001223285XSmall.webp&amp;raw" width="250"></div></div><p data-dcnode-id="2262"><span data-dcnode-id="2263" instrument_node="">For a start, the 'top' that you buy has either been field-grown - and therefore had its roots damaged upon lifting for sale. Or, it will have been container grown with a substantial feeding regime to get the young tree saleable. </span></p><span data-dcnode-id="2261" instrument_node="">
</span><p data-dcnode-id="2259"><span data-dcnode-id="2260" instrument_node="">The first thing a newly planted apple tree will do - or should be 
		persuaded to do - is to produce a good root system, after firstly 
		getting settled into its new home.</span></p><span data-dcnode-id="2258" instrument_node="">
</span><p data-dcnode-id="2256"><span data-dcnode-id="2257" instrument_node="">Timing of pruning apple trees is quite important. If the summer pruning is done to early, then developing fruit buds can start into growth when they should be dormant. These buds will not develop fully, and therefore be lost for the following year. Late August is a good time for any summer pruning, and certainly no earlier than the beginning of August.</span></p></div></div></section><span data-dcnode-id="2252" instrument_node="">
</span><section class="" data-dcnode-id="2242" data-spy="How to Prune Apple Trees in the Summer" data-target="How to Prune Apple Trees in the Summer" id="How to Prune Apple Trees in the Summer" style="padding-top: 20px"><div class="card" data-dcnode-id="2243"><div class="card-header" data-dcnode-id="2249"><h2 data-dcnode-id="2250"><span data-dcnode-id="2251" instrument_node="">How to Prune Apple Trees in the Summer</span></h2></div><div class="articleBody" data-dcnode-id="2244"><p data-dcnode-id="2248"></p><span data-dcnode-id="2247" instrument_node="">
</span><p data-dcnode-id="2245"><span data-dcnode-id="2246" instrument_node="">The summer pruning. Simply prune the current season's growth back 6 or 7 buds from the main stem. This will encourage more fruiting spur growths to form and also transfer more of the tree's energies into building up the current fruit crop. See below for more details...</span></p></div></div></section><span data-dcnode-id="2241" instrument_node="">
</span><section class="" data-dcnode-id="2224" data-spy="How to Prune Apple Trees in the Winter" data-target="How to Prune Apple Trees in the Winter" id="How to Prune Apple Trees in the Winter" style="padding-top: 20px"><div class="card" data-dcnode-id="2225"><div class="card-header" data-dcnode-id="2238"><h2 data-dcnode-id="2239"><span data-dcnode-id="2240" instrument_node="">How to Prune Apple Trees in the Winter</span></h2></div><div class="articleBody" data-dcnode-id="2226"><p data-dcnode-id="2237"></p><span data-dcnode-id="2236" instrument_node="">
</span><p data-dcnode-id="2234"><span data-dcnode-id="2235" instrument_node="">In the winter, simply prune out any overcrowded fruit spurs, remove any diseased branches and also prune out any 'crossing' branches. Aim also to open up the centre of the tree in stages. Do NOT over prune in winter - as explained below.</span></p><span data-dcnode-id="2233" instrument_node="">
</span><p data-dcnode-id="2231"><span data-dcnode-id="2232" instrument_node="">With apple trees, remember when 'shaping' your tree, that horizontal branches bear more fruit that vertical branches.</span></p><span data-dcnode-id="2230" instrument_node=""> </span><p data-dcnode-id="2228"><span data-dcnode-id="2229" instrument_node="">Old, neglected trees are best, treated by pruning over 3 or 4 years. Otherwise there will be excessive growth if you prune too hard. The more you cut, the more it will grow!</span></p><span data-dcnode-id="2227" instrument_node="">
</span></div></div></section><hr data-dcnode-id="2223"><div align="center" data-dcnode-id="2215"><span data-dcnode-id="2222" instrument_node="">
</span><span data-dcnode-id="2220" instrument_node="">
</span><ins class="adsbygoogle" data-ad-client="ca-pub-1210860864729907" data-ad-format="auto" data-ad-slot="4945576908" data-dcnode-id="2219" data-full-width-responsive="true" style="display:block"></ins><span data-dcnode-id="2218" instrument_node="">
</span></div><hr data-dcnode-id="2214"><h1 data-dcnode-id="2212"><span data-dcnode-id="2213" instrument_node="">Winter Pruning vs. Summer Pruning of Apple Trees</span></h1><span data-dcnode-id="2211" instrument_node="">
</span><section class="" data-dcnode-id="2188" data-spy="Pruning Apple Trees in the Winter" data-target="Pruning Apple Trees in the Winter" id="Pruning Apple Trees in the Winter" style="padding-top: 20px"><div class="card" data-dcnode-id="2189"><div class="card-header" data-dcnode-id="2208"><h2 data-dcnode-id="2209"><span data-dcnode-id="2210" instrument_node="">Pruning Apple Trees in the Winter</span></h2></div><div class="articleBody" data-dcnode-id="2190"><p data-dcnode-id="2207"></p><span data-dcnode-id="2206" instrument_node=""> </span><p data-dcnode-id="2204"><span data-dcnode-id="2205" instrument_node="">There is a basic difference in the results of winter pruning and summer pruning of apple trees. In autumn, the apple tree draws down its energy supply from the smaller branches after leaf fall, and stores it in the main trunk and root system. It is important to appreciate the significance of this, for it has implications for the re-growth of new branches, growths in the spring if winter pruning of apple trees takes place.</span></p><span data-dcnode-id="2203" instrument_node="">
</span><p data-dcnode-id="2199"><span data-dcnode-id="2202" instrument_node="">
</span><b data-dcnode-id="2200"><span data-dcnode-id="2201" instrument_node="">Not too Much</span></b></p><span data-dcnode-id="2198" instrument_node="">
</span><p data-dcnode-id="2196"><span data-dcnode-id="2197" instrument_node="">If you cut out large portions of the tree in the winter months, you will in effect not be affecting the apple tree's potential for growth the following year - the energy is stored away from your pruning cuts, in the main trunk and larger branches.</span></p><span data-dcnode-id="2195" instrument_node="">
</span><p data-dcnode-id="2193"><span data-dcnode-id="2194" instrument_node="">The following spring, the apple trees energy supply - which is geared to what the tree size was before you pruned - surges into spring growing mode. There is enough energy in the trunk and root system to support what was there when it went into dormancy in the autumn. The fact that a large proportion of its growth might have been removed in the winter, means that there is excess energy available, and this will materialise in new vigorous growths in the early spring season - usually at the expense of flower and fruit! </span></p><p data-dcnode-id="2191"><span data-dcnode-id="2192" instrument_node="">Any pruning in the winter season, should therefore be carried out as late as possible before bud break in order to avert this vigorous flush of unwanted growth. Most of these growths will be tall upright shoot, sprouting out from main branches. These are known as water shoots and have no use for fruiting, though one or two of them can be retained for future training if required. Hard pruning in the winter months will result in much excess growth - taking away much of the energy required for flower and fruit production.</span></p></div></div></section><section class="" data-dcnode-id="2169" data-spy="Pruning Apple Trees in the Summer" data-target="Pruning Apple Trees in the Summer" id="Pruning Apple Trees in the Summer" style="padding-top: 20px"><div class="card" data-dcnode-id="2170"><div class="card-header" data-dcnode-id="2185"><h2 data-dcnode-id="2186"><span data-dcnode-id="2187" instrument_node="">Pruning Apple Trees in the Summer</span></h2></div><div class="articleBody" data-dcnode-id="2171"><p data-dcnode-id="2184"></p><span data-dcnode-id="2183" instrument_node=""> </span><p data-dcnode-id="2181"><span data-dcnode-id="2182" instrument_node="">Summer pruning of apple trees normally consists of removing water shoots or water sprouts - much of which can be discontinued if note is taken about excessive winter pruning of apple trees.</span></p><span data-dcnode-id="2180" instrument_node="">
</span><p data-dcnode-id="2178"><span data-dcnode-id="2179" instrument_node=""> As distinct from winter pruning, summer pruning of apple trees results in removing an energy source. The branches are now food or energy producers for the apple tree. Summer pruning should therefore be kept to a minimum, in order to ensure a plentiful supply of food for the tree and its prime purpose - producing fruit!</span></p><span data-dcnode-id="2177" instrument_node="">
</span><p data-dcnode-id="2175"><span data-dcnode-id="2176" instrument_node=""> Summer pruning should start when the new growths are a few inches long, and should be restricted to removing all of the water shoots, and simple thinning of the structure where absolutely necessary. Summer pruning of apple trees should be done in early August and be finished by end of August.</span></p><span data-dcnode-id="2174" instrument_node="">
</span><p data-dcnode-id="2172"><span data-dcnode-id="2173" instrument_node="">If Apple trees are pruned in July, there is a possibility of the dormant fruit buds breaking into growth. If this happens the cropping prospects for the following year are greatly reduced. August pruning has the effect of swelling the fruit and leaf buds without causing them to break into growth. </span></p></div></div></section><hr data-dcnode-id="2168"><div align="center" data-dcnode-id="2160"><span data-dcnode-id="2167" instrument_node="">
</span><span data-dcnode-id="2165" instrument_node="">
</span><ins class="adsbygoogle" data-ad-client="ca-pub-1210860864729907" data-ad-format="auto" data-ad-slot="4945576908" data-dcnode-id="2164" data-full-width-responsive="true" style="display:block"></ins><span data-dcnode-id="2163" instrument_node="">
</span></div><hr data-dcnode-id="2159"><span data-dcnode-id="2158" instrument_node="">
</span><section class="" data-dcnode-id="2101" data-spy="Pruning Cuts - Apple Trees" data-target="Pruning Cuts - Apple Trees" id="Pruning Cuts - Apple Trees" style="padding-top: 20px"><div class="card" data-dcnode-id="2102"><div class="card-header" data-dcnode-id="2155"><h2 data-dcnode-id="2156"><span data-dcnode-id="2157" instrument_node="">Pruning Cuts - Apple Trees</span></h2></div><div class="articleBody" data-dcnode-id="2103"><p data-dcnode-id="2154"></p><span data-dcnode-id="2153" instrument_node=""> </span><p data-dcnode-id="2148"><span data-dcnode-id="2152" instrument_node=""> </span><strong data-dcnode-id="2150"><span data-dcnode-id="2151" instrument_node="">Thinning Cuts</span></strong><span data-dcnode-id="2149" instrument_node="">. These are simple cuts to thin out the tree as required by taking out a full shoot - right back to another side shoot. They do not cause renewed vigour normally and can be done winter or summer.</span></p><span data-dcnode-id="2147" instrument_node="">
</span><p data-dcnode-id="2140"><span data-dcnode-id="2146" instrument_node=""> </span><b data-dcnode-id="2142"><strong data-dcnode-id="2144"><span data-dcnode-id="2145" instrument_node="">Heading back</span></strong><span data-dcnode-id="2143" instrument_node="">. </span></b><span data-dcnode-id="2141" instrument_node=""> This is normally just taking out the end (terminal section of a shoot - small branch) and induces new growths at the area of the cut. These new shoots can then be trained into new frameworks as required. </span></p><span data-dcnode-id="2139" instrument_node="">
</span><p data-dcnode-id="2137"><span data-dcnode-id="2138" instrument_node=""> All pruning cuts should be 'finished' as neatly as possible to allow for quick healing. Make your pruning cut as near to the old branch as possible - not leaving any stubs. There is no need to apply a pruning compound or paint to apple trees. They do not prevent the incidence of disease and do not assist in the healing of the cut.</span></p><span data-dcnode-id="2136" instrument_node="">
</span><p data-dcnode-id="2134"><span data-dcnode-id="2135" instrument_node=""> Pruning Apple trees has a twofold effect. </span></p><span data-dcnode-id="2133" instrument_node="">
</span><ul data-dcnode-id="2125"><span data-dcnode-id="2132" instrument_node="">
</span><li data-dcnode-id="2130"><span data-dcnode-id="2131" instrument_node="">
			It will retain the apple tree in a manageable size and shape.</span></li><span data-dcnode-id="2129" instrument_node="">
</span><li data-dcnode-id="2127"><span data-dcnode-id="2128" instrument_node="">
			If carried out as above, will increase fruit yields. </span></li><span data-dcnode-id="2126" instrument_node="">
</span></ul><span data-dcnode-id="2124" instrument_node="">
</span><p data-dcnode-id="2122"><span data-dcnode-id="2123" instrument_node="">Remember, that horizontal or near horizontal branches or shoots 
		produce the most fruit.</span></p><span data-dcnode-id="2121" instrument_node="">
</span><p data-dcnode-id="2119"><span data-dcnode-id="2120" instrument_node="">Branches can be arched over in a pleasing effect, simply by gradually anchoring new branches to the ground, or simply tying bricks or other weights to the ends of new shoot. The latter makes for a good conversation topic!</span></p><span data-dcnode-id="2118" instrument_node="">
</span><p data-dcnode-id="2116"><span data-dcnode-id="2117" instrument_node="">Pruning apple trees is simple. Just remember and put into effect the advice given above.</span></p><div align="center" data-dcnode-id="2111"><a data-dcnode-id="2112" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//gardenseeker.co.uk/pruning/pruning_shrubs-a-z.htm"><button class="button button1" data-dcnode-id="2113"><strong data-dcnode-id="2114"><span data-dcnode-id="2115" instrument_node="">Back to A-Z of Pruning Shrubs</span></strong></button></a></div><span data-dcnode-id="2110" instrument_node="">
</span><div align="center" data-dcnode-id="2105"><a data-dcnode-id="2106" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//gardenseeker.co.uk/fruit/apples/index.htm"><button class="button button1" data-dcnode-id="2107"><strong data-dcnode-id="2108"><span data-dcnode-id="2109" instrument_node="">Apple Trees main Pages</span></strong></button></a></div><span data-dcnode-id="2104" instrument_node="">
</span></div></div></section><span data-dcnode-id="2100" instrument_node="">
