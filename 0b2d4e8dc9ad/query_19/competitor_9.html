</span><p class="entry-meta" data-dcnode-id="1357"><span class="entry-categories" data-dcnode-id="1358"><a data-dcnode-id="1365" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//melissaknorris.com/category/raising-your-own-food/gardening/fruit/" rel="category tag"><span data-dcnode-id="1366" instrument_node="">Fruit</span></a><span data-dcnode-id="1364" instrument_node="">, </span><a data-dcnode-id="1362" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//melissaknorris.com/category/raising-your-own-food/gardening/" rel="category tag"><span data-dcnode-id="1363" instrument_node="">Gardening</span></a><span data-dcnode-id="1361" instrument_node="">, </span><a data-dcnode-id="1359" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//melissaknorris.com/category/raising-your-own-food/" rel="category tag"><span data-dcnode-id="1360" instrument_node="">Raising Your Own Food</span></a></span></p></div></div></div></header><div class="entry-content has-disclosure" data-dcnode-id="616"><section class="post-disclosure" data-dcnode-id="1351"><span data-dcnode-id="1352" instrument_node="">Some of the links below are affiliate links, which means I will earn a commission at no additional cost to you, if you click through and make a purchase. Regardless, I only link to products we use on our homestead or believe in.
</span></section><span data-dcnode-id="1350" data-image-pin-it="false" id="dpsp-post-content-markup"></span><span data-dcnode-id="1349" instrument_node="">
</span><p data-dcnode-id="1346"><span data-dcnode-id="1347" style="font-weight: 400;"><span data-dcnode-id="1348" instrument_node="">If you have apple trees, knowing how to prune apple trees correctly is critical to the health of your trees and the amount of harvest you'll receive. Learn how to prune apple trees in winter or if your climate is more suited to summer pruning.</span></span></p><span data-dcnode-id="1345" instrument_node="">
</span><div class="wp-block-image" data-dcnode-id="1340"><figure class="aligncenter" data-dcnode-id="1341"><img alt="" class="wp-image-18576 entered error" data-dcnode-id="1344" data-lazy-src="https://melissaknorris.com/wp-content/uploads/2020/02/how-to-prune-an-apple-tree-in-winter.jpg" data-ll-status="error" data-pin-nopin="true" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//melissaknorris.com/wp-content/uploads/2020/02/how-to-prune-an-apple-tree-in-winter.jpg&amp;raw"><noscript data-dcnode-id="1342"><span data-dcnode-id="1343" instrument_node="">&lt;img src="https://melissaknorris.com/wp-content/uploads/2020/02/how-to-prune-an-apple-tree-in-winter.jpg" alt="" class="wp-image-18576"/&gt;</span></noscript></figure></div><span data-dcnode-id="1339" instrument_node="">
</span><p data-dcnode-id="1336"><span data-dcnode-id="1337" style="font-weight: 400;"><span data-dcnode-id="1338" instrument_node="">Pruning is necessary for many reasons, it helps to reduce disease by removing diseased or dead branches and opens up the canopy for air circulation and fruit ripening. When done properly, pruning keeps your tree healthy and vigorous, when done wrong, you can actually cause quite a bit of harm. But don't fear, I'll walk you through every step.</span></span></p><span data-dcnode-id="1335" instrument_node="">
</span><h2 data-dcnode-id="1333" id="h-when-to-prune-apple-trees"><span data-dcnode-id="1334" instrument_node="">When to Prune Apple Trees</span></h2><span data-dcnode-id="1332" instrument_node="">
</span><p data-dcnode-id="1330"><span data-dcnode-id="1331" instrument_node="">Prune apple trees when they're dormant and you have at least 2 weeks of dry weather after making your pruning cut. Apple trees are pruned in later winter or early spring, before the tree begins bud break (when the leaf and fruit buds start to unfurl) in eastern areas of the United States.</span></p><span data-dcnode-id="1329" instrument_node="">
</span><div data-dcnode-id="1328" id="om-yuwh6neq2fkl3skvleys-holder"></div><span data-dcnode-id="1327" instrument_node="">
</span><span data-dcnode-id="1324" instrument_node="">
</span><p data-dcnode-id="1319"><span data-dcnode-id="1323" instrument_node="">However, </span><strong data-dcnode-id="1321"><span data-dcnode-id="1322" instrument_node="">the best time to prune apple trees in the Pacific Northwest is during the summer</span></strong><span data-dcnode-id="1320" instrument_node=""> when the tree enters into a second dormant phase. You should never prune an apple tree in the fall.</span></p><span data-dcnode-id="1318" instrument_node="">
</span><p data-dcnode-id="1314"><span data-dcnode-id="1317" instrument_node="">Because your fresh pruning cuts leave the tree susceptible and open to disease, you don't want to prune when it will be wet for 2 to 3 weeks after you prune. Note: ice and snow are considered dry in regards to fungus and bacteria spores. In wet parts of the country like the Pacific Northwest, the best time to prune an apple tree is in July. For more on fruit tree care read </span><a data-dcnode-id="1315" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//melissaknorris.com/how-to-care-for-fruit-trees/" rel="noopener noreferrer" target="_blank"><span data-dcnode-id="1316" instrument_node="">How to Care for Fruit Trees in Fall and Winter</span></a></p><span data-dcnode-id="1313" instrument_node="">
</span><div data-dcnode-id="1312" id="om-ydmwjoosjoor2sd3nts6-holder"></div><span data-dcnode-id="1311" instrument_node="">
</span><span data-dcnode-id="1308" instrument_node="">
</span><p data-dcnode-id="1306"><span data-dcnode-id="1307" instrument_node="">For years I pruned in late winter and early spring as you'll see in the video below, but learned from a nursery expert that was likely the reason I was beginning to see some signs of disease in my trees and have now switched to summer pruning only.</span></p><span data-dcnode-id="1305" instrument_node="">
</span><p data-dcnode-id="1303"><span data-dcnode-id="1304" instrument_node="">After selecting your pruning time based on climate, it's important to have proper pruning tools.</span></p><span data-dcnode-id="1302" instrument_node="">
</span><h3 data-dcnode-id="1300" id="h-pruning-tools"><span data-dcnode-id="1301" instrument_node="">Pruning Tools</span></h3><span data-dcnode-id="1299" instrument_node="">
</span><p data-dcnode-id="1297"><span data-dcnode-id="1298" instrument_node="">Before pruning, always clean your shears, loppers, and saws with alcohol to avoid spreading any disease between trees and allow them to dry fully before use.</span></p><span data-dcnode-id="1296" instrument_node="">
</span><p data-dcnode-id="1292"><a data-dcnode-id="1294" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//amzn.to/2VfIv3c" rel="nofollow noopener noreferrer" target="_blank"><span data-dcnode-id="1295" instrument_node="">Folding Saw</span></a><span data-dcnode-id="1293" instrument_node="">&nbsp;– Heavy Duty Pruning Handsaw for larger branches</span></p><span data-dcnode-id="1291" instrument_node="">
</span><p data-dcnode-id="1287"><a data-dcnode-id="1289" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//amzn.to/2T6stWv" rel="nofollow noopener noreferrer" target="_blank"><span data-dcnode-id="1290" instrument_node="">Steel Pruning Shears</span></a><span data-dcnode-id="1288" instrument_node="">&nbsp;for smaller branches and bushes</span></p><span data-dcnode-id="1286" instrument_node="">
</span><div data-dcnode-id="1285" id="om-auqnb2wbsncanckeryo2-holder"></div><span data-dcnode-id="1284" instrument_node="">
</span><span data-dcnode-id="1281" instrument_node="">
</span><p data-dcnode-id="1277"><a data-dcnode-id="1279" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//amzn.to/2PgnRw2" rel="nofollow noopener noreferrer" target="_blank"><span data-dcnode-id="1280" instrument_node="">Long-handled</span></a><span data-dcnode-id="1278" instrument_node=""> loppers for medium branches or spots that are harder to get into</span></p><span data-dcnode-id="1276" instrument_node="">
</span><p data-dcnode-id="1274"><span data-dcnode-id="1275" instrument_node="">Often times I learn best by seeing so if you're looking for how to prune apple trees video, I got ya covered below!</span></p><span data-dcnode-id="1273" instrument_node="">

</span></div></figure><span data-dcnode-id="749" instrument_node="">
</span><h2 data-dcnode-id="747" id="h-how-to-prune-an-apple-tree"><span data-dcnode-id="748" instrument_node="">How to prune an apple tree</span></h2><span data-dcnode-id="746" instrument_node="">
</span><ol data-dcnode-id="717"><li data-dcnode-id="742"><strong data-dcnode-id="744"><span data-dcnode-id="745" instrument_node="">Prune out any dead, diseased, or broken branches.</span></strong><span data-dcnode-id="743" instrument_node=""> Deadwood is often darker or black. The bark may peel or be split and no new buds are forming. Signs of disease are an open wound, discolored wood, oozing wounds, or peeling bark with discoloration. Any time you see disease or a dead branch, remove it. If wet conditions are present, cut past the disease (where you no longer see discoloration in the wood). Once you have dry weather, then make your final proper pruning cut, either at an outward growing lateral or if removing the entire branch, at the collar.</span></li><li data-dcnode-id="738"><strong data-dcnode-id="740"><span data-dcnode-id="741" instrument_node="">Remove any sucker shoots</span></strong><span data-dcnode-id="739" instrument_node="">. These are shoots that grow near the base of the tree, off the trunk or near it. Remove sucker shoots as soon as you see them, don't wait for winter or summer.</span></li><li data-dcnode-id="734"><strong data-dcnode-id="736"><span data-dcnode-id="737" instrument_node="">Remove water shoots.&nbsp;</span></strong><span data-dcnode-id="735" instrument_node="">Watershoots grow straight upwards and don't produce fruit. They sap strength from the tree and shade fruit and lower branches.</span></li><li data-dcnode-id="730"><strong data-dcnode-id="732"><span data-dcnode-id="733" instrument_node="">Prune any branches that grow downwards. </span></strong><span data-dcnode-id="731" instrument_node="">These branches don't provide fruit and can cause a branch to weaken over time and break.</span></li><li data-dcnode-id="726"><strong data-dcnode-id="728"><span data-dcnode-id="729" instrument_node="">Remove crossing or rubbing branches</span></strong><span data-dcnode-id="727" instrument_node="">. Branches that cross will eventually cause rubbing, which opens the tree up to disease and insects.</span></li><li data-dcnode-id="722"><strong data-dcnode-id="724"><span data-dcnode-id="725" instrument_node="">Keep the center of the tree clear. </span></strong><span data-dcnode-id="723" instrument_node="">Prune inward growing branches to keep the center of the tree clear for airflow and to avoid shading your fruit. You don’t want overpopulation of foliage because it’s going to shade it too much and will keep your fruit from becoming ripe. If you have a lot of younger shoots growing straight into the center of the tree, remove them.</span></li><li data-dcnode-id="718"><strong data-dcnode-id="720"><span data-dcnode-id="721" instrument_node="">Choose well placed lateral branches to maintain healthy scaffolding.&nbsp;</span></strong><span data-dcnode-id="719" instrument_node="">You want to make sure you don't have branches that are right on top of one another. They'll shade the lower branch and create an uneven tree. These branches should grow outwards rather than upward and be 4 to 6 inches apart.</span></li></ol><span data-dcnode-id="716" instrument_node="">
</span><h3 data-dcnode-id="713" id="h-how-to-prune-old-apple-trees"><strong data-dcnode-id="714"><span data-dcnode-id="715" instrument_node="">How to prune old apple trees</span></strong></h3><span data-dcnode-id="712" instrument_node="">
</span><p data-dcnode-id="710"><span data-dcnode-id="711" instrument_node="">Start by removing dead or diseased and broken branches first. Next, remove any sucker shoots.</span></p><span data-dcnode-id="709" instrument_node="">
</span><p data-dcnode-id="707"><span data-dcnode-id="708" instrument_node="">Remove branches that cross or are rubbing against one another.</span></p><span data-dcnode-id="706" instrument_node="">
</span><p data-dcnode-id="704"><span data-dcnode-id="705" instrument_node="">Remove lower branches, especially any that are within 2 feet of the ground on dwarf or semi-dwarf trees and within 4 feet of the ground on standard apple trees.</span></p><span data-dcnode-id="703" instrument_node="">
</span><p data-dcnode-id="701"><span data-dcnode-id="702" instrument_node="">Thin out branches at the top to allow light to penetrate the upper canopy to the middle and lower branches.</span></p><span data-dcnode-id="700" instrument_node="">
</span><p data-dcnode-id="698"><span data-dcnode-id="699" instrument_node="">If scaffolding branches are too close together, pick the stronger of the two and remove the other.</span></p><span data-dcnode-id="697" instrument_node="">
</span><p data-dcnode-id="695"><span data-dcnode-id="696" instrument_node="">Remove sucker shoots (they grow straight up and don't produce fruit).</span></p><span data-dcnode-id="694" instrument_node="">
</span><div class="wp-block-image" data-dcnode-id="689"><figure class="aligncenter" data-dcnode-id="690"><img alt="how to prune an apple tree pruning a broken branch" class="wp-image-18573 entered lazyloaded" data-dcnode-id="693" data-lazy-src="https://melissaknorris.com/wp-content/uploads/2020/02/how-to-prune-an-apple-tree.jpg" data-ll-status="loaded" data-pin-nopin="true" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//melissaknorris.com/wp-content/uploads/2020/02/how-to-prune-an-apple-tree.jpg&amp;raw"><noscript data-dcnode-id="691"><span data-dcnode-id="692" instrument_node="">&lt;img src="https://melissaknorris.com/wp-content/uploads/2020/02/how-to-prune-an-apple-tree.jpg" alt="how to prune an apple tree pruning a broken branch" class="wp-image-18573"/&gt;</span></noscript></figure></div><span data-dcnode-id="688" instrument_node="">
</span><p data-dcnode-id="686"><span data-dcnode-id="687" instrument_node="">When a tree has been neglected and not pruned for several years, never remove more than 1/3 of the tree. Spread the pruning out over several years to get it fully pruned and back into shape. </span></p><span data-dcnode-id="685" instrument_node="">
</span><h2 data-dcnode-id="683" id="h-types-of-pruning-cuts"><span data-dcnode-id="684" instrument_node="">Types of Pruning Cuts</span></h2><span data-dcnode-id="682" instrument_node="">
</span><div class="wp-block-image" data-dcnode-id="677"><figure class="aligncenter" data-dcnode-id="678"><img alt="" class="wp-image-18584 entered error" data-dcnode-id="681" data-lazy-src="https://melissaknorris.com/wp-content/uploads/2020/03/Types-of-pruning-cuts-on-apple-tree.jpg" data-ll-status="error" data-pin-nopin="true" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//melissaknorris.com/wp-content/uploads/2020/03/Types-of-pruning-cuts-on-apple-tree.jpg&amp;raw"><noscript data-dcnode-id="679"><span data-dcnode-id="680" instrument_node="">&lt;img src="https://melissaknorris.com/wp-content/uploads/2020/03/Types-of-pruning-cuts-on-apple-tree.jpg" alt="" class="wp-image-18584"/&gt;</span></noscript></figure></div><span data-dcnode-id="676" instrument_node="">
</span><p data-dcnode-id="674"><span data-dcnode-id="675" instrument_node="">It's important to make the correct type of pruning cuts. Whenever you're pruning your apple tree, make sure the cut is clean. Choosing the proper pruning tools and keeping them sharp will ensure this.</span></p><span data-dcnode-id="673" instrument_node="">
</span><p data-dcnode-id="670"><strong data-dcnode-id="671"><span data-dcnode-id="672" instrument_node="">1. When removing a full branch, cut right at the collar close to the trunk.</span></strong></p><span data-dcnode-id="669" instrument_node="">
</span><p data-dcnode-id="666"><span data-dcnode-id="667" style="font-weight: 400;"><span data-dcnode-id="668" instrument_node="">To remove a full branch, go to where the branch meets the trunk. Cut straight up and down, right next to the collar, but not into it.</span></span></p><span data-dcnode-id="665" instrument_node="">
</span><p data-dcnode-id="662"><strong data-dcnode-id="663"><span data-dcnode-id="664" instrument_node="">2. Pruning to a bud</span></strong></p><span data-dcnode-id="661" instrument_node="">
</span><p class="is-style-p2" data-dcnode-id="658"><span data-dcnode-id="659" style="font-weight: 400;"><span data-dcnode-id="660" instrument_node="">When tipping a branch or cutting out a diseased portion but not the entire branch, you want to find an outward-facing bud to make your pruning cut. Cut at a 45-degree angle about 1/4 inch away from the bud.&nbsp;</span></span></p><span data-dcnode-id="657" instrument_node="">
