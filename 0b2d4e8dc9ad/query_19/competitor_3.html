a-dcnode-id="762"><span data-dcnode-id="778" instrument_node=""> </span><h1 class="title" data-dcnode-id="776"><span data-dcnode-id="777" instrument_node="">How to Prune Columnar Apple Trees</span></h1><span data-dcnode-id="775" instrument_node=""> </span><div class="author-date-wrapper" data-dcnode-id="764"><span data-dcnode-id="774" instrument_node=""> </span><p class="author" data-dcnode-id="772"><span data-dcnode-id="773" instrument_node="">By: Elton Dunn</span></p><span data-dcnode-id="771" instrument_node=""> </span><p class="divider" data-dcnode-id="769"><span data-dcnode-id="770" instrument_node="">●</span></p><span data-dcnode-id="768" instrument_node=""> </span><p class="date" data-dcnode-id="766"><span data-dcnode-id="767" instrument_node="">21 September, 2017</span></p><span data-dcnode-id="765" instrument_node=""> </span></div><span data-dcnode-id="763" instrument_node=""> </span></div><span data-dcnode-id="761" instrument_node=""> </span><div class="article-content-container" data-dcnode-id="144"><span data-dcnode-id="760" instrument_node=""> </span><div class="freestyle-content" data-dcnode-id="655"><span data-dcnode-id="759" instrument_node=""> </span><div class="summary-container" data-dcnode-id="757"><span data-dcnode-id="758" instrument_node=""> </span></div><span data-dcnode-id="756" instrument_node=""> </span><div class="section-container" data-dcnode-id="740"><span data-dcnode-id="755" instrument_node=""> </span><p data-dcnode-id="753"><span data-dcnode-id="754" instrument_node="">A special type of dwarf tree, the columnar apple tree resembles a pole of apples. These trees can be planted in containers or in garden beds and are ideal for areas too small to support full-sized trees. While columnar apple trees need less pruning than full-size or other dwarf apple trees, they do need regular thinning when the fruits sets as well as light shaping and pruning for plant health. Prune columnar apple trees in the late fall or in the early spring, when frost danger passes. Thin the tree when the fruit develops over the spring and summer months.</span></p><span data-dcnode-id="752" instrument_node=""> </span><div class="inline-parent-container ad-container" data-dcnode-id="742"><span data-dcnode-id="751" instrument_node=""> </span><div data-ad-unit-name="adsense-inline-has-loaded" data-dcnode-id="746"><span data-dcnode-id="750" instrument_node="">
</span><ins class="adsbygoogle" data-ad-client="ca-pub-3235755782694080" data-ad-format="auto" data-ad-slot="5096682388" data-dcnode-id="748" data-full-width-responsive="true" style="display:block"><span data-dcnode-id="749" instrument_node="">
</span></ins><span data-dcnode-id="747" instrument_node=""> </span></div><span data-dcnode-id="745" instrument_node=""> </span><div class="mobile-display-ad" data-ad-unit-index="1" data-ad-unit-name="slot" data-dcnode-id="744"></div><span data-dcnode-id="743" instrument_node=""> </span></div><span data-dcnode-id="741" instrument_node=""> </span></div><span data-dcnode-id="739" instrument_node=""> </span><div class="section-container" data-dcnode-id="685"><span data-dcnode-id="738" instrument_node=""> </span><div class="step-container step-2" data-dcnode-id="687"><span data-dcnode-id="737" instrument_node=""> </span><p data-dcnode-id="735"><span data-dcnode-id="736" instrument_node="">Clip off dead twigs, which feel brittle. Trim back unhealthy or dead growth to a healthy part of the branch. Discard all unhealthy wood in a garbage bin.</span></p><span data-dcnode-id="734" instrument_node=""> </span><div class="custom-module end-section" data-dcnode-id="716"><span data-dcnode-id="733" instrument_node=""> </span><div class="wrapper" data-dcnode-id="718"><span data-dcnode-id="732" instrument_node=""> </span><div class="copy" data-dcnode-id="720"><span data-dcnode-id="731" instrument_node=""> </span><ul data-dcnode-id="722"><span data-dcnode-id="730" instrument_node=""> </span><li data-dcnode-id="727"><span data-dcnode-id="729" instrument_node="">A special type of dwarf tree, the columnar apple tree resembles a pole of apples.</span><br data-dcnode-id="728"></li><span data-dcnode-id="726" instrument_node=""> </span><li data-dcnode-id="724"><span data-dcnode-id="725" instrument_node="">While columnar apple trees need less pruning than full-size or other dwarf apple trees, they do need regular thinning when the fruits sets as well as light shaping and pruning for plant health.</span></li><span data-dcnode-id="723" instrument_node=""> </span></ul><span data-dcnode-id="721" instrument_node=""> </span></div><span data-dcnode-id="719" instrument_node=""> </span></div><span data-dcnode-id="717" instrument_node=""> </span></div><span data-dcnode-id="715" instrument_node=""> </span><p data-dcnode-id="713"><span data-dcnode-id="714" instrument_node="">Trim back your columnar apple tree to your desired height. The trees can reach 10 feet tall, according to Apples Fruit. If you let your tree mature to its full height, you will need to stake the tree as the fruit ripens. Apples also taste better when the tree is not producing many apples.</span></p><span data-dcnode-id="712" instrument_node=""> </span><div class="mobile-display-ad" data-ad-unit-index="2" data-ad-unit-name="slot" data-dcnode-id="711"></div><span data-dcnode-id="710" instrument_node=""> </span><p data-dcnode-id="708"><span data-dcnode-id="709" instrument_node="">Thin the fruit once it sets to prevent branches from breaking under the weight. Clip off fruit from crowded areas or if the branch looks too weak to support the weight of a mature apple. Thin out fruit where too many apples are growing, leaving one apple per cluster. Clip the fruit off with anvil pruners to thin it.</span></p><span data-dcnode-id="707" instrument_node=""> </span><div class="custom-module end-section" data-dcnode-id="689"><span data-dcnode-id="706" instrument_node=""> </span><div class="wrapper" data-dcnode-id="691"><span data-dcnode-id="705" instrument_node=""> </span><div class="copy" data-dcnode-id="693"><span data-dcnode-id="704" instrument_node=""> </span><ul data-dcnode-id="695"><span data-dcnode-id="703" instrument_node=""> </span><li data-dcnode-id="700"><span data-dcnode-id="702" instrument_node="">Trim back your columnar apple tree to your desired height.</span><br data-dcnode-id="701"></li><span data-dcnode-id="699" instrument_node=""> </span><li data-dcnode-id="697"><span data-dcnode-id="698" instrument_node="">Clip off fruit from crowded areas or if the branch looks too weak to support the weight of a mature apple.</span></li><span data-dcnode-id="696" instrument_node=""> </span></ul><span data-dcnode-id="694" instrument_node=""> </span></div><span data-dcnode-id="692" instrument_node=""> </span></div><span data-dcnode-id="690" instrument_node=""> </span></div><span data-dcnode-id="688" instrument_node=""> </span></div><span data-dcnode-id="686" instrument_node=""> </span></div><span data-dcnode-id="684" instrument_node=""> </span><div class="section-container" data-dcnode-id="657"><span data-dcnode-id="683" instrument_node=""> </span><h2 data-dcnode-id="681"><span data-dcnode-id="682" instrument_node="">Columnar Apple Trees Require A Lot Of Care?</span></h2><span data-dcnode-id="680" instrument_node=""> </span><p data-dcnode-id="678"><span data-dcnode-id="679" instrument_node="">Columnar apple trees are an easily maintained, manageable size. All apple trees need full sun and columnar trees are no exception. Fruit expectations vary, depending on the varieties you plant. Shift container-grown trees to a different location to protect them from inclement weather or move them to a partially shaded spot during a heat wave. Alternatively, you can plant columnar trees in the ground, just as you would any apple tree, spacing them about 2 feet apart. The soil should never be too soggy or too dry. In areas with prevailing winds you may need to stake columnar trees to keep them vertical. Select appropriate organic sprays whenever possible for food crops, and follow the manufacturer’s application instructions.</span></p><span data-dcnode-id="677" instrument_node=""> </span><div class="custom-module end-section" data-dcnode-id="659"><span data-dcnode-id="676" instrument_node=""> </span><div class="wrapper" data-dcnode-id="661"><span data-dcnode-id="675" instrument_node=""> </span><div class="copy" data-dcnode-id="663"><span data-dcnode-id="674" instrument_node=""> </span><ul data-dcnode-id="665"><span data-dcnode-id="673" instrument_node=""> </span><li data-dcnode-id="670"><span data-dcnode-id="672" instrument_node="">Columnar apple trees are an easily maintained, manageable size.</span><br data-dcnode-id="671"></li><span data-dcnode-id="669" instrument_node=""> </span><li data-dcnode-id="667"><span data-dcnode-id="668" instrument_node="">In areas with prevailing winds you may need to stake columnar trees to keep them vertical.</span></li><span data-dcnode-id="666" instrument_node=""> </span></ul><span data-dcnode-id="664" instrument_node=""> </span></div><span data-dcnode-id="662" instrument_node=""> </span></div><span data-dcnode-id="660" instrument_node=""> </span></div><span data-dcnode-id="658" instrument_node=""> </span></div><span data-dcnode-id="656" instrument_node=""> </span></div><span data-dcnode-id="654" instrument_node=""> </span><div data-ad-unit-name="adblock-adsense-main" data-dcnode-id="653"></div><span data-dcnode-id="652" instrument_node=""> </span><div class="main-ad" data-ad-unit-name="adsense-main-has-loaded" data-dcnode-id="648"><span data-dcnode-id="651" instrument_node="">
