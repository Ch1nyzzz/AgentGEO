</span></div></div><div class="ct-div-block" data-dcnode-id="2398" id="div_block-285-34109"><a class="ct-link" data-dcnode-id="2399" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//orchardpeople.com/free-ebook/" id="link-286-34109"><img alt="" class="ct-image" data-dcnode-id="2400" id="image-287-34109" sizes="(max-width: 217px) 100vw, 217px" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//orchardpeople.com/wp-content/uploads/2019/07/xScreen-Shot-2019-07-22-at-11.13.34-AM-217x300-1.jpg.pagespeed.ic.KajZg71Xxe.jpg&amp;raw" srcset=""></a></div></div><section class="ct-section" data-dcnode-id="380" id="section-167-34109"><div class="ct-section-inner-wrap" data-dcnode-id="381"><h1 class="ct-headline" data-dcnode-id="2394" id="headline-242-34109"><span class="ct-span" data-dcnode-id="2395" id="span-243-34109"><span data-dcnode-id="2396" instrument_node="">How to Prune Old Apple Trees to Produce Better Fruit</span></span></h1><div class="ct-text-block" data-dcnode-id="2390" id="text_block-269-34109"><span data-dcnode-id="2393" instrument_node="">Published: </span><span class="ct-span" data-dcnode-id="2391" id="span-270-34109"><span data-dcnode-id="2392" instrument_node="">January 7, 2022</span></span></div><div class="ct-inner-content" data-dcnode-id="382" id="inner_content-166-34109"><section class="ct-section" data-dcnode-id="383" id="section-2-35000"><div class="ct-section-inner-wrap" data-dcnode-id="384"><div class="ct-inner-content" data-dcnode-id="385" id="inner_content-3-35000"><span data-dcnode-id="2389" instrument_node="">
</span><div class="wp-block-image" data-dcnode-id="2383"><figure class="aligncenter size-large" data-dcnode-id="2384"><img alt="Old apple orchard in England. How to prune old apple trees. " class="wp-image-36773" data-dcnode-id="2388" height="500" sizes="(max-width: 800px) 100vw, 800px" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//orchardpeople.com/wp-content/uploads/2021/04/Bob-Lever-Orchard.jpg&amp;raw" srcset="https://orchardpeople.com/wp-content/uploads/2021/04/Bob-Lever-Orchard.jpg 800w, https://orchardpeople.com/wp-content/uploads/2021/04/Bob-Lever-Orchard-300x188-1.jpg 300w, https://orchardpeople.com/wp-content/uploads/2021/04/Bob-Lever-Orchard-768x480-1.jpg 768w" width="800"><figcaption data-dcnode-id="2385"><em data-dcnode-id="2386"><span data-dcnode-id="2387" instrument_node="">Old apple orchard in bloom in the UK. Photo credit: Bob Lever</span></em></figcaption></figure></div><span data-dcnode-id="2382" instrument_node="">
</span><p data-dcnode-id="2380"><span data-dcnode-id="2381" instrument_node="">Do you have an unruly old apple tree? Are you wondering if your tree is worth saving? In many cases, you can revitalize old apple trees. And in this article, I’ll share some quick and easy fixes that will turn your old apple tree back into a great fruit producer. Rejuvenating your tree rather than removing it can offer other advantages as well, as your old apple tree can provide essential habitat and food for beneficial insects and wildlife.</span></p><span data-dcnode-id="2379" instrument_node="">
</span><div class="wp-block-image" data-dcnode-id="2374"><figure class="aligncenter size-large is-resized" data-dcnode-id="2375"><img alt="Looking up into canopy of an overgrown old apple tree. How to prune old apple trees. " class="wp-image-36512" data-dcnode-id="2378" sizes="(max-width: 1024px) 100vw, 1024px" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//orchardpeople.com/wp-content/uploads/2021/03/IMG_9808-1024x683.jpg&amp;raw" srcset="https://orchardpeople.com/wp-content/uploads/2021/03/IMG_9808-1024x683.jpg 1024w, https://orchardpeople.com/wp-content/uploads/2021/03/IMG_9808-300x200.jpg 300w, https://orchardpeople.com/wp-content/uploads/2021/03/IMG_9808-768x512.jpg 768w, https://orchardpeople.com/wp-content/uploads/2021/03/IMG_9808-1536x1024.jpg 1536w, https://orchardpeople.com/wp-content/uploads/2021/03/IMG_9808-2048x1365.jpg 2048w, https://orchardpeople.com/wp-content/uploads/2021/03/IMG_9808-scaled.jpg 1600w" width="800"><figcaption data-dcnode-id="2376"><span data-dcnode-id="2377" instrument_node="">Old apple trees can become overgrown. When the canopy is too crowded it prevents fruit from ripening and can attract pests and diseases. Photo credit: Chris Andersen</span></figcaption></figure></div><span data-dcnode-id="2373" instrument_node="">
</span><h2 data-dcnode-id="2371" id="why-overgrown-old-apple-trees-are-problematic"><span data-dcnode-id="2372" instrument_node="">WHY OVERGROWN OLD APPLE TREES ARE PROBLEMATIC</span></h2><span data-dcnode-id="2370" instrument_node="">
</span><p data-dcnode-id="2365"><span data-dcnode-id="2369" instrument_node="">Sometimes trees get overgrown and that is ok. After all, nothing in life is perfect. However, leaving old apple trees in this neglected state can cause problems. </span><strong data-dcnode-id="2367"><span data-dcnode-id="2368" instrument_node="">When there are too many branches in a tree’s canopy, air cannot circulate. </span></strong><span data-dcnode-id="2366" instrument_node="">These damp and dark conditions will attract fruit tree pests and diseases that may damage old apple trees and turn their fruit into a maggoty mess.</span></p><span data-dcnode-id="2364" instrument_node="">
</span><p data-dcnode-id="2362"><span data-dcnode-id="2363" instrument_node="">On top of all that, these pests and diseases can then spread to neighbouring fruit trees.</span></p><span data-dcnode-id="2361" instrument_node="">
</span><p data-dcnode-id="2359"><span data-dcnode-id="2360" instrument_node="">The tangle of branches may also block the sun from reaching other branches. So, if your old apple tree does still produce fruit, the fruit that is hidden in the dense canopy will not have access to the sunshine it needs to ripen properly. The result will be poor-tasting fruit and an unattractive tree.</span></p><span data-dcnode-id="2358" instrument_node="">
</span><p data-dcnode-id="2353"><span data-dcnode-id="2357" instrument_node="">On that note, one of the most important things you can do to improve the health of an old apple tree is to prune it correctly. In an episode 61 of </span><a data-dcnode-id="2355" data-id="36814" data-type="page" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//orchardpeople.com/podcasts/"><span data-dcnode-id="2356" instrument_node="">The Urban Forestry Radio Show and Podcast</span></a><span data-dcnode-id="2354" instrument_node="">, fruit tree pruning expert Bob Lever explains some of his strategies for pruning old apple trees. </span></p><span data-dcnode-id="2352" instrument_node="">
</span><iframe data-dcnode-id="2351" frameborder="no" height="180" loading="lazy" scrolling="no" seamless="" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//share.transistor.fm/e/57cab599&amp;raw" width="100%"></iframe><span data-dcnode-id="2350" instrument_node="">
</span><p data-dcnode-id="2348"><span data-dcnode-id="2349" instrument_node="">You can watch a 10-minute long video excerpt of Bob Lever's interview below. </span></p><span data-dcnode-id="2347" instrument_node="">
</span><figure class="wp-block-embed-youtube wp-block-embed is-type-video is-provider-youtube" data-dcnode-id="2329"><div class="lyte-wrapper" data-dcnode-id="2336" style="width:560px;max-width:100%;margin:5px auto;"><div class="lyte lP" data-dcnode-id="2337" id="WYL_W8pLSxqppok"><div class="pL" data-dcnode-id="2340" data-src="//i.ytimg.com/vi/W8pLSxqppok/hqdefault.jpg" id="lyte_W8pLSxqppok"><div class="tC" data-dcnode-id="2345"><div class="tT" data-dcnode-id="2346"></div></div><div class="play" data-dcnode-id="2344"></div><div class="ctrl" data-dcnode-id="2341"><div class="Lctrl" data-dcnode-id="2343"></div><div class="Rctrl" data-dcnode-id="2342"></div></div></div><noscript data-dcnode-id="2338"><span data-dcnode-id="2339" instrument_node="">&lt;a href="https://youtu.be/W8pLSxqppok"&gt;&lt;img src="https://i.ytimg.com/vi/W8pLSxqppok/0.jpg" alt="" width=560 height=295 /&gt;&lt;br/&gt;Watch this video on YouTube&lt;/a&gt;</span></noscript></div></div><div class="lL" data-dcnode-id="2335" style="max-width:100%;width:560px;margin:5px auto;"></div><figcaption data-dcnode-id="2330"><span data-dcnode-id="2334" instrument_node="">In this 10-minute video excerpt </span><a data-dcnode-id="2332" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//orchardpeople.com/podcasts/"><span data-dcnode-id="2333" instrument_node="">from an hour-long episode of The Urban Forestry Radio Show and Podcast,</span></a><span data-dcnode-id="2331" instrument_node=""> orchard pruning expert Bob Lever explains how to prune old apple trees. </span></figcaption></figure><span data-dcnode-id="2328" instrument_node="">
</span><p data-dcnode-id="2326"><span data-dcnode-id="2327" instrument_node="">As you can see from Bob Lever's video, pruning old apple trees does not have to be difficult. Here are five options to consider when pruning old apple trees. I call it the “RIPSS” technique!</span></p><span data-dcnode-id="2325" instrument_node="">
</span><h2 data-dcnode-id="2323" id="how-to-prune-old-apple-trees"><span data-dcnode-id="2324" instrument_node="">HOW TO PRUNE OLD APPLE TREES</span></h2><span data-dcnode-id="2322" instrument_node="">
</span><ol data-dcnode-id="2301" type="1"><li data-dcnode-id="2318"><strong data-dcnode-id="2320"><span data-dcnode-id="2321" instrument_node="">R</span></strong><span data-dcnode-id="2319" instrument_node="">emove dead, damaged, and diseased branches</span></li><li data-dcnode-id="2314"><strong data-dcnode-id="2316"><span data-dcnode-id="2317" instrument_node="">I</span></strong><span data-dcnode-id="2315" instrument_node="">mprove air circulation by removing scaffold branches</span></li><li data-dcnode-id="2310"><strong data-dcnode-id="2312"><span data-dcnode-id="2313" instrument_node="">P</span></strong><span data-dcnode-id="2311" instrument_node="">rune sail branches</span></li><li data-dcnode-id="2306"><strong data-dcnode-id="2308"><span data-dcnode-id="2309" instrument_node="">S</span></strong><span data-dcnode-id="2307" instrument_node="">nip water sprouts</span></li><li data-dcnode-id="2302"><strong data-dcnode-id="2304"><span data-dcnode-id="2305" instrument_node="">S</span></strong><span data-dcnode-id="2303" instrument_node="">horten scaffold branches</span></li></ol><span data-dcnode-id="2300" instrument_node="">
</span><p data-dcnode-id="2298"><span data-dcnode-id="2299" instrument_node="">Let’s delve into these options, one at a time:</span></p><span data-dcnode-id="2297" instrument_node="">
</span><h3 data-dcnode-id="2295" id="option-1-remove-dead-damaged-and-diseased-branches"><span data-dcnode-id="2296" instrument_node="">OPTION 1: Remove dead, damaged and diseased branches</span></h3><span data-dcnode-id="2294" instrument_node="">
</span><p data-dcnode-id="2283"><span data-dcnode-id="2293" instrument_node="">The first step in pruning an old apple tree – or any tree at all - is to remove the dead, damaged or diseased branches. </span><strong data-dcnode-id="2291"><span data-dcnode-id="2292" instrument_node="">Dead branches</span></strong><span data-dcnode-id="2290" instrument_node=""> won’t have living buds, blossoms or leaves. They may have died of natural causes or as a result of disease. </span><strong data-dcnode-id="2288"><span data-dcnode-id="2289" instrument_node="">Damaged branches</span></strong><span data-dcnode-id="2287" instrument_node=""> may be broken or may have a wound on them. Both dead and diseased branches provide an entry point for pest and disease problems. Finally, </span><strong data-dcnode-id="2285"><span data-dcnode-id="2286" instrument_node="">diseased branches</span></strong><span data-dcnode-id="2284" instrument_node=""> may have strange growths on them that don’t belong there, or they may be releasing oozing goop. If you don’t remove diseased branches, these problems can easily spread.</span></p><span data-dcnode-id="2282" instrument_node="">
</span><figure class="wp-block-image size-large is-resized" data-dcnode-id="2278"><img alt="Pruning Old Apple Trees - hand pruner and pruning illustration. " class="wp-image-36519" data-dcnode-id="2281" sizes="(max-width: 1024px) 100vw, 1024px" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//orchardpeople.com/wp-content/uploads/2021/03/image-1024x684-1.jpg&amp;raw" srcset="https://orchardpeople.com/wp-content/uploads/2021/03/image-1024x684-1.jpg 1024w, https://orchardpeople.com/wp-content/uploads/2021/03/image-300x200-1.jpg 300w, https://orchardpeople.com/wp-content/uploads/2021/03/image-768x513-1.jpg 768w, https://orchardpeople.com/wp-content/uploads/2021/03/image.jpg 1029w" width="800"><figcaption data-dcnode-id="2279"><span data-dcnode-id="2280" instrument_node="">By removing entire scaffold branches, you will improve air circulation in your old apple tree. </span></figcaption></figure><span data-dcnode-id="2277" instrument_node="">
</span><h3 data-dcnode-id="2275" id="option-2-improve-air-circulation-by-removing-scaffold-branches"><span data-dcnode-id="2276" instrument_node="">OPTION 2: Improve Air Circulation by Removing Scaffold Branches</span></h3><span data-dcnode-id="2274" instrument_node="">
</span><p data-dcnode-id="2272"><span data-dcnode-id="2273" instrument_node="">Good air circulation is an important way to prevent fruit tree pests and diseases. You can improve air circulation in your old apple tree by removing some scaffold branches. These are the large branches that come off the trunk of the tree. These branches can be quite large, so if you just remove one of them, you can easily allow light and air into the canopy. Your goal is to be able to throw a football through the tree’s branches. Instead of getting caught in a tangle of branches, it should fall through to the ground. So, look for branches that are clumped together and remove some of those scaffold branches.</span></p><span data-dcnode-id="2271" instrument_node="">
</span><div class="wp-block-image" data-dcnode-id="2266"><figure class="aligncenter size-large is-resized" data-dcnode-id="2267"><img alt="Pruning old apple trees. A visual of an apple tree that has been partially pruned. " class="wp-image-36569" data-dcnode-id="2270" height="576" loading="lazy" sizes="(max-width: 768px) 100vw, 768px" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//orchardpeople.com/wp-content/uploads/2021/03/IMG_0614-1024x768.jpg&amp;raw" srcset="https://orchardpeople.com/wp-content/uploads/2021/03/IMG_0614-1024x768.jpg 1024w, https://orchardpeople.com/wp-content/uploads/2021/03/IMG_0614-300x225.jpg 300w, https://orchardpeople.com/wp-content/uploads/2021/03/IMG_0614-768x576.jpg 768w, https://orchardpeople.com/wp-content/uploads/2021/03/IMG_0614-1536x1152.jpg 1536w, https://orchardpeople.com/wp-content/uploads/2021/03/IMG_0614-2048x1536.jpg 2048w, https://orchardpeople.com/wp-content/uploads/2021/03/IMG_0614-scaled.jpg 1600w" width="768"><figcaption data-dcnode-id="2268"><span data-dcnode-id="2269" instrument_node="">You can see on the scaffold branch on the left side of this three that are are two "sail branches" which look like a new tree growing on top of the branch. Sail branches can be unstable and should be removed. Photo credit: Chris Andersen</span></figcaption></figure></div><span data-dcnode-id="2265" instrument_node="">
</span><h3 data-dcnode-id="2263" id="option-3-prune-sail-branches"><span data-dcnode-id="2264" instrument_node="">OPTION 3: Prune Sail Branches</span></h3><span data-dcnode-id="2262" instrument_node="">
</span><p data-dcnode-id="2260"><span data-dcnode-id="2261" instrument_node="">Some old apple trees are so large that their scaffold or side branches sprout new trees on them! Sail branches look like an entire new tree that is growing off one of the established scaffold branches. Sail branches can be dangerous as they put pressure on the old apple tree and create instability through the branch and tree and so they need to be removed.</span></p><span data-dcnode-id="2259" instrument_node="">
</span><div class="wp-block-image" data-dcnode-id="2254"><figure class="aligncenter size-large is-resized" data-dcnode-id="2255"><img alt="water sprouts | Pruning old apple trees" class="wp-image-36578" data-dcnode-id="2258" sizes="(max-width: 1024px) 100vw, 1024px" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//orchardpeople.com/wp-content/uploads/2021/03/IMG_1776-1024x788.jpeg&amp;raw" srcset="https://orchardpeople.com/wp-content/uploads/2021/03/IMG_1776-1024x788.jpeg 1024w, https://orchardpeople.com/wp-content/uploads/2021/03/IMG_1776-300x231.jpeg 300w, https://orchardpeople.com/wp-content/uploads/2021/03/IMG_1776-768x591.jpeg 768w, https://orchardpeople.com/wp-content/uploads/2021/03/IMG_1776-1536x1182.jpeg 1536w, https://orchardpeople.com/wp-content/uploads/2021/03/IMG_1776-2048x1576.jpeg 2048w, https://orchardpeople.com/wp-content/uploads/2021/03/IMG_1776-scaled.jpeg 1600w" width="800"><figcaption data-dcnode-id="2256"><span data-dcnode-id="2257" instrument_node="">Water sprouts are often the tree's response when it is incorrectly pruned. These are branches that shoot up towards the sky in an effort to survive over-pruning. Photo credit: OrchardPeople.com</span></figcaption></figure></div><span data-dcnode-id="2253" instrument_node="">
</span><h3 data-dcnode-id="2251" id="option-4-remove-water-sprouts"><span data-dcnode-id="2252" instrument_node="">OPTION 4: Remove Water Sprouts</span></h3><span data-dcnode-id="2250" instrument_node="">
</span><p data-dcnode-id="2248"><span data-dcnode-id="2249" instrument_node="">Removing water sprouts is another option. Water sprouts (epicormic growth) are leafy branches that grow out of scaffold branches and reach straight up towards the sky. Water sprouts often form after a grower over-prunes their old apple tree. </span></p><span data-dcnode-id="2247" instrument_node="">
</span><p data-dcnode-id="2245"><span data-dcnode-id="2246" instrument_node="">When they first form, these non-fruiting sprouts help the tree survive and capture energy from the sun. But over the years, after the tree recovers, they drain energy from the tree. By removing them, that energy will be diverted to the fruiting branches of the tree.</span></p><span data-dcnode-id="2244" instrument_node="">
</span><section class="ct-section" data-dcnode-id="2233" id="section-584-36814" style="background-image:linear-gradient(rgba(0,0,0,0.41), rgba(0,0,0,0.41)), url(https://orchardpeople.com/wp-content/uploads/2021/05/apples-on-tree-dreamstime_m_59439674-scaled-1.jpg);background-size:auto,  cover;"><div class="ct-section-inner-wrap" data-dcnode-id="2234"><h2 class="ct-headline atomic-secondary-heading" data-dcnode-id="2240" id="headline-585-36814"><span data-dcnode-id="2243" instrument_node="">Growing Fruit Trees:</span><br data-dcnode-id="2242"><span data-dcnode-id="2241" instrument_node="">A Beginner's Guide</span></h2><div class="ct-text-block atomic-subheading" data-dcnode-id="2237" id="text_block-586-36814"><span data-dcnode-id="2239" instrument_node="">Learn fruit tree pruning, feeding, and pest &amp; disease prevention in our mini-course. $39 USD for a limited time only.</span><br data-dcnode-id="2238"></div><a class="ct-link-text atomic-primary-button" data-dcnode-id="2235" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//learn.orchardpeople.com/courses/fruit-tree-fundamentals-plus" id="link_text-587-36814" target="_self"><span data-dcnode-id="2236" instrument_node="">LEARN MORE</span></a></div></section><span data-dcnode-id="2232" instrument_node="">
</span><p data-dcnode-id="2231"></p><span data-dcnode-id="2230" instrument_node="">
</span><p data-dcnode-id="2228"><span data-dcnode-id="2229" instrument_node="">The only time you may want to keep some water sprouts is when a tree is very old, hollow and doesn't have any scaffold branches left. In those cases, the epicormic growth can help keep the tree alive. </span></p><span data-dcnode-id="2227" instrument_node="">
</span><div class="wp-block-image" data-dcnode-id="2222"><figure class="aligncenter size-large is-resized" data-dcnode-id="2223"><img alt="Man works under heavy scaffold branch of old apple tree. How to prune old apple trees. " class="wp-image-36521" data-dcnode-id="2226" sizes="(max-width: 1024px) 100vw, 1024px" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//orchardpeople.com/wp-content/uploads/2021/03/pruning-old-apple-tree-with-too-long-branches-138358229_m-1024x683.jpeg&amp;raw" srcset="https://orchardpeople.com/wp-content/uploads/2021/03/pruning-old-apple-tree-with-too-long-branches-138358229_m-1024x683.jpeg 1024w, https://orchardpeople.com/wp-content/uploads/2021/03/pruning-old-apple-tree-with-too-long-branches-138358229_m-300x200.jpeg 300w, https://orchardpeople.com/wp-content/uploads/2021/03/pruning-old-apple-tree-with-too-long-branches-138358229_m-768x512.jpeg 768w, https://orchardpeople.com/wp-content/uploads/2021/03/pruning-old-apple-tree-with-too-long-branches-138358229_m-1536x1024.jpeg 1536w, https://orchardpeople.com/wp-content/uploads/2021/03/pruning-old-apple-tree-with-too-long-branches-138358229_m-2048x1365.jpeg 2048w, https://orchardpeople.com/wp-content/uploads/2021/03/pruning-old-apple-tree-with-too-long-branches-138358229_m-scaled.jpeg 1600w" width="800"><figcaption data-dcnode-id="2224"><span data-dcnode-id="2225" instrument_node="">Scaffold branches that get too long can become heavy and unstable. There is a danger of them breaking and damaging the tree (or people, animals and property below). By shortening scaffold branches you can protect your tree and prevent that from happening. Photo credit: 123rf</span></figcaption></figure></div><span data-dcnode-id="2221" instrument_node="">
</span><h3 data-dcnode-id="2219" id="option-5-shortening-scaffold-branches"><span data-dcnode-id="2220" instrument_node="">OPTION 5: Shortening Scaffold Branches</span></h3><span data-dcnode-id="2218" instrument_node="">
</span><p data-dcnode-id="2216"><span data-dcnode-id="2217" instrument_node="">Finally, in some cases you may need to shorten scaffold branches. Old apple trees often have scaffold branches that get longer and longer each year. And these long branches become heavy and unstable. By shortening scaffold branches you will be preventing these branches from breaking in the future. If they do break, they will open up a wound in the tree which is never a good thing.</span></p><span data-dcnode-id="2215" instrument_node="">
</span><p data-dcnode-id="2213"><span data-dcnode-id="2214" instrument_node="">In the video below, expert fruit tree pruner Bob Lever from the UK will share his tips on pruning old apple trees.</span></p><span data-dcnode-id="2212" instrument_node="">
</span><div class="wp-block-image" data-dcnode-id="2207"><figure class="aligncenter size-large is-resized" data-dcnode-id="2208"><img alt="Heavily pruned old apple tree showing that over-pruning can damage old trees. " class="wp-image-36518" data-dcnode-id="2211" sizes="(max-width: 768px) 100vw, 768px" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//orchardpeople.com/wp-content/uploads/2021/03/IMG_0751-768x1024.jpg&amp;raw" srcset="https://orchardpeople.com/wp-content/uploads/2021/03/IMG_0751-768x1024.jpg 768w, https://orchardpeople.com/wp-content/uploads/2021/03/IMG_0751-225x300.jpg 225w, https://orchardpeople.com/wp-content/uploads/2021/03/IMG_0751-1152x1536.jpg 1152w, https://orchardpeople.com/wp-content/uploads/2021/03/IMG_0751-1536x2048.jpg 1536w, https://orchardpeople.com/wp-content/uploads/2021/03/IMG_0751-scaled.jpg 1200w" width="600"><figcaption data-dcnode-id="2209"><span data-dcnode-id="2210" instrument_node="">Do not prune your tree this much! If you prune too many branches off a fruit tree you can kill the tree. And even if the tree does not die, it will produce water sprouts, straight up and down branches that do not produce fruit. Never prune off more than 20% of an old apple tree each year. Photo credit: Chris Andersen.</span></figcaption></figure></div><span data-dcnode-id="2206" instrument_node="">
</span><h2 data-dcnode-id="2204" id="how-much-of-a-tree-can-you-prune-without-killing-it"><span data-dcnode-id="2205" instrument_node="">HOW MUCH OF A TREE CAN YOU PRUNE WITHOUT KILLING IT?</span></h2><span data-dcnode-id="2203" instrument_node="">
</span><p data-dcnode-id="2201"><span data-dcnode-id="2202" instrument_node="">In short, yes, over-pruning can kill an old apple tree. Branches provide nutrients for the tree and when you remove too many branches it can cause a shortage of nutrients and stress your old apple tree. So often, you cannot accomplish all the RIPSS options above in a single year.</span></p><span data-dcnode-id="2200" instrument_node="">
</span><p data-dcnode-id="2195"><span data-dcnode-id="2199" instrument_node="">And as we learned above, your tree will respond to over-pruning by growing back even more vigorously, creating more water sprouts and more of a mess. </span><strong data-dcnode-id="2197"><span data-dcnode-id="2198" instrument_node="">A good rule of thumb is to limit pruning to 20% or less of the canopy each year.</span></strong><span data-dcnode-id="2196" instrument_node=""> This means that in four years, a neglected old apple tree can be transformed into a healthy and productive fruit tree.</span></p><span data-dcnode-id="2194" instrument_node="">
</span><section class="ct-section" data-dcnode-id="2183" id="section-584-36814" style="background-image:linear-gradient(rgba(0,0,0,0.41), rgba(0,0,0,0.41)), url(https://orchardpeople.com/wp-content/uploads/2021/05/apples-on-tree-dreamstime_m_59439674-scaled-1.jpg);background-size:auto,  cover;"><div class="ct-section-inner-wrap" data-dcnode-id="2184"><h2 class="ct-headline atomic-secondary-heading" data-dcnode-id="2190" id="headline-585-36814"><span data-dcnode-id="2193" instrument_node="">Growing Fruit Trees:</span><br data-dcnode-id="2192"><span data-dcnode-id="2191" instrument_node="">A Beginner's Guide</span></h2><div class="ct-text-block atomic-subheading" data-dcnode-id="2187" id="text_block-586-36814"><span data-dcnode-id="2189" instrument_node="">Learn fruit tree pruning, feeding, and pest &amp; disease prevention in our mini-course. $39 USD for a limited time only.</span><br data-dcnode-id="2188"></div><a class="ct-link-text atomic-primary-button" data-dcnode-id="2185" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//learn.orchardpeople.com/courses/fruit-tree-fundamentals-plus" id="link_text-587-36814" target="_self"><span data-dcnode-id="2186" instrument_node="">LEARN MORE</span></a></div></section><span data-dcnode-id="2182" instrument_node="">
</span><p data-dcnode-id="2181"></p><span data-dcnode-id="2180" instrument_node="">
</span><h2 data-dcnode-id="2178" id="when-is-the-best-time-to-prune-old-apple-trees"><span data-dcnode-id="2179" instrument_node="">WHEN IS THE BEST TIME TO PRUNE OLD APPLE TREES?</span></h2><span data-dcnode-id="2177" instrument_node="">
</span><p data-dcnode-id="2175"><span data-dcnode-id="2176" instrument_node="">Timing is important when pruning an old apple tree. Winter pruning can be beneficial because there are no leaves on the branches, and you can clearly see the tree’s structure. A downside to winter pruning is that it often leads to vigorous growth. And that will make your old apple tree’s problem worse!</span></p><span data-dcnode-id="2174" instrument_node="">
</span><p data-dcnode-id="2169"><span data-dcnode-id="2173" instrument_node="">Sometimes it is better to prune during the early summer when the tree doesn’t have much energy to bounce back and grow even more. Before you decide when to prune your old apple tree, read more about </span><a data-dcnode-id="2171" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//orchardpeople.com/when-to-prune-fruit-trees/"><span data-dcnode-id="2172" instrument_node="">when to prune fruit trees here</span></a><span data-dcnode-id="2170" instrument_node="">. </span></p><span data-dcnode-id="2168" instrument_node="">
</span><figure class="wp-block-embed-youtube wp-block-embed is-type-video is-provider-youtube" data-dcnode-id="2153"><div class="lyte-wrapper" data-dcnode-id="2157" style="width:560px;max-width:100%;margin:5px auto;"><div class="lyte lP" data-dcnode-id="2158" id="WYL_FZMi4mszbYs"><div class="pL" data-dcnode-id="2161" data-src="//i.ytimg.com/vi/FZMi4mszbYs/hqdefault.jpg" id="lyte_FZMi4mszbYs"><div class="tC" data-dcnode-id="2166"><div class="tT" data-dcnode-id="2167"></div></div><div class="play" data-dcnode-id="2165"></div><div class="ctrl" data-dcnode-id="2162"><div class="Lctrl" data-dcnode-id="2164"></div><div class="Rctrl" data-dcnode-id="2163"></div></div></div><noscript data-dcnode-id="2159"><span data-dcnode-id="2160" instrument_node="">&lt;a href="https://youtu.be/FZMi4mszbYs"&gt;&lt;img src="https://i.ytimg.com/vi/FZMi4mszbYs/0.jpg" alt="" width=560 height=295 /&gt;&lt;br/&gt;Watch this video on YouTube&lt;/a&gt;</span></noscript></div></div><div class="lL" data-dcnode-id="2156" style="max-width:100%;width:560px;margin:5px auto;"></div><figcaption data-dcnode-id="2154"><span data-dcnode-id="2155" instrument_node="">The quality of your fruit tree pruning tools makes a difference. Learn more in this short video. </span></figcaption></figure><span data-dcnode-id="2152" instrument_node="">
</span><h2 data-dcnode-id="2150" id="how-to-prune-an-apple-tree-correctly"><span data-dcnode-id="2151" instrument_node="">how to prune an apple tree correctly ?</span></h2><span data-dcnode-id="2149" instrument_node="">
</span><p data-dcnode-id="2147"><span data-dcnode-id="2148" instrument_node="">Well, it is all fine and dandy to know what branches to cut on old apple trees. And it’s great to know how much of your tree you can remove each year (20% of the living canopy or less!). And it’s amazing to be able to make a knowledgeable decision on when to prune your fruit tree.</span></p><span data-dcnode-id="2146" instrument_node="">
</span><p data-dcnode-id="2144"><span data-dcnode-id="2145" instrument_node="">But it is essential to know how to make your cuts safely and effectively without damaging your tree, your property, or yourself! There are two main cuts when it comes to pruning – thinning out and heading back.</span></p><span data-dcnode-id="2143" instrument_node="">
</span><div class="wp-block-image" data-dcnode-id="2138"><figure class="aligncenter size-large is-resized" data-dcnode-id="2139"><img alt="Man holding handsaw and pruning a branch off of an old apple tree. " class="wp-image-36513" data-dcnode-id="2142" sizes="(max-width: 1024px) 100vw, 1024px" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//orchardpeople.com/wp-content/uploads/2021/03/pruning-handsaw-cut-collar-65645937_m-1024x683.jpeg&amp;raw" srcset="https://orchardpeople.com/wp-content/uploads/2021/03/pruning-handsaw-cut-collar-65645937_m-1024x683.jpeg 1024w, https://orchardpeople.com/wp-content/uploads/2021/03/pruning-handsaw-cut-collar-65645937_m-300x200.jpeg 300w, https://orchardpeople.com/wp-content/uploads/2021/03/pruning-handsaw-cut-collar-65645937_m-768x513.jpeg 768w, https://orchardpeople.com/wp-content/uploads/2021/03/pruning-handsaw-cut-collar-65645937_m-1536x1025.jpeg 1536w, https://orchardpeople.com/wp-content/uploads/2021/03/pruning-handsaw-cut-collar-65645937_m-2048x1367.jpeg 2048w, https://orchardpeople.com/wp-content/uploads/2021/03/pruning-handsaw-cut-collar-65645937_m-scaled.jpeg 1600w" width="800"><figcaption data-dcnode-id="2140"><span data-dcnode-id="2141" instrument_node="">A correct thinning out cut will have you removing an entire branch, but leaving the "collar" which looks like a tutleneck or ring around where the branch emerges. Photo credit: 123rf.</span></figcaption></figure></div><span data-dcnode-id="2137" instrument_node="">
</span><h3 data-dcnode-id="2135" id="thinning-out-cut"><span data-dcnode-id="2136" instrument_node="">Thinning out cut</span></h3><span data-dcnode-id="2134" instrument_node="">
</span><p data-dcnode-id="2132"><span data-dcnode-id="2133" instrument_node="">The thinning out cut is used to remove a branch completely. This is primarily used to increase air circulation in the canopy. In this technique, you will choose entire branches and remove them close to the trunk. Branches that emerge from the trunk are called scaffold branches.</span></p><span data-dcnode-id="2131" instrument_node="">
</span><p data-dcnode-id="2129"><span data-dcnode-id="2130" instrument_node="">But if you do this cut incorrectly, you may actually damage your tree!</span></p><span data-dcnode-id="2128" instrument_node="">
</span><p data-dcnode-id="2126"><span data-dcnode-id="2127" instrument_node="">So you must be careful to remove the branch right up to its “collar” without removing the collar. The collar looks a bit like a turtleneck or a ring that is right around the base of the branch. The collar is necessary as it has cells that allows the branch to eventually heal the pruning cut. So, when you remove the branch, be sure to leave the collar behind!</span></p><span data-dcnode-id="2125" instrument_node="">
</span><div class="wp-block-image" data-dcnode-id="2120"><figure class="aligncenter size-large is-resized" data-dcnode-id="2121"><img alt="collar on tree wound. Pruning old apple trees. " class="wp-image-36514" data-dcnode-id="2124" sizes="(max-width: 1024px) 100vw, 1024px" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//orchardpeople.com/wp-content/uploads/2021/03/pruning-collar-healing-140801022_m-1024x683.jpeg&amp;raw" srcset="https://orchardpeople.com/wp-content/uploads/2021/03/pruning-collar-healing-140801022_m-1024x683.jpeg 1024w, https://orchardpeople.com/wp-content/uploads/2021/03/pruning-collar-healing-140801022_m-300x200.jpeg 300w, https://orchardpeople.com/wp-content/uploads/2021/03/pruning-collar-healing-140801022_m-768x512.jpeg 768w, https://orchardpeople.com/wp-content/uploads/2021/03/pruning-collar-healing-140801022_m-1536x1024.jpeg 1536w, https://orchardpeople.com/wp-content/uploads/2021/03/pruning-collar-healing-140801022_m-2048x1365.jpeg 2048w, https://orchardpeople.com/wp-content/uploads/2021/03/pruning-collar-healing-140801022_m-scaled.jpeg 1600w" width="800"><figcaption data-dcnode-id="2122"><span data-dcnode-id="2123" instrument_node="">The collar of a branch that has been removed grows over the wound on a tree. Photo credit: 123rf.</span></figcaption></figure></div><span data-dcnode-id="2119" instrument_node="">
</span><p data-dcnode-id="2117"><span data-dcnode-id="2118" instrument_node="">Smaller branches can be removed with hand tools like a hand-pruner or a lopper. But larger branches may need to be removed with the help of a hand saw. On a thicker branch you’ll need to do a three-step cut to prevent the falling branch from ripping the bark at the side of the tree.</span></p><span data-dcnode-id="2116" instrument_node="">
</span><div class="wp-block-image" data-dcnode-id="2108"><figure class="aligncenter size-large is-resized" data-dcnode-id="2109"><img alt="" class="wp-image-36536" data-dcnode-id="2115" sizes="(max-width: 327px) 100vw, 327px" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//orchardpeople.com/wp-content/uploads/2021/03/Screen-Shot-2021-03-23-at-3.16.55-PM.png&amp;raw" srcset="https://orchardpeople.com/wp-content/uploads/2021/03/Screen-Shot-2021-03-23-at-3.16.55-PM.png 327w, https://orchardpeople.com/wp-content/uploads/2021/03/Screen-Shot-2021-03-23-at-3.16.55-PM-199x300.png 199w" width="500"><figcaption data-dcnode-id="2110"><span data-dcnode-id="2114" instrument_node="">A three cut approach helps protect your old apple tree from damage. This illustration comes from Susan Poizner's award-winning fruit tree care book </span><a data-dcnode-id="2112" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.amazon.com/gp/product/1570673527/ref%3Das_li_tl%3Fie%3DUTF8%26camp%3D1789%26creative%3D9325%26creativeASIN%3D1570673527%26linkCode%3Das2%26tag%3Dorchardpeop07-20%26linkId%3D7151dba4cc75201b3486d09e4c0e9220"><span data-dcnode-id="2113" instrument_node="">Growing Urban Orchards</span></a><span data-dcnode-id="2111" instrument_node="">.</span></figcaption></figure></div><span data-dcnode-id="2107" instrument_node="">
</span><p data-dcnode-id="2102"><span data-dcnode-id="2106" instrument_node="">This image from Susan Poizner’s award-winning fruit tree care book </span><a data-dcnode-id="2104" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.amazon.com/gp/product/1570673527/ref%3Das_li_tl%3Fie%3DUTF8%26camp%3D1789%26creative%3D9325%26creativeASIN%3D1570673527%26linkCode%3Das2%26tag%3Dorchardpeop07-20%26linkId%3D7151dba4cc75201b3486d09e4c0e9220"><span data-dcnode-id="2105" instrument_node="">Growing Urban Orchards</span></a><span data-dcnode-id="2103" instrument_node=""> shows you how.</span></p><span data-dcnode-id="2101" instrument_node="">
</span><p data-dcnode-id="2099"><span data-dcnode-id="2100" instrument_node="">First make a cut on the bottom of the branch. Cut upwards into the branch to about halfway through the branch. The second cut is on the top of the branch and a further away from the trunk. Now you can make your final downward cut. With this branch now removed, the branch collar will eventually grow over the wound. This will help prevent pests and diseases from finding their way into your old apple tree.</span></p><span data-dcnode-id="2098" instrument_node="">
</span><div class="wp-block-image" data-dcnode-id="2093"><figure class="aligncenter size-large is-resized" data-dcnode-id="2094"><img alt="hand holding blue hand pruners while pruning an old fruit tree. " class="wp-image-36515" data-dcnode-id="2097" sizes="(max-width: 1024px) 100vw, 1024px" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//orchardpeople.com/wp-content/uploads/2021/03/Pruning-past-a-bud-166020731_m-1024x683.jpeg&amp;raw" srcset="https://orchardpeople.com/wp-content/uploads/2021/03/Pruning-past-a-bud-166020731_m-1024x683.jpeg 1024w, https://orchardpeople.com/wp-content/uploads/2021/03/Pruning-past-a-bud-166020731_m-300x200.jpeg 300w, https://orchardpeople.com/wp-content/uploads/2021/03/Pruning-past-a-bud-166020731_m-768x512.jpeg 768w, https://orchardpeople.com/wp-content/uploads/2021/03/Pruning-past-a-bud-166020731_m-1536x1024.jpeg 1536w, https://orchardpeople.com/wp-content/uploads/2021/03/Pruning-past-a-bud-166020731_m-2048x1365.jpeg 2048w, https://orchardpeople.com/wp-content/uploads/2021/03/Pruning-past-a-bud-166020731_m-scaled.jpeg 1600w" width="800"><figcaption data-dcnode-id="2095"><span data-dcnode-id="2096" instrument_node="">Heading back cuts are when you shorten a branch by cutting 1/4 of an inch past a bud. Photo credit: 123rf</span></figcaption></figure></div><span data-dcnode-id="2092" instrument_node="">
</span><h3 data-dcnode-id="2090" id="heading-back-cut"><span data-dcnode-id="2091" instrument_node="">Heading back cut</span></h3><span data-dcnode-id="2089" instrument_node="">
</span><p data-dcnode-id="2087"><span data-dcnode-id="2088" instrument_node="">The heading back cut is used to shorten branches. To shorten a scaffold branch first determine the length it should be cut to. Keep in mind that you want your branch to be strong and stable. With that length in mind, make your cut just past a healthy bud and voila – you have a heading back cut!</span></p><span data-dcnode-id="2086" instrument_node="">
</span><figure class="wp-block-embed-youtube wp-block-embed is-type-video is-provider-youtube" data-dcnode-id="2071"><div class="lyte-wrapper" data-dcnode-id="2075" style="width:560px;max-width:100%;margin:5px auto;"><div class="lyte lP" data-dcnode-id="2076" id="WYL_mrQNO6-orzc"><div class="pL" data-dcnode-id="2079" data-src="//i.ytimg.com/vi/mrQNO6-orzc/hqdefault.jpg" id="lyte_mrQNO6-orzc"><div class="tC" data-dcnode-id="2084"><div class="tT" data-dcnode-id="2085"></div></div><div class="play" data-dcnode-id="2083"></div><div class="ctrl" data-dcnode-id="2080"><div class="Lctrl" data-dcnode-id="2082"></div><div class="Rctrl" data-dcnode-id="2081"></div></div></div><noscript data-dcnode-id="2077"><span data-dcnode-id="2078" instrument_node="">&lt;a href="https://youtu.be/mrQNO6-orzc"&gt;&lt;img src="https://i.ytimg.com/vi/mrQNO6-orzc/0.jpg" alt="" width=560 height=295 /&gt;&lt;br/&gt;Watch this video on YouTube&lt;/a&gt;</span></noscript></div></div><div class="lL" data-dcnode-id="2074" style="max-width:100%;width:560px;margin:5px auto;"></div><figcaption data-dcnode-id="2072"><span data-dcnode-id="2073" instrument_node="">It's important to keep your pruning tools sharp and clean to ensure clean cuts. Learn more in this short video. </span></figcaption></figure><span data-dcnode-id="2070" instrument_node="">
</span><h2 data-dcnode-id="2068" id="maintaining-your-fruit-tree-pruning-tools"><span data-dcnode-id="2069" instrument_node="">Maintaining your fruit tree pruning tools</span></h2><span data-dcnode-id="2067" instrument_node="">
</span><p data-dcnode-id="2065"><span data-dcnode-id="2066" instrument_node="">When you're pruning your old apple trees, you need to make sure that your tools are clean and sharp. Listen to this podcast (or watch the video) to learn more!</span></p><span data-dcnode-id="2064" instrument_node="">
</span><p data-dcnode-id="2059"><span data-dcnode-id="2063" instrument_node="">And if you need to buy excellent fruit tree pruning tools, check out the tools that we recommend in our </span><a data-dcnode-id="2061" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//orchardpeople.com/shop/"><span data-dcnode-id="2062" instrument_node="">online store</span></a><span data-dcnode-id="2060" instrument_node="">. </span></p><span data-dcnode-id="2058" instrument_node="">

</span><h2 data-dcnode-id="1259" id="why-save-old-apple-trees"><span data-dcnode-id="1260" instrument_node="">WHY SAVE OLD APPLE TREES?</span></h2><span data-dcnode-id="1258" instrument_node="">
</span><p data-dcnode-id="1256"><span data-dcnode-id="1257" instrument_node="">Once you start pruning your old apple tree, you will see that the quality of the fruit will improve. That’s because the tree will not have to support as many branches and instead it can use that energy into improving fruit quality.</span></p><span data-dcnode-id="1255" instrument_node="">
</span><figure class="wp-block-image size-large is-resized" data-dcnode-id="1251"><img alt="Owl chick in old apple tree | pruning old apple trees" class="wp-image-36508" data-dcnode-id="1254" sizes="(max-width: 1024px) 100vw, 1024px" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//share.transistor.fm/wp-content/uploads/2021/03/little-owl-chick-3-1024x768.jpg&amp;raw" srcset="https://orchardpeople.com/wp-content/uploads/2021/03/little-owl-chick-3-1024x768.jpg 1024w, https://orchardpeople.com/wp-content/uploads/2021/03/little-owl-chick-3-300x225.jpg 300w, https://orchardpeople.com/wp-content/uploads/2021/03/little-owl-chick-3-768x576.jpg 768w, https://orchardpeople.com/wp-content/uploads/2021/03/little-owl-chick-3-1536x1152.jpg 1536w, https://orchardpeople.com/wp-content/uploads/2021/03/little-owl-chick-3-2048x1536.jpg 2048w, https://orchardpeople.com/wp-content/uploads/2021/03/little-owl-chick-3-scaled.jpg 1600w" width="800"><figcaption data-dcnode-id="1252"><span data-dcnode-id="1253" instrument_node="">It's important to keep old apple trees as they provide habitat and food for wildlife like this owl chick. Photo credit: Bob Lever</span></figcaption></figure><span data-dcnode-id="1250" instrument_node="">
</span><p data-dcnode-id="1242"><span data-dcnode-id="1249" instrument_node="">Also, if you can save an old apple tree and improve its health, you can begin to graft different varieties of fruit on branches! You may just have a Mcintosh apple tree, but with grafting you can get your tree to produce Gala, Honeycrisp or one of the many heirloom and other apple varieties. You can </span><a data-dcnode-id="1247" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//share.transistor.fm/tasting-apple-varieties/"><span data-dcnode-id="1248" instrument_node="">explore different apple varieties in this article</span></a><span data-dcnode-id="1246" instrument_node="">. Then, </span><a data-dcnode-id="1244" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//share.transistor.fm/grafting-fruit-trees/"><span data-dcnode-id="1245" instrument_node="">learn more about grafting in this article</span></a><span data-dcnode-id="1243" instrument_node="">. </span></p><span data-dcnode-id="1241" instrument_node="">
</span><div class="wp-block-image" data-dcnode-id="1236"><figure class="aligncenter size-large is-resized" data-dcnode-id="1237"><img alt="Old apple tree in Bob Lever's orchard. The trunk is hollow but it still survives. Pruning old apple trees. " class="wp-image-36573" data-dcnode-id="1240" sizes="(max-width: 768px) 100vw, 768px" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//share.transistor.fm/wp-content/uploads/2021/03/Bob-Lever-Tree-768x1024.jpg&amp;raw" srcset="https://orchardpeople.com/wp-content/uploads/2021/03/Bob-Lever-Tree-768x1024.jpg 768w, https://orchardpeople.com/wp-content/uploads/2021/03/Bob-Lever-Tree-225x300.jpg 225w, https://orchardpeople.com/wp-content/uploads/2021/03/Bob-Lever-Tree-1152x1536.jpg 1152w, https://orchardpeople.com/wp-content/uploads/2021/03/Bob-Lever-Tree-1536x2048.jpg 1536w, https://orchardpeople.com/wp-content/uploads/2021/03/Bob-Lever-Tree-scaled.jpg 1200w" width="800"><figcaption data-dcnode-id="1238"><span data-dcnode-id="1239" instrument_node="">This century-old apple tree in Bob Lever's orchard is an heirloom tree introduced in 1894. It was known then as South Lincoln Beauty and was later renamed Allington Pippin.. Bob's tree was planted in the early 1900s. Today it is hollow but healthy. It still produces apples and provides habitat for wildlife and beneficial insects. In recent years, the scaffold branches were removed to prevent the tree from splitting. Now the tree is being supported by epicormic growth (water sprouts!). By pruning old apple trees and caring for them, you may also be preserving unique apple cultivars. Photo credit: Bob Lever.</span></figcaption></figure></div><span data-dcnode-id="1235" instrument_node="">
</span><p data-dcnode-id="1233"><span data-dcnode-id="1234" instrument_node="">Another reason to prune old apple trees is for the environment. Healthy old apple trees bloom with flowers that contain nectar and pollen that species like bees and birds can feed on. Old apple trees can also become homes for critters like birds that nest in the hollow trunks. </span></p><span data-dcnode-id="1232" instrument_node="">
</span><p data-dcnode-id="1230"><span data-dcnode-id="1231" instrument_node="">You can learn more about pruning old apple trees by listening to this episode of The Urban Forestry Radio Show and Podcast with Bob Lever.</span></p><span data-dcnode-id="1229" instrument_node="">
