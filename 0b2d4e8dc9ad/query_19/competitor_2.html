</span><header data-dcnode-id="834"><span data-dcnode-id="853" instrument_node="">
</span><h1 data-dcnode-id="851"><span data-dcnode-id="852" instrument_node="">How to Winter Prune Apple Trees</span></h1><p class="author" data-dcnode-id="840"><time data-dcnode-id="849" datetime="2017-45-30"><span data-dcnode-id="850" instrument_node="">30 November 2017</span></time><span data-dcnode-id="848" instrument_node="">, written by </span><cite data-dcnode-id="845"><a data-dcnode-id="846" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.instagram.com/that.vegetablist/" onclick="pageTracker._trackEvent('outbound',this.href,location.href)" rel="author" target="_blank"><span data-dcnode-id="847" instrument_node="">Ann Marie Hendry</span></a></cite><span data-dcnode-id="844" instrument_node=""> </span><img alt="gb flag" class="lazyloaded" data-dcnode-id="843" data-src="https://www.growveg.com/assets/images/growblog/gb.jpg" height="12" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.growveg.com/assets/images/growblog/gb.jpg&amp;raw" width="25"><noscript data-dcnode-id="841"><span data-dcnode-id="842" instrument_node="">&lt;img width='25' height='12' src="https://www.growveg.com/assets/images/growblog/gb.jpg" alt="gb flag" class="flag" /&gt;</span></noscript></p><span data-dcnode-id="839" instrument_node="">
</span><span data-dcnode-id="837" instrument_node="">
</span><img alt="A well-maintained Bramley apple tree covered in blossom" class="main-blog-img" data-dcnode-id="836" id="ctl00_main_imgHeader" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//gardenplannerwebsites.azureedge.net/blog/bramley-apple-flowering-2x.jpg&amp;raw"><span data-dcnode-id="835" instrument_node="">
</span></header><span data-dcnode-id="833" instrument_node="">
</span><div data-dcnode-id="701" id="ctl00_main_blogArticles"><span data-dcnode-id="832" instrument_node="">
</span><p data-dcnode-id="830"><span data-dcnode-id="831" instrument_node="">Some gardeners get the raving heebie-jeebies when faced with a pruning task. If you’re a nervous pruner, apple trees are a good place to start – they’re tough plants and very forgiving. But to get the best from them it pays to learn a few simple techniques so you know when, what and how to prune effectively. </span></p><span data-dcnode-id="829" instrument_node="">
</span><p data-dcnode-id="827"><span data-dcnode-id="828" instrument_node="">So whether you’ve got just one or two apple trees to prune or a whole orchardful, arm yourself with secateurs, loppers and a pruning saw, follow the guidelines below, and fear no more. </span></p><span data-dcnode-id="826" instrument_node="">
</span><h2 data-dcnode-id="824"><span data-dcnode-id="825" instrument_node="">When to Prune Apple Trees </span></h2><span data-dcnode-id="823" instrument_node="">
</span><p data-dcnode-id="821"><span data-dcnode-id="822" instrument_node="">Summer pruning of apples helps encourage fruiting and flowering, but winter pruning is essential for controlling their shape and vigour. </span></p><span data-dcnode-id="820" instrument_node="">
</span><p data-dcnode-id="818"><span data-dcnode-id="819" instrument_node="">Winter pruning commences, unsurprisingly, during the colder months. Don’t be tempted to prune too soon in the belief that doing so in warmer weather will be better for the tree. Pruning apple trees in the autumn can encourage them to send out fresh new shoots that aren’t tough enough to withstand cold weather. Wait until the leaves have fallen off instead. This means that they’re fully dormant and won’t grow any more until the weather warms up. </span></p><span data-dcnode-id="817" instrument_node="">
</span><p data-dcnode-id="815"><span data-dcnode-id="816" instrument_node="">Pruning apple trees in frosty weather does no harm whatsoever. As long as they’re dormant they won’t mind a little surgery, no matter how low the temperature drops. </span></p><span data-dcnode-id="814" instrument_node="">
</span><figure class="figure" data-dcnode-id="807"><img alt="“Dead" an="" apple="" class="lazyload full-img" data-dcnode-id="813" data-src="https://gardenplannerwebsites.azureedge.net/blog/dead-branch-on-apple-tree-2x.jpg" height="350" old="" on="" tree”="" width="700" wood=""><noscript data-dcnode-id="811"><span data-dcnode-id="812" instrument_node="">&lt;img width="700" height="350" class="full-img" src="https://gardenplannerwebsites.azureedge.net/blog/dead-branch-on-apple-tree-2x.jpg" alt=“Dead wood on an old apple tree” /&gt;</span></noscript><span data-dcnode-id="810" instrument_node="">
</span><figcaption class="caption" data-dcnode-id="808"><span data-dcnode-id="809" instrument_node="">Cut out the 3Ds – dead, dying and diseased wood</span></figcaption></figure><span data-dcnode-id="806" instrument_node="">
</span><h2 data-dcnode-id="804"><span data-dcnode-id="805" instrument_node="">How to Prune an Apple Tree</span></h2><span data-dcnode-id="803" instrument_node="">
</span><p data-dcnode-id="801"><span data-dcnode-id="802" instrument_node="">The main aim when pruning is to produce a healthy tree. Aim for a goblet shape with plenty of airflow to the centre of the tree. This helps combat potential issues with fungal diseases and lets in light to ripen the fruits. </span></p><span data-dcnode-id="800" instrument_node="">
</span><p data-dcnode-id="798"><span data-dcnode-id="799" instrument_node="">There are five main points you need to keep in mind while pruning: </span></p><span data-dcnode-id="797" instrument_node="">
</span><h3 data-dcnode-id="795"><span data-dcnode-id="796" instrument_node="">1. Remove the 3Ds. </span></h3><span data-dcnode-id="794" instrument_node="">
</span><p data-dcnode-id="792"><span data-dcnode-id="793" instrument_node="">That’s diseased, dying and dead wood. If the wood shows obvious signs of any malady, amputate it. Make the cut into healthy wood to ensure the problem doesn’t spread. </span></p><span data-dcnode-id="791" instrument_node="">
</span><h3 data-dcnode-id="789"><span data-dcnode-id="790" instrument_node="">2. Remove crossing branches. </span></h3><span data-dcnode-id="788" instrument_node="">
</span><p data-dcnode-id="786"><span data-dcnode-id="787" instrument_node="">If two branches cross, they will rub away the bark and potentially provide an entry point for disease. They will also make it harder air to circulate, and make harvesting more awkward. </span></p><span data-dcnode-id="785" instrument_node="">
</span><figure class="figure" data-dcnode-id="778"><img alt="“Crossing" an="" apple="" branches="" class="lazyload full-img" data-dcnode-id="784" data-src="https://gardenplannerwebsites.azureedge.net/blog/apple-tree-branches-crossing-2x.jpg" height="350" on="" tree”="" width="700"><noscript data-dcnode-id="782"><span data-dcnode-id="783" instrument_node="">&lt;img width="700" height="350" class="full-img" src="https://gardenplannerwebsites.azureedge.net/blog/apple-tree-branches-crossing-2x.jpg" alt=“Crossing branches on an apple tree” /&gt;</span></noscript><span data-dcnode-id="781" instrument_node="">
</span><figcaption class="caption" data-dcnode-id="779"><span data-dcnode-id="780" instrument_node="">Cut out crossing branches to prevent them from rubbing, which can provide access points for disease</span></figcaption></figure><span data-dcnode-id="777" instrument_node="">
</span><p data-dcnode-id="775"><span data-dcnode-id="776" instrument_node="">Try to imagine how the branches will look when weighed down with leaves and fruits; will they rub against a branch below? If you spot two branches that are likely to cross in the future, prune one of them out now. It’s an easier job to make these cuts while they’re still small. </span></p><span data-dcnode-id="774" instrument_node="">
</span><p data-dcnode-id="772"><span data-dcnode-id="773" instrument_node="">Think of any inward-pointing branches as crossing ones, and remove. </span></p><span data-dcnode-id="771" instrument_node="">
</span><h3 data-dcnode-id="769"><span data-dcnode-id="770" instrument_node="">3. Make the biggest cuts first. </span></h3><span data-dcnode-id="768" instrument_node="">
</span><p data-dcnode-id="766"><span data-dcnode-id="767" instrument_node="">You can spend an awful lot of time removing a small dead twig here and a spindly inward-turning shoot there, but when thinking about removing a small branch it’s a good idea to trace it back to the trunk to see if there are other problems first. You might find that it crosses with another further back and that it therefore should be cut out closer to the trunk. </span></p><span data-dcnode-id="765" instrument_node="">
</span><h3 data-dcnode-id="763"><span data-dcnode-id="764" instrument_node="">4. Make clean cuts. </span></h3><span data-dcnode-id="762" instrument_node="">
</span><p data-dcnode-id="760"><span data-dcnode-id="761" instrument_node="">Use clean, sharp pruning tools. If you’re doing a lot of pruning you may need to stop occasionally and re-sharpen the blade. High-quality tools will retain an edge for much longer. </span></p><span data-dcnode-id="759" instrument_node="">
</span><figure class="figure" data-dcnode-id="752"><img alt="“Pruning" an="" apple="" class="lazyload port-img" data-dcnode-id="758" data-src="https://gardenplannerwebsites.azureedge.net/blog/pruning-crab-apple-2x.jpg" tree”=""><noscript data-dcnode-id="756"><span data-dcnode-id="757" instrument_node="">&lt;img class="port-img" src="https://gardenplannerwebsites.azureedge.net/blog/pruning-crab-apple-2x.jpg" alt=“Pruning an apple tree” /&gt;</span></noscript><span data-dcnode-id="755" instrument_node="">
</span><figcaption class="caption" data-dcnode-id="753"><span data-dcnode-id="754" instrument_node="">Prune flush with the branch collar, but not into it.</span></figcaption></figure><span data-dcnode-id="751" instrument_node="">
</span><p data-dcnode-id="749"><span data-dcnode-id="750" instrument_node="">Always cut just above a healthy outward-facing bud. This is where next year’s growth will spring from. If you need to remove a whole branch, make your cut close to – but not into – the main branch or trunk. Look for the raised ‘collar’ where the branch joins and cut flush with that. </span></p><span data-dcnode-id="748" instrument_node="">
</span><p data-dcnode-id="746"><span data-dcnode-id="747" instrument_node="">When using a saw to prune larger branches, first make a shallow undercut before sawing through from above. That way if the branch breaks off as you’re cutting it, it won’t rip off a long section of the tree’s protective bark. </span></p><span data-dcnode-id="745" instrument_node="">
</span><p data-dcnode-id="743"><span data-dcnode-id="744" instrument_node="">Prune very thick or long limbs in sections. It may seem like more work but it’s much safer, and again it’s less likely to cause damage if the branch breaks under its own weight as you’re cutting. </span></p><span data-dcnode-id="742" instrument_node="">
</span><h3 data-dcnode-id="740"><span data-dcnode-id="741" instrument_node="">5. Take your time. </span></h3><span data-dcnode-id="739" instrument_node="">
</span><p data-dcnode-id="737"><span data-dcnode-id="738" instrument_node="">Keep stepping back and checking the overall shape of the canopy to make sure it looks balanced before making your next cut. A little change in perspective can make a big difference! </span></p><span data-dcnode-id="736" instrument_node="">
</span><figure class="figure" data-dcnode-id="729"><img a="" alt="“’Heading" apple="" back’="" class="lazyload port-img" data-dcnode-id="735" data-src="https://gardenplannerwebsites.azureedge.net/blog/heading-cuts-on-young-apple-tree-2x.jpg" tree”="" young=""><noscript data-dcnode-id="733"><span data-dcnode-id="734" instrument_node="">&lt;img class="port-img" src="https://gardenplannerwebsites.azureedge.net/blog/heading-cuts-on-young-apple-tree-2x.jpg" alt=“’Heading back’ a young apple tree” /&gt;</span></noscript><span data-dcnode-id="732" instrument_node="">
</span><figcaption class="caption" data-dcnode-id="730"><span data-dcnode-id="731" instrument_node="">Remove a quarter to a third of new growth on young apple trees to thicken the branches</span></figcaption></figure><span data-dcnode-id="728" instrument_node="">
</span><h2 data-dcnode-id="726"><span data-dcnode-id="727" instrument_node="">Pruning New Apple Trees</span></h2><span data-dcnode-id="725" instrument_node="">
</span><p data-dcnode-id="723"><span data-dcnode-id="724" instrument_node="">Young apple trees benefit from ‘heading back’, which helps keep branches compact and sturdy enough to take the weight of lots of fruit. Heading cuts should remove a quarter to a third of the previous season’s growth. </span></p><span data-dcnode-id="722" instrument_node="">
</span><p data-dcnode-id="720"><span data-dcnode-id="721" instrument_node="">It’s also worth reducing the height of the ‘leader’, or main stem, by the same amount. This redirects the tree’s energy into producing new growth lower down, which makes subsequent pruning and harvesting easier. </span></p><span data-dcnode-id="719" instrument_node="">
</span><figure class="figure" data-dcnode-id="712"><img alt="“Congested" an="" apple="" branches="" class="lazyload port-img" data-dcnode-id="718" data-src="https://gardenplannerwebsites.azureedge.net/blog/congested-apple-branches-2x.jpg" on="" tree”=""><noscript data-dcnode-id="716"><span data-dcnode-id="717" instrument_node="">&lt;img class="port-img" src="https://gardenplannerwebsites.azureedge.net/blog/congested-apple-branches-2x.jpg" alt=“Congested branches on an apple tree” /&gt;</span></noscript><span data-dcnode-id="715" instrument_node="">
</span><figcaption class="caption" data-dcnode-id="713"><span data-dcnode-id="714" instrument_node="">When lots of branches become very congested, it’s time to think about renovation pruning</span></figcaption></figure><span data-dcnode-id="711" instrument_node="">
</span><h2 data-dcnode-id="709"><span data-dcnode-id="710" instrument_node="">Renovation Pruning Neglected Apple Trees</span></h2><span data-dcnode-id="708" instrument_node="">
</span><p data-dcnode-id="706"><span data-dcnode-id="707" instrument_node="">If your apple tree is old and neglected, it’s likely to have developed a scruff of spindly, congested branches and some larger crossing ones too. These will need to be thinned out. This can mean a really big pruning job, but it’s important to pace yourself and not try to do it all at once. Spread it out over two or three winters. Cutting out too much in one go can cause rapid regrowth in spring. This may sound great, but what tends to happen is that the growth is vertical, lush, leafy – and non-fruit-bearing. So take your time! Your arm muscles will thank you too. </span></p><span data-dcnode-id="705" instrument_node="">
</span><p data-dcnode-id="703"><span data-dcnode-id="704" instrument_node="">Once you’ve finished pruning, step back again and take a final look. The tree should look balanced, without areas of congested growth or any excessively long shoots.  There – that wasn’t too scary, was it? </span></p><span data-dcnode-id="702" instrument_node="">
</span></div><span data-dcnode-id="700" instrument_node="">

</span><div class="bubble" data-dcnode-id="603" id="comment"><span data-dcnode-id="610" instrument_node="">"Really helpful, thank you!"</span><br data-dcnode-id="609"><span class="comment-author" data-dcnode-id="607"><span data-dcnode-id="608" instrument_node="">Jane</span></span><span data-dcnode-id="606" instrument_node=""> </span><span class="comment-date" data-dcnode-id="604"><span data-dcnode-id="605" instrument_node="">on Friday 1 December 2017</span></span></div><div class="bubble author-comment" data-dcnode-id="595" id="comment"><span data-dcnode-id="602" instrument_node="">"You're very welcome, glad you found it useful!"</span><br data-dcnode-id="601"><span class="comment-author" data-dcnode-id="599"><span data-dcnode-id="600" instrument_node="">Ann Marie Hendry</span></span><span data-dcnode-id="598" instrument_node=""> </span><span class="comment-date" data-dcnode-id="596"><span data-dcnode-id="597" instrument_node="">on Friday 1 December 2017</span></span></div><div class="bubble" data-dcnode-id="587" id="comment"><span data-dcnode-id="594" instrument_node="">"It seems all videos tell me what to prune out... but nobody tells me what NOT to remove.  I suspect that last spring I removed twigs that were meant to produce fruit.When I prune in the spring all the branches look the same to me.  How do I recognize branches or shoots (big and small) that will develop flower buds or fruit buds or leaf buds?  How many of each of those should I leave on the tree?"</span><br data-dcnode-id="593"><span class="comment-author" data-dcnode-id="591"><span data-dcnode-id="592" instrument_node="">Ted</span></span><span data-dcnode-id="590" instrument_node=""> </span><span class="comment-date" data-dcnode-id="588"><span data-dcnode-id="589" instrument_node="">on Saturday 5 May 2018</span></span></div><div class="bubble author-comment" data-dcnode-id="579" id="comment"><span data-dcnode-id="586" instrument_node="">"Hi Ted. You can usually tell the buds that will become flowers and then fruits as they're fatter and larger than the ones that will produce leaves. 

If you know whether the apple variety you're growing is tip-bearing or spur-bearing, this can also help you guess where fruits are likely to be borne. Tip-bearers produce most fruits at the end of their shoots, while spur-bearers (which are much more common) produce them on short shoots in older wood. Just to confuse things, some varieties do both! 

Prudence in pruning is always wise - only remove what you absolutely need to for the health and continued vigour of the tree. Some years you may find you don't even need to do any pruning at all."</span><br data-dcnode-id="585"><span class="comment-author" data-dcnode-id="583"><span data-dcnode-id="584" instrument_node="">Ann Marie Hendry</span></span><span data-dcnode-id="582" instrument_node=""> </span><span class="comment-date" data-dcnode-id="580"><span data-dcnode-id="581" instrument_node="">on Wednesday 9 May 2018</span></span></div><div class="bubble" data-dcnode-id="571" id="comment"><span data-dcnode-id="578" instrument_node="">"Thank you.  Your answer addresses my question very nicely and I'm learning some new things.  On the other hand, I'm told to prune or trim in early spring before buds appear ...so do I just leave all shoots (or spurs) on except the "waterspouts" that go straight up?"</span><br data-dcnode-id="577"><span class="comment-author" data-dcnode-id="575"><span data-dcnode-id="576" instrument_node="">Ted</span></span><span data-dcnode-id="574" instrument_node=""> </span><span class="comment-date" data-dcnode-id="572"><span data-dcnode-id="573" instrument_node="">on Thursday 10 May 2018</span></span></div><div class="bubble author-comment" data-dcnode-id="563" id="comment"><span data-dcnode-id="570" instrument_node="">"Hi Ted. Sorry for the delay in replying! A light touch when pruning is sensible. Heavy pruning often results in lots of those watershoots you mentioned being produced. For annual maintenance pruning you will only need to prune out the 3Ds (dead, dying and diseased wood), plus any branches that are crossing and likely to rub away at each other. Don't prune any healthy-looking branch that isn't causing a specific problem."</span><br data-dcnode-id="569"><span class="comment-author" data-dcnode-id="567"><span data-dcnode-id="568" instrument_node="">Ann Marie Hendry</span></span><span data-dcnode-id="566" instrument_node=""> </span><span class="comment-date" data-dcnode-id="564"><span data-dcnode-id="565" instrument_node="">on Tuesday 22 May 2018</span></span></div><div class="bubble" data-dcnode-id="555" id="comment"><span data-dcnode-id="562" instrument_node="">"Good to read an Aussie post on pruning. Last year my two trees produced virtually no fruit.
Think I've discovered ehy?
Probably sprayed too late when tips were showing green.  Spray caused many apples not to grow. Used lime sulphur but it warns one now. 
Would have loved dome images. Great post"</span><br data-dcnode-id="561"><span class="comment-author" data-dcnode-id="559"><span data-dcnode-id="560" instrument_node="">Elle</span></span><span data-dcnode-id="558" instrument_node=""> </span><span class="comment-date" data-dcnode-id="556"><span data-dcnode-id="557" instrument_node="">on Sunday 29 July 2018</span></span></div><div class="bubble author-comment" data-dcnode-id="547" id="comment"><span data-dcnode-id="554" instrument_node="">"Hi Elle, glad you enjoyed the article. Sorry to disappoint you though - I'm actually a UK gardener! The principles should be broadly the same however. "</span><br data-dcnode-id="553"><span class="comment-author" data-dcnode-id="551"><span data-dcnode-id="552" instrument_node="">Ann Marie Hendry</span></span><span data-dcnode-id="550" instrument_node=""> </span><span class="comment-date" data-dcnode-id="548"><span data-dcnode-id="549" instrument_node="">on Wednesday 1 August 2018</span></span></div><div class="bubble" data-dcnode-id="539" id="comment"><span data-dcnode-id="546" instrument_node="">"I inherited an old apple tree when I moved into my house. I pruned it fairly hard the first year to tidy it up, but since then I prune it in spring, only removing any dead or diseased wood or crossing branches. There are always dozens of watershoots which I also remove. Is there something I'm doing wrong to cause so many of these watershoots? Should I be doing my pruning now and leaving it in spring? If so, do I still remove the watershoots?"</span><br data-dcnode-id="545"><span class="comment-author" data-dcnode-id="543"><span data-dcnode-id="544" instrument_node="">Laura</span></span><span data-dcnode-id="542" instrument_node=""> </span><span class="comment-date" data-dcnode-id="540"><span data-dcnode-id="541" instrument_node="">on Friday 27 December 2019</span></span></div><div class="bubble" data-dcnode-id="531" id="comment"><span data-dcnode-id="538" instrument_node="">"Hi Laura
Prune hard now, this time of the year is far better for the tree and will control shoots come Spring."</span><br data-dcnode-id="537"><span class="comment-author" data-dcnode-id="535"><span data-dcnode-id="536" instrument_node="">Jo</span></span><span data-dcnode-id="534" instrument_node=""> </span><span class="comment-date" data-dcnode-id="532"><span data-dcnode-id="533" instrument_node="">on Monday 30 December 2019</span></span></div><div class="bubble" data-dcnode-id="523" id="comment"><span data-dcnode-id="530" instrument_node="">"Hello. I have only 4 apple trees , about 5years old.   I believe they have coral spot fungus.  If I was to cut all the spotted areas away, I would lose all or at least 50% of the branches.  They are at least 15 feet apart   Can they be saved?"</span><br data-dcnode-id="529"><span class="comment-author" data-dcnode-id="527"><span data-dcnode-id="528" instrument_node="">Debbie</span></span><span data-dcnode-id="526" instrument_node=""> </span><span class="comment-date" data-dcnode-id="524"><span data-dcnode-id="525" instrument_node="">on Wednesday 20 May 2020</span></span></div><div class="bubble author-comment" data-dcnode-id="515" id="comment"><span data-dcnode-id="522" instrument_node="">"Hi Debbie. If you're sure it's coral spot, that's usually a sign that the plant is in poor health. It seems to grow on wood that is already dead or dying, so there's little to lose by pruning it all out. Do it on a dry day, as there is less risk of spreading the infection further, and burn or otherwise dispose of the prunings - don't compost or shred them.

This doesn't resolve the question of why the fungus has colonised them however, so I'd look carefully at your growing conditions and make sure they have everything they need and are not waterlogged or otherwise stressed. Give them a good mulch of compost to help them get over both the disease and the radical pruning that it sounds like they need. 

Good luck!"</span><br data-dcnode-id="521"><span class="comment-author" data-dcnode-id="519"><span data-dcnode-id="520" instrument_node="">Ann Marie Hendry</span></span><span data-dcnode-id="518" instrument_node=""> </span><span class="comment-date" data-dcnode-id="516"><span data-dcnode-id="517" instrument_node="">on Saturday 23 May 2020</span></span></div><div class="bubble" data-dcnode-id="507" id="comment"><span data-dcnode-id="514" instrument_node="">"Brilliant. Not a word wasted. Sagest advice ever. I can't wait to grow some Cox's Orange Pippins here in the Melbourne area. Thank you so much, AMH."</span><br data-dcnode-id="513"><span class="comment-author" data-dcnode-id="511"><span data-dcnode-id="512" instrument_node="">BJ</span></span><span data-dcnode-id="510" instrument_node=""> </span><span class="comment-date" data-dcnode-id="508"><span data-dcnode-id="509" instrument_node="">on Sunday 24 May 2020</span></span></div><div class="bubble author-comment" data-dcnode-id="499" id="comment"><span data-dcnode-id="506" instrument_node="">"I'm glad you found it useful BJ!"</span><br data-dcnode-id="505"><span class="comment-author" data-dcnode-id="503"><span data-dcnode-id="504" instrument_node="">Ann Marie</span></span><span data-dcnode-id="502" instrument_node=""> </span><span class="comment-date" data-dcnode-id="500"><span data-dcnode-id="501" instrument_node="">on Tuesday 26 May 2020</span></span></div><div class="bubble" data-dcnode-id="491" id="comment"><span data-dcnode-id="498" instrument_node="">"Thanks - I was anxious about pruning in January, thinking maybe I should wait until February, but now I think it's OK. The temperature is running generally in the teens, 20s, and 30s. I'm in Vermont."</span><br data-dcnode-id="497"><span class="comment-author" data-dcnode-id="495"><span data-dcnode-id="496" instrument_node="">Steve</span></span><span data-dcnode-id="494" instrument_node=""> </span><span class="comment-date" data-dcnode-id="492"><span data-dcnode-id="493" instrument_node="">on Wednesday 13 January 2021</span></span></div><div class="bubble author-comment" data-dcnode-id="483" id="comment"><span data-dcnode-id="490" instrument_node="">"Apple trees are pretty tough Steve. Ideally, prune when temperatures are above freezing, but they will usually recover from any pruning cuts. "</span><br data-dcnode-id="489"><span class="comment-author" data-dcnode-id="487"><span data-dcnode-id="488" instrument_node="">Ann Marie Hendry</span></span><span data-dcnode-id="486" instrument_node=""> </span><span class="comment-date" data-dcnode-id="484"><span data-dcnode-id="485" instrument_node="">on Wednesday 20 January 2021</span></span></div><div class="bubble" data-dcnode-id="475" id="comment"><span data-dcnode-id="482" instrument_node="">"Hi, I planted one semi-dwarf and one regular size potted apple tree last autumn.  They were leafed and healthy.  One year later they are still leafy but have no branches.  Should I shorten (prune) them to encourage branching?  "</span><br data-dcnode-id="481"><span class="comment-author" data-dcnode-id="479"><span data-dcnode-id="480" instrument_node="">Joanna Moran</span></span><span data-dcnode-id="478" instrument_node=""> </span><span class="comment-date" data-dcnode-id="476"><span data-dcnode-id="477" instrument_node="">on Sunday 12 September 2021</span></span></div><div class="bubble author-comment" data-dcnode-id="467" id="comment"><span data-dcnode-id="474" instrument_node="">"Joanna, you could try making some heading cuts on existing branches this winter, as described in the article above, and trim the very tip off the tallest central shoot (the 'leader'), cutting just above a bud. Give the trees a good mulch of compost too, and feed them with a balanced liquid feed during the growing season to give them the nutrients they need to produce good strong growth. 

Don't worry too much though - sometimes newly planted trees need time to develop a good root system first, and then the following year they have the energy for producing new shoots above ground."</span><br data-dcnode-id="473"><span class="comment-author" data-dcnode-id="471"><span data-dcnode-id="472" instrument_node="">Ann Marie Hendry</span></span><span data-dcnode-id="470" instrument_node=""> </span><span class="comment-date" data-dcnode-id="468"><span data-dcnode-id="469" instrument_node="">on Tuesday 21 September 2021</span></span></div><span data-dcnode-id="466" instrument_node="">
</span></section><span data-dcnode-id="464" instrument_node="">
