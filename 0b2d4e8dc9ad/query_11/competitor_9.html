</span><h2 class="entry_title" data-dcnode-id="1060" itemprop="name"><span class="date entry_date updated" data-dcnode-id="1062" itemprop="dateCreated"><span data-dcnode-id="1064" instrument_node="">01 Aug</span><meta content="UserComments: 0" data-dcnode-id="1063" itemprop="interactionCount"></span><span data-dcnode-id="1061" instrument_node=""> How Far Away Should Trees Be From My House?  Complete Guide</span></h2><span data-dcnode-id="1059" instrument_node="">
</span><div class="post_info" data-dcnode-id="1045"><span data-dcnode-id="1058" instrument_node="">
</span><span class="time" data-dcnode-id="1056"><span data-dcnode-id="1057" instrument_node="">Posted at 17:56h</span></span><span data-dcnode-id="1055" instrument_node="">
							in </span><a data-dcnode-id="1053" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//experthomereport.com/category/hometips/" rel="category tag"><span data-dcnode-id="1054" instrument_node="">Home Tips</span></a><span data-dcnode-id="1052" instrument_node=""> </span><span class="post_author" data-dcnode-id="1047"><span data-dcnode-id="1051" instrument_node="">
								by								</span><a class="post_author_link" data-dcnode-id="1049" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//experthomereport.com/author/matt32mc/" itemprop="author"><span data-dcnode-id="1050" instrument_node="">Matt McWilliams</span></a><span data-dcnode-id="1048" instrument_node="">
</span></span><span data-dcnode-id="1046" instrument_node="">
</span></div><span data-dcnode-id="1044" instrument_node="">
</span><p data-dcnode-id="1039"><span data-dcnode-id="1043" instrument_node="">If you are thinking about planting a new tree in your yard or deciding whether or not to take one down, then you should be able to find the </span><a data-dcnode-id="1041" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//answersforeveryone.com/"><span data-dcnode-id="1042" instrument_node="">answers to all of your questions</span></a><span data-dcnode-id="1040" instrument_node=""> here. It’s important to know just how close is too close when it comes to protecting your house from tree damage.</span></p><div data-dcnode-id="1037" data-inserter-version="2" id="ezoic-pub-ad-placeholder-140"></div><span data-dcnode-id="1035" instrument_node="">
</span><p data-dcnode-id="1024"><span data-dcnode-id="1034" instrument_node="">How far away should trees be from your house? </span><b data-dcnode-id="1025"><span data-dcnode-id="1033" instrument_node="">As a general rule, trees should be planted anywhere from 10 to 20 feet (3 to 6 meters) away from your house. However, t</span><strong data-dcnode-id="1031"><span data-dcnode-id="1032" instrument_node="">he</span></strong><strong data-dcnode-id="1029"><span data-dcnode-id="1030" instrument_node=""> final measurement depends on a number of factors, such as whether or not the </span></strong><a data-dcnode-id="1027" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//experthomereport.com/best-reciprocating-saws-for-tree-roots-and-logs/"><span data-dcnode-id="1028" instrument_node="">tree is damaged or has shallow roots</span></a><span data-dcnode-id="1026" instrument_node="">.&nbsp;</span></b></p><b data-dcnode-id="596"><span data-dcnode-id="1023" instrument_node="">
</span><p data-dcnode-id="1021"><span data-dcnode-id="1022" instrument_node="">Trees can be a valuable asset to the value of your property when they are planted at a safe distance and maintained properly. Here is everything you need to know about trees as they relate to your home.</span></p><div data-dcnode-id="1019" data-inserter-version="2" id="ezoic-pub-ad-placeholder-148"></div><span data-dcnode-id="1017" instrument_node="">
</span><h1 data-dcnode-id="1015"><span data-dcnode-id="1016" instrument_node="">How close to a House Can you plant a tree?</span></h1><span data-dcnode-id="1014" instrument_node="">
</span><p data-dcnode-id="1012"><span data-dcnode-id="1013" instrument_node="">The how and the where are important factors when deciding how close to place trees. Trees planted too close can damage house structures. A mature tree can also damage lawns, foundations, or driveways when its root system expands in search of water and nutrients. The distance between your house foundation and the tree trunk should depends on how large a tree you want to plant.</span></p><span data-dcnode-id="1011" instrument_node="">
</span><p data-dcnode-id="996"><strong data-dcnode-id="1009"><span data-dcnode-id="1010" instrument_node="">Small Tree Mature Height 10 feet: 10 to 15 feet (3-5 meters) Away from House</span></strong><br data-dcnode-id="1008"><span data-dcnode-id="1007" instrument_node="">
</span><strong data-dcnode-id="1005"><span data-dcnode-id="1006" instrument_node="">Medium Sized Tree Mature Height 15-20 feet: 15 to 20 feet (5-7 meters) &nbsp;Away from House</span></strong><br data-dcnode-id="1004"><span data-dcnode-id="1003" instrument_node="">
</span><strong data-dcnode-id="1001"><span data-dcnode-id="1002" instrument_node="">Large Tree Mature Height 20+ feet: 20+ feet (7+ meters) Away from House</span></strong><br data-dcnode-id="1000"><span data-dcnode-id="999" instrument_node="">
</span><strong data-dcnode-id="997"><span data-dcnode-id="998" instrument_node="">Large Shrub Mature Diameter 20+ feet: 10+ feet Away from House</span></strong></p><span data-dcnode-id="995" instrument_node="">
</span><p data-dcnode-id="992"><em data-dcnode-id="993"><span data-dcnode-id="994" instrument_node="">*These numbers represent minimum distances away from a house.</span></em></p><div data-dcnode-id="990" data-inserter-version="2" id="ezoic-pub-ad-placeholder-149"></div><span data-dcnode-id="988" instrument_node="">
</span><p data-dcnode-id="986"><span data-dcnode-id="987" instrument_node="">You may need more distance than this if your house is built on a slab foundation or if the land is prone to erosion or flooding. Similarly, how much distance you’ll need between driveway or sidewalk and the tree depends on how wide and how heavily traveled it is. When you plant a tree, you should also take into account&nbsp;how much space you will need under the tree canopy to maneuver a lawn mower and other yard care equipment. Large deciduous trees or evergreen trees will need space so you can gain access to branches in the event that they must be pruned or removed altogether. You will also want to provide enough room for the tree’s root system to expand.</span></p><span data-dcnode-id="985" instrument_node="">
</span><h2 data-dcnode-id="982"><b data-dcnode-id="983"><span data-dcnode-id="984" instrument_node="">How to determine if an existing tree is too close to your house</span></b></h2><span data-dcnode-id="981" instrument_node="">
</span><p data-dcnode-id="977"><span data-dcnode-id="980" instrument_node="">When you’re in the home real-estate market, mature shade trees can raise the market value of what you are selling or buying by up to $10,000.</span><span class="Apple-converted-space" data-dcnode-id="978"><span data-dcnode-id="979" instrument_node="">&nbsp; </span></span></p><span data-dcnode-id="976" instrument_node="">
</span><p data-dcnode-id="969"><span data-dcnode-id="975" instrument_node="">They can also save a significant amount of energy. With a healthy fully grown shade tree sitting a safe distance away from your house, you can expect to reduce your heating and</span><a data-dcnode-id="973" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//experthomereport.com/how-often-should-i-have-my-hvac-serviced/"><span data-dcnode-id="974" instrument_node=""> air conditioning</span></a><span data-dcnode-id="972" instrument_node=""> bills by upwards of fifty percent. Trees can have</span><a data-dcnode-id="970" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.fs.fed.us/learn/trees"><span data-dcnode-id="971" instrument_node="">&nbsp;incredible benefits on our environment.</span></a></p><span data-dcnode-id="968" instrument_node="">
</span><p data-dcnode-id="966"><span data-dcnode-id="967" instrument_node="">However, there can also be a flip side to having trees around your home. Existing trees looming too close to your house can increase the risk of danger and property damage.</span></p><div data-dcnode-id="964" data-inserter-version="2" id="ezoic-pub-ad-placeholder-150"></div><span data-dcnode-id="962" instrument_node="">
</span><p data-dcnode-id="955"><span data-dcnode-id="961" instrument_node="">In order to avoid costly and dangerous problems in the future, it’s recommended that hazardous trees be removed. </span><span class="Apple-converted-space" data-dcnode-id="956"><span data-dcnode-id="960" instrument_node="">Once you’ve removed </span><a data-dcnode-id="958" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//experthomereport.com/can-trees-block-my-wifi-signal-what-you-should-know/"><span data-dcnode-id="959" instrument_node="">dangerous trees</span></a><span data-dcnode-id="957" instrument_node="">, you can plant new ones in their place.</span></span></p><span data-dcnode-id="954" instrument_node="">
</span><h3 data-dcnode-id="952"><span data-dcnode-id="953" instrument_node="">Measure to get an Exact Distance</span></h3><span data-dcnode-id="951" instrument_node="">
</span><p data-dcnode-id="948"><img alt="" border="0" data-dcnode-id="950" height="1" loading="lazy" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//ir-na.amazon-adsystem.com/e/ir%3Ft%3Dexperthome-20%26language%3Den_US%26l%3Dli1%26o%3D1%26a%3DB01MTVZCB1&amp;raw" style="border: none !important; margin: 0px !important;" width="1"><span data-dcnode-id="949" instrument_node="">Make sure to measure to get an &nbsp;exact distance. Guessing &nbsp;can get you in trouble when trying to determine the distance of the tree from the house. Our go to tape measure here at Expert Home Report is the Stanley Fat Max Tape Measure. This tape measure is great for out door use. It won’t crumple up or get blown easy by the wind.</span></p><span data-dcnode-id="947" instrument_node="">
</span><p data-dcnode-id="944"><a data-dcnode-id="945" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.amazon.com/Stanley-Tools-33-725-FatMax-Measure/dp/B01MTVZCB1/ref%3Das_li_ss_il%3Fdchild%3D1%26keywords%3Dmeasuring%2Btape%2Bfatmax%26qid%3D1605391872%26sr%3D8-7%26linkCode%3Dli1%26tag%3Dexperthome-20%26linkId%3Dc47af8f6f4b0c05e368ce273ae002137%26language%3Den_US" rel="noopener noreferrer" target="_blank"><img border="0" class="aligncenter" data-dcnode-id="946" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//ws-na.amazon-adsystem.com/widgets/q%3F_encoding%3DUTF8%26ASIN%3DB01MTVZCB1%26Format%3D_SL110_%26ID%3DAsinImage%26MarketPlace%3DUS%26ServiceVersion%3D20070822%26WS%3D1%26tag%3Dexperthome-20%26language%3Den_US&amp;raw"></a></p><span data-dcnode-id="943" instrument_node="">
</span><p data-dcnode-id="940"><a data-dcnode-id="941" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//amzn.to/2IAFAOe"><img alt="use Stanley fat max to check distance from the house to a tree" class="aligncenter wp-image-1324 size-full" data-dcnode-id="942" height="38" loading="lazy" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//experthomereport.com/wp-content/uploads/2019/05/check-price-1.png&amp;raw" title="use Stanley fat max to check distance from the house to a tree" width="150"></a></p><div data-dcnode-id="938" data-inserter-version="2" id="ezoic-pub-ad-placeholder-151"></div><span data-dcnode-id="936" instrument_node="">
</span><p data-dcnode-id="930"><span data-dcnode-id="935" instrument_node="">By doing this you have the potential to raise the market value of your home above its current status. </span><strong data-dcnode-id="931"><span data-dcnode-id="934" instrument_node="">So how exactly can you determine if you have a troublesome tree that should be removed?</span><span class="Apple-converted-space" data-dcnode-id="932"><span data-dcnode-id="933" instrument_node="">&nbsp;</span></span></strong></p><span data-dcnode-id="929" instrument_node="">
</span><div class="wp-caption aligncenter" data-dcnode-id="925" id="attachment_1266" style="width: 310px"><img alt="tree that has been planted too close to a house" aria-describedby="caption-attachment-1266" class="wp-image-1266 size-medium" data-dcnode-id="928" height="170" loading="lazy" sizes="(max-width: 300px) 100vw, 300px" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//experthomereport.com/wp-content/uploads/2019/08/28401672_s-300x170.jpg&amp;raw" srcset="https://experthomereport.com/wp-content/uploads/2019/08/28401672_s-300x170.jpg 300w, https://experthomereport.com/wp-content/uploads/2019/08/28401672_s-768x434.jpg 768w, https://experthomereport.com/wp-content/uploads/2019/08/28401672_s-700x396.jpg 700w, https://experthomereport.com/wp-content/uploads/2019/08/28401672_s-539x303.jpg 539w, https://experthomereport.com/wp-content/uploads/2019/08/28401672_s.jpg 785w" title="tree planted too close to house" width="300"><p class="wp-caption-text" data-dcnode-id="926" id="caption-attachment-1266"><span data-dcnode-id="927" instrument_node="">Here is a tree that has been planted too close to the house.</span></p></div><span data-dcnode-id="924" instrument_node="">
</span><p data-dcnode-id="921"><strong data-dcnode-id="922"><span data-dcnode-id="923" instrument_node="">Here are a few indicators that it’s time for a tree to be removed:</span></strong></p><span data-dcnode-id="920" instrument_node="">
</span><ol data-dcnode-id="910"><span data-dcnode-id="919" instrument_node="">
</span><li data-dcnode-id="915"><span data-dcnode-id="918" instrument_node="">Start with this simple formula. In an ideal situation, a tree will be planted with room to flourish. Therefore, the distance to the house should be no closer than half of its future full-grown length. </span><strong data-dcnode-id="916"><span data-dcnode-id="917" instrument_node="">For example, 20 feet may still be too close for some large species of trees that will grow beyond 40 feet tall.</span></strong></li><span data-dcnode-id="914" instrument_node="">
</span><li data-dcnode-id="912"><span data-dcnode-id="913" instrument_node="">Trees growing 5 feet or less away from a house will almost always need to be removed.</span></li><span data-dcnode-id="911" instrument_node="">
</span></ol><span data-dcnode-id="909" instrument_node="">
</span><ol data-dcnode-id="904" start="3"><span data-dcnode-id="908" instrument_node="">
</span><li data-dcnode-id="906"><span data-dcnode-id="907" instrument_node="">When branches scrape the sides or roof of a house it is probably because they are too close. Depending on the situation, you might be able to trim the problem limbs enough that full removal of the tree won’t be necessary.</span></li><span data-dcnode-id="905" instrument_node="">
</span></ol><span data-dcnode-id="903" instrument_node="">
</span><p data-dcnode-id="891"><strong data-dcnode-id="898"><span data-dcnode-id="902" instrument_node="">Call an expert if you are unsure of whether or not a tree may cause damage by </span><a data-dcnode-id="900" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//experthomereport.com/how-far-should-plants-be-from-a-house-read-before-planting/"><span data-dcnode-id="901" instrument_node="">being too close to your house</span></a><span data-dcnode-id="899" instrument_node="">.</span></strong><span class="Apple-converted-space" data-dcnode-id="896"><span data-dcnode-id="897" instrument_node="">&nbsp; </span></span><span data-dcnode-id="895" instrument_node="">Don’t make an assumption that a tree is safe if you aren’t 100% certain.</span><span class="Apple-converted-space" data-dcnode-id="893"><span data-dcnode-id="894" instrument_node="">&nbsp; </span></span><span data-dcnode-id="892" instrument_node="">It’s beneficial to have the area properly inspected in order to avoid the complications and risks of tree damage.</span></p><div data-dcnode-id="889" data-inserter-version="2" id="ezoic-pub-ad-placeholder-152"></div><span data-dcnode-id="887" instrument_node="">
</span><h3 data-dcnode-id="884"><b data-dcnode-id="885"><span data-dcnode-id="886" instrument_node="">Other reasons for tree removal</span></b></h3><span data-dcnode-id="883" instrument_node="">
</span><p data-dcnode-id="879"><span data-dcnode-id="882" instrument_node="">Did you know that proximity isn’t the only cause for tree removal? There are many other reasons that it could be necessary to remove a tree. Keep an eye out for these red flags that may indicate a removal could be needed.</span><span class="Apple-converted-space" data-dcnode-id="880"><span data-dcnode-id="881" instrument_node="">&nbsp;</span></span></p><span data-dcnode-id="878" instrument_node="">
</span><ul data-dcnode-id="870"><span data-dcnode-id="877" instrument_node="">
</span><li data-dcnode-id="872"><b data-dcnode-id="873"><span data-dcnode-id="876" instrument_node="">The tree that used to be straight is now leaning</span><span class="Apple-converted-space" data-dcnode-id="874"><span data-dcnode-id="875" instrument_node="">&nbsp;</span></span></b></li><span data-dcnode-id="871" instrument_node="">
</span></ul><span data-dcnode-id="869" instrument_node="">
</span><p data-dcnode-id="867"><span data-dcnode-id="868" instrument_node="">When a tree grows in a leaning position it doesn’t necessarily pose an immediate threat. However, when a tree begins to suddenly lean to the side, it could very well have serious structural problems.</span></p><span data-dcnode-id="866" instrument_node="">
</span><ul data-dcnode-id="858"><span data-dcnode-id="865" instrument_node="">
</span><li data-dcnode-id="860"><b data-dcnode-id="861"><span data-dcnode-id="864" instrument_node="">The trunk is damaged</span><span class="Apple-converted-space" data-dcnode-id="862"><span data-dcnode-id="863" instrument_node="">&nbsp;</span></span></b></li><span data-dcnode-id="859" instrument_node="">
</span></ul><span data-dcnode-id="857" instrument_node="">
</span><p data-dcnode-id="855"><span data-dcnode-id="856" instrument_node="">Cracks and other damaged areas, such as a dying branch stub on a tree trunk, can indicate that there is internal decay going on. Trees can surprisingly survive for many years with undetected internal decay. However, it may only be a matter of time before decaying trees eventually fall and create damage. Another warning sign to look out for is a tree with multiple trunks. This scenario can create structural issues leading to a potential fall down the road.</span></p><span data-dcnode-id="854" instrument_node="">
</span><p data-dcnode-id="851"><b data-dcnode-id="852"><img alt="tree trunk damaged from bugs" class="size-full wp-image-3058 aligncenter" data-dcnode-id="853" height="200" loading="lazy" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//experthomereport.com/wp-content/uploads/2019/08/damaged-tree-trunk-from-bugs.jpg&amp;raw" width="300"></b></p><div data-dcnode-id="849" data-inserter-version="2" id="ezoic-pub-ad-placeholder-153"></div><span data-dcnode-id="847" instrument_node="">
</span><ul data-dcnode-id="839"><span data-dcnode-id="846" instrument_node="">
</span><li data-dcnode-id="841"><b data-dcnode-id="842"><span data-dcnode-id="845" instrument_node="">Hollow trees</span><span class="Apple-converted-space" data-dcnode-id="843"><span data-dcnode-id="844" instrument_node="">&nbsp;</span></span></b></li><span data-dcnode-id="840" instrument_node="">
</span></ul><span data-dcnode-id="838" instrument_node="">
</span><p data-dcnode-id="836"><span data-dcnode-id="837" instrument_node="">A tree with a trunk that is hollowed out can be a dangerous hazard. This can happen from rotting or animals. If one third or more of the tree trunk is hollow on the inside, it will need to be removed as a precaution.</span></p><span data-dcnode-id="835" instrument_node="">
</span><ul data-dcnode-id="827"><span data-dcnode-id="834" instrument_node="">
</span><li data-dcnode-id="829"><b data-dcnode-id="830"><span data-dcnode-id="833" instrument_node="">Sprouts growing at the base of the tree</span><span class="Apple-converted-space" data-dcnode-id="831"><span data-dcnode-id="832" instrument_node="">&nbsp;</span></span></b></li><span data-dcnode-id="828" instrument_node="">
</span></ul><span data-dcnode-id="826" instrument_node="">
</span><p data-dcnode-id="821"><span data-dcnode-id="825" instrument_node="">Epicormic shoots are sprouts that sometimes grow at the base of a tree that is in trouble.</span><span class="Apple-converted-space" data-dcnode-id="823"><span data-dcnode-id="824" instrument_node="">&nbsp; </span></span><span data-dcnode-id="822" instrument_node="">This is a sign of stress that should be evaluated by a professional.</span></p><span data-dcnode-id="820" instrument_node="">
</span><ul data-dcnode-id="812"><span data-dcnode-id="819" instrument_node="">
</span><li data-dcnode-id="814"><b data-dcnode-id="815"><span data-dcnode-id="818" instrument_node="">Trees growing beneath power lines</span><span class="Apple-converted-space" data-dcnode-id="816"><span data-dcnode-id="817" instrument_node="">&nbsp;</span></span></b></li><span data-dcnode-id="813" instrument_node="">
</span></ul><span data-dcnode-id="811" instrument_node="">
</span><p data-dcnode-id="807"><span data-dcnode-id="810" instrument_node="">When a tree grows into power lines it will almost always need to be removed or else regularly pruned. When left unattended this becomes a potential safety hazard.</span><span class="Apple-converted-space" data-dcnode-id="808"><span data-dcnode-id="809" instrument_node="">&nbsp;</span></span></p><span data-dcnode-id="806" instrument_node="">
</span><ul data-dcnode-id="800"><span data-dcnode-id="805" instrument_node="">
</span><li data-dcnode-id="802"><b data-dcnode-id="803"><span data-dcnode-id="804" instrument_node="">Signs of sickness</span></b></li><span data-dcnode-id="801" instrument_node="">
</span></ul><span data-dcnode-id="799" instrument_node="">
</span><p data-dcnode-id="795"><span data-dcnode-id="798" instrument_node="">You can check on the health of your tree by simply comparing it to other trees growing next to it. Thin leaf covering, yellowing or browning foliage and stunted growth are all telling signs that your tree might be having some trouble.</span><span class="Apple-converted-space" data-dcnode-id="796"><span data-dcnode-id="797" instrument_node="">&nbsp;</span></span></p><div data-dcnode-id="793" data-inserter-version="2" id="ezoic-pub-ad-placeholder-154"></div><span data-dcnode-id="791" instrument_node="">
</span><ul data-dcnode-id="783"><span data-dcnode-id="790" instrument_node="">
</span><li data-dcnode-id="785"><b data-dcnode-id="786"><span data-dcnode-id="789" instrument_node="">Root defects</span><span class="Apple-converted-space" data-dcnode-id="787"><span data-dcnode-id="788" instrument_node="">&nbsp;</span></span></b></li><span data-dcnode-id="784" instrument_node="">
</span></ul><span data-dcnode-id="782" instrument_node="">
</span><p data-dcnode-id="766"><span data-dcnode-id="781" instrument_node="">Root defects are often not as easily noticeable as other more evident issues. Watch for </span><a data-dcnode-id="779" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//americanlawns.com/whats-the-best-grass-for-clay-soil/"><span data-dcnode-id="780" instrument_node="">heaving soil</span></a><span data-dcnode-id="778" instrument_node=""> and </span><a data-dcnode-id="776" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//americanlawns.com/why-your-grass-keeps-dying-and-what-to-do-about-it/"><span data-dcnode-id="777" instrument_node="">fungi growing</span></a><span data-dcnode-id="775" instrument_node=""> around the tree’s base. These are common </span><a data-dcnode-id="773" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//experthomereport.com/signs-of-scorpions-how-to-know-if-you-have-a-problem/"><span data-dcnode-id="774" instrument_node="">signs of a root problem</span></a><span data-dcnode-id="772" instrument_node="">.&nbsp;Whenever you suspect your tree is suffering from one or more of these issues, then reach out to the&nbsp;local tree expert to visit your property and assess the situation.</span><span class="Apple-converted-space" data-dcnode-id="770"><span data-dcnode-id="771" instrument_node="">&nbsp; </span></span><span data-dcnode-id="769" instrument_node="">A professional will be able to let you know whether or not your tree can be saved or if removal is a better option.</span><span class="Apple-converted-space" data-dcnode-id="767"><span data-dcnode-id="768" instrument_node="">&nbsp;</span></span></p><span data-dcnode-id="765" instrument_node="">
</span><div class="wp-caption aligncenter" data-dcnode-id="761" id="attachment_1268" style="width: 310px"><img alt="Tree that is planted an ideal distance from the house" aria-describedby="caption-attachment-1268" class="size-medium wp-image-1268" data-dcnode-id="764" height="200" loading="lazy" sizes="(max-width: 300px) 100vw, 300px" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//experthomereport.com/wp-content/uploads/2019/08/61274842_s-300x200.jpg&amp;raw" srcset="https://experthomereport.com/wp-content/uploads/2019/08/61274842_s-300x200.jpg 300w, https://experthomereport.com/wp-content/uploads/2019/08/61274842_s-768x512.jpg 768w, https://experthomereport.com/wp-content/uploads/2019/08/61274842_s-700x466.jpg 700w, https://experthomereport.com/wp-content/uploads/2019/08/61274842_s.jpg 848w" width="300"><p class="wp-caption-text" data-dcnode-id="762" id="caption-attachment-1268"><span data-dcnode-id="763" instrument_node="">This tree was planted at good distance away from the house.</span></p></div><span data-dcnode-id="760" instrument_node="">
</span><h3 data-dcnode-id="758"><span data-dcnode-id="759" instrument_node="">Are trees near your house dangerous?</span></h3><span data-dcnode-id="757" instrument_node="">
</span><p data-dcnode-id="755"><span data-dcnode-id="756" instrument_node="">Trees can be a hazard to buildings when they are planted too close. Their leaves may clog gutters, potentially causing ice dams or water penetration into the your home. Old, damaged or otherwise weak trees may fall on houses too which increases risk of injury especially if you live in an area where severe weather is prevalent during winter months such as snowstorms!</span></p><span data-dcnode-id="754" instrument_node="">
</span><p data-dcnode-id="752"><span data-dcnode-id="753" instrument_node="">Trees are also used by insects and rodents to gain access into buildings where they may inadvertently spread insect infestations such as termites among other things. Falling branches from these same trees pose threats not only because of their weight but also due to communication lines they might topple on top off which could affect your phone service if you’re one who relies heavily upon it!</span></p><div data-dcnode-id="750" data-inserter-version="2" id="ezoic-pub-ad-placeholder-155"></div><span data-dcnode-id="748" instrument_node="">
</span><h3 data-dcnode-id="746"><span data-dcnode-id="747" instrument_node="">Keeping Your Home Safe</span></h3><span data-dcnode-id="745" instrument_node="">
</span><p data-dcnode-id="737"><span data-dcnode-id="744" instrument_node="">Tree </span><a data-dcnode-id="742" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//experthomereport.com/termite-removal-process-complete-guide/"><span data-dcnode-id="743" instrument_node="">removal is an extensive process</span></a><span data-dcnode-id="741" instrument_node="">.</span><span class="Apple-converted-space" data-dcnode-id="739"><span data-dcnode-id="740" instrument_node="">&nbsp; </span></span><span data-dcnode-id="738" instrument_node="">Phone an expert if you think this is a precaution you might need to take. In some cases, tree removal is not necessary.</span></p><span data-dcnode-id="736" instrument_node="">
</span><p data-dcnode-id="732"><span data-dcnode-id="735" instrument_node="">If your tree happens to be very close to your house and a specialist deems it to not be a safety hazard, then they may recommend that you take other safety precautions such as tree trimming.</span><span class="Apple-converted-space" data-dcnode-id="733"><span data-dcnode-id="734" instrument_node="">&nbsp;</span></span></p><span data-dcnode-id="731" instrument_node="">
</span><p data-dcnode-id="726"><span data-dcnode-id="730" instrument_node="">Tree trimming can be a simple process but it requires extreme knowledge and care. If you have experience with trees then you may be able to do yourself at home </span><a data-dcnode-id="728" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//experthomereport.com/category/products/"><span data-dcnode-id="729" instrument_node="">with the proper tools</span></a><span data-dcnode-id="727" instrument_node="">.</span></p><span data-dcnode-id="725" instrument_node="">
</span><p data-dcnode-id="714"><span data-dcnode-id="724" instrument_node="">Otherwise, it’s best to get the help of a certified professional. </span><a data-dcnode-id="722" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//experthomereport.com/best-reciprocating-saws-for-trees-2020-with-ratings-and-reviews/"><span data-dcnode-id="723" instrument_node="">Trimming the branches</span></a><span data-dcnode-id="721" instrument_node=""> of your tree when they begin to hang over your roof can prevent issues </span><a data-dcnode-id="719" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//experthomereport.com/will-my-roof-leak-with-missing-shingles-complete-guide/"><span data-dcnode-id="720" instrument_node="">like roof leaks</span></a><span data-dcnode-id="718" instrument_node="">, loss of shingles and </span><a data-dcnode-id="716" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//experthomereport.com/carpet-mold-how-to-spot-it-what-to-do-about-it/"><span data-dcnode-id="717" instrument_node="">mold</span></a><span data-dcnode-id="715" instrument_node=""> from falling debris.</span></p><span data-dcnode-id="713" instrument_node="">
</span><p data-dcnode-id="705"><strong data-dcnode-id="711"><span data-dcnode-id="712" instrument_node="">Damaged trees during severe weather have totaled up to more than one billion dollars in property damage in the United States in a single year.</span></strong><span class="Apple-converted-space" data-dcnode-id="709"><span data-dcnode-id="710" instrument_node="">&nbsp; </span></span><span data-dcnode-id="708" instrument_node="">It is important to administer the proper maintenance and care that your tree needs.</span><span class="Apple-converted-space" data-dcnode-id="706"><span data-dcnode-id="707" instrument_node="">&nbsp;</span></span></p><div data-dcnode-id="703" data-inserter-version="2" id="ezoic-pub-ad-placeholder-156"></div><span data-dcnode-id="701" instrument_node="">
</span><div class="wpb_video_widget wpb_content_element vc_clearfix vc_video-aspect-ratio-169 vc_video-el-width-100 vc_video-align-left" data-dcnode-id="693"><span data-dcnode-id="700" instrument_node="">
</span><div class="wpb_wrapper" data-dcnode-id="695"><span data-dcnode-id="699" instrument_node="">
</span><div class="wpb_video_wrapper" data-dcnode-id="697"><iframe allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture" allowfullscreen="" data-dcnode-id="698" frameborder="0" height="596" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.youtube.com/embed/O5Oa1PeAI_M%3Ffeature%3Doembed&amp;raw" title="How to Plant a Large-Shade Tree | Ask This Old House" width="1060"></iframe></div><span data-dcnode-id="696" instrument_node="">
</span></div><span data-dcnode-id="694" instrument_node="">
</span></div><span data-dcnode-id="692" instrument_node="">
</span><p data-dcnode-id="682"><span data-dcnode-id="691" instrument_node="">If a tree is planted in a neighboring yard that has grown to hang over or touch the </span><a data-dcnode-id="689" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//experthomereport.com/building-an-eco-friendly-roof/"><span data-dcnode-id="690" instrument_node="">roof of your house</span></a><span data-dcnode-id="688" instrument_node="">, then in most cases </span><a data-dcnode-id="686" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//788trimco.com/harvesting-resources-tips/"><span data-dcnode-id="687" instrument_node="">you have the right to trim</span></a><span data-dcnode-id="685" instrument_node=""> the branches which cross over into your property. Have a conversation with your local officials as well as your neighbor to discuss possible solutions and to preserve the health of the tree.</span><span class="Apple-converted-space" data-dcnode-id="683"><span data-dcnode-id="684" instrument_node="">&nbsp;</span></span></p><span data-dcnode-id="681" instrument_node="">
</span><p data-dcnode-id="677"><span data-dcnode-id="680" instrument_node="">If you want to plant a new tree in your yard, remember to take into account the total width and height the tree will reach when it is fully grown. Also, consider the area in which the roots will spread and avoid them inter-tangling with gas or plumbing lines.</span><span class="Apple-converted-space" data-dcnode-id="678"><span data-dcnode-id="679" instrument_node="">&nbsp;</span></span></p><span data-dcnode-id="676" instrument_node="">
</span><div class="wp-caption aligncenter" data-dcnode-id="672" id="attachment_1267" style="width: 310px"><img alt="tree that has fallen on a house" aria-describedby="caption-attachment-1267" class="size-medium wp-image-1267" data-dcnode-id="675" height="201" loading="lazy" sizes="(max-width: 300px) 100vw, 300px" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//experthomereport.com/wp-content/uploads/2019/08/20097983_s-300x201.jpg&amp;raw" srcset="https://experthomereport.com/wp-content/uploads/2019/08/20097983_s-300x201.jpg 300w, https://experthomereport.com/wp-content/uploads/2019/08/20097983_s-768x514.jpg 768w, https://experthomereport.com/wp-content/uploads/2019/08/20097983_s-700x468.jpg 700w, https://experthomereport.com/wp-content/uploads/2019/08/20097983_s.jpg 846w" width="300"><p class="wp-caption-text" data-dcnode-id="673" id="caption-attachment-1267"><span data-dcnode-id="674" instrument_node="">This tree was close enough to damage the house when it fell.</span></p></div><span data-dcnode-id="671" instrument_node="">
</span><h3 data-dcnode-id="668"><b data-dcnode-id="669"><span data-dcnode-id="670" instrument_node="">What should you do if a tree has fallen onto your home?</span></b></h3><span data-dcnode-id="667" instrument_node="">
</span><p data-dcnode-id="663"><span data-dcnode-id="666" instrument_node="">In the event that a tree too close to your home has caused damaged or fallen onto your roof, most home insurance policies will assist with paying for the costs of repairs and tree removal.</span><span class="Apple-converted-space" data-dcnode-id="664"><span data-dcnode-id="665" instrument_node="">&nbsp;</span></span></p><span data-dcnode-id="662" instrument_node="">
</span><p data-dcnode-id="657"><span data-dcnode-id="661" instrument_node="">A tree falling incident can be devastating. After</span><a data-dcnode-id="659" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//answersforeveryone.com/does-insurance-cover-hitting-a-curb/"><span data-dcnode-id="660" instrument_node=""> ensuring the safety of everyone</span></a><span data-dcnode-id="658" instrument_node=""> in the building, it is best to evacuate the area. Be sure to avoid reentering the house until the final repairs have been completed.</span></p><div data-dcnode-id="655" data-inserter-version="2" id="ezoic-pub-ad-placeholder-157"></div><span data-dcnode-id="653" instrument_node="">
</span><p data-dcnode-id="648"><span data-dcnode-id="652" instrument_node="">If power lines were pulled down during the fall, keep a safe distance and contact the power company. Also, get in contact with your local </span><a data-dcnode-id="650" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//arkroofingok.com/storm-restoration/"><span data-dcnode-id="651" instrument_node="">disaster restoration service provider</span></a><span data-dcnode-id="649" instrument_node="">. They can help you through the process of filing your claim and taking the steps towards the restoration of your property.</span></p><span data-dcnode-id="647" instrument_node="">
</span><h3 data-dcnode-id="643"><a data-dcnode-id="644" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//amzn.to/3dKg30V"><b data-dcnode-id="645"><img alt="tree limb saw" class="size-full wp-image-3060 aligncenter" data-dcnode-id="646" height="261" loading="lazy" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//experthomereport.com/wp-content/uploads/2019/08/tree-saw-for-broken-limbs.jpg&amp;raw" width="300"></b></a></h3><span data-dcnode-id="642" instrument_node="">
</span><h3 data-dcnode-id="638"><a data-dcnode-id="639" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//amzn.to/3dKg30V"><b data-dcnode-id="640"><img alt="" class="size-full wp-image-2890 aligncenter" data-dcnode-id="641" height="40" loading="lazy" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//experthomereport.com/wp-content/uploads/2021/01/amz-price-1.png&amp;raw" width="175"></b></a></h3><span data-dcnode-id="637" instrument_node="">
</span><h3 data-dcnode-id="634"><b data-dcnode-id="635"><span data-dcnode-id="636" instrument_node="">What happens if your tree falls onto your neighbor’s home?</span></b></h3><span data-dcnode-id="633" instrument_node="">
</span><p data-dcnode-id="622"><span data-dcnode-id="632" instrument_node="">If your tree was in good health and fell across property lines onto your neighbor’s house during a storm, then your neighbor’s </span><a data-dcnode-id="630" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//diallile.com/"><span data-dcnode-id="631" instrument_node="">home insurance</span></a><span data-dcnode-id="629" instrument_node=""> should be able to assess and cover the damages. Unfortunately, if </span><a data-dcnode-id="627" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.uaex.edu/environment-nature/forestry/health/disease-problems.aspx"><span data-dcnode-id="628" instrument_node="">your tree was sick</span></a><span data-dcnode-id="626" instrument_node=""> or dying, then it will be your responsibility to take care of the incident along with the help of </span><a data-dcnode-id="624" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//greatertulsainsurance.com/"><span data-dcnode-id="625" instrument_node="">your insurance company</span></a><span data-dcnode-id="623" instrument_node="">.</span></p><span data-dcnode-id="621" instrument_node="">
</span><p data-dcnode-id="619"><span data-dcnode-id="620" instrument_node="">Trees can be an asset or a liability for the value of your home. For all of these reasons, be vigilant and keep a close eye on the health of your trees. Sometimes, a sick tree can be nursed and treated back to health. While at other times, it is better and safer to avoid the possibility of an accident and remove a tree that is either growing too close to your home or is dying.</span></p><span data-dcnode-id="618" instrument_node="">
</span><h3 data-dcnode-id="616"><span data-dcnode-id="617" instrument_node="">Related Questions:</span></h3><span data-dcnode-id="615" instrument_node="">
</span><h3 data-dcnode-id="613"><span data-dcnode-id="614" instrument_node="">What should I do if a tree falls on my home?</span></h3><span data-dcnode-id="612" instrument_node="">
</span><p data-dcnode-id="610"><span data-dcnode-id="611" instrument_node="">In the event that a medium sized tree too close to your home has caused damaged or fallen onto your roof, most home insurance policies will assist with paying for the costs of repairs and tree removal.</span></p><span data-dcnode-id="609" instrument_node="">
</span><h3 data-dcnode-id="607"><span data-dcnode-id="608" instrument_node="">What are some reasons I would remove a tree that’s close to my house?</span></h3><span data-dcnode-id="606" instrument_node="">
</span><p data-dcnode-id="604"><span data-dcnode-id="605" instrument_node="">Did you know that proximity isn’t the only cause for tree removal? There are many other reasons that it could be necessary to remove a tree that is leaning, damaged, hollow or has roots that are growing under the house.</span></p><div data-dcnode-id="602" data-inserter-version="2" id="ezoic-pub-ad-placeholder-158"></div><span data-dcnode-id="600" instrument_node="">
</span><p data-dcnode-id="598"><span data-dcnode-id="599" instrument_node="">&nbsp;</span></p><span data-dcnode-id="597" instrument_node="">
