 often should you move to gain the most wealth? For example, let's say you live in an average neighborhood in an average suburban town. Your neighborhood, like most others, gets older, and newer nicer neighborhoods are being built all the time all around you. Should you leave your average home on a regular basis and "move up" -- or -- should you try to stay in your current home and pay down your mortgage with the goal of owning your home outright, despite the fact that your neighborhood is not as nice as it once was?</span></p><span data-dcnode-id="1640" instrument_node="">

ic/user_0.png%3Fv%3D27519650&amp;raw" width="40"></a></div><div class="comment-list__item-content" data-dcnode-id="1531"><h6 class="comment-list__item-username text-m text-bold" data-dcnode-id="1553"><a data-dcnode-id="1554" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.houzz.com/user/jakkom"><span data-dcnode-id="1555" instrument_node="">jakkom</span></a></h6><div class="comment-list__item-time" data-dcnode-id="1548"><div class="comment-list__item-time--created text-xs text-muted" data-dcnode-id="1549"><span data-dcnode-id="1550"><span data-dcnode-id="1551"><span data-dcnode-id="1552" instrument_node="">13 years ago</span></span></span></div></div><div class="message-body new-message-body text-l" data-dcnode-id="1532"><p data-dcnode-id="1546"><span data-dcnode-id="1547" instrument_node="">As seldom as possible. Simple answer to a complicated problem. </span></p><span data-dcnode-id="1545" instrument_node="">
</span><p data-dcnode-id="1543"><span data-dcnode-id="1544" instrument_node="">I would say if you are in a declining neighborhood, ask yourself why. What are the chances it will turn around in the time you are going to own it? It is very true that RE is all about location, location, location. Our house would be worth $100K more if it were located 2 miles north or east, but just as easily worth $100K less if you put it 2 miles south or west. </span></p><span data-dcnode-id="1542" instrument_node="">
</span><p data-dcnode-id="1540"><span data-dcnode-id="1541" instrument_node="">We moved into a lower middle-class starter area that has gradually gentrified into a nicer middle-class starter neighborhood over the past 20 yrs. I figured it would because housing prices in San Francisco were simply too high for the middle class, who would have to go elsewhere (as we ourselves did) to afford a SFH. </span></p><span data-dcnode-id="1539" instrument_node="">
</span><p data-dcnode-id="1537"><span data-dcnode-id="1538" instrument_node="">There are nicer homes further out. But out here, commutes are long and with the highest gas prices in the nation, the trend is now swinging back towards living closer-in, as we do. Higher gas prices work to our advantage, but nor I or anyone else foresaw it happening a year ago. So predicting a local market is a guessing game nobody's going to win. </span></p><span data-dcnode-id="1536" instrument_node="">
</span><p data-dcnode-id="1534"><span data-dcnode-id="1535" instrument_node="">Too-frequent buying incurs fixed costs that are difficult to surmount. RE appreciation is on average 5% per year over the last 80 years - BEFORE your fixed costs. Obviously that is considerably less appreciation than you would have obtained from a portfolio invested in diversified equities. In equities, a management charge of 3% is considered incredibly high, whereas a RE broker fee of 3% is judged very reasonable.</span></p><span data-dcnode-id="1533" instrument_node="">
</span></div></div><div class="comment-list__item-footer" data-container="Comment Actions" data-dcnode-id="1519"><ul class="comment-list__item-actions text-xxs text-muted mb0 mrl" data-dcnode-id="1520"><li class="comment-list__item-action comment-list__item-action--like" data-dcnode-id="1526"><button class="comment-list__item-action-btn btn btn-link pl0 pr0" data-dcnode-id="1527"><span aria-hidden="true" class="icon-font icon-thumb_solid comment-list__item-action-btn-icon" data-compid="comment_like" data-component="Like" data-dcnode-id="1530"></span><span class="comment-list__item-action-btn-label text-bold text-xs mls" data-compid="comment_show_like" data-component="Like" data-dcnode-id="1528"><span data-dcnode-id="1529" instrument_node="">Like</span></span></button></li><li class="comment-list__item-action comment-list__item-action--save mlm" data-dcnode-id="1521"><button class="comment-list__item-action-btn btn btn-link pl0 pr0" data-compid="comment_save" data-component="Save" data-dcnode-id="1522"><span aria-hidden="true" class="icon-font icon-heart comment-list__item-action-btn-icon" data-dcnode-id="1525"></span><span class="comment-list__item-action-btn-label text-bold text-xs mls" data-dcnode-id="1523"><span data-dcnode-id="1524" instrument_node="">Save</span></span></button></li></ul></div><div class="comment-list__item-best-comment" data-dcnode-id="1518"></div></div></li><li class="comment-list__item comment-list__injectable" data-dcnode-id="1439"><div class="hz-comments__inline-question" data-dcnode-id="1440"><h2 class="header-6" data-dcnode-id="1514"><span data-dcnode-id="1515" instrument_node="">Related Discussions</span></h2><div class="hz-inline-question-list hz-track-me" data-dcnode-id="1441" scopeid="question-thumb-list-inline-related"><a class="hz-inline-question text-l" data-dcnode-id="1496" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.houzz.com/discussions/747267/how-often-do-you-clean-under-or-behind-your-fridge" objid="747267" posid="0"><div class="hz-text-clamp hz-inline-question__title" data-dcnode-id="1504" style="height:48px"><p class="hz-text-clamp__text-node" data-dcnode-id="1512" style="-webkit-line-clamp:2;-webkit-box-orient:vertical"><span data-dcnode-id="1513" instrument_node="">How often do you clean under or behind your fridge?</span></p><p data-dcnode-id="1510" style="visibility: hidden; position: absolute; top: 0px; left: 0px; width: 244px;"><span data-dcnode-id="1511" instrument_node="">How often do you clean under or behind your fridge?</span></p><div data-dcnode-id="1505" style="position:absolute;left:0;top:0;right:0;bottom:0;overflow:hidden;z-index:-1;visibility:hidden"><div data-dcnode-id="1508" style="position:absolute;left:0;top:0;right:0;bottom:0;overflow:hidden;z-index:-1;visibility:hidden"><div data-dcnode-id="1509" style="position: absolute; left: 0px; top: 0px; width: 254px; height: 58px;"></div></div><div data-dcnode-id="1506" style="position:absolute;left:0;top:0;right:0;bottom:0;overflow:hidden;z-index:-1;visibility:hidden"><div data-dcnode-id="1507" style="position:absolute;left:0;top:0;width:200%;height:200%"></div></div></div></div><div class="hz-inline-question__comment-no text-m" data-dcnode-id="1502"><span data-dcnode-id="1503" instrument_node="">Comments (135)</span></div><div class="hz-inline-question__comment" data-dcnode-id="1497"><div class="hz-inline-question__comment-body" data-dcnode-id="1500"><span data-dcnode-id="1501" instrument_node="">I pull off the grate on the front an vacuum every three months or do. Dust on the compressor can limit cooling and cause failure. I forgot to do the wine cooler and it failed to cool. That grate requires a screw driver. Had to go through a reset procedure yo get it working again.</span></div><div class="hz-inline-question__comment-see-more" data-dcnode-id="1498"><span data-dcnode-id="1499" instrument_node="">...See More</span></div></div></a><a class="hz-inline-question text-l" data-dcnode-id="1478" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.houzz.com/discussions/937695/how-often-do-you-replace-everyday-flatware" objid="937695" posid="1"><div class="hz-text-clamp hz-inline-question__title" data-dcnode-id="1486" style="height:48px"><p class="hz-text-clamp__text-node" data-dcnode-id="1494" style="-webkit-line-clamp:2;-webkit-box-orient:vertical"><span data-dcnode-id="1495" instrument_node="">How often do you replace everyday flatware?</span></p><p data-dcnode-id="1492" style="visibility: hidden; position: absolute; top: 0px; left: 0px; width: 244px;"><span data-dcnode-id="1493" instrument_node="">How often do you replace everyday flatware?</span></p><div data-dcnode-id="1487" style="position:absolute;left:0;top:0;right:0;bottom:0;overflow:hidden;z-index:-1;visibility:hidden"><div data-dcnode-id="1490" style="position:absolute;left:0;top:0;right:0;bottom:0;overflow:hidden;z-index:-1;visibility:hidden"><div data-dcnode-id="1491" style="position: absolute; left: 0px; top: 0px; width: 254px; height: 58px;"></div></div><div data-dcnode-id="1488" style="position:absolute;left:0;top:0;right:0;bottom:0;overflow:hidden;z-index:-1;visibility:hidden"><div data-dcnode-id="1489" style="position:absolute;left:0;top:0;width:200%;height:200%"></div></div></div></div><div class="hz-inline-question__comment-no text-m" data-dcnode-id="1484"><span data-dcnode-id="1485" instrument_node="">Comments (121)</span></div><div class="hz-inline-question__comment" data-dcnode-id="1479"><div class="hz-inline-question__comment-body" data-dcnode-id="1482"><span data-dcnode-id="1483" instrument_node="">Sterling silver can't have anything "wear off" since it is silver all the way through.  Silver plate can be "re-plated," I believe.  You ask a good question, though, about what is the metal underneath that plating.  I would guess that it might depend on when it was made.   I have been using my Reed and Barton stainless since I got it as a bridal gift in 1982 and it still looks like the day I got it.  I have bought a few replacement pieces over the years to fill in gaps for pieces that have gone missing.  They cost a fortune, but I figure it's cheaper than buying a whole new set of something that I don't like as well.   My silver is still going strong.  Mine is mixed in with my mom's.  Same pattern.  Can't tell the difference - 1982 and 1947.</span></div><div class="hz-inline-question__comment-see-more" data-dcnode-id="1480"><span data-dcnode-id="1481" instrument_node="">...See More</span></div></div></a><a class="hz-inline-question text-l" data-dcnode-id="1460" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.houzz.com/discussions/985575/how-often-do-you-vacuum" objid="985575" posid="2"><div class="hz-text-clamp hz-inline-question__title" data-dcnode-id="1468" style="height:48px"><p class="hz-text-clamp__text-node" data-dcnode-id="1476" style="-webkit-line-clamp:2;-webkit-box-orient:vertical"><span data-dcnode-id="1477" instrument_node="">How often do you vacuum?</span></p><p data-dcnode-id="1474" style="visibility: hidden; position: absolute; top: 0px; left: 0px; width: 244px;"><span data-dcnode-id="1475" instrument_node="">How often do you vacuum?</span></p><div data-dcnode-id="1469" style="position:absolute;left:0;top:0;right:0;bottom:0;overflow:hidden;z-index:-1;visibility:hidden"><div data-dcnode-id="1472" style="position:absolute;left:0;top:0;right:0;bottom:0;overflow:hidden;z-index:-1;visibility:hidden"><div data-dcnode-id="1473" style="position: absolute; left: 0px; top: 0px; width: 254px; height: 58px;"></div></div><div data-dcnode-id="1470" style="position:absolute;left:0;top:0;right:0;bottom:0;overflow:hidden;z-index:-1;visibility:hidden"><div data-dcnode-id="1471" style="position:absolute;left:0;top:0;width:200%;height:200%"></div></div></div></div><div class="hz-inline-question__comment-no text-m" data-dcnode-id="1466"><span data-dcnode-id="1467" instrument_node="">Comments (97)</span></div><div class="hz-inline-question__comment" data-dcnode-id="1461"><div class="hz-inline-question__comment-body" data-dcnode-id="1464"><span data-dcnode-id="1465" instrument_node="">I use a Roomba and he vacuums daily. Perfectly safe on engineered hardwood, tile,hardwood and concrete.  I haven't tried him on a cork floor yet. Sometime leaves black rub marks on baseboards. I think I would buy a white unit next time.</span></div><div class="hz-inline-question__comment-see-more" data-dcnode-id="1462"><span data-dcnode-id="1463" instrument_node="">...See More</span></div></div></a><a class="hz-inline-question text-l" data-dcnode-id="1442" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.houzz.com/discussions/1188555/what-do-you-use-to-wash-your-windows-and-how-often-do-you-do-it" objid="1188555" posid="3"><div class="hz-text-clamp hz-inline-question__title" data-dcnode-id="1450" style="height:48px"><p class="hz-text-clamp__text-node" data-dcnode-id="1458" style="-webkit-line-clamp:2;-webkit-box-orient:vertical"><span data-dcnode-id="1459" instrument_node="">What do you use to wash your windows and how often do you…</span></p><p data-dcnode-id="1456" style="visibility: hidden; position: absolute; top: 0px; left: 0px; width: 244px;"><span data-dcnode-id="1457" instrument_node="">What do you use to wash your windows and how often do you…</span></p><div data-dcnode-id="1451" style="position:absolute;left:0;top:0;right:0;bottom:0;overflow:hidden;z-index:-1;visibility:hidden"><div data-dcnode-id="1454" style="position:absolute;left:0;top:0;right:0;bottom:0;overflow:hidden;z-index:-1;visibility:hidden"><div data-dcnode-id="1455" style="position: absolute; left: 0px; top: 0px; width: 254px; height: 58px;"></div></div><div data-dcnode-id="1452" style="position:absolute;left:0;top:0;right:0;bottom:0;overflow:hidden;z-index:-1;visibility:hidden"><div data-dcnode-id="1453" style="position:absolute;left:0;top:0;width:200%;height:200%"></div></div></div></div><div class="hz-inline-question__comment-no text-m" data-dcnode-id="1448"><span data-dcnode-id="1449" instrument_node="">Comments (148)</span></div><div class="hz-inline-question__comment" data-dcnode-id="1443"><div class="hz-inline-question__comment-body" data-dcnode-id="1446"><span data-dcnode-id="1447" instrument_node="">I was in the industrial cleaning biz for 15 years and hired a service to clean some of the most important windows at the GM Tech Center.  He used Dawn and a squeegee.  The rags were only used to dry his squeegee.  Sadly, my own windows are a mess from years of bug spray which they claim will rinse off with a power washer.  Nope.  It doesn't.  We quit the service 5 years ago and the windows are all still hazy.  It's something to do with the pyrethrum and I've asked around - yep, it's bad for windows but you can't help to get the overspray when they spray your entire house. When I clean my windows I use Dawn, cleaning vinegar, and a nice squeegee and only a towel to dry my squeegee.  You don't go up and down or from one side to the other.  You go in a big hairpin turn type of swiping with the squeegee.  It's hard to describe, but, it's how it's done. Yes, it's time.  I haven't cleaned mine since spring, mostly because I haven't been here much.  Our windows at our vacation home are bad as well, right now. I've been there as much as I've been here.</span></div><div class="hz-inline-question__comment-see-more" data-dcnode-id="1444"><span data-dcnode-id="1445" instrument_node="">...See More</span></div></div></a></div></div></li><li class="comment-list__item" data-dcnode-id="1399" id="13929410"><div class="comment-list__item-container comment-list__best-comment-container" data-dcnode-id="1400"><div class="comment-list__item-avatar pull-left mrm" data-dcnode-id="1436"><a class="user-avatar-link" data-dcnode-id="1437" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.houzz.com/user/chisue"><img alt="" class="comment-list__item-avatar-img hz-user-image" data-dcnode-id="1438" height="40" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.houzz.com/res/27519650/pic/user_0.png%3Fv%3D27519650&amp;raw" width="40"></a></div><div class="comment-list__item-content" data-dcnode-id="1414"><h6 class="comment-list__item-username text-m text-bold" data-dcnode-id="1433"><a data-dcnode-id="1434" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.houzz.com/user/chisue"><span data-dcnode-id="1435" instrument_node="">chisue</span></a></h6><div class="comment-list__item-time" data-dcnode-id="1428"><div class="comment-list__item-time--created text-xs text-muted" data-dcnode-id="1429"><span data-dcnode-id="1430"><span data-dcnode-id="1431"><span data-dcnode-id="1432" instrument_node="">13 years ago</span></span></span></div></div><div class="message-body new-message-body text-l" data-dcnode-id="1415"><p data-dcnode-id="1426"><span data-dcnode-id="1427" instrument_node="">I hadn't considered my primary residence JUST as an investment, but I am sorry we stayed for 30 years in lower-appreciating area of our suburb. By the time we moved that had changed; the selling price for our home was comparable to the entire suburb. Would we have had more in our pocket if we'd first bought in the 'more desireable' areas, or if we'd moved to one during those 30 years? I don't know. </span></p><span data-dcnode-id="1425" instrument_node="">
</span><p data-dcnode-id="1423"><span data-dcnode-id="1424" instrument_node="">When we did move it was because we woke up one day and realized we were living very far below our means. It was still a 'nice' neighborhood, but nothing special. Possibly staying put was a factor in eventually *having* those means? Buying, selling, moving eat up considerable cash. </span></p><span data-dcnode-id="1422" instrument_node="">
</span><p data-dcnode-id="1420"><span data-dcnode-id="1421" instrument_node="">I don't know if we are in a better financial position *because* we moved to a better place and built a nicer home, taking from portfolio to do so. We pay less income tax -- and more property tax. We enjoy the house, neighborhood and town every day, which is more fun than trying to 'cozy up' to a brokerage statement. </span></p><span data-dcnode-id="1419" instrument_node="">
</span><p data-dcnode-id="1417"><span data-dcnode-id="1418" instrument_node="">It's a very interesting qustion!</span></p><span data-dcnode-id="1416" instrument_node="">
</span></div></div><div class="comment-list__item-footer" data-container="Comment Actions" data-dcnode-id="1402"><ul class="comment-list__item-actions text-xxs text-muted mb0 mrl" data-dcnode-id="1403"><li class="comment-list__item-action comment-list__item-action--like" data-dcnode-id="1409"><button class="comment-list__item-action-btn btn btn-link pl0 pr0" data-dcnode-id="1410"><span aria-hidden="true" class="icon-font icon-thumb_solid comment-list__item-action-btn-icon" data-compid="comment_like" data-component="Like" data-dcnode-id="1413"></span><span class="comment-list__item-action-btn-label text-bold text-xs mls" data-compid="comment_show_like" data-component="Like" data-dcnode-id="1411"><span data-dcnode-id="1412" instrument_node="">Like</span></span></button></li><li class="comment-list__item-action comment-list__item-action--save mlm" data-dcnode-id="1404"><button class="comment-list__item-action-btn btn btn-link pl0 pr0" data-compid="comment_save" data-component="Save" data-dcnode-id="1405"><span aria-hidden="true" class="icon-font icon-heart comment-list__item-action-btn-icon" data-dcnode-id="1408"></span><span class="comment-list__item-action-btn-label text-bold text-xs mls" data-dcnode-id="1406"><span data-dcnode-id="1407" instrument_node="">Save</span></span></button></li></ul></div><div class="comment-list__item-best-comment" data-dcnode-id="1401"></div></div></li><li class="comment-list__item" data-dcnode-id="1365" id="13929411"><div class="comment-list__item-container comment-list__best-comment-container" data-dcnode-id="1366"><div class="comment-list__item-avatar pull-left mrm" data-dcnode-id="1396"><a class="user-avatar-link" data-dcnode-id="1397" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.houzz.com/user/kellyeng"><img alt="" class="comment-list__item-avatar-img hz-user-image" data-dcnode-id="1398" height="40" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.houzz.com/res/27519650/pic/user_0.png%3Fv%3D27519650&amp;raw" width="40"></a></div><div class="comment-list__item-content" data-dcnode-id="1380"><h6 class="comment-list__item-username text-m text-bold" data-dcnode-id="1393"><a data-dcnode-id="1394" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.houzz.com/user/kellyeng"><span data-dcnode-id="1395" instrument_node="">kellyeng</span></a></h6><div class="comment-list__item-time" data-dcnode-id="1388"><div class="comment-list__item-time--created text-xs text-muted" data-dcnode-id="1389"><span data-dcnode-id="1390"><span data-dcnode-id="1391"><span data-dcnode-id="1392" instrument_node="">13 years ago</span></span></span></div></div><div class="message-body new-message-body text-l" data-dcnode-id="1381"><p data-dcnode-id="1386"><span data-dcnode-id="1387" instrument_node="">I live in an area (Central TX) that has, on average, a 4% appreciation per year for the last 20 years. This is a very modest amount compared to other areas of the country but at least we can expect that if there is a depreciation it won't be by much. Based on this information, I would feel comfortable moving maybe once every 10 or 15 years. We did just that with our previous house (sold after 10 years) and doubled how much we bought our house for (didn't make double because of renovations, etc.). Our current plan is to live in this house for about 15 years and then downsize. As long as the appreciation stays on track we should come out nicely, maybe even be able to purchase our next property with equity alone. </span></p><span data-dcnode-id="1385" instrument_node="">
</span><p data-dcnode-id="1383"><span data-dcnode-id="1384" instrument_node="">Of course, this is all just pie in the sky.</span></p><span data-dcnode-id="1382" instrument_node="">
</span></div></div><div class="comment-list__item-footer" data-container="Comment Actions" data-dcnode-id="1368"><ul class="comment-list__item-actions text-xxs text-muted mb0 mrl" data-dcnode-id="1369"><li class="comment-list__item-action comment-list__item-action--like" data-dcnode-id="1375"><button class="comment-list__item-action-btn btn btn-link pl0 pr0" data-dcnode-id="1376"><span aria-hidden="true" class="icon-font icon-thumb_solid comment-list__item-action-btn-icon" data-compid="comment_like" data-component="Like" data-dcnode-id="1379"></span><span class="comment-list__item-action-btn-label text-bold text-xs mls" data-compid="comment_show_like" data-component="Like" data-dcnode-id="1377"><span data-dcnode-id="1378" instrument_node="">Like</span></span></button></li><li class="comment-list__item-action comment-list__item-action--save mlm" data-dcnode-id="1370"><button class="comment-list__item-action-btn btn btn-link pl0 pr0" data-compid="comment_save" data-component="Save" data-dcnode-id="1371"><span aria-hidden="true" class="icon-font icon-heart comment-list__item-action-btn-icon" data-dcnode-id="1374"></span><span class="comment-list__item-action-btn-label text-bold text-xs mls" data-dcnode-id="1372"><span data-dcnode-id="1373" instrument_node="">Save</span></span></button></li></ul></div><div class="comment-list__item-best-comment" data-dcnode-id="1367"></div></div></li><li class="comment-list__item" data-dcnode-id="1331" id="13929412"><div class="comment-list__item-container comment-list__best-comment-container" data-dcnode-id="1332"><div class="comment-list__item-avatar pull-left mrm" data-dcnode-id="1362"><a class="user-avatar-link" data-dcnode-id="1363" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.houzz.com/user/pamghatten"><img alt="" class="comment-list__item-avatar-img hz-user-image" data-dcnode-id="1364" height="40" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//st.hzcdn.com/fimgs/7c63bc0d04dfcb37_4919-w40-h40-b0-p0--.jpg&amp;raw" width="40"></a></div><div class="comment-list__item-content" data-dcnode-id="1346"><h6 class="comment-list__item-username text-m text-bold" data-dcnode-id="1359"><a data-dcnode-id="1360" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.houzz.com/user/pamghatten"><span data-dcnode-id="1361" instrument_node="">pamghatten</span></a></h6><div class="comment-list__item-time" data-dcnode-id="1354"><div class="comment-list__item-time--created text-xs text-muted" data-dcnode-id="1355"><span data-dcnode-id="1356"><span data-dcnode-id="1357"><span data-dcnode-id="1358" instrument_node="">13 years ago</span></span></span></div></div><div class="message-body new-message-body text-l" data-dcnode-id="1347"><p data-dcnode-id="1352"><span data-dcnode-id="1353" instrument_node="">I move when the home or neighborhood I am currently living in no longer meets my needs. As someone else stated above, I put my money in other investments to gain wealth. </span></p><span data-dcnode-id="1351" instrument_node="">
</span><p data-dcnode-id="1349"><span data-dcnode-id="1350" instrument_node="">Saying that, this is my third and last home. I am living in my forever home, which I bought 11 years ago. I will be 50 next year. Hope to be here the next 30 - 40 years.</span></p><span data-dcnode-id="1348" instrument_node="">

650/pic/user_0.png%3Fv%3D27519650&amp;raw" width="40"></a></div><div class="comment-list__item-content" data-dcnode-id="1315"><h6 class="comment-list__item-username text-m text-bold" data-dcnode-id="1325"><a data-dcnode-id="1326" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.houzz.com/user/mfbenson-gw"><span data-dcnode-id="1327" instrument_node="">mfbenson</span></a></h6><div class="comment-list__item-time" data-dcnode-id="1320"><div class="comment-list__item-time--created text-xs text-muted" data-dcnode-id="1321"><span data-dcnode-id="1322"><span data-dcnode-id="1323"><span data-dcnode-id="1324" instrument_node="">13 years ago</span></span></span></div></div><div class="message-body new-message-body text-l" data-dcnode-id="1316"><p data-dcnode-id="1318"><span data-dcnode-id="1319" instrument_node="">Hmm. I've heard that you should stay in a place a minimum of 2 to 5 years (depending on the source and who's math you believe) but I've never heard about a maximum time you should stay. Personally I think the expense and hassles of moving are such that you should do it as little as possible, within reason. If the house or the neighborhood no longer fit your needs and you have the means to move on, do so.</span></p><span data-dcnode-id="1317" instrument_node="">

0/pic/user_0.png%3Fv%3D27519650&amp;raw" width="40"></a></div><div class="comment-list__item-content" data-dcnode-id="1279"><h6 class="comment-list__item-username text-m text-bold" data-dcnode-id="1294"><a data-dcnode-id="1295" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.houzz.com/user/scootawop"><span data-dcnode-id="1296" instrument_node="">scootawop</span></a></h6><div class="comment-list__item-time" data-dcnode-id="1289"><div class="comment-list__item-time--created text-xs text-muted" data-dcnode-id="1290"><span data-dcnode-id="1291"><span data-dcnode-id="1292"><span data-dcnode-id="1293" instrument_node="">13 years ago</span></span></span></div></div><div class="message-body new-message-body text-l" data-dcnode-id="1280"><p data-dcnode-id="1287"><span data-dcnode-id="1288" instrument_node="">I posed your question to an acquaintance, who answered thusly: </span></p><span data-dcnode-id="1286" instrument_node="">
</span><p data-dcnode-id="1282"><span data-dcnode-id="1285" instrument_node="">"The minute a new house in built in a new neighborhood that's nicer and newer than yours, you should move there. This might require moving every day, but it's worth it.</span><br data-dcnode-id="1284"><span data-dcnode-id="1283" instrument_node="">I think Buckingham Palace and Windsor Castle are kinda old, not so nice. Maybe Queen Elizabeth should move." </span></p><span data-dcnode-id="1281" instrument_node="">
</span></div></div><div class="comment-list__item-footer" data-container="Comment Actions" data-dcnode-id="1267"><ul class="comment-list__item-actions text-xxs text-muted mb0 mrl" data-dcnode-id="1268"><li class="comment-list__item-action comment-list__item-action--like" data-dcnode-id="1274"><button class="comment-list__item-action-btn btn btn-link pl0 pr0" data-dcnode-id="1275"><span aria-hidden="true" class="icon-font icon-thumb_solid comment-list__item-action-btn-icon" data-compid="comment_like" data-component="Like" data-dcnode-id="1278"></span><span class="comment-list__item-action-btn-label text-bold text-xs mls" data-compid="comment_show_like" data-component="Like" data-dcnode-id="1276"><span data-dcnode-id="1277" instrument_node="">Like</span></span></button></li><li class="comment-list__item-action comment-list__item-action--save mlm" data-dcnode-id="1269"><button class="comment-list__item-action-btn btn btn-link pl0 pr0" data-compid="comment_save" data-component="Save" data-dcnode-id="1270"><span aria-hidden="true" class="icon-font icon-heart comment-list__item-action-btn-icon" data-dcnode-id="1273"></span><span class="comment-list__item-action-btn-label text-bold text-xs mls" data-dcnode-id="1271"><span data-dcnode-id="1272" instrument_node="">Save</span></span></button></li></ul></div><div class="comment-list__item-best-comment" data-dcnode-id="1266"></div></div></li><li class="comment-list__item" data-dcnode-id="1226" id="13929415"><div class="comment-list__item-container comment-list__best-comment-container" data-dcnode-id="1227"><div class="comment-list__item-avatar pull-left mrm" data-dcnode-id="1261"><a class="user-avatar-link" data-dcnode-id="1262" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.houzz.com/user/1nonlyj"><img alt="" class="comment-list__item-avatar-img hz-user-image" data-dcnode-id="1263" height="40" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//st.hzcdn.com/fimgs/d7934c400567257f_8389-w40-h40-b0-p0--.jpg&amp;raw" width="40"></a></div><div class="comment-list__item-content" data-dcnode-id="1241"><h6 class="comment-list__item-username text-m text-bold" data-dcnode-id="1258"><a data-dcnode-id="1259" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.houzz.com/user/1nonlyj"><span data-dcnode-id="1260" instrument_node="">IdaClaire</span></a></h6><div class="comment-list__item-time" data-dcnode-id="1253"><div class="comment-list__item-time--created text-xs text-muted" data-dcnode-id="1254"><span data-dcnode-id="1255"><span data-dcnode-id="1256"><span data-dcnode-id="1257" instrument_node="">13 years ago</span></span></span></div></div><div class="message-body new-message-body text-l" data-dcnode-id="1242"><p data-dcnode-id="1247"><span data-dcnode-id="1252" instrument_node="">DH &amp; I don't think of housing that way at all.</span><br data-dcnode-id="1251"><span data-dcnode-id="1250" instrument_node="">Our house is our home...not a means to wealth.</span><br data-dcnode-id="1249"><span data-dcnode-id="1248" instrument_node="">To gain the most wealth, DH and I have invested in stocks, bonds, mutual funds and funded 401(k), 403 (b), IRAs, etc. </span></p><span data-dcnode-id="1246" instrument_node="">
</span><p data-dcnode-id="1244"><span data-dcnode-id="1245" instrument_node="">You took the words right outta my mouth. That's my thinking exactly! </span></p><span data-dcnode-id="1243" instrument_node="">
</span></div></div><div class="comment-list__item-footer" data-container="Comment Actions" data-dcnode-id="1229"><ul class="comment-list__item-actions text-xxs text-muted mb0 mrl" data-dcnode-id="1230"><li class="comment-list__item-action comment-list__item-action--like" data-dcnode-id="1236"><button class="comment-list__item-action-btn btn btn-link pl0 pr0" data-dcnode-id="1237"><span aria-hidden="true" class="icon-font icon-thumb_solid comment-list__item-action-btn-icon" data-compid="comment_like" data-component="Like" data-dcnode-id="1240"></span><span class="comment-list__item-action-btn-label text-bold text-xs mls" data-compid="comment_show_like" data-component="Like" data-dcnode-id="1238"><span data-dcnode-id="1239" instrument_node="">Like</span></span></button></li><li class="comment-list__item-action comment-list__item-action--save mlm" data-dcnode-id="1231"><button class="comment-list__item-action-btn btn btn-link pl0 pr0" data-compid="comment_save" data-component="Save" data-dcnode-id="1232"><span aria-hidden="true" class="icon-font icon-heart comment-list__item-action-btn-icon" data-dcnode-id="1235"></span><span class="comment-list__item-action-btn-label text-bold text-xs mls" data-dcnode-id="1233"><span data-dcnode-id="1234" instrument_node="">Save</span></span></button></li></ul></div><div class="comment-list__item-best-comment" data-dcnode-id="1228"></div></div></li><li class="comment-list__item" data-dcnode-id="1152" id="13929416"><div class="comment-list__item-container comment-list__best-comment-container" data-dcnode-id="1153"><div class="comment-list__item-avatar pull-left mrm" data-dcnode-id="1223"><a class="user-avatar-link" data-dcnode-id="1224" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.houzz.com/user/dave-donhoff"><img alt="" class="comment-list__item-avatar-img hz-user-image" data-dcnode-id="1225" height="40" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.houzz.com/res/27519650/pic/user_0.png%3Fv%3D27519650&amp;raw" width="40"></a></div><div class="comment-list__item-content" data-dcnode-id="1167"><h6 class="comment-list__item-username text-m text-bold" data-dcnode-id="1220"><a data-dcnode-id="1221" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.houzz.com/user/dave-donhoff"><span data-dcnode-id="1222" instrument_node="">dave_donhoff</span></a></h6><div class="comment-list__item-time" data-dcnode-id="1215"><div class="comment-list__item-time--created text-xs text-muted" data-dcnode-id="1216"><span data-dcnode-id="1217"><span data-dcnode-id="1218"><span data-dcnode-id="1219" instrument_node="">13 years ago</span></span></span></div></div><div class="message-body new-message-body text-l" data-dcnode-id="1168"><p data-dcnode-id="1213"><span data-dcnode-id="1214" instrument_node="">Hi Deanie1, </span></p><span data-dcnode-id="1212" instrument_node="">
</span><p data-dcnode-id="1210"><span data-dcnode-id="1211" instrument_node="">how often should you move? </span></p><span data-dcnode-id="1209" instrument_node="">
</span><p data-dcnode-id="1207"><span data-dcnode-id="1208" instrument_node="">My doctor says at LEAST once a day... else, a mug of warm water &amp; metameucil can do the trick! </span></p><span data-dcnode-id="1206" instrument_node="">
</span><p data-dcnode-id="1204"><span data-dcnode-id="1205" instrument_node="">Oh... that's not what you meant? </span></p><span data-dcnode-id="1203" instrument_node="">
</span><p data-dcnode-id="1201"><span data-dcnode-id="1202" instrument_node="">I have a general question regarding moving--if there are no outside forces making you move from your home--how often should you move to gain the most wealth? </span></p><span data-dcnode-id="1200" instrument_node="">
</span><p data-dcnode-id="1198"><span data-dcnode-id="1199" instrument_node="">Never. Moving doesn't increase your wealth. </span></p><span data-dcnode-id="1197" instrument_node="">
</span><p data-dcnode-id="1195"><span data-dcnode-id="1196" instrument_node="">For example, let's say you live in an average neighborhood in an average suburban town. Your neighborhood, like most others, gets older, and newer nicer neighborhoods are being built all the time all around you. Should you leave your average home on a regular basis and "move up" -- or -- should you try to stay in your current home and pay down your mortgage with the goal of owning your home outright, despite the fact that your neighborhood is not as nice as it once was? </span></p><span data-dcnode-id="1194" instrument_node="">
</span><p data-dcnode-id="1192"><span data-dcnode-id="1193" instrument_node="">FIRST of, eliminating your mortgage does nothing for increasing your net worth. It merely moves cash from one bucket (your investable cashflow) over to a different bucket (your non-growing real estate equity.) The interest rate you "save" in the elimination of your leverage is generally far less than the combination of investment interest/returns lost, and the costs of the risks you incur by exposing your equity to market loss in the real estate. </span></p><span data-dcnode-id="1191" instrument_node="">
</span><p data-dcnode-id="1189"><span data-dcnode-id="1190" instrument_node="">NEXT, whatever home you live in is a CONSUMPTION expense. You are "digesting" the useage of the square footage, the bedrooms, the bathrooms, plumbing, roofing, etc. etc. of that particular asset with no income stream coming to you. </span></p><span data-dcnode-id="1188" instrument_node="">
</span><p data-dcnode-id="1186"><span data-dcnode-id="1187" instrument_node="">You *HAVE TO* live SOMEWHERE... which means that "consumption" is not an option it is a requirement.... HOWEVER, your degree of expense *IS* controllable. </span></p><span data-dcnode-id="1185" instrument_node="">
</span><p data-dcnode-id="1183"><span data-dcnode-id="1184" instrument_node="">The less of your investable income you consume (digest, burn, flush away, etc.) the more of that income you have to put to work in growth investments. </span></p><span data-dcnode-id="1182" instrument_node="">
</span><p data-dcnode-id="1180"><span data-dcnode-id="1181" instrument_node="">Counting on residential housing as a growth investment only, without any cashflow income stream coming from it in the way of rents, is a poor poor gamble, in my opinion. </span></p><span data-dcnode-id="1179" instrument_node="">
</span><p data-dcnode-id="1177"><span data-dcnode-id="1178" instrument_node="">If you are going to personally "move up in housing" try to make the absolute greatest leap you safely can at one time... don't take "baby steps" because every time you buy/sell you lose from 10-15% of the "ground" you had previously gained because of transactional costs, moving costs, diversion and distraction. </span></p><span data-dcnode-id="1176" instrument_node="">
</span><p data-dcnode-id="1170"><span data-dcnode-id="1175" instrument_node="">Luck!</span><br data-dcnode-id="1174"><span data-dcnode-id="1173" instrument_node="">Dave Donhoff</span><br data-dcnode-id="1172"><span data-dcnode-id="1171" instrument_node="">Leverage Planner</span></p><span data-dcnode-id="1169" instrument_node="">
</span></div></div><div class="comment-list__item-footer" data-container="Comment Actions" data-dcnode-id="1155"><ul class="comment-list__item-actions text-xxs text-muted mb0 mrl" data-dcnode-id="1156"><li class="comment-list__item-action comment-list__item-action--like" data-dcnode-id="1162"><button class="comment-list__item-action-btn btn btn-link pl0 pr0" data-dcnode-id="1163"><span aria-hidden="true" class="icon-font icon-thumb_solid comment-list__item-action-btn-icon" data-compid="comment_like" data-component="Like" data-dcnode-id="1166"></span><span class="comment-list__item-action-btn-label text-bold text-xs mls" data-compid="comment_show_like" data-component="Like" data-dcnode-id="1164"><span data-dcnode-id="1165" instrument_node="">Like</span></span></button></li><li class="comment-list__item-action comment-list__item-action--save mlm" data-dcnode-id="1157"><button class="comment-list__item-action-btn btn btn-link pl0 pr0" data-compid="comment_save" data-component="Save" data-dcnode-id="1158"><span aria-hidden="true" class="icon-font icon-heart comment-list__item-action-btn-icon" data-dcnode-id="1161"></span><span class="comment-list__item-action-btn-label text-bold text-xs mls" data-dcnode-id="1159"><span data-dcnode-id="1160" instrument_node="">Save</span></span></button></li></ul></div><div class="comment-list__item-best-comment" data-dcnode-id="1154"></div></div></li><li class="comment-list__item" data-dcnode-id="1119" id="13929417"><div class="comment-list__item-container comment-list__best-comment-container" data-dcnode-id="1120"><div class="comment-list__item-avatar pull-left mrm" data-dcnode-id="1149"><a class="user-avatar-link" data-dcnode-id="1150" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.houzz.com/user/scdeb424"><img alt="" class="comment-list__item-avatar-img hz-user-image" data-dcnode-id="1151" height="40" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.houzz.com/res/27519650/pic/user_0.png%3Fv%3D27519650&amp;raw" width="40"></a></div><div class="comment-list__item-content" data-dcnode-id="1134"><h6 class="comment-list__item-username text-m text-bold" data-dcnode-id="1146"><a data-dcnode-id="1147" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.houzz.com/user/scdeb424"><span data-dcnode-id="1148" instrument_node="">scdeb424</span></a></h6><div class="comment-list__item-time" data-dcnode-id="1141"><div class="comment-list__item-time--created text-xs text-muted" data-dcnode-id="1142"><span data-dcnode-id="1143"><span data-dcnode-id="1144"><span data-dcnode-id="1145" instrument_node="">13 years ago</span></span></span></div></div><div class="message-body new-message-body text-l" data-dcnode-id="1135"><p data-dcnode-id="1137"><span data-dcnode-id="1140" instrument_node="">People who make money by moving are the ones who make corporate moves and know their house will always be sold and that they will make a profit because their company takes care of it. Moving from the North to the South on the east coast is another way you will move up in the housing market--we see that all the time in South Carolina. Now there are people in Florida moving North to get away from the hurricanes--a lot of them can buy a better, bigger house.</span><br data-dcnode-id="1139"><span data-dcnode-id="1138" instrument_node="">Moving is such a stressful thing to some people that maybe it is not worth it to do it unless it involves a job change. </span></p><span data-dcnode-id="1136" instrument_node="">
</span></div></div><div class="comment-list__item-footer" data-container="Comment Actions" data-dcnode-id="1122"><ul class="comment-list__item-actions text-xxs text-muted mb0 mrl" data-dcnode-id="1123"><li class="comment-list__item-action comment-list__item-action--like" data-dcnode-id="1129"><button class="comment-list__item-action-btn btn btn-link pl0 pr0" data-dcnode-id="1130"><span aria-hidden="true" class="icon-font icon-thumb_solid comment-list__item-action-btn-icon" data-compid="comment_like" data-component="Like" data-dcnode-id="1133"></span><span class="comment-list__item-action-btn-label text-bold text-xs mls" data-compid="comment_show_like" data-component="Like" data-dcnode-id="1131"><span data-dcnode-id="1132" instrument_node="">Like</span></span></button></li><li class="comment-list__item-action comment-list__item-action--save mlm" data-dcnode-id="1124"><button class="comment-list__item-action-btn btn btn-link pl0 pr0" data-compid="comment_save" data-component="Save" data-dcnode-id="1125"><span aria-hidden="true" class="icon-font icon-heart comment-list__item-action-btn-icon" data-dcnode-id="1128"></span><span class="comment-list__item-action-btn-label text-bold text-xs mls" data-dcnode-id="1126"><span data-dcnode-id="1127" instrument_node="">Save</span></span></button></li></ul></div><div class="comment-list__item-best-comment" data-dcnode-id="1121"></div></div></li><li class="comment-list__item" data-dcnode-id="1078" id="13929418"><div class="comment-list__item-container comment-list__best-comment-container" data-dcnode-id="1079"><div class="comment-list__item-avatar pull-left mrm" data-dcnode-id="1116"><a class="user-avatar-link" data-dcnode-id="1117" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.houzz.com/user/cmarlin20"><img alt="" class="comment-list__item-avatar-img hz-user-image" data-dcnode-id="1118" height="40" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.houzz.com/res/27519650/pic/user_0.png%3Fv%3D27519650&amp;raw" width="40"></a></div><div class="comment-list__item-content" data-dcnode-id="1093"><h6 class="comment-list__item-username text-m text-bold" data-dcnode-id="1113"><a data-dcnode-id="1114" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.houzz.com/user/cmarlin20"><span data-dcnode-id="1115" instrument_node="">C Marlin</span></a></h6><div class="comment-list__item-time" data-dcnode-id="1108"><div class="comment-list__item-time--created text-xs text-muted" data-dcnode-id="1109"><span data-dcnode-id="1110"><span data-dcnode-id="1111"><span data-dcnode-id="1112" instrument_node="">13 years ago</span></span></span></div></div><div class="message-body new-message-body text-l" data-dcnode-id="1094"><p data-dcnode-id="1096"><span data-dcnode-id="1107" instrument_node="">I live in the land of movers - Southern California.</span><br data-dcnode-id="1106"><span data-dcnode-id="1105" instrument_node="">People can and do make considerable financial gains (increased wealth) buying and selling their primary residences.</span><br data-dcnode-id="1104"><span data-dcnode-id="1103" instrument_node="">The actual time in each house varies on the market, having a set number of years isn't the formula, it is knowing your market. Obviously now if not a great time to sell, but if a property is desirable one can sell at a good price, and with good shopping pickup a good priced replacement.</span><br data-dcnode-id="1102"><span data-dcnode-id="1101" instrument_node="">It is varies on individual goals.</span><br data-dcnode-id="1100"><span data-dcnode-id="1099" instrument_node="">Several years ago, we wanted a larger house, we knew the larger ones were appreciating faster than our small house, therefore, we were losing ground in the market, we moved quickly.</span><br data-dcnode-id="1098"><span data-dcnode-id="1097" instrument_node="">Don't forget the benefit of a $500k tax free gain if married. One needn't reinvest that money in their house, it can work for you elsewhere.</span></p><span data-dcnode-id="1095" instrument_node="">
</span></div></div><div class="comment-list__item-footer" data-container="Comment Actions" data-dcnode-id="1081"><ul class="comment-list__item-actions text-xxs text-muted mb0 mrl" data-dcnode-id="1082"><li class="comment-list__item-action comment-list__item-action--like" data-dcnode-id="1088"><button class="comment-list__item-action-btn btn btn-link pl0 pr0" data-dcnode-id="1089"><span aria-hidden="true" class="icon-font icon-thumb_solid comment-list__item-action-btn-icon" data-compid="comment_like" data-component="Like" data-dcnode-id="1092"></span><span class="comment-list__item-action-btn-label text-bold text-xs mls" data-compid="comment_show_like" data-component="Like" data-dcnode-id="1090"><span data-dcnode-id="1091" instrument_node="">Like</span></span></button></li><li class="comment-list__item-action comment-list__item-action--save mlm" data-dcnode-id="1083"><button class="comment-list__item-action-btn btn btn-link pl0 pr0" data-compid="comment_save" data-component="Save" data-dcnode-id="1084"><span aria-hidden="true" class="icon-font icon-heart comment-list__item-action-btn-icon" data-dcnode-id="1087"></span><span class="comment-list__item-action-btn-label text-bold text-xs mls" data-dcnode-id="1085"><span data-dcnode-id="1086" instrument_node="">Save</span></span></button></li></ul></div><div class="comment-list__item-best-comment" data-dcnode-id="1080"></div></div></li><li class="comment-list__item" data-dcnode-id="1041" id="13929419"><div class="comment-list__item-container comment-list__best-comment-container" data-dcnode-id="1042"><div class="comment-list__item-avatar pull-left mrm" data-dcnode-id="1075"><a class="user-avatar-link" data-dcnode-id="1076" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.houzz.com/user/tom418"><img alt="" class="comment-list__item-avatar-img hz-user-image" data-dcnode-id="1077" height="40" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.houzz.com/res/27519650/pic/user_0.png%3Fv%3D27519650&amp;raw" width="40"></a></div><div class="comment-list__item-content" data-dcnode-id="1056"><h6 class="comment-list__item-username text-m text-bold" data-dcnode-id="1072"><a data-dcnode-id="1073" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.houzz.com/user/tom418"><span data-dcnode-id="1074" instrument_node="">tom418</span></a></h6><div class="comment-list__item-time" data-dcnode-id="1067"><div class="comment-list__item-time--created text-xs text-muted" data-dcnode-id="1068"><span data-dcnode-id="1069"><span data-dcnode-id="1070"><span data-dcnode-id="1071" instrument_node="">13 years ago</span></span></span></div></div><div class="message-body new-message-body text-l" data-dcnode-id="1057"><p data-dcnode-id="1065"><span data-dcnode-id="1066" instrument_node="">"I have a general question regarding moving--if there are no outside forces making you move from your home--how often should you move to gain the most wealth?" </span></p><span data-dcnode-id="1064" instrument_node="">
</span><p data-dcnode-id="1062"><span data-dcnode-id="1063" instrument_node="">Like the others posted, your house is a home, not an investment vehicle. </span></p><span data-dcnode-id="1061" instrument_node="">
</span><p data-dcnode-id="1059"><span data-dcnode-id="1060" instrument_node="">You don't buy a house just because some self-proclaimed expert on CNBC or whatever says "it's a good time to buy", etc. </span></p><span data-dcnode-id="1058" instrument_node="">
</span></div></div><div class="comment-list__item-footer" data-container="Comment Actions" data-dcnode-id="1044"><ul class="comment-list__item-actions text-xxs text-muted mb0 mrl" data-dcnode-id="1045"><li class="comment-list__item-action comment-list__item-action--like" data-dcnode-id="1051"><button class="comment-list__item-action-btn btn btn-link pl0 pr0" data-dcnode-id="1052"><span aria-hidden="true" class="icon-font icon-thumb_solid comment-list__item-action-btn-icon" data-compid="comment_like" data-component="Like" data-dcnode-id="1055"></span><span class="comment-list__item-action-btn-label text-bold text-xs mls" data-compid="comment_show_like" data-component="Like" data-dcnode-id="1053"><span data-dcnode-id="1054" instrument_node="">Like</span></span></button></li><li class="comment-list__item-action comment-list__item-action--save mlm" data-dcnode-id="1046"><button class="comment-list__item-action-btn btn btn-link pl0 pr0" data-compid="comment_save" data-component="Save" data-dcnode-id="1047"><span aria-hidden="true" class="icon-font icon-heart comment-list__item-action-btn-icon" data-dcnode-id="1050"></span><span class="comment-list__item-action-btn-label text-bold text-xs mls" data-dcnode-id="1048"><span data-dcnode-id="1049" instrument_node="">Save</span></span></button></li></ul></div><div class="comment-list__item-best-comment" data-dcnode-id="1043"></div></div></li><li class="comment-list__item" data-dcnode-id="1007" id="13929420"><div class="comment-list__item-container comment-list__best-comment-container" data-dcnode-id="1008"><div class="comment-list__item-avatar pull-left mrm" data-dcnode-id="1038"><a class="user-avatar-link" data-dcnode-id="1039" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.houzz.com/user/kgsd-gw"><img alt="" class="comment-list__item-avatar-img hz-user-image" data-dcnode-id="1040" height="40" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.houzz.com/res/27519650/pic/user_0.png%3Fv%3D27519650&amp;raw" width="40"></a></div><div class="comment-list__item-content" data-dcnode-id="1022"><h6 class="comment-list__item-username text-m text-bold" data-dcnode-id="1035"><a data-dcnode-id="1036" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.houzz.com/user/kgsd-gw"><span data-dcnode-id="1037" instrument_node="">kgsd</span></a></h6><div class="comment-list__item-time" data-dcnode-id="1030"><div class="comment-list__item-time--created text-xs text-muted" data-dcnode-id="1031"><span data-dcnode-id="1032"><span data-dcnode-id="1033"><span data-dcnode-id="1034" instrument_node="">13 years ago</span></span></span></div></div><div class="message-body new-message-body text-l" data-dcnode-id="1023"><p data-dcnode-id="1028"><span data-dcnode-id="1029" instrument_node="">The OP makes an assumption that neighborhoods decline in value and desireability as they age. I don't think that's always the case. My neighborhood is 30 years old and has held its value very well. We moved here about a year ago and specifically chose this neighborhood over newer neighborhoods nearby because of the huge trees, non cookie-cutter homes and stability (many of our neighbors have been here over 15 years). </span></p><span data-dcnode-id="1027" instrument_node="">
</span><p data-dcnode-id="1025"><span data-dcnode-id="1026" instrument_node="">As other people have said, buying and selling homes costs money and eats into profits. And even if you live in an area with rapid appreciation, you still have to live somewhere. We bought the nicest house we could afford and plan to stay here until retirement, unless we get involved in another corporate relocation.</span></p><span data-dcnode-id="1024" instrument_node="">
</span></div></div><div class="comment-list__item-footer" data-container="Comment Actions" data-dcnode-id="1010"><ul class="comment-list__item-actions text-xxs text-muted mb0 mrl" data-dcnode-id="1011"><li class="comment-list__item-action comment-list__item-action--like" data-dcnode-id="1017"><button class="comment-list__item-action-btn btn btn-link pl0 pr0" data-dcnode-id="1018"><span aria-hidden="true" class="icon-font icon-thumb_solid comment-list__item-action-btn-icon" data-compid="comment_like" data-component="Like" data-dcnode-id="1021"></span><span class="comment-list__item-action-btn-label text-bold text-xs mls" data-compid="comment_show_like" data-component="Like" data-dcnode-id="1019"><span data-dcnode-id="1020" instrument_node="">Like</span></span></button></li><li class="comment-list__item-action comment-list__item-action--save mlm" data-dcnode-id="1012"><button class="comment-list__item-action-btn btn btn-link pl0 pr0" data-compid="comment_save" data-component="Save" data-dcnode-id="1013"><span aria-hidden="true" class="icon-font icon-heart comment-list__item-action-btn-icon" data-dcnode-id="1016"></span><span class="comment-list__item-action-btn-label text-bold text-xs mls" data-dcnode-id="1014"><span data-dcnode-id="1015" instrument_node="">Save</span></span></button></li></ul></div><div class="comment-list__item-best-comment" data-dcnode-id="1009"></div></div></li><li class="comment-list__item" data-dcnode-id="973" id="13929421"><div class="comment-list__item-container comment-list__best-comment-container" data-dcnode-id="974"><div class="comment-list__item-avatar pull-left mrm" data-dcnode-id="1004"><a class="user-avatar-link" data-dcnode-id="1005" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.houzz.com/user/artemis78"><img alt="" class="comment-list__item-avatar-img hz-user-image" data-dcnode-id="1006" height="40" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.houzz.com/res/27519650/pic/user_0.png%3Fv%3D27519650&amp;raw" width="40"></a></div><div class="comment-list__item-content" data-dcnode-id="988"><h6 class="comment-list__item-username text-m text-bold" data-dcnode-id="1001"><a data-dcnode-id="1002" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.houzz.com/user/artemis78"><span data-dcnode-id="1003" instrument_node="">artemis78</span></a></h6><div class="comment-list__item-time" data-dcnode-id="996"><div class="comment-list__item-time--created text-xs text-muted" data-dcnode-id="997"><span data-dcnode-id="998"><span data-dcnode-id="999"><span data-dcnode-id="1000" instrument_node="">13 years ago</span></span></span></div></div><div class="message-body new-message-body text-l" data-dcnode-id="989"><p data-dcnode-id="994"><span data-dcnode-id="995" instrument_node="">kgsd, I definitely agree. In our area, older neighborhoods actually command higher values than most of the new neighborhoods, in part because new developments are a dime a dozen (this is in California!) and older neighborhoods of Craftsmans or Mediterraneans can't be re-created--there's a limited supply of those homes, especially the ones in pristine condition. </span></p><span data-dcnode-id="993" instrument_node="">
</span><p data-dcnode-id="991"><span data-dcnode-id="992" instrument_node="">That said, I remember my grandmother exclaiming how wonderful it was that she had lived in a home for 30+ years and raised her children there, and now, after all that time and use she'd gotten out of it, someone was going to repay her for what she had spent on it over the years. It's a refreshing view: housing not as an investment strategy, but as a piece of your life. Consider your mortgage payment not as an investment, but simply as a cost of living. Are you able to (and comfortable with) making that monthly payment in exchange for having this place to live each month? If so, you'll be in better shape to weather the ups and downs in the market, because at the end of the day you're investing in a community, not in a commodity.</span></p><span data-dcnode-id="990" instrument_node="">
</span></div></div><div class="comment-list__item-footer" data-container="Comment Actions" data-dcnode-id="976"><ul class="comment-list__item-actions text-xxs text-muted mb0 mrl" data-dcnode-id="977"><li class="comment-list__item-action comment-list__item-action--like" data-dcnode-id="983"><button class="comment-list__item-action-btn btn btn-link pl0 pr0" data-dcnode-id="984"><span aria-hidden="true" class="icon-font icon-thumb_solid comment-list__item-action-btn-icon" data-compid="comment_like" data-component="Like" data-dcnode-id="987"></span><span class="comment-list__item-action-btn-label text-bold text-xs mls" data-compid="comment_show_like" data-component="Like" data-dcnode-id="985"><span data-dcnode-id="986" instrument_node="">Like</span></span></button></li><li class="comment-list__item-action comment-list__item-action--save mlm" data-dcnode-id="978"><button class="comment-list__item-action-btn btn btn-link pl0 pr0" data-compid="comment_save" data-component="Save" data-dcnode-id="979"><span aria-hidden="true" class="icon-font icon-heart comment-list__item-action-btn-icon" data-dcnode-id="982"></span><span class="comment-list__item-action-btn-label text-bold text-xs mls" data-dcnode-id="980"><span data-dcnode-id="981" instrument_node="">Save</span></span></button></li></ul></div><div class="comment-list__item-best-comment" data-dcnode-id="975"></div></div></li><li class="comment-list__item" data-dcnode-id="936" id="13929422"><div class="comment-list__item-container comment-list__best-comment-container" data-dcnode-id="937"><div class="comment-list__item-avatar pull-left mrm" data-dcnode-id="970"><a class="user-avatar-link" data-dcnode-id="971" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.houzz.com/user/housenewbie-gw"><img alt="" class="comment-list__item-avatar-img hz-user-image" data-dcnode-id="972" height="40" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.houzz.com/res/27519650/pic/user_0.png%3Fv%3D27519650&amp;raw" width="40"></a></div><div class="comment-list__item-content" data-dcnode-id="951"><h6 class="comment-list__item-username text-m text-bold" data-dcnode-id="967"><a data-dcnode-id="968" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.houzz.com/user/housenewbie-gw"><span data-dcnode-id="969" instrument_node="">housenewbie</span></a></h6><div class="comment-list__item-time" data-dcnode-id="962"><div class="comment-list__item-time--created text-xs text-muted" data-dcnode-id="963"><span data-dcnode-id="964"><span data-dcnode-id="965"><span data-dcnode-id="966" instrument_node="">13 years ago</span></span></span></div></div><div class="message-body new-message-body text-l" data-dcnode-id="952"><p data-dcnode-id="960"><span data-dcnode-id="961" instrument_node="">And another reason newer isn't always better is that those new developments are often sitting empty or half-empty nowadays, and the builder might even go bankrupt and not get around to doing all the little finish things that make things nice (landscaping, etc.) </span></p><span data-dcnode-id="959" instrument_node="">
</span><p data-dcnode-id="957"><span data-dcnode-id="958" instrument_node="">Plus, so many new houses are built like crap. I'll take my 1950s w/ the mature oak trees any day. </span></p><span data-dcnode-id="956" instrument_node="">
</span><p data-dcnode-id="954"><span data-dcnode-id="955" instrument_node="">Besides, moving sux. I'd rather have dental surgery.</span></p><span data-dcnode-id="953" instrument_node="">
</span></div></div><div class="comment-list__item-footer" data-container="Comment Actions" data-dcnode-id="939"><ul class="comment-list__item-actions text-xxs text-muted mb0 mrl" data-dcnode-id="940"><li class="comment-list__item-action comment-list__item-action--like" data-dcnode-id="946"><button class="comment-list__item-action-btn btn btn-link pl0 pr0" data-dcnode-id="947"><span aria-hidden="true" class="icon-font icon-thumb_solid comment-list__item-action-btn-icon" data-compid="comment_like" data-component="Like" data-dcnode-id="950"></span><span class="comment-list__item-action-btn-label text-bold text-xs mls" data-compid="comment_show_like" data-component="Like" data-dcnode-id="948"><span data-dcnode-id="949" instrument_node="">Like</span></span></button></li><li class="comment-list__item-action comment-list__item-action--save mlm" data-dcnode-id="941"><button class="comment-list__item-action-btn btn btn-link pl0 pr0" data-compid="comment_save" data-component="Save" data-dcnode-id="942"><span aria-hidden="true" class="icon-font icon-heart comment-list__item-action-btn-icon" data-dcnode-id="945"></span><span class="comment-list__item-action-btn-label text-bold text-xs mls" data-dcnode-id="943"><span data-dcnode-id="944" instrument_node="">Save</span></span></button></li></ul></div><div class="comment-list__item-best-comment" data-dcnode-id="938"></div></div></li><li class="comment-list__item" data-dcnode-id="902" id="13929423"><div class="comment-list__item-container comment-list__best-comment-container" data-dcnode-id="903"><div class="comment-list__item-avatar pull-left mrm" data-dcnode-id="933"><a class="user-avatar-link" data-dcnode-id="934" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.houzz.com/user/chisue"><img alt="" class="comment-list__item-avatar-img hz-user-image" data-dcnode-id="935" height="40" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.houzz.com/res/27519650/pic/user_0.png%3Fv%3D27519650&amp;raw" width="40"></a></div><div class="comment-list__item-content" data-dcnode-id="917"><h6 class="comment-list__item-username text-m text-bold" data-dcnode-id="930"><a data-dcnode-id="931" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.houzz.com/user/chisue"><span data-dcnode-id="932" instrument_node="">chisue</span></a></h6><div class="comment-list__item-time" data-dcnode-id="925"><div class="comment-list__item-time--created text-xs text-muted" data-dcnode-id="926"><span data-dcnode-id="927"><span data-dcnode-id="928"><span data-dcnode-id="929" instrument_node="">13 years ago</span></span></span></div></div><div class="message-body new-message-body text-l" data-dcnode-id="918"><p data-dcnode-id="923"><span data-dcnode-id="924" instrument_node="">kgsd -- Thanks for catching that the OP seemed to think that all older neighborhoods decline. I missed that part of the reasoning. </span></p><span data-dcnode-id="922" instrument_node="">
</span><p data-dcnode-id="920"><span data-dcnode-id="921" instrument_node="">'Old' can be very, very good for appreciation. So far at least (!), I can say that nothing ever loses value in the established neighborhood where we built (teardown). This area was subdivided around 1900; is close to town and train; has highly rated schools and great public services (including a forestry department). </span></p><span data-dcnode-id="919" instrument_node="">
