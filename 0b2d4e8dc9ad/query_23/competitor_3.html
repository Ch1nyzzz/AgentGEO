ata-dcnode-id="7022" instrument_node="">Keywords</span></h2><div class="keyword" data-dcnode-id="7018" id="k0005"><span data-dcnode-id="7019"><span data-dcnode-id="7020" instrument_node="">Microbial consortia</span></span></div><div class="keyword" data-dcnode-id="7015" id="k0010"><span data-dcnode-id="7016"><span data-dcnode-id="7017" instrument_node="">Screening</span></span></div><div class="keyword" data-dcnode-id="7012" id="k0015"><span data-dcnode-id="7013"><span data-dcnode-id="7014" instrument_node="">Selective degradation</span></span></div><div class="keyword" data-dcnode-id="7009" id="k0020"><span data-dcnode-id="7010"><span data-dcnode-id="7011" instrument_node="">Lignin</span></span></div><div class="keyword" data-dcnode-id="7006" id="k0025"><span data-dcnode-id="7007"><span data-dcnode-id="7008" instrument_node="">Tree trimmings</span></span></div></div></div><span data-dcnode-id="7003" instrument_node=""></span><div class="Body u-font-serif" data-dcnode-id="3481" id="body"><div data-dcnode-id="3585"><section data-dcnode-id="6761" id="s0005"><h2 class="u-h3 u-margin-l-top u-margin-xs-bottom" data-dcnode-id="6999" id="st025"><span data-dcnode-id="7002" instrument_node="">1</span><span data-dcnode-id="7001" instrument_node="">. </span><span data-dcnode-id="7000" instrument_node="">Introduction</span></h2><p data-dcnode-id="6990" id="p0030"><span data-dcnode-id="6994"><span data-dcnode-id="6998" instrument_node="">As a principal constituent of green waste, tree trimmings in urban areas have imposed an increasing pressure on environment during the rapid urbanization, especially when the garden area becomes an urbanized landscaping prevalently favored by current residents. Owing to a lack of recognition that it is a renewable natural resource in abundance, the tree trimming has been disposed in several methods with high expense for years, pervasively using </span><a class="topic-link" data-dcnode-id="6996" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.sciencedirect.com/topics/agricultural-and-biological-sciences/landfills" title="Learn more about landfill from ScienceDirect's AI-generated Topic Pages"><span data-dcnode-id="6997" instrument_node="">landfill</span></a><span data-dcnode-id="6995" instrument_node="">, </span></span><a class="topic-link" data-dcnode-id="6992" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.sciencedirect.com/topics/engineering/incineration" title="Learn more about incineration from ScienceDirect's AI-generated Topic Pages"><span data-dcnode-id="6993" instrument_node="">incineration</span></a><span data-dcnode-id="6991" instrument_node=""> and so forth that polluted the air and soil in the meantime. Fortunately, due to the resource scarcity and the deteriorating natural environment at present, reusing green wastes has gradually become a mainstream activity for alleviation. Besides, such an innovative measure to treat the tree trimming as a reproducible resource is encouraged by advanced technologies and developed understanding.</span></p><p data-dcnode-id="6972" id="p0035"><span data-dcnode-id="6989" instrument_node="">Nevertheless, researches revealed a technical problem in efficient degradation of tree trimmings due to the obstruction of lignin (</span><a class="workspace-trigger" data-dcnode-id="6987" href="#b0170" name="bb0170"><span data-dcnode-id="6988" instrument_node="">Shi et al., 2013</span></a><span data-dcnode-id="6982"><span data-dcnode-id="6986" instrument_node="">) which is an essential component of the cell wall of various plants. Thus, getting rid of the correlated lignin is critical to promote utilization of cellulose in tree trimmings since the two contents are conjugated in a mosaic structure via varied bonds including ether bond and </span><a class="topic-link" data-dcnode-id="6984" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.sciencedirect.com/topics/engineering/ester-bond" title="Learn more about ester bond from ScienceDirect's AI-generated Topic Pages"><span data-dcnode-id="6985" instrument_node="">ester bond</span></a><span data-dcnode-id="6983" instrument_node=""> that restrain the direct extraction of cellulose (</span></span><a class="workspace-trigger" data-dcnode-id="6980" href="#b9005" name="bb9005"><span data-dcnode-id="6981" instrument_node="">Chen and Wan, 2017</span></a><span data-dcnode-id="6979" instrument_node="">, </span><a class="workspace-trigger" data-dcnode-id="6977" href="#b0030" name="bb0030"><span data-dcnode-id="6978" instrument_node="">Brethauer and Studer, 2015</span></a><span data-dcnode-id="6976" instrument_node="">, </span><a class="workspace-trigger" data-dcnode-id="6974" href="#b0050" name="bb0050"><span data-dcnode-id="6975" instrument_node="">Das et al., 2015</span></a><span data-dcnode-id="6973" instrument_node="">).</span></p><p data-dcnode-id="6928" id="p0040"><span data-dcnode-id="6967"><span data-dcnode-id="6971" instrument_node="">Moreover, green waste currently receives superior consideration as a vital source for production in paper industry and bio-fuel manufacture thanks to the production of paper or ethanol from a multitude of </span><a class="topic-link" data-dcnode-id="6969" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.sciencedirect.com/topics/engineering/lignocellulosics" title="Learn more about lignocellulosic from ScienceDirect's AI-generated Topic Pages"><span data-dcnode-id="6970" instrument_node="">lignocellulosic</span></a><span data-dcnode-id="6968" instrument_node=""> materials is quite attractive and promising (</span></span><a class="workspace-trigger" data-dcnode-id="6965" href="#b0010" name="bb0010"><span data-dcnode-id="6966" instrument_node="">Ali et al., 2017</span></a><span data-dcnode-id="6964" instrument_node="">, </span><a class="workspace-trigger" data-dcnode-id="6962" href="#b0125" name="bb0125"><span data-dcnode-id="6963" instrument_node="">Maurya et al., 2015</span></a><span data-dcnode-id="6961" instrument_node="">, </span><a class="workspace-trigger" data-dcnode-id="6959" href="#b0005" name="bb0005"><span data-dcnode-id="6960" instrument_node="">Aguiar et al., 2014</span></a><span data-dcnode-id="6958" instrument_node="">, </span><a class="workspace-trigger" data-dcnode-id="6956" href="#b0120" name="bb0120"><span data-dcnode-id="6957" instrument_node="">Margeot et al., 2009</span></a><span data-dcnode-id="6951"><span data-dcnode-id="6955" instrument_node="">). More specifically, the waste reused in paper industry relies on the recycle of cellulose to </span><a class="topic-link" data-dcnode-id="6953" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.sciencedirect.com/topics/earth-and-planetary-sciences/form-paper" title="Learn more about form paper from ScienceDirect's AI-generated Topic Pages"><span data-dcnode-id="6954" instrument_node="">form paper</span></a><span data-dcnode-id="6952" instrument_node=""> sheets after the removal of lignin (</span></span><a class="workspace-trigger" data-dcnode-id="6949" href="#b9005" name="bb9005"><span data-dcnode-id="6950" instrument_node="">Chen and Wan, 2017</span></a><span data-dcnode-id="6932"><span data-dcnode-id="6948" instrument_node="">) while the biofuel manufacture aims to reuse the available amount of cellulose and </span><a class="topic-link" data-dcnode-id="6946" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.sciencedirect.com/topics/biochemistry-genetics-and-molecular-biology/hemicellulose" title="Learn more about hemicellulose from ScienceDirect's AI-generated Topic Pages"><span data-dcnode-id="6947" instrument_node="">hemicellulose</span></a><span data-dcnode-id="6933"><span data-dcnode-id="6937"><span data-dcnode-id="6941"><span data-dcnode-id="6945" instrument_node=""> after the </span><a class="topic-link" data-dcnode-id="6943" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.sciencedirect.com/topics/biochemistry-genetics-and-molecular-biology/delignification" title="Learn more about delignification from ScienceDirect's AI-generated Topic Pages"><span data-dcnode-id="6944" instrument_node="">delignification</span></a><span data-dcnode-id="6942" instrument_node="">. In other words, the key to improving the recycling process of green waste is maintaining the amount of cellulose or hemicellulose with an adequate removal of lignin, which could provide </span></span><a class="topic-link" data-dcnode-id="6939" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.sciencedirect.com/topics/earth-and-planetary-sciences/micro-organism" title="Learn more about microbes from ScienceDirect's AI-generated Topic Pages"><span data-dcnode-id="6940" instrument_node="">microbes</span></a><span data-dcnode-id="6938" instrument_node=""> with larger accessible surface to the cellulose and facilitate the </span></span><a class="topic-link" data-dcnode-id="6935" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.sciencedirect.com/topics/biochemistry-genetics-and-molecular-biology/enzymatic-hydrolysis" title="Learn more about hydrolysis from ScienceDirect's AI-generated Topic Pages"><span data-dcnode-id="6936" instrument_node="">hydrolysis</span></a><span data-dcnode-id="6934" instrument_node=""> of feedstock (</span></span></span><a class="workspace-trigger" data-dcnode-id="6930" href="#b0090" name="bb0090"><span data-dcnode-id="6931" instrument_node="">Knežević et al., 2013</span></a><span data-dcnode-id="6929" instrument_node="">).</span></p><p data-dcnode-id="6850" id="p0045"><span data-dcnode-id="6927" instrument_node="">According to </span><a class="workspace-trigger" data-dcnode-id="6925" href="#b0180" name="bb0180"><span data-dcnode-id="6926" instrument_node="">Sudiyani et al., 2014</span></a><span data-dcnode-id="6924" instrument_node="">, </span><a class="workspace-trigger" data-dcnode-id="6922" href="#b0045" name="bb0045"><span data-dcnode-id="6923" instrument_node="">Chang et al., 2012</span></a><span data-dcnode-id="6921" instrument_node="">, </span><a class="workspace-trigger" data-dcnode-id="6919" href="#b0155" name="bb0155"><span data-dcnode-id="6920" instrument_node="">Salvachúa et al., 2013</span></a><span data-dcnode-id="6914"><span data-dcnode-id="6918" instrument_node="">, the chemical and physicochemical </span><a class="topic-link" data-dcnode-id="6916" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.sciencedirect.com/topics/agricultural-and-biological-sciences/pretreatment" title="Learn more about pretreatment from ScienceDirect's AI-generated Topic Pages"><span data-dcnode-id="6917" instrument_node="">pretreatment</span></a><span data-dcnode-id="6915" instrument_node=""> broke the lignin structure for enzymatic contact with the cellulose, respectively by adopting strong acid and steam explosion while a pretreatment using CuSO</span></span><sub data-dcnode-id="6912"><span data-dcnode-id="6913" instrument_node="">4</span></sub><span data-dcnode-id="6899"><span data-dcnode-id="6903"><span data-dcnode-id="6911" instrument_node="">-syringic acid supplements promoted lignin degradation by the cause of an ascent in the activities of </span><a class="topic-link" data-dcnode-id="6909" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.sciencedirect.com/topics/biochemistry-genetics-and-molecular-biology/lignin-peroxidase" title="Learn more about lignin peroxidases from ScienceDirect's AI-generated Topic Pages"><span data-dcnode-id="6910" instrument_node="">lignin peroxidases</span></a><span data-dcnode-id="6904"><span data-dcnode-id="6908" instrument_node=""> (LiP), </span><a class="topic-link" data-dcnode-id="6906" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.sciencedirect.com/topics/biochemistry-genetics-and-molecular-biology/manganese-peroxidase" title="Learn more about manganese peroxidases from ScienceDirect's AI-generated Topic Pages"><span data-dcnode-id="6907" instrument_node="">manganese peroxidases</span></a><span data-dcnode-id="6905" instrument_node=""> (MnP), and </span></span></span><a class="topic-link" data-dcnode-id="6901" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.sciencedirect.com/topics/biochemistry-genetics-and-molecular-biology/laccase" title="Learn more about laccase from ScienceDirect's AI-generated Topic Pages"><span data-dcnode-id="6902" instrument_node="">laccase</span></a><span data-dcnode-id="6900" instrument_node=""> (Lac) was studied by </span></span><a class="workspace-trigger" data-dcnode-id="6897" href="#b0130" name="bb0130"><span data-dcnode-id="6898" instrument_node="">Mishra et al. (2017)</span></a><span data-dcnode-id="6888"><span data-dcnode-id="6896" instrument_node="">. However, such methods could lead to an increased number of unwanted compounds with high operational costs when enhanced the </span><a class="topic-link" data-dcnode-id="6894" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.sciencedirect.com/topics/earth-and-planetary-sciences/solubilization" title="Learn more about solubilization from ScienceDirect's AI-generated Topic Pages"><span data-dcnode-id="6895" instrument_node="">solubilization</span></a><span data-dcnode-id="6889"><span data-dcnode-id="6893" instrument_node=""> of the </span><a class="topic-link" data-dcnode-id="6891" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.sciencedirect.com/topics/engineering/lignocellulosic-biomass" title="Learn more about lignocellulosic biomass from ScienceDirect's AI-generated Topic Pages"><span data-dcnode-id="6892" instrument_node="">lignocellulosic biomass</span></a><span data-dcnode-id="6890" instrument_node=""> (</span></span></span><a class="workspace-trigger" data-dcnode-id="6886" href="#b0150" name="bb0150"><span data-dcnode-id="6887" instrument_node="">Poszytek et al., 2016</span></a><span data-dcnode-id="6885" instrument_node="">, </span><a class="workspace-trigger" data-dcnode-id="6883" href="#b0030" name="bb0030"><span data-dcnode-id="6884" instrument_node="">Brethauer and Studer, 2015</span></a><span data-dcnode-id="6882" instrument_node="">, </span><a class="workspace-trigger" data-dcnode-id="6880" href="#b0155" name="bb0155"><span data-dcnode-id="6881" instrument_node="">Salvachúa et al., 2013</span></a><span data-dcnode-id="6871"><span data-dcnode-id="6875"><span data-dcnode-id="6879" instrument_node="">). Consequently, there is a tendency for industrial production to incorporate </span><a class="topic-link" data-dcnode-id="6877" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.sciencedirect.com/topics/earth-and-planetary-sciences/thermochemical" title="Learn more about thermochemical from ScienceDirect's AI-generated Topic Pages"><span data-dcnode-id="6878" instrument_node="">thermochemical</span></a><span data-dcnode-id="6876" instrument_node=""> method with biological pretreatment as one access to depolymerise polymer subunits present in lignin, whose loss will impact parameters as the </span></span><a class="topic-link" data-dcnode-id="6873" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.sciencedirect.com/topics/earth-and-planetary-sciences/catalytic-activity" title="Learn more about enzyme activity from ScienceDirect's AI-generated Topic Pages"><span data-dcnode-id="6874" instrument_node="">enzyme activity</span></a><span data-dcnode-id="6872" instrument_node=""> that could be recorded as an efficiency indicator for the bio-pretreatment process (</span></span><a class="workspace-trigger" data-dcnode-id="6869" href="#b0130" name="bb0130"><span data-dcnode-id="6870" instrument_node="">Mishra et al., 2017</span></a><span data-dcnode-id="6868" instrument_node="">, </span><a class="workspace-trigger" data-dcnode-id="6866" href="#b0040" name="bb0040"><span data-dcnode-id="6867" instrument_node="">Canilha et al., 2012</span></a><span data-dcnode-id="6857"><span data-dcnode-id="6861"><span data-dcnode-id="6865" instrument_node="">). Besides, such methods liberated a range of </span><a class="topic-link" data-dcnode-id="6863" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.sciencedirect.com/topics/earth-and-planetary-sciences/phenolic-compound" title="Learn more about phenolic compounds from ScienceDirect's AI-generated Topic Pages"><span data-dcnode-id="6864" instrument_node="">phenolic compounds</span></a><span data-dcnode-id="6862" instrument_node=""> which represented potential substrates for </span></span><a class="topic-link" data-dcnode-id="6859" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.sciencedirect.com/topics/earth-and-planetary-sciences/bioconversion" title="Learn more about bioconversion from ScienceDirect's AI-generated Topic Pages"><span data-dcnode-id="6860" instrument_node="">bioconversion</span></a><span data-dcnode-id="6858" instrument_node=""> by omega-transaminases whilst technologies and global research for conversing cellulose into ethanol were already appreciable (</span></span><a class="workspace-trigger" data-dcnode-id="6855" href="#b0025" name="bb0025"><span data-dcnode-id="6856" instrument_node="">Bensah and Mensah, 2013</span></a><span data-dcnode-id="6854" instrument_node="">, </span><a class="workspace-trigger" data-dcnode-id="6852" href="#b0195" name="bb0195"><span data-dcnode-id="6853" instrument_node="">Tengerdy and Szakacs, 2003</span></a><span data-dcnode-id="6851" instrument_node="">).</span></p><p data-dcnode-id="6798" id="p0050"><span data-dcnode-id="6849" instrument_node="">In terms of biodegradation with a use of fungi, which has been investigated for several decades with a majority in white-rot species (e.g. </span><span data-dcnode-id="6845"><em data-dcnode-id="6846"><a class="topic-link" data-dcnode-id="6847" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.sciencedirect.com/topics/biochemistry-genetics-and-molecular-biology/phanerochaete" title="Learn more about Phanerochaete chrysosporium from ScienceDirect's AI-generated Topic Pages"><span data-dcnode-id="6848" instrument_node="">Phanerochaete chrysosporium</span></a></em></span><span data-dcnode-id="6844" instrument_node="">) (</span><a class="workspace-trigger" data-dcnode-id="6842" href="#b0170" name="bb0170"><span data-dcnode-id="6843" instrument_node="">Shi et al., 2013</span></a><span data-dcnode-id="6841" instrument_node="">, </span><a class="workspace-trigger" data-dcnode-id="6839" href="#b0240" name="bb0240"><span data-dcnode-id="6840" instrument_node="">Zhang et al., 2012</span></a><span data-dcnode-id="6838" instrument_node="">, </span><a class="workspace-trigger" data-dcnode-id="6836" href="#b0165" name="bb0165"><span data-dcnode-id="6837" instrument_node="">Shi et al., 2008</span></a><span data-dcnode-id="6835" instrument_node="">, </span><a class="workspace-trigger" data-dcnode-id="6833" href="#b0225" name="bb0225"><span data-dcnode-id="6834" instrument_node="">Wu et al., 2005</span></a><span data-dcnode-id="6832" instrument_node="">) despite the efficiency of this method is limited by the long culture period of fungi on wood and their individual sensitivities to growing conditions. Taking a staple fungal species with high capability of lignin degradation as an example, the white-rot fungi employed a ligninolytic system with the enzyme involved as a single one or a combination of the following: lignin peroxidases (LiP), manganese peroxidases (MnP), and laccase (Lac) (</span><a class="workspace-trigger" data-dcnode-id="6830" href="#b0070" name="bb0070"><span data-dcnode-id="6831" instrument_node="">de Gonzalo et al., 2016</span></a><span data-dcnode-id="6829" instrument_node="">, </span><a class="workspace-trigger" data-dcnode-id="6827" href="#b0220" name="bb0220"><span data-dcnode-id="6828" instrument_node="">Wesenberg et al., 2003</span></a><span data-dcnode-id="6822"><span data-dcnode-id="6826" instrument_node="">) after invaded into the cell cavity of wood materials. However, the effectiveness of such a system of extracellular enzymes may also be dependent on the type of substrate as wood or </span><a class="topic-link" data-dcnode-id="6824" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.sciencedirect.com/topics/earth-and-planetary-sciences/agricultural-waste" title="Learn more about agricultural wastes from ScienceDirect's AI-generated Topic Pages"><span data-dcnode-id="6825" instrument_node="">agricultural wastes</span></a><span data-dcnode-id="6823" instrument_node="">, owing to the differences in chemical compositions and structures (</span></span><a class="workspace-trigger" data-dcnode-id="6820" href="#b0045" name="bb0045"><span data-dcnode-id="6821" instrument_node="">Chang et al., 2012</span></a><span data-dcnode-id="6819" instrument_node="">, </span><a class="workspace-trigger" data-dcnode-id="6817" href="#b0100" name="bb0100"><span data-dcnode-id="6818" instrument_node="">Li et al., 2008</span></a><span data-dcnode-id="6816" instrument_node="">). According to </span><a class="workspace-trigger" data-dcnode-id="6814" href="#b0210" name="bb0210"><span data-dcnode-id="6815" instrument_node="">Ventorino et al. (2015)</span></a><span data-dcnode-id="6805"><span data-dcnode-id="6809"><span data-dcnode-id="6813" instrument_node="">, abundances of the major and minor taxa retrieved during biodegradation could be influenced by the selective pressure produced by the lignocellulosic </span><a class="topic-link" data-dcnode-id="6811" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.sciencedirect.com/topics/engineering/plant-specie" title="Learn more about plant species from ScienceDirect's AI-generated Topic Pages"><span data-dcnode-id="6812" instrument_node="">plant species</span></a><span data-dcnode-id="6810" instrument_node="">. Hence, this study offers a new insight into selective lignin degradation in tree trimmings served by </span></span><a class="topic-link" data-dcnode-id="6807" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.sciencedirect.com/topics/biochemistry-genetics-and-molecular-biology/microbial-consortium" title="Learn more about microbial consortia from ScienceDirect's AI-generated Topic Pages"><span data-dcnode-id="6808" instrument_node="">microbial consortia</span></a><span data-dcnode-id="6806" instrument_node=""> with vigorous stability, which could significantly promote the cellulose recycling in green waste and benefit the production of paper and biofuel (</span></span><a class="workspace-trigger" data-dcnode-id="6803" href="#b0170" name="bb0170"><span data-dcnode-id="6804" instrument_node="">Shi et al., 2013</span></a><span data-dcnode-id="6802" instrument_node="">, </span><a class="workspace-trigger" data-dcnode-id="6800" href="#b0225" name="bb0225"><span data-dcnode-id="6801" instrument_node="">Wu et al., 2005</span></a><span data-dcnode-id="6799" instrument_node="">).</span></p><p data-dcnode-id="6771" id="p0055"><span data-dcnode-id="6797" instrument_node="">In terms of biodegradation by bacteria, a common overmatch called </span><span data-dcnode-id="6793"><em data-dcnode-id="6794"><a class="topic-link" data-dcnode-id="6795" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.sciencedirect.com/topics/biochemistry-genetics-and-molecular-biology/actinobacteria" title="Learn more about actinomycetes from ScienceDirect's AI-generated Topic Pages"><span data-dcnode-id="6796" instrument_node="">actinomycetes</span></a></em></span><span data-dcnode-id="6792" instrument_node="">, could display a likewise excellent capability of lignin degradation (</span><a class="workspace-trigger" data-dcnode-id="6790" href="#b0170" name="bb0170"><span data-dcnode-id="6791" instrument_node="">Shi et al., 2013</span></a><span data-dcnode-id="6785"><span data-dcnode-id="6789" instrument_node="">) as fungi, had a way of facilitating the water solubility of lignin to get through those insoluble materials including lignin and cellulose before reached the intended section. Hence, biological pretreatment of </span><a class="topic-link" data-dcnode-id="6787" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.sciencedirect.com/topics/agricultural-and-biological-sciences/solid-wastes" title="Learn more about solid wastes from ScienceDirect's AI-generated Topic Pages"><span data-dcnode-id="6788" instrument_node="">solid wastes</span></a><span data-dcnode-id="6786" instrument_node=""> presents an attractive option that is both energy-saving and environmentally friendly even though it is restricted by function conditions and varying substrates (</span></span><a class="workspace-trigger" data-dcnode-id="6783" href="#b0080" name="bb0080"><span data-dcnode-id="6784" instrument_node="">Kabel et al., 2017</span></a><span data-dcnode-id="6782" instrument_node="">, </span><a class="workspace-trigger" data-dcnode-id="6780" href="#b0090" name="bb0090"><span data-dcnode-id="6781" instrument_node="">Knežević et al., 2013</span></a><span data-dcnode-id="6779" instrument_node="">, </span><a class="workspace-trigger" data-dcnode-id="6777" href="#b0045" name="bb0045"><span data-dcnode-id="6778" instrument_node="">Chang et al., 2012</span></a><span data-dcnode-id="6772"><span data-dcnode-id="6776" instrument_node="">). Whereas there has no single </span><a class="topic-link" data-dcnode-id="6774" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.sciencedirect.com/topics/earth-and-planetary-sciences/microflora" title="Learn more about microflora from ScienceDirect's AI-generated Topic Pages"><span data-dcnode-id="6775" instrument_node="">microflora</span></a><span data-dcnode-id="6773" instrument_node=""> that is merely capable of lignin degradation or performed effectively in selective lignin degradation so far. Besides, a microflora that can be directly applied in plants for relative production has not yet recorded, thus, such a species of great economic worth in utilization will be eagerly investigated in future.</span></span></p><p data-dcnode-id="6762" id="p0060"><span data-dcnode-id="6770" instrument_node="">Considering the capability of lignin degradation by a single bacterium has been reported to be much weaker than using a microbial consortium (</span><a class="workspace-trigger" data-dcnode-id="6768" href="#b0010" name="bb0010"><span data-dcnode-id="6769" instrument_node="">Ali et al., 2017</span></a><span data-dcnode-id="6763"><span data-dcnode-id="6767" instrument_node="">), a microbial consortium with efficient capability of selective lignin degradation was desired in this work. After manipulated in the primary screening, re-screening and identification in this work, a group of microbial consortium named DM-1 was designedly screened for a productive use in the selective degradation of tree trimmings, featured by both a slight disturbance to </span><a class="topic-link" data-dcnode-id="6765" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.sciencedirect.com/topics/engineering/cellulose-content" title="Learn more about cellulose content from ScienceDirect's AI-generated Topic Pages"><span data-dcnode-id="6766" instrument_node="">cellulose content</span></a><span data-dcnode-id="6764" instrument_node=""> and a prominent degradation of lignin content. Besides, the essential components of microbial consortium DM-1 were recognized by plate isolation and 16S rDNA sequencing whilst the latter has analyzed its diversity authentically.</span></span></p></section><section data-dcnode-id="6494" id="s0010"><h2 class="u-h3 u-margin-l-top u-margin-xs-bottom" data-dcnode-id="6757" id="st030"><span data-dcnode-id="6760" instrument_node="">2</span><span data-dcnode-id="6759" instrument_node="">. </span><span data-dcnode-id="6758" instrument_node="">Materials and methods</span></h2><section data-dcnode-id="6743" id="s0015"><h3 class="u-h4 u-margin-m-top u-margin-xs-bottom" data-dcnode-id="6753" id="st035"><span data-dcnode-id="6756" instrument_node="">2.1</span><span data-dcnode-id="6755" instrument_node="">. </span><span data-dcnode-id="6754" instrument_node="">Experimental materials</span></h3><p data-dcnode-id="6744" id="p0065"><span data-dcnode-id="6748"><span data-dcnode-id="6752" instrument_node="">Collected from the campus of South China Agricultural University, tree trimmings were ground and screened with a 0.5 cm mesh sieve (Zhejiang, China), subsequently dried out in an oven (Keelrein DGG-9140A, Shanghai, China) at 60°Cfor 48 h for further use. The groups of </span><a class="topic-link" data-dcnode-id="6750" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.sciencedirect.com/topics/biochemistry-genetics-and-molecular-biology/microbial-consortium" title="Learn more about microbial consortia from ScienceDirect's AI-generated Topic Pages"><span data-dcnode-id="6751" instrument_node="">microbial consortia</span></a><span data-dcnode-id="6749" instrument_node=""> were obtained from twelve samples that were respectively collected from rotten trunks, rotten stumps and its surrounding soil on average in the </span></span><a class="topic-link" data-dcnode-id="6746" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.sciencedirect.com/topics/earth-and-planetary-sciences/arboretum" title="Learn more about arboretum from ScienceDirect's AI-generated Topic Pages"><span data-dcnode-id="6747" instrument_node="">arboretum</span></a><span data-dcnode-id="6745" instrument_node=""> of South China Agricultural University, named on a basis of its origins as DT (Decomposed Trunk) and DM (Decomposed Mixture) respectively.</span></p></section><section data-dcnode-id="6654" id="s0020"><h3 class="u-h4 u-margin-m-top u-margin-xs-bottom" data-dcnode-id="6739" id="st040"><span data-dcnode-id="6742" instrument_node="">2.2</span><span data-dcnode-id="6741" instrument_node="">. </span><span data-dcnode-id="6740" instrument_node="">Culture conditions</span></h3><p data-dcnode-id="6655" id="p0070"><span data-dcnode-id="6734"><span data-dcnode-id="6738" instrument_node="">In the screening process, the basic medium consisted of (g/L): </span><a class="topic-link" data-dcnode-id="6736" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.sciencedirect.com/topics/agricultural-and-biological-sciences/peptones" title="Learn more about peptone from ScienceDirect's AI-generated Topic Pages"><span data-dcnode-id="6737" instrument_node="">peptone</span></a><span data-dcnode-id="6735" instrument_node="">, 2.5; KH</span></span><sub data-dcnode-id="6732"><span data-dcnode-id="6733" instrument_node="">2</span></sub><span data-dcnode-id="6731" instrument_node="">PO</span><sub data-dcnode-id="6729"><span data-dcnode-id="6730" instrument_node="">4</span></sub><span data-dcnode-id="6728" instrument_node="">, 1.0; NaCl, 2.5; MgSO</span><sub data-dcnode-id="6726"><span data-dcnode-id="6727" instrument_node="">4</span></sub><span data-dcnode-id="6725" instrument_node="">·7H</span><sub data-dcnode-id="6723"><span data-dcnode-id="6724" instrument_node="">2</span></sub><span data-dcnode-id="6722" instrument_node="">O, 0.8; CaCl</span><sub data-dcnode-id="6720"><span data-dcnode-id="6721" instrument_node="">2</span></sub><span data-dcnode-id="6719" instrument_node="">, 0.8; and 1 mL trace elements solution. Besides, the trace elements solution comprised (g/L): ZnSO</span><sub data-dcnode-id="6717"><span data-dcnode-id="6718" instrument_node="">4</span></sub><span data-dcnode-id="6716" instrument_node="">·7H</span><sub data-dcnode-id="6714"><span data-dcnode-id="6715" instrument_node="">2</span></sub><span data-dcnode-id="6713" instrument_node="">O, 0.1; CoCl</span><sub data-dcnode-id="6711"><span data-dcnode-id="6712" instrument_node="">2</span></sub><span data-dcnode-id="6710" instrument_node="">·6H</span><sub data-dcnode-id="6708"><span data-dcnode-id="6709" instrument_node="">2</span></sub><span data-dcnode-id="6707" instrument_node="">O, 0.16; CuSO</span><sub data-dcnode-id="6705"><span data-dcnode-id="6706" instrument_node="">4</span></sub><span data-dcnode-id="6704" instrument_node="">·5H</span><sub data-dcnode-id="6702"><span data-dcnode-id="6703" instrument_node="">2</span></sub><span data-dcnode-id="6701" instrument_node="">O, 0.15; MnSO</span><sub data-dcnode-id="6699"><span data-dcnode-id="6700" instrument_node="">4</span></sub><span data-dcnode-id="6698" instrument_node="">·H</span><sub data-dcnode-id="6696"><span data-dcnode-id="6697" instrument_node="">2</span></sub><span data-dcnode-id="6695" instrument_node="">O, 0.1; H</span><sub data-dcnode-id="6693"><span data-dcnode-id="6694" instrument_node="">3</span></sub><span data-dcnode-id="6692" instrument_node="">BO</span><sub data-dcnode-id="6690"><span data-dcnode-id="6691" instrument_node="">3</span></sub><span data-dcnode-id="6689" instrument_node="">, 0.02; Na</span><sub data-dcnode-id="6687"><span data-dcnode-id="6688" instrument_node="">2</span></sub><span data-dcnode-id="6686" instrument_node="">MoO</span><sub data-dcnode-id="6684"><span data-dcnode-id="6685" instrument_node="">4</span></sub><span data-dcnode-id="6683" instrument_node="">·2H</span><sub data-dcnode-id="6681"><span data-dcnode-id="6682" instrument_node="">2</span></sub><span data-dcnode-id="6680" instrument_node="">O, 0.020; NiCl</span><sub data-dcnode-id="6678"><span data-dcnode-id="6679" instrument_node="">2</span></sub><span data-dcnode-id="6677" instrument_node="">·6H</span><sub data-dcnode-id="6675"><span data-dcnode-id="6676" instrument_node="">2</span></sub><span data-dcnode-id="6670"><span data-dcnode-id="6674" instrument_node="">O, 0.05, referred to the </span><a class="topic-link" data-dcnode-id="6672" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.sciencedirect.com/topics/biochemistry-genetics-and-molecular-biology/inoculation" title="Learn more about inoculum from ScienceDirect's AI-generated Topic Pages"><span data-dcnode-id="6673" instrument_node="">inoculum</span></a><span data-dcnode-id="6671" instrument_node=""> preparation of </span></span><a class="workspace-trigger" data-dcnode-id="6668" href="#b0015" name="bb0015"><span data-dcnode-id="6669" instrument_node="">Asina et al., 2016</span></a><span data-dcnode-id="6667" instrument_node="">, </span><a class="workspace-trigger" data-dcnode-id="6665" href="#b0170" name="bb0170"><span data-dcnode-id="6666" instrument_node="">Shi et al., 2013</span></a><span data-dcnode-id="6656"><span data-dcnode-id="6664" instrument_node="">. In addition, the </span><a class="topic-link" data-dcnode-id="6662" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.sciencedirect.com/topics/biochemistry-genetics-and-molecular-biology/guaiacol" title="Learn more about guaiacol from ScienceDirect's AI-generated Topic Pages"><span data-dcnode-id="6663" instrument_node="">guaiacol</span></a><span data-dcnode-id="6657"><span data-dcnode-id="6661" instrument_node=""> (1 mL) was added as an ingredient into the </span><a class="topic-link" data-dcnode-id="6659" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.sciencedirect.com/topics/engineering/basal-medium" title="Learn more about basal medium from ScienceDirect's AI-generated Topic Pages"><span data-dcnode-id="6660" instrument_node="">basal medium</span></a><span data-dcnode-id="6658" instrument_node=""> in the primary screening process while it was substituted by 0.5 g tree trimmings in the re-screening.</span></span></span></p></section><section data-dcnode-id="6586" id="s0025"><h3 class="u-h4 u-margin-m-top u-margin-xs-bottom" data-dcnode-id="6650" id="st045"><span data-dcnode-id="6653" instrument_node="">2.3</span><span data-dcnode-id="6652" instrument_node="">. </span><span data-dcnode-id="6651" instrument_node="">The screening process for microbial consortia</span></h3><p data-dcnode-id="6643" id="p0075"><span data-dcnode-id="6649" instrument_node="">Simplified in </span><a class="workspace-trigger" data-dcnode-id="6647" href="#s0155" name="bs0155"><span data-dcnode-id="6648" instrument_node="">Supplement Fig. 1</span></a><span data-dcnode-id="6646" instrument_node="">, the process of screening the microbial consortia was conducted by three main stages that was comprised by sampling and culturing, primary screening and re-screening. As a preparation, the source of microbial consortia that is 1% (w/v) rotten trunk, rotten stump and its surrounding soil was respectively added into the sterilization distilled water (100 mL) in the Erlenmeyer flasks. After the Erlenmeyer flasks were shook at 120 r/min for 30 min, samples remained standing for 30 min. Subsequently, 10% (v/v) bacterium</span><span data-dcnode-id="6645" instrument_node="">&nbsp;</span><span data-dcnode-id="6644" instrument_node="">suspension was transferred to a basic medium (100 mL) before incubated with a shaker (HZQ-F160, Taicang Jiangsu, China) at 120 r/min, 28 °C. When the medium turned into cloudy after 7 days’ culture, 10% (v/v) well-blended culture fluid was transferred to a new medium and was incubated under the same conditions. After successive transfer culture for more than 3 generations, four groups of microbial consortia with stable color changes were inoculated (10 mL) to a new re-screening medium (90 mL).</span></p><p data-dcnode-id="6634" id="p0080"><span data-dcnode-id="6642" instrument_node="">At the re-screening process, 0.5% (w/v) tree trimmings replaced guaiacol to determine the ability of microbial consortia in lignin degradation. After the medium was cloudy and the values of pH and OD</span><sub data-dcnode-id="6640"><span data-dcnode-id="6641" instrument_node="">600</span></sub><span data-dcnode-id="6635"><span data-dcnode-id="6639" instrument_node=""> (Optical Density) were stable, 10 mL culture fluid was transferred to a new medium. Repeated the implement for over 90 days, the microbial consortia were potential to degrade the </span><a class="topic-link" data-dcnode-id="6637" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.sciencedirect.com/topics/agricultural-and-biological-sciences/lignocellulose" title="Learn more about lignocellulose from ScienceDirect's AI-generated Topic Pages"><span data-dcnode-id="6638" instrument_node="">lignocellulose</span></a><span data-dcnode-id="6636" instrument_node=""> in a steadily effective mode and the optimal one named DM-1 was of great efficiency in selective lignin degradation.</span></span></p><p data-dcnode-id="6587" id="p0085"><span data-dcnode-id="6633" instrument_node="">In the successive transfer process, values of pH and OD</span><sub data-dcnode-id="6631"><span data-dcnode-id="6632" instrument_node="">600</span></sub><span data-dcnode-id="6598"><span data-dcnode-id="6622"><span data-dcnode-id="6630" instrument_node=""> in the fermentation </span><a class="topic-link" data-dcnode-id="6628" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.sciencedirect.com/topics/agricultural-and-biological-sciences/broths" title="Learn more about broth from ScienceDirect's AI-generated Topic Pages"><span data-dcnode-id="6629" instrument_node="">broth</span></a><span data-dcnode-id="6623"><span data-dcnode-id="6627" instrument_node=""> were respectively determined by pH meter (PHS-3C, Shanghai, China) and UV–visible </span><a class="topic-link" data-dcnode-id="6625" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.sciencedirect.com/topics/agricultural-and-biological-sciences/spectrophotometers" title="Learn more about spectrophotometer from ScienceDirect's AI-generated Topic Pages"><span data-dcnode-id="6626" instrument_node="">spectrophotometer</span></a><span data-dcnode-id="6624" instrument_node=""> (Mapada UV-1800, Shanghai, China). Enzymes included </span></span></span><a class="topic-link" data-dcnode-id="6620" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.sciencedirect.com/topics/biochemistry-genetics-and-molecular-biology/cellulase" title="Learn more about cellulase from ScienceDirect's AI-generated Topic Pages"><span data-dcnode-id="6621" instrument_node="">cellulase</span></a><span data-dcnode-id="6599"><span data-dcnode-id="6619" instrument_node=""> and ligninolytic enzymes (manganese peroxidase MnP, </span><a class="topic-link" data-dcnode-id="6617" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.sciencedirect.com/topics/biochemistry-genetics-and-molecular-biology/laccase" title="Learn more about laccase from ScienceDirect's AI-generated Topic Pages"><span data-dcnode-id="6618" instrument_node="">laccase</span></a><span data-dcnode-id="6600"><span data-dcnode-id="6612"><span data-dcnode-id="6616" instrument_node=""> Lac, </span><a class="topic-link" data-dcnode-id="6614" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.sciencedirect.com/topics/biochemistry-genetics-and-molecular-biology/lignin-peroxidase" title="Learn more about lignin peroxidase from ScienceDirect's AI-generated Topic Pages"><span data-dcnode-id="6615" instrument_node="">lignin peroxidase</span></a><span data-dcnode-id="6613" instrument_node=""> LiP) were determined with their </span></span><a class="topic-link" data-dcnode-id="6610" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.sciencedirect.com/topics/earth-and-planetary-sciences/catalytic-activity" title="Learn more about enzyme activities from ScienceDirect's AI-generated Topic Pages"><span data-dcnode-id="6611" instrument_node="">enzyme activities</span></a><span data-dcnode-id="6601"><span data-dcnode-id="6609" instrument_node=""> on days 0, 2, 4, 6, 8, 10, 12, 14 and 16 in a full generation of re-screening process. The degradation percentages of tree trimmings by microbial consortium DT-1 and DM-1 were determined on days 0, 3, 5, 7, 9, 11, 13 and16 in a full generation of 16 days. Based on the previously determined degradation percentages of lignin and cellulose in the tree trimmings, the </span><a class="topic-link" data-dcnode-id="6607" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.sciencedirect.com/topics/engineering/selectivity-value" title="Learn more about selectivity value from ScienceDirect's AI-generated Topic Pages"><span data-dcnode-id="6608" instrument_node="">selectivity value</span></a><span data-dcnode-id="6602"><span data-dcnode-id="6606" instrument_node=""> (SV) that is defined as a ratio of amount of lignin degraded and cellulose consumed by strains during </span><a class="topic-link" data-dcnode-id="6604" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.sciencedirect.com/topics/agricultural-and-biological-sciences/pretreatment" title="Learn more about pretreatment from ScienceDirect's AI-generated Topic Pages"><span data-dcnode-id="6605" instrument_node="">pretreatment</span></a><span data-dcnode-id="6603" instrument_node=""> was calculated (</span></span></span></span></span></span><a class="workspace-trigger" data-dcnode-id="6596" href="#b0130" name="bb0130"><span data-dcnode-id="6597" instrument_node="">Mishra et al., 2017</span></a><span data-dcnode-id="6591"><span data-dcnode-id="6595" instrument_node="">). The fiber crystallity of tree trimmings was determined at the end of the culture period and the microbial consortium had a lower value in comparison was elucidated to be more capable in releasing the </span><a class="topic-link" data-dcnode-id="6593" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.sciencedirect.com/topics/engineering/cellulose-content" title="Learn more about cellulose content from ScienceDirect's AI-generated Topic Pages"><span data-dcnode-id="6594" instrument_node="">cellulose content</span></a><span data-dcnode-id="6592" instrument_node=""> that was structurally associated with lignin content in tree trimmings during the degradation (</span></span><a class="workspace-trigger" data-dcnode-id="6589" href="#b0005" name="bb0005"><span data-dcnode-id="6590" instrument_node="">Aguiar et al., 2014</span></a><span data-dcnode-id="6588" instrument_node="">).</span></p></section><section data-dcnode-id="6538" id="s0030"><h3 class="u-h4 u-margin-m-top u-margin-xs-bottom" data-dcnode-id="6582" id="st050"><span data-dcnode-id="6585" instrument_node="">2.4</span><span data-dcnode-id="6584" instrument_node="">. </span><span data-dcnode-id="6583" instrument_node="">Isolation and identification of microbial consortium DM-1</span></h3><p data-dcnode-id="6539" id="p0090"><span data-dcnode-id="6581" instrument_node="">Serially diluted from 10</span><sup data-dcnode-id="6579"><span data-dcnode-id="6580" instrument_node="">−1</span></sup><span data-dcnode-id="6578" instrument_node=""> to 10</span><sup data-dcnode-id="6576"><span data-dcnode-id="6577" instrument_node="">−7</span></sup><span data-dcnode-id="6575" instrument_node="">, a volume of 1 mL from each 10</span><sup data-dcnode-id="6573"><span data-dcnode-id="6574" instrument_node="">−4</span></sup><span data-dcnode-id="6572" instrument_node=""> to 10</span><sup data-dcnode-id="6570"><span data-dcnode-id="6571" instrument_node="">−7</span></sup><span data-dcnode-id="6550"><span data-dcnode-id="6553"><span data-dcnode-id="6561"><span data-dcnode-id="6569" instrument_node=""> dilution of microbial consortium DM-1 was spread onto </span><a class="topic-link" data-dcnode-id="6567" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.sciencedirect.com/topics/immunology-and-microbiology/agar-plate" title="Learn more about agar plates from ScienceDirect's AI-generated Topic Pages"><span data-dcnode-id="6568" instrument_node="">agar plates</span></a><span data-dcnode-id="6562"><span data-dcnode-id="6566" instrument_node=""> (beef extract-peptone medium, Gause I medium, modified Rose Bengal medium and modified potato </span><a class="topic-link" data-dcnode-id="6564" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.sciencedirect.com/topics/chemical-engineering/dextrose" title="Learn more about dextrose from ScienceDirect's AI-generated Topic Pages"><span data-dcnode-id="6565" instrument_node="">dextrose</span></a><span data-dcnode-id="6563" instrument_node=""> medium). Besides, the plates of beef extract-peptone medium were placed in an </span></span></span><a class="topic-link" data-dcnode-id="6559" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.sciencedirect.com/topics/engineering/incubator" title="Learn more about incubator from ScienceDirect's AI-generated Topic Pages"><span data-dcnode-id="6560" instrument_node="">incubator</span></a><span data-dcnode-id="6554"><span data-dcnode-id="6558" instrument_node=""> (RQH-01Y, Huangshi, Hubei, China) at 37 °C while the others were deposited at 28 °C. Subsequently, the morphologically identified strains were isolated via replacing on an agar plate for three or four cycles before detected by different staining techniques, where bacteria were detected by </span><a class="topic-link" data-dcnode-id="6556" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.sciencedirect.com/topics/biochemistry-genetics-and-molecular-biology/gram-staining" title="Learn more about Gram stain from ScienceDirect's AI-generated Topic Pages"><span data-dcnode-id="6557" instrument_node="">Gram stain</span></a><span data-dcnode-id="6555" instrument_node="">, </span></span></span><a class="topic-link" data-dcnode-id="6551" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.sciencedirect.com/topics/biochemistry-genetics-and-molecular-biology/actinobacteria" title="Learn more about actinomycete from ScienceDirect's AI-generated Topic Pages"><span data-dcnode-id="6552" instrument_node="">actinomycete</span></a></span><em data-dcnode-id="6548"><span data-dcnode-id="6549" instrument_node="">s</span></em><span data-dcnode-id="6543"><span data-dcnode-id="6547" instrument_node=""> were detected by printing method and fungi were stained with </span><a class="topic-link" data-dcnode-id="6545" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.sciencedirect.com/topics/biochemistry-genetics-and-molecular-biology/trypan-blue" title="Learn more about trypan blue from ScienceDirect's AI-generated Topic Pages"><span data-dcnode-id="6546" instrument_node="">trypan blue</span></a><span data-dcnode-id="6544" instrument_node="">, then were observed and identified using the Eclipse Ni-U (Nikon Eclipse80i), referring to the book “Microbiology Experiment” (</span></span><a class="workspace-trigger" data-dcnode-id="6541" href="#b0260" name="bb0260"><span data-dcnode-id="6542" instrument_node="">Zhou and Wang, 2015</span></a><span data-dcnode-id="6540" instrument_node="">).</span></p></section><section data-dcnode-id="6495" id="s0035"><h3 class="u-h4 u-margin-m-top u-margin-xs-bottom" data-dcnode-id="6534" id="st055"><span data-dcnode-id="6537" instrument_node="">2.5</span><span data-dcnode-id="6536" instrument_node="">. </span><span data-dcnode-id="6535" instrument_node="">Gene sequencing</span></h3><p data-dcnode-id="6501" id="p0095"><span data-dcnode-id="6533" instrument_node="">The microbial consortium DM-1 was sent to the BGI Co. Ltd., China, for 16S </span><a class="topic-link" data-dcnode-id="6531" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.sciencedirect.com/topics/agricultural-and-biological-sciences/ribosomal-dna" title="Learn more about ribosomal DNA from ScienceDirect's AI-generated Topic Pages"><span data-dcnode-id="6532" instrument_node="">ribosomal DNA</span></a><span data-dcnode-id="6502"><span data-dcnode-id="6522"><span data-dcnode-id="6530" instrument_node=""> (16S rDNA) sequence analysis, which began with a sample testing including concentration testing by Fluorometer or </span><a class="topic-link" data-dcnode-id="6528" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.sciencedirect.com/topics/earth-and-planetary-sciences/microplate" title="Learn more about Microplate from ScienceDirect's AI-generated Topic Pages"><span data-dcnode-id="6529" instrument_node="">Microplate</span></a><span data-dcnode-id="6523"><span data-dcnode-id="6527" instrument_node=""> Reader and sample integrity that was conducted by </span><a class="topic-link" data-dcnode-id="6525" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.sciencedirect.com/topics/biochemistry-genetics-and-molecular-biology/agarose" title="Learn more about Agarose from ScienceDirect's AI-generated Topic Pages"><span data-dcnode-id="6526" instrument_node="">Agarose</span></a><span data-dcnode-id="6524" instrument_node=""> Gel </span></span></span><a class="topic-link" data-dcnode-id="6520" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.sciencedirect.com/topics/earth-and-planetary-sciences/electrophoresis" title="Learn more about Electrophoresis from ScienceDirect's AI-generated Topic Pages"><span data-dcnode-id="6521" instrument_node="">Electrophoresis</span></a><span data-dcnode-id="6503"><span data-dcnode-id="6515"><span data-dcnode-id="6519" instrument_node=""> (Concentration of Agarose Gel: 1%; Voltage: 150 V; Electrophoresis Time: 40 min). The </span><a class="topic-link" data-dcnode-id="6517" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.sciencedirect.com/topics/earth-and-planetary-sciences/polymerase-chain-reaction" title="Learn more about polymerase chain reaction from ScienceDirect's AI-generated Topic Pages"><span data-dcnode-id="6518" instrument_node="">polymerase chain reaction</span></a><span data-dcnode-id="6516" instrument_node=""> (PCR) was performed using the primer pair 341F (CCTACGGGNGGCWGCAG) and 802R (TACNVGGGTATCTAATCC) in the region between V3 and V4 for the dominant bacterial groups. Before each PCR program, per 50 μL PCR mixture consisted of 30 ng DNA template, 4 μL PCR primer cocktail (319F-806R), 25 μL PCR master mix (NEB Phusion High-Fidelity PCR Master Mix) and appropriate volume of ddH2O as need. PCR amplification comprised an initial </span></span><a class="topic-link" data-dcnode-id="6513" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.sciencedirect.com/topics/biochemistry-genetics-and-molecular-biology/denaturation" title="Learn more about denaturation from ScienceDirect's AI-generated Topic Pages"><span data-dcnode-id="6514" instrument_node="">denaturation</span></a><span data-dcnode-id="6504"><span data-dcnode-id="6512" instrument_node=""> at 98 °C for 3 min, followed by 30 cycles of denaturation at 98 °C for 45 s, annealing at 55 °C for 45 s, extension at 72 °C for 45 s and a final extension at 72 °C for 7 min. All PCR products were purified with Ampure XP beads (AGENCOURT) to remove the unspecific products before the average molecule length and concentration of final </span><a class="topic-link" data-dcnode-id="6510" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.sciencedirect.com/topics/biochemistry-genetics-and-molecular-biology/amplicon" title="Learn more about amplicon from ScienceDirect's AI-generated Topic Pages"><span data-dcnode-id="6511" instrument_node="">amplicon</span></a><span data-dcnode-id="6505"><span data-dcnode-id="6509" instrument_node=""> library were respectively estimated using the Agilent 2100 bioanalyzer instrument (Agilent DNA 1000 Reagents) and real-time quantitative PCR (qPCR) (EvaGreenTM). Then, the qualified libraries were paired-end sequenced on the </span><a class="topic-link" data-dcnode-id="6507" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.sciencedirect.com/topics/biochemistry-genetics-and-molecular-biology/illumina-miseq" title="Learn more about Illumina MiSeq from ScienceDirect's AI-generated Topic Pages"><span data-dcnode-id="6508" instrument_node="">Illumina MiSeq</span></a><span data-dcnode-id="6506" instrument_node=""> platform, with the sequencing strategy PE250 (PE251 + 8+8 + 251) or PE300 (PE301 + 8+8 + 301) (MiSeq Reagent Kit) following the manufacturer’s instructions. Raw sequences with perfect matches to barcodes split to sample libraries and were trimmed using Btrim with threshold of QC lower than 20 over a 30-bp window size and the minimum length of 15 bp. The MiSeq sequencing raw data were deposited in the NCBI Sequence Read Archive (SRA) database, and the project ID is PRJNA428791.</span></span></span></span></span></p><p data-dcnode-id="6496" id="p0100"><span data-dcnode-id="6500" instrument_node="">In addition, a </span><a class="topic-link" data-dcnode-id="6498" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.sciencedirect.com/topics/earth-and-planetary-sciences/phylogenetics" title="Learn more about phylogenetic from ScienceDirect's AI-generated Topic Pages"><span data-dcnode-id="6499" instrument_node="">phylogenetic</span></a><span data-dcnode-id="6497" instrument_node=""> tree was constructed using Fasttress of make_phylogeny.py in QIIME (v 1.80) software and eventually patterned by the R (v 3.1.1) software on a basis of amplification results.</span></p></section></section><section data-dcnode-id="4506" id="s0040"><h2 class="u-h3 u-margin-l-top u-margin-xs-bottom" data-dcnode-id="6490" id="st060"><span data-dcnode-id="6493" instrument_node="">3</span><span data-dcnode-id="6492" instrument_node="">. </span><span data-dcnode-id="6491" instrument_node="">Analysis methods</span></h2><section data-dcnode-id="6470" id="s0045"><h3 class="u-h4 u-margin-m-top u-margin-xs-bottom" data-dcnode-id="6484" id="st065"><span data-dcnode-id="6489" instrument_node="">3.1</span><span data-dcnode-id="6488" instrument_node="">. </span><span data-dcnode-id="6487" instrument_node="">Measurement of the pH and OD</span><sub data-dcnode-id="6485"><span data-dcnode-id="6486" instrument_node="">600</span></sub></h3><p data-dcnode-id="6471" id="p0105"><span data-dcnode-id="6483" instrument_node="">During the re-screening process, values of pH and OD</span><sub data-dcnode-id="6481"><span data-dcnode-id="6482" instrument_node="">600</span></sub><span data-dcnode-id="6472"><span data-dcnode-id="6476"><span data-dcnode-id="6480" instrument_node=""> were respectively measured by using the PHS-3C pH meter (INESA Scientific Instrument Co. Ltd, Shanghai, China) and ultraviolet-visible </span><a class="topic-link" data-dcnode-id="6478" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.sciencedirect.com/topics/agricultural-and-biological-sciences/spectrophotometers" title="Learn more about spectrophotometer from ScienceDirect's AI-generated Topic Pages"><span data-dcnode-id="6479" instrument_node="">spectrophotometer</span></a><span data-dcnode-id="6477" instrument_node=""> (UV-1800, Shanghai, China) every two days with 3 mL culture fluid as a direct indicator of the growth of </span></span><a class="topic-link" data-dcnode-id="6474" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.sciencedirect.com/topics/biochemistry-genetics-and-molecular-biology/microbial-consortium" title="Learn more about microbial consortia from ScienceDirect's AI-generated Topic Pages"><span data-dcnode-id="6475" instrument_node="">microbial consortia</span></a><span data-dcnode-id="6473" instrument_node="">. At the same time, the type and time of color changes occurred during culturing were recorded, which pointed out whether the microbial consortium was equipped with the function of lignin degradation as well as the level of its degradation ability.</span></span></p></section><section data-dcnode-id="6402" id="s0050"><h3 class="u-h4 u-margin-m-top u-margin-xs-bottom" data-dcnode-id="6466" id="st070"><span data-dcnode-id="6469" instrument_node="">3.2</span><span data-dcnode-id="6468" instrument_node="">. </span><span data-dcnode-id="6467" instrument_node="">Enzyme activity assay</span></h3><p data-dcnode-id="6403" id="p0110"><span data-dcnode-id="6461"><span data-dcnode-id="6465" instrument_node="">On the days 8 and 14 in the re-screening process, 10 mL cultured fluid from each medium was removed into centrifuge tubes, subsequently subjected to centrifuge at 10,000 rpm for 10 min and the resulting supernatant was used for analysis of hydrolytic and </span><a class="topic-link" data-dcnode-id="6463" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.sciencedirect.com/topics/biochemistry-genetics-and-molecular-biology/oxidative-enzyme" title="Learn more about oxidative enzymes from ScienceDirect's AI-generated Topic Pages"><span data-dcnode-id="6464" instrument_node="">oxidative enzymes</span></a><span data-dcnode-id="6462" instrument_node="">. The enzyme activity assays were on a basis of steps in Section </span></span><a class="workspace-trigger" data-dcnode-id="6459" href="#s0025" name="bs0025"><span data-dcnode-id="6460" instrument_node="">2.3</span></a><span data-dcnode-id="6458" instrument_node=""> of </span><a class="workspace-trigger" data-dcnode-id="6456" href="#b0015" name="bb0015"><span data-dcnode-id="6457" instrument_node="">Asina et al., 2016</span></a><span data-dcnode-id="6455" instrument_node="">, </span><a class="workspace-trigger" data-dcnode-id="6453" href="#b0090" name="bb0090"><span data-dcnode-id="6454" instrument_node="">Knežević et al., 2013</span></a><span data-dcnode-id="6436"><span data-dcnode-id="6440"><span data-dcnode-id="6452" instrument_node="">. </span><a class="topic-link" data-dcnode-id="6450" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.sciencedirect.com/topics/biochemistry-genetics-and-molecular-biology/laccase" title="Learn more about Laccase from ScienceDirect's AI-generated Topic Pages"><span data-dcnode-id="6451" instrument_node="">Laccase</span></a><span data-dcnode-id="6441"><span data-dcnode-id="6449" instrument_node=""> was assayed by monitoring the </span><a class="topic-link" data-dcnode-id="6447" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.sciencedirect.com/topics/biochemistry-genetics-and-molecular-biology/alpha-oxidation" title="Learn more about oxidation from ScienceDirect's AI-generated Topic Pages"><span data-dcnode-id="6448" instrument_node="">oxidation</span></a><span data-dcnode-id="6442"><span data-dcnode-id="6446" instrument_node=""> of 5 mM 2, 2′-azinobis-(3-ethylbenzthiazoline-6-sulphonate) (ABTS) in a 50 mM </span><a class="topic-link" data-dcnode-id="6444" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.sciencedirect.com/topics/agricultural-and-biological-sciences/sodium-acetate" title="Learn more about sodium acetate from ScienceDirect's AI-generated Topic Pages"><span data-dcnode-id="6445" instrument_node="">sodium acetate</span></a><span data-dcnode-id="6443" instrument_node=""> buffer (pH 5.0). The lignin </span></span></span></span><a class="topic-link" data-dcnode-id="6438" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.sciencedirect.com/topics/agricultural-and-biological-sciences/lactoperoxidase" title="Learn more about peroxidase from ScienceDirect's AI-generated Topic Pages"><span data-dcnode-id="6439" instrument_node="">peroxidase</span></a><span data-dcnode-id="6437" instrument_node=""> (LiP) assay was based on the oxidation of 32 μM Azure B and 100 μM H</span></span><sub data-dcnode-id="6434"><span data-dcnode-id="6435" instrument_node="">2</span></sub><span data-dcnode-id="6433" instrument_node="">O</span><sub data-dcnode-id="6431"><span data-dcnode-id="6432" instrument_node="">2</span></sub><span data-dcnode-id="6426"><span data-dcnode-id="6430" instrument_node=""> in 50 mM </span><a class="topic-link" data-dcnode-id="6428" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.sciencedirect.com/topics/agricultural-and-biological-sciences/sodium-tartrate" title="Learn more about sodium tartrate from ScienceDirect's AI-generated Topic Pages"><span data-dcnode-id="6429" instrument_node="">sodium tartrate</span></a><span data-dcnode-id="6427" instrument_node=""> buffer (pH 4.5). The manganese-dependent peroxidase (MnP) assay solution contained 4 mM MnSO</span></span><sub data-dcnode-id="6424"><span data-dcnode-id="6425" instrument_node="">4</span></sub><span data-dcnode-id="6423" instrument_node=""> and 0.4 mM H</span><sub data-dcnode-id="6421"><span data-dcnode-id="6422" instrument_node="">2</span></sub><span data-dcnode-id="6420" instrument_node="">O</span><sub data-dcnode-id="6418"><span data-dcnode-id="6419" instrument_node="">2</span></sub><span data-dcnode-id="6413"><span data-dcnode-id="6417" instrument_node=""> in 0.2 M sodium malonate buffer (pH 4.0). Activities of ligninolytic enzymes (Lac, Lip, MnP) mentioned and the </span><a class="topic-link" data-dcnode-id="6415" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.sciencedirect.com/topics/biochemistry-genetics-and-molecular-biology/cellulase" title="Learn more about cellulase from ScienceDirect's AI-generated Topic Pages"><span data-dcnode-id="6416" instrument_node="">cellulase</span></a><span data-dcnode-id="6414" instrument_node=""> were measured spectrophotometrically using an UV–Vis Evolution™ 600 spectrophotometer (Shanghai, China) that monitored at 420 nm, 651 nm, 610 nm, 540 nm in sequence based on similar procedures of </span></span><a class="workspace-trigger" data-dcnode-id="6411" href="#b0130" name="bb0130"><span data-dcnode-id="6412" instrument_node="">Mishra et al. (2017)</span></a><span data-dcnode-id="6410" instrument_node="">, </span><a class="workspace-trigger" data-dcnode-id="6408" href="#b0015" name="bb0015"><span data-dcnode-id="6409" instrument_node="">Asina et al. (2016)</span></a><span data-dcnode-id="6407" instrument_node=""> and </span><a class="workspace-trigger" data-dcnode-id="6405" href="#b0145" name="bb0145"><span data-dcnode-id="6406" instrument_node="">Namoolnoy et al. (2011)</span></a><span data-dcnode-id="6404" instrument_node="">.</span></p></section><section data-dcnode-id="4563" id="s0055"><h3 class="u-h4 u-margin-m-top u-margin-xs-bottom" data-dcnode-id="6398" id="st075"><span data-dcnode-id="6401" instrument_node="">3.3</span><span data-dcnode-id="6400" instrument_node="">. </span><span data-dcnode-id="6399" instrument_node="">Determining degradation degrees of cellulose and lignin</span></h3><p data-dcnode-id="6368" id="p0115"><span data-dcnode-id="6397" instrument_node="">In addition, the degrees of cellulose and lignin that degraded by screened microbial consortia were determined by NREL (</span><a class="workspace-trigger" data-dcnode-id="6395" href="#b9010" name="bb9010"><span data-dcnode-id="6396" instrument_node="">Sluiter et al., 2010</span></a><span data-dcnode-id="6390"><span data-dcnode-id="6394" instrument_node="">). Firstly, a sand core funnel was numbered with a clear mark before it was placed in the muffle </span><a class="topic-link" data-dcnode-id="6392" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.sciencedirect.com/topics/agricultural-and-biological-sciences/furnaces" title="Learn more about furnace from ScienceDirect's AI-generated Topic Pages"><span data-dcnode-id="6393" instrument_node="">furnace</span></a><span data-dcnode-id="6391" instrument_node=""> (Yiheng SX2-P, Shanghai, China) at 575 °C for 4 h to reach its constant weight (</span></span><a class="workspace-trigger" data-dcnode-id="6388" href="#b0015" name="bb0015"><span data-dcnode-id="6389" instrument_node="">Asina et al., 2016</span></a><span data-dcnode-id="6387" instrument_node="">). Then it was weighed as W</span><sub data-dcnode-id="6385"><span data-dcnode-id="6386" instrument_node="">1</span></sub><span data-dcnode-id="6384" instrument_node=""> before preserved in the dryer until further experiments. Secondly, the centrifuge tube in the size of 10 mL was added with 0.3000</span><em data-dcnode-id="6382"><span data-dcnode-id="6383" instrument_node="">g</span></em><span data-dcnode-id="6369"><span data-dcnode-id="6373"><span data-dcnode-id="6381" instrument_node=""> dried tree trimmings and 3 mL 72% </span><a class="topic-link" data-dcnode-id="6379" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.sciencedirect.com/topics/earth-and-planetary-sciences/sulphuric-acid" title="Learn more about sulfuric acid from ScienceDirect's AI-generated Topic Pages"><span data-dcnode-id="6380" instrument_node="">sulfuric acid</span></a><span data-dcnode-id="6374"><span data-dcnode-id="6378" instrument_node="">, repeatedly stirred until the content was completely mixed. Subsequently, it was incubated in a water bath at 30 °C for 1 h and the stir rod was indispensable to use once every 10 min to assure even acid to particle contact and uniform </span><a class="topic-link" data-dcnode-id="6376" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.sciencedirect.com/topics/biochemistry-genetics-and-molecular-biology/enzymatic-hydrolysis" title="Learn more about hydrolysis from ScienceDirect's AI-generated Topic Pages"><span data-dcnode-id="6377" instrument_node="">hydrolysis</span></a><span data-dcnode-id="6375" instrument_node="">. Afterwards, the </span></span></span><a class="topic-link" data-dcnode-id="6371" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.sciencedirect.com/topics/agricultural-and-biological-sciences/hydrolysates" title="Learn more about hydrolysate from ScienceDirect's AI-generated Topic Pages"><span data-dcnode-id="6372" instrument_node="">hydrolysate</span></a><span data-dcnode-id="6370" instrument_node=""> and sample residues were poured into two 150 mL conical flasks correspondingly, which were properly shook after added 84 mL distilled water.</span></span></p><p data-dcnode-id="6357" id="p0120"><span data-dcnode-id="6367" instrument_node="">After adding 0.111 g glucose, 100 mL distilled water and 0.348 mL sulfuric acid (72%) in turn, conical flasks were sealed and placed in an autoclave (Shenan LDZX-50KBS, Shanghai, China) at 121 °C for 1 h. Subsequently, these flasks were cooled to 25 °C so that them could be transferred to the suction filtration by sand core funnel, used conical flasks to collect the filtrate with an aim of assaying the acid soluble lignin. Afterwards, the sand core funnel was dried in the oven at 105 °C for 4 h and weighed as W</span><sub data-dcnode-id="6365"><span data-dcnode-id="6366" instrument_node="">1</span></sub><span data-dcnode-id="6364" instrument_node=""> before used in filtrating hydrolysate. After the filtration, the whole hydrolysate was transferred to new sample storage bottles while the sand core funnel with residue was placed in an oven at 105 °Cfor 4 h, followed by a dry ashing process in the muffle furnace at 575 °C for 24 h. Ultimately, it was weighted and recorded as W</span><sub data-dcnode-id="6362"><span data-dcnode-id="6363" instrument_node="">2</span></sub><span data-dcnode-id="6361" instrument_node=""> and W</span><sub data-dcnode-id="6359"><span data-dcnode-id="6360" instrument_node="">3</span></sub><span data-dcnode-id="6358" instrument_node=""> for calculating the content of acid insoluble lignin and acid soluble lignin. Furthermore, the solution will be used to measure the acid-soluble content of lignin and cellulose whilst the residue will be applied to determine acid insoluble lignin.</span></p><p data-dcnode-id="6348" id="p0125"><span data-dcnode-id="6356" instrument_node="">Determined by the UV-1800 spectrophotometer (Shanghai, China) with a wave length of 320 nm, a measurement of the </span><a class="topic-link" data-dcnode-id="6354" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.sciencedirect.com/topics/engineering/absorbency" title="Learn more about absorbency from ScienceDirect's AI-generated Topic Pages"><span data-dcnode-id="6355" instrument_node="">absorbency</span></a><span data-dcnode-id="6349"><span data-dcnode-id="6353" instrument_node=""> of the sample was ran, whose background was the 4% sulfuric acid as well as the source of the acid soluble lignin. In other words, the total content of lignin could be calculated based on the sum of the acid soluble lignin content and the content of acid insoluble lignin whilst each volume of glucose in the hydrolysis filtrate of samples and the </span><a class="topic-link" data-dcnode-id="6351" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.sciencedirect.com/topics/chemical-engineering/dextrose" title="Learn more about dextrose from ScienceDirect's AI-generated Topic Pages"><span data-dcnode-id="6352" instrument_node="">dextrose</span></a><span data-dcnode-id="6350" instrument_node=""> hydrolysate was determined by the glucose assay kit (RSBio Co., Ltd., China) in sequence.</span></span></p><p data-dcnode-id="6346" id="p0130"><span data-dcnode-id="6347" instrument_node="">Made by averagely mixed Reagent 1 and Reagent 2 both coming from glucose assay kit (glucose oxidase-peroxidase method, Shanghai, China) in same amount, the working reagent was extracted with 2 mL into tubes plus 0.02 mL samples before placed in a water bath at 37 °C for 15 min. Besides, limited by the chemical activity, the determination should be completed within 2 h after the color changed. Furthermore, each absorbency of the adjustor tube and the sample tube with a wave length of 505 nm was recorded, based on a blank control group that was made up by 2 mL working reagent and 0.02 mL sample.</span></p><p data-dcnode-id="5460" id="p0135"><span data-dcnode-id="6345" instrument_node="">The content of cellulose in each sample was calculated by following eight essential equations in sequence.</span><span class="display" data-dcnode-id="6150"><span class="formula" data-dcnode-id="6151" id="e0005"><span class="label" data-dcnode-id="6343"><span data-dcnode-id="6344" instrument_node="">(1)</span></span><span class="math" data-dcnode-id="6152"><span class="MathJax_Preview" data-dcnode-id="6342" style=""></span><span class="MathJax_SVG" data-dcnode-id="6155" data-mathml="<math xmlns=&quot;http://www.w3.org/1998/Math/MathML&quot;><mrow is=&quot;true&quot;><mi mathvariant=&quot;italic&quot; is=&quot;true&quot;>Oven</mi><mspace width=&quot;0.25em&quot; is=&quot;true&quot; /><mi mathvariant=&quot;italic&quot; is=&quot;true&quot;>dry</mi><mspace width=&quot;0.25em&quot; is=&quot;true&quot; /><mi mathvariant=&quot;italic&quot; is=&quot;true&quot;>weight</mi><mspace width=&quot;0.25em&quot; is=&quot;true&quot; /><mo stretchy=&quot;false&quot; is=&quot;true&quot;>(</mo><mi mathvariant=&quot;italic&quot; is=&quot;true&quot;>ODW</mi><mo stretchy=&quot;false&quot; is=&quot;true&quot;>)</mo><mo is=&quot;true&quot;>=</mo><mfrac is=&quot;true&quot;><mrow is=&quot;true&quot;><msub is=&quot;true&quot;><mrow is=&quot;true&quot;><mi mathvariant=&quot;italic&quot; is=&quot;true&quot;>Weight</mi></mrow><mrow is=&quot;true&quot;><mi mathvariant=&quot;italic&quot; is=&quot;true&quot;>air</mi><mspace width=&quot;0.25em&quot; is=&quot;true&quot; /><mi mathvariant=&quot;italic&quot; is=&quot;true&quot;>dry</mi><mspace width=&quot;0.25em&quot; is=&quot;true&quot; /><mi mathvariant=&quot;italic&quot; is=&quot;true&quot;>sample</mi></mrow></msub><mo is=&quot;true&quot;>&amp;#x2217;</mo><mo is=&quot;true&quot;>%</mo><mi mathvariant=&quot;italic&quot; is=&quot;true&quot;>Total</mi><mspace width=&quot;0.25em&quot; is=&quot;true&quot; /><mi mathvariant=&quot;italic&quot; is=&quot;true&quot;>solids</mi></mrow><mrow is=&quot;true&quot;><mn is=&quot;true&quot;>100</mn></mrow></mfrac></mrow></math>" id="MathJax-Element-1-Frame" role="presentation" style="font-size: 90%; display: inline-block; position: relative;" tabindex="0"><svg aria-hidden="true" data-dcnode-id="6203" focusable="false" height="4.058ex" role="img" style="vertical-align: -1.109ex;" viewBox="0 -1269.9 23884.9 1747.3" width="55.475ex" xmlns:xlink="http://www.w3.org/1999/xlink"><g data-dcnode-id="6204" fill="currentColor" stroke="currentColor" stroke-width="0" transform="matrix(1 0 0 -1 0 0)"><g data-dcnode-id="6205" is="true"><g data-dcnode-id="6333" is="true"><use data-dcnode-id="6340" href="#MJMATHI-4F"><path d="M740 435Q740 320 676 213T511 42T304 -22Q207 -22 138 35T51 201Q50 209 50 244Q50 346 98 438T227 601Q351 704 476 704Q514 704 524 703Q621 689 680 617T740 435ZM637 476Q637 565 591 615T476 665Q396 665 322 605Q242 542 200 428T157 216Q157 126 200 73T314 19Q404 19 485 98T608 313Q637 408 637 476Z" data-dcnode-id="6341" id="MJMATHI-4F" stroke-width="1"></path></use><use data-dcnode-id="6338" href="#MJMATHI-76" x="763" y="0"><path d="M173 380Q173 405 154 405Q130 405 104 376T61 287Q60 286 59 284T58 281T56 279T53 278T49 278T41 278H27Q21 284 21 287Q21 294 29 316T53 368T97 419T160 441Q202 441 225 417T249 361Q249 344 246 335Q246 329 231 291T200 202T182 113Q182 86 187 69Q200 26 250 26Q287 26 319 60T369 139T398 222T409 277Q409 300 401 317T383 343T365 361T357 383Q357 405 376 424T417 443Q436 443 451 425T467 367Q467 340 455 284T418 159T347 40T241 -11Q177 -11 139 22Q102 54 102 117Q102 148 110 181T151 298Q173 362 173 380Z" data-dcnode-id="6339" id="MJMATHI-76" stro
