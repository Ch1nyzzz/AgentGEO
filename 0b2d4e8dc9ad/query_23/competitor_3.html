-id="4608" is="true"><span data-dcnode-id="4609" instrument_node="">=</span></mo><msub data-dcnode-id="4601" is="true"><mrow data-dcnode-id="4605" is="true"><mi data-dcnode-id="4606" is="true"><span data-dcnode-id="4607" instrument_node="">C</span></mi></mrow><mrow data-dcnode-id="4602" is="true"><mi data-dcnode-id="4603" is="true" mathvariant="italic"><span data-dcnode-id="4604" instrument_node="">glucoside</span></mi></mrow></msub><mo data-dcnode-id="4599" is="true"><span data-dcnode-id="4600" instrument_node="">∗</span></mo><msub data-dcnode-id="4592" is="true"><mrow data-dcnode-id="4596" is="true"><mi data-dcnode-id="4597" is="true"><span data-dcnode-id="4598" instrument_node="">V</span></mi></mrow><mrow data-dcnode-id="4593" is="true"><mi data-dcnode-id="4594" is="true" mathvariant="italic"><span data-dcnode-id="4595" instrument_node="">hydrolysate</span></mi></mrow></msub><mo data-dcnode-id="4590" is="true"><span data-dcnode-id="4591" instrument_node="">∗</span></mo><mfrac data-dcnode-id="4578" is="true"><mrow data-dcnode-id="4587" is="true"><mn data-dcnode-id="4588" is="true"><span data-dcnode-id="4589" instrument_node="">0.001</span></mn></mrow><mrow data-dcnode-id="4579" is="true"><msub data-dcnode-id="4580" is="true"><mrow data-dcnode-id="4584" is="true"><mi data-dcnode-id="4585" is="true" mathvariant="italic"><span data-dcnode-id="4586" instrument_node="">ODW</span></mi></mrow><mrow data-dcnode-id="4581" is="true"><mi data-dcnode-id="4582" is="true" mathvariant="italic"><span data-dcnode-id="4583" instrument_node="">Sample</span></mi></mrow></msub></mrow></mfrac><mo data-dcnode-id="4576" is="true"><span data-dcnode-id="4577" instrument_node="">∗</span></mo><mn data-dcnode-id="4574" is="true"><span data-dcnode-id="4575" instrument_node="">100</span></mn></mrow></math></span></span></span></span></span></p></section><section data-dcnode-id="4542" id="s0060"><h3 class="u-h4 u-margin-m-top u-margin-xs-bottom" data-dcnode-id="4559" id="st080"><span data-dcnode-id="4562" instrument_node="">3.4</span><span data-dcnode-id="4561" instrument_node="">. </span><span data-dcnode-id="4560" instrument_node="">Determination of fiber crystallinity</span></h3><p data-dcnode-id="4543" id="p0150"><span data-dcnode-id="4550"><span data-dcnode-id="4554"><span data-dcnode-id="4558" instrument_node="">After cultured with groups of microbial consortia for 16 days, degraded tree trimmings were collected, washed and dried in the oven at 80 °C for 4 h, tree trimmings were pieced by attritor and screened by 60 meshes, as the sample for determination of fiber </span><a class="topic-link" data-dcnode-id="4556" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.sciencedirect.com/topics/earth-and-planetary-sciences/crystallinity" title="Learn more about crystallinity from ScienceDirect's AI-generated Topic Pages"><span data-dcnode-id="4557" instrument_node="">crystallinity</span></a><span data-dcnode-id="4555" instrument_node=""> by X-ray diffraction XRD (Persee XD-2X/M4600, Beijing, China) to display the change in </span></span><a class="topic-link" data-dcnode-id="4552" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.sciencedirect.com/topics/engineering/cellulose-content" title="Learn more about cellulose content from ScienceDirect's AI-generated Topic Pages"><span data-dcnode-id="4553" instrument_node="">cellulose content</span></a><span data-dcnode-id="4551" instrument_node=""> (</span></span><a class="workspace-trigger" data-dcnode-id="4548" href="#b0130" name="bb0130"><span data-dcnode-id="4549" instrument_node="">Mishra et al., 2017</span></a><span data-dcnode-id="4547" instrument_node="">, </span><a class="workspace-trigger" data-dcnode-id="4545" href="#b0245" name="bb0245"><span data-dcnode-id="4546" instrument_node="">Zhang, 2009</span></a><span data-dcnode-id="4544" instrument_node="">). Firstly, took approximately 0.1 g sample in the diffraction slot, tiled it evenly and compactly inside and then used a small brush to wipe out redundant part on the outside to guarantee an accurate weight. Secondly, placed the diffraction slot into the groove appropriately, revolved the groove in the forward direction which X-ray would shoot off along before closed the door (made of lead glass). Eventually, started the machine to scan each sample in a speed of 5°/min in a range from 5° to 40° in sequence.</span></p></section><section data-dcnode-id="4507" id="s0065"><h3 class="u-h4 u-margin-m-top u-margin-xs-bottom" data-dcnode-id="4538" id="st085"><span data-dcnode-id="4541" instrument_node="">3.5</span><span data-dcnode-id="4540" instrument_node="">. </span><span data-dcnode-id="4539" instrument_node="">16S rDNA gene analysis</span></h3><p data-dcnode-id="4523" id="p0155"><span data-dcnode-id="4534"><a class="topic-link" data-dcnode-id="4536" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.sciencedirect.com/topics/biochemistry-genetics-and-molecular-biology/operational-taxonomic-unit" title="Learn more about Operational taxonomic unit from ScienceDirect's AI-generated Topic Pages"><span data-dcnode-id="4537" instrument_node="">Operational taxonomic unit</span></a><span data-dcnode-id="4535" instrument_node=""> (OTU) clustering was completed through USEARCH (v 7.0.1090) at a 97% similarity level (</span></span><a class="workspace-trigger" data-dcnode-id="4532" href="#b0060" name="bb0060"><span data-dcnode-id="4533" instrument_node="">Edgar, 2013</span></a><span data-dcnode-id="4531" instrument_node="">), and taxonomic assignment was through RDP classifier (v2.2) with a minimal 60% confidence estimate (</span><a class="workspace-trigger" data-dcnode-id="4529" href="#b0215" name="bb0215"><span data-dcnode-id="4530" instrument_node="">Wang et al., 2007</span></a><span data-dcnode-id="4524"><span data-dcnode-id="4528" instrument_node="">). This sample was rarefied at 36,847 tags, which were classified into 7 </span><a class="topic-link" data-dcnode-id="4526" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.sciencedirect.com/topics/agricultural-and-biological-sciences/otus" title="Learn more about OTUs from ScienceDirect's AI-generated Topic Pages"><span data-dcnode-id="4527" instrument_node="">OTUs</span></a><span data-dcnode-id="4525" instrument_node="">.</span></span></p><p data-dcnode-id="4508" id="p0160"><span data-dcnode-id="4522" instrument_node="">Specifically, the criteria for collecting clean data from raw data included removal of low quality reads whose mean quality fell below 20 over a 30 bp sliding window based on the Phred algorithm, adapter sequences, ambiguous base (N base), and low complexity reads (default: reads with 10 consecutive same base) (</span><a class="workspace-trigger" data-dcnode-id="4520" href="#b0055" name="bb0055"><span data-dcnode-id="4521" instrument_node="">Douglas et al., 2014</span></a><span data-dcnode-id="4519" instrument_node="">). The high-quality paired end reads were conjuncted to tags based on overlaps by FLASH (Fast Length Adjustment of Short reads, v1.2.11). Chimeric sequences detected using UCHIME algorithm (v4.2.40) by against GOLD database (v20110519), were discarded before performing open-reference OTU picking with UPARSE at 97% of sequence similarity (</span><a class="workspace-trigger" data-dcnode-id="4517" href="#b0065" name="bb0065"><span data-dcnode-id="4518" instrument_node="">Edgar et al., 2011</span></a><span data-dcnode-id="4516" instrument_node="">, </span><a class="workspace-trigger" data-dcnode-id="4514" href="#b0060" name="bb0060"><span data-dcnode-id="4515" instrument_node="">Edgar, 2013</span></a><span data-dcnode-id="4509"><span data-dcnode-id="4513" instrument_node="">). Besides, the OTUs whose relative abundance less than 0.05% were discarded to reduce the disturbance of the low abundance spurious OTUs. The </span><a class="topic-link" data-dcnode-id="4511" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.sciencedirect.com/topics/earth-and-planetary-sciences/phylogenetics" title="Learn more about phylogenetic from ScienceDirect's AI-generated Topic Pages"><span data-dcnode-id="4512" instrument_node="">phylogenetic</span></a><span data-dcnode-id="4510" instrument_node=""> tree was generated using QIIME (v1.80) prior to the diversity analyzes including alpha diversity analysis (Observed species index, Chao index, Ace index, Shannon index and Simpson index) and beta diversity analysis that were respectively calculated using mother (v1.31.2) and QIIME (v1.80).</span></span></p></section></section><section data-dcnode-id="3649" id="s0070"><h2 class="u-h3 u-margin-l-top u-margin-xs-bottom" data-dcnode-id="4502" id="st090"><span data-dcnode-id="4505" instrument_node="">4</span><span data-dcnode-id="4504" instrument_node="">. </span><span data-dcnode-id="4503" instrument_node="">Results and discussion</span></h2><section data-dcnode-id="4473" id="s0075"><h3 class="u-h4 u-margin-m-top u-margin-xs-bottom" data-dcnode-id="4498" id="st095"><span data-dcnode-id="4501" instrument_node="">4.1</span><span data-dcnode-id="4500" instrument_node="">. </span><span data-dcnode-id="4499" instrument_node="">The primary screening for microbial consortia</span></h3><p data-dcnode-id="4474" id="p0165"><span data-dcnode-id="4485"><span data-dcnode-id="4497" instrument_node="">According to the recorded date and time of the color change in samples, four groups of </span><a class="topic-link" data-dcnode-id="4495" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.sciencedirect.com/topics/biochemistry-genetics-and-molecular-biology/microbial-consortium" title="Learn more about microbial consortia from ScienceDirect's AI-generated Topic Pages"><span data-dcnode-id="4496" instrument_node="">microbial consortia</span></a><span data-dcnode-id="4486"><span data-dcnode-id="4490"><span data-dcnode-id="4494" instrument_node=""> with the capability of lignin degradation were screened by totally thrice primary screenings that concentrated on observing color variations of samples after their </span><a class="topic-link" data-dcnode-id="4492" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.sciencedirect.com/topics/biochemistry-genetics-and-molecular-biology/inoculation" title="Learn more about inoculations from ScienceDirect's AI-generated Topic Pages"><span data-dcnode-id="4493" instrument_node="">inoculations</span></a><span data-dcnode-id="4491" instrument_node=""> into the medium of primary screening, since 2-Methoxyphenol (Guaiacol) would change into brick red owing to the </span></span><a class="topic-link" data-dcnode-id="4488" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.sciencedirect.com/topics/biochemistry-genetics-and-molecular-biology/laccase" title="Learn more about laccase from ScienceDirect's AI-generated Topic Pages"><span data-dcnode-id="4489" instrument_node="">laccase</span></a><span data-dcnode-id="4487" instrument_node=""> produced (</span></span></span><a class="workspace-trigger" data-dcnode-id="4483" href="#b0130" name="bb0130"><span data-dcnode-id="4484" instrument_node="">Mishra et al., 2017</span></a><span data-dcnode-id="4482" instrument_node="">) as shown in </span><a class="workspace-trigger" data-dcnode-id="4480" href="#s0155" name="bs0155"><span data-dcnode-id="4481" instrument_node="">Supplement Fig. 2</span></a><span data-dcnode-id="4475"><span data-dcnode-id="4479" instrument_node="">. As recorded, the color of DT-1 and DT-2 apparently turned into </span><a class="topic-link" data-dcnode-id="4477" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.sciencedirect.com/topics/food-science/amaranth" title="Learn more about amaranth from ScienceDirect's AI-generated Topic Pages"><span data-dcnode-id="4478" instrument_node="">amaranth</span></a><span data-dcnode-id="4476" instrument_node=""> one day earlier than DM-1, DM-2 and DM-3 that occurred on the 10th day. Thus, these five groups of microbial consortia with distinct color changes were demonstrated with a function in degrading lignin, were subsequently subcultured for 3 generations to confirm their stabilities in lignin degradation on the basis of their color changes during that period. Consequently, DM-3 was abandoned due to the lack of color change in the late period during the subculture while the rest progressed to the re-screening.</span></span></p></section><section data-dcnode-id="4318" id="s0080"><h3 class="u-h4 u-margin-m-top u-margin-xs-bottom" data-dcnode-id="4469" id="st100"><span data-dcnode-id="4472" instrument_node="">4.2</span><span data-dcnode-id="4471" instrument_node="">. </span><span data-dcnode-id="4470" instrument_node="">The re-screening for microbial consortia</span></h3><section data-dcnode-id="4432" id="s0085"><h4 class="u-margin-m-top u-margin-xs-bottom" data-dcnode-id="4465" id="st105"><span data-dcnode-id="4468" instrument_node="">4.2.1</span><span data-dcnode-id="4467" instrument_node="">. </span><span data-dcnode-id="4466" instrument_node="">pH evolution</span></h4><p data-dcnode-id="4460" id="p0170"><span data-dcnode-id="4464" instrument_node="">Four groups of microbial consortia (DT-1, DT-2, DM-1, DM-2) with stable color changes in the primary screening mediums were inoculated into a new medium for re-screening and were cultured for up to 20 days before the transfer to a new medium was indicated by the determined values of pH and OD</span><sub data-dcnode-id="4462"><span data-dcnode-id="4463" instrument_node="">600</span></sub><span data-dcnode-id="4461" instrument_node="">.</span></p><p data-dcnode-id="4455" id="p0175"><span data-dcnode-id="4459" instrument_node="">In the early re-screening, microbial consortia were sub-cultured for 3 months facilitated their adaptations to the culture condition whose carbon source relied on the sample of tree trimmings. As shown in </span><a class="workspace-trigger" data-dcnode-id="4457" href="#s0155" name="bs0155"><span data-dcnode-id="4458" instrument_node="">Supplement Fig. 3(a)</span></a><span data-dcnode-id="4456" instrument_node=""> pH values of microbial consortia exposited a moderate increase after the primary inoculation into a new re-screening medium, entered a stabile position approximately on the 16th day.</span></p><p data-dcnode-id="4450" id="p0180"><span data-dcnode-id="4454" instrument_node="">According to the </span><a class="workspace-trigger" data-dcnode-id="4452" href="#s0155" name="bs0155"><span data-dcnode-id="4453" instrument_node="">Supplement Fig. 3(b)</span></a><span data-dcnode-id="4451" instrument_node=""> after a second inoculation into re-screening medium, the pH values remained in rising within 19 days, where the group of microbial consortium named DM-2 peaked at 8.93 before the descend on the 19th day.</span></p><p data-dcnode-id="4442" id="p0185"><span data-dcnode-id="4449" instrument_node="">Recorded in </span><a class="workspace-trigger" data-dcnode-id="4447" href="#s0155" name="bs0155"><span data-dcnode-id="4448" instrument_node="">Supplement Fig. 3(c)</span></a><span data-dcnode-id="4446" instrument_node=""> for the third inoculation during re-screening, pH values varied slightly during the whole culture, ultimately stabilized at approximately 6.5. Aiming to recognize the optimum range of pH values for growing microbial consortia, inoculation was conducted for a 4th time that shown a regular change in pH values, which varied distinctly in the first week, followed by a sinking (</span><a class="workspace-trigger" data-dcnode-id="4444" href="#s0155" name="bs0155"><span data-dcnode-id="4445" instrument_node="">Supplement Fig. 3(d)</span></a><span data-dcnode-id="4443" instrument_node="">). Illustrated by this periodic variation in the pH value determined after the 4th generation of inoculation when all the four groups of microbial consortia were stably growing, such a stable phase was started on the 7th day after inoculated with both a short delay period and an early logarithmic phase.</span></p><p data-dcnode-id="4433" id="p0190"><span data-dcnode-id="4437"><span data-dcnode-id="4441" instrument_node="">In general, the growths of </span><a class="topic-link" data-dcnode-id="4439" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.sciencedirect.com/topics/earth-and-planetary-sciences/micro-organism" title="Learn more about microorganisms from ScienceDirect's AI-generated Topic Pages"><span data-dcnode-id="4440" instrument_node="">microorganisms</span></a><span data-dcnode-id="4438" instrument_node=""> in a new medium could be observed in a pattern combined a rapid growth with a subsequently steady development. As repeatedly inoculated for a 5th time, the variation of pH values was concordant in this pattern and was shown in </span></span><a class="workspace-trigger" data-dcnode-id="4435" href="#s0155" name="bs0155"><span data-dcnode-id="4436" instrument_node="">Supplement Fig. 3(e)</span></a><span data-dcnode-id="4434" instrument_node="">, where pH values varied distinctly within 7 days before stabilized whilst the pH value of DM-1 varied most noticeably and remained between 7.5 and 8.0 in the end. Thus, it could be concluded that these microbial consortia exhibited a steady growth state after inoculations for 5 generations.</span></p></section><section data-dcnode-id="4397" id="s0090"><h4 class="u-margin-m-top u-margin-xs-bottom" data-dcnode-id="4425" id="st110"><span data-dcnode-id="4431" instrument_node="">4.2.2</span><span data-dcnode-id="4430" instrument_node="">. </span><span data-dcnode-id="4429" instrument_node="">OD</span><sub data-dcnode-id="4427"><span data-dcnode-id="4428" instrument_node="">600.</span></sub><span data-dcnode-id="4426" instrument_node=""> Evolution</span></h4><p data-dcnode-id="4409" id="p0195"><span data-dcnode-id="4424" instrument_node="">According to </span><a class="workspace-trigger" data-dcnode-id="4422" href="#b0135" name="bb0135"><span data-dcnode-id="4423" instrument_node="">Myera et al. (2013)</span></a><span data-dcnode-id="4413"><span data-dcnode-id="4417"><span data-dcnode-id="4421" instrument_node="">, as the most conventional measurement used in </span><a class="topic-link" data-dcnode-id="4419" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.sciencedirect.com/topics/earth-and-planetary-sciences/microbiology" title="Learn more about microbiology from ScienceDirect's AI-generated Topic Pages"><span data-dcnode-id="4420" instrument_node="">microbiology</span></a><span data-dcnode-id="4418" instrument_node=""> laboratories to assess </span></span><a class="topic-link" data-dcnode-id="4415" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.sciencedirect.com/topics/biochemistry-genetics-and-molecular-biology/microbial-growth" title="Learn more about microbial growth from ScienceDirect's AI-generated Topic Pages"><span data-dcnode-id="4416" instrument_node="">microbial growth</span></a><span data-dcnode-id="4414" instrument_node="">, the value of OD</span></span><sub data-dcnode-id="4411"><span data-dcnode-id="4412" instrument_node="">600</span></sub><span data-dcnode-id="4410" instrument_node=""> was determined after those microbial consortia were inoculated into a new re-screening medium in order to illustrate the strain density in an unit volume and a larger value represents more strains grow in the microbial consortium.</span></p><p data-dcnode-id="4398" id="p0200"><span data-dcnode-id="4408" instrument_node="">In the early period after inoculation for re-screening, the strain density just slightly changed before a decline on the 10th day due to its unadaptable growth in a new environment. Therefore, the regular growth was obviously illustrated in the 4th time of repeated transfers where the strain density rapidly increased within 5 days, subsequently, the OD</span><sub data-dcnode-id="4406"><span data-dcnode-id="4407" instrument_node="">600</span></sub><span data-dcnode-id="4405" instrument_node=""> values of DT-1, DT-2, DM-2 considerably tended to decline although them rose back after day 11. The microbial consortium DM-1 was basically in a trend of rising within the first week and then fell slightly on the 9th day while it was almost in a stable state all the time. In the 5th transfer of microbial consortia, the OD</span><sub data-dcnode-id="4403"><span data-dcnode-id="4404" instrument_node="">600</span></sub><span data-dcnode-id="4402" instrument_node=""> values of all the four groups rocketed in the first 7 days before a tendency to stabilization, in particular, the group DM-1 was capable in steadily growing and developing (</span><a class="workspace-trigger" data-dcnode-id="4400" href="#s0155" name="bs0155"><span data-dcnode-id="4401" instrument_node="">Supplement Fig. 4</span></a><span data-dcnode-id="4399" instrument_node="">).</span></p></section><section data-dcnode-id="4319" id="s0095"><h4 class="u-margin-m-top u-margin-xs-bottom" data-dcnode-id="4393" id="st115"><span data-dcnode-id="4396" instrument_node="">4.2.3</span><span data-dcnode-id="4395" instrument_node="">. </span><span data-dcnode-id="4394" instrument_node="">Tree trimmings degradation</span></h4><div data-dcnode-id="4320"><p data-dcnode-id="4379" id="p0205"><span data-dcnode-id="4392" instrument_node="">On a basis of variations in pH and OD</span><sub data-dcnode-id="4390"><span data-dcnode-id="4391" instrument_node="">600</span></sub><span data-dcnode-id="4389" instrument_node=""> of the four groups of microbial consortia (</span><a class="workspace-trigger" data-dcnode-id="4387" href="#f0005" name="bf0005"><span data-dcnode-id="4388" instrument_node="">Fig. 1</span></a><span data-dcnode-id="4386" instrument_node="">), DT-1 and DM-1 were noticeable by reason of both the superior capability of becoming stable quickly and the final stabilization where the pH value and OD</span><sub data-dcnode-id="4384"><span data-dcnode-id="4385" instrument_node="">600</span></sub><span data-dcnode-id="4383" instrument_node=""> value respectively remained between 7.5 and 8.0 and 0.6 to 0.8. After inoculation into the re-screening medium, influences of microbial consortia DT-1 and DM-1 on the degradation of tree trimmings were displayed by varied degradation percentages as shown in the </span><a class="workspace-trigger" data-dcnode-id="4381" href="#f0010" name="bf0010"><span data-dcnode-id="4382" instrument_node="">Fig. 2</span></a><span data-dcnode-id="4380" instrument_node="">. In the first 3 days, the degradation percentage by both microbial consortia remained low and was respectively 0.06% and 0.87%, followed by an ascent. This increase in the degradation percentage of DT-1 was relatively slight before a surge began from the 9th day at 5.01% when the growth of DT-1 was indicated to be stable with a strong degradation effect. After the value reached 17.83% on the 13th day, the increase was slowed down and the degradation percentage was 18.35% on the 16th day. However, the microbial consortium DM-1 has shown a vigorous growth from the 3rd day, whose degradation percentage rocketed to 19.41% on the 13th day while it was 19.89% on the 16th day resulted from a deceleration. Overall, the degradation percentage of DM-1 was always higher than the one of DT-1 on the same day, pointed out a more powerful capability in degrading tree trimmings of the DM-1. Furthermore, a rapid increase could be found between the 3rd day to the 13th day with a less considerable ascent after the 16th day during the degradation of different groups of microbial consortia. Therefore, the degradation of tree trimmings by these groups of microbial consortia was considered to be completed in a 16-day period.</span></p><figure class="figure text-xs" data-dcnode-id="4348" id="f0005"><span data-dcnode-id="4363"><img alt="" aria-describedby="cn0005" data-dcnode-id="4378" height="584" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//ars.els-cdn.com/content/image/1-s2.0-S0960852418300725-gr1.jpg&amp;raw"><span data-dcnode-id="4377" instrument_node=""></span><ol class="links-for-figure" data-dcnode-id="4364"><li data-dcnode-id="4371"><a class="anchor download-link u-font-sans" data-dcnode-id="4372" download="" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//ars.els-cdn.com/content/image/1-s2.0-S0960852418300725-gr1_lrg.jpg" target="_blank" title="Download high-res image (99KB)"><span class="anchor-text" data-dcnode-id="4373"><span data-dcnode-id="4376" instrument_node="">Download : </span><span class="download-link-title" data-dcnode-id="4374"><span data-dcnode-id="4375" instrument_node="">Download high-res image (99KB)</span></span></span></a></li><li data-dcnode-id="4365"><a class="anchor download-link u-font-sans" data-dcnode-id="4366" download="" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//ars.els-cdn.com/content/image/1-s2.0-S0960852418300725-gr1.jpg" target="_blank" title="Download full-size image"><span class="anchor-text" data-dcnode-id="4367"><span data-dcnode-id="4370" instrument_node="">Download : </span><span class="download-link-title" data-dcnode-id="4368"><span data-dcnode-id="4369" instrument_node="">Download full-size image</span></span></span></a></li></ol></span><span class="captions" data-dcnode-id="4349"><span data-dcnode-id="4350" id="cn0005"><p data-dcnode-id="4351" id="sp0020"><span class="label" data-dcnode-id="4361"><span data-dcnode-id="4362" instrument_node="">Fig. 1</span></span><span data-dcnode-id="4360" instrument_node="">. </span><span data-dcnode-id="4359" instrument_node="">pH and OD</span><sub data-dcnode-id="4357"><span data-dcnode-id="4358" instrument_node="">600</span></sub><span data-dcnode-id="4352"><span data-dcnode-id="4356" instrument_node=""> variations in the tree trimming </span><a class="topic-link" data-dcnode-id="4354" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.sciencedirect.com/topics/engineering/degradation-process" title="Learn more about degradation process from ScienceDirect's AI-generated Topic Pages"><span data-dcnode-id="4355" instrument_node="">degradation process</span></a><span data-dcnode-id="4353" instrument_node="">.</span></span></p></span></span></figure><figure class="figure text-xs" data-dcnode-id="4321" id="f0010"><span data-dcnode-id="4332"><img alt="" aria-describedby="cn0010" data-dcnode-id="4347" height="241" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//ars.els-cdn.com/content/image/1-s2.0-S0960852418300725-gr2.jpg&amp;raw"><span data-dcnode-id="4346" instrument_node=""></span><ol class="links-for-figure" data-dcnode-id="4333"><li data-dcnode-id="4340"><a class="anchor download-link u-font-sans" data-dcnode-id="4341" download="" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//ars.els-cdn.com/content/image/1-s2.0-S0960852418300725-gr2_lrg.jpg" target="_blank" title="Download high-res image (39KB)"><span class="anchor-text" data-dcnode-id="4342"><span data-dcnode-id="4345" instrument_node="">Download : </span><span class="download-link-title" data-dcnode-id="4343"><span data-dcnode-id="4344" instrument_node="">Download high-res image (39KB)</span></span></span></a></li><li data-dcnode-id="4334"><a class="anchor download-link u-font-sans" data-dcnode-id="4335" download="" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//ars.els-cdn.com/content/image/1-s2.0-S0960852418300725-gr2.jpg" target="_blank" title="Download full-size image"><span class="anchor-text" data-dcnode-id="4336"><span data-dcnode-id="4339" instrument_node="">Download : </span><span class="download-link-title" data-dcnode-id="4337"><span data-dcnode-id="4338" instrument_node="">Download full-size image</span></span></span></a></li></ol></span><span class="captions" data-dcnode-id="4322"><span data-dcnode-id="4323" id="cn0010"><p data-dcnode-id="4324" id="sp0025"><span class="label" data-dcnode-id="4330"><span data-dcnode-id="4331" instrument_node="">Fig. 2</span></span><span data-dcnode-id="4329" instrument_node="">. </span><span data-dcnode-id="4328" instrument_node="">Variations in the degradation percentages of </span><a class="topic-link" data-dcnode-id="4326" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.sciencedirect.com/topics/biochemistry-genetics-and-molecular-biology/microbial-consortium" title="Learn more about microbial consortia from ScienceDirect's AI-generated Topic Pages"><span data-dcnode-id="4327" instrument_node="">microbial consortia</span></a><span data-dcnode-id="4325" instrument_node=""> DT-1 and DM-1 during the tree trimming degradation.</span></p></span></span></figure></div></section></section><section data-dcnode-id="4027" id="s0100"><h3 class="u-h4 u-margin-m-top u-margin-xs-bottom" data-dcnode-id="4314" id="st120"><span data-dcnode-id="4317" instrument_node="">4.3</span><span data-dcnode-id="4316" instrument_node="">. </span><span data-dcnode-id="4315" instrument_node="">Identification of microbial consortia for selective degradation of lignin</span></h3><section data-dcnode-id="4247" id="s0105"><h4 class="u-margin-m-top u-margin-xs-bottom" data-dcnode-id="4310" id="st125"><span data-dcnode-id="4313" instrument_node="">4.3.1</span><span data-dcnode-id="4312" instrument_node="">. </span><span data-dcnode-id="4311" instrument_node="">Microbial consortia growing status in the tree trimming degradation process</span></h4><div data-dcnode-id="4262"><p data-dcnode-id="4298" id="p0210"><span data-dcnode-id="4305"><span data-dcnode-id="4309" instrument_node="">Four groups of microbial consortia were activated from the stable growth to carry out the experiment of tree trimmings degradation. Since </span><a class="topic-link" data-dcnode-id="4307" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.sciencedirect.com/topics/earth-and-planetary-sciences/microflora" title="Learn more about microflorae from ScienceDirect's AI-generated Topic Pages"><span data-dcnode-id="4308" instrument_node="">microflorae</span></a><span data-dcnode-id="4306" instrument_node=""> alter the pH in medium surrounds them to guarantee their growth, propagation and the normal metabolism, the varied values of pH were determined as an indicator to monitor the growing state of microbial consortia. As shown in </span></span><a class="workspace-trigger" data-dcnode-id="4303" href="#f0015" name="bf0015"><span data-dcnode-id="4304" instrument_node="">Fig. 3</span></a><span data-dcnode-id="4302" instrument_node="">, pH values in medium soared within 3 days after inoculation during the degradation of tree trimmings, however, this upward trend slowed down and the pH value became stable on the 5th day. Besides, although all the pH values were ultimately stabilized at approximately 7.5, DM-2 shown the slightest change. In contrast, DT-1 and DT-2 emerged a rapid development after inoculated and DT-1 performed better with a quicker development and a longer stable phase that indicated DM-1 could more promptly adapt to the new surroundings. Meanwhile, DM-1 had a plateaued pH value closer to 7 than others in a range which has been previously demonstrated as the optimal pH for growth of microbial consortia (</span><a class="workspace-trigger" data-dcnode-id="4300" href="#b0170" name="bb0170"><span data-dcnode-id="4301" instrument_node="">Shi et al., 2013</span></a><span data-dcnode-id="4299" instrument_node="">), such a function in facilitating self-growth was highlighted as a strength to survive in nature.</span></p><figure class="figure text-xs" data-dcnode-id="4263" id="f0015"><span data-dcnode-id="4282"><img alt="" aria-describedby="cn0015" data-dcnode-id="4297" height="237" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//ars.els-cdn.com/content/image/1-s2.0-S0960852418300725-gr3.jpg&amp;raw"><span data-dcnode-id="4296" instrument_node=""></span><ol class="links-for-figure" data-dcnode-id="4283"><li data-dcnode-id="4290"><a class="anchor download-link u-font-sans" data-dcnode-id="4291" download="" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//ars.els-cdn.com/content/image/1-s2.0-S0960852418300725-gr3_lrg.jpg" target="_blank" title="Download high-res image (82KB)"><span class="anchor-text" data-dcnode-id="4292"><span data-dcnode-id="4295" instrument_node="">Download : </span><span class="download-link-title" data-dcnode-id="4293"><span data-dcnode-id="4294" instrument_node="">Download high-res image (82KB)</span></span></span></a></li><li data-dcnode-id="4284"><a class="anchor download-link u-font-sans" data-dcnode-id="4285" download="" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//ars.els-cdn.com/content/image/1-s2.0-S0960852418300725-gr3.jpg" target="_blank" title="Download full-size image"><span class="anchor-text" data-dcnode-id="4286"><span data-dcnode-id="4289" instrument_node="">Download : </span><span class="download-link-title" data-dcnode-id="4287"><span data-dcnode-id="4288" instrument_node="">Download full-size image</span></span></span></a></li></ol></span><span class="captions" data-dcnode-id="4264"><span data-dcnode-id="4265" id="cn0015"><p data-dcnode-id="4266" id="sp0030"><span class="label" data-dcnode-id="4280"><span data-dcnode-id="4281" instrument_node="">Fig. 3</span></span><span data-dcnode-id="4279" instrument_node="">. </span><span data-dcnode-id="4274"><span data-dcnode-id="4278" instrument_node="">Variations in the </span><a class="topic-link" data-dcnode-id="4276" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.sciencedirect.com/topics/earth-and-planetary-sciences/catalytic-activity" title="Learn more about enzyme activities from ScienceDirect's AI-generated Topic Pages"><span data-dcnode-id="4277" instrument_node="">enzyme activities</span></a><span data-dcnode-id="4275" instrument_node=""> of </span></span><a class="topic-link" data-dcnode-id="4272" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.sciencedirect.com/topics/biochemistry-genetics-and-molecular-biology/cellulase" title="Learn more about cellulase from ScienceDirect's AI-generated Topic Pages"><span data-dcnode-id="4273" instrument_node="">cellulase</span></a><span data-dcnode-id="4267"><span data-dcnode-id="4271" instrument_node=""> and ligninase during the culture of different </span><a class="topic-link" data-dcnode-id="4269" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.sciencedirect.com/topics/biochemistry-genetics-and-molecular-biology/microbial-consortium" title="Learn more about microbial consortia from ScienceDirect's AI-generated Topic Pages"><span data-dcnode-id="4270" instrument_node="">microbial consortia</span></a><span data-dcnode-id="4268" instrument_node="">.</span></span></p></span></span></figure></div><p data-dcnode-id="4248" id="p0215"><span data-dcnode-id="4261" instrument_node="">OD</span><sub data-dcnode-id="4259"><span data-dcnode-id="4260" instrument_node="">600</span></sub><span data-dcnode-id="4258" instrument_node=""> is an equilibrium of the amount of microbial species in a media with limited volume and the values were shown in </span><a class="workspace-trigger" data-dcnode-id="4256" href="#f0015" name="bf0015"><span data-dcnode-id="4257" instrument_node="">Fig. 3</span></a><span data-dcnode-id="4255" instrument_node="">, where could be simply noticed that values of OD</span><sub data-dcnode-id="4253"><span data-dcnode-id="4254" instrument_node="">600</span></sub><span data-dcnode-id="4252" instrument_node=""> in DT-2 and DM-2 became stabilized on account of the stable growth of microbial consortia after a logarithmic growth phase in the first 3 days when microbial consortia were supplied with adequate nutrition while the values of DT-1 and DM-1 continued to climb up and DM-1 took the advantage. On the 11th day, the OD</span><sub data-dcnode-id="4250"><span data-dcnode-id="4251" instrument_node="">600</span></sub><span data-dcnode-id="4249" instrument_node=""> value of DT-1 declined considerably while the value of DM-1 decreased slightly before the recovery, in other words, the microbial consortium DM-1 was capable in efficient utilization of nutrients as well as adaptation in a circumstance to optimize its own growth and reproduction steadily.</span></p></section><section data-dcnode-id="4212" id="s0110"><h4 class="u-margin-m-top u-margin-xs-bottom" data-dcnode-id="4243" id="st130"><span data-dcnode-id="4246" instrument_node="">4.3.2</span><span data-dcnode-id="4245" instrument_node="">. </span><span data-dcnode-id="4244" instrument_node="">Activities of cellulase and ligninase in the tree trimming degradation process</span></h4><p data-dcnode-id="4227" id="p0220"><span data-dcnode-id="4238"><span data-dcnode-id="4242" instrument_node="">Due to the production of enzymes, the four groups of microbial consortia (DT-1, DT-2 and DM-1, DM-2) were capable of degrading lignin and cellulose and the degradation was positively correlated with </span><a class="topic-link" data-dcnode-id="4240" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.sciencedirect.com/topics/earth-and-planetary-sciences/catalytic-activity" title="Learn more about enzyme activities from ScienceDirect's AI-generated Topic Pages"><span data-dcnode-id="4241" instrument_node="">enzyme activities</span></a><span data-dcnode-id="4239" instrument_node=""> (</span></span><a class="workspace-trigger" data-dcnode-id="4236" href="#b0085" name="bb0085"><span data-dcnode-id="4237" instrument_node="">Kamei, 2016</span></a><span data-dcnode-id="4231"><span data-dcnode-id="4235" instrument_node="">). Thus, activities of ligninolytic enzymes and </span><a class="topic-link" data-dcnode-id="4233" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.sciencedirect.com/topics/biochemistry-genetics-and-molecular-biology/cellulase" title="Learn more about cellulase from ScienceDirect's AI-generated Topic Pages"><span data-dcnode-id="4234" instrument_node="">cellulase</span></a><span data-dcnode-id="4232" instrument_node=""> were determined in the middle and late period in the culture (</span></span><a class="workspace-trigger" data-dcnode-id="4229" href="#f0015" name="bf0015"><span data-dcnode-id="4230" instrument_node="">Fig. 3</span></a><span data-dcnode-id="4228" instrument_node="">) in order to reflect their degradation abilities.</span></p><p data-dcnode-id="4222" id="p0225"><span data-dcnode-id="4226" instrument_node="">As shown in </span><a class="workspace-trigger" data-dcnode-id="4224" href="#f0015" name="bf0015"><span data-dcnode-id="4225" instrument_node="">Fig. 3</span></a><span data-dcnode-id="4223" instrument_node="">, during the degradation of tree trimmings by all groups of microbial consortia, there was a steady increase in the activity of ligninase and a rise in the cellulase activity that was only found in the first 8 days with a following decline. Among them, the value of ligninase activity of the microbial consortium DM-1 was leading and peaked at 65.390 U/mL on the 14th day after a deceleration from the 8th day, such a variation exhibited the superior ability of DM-1 in lignin degradation. Ranked after the DM-1 in the value of ligninase activity, DT-1 shown a rapid growth within the first 8 days before a slowing from the 8th day whilst its ligninase activity reached the maximum of 54.506 U/mL on the 16th day. In terms of the DT-2, its ligninase activity only shown a considerable increase from the 8th day, which quickly slowed down after the 10th day before a stabilised state began from the 12th day when the value remained between 52.076 and 52.559 U/mL. Consequently, the effective ability of degrading lignin by DT-2 was confirmed even though its short lignin degradation commenced late. In terms of the DM-2, its ligninase activity increased marginally in the early period before a rapid rise between the 8th day to the 12th day. Subsequently it was decelerated with a peak value of 42.215 U/mL, which was remarkably weaker than other groups. Therefore, the DM-1 tended to have the robustest degradation ability of lignin while others were comparatively affected by their limits.</span></p><p data-dcnode-id="4220" id="p0230"><span data-dcnode-id="4221" instrument_node="">From the view of values of cellulase activity, except for DM-1, other three groups of microbial consortia were in a trend of a rise followed by a decline. Among them, the value of DM-2 could reach 34.520 U/mL on the 8th day and then diminished before a stabilization, remaining between 10.824 and 14.942 U/mL. Meanwhile, the variations of DT-1 and DT-2 were quite similar, the value peaked respectively at 23.945 U/mL on the 8th day and 22.536 U/mL on the 10th day, and then dramatically flopped while the value of DM-1 constantly increased with an obviously slower speed than others and reached a maximal value of 13.742 U/mL on the 12th day, followed by a slight decline. Consequently, the DM-1 was considered as the most inefficient one in the cellulose degradation among these four groups of microbial consortia.</span></p><p data-dcnode-id="4218" id="p0235"><span data-dcnode-id="4219" instrument_node="">To put it in a nutshell, the potent capability of the microbial consortium DM-1 in a selective lignin degradation has been highlighted by two determined values which were the highest value of ligninase activity and the lowest value of cellulase activity.</span></p><p data-dcnode-id="4213" id="p0240"><span data-dcnode-id="4217" instrument_node="">In contrast, considering the results of </span><a class="workspace-trigger" data-dcnode-id="4215" href="#b0090" name="bb0090"><span data-dcnode-id="4216" instrument_node="">Knežević et al. (2013)</span></a><span data-dcnode-id="4214" instrument_node="">, its maximum of ligninase activity was 11.72 U/mL on the 10th day and its minimum one was 0.03 U/mL after a week, which value was approximately 300 times smaller than the lowest value in this work on the 8th day. Therefore, DT-1 and DM-1 held the advantage in efficient lignin degradation in the 16 days’ culture.</span></p></section><section data-dcnode-id="4088" id="s0115"><h4 class="u-margin-m-top u-margin-xs-bottom" data-dcnode-id="4208" id="st135"><span data-dcnode-id="4211" instrument_node="">4.3.3</span><span data-dcnode-id="4210" instrument_node="">. </span><span data-dcnode-id="4209" instrument_node="">Substrates degradation characteristics in the tree trimming degradation process</span></h4><div data-dcnode-id="4167"><p data-dcnode-id="4195" id="p0245"><span data-dcnode-id="4207" instrument_node="">After a finished cultivation of 16 days, percentages of degraded tree trimmings, cellulose and lignin were respectively determined (</span><a class="workspace-trigger" data-dcnode-id="4205" href="#f0020" name="bf0020"><span data-dcnode-id="4206" instrument_node="">Fig. 4</span></a><span data-dcnode-id="4196"><span data-dcnode-id="4200"><span data-dcnode-id="4204" instrument_node="">) to show the capability of microbial consortia in degrading tree trimmings. Expect for DM-2, others revealed a higher lignin degradation percentage and DM-1 was highlighted for a leading capability of degrading lignin (28.37%). Additionally, DM-2 had a conspicuous percentage in cellulose degradation with only 7.48% lignin degraded while it peaked 24.72% in the total degradation percentage, illustrated its high capability in degrading </span><a class="topic-link" data-dcnode-id="4202" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.sciencedirect.com/topics/agricultural-and-biological-sciences/lignocellulose" title="Learn more about lignocellulose from ScienceDirect's AI-generated Topic Pages"><span data-dcnode-id="4203" instrument_node="">lignocellulose</span></a><span data-dcnode-id="4201" instrument_node=""> without a </span></span><a class="topic-link" data-dcnode-id="4198" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.sciencedirect.com/topics/earth-and-planetary-sciences/selectivity" title="Learn more about selectivity from ScienceDirect's AI-generated Topic Pages"><span data-dcnode-id="4199" instrument_node="">selectivity</span></a><span data-dcnode-id="4197" instrument_node=""> of lignin degradation.</span></span></p><figure class="figure text-xs" data-dcnode-id="4168" id="f0020"><span data-dcnode-id="4179"><img alt="" aria-describedby="cn0020" data-dcnode-id="4194" height="200" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//ars.els-cdn.com/content/image/1-s2.0-S0960852418300725-gr4.jpg&amp;raw"><span data-dcnode-id="4193" instrument_node=""></span><ol class="links-for-figure" data-dcnode-id="4180"><li data-dcnode-id="4187"><a class="anchor download-link u-font-sans" data-dcnode-id="4188" download="" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//ars.els-cdn.com/content/image/1-s2.0-S0960852418300725-gr4_lrg.jpg" target="_blank" title="Download high-res image (42KB)"><span class="anchor-text" data-dcnode-id="4189"><span data-dcnode-id="4192" instrument_node="">Download : </span><span class="download-link-title" data-dcnode-id="4190"><span data-dcnode-id="4191" instrument_node="">Download high-res image (42KB)</span></span></span></a></li><li data-dcnode-id="4181"><a class="anchor download-link u-font-sans" data-dcnode-id="4182" download="" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//ars.els-cdn.com/content/image/1-s2.0-S0960852418300725-gr4.jpg" target="_blank" title="Download full-size image"><span class="anchor-text" data-dcnode-id="4183"><span data-dcnode-id="4186" instrument_node="">Download : </span><span class="download-link-title" data-dcnode-id="4184"><span data-dcnode-id="4185" instrument_node="">Download full-size image</span></span></span></a></li></ol></span><span class="captions" data-dcnode-id="4169"><span data-dcnode-id="4170" id="cn0020"><p data-dcnode-id="4171" id="sp0035"><span class="label" data-dcnode-id="4177"><span data-dcnode-id="4178" instrument_node="">Fig. 4</span></span><span data-dcnode-id="4176" instrument_node="">. </span><span data-dcnode-id="4175" instrument_node="">Degradation percentages of lignin, cellulose and tree trimmings by four groups of screened </span><a class="topic-link" data-dcnode-id="4173" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.sciencedirect.com/topics/biochemistry-genetics-and-molecular-biology/microbial-consortium" title="Learn more about microbial consortia from ScienceDirect's AI-generated Topic Pages"><span data-dcnode-id="4174" instrument_node="">microbial consortia</span></a><span data-dcnode-id="4172" instrument_node="">.</span></p></span></span></figure></div><p data-dcnode-id="4165" id="p0250"><span data-dcnode-id="4166" instrument_node="">Considering DT-1 and DT-2 that are two groups of microbial consortia have a relatively high percentage in lignin degradation, their degradation percentages of tree trimmings were both higher than that of DM-1 while their cellulose degradation percentages which were respectively 18.30% and 20.64%, were also both higher than DM-1, whose was 10.20% . Possibly resulted from their simultaneous utilization of lignin and cellulose during the lignocellulose degradation so that their degradation percentages in tree trimmings were relatively high without a distinct selectivity revealed.</span></p><div data-dcnode-id="4089"><p data-dcnode-id="4136" id="p0255"><span data-dcnode-id="4161"><a class="topic-link" data-dcnode-id="4163" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.sciencedirect.com/topics/engineering/selectivity-value" title="Learn more about Selectivity values from ScienceDirect's AI-generated Topic Pages"><span data-dcnode-id="4164" instrument_node="">Selectivity values</span></a><span data-dcnode-id="4162" instrument_node=""> (SV) serve as an crucial parameter indicating the function in high lignin degradation with low cellulose consumption (</span></span><a class="workspace-trigger" data-dcnode-id="4159" href="#b0130" name="bb0130"><span data-dcnode-id="4160" instrument_node="">Mishra et al., 2017</span></a><span data-dcnode-id="4158" instrument_node="">), were calculated based on the degradation percentages of lignin and cellulose in tree trimmings degraded by the screened four groups of microbial consortia. As shown in </span><a class="workspace-trigger" data-dcnode-id="4156" href="#t0005" name="bt0005"><span data-dcnode-id="4157" instrument_node="">Table1</span></a><span data-dcnode-id="4155" instrument_node="">, the SV of DM-2 (0.39) was the single one under 1, illustrated its high selectivity for cellulose degradation. In contrast, the other groups of microbial consortia with a SV more than 1 represented a functional role in selectively degrading lignin, among which DM-1 had the highest SV (2.78) was the most effective one in selective lignin degradation. According to </span><a class="workspace-trigger" data-dcnode-id="4153" href="#b0130" name="bb0130"><span data-dcnode-id="4154" instrument_node="">Mishra et al. (2017)</span></a><span data-dcnode-id="4144"><span data-dcnode-id="4152" instrument_node="">, the selectivity value of microbial consortia could directly exhibit their selectivities in </span><a class="topic-link" data-dcnode-id="4150" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.sciencedirect.com/topics/engineering/lignocellulosics" title="Learn more about lignocellulosic from ScienceDirect's AI-generated Topic Pages"><span data-dcnode-id="4151" instrument_node="">lignocellulosic</span></a><span data-dcnode-id="4145"><span data-dcnode-id="4149" instrument_node=""> degradation and the SV value of the maximum lignin degradation achieved by the chemical method using a combination of </span><a class="topic-link" data-dcnode-id="4147" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.sciencedirect.com/topics/biochemistry-genetics-and-molecular-biology/syringic-acid" title="Learn more about syringic acid from ScienceDirect's AI-generated Topic Pages"><span data-dcnode-id="4148" instrument_node="">syringic acid</span></a><span data-dcnode-id="4146" instrument_node=""> and CuSO</span></span></span><sub data-dcnode-id="4142"><span data-dcnode-id="4143" instrument_node="">4</span></sub><span data-dcnode-id="4137"><span data-dcnode-id="4141" instrument_node=""> was 3.07. Moreover, all the SV values of bio-degradation methods in the literature were less than 2.74, illustrated a promising value of using our microbial consortia in selective lignin removal for lignocellulose </span><a class="topic-link" data-dcnode-id="4139" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.sciencedirect.com/topics/agricultural-and-biological-sciences/pretreatment" title="Learn more about pretreatment from ScienceDirect's AI-generated Topic Pages"><span data-dcnode-id="4140" instrument_node="">pretreatment</span></a><span data-dcnode-id="4138" instrument_node="">.</span></span></p><div class="tables frame-topbot rowsep-0 colsep-0" data-dcnode-id="4090" id="t0005"><span class="captions" data-dcnode-id="4123"><span data-dcnode-id="4124" id="cn0035"><p data-dcnode-id="4125" id="sp0050"><span class="label" data-dcnode-id="4134"><span data-dcnode-id="4135" instrument_node="">Table 1</span></span><span data-dcnode-id="4133" instrument_node="">. </span><a class="topic-link" data-dcnode-id="4131" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.sciencedirect.com/topics/engineering/selectivity-value" title="Learn more about Selectivity value from ScienceDirect's AI-generated Topic Pages"><span data-dcnode-id="4132" instrument_node="">Selectivity value</span></a><span data-dcnode-id="4126"><span data-dcnode-id="4130" instrument_node=""> (SV) of </span><a class="topic-link" data-dcnode-id="4128" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.sciencedirect.com/topics/biochemistry-genetics-and-molecular-biology/microbial-consortium" title="Learn more about microbial consortia from ScienceDirect's AI-generated Topic Pages"><span data-dcnode-id="4129" instrument_node="">microbial consortia</span></a><span data-dcnode-id="4127" instrument_node=""> in the tree trimming degradation.</span></span></p></span></span><div class="groups" data-dcnode-id="4097"><table data-dcnode-id="4098"><thead data-dcnode-id="4111"><tr class="rowsep-1 valign-top" data-dcnode-id="4112"><th class="align-left" data-dcnode-id="4121" scope="col"><span data-dcnode-id="4122" instrument_node="">Microbial Consortium</span></th><th class="align-left" data-dcnode-id="4119" scope="col"><span data-dcnode-id="4120" instrument_node="">DT-1</span></th><th class="align-left" data-dcnode-id="4117" scope="col"><span data-dcnode-id="4118" instrument_node="">DT-2</span></th><th class="align-left" data-dcnode-id="4115" scope="col"><span data-dcnode-id="4116" instrument_node="">DM-1</span></th><th class="align-left" data-dcnode-id="4113" scope="col"><span data-dcnode-id="4114" instrument_node="">DM-2</span></th></tr></thead><tbody data-dcnode-id="4099"><tr class="valign-top" data-dcnode-id="4100"><td class="align-left" data-dcnode-id="4109"><span data-dcnode-id="4110" instrument_node="">SV</span></td><td class="align-left" data-dcnode-id="4107"><span data-dcnode-id="4108" instrument_node="">1.37</span></td><td class="align-left" data-dcnode-id="4105"><span data-dcnode-id="4106" instrument_node="">1.35</span></td><td class="align-left" data-dcnode-id="4103"><span data-dcnode-id="4104" instrument_node="">2.78</span></td><td class="align-left" data-dcnode-id="4101"><span data-dcnode-id="4102" instrument_node="">0.39</span></td></tr></tbody></table></div><p class="legend" data-dcnode-id="4091"></p><p data-dcnode-id="4092" id="sp0055"><span data-dcnode-id="4096" instrument_node="">Footnote: SV is defined as a ratio of amount of lignin degradaed to the amount of cellulose consumed by strains during </span><a class="topic-link" data-dcnode-id="4094" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.sciencedirect.com/topics/agricultural-and-biological-sciences/pretreatment" title="Learn more about pretreatment from ScienceDirect's AI-generated Topic Pages"><span data-dcnode-id="4095" instrument_node="">pretreatment</span></a><span data-dcnode-id="4093" instrument_node="">.</span></p><p></p></div></div></section><section data-dcnode-id="4028" id="s0120"><h4 class="u-margin-m-top u-margin-xs-bottom" data-dcnode-id="4084" id="st140"><span data-dcnode-id="4087" instrument_node="">4.3.4</span><span data-dcnode-id="4086" instrument_node="">. </span><span data-dcnode-id="4085" instrument_node="">Influenced fiber crystallinity by microbial consortia</span></h4><div data-dcnode-id="4029"><p data-dcnode-id="4065" id="p0260"><span data-dcnode-id="4075"><span data-dcnode-id="4079"><span data-dcnode-id="4083" instrument_node="">During degradation, lignin was broke into </span><a class="topic-link" data-dcnode-id="4081" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.sciencedirect.com/topics/biochemistry-genetics-and-molecular-biology/small-molecule" title="Learn more about smaller molecules from ScienceDirect's AI-generated Topic Pages"><span data-dcnode-id="4082" instrument_node="">smaller molecules</span></a><span data-dcnode-id="4080" instrument_node=""> by enzymes, among which ligninase was the leading role generated by microbial consortia in reducing the correlation between lignin and cellulose resulted in a lower </span></span><a class="topic-link" data-dcnode-id="4077" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.sciencedirect.com/topics/earth-and-planetary-sciences/crystallinity" title="Learn more about crystallinity from ScienceDirect's AI-generated Topic Pages"><span data-dcnode-id="4078" instrument_node="">crystallinity</span></a><span data-dcnode-id="4076" instrument_node=""> as a whole, which was similar to </span></span><a class="workspace-trigger" data-dcnode-id="4073" href="#b0240" name="bb0240"><span data-dcnode-id="4074" instrument_node="">Zhang et al. (2012)</span></a><span data-dcnode-id="4072" instrument_node="">. According to the </span><a class="workspace-trigger" data-dcnode-id="4070" href="#f0025" name="bf0025"><span data-dcnode-id="4071" instrument_node="">Fig. 5</span></a><span data-dcnode-id="4069" instrument_node="">, both microbial consortia DM-1 and DT-1 resulted in a significant reduction in the fiber crystallinity of degraded tree trimmings, which respectively was 24.38% and 18.73%. Although DM-1 has displayed a stronger degradation effect on the structure of lignocellulose than DT-1, no significant difference in fiber crystallinity was observed. However, because of the microbial consortia’s straightforward influences on the lignocellulosic structure, the degradation of lignin can bring about the increase of depolymerised cellulose as well as revealing more accessible surface area that will facilitate the further use of pretreated tree trimmings (</span><a class="workspace-trigger" data-dcnode-id="4067" href="#b0125" name="bb0125"><span data-dcnode-id="4068" instrument_node="">Maurya et al., 2015</span></a><span data-dcnode-id="4066" instrument_node="">).</span></p><figure class="figure text-xs" data-dcnode-id="4030" id="f0025"><span data-dcnode-id="4049"><img alt="" aria-describedby="cn0025" data-dcnode-id="4064" height="219" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//ars.els-cdn.com/content/image/1-s2.0-S0960852418300725-gr5.jpg&amp;raw"><span data-dcnode-id="4063" instrument_node=""></span><ol class="links-for-figure" data-dcnode-id="4050"><li data-dcnode-id="4057"><a class="anchor download-link u-font-sans" data-dcnode-id="4058" download="" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//ars.els-cdn.com/content/image/1-s2.0-S0960852418300725-gr5_lrg.jpg" target="_blank" title="Download high-res image (31KB)"><span class="anchor-text" data-dcnode-id="4059"><span data-dcnode-id="4062" instrument_node="">Download : </span><span class="download-link-title" data-dcnode-id="4060"><span data-dcnode-id="4061" instrument_node="">Download high-res image (31KB)</span></span></span></a></li><li data-dcnode-id="4051"><a class="anchor download-link u-font-sans" data-dcnode-id="4052" download="" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//ars.els-cdn.com/content/image/1-s2.0-S0960852418300725-gr5.jpg" target="_blank" title="Download full-size image"><span class="anchor-text" data-dcnode-id="4053"><span data-dcnode-id="4056" instrument_node="">Download : </span><span class="download-link-title" data-dcnode-id="4054"><span data-dcnode-id="4055" instrument_node="">Download full-size image</span></span></span></a></li></ol></span><span class="captions" data-dcnode-id="4031"><span data-dcnode-id="4032" id="cn0025"><p data-dcnode-id="4033" id="sp0040"><span class="label" data-dcnode-id="4047"><span data-dcnode-id="4048" instrument_node="">Fig. 5</span></span><span data-dcnode-id="4046" instrument_node="">. </span><span data-dcnode-id="4045" instrument_node="">The fiber </span><a class="topic-link" data-dcnode-id="4043" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.sciencedirect.com/topics/earth-and-planetary-sciences/crystallinity" title="Learn more about crystallinity from ScienceDirect's AI-generated Topic Pages"><span data-dcnode-id="4044" instrument_node="">crystallinity</span></a><span data-dcnode-id="4034"><span data-dcnode-id="4038"><span data-dcnode-id="4042" instrument_node=""> influenced by </span><a class="topic-link" data-dcnode-id="4040" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.sciencedirect.com/topics/biochemistry-genetics-and-molecular-biology/microbial-consortium" title="Learn more about microbial consortia from ScienceDirect's AI-generated Topic Pages"><span data-dcnode-id="4041" instrument_node="">microbial consortia</span></a><span data-dcnode-id="4039" instrument_node=""> compared with its original value of tree trimmings. Statistical significance was examined by analysis of variance (ANOVA, α = 0.05) by using </span></span><a class="topic-link" data-dcnode-id="4036" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.sciencedirect.com/topics/biochemistry-genetics-and-molecular-biology/sequest" title="Learn more about SPSS from ScienceDirect's AI-generated Topic Pages"><span data-dcnode-id="4037" instrument_node="">SPSS</span></a><span data-dcnode-id="4035" instrument_node=""> (Version 22 for Windows).</span></span></p></span></span></figure></div></section></section><section data-dcnode-id="3650" id="s0125"><h3 class="u-h4 u-margin-m-top u-margin-xs-bottom" data-dcnode-id="4023" id="st145"><span data-dcnode-id="4026" instrument_node="">4.4</span><span data-dcnode-id="4025" instrument_node="">. </span><span data-dcnode-id="4024" instrument_node="">Diversity analysis for microbial consortium DM-1</span></h3><section data-dcnode-id="3769" id="s0130"><h4 class="u-margin-m-top u-margin-xs-bottom" data-dcnode-id="4019" id="st150"><span data-dcnode-id="4022" instrument_node="">4.4.1</span><span data-dcnode-id="4021" instrument_node="">. </span><span data-dcnode-id="4020" instrument_node="">Plate isolation</span></h4><div data-dcnode-id="3775"><p data-dcnode-id="3942" id="p0265"><span data-dcnode-id="4018" instrument_node="">Isolated from the microbial consortium DM-1 with screening mediums, the results were morphologically compared with </span><a class="workspace-trigger" data-dcnode-id="4016" href="#t0010" name="bt0010"><span data-dcnode-id="4017" instrument_node="">Table 2</span></a><span data-dcnode-id="4015" instrument_node=""> and each stained strain was microscopically exanimated as shown in </span><a class="workspace-trigger" data-dcnode-id="4013" href="#s0155" name="bs0155"><span data-dcnode-id="4014" instrument_node="">Supplement Fig. 5</span></a><span data-dcnode-id="4000"><span data-dcnode-id="4004"><span data-dcnode-id="4012" instrument_node="">. Eventually, a total of twelve strains were recognized to be separable, comprising three </span><a class="topic-link" data-dcnode-id="4010" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.sciencedirect.com/topics/biochemistry-genetics-and-molecular-biology/fungal-strain" title="Learn more about fungal strains from ScienceDirect's AI-generated Topic Pages"><span data-dcnode-id="4011" instrument_node="">fungal strains</span></a><span data-dcnode-id="4005"><span data-dcnode-id="4009" instrument_node="">, four </span><a class="topic-link" data-dcnode-id="4007" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.sciencedirect.com/topics/biochemistry-genetics-and-molecular-biology/bacterial-strain" title="Learn more about bacterial strains from ScienceDirect's AI-generated Topic Pages"><span data-dcnode-id="4008" instrument_node="">bacterial strains</span></a><span data-dcnode-id="4006" instrument_node=""> and five strains of </span></span></span><a class="topic-link" data-dcnode-id="4002" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.sciencedirect.com/topics/biochemistry-genetics-and-molecular-biology/actinobacteria" title="Learn more about actinomycetes from ScienceDirect's AI-generated Topic Pages"><span data-dcnode-id="4003" instrument_node="">actinomycetes</span></a><span data-dcnode-id="4001" instrument_node=""> whilst the actinomycetes indeed is taxonomically attributed to bacteria (</span></span><a class="workspace-trigger" data-dcnode-id="3998" href="#b9005" name="bb9005"><span data-dcnode-id="3999" instrument_node="">Chen and Wan, 2017</span></a><span data-dcnode-id="3997" instrument_node="">) indicating it was the bacteria that constituted the majority of DM-1. Literally, bacteria have been constantly reported with function in lignin degradation in recent such as</span><span data-dcnode-id="3996" instrument_node="">&nbsp;</span><span data-dcnode-id="3978"><span data-dcnode-id="3984"><span data-dcnode-id="3990"><em data-dcnode-id="3993"><a class="topic-link" data-dcnode-id="3994" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.sciencedirect.com/topics/biochemistry-genetics-and-molecular-biology/acinetobacter-calcoaceticus" title="Learn more about Acinetobacter calcoaceticus from ScienceDirect's AI-generated Topic Pages"><span data-dcnode-id="3995" instrument_node="">Acinetobacter calcoaceticus</span></a></em><em data-dcnode-id="3991"><span data-dcnode-id="3992" instrument_node="">, </span></em></span><em data-dcnode-id="3987"><a class="topic-link" data-dcnode-id="3988" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.sciencedirect.com/topics/earth-and-planetary-sciences/pseudomonas" title="Learn more about Pseudomonas from ScienceDirect's AI-generated Topic Pages"><span data-dcnode-id="3989" instrument_node="">Pseudomonas</span></a></em><em data-dcnode-id="3985"><span data-dcnode-id="3986" instrument_node=""> putida, </span></em></span><em data-dcnode-id="3981"><a class="topic-link" data-dcnode-id="3982" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.sciencedirect.com/topics/biochemistry-genetics-and-molecular-biology/pandoraea" title="Learn more about Pandoraea from ScienceDirect's AI-generated Topic Pages"><span data-dcnode-id="3983" instrument_node="">Pandoraea</span></a></em><em data-dcnode-id="3979"><span data-dcnode-id="3980" instrument_node=""> norimbergensis</span></em></span><span data-dcnode-id="3977" instrument_node="">&nbsp;</span><span data-dcnode-id="3976" instrument_node="">and</span><span data-dcnode-id="3975" instrument_node="">&nbsp;</span><span data-dcnode-id="3969"><em data-dcnode-id="3972"><a class="topic-link" data-dcnode-id="3973" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.sciencedirect.com/topics/biochemistry-genetics-and-molecular-biology/stenotrophomonas" title="Learn more about Stenotrophomonas from ScienceDirect's AI-generated Topic Pages"><span data-dcnode-id="3974" instrument_node="">Stenotrophomonas</span></a></em><em data-dcnode-id="3970"><span data-dcnode-id="3971" instrument_node=""> rhizophila</span></em></span><span data-dcnode-id="3968" instrument_node="">&nbsp;</span><span data-dcnode-id="3967" instrument_node="">(</span><a class="workspace-trigger" data-dcnode-id="3965" href="#b0015" name="bb0015"><span data-dcnode-id="3966" instrument_node="">Asina et al., 2016</span></a><span data-dcnode-id="3964" instrument_node="">, </span><a class="workspace-trigger" data-dcnode-id="3962" href="#b0035" name="bb0035"><span data-dcnode-id="3963" instrument_node="">Brossi et al., 2015</span></a><span data-dcnode-id="3961" instrument_node="">, </span><a class="workspace-trigger" data-dcnode-id="3959" href="#b9000" name="bb9000"><span data-dcnode-id="3960" instrument_node="">Bandounas et al., 2011</span></a><span data-dcnode-id="3950"><span data-dcnode-id="3954"><span data-dcnode-id="3958" instrument_node="">) while </span><a class="topic-link" data-dcnode-id="3956" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.sciencedirect.com/topics/immunology-and-microbiology/lignolytic-fungi" title="Learn more about lignolytic fungi from ScienceDirect's AI-generated Topic Pages"><span data-dcnode-id="3957" instrument_node="">lignolytic fungi</span></a><span data-dcnode-id="3955" instrument_node=""> have been well thoughtfully researched in previous studies, among them, the white-rot fungi is an ubiquitous group that have been developed a rich collection of extracellular </span></span><a class="topic-link" data-dcnode-id="3952" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.sciencedirect.com/topics/biochemistry-genetics-and-molecular-biology/oxidative-enzyme" title="Learn more about oxidative enzymes from ScienceDirect's AI-generated Topic Pages"><span data-dcnode-id="3953" instrument_node="">oxidative enzymes</span></a><span data-dcnode-id="3951" instrument_node=""> to degrade lignin and have been extensively studied (</span></span><a class="workspace-trigger" data-dcnode-id="3948" href="#b0070" name="bb0070"><span data-dcnode-id="3949" instrument_node="">de Gonzalo et al., 2016</span></a><span data-dcnode-id="3943"><span data-dcnode-id="3947" instrument_node="">). In consequence, the four fungi strains isolated were considered to be collaboratively employed in </span><a class="topic-link" data-dcnode-id="3945" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.sciencedirect.com/topics/biochemistry-genetics-and-molecular-biology/delignification" title="Learn more about delignification from ScienceDirect's AI-generated Topic Pages"><span data-dcnode-id="3946" instrument_node="">delignification</span></a><span data-dcnode-id="3944" instrument_node=""> with identified bacterial strains.</span></span></p><div class="tables frame-topbot rowsep-0 colsep-0" data-dcnode-id="3776" id="t0010"><span class="captions" data-dcnode-id="3932"><span data-dcnode-id="3933" id="cn0040"><p data-dcnode-id="3934" id="sp0060"><span class="label" data-dcnode-id="3940"><span data-dcnode-id="3941" instrument_node="">Table 2</span></span><span data-dcnode-id="3939" instrument_node="">. </span><span data-dcnode-id="3938" instrument_node="">The result of isolated strains from DM-1 with morphological features and stained results (B means bacteria; A means </span><a class="topic-link" data-dcnode-id="3936" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.sciencedirect.com/topics/biochemistry-genetics-and-molecular-biology/actinobacteria" title="Learn more about actinomycetes from ScienceDirect's AI-generated Topic Pages"><span data-dcnode-id="3937" instrument_node="">actinomycetes</span></a><span data-dcnode-id="3935" instrument_node="">; F means fungi).</span></p></span></span><div class="groups" data-dcnode-id="3777"><table data-dcnode-id="3778"><thead data-dcnode-id="3920"><tr class="rowsep-1 valign-top" data-dcnode-id="3921"><th class="align-left" data-dcnode-id="3930" scope="col"><span data-dcnode-id="3931" instrument_node="">Code</span></th><th class="align-left" data-dcnode-id="3928" scope="col"><span data-dcnode-id="3929" instrument_node="">Size</span></th><th class="align-left" data-dcnode-id="3926" scope="col"><span data-dcnode-id="3927" instrument_node="">Color</span></th><th class="align-left" data-dcnode-id="3924" scope="col"><span data-dcnode-id="3925" instrument_node="">Morphological feature</span></th><th class="align-left" data-dcnode-id="3922" scope="col"><span data-dcnode-id="3923" instrument_node="">Staining method and result</span></th></tr></thead><tbody data-dcnode-id="3779"><tr class="valign-top" data-dcnode-id="3907"><td class="align-left" data-dcnode-id="3918"><span data-dcnode-id="3919" instrument_node="">B1</span></td><td class="align-left" data-dcnode-id="3916"><span data-dcnode-id="3917" instrument_node="">Small</span></td><td class="align-left" data-dcnode-id="3914"><span data-dcnode-id="3915" instrument_node="">Light yellow</span></td><td class="align-left" data-dcnode-id="3912"><span data-dcnode-id="3913" instrument_node="">Regular circle with wet surface, smo
