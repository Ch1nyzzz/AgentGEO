the fundamental pillar in its desirable action in selective lignin degradation were sourced from an </span><a class="topic-link" data-dcnode-id="3772" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.sciencedirect.com/topics/earth-and-planetary-sciences/arboretum" title="Learn more about arboretum from ScienceDirect's AI-generated Topic Pages"><span data-dcnode-id="3773" instrument_node="">arboretum</span></a><span data-dcnode-id="3771" instrument_node="">, where the nature has been regarded as a reservoir of plentiful microbes that are capable in selective delignification. Thus, it could be infered that the microbial consortium DM-1, consists of these groups of fungi and bacteria interacted prominently, is capable in lignin degradation with a selective efficiency.</span></p></section><section data-dcnode-id="3651" id="s0135"><h4 class="u-margin-m-top u-margin-xs-bottom" data-dcnode-id="3765" id="st155"><span data-dcnode-id="3768" instrument_node="">4.4.2</span><span data-dcnode-id="3767" instrument_node="">. </span><span data-dcnode-id="3766" instrument_node="">Gene sequencing</span></h4><p data-dcnode-id="3728" id="p0275"><span data-dcnode-id="3760"><span data-dcnode-id="3764" instrument_node="">Identified with the </span><a class="topic-link" data-dcnode-id="3762" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.sciencedirect.com/topics/earth-and-planetary-sciences/polymerase-chain-reaction" title="Learn more about PCR from ScienceDirect's AI-generated Topic Pages"><span data-dcnode-id="3763" instrument_node="">PCR</span></a><span data-dcnode-id="3761" instrument_node=""> amplification (16S rDNA V3-V4 region) and gene sequencing, the component of microbial consortium DM-1 was predominant by bacterial groups, where </span></span><span data-dcnode-id="3756"><em data-dcnode-id="3757"><a class="topic-link" data-dcnode-id="3758" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.sciencedirect.com/topics/immunology-and-microbiology/proteobacteria" title="Learn more about Proteobacteria from ScienceDirect's AI-generated Topic Pages"><span data-dcnode-id="3759" instrument_node="">Proteobacteria</span></a></em></span><span data-dcnode-id="3755" instrument_node=""> acted as the majority while </span><em data-dcnode-id="3753"><span data-dcnode-id="3754" instrument_node="">Actinobacteria</span></em><span data-dcnode-id="3748"><span data-dcnode-id="3752" instrument_node=""> which were believed to be responsible for lignin degradation during </span><a class="topic-link" data-dcnode-id="3750" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.sciencedirect.com/topics/earth-and-planetary-sciences/agricultural-waste" title="Learn more about agricultural waste from ScienceDirect's AI-generated Topic Pages"><span data-dcnode-id="3751" instrument_node="">agricultural waste</span></a><span data-dcnode-id="3749" instrument_node=""> composting (</span></span><a class="workspace-trigger" data-dcnode-id="3746" href="#b0235" name="bb0235"><span data-dcnode-id="3747" instrument_node="">Yu et al., 2007</span></a><span data-dcnode-id="3745" instrument_node="">) played a minor role. Besides, the major strains pertained to the genus of </span><em data-dcnode-id="3743"><span data-dcnode-id="3744" instrument_node="">Stenotrophomonas</span></em><span data-dcnode-id="3742" instrument_node=""> that was reported as a starring in other microorganism acted as an interesting tool for the wood industry to treat leachate from the bark waste park in situ (</span><a class="workspace-trigger" data-dcnode-id="3740" href="#b0110" name="bb0110"><span data-dcnode-id="3741" instrument_node="">Lydna and Pierre, 2003</span></a><span data-dcnode-id="3735"><span data-dcnode-id="3739" instrument_node="">) as well as strains are able to degrade </span><a class="topic-link" data-dcnode-id="3737" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.sciencedirect.com/topics/engineering/kraft-lignin" title="Learn more about kraft lignin from ScienceDirect's AI-generated Topic Pages"><span data-dcnode-id="3738" instrument_node="">kraft lignin</span></a><span data-dcnode-id="3736" instrument_node=""> and lignin derivatives (</span></span><a class="workspace-trigger" data-dcnode-id="3733" href="#b0200" name="bb0200"><span data-dcnode-id="3734" instrument_node="">Tian et al., 2016</span></a><span data-dcnode-id="3732" instrument_node="">, </span><a class="workspace-trigger" data-dcnode-id="3730" href="#b0105" name="bb0105"><span data-dcnode-id="3731" instrument_node="">Liang et al., 2015</span></a><span data-dcnode-id="3729" instrument_node="">).</span></p><div data-dcnode-id="3652"><p data-dcnode-id="3680" id="p0280"><span data-dcnode-id="3727" instrument_node="">Furthermore, </span><span data-dcnode-id="3723"><em data-dcnode-id="3724"><a class="topic-link" data-dcnode-id="3725" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.sciencedirect.com/topics/biochemistry-genetics-and-molecular-biology/achromobacter" title="Learn more about Achromobacter from ScienceDirect's AI-generated Topic Pages"><span data-dcnode-id="3726" instrument_node="">Achromobacter</span></a></em></span><span data-dcnode-id="3722" instrument_node=""> and </span><span data-dcnode-id="3718"><em data-dcnode-id="3719"><a class="topic-link" data-dcnode-id="3720" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.sciencedirect.com/topics/biochemistry-genetics-and-molecular-biology/mesorhizobium" title="Learn more about Mesorhizobium from ScienceDirect's AI-generated Topic Pages"><span data-dcnode-id="3721" instrument_node="">Mesorhizobium</span></a></em></span><span data-dcnode-id="3717" instrument_node=""> served lignocellulose degradation but less competent (</span><a class="workspace-trigger" data-dcnode-id="3715" href="#b0200" name="bb0200"><span data-dcnode-id="3716" instrument_node="">Tian et al., 2016</span></a><span data-dcnode-id="3714" instrument_node="">, </span><a class="workspace-trigger" data-dcnode-id="3712" href="#b0205" name="bb0205"><span data-dcnode-id="3713" instrument_node="">Uroz et al., 2013</span></a><span data-dcnode-id="3711" instrument_node="">) whilst the genus of </span><span data-dcnode-id="3707"><em data-dcnode-id="3708"><a class="topic-link" data-dcnode-id="3709" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.sciencedirect.com/topics/agricultural-and-biological-sciences/cellulosimicrobium" title="Learn more about Cellulosimicrobium from ScienceDirect's AI-generated Topic Pages"><span data-dcnode-id="3710" instrument_node="">Cellulosimicrobium</span></a></em></span><span data-dcnode-id="3706" instrument_node=""> and </span><em data-dcnode-id="3704"><span data-dcnode-id="3705" instrument_node="">Pandoraea</span></em><span data-dcnode-id="3703" instrument_node=""> especially the latter that has both exhibited vigorous growth on lignin fractions and indicated a strong destruction in the lignin structure with a great potential in treatment of lignin-containing pollutants (</span><a class="workspace-trigger" data-dcnode-id="3701" href="#b0095" name="bb0095"><span data-dcnode-id="3702" instrument_node="">Kumar et al., 2015</span></a><span data-dcnode-id="3700" instrument_node="">, </span><a class="workspace-trigger" data-dcnode-id="3698" href="#b0255" name="bb0255"><span data-dcnode-id="3699" instrument_node="">Zheng et al., 2013</span></a><span data-dcnode-id="3697" instrument_node="">, </span><a class="workspace-trigger" data-dcnode-id="3695" href="#b0170" name="bb0170"><span data-dcnode-id="3696" instrument_node="">Shi et al., 2013</span></a><span data-dcnode-id="3694" instrument_node="">, </span><a class="workspace-trigger" data-dcnode-id="3692" href="#b9000" name="bb9000"><span data-dcnode-id="3693" instrument_node="">Bandounas et al., 2011</span></a><span data-dcnode-id="3691" instrument_node="">). Additionally, most species and their classification were listed in </span><a class="workspace-trigger" data-dcnode-id="3689" href="#f0030" name="bf0030"><span data-dcnode-id="3690" instrument_node="">Fig. 6</span></a><span data-dcnode-id="3684"><span data-dcnode-id="3688" instrument_node="">. In this work, fungi and bacteria that were functionally responsible comprised the groups of microbial consortia. As recognized, DM-1 was composed by a complex </span><a class="topic-link" data-dcnode-id="3686" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.sciencedirect.com/topics/earth-and-planetary-sciences/microbial-community" title="Learn more about microbial community from ScienceDirect's AI-generated Topic Pages"><span data-dcnode-id="3687" instrument_node="">microbial community</span></a><span data-dcnode-id="3685" instrument_node="">, among which actinomycetes were isolated by plates as the representative while </span></span><em data-dcnode-id="3682"><span data-dcnode-id="3683" instrument_node="">Stenotrophomonas</span></em><span data-dcnode-id="3681" instrument_node=""> were highlighted in the sequenced report by its leading role in selective lignin degradation with a high efficiency. Therefore, this group of microbial consortium could be practical in bio-delignification as a promising bio-pretreatment for tree trimmings.</span></p><figure class="figure text-xs" data-dcnode-id="3653" id="f0030"><span data-dcnode-id="3664"><img alt="" aria-describedby="cn0030" data-dcnode-id="3679" height="185" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//ars.els-cdn.com/content/image/1-s2.0-S0960852418300725-gr6.jpg&amp;raw"><span data-dcnode-id="3678" instrument_node=""></span><ol class="links-for-figure" data-dcnode-id="3665"><li data-dcnode-id="3672"><a class="anchor download-link u-font-sans" data-dcnode-id="3673" download="" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//ars.els-cdn.com/content/image/1-s2.0-S0960852418300725-gr6_lrg.jpg" target="_blank" title="Download high-res image (86KB)"><span class="anchor-text" data-dcnode-id="3674"><span data-dcnode-id="3677" instrument_node="">Download : </span><span class="download-link-title" data-dcnode-id="3675"><span data-dcnode-id="3676" instrument_node="">Download high-res image (86KB)</span></span></span></a></li><li data-dcnode-id="3666"><a class="anchor download-link u-font-sans" data-dcnode-id="3667" download="" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//ars.els-cdn.com/content/image/1-s2.0-S0960852418300725-gr6.jpg" target="_blank" title="Download full-size image"><span class="anchor-text" data-dcnode-id="3668"><span data-dcnode-id="3671" instrument_node="">Download : </span><span class="download-link-title" data-dcnode-id="3669"><span data-dcnode-id="3670" instrument_node="">Download full-size image</span></span></span></a></li></ol></span><span class="captions" data-dcnode-id="3654"><span data-dcnode-id="3655" id="cn0030"><p data-dcnode-id="3656" id="sp0045"><span class="label" data-dcnode-id="3662"><span data-dcnode-id="3663" instrument_node="">Fig. 6</span></span><span data-dcnode-id="3661" instrument_node="">. </span><span data-dcnode-id="3660" instrument_node="">The </span><a class="topic-link" data-dcnode-id="3658" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.sciencedirect.com/topics/earth-and-planetary-sciences/phylogenetics" title="Learn more about phylogenetic from ScienceDirect's AI-generated Topic Pages"><span data-dcnode-id="3659" instrument_node="">phylogenetic</span></a><span data-dcnode-id="3657" instrument_node=""> tree.</span></p></span></span></figure></div></section></section></section><section data-dcnode-id="3586" id="s0140"><h2 class="u-h3 u-margin-l-top u-margin-xs-bottom" data-dcnode-id="3645" id="st160"><span data-dcnode-id="3648" instrument_node="">5</span><span data-dcnode-id="3647" instrument_node="">. </span><span data-dcnode-id="3646" instrument_node="">Conclusions</span></h2><p data-dcnode-id="3587" id="p0285"><span data-dcnode-id="3640"><span data-dcnode-id="3644" instrument_node="">The </span><a class="topic-link" data-dcnode-id="3642" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.sciencedirect.com/topics/biochemistry-genetics-and-molecular-biology/microbial-consortium" title="Learn more about microbial consortium from ScienceDirect's AI-generated Topic Pages"><span data-dcnode-id="3643" instrument_node="">microbial consortium</span></a><span data-dcnode-id="3641" instrument_node=""> DM-1 is prone to adaptation in a new environment due to its rapid stabilization in culture, whose values of pH and OD</span></span><sub data-dcnode-id="3638"><span data-dcnode-id="3639" instrument_node="">600</span></sub><span data-dcnode-id="3621"><span data-dcnode-id="3633"><span data-dcnode-id="3637" instrument_node=""> stabilized between 7.5 and 8.0 and 0.6 to 0.8 respectively on the 7th day after </span><a class="topic-link" data-dcnode-id="3635" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.sciencedirect.com/topics/biochemistry-genetics-and-molecular-biology/inoculation" title="Learn more about inoculation from ScienceDirect's AI-generated Topic Pages"><span data-dcnode-id="3636" instrument_node="">inoculation</span></a><span data-dcnode-id="3634" instrument_node=""> in a natural scope. On the 16th day in culture, it reached a degradation percentage of 20.65% with a low </span></span><a class="topic-link" data-dcnode-id="3631" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.sciencedirect.com/topics/biochemistry-genetics-and-molecular-biology/cellulase" title="Learn more about cellulase from ScienceDirect's AI-generated Topic Pages"><span data-dcnode-id="3632" instrument_node="">cellulase</span></a><span data-dcnode-id="3622"><span data-dcnode-id="3626"><span data-dcnode-id="3630" instrument_node=""> activity of 11.954 U/mL while the ligninase activity attained 67.436 U/mL. Besides, with a </span><a class="topic-link" data-dcnode-id="3628" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.sciencedirect.com/topics/engineering/selectivity-value" title="Learn more about SV from ScienceDirect's AI-generated Topic Pages"><span data-dcnode-id="3629" instrument_node="">SV</span></a><span data-dcnode-id="3627" instrument_node=""> value up to 2.78, it was qualified for mighty selective lignin degradation. In the composition analysis, three strains of fungi, four strains of bacteria and five strains of </span></span><a class="topic-link" data-dcnode-id="3624" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.sciencedirect.com/topics/biochemistry-genetics-and-molecular-biology/actinomyces" title="Learn more about actinomyces from ScienceDirect's AI-generated Topic Pages"><span data-dcnode-id="3625" instrument_node="">actinomyces</span></a><span data-dcnode-id="3623" instrument_node=""> were obtained by plate isolation while five genera including </span></span></span><em data-dcnode-id="3619"><span data-dcnode-id="3620" instrument_node="">Stenotrophomones</span></em><span data-dcnode-id="3618" instrument_node=""> (92%), </span><span data-dcnode-id="3614"><em data-dcnode-id="3615"><a class="topic-link" data-dcnode-id="3616" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.sciencedirect.com/topics/biochemistry-genetics-and-molecular-biology/achromobacter" title="Learn more about Achromobacter from ScienceDirect's AI-generated Topic Pages"><span data-dcnode-id="3617" instrument_node="">Achromobacter</span></a></em></span><span data-dcnode-id="3613" instrument_node=""> (6%), </span><span data-dcnode-id="3609"><em data-dcnode-id="3610"><a class="topic-link" data-dcnode-id="3611" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.sciencedirect.com/topics/biochemistry-genetics-and-molecular-biology/mesorhizobium" title="Learn more about Mesorhizobium from ScienceDirect's AI-generated Topic Pages"><span data-dcnode-id="3612" instrument_node="">Mesorhizobium</span></a></em></span><span data-dcnode-id="3608" instrument_node=""> (1%), </span><span data-dcnode-id="3604"><em data-dcnode-id="3605"><a class="topic-link" data-dcnode-id="3606" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.sciencedirect.com/topics/biochemistry-genetics-and-molecular-biology/pandoraea" title="Learn more about Pandoraea from ScienceDirect's AI-generated Topic Pages"><span data-dcnode-id="3607" instrument_node="">Pandoraea</span></a></em></span><span data-dcnode-id="3603" instrument_node=""> (0.5%) and </span><span data-dcnode-id="3599"><em data-dcnode-id="3600"><a class="topic-link" data-dcnode-id="3601" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.sciencedirect.com/topics/agricultural-and-biological-sciences/cellulosimicrobium" title="Learn more about Cellulosimicrobium from ScienceDirect's AI-generated Topic Pages"><span data-dcnode-id="3602" instrument_node="">Cellulosimicrobium</span></a></em></span><span data-dcnode-id="3598" instrument_node=""> (less than 0.5%) were identified by sequencing, more specifically. The gratifying effectivity of </span><em data-dcnode-id="3596"><span data-dcnode-id="3597" instrument_node="">Stenotrophomones</span></em><span data-dcnode-id="3595" instrument_node=""> and </span><em data-dcnode-id="3593"><span data-dcnode-id="3594" instrument_node="">Pandorae</span></em><span data-dcnode-id="3588"><span data-dcnode-id="3592" instrument_node=""> in selective lignin degradation have been explicitly described. Thus, microbial consortium DM-1 could be employed in the biological </span><a class="topic-link" data-dcnode-id="3590" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.sciencedirect.com/topics/agricultural-and-biological-sciences/pretreatment" title="Learn more about pretreatment from ScienceDirect's AI-generated Topic Pages"><span data-dcnode-id="3591" instrument_node="">pretreatment</span></a><span data-dcnode-id="3589" instrument_node=""> that benefits paper industry and biofuel production from green waste as a renewable and clean source.</span></span></p></section></div><section data-dcnode-id="3574" id="ak005"><h2 class="u-h3 u-margin-l-top u-margin-xs-bottom" data-dcnode-id="3583" id="st170"><span data-dcnode-id="3584" instrument_node="">Acknowledgements</span></h2><p data-dcnode-id="3575" id="p0295"><span data-dcnode-id="3582" instrument_node="">This work was supported by the Science and Technology Project of Guangdong Province under Contract No. 2015A010106012 and 2016A020210085, respectively, and the </span><span data-dcnode-id="3580" id="gp005"><span data-dcnode-id="3581" instrument_node="">National Natural Science Foundation of China</span></span><span data-dcnode-id="3579" instrument_node=""> – China (No. </span><a data-dcnode-id="3577" href="#gp005"><span data-dcnode-id="3578" instrument_node="">51108195</span></a><span data-dcnode-id="3576" instrument_node="">).</span></p></section><div class="Appendices" data-dcnode-id="3482"><section data-dcnode-id="3483" id="s0155"><h2 class="u-h3 u-margin-l-top u-margin-xs-bottom" data-dcnode-id="3570" id="st180"><span data-dcnode-id="3573" instrument_node="">Appendix A</span><span data-dcnode-id="3572" instrument_node="">. </span><span data-dcnode-id="3571" instrument_node="">Supplementary data</span></h2><p data-dcnode-id="3484" id="p0305"><span class="display" data-dcnode-id="3553"><span class="e-component e-component-mmc1" data-dcnode-id="3554" id="m0005"><span class="article-attachment" data-dcnode-id="3561"><a class="icon-link" data-dcnode-id="3567" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//ars.els-cdn.com/content/image/1-s2.0-S0960852418300725- dex=cw22&amp;url=https%3A//www.sciencedirect.com/science/article/pii/S0959652621043456" target="_self"><h3 class="article-title ellipsis text-s" data-dcnode-id="370" id="citing-articles-article0-title"><span data-dcnode-id="371" instrument_node="">Emerging approaches in lignocellulosic biomass pretreatment and anaerobic bioprocesses for sustainable biofuels production</span></h3></a><div class="article-source ellipsis" data-dcnode-id="367"><span data-dcnode-id="368" instrument_node="">2022, Journal of Cleaner Production</span></div></div><div class="buttons" data-dcnode-id="360"><button aria-controls="citing-articles-article0" aria-describedby="citing-articles-article0-title" aria-expanded="false" class="button-link button-link-secondary list-item-details-toggle" data-aa-button="sd:product:journal:article:location=citing-articles:type=view-details" data-dcnode-id="361" type="button"><span class="button-link-text" data-dcnode-id="364"><span data-dcnode-id="365" instrument_node="">Show abstract</span></span><svg class="icon icon-navigate-down" data-dcnode-id="362" focusable="false" height="24" viewBox="0 0 92 128" width="17.25"><path d="m1 51l7-7 38 38 38-38 7 7-45 45z" data-dcnode-id="363"></path></svg></button></div><div aria-hidden="true" class="u-display-none" data-dcnode-id="352"><div class="abstract u-margin-m-ver u-margin-xs-right u-font-serif branded" data-dcnode-id="353" id="reference-abstract"><div class="u-margin-ver-m abstract-font" data-dcnode-id="354"><p data-dcnode-id="355" id="abspara0010"><span data-dcnode-id="359" instrument_node="">The development of advanced biofuels from waste organic matter, such as lignocellulosic biomass, is critical for global sustainable waste management and to delay climate change by reducing greenhouse gas emissions </span><em data-dcnode-id="357"><span data-dcnode-id="358" instrument_node="">via</span></em><span data-dcnode-id="356" instrument_node=""> partial replacement of fossil fuels. However, the inherent recalcitrance of lignocellulosic biomass due to the presence of inhibitory components, mainly lignin, limits the hydrolysis of its carbohydrate content, representing a key hurdle augmenting biofuel production. Therefore, pretreatment of lignocellulosic biomass is crucial to promote its fragmentation, increase its surface area and solubility, and lower the cellulose crystallinity and lignin content for sustainable biorefinery. Conventional pretreatment processes have several drawbacks, including high operational costs, corrosion of equipment, and generation of toxic effluents and by-products. To offset the negative impacts of these limitations on biofuel production, here, we have discussed and critically compared various eco-friendly approaches for the efficient conversion of biomass to ensure high yields of biofuels as a commercial solution. Moreover, a range of microbes and enzymes have been highlighted that effectively utilize lignocellulosic biomass to obtain energy and convert its complex polymeric structure into a biodegradable one, facilitating its subsequent valorization. Furthermore, the importance of multi-omics approaches was discussed to gain functional insights into the lignocellulolytic microbial communities and their interspecies symbiosis during the hydrolysis of organic biomass. Finally, the limitations of previous studies, challenges, industrial perspectives, and future outlooks for the development of economical, energy-saving, and eco-friendly strategies toward the sustainable valorization of lignocellulosic biomass were summarized.</span></p></div></div></div></li><li class="ListArticleItem" data-dcnode-id="324"><div class="sub-heading" data-dcnode-id="345"><a data-dcnode-id="348" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.sciencedirect.com/science/article/pii/S0960852421015108" target="_self"><h3 class="article-title ellipsis text-s" data-dcnode-id="349" id="citing-articles-article1-title"><span data-dcnode-id="350" instrument_node="">Construction of a fungal consortium for effective degradation of rice straw lignin and potential application in bio-pulping</span></h3></a><div class="article-source ellipsis" data-dcnode-id="346"><span data-dcnode-id="347" instrument_node="">2022, Bioresource Technology</span></div></div><div class="buttons" data-dcnode-id="339"><button aria-controls="citing-articles-article1" aria-describedby="citing-articles-article1-title" aria-expanded="false" class="button-link button-link-secondary list-item-details-toggle" data-aa-button="sd:product:journal:article:location=citing-articles:type=view-details" data-dcnode-id="340" type="button"><span class="button-link-text" data-dcnode-id="343"><span data-dcnode-id="344" instrument_node="">Show abstract</span></span><svg class="icon icon-navigate-down" data-dcnode-id="341" focusable="false" height="24" viewBox="0 0 92 128" width="17.25"><path d="m1 51l7-7 38 38 38-38 7 7-45 45z" data-dcnode-id="342"></path></svg></button></div><div aria-hidden="true" class="u-display-none" data-dcnode-id="325"><div class="abstract u-margin-m-ver u-margin-xs-right u-font-serif branded" data-dcnode-id="326" id="reference-abstract"><div class="u-margin-ver-m abstract-font" data-dcnode-id="327"><p data-dcnode-id="328" id="sp0015"><span data-dcnode-id="338" instrument_node="">To improve the lignin degradation efficiency, we established a co-culture consortium (LDFC) consisting of </span><em data-dcnode-id="336"><span data-dcnode-id="337" instrument_node="">Trametes hirsuta</span></em><span data-dcnode-id="335" instrument_node=""> BYL-3, </span><em data-dcnode-id="333"><span data-dcnode-id="334" instrument_node="">Trametes versicolor</span></em><span data-dcnode-id="332" instrument_node=""> BYL-7 and </span><em data-dcnode-id="330"><span data-dcnode-id="331" instrument_node="">Trametes hirsuta</span></em><span data-dcnode-id="329" instrument_node=""> BYL-8. The testing results showed that the constructed consortium showed improved the lignin degradation rate by fungi. The optimal cultivation conditions were mixture at 1:1:1&nbsp;vol ratio of each fungus, 7% (w/v) of inoculum amount, culture temperature at 26&nbsp;°C, pH was 6.9 and 10&nbsp;days of culturing time. Under these conditions, the degradation rate of lignin was 39.7%, which was 9.3% higher than those before optimization (30.4%). Using rice straw for treatment by LDFC to papermaking, the paper tensile strength was 8&nbsp;N, and the ring pressure index was 2.46&nbsp;N·m/g, which meets the standards for the production of corrugated paper for packaging. These results indicate that LDFC has potential application value to convert rice straw resources for bio-pulping to make papers.</span></p></div></div></div></li><li class="ListArticleItem" data-dcnode-id="306"><div class="sub-heading" data-dcnode-id="318"><a data-dcnode-id="321" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.sciencedirect.com/science/article/pii/S1364032121009394" target="_self"><h3 class="article-title ellipsis text-s" data-dcnode-id="322" id="citing-articles-article2-title"><span data-dcnode-id="323" instrument_node="">Enhanced bioremediation of pulp effluents through improved enzymatic treatment strategies: A greener approach</span></h3></a><div class="article-source ellipsis" data-dcnode-id="319"><span data-dcnode-id="320" instrument_node="">2021, Renewable and Sustainable Energy Reviews</span></div></div><div class="buttons" data-dcnode-id="312"><button aria-controls="citing-articles-article2" aria-describedby="citing-articles-article2-title" aria-expanded="false" class="button-link button-link-secondary list-item-details-toggle" data-aa-button="sd:product:journal:article:location=citing-articles:type=view-details" data-dcnode-id="313" type="button"><span class="button-link-text" data-dcnode-id="316"><span data-dcnode-id="317" instrument_node="">Show abstract</span></span><svg class="icon icon-navigate-down" data-dcnode-id="314" focusable="false" height="24" viewBox="0 0 92 128" width="17.25"><path d="m1 51l7-7 38 38 38-38 7 7-45 45z" data-dcnode-id="315"></path></svg></button></div><div aria-hidden="true" class="u-display-none" data-dcnode-id="307"><div class="abstract u-margin-m-ver u-margin-xs-right u-font-serif branded" data-dcnode-id="308" id="reference-abstract"><div class="u-margin-ver-m abstract-font" data-dcnode-id="309"><p data-dcnode-id="310" id="abspara0010"><span data-dcnode-id="311" instrument_node="">The massive load of effluents released from the pulp and paper industry has an adverse environmental impact due to the discharge of hazardous materials. These effluents contain mostly recalcitrant compounds like lignin, which are rigid and resilient to degradation. Bioremediation technologies such as biostimulation using nutrients and biological techniques are being used for the biodegradation of hazardous effluents. But they are not up to that level of remediation efficiency. Many enzymes have been used for bioremediation in recent years, which are easy to use, eco-friendly, and adequate to ensure the public safety. Such enzymes, along with their mechanisms, have been well studied for the bioremediation of effluents. This review describes enzyme technologies, including laccase mediated treatment, lignin peroxidase, and manganese peroxidase treatment to reduce effluent load into the environment. The other methods including aerobic and anaerobic treatments utilizing bio-sludge for producing beneficial products such as biofuels, and bio-sorbents for oil peeling are also described in the present review. This review also gives a summarized but unique description of the aspects of the immobilized biocatalysts and biosorbents used to mitigate the production of toxic pollutants from the pulp and paper industry. The strategies based on the advanced enzyme engineering technologies for bioremediation of such contaminants are also briefly described. This review also discusses the techno-economic assessment of enzymatic remediation and future challenges for the bioremediation of these effluents. In conclusion, enzyme-based advanced technologies are crucial ‘green technologies’ for providing a sustainable solution for bioremediation and reduced environmental pollution.</span></p></div></div></div></li><li class="ListArticleItem" data-dcnode-id="288"><div class="sub-heading" data-dcnode-id="300"><a data-dcnode-id="303" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.sciencedirect.com/science/article/pii/S1364032121006547" target="_self"><h3 class="article-title ellipsis text-s" data-dcnode-id="304" id="citing-articles-article3-title"><span data-dcnode-id="305" instrument_node="">Recent advancements in the ionic liquid mediated lignin valorization for the production of renewable materials and value-added chemicals</span></h3></a><div class="article-source ellipsis" data-dcnode-id="301"><span data-dcnode-id="302" instrument_node="">2021, Renewable and Sustainable Energy Reviews</span></div></div><div class="buttons" data-dcnode-id="294"><button aria-controls="citing-articles-article3" aria-describedby="citing-articles-article3-title" aria-expanded="false" class="button-link button-link-secondary list-item-details-toggle" data-aa-button="sd:product:journal:article:location=citing-articles:type=view-details" data-dcnode-id="295" type="button"><span class="button-link-text" data-dcnode-id="298"><span data-dcnode-id="299" instrument_node="">Show abstract</span></span><svg class="icon icon-navigate-down" data-dcnode-id="296" focusable="false" height="24" viewBox="0 0 92 128" width="17.25"><path d="m1 51l7-7 38 38 38-38 7 7-45 45z" data-dcnode-id="297"></path></svg></button></div><div aria-hidden="true" class="u-display-none" data-dcnode-id="289"><div class="abstract u-margin-m-ver u-margin-xs-right u-font-serif branded" data-dcnode-id="290" id="reference-abstract"><div class="u-margin-ver-m abstract-font" data-dcnode-id="291"><p data-dcnode-id="292" id="abspara0010"><span data-dcnode-id="293" instrument_node="">Lignin is the most abundant aromatic polymer available on earth and is a recalcitrant by-product in the lignocellulose biomass-based industry. In recent times even though about 1&nbsp;g of lignin is released per liter of bioethanol produced, the lignin valorization rates are relatively low and challenging, as it has an irregular complex structure and requires high-level conversion techniques. Most of the lignin conversion methods deliver toxic by-products or have a lower product yield due to mild lignin solubilization. Recently, Ionic liquids (ILs), which are greener and recyclable solvents, have attributed excellent solvation properties towards lignin, while simultaneously helping in its valorization. In this review, we have discussed the potential of ILs-mediated lignin valorization to produce different end commodities like hydrogels, flavours, and alkanes. This article emphasizes on the various ILs utilized, their effects on lignin, and the advanced strategies available for conversion. The valorization rate is improved by the addition of chemical or biological catalysts i.e., lignin-degrading enzymes (LDEs). Nevertheless, the biocatalyst is influenced in the system, so the effect of LDEs during ILs mediated lignin bioconversion and the available strategies to improve LDEs effectiveness have also been depicted. Also, the economic viability and the futuristic demands like developing innovative process design, engineering tolerant LDEs, and designing biocompatible ILs that will facilitate the commerciality of ILs-mediated lignin valorization have been discussed. Overall, a comprehensive insight has been established that highlights the technological advancements in the ILs-based valorization that can avail in the sustainable production of renewable commodities utilizing lignin in near future.</span></p></div></div></div></li><li class="ListArticleItem" data-dcnode-id="277"><div class="sub-heading" data-dcnode-id="282"><a data-dcnode-id="285" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.sciencedirect.com/science/article/pii/B9780323854023010019" target="_self"><h3 class="article-title ellipsis text-s" data-dcnode-id="286" id="citing-articles-article4-title"><span data-dcnode-id="287" instrument_node="">Agricultural Waste Diversity and Sustainability Issues: Sub-Saharan Africa as a Case Study</span></h3></a><div class="article-source ellipsis" data-dcnode-id="283"><span data-dcnode-id="284" instrument_node="">2021, Agricultural Waste Diversity and Sustainability Issues: Sub-Saharan Africa as a Case Study</span></div></div><div class="buttons" data-dcnode-id="281"></div><div aria-hidden="true" class="u-display-none" data-dcnode-id="278"><div class="abstract u-margin-m-ver u-margin-xs-right u-font-serif branded" data-dcnode-id="279" id="reference-abstract"><div class="u-margin-ver-m abstract-font" data-dcnode-id="280"></div></div></div></li><li class="ListArticleItem" data-dcnode-id="259"><div class="sub-heading" data-dcnode-id="271"><a data-dcnode-id="274" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.sciencedirect.com/science/article/pii/S0961953420303226" target="_self"><h3 class="article-title ellipsis text-s" data-dcnode-id="275" id="citing-articles-article5-title"><span data-dcnode-id="276" instrument_node="">Enhanced ethanol production from tree trimmings via microbial consortium pretreatment with selective degradation of lignin</span></h3></a><div class="article-source ellipsis" data-dcnode-id="272"><span data-dcnode-id="273" instrument_node="">2020, Biomass and Bioenergy</span></div></div><div class="buttons" data-dcnode-id="265"><button aria-controls="citing-articles-article5" aria-describedby="citing-articles-article5-title" aria-expanded="false" class="button-link button-link-secondary list-item-details-toggle" data-aa-button="sd:product:journal:article:location=citing-articles:type=view-details" data-dcnode-id="266" type="button"><span class="button-link-text" data-dcnode-id="269"><span data-dcnode-id="270" instrument_node="">Show abstract</span></span><svg class="icon icon-navigate-down" data-dcnode-id="267" focusable="false" height="24" viewBox="0 0 92 128" width="17.25"><path d="m1 51l7-7 38 38 38-38 7 7-45 45z" data-dcnode-id="268"></path></svg></button></div><div aria-hidden="true" class="u-display-none" data-dcnode-id="260"><div class="abstract u-margin-m-ver u-margin-xs-right u-font-serif branded" data-dcnode-id="261" id="reference-abstract"><div class="u-margin-ver-m abstract-font" data-dcnode-id="262"><p data-dcnode-id="263" id="abspara0010"><span data-dcnode-id="264" instrument_node="">The microbial consortia designedly screened in our lab were used for solid-state pretreatment of tree trimmings to degrade lignin selectively in this work, and the commercial fungal isolate pretreatment was taken in comparison. The results showed that a highly selective degradation of lignin was observed in the tree trimmings pretreated via the microbial consortium DM-1, in which 14.0% of lignin was decomposed and no significant degradation of cellulose was noted within 20 days. Meanwhile, in this trial, shorter fibers and a lower crude fiber crystallinity were found in the tree trimmings after pretreatment. And the pH values of the tree trimmings undergoing biopretreatment in each trial were all kept at around 7.0. In the SSF (simultaneous saccharification and fermentation) process, 20% increment of the ethanol yield was obtained in the trial loaded with DM-1 pretreated tree trimmings compared to the control, in which a higher acid-based buffering capability was also observed. The scanning electron microscope test revealed that after SSF, the DM-1 pretreated tree trimmings had less crude fibers and more void ratios. Herein, it was feasible to produce more ethanol from tree trimmings via solid-state pretreatment by using the microbial consortiu
