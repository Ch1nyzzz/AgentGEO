</span><meta content="<div class=&quot;Abstracts u-font-serif&quot; id=&quot;abstracts&quot;><div class=&quot;abstract author&quot; id=&quot;ab015&quot; lang=&quot;en&quot;><h2 class=&quot;section-title u-h3 u-margin-l-top u-margin-xs-bottom&quot;>Abstract</h2><div id=&quot;as015&quot;><p id=&quot;sp0015&quot;>To acquire microbial consortia with effectively precedent degradation of lignin, samples obtained from rotten trunks, rotten stumps and soil near it were screened and isolated after generations of subculture. The dynamic change illustrated that their community structures were affected by pH and tended to be stable after 6 days’ cultivation. The desired one, named DM-1, was gained through successive cultivation for over 5 generations, whose high selectivity in lignin degradation was observed within 16 days’ cultivation (SV = 2.78). Meanwhile, a remarkable reduction in the fiber crystallinity of tree trimmings (10.35%) resulted from the bio-degradation of DM-1, displayed a greater exposure of cellulose by selective removal of lignin. The diversity analysis of DM-1 was investigated by PCR amplification and 16S rDNA sequencing, indicated that <em>mesorhizobium, cellulosimicrobium, pandoraea, achromobacter</em> and <em>stenotrophomones</em> were the predominant genera. Furthermore, fungi (3 strains), bacteria (4 strains) and <em>actinomycetes</em> (5 strains) constituted 12 strains in total were gained by plate isolation from DM-1.</p></div></div></div>" data-dcnode-id="7782" lang="en" name="citation_abstract"><span data-dcnode-id="7781" instrument_node="">

g digital object identifier"><span data-dcnode-id="7131" instrument_node="">https://doi.org/10.1016/j.biortech.2018.01.058</span></a><a class="rights-and-content" data-dcnode-id="7128" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//s100.copyright.com/AppDispatchServlet%3FpublisherName%3DELS%26contentID%3DS0960852418300725%26orderBeanReset%3Dtrue" rel="noreferrer noopener" target="_blank"><span data-dcnode-id="7129" instrument_node="">Get rights and content</span></a></div><section class="ReferencedArticles" data-dcnode-id="7126"></section><section class="ReferencedArticles" data-dcnode-id="7125"></section><div class="PageDivider" data-dcnode-id="7124"></div><div class="Abstracts u-font-serif" data-dcnode-id="7046" id="abstracts"><div class="abstract author-highlights" data-dcnode-id="7085" id="ab010" lang="en"><h2 class="section-title u-h3 u-margin-l-top u-margin-xs-bottom" data-dcnode-id="7122"><span data-dcnode-id="7123" instrument_node="">Highlights</span></h2><div data-dcnode-id="7086" id="as010"><p data-dcnode-id="7087" id="sp0010"></p><dl class="list" data-dcnode-id="7088"><dt class="list-label" data-dcnode-id="7120"><span data-dcnode-id="7121" instrument_node="">•</span></dt><dd class="list-description" data-dcnode-id="7115"><p data-dcnode-id="7116" id="p0005"><a class="topic-link" data-dcnode-id="7118" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.sciencedirect.com/topics/biochemistry-genetics-and-molecular-biology/microbial-consortium" title="Learn more about Microbial consortia from ScienceDirect's AI-generated Topic Pages"><span data-dcnode-id="7119" instrument_node="">Microbial consortia</span></a><span data-dcnode-id="7117" instrument_node=""> were independently screened for selective lignin degradation.</span></p></dd><dt class="list-label" data-dcnode-id="7113"><span data-dcnode-id="7114" instrument_node="">•</span></dt><dd class="list-description" data-dcnode-id="7110"><p data-dcnode-id="7111" id="p0010"><span data-dcnode-id="7112" instrument_node="">Microbial consortia were ultimately stabilised in a pH range from 7.5 to 8.0 in culture.</span></p></dd><dt class="list-label" data-dcnode-id="7108"><span data-dcnode-id="7109" instrument_node="">•</span></dt><dd class="list-description" data-dcnode-id="7102"><p data-dcnode-id="7103" id="p0015"><span data-dcnode-id="7107" instrument_node="">Microbial consortium DM-1 degraded lignin of tree trimmings in 16 days with a high </span><a class="topic-link" data-dcnode-id="7105" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.sciencedirect.com/topics/engineering/selectivity-value" title="Learn more about SV from ScienceDirect's AI-generated Topic Pages"><span data-dcnode-id="7106" instrument_node="">SV</span></a><span data-dcnode-id="7104" instrument_node=""> of 2.78.</span></p></dd><dt class="list-label" data-dcnode-id="7100"><span data-dcnode-id="7101" instrument_node="">•</span></dt><dd class="list-description" data-dcnode-id="7094"><p data-dcnode-id="7095" id="p0020"><span data-dcnode-id="7099" instrument_node="">Three strains of fungi, four strains of bacteria and five strains of </span><a class="topic-link" data-dcnode-id="7097" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.sciencedirect.com/topics/biochemistry-genetics-and-molecular-biology/actinomyces" title="Learn more about actinomyces from ScienceDirect's AI-generated Topic Pages"><span data-dcnode-id="7098" instrument_node="">actinomyces</span></a><span data-dcnode-id="7096" instrument_node=""> were isolated from DM-1.</span></p></dd><dt class="list-label" data-dcnode-id="7092"><span data-dcnode-id="7093" instrument_node="">•</span></dt><dd class="list-description" data-dcnode-id="7089"><p data-dcnode-id="7090" id="p0025"><span data-dcnode-id="7091" instrument_node="">Five genera were identified after the 16S rDNA analysis of DM-1.</span></p></dd></dl><p></p></div></div><div class="abstract author" data-dcnode-id="7070" id="ab015" lang="en"><h2 class="section-title u-h3 u-margin-l-top u-margin-xs-bottom" data-dcnode-id="7083"><span data-dcnode-id="7084" instrument_node="">Abstract</span></h2><div data-dcnode-id="7071" id="as015"><p data-dcnode-id="7072" id="sp0015"><span data-dcnode-id="7082" instrument_node="">To acquire microbial consortia with effectively precedent degradation of lignin, samples obtained from rotten trunks, rotten stumps and soil near it were screened and isolated after generations of subculture. The dynamic change illustrated that their community structures were affected by pH and tended to be stable after 6 days’ cultivation. The desired one, named DM-1, was gained through successive cultivation for over 5 generations, whose high selectivity in lignin degradation was observed within 16 days’ cultivation (SV = 2.78). Meanwhile, a remarkable reduction in the fiber crystallinity of tree trimmings (10.35%) resulted from the bio-degradation of DM-1, displayed a greater exposure of cellulose by selective removal of lignin. The diversity analysis of DM-1 was investigated by PCR amplification and 16S rDNA sequencing, indicated that </span><em data-dcnode-id="7080"><span data-dcnode-id="7081" instrument_node="">mesorhizobium, cellulosimicrobium, pandoraea, achromobacter</span></em><span data-dcnode-id="7079" instrument_node=""> and </span><em data-dcnode-id="7077"><span data-dcnode-id="7078" instrument_node="">stenotrophomones</span></em><span data-dcnode-id="7076" instrument_node=""> were the predominant genera. Furthermore, fungi (3 strains), bacteria (4 strains) and </span><em data-dcnode-id="7074"><span data-dcnode-id="7075" instrument_node="">actinomycetes</span></em><span data-dcnode-id="7073" instrument_node=""> (5 strains) constituted 12 strains in total were gained by plate isolation from DM-1.</span></p></div></div><div class="abstract graphical" data-dcnode-id="7047" id="ab005" lang="en"><h2 class="section-title u-h3 u-margin-l-top u-margin-xs-bottom" data-dcnode-id="7068"><span data-dcnode-id="7069" instrument_node="">Graphical abstract</span></h2><div data-dcnode-id="7048" id="as005"><p data-dcnode-id="7049" id="sp0005"><span class="display" data-dcnode-id="7050"></span></p><figure class="figure text-xs" data-dcnode-id="7051" id="f0035"><span data-dcnode-id="7052"><img alt="" data-dcnode-id="7067" height="200" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//ars.els-cdn.com/content/image/1-s2.0-S0960852418300725-fx1.jpg&amp;raw"><span data-dcnode-id="7066" instrument_node=""></span><ol class="links-for-figure" data-dcnode-id="7053"><li data-dcnode-id="7060"><a class="anchor download-link u-font-sans" data-dcnode-id="7061" download="" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//ars.els-cdn.com/content/image/1-s2.0-S0960852418300725-fx1_lrg.jpg" target="_blank" title="Download high-res image (184KB)"><span class="anchor-text" data-dcnode-id="7062"><span data-dcnode-id="7065" instrument_node="">Download : </span><span class="download-link-title" data-dcnode-id="7063"><span data-dcnode-id="7064" instrument_node="">Download high-res image (184KB)</span></span></span></a></li><li data-dcnode-id="7054"><a class="anchor download-link u-font-sans" data-dcnode-id="7055" download="" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//ars.els-cdn.com/content/image/1-s2.0-S0960852418300725-fx1.jpg" target="_blank" title="Download full-size image"><span class="anchor-text" data-dcnode-id="7056"><span data-dcnode-id="7059" instrument_node="">Download : </span><span class="download-link-title" data-dcnode-id="7057"><span data-dcnode-id="7058" instrument_node="">Download full-size image</span></span></span></a></li></ol></span></figure><p></p></div></div></div><ul class="issue-navigation u-margin-s-bottom u-bg-grey1" data-dcnode-id="7023" id="issue-navigation"><li class="previous move-left u-padding-s-ver u-padding-
