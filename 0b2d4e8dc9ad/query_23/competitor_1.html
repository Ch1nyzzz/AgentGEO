                How NES Trims Trees
            </span></div><span data-dcnode-id="1080" instrument_node="">
</span><div class="field-promotext-2" data-dcnode-id="1075"><span data-dcnode-id="1079" instrument_node="">
</span><p data-dcnode-id="1077"><span data-dcnode-id="1078" instrument_node="">Our Tree Trimming program is an integral part of the power delivery system. We work diligently to manage vegetation growth along each circuit on our system every three to four years. This Planned Cycle Maintenance helps us minimize outages from vegetation growing into equipment or the potential risks for falling onto equipment. At the completion of the cycle, we begin again.</span></p><span data-dcnode-id="1076" instrument_node="">

</span><h4 class="blue" data-dcnode-id="1050"><span data-dcnode-id="1051" instrument_node="">NES follows the lateral pruning method developed by the International Society of Arboriculture (ISA) and approved by the National Arborist Association, the National Arbor Day Foundation and the Metro Tree Ordinance.</span></h4><span data-dcnode-id="1049" instrument_node="">
Lateral pruning leaves the overall structure of the tree stronger and more resistant to high winds and heavy ice while directing future growth away from NES equipment. NES does not promote “topping” or “rounding over” pruning malpractices. These are discouraged because they leave the tree weakened and susceptible to insects and disease.

</span><h4 class="blue" data-dcnode-id="1000"><span data-dcnode-id="1001" instrument_node="">Overhang Pruning</span></h4><span data-dcnode-id="999" instrument_node="">

</span><h3 class="blue" data-dcnode-id="758"><span data-dcnode-id="759" instrument_node="">We Want You to Be Informed</span></h3><span data-dcnode-id="757" instrument_node="">
As a public power provider, NES is not obligated to notify or seek approval from individual property owners to perform planned cycle maintenance. However, we want you to be informed so NES utilizes several avenues to communicate with property owners before work is done.
</span><p data-dcnode-id="755"><span data-dcnode-id="756" instrument_node="">We plan post card mail outs and Interactive Voice Recordings for all customers on a circuit. Field personnel are available to discuss, by phone or in person, work that is planned on your property. Door hangers are left if no one answers the door during our pre-planning or work completion. We also have a dedicated Tree Trimming Hotline number (615-695-7400) for all vegetation related questions.</span></p><span data-dcnode-id="754" instrument_node=""> </span></div><span data-dcnode-id="752" instrument_node="">

</span><div class="row" data-dcnode-id="696"><span data-dcnode-id="718" instrument_node="">
</span><div class="component rich-text col-12" data-dcnode-id="698" id="ce14300e-db11-43ed-85bc-87d5a9c43382"><span data-dcnode-id="717" instrument_node="">
</span><div class="component-content" data-dcnode-id="700"><span data-dcnode-id="716" instrument_node="">
</span><p data-dcnode-id="714"><span data-dcnode-id="715" instrument_node="">NES requires a safety maintenance zone around each pole which extends at least a ten-foot radius within which all vegetation will be removed.</span></p><span data-dcnode-id="713" instrument_node="">
</span><p data-dcnode-id="711"><span data-dcnode-id="712" instrument_node="">When power lines are located at the side or rear of a property that are not accessible from a paved or gravel surface NES requires that all vegetation within an area five to ten feet wide (depending on line construction) each side of the pole line be removed. For safety purposes this area must be maintained clear of trees or woody shrubs. Vegetation outside this area will be trimmed or removed selectively.</span></p><span data-dcnode-id="710" instrument_node="">
</span><p data-dcnode-id="708"><span data-dcnode-id="709" instrument_node="">NES will work with property owners to maintain proper clearances in landscaped areas but retains the right to remove non-compatible vegetation in landscaped areas.</span></p><span data-dcnode-id="707" instrument_node="">
</span><p data-dcnode-id="705"><span data-dcnode-id="706" instrument_node="">Vines growing on NES poles, guy wires, or other utility equipment are not acceptable and will be addressed but will not be pulled down.</span></p><span data-dcnode-id="704" instrument_node="">
</span><p data-dcnode-id="702"><span data-dcnode-id="703" instrument_node="">Pad Mount transformers have a sticker on the box depicting a six foot clearance for the front door and three foot clearance on each side.</span></p><span data-dcnode-id="701" instrument_node=""> </span></div><span data-dcnode-id="699" instrument_node="">

</span><div class="component-content" data-dcnode-id="671"><span data-dcnode-id="684" instrument_node="">
</span><h3 class="blue" data-dcnode-id="682"><span data-dcnode-id="683" instrument_node="">NES Tree Planting Program</span></h3><span data-dcnode-id="681" instrument_node="">
</span><p data-dcnode-id="679"><span data-dcnode-id="680" instrument_node="">Trees growing directly under or within fifteen feet of power lines are difficult to trim and retain its natural aesthetics. In these situations, it is often best to remove the tree. The site and scenario will be reviewed to determine inclusion in the tree planting program.</span></p><span data-dcnode-id="678" instrument_node="">
</span><p data-dcnode-id="676"><span data-dcnode-id="677" instrument_node="">NES uses this program to promote the “Right Tree in the Right Place” and to add beauty to our neighborhoods.</span></p><span data-dcnode-id="675" instrument_node="">
</span><p data-dcnode-id="673"><span data-dcnode-id="674" instrument_node="">Since our Tree Planting program began in 1989, NES has planted more than 65,000 trees and has contributed to many thousands more plantings in the greater Nashville area through our corporate partnerships and sponsorships.</span></p><span data-dcnode-id="672" instrument_node=""> </span></div><span data-dcnode-id="670" instrument_node="">
