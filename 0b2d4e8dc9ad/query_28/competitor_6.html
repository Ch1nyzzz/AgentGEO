</span><div class="entry entry-content-wrap" data-dcnode-id="951"><span data-dcnode-id="1239" instrument_node="">
</span><div class="entry-content" data-dcnode-id="953"><span data-dcnode-id="1238" instrument_node="">
</span><p data-dcnode-id="1235"><span data-dcnode-id="1236" style="font-weight: 400;"><span data-dcnode-id="1237" instrument_node="">Barberry is a defensive shrub of great ornamental quality, especially thanks to its flowering and decorative berries. One can prune in autumn approximately 1/4 of its height in order to support the bloom of spring.</span></span></p><span data-dcnode-id="1234" instrument_node="">
</span><p data-dcnode-id="1232"><span data-dcnode-id="1233" instrument_node="">&nbsp;</span></p><span data-dcnode-id="1231" instrument_node="">
</span><div class="ez-toc-v2_0_17 counter-hierarchy ez-toc-white" data-dcnode-id="1196" id="ez-toc-container"><span data-dcnode-id="1230" instrument_node="">
</span><div class="ez-toc-title-container" data-dcnode-id="1222"><span data-dcnode-id="1229" instrument_node="">
</span><p class="ez-toc-title" data-dcnode-id="1227"><span data-dcnode-id="1228" instrument_node="">Contents</span></p><span data-dcnode-id="1226" instrument_node="">

</span><nav data-dcnode-id="1197"><ul class="ez-toc-list ez-toc-list-level-1" data-dcnode-id="1198" style="display: none;"><li class="ez-toc-page-1 ez-toc-heading-level-2" data-dcnode-id="1218"><a class="ez-toc-link ez-toc-heading-1" data-dcnode-id="1219" href="#When_should_I_carve_my_barberry" title="When should I carve my barberry ?"><span data-dcnode-id="1220" instrument_node="">When should I carve my barberry ?</span></a></li><li class="ez-toc-page-1 ez-toc-heading-level-2" data-dcnode-id="1215"><a class="ez-toc-link ez-toc-heading-2" data-dcnode-id="1216" href="#Cultivation_and_maintenance_of_barberry" title="Cultivation and maintenance of barberry"><span data-dcnode-id="1217" instrument_node="">Cultivation and maintenance of barberry</span></a></li><li class="ez-toc-page-1 ez-toc-heading-level-2" data-dcnode-id="1208"><a class="ez-toc-link ez-toc-heading-3" data-dcnode-id="1213" href="#Plantation_of_barberry" title="Plantation of barberry"><span data-dcnode-id="1214" instrument_node="">Plantation of barberry</span></a><ul class="ez-toc-list-level-3" data-dcnode-id="1209"><li class="ez-toc-heading-level-3" data-dcnode-id="1210"><a class="ez-toc-link ez-toc-heading-4" data-dcnode-id="1211" href="#Barberry_in_pot" title="Barberry in pot :"><span data-dcnode-id="1212" instrument_node="">Barberry in pot :</span></a></li></ul></li><li class="ez-toc-page-1 ez-toc-heading-level-2" data-dcnode-id="1205"><a class="ez-toc-link ez-toc-heading-5" data-dcnode-id="1206" href="#Multiplication_of_barberry" title="Multiplication of barberry"><span data-dcnode-id="1207" instrument_node="">Multiplication of barberry</span></a></li><li class="ez-toc-page-1 ez-toc-heading-level-2" data-dcnode-id="1202"><a class="ez-toc-link ez-toc-heading-6" data-dcnode-id="1203" href="#Diseases_pests_and_parasites_of_barberry" title="Diseases, pests and parasites of barberry"><span data-dcnode-id="1204" instrument_node="">Diseases, pests and parasites of barberry</span></a></li><li class="ez-toc-page-1 ez-toc-heading-level-2" data-dcnode-id="1199"><a class="ez-toc-link ez-toc-heading-7" data-dcnode-id="1200" href="#Summary" title="Summary"><span data-dcnode-id="1201" instrument_node="">Summary</span></a></li></ul></nav></div><span data-dcnode-id="1195" instrument_node="">
</span><div class="code-block code-block-1" data-dcnode-id="1187" style="margin: 8px 0; clear: both;"><span data-dcnode-id="1194" instrument_node="">
</span><span data-dcnode-id="1192" instrument_node="">
</span><div data-dcnode-id="1190" id="ezoic-pub-ad-placeholder-138"><span data-dcnode-id="1191" instrument_node=""> </span></div><span data-dcnode-id="1189" instrument_node="">
</span></div><span data-dcnode-id="1186" instrument_node="">
</span><h2 data-dcnode-id="1181" id="when-should-i-carve-my-barberry"><span class="ez-toc-section" data-dcnode-id="1185" id="When_should_I_carve_my_barberry"></span><b data-dcnode-id="1183"><span data-dcnode-id="1184" instrument_node="">When should I carve my barberry ?</span></b><span class="ez-toc-section-end" data-dcnode-id="1182"></span></h2><span data-dcnode-id="1180" instrument_node="">
</span><p data-dcnode-id="1177"><span data-dcnode-id="1178" style="font-weight: 400;"><span data-dcnode-id="1179" instrument_node="">There are two periods to prune barberry, depending on whether their foliage is evergreen or not.</span></span></p><span data-dcnode-id="1176" instrument_node="">
</span><p data-dcnode-id="1174"><span data-dcnode-id="1175" instrument_node="">&nbsp;</span></p><span data-dcnode-id="1173" instrument_node="">
</span><p data-dcnode-id="1170"><span data-dcnode-id="1171" style="font-weight: 400;"><span data-dcnode-id="1172" instrument_node="">Prune your evergreen barberry in the autumn each year in hedges. You can keep them rounded in shape, the military cut does not suit them particularly well.</span></span></p><span data-dcnode-id="1169" instrument_node="">
</span><p data-dcnode-id="1167"><span data-dcnode-id="1168" instrument_node="">&nbsp;</span></p><span data-dcnode-id="1166" instrument_node="">
</span><p data-dcnode-id="1163"><span data-dcnode-id="1164" style="font-weight: 400;"><span data-dcnode-id="1165" instrument_node="">For the barberry persistent in hedges or isolated, prune after flowering, especially the ends of the stems, without excess.</span></span></p><span data-dcnode-id="1162" instrument_node="">
</span><p data-dcnode-id="1160"><span data-dcnode-id="1161" instrument_node="">&nbsp;</span></p><span data-dcnode-id="1159" instrument_node="">
</span><div class="code-block code-block-2" data-dcnode-id="1151" style="margin: 8px 0; clear: both;"><span data-dcnode-id="1158" instrument_node="">
</span><span data-dcnode-id="1156" instrument_node="">
</span><div data-dcnode-id="1154" id="ezoic-pub-ad-placeholder-139"><span data-dcnode-id="1155" instrument_node=""> </span></div><span data-dcnode-id="1153" instrument_node="">
</span></div><span data-dcnode-id="1150" instrument_node="">
</span><h2 data-dcnode-id="1145" id="cultivation-and-maintenance-of-barberry"><span class="ez-toc-section" data-dcnode-id="1149" id="Cultivation_and_maintenance_of_barberry"></span><b data-dcnode-id="1147"><span data-dcnode-id="1148" instrument_node="">Cultivation and maintenance of barberry</span></b><span class="ez-toc-section-end" data-dcnode-id="1146"></span></h2><span data-dcnode-id="1144" instrument_node="">
</span><p data-dcnode-id="1141"><span data-dcnode-id="1142" style="font-weight: 400;"><span data-dcnode-id="1143" instrument_node="">No specific maintenance is essential for the barberry, however certain gestures can contribute to maintaining it in good health:</span></span></p><span data-dcnode-id="1140" instrument_node="">
</span><ul data-dcnode-id="1112"><span data-dcnode-id="1139" instrument_node="">
</span><li data-dcnode-id="1136" style="font-weight: 400;"><span data-dcnode-id="1137" style="font-weight: 400;"><span data-dcnode-id="1138" instrument_node="">You can prune at will the barberry cultivated in hedges.</span></span></li><span data-dcnode-id="1135" instrument_node="">
</span><li data-dcnode-id="1132" style="font-weight: 400;"><span data-dcnode-id="1133" style="font-weight: 400;"><span data-dcnode-id="1134" instrument_node="">For the species with persistent foliage, a little more sensitive to the great cold, you can mulch the feet with dry leaves to protect them in winter.</span></span></li><span data-dcnode-id="1131" instrument_node="">
</span><li data-dcnode-id="1128" style="font-weight: 400;"><span data-dcnode-id="1129" style="font-weight: 400;"><span data-dcnode-id="1130" instrument_node="">You can also mulch the barberry’ feet in spring with an organic mulch to keep their roots cool in very dry soils. This will also save you from painful weeding due to the thorny branches.</span></span></li><span data-dcnode-id="1127" instrument_node="">
</span><li data-dcnode-id="1121" style="font-weight: 400;"><span data-dcnode-id="1122" style="font-weight: 400;"><span data-dcnode-id="1126" instrument_node="">Finally, if you find your barberry too weak, bring them some manure or decomposed compost or a </span><a data-dcnode-id="1124" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//green-shack.com/best-homemade-fertilizer-for-indoor-plants/" rel="noreferrer noopener" target="_blank"><span data-dcnode-id="1125" instrument_node="">complete fertilizer</span></a><span data-dcnode-id="1123" instrument_node=""> once a year, in the spring or fall. If they are well-developed, do not take them.</span></span></li><span data-dcnode-id="1120" instrument_node="">
</span><li data-dcnode-id="1114" style="font-weight: 400;"><span data-dcnode-id="1115" style="font-weight: 400;"><span data-dcnode-id="1119" instrument_node="">In case of drought, </span><a data-dcnode-id="1117" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//green-shack.com/how-to-keep-your-plants-watered-while-on-vacation/" rel="noreferrer noopener" target="_blank"><span data-dcnode-id="1118" instrument_node="">water your plants</span></a><span data-dcnode-id="1116" instrument_node=""> about every two weeks.</span></span></li><span data-dcnode-id="1113" instrument_node="">
</span></ul><span data-dcnode-id="1111" instrument_node="">
</span><p data-dcnode-id="1109"><span data-dcnode-id="1110" instrument_node="">&nbsp;</span></p><span data-dcnode-id="1108" instrument_node="">
</span><div class="code-block code-block-3" data-dcnode-id="1100" style="margin: 8px 0; clear: both;"><span data-dcnode-id="1107" instrument_node="">
</span><span data-dcnode-id="1105" instrument_node="">
</span><div data-dcnode-id="1103" id="ezoic-pub-ad-placeholder-140"><span data-dcnode-id="1104" instrument_node=""> </span></div><span data-dcnode-id="1102" instrument_node="">
</span></div><span data-dcnode-id="1099" instrument_node="">
</span><h2 data-dcnode-id="1094" id="plantation-of-barberry"><span class="ez-toc-section" data-dcnode-id="1098" id="Plantation_of_barberry"></span><b data-dcnode-id="1096"><span data-dcnode-id="1097" instrument_node="">Plantation of barberry</span></b><span class="ez-toc-section-end" data-dcnode-id="1095"></span></h2><span data-dcnode-id="1093" instrument_node="">
</span><p data-dcnode-id="1090"><span data-dcnode-id="1091" style="font-weight: 400;"><span data-dcnode-id="1092" instrument_node="">It is preferable to plant barberry in the fall to promote rooting and therefore a better recovery the following year.</span></span></p><span data-dcnode-id="1089" instrument_node="">
</span><p data-dcnode-id="1086"><span data-dcnode-id="1087" style="font-weight: 400;"><span data-dcnode-id="1088" instrument_node="">Planting is possible in the spring provided that you plan a more regular watering the first year after planting.</span></span></p><span data-dcnode-id="1085" instrument_node="">
</span><p data-dcnode-id="1082"><span data-dcnode-id="1083" style="font-weight: 400;"><span data-dcnode-id="1084" instrument_node="">In hedges, respect a minimum spacing of 1 m between each plant.</span></span></p><span data-dcnode-id="1081" instrument_node="">
</span><p data-dcnode-id="1079"><span data-dcnode-id="1080" instrument_node="">&nbsp;</span></p><span data-dcnode-id="1078" instrument_node="">
</span><p data-dcnode-id="1075"></p><figure class="pk-pin-it-container aligncenter" data-dcnode-id="1076" style="width: 314px;"><img alt="berberis2" class="size-medium wp-image-1929 pk-pin-it-ready" data-dcnode-id="1077" height="314" loading="lazy" sizes="(max-width: 314px) 100vw, 314px" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//green-shack.com/wp-content/uploads/2020/11/berberis2-314x314.png&amp;raw" srcset="https://green-shack.com/wp-content/uploads/2020/11/berberis2-314x314.png 314w, https://green-shack.com/wp-content/uploads/2020/11/berberis2-80x80.png 80w, https://green-shack.com/wp-content/uploads/2020/11/berberis2-110x110.png 110w, https://green-shack.com/wp-content/uploads/2020/11/berberis2-200x200.png 200w, https://green-shack.com/wp-content/uploads/2020/11/berberis2-380x380.png 380w, https://green-shack.com/wp-content/uploads/2020/11/berberis2-255x255.png 255w, https://green-shack.com/wp-content/uploads/2020/11/berberis2-300x300.png 300w, https://green-shack.com/wp-content/uploads/2020/11/berberis2-550x550.png 550w, https://green-shack.com/wp-content/uploads/2020/11/berberis2.png 628w" title="When And How To Cut Back Barberry Bushes ? 2" width="314"></figure><p></p><span data-dcnode-id="1074" instrument_node="">
</span><p data-dcnode-id="1072"><span data-dcnode-id="1073" instrument_node="">&nbsp;</span></p><span data-dcnode-id="1071" instrument_node="">
</span><h3 data-dcnode-id="1066" id="barberry-in-pot"><span class="ez-toc-section" data-dcnode-id="1070" id="Barberry_in_pot"></span><b data-dcnode-id="1068"><span data-dcnode-id="1069" instrument_node="">Barberry in pot :</span></b><span class="ez-toc-section-end" data-dcnode-id="1067"></span></h3><span data-dcnode-id="1065" instrument_node="">
</span><p data-dcnode-id="1062"><span data-dcnode-id="1063" style="font-weight: 400;"><span data-dcnode-id="1064" instrument_node="">There are dwarf species that are particularly suitable for pot cultivation.</span></span></p><span data-dcnode-id="1061" instrument_node="">
</span><p data-dcnode-id="1055"><span data-dcnode-id="1056" style="font-weight: 400;"><span data-dcnode-id="1060" instrument_node="">Avoid overly hot situations when </span><a data-dcnode-id="1058" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//green-shack.com/stop-plant-pots-blowing-over/" rel="noreferrer noopener" target="_blank"><span data-dcnode-id="1059" instrument_node="">planted in pots</span></a><span data-dcnode-id="1057" instrument_node="">.</span></span></p><span data-dcnode-id="1054" instrument_node="">
</span><p data-dcnode-id="1051"><span data-dcnode-id="1052" style="font-weight: 400;"><span data-dcnode-id="1053" instrument_node="">Water regularly, especially in the summer</span></span></p><span data-dcnode-id="1050" instrument_node="">
</span><p data-dcnode-id="1047"><span data-dcnode-id="1048" style="font-weight: 400;"><span data-dcnode-id="1049" instrument_node="">Mulch the soil to maintain moisture in the pot as evaporation is much faster.</span></span></p><span data-dcnode-id="1046" instrument_node="">
</span><p data-dcnode-id="1043"><span data-dcnode-id="1044" style="font-weight: 400;"><span data-dcnode-id="1045" instrument_node="">Shrub fertilizer once a year is necessary when growing in pots.</span></span></p><span data-dcnode-id="1042" instrument_node="">
</span><p data-dcnode-id="1040"><span data-dcnode-id="1041" instrument_node="">&nbsp;</span></p><span data-dcnode-id="1039" instrument_node="">
</span><div class="code-block code-block-4" data-dcnode-id="1031" style="margin: 8px 0; clear: both;"><span data-dcnode-id="1038" instrument_node="">
</span><span data-dcnode-id="1036" instrument_node="">
</span><div data-dcnode-id="1034" id="ezoic-pub-ad-placeholder-141"><span data-dcnode-id="1035" instrument_node=""> </span></div><span data-dcnode-id="1033" instrument_node="">
</span></div><span data-dcnode-id="1030" instrument_node="">
</span><h2 data-dcnode-id="1025" id="multiplication-of-barberry"><span class="ez-toc-section" data-dcnode-id="1029" id="Multiplication_of_barberry"></span><b data-dcnode-id="1027"><span data-dcnode-id="1028" instrument_node="">Multiplication of barberry</span></b><span class="ez-toc-section-end" data-dcnode-id="1026"></span></h2><span data-dcnode-id="1024" instrument_node="">
</span><p data-dcnode-id="1021"><span data-dcnode-id="1022" style="font-weight: 400;"><span data-dcnode-id="1023" instrument_node="">You can easily multiply barberry by sowing in March or for some by layering and cutting.</span></span></p><span data-dcnode-id="1020" instrument_node="">
</span><p data-dcnode-id="1017"><span data-dcnode-id="1018" style="font-weight: 400;"><span data-dcnode-id="1019" instrument_node="">You can cut the evergreen and deciduous species in August-September with heel cuttings taken from semi-August branches. Deciduous species can also be cut at the end of spring with cuttings taken from young herbaceous shoots.</span></span></p><span data-dcnode-id="1016" instrument_node="">
</span><ul data-dcnode-id="1006"><span data-dcnode-id="1015" instrument_node="">
</span><li data-dcnode-id="1012" style="font-weight: 400;"><span data-dcnode-id="1013" style="font-weight: 400;"><span data-dcnode-id="1014" instrument_node="">Place the semi-arched cuttings in a nursery, the herbaceous ones in a bucket, in a mixture of soil and sand.</span></span></li><span data-dcnode-id="1011" instrument_node="">
</span><li data-dcnode-id="1008" style="font-weight: 400;"><span data-dcnode-id="1009" style="font-weight: 400;"><span data-dcnode-id="1010" instrument_node="">Transplant the potted cuttings the following spring in a similar substrate with added soil, and place them in their final position in the fall.</span></span></li><span data-dcnode-id="1007" instrument_node="">
</span></ul><span data-dcnode-id="1005" instrument_node="">
</span><p data-dcnode-id="1003"><span data-dcnode-id="1004" instrument_node="">&nbsp;</span></p><span data-dcnode-id="1002" instrument_node="">
</span><div class="code-block code-block-5" data-dcnode-id="994" style="margin: 8px 0; clear: both;"><span data-dcnode-id="1001" instrument_node="">
</span><span data-dcnode-id="999" instrument_node="">
</span><div data-dcnode-id="997" id="ezoic-pub-ad-placeholder-117"><span data-dcnode-id="998" instrument_node=""> </span></div><span data-dcnode-id="996" instrument_node="">
</span></div><span data-dcnode-id="993" instrument_node="">
</span><h2 data-dcnode-id="988" id="diseases-pests-and-parasites-of-barberry"><span class="ez-toc-section" data-dcnode-id="992" id="Diseases_pests_and_parasites_of_barberry"></span><b data-dcnode-id="990"><span data-dcnode-id="991" instrument_node="">Diseases, pests and parasites of barberry</span></b><span class="ez-toc-section-end" data-dcnode-id="989"></span></h2><span data-dcnode-id="987" instrument_node="">
</span><p data-dcnode-id="984"><span data-dcnode-id="985" style="font-weight: 400;"><span data-dcnode-id="986" instrument_node="">Barberry is resistant to pollution and most diseases and pests if they are properly settled in not too wet soil with well-drained soil.</span></span></p><span data-dcnode-id="983" instrument_node="">
</span><p data-dcnode-id="980"><span data-dcnode-id="981" style="font-weight: 400;"><span data-dcnode-id="982" instrument_node="">However, aphids may attack them in the spring. Treat any significant development without delay with simple, non-toxic solutions.</span></span></p><span data-dcnode-id="979" instrument_node="">
</span><p data-dcnode-id="977"><span data-dcnode-id="978" instrument_node="">&nbsp;</span></p><span data-dcnode-id="976" instrument_node="">
</span><p data-dcnode-id="973"><span data-dcnode-id="974" style="font-weight: 400;"><span data-dcnode-id="975" instrument_node="">Also, you may sometimes see some traces of powdery mildew or rust in the summer. Make sure your soil is well-drained and avoid watering the foliage. Horsetail liquid manure can be used against rust.</span></span></p><span data-dcnode-id="972" instrument_node="">
</span><p data-dcnode-id="970"><span data-dcnode-id="971" instrument_node="">&nbsp;</span></p><span data-dcnode-id="969" instrument_node="">
</span><h2 data-dcnode-id="964" id="summary"><span class="ez-toc-section" data-dcnode-id="968" id="Summary"></span><b data-dcnode-id="966"><span data-dcnode-id="967" instrument_node="">Summary</span></b><span class="ez-toc-section-end" data-dcnode-id="965"></span></h2><span data-dcnode-id="963" instrument_node="">
</span><p data-dcnode-id="960"><span data-dcnode-id="961" style="font-weight: 400;"><span data-dcnode-id="962" instrument_node="">Barberry is often used to compose defensive hedges. But do not hesitate to install these shrubs so diverse in the massifs or even in rocks. You can grow the dwarf or slow-growing varieties of containers, or isolate a subject on the lawn. It is advisable to prune them in the autumn, at about ¼ of their height, in this way, the flowering will be favoured in spring.</span></span></p><span data-dcnode-id="959" instrument_node="">
</span><p data-dcnode-id="957"><span data-dcnode-id="958" instrument_node="">&nbsp;</span></p><span data-dcnode-id="956" instrument_node="">
