.jpg?v=1635967200 1296w 864h, //cdn.shopify.com/s/files/1/0158/9452/articles/Winterize_Blog_1512x.jpg?v=1635967200 1512w 1008h, //cdn.shopify.com/s/files/1/0158/9452/articles/Winterize_Blog_1728x.jpg?v=1635967200 1728w 1152h, //cdn.shopify.com/s/files/1/0158/9452/articles/Winterize_Blog.jpg?v=1635967200 1800w 1200h"><img alt="" class="lazyautosizes lazyloaded" data-dcnode-id="1150" data-parent-fit="cover" data-sizes="auto" sizes="1024px"></picture></div><span data-dcnode-id="1147" instrument_node="">

</span><h1 class="majortitle" data-dcnode-id="1139"><span data-dcnode-id="1140" instrument_node="">How To Winterize Trees &amp; Shrubs</span></h1><span data-dcnode-id="1138" instrument_node="">
</span></div><span data-dcnode-id="1136" instrument_node="">
</span></div><span data-dcnode-id="1133" instrument_node="">
</span><div class="article" data-dcnode-id="736"><span data-dcnode-id="1132" instrument_node="">
</span><div class="container" data-dcnode-id="739"><span data-dcnode-id="1131" instrument_node="">
</span><div class="rte cf spaced-row cc-animate-init -in cc-animate-complete" data-cc-animate="" data-dcnode-id="891"><span data-dcnode-id="1130" instrument_node="">
</span><p data-dcnode-id="1127"><img alt="" data-dcnode-id="1129" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//cdn.shopify.com/s/files/1/0158/9452/files/Four_Seasons_Tree_9b204b7e-75e9-4b38-bace-6718f9b24a27.jpg%3Fv%3D1535566664&amp;raw" style="display: block; margin-left: auto; margin-right: auto;"><span data-dcnode-id="1128" instrument_node="">Plants and trees experience life cycles through seasons unlike human beings, whose life cycles occur every day. We require a certain amount of nutrients, water, and rest each day. The amount and quality of our rest helps to determine how healthy and productive we are. The same can be said for plants. Most trees “sleep” each winter (called their dormancy period).&nbsp;The amount and quality of their rest also determines their health and productivity!</span></p><span data-dcnode-id="1126" instrument_node="">
</span><p data-dcnode-id="1124"><span data-dcnode-id="1125" instrument_node="">Let’s discuss preparation&nbsp;for winter, the challenges you may face, and making this dormancy period the best it can be for your plants and trees.</span></p><span data-dcnode-id="1123" instrument_node="">
</span><h3 data-dcnode-id="1121"><span data-dcnode-id="1122" instrument_node="">Winter Challenges</span></h3><span data-dcnode-id="1120" instrument_node="">
</span><p data-dcnode-id="1118"><span data-dcnode-id="1119" instrument_node="">Extreme cold isn't the only challenge faced by woody plants; in fact, plants hardy to your region should endure normal winter temperatures just fine. However, winter can wreak havoc in other ways.</span></p><span data-dcnode-id="1117" instrument_node="">
</span><ul data-dcnode-id="1094"><span data-dcnode-id="1116" instrument_node="">
</span><li data-dcnode-id="1114"><span data-dcnode-id="1115" instrument_node="">Early cold spells can damage plant tissues that haven't had a chance to harden off for the winter.</span></li><span data-dcnode-id="1113" instrument_node="">
</span><li data-dcnode-id="1111"><span data-dcnode-id="1112" instrument_node="">Dry winds and winter sun can dry out or "burn" conifer needles and broadleaf evergreen foliage, which continue to transpire (give off water vapor) during winter.</span></li><span data-dcnode-id="1110" instrument_node="">
</span><li data-dcnode-id="1108"><span data-dcnode-id="1109" instrument_node="">Frozen soil means plants can't take up water to replace the moisture lost from evaporation and transpiration.</span></li><span data-dcnode-id="1107" instrument_node="">
</span><li data-dcnode-id="1105"><span data-dcnode-id="1106" instrument_node="">Midwinter thaws can "fool" plants into breaking dormancy too early, and the tender new growth may be killed by the next cold snap.</span></li><span data-dcnode-id="1104" instrument_node="">
</span><li data-dcnode-id="1102"><span data-dcnode-id="1103" instrument_node="">Alternating freeze/thaw cycles can heave new plants out of the ground, leaving roots exposed to drying wind and sun.</span></li><span data-dcnode-id="1101" instrument_node="">
</span><li data-dcnode-id="1099"><span data-dcnode-id="1100" instrument_node="">Bright winter sun heats up dark tree bark, which can freeze and crack when temperatures drop quickly at sunset.</span></li><span data-dcnode-id="1098" instrument_node="">
</span><li data-dcnode-id="1096"><span data-dcnode-id="1097" instrument_node="">Deer, mice, rabbits and other animals gnaw bark and browse leaves and twigs when other food becomes scarce during long, cold winters.</span></li><span data-dcnode-id="1095" instrument_node="">
</span></ul><span data-dcnode-id="1093" instrument_node="">
</span><p data-dcnode-id="1091"><span data-dcnode-id="1092" instrument_node="">Although wet, heavy snow can damage branches, snow cover is usually good for plants. A layer of snow provides moisture and helps insulate the soil and roots from fluctuating temperatures.</span></p><span data-dcnode-id="1090" instrument_node="">
</span><h3 data-dcnode-id="1088"><span data-dcnode-id="1089" instrument_node="">Preparing for the Big Chill</span></h3><span data-dcnode-id="1087" instrument_node="">
</span><p data-dcnode-id="1085"><span data-dcnode-id="1086" instrument_node="">Healthy plants are more likely to get through winter unscathed. A plant that has struggled during the growing season, whether due to insufficient sunlight, water or nutrients, or heavy damage from insects or disease, will enter winter in a vulnerable state. Start your winter-protection strategy with careful care during the growing season and into autumn.</span></p><span data-dcnode-id="1084" instrument_node="">
</span><ul data-dcnode-id="1073"><span data-dcnode-id="1083" instrument_node="">
</span><li data-dcnode-id="1081"><span data-dcnode-id="1082" instrument_node="">Don't prune after midsummer. Pruning stimulates tender, new growth and delays dormancy.</span></li><span data-dcnode-id="1080" instrument_node="">
</span><li data-dcnode-id="1078"><span data-dcnode-id="1079" instrument_node="">Stop fertilizing plants six weeks before the first fall frost, to help plants harden off properly.</span></li><span data-dcnode-id="1077" instrument_node="">
</span><li data-dcnode-id="1075"><span data-dcnode-id="1076" instrument_node="">Water plants thoroughly throughout fall until the ground freezes; make sure the water penetrates 12" to 18" deep to reach the root zone.&nbsp;Young or newly planted trees will require more attention because of limited abilities in obtaining water in their growing environment. The key to survival is giving trees adequate moisture before winter freezes the world around them.&nbsp;</span></li><span data-dcnode-id="1074" instrument_node="">
</span></ul><span data-dcnode-id="1072" instrument_node="">
</span><h3 data-dcnode-id="1070"><span data-dcnode-id="1071" instrument_node="">Outdoor Plants and Trees</span></h3><span data-dcnode-id="1069" instrument_node="">
</span><p data-dcnode-id="1064"><strong data-dcnode-id="1067"><span data-dcnode-id="1068" instrument_node="">Insulation</span></strong><br data-dcnode-id="1066"><span data-dcnode-id="1065" instrument_node="">It is important to protect the root systems of young plants and trees. This can easily be achieved by applying a layer of mulch on top of the soil around the root system. Mulch, which can be comprised of natural things like wood chips, leaf/yard compost, sawdust, or straw, acts as an insulator that protects the roots when the temperature drops in late fall/winter/early spring. Mulch also acts as a weed deterrent and helps retain moisture during the growing season. Laying down a weed-mat barrier and covering the barrier with mulch is a simple means to avoid a number of problems at the root level all year long.</span></p><span data-dcnode-id="1063" instrument_node="">
</span><p data-dcnode-id="1061"><img alt="" data-dcnode-id="1062" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//cdn.shopify.com/s/files/1/0158/9452/files/mulching_tree_large.jpg%3Fv%3D1535572125&amp;raw" style="display: block; margin-left: auto; margin-right: auto;"></p><span data-dcnode-id="1060" instrument_node="">
</span><p data-dcnode-id="1058"><span data-dcnode-id="1059" instrument_node="">&nbsp;</span></p><span data-dcnode-id="1057" instrument_node="">
</span><p data-dcnode-id="1049"><strong data-dcnode-id="1055"><span data-dcnode-id="1056" instrument_node="">Tree Wraps</span></strong><br data-dcnode-id="1054"><span data-dcnode-id="1053" instrument_node="">As summer ends, the grass and ground-covers toughen, moving rabbits to chew on tree bark. This destructive threat increases with cold weather and snow cover.&nbsp;On the farm, outbuildings, clutter and ground-cover provide adequate cover to house this animal. In urban settings, landscaping, hedges, and ground-cover provide the same housing and can be even worse than the rural setting.&nbsp;It’s heartbreaking to grow and nurture plants and trees along, only to wake one morning to find them girdled to death or impaired for life by hungry critters. Rabbits can chew trees way up into their fifth and sixth season. Simple and inexpensive solutions that can be applied in mere seconds are</span><span data-dcnode-id="1051"><span data-dcnode-id="1052" instrument_node="">&nbsp;</span></span><span data-dcnode-id="1050" instrument_node="">tree wraps.</span></p><span data-dcnode-id="1048" instrument_node="">
</span><p data-dcnode-id="1046"><span data-dcnode-id="1047" instrument_node="">These wraps also protect the trunk against&nbsp;sun scald and frost cracks due to the temperature fluctuations from sun exposure in the winter. Most winter damage to the tree’s trunk is from getting warmed up on sunny winter days&nbsp;and then chilled quickly at nightfall.&nbsp;The trunk often doesn’t adjust to the sudden temperature drop. The wounds caused by temperature fluctuations can leave the tree exposed to fungal organisms, which cause decay in the tree. Prevention includes guarding the trunks of younger and smooth-bark trees up to about the first branches using a flexible, tree wrap. Leave the wrap on until after the last freezing temperatures. Remove tree guards in the spring to reduce potential damage from disease and insects.&nbsp;</span></p><span data-dcnode-id="1045" instrument_node="">
</span><span data-dcnode-id="1044" instrument_node="">
</span><span data-dcnode-id="1043" instrument_node="">
</span><span data-dcnode-id="1042" instrument_node="">
</span><span data-dcnode-id="1039" instrument_node="">
</span><span data-dcnode-id="1036" instrument_node="">
</span><span data-dcnode-id="1033" instrument_node="">
</span><span data-dcnode-id="1031" instrument_node="">
</span><span data-dcnode-id="1030" instrument_node="">
</span><span data-dcnode-id="1026" instrument_node="">
</span><span data-dcnode-id="1019" instrument_node="">
</span><span data-dcnode-id="1015" instrument_node="">
</span><span data-dcnode-id="1013" instrument_node="">
</span><span data-dcnode-id="1011" instrument_node="">
</span><table data-dcnode-id="1010" width="100%"><tbody data-dcnode-id="1012"><tr data-dcnode-id="1032"><td data-dcnode-id="1040" width="33.33%"><img alt="" data-dcnode-id="1041" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//cdn.shopify.com/s/files/1/0158/9452/files/Tree_Crack_2.jpg%3Fv%3D1535574405&amp;raw"></td><td data-dcnode-id="1037" width="33.33%"><img alt="" data-dcnode-id="1038" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//cdn.shopify.com/s/files/1/0158/9452/files/Tree_Wrap_2.jpg%3Fv%3D1535573648&amp;raw" style="display: block; margin-left: auto; margin-right: auto;"></td><td data-dcnode-id="1034" width="33.33%"><img alt="" data-dcnode-id="1035" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//cdn.shopify.com/s/files/1/0158/9452/files/Tree_Wrap_1.jpg%3Fv%3D1535573639&amp;raw" style="display: block; margin-left: auto; margin-right: auto;"></td></tr><tr data-dcnode-id="1014"><td data-dcnode-id="1027" style="text-align: center;"><em data-dcnode-id="1028"><span data-dcnode-id="1029" instrument_node="">Cracking can occur on smooth-bark trees during the winter months. </span></em></td><td data-dcnode-id="1020" style="text-align: center;"><span data-dcnode-id="1025" instrument_node="">
</span><p data-dcnode-id="1022"><em data-dcnode-id="1023"><span data-dcnode-id="1024" instrument_node="">Protect fruit and shade trees against sun scald, moisture loss and insect damage.</span></em></p><span data-dcnode-id="1021" instrument_node="">
</span></td><td data-dcnode-id="1016" style="text-align: center;"><em data-dcnode-id="1017"><span data-dcnode-id="1018" instrument_node="">This tree wrap is flexible and white to protect trees with smooth bark from injury.</span></em></td></tr></tbody></table><span data-dcnode-id="1009" instrument_node="">
</span><p data-dcnode-id="1007"><span data-dcnode-id="1008" instrument_node="">&nbsp;</span></p><span data-dcnode-id="1006" instrument_node="">
</span><p data-dcnode-id="1001"><strong data-dcnode-id="1004"><span data-dcnode-id="1005" instrument_node="">Winter-Burn Prevention</span></strong><br data-dcnode-id="1003"><span data-dcnode-id="1002" instrument_node=""> Winter burn is a common occurrence to evergreens, including boxwood, holly, rhododendron, and most conifer species. Winter burn symptoms often develop when temperatures warm-up in late winter and early spring, and is often misdiagnosed as an infectious disease or damage from excessively cold temperatures. Winter burn is caused from desiccation, which is a type of dehydration injury. Dehydration and winter burn results when roots are unable to obtain water lost through transpiration. Water loss through transpiration is normally low during winter months, but it increases when plants are subjected to drying winds or are growing in warm sunny spots. Several techniques to minimize or prevent winter burn can be implemented, with varying degrees of success:</span></p><span data-dcnode-id="1000" instrument_node="">
</span><ul data-dcnode-id="980"><span data-dcnode-id="999" instrument_node="">
</span><li data-dcnode-id="997"><span data-dcnode-id="998" instrument_node="">Carefully choose planting materials, avoiding trees and shrubs that are known to suffer from winter burn (including Alberta spruce, English holly and Colorado blue spruce),</span></li><span data-dcnode-id="996" instrument_node="">
</span><li data-dcnode-id="994"><span data-dcnode-id="995" instrument_node="">Avoid planting broadleaved evergreens like rhododendron in areas of high wind exposure,</span></li><span data-dcnode-id="993" instrument_node="">
</span><li data-dcnode-id="991"><span data-dcnode-id="992" instrument_node="">Deep water plants before ground freeze, and continue to water during winter months when temperatures remain above freezing but without precipitation,</span></li><span data-dcnode-id="990" instrument_node="">
</span><li data-dcnode-id="988"><span data-dcnode-id="989" instrument_node="">Erect physical windbreaks.</span></li><span data-dcnode-id="987" instrument_node="">
</span><li data-dcnode-id="985"><span data-dcnode-id="986" instrument_node="">Wrap problem plants with burlap or other material to protect from wind and subsequent moisture loss to evergreen shrubs and small trees.</span></li><span data-dcnode-id="984" instrument_node="">
</span><li data-dcnode-id="982"><span data-dcnode-id="983" instrument_node="">Various types of antitranspirants such as Wilt-Pruf are available, but have shown limited success. These are very short-lived and must be reapplied every 2 to 3 weeks to remain effective.</span></li><span data-dcnode-id="981" instrument_node="">
</span></ul><span data-dcnode-id="979" instrument_node="">
</span><div data-dcnode-id="977" style="text-align: center;"><img alt="Image" data-dcnode-id="978" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//pics.davesgarden.com/pics/2012/10/08/paulgrow/f9baf5.jpg&amp;raw" style="float: none;"></div><span data-dcnode-id="976" instrument_node="">
</span><blockquote data-dcnode-id="971" style="text-align: center;"><span data-dcnode-id="975" instrument_node="">
</span><div data-dcnode-id="973" style="text-align: center;"><span data-dcnode-id="974" instrument_node="">A&nbsp;burlap screen can prevent wind damage.</span></div><span data-dcnode-id="972" instrument_node="">
</span></blockquote><span data-dcnode-id="970" instrument_node="">
</span><h3 data-dcnode-id="969"></h3><span data-dcnode-id="968" instrument_node="">
</span><h3 data-dcnode-id="966"><span data-dcnode-id="967" instrument_node="">Container Plants and Trees</span></h3><span data-dcnode-id="965" instrument_node="">
</span><p data-dcnode-id="956"><span data-dcnode-id="964" instrument_node="">Folks who live in small quarters (or just choose to</span><span data-dcnode-id="962"><span data-dcnode-id="963" instrument_node="">&nbsp;</span></span><span data-dcnode-id="961" instrument_node="">grow plants and trees in containers) come to a crossroad when the nighttime temperatures fall below 15ºF. The problem is this: when the temperature dips to 20ºF and stays there for a while, it’s possible to freeze the core roots of the plants. Until you decide to bring the plants inside, you should thoroughly water the pots prior to cold snaps. This will help protect the roots.</span><span data-dcnode-id="959"><span data-dcnode-id="960" instrument_node="">&nbsp;</span></span><strong data-dcnode-id="957"><span data-dcnode-id="958" instrument_node="">It’s easier for freeze damage to occur in a dry container than in a wet container.</span></strong></p><span data-dcnode-id="955" instrument_node="">
</span><p data-dcnode-id="953"><span data-dcnode-id="954" instrument_node="">When the weather gets cold, and you are working toward winterizing, you can move your container plants into an unheated garage or shed. Prior to moving, thoroughly water the pots. If a plant is cold-hardy, you can leave it outside by mounding 4-6 inches of mulch around and over the top of the pot – heavy enough to provide a protective barrier around the pot.&nbsp;Prior to mounding, you should adequately water the pot. For added protection, consider using some type of rodent bait in the sawdust or mulch to avoid mice depredation.</span></p><span data-dcnode-id="952" instrument_node="">
</span><p data-dcnode-id="943"><span data-dcnode-id="951" instrument_node="">Keep in mind, some container plants</span><span data-dcnode-id="949"><span data-dcnode-id="950" instrument_node="">&nbsp;</span></span><em data-dcnode-id="947"><span data-dcnode-id="948" instrument_node="">need</span></em><span data-dcnode-id="945"><span data-dcnode-id="946" instrument_node="">&nbsp;</span></span><span data-dcnode-id="944" instrument_node="">to be transferred inside because they may not be cold hardy for the zones in which they are planted.&nbsp;If you&nbsp;have purchased a fruit tree but live in a zone-challenged area, know that these plants adapt and fruit well in a containerized situation – as long as they are moved inside for the winter months.</span></p><span data-dcnode-id="942" instrument_node="">
</span><p data-dcnode-id="939"><span data-dcnode-id="940"><span data-dcnode-id="941" instrument_node="">How well we balance our sleep life with our work life can help determine the quality of our senior years. Since a plant endures four seasons each year, its rest period and our care can determine both its performance and longevity.</span></span></p><span data-dcnode-id="938" instrument_node="">
</span><h3 data-dcnode-id="936"><span data-dcnode-id="937" instrument_node="">Checklist on Winterizing Trees &amp; Shrubs</span></h3><span data-dcnode-id="935" instrument_node="">
</span><p data-dcnode-id="933"><span data-dcnode-id="934" instrument_node="">1. Remove visibly damaged and dead wood. Try to make small pruning cuts that minimizes the exposure of the central heartwood on the branch.</span></p><span data-dcnode-id="932" instrument_node="">
</span><p data-dcnode-id="930"><span data-dcnode-id="931" instrument_node="">2. Prune branches that will touch the ground when loaded with rain and snow. Foliage and branches that are in contact with soil can invite undesirable pests and problems.&nbsp;</span></p><span data-dcnode-id="929" instrument_node="">
</span><p data-dcnode-id="927"><span data-dcnode-id="928" instrument_node="">3. Remove damaged and declining twigs, branches, and bark. Do not leave food and shelter for pests during the winter.&nbsp;</span></p><span data-dcnode-id="926" instrument_node="">
</span><p data-dcnode-id="924"><span data-dcnode-id="925" instrument_node="">4. Remove any sprouts or suckers growing at the tree base or along stems and branches. Pruning should conserve as many living branches as possible with only a few selective cuts.</span></p><span data-dcnode-id="923" instrument_node="">
</span><p data-dcnode-id="921"><span data-dcnode-id="922" instrument_node="">5. Spread a thin layer of organic mulch to blanket the soil. Cover an area at least as large as the branch spread. Mulch is nature's way of recycling valuable materials, but be careful of pests hitching a ride.</span></p><span data-dcnode-id="920" instrument_node="">
</span><p data-dcnode-id="918"><span data-dcnode-id="919" instrument_node="">6. Properly wrap new trees that have not developed a corky bark and could be easily damaged. Injury from the environment, including chewing and rubbing by animals, must be prevented.</span></p><span data-dcnode-id="917" instrument_node="">
</span><p data-dcnode-id="915"><span data-dcnode-id="916" instrument_node="">7. Aerate soil if it is compacted and poorly drained. It is critical not to damage tree roots in the soil. Saturated and dense soil can suffocate roots.</span></p><span data-dcnode-id="914" instrument_node="">
</span><p data-dcnode-id="912"><span data-dcnode-id="913" instrument_node="">8. Watering may be needed where soils are cool but not frozen, and there has been little precipitation. Winter droughts need treatment with water the same as summer droughts, except it is much easier to over-water in winter.</span></p><span data-dcnode-id="911" instrument_node="">
</span><p data-dcnode-id="909"><span data-dcnode-id="910" instrument_node="">&nbsp;</span></p><span data-dcnode-id="908" instrument_node="">
</span><p data-dcnode-id="893"><em data-dcnode-id="906"><span data-dcnode-id="907" instrument_node="">Sources:</span></em><span data-dcnode-id="905" instrument_node=""> </span><a data-dcnode-id="903" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//davesgarden.com/guides/articles/view/3939" rel="noopener noreferrer" target="_blank" title="Winterize Those Trees and Shrubs"><span data-dcnode-id="904" instrument_node="">1</span></a><span data-dcnode-id="902" instrument_node="">&nbsp;;&nbsp;</span><a data-dcnode-id="900" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.gardeners.com/how-to/winter-protection/8644.html" rel="noopener noreferrer" target="_blank" title="Preventing Winter Damage to Trees, Shrubs and Roses"><span data-dcnode-id="901" instrument_node="">2</span></a><span data-dcnode-id="899" instrument_node="">&nbsp;; </span><a data-dcnode-id="897" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.starkbros.com/growing-guide/article/fruit-tree-care-winterizing" rel="noopener noreferrer" target="_blank" title="Preparing Trees &amp; Plants for Winter"><span data-dcnode-id="898" instrument_node="">3</span></a><span data-dcnode-id="896" instrument_node="">&nbsp;; </span><a data-dcnode-id="894" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.extension.purdue.edu/extmedia/fnr/fnr-484-w.pdf" rel="noopener noreferrer" target="_blank" title="Winterize Your Trees"><span data-dcnode-id="895" instrument_node="">4</span></a></p><span data-dcnode-id="892" instrument_node="">
