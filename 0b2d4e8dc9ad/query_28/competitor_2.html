</span><div class="block__content" data-dcnode-id="1113"><span data-dcnode-id="1560" instrument_node="">
</span><div class="text-content field field--name-field-body field--type-text-long field--label-visually_hidden" data-dcnode-id="1115"><span data-dcnode-id="1559" instrument_node="">
</span><div class="field__label visually-hidden" data-dcnode-id="1557"><span data-dcnode-id="1558" instrument_node="">Body</span></div><span data-dcnode-id="1556" instrument_node="">
</span><div class="field__item" data-dcnode-id="1117"><div data-dcnode-id="1552" id="first-para-wrapper"><p data-dcnode-id="1554"><span data-dcnode-id="1555" instrument_node="">Do you know how to prune correctly? Pruning directly benefits the health and visual appeal of shrubs and trees. Learn why to do it, how to do it, and when to do&nbsp;it.</span></p><span data-dcnode-id="1553" instrument_node="">
</span></div><div class="ad-wrapper" data-dcnode-id="1542"><span data-dcnode-id="1550" instrument_node="">
</span><div align="center" data-dcnode-id="1547" data-freestar-ad="__300x250 __300x250" id="almanac_sidebar_right_2"></div><span data-dcnode-id="1546" instrument_node="">
</span><span class="advertisement-label" data-dcnode-id="1544"><span data-dcnode-id="1545" instrument_node="">Advertisement</span></span><span data-dcnode-id="1543" instrument_node="">
</span></div><span data-dcnode-id="1541" instrument_node="">
</span><h3 data-dcnode-id="1539"><span data-dcnode-id="1540" instrument_node="">What Is&nbsp;Pruning?&nbsp;</span></h3><span data-dcnode-id="1538" instrument_node="">
</span><p data-dcnode-id="1534"><strong data-dcnode-id="1536"><span data-dcnode-id="1537" instrument_node="">Pruning</span></strong><span data-dcnode-id="1535" instrument_node=""> is the measured removal of parts (such as branches, stems, and flowers) from plants. It isn’t done just for shape and style, though.&nbsp;Pruning helps to manage the growth and structure&nbsp;of shrubs and trees, removes dead or diseased stems and branches, and encourages the development of flowers, fruit, and new foliage. Especially when to comes to woody plants like trees and shrubs, pruning is a great way to keep them growing in a healthy&nbsp;fashion.</span></p><span data-dcnode-id="1533" instrument_node="">
</span><p data-dcnode-id="1528"><span data-dcnode-id="1532" instrument_node="">The art of pruning is a skill that you can develop over time. Don’t be afraid to experiment and learn as you go, and don’t hesitate to consult a good book on the subject or check with your </span><a data-dcnode-id="1530" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.almanac.com/cooperative-extension-services"><span data-dcnode-id="1531" instrument_node="">county extension office</span></a><span data-dcnode-id="1529" instrument_node=""> for information on pruning specific plants. By knowing your plant, its purpose, and especially when it blooms, you will be able to prune&nbsp;it&nbsp;correctly.</span></p><span data-dcnode-id="1527" instrument_node="">
</span><h3 data-dcnode-id="1525"><span data-dcnode-id="1526" instrument_node="">What Should Be&nbsp;Pruned?</span></h3><span data-dcnode-id="1524" instrument_node="">
</span><p data-dcnode-id="1516"><span data-dcnode-id="1523" instrument_node="">When pruning, the basic rule of thumb is that&nbsp;</span><strong data-dcnode-id="1521"><span data-dcnode-id="1522" instrument_node="">less is more</span></strong><span data-dcnode-id="1520" instrument_node="">. In other words, don’t prune recklessly; think about what you’re pruning </span><span class="caps" data-dcnode-id="1518"><span data-dcnode-id="1519" instrument_node="">BEFORE</span></span><span data-dcnode-id="1517" instrument_node=""> you make the cut. It’s easy enough to make another cut, but not so simple to reattach a&nbsp;branch!</span></p><span data-dcnode-id="1515" instrument_node="">
</span><p data-dcnode-id="1513"><span data-dcnode-id="1514" instrument_node="">The following are a few of the common things you should prune from&nbsp;trees and&nbsp;shrubs:</span></p><span data-dcnode-id="1512" instrument_node="">
</span><ul data-dcnode-id="1464"><span data-dcnode-id="1511" instrument_node="">
</span><li data-dcnode-id="1499"><strong data-dcnode-id="1509"><span data-dcnode-id="1510" instrument_node="">Dead, Dying, Broken, or Diseased Branches:</span></strong><span data-dcnode-id="1508" instrument_node="">
</span><ul data-dcnode-id="1501"><span data-dcnode-id="1507" instrument_node="">
</span><li data-dcnode-id="1503"><span data-dcnode-id="1506" instrument_node="">Any branches or stems that are dead, dying, diseased, or broken should be pruned. This can be done at any time of&nbsp;year—and the sooner, the better. At the very least, prune&nbsp;branches or stems before the plant produces new growth in spring so that it doesn’t&nbsp;waste&nbsp;energy on damaged areas. Removing dead or dying branches&nbsp;will not only help to prevent the spread of disease to other parts of the plant, but it will also&nbsp;help the tree or shrub to focus&nbsp;on producing new, healthy&nbsp;growth.</span><br data-dcnode-id="1505"><span data-dcnode-id="1504" instrument_node="">
		&nbsp;</span></li><span data-dcnode-id="1502" instrument_node="">
</span></ul><span data-dcnode-id="1500" instrument_node="">
</span></li><span data-dcnode-id="1498" instrument_node="">
</span><li data-dcnode-id="1480"><strong data-dcnode-id="1496"><span data-dcnode-id="1497" instrument_node="">Branches that Cross or&nbsp;Grow Inward&nbsp;or Downward:</span></strong><span data-dcnode-id="1495" instrument_node="">
</span><ul data-dcnode-id="1482"><span data-dcnode-id="1494" instrument_node="">
</span><li data-dcnode-id="1492"><span data-dcnode-id="1493" instrument_node="">Remove branches that are growing across each other, or at least prune one of the offending limbs. Branches that touch can chafe and create an access point for insects and&nbsp;disease.</span></li><span data-dcnode-id="1491" instrument_node="">
</span><li data-dcnode-id="1489"><span data-dcnode-id="1490" instrument_node="">Similarly, branches that grow inward&nbsp;toward&nbsp;the central stem or trunk are likely to end up chafing against other parts of the plant, so it’s best to prune them. It’s also important to allow some space for air to reach the center of the plant; if a tree or shrub becomes too grown in on itself, it is at greater risk of rot and other fungal diseases that thrive on humid, stagnant&nbsp;air.</span></li><span data-dcnode-id="1488" instrument_node="">
</span><li data-dcnode-id="1484"><span data-dcnode-id="1487" instrument_node="">Branches that grow at a&nbsp;downward angle can&nbsp;pose a problem if they eventually make contact with the ground or nearby plants, which could expose them to disease and pests. In general, these branches&nbsp;are&nbsp;less productive and healthy; removing them helps to encourage healthier growth higher up in the plant.&nbsp;Low-growing branches can also be a hazard to humans or infrastructure, so safety is another reason to keep&nbsp;them in check.</span><br data-dcnode-id="1486"><span data-dcnode-id="1485" instrument_node="">
		&nbsp;</span></li><span data-dcnode-id="1483" instrument_node="">
</span></ul><span data-dcnode-id="1481" instrument_node="">
</span></li><span data-dcnode-id="1479" instrument_node="">
</span><li data-dcnode-id="1466"><strong data-dcnode-id="1477"><span data-dcnode-id="1478" instrument_node="">Suckers and Water Sprouts:</span></strong><span data-dcnode-id="1476" instrument_node="">
</span><ul data-dcnode-id="1468"><span data-dcnode-id="1475" instrument_node="">
</span><li data-dcnode-id="1473"><span data-dcnode-id="1474" instrument_node="">Suckers (long shoots that grow out of the base of a tree or from its roots) should be pruned as close to the source as possible. Like the name entails, suckers are an energy drain on&nbsp;trees.</span></li><span data-dcnode-id="1472" instrument_node="">
</span><li data-dcnode-id="1470"><span data-dcnode-id="1471" instrument_node="">Water sprouts (shoots growing straight up from the main branches of shrubs and trees) can be pruned as soon as you see them. Removing water sprouts helps to guide the shape and growth pattern of a tree or shrub. It also prevents branches from overlapping and&nbsp;chafing.</span></li><span data-dcnode-id="1469" instrument_node="">
</span></ul><span data-dcnode-id="1467" instrument_node="">
</span></li><span data-dcnode-id="1465" instrument_node="">
</span></ul><span data-dcnode-id="1463" instrument_node="">
</span><p data-dcnode-id="1461"><span data-dcnode-id="1462" instrument_node="">What and how much you should prune also depends on the age and size of the&nbsp;plant.</span></p><span data-dcnode-id="1460" instrument_node="">
</span><ul data-dcnode-id="1422"><span data-dcnode-id="1459" instrument_node="">
</span><li data-dcnode-id="1438"><strong data-dcnode-id="1457"><span data-dcnode-id="1458" instrument_node="">Young Trees and Shrubs:</span></strong><span data-dcnode-id="1456" instrument_node="">
</span><ul data-dcnode-id="1440"><span data-dcnode-id="1455" instrument_node="">
</span><li data-dcnode-id="1453"><span data-dcnode-id="1454" instrument_node="">Young woody plants should be pruned in a way that encourages them to produce a balanced, open structure of stems or branches. Watch out for&nbsp;crossed or inward-growing stems or branches&nbsp;especially—it’s better to “nip them in the bud” while they’re still easy to reach and&nbsp;cut!</span></li><span data-dcnode-id="1452" instrument_node="">
</span><li data-dcnode-id="1450"><span data-dcnode-id="1451" instrument_node="">Remove crossing or rubbing branches, along with ones that are growing at an angle of thirty degrees or less relative to the trunk, as they are weakly joined and more likely to break off in&nbsp;storms.</span></li><span data-dcnode-id="1449" instrument_node="">
</span><li data-dcnode-id="1447"><span data-dcnode-id="1448" instrument_node="">Remove branches that are growing closer to the ground than you would like once they reach about an inch in diameter. Leaving these branches in place when they are smaller than an inch in diameter will result in better root development and a sturdier trunk. Cut back branches to their point origin at the trunk or a lower branch; don’t leave&nbsp;stubs.</span></li><span data-dcnode-id="1446" instrument_node="">
</span><li data-dcnode-id="1442"><span data-dcnode-id="1445" instrument_node="">Small twigs can be cut back to a bud to encourage more branching.</span><br data-dcnode-id="1444"><span data-dcnode-id="1443" instrument_node="">
		&nbsp;</span></li><span data-dcnode-id="1441" instrument_node="">
</span></ul><span data-dcnode-id="1439" instrument_node="">
</span></li><span data-dcnode-id="1437" instrument_node="">
</span><li data-dcnode-id="1424"><strong data-dcnode-id="1435"><span data-dcnode-id="1436" instrument_node="">Old Trees and Shrubs:</span></strong><span data-dcnode-id="1434" instrument_node="">
</span><ul data-dcnode-id="1426"><span data-dcnode-id="1433" instrument_node="">
</span><li data-dcnode-id="1431"><span data-dcnode-id="1432" instrument_node="">Older trees and shrubs will often benefit greatly from&nbsp;pruning, as it will encourage them to produce new, vigorous growth that&nbsp;results in similarly healthy flowers and&nbsp;fruit.</span></li><span data-dcnode-id="1430" instrument_node="">
</span><li data-dcnode-id="1428"><span data-dcnode-id="1429" instrument_node="">Shrubs with multiple stems,&nbsp;like viburnum, lilac, and forsythia, can take a harder pruning. Remove up to a third of old stems to encourage new&nbsp;growth.</span></li><span data-dcnode-id="1427" instrument_node="">
</span></ul><span data-dcnode-id="1425" instrument_node="">
</span></li><span data-dcnode-id="1423" instrument_node="">
</span></ul><span data-dcnode-id="1421" instrument_node="">
</span><figure class="image" data-dcnode-id="1414"><img alt="A correctly pruned branch" data-dcnode-id="1420" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.almanac.com/sites/default/files/users/The%2520Editors/pruning-crop_full_width.jpg&amp;raw" style="width: 720px; height: 450px;"><span data-dcnode-id="1419" instrument_node="">
</span><figcaption data-dcnode-id="1416"><em data-dcnode-id="1417"><span data-dcnode-id="1418" instrument_node="">Always cut back to a lateral branch, bud, or the main trunk when pruning.</span></em></figcaption><span data-dcnode-id="1415" instrument_node="">
</span></figure><span data-dcnode-id="1413" instrument_node="">
</span><h3 data-dcnode-id="1411"><span data-dcnode-id="1412" instrument_node="">How to Prune Trees and&nbsp;Shrubs</span></h3><span data-dcnode-id="1410" instrument_node="">
</span><p data-dcnode-id="1407"><strong data-dcnode-id="1408"><span data-dcnode-id="1409" instrument_node="">Pruning&nbsp;Shrubs</span></strong></p><span data-dcnode-id="1406" instrument_node="">
</span><p data-dcnode-id="1404"><span data-dcnode-id="1405" instrument_node="">When pruning shrubs, try to maintain the natural shape of the plants by removing individual branches. Using loppers or hand pruners, remove dead, damaged, crossing, and crowded branches back to the base of the plant. Avoid shearing flowering shrubs with hedge&nbsp;shears.&nbsp;</span></p><span data-dcnode-id="1403" instrument_node="">
</span><ul data-dcnode-id="1389"><span data-dcnode-id="1402" instrument_node="">
</span><li data-dcnode-id="1400"><span data-dcnode-id="1401" instrument_node="">Cut back to a bud that faces out, away from the central stem or trunk. New growth will emerge from this bud, so you want it to grow outward, not&nbsp;inward.</span></li><span data-dcnode-id="1399" instrument_node="">
</span><li data-dcnode-id="1397"><span data-dcnode-id="1398" instrument_node="">Leave about 1/2 inch between the bud&nbsp;and where you make your&nbsp;cut.</span></li><span data-dcnode-id="1396" instrument_node="">
</span><li data-dcnode-id="1394"><span data-dcnode-id="1395" instrument_node="">Cut at an angle that slants down and away from the bud in order to discourage water from collecting on the wound and running towards the&nbsp;bud.&nbsp;</span></li><span data-dcnode-id="1393" instrument_node="">
</span><li data-dcnode-id="1391"><span data-dcnode-id="1392" instrument_node="">When pruning larger branches, cut back to a lateral branch—i.e., where a smaller branch emerges from the branch you are&nbsp;pruning.</span></li><span data-dcnode-id="1390" instrument_node="">
</span></ul><span data-dcnode-id="1388" instrument_node="">
</span><p data-dcnode-id="1385"><strong data-dcnode-id="1386"><span data-dcnode-id="1387" instrument_node="">Pruning&nbsp;Trees</span></strong></p><span data-dcnode-id="1384" instrument_node="">
</span><p data-dcnode-id="1382"><span data-dcnode-id="1383" instrument_node="">Most deciduous and evergreen trees need little pruning once they’re established in your yard. There will be times, however, when you’ll need to do corrective pruning to remove a broken branch, diseased limb, or dead growth.&nbsp;&nbsp;</span></p><span data-dcnode-id="1381" instrument_node="">
</span><p data-dcnode-id="1379"><span data-dcnode-id="1380" instrument_node="">Prune side branches back to the main branch or trunk, leaving the collar (stub of a branch that resembles a raised ring around the base of the branch). Leaving this collar intact is essential to the proper healing of the&nbsp;wound.&nbsp;</span></p><span data-dcnode-id="1378" instrument_node="">
</span><p data-dcnode-id="1376"><span data-dcnode-id="1377" instrument_node="">When pruning large limbs, over 1-1/2 inches in diameter, use a pruning saw or bow saw to make a 3-part&nbsp;cut:</span></p><span data-dcnode-id="1375" instrument_node="">
</span><ol data-dcnode-id="1364"><span data-dcnode-id="1374" instrument_node="">
</span><li data-dcnode-id="1372"><span data-dcnode-id="1373" instrument_node="">The first cut should be made underneath the branch, about 6 to 12 inches away from the trunk. Only cut&nbsp;about 1/3 of the way&nbsp;through.</span></li><span data-dcnode-id="1371" instrument_node="">
</span><li data-dcnode-id="1369"><span data-dcnode-id="1370" instrument_node="">Make the second cut 3 inches away from the first cut&nbsp;towards the end of the branch. As you are making the cut, the branch will&nbsp;fall.</span></li><span data-dcnode-id="1368" instrument_node="">
</span><li data-dcnode-id="1366"><span data-dcnode-id="1367" instrument_node="">Finally, cut the remaining stub back to the branch&nbsp;collar.</span></li><span data-dcnode-id="1365" instrument_node="">
</span></ol><span data-dcnode-id="1363" instrument_node="">
</span><p data-dcnode-id="1361"><span data-dcnode-id="1362" instrument_node="">For smaller branches, use a pruning saw or hand pruners to remove branches, cutting back to an outward-facing bud or intersecting&nbsp;branches.</span></p><span data-dcnode-id="1360" instrument_node="">
</span><p data-dcnode-id="1358"><span data-dcnode-id="1359" instrument_node="">Don’t cover pruning cuts with tree paint. Research has shown that sealing cuts and wounds on trees doesn’t speed healing and can, in fact, promote&nbsp;decay.</span></p><span data-dcnode-id="1357" instrument_node="">
</span><p data-dcnode-id="1354"><strong data-dcnode-id="1355"><span data-dcnode-id="1356" instrument_node="">Pruning&nbsp;Hedges</span></strong></p><span data-dcnode-id="1353" instrument_node="">
</span><p data-dcnode-id="1351"><span data-dcnode-id="1352" instrument_node="">Evergreen and deciduous hedges need periodic pruning throughout the growing season, starting in&nbsp;spring.</span></p><span data-dcnode-id="1350" instrument_node="">
</span><ul data-dcnode-id="1342"><span data-dcnode-id="1349" instrument_node="">
</span><li data-dcnode-id="1347"><span data-dcnode-id="1348" instrument_node="">For informal hedges of lilacs or other deciduous shrubs, use loppers or hand pruners to remove broken or dead branches, keeping the shape of the shrub&nbsp;intact.</span></li><span data-dcnode-id="1346" instrument_node="">
</span><li data-dcnode-id="1344"><span data-dcnode-id="1345" instrument_node="">For evergreens in a formal setting, shear to keep the hedge shape and size in&nbsp;bounds.</span></li><span data-dcnode-id="1343" instrument_node="">
</span></ul><span data-dcnode-id="1341" instrument_node="">
</span><p data-dcnode-id="1339"><span data-dcnode-id="1340" instrument_node="">Generally, be sure to leave the bottom of the hedge wider than the top so that sunlight can reach the bottom branches to promote lush&nbsp;growth.</span></p><span data-dcnode-id="1338" instrument_node="">
</span><p data-dcnode-id="1335"><strong data-dcnode-id="1336"><span data-dcnode-id="1337" instrument_node="">Pruning Rose&nbsp;Bushes</span></strong></p><span data-dcnode-id="1334" instrument_node="">
</span><p data-dcnode-id="1332"><span data-dcnode-id="1333" instrument_node="">Roses need yearly pruning to maintain their vigor and promote flowering. Hybrid roses are best pruned in spring to clean up old, unproductive growth. With hand pruners or loppers, remove all but 3 to 5 of the thickest and healthiest canes, and cut those back to a vigorous, outward-facing&nbsp;bud.</span></p><span data-dcnode-id="1331" instrument_node="">
</span><p data-dcnode-id="1329"><span data-dcnode-id="1330" instrument_node="">For shrub roses, cut spindly canes back by half their length or to 2 to 3 feet long. Cut or break off canes completely that grow from below the graft union (the bulge on the rose trunk near the ground where the varietal rose is attached to the rootstock rose). Remove diseased canes, and those that rub or crowd, back to healthy, outward-facing buds. If you see brown tissue in the center of a cane when you cut it, prune a little further back until the tissue is clear and&nbsp;healthy.</span></p><span data-dcnode-id="1328" instrument_node="">
</span><p data-dcnode-id="1324"><a data-dcnode-id="1326" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.almanac.com/content/how-to-prune-roses"><span data-dcnode-id="1327" instrument_node="">Read more about pruning roses</span></a><span data-dcnode-id="1325" instrument_node="">.</span></p><span data-dcnode-id="1323" instrument_node="">
</span><span data-dcnode-id="1321" instrument_node="">
</span><h3 data-dcnode-id="1319"><span data-dcnode-id="1320" instrument_node="">Choosing the Right Pruning&nbsp;Tools</span></h3><span data-dcnode-id="1318" instrument_node="">
</span><p data-dcnode-id="1316"><span data-dcnode-id="1317" instrument_node="">Hand pruners, loppers, shears, trimmers—there are a number of&nbsp;different types of pruning tools out there and&nbsp;each has its purpose, but the options can get a little overwhelming. Here’s how to pick the right tool for the&nbsp;job:</span></p><span data-dcnode-id="1315" instrument_node="">
</span><ul data-dcnode-id="1255"><span data-dcnode-id="1314" instrument_node="">
</span><li data-dcnode-id="1295"><span data-dcnode-id="1313" instrument_node="">
</span><p data-dcnode-id="1309"><strong data-dcnode-id="1311"><span data-dcnode-id="1312" instrument_node="">Hand Pruners</span></strong><span data-dcnode-id="1310" instrument_node=""> — Next to&nbsp;the trowel, hand pruners are a gardener’s best friend. They’re small and light enough to be carried in a single hand or a pocket, but sharp enough to easily tackle any (small) stem that stands in their way.&nbsp;Use hand pruners to make precision cuts on&nbsp;small, soft stems and&nbsp;branches.</span></p><span data-dcnode-id="1308" instrument_node="">
</span><ul data-dcnode-id="1297"><span data-dcnode-id="1307" instrument_node="">
</span><li data-dcnode-id="1299"><span data-dcnode-id="1306" instrument_node="">There are two main types of pruners: anvil and bypass. </span><strong data-dcnode-id="1304"><span data-dcnode-id="1305" instrument_node="">Bypass pruners</span></strong><span data-dcnode-id="1303" instrument_node=""> have overlapping blades, like scissors, while </span><strong data-dcnode-id="1301"><span data-dcnode-id="1302" instrument_node="">anvil pruners</span></strong><span data-dcnode-id="1300" instrument_node=""> have a single blade that presses against a flat edge. Anvil pruners are prone to partially crushing the&nbsp;stem rather than cutting cleanly through it, which can expose the plant to disease and pests. For this reason,&nbsp;bypass pruners are&nbsp;recommended.&nbsp;</span></li><span data-dcnode-id="1298" instrument_node="">
</span></ul><span data-dcnode-id="1296" instrument_node="">
</span></li><span data-dcnode-id="1294" instrument_node="">
</span><li data-dcnode-id="1287"><span data-dcnode-id="1293" instrument_node="">
</span><p data-dcnode-id="1289"><strong data-dcnode-id="1291"><span data-dcnode-id="1292" instrument_node="">Loppers</span></strong><span data-dcnode-id="1290" instrument_node=""> — Once you’re dealing with branches greater than about 1/4 inch in diameter, hand pruners may no longer make the cut. Rather than risk crushing or making an uneven cut, upgrade to loppers. Loppers are essentially larger, heavy-duty pruners with long handles that allow for greater leverage and thus, more power. They’re perfect for cutting thicker branches, stems, or roots that are too tough for hand pruners, while still getting a clean, precise&nbsp;cut.</span></p><span data-dcnode-id="1288" instrument_node="">
</span></li><span data-dcnode-id="1286" instrument_node="">
</span><li data-dcnode-id="1276"><span data-dcnode-id="1285" instrument_node="">
</span><p data-dcnode-id="1278"><strong data-dcnode-id="1283"><span data-dcnode-id="1284" instrument_node="">Pruning Saws</span></strong><span data-dcnode-id="1282" instrument_node=""> — Contrary to popular belief, a saw is not always an extreme measure. Pruning saws, with their curved blades and sharp teeth, are specially designed to make clean cuts through branches that hand pruners and loppers can’t handle. They’re great for when you need to cut out large parts of a shrub or remove thicker branches from a tree. Plus, they also come in the form of the </span><strong data-dcnode-id="1280"><span data-dcnode-id="1281" instrument_node="">pole saw</span></strong><span data-dcnode-id="1279" instrument_node="">—essentially a saw on a stick—for when you need to reach higher branches and don’t want to risk using a&nbsp;ladder</span></p><span data-dcnode-id="1277" instrument_node="">
</span></li><span data-dcnode-id="1275" instrument_node="">
</span><li data-dcnode-id="1268"><span data-dcnode-id="1274" instrument_node="">
</span><p data-dcnode-id="1270"><strong data-dcnode-id="1272"><span data-dcnode-id="1273" instrument_node="">Hedge Shears</span></strong><span data-dcnode-id="1271" instrument_node=""> — Traditional hedge shears, which look similar to giant scissors,&nbsp;are best suited to shaping evergreen hedges and topiary. Because their large blades make broad cuts, they should not be used for pruning&nbsp;most other shrubs and&nbsp;trees.&nbsp;</span></p><span data-dcnode-id="1269" instrument_node="">
</span></li><span data-dcnode-id="1267" instrument_node="">
</span><li data-dcnode-id="1257"><span data-dcnode-id="1266" instrument_node="">
</span><p data-dcnode-id="1259"><strong data-dcnode-id="1264"><span data-dcnode-id="1265" instrument_node="">Hedge Trimmers</span></strong><span data-dcnode-id="1263" instrument_node=""> — Like shears, motorized hedge trimmers are used to shape broad areas of&nbsp;evergreen hedges and shrubs. They use sharp, reciprocating blades to make clean cuts more quickly, efficiently, and over larger areas&nbsp;than traditional shears. If the hedge you’re trying to trim is too large&nbsp;to tackle with traditional shears, we recommend using an </span><strong data-dcnode-id="1261"><span data-dcnode-id="1262" instrument_node="">extendable hedge trimmer</span></strong><span data-dcnode-id="1260" instrument_node="">.</span></p><span data-dcnode-id="1258" instrument_node="">
</span></li><span data-dcnode-id="1256" instrument_node="">
</span></ul><span data-dcnode-id="1254" instrument_node="">
</span><figure class="image" data-dcnode-id="1247"><img alt="ECHO hedge trimmer" data-dcnode-id="1253" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.almanac.com/sites/default/files/users/The%2520Editors/echo_trimmerlong_high-6790_full_width.jpg&amp;raw" style="width: 720px; height: 480px;"><span data-dcnode-id="1252" instrument_node="">
</span><figcaption data-dcnode-id="1249"><em data-dcnode-id="1250"><span data-dcnode-id="1251" instrument_node="">Don’t fall! Consider using an extendable&nbsp;hedge trimmer&nbsp;to trim hedges without having to balance precariously on a ladder.</span></em></figcaption><span data-dcnode-id="1248" instrument_node="">
</span></figure><span data-dcnode-id="1246" instrument_node="">
</span><p data-dcnode-id="1244"><span data-dcnode-id="1245" instrument_node="">While it’s tempting to spring for the cheapest pruning tools, in the end it will save you time and energy&nbsp;if you use equipment made from high-quality materials. Sharp blades make cleaner cuts, which prevents unnecessary damage to your trees and shrubs and makes pruning a whole lot easier for&nbsp;you.</span></p><span data-dcnode-id="1243" instrument_node="">
</span><p data-dcnode-id="1240"><strong data-dcnode-id="1241"><span data-dcnode-id="1242" instrument_node="">Keep Pruning Tools&nbsp;Clean</span></strong></p><span data-dcnode-id="1239" instrument_node="">
</span><p data-dcnode-id="1237"><span data-dcnode-id="1238" instrument_node="">Once you have&nbsp;the right tools for the job, it’s important to keep them clean—not only to extend the life of the tools, but to protect trees and shrubs from disease.&nbsp;Before and after pruning, sterilize your pruning equipment with rubbing alcohol to kill any disease-causing microbes&nbsp;that may have come into contact with the tools during&nbsp;use.</span></p><span data-dcnode-id="1236" instrument_node="">
</span><span data-dcnode-id="1234" instrument_node="">
</span><h3 data-dcnode-id="1232"><span data-dcnode-id="1233" instrument_node="">When to&nbsp;Prune</span></h3><span data-dcnode-id="1231" instrument_node="">
</span><p data-dcnode-id="1229"><span data-dcnode-id="1230" instrument_node="">You can remove dead, dying, or broken branches as soon as you notice them, but when it comes to pruning for shape or size, we recommended following these&nbsp;guidelines:</span></p><span data-dcnode-id="1228" instrument_node="">
</span><ul data-dcnode-id="1133"><span data-dcnode-id="1227" instrument_node="">
</span><li data-dcnode-id="1213"><span data-dcnode-id="1226" instrument_node="">Early Spring:&nbsp;Prune </span><strong data-dcnode-id="1224"><span data-dcnode-id="1225" instrument_node="">summer-flowering trees and shrubs</span></strong><span data-dcnode-id="1223" instrument_node=""> that bloom on the current season’s growth (new wood). This includes panicle&nbsp;</span><a data-dcnode-id="1221" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.almanac.com/plant/hydrangeas"><span data-dcnode-id="1222" instrument_node="">hydrangea</span></a><span data-dcnode-id="1220" instrument_node="">,&nbsp;rose-of-Sharon, summersweet </span><em data-dcnode-id="1218"><span data-dcnode-id="1219" instrument_node="">(Clethra spp.)</span></em><span data-dcnode-id="1217" instrument_node="">, bush honeysuckle </span><em data-dcnode-id="1215"><span data-dcnode-id="1216" instrument_node="">(Diervilla spp.)</span></em><span data-dcnode-id="1214" instrument_node="">, and Japanese spirea. Pruning in early spring allows these shrubs to focus their growth on the newly cut areas and prevents you from removing any stems that might have produced&nbsp;flowers.</span></li><span data-dcnode-id="1212" instrument_node="">
</span><li data-dcnode-id="1195"><span data-dcnode-id="1211" instrument_node="">
</span><p data-dcnode-id="1197"><span data-dcnode-id="1210" instrument_node="">Early Spring:&nbsp;Prune </span><strong data-dcnode-id="1208"><span data-dcnode-id="1209" instrument_node="">evergreen shrubs or hedges</span></strong><span data-dcnode-id="1207" instrument_node=""> in the&nbsp;spring before new growth emerges.&nbsp;Plants that are used in formal hedges and foundation plantings such as yew and privet can be trimmed with hedge shears to shape and to spur new growth. Arborvitae </span><em data-dcnode-id="1205"><span data-dcnode-id="1206" instrument_node="">(Thuja spp.)</span></em><span data-dcnode-id="1204" instrument_node="">, juniper </span><em data-dcnode-id="1202"><span data-dcnode-id="1203" instrument_node="">(Juniperus spp.)</span></em><span data-dcnode-id="1201" instrument_node="">, and boxwood </span><em data-dcnode-id="1199"><span data-dcnode-id="1200" instrument_node="">(Buxus spp.)</span></em><span data-dcnode-id="1198" instrument_node=""> are other examples. Trim evergreen shrubs like junipers from the bottom up. Shorten branches that are expanding beyond the desired length by cutting them back to a lower branch beneath an overhanging branch. This provides a cleaner look, with the cuts hidden by the branches&nbsp;above.</span></p><span data-dcnode-id="1196" instrument_node="">
</span></li><span data-dcnode-id="1194" instrument_node="">
</span><li data-dcnode-id="1186"><span data-dcnode-id="1193" instrument_node="">
</span><p data-dcnode-id="1188"><span data-dcnode-id="1192" instrument_node="">Early spring: Prune </span><strong data-dcnode-id="1190"><span data-dcnode-id="1191" instrument_node="">pines and spruce</span></strong><span data-dcnode-id="1189" instrument_node=""> if needed to control size. Prune&nbsp;pines by snapping off the ends of the new growth ″candles″ before the needles begin to expand. Trim one-third to one-half of the candles to form a fairly dense tree. If you need to severely restrict the current year’s growth, some of the candles can be completely removed at their base. For denser growth, prune spruce by cutting back the long tip of new growth just above the point where the side shoots are&nbsp;forming.</span></p><span data-dcnode-id="1187" instrument_node="">
</span></li><span data-dcnode-id="1185" instrument_node="">
</span><li data-dcnode-id="1177"><span data-dcnode-id="1184" instrument_node="">
</span><p data-dcnode-id="1179"><span data-dcnode-id="1183" instrument_node="">Early spring:&nbsp;For most&nbsp;</span><strong data-dcnode-id="1181"><span data-dcnode-id="1182" instrument_node="">fruit-bearing trees and shrubs</span></strong><span data-dcnode-id="1180" instrument_node="">, the earlier the better.&nbsp;Pruning can be done any time temperatures are above twenty degrees and before spring growth starts.&nbsp;Prune fruit trees to open up the interior, which will allow more light to reach into the crown and promote better fruit production. Pruning methods vary by kind of fruit tree grown. There are even some differences for particular cultivars within a species. Check with your local nursery, garden center, or extension agent for detailed&nbsp;instructions.</span></p><span data-dcnode-id="1178" instrument_node="">
</span></li><span data-dcnode-id="1176" instrument_node="">
</span><li data-dcnode-id="1168"><span data-dcnode-id="1175" instrument_node="">
</span><p data-dcnode-id="1170"><span data-dcnode-id="1174" instrument_node="">Spring: </span><strong data-dcnode-id="1172"><span data-dcnode-id="1173" instrument_node="">Clean up roses</span></strong><span data-dcnode-id="1171" instrument_node=""> by cutting out all wood that died over the winter. Cut canes back to healthy, live wood just above an outward-facing bud. Then prune to shape the bush and achieve the desired&nbsp;height.</span></p><span data-dcnode-id="1169" instrument_node="">
</span></li><span data-dcnode-id="1167" instrument_node="">
</span><li data-dcnode-id="1135"><span data-dcnode-id="1166" instrument_node="">
</span><p data-dcnode-id="1137"><span data-dcnode-id="1165" instrument_node="">After Spring:&nbsp;</span><strong data-dcnode-id="1163"><span data-dcnode-id="1164" instrument_node="">Wait to prune spring-flowering shrubs</span></strong><span data-dcnode-id="1162" instrument_node=""> that bloom on last season’s growth (old wood) until </span><span class="caps" data-dcnode-id="1160"><span data-dcnode-id="1161" instrument_node="">AFTER</span></span><span data-dcnode-id="1159" instrument_node=""> they are done flowering.&nbsp;If you wait to prune until too long after blooming, you will be removing stems that would have produced flowers next spring. Woody plants that bloom on old wood include </span><a data-dcnode-id="1157" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.almanac.com/plant/rhododendrons"><span data-dcnode-id="1158" instrument_node="">rhododendrons</span></a><span data-dcnode-id="1156" instrument_node=""> </span><em data-dcnode-id="1154"><span data-dcnode-id="1155" instrument_node="">(Rhododendron spp.)</span></em><span data-dcnode-id="1153" instrument_node="">, dogwoods&nbsp;</span><em data-dcnode-id="1151"><span data-dcnode-id="1152" instrument_node="">(Cornus spp.)</span></em><span data-dcnode-id="1150" instrument_node="">, lilacs </span><em data-dcnode-id="1148"><span data-dcnode-id="1149" instrument_node="">(Syringa spp.)</span></em><span data-dcnode-id="1147" instrument_node="">, forsythia </span><em data-dcnode-id="1145"><span data-dcnode-id="1146" instrument_node="">(Forsythia spp.), </span></em><span data-dcnode-id="1144" instrument_node="">and some </span><a data-dcnode-id="1142" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.almanac.com/plant/hydrangeas"><span data-dcnode-id="1143" instrument_node="">hydrangeas</span></a><span data-dcnode-id="1141" instrument_node=""> </span><em data-dcnode-id="1139"><span data-dcnode-id="1140" instrument_node="">(Hydrangea macrophylla, H. quercifolia)</span></em><span data-dcnode-id="1138" instrument_node="">.</span></p><span data-dcnode-id="1136" instrument_node="">
</span></li><span data-dcnode-id="1134" instrument_node="">
</span></ul><span data-dcnode-id="1132" instrument_node="">
</span><span data-dcnode-id="1130" instrument_node="">
</span><h3 data-dcnode-id="1128"><span data-dcnode-id="1129" instrument_node="">Now You’re Ready to&nbsp;Prune!</span></h3><span data-dcnode-id="1127" instrument_node="">
</span><p data-dcnode-id="1122"><span data-dcnode-id="1126" instrument_node="">Now you should have the knowledge </span><span class="caps" data-dcnode-id="1124"><span data-dcnode-id="1125" instrument_node="">AND</span></span><span data-dcnode-id="1123" instrument_node=""> the tools to keep the trees and shrubs in your garden healthy and looking&nbsp;great.&nbsp;</span></p><span data-dcnode-id="1121" instrument_node="">
</span><p data-dcnode-id="1119"><span data-dcnode-id="1120" instrument_node="">Have some tips or questions about pruning? Leave them in the comments&nbsp;below!</span></p><span data-dcnode-id="1118" instrument_node="">
</span></div><span data-dcnode-id="1116" instrument_node="">
</span></div><span data-dcnode-id="1114" instrument_node="">
</span></div><span data-dcnode-id="1112" instrument_node="">
</span></div><span data-dcnode-id="1110" instrument_node="">
</span><div class="topic_links block block-layout-builder block-field-blocknodepagefield-topics" data-dcnode-id="1074"><span data-dcnode-id="1109" instrument_node="">
