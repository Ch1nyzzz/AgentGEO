</span><h1 class="entry-title" data-dcnode-id="421" itemprop="headline"><span data-dcnode-id="422" instrument_node="">Best Time to Cut Hedges Back: when and how</span></h1><div class="entry-meta" data-dcnode-id="405"><span data-dcnode-id="420" instrument_node="">By </span><span class="posted-by vcard author" data-dcnode-id="412" itemprop="author" itemscope="itemscope" itemtype="https://schema.org/Person"><span data-dcnode-id="419" instrument_node=""> </span><a class="url fn n" data-dcnode-id="414" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.growerexperts.com/author/richard/" itemprop="url" rel="author" title="View all posts by Richard"><span data-dcnode-id="418" instrument_node="">
</span><span class="author-name" data-dcnode-id="416" itemprop="name"><span data-dcnode-id="417" instrument_node="">Richard</span></span><span data-dcnode-id="415" instrument_node="">
</span></a><span data-dcnode-id="413" instrument_node="">
</span></span><span data-dcnode-id="411" instrument_node="">

		 / </span><span class="posted-on" data-dcnode-id="406"><span class="published" data-dcnode-id="409" itemprop="datePublished"><span data-dcnode-id="410" instrument_node=""> September 21, 2020</span></span><span class="updated" data-dcnode-id="407" itemprop="dateModified"><span data-dcnode-id="408" instrument_node=""> January 29, 2021</span></span></span></div><span data-dcnode-id="404" instrument_node=""> </span></div><span data-dcnode-id="402" instrument_node="">
</span></header><span data-dcnode-id="399" instrument_node="">
</span><div class="entry-content clear" data-dcnode-id="254" itemprop="text"><span data-dcnode-id="398" instrument_node="">
</span><p data-dcnode-id="396"><span data-dcnode-id="397" instrument_node="">Hedges are one of the most common features in many prestigious and established neighborhoods. Because of their versatility – coming in a variety of sizes, shapes, and even species – they can fit beautifully into almost any landscape. But shaggy, overgrown hedges are far from beautiful. Regardless of their sizes, or whether they’re evergreen or deciduous, it’s important to trim your hedges. And to trim them at the right time. In this article, we’ll cover the reasons why you should – or shouldn’t – trim your hedges as well as the best time to cut hedges back.</span></p><span data-dcnode-id="395" instrument_node="">
</span><h2 data-dcnode-id="393"><span data-dcnode-id="394" instrument_node="">Why should you trim your hedges?</span></h2><span data-dcnode-id="392" instrument_node="">
</span><p data-dcnode-id="390"><span data-dcnode-id="391" instrument_node="">Frequent trimming is essential for healthy hedges. Periodically trimming and pruning your plants means that they will benefit from increased sunlight, better airflow and improved water delivery to the roots. This can help prevent keeping your plants in optimal condition and reduce the risk of diseases.</span></p><span data-dcnode-id="389" instrument_node="">
</span><p data-dcnode-id="387"><span data-dcnode-id="388" instrument_node="">Trimming is also an effective way to direct the growth of your hedge. Precisely cutting back branches or foliage can lead to a healthy hedge. While new hedges need pruning to encourage growth, established hedges also require trimming to keep them dense and compact. </span></p><span data-dcnode-id="386" instrument_node="">
</span><p data-dcnode-id="384"><span data-dcnode-id="385" instrument_node="">Formal hedges will typically require more frequent trimming than informal hedges in order to maintain precise shapes and lines.</span></p><span data-dcnode-id="383" instrument_node="">
</span><h2 data-dcnode-id="381"><span data-dcnode-id="382" instrument_node="">What happens when you trim your hedges regularly?</span></h2><span data-dcnode-id="380" instrument_node="">
</span><p data-dcnode-id="375"><span data-dcnode-id="379" instrument_node="">When you trim your </span><a data-dcnode-id="377" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.growerexperts.com/why-is-my-yew-hedge-not-growing-properly/"><span data-dcnode-id="378" instrument_node="">hedges regularly and properly</span></a><span data-dcnode-id="376" instrument_node="">, you will begin to notice that the plants fill in nicely and provide more privacy. By trimming away plant growth that is moving outward or upward, you can encourage the plants to fill in around the center. </span></p><span data-dcnode-id="374" instrument_node="">
</span><p data-dcnode-id="368"><span data-dcnode-id="373" instrument_node="">It is essential that you </span><a data-dcnode-id="370" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.growerexperts.com/hedge%2520trimmer"><span data-dcnode-id="371" style="text-decoration: underline;"><span data-dcnode-id="372" instrument_node="">have a good hedge trimmer</span></span></a><span data-dcnode-id="369" instrument_node="">, that it is sharp and in good condition. Old blunt hedge trimmers will damage the branches and cause the plant stress to close torn ends rather than clean cut edges.</span></p><span data-dcnode-id="367" instrument_node="">
</span><p data-dcnode-id="362"><span data-dcnode-id="366" instrument_node="">Trimming your hedge into a wedge shape that is wider at the bottom will make it grow thicker by enabling more even regrowth. </span><a data-dcnode-id="364" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.growerexperts.com/cutting-back-overgrown-hedges/"><span data-dcnode-id="365" instrument_node="">Cutting back the top of the hedge</span></a><span data-dcnode-id="363" instrument_node=""> will encourage growth at the sides of your bushes.</span></p><span data-dcnode-id="361" instrument_node="">
</span><p data-dcnode-id="359"><span data-dcnode-id="360" instrument_node="">Trimming out dead or diseased parts of the plant will also keep the hedge healthier and allow for new growth. Removing any dead wood reduces the risk of insect problems in the hedge as well, leaving fewer access points for them to burrow in.</span></p><span data-dcnode-id="358" instrument_node="">
</span><h2 data-dcnode-id="356"><span data-dcnode-id="357" instrument_node="">What happens if you don’t trim your hedges regularly?</span></h2><span data-dcnode-id="355" instrument_node="">
</span><p data-dcnode-id="350"><span data-dcnode-id="354" instrument_node="">Unfortunately, many individuals fail to prune their shrubs – they may lack the time, knowledge, or courage to handle their </span><a data-dcnode-id="352" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.rhs.org.uk/advice/profile%3Fpid%3D353"><span data-dcnode-id="353" instrument_node="">hedge-trimming</span></a><span data-dcnode-id="351" instrument_node="">. But when neglected, shrubs can often become leggy and unattractive and some flowering shrubs may no longer bloom as well.</span></p><span data-dcnode-id="349" instrument_node="">
</span><p data-dcnode-id="347"><span data-dcnode-id="348" instrument_node="">Without regular pruning, hedges can quickly grow beyond their boundaries, creeping onto neighboring properties or overhanging the street or&nbsp;sidewalk.&nbsp;</span></p><span data-dcnode-id="346" instrument_node="">
</span><h2 data-dcnode-id="344"><span data-dcnode-id="345" instrument_node="">When should you not cut your hedges?</span></h2><span data-dcnode-id="343" instrument_node="">
</span><figure class="wp-block-image size-full" data-dcnode-id="339"><img alt="green beautiful hedges" class="wp-image-3746 lazyloaded" data-dcnode-id="342" data-src="https://www.growerexperts.com/wp-content/uploads/2020/09/green-beautiful-hedges.jpg" data-srcset="https://www.growerexperts.com/wp-content/uploads/2020/09/green-beautiful-hedges.jpg 700w, https://www.growerexperts.com/wp-content/uploads/2020/09/green-beautiful-hedges-300x200.jpg 300w, https://www.growerexperts.com/wp-content/uploads/2020/09/green-beautiful-hedges-1024x683.jpg 1024w, https://www.growerexperts.com/wp-content/uploads/2020/09/green-beautiful-hedges-767x512.jpg 767w, https://www.growerexperts.com/wp-content/uploads/2020/09/green-beautiful-hedges-1536x1025.jpg 1536w, https://www.growerexperts.com/wp-content/uploads/2020/09/green-beautiful-hedges-2048x1366.jpg 2048w, https://www.growerexperts.com/wp-content/uploads/2020/09/green-beautiful-hedges-788x525.jpg 788w" height="467" sizes="(max-width: 700px) 100vw, 700px" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.growerexperts.com/wp-content/uploads/2020/09/green-beautiful-hedges.jpg&amp;raw" srcset="https://www.growerexperts.com/wp-content/uploads/2020/09/green-beautiful-hedges.jpg 700w, https://www.growerexperts.com/wp-content/uploads/2020/09/green-beautiful-hedges-300x200.jpg 300w, https://www.growerexperts.com/wp-content/uploads/2020/09/green-beautiful-hedges-1024x683.jpg 1024w, https://www.growerexperts.com/wp-content/uploads/2020/09/green-beautiful-hedges-767x512.jpg 767w, https://www.growerexperts.com/wp-content/uploads/2020/09/green-beautiful-hedges-1536x1025.jpg 1536w, https://www.growerexperts.com/wp-content/uploads/2020/09/green-beautiful-hedges-2048x1366.jpg 2048w, https://www.growerexperts.com/wp-content/uploads/2020/09/green-beautiful-hedges-788x525.jpg 788w" width="700"><noscript data-dcnode-id="340"><span data-dcnode-id="341" instrument_node="">&lt;img width="700" height="467" src="https://www.growerexperts.com/wp-content/uploads/2020/09/green-beautiful-hedges.jpg" alt="green beautiful hedges" class="wp-image-3746 lazyload" srcset="https://www.growerexperts.com/wp-content/uploads/2020/09/green-beautiful-hedges.jpg 700w, https://www.growerexperts.com/wp-content/uploads/2020/09/green-beautiful-hedges-300x200.jpg 300w, https://www.growerexperts.com/wp-content/uploads/2020/09/green-beautiful-hedges-1024x683.jpg 1024w, https://www.growerexperts.com/wp-content/uploads/2020/09/green-beautiful-hedges-767x512.jpg 767w, https://www.growerexperts.com/wp-content/uploads/2020/09/green-beautiful-hedges-1536x1025.jpg 1536w, https://www.growerexperts.com/wp-content/uploads/2020/09/green-beautiful-hedges-2048x1366.jpg 2048w, https://www.growerexperts.com/wp-content/uploads/2020/09/green-beautiful-hedges-788x525.jpg 788w" sizes="(max-width: 700px) 100vw, 700px" /&gt;</span></noscript></figure><span data-dcnode-id="338" instrument_node="">
</span><p data-dcnode-id="336"><span data-dcnode-id="337" instrument_node="">There are several guidelines to keep in mind when planning when to cut back your hedges.</span></p><span data-dcnode-id="335" instrument_node="">
</span><p data-dcnode-id="330"><span data-dcnode-id="334" instrument_node="">In many areas, it’s actually illegal to disturb wild birds that may be nesting in your hedges. For example, it’s an offense under the UK the Wildlife &amp; Countryside Act to damage or destroy the nest of any wild bird while it is in use or being built. And although the WCA doesn’t specify any dates, the main bird breeding season is typically between March 1st and July 31</span><sup data-dcnode-id="332"><span data-dcnode-id="333" instrument_node="">st</span></sup><span data-dcnode-id="331" instrument_node="">.</span></p><span data-dcnode-id="329" instrument_node="">
</span><h2 data-dcnode-id="327"><span data-dcnode-id="328" instrument_node="">Check your hedges for wildlife</span></h2><span data-dcnode-id="326" instrument_node="">
</span><p data-dcnode-id="324"><span data-dcnode-id="325" instrument_node="">If you’re planning to undertake any work within these dates, I recommend checking the hedge for any signs of breeding activity before you begin – you could stake out the hedge with a pair of binoculars in hand, or gently search through the bushes for nests. You should stop working immediately if you suspect that any birds are living or nesting in your hedges. The job can always be delayed if necessary.</span></p><span data-dcnode-id="323" instrument_node="">
</span><p data-dcnode-id="321"><span data-dcnode-id="322" instrument_node="">Some plant species will not respond well to pruning at certain times of year. Others will only thrive if trimmed at set times. Typically:</span></p><span data-dcnode-id="320" instrument_node="">
</span><ul data-dcnode-id="309"><li data-dcnode-id="318"><span data-dcnode-id="319" instrument_node="">Coniferous hedges shouldn’t be trimmed after August, as this can encourage&nbsp;bare patches&nbsp;to develop in the hedge.</span></li><li data-dcnode-id="316"><span data-dcnode-id="317" instrument_node="">Evergreen hedges shouldn’t be clipped when they are dry, so during the summer, you should water the hedge the evening before you trim it.</span></li><li data-dcnode-id="314"><span data-dcnode-id="315" instrument_node="">Some flowering shrubs, like camellias, flower from late summer through winter and require spring pruning.</span></li><li data-dcnode-id="312"><span data-dcnode-id="313" instrument_node="">Shrubs that flower in the spring or summer should be pruned immediately afterwards regardless of the season.</span></li><li data-dcnode-id="310"><span data-dcnode-id="311" instrument_node="">If a plant produces flower buds on old wood soon after it finishes the current season’s bloom, always prune it afterwards.</span></li></ul><span data-dcnode-id="308" instrument_node="">
</span><h2 data-dcnode-id="306"><span data-dcnode-id="307" instrument_node="">How far can you trim back hedges?</span></h2><span data-dcnode-id="305" instrument_node="">
</span><p data-dcnode-id="303"><span data-dcnode-id="304" instrument_node="">While some hedge plants can thrive after a hard pruning, others require more delicate handling. In fact, many deciduous shrubs can be kept healthy and vigorous simply by removing a few of their largest, oldest stems every 2-3 years.</span></p><span data-dcnode-id="302" instrument_node="">
</span><p data-dcnode-id="300"><span data-dcnode-id="301" instrument_node="">If your hedges do become overgrown, leggy, or shaggy, proper pruning can renew or rejuvenate them. You can do this gradually, by pruning them back over a 3-year period:</span></p><span data-dcnode-id="299" instrument_node="">
</span><ul data-dcnode-id="292"><li data-dcnode-id="297"><span data-dcnode-id="298" instrument_node="">Remove one-third of the large, old stems at ground level in late winter or early spring</span></li><li data-dcnode-id="295"><span data-dcnode-id="296" instrument_node="">The following year, prune out half of the remaining old stems and some of the new growth, leaving several well-spaced, vigorous shoots</span></li><li data-dcnode-id="293"><span data-dcnode-id="294" instrument_node="">Remove all of the remaining old wood in late winter or early spring of the third year and thin out the new shoots.</span></li></ul><span data-dcnode-id="291" instrument_node="">
</span><h2 data-dcnode-id="289"><span data-dcnode-id="290" instrument_node="">Severe pruning</span></h2><span data-dcnode-id="288" instrument_node="">
</span><p data-dcnode-id="286"><span data-dcnode-id="287" instrument_node="">A second, more severe way to prune overgrown, deciduous shrubs is to cut them back to within 4 to 6 inches of the ground in March or early April. This encourages a large number of shoots to develop during the next growing season. In late winter of the following year, you should choose several strong, healthy shoots to retain and then remove all the others at ground level. If you want to encourage branching, you can also back the shoots that you’ve kept.</span></p><span data-dcnode-id="285" instrument_node="">
</span><p data-dcnode-id="283"><span data-dcnode-id="284" instrument_node="">While overgrown lilacs, honeysuckles, dogwoods, spireas, and forsythias may be pruned in this manner, it’s important to note that your lilacs will be unlikely to bloom for 3-5 years after a hard pruning.</span></p><span data-dcnode-id="282" instrument_node="">
</span><p data-dcnode-id="280"><span data-dcnode-id="281" instrument_node="">Deciduous, formal hedges that become too sparse or leggy can also be rejuvenated by pruning them back to within 4 to 6 inches of the ground in late winter or early spring. For a full, thick hedge, you can prune the shoots often as they grow back over the spring and summer.</span></p><span data-dcnode-id="279" instrument_node="">
</span><h2 data-dcnode-id="277"><span data-dcnode-id="278" instrument_node="">Can you trim a hedge too much?</span></h2><span data-dcnode-id="276" instrument_node="">
</span><p data-dcnode-id="274"><span data-dcnode-id="275" instrument_node="">Overgrown evergreens, such as junipers, can be a problem as they tend to develop bare spots or dead zones in their centers. They can’t handle a hard pruning because they’re unable to develop new growth from bare branches. So, junipers that have become too large or unattractive should instead be removed and replaced with new shrubs.</span></p><span data-dcnode-id="273" instrument_node="">
</span><p data-dcnode-id="271"><span data-dcnode-id="272" instrument_node="">Remember that your hedge should be fertilized and watered deeply after a severe trimming to give the plant the nutrients and water it needs to support vigorous new growth – particularly as it now has few leaves with which to photosynthesize and produce its own energy. Without this extra help, a hedge may struggle to recover after a hard pruning.</span></p><span data-dcnode-id="270" instrument_node="">
</span><h2 data-dcnode-id="268"><span data-dcnode-id="269" instrument_node="">When is the best time to cut your hedges back?</span></h2><span data-dcnode-id="267" instrument_node="">
</span><p data-dcnode-id="265"><span data-dcnode-id="266" instrument_node="">To encourage even growth of your hedge plant, trim it at the right time of year – but every plant species may have a different schedule.</span></p><span data-dcnode-id="264" instrument_node="">
</span><p data-dcnode-id="262"><span data-dcnode-id="263" instrument_node="">So, when is it best to cut back your hedges? As a general rule, the dormant period over winter is the best time to prune and trim back your hedges, but dead wood and smaller branches can be removed at any time. Late winter and early spring are the best times to cut back an overgrown hedge and summer is best for the smaller, more precise trims meant to shape the hedge and control its height.</span></p><span data-dcnode-id="261" instrument_node="">
</span><p data-dcnode-id="259"><span data-dcnode-id="260" instrument_node="">Informal hedges can usually be trimmed annually and more formal hedge should be pruned twice every year – some may even need three cuts a year to look their best. Cutting back new growth at the top of the plant in the spring leads to a thicker hedge in the Summer and trimming into late autumn or early winter will encourage root growth.</span></p><span data-dcnode-id="258" instrument_node="">
</span><p data-dcnode-id="256"><span data-dcnode-id="257" instrument_node="">Or, you could create some topiaries and spend a little time each week grooming and prodding them into fantastical shapes. What do you say?</span></p><span data-dcnode-id="255" instrument_node="">
</span></div><span data-dcnode-id="252" instrument_node="">
