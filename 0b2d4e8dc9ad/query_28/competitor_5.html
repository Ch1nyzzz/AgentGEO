</span><h1 class="page-title" data-dcnode-id="1117"><span data-dcnode-id="1118" instrument_node="">How to Plant Trees and Shrubs</span></h1><span data-dcnode-id="1116" instrument_node="">
</span><span class="blog-author" data-dcnode-id="1112"><span data-dcnode-id="1115" instrument_node="">By </span><a data-dcnode-id="1113" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.milorganite.com/blog/authors/joe-lampl-green-expert"><span data-dcnode-id="1114" instrument_node="">Joe Lamp’l</span></a></span><span data-dcnode-id="1111" instrument_node=""> </span><em data-dcnode-id="1109"><span data-dcnode-id="1110" instrument_node="">- Gardening Expert and Host of Growing a Greener World®</span></em><br data-dcnode-id="1108"><span data-dcnode-id="1107" instrument_node="">
</span><span class="blog-posted" data-dcnode-id="1105"><span data-dcnode-id="1106" instrument_node="">April 5, 2022</span></span><br data-dcnode-id="1104"><br data-dcnode-id="1103"><span data-dcnode-id="1102" instrument_node="">
</span><h2 data-dcnode-id="1100"><span data-dcnode-id="1101" instrument_node="">The Right Way to Plant Trees and Shrubs - Seven Steps to Ensure Success</span></h2><span data-dcnode-id="1099" instrument_node="">
</span><p data-dcnode-id="1097"><span data-dcnode-id="1098" instrument_node="">In my experience, there are seven key steps to ensure full establishment of newly planted trees and shrubs. And fall is the absolute very best time to get them in the ground. Simply stated, if you want to give your plants the best chance of establishing in the landscape by next spring, plant them in fall!</span></p><span data-dcnode-id="1096" instrument_node="">
</span><p data-dcnode-id="1094"><span data-dcnode-id="1095" instrument_node="">Before I get into the seven important steps to planting success, let me explain why fall is the best time for planting trees and shrubs.</span></p><span data-dcnode-id="1093" instrument_node="">
</span><p data-dcnode-id="1091"><span data-dcnode-id="1092" instrument_node="">First, this season offers the maximum amount of time for new plants to settle in before the heat and stress of next summer.</span></p><span data-dcnode-id="1090" instrument_node="">
</span><p data-dcnode-id="1088"><span data-dcnode-id="1089" instrument_node="">Secondly, above ground, the cooler air is kinder to plant foliage and reduces the chances of an energy-zapping chain reaction throughout the rest of the plant. Beneath the surface, soil temperatures are still warm which provides an excellent environment to stimulate and foster new root growth. Collectively, it’s the cooler air and warm soil temperatures of autumn that make for the best combination for establishment. If you plant in fall, in most, but not all cases, they should be well-established by next summer.</span></p><span data-dcnode-id="1087" instrument_node="">
</span><p data-dcnode-id="1082"><span data-dcnode-id="1086" instrument_node="">The third benefit to fall </span><a data-dcnode-id="1084" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.milorganite.com/blog/trees-shrubs/transplanting-trees-and-shrubs" target="_blank"><span data-dcnode-id="1085" instrument_node="">transplanting</span></a><span data-dcnode-id="1083" instrument_node=""> is that many plants and trees are entering a period of dormancy. Without the need to allocate resources into foliage, plants now shift their energy into root development and storing nutrients and resources for the cool months ahead. While conditions are most favorable now, that is not to say you just plant it and forget it.</span></p><span data-dcnode-id="1081" instrument_node="">
</span><p data-dcnode-id="1079"><span data-dcnode-id="1080" instrument_node="">For the best chance of success, follow these&nbsp;seven important steps for all your fall transplants to reach their full potential:</span></p><span data-dcnode-id="1078" instrument_node="">
</span><p data-dcnode-id="1076"><img alt="man digging a hole for a tree" data-dcnode-id="1077" height="450" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.milorganite.com/application/files/4916/4856/3751/Planting_Trees_and_Shrubs_-_Digging_Hole_900x450-min.jpg&amp;raw" width="900"></p><span data-dcnode-id="1075" instrument_node="">
</span><p data-dcnode-id="1073"><span data-dcnode-id="1074" instrument_node="">&nbsp;</span></p><span data-dcnode-id="1072" instrument_node="">
</span><h3 data-dcnode-id="1070"><span data-dcnode-id="1071" instrument_node="">1. Prepare the proper planting hole for trees and shrubs.</span></h3><span data-dcnode-id="1069" instrument_node="">
</span><p data-dcnode-id="1067"><span data-dcnode-id="1068" instrument_node="">How deep should the soil be when planting trees and shrubs? When preparing any hole for tree planting, make it two to three times wider than the current root mass but never deeper than the plant was growing in its previous environment. With trees, an even better guide is to look for the flare of the trunk near the soil level. Don’t place the tree in the planting hole so deep that any part of that flair is covered with soil. The truth is, even nurseries sometimes put plants in containers too deeply. There have been many times where I’ve actually had to pull away soil to find the base of the trunk flair and true surface roots. Make a habit of checking this.</span></p><span data-dcnode-id="1066" instrument_node="">
</span><h3 data-dcnode-id="1064"><span data-dcnode-id="1065" instrument_node="">2. Plant trees and shrubs high.</span></h3><span data-dcnode-id="1063" instrument_node="">
</span><p data-dcnode-id="1058"><span data-dcnode-id="1062" instrument_node="">I go even one step further by placing transplants in their new environment with up to 25% of the root ball higher than the surrounding soil level. I then taper the soil up to cover all the roots and add a generous layer of mulch above that. Newly disturbed soil has a tendency to settle and shrubs and trees planted below grade can easily succumb to root rot or </span><a data-dcnode-id="1060" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.milorganite.com/blog/trees-shrubs/whats-wrong-my-tree" target="_blank"><span data-dcnode-id="1061" instrument_node="">disease</span></a><span data-dcnode-id="1059" instrument_node="">. In my book, it’s always better to plant a tree or shrub slightly high and allow the area to drain than for a plant to sit in a bowl and collect excess water. More plants die from over-watering (drowning) than under watering.</span></p><span data-dcnode-id="1057" instrument_node="">
</span><p data-dcnode-id="1055"><img alt="measuring depth of hole for tree" data-dcnode-id="1056" height="450" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.milorganite.com/application/files/5516/4856/3751/Planting_Trees_and_Shrubs_-_measuring_hole__900x450-min.jpg&amp;raw" width="900"></p><span data-dcnode-id="1054" instrument_node="">
</span><p data-dcnode-id="1051"><em data-dcnode-id="1052"><span data-dcnode-id="1053" instrument_node="">Tip:&nbsp;An easy way to know if your hole is at the right depth is to take your shovel handle and lay it across the grade. The top of the root ball or tree flare should be at or above the handle level.</span></em></p><span data-dcnode-id="1050" instrument_node="">
</span><h3 data-dcnode-id="1048"><span data-dcnode-id="1049" instrument_node="">3. Inspect tree roots and disturb them when necessary.</span></h3><span data-dcnode-id="1047" instrument_node="">
</span><p data-dcnode-id="1045"><span data-dcnode-id="1046" instrument_node="">Once the plant is out of its container, look at the roots. If they are densely bound in a circular pattern or have started growing in the shape of the container, break up the pattern. I can’t emphasize this enough!</span></p><span data-dcnode-id="1044" instrument_node="">
</span><p data-dcnode-id="1042"><span data-dcnode-id="1043" instrument_node="">It’s more important to stop this pattern now than worry about hurting the roots. The biggest mistake you can make at this point is to place a root-bound plant into the ground as is. Unless you break up the pattern, you’ve likely sentenced the plant to a slow (or rapid) death. At a minimum, it will likely never establish or reach a fraction of its potential. Keep in mind, this is your only real chance to do this. And if you’re hiring someone to do your planting for you, insist they do the same. I have seen many trees and shrubs die within months of planting because no one took the time to break up the root-bound pattern. Even though the plants were being watered, the roots were so tightly wound, they couldn’t take it up.</span></p><span data-dcnode-id="1041" instrument_node="">
</span><p data-dcnode-id="1039"><span data-dcnode-id="1040" instrument_node="">Don’t worry about hurting the roots or losing soil as you break the roots apart or even cut some away. Better to give them a fresh start than allow the constrictive pattern to only get worse below ground. While you don’t want to be any rougher than necessary, do what you must to arrest the pattern. I often scratch my fingers across the sides and bottom of the plant, even in mild cases. In more severe situations, I’ll slice up the roots vertically, hack off the bottom inch or so, and or pull apart the root mass to clearly create opportunities for non-circular new root development.</span></p><span data-dcnode-id="1038" instrument_node="">
</span><h3 data-dcnode-id="1036"><span data-dcnode-id="1037" instrument_node="">4. When to amend the soil.</span></h3><span data-dcnode-id="1035" instrument_node="">
</span><p data-dcnode-id="1030"><span data-dcnode-id="1034" instrument_node="">Another reason for digging a wide planting hole is to provide the best opportunity for roots to expand into their new growing environment. Unfortunately, all too often, we dig a hole that is barely wide enough for the root ball and expect to compensate by adding some </span><a data-dcnode-id="1032" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.milorganite.com/blog/garden-landscape/create-healthy-soil" target="_blank"><span data-dcnode-id="1033" instrument_node="">soil amendments</span></a><span data-dcnode-id="1031" instrument_node="">. While in theory, this sounds reasonable, in practice, it’s a false sense of security that can lead to poor establishment.&nbsp;</span></p><span data-dcnode-id="1029" instrument_node="">
</span><p data-dcnode-id="1021"><span data-dcnode-id="1028" instrument_node="">I’ll be the first to say, any time you can improve your soil with organic matter or Certified </span><a data-dcnode-id="1026" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.milorganite.com/blog/garden-landscape/composting-landscape" target="_blank"><span data-dcnode-id="1027" instrument_node="">Compost</span></a><span data-dcnode-id="1025" instrument_node=""> is </span><i data-dcnode-id="1023"><span data-dcnode-id="1024" instrument_node="">almost</span></i><span data-dcnode-id="1022" instrument_node=""> always a good thing. But in cases where the planting hole is insufficiently wide, studies show roots tend to not spread out into beyond the narrow planting hole, instead opting for the luxury conditions of the amended soil where they tend to stay. Instead, dig a hole wide enough to reasonably accommodate the root zone at a plant’s maturity. The benefit is ample opportunity for full root expansion, and in a soil environment that is greatly improved.</span></p><span data-dcnode-id="1020" instrument_node="">
</span><h3 data-dcnode-id="1018"><span data-dcnode-id="1019" instrument_node="">5. Eliminate air pockets when planting trees.</span></h3><span data-dcnode-id="1017" instrument_node="">
</span><p data-dcnode-id="1015"><span data-dcnode-id="1016" instrument_node="">Be sure to lightly tamp or hand-pack the soil around the plant roots to ensure good soil to root contact. I add water to the hole after backfilling half way. Not only does it provide needed moisture but also the water helps eliminate air pockets that could otherwise result in dead roots.</span></p><span data-dcnode-id="1014" instrument_node="">
</span><p data-dcnode-id="1012"><span data-dcnode-id="1013" instrument_node="">Water again thoroughly once all the soil is in place. I like to use a hose-end nozzle or wand that delivers a strong blast of water to break up clumpy soil and allow new soil to fill in and settle into those vacated air pockets.</span></p><span data-dcnode-id="1011" instrument_node="">
</span><p data-dcnode-id="1009"><img alt="man mulching around tree" data-dcnode-id="1010" height="450" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.milorganite.com/application/files/8816/4856/3752/Planting_Trees_and_Shrubs_-_mulch__900x450-min.jpg&amp;raw" width="900"></p><span data-dcnode-id="1008" instrument_node="">
</span><h3 data-dcnode-id="1006"><span data-dcnode-id="1007" instrument_node="">6. Add mulch.</span></h3><span data-dcnode-id="1005" instrument_node="">
</span><p data-dcnode-id="1003"><span data-dcnode-id="1004" instrument_node="">Place about three inches of organic matter such as shredded leaves, or ground bark, or wood mulch around the plant, at least out to the drip line. Further is better. Mulch helps retain much-needed moisture and helps keep roots cooler near the surface—a very important requirement for newly installed plants.</span></p><span data-dcnode-id="1002" instrument_node="">
</span><h3 data-dcnode-id="1000"><span data-dcnode-id="1001" instrument_node="">7. Watering new trees and shrubs.</span></h3><span data-dcnode-id="999" instrument_node="">
</span><p data-dcnode-id="997"><span data-dcnode-id="998" instrument_node="">The most important job you will have after planting is to keep plants and trees well-watered until established. This can take weeks to months to even a year!</span></p><span data-dcnode-id="996" instrument_node="">
</span><p data-dcnode-id="994"><span data-dcnode-id="995" instrument_node="">Since installing over 200 trees and shrubs in my landscape this fall, I’ve watered every plant every day (here in Atlanta) for about the first two weeks. For the next two weeks, I ease off slightly but no less than every other day. Then gradually ease back from there.</span></p><span data-dcnode-id="993" instrument_node="">
</span><div class="row" data-dcnode-id="465"><div class="col-sm-6" data-dcnode-id="985"><span data-dcnode-id="992" instrument_node="">
</span><p data-dcnode-id="990"><span data-dcnode-id="991" instrument_node="">Be aware there’s a fine line between watering enough and watering too much—especially with large trees that arrive with root balls wrapped in burlap. These trees have lost all their feeder roots when dug from the ground. Providing adequate water is critical to their survival and establishment. Yet I’ve killed more than one tree like this by over-watering. Even if you prepare a large planting hole when drainage is poor, the root ball may be sitting in water and literally drowning, and you won’t know realize it until it’s too late.</span></p><span data-dcnode-id="989" instrument_node="">
</span><p data-dcnode-id="987"><span data-dcnode-id="988" instrument_node="">There’s no easy way to know deep down how wet the soil is. The best advice I can offer is to pay close attention to how the tree responds (and all your plants for that matter). While it’s common for them to lose up to half their leaves to stress (a normal part of the process), more can indicate a potential problem. If you sense the tree is responding poorly, and you are watering consistently, you’re likely over-watering. If the leaves are turning brown, burning around the margins, drying up, or falling off, and the soil appears dry, water more.</span></p><span data-dcnode-id="986" instrument_node="">

lt;a href="https://www.youtube.com/watch?v=8JSCBbOpXmA" target="_blank"&gt;Try watching this video on www.youtube.com&lt;/a&gt;, or enable JavaScript if it is disabled in your browser.&lt;/div&gt;&lt;/div&gt;</span></noscript></body></html></iframe><span data-dcnode-id="469" instrument_node="">

</span><div class="row" data-dcnode-id="426"><div class="col-sm-12" data-dcnode-id="427"><span data-dcnode-id="463" instrument_node="">
</span><p data-dcnode-id="461"><span data-dcnode-id="462" instrument_node="">To add to the challenge, soil that appears dry at the top, may be very wet a few inches down. And the opposite is true as well. All the more reason it is important to apply your detective skills based on observation and knowing how much or little you’ve been watering. Finally, winter conditions can be very dry. Occasional watering throughout the season may be necessary to prevent plants from becoming too dry. Roots are still growing and soil moisture is essential for proper establishment.</span></p><span data-dcnode-id="460" instrument_node="">
</span><h4 data-dcnode-id="456"><em data-dcnode-id="457"><strong data-dcnode-id="458"><span data-dcnode-id="459" instrument_node="">And don’t assume that once spring arrives, your supplemental irrigation duties are behind you. My case is a perfect example.</span></strong></em></h4><span data-dcnode-id="455" instrument_node="">
</span><p data-dcnode-id="453"><span data-dcnode-id="454" instrument_node="">When spring arrived, it was unseasonably hot and dry. Even though I had been diligent about consistently watering through fall and into winter, many of my plants were not yet able to make it on their own without continual supplemental irrigation help from me. In fact, summer was even worse, with high steady temperatures and no rain. I spent hours every week going from plant to plant giving them a thorough soaking.</span></p><span data-dcnode-id="452" instrument_node="">
</span><p data-dcnode-id="450"><span data-dcnode-id="451" instrument_node="">One of the best time-savers you can find to lighten the load and put some of your irrigation duties on auto-pilot is to use soaker hoses and/or drip irrigation combined with portable battery-operated timers. Perhaps my best specimen tree in my entire landscape was part of this transplanting challenge last fall. Without the help of my soaker hoses on timers, I’m not sure it would have survived the relocation. But now it’s thriving and I can safely say, having the right equipment on hand made the difference. If you have a tree or shrub you can’t afford to lose, invest in soaker hoses and timers. I cannot stress the importance of this enough!</span></p><span data-dcnode-id="449" instrument_node="">
</span><p data-dcnode-id="447"><img alt="irrigation hose around tree" data-dcnode-id="448" height="450" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.youtube.com/application/files/4516/4856/3751/Planting_Trees_and_Shrubs_-_irrigating_tree__900x450-min.jpg&amp;raw" width="900"></p><span data-dcnode-id="446" instrument_node="">
</span><h3 data-dcnode-id="444"><span data-dcnode-id="445" instrument_node="">When to Fertilize Trees and Shrubs?</span></h3><span data-dcnode-id="443" instrument_node="">
</span><p data-dcnode-id="438"><span data-dcnode-id="442" instrument_node="">Once you know your trees and shrubs have taken to their new environment through the successful establishment, you can now begin a </span><a data-dcnode-id="440" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.milorganite.com/gardening/trees-and-shrubs/tree-and-shrub-application-rates" target="_blank"><span data-dcnode-id="441" instrument_node="">fertilization routine</span></a><span data-dcnode-id="439" instrument_node=""> to help feed your plants. But I don’t suggest fertilization until then. Otherwise, you’re putting undue stress on plants that don’t need to be exerting extra energy to put on new growth. Instead, until established, my opinion is that all energy should be concentrated on root development and basic establishment. Remember, you have to walk before you can run.</span></p><span data-dcnode-id="437" instrument_node="">
</span><p data-dcnode-id="432"><span data-dcnode-id="436" instrument_node="">But when the time is right, I still like to play it safe. I use&nbsp;</span><a data-dcnode-id="434" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.milorganite.com/gardening/trees-and-shrubs/tree-and-shrub-application-rates"><span data-dcnode-id="435" instrument_node="">Milorganite®,</span></a><span data-dcnode-id="433" instrument_node="">&nbsp;a slow-release, non-burning fertilizer that I know will do the job without the risk of over-taxing my plants.</span></p><span data-dcnode-id="431" instrument_node="">
</span><p data-dcnode-id="429"><span data-dcnode-id="430" instrument_node="">While the above steps are critical to success, there will never be a better time of year than fall to relocate trees and shrubs or plant new ones. It’s easier on you and the plants. Once established, you’ll be rewarded for your efforts for forever more.</span></p><span data-dcnode-id="428" instrument_node="">
