</span><article class="et_pb_post post-4914 post type-post status-publish format-standard has-post-thumbnail category-tree-maintenance tag-apple tag-apple-tree tag-arboriculture tag-arborist tag-cherry tag-cherry-tree tag-fruit tag-fruit-trees tag-lemon tag-lemon-tree tag-orange tag-orange-tree tag-pruning tag-season tag-tree tag-trees" data-dcnode-id="183" id="post-4914"><span data-dcnode-id="368" instrument_node="">
</span><div class="et_post_meta_wrapper" data-dcnode-id="346"><span data-dcnode-id="367" instrument_node="">
</span><h1 class="entry-title" data-dcnode-id="365"><span data-dcnode-id="366" instrument_node="">The Best Time to Prune Fruit Trees</span></h1><span data-dcnode-id="364" instrument_node="">
</span><p class="post-meta" data-dcnode-id="349"><span data-dcnode-id="363" instrument_node=""> by </span><span class="author" data-dcnode-id="360"><a data-dcnode-id="361" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.traversotree.com/author/liaw/" rel="author" title="Posts by Lia White"><span data-dcnode-id="362" instrument_node="">Lia White</span></a></span><span data-dcnode-id="359" instrument_node=""> | </span><span class="published" data-dcnode-id="357"><span data-dcnode-id="358" instrument_node="">Nov 10, 2021</span></span><span data-dcnode-id="356" instrument_node=""> | </span><a data-dcnode-id="354" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.traversotree.com/category/tree-maintenance/"><span data-dcnode-id="355" instrument_node="">Tree Maintenance</span></a><span data-dcnode-id="353" instrument_node=""> | </span><span class="comments-number" data-dcnode-id="350"><a data-dcnode-id="351" href="#respond"><span data-dcnode-id="352" instrument_node="">0 comments</span></a></span></p><img alt="" class="" data-dcnode-id="348" height="675" sizes="(min-width: 0px) and (max-width: 480px) 480px, (min-width: 481px) and (max-width: 980px) 980px, (min-width: 981px) 1080px, 100vw" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.traversotree.com/wp-content/uploads/2021/11/jen-theodore-P96rE0gVVLs-unsplash-1080x675.jpg&amp;raw" srcset="https://www.traversotree.com/wp-content/uploads/2021/11/jen-theodore-P96rE0gVVLs-unsplash-980x653.jpg 980w, https://www.traversotree.com/wp-content/uploads/2021/11/jen-theodore-P96rE0gVVLs-unsplash-480x320.jpg 480w" width="1080"><span data-dcnode-id="347" instrument_node="">
</span></div><span data-dcnode-id="345" instrument_node=""> </span><span data-dcnode-id="343" instrument_node="">
</span><div class="entry-content" data-dcnode-id="255"><span data-dcnode-id="342" instrument_node="">
</span><p data-dcnode-id="340"><span data-dcnode-id="341" instrument_node="">Whether you have had fruit trees for years, inherited a fruit tree on the property you just purchased, or are toying with the idea of planting one, owning a fruit tree can be fun. It is satisfying to be able to harvest food from your own yard and be part of the “eat local” movement so prevalent today.&nbsp; &nbsp; &nbsp; &nbsp; &nbsp; &nbsp;</span></p><span data-dcnode-id="339" instrument_node="">
</span><p data-dcnode-id="333"><strong data-dcnode-id="335"><span data-dcnode-id="338" instrument_node="">“Can I plant a fruit tree to replace my ornamental tree?”</span><br data-dcnode-id="337"><span data-dcnode-id="336" instrument_node="">
</span></strong><span data-dcnode-id="334" instrument_node="">This is a question sometimes asked by clients deciding on what kind of replacement tree to plant. The answer is of course! You can treat any fruit tree as an ornamental tree, enjoy its beautiful blooms in spring, green foliage in summer, and colorful leaves in fall. However, you should be prepared to deal with the fruit, as it will attract wildlife (which can be a bonus depending on how you view it), break branches if allowed to overproduce, and drop fruit on the ground that will rot if not picked up. As long as the pros outweigh the cons in your mind, then yes, plant a fruit tree.&nbsp;</span></p><span data-dcnode-id="332" instrument_node="">
</span><p data-dcnode-id="326"><strong data-dcnode-id="328"><span data-dcnode-id="331" instrument_node="">How important is it to prune my fruit tree?&nbsp;</span><br data-dcnode-id="330"><span data-dcnode-id="329" instrument_node="">
</span></strong><span data-dcnode-id="327" instrument_node="">Timing and method of fruit tree pruning can enhance the amount and quality of your crop, and will also create an open scaffold that is strong enough to bear all those beautiful fruits without breaking branches. Plus, it will open up the center of the tree to allow more sunlight into the interior and reduce the incidence of disease.&nbsp;</span></p><span data-dcnode-id="325" instrument_node="">
</span><p data-dcnode-id="319"><strong data-dcnode-id="321"><span data-dcnode-id="324" instrument_node="">Can I prune my fruit tree myself?</span><br data-dcnode-id="323"><span data-dcnode-id="322" instrument_node="">
</span></strong><span data-dcnode-id="320" instrument_node="">Yes, you can! If you are ambitious and have the tools and the time, you can prune your fruit tree. And if you are not sure how, there are plenty of YouTube videos, books, and fruit tree pruning classes at the local nurseries to help you with the process. But if you would rather have someone else do the work, Traverso Tree Service can help you professionally prune your fruit tree.&nbsp;</span></p><span data-dcnode-id="318" instrument_node="">
</span><p data-dcnode-id="312"><strong data-dcnode-id="314"><span data-dcnode-id="317" instrument_node="">When is the best time to prune my fruit tree?</span><br data-dcnode-id="316"><span data-dcnode-id="315" instrument_node="">
</span></strong><span data-dcnode-id="313" instrument_node="">You may not want to hear this but the best time to prune fruit trees is right when they are planted and then twice a year (once during the winter and in the summer) for the next three years. The goal is to establish a well-structured, low branching tree (so it is easier to harvest the fruit) where the roots are in balance with the canopy.</span></p><span data-dcnode-id="311" instrument_node="">
</span><p data-dcnode-id="305"><strong data-dcnode-id="307"><span data-dcnode-id="310" instrument_node="">But my fruit tree is not young, so when is the best time to prune my mature tree?&nbsp;</span><br data-dcnode-id="309"><span data-dcnode-id="308" instrument_node="">
</span></strong><span data-dcnode-id="306" instrument_node="">This is the number one question we get from clients about their fruit trees. The best time is during the dormant season, after the tree has dropped all its leaves and fruit and before bud break in spring, which means that in Northern California, the best time is December to mid-February, depending on how warm a winter we have. The reason is that it is easier to see the structure of the tree and we can more easily identify buds when the tree is bare.</span></p><span data-dcnode-id="304" instrument_node="">
</span><p data-dcnode-id="298"><strong data-dcnode-id="300"><span data-dcnode-id="303" instrument_node="">DO NOT PRUNE apricots or cherries in the winter</span><br data-dcnode-id="302"><span data-dcnode-id="301" instrument_node="">
</span></strong><span data-dcnode-id="299" instrument_node="">Cherries, apricots, and a few related species are particularly susceptible to fungal and bacterial canker diseases that are spread during rainy, wet weather, so it is recommended these trees be pruned in the summer during the dry summer season.</span></p><span data-dcnode-id="297" instrument_node="">
</span><p data-dcnode-id="289"><strong data-dcnode-id="291"><span data-dcnode-id="296" instrument_node="">What about my lemon tree, when is the best time to prune it?</span><a data-dcnode-id="294" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.traversotree.com/wp-content/uploads/2021/11/tim-mossholder-Y3lyzdSfssU-unsplash-scaled.jpg"><img alt="" class="wp-image-4915 alignright" data-dcnode-id="295" height="290" loading="lazy" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.traversotree.com/wp-content/uploads/2021/11/tim-mossholder-Y3lyzdSfssU-unsplash-scaled.jpg&amp;raw" width="434"></a><br data-dcnode-id="293"><span data-dcnode-id="292" instrument_node="">
</span></strong><span data-dcnode-id="290" instrument_node="">All citrus trees (lemon, orange, lime, or grapefruit) are frost tender, so the goal is to protect the tree in case temperatures drop below 32 degrees. You want to have a layer of foliage to help protect the inner structure of the tree from frost damage. If you prune your citrus tree in late fall you may remove that protective layer and make your tree more susceptible to damage in case we have a hard freeze. Therefore, it is recommended to prune citrus after all danger of frost is gone and before winter, so anytime between April and August.&nbsp;</span></p><span data-dcnode-id="288" instrument_node="">
</span><p data-dcnode-id="282"><strong data-dcnode-id="284"><span data-dcnode-id="287" instrument_node="">What happens if I miss the dormant season?&nbsp;&nbsp;</span><br data-dcnode-id="286"><span data-dcnode-id="285" instrument_node="">
</span></strong><span data-dcnode-id="283" instrument_node="">It’s early March and your fruit tree is full of blossoms, did you blow it and miss the fruit tree pruning season? Can you still prune your fruit tree in April or May? Or is it better to wait until next year? Like so much of tree work, it depends. Having one of our certified arborists evaluate your fruit tree will help you decide what is your best option. They may recommend waiting until the following year or doing some light pruning to remove dead, damaged, heavy, or dying branches, even if it means pruning in April. However, you want to be careful and not overly stress your tree during this prime growing season, which would also put it at risk of sun scalding, disease, or pest infestations.</span></p><span data-dcnode-id="281" instrument_node="">
</span><p data-dcnode-id="275"><strong data-dcnode-id="277"><span data-dcnode-id="280" instrument_node="">What about pruning in the summer?&nbsp;</span><br data-dcnode-id="279"><span data-dcnode-id="278" instrument_node="">
</span></strong><span data-dcnode-id="276" instrument_node="">Summer pruning has many advantages, such as keeping an over-exuberant young fruit tree in check. Young trees if left alone can sprout up to 30′, putting the fruit out of easy reach and expending unnecessary energy. Removing unwanted branches in summer redirects the tree’s energy into the branches that are desired, and hastens their growth.&nbsp;</span></p><span data-dcnode-id="274" instrument_node="">
</span><p data-dcnode-id="264"><strong data-dcnode-id="270"><span data-dcnode-id="273" instrument_node="">I know I should prune in the dormant season but I forget and when I call Traverso Tree Service they are scheduling past the dormant season.</span><br data-dcnode-id="272"><span data-dcnode-id="271" instrument_node="">
</span></strong><span data-dcnode-id="269" instrument_node="">You are not alone. Because of the loyalty of our clients, we often book up many weeks in advance, making it difficult to schedule tree work, especially during the dormant season. However, we have created a solution. Our Annual Pruning Program is designed to help. By sending an email or calling our office, you can request to be enrolled in our Annual Pruning Program. Or you can go to our web page and fill out the form on our </span><span data-dcnode-id="266" style="text-decoration: underline;"><a data-dcnode-id="267" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.traversotree.com/services/annual-pruning-program/"><span data-dcnode-id="268" instrument_node="">Annual Pruning page.</span></a></span><span data-dcnode-id="265" instrument_node="">&nbsp;Just tell us what month you want to have the tree work done and we will email you a reminder when we start scheduling work for that month. For example, if you want to prune your apple tree in December, we’ll send you a reminder email to get on our schedule once we start booking work that month (which could be as early as September!). That doesn’t automatically mean you are on the schedule, you need to respond with either an email or phone call and ask for a bid to have your fruit tree pruned. We can reserve you time in December until one of our arborists can provide you with a bid. You are under no obligation to have us prune your tree if you decide you want to skip a year.</span></p><span data-dcnode-id="263" instrument_node="">
</span><p data-dcnode-id="257"><strong data-dcnode-id="259"><span data-dcnode-id="262" instrument_node="">In summary…</span><br data-dcnode-id="261"><span data-dcnode-id="260" instrument_node="">
</span></strong><span data-dcnode-id="258" instrument_node="">Having a fruit tree can be fun with tangible rewards, but it does require some effort to enjoy it to its fullest. If you have any questions about your fruit trees or would like to divert some of that “fun effort” to our crews we would be happy to help you out! Just give us a call.</span></p><span data-dcnode-id="256" instrument_node="">
</span></div><span data-dcnode-id="254" instrument_node=""> </span><span data-dcnode-id="252" instrument_node="">
