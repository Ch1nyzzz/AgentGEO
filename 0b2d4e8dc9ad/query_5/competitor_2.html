</span><h1 class="hero-page-title" data-dcnode-id="2004"><span data-dcnode-id="2005" instrument_node="">When is the Best Time to Prune Trees?</span></h1><span class="white-italic-text" data-dcnode-id="2002"><span data-dcnode-id="2003" instrument_node="">February 25, 2016</span></span><span data-dcnode-id="2001" instrument_node="">
</span><ul class="white-breadcrumbs-list" data-dcnode-id="1991"><span data-dcnode-id="2000" instrument_node="">
</span><li data-dcnode-id="1997"><a class="white-breadcrumb-link" data-dcnode-id="1998" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//blog.davey.com/"><span data-dcnode-id="1999" instrument_node="">Home</span></a></li><span data-dcnode-id="1996" instrument_node="">
</span><li data-dcnode-id="1993"><a class="white-breadcrumb-link" data-dcnode-id="1994"><span data-dcnode-id="1995" instrument_node="">When is the Best Time to Prune Trees?</span></a></li><span data-dcnode-id="1992" instrument_node="">

</span><section class="content-section" data-dcnode-id="1318"><span data-dcnode-id="1981" instrument_node="">
</span><div class="medium-center-margin-wrap" data-dcnode-id="1320"><span data-dcnode-id="1980" instrument_node="">
</span><div class="post-topics-snippet" data-dcnode-id="1960"><span data-dcnode-id="1979" instrument_node="">
</span><span class="h6" data-dcnode-id="1977"><span data-dcnode-id="1978" instrument_node="">Topics</span></span><span data-dcnode-id="1976" instrument_node="">
</span><ul class="post-topics-list" data-dcnode-id="1962"><span data-dcnode-id="1975" instrument_node="">
</span><li data-dcnode-id="1972"><a class="orange-text-link" data-dcnode-id="1973" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//blog.davey.com/%3Ft%3Dbest%2Btime%2Bto%2Bprune"><span data-dcnode-id="1974" instrument_node="">best time to prune</span></a></li><span data-dcnode-id="1971" instrument_node="">
</span><li data-dcnode-id="1968"><a class="orange-text-link" data-dcnode-id="1969" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//blog.davey.com/%3Ft%3Ddormant%2Bpruning"><span data-dcnode-id="1970" instrument_node="">dormant pruning</span></a></li><span data-dcnode-id="1967" instrument_node="">
</span><li data-dcnode-id="1964"><a class="orange-text-link" data-dcnode-id="1965" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//blog.davey.com/%3Ft%3Dbenefits%2Bof%2Bpruning"><span data-dcnode-id="1966" instrument_node="">benefits of pruning</span></a></li><span data-dcnode-id="1963" instrument_node="">
</span></ul><span data-dcnode-id="1961" instrument_node="">
</span></div><span data-dcnode-id="1959" instrument_node="">
</span><div class="new-main-copy-area" data-dcnode-id="1373"><span data-dcnode-id="1958" instrument_node="">
</span><p data-dcnode-id="1956"><span data-dcnode-id="1957" instrument_node="">After a long winter of bare branches and limbs, the bright and colorful tones of your tree’s blooms are a welcomed site, signaling the new season.</span></p><span data-dcnode-id="1955" instrument_node="">
</span><p data-dcnode-id="1953"><span data-dcnode-id="1954" instrument_node="">Underneath the striking spring scene, you’ll want to make sure your trees have a healthy structure.</span></p><span data-dcnode-id="1952" instrument_node="">
</span><p data-dcnode-id="1950"><span data-dcnode-id="1951" instrument_node="">Knowing when to trim trees keeps them healthy in the long-term&nbsp;and positions them&nbsp;for a season of robust growth.</span></p><span data-dcnode-id="1949" instrument_node="">
</span><p data-dcnode-id="1947"><span data-dcnode-id="1948" instrument_node="">Below we’re answering your most common questions about when to trim, or prune, your trees.</span></p><span data-dcnode-id="1946" instrument_node="">
</span><h2 data-dcnode-id="1943"><strong data-dcnode-id="1944"><span data-dcnode-id="1945" instrument_node="">When is the best time to prune (trim) trees?</span></strong></h2><span data-dcnode-id="1942" instrument_node="">
</span><p data-dcnode-id="1940"><span data-dcnode-id="1941" instrument_node="">Anytime between late fall and early spring is best for tree trimming or pruning. In general, after leaves drop and before flowers appear is the ideal window.</span></p><span data-dcnode-id="1939" instrument_node="">
</span><p data-dcnode-id="1937"><span data-dcnode-id="1938" instrument_node="">Talk to your local arborist about pruning before spring blooms emerge. Typically a tree's pruning cycle is 3 to 5 years, but the species, size, and health&nbsp;will dictate the optimal&nbsp;cycle for your tree.&nbsp;</span></p><span data-dcnode-id="1936" instrument_node="">
</span><h3 data-dcnode-id="1933"><strong data-dcnode-id="1934"><span data-dcnode-id="1935" instrument_node="">Why is late fall through early spring best for tree pruning? </span></strong></h3><span data-dcnode-id="1932" instrument_node="">
</span><p data-dcnode-id="1930"><span data-dcnode-id="1931" instrument_node="">Trees halt their growth starting in fall and enter a state of dormancy through the winter. This inactivity, along with dropping temperatures, creates ideal pruning conditions for the following reasons:</span></p><span data-dcnode-id="1929" instrument_node="">
</span><ul data-dcnode-id="1918"><span data-dcnode-id="1928" instrument_node="">
</span><li data-dcnode-id="1926"><span data-dcnode-id="1927" instrument_node="">Without active growth, winter pruning causes less stress on the tree. Wounds will heal better, and spring growth and blooms will be more robust.</span></li><span data-dcnode-id="1925" instrument_node="">
</span><li data-dcnode-id="1923"><span data-dcnode-id="1924" instrument_node="">Pests and diseases are less active during the dormant season and are less likely to attack fresh pruning cuts during this time.</span></li><span data-dcnode-id="1922" instrument_node="">
</span><li data-dcnode-id="1920"><span data-dcnode-id="1921" instrument_node="">The absence of leaves allows arborists to assess and access the branches more easily.</span></li><span data-dcnode-id="1919" instrument_node="">
</span></ul><span data-dcnode-id="1917" instrument_node="">
</span><p data-dcnode-id="1915"><span data-dcnode-id="1916" instrument_node="">Ultimately, pruning trees in the dormant season promotes tree health and future growth.</span></p><span data-dcnode-id="1914" instrument_node="">
</span><p data-dcnode-id="1908"><a data-dcnode-id="1910" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//blog.davey.com/media/1249875/dormant-pruning-info-graphic.pdf" target="_blank" title="dormant pruning info graphic.pdf (1)"><span data-dcnode-id="1913" instrument_node="">Check</span><span data-dcnode-id="1911"><span data-dcnode-id="1912" instrument_node=""> out</span></span></a><span data-dcnode-id="1909" instrument_node=""> our dormant pruning infographic for quick facts about pruning trees in fall and winter.</span></p><span data-dcnode-id="1907" instrument_node="">
</span><h4 data-dcnode-id="1905"><span data-dcnode-id="1906" instrument_node="">Watch the video below to see the benefits of&nbsp;trimming trees in the dormant season first-hand.</span></h4><span data-dcnode-id="1904" instrument_node="">

</span><div data-dcnode-id="675" id="postCompatContainer"><div class="comment__wrapper" data-dcnode-id="1267"><div class="comment__name clearfix" data-dcnode-id="1276"><img class="comment__avatar" data-dcnode-id="1281" height="32" src="https://c.disquscdn.com/uploads/users/26160/3403/avatar92.jpg?1590253124" width="32"/><strong data-dcnode-id="1278"><a data-dcnode-id="1279" href=""><span data-dcnode-id="1280" instrument_node="">Jennifer Lee</span></a></strong><span data-dcnode-id="1277" instrument_node=""> • 1 year ago
        </span></div><div class="comment__content" data-dcnode-id="1268"><p data-dcnode-id="1271"><a data-dcnode-id="1274" href="https://uploads.disquscdn.com/images/e28fec255e277e8517061ca1b105c09177aaf68fb99aa629f0abce518eb04e80.jpg" rel="nofollow noopener" title="https://uploads.disquscdn.com/images/e28fec255e277e8517061ca1b105c09177aaf68fb99aa629f0abce518eb04e80.jpg"><span data-dcnode-id="1275" instrument_node="">https://uploads.disquscdn.c...</span></a><a data-dcnode-id="1272" href="https://uploads.disquscdn.com/images/b8fb3580ea4fe9c883a1e4247ab4faa2af3379912143b6de9904988b1938069d.jpg" rel="nofollow noopener" title="https://uploads.disquscdn.com/images/b8fb3580ea4fe9c883a1e4247ab4faa2af3379912143b6de9904988b1938069d.jpg"><span data-dcnode-id="1273" instrument_node="">https://uploads.disquscdn.c...</span></a></p><p data-dcnode-id="1269"><span data-dcnode-id="1270" instrument_node="">My cherry tree hasn't been well for the last two years.  New leafs will have holes in them just after a few days after they come out and they fall off the tree after a few days.  We use the DIY remedy from the internet and it didn't work.  It would be great if you could let me know how to cure the distaste.  Thank you!</span></p></div></div><div class="comment__wrapper" data-dcnode-id="1251"><div class="comment__name clearfix" data-dcnode-id="1261"><img class="comment__avatar" data-dcnode-id="1266" height="32" src="https://c.disquscdn.com/uploads/users/29514/6162/avatar92.jpg?1544710278" width="32"/><strong data-dcnode-id="1263"><a data-dcnode-id="1264" href=""><span data-dcnode-id="1265" instrument_node="">The Tree Doctor</span></a></strong><span data-dcnode-id="1262" instrument_node=""> • 1 year ago
        </span></div><div class="comment__content" data-dcnode-id="1252"><p data-dcnode-id="1255"><span data-dcnode-id="1260" instrument_node="">Hello, Jennifer-</span><br data-dcnode-id="1259"/><span data-dcnode-id="1258" instrument_node="">Based on your photos, this looks like shot hole disease. The same symptoms can be caused by two types of pathogens, either bacteria or fungi, so it will be important to have an arborist diagnose this so the right treatment can be used.  If you would like you can reach out to one of our arborist here </span><a data-dcnode-id="1256" href="https://disq.us/url?url=https%3A%2F%2Fwww.davey.com%2Fresidential-tree-services%2Ffind-a-local-office%2F%3AMHHrS-en6I0vT575PIdSIce74Rg&amp;cuid=5672650" rel="nofollow noopener" title="https://www.davey.com/residential-tree-services/find-a-local-office/"><span data-dcnode-id="1257" instrument_node="">https://www.davey.com/resid...</span></a></p><p data-dcnode-id="1253"><span data-dcnode-id="1254" instrument_node="">Have a great day!</span></p></div></div><div class="comment__wrapper" data-dcnode-id="1241"><div class="comment__name clearfix" data-dcnode-id="1245"><img class="comment__avatar" data-dcnode-id="1250" height="32" src="https://c.disquscdn.com/uploads/users/26160/3403/avatar92.jpg?1590253124" width="32"/><strong data-dcnode-id="1247"><a data-dcnode-id="1248" href=""><span data-dcnode-id="1249" instrument_node="">Jennifer Lee</span></a></strong><span data-dcnode-id="1246" instrument_node=""> • 1 year ago
        </span></div><div class="comment__content" data-dcnode-id="1242"><p data-dcnode-id="1243"><span data-dcnode-id="1244" instrument_node="">Thanks.</span></p></div></div><div class="comment__wrapper" data-dcnode-id="1231"><div class="comment__name clearfix" data-dcnode-id="1235"><img class="comment__avatar" data-dcnode-id="1240" height="32" src="https://a.disquscdn.com/1647409581/images/noavatar92.png" width="32"/><strong data-dcnode-id="1237"><a data-dcnode-id="1238" href=""><span data-dcnode-id="1239" instrument_node="">Angela Tipton</span></a></strong><span data-dcnode-id="1236" instrument_node=""> • 2 years ago
        </span></div><div class="comment__content" data-dcnode-id="1232"><p data-dcnode-id="1233"><span data-dcnode-id="1234" instrument_node="">I’d like to trim/prune the too long branches of my cut leaf maple, decorative cherry tree and crab apple.  If I trim now, will that affect the flowering trees?</span></p></div></div><div class="comment__wrapper" data-dcnode-id="1217"><div class="comment__name clearfix" data-dcnode-id="1225"><img class="comment__avatar" data-dcnode-id="1230" height="32" src="https://c.disquscdn.com/uploads/users/29514/6162/avatar92.jpg?1544710278" width="32"/><strong data-dcnode-id="1227"><a data-dcnode-id="1228" href=""><span data-dcnode-id="1229" instrument_node="">The Tree Doctor</span></a></strong><span data-dcnode-id="1226" instrument_node=""> • 2 years ago
        </span></div><div class="comment__content" data-dcnode-id="1218"><p data-dcnode-id="1219"><span data-dcnode-id="1224" instrument_node="">Good Morning, Angela-</span><br data-dcnode-id="1223"/><span data-dcnode-id="1222" instrument_node="">Could you please provide photos of your trees?</span><br data-dcnode-id="1221"/><span data-dcnode-id="1220" instrument_node="">Thank you and have a great day!</span></p></div></div><div class="comment__wrapper" data-dcnode-id="1200"><div class="comment__name clearfix" data-dcnode-id="1211"><img class="comment__avatar" data-dcnode-id="1216" height="32" src="https://c.disquscdn.com/uploads/users/5992/5485/avatar92.jpg?1396626728" width="32"/><strong data-dcnode-id="1213"><a data-dcnode-id="1214" href=""><span data-dcnode-id="1215" instrument_node="">David Ryan</span></a></strong><span data-dcnode-id="1212" instrument_node=""> • 2 years ago
        </span></div><div class="comment__content" data-dcnode-id="1201"><p data-dcnode-id="1209"><span data-dcnode-id="1210" instrument_node="">35 years ago I planted a silver maple 4' sapling in our yard. It ended up with several trunks from me not planting the sapling deep enough. However, it turned out to become beautiful and perfect. We love the privacy and shade it gives us. Plus, the tree makes us feel like we're in a treehouse. Unfortunately, part of it is growing over our neighbors house and he wants the branches and limbs cut off. A couple years ago he took trimming and pruning upon himself which created huge holes in the canopy. Thankfully they filled in. So, after that I told him I'll have pro's do it.</span></p><p data-dcnode-id="1207"><span data-dcnode-id="1208" instrument_node="">Now to my question. There is one 8" branch that needs removed pretty much at the fence line and other limbs off of another branch. I want to keep the stub because there is a limb growing off of it where it looks like in the future will grow to the point to block the view of his house but the growth will stay within my yard. Will cutting that branch in late August kill that stub and that limb so nothing grows off it in the spring? The goal is to keep the tree and the privacy you see in the picture.</span></p><p data-dcnode-id="1205"><span data-dcnode-id="1206" instrument_node="">Thanks</span></p><p data-dcnode-id="1202"><a data-dcnode-id="1203" href="https://uploads.disquscdn.com/images/5f210f48fea410fb9479b5a34e1ca22d2b9a1351309f1d0a784a94cd0308ced1.jpg" rel="nofollow noopener" title="https://uploads.disquscdn.com/images/5f210f48fea410fb9479b5a34e1ca22d2b9a1351309f1d0a784a94cd0308ced1.jpg"><span data-dcnode-id="1204" instrument_node="">https://uploads.disquscdn.c...</span></a></p></div></div><div class="comment__wrapper" data-dcnode-id="1184"><div class="comment__name clearfix" data-dcnode-id="1194"><img class="comment__avatar" data-dcnode-id="1199" height="32" src="https://c.disquscdn.com/uploads/users/29514/6162/avatar92.jpg?1544710278" width="32"/><strong data-dcnode-id="1196"><a data-dcnode-id="1197" href=""><span data-dcnode-id="1198" instrument_node="">The Tree Doctor</span></a></strong><span data-dcnode-id="1195" instrument_node=""> • 2 years ago
        </span></div><div class="comment__content" data-dcnode-id="1185"><p data-dcnode-id="1186"><span data-dcnode-id="1193" instrument_node="">Good Morning, Ryan-</span><br data-dcnode-id="1192"/><span data-dcnode-id="1191" instrument_node="">We recommend calling a certified arborist so they can assess on-site which limbs to cut and how. If you would like to reach out to one of our arborists for a free consultation, you can do so here: </span><a data-dcnode-id="1189" href="http://disq.us/url?url=http%3A%2F%2Fwww.davey.com%2Fresidential-tree-services%2Ffind-a-local-office%2F%3ArtFrD78J6PIMXlZJABNHHv7Qjc8&amp;cuid=5672650" rel="nofollow noopener" title="http://www.davey.com/residential-tree-services/find-a-local-office/"><span data-dcnode-id="1190" instrument_node="">http://www.davey.com/reside...</span></a><br data-dcnode-id="1188"/><span data-dcnode-id="1187" instrument_node="">Thank you, and have a great day</span></p></div></div><div class="comment__wrapper" data-dcnode-id="1174"><div class="comment__name clearfix" data-dcnode-id="1178"><img class="comment__avatar" data-dcnode-id="1183" height="32" src="https://a.disquscdn.com/1647409581/images/noavatar92.png" width="32"/><strong data-dcnode-id="1180"><a data-dcnode-id="1181" href=""><span data-dcnode-id="1182" instrument_node="">Victor Lin</span></a></strong><span data-dcnode-id="1179" instrument_node=""> • 3 years ago
        </span></div><div class="comment__content" data-dcnode-id="1175"><p data-dcnode-id="1176"><span data-dcnode-id="1177" instrument_node="">Thanks a lot for your sharing!!!!! i was searching online for  purchasing pruning sealer and i am lucky to find your cortical :-), after reading i decided never buy it .</span></p></div></div><div class="comment__wrapper" data-dcnode-id="1161"><div class="comment__name clearfix" data-dcnode-id="1168"><img class="comment__avatar" data-dcnode-id="1173" height="32" src="https://a.disquscdn.com/1647409581/images/noavatar92.png" width="32"/><strong data-dcnode-id="1170"><a data-dcnode-id="1171" href=""><span data-dcnode-id="1172" instrument_node="">the Tree Doctor</span></a></strong><span data-dcnode-id="1169" instrument_node=""> • 3 years ago
        </span></div><div class="comment__content" data-dcnode-id="1162"><p data-dcnode-id="1163"><span data-dcnode-id="1167" instrument_node="">Hi Michael, Unfortunately, we do not service that area. Here is a resource that can help you when trying to hire a certified arborist: </span><a data-dcnode-id="1165" href="http://disq.us/url?url=http%3A%2F%2Fwww.davey.com%2Farborist-advice%2Farticles%2Fhiring-a-tree-service-provider-or-an-arborist%2F%3Aj268L7elvP8UJ7lB5aJjdTtZDYg&amp;cuid=5672650" rel="nofollow noopener" title="http://www.davey.com/arborist-advice/articles/hiring-a-tree-service-provider-or-an-arborist/"><span data-dcnode-id="1166" instrument_node="">http://www.davey.com/arbori...</span></a><span data-dcnode-id="1164" instrument_node="">. Hopefully, this helps. Best of luck to you, Michael.</span></p></div></div><div class="comment__wrapper" data-dcnode-id="1151"><div class="comment__name clearfix" data-dcnode-id="1155"><img class="comment__avatar" data-dcnode-id="1160" height="32" src="https://a.disquscdn.com/1647409581/images/noavatar92.png" width="32"/><strong data-dcnode-id="1157"><a data-dcnode-id="1158" href=""><span data-dcnode-id="1159" instrument_node="">Wyatt Smith</span></a></strong><span data-dcnode-id="1156" instrument_node=""> • 3 years ago
        </span></div><div class="comment__content" data-dcnode-id="1152"><p data-dcnode-id="1153"><span data-dcnode-id="1154" instrument_node="">Need trees trimmed up</span></p></div></div><div class="comment__wrapper" data-dcnode-id="1139"><div class="comment__name clearfix" data-dcnode-id="1145"><img class="comment__avatar" data-dcnode-id="1150" height="32" src="https://a.disquscdn.com/1647409581/images/noavatar92.png" width="32"/><strong data-dcnode-id="1147"><a data-dcnode-id="1148" href=""><span data-dcnode-id="1149" instrument_node="">The  Tree Doctor</span></a></strong><span data-dcnode-id="1146" instrument_node=""> • 3 years ago
        </span></div><div class="comment__content" data-dcnode-id="1140"><p data-dcnode-id="1141"><span data-dcnode-id="1144" instrument_node="">Hi Kristina,</span><br data-dcnode-id="1143"/><span data-dcnode-id="1142" instrument_node="">I forwarded this request to your local Davey Tree office. They will reach out to you as soon as they can to schedule a free consultation. You can also reach your office directly at (614) 300-1480. Here if you need anything else, Kristina.</span></p></div></div><div class="comment__wrapper" data-dcnode-id="1129"><div class="comment__name clearfix" data-dcnode-id="1133"><img class="comment__avatar" data-dcnode-id="1138" height="32" src="https://a.disquscdn.com/1647409581/images/noavatar92.png" width="32"/><strong data-dcnode-id="1135"><a data-dcnode-id="1136" href=""><span data-dcnode-id="1137" instrument_node="">JEANNE ILLENYE</span></a></strong><span data-dcnode-id="1134" instrument_node=""> • 3 years ago
        </span></div><div class="comment__content" data-dcnode-id="1130"><p data-dcnode-id="1131"><span data-dcnode-id="1132" instrument_node="">I'm worried about our mature Honey Locust. I'd hired people to remove only the dead branches &amp; part of a large limb over our house. I'd wanted to just do the dead branches now in Sept. but all tree companies insisted on cutting the large limb over the house which was vibrant &amp; green. Sadly, the guys who came did NOT do what I asked &amp; instead removed  ALL LIMBS on one the East side by the house so my tree is stripped of all it's gorgeous green, flourishing limbs, right to the trunk!!!  My husband and I are sick over this and we're worried about the tree's survival, the fact that it's now very off balance physically and of course aesthetically. It appears to be about 60 ft. tall and healthy limbs removed were about 20-30 ft. long leaving wounds about 8 inches in diameter. It's such a sin. Will it survive first of all since this is NOT the time to prune and we did NOT WANT THIS DONE!! Only dead branches were to be removed but they removed everything on that side. What are chances of survival? Will it sprout new growth?  If so how long will it take to replace those limbs? SINCERE THANKS!!</span></p></div></div><div class="comment__wrapper" data-dcnode-id="1119"><div class="comment__name clearfix" data-dcnode-id="1123"><img class="comment__avatar" data-dcnode-id="1128" height="32" src="https://a.disquscdn.com/1647409581/images/noavatar92.png" width="32"/><strong data-dcnode-id="1125"><a data-dcnode-id="1126" href=""><span data-dcnode-id="1127" instrument_node="">Kristina Carton</span></a></strong><span data-dcnode-id="1124" instrument_node=""> • 3 years ago
