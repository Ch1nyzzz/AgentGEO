</span><meta content="<div class=&quot;Abstracts u-font-serif&quot; id=&quot;abstracts&quot;><div class=&quot;abstract author&quot; id=&quot;abs0010&quot;><h2 class=&quot;section-title u-h3 u-margin-l-top u-margin-xs-bottom&quot;>Abstract</h2><div id=&quot;abst0010&quot;><p id=&quot;spar0080&quot;>Urban areas encounter a common problem called the heat island effect. Public-space plantings and parks have become a crucial countermeasure for decreasing urban temperatures. In this study, field measurements were carried out in a subtropical park in the summer to investigate the effect of plantings on microclimate and the thermal environment of pedestrian areas. It was found that obstructions affected the wind field; although cold air enters parks, an overcrowding of plants resulted in temperature rises in downstream areas. Shading is a key to thermal comfort in both tropical and subtropical regions, and its effect is augmented by ventilation. Trees that are planted without proper planning can decrease wind movement, which in turn has a detrimental effect on thermal comfort, especially downwind. Wind corridors through urban parks can promote both shading and ventilation, improving thermal comfort, and should thus be considered when designing the layout and trimming of plantings. Data from both fixed- and mobile-type measurements were used to validate the feasibility of a computational fluid dynamics simulation model. It was observed that wind speed and shading are the two main variables that influence the human comfort index, based on which a simpler human comfort assessment was proposed to replace the conventional index, standard effective temperature (SET*). The proposed method can be used as a guideline for landscape architects when designing planting locations.</p></div></div></div>" data-dcnode-id="5938" lang="en" name="citation_abstract"><span data-dcnode-id="5937" instrument_node="">

e from ScienceDirect's AI-generated Topic Pages"><span data-dcnode-id="5417" instrument_node="">microclimate</span></a><span data-dcnode-id="5411"><span data-dcnode-id="5415" instrument_node=""> simulations of </span><a class="topic-link" data-dcnode-id="5413" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.sciencedirect.com/topics/earth-and-planetary-sciences/tree-planting" title="Learn more about tree planting from ScienceDirect's AI-generated Topic Pages"><span data-dcnode-id="5414" instrument_node="">tree planting</span></a><span data-dcnode-id="5412" instrument_node=""> were conducted.</span></span></p></dd><dt class="list-label" data-dcnode-id="5407"><span data-dcnode-id="5408" instrument_node="">•</span></dt><dd class="list-description" data-dcnode-id="5404"><p data-dcnode-id="5405" id="par0010"><span data-dcnode-id="5406" instrument_node="">Lower wind speeds and higher temperatures were found on the downstream side.</span></p></dd><dt class="list-label" data-dcnode-id="5402"><span data-dcnode-id="5403" instrument_node="">•</span></dt><dd class="list-description" data-dcnode-id="5396"><p data-dcnode-id="5397" id="par0015"><span data-dcnode-id="5401" instrument_node="">A </span><a class="topic-link" data-dcnode-id="5399" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.sciencedirect.com/topics/earth-and-planetary-sciences/thermal-environment" title="Learn more about thermal environment from ScienceDirect's AI-generated Topic Pages"><span data-dcnode-id="5400" instrument_node="">thermal environment</span></a><span data-dcnode-id="5398" instrument_node=""> cannot be improved without proper wind corridor design.</span></p></dd><dt class="list-label" data-dcnode-id="5394"><span data-dcnode-id="5395" instrument_node="">•</span></dt><dd class="list-description" data-dcnode-id="5391"><p data-dcnode-id="5392" id="par0020"><span data-dcnode-id="5393" instrument_node="">A simplified human comfort assessment methodology is proposed for tree allocation.</span></p></dd></dl><p></p></div></div><div class="abstract author" data-dcnode-id="5381" id="abs0010"><h2 class="section-title u-h3 u-margin-l-top u-margin-xs-bottom" data-dcnode-id="5385"><span data-dcnode-id="5386" instrument_node="">Abstract</span></h2><div data-dcnode-id="5382" id="abst0010"><p data-dcnode-id="5383" id="spar0080"><span data-dcnode-id="5384" instrument_node="">Urban areas encounter a common problem called the heat island effect. Public-space plantings and parks have become a crucial countermeasure for decreasing urban temperatures. In this study, field measurements were carried out in a subtropical park in the summer to investigate the effect of plantings on microclimate and the thermal environment of pedestrian areas. It was found that obstructions affected the wind field; although cold air enters parks, an overcrowding of plants resulted in temperature rises in downstream areas. Shading is a key to thermal comfort in both tropical and subtropical regions, and its effect is augmented by ventilation. Trees that are planted without proper planning can decrease wind movement, which in turn has a detrimental effect on thermal comfort, especially downwind. Wind corridors through urban parks can promote both shading and ventilation, improving thermal comfort, and should thus be considered when designing the layout and trimming of plantings. Data from both fixed- and mobile-type measurements were used to validate the feasibility of a computational fluid dynamics simulation model. It was observed that wind speed and shading are the two main variables that influence the human comfort index, based on which a simpler human comfort assessment was proposed to replace the conventional index, standard effective temperature (SET*). The proposed method can be used as a guideline for landscape architects when designing planting locations.</span></p></div></div></div><ul class="issue-navigation u-margin-s-bottom u-bg-g  id="kwd0005"><h2 class="section-title u-h3 u-margin-l-top u-margin-xs-bottom" data-dcnode-id="5355"><span data-dcnode-id="5356" instrument_node="">Keywords</span></h2><div class="keyword" data-dcnode-id="5352" id="kw0005"><span data-dcnode-id="5353"><span data-dcnode-id="5354" instrument_node="">Computational fluid dynamics (CFD)</span></span></div><div class="keyword" data-dcnode-id="5349" id="kw0010"><span data-dcnode-id="5350"><span data-dcnode-id="5351" instrument_node="">Human comfort</span></span></div><div class="keyword" data-dcnode-id="5346" id="kw0015"><span data-dcnode-id="5347"><span data-dcnode-id="5348" instrument_node="">Microclimate</span></span></div><div class="keyword" data-dcnode-id="5343" id="kw0020"><span data-dcnode-id="5344"><span data-dcnode-id="5345" instrument_node="">Standard effective temperature (SET*)</span></span></div><div class="keyword" data-dcnode-id="5340" id="kw0025"><span data-dcnode-id="5341"><span data-dcnode-id="5342" instrument_node="">Wind environment</span></span></div></div></div><span data-dcnode-id="5337" instrument_node=""></span><div class="Body u-font-serif" data-dcnode-id="3903" id="body"><div data-dcnode-id="3921"><section data-dcnode-id="5183" id="sec0005"><h2 class="u-h3 u-margin-l-top u-margin-xs-bottom" data-dcnode-id="5333" id="sect0020"><span data-dcnode-id="5336" instrument_node="">1</span><span data-dcnode-id="5335" instrument_node="">. </span><span data-dcnode-id="5334" instrument_node="">Introduction</span></h2><p data-dcnode-id="5278" id="par0025"><span data-dcnode-id="5320"><span data-dcnode-id="5324"><span data-dcnode-id="5328"><span data-dcnode-id="5332" instrument_node="">Many </span><a class="topic-link" data-dcnode-id="5330" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.sciencedirect.com/topics/earth-and-planetary-sciences/countermeasure" title="Learn more about countermeasures from ScienceDirect's AI-generated Topic Pages"><span data-dcnode-id="5331" instrument_node="">countermeasures</span></a><span data-dcnode-id="5329" instrument_node=""> are available to mitigate the </span></span><a class="topic-link" data-dcnode-id="5326" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.sciencedirect.com/topics/earth-and-planetary-sciences/urban-heat-island-effect" title="Learn more about heat island from ScienceDirect's AI-generated Topic Pages"><span data-dcnode-id="5327" instrument_node="">heat island</span></a><span data-dcnode-id="5325" instrument_node=""> effect and alter undesirable </span></span><a class="topic-link" data-dcnode-id="5322" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.sciencedirect.com/topics/agricultural-and-biological-sciences/microclimate" title="Learn more about microclimates from ScienceDirect's AI-generated Topic Pages"><span data-dcnode-id="5323" instrument_node="">microclimates</span></a><span data-dcnode-id="5321" instrument_node=""> in urban areas. Urban green spaces contribute to improving urban environments and create quality urban landscapes (</span></span><a class="workspace-trigger" data-dcnode-id="5318" href="#bib0040" name="bbib0040"><span data-dcnode-id="5319" instrument_node="">Dimoudi and Nikolopoulou, 2003</span></a><span data-dcnode-id="5317" instrument_node="">, </span><a class="workspace-trigger" data-dcnode-id="5315" href="#bib0105" name="bbib0105"><span data-dcnode-id="5316" instrument_node="">Jan et al., 2012</span></a><span data-dcnode-id="5310"><span data-dcnode-id="5314" instrument_node="">). </span><a class="topic-link" data-dcnode-id="5312" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.sciencedirect.com/topics/earth-and-planetary-sciences/evapotranspiration" title="Learn more about Evapotranspiration from ScienceDirect's AI-generated Topic Pages"><span data-dcnode-id="5313" instrument_node="">Evapotranspiration</span></a><span data-dcnode-id="5311" instrument_node=""> can decrease the surrounding air temperature, reducing building energy use (</span></span><a class="workspace-trigger" data-dcnode-id="5308" href="#bib0055" name="bbib0055"><span data-dcnode-id="5309" instrument_node="">Gómez-Muñoza et al., 2010</span></a><span data-dcnode-id="5307" instrument_node="">, </span><a class="workspace-trigger" data-dcnode-id="5305" href="#bib0125" name="bbib0125"><span data-dcnode-id="5306" instrument_node="">Kabisch et al., 2015</span></a><span data-dcnode-id="5304" instrument_node="">, </span><a class="workspace-trigger" data-dcnode-id="5302" href="#bib0010" name="bbib0010"><span data-dcnode-id="5303" instrument_node="">Akbari et al., 2001</span></a><span data-dcnode-id="5297"><span data-dcnode-id="5301" instrument_node="">). There is evidence that ground surface coverings and shading by man-made objects and trees significantly affect the </span><a class="topic-link" data-dcnode-id="5299" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.sciencedirect.com/topics/earth-and-planetary-sciences/thermal-environment" title="Learn more about thermal environment from ScienceDirect's AI-generated Topic Pages"><span data-dcnode-id="5300" instrument_node="">thermal environment</span></a><span data-dcnode-id="5298" instrument_node=""> (</span></span><a class="workspace-trigger" data-dcnode-id="5295" href="#bib0140" name="bbib0140"><span data-dcnode-id="5296" instrument_node="">Lin et al., 2007</span></a><span data-dcnode-id="5294" instrument_node="">, </span><a class="workspace-trigger" data-dcnode-id="5292" href="#bib0145" name="bbib0145"><span data-dcnode-id="5293" instrument_node="">Lin et al., 2010</span></a><span data-dcnode-id="5291" instrument_node="">). As one of the most popular measures for improving outdoor environments, urban vegetation has been proven to play an important role in mitigating the heat island effect (</span><a class="workspace-trigger" data-dcnode-id="5289" href="#bib0255" name="bbib0255"><span data-dcnode-id="5290" instrument_node="">Zhang et al., 2013</span></a><span data-dcnode-id="5288" instrument_node="">, </span><a class="workspace-trigger" data-dcnode-id="5286" href="#bib0080" name="bbib0080"><span data-dcnode-id="5287" instrument_node="">Hong and Lin, 2015</span></a><span data-dcnode-id="5285" instrument_node="">). Parks have a cooling effect because of the combined impact of shading and evapotranspiration (</span><a class="workspace-trigger" data-dcnode-id="5283" href="#bib0200" name="bbib0200"><span data-dcnode-id="5284" instrument_node="">Shashua-Bar and Hoffman, 2000</span></a><span data-dcnode-id="5282" instrument_node="">). Plant evapotranspiration has been observed to improve urban microclimate conditions. Moreover, the microclimate condition of urban green belts has been shown to affect human thermal comfort (</span><a class="workspace-trigger" data-dcnode-id="5280" href="#bib0060" name="bbib0060"><span data-dcnode-id="5281" instrument_node="">Georgi and Dimitriou, 2010</span></a><span data-dcnode-id="5279" instrument_node="">). Researchers have thus paid more attention to the importance of shading and planting.</span></p><p data-dcnode-id="5246" id="par0030"><span data-dcnode-id="5277" instrument_node="">The cooling effects of urban streets and courtyards with trees have been investigated, and the benefits of plantings in the surrounding areas have been identified in several studies (</span><a class="workspace-trigger" data-dcnode-id="5275" href="#bib0200" name="bbib0200"><span data-dcnode-id="5276" instrument_node="">Shashua-Bar and Hoffman, 2000</span></a><span data-dcnode-id="5274" instrument_node="">, </span><a class="workspace-trigger" data-dcnode-id="5272" href="#bib0205" name="bbib0205"><span data-dcnode-id="5273" instrument_node="">Shashua-Bar and Hoffman, 2004</span></a><span data-dcnode-id="5271" instrument_node="">, </span><a class="workspace-trigger" data-dcnode-id="5269" href="#bib0135" name="bbib0135"><span data-dcnode-id="5270" instrument_node="">Kong et al., 2014</span></a><span data-dcnode-id="5268" instrument_node="">, </span><a class="workspace-trigger" data-dcnode-id="5266" href="#bib0005" name="bbib0005"><span data-dcnode-id="5267" instrument_node="">Abreu-Harbich et al., 2015</span></a><span data-dcnode-id="5265" instrument_node="">). There is a clear indication that the density of vegetation in parks plays a vital role in enhancing the cooling of daytime air temperature (</span><a class="workspace-trigger" data-dcnode-id="5263" href="#bib0045" name="bbib0045"><span data-dcnode-id="5264" instrument_node="">Feyisa et al., 2014</span></a><span data-dcnode-id="5262" instrument_node="">, </span><a class="workspace-trigger" data-dcnode-id="5260" href="#bib0070" name="bbib0070"><span data-dcnode-id="5261" instrument_node="">Gromke et al., 2015</span></a><span data-dcnode-id="5259" instrument_node="">). It has been revealed that canopy density, canopy area, and tree height also play important roles in the cooling effect. A commonly used method for the assessment of the benefits associated with parks in outdoor areas is to measure climate factors on site and then analyze the measurement results. Most studies on the cooling effects of urban vegetation have involved measurements within a single park, with few studies examining the cooling effect of parks on surrounding areas (</span><a class="workspace-trigger" data-dcnode-id="5257" href="#bib0025" name="bbib0025"><span data-dcnode-id="5258" instrument_node="">Bowler et al., 2010</span></a><span data-dcnode-id="5256" instrument_node="">). Parks are important planting areas in cities and have a significant effect on the overall environmental conditions. For outdoor thermal environments, the proper layout of plants is important, and thus optimal plant arrangement should be considered (</span><a class="workspace-trigger" data-dcnode-id="5254" href="#bib0185" name="bbib0185"><span data-dcnode-id="5255" instrument_node="">Ooka et al., 2008</span></a><span data-dcnode-id="5253" instrument_node="">). Both grass and trees can effectively cool surfaces and thus provide regional cooling, helping reduce the urban heat island effect during hot weather (</span><a class="workspace-trigger" data-dcnode-id="5251" href="#bib0020" name="bbib0020"><span data-dcnode-id="5252" instrument_node="">Armson et al., 2012</span></a><span data-dcnode-id="5250" instrument_node="">, </span><a class="workspace-trigger" data-dcnode-id="5248" href="#bib0130" name="bbib0130"><span data-dcnode-id="5249" instrument_node="">Klemm et al., 2015</span></a><span data-dcnode-id="5247" instrument_node="">).</span></p><p data-dcnode-id="5214" id="par0035"><span data-dcnode-id="5245" instrument_node="">Although the temperature effect in parks is often discussed, less attention has been given to the blockage of the wind in such areas (</span><a class="workspace-trigger" data-dcnode-id="5243" href="#bib0110" name="bbib0110"><span data-dcnode-id="5244" instrument_node="">Jan et al., 2013</span></a><span data-dcnode-id="5242" instrument_node="">). In warm climates, vegetation can have negative effects, such as trees reducing wind speeds (</span><a class="workspace-trigger" data-dcnode-id="5240" href="#bib0245" name="bbib0245"><span data-dcnode-id="5241" instrument_node="">Yoshida et al., 2006</span></a><span data-dcnode-id="5239" instrument_node="">; </span><a class="workspace-trigger" data-dcnode-id="5237" href="#bib0065" name="bbib0065"><span data-dcnode-id="5238" instrument_node="">Gromke et al., 2008</span></a><span data-dcnode-id="5236" instrument_node="">). Regarding wind assessment, classification of wind speeds is traditionally done according to the Beaufort wind force scale. Wind speed, an important factor impacting thermal comfort, has been shown to have various impacts on pedestrians depending on the specific surrounding conditions (</span><a class="workspace-trigger" data-dcnode-id="5234" href="#bib0160" name="bbib0160"><span data-dcnode-id="5235" instrument_node="">Mochida and Lun, 2008</span></a><span data-dcnode-id="5233" instrument_node="">, </span><a class="workspace-trigger" data-dcnode-id="5231" href="#bib0115" name="bbib0115"><span data-dcnode-id="5232" instrument_node="">Janssen et al., 2013</span></a><span data-dcnode-id="5230" instrument_node="">, </span><a class="workspace-trigger" data-dcnode-id="5228" href="#bib0085" name="bbib0085"><span data-dcnode-id="5229" instrument_node="">Hsieh et al., 2010</span></a><span data-dcnode-id="5227" instrument_node="">). Human thermal comfort is usually assessed using six major factors: air temperature, relative humidity, mean radiant temperature, wind speed, human body activity, and clothing (</span><a class="workspace-trigger" data-dcnode-id="5225" href="#bib0235" name="bbib0235"><span data-dcnode-id="5226" instrument_node="">Walton et al., 2007</span></a><span data-dcnode-id="5224" instrument_node="">). In order to explain how wind speed affects thermal comfort, past studies have attempted to classify wind speed. Classification standards of wind speed in specific regions vary with environmental conditions (</span><a class="workspace-trigger" data-dcnode-id="5222" href="#bib0095" name="bbib0095"><span data-dcnode-id="5223" instrument_node="">Hsieh et al., 2014</span></a><span data-dcnode-id="5221" instrument_node="">). As a result, researchers have proposed various wind speed classifications according to the climate of their local regions. Outdoor thermal comfort was investigated based on wind speed using the physiological equivalent temperature (PET) in Hong Kong (</span><a class="workspace-trigger" data-dcnode-id="5219" href="#bib0250" name="bbib0250"><span data-dcnode-id="5220" instrument_node="">Yuan and Ng, 2012</span></a><span data-dcnode-id="5218" instrument_node="">). An experimental study by </span><a class="workspace-trigger" data-dcnode-id="5216" href="#bib0210" name="bbib0210"><span data-dcnode-id="5217" instrument_node="">Shashua-Bar et al. (2009)</span></a><span data-dcnode-id="5215" instrument_node=""> in hot environments found that shade provided by trees cools the air significantly more than does the same amount of shade provided by other means. Trees reduce the surface temperature of shaded areas, and shading affects human comfort. Through investigation of subjective perceptions and calculation of comfort indicators in local areas, the regional standard effective temperature (SET*) and users’ acceptable ranges of comfort can be obtained.</span></p><p data-dcnode-id="5186" id="par0040"><span data-dcnode-id="5213" instrument_node="">Computational fluid dynamics (CFD) has been widely used in the study of wind in urban areas (</span><a class="workspace-trigger" data-dcnode-id="5211" href="#bib0090" name="bbib0090"><span data-dcnode-id="5212" instrument_node="">Hsieh et al., 2011</span></a><span data-dcnode-id="5210" instrument_node="">, </span><a class="workspace-trigger" data-dcnode-id="5208" href="#bib0265" name="bbib0265"><span data-dcnode-id="5209" instrument_node="">Zhuang et al., 2015</span></a><span data-dcnode-id="5207" instrument_node="">). At the pedestrian level, the influences of small obstacles such as trees are significant. In most previous CFD simulations of flow around buildings, only the influences of topographic features and building geometry were considered (</span><a class="workspace-trigger" data-dcnode-id="5205" href="#bib0165" name="bbib0165"><span data-dcnode-id="5206" instrument_node="">Mochida et al., 2008</span></a><span data-dcnode-id="5204" instrument_node="">). The effects of trees have been neglected in most conventional CFD predictions of wind environments. Studies on planting and microclimate have discussed cases involving a single tree or a regular arrangement of trees in parks. </span><a class="workspace-trigger" data-dcnode-id="5202" href="#bib0180" name="bbib0180"><span data-dcnode-id="5203" instrument_node="">Nunobiki et al. (2008)</span></a><span data-dcnode-id="5197"><span data-dcnode-id="5201" instrument_node=""> used a three-dimensional (3D) calculation model to predict the impact of a single tree on air flow and compared the results to those obtained from </span><a class="topic-link" data-dcnode-id="5199" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.sciencedirect.com/topics/earth-and-planetary-sciences/wind-tunnels" title="Learn more about wind tunnel from ScienceDirect's AI-generated Topic Pages"><span data-dcnode-id="5200" instrument_node="">wind tunnel</span></a><span data-dcnode-id="5198" instrument_node=""> experiments. </span></span><a class="workspace-trigger" data-dcnode-id="5195" href="#bib0245" name="bbib0245"><span data-dcnode-id="5196" instrument_node="">Yoshida et al. (2006)</span></a><span data-dcnode-id="5194" instrument_node=""> assessed the mitigation effect of plants on an outdoor thermal environment and compared various distributions of wind speed, ground surface temperature, mean radiant temperature (MRT), and SET* for a 3D tree-crown model in three cases. </span><a class="workspace-trigger" data-dcnode-id="5192" href="#bib0195" name="bbib0195"><span data-dcnode-id="5193" instrument_node="">Sasaki (2007)</span></a><span data-dcnode-id="5187"><span data-dcnode-id="5191" instrument_node=""> established tree crown shape using CFD and solved the </span><a class="topic-link" data-dcnode-id="5189" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.sciencedirect.com/topics/earth-and-planetary-sciences/thermal-radiation" title="Learn more about thermal radiation from ScienceDirect's AI-generated Topic Pages"><span data-dcnode-id="5190" instrument_node="">thermal radiation</span></a><span data-dcnode-id="5188" instrument_node=""> transfer formula, among other measurements, in order to find the impact of tree arrangement, spacing, and shape on the outdoor thermal environment and air quality in Sendai, Japan.</span></span></p><p data-dcnode-id="5184" id="par0045"><span data-dcnode-id="5185" instrument_node="">Researchers have previously conducted studies on the impact of a single tree on the environment, with CFD rarely used to simulate large numbers of trees. Although large-scale planting is commonly adopted in urban parks, the details of the effects of tree groupings on the thermal environment have not been discussed. The objectives of the present study are to quantitatively investigate the influence of factors affecting thermal comfort and to analyze the effect of ventilation and shading in a typical urban park located in a climate zone close to the Tropic of Cancer. The shading and wind obstruction effects of vegetation on human comfort based on tree characteristics are analyzed through the use of onsite measurement data and a simulation model. The CFD numerical planting model is validated with onsite measurement data and then used to simulate the thermal environment of a typical summer day in the study area. The distribution of the human comfort indicator (SET*) in the park is obtained. A simplified human comfort assessment based on the wind environment and shading conditions is then proposed for landscape architects. The rest of this paper is organized as follows. The next section introduces the research methodology, including the CFD model and classifications of wind and shading. The simulation results are given next. Then, a discussion on parameter choices and advice for landscape architects are provided.</span></p></section><section data-dcnode-id="4460" id="sec0010"><h2 class="u-h3 u-margin-l-top u-margin-xs-bottom" data-dcnode-id="5179" id="sect0025"><span data-dcnode-id="5182" instrument_node="">2</span><span data-dcnode-id="5181" instrument_node="">. </span><span data-dcnode-id="5180" instrument_node="">Methodology</span></h2><section data-dcnode-id="5076" id="sec0015"><h3 class="u-h4 u-margin-m-top u-margin-xs-bottom" data-dcnode-id="5175" id="sect0030"><span data-dcnode-id="5178" instrument_node="">2.1</span><span data-dcnode-id="5177" instrument_node="">. </span><span data-dcnode-id="5176" instrument_node="">Study area</span></h3><div data-dcnode-id="5127"><p data-dcnode-id="5152" id="par0050"><span data-dcnode-id="5166"><span data-dcnode-id="5170"><span data-dcnode-id="5174" instrument_node="">This study investigates the </span><a class="topic-link" data-dcnode-id="5172" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.sciencedirect.com/topics/earth-and-planetary-sciences/thermal-environment" title="Learn more about thermal environment from ScienceDirect's AI-generated Topic Pages"><span data-dcnode-id="5173" instrument_node="">thermal environment</span></a><span data-dcnode-id="5171" instrument_node=""> and human comfort in Tainan Park, Tainan, Taiwan, located at latitude 23°0′N (120°13′E), which is in the </span></span><a class="topic-link" data-dcnode-id="5168" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.sciencedirect.com/topics/social-sciences/tropical-zones" title="Learn more about tropical zone from ScienceDirect's AI-generated Topic Pages"><span data-dcnode-id="5169" instrument_node="">tropical zone</span></a><span data-dcnode-id="5167" instrument_node=""> according to the Koeppen-Geiger classification. This is very close to the Tropic of Cancer (23°26′N), which divides the subtropical zone and tropical zone. Tainan Park is a metropolitan park, covering a land area of 14.8</span></span><span data-dcnode-id="5165" instrument_node="">&nbsp;</span><span data-dcnode-id="5164" instrument_node="">ha (</span><a class="workspace-trigger" data-dcnode-id="5162" href="#fig0005" name="bfig0005"><span data-dcnode-id="5163" instrument_node="">Fig. 1</span></a><span data-dcnode-id="5153"><span data-dcnode-id="5161" instrument_node="">). It is the key node in a circular green parkway system consisting of a park and </span><a class="topic-link" data-dcnode-id="5159" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.sciencedirect.com/topics/agricultural-and-biological-sciences/street-trees" title="Learn more about street trees from ScienceDirect's AI-generated Topic Pages"><span data-dcnode-id="5160" instrument_node="">street trees</span></a><span data-dcnode-id="5154"><span data-dcnode-id="5158" instrument_node="">. This area is close to a </span><a class="topic-link" data-dcnode-id="5156" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.sciencedirect.com/topics/earth-and-planetary-sciences/railway-station" title="Learn more about railway station from ScienceDirect's AI-generated Topic Pages"><span data-dcnode-id="5157" instrument_node="">railway station</span></a><span data-dcnode-id="5155" instrument_node=""> and is thus densely populated. Its surrounding land is mainly used for educational and residential functions.</span></span></span></p><figure class="figure text-xs" data-dcnode-id="5128" id="fig0005"><span data-dcnode-id="5136"><img alt="Fig. 1" aria-describedby="cap0005" data-dcnode-id="5151" height="376" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//ars.els-cdn.com/content/image/1-s2.0-S1618866716301868-gr1.jpg&amp;raw"><span data-dcnode-id="5150" instrument_node=""></span><ol class="links-for-figure" data-dcnode-id="5137"><li data-dcnode-id="5144"><a class="anchor download-link u-font-sans" data-dcnode-id="5145" download="" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//ars.els-cdn.com/content/image/1-s2.0-S1618866716301868-gr1_lrg.jpg" target="_blank" title="Download high-res image (585KB)"><span class="anchor-text" data-dcnode-id="5146"><span data-dcnode-id="5149" instrument_node="">Download : </span><span class="download-link-title" data-dcnode-id="5147"><span data-dcnode-id="5148" instrument_node="">Download high-res image (585KB)</span></span></span></a></li><li data-dcnode-id="5138"><a class="anchor download-link u-font-sans" data-dcnode-id="5139" download="" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//ars.els-cdn.com/content/image/1-s2.0-S1618866716301868-gr1.jpg" target="_blank" title="Download full-size image"><span class="anchor-text" data-dcnode-id="5140"><span data-dcnode-id="5143" instrument_node="">Download : </span><span class="download-link-title" data-dcnode-id="5141"><span data-dcnode-id="5142" instrument_node="">Download full-size image</span></span></span></a></li></ol></span><span class="captions" data-dcnode-id="5129"><span data-dcnode-id="5130" id="cap0005"><p data-dcnode-id="5131" id="spar0005"><span class="label" data-dcnode-id="5134"><span data-dcnode-id="5135" instrument_node="">Fig. 1</span></span><span data-dcnode-id="5133" instrument_node="">. </span><span data-dcnode-id="5132" instrument_node="">Study area.</span></p></span></span></figure></div><div data-dcnode-id="5077"><p data-dcnode-id="5105" id="par0055"><span data-dcnode-id="5118"><span data-dcnode-id="5122"><span data-dcnode-id="5126" instrument_node="">A climate analysis of the study area was conducted based on recent ten-year </span><a class="topic-link" data-dcnode-id="5124" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.sciencedirect.com/topics/social-sciences/meteorological-data" title="Learn more about meteorological data from ScienceDirect's AI-generated Topic Pages"><span data-dcnode-id="5125" instrument_node="">meteorological data</span></a><span data-dcnode-id="5123" instrument_node=""> from the Tainan City </span></span><a class="topic-link" data-dcnode-id="5120" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.sciencedirect.com/topics/agricultural-and-biological-sciences/weather-stations" title="Learn more about Weather Station from ScienceDirect's AI-generated Topic Pages"><span data-dcnode-id="5121" instrument_node="">Weather Station</span></a><span data-dcnode-id="5119" instrument_node="">, at which the climatic measurement equipment was installed at a height of 12.9</span></span><span data-dcnode-id="5117" instrument_node="">&nbsp;</span><span data-dcnode-id="5116" instrument_node="">m above ground level, or 40.9</span><span data-dcnode-id="5115" instrument_node="">&nbsp;</span><span data-dcnode-id="5114" instrument_node="">m above sea level. As shown in </span><a class="workspace-trigger" data-dcnode-id="5112" href="#fig0010" name="bfig0010"><span data-dcnode-id="5113" instrument_node="">Fig. 2</span></a><span data-dcnode-id="5111" instrument_node="">a, the average air temperature around noon is above 30</span><span data-dcnode-id="5110" instrument_node="">&nbsp;</span><span data-dcnode-id="5109" instrument_node="">°C, and the hottest hour of the day is 13:00. The study area is located on the west coast, and a westerly wind dominates at noon, as shown in </span><a class="workspace-trigger" data-dcnode-id="5107" href="#fig0010" name="bfig0010"><span data-dcnode-id="5108" instrument_node="">Fig. 2</span></a><span data-dcnode-id="5106" instrument_node="">b. Summer is defined as June–September in this study.</span></p><figure class="figure text-xs" data-dcnode-id="5078" id="fig0010"><span data-dcnode-id="5089"><img alt="Fig. 2" aria-describedby="cap0010" data-dcnode-id="5104" height="476" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//ars.els-cdn.com/content/image/1-s2.0-S1618866716301868-gr2.jpg&amp;raw"><span data-dcnode-id="5103" instrument_node=""></span><ol class="links-for-figure" data-dcnode-id="5090"><li data-dcnode-id="5097"><a class="anchor download-link u-font-sans" data-dcnode-id="5098" download="" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//ars.els-cdn.com/content/image/1-s2.0-S1618866716301868-gr2_lrg.jpg" target="_blank" title="Download high-res image (176KB)"><span class="anchor-text" data-dcnode-id="5099"><span data-dcnode-id="5102" instrument_node="">Download : </span><span class="download-link-title" data-dcnode-id="5100"><span data-dcnode-id="5101" instrument_node="">Download high-res image (176KB)</span></span></span></a></li><li data-dcnode-id="5091"><a class="anchor download-link u-font-sans" data-dcnode-id="5092" download="" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//ars.els-cdn.com/content/image/1-s2.0-S1618866716301868-gr2.jpg" target="_blank" title="Download full-size image"><span class="anchor-text" data-dcnode-id="5093"><span data-dcnode-id="5096" instrument_node="">Download : </span><span class="download-link-title" data-dcnode-id="5094"><span data-dcnode-id="5095" instrument_node="">Download full-size image</span></span></span></a></li></ol></span><span class="captions" data-dcnode-id="5079"><span data-dcnode-id="5080" id="cap0010"><p data-dcnode-id="5081" id="spar0010"><span class="label" data-dcnode-id="5087"><span data-dcnode-id="5088" instrument_node="">Fig. 2</span></span><span data-dcnode-id="5086" instrument_node="">. </span><span data-dcnode-id="5085" instrument_node="">Weather information from Tainan City </span><a class="topic-link" data-dcnode-id="5083" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.sciencedirect.com/topics/agricultural-and-biological-sciences/weather-stations" title="Learn more about Weather Station from ScienceDirect's AI-generated Topic Pages"><span data-dcnode-id="5084" instrument_node="">Weather Station</span></a><span data-dcnode-id="5082" instrument_node="">. (a) Daily temperature in summer (June –September) and (b) wind frequency in the summer at noon.</span></p></span></span></figure></div></section><section data-dcnode-id="5009" id="sec0020"><h3 class="u-h4 u-margin-m-top u-margin-xs-bottom" data-dcnode-id="5072" id="sect0035"><span data-dcnode-id="5075" instrument_node="">2.2</span><span data-dcnode-id="5074" instrument_node="">. </span><span data-dcnode-id="5073" instrument_node="">Field measurement of microclimate</span></h3><div data-dcnode-id="5010"><p data-dcnode-id="5035" id="par0060"><span data-dcnode-id="5071" instrument_node="">Field measurements, both fixed- and mobile-type observations, were carried out both inside and outside the park for one week in order to analyze the wind and thermal environment for the entire park in summer. </span><a class="workspace-trigger" data-dcnode-id="5069" href="#fig0015" name="bfig0015"><span data-dcnode-id="5070" instrument_node="">Fig. 3</span></a><span data-dcnode-id="5056"><span data-dcnode-id="5068" instrument_node="">a shows the locations of the fixed-type observations. In total, two four-blade helicoid-propeller wind speed </span><a class="topic-link" data-dcnode-id="5066" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.sciencedirect.com/topics/social-sciences/remote-sensing" title="Learn more about sensors from ScienceDirect's AI-generated Topic Pages"><span data-dcnode-id="5067" instrument_node="">sensors</span></a><span data-dcnode-id="5057"><span data-dcnode-id="5061"><span data-dcnode-id="5065" instrument_node=""> and five ultrasonic </span><a class="topic-link" data-dcnode-id="5063" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.sciencedirect.com/topics/earth-and-planetary-sciences/anemometer" title="Learn more about anemometers from ScienceDirect's AI-generated Topic Pages"><span data-dcnode-id="5064" instrument_node="">anemometers</span></a><span data-dcnode-id="5062" instrument_node=""> were used for the measurements. The field measurement period was from July 27th to August 1st, 2011. The external observation devices were installed on opposite sides of the park (A1 and A2). An anemometer (YOUNG-05103), a </span></span><a class="topic-link" data-dcnode-id="5059" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.sciencedirect.com/topics/earth-and-planetary-sciences/hygrometer" title="Learn more about hygrometer from ScienceDirect's AI-generated Topic Pages"><span data-dcnode-id="5060" instrument_node="">hygrometer</span></a><span data-dcnode-id="5058" instrument_node=""> (YOUNG-41382/YOUNG-41003), and an actinometer (PREDE PCM-01) were installed at A1, 4</span></span></span><span data-dcnode-id="5055" instrument_node="">&nbsp;</span><span data-dcnode-id="5054" instrument_node="">m above the roof of a 30-m-high building. The measurement data were wind speed, wind direction, solar radiation, and humidity. A YOUNG-05103 anemometer and a Davis 6450 actinometer were installed 2.5</span><span data-dcnode-id="5053" instrument_node="">&nbsp;</span><span data-dcnode-id="5052" instrument_node="">m above the roof of a 15-m-high building. According to the features of the plantings in the park, four fixed-type observation points (B1, B2, B3, and C) were used inside the park. Three YOUNG-85000 anemometers were installed at B1-B3, respectively, all at a height of 1.5</span><span data-dcnode-id="5051" instrument_node="">&nbsp;</span><span data-dcnode-id="5050" instrument_node="">m. At point C, a YOUNG-85000 anemometer and a YOUNG-81000 anemometer were installed at heights of 1.5</span><span data-dcnode-id="5049" instrument_node="">&nbsp;</span><span data-dcnode-id="5048" instrument_node="">m (C1) and 4.5</span><span data-dcnode-id="5047" instrument_node="">&nbsp;</span><span data-dcnode-id="5046" instrument_node="">m (C2), respectively, to investigate the influence of the surrounding tree leaves on wind speed. The measurement points for the mobile-type observations are shown in </span><a class="workspace-trigger" data-dcnode-id="5044" href="#fig0015" name="bfig0015"><span data-dcnode-id="5045" instrument_node="">Fig. 3</span></a><span data-dcnode-id="5043" instrument_node="">b. There are four routes, called a, b, c, and d, respectively, each of which has 5–6 measurement points. The fixed-type measurements at A1 and A2 were carried out during the entire day, whereas the mobile-type measurement was carried out at three time intervals (morning, noon, and afternoon). The mobile measurement equipment recorded data at a given point for 10</span><span data-dcnode-id="5042" instrument_node="">&nbsp;</span><span data-dcnode-id="5041" instrument_node="">min and then moved to the next point within 5</span><span data-dcnode-id="5040" instrument_node="">&nbsp;</span><span data-dcnode-id="5039" instrument_node="">min. Three variables, namely wind speed, air temperature, and humidity, were observed. A thermal environment sensor (WBGT-101) and five hot-wire-type anemometers were used. For outdoor measurements, it has been suggested that the globe should be painted gray (</span><a class="workspace-trigger" data-dcnode-id="5037" href="#bib0225" name="bbib0225"><span data-dcnode-id="5038" instrument_node="">Thorsson et al., 2007</span></a><span data-dcnode-id="5036" instrument_node="">). However, in our measurements, the globe temperature was measured using WBGT-101, and the globe was black. The external observation data were used to set the boundary conditions for the air flow simulations. CFD model verification was conducted using the data from the internal observations.</span></p><figure class="figure text-xs" data-dcnode-id="5011" id="fig0015"><span data-dcnode-id="5019"><img alt="Fig. 3" aria-describedby="cap0015" data-dcnode-id="5034" height="833" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//ars.els-cdn.com/content/image/1-s2.0-S1618866716301868-gr3.jpg&amp;raw"><span data-dcnode-id="5033" instrument_node=""></span><ol class="links-for-figure" data-dcnode-id="5020"><li data-dcnode-id="5027"><a class="anchor download-link u-font-sans" data-dcnode-id="5028" download="" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//ars.els-cdn.com/content/image/1-s2.0-S1618866716301868-gr3_lrg.jpg" target="_blank" title="Download high-res image (1MB)"><span class="anchor-text" data-dcnode-id="5029"><span data-dcnode-id="5032" instrument_node="">Download : </span><span class="download-link-title" data-dcnode-id="5030"><span data-dcnode-id="5031" instrument_node="">Download high-res image (1MB)</span></span></span></a></li><li data-dcnode-id="5021"><a class="anchor download-link u-font-sans" data-dcnode-id="5022" download="" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//ars.els-cdn.com/content/image/1-s2.0-S1618866716301868-gr3.jpg" target="_blank" title="Download full-size image"><span class="anchor-text" data-dcnode-id="5023"><span data-dcnode-id="5026" instrument_node="">Download : </span><span class="download-link-title" data-dcnode-id="5024"><span data-dcnode-id="5025" instrument_node="">Download full-size image</span></span></span></a></li></ol></span><span class="captions" data-dcnode-id="5012"><span data-dcnode-id="5013" id="cap0015"><p data-dcnode-id="5014" id="spar0015"><span class="label" data-dcnode-id="5017"><span data-dcnode-id="5018" instrument_node="">Fig. 3</span></span><span data-dcnode-id="5016" instrument_node="">. </span><span data-dcnode-id="5015" instrument_node="">Field observation measurement map. (a) Fixed-type measurement points and (b) mobile-type measurement routes.</span></p></span></span></figure></div></section><section data-dcnode-id="4924" id="sec0025"><h3 class="u-h4 u-margin-m-top u-margin-xs-bottom" data-dcnode-id="5005" id="sect0040"><span data-dcnode-id="5008" instrument_node="">2.3</span><span data-dcnode-id="5007" instrument_node="">. </span><span data-dcnode-id="5006" instrument_node="">Planting investigation</span></h3><div data-dcnode-id="4963"><p data-dcnode-id="4988" id="par0065"><span data-dcnode-id="5004" instrument_node="">There are 79 types of plant growing in Tainan Park. The detailed parameters of the top-ten broad-leaf tree species, including </span><span data-dcnode-id="5000"><em data-dcnode-id="5001"><a class="topic-link" data-dcnode-id="5002" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.sciencedirect.com/topics/agricultural-and-biological-sciences/araucaria" title="Learn more about Araucaria from ScienceDirect's AI-generated Topic Pages"><span data-dcnode-id="5003" instrument_node="">Araucaria</span></a></em></span><span data-dcnode-id="4999" instrument_node=""> and </span><span data-dcnode-id="4995"><em data-dcnode-id="4996"><a class="topic-link" data-dcnode-id="4997" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.sciencedirect.com/topics/agricultural-and-biological-sciences/ceratonia" title="Learn more about Ceratonia from ScienceDirect's AI-generated Topic Pages"><span data-dcnode-id="4998" instrument_node="">Ceratonia</span></a></em></span><span data-dcnode-id="4994" instrument_node="">, were measured. These species account for 62.6% of the total canopy. The parameters include factors related to the sky view, crown width, crown height, tree height, and so on. The sky view factor (SVF) for a tree crown was determined using a fish-eye lens at a height of 1</span><span data-dcnode-id="4993" instrument_node="">&nbsp;</span><span data-dcnode-id="4992" instrument_node="">m above the ground and RayMan software. A lower SVF indicates higher leaf density. Plantings were classified into three groups according to leaf density (i.e., average SVF). </span><a class="workspace-trigger" data-dcnode-id="4990" href="#fig0020" name="bfig0020"><span data-dcnode-id="4991" instrument_node="">Fig. 4</span></a><span data-dcnode-id="4989" instrument_node=""> shows the SVF for each measurement point. The three groups had average SVF values of 0.21, 0.08, and 0.02, respectively.</span></p><figure class="figure text-xs" data-dcnode-id="4964" id="fig0020"><span data-dcnode-id="4972"><img alt="Fig. 4" aria-describedby="cap0020" data-dcnode-id="4987" height="251" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//ars.els-cdn.com/content/image/1-s2.0-S1618866716301868-gr4.jpg&amp;raw"><span data-dcnode-id="4986" instrument_node=""></span><ol class="links-for-figure" data-dcnode-id="4973"><li data-dcnode-id="4980"><a class="anchor download-link u-font-sans" data-dcnode-id="4981" download="" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//ars.els-cdn.com/content/image/1-s2.0-S1618866716301868-gr4_lrg.jpg" target="_blank" title="Download high-res image (613KB)"><span class="anchor-text" data-dcnode-id="4982"><span data-dcnode-id="4985" instrument_node="">Download : </span><span class="download-link-title" data-dcnode-id="4983"><span data-dcnode-id="4984" instrument_node="">Download high-res image (613KB)</span></span></span></a></li><li data-dcnode-id="4974"><a class="anchor download-link u-font-sans" data-dcnode-id="4975" download="" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//ars.els-cdn.com/content/image/1-s2.0-S1618866716301868-gr4.jpg" target="_blank" title="Download full-size image"><span class="anchor-text" data-dcnode-id="4976"><span data-dcnode-id="4979" instrument_node="">Download : </span><span class="download-link-title" data-dcnode-id="4977"><span data-dcnode-id="4978" instrument_node="">Download full-size image</span></span></span></a></li></ol></span><span class="captions" data-dcnode-id="4965"><span data-dcnode-id="4966" id="cap0020"><p data-dcnode-id="4967" id="spar0020"><span class="label" data-dcnode-id="4970"><span data-dcnode-id="4971" instrument_node="">Fig. 4</span></span><span data-dcnode-id="4969" instrument_node="">. </span><span data-dcnode-id="4968" instrument_node="">SVF for fixed-type measurement points (B1, B2, B3, C).</span></p></span></span></figure></div><p data-dcnode-id="4925" id="par0070"><span data-dcnode-id="4962" instrument_node="">The cooling effect of plantings is mainly determined by species group, canopy density, and the size and shape of a tree. Among them, the canopy density is an effective cooling factor for analyzing the park thermal environment for a fine-scale discussion (</span><a class="workspace-trigger" data-dcnode-id="4960" href="#bib0255" name="bbib0255"><span data-dcnode-id="4961" instrument_node="">Zhang et al., 2013</span></a><span data-dcnode-id="4959" instrument_node="">, </span><a class="workspace-trigger" data-dcnode-id="4957" href="#bib0045" name="bbib0045"><span data-dcnode-id="4958" instrument_node="">Feyisa et al., 2014</span></a><span data-dcnode-id="4956" instrument_node="">). There are two parameters for describing canopy density: the leaf area index (LAI) and the SVF (</span><a class="workspace-trigger" data-dcnode-id="4954" href="#bib0015" name="bbib0015"><span data-dcnode-id="4955" instrument_node="">Arias et al., 2007</span></a><span data-dcnode-id="4953" instrument_node="">, </span><a class="workspace-trigger" data-dcnode-id="4951" href="#bib0190" name="bbib0190"><span data-dcnode-id="4952" instrument_node="">Pu and Cheng, 2015</span></a><span data-dcnode-id="4950" instrument_node="">, </span><a class="workspace-trigger" data-dcnode-id="4948" href="#bib0030" name="bbib0030"><span data-dcnode-id="4949" instrument_node="">Brantley et al., 2011</span></a><span data-dcnode-id="4947" instrument_node="">, </span><a class="workspace-trigger" data-dcnode-id="4945" href="#bib0050" name="bbib0050"><span data-dcnode-id="4946" instrument_node="">Gál and Unger, 2014</span></a><span data-dcnode-id="4944" instrument_node="">, </span><a class="workspace-trigger" data-dcnode-id="4942" href="#bib0150" name="bbib0150"><span data-dcnode-id="4943" instrument_node="">Lin et al., 2012</span></a><span data-dcnode-id="4941" instrument_node="">). The LAI was used to analyze the influence of tree density and age (</span><a class="workspace-trigger" data-dcnode-id="4939" href="#bib0230" name="bbib0230"><span data-dcnode-id="4940" instrument_node="">Vidrich and Medved, 2013</span></a><span data-dcnode-id="4938" instrument_node="">), which describes the growth state of a plant. The SVF was used to estimate the impact of buildings and vegetation on local air circulation and outdoor thermal comfort (</span><a class="workspace-trigger" data-dcnode-id="4936" href="#bib0155" name="bbib0155"><span data-dcnode-id="4937" instrument_node="">Mahmoud, 2011</span></a><span data-dcnode-id="4935" instrument_node="">, </span><a class="workspace-trigger" data-dcnode-id="4933" href="#bib0075" name="bbib0075"><span data-dcnode-id="4934" instrument_node="">He et al., 2014</span></a><span data-dcnode-id="4932" instrument_node="">). SVF can describe the impact of canopy density on air circulation. The field measurement data show that areas with denser broad-leaf trees tend to have lower SVF values (</span><a class="workspace-trigger" data-dcnode-id="4930" href="#bib0110" name="bbib0110"><span data-dcnode-id="4931" instrument_node="">Jan et al., 2013</span></a><span data-dcnode-id="4929" instrument_node="">). A higher-SVF area with thinner broad-leaf trees was shown to ventilate better (</span><a class="workspace-trigger" data-dcnode-id="4927" href="#bib0050" name="bbib0050"><span data-dcnode-id="4928" instrument_node="">Gál and Unger, 2014</span></a><span data-dcnode-id="4926" instrument_node="">). Compared to the LAI, the SVF is more suitable for ventilation analysis purpose and is used in this study.</span></p></section><section data-dcnode-id="4555" id="sec0030"><h3 class="u-h4 u-margin-m-top u-margin-xs-bottom" data-dcnode-id="4920" id="sect0045"><span data-dcnode-id="4923" instrument_node="">2.4</span><span data-dcnode-id="4922" instrument_node="">. </span><span data-dcnode-id="4921" instrument_node="">Numerical simulation method</span></h3><div data-dcnode-id="4599"><p data-dcnode-id="4733" id="par0075"><span data-dcnode-id="4915"><span data-dcnode-id="4919" instrument_node="">The main focus of this study is to analyze and explain a typical daytime situation in summer for the entire park. Before obtaining numerical simulation results, validation of the simulation model is required. Measurements give data for specific locations at a specific time. The measurement data were used for the validation of the simulation model. After confirmation of the </span><a class="topic-link" data-dcnode-id="4917" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.sciencedirect.com/topics/earth-and-planetary-sciences/feasibility" title="Learn more about feasibility from ScienceDirect's AI-generated Topic Pages"><span data-dcnode-id="4918" instrument_node="">feasibility</span></a><span data-dcnode-id="4916" instrument_node=""> and accuracy of the simulation model, the average meteorological data from recent ten years data of weather station in summer were input for the simulation to analyze the thermal environment of the study area for a typical summer day. In this study, WindPerfect software was utilized to calculate the wind environment of Tainan Park and its surrounding area. WindPerfect, which is suitable for architects and urban planners, has been used in previous studies for analyzing wind and thermal environments (</span></span><a class="workspace-trigger" data-dcnode-id="4913" href="#bib0095" name="bbib0095"><span data-dcnode-id="4914" instrument_node="">Hsieh et al., 2014</span></a><span data-dcnode-id="4912" instrument_node="">, </span><a class="workspace-trigger" data-dcnode-id="4910" href="#bib0110" name="bbib0110"><span data-dcnode-id="4911" instrument_node="">Jan et al., 2013</span></a><span data-dcnode-id="4909" instrument_node="">, </span><a class="workspace-trigger" data-dcnode-id="4907" href="#bib0220" name="bbib0220"><span data-dcnode-id="4908" instrument_node="">Suzuki et al., 2007</span></a><span data-dcnode-id="4902"><span data-dcnode-id="4906" instrument_node="">). Tainan City is hot in summer at noon, at which time wind speed greatly affects the interior and exterior temperatures of parks. In this study, a numerical simulation was conducted to analyze the </span><a class="topic-link" data-dcnode-id="4904" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.sciencedirect.com/topics/agricultural-and-biological-sciences/microclimate" title="Learn more about microclimate from ScienceDirect's AI-generated Topic Pages"><span data-dcnode-id="4905" instrument_node="">microclimate</span></a><span data-dcnode-id="4903" instrument_node=""> during the summer midday hours (11:00–14:00). Wind distribution around buildings is closely related to the surrounding building property layout and trees. A 1000-m-diameter circular area that extends outwards from the center of Tainan Park was generated as the simulation area. </span></span><a class="workspace-trigger" data-dcnode-id="4900" href="#fig0025" name="bfig0025"><span data-dcnode-id="4901" instrument_node="">Fig. 5</span></a><span data-dcnode-id="4899" instrument_node=""> shows the entire area considered in the simulation model, with a calculated boundary area of 2000</span><span data-dcnode-id="4898" instrument_node="">&nbsp;</span><span data-dcnode-id="4897" instrument_node="">m (N-S)</span><span data-dcnode-id="4896" instrument_node="">&nbsp;</span><span data-dcnode-id="4895" instrument_node="">×</span><span data-dcnode-id="4894" instrument_node="">&nbsp;</span><span data-dcnode-id="4893" instrument_node="">2000</span><span data-dcnode-id="4892" instrument_node="">&nbsp;</span><span data-dcnode-id="4891" instrument_node="">m (E-W)</span><span data-dcnode-id="4890" instrument_node="">&nbsp;</span><span data-dcnode-id="4889" instrument_node="">×</span><span data-dcnode-id="4888" instrument_node="">&nbsp;</span><span data-dcnode-id="4887" instrument_node="">150</span><span data-dcnode-id="4886" instrument_node="">&nbsp;</span><span data-dcnode-id="4885" instrument_node="">m. About 39,00,000 structured grids were set in the model. The horizontal grids for the park area were spaced at about 2</span><span data-dcnode-id="4884" instrument_node="">&nbsp;</span><span data-dcnode-id="4883" instrument_node="">m</span><span data-dcnode-id="4882" instrument_node="">&nbsp;</span><span data-dcnode-id="4881" instrument_node="">×</span><span data-dcnode-id="4880" instrument_node="">&nbsp;</span><span data-dcnode-id="4879" instrument_node="">2</span><span data-dcnode-id="4878" instrument_node="">&nbsp;</span><span data-dcnode-id="4877" instrument_node="">m, and the vertical grids were spaced about 0.5</span><span data-dcnode-id="4876" instrument_node="">&nbsp;</span><span data-dcnode-id="4875" instrument_node="">m from the land surface. The simulation model is shown in </span><a class="workspace-trigger" data-dcnode-id="4873" href="#fig0020" name="bfig0020"><span data-dcnode-id="4874" instrument_node="">Fig. 4</span></a><span data-dcnode-id="4864"><span data-dcnode-id="4872" instrument_node="">. </span><a class="topic-link" data-dcnode-id="4870" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.sciencedirect.com/topics/earth-and-planetary-sciences/wind-velocity" title="Learn more about Wind velocity from ScienceDirect's AI-generated Topic Pages"><span data-dcnode-id="4871" instrument_node="">Wind velocity</span></a><span data-dcnode-id="4865"><span data-dcnode-id="4869" instrument_node=""> as a function of height above the ground was assumed to follow a </span><a class="topic-link" data-dcnode-id="4867" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.sciencedirect.com/topics/earth-and-planetary-sciences/wind-profiles" title="Learn more about wind profile from ScienceDirect's AI-generated Topic Pages"><span data-dcnode-id="4868" instrument_node="">wind profile</span></a><span data-dcnode-id="4866" instrument_node=""> power law (see Eq. </span></span></span><a class="workspace-trigger" data-dcnode-id="4862" href="#eq0005" name="beq0005"><span data-dcnode-id="4863" instrument_node="">(1)</span></a><span data-dcnode-id="4861" instrument_node="">).</span><span class="display" data-dcnode-id="4757"><span class="formula" data-dcnode-id="4758" id="eq0005"><span class="label" data-dcnode-id="4859"><span data-dcnode-id="4860" instrument_node="">(1)</span></span><span class="math" data-dcnode-id="4759"><span class="MathJax_Preview" data-dcnode-id="4858" style=""></span><span class="MathJax_SVG" data-dcnode-id="4762" data-mathml="<math xmlns=&quot;http://www.w3.org/1998/Math/MathML&quot;><mrow is=&quot;true&quot;><mfrac is=&quot;true&quot;><mrow is=&quot;true&quot;><mi is=&quot;true&quot;>U</mi><mo stretchy=&quot;false&quot; is=&quot;true&quot;>(</mo><mi is=&quot;true&quot;>Z</mi><mo stretchy=&quot;false&quot; is=&quot;true&quot;>)</mo></mrow><mrow is=&quot;true&quot;><msub is=&quot;true&quot;><mi is=&quot;true&quot;>U</mi><mn is=&quot;true&quot;>0</mn></msub></mrow></mfrac><mo is=&quot;true&quot;>=</mo><msup is=&quot;true&quot;><mrow is=&quot;true&quot;><mrow is=&quot;true&quot;><mo stretchy=&quot;true&quot; is=&quot;true&quot;>(</mo><mrow is=&quot;true&quot;><mfrac is=&quot;true&quot;><mi is=&quot;true&quot;>Z</mi><mrow is=&quot;true&quot;><msub is=&quot;true&quot;><mi is=&quot;true&quot;>H</mi><mn is=&quot;true&quot;>0</mn></msub></mrow></mfrac></mrow><mo stretchy=&quot;true&quot; is=&quot;true&quot;>)</mo></mrow></mrow><mi is=&quot;true&quot;>&amp;#x3B1;</mi></msup></mrow></math>" id="MathJax-Element-2-Frame" role="presentation" style="font-size: 90%; display: inline-block; position: relative;" tabindex="0"><svg aria-hidden="true" data-dcnode-id="4803" focusable="false" height="4.672ex" role="img" style="vertical-align: -1.722ex;" viewBox="0 -1269.9 6316 2011.5" width="14.669ex" xmlns:xlink="http://www.w3.org/1999/xlink"><g data-dcnode-id="4804" fill="currentColor" stroke="currentColor" stroke-width="0" transform="matrix(1 0 0 -1 0 0)"><g data-dcnode-id="4805" is="true"><g data-dcnode-id="4834" is="true"><g data-dcnode-id="4835" transform="translate(120,0)"><rect data-dcnode-id="4857" height="60" stroke="none" width="1725" x="0" y="220"></rect><g data-dcnode-id="4844" is="true" transform="translate(60,586)"><g data-dcnode-id="4854" i
