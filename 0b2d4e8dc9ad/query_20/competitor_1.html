tnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.sciencedirect.com/science/article/pii/S0378778822001335" target="_self"><h3 class="article-title ellipsis text-s" data-dcnode-id="413" id="citing-articles-article0-title"><span data-dcnode-id="414" instrument_node="">Potential residential tree arrangement to optimise dwelling energy efficiency</span></h3></a><div class="article-source ellipsis" data-dcnode-id="410"><span data-dcnode-id="411" instrument_node="">2022, Energy and Buildings</span></div></div><div class="buttons" data-dcnode-id="403"><button aria-controls="citing-articles-article0" aria-describedby="citing-articles-article0-title" aria-expanded="false" class="button-link button-link-secondary list-item-details-toggle" data-aa-button="sd:product:journal:article:location=citing-articles:type=view-details" data-dcnode-id="404" type="button"><span class="button-link-text" data-dcnode-id="407"><span data-dcnode-id="408" instrument_node="">Show abstract</span></span><svg class="icon icon-navigate-down" data-dcnode-id="405" focusable="false" height="24" viewBox="0 0 92 128" width="17.25"><path d="m1 51l7-7 38 38 38-38 7 7-45 45z" data-dcnode-id="406"></path></svg></button></div><div aria-hidden="true" class="u-display-none" data-dcnode-id="390"><div class="abstract u-margin-m-ver u-margin-xs-right u-font-serif branded" data-dcnode-id="391" id="reference-abstract"><div class="u-margin-ver-m abstract-font" data-dcnode-id="392"><p data-dcnode-id="401" id="sp0010"><span data-dcnode-id="402" instrument_node="">Energy–efficient dwellings promote substantial urban energy conservation. Residential tree allocation, as an Urban Heat Island (UHI) mitigation strategy, stimulates climate responsivity, lowers Air Conditioner (AC) usage and heat distribution. This paper evaluates dwellings’ response to residential tree planting parameters to assess the building–surround relationship. These parameters include tree type (evergreen or deciduous), volume (1–3 trees), Tree–Building distance (3&nbsp;m or 5&nbsp;m) in each cardinal and inter–cardinal azimuth. These planting configurations highlight dominant Australian urban planning policy and green open space restrictions.</span></p><p data-dcnode-id="399" id="sp0015"><span data-dcnode-id="400" instrument_node="">This study quantifies tree planting configuration models, utilising both typical and extreme weather data and a bi–seasonal approach, to arrive at an Optimal Residential Tree arrangement (ORTa). The simulation process tailors local weather data to assess tree impact upon the diurnal and nocturnal microclimate.</span></p><p data-dcnode-id="397" id="sp0020"><span data-dcnode-id="398" instrument_node="">The ORTa dependence upon orientation ensures correct deep soil levels and viable private backyard volume. The result demonstrates a high probability that deciduous trees save energy bi–seasonally. Across all aspects and weather conditions, ORTa allows for an evergreen tree addition to boost energy conservation without detrimental annual or bi–seasonal effects on building thermal response. Annual weather data indicates two deciduous trees are optimal. These trees would be located east or west at 3&nbsp;m Tree–Building distance (T-B distance), north at 5&nbsp;m&nbsp;T-B distance or south at 3&nbsp;m minimum with the maximum depending upon neighbour’s northerly aspect.</span></p><p data-dcnode-id="395" id="sp0025"><span data-dcnode-id="396" instrument_node="">In typical weather conditions, two deciduous tree arrangements lead to maximum 40% heating energy conservation from any potential ORTa in east, west or north. In addition, it provides 15% east or west cooling energy saving and 7% north. In extreme weather conditions, two tree arrangements provide 25% thermal heating conservation, in any aspect. During heatwaves easterly deciduous tree planting is optimal (18% energy conservation), followed by westerly (7%) and northerly (1%).</span></p><p data-dcnode-id="393" id="sp0030"><span data-dcnode-id="394" instrument_node="">This research recommends five ranked optimal tree arrangements depending on residential parcel deep soil availabilities. This optimisation result encourages decision–makers to appreciate residential green space and reanalyse future urban canopy cover target measurements.</span></p></div></div></div></li><li class="ListArticleItem" data-dcnode-id="369"><div class="sub-heading" data-dcnode-id="383"><a data-dcnode-id="386" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.sciencedirect.com/science/article/pii/S1364032122000831" target="_self"><h3 class="article-title ellipsis text-s" data-dcnode-id="387" id="citing-articles-article1-title"><span data-dcnode-id="388" instrument_node="">The role of residential tree arrangement: A scoping review of energy efficiency in temperate to subtropical climate zones</span></h3></a><div class="article-source ellipsis" data-dcnode-id="384"><span data-dcnode-id="385" instrument_node="">2022, Renewable and Sustainable Energy Reviews</span></div></div><div class="buttons" data-dcnode-id="377"><button aria-controls="citing-articles-article1" aria-describedby="citing-articles-article1-title" aria-expanded="false" class="button-link button-link-secondary list-item-details-toggle" data-aa-button="sd:product:journal:article:location=citing-articles:type=view-details" data-dcnode-id="378" type="button"><span class="button-link-text" data-dcnode-id="381"><span data-dcnode-id="382" instrument_node="">Show abstract</span></span><svg class="icon icon-navigate-down" data-dcnode-id="379" focusable="false" height="24" viewBox="0 0 92 128" width="17.25"><path d="m1 51l7-7 38 38 38-38 7 7-45 45z" data-dcnode-id="380"></path></svg></button></div><div aria-hidden="true" class="u-display-none" data-dcnode-id="370"><div class="abstract u-margin-m-ver u-margin-xs-right u-font-serif branded" data-dcnode-id="371" id="reference-abstract"><div class="u-margin-ver-m abstract-font" data-dcnode-id="372"><p data-dcnode-id="375" id="abspara0010"><span data-dcnode-id="376" instrument_node="">A significant shift towards consolidating residential neighbourhoods has dramatically influenced the Australian national urban tree canopy benchmark. Recurrent tree planting, in densely settled residential suburbs, is an insufficient, emerging environmental and long-term energy conservation strategy. A global and Australian original research review, spanning the past two decades, reveals a better understanding of the link between trees and the built environment. This review defines potential tree allocation parameters, in urban energy conservation, within residential landscape constraints. This assessment focuses on regions similar to various Australian temperate to sub–tropical climate zones, defined as Mediterranean climate type by Köppen climate classification.</span></p><p data-dcnode-id="373" id="abspara0015"><span data-dcnode-id="374" instrument_node="">Based on this review, the paper then identifies the importance of residential tree requirements and energy demand credibility projections as an amendment to existing metropolitan guidelines, using Sydney, Adelaide, and Perth in Australia as an example. Currently, Australian residential planning and design codes, and landscaping software action-codes, like iTree canopy software or Tree Planting Predictor Tool, do not consider residential tree arrangement. These parameters unify the building-energy assessment scheme with an optimal residential tree arrangement concept, leading to implementable residential development plans. This optimisation, primarily optimal residential tree arrangement, provides housing designers with ideal tree allocation data to yield the greatest effect. In addition, this optimal residential tree arrangement model will transform how researchers measure future urban canopy cover performance.</span></p></div></div></div></li><li class="ListArticleItem" data-dcnode-id="331"><div class="sub-heading" data-dcnode-id="363"><a data-dcnode-id="366" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.sciencedirect.com/science/article/pii/S0360132322000415" target="_self"><h3 class="article-title ellipsis text-s" data-dcnode-id="367" id="citing-articles-article2-title"><span data-dcnode-id="368" instrument_node="">Effects of tree seasonal characteristics on thermal-visual perception and thermal comfort</span></h3></a><div class="article-source ellipsis" data-dcnode-id="364"><span data-dcnode-id="365" instrument_node="">2022, Building and Environment</span></div></div><div class="buttons" data-dcnode-id="357"><button aria-controls="citing-articles-article2" aria-describedby="citing-articles-article2-title" aria-expanded="false" class="button-link button-link-secondary list-item-details-toggle" data-aa-button="sd:product:journal:article:location=citing-articles:type=view-details" data-dcnode-id="358" type="button"><span class="button-link-text" data-dcnode-id="361"><span data-dcnode-id="362" instrument_node="">Show abstract</span></span><svg class="icon icon-navigate-down" data-dcnode-id="359" focusable="false" height="24" viewBox="0 0 92 128" width="17.25"><path d="m1 51l7-7 38 38 38-38 7 7-45 45z" data-dcnode-id="360"></path></svg></button></div><div aria-hidden="true" class="u-display-none" data-dcnode-id="332"><div class="abstract u-margin-m-ver u-margin-xs-right u-font-serif branded" data-dcnode-id="333" id="reference-abstract"><div class="u-margin-ver-m abstract-font" data-dcnode-id="334"><p data-dcnode-id="335" id="abspara0010"><span data-dcnode-id="356" instrument_node="">To understand effects of tree seasonal characteristics on pedestrian thermal-visual perception and explore their influence on outdoor thermal comfort, four typical deciduous shade trees, local to Xi'an China, were measured for annual crown characteristics. Meteorological variables and pedestrian thermal and visual perceptions were simultaneously collected. Universal Thermal Climate Index (UTCI) and visual conditions were used to stratify our results. We found that: (1) Neutral UTCI (NUTCI) under trees decreased in order of </span><em data-dcnode-id="354"><span data-dcnode-id="355" instrument_node="">G. biloba</span></em><span data-dcnode-id="353" instrument_node="">, </span><em data-dcnode-id="351"><span data-dcnode-id="352" instrument_node="">P. orientalis</span></em><span data-dcnode-id="350" instrument_node="">, </span><em data-dcnode-id="348"><span data-dcnode-id="349" instrument_node="">Y. denudat</span></em><em data-dcnode-id="346"><span data-dcnode-id="347" instrument_node="">a</span></em><span data-dcnode-id="345" instrument_node=""> and </span><em data-dcnode-id="343"><span data-dcnode-id="344" instrument_node="">M. azedarach</span></em><span data-dcnode-id="342" instrument_node="">. (2) The ability of trees to reduce UTCI was related to leaflet area, crown color (degree of red and green [a*] and brightness of the color [L*]) and diffuse non-interception (DIFN). The thermal sensation vote (TSV) reduction was related to crown vertical projected area (A</span><sub data-dcnode-id="340"><span data-dcnode-id="341" instrument_node="">crown</span></sub><span data-dcnode-id="339" instrument_node="">) and L*. (3) The ability of trees to reduce the illumination intensity was related to A</span><sub data-dcnode-id="337"><span data-dcnode-id="338" instrument_node="">crown</span></sub><span data-dcnode-id="336" instrument_node="">, DIFN and L*, and the sun sensation vote (SSV) reduction was related to L*. (4) NUTCI in the environment with high illumination was lower than that with low illumination. When UTCI was 1°C−37&nbsp;°C, respondents who reported ‘slightly bright to too bright’ primarily perceived a neutral thermal sensation, followed by these who felt ‘neutral’ and ‘slightly dark to too dark’. Respondents who reported high aesthetic assessment scores tended to vote warm TSV in winter. Our results could provide selection baselines for urban shade trees in optimizing overall pedestrian comfort and promoting urban livability.</span></p></div></div></div></li><li class="ListArticleItem" data-dcnode-id="289"><div class="sub-heading" data-dcnode-id="325"><a data-dcnode-id="328" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.sciencedirect.com/science/article/pii/S2212095522000396" target="_self"><h3 class="article-title ellipsis text-s" data-dcnode-id="329" id="citing-articles-article3-title"><span data-dcnode-id="330" instrument_node="">Spatiotemporal heterogeneity of street thermal environments and development of an optimised method to improve field measurement accuracy</span></h3></a><div class="article-source ellipsis" data-dcnode-id="326"><span data-dcnode-id="327" instrument_node="">2022, Urban Climate</span></div></div><div class="buttons" data-dcnode-id="319"><button aria-controls="citing-articles-article3" aria-describedby="citing-articles-article3-title" aria-expanded="false" class="button-link button-link-secondary list-item-details-toggle" data-aa-button="sd:product:journal:article:location=citing-articles:type=view-details" data-dcnode-id="320" type="button"><span class="button-link-text" data-dcnode-id="323"><span data-dcnode-id="324" instrument_node="">Show abstract</span></span><svg class="icon icon-navigate-down" data-dcnode-id="321" focusable="false" height="24" viewBox="0 0 92 128" width="17.25"><path d="m1 51l7-7 38 38 38-38 7 7-45 45z" data-dcnode-id="322"></path></svg></button></div><div aria-hidden="true" class="u-display-none" data-dcnode-id="290"><div class="abstract u-margin-m-ver u-margin-xs-right u-font-serif branded" data-dcnode-id="291" id="reference-abstract"><div class="u-margin-ver-m abstract-font" data-dcnode-id="292"><p data-dcnode-id="293" id="sp0095"><span data-dcnode-id="318" instrument_node="">Quantification of thermal environments in cities is of significance for revealing heat-related impacts and the performance of urban cooling measures, in which field measurement has been a prevailing method. However, the accuracy of field measurement is a critical issue, especially considering the spatial heterogeneity of urban spaces and its interactions with urban heat sources. Accordingly, the selection of fixed measurement points is of importance to accurately capture urban thermal environments, which has not been well considered in previous studies. Therefore, this study examines the heterogeneity of street thermal environments and explores an approach to improving field measurement accuracy. The study was empirically conducted in two typical streets in Chongqing, a hot-humid city in China. The results indicate that both microclimatic and thermal comfort indices could exhibit strong spatiotemporal heterogeneity, whilst they were measured in a same street. At a specific time, within a street, the largest air temperature (</span><em data-dcnode-id="316"><span data-dcnode-id="317" instrument_node="">T</span></em><sub data-dcnode-id="313"><em data-dcnode-id="314"><span data-dcnode-id="315" instrument_node="">a</span></em></sub><span data-dcnode-id="312" instrument_node="">), mean radiant temperature (MRT), physiological equivalent temperature (PET) and universal thermal climate index (UTCI) difference within a same street could reach 9.4&nbsp;°C, 45.9&nbsp;°C, 29.6&nbsp;°C and 16.3&nbsp;°C. Moreover, the measured </span><em data-dcnode-id="310"><span data-dcnode-id="311" instrument_node="">T</span></em><sub data-dcnode-id="307"><em data-dcnode-id="308"><span data-dcnode-id="309" instrument_node="">a</span></em></sub><span data-dcnode-id="306" instrument_node="">, MRT, PET and UTCI deviated from the average values which are used to represent street thermal environments and thermal comfort. </span><em data-dcnode-id="304"><span data-dcnode-id="305" instrument_node="">T</span></em><sub data-dcnode-id="301"><em data-dcnode-id="302"><span data-dcnode-id="303" instrument_node="">a</span></em></sub><span data-dcnode-id="300" instrument_node=""> and UTCI converged towards the averaged values stronger than MRT and PET, while only 53.4% and 67.1% of the measured </span><em data-dcnode-id="298"><span data-dcnode-id="299" instrument_node="">T</span></em><sub data-dcnode-id="295"><em data-dcnode-id="296"><span data-dcnode-id="297" instrument_node="">a</span></em></sub><span data-dcnode-id="294" instrument_node=""> and only 34.3% and 40.7% of measured UTCI fell into 95% accuracy zones. A framework of optimised multi-objective mobile measurement path was proposed, based on which the optimised measurement paths were obtained, and the measurement accuracy could be improved to above 98.0%. Overall, this study provides a reference for understanding spatiotemporal heterogeneity of street thermal environments and offers an approach to overcoming this issue for high accuracy.</span></p></div></div></div></li><li class="ListArticleItem" data-dcnode-id="271"><div class="sub-heading" data-dcnode-id="283"><a data-dcnode-id="286" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.sciencedirect.com/science/article/pii/S0360132322000117" target="_self"><h3 class="article-title ellipsis text-s" data-dcnode-id="287" id="citing-articles-article4-title"><span data-dcnode-id="288" instrument_node="">Applicability of mobile-measurement strategies to different periods: A field campaign in a precinct with a block park</span></h3></a><div class="article-source ellipsis" data-dcnode-id="284"><span data-dcnode-id="285" instrument_node="">2022, Building and Environment</span></div></div><div class="buttons" data-dcnode-id="277"><button aria-controls="citing-articles-article4" aria-describedby="citing-articles-article4-title" aria-expanded="false" class="button-link button-link-secondary list-item-details-toggle" data-aa-button="sd:product:journal:article:location=citing-articles:type=view-details" data-dcnode-id="278" type="button"><span class="button-link-text" data-dcnode-id="281"><span data-dcnode-id="282" instrument_node="">Show abstract</span></span><svg class="icon icon-navigate-down" data-dcnode-id="279" focusable="false" height="24" viewBox="0 0 92 128" width="17.25"><path d="m1 51l7-7 38 38 38-38 7 7-45 45z" data-dcnode-id="280"></path></svg></button></div><div aria-hidden="true" class="u-display-none" data-dcnode-id="272"><div class="abstract u-margin-m-ver u-margin-xs-right u-font-serif branded" data-dcnode-id="273" id="reference-abstract"><div class="u-margin-ver-m abstract-font" data-dcnode-id="274"><p data-dcnode-id="275" id="abspara0010"><span data-dcnode-id="276" instrument_node="">Urban green spaces play a crucial role in regulating the micro-climates of their surrounding built-up areas, which is particularly important in high-density cities. A field-measurement method with high accuracy and convenient movement is always adopted to assess the micro-climates and regulating capacity. Compared with fixed observation, mobile measurements have been found to offer advantages such as the need for lesser manpower and instruments. Despite the role of mobile measurements in characterizing urban thermal environments, there has still been a lack of consistent methods, leading to measurement errors. Accordingly, this study aimed to assess the applicability of mobile-measurement strategies by a two-day field campaign around People's Park in Guangzhou, China. Numerous findings were noted. Mobile measurements on the precinct scale required a staying time of at least 6&nbsp;min to account for the response time of the probes. Additionally, the most applicable time periods for mobile measurements were the afternoon and even the evening. In terms of thermal characterization, the optimized reentry-transect method should be adopted for periods with abrupt changes in the ambient temperatures. Lastly, the block park has been observed to exert a more substantial ‘cool island’ effect under the colder weather on both days. Its park cooling intensity (PCI) in the late summer ranged from 0.55 to 1.82&nbsp;°C, with a cooling efficiency of 0.33&nbsp;°C/100&nbsp;m, while that in the early autumn ranged from 0.49 to 3.18&nbsp;°C, with a cooling efficiency of 0.50&nbsp;°C/100&nbsp;m.</span></p></div></div></div></li><li class="ListArticleItem" data-dcnode-id="253"><div class="sub-heading" data-dcnode-id="265"><a data-dcnode-id="268" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.sciencedirect.com/science/article/pii/S209526352100100X" target="_self"><h3 class="article-title ellipsis text-s" data-dcnode-id="269" id="citing-articles-article5-title"><span data-dcnode-id="270" instrument_node="">Optimized greenery configuration to mitigate urban heat: A decade systematic review</span></h3></a><div class="article-source ellipsis" data-dcnode-id="266"><span data-dcnode-id="267" instrument_node="">2022, Frontiers of Architectural Research</span></div></div><div class="buttons" data-dcnode-id="259"><button aria-controls="citing-articles-article5" aria-describedby="citing-articles-article5-title" aria-expanded="false" class="button-link button-link-secondary list-item-details-toggle" data-aa-button="sd:product:journal:article:location=citing-articles:type=view-details" data-dcnode-id="260" type="button"><span class="button-link-text" data-dcnode-id="263"><span data-dcnode-id="264" instrument_node="">Show abstract</span></span><svg class="icon icon-navigate-down" data-dcnode-id="261" focusable="false" height="24" viewBox="0 0 92 128" width="17.25"><path d="m1 51l7-7 38 38 38-38 7 7-45 45z" data-dcnode-id="262"></path></svg></button></div><div aria-hidden="true" class="u-display-none" data-dcnode-id="254"><div class="abstract u-margin-m-ver u-margin-xs-right u-font-serif branded" data-dcnode-id="255" id="reference-abstract"><div class="u-margin-ver-m abstract-font" data-dcnode-id="256"><p data-dcnode-id="257" id="abspara0010"><span data-dcnode-id="258" instrument_node="">Urban vegetation is a nature-based solution for cooling cities. Under global warming and urban population growth, it is essential to optimize urban vegetation configuration in the urban area to bring maximum cooling benefit. This paper reviews 85 optimized urban vegetation configuration studies published from 2010 to 2020 to provide an insight into the most effective vegetation configuration for urban heat mitigation. Patterns and preferences in methods and the optimized greenery configurations are comprehensively analyzed. The results indicate that size, quantity, and layout of urban green space and the physiological characteristics and spatial arrangement of urban vegetation significantly influence their cooling effect. Additionally, two other research gaps were identified. First, more research needs to be done in southern hemisphere cities experiencing rapid urbanization and severe impacts of extreme weather. Second, a comprehensive method for quantifying interactions and cumulative effects of natural and artificial factors in the urban environment is required. Future study needs a holistic understanding of the interactive effects of vegetation spatial distribution on urban environment and climate for a more accurate analysis of optimal cooling greening layouts in large urban areas at multi-scales.</span></p></div></div></div></li></ul><a class="button-alternative button-alternative-secondary button-cited-by-more" data-dcnode-id="247" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.scopus.com/scopus/inward/citedby.url%3FpartnerID%3D10%26rel%3D3.0.0%26eid%3D2-s2.0-84974597218%26md5%3D212ead1a5cd5a13e3561a6ba27bd25fa" id="citing-articles-view-all-btn" target="_blank"><svg class="icon icon-arrow-up-right" data-dcnode-id="250" focusable="false" height="32" viewBox="0 0 78 128" width="32"><path d="m4 36h57.07l-59.5 59.5 7.07 7.08 59.36-59.36v56.78h1e1v-74h-74z" data-dcnode-id="251"></path></svg><span class="button-alternative-text" data-dcnod
