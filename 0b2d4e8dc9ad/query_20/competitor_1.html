the gradient height, and α is the exponent. The exponent α was set at 0.25, which is the value for a medium-size city area. Detailed settings are provided in </span><a class="workspace-trigger" data-dcnode-id="4735" href="#tbl0005" name="btbl0005"><span data-dcnode-id="4736" instrument_node="">Table 1</span></a><span data-dcnode-id="4734" instrument_node="">.</span></p><figure class="figure text-xs" data-dcnode-id="4709" id="fig0025"><span data-dcnode-id="4717"><img alt="Fig. 5" aria-describedby="cap0025" data-dcnode-id="4732" height="226" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//ars.els-cdn.com/content/image/1-s2.0-S1618866716301868-gr5.jpg&amp;raw"><span data-dcnode-id="4731" instrument_node=""></span><ol class="links-for-figure" data-dcnode-id="4718"><li data-dcnode-id="4725"><a class="anchor download-link u-font-sans" data-dcnode-id="4726" download="" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//ars.els-cdn.com/content/image/1-s2.0-S1618866716301868-gr5_lrg.jpg" target="_blank" title="Download high-res image (234KB)"><span class="anchor-text" data-dcnode-id="4727"><span data-dcnode-id="4730" instrument_node="">Download : </span><span class="download-link-title" data-dcnode-id="4728"><span data-dcnode-id="4729" instrument_node="">Download high-res image (234KB)</span></span></span></a></li><li data-dcnode-id="4719"><a class="anchor download-link u-font-sans" data-dcnode-id="4720" download="" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//ars.els-cdn.com/content/image/1-s2.0-S1618866716301868-gr5.jpg" target="_blank" title="Download full-size image"><span class="anchor-text" data-dcnode-id="4721"><span data-dcnode-id="4724" instrument_node="">Download : </span><span class="download-link-title" data-dcnode-id="4722"><span data-dcnode-id="4723" instrument_node="">Download full-size image</span></span></span></a></li></ol></span><span class="captions" data-dcnode-id="4710"><span data-dcnode-id="4711" id="cap0025"><p data-dcnode-id="4712" id="spar0025"><span class="label" data-dcnode-id="4715"><span data-dcnode-id="4716" instrument_node="">Fig. 5</span></span><span data-dcnode-id="4714" instrument_node="">. </span><span data-dcnode-id="4713" instrument_node="">Simulation model of study area.</span></p></span></span></figure><div class="tables frame-topbot rowsep-0 colsep-0" data-dcnode-id="4600" id="tbl0005"><span class="captions" data-dcnode-id="4702"><span data-dcnode-id="4703" id="cap0070"><p data-dcnode-id="4704" id="spar0070"><span class="label" data-dcnode-id="4707"><span data-dcnode-id="4708" instrument_node="">Table 1</span></span><span data-dcnode-id="4706" instrument_node="">. </span><span data-dcnode-id="4705" instrument_node="">CFD simulation settings.</span></p></span></span><div class="groups" data-dcnode-id="4601"><table data-dcnode-id="4602"><thead class="valign-top" data-dcnode-id="4696"><tr class="rowsep-1" data-dcnode-id="4697"><th class="align-left" data-dcnode-id="4700" scope="col"><span data-dcnode-id="4701" instrument_node="">Boundary condition</span></th><th class="align-left" data-dcnode-id="4698" scope="col"><span data-dcnode-id="4699" instrument_node="">Setting</span></th></tr></thead><tbody data-dcnode-id="4603"><tr data-dcnode-id="4689"><th class="align-left" data-dcnode-id="4694" scope="row"><span data-dcnode-id="4695" instrument_node="">Temperature</span></th><td class="align-left" data-dcnode-id="4690"><span data-dcnode-id="4693" instrument_node="">31.32</span><span data-dcnode-id="4692" instrument_node="">&nbsp;</span><span data-dcnode-id="4691" instrument_node="">°C</span></td></tr><tr data-dcnode-id="4684"><th class="align-left" data-dcnode-id="4687" scope="row"><span data-dcnode-id="4688" instrument_node="">Inflow direction</span></th><td class="align-left" data-dcnode-id="4685"><span data-dcnode-id="4686" instrument_node="">West</span></td></tr><tr data-dcnode-id="4677"><th class="align-left" data-dcnode-id="4682" scope="row"><span data-dcnode-id="4683" instrument_node="">Velocity</span></th><td class="align-left" data-dcnode-id="4678"><span data-dcnode-id="4681" instrument_node="">3.62</span><span data-dcnode-id="4680" instrument_node="">&nbsp;</span><span data-dcnode-id="4679" instrument_node="">m/s</span></td></tr><tr data-dcnode-id="4672"><th class="align-left" data-dcnode-id="4675" scope="row"><span data-dcnode-id="4676" instrument_node="">Control equation type</span></th><td class="align-left" data-dcnode-id="4673"><span data-dcnode-id="4674" instrument_node="">Navier-Stokes equations</span></td></tr><tr data-dcnode-id="4631"><th class="align-left" data-dcnode-id="4660" scope="row"><span data-dcnode-id="4671" instrument_node="">Boundary volume</span><br data-dcnode-id="4670"><span data-dcnode-id="4669" instrument_node="">(L</span><span data-dcnode-id="4668" instrument_node="">&nbsp;</span><span data-dcnode-id="4667" instrument_node="">×</span><span data-dcnode-id="4666" instrument_node="">&nbsp;</span><span data-dcnode-id="4665" instrument_node="">W</span><span data-dcnode-id="4664" instrument_node="">&nbsp;</span><span data-dcnode-id="4663" instrument_node="">×</span><span data-dcnode-id="4662" instrument_node="">&nbsp;</span><span data-dcnode-id="4661" instrument_node="">H)</span></th><td class="align-left" data-dcnode-id="4632"><span data-dcnode-id="4659" instrument_node="">2000</span><span data-dcnode-id="4658" instrument_node="">&nbsp;</span><span data-dcnode-id="4657" instrument_node="">m (N-S)</span><span data-dcnode-id="4656" instrument_node="">&nbsp;</span><span data-dcnode-id="4655" instrument_node="">×</span><span data-dcnode-id="4654" instrument_node="">&nbsp;</span><span data-dcnode-id="4653" instrument_node="">2000</span><span data-dcnode-id="4652" instrument_node="">&nbsp;</span><span data-dcnode-id="4651" instrument_node="">m (E-W)</span><span data-dcnode-id="4650" instrument_node="">&nbsp;</span><span data-dcnode-id="4649" instrument_node="">×</span><span data-dcnode-id="4648" instrument_node="">&nbsp;</span><span data-dcnode-id="4647" instrument_node="">150 m</span><span data-dcnode-id="4646" instrument_node="">&nbsp;</span><span data-dcnode-id="4645" instrument_node="">＝</span><span data-dcnode-id="4644" instrument_node="">&nbsp;</span><span data-dcnode-id="4643" instrument_node="">6</span><span data-dcnode-id="4642" instrument_node="">&nbsp;</span><span data-dcnode-id="4641" instrument_node="">×</span><span data-dcnode-id="4640" instrument_node="">&nbsp;</span><span data-dcnode-id="4639" instrument_node="">10</span><sup data-dcnode-id="4637"><span data-dcnode-id="4638" instrument_node="">8</span></sup><span data-dcnode-id="4636" instrument_node="">&nbsp;</span><span data-dcnode-id="4635" instrument_node="">m</span><sup data-dcnode-id="4633"><span data-dcnode-id="4634" instrument_node="">3</span></sup></td></tr><tr data-dcnode-id="4626"><th class="align-left" data-dcnode-id="4629" scope="row"><span data-dcnode-id="4630" instrument_node="">Discretization</span></th><td class="align-left" data-dcnode-id="4627"><span data-dcnode-id="4628" instrument_node="">Non-uniform meshing</span></td></tr><tr data-dcnode-id="4621"><th class="align-left" data-dcnode-id="4624" scope="row"><span data-dcnode-id="4625" instrument_node="">Number of meshes</span></th><td class="align-left" data-dcnode-id="4622"><span data-dcnode-id="4623" instrument_node="">≒3,900,000</span></td></tr><tr data-dcnode-id="4614"><th class="align-left" data-dcnode-id="4619" scope="row"><span data-dcnode-id="4620" instrument_node="">Reference height (δ)</span></th><td class="align-left" data-dcnode-id="4615"><span data-dcnode-id="4618" instrument_node="">12.9</span><span data-dcnode-id="4617" instrument_node="">&nbsp;</span><span data-dcnode-id="4616" instrument_node="">m above ground level (AGL)</span></td></tr><tr data-dcnode-id="4609"><th class="align-left" data-dcnode-id="4612" scope="row"><span data-dcnode-id="4613" instrument_node="">Power law profile (α)</span></th><td class="align-left" data-dcnode-id="4610"><span data-dcnode-id="4611" instrument_node="">0.2</span></td></tr><tr data-dcnode-id="4604"><th class="align-left" data-dcnode-id="4607" scope="row"><span data-dcnode-id="4608" instrument_node="">Latitude and longitude</span></th><td class="align-left" data-dcnode-id="4605"><span data-dcnode-id="4606" instrument_node="">N. latitude 23°0′, E. longitude 120°13′</span></td></tr></tbody></table></div></div></div><p data-dcnode-id="4594" id="par0080"><span data-dcnode-id="4598" instrument_node="">As for the planting parameter settings, the tree crowns were simplified and assumed to be a cube-shaped grid composed of leaves through which air flows, where how the air flows within the grid depends on the leaf density. In other words, the crown consisted of tree leaves and air between leaves. The aperture rate, which is defined as the percentage of air flowing through the tree crown of the planting model, was preset. The aperture rates for the three groups divided in terms of leaf density, from dense to loose, were set as 0.8, 0.6, and 0.2, respectively (</span><a class="workspace-trigger" data-dcnode-id="4596" href="#bib0215" name="bbib0215"><span data-dcnode-id="4597" instrument_node="">Sun and Hsieh, 2011</span></a><span data-dcnode-id="4595" instrument_node="">). For other trees, an average value of 0.5 was set. The resistance coefficient for the air flow was set at 0.25 for all plantings.</span></p><p data-dcnode-id="4556" id="par0085"><span data-dcnode-id="4593" instrument_node="">A human thermal comfort evaluation was also conducted using CFD modeling. The index applied for assessing the thermal environment in the study area is the SET*, an index of human comfort that takes into consideration both personal factors and the physical environment. Personal factors are clothing insulation (clo) and human activity (metabolic heat). Although people in an urban park have slight variations in clothing and activity intensity, clothing and metabolic heat were assumed to be similar for all people in the thermal comfort simulation conducted in this study. The clothing was preset at 0.6 clo, and metabolic heat was preset at 100</span><span data-dcnode-id="4592" instrument_node="">&nbsp;</span><span data-dcnode-id="4591" instrument_node="">W (1.7</span><span data-dcnode-id="4590" instrument_node="">&nbsp;</span><span data-dcnode-id="4589" instrument_node="">m</span><sup data-dcnode-id="4587"><span data-dcnode-id="4588" instrument_node="">2</span></sup><span data-dcnode-id="4586" instrument_node="">&nbsp;</span><span data-dcnode-id="4585" instrument_node="">×</span><span data-dcnode-id="4584" instrument_node="">&nbsp;</span><span data-dcnode-id="4583" instrument_node="">1 Met (=</span><span data-dcnode-id="4582" instrument_node="">&nbsp;</span><span data-dcnode-id="4581" instrument_node="">58.15</span><span data-dcnode-id="4580" instrument_node="">&nbsp;</span><span data-dcnode-id="4579" instrument_node="">W/m</span><sup data-dcnode-id="4577"><span data-dcnode-id="4578" instrument_node="">2</span></sup><span data-dcnode-id="4576" instrument_node="">)) (</span><a class="workspace-trigger" data-dcnode-id="4574" href="#bib0215" name="bbib0215"><span data-dcnode-id="4575" instrument_node="">Sun and Hsieh, 2011</span></a><span data-dcnode-id="4573" instrument_node="">). The physical environment factors were air temperature, wind speed, relative humidity, and MRT. The initial settings of air temperature, humidity, and wind speed for the 3D simulation were set based on the weather data of a typical summer day. The MRT was calculated according to the formula proposed by </span><a class="workspace-trigger" data-dcnode-id="4571" href="#bib0260" name="bbib0260"><span data-dcnode-id="4572" instrument_node="">Zhuang and Lin (2008)</span></a><span data-dcnode-id="4570" instrument_node="">, which requires the black globe temperature (</span><em data-dcnode-id="4566"><span data-dcnode-id="4569" instrument_node="">T</span><sub data-dcnode-id="4567"><span data-dcnode-id="4568" instrument_node="">g</span></sub></em><span data-dcnode-id="4565" instrument_node="">), air temperature (</span><em data-dcnode-id="4561"><span data-dcnode-id="4564" instrument_node="">T</span><sub data-dcnode-id="4562"><span data-dcnode-id="4563" instrument_node="">a</span></sub></em><span data-dcnode-id="4560" instrument_node="">), and wind speed (</span><em data-dcnode-id="4558"><span data-dcnode-id="4559" instrument_node="">u</span></em><span data-dcnode-id="4557" instrument_node="">).</span></p></section><section data-dcnode-id="4461" id="sec0035"><h3 class="u-h4 u-margin-m-top u-margin-xs-bottom" data-dcnode-id="4551" id="sect0050"><span data-dcnode-id="4554" instrument_node="">2.5</span><span data-dcnode-id="4553" instrument_node="">. </span><span data-dcnode-id="4552" instrument_node="">Wind and shading classification and simplified comfort assessment map</span></h3><p data-dcnode-id="4549" id="par0090"><span data-dcnode-id="4550" instrument_node="">As explained above, six assessment indicators must be considered for evaluation of thermal comfort. However, for landscape architects, the calculation procedure is complicated. A simplified assessment is therefore proposed in this study. It was determined from the simulation results that in addition to the shading factor, wind speed is a significant factor that affects human comfort in summer. In this study, shading and wind speed were used to assess human comfort in the study area. A simplified comfort assessment map was then created using the wind speed distribution map (low- and high-wind-speed areas) and the shading distribution map (shaded and unshaded areas). The simplified comfort assessment map thus has four classes.</span></p><p data-dcnode-id="4462" id="par0095"><span data-dcnode-id="4548" instrument_node="">The shading simulation was conducted at a specific time in summer, 13:00 for example, to identify the shaded and unshaded areas. In this study, the shaded and unshaded classification was decided based on whether trees were planted. If there was a tree crown, regardless of the SVF value of the respective tree, it was assumed that there would be shade. </span><a class="workspace-trigger" data-dcnode-id="4546" href="#bib0250" name="bbib0250"><span data-dcnode-id="4547" instrument_node="">Yuan and Ng (2012)</span></a><span data-dcnode-id="4537"><span data-dcnode-id="4545" instrument_node=""> observed pedestrian-level </span><a class="topic-link" data-dcnode-id="4543" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.sciencedirect.com/topics/agricultural-and-biological-sciences/natural-ventilation" title="Learn more about natural ventilation from ScienceDirect's AI-generated Topic Pages"><span data-dcnode-id="4544" instrument_node="">natural ventilation</span></a><span data-dcnode-id="4538"><span data-dcnode-id="4542" instrument_node=""> in the </span><a class="topic-link" data-dcnode-id="4540" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.sciencedirect.com/topics/earth-and-planetary-sciences/street-canyon" title="Learn more about street canyon from ScienceDirect's AI-generated Topic Pages"><span data-dcnode-id="4541" instrument_node="">street canyon</span></a><span data-dcnode-id="4539" instrument_node="">. They assigned pedestrian-level wind speed (</span></span></span><em data-dcnode-id="4535"><span data-dcnode-id="4536" instrument_node="">u</span></em><span data-dcnode-id="4534" instrument_node="">) into one of five classes, namely Class 1: stagnant (</span><em data-dcnode-id="4532"><span data-dcnode-id="4533" instrument_node="">u</span></em><span data-dcnode-id="4531" instrument_node="">&nbsp;</span><span data-dcnode-id="4530" instrument_node="">&lt;</span><span data-dcnode-id="4529" instrument_node="">&nbsp;</span><span data-dcnode-id="4528" instrument_node="">0.3</span><span data-dcnode-id="4527" instrument_node="">&nbsp;</span><span data-dcnode-id="4526" instrument_node="">m/s); Class 2: poor (0.3</span><span data-dcnode-id="4525" instrument_node="">&nbsp;</span><span data-dcnode-id="4524" instrument_node="">m/s</span><span data-dcnode-id="4523" instrument_node="">&nbsp;</span><span data-dcnode-id="4522" instrument_node="">≤</span><span data-dcnode-id="4521" instrument_node="">&nbsp;</span><em data-dcnode-id="4519"><span data-dcnode-id="4520" instrument_node="">u</span></em><span data-dcnode-id="4518" instrument_node="">&nbsp;</span><span data-dcnode-id="4517" instrument_node="">&lt;</span><span data-dcnode-id="4516" instrument_node="">&nbsp;</span><span data-dcnode-id="4515" instrument_node="">0.6</span><span data-dcnode-id="4514" instrument_node="">&nbsp;</span><span data-dcnode-id="4513" instrument_node="">m/s); Class 3: low (0.6</span><span data-dcnode-id="4512" instrument_node="">&nbsp;</span><span data-dcnode-id="4511" instrument_node="">m/s</span><span data-dcnode-id="4510" instrument_node="">&nbsp;</span><span data-dcnode-id="4509" instrument_node="">≤</span><span data-dcnode-id="4508" instrument_node="">&nbsp;</span><em data-dcnode-id="4506"><span data-dcnode-id="4507" instrument_node="">u</span></em><span data-dcnode-id="4505" instrument_node="">&nbsp;</span><span data-dcnode-id="4504" instrument_node="">&lt;</span><span data-dcnode-id="4503" instrument_node="">&nbsp;</span><span data-dcnode-id="4502" instrument_node="">1.0</span><span data-dcnode-id="4501" instrument_node="">&nbsp;</span><span data-dcnode-id="4500" instrument_node="">m/s); Class 4: satisfactory (1.0</span><span data-dcnode-id="4499" instrument_node="">&nbsp;</span><span data-dcnode-id="4498" instrument_node="">m/s</span><span data-dcnode-id="4497" instrument_node="">&nbsp;</span><span data-dcnode-id="4496" instrument_node="">≤</span><span data-dcnode-id="4495" instrument_node="">&nbsp;</span><em data-dcnode-id="4493"><span data-dcnode-id="4494" instrument_node="">u</span></em><span data-dcnode-id="4492" instrument_node="">&nbsp;</span><span data-dcnode-id="4491" instrument_node="">&lt;</span><span data-dcnode-id="4490" instrument_node="">&nbsp;</span><span data-dcnode-id="4489" instrument_node="">1.3</span><span data-dcnode-id="4488" instrument_node="">&nbsp;</span><span data-dcnode-id="4487" instrument_node="">m/s); Class 5: good (</span><em data-dcnode-id="4485"><span data-dcnode-id="4486" instrument_node="">u</span></em><span data-dcnode-id="4484" instrument_node="">&nbsp;</span><span data-dcnode-id="4483" instrument_node="">≥</span><span data-dcnode-id="4482" instrument_node="">&nbsp;</span><span data-dcnode-id="4481" instrument_node="">1.3</span><span data-dcnode-id="4480" instrument_node="">&nbsp;</span><span data-dcnode-id="4479" instrument_node="">m/s). However, for the convenience of landscape architects and urban planners, the above five classes are simplified into two classes in this study. The first class was defined as low wind speed (</span><em data-dcnode-id="4477"><span data-dcnode-id="4478" instrument_node="">u</span></em><span data-dcnode-id="4476" instrument_node="">&nbsp;</span><span data-dcnode-id="4475" instrument_node="">&lt;</span><span data-dcnode-id="4474" instrument_node="">&nbsp;</span><span data-dcnode-id="4473" instrument_node="">1.0</span><span data-dcnode-id="4472" instrument_node="">&nbsp;</span><span data-dcnode-id="4471" instrument_node="">m/s), and the second class was defined as high wind speed (</span><em data-dcnode-id="4469"><span data-dcnode-id="4470" instrument_node="">u</span></em><span data-dcnode-id="4468" instrument_node="">&nbsp;</span><span data-dcnode-id="4467" instrument_node="">≥</span><span data-dcnode-id="4466" instrument_node="">&nbsp;</span><span data-dcnode-id="4465" instrument_node="">1.0</span><span data-dcnode-id="4464" instrument_node="">&nbsp;</span><span data-dcnode-id="4463" instrument_node="">m/s).</span></p></section></section><section data-dcnode-id="4031" id="sec0040"><h2 class="u-h3 u-margin-l-top u-margin-xs-bottom" data-dcnode-id="4456" id="sect0055"><span data-dcnode-id="4459" instrument_node="">3</span><span data-dcnode-id="4458" instrument_node="">. </span><span data-dcnode-id="4457" instrument_node="">Results and discussion</span></h2><section data-dcnode-id="4289" id="sec0045"><h3 class="u-h4 u-margin-m-top u-margin-xs-bottom" data-dcnode-id="4452" id="sect0060"><span data-dcnode-id="4455" instrument_node="">3.1</span><span data-dcnode-id="4454" instrument_node="">. </span><span data-dcnode-id="4453" instrument_node="">Onsite measurement results and numerical simulation verification</span></h3><div data-dcnode-id="4418"><p data-dcnode-id="4443" id="par0100"><span data-dcnode-id="4451" instrument_node="">The wind was from the northwest and north during the measurement period. Wind speed and temperature distributions during the midday period based on the fixed- and mobile-type observations are shown in </span><a class="workspace-trigger" data-dcnode-id="4449" href="#fig0030" name="bfig0030"><span data-dcnode-id="4450" instrument_node="">Figs. 6</span></a><span data-dcnode-id="4444"><span data-dcnode-id="4448" instrument_node="">a and b, respectively. From the windward side to the leeward side, the wind speed gradually decreased due to planting obstructions in the center of the park. Data for the fixed- and mobile-type observations indicate that the wind speed was faster, and the temperature was lower on the windward side of the park. This indicates that shade and </span><a class="topic-link" data-dcnode-id="4446" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.sciencedirect.com/topics/earth-and-planetary-sciences/evapotranspiration" title="Learn more about evapotranspiration from ScienceDirect's AI-generated Topic Pages"><span data-dcnode-id="4447" instrument_node="">evapotranspiration</span></a><span data-dcnode-id="4445" instrument_node=""> in the park can decrease temperature. However, the downstream wind field was obstructed by plants. A wind corridor was not created, and therefore hot air was not taken away and cold air was not introduced on the downstream side. The temperature was thus higher on the downstream side of the park.</span></span></p><figure class="figure text-xs" data-dcnode-id="4419" id="fig0030"><span data-dcnode-id="4427"><img alt="Fig. 6" aria-describedby="cap0030" data-dcnode-id="4442" height="877" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//ars.els-cdn.com/content/image/1-s2.0-S1618866716301868-gr6.jpg&amp;raw"><span data-dcnode-id="4441" instrument_node=""></span><ol class="links-for-figure" data-dcnode-id="4428"><li data-dcnode-id="4435"><a class="anchor download-link u-font-sans" data-dcnode-id="4436" download="" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//ars.els-cdn.com/content/image/1-s2.0-S1618866716301868-gr6_lrg.jpg" target="_blank" title="Download high-res image (993KB)"><span class="anchor-text" data-dcnode-id="4437"><span data-dcnode-id="4440" instrument_node="">Download : </span><span class="download-link-title" data-dcnode-id="4438"><span data-dcnode-id="4439" instrument_node="">Download high-res image (993KB)</span></span></span></a></li><li data-dcnode-id="4429"><a class="anchor download-link u-font-sans" data-dcnode-id="4430" download="" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//ars.els-cdn.com/content/image/1-s2.0-S1618866716301868-gr6.jpg" target="_blank" title="Download full-size image"><span class="anchor-text" data-dcnode-id="4431"><span data-dcnode-id="4434" instrument_node="">Download : </span><span class="download-link-title" data-dcnode-id="4432"><span data-dcnode-id="4433" instrument_node="">Download full-size image</span></span></span></a></li></ol></span><span class="captions" data-dcnode-id="4420"><span data-dcnode-id="4421" id="cap0030"><p data-dcnode-id="4422" id="spar0030"><span class="label" data-dcnode-id="4425"><span data-dcnode-id="4426" instrument_node="">Fig. 6</span></span><span data-dcnode-id="4424" instrument_node="">. </span><span data-dcnode-id="4423" instrument_node="">Observation results during midday period. (a) Wind speed distribution and (b) air temperature distribution.</span></p></span></span></figure></div><div data-dcnode-id="4355"><p data-dcnode-id="4392" id="par0105"><a class="workspace-trigger" data-dcnode-id="4416" href="#fig0035" name="bfig0035"><span data-dcnode-id="4417" instrument_node="">Fig. 7</span></a><span data-dcnode-id="4415" instrument_node="">a shows the wind speed for four fixed-type observation survey points within the park. Wind speed at B1 was found to be 2.58</span><span data-dcnode-id="4414" instrument_node="">&nbsp;</span><span data-dcnode-id="4413" instrument_node="">m/s at noon. This location lies in an upstream area, and there are few plants and obstructions nearby. Point B3 lies on the leeward side, where the wind speed was 1.06</span><span data-dcnode-id="4412" instrument_node="">&nbsp;</span><span data-dcnode-id="4407"><span data-dcnode-id="4411" instrument_node="">m/s. Point B2 lies in the middle of a dense </span><a class="topic-link" data-dcnode-id="4409" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.sciencedirect.com/topics/agricultural-and-biological-sciences/woodlands" title="Learn more about woodland from ScienceDirect's AI-generated Topic Pages"><span data-dcnode-id="4410" instrument_node="">woodland</span></a><span data-dcnode-id="4408" instrument_node="">, where the wind speed was 0.83</span></span><span data-dcnode-id="4406" instrument_node="">&nbsp;</span><span data-dcnode-id="4405" instrument_node="">m/s. Point C is located in an open space surrounded by plants. The average wind speed at C1 was found to be 0.68</span><span data-dcnode-id="4404" instrument_node="">&nbsp;</span><span data-dcnode-id="4403" instrument_node="">m/s. A comparison between C1 and C2 was used to measure the influence of the tree crown on wind speed (</span><a class="workspace-trigger" data-dcnode-id="4401" href="#fig0035" name="bfig0035"><span data-dcnode-id="4402" instrument_node="">Fig. 7</span></a><span data-dcnode-id="4400" instrument_node="">(b)). The wind speed at 1.5</span><span data-dcnode-id="4399" instrument_node="">&nbsp;</span><span data-dcnode-id="4398" instrument_node="">m (i.e., under the tree crown) was higher than that at 4.5</span><span data-dcnode-id="4397" instrument_node="">&nbsp;</span><span data-dcnode-id="4396" instrument_node="">m (i.e., middle of the tree crown). In summary, the wind speed decreased at the tree crown height due to the influence of planting obstructions. The SVF for point C was previously shown in </span><a class="workspace-trigger" data-dcnode-id="4394" href="#fig0020" name="bfig0020"><span data-dcnode-id="4395" instrument_node="">Fig. 4</span></a><span data-dcnode-id="4393" instrument_node="">.</span></p><figure class="figure text-xs" data-dcnode-id="4356" id="fig0035"><span data-dcnode-id="4376"><img alt="Fig. 7" aria-describedby="cap0035" data-dcnode-id="4391" height="756" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//ars.els-cdn.com/content/image/1-s2.0-S1618866716301868-gr7.jpg&amp;raw"><span data-dcnode-id="4390" instrument_node=""></span><ol class="links-for-figure" data-dcnode-id="4377"><li data-dcnode-id="4384"><a class="anchor download-link u-font-sans" data-dcnode-id="4385" download="" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//ars.els-cdn.com/content/image/1-s2.0-S1618866716301868-gr7_lrg.jpg" target="_blank" title="Download high-res image (473KB)"><span class="anchor-text" data-dcnode-id="4386"><span data-dcnode-id="4389" instrument_node="">Download : </span><span class="download-link-title" data-dcnode-id="4387"><span data-dcnode-id="4388" instrument_node="">Download high-res image (473KB)</span></span></span></a></li><li data-dcnode-id="4378"><a class="anchor download-link u-font-sans" data-dcnode-id="4379" download="" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//ars.els-cdn.com/content/image/1-s2.0-S1618866716301868-gr7.jpg" target="_blank" title="Download full-size image"><span class="anchor-text" data-dcnode-id="4380"><span data-dcnode-id="4383" instrument_node="">Download : </span><span class="download-link-title" data-dcnode-id="4381"><span data-dcnode-id="4382" instrument_node="">Download full-size image</span></span></span></a></li></ol></span><span class="captions" data-dcnode-id="4357"><span data-dcnode-id="4358" id="cap0035"><p data-dcnode-id="4359" id="spar0035"><span class="label" data-dcnode-id="4374"><span data-dcnode-id="4375" instrument_node="">Fig. 7</span></span><span data-dcnode-id="4373" instrument_node="">. </span><span data-dcnode-id="4372" instrument_node="">Wind speed measurement results by time. (a) At fixed-type measurement points and (b) for various heights at point C (C1</span><span data-dcnode-id="4371" instrument_node="">&nbsp;</span><span data-dcnode-id="4370" instrument_node="">=</span><span data-dcnode-id="4369" instrument_node="">&nbsp;</span><span data-dcnode-id="4368" instrument_node="">1.5</span><span data-dcnode-id="4367" instrument_node="">&nbsp;</span><span data-dcnode-id="4366" instrument_node="">m, C2</span><span data-dcnode-id="4365" instrument_node="">&nbsp;</span><span data-dcnode-id="4364" instrument_node="">=</span><span data-dcnode-id="4363" instrument_node="">&nbsp;</span><span data-dcnode-id="4362" instrument_node="">4.5</span><span data-dcnode-id="4361" instrument_node="">&nbsp;</span><span data-dcnode-id="4360" instrument_node="">m).</span></p></span></span></figure></div><div data-dcnode-id="4290"><p data-dcnode-id="4341" id="par0110"><span data-dcnode-id="4354" instrument_node="">There are 5 fixed-type measurement points and 21 mobile-type measurement points in this study. The fixed-type measurement points are B1, B2, B3, C1, and C2, at which high-accuracy equipment was used. However, mobile-type equipment can only show the tendency of wind speed, and the air flow accuracy is not adequate for analyzing statistical data. Therefore, the air flow results of the CFD simulation were verified with the observation results from the fixed-type measurement points. The wind speed simulation results at a height of 1.5</span><span data-dcnode-id="4353" instrument_node="">&nbsp;</span><span data-dcnode-id="4352" instrument_node="">m are shown in </span><a class="workspace-trigger" data-dcnode-id="4350" href="#fig0040" name="bfig0040"><span data-dcnode-id="4351" instrument_node="">Fig. 8</span></a><span data-dcnode-id="4349" instrument_node="">. The average onsite measurement data for all points were calculated and compared with the simulation results, as shown in </span><a class="workspace-trigger" data-dcnode-id="4347" href="#fig0045" name="bfig0045"><span data-dcnode-id="4348" instrument_node="">Fig. 9</span></a><span data-dcnode-id="4342"><span data-dcnode-id="4346" instrument_node="">. The overall trends in the wind speed distributions from the simulations are similar to those based on the observation results, indicating the usability and credibility of the numerical model. The validation results prove that the numerical simulation model can be used for assessing the wind and </span><a class="topic-link" data-dcnode-id="4344" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.sciencedirect.com/topics/earth-and-planetary-sciences/thermal-environment" title="Learn more about thermal environment from ScienceDirect's AI-generated Topic Pages"><span data-dcnode-id="4345" instrument_node="">thermal environment</span></a><span data-dcnode-id="4343" instrument_node=""> of a park.</span></span></p><figure class="figure text-xs" data-dcnode-id="4315" id="fig0040"><span data-dcnode-id="4325"><img alt="Fig. 8" aria-describedby="cap0040" data-dcnode-id="4340" height="442" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//ars.els-cdn.com/content/image/1-s2.0-S1618866716301868-gr8.jpg&amp;raw"><span data-dcnode-id="4339" instrument_node=""></span><ol class="links-for-figure" data-dcnode-id="4326"><li data-dcnode-id="4333"><a class="anchor download-link u-font-sans" data-dcnode-id="4334" download="" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//ars.els-cdn.com/content/image/1-s2.0-S1618866716301868-gr8_lrg.jpg" target="_blank" title="Download high-res image (1MB)"><span class="anchor-text" data-dcnode-id="4335"><span data-dcnode-id="4338" instrument_node="">Download : </span><span class="download-link-title" data-dcnode-id="4336"><span data-dcnode-id="4337" instrument_node="">Download high-res image (1MB)</span></span></span></a></li><li data-dcnode-id="4327"><a class="anchor download-link u-font-sans" data-dcnode-id="4328" download="" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//ars.els-cdn.com/content/image/1-s2.0-S1618866716301868-gr8.jpg" target="_blank" title="Download full-size image"><span class="anchor-text" data-dcnode-id="4329"><span data-dcnode-id="4332" instrument_node="">Download : </span><span class="download-link-title" data-dcnode-id="4330"><span data-dcnode-id="4331" instrument_node="">Download full-size image</span></span></span></a></li></ol></span><span class="captions" data-dcnode-id="4316"><span data-dcnode-id="4317" id="cap0040"><p data-dcnode-id="4318" id="spar0040"><span class="label" data-dcnode-id="4323"><span data-dcnode-id="4324" instrument_node="">Fig. 8</span></span><span data-dcnode-id="4322" instrument_node="">. </span><span data-dcnode-id="4321" instrument_node="">Wind speed simulation results at height of 1.5</span><span data-dcnode-id="4320" instrument_node="">&nbsp;</span><span data-dcnode-id="4319" instrument_node="">m.</span></p></span></span></figure><figure class="figure text-xs" data-dcnode-id="4291" id="fig0045"><span data-dcnode-id="4299"><img alt="Fig. 9" aria-describedby="cap0045" data-dcnode-id="4314" height="227" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//ars.els-cdn.com/content/image/1-s2.0-S1618866716301868-gr9.jpg&amp;raw"><span data-dcnode-id="4313" instrument_node=""></span><ol class="links-for-figure" data-dcnode-id="4300"><li data-dcnode-id="4307"><a class="anchor download-link u-font-sans" data-dcnode-id="4308" download="" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//ars.els-cdn.com/content/image/1-s2.0-S1618866716301868-gr9_lrg.jpg" target="_blank" title="Download high-res image (78KB)"><span class="anchor-text" data-dcnode-id="4309"><span data-dcnode-id="4312" instrument_node="">Download : </span><span class="download-link-title" data-dcnode-id="4310"><span data-dcnode-id="4311" instrument_node="">Download high-res image (78KB)</span></span></span></a></li><li data-dcnode-id="4301"><a class="anchor download-link u-font-sans" data-dcnode-id="4302" download="" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//ars.els-cdn.com/content/image/1-s2.0-S1618866716301868-gr9.jpg" target="_blank" title="Download full-size image"><span class="anchor-text" data-dcnode-id="4303"><span data-dcnode-id="4306" instrument_node="">Download : </span><span class="download-link-title" data-dcnode-id="4304"><span data-dcnode-id="4305" instrument_node="">Download full-size image</span></span></span></a></li></ol></span><span class="captions" data-dcnode-id="4292"><span data-dcnode-id="4293" id="cap0045"><p data-dcnode-id="4294" id="spar0045"><span class="label" data-dcnode-id="4297"><span data-dcnode-id="4298" instrument_node="">Fig. 9</span></span><span data-dcnode-id="4296" instrument_node="">. </span><span data-dcnode-id="4295" instrument_node="">Comparison of wind speeds obtained from simulation and measurements.</span></p></span></span></figure></div></section><section data-dcnode-id="4204" id="sec0050"><h3 class="u-h4 u-margin-m-top u-margin-xs-bottom" data-dcnode-id="4285" id="sect0065"><span data-dcnode-id="4288" instrument_node="">3.2</span><span data-dcnode-id="4287" instrument_node="">. </span><span data-dcnode-id="4286" instrument_node="">Simulation results</span></h3><div data-dcnode-id="4247"><p data-dcnode-id="4272" id="par0115"><a class="workspace-trigger" data-dcnode-id="4283" href="#fig0050" name="bfig0050"><span data-dcnode-id="4284" instrument_node="">Fig. 10</span></a><span data-dcnode-id="4282" instrument_node="">a shows the wind speed distribution (simulation results for the prevailing wind direction) at a height of 1.5</span><span data-dcnode-id="4281" instrument_node="">&nbsp;</span><span data-dcnode-id="4280" instrument_node="">m. The wind on the west side of the park (windward area) hit the tree crown, with some of the wind flowing to pedestrian height. On the east side of the park, the wind was obstructed by plants, and thus the wind environment in the leeward area was worse than that in the windward area. Although the wind speed was found to be around 3</span><span data-dcnode-id="4279" instrument_node="">&nbsp;</span><span data-dcnode-id="4278" instrument_node="">m/s in the upstream area, it significantly decreased to lower than 1</span><span data-dcnode-id="4277" instrument_node="">&nbsp;</span><span data-dcnode-id="4276" instrument_node="">m/s in the downstream area. </span><a class="workspace-trigger" data-dcnode-id="4274" href="#fig0050" name="bfig0050"><span data-dcnode-id="4275" instrument_node="">Fig. 10</span></a><span data-dcnode-id="4273" instrument_node="">b shows the simulation results for shaded areas during the midday period. This period has the smallest shaded area compared to those at other daytime hours. The shaded (unshaded) area inside the park occupies about 36.3% (63.7%) of the total area.</span></p><figure class="figure text-xs" data-dcnode-id="4248" id="fig0050"><span data-dcnode-id="4256"><img alt="Fig. 10" aria-describedby="cap0050" data-dcnode-id="4271" height="855" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//ars.els-cdn.com/content/image/1-s2.0-S1618866716301868-gr10.jpg&amp;raw"><span data-dcnode-id="4270" instrument_node=""></span><ol class="links-for-figure" data-dcnode-id="4257"><li data-dcnode-id="4264"><a class="anchor download-link u-font-sans" data-dcnode-id="4265" download="" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//ars.els-cdn.com/content/image/1-s2.0-S1618866716301868-gr10_lrg.jpg" target="_blank" title="Download high-res image (1MB)"><span class="anchor-text" data-dcnode-id="4266"><span data-dcnode-id="4269" instrument_node="">Download : </span><span class="download-link-title" data-dcnode-id="4267"><span data-dcnode-id="4268" instrument_node="">Download high-res image (1MB)</span></span></span></a></li><li data-dcnode-id="4258"><a class="anchor download-link u-font-sans" data-dcnode-id="4259" download="" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//ars.els-cdn.com/content/image/1-s2.0-S1618866716301868-gr10.jpg" target="_blank" title="Download full-size image"><span class="anchor-text" data-dcnode-id="4260"><span data-dcnode-id="4263" instrument_node="">Download : </span><span class="download-link-title" data-dcnode-id="4261"><span data-dcnode-id="4262" instrument_node="">Download full-size image</span></span></span></a></li></ol></span><span class="captions" data-dcnode-id="4249"><span data-dcnode-id="4250" id="cap0050"><p data-dcnode-id="4251" id="spar0050"><span class="label" data-dcnode-id="4254"><span data-dcnode-id="4255" instrument_node="">Fig. 10</span></span><span data-dcnode-id="4253" instrument_node="">. </span><span data-dcnode-id="4252" instrument_node="">Simulation results for (a) wind speed distribution for prevailing wind and (b) shading distribution.</span></p></span></span></figure></div><div data-dcnode-id="4205"><p data-dcnode-id="4230" id="par0120"><span data-dcnode-id="4246" instrument_node="">The simulation was carried out using the prevailing wind direction in summer at noon. </span><a class="workspace-trigger" data-dcnode-id="4244" href="#fig0055" name="bfig0055"><span data-dcnode-id="4245" instrument_node="">Figs. 11</span></a><span data-dcnode-id="4243" instrument_node="">a and b show the MRT and SET* distributions, respectively. The results indicate that the MRT values in shade classes </span><em data-dcnode-id="4241"><span data-dcnode-id="4242" instrument_node="">1-a</span></em><span data-dcnode-id="4240" instrument_node=""> and </span><em data-dcnode-id="4238"><span data-dcnode-id="4239" instrument_node="">1-b</span></em><span data-dcnode-id="4237" instrument_node=""> were low, and those in unshaded classes </span><em data-dcnode-id="4235"><span data-dcnode-id="4236" instrument_node="">2-a</span></em><span data-dcnode-id="4234" instrument_node=""> and </span><em data-dcnode-id="4232"><span data-dcnode-id="4233" instrument_node="">2-b</span></em><span data-dcnode-id="4231" instrument_node=""> were high. A higher SET* distribution was found at locations with lower wind speeds.</span></p><figure class="figure text-xs" data-dcnode-id="4206" id="fig0055"><span data-dcnode-id="4214"><img alt="Fig. 11" aria-describedby="cap0055" data-dcnode-id="4229" height="866" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//ars.els-cdn.com/content/image/1-s2.0-S1618866716301868-gr11.jpg&amp;raw"><span data-dcnode-id="4228" instrument_node=""></span><ol class="links-for-figure" data-dcnode-id="4215"><li data-dcnode-id="4222"><a class="anchor download-link u-font-sans" data-dcnode-id="4223" download="" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//ars.els-cdn.com/content/image/1-s2.0-S1618866716301868-gr11_lrg.jpg" target="_blank" title="Download high-res image (1MB)"><span class="anchor-text" data-dcnode-id="4224"><span data-dcnode-id="4227" instrument_node="">Download : </span><span class="download-link-title" data-dcnode-id="4225"><span data-dcnode-id="4226" instrument_node="">Download high-res image (1MB)</span></span></span></a></li><li data-dcnode-id="4216"><a class="anchor download-link u-font-sans" data-dcnode-id="4217" download="" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//ars.els-cdn.com/content/image/1-s2.0-S1618866716301868-gr11.jpg" target="_blank" title="Download full-size image"><span class="anchor-text" data-dcnode-id="4218"><span data-dcnode-id="4221" instrument_node="">Download : </span><span class="download-link-title" data-dcnode-id="4219"><span data-dcnode-id="4220" instrument_node="">Download full-size image</span></span></span></a></li></ol></span><span class="captions" data-dcnode-id="4207"><span data-dcnode-id="4208" id="cap0055"><p data-dcnode-id="4209" id="spar0055"><span class="label" data-dcnode-id="4212"><span data-dcnode-id="4213" instrument_node="">Fig. 11</span></span><span data-dcnode-id="4211" instrument_node="">. </span><span data-dcnode-id="4210" instrument_node="">Simulation results for (a) MRT distribution and (b) SET* distribution.</span></p></span></span></figure></div></section><section data-dcnode-id="4032" id="sec0055"><h3 class="u-h4 u-margin-m-top u-margin-xs-bottom" data-dcnode-id="4200" id="sect0070"><span data-dcnode-id="4203" instrument_node="">3.3</span><span data-dcnode-id="4202" instrument_node="">. </span><span data-dcnode-id="4201" instrument_node="">Application of simplified comfort assessment</span></h3><div data-dcnode-id="4152"><p data-dcnode-id="4177" id="par0125"><span data-dcnode-id="4199" instrument_node="">The results for the four classes in this study, as defined in the methodology section according to wind speed distribution and shade conditions, are shown in </span><a class="workspace-trigger" data-dcnode-id="4197" href="#fig0060" name="bfig0060"><span data-dcnode-id="4198" instrument_node="">Fig. 12</span></a><span data-dcnode-id="4196" instrument_node="">a. This figure was created using a combination of </span><a class="workspace-trigger" data-dcnode-id="4194" href="#fig0050" name="bfig0050"><span data-dcnode-id="4195" instrument_node="">Figs. 10</span></a><span data-dcnode-id="4193" instrument_node="">a and b . Classes </span><em data-dcnode-id="4191"><span data-dcnode-id="4192" instrument_node="">1-a</span></em><span data-dcnode-id="4190" instrument_node="">, </span><em data-dcnode-id="4188"><span data-dcnode-id="4189" instrument_node="">1-b</span></em><span data-dcnode-id="4187" instrument_node="">, </span><em data-dcnode-id="4185"><span data-dcnode-id="4186" instrument_node="">2-a</span></em><span data-dcnode-id="4184" instrument_node="">, and </span><em data-dcnode-id="4182"><span data-dcnode-id="4183" instrument_node="">2-b</span></em><span data-dcnode-id="4181" instrument_node=""> occupy 24.9%, 11.4%, 44.2% and 19.4% of the entire area, respectively. </span><a class="workspace-trigger" data-dcnode-id="4179" href="#fig0060" name="bfig0060"><span data-dcnode-id="4180" instrument_node="">Fig. 12</span></a><span data-dcnode-id="4178" instrument_node="">b shows the detailed grid numbers for these four classes.</span></p><figure class="figure text-xs" data-dcnode-id="4153" id="fig0060"><span data-dcnode-id="4161"><img alt="Fig. 12" aria-describedby="cap0060" data-dcnode-id="4176" height="812" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//ars.els-cdn.com/content/image/1-s2.0-S1618866716301868-gr12.jpg&amp;raw"><span data-dcnode-id="4175" instrument_node=""></span><ol class="links-for-figure" data-dcnode-id="4162"><li data-dcnode-id="4169"><a class="anchor download-link u-font-sans" data-dcnode-id="4170" download="" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//ars.els-cdn.com/content/image/1-s2.0-S1618866716301868-gr12_lrg.jpg" target="_blank" title="Download high-res image (1MB)"><span class="anchor-text" data-dcnode-id="4171"><span data-dcnode-id="4174" instrument_node="">Download : </span><span class="download-link-title" data-dcnode-id="4172"><span data-dcnode-id="4173" instrument_node="">Download high-res image (1MB)</span></span></span></a></li><li data-dcnode-id="4163"><a class="anchor download-link u-font-sans" data-dcnode-id="4164" download="" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//ars.els-cdn.com/content/image/1-s2.0-S1618866716301868-gr12.jpg" target="_blank" title="Download full-size image"><span class="anchor-text" data-dcnode-id="4165"><span data-dcnode-id="4168" instrument_node="">Download : </span><span class="download-link-title" data-dcnode-id="4166"><span data-dcnode-id="4167" instrument_node="">Download full-size image</span></span></span></a></li></ol></span><span class="captions" data-dcnode-id="4154"><span data-dcnode-id="4155" id="cap0060"><p data-dcnode-id="4156" id="spar0060"><span class="label" data-dcnode-id="4159"><span data-dcnode-id="4160" instrument_node="">Fig. 12</span></span><span data-dcnode-id="4158" instrument_node="">. </span><span data-dcnode-id="4157" instrument_node="">Simulation analysis results. (a) Classification map using wind speed and shading distribution and (b) mesh numbers for four classes.</span></p></span></span></figure></div><div data-dcnode-id="4099"><p data-dcnode-id="4124" id="par0130"><a class="workspace-trigger" data-dcnode-id="4150" href="#fig0065" name="bfig0065"><span data-dcnode-id="4151" instrument_node="">Fig. 13</span></a><span data-dcnode-id="4149" instrument_node="">a shows the relationship between SET* and shading conditions. According to the calculation results, the SET* value of class </span><em data-dcnode-id="4147"><span data-dcnode-id="4148" instrument_node="">1-a</span></em><span data-dcnode-id="4146" instrument_node=""> is the lowest, followed by those of classes </span><em data-dcnode-id="4144"><span data-dcnode-id="4145" instrument_node="">1-b</span></em><span data-dcnode-id="4143" instrument_node="">, </span><em data-dcnode-id="4141"><span data-dcnode-id="4142" instrument_node="">2-a</span></em><span data-dcnode-id="4140" instrument_node="">, and </span><em data-dcnode-id="4138"><span data-dcnode-id="4139" instrument_node="">2-b</span></em><span data-dcnode-id="4137" instrument_node="">, where the difference between the latter two is small. Shaded and unshaded conditions had different ranges of SET*, indicating significantly different thermal perceptions in these conditions during the daytime in summer. This indicates that people feel more comfortable in shaded conditions than they do in unshaded conditions and also shows that shade is a critical factor affecting SET*. The SET* value in the shaded areas (</span><em data-dcnode-id="4135"><span data-dcnode-id="4136" instrument_node="">1-a</span></em><span data-dcnode-id="4134" instrument_node=""> and </span><em data-dcnode-id="4132"><span data-dcnode-id="4133" instrument_node="">1-b</span></em><span data-dcnode-id="4131" instrument_node="">), in which the shade is primarily from plantings, regardless of the wind speed, was significantly smaller than that in the unshaded areas (</span><em data-dcnode-id="4129"><span data-dcnode-id="4130" instrument_node="">2-a</span></em><span data-dcnode-id="4128" instrument_node=""> and </span><em data-dcnode-id="4126"><span data-dcnode-id="4127" instrument_node="">2-b</span></em><span data-dcnode-id="4125" instrument_node="">). It can be inferred from this that providing shade should be the first priority during the daytime in summer in the study area.</span></p><figure class="figure text-xs" data-dcnode-id="4100" id="fig0065"><span data-dcnode-id="4108"><img alt="Fig. 13" aria-describedby="cap0065" data-dcnode-id="4123" height="536" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//ars.els-cdn.com/content/image/1-s2.0-S1618866716301868-gr13.jpg&amp;raw"><span data-dcnode-id="4122" instrument_node=""></span><ol class="links-for-figure" data-dcnode-id="4109"><li data-dcnode-id="4116"><a class="anchor download-link u-font-sans" data-dcnode-id="4117" download="" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//ars.els-cdn.com/content/image/1-s2.0-S1618866716301868-gr13_lrg.jpg" target="_blank" title="Download high-res image (250KB)"><span class="anchor-text" data-dcnode-id="4118"><span data-dcnode-id="4121" instrument_node="">Download : </span><span class="download-link-title" data-dcnode-id="4119"><span data-dcnode-id="4120" instrument_node="">Download high-res image (250KB)</span></span></span></a></li><li data-dcnode-id="4110"><a class="anchor download-link u-font-sans" data-dcnode-id="4111" download="" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//ars.els-cdn.com/content/image/1-s2.0-S1618866716301868-gr13.jpg" target="_blank" title="Download full-size image"><span class="anchor-text" data-dcnode-id="4112"><span data-dcnode-id="4115" instrument_node="">Download : </span><span class="download-link-title" data-dcnode-id="4113"><span data-dcnode-id="4114" instrument_node="">Download full-size image</span></span></span></a></li></ol></span><span class="captions" data-dcnode-id="4101"><span data-dcnode-id="4102" id="cap0065"><p data-dcnode-id="4103" id="spar0065"><span class="label" data-dcnode-id="4106"><span data-dcnode-id="4107" instrument_node="">Fig. 13</span></span><span data-dcnode-id="4105" instrument_node="">. </span><span data-dcnode-id="4104" instrument_node="">Statistical simulation results for shaded and unshaded conditions. (a) Mesh number and (b) distribution range for each class.</span></p></span></span></figure></div><p data-dcnode-id="4057" id="par0135"><a class="workspace-trigger" data-dcnode-id="4097" href="#fig0065" name="bfig0065"><span data-dcnode-id="4098" instrument_node="">Fig. 13</span></a><span data-dcnode-id="4096" instrument_node="">b shows a summary of the SET* distributions for all four classes. The median SET* values of classes </span><em data-dcnode-id="4094"><span data-dcnode-id="4095" instrument_node="">1-a</span></em><span data-dcnode-id="4093" instrument_node="">, </span><em data-dcnode-id="4091"><span data-dcnode-id="4092" instrument_node="">1-b</span></em><span data-dcnode-id="4090" instrument_node="">, </span><em data-dcnode-id="4088"><span data-dcnode-id="4089" instrument_node="">2-a</span></em><span data-dcnode-id="4087" instrument_node="">, and </span><em data-dcnode-id="4085"><span data-dcnode-id="4086" instrument_node="">2-b</span></em><span data-dcnode-id="4084" instrument_node=""> are 31.8, 34.7, 40.7, and 40.8</span><span data-dcnode-id="4083" instrument_node="">&nbsp;</span><span data-dcnode-id="4082" instrument_node="">°C, respectively. The wind speed effect was analyzed using classes </span><em data-dcnode-id="4080"><span data-dcnode-id="4081" instrument_node="">a</span></em><span data-dcnode-id="4079" instrument_node=""> and </span><em data-dcnode-id="4077"><span data-dcnode-id="4078" instrument_node="">b</span></em><span data-dcnode-id="4076" instrument_node="">. Wind speed significantly improves human comfort, as shown for classes </span><em data-dcnode-id="4074"><span data-dcnode-id="4075" instrument_node="">1-a</span></em><span data-dcnode-id="4073" instrument_node=""> and </span><em data-dcnode-id="4071"><span data-dcnode-id="4072" instrument_node="">1-b</span></em><span data-dcnode-id="4070" instrument_node=""> (i.e., the shaded areas). The influence of wind speed on thermal comfort can be seen from classes </span><em data-dcnode-id="4068"><span data-dcnode-id="4069" instrument_node="">1-b</span></em><span data-dcnode-id="4067" instrument_node=""> and </span><em data-dcnode-id="4065"><span data-dcnode-id="4066" instrument_node="">2-b</span></em><span data-dcnode-id="4064" instrument_node="">. The range of </span><em data-dcnode-id="4062"><span data-dcnode-id="4063" instrument_node="">1-b</span></em><span data-dcnode-id="4061" instrument_node=""> is larger than that of </span><em data-dcnode-id="4059"><span data-dcnode-id="4060" instrument_node="">2-b</span></em><span data-dcnode-id="4058" instrument_node="">, indicating that being under shade alone is not adequate to ensure comfort.</span></p><p data-dcnode-id="4033" id="par0140"><span data-dcnode-id="4056" instrument_node="">The influence of wind speed on human comfort was greater in shaded areas than that in unshaded areas. Under shaded conditions, a higher wind speed increases human comfort. A wind environment is required when an effort is being made to provide a better human comfort environment. Wind is thus required to improve human comfort in hot climates. The numerical analysis shows that wind speed could greatly affect the SET* in the shaded environment. However, in the unshaded environment, wind speed had a limited impact on the SET*. Take B5 and C2 for example. B5 is upstream with a wind speed of 3</span><span data-dcnode-id="4055" instrument_node="">&nbsp;</span><span data-dcnode-id="4054" instrument_node="">m/s and a temperature of 32.5</span><span data-dcnode-id="4053" instrument_node="">&nbsp;</span><span data-dcnode-id="4052" instrument_node="">°C (class </span><em data-dcnode-id="4050"><span data-dcnode-id="4051" instrument_node="">1-a</span></em><span data-dcnode-id="4049" instrument_node="">), and C2 is downstream with a wind speed of 0</span><span data-dcnode-id="4048" instrument_node="">&nbsp;</span><span data-dcnode-id="4047" instrument_node="">m/s and a temperature of 35.5</span><span data-dcnode-id="4046" instrument_node="">&nbsp;</span><span data-dcnode-id="4045" instrument_node="">°C (class </span><em data-dcnode-id="4043"><span data-dcnode-id="4044" instrument_node="">2-b</span></em><span data-dcnode-id="4042" instrument_node="">). The maximum difference in SET* (</span><a class="workspace-trigger" data-dcnode-id="4040" href="#fig0055" name="bfig0055"><span data-dcnode-id="4041" instrument_node="">Fig. 11</span></a><span data-dcnode-id="4039" instrument_node="">) between the high-wind-speed shaded area (</span><em data-dcnode-id="4037"><span data-dcnode-id="4038" instrument_node="">1-a</span></em><span data-dcnode-id="4036" instrument_node="">) and the low-wind-speed unshaded area is thus about 3.0</span><span data-dcnode-id="4035" instrument_node="">&nbsp;</span><span data-dcnode-id="4034" instrument_node="">°C. The influence of wind speed on thermal comfort was not obvious in the unshaded areas due to the fact that the air was hot. Wind ventilation and convection increase when surface temperatures are higher. The higher wind speed is a result of convection, which brings hot air into pedestrian areas.</span></p></section></section><section data-dcnode-id="3934" id="sec0060"><h2 class="u-h3 u-margin-l-top u-margin-xs-bottom" data-dcnode-id="4027" id="sect0075"><span data-dcnode-id="4030" instrument_node="">4</span><span data-dcnode-id="4029" instrument_node="">. </span><span data-dcnode-id="4028" instrument_node="">Discussion and limitations</span></h2><p data-dcnode-id="3970" id="par0145"><span data-dcnode-id="4018"><span data-dcnode-id="4022"><span data-dcnode-id="4026" instrument_node="">The use of greening as a strategy to moderate the </span><a class="topic-link" data-dcnode-id="4024" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.sciencedirect.com/topics/earth-and-planetary-sciences/urban-heat-island-effect" title="Learn more about urban heat island effect from ScienceDirect's AI-generated Topic Pages"><span data-dcnode-id="4025" instrument_node="">urban heat island effect</span></a><span data-dcnode-id="4023" instrument_node=""> and to improve the </span></span><a class="topic-link" data-dcnode-id="4020" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.sciencedirect.com/topics/agricultural-and-biological-sciences/microclimate" title="Learn more about microclimate from ScienceDirect's AI-generated Topic Pages"><span data-dcnode-id="4021" instrument_node="">microclimate</span></a><span data-dcnode-id="4019" instrument_node=""> has been widely emphasized (</span></span><a class="workspace-trigger" data-dcnode-id="4016" href="#bib0170" name="bbib0170"><span data-dcnode-id="4017" instrument_node="">Ng, 2009</span></a><span data-dcnode-id="4015" instrument_node="">). Among all the characteristics of plants, tree shade has been found to contribute most to reducing air temperature in parks (</span><a class="workspace-trigger" data-dcnode-id="4013" href="#bib0200" name="bbib0200"><span data-dcnode-id="4014" instrument_node="">Shashua-Bar and Hoffman, 2000</span></a><span data-dcnode-id="4012" instrument_node="">, </span><a class="workspace-trigger" data-dcnode-id="4010" href="#bib0240" name="bbib0240"><span data-dcnode-id="4011" instrument_node="">Wang et al., 2010</span></a><span data-dcnode-id="4009" instrument_node="">, </span><a class="workspace-trigger" data-dcnode-id="4007" href="#bib0060" name="bbib0060"><span data-dcnode-id="4008" instrument_node="">Georgi and Dimitriou, 2010</span></a><span data-dcnode-id="4006" instrument_node="">). However, not all parks have exhibited a similar cooling effect. In a preliminary study in Taipei, a random survey of the cool-island intensity of 61 city parks indicated that although the majority of the parks were cooler than their urban surroundings, one-fifth of the parks were actually warmer (</span><a class="workspace-trigger" data-dcnode-id="4004" href="#bib0035" name="bbib0035"><span data-dcnode-id="4005" instrument_node="">Chang et al., 2007</span></a><span data-dcnode-id="3999"><span data-dcnode-id="4003" instrument_node="">). A field experiment in a </span><a class="topic-link" data-dcnode-id="4001" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.sciencedirect.com/topics/earth-and-planetary-sciences/thermal-environment" title="Learn more about thermal environment from ScienceDirect's AI-generated Topic Pages"><span data-dcnode-id="4002" instrument_node="">thermal environment</span></a><span data-dcnode-id="4000" instrument_node=""> carried out in Tokyo (</span></span><a class="workspace-trigger" data-dcnode-id="3997" href="#bib0100" name="bbib0100"><span data-dcnode-id="3998" instrument_node="">Huang and Ooka, 2011</span></a><span data-dcnode-id="3996" instrument_node="">) showed similar results. The site was in Aoyama cemetery, where the greenery coverage is about 60%. The main tree species are </span><span data-dcnode-id="3990"><em data-dcnode-id="3993"><a class="topic-link" data-dcnode-id="3994" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.sciencedirect.com/topics/agricultural-and-biological-sciences/prunus" title="Learn more about Cerasus from ScienceDirect's AI-generated Topic Pages"><span data-dcnode-id="3995" instrument_node="">Cerasus</span></a></em><em data-dcnode-id="3991"><span data-dcnode-id="3992" instrument_node=""> yedoensis</span></em></span><span data-dcnode-id="3989" instrument_node=""> and </span><span data-dcnode-id="3983"><em data-dcnode-id="3986"><a class="topic-link" data-dcnode-id="3987" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.sciencedirect.com/topics/agricultural-and-biological-sciences/sophora" title="Learn more about Sophora from ScienceDirect's AI-generated Topic Pages"><span data-dcnode-id="3988" instrument_node="">Sophora</span></a></em><em data-dcnode-id="3984"><span data-dcnode-id="3985" instrument_node=""> japonica Linn</span></em></span><span data-dcnode-id="3982" instrument_node="">, the heights of which are around 4–10</span><span data-dcnode-id="3981" instrument_node="">&nbsp;</span><span data-dcnode-id="3980" instrument_node="">m on average. According to the field measurement data collected from 11:30 to 13:00 on August 4th, 2010, a reduction of 0.46</span><span data-dcnode-id="3979" instrument_node="">&nbsp;</span><span data-dcnode-id="3978" instrument_node="">m/s of wind speed, an increase of 2.7</span><span data-dcnode-id="3977" instrument_node="">&nbsp;</span><span data-dcnode-id="3976" instrument_node="">°C in air temperature, and an increase of 5.61</span><span data-dcnode-id="3975" instrument_node="">&nbsp;</span><span data-dcnode-id="3974" instrument_node="">°C in SET* were observed at a downstream measurement point compared with upstream data. The downward side of the park from the viewpoint of the prevailing wind direction had a higher air temperature compared to that on the leeward side. As for our field measurements on the relationship between wind distribution and temperature in a park in Tainan City, the results indicate that not all of the measurement points inside the park lowered the urban air temperature, which is consistent with the study in Tokyo (</span><a class="workspace-trigger" data-dcnode-id="3972" href="#bib0100" name="bbib0100"><span data-dcnode-id="3973" instrument_node="">Huang and Ooka, 2011</span></a><span data-dcnode-id="3971" instrument_node="">).</span></p><p data-dcnode-id="3960" id="par0150"><span data-dcnode-id="3969" instrument_node="">After analyzing the measurement data obtained from both fixed- and mobile-type measurements, the microclimate conditions of the entire park and its nearby urban blocks were determined. This data indicate that the downstream wind field was blocked by plantings, which resulted in faster wind speed and lower temperatures on the upstream side and slower wind speed and higher temperature on the downstream side. Our data at a pedestrian height of 1.5</span><span data-dcnode-id="3968" instrument_node="">&nbsp;</span><span data-dcnode-id="3967" instrument_node="">m indicate that more wind is required at noon in the summer to reduce heat. Based on the measurement results obtained at a height of 1.5</span><span data-dcnode-id="3966" instrument_node="">&nbsp;</span><span data-dcnode-id="3965" instrument_node="">m, the wind speed at a low-SVF location was slower compared to that at a high-SVF location. For a measurement point at which the wind speeds were measured at two heights, the ventilation was even worse at a height of 4.5</span><span data-dcnode-id="3964" instrument_node="">&nbsp;</span><span data-dcnode-id="3963" instrument_node="">m because of the tree crown obstruction compared to that at a height of 1.5</span><span data-dcnode-id="3962" instrument_node="">&nbsp;</span><span data-dcnode-id="3961" instrument_node="">m. In summary, the height range where human activities take place, plant should not be too dense, and the wind direction and distribution should be taken into consideration.</span></p><p data-dcnode-id="3940" id="par0155"><span data-dcnode-id="3955"><span data-dcnode-id="3959" instrument_node="">Air temperature, air humidity, air velocity, and </span><a class="topic-link" data-dcnode-id="3957" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.sciencedirect.com/topics/earth-and-planetary-sciences/thermal-radiation" title="Learn more about thermal radiation from ScienceDirect's AI-generated Topic Pages"><span data-dcnode-id="3958" instrument_node="">thermal radiation</span></a><span data-dcnode-id="3956" instrument_node=""> have been found to be critical parameters for human comfort because they affect human energy balance through thermal sensation (</span></span><a class="workspace-trigger" data-dcnode-id="3953" href="#bib0120" name="bbib0120"><span data-dcnode-id="3954" instrument_node="">Kántor and Unger, 2010</span></a><span data-dcnode-id="3952" instrument_node="">, </span><a class="workspace-trigger" data-dcnode-id="3950" href="#bib0175" name="bbib0175"><span data-dcnode-id="3951" instrument_node="">Nikolopoulou and Steemers, 2003</span></a><span data-dcnode-id="3949" instrument_node="">). The present study found that shade is the main factor contributing to heat reduction and that there is a complementary relationship between wind and shade. Wind speed greatly affects the SET* in a shaded environment. Human comfort in terms of wind speed and tree shade was analyzed using field measurement data and simulation results. A difference of approximately 9.0</span><span data-dcnode-id="3948" instrument_node="">&nbsp;</span><span data-dcnode-id="3947" instrument_node="">°C in SET* was observed between classes </span><em data-dcnode-id="3945"><span data-dcnode-id="3946" instrument_node="">1-a</span></em><span data-dcnode-id="3944" instrument_node=""> and </span><em data-dcnode-id="3942"><span data-dcnode-id="3943" instrument_node="">2-b</span></em><span data-dcnode-id="3941" instrument_node="">. Therefore, in addition to shading, creating ventilation in a park is important for increasing human thermal comfort. This study showed that human comfort can be preliminarily evaluated through a wind and shade analysis, as a simplified and efficient evaluation method.</span></p><p data-dcnode-id="3935" id="par0160"><span data-dcnode-id="3939" instrument_node="">The creation of a wind path inside a park is a valuable topic of discussion among urban planners and landscape architects to improve an urban microenvironment. During summer, the effect of wind is more dominant in a park with trees than that in an open square directly exposed to solar radiation. However, in addition to the factors evaluated and considered in the present study, other elements, such as tree shape and </span><a class="topic-link" data-dcnode-id="3937" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.sciencedirect.com/topics/earth-and-planetary-sciences/evapotranspiration" title="Learn more about evapotranspiration from ScienceDirect's AI-generated Topic Pages"><span data-dcnode-id="3938" instrument_node="">evapotranspiration</span></a><span data-dcnode-id="3936" instrument_node="">, require further study in order to gain insight into the quantitative results of the cooling effect by plantings. Moreover, a vegetation ventilation simulation in various seasons and locations is also necessary. Studies related to the design and planning of microclimates should thus be conducted and technology and methodology should be developed to improve the thermal environment both inside and outside of parks.</span></p></section><section data-dcnode-id="3922" id="sec0065"><h2 class="u-h3 u-margin-l-top u-margin-xs-bottom" data-dcnode-id="3930" id="sect0080"><span data-dcnode-id="3933" instrument_node="">5</span><span data-dcnode-id="3932" instrument_node="">. </span><span data-dcnode-id="3931" instrument_node="">Conclusion</span></h2><p data-dcnode-id="3925" id="par0165"><span data-dcnode-id="3929" instrument_node="">In this study, Tainan Park in Taiwan was taken as the study area to investigate how park plantings affect the urban wind and </span><a class="topic-link" data-dcnode-id="3927" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.sciencedirect.com/topics/earth-and-planetary-sciences/thermal-environment" title="Learn more about thermal environment from ScienceDirect's AI-generated Topic Pages"><span data-dcnode-id="3928" instrument_node="">thermal environment</span></a><span data-dcnode-id="3926" instrument_node=""> using onsite measurements and CFD simulations. Shading is crucial for thermal comfort in tropical and subtropical areas, and its cooling effect is augmented by ventilation. Based on the analysis results for both fixed- and mobile-type measurements, it was found that although plantings created shaded spaces, which can decrease temperature, excessively dense planting without considering the wind corridor in the park resulted in obstruction to air flow and resulted in a temperature rise in the downstream areas. In other words, improper tree arrangement may decrease wind movement, which in turn has a detrimental effect on thermal comfort, especially in downstream areas. The wind corridor in parks, which significantly affects urban ventilation, should be considered in planting layout and trimming to promote both shading and ventilation.</span></p><p data-dcnode-id="3923" id="par0170"><span data-dcnode-id="3924" instrument_node="">Current methods for assessing human thermal comfort, such as SET*, are complicated and many factors must be taken into consideration. Landscape architects are thus rarely able to apply them in landscape planning and design. Using wind speed and shadow classes as indicators for a preliminary comfort assessment saves time and thus makes such assessments more efficient. The wind speed/shade classification method used in this work was demonstrated to be feasible. The results demonstrate that the relationship between human comfort and the SET* can be obtained from wind and shade classification results. The comfort level was highest in the shaded area with a high wind speed, followed by those in the shaded area with slower wind, and then the unshaded area with high wind speed. The worst situation was the unshaded area with slow wind speed. Tree density should not be too high, and the wind corridor should be preserved when planning tree grouping allocation and pruning. The local prevailing wind direction and season should be considered. This simplified evaluation method of human thermal comfort provides a guideline for future planning and design in relevant fields that can be used in subtropical and tropical climates in summer.</span></p></section></div><section data-dcnode-id="3904" id="ack0005"><h2 class="u-h3 u-margin-l-top u-margin-xs-bottom" data-dcnode-id="3919" id="sect0085"><span data-dcnode-id="3920" instrument_node="">Acknowledgements</span></h2><p data-dcnode-id="3905" id="par0175"><span data-dcnode-id="3918" instrument_node="">This study was sponsored by </span><span data-dcnode-id="3916" id="gs0005"><span data-dcnode-id="3917" instrument_node="">the Shanghai Pujiang Program</span></span><span data-dcnode-id="3915" instrument_node=""> (</span><a data-dcnode-id="3913" href="#gs0005"><span data-dcnode-id="3914" instrument_node="">14PJ1408700</span></a><span data-dcnode-id="3912" instrument_node="">) and was also supported by a special fund of </span><span data-dcnode-id="3910" id="gs0010"><span data-dcnode-id="3911" instrument_node="">the Key Laboratory of Eco Planning &amp; Green Building</span></span><span data-dcnode-id="3909" instrument_node="">, </span><span data-dcnode-id="3907" id="gs0015"><span data-dcnode-id="3908" instrument_node="">Ministry of Education (Tsinghua University)</span></span><span data-dcnode-id="3906" instrument_node="">, China.</span></p></section></div><div class="related-content-links u-hide-from-md" data-dcnode-id="3899"><button class="button button-anchor" data-dcnode-id="3900" type="button"><span class="button-text" data-dcnode-id="3901"><span data-dcnode-id="3902" instrument_node="">Recommended articles</span></span></button></div><div class="Tail" data-dcnode-id="3898"></div><section class="bibliography u-font-serif text-s" data-dcnode-id="419" id="bibl0005"><h2 class="section-title u-h3 u-margin-l-top u-margin-xs-bottom" data-dcnode-id="3896"><span data-dcnode-id="3897" instrument_node="">References</span></h2><section class="bibliography-sec" data-dcnode-id="420" id="bibs0005"><dl class="references" data-dcnode-id="421" id="reference-links-bibs0005"><dt class="label" data-dcnode-id="3893"><a data-aa-button="sd:product:journal:article:location=references:type=anchor:name=citation-name" data-dcnode-id="3894" href="#bbib0005" id="ref-id-bib0005"><span data-dcnode-id="3895" instrument_node="">Abreu-Harbich et al., 2015</span></a></dt><dd class="reference" data-dcnode-id="3843" id="sbref0005"><div class="contribution" data-dcnode-id="3868"><span data-dcnode-id="3892" instrument_node="">L.V.</span><span data-dcnode-id="3890" instrument_node=""> </span><span data-dcnode-id="3888" instrument_node="">Abreu-Harbich</span><span data-dcnode-id="3886" instrument_node="">, </span><span data-dcnode-id="3884" instrument_node="">L.C.</span><span da
