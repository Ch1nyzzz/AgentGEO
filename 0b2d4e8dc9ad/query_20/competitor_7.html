</span></amp-ad></div><p data-dcnode-id="2036"><span data-dcnode-id="2037" instrument_node="">If you’re trimming heavy tree limbs, you have to be extra careful not to damage the bark or interfere with the tree’s natural healing response.</span></p><div class="code-block code-block-39 ai-viewport-1" data-dcnode-id="2032" style="margin: 8px auto; text-align: center; display: block; clear: both;"><div data-dcnode-id="2033"><amp-ad data-dcnode-id="2034" data-lazy-fetch="true" data-loading-strategy="1" data-multi-size-validation="false" data-slot="/29240703/fours_seasons_display_roadblock" height="90" type="doubleclick" width="728"><span data-dcnode-id="2035" instrument_node="">
</span></amp-ad></div></div><div class="code-block code-block-38 ai-viewport-2 ai-viewport-3" data-dcnode-id="2030" style="margin: 8px auto; text-align: center; display: block; clear: both;"><div class="ai-lazy" data-class="Y29kZS1ibG9jaw==" data-code="PGFtcC1hZCB3aWR0aD0zMjAgaGVpZ2h0PTEwMAogICAgdHlwZT0iZG91YmxlY2xpY2siCiAgICBkYXRhLXNsb3Q9Ii8yOTI0MDcwMy80c2Vhc29uc19kZXNrdG9wX21vYmlsZSIKICAgIGRhdGEtbGF6eS1mZXRjaD0idHJ1ZSIgCiAgICBkYXRhLWxvYWRpbmctc3RyYXRlZ3k9IjEiPgo8L2FtcC1hZD4=" data-dcnode-id="2031"></div></div><div class="code-block code-block-9 ai-viewport-2 ai-viewport-3" data-dcnode-id="2021" style="margin: 8px auto; text-align: center; display: block; clear: both;"><span data-dcnode-id="2029" instrument_node=""> </span><div data-dcnode-id="2022" id="div-gpt-ad-1645037500343-0" style="min-width: 320px; min-height: 100px;"><span data-dcnode-id="2026" instrument_node=""> </span><span data-dcnode-id="2023" instrument_node=""> </span></div></div><p data-dcnode-id="2019"><span data-dcnode-id="2020" instrument_node="">Doing it right is actually no more difficult than doing it wrong, particularly if you think ahead to how much work it would take to remove a dead tree!</span></p><div class="code-block code-block-36 ai-viewport-2 ai-viewport-3" data-dcnode-id="2017" style="margin: 8px auto; text-align: center; display: block; clear: both;"><div class="ai-lazy" data-class="Y29kZS1ibG9jaw==" data-code="PGFtcC1hZCB3aWR0aD0zMDAgaGVpZ2h0PTI1MAogICAgdHlwZT0iZG91YmxlY2xpY2siCiAgICBkYXRhLXNsb3Q9Ii8yOTI0MDcwMy80c2Vhc29uc19kZXNrdG9wX21vYmlsZSIKICAgIGRhdGEtbGF6eS1mZXRjaD0idHJ1ZSIgCiAgICBkYXRhLWxvYWRpbmctc3RyYXRlZ3k9IjEiPgo8L2FtcC1hZD4=" data-dcnode-id="2018"></div></div><p data-dcnode-id="2015"><span data-dcnode-id="2016" instrument_node="">Here’s how to cut large tree limbs in your yard in three simple steps.</span></p><hr data-dcnode-id="2014"><figure class="wp-caption alignnone" data-dcnode-id="2010" style="width: 510px"><img alt="" data-dcnode-id="2013" height="250" loading="lazy" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//todayshomeowner.com/wp-content/uploads/2019/06/how-to-trim-large-tree-branches-2.jpg&amp;raw" width="510"><figcaption class="wp-caption-text" data-dcnode-id="2011"><span data-dcnode-id="2012" instrument_node="">Poorly healed wound due to an improper pruning cut.</span></figcaption></figure><div class="code-block code-block-40" data-dcnode-id="2006" style="margin: 8px auto; text-align: center; display: block; clear: both;"><span data-dcnode-id="2009" instrument_node="">
</span><amp-ad data-dcnode-id="2007" data-lazy-fetch="true" data-loading-strategy="1" data-multi-size-validation="false" data-slot="/29240703/4_seasons_preroll_rb" height="360" layout="responsive" type="doubleclick" width="640"><span data-dcnode-id="2008" instrument_node="">
</span></amp-ad></div><h3 data-dcnode-id="2004"><span data-dcnode-id="2005" instrument_node="">How Trees Heal</span></h3><p data-dcnode-id="2002"><span data-dcnode-id="2003" instrument_node="">The truth is, trees don’t actually heal as we do. When you cut off a tree branch, the tree forms a special callous tissue (like a scar) that covers over the wound to keep out disease and decay.</span></p><div class="code-block code-block-11 ai-viewport-2 ai-viewport-3" data-dcnode-id="1993" style="margin: 8px auto; text-align: center; display: block; clear: both;"><span data-dcnode-id="2001" instrument_node=""> </span><div data-dcnode-id="1994" id="div-gpt-ad-1645037924888-0" style="min-width: 300px; min-height: 250px;"><span data-dcnode-id="1998" instrument_node=""> </span><span data-dcnode-id="1995" instrument_node=""> </span></div></div><p data-dcnode-id="1991"><span data-dcnode-id="1992" instrument_node="">That scarred part of the tree will be there forever, sealed off so that the rest of the tree can keep growing. It’s very important to prune trees correctly so that we don’t interfere with this process – incorrect pruning will leave the tree weak and vulnerable to disease.</span></p><p data-dcnode-id="1989"><span data-dcnode-id="1990" instrument_node="">In the top photo, you can see the evidence of several large pruning cuts. The bumps show well-healed pruning scars, most of them completely covered over.</span></p><div class="code-block code-block-36 ai-viewport-2 ai-viewport-3" data-dcnode-id="1987" style="margin: 8px auto; text-align: center; display: block; clear: both;"><div class="ai-lazy" data-class="Y29kZS1ibG9jaw==" data-code="PGFtcC1hZCB3aWR0aD0zMDAgaGVpZ2h0PTI1MAogICAgdHlwZT0iZG91YmxlY2xpY2siCiAgICBkYXRhLXNsb3Q9Ii8yOTI0MDcwMy80c2Vhc29uc19kZXNrdG9wX21vYmlsZSIKICAgIGRhdGEtbGF6eS1mZXRjaD0idHJ1ZSIgCiAgICBkYXRhLWxvYWRpbmctc3RyYXRlZ3k9IjEiPgo8L2FtcC1hZD4=" data-dcnode-id="1988"></div></div><p data-dcnode-id="1985"><span data-dcnode-id="1986" instrument_node="">The “donut” shaped scar is normal, too. The callous tissue grows from the outside edges toward the center, so it’s still in the process of sealing over.</span></p><div class="code-block code-block-38 ai-viewport-2 ai-viewport-3" data-dcnode-id="1983" style="margin: 8px auto; text-align: center; display: block; clear: both;"><div class="ai-lazy" data-class="Y29kZS1ibG9jaw==" data-code="PGFtcC1hZCB3aWR0aD0zMjAgaGVpZ2h0PTEwMAogICAgdHlwZT0iZG91YmxlY2xpY2siCiAgICBkYXRhLXNsb3Q9Ii8yOTI0MDcwMy80c2Vhc29uc19kZXNrdG9wX21vYmlsZSIKICAgIGRhdGEtbGF6eS1mZXRjaD0idHJ1ZSIgCiAgICBkYXRhLWxvYWRpbmctc3RyYXRlZ3k9IjEiPgo8L2FtcC1hZD4=" data-dcnode-id="1984"></div></div><hr data-dcnode-id="1982"><p data-dcnode-id="1980"><img alt="" data-dcnode-id="1981" height="250" loading="lazy" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//todayshomeowner.com/wp-content/uploads/2019/06/how-to-trim-large-tree-branches-3.jpg&amp;raw" width="510"></p><h3 data-dcnode-id="1978"><span data-dcnode-id="1979" instrument_node="">How to Cut a Tree Limb</span></h3><p data-dcnode-id="1976"><span data-dcnode-id="1977" instrument_node="">Proper pruning of large tree limbs involves three cuts:</span></p><ul data-dcnode-id="1971"><li data-dcnode-id="1972"><strong data-dcnode-id="1974"><span data-dcnode-id="1975" instrument_node="">Cut #1, Notch Cut:</span></strong><span data-dcnode-id="1973" instrument_node=""> Cut a small notch in the bottom of the limb, 2-3 feet away from the trunk, and about a quarter of the way through. This notch will keep the bark from splitting when you make the next cut.</span></li></ul><ul data-dcnode-id="1966"><li data-dcnode-id="1967"><strong data-dcnode-id="1969"><span data-dcnode-id="1970" instrument_node="">Cut #2, Relief Cut:</span></strong><span data-dcnode-id="1968" instrument_node=""> Just outside the notch, make a relief cut completely through the branch. This removes the weight of the branch so that you can make your final cut without the branch splitting and falling.</span></li></ul><ul data-dcnode-id="1961"><li data-dcnode-id="1962"><strong data-dcnode-id="1964"><span data-dcnode-id="1965" instrument_node="">Cut #3, Final Cut:</span></strong><span data-dcnode-id="1963" instrument_node=""> This is the one that matters! Your final cut should be right where the branch collar (that swollen bump) transitions to smooth branch bark. Follow the slant of the branch collar. If you can’t fit your saw into the crotch at the right angle, then cut it from the bottom up.</span></li></ul><h3 data-dcnode-id="1959"><span data-dcnode-id="1960" instrument_node="">Common Tree Trimming Mistakes</span></h3><p class="img" data-dcnode-id="1954"><img alt="" class="alignright" data-dcnode-id="1958" height="150" loading="lazy" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//todayshomeowner.com/wp-content/uploads/2019/06/how-to-trim-large-tree-branches-4.jpg&amp;raw" width="200"><strong data-dcnode-id="1956"><span data-dcnode-id="1957" instrument_node="">Cutting the Branch Too Short:</span></strong><span data-dcnode-id="1955" instrument_node=""> We used to think that branches should be cut off flush with the trunk – boy, were we ever wrong! The branch collar is responsible for forming the scar tissue. If you cut into the branch collar, the tree will have a very hard time recovering. When you see rotten holes in tree trunks or seeping wounds, you’re looking at the aftermath of cutting off the branch collar.</span></p><div class="code-block code-block-36 ai-viewport-2 ai-viewport-3" data-dcnode-id="1952" style="margin: 8px auto; text-align: center; display: block; clear: both;"><div class="ai-lazy" data-class="Y29kZS1ibG9jaw==" data-code="PGFtcC1hZCB3aWR0aD0zMDAgaGVpZ2h0PTI1MAogICAgdHlwZT0iZG91YmxlY2xpY2siCiAgICBkYXRhLXNsb3Q9Ii8yOTI0MDcwMy80c2Vhc29uc19kZXNrdG9wX21vYmlsZSIKICAgIGRhdGEtbGF6eS1mZXRjaD0idHJ1ZSIgCiAgICBkYXRhLWxvYWRpbmctc3RyYXRlZ3k9IjEiPgo8L2FtcC1hZD4=" data-dcnode-id="1953"></div></div><div data-dcnode-id="1951" style="height: 12px;"></div><p class="img" data-dcnode-id="1946"><img alt="" class="alignright" data-dcnode-id="1950" height="150" loading="lazy" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//todayshomeowner.com/wp-content/uploads/2019/06/how-to-trim-large-tree-branches-5.jpg&amp;raw" width="200"><strong data-dcnode-id="1948"><span data-dcnode-id="1949" instrument_node="">Leaving the Branch Too Long:</span></strong><span data-dcnode-id="1947" instrument_node=""> The branch collar on the trunk can only do its job of allowing the wound to heal if all of the branches that it has to cover over have been removed while leaving the branch collar itself intact. In the photo on the right, you can see how the branch stubs that were left too long are interfering with and actually preventing the healing process from taking place.</span></p><div class="code-block code-block-38 ai-viewport-2 ai-viewport-3" data-dcnode-id="1944" style="margin: 8px auto; text-align: center; display: block; clear: both;"><div class="ai-lazy" data-class="Y29kZS1ibG9jaw==" data-code="PGFtcC1hZCB3aWR0aD0zMjAgaGVpZ2h0PTEwMAogICAgdHlwZT0iZG91YmxlY2xpY2siCiAgICBkYXRhLXNsb3Q9Ii8yOTI0MDcwMy80c2Vhc29uc19kZXNrdG9wX21vYmlsZSIKICAgIGRhdGEtbGF6eS1mZXRjaD0idHJ1ZSIgCiAgICBkYXRhLWxvYWRpbmctc3RyYXRlZ3k9IjEiPgo8L2FtcC1hZD4=" data-dcnode-id="1945"></div></div><div data-dcnode-id="1943" style="height: 12px;"></div><p class="img" data-dcnode-id="1938"><img alt="" class="alignright" data-dcnode-id="1942" height="150" loading="lazy" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//todayshomeowner.com/wp-content/uploads/2019/06/how-to-trim-large-tree-branches-6.jpg&amp;raw" width="200"><strong data-dcnode-id="1940"><span data-dcnode-id="1941" instrument_node="">Failure to Make the Relief Cuts:</span></strong><span data-dcnode-id="1939" instrument_node=""> If you fail to make the relief cuts and remove most of the weight of the limb before trimming the branch back to the trunk, you run the risk of having the branch split off. This can cause substantial damage to the trunk, as seen in the photo at right. This can make the wound on the trunk susceptible to disease and insect infestation and take much longer to heal.</span></p><hr data-dcnode-id="1937"><h3 data-dcnode-id="1935"><span data-dcnode-id="1936" instrument_node="">Further Information</span></h3><ul data-dcnode-id="1918"><li data-dcnode-id="1931"><a data-dcnode-id="1933" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//todayshomeowner.com/video/trimming-limbs/"><span data-dcnode-id="1934" instrument_node="">Trimming Limbs</span></a><span data-dcnode-id="1932" instrument_node=""> (video)</span></li><li data-dcnode-id="1927"><a data-dcnode-id="1929" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//todayshomeowner.com/treating-cut-tree-limbs-with-wound-paint/"><span data-dcnode-id="1930" instrument_node="">Treating Cut Tree Limbs With Wound Paint</span></a><span data-dcnode-id="1928" instrument_node=""> (article)</span></li><li data-dcnode-id="1923"><a data-dcnode-id="1925" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//todayshomeowner.com/when-to-trim-trees-and-shrubs/"><span data-dcnode-id="1926" instrument_node="">When To Trim Trees and Shrubs</span></a><span data-dcnode-id="1924" instrument_node=""> (article)</span></li><li data-dcnode-id="1919"><a data-dcnode-id="1921" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//todayshomeowner.com/basic-shrub-pruning-techniques/"><span data-dcnode-id="1922" instrument_node="">Basic Shrub Pruning Techniques</span></a><span data-dcnode-id="1920" instrument_node=""> (article)</span></li></ul><div class="code-block code-block-50" data-dcnode-id="1910" style="margin: 8px auto 8px 0; text-align: left; display: block; clear: both;"><hr data-dcnode-id="1917"><div data-dcnode-id="1911" style="display:inline block; width:100%;"><span data-dcnode-id="1916" instrument_node="">

</span></a></footer><div class="comment-content" data-dcnode-id="1762"><p data-dcnode-id="1765"><span data-dcnode-id="1766" instrument_node="">Hello and thanks for providing this information on cutting large branches. I have a mulberry tree that suffered substantial winter damage and the bark on some branches has died 360 degrees around the branch. It was so mushy all I had to do was rub it away, exposing the underlying wood. A) will these branches ever regain their bark or should I remove them? B) if I should remove them, when would be the best time to do so?</span></p><p data-dcnode-id="1763"><span data-dcnode-id="1764" instrument_node="">Thank you.</span></p></div><div class="comment-meta" data-dcnode-id="1758" id="comment-5632"><span data-dcnode-id="1761" instrument_node="">

</span></a></footer><div class="comment-content" data-dcnode-id="1726"><p data-dcnode-id="1743"><span data-dcnode-id="1744" instrument_node="">Good info on making the actual cut.  And, the article is right to say that trees don’t actually heal; they seal.  But the wound or resulting decay will stay there forever, likely getting worse with time – tree species and location play a large role in how much decay and how fast.  What is not covered here is which branches to trim and why.  Of course, that can be complex.  Assuming you have a low branch that rubs on the roof or your vehicle, follow the above instructions.  Otherwise, it is desirable to leave as many leaves on the tree as possible because that is where the food is made through photosynthesis.  Of course, there are some branches that will need to be pruned from trees in urban environments.  Why don’t trees in the forest need to be pruned?  Trees in their natural environment grow differently due to the available light and phototropism (picture a flower in the kitchen window).  What we are looking for is a strong central leader and good branch connections and spacing.  The most important reason for pruning urban trees is to eliminate or reduce competing leaders by removal or reduction cuts.  And if we know that a limb is a temporary branch, we also know that it will be removed one day, so it is a good idea to keep the diameter of that limb small so that the future wound from removal is also small.  If in doubt, call a Certified Arborist.</span></p><p data-dcnode-id="1729"><span data-dcnode-id="1742" instrument_node="">CHRIS FRANCIS</span><br data-dcnode-id="1741"><span data-dcnode-id="1740" instrument_node="">

I’m not really following.  The doughnut hole could be formed by woundwood rolling in.  If that is the case, it should soon cover the entire wound.  If there is dead wood beyond that woundwood, you can prune it out to allow the woundwood to completely close over the wound.  Be careful not to cut into the branch collar or woundwood in the process.  If someone has already cut into the branch collar, there really is not anything that can be done.  If the tree has good vigor, it can eventually form woundwood over the cut, but it will be a larger wound, cut into the trunk tissue, and it will not have the “right stuff” if the branch collar has been cut off (as in a large flush cut).</span></p><p data-dcnode-id="1665"><span data-dcnode-id="1680" instrument_node="">CHRIS FRANCIS&nbsp;</span><br data-dcnode-id="1679"><span data-dcnode-id="1678" instrument_node="">

</span></a></footer><div class="comment-content" data-dcnode-id="1382"><p data-dcnode-id="1391"><span data-dcnode-id="1392" instrument_node="">Topping, tipping and lacing is always bad. When you remove the end of a branch or a limb, it forces inner branches to grow and it stimulates suckers which are inherently weak and will eventually snap off when they get too heavy. It also changes the natural shape and structure of the tree.</span></p><p data-dcnode-id="1389"><span data-dcnode-id="1390" instrument_node="">The only reason to cut a healthy limb is when it interferes with other things such as traffic, high voltage wires, buildings, or sometimes other limbs, in which case it should be removed entirely using the techniques shown above.</span></p><p data-dcnode-id="1387"><span data-dcnode-id="1388" instrument_node="">Sometimes people complain that a tree blocks their view or their signage. In those cases it is often better to cut the lower limbs so that the mass of the tree can grow above the view or signage.</span></p><p data-dcnode-id="1385"><span data-dcnode-id="1386" instrument_node="">Here In San Diego we have hundreds of so-called tree services that have convinced homeowners, businesses and even governments to let them permanently ruin healthy trees by needlessly lopping off limbs. (They should be put out of business.)</span></p><p data-dcnode-id="1383"><span data-dcnode-id="1384" instrument_node="">A properly pruned tree will not look as though it has ever been pruned, and most pruning can be done with a handsaw. On those occasions when I prune trees, I give a great deal of thought before making a cut and if I have any doubt, I wait a year or two and then re-evaluate. Not only does this improve my work, but it’s better for the tree to have amputations spread out over several seasons.</span></p></div><div class="comment-meta" data-dcnode-id="1378" id="comment-727063"><span data-dcnode-id="1381" instrument_node="">
