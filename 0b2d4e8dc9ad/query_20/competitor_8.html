</span><p data-dcnode-id="1131"><span data-dcnode-id="1132"><span data-dcnode-id="1133"><span data-dcnode-id="1134" instrument_node="">&nbsp; &nbsp; &nbsp; &nbsp; &nbsp; &nbsp; (c)&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp; the Permit Holder or Landowner shall pay all fees related to this By-law;</span></span></span></p><span data-dcnode-id="1130" instrument_node="">
</span><p data-dcnode-id="1126"><span data-dcnode-id="1127"><span data-dcnode-id="1128"><span data-dcnode-id="1129" instrument_node="">&nbsp; &nbsp; &nbsp; &nbsp; &nbsp; &nbsp; (d)&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp; the Permit Holder or Landowner shall pay all other fees and fines owed by the Permit Holder or Landowner to the City;</span></span></span></p><span data-dcnode-id="1125" instrument_node="">
</span><p data-dcnode-id="1121"><span data-dcnode-id="1122"><span data-dcnode-id="1123"><span data-dcnode-id="1124" instrument_node="">&nbsp; &nbsp; &nbsp; &nbsp; &nbsp; &nbsp; (e)&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp; the Permit Holder or Landowner shall allow, at any reasonable time, the City to inspect the Site;</span></span></span></p><span data-dcnode-id="1120" instrument_node="">
</span><p data-dcnode-id="1116"><span data-dcnode-id="1117"><span data-dcnode-id="1118"><span data-dcnode-id="1119" instrument_node="">&nbsp; &nbsp; &nbsp; &nbsp; &nbsp; &nbsp; (f)&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp; the use of the Site is permitted or conforms with the uses permitted under the applicable zoning by-law or is a legal non-conforming use;</span></span></span></p><span data-dcnode-id="1115" instrument_node="">
</span><p data-dcnode-id="1111"><span data-dcnode-id="1112"><span data-dcnode-id="1113"><span data-dcnode-id="1114" instrument_node="">&nbsp; &nbsp; &nbsp; &nbsp; &nbsp; &nbsp; (g)&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp; the Permit Holder or Landowner shall meet all of the requirements of this By-law;</span></span></span></p><span data-dcnode-id="1110" instrument_node="">
</span><p data-dcnode-id="1100"><span data-dcnode-id="1101"><span data-dcnode-id="1102"><span data-dcnode-id="1109" instrument_node="">&nbsp; &nbsp; &nbsp; &nbsp; &nbsp; &nbsp; (h)&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp; the Permit Holder or Landowner shall ensure that it complies with applicable law including the </span><em data-dcnode-id="1107"><span data-dcnode-id="1108" instrument_node="">Migratory Birds Convention Act, 1994</span></em><span data-dcnode-id="1106" instrument_node="">, and the </span><em data-dcnode-id="1104"><span data-dcnode-id="1105" instrument_node="">Endangered Species Act, 2007</span></em><span data-dcnode-id="1103" instrument_node="">.</span></span></span></p><span data-dcnode-id="1099" instrument_node="">
</span><h4 data-dcnode-id="1094"><span data-dcnode-id="1095"><span data-dcnode-id="1096"><strong data-dcnode-id="1097"><span data-dcnode-id="1098" instrument_node="">Permit – Additional Conditions That May be Imposed</span></strong></span></span></h4><span data-dcnode-id="1093" instrument_node="">
</span><p data-dcnode-id="1089"><span data-dcnode-id="1090"><span data-dcnode-id="1091"><span data-dcnode-id="1092" instrument_node="">9.3&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp; The City Engineer may impose other conditions on a Permit, including but not limited to:</span></span></span></p><span data-dcnode-id="1088" instrument_node="">
</span><p data-dcnode-id="1084"><span data-dcnode-id="1085"><span data-dcnode-id="1086"><span data-dcnode-id="1087" instrument_node="">&nbsp; &nbsp; &nbsp; &nbsp; &nbsp; &nbsp; (a)&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp; the Permit Holder shall ensure that the Injury or Destruction of the Tree is carried out in accordance with Good Arboricultural Practices or Good Forestry Practices; </span></span></span></p><span data-dcnode-id="1083" instrument_node="">
</span><p data-dcnode-id="1079"><span data-dcnode-id="1080"><span data-dcnode-id="1081"><span data-dcnode-id="1082" instrument_node="">&nbsp; &nbsp; &nbsp; &nbsp; &nbsp; &nbsp; (b)&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp; the Permit Holder shall ensure that the Injury or Destruction of the Tree is carried out in a particular manner or at or during a particular time;</span></span></span></p><span data-dcnode-id="1078" instrument_node="">
</span><p data-dcnode-id="1073"><span data-dcnode-id="1074"><span data-dcnode-id="1075"><span data-dcnode-id="1076"><span data-dcnode-id="1077" instrument_node="">&nbsp; &nbsp; &nbsp; &nbsp; &nbsp; &nbsp; (c)&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp; the Permit Holder shall ensure that the Permit is posted in a public location for a time period before, during and after the Injury or Destruction of the Tree or Trees;</span></span></span></span></p><span data-dcnode-id="1072" instrument_node="">
</span><p data-dcnode-id="1068"><span data-dcnode-id="1069"><span data-dcnode-id="1070"><span data-dcnode-id="1071" instrument_node="">&nbsp; &nbsp; &nbsp; &nbsp; &nbsp; &nbsp; (d) &nbsp;&nbsp;&nbsp;&nbsp;&nbsp; the Permit Holder shall ensure that the Injury or Destruction of the Tree is to be carried out by or under the supervision of a Qualified Person; </span></span></span></p><span data-dcnode-id="1067" instrument_node="">
</span><p data-dcnode-id="1062"><span data-dcnode-id="1063"><span data-dcnode-id="1064"><span data-dcnode-id="1065"><span data-dcnode-id="1066" instrument_node="">&nbsp; &nbsp; &nbsp; &nbsp; &nbsp; &nbsp; (e) &nbsp;&nbsp;&nbsp;&nbsp;&nbsp; the Permit Holder shall ensure that measures are to be implemented to protect any retained Trees for the period the Permit remains valid;</span></span></span></span></p><span data-dcnode-id="1061" instrument_node="">
</span><p data-dcnode-id="1057"><span data-dcnode-id="1058"><span data-dcnode-id="1059"><span data-dcnode-id="1060" instrument_node="">&nbsp; &nbsp; &nbsp; &nbsp; &nbsp; &nbsp; (f)&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp; the Permit Holder shall ensure that the City Engineer is informed within 48 hours of a change of Landowner;</span></span></span></p><span data-dcnode-id="1056" instrument_node="">
</span><p data-dcnode-id="1051"><span data-dcnode-id="1052"><span data-dcnode-id="1053"><span data-dcnode-id="1054"><span data-dcnode-id="1055" instrument_node="">&nbsp; &nbsp; &nbsp; &nbsp; &nbsp; &nbsp; (g)&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp; the Permit Holder shall ensure that a Tree Management Plan satisfactory to the City Engineer is implemented by a required date;</span></span></span></span></p><span data-dcnode-id="1050" instrument_node="">
</span><p data-dcnode-id="1045"><span data-dcnode-id="1046"><span data-dcnode-id="1047"><span data-dcnode-id="1048"><span data-dcnode-id="1049" instrument_node="">&nbsp; &nbsp; &nbsp; &nbsp; &nbsp; &nbsp; (h)&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp; the Permit Holder shall ensure posting of Security that the City may draw upon in full if the By-law is contravened or if there is a failure in the proper and complete execution of a Permit and its conditions, such that restoration of all or part of the Site has to be done by the City;</span></span></span></span></p><span data-dcnode-id="1044" instrument_node="">
</span><p data-dcnode-id="1039"><span data-dcnode-id="1040"><span data-dcnode-id="1041"><span data-dcnode-id="1042"><span data-dcnode-id="1043" instrument_node="">&nbsp; &nbsp; &nbsp; &nbsp; &nbsp; &nbsp; (i)&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp; the Permit Holder shall ensure it complies with any requirements to protect or relocate wildlife (including bees) as determined by the City Engineer; </span></span></span></span></p><span data-dcnode-id="1038" instrument_node="">
</span><p data-dcnode-id="1033"><span data-dcnode-id="1034"><span data-dcnode-id="1035"><span data-dcnode-id="1036"><span data-dcnode-id="1037" instrument_node="">&nbsp; &nbsp; &nbsp; &nbsp; &nbsp; &nbsp; (j)&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp; the Permit Holder shall ensure it implements the Silvicultural Plan or Tree Management Plan submitted with the application to the satisfaction of the City Engineer within a period of time specified by the City Engineer;</span></span></span></span></p><span data-dcnode-id="1032" instrument_node="">
</span><p data-dcnode-id="1027"><span data-dcnode-id="1028"><span data-dcnode-id="1029"><span data-dcnode-id="1030"><span data-dcnode-id="1031" instrument_node="">&nbsp; &nbsp; &nbsp; &nbsp; &nbsp; &nbsp;(k)&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp; a condition recommended by a Qualified Person that the City Engineer determines is appropriate.</span></span></span></span></p><span data-dcnode-id="1026" instrument_node="">
</span><h4 data-dcnode-id="1019"><span data-dcnode-id="1020"><span data-dcnode-id="1021"><span data-dcnode-id="1022"><span data-dcnode-id="1023"><strong data-dcnode-id="1024"><span data-dcnode-id="1025" instrument_node="">Permit – Valid For Time Issued – 6 Month Maximum</span></strong></span></span></span></span></h4><span data-dcnode-id="1018" instrument_node="">
</span><p data-dcnode-id="1014"><span data-dcnode-id="1015"><span data-dcnode-id="1016"><span data-dcnode-id="1017" instrument_node="">9.4&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp; A Permit issued under this By-law shall be valid only for the period of time for which it is issued.&nbsp; Unless expressly stated on the face of the Permit, all Permits issued under this By-law shall expire 6 months after issuance.</span></span></span></p><span data-dcnode-id="1013" instrument_node="">
</span><h4 data-dcnode-id="1008"><span data-dcnode-id="1009"><span data-dcnode-id="1010"><strong data-dcnode-id="1011"><span data-dcnode-id="1012" instrument_node="">Permit Issuance – Not permission to Contravene Laws</span></strong></span></span></h4><span data-dcnode-id="1007" instrument_node="">
</span><p data-dcnode-id="1003"><span data-dcnode-id="1004"><span data-dcnode-id="1005"><span data-dcnode-id="1006" instrument_node="">9.5&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp; The issuance of a Permit under this By-law is not intended and shall not be construed as permission or consent by the City for the Permit Holder or Landowner to contravene or fail to observe or comply with any law of Canada, Ontario or any By-law of the City.</span></span></span></p><span data-dcnode-id="1002" instrument_node="">
</span><h4 data-dcnode-id="997"><span data-dcnode-id="998"><span data-dcnode-id="999"><strong data-dcnode-id="1000"><span data-dcnode-id="1001" instrument_node="">Permit – Owned by City – Valid only to Person and Site Named On It</span></strong></span></span></h4><span data-dcnode-id="996" instrument_node="">
</span><p data-dcnode-id="992"><span data-dcnode-id="993"><span data-dcnode-id="994"><span data-dcnode-id="995" instrument_node="">9.6&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp; Every Permit, at all times, is owned by and is the property of the City and is valid only in respect of the person and the Site named on it.</span></span></span></p><span data-dcnode-id="991" instrument_node="">
</span><h4 data-dcnode-id="986"><span data-dcnode-id="987"><span data-dcnode-id="988"><strong data-dcnode-id="989"><span data-dcnode-id="990" instrument_node="">Permit – Cannot be Sold, Transferred, etc.</span></strong></span></span></h4><span data-dcnode-id="985" instrument_node="">
</span><p data-dcnode-id="981"><span data-dcnode-id="982"><span data-dcnode-id="983"><span data-dcnode-id="984" instrument_node="">9.7&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp; No Permit issued under this By-law may be sold, purchased, leased, mortgaged, charged, assigned, pledged, transferred, seized, distrained or otherwise dealt with.</span></span></span></p><span data-dcnode-id="980" instrument_node="">
</span><h4 data-dcnode-id="975"><span data-dcnode-id="976"><span data-dcnode-id="977"><strong data-dcnode-id="978"><span data-dcnode-id="979" instrument_node="">Permit – Notify City Engineer if Change of Information</span></strong></span></span></h4><span data-dcnode-id="974" instrument_node="">
</span><p data-dcnode-id="970"><span data-dcnode-id="971"><span data-dcnode-id="972"><span data-dcnode-id="973" instrument_node="">9.8&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp; The Permit Holder shall notify the City Engineer of any change in their name, business, home address, Site ownership, or any other information relating to the Permit within fifteen (15) days after such change and, if the City Engineer determines it necessary, shall immediately return their Permit to the City Engineer for amendment.</span></span></span></p><span data-dcnode-id="969" instrument_node="">
</span><h4 data-dcnode-id="964"><span data-dcnode-id="965"><span data-dcnode-id="966"><strong data-dcnode-id="967"><span data-dcnode-id="968" instrument_node="">Requirement to obtain all other approvals required by any level of government</span></strong></span></span></h4><span data-dcnode-id="963" instrument_node="">
</span><p data-dcnode-id="959"><span data-dcnode-id="960"><span data-dcnode-id="961"><span data-dcnode-id="962" instrument_node="">9.9&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp; A Permit issued pursuant to this By-law does not preclude the responsibility of the Applicant or Landowner or Permit Holder to obtain all other approvals which may be required by any level of government and agencies. </span></span></span></p><span data-dcnode-id="958" instrument_node="">
</span><h3 data-dcnode-id="953"><strong data-dcnode-id="954"><span data-dcnode-id="955"><span data-dcnode-id="956"><span data-dcnode-id="957" instrument_node="">Part 10&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp; APPEALS – HEARINGS BEFORE THE HEARINGS OFFICER</span></span></span></strong></h3><span data-dcnode-id="952" instrument_node="">
</span><p data-dcnode-id="948"><span data-dcnode-id="949"><span data-dcnode-id="950"><span data-dcnode-id="951" instrument_node="">10.1&nbsp;&nbsp;&nbsp; The power and authority to conduct hearings of appeals under this By-law are delegated to the Hearings Officer.</span></span></span></p><span data-dcnode-id="947" instrument_node="">
</span><p data-dcnode-id="943"><span data-dcnode-id="944"><span data-dcnode-id="945"><span data-dcnode-id="946" instrument_node="">10.2&nbsp;&nbsp;&nbsp; The provisions of the City's Hearings Officer By-law A.-6653-121, as amended, and any successor by-law, apply to all hearings conducted by the Hearings Officer.</span></span></span></p><span data-dcnode-id="942" instrument_node="">
</span><p data-dcnode-id="938"><span data-dcnode-id="939"><span data-dcnode-id="940"><span data-dcnode-id="941" instrument_node="">10.3&nbsp;&nbsp;&nbsp; The Hearings Officer may uphold or vary the decision of the City Engineer or make any decision that the City Engineer was entitled to make in the first instance.</span></span></span></p><span data-dcnode-id="937" instrument_node="">
</span><p data-dcnode-id="933"><span data-dcnode-id="934"><span data-dcnode-id="935"><span data-dcnode-id="936" instrument_node="">10.4&nbsp;&nbsp;&nbsp; The decision of the Hearings Officer is final.</span></span></span></p><span data-dcnode-id="932" instrument_node="">
</span><h3 data-dcnode-id="927"><strong data-dcnode-id="928"><span data-dcnode-id="929"><span data-dcnode-id="930"><span data-dcnode-id="931" instrument_node="">Part 11&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp; ENFORCEMENT</span></span></span></strong></h3><span data-dcnode-id="926" instrument_node="">
</span><h4 data-dcnode-id="921"><span data-dcnode-id="922"><span data-dcnode-id="923"><strong data-dcnode-id="924"><span data-dcnode-id="925" instrument_node="">Enforced By</span></strong></span></span></h4><span data-dcnode-id="920" instrument_node="">
</span><p data-dcnode-id="916"><span data-dcnode-id="917"><span data-dcnode-id="918"><span data-dcnode-id="919" instrument_node="">11.1&nbsp;&nbsp;&nbsp; This By-law may be enforced by a By-law Enforcement Officer. </span></span></span></p><span data-dcnode-id="915" instrument_node="">
</span><h4 data-dcnode-id="910"><span data-dcnode-id="911"><span data-dcnode-id="912"><strong data-dcnode-id="913"><span data-dcnode-id="914" instrument_node="">Powers of Entry</span></strong></span></span></h4><span data-dcnode-id="909" instrument_node="">
</span><p data-dcnode-id="905"><span data-dcnode-id="906"><span data-dcnode-id="907"><span data-dcnode-id="908" instrument_node="">11.2&nbsp;&nbsp;&nbsp; The provisions of the City’s Inspections By-law A-30, as amended, and any successor by-law, apply to Powers of Entry for the purpose of carrying out inspections.</span></span></span></p><span data-dcnode-id="904" instrument_node="">
</span><h4 data-dcnode-id="899"><span data-dcnode-id="900"><span data-dcnode-id="901"><strong data-dcnode-id="902"><span data-dcnode-id="903" instrument_node="">Prohibition - Hinder or Obstruct By-law Enforcement Officer</span></strong></span></span></h4><span data-dcnode-id="898" instrument_node="">
</span><p data-dcnode-id="894"><span data-dcnode-id="895"><span data-dcnode-id="896"><span data-dcnode-id="897" instrument_node="">11.3&nbsp;&nbsp;&nbsp; No person shall hinder or obstruct or attempt to hinder or obstruct the By-law Enforcement Officer in the discharge of duties under this By-law.</span></span></span></p><span data-dcnode-id="893" instrument_node="">
</span><h3 data-dcnode-id="888"><strong data-dcnode-id="889"><span data-dcnode-id="890"><span data-dcnode-id="891"><span data-dcnode-id="892" instrument_node="">Part 12&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp; POWER TO MAKE ORDERS – REMEDIAL ACTION</span></span></span></strong></h3><span data-dcnode-id="887" instrument_node="">
</span><h4 data-dcnode-id="882"><span data-dcnode-id="883"><span data-dcnode-id="884"><strong data-dcnode-id="885"><span data-dcnode-id="886" instrument_node="">Order to Discontinue Activity</span></strong></span></span></h4><span data-dcnode-id="881" instrument_node="">
</span><p data-dcnode-id="876"><span data-dcnode-id="877"><span data-dcnode-id="878"><span data-dcnode-id="879"><span data-dcnode-id="880" instrument_node="">12.1&nbsp;&nbsp;&nbsp; (1)&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp; Where a By-law Enforcement Officer is satisfied that a contravention of this By-law has occurred, the By-law Enforcement Officer may make an Order to Discontinue Activity requiring the person who contravened the By-law or a person that caused or permitted a contravention of the By-law or the owner or occupier of the land on which the contravention occurred to discontinue the contravening activity.</span></span></span></span></p><span data-dcnode-id="875" instrument_node="">
</span><p data-dcnode-id="871"><span data-dcnode-id="872"><span data-dcnode-id="873"><span data-dcnode-id="874" instrument_node="">&nbsp; &nbsp; &nbsp; &nbsp; &nbsp; &nbsp;(2) &nbsp;&nbsp;&nbsp;&nbsp;&nbsp; The Order to Discontinue Activity shall set out reasonable particulars of the contravention adequate to identify the contravention, the location of the land on which the contravention occurred, and the date and time by which there must be compliance with the Order to Discontinue Activity. </span></span></span></p><span data-dcnode-id="870" instrument_node="">
</span><h4 data-dcnode-id="865"><span data-dcnode-id="866"><span data-dcnode-id="867"><strong data-dcnode-id="868"><span data-dcnode-id="869" instrument_node="">Work Order</span></strong></span></span></h4><span data-dcnode-id="864" instrument_node="">
</span><p data-dcnode-id="859"><span data-dcnode-id="860"><span data-dcnode-id="861"><span data-dcnode-id="862"><span data-dcnode-id="863" instrument_node="">12.2 &nbsp;&nbsp; (1)&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp; Where a By-law Enforcement Officer is satisfied that a contravention of this By-law has occurred, the By-law Enforcement Officer may make a Work Order requiring the person who contravened the By-law or who caused or permitted the contravention or the owner or occupier of the land on which the contravention occurred to do work to correct the contravention.&nbsp; </span></span></span></span></p><span data-dcnode-id="858" instrument_node="">
</span><p data-dcnode-id="854"><span data-dcnode-id="855"><span data-dcnode-id="856"><span data-dcnode-id="857" instrument_node="">&nbsp; &nbsp; &nbsp; &nbsp; &nbsp; &nbsp; (2)&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp; A Work Order shall set out reasonable particulars of the contravention adequate to identify the contravention and the location of the land on which the contravention occurred, and the work to be done and the date by which the work must be done.</span></span></span></p><span data-dcnode-id="853" instrument_node="">
</span><h4 data-dcnode-id="848"><span data-dcnode-id="849"><span data-dcnode-id="850"><strong data-dcnode-id="851"><span data-dcnode-id="852" instrument_node="">Service of Order to Discontinue Activity or Work Order</span></strong></span></span></h4><span data-dcnode-id="847" instrument_node="">
</span><p data-dcnode-id="842"><span data-dcnode-id="843"><span data-dcnode-id="844"><span data-dcnode-id="845"><span data-dcnode-id="846" instrument_node="">12.3&nbsp;&nbsp;&nbsp; (1)&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp; An Order to Discontinue Activity or Work Order may be served personally by the By-law Enforcement Officer, may be sent by registered mail to the person contravening the By-law, or may be posted in a conspicuous place on the property where the contravention occurred.</span></span></span></span></p><span data-dcnode-id="841" instrument_node="">
</span><p data-dcnode-id="837"><span data-dcnode-id="838"><span data-dcnode-id="839"><span data-dcnode-id="840" instrument_node="">&nbsp; &nbsp; &nbsp; &nbsp; &nbsp; &nbsp; (2)&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp; Where an Order to Discontinue Activity or Work Order under this By-law is served personally by the By-law Enforcement Officer, it shall be deemed to have been served on the date of delivery to the person or persons named. </span></span></span></p><span data-dcnode-id="836" instrument_node="">
</span><p data-dcnode-id="832"><span data-dcnode-id="833"><span data-dcnode-id="834"><span data-dcnode-id="835" instrument_node="">&nbsp; &nbsp; &nbsp; &nbsp; &nbsp; &nbsp; (3)&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp; The posting of the Order to Discontinue Activity or Work Order at the Site shall be deemed to be sufficient service of the Order to Discontinue Activity on the person or corporation to whom the Order to Discontinue Activity is directed on the date it is posted.</span></span></span></p><span data-dcnode-id="831" instrument_node="">
</span><p data-dcnode-id="827"><span data-dcnode-id="828"><span data-dcnode-id="829"><span data-dcnode-id="830" instrument_node="">&nbsp; &nbsp; &nbsp; &nbsp; &nbsp; &nbsp; (4)&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp; Where an Order to Discontinue Activity or Work Order issued under the By-law is sent by registered mail, it shall be sent to the last known address of one or more of the following, as applicable:</span></span></span></p><span data-dcnode-id="826" instrument_node="">
</span><p data-dcnode-id="822"><span data-dcnode-id="823"><span data-dcnode-id="824"><span data-dcnode-id="825" instrument_node="">&nbsp; &nbsp; &nbsp; &nbsp; &nbsp; &nbsp; &nbsp; &nbsp; &nbsp; &nbsp; &nbsp; &nbsp; &nbsp;(a)&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp; the Applicant; </span></span></span></p><span data-dcnode-id="821" instrument_node="">
</span><p data-dcnode-id="817"><span data-dcnode-id="818"><span data-dcnode-id="819"><span data-dcnode-id="820" instrument_node="">&nbsp; &nbsp; &nbsp; &nbsp; &nbsp; &nbsp; &nbsp; &nbsp; &nbsp; &nbsp; &nbsp; &nbsp; &nbsp;(b)&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp; the Permit Holder;</span></span></span></p><span data-dcnode-id="816" instrument_node="">
</span><p data-dcnode-id="812"><span data-dcnode-id="813"><span data-dcnode-id="814"><span data-dcnode-id="815" instrument_node="">&nbsp; &nbsp; &nbsp; &nbsp; &nbsp; &nbsp; &nbsp; &nbsp; &nbsp; &nbsp; &nbsp; &nbsp; &nbsp;(c)&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp; the Landowner;&nbsp; </span></span></span></p><span data-dcnode-id="811" instrument_node="">
</span><p data-dcnode-id="807"><span data-dcnode-id="808"><span data-dcnode-id="809"><span data-dcnode-id="810" instrument_node="">&nbsp; &nbsp; &nbsp; &nbsp; &nbsp; &nbsp; &nbsp; &nbsp; &nbsp; &nbsp; &nbsp; &nbsp; (d)&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp; the person contravening the By-law;</span></span></span></p><span data-dcnode-id="806" instrument_node="">
</span><p data-dcnode-id="797"><span data-dcnode-id="801"><span data-dcnode-id="802"><span data-dcnode-id="805" instrument_node="">&nbsp; &nbsp; &nbsp; &nbsp; &nbsp; &nbsp; &nbsp; &nbsp; &nbsp; &nbsp; &nbsp; &nbsp; (e)&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp; the person or company undertaking the Injury or Destruction</span><s data-dcnode-id="803"><span data-dcnode-id="804" instrument_node="">,&nbsp;</span></s></span></span><span data-dcnode-id="798"><span data-dcnode-id="799"><span data-dcnode-id="800" instrument_node="">and shall be deemed to have been served on the fifth day after the Order to Discontinue Activity or Order is mailed.</span></span></span></p><span data-dcnode-id="796" instrument_node="">
</span><p data-dcnode-id="790"><span data-dcnode-id="791"><span data-dcnode-id="792"><span data-dcnode-id="795" instrument_node="">12.4&nbsp;&nbsp;&nbsp; </span><strong data-dcnode-id="793"><span data-dcnode-id="794" instrument_node="">Remedial Action</span></strong></span></span></p><span data-dcnode-id="789" instrument_node="">
</span><p data-dcnode-id="785"><span data-dcnode-id="786"><span data-dcnode-id="787"><span data-dcnode-id="788" instrument_node="">If a person is required, under a Work Order under this By-law, to do a matter or thing, then in default of it being done by the person so required to do it, the matter or thing may be done at the person’s expense under the direction of a By-law Enforcement Officer.</span></span></span></p><span data-dcnode-id="784" instrument_node="">
</span><p data-dcnode-id="780"><span data-dcnode-id="781"><span data-dcnode-id="782"><span data-dcnode-id="783" instrument_node="">12.5&nbsp;&nbsp;&nbsp; The City may recover the costs of doing a matter or thing under section 12.4 from the person required to do it, by adding the costs to the tax roll for the subject land and collecting them in the same manner as property taxes.</span></span></span></p><span data-dcnode-id="779" instrument_node="">
</span><p data-dcnode-id="775"><span data-dcnode-id="776"><span data-dcnode-id="777"><span data-dcnode-id="778" instrument_node="">12.6&nbsp;&nbsp;&nbsp; The amount of the costs under section 12.4, including interest, constitutes a lien on the land upon the registration in the proper land registry office of a notice of lien.</span></span></span></p><span data-dcnode-id="774" instrument_node="">
</span><h3 data-dcnode-id="769"><strong data-dcnode-id="770"><span data-dcnode-id="771"><span data-dcnode-id="772"><span data-dcnode-id="773" instrument_node="">Part 13&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp; PESTS - INSPECTION – REMOVAL OF INFESTED TREES</span></span></span></strong></h3><span data-dcnode-id="768" instrument_node="">
</span><h4 data-dcnode-id="763"><span data-dcnode-id="764"><span data-dcnode-id="765"><strong data-dcnode-id="766"><span data-dcnode-id="767" instrument_node="">Inspection for Presence of Asian Long-Horned Beetles and Other Serious Pests; Removal of Infested Trees</span></strong></span></span></h4><span data-dcnode-id="762" instrument_node="">
</span><p data-dcnode-id="758"><span data-dcnode-id="759"><span data-dcnode-id="760"><span data-dcnode-id="761" instrument_node="">13.1&nbsp;&nbsp;&nbsp; The City Engineer is authorized to inspect for the presence of Asian Long-Horned Beetles and other Pests that may create serious widespread economic or ecological harm, and to remove such infested trees, on all public and private property, with the consent of the property owner.</span></span></span></p><span data-dcnode-id="757" instrument_node="">
</span><h4 data-dcnode-id="752"><span data-dcnode-id="753"><span data-dcnode-id="754"><strong data-dcnode-id="755"><span data-dcnode-id="756" instrument_node="">Inspection for Pests; Right to Enter Private Property – Consent Not Required</span></strong></span></span></h4><span data-dcnode-id="751" instrument_node="">
</span><p data-dcnode-id="735"><span data-dcnode-id="736"><span data-dcnode-id="737"><span data-dcnode-id="738"><span data-dcnode-id="750" instrument_node="">13.2&nbsp;&nbsp;&nbsp; Where the City Engineer has been designated as an “inspector” by the President of the Canadian Food Inspection Agency under section 13 of the </span><a data-dcnode-id="747" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//laws.justice.gc.ca/eng/acts/C-16.5/FullText.html"><em data-dcnode-id="748"><span data-dcnode-id="749" instrument_node="">Canadian Food Inspection Agency Act</span></em></a><span data-dcnode-id="746" instrument_node="">, S.C. 1997, c.6 for the purposes of enforcing the </span><a data-dcnode-id="743" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//laws.justice.gc.ca/eng/acts/P-14.8/FullText.html"><em data-dcnode-id="744"><span data-dcnode-id="745" instrument_node="">Plant Protection Act</span></em></a><span data-dcnode-id="742" instrument_node="">, S.C. 1990, c.22, the City Engineer has the authority to inspect for the presence of Pests and to take action including the removal of trees on all public and private property, with or without the consent of the property owner, if it is in accordance with the </span><em data-dcnode-id="740"><span data-dcnode-id="741" instrument_node="">Plant Protection Act</span></em><span data-dcnode-id="739" instrument_node="">.</span></span></span></span></p><span data-dcnode-id="734" instrument_node="">
</span><h3 data-dcnode-id="730"><span data-dcnode-id="731"><span data-dcnode-id="732"><span data-dcnode-id="733" instrument_node="">Part 14&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp; OFFENCES AND PENALTIES</span></span></span></h3><span data-dcnode-id="729" instrument_node="">
</span><h4 data-dcnode-id="724"><span data-dcnode-id="725"><span data-dcnode-id="726"><strong data-dcnode-id="727"><span data-dcnode-id="728" instrument_node="">Offences</span></strong></span></span></h4><span data-dcnode-id="723" instrument_node="">
</span><p data-dcnode-id="719"><span data-dcnode-id="720"><span data-dcnode-id="721"><span data-dcnode-id="722" instrument_node="">14.1&nbsp;&nbsp;&nbsp; Any person who contravenes any provision of this By-law, or an Order to Discontinue Activity, or a Work Order, is guilty of an offence.</span></span></span></p><span data-dcnode-id="718" instrument_node="">
</span><p data-dcnode-id="714"><span data-dcnode-id="715"><span data-dcnode-id="716"><span data-dcnode-id="717" instrument_node="">14.2&nbsp;&nbsp;&nbsp; A director or officer of a corporation who knowingly concurs in the contravention of any provision of this By-law is guilty of an offence.</span></span></span></p><span data-dcnode-id="713" instrument_node="">
</span><h4 data-dcnode-id="708"><span data-dcnode-id="709"><span data-dcnode-id="710"><strong data-dcnode-id="711"><span data-dcnode-id="712" instrument_node="">Penalties – Minimum and Maximum</span></strong></span></span></h4><span data-dcnode-id="707" instrument_node="">
</span><p data-dcnode-id="703"><span data-dcnode-id="704"><span data-dcnode-id="705"><span data-dcnode-id="706" instrument_node="">14.3&nbsp;&nbsp;&nbsp; A person convicted under this By-law is liable to a minimum fine of $500.00 and a maximum fine of $100,000.00, where the fine is not a set fine. </span></span></span></p><span data-dcnode-id="702" instrument_node="">
</span><h4 data-dcnode-id="697"><span data-dcnode-id="698"><span data-dcnode-id="699"><strong data-dcnode-id="700"><span data-dcnode-id="701" instrument_node="">Penalties – Continuing Offence</span></strong></span></span></h4><span data-dcnode-id="696" instrument_node="">
</span><p data-dcnode-id="692"><span data-dcnode-id="693"><span data-dcnode-id="694"><span data-dcnode-id="695" instrument_node="">14.4&nbsp;&nbsp;&nbsp; Contravention of an Order to Discontinue Activity or a Work Order is a continuing offence, and a person who is convicted of an offence under this By-law is liable, for each day or part of a day that the offence continues, to a minimum fine of $500 and a maximum fine of $10,000 and the total of all daily fines for the offence is not limited to $100,000. </span></span></span></p><span data-dcnode-id="691" instrument_node="">
</span><h4 data-dcnode-id="686"><span data-dcnode-id="687"><span data-dcnode-id="688"><strong data-dcnode-id="689"><span data-dcnode-id="690" instrument_node="">Penalties – Special Fines</span></strong></span></span></h4><span data-dcnode-id="685" instrument_node="">
</span><p data-dcnode-id="681"><span data-dcnode-id="682"><span data-dcnode-id="683"><span data-dcnode-id="684" instrument_node="">14.5&nbsp;&nbsp;&nbsp; A person convicted under this By-law is liable to a special fine of maximum $200,000.00 which may be imposed in addition to the regular fine, to eliminate or reduce any economic advantage or gain from contravening the By-law.</span></span></span></p><span data-dcnode-id="680" instrument_node="">
</span><h4 data-dcnode-id="670"><span data-dcnode-id="671"><span data-dcnode-id="672"><strong data-dcnode-id="678"><span data-dcnode-id="679" instrument_node="">Court Order -</span></strong><span data-dcnode-id="677" instrument_node=""> </span><strong data-dcnode-id="673"><span data-dcnode-id="676" instrument_node="">Additional Order to Discontinue or Remedy – s. 431 </span><em data-dcnode-id="674"><span data-dcnode-id="675" instrument_node="">Municipal Act, 2001</span></em></strong></span></span></h4><span data-dcnode-id="669" instrument_node="">
</span><p data-dcnode-id="659"><span data-dcnode-id="660"><span data-dcnode-id="661"><span data-dcnode-id="668" instrument_node="">14.6&nbsp;&nbsp;&nbsp; Under section 431 of the </span><em data-dcnode-id="666"><span data-dcnode-id="667" instrument_node="">Municipal Act, 2001</span></em><span data-dcnode-id="665" instrument_node="">, when this By-law is contravened and a conviction entered, in addition to any other remedy and to any penalty imposed by the By-law, the court in which the conviction has been entered and any court of competent jurisdiction thereafter may make an order</span><s data-dcnode-id="663"><span data-dcnode-id="664" instrument_node="">,</span></s><span data-dcnode-id="662" instrument_node="">:</span></span></span></p><span data-dcnode-id="658" instrument_node="">
</span><p data-dcnode-id="654"><span data-dcnode-id="655"><span data-dcnode-id="656"><span data-dcnode-id="657" instrument_node="">(a)&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp; prohibiting the continuation or repetition of the offence by the person convicted; and </span></span></span></p><span data-dcnode-id="653" instrument_node="">
</span><p data-dcnode-id="643"><span data-dcnode-id="644"><span data-dcnode-id="645"><span data-dcnode-id="652" instrument_node="">(b)&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp; in the case of a by-law described in section 135 of </span><em data-dcnode-id="650"><span data-dcnode-id="651" instrument_node="">Municipal Act, 2001</span></em><span data-dcnode-id="649" instrument_node="">,</span><em data-dcnode-id="647"><span data-dcnode-id="648" instrument_node=""> </span></em><span data-dcnode-id="646" instrument_node="">requiring the person convicted to correct the contravention in the manner and within the period that the court considers appropriate.</span></span></span></p><span data-dcnode-id="642" instrument_node="">
</span><h4 data-dcnode-id="640"><span data-dcnode-id="641" instrument_node="">ADMINISTRATIVE MONETARY PENALTY SYSTEM</span></h4><span data-dcnode-id="639" instrument_node="">
</span><p data-dcnode-id="637"><span data-dcnode-id="638" instrument_node="">14.7&nbsp; &nbsp; Each person who contravenes any provision of the By-law shall, upon issuance of a penalty notice in accordance with the Administrative Monetary Penalty System By-law A-54, be liable to pay the City an Administrative Monetary Penalty.</span></p><span data-dcnode-id="636" instrument_node="">

</span><p data-dcnode-id="522"><span data-dcnode-id="523"><span data-dcnode-id="524"><span data-dcnode-id="525" instrument_node="">1.&nbsp; For the purposes of subsection 9.2(a) of this By-law with respect to a Distinctive Tree Permit, the City Engineer shall determine the number of living Replacement Trees that will be required based on the chart below.&nbsp; The diameter of the Tree to be Destroyed under a Distinctive Tree Permit, as set out in Column 1, shall correspond to the number of Replacement Trees required, as set out in Column 2.</span></span></span></p><span data-dcnode-id="521" instrument_node="">
</span><p data-dcnode-id="517"><span data-dcnode-id="518"><span data-dcnode-id="519"><span data-dcnode-id="520" instrument_node="">2.&nbsp; For the purposes of subsection 9.2(b) of this By-law with respect to a Distinctive Tree Permit, where there is insufficient space on the same Site to plant all of the number of Replacement Trees as calculated for 9.2(a) of this By-law, the Permit Holder shall plant as many Replacement Trees as the site will allow as determined by the City Engineer, and with respect to the number of Replacement Trees that could not be planted due to insufficient space, the City Engineer shall calculate the amount of the fee by multiplying the number of Replacement Trees that could&nbsp; not be planted on site due to insufficient space by $350 per tree.&nbsp; The diameter of the Tree to be Destroyed under a Distinctive Tree Permit, as set out in Column 1, shall correspond to the number of Replacement Trees, as set out in Column 2.</span></span></span></p><span data-dcnode-id="516" instrument_node="">
