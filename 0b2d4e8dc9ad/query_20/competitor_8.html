</span><div class="field__item" data-dcnode-id="2861"><h2 data-dcnode-id="2862"><span data-dcnode-id="2863" instrument_node="">OFFICE CONSOLIDATION (as of December 21, 2021)</span></h2></div><span data-dcnode-id="2860" instrument_node="">
</span></div><span data-dcnode-id="2858" instrument_node="">
</span><div class="clearfix text-formatted field field--name-body field--type-text-with-summary field--label-hidden field__item" data-dcnode-id="297"><h2 data-dcnode-id="2854"><span data-dcnode-id="2855"><span data-dcnode-id="2856"><span data-dcnode-id="2857" instrument_node="">A by-law to regulate the Injuring and Destruction of Trees and to encourage preservation and planting of Trees throughout the City of London.</span></span></span></h2><span data-dcnode-id="2853" instrument_node="">
</span><p data-dcnode-id="2847"><span data-dcnode-id="2848"><span data-dcnode-id="2849"><strong data-dcnode-id="2851"><span data-dcnode-id="2852" instrument_node="">WHEREAS</span></strong><span data-dcnode-id="2850" instrument_node=""> Municipal Council has determined that it is desirable to enact a By-law to generally prohibit the Injury and Destruction of Trees within the Urban Growth Boundary that have a diameter of at least 50 cm, and all trees located within Tree Protection Areas, and to allow for the Injury and Destruction of such Trees in limited circumstances with a Permit, and to encourage preservation and planting of Trees throughout the City of London;</span></span></span></p><span data-dcnode-id="2846" instrument_node="">
</span><p data-dcnode-id="2834"><span data-dcnode-id="2835"><span data-dcnode-id="2836"><strong data-dcnode-id="2844"><span data-dcnode-id="2845" instrument_node="">AND WHEREAS</span></strong><span data-dcnode-id="2843" instrument_node=""> subsection 5(3) of the </span><em data-dcnode-id="2841"><span data-dcnode-id="2842" instrument_node="">Municipal Act, 2001, </span></em><span data-dcnode-id="2840" instrument_node="">S.O. 2001, c.25, as amended (“</span><em data-dcnode-id="2838"><span data-dcnode-id="2839" instrument_node="">Municipal Act, 2001</span></em><span data-dcnode-id="2837" instrument_node="">”) provides that a municipal power shall be exercised by by-law;</span></span></span></p><span data-dcnode-id="2833" instrument_node="">
</span><p data-dcnode-id="2821"><span data-dcnode-id="2822"><span data-dcnode-id="2823"><strong data-dcnode-id="2831"><span data-dcnode-id="2832" instrument_node="">AND WHEREAS</span></strong><span data-dcnode-id="2830" instrument_node=""> section 9 of the </span><em data-dcnode-id="2828"><span data-dcnode-id="2829" instrument_node="">Municipal Act, 2001 </span></em><span data-dcnode-id="2827" instrument_node="">provides that a municipality has the capacity, rights, powers and privileges of a natural person for the purpose of exercising its authority under the </span><em data-dcnode-id="2825"><span data-dcnode-id="2826" instrument_node="">Municipal Act, 2001</span></em><span data-dcnode-id="2824" instrument_node=""> or any other Act;</span></span></span></p><span data-dcnode-id="2820" instrument_node="">
</span><p data-dcnode-id="2811"><span data-dcnode-id="2812"><span data-dcnode-id="2813"><strong data-dcnode-id="2818"><span data-dcnode-id="2819" instrument_node="">AND WHEREAS</span></strong><span data-dcnode-id="2817" instrument_node=""> subsection 10(1) of the </span><em data-dcnode-id="2815"><span data-dcnode-id="2816" instrument_node="">Municipal Act, 2001 </span></em><span data-dcnode-id="2814" instrument_node="">provides that a municipality may provide any service or thing that the municipality considers necessary or desirable for the public;</span></span></span></p><span data-dcnode-id="2810" instrument_node="">
</span><p data-dcnode-id="2801"><span data-dcnode-id="2802"><span data-dcnode-id="2803"><strong data-dcnode-id="2808"><span data-dcnode-id="2809" instrument_node="">AND WHEREAS</span></strong><span data-dcnode-id="2807" instrument_node=""> subsection 10(2) of the </span><em data-dcnode-id="2805"><span data-dcnode-id="2806" instrument_node="">Municipal Act, 2001</span></em><span data-dcnode-id="2804" instrument_node=""> provides that a municipality may pass by-laws respecting: in paragraph 5, Economic, social and environmental well-being of the municipality, including respecting climate change; in paragraph 6, Health, safety and well-being of persons; in paragraph 7, Services and things that the municipality is authorized to provide under subsection (1); in paragraph 8, Protection of persons and property; in paragraph 9, Animals;</span></span></span></p><span data-dcnode-id="2800" instrument_node="">
</span><p data-dcnode-id="2791"><span data-dcnode-id="2792"><span data-dcnode-id="2793"><strong data-dcnode-id="2798"><span data-dcnode-id="2799" instrument_node="">AND WHEREAS</span></strong><span data-dcnode-id="2797" instrument_node=""> pursuant to subsection 135(1) of the </span><em data-dcnode-id="2795"><span data-dcnode-id="2796" instrument_node="">Municipal Act, 2001</span></em><span data-dcnode-id="2794" instrument_node="">, without limiting sections 9 and 10, a municipality may prohibit or regulate the destruction or injuring of trees;</span></span></span></p><span data-dcnode-id="2790" instrument_node="">
</span><p data-dcnode-id="2781"><span data-dcnode-id="2782"><span data-dcnode-id="2783"><strong data-dcnode-id="2788"><span data-dcnode-id="2789" instrument_node="">AND WHEREAS</span></strong><span data-dcnode-id="2787" instrument_node=""> pursuant to subsection 135(7) of the </span><em data-dcnode-id="2785"><span data-dcnode-id="2786" instrument_node="">Municipal Act, 2001</span></em><span data-dcnode-id="2784" instrument_node="">, without limiting sections 9 and 10, a municipality may require that a permit be obtained to injure or destroy trees, and impose conditions to a permit, including conditions relating to the manner in which destruction occurs and the qualifications of persons authorized to injure or destroy trees;</span></span></span></p><span data-dcnode-id="2780" instrument_node="">
</span><p data-dcnode-id="2771"><span data-dcnode-id="2772"><span data-dcnode-id="2773"><strong data-dcnode-id="2778"><span data-dcnode-id="2779" instrument_node="">AND WHEREAS</span></strong><span data-dcnode-id="2777" instrument_node=""> subsections 151(1) to (4) of the </span><em data-dcnode-id="2775"><span data-dcnode-id="2776" instrument_node="">Municipal Act, 2001 </span></em><span data-dcnode-id="2774" instrument_node="">apply with necessary modifications to a system of licences with respect to any activity, matter or thing for which a by-law may be passed under sections 9 and 10 as if it were a system of licences with respect to a business;</span></span></span></p><span data-dcnode-id="2770" instrument_node="">
</span><p data-dcnode-id="2761"><span data-dcnode-id="2762"><span data-dcnode-id="2763"><strong data-dcnode-id="2768"><span data-dcnode-id="2769" instrument_node="">AND WHEREAS</span></strong><span data-dcnode-id="2767" instrument_node=""> subsection 1(1) of the </span><em data-dcnode-id="2765"><span data-dcnode-id="2766" instrument_node="">Municipal Act, 2001 </span></em><span data-dcnode-id="2764" instrument_node="">defines “licence” to include a permit;</span></span></span></p><span data-dcnode-id="2760" instrument_node="">
</span><p data-dcnode-id="2751"><span data-dcnode-id="2752"><span data-dcnode-id="2753"><strong data-dcnode-id="2758"><span data-dcnode-id="2759" instrument_node="">AND WHEREAS </span></strong><span data-dcnode-id="2757" instrument_node="">section 23.2 of the </span><em data-dcnode-id="2755"><span data-dcnode-id="2756" instrument_node="">Municipal Act, 2001</span></em><span data-dcnode-id="2754" instrument_node=""> permits a municipality to delegate certain legislative and quasi-judicial powers;</span></span></span></p><span data-dcnode-id="2750" instrument_node="">
</span><p data-dcnode-id="2741"><span data-dcnode-id="2742"><span data-dcnode-id="2743"><strong data-dcnode-id="2748"><span data-dcnode-id="2749" instrument_node="">AND WHEREAS</span></strong><span data-dcnode-id="2747" instrument_node=""> the Municipal Council for The Corporation of the City of London is of the opinion that the delegation of legislative powers under this By-law to the City Engineer and the Hearings Officer including without limitation the power to issue, revoke, suspend and impose conditions on the permit and prescribe operational standards such as the format and content of forms or documents, are powers of a minor nature having regard to the number of people, the size of geographic area and the time period affected by the exercise of the power in accordance with subsection 23.2(4) of the </span><em data-dcnode-id="2745"><span data-dcnode-id="2746" instrument_node="">Municipal Act, 2001</span></em><span data-dcnode-id="2744" instrument_node="">;</span></span></span></p><span data-dcnode-id="2740" instrument_node="">
</span><p data-dcnode-id="2731"><span data-dcnode-id="2732"><span data-dcnode-id="2733"><strong data-dcnode-id="2738"><span data-dcnode-id="2739" instrument_node="">AND WHEREAS</span></strong><span data-dcnode-id="2737" instrument_node=""> subsection 391(1) of the </span><em data-dcnode-id="2735"><span data-dcnode-id="2736" instrument_node="">Municipal Act, 2001 </span></em><span data-dcnode-id="2734" instrument_node="">provides that a municipality may impose fees and charges on persons;</span></span></span></p><span data-dcnode-id="2730" instrument_node="">
</span><p data-dcnode-id="2721"><span data-dcnode-id="2722"><span data-dcnode-id="2723"><strong data-dcnode-id="2728"><span data-dcnode-id="2729" instrument_node="">AND WHEREAS</span></strong><span data-dcnode-id="2727" instrument_node=""> sections 429, 431, 444 and 445 of the </span><em data-dcnode-id="2725"><span data-dcnode-id="2726" instrument_node="">Municipal Act, 2001 </span></em><span data-dcnode-id="2724" instrument_node="">provide for a system of fines and other enforcement orders;</span></span></span></p><span data-dcnode-id="2720" instrument_node="">
</span><p data-dcnode-id="2709"><span data-dcnode-id="2710"><span data-dcnode-id="2711"><span data-dcnode-id="2712"><strong data-dcnode-id="2716"><span data-dcnode-id="2717"><span data-dcnode-id="2718"><span data-dcnode-id="2719" instrument_node="">NOW THEREFORE</span></span></span></strong><span data-dcnode-id="2713"><span data-dcnode-id="2714"><span data-dcnode-id="2715" instrument_node=""> the Council of the Corporation of the City of London hereby enacts as follows:</span></span></span></span></span></span></p><span data-dcnode-id="2708" instrument_node="">
</span><h3 data-dcnode-id="2703"><strong data-dcnode-id="2704"><span data-dcnode-id="2705"><span data-dcnode-id="2706"><span data-dcnode-id="2707" instrument_node="">Part 1&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp; SHORT TITLE</span></span></span></strong></h3><span data-dcnode-id="2702" instrument_node="">
</span><p data-dcnode-id="2698"><span data-dcnode-id="2699"><span data-dcnode-id="2700"><span data-dcnode-id="2701" instrument_node="">1.1 &nbsp;&nbsp;&nbsp;&nbsp; This By-law may be cited as the "Tree Protection By-law".</span></span></span></p><span data-dcnode-id="2697" instrument_node="">
</span><h3 data-dcnode-id="2692"><strong data-dcnode-id="2693"><span data-dcnode-id="2694"><span data-dcnode-id="2695"><span data-dcnode-id="2696" instrument_node="">Part 2&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp; DEFINITIONS</span></span></span></strong></h3><span data-dcnode-id="2691" instrument_node="">
</span><p data-dcnode-id="2687"><span data-dcnode-id="2688"><span data-dcnode-id="2689"><span data-dcnode-id="2690" instrument_node="">2.1&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp; For the purpose of this By-law:</span></span></span></p><span data-dcnode-id="2686" instrument_node="">
</span><p data-dcnode-id="2679"><span data-dcnode-id="2680"><span data-dcnode-id="2681"><span data-dcnode-id="2685" instrument_node="">"</span><strong data-dcnode-id="2683"><span data-dcnode-id="2684" instrument_node="">Applicant</span></strong><span data-dcnode-id="2682" instrument_node="">" means the Landowner or the Landowner’s authorized representative who, pursuant to this By-law, applies for a Permit;</span></span></span></p><span data-dcnode-id="2678" instrument_node="">
</span><p data-dcnode-id="2670"><span data-dcnode-id="2671"><span data-dcnode-id="2672"><span data-dcnode-id="2673"><span data-dcnode-id="2677" instrument_node="">“</span><strong data-dcnode-id="2675"><span data-dcnode-id="2676" instrument_node="">Arborist</span></strong><span data-dcnode-id="2674" instrument_node="">” means an arborist qualified by the Ontario Ministry of Training, Colleges and Universities; a certified arborist with the International Society of Arboriculture; a consulting arborist registered with the American Society of Consulting Arborists; or a Registered Professional Forester;</span></span></span></span></p><span data-dcnode-id="2669" instrument_node="">
</span><p data-dcnode-id="2661"><span data-dcnode-id="2662"><span data-dcnode-id="2663"><span data-dcnode-id="2664"><span data-dcnode-id="2668" instrument_node="">“</span><strong data-dcnode-id="2666"><span data-dcnode-id="2667" instrument_node="">Arborist Opinion (Dead Distinctive Tree)</span></strong><span data-dcnode-id="2665" instrument_node="">” means a written opinion by an Arborist that contains the following:</span></span></span></span></p><span data-dcnode-id="2660" instrument_node="">
</span><p data-dcnode-id="2655"><span data-dcnode-id="2656"><span data-dcnode-id="2657"><span data-dcnode-id="2658"><span data-dcnode-id="2659" instrument_node="">(a)&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp; the Arborist’s opinion that the Tree is a Dead Distinctive Tree as that term is defined;</span></span></span></span></p><span data-dcnode-id="2654" instrument_node="">
</span><p data-dcnode-id="2649"><span data-dcnode-id="2650"><span data-dcnode-id="2651"><span data-dcnode-id="2652"><span data-dcnode-id="2653" instrument_node="">(b)&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp; correct identification of the location, species and size of the Dead Distinctive Tree;</span></span></span></span></p><span data-dcnode-id="2648" instrument_node="">
</span><p data-dcnode-id="2643"><span data-dcnode-id="2644"><span data-dcnode-id="2645"><span data-dcnode-id="2646"><span data-dcnode-id="2647" instrument_node="">(c)&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp; a photograph or video of the Tree; and</span></span></span></span></p><span data-dcnode-id="2642" instrument_node="">
</span><p data-dcnode-id="2637"><span data-dcnode-id="2638"><span data-dcnode-id="2639"><span data-dcnode-id="2640"><span data-dcnode-id="2641" instrument_node="">(d)&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp; the professional accreditation of the Arborist (e.g. International Society of Arboriculture (ISA) Certification Number);</span></span></span></span></p><span data-dcnode-id="2636" instrument_node="">
</span><p data-dcnode-id="2628"><span data-dcnode-id="2629"><span data-dcnode-id="2630"><span data-dcnode-id="2631"><span data-dcnode-id="2635" instrument_node="">“</span><strong data-dcnode-id="2633"><span data-dcnode-id="2634" instrument_node="">Arborist Report</span></strong><span data-dcnode-id="2632" instrument_node="">” means a written report by an Arborist that contains the following:&nbsp; </span></span></span></span></p><span data-dcnode-id="2627" instrument_node="">
</span><p data-dcnode-id="2622"><span data-dcnode-id="2623"><span data-dcnode-id="2624"><span data-dcnode-id="2625"><span data-dcnode-id="2626" instrument_node="">(a)&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp; correct identification of the location, species, size and condition of Trees; </span></span></span></span></p><span data-dcnode-id="2621" instrument_node="">
</span><p data-dcnode-id="2616"><span data-dcnode-id="2617"><span data-dcnode-id="2618"><span data-dcnode-id="2619"><span data-dcnode-id="2620" instrument_node="">(b)&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp; states the Arborist’s opinion why a Tree should be Injured or Destroyed , and whether it represents Good Arboricultural Practices or Good Forestry Practices;</span></span></span></span></p><span data-dcnode-id="2615" instrument_node="">
</span><p data-dcnode-id="2610"><span data-dcnode-id="2611"><span data-dcnode-id="2612"><span data-dcnode-id="2613"><span data-dcnode-id="2614" instrument_node="">(c)&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp; describes how the Tree is proposed to be Injured or Destroyed; </span></span></span></span></p><span data-dcnode-id="2609" instrument_node="">
</span><p data-dcnode-id="2602"><span data-dcnode-id="2603"><span data-dcnode-id="2604"><span data-dcnode-id="2607"><span data-dcnode-id="2608" instrument_node="">(d)&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp; an analysis and description of any reasonable alternatives to the Tree Injury or Destruction or an analysis and description as to why there are no reasonable alternatives to the Tree Injury or Destruction</span></span><span data-dcnode-id="2605" lang="EN-CA" xml:lang="EN-CA"><span data-dcnode-id="2606" instrument_node="">; </span></span></span></span></p><span data-dcnode-id="2601" instrument_node="">
</span><p data-dcnode-id="2592"><span data-dcnode-id="2593"><span data-dcnode-id="2594"><span data-dcnode-id="2599"><span data-dcnode-id="2600" instrument_node="">(e)&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp; calculation of </span></span><span data-dcnode-id="2597" lang="EN-CA" xml:lang="EN-CA"><span data-dcnode-id="2598" instrument_node="">the number of Replacement Trees</span></span><span data-dcnode-id="2595"><span data-dcnode-id="2596" instrument_node=""> based on Schedule A, and suggest the species and location, and if in a Tree Protection Area, the Trees that may be planted or established through appropriate natural regeneration, the number of Replacement Trees that can be planted on the Site;&nbsp; </span></span></span></span></p><span data-dcnode-id="2591" instrument_node="">
</span><p data-dcnode-id="2584"><span data-dcnode-id="2585"><span data-dcnode-id="2586"><span data-dcnode-id="2589"><span data-dcnode-id="2590" instrument_node="">(f)&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp; if Trees</span></span><span data-dcnode-id="2587" lang="EN-CA" xml:lang="EN-CA"><span data-dcnode-id="2588" instrument_node=""> are to be Injured but not Destroyed, description of maintenance strategies and protection measures to be implemented; </span></span></span></span></p><span data-dcnode-id="2583" instrument_node="">
</span><p data-dcnode-id="2578"><span data-dcnode-id="2579"><span data-dcnode-id="2580"><span data-dcnode-id="2581"><span data-dcnode-id="2582" instrument_node="">(g)&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp; if requested by the City Engineer, further information such as Tree or Trees on adjacent properties that may be affected, and an aerial map representation showing the Critical Root Zone of those Trees; and</span></span></span></span></p><span data-dcnode-id="2577" instrument_node="">
</span><p data-dcnode-id="2572"><span data-dcnode-id="2573"><span data-dcnode-id="2574"><span data-dcnode-id="2575"><span data-dcnode-id="2576" instrument_node="">(h)&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp; the professional accreditation of the Arborist (e.g. International Society of Arboriculture (ISA) Certification Number);</span></span></span></span></p><span data-dcnode-id="2571" instrument_node="">
</span><p data-dcnode-id="2561"><span data-dcnode-id="2562"><span data-dcnode-id="2563"><span data-dcnode-id="2570" instrument_node="">"</span><strong data-dcnode-id="2568"><span data-dcnode-id="2569" instrument_node="">Boundary Tree</span></strong><span data-dcnode-id="2567" instrument_node="">" means a tree having any part of its trunk located on the boundary between adjoining lands. For the purposes of this definition, ‘trunk’ means </span><span data-dcnode-id="2564"><span data-dcnode-id="2565"><span data-dcnode-id="2566" instrument_node="">that part of the tree from its point of growth away from its roots up to where it branches out to limbs and foliage;</span></span></span></span></span></p><span data-dcnode-id="2560" instrument_node="">
</span><p data-dcnode-id="2550"><span data-dcnode-id="2551"><span data-dcnode-id="2552"><span data-dcnode-id="2559" instrument_node="">“</span><strong data-dcnode-id="2557"><span data-dcnode-id="2558" instrument_node="">Building Permit</span></strong><span data-dcnode-id="2556" instrument_node="">” means a building permit issued under the </span><em data-dcnode-id="2554"><span data-dcnode-id="2555" instrument_node="">Building Code Act, 1992, </span></em><span data-dcnode-id="2553" instrument_node="">S.O. 1992, c. 23, or successor legislation;</span></span></span></p><span data-dcnode-id="2549" instrument_node="">
</span><p data-dcnode-id="2539"><span data-dcnode-id="2540"><span data-dcnode-id="2541"><span data-dcnode-id="2548" instrument_node="">"</span><strong data-dcnode-id="2546"><span data-dcnode-id="2547" instrument_node="">By-Law Enforcement Officer</span></strong><span data-dcnode-id="2545" instrument_node="">" means a person appointed pursuant to the </span><em data-dcnode-id="2543"><span data-dcnode-id="2544" instrument_node="">Police Services Act</span></em><span data-dcnode-id="2542" instrument_node="">, or any successor legislation, as a Municipal Law Enforcement Officer to enforce the provisions of this By-law;</span></span></span></p><span data-dcnode-id="2538" instrument_node="">
</span><p data-dcnode-id="2530"><span data-dcnode-id="2531"><span data-dcnode-id="2532"><span data-dcnode-id="2533"><span data-dcnode-id="2537" instrument_node="">"</span><strong data-dcnode-id="2535"><span data-dcnode-id="2536" instrument_node="">City</span></strong><span data-dcnode-id="2534" instrument_node="">" means The Corporation of the City of London; </span></span></span></span></p><span data-dcnode-id="2529" instrument_node="">
</span><p data-dcnode-id="2521"><span data-dcnode-id="2522"><span data-dcnode-id="2523"><span data-dcnode-id="2524"><span data-dcnode-id="2528" instrument_node="">“</span><strong data-dcnode-id="2526"><span data-dcnode-id="2527" instrument_node="">City Engineer</span></strong><span data-dcnode-id="2525" instrument_node="">” means the Deputy City Manager, Environment and Infrastructure or their written designate;</span></span></span></span></p><span data-dcnode-id="2520" instrument_node="">
</span><p data-dcnode-id="2510"><span data-dcnode-id="2511"><span data-dcnode-id="2512"><span data-dcnode-id="2519" instrument_node="">"</span><strong data-dcnode-id="2517"><span data-dcnode-id="2518" instrument_node="">Conservation Authority</span></strong><span data-dcnode-id="2516" instrument_node="">" has the same meaning as defined in the </span><em data-dcnode-id="2514"><span data-dcnode-id="2515" instrument_node="">Conservation Authorities Act, </span></em><span data-dcnode-id="2513" instrument_node="">R.S.O. 1990 c.C.27;</span></span></span></p><span data-dcnode-id="2509" instrument_node="">
</span><p data-dcnode-id="2498"><span data-dcnode-id="2499"><span data-dcnode-id="2500"><span data-dcnode-id="2508" instrument_node="">"</span><strong data-dcnode-id="2506"><span data-dcnode-id="2507" instrument_node="">Critical Root Zone</span></strong><span data-dcnode-id="2505" instrument_node="">" </span><span data-dcnode-id="2502"><span data-dcnode-id="2503"><span data-dcnode-id="2504" instrument_node="">means the area of land within a radius of ten (10) cm from the trunk of a tree for every one (1) cm of trunk diameter;</span></span></span><span data-dcnode-id="2501" instrument_node=""> </span></span></span></p><span data-dcnode-id="2497" instrument_node="">
</span><p data-dcnode-id="2490"><span data-dcnode-id="2491"><span data-dcnode-id="2492"><span data-dcnode-id="2496" instrument_node="">“</span><strong data-dcnode-id="2494"><span data-dcnode-id="2495" instrument_node="">Dead Distinctive Tree</span></strong><span data-dcnode-id="2493" instrument_node="">” means a Distinctive Tree that, as a result of natural causes, is dead or, as a result of natural causes, is in advanced and irreversible decline in health or condition;</span></span></span></p><span data-dcnode-id="2489" instrument_node="">
</span><p data-dcnode-id="2481"><span data-dcnode-id="2482"><span data-dcnode-id="2483"><span data-dcnode-id="2484"><span data-dcnode-id="2488" instrument_node="">“</span><strong data-dcnode-id="2486"><span data-dcnode-id="2487" instrument_node="">Dead Distinctive Tree Permit</span></strong><span data-dcnode-id="2485" instrument_node="">” means a permit issued by the City Engineer to permit the Injury or Destruction of a Dead Distinctive Tree;</span></span></span></span></p><span data-dcnode-id="2480" instrument_node="">
</span><p data-dcnode-id="2470"><span data-dcnode-id="2471"><span data-dcnode-id="2472"><span data-dcnode-id="2479" instrument_node="">"</span><strong data-dcnode-id="2477"><span data-dcnode-id="2478" instrument_node="">Declared Emergency</span></strong><span data-dcnode-id="2476" instrument_node="">" means a situation or impending situation that has been declared an emergency under the </span><em data-dcnode-id="2474"><span data-dcnode-id="2475" instrument_node="">Emergency Management and Civil Protection Act</span></em><span data-dcnode-id="2473" instrument_node=""> , R.S.O. 1990 c.E.9 or successor legislation;</span></span></span></p><span data-dcnode-id="2469" instrument_node="">
</span><p data-dcnode-id="2462"><span data-dcnode-id="2463"><span data-dcnode-id="2464"><span data-dcnode-id="2468" instrument_node="">"</span><strong data-dcnode-id="2466"><span data-dcnode-id="2467" instrument_node="">Designate</span></strong><span data-dcnode-id="2465" instrument_node="">" means any person acting with express authority conferred in writing by the City Engineer and may include but is not limited to City employees or Qualified Persons hired by the City;</span></span></span></p><span data-dcnode-id="2461" instrument_node="">
</span><p data-dcnode-id="2454"><span data-dcnode-id="2455"><span data-dcnode-id="2456"><span data-dcnode-id="2460" instrument_node="">"</span><strong data-dcnode-id="2458"><span data-dcnode-id="2459" instrument_node="">Destroy</span></strong><span data-dcnode-id="2457" instrument_node="">" means to cut down, remove, uproot, unearth, topple, burn, bury, shatter, poison, or in any way cause a Tree to die or be killed, or where the extent of Injury caused to a live Tree or disturbance of any part of its Critical Root Zone is such that it is likely to die or be killed, excepting where a Tree and/or its roots are killed by natural causes.&nbsp; The terms "Destroyed" and "Destruction" shall have a corresponding meaning;</span></span></span></p><span data-dcnode-id="2453" instrument_node="">
</span><p data-dcnode-id="2446"><span data-dcnode-id="2447"><span data-dcnode-id="2448"><span data-dcnode-id="2452" instrument_node="">"</span><strong data-dcnode-id="2450"><span data-dcnode-id="2451" instrument_node="">Distinctive Tree</span></strong><span data-dcnode-id="2449" instrument_node="">" means a Tree that has a Trunk Diameter of 50cm or greater, and that is located on a property within the Urban Growth Boundary, excluding a Tree Protection Area;</span></span></span></p><span data-dcnode-id="2445" instrument_node="">
</span><p data-dcnode-id="2438"><span data-dcnode-id="2439"><span data-dcnode-id="2440"><span data-dcnode-id="2444" instrument_node="">“</span><strong data-dcnode-id="2442"><span data-dcnode-id="2443" instrument_node="">Distinctive Tree Permi</span></strong><span data-dcnode-id="2441" instrument_node="">t” means a permit issued by the City Engineer to permit the Injury or Destruction of a Distinctive Tree or Trees;</span></span></span></p><span data-dcnode-id="2437" instrument_node="">
</span><p data-dcnode-id="2430"><span data-dcnode-id="2431"><span data-dcnode-id="2432"><span data-dcnode-id="2436" instrument_node="">"</span><strong data-dcnode-id="2434"><span data-dcnode-id="2435" instrument_node="">Emergency Services</span></strong><span data-dcnode-id="2433" instrument_node="">" means the fire, police, or ambulance services when responding to an emergency event; </span></span></span></p><span data-dcnode-id="2429" instrument_node="">
</span><p data-dcnode-id="2422"><span data-dcnode-id="2423"><span data-dcnode-id="2424"><span data-dcnode-id="2428" instrument_node="">“</span><strong data-dcnode-id="2426"><span data-dcnode-id="2427" instrument_node="">Good Arboricultural Practices</span></strong><span data-dcnode-id="2425" instrument_node="">” means the implementation of the most recent techniques or methods of Tree management as recommended by the International Society of Arboriculture or their successor;</span></span></span></p><span data-dcnode-id="2421" instrument_node="">
</span><p data-dcnode-id="2411"><span data-dcnode-id="2412"><span data-dcnode-id="2413"><span data-dcnode-id="2420" instrument_node="">“</span><strong data-dcnode-id="2418"><span data-dcnode-id="2419" instrument_node="">Good Forestry Practices</span></strong><span data-dcnode-id="2417" instrument_node="">” has the same meaning as defined in the </span><em data-dcnode-id="2415"><span data-dcnode-id="2416" instrument_node="">Forestry Act</span></em><span data-dcnode-id="2414" instrument_node=""> R.S.O. 1990 c. F.26; </span></span></span></p><span data-dcnode-id="2410" instrument_node="">
</span><p data-dcnode-id="2403"><span data-dcnode-id="2404"><span data-dcnode-id="2405"><span data-dcnode-id="2409" instrument_node="">“</span><strong data-dcnode-id="2407"><span data-dcnode-id="2408" instrument_node="">Hearings Officer</span></strong><span data-dcnode-id="2406" instrument_node="">” means a Hearings Officer appointed under the City’s Hearings Officer By-law A. 6653-121, as amended, or any successor by-law;</span></span></span></p><span data-dcnode-id="2402" instrument_node="">
</span><p data-dcnode-id="2395"><span data-dcnode-id="2396"><span data-dcnode-id="2397"><span data-dcnode-id="2401" instrument_node="">“</span><strong data-dcnode-id="2399"><span data-dcnode-id="2400" instrument_node="">Injure</span></strong><span data-dcnode-id="2398" instrument_node="">” means to harm, damage or impair the natural function or form of a Tree, including its roots within the Critical Root Zone, by any means excepting injury by natural causes, and includes but is not limited to carving, drilling, injection, exploding, shattering, improper Pruning that fails to meet Good Arboricultural Practices, removal of bark, deliberate introduction of decay fungi , inserting or driving foreign objects into or through the Tree or its roots, soil compaction, root excavation, suffocation, drowning, burying or poisoning. The terms “Injury”, “Injuring” and “Injured” shall have a corresponding meaning; </span></span></span></p><span data-dcnode-id="2394" instrument_node="">
</span><p data-dcnode-id="2386"><span data-dcnode-id="2387"><span data-dcnode-id="2388"><span data-dcnode-id="2389"><span data-dcnode-id="2393" instrument_node="">“</span><strong data-dcnode-id="2391"><span data-dcnode-id="2392" instrument_node="">Landowner</span></strong><span data-dcnode-id="2390" instrument_node="">” means a person having title in the land on which the Tree(s) are situated; </span></span></span></span></p><span data-dcnode-id="2385" instrument_node="">
</span><p data-dcnode-id="2378"><span data-dcnode-id="2379"><span data-dcnode-id="2380"><span data-dcnode-id="2384" instrument_node="">“</span><strong data-dcnode-id="2382"><span data-dcnode-id="2383" instrument_node="">Natural Ground Level</span></strong><span data-dcnode-id="2381" instrument_node="">” means the unaltered and original level of the soil around the base of a Tree that is supporting or did support the Tree during its early growth and establishment phase; where the ground level varies around the Tree, it shall be measured from the highest part of the soil;</span></span></span></p><span data-dcnode-id="2377" instrument_node="">
</span><p data-dcnode-id="2367"><span data-dcnode-id="2368"><span data-dcnode-id="2369"><span data-dcnode-id="2376" instrument_node="">“</span><strong data-dcnode-id="2374"><span data-dcnode-id="2375" instrument_node="">Normal Farm Practice</span></strong><span data-dcnode-id="2373" instrument_node="">” means a normal farm practice defined in the </span><em data-dcnode-id="2371"><span data-dcnode-id="2372" instrument_node="">Farming and Food Production Protection Act 1998, </span></em><span data-dcnode-id="2370" instrument_node="">S.O. 1998, c.1.</span></span></span></p><span data-dcnode-id="2366" instrument_node="">
</span><p data-dcnode-id="2359"><span data-dcnode-id="2360"><span data-dcnode-id="2361"><span data-dcnode-id="2365" instrument_node="">“</span><strong data-dcnode-id="2363"><span data-dcnode-id="2364" instrument_node="">Order</span></strong><span data-dcnode-id="2362" instrument_node="">” means an Order to Discontinue Activity or a Work Order, as the context requires; </span></span></span></p><span data-dcnode-id="2358" instrument_node="">
</span><p data-dcnode-id="2351"><span data-dcnode-id="2352"><span data-dcnode-id="2353"><span data-dcnode-id="2357" instrument_node="">“</span><strong data-dcnode-id="2355"><span data-dcnode-id="2356" instrument_node="">Permit</span></strong><span data-dcnode-id="2354" instrument_node="">” means a Tree Protection Area Permit or a Distinctive Tree Permit, or a Dead Distinctive Tree Permit, as the context requires; </span></span></span></p><span data-dcnode-id="2350" instrument_node="">
</span><p data-dcnode-id="2343"><span data-dcnode-id="2344"><span data-dcnode-id="2345"><span data-dcnode-id="2349" instrument_node="">“</span><strong data-dcnode-id="2347"><span data-dcnode-id="2348" instrument_node="">Permit Holder</span></strong><span data-dcnode-id="2346" instrument_node="">” means the Landowner to whom a Permit has been issued; </span></span></span></p><span data-dcnode-id="2342" instrument_node="">
</span><p data-dcnode-id="2335"><span data-dcnode-id="2336"><span data-dcnode-id="2337"><span data-dcnode-id="2341" instrument_node="">“</span><strong data-dcnode-id="2339"><span data-dcnode-id="2340" instrument_node="">Pest</span></strong><span data-dcnode-id="2338" instrument_node="">” means any thing that is injurious or potentially injurious, whether directly or indirectly, to a Tree, and includes any species that is invasive or new to Canada where the potential for harm is yet unknown or unpredictable;</span></span></span></p><span data-dcnode-id="2334" instrument_node="">
</span><p data-dcnode-id="2327"><span data-dcnode-id="2328"><span data-dcnode-id="2329"><span data-dcnode-id="2333" instrument_node="">“</span><strong data-dcnode-id="2331"><span data-dcnode-id="2332" instrument_node="">Pruning</span></strong><span data-dcnode-id="2330" instrument_node="">” means the removal of live or dead branches from a standing Tree. The terms “Prune” and “Pruned” shall have a corresponding meaning;</span></span></span></p><span data-dcnode-id="2326" instrument_node="">
</span><p data-dcnode-id="2319"><span data-dcnode-id="2320"><span data-dcnode-id="2321"><span data-dcnode-id="2325" instrument_node="">“</span><strong data-dcnode-id="2323"><span data-dcnode-id="2324" instrument_node="">Qualified Person</span></strong><span data-dcnode-id="2322" instrument_node="">” means a person who, in the opinion of the City Engineer, has satisfactory qualification, experience, education or knowledge to be an expert in the matter;</span></span></span></p><span data-dcnode-id="2318" instrument_node="">
</span><p data-dcnode-id="2302"><span data-dcnode-id="2303"><span data-dcnode-id="2304"><span data-dcnode-id="2317" instrument_node="">“</span><strong data-dcnode-id="2315"><span data-dcnode-id="2316" instrument_node="">Registered Professional Forester</span></strong><span data-dcnode-id="2314" instrument_node="">” means a person who is a registered and full member in good standing of the Ontario Professional Foresters Association and has the right to use the designation ‘Registered Professional Forester’ under the </span><em data-dcnode-id="2312"><span data-dcnode-id="2313" instrument_node="">Professional Foresters Act</span></em><span data-dcnode-id="2311" instrument_node="">, </span><em data-dcnode-id="2309"><span data-dcnode-id="2310" instrument_node="">2000,</span></em><span data-dcnode-id="2308" instrument_node=""> S.O. 2000, </span><em data-dcnode-id="2306"><span data-dcnode-id="2307" instrument_node="">C. 1</span></em><span data-dcnode-id="2305" instrument_node="">8 or successor legislation;</span></span></span></p><span data-dcnode-id="2301" instrument_node="">
</span><p data-dcnode-id="2294"><span data-dcnode-id="2295"><span data-dcnode-id="2296"><span data-dcnode-id="2300" instrument_node="">“</span><strong data-dcnode-id="2298"><span data-dcnode-id="2299" instrument_node="">Replacement Tree</span></strong><span data-dcnode-id="2297" instrument_node="">” means a tree of a size and type determined by the City Engineer that is required to be planted to replace a tree Destroyed pursuant to a Permit;</span></span></span></p><span data-dcnode-id="2293" instrument_node="">
</span><p data-dcnode-id="2286"><span data-dcnode-id="2287"><span data-dcnode-id="2288"><span data-dcnode-id="2292" instrument_node="">“</span><strong data-dcnode-id="2290"><span data-dcnode-id="2291" instrument_node="">Security</span></strong><span data-dcnode-id="2289" instrument_node="">” means an agreement between the City and an Applicant where the Applicant arranges an irrevocable letter of credit from a financial institution to specify and lodge a sum of money as determined by the City Engineer as a condition of a Permit; </span></span></span></p><span data-dcnode-id="2285" instrument_node="">
</span><p data-dcnode-id="2278"><span data-dcnode-id="2279"><span data-dcnode-id="2280"><span data-dcnode-id="2284" instrument_node="">“</span><strong data-dcnode-id="2282"><span data-dcnode-id="2283" instrument_node="">Silvicultural Prescription</span></strong><span data-dcnode-id="2281" instrument_node="">” means an operational plan prepared by a Registered Professional Forester or Qualified Person that describes the existing conditions and the sustainable management objectives for Trees on a Site, and that prescribes the practice of controlling Tree establishment and the composition, growth and quality of Trees to achieve the objectives of management, the methods for managing the Trees and a series of silvicultural treatments and Good Arboricultural Practices that will be carried out to perpetuate Tree cover and establish a free-growing state for Trees that accommodates other resource, environmental and social values as may be identified;</span></span></span></p><span data-dcnode-id="2277" instrument_node="">
</span><p data-dcnode-id="2270"><span data-dcnode-id="2271"><span data-dcnode-id="2272"><span data-dcnode-id="2276" instrument_node="">“</span><strong data-dcnode-id="2274"><span data-dcnode-id="2275" instrument_node="">Site</span></strong><span data-dcnode-id="2273" instrument_node="">” means the general area where activities subject to this By-law are planned or executed, and in the case of a tract of land that extends over multiple landholdings, each separate landholding is a separate “Site”;</span></span></span></p><span data-dcnode-id="2269" instrument_node="">
</span><p data-dcnode-id="2262"><span data-dcnode-id="2263"><span data-dcnode-id="2264"><span data-dcnode-id="2268" instrument_node="">“</span><strong data-dcnode-id="2266"><span data-dcnode-id="2267" instrument_node="">Swimming Pool Fence Permit</span></strong><span data-dcnode-id="2265" instrument_node="">” means a swimming pool fence permit issued under the City’s Swimming Pool Fence By-law PS-5, or successor legislation;</span></span></span></p><span data-dcnode-id="2261" instrument_node="">
</span><p data-dcnode-id="2254"><span data-dcnode-id="2255"><span data-dcnode-id="2256"><span data-dcnode-id="2260" instrument_node="">“</span><strong data-dcnode-id="2258"><span data-dcnode-id="2259" instrument_node="">Tree</span></strong><span data-dcnode-id="2257" instrument_node="">” means a woody perennial plant, whether alive or dead, healthy or unhealthy, including saplings or seedlings and including the root system, where the plant has reached, could reach, or could have reached&nbsp; a height of at least 4.5 metres (15 feet) at physiological maturity;</span></span></span></p><span data-dcnode-id="2253" instrument_node="">
</span><p data-dcnode-id="2246"><span data-dcnode-id="2247"><span data-dcnode-id="2248"><span data-dcnode-id="2252" instrument_node="">“</span><strong data-dcnode-id="2250"><span data-dcnode-id="2251" instrument_node="">Tree Management Plan</span></strong><span data-dcnode-id="2249" instrument_node="">” means a written plan that sets out the scope, rationale and management intentions for managing an inventory of a Tree or Trees for a year or more. Other names for a Tree Management Plan include ‘Landscape Management Plan’, ‘Tree Protection Plan’, ‘Tree Planting Plan’, ‘Woodland Management Plan’ and ‘Forest Management Plan’;</span></span></span></p><span data-dcnode-id="2245" instrument_node="">
</span><p data-dcnode-id="2238"><span data-dcnode-id="2239"><span data-dcnode-id="2240"><span data-dcnode-id="2244" instrument_node="">“</span><strong data-dcnode-id="2242"><span data-dcnode-id="2243" instrument_node="">Tree Protection Area</span></strong><span data-dcnode-id="2241" instrument_node="">” means any geographic area of the City that appears as a Tree Protection Area on Schedule B of this By-law; </span></span></span></p><span data-dcnode-id="2237" instrument_node="">
</span><p data-dcnode-id="2230"><span data-dcnode-id="2231"><span data-dcnode-id="2232"><span data-dcnode-id="2236" instrument_node="">“</span><strong data-dcnode-id="2234"><span data-dcnode-id="2235" instrument_node="">Tree Protection Area Permit</span></strong><span data-dcnode-id="2233" instrument_node="">” means a permit issued by the City Engineer to permit the Injury or Destruction of a Tree or Trees within a Tree Protection Area;</span></span></span></p><span data-dcnode-id="2229" instrument_node="">
</span><p data-dcnode-id="2220"><span data-dcnode-id="2221"><span data-dcnode-id="2222"><span data-dcnode-id="2223"><span data-dcnode-id="2224"><span data-dcnode-id="2228" instrument_node="">“</span><strong data-dcnode-id="2226"><span data-dcnode-id="2227" instrument_node="">Trunk Diameter</span></strong><span data-dcnode-id="2225" instrument_node="">” means the diameter of the trunk of a Tree measured 1.4m above the Natural Ground Level;</span></span></span></span></span></p><span data-dcnode-id="2219" instrument_node="">
</span><p data-dcnode-id="2212"><span data-dcnode-id="2213"><span data-dcnode-id="2214"><span data-dcnode-id="2218" instrument_node="">“</span><strong data-dcnode-id="2216"><span data-dcnode-id="2217" instrument_node="">Urban Growth Boundary</span></strong><span data-dcnode-id="2215" instrument_node="">” means the Urban Growth Boundary as defined in the City’s Official Plan.</span></span></span></p><span data-dcnode-id="2211" instrument_node="">
</span><p data-dcnode-id="2207"><span data-dcnode-id="2208"><span data-dcnode-id="2209"><span data-dcnode-id="2210" instrument_node="">2.2. &nbsp;&nbsp;&nbsp; In this by-law, words importing the singular number include the plural and vice versa, unless the context requires otherwise.</span></span></span></p><span data-dcnode-id="2206" instrument_node="">
</span><h3 data-dcnode-id="2201"><strong data-dcnode-id="2202"><span data-dcnode-id="2203"><span data-dcnode-id="2204"><span data-dcnode-id="2205" instrument_node="">Part 3&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp; SCOPE</span></span></span></strong></h3><span data-dcnode-id="2200" instrument_node="">
</span><p data-dcnode-id="2196"><span data-dcnode-id="2197"><span data-dcnode-id="2198"><span data-dcnode-id="2199" instrument_node="">3.1&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp; This By-law applies to private property in the City of London:</span></span></span></p><span data-dcnode-id="2195" instrument_node="">
</span><p data-dcnode-id="2191"><span data-dcnode-id="2192"><span data-dcnode-id="2193"><span data-dcnode-id="2194" instrument_node="">(a)&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp; to Trees having a trunk diameter of 50cm or greater measured 1.4m above Natural Ground Level, within the Urban Growth Boundary; and </span></span></span></p><span data-dcnode-id="2190" instrument_node="">
</span><p data-dcnode-id="2186"><span data-dcnode-id="2187"><span data-dcnode-id="2188"><span data-dcnode-id="2189" instrument_node="">(b)&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp; to Trees of any size within a Tree Protection Area.</span></span></span></p><span data-dcnode-id="2185" instrument_node="">

</span><h3 data-dcnode-id="2169"><strong data-dcnode-id="2170"><span data-dcnode-id="2171"><span data-dcnode-id="2172"><span data-dcnode-id="2173" instrument_node="">Part 5&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp; EXEMPTIONS FROM BY-LAW</span></span></span></strong></h3><span data-dcnode-id="2168" instrument_node="">
</span><h4 data-dcnode-id="2163"><span data-dcnode-id="2164"><span data-dcnode-id="2165"><strong data-dcnode-id="2166"><span data-dcnode-id="2167" instrument_node="">Exemptions from By-law</span></strong></span></span></h4><span data-dcnode-id="2162" instrument_node="">
</span><p data-dcnode-id="2155"><span data-dcnode-id="2156"><span data-dcnode-id="2157"><span data-dcnode-id="2158"><span data-dcnode-id="2159" lang="EN-CA" xml:lang="EN-CA"><span data-dcnode-id="2160"><span data-dcnode-id="2161" instrument_node="">5.1 &nbsp;&nbsp;&nbsp;&nbsp; This By-law does not apply to: </span></span></span></span></span></span></p><span data-dcnode-id="2154" instrument_node="">
</span><p data-dcnode-id="2147"><span data-dcnode-id="2148"><span data-dcnode-id="2149"><span data-dcnode-id="2150"><span data-dcnode-id="2151" lang="EN-CA" xml:lang="EN-CA"><span data-dcnode-id="2152"><span data-dcnode-id="2153" instrument_node="">(a)&nbsp; &nbsp; &nbsp;activities or matters undertaken by a municipality or a local board of a municipality;</span></span></span></span></span></span></p><span data-dcnode-id="2146" instrument_node="">
</span><p data-dcnode-id="2136"><span data-dcnode-id="2137"><span data-dcnode-id="2138"><span data-dcnode-id="2139"><span data-dcnode-id="2140" lang="EN-CA" xml:lang="EN-CA"><span data-dcnode-id="2141"><span data-dcnode-id="2145" instrument_node="">(b)&nbsp; &nbsp; &nbsp;activities or matters undertaken under a licence issued under the</span><em data-dcnode-id="2143"><span data-dcnode-id="2144" instrument_node=""> Crown Forest Sustainability Act, 1994</span></em><span data-dcnode-id="2142" instrument_node="">;</span></span></span></span></span></span></p><span data-dcnode-id="2135" instrument_node="">

</span><p data-dcnode-id="1718"><span data-dcnode-id="1719"><span data-dcnode-id="1720"><span data-dcnode-id="1721" instrument_node="">&nbsp; &nbsp; &nbsp; &nbsp; &nbsp; &nbsp; &nbsp; &nbsp; &nbsp; &nbsp; &nbsp; &nbsp; (b)&nbsp; &nbsp;&nbsp;&nbsp;&nbsp; if the Applicant is not the Landowner, written confirmation that the Applicant is making the application as the Landowner’s authorized agent;</span></span></span></p><span data-dcnode-id="1717" instrument_node="">
</span><p data-dcnode-id="1713"><span data-dcnode-id="1714"><span data-dcnode-id="1715"><span data-dcnode-id="1716" instrument_node="">&nbsp; &nbsp; &nbsp; &nbsp; &nbsp; &nbsp; &nbsp; &nbsp; &nbsp; &nbsp; &nbsp; &nbsp; (c)&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp; if the Applicant or the Landowner is a corporation, the address of its head office;</span></span></span></p><span data-dcnode-id="1712" instrument_node="">
</span><p data-dcnode-id="1708"><span data-dcnode-id="1709"><span data-dcnode-id="1710"><span data-dcnode-id="1711" instrument_node="">&nbsp; &nbsp; &nbsp; &nbsp; &nbsp; &nbsp; &nbsp; &nbsp; &nbsp; &nbsp; &nbsp; &nbsp; (d)&nbsp; &nbsp;&nbsp;&nbsp;&nbsp; the municipal address and legal description of the land, upon which the Tree or Trees are to be Injured or Destroyed;</span></span></span></p><span data-dcnode-id="1707" instrument_node="">
</span><p data-dcnode-id="1703"><span data-dcnode-id="1704"><span data-dcnode-id="1705"><span data-dcnode-id="1706" instrument_node="">&nbsp; &nbsp; &nbsp; &nbsp; &nbsp; &nbsp; &nbsp; &nbsp; &nbsp; &nbsp; &nbsp; &nbsp; (e)&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp; if known, the name, municipal address, email address, and phone number of any contractor anticipated to Injure or Destroy the Tree or Trees;</span></span></span></p><span data-dcnode-id="1702" instrument_node="">
</span><p data-dcnode-id="1698"><span data-dcnode-id="1699"><span data-dcnode-id="1700"><span data-dcnode-id="1701" instrument_node="">&nbsp; &nbsp; &nbsp; &nbsp; &nbsp; &nbsp; &nbsp; &nbsp; &nbsp; &nbsp; &nbsp; &nbsp; (f)&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp; for a Dead Distinctive Tree Permit, an Arborist Opinion;</span></span></span></p><span data-dcnode-id="1697" instrument_node="">
</span><p data-dcnode-id="1693"><span data-dcnode-id="1694"><span data-dcnode-id="1695"><span data-dcnode-id="1696" instrument_node="">&nbsp; &nbsp; &nbsp; &nbsp; &nbsp; &nbsp; &nbsp; &nbsp; &nbsp; &nbsp; &nbsp; &nbsp;(g)&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp; for a Distinctive Tree Permit or a Tree Protection Area Permit, an Arborist Report; </span></span></span></p><span data-dcnode-id="1692" instrument_node="">
</span><p data-dcnode-id="1688"><span data-dcnode-id="1689"><span data-dcnode-id="1690"><span data-dcnode-id="1691" instrument_node="">&nbsp; &nbsp; &nbsp; &nbsp; &nbsp; &nbsp; &nbsp; &nbsp; &nbsp; &nbsp; &nbsp; &nbsp;(h)&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp; for a Distinctive Tree Permit or a Tree Protection Area Permit, where any of the following grounds for the proposed Tree Injury or Destruction apply:</span></span></span></p><span data-dcnode-id="1687" instrument_node="">
</span><p data-dcnode-id="1683"><span data-dcnode-id="1684"><span data-dcnode-id="1685"><span data-dcnode-id="1686" instrument_node="">&nbsp; &nbsp; &nbsp; &nbsp; &nbsp; &nbsp; &nbsp; &nbsp; &nbsp; &nbsp; &nbsp; &nbsp; &nbsp; &nbsp; &nbsp; &nbsp; &nbsp; (i) &nbsp;&nbsp; an Arborist’s written opinion that the Tree is unsafe;</span></span></span></p><span data-dcnode-id="1682" instrument_node="">
</span><p data-dcnode-id="1678"><span data-dcnode-id="1679"><span data-dcnode-id="1680"><span data-dcnode-id="1681" instrument_node="">&nbsp; &nbsp; &nbsp; &nbsp; &nbsp; &nbsp; &nbsp; &nbsp; &nbsp; &nbsp; &nbsp; &nbsp; &nbsp; &nbsp; &nbsp; &nbsp; &nbsp;(ii)&nbsp;&nbsp; an Arborist’s, Professional Engineer’s or Insurance Loss Adjuster’s written opinion that the Tree is causing or is likely to cause structural damage to load-bearing structures or roof structures; </span></span></span></p><span data-dcnode-id="1677" instrument_node="">
</span><p data-dcnode-id="1670"><span data-dcnode-id="1671"><span data-dcnode-id="1672"><span data-dcnode-id="1676" instrument_node="">&nbsp; &nbsp; &nbsp; &nbsp; &nbsp; &nbsp; &nbsp; &nbsp; &nbsp; &nbsp; &nbsp; &nbsp; &nbsp; &nbsp; &nbsp; &nbsp; (iii)&nbsp; a “qualified person’s” (as defined in the </span><em data-dcnode-id="1674"><span data-dcnode-id="1675" instrument_node="">Environmental Protection Act</span></em><span data-dcnode-id="1673" instrument_node="">, R.S.O. 1990, c. E.19) written opinion that Tree removal is required to remediate contaminated soil;</span></span></span></p><span data-dcnode-id="1669" instrument_node="">
</span><p data-dcnode-id="1665"><span data-dcnode-id="1666"><span data-dcnode-id="1667"><span data-dcnode-id="1668" instrument_node="">&nbsp; &nbsp; &nbsp; &nbsp; &nbsp; &nbsp; &nbsp; &nbsp; &nbsp; &nbsp; &nbsp; &nbsp; &nbsp; &nbsp; &nbsp; &nbsp;(iv) a Qualified Person’s written opinion that the Tree Injury or Destruction is required to install, provide or maintain utilities, water or sanitary wastewater infrastructure required for the construction or use of a building or structure for which a Building Permit has been issued with no reasonable alternative to locating those utilities or infrastructure; </span></span></span></p><span data-dcnode-id="1664" instrument_node="">
</span><p data-dcnode-id="1659"><span data-dcnode-id="1660"><span data-dcnode-id="1661"><span data-dcnode-id="1662"><span data-dcnode-id="1663" instrument_node="">&nbsp; &nbsp; &nbsp; &nbsp; &nbsp; &nbsp; &nbsp; &nbsp; &nbsp; &nbsp; &nbsp; &nbsp; &nbsp; &nbsp; &nbsp; &nbsp;(v)&nbsp;&nbsp; an Arborist’s written opinion that the Distinctive Tree Injury or Destruction represents Good Arboricultural Practices, or a Registered Professional Forester’s written opinion that the Injury or Destruction of a Tree within a Tree Protection Area represents Good Forestry Practices;</span></span></span></span></p><span data-dcnode-id="1658" instrument_node="">
</span><p data-dcnode-id="1653"><span data-dcnode-id="1654"><span data-dcnode-id="1655"><span data-dcnode-id="1656"><span data-dcnode-id="1657" instrument_node="">&nbsp; &nbsp; &nbsp; &nbsp; &nbsp; &nbsp; &nbsp; &nbsp; &nbsp; &nbsp; &nbsp; &nbsp; &nbsp; &nbsp; &nbsp; (vi)&nbsp; a copy of the Building Permit if the Tree Injury or Destruction is required for purposes of a Building Permit;</span></span></span></span></p><span data-dcnode-id="1652" instrument_node="">
</span><p data-dcnode-id="1647"><span data-dcnode-id="1648"><span data-dcnode-id="1649"><span data-dcnode-id="1650"><span data-dcnode-id="1651" instrument_node="">&nbsp; &nbsp; &nbsp; &nbsp; &nbsp; &nbsp; &nbsp; &nbsp; &nbsp; &nbsp; &nbsp; &nbsp; &nbsp; &nbsp; &nbsp;(vii) a copy of the Swimming Pool Fence Permit, where one is required, or other evidence that is satisfactory to the City Engineer that a pool is to be installed, if the Tree Injury or Destruction is required for purposes of locating a swimming pool.</span></span></span></span></p><span data-dcnode-id="1646" instrument_node="">
</span><h4 data-dcnode-id="1639"><span data-dcnode-id="1640"><span data-dcnode-id="1641"><span data-dcnode-id="1642"><span data-dcnode-id="1643"><strong data-dcnode-id="1644"><span data-dcnode-id="1645" instrument_node="">Application – Additional Information May be Required</span></strong></span></span></span></span></h4><span data-dcnode-id="1638" instrument_node="">
</span><p data-dcnode-id="1632"><span data-dcnode-id="1633"><span data-dcnode-id="1634"><span data-dcnode-id="1635"><span data-dcnode-id="1636"><span data-dcnode-id="1637" instrument_node="">&nbsp; &nbsp; &nbsp; &nbsp; &nbsp; &nbsp; &nbsp;(3)&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp; In addition to the requirements in subsection (2), the City Engineer may require the Applicant to provide one or more of the following:</span></span></span></span></span></p><span data-dcnode-id="1631" instrument_node="">
</span><p data-dcnode-id="1627"><span data-dcnode-id="1628"><span data-dcnode-id="1629"><span data-dcnode-id="1630" instrument_node="">&nbsp; &nbsp; &nbsp; &nbsp; &nbsp; &nbsp; &nbsp; &nbsp; &nbsp; &nbsp; &nbsp; &nbsp; &nbsp;(a)&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp; for a Tree Protection Area Permit, an inventory, tally or estimates from sample plots of the species and size classes of all Trees to be Injured or Destroyed, including a map of the location of sample plots, to the satisfaction of the City Engineer;</span></span></span></p><span data-dcnode-id="1626" instrument_node="">
</span><p data-dcnode-id="1622"><span data-dcnode-id="1623"><span data-dcnode-id="1624"><span data-dcnode-id="1625" instrument_node="">&nbsp; &nbsp; &nbsp; &nbsp; &nbsp; &nbsp; &nbsp; &nbsp; &nbsp; &nbsp; &nbsp; &nbsp; &nbsp;(b) &nbsp;&nbsp;&nbsp;&nbsp;&nbsp; for a Tree Protection Area Permit, a Silvicultural Prescription that complies with Good Forestry Practices and is prepared by a Registered Professional Forester;</span></span></span></p><span data-dcnode-id="1621" instrument_node="">
</span><p data-dcnode-id="1617"><span data-dcnode-id="1618"><span data-dcnode-id="1619"><span data-dcnode-id="1620" instrument_node="">&nbsp; &nbsp; &nbsp; &nbsp; &nbsp; &nbsp; &nbsp; &nbsp; &nbsp; &nbsp; &nbsp; &nbsp; &nbsp;(c) &nbsp;&nbsp;&nbsp;&nbsp;&nbsp; a drawing of the Site showing any proposed development, construction, works, excavation or site alteration that may require the Tree Injury or Destruction, and a schedule for this proposed activity, including start and end dates;</span></span></span></p><span data-dcnode-id="1616" instrument_node="">
</span><p data-dcnode-id="1612"><span data-dcnode-id="1613"><span data-dcnode-id="1614"><span data-dcnode-id="1615" instrument_node="">&nbsp; &nbsp; &nbsp; &nbsp; &nbsp; &nbsp; &nbsp; &nbsp; &nbsp; &nbsp; &nbsp; &nbsp; &nbsp;(d) &nbsp;&nbsp;&nbsp;&nbsp;&nbsp; confirmation of any other matters (past or present Planning applications or otherwise) affecting the land upon which the Tree or Trees are to be Injured or Destroyed;</span></span></span></p><span data-dcnode-id="1611" instrument_node="">
</span><p data-dcnode-id="1607"><span data-dcnode-id="1608"><span data-dcnode-id="1609"><span data-dcnode-id="1610" instrument_node="">&nbsp; &nbsp; &nbsp; &nbsp; &nbsp; &nbsp; &nbsp; &nbsp; &nbsp; &nbsp; &nbsp; &nbsp; &nbsp;(e)&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp; a Tree Management Plan, which may be for one or more Trees, prepared by a Qualified Person;</span></span></span></p><span data-dcnode-id="1606" instrument_node="">
</span><p data-dcnode-id="1602"><span data-dcnode-id="1603"><span data-dcnode-id="1604"><span data-dcnode-id="1605" instrument_node="">&nbsp; &nbsp; &nbsp; &nbsp; &nbsp; &nbsp; &nbsp; &nbsp; &nbsp; &nbsp; &nbsp; &nbsp; &nbsp;(f)&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp; affidavits in support of an application.</span></span></span></p><span data-dcnode-id="1601" instrument_node="">
</span><h4 data-dcnode-id="1594"><span data-dcnode-id="1595"><span data-dcnode-id="1596"><span data-dcnode-id="1597"><span data-dcnode-id="1598"><strong data-dcnode-id="1599"><span data-dcnode-id="1600" instrument_node="">Application – Further Information – Supplied within 60 days</span></strong></span></span></span></span></h4><span data-dcnode-id="1593" instrument_node="">
</span><p data-dcnode-id="1588"><span data-dcnode-id="1589"><span data-dcnode-id="1590"><span data-dcnode-id="1591"><span data-dcnode-id="1592" instrument_node="">&nbsp; &nbsp; &nbsp; &nbsp; &nbsp; &nbsp; &nbsp; (4) &nbsp;&nbsp;&nbsp;&nbsp;&nbsp; The Applicant must provide any further information requested by the City Engineer under subsection (3) to the City Engineer within 60 days of such request.</span></span></span></span></p><span data-dcnode-id="1587" instrument_node="">
</span><h4 data-dcnode-id="1581"><span data-dcnode-id="1582"><span data-dcnode-id="1583"><span data-dcnode-id="1584"><strong data-dcnode-id="1585"><span data-dcnode-id="1586" instrument_node="">Application – Deemed Incomplete</span></strong></span></span></span></h4><span data-dcnode-id="1580" instrument_node="">
</span><p data-dcnode-id="1574"><span data-dcnode-id="1575"><span data-dcnode-id="1576"><span data-dcnode-id="1577"><span data-dcnode-id="1578"><span data-dcnode-id="1579" instrument_node="">7.3&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp; An application that does not contain everything required in subsection 7.2(2) within 60 days of the receipt of the application by the City, or does not contain the information as further required under subsection 7.2 (3) within 60 days of the request, shall be deemed to be incomplete and will not be processed.&nbsp; The City Engineer shall notify the Applicant that the file has been closed for incompleteness.</span></span></span></span></span></p><span data-dcnode-id="1573" instrument_node="">
</span><h4 data-dcnode-id="1567"><span data-dcnode-id="1568"><span data-dcnode-id="1569"><span data-dcnode-id="1570"><strong data-dcnode-id="1571"><span data-dcnode-id="1572" instrument_node="">Application – Permission for City to Inspect</span></strong></span></span></span></h4><span data-dcnode-id="1566" instrument_node="">
</span><p data-dcnode-id="1560"><span data-dcnode-id="1561"><span data-dcnode-id="1562"><span data-dcnode-id="1563"><span data-dcnode-id="1564"><span data-dcnode-id="1565" instrument_node="">7.4&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp; By submitting an application, the Landowner shall be deemed to have granted permission for the City to enter on the Landowner’s land for purposes of this By-law.</span></span></span></span></span></p><span data-dcnode-id="1559" instrument_node="">
</span><h4 data-dcnode-id="1554"><span data-dcnode-id="1555"><span data-dcnode-id="1556"><strong data-dcnode-id="1557"><span data-dcnode-id="1558" instrument_node="">Boundary Tree</span></strong></span></span></h4><span data-dcnode-id="1553" instrument_node="">
</span><p data-dcnode-id="1549"><span data-dcnode-id="1550"><span data-dcnode-id="1551"><span data-dcnode-id="1552" instrument_node="">7.5&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp; If the Tree to be Destroyed or Injured is a Boundary Tree, all owners of the Boundary Tree or their authorized agents would need to apply for a Permit, otherwise a Permit will not be issued. In the event that the City is an owner of a Boundary Tree (not on the City Boulevard) the written approval of the City Engineer would be required but such approval is entirely at the discretion of the City Engineer.</span></span></span></p><span data-dcnode-id="1548" instrument_node="">
</span><h4 data-dcnode-id="1543"><span data-dcnode-id="1544"><span data-dcnode-id="1545"><strong data-dcnode-id="1546"><span data-dcnode-id="1547" instrument_node="">Boundary Tree - City Boulevard Tree</span></strong></span></span></h4><span data-dcnode-id="1542" instrument_node="">
</span><p data-dcnode-id="1538"><span data-dcnode-id="1539"><span data-dcnode-id="1540"><span data-dcnode-id="1541" instrument_node="">7.6&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp; If one of the adjoining lands upon which the Boundary Tree is located is City-owned boulevard, then the City’s Boulevard Tree By-law will apply and this By-law will not apply.</span></span></span></p><span data-dcnode-id="1537" instrument_node="">
</span><h3 data-dcnode-id="1532"><strong data-dcnode-id="1533"><span data-dcnode-id="1534"><span data-dcnode-id="1535"><span data-dcnode-id="1536" instrument_node="">Part 8&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp; POWERS OF THE CITY ENGINEER</span></span></span></strong></h3><span data-dcnode-id="1531" instrument_node="">
</span><p data-dcnode-id="1527"><span data-dcnode-id="1528"><span data-dcnode-id="1529"><span data-dcnode-id="1530" instrument_node="">8.1&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp; The power and authority to issue a Permit, refuse to issue a Permit, to cancel, revoke or suspend a Permit, to impose terms and conditions on a Permit, including special conditions, are delegated to the City Engineer.</span></span></span></p><span data-dcnode-id="1526" instrument_node="">
</span><h4 data-dcnode-id="1521"><span data-dcnode-id="1522"><span data-dcnode-id="1523"><strong data-dcnode-id="1524"><span data-dcnode-id="1525" instrument_node="">City Engineer – When Permit Shall Issue</span></strong></span></span></h4><span data-dcnode-id="1520" instrument_node="">
</span><p data-dcnode-id="1516"><span data-dcnode-id="1517"><span data-dcnode-id="1518"><span data-dcnode-id="1519" instrument_node="">8.2&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp; The City Engineer shall issue a Permit where all of the following are satisfied:&nbsp; </span></span></span></p><span data-dcnode-id="1515" instrument_node="">
</span><p data-dcnode-id="1511"><span data-dcnode-id="1512"><span data-dcnode-id="1513"><span data-dcnode-id="1514" instrument_node="">&nbsp; &nbsp; &nbsp; &nbsp; &nbsp; &nbsp; &nbsp;(1)&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp; the application is complete; and </span></span></span></p><span data-dcnode-id="1510" instrument_node="">
</span><p data-dcnode-id="1506"><span data-dcnode-id="1507"><span data-dcnode-id="1508"><span data-dcnode-id="1509" instrument_node="">&nbsp; &nbsp; &nbsp; &nbsp; &nbsp; &nbsp; (2)&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp; the City Engineer is satisfied that there are no reasonable alternatives to the proposed Tree Injury or Destruction; and </span></span></span></p><span data-dcnode-id="1505" instrument_node="">
</span><p data-dcnode-id="1501"><span data-dcnode-id="1502"><span data-dcnode-id="1503"><span data-dcnode-id="1504" instrument_node="">&nbsp; &nbsp; &nbsp; &nbsp; &nbsp; &nbsp; (3)&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp; the City Engineer has determined, in their discretion, that there are no grounds for refusing to issue a Permit under section 8.3; and </span></span></span></p><span data-dcnode-id="1500" instrument_node="">
</span><p data-dcnode-id="1496"><span data-dcnode-id="1497"><span data-dcnode-id="1498"><span data-dcnode-id="1499" instrument_node="">&nbsp; &nbsp; &nbsp; &nbsp; &nbsp; &nbsp; (4)&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp; the City Engineer is satisfied that one or more of the following grounds for issuing a Permit apply:</span></span></span></p><span data-dcnode-id="1495" instrument_node="">
</span><p data-dcnode-id="1490"><span data-dcnode-id="1491"><span data-dcnode-id="1492"><span data-dcnode-id="1493"><span data-dcnode-id="1494" instrument_node="">&nbsp; &nbsp; &nbsp; &nbsp; &nbsp; &nbsp; &nbsp; &nbsp; &nbsp; &nbsp; &nbsp; &nbsp; &nbsp;(a)&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp; the Tree is a Dead Distinctive Tree;</span></span></span></span></p><span data-dcnode-id="1489" instrument_node="">
</span><p data-dcnode-id="1485"><span data-dcnode-id="1486"><span data-dcnode-id="1487"><span data-dcnode-id="1488" instrument_node="">&nbsp; &nbsp; &nbsp; &nbsp; &nbsp; &nbsp; &nbsp; &nbsp; &nbsp; &nbsp; &nbsp; &nbsp; &nbsp;(b) &nbsp;&nbsp;&nbsp;&nbsp;&nbsp; based on the opinion of an Arborist, it is necessary to remove unsafe Trees;</span></span></span></p><span data-dcnode-id="1484" instrument_node="">
</span><p data-dcnode-id="1480"><span data-dcnode-id="1481"><span data-dcnode-id="1482"><span data-dcnode-id="1483" instrument_node="">&nbsp; &nbsp; &nbsp; &nbsp; &nbsp; &nbsp; &nbsp; &nbsp; &nbsp; &nbsp; &nbsp; &nbsp; &nbsp;(c)&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp; based on the opinion of a Professional Engineer, the Tree or Trees are causing or are likely to cause structural damage to load-bearing structures or roof structures;</span></span></span></p><span data-dcnode-id="1479" instrument_node="">
</span><p data-dcnode-id="1472"><span data-dcnode-id="1473"><span data-dcnode-id="1474"><span data-dcnode-id="1478" instrument_node="">&nbsp; &nbsp; &nbsp; &nbsp; &nbsp; &nbsp; &nbsp; &nbsp; &nbsp; &nbsp; &nbsp; &nbsp; &nbsp;(d)&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp; based on the opinion of a 'qualified person’ (as defined in the </span><em data-dcnode-id="1476"><span data-dcnode-id="1477" instrument_node="">Environmental Protection Act</span></em><span data-dcnode-id="1475" instrument_node="">), the Tree Injury or Destruction is required to remediate contaminated soil;</span></span></span></p><span data-dcnode-id="1471" instrument_node="">
</span><p data-dcnode-id="1467"><span data-dcnode-id="1468"><span data-dcnode-id="1469"><span data-dcnode-id="1470" instrument_node="">&nbsp; &nbsp; &nbsp; &nbsp; &nbsp; &nbsp; &nbsp; &nbsp; &nbsp; &nbsp; &nbsp; &nbsp; &nbsp;(e)&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp; based on the opinion of a Qualified Person, the Tree Injury or Destruction is required to install, provide or maintain utilities, water or sanitary wastewater infrastructure required for the construction or use of a building or structure for which a Building Permit has been issued with no reasonable alternative to locating those utilities or infrastructure; </span></span></span></p><span data-dcnode-id="1466" instrument_node="">
</span><p data-dcnode-id="1462"><span data-dcnode-id="1463"><span data-dcnode-id="1464"><span data-dcnode-id="1465" instrument_node="">&nbsp; &nbsp; &nbsp; &nbsp; &nbsp; &nbsp; &nbsp; &nbsp; &nbsp; &nbsp; &nbsp; &nbsp; &nbsp;(f)&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp; the Tree Injury or Destruction is required for purposes of a Building Permit;</span></span></span></p><span data-dcnode-id="1461" instrument_node="">
</span><p data-dcnode-id="1456"><span data-dcnode-id="1457"><span data-dcnode-id="1458"><span data-dcnode-id="1459"><span data-dcnode-id="1460" instrument_node="">&nbsp; &nbsp; &nbsp; &nbsp; &nbsp; &nbsp; &nbsp; &nbsp; &nbsp; &nbsp; &nbsp; &nbsp; (g)&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp; the Tree Injury or Destruction is required for purposes of locating a swimming pool;</span></span></span></span></p><span data-dcnode-id="1455" instrument_node="">
</span><p data-dcnode-id="1450"><span data-dcnode-id="1451"><span data-dcnode-id="1452"><span data-dcnode-id="1453"><span data-dcnode-id="1454" instrument_node="">&nbsp; &nbsp; &nbsp; &nbsp; &nbsp; &nbsp; &nbsp; &nbsp; &nbsp; &nbsp; &nbsp; &nbsp; (h)&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp; based on the opinion of an Arborist, the Distinctive Tree Injury or Destruction represents Good Arboricultural Practices, or based on the opinion of a Registered Professional Forester, the Injury or Destruction of a Tree within a Tree Protection Area represents Good Forestry Practices.</span></span></span></span></p><span data-dcnode-id="1449" instrument_node="">
</span><p data-dcnode-id="1445"><span data-dcnode-id="1446"><span data-dcnode-id="1447"><span data-dcnode-id="1448" instrument_node="">&nbsp; &nbsp; &nbsp; &nbsp; &nbsp; (5)&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp; The City Engineer shall refuse to issue a Permit if (1), (2), (3) and (4) are not satisfied.</span></span></span></p><span data-dcnode-id="1444" instrument_node="">
</span><h4 data-dcnode-id="1439"><span data-dcnode-id="1440"><span data-dcnode-id="1441"><strong data-dcnode-id="1442"><span data-dcnode-id="1443" instrument_node="">City Engineer – May Refuse to Issue Permit, Revoke Permit, Suspend Permit, Impose Conditions on Permit</span></strong></span></span></h4><span data-dcnode-id="1438" instrument_node="">
</span><p data-dcnode-id="1434"><span data-dcnode-id="1435"><span data-dcnode-id="1436"><span data-dcnode-id="1437" instrument_node="">8.3&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp; The City Engineer at their discretion may refuse to issue, may revoke, or may suspend a Permit or impose a term or condition on a Permit on any one or more of the following grounds:</span></span></span></p><span data-dcnode-id="1433" instrument_node="">
