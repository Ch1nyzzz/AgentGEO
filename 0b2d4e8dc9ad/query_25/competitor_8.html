span data-dcnode-id="5738" instrument_node="">&lt;img class="aligncenter wp-image-4203 size-full" title="What you need to know about planting figs, fig tree care, &amp;amp; growing an indoor fig tree. The pretty tropical foliage &amp;amp; sweet harvest make them hard to beat." src="https://www.attainable-sustainable.net/wp-content/uploads/2017/01/Container-figs-with-spider-mite-damage-on-the-leaves.jpg" alt="close up of indoor fig tree leaves " width="700" height="465" srcset="https://www.attainable-sustainable.net/wp-content/uploads/2017/01/Container-figs-with-spider-mite-damage-on-the-leaves.jpg 700w, https://www.attainable-sustainable.net/wp-content/uploads/2017/01/Container-figs-with-spider-mite-damage-on-the-leaves-150x100.jpg 150w, https://www.attainable-sustainable.net/wp-content/uploads/2017/01/Container-figs-with-spider-mite-damage-on-the-leaves-350x233.jpg 350w, https://www.attainable-sustainable.net/wp-content/uploads/2017/01/Container-figs-with-spider-mite-damage-on-the-leaves-550x365.jpg 550w, https://www.attainable-sustainable.net/wp-content/uploads/2017/01/Container-figs-with-spider-mite-damage-on-the-leaves-380x252.jpg 380w, https://www.attainable-sustainable.net/wp-content/uploads/2017/01/Container-figs-with-spider-mite-damage-on-the-leaves-260x173.jpg 260w, https://www.attainable-sustainable.net/wp-content/uploads/2017/01/Container-figs-with-spider-mite-damage-on-the-leaves-280x187.jpg 280w" sizes="(max-width: 700px) 100vw, 700px" /&gt;</span></noscript><span data-dcnode-id="5736" instrument_node="">
</span><h3 data-dcnode-id="5734" id="pests"><span data-dcnode-id="5735" instrument_node="">Fig tree care: Pests and diseases</span></h3><span data-dcnode-id="5733" instrument_node="">
</span><p data-dcnode-id="5731"><span data-dcnode-id="5732" instrument_node="">Growing fig trees in containers in&nbsp; in North America results in a fairly trouble-free crop. Place netting over the trees to prevent birds from stealing your fruit. Spread wood ashes around the base of the stems to stop ants from climbing the trees. Container grown figs can be troubled with spider mites, white flies, or aphids when grown in a greenhouse or other protected environments. You can spray the tree with a strong stream of water to knock off pests.</span></p><span data-dcnode-id="5730" instrument_node="">
</span><p data-dcnode-id="5725"><span data-dcnode-id="5729" instrument_node="">Neem oil or another oil-soap spray are safe to use on figs. Don’t apply an oil spray if the temperatures will be above 85°F though. The leaves can be damaged by excessive heat after spraying. Here’s my recipe for </span><a data-dcnode-id="5727" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//joybileefarm.com/herbal-insecticidal-spray/" rel="noopener" target="_blank"><span data-dcnode-id="5728" instrument_node="">DIY insecticidal soap spray</span></a><span data-dcnode-id="5726" instrument_node=""> that is safe to use on figs.</span></p><span data-dcnode-id="5724" instrument_node="">
</span><img alt="fig tree in a pot" class="aligncenter size-full wp-image-18380" data-dcnode-id="5723" data-lazy-sizes="(max-width: 600px) 100vw, 600px" data-lazy-src="https://www.attainable-sustainable.net/wp-content/uploads/2017/01/FIG-TREE.jpg" data-lazy-srcset="https://www.attainable-sustainable.net/wp-content/uploads/2017/01/FIG-TREE.jpg 600w, https://www.attainable-sustainable.net/wp-content/uploads/2017/01/FIG-TREE-200x300.jpg 200w, https://www.attainable-sustainable.net/wp-content/uploads/2017/01/FIG-TREE-100x150.jpg 100w, https://www.attainable-sustainable.net/wp-content/uploads/2017/01/FIG-TREE-387x580.jpg 387w, https://www.attainable-sustainable.net/wp-content/uploads/2017/01/FIG-TREE-245x367.jpg 245w, https://www.attainable-sustainable.net/wp-content/uploads/2017/01/FIG-TREE-169x254.jpg 169w, https://www.attainable-sustainable.net/wp-content/uploads/2017/01/FIG-TREE-115x173.jpg 115w" data-pin-description="Tight on garden space?&nbsp;Fig trees grown in containers may be ideal for your limited space or limited opportunity situation. Here's what you need to know about fig tree care, from choosing varieties to growing conditions, harvesting, repotting, and dealing with pests on your fig tree. #garden #orchard #homestead" data-pin-title="How to Grow a Fig Tree" height="900" src="data:image/svg+xml,%3Csvg%20xmlns='http://www.w3.org/2000/svg'%20viewBox='0%200%20600%20900'%3E%3C/svg%3E" width="600"><noscript data-dcnode-id="5721"><span data-dcnode-id="5722" instrument_node="">&lt;img class="aligncenter size-full wp-image-18380" src="https://www.attainable-sustainable.net/wp-content/uploads/2017/01/FIG-TREE.jpg" alt="fig tree in a pot" width="600" height="900" srcset="https://www.attainable-sustainable.net/wp-content/uploads/2017/01/FIG-TREE.jpg 600w, https://www.attainable-sustainable.net/wp-content/uploads/2017/01/FIG-TREE-200x300.jpg 200w, https://www.attainable-sustainable.net/wp-content/uploads/2017/01/FIG-TREE-100x150.jpg 100w, https://www.attainable-sustainable.net/wp-content/uploads/2017/01/FIG-TREE-387x580.jpg 387w, https://www.attainable-sustainable.net/wp-content/uploads/2017/01/FIG-TREE-245x367.jpg 245w, https://www.attainable-sustainable.net/wp-content/uploads/2017/01/FIG-TREE-169x254.jpg 169w, https://www.attainable-sustainable.net/wp-content/uploads/2017/01/FIG-TREE-115x173.jpg 115w" sizes="(max-width: 600px) 100vw, 600px" /&gt;</span></noscript><span data-dcnode-id="5720" instrument_node="">
</span><h3 data-dcnode-id="5718" id="season"><span data-dcnode-id="5719" instrument_node="">Growing season for figs (in containers and out of doors)</span></h3><span data-dcnode-id="5717" instrument_node="">
</span><p data-dcnode-id="5715"><span data-dcnode-id="5716" instrument_node="">If your winters are cold, you’ll probably grow your fig tree indoors during the coldest months. You can move figs to a sunny location in the garden once all danger of hard frost has passed. (Growing fig trees in containers means you can easily move them, too.) Fig trees should have eight&nbsp;hours of sunlight a day during the growing season. Shading the pots from direct sunlight keeps&nbsp;the trees from drying out in severe heat. Apply mulch to the soil surface in the pot to retain moisture and prevent the plants from drying out, which can cause premature leaf drop.</span></p><span data-dcnode-id="5714" instrument_node="">
</span><p data-dcnode-id="5712"><span data-dcnode-id="5713" instrument_node="">Fig trees are not heavy feeders. Too much nitrogen can cause an excess of lush growth that is damaged by winter cold. They do need a single application of potassium and phosphorous-rich fertilizer&nbsp;at the beginning of the season. If you find your trees are slowing their growth rate, foliar feeding container figs with seaweed extract every two weeks during the growing season can help. Water potted fig trees well during the growing season, but allow the&nbsp;soil surface to dry out between watering. This prevents the roots from standing in water.</span></p><div class="atm-ad-slot" data-dcnode-id="5711" data-slot-type="injected-ad"></div><span data-dcnode-id="5710" instrument_node="">

ntent/uploads/2017/01/growingfigs-3.jpg" alt="green figs growing on a tree" width="870" height="580" srcset="https://www.attainable-sustainable.net/wp-content/uploads/2017/01/growingfigs-3.jpg 870w, https://www.attainable-sustainable.net/wp-content/uploads/2017/01/growingfigs-3-150x100.jpg 150w, https://www.attainable-sustainable.net/wp-content/uploads/2017/01/growingfigs-3-350x233.jpg 350w, https://www.attainable-sustainable.net/wp-content/uploads/2017/01/growingfigs-3-768x512.jpg 768w, https://www.attainable-sustainable.net/wp-content/uploads/2017/01/growingfigs-3-550x367.jpg 550w, https://www.attainable-sustainable.net/wp-content/uploads/2017/01/growingfigs-3-380x254.jpg 380w, https://www.attainable-sustainable.net/wp-content/uploads/2017/01/growingfigs-3-260x173.jpg 260w" sizes="(max-width: 870px) 100vw, 870px" /&gt;</span></noscript><span data-dcnode-id="5706" instrument_node="">
</span><h3 data-dcnode-id="5704" id="repot"><span data-dcnode-id="5705" instrument_node="">Repotting fig trees in a new container</span></h3><span data-dcnode-id="5703" instrument_node="">
</span><p data-dcnode-id="5701"><span data-dcnode-id="5702" instrument_node="">Repot container grown figs at the beginning of the season, just before the new leaves emerge. When planting figs in containers, choose lighter colored pots rather than black plastic pots if you live in an area with high summer heat. Conversely, if you live in a short season area, black pots can offer your container figs a little extra heat. Add broken pottery or rocks to the bottom of the pot before adding your planting medium.</span></p><span data-dcnode-id="5700" instrument_node="">
</span><p data-dcnode-id="5697"><strong data-dcnode-id="5698"><span data-dcnode-id="5699" instrument_node="">Fig plants don’t like to sit in water.</span></strong></p><span data-dcnode-id="5696" instrument_node="">
</span><p data-dcnode-id="5694"><span data-dcnode-id="5695" instrument_node="">Plant your container figs in a mixture of 60% sterile potting mix and 40% finished compost, with the addition of one cup of kelp meal for trace minerals. In the first 1 to 4 years, increase the pot size with each repotting to give the tree room to grow. By the time the tree is 4 years old you should have it in a 36″ pot. After this, replace the soil in the pot annually and prune the roots to keep the tree a manageable size.</span></p><span data-dcnode-id="5693" instrument_node="">
</span><h3 data-dcnode-id="5691" id="harvest"><span data-dcnode-id="5692" instrument_node="">When to harvest the figs</span></h3><span data-dcnode-id="5690" instrument_node="">
</span><p data-dcnode-id="5688"><span data-dcnode-id="5689" instrument_node="">Know the color of the ripe fruit of your particular varieties of figs. Since the color of the skin can vary from green to yellow through to purple and brown, this will help you harvest them when they are perfect. Ripe figs are&nbsp;soft to the touch. As they over-ripen the skin can split. Ants and wasps are&nbsp;attracted to the sweet scent of ripe figs, so you’ll want to harvest them quickly once they become ripe.</span></p><span data-dcnode-id="5687" instrument_node="">
</span><h3 data-dcnode-id="5685" id="preserve"><span data-dcnode-id="5686" instrument_node="">Preserving Figs</span></h3><span data-dcnode-id="5684" instrument_node="">
</span><p data-dcnode-id="5676"><span data-dcnode-id="5683" instrument_node="">Fresh figs are highly perishable. Keep them refrigerated and eat within a week of picking. (Or try these </span><a data-dcnode-id="5681" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.attainable-sustainable.net/honey-roasted-figs-with-goat-cheese-pistachios/"><span data-dcnode-id="5682" instrument_node="">easy roasted figs with goat cheese and honey</span></a><span data-dcnode-id="5680" instrument_node="">!) For longer preservation, figs can be dried, frozen, canned, or fermented. Or you could </span><a data-dcnode-id="5678" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//afarmgirlinthemaking.com/preserving-bourbon-figs/" rel="noopener" target="_blank"><span data-dcnode-id="5679" instrument_node="">make these bourbon figs</span></a><span data-dcnode-id="5677" instrument_node="">!</span></p><span data-dcnode-id="5675" instrument_node="">
</span><h3 data-dcnode-id="5673" id="unusual"><span data-dcnode-id="5674" instrument_node="">Where to find unusual figs for home propagation</span></h3><span data-dcnode-id="5672" instrument_node="">
</span><p data-dcnode-id="5670"><span data-dcnode-id="5671" instrument_node="">With over 1000 varieties of figs grown in North America you may want to explore a few more figgy flavors than your local nursery provides. Try these sources when you’re ready to try growing fig trees in containers or in your urban orchard:</span></p><div class="atm-ad-slot" data-dcnode-id="5669" data-slot-type="injected-ad"></div><span data-dcnode-id="5668" instrument_node="">

</span><p data-dcnode-id="4132"><span data-dcnode-id="4133" instrument_node="">My fig trees are doing great! I live in eastern Pa, and it can get pretty cold in the winter. I’ve planted mine right in the garden in a sunny spot. They grow to over 6 ft tall and produce tons of figs. My friend planted hers in a pot. While it’s still alive, it’s never gotten taller than a few feet. And never produced fruit. So don’t be afraid of the winter. Plant them in the ground, and just protect them over the winter. I wrap in burlap, then a simple tarp with a bucket on the top. (Like my old Italian neighbor used to do). Works like a charm.</span></p><span data-dcnode-id="4131" instrument_node="">

</span><p data-dcnode-id="3628"><span data-dcnode-id="3635" instrument_node="">Hi Kris,</span><br data-dcnode-id="3634"><span data-dcnode-id="3633" instrument_node="">
So happy to find this great article. Thank you! I have a fig question that I cannot seem to get answered, hopefully you have some insight. I live in California ( San Francisco zone 9) I have received cuttings from my aunts old tree that is in San Diego. I would like to root them, but it is October. We are in our Indian summer-(Sept-Oct) here with high temperatures, but it will cool down next month. We never get frost, but cool nights through winter.</span><br data-dcnode-id="3632"><span data-dcnode-id="3631" instrument_node="">
Should I start the cuttings to root now, or save them for the spring? I have started some other cuttings just 4 weeks ago and they are rooting well. ( in a greenhouse box) Just wondering if I should try the rooting, or force them into dormancy?</span><br data-dcnode-id="3630"><span data-dcnode-id="3629" instrument_node="">
Any advice is greatly appreciated. Thank you.</span></p><span data-dcnode-id="3627" instrument_node="">

</span><p data-dcnode-id="3600"><span data-dcnode-id="3601" instrument_node="">Hm. You have several cuttings? If it were me, I think I’d try to ways. One, keep the cuttings in a jar of water and allow them to root until springtime. You’ll need to add water every once in awhile. Two, try to root in a pot and keep the container inside. Good luck!</span></p><span data-dcnode-id="3599" instrument_node="">

</span><p data-dcnode-id="3565"><span data-dcnode-id="3566" instrument_node="">I have three Chicago hearty figs in containers that are 2’ square and 3’ deep. These trees have produced lots of figs for 12 years. This year all three trees figs are shriveling and falling off. I think they are probably completely root bound. Can I pull these out of the pots and trim the roots and replant with new potting soil or should I just start new trees in the containers. If I trim the roots should I also prune the top. Any instructions are appreciated. It looks like this will be the first year in twelve years with no figs of our own</span></p><span data-dcnode-id="3564" instrument_node="">

</span><p data-dcnode-id="3192"><span data-dcnode-id="3193" instrument_node="">i kept my chicago fig indoors and got tired of it and gave it to my sister in scarborough 5 years ago. it’s in the ground next to the brick wall of the home in a sunny spot. it dies to the ground each year and then shoots up pretty fast in the summer. the only problem is that frost hits before the figs ripen – 4 more weeks in the growing season and it would be perfect so maybe if you’re closer to the water you’ll be fine. for wintering all she does is trim it to the ground and mulch over.</span></p><span data-dcnode-id="3191" instrument_node="">

</span><p data-dcnode-id="2459"><span data-dcnode-id="2460" instrument_node="">I live in Ms. I rooted a cutting from a turkey fig in Feb. put it in a 6 inch pot in March. it came up as a 2 trunk tree. in aug, it was about 18″ tall, and I transplanted it to a 16 inch pot. It is now Oct, and the tree is about 3 feet tall and producing figs. one fig at the base of almost every leaf. Most are pea size, but two figs are about the size of a nickel. can I continue growing them in the pot over the winter, and plant it outside this spring? When I plant it outside will it continue producing fruit? or will it take a couple of years?</span></p><span data-dcnode-id="2458" instrument_node="">

</span><div class="widget widget_text" data-dcnode-id="1306" id="text-88"><span data-dcnode-id="1369" instrument_node=""> </span><div class="textwidget" data-dcnode-id="1308"><p data-dcnode-id="1365"><img alt="image of Kris Bordessa" class="aligncenter wp-image-22910 size-full" data-dcnode-id="1368" data-lazy-sizes="(max-width: 300px) 100vw, 300px" data-lazy-src="https://www.attainable-sustainable.net/wp-content/uploads/2021/07/xKrisB-21.jpg" data-lazy-srcset="https://www.attainable-sustainable.net/wp-content/uploads/2021/07/xKrisB-21.jpg 300w, https://www.attainable-sustainable.net/wp-content/uploads/2021/07/xKrisB-21-150x150.jpg 150w, https://www.attainable-sustainable.net/wp-content/uploads/2021/07/xKrisB-21-96x96.jpg 96w" height="300" src="data:image/svg+xml,%3Csvg%20xmlns='http://www.w3.org/2000/svg'%20viewBox='0%200%20300%20300'%3E%3C/svg%3E" width="300"><noscript data-dcnode-id="1366"><span data-dcnode-id="1367" instrument_node="">&lt;img class="aligncenter wp-image-22910 size-full" src="https://www.attainable-sustainable.net/wp-content/uploads/2021/07/xKrisB-21.jpg" alt="image of Kris Bordessa" width="300" height="300" srcset="https://www.attainable-sustainable.net/wp-content/uploads/2021/07/xKrisB-21.jpg 300w, https://www.attainable-sustainable.net/wp-content/uploads/2021/07/xKrisB-21-150x150.jpg 150w, https://www.attainable-sustainable.net/wp-content/uploads/2021/07/xKrisB-21-96x96.jpg 96w" sizes="(max-width: 300px) 100vw, 300px" /&gt;</span></noscript></p><span data-dcnode-id="1364" instrument_node="">
</span><p data-dcnode-id="1356"><span data-dcnode-id="1363" instrument_node="">Aloha! I’m Kris Bordessa, </span><strong data-dcnode-id="1361"><span data-dcnode-id="1362" instrument_node="">author</span></strong><span data-dcnode-id="1360" instrument_node=""> and </span><strong data-dcnode-id="1358"><span data-dcnode-id="1359" instrument_node="">certified Master Food Preserver</span></strong><span data-dcnode-id="1357" instrument_node="">, hobby farmer, gardener, chicken wrangler, and eternal experimenter.</span></p><span data-dcnode-id="1355" instrument_node="">
</span><p data-dcnode-id="1342"><span data-dcnode-id="1354" instrument_node="">I’m thrilled that my book, </span><a data-dcnode-id="1350" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.attainable-sustainable.net/book/"><em data-dcnode-id="1351"><strong data-dcnode-id="1352"><span data-dcnode-id="1353" instrument_node="">Attainable Sustainable: The Lost Art of Self-Reliant Living</span></strong></em></a><span data-dcnode-id="1349" instrument_node=""> (National Geographic Books) was awarded the </span><strong data-dcnode-id="1347"><span data-dcnode-id="1348" instrument_node="">best how-to book of 2020</span></strong><span data-dcnode-id="1346" instrument_node=""> by the </span><strong data-dcnode-id="1344"><span data-dcnode-id="1345" instrument_node="">American Society of Journalists and Authors</span></strong><span data-dcnode-id="1343" instrument_node="">.</span></p><span data-dcnode-id="1341" instrument_node="">
</span><p data-dcnode-id="1336"><a data-dcnode-id="1337" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.attainable-sustainable.net/book/"><img alt="cover of attainable sustainable book" class="size-full wp-image-17817 alignnone" data-dcnode-id="1340" data-lazy-sizes="(max-width: 450px) 100vw, 450px" data-lazy-src="https://www.attainable-sustainable.net/wp-content/uploads/2019/12/attainable-book-cover-1.jpg" data-lazy-srcset="https://www.attainable-sustainable.net/wp-content/uploads/2019/12/attainable-book-cover-1.jpg 450w, https://www.attainable-sustainable.net/wp-content/uploads/2019/12/attainable-book-cover-1-236x300.jpg 236w, https://www.attainable-sustainable.net/wp-content/uploads/2019/12/attainable-book-cover-1-118x150.jpg 118w, https://www.attainable-sustainable.net/wp-content/uploads/2019/12/attainable-book-cover-1-288x367.jpg 288w, https://www.attainable-sustainable.net/wp-content/uploads/2019/12/attainable-book-cover-1-199x254.jpg 199w, https://www.attainable-sustainable.net/wp-content/uploads/2019/12/attainable-book-cover-1-136x173.jpg 136w" height="573" src="data:image/svg+xml,%3Csvg%20xmlns='http://www.w3.org/2000/svg'%20viewBox='0%200%20450%20573'%3E%3C/svg%3E" width="450"><noscript data-dcnode-id="1338"><span data-dcnode-id="1339" instrument_node="">&lt;img class="size-full wp-image-17817 alignnone" src="https://www.attainable-sustainable.net/wp-content/uploads/2019/12/attainable-book-cover-1.jpg" alt="cover of attainable sustainable book" width="450" height="573" srcset="https://www.attainable-sustainable.net/wp-content/uploads/2019/12/attainable-book-cover-1.jpg 450w, https://www.attainable-sustainable.net/wp-content/uploads/2019/12/attainable-book-cover-1-236x300.jpg 236w, https://www.attainable-sustainable.net/wp-content/uploads/2019/12/attainable-book-cover-1-118x150.jpg 118w, https://www.attainable-sustainable.net/wp-content/uploads/2019/12/attainable-book-cover-1-288x367.jpg 288w, https://www.attainable-sustainable.net/wp-content/uploads/2019/12/attainable-book-cover-1-199x254.jpg 199w, https://www.attainable-sustainable.net/wp-content/uploads/2019/12/attainable-book-cover-1-136x173.jpg 136w" sizes="(max-width: 450px) 100vw, 450px" /&gt;</span></noscript></a></p><span data-dcnode-id="1335" instrument_node="">
</span><p data-dcnode-id="1333"><span data-dcnode-id="1334" instrument_node="">Here at Attainable Sustainable, I aim to encourage readers — that’s you! — to embrace a more self-reliant lifestyle, one small step at a time.</span></p><span data-dcnode-id="1332" instrument_node="">
</span><ul data-dcnode-id="1322"><span data-dcnode-id="1331" instrument_node="">
</span><li data-dcnode-id="1328"><a data-dcnode-id="1329" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//attainablesustainable.ck.page/982176313a"><span data-dcnode-id="1330" instrument_node="">Subscribe for email updates</span></a></li><span data-dcnode-id="1327" instrument_node="">

</span></ul><span data-dcnode-id="1321" instrument_node="">
