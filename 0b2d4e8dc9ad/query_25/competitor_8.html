</span><h3 data-dcnode-id="7350"><span data-dcnode-id="7351" instrument_node="">Tight on garden space?</span></h3><span data-dcnode-id="7349" instrument_node="">
</span><p data-dcnode-id="7347"><span data-dcnode-id="7348" instrument_node="">Maybe you live in an apartment with only a balcony for growing food. Maybe you have a rental place and you can’t dig up the back yard.Or just maybe you have a postage stamp yard with no room for a garden.</span></p><span data-dcnode-id="7346" instrument_node="">
</span><h2 data-dcnode-id="7344" id="container"><span data-dcnode-id="7345" instrument_node="">Growing fig trees in containers</span></h2><span data-dcnode-id="7343" instrument_node="">
</span><p data-dcnode-id="7341"><span data-dcnode-id="7342" instrument_node="">Figs are the perfect fruit to grow in containers. You can grow an indoor fig tree or&nbsp;grow a fig in a container outdoors. Figs make a beautiful patio plant. While European figs require pollination by a tiny wasp, the female figs we have in North America don’t require pollination to produce fruit. This makes them easy to grow anywhere with&nbsp;sufficient light and protection.</span></p><span data-dcnode-id="7340" instrument_node="">
</span><p data-dcnode-id="7336"><span data-dcnode-id="7339" instrument_node="">Figs planted in the ground focus their energy on developing roots. It can take 8 to 10 years for them to get around to fruit production. Growing fig trees in a container means the plant will occupy the root zone of their pots quickly and then spend their energy producing fruit. </span><strong data-dcnode-id="7337"><span data-dcnode-id="7338" instrument_node="">Container grown figs fruit precociously, usually within five&nbsp;years of planting.</span></strong></p><span data-dcnode-id="7335" instrument_node="">
</span><h3 data-dcnode-id="7333" id="care"><span data-dcnode-id="7334" instrument_node="">Fig tree care</span></h3><span data-dcnode-id="7332" instrument_node="">
</span><p data-dcnode-id="7330"><span data-dcnode-id="7331" instrument_node="">Even though figs are grown in the Mediterranean and the Middle East, they can withstand frost. Fig tree care in the winter means assessing your low temps. Figs lose their leaves and go dormant in winter.</span></p><div class="atm-ad-slot" data-dcnode-id="7329" data-slot-type="injected-ad"></div><div class="modular" data-dcnode-id="7309"><span data-dcnode-id="7328" instrument_node="">
</span><div class="deco_two" data-dcnode-id="7311"><span data-dcnode-id="7327" instrument_node="">
</span><div class="thrive_suks ml_signup" data-dcnode-id="7313"><span data-dcnode-id="7326" instrument_node="">
</span><h2 class="h-less" data-dcnode-id="7324"><span data-dcnode-id="7325" instrument_node="">Grow Some Greens!</span></h2><span data-dcnode-id="7323" instrument_node="">
</span><p data-dcnode-id="7319"><span data-dcnode-id="7322" instrument_node="">Ready to grow fresh greens, no matter WHERE you live? Sign up for my</span><br data-dcnode-id="7321"><span data-dcnode-id="7320" instrument_node="">
FREE quick-start guide and start growing some of your own food!</span></p><span data-dcnode-id="7318" instrument_node="">
</span><p data-dcnode-id="7315"><a class="button" data-dcnode-id="7316" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//attainablesustainable.ck.page/39dcec80f7"><span data-dcnode-id="7317" instrument_node="">Get the Guide!</span></a></p><span data-dcnode-id="7314" instrument_node="">
</span></div><span data-dcnode-id="7312" instrument_node="">
</span></div><span data-dcnode-id="7310" instrument_node="">
</span></div><span data-dcnode-id="7308" instrument_node="">
</span><p data-dcnode-id="7306"><span data-dcnode-id="7307" instrument_node="">Most fig trees can survive cold down to -4F ( -20C). Many varieties are hardy to zone 6 with winter protection. A few varieties can survive in even colder winters with protection. If it gets colder than that at your place, make it an indoor fig tree for the winter – growing fig trees in containers means you can easily move them inside where it’s protected.</span></p><span data-dcnode-id="7305" instrument_node="">
</span><p data-dcnode-id="7303"><span data-dcnode-id="7304" instrument_node="">Many figs produce two&nbsp;crops each year. The breba crop fruits on last year’s wood and is harvested in May or June. These are the fruit buds that emerge in the fall just before the leaves drop. The main fig crop fruits on new spring growth, and is harvested in August. New fruiting buds in this main fig crop emerge at the same time as the spring leaves, and look like hard knobs rather than fragrant flowers.</span></p><span data-dcnode-id="7302" instrument_node="">
</span><p data-dcnode-id="7300"><span data-dcnode-id="7301" instrument_node="">At the end of the season, when the tree drops its leaves, any unripe fruit that is bigger than the size of a pea should be removed from the plant. The pea size fruit will grow the following spring and form the breba crop.</span></p><span data-dcnode-id="7299" instrument_node="">

w, https://www.attainable-sustainable.net/wp-content/uploads/2017/01/Container-figs-444x580.jpg 444w, https://www.attainable-sustainable.net/wp-content/uploads/2017/01/Container-figs-281x367.jpg 281w, https://www.attainable-sustainable.net/wp-content/uploads/2017/01/Container-figs-195x254.jpg 195w, https://www.attainable-sustainable.net/wp-content/uploads/2017/01/Container-figs-132x173.jpg 132w, https://www.attainable-sustainable.net/wp-content/uploads/2017/01/Container-figs-143x187.jpg 143w" title="What you need to know about planting figs, fig tree care, &amp; growing an indoor fig tree. Growing fig trees in containers is easy, and they're beautiful, too!" width="700"><noscript data-dcnode-id="7296"><span data-dcnode-id="7297" instrument_node="">&lt;img class="aligncenter wp-image-4202 size-full" title="What you need to know about planting figs, fig tree care, &amp;amp; growing an indoor fig tree. Growing fig trees in containers is easy, and they're beautiful, too!" src="https://www.attainable-sustainable.net/wp-content/uploads/2017/01/Container-figs.jpg" alt="Growing fig tree in a container" width="700" height="914" srcset="https://www.attainable-sustainable.net/wp-content/uploads/2017/01/Container-figs.jpg 700w, https://www.attainable-sustainable.net/wp-content/uploads/2017/01/Container-figs-115x150.jpg 115w, https://www.attainable-sustainable.net/wp-content/uploads/2017/01/Container-figs-230x300.jpg 230w, https://www.attainable-sustainable.net/wp-content/uploads/2017/01/Container-figs-444x580.jpg 444w, https://www.attainable-sustainable.net/wp-content/uploads/2017/01/Container-figs-281x367.jpg 281w, https://www.attainable-sustainable.net/wp-content/uploads/2017/01/Container-figs-195x254.jpg 195w, https://www.attainable-sustainable.net/wp-content/uploads/2017/01/Container-figs-132x173.jpg 132w, https://www.attainable-sustainable.net/wp-content/uploads/2017/01/Container-figs-143x187.jpg 143w" sizes="(max-width: 700px) 100vw, 700px" /&gt;</span></noscript><span data-dcnode-id="7295" instrument_node="">
</span><h3 data-dcnode-id="7293" id="varieties"><span data-dcnode-id="7294" instrument_node="">Fig varieties</span></h3><span data-dcnode-id="7292" instrument_node="">
</span><p data-dcnode-id="7287"><span data-dcnode-id="7291" instrument_node="">There are over </span><a data-dcnode-id="7289" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//figs4fun.com/varieties.html" rel="noopener" target="_blank"><span data-dcnode-id="7290" instrument_node="">1000 varieties of figs in North America</span></a><span data-dcnode-id="7288" instrument_node="">, both for long season and short season areas. However, plant nurseries limit their selection to just a few varieties. If you want to grow some of the lesser known varieties you’ll need to find a&nbsp;hobby fig grower who might trade you some fig scion wood for propagation. See the end of this article for more sources if you’d like to try rooting some fig trees yourself.</span></p><span data-dcnode-id="7286" instrument_node="">
</span><p data-dcnode-id="7284"><span data-dcnode-id="7285" instrument_node="">If your neighbors have a productive fig tree, see if they will give you a few cuttings. A tree that is already thriving in your climate is a better choice than a tree growing in a nursery far away. But if you want adventure, try one of these hardy figs.</span></p><span data-dcnode-id="7283" instrument_node="">
</span><img alt="figs on a wooden table, one cut in half showing pinkish flesh" class="aligncenter wp-image-12855 size-full entered lazyloaded" data-dcnode-id="7282" data-lazy-sizes="(max-width: 870px) 100vw, 870px" data-lazy-src="https://www.attainable-sustainable.net/wp-content/uploads/2017/01/growingfigs.jpg" data-lazy-srcset="https://www.attainable-sustainable.net/wp-content/uploads/2017/01/growingfigs.jpg 870w, https://www.attainable-sustainable.net/wp-content/uploads/2017/01/growingfigs-150x100.jpg 150w, https://www.attainable-sustainable.net/wp-content/uploads/2017/01/growingfigs-350x233.jpg 350w, https://www.attainable-sustainable.net/wp-content/uploads/2017/01/growingfigs-768x512.jpg 768w, https://www.attainable-sustainable.net/wp-content/uploads/2017/01/growingfigs-550x367.jpg 550w, https://www.attainable-sustainable.net/wp-content/uploads/2017/01/growingfigs-380x254.jpg 380w, https://www.attainable-sustainable.net/wp-content/uploads/2017/01/growingfigs-260x173.jpg 260w" data-ll-status="loaded" data-pin-description="Tight on garden space?&nbsp;Fig trees grown in containers may be ideal for your limited space or limited opportunity situation. Here's what you need to know about fig tree care, from choosing varieties to growing conditions, harvesting, repotting, and dealing with pests on your fig tree. #garden #orchard #homestead" data-pin-title="How to Grow a Fig Tree" height="580" sizes="(max-width: 870px) 100vw, 870px" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.attainable-sustainable.net/wp-content/uploads/2017/01/growingfigs.jpg&amp;raw" srcset="https://www.attainable-sustainable.net/wp-content/uploads/2017/01/growingfigs.jpg 870w, https://www.attainable-sustainable.net/wp-content/uploads/2017/01/growingfigs-150x100.jpg 150w, https://www.attainable-sustainable.net/wp-content/uploads/2017/01/growingfigs-350x233.jpg 350w, https://www.attainable-sustainable.net/wp-content/uploads/2017/01/growingfigs-768x512.jpg 768w, https://www.attainable-sustainable.net/wp-content/uploads/2017/01/growingfigs-550x367.jpg 550w, https://www.attainable-sustainable.net/wp-content/uploads/2017/01/growingfigs-380x254.jpg 380w, https://www.attainable-sustainable.net/wp-content/uploads/2017/01/growingfigs-260x173.jpg 260w" title="What you need to know about planting figs, fig tree care, &amp; growing an indoor fig tree. Growing fig trees in containers is easy, and they're beautiful, too!" width="870"><noscript data-dcnode-id="7280"><span data-dcnode-id="7281" instrument_node="">&lt;img class="aligncenter wp-image-12855 size-full" title="What you need to know about planting figs, fig tree care, &amp;amp; growing an indoor fig tree. Growing fig trees in containers is easy, and they're beautiful, too!" src="https://www.attainable-sustainable.net/wp-content/uploads/2017/01/growingfigs.jpg" alt="figs on a wooden table, one cut in half showing pinkish flesh" width="870" height="580" srcset="https://www.attainable-sustainable.net/wp-content/uploads/2017/01/growingfigs.jpg 870w, https://www.attainable-sustainable.net/wp-content/uploads/2017/01/growingfigs-150x100.jpg 150w, https://www.attainable-sustainable.net/wp-content/uploads/2017/01/growingfigs-350x233.jpg 350w, https://www.attainable-sustainable.net/wp-content/uploads/2017/01/growingfigs-768x512.jpg 768w, https://www.attainable-sustainable.net/wp-content/uploads/2017/01/growingfigs-550x367.jpg 550w, https://www.attainable-sustainable.net/wp-content/uploads/2017/01/growingfigs-380x254.jpg 380w, https://www.attainable-sustainable.net/wp-content/uploads/2017/01/growingfigs-260x173.jpg 260w" sizes="(max-width: 870px) 100vw, 870px" /&gt;</span></noscript><span data-dcnode-id="7279" instrument_node="">
</span><p data-dcnode-id="7274" style="text-align: center;"><strong data-dcnode-id="7275"><span data-dcnode-id="7278" instrument_node="">Related:&nbsp;</span><a class="yoast-link-suggestion__value" data-dcnode-id="7276" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.attainable-sustainable.net/small-garden-ideas/" rel="noopener"><span data-dcnode-id="7277" instrument_node="">Small Garden Ideas: Get the Most Bang for your Buck!</span></a></strong></p><div class="atm-ad-slot" data-dcnode-id="7273" data-slot-type="injected-ad"></div><span data-dcnode-id="7272" instrument_node="">
</span><h3 data-dcnode-id="7270"><span data-dcnode-id="7271" instrument_node="">Fig&nbsp;varieties to try</span></h3><span data-dcnode-id="7269" instrument_node="">
</span><ul data-dcnode-id="7227"><span data-dcnode-id="7268" instrument_node="">
</span><li data-dcnode-id="7264"><strong data-dcnode-id="7266"><span data-dcnode-id="7267" instrument_node="">Hardy Chicago</span></strong><span data-dcnode-id="7265" instrument_node=""> has a brown-purple skin and strawberry colored flesh. It has good, sweet flavor. It’s hardy to zone 4, with winter protection. It is a heritage variety that was brought to Chicago by Sicilians from Mount Etna It’s&nbsp;been grown ever since in the Chicago area by dedicated fig fans. This is the fig tree I’m growing in zone 3.</span></li><span data-dcnode-id="7263" instrument_node="">
</span><li data-dcnode-id="7259"><strong data-dcnode-id="7261"><span data-dcnode-id="7262" instrument_node="">Black Spanish</span></strong><span data-dcnode-id="7260" instrument_node=""> has dark purple skin and strawberry red flesh and is widely available from plant nurseries. It is a good choice for warmer areas.</span></li><span data-dcnode-id="7258" instrument_node="">
</span><li data-dcnode-id="7254"><strong data-dcnode-id="7256"><span data-dcnode-id="7257" instrument_node="">Desert King</span></strong><span data-dcnode-id="7255" instrument_node=""> was developed in California in the 1920s. The large figs have green skin flecked with white spots and deep strawberry colored flesh. Desert King is a vigorous grower. The main crop ripens in the summer and it will produce a second smaller crop later in the fall.</span></li><span data-dcnode-id="7253" instrument_node="">
</span><li data-dcnode-id="7249"><strong data-dcnode-id="7251"><span data-dcnode-id="7252" instrument_node="">Italian Honey or Lattarulla Fig</span></strong><span data-dcnode-id="7250" instrument_node=""> is a large green fig with sweet, light amber flesh. It will produce a crop in midsummer and then a smaller crop in the fall.</span></li><span data-dcnode-id="7248" instrument_node="">
</span><li data-dcnode-id="7244"><strong data-dcnode-id="7246"><span data-dcnode-id="7247" instrument_node="">Negronne Figs</span></strong><span data-dcnode-id="7245" instrument_node=""> are named for the town in the Bordeaux region of France where this variety originated. The purple-black fruits have a red flesh with intense honey flavor. This variety is one of the very best. It’s hardy from zone 7 to 11.</span></li><span data-dcnode-id="7243" instrument_node="">
</span><li data-dcnode-id="7239"><strong data-dcnode-id="7241"><span data-dcnode-id="7242" instrument_node="">Peter’s Honey fig</span></strong><span data-dcnode-id="7240" instrument_node=""> is a lemon yellow fig with a deep amber flesh. It needs a little extra warmth, so grow it in a protected area and protect it from cold winds. This one is a double cropper that’s hardy in zones 7 to 11.</span></li><span data-dcnode-id="7238" instrument_node="">
</span><li data-dcnode-id="7234"><strong data-dcnode-id="7236"><span data-dcnode-id="7237" instrument_node="">Stella Fig</span></strong><span data-dcnode-id="7235" instrument_node=""> is a large, green yellow fig with deep red sweet flesh&nbsp;brought to North America by a sailor who named it after his wife. Stella is also a double cropper.</span></li><span data-dcnode-id="7233" instrument_node="">
</span><li data-dcnode-id="7229"><strong data-dcnode-id="7231"><span data-dcnode-id="7232" instrument_node="">Vern’s Brown Turkey</span></strong><span data-dcnode-id="7230" instrument_node=""> is an improved selection of the older (and mostly unreliable) brown turkey fig. It has brown skin and pale amber flesh and will reliably produce fruit in both summer and fall.</span></li><span data-dcnode-id="7228" instrument_node="">
</span></ul><span data-dcnode-id="7226" instrument_node="">
</span><h3 data-dcnode-id="7224" id="flavor"><span data-dcnode-id="7225" instrument_node="">Figs and flavor</span></h3><span data-dcnode-id="7223" instrument_node="">
</span><p data-dcnode-id="7221"><span data-dcnode-id="7222" instrument_node="">It’s no surprise that different varieties of figs also have different flavor profiles. Fig connoisseurs can be particular about the figs they grow, just like wine and coffee connoisseurs. Don’t judge the figs on an immature fig tree based on flavor in the first few years. As the tree matures, the fruit also matures, becoming richer and more flavorful.</span></p><span data-dcnode-id="7220" instrument_node="">

ntent/uploads/2017/01/growingfigs-2.jpg" alt="green figs growing on a tree" width="870" height="580" srcset="https://www.attainable-sustainable.net/wp-content/uploads/2017/01/growingfigs-2.jpg 870w, https://www.attainable-sustainable.net/wp-content/uploads/2017/01/growingfigs-2-150x100.jpg 150w, https://www.attainable-sustainable.net/wp-content/uploads/2017/01/growingfigs-2-350x233.jpg 350w, https://www.attainable-sustainable.net/wp-content/uploads/2017/01/growingfigs-2-768x512.jpg 768w, https://www.attainable-sustainable.net/wp-content/uploads/2017/01/growingfigs-2-550x367.jpg 550w, https://www.attainable-sustainable.net/wp-content/uploads/2017/01/growingfigs-2-380x254.jpg 380w, https://www.attainable-sustainable.net/wp-content/uploads/2017/01/growingfigs-2-260x173.jpg 260w" sizes="(max-width: 870px) 100vw, 870px" /&gt;</span></noscript><span data-dcnode-id="7216" instrument_node="">
</span><h3 data-dcnode-id="7214" id="planting"><span data-dcnode-id="7215" instrument_node="">Planting figs: How to propagate&nbsp;new fig trees</span></h3><span data-dcnode-id="7213" instrument_node="">
</span><p data-dcnode-id="7211"><span data-dcnode-id="7212" instrument_node="">Figs are self-rooted. In summer, the easiest way to make a new fig tree is to layer a stem of a thriving fig by bending a branch down to the ground, stripping the bark from a small section and burying the branch in the soil, while it is still attached to the mother plant. Anchor the branch in place using a u-pin or bent wire, then bury the branch with soil. The branch will sprout roots within 4 to 6 weeks.</span></p><span data-dcnode-id="7210" instrument_node="">
</span><p data-dcnode-id="7208"><span data-dcnode-id="7209" instrument_node="">Once the roots are two&nbsp;inches long, separate the new plant from the mother plant with a sharp knife, and re-pot in its own container. Young figs are more susceptible to cold than established plants so give it a little TLC through its first two seasons.</span></p><span data-dcnode-id="7207" instrument_node="">
</span><blockquote class="wp-embedded-content" data-dcnode-id="7203" data-secret="WN5yIuvp8G"><p data-dcnode-id="7204"><a data-dcnode-id="7205" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.attainable-sustainable.net/edible-landscaping/"><span data-dcnode-id="7206" instrument_node="">Urban Fruit Trees: Creating an Edible Landscape for a Small Scale Harvest</span></a></p></blockquote><span data-dcnode-id="7202" instrument_node="">

</span><h1 class="headline" data-dcnode-id="6963"><span data-dcnode-id="6964" instrument_node="">Urban Fruit Trees: Creating an Edible Landscape for a Small Scale Harvest</span></h1><span data-dcnode-id="6962" instrument_node="">
</span><div class="byline" data-dcnode-id="6927"><span data-dcnode-id="6961" instrument_node="">
</span><span class="post_author_intro" data-dcnode-id="6959"><span data-dcnode-id="6960" instrument_node="">Author:</span></span><span data-dcnode-id="6958" instrument_node=""> </span><span class="post_author" data-dcnode-id="6956"><span data-dcnode-id="6957" instrument_node="">Kris Bordessa</span></span><span data-dcnode-id="6955" instrument_node="">
</span><span class="post_date_intro" data-dcnode-id="6953"><span data-dcnode-id="6954" instrument_node="">Published:</span></span><span data-dcnode-id="6952" instrument_node=""> </span><span class="post_date" data-dcnode-id="6950" title="2022-01-01"><span data-dcnode-id="6951" instrument_node="">January 1, 2022</span></span><span data-dcnode-id="6949" instrument_node="">
</span><span class="post_date_intro" data-dcnode-id="6947"><span data-dcnode-id="6948" instrument_node="">Updated:</span></span><span data-dcnode-id="6946" instrument_node=""> </span><span class="post_date date_modified" data-dcnode-id="6944" title="2022-01-06"><span data-dcnode-id="6945" instrument_node="">January 6, 2022</span></span><span data-dcnode-id="6943" instrument_node="">
</span><a class="num_comments_link" data-dcnode-id="6939" href="https://www.attainable-sustainable.net/edible-landscaping/#comments" rel="nofollow"><span class="num_comments" data-dcnode-id="6941"><span data-dcnode-id="6942" instrument_node="">16</span></span><span data-dcnode-id="6940" instrument_node=""> comments</span></a><span data-dcnode-id="6938" instrument_node="">
</span><div class="text_box" data-dcnode-id="6929"><span data-dcnode-id="6937" instrument_node="">
</span><p data-dcnode-id="6931"><em data-dcnode-id="6932"><span data-dcnode-id="6936" instrument_node="">May contain affiliate links. Please see my </span><a data-dcnode-id="6934" href="https://www.attainable-sustainable.net/disclosure-2/"><span data-dcnode-id="6935" instrument_node="">affiliate disclosure and privacy policy</span></a><span data-dcnode-id="6933" instrument_node="">.</span></em></p><span data-dcnode-id="6930" instrument_node="">

</span><div class="post_content" data-dcnode-id="6566"><span data-dcnode-id="6923" instrument_node="">
</span><div class="dpsp-post-pinterest-image-hidden" data-dcnode-id="6921" style="display: none;"><img alt="tree with white blossoms behind a fence" class="dpsp-post-pinterest-image-hidden-inner" data-dcnode-id="6922" data-pin-description="Urban fruit! An edible landscape is great for city gardeners and fruiting trees are a perfect addition to an edible landscape. They're beautiful, functional as they provide shade, and they can produce fruit within 3-5 years. Planting a fruit tree now will provide an abundant harvest for years to come. #orchard #garden #homestead" data-pin-media="https://www.attainable-sustainable.net/wp-content/uploads/2017/02/fruit-trees.jpg" data-pin-title="Urban Fruit Trees for a Small Scale Harvest" loading="lazy" src="https://www.attainable-sustainable.net/wp-content/uploads/2017/02/fruit-trees-88x150.jpg"/></div><span data-dcnode-id="6920" data-image-pin-it="false" id="dpsp-post-content-markup"></span><p data-dcnode-id="6917"><strong data-dcnode-id="6918"><span data-dcnode-id="6919" instrument_node="">Consider planting urban fruit trees in pots or as part of your front yard landscape for an edible garden. Landscaping with fruit trees allows you to harvest food from even a small space garden. </span></strong></p><span data-dcnode-id="6916" instrument_node="">
</span><p data-dcnode-id="6911"><span data-dcnode-id="6915" instrument_node="">If you’re trying to get the most out of your grow space, consider these </span><a data-dcnode-id="6913" href="https://www.attainable-sustainable.net/pretty-edibles/"><span data-dcnode-id="6914" instrument_node="">vegetable crops that are pretty enough for the front yard</span></a><span data-dcnode-id="6912" instrument_node="">! </span></p><span data-dcnode-id="6910" instrument_node="">
</span><img alt="Urban fruit! An edible landscape is great for city gardeners. Consider growing fruit trees in pots or as part of your front yard landscape. " class="aligncenter wp-image-4215 size-full" data-dcnode-id="6909" data-pin-description="Urban fruit! An edible landscape is great for city gardeners and fruiting trees are a perfect addition to an edible landscape. They're beautiful, functional as they provide shade, and they can produce fruit within 3-5 years. Planting a fruit tree now will provide an abundant harvest for years to come. #orchard #garden #homestead" data-pin-title="Urban Fruit Trees for a Small Scale Harvest" height="600" sizes="(max-width: 800px) 100vw, 800px" src="https://www.attainable-sustainable.net/wp-content/uploads/2017/02/fruit-tree-blossoms-urban-garden.jpg" srcset="https://www.attainable-sustainable.net/wp-content/uploads/2017/02/fruit-tree-blossoms-urban-garden.jpg 800w, https://www.attainable-sustainable.net/wp-content/uploads/2017/02/fruit-tree-blossoms-urban-garden-150x113.jpg 150w, https://www.attainable-sustainable.net/wp-content/uploads/2017/02/fruit-tree-blossoms-urban-garden-350x263.jpg 350w, https://www.attainable-sustainable.net/wp-content/uploads/2017/02/fruit-tree-blossoms-urban-garden-768x576.jpg 768w, https://www.attainable-sustainable.net/wp-content/uploads/2017/02/fruit-tree-blossoms-urban-garden-773x580.jpg 773w, https://www.attainable-sustainable.net/wp-content/uploads/2017/02/fruit-tree-blossoms-urban-garden-489x367.jpg 489w, https://www.attainable-sustainable.net/wp-content/uploads/2017/02/fruit-tree-blossoms-urban-garden-339x254.jpg 339w, https://www.attainable-sustainable.net/wp-content/uploads/2017/02/fruit-tree-blossoms-urban-garden-231x173.jpg 231w, https://www.attainable-sustainable.net/wp-content/uploads/2017/02/fruit-tree-blossoms-urban-garden-500x375.jpg 500w, https://www.attainable-sustainable.net/wp-content/uploads/2017/02/fruit-tree-blossoms-urban-garden-249x187.jpg 249w" title="Planting a fruit tree now will provide an abundant harvest for years to come. This list of fruit trees features options that grow well in small urban yards." width="800"/><span data-dcnode-id="6908" instrument_node="">
</span><p data-dcnode-id="6904"><span data-dcnode-id="6907" instrument_node="">An edible landscape is essentially an aesthetically pleasing design that incorporates productive crops. Growing fruit trees as dual-purpose landscape plants is a great way to make the most of the space you have. </span><strong data-dcnode-id="6905"><span data-dcnode-id="6906" instrument_node="">Pretty blossoms in the springtime, fruit in the summertime, and a tree to create shade or structure within your garden!</span></strong></p><span data-dcnode-id="6903" instrument_node="">
</span><h3 data-dcnode-id="6901"><span data-dcnode-id="6902" instrument_node="">Why some people don’t plant fruiting trees</span></h3><span data-dcnode-id="6900" instrument_node="">
</span><p data-dcnode-id="6895"><span data-dcnode-id="6899" instrument_node="">Fruit trees are no different than many non-fruiting landscape trees, with one exception: They provide a harvest. To me, that sounds fabulous. If a tree is taking up space in my yard, better that it offers up some fruit. But not everyone wants to deal with </span><strong data-dcnode-id="6897"><span data-dcnode-id="6898" instrument_node="">harvesting fruit</span></strong><span data-dcnode-id="6896" instrument_node="">. (It’s likely that those people are not here reading this, though!)</span></p><span data-dcnode-id="6894" instrument_node="">
</span><p data-dcnode-id="6892"><span data-dcnode-id="6893" instrument_node="">In designing public spaces, there’s a hesitancy to use fruiting trees because of the mess factor. If a tree fruits and nobody is there to harvest that fruit, it will fall to the ground.</span></p><span data-dcnode-id="6891" instrument_node="">
</span><p data-dcnode-id="6886"><span data-dcnode-id="6890" instrument_node="">Fruit on the ground is unsightly and can draw undesirable insects and rodents, or become a tripping hazard. These are </span><strong data-dcnode-id="6888"><span data-dcnode-id="6889" instrument_node="">valid concerns</span></strong><span data-dcnode-id="6887" instrument_node=""> for commercial and community spaces, though it does seem like a missed opportunity.</span></p><div class="atm-ad-slot" data-dcnode-id="6885" data-slot-type="injected-ad"></div><div class="modular" data-dcnode-id="6865"><span data-dcnode-id="6884" instrument_node="">
</span><div class="deco_two" data-dcnode-id="6867"><span data-dcnode-id="6883" instrument_node="">
</span><div class="thrive_suks ml_signup" data-dcnode-id="6869"><span data-dcnode-id="6882" instrument_node="">
</span><h2 class="h-less" data-dcnode-id="6880"><span data-dcnode-id="6881" instrument_node="">Grow Some Greens!</span></h2><span data-dcnode-id="6879" instrument_node="">
</span><p data-dcnode-id="6875"><span data-dcnode-id="6878" instrument_node="">Ready to grow fresh greens, no matter WHERE you live? Sign up for my</span><br data-dcnode-id="6877"/><span data-dcnode-id="6876" instrument_node="">
FREE quick-start guide and start growing some of your own food!</span></p><span data-dcnode-id="6874" instrument_node="">
</span><p data-dcnode-id="6871"><a class="button" data-dcnode-id="6872" href="https://attainablesustainable.ck.page/39dcec80f7"><span data-dcnode-id="6873" instrument_node="">Get the Guide!</span></a></p><span data-dcnode-id="6870" instrument_node="">
</span></div><span data-dcnode-id="6868" instrument_node="">
</span></div><span data-dcnode-id="6866" instrument_node="">
</span></div><span data-dcnode-id="6864" instrument_node="">
</span><p data-dcnode-id="6860"><span data-dcnode-id="6863" instrument_node="">Why not plant productive trees, creating an edible landscape with the intention to harvest the fruit for local food banks? That seems like a great use of </span><strong data-dcnode-id="6861"><span data-dcnode-id="6862" instrument_node="">common areas and medians. </span></strong></p><span data-dcnode-id="6859" instrument_node="">
</span><p data-dcnode-id="6851" style="text-align: center;"><a data-dcnode-id="6855" href="https://www.attainable-sustainable.net/wp-content/uploads/2017/02/cherry-blossoms-1.jpg"><img alt="Urban fruit! An edible landscape is great for city gardeners. Consider growing fruit trees in pots or as part of your front yard landscape. " class="aligncenter wp-image-4218 size-full" data-dcnode-id="6858" data-pin-description="Urban fruit! An edible landscape is great for city gardeners and fruiting trees are a perfect addition to an edible landscape. They're beautiful, functional as they provide shade, and they can produce fruit within 3-5 years. Planting a fruit tree now will provide an abundant harvest for years to come. #orchard #garden #homestead" data-pin-title="Urban Fruit Trees for a Small Scale Harvest" height="533" sizes="(max-width: 800px) 100vw, 800px" src="https://www.attainable-sustainable.net/wp-content/uploads/2017/02/cherry-blossoms-1.jpg" srcset="https://www.attainable-sustainable.net/wp-content/uploads/2017/02/cherry-blossoms-1.jpg 800w, https://www.attainable-sustainable.net/wp-content/uploads/2017/02/cherry-blossoms-1-150x100.jpg 150w, https://www.attainable-sustainable.net/wp-content/uploads/2017/02/cherry-blossoms-1-350x233.jpg 350w, https://www.attainable-sustainable.net/wp-content/uploads/2017/02/cherry-blossoms-1-768x512.jpg 768w, https://www.attainable-sustainable.net/wp-content/uploads/2017/02/cherry-blossoms-1-550x367.jpg 550w, https://www.attainable-sustainable.net/wp-content/uploads/2017/02/cherry-blossoms-1-380x254.jpg 380w, https://www.attainable-sustainable.net/wp-content/uploads/2017/02/cherry-blossoms-1-260x173.jpg 260w, https://www.attainable-sustainable.net/wp-content/uploads/2017/02/cherry-blossoms-1-280x187.jpg 280w" title="Planting a fruit tree now will provide an abundant harvest for years to come. This list of fruit trees features options that grow well in small urban yards." width="800"/><strong data-dcnode-id="6856"><span data-dcnode-id="6857" instrument_node="">Related: </span></strong></a><strong data-dcnode-id="6852"><a class="yoast-link-suggestion__value" data-dcnode-id="6853" href="https://www.attainable-sustainable.net/small-vegetable-garden-ideas/"><span data-dcnode-id="6854" instrument_node="">Small Vegetable Garden Ideas: What to Grow to Make the Most of Your Space</span></a></strong></p><span data-dcnode-id="6850" instrument_node="">
</span><div class="modular" data-dcnode-id="6827"><span data-dcnode-id="6849" instrument_node="">
</span><hr data-dcnode-id="6848"/><span data-dcnode-id="6847" instrument_node="">
</span><div data-dcnode-id="6845"><span data-dcnode-id="6846" instrument_node=""> </span></div><span data-dcnode-id="6844" instrument_node="">
</span><p data-dcnode-id="6839"><a data-dcnode-id="6842" href="https://www.attainable-sustainable.net/edible-front-yard-ebook/"><img alt='pretty garden with tomatoes and flowers - cover of book "edible front yard garden"' class="alignleft wp-image-20252" data-dcnode-id="6843" data-pin-description="Urban fruit! An edible landscape is great for city gardeners and fruiting trees are a perfect addition to an edible landscape. They're beautiful, functional as they provide shade, and they can produce fruit within 3-5 years. Planting a fruit tree now will provide an abundant harvest for years to come. #orchard #garden #homestead" data-pin-title="Urban Fruit Trees for a Small Scale Harvest" height="194" sizes="(max-width: 150px) 100vw, 150px" src="https://www.attainable-sustainable.net/wp-content/uploads/2020/08/ediblefrontyardforshop-232x300.jpg" srcset="https://www.attainable-sustainable.net/wp-content/uploads/2020/08/ediblefrontyardforshop-232x300.jpg 232w, https://www.attainable-sustainable.net/wp-content/uploads/2020/08/ediblefrontyardforshop-116x150.jpg 116w, https://www.attainable-sustainable.net/wp-content/uploads/2020/08/ediblefrontyardforshop.jpg 280w" width="150"/></a><strong data-dcnode-id="6840"><span data-dcnode-id="6841" instrument_node="">The Edible Front Yard Garden</span></strong></p><span data-dcnode-id="6838" instrument_node="">
</span><p data-dcnode-id="6831"><span data-dcnode-id="6837" instrument_node="">Does your homeowners association prevent you from growing food in the front yard? What if they never even KNEW? My ebook, </span><a data-dcnode-id="6833" href="https://www.attainable-sustainable.net/edible-front-yard-ebook/"><strong data-dcnode-id="6834"><em data-dcnode-id="6835"><span data-dcnode-id="6836" instrument_node="">The Edible Front Yard Garden</span></em></strong></a><span data-dcnode-id="6832" instrument_node=""> will show you how!</span></p><span data-dcnode-id="6830" instrument_node="">
</span><hr data-dcnode-id="6829"/><span data-dcnode-id="6828" instrument_node="">
</span></div><span data-dcnode-id="6826" instrument_node="">
</span><h2 data-dcnode-id="6824"><span data-dcnode-id="6825" instrument_node="">List of fruit trees for an edible landscape</span></h2><span data-dcnode-id="6823" instrument_node="">
</span><p data-dcnode-id="6819"><strong data-dcnode-id="6821"><span data-dcnode-id="6822" instrument_node="">Apple</span></strong><span data-dcnode-id="6820" instrument_node=""> – The spreading branches of a mature standard-sized apple tree are perfect for sitting under. Beautiful white and pink blossoms in the spring are slightly fragrant. Harvest, late summer and autumn.</span></p><span data-dcnode-id="6818" instrument_node="">
</span><p data-dcnode-id="6811"><strong data-dcnode-id="6816"><span data-dcnode-id="6817" instrument_node="">Banana</span></strong><span data-dcnode-id="6815" instrument_node=""> – Ranging in size from a few feet tall to more than 20′ tall, there is a wide selection of banana varieties available to backyard growers. Choose small banana plants (see </span><a data-dcnode-id="6813" href="https://www.attainable-sustainable.net/grow-bananas/"><span data-dcnode-id="6814" instrument_node="">here</span></a><span data-dcnode-id="6812" instrument_node=""> for some options) for container growing.</span></p><span data-dcnode-id="6810" instrument_node="">
</span><p data-dcnode-id="6808"><span data-dcnode-id="6809" instrument_node="">Bananas require a warm climate, but some intrepid growers plant them in large containers and move them into a protected area during cold winter months.</span></p><span data-dcnode-id="6807" instrument_node="">
</span><p data-dcnode-id="6803"><strong data-dcnode-id="6805"><span data-dcnode-id="6806" instrument_node="">Cherry</span></strong><span data-dcnode-id="6804" instrument_node=""> – Non-fruiting or “ornamental” cherry trees are frequently planted for their gorgeous blossoms. Opt for a fruiting variety for more bang for your buck. Harvest, early summer</span></p><div class="atm-ad-slot" data-dcnode-id="6802" data-slot-type="injected-ad"></div><span data-dcnode-id="6801" instrument_node="">
</span><p data-dcnode-id="6797"><strong data-dcnode-id="6799"><span data-dcnode-id="6800" instrument_node="">Citrus</span></strong><span data-dcnode-id="6798" instrument_node=""> – An evergreen tree for frost-free climates, citrus trees like orange, tangerine, and lemon are year-round beauties. Harvest, winter.</span></p><span data-dcnode-id="6796" instrument_node="">
</span><img alt="" class="aligncenter size-full wp-image-13037" data-dcnode-id="6795" data-pin-description="Urban fruit! An edible landscape is great for city gardeners and fruiting trees are a perfect addition to an edible landscape. They're beautiful, functional as they provide shade, and they can produce fruit within 3-5 years. Planting a fruit tree now will provide an abundant harvest for years to come. #orchard #garden #homestead" data-pin-title="Urban Fruit Trees for a Small Scale Harvest" height="580" sizes="(max-width: 870px) 100vw, 870px" src="https://www.attainable-sustainable.net/wp-content/uploads/2015/08/2crabapples.jpg" srcset="https://www.attainable-sustainable.net/wp-content/uploads/2015/08/2crabapples.jpg 870w, https://www.attainable-sustainable.net/wp-content/uploads/2015/08/2crabapples-150x100.jpg 150w, https://www.attainable-sustainable.net/wp-content/uploads/2015/08/2crabapples-350x233.jpg 350w, https://www.attainable-sustainable.net/wp-content/uploads/2015/08/2crabapples-768x512.jpg 768w, https://www.attainable-sustainable.net/wp-content/uploads/2015/08/2crabapples-550x367.jpg 550w, https://www.attainable-sustainable.net/wp-content/uploads/2015/08/2crabapples-380x254.jpg 380w, https://www.attainable-sustainable.net/wp-content/uploads/2015/08/2crabapples-260x173.jpg 260w" width="870"/><span data-dcnode-id="6794" instrument_node="">
</span><p data-dcnode-id="6787"><strong data-dcnode-id="6792"><span data-dcnode-id="6793" instrument_node="">Crabapple</span></strong><span data-dcnode-id="6791" instrument_node=""> – Less commonly known than standard apples, crabapples are edible and there are some pretty compelling reasons to plant one. You can read more about planting and growing this fruit tree </span><a data-dcnode-id="6789" href="https://www.attainable-sustainable.net/crabapple/"><span data-dcnode-id="6790" instrument_node="">here</span></a><span data-dcnode-id="6788" instrument_node="">.</span></p><span data-dcnode-id="6786" instrument_node="">
</span><p data-dcnode-id="6779"><strong data-dcnode-id="6784"><span data-dcnode-id="6785" instrument_node="">Fig</span></strong><span data-dcnode-id="6783" instrument_node=""> – The oversized leaves of a fig tree offer a tropical look to the landscape. Many fig varieties offer two harvests per year. </span><a data-dcnode-id="6781" href="https://www.attainable-sustainable.net/fig/"><span data-dcnode-id="6782" instrument_node="">Figs are easy to grow in pots, too</span></a><span data-dcnode-id="6780" instrument_node="">.</span></p><span data-dcnode-id="6778" instrument_node="">
</span><img alt="small fruit trees in a grassy area, citrus in terra cotta containers" class="aligncenter wp-image-13067 size-full" data-dcnode-id="6777" data-pin-description="Urban fruit! An edible landscape is great for city gardeners and fruiting trees are a perfect addition to an edible landscape. They're beautiful, functional as they provide shade, and they can produce fruit within 3-5 years. Planting a fruit tree now will provide an abundant harvest for years to come. #orchard #garden #homestead" data-pin-id="703756181362688" data-pin-title="Urban Fruit Trees for a Small Scale Harvest" height="900" sizes="(max-width: 600px) 100vw, 600px" src="https://www.attainable-sustainable.net/wp-content/uploads/2017/02/2edible-landscape.jpg" srcset="https://www.attainable-sustainable.net/wp-content/uploads/2017/02/2edible-landscape.jpg 600w, https://www.attainable-sustainable.net/wp-content/uploads/2017/02/2edible-landscape-100x150.jpg 100w, https://www.attainable-sustainable.net/wp-content/uploads/2017/02/2edible-landscape-200x300.jpg 200w, https://www.attainable-sustainable.net/wp-content/uploads/2017/02/2edible-landscape-387x580.jpg 387w, https://www.attainable-sustainable.net/wp-content/uploads/2017/02/2edible-landscape-245x367.jpg 245w, https://www.attainable-sustainable.net/wp-content/uploads/2017/02/2edible-landscape-169x254.jpg 169w, https://www.attainable-sustainable.net/wp-content/uploads/2017/02/2edible-landscape-115x173.jpg 115w" title="Planting a fruit tree now will provide an abundant harvest for years to come. This list of fruit trees features options that grow well in small urban yards." width="600"/><span data-dcnode-id="6776" instrument_node="">
</span><p data-dcnode-id="6769"><strong data-dcnode-id="6774"><span data-dcnode-id="6775" instrument_node="">Mulberry</span></strong><span data-dcnode-id="6773" instrument_node=""> – With large fruit resembling blackberries, a mulberry tree can serve several purposes in your edible landscape. The fruit is excellent, if a bit hard to harvest. It can also act as a lure to draw birds and squirrels away from other ripening fruit. Try planting one in an area where the dropping fruit can </span><strong data-dcnode-id="6771"><span data-dcnode-id="6772" instrument_node="">provide fodder for chickens</span></strong><span data-dcnode-id="6770" instrument_node=""> so that any fruit you don’t harvest will go to feed your flock.</span></p><span data-dcnode-id="6768" instrument_node="">
</span><p data-dcnode-id="6761"><strong data-dcnode-id="6766"><span data-dcnode-id="6767" instrument_node="">Nectarine</span></strong><span data-dcnode-id="6765" instrument_node=""> – The dark, slender green leaves of a nectarine tree make it a summertime beauty. Harvest, late summer. Here’s how to </span><a data-dcnode-id="6763" href="https://www.attainable-sustainable.net/nectarine/"><span data-dcnode-id="6764" instrument_node="">start a nectarine tree from seed</span></a><span data-dcnode-id="6762" instrument_node="">.</span></p><span data-dcnode-id="6760" instrument_node="">
</span><p data-dcnode-id="6756"><strong data-dcnode-id="6758"><span data-dcnode-id="6759" instrument_node="">Olive</span></strong><span data-dcnode-id="6757" instrument_node=""> – An evergreen tree with fine leaves, olive trees are great landscape plants and people often plant them for their beauty rather than the fruit. Olives need to be processed before they are edible.</span></p><div class="atm-ad-slot" data-dcnode-id="6755" data-slot-type="injected-ad"></div><span data-dcnode-id="6754" instrument_node="">
</span><img alt="peach tree in a container" class="aligncenter size-full wp-image-24385" data-dcnode-id="6753" data-pin-description="Urban fruit! An edible landscape is great for city gardeners and fruiting trees are a perfect addition to an edible landscape. They're beautiful, functional as they provide shade, and they can produce fruit within 3-5 years. Planting a fruit tree now will provide an abundant harvest for years to come. #orchard #garden #homestead" data-pin-title="Urban Fruit Trees for a Small Scale Harvest" height="1700" sizes="(max-width: 1000px) 100vw, 1000px" src="https://www.attainable-sustainable.net/wp-content/uploads/2017/02/fruit.jpg" srcset="https://www.attainable-sustainable.net/wp-content/uploads/2017/02/fruit.jpg 1000w, https://www.attainable-sustainable.net/wp-content/uploads/2017/02/fruit-176x300.jpg 176w, https://www.attainable-sustainable.net/wp-content/uploads/2017/02/fruit-602x1024.jpg 602w, https://www.attainable-sustainable.net/wp-content/uploads/2017/02/fruit-88x150.jpg 88w, https://www.attainable-sustainable.net/wp-content/uploads/2017/02/fruit-768x1306.jpg 768w, https://www.attainable-sustainable.net/wp-content/uploads/2017/02/fruit-904x1536.jpg 904w, https://www.attainable-sustainable.net/wp-content/uploads/2017/02/fruit-150x255.jpg 150w" width="1000"/><span data-dcnode-id="6752" instrument_node="">
</span><p data-dcnode-id="6748"><strong data-dcnode-id="6750"><span data-dcnode-id="6751" instrument_node="">Peach</span></strong><span data-dcnode-id="6749" instrument_node=""> – The fuzzy fruit of this summer-bearing tree is delicious fresh out of hand, but if you have plenty, consider preserving some for the pantry. The trees grow similarly to a nectarine and offer pretty pink springtime blossoms.</span></p><span data-dcnode-id="6747" instrument_node="">
</span><p data-dcnode-id="6743"><strong data-dcnode-id="6745"><span data-dcnode-id="6746" instrument_node="">Pear</span></strong><span data-dcnode-id="6744" instrument_node=""> – In addition to delicate spring blossoms and a tasty crop, pear trees offer fall color to your yard as well. Harvest, late summer.</span></p><span data-dcnode-id="6742" instrument_node="">
</span><div class="modular" data-dcnode-id="6719"><span data-dcnode-id="6741" instrument_node="">
</span><hr data-dcnode-id="6740"/><span data-dcnode-id="6739" instrument_node="">
</span><div data-dcnode-id="6737"><span data-dcnode-id="6738" instrument_node=""> </span></div><span data-dcnode-id="6736" instrument_node="">
</span><p data-dcnode-id="6731"><a data-dcnode-id="6734" href="https://www.attainable-sustainable.net/edible-front-yard-ebook/"><img alt='pretty garden with tomatoes and flowers - cover of book "edible front yard garden"' class="alignleft wp-image-20252" data-dcnode-id="6735" data-pin-description="Urban fruit! An edible landscape is great for city gardeners and fruiting trees are a perfect addition to an edible landscape. They're beautiful, functional as they provide shade, and they can produce fruit within 3-5 years. Planting a fruit tree now will provide an abundant harvest for years to come. #orchard #garden #homestead" data-pin-title="Urban Fruit Trees for a Small Scale Harvest" height="194" sizes="(max-width: 150px) 100vw, 150px" src="https://www.attainable-sustainable.net/wp-content/uploads/2020/08/ediblefrontyardforshop-232x300.jpg" srcset="https://www.attainable-sustainable.net/wp-content/uploads/2020/08/ediblefrontyardforshop-232x300.jpg 232w, https://www.attainable-sustainable.net/wp-content/uploads/2020/08/ediblefrontyardforshop-116x150.jpg 116w, https://www.attainable-sustainable.net/wp-content/uploads/2020/08/ediblefrontyardforshop.jpg 280w" width="150"/></a><strong data-dcnode-id="6732"><span data-dcnode-id="6733" instrument_node="">The Edible Front Yard Garden</span></strong></p><span data-dcnode-id="6730" instrument_node="">
</span><p data-dcnode-id="6723"><span data-dcnode-id="6729" instrument_node="">Does your homeowners association prevent you from growing food in the front yard? What if they never even KNEW? My ebook, </span><a data-dcnode-id="6725" href="https://www.attainable-sustainable.net/edible-front-yard-ebook/"><strong data-dcnode-id="6726"><em data-dcnode-id="6727"><span data-dcnode-id="6728" instrument_node="">The Edible Front Yard Garden</span></em></strong></a><span data-dcnode-id="6724" instrument_node=""> will show you how!</span></p><span data-dcnode-id="6722" instrument_node="">
</span><hr data-dcnode-id="6721"/><span data-dcnode-id="6720" instrument_node="">
</span></div><span data-dcnode-id="6718" instrument_node="">
</span><p data-dcnode-id="6711"><strong data-dcnode-id="6716"><span data-dcnode-id="6717" instrument_node="">Persimmon</span></strong><span data-dcnode-id="6715" instrument_node=""> – A beautiful tree with spreading branches, persimmons are most noticeable in the fall when the leaves drop and bright orange fruit remains. Harvest, autumn. Here’s more on </span><a data-dcnode-id="6713" href="https://www.attainable-sustainable.net/growing-persimmons/"><span data-dcnode-id="6714" instrument_node="">growing a persimmon tree</span></a><span data-dcnode-id="6712" instrument_node="">.</span></p><span data-dcnode-id="6710" instrument_node="">
</span><p data-dcnode-id="6706"><strong data-dcnode-id="6708"><span data-dcnode-id="6709" instrument_node="">Pineapple guava</span></strong><span data-dcnode-id="6707" instrument_node=""> – A small tree or upright shrub, this evergreen produces bluish green fruit. It grows we ll in cool coastal locations. Harvest, summer.</span></p><span data-dcnode-id="6705" instrument_node="">
</span><p data-dcnode-id="6701"><strong data-dcnode-id="6703"><span data-dcnode-id="6704" instrument_node="">Plum</span></strong><span data-dcnode-id="6702" instrument_node=""> – Desirable for their vivid pink spring blossoms, flowering plum trees are used frequently as a landscape plant. You can have similar beauty plus a great harvest by choosing a fruiting plum. Harvest, late spring and summer.</span></p><span data-dcnode-id="6700" instrument_node="">
</span><img alt="Urban fruit! An edible landscape is great for city gardeners. Consider growing fruit trees in pots or as part of your front yard landscape. " class="aligncenter wp-image-4216 size-full" data-dcnode-id="6699" data-pin-description="Urban fruit! An edible landscape is great for city gardeners and fruiting trees are a perfect addition to an edible landscape. They're beautiful, functional as they provide shade, and they can produce fruit within 3-5 years. Planting a fruit tree now will provide an abundant harvest for years to come. #orchard #garden #homestead" data-pin-title="Urban Fruit Trees for a Small Scale Harvest" height="555" sizes="(max-width: 800px) 100vw, 800px" src="https://www.attainable-sustainable.net/wp-content/uploads/2017/02/pear-tree-urban-garden.jpg" srcset="https://www.attainable-sustainable.net/wp-content/uploads/2017/02/pear-tree-urban-garden.jpg 800w, https://www.attainable-sustainable.net/wp-content/uploads/2017/02/pear-tree-urban-garden-150x104.jpg 150w, https://www.attainable-sustainable.net/wp-content/uploads/2017/02/pear-tree-urban-garden-350x243.jpg 350w, https://www.attainable-sustainable.net/wp-content/uploads/2017/02/pear-tree-urban-garden-768x533.jpg 768w, https://www.attainable-sustainable.net/wp-content/uploads/2017/02/pear-tree-urban-garden-529x367.jpg 529w, https://www.attainable-sustainable.net/wp-content/uploads/2017/02/pear-tree-urban-garden-366x254.jpg 366w, https://www.attainable-sustainable.net/wp-content/uploads/2017/02/pear-tree-urban-garden-249x173.jpg 249w, https://www.attainable-sustainable.net/wp-content/uploads/2017/02/pear-tree-urban-garden-270x187.jpg 270w" title="Planting a fruit tree now will provide an abundant harvest for years to come. This list of fruit trees features options that grow well in small urban yards." width="800"/><span data-dcnode-id="6698" instrument_node="">
</span><p data-dcnode-id="6693" style="text-align: center;"><strong data-dcnode-id="6694"><span data-dcnode-id="6697" instrument_node="">Related: </span><a class="yoast-link-suggestion__value" data-dcnode-id="6695" href="https://www.attainable-sustainable.net/smart-gardening-hacks/"><span data-dcnode-id="6696" instrument_node="">15 Smart Gardening Hacks to Save You Time and Money</span></a></strong></p><div class="atm-ad-slot" data-dcnode-id="6692" data-slot-type="injected-ad"></div><span data-dcnode-id="6691" instrument_node="">
</span><h3 data-dcnode-id="6689"><span data-dcnode-id="6690" instrument_node="">Size matters</span></h3><span data-dcnode-id="6688" instrument_node="">
</span><p data-dcnode-id="6686"><span data-dcnode-id="6687" instrument_node="">Fruit trees come in four different sizes: Standard, semi-dwarf, dwarf, and less commonly, super-dwarf. This means that you can choose a tree that will fit your space perfectly. When considering the options on the list of fruit trees above, decide which size tree will work best for your space. For urban areas, small fruit trees are probably the most sensible.</span></p><span data-dcnode-id="6685" instrument_node="">
</span><ul data-dcnode-id="6663"><span data-dcnode-id="6684" instrument_node="">
</span><li data-dcnode-id="6680"><strong data-dcnode-id="6682"><span data-dcnode-id="6683" instrument_node="">Standard fruit trees</span></strong><span data-dcnode-id="6681" instrument_node=""> need a fair amount of space and are a good choice if you’re hoping for high branches that will provide shade.</span></li><span data-dcnode-id="6679" instrument_node="">
</span><li data-dcnode-id="6675"><strong data-dcnode-id="6677"><span data-dcnode-id="6678" instrument_node="">Semi-dwarf trees</span></strong><span data-dcnode-id="6676" instrument_node=""> are great for incorporating into a garden bed as a visually upright specimen.</span></li><span data-dcnode-id="6674" instrument_node="">
</span><li data-dcnode-id="6670"><strong data-dcnode-id="6672"><span data-dcnode-id="6673" instrument_node="">Dwarf varieties</span></strong><span data-dcnode-id="6671" instrument_node=""> are great if you’re an urban gardener. Plant them directly in the ground or in pots.</span></li><span data-dcnode-id="6669" instrument_node="">
</span><li data-dcnode-id="6665"><strong data-dcnode-id="6667"><span data-dcnode-id="6668" instrument_node="">Super dwarf trees</span></strong><span data-dcnode-id="6666" instrument_node=""> are great for really tight spaces like apartment balconies. There are not as many choices available in this miniature size, unfortunately.</span></li><span data-dcnode-id="6664" instrument_node="">
</span></ul><span data-dcnode-id="6662" instrument_node="">
</span><p data-dcnode-id="6654"><span data-dcnode-id="6661" instrument_node="">Choosing a dwarf tree variety </span><strong data-dcnode-id="6659"><span data-dcnode-id="6660" instrument_node="">will not impact the size of the fruit</span></strong><span data-dcnode-id="6658" instrument_node="">. A dwarf tree doesn’t mean a smaller apple; it just means that the size of the tree itself (and thus the quantity of fruit) will be reduced, making it a perfect urban fruit tree option. </span><strong data-dcnode-id="6656"><span data-dcnode-id="6657" instrument_node="">They’re ideal when growing fruit trees in pots.</span></strong><span data-dcnode-id="6655" instrument_node=""> This is done by grafting various fruit varieties onto a rootstock that produces small trees.</span></p><span data-dcnode-id="6653" instrument_node="">
</span><img alt="Consider growing fruit trees in pots or as part of your front yard landscape. " class="aligncenter wp-image-4217 size-full" data-dcnode-id="6652" data-pin-description="Urban fruit! An edible landscape is great for city gardeners and fruiting trees are a perfect addition to an edible landscape. They're beautiful, functional as they provide shade, and they can produce fruit within 3-5 years. Planting a fruit tree now will provide an abundant harvest for years to come. #orchard #garden #homestead" data-pin-title="Urban Fruit Trees for a Small Scale Harvest" height="532" sizes="(max-width: 800px) 100vw, 800px" src="https://www.attainable-sustainable.net/wp-content/uploads/2017/02/orange-trees-in-pots.jpg" srcset="https://www.attainable-sustainable.net/wp-content/uploads/2017/02/orange-trees-in-pots.jpg 800w, https://www.attainable-sustainable.net/wp-content/uploads/2017/02/orange-trees-in-pots-150x100.jpg 150w, https://www.attainable-sustainable.net/wp-content/uploads/2017/02/orange-trees-in-pots-350x233.jpg 350w, https://www.attainable-sustainable.net/wp-content/uploads/2017/02/orange-trees-in-pots-768x511.jpg 768w, https://www.attainable-sustainable.net/wp-content/uploads/2017/02/orange-trees-in-pots-550x367.jpg 550w, https://www.attainable-sustainable.net/wp-content/uploads/2017/02/orange-trees-in-pots-380x254.jpg 380w, https://www.attainable-sustainable.net/wp-content/uploads/2017/02/orange-trees-in-pots-260x173.jpg 260w, https://www.attainable-sustainable.net/wp-content/uploads/2017/02/orange-trees-in-pots-280x187.jpg 280w" title="Planting a fruit tree now will provide an abundant harvest for years to come. This list of fruit trees features options that grow well in small urban yards." width="800"/><span data-dcnode-id="6651" instrument_node="">
</span><h3 data-dcnode-id="6649"><span data-dcnode-id="6650" instrument_node="">Growing fruit trees in pots</span></h3><span data-dcnode-id="6648" instrument_node="">
</span><p data-dcnode-id="6646"><span data-dcnode-id="6647" instrument_node="">If you want to add a tree to a patio area or need to be able to move certain warm weather varieties inside for the winter, growing fruit trees in pots might be the solution. Dwarf and super-dwarf varieties are the best option for growing in containers. The trees stay small and compact.</span></p><span data-dcnode-id="6645" instrument_node="">
</span><h4 data-dcnode-id="6642"><strong data-dcnode-id="6643"><span data-dcnode-id="6644" instrument_node="">Choose your container</span></strong></h4><span data-dcnode-id="6641" instrument_node="">
</span><div data-dcnode-id="6639" style="float: right;"><span data-dcnode-id="6640" instrument_node=""> </span></div><span data-dcnode-id="6638" instrument_node="">
</span><p data-dcnode-id="6633"><span data-dcnode-id="6637" instrument_node="">A 10-15 gallon container will work for most dwarf varieties and is a good size if you need to move your tree. A half oak barrel will give the roots a bit more space to spread out, but can be heavy to move. Be sure your container has a hole or two in the bottom so excess water can drain. </span><a data-dcnode-id="6635" href="https://www.attainable-sustainable.net/growing-vegetables-in-containers/"><span data-dcnode-id="6636" instrument_node="">Grow bags</span></a><span data-dcnode-id="6634" instrument_node=""> (the largest size) would be another good option.</span></p><span data-dcnode-id="6632" instrument_node="">
</span><h4 data-dcnode-id="6630"><span data-dcnode-id="6631" instrument_node="">Soil and fertilizer</span></h4><span data-dcnode-id="6629" instrument_node="">
</span><p data-dcnode-id="6624"><span data-dcnode-id="6628" instrument_node="">Choose a good quality potting soil. Your potted urban fruit tree will be growing in a confined space; make sure it’s as healthy as possible. Fertilize your tree every couple of weeks during the growing season with compost or manure tea. I like to spray fruit trees with liquid kelp every few weeks, too. See more about </span><a data-dcnode-id="6626" href="https://www.attainable-sustainable.net/bare-root/"><span data-dcnode-id="6627" instrument_node="">planting bare root fruit trees here</span></a><span data-dcnode-id="6625" instrument_node="">.</span></p><span data-dcnode-id="6623" instrument_node="">
</span><img alt="tree with white blossoms behind a fence" class="aligncenter size-full wp-image-24384" data-dcnode-id="6622" data-pin-description="Urban fruit! An edible landscape is great for city gardeners and fruiting trees are a perfect addition to an edible landscape. They're beautiful, functional as they provide shade, and they can produce fruit within 3-5 years. Planting a fruit tree now will provide an abundant harvest for years to come. #orchard #garden #homestead" data-pin-title="Urban Fruit Trees for a Small Scale Harvest" height="1700" sizes="(max-width: 1000px) 100vw, 1000px" src="https://www.attainable-sustainable.net/wp-content/uploads/2017/02/fruit-trees.jpg" srcset="https://www.attainable-sustainable.net/wp-content/uploads/2017/02/fruit-trees.jpg 1000w, https://www.attainable-sustainable.net/wp-content/uploads/2017/02/fruit-trees-176x300.jpg 176w, https://www.attainable-sustainable.net/wp-content/uploads/2017/02/fruit-trees-602x1024.jpg 602w, https://www.attainable-sustainable.net/wp-content/uploads/2017/02/fruit-trees-88x150.jpg 88w, https://www.attainable-sustainable.net/wp-content/uploads/2017/02/fruit-trees-768x1306.jpg 768w, https://www.attainable-sustainable.net/wp-content/uploads/2017/02/fruit-trees-904x1536.jpg 904w, https://www.attainable-sustainable.net/wp-content/uploads/2017/02/fruit-trees-150x255.jpg 150w" width="1000"/><span data-dcnode-id="6621" instrument_node="">
</span><h3 data-dcnode-id="6619"><span data-dcnode-id="6620" instrument_node="">Adding fruit trees to an edible landscape</span></h3><span data-dcnode-id="6618" instrument_node="">
</span><p data-dcnode-id="6616"><span data-dcnode-id="6617" instrument_node="">Adding a fruit tree or two to your yard or garden is pretty easy, but there are a couple of things you should think about before diving in and landscaping with fruit trees.</span></p><div class="atm-ad-slot" data-dcnode-id="6615" data-slot-type="injected-ad"></div><span data-dcnode-id="6614" instrument_node="">
</span><h4 data-dcnode-id="6612"><span data-dcnode-id="6613" instrument_node="">Chill hours</span></h4><span data-dcnode-id="6611" instrument_node="">
</span><p data-dcnode-id="6606"><span data-dcnode-id="6610" instrument_node="">Basically, urban fruit trees need cold weather to triggering flowering (and thus fruiting). Some varieties need more than others. In my not-so-chilly region, I have to seek out fruit trees that are “</span><a data-dcnode-id="6608" href="https://www.baylaurelnursery.com/low-chill-bare-root-varieties.html" rel="noopener" target="_blank"><span data-dcnode-id="6609" instrument_node="">low chill</span></a><span data-dcnode-id="6607" instrument_node="">” varieties. You’ll need to determine how many chill hours (the average number of hours below 45 degrees Fahrenheit) you get each winter.</span></p><span data-dcnode-id="6605" instrument_node="">
</span><h4 data-dcnode-id="6603"><span data-dcnode-id="6604" instrument_node="">Pollination</span></h4><span data-dcnode-id="6602" instrument_node="">
</span><p data-dcnode-id="6594"><span data-dcnode-id="6601" instrument_node="">In order for fruit to set and grow to maturity, the blossom needs to be pollinated. This is why it’s so important to encourage bees and other pollinators in your garden by </span><a data-dcnode-id="6599" href="https://www.attainable-sustainable.net/perennials-attract-bees/"><span data-dcnode-id="6600" instrument_node="">planting flowers</span></a><span data-dcnode-id="6598" instrument_node=""> or </span><a data-dcnode-id="6596" href="https://www.attainable-sustainable.net/bees/"><span data-dcnode-id="6597" instrument_node="">creating a hospitable environment</span></a><span data-dcnode-id="6595" instrument_node="">. This goes for garden crops as well as fruit trees. Bees carry pollen from one bloom to another, helping to pollinate each.</span></p><span data-dcnode-id="6593" instrument_node="">
</span><p data-dcnode-id="6588"><span data-dcnode-id="6592" instrument_node="">Fruit trees are sometimes self-fertile, meaning that pollination can happen with just a single tree. This is most common with stone fruit like peaches, nectarines, and apricots. Others require cross-pollination between two trees. Choose two trees </span><strong data-dcnode-id="6590"><span data-dcnode-id="6591" instrument_node="">within in the same species that bloom at the same time</span></strong><span data-dcnode-id="6589" instrument_node=""> and plant them within 50 feet of each other.</span></p><span data-dcnode-id="6587" instrument_node="">
</span><h4 data-dcnode-id="6585"><span data-dcnode-id="6586" instrument_node="">Placement</span></h4><span data-dcnode-id="6584" instrument_node="">
</span><p data-dcnode-id="6582"><span data-dcnode-id="6583" instrument_node="">Be sure to situate your small fruit trees in an area that won’t be negatively impacted by dropping fruit. Likewise, be sure that you take maintenance into consideration when landscaping with fruit trees. You’ll need access to prune and harvest your crop!</span></p><span data-dcnode-id="6581" instrument_node="">
</span><h4 data-dcnode-id="6579"><span data-dcnode-id="6580" instrument_node="">Seasonality</span></h4><span data-dcnode-id="6578" instrument_node="">
</span><p data-dcnode-id="6573"><span data-dcnode-id="6577" instrument_node="">One other thing to consider is what fruit is in season when. If you plant ten fruit trees that all produce fruit during the summer months, the rest of the year will be pretty lean as far as fresh fruit. Instead, think about planting a variety that will ripe across the seasons. Read more about </span><a data-dcnode-id="6575" href="https://www.attainable-sustainable.net/seasonal-fruits/"><span data-dcnode-id="6576" instrument_node="">seasonal fruits</span></a><span data-dcnode-id="6574" instrument_node=""> for some inspiration when choosing urban fruit trees for your yard.</span></p><span data-dcnode-id="6572" instrument_node="">
</span><p data-dcnode-id="6569"><em data-dcnode-id="6570"><span data-dcnode-id="6571" instrument_node="">Originally published in February 2017; this post has been updated.</span></em></p><div class="atm-ad-slot" data-dcnode-id="6568" data-slot-type="injected-ad"></div><span data-dcnode-id="6567" instrument_node="">
</span></div><span data-dcnode-id="6565" instrument_node="">
</span><p class="author_description" data-dcnode-id="6556"><span data-dcnode-id="6564" instrument_node="">
</span><span class="author_description_intro" data-dcnode-id="6562"><span data-dcnode-id="6563" instrument_node="">About the author:</span></span><span data-dcnode-id="6561" instrument_node="">
Kris Bordessa founded Attainable Sustainable as a resource for revitalizing vintage skills. Her book, </span><a data-dcnode-id="6558" href="https://www.attainable-sustainable.net/book/"><strong data-dcnode-id="6559"><span data-dcnode-id="6560" instrument_node="">Attainable Sustainable: The Lost Art of Self-Reliant Living</span></strong></a><span data-dcnode-id="6557" instrument_node=""> (National Geographic) offers a collection of projects and recipes to help readers who are working their way to a more fulfilling DIY lifestyle. She’s a certified Master Food Preserver and longtime gardener who loves to turn the harvest into pantry staples.
</span></p><span data-dcnode-id="6555" instrument_node="">

</span><div class="comment_text" data-dcnode-id="6441" id="comment-body-317305"><span data-dcnode-id="6445" instrument_node="">
</span><p data-dcnode-id="6443"><span data-dcnode-id="6444" instrument_node="">The key to a disease resistant fruit tree is to feed the earthworms in the soil around the fruit roots often. I don’t ever need to spray my fruit trees or roses. Instead, I take all of my food scraps and run them through my blender to make a smoothie that earthworms will consume quickly AND poop out quickly making the soil nutrient dense and black. The fruit tree will became stronger and healthier.. Feed the earthworms around the roots of the fruit trees often and mulch really well…you’ll be glad you did!</span></p><span data-dcnode-id="6442" instrument_node="">
</span></div><span data-dcnode-id="6440" instrument_node="">

</span><p data-dcnode-id="6376"><span data-dcnode-id="6379" instrument_node="">Meyer lemons can be easily grown in a pot. All trees can be kept pruned smaller, but it’s easier to just have those that are grafted on dwarf root stock. For people like me who live in a clay ground area (I’m in southern California), I would dig down and amend the soil. The old adage of dig a $10 hole for a $5 plant works wonders. To Annette L. in Southern Cali, if you are going to plant in a box without a bottom, I would agree with Kris except I would dig down at least a foot and amend the clay with 1/3 compost and some gypsum. This way the roots go from great soil to decent/ok soil to the clay. Don’t forget, that raised area should probably be at least 6′ across because of root growth. I don’t know for sure, but I’ve heard that fruit trees have a small crop every 3rd year and if that’s true, I just experienced it. The people before me never pruned and big branches cracked off the peach tree. I’ve seriously pruned down the peach, plum and apricot trees. Planted an almond and banana apple tree. I will be pruning slightly the cherry and pomegranate trees. All of those are in ground. In pots I have: Meyer lemon, Valencia orange, Pomelo, red dragon fruit (not yet fruiting), red plumeria and fiddle leaf fig (non-fruiting). The ones in pots need protection during the cold months where the nights are below 40 degrees.</span><br data-dcnode-id="6378"/><span data-dcnode-id="6377" instrument_node="">
Thank you for your article. I enjoyed reading it very much.</span></p><span data-dcnode-id="6375" instrument_node="">

</span><div class="comment_text" data-dcnode-id="6099" id="comment-body-207436"><span data-dcnode-id="6103" instrument_node="">
</span><p data-dcnode-id="6101"><span data-dcnode-id="6102" instrument_node="">The soil in my Southern California yard is clay. I would like to plant some semi dwarf fruit trees in raised square boxes (bottoms removed) filled with good potting soil and set directly on the ground. The goal is that the trees will get a good start in the potting soil and eventually the roots will grow down into the soil beneath the boxes. Good idea or not?</span></p><span data-dcnode-id="6100" instrument_node="">
</span></div><span data-dcnode-id="6098" instrument_node="">
</span><div class="comment_footer" data-dcnode-id="6090"><span data-dcnode-id="6097" instrument_node="">
</span><a aria-label="Reply to Annette Loscialpo" class="comment-reply-link" data-belowelement="comment-body-207436" data-commentid="207436" data-dcnode-id="6095" data-postid="4214" data-replyto="Reply to Annette Loscialpo" data-respondelement="respond" href="https://www.attainable-sustainable.net/edible-landscaping/embed/#comment-207436" rel="nofollow"><span data-dcnode-id="6096" instrument_node="">Reply</span></a><span data-dcnode-id="6094" instrument_node="">

</span><p data-dcnode-id="6073"><span data-dcnode-id="6074" instrument_node="">Hard to say if it’s a GOOD idea, but it’s one I’d try. Here’s what I’d add: </span></p><span data-dcnode-id="6072" instrument_node="">
</span><p data-dcnode-id="6070"><span data-dcnode-id="6071" instrument_node="">1. Scarify (kind of roughen up) the soil below the pot. If the roots hit a flat layer of clay, they can just think they’ve hit the bottom of the pot and become pot-bound. If there’s a more uneven surface, they tend “push” into the soil. </span></p><span data-dcnode-id="6069" instrument_node="">
</span><p data-dcnode-id="6067"><span data-dcnode-id="6068" instrument_node="">2. Put a 6″ layer of manure in the pot before you add potting soil. . I’ve seen piles of manure do amazing things for breaking up soil.</span></p><span data-dcnode-id="6066" instrument_node="">
</span></div><span data-dcnode-id="6064" instrument_node="">

</span><p data-dcnode-id="5966"><span data-dcnode-id="5973" instrument_node="">Aloha! I’m Kris Bordessa, </span><strong data-dcnode-id="5971"><span data-dcnode-id="5972" instrument_node="">author</span></strong><span data-dcnode-id="5970" instrument_node=""> and </span><strong data-dcnode-id="5968"><span data-dcnode-id="5969" instrument_node="">certified Master Food Preserver</span></strong><span data-dcnode-id="5967" instrument_node="">, hobby farmer, gardener, chicken wrangler, and eternal experimenter.</span></p><span data-dcnode-id="5965" instrument_node="">
</span><p data-dcnode-id="5952"><span data-dcnode-id="5964" instrument_node="">I’m thrilled that my book, </span><a data-dcnode-id="5960" href="https://www.attainable-sustainable.net/book/"><em data-dcnode-id="5961"><strong data-dcnode-id="5962"><span data-dcnode-id="5963" instrument_node="">Attainable Sustainable: The Lost Art of Self-Reliant Living</span></strong></em></a><span data-dcnode-id="5959" instrument_node=""> (National Geographic Books) was awarded the </span><strong data-dcnode-id="5957"><span data-dcnode-id="5958" instrument_node="">best how-to book of 2020</span></strong><span data-dcnode-id="5956" instrument_node=""> by the </span><strong data-dcnode-id="5954"><span data-dcnode-id="5955" instrument_node="">American Society of Journalists and Authors</span></strong><span data-dcnode-id="5953" instrument_node="">.</span></p><span data-dcnode-id="5951" instrument_node="">
</span><p data-dcnode-id="5948"><a data-dcnode-id="5949" href="https://www.attainable-sustainable.net/book/"><img alt="cover of attainable sustainable book" class="size-full wp-image-17817 alignnone" data-dcnode-id="5950" height="573" sizes="(max-width: 450px) 100vw, 450px" src="https://www.attainable-sustainable.net/wp-content/uploads/2019/12/attainable-book-cover-1.jpg" srcset="https://www.attainable-sustainable.net/wp-content/uploads/2019/12/attainable-book-cover-1.jpg 450w, https://www.attainable-sustainable.net/wp-content/uploads/2019/12/attainable-book-cover-1-236x300.jpg 236w, https://www.attainable-sustainable.net/wp-content/uploads/2019/12/attainable-book-cover-1-118x150.jpg 118w, https://www.attainable-sustainable.net/wp-content/uploads/2019/12/attainable-book-cover-1-288x367.jpg 288w, https://www.attainable-sustainable.net/wp-content/uploads/2019/12/attainable-book-cover-1-199x254.jpg 199w, https://www.attainable-sustainable.net/wp-content/uploads/2019/12/attainable-book-cover-1-136x173.jpg 136w" width="450"/></a></p><span data-dcnode-id="5947" instrument_node="">
</span><p data-dcnode-id="5945"><span data-dcnode-id="5946" instrument_node="">Here at Attainable Sustainable, I aim to encourage readers — that’s you! — to embrace a more self-reliant lifestyle, one small step at a time.</span></p><span data-dcnode-id="5944" instrument_node="">

</span></ul><span data-dcnode-id="5933" instrument_node="">
</span><p data-dcnode-id="5930"><a data-dcnode-id="5931" href="https://www.attainable-sustainable.net/5-gallon-garden/"><img alt="5-gallon garden logo" class="aligncenter wp-image-22493 size-full" data-dcnode-id="5932" height="200" sizes="(max-width: 300px) 100vw, 300px" src="https://www.attainable-sustainable.net/wp-content/uploads/2021/03/5-gallon-garden-logo.png" srcset="https://www.attainable-sustainable.net/wp-content/uploads/2021/03/5-gallon-garden-logo.png 300w, https://www.attainable-sustainable.net/wp-content/uploads/2021/03/5-gallon-garden-logo-150x100.png 150w" width="300"/></a></p><span data-dcnode-id="5929" instrument_node="">
</span><p data-dcnode-id="5924"><span data-dcnode-id="5928" instrument_node="">Limited on space? Don’t let that keep you from growing some of your own food! In my 5-Gallon Garden course, I’ll show you how to grow food in the space you have! </span><a data-dcnode-id="5926" href="https://www.attainable-sustainable.net/5-gallon-garden/"><span data-dcnode-id="5927" instrument_node="">Learn more about it here</span></a><span data-dcnode-id="5925" instrument_node="">.</span></p><span data-dcnode-id="5923" instrument_node="">

</span><p data-dcnode-id="5757"><span data-dcnode-id="5761" instrument_node="">Figs can also be propagated with cuttings. In late winter or early spring, take a cutting of a branch from the previous season’s wood. Choose a branch that is three to ten inches long. Press it into sterile potting medium. Water with </span><a data-dcnode-id="5759" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.attainable-sustainable.net/rooting-hormone/"><span data-dcnode-id="5760" instrument_node="">willow water to encourage rooting</span></a><span data-dcnode-id="5758" instrument_node="">. Cover the pot with a plastic bag or cloche, to prevent the scion from drying out before it roots.</span></p><span data-dcnode-id="5756" instrument_node="">
</span><p data-dcnode-id="5754"><span data-dcnode-id="5755" instrument_node="">Keep the temperature around 70°F using a heat mat under the pot. Allow the surface of the potting medium to dry out between watering. Figs root quickly. Cuttings that are started in early spring will be ready to pot up in the fall.</span></p><div class="atm-ad-slot" data-dcnode-id="5753" data-slot-type="injected-ad"></div><span data-dcnode-id="5752" instrument_node="">
</span><h3 data-dcnode-id="5750" id="produce"><span data-dcnode-id="5751" instrument_node="">How long before the new fig tree produces fruit</span></h3><span data-dcnode-id="5749" instrument_node="">
</span><p data-dcnode-id="5747"><span data-dcnode-id="5748" instrument_node="">Container-grown figs started by&nbsp;cutting produce fruit four to six years from the time the cutting is made. The first year after propagation, the cutting establishes a strong root system. Once the tree begins to fruit, you can expect two crops each year – the breba crop and the main season crop. In zones 6 and colder, don’t try to over-winter figs out of doors. Instead, place the dormant plants in an unheated garage, or basement, where you can protect them from cold temperatures. You should continue watering them even in winter, allowing the soil surface to dry between watering.</span></p><span data-dcnode-id="5746" instrument_node="">
</span><p data-dcnode-id="5741" style="text-align: center;"><strong data-dcnode-id="5742"><span data-dcnode-id="5745" instrument_node="">Related:&nbsp;</span><a class="yoast-link-suggestion__value" data-dcnode-id="5743" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.attainable-sustainable.net/growing-blueberries/" rel="noopener"><span data-dcnode-id="5744" instrument_node="">How to: Growing Blueberries in Containers</span></a></strong></p><span data-dcnode-id="5740" instrument_node="">
