</span><div class="rte-setting" data-dcnode-id="1022"><span data-dcnode-id="1032" instrument_node=""> </span><span class="quote-icon" data-dcnode-id="1029"><svg aria-hidden="true" class="icon icon-quote" data-dcnode-id="1030" focusable="false" role="presentation" viewBox="0 0 41 35"><path d="M10.208 17.711h6.124v16.332H0V21.684C0 8.184 5.444.956 16.332 0v6.125c-4.083 1.14-6.124 4.414-6.124 9.82v1.766zm24.498 0h6.124v16.332H24.498V21.684C24.498 8.184 29.942.956 40.83 0v6.125c-4.083 1.14-6.124 4.414-6.124 9.82v1.766z" data-dcnode-id="1031" fill="#000" fill-rule="evenodd"></path></svg></span><span data-dcnode-id="1028" instrument_node=""> </span><p data-dcnode-id="1026"><span data-dcnode-id="1027" instrument_node="">This year (spring 2016) is my second year ordering from Trees of Antiquity. I've ordered from many different nurseries over the years, and I've never gotten better specimens than what I get from Trees of Antiquity. They are my go-to place from now on. Currently in my yard I have 6 fig trees, 5 apple trees, 1 almond tree, 1 pear, 1 persimmon, and 1 pluot from TOA. They were all very healthy on arrival and vigorous when they broke dormancy. They were also generally larger than similarly described trees from elsewhere and shaped more to my liking. Every single one of the plants in my yard would be from TOA if they had carried the particular varieties I was looking for. I highly recommend this seller.</span></p><p data-dcnode-id="1023"><em data-dcnode-id="1024"><span data-dcnode-id="1025" instrument_node="">Courtesy Dave's Garden</span></em></p></div><span data-dcnode-id="1021" instrument_node="">
