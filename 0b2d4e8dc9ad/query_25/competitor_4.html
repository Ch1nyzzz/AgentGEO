</span><h2 data-dcnode-id="4396"><span data-dcnode-id="4397" instrument_node="">How fruit trees add value to any Bay Area garden</span></h2><span data-dcnode-id="4395" instrument_node="">
From the inner city of San Francisco to the outer boundaries of the Bay Area, growing a wide variety of delicious fruit is possible with just a little effort.</span><br data-dcnode-id="4394"><span data-dcnode-id="4393" instrument_node="">
</span><br data-dcnode-id="4392"><span data-dcnode-id="4391" instrument_node="">
When an edible fruit tree is added to a garden, it provides many attractive benefits including:</span><br data-dcnode-id="4390"><span data-dcnode-id="4389" instrument_node="">
</span><br data-dcnode-id="4388"><span data-dcnode-id="4387" instrument_node="">
</span><ul data-dcnode-id="4361"><span data-dcnode-id="4386" instrument_node="">
</span><li data-dcnode-id="4384"><span data-dcnode-id="4385" instrument_node="">|&nbsp;&nbsp;Unique fruit variety + taste</span></li><span data-dcnode-id="4383" instrument_node="">
</span><li data-dcnode-id="4381"><span data-dcnode-id="4382" instrument_node="">|&nbsp;&nbsp;Reduced demand for store-bought + conventionally grown fruit</span></li><span data-dcnode-id="4380" instrument_node="">
</span><li data-dcnode-id="4378"><span data-dcnode-id="4379" instrument_node="">|&nbsp;&nbsp;Improved soil quality + fertility</span></li><span data-dcnode-id="4377" instrument_node="">
</span><li data-dcnode-id="4375"><span data-dcnode-id="4376" instrument_node="">|&nbsp;&nbsp;Attracts pollinators—birds, bees + butterflies</span></li><span data-dcnode-id="4374" instrument_node="">
</span><li data-dcnode-id="4372"><span data-dcnode-id="4373" instrument_node="">|&nbsp;&nbsp;Adds ornamental + aesthetic value</span></li><span data-dcnode-id="4371" instrument_node="">
</span><li data-dcnode-id="4369"><span data-dcnode-id="4370" instrument_node="">|&nbsp;&nbsp;Seasonal beauty with abundant flowers + color</span></li><span data-dcnode-id="4368" instrument_node="">
</span><li data-dcnode-id="4366"><span data-dcnode-id="4367" instrument_node="">|&nbsp;&nbsp;Removes carbon dioxide</span></li><span data-dcnode-id="4365" instrument_node="">
</span><li data-dcnode-id="4363"><span data-dcnode-id="4364" instrument_node="">|&nbsp;&nbsp;Releases oxygen + cleans the air&nbsp;</span></li><span data-dcnode-id="4362" instrument_node="">
</span></ul><span data-dcnode-id="4360" instrument_node="">
</span><br data-dcnode-id="4359"><span data-dcnode-id="4358" instrument_node="">

</span><div class="elementor-text-editor elementor-clearfix" data-dcnode-id="4012"><span data-dcnode-id="4028" instrument_node="">
</span><p data-dcnode-id="4026"><span data-dcnode-id="4027" instrument_node="">Fruit trees for the Bay Area can be pruned to be smaller, but keeping a standard tree only 10′ tall will require more attention and may stress the tree more than keeping a semi-dwarf tree that size.</span></p><span data-dcnode-id="4025" instrument_node="">
</span><p data-dcnode-id="4023"><span data-dcnode-id="4024" instrument_node="">Larger stone fruits like plums and pluots are very desirable for their taste and flavor. However, these specimens must be pruned regularly each season or the branches will collapse from the fruit weight.</span></p><span data-dcnode-id="4022" instrument_node="">
</span><p data-dcnode-id="4020"><span data-dcnode-id="4021" instrument_node="">Persimmons, pomegranates, figs, and citrus, on the other hand, require little pruning and virtually no disease prevention spraying at all.</span></p><span data-dcnode-id="4019" instrument_node="">
</span><p data-dcnode-id="4014"><span data-dcnode-id="4018" instrument_node="">It’s important to keep a dense foliage canopy on fruit trees for the Bay Area so that the fruit isn’t damaged in seasonally hot summer weather. With the increasing </span><a data-dcnode-id="4016" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//pacificnurseries.com/how-fire-resistant-is-your-landscape/"><span data-dcnode-id="4017" instrument_node="">effects of climate change</span></a><span data-dcnode-id="4015" instrument_node="">, it’s not uncommon for trees to experience +100° degree weather in many parts of Northern California.</span></p><span data-dcnode-id="4013" instrument_node=""> </span></div><span data-dcnode-id="4011" instrument_node="">
</span></div><span data-dcnode-id="4009" instrument_node="">
</span></div><span data-dcnode-id="4007" instrument_node="">
</span></div><span data-dcnode-id="4005" instrument_node="">
</span></div><span data-dcnode-id="4003" instrument_node="">

</span><div class="elementor-widget-container" data-dcnode-id="3981"><span data-dcnode-id="3987" instrument_node="">
</span><h2 data-dcnode-id="3983" id="pollination"><span data-dcnode-id="3985" style="color: #000000;"><span data-dcnode-id="3986" instrument_node="">Pollination</span></span><span data-dcnode-id="3984" instrument_node=""> | Bearing fruit for the next generation</span></h2><span data-dcnode-id="3982" instrument_node=""> </span></div><span data-dcnode-id="3980" instrument_node="">
</span></div><span data-dcnode-id="3978" instrument_node="">
</span><div class="elementor-element elementor-element-f0cc9eb elementor-widget elementor-widget-text-editor" data-dcnode-id="3956" data-element_type="widget" data-id="f0cc9eb" data-widget_type="text-editor.default"><span data-dcnode-id="3977" instrument_node="">
</span><div class="elementor-widget-container" data-dcnode-id="3958"><span data-dcnode-id="3976" instrument_node="">
</span><div class="elementor-text-editor elementor-clearfix" data-dcnode-id="3960"><span data-dcnode-id="3975" instrument_node="">
</span><p data-dcnode-id="3971"><a data-dcnode-id="3973" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.fs.fed.us/wildflowers/pollinators/What_is_Pollination/" rel="noopener noreferrer" target="_blank"><span data-dcnode-id="3974" instrument_node="">Pollination</span></a><span data-dcnode-id="3972" instrument_node=""> is the act of transferring pollen grains from the male anther of a flower to the female stigma that begins the creation of the next generation of fruit-producing trees.</span></p><span data-dcnode-id="3970" instrument_node="">
</span><p data-dcnode-id="3968"><span data-dcnode-id="3969" instrument_node="">Some fruit trees require a different variety of the same species to pollinate the fruit. This can mean that two apple trees, for example, are needed to actually produce fruit.</span></p><span data-dcnode-id="3967" instrument_node="">
</span><p data-dcnode-id="3962"><span data-dcnode-id="3966" instrument_node="">Other varieties are “self-fruitful” and don’t require a second pollinator tree. It’s best to </span><a data-dcnode-id="3964" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//pacificnurseries.com/contact/%3Futm%3Dfruittreesalesteam/"><span data-dcnode-id="3965" instrument_node="">check with one of our nursery specialists</span></a><span data-dcnode-id="3963" instrument_node=""> before you make a tree selection that could require two trees to bear fruit.</span></p><span data-dcnode-id="3961" instrument_node=""> </span></div><span data-dcnode-id="3959" instrument_node="">
</span></div><span data-dcnode-id="3957" instrument_node="">
</span></div><span data-dcnode-id="3955" instrument_node="">
</span></div><span data-dcnode-id="3953" instrument_node="">

</span></div><span data-dcnode-id="3949" instrument_node="">

</span><section class="elementor-section elementor-top-section elementor-element elementor-element-93b0f3d elementor-section-boxed elementor-section-height-default elementor-section-height-default" data-dcnode-id="3892" data-element_type="section" data-id="93b0f3d" data-particle-mobile-disabled="false" data-particle_enable="false"><span data-dcnode-id="3942" instrument_node="">

</span><div class="elementor-text-editor elementor-clearfix" data-dcnode-id="3908"><span data-dcnode-id="3923" instrument_node="">
				The many microclimate zones of the Bay Area should influence the choice of fruit tree and specimen variety that you recommend to your client.</span><br data-dcnode-id="3922"><span data-dcnode-id="3921" instrument_node="">
</span><br data-dcnode-id="3920"><span data-dcnode-id="3919" instrument_node="">
A critical factor to consider is the number of hours that the fruit tree will receive that are chilled or very cold. Chill hours are the number of hours at </span><strong data-dcnode-id="3917"><span data-dcnode-id="3918" instrument_node="">45°</span></strong><span data-dcnode-id="3916" instrument_node="">F | </span><strong data-dcnode-id="3914"><span data-dcnode-id="3915" instrument_node="">7°</span></strong><span data-dcnode-id="3913" instrument_node="">C or less than a fruit tree needs each winter in order to set fruit, break dormancy, flower, and bear fruit the next season.</span><br data-dcnode-id="3912"><span data-dcnode-id="3911" instrument_node="">
</span><br data-dcnode-id="3910"><span data-dcnode-id="3909" instrument_node="">And once winter transitions to spring and summer, fruit sweetness from many trees will depend on the intensity and duration of summer heat. So locating a fruit tree for maximum sun exposure will improve the opportunity for a healthy and productive tree.					</span></div><span data-dcnode-id="3907" instrument_node="">

</span><div class="elementor-text-editor elementor-clearfix" data-dcnode-id="3785"><span data-dcnode-id="3839" instrument_node="">
				Another essential consideration for selecting the right tree is how much fruit the tree will yield.</span><p data-dcnode-id="3838"></p><span data-dcnode-id="3837" instrument_node="">
</span><p data-dcnode-id="3833"><span data-dcnode-id="3836" instrument_node="">For example, a mature apple tree can provide 100 lbs of apples at harvest time. That’s a lot of fruit deal with and more including:</span><br data-dcnode-id="3835"><span data-dcnode-id="3834" instrument_node="">
</span></p><ul data-dcnode-id="3817"><span data-dcnode-id="3832" instrument_node="">
</span><li data-dcnode-id="3830"><span data-dcnode-id="3831" instrument_node="">| Soft-fruit has a short shelf-life</span></li><span data-dcnode-id="3829" instrument_node="">
</span><li data-dcnode-id="3827"><span data-dcnode-id="3828" instrument_node="">| Fallen fruit needs to be removed for disease prevention</span></li><span data-dcnode-id="3826" instrument_node="">
</span><li data-dcnode-id="3824"><span data-dcnode-id="3825" instrument_node="">| High fallen-fruit volumes can be messy</span></li><span data-dcnode-id="3823" instrument_node="">
</span><li data-dcnode-id="3819"><span data-dcnode-id="3822" instrument_node="">| Fallen fruit that’s not removed can promote unwanted insects—such as </span><a data-dcnode-id="3820" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.healthline.com/health/yellow-jacket-stings" rel="noopener noreferrer" target="_blank"><span data-dcnode-id="3821" instrument_node="">stinging yellow jackets</span></a></li><span data-dcnode-id="3818" instrument_node="">
</span></ul><span data-dcnode-id="3816" instrument_node="">
</span><br data-dcnode-id="3815"><span data-dcnode-id="3814" instrument_node="">
While there are many options for harvested fruit, they all take time and some forward planning. So when a bountiful fruit crop arrives from a healthy fruit tree your customer will have to consider:</span><br data-dcnode-id="3813"><span data-dcnode-id="3812" instrument_node="">
</span><br data-dcnode-id="3811"><span data-dcnode-id="3810" instrument_node="">
</span><ul data-dcnode-id="3787"><span data-dcnode-id="3809" instrument_node="">
</span><li data-dcnode-id="3807"><span data-dcnode-id="3808" instrument_node="">| Eating as much fresh as they can</span></li><span data-dcnode-id="3806" instrument_node="">
</span><li data-dcnode-id="3804"><span data-dcnode-id="3805" instrument_node="">| Sharing with neighbors</span></li><span data-dcnode-id="3803" instrument_node="">

				According to the </span><strong data-dcnode-id="3651"><span data-dcnode-id="3652" instrument_node="">University of California Davis</span></strong><span data-dcnode-id="3650" instrument_node="">, Division of Agriculture and Natural Resources, </span><a data-dcnode-id="3648" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//homeorchard.ucanr.edu/The_Big_Picture/Pests_%26_Diseases/" rel="noopener noreferrer" target="_blank"><span data-dcnode-id="3649" instrument_node="">Integrated Pest Management</span></a><span data-dcnode-id="3647" instrument_node=""> | IPM is one of the most effective methods of encouraging natural predators to control pests in a garden or landscape.</span><br data-dcnode-id="3646"><span data-dcnode-id="3645" instrument_node="">
</span><br data-dcnode-id="3644"><span data-dcnode-id="3643" instrument_node="">
</span><p data-dcnode-id="3641"><span data-dcnode-id="3642" instrument_node="">Nature provides a balance between plant pests and the beneficial insects that control the pests. The less you tamper with that balance, the more likely a fruit tree will be successful.</span></p><span data-dcnode-id="3640" instrument_node=""> </span></div><span data-dcnode-id="3638" instrument_node="">

</span><p data-dcnode-id="3570"><span data-dcnode-id="3574" instrument_node="">IPM recommends the use of chemical controls </span><em data-dcnode-id="3572"><span data-dcnode-id="3573" instrument_node="">only when necessary</span></em><span data-dcnode-id="3571" instrument_node=""> in recommended amounts to minimize negative effects on beneficial insects or other species. For effective IPM compliance, the use of the most environmentally safe sprays should also be applied only at the right seasonal time.</span></p><span data-dcnode-id="3569" instrument_node="">
</span><p data-dcnode-id="3567"><span data-dcnode-id="3568" instrument_node="">Many disease issues or pests do not become problems until a tree begins to bear fruit. The table above is a helpful guide for Integrated Pest Management on popular fruit trees for the Bay Area. So if one or more of these diseases or pests are not present on a fruit tree, the application of disease preventative chemicals should be avoided.</span></p><span data-dcnode-id="3566" instrument_node="">

</span><p data-dcnode-id="3557"><span data-dcnode-id="3558" instrument_node="">If you have limited space, want a manageable yield of fruit, or just want to install something that adds a strong sculptural statement to a garden, an espalier fruit tree could be just the right solution.</span></p><span data-dcnode-id="3556" instrument_node=""> </span></div><span data-dcnode-id="3554" instrument_node="">

</span><p data-dcnode-id="3492"><span data-dcnode-id="3493" instrument_node="">Espalier is the art of growing fruit trees—usually apples or pears—by training the branches to grow horizontally along cordons similar to how grapevines are grown.</span></p><span data-dcnode-id="3491" instrument_node="">

</span><p data-dcnode-id="3173"><span data-dcnode-id="3177" instrument_node="">There are hundreds of apple varieties, and some varieties have several strains, each with its own characteristics. </span><strong data-dcnode-id="3175"><span data-dcnode-id="3176" instrument_node="">Apples</span></strong><span data-dcnode-id="3174" instrument_node=""> that are well adapted to the Bay Area include the Fuji and Gala varieties.</span></p><span data-dcnode-id="3172" instrument_node="">
</span><p data-dcnode-id="3170"><span data-dcnode-id="3171" instrument_node="">These trees prefer moist, well-drained soil with lots of sun. A cool climate is needed for good coloration and the production of fruit. Winter chilling requirements are between 1200–1500 hours below 45°F. Foggy days and wet dews can cause heavy cosmetic russeting on fruit.</span></p><span data-dcnode-id="3169" instrument_node="">
</span><p data-dcnode-id="3165"><span data-dcnode-id="3167" instrument_node="">
</span></p><span data-dcnode-id="3164" instrument_node="">
</span><p data-dcnode-id="3162"><span data-dcnode-id="3163" instrument_node="">It’s best to plant apple trees in the cold season from January through to March.</span></p><span data-dcnode-id="3161" instrument_node="">
</span><p data-dcnode-id="3157"><span data-dcnode-id="3159" instrument_node="">
</span></p><span data-dcnode-id="3156" instrument_node="">
</span><p data-dcnode-id="3154"><span data-dcnode-id="3155" instrument_node="">Apple trees also require cross-pollination from another variety that blooms at the same time and produces abundant amounts of pollen. Gala, for example, is a self-fertile variety, but planting it with another pollinating variety will yield better tree health and fruit production results.</span></p><span data-dcnode-id="3153" instrument_node=""> </span></div><span data-dcnode-id="3151" instrument_node="">

</span><div class="elementor-text-editor elementor-clearfix" data-dcnode-id="3026"><span data-dcnode-id="3050" instrument_node="">
</span><p data-dcnode-id="3046"><strong data-dcnode-id="3048"><span data-dcnode-id="3049" instrument_node="">Avocados</span></strong><span data-dcnode-id="3047" instrument_node=""> are a healthy fat-filled superfood that provides essential components of a nutrient-dense diet. They are also savory and simply delicious.</span></p><span data-dcnode-id="3045" instrument_node="">
</span><p data-dcnode-id="3043"><span data-dcnode-id="3044" instrument_node="">Avocado trees do best in a southern-facing, full sun location that has well-drained soil that soaks up excess moisture. They can grow to 40—80′ with foliage canopies that are usually low and dense. Because these trees can get quite large over time, a planting area of 25—30′ is recommended.</span></p><span data-dcnode-id="3042" instrument_node="">
</span><p data-dcnode-id="3040"><span data-dcnode-id="3041" instrument_node="">In order to promote flowering and produce fruit, Avocados need very little chilling time between 32—45°F during the dormant season.</span></p><span data-dcnode-id="3039" instrument_node="">
</span><p data-dcnode-id="3037"><span data-dcnode-id="3038" instrument_node="">Most avocados varieties are considered “self-fruitful” and therefore do not need a partner tree for cross-pollination.</span></p><span data-dcnode-id="3036" instrument_node="">
</span><p data-dcnode-id="3034"><span data-dcnode-id="3035" instrument_node="">However, every avocado variety is either a Type A or Type B tree. For example, Hass is a Type A and Fuerte is a Type B tree. In order to encourage optimal fruit development, it’s best if both type A and type B avocado trees are planted in close proximity to one another.</span></p><span data-dcnode-id="3033" instrument_node="">
</span><p data-dcnode-id="3031"><span data-dcnode-id="3032" instrument_node="">Interestingly, Avocados can develop fruit without a partner tree. Hass and Reed, for example, do produce a fruit crop when grown solo. But with the opposite Type A or Type B partner tree planted close by one another, a more successful and higher volume crop is ensured.</span></p><span data-dcnode-id="3030" instrument_node="">
</span><p data-dcnode-id="3028"><span data-dcnode-id="3029" instrument_node="">Avocado fruit has to be harvested by hand so if it isn’t picked, it won’t fall off the tree and it won’t ripen. Fortunately, the tree can be used as a storage unit for as long as 8 months. Harvest can begin as early as February and as late as September. And the longer the fruit stays on the tree, the richer the taste. Yum!</span></p><span data-dcnode-id="3027" instrument_node=""> </span></div><span data-dcnode-id="3025" instrument_node="">

</span><p data-dcnode-id="2921"><strong data-dcnode-id="2923"><span data-dcnode-id="2924" instrument_node="">Figs</span></strong><span data-dcnode-id="2922" instrument_node=""> are a great choice for Bay Area gardens because they are so easy to grow.</span></p><span data-dcnode-id="2920" instrument_node="">
</span><p data-dcnode-id="2918"><span data-dcnode-id="2919" instrument_node="">However, they do require 6-8 hours of full sun and heat for the fruit to mature properly. Fig trees do best in well-drained soils but will tolerate wet soils better than most other fruit trees.</span></p><span data-dcnode-id="2917" instrument_node="">
</span><p data-dcnode-id="2915"><span data-dcnode-id="2916" instrument_node="">These trees with great sculptural leaves only require 100 hours of chill time below 45°F. If you’re considering a fig tree, be forewarned, gophers love them and preventing these pests from causing havoc or destruction can be a challenge.</span></p><span data-dcnode-id="2914" instrument_node="">
</span><p data-dcnode-id="2909"><span data-dcnode-id="2913" instrument_node="">Fig trees reach a height of 20–30′ with an equal spread. They can also be pruned to a smaller size. Most varieties require no cross-pollination and through </span><a data-dcnode-id="2911" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.britannica.com/science/parthenocarpy" rel="noopener noreferrer" target="_blank"><span data-dcnode-id="2912" instrument_node="">parthenocarpy</span></a><span data-dcnode-id="2910" instrument_node="">, they can produce more than one fruit crop each year.</span></p><span data-dcnode-id="2908" instrument_node=""> </span></div><span data-dcnode-id="2906" instrument_node="">

</span><p data-dcnode-id="2742"><strong data-dcnode-id="2744"><span data-dcnode-id="2745" instrument_node="">Persimmons</span></strong><span data-dcnode-id="2743" instrument_node=""> are an excellent choice for Bay Area gardens. However, in San Francisco and on the coast they require a sheltered sunny location to produce fruit.</span></p><span data-dcnode-id="2741" instrument_node="">
</span><p data-dcnode-id="2739"><span data-dcnode-id="2740" instrument_node="">In the right location, they can produce so much fruit that branches can break from the weight. Therefore, thinning may be required to retain form and tree health. Persimmons bloom late in summer and only require 100 hours of chill time below 45°F.</span></p><span data-dcnode-id="2738" instrument_node="">
</span><p data-dcnode-id="2736"><span data-dcnode-id="2737" instrument_node="">Persimmon trees also don’t need ideal soil and they will tolerate damp roots in winter and dry conditions in the summer. Cross-pollination is not usually necessary for the trees to bear fruit.</span></p><span data-dcnode-id="2735" instrument_node="">
</span><p data-dcnode-id="2733"><span data-dcnode-id="2734" instrument_node="">And when the delicious fruit arrives, it’s a brilliant orange color and is mostly pest-free. Persimmon trees can also grow quite large and should be planted about 20′ apart.</span></p><span data-dcnode-id="2732" instrument_node=""> </span></div><span data-dcnode-id="2730" instrument_node="">

</span><p data-dcnode-id="2568"><strong data-dcnode-id="2570"><span data-dcnode-id="2571" instrument_node="">Pomegranates</span></strong><span data-dcnode-id="2569" instrument_node=""> are exotic fruits that grow on a small tree that can reach 15—20′ tall.</span></p><span data-dcnode-id="2567" instrument_node="">
</span><p data-dcnode-id="2565"><span data-dcnode-id="2566" instrument_node="">The trees have a long life with shiny bright green foliage with a long flowering season. Pomegranate trees are sensitive to frost in fall and spring and do not mature well in cool climates.</span></p><span data-dcnode-id="2564" instrument_node="">
</span><p data-dcnode-id="2562"><span data-dcnode-id="2563" instrument_node="">They tolerate wet, heavy soils but perform best in deep, well-drained conditions. What makes them ideal fruit trees for the Bay Area is that they require a short 100-150 hours of chill time below 45°F.</span></p><span data-dcnode-id="2561" instrument_node="">
</span><p data-dcnode-id="2559"><span data-dcnode-id="2560" instrument_node="">They are relatively disease resistant and are not attractive to many fruit pests including codling moth or twig borer.</span></p><span data-dcnode-id="2558" instrument_node=""> </span></div><span data-dcnode-id="2556" instrument_node="">

</span><p data-dcnode-id="2452"><strong data-dcnode-id="2454"><span data-dcnode-id="2455" instrument_node="">Plum</span></strong><span data-dcnode-id="2453" instrument_node=""> trees are one of the best-adapted fruit tree species for almost anywhere in the Bay Area. They are very easy to grow and are tolerant of wet winter soils and dry summer conditions. Plumbs often bloom late enough to avoid most spring frosts and they have few pest problems.</span></p><span data-dcnode-id="2451" instrument_node="">
</span><p data-dcnode-id="2449"><span data-dcnode-id="2450" instrument_node="">There are two different kinds of plums—Japanese and European. Most Japanese plums bloom earlier and mature earlier. They also require less chilling than European plums. Both types of plums require about 140–170 days to mature the crop.</span></p><span data-dcnode-id="2448" instrument_node="">
</span><p data-dcnode-id="2446"><span data-dcnode-id="2447" instrument_node="">Most Japanese plum varieties need 500—900 hours of chill time below 45°F, while European plum varieties often require 700—1,000 hours.</span></p><span data-dcnode-id="2445" instrument_node="">
</span><p data-dcnode-id="2440"><span data-dcnode-id="2444" instrument_node="">Plum trees get relatively large and should be spaced 12–18′ apart. Most plums require cross-pollination so it’s a good idea to plant two different varieties to ensure maximum fruit production. Check with one of our </span><a data-dcnode-id="2442" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//pacificnurseries.com/team/"><span data-dcnode-id="2443" instrument_node="">seasoned specialists</span></a><span data-dcnode-id="2441" instrument_node=""> to learn if the variety you’re interested in requires a pollinating partner tree.</span></p><span data-dcnode-id="2439" instrument_node=""> </span></div><span data-dcnode-id="2437" instrument_node="">

</span><p data-dcnode-id="2332"><span data-dcnode-id="2336" instrument_node="">If your Bay Area clients are looking for citrus fruit all year long with delicious, bright orange-yellow fruit, dark green leaves, and intensely fragrant flowers, then a </span><strong data-dcnode-id="2334"><span data-dcnode-id="2335" instrument_node="">Meyer lemon</span></strong><span data-dcnode-id="2333" instrument_node=""> could be a great solution.</span></p><span data-dcnode-id="2331" instrument_node="">
</span><p data-dcnode-id="2329"><span data-dcnode-id="2330" instrument_node="">The Meyer lemon fruit is a rich orange-yellow in color and is thinner-skinned and sweeter tasting than the more acidic lemon varieties such as Eureka or Lisbon which are the most common lemons found in grocery stores.</span></p><span data-dcnode-id="2328" instrument_node="">
</span><p data-dcnode-id="2326"><span data-dcnode-id="2327" instrument_node="">Meyer lemon trees are self-pollinated and grow to about 10′ tall. They also make an excellent hedge because they need little or no pruning. These hard-working trees can also tolerate colder weather than most citrus and require no minimum amount of chill time to bear fruit. In severe cold below 20°F, they should be covered to avoid frost damage.</span></p><span data-dcnode-id="2325" instrument_node="">
</span><p data-dcnode-id="2323"><span data-dcnode-id="2324" instrument_node="">Meyer lemon trees perform best when planted in sandy loam and they prefer moist soil that’s not soggy. Allow adequate dry out time between waterings to prevent disease. They also benefit from generous additions of mulch for conserving water and improving soil quality.</span></p><span data-dcnode-id="2322" instrument_node=""> </span></div><span data-dcnode-id="2320" instrument_node="">

</span><p data-dcnode-id="2158"><span data-dcnode-id="2159" instrument_node="">If your client is interested in a low-maintenance, drought-tolerant, and unusual fruit tree, a Mulberry is a great candidate worth considering.</span></p><span data-dcnode-id="2157" instrument_node="">
</span><p data-dcnode-id="2153"><strong data-dcnode-id="2155"><span data-dcnode-id="2156" instrument_node="">Mulberries</span></strong><span data-dcnode-id="2154" instrument_node=""> are fast-growing, fruit trees that can reach 50′ tall with a crown height of about 5—6′ from ground level. They tolerate poor soil and will also accept soil with moist conditions.</span></p><span data-dcnode-id="2152" instrument_node="">
</span><p data-dcnode-id="2150"><span data-dcnode-id="2151" instrument_node="">These beautiful trees perform best when pruned once a year during the winter season. After the leaves have fallen, trimmed tree branches can be used to make durable baskets or other agricultural crafts.</span></p><span data-dcnode-id="2149" instrument_node="">
</span><p data-dcnode-id="2147"><span data-dcnode-id="2148" instrument_node="">Mulberries set fruit without pollination and only require about 400 hours of chill time between 32—45° F. Their fruit resembles a rustic blackberry which turns from pink to red while ripening, then dark purple or black in late spring to early summer. The result is a sweet, delicious, unique berry flavor when fully ripe.</span></p><span data-dcnode-id="2146" instrument_node=""> </span></div><span data-dcnode-id="2144" instrument_node="">

</span><div class="elementor-text-editor elementor-clearfix" data-dcnode-id="2026"><span data-dcnode-id="2047" instrument_node="">
</span><p data-dcnode-id="2043"><strong data-dcnode-id="2045"><span data-dcnode-id="2046" instrument_node="">Loquats</span></strong><span data-dcnode-id="2044" instrument_node=""> are easy to grow as small trees or large evergreen shrubs that are often used as an ornamental plant in Bay Area gardens.</span></p><span data-dcnode-id="2042" instrument_node="">
</span><p data-dcnode-id="2040"><span data-dcnode-id="2041" instrument_node="">These trees feature boldly textured foliage add a tropical look that adds texture and contrast to other plants in a garden. Classified as a subtropical fruit, loquats are grown most successfully in hotter, citrus-friendly Bay Area regions with higher heat.</span></p><span data-dcnode-id="2039" instrument_node="">
</span><p data-dcnode-id="2037"><span data-dcnode-id="2038" instrument_node="">The tree structure includes a rounded crown, short trunk, and woolly new twigs. It can grow 20—30′ high but usually is about 10′ tall. It blooms in late fall to early winter and must mature its fruit during the winter months. Loquats also require very little or no chill hours.</span></p><span data-dcnode-id="2036" instrument_node="">
</span><p data-dcnode-id="2034"><span data-dcnode-id="2035" instrument_node="">The fruit grows in pear-shaped, yellow, or orange clusters and the taste features a succulent, tangy flesh that’s sweet and acidic.</span></p><span data-dcnode-id="2033" instrument_node="">
</span><p data-dcnode-id="2031"><span data-dcnode-id="2032" instrument_node="">The loquat is normally pollinated by bees with self-infertile or partially self-fertile cultivars available. Although the loquat is remarkably drought resistant, it needs regular irrigation to remain healthy, particularly in the summer season. Loquats also prefer loamy, well-draining soil.</span></p><span data-dcnode-id="2030" instrument_node="">
</span><p data-dcnode-id="2028"><span data-dcnode-id="2029" instrument_node="">A Loquat is a great choice for an espaliered tree if it’s clipped frequently to maintain form. It’s also quite resistant to most diseases and insect damage.</span></p><span data-dcnode-id="2027" instrument_node=""> </span></div><span data-dcnode-id="2025" instrument_node="">

</span><p data-dcnode-id="1920"><span data-dcnode-id="1924" instrument_node="">Blenheim </span><strong data-dcnode-id="1922"><span data-dcnode-id="1923" instrument_node="">Apricot</span></strong><span data-dcnode-id="1921" instrument_node=""> trees are a favorite for your clients who are looking for a great fruit tree that will do well in the Mediterranean climate zones of the Bay Area.</span></p><span data-dcnode-id="1919" instrument_node="">
</span><p data-dcnode-id="1917"><span data-dcnode-id="1918" instrument_node="">These flavorful beauties reach 10—20′ tall and 10—15′ wide. They perform best in full sun with moist, well-drained soil. Apricots also require 400 hours of chill time below 45°F in the winter to prepare for spring buds.</span></p><span data-dcnode-id="1916" instrument_node="">
</span><p data-dcnode-id="1914"><span data-dcnode-id="1915" instrument_node="">They bloom in February and early March and do best in conditions with dry spring weather. Apricots are also susceptible to late spring frosts and bacterial canker is a common disease of young trees in the Bay Area.</span></p><span data-dcnode-id="1913" instrument_node="">
</span><p data-dcnode-id="1911"><span data-dcnode-id="1912" instrument_node="">Trees should be planted about a 10—20′ apart and they begin fruiting in their second year. Apricots are mostly self-fruitful and ripen in late June to July. The fruit is sweet, aromatic, and juicy which makes it great for eating, baking, drying, or canning.</span></p><span data-dcnode-id="1910" instrument_node=""> </span></div><span data-dcnode-id="1908" instrument_node="">

</span><p data-dcnode-id="1807"><strong data-dcnode-id="1809"><span data-dcnode-id="1810" instrument_node="">Pluots</span></strong><span data-dcnode-id="1808" instrument_node=""> are a relatively recent addition to the stone fruit family. As a hybrid, they were created by naturally crossing a plum with an apricot using hand pollination. The result is a tasty option to consider for just about any Bay Area garden.</span></p><span data-dcnode-id="1806" instrument_node="">
</span><p data-dcnode-id="1804"><span data-dcnode-id="1805" instrument_node="">The pluot is a naturally small tree, reaching 15—20′. They have growth requirements similar to those of plum trees including full sun and well-draining soil. Once established, they need less water and perform best with generous amounts of mulch to conserve moisture and prevent weeds.</span></p><span data-dcnode-id="1803" instrument_node="">
</span><p data-dcnode-id="1801"><span data-dcnode-id="1802" instrument_node="">Pluots need less than 400 hours of temperatures at 45°F or below to produce fruit. And they should be planted in late winter or early spring. Pluots also require more heat than most San Francisco or coastal locations can provide.</span></p><span data-dcnode-id="1800" instrument_node="">
</span><p data-dcnode-id="1798"><span data-dcnode-id="1799" instrument_node="">With a beautiful and striking appearance, pluots come in many varieties and colors ranging from black, green, and red. The fruit is very sweet and intensely flavorful, with the juicy texture and tangy skin of a plum and the floral flavors of apricot.</span></p><span data-dcnode-id="1797" instrument_node="">
</span><p data-dcnode-id="1795"><span data-dcnode-id="1796" instrument_node="">Trees are ready for harvest usually during late summer and early fall. Varieties including Flavor King hold well on the tree while remaining firm for a short period after maturity.</span></p><span data-dcnode-id="1794" instrument_node=""> </span></div><span data-dcnode-id="1792" instrument_node="">

</span><p data-dcnode-id="1628"><strong data-dcnode-id="1630"><span data-dcnode-id="1631" instrument_node="">Pears</span></strong><span data-dcnode-id="1629" instrument_node=""> are beautiful and delicious fruit trees that are worth considering for your client’s garden. However, they are the most pest-ridden of all fruit trees and require the most disease preventative maintenance to produce clean, appetizing fruit.</span></p><span data-dcnode-id="1627" instrument_node="">
</span><p data-dcnode-id="1625"><span data-dcnode-id="1626" instrument_node="">Pear trees can grow quite large reaching 20′ with a similar spread at maturity. As a result, they require a spacing of at least 18-20′ apart. Pear trees also have a natural upright structure and need to be trained and pruned to develop a spreading growth habit.</span></p><span data-dcnode-id="1624" instrument_node="">
</span><p data-dcnode-id="1622"><span data-dcnode-id="1623" instrument_node="">Many pears are tolerant of wet soil conditions but perform best in well-draining soil locations. And most pear varieties are self-sterile and require cross-pollination by another variety to get a good crop set.</span></p><span data-dcnode-id="1621" instrument_node="">
</span><p data-dcnode-id="1619"><span data-dcnode-id="1620" instrument_node="">The popular “Bartlett” pear tree is self-fruitful and requires no partner tree for pollination. Bartlett also requires about 1500 hours of chill time below 45°F for producing fruit.</span></p><span data-dcnode-id="1618" instrument_node="">
</span><p data-dcnode-id="1616"><span data-dcnode-id="1617" instrument_node="">Fire blight can be a serious problem in pears and preventive spray maintenance should be factored into choosing a pear for a Bay Area garden.</span></p><span data-dcnode-id="1615" instrument_node=""> </span></div><span data-dcnode-id="1613" instrument_node="">

</span><p data-dcnode-id="1560"><span data-dcnode-id="1584" instrument_node="">If you’re looking for some beautiful and delicious fruit tree solutions for your next project, we’ve got you covered.</span><br data-dcnode-id="1583"><br data-dcnode-id="1582"><span data-dcnode-id="1581" instrument_node="">As both a </span><a data-dcnode-id="1579" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//pacificnurseries.com/grower-or-broker-who-to-turn-to-for-your-plants/"><span data-dcnode-id="1580" instrument_node="">grower and a plant broker</span></a><span data-dcnode-id="1578" instrument_node="">, we’re ready to work with you to provide just the right fruit trees, edibles, and native, water-wise plants that will make your project a success.</span><br data-dcnode-id="1577"><br data-dcnode-id="1576"><span data-dcnode-id="1575" instrument_node="">It’s one of the many qualities that has made us different from just an ordinary nursery for over 150 years.</span><br data-dcnode-id="1574"><br data-dcnode-id="1573"><span data-dcnode-id="1572" instrument_node="">And if you want to know what’s in season and looking great right now for your project, check out our </span><a data-dcnode-id="1569" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//pacificnurseries.com/prime-plant-list/%3Futm%3Dfruittreeprimelist/"><strong data-dcnode-id="1570"><span data-dcnode-id="1571" instrument_node="">Prime Plant List</span></strong></a><span data-dcnode-id="1568" instrument_node=""> or our </span><a data-dcnode-id="1564" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//pacificnurseries.com/growing-plant-list/%3Futm%3Dfruittreegrowinglist/"><strong data-dcnode-id="1566"><span data-dcnode-id="1567" instrument_node="">Growing Plant List</span></strong><span data-dcnode-id="1565" instrument_node=""> </span></a><span data-dcnode-id="1563" instrument_node="">that’s an alphabetized list of what we’re growing right now.</span><br data-dcnode-id="1562"><span data-dcnode-id="1561" instrument_node="">
</span></p><p data-dcnode-id="1549"><span data-dcnode-id="1559" instrument_node="">These easy-to-use lists can help you find the exact plants that you’re looking for. And if the plant you want is not on our lists, we’ll do all that we can to </span><a data-dcnode-id="1557" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//pacificnurseries.com/get-plants-need/"><span data-dcnode-id="1558" instrument_node="">get you what you want, when you need it</span></a><span data-dcnode-id="1556" instrument_node="">. </span><br data-dcnode-id="1555"><span data-dcnode-id="1554" instrument_node="">
</span><br data-dcnode-id="1553"><span data-dcnode-id="1552" instrument_node="">To get a plant material Estimate or to place an Order, just click on over to use our </span><a data-dcnode-id="1550" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//pacificnurseries.com/estimate-order-form/%3Futm%3Dfruittreeestimate/"><span data-dcnode-id="1551" instrument_node="">ONLINE ESTIMATE | ORDER FORM.</span></a></p><span data-dcnode-id="1548" instrument_node=""> </span></div><span data-dcnode-id="1546" instrument_node="">
