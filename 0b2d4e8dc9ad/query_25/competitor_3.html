							</span></div><span data-dcnode-id="204" instrument_node="">
</span><h1 data-dcnode-id="202"><span data-dcnode-id="203" instrument_node="">Seasonal opportunities</span></h1><span data-dcnode-id="201" instrument_node="">
</span><div class="singlecol" data-dcnode-id="111"><span data-dcnode-id="200" instrument_node="">
</span><h2 data-dcnode-id="198"><span data-dcnode-id="199" instrument_node="">Thousands of Tasmanians find summer harvest work to be a fun and rewarding experience.</span></h2><span data-dcnode-id="197" instrument_node="">
</span><p data-dcnode-id="195"><span data-dcnode-id="196" instrument_node="">Each summer, Tasmanian businesses recruit more than 8,000 people to help bring in and process the summer harvest. These individuals come from all ages, cultures and backgrounds. This year, Tasmania’s food producers are expected to face unprecedented shortages of seasonal workers, and are asking anyone who might want to work some or all of the season to step forward and put their hands up.</span></p><span data-dcnode-id="194" instrument_node="">
</span><p data-dcnode-id="191"><a class="button" data-dcnode-id="192" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//dpipwe.tas.gov.au/agriculture/harvest-jobs" rel="noopener noreferrer" target="_blank"><span data-dcnode-id="193" instrument_node="">About Tassie Harvest Jobs</span></a></p><span data-dcnode-id="190" instrument_node="">
</span><hr data-dcnode-id="189"><span data-dcnode-id="188" instrument_node="">
</span><h2 data-dcnode-id="186"><span data-dcnode-id="187" instrument_node="">Seasonal work to suit your lifestyle</span></h2><span data-dcnode-id="185" instrument_node="">
</span><p data-dcnode-id="183"><span data-dcnode-id="184" instrument_node="">Seasonal harvest jobs can be a fun and rewarding experience, and there are jobs to suit all types of persons. For self-directed people who enjoy being outdoors, picking work gives you an opportunity to make new friends and compete with them to pick the most fruit and earn the most money. For those who prefer something a little quieter, thinning and packing shed work rewards people with focus and attention to detail.</span></p><span data-dcnode-id="182" instrument_node="">
</span><p data-dcnode-id="180"><span data-dcnode-id="181" instrument_node="">No matter which role you choose, you will be part of a supportive team, often working outside in the fresh air and you are bound to make new friends. You could try anything from:</span></p><span data-dcnode-id="179" instrument_node="">
</span><ul data-dcnode-id="162"><span data-dcnode-id="178" instrument_node="">
</span><li data-dcnode-id="176"><span data-dcnode-id="177" instrument_node="">picking and packing produce</span></li><span data-dcnode-id="175" instrument_node="">
</span><li data-dcnode-id="173"><span data-dcnode-id="174" instrument_node="">pruning and plant husbandry</span></li><span data-dcnode-id="172" instrument_node="">
</span><li data-dcnode-id="170"><span data-dcnode-id="171" instrument_node="">planting new berries and trees</span></li><span data-dcnode-id="169" instrument_node="">
</span><li data-dcnode-id="167"><span data-dcnode-id="168" instrument_node="">tractor or forklift driving</span></li><span data-dcnode-id="166" instrument_node="">
</span><li data-dcnode-id="164"><span data-dcnode-id="165" instrument_node="">managing and receiving freshly harvested fruit</span></li><span data-dcnode-id="163" instrument_node="">
</span></ul><span data-dcnode-id="161" instrument_node="">
</span><p data-dcnode-id="158"><a class="button" data-dcnode-id="159" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.fruitgrowerstas.org.au/working-conditions/" rel="noopener noreferrer" target="_blank"><span data-dcnode-id="160" instrument_node="">Find out more</span></a></p><span data-dcnode-id="157" instrument_node="">
</span><hr data-dcnode-id="156"><span data-dcnode-id="155" instrument_node="">
</span><h2 data-dcnode-id="153"><span data-dcnode-id="154" instrument_node="">Explore Tasmania’s regional areas</span></h2><span data-dcnode-id="152" instrument_node="">
</span><p data-dcnode-id="150"><span data-dcnode-id="151" instrument_node="">No matter which part of Tasmania you live in, there are local fruit producers near you. Many growers are located in Huon Valley, Derwent Valley, Coal Valley, North West Coast, and Tamar river area, with smaller production areas in the D’Entrecasteaux Channel, the Midlands, East Coast, and Tasman Peninsula.</span></p><span data-dcnode-id="149" instrument_node="">
</span><p data-dcnode-id="147"><span data-dcnode-id="148" instrument_node="">Seasonal work usually finishes by 4 pm, leaving plenty of daylight to explore some of Tasmania’s regional areas.</span></p><span data-dcnode-id="146" instrument_node="">
</span><hr data-dcnode-id="145"><span data-dcnode-id="144" instrument_node="">
</span><h2 data-dcnode-id="142"><span data-dcnode-id="143" instrument_node="">Opportunities await</span></h2><span data-dcnode-id="141" instrument_node="">
</span><p data-dcnode-id="133"><span data-dcnode-id="140" instrument_node="">Tasmanian employers have already started promoting harvest jobs in preparation for the upcoming harvest period. You can enquire about job opportunities and register for jobs now through the Harvest Trail Information Service by calling </span><a data-dcnode-id="138" href="tel:+611800062332"><span data-dcnode-id="139" instrument_node="">1800&nbsp;062&nbsp;332</span></a><span data-dcnode-id="137" instrument_node=""> Monday to Friday from 8&nbsp;am to 8&nbsp;pm (excluding national public holidays). The </span><a data-dcnode-id="135" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//jobsearch.gov.au/harvest" rel="noopener noreferrer" target="_blank"><span data-dcnode-id="136" instrument_node="">Harvest Trail</span></a><span data-dcnode-id="134" instrument_node=""> links job seekers with harvest jobs Australia wide. It’s a great way for people to travel around Australia at their own pace while working and earning money.</span></p><span data-dcnode-id="132" instrument_node="">
</span><p data-dcnode-id="129"><a data-dcnode-id="130" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//jobsearch.gov.au/harvest" rel="noopener noreferrer" target="_blank"><img alt="Harvest Trail logo" data-dcnode-id="131" height="54" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.fruitgrowerstas.org.au/assets/harvest_trail_logo.png&amp;raw" width="340"></a></p><span data-dcnode-id="128" instrument_node="">
</span><p data-dcnode-id="126"><span data-dcnode-id="127" instrument_node="">Many fruit growers also work with local labour hire businesses to source and manage employees doing seasonal work. These businesses can connect you with growers looking for work, and are a great way for people new and experienced seasonal workers to find and sign on work opportunities.</span></p><span data-dcnode-id="125" instrument_node="">
</span><p data-dcnode-id="123"><span data-dcnode-id="124" instrument_node="">FGT are also taking expressions of interest from people eager to take up seasonal work opportunities in Tasmania’s fruit sectors. FGT staff are regularly contacted by producers looking to find people eager to take up seasonal work opportunities. By expressing interest, you would be putting your name forward for consideration by employers using the program who are looking to fill harvest work vacancies. If transport is likely to be an issue, you can also register your interest in the seasonal worker transport pilot.</span></p><span data-dcnode-id="122" instrument_node="">
</span><p data-dcnode-id="113"><a class="button" data-dcnode-id="120" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.cognitoforms.com/SIPPTransportPilotProgram/SeasonalWorkExpressionOfInterest" rel="noopener noreferrer" target="_blank"><span data-dcnode-id="121" instrument_node="">Register interest with FGT</span></a><span data-dcnode-id="119" instrument_node="">&nbsp; &nbsp;</span><a class="button" data-dcnode-id="117" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.fruitgrowerstas.org.au/connect-employers/" rel="noopener noreferrer" target="_blank"><span data-dcnode-id="118" instrument_node="">Explore opportunities</span></a><span data-dcnode-id="116" instrument_node="">&nbsp; &nbsp;</span><a class="button" data-dcnode-id="114" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.fruitgrowerstas.org.au/transport-pilot/" rel="noopener noreferrer" target="_blank"><span data-dcnode-id="115" instrument_node="">Transport pilot</span></a></p><span data-dcnode-id="112" instrument_node="">
