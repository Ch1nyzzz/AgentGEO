ting urban fruit trees in pots or as part of your front yard landscape for an edible garden. Landscaping with fruit trees allows you to harvest food from even a small space garden.&nbsp;</span></strong></p><span data-dcnode-id="1280" instrument_node="">
</span><p data-dcnode-id="1275"><span data-dcnode-id="1279" instrument_node="">If you’re trying to get the most out of your grow space, consider these </span><a data-dcnode-id="1277" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.attainable-sustainable.net/pretty-edibles/"><span data-dcnode-id="1278" instrument_node="">vegetable crops that are pretty enough for the front yard</span></a><span data-dcnode-id="1276" instrument_node="">!&nbsp;</span></p><span data-dcnode-id="1274" instrument_node="">
</span><img alt="Urban fruit! An edible landscape is great for city gardeners. Consider growing fruit trees in pots or as part of your front yard landscape. " class="aligncenter wp-image-4215 size-full entered lazyloaded" data-dcnode-id="1273" data-lazy-sizes="(max-width: 800px) 100vw, 800px" data-lazy-src="https://www.attainable-sustainable.net/wp-content/uploads/2017/02/fruit-tree-blossoms-urban-garden.jpg" data-lazy-srcset="https://www.attainable-sustainable.net/wp-content/uploads/2017/02/fruit-tree-blossoms-urban-garden.jpg 800w, https://www.attainable-sustainable.net/wp-content/uploads/2017/02/fruit-tree-blossoms-urban-garden-150x113.jpg 150w, https://www.attainable-sustainable.net/wp-content/uploads/2017/02/fruit-tree-blossoms-urban-garden-350x263.jpg 350w, https://www.attainable-sustainable.net/wp-content/uploads/2017/02/fruit-tree-blossoms-urban-garden-768x576.jpg 768w, https://www.attainable-sustainable.net/wp-content/uploads/2017/02/fruit-tree-blossoms-urban-garden-773x580.jpg 773w, https://www.attainable-sustainable.net/wp-content/uploads/2017/02/fruit-tree-blossoms-urban-garden-489x367.jpg 489w, https://www.attainable-sustainable.net/wp-content/uploads/2017/02/fruit-tree-blossoms-urban-garden-339x254.jpg 339w, https://www.attainable-sustainable.net/wp-content/uploads/2017/02/fruit-tree-blossoms-urban-garden-231x173.jpg 231w, https://www.attainable-sustainable.net/wp-content/uploads/2017/02/fruit-tree-blossoms-urban-garden-500x375.jpg 500w, https://www.attainable-sustainable.net/wp-content/uploads/2017/02/fruit-tree-blossoms-urban-garden-249x187.jpg 249w" data-ll-status="loaded" data-pin-description="Urban fruit! An edible landscape is great for city gardeners and fruiting trees are a perfect addition to an edible landscape. They're beautiful, functional as they provide shade, and they can produce fruit within 3-5 years. Planting a fruit tree now will provide an abundant harvest for years to come. #orchard #garden #homestead" data-pin-title="Urban Fruit Trees for a Small Scale Harvest" height="600" sizes="(max-width: 800px) 100vw, 800px" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.attainable-sustainable.net/wp-content/uploads/2017/02/fruit-tree-blossoms-urban-garden.jpg&amp;raw" srcset="https://www.attainable-sustainable.net/wp-content/uploads/2017/02/fruit-tree-blossoms-urban-garden.jpg 800w, https://www.attainable-sustainable.net/wp-content/uploads/2017/02/fruit-tree-blossoms-urban-garden-150x113.jpg 150w, https://www.attainable-sustainable.net/wp-content/uploads/2017/02/fruit-tree-blossoms-urban-garden-350x263.jpg 350w, https://www.attainable-sustainable.net/wp-content/uploads/2017/02/fruit-tree-blossoms-urban-garden-768x576.jpg 768w, https://www.attainable-sustainable.net/wp-content/uploads/2017/02/fruit-tree-blossoms-urban-garden-773x580.jpg 773w, https://www.attainable-sustainable.net/wp-content/uploads/2017/02/fruit-tree-blossoms-urban-garden-489x367.jpg 489w, https://www.attainable-sustainable.net/wp-content/uploads/2017/02/fruit-tree-blossoms-urban-garden-339x254.jpg 339w, https://www.attainable-sustainable.net/wp-content/uploads/2017/02/fruit-tree-blossoms-urban-garden-231x173.jpg 231w, https://www.attainable-sustainable.net/wp-content/uploads/2017/02/fruit-tree-blossoms-urban-garden-500x375.jpg 500w, https://www.attainable-sustainable.net/wp-content/uploads/2017/02/fruit-tree-blossoms-urban-garden-249x187.jpg 249w" title="Planting a fruit tree now will provide an abundant harvest for years to come. This list of fruit trees features options that grow well in small urban yards." width="800"><noscript data-dcnode-id="1271"><span data-dcnode-id="1272" instrument_node="">&lt;img class="aligncenter wp-image-4215 size-full" title="Planting a fruit tree now will provide an abundant harvest for years to come. This list of fruit trees features options that grow well in small urban yards." src="https://www.attainable-sustainable.net/wp-content/uploads/2017/02/fruit-tree-blossoms-urban-garden.jpg" alt="Urban fruit! An edible landscape is great for city gardeners. Consider growing fruit trees in pots or as part of your front yard landscape. " width="800" height="600" srcset="https://www.attainable-sustainable.net/wp-content/uploads/2017/02/fruit-tree-blossoms-urban-garden.jpg 800w, https://www.attainable-sustainable.net/wp-content/uploads/2017/02/fruit-tree-blossoms-urban-garden-150x113.jpg 150w, https://www.attainable-sustainable.net/wp-content/uploads/2017/02/fruit-tree-blossoms-urban-garden-350x263.jpg 350w, https://www.attainable-sustainable.net/wp-content/uploads/2017/02/fruit-tree-blossoms-urban-garden-768x576.jpg 768w, https://www.attainable-sustainable.net/wp-content/uploads/2017/02/fruit-tree-blossoms-urban-garden-773x580.jpg 773w, https://www.attainable-sustainable.net/wp-content/uploads/2017/02/fruit-tree-blossoms-urban-garden-489x367.jpg 489w, https://www.attainable-sustainable.net/wp-content/uploads/2017/02/fruit-tree-blossoms-urban-garden-339x254.jpg 339w, https://www.attainable-sustainable.net/wp-content/uploads/2017/02/fruit-tree-blossoms-urban-garden-231x173.jpg 231w, https://www.attainable-sustainable.net/wp-content/uploads/2017/02/fruit-tree-blossoms-urban-garden-500x375.jpg 500w, https://www.attainable-sustainable.net/wp-content/uploads/2017/02/fruit-tree-blossoms-urban-garden-249x187.jpg 249w" sizes="(max-width: 800px) 100vw, 800px" /&gt;</span></noscript><span data-dcnode-id="1270" instrument_node="">
</span><p data-dcnode-id="1266"><span data-dcnode-id="1269" instrument_node="">An edible landscape is essentially an aesthetically pleasing design that incorporates&nbsp;productive crops. Growing fruit trees as dual-purpose landscape plants is&nbsp;a great way to make the most of the space you have.&nbsp;</span><strong data-dcnode-id="1267"><span data-dcnode-id="1268" instrument_node="">Pretty blossoms in the springtime, fruit in the summertime, and a tree to create shade or structure within your garden!</span></strong></p><span data-dcnode-id="1265" instrument_node="">
</span><h3 data-dcnode-id="1263"><span data-dcnode-id="1264" instrument_node="">Why some people don’t plant fruiting trees</span></h3><span data-dcnode-id="1262" instrument_node="">
</span><p data-dcnode-id="1257"><span data-dcnode-id="1261" instrument_node="">Fruit trees are no different than many non-fruiting landscape trees, with one exception: They provide a harvest. To me, that sounds fabulous. If a tree is&nbsp;taking up space in my yard, better that it offers up some fruit. But not everyone wants to deal&nbsp;with </span><strong data-dcnode-id="1259"><span data-dcnode-id="1260" instrument_node="">harvesting fruit</span></strong><span data-dcnode-id="1258" instrument_node="">. (It’s likely that those people are not here reading this, though!)</span></p><span data-dcnode-id="1256" instrument_node="">
</span><p data-dcnode-id="1254"><span data-dcnode-id="1255" instrument_node="">In designing public spaces, there’s a hesitancy to use fruiting trees because of the mess factor. If a tree fruits and nobody is there to harvest that fruit, it will fall to the ground.</span></p><span data-dcnode-id="1253" instrument_node="">
</span><p data-dcnode-id="1248"><span data-dcnode-id="1252" instrument_node="">Fruit on the ground is unsightly and can draw undesirable insects and rodents, or become a tripping hazard. These are </span><strong data-dcnode-id="1250"><span data-dcnode-id="1251" instrument_node="">valid concerns</span></strong><span data-dcnode-id="1249" instrument_node=""> for commercial and community spaces, though it does seem like a missed opportunity.</span></p><div class="atm-ad-slot" data-dcnode-id="1247" data-slot-type="injected-ad"></div><div class="modular" data-dcnode-id="1227"><span data-dcnode-id="1246" instrument_node="">
</span><div class="deco_two" data-dcnode-id="1229"><span data-dcnode-id="1245" instrument_node="">
</span><div class="thrive_suks ml_signup" data-dcnode-id="1231"><span data-dcnode-id="1244" instrument_node="">

</span><p data-dcnode-id="1189"><span data-dcnode-id="1195" instrument_node="">Does your homeowners association prevent you from growing food in the front yard? What if they never even KNEW? My ebook, </span><a data-dcnode-id="1191" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.attainable-sustainable.net/edible-front-yard-ebook/"><strong data-dcnode-id="1192"><em data-dcnode-id="1193"><span data-dcnode-id="1194" instrument_node="">The Edible Front Yard Garden</span></em></strong></a><span data-dcnode-id="1190" instrument_node=""> will show you how!</span></p><span data-dcnode-id="1188" instrument_node="">

</span></div><span data-dcnode-id="1184" instrument_node="">
</span><h2 data-dcnode-id="1182"><span data-dcnode-id="1183" instrument_node="">List of fruit trees for an edible landscape</span></h2><span data-dcnode-id="1181" instrument_node="">
</span><p data-dcnode-id="1177"><strong data-dcnode-id="1179"><span data-dcnode-id="1180" instrument_node="">Apple</span></strong><span data-dcnode-id="1178" instrument_node=""> – The spreading branches of a mature standard-sized apple tree are perfect for sitting under. Beautiful white and pink blossoms in the spring are slightly fragrant. Harvest, late summer and autumn.</span></p><span data-dcnode-id="1176" instrument_node="">
</span><p data-dcnode-id="1169"><strong data-dcnode-id="1174"><span data-dcnode-id="1175" instrument_node="">Banana</span></strong><span data-dcnode-id="1173" instrument_node=""> – Ranging in size from a few feet tall to more than 20′ tall, there is a wide selection of banana varieties available to backyard growers. Choose small banana plants (see </span><a data-dcnode-id="1171" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.attainable-sustainable.net/grow-bananas/"><span data-dcnode-id="1172" instrument_node="">here</span></a><span data-dcnode-id="1170" instrument_node=""> for some options) for container growing.</span></p><span data-dcnode-id="1168" instrument_node="">
</span><p data-dcnode-id="1166"><span data-dcnode-id="1167" instrument_node="">Bananas require a warm climate, but some intrepid growers plant them in large containers and move them into a protected area during cold winter months.</span></p><span data-dcnode-id="1165" instrument_node="">
</span><p data-dcnode-id="1161"><strong data-dcnode-id="1163"><span data-dcnode-id="1164" instrument_node="">Cherry</span></strong><span data-dcnode-id="1162" instrument_node=""> – Non-fruiting or “ornamental” cherry trees are frequently planted for their gorgeous blossoms. Opt for a fruiting variety for more bang for your buck. Harvest, early summer</span></p><div class="atm-ad-slot" data-dcnode-id="1160" data-slot-type="injected-ad"></div><span data-dcnode-id="1159" instrument_node="">
</span><p data-dcnode-id="1155"><strong data-dcnode-id="1157"><span data-dcnode-id="1158" instrument_node="">Citrus</span></strong><span data-dcnode-id="1156" instrument_node=""> – An evergreen tree for frost-free climates, citrus trees like orange, tangerine, and lemon are year-round beauties. Harvest, winter.</span></p><span data-dcnode-id="1154" instrument_node="">
</span><img alt="" class="aligncenter size-full wp-image-13037 entered error" data-dcnode-id="1153" data-lazy-sizes="(max-width: 870px) 100vw, 870px" data-lazy-src="https://www.attainable-sustainable.net/wp-content/uploads/2015/08/2crabapples.jpg" data-lazy-srcset="https://www.attainable-sustainable.net/wp-content/uploads/2015/08/2crabapples.jpg 870w, https://www.attainable-sustainable.net/wp-content/uploads/2015/08/2crabapples-150x100.jpg 150w, https://www.attainable-sustainable.net/wp-content/uploads/2015/08/2crabapples-350x233.jpg 350w, https://www.attainable-sustainable.net/wp-content/uploads/2015/08/2crabapples-768x512.jpg 768w, https://www.attainable-sustainable.net/wp-content/uploads/2015/08/2crabapples-550x367.jpg 550w, https://www.attainable-sustainable.net/wp-content/uploads/2015/08/2crabapples-380x254.jpg 380w, https://www.attainable-sustainable.net/wp-content/uploads/2015/08/2crabapples-260x173.jpg 260w" data-ll-status="error" data-pin-description="Urban fruit! An edible landscape is great for city gardeners and fruiting trees are a perfect addition to an edible landscape. They're beautiful, functional as they provide shade, and they can produce fruit within 3-5 years. Planting a fruit tree now will provide an abundant harvest for years to come. #orchard #garden #homestead" data-pin-title="Urban Fruit Trees for a Small Scale Harvest" height="580" sizes="(max-width: 870px) 100vw, 870px" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.attainable-sustainable.net/wp-content/uploads/2015/08/2crabapples.jpg&amp;raw" srcset="https://www.attainable-sustainable.net/wp-content/uploads/2015/08/2crabapples.jpg 870w, https://www.attainable-sustainable.net/wp-content/uploads/2015/08/2crabapples-150x100.jpg 150w, https://www.attainable-sustainable.net/wp-content/uploads/2015/08/2crabapples-350x233.jpg 350w, https://www.attainable-sustainable.net/wp-content/uploads/2015/08/2crabapples-768x512.jpg 768w, https://www.attainable-sustainable.ne </span><p data-dcnode-id="1143"><strong data-dcnode-id="1148"><span data-dcnode-id="1149" instrument_node="">Crabapple</span></strong><span data-dcnode-id="1147" instrument_node=""> – Less commonly known than standard apples, crabapples are edible and there are some pretty compelling reasons to plant one. You can read more about planting and growing this fruit tree </span><a data-dcnode-id="1145" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.attainable-sustainable.net/crabapple/"><span data-dcnode-id="1146" instrument_node="">here</span></a><span data-dcnode-id="1144" instrument_node="">.</span></p><span data-dcnode-id="1142" instrument_node="">
</span><p data-dcnode-id="1135"><strong data-dcnode-id="1140"><span data-dcnode-id="1141" instrument_node="">Fig</span></strong><span data-dcnode-id="1139" instrument_node=""> – The oversized leaves of a fig tree offer a tropical look to the landscape. Many fig varieties offer two harvests per year. </span><a data-dcnode-id="1137" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.attainable-sustainable.net/fig/"><span data-dcnode-id="1138" instrument_node="">Figs are easy to grow in pots, too</span></a><span data-dcnode-id="1136" instrument_node="">.</span></p><span data-dcnode-id="1134" instrument_node="">
</span><img alt="small fruit trees in a grassy area, citrus in terra cotta containers" class="aligncenter wp-image-13067 size-full entered lazyloaded" data-dcnode-id="1133" data-lazy-sizes="(max-width: 600px) 100vw, 600px" data-lazy-src="https://www.attainable-sustainable.net/wp-content/uploads/2017/02/2edible-landscape.jpg" data-lazy-srcset="https://www.attainable-sustainable.net/wp-content/uploads/2017/02/2edible-landscape.jpg 600w, https://www.attainable-sustainable.net/wp-content/uploads/2017/02/2edible-landscape-100x150.jpg 100w, https://www.attainable-sustainable.net/wp-content/uploads/2017/02/2edible-landscape-200x300.jpg 200w, https://www.attainable-sustainable.net/wp-content/uploads/2017/02/2edible-landscape-387x580.jpg 387w, https://www.attainable-sustainable.net/wp-content/uploads/2017/02/2edible-landscape-245x367.jpg 245w, https://www.attainable-sustainable.net/wp-content/uploads/2017/02/2edible-landscape-169x254.jpg 169w, https://www.attainable-sustainable.net/wp-content/uploads/2017/02/2edible-landscape-115x173.jpg 115w" data-ll-status="loaded" data-pin-description="Urban fruit! An edible landscape is great for city gardeners and fruiting trees are a perfect addition to an edible landscape. They're beautiful, functional as they provide shade, and they can produce fruit within 3-5 years. Planting a fruit tree now will provide an abundant harvest for years to come. #orchard #garden #homestead" data-pin-id="703756181362688" data-pin-title="Urban Fruit Trees for a Small Scale Harvest" height="900" sizes="(max-width: 600px) 100vw, 600px" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.attainable-sustainable.net/wp-content/uploads/2017/02/2edible-landscape.jpg&amp;raw" srcset="https://www.attainable-sustainable.net/wp-content/uploads/2017/02/2edible-landscape.jpg 600w, https://www.attainable-sustainable.net/wp-content/uploads/2017/02/2edible-landscape-100x150.jpg 100w, https://www.attainable-sustainable.net/wp-content/uploads/2017/02/2edible-landscape-200x300.jpg 200w, https://www.attainable-sustainable.net/wp-content/uploads/2017/02/2edible-landscape-387x580.jpg 387w, https://www.attainable-sustainable.net/wp-content/uploads/2017/02/2edible-landscape-245x367.jpg 245w, https://www.attainable-sustainable.net/wp-content/uploads/2017/02/2edible-landscape-169x254.jpg 169w, https://www.attainable-sustainable.net/wp-content/uploads/2017/02/2edible-landscape-115x173.jpg 115w" title="Planting a fruit tree now will provide an abundant harvest for years to come. This list of fruit trees features options that grow well in small urban yards." width="600"><noscript data-dcnode-id="1131"><span data-dcnode-id="1132" instrument_node="">&lt;img class="aligncenter wp-image-13067 size-full" title="Planting a fruit tree now will provide an abundant harvest for years to come. This list of fruit trees features options that grow well in small urban yards." src="https://www.attainable-sustainable.net/wp-content/uploads/2017/02/2edible-landscape.jpg" alt="small fruit trees in a grassy area, citrus in terra cotta containers" width="600" height="900" data-pin-id="703756181362688" srcset="https://www.attainable-sustainable.net/wp-content/uploads/2017/02/2edible-landscape.jpg 600w, https://www.attainable-sustainable.net/wp-content/uploads/2017/02/2edible-landscape-100x150.jpg 100w, https://www.attainable-sustainable.net/wp-content/uploads/2017/02/2edible-landscape-200x300.jpg 200w, https://www.attainable-sustainable.net/wp-content/uploads/2017/02/2edible-landscape-387x580.jpg 387w, https://www.attainable-sustainable.net/wp-content/uploads/2017/02/2edible-landscape-245x367.jpg 245w, https://www.attainable-sustainable.net/wp-content/uploads/2017/02/2edible-landscape-169x254.jpg 169w, https://www.attainable-sustainable.net/wp-content/uploads/2017/02/2edible-landscape-115x173.jpg 115w" sizes="(max-width: 600px) 100vw, 600px" /&gt;</span></noscript><span data-dcnode-id="1130" instrument_node="">
</span><p data-dcnode-id="1123"><strong data-dcnode-id="1128"><span data-dcnode-id="1129" instrument_node="">Mulberry</span></strong><span data-dcnode-id="1127" instrument_node=""> – With large fruit&nbsp;resembling blackberries, a mulberry tree can serve several purposes in your edible landscape. The fruit is excellent, if a bit hard to harvest. It can also act as a lure to draw birds and squirrels away from other ripening fruit. Try planting one in an area where the dropping fruit can </span><strong data-dcnode-id="1125"><span data-dcnode-id="1126" instrument_node="">provide fodder for chickens</span></strong><span data-dcnode-id="1124" instrument_node=""> so that any fruit you don’t harvest will go to feed your flock.</span></p><span data-dcnode-id="1122" instrument_node="">
</span><p data-dcnode-id="1115"><strong data-dcnode-id="1120"><span data-dcnode-id="1121" instrument_node="">Nectarine</span></strong><span data-dcnode-id="1119" instrument_node=""> – The dark, slender green leaves of a nectarine tree make it a summertime beauty. Harvest, late summer. Here’s how to </span><a data-dcnode-id="1117" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.attainable-sustainable.net/nectarine/"><span data-dcnode-id="1118" instrument_node="">start a nectarine tree from seed</span></a><span data-dcnode-id="1116" instrument_node="">.</span></p><span data-dcnode-id="1114" instrument_node="">
</span><p data-dcnode-id="1110"><strong data-dcnode-id="1112"><span data-dcnode-id="1113" instrument_node="">Olive</span></strong><span data-dcnode-id="1111" instrument_node=""> – An evergreen tree with fine leaves, olive trees are great landscape plants and people often plant them for their beauty rather than the fruit. Olives need to be processed before they are edible.</span></p><div class="atm-ad-slot" data-dcnode-id="1109" data-slot-type="injected-ad"></div><span data-dcnode-id="1108" instrument_node="">

306.jpg 768w, https://www.attainable-sustainable.net/wp-content/uploads/2017/02/fruit-904x1536.jpg 904w, https://www.attainable-sustainable.net/wp-content/uploads/2017/02/fruit-150x255.jpg 150w" width="1000"><noscript data-dcnode-id="1105"><span data-dcnode-id="1106" instrument_node="">&lt;img class="aligncenter size-full wp-image-24385" src="https://www.attainable-sustainable.net/wp-content/uploads/2017/02/fruit.jpg" alt="peach tree in a container" width="1000" height="1700" srcset="https://www.attainable-sustainable.net/wp-content/uploads/2017/02/fruit.jpg 1000w, https://www.attainable-sustainable.net/wp-content/uploads/2017/02/fruit-176x300.jpg 176w, https://www.attainable-sustainable.net/wp-content/uploads/2017/02/fruit-602x1024.jpg 602w, https://www.attainable-sustainable.net/wp-content/uploads/2017/02/fruit-88x150.jpg 88w, https://www.attainable-sustainable.net/wp-content/uploads/2017/02/fruit-768x1306.jpg 768w, https://www.attainable-sustainable.net/wp-content/uploads/2017/02/fruit-904x1536.jpg 904w, https://www.attainable-sustainable.net/wp-content/uploads/2017/02/fruit-150x255.jpg 150w" sizes="(max-width: 1000px) 100vw, 1000px" /&gt;</span></noscript><span data-dcnode-id="1104" instrument_node="">
</span><p data-dcnode-id="1100"><strong data-dcnode-id="1102"><span data-dcnode-id="1103" instrument_node="">Peach</span></strong><span data-dcnode-id="1101" instrument_node=""> – The fuzzy fruit of this summer-bearing tree is delicious fresh out of hand, but if you have plenty, consider preserving some for the pantry. The trees grow similarly to a nectarine and offer pretty pink springtime blossoms.</span></p><span data-dcnode-id="1099" instrument_node="">
</span><p data-dcnode-id="1095"><strong data-dcnode-id="1097"><span data-dcnode-id="1098" instrument_node="">Pear</span></strong><span data-dcnode-id="1096" instrument_node=""> – In addition to delicate spring blossoms and a tasty crop, pear trees offer fall color to your yard as well. Harvest, late summer.</span></p><span data-dcnode-id="1094" instrument_node="">

</span><p data-dcnode-id="1081"><a data-dcnode-id="1084" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.attainable-sustainable.net/edible-front-yard-ebook/"><img alt="pretty garden with tomatoes and flowers - cover of book &quot;edible front yard garden&quot;" class="alignleft wp-image-20252" data-dcnode-id="1087" data-lazy-sizes="(max-width: 150px) 100vw, 150px" data-lazy-src="https://www.attainable-sustainable.net/wp-content/uploads/2020/08/ediblefrontyardforshop-232x300.jpg" data-lazy-srcset="https://www.attainable-sustainable.net/wp-content/uploads/2020/08/ediblefrontyardforshop-232x300.jpg 232w, https://www.attainable-sustainable.net/wp-content/uploads/2020/08/ediblefrontyardforshop-116x150.jpg 116w, https://www.attainable-sustainable.net/wp-content/uploads/2020/08/ediblefrontyardforshop.jpg 280w" data-pin-description="Urban fruit! An edible landscape is great for city gardeners and fruiting trees are a perfect addition to an edible landscape. They're beautiful, functional as they provide shade, and they can produce fruit within 3-5 years. Planting a fruit tree now will provide an abundant harvest for years to come. #orchard #garden #homestead" data-pin-title="Urban Fruit Trees for a Small Scale Harvest" height="194" src="data:image/svg+xml,%3Csvg%20xmlns='http://www.w3.org/2000/svg'%20viewBox='0%200%20150%20194'%3E%3C/svg%3E" width="150"><noscript data-dcnode-id="1085"><span data-dcnode-id="1086" instrument_node="">&lt;img class="alignleft wp-image-20252" src="https://www.attainable-sustainable.net/wp-content/uploads/2020/08/ediblefrontyardforshop-232x300.jpg" alt="pretty garden with tomatoes and flowers - cover of book "edible front yard garden"" width="150" height="194" srcset="https://www.attainable-sustainable.net/wp-content/uploads/2020/08/ediblefrontyardforshop-232x300.jpg 232w, https://www.attainable-sustainable.net/wp-content/uploads/2020/08/ediblefrontyardforshop-116x150.jpg 116w, https://www.attainable-sustainable.net/wp-content/uploads/2020/08/ediblefrontyardforshop.jpg 280w" sizes="(max-width: 150px) 100vw, 150px" /&gt;</span></noscript></a><strong data-dcnode-id="1082"><span data-dcnode-id="1083" instrument_node="">The Edible Front Yard Garden</span></strong></p><span data-dcnode-id="1080" instrument_node="">
</span><p data-dcnode-id="1073"><span data-dcnode-id="1079" instrument_node="">Does your homeowners association prevent you from growing food in the front yard? What if they never even KNEW? My ebook, </span><a data-dcnode-id="1075" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.attainable-sustainable.net/edible-front-yard-ebook/"><strong data-dcnode-id="1076"><em data-dcnode-id="1077"><span data-dcnode-id="1078" instrument_node="">The Edible Front Yard Garden</span></em></strong></a><span data-dcnode-id="1074" instrument_node=""> will show you how!</span></p><span data-dcnode-id="1072" instrument_node="">
</span><hr data-dcnode-id="1071"><span data-dcnode-id="1070" instrument_node="">
</span></div><span data-dcnode-id="1068" instrument_node="">
</span><p data-dcnode-id="1061"><strong data-dcnode-id="1066"><span data-dcnode-id="1067" instrument_node="">Persimmon</span></strong><span data-dcnode-id="1065" instrument_node=""> – A beautiful tree with spreading branches, persimmons are most noticeable in the fall when the leaves drop and bright orange fruit remains. Harvest, autumn. Here’s more on </span><a data-dcnode-id="1063" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.attainable-sustainable.net/growing-persimmons/"><span data-dcnode-id="1064" instrument_node="">growing a persimmon tree</span></a><span data-dcnode-id="1062" instrument_node="">.</span></p><span data-dcnode-id="1060" instrument_node="">
</span><p data-dcnode-id="1056"><strong data-dcnode-id="1058"><span data-dcnode-id="1059" instrument_node="">Pineapple guava</span></strong><span data-dcnode-id="1057" instrument_node=""> – A small tree or upright shrub, this evergreen produces bluish green fruit. It grows we ll in cool coastal locations. Harvest, summer.</span></p><span data-dcnode-id="1055" instrument_node="">
</span><p data-dcnode-id="1051"><strong data-dcnode-id="1053"><span data-dcnode-id="1054" instrument_node="">Plum</span></strong><span data-dcnode-id="1052" instrument_node=""> – Desirable for their vivid pink spring blossoms, flowering plum trees are used frequently as a landscape plant. You can have similar beauty plus a great harvest by choosing a fruiting plum. Harvest, late spring and summer.</span></p><span data-dcnode-id="1050" instrument_node="">
</span><img alt="Urban fruit! An edible landscape is great for city gardeners. Consider growing fruit trees in pots or as part of your front yard landscape. " class="aligncenter wp-image-4216 size-full" data-dcnode-id="1049" data-lazy-sizes="(max-width: 800px) 100vw, 800px" data-lazy-src="https://www.attainable-sustainable.net/wp-content/uploads/2017/02/pear-tree-urban-garden.jpg" data-lazy-srcset="https://www.attainable-sustainable.net/wp-content/uploads/2017/02/pear-tree-urban-garden.jpg 800w, https://www.attainable-sustainable.net/wp-content/uploads/2017/02/pear-tree-urban-garden-150x104.jpg 150w, https://www.attainable-sustainable.net/wp-content/uploads/2017/02/pear-tree-urban-garden-350x243.jpg 350w, https://www.attainable-sustainable.net/wp-content/uploads/2017/02/pear-tree-urban-garden-768x533.jpg 768w, https://www.attainable-sustainable.net/wp-content/uploads/2017/02/pear-tree-urban-garden-529x367.jpg 529w, https://www.attainable-sustainable.net/wp-content/uploads/2017/02/pear-tree-urban-garden-366x254.jpg 366w, https://www.attainable-sustainable.net/wp-content/uploads/2017/02/pear-tree-urban-garden-249x173.jpg 249w, https://www.attainable-sustainable.net/wp-content/uploads/2017/02/pear-tree-urban-garden-270x187.jpg 270w" data-pin-description="Urban fruit! An edible landscape is great for city gardeners and fruiting trees are a perfect addition to an edible landscape. They're beautiful, functional as they provide shade, and they can produce fruit within 3-5 years. Planting a fruit tree now will provide an abundant harvest for years to come. #orchard #garden #homestead" data-pin-title="Urban Fruit Trees for a Small Scale Harvest" height="555" src="data:image/svg+xml,%3Csvg%20xmlns='http://www.w3.org/2000/svg'%20viewBox='0%200%20800%20555'%3E%3C/svg%3E" title="Planting a fruit tree now will provide an abundant harvest for years to come. This list of fruit trees features options that grow well in small urban yards." width="800"><noscript data-dcnode-id="1047"><span data-dcnode-id="1048" instrument_node="">&lt;img class="aligncenter wp-image-4216 size-full" title="Planting a fruit tree now will provide an abundant harvest for years to come. This list of fruit trees features options that grow well in small urban yards." src="https://www.attainable-sustainable.net/wp-content/uploads/2017/02/pear-tree-urban-garden.jpg" alt="Urban fruit! An edible landscape is great for city gardeners. Consider growing fruit trees in pots or as part of your front yard landscape. " width="800" height="555" srcset="https://www.attainable-sustainable.net/wp-content/uploads/2017/02/pear-tree-urban-garden.jpg 800w, https://www.attainable-sustainable.net/wp-content/uploads/2017/02/pear-tree-urban-garden-150x104.jpg 150w, https://www.attainable-sustainable.net/wp-content/uploads/2017/02/pear-tree-urban-garden-350x243.jpg 350w, https://www.attainable-sustainable.net/wp-content/uploads/2017/02/pear-tree-urban-garden-768x533.jpg 768w, https://www.attainable-sustainable.net/wp-content/uploads/2017/02/pear-tree-urban-garden-529x367.jpg 529w, https://www.attainable-sustainable.net/wp-content/uploads/2017/02/pear-tree-urban-garden-366x254.jpg 366w, https://www.attainable-sustainable.net/wp-content/uploads/2017/02/pear-tree-urban-garden-249x173.jpg 249w, https://www.attainable-sustainable.net/wp-content/uploads/2017/02/pear-tree-urban-garden-270x187.jpg 270w" sizes="(max-width: 800px) 100vw, 800px" /&gt;</span></noscript><span data-dcnode-id="1046" instrument_node="">
</span><p data-dcnode-id="1041" style="text-align: center;"><strong data-dcnode-id="1042"><span data-dcnode-id="1045" instrument_node="">Related:&nbsp;</span><a class="yoast-link-suggestion__value" data-dcnode-id="1043" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.attainable-sustainable.net/smart-gardening-hacks/"><span data-dcnode-id="1044" instrument_node="">15 Smart Gardening Hacks to Save You Time and Money</span></a></strong></p><div class="atm-ad-slot" data-dcnode-id="1040" data-slot-type="injected-ad"></div><span data-dcnode-id="1039" instrument_node="">
</span><h3 data-dcnode-id="1037"><span data-dcnode-id="1038" instrument_node="">Size matters</span></h3><span data-dcnode-id="1036" instrument_node="">
</span><p data-dcnode-id="1034"><span data-dcnode-id="1035" instrument_node="">Fruit trees come in four&nbsp;different sizes: Standard, semi-dwarf, dwarf, and less commonly, super-dwarf. This means that you can choose a tree that will fit your space perfectly. When considering the options on the list of fruit trees above, decide which size tree will work best for your space. For urban areas, small fruit trees are probably the most sensible.</span></p><span data-dcnode-id="1033" instrument_node="">
</span><ul data-dcnode-id="1011"><span data-dcnode-id="1032" instrument_node="">
</span><li data-dcnode-id="1028"><strong data-dcnode-id="1030"><span data-dcnode-id="1031" instrument_node="">Standard fruit trees</span></strong><span data-dcnode-id="1029" instrument_node=""> need a fair amount of space and are a good choice if you’re hoping for high branches that will provide shade.</span></li><span data-dcnode-id="1027" instrument_node="">
</span><li data-dcnode-id="1023"><strong data-dcnode-id="1025"><span data-dcnode-id="1026" instrument_node="">Semi-dwarf trees</span></strong><span data-dcnode-id="1024" instrument_node=""> are great for incorporating into a garden bed as a visually upright specimen.</span></li><span data-dcnode-id="1022" instrument_node="">
</span><li data-dcnode-id="1018"><strong data-dcnode-id="1020"><span data-dcnode-id="1021" instrument_node="">Dwarf varieties</span></strong><span data-dcnode-id="1019" instrument_node="">&nbsp;are great if you’re an urban gardener. Plant them directly in the ground or in pots.</span></li><span data-dcnode-id="1017" instrument_node="">
</span><li data-dcnode-id="1013"><strong data-dcnode-id="1015"><span data-dcnode-id="1016" instrument_node="">Super dwarf trees</span></strong><span data-dcnode-id="1014" instrument_node=""> are great&nbsp;for really tight spaces like apartment balconies. There are not as many choices available in this miniature size, unfortunately.</span></li><span data-dcnode-id="1012" instrument_node="">
</span></ul><span data-dcnode-id="1010" instrument_node="">
</span><p data-dcnode-id="1002"><span data-dcnode-id="1009" instrument_node="">Choosing a dwarf tree variety </span><strong data-dcnode-id="1007"><span data-dcnode-id="1008" instrument_node="">will not impact the size of the fruit</span></strong><span data-dcnode-id="1006" instrument_node="">. A dwarf tree doesn’t mean a smaller apple; it just means that the size of the tree itself (and thus the quantity of fruit) will be reduced, making it a perfect urban fruit tree option. </span><strong data-dcnode-id="1004"><span data-dcnode-id="1005" instrument_node="">They’re ideal when growing fruit trees in pots.</span></strong><span data-dcnode-id="1003" instrument_node=""> This is done by grafting various fruit&nbsp;varieties onto a rootstock that produces small trees.</span></p><span data-dcnode-id="1001" instrument_node="">
</span><img alt="Consider growing fruit trees in pots or as part of your front yard landscape. " class="aligncenter wp-image-4217 size-full" data-dcnode-id="1000" data-lazy-sizes="(max-width: 800px) 100vw, 800px" data-lazy-src="https://www.attainable-sustainable.net/wp-content/uploads/2017/02/orange-trees-in-pots.jpg" data-lazy-srcset="https://www.attainable-sustainable.net/wp-content/uploads/2017/02/orange-trees-in-pots.jpg 800w, https://www.attainable-sustainable.net/wp-content/uploads/2017/02/orange-trees-in-pots-150x100.jpg 150w, https://www.attainable-sustainable.net/wp-content/uploads/2017/02/orange-trees-in-pots-350x233.jpg 350w, https://www.attainable-sustainable.net/wp-content/uploads/2017/02/orange-trees-in-pots-768x511.jpg 768w, https://www.attainable-sustainable.net/wp-content/uploads/2017/02/orange-trees-in-pots-550x367.jpg 550w, https://www.attainable-sustainable.net/wp-content/uploads/2017/02/orange-trees-in-pots-380x254.jpg 380w, https://www.attainable-sustainable.net/wp-content/uploads/2017/02/orange-trees-in-pots-260x173.jpg 260w, https://www.attainable-sustainable.net/wp-content/uploads/2017/02/orange-trees-in-pots-280x187.jpg 280w" data-pin-description="Urban fruit! An edible landscape is great for city gardeners and fruiting trees are a perfect addition to an edible landscape. They're beautiful, functional as they provide shade, and they can produce fruit within 3-5 years. Planting a fruit tree now will provide an abundant harvest for years to come. #orchard #garden #homestead" data-pin-title="Urban Fruit Trees for a Small Scale Harvest" height="532" src="data:image/svg+xml,%3Csvg%20xmlns='http://www.w3.org/2000/svg'%20viewBox='0%200%20800%20532'%3E%3C/svg%3E" title="Planting a fruit tree now will provide an abundant harvest for years to come. This list of fruit trees features options that grow well in small urban yards." width="800"><noscript data-dcnode-id="998"><span data-dcnode-id="999" instrument_node="">&lt;img class="aligncenter wp-image-4217 size-full" title="Planting a fruit tree now will provide an abundant harvest for years to come. This list of fruit trees features options that grow well in small urban yards." src="https://www.attainable-sustainable.net/wp-content/uploads/2017/02/orange-trees-in-pots.jpg" alt="Consider growing fruit trees in pots or as part of your front yard landscape. " width="800" height="532" srcset="https://www.attainable-sustainable.net/wp-content/uploads/2017/02/orange-trees-in-pots.jpg 800w, https://www.attainable-sustainable.net/wp-content/uploads/2017/02/orange-trees-in-pots-150x100.jpg 150w, https://www.attainable-sustainable.net/wp-content/uploads/2017/02/orange-trees-in-pots-350x233.jpg 350w, https://www.attainable-sustainable.net/wp-content/uploads/2017/02/orange-trees-in-pots-768x511.jpg 768w, https://www.attainable-sustainable.net/wp-content/uploads/2017/02/orange-trees-in-pots-550x367.jpg 550w, https://www.attainable-sustainable.net/wp-content/uploads/2017/02/orange-trees-in-pots-380x254.jpg 380w, https://www.attainable-sustainable.net/wp-content/uploads/2017/02/orange-trees-in-pots-260x173.jpg 260w, https://www.attainable-sustainable.net/wp-content/uploads/2017/02/orange-trees-in-pots-280x187.jpg 280w" sizes="(max-width: 800px) 100vw, 800px" /&gt;</span></noscript><span data-dcnode-id="997" instrument_node="">
</span><h3 data-dcnode-id="995"><span data-dcnode-id="996" instrument_node="">Growing fruit trees in pots</span></h3><span data-dcnode-id="994" instrument_node="">
</span><p data-dcnode-id="992"><span data-dcnode-id="993" instrument_node="">If you want to add a tree to a patio area or need to be able to move certain warm weather varieties inside for the winter, growing fruit trees in pots might be the solution. Dwarf and super-dwarf varieties are the best option for growing in containers. The trees stay small and compact.</span></p><span data-dcnode-id="991" instrument_node="">
</span><h4 data-dcnode-id="988"><strong data-dcnode-id="989"><span data-dcnode-id="990" instrument_node="">Choose your container</span></strong></h4><span data-dcnode-id="987" instrument_node="">
</span><div data-dcnode-id="985" style="float: right;"><span data-dcnode-id="986" instrument_node="">&nbsp;</span></div><span data-dcnode-id="984" instrument_node="">
</span><p data-dcnode-id="979"><span data-dcnode-id="983" instrument_node="">A&nbsp;10-15 gallon container will work for most dwarf varieties and is a good size if you need to move your tree. A half oak barrel will give the roots a bit more space to spread out, but can be heavy to move. Be sure your container has a hole or two in the bottom so excess water can drain. </span><a data-dcnode-id="981" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.attainable-sustainable.net/growing-vegetables-in-containers/"><span data-dcnode-id="982" instrument_node="">Grow bags</span></a><span data-dcnode-id="980" instrument_node=""> (the largest size) would be another good option.</span></p><span data-dcnode-id="978" instrument_node="">
</span><h4 data-dcnode-id="976"><span data-dcnode-id="977" instrument_node="">Soil and fertilizer</span></h4><span data-dcnode-id="975" instrument_node="">
</span><p data-dcnode-id="970"><span data-dcnode-id="974" instrument_node="">Choose a good quality potting soil. Your potted urban fruit tree will be growing in a&nbsp;confined space; make sure it’s as healthy as possible. Fertilize your tree every couple of weeks during the growing season with&nbsp;compost or manure tea. I like to spray fruit trees with liquid kelp every few weeks, too. See more about </span><a data-dcnode-id="972" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.attainable-sustainable.net/bare-root/"><span data-dcnode-id="973" instrument_node="">planting bare root fruit trees here</span></a><span data-dcnode-id="971" instrument_node="">.</span></p><span data-dcnode-id="969" instrument_node="">
</span><img alt="tree with white blossoms behind a fence" class="aligncenter size-full wp-image-24384" data-dcnode-id="968" data-lazy-sizes="(max-width: 1000px) 100vw, 1000px" data-lazy-src="https://www.attainable-sustainable.net/wp-content/uploads/2017/02/fruit-trees.jpg" data-lazy-srcset="https://www.attainable-sustainable.net/wp-content/uploads/2017/02/fruit-trees.jpg 1000w, https://www.attainable-sustainable.net/wp-content/uploads/2017/02/fruit-trees-176x300.jpg 176w, https://www.attainable-sustainable.net/wp-content/uploads/2017/02/fruit-trees-602x1024.jpg 602w, https://www.attainable-sustainable.net/wp-content/uploads/2017/02/fruit-trees-88x150.jpg 88w, https://www.attainable-sustainable.net/wp-content/uploads/2017/02/fruit-trees-768x1306.jpg 768w, https://www.attainable-sustainable.net/wp-content/uploads/2017/02/fruit-trees-904x1536.jpg 904w, https://www.attainable-sustainable.net/wp-content/uploads/2017/02/fruit-trees-150x255.jpg 150w" data-pin-description="Urban fruit! An edible landscape is great for city gardeners and fruiting trees are a perfect addition to an edible landscape. They're beautiful, functional as they provide shade, and they can produce fruit within 3-5 years. Planting a fruit tree now will provide an abundant harvest for years to come. #orchard #garden #homestead" data-pin-title="Urban Fruit Trees for a Small Scale Harvest" height="1700" src="data:image/svg+xml,%3Csvg%20xmlns='http://www.w3.org/2000/svg'%20viewBox='0%200%201000%201700'%3E%3C/svg%3E" width="1000"><noscript data-dcnode-id="966"><span data-dcnode-id="967" instrument_node="">&lt;img class="aligncenter size-full wp-image-24384" src="https://www.attainable-sustainable.net/wp-content/uploads/2017/02/fruit-trees.jpg" alt="tree with white blossoms behind a fence" width="1000" height="1700" srcset="https://www.attainable-sustainable.net/wp-content/uploads/2017/02/fruit-trees.jpg 1000w, https://www.attainable-sustainable.net/wp-content/uploads/2017/02/fruit-trees-176x300.jpg 176w, https://www.attainable-sustainable.net/wp-content/uploads/2017/02/fruit-trees-602x1024.jpg 602w, https://www.attainable-sustainable.net/wp-content/uploads/2017/02/fruit-trees-88x150.jpg 88w, https://www.attainable-sustainable.net/wp-content/uploads/2017/02/fruit-trees-768x1306.jpg 768w, https://www.attainable-sustainable.net/wp-content/uploads/2017/02/fruit-trees-904x1536.jpg 904w, https://www.attainable-sustainable.net/wp-content/uploads/2017/02/fruit-trees-150x255.jpg 150w" sizes="(max-width: 1000px) 100vw, 1000px" /&gt;</span></noscript><span data-dcnode-id="965" instrument_node="">
</span><h3 data-dcnode-id="963"><span data-dcnode-id="964" instrument_node="">Adding fruit trees to an edible landscape</span></h3><span data-dcnode-id="962" instrument_node="">
</span><p data-dcnode-id="960"><span data-dcnode-id="961" instrument_node="">Adding a fruit tree or two to your yard or garden is pretty easy, but there are a couple of things you should think about before diving in and landscaping with fruit trees.</span></p><div class="atm-ad-slot" data-dcnode-id="959" data-slot-type="injected-ad"></div><span data-dcnode-id="958" instrument_node="">
</span><h4 data-dcnode-id="956"><span data-dcnode-id="957" instrument_node="">Chill hours</span></h4><span data-dcnode-id="955" instrument_node="">
</span><p data-dcnode-id="950"><span data-dcnode-id="954" instrument_node="">Basically, urban fruit trees need cold weather to triggering flowering (and thus fruiting). Some varieties need more than others. In my not-so-chilly region, I have to seek out fruit trees that are “</span><a data-dcnode-id="952" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.baylaurelnursery.com/low-chill-bare-root-varieties.html" rel="noopener" target="_blank"><span data-dcnode-id="953" instrument_node="">low chill</span></a><span data-dcnode-id="951" instrument_node="">” varieties. You’ll need to determine how many chill hours (the average number of hours below 45 degrees Fahrenheit) you get each winter.</span></p><span data-dcnode-id="949" instrument_node="">
</span><h4 data-dcnode-id="947"><span data-dcnode-id="948" instrument_node="">Pollination</span></h4><span data-dcnode-id="946" instrument_node="">
</span><p data-dcnode-id="938"><span data-dcnode-id="945" instrument_node="">In order for fruit to set and grow to maturity, the blossom needs to be pollinated. This is why it’s so important to encourage bees and other pollinators in your garden by </span><a data-dcnode-id="943" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.attainable-sustainable.net/perennials-attract-bees/"><span data-dcnode-id="944" instrument_node="">planting flowers</span></a><span data-dcnode-id="942" instrument_node=""> or </span><a data-dcnode-id="940" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.attainable-sustainable.net/bees/"><span data-dcnode-id="941" instrument_node="">creating a hospitable environment</span></a><span data-dcnode-id="939" instrument_node="">. This goes for garden crops as well as fruit trees.&nbsp;Bees carry pollen from one bloom&nbsp;to another, helping to pollinate each.</span></p><span data-dcnode-id="937" instrument_node="">
</span><p data-dcnode-id="932"><span data-dcnode-id="936" instrument_node="">Fruit trees are sometimes self-fertile, meaning that pollination can happen with just a single tree. This is most common with stone fruit like peaches, nectarines, and apricots. Others&nbsp;require cross-pollination between two trees. Choose two trees&nbsp;</span><strong data-dcnode-id="934"><span data-dcnode-id="935" instrument_node="">within in the same species that bloom at the same time</span></strong><span data-dcnode-id="933" instrument_node=""> and plant them within 50 feet&nbsp;of each other.</span></p><span data-dcnode-id="931" instrument_node="">
</span><h4 data-dcnode-id="929"><span data-dcnode-id="930" instrument_node="">Placement</span></h4><span data-dcnode-id="928" instrument_node="">
</span><p data-dcnode-id="926"><span data-dcnode-id="927" instrument_node="">Be sure to situate your small fruit trees in an area that won’t be negatively impacted by dropping fruit. Likewise, be sure that you take maintenance into consideration when landscaping with fruit trees. You’ll need access to prune and harvest your crop!</span></p><span data-dcnode-id="925" instrument_node="">
</span><h4 data-dcnode-id="923"><span data-dcnode-id="924" instrument_node="">Seasonality</span></h4><span data-dcnode-id="922" instrument_node="">
</span><p data-dcnode-id="917"><span data-dcnode-id="921" instrument_node="">One other thing to consider is what fruit is in season when. If you plant ten fruit trees that all produce fruit during the summer months, the rest of the year will be pretty lean as far as fresh fruit. Instead, think about planting a variety that will ripe across the seasons. Read more about </span><a data-dcnode-id="919" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.attainable-sustainable.net/seasonal-fruits/"><span data-dcnode-id="920" instrument_node="">seasonal fruits</span></a><span data-dcnode-id="918" instrument_node=""> for some inspiration when choosing urban fruit trees for your yard.</span></p><span data-dcnode-id="916" instrument_node="">
</span><p data-dcnode-id="913"><em data-dcnode-id="914"><span data-dcnode-id="915" instrument_node="">Originally published in February 2017; this post has been updated.</span></em></p><div class="atm-ad-slot" data-dcnode-id="912" data-slot-type="injected-ad"></div><span data-dcnode-id="911" instrument_node="">

</span><div class="comment_text" data-dcnode-id="691" id="comment-body-317305"><span data-dcnode-id="695" instrument_node="">
</span><p data-dcnode-id="693"><span data-dcnode-id="694" instrument_node="">The key to a disease resistant fruit tree is to feed the earthworms in the soil around the fruit roots often. I don’t ever need to spray my fruit trees or roses. Instead, I take all of my food scraps and run them through my blender to make a smoothie that earthworms will consume quickly AND poop out quickly making the soil nutrient dense and black. The fruit tree will became stronger and healthier.. Feed the earthworms around the roots of the fruit trees often and mulch really well…you’ll be glad you did!</span></p><span data-dcnode-id="692" instrument_node="">
</span></div><span data-dcnode-id="690" instrument_node="">

</span><div class="comment_text" data-dcnode-id="624" id="comment-body-279779"><span data-dcnode-id="630" instrument_node="">
</span><p data-dcnode-id="626"><span data-dcnode-id="629" instrument_node="">Meyer lemons can be easily grown in a pot. All trees can be kept pruned smaller, but it’s easier to just have those that are grafted on dwarf root stock. For people like me who live in a clay ground area (I’m in southern California), I would dig down and amend the soil. The old adage of dig a $10 hole for a $5 plant works wonders. To Annette L. in Southern Cali, if you are going to plant in a box without a bottom, I would agree with Kris except I would dig down at least a foot and amend the clay with 1/3 compost and some gypsum. This way the roots go from great soil to decent/ok soil to the clay. Don’t forget, that raised area should probably be at least 6′ across because of root growth. I don’t know for sure, but I’ve heard that fruit trees have a small crop every 3rd year and if that’s true, I just experienced it. The people before me never pruned and big branches cracked off the peach tree. I’ve seriously pruned down the peach, plum and apricot trees. Planted an almond and banana apple tree. I will be pruning slightly the cherry and pomegranate trees. All of those are in ground. In pots I have: Meyer lemon, Valencia orange, Pomelo, red dragon fruit (not yet fruiting), red plumeria and fiddle leaf fig (non-fruiting). The ones in pots need protection during the cold months where the nights are below 40 degrees.</span><br data-dcnode-id="628"><span data-dcnode-id="627" instrument_node="">
Thank you for your article. I enjoyed reading it very much.</span></p><span data-dcnode-id="625" instrument_node="">

</span><div class="comment_text" data-dcnode-id="410" id="comment-body-211377"><span data-dcnode-id="414" instrument_node="">
</span><p data-dcnode-id="412"><span data-dcnode-id="413" instrument_node="">My pear trees in Seattle had fireblight. I was told it was carried by bees drawn by spring blossoms, and that the treatment was to spray the trees while they were in blossom with streptomycin. I did that, and hygenically cut away the affected stems from the trees. It worked. I wondered if if the streptomycin in the nectar and pollen might help the bees with foulbrood, which I read was a factor in declining bee populations. What do you think?</span></p><span data-dcnode-id="411" instrument_node="">
</span></div><span data-dcnode-id="409" instrument_node="">

</span><div class="comment_text" data-dcnode-id="349" id="comment-body-207436"><span data-dcnode-id="353" instrument_node="">
</span><p data-dcnode-id="351"><span data-dcnode-id="352" instrument_node="">The soil in my Southern California yard is clay. I would like to plant some semi dwarf fruit trees in raised square boxes (bottoms removed) filled with good potting soil and set directly on the ground. The goal is that the trees will get a good start in the potting soil and eventually the roots will grow down into the soil beneath the boxes. Good idea or not?</span></p><span data-dcnode-id="350" instrument_node="">
</span></div><span data-dcnode-id="348" instrument_node="">

</span><div class="comment_text" data-dcnode-id="315" id="comment-body-207439"><span data-dcnode-id="325" instrument_node="">
</span><p data-dcnode-id="323"><span data-dcnode-id="324" instrument_node="">Hard to say if it’s a GOOD idea, but it’s one I’d try. Here’s what I’d add: </span></p><span data-dcnode-id="322" instrument_node="">
</span><p data-dcnode-id="320"><span data-dcnode-id="321" instrument_node="">1. Scarify (kind of roughen up) the soil below the pot. If the roots hit a flat layer of clay, they can just think they’ve hit the bottom of the pot and become pot-bound. If there’s a more uneven surface, they tend “push” into the soil. </span></p><span data-dcnode-id="319" instrument_node="">
</span><p data-dcnode-id="317"><span data-dcnode-id="318" instrument_node="">2. Put a 6″ layer of manure in the pot before you add potting soil. . I’ve seen piles of manure do amazing things for breaking up soil.</span></p><span data-dcnode-id="316" instrument_node="">
</span></div><span data-dcnode-id="314" instrument_node="">

</span><p data-dcnode-id="214"><span data-dcnode-id="221" instrument_node="">Aloha! I’m Kris Bordessa, </span><strong data-dcnode-id="219"><span data-dcnode-id="220" instrument_node="">author</span></strong><span data-dcnode-id="218" instrument_node=""> and </span><strong data-dcnode-id="216"><span data-dcnode-id="217" instrument_node="">certified Master Food Preserver</span></strong><span data-dcnode-id="215" instrument_node="">, hobby farmer, gardener, chicken wrangler, and eternal experimenter.</span></p><span data-dcnode-id="213" instrument_node="">
</span><p data-dcnode-id="200"><span data-dcnode-id="212" instrument_node="">I’m thrilled that my book, </span><a data-dcnode-id="208" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.attainable-sustainable.net/book/"><em data-dcnode-id="209"><strong data-dcnode-id="210"><span data-dcnode-id="211" instrument_node="">Attainable Sustainable: The Lost Art of Self-Reliant Living</span></strong></em></a><span data-dcnode-id="207" instrument_node=""> (National Geographic Books) was awarded the </span><strong data-dcnode-id="205"><span data-dcnode-id="206" instrument_node="">best how-to book of 2020</span></strong><span data-dcnode-id="204" instrument_node=""> by the </span><strong data-dcnode-id="202"><span data-dcnode-id="203" instrument_node="">American Society of Journalists and Authors</span></strong><span data-dcnode-id="201" instrument_node="">.</span></p><span data-dcnode-id="199" instrument_node="">
</span><p data-dcnode-id="194"><a data-dcnode-id="195" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.attainable-sustainable.net/book/"><img alt="cover of attainable sustainable book" class="size-full wp-image-17817 alignnone" data-dcnode-id="198" data-lazy-sizes="(max-width: 450px) 100vw, 450px" data-lazy-src="https://www.attainable-sustainable.net/wp-content/uploads/2019/12/attainable-book-cover-1.jpg" data-lazy-srcset="https://www.attainable-sustainable.net/wp-content/uploads/2019/12/attainable-book-cover-1.jpg 450w, https://www.attainable-sustainable.net/wp-content/uploads/2019/12/attainable-book-cover-1-236x300.jpg 236w, https://www.attainable-sustainable.net/wp-content/uploads/2019/12/attainable-book-cover-1-118x150.jpg 118w, https://www.attainable-sustainable.net/wp-content/uploads/2019/12/attainable-book-cover-1-288x367.jpg 288w, https://www.attainable-sustainable.net/wp-content/uploads/2019/12/attainable-book-cover-1-199x254.jpg 199w, https://www.attainable-sustainable.net/wp-content/uploads/2019/12/attainable-book-cover-1-136x173.jpg 136w" height="573" src="data:image/svg+xml,%3Csvg%20xmlns='http://www.w3.org/2000/svg'%20viewBox='0%200%20450%20573'%3E%3C/svg%3E" width="450"><noscript data-dcnode-id="196"><span data-dcnode-id="197" instrument_node="">&lt;img class="size-full wp-image-17817 alignnone" src="https://www.attainable-sustainable.net/wp-content/uploads/2019/12/attainable-book-cover-1.jpg" alt="cover of attainable sustainable book" width="450" height="573" srcset="https://www.attainable-sustainable.net/wp-content/uploads/2019/12/attainable-book-cover-1.jpg 450w, https://www.attainable-sustainable.net/wp-content/uploads/2019/12/attainable-book-cover-1-236x300.jpg 236w, https://www.attainable-sustainable.net/wp-content/uploads/2019/12/attainable-book-cover-1-118x150.jpg 118w, https://www.attainable-sustainable.net/wp-content/uploads/2019/12/attainable-book-cover-1-288x367.jpg 288w, https://www.attainable-sustainable.n </span><p data-dcnode-id="191"><span data-dcnode-id="192" instrument_node="">Here at Attainable Sustainable, I aim to encourage readers — that’s you! — to embrace a more self-reliant lifestyle, one small step at a time.</span></p><span data-dcnode-id="190" instrument_node="">
