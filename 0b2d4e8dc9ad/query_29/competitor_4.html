</span><h1 class="post-title" data-dcnode-id="1732"><span data-dcnode-id="1733" instrument_node="">Harvesting Fresh Lavender: How to Harvest, Prune &amp; Dry Lavender Flowers</span></h1><span data-dcnode-id="1731" instrument_node="">
</span><div class="post-meta clear-fix" data-dcnode-id="1720"><span data-dcnode-id="1730" instrument_node="">
</span><span class="post-date" data-dcnode-id="1728"><span data-dcnode-id="1729" instrument_node="">July 7, 2020</span></span><span data-dcnode-id="1727" instrument_node="">
</span><span class="meta-sep" data-dcnode-id="1725"><span data-dcnode-id="1726" instrument_node="">/</span></span><span data-dcnode-id="1724" instrument_node="">
</span><a class="post-comments" data-dcnode-id="1722" href="#comments"><span data-dcnode-id="1723" instrument_node="">42 Comments</span></a><span data-dcnode-id="1721" instrument_node=""> </span></div><span data-dcnode-id="1719" instrument_node="">
</span></header><span data-dcnode-id="1717" instrument_node="">
</span><div class="post-content" data-dcnode-id="1085"><span data-dcnode-id="1716" instrument_node="">
</span><p data-dcnode-id="1711"><span data-dcnode-id="1715" instrument_node="">Are you growing lavender in your garden? Read along to learn how to harvest fresh lavender flowers, along with several ways to dry and use them! Of all the scents in our garden, the fragrance of fresh lavender blooms has to be one of my all-time favorites. Yet lavender is so much more than just a pretty, aromatic flower! Soothing to both your skin and mind alike, lavender is an edible, versatile, highly-healing plant. It is also very attractive to pollinators, which is </span><em data-dcnode-id="1713"><span data-dcnode-id="1714" instrument_node="">always</span></em><span data-dcnode-id="1712" instrument_node=""> a desirable feature in a sustainable garden.&nbsp;</span></p><span data-dcnode-id="1710" instrument_node="">
</span><p data-dcnode-id="1708"><br data-dcnode-id="1709"></p><span data-dcnode-id="1707" instrument_node="">
</span><blockquote class="wp-block-quote" data-dcnode-id="1704"><p data-dcnode-id="1705"><span data-dcnode-id="1706" instrument_node="">English, Spanish, French…oh my! No matter what type of lavender you grow, all of these tips on how to harvest and dry fresh lavender apply. Harvesting lavender is incredibly easy. Plus, the more you harvest, the more blooms will come! In this article, we’ll go over the best time to harvest lavender, exactly where to trim it, as well as how to give the plant a deeper prune. Then I’ll show you three ways to dry fresh lavender buds, and share plenty of ideas on what to do with them! How does lavender salve, sachets, and cocktails sound?</span></p></blockquote><span data-dcnode-id="1703" instrument_node="">
</span><p data-dcnode-id="1701"><br data-dcnode-id="1702"></p><span data-dcnode-id="1700" instrument_node="">
</span><div class="wp-block-image" data-dcnode-id="1695"><figure class="aligncenter size-full is-resized" data-dcnode-id="1696"><img alt="A hand is holding a bouquet of freshly cut lavender by their stems, the flowers are pointing upwards towards the sky. In the background are a couple raised garden beds with squash, kale, onions, peppers, and basil growing in them. Growing around and amongst the raise beds are various perennials, annuals, trees, shrubs, and vines. " class="wp-image-1019818" data-dcnode-id="1699" height="871" loading="lazy" sizes="(max-width: 653px) 100vw, 653px" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//i0.wp.com/homesteadandchill.com/wp-content/uploads/2020/06/homestead-chill-organic-lavender-salve-fresh.jpeg%3Fresize%3D653%252C870%26ssl%3D1&amp;raw" srcset="https://i0.wp.com/homesteadandchill.com/wp-content/uploads/2020/06/homestead-chill-organic-lavender-salve-fresh.jpeg?w=1536&amp;ssl=1 1536w, https://i0.wp.com/homesteadandchill.com/wp-content/uploads/2020/06/homestead-chill-organic-lavender-salve-fresh.jpeg?resize=225%2C300&amp;ssl=1 225w, https://i0.wp.com/homesteadandchill.com/wp-content/uploads/2020/06/homestead-chill-organic-lavender-salve-fresh.jpeg?resize=768%2C1024&amp;ssl=1 768w, https://i0.wp.com/homesteadandchill.com/wp-content/uploads/2020/06/homestead-chill-organic-lavender-salve-fresh.jpeg?resize=1152%2C1536&amp;ssl=1 1152w, https://i0.wp.com/homesteadandchill.com/wp-content/uploads/2020/06/homestead-chill-organic-lavender-salve-fresh.jpeg?resize=1140%2C1520&amp;ssl=1 1140w, https://i0.wp.com/homesteadandchill.com/wp-content/uploads/2020/06/homestead-chill-organic-lavender-salve-fresh.jpeg?resize=600%2C800&amp;ssl=1 600w" width="653"><figcaption data-dcnode-id="1697"><span data-dcnode-id="1698" instrument_node="">A handful of French lavender blooms. (The bee in this article’s feature photo shown above is enjoying some of our English lavender)</span></figcaption></figure></div><span data-dcnode-id="1694" instrument_node="">
</span><h2 data-dcnode-id="1691"><br data-dcnode-id="1693"><span data-dcnode-id="1692" instrument_node="">Quick Tips on Growing Lavender</span></h2><span data-dcnode-id="1690" instrument_node="">
</span><p data-dcnode-id="1681"><br data-dcnode-id="1689"><span data-dcnode-id="1688" instrument_node="">Growing lavender can be fairly fuss-free in the right climate and conditions. In general, lavender can grow as a perennial in </span><strong data-dcnode-id="1686"><span data-dcnode-id="1687" instrument_node="">USDA zones 5 through 10</span></strong><span data-dcnode-id="1685" instrument_node="">, though nuances among each variety or climate can make the plants more or less happy. For example, we live in zone 9b/10a and our lavender grows readily – like a weed! Here, lavender bushes grow several feet in every direction and bloom essentially year round. Meanwhile folks in Florida (also zone 9b/10a) may struggle to grow lavender at all. That is because lavender </span><strong data-dcnode-id="1683"><span data-dcnode-id="1684" instrument_node="">thrives in warm, sunny, arid</span></strong><span data-dcnode-id="1682" instrument_node=""> Mediterranean climates, and it doesn’t do well in high humidity or wet conditions.&nbsp;&nbsp;</span></p><span data-dcnode-id="1680" instrument_node="">
</span><p data-dcnode-id="1669"><span data-dcnode-id="1679" instrument_node="">One way to offset frequent rains and dampness is to grow lavender in a container. Use a well-draining potting soil mixed with sand, or even a </span><a data-dcnode-id="1677" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.amazon.com/gp/product/B0030UQLIM/ref%3Das_li_tl%3Fie%3DUTF8%26tag%3Ddeannataleric-20%26camp%3D1789%26creative%3D9325%26linkCode%3Das2%26creativeASIN%3DB0030UQLIM%26linkId%3D5b910b13c3b585f2b5e51d162169bcc1" rel="noreferrer noopener" target="_blank"><span data-dcnode-id="1678" instrument_node="">cactus potting mix</span></a><span data-dcnode-id="1676" instrument_node="">. Above all else, </span><strong data-dcnode-id="1674"><span data-dcnode-id="1675" instrument_node="">avoid overwatering</span></strong><span data-dcnode-id="1673" instrument_node=""> it. Excessive moisture and overwatering is the most common cause of death in lavender. Soggy roots will quickly lead to fungal disease and demise. When planting lavender directly in the ground, choose a sunny location with</span><strong data-dcnode-id="1671"><span data-dcnode-id="1672" instrument_node=""> excellent drainage</span></strong><span data-dcnode-id="1670" instrument_node=""> and sandy soil. Lavender doesn’t need a lot of compost, fertilizer, or overly rich soil. In fact, it is happiest in poor rocky soil.&nbsp;</span></p><span data-dcnode-id="1668" instrument_node="">
</span><p data-dcnode-id="1661"><span data-dcnode-id="1667" instrument_node="">Lavender is slow and finicky to start from seed, though possible. Follow </span><a data-dcnode-id="1665" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//homesteadandchill.com/seed-starting-101/" rel="noreferrer noopener" target="_blank"><span data-dcnode-id="1666" instrument_node="">these tips </span></a><span data-dcnode-id="1664" instrument_node="">to start lavender seeds indoors, but give them up to a month or two to germinate. The quick-and-easiest way to grow lavender is to start with an established seedling or nursery plant. Truthfully, that is what we’ve always done! Young plants can also be slow growers at first, so be patient with them. By year two or three, the roots become established and they’ll grow and bloom more vigorously. </span><em data-dcnode-id="1662"><span data-dcnode-id="1663" instrument_node="">First year sleep, second year creep, third year leap.</span></em></p><span data-dcnode-id="1660" instrument_node="">
</span><h2 data-dcnode-id="1657"><br data-dcnode-id="1659"><span data-dcnode-id="1658" instrument_node="">Lavender Varieties</span></h2><span data-dcnode-id="1656" instrument_node="">
</span><p data-dcnode-id="1647"><br data-dcnode-id="1655"><span data-dcnode-id="1654" instrument_node="">There are numerous varieties of lavender to choose from. Most all of them fall into one of the broader groups of either </span><strong data-dcnode-id="1652"><span data-dcnode-id="1653" instrument_node="">English, French, or Spanish</span></strong><span data-dcnode-id="1651" instrument_node=""> lavender. Some stay quite compact, while others get huge! Dozens of hybrids exist too. All varieties offer wonderful aroma and are technically edible, though English and lavandin varieties (</span><em data-dcnode-id="1649"><span data-dcnode-id="1650" instrument_node="">L. x intermedia</span></em><span data-dcnode-id="1648" instrument_node="">) are the most sweet and palatable for culinary applications.</span></p><span data-dcnode-id="1646" instrument_node="">
</span><p data-dcnode-id="1632"><span data-dcnode-id="1645" instrument_node="">Seek out varieties that are well-suited to your climate. For example, true English Lavenders (</span><em data-dcnode-id="1643"><span data-dcnode-id="1644" instrument_node="">Lavandula angustifolia</span></em><span data-dcnode-id="1642" instrument_node="">) are the most cold-hardy, including ‘Hidecote’ and ‘Munstead’ varieties of English lavender. Those are the few rated down to zone 5. French and Spanish lavenders do better in warmer climates and higher zones. ‘Phenomenal’ is a true English&nbsp;lavender&nbsp;that is known to handle the heat and humidity of the southeast. </span><em data-dcnode-id="1640"><span data-dcnode-id="1641" instrument_node="">Lavandula stoechas</span></em><span data-dcnode-id="1639" instrument_node=""> and </span><em data-dcnode-id="1637"><span data-dcnode-id="1638" instrument_node="">L</span></em><span data-dcnode-id="1636" instrument_node="">. </span><em data-dcnode-id="1634"><span data-dcnode-id="1635" instrument_node="">dentata</span></em><span data-dcnode-id="1633" instrument_node="">&nbsp;are also among some of the more humidity-tolerant varieties. </span></p><span data-dcnode-id="1631" instrument_node="">
</span><p data-dcnode-id="1623"><span data-dcnode-id="1630" instrument_node="">If you aren’t sure what your USDA growing zone is, use </span><a data-dcnode-id="1628" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//planthardiness.ars.usda.gov/PHZMWeb/" rel="noreferrer noopener" target="_blank"><span data-dcnode-id="1629" instrument_node="">this simple zip code lookup tool</span></a><span data-dcnode-id="1627" instrument_node=""> to find out. I always suggest plant shopping at </span><strong data-dcnode-id="1625"><span data-dcnode-id="1626" instrument_node="">locally-owned nurseries</span></strong><span data-dcnode-id="1624" instrument_node=""> – they’ll likely carry lavender varieties best suited to your area! We grow a wide selection of French, Spanish, and English lavender varieties in our temperate garden.</span></p><span data-dcnode-id="1622" instrument_node="">
</span><p data-dcnode-id="1620"><br data-dcnode-id="1621"></p><span data-dcnode-id="1619" instrument_node="">
</span><div class="wp-block-image" data-dcnode-id="1614"><figure class="aligncenter size-full is-resized" data-dcnode-id="1615"><img alt="A large Spanish lavender plant is featured with hundreds of fresh purple blooming flowers. The purple contrasts the plants light mint colored foliage. Beyond the lavender are various fruit trees and flowering perennials with varying flower coloration from yellow, to white, to orange, blue and pink. There is a horizontal fence just beyond the plants and trees and the setting sun is shinning through an open slat. " class="wp-image-1020058" data-dcnode-id="1618" height="871" loading="lazy" sizes="(max-width: 653px) 100vw, 653px" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//i0.wp.com/homesteadandchill.com/wp-content/uploads/2020/07/harvest-dry-lavender-spanish.jpeg%3Fresize%3D653%252C870%26ssl%3D1&amp;raw" srcset="https://i0.wp.com/homesteadandchill.com/wp-content/uploads/2020/07/harvest-dry-lavender-spanish.jpeg?w=1536&amp;ssl=1 1536w, https://i0.wp.com/homesteadandchill.com/wp-content/uploads/2020/07/harvest-dry-lavender-spanish.jpeg?resize=225%2C300&amp;ssl=1 225w, https://i0.wp.com/homesteadandchill.com/wp-content/uploads/2020/07/harvest-dry-lavender-spanish.jpeg?resize=768%2C1024&amp;ssl=1 768w, https://i0.wp.com/homesteadandchill.com/wp-content/uploads/2020/07/harvest-dry-lavender-spanish.jpeg?resize=1152%2C1536&amp;ssl=1 1152w, https://i0.wp.com/homesteadandchill.com/wp-content/uploads/2020/07/harvest-dry-lavender-spanish.jpeg?resize=1140%2C1520&amp;ssl=1 1140w, https://i0.wp.com/homesteadandchill.com/wp-content/uploads/2020/07/harvest-dry-lavender-spanish.jpeg?resize=600%2C800&amp;ssl=1 600w" width="653"><figcaption data-dcnode-id="1616"><span data-dcnode-id="1617" instrument_node="">Spanish lavender in our front yard garden.</span></figcaption></figure></div><span data-dcnode-id="1613" instrument_node="">
</span><p data-dcnode-id="1611"><br data-dcnode-id="1612"></p><span data-dcnode-id="1610" instrument_node="">
</span><h2 class="has-text-align-center" data-dcnode-id="1607"><br data-dcnode-id="1609"><span data-dcnode-id="1608" instrument_node="">HOW TO HARVEST LAVENDER FLOWERS</span></h2><span data-dcnode-id="1606" instrument_node="">
</span><p data-dcnode-id="1603"><br data-dcnode-id="1605"><span data-dcnode-id="1604" instrument_node="">If you’re able to successfully grow lavender, now comes the easiest (and most rewarding) part: harvesting. The best news is, the more you prune your lavender, the more flowers will grow! Harvesting and pruning lavender also encourages branching, resulting in an increasingly bushy plant.&nbsp;</span></p><span data-dcnode-id="1602" instrument_node="">
</span><p data-dcnode-id="1594"><span data-dcnode-id="1601" instrument_node="">Some of the most common questions I receive about growing lavender are “</span><em data-dcnode-id="1599"><span data-dcnode-id="1600" instrument_node="">when is the best time to harvest lavender?</span></em><span data-dcnode-id="1598" instrument_node="">” and “</span><em data-dcnode-id="1596"><span data-dcnode-id="1597" instrument_node="">exactly how do you harvest or prune lavender?</span></em><span data-dcnode-id="1595" instrument_node="">” – so let’s go over all of the above!</span></p><span data-dcnode-id="1593" instrument_node="">
</span><h3 data-dcnode-id="1590"><br data-dcnode-id="1592"><span data-dcnode-id="1591" instrument_node="">When to Harvest Lavender</span></h3><span data-dcnode-id="1589" instrument_node="">
</span><p data-dcnode-id="1582"><br data-dcnode-id="1588"><span data-dcnode-id="1587" instrument_node="">The best time to harvest lavender is: early, on many levels! </span><em data-dcnode-id="1585"><span data-dcnode-id="1586" instrument_node="">Early spring, early bloom, early morning</span></em><strong data-dcnode-id="1583"><span data-dcnode-id="1584" instrument_node="">.&nbsp;</span></strong></p><span data-dcnode-id="1581" instrument_node="">
</span><p data-dcnode-id="1576"><span data-dcnode-id="1580" instrument_node="">Harvesting lavender flowers in the </span><strong data-dcnode-id="1578"><span data-dcnode-id="1579" instrument_node="">early spring</span></strong><span data-dcnode-id="1577" instrument_node=""> will give the plant ample time to produce another flush of blooms to enjoy again in the late summer to fall. This is especially pertinent if you have a short summer growing season. In frost-free climates where some varieties of lavender may bloom year-round, you can continually harvest small bunches over and over throughout the year.&nbsp;</span></p><span data-dcnode-id="1575" instrument_node="">
</span><p data-dcnode-id="1570"><span data-dcnode-id="1574" instrument_node="">If you have hopes for the highest fragrance and essential oil content, the best time to harvest individual lavender flowers is </span><strong data-dcnode-id="1572"><span data-dcnode-id="1573" instrument_node="">early in their bloom cycle</span></strong><span data-dcnode-id="1571" instrument_node="">. Meaning, when the young tender buds are tight and barely starting to bloom. Fully-open lavender flowers will boast the most color, and are highly attractive for bouquets. As lavender flowers age, their aroma and therapeutic oil content decreases. Also, mature browning flower buds will crumble and fall off the stem more easily, which isn’t ideal for bouquets and can make for a messy drying process. However, I don’t let that stop me from sometimes using older blooms too!&nbsp;Late is better than never, as removing spent blooms is good for the plant regardless. </span></p><span data-dcnode-id="1569" instrument_node="">
</span><p data-dcnode-id="1564"><span data-dcnode-id="1568" instrument_node="">Finally, herbalists traditionally harvest medicinal flowers in the </span><strong data-dcnode-id="1566"><span data-dcnode-id="1567" instrument_node="">early morning</span></strong><span data-dcnode-id="1565" instrument_node="">, once any dew has dried but when the plants are still perky from the cool night air. As the day goes on, some of the fragrant essential oils and terpenes will begin to dissipate in the hot sun. I try to follow this practice as much as possible, especially when I plan to make medicinal oil or salve from the lavender buds. However, life is busy – so pick ‘em when you can!</span></p><span data-dcnode-id="1563" instrument_node="">
</span><p data-dcnode-id="1561"><br data-dcnode-id="1562"></p><span data-dcnode-id="1560" instrument_node="">
</span><div class="wp-block-image" data-dcnode-id="1555"><figure class="aligncenter size-full is-resized" data-dcnode-id="1556"><img alt="An index finger is being used to prop up a newly harvested lavender bloom. Only a few of the flower buds have opened along the main flower, the others are still closed with some closer to opening than others. This flower is a perfect example of what to use to dry lavender. The background consists of the lavender plant that produced the featured flower. There are many flowering branches of varying degrees of purple. " class="wp-image-1020059" data-dcnode-id="1559" height="871" loading="lazy" sizes="(max-width: 653px) 100vw, 653px" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//i0.wp.com/homesteadandchill.com/wp-content/uploads/2020/07/harvest-dry-lavender-early-fresh-bloom.jpg%3Fresize%3D653%252C870%26ssl%3D1&amp;raw" srcset="https://i0.wp.com/homesteadandchill.com/wp-content/uploads/2020/07/harvest-dry-lavender-early-fresh-bloom.jpg?w=1536&amp;ssl=1 1536w, https://i0.wp.com/homesteadandchill.com/wp-content/uploads/2020/07/harvest-dry-lavender-early-fresh-bloom.jpg?resize=225%2C300&amp;ssl=1 225w, https://i0.wp.com/homesteadandchill.com/wp-content/uploads/2020/07/harvest-dry-lavender-early-fresh-bloom.jpg?resize=768%2C1024&amp;ssl=1 768w, https://i0.wp.com/homesteadandchill.com/wp-content/uploads/2020/07/harvest-dry-lavender-early-fresh-bloom.jpg?resize=1152%2C1536&amp;ssl=1 1152w, https://i0.wp.com/homesteadandchill.com/wp-content/uploads/2020/07/harvest-dry-lavender-early-fresh-bloom.jpg?resize=1140%2C1520&amp;ssl=1 1140w, https://i0.wp.com/homesteadandchill.com/wp-content/uploads/2020/07/harvest-dry-lavender-early-fresh-bloom.jpg?resize=600%2C800&amp;ssl=1 600w" width="653"><figcaption data-dcnode-id="1557"><span data-dcnode-id="1558" instrument_node="">Provence lavender in early bloom. Note how most of the individual buds are still closed, with a couple that have just opened.</span></figcaption></figure></div><span data-dcnode-id="1554" instrument_node="">
</span><h3 data-dcnode-id="1551"><br data-dcnode-id="1553"><span data-dcnode-id="1552" instrument_node="">Where to Harvest Lavender Flowers</span></h3><span data-dcnode-id="1550" instrument_node="">
</span><p data-dcnode-id="1538"><br data-dcnode-id="1549"><span data-dcnode-id="1548" instrument_node="">To harvest individual lavender flowers, first identify the bloom that you wish to harvest. Then, follow the stem down from the flower bud until you reach </span><strong data-dcnode-id="1546"><span data-dcnode-id="1547" instrument_node="">a junction</span></strong><span data-dcnode-id="1545" instrument_node=""> where two side leaves, new buds, or branches have begun to form. Using </span><a data-dcnode-id="1543" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.amazon.com/dp/B01MU8CP1W/%3Fref%3Dexp_deannacat3_dp_vv_d" rel="noreferrer noopener" target="_blank"><span data-dcnode-id="1544" instrument_node="">small pruning snips</span></a><span data-dcnode-id="1542" instrument_node=""> or scissors, cut the stem there – just </span><em data-dcnode-id="1540"><span data-dcnode-id="1541" instrument_node="">above</span></em><span data-dcnode-id="1539" instrument_node=""> the leaves or side branches. Once the center stem and flower is removed, the plant redirects its energy. Now, those two side shoots will rapidly grow and produce fresh flowers of their own!&nbsp;</span></p><span data-dcnode-id="1537" instrument_node="">
</span><p data-dcnode-id="1535"><span data-dcnode-id="1536" instrument_node="">For longer stems or a bouquet that also includes some green foliage, simply follow the main stem down a little farther, snipping above a similar branching junction but deeper into the plant. You may find the need to do this with smaller, compact lavender plants that have less space between the bud and leaf nodes. Or, to clip a little extra off a large established plant.&nbsp;</span></p><span data-dcnode-id="1534" instrument_node="">
</span><p data-dcnode-id="1532"><span data-dcnode-id="1533" instrument_node="">After harvest, you ’ll be left with a nice little bunch of lavender – perfect to hang and dry, or to display as a beautiful bouquet. To enjoy lavender like classic cut flowers, simply place the harvested blooms in a vase of water (if you don’t intend to dry them). For medicinal or edible applications, you’ll want to use it as soon as possible for the best fragrance and flavor. Keep reading below to learn how to dry fresh lavender.&nbsp;</span></p><span data-dcnode-id="1531" instrument_node="">
</span><p data-dcnode-id="1529"><br data-dcnode-id="1530"></p><span data-dcnode-id="1528" instrument_node="">
</span><div class="wp-block-image" data-dcnode-id="1523"><figure class="aligncenter size-full is-resized" data-dcnode-id="1524"><img alt="A hand is holding back a branch of a lavender plant to illustrate where along the branch should be pruned. The plants soft and velvet like foliage can be seen with a nearby branch containing an immature flower that hasn't yet fully formed into its more recognizable form." class="wp-image-1020063" data-dcnode-id="1527" height="869" loading="lazy" sizes="(max-width: 652px) 100vw, 652px" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//i0.wp.com/homesteadandchill.com/wp-content/uploads/2020/07/harvest-dry-lavender-where-to-cut.jpg%3Fresize%3D652%252C869%26ssl%3D1&amp;raw" srcset="https://i0.wp.com/homesteadandchill.com/wp-content/uploads/2020/07/harvest-dry-lavender-where-to-cut.jpg?w=1536&amp;ssl=1 1536w, https://i0.wp.com/homesteadandchill.com/wp-content/uploads/2020/07/harvest-dry-lavender-where-to-cut.jpg?resize=225%2C300&amp;ssl=1 225w, https://i0.wp.com/homesteadandchill.com/wp-content/uploads/2020/07/harvest-dry-lavender-where-to-cut.jpg?resize=768%2C1024&amp;ssl=1 768w, https://i0.wp.com/homesteadandchill.com/wp-content/uploads/2020/07/harvest-dry-lavender-where-to-cut.jpg?resize=1152%2C1536&amp;ssl=1 1152w, https://i0.wp.com/homesteadandchill.com/wp-content/uploads/2020/07/harvest-dry-lavender-where-to-cut.jpg?resize=1140%2C1520&amp;ssl=1 1140w, https://i0.wp.com/homesteadandchill.com/wp-content/uploads/2020/07/harvest-dry-lavender-where-to-cut.jpg?resize=600%2C800&amp;ssl=1 600w" width="652"><figcaption data-dcnode-id="1525"><span data-dcnode-id="1526" instrument_node="">Locating a junction/leaf node along the main stem (the flower bud is above my hand)</span></figcaption></figure></div><span data-dcnode-id="1522" instrument_node="">
</span><div class="wp-block-image" data-dcnode-id="1517"><figure class="aligncenter size-full is-resized" data-dcnode-id="1518"><img alt="Small pruning snips are positioned just above a node on the branch of a lavender plant that will soon be pruned. Nearby are a couple immature lavender flowers that will soon be larger buds full of smaller purple flowers. " class="wp-image-1020062" data-dcnode-id="1521" height="868" loading="lazy" sizes="(max-width: 651px) 100vw, 651px" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//i0.wp.com/homesteadandchill.com/wp-content/uploads/2020/07/harvest-dry-lavender-trimming.jpeg%3Fresize%3D651%252C868%26ssl%3D1&amp;raw" srcset="https://i0.wp.com/homesteadandchill.com/wp-content/uploads/2020/07/harvest-dry-lavender-trimming.jpeg?w=1536&amp;ssl=1 1536w, https://i0.wp.com/homesteadandchill.com/wp-content/uploads/2020/07/harvest-dry-lavender-trimming.jpeg?resize=225%2C300&amp;ssl=1 225w, https://i0.wp.com/homesteadandchill.com/wp-content/uploads/2020/07/harvest-dry-lavender-trimming.jpeg?resize=768%2C1024&amp;ssl=1 768w, https://i0.wp.com/homesteadandchill.com/wp-content/uploads/2020/07/harvest-dry-lavender-trimming.jpeg?resize=1152%2C1536&amp;ssl=1 1152w, https://i0.wp.com/homesteadandchill.com/wp-content/uploads/2020/07/harvest-dry-lavender-trimming.jpeg?resize=1140%2C1520&amp;ssl=1 1140w, https://i0.wp.com/homesteadandchill.com/wp-content/uploads/2020/07/harvest-dry-lavender-trimming.jpeg?resize=600%2C800&amp;ssl=1 600w" width="651"><figcaption data-dcnode-id="1519"><span data-dcnode-id="1520" instrument_node="">Trim just above a node or junction along the main stem.</span></figcaption></figure></div><span data-dcnode-id="1516" instrument_node="">
</span><div class="wp-block-image" data-dcnode-id="1511"><figure class="aligncenter size-full is-resized" data-dcnode-id="1512"><img alt="A previously pruned lavender branch is featured, it is now in the shape of a &quot;Y&quot; as the pruned portion of the branch was removed and two new growths emerged to create their own branch. Rosemary, marigolds, a fig tree, and bougainvillea lie just beyond the featured flower in the background. " class="wp-image-1020064" data-dcnode-id="1515" height="869" loading="lazy" sizes="(max-width: 652px) 100vw, 652px" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//i0.wp.com/homesteadandchill.com/wp-content/uploads/2020/07/harvest-dry-lavender-side-branching.jpg%3Fresize%3D652%252C869%26ssl%3D1&amp;raw" srcset="https://i0.wp.com/homesteadandchill.com/wp-content/uploads/2020/07/harvest-dry-lavender-side-branching.jpg?w=1536&amp;ssl=1 1536w, https://i0.wp.com/homesteadandchill.com/wp-content/uploads/2020/07/harvest-dry-lavender-side-branching.jpg?resize=225%2C300&amp;ssl=1 225w, https://i0.wp.com/homesteadandchill.com/wp-content/uploads/2020/07/harvest-dry-lavender-side-branching.jpg?resize=768%2C1024&amp;ssl=1 768w, https://i0.wp.com/homesteadandchill.com/wp-content/uploads/2020/07/harvest-dry-lavender-side-branching.jpg?resize=1152%2C1536&amp;ssl=1 1152w, https://i0.wp.com/homesteadandchill.com/wp-content/uploads/2020/07/harvest-dry-lavender-side-branching.jpg?resize=1140%2C1520&amp;ssl=1 1140w, https://i0.wp.com/homesteadandchill.com/wp-content/uploads/2020/07/harvest-dry-lavender-side-branching.jpg?resize=600%2C800&amp;ssl=1 600w" width="652"><figcaption data-dcnode-id="1513"><span data-dcnode-id="1514" instrument_node="">Within a few days after trimming the center stem, the young side branches will rapidly grow and develop flower buds of their own. </span></figcaption></figure></div><span data-dcnode-id="1510" instrument_node="">
</span><h2 data-dcnode-id="1507"><br data-dcnode-id="1509"><span data-dcnode-id="1508" instrument_node="">How to Prune Lavender</span></h2><span data-dcnode-id="1506" instrument_node="">
</span><p data-dcnode-id="1500"><br data-dcnode-id="1505"><span data-dcnode-id="1504" instrument_node="">Pruning lavender is similar to the harvesting process, just a bit more vigorous! Plan to prune your lavender plant </span><strong data-dcnode-id="1502"><span data-dcnode-id="1503" instrument_node="">once or twice per year. </span></strong><span data-dcnode-id="1501" instrument_node="">Always prune after flowering. If you prune lavender right before it goes into bloom, it will significantly delay the arrival of flowers.</span></p><span data-dcnode-id="1499" instrument_node="">
</span><p data-dcnode-id="1497"><span data-dcnode-id="1498" instrument_node="">The first and less crucial “pruning” session can simply be harvesting a good amount of the first bloom of flowers in spring. Even if you aren’t harvesting flowers to keep and dry, the act of deadheading (removing spent blooms) is great for overall plant health and promotes new growth. During the spring prune, aim to cut back about a quarter to one-third of the plant.&nbsp;&nbsp;&nbsp;</span></p><span data-dcnode-id="1496" instrument_node="">
</span><p data-dcnode-id="1491"><span data-dcnode-id="1495" instrument_node="">The best time to give your lavender plant a slightly harder prune is </span><strong data-dcnode-id="1493"><span data-dcnode-id="1494" instrument_node="">in the fall</span></strong><span data-dcnode-id="1492" instrument_node="">, after the last bout of flowers fades. Hardy English lavender varieties naturally die back in the winter and respond better to hard pruning than non-English varieties.&nbsp; </span></p><span data-dcnode-id="1490" instrument_node="">
</span><p data-dcnode-id="1488"><br data-dcnode-id="1489"></p><span data-dcnode-id="1487" instrument_node="">
</span><div class="wp-block-image" data-dcnode-id="1479"><figure class="aligncenter size-full" data-dcnode-id="1480"><img alt="A diagram of an English lavender plant with three white lines drawn across the width of the plant in a semi arch. The top line is labeled &quot;approximate height after flower harvest&quot;, the second line is the &quot;approximate pruning line&quot;, and the third and bottom line is the &quot;start of new growth&quot;." class="wp-image-1020080" data-dcnode-id="1486" data-recalc-dims="1" height="460" loading="lazy" sizes="(max-width: 600px) 100vw, 600px" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//i0.wp.com/homesteadandchill.com/wp-content/uploads/2020/07/harvest-dry-lavender-pruning-diagram.jpeg%3Fresize%3D600%252C460%26ssl%3D1&amp;raw" srcset="https://i0.wp.com/homesteadandchill.com/wp-content/uploads/2020/07/harvest-dry-lavender-pruning-diagram.jpeg?w=600&amp;ssl=1 600w, https://i0.wp.com/homesteadandchill.com/wp-content/uploads/2020/07/harvest-dry-lavender-pruning-diagram.jpeg?resize=300%2C230&amp;ssl=1 300w" width="600"><figcaption data-dcnode-id="1481"><span data-dcnode-id="1485" instrument_node="">An illustration of where to prune English lavender, just above the old woody growth. Image courtesy of </span><a data-dcnode-id="1483" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.omafra.gov.on.ca/english/crops/facts/18-017.htm" rel="noreferrer noopener" target="_blank"><span data-dcnode-id="1484" instrument_node="">Ontario Ministry of Agriculture, Food &amp; Rural Affairs</span></a><br data-dcnode-id="1482"></figcaption></figure></div><span data-dcnode-id="1478" instrument_node="">
</span><h3 data-dcnode-id="1475"><br data-dcnode-id="1477"><span data-dcnode-id="1476" instrument_node="">Pruning English Lavender</span></h3><span data-dcnode-id="1474" instrument_node="">
</span><p data-dcnode-id="1466"><span data-dcnode-id="1473" instrument_node="">Prune</span><strong data-dcnode-id="1471"><span data-dcnode-id="1472" instrument_node=""> </span></strong><span data-dcnode-id="1470" instrument_node="">English lavender back by</span><strong data-dcnode-id="1468"><span data-dcnode-id="1469" instrument_node=""> one-half to two-thirds</span></strong><span data-dcnode-id="1467" instrument_node=""> of the new growth each fall. As with harvesting, trim just above leaf nodes or side branches. Avoid cutting into the lowest bare woody growth. Take a peek around the base of the lavender plant: you’ll see tough woody growth close to the ground that has no sprouts or leaf nodes, and more tender growth (green or light brown) above that. Trim at least a few inches above the naked woody part, leaving behind a couple leaf nodes per branch.&nbsp;</span></p><span data-dcnode-id="1465" instrument_node="">
</span><h3 data-dcnode-id="1462"><br data-dcnode-id="1464"><span data-dcnode-id="1463" instrument_node="">Pruning Spanish &amp; French Lavender</span></h3><span data-dcnode-id="1461" instrument_node="">
</span><p data-dcnode-id="1456"><span data-dcnode-id="1460" instrument_node="">To prune more tender Spanish and French lavender varieties, be </span><strong data-dcnode-id="1458"><span data-dcnode-id="1459" instrument_node="">more gentle</span></strong><span data-dcnode-id="1457" instrument_node=""> than you would with English Lavender. Cutting back too much can damage and potentially kill the plant. Lightly prune, harvest, or deadhead blooms throughout the growing season. Then towards the end of summer, prune the shrub into a rounded mound of foliage. Most gardening resources recommend taking off no more than one-third of the plant.&nbsp;</span></p><span data-dcnode-id="1455" instrument_node="">
</span><p data-dcnode-id="1447"><br data-dcnode-id="1454"><span data-dcnode-id="1453" instrument_node="">Despite the “best practices”, </span><strong data-dcnode-id="1451"><span data-dcnode-id="1452" instrument_node="">don’t be too nervous</span></strong><span data-dcnode-id="1450" instrument_node=""> about pruning! A just-pruned lavender plant can look quite rough around the edges… literally. Don’t worry, it will bounce back and fill in! Plus, routine pruning actually prolongs the life of the plant. We have cut some established plants that were yellowing and looking a bit sad waaaaaay back (almost to the ground, into the “no-no” woody zone) and they were full of lush new growth within a few months.&nbsp;</span><em data-dcnode-id="1448"><span data-dcnode-id="1449" instrument_node="">The more established the plant, the more resilient it is to a hard prune. </span></em></p><span data-dcnode-id="1446" instrument_node="">
</span><p data-dcnode-id="1444"><br data-dcnode-id="1445"></p><span data-dcnode-id="1443" instrument_node="">
</span><div class="wp-block-image" data-dcnode-id="1438"><figure class="aligncenter size-full is-resized" data-dcnode-id="1439"><img alt="The north side of a lavender plant is shown, the blooms are clearly visible along the topside of the plant. The underside and edge of the plant has been recently pruned as it was blocking the paver boundary and walkway. The more woody undergrowth is visible below the lush green foliage. Use pruned flowers to dry lavender, preserving the flowers for future use. " class="wp-image-1020083" data-dcnode-id="1442" data-recalc-dims="1" height="866" loading="lazy" sizes="(max-width: 650px) 100vw, 650px" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//i0.wp.com/homesteadandchill.com/wp-content/uploads/2020/07/harvest-dry-lavender-pruning-grosso.jpg%3Fresize%3D650%252C866%26ssl%3D1&amp;raw" srcset="https://i0.wp.com/homesteadandchill.com/wp-content/uploads/2020/07/harvest-dry-lavender-pruning-grosso.jpg?w=1536&amp;ssl=1 1536w, https://i0.wp.com/homesteadandchill.com/wp-content/uploads/2020/07/harvest-dry-lavender-pruning-grosso.jpg?resize=225%2C300&amp;ssl=1 225w, https://i0.wp.com/homesteadandchill.com/wp-content/uploads/2020/07/harvest-dry-lavender-pruning-grosso.jpg?resize=768%2C1024&amp;ssl=1 768w, https://i0.wp.com/homesteadandchill.com/wp-content/uploads/2020/07/harvest-dry-lavender-pruning-grosso.jpg?resize=1152%2C1536&amp;ssl=1 1152w, https://i0.wp.com/homesteadandchill.com/wp-content/uploads/2020/07/harvest-dry-lavender-pruning-grosso.jpg?resize=1140%2C1520&amp;ssl=1 1140w, https://i0.wp.com/homesteadandchill.com/wp-content/uploads/2020/07/harvest-dry-lavender-pruning-grosso.jpg?resize=600%2C800&amp;ssl=1 600w" width="650"><figcaption data-dcnode-id="1440"><span data-dcnode-id="1441" instrument_node="">This massive lavender bush had grown unchecked to block an entire pathway in our front yard garden (out past the row of pavers) – so we hacked it back hard! I knew it was established enough to handle a good prune, and I did end up cutting down into the wood growth in some places. See the photo to follow.</span></figcaption></figure></div><span data-dcnode-id="1437" instrument_node="">
</span><div class="wp-block-image" data-dcnode-id="1432"><figure class="aligncenter size-full is-resized" data-dcnode-id="1433"><img alt="The woody undergrowth of a plant is shown. The main trunk or stalk is much thicker than the surrounding woody branches. Even after a heavy prune, there is new green growth emerging from woody portion of plant. " class="wp-image-1020084" data-dcnode-id="1436" data-recalc-dims="1" height="868" loading="lazy" sizes="(max-width: 652px) 100vw, 652px" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//i0.wp.com/homesteadandchill.com/wp-content/uploads/2020/07/harvest-dry-lavender-pruning-grosso-close-up-woody-growth.jpg%3Fresize%3D652%252C868%26ssl%3D1&amp;raw" srcset="https://i0.wp.com/homesteadandchill.com/wp-content/uploads/2020/07/harvest-dry-lavender-pruning-grosso-close-up-woody-growth.jpg?w=1536&amp;ssl=1 1536w, https://i0.wp.com/homesteadandchill.com/wp-content/uploads/2020/07/harvest-dry-lavender-pruning-grosso-close-up-woody-growth.jpg?resize=225%2C300&amp;ssl=1 225w, https://i0.wp.com/homesteadandchill.com/wp-content/uploads/2020/07/harvest-dry-lavender-pruning-grosso-close-up-woody-growth.jpg?resize=768%2C1024&amp;ssl=1 768w, https://i0.wp.com/homesteadandchill.com/wp-content/uploads/2020/07/harvest-dry-lavender-pruning-grosso-close-up-woody-growth.jpg?resize=1152%2C1536&amp;ssl=1 1152w, https://i0.wp.com/homesteadandchill.com/wp-content/uploads/2020/07/harvest-dry-lavender-pruning-grosso-close-up-woody-growth.jpg?resize=1140%2C1520&amp;ssl=1 1140w, https://i0.wp.com/homesteadandchill.com/wp-content/uploads/2020/07/harvest-dry-lavender-pruning-grosso-close-up-woody-growth.jpg?resize=600%2C800&amp;ssl=1 600w" width="652"><figcaption data-dcnode-id="1434"><span data-dcnode-id="1435" instrument_node="">The undercarriage of the massive lavender bush shown above. This is about a month after it got a major cut back. Even though I cut into the woody parts (avoiding the main “trunk”), you can see fresh new green growth already starting to sprout from the wood. I wouldn’t recommend doing this to the entire plant, but this side needed it. </span></figcaption></figure></div><span data-dcnode-id="1431" instrument_node="">
</span><h2 class="has-text-align-center" data-dcnode-id="1428"><br data-dcnode-id="1430"><span data-dcnode-id="1429" instrument_node="">HOW TO DRY LAVENDER FLOWERS</span></h2><span data-dcnode-id="1427" instrument_node="">
</span><p data-dcnode-id="1424"><br data-dcnode-id="1426"><span data-dcnode-id="1425" instrument_node="">Now that you’ve harvested fresh lavender, let’s talk about three different ways you can dry it. The method you choose is totally up to you. I will touch on some of the pros and cons of each.&nbsp;</span></p><span data-dcnode-id="1423" instrument_node="">
</span><h3 data-dcnode-id="1420"><br data-dcnode-id="1422"><span data-dcnode-id="1421" instrument_node="">1) Hanging Lavender to Dry</span></h3><span data-dcnode-id="1419" instrument_node="">
</span><p data-dcnode-id="1416"><br data-dcnode-id="1418"><span data-dcnode-id="1417" instrument_node="">The most simple way to dry fresh lavender is to let it hang dry.&nbsp;</span></p><span data-dcnode-id="1415" instrument_node="">
</span><ul data-dcnode-id="1393"><li data-dcnode-id="1413"><span data-dcnode-id="1414" instrument_node="">Collect handful-size bouquets, secure the stems together with twine or a rubber band, and hang them upside down to passively dry.&nbsp;</span></li><li data-dcnode-id="1408"><span data-dcnode-id="1412" instrument_node="">If you harvested a lot of lavender at once, it is best to create and hang several </span><strong data-dcnode-id="1410"><span data-dcnode-id="1411" instrument_node="">small bunches</span></strong><span data-dcnode-id="1409" instrument_node=""> rather than one large one. Large dense bunches of lavender will receive less air flow, dry more slowly, and are more prone to developing mold.&nbsp;</span></li><li data-dcnode-id="1403"><span data-dcnode-id="1407" instrument_node="">For that same reason, </span><strong data-dcnode-id="1405"><span data-dcnode-id="1406" instrument_node="">do not tie the bands too tightly</span></strong><span data-dcnode-id="1404" instrument_node="">. The bunches should be tied secure enough to not fall apart, but not crazy-tight against the stems.</span></li><li data-dcnode-id="1398"><span data-dcnode-id="1402" instrument_node="">Hang the lavender bunches in a </span><strong data-dcnode-id="1400"><span data-dcnode-id="1401" instrument_node="">warm, dry location with good air circulation</span></strong><span data-dcnode-id="1399" instrument_node="">. An open window or fan nearby will help. Drying lavender in a dark place (out of direct sunlight) will improve color retention.&nbsp;</span></li><li data-dcnode-id="1396"><span data-dcnode-id="1397" instrument_node="">The time it takes to fully dry can vary from a couple of weeks to over a month, depending on your climate. To test if the lavender is dry, try to break one of the stems. When completely dry, they will crisply snap in half rather than bend.</span></li><li data-dcnode-id="1394"><span data-dcnode-id="1395" instrument_node="">You could also place bunches upright to dry in a similar manner (such as in an airy vase without water) though the tops may flop over and dry less straight.&nbsp;</span></li></ul><span data-dcnode-id="1392" instrument_node="">
</span><p data-dcnode-id="1389"><br data-dcnode-id="1391"><span data-dcnode-id="1390" instrument_node="">Clearly, this method of drying lavender works best in warm arid climates or controlled indoor conditions that enable the lavender to thoroughly dry. Living near the coast, we experience a bit of fog and mild humidity, and our decorative lavender dries pretty well this way. We have bouquets of dried lavender on display in every room!&nbsp;</span></p><span data-dcnode-id="1388" instrument_node="">
</span><p data-dcnode-id="1386"><br data-dcnode-id="1387"></p><span data-dcnode-id="1385" instrument_node="">
</span><div class="wp-block-image" data-dcnode-id="1380"><figure class="aligncenter size-full is-resized" data-dcnode-id="1381"><img alt="A bouquet of dry lavender is shown, a hand is holding the bouquet upside down, the stems tied together with brown twine. Even when dry, the flowers are still varying degrees of purple. Beyond the bouquet is a brick fireplace with various houseplants of differing sizes placed on and around it." class="wp-image-1020065" data-dcnode-id="1384" data-recalc-dims="1" height="866" loading="lazy" sizes="(max-width: 650px) 100vw, 650px" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//i0.wp.com/homesteadandchill.com/wp-content/uploads/2020/07/harvest-dry-lavender-hang-dry-bunch.jpg%3Fresize%3D650%252C866%26ssl%3D1&amp;raw" srcset="https://i0.wp.com/homesteadandchill.com/wp-content/uploads/2020/07/harvest-dry-lavender-hang-dry-bunch.jpg?w=1536&amp;ssl=1 1536w, https://i0.wp.com/homesteadandchill.com/wp-content/uploads/2020/07/harvest-dry-lavender-hang-dry-bunch.jpg?resize=225%2C300&amp;ssl=1 225w, https://i0.wp.com/homesteadandchill.com/wp-content/uploads/2020/07/harvest-dry-lavender-hang-dry-bunch.jpg?resize=768%2C1024&amp;ssl=1 768w, https://i0.wp.com/homesteadandchill.com/wp-content/uploads/2020/07/harvest-dry-lavender-hang-dry-bunch.jpg?resize=1152%2C1536&amp;ssl=1 1152w, https://i0.wp.com/homesteadandchill.com/wp-content/uploads/2020/07/harvest-dry-lavender-hang-dry-bunch.jpg?resize=1140%2C1520&amp;ssl=1 1140w, https://i0.wp.com/homesteadandchill.com/wp-content/uploads/2020/07/harvest-dry-lavender-hang-dry-bunch.jpg?resize=600%2C800&amp;ssl=1 600w" width="650"><figcaption data-dcnode-id="1382"><span data-dcnode-id="1383" instrument_node="">I hung this one in a sunny room, so the color faded a bit. That’s okay – it was the leftovers from a quick round of deadheading. </span></figcaption></figure></div><span data-dcnode-id="1379" instrument_node="">
</span><h3 data-dcnode-id="1376"><br data-dcnode-id="1378"><span data-dcnode-id="1377" instrument_node="">2) Drying Lavender in a Food Dehydrator</span></h3><span data-dcnode-id="1375" instrument_node="">
</span><p data-dcnode-id="1366"><br data-dcnode-id="1374"><span data-dcnode-id="1373" instrument_node="">Another way to dry lavender is to use a </span><a data-dcnode-id="1371" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.amazon.com/dp/B0090WOCN0/%3Fref%3Dexp_deannacat3_dp_vv_d" rel="noreferrer noopener" target="_blank"><span data-dcnode-id="1372" instrument_node="">food dehydrator</span></a><span data-dcnode-id="1370" instrument_node="">. This process is also very easy, and much quicker than passively drying it at room temperature. I prefer to use a dehydrator to dry lavender that is intended to make lavender-infused oil or salve. It not only </span><strong data-dcnode-id="1368"><span data-dcnode-id="1369" instrument_node="">expedites the process, but also helps to ensure the lavender is 100% dry</span></strong><span data-dcnode-id="1367" instrument_node="">! Inadequately dried herbs that contain leftover moisture can easily cause medicinal oils to develop mold and spoil. With our cool foggy summers, this is simply what works best for us to guarantee success.</span></p><span data-dcnode-id="1365" instrument_node="">
</span><p data-dcnode-id="1360"><span data-dcnode-id="1364" instrument_node="">However, it is best to </span><strong data-dcnode-id="1362"><span data-dcnode-id="1363" instrument_node="">avoid overheating</span></strong><span data-dcnode-id="1361" instrument_node=""> the lavender in order to preserve the highest level of essential oils and therapeutic benefits possible. Therefore, set your food dehydrator on the lowest temperature setting (no more than 100 to 105°F).&nbsp;</span></p><span data-dcnode-id="1359" instrument_node="">
</span><p data-dcnode-id="1356"><br data-dcnode-id="1358"><span data-dcnode-id="1357" instrument_node="">To dry lavender in a dehydrator, this is the process that I follow:</span></p><span data-dcnode-id="1355" instrument_node="">
</span><ul data-dcnode-id="1333"><li data-dcnode-id="1353"><span data-dcnode-id="1354" instrument_node="">Harvest fresh lavender as described above. Even though I will only dry the buds themselves, I like to remove the entire long flower stem during harvest to keep the plant looking fresh.</span></li><li data-dcnode-id="1351"><span data-dcnode-id="1352" instrument_node="">Gather the lavender with the buds clustered together, and trim off the excess stems. Toss those in the compost pile.</span></li><li data-dcnode-id="1346"><span data-dcnode-id="1350" instrument_node="">Lay lavender buds out on the dehydrator trays in a </span><strong data-dcnode-id="1348"><span data-dcnode-id="1349" instrument_node="">single layer</span></strong><span data-dcnode-id="1347" instrument_node="">. If your lavender is extra crumbly or your dehydrator trays have large openings, you may want to use dehydrator tray liners (if you have them). Alternatively, you can line your dehydrator trays with parchment paper if the flower buds are falling through.&nbsp;</span></li><li data-dcnode-id="1338"><span data-dcnode-id="1345" instrument_node="">Dry the lavender on a </span><strong data-dcnode-id="1343"><span data-dcnode-id="1344" instrument_node="">low temperature setting</span></strong><span data-dcnode-id="1342" instrument_node="">. </span><a data-dcnode-id="1340" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//excaliburdehydrator.com/%3Faff%3D34" rel="noreferrer noopener" target="_blank"><span data-dcnode-id="1341" instrument_node="">Our Excalibur dehydrators</span></a><span data-dcnode-id="1339" instrument_node=""> have a “living foods” setting (95-105°F), designed to preserve beneficial plant enzymes. </span></li><li data-dcnode-id="1336"><span data-dcnode-id="1337" instrument_node="">The lavender will take about 24 to 48 hours to fully dry, depending on the variety of lavender, size of buds, and machine used. To test if they’re fully dry, try breaking a large bud apart. It should feel dry, crumbly, and the middle stem should snap rather than bend.&nbsp;</span></li><li data-dcnode-id="1334"><span data-dcnode-id="1335" instrument_node="">Once the buds are dry, transfer them to an air-tight container for storage or their other final destination/use.</span></li></ul><span data-dcnode-id="1332" instrument_node="">
</span><p data-dcnode-id="1330"><br data-dcnode-id="1331"></p><span data-dcnode-id="1329" instrument_node="">
</span><div class="wp-block-image" data-dcnode-id="1324"><figure class="aligncenter size-full is-resized" data-dcnode-id="1325"><img alt="Fresh lavender flowers are shown on a drying tray that will soon be placed in a dehydrator. The flowers are fairly evenly spread across the tray for more even drying. The flowers are form at least four different varieties of lavender so each one has its own unique color, shape, and size.  " class="wp-image-1020066" data-dcnode-id="1328" data-recalc-dims="1" height="875" loading="lazy" sizes="(max-width: 656px) 100vw, 656px" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//i0.wp.com/homesteadandchill.com/wp-content/uploads/2020/07/harvest-dry-lavender-dehydrator-trays.jpg%3Fresize%3D656%252C875%26ssl%3D1&amp;raw" srcset="https://i0.wp.com/homesteadandchill.com/wp-content/uploads/2020/07/harvest-dry-lavender-dehydrator-trays.jpg?w=1536&amp;ssl=1 1536w, https://i0.wp.com/homesteadandchill.com/wp-content/uploads/2020/07/harvest-dry-lavender-dehydrator-trays.jpg?resize=225%2C300&amp;ssl=1 225w, https://i0.wp.com/homesteadandchill.com/wp-content/uploads/2020/07/harvest-dry-lavender-dehydrator-trays.jpg?resize=768%2C1024&amp;ssl=1 768w, https://i0.wp.com/homesteadandchill.com/wp-content/uploads/2020/07/harvest-dry-lavender-dehydrator-trays.jpg?resize=1152%2C1536&amp;ssl=1 1152w, https://i0.wp.com/homesteadandchill.com/wp-content/uploads/2020/07/harvest-dry-lavender-dehydrator-trays.jpg?resize=1140%2C1520&amp;ssl=1 1140w, https://i0.wp.com/homesteadandchill.com/wp-content/uploads/2020/07/harvest-dry-lavender-dehydrator-trays.jpg?resize=600%2C800&amp;ssl=1 600w" width="656"><figcaption data-dcnode-id="1326"><span data-dcnode-id="1327" instrument_node="">Getting ready to go into the dehydrator. </span></figcaption></figure></div><span data-dcnode-id="1323" instrument_node="">
</span><div class="wp-block-image" data-dcnode-id="1315"><figure class="aligncenter size-full is-resized" data-dcnode-id="1316"><img alt="The front of an Excalibur food dehydrator is shown with the door of the machine removed and sitting on the top. The trays are pulled out in a stair step fashion, the top two trays are full of multi colored calendula flowers while bottom four are full of lavender flowers. Dry lavender in a food dehydrator for a quick, easy, and safe drying process. " class="wp-image-1020067" data-dcnode-id="1322" data-recalc-dims="1" height="868" loading="lazy" sizes="(max-width: 652px) 100vw, 652px" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//i0.wp.com/homesteadandchill.com/wp-content/uploads/2020/07/harvest-dry-lavender-excalibur-dehydrator.jpeg%3Fresize%3D652%252C868%26ssl%3D1&amp;raw" srcset="https://i0.wp.com/homesteadandchill.com/wp-content/uploads/2020/07/harvest-dry-lavender-excalibur-dehydrator.jpeg?w=1536&amp;ssl=1 1536w, https://i0.wp.com/homesteadandchill.com/wp-content/uploads/2020/07/harvest-dry-lavender-excalibur-dehydrator.jpeg?resize=225%2C300&amp;ssl=1 225w, https://i0.wp.com/homesteadandchill.com/wp-content/uploads/2020/07/harvest-dry-lavender-excalibur-dehydrator.jpeg?resize=768%2C1024&amp;ssl=1 768w, https://i0.wp.com/homesteadandchill.com/wp-content/uploads/2020/07/harvest-dry-lavender-excalibur-dehydrator.jpeg?resize=1152%2C1536&amp;ssl=1 1152w, https://i0.wp.com/homesteadandchill.com/wp-content/uploads/2020/07/harvest-dry-lavender-excalibur-dehydrator.jpeg?resize=1140%2C1520&amp;ssl=1 1140w, https://i0.wp.com/homesteadandchill.com/wp-content/uploads/2020/07/harvest-dry-lavender-excalibur-dehydrator.jpeg?resize=600%2C800&amp;ssl=1 600w" width="652"><figcaption data-dcnode-id="1317"><span data-dcnode-id="1321" instrument_node="">Our Goodwin creek lavender has small crumbly buds once dry, so I like to dry that on top of </span><a data-dcnode-id="1319" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.amazon.com/dp/B00RM1QSWE/%3Fref%3Dexp_deannacat3_dp_vv_d" rel="noreferrer noopener" target="_blank"><span data-dcnode-id="1320" instrument_node="">silicone tray liners</span></a><span data-dcnode-id="1318" instrument_node="">.</span></figcaption></figure></div><span data-dcnode-id="1314" instrument_node="">
</span><p data-dcnode-id="1312"><br data-dcnode-id="1313"></p><span data-dcnode-id="1311" instrument_node="">
</span><a data-dcnode-id="1309" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//excaliburdehydrator.com/%3Faff%3D34" rel="nofollow"><img alt="" data-dcnode-id="1310" data-recalc-dims="1" height="247" loading="lazy" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//i0.wp.com/www.affiliatly.com/affiliate_files/banners/10994/Excalibur_970x250.jpg%3Fresize%3D960%252C247%26ssl%3D1&amp;raw" width="960"></a><span data-dcnode-id="1308" instrument_node="">
</span><h3 data-dcnode-id="1305"><br data-dcnode-id="1307"><span data-dcnode-id="1306" instrument_node="">3) Drying on Screens or in Baskets</span></h3><span data-dcnode-id="1304" instrument_node="">
</span><p data-dcnode-id="1301"><br data-dcnode-id="1303"><span data-dcnode-id="1302" instrument_node="">The third and final way to dry lavender is much like the first method, minus the bunching and hanging. Some traditional herbalists simply lay out their fresh herbs and flowers to dry on screens, or in airy baskets. You can dry full lavender stems or just the buds this way. </span></p><span data-dcnode-id="1300" instrument_node="">
</span><p data-dcnode-id="1292"><span data-dcnode-id="1299" instrument_node="">Homemade herb drying racks can be assembled of a single or many “shelves” of flat framed screens. Or you could use a specialized multi-tier </span><a data-dcnode-id="1294" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.amazon.com/dp/B006YDMWOY/%3Fref%3Dexp_deannacat3_dp_vv_d" rel="noreferrer noopener" target="_blank"><span data-dcnode-id="1298" instrument_node="">hanging herb drying rack</span><strong data-dcnode-id="1296"><span data-dcnode-id="1297" instrument_node=""> </span></strong><span data-dcnode-id="1295" instrument_node="">like this one</span></a><span data-dcnode-id="1293" instrument_node=""> – which is what we use to dry other herbs, including cannabis. Also like the first method, allowing lavender to passively dry on screens or in baskets requires warm arid conditions – and time.&nbsp;Spread the lavender flowers out in a single layer to allow good air flow between them. </span></p><span data-dcnode-id="1291" instrument_node="">
</span><p data-dcnode-id="1289"><br data-dcnode-id="1290"></p><span data-dcnode-id="1288" instrument_node="">
</span><div class="wp-block-image" data-dcnode-id="1283"><figure class="aligncenter size-full is-resized" data-dcnode-id="1284"><img alt="A wicker basket is full of freshly harvest flower blooms. They are multiple layers deep and must be spread out more evenly for storage.  " class="wp-image-1020070" data-dcnode-id="1287" data-recalc-dims="1" height="860" loading="lazy" sizes="(max-width: 645px) 100vw, 645px" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//i0.wp.com/homesteadandchill.com/wp-content/uploads/2020/07/harvest-dry-lavender-basket.jpeg%3Fresize%3D645%252C860%26ssl%3D1&amp;raw" srcset="https://i0.wp.com/homesteadandchill.com/wp-content/uploads/2020/07/harvest-dry-lavender-basket.jpeg?w=1536&amp;ssl=1 1536w, https://i0.wp.com/homesteadandchill.com/wp-content/uploads/2020/07/harvest-dry-lavender-basket.jpeg?resize=225%2C300&amp;ssl=1 225w, https://i0.wp.com/homesteadandchill.com/wp-content/uploads/2020/07/harvest-dry-lavender-basket.jpeg?resize=768%2C1024&amp;ssl=1 768w, https://i0.wp.com/homesteadandchill.com/wp-content/uploads/2020/07/harvest-dry-lavender-basket.jpeg?resize=1152%2C1536&amp;ssl=1 1152w, https://i0.wp.com/homesteadandchill.com/wp-content/uploads/2020/07/harvest-dry-lavender-basket.jpeg?resize=1140%2C1520&amp;ssl=1 1140w, https://i0.wp.com/homesteadandchill.com/wp-content/uploads/2020/07/harvest-dry-lavender-basket.jpeg?resize=600%2C800&amp;ssl=1 600w" width="645"><figcaption data-dcnode-id="1285"><span data-dcnode-id="1286" instrument_node="">This photo was taken after a big harvest, buds destined for the dehydrator. I would spread them out more rather than leaving them piled high to passively dry in a basket.</span></figcaption></figure></div><span data-dcnode-id="1282" instrument_node="">
</span><h2 data-dcnode-id="1279"><br data-dcnode-id="1281"><span data-dcnode-id="1280" instrument_node="">How to Store Dried Lavender</span></h2><span data-dcnode-id="1278" instrument_node="">
</span><p data-dcnode-id="1275"><br data-dcnode-id="1277"><span data-dcnode-id="1276" instrument_node="">After the lavender has finished drying, one option is to leave the flower buds intact on the long stem, ideal for displaying dried bouquets or to use in dry floral arrangements. Otherwise, snip or strip the flower bud portion off of the stem and store it in an airtight glass container for maximum freshness, flavor, and aroma. Store the container in a cool, dark, and dry location.&nbsp;</span></p><span data-dcnode-id="1274" instrument_node="">
</span><h2 data-dcnode-id="1271"><br data-dcnode-id="1273"><span data-dcnode-id="1272" instrument_node="">Ways to Use Dried Lavender&nbsp;</span></h2><span data-dcnode-id="1270" instrument_node="">
</span><p data-dcnode-id="1258"><br data-dcnode-id="1269"><span data-dcnode-id="1268" instrument_node="">Floral bouquets aside, there are dozens of creative ways to use dry lavender! Lavender is incredibly versatile and beneficial. It is used for </span><strong data-dcnode-id="1266"><span data-dcnode-id="1267" instrument_node="">aromatherapy</span></strong><span data-dcnode-id="1265" instrument_node="">, </span><a data-dcnode-id="1263" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.medicalnewstoday.com/articles/265922%23benefits" rel="noreferrer noopener" target="_blank"><span data-dcnode-id="1264" instrument_node="">proven</span></a><span data-dcnode-id="1262" instrument_node=""> to help reduce anxiety, stress, depression, and insomnia. The aroma is also known to repel pest insects. In addition to smelling wonderful, lavender has many other health benefits. With natural anti-inflammatory, antioxidant, antibacterial, anti-fungal, and pain relieving properties, dry lavender is ideal to use in homemade </span><strong data-dcnode-id="1260"><span data-dcnode-id="1261" instrument_node="">medicine and body care products</span></strong><span data-dcnode-id="1259" instrument_node="">. </span></p><span data-dcnode-id="1257" instrument_node="">
</span><p data-dcnode-id="1249"><span data-dcnode-id="1256" instrument_node="">As an edible flower, there are many </span><strong data-dcnode-id="1254"><span data-dcnode-id="1255" instrument_node="">culinary uses</span></strong><span data-dcnode-id="1253" instrument_node=""> for lavender too! Remember, English and lavandin hybrid varieties are most popular to use in edible applications. The higher camphor content in Spanish and French lavender make them less palatable and sweet – yet </span><a data-dcnode-id="1251" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.healthline.com/health/what-is-camphor%23%3A~%3Atext%3DCamphor%2520%28Cinnamomum%2520camphora%29%2520is%2520a%2Cpain%252C%2520irritation%252C%2520and%2520itching." rel="noreferrer noopener" target="_blank"><span data-dcnode-id="1252" instrument_node="">camphor</span></a><span data-dcnode-id="1250" instrument_node=""> is an excellent terpene to ease swelling, itching, and pain!</span></p><span data-dcnode-id="1248" instrument_node="">
</span><p data-dcnode-id="1245"><br data-dcnode-id="1247"><span data-dcnode-id="1246" instrument_node="">Here are a few ideas of how to use dry lavender:</span></p><span data-dcnode-id="1244" instrument_node="">
</span><ul data-dcnode-id="1209"><li data-dcnode-id="1242"><span data-dcnode-id="1243" instrument_node="">Use a small mesh bag or cheesecloth to create sachets of soothing lavender potpourri, perfect for a dresser drawer, bathroom, car, or bedside table. </span></li><li data-dcnode-id="1240"><span data-dcnode-id="1241" instrument_node="">Make a refreshing lavender room or linen spray.</span></li><li data-dcnode-id="1226"><span data-dcnode-id="1239" instrument_node="">Use it as an ingredient to make </span><a data-dcnode-id="1237" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//homesteadandchill.com/homemade-lavender-oil/" rel="noreferrer noopener" target="_blank"><span data-dcnode-id="1238" instrument_node="">lavender-infused oil</span></a><span data-dcnode-id="1236" instrument_node="">, tinctures, salves, soap, body scrub, and more. We make homemade organic </span><a data-dcnode-id="1234" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//homesteadandchill.com/how-to-make-lavender-salve/" rel="noreferrer noopener" target="_blank"><span data-dcnode-id="1235" instrument_node="">lavender salve</span></a><span data-dcnode-id="1233" instrument_node=""> (learn how to here), and recently began offering it in the </span><a data-dcnode-id="1231" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//homesteadandchill.com/shop/" rel="noreferrer noopener" target="_blank"><span data-dcnode-id="1232" instrument_node="">Homestead and Chill shop</span></a><span data-dcnode-id="1230" instrument_node="">! My friend Tanya over at Lovely Greens has a great recipe to </span><a data-dcnode-id="1228" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//lovelygreens.com/make-lavender-bath-bombs/" rel="noreferrer noopener" target="_blank"><span data-dcnode-id="1229" instrument_node="">make lavender bath bombs</span></a><span data-dcnode-id="1227" instrument_node="">. (I wish I had the time to take soaking baths!)</span></li><li data-dcnode-id="1218"><span data-dcnode-id="1225" instrument_node="">Create lavender simple syrup. We love making a light lavender syrup to add to </span><a data-dcnode-id="1223" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//homesteadandchill.com/how-to-make-kombucha-101-brewing-basics/" rel="noreferrer noopener" target="_blank"><span data-dcnode-id="1224" instrument_node="">homemade kombucha</span></a><span data-dcnode-id="1222" instrument_node=""> (I go light on the sugar, heavy on the lavender). In fact, lavender-lemon is one of our favorite kombucha flavor combinations for </span><a data-dcnode-id="1220" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//homesteadandchill.com/kombucha-carbonation-tips-second-ferment/" rel="noreferrer noopener" target="_blank"><span data-dcnode-id="1221" instrument_node="">second fermentation</span></a><span data-dcnode-id="1219" instrument_node="">.&nbsp;Lavender syrup is also killer in cocktails!</span></li><li data-dcnode-id="1216"><span data-dcnode-id="1217" instrument_node="">Make lavender sugar to incorporate into desserts like sugar cookies, cake, or cupcakes.</span></li><li data-dcnode-id="1214"><span data-dcnode-id="1215" instrument_node="">Lavender can be included in sweet and savory marinades – most often used for meats, but also amazing with roasted potatoes or other veggies.</span></li><li data-dcnode-id="1212"><span data-dcnode-id="1213" instrument_node="">Sprinkle dry lavender in your chicken coop and nesting boxes to repel flies, cut odor, and calm your hens. </span></li><li data-dcnode-id="1210"><span data-dcnode-id="1211" instrument_node="">We routinely add old dead-headed lavender buds and stems as a soil top-dressing in potted plants, to serve as organic mulch as well as repel pests. </span></li></ul><span data-dcnode-id="1208" instrument_node="">
</span><p data-dcnode-id="1196"><br data-dcnode-id="1207"><span data-dcnode-id="1206" instrument_node="">I plan to write more detailed articles about several of these ideas, so stay tuned! So far, I have shared </span><strong data-dcnode-id="1204"><span data-dcnode-id="1205" instrument_node="">tutorials </span></strong><span data-dcnode-id="1203" instrument_node="">on how to make lavender-infused oil </span><a data-dcnode-id="1201" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//homesteadandchill.com/homemade-lavender-oil/" rel="noreferrer noopener" target="_blank"><span data-dcnode-id="1202" instrument_node="">here</span></a><span data-dcnode-id="1200" instrument_node="">, and also homemade lavender salve </span><a data-dcnode-id="1198" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//homesteadandchill.com/how-to-make-lavender-salve/" rel="noreferrer noopener" target="_blank"><span data-dcnode-id="1199" instrument_node="">here</span></a><span data-dcnode-id="1197" instrument_node="">!</span></p><span data-dcnode-id="1195" instrument_node="">
</span><p data-dcnode-id="1193"><br data-dcnode-id="1194"></p><span data-dcnode-id="1192" instrument_node="">
</span><div class="wp-block-image" data-dcnode-id="1182"><figure class="aligncenter size-full is-resized" data-dcnode-id="1183"><img alt="" class="wp-image-1021703" data-dcnode-id="1191" data-recalc-dims="1" height="861" loading="lazy" sizes="(max-width: 646px) 100vw, 646px" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//i0.wp.com/homesteadandchill.com/wp-content/uploads/2020/06/lavender-salve-homestead-chill-organic.jpeg%3Fresize%3D646%252C861%26ssl%3D1&amp;raw" srcset="https://i0.wp.com/homesteadandchill.com/wp-content/uploads/2020/06/lavender-salve-homestead-chill-organic.jpeg?w=1536&amp;ssl=1 1536w, https://i0.wp.com/homesteadandchill.com/wp-content/uploads/2020/06/lavender-salve-homestead-chill-organic.jpeg?resize=225%2C300&amp;ssl=1 225w, https://i0.wp.com/homesteadandchill.com/wp-content/uploads/2020/06/lavender-salve-homestead-chill-organic.jpeg?resize=768%2C1024&amp;ssl=1 768w, https://i0.wp.com/homesteadandchill.com/wp-content/uploads/2020/06/lavender-salve-homestead-chill-organic.jpeg?resize=1152%2C1536&amp;ssl=1 1152w, https://i0.wp.com/homesteadandchill.com/wp-content/uploads/2020/06/lavender-salve-homestead-chill-organic.jpeg?resize=1140%2C1520&amp;ssl=1 1140w" width="646"><figcaption data-dcnode-id="1184"><span data-dcnode-id="1190" instrument_node="">Our homemade lavender salve (</span><a data-dcnode-id="1188" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//homesteadandchill.com/shop/organic-lavender-salve/" rel="noreferrer noopener" target="_blank"><span data-dcnode-id="1189" instrument_node="">now available for sale here</span></a><span data-dcnode-id="1187" instrument_node="">) works wonders on dry skin, bites, scrapes, stings, scars, and more. Or, learn how to </span><a data-dcnode-id="1185" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//homesteadandchill.com/how-to-make-lavender-salve/" rel="noreferrer noopener" target="_blank"><span data-dcnode-id="1186" instrument_node="">make your own here.</span></a></figcaption></figure></div><span data-dcnode-id="1181" instrument_node="">
</span><h3 class="has-text-align-center" data-dcnode-id="1178"><br data-dcnode-id="1180"><span data-dcnode-id="1179" instrument_node="">And that is how you harvest, prune, and dry lavender.</span></h3><span data-dcnode-id="1177" instrument_node="">
</span><p data-dcnode-id="1174"><br data-dcnode-id="1176"><span data-dcnode-id="1175" instrument_node="">I bet you’re already reaching for your clippers and headed for the door! As you can see, harvesting and drying fresh lavender is super simple and rewarding. I also find the process really therapeutic – the perfect excuse to turn on some music, tune out, and snip snip snip away… </span></p><span data-dcnode-id="1173" instrument_node="">
</span><p data-dcnode-id="1171"><span data-dcnode-id="1172" instrument_node="">I hope you found this article to be useful and interesting! Please feel free to ask questions or say hi in the comments below, and spread the lavender love by sharing this article. Thank you for tuning in, and happy harvesting!</span></p><span data-dcnode-id="1170" instrument_node="">

</span><img alt="🌎 Happy Earth Day! I’m sure you’re being flooded with ideas &amp; tips to help save Mama Earth today, but I have to plug a few of my favorite eco-friendly things you can do at home - and not just today! 👇🏼
.
🌿 Start a Garden. In addition to being a healthy, enjoyable, family-friendly hobby, growing and preserving your own food reduces dependence on the grocery store, which reduces food packaging, waste, and transportation impacts.
.
🪱 Compost! Composting is a fantastic way to divert food and garden waste from the landfill, and upcycle it into free organic fertilizer for your plants - houseplants included, and even if you don’t have a garden or yard! There are SO many different ways to compost at home: worm bins, tumblers, passive piles, hot piles, bokashi... you just need to figure out what method(s) works best for you. We’ve kept a worm bin in an apartment and office before!
.
🌲 Plant a tree. Cliche, but really, do it. They offer shade, habitat for wildlife, sequester carbon from the air, and improve soil health &amp; fertility. Bonus points if it’s native and/or edible!
.
🌻 Plant nectar and pollen-rich flowers for pollinators, and keep areas of your yard wild and dense to offer habitat, shelter, and nesting places for wildlife.
.
🐝 Please please please, avoid using toxic pesticides and herbicides.
.
💰 If you can’t garden at home, do your best to support organic ag and local farmers (hey farmer’s market/CSA!) I know there is an access/privilege issue here, so if you’re able, also consider donating to organizations that focus on making healthy organic food more accessible to underprivileged communities through local farming projects, education, or community gardens.
.
Of course this is just the tip of the iceberg 😬 on what we could all be doing. It’s actually quite overwhelming and disheartening to think about how much work still needs to be done, and how little power or influence we “little guys” have in some of the biggest issues that need resolving. But, rather than focusing on the doom n gloom, what positive changes are YOU trying to make? Share below! One personal goal we met this year was to eliminate all plastic from our shops shipping and packaging ❤" data-dcnode-id="431" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//homesteadandchill.com/wp-content/uploads/sb-instagram-feed-images/278973099_451511520064906_3261938180657753934_n.webpfull.jpg&amp;raw" style="display: none;"><span data-dcnode-id="430" instrument_node="">

</span><span data-dcnode-id="365" instrument_node=""> </span><img alt="💚 Have you tried kohlrabi before? 👽 This weekend's harvest featured our first 2 green kholrabi of the season (the purple variety is maturing more slowly). You know how much I love our leafy greens, but I'm definitely stoked to see more variety in our harvest! 😍
.
As a member of the brassica family, kholrabi tastes like the center portion of a really sweet, tender broccoli stem - but even more juicy and crisp!  While there are numerous ways to prepare kholrabi (ferment, pickle, roast, sauté, in coleslaw, soup or kraut) we enjoy them raw and fresh best! It's good to peel them since the outer layer can be tough, but after that we slice up the insides like carrot sticks, ideal for snacking on plain or with hummus/other dips 👌🏼 If you haven't yet, I highly recommend giving it a try - or growing your own!
.

</span><span data-dcnode-id="347" instrument_node=""> </span><img alt="🌿 We harvested the last of the spring radishes today! (Well, the smaller, quick-maturing varieties that is - the daikons are still out there sizing up). If it weren't for this weeks heat wave, we could have left some of these out there a little longer, but they're prone to get pithy and woody in high heat - so out they came!
.
To preserve the bumper harvest we made lacto-fermented dilly radish &quot;pickles&quot; yesterday, and it hit me that it was the first time we've fermented anything (aside from sourdough) in over a year thanks to our move 🤯 So its exciting to get back on that train, seeing that fermentation is one of my favorite ways to preserve and all. It's literally the only prevention method where your food becomes MORE nutritious rather than less! (Hello probiotics) I documented the process in Stories - they're up right now and I'll save a highlight. The recipe is also on the blog, and can be used for carrots, beets, green beans and more 👍🏼 
.
Today for lunch we had sliced radishes on multigrain crackers w/ cream cheese, garden dill, and flaky sea salt 🤤 and then of course we've been eating tons of them on salads, tostadas, veggie sandwiches and sautéed over the last month or so too. Feels SO wonderful to be eating garden-to-table more and more once again!
.
Bonus: spy the imposter radish tail.
.

</span><span data-dcnode-id="329" instrument_node=""> </span><img alt="🔥 Heat Wave Tips! 🥵 Is it unseasonably warm where you are right now too? It’s going to be nearly 90°F today, in the 80s for a few days thereafter, and we don’t want our cool-season crops to bolt! Below are 6 things you can do to protect your garden during a heat wave. Some immediate, and some that take a little planning.
.
1) 🌞 Cover plants w/ hoops and shade cloth. We put ours up early this morning. Shade cloth comes in black, white, green... they all work to reduce the hot sun rays beating down on the plants - and also help keep the soil more cool! (Plants are more sensitive to the temperature of soil and their root zone, not air)
.
2) 💧 Water everything really well (slow, long and deep) either the morning of or night before the heat wave. BUT resist the urge to over water. Some plants may go limp during the peak heat of the day, no matter if they have ample water or not. So, don’t take wilting as a sign that they automatically need watwr. Check the soil moisture level before adding more. The plants almost always perk back up in the evening!
.
3) 🌿 Avoid wetting plant leaves when you water, especially before a heat wave. Moisture and water droplets act like a magnifying glass, amplifying the impact of the sun. Plants get sunburn too! 
.
4) 🍂 Mulch. Providing a couple inches of compost, wood chips, straw, pine needles, or other organic material on top of the soil will buffer it against temperature extremes and also reduce evaporation.
.
5) 🧐 Choose heat-tolerant or slow-bolting cool season crop varieties (leafy greens, broccoli, cauliflower, radishes, etc) especially if your area is prone to unpredictable weather.
.
6) 💦 Develop good watering practices early. It’s ALWAYS best to water your garden deeply and less frequently than in short bouts of shallow water more often. Deep, slow water will encourage roots to grow deeper and longer - which makes them more resilient to temperature swings and drought. Plants with shallower roots are prone to get stressed more easily. Stress can lead to bolting, along with less overall resilience against pests &amp; disease.
.

</span><span data-dcnode-id="311" instrument_node=""> </span><img alt="📸 Garden update + photo dump 🌿 cuz you all still like photos, right? I mean, I know videos and reels can be fun (though I wholeheartedly despise the pressure that you &quot;have to&quot; make them these days). Regardless of trends, I'll always primarily post photos here. It's why I joined this app nearly 10 years ago, and documenting my life via photos has been a passion of mine since I was a little girl. Plus we have SO much going on in the garden right now, I can hardly keep up with capturing and sharing it all! 
.
1) Helloooo beautiful lettuce 😍 Yeah, we've been eating a lot of salad. 😹 So have the chickie babes.
2) Helloooo agave flower spike 😳 She's been getting more feisty by the minute but hasn't even fully flowered yet.
3) Kohlrabi is coming in hot! 👽
4/5) The grow room is still full big beautiful seedlings. Cukes, pumpkins, melons and hard squash just sprouted a couple weeks ago, we topped the basil and some of the peppers this weekend, the massive eggplant finally got transplanted outside yesterday, and we potted up the tomatoes into larger containers than shown here a few days ago.
6, 7, 8) Been harvesting tons of radishes and fat stacks of greens 😉💵
9) The first little handful of homegrown blueberries 🫐 
10) The apricots are on their way! I'll probably start lightly thinning the fruit soon, but maybe not tooo much. The tree is large, healthy and established and I highly doubt anyone thinned it last year... We moved in last summer when the fruit was just starting to ripen and had GOBS of delicious juicy cots. 👌🏼
.

</span><span data-dcnode-id="293" instrument_node=""> </span><img alt="🥑 How it started VS How it's going ➡️ (Alternate caption: yes, we kill plants too! 😅) One of the most painful parts of leaving our old homestead was parting with our beloved Hass avocado tree, which has just begun to prolifically bear fruit for us. So one of the very first things we did at the new homestead was plant 4 avo trees: 2 Hass, 1 Lamb Hass, and 1 Fuerte (a type B to cross pollinate all the type A Hass). Well, the trees are all pretty pissed right now 😬
.
First of all, I made a dumb mistake setting up their irrigation system (set zone 1, but they were on zone 2) so the poor things go almost zero water for the first few months until we realized it. They were already looking pretty pathetic by then. Second, we were hit with a fairly rare hard freeze in February - with a low of 27 or 28, and Hass are only hardy down to 28-29 (and mostly once they're larger/more mature). I totally forgot to cover them with frost cloth; I was too busy fretting over and protecting the veggie seedlings we'd just planted instead. Looking back, waiting to plant until spring may have been most wise too, giving them more time to get settled before cold weather set in. 
.
The smallest Hass tree turned completely black down to the base, a sign of dead wood. We replaced that one this weekend with a new larger Hass. The medium-size Lamb Hass had some black limbs; we pruned those back into the healthier wood. Thankfully the main trunk looks healthy and has lots of new growth. The largest Hass is fine, minus some singed frumpy leaves. The Fuerte lost some leaves but has no damaged wood. The least impacted 2 were not only more mature, but also tucked into a sheltered microclimate by the hillside and big oak nearby. The two that were hit harder were more exposed, and smaller trees.
.
Anywho, just keeping it real and sharing our experience as we go, killing trees and all. 😅 One day we'll be harvesting big homegrown avocados once again... mark my words! 🙌🏼
.
🥑 Also, there are many avo varieties that are far more cold-hardy than Hass, some into the low 20s! Google &quot;Homestead and Chill avocados&quot; to see our grow guide + a list of over 20 different varieties to try 
.
