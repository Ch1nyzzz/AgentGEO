</span><h1 class="entry-title" data-dcnode-id="4056" style="text-align:center;"><span data-dcnode-id="4057" instrument_node="">How To Prune Fruit Trees: in Winter and in Summer, too</span></h1><span data-dcnode-id="4055" instrument_node=""> </span><div class="entry-content vc_col-sm-8 vc_col-sm-offset-2" data-dcnode-id="4036"><span data-dcnode-id="4054" instrument_node="">Mara Ripani, May 4, 2021</span><ul class="post-categories" data-dcnode-id="4037"><span data-dcnode-id="4053" instrument_node="">
</span><li data-dcnode-id="4050"><a data-dcnode-id="4051" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.milkwood.net/category/organic-gardening/forest-gardening/" rel="category tag"><span data-dcnode-id="4052" instrument_node="">Forest Gardening &amp; Silviculture</span></a></li><span data-dcnode-id="4049" instrument_node="">
</span><li data-dcnode-id="4046"><a data-dcnode-id="4047" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.milkwood.net/category/organic-gardening/" rel="category tag"><span data-dcnode-id="4048" instrument_node="">Organic Gardening</span></a></li><span data-dcnode-id="4045" instrument_node="">
</span><li data-dcnode-id="4042"><a data-dcnode-id="4043" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.milkwood.net/category/permaculture/" rel="category tag"><span data-dcnode-id="4044" instrument_node="">Permaculture</span></a></li><span data-dcnode-id="4041" instrument_node="">
</span><li data-dcnode-id="4038"><a data-dcnode-id="4039" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.milkwood.net/category/permaculture/urban-permaculture/" rel="category tag"><span data-dcnode-id="4040" instrument_node="">Urban Permaculture</span></a></li></ul></div><span data-dcnode-id="4035" instrument_node="">
</span><article class="post-65112 post type-post status-publish format-standard has-post-thumbnail category-forest-gardening category-organic-gardening category-permaculture category-urban-permaculture category-17 category-51 category-46 category-106 description-off" data-dcnode-id="2539" id="post-65112"><span data-dcnode-id="4034" instrument_node="">
</span><div class="post-thumbnail" data-dcnode-id="4032"><img alt="" class="preload-me lazy-load is-loaded" data-dcnode-id="4033" height="666" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.milkwood.net/wp-content/uploads/2021/05/Pruning-Article-7-of-12.jpg&amp;raw" srcset="https://www.milkwood.net/wp-content/uploads/2021/05/Pruning-Article-7-of-12.jpg 1000w" style="will-change: auto;" title="Pruning-Article-7-of-12" width="1000"></div><a data-dcnode-id="4031" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.milkwood.net/wp-content/uploads/2021/05/Pruning-Article-7-of-12.jpg" id="custom-bg"></a><div class="entry-content vc_col-sm-8 vc_col-sm-offset-2" data-dcnode-id="2648"><span data-dcnode-id="4030" instrument_node="">
</span><div class="wp-block-image" data-dcnode-id="4019"><figure class="aligncenter size-large" data-dcnode-id="4020"><div class="essb-pin wp-image-65116 essb-pinid-1" data-dcnode-id="4021"><img alt="Learn to prune fruit trees." class="pin-generated" data-dcnode-id="4029" height="666" sizes="(max-width: 1000px) 100vw, 1000px" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.milkwood.net/wp-content/uploads/2021/05/Pruning-Article-7-of-12.jpg&amp;raw" srcset="https://www.milkwood.net/wp-content/uploads/2021/05/Pruning-Article-7-of-12.jpg 1000w, https://www.milkwood.net/wp-content/uploads/2021/05/Pruning-Article-7-of-12-768x511.jpg 768w, https://www.milkwood.net/wp-content/uploads/2021/05/Pruning-Article-7-of-12-400x266.jpg 400w" style="" width="1000"><div class="essb_links essb_displayed_pinimage essb_template_big-retina essb_icon_animation13 essb_pos_top-left essb_mobilepos_below essb_l2dqvez3" data-dcnode-id="4022" data-essb-instance="l2dqvez3" data-essb-position="pinit" data-essb-postid="65112"><ul class="essb_links_list" data-dcnode-id="4023"><li class="essb_item essb_link_pinterest nolightbox" data-dcnode-id="4024"><a class="nolightbox" data-dcnode-id="4025" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//pinterest.com/pin/create/button/%3Furl%3Dhttps%3A//www.milkwood.net/2021/05/04/fruit-tree-pruning-guide/%26is_video%3Dfalse%26media%3Dhttps%3A//www.milkwood.net/wp-content/uploads/2021/05/Pruning-Article-7-of-12.jpg%26description%3DLearn%2520to%2520prune%2520fruit%2520trees." onclick="essb.window('https://pinterest.com/pin/create/button/?url=https://www.milkwood.net/2021/05/04/fruit-tree-pruning-guide/&amp;is_video=false&amp;media=https://www.milkwood.net/wp-content/uploads/2021/05/Pruning-Article-7-of-12.jpg&amp;description=Learn%20to%20prune%20fruit%20trees.','pinpro','l2dqvez3'); return false;" rel="noreferrer noopener nofollow" target="_blank"><span class="essb_icon essb_icon_pinterest" data-dcnode-id="4028"></span><span class="essb_network_name" data-dcnode-id="4026"><span data-dcnode-id="4027" instrument_node="">Pin</span></span></a></li></ul></div></div></figure></div><span data-dcnode-id="4018" instrument_node="">
</span><p data-dcnode-id="4016"><span data-dcnode-id="4017" instrument_node="">Whether you’re heading into winter or summer in your part of the world, now could well be the perfect time to consider fruit tree pruning at your place.</span></p><span data-dcnode-id="4015" instrument_node="">
</span><p data-dcnode-id="4013"><span data-dcnode-id="4014" instrument_node="">Pruning at just the right moment can help ensure a bigger and better fruit harvest, can make accessing your fruit yield easier in coming months (no more ladders to reach the top of ginormous trees) and can lead to healthier and more beautiful trees, and more resilience for you.</span></p><span data-dcnode-id="4012" instrument_node="">
</span><p data-dcnode-id="4010"><span data-dcnode-id="4011" instrument_node="">It’s part science, part feeling and in-the-moment decision-making – and a totally accessible skill for even the beginners.</span></p><span data-dcnode-id="4009" instrument_node="">
</span><p data-dcnode-id="4007"><span data-dcnode-id="4008" instrument_node="">A willingness to read, learn, observe and read some moreis essential, as well as learning a little bit about how fruit trees grow. But with just a few tools and a little conviction, it is possible to prune with confidence, and take excellent care of your dear fruit tree friends – year in, year out.</span></p><div class="milkw-inside-post" data-dcnode-id="3985" id="milkw-1844532977"><div class="unslider" data-dcnode-id="3988"><div class="custom-slider milkw-slider-2063106869 milkw-slider unslider-horizontal" data-dcnode-id="3989" id="milkw-slider-1440" style="position: relative; overflow: hidden;"><ul class="unslider-wrap unslider-carousel" data-dcnode-id="3990" style="width: 400%; margin-left: -100%; left: 0%;"><li class="unslider-clone" data-dcnode-id="4003" style="width: 25%; display: block;"><div class="milkw-target" data-advadstrackbid="1" data-advadstrackid="62097" data-dcnode-id="4004" id="milkw-380140011" style="margin-top: 40px; margin-bottom: 40px; "><a class="adv-link" data-dcnode-id="4005" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//courses.milkwood.net/permacultureliving"><img alt="Learn more about the Milkwood Permaculture Living online course" data-dcnode-id="4006" height="353" loading="lazy" sizes="(max-width: 940px) 100vw, 940px" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.milkwood.net/wp-content/uploads/2021/11/PL-website-ad-banner-940-x-353px-updated-Jan-2022.png&amp;raw" srcset="https://www.milkwood.net/wp-content/uploads/2021/11/PL-website-ad-banner-940-x-353px-updated-Jan-2022.png 940w, https://www.milkwood.net/wp-content/uploads/2021/11/PL-website-ad-banner-940-x-353px-updated-Jan-2022-768x288.png 768w" width="940"></a></div></li><li class="unslider-active" data-dcnode-id="3999" style="width: 25%; display: block;"><div class="milkw-target" data-advadstrackbid="1" data-advadstrackid="68287" data-dcnode-id="4000" id="milkw-474386845" style="margin-top: 40px; margin-bottom: 40px; "><a class="adv-link" data-dcnode-id="4001" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//courses.milkwood.net/mushroomcultivation"><img alt="Home Mushroom Cultivation course - now open for bookings" data-dcnode-id="4002" height="353" loading="lazy" sizes="(max-width: 940px) 100vw, 940px" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.milkwood.net/wp-content/uploads/2021/07/Home-Mushroom-Cultivation-course-now-open-for-bookings-web-banner.jpg&amp;raw" srcset="https://www.milkwood.net/wp-content/uploads/2021/07/Home-Mushroom-Cultivation-course-now-open-for-bookings-web-banner.jpg 940w, https://www.milkwood.net/wp-content/uploads/2021/07/Home-Mushroom-Cultivation-course-now-open-for-bookings-web-banner-768x288.jpg 768w" width="940"></a></div></li><li class="" data-dcnode-id="3995" style="width: 25%; display: block;"><div class="milkw-target" data-advadstrackbid="1" data-advadstrackid="62097" data-dcnode-id="3996" id="milkw-380140011" style="margin-top: 40px; margin-bottom: 40px; "><a class="adv-link" data-dcnode-id="3997" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//courses.milkwood.net/permacultureliving"><img alt="Learn more about the Milkwood Permaculture Living online course" data-dcnode-id="3998" height="353" loading="lazy" sizes="(max-width: 940px) 100vw, 940px" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.milkwood.net/wp-content/uploads/2021/11/PL-website-ad-banner-940-x-353px-updated-Jan-2022.png&amp;raw" srcset="https://www.milkwood.net/wp-content/uploads/2021/11/PL-website-ad-banner-940-x-353px-updated-Jan-2022.png 940w, https://www.milkwood.net/wp-content/uploads/2021/11/PL-website-ad-banner-940-x-353px-updated-Jan-2022-768x288.png 768w" width="940"></a></div></li><li class="unslider-clone" data-dcnode-id="3991" style="width: 25%; display: block;"><div class="milkw-target" data-advadstrackbid="1" data-advadstrackid="68287" data-dcnode-id="3992" id="milkw-474386845" style="margin-top: 40px; margin-bottom: 40px; "><a class="adv-link" data-dcnode-id="3993" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//courses.milkwood.net/mushroomcultivation"><img alt="Home Mushroom Cultivation course - now open for bookings" data-dcnode-id="3994" height="353" loading="lazy" sizes="(max-width: 940px) 100vw, 940px" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.milkwood.net/wp-content/uploads/2021/07/Home-Mushroom-Cultivation-course-now-open-for-bookings-web-banner.jpg&amp;raw" srcset="https://www.milkwood.net/wp-content/uploads/2021/07/Home-Mushroom-Cultivation-course-now-open-for-bookings-web-banner.jpg 940w, https://www.milkwood.net/wp-content/uploads/2021/07/Home-Mushroom-Cultivation-course-now-open-for-bookings-web-banner-768x288.jpg 768w" width="940"></a></div></li></ul></div></div></div><span data-dcnode-id="3984" instrument_node="">
</span><p data-dcnode-id="3982"><span data-dcnode-id="3983" instrument_node="">So – here we have a fruit tree pruning guide for you to consult and consider, and get you all skilled up and ready to go</span></p><span data-dcnode-id="3981" instrument_node="">
</span><p data-dcnode-id="3976"><span data-dcnode-id="3980" instrument_node="">Because pruning fruit trees </span><strong data-dcnode-id="3978"><span data-dcnode-id="3979" instrument_node="">is easy once you know how, </span></strong><span data-dcnode-id="3977" instrument_node="">but a foundational understanding is important. So let’s get you there, quick smart.</span></p><span data-dcnode-id="3975" instrument_node="">
</span><h2 data-dcnode-id="3973"><span data-dcnode-id="3974" instrument_node="">What is pruning, and why do we prune fruit trees?</span></h2><span data-dcnode-id="3972" instrument_node="">
</span><p data-dcnode-id="3970"><span data-dcnode-id="3971" instrument_node="">First up – the basics.</span></p><span data-dcnode-id="3969" instrument_node="">
</span><p data-dcnode-id="3965"><span data-dcnode-id="3968" instrument_node="">Pruning involves the use of secateurs, loppers or pruning saws to remove </span><em data-dcnode-id="3966"><span data-dcnode-id="3967" instrument_node="">unwanted plant material, in order to allow the fruit tree to continue to produce fruit in a way that’s healthy for the tree, and accessible to harvest.</span></em></p><span data-dcnode-id="3964" instrument_node="">
</span><div class="wp-block-image" data-dcnode-id="3951"><figure class="aligncenter size-full" data-dcnode-id="3952"><div class="essb-pin wp-image-65150 essb-pinid-2" data-dcnode-id="3955"><img alt="Remove small broken stems with secateurs." class="pin-generated" data-dcnode-id="3963" height="666" loading="lazy" sizes="(max-width: 1000px) 100vw, 1000px" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.milkwood.net/wp-content/uploads/2021/05/Pruning-Article-11-of-12.jpg&amp;raw" srcset="https://www.milkwood.net/wp-content/uploads/2021/05/Pruning-Article-11-of-12.jpg 1000w, https://www.milkwood.net/wp-content/uploads/2021/05/Pruning-Article-11-of-12-768x511.jpg 768w, https://www.milkwood.net/wp-content/uploads/2021/05/Pruning-Article-11-of-12-400x266.jpg 400w" style="" width="1000"><div class="essb_links essb_displayed_pinimage essb_template_big-retina essb_icon_animation13 essb_pos_top-left essb_mobilepos_below essb_l2dqvezm" data-dcnode-id="3956" data-essb-instance="l2dqvezm" data-essb-position="pinit" data-essb-postid="65112"><ul class="essb_links_list" data-dcnode-id="3957"><li class="essb_item essb_link_pinterest nolightbox" data-dcnode-id="3958"><a class="nolightbox" data-dcnode-id="3959" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//pinterest.com/pin/create/button/%3Furl%3Dhttps%3A//www.milkwood.net/2021/05/04/fruit-tree-pruning-guide/%26is_video%3Dfalse%26media%3Dhttps%3A//www.milkwood.net/wp-content/uploads/2021/05/Pruning-Article-11-of-12.jpg%26description%3DRemove%2520small%2520broken%2520stems%2520with%2520secateurs." onclick="essb.window('https://pinterest.com/pin/create/button/?url=https://www.milkwood.net/2021/05/04/fruit-tree-pruning-guide/&amp;is_video=false&amp;media=https://www.milkwood.net/wp-content/uploads/2021/05/Pruning-Article-11-of-12.jpg&amp;description=Remove%20small%20broken%20stems%20with%20secateurs.','pinpro','l2dqvezm'); return false;" rel="noreferrer noopener nofollow" target="_blank"><span class="essb_icon essb_icon_pinterest" data-dcnode-id="3962"></span><span class="essb_network_name" data-dcnode-id="3960"><span data-dcnode-id="3961" instrument_node="">Pin</span></span></a></li></ul></div></div><figcaption data-dcnode-id="3953"><span data-dcnode-id="3954" instrument_node="">Removing small broken stems with secateurs – one of the many jobs undertaken during pruning.</span></figcaption></figure></div><span data-dcnode-id="3950" instrument_node="">
</span><h2 data-dcnode-id="3948"><span data-dcnode-id="3949" instrument_node="">Why are fruit trees pruned?</span></h2><span data-dcnode-id="3947" instrument_node="">
</span><p data-dcnode-id="3945"><span data-dcnode-id="3946" instrument_node="">If you’re into foraging wild fruit and berries, you’ll likely have noticed that many wild fruit trees in our suburbs and country towns are never pruned or cared for – yet often produce vast quantities of fruit and flowers.</span></p><span data-dcnode-id="3944" instrument_node="">
</span><p data-dcnode-id="3942"><span data-dcnode-id="3943" instrument_node="">So – why do we prune?</span></p><span data-dcnode-id="3941" instrument_node="">
</span><p data-dcnode-id="3939"><span data-dcnode-id="3940" instrument_node="">Well, the expectations we place on berries and fruit trees for our homes or commercial orchards are often very different to the expectations we have of wild plants. For example – no matter what a wild tree looks like, no matter how poorly shaped or damaged or how small the fruit or how often it fruits, we are often so excited to find wild fruit that all other cares are forgotten.</span></p><span data-dcnode-id="3938" instrument_node="">
</span><p data-dcnode-id="3936"><span data-dcnode-id="3937" instrument_node="">But with fruit trees we have purchased and planted ourselves, those expectations often change.</span></p><span data-dcnode-id="3935" instrument_node="">
</span><p data-dcnode-id="3933"><span data-dcnode-id="3934" instrument_node="">Therefore we prune to achieve one or more of the following:</span></p><span data-dcnode-id="3932" instrument_node="">
</span><ul data-dcnode-id="3915"><li data-dcnode-id="3930"><span data-dcnode-id="3931" instrument_node="">Keep the fruit tree small and highly productive</span></li><li data-dcnode-id="3928"><span data-dcnode-id="3929" instrument_node="">Increase fruit size, fruit yield and accessibility to that fruit</span></li><li data-dcnode-id="3926"><span data-dcnode-id="3927" instrument_node="">Improve the structural strength of tree limbs to better support fruit</span></li><li data-dcnode-id="3924"><span data-dcnode-id="3925" instrument_node="">Remove diseased parts and damage</span></li><li data-dcnode-id="3922"><span data-dcnode-id="3923" instrument_node="">Remove branches that cross each other and cause congestion</span></li><li data-dcnode-id="3920"><span data-dcnode-id="3921" instrument_node="">Increase light and airflow to prevent fungal diseases related to excess humidity in humid climates</span></li><li data-dcnode-id="3918"><span data-dcnode-id="3919" instrument_node="">Maintain soft green stems which are useful for propagation</span></li><li data-dcnode-id="3916"><span data-dcnode-id="3917" instrument_node="">To remove a ‘leader’ (apical bud – the tallest upright stem) in order to remove apical dominance and to encourage the tree to grow outwards (lateral growth).</span></li></ul><span data-dcnode-id="3914" instrument_node="">
</span><div class="wp-block-image" data-dcnode-id="3911"><figure class="aligncenter size-full" data-dcnode-id="3912"><img alt="" class="wp-image-65336" data-dcnode-id="3913" height="666" loading="lazy" sizes="(max-width: 1000px) 100vw, 1000px" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.milkwood.net/wp-content/uploads/2021/05/pruning-16.jpg&amp;raw" srcset="https://www.milkwood.net/wp-content/uploads/2021/05/pruning-16.jpg 1000w, https://www.milkwood.net/wp-content/uploads/2021/05/pruning-16-768x511.jpg 768w, https://www.milkwood.net/wp-content/uploads/2021/05/pruning-16-400x266.jpg 400w" width="1000"></figure></div><span data-dcnode-id="3910" instrument_node="">
</span><h2 data-dcnode-id="3908"><span data-dcnode-id="3909" instrument_node="">A permaculture approach to fruit tree pruning</span></h2><span data-dcnode-id="3907" instrument_node="">
</span><p data-dcnode-id="3905"><span data-dcnode-id="3906" instrument_node="">It’s worth noting – not all approaches to pruning are coming from a DIY, home-harvest perspective.</span></p><span data-dcnode-id="3904" instrument_node="">
</span><p data-dcnode-id="3902"><span data-dcnode-id="3903" instrument_node="">Commercial orchardists often prune trees heavily and create very wide open canopies, not only to access fruit but also to make chemical spraying easier – they try to ensure all foliage has made contact with sprays.</span></p><span data-dcnode-id="3901" instrument_node="">
</span><p data-dcnode-id="3899"><span data-dcnode-id="3900" instrument_node="">It’s important to understand that in a permaculture setting, where chemical sprays are not used, trees are best shaped to reflect the climate and fruit harvest needs.</span></p><span data-dcnode-id="3898" instrument_node="">
</span><p data-dcnode-id="3896"><span data-dcnode-id="3897" instrument_node="">In some contexts, that may mean less pruning, to prevent the plant being sunburnt (due to not enough foliage), or even pruning hashly to reduce the crop (so your little household isn’t overwhelmed with 60kg of apples at once).</span></p><span data-dcnode-id="3895" instrument_node="">
</span><div class="wp-block-image" data-dcnode-id="3892"><figure class="aligncenter size-full" data-dcnode-id="3893"><img alt="" class="wp-image-65344" data-dcnode-id="3894" height="1500" loading="lazy" sizes="(max-width: 1000px) 100vw, 1000px" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.milkwood.net/wp-content/uploads/2021/05/pruning-1-1.jpg&amp;raw" srcset="https://www.milkwood.net/wp-content/uploads/2021/05/pruning-1-1.jpg 1000w, https://www.milkwood.net/wp-content/uploads/2021/05/pruning-1-1-683x1024.jpg 683w, https://www.milkwood.net/wp-content/uploads/2021/05/pruning-1-1-768x1152.jpg 768w, https://www.milkwood.net/wp-content/uploads/2021/05/pruning-1-1-400x600.jpg 400w" width="1000"></figure></div><span data-dcnode-id="3891" instrument_node="">
</span><h2 data-dcnode-id="3889"><span data-dcnode-id="3890" instrument_node="">The influence of photosynthesis on pruning decisions</span></h2><span data-dcnode-id="3888" instrument_node="">
</span><p data-dcnode-id="3886"><span data-dcnode-id="3887" instrument_node="">Plants direct sugars produced during photosynthesis to different parts of the plant. Sugars are transported to increase plant height and assist with fruit set.</span></p><span data-dcnode-id="3885" instrument_node="">
</span><p data-dcnode-id="3883"><span data-dcnode-id="3884" instrument_node="">When pruning, you’re aiming to inform and assist this process. For example if fruit is the most important outcome for the next year (as opposed to fruit tree growth, perhaps), then pruning is carried out to reduce tree height – in favour of fruit set and fruit accessibility.&nbsp;&nbsp;</span></p><span data-dcnode-id="3882" instrument_node="">
</span><p data-dcnode-id="3879"><em data-dcnode-id="3880"><span data-dcnode-id="3881" instrument_node="">Pruning aims to maintain a balance between the number of fruit buds that develop and the amount of growth created by the tree – because this is growth which will produce fruit buds in the future. And because your fruit tree is a perennial plant, you want to think about future harvests as you prune for this year’s harvest. Balance in all things…&nbsp;</span></em></p><span data-dcnode-id="3878" instrument_node="">
</span><p data-dcnode-id="3876"><span data-dcnode-id="3877" instrument_node="">OK – so now let’s get into some of the more technical details.</span></p><span data-dcnode-id="3875" instrument_node="">
</span><div class="wp-block-image" data-dcnode-id="3872"><figure class="aligncenter size-full" data-dcnode-id="3873"><img alt="" class="wp-image-65338" data-dcnode-id="3874" height="1264" loading="lazy" sizes="(max-width: 1000px) 100vw, 1000px" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.milkwood.net/wp-content/uploads/2021/05/pruning-3.jpg&amp;raw" srcset="https://www.milkwood.net/wp-content/uploads/2021/05/pruning-3.jpg 1000w, https://www.milkwood.net/wp-content/uploads/2021/05/pruning-3-810x1024.jpg 810w, https://www.milkwood.net/wp-content/uploads/2021/05/pruning-3-768x971.jpg 768w, https://www.milkwood.net/wp-content/uploads/2021/05/pruning-3-400x506.jpg 400w" width="1000"></figure></div><span data-dcnode-id="3871" instrument_node="">
</span><h2 data-dcnode-id="3869"><span data-dcnode-id="3870" instrument_node="">Should I prune my fruit tree in summer or winter?</span></h2><span data-dcnode-id="3868" instrument_node="">
</span><p data-dcnode-id="3861"><strong data-dcnode-id="3866"><span data-dcnode-id="3867" instrument_node="">Stone fruits</span></strong><span data-dcnode-id="3865" instrument_node=""> such as plums, cherries, peaches and apricots </span><strong data-dcnode-id="3863"><span data-dcnode-id="3864" instrument_node="">are best pruned in summer. </span></strong><span data-dcnode-id="3862" instrument_node="">(Stone fruits are identified by the distinctive single stone at the centre of the fruit.)</span></p><span data-dcnode-id="3860" instrument_node="">
</span><p data-dcnode-id="3858"><span data-dcnode-id="3859" instrument_node="">This is because these fruit trees, if pruned in winter, are very susceptible to a disease called Cytospora canker. This fungal disease attacks pruning cuts made in cold weather. So prune these trees in warm weather to give the wound sufficient healing time before deep winter.</span></p><span data-dcnode-id="3857" instrument_node="">
</span><p data-dcnode-id="3850"><strong data-dcnode-id="3855"><span data-dcnode-id="3856" instrument_node="">Pome fruits</span></strong><span data-dcnode-id="3854" instrument_node=""> such as apples, pears, quince, medlar, </span><strong data-dcnode-id="3852"><span data-dcnode-id="3853" instrument_node="">are generally pruned when plants are dormant in winter. </span></strong><span data-dcnode-id="3851" instrument_node="">(Pome means apple in French.)</span></p><span data-dcnode-id="3849" instrument_node="">
</span><p data-dcnode-id="3847"><span data-dcnode-id="3848" instrument_node="">Pomme fruits aren’t susceptible to Cytospora canker, so they’ll cope fine with pruning in cold weather. Pruning in winter is a good idea because your trees will have completely finished growing, are dormant and any pruning done then will produce lush new growth in spring.&nbsp;</span></p><span data-dcnode-id="3846" instrument_node="">
</span><p data-dcnode-id="3843"><strong data-dcnode-id="3844"><span data-dcnode-id="3845" instrument_node="">A further note on summer pruning…</span></strong></p><span data-dcnode-id="3842" instrument_node="">
</span><p data-dcnode-id="3840"><span data-dcnode-id="3841" instrument_node="">All fruit trees can be pruned in summer, too – but note that pruning while the tree is still actively growing will limit its growth. So, if you’re trying to reduce the size of a tree, summer pruning could be the way to go.</span></p><span data-dcnode-id="3839" instrument_node="">
</span><div class="wp-block-image" data-dcnode-id="3836"><figure class="aligncenter size-full" data-dcnode-id="3837"><img alt="" class="wp-image-65345" data-dcnode-id="3838" height="666" loading="lazy" sizes="(max-width: 1000px) 100vw, 1000px" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.milkwood.net/wp-content/uploads/2021/05/pruning-18.jpg&amp;raw" srcset="https://www.milkwood.net/wp-content/uploads/2021/05/pruning-18.jpg 1000w, https://www.milkwood.net/wp-content/uploads/2021/05/pruning-18-768x511.jpg 768w, https://www.milkwood.net/wp-content/uploads/2021/05/pruning-18-400x266.jpg 400w" width="1000"></figure></div><span data-dcnode-id="3835" instrument_node="">
</span><h2 data-dcnode-id="3833"><span data-dcnode-id="3834" instrument_node="">Understanding a tree’s growing features – leaders, laterals and sublateral</span></h2><span data-dcnode-id="3832" instrument_node="">
</span><p data-dcnode-id="3830"><span data-dcnode-id="3831" instrument_node="">Understanding a tree’s growing features (morphology) helps you to really “see” your fruit tree and to make informed pruning cuts.</span></p><span data-dcnode-id="3829" instrument_node="">
</span><ul data-dcnode-id="3814"><li data-dcnode-id="3825"><strong data-dcnode-id="3827"><span data-dcnode-id="3828" instrument_node="">Leaders</span></strong><span data-dcnode-id="3826" instrument_node=""> are the longest, strongest branches – or the longest strongest branch in the centre of the tree.</span></li><li data-dcnode-id="3820"><span data-dcnode-id="3824" instrument_node="">A </span><strong data-dcnode-id="3822"><span data-dcnode-id="3823" instrument_node="">lateral </span></strong><span data-dcnode-id="3821" instrument_node="">is any branch growing away from the central leader or leaders (where most fruit is formed).</span></li><li data-dcnode-id="3815"><span data-dcnode-id="3819" instrument_node="">A </span><strong data-dcnode-id="3817"><span data-dcnode-id="3818" instrument_node="">sublateral </span></strong><span data-dcnode-id="3816" instrument_node="">is a stem growing from a lateral, essentially at the third level from the leader.</span></li></ul><span data-dcnode-id="3813" instrument_node="">
</span><p data-dcnode-id="3811"><span data-dcnode-id="3812" instrument_node="">It is up to you to decide which stems will become your leaders. You can choose just one leader going directly up and at the centre of the tree (known as a central leader). Or you can choose multiple leaders – perhaps three, five or even 10. The choice will be based on the space you have and what you plan to do with the tree.</span></p><span data-dcnode-id="3810" instrument_node="">
</span><figure class="wp-block-image size-large" data-dcnode-id="3806"><img alt="" class="wp-image-65118" data-dcnode-id="3809" height="763" loading="lazy" sizes="(max-width: 1000px) 100vw, 1000px" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.milkwood.net/wp-content/uploads/2021/05/Pruning-Article-1-of-12.jpg&amp;raw" srcset="https://www.milkwood.net/wp-content/uploads/2021/05/Pruning-Article-1-of-12.jpg 1000w, https://www.milkwood.net/wp-content/uploads/2021/05/Pruning-Article-1-of-12-768x586.jpg 768w, https://www.milkwood.net/wp-content/uploads/2021/05/Pruning-Article-1-of-12-400x305.jpg 400w" width="1000"><figcaption data-dcnode-id="3807"><span data-dcnode-id="3808" instrument_node="">This lemon has had its central leader pruned back hard to promote lateral growth. It had not been pruned when first planted, so the leaders were spindly and thin, with the central leader weak. New lateral growth is now occurring along entire central stem. Lower stems will be retained to prevent rabbit damage to central leader. Upper laterals will be pruned back by two thirds to improve the shape of the tree at the expense of fruit.</span></figcaption></figure><span data-dcnode-id="3805" instrument_node="">
</span><p data-dcnode-id="3803"><span data-dcnode-id="3804" instrument_node="">Is the main goal of the fruit tree to provide a harvest and to be able to access that harvest super efficiently? Or do you want a harvest but also a beautiful tree(s) that will provide shade and act as a feature in your orchard or garden?</span></p><span data-dcnode-id="3802" instrument_node="">
</span><p data-dcnode-id="3800"><span data-dcnode-id="3801" instrument_node="">Some commercial orchards produce fruit on one central leader. Others have two leaders that have been pruned to create a very wide V-shape. Others produce a vase shape by removing the central leader and keeping multiple laterals in a wide open, wine glass frame.</span></p><span data-dcnode-id="3799" instrument_node="">
</span><p data-dcnode-id="3797"><span data-dcnode-id="3798" instrument_node="">Again, be cautious about leaning too heavily on the methods of commercial growers, who often have chemical sprays to consider.</span></p><span data-dcnode-id="3796" instrument_node="">
</span><p data-dcnode-id="3794"><span data-dcnode-id="3795" instrument_node="">Instead, if your fruit trees have been planted to give you beauty, shade, and fruit, don’t prune too heavily. Your aim will be to reduce growth but not to the point where the tree canopy (the upper branches and leaves that provide shade) is totally compromised by a commercial orchard style V or Vase.</span></p><span data-dcnode-id="3793" instrument_node="">
</span><p data-dcnode-id="3791"><span data-dcnode-id="3792" instrument_node="">Your climate will also greatly influence your decisions.</span></p><span data-dcnode-id="3790" instrument_node="">
</span><p data-dcnode-id="3788"><span data-dcnode-id="3789" instrument_node="">In dry hot summers, you may not want a wide open fruit tree that lets lots of light in, as it may make the tree and fruit more susceptible to sunburn. But in a very humid, low-wind environment – you will want to open the tree up to reduce fungal diseases.</span></p><span data-dcnode-id="3787" instrument_node="">
</span><h2 data-dcnode-id="3785"><span data-dcnode-id="3786" instrument_node="">Helping your tree by reducing the effect of the tallest upright stem (apical dominance)</span></h2><span data-dcnode-id="3784" instrument_node="">
</span><p data-dcnode-id="3782"><span data-dcnode-id="3783" instrument_node="">Apical dominance is the effect the tallest upright stem has on the potential for lateral stems below it to grow.</span></p><span data-dcnode-id="3781" instrument_node="">
</span><p data-dcnode-id="3779"><span data-dcnode-id="3780" instrument_node="">Remember – we want lateral stems to grow because these branches bear the most amount of fruit.&nbsp;</span></p><span data-dcnode-id="3778" instrument_node="">
</span><p data-dcnode-id="3776"><span data-dcnode-id="3777" instrument_node="">A tree trunk has many points of potential growth along it below the tallest upright (apical) stem. Many of these points are invisible, but appear the moment apical dominance is removed.</span></p><span data-dcnode-id="3775" instrument_node="">
</span><p data-dcnode-id="3773"><span data-dcnode-id="3774" instrument_node="">So, you may choose to reduce apical dominance by either:</span></p><span data-dcnode-id="3772" instrument_node="">
</span><ul data-dcnode-id="3767"><li data-dcnode-id="3770"><span data-dcnode-id="3771" instrument_node="">Cutting away the tallest vertical stem, or</span></li><li data-dcnode-id="3768"><span data-dcnode-id="3769" instrument_node="">Pulling a stem down and tying it horizontally.</span></li></ul><span data-dcnode-id="3766" instrument_node="">
</span><p data-dcnode-id="3764"><span data-dcnode-id="3765" instrument_node="">Whichever you choose, reducing apical dominance can help ensure more fruit yield lower down on the tree – where it’s easier to reach.</span></p><span data-dcnode-id="3763" instrument_node="">
</span><div class="wp-block-image" data-dcnode-id="3756"><figure class="aligncenter size-large" data-dcnode-id="3757"><img alt="" class="wp-image-65121" data-dcnode-id="3762" height="666" loading="lazy" sizes="(max-width: 1000px) 100vw, 1000px" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.milkwood.net/wp-content/uploads/2021/05/Pruning-Article-9-of-12.jpg&amp;raw" srcset="https://www.milkwood.net/wp-content/uploads/2021/05/Pruning-Article-9-of-12.jpg 1000w, https://www.milkwood.net/wp-content/uploads/2021/05/Pruning-Article-9-of-12-768x511.jpg 768w, https://www.milkwood.net/wp-content/uploads/2021/05/Pruning-Article-9-of-12-400x266.jpg 400w" width="1000"><figcaption data-dcnode-id="3758"><span data-dcnode-id="3761" instrument_node="">Here, a young flexible leader has been pulled down and folded under other leaders to create a ‘lateral’ effect. Where humidity is not a problem, such as in cool</span><br data-dcnode-id="3760"><span data-dcnode-id="3759" instrument_node="">temperate climates with dry summers, it is possible to crowd the canopy a little by bending young leaders into lateral positions.</span></figcaption></figure></div><span data-dcnode-id="3755" instrument_node="">
</span><h2 data-dcnode-id="3753"><span data-dcnode-id="3754" instrument_node="">Deciding exactly where to cut your tree – by identifying fruit tree buds and fruiting spurs</span></h2><span data-dcnode-id="3752" instrument_node="">
</span><p data-dcnode-id="3744"><span data-dcnode-id="3751" instrument_node="">First we must find out if our fruit tree is </span><em data-dcnode-id="3749"><span data-dcnode-id="3750" instrument_node="">spur-bearing </span></em><span data-dcnode-id="3748" instrument_node="">or </span><em data-dcnode-id="3746"><span data-dcnode-id="3747" instrument_node="">tip-bearing</span></em><span data-dcnode-id="3745" instrument_node="">. One of the key features that will help you decide where to cut when pruning fruit trees is the size and shape of buds.</span></p><span data-dcnode-id="3743" instrument_node="">
</span><p data-dcnode-id="3741"><span data-dcnode-id="3742" instrument_node="">If you can, have a go at determining if the bud you see is a:</span></p><span data-dcnode-id="3740" instrument_node="">
</span><p data-dcnode-id="3736"><strong data-dcnode-id="3738"><span data-dcnode-id="3739" instrument_node="">Shooting bud:</span></strong><span data-dcnode-id="3737" instrument_node=""> a thin flattish bud that will produce leaves and stem.&nbsp;&nbsp;</span></p><span data-dcnode-id="3735" instrument_node="">
</span><p data-dcnode-id="3731"><strong data-dcnode-id="3733"><span data-dcnode-id="3734" instrument_node="">Fat fruit bud:</span></strong><span data-dcnode-id="3732" instrument_node=""> a bud that looks fatter and rounder and sometimes fluffy, than a shooting bud and will produce a flower and therefore fruit (if pollinated).</span></p><span data-dcnode-id="3730" instrument_node="">
</span><p data-dcnode-id="3726"><strong data-dcnode-id="3728"><span data-dcnode-id="3729" instrument_node="">Fruiting spur (also known as spur-bearer):</span></strong><span data-dcnode-id="3727" instrument_node=""> a short stocky shoot close to leaders, that produces fruit and is spaced very closely to the next short stocky shoot. The internode (the space between two shoots) is very short as well. Fruiting spurs occur on apples, pears, cherry, pomegranate and plums.</span></p><span data-dcnode-id="3725" instrument_node="">
</span><p data-dcnode-id="3723"><span data-dcnode-id="3724" instrument_node="">If you’re hoping your pruning efforts will result in more fruit, try not to lop off too many fat fruit buds or fruiting spurs. Or, if you’re hoping to encourage your tree to grow into a different and more accessible shape, consider the direction shooting buds are pointing and cut accordingly.</span></p><span data-dcnode-id="3722" instrument_node="">
</span><p data-dcnode-id="3720"><span data-dcnode-id="3721" instrument_node="">Watch the video below for a really good overview of how to identify each different type of bud –</span></p><span data-dcnode-id="3719" instrument_node="">
</span><figure class="wp-block-embed is-type-video is-provider-youtube wp-block-embed-youtube wp-embed-aspect-16-9 wp-has-aspect-ratio" data-dcnode-id="3197"><div class="wp-block-embed__wrapper" data-dcnode-id="3198"><span data-dcnode-id="3718" instrument_node="">
