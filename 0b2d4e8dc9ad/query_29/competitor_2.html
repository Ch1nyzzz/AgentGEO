</span><h2 data-dcnode-id="3194"><span data-dcnode-id="3195" instrument_node="">Will my fruit trees still yield fruit, even if I don’t prune?</span></h2><span data-dcnode-id="3193" instrument_node="">
</span><p data-dcnode-id="3191"><span data-dcnode-id="3192" instrument_node="">Short answer – yes they will.</span></p><span data-dcnode-id="3190" instrument_node="">
</span><p data-dcnode-id="3185"><span data-dcnode-id="3189" instrument_node="">But to make harvesting easier in the </span><em data-dcnode-id="3187"><span data-dcnode-id="3188" instrument_node="">long term</span></em><span data-dcnode-id="3186" instrument_node="">, you will most likely want to prune your fruit trees every year.</span></p><span data-dcnode-id="3184" instrument_node="">
</span><h2 data-dcnode-id="3182"><span data-dcnode-id="3183" instrument_node="">A practical example: Pruning a new apple tree over three years, for easier access to fruit</span></h2><span data-dcnode-id="3181" instrument_node="">
</span><p data-dcnode-id="3179"><span data-dcnode-id="3180" instrument_node="">We’ve gone through a lot of theory here, so let’s walk through an example of how you might approach the pruning of a new baby apple tree – if you purchased it as a bare-rooted tree from a nursery.</span></p><span data-dcnode-id="3178" instrument_node="">
</span><p data-dcnode-id="3176"><span data-dcnode-id="3177" instrument_node="">We’ll imagine the top priority for pruning is ‘easy access to fruit’. And let’s note that, generally speaking, apples produce fruit in their second or third year of growth.</span></p><span data-dcnode-id="3175" instrument_node="">
</span><div class="wp-block-image" data-dcnode-id="3162"><figure class="aligncenter size-full" data-dcnode-id="3163"><div class="essb-pin wp-image-65125 essb-pinid-3" data-dcnode-id="3166"><img alt="A fruiting spur - short, stocky and close to stem leader." class="pin-generated" data-dcnode-id="3174" height="839" loading="lazy" sizes="(max-width: 1000px) 100vw, 1000px" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.milkwood.net/wp-content/uploads/2021/05/Pruning-Article-12-of-12.jpg&amp;raw" srcset="https://www.milkwood.net/wp-content/uploads/2021/05/Pruning-Article-12-of-12.jpg 1000w, https://www.milkwood.net/wp-content/uploads/2021/05/Pruning-Article-12-of-12-768x644.jpg 768w, https://www.milkwood.net/wp-content/uploads/2021/05/Pruning-Article-12-of-12-400x336.jpg 400w" style="" width="1000"><div class="essb_links essb_displayed_pinimage essb_template_big-retina essb_icon_animation13 essb_pos_top-left essb_mobilepos_below essb_l2dqvezs" data-dcnode-id="3167" data-essb-instance="l2dqvezs" data-essb-position="pinit" data-essb-postid="65112"><ul class="essb_links_list" data-dcnode-id="3168"><li class="essb_item essb_link_pinterest nolightbox" data-dcnode-id="3169"><a class="nolightbox" data-dcnode-id="3170" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//pinterest.com/pin/create/button/%3Furl%3Dhttps%3A//www.milkwood.net/2021/05/04/fruit-tree-pruning-guide/%26is_video%3Dfalse%26media%3Dhttps%3A//www.milkwood.net/wp-content/uploads/2021/05/Pruning-Article-12-of-12.jpg%26description%3DA%2520fruiting%2520spur%2520-%2520short%252C%2520stocky%2520and%2520close%2520to%2520stem%2520leader." onclick="essb.window('https://pinterest.com/pin/create/button/?url=https://www.milkwood.net/2021/05/04/fruit-tree-pruning-guide/&amp;is_video=false&amp;media=https://www.milkwood.net/wp-content/uploads/2021/05/Pruning-Article-12-of-12.jpg&amp;description=A%20fruiting%20spur%20-%20short%2C%20stocky%20and%20close%20to%20stem%20leader.','pinpro','l2dqvezs'); return false;" rel="noreferrer noopener nofollow" target="_blank"><span class="essb_icon essb_icon_pinterest" data-dcnode-id="3173"></span><span class="essb_network_name" data-dcnode-id="3171"><span data-dcnode-id="3172" instrument_node="">Pin</span></span></a></li></ul></div></div><figcaption data-dcnode-id="3164"><span data-dcnode-id="3165" instrument_node="">A fruiting spur – short, stocky and close to stem leader.</span></figcaption></figure></div><span data-dcnode-id="3161" instrument_node="">
</span><h3 data-dcnode-id="3154"><span data-dcnode-id="3160" instrument_node="">First we must find out if our apple tree is </span><em data-dcnode-id="3158"><span data-dcnode-id="3159" instrument_node="">spur-bearing</span></em><span data-dcnode-id="3157" instrument_node=""> or </span><em data-dcnode-id="3155"><span data-dcnode-id="3156" instrument_node="">tip-bearing.</span></em></h3><span data-dcnode-id="3153" instrument_node="">
</span><p data-dcnode-id="3151"><span data-dcnode-id="3152" instrument_node="">To accurately prune you must know if your apple variety is a spur-bearer or tip-bearer. This knowledge is used when pruning your new apple tree from its third year – or when pruning any mature apple tree.</span></p><span data-dcnode-id="3150" instrument_node="">
</span><p data-dcnode-id="3145"><span data-dcnode-id="3149" instrument_node="">Most apple varieties are</span><em data-dcnode-id="3147"><span data-dcnode-id="3148" instrument_node=""> spur-bearers – </span></em><span data-dcnode-id="3146" instrument_node="">they produce trees with a tidy compact appearance and produce lots of spurs on wood two years and older.</span></p><span data-dcnode-id="3144" instrument_node="">
</span><p data-dcnode-id="3139"><span data-dcnode-id="3143" instrument_node="">Other varieties however produce fruit in clusters near or at the tip – and thus are known as </span><em data-dcnode-id="3141"><span data-dcnode-id="3142" instrument_node="">tip-bearers</span></em><span data-dcnode-id="3140" instrument_node="">. Tip bearers produce very few fruiting spurs, are more sparse in appearance and have fewer spurs.</span></p><span data-dcnode-id="3138" instrument_node="">
</span><p data-dcnode-id="3136"><span data-dcnode-id="3137" instrument_node="">So, if you’re purchasing a new bare-rooted baby tree, ask which type it is.</span></p><span data-dcnode-id="3135" instrument_node="">
</span><p data-dcnode-id="3133"><span data-dcnode-id="3134" instrument_node="">Or, if you’re pruning a mature tree, look for spurs before pruning (they’re more visible on apple trees at two years or older). If you can’t spot any, your variety is most likely a tip-bearer.</span></p><span data-dcnode-id="3132" instrument_node="">
</span><h3 data-dcnode-id="3130"><span data-dcnode-id="3131" instrument_node="">Year 1 – winter pruning your bare-rooted apple tree</span></h3><span data-dcnode-id="3129" instrument_node="">
</span><p data-dcnode-id="3127"><span data-dcnode-id="3128" instrument_node="">When purchasing a bare-rooted apple tree, the nursery may cut the leaders back by two-thirds when you buy the tree, or they may not. Ask them if you are not sure.</span></p><span data-dcnode-id="3126" instrument_node="">
</span><p data-dcnode-id="3124"><span data-dcnode-id="3125" instrument_node="">If the tree was pruned by the nursery, you will receive a tree with very short branches and with only two to three main stems that form the ‘framework’ of the tree. The cuts will have been made to a bud facing directly upwards (ideally) and outwards from the tree.</span></p><span data-dcnode-id="3123" instrument_node="">
</span><p data-dcnode-id="3121"><span data-dcnode-id="3122" instrument_node="">If the tree you have bought has very long skinny stems, then it is up to you to cut back the stems by two-thirds and to a bud pointing upwards and outwards. But why? Let’s discuss that a bit later.</span></p><span data-dcnode-id="3120" instrument_node="">
</span><p data-dcnode-id="3118"><span data-dcnode-id="3119" instrument_node="">In spring, these apple trees will produce only leaves – because apple trees do not produce fruit on the first year’s growth.</span></p><span data-dcnode-id="3117" instrument_node="">
</span><h3 data-dcnode-id="3115"><span data-dcnode-id="3116" instrument_node="">Year 2 – winter pruning your apple tree</span></h3><span data-dcnode-id="3114" instrument_node="">
</span><p data-dcnode-id="3106"><span data-dcnode-id="3113" instrument_node="">By Year 2, the aim is to </span><em data-dcnode-id="3111"><span data-dcnode-id="3112" instrument_node="">keep building the framework of the tree</span></em><span data-dcnode-id="3110" instrument_node="">, to </span><em data-dcnode-id="3108"><span data-dcnode-id="3109" instrument_node="">strengthen stems</span></em><span data-dcnode-id="3107" instrument_node=""> by cutting them shorter and giving them more time to thicken up before they are expected to bear fruit, and to keep fruit-bearing parts as close as possible to the leaders that form the framework.</span></p><span data-dcnode-id="3105" instrument_node="">
</span><p data-dcnode-id="3103"><span data-dcnode-id="3104" instrument_node="">To achieve this, choose about seven to 10 lateral branches and cut them back to half their length.</span></p><span data-dcnode-id="3102" instrument_node="">
</span><p data-dcnode-id="3100"><span data-dcnode-id="3101" instrument_node="">These 10 laterals will form the new ‘framework’. Other shoots, such as leaders and sublaterals should be pruned back to about five buds.</span></p><span data-dcnode-id="3099" instrument_node="">
</span><p data-dcnode-id="3097"><span data-dcnode-id="3098" instrument_node="">Then, to clear the frame and stem clutter, remove any other shoots that overlap back to the stem.</span></p><span data-dcnode-id="3096" instrument_node="">
</span><h3 data-dcnode-id="3094"><span data-dcnode-id="3095" instrument_node="">Year 3 – winter pruning your apple tree according to whether it’s spur-bearing or winter-tip bearing</span></h3><span data-dcnode-id="3093" instrument_node="">
</span><p data-dcnode-id="3091"><span data-dcnode-id="3092" instrument_node="">Year 3 is that pivotal moment in which you need to know whether your apple tree is a spur-bearer or a winter-tip bearer – and prune accordingly.</span></p><span data-dcnode-id="3090" instrument_node="">
</span><p data-dcnode-id="3086"><strong data-dcnode-id="3088"><span data-dcnode-id="3089" instrument_node="">So, if you have a spur-bearing variety </span></strong><span data-dcnode-id="3087" instrument_node="">– prune branch leaders by a quarter of the previous year’s growth.</span></p><span data-dcnode-id="3085" instrument_node="">
</span><p data-dcnode-id="3083"><span data-dcnode-id="3084" instrument_node="">Prune strong laterals – those you want to keep because they don’t look spindly, skinny and weak – back to six&nbsp; buds. But prune weak laterals – those that you want to thicken up – back to three buds.</span></p><span data-dcnode-id="3082" instrument_node="">
</span><p data-dcnode-id="3080"><span data-dcnode-id="3081" instrument_node="">Also remove any laterals that cross over other branches – cut them back flush to the stem.</span></p><span data-dcnode-id="3079" instrument_node="">
</span><p data-dcnode-id="3075"><strong data-dcnode-id="3077"><span data-dcnode-id="3078" instrument_node="">If you have a tip-bearing variety </span></strong><span data-dcnode-id="3076" instrument_node="">– prune the branch leaders by a quarter, as you would with tip-bearing apple trees – but DON’T prune the laterals. The tips of the laterals is where most of the fruit will set so removing them would cut off next season’s fruit.</span></p><span data-dcnode-id="3074" instrument_node="">
</span><p data-dcnode-id="3072"><span data-dcnode-id="3073" instrument_node="">Remove only laterals that look very weak.</span></p><span data-dcnode-id="3071" instrument_node="">
</span><h3 data-dcnode-id="3069"><span data-dcnode-id="3070" instrument_node="">Why have we pruned the apple tree in this way?</span></h3><span data-dcnode-id="3068" instrument_node="">
</span><p data-dcnode-id="3066"><span data-dcnode-id="3067" instrument_node="">In the first two years of the tree’s growth, we wanted to focus on shaping the tree, increasing it’s strength by allowing leaders to thicken and shortening the length of those leaders.</span></p><span data-dcnode-id="3065" instrument_node="">
</span><p data-dcnode-id="3063"><span data-dcnode-id="3064" instrument_node="">If we don’t shorten the leaders and allow the second year’s growth to grow on unpruned first year leaders – then we have allowed the tree to grow taller than it needs to be for the purpose of fruit production.</span></p><span data-dcnode-id="3062" instrument_node="">
</span><p data-dcnode-id="3060"><span data-dcnode-id="3061" instrument_node="">Then year three comes around with new growth – if that too goes unpruned, then the arms of the tree grow longer and longer, and soon enough the fruit will be beyond our reach.</span></p><span data-dcnode-id="3059" instrument_node="">
</span><div class="wp-block-image" data-dcnode-id="3048"><figure class="aligncenter size-full" data-dcnode-id="3049"><div class="essb-pin wp-image-65339 essb-pinid-4" data-dcnode-id="3050"><img alt="" class="pin-generated" data-dcnode-id="3058" height="666" loading="lazy" sizes="(max-width: 1000px) 100vw, 1000px" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.milkwood.net/wp-content/uploads/2021/05/pruning-17.jpg&amp;raw" srcset="https://www.milkwood.net/wp-content/uploads/2021/05/pruning-17.jpg 1000w, https://www.milkwood.net/wp-content/uploads/2021/05/pruning-17-768x511.jpg 768w, https://www.milkwood.net/wp-content/uploads/2021/05/pruning-17-400x266.jpg 400w" style="" width="1000"><div class="essb_links essb_displayed_pinimage essb_template_big-retina essb_icon_animation13 essb_pos_top-left essb_mobilepos_below essb_l2dqvezy" data-dcnode-id="3051" data-essb-instance="l2dqvezy" data-essb-position="pinit" data-essb-postid="65112"><ul class="essb_links_list" data-dcnode-id="3052"><li class="essb_item essb_link_pinterest nolightbox" data-dcnode-id="3053"><a class="nolightbox" data-dcnode-id="3054" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//pinterest.com/pin/create/button/%3Furl%3Dhttps%3A//www.milkwood.net/2021/05/04/fruit-tree-pruning-guide/%26is_video%3Dfalse%26media%3Dhttps%3A//www.milkwood.net/wp-content/uploads/2021/05/pruning-17.jpg%26description%3DFruit%2520Tree%2520Pruning%2520Guide%253A%2520How%2520to%2520Prune%2520in%2520Winter%2520%2526%2520Summer%252C%2520too%2520%257C%2520Milkwood" onclick="essb.window('https://pinterest.com/pin/create/button/?url=https://www.milkwood.net/2021/05/04/fruit-tree-pruning-guide/&amp;is_video=false&amp;media=https://www.milkwood.net/wp-content/uploads/2021/05/pruning-17.jpg&amp;description=Fruit%20Tree%20Pruning%20Guide%3A%20How%20to%20Prune%20in%20Winter%20%26%20Summer%2C%20too%20%7C%20Milkwood','pinpro','l2dqvezy'); return false;" rel="noreferrer noopener nofollow" target="_blank"><span class="essb_icon essb_icon_pinterest" data-dcnode-id="3057"></span><span class="essb_network_name" data-dcnode-id="3055"><span data-dcnode-id="3056" instrument_node="">Pin</span></span></a></li></ul></div></div></figure></div><span data-dcnode-id="3047" instrument_node="">
</span><h2 data-dcnode-id="3045"><span data-dcnode-id="3046" instrument_node="">Answers to fruit tree pruning frequently asked questions</span></h2><span data-dcnode-id="3044" instrument_node="">
</span><h3 data-dcnode-id="3042"><span data-dcnode-id="3043" instrument_node="">Why are bare-rooted trees pruned just after planting?</span></h3><span data-dcnode-id="3041" instrument_node="">
</span><p data-dcnode-id="3039"><span data-dcnode-id="3040" instrument_node="">When a bare-rooted tree is first purchased in winter, the tree height won’t be well matched to its root size. This is because it will have been grown in a pot or closely planted in the field with little room for roots to expand. The tree will have been well watered and fed and ‘nursed’. Once out of its crib and planted, you will still care for it, but not quite so vigorously. It is at this time that you will make your first prune.</span></p><span data-dcnode-id="3038" instrument_node="">
</span><h3 data-dcnode-id="3036"><span data-dcnode-id="3037" instrument_node="">Why should we prune back to just three buds or six buds?</span></h3><span data-dcnode-id="3035" instrument_node="">
</span><p data-dcnode-id="3033"><span data-dcnode-id="3034" instrument_node="">With weak stems, we prune back harder to help that stem get thicker, so that it can better support future fruit weight. We cut it back to three buds to give the tree three chances to form a new vegetative shoot, a shoot that produces a leaf followed by a stem. If the first and second bud fail to produce a new shoot, then the third bud is bound to succeed.</span></p><span data-dcnode-id="3032" instrument_node="">
</span><p data-dcnode-id="3030"><span data-dcnode-id="3031" instrument_node="">For stems that are thick and therefore structurally sound, we prune back less hard, to six buds. That way we have six buds that can produce potential laterals – and it is on laterals that fruit is produced.</span></p><span data-dcnode-id="3029" instrument_node="">
</span><h3 data-dcnode-id="3027"><span data-dcnode-id="3028" instrument_node="">How do we know if a tree is two or more years old?</span></h3><span data-dcnode-id="3026" instrument_node="">
</span><p data-dcnode-id="3024"><span data-dcnode-id="3025" instrument_node="">Every season the tree puts on new growth and then comes to a stop. At the stop the tree develops a terminal bud, and a bulging line.</span></p><span data-dcnode-id="3023" instrument_node="">
</span><p data-dcnode-id="3021"><span data-dcnode-id="3022" instrument_node="">You can use this to tell the age of your tree. Run your hand along the central leader and up and up until you can feel a raised textured surface that circles the stem. This is where growth has stopped and the next year’s growth has occurred.</span></p><span data-dcnode-id="3020" instrument_node="">
</span><p data-dcnode-id="3018"><span data-dcnode-id="3019" instrument_node="">Each time you find a bulge – it represents a year’s growth.</span></p><span data-dcnode-id="3017" instrument_node="">
</span><h3 data-dcnode-id="3015"><span data-dcnode-id="3016" instrument_node="">Why do I need to know the age of my young fruit tree?</span></h3><span data-dcnode-id="3014" instrument_node="">
</span><p data-dcnode-id="3012"><span data-dcnode-id="3013" instrument_node="">Fruit trees start to produce fruit in their second or third year (if dwarf varieties) or any time after those first initial years. They don’t produce fruit in the first year. Some fruit trees also then produce fruit only on new-season growth.</span></p><span data-dcnode-id="3011" instrument_node="">
</span><p data-dcnode-id="3009"><span data-dcnode-id="3010" instrument_node="">Hence before pruning any fruit tree find out:</span></p><span data-dcnode-id="3008" instrument_node="">
</span><ul data-dcnode-id="3003"><li data-dcnode-id="3006"><span data-dcnode-id="3007" instrument_node="">In which year is this fruit tree likely to produce its first fruit, and</span></li><li data-dcnode-id="3004"><span data-dcnode-id="3005" instrument_node="">Does this tree, once it has started fruiting, only produce fruit on new season’s growth?</span></li></ul><span data-dcnode-id="3002" instrument_node="">
</span><p data-dcnode-id="3000"><span data-dcnode-id="3001" instrument_node="">Only though knowing this can you prune in an informed way.</span></p><span data-dcnode-id="2999" instrument_node="">
</span><figure class="wp-block-image size-large" data-dcnode-id="2987"><div class="essb-pin wp-image-65128 essb-pinid-5" data-dcnode-id="2990"><img alt="" class="pin-generated" data-dcnode-id="2998" height="666" loading="lazy" sizes="(max-width: 1000px) 100vw, 1000px" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.milkwood.net/wp-content/uploads/2021/05/Pruning-article.jpg&amp;raw" srcset="https://www.milkwood.net/wp-content/uploads/2021/05/Pruning-article.jpg 1000w, https://www.milkwood.net/wp-content/uploads/2021/05/Pruning-article-768x511.jpg 768w, https://www.milkwood.net/wp-content/uploads/2021/05/Pruning-article-400x266.jpg 400w" style="" width="1000"><div class="essb_links essb_displayed_pinimage essb_template_big-retina essb_icon_animation13 essb_pos_top-left essb_mobilepos_below essb_l2dqvf04" data-dcnode-id="2991" data-essb-instance="l2dqvf04" data-essb-position="pinit" data-essb-postid="65112"><ul class="essb_links_list" data-dcnode-id="2992"><li class="essb_item essb_link_pinterest nolightbox" data-dcnode-id="2993"><a class="nolightbox" data-dcnode-id="2994" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//pinterest.com/pin/create/button/%3Furl%3Dhttps%3A//www.milkwood.net/2021/05/04/fruit-tree-pruning-guide/%26is_video%3Dfalse%26media%3Dhttps%3A//www.milkwood.net/wp-content/uploads/2021/05/Pruning-article.jpg%26description%3DFruit%2520Tree%2520Pruning%2520Guide%253A%2520How%2520to%2520Prune%2520in%2520Winter%2520%2526%2520Summer%252C%2520too%2520%257C%2520Milkwood" onclick="essb.window('https://pinterest.com/pin/create/button/?url=https://www.milkwood.net/2021/05/04/fruit-tree-pruning-guide/&amp;is_video=false&amp;media=https://www.milkwood.net/wp-content/uploads/2021/05/Pruning-article.jpg&amp;description=Fruit%20Tree%20Pruning%20Guide%3A%20How%20to%20Prune%20in%20Winter%20%26%20Summer%2C%20too%20%7C%20Milkwood','pinpro','l2dqvf04'); return false;" rel="noreferrer noopener nofollow" target="_blank"><span class="essb_icon essb_icon_pinterest" data-dcnode-id="2997"></span><span class="essb_network_name" data-dcnode-id="2995"><span data-dcnode-id="2996" instrument_node="">Pin</span></span></a></li></ul></div></div><figcaption data-dcnode-id="2988"><span data-dcnode-id="2989" instrument_node="">Showing the delineation between new and old growth. To the left of the arrow is new season’s growth and to the right is last season’s growth. Note the difference in colour and texture between the two. The new season’s growth is shiny, glossy and dark brown. Last season’s growth has a patina of white and is thicker and more textured. </span></figcaption></figure><span data-dcnode-id="2986" instrument_node="">
</span><h2 data-dcnode-id="2984"><span data-dcnode-id="2985" instrument_node="">Apply the apple tree story to other trees – but with lots of exceptions</span></h2><span data-dcnode-id="2983" instrument_node="">
</span><p data-dcnode-id="2981"><span data-dcnode-id="2982" instrument_node="">The apple tree example was given to help with the overall understanding of the thinking that underpins pruning. But fruit trees all have different details that change the chapters in the story.</span></p><span data-dcnode-id="2980" instrument_node="">
</span><p data-dcnode-id="2978"><span data-dcnode-id="2979" instrument_node="">Hence, find out the particulars of the fruit tree you are pruning.</span></p><span data-dcnode-id="2977" instrument_node="">
</span><p data-dcnode-id="2975"><span data-dcnode-id="2976" instrument_node="">At the end of this article we provide a list of questions you need to ask and answer (through research: take a look through a good book or ask google), to help you find answers that specifically relate to the fruit tree you are pruning.</span></p><span data-dcnode-id="2974" instrument_node="">
</span><h2 data-dcnode-id="2972"><span data-dcnode-id="2973" instrument_node="">Shaping and training fruit trees – the overall pruning aim</span></h2><span data-dcnode-id="2971" instrument_node="">
</span><p data-dcnode-id="2969"><span data-dcnode-id="2970" instrument_node="">Your overall aim is to create large angles on laterals. Large angles are better at supporting fruit weight and help open up the tree to reduce congestion.</span></p><span data-dcnode-id="2968" instrument_node="">
</span><p data-dcnode-id="2966"><span data-dcnode-id="2967" instrument_node="">Therefore when making a cut, look for buds that are pointing up and away from the central leader, or leaders.</span></p><span data-dcnode-id="2965" instrument_node="">
</span><h2 data-dcnode-id="2963"><span data-dcnode-id="2964" instrument_node="">More fruit tree pruning key know-how</span></h2><span data-dcnode-id="2962" instrument_node="">
</span><figure class="wp-block-image size-large" data-dcnode-id="2950"><div class="essb-pin wp-image-65116 essb-pinid-6" data-dcnode-id="2953"><img alt="" class="pin-generated" data-dcnode-id="2961" height="666" loading="lazy" sizes="(max-width: 1000px) 100vw, 1000px" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.milkwood.net/wp-content/uploads/2021/05/Pruning-Article-7-of-12.jpg&amp;raw" srcset="https://www.milkwood.net/wp-content/uploads/2021/05/Pruning-Article-7-of-12.jpg 1000w, https://www.milkwood.net/wp-content/uploads/2021/05/Pruning-Article-7-of-12-768x511.jpg 768w, https://www.milkwood.net/wp-content/uploads/2021/05/Pruning-Article-7-of-12-400x266.jpg 400w" style="" width="1000"><div class="essb_links essb_displayed_pinimage essb_template_big-retina essb_icon_animation13 essb_pos_top-left essb_mobilepos_below essb_l2dqvf0b" data-dcnode-id="2954" data-essb-instance="l2dqvf0b" data-essb-position="pinit" data-essb-postid="65112"><ul class="essb_links_list" data-dcnode-id="2955"><li class="essb_item essb_link_pinterest nolightbox" data-dcnode-id="2956"><a class="nolightbox" data-dcnode-id="2957" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//pinterest.com/pin/create/button/%3Furl%3Dhttps%3A//www.milkwood.net/2021/05/04/fruit-tree-pruning-guide/%26is_video%3Dfalse%26media%3Dhttps%3A//www.milkwood.net/wp-content/uploads/2021/05/Pruning-Article-7-of-12.jpg%26description%3DFruit%2520Tree%2520Pruning%2520Guide%253A%2520How%2520to%2520Prune%2520in%2520Winter%2520%2526%2520Summer%252C%2520too%2520%257C%2520Milkwood" onclick="essb.window('https://pinterest.com/pin/create/button/?url=https://www.milkwood.net/2021/05/04/fruit-tree-pruning-guide/&amp;is_video=false&amp;media=https://www.milkwood.net/wp-content/uploads/2021/05/Pruning-Article-7-of-12.jpg&amp;description=Fruit%20Tree%20Pruning%20Guide%3A%20How%20to%20Prune%20in%20Winter%20%26%20Summer%2C%20too%20%7C%20Milkwood','pinpro','l2dqvf0b'); return false;" rel="noreferrer noopener nofollow" target="_blank"><span class="essb_icon essb_icon_pinterest" data-dcnode-id="2960"></span><span class="essb_network_name" data-dcnode-id="2958"><span data-dcnode-id="2959" instrument_node="">Pin</span></span></a></li></ul></div></div><figcaption data-dcnode-id="2951"><span data-dcnode-id="2952" instrument_node="">Dead mulberry branch. Secateurs held with flat blade close to central leader to produce a cut very close to the central leader.</span></figcaption></figure><span data-dcnode-id="2949" instrument_node="">
</span><h3 data-dcnode-id="2947"><span data-dcnode-id="2948" instrument_node="">Pruning dead or damaged branches</span></h3><span data-dcnode-id="2946" instrument_node="">
</span><p data-dcnode-id="2944"><span data-dcnode-id="2945" instrument_node="">This is the very easiest part of pruning. If a branch is damaged or dead then making a cut only requires the smallest amount of know how.</span></p><span data-dcnode-id="2943" instrument_node="">
</span><p data-dcnode-id="2941"><span data-dcnode-id="2942" instrument_node="">The easiest way to check if a branch is dead is to scratch a very small area of the stem back with your nail. If that branch/stem is alive it:</span></p><span data-dcnode-id="2940" instrument_node="">
</span><ul data-dcnode-id="2935"><li data-dcnode-id="2938"><span data-dcnode-id="2939" instrument_node="">Will be very easy to scratch the surface.</span></li><li data-dcnode-id="2936"><span data-dcnode-id="2937" instrument_node="">The scratch will reveal a distinctly green layer underneath.</span></li></ul><span data-dcnode-id="2934" instrument_node="">
</span><p data-dcnode-id="2932"><span data-dcnode-id="2933" instrument_node="">If it’s dead it will be hard to scratch the surface, because it has dried and become very woody and you will not see a layer of lush green underneath.</span></p><span data-dcnode-id="2931" instrument_node="">
</span><p data-dcnode-id="2929"><span data-dcnode-id="2930" instrument_node="">In this case, cut the stem right back. Place your secateurs with the narrow part of the blade closest to the base of the cut. Cut on a slight angle – not a large angle or you will expose too much of open wound.</span></p><span data-dcnode-id="2928" instrument_node="">
</span><figure class="wp-block-gallery aligncenter has-nested-images columns-default is-cropped" data-dcnode-id="2911"><span data-dcnode-id="2927" instrument_node="">
</span><figure class="wp-block-image size-full" data-dcnode-id="2923"><img alt="" class="wp-image-65121" data-dcnode-id="2926" data-id="65121" height="666" loading="lazy" sizes="(max-width: 1000px) 100vw, 1000px" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.milkwood.net/wp-content/uploads/2021/05/Pruning-Article-9-of-12.jpg&amp;raw" srcset="https://www.milkwood.net/wp-content/uploads/2021/05/Pruning-Article-9-of-12.jpg 1000w, https://www.milkwood.net/wp-content/uploads/2021/05/Pruning-Article-9-of-12-768x511.jpg 768w, https://www.milkwood.net/wp-content/uploads/2021/05/Pruning-Article-9-of-12-400x266.jpg 400w" width="1000"><figcaption data-dcnode-id="2924"><span data-dcnode-id="2925" instrument_node="">A wind-damaged apricot tree. The central leader has snapped and needs to be removed. A lateral growing very low to ground will be pruned back by two-thirds to a shoot pointing upwards and outwards. Shortening the lateral to a bud will direct its growth a little higher off the ground and allow the lateral to thicken and strengthen.</span></figcaption></figure><span data-dcnode-id="2922" instrument_node="">
</span><figure class="wp-block-image size-full" data-dcnode-id="2918"><img alt="" class="wp-image-65135" data-dcnode-id="2921" data-id="65135" height="666" loading="lazy" sizes="(max-width: 1000px) 100vw, 1000px" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.milkwood.net/wp-content/uploads/2021/05/Pruning-Article-3-of-12.jpg&amp;raw" srcset="https://www.milkwood.net/wp-content/uploads/2021/05/Pruning-Article-3-of-12.jpg 1000w, https://www.milkwood.net/wp-content/uploads/2021/05/Pruning-Article-3-of-12-768x511.jpg 768w, https://www.milkwood.net/wp-content/uploads/2021/05/Pruning-Article-3-of-12-400x266.jpg 400w" width="1000"><figcaption data-dcnode-id="2919"><span data-dcnode-id="2920" instrument_node="">Central leader stem has snapped, but not with a clean cut. Pruning saw used to produce a clean cut.</span></figcaption></figure><span data-dcnode-id="2917" instrument_node="">
</span><figure class="wp-block-image size-full" data-dcnode-id="2913"><img alt="" class="wp-image-65136" data-dcnode-id="2916" data-id="65136" height="666" loading="lazy" sizes="(max-width: 1000px) 100vw, 1000px" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.milkwood.net/wp-content/uploads/2021/05/Pruning-Article-4-of-12.jpg&amp;raw" srcset="https://www.milkwood.net/wp-content/uploads/2021/05/Pruning-Article-4-of-12.jpg 1000w, https://www.milkwood.net/wp-content/uploads/2021/05/Pruning-Article-4-of-12-768x511.jpg 768w, https://www.milkwood.net/wp-content/uploads/2021/05/Pruning-Article-4-of-12-400x266.jpg 400w" width="1000"><figcaption data-dcnode-id="2914"><span data-dcnode-id="2915" instrument_node="">Clean cut achieved. Buds at the base of the central leader aren’t visible prior to cut but they will appear and grow. From these new buds, a new central leader will be chosen.</span></figcaption></figure><span data-dcnode-id="2912" instrument_node="">
</span></figure><span data-dcnode-id="2910" instrument_node="">
</span><p data-dcnode-id="2908"><span data-dcnode-id="2909" instrument_node="">Likewise, if you can see a visibly broken branch, cut the stem right back flush, just as you would with a dead branch.</span></p><span data-dcnode-id="2907" instrument_node="">
</span><figure class="wp-block-gallery has-nested-images columns-default is-cropped" data-dcnode-id="2895"><span data-dcnode-id="2906" instrument_node="">
</span><figure class="wp-block-image size-large" data-dcnode-id="2902"><img alt="" class="wp-image-65147" data-dcnode-id="2905" data-id="65147" height="666" loading="lazy" sizes="(max-width: 1000px) 100vw, 1000px" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.milkwood.net/wp-content/uploads/2021/05/Pruning-Article-5-of-12.jpg&amp;raw" srcset="https://www.milkwood.net/wp-content/uploads/2021/05/Pruning-Article-5-of-12.jpg 1000w, https://www.milkwood.net/wp-content/uploads/2021/05/Pruning-Article-5-of-12-768x511.jpg 768w, https://www.milkwood.net/wp-content/uploads/2021/05/Pruning-Article-5-of-12-400x266.jpg 400w" width="1000"><figcaption data-dcnode-id="2903"><span data-dcnode-id="2904" instrument_node="">One of two leaders snapped on this young mulberry tree – a job for secateurs. The flat blade has not been used 100% correctly in this shot due to poor access. The flat blade has been correctly positioned to sit close to the bud but the blade should come in from the opposite side of bud to give better visibility of bud.</span></figcaption></figure><span data-dcnode-id="2901" instrument_node="">
</span><figure class="wp-block-image size-large" data-dcnode-id="2897"><img alt="" class="wp-image-65148" data-dcnode-id="2900" data-id="65148" height="666" loading="lazy" sizes="(max-width: 1000px) 100vw, 1000px" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.milkwood.net/wp-content/uploads/2021/05/Pruning-Article-6-of-12.jpg&amp;raw" srcset="https://www.milkwood.net/wp-content/uploads/2021/05/Pruning-Article-6-of-12.jpg 1000w, https://www.milkwood.net/wp-content/uploads/2021/05/Pruning-Article-6-of-12-768x511.jpg 768w, https://www.milkwood.net/wp-content/uploads/2021/05/Pruning-Article-6-of-12-400x266.jpg 400w" width="1000"><figcaption data-dcnode-id="2898"><span data-dcnode-id="2899" instrument_node="">A clean cut – angled but not too angled, creating a small surface area. A cut with a large angle creates a larger surface area that needs more time to heal. The cut is sitting high but could have been a little higher, above the new shoot. A cut taken too low, beneath the new bud, creates structural weakness.</span></figcaption></figure><span data-dcnode-id="2896" instrument_node="">
</span></figure><span data-dcnode-id="2894" instrument_node="">
</span><h3 data-dcnode-id="2892"><span data-dcnode-id="2893" instrument_node="">Pruning low-growing branches</span></h3><span data-dcnode-id="2891" instrument_node="">
</span><p data-dcnode-id="2889"><span data-dcnode-id="2890" instrument_node="">Pruning low growing branches (lower than 1m) allows you to access the tree more easily – although in some landscapes where rabbits are a problem, it may be best to leave them.</span></p><span data-dcnode-id="2888" instrument_node="">
</span><p data-dcnode-id="2886"><span data-dcnode-id="2887" instrument_node="">When we clear the central leader of the lowest-growing branches in a rabbit-rich environment, come winter the rabbits will chew the bark on the central leader to access sugars just beneath the bark (phloem). This can kill the tree by reducing its access to this important winter food.</span></p><span data-dcnode-id="2885" instrument_node="">
</span><h3 data-dcnode-id="2883"><span data-dcnode-id="2884" instrument_node="">Pruning fruit tree suckers</span></h3><span data-dcnode-id="2882" instrument_node="">
</span><p data-dcnode-id="2880"><span data-dcnode-id="2881" instrument_node="">Most fruit trees are grafted trees – excellent fruiting varieties grafted on the top of a rootstock known to grow vigorously and strongly.</span></p><span data-dcnode-id="2879" instrument_node="">
</span><p data-dcnode-id="2877"><span data-dcnode-id="2878" instrument_node="">Sometimes, even if the graft is successful, shoots are sent up from the rootstock – these are called suckers. Cut these suckers off as close as possible to the central leader, to prevent them taking over or stealing nutrients.</span></p><span data-dcnode-id="2876" instrument_node="">
</span><h2 data-dcnode-id="2874"><span data-dcnode-id="2875" instrument_node="">The must-have tools for pruning fruit trees</span></h2><span data-dcnode-id="2873" instrument_node="">
</span><p data-dcnode-id="2871"><span data-dcnode-id="2872" instrument_node="">If you have fruit trees then you will need a few key pruning tools – or borrow them from a neighbour or your local tool library (if your area has one).</span></p><span data-dcnode-id="2870" instrument_node="">
</span><p data-dcnode-id="2866"><strong data-dcnode-id="2868"><span data-dcnode-id="2869" instrument_node="">Secateurs: </span></strong><span data-dcnode-id="2867" instrument_node="">use these only for small cuts. You will break them if you use them on bigger cuts, or you may damage the stem you are cutting if it is too large.</span></p><span data-dcnode-id="2865" instrument_node="">
</span><p data-dcnode-id="2861"><strong data-dcnode-id="2863"><span data-dcnode-id="2864" instrument_node="">Loppers:</span></strong><span data-dcnode-id="2862" instrument_node=""> excellent for bigger stems, with long handles for extra grip and force.</span></p><span data-dcnode-id="2860" instrument_node="">
</span><p data-dcnode-id="2856"><strong data-dcnode-id="2858"><span data-dcnode-id="2859" instrument_node="">Pruning saw: </span></strong><span data-dcnode-id="2857" instrument_node="">for extra-large branches or difficult-to-access branches.</span></p><span data-dcnode-id="2855" instrument_node="">
</span><p data-dcnode-id="2851"><strong data-dcnode-id="2853"><span data-dcnode-id="2854" instrument_node="">Pruning knife: </span></strong><span data-dcnode-id="2852" instrument_node="">for cleaning bad cuts. These allow you to scrape back tree cuts that did not produce a clean crisp edge.</span></p><span data-dcnode-id="2850" instrument_node="">
</span><figure class="wp-block-image size-large" data-dcnode-id="2838"><div class="essb-pin wp-image-65154 essb-pinid-7" data-dcnode-id="2841"><img alt="Tools of the trade: loppers to the left, secateurs with red handles, pruning saw." class="pin-generated" data-dcnode-id="2849" height="666" loading="lazy" sizes="(max-width: 1000px) 100vw, 1000px" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.milkwood.net/wp-content/uploads/2021/05/Pruning-Article-8-of-12.jpg&amp;raw" srcset="https://www.milkwood.net/wp-content/uploads/2021/05/Pruning-Article-8-of-12.jpg 1000w, https://www.milkwood.net/wp-content/uploads/2021/05/Pruning-Article-8-of-12-768x511.jpg 768w, https://www.milkwood.net/wp-content/uploads/2021/05/Pruning-Article-8-of-12-400x266.jpg 400w" style="" width="1000"><div class="essb_links essb_displayed_pinimage essb_template_big-retina essb_icon_animation13 essb_pos_top-left essb_mobilepos_below essb_l2dqvf0h" data-dcnode-id="2842" data-essb-instance="l2dqvf0h" data-essb-position="pinit" data-essb-postid="65112"><ul class="essb_links_list" data-dcnode-id="2843"><li class="essb_item essb_link_pinterest nolightbox" data-dcnode-id="2844"><a class="nolightbox" data-dcnode-id="2845" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//pinterest.com/pin/create/button/%3Furl%3Dhttps%3A//www.milkwood.net/2021/05/04/fruit-tree-pruning-guide/%26is_video%3Dfalse%26media%3Dhttps%3A//www.milkwood.net/wp-content/uploads/2021/05/Pruning-Article-8-of-12.jpg%26description%3DTools%2520of%2520the%2520trade%253A%2520loppers%2520to%2520the%2520left%252C%2520secateurs%2520with%2520red%2520handles%252C%2520pruning%2520saw." onclick="essb.window('https://pinterest.com/pin/create/button/?url=https://www.milkwood.net/2021/05/04/fruit-tree-pruning-guide/&amp;is_video=false&amp;media=https://www.milkwood.net/wp-content/uploads/2021/05/Pruning-Article-8-of-12.jpg&amp;description=Tools%20of%20the%20trade%3A%20loppers%20to%20the%20left%2C%20secateurs%20with%20red%20handles%2C%20pruning%20saw.','pinpro','l2dqvf0h'); return false;" rel="noreferrer noopener nofollow" target="_blank"><span class="essb_icon essb_icon_pinterest" data-dcnode-id="2848"></span><span class="essb_network_name" data-dcnode-id="2846"><span data-dcnode-id="2847" instrument_node="">Pin</span></span></a></li></ul></div></div><figcaption data-dcnode-id="2839"><span data-dcnode-id="2840" instrument_node="">Tools of the trade: loppers to the left, secateurs with red handles, pruning saw.</span></figcaption></figure><span data-dcnode-id="2837" instrument_node="">
</span><h2 data-dcnode-id="2835"><span data-dcnode-id="2836" instrument_node="">Questions to ask yourself before making any cuts</span></h2><span data-dcnode-id="2834" instrument_node="">
</span><p data-dcnode-id="2832"><span data-dcnode-id="2833" instrument_node="">So – you’ve bought your first bare-rooted fruit tree, or a fruit tree in a pot, or you have access to an established tree. Hooray.</span></p><span data-dcnode-id="2831" instrument_node="">
</span><p data-dcnode-id="2829"><span data-dcnode-id="2830" instrument_node="">Before you start lopping away, you will benefit from considering the following:</span></p><span data-dcnode-id="2828" instrument_node="">
</span><ul data-dcnode-id="2805"><li data-dcnode-id="2826"><span data-dcnode-id="2827" instrument_node="">Identify the tree, if you didn’t buy it yourself.</span></li><li data-dcnode-id="2824"><span data-dcnode-id="2825" instrument_node="">Find out how old the tree is by looking for growth marks.</span></li><li data-dcnode-id="2822"><span data-dcnode-id="2823" instrument_node="">If you’re buying a young tree, ask if it has been pruned at point of sale or if you need to prune before planting.</span></li><li data-dcnode-id="2820"><span data-dcnode-id="2821" instrument_node="">Find out in which year it bares fruit (first, second, third, fifth).</span></li><li data-dcnode-id="2818"><span data-dcnode-id="2819" instrument_node="">Does it produce fruit on new-season growth?</span></li><li data-dcnode-id="2816"><span data-dcnode-id="2817" instrument_node="">Is a tip bearer or spur bearer? Or does it produce fruiting buds as opposed to spurs?</span></li><li data-dcnode-id="2814"><span data-dcnode-id="2815" instrument_node="">Is it a dwarf fruit tree?</span></li><li data-dcnode-id="2812"><span data-dcnode-id="2813" instrument_node="">Does it need a second tree from the same species to pollinate fruit?</span></li><li data-dcnode-id="2810"><span data-dcnode-id="2811" instrument_node="">What shape best suits that tree and the climate it will grow in?</span></li><li data-dcnode-id="2808"><span data-dcnode-id="2809" instrument_node="">Do you want the tree for fruiting purposes only or to create shade and beauty in the garden?</span></li><li data-dcnode-id="2806"><span data-dcnode-id="2807" instrument_node="">If it’s a mature tree, does it need a major pruning rejuvenation?&nbsp;&nbsp;</span></li></ul><span data-dcnode-id="2804" instrument_node="">
</span><p data-dcnode-id="2802"><span data-dcnode-id="2803" instrument_node="">The answers to these questions will help ensure you make cuts that are just right for a bigger and better fruit harvest, healthier and more beautiful trees, and more resilience for you.</span></p><span data-dcnode-id="2801" instrument_node="">
</span><div class="wp-block-image" data-dcnode-id="2790"><figure class="aligncenter size-full" data-dcnode-id="2791"><div class="essb-pin wp-image-65341 essb-pinid-8" data-dcnode-id="2792"><img alt="" class="pin-generated" data-dcnode-id="2800" height="666" loading="lazy" sizes="(max-width: 1000px) 100vw, 1000px" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.milkwood.net/wp-content/uploads/2021/05/pruning-2.jpg&amp;raw" srcset="https://www.milkwood.net/wp-content/uploads/2021/05/pruning-2.jpg 1000w, https://www.milkwood.net/wp-content/uploads/2021/05/pruning-2-768x511.jpg 768w, https://www.milkwood.net/wp-content/uploads/2021/05/pruning-2-400x266.jpg 400w" style="" width="1000"><div class="essb_links essb_displayed_pinimage essb_template_big-retina essb_icon_animation13 essb_pos_top-left essb_mobilepos_below essb_l2dqvf0m" data-dcnode-id="2793" data-essb-instance="l2dqvf0m" data-essb-position="pinit" data-essb-postid="65112"><ul class="essb_links_list" data-dcnode-id="2794"><li class="essb_item essb_link_pinterest nolightbox" data-dcnode-id="2795"><a class="nolightbox" data-dcnode-id="2796" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//pinterest.com/pin/create/button/%3Furl%3Dhttps%3A//www.milkwood.net/2021/05/04/fruit-tree-pruning-guide/%26is_video%3Dfalse%26media%3Dhttps%3A//www.milkwood.net/wp-content/uploads/2021/05/pruning-2.jpg%26description%3DFruit%2520Tree%2520Pruning%2520Guide%253A%2520How%2520to%2520Prune%2520in%2520Winter%2520%2526%2520Summer%252C%2520too%2520%257C%2520Milkwood" onclick="essb.window('https://pinterest.com/pin/create/button/?url=https://www.milkwood.net/2021/05/04/fruit-tree-pruning-guide/&amp;is_video=false&amp;media=https://www.milkwood.net/wp-content/uploads/2021/05/pruning-2.jpg&amp;description=Fruit%20Tree%20Pruning%20Guide%3A%20How%20to%20Prune%20in%20Winter%20%26%20Summer%2C%20too%20%7C%20Milkwood','pinpro','l2dqvf0m'); return false;" rel="noreferrer noopener nofollow" target="_blank"><span class="essb_icon essb_icon_pinterest" data-dcnode-id="2799"></span><span class="essb_network_name" data-dcnode-id="2797"><span data-dcnode-id="2798" instrument_node="">Pin</span></span></a></li></ul></div></div></figure></div><span data-dcnode-id="2789" instrument_node="">

</span><p data-dcnode-id="1031"><span data-dcnode-id="1032" instrument_node="">Informative article. Thank you for adding to my pruning education. We purchased land with a mature pear tree. The tree had been neglected for many years. I learned I need to spread the heavy pruning over several years to not shock and kill the tree. Last winter we cut the suckers, dead/damaged branches, and a few of the internal crossing branches. This spring the tree appears to be healthy. Fingers crossed that we bring the tree to its full glory over the next few years.</span></p><span data-dcnode-id="1030" instrument_node="">
