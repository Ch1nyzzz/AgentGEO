</span><p data-dcnode-id="1052"><span data-dcnode-id="1053" instrument_node="">Pine trees are one of the hardiest types of trees. They have a naturally beautiful shape that rarely needs pruning.</span></p><span data-dcnode-id="1051" instrument_node="">
</span><p data-dcnode-id="1049"><span data-dcnode-id="1050" instrument_node="">There are some considerations if you have a few pine trees on your land, or want to do more to influence the shape, size, and health of your trees.</span></p><span data-dcnode-id="1048" instrument_node="">
</span><p data-dcnode-id="1046"><span data-dcnode-id="1047" id="more-6044"></span></p><span data-dcnode-id="1045" instrument_node="">
</span><h2 data-dcnode-id="1043"><span data-dcnode-id="1044" instrument_node="">When And How to Prune Pine Trees</span></h2><span data-dcnode-id="1042" instrument_node="">
</span><p data-dcnode-id="1040"><span data-dcnode-id="1041" instrument_node="">Pine trees are nature’s answer to green even in some of the earth’s coldest climates. Do you know there is a ring of evergreen trees around the whole earth, like a crown? They grow on every continent at high altitudes and cool climates. If you live in a cool climate, you appreciate your evergreen trees even more in the winter.</span></p><span data-dcnode-id="1039" instrument_node="">
</span><p data-dcnode-id="1037"><span data-dcnode-id="1038" instrument_node="">If you have a large yard or acreage where it doesn’t matter how big or tall your pine trees get, you may never need to prune. Pine trees naturally grow in a pleasing shape.</span></p><span data-dcnode-id="1036" instrument_node="">
</span><p data-dcnode-id="1034"><span data-dcnode-id="1035" instrument_node="">However, there are some reasons to prune a pine tree.</span></p><span data-dcnode-id="1033" instrument_node="">

</span><div align="center" class="col" data-dcnode-id="924" id="roots-2"><a class="btn" data-dcnode-id="925" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.rootwell.com/retail-store"><span data-dcnode-id="926" instrument_node="">Retail Shop</span></a></div><span data-dcnode-id="923" instrument_node="">
</span></div><span data-dcnode-id="921" instrument_node="">
</span></div><span data-dcnode-id="919" instrument_node="">
</span><h2 data-dcnode-id="917"><span data-dcnode-id="918" instrument_node="">Storm or Human Damage</span></h2><span data-dcnode-id="916" instrument_node="">
</span><p data-dcnode-id="914"><span data-dcnode-id="915" instrument_node="">Pine trees can sustain damage after storms just like any other tree. You will want to safely remove any broken limbs that occur as soon as you can after the damage. It is best if this can be avoided in the late summer or early fall to give your tree a chance to scab over before cold weather hits. However, sometimes it can’t be avoided.</span></p><span data-dcnode-id="913" instrument_node="">
</span><p data-dcnode-id="911"><span data-dcnode-id="912" instrument_node="">Sadly, people can also treat trees like it won’t hurt them to tear off limbs and sticks. It is best to remove a wounded branch at the collar. The collar is the place where a branch joins the main trunk of the tree. It is slightly wider than the rest of the branch.</span></p><span data-dcnode-id="910" instrument_node="">
</span><p data-dcnode-id="908"><span data-dcnode-id="909" instrument_node="">This is preferable to merely trimming the length of branches, as that will result in a stunted-looking tree over time.</span></p><span data-dcnode-id="907" instrument_node="">
</span><p data-dcnode-id="905"><span data-dcnode-id="906" instrument_node="">There is another method to control the growth of the branches and make it more compact. First, the right way to cut a branch off at the collar is to first make a cut up from the bottom of the branch about a foot away from the trunk, then move out another inch or so and cut all the way through from top to bottom.</span></p><span data-dcnode-id="904" instrument_node="">
</span><p data-dcnode-id="902"><span data-dcnode-id="903" instrument_node="">After the rest of the limb has been removed, cut the stub flush with the collar. This method prevents you from peeling bark from the trunk along with the wounded limb.</span></p><span data-dcnode-id="901" instrument_node="">
</span><h2 data-dcnode-id="899"><span data-dcnode-id="900" instrument_node="">Branch Rubbing</span></h2><span data-dcnode-id="898" instrument_node="">
</span><p data-dcnode-id="896"><span data-dcnode-id="897" instrument_node="">Pine trees rarely have branches that rub each other, but when they do, one of the branches should be removed. Constant rubbing makes way for pests and diseases when the protective layer of bark is rubbed away.</span></p><span data-dcnode-id="895" instrument_node="">
</span><h2 data-dcnode-id="893"><span data-dcnode-id="894" instrument_node="">Candling</span></h2><span data-dcnode-id="892" instrument_node="">
</span><p data-dcnode-id="890"><span data-dcnode-id="891" instrument_node="">You can make a pine look more dense and lush over time as it grows by pinching back the new growth tips – or candles – in the spring. Just break them off in the middle by hand instead of with shears. Shears can cut needles making them turn brown.</span></p><span data-dcnode-id="889" instrument_node="">
</span><h2 data-dcnode-id="887"><span data-dcnode-id="888" instrument_node="">Diseased Pine Trees</span></h2><span data-dcnode-id="886" instrument_node="">
</span><p data-dcnode-id="884"><span data-dcnode-id="885" instrument_node="">The one thing we don’t expect is to see brown, dry needles on our pine trees at any time of year. If you are seeing brown needles, you need to diagnose the problem.</span></p><span data-dcnode-id="883" instrument_node="">
</span><p data-dcnode-id="881"><span data-dcnode-id="882" instrument_node="">What season is it? What part of the tree is affected?</span></p><span data-dcnode-id="880" instrument_node="">
</span><p data-dcnode-id="878"><span data-dcnode-id="879" instrument_node="">All pine trees have a shedding period. If it is fall, this is normal. All pines have an annual drop.</span></p><span data-dcnode-id="877" instrument_node="">
</span><p data-dcnode-id="875"><span data-dcnode-id="876" instrument_node="">If, however, it is not the fall and you have a dead lower half, it is not normal and something probably needs to be done for the tree.</span></p><span data-dcnode-id="874" instrument_node="">
</span><p data-dcnode-id="872"><span data-dcnode-id="873" instrument_node="">Here are some common things that can cause pine trees to do this:</span></p><span data-dcnode-id="871" instrument_node="">
</span><div data-dcnode-id="844" id="norm"><span data-dcnode-id="870" instrument_node="">
</span><ul data-dcnode-id="846"><span data-dcnode-id="869" instrument_node="">
</span><li data-dcnode-id="865"><strong data-dcnode-id="867"><span data-dcnode-id="868" instrument_node="">Need for more sun</span></strong><span data-dcnode-id="866" instrument_node=""> – If there are lower branches that aren’t getting enough sunlight, they might react this way. You may want to trim nearby shade trees or anything surrounding the bottom of the pine so the lower branches can have access to sunlight.</span></li><span data-dcnode-id="864" instrument_node="">
</span><li data-dcnode-id="858"><strong data-dcnode-id="862"><span data-dcnode-id="863" instrument_node="">Lack of water</span></strong><span data-dcnode-id="861" instrument_node=""> – The tree could be prioritizing the life of the tree over the life of the lower branches because it isn’t getting enough water. If you suspect this is the case, consider installing a </span><a data-dcnode-id="859" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.rootwell.com/deep-root-systems"><span data-dcnode-id="860" instrument_node="">deep root watering system.</span></a></li><span data-dcnode-id="857" instrument_node="">
</span><li data-dcnode-id="853"><strong data-dcnode-id="855"><span data-dcnode-id="856" instrument_node="">Salt de-icer</span></strong><span data-dcnode-id="854" instrument_node=""> – Salt as a de-icer on your driveway can kill your trees. The bottom branches can be harmed by your salty driveway, where they are exposed to it all winter. Stop using salt on your driveway if you suspect this is the cause.</span></li><span data-dcnode-id="852" instrument_node="">
</span><li data-dcnode-id="848"><strong data-dcnode-id="850"><span data-dcnode-id="851" instrument_node="">Disease </span></strong><span data-dcnode-id="849" instrument_node="">– Lower branches dying might also be a fungal disease. Sphaeropsis tip blight starts at the tips, but eventually, the lower branches die. Clip out diseased sections when this happens and spray a fungicide in spring. Keep spraying until the new needles are fully grown.</span></li><span data-dcnode-id="847" instrument_node="">
</span></ul><span data-dcnode-id="845" instrument_node="">
</span></div><span data-dcnode-id="843" instrument_node="">

</span><h2 data-dcnode-id="828"><span data-dcnode-id="829" instrument_node="">When to Fell Pine Trees</span></h2><span data-dcnode-id="827" instrument_node="">
</span><p data-dcnode-id="825"><span data-dcnode-id="826" instrument_node="">It is never easy to decide to cut down a tree. After all, they have been around for so many years by the time you have to consider cutting one down.</span></p><span data-dcnode-id="824" instrument_node="">
</span><p data-dcnode-id="822"><span data-dcnode-id="823" instrument_node="">But they do, sometimes, need to be felled for the safety of people and buildings.</span></p><span data-dcnode-id="821" instrument_node="">
</span><p data-dcnode-id="819"><span data-dcnode-id="820" instrument_node="">There are also a few other things to consider as you’re wondering if your tree can be saved, or if you want to keep it:</span></p><span data-dcnode-id="818" instrument_node="">
</span><h2 data-dcnode-id="816"><span data-dcnode-id="817" instrument_node="">Is your tree healthy?</span></h2><span data-dcnode-id="815" instrument_node="">
</span><p data-dcnode-id="813"><span data-dcnode-id="814" instrument_node="">If you have a tree that is damaged over 50% of its body, it should probably be cut down. It would continue to survive, but it won’t ever come back to health.</span></p><span data-dcnode-id="812" instrument_node="">

</span><h2 data-dcnode-id="696"><span data-dcnode-id="697" instrument_node="">Is the trunk damaged?</span></h2><span data-dcnode-id="695" instrument_node="">
</span><p data-dcnode-id="693"><span data-dcnode-id="694" instrument_node="">If you see vertical cracks, seams, dead branch stubs, large old wounds or anything like that, it probably means the tree is suffering internally as well. Severe enough damage to the trunk – over 25% of the circumference of the trunk – probably means the tree should be cut down. If it’s less than that, the tree will eventually heal itself.</span></p><span data-dcnode-id="692" instrument_node="">
</span><h2 data-dcnode-id="690"><span data-dcnode-id="691" instrument_node="">Is it hollow?</span></h2><span data-dcnode-id="689" instrument_node="">
</span><p data-dcnode-id="687"><span data-dcnode-id="688" instrument_node="">Hollow trees can actually live for a long time. The living tissue of the tree is actually just below the bark, not in the middle. However, a hollow trunk can make a tree weak and dangerous in storms. If ⅓ of the interior is hollow or rotten, the tree should come down.</span></p><span data-dcnode-id="686" instrument_node="">
</span><h2 data-dcnode-id="684"><span data-dcnode-id="685" instrument_node="">Are there dead branches?</span></h2><span data-dcnode-id="683" instrument_node="">
</span><p data-dcnode-id="681"><span data-dcnode-id="682" instrument_node="">Trees with their tops broken, who have large damaged limbs, or have dead branches all on one side, causing them to be lopsided, are all a hazard to people. If over 25% of the branches are damaged, it needs to be removed.</span></p><span data-dcnode-id="680" instrument_node="">
</span><h2 data-dcnode-id="678"><span data-dcnode-id="679" instrument_node="">Does your tree have sprouts coming from the base or small branches coming from the trunk?</span></h2><span data-dcnode-id="677" instrument_node="">
</span><p data-dcnode-id="675"><span data-dcnode-id="676" instrument_node="">Trees do not normally grow this way. It is a sign of severe stress. Trees that do this have probably experienced injury – usually related to home construction – or have been over-exposed to sunlight due to forest thinning.</span></p><span data-dcnode-id="674" instrument_node="">
</span><p data-dcnode-id="672"><span data-dcnode-id="673" instrument_node="">Sometimes soil compaction can cause this. A professional arborist needs to evaluate this tree to see if it can be brought back to health. Otherwise, it is a danger and needs to come down. If over 50% of a tree’s root system has been damaged due to construction, it needs to come down.</span></p><span data-dcnode-id="671" instrument_node="">
</span><h2 data-dcnode-id="669"><span data-dcnode-id="670" instrument_node="">Is there trunk rot or large fungus near the base?</span></h2><span data-dcnode-id="668" instrument_node="">
</span><p data-dcnode-id="666"><span data-dcnode-id="667" instrument_node="">Sometimes mushrooms and trees go hand in hand. However, if a fungus is growing on the tree itself, it could be an indication of internal rot.</span></p><span data-dcnode-id="665" instrument_node="">
</span><h2 data-dcnode-id="663"><span data-dcnode-id="664" instrument_node="">Is the tree leaning?</span></h2><span data-dcnode-id="662" instrument_node="">
</span><p data-dcnode-id="660"><span data-dcnode-id="661" instrument_node="">Sudden leaning means the tree has had a breakage or weakening of its roots. A tree that has grown leaning – more than 15% off from vertical – has a higher chance of falling and should probably be taken down.</span></p><span data-dcnode-id="659" instrument_node="">
</span><h2 data-dcnode-id="657"><span data-dcnode-id="658" instrument_node="">Special considerations:</span></h2><span data-dcnode-id="656" instrument_node="">
</span><div data-dcnode-id="627" id="norm"><span data-dcnode-id="655" instrument_node="">
</span><ul data-dcnode-id="629"><span data-dcnode-id="654" instrument_node="">
</span><li data-dcnode-id="647"><strong data-dcnode-id="652"><span data-dcnode-id="653" instrument_node="">&nbsp;</span></strong><strong data-dcnode-id="650"><span data-dcnode-id="651" instrument_node="">Is the tree under power lines?</span></strong><br data-dcnode-id="649"><span data-dcnode-id="648" instrument_node="">
Electricity can arc up to 10 feet to wet foliage and cause damage to buildings or power failure.</span></li><span data-dcnode-id="646" instrument_node="">
</span><li data-dcnode-id="641"><strong data-dcnode-id="644"><span data-dcnode-id="645" instrument_node="">What is the tree’s environment? </span></strong><br data-dcnode-id="643"><span data-dcnode-id="642" instrument_node="">
If it’s trying to grow in a rocky place or on a ledge or near a body of water it will have a shallow root system.</span></li><span data-dcnode-id="640" instrument_node="">
</span><li data-dcnode-id="631"><strong data-dcnode-id="638"><span data-dcnode-id="639" instrument_node="">How much space is there for the tree to grow?</span></strong><br data-dcnode-id="637"><span data-dcnode-id="636" instrument_node="">
You shouldn’t plant a tree so that it will hang over your house, and only plant a tree that will mature at a height that works for your property.</span><p data-dcnode-id="635"></p><span data-dcnode-id="634" instrument_node="">
</span><p data-dcnode-id="632"><span data-dcnode-id="633" instrument_node="">Large trees should be at least 20 feet from your house. Remember the root system will grow as deep and wide as the trunk is tall and the branches are wide. In addition, roots eventually break through rock and any hard obstacle they encounter under the ground.</span></p></li><span data-dcnode-id="630" instrument_node="">
</span></ul><span data-dcnode-id="628" instrument_node="">
</span></div><span data-dcnode-id="626" instrument_node="">
</span><h3 data-dcnode-id="624"><span data-dcnode-id="625" instrument_node="">Takeaway</span></h3><span data-dcnode-id="623" instrument_node="">
</span><p data-dcnode-id="621"><span data-dcnode-id="622" instrument_node="">Pine trees are some of nature’s most beautiful giants. Care for yours well and it will bring your winter days cheer for years to come.</span></p><span data-dcnode-id="620" instrument_node="">
