</span><p class="ml-3" data-dcnode-id="440"><span data-dcnode-id="444" instrument_node="">
</span><a data-dcnode-id="442" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.somersetwestandtaunton.gov.uk/elections-and-voting/elections-2022/"><span data-dcnode-id="443" instrument_node="">

</span><div data-dcnode-id="135"><span data-dcnode-id="435" instrument_node="">
</span><div class="container" data-dcnode-id="137"><span data-dcnode-id="434" instrument_node="">
</span><div class="row clearfix" data-dcnode-id="139"><span data-dcnode-id="433" instrument_node="">
</span><div class="col-md-9 column" data-dcnode-id="239"><span data-dcnode-id="432" instrument_node="">
</span><div data-dcnode-id="241"><span data-dcnode-id="431" instrument_node="">
</span><h1 class="text-black" data-dcnode-id="429"><span data-dcnode-id="430" instrument_node="">Trees</span></h1><span data-dcnode-id="428" instrument_node="">
</span><p data-dcnode-id="426"><span data-dcnode-id="427" instrument_node="">The council is responsible for managing a significant number of trees within the district of Somerset West and Taunton. The overall tree population is over 16,000 in car parks, parks and open spaces and housing amenity land.</span></p><span data-dcnode-id="425" instrument_node="">
</span><p data-dcnode-id="423"><span data-dcnode-id="424" instrument_node="">The Council employs a team of tree surgeons who maintain the trees across land that is owned or maintained by the Council.</span></p><span data-dcnode-id="422" instrument_node="">
</span><p data-dcnode-id="420"><span data-dcnode-id="421" instrument_node="">The Council has direct responsibility for the maintenance of trees:</span></p><span data-dcnode-id="419" instrument_node="">
</span><h2 data-dcnode-id="417"><span data-dcnode-id="418" instrument_node="">Tree Maintenance</span></h2><span data-dcnode-id="416" instrument_node="">
</span><p data-dcnode-id="414"><span data-dcnode-id="415" instrument_node="">Somerset West and Taunton Council will carry out tree maintenance works for the following reasons only:</span></p><span data-dcnode-id="413" instrument_node="">
</span><p data-dcnode-id="411"><span data-dcnode-id="412" instrument_node="">To reduce the risk of injury to persons.</span></p><span data-dcnode-id="410" instrument_node="">
</span><ul data-dcnode-id="402"><span data-dcnode-id="409" instrument_node="">
</span><li data-dcnode-id="407"><span data-dcnode-id="408" instrument_node="">To reduce the risk of damage to property</span></li><span data-dcnode-id="406" instrument_node="">
</span><li data-dcnode-id="404"><span data-dcnode-id="405" instrument_node="">To comply with legal obligations</span></li><span data-dcnode-id="403" instrument_node="">
</span></ul><span data-dcnode-id="401" instrument_node="">
</span><p data-dcnode-id="399"><span data-dcnode-id="400" instrument_node="">Tree works will not be undertaken in the following circumstances:</span></p><span data-dcnode-id="398" instrument_node="">
</span><ul data-dcnode-id="354"><span data-dcnode-id="397" instrument_node="">
</span><li data-dcnode-id="395"><span data-dcnode-id="396" instrument_node="">To improve television or internet signals.</span></li><span data-dcnode-id="394" instrument_node="">
</span><li data-dcnode-id="392"><span data-dcnode-id="393" instrument_node="">To improve the view.</span></li><span data-dcnode-id="391" instrument_node="">
</span><li data-dcnode-id="389"><span data-dcnode-id="390" instrument_node="">To improve the energy capture of solar panels.</span></li><span data-dcnode-id="388" instrument_node="">
</span><li data-dcnode-id="386"><span data-dcnode-id="387" instrument_node="">To allow more light into properties.</span></li><span data-dcnode-id="385" instrument_node="">
</span><li data-dcnode-id="383"><span data-dcnode-id="384" instrument_node="">Due to nuisance caused by honeydew from aphids.</span></li><span data-dcnode-id="382" instrument_node="">
</span><li data-dcnode-id="380"><span data-dcnode-id="381" instrument_node="">Due to nuisance caused by falling leaves, flowers or fruit.</span></li><span data-dcnode-id="379" instrument_node="">
</span><li data-dcnode-id="377"><span data-dcnode-id="378" instrument_node="">Due to nuisance caused by pollen.</span></li><span data-dcnode-id="376" instrument_node="">
</span><li data-dcnode-id="374"><span data-dcnode-id="375" instrument_node="">Due to nuisance caused by bird droppings.</span></li><span data-dcnode-id="373" instrument_node="">
</span><li data-dcnode-id="371"><span data-dcnode-id="372" instrument_node="">Due to minor structural damage to non-supporting structures such as garden walls.</span></li><span data-dcnode-id="370" instrument_node="">
</span><li data-dcnode-id="368"><span data-dcnode-id="369" instrument_node="">Fears that they may damage a building or surface with no evidence</span></li><span data-dcnode-id="367" instrument_node="">
</span><li data-dcnode-id="365"><span data-dcnode-id="366" instrument_node="">Where tree roots have entered sewers (tree roots rarely break drains, but roots will enter a broken or damaged drain).</span></li><span data-dcnode-id="364" instrument_node="">
</span><li data-dcnode-id="362"><span data-dcnode-id="363" instrument_node="">To allow the construction of a new access or driveway to a property.</span></li><span data-dcnode-id="361" instrument_node="">
</span><li data-dcnode-id="359"><span data-dcnode-id="360" instrument_node="">If the tree is considered by a member of the public to be too big or too tall.</span></li><span data-dcnode-id="358" instrument_node="">
</span><li data-dcnode-id="356"><span data-dcnode-id="357" instrument_node="">Because they overhang an adjacent property, where no damage is likely (each case is assessed individually)</span></li><span data-dcnode-id="355" instrument_node="">
</span></ul><span data-dcnode-id="353" instrument_node="">
</span><p data-dcnode-id="351"><span data-dcnode-id="352" instrument_node="">There are also times that the Council will not undertake tree work, such as whilst the tree or hedge is in flower, and during bird nesting season.</span></p><span data-dcnode-id="350" instrument_node="">
</span><p data-dcnode-id="348"><span data-dcnode-id="349" instrument_node="">We also reserve the right to treat each tree request on a case-by-case basis. It may be that there are other circumstances in which influence our decision to maintain or fell a tree that are conflicting with this policy.</span></p><span data-dcnode-id="347" instrument_node="">
</span><p data-dcnode-id="345"><span data-dcnode-id="346" instrument_node="">Sometimes trees have to be felled due to safety, age or health. As part of the Council’s commitment to tackling climate change and supporting nature recovery, we have committed to planting three trees for every one we fell. We also leave felled trees and stumps in situ wherever possible to create vital habitat for insects.</span></p><span data-dcnode-id="344" instrument_node="">
</span><h3 class="text-black pb-2" data-dcnode-id="342"><span data-dcnode-id="343" instrument_node="">Report a problem</span></h3><span data-dcnode-id="341" instrument_node="">
</span><p data-dcnode-id="336"><span data-dcnode-id="340" instrument_node="">To report a non urgent problem with a council owned tree, fill out the online </span><a data-dcnode-id="338" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//my.somersetwestandtaunton.gov.uk/en/service/Tree__hedge_or_grass_problem" title="Tree, hedge or grass problem"><span data-dcnode-id="339" instrument_node="">tree, hedge or grass problem</span></a><span data-dcnode-id="337" instrument_node=""> form.</span></p><span data-dcnode-id="335" instrument_node="">
</span><p data-dcnode-id="330"><span data-dcnode-id="334" instrument_node="">To report a tree related emergency out of hours, call us on </span><a data-dcnode-id="332" href="tel:03003048000" title="General enquiries phone line"><span data-dcnode-id="333" instrument_node="">0300 304 8000</span></a><span data-dcnode-id="331" instrument_node="">.</span></p><span data-dcnode-id="329" instrument_node="">
</span><h4 class="text-black pb-2" data-dcnode-id="327"><span data-dcnode-id="328" instrument_node="">Common Law Right</span></h4><span data-dcnode-id="326" instrument_node="">
</span><p data-dcnode-id="324"><span data-dcnode-id="325" instrument_node="">If trees are causing a nuisance to you or your property, you have a Common Law right to prune them. If you wish to undertake pruning works to a tree under Common Law, we ask that you take note of the following advice.</span></p><span data-dcnode-id="323" instrument_node="">
</span><ol data-dcnode-id="300"><span data-dcnode-id="322" instrument_node="">
</span><li data-dcnode-id="320"><span data-dcnode-id="321" instrument_node="">You can only remove parts of a tree from the point where they cross the boundary of your property. You have no legal right to cut or remove any part of a tree that does not overhang your property.</span></li><span data-dcnode-id="319" instrument_node="">
</span><li data-dcnode-id="314"><span data-dcnode-id="318" instrument_node="">You are strongly advised to consult an </span><a data-dcnode-id="316" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.trees.org.uk/" title="Arboricultural Association"><span data-dcnode-id="317" instrument_node="">Arboricultural Association Registered tree surgeon</span></a><span data-dcnode-id="315" instrument_node=""> for guidance on how best to prune back encroaching trees, unless the works are small enough to do with hand secateurs or similar.</span></li><span data-dcnode-id="313" instrument_node="">
</span><li data-dcnode-id="305"><span data-dcnode-id="312" instrument_node="">Before you consider doing any works to a tree(s) you should find out if it is protected by a Tree Preservation Order or whether the tree is in a Conservation Area. If the trees are protected, you will need to gain permission for the works from the Council. To find out if a tree has a Tree Preservation Order and how to apply for permission to work on a tree, please visit our </span><a data-dcnode-id="310" data-udi="umb://document/88bf8a2dce68491b9e6f36cbfc7238d2" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.somersetwestandtaunton.gov.uk/planning/trees-and-tree-protection/" title="Trees and tree protection"><span data-dcnode-id="311" instrument_node="">trees and tree protection</span></a><span data-dcnode-id="309" instrument_node=""> page or call the Council on </span><a data-dcnode-id="307" href="tel:0300%20304%208000" title="03003048000"><span data-dcnode-id="308" instrument_node="">0300 304 8000</span></a><span data-dcnode-id="306" instrument_node="">.</span></li><span data-dcnode-id="304" instrument_node="">
</span><li data-dcnode-id="302"><span data-dcnode-id="303" instrument_node="">You are advised to discuss with your neighbour your intention to prune overhanging branches. If you use your Common Law right to prune back a council owned tree, we ask that you dispose of the branches yourself in a responsible way and do not leave them on Council land.</span></li><span data-dcnode-id="301" instrument_node="">
</span></ol><span data-dcnode-id="299" instrument_node="">
</span><h4 data-dcnode-id="297"><span data-dcnode-id="298" instrument_node="">Tree Inspections</span></h4><span data-dcnode-id="296" instrument_node="">
</span><p data-dcnode-id="294"><span data-dcnode-id="295" instrument_node="">Trees owned by us are inspected for safety on a cycle between 1 and 5 years according to the level of public use in the area surrounding the tree. Inspections are carried out to check whether any works are needed to make our trees safe.</span></p><span data-dcnode-id="293" instrument_node="">
</span><p data-dcnode-id="291"><span data-dcnode-id="292" instrument_node="">If our trees pose a danger to people or properties we will carry out emergency works within 24 hours of the report, or necessary works within 18 months, if the tree does not pose an imminent danger.</span></p><span data-dcnode-id="290" instrument_node="">
</span><p data-dcnode-id="288"><span data-dcnode-id="289" instrument_node="">A tree poses imminent danger if it:</span></p><span data-dcnode-id="287" instrument_node="">
</span><ul data-dcnode-id="267"><span data-dcnode-id="286" instrument_node="">
</span><li data-dcnode-id="284"><span data-dcnode-id="285" instrument_node="">has snapped or blown over</span></li><span data-dcnode-id="283" instrument_node="">
</span><li data-dcnode-id="281"><span data-dcnode-id="282" instrument_node="">is rocking at its base / roots are damaged</span></li><span data-dcnode-id="280" instrument_node="">
</span><li data-dcnode-id="278"><span data-dcnode-id="279" instrument_node="">is uprooted but held by another tree or building</span></li><span data-dcnode-id="277" instrument_node="">
</span><li data-dcnode-id="275"><span data-dcnode-id="276" instrument_node="">has a large branch that has broken off or is hanging off the tree</span></li><span data-dcnode-id="274" instrument_node="">
</span><li data-dcnode-id="272"><span data-dcnode-id="273" instrument_node="">is blocking the road, footpath or access to a property</span></li><span data-dcnode-id="271" instrument_node="">
</span><li data-dcnode-id="269"><span data-dcnode-id="270" instrument_node="">has fallen onto a house or car</span></li><span data-dcnode-id="268" instrument_node="">
</span></ul><span data-dcnode-id="266" instrument_node="">
</span><p data-dcnode-id="264"><span data-dcnode-id="265" instrument_node="">Signs which may mean that a tree needs attention but does not require an emergency response include a tree which:</span></p><span data-dcnode-id="263" instrument_node="">
</span><ul data-dcnode-id="243"><span data-dcnode-id="262" instrument_node="">
</span><li data-dcnode-id="260"><span data-dcnode-id="261" instrument_node="">is dead</span></li><span data-dcnode-id="259" instrument_node="">
</span><li data-dcnode-id="257"><span data-dcnode-id="258" instrument_node="">is dying / has a few leaves in summer or is dying back in the crown</span></li><span data-dcnode-id="256" instrument_node="">
</span><li data-dcnode-id="254"><span data-dcnode-id="255" instrument_node="">has bark that is loose and falling off</span></li><span data-dcnode-id="253" instrument_node="">
</span><li data-dcnode-id="251"><span data-dcnode-id="252" instrument_node="">has mushrooms or fungi growing on or near the tree</span></li><span data-dcnode-id="250" instrument_node="">
</span><li data-dcnode-id="248"><span data-dcnode-id="249" instrument_node="">has old splits and cracks in the trunk or large branches</span></li><span data-dcnode-id="247" instrument_node="">
</span><li data-dcnode-id="245"><span data-dcnode-id="246" instrument_node="">has smaller branches falling from the tree</span></li><span data-dcnode-id="244" instrument_node="">
</span></ul><span data-dcnode-id="242" instrument_node="">
</span></div><span data-dcnode-id="240" instrument_node="">
</span></div><span data-dcnode-id="238" instrument_node=""> </span><div class="col-md-3 column" data-dcnode-id="141"><span data-dcnode-id="237" instrument_node="">
