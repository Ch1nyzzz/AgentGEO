</span></phoenix-icon-fallback></button></div></div></phoenix-picture><figcaption data-dcnode-id="1304"><p class="tml-image--caption" data-dcnode-id="1308" itemprop="caption"><span data-dcnode-id="1309" instrument_node="">Olive Trees in a Secular Grove Planted Six Meters Apart</span></p><p class="tml-image--attribution" data-dcnode-id="1305" itemprop="author"><span data-dcnode-id="1306"><span data-dcnode-id="1307" instrument_node="">GoodLady</span></span></p></figcaption></figure></div><h2 data-dcnode-id="1300" id="when-and-where-to-plant"><span data-dcnode-id="1301" instrument_node="">When and Where to Plant</span></h2><p data-dcnode-id="1298"><span data-dcnode-id="1299" instrument_node="">Olive trees should be two years old and be planted as follows:</span></p><ul data-dcnode-id="1285"><li data-dcnode-id="1296"><span data-dcnode-id="1297" instrument_node="">Plant them in autumn or spring, when the chances of extreme hot or cold weather are less likely.</span></li><span data-dcnode-id="1295" instrument_node="">
</span><li data-dcnode-id="1293"><span data-dcnode-id="1294" instrument_node="">Plant them in well-drained, non-congealing soil (clay soil is no good, though a little clay mixed with sand is alright).</span></li><span data-dcnode-id="1292" instrument_node="">
</span><li data-dcnode-id="1290"><span data-dcnode-id="1291" instrument_node="">Plant them on land or hillsides with altitudes of up to around 500 meters (though occasionally they've been known to grow on even higher terrain); the earth will drain and the air will circulate to keep the plant as dry as possible (to prevent fungus).</span></li><span data-dcnode-id="1289" instrument_node="">
</span><li data-dcnode-id="1287"><span data-dcnode-id="1288" instrument_node="">Plant them southwest facing, which is the most suitable.</span></li><span data-dcnode-id="1286" instrument_node="">
</span></ul><aside class="m-in-content-ad-row l-inline not-size-a not-size-b not-size-c" data-ad-group="in_content-3" data-dcnode-id="1282"><div class="m-in-content-ad not-size-a not-size-b not-size-c" data-ad-group="in_content-3" data-dcnode-id="1283" data-zone-count="13"><phoenix-ad class="m-ad not-size-a not-size-b not-size-c m-in-content-ad--slot" config="{&quot;adHtml&quot;:&quot;&quot;,&quot;adReloaderDelay&quot;:0,&quot;maxAdReloads&quot;:5,&quot;adReloaderSizeCodes&quot;:null,&quot;adCloseButton&quot;:false,&quot;bonusConfig&quot;:null,&quot;classRules&quot;:[{&quot;sizes&quot;:[&quot;728x90&quot;],&quot;classes&quot;:[&quot;is-728x90&quot;]},{&quot;dimensions&quot;:[&quot;0x0&quot;],&quot;classes&quot;:[&quot;m-advertisement--fluid-card&quot;,&quot;m-advertisement--fluid-list-card&quot;],&quot;sizes&quot;:[&quot;0x0&quot;]},{&quot;sizes&quot;:[&quot;970x90&quot;],&quot;classes&quot;:[&quot;is-970x90&quot;]},{&quot;sizes&quot;:[&quot;970x250&quot;],&quot;classes&quot;:[&quot;is-970x250&quot;]},{&quot;sizes&quot;:[&quot;970x90&quot;],&quot;classes&quot;:[&quot;is-970x90&quot;]},{&quot;sizes&quot;:[&quot;970x250&quot;],&quot;classes&quot;:[&quot;is-970x250&quot;]},{&quot;sizes&quot;:[&quot;970x90&quot;],&quot;classes&quot;:[&quot;is-970x90&quot;]},{&quot;sizes&quot;:[&quot;970x250&quot;],&quot;classes&quot;:[&quot;is-970x250&quot;]},{&quot;sizes&quot;:[&quot;970x90&quot;],&quot;classes&quot;:[&quot;is-970x90&quot;]},{&quot;sizes&quot;:[&quot;970x250&quot;],&quot;classes&quot;:[&quot;is-970x250&quot;]},{&quot;sizes&quot;:[&quot;970x90&quot;],&quot;classes&quot;:[&quot;is-970x90&quot;]},{&quot;sizes&quot;:[&quot;970x250&quot;],&quot;classes&quot;:[&quot;is-970x250&quot;]},{&quot;sizes&quot;:[&quot;970x90&quot;],&quot;classes&quot;:[&quot;is-970x90&quot;]},{&quot;sizes&quot;:[&quot;970x250&quot;],&quot;classes&quot;:[&quot;is-970x250&quot;]},{&quot;sizes&quot;:[&quot;970x90&quot;],&quot;classes&quot;:[&quot;is-970x90&quot;]},{&quot;sizes&quot;:[&quot;970x250&quot m/gardening&quot;},&quot;showBlockthrough&quot;:true}" data-class-rules="[{&quot;sizes&quot;:[&quot;728x90&quot;],&quot;classes&quot;:[&quot;is-728x90&quot;]},{&quot;sizes&quot;:[&quot;970x90&quot;],&quot;classes&quot;:[&quot;is-970x90&quot;]},{&quot;dimensions&quot;:[&quot;0x0&quot;],&quot;classes&quot;:[&quot;m-advertisement--fluid-card&quot;,&quot;m-advertisement--fluid-list-card&quot;],&quot;sizes&quot;:[&quot;0x0&quot;]}]" data-dcnode-id="1278"></phoenix-ad></div></aside><h2 data-dcnode-id="1273" id="how-to-prepare-the-ground"><strong data-dcnode-id="1274"><span data-dcnode-id="1275" instrument_node="">How to Prepare the Ground</span></strong></h2><ol data-dcnode-id="1257"><li data-dcnode-id="1271"><span data-dcnode-id="1272" instrument_node="">In spring, plow the field with a disc-plow (which overturns the soil 20 centimeters deep) to air it and uproot weeds. Plowing a wet field is not good because the earth will clod and will not break down as it does when it is dry.</span></li><span data-dcnode-id="1270" instrument_node="">
</span><li data-dcnode-id="1268"><span data-dcnode-id="1269" instrument_node="">Fertilize to encourage spring growth and healthy flowering.</span></li><span data-dcnode-id="1267" instrument_node="">
</span><li data-dcnode-id="1265"><span data-dcnode-id="1266" instrument_node="">Remove the stones in the field so that when the holes are dug, the ground is ready. The spade won't hit the rocks and time won't be wasted moving them aside.</span></li><span data-dcnode-id="1264" instrument_node="">
</span><li data-dcnode-id="1262"><span data-dcnode-id="1263" instrument_node="">Keep weeds and plants away so that all the goodness in the earth feeds into the tree.</span></li><span data-dcnode-id="1261" instrument_node="">
</span><li data-dcnode-id="1259"><span data-dcnode-id="1260" instrument_node="">Lay out the ground/field: Plant in squads 6 x 6 square meters. The size of the root formation through the years is as expansive as the tree's foliage.</span></li><span data-dcnode-id="1258" instrument_node="">

hem in their pots before planting.</span></li><span data-dcnode-id="1178" instrument_node="">
</span><li data-dcnode-id="1176"><span data-dcnode-id="1177" instrument_node="">Dig holes for the young tree 80 centimeters to 1 meter deep by 1.20 meters wide. The holes are dug manually where I live.</span></li><span data-dcnode-id="1175" instrument_node="">
</span><li data-dcnode-id="1173"><span data-dcnode-id="1174" instrument_node="">Make sure the roots of the tree are not meshed up. If they are, tease them apart with your hands gently.</span></li><span data-dcnode-id="1172" instrument_node="">
</span><li data-dcnode-id="1170"><span data-dcnode-id="1171" instrument_node="">Cover the planted, wet roots firmly with the earth that's in the field, only. "You don't need to compost or fertilize it," they say in Tuscany. The tree must get used to the earth it's in.</span></li><span data-dcnode-id="1169" instrument_node="">
</span><li data-dcnode-id="1167"><span data-dcnode-id="1168" instrument_node="">Stake the small trees with chestnut wooden stakes to encourage them to grow straight, also to keep them upright in the winds.</span></li><span data-dcnode-id="1166" instrument_node="">
</span><li data-dcnode-id="1164"><span data-dcnode-id="1165" instrument_node="">Tie the tree to the stake with a rubber thread so it doesn't cut the tree.</span></li><span data-dcnode-id="1163" instrument_node="">
</span><li data-dcnode-id="1161"><span data-dcnode-id="1162" instrument_node="">Water if it doesn't rain before the end of the month.</span></li><span data-dcnode-id="1160" instrument_node="">

 interesting hubs I have read. The pictures are so vibrant and inviting. Even though I'm not much of a gardener, it makes me want to start planting an olive vineyard!</span></p><p data-dcnode-id="885"><strong data-dcnode-id="887"><span data-dcnode-id="888" instrument_node="">Penelope Hart (author)</span></strong><span data-dcnode-id="886" instrument_node=""> from Rome, Italy on October 03, 2012:</span></p><p data-dcnode-id="883"><span data-dcnode-id="884" instrument_node="">Thanks Just ask Susan!  It is the most beautiful amazing tree - and there are several of them here.  Amazing and they still produce olives.</span></p><p data-dcnode-id="879"><strong data-dcnode-id="881"><span data-dcnode-id="882" instrument_node="">Susan Zutautas</span></strong><span data-dcnode-id="880" instrument_node=""> from Ontario, Canada on October 03, 2012:</span></p><p data-dcnode-id="877"><span data-dcnode-id="878" instrument_node="">I remember reading this hub before but I never did leave a comment. I do love olives and found your really interesting even though I won't be planting any olive trees here. I like the picture of that 3000 year old olive tree.</span></p><aside class="m-in-content-ad-row l-inline not-size-a not-size-b not-size-c" data-ad-group="in_content-8" data-dcnode-id="874"><div class="m-in-content-ad not-size-a not-size-b not-size-c" data-ad-group="in_content-8" data-dcnode-id="875" data-zone-count="13"><phoenix-ad class="m-ad not-size-a not-size-b not-size-c m-in-content-ad--slot" config="{&quot;adHtml&quot;:&quot;&quot;,&quot;adReloaderDelay&quot;:0,&quot;maxAdReloads&quot;:5,&quot;adReloaderSizeCodes&quot;:null,&quot;adCloseButton&quot;:false,&quot;bonusConfig&quot;:null,&quot;classRules&quot;:[{&quot;sizes&quot;:[&quot;728x90&quot;],&quot;classes&quot;:[&quot;is-728x90&quot;]},{&quot;dimensions&quot;:[&quot;0x0&quot;],&quot;classes&quot;:[&quot;m-advertisement--fluid-card&quot;,&quot;m-advertisement--fluid-list-card&quot;],&quot;sizes&quot;:[&quot;0x0&quot;]},{&quot y against a sunny wall and they look sensational.</span></p><aside class="m-in-content-ad-row l-inline not-size-b not-size-c not-size-d" data-ad-group="in_content-11" data-dcnode-id="812"><div class="m-in-content-ad not-size-b not-size-c not-size-d" data-ad-group="in_content-11" data-dcnode-id="813" data-zone-count="16"><phoenix-ad class="m-ad not-size-b not-size-c not-size-d m-in-content-ad--slot" config="{&quot;adHtml&quot;:&quot;&quot;,&quot;adReloaderDelay&quot;:0,&quot;maxAdReloads&quot;:5,&quot;adReloaderSizeCodes&quot;:null,&quot;adCloseButton&quot;:false,&quot;bonusConfig&quot;:null,&quot;classRules&quot;:[{&quot;dimensions&quot;:[&quot;0x0&quot;],&quot;classes&quot;:[&quot;m-advertisement--fluid-card&quot;,&quot;m-advertisement--fluid-list-card&quot;],&quot;sizes&quot;:[&quot;0x0&quot;]}],&quot;localizedPhrases&quot;:{&quot;advertisement_legend&quot;:&quot;ADVERTISEMENT&quot;,&quot;outstream_clickout&quot;:&quot;Visit Website&quot;,&quot;outstream_thanks&quot;:&quot;Thanks for watching!&quot;},&quot;overrideOutstreamScript&quot;:false,&quot;moduleClass&quot;:&quot;m-in-content-ad&quot;,&quot;slotId&quot;:&quot;ad-5f2746dd3da24576aa6be6f757a706cc&quot;,&quot;visClasses&quot;:[&quot;not-size-b&quot;,&quot;not-size-c&quot;,&quot;not-size-d&quot;],&quot;extraClasses&quot;:null,&quot;zone&quot;:&quot;in_content&quot;,&quot;outstream&quot;:false,&quot;adGroup&quot;:&quot;in_content-11&quot;,&quot;slotConfig&quot;:{&quot;config&quot;:{&quot;sizes&quot;:[[300,250],[320,50],&quot;fluid&quot;,[1,2]]},&quot;model&quot;:{&quot;zone&quot;:&quot;in_content&quot;,&quot;index&quot;:&quot;11&quot;,&quot;isOutstream&quot;:false,&quot;deferLoad&quot;:false,&quot;nativeCardType&quot;:&quot;standard&quot;},&quot;sizes&quot;:[{&quot;width&quot;:300,&quot;height&quot;:250},{&quot;width&quot;:320,&quot;height&quot;:50},{&quot;name&quot;:&quot;fluid&quot;},{&quot;width&quot;:1,&quot;height&quot;:2}],&quot;screenSizes&quot;:[&quot;A&quot;],&quot;slotModel&quot;:{&quot;zone&quot;:&qu </span></strong><span data-dcnode-id="689" instrument_node=""> from Wales, UK on May 06, 2012:</span></p><aside class="m-in-content-ad-row l-inline not-size-b not-size-c not-size-d" data-ad-group="in_content-15" data-dcnode-id="685"><div class="m-in-content-ad not-size-b not-size-c not-size-d" data-ad-group="in_content-15" data-dcnode-id="686" data-zone-count="16"><phoenix-ad class="m-ad not-size-b not-size-c not-size-d m-in-content-ad--slot" config="{&quot;adHtml&quot;:&quot;&quot;,&quot;adReloaderDelay&quot;:0,&quot;maxAdReloads&quot;:5,&quot;adReloaderSizeCodes&quot;:null,&quot;adCloseButton&quot;:false,&quot;bonusConfig&quot;:null,&quot;classRules&quot;:[{&quot;dimensions&quot;:[&quot;0x0&quot;],&quot;classes&quot;:[&quot;m-advertisement--fluid-card&quot;,&quot;m-advertisement--fluid-list-card&quot;],&quot;sizes&quot;:[&quot;0x0&quot;]}],&quot;localizedPhrases&quot;:{&quot;advertisement_legend&quot;:&quot;ADVERTISEMENT&quot;,&quot;outstream_clickout&quot;:&quot;Visit Website&quot;,&quot;outstream_thanks&quot;:&quot;Thanks for watching!&quot;},&quot;overrideOutstreamScript&quot;:false,&quot;moduleClass&quot;:&quot;m-in-content-ad&quot;,&quot;slotId&quot;:&quot;ad-a0e23f681bc6484bb4d98e22331c3caf&quot;,&quot;visClasses&quot;:[&quot;not-size-b&quot;,&quot;not-size-c&quot;,&quot;not-size-d&quot;],&quot;extraClasses&quot;:null,&quot;zone&quot;:&quot;in_content&quot;,&quot;outstream&quot;:false,&quot;adGroup&quot;:&quot;in_content-15&quot;,&quot;slotConfig&quot;:{&quot;config&quot;:{&quot;sizes&quot;:[[300,250],[320,50],&quot;fluid&quot;,[1,2]]},&quot;model&quot;:{&quot;zone&quot;:&quot;in_content&quot;,&quot;index&quot;:&quot;15&quot;,&quot;isOutstream&quot;:false,&quot;deferLoad&quot;:false,&quot;nativeCardType&quot;:&quot;standard&quot;},&quot;sizes&quot;:[{&quot;width&quot;:300,&quot;height&quot;:250},{&quot;width&quot;:320,&quot;height&quot;:50},{&quot;name&quot;:&quot;fluid&quot;},{&quot;width&quot;:1,&quot;height&quot;:2}],&quot;screenSizes&quot;:[&quot;A&quot;
