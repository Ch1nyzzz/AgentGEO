</span><span data-dcnode-id="547" style="font-size:16px;"><span data-dcnode-id="548" instrument_node="">Do you have a hydrangea plant, but are not sure when to prune it? You’re not alone! Hydrangea trees are a common plant throughout Northeast Ohio.</span></span></p><p data-dcnode-id="542"><span data-dcnode-id="545" instrument_node="">
</span><span data-dcnode-id="543" style="font-size:16px;"><span data-dcnode-id="544" instrument_node="">They come in many varieties and offer beautiful, colorful blooms and multiple blooming cycles, making it a desirable addition to any yard or garden. Once you get a pruning schedule in place, they are easy to maintain.</span></span></p><p data-dcnode-id="538"><span data-dcnode-id="541" instrument_node="">
</span><span data-dcnode-id="539" style="font-size:16px;"><span data-dcnode-id="540" instrument_node="">Caring for hydrangeas and knowing when to prune them can be confusing given the many varieties, but overall, they are hardy trees that will stay colorful and healthy if you follow a few pruning tips.</span></span></p><h2 data-dcnode-id="536"><span data-dcnode-id="537" instrument_node="">
Know the Type of Hydrangea You Have</span></h2><p data-dcnode-id="532"><span data-dcnode-id="535" instrument_node="">
</span><span data-dcnode-id="533" style="font-size:16px;"><span data-dcnode-id="534" instrument_node="">Pruning your hydrangea properly depends on the type that you have. Different types of hydrangeas require pruning at different times of the year.</span></span></p><p data-dcnode-id="525"><span data-dcnode-id="531" instrument_node="">
</span><span data-dcnode-id="526" style="font-size:16px;"><span data-dcnode-id="530" instrument_node="">For example, for smooth hydrangeas such as </span><strong data-dcnode-id="528"><span data-dcnode-id="529" instrument_node="">Annabelles</span></strong><span data-dcnode-id="527" instrument_node="">, you’ll want to wait until they finish blooming before cutting them back. Pruning in late fall or early spring before new growth begins will bring new blooms all summer.&nbsp;</span></span></p><p data-dcnode-id="516"><span data-dcnode-id="524" instrument_node="">
</span><span data-dcnode-id="517" style="font-size:16px;"><strong data-dcnode-id="522"><span data-dcnode-id="523" instrument_node="">Big Leaf</span></strong><span data-dcnode-id="521" instrument_node=""> and </span><strong data-dcnode-id="519"><span data-dcnode-id="520" instrument_node="">Oakleaf</span></strong><span data-dcnode-id="518" instrument_node=""> hydrangeas should be pruned no later than early fall, otherwise you may cut off buds preventing any blooms come summer. For these types of hydrangeas, it’s best to prune immediately after flowering.</span></span></p><p data-dcnode-id="507"><span data-dcnode-id="515" instrument_node="">
</span><span data-dcnode-id="508" style="font-size:16px;"><strong data-dcnode-id="513"><span data-dcnode-id="514" instrument_node="">Paniculata</span></strong><span data-dcnode-id="512" instrument_node=""> or </span><strong data-dcnode-id="510"><span data-dcnode-id="511" instrument_node="">PeeGee </span></strong><span data-dcnode-id="509" instrument_node="">hydrangeas offer a bit more flexibility, but in general, they should be pruned in early spring before new growth appears.</span></span></p><p data-dcnode-id="503"><span data-dcnode-id="506" instrument_node="">
</span><span data-dcnode-id="504" style="font-size:16px;"><span data-dcnode-id="505" instrument_node="">Other hydrangeas such as climbing hydrangeas may require very little pruning.</span></span></p><h2 data-dcnode-id="501"><span data-dcnode-id="502" instrument_node="">
How to Prune Properly</span></h2><p data-dcnode-id="498"><span data-dcnode-id="500" instrument_node="">
</span><img alt="When is the Best Time to Prune Hydrangea Trees? | Avon Landscaping" data-dcnode-id="499" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//virteomdevcdn.blob.core.windows.net/site-avonlandscaping-com/uploaded_media/avonlandscaping_com/blog/best-time-to-prune-hydrangea-trees-1525982124.jpg&amp;raw" style="width: 50%; float: right; margin-left: 20px; margin-bottom: 5px; max-width: 100%;"></p><p data-dcnode-id="494"><span data-dcnode-id="497" instrument_node="">
</span><span data-dcnode-id="495" style="font-size:16px;"><span data-dcnode-id="496" instrument_node="">To prune your hydrangeas, start by cleaning out the shoots that come up out of the ground near the bottom of the plant, and any coming out of the trunk. These are called “suckers” and take valuable resources away from the healthy parts of your tree.</span></span></p><p data-dcnode-id="490"><span data-dcnode-id="493" instrument_node="">
</span><span data-dcnode-id="491" style="font-size:16px;"><span data-dcnode-id="492" instrument_node="">Cut back branches that are crossing or rubbing other branches. Also, cut out any weak branches completely to allow more energy for the stronger, healthier stems.</span></span></p><p data-dcnode-id="486"><span data-dcnode-id="489" instrument_node="">
</span><span data-dcnode-id="487" style="font-size:16px;"><span data-dcnode-id="488" instrument_node="">Trim back healthy stems by about two-thirds. Prune the tree in the shape that you would like it to grow.</span></span></p><p data-dcnode-id="482"><span data-dcnode-id="485" instrument_node="">
</span><span data-dcnode-id="483" style="font-size:16px;"><span data-dcnode-id="484" instrument_node="">Follow these easy steps and enjoy beautiful hydrangea flowers all summer long!</span></span></p><p data-dcnode-id="475"><span data-dcnode-id="481" instrument_node="">
</span><span data-dcnode-id="476" style="font-size:16px;"><span data-dcnode-id="480" instrument_node="">If you’re not sure what type of hydrangea you have, or need assistance with pruning or caring for other types of trees, please </span><a data-dcnode-id="478" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.avonlandscaping.com/contact-us"><span data-dcnode-id="479" instrument_node="">contact the experts at Avon Landscaping</span></a><span data-dcnode-id="477" instrument_node=""> for assistance!</span></span></p></div></section><div class="modBlog-blogentry" data-dcnode-id="402" id="modBlog_main"><span data-dcnode-id="472" instrument_node="">
