</span><h1 class="article-title flush-left" data-dcnode-id="301"><span data-dcnode-id="302" instrument_node="">
Best time of year to prune spruce trees #421209</span></h1><span data-dcnode-id="300" instrument_node="">
</span><span data-dcnode-id="298" instrument_node="">
</span><span data-dcnode-id="296" instrument_node="">
</span><div class="thread-body bleed" data-dcnode-id="248"><span data-dcnode-id="295" instrument_node="">
</span><p class="text-muted" data-dcnode-id="292"><small data-dcnode-id="293"><span data-dcnode-id="294" instrument_node="">Asked August 14, 2017, 4:19 PM EDT</span></small></p><div class="question_body" data-dcnode-id="290"><span data-dcnode-id="291" instrument_node=""> What is the best time of year to trim/prune spruce trees?  I've read different things from dormant time during the winter to early spring after new growth.</span></div><div class="question-attachments" data-dcnode-id="289"></div><p data-dcnode-id="283"><span class="tag tag-geography" data-dcnode-id="287"><span data-dcnode-id="288" instrument_node="">Macon County</span></span><span data-dcnode-id="286" instrument_node=""> </span><span class="tag tag-geography" data-dcnode-id="284"><span data-dcnode-id="285" instrument_node="">Illinois</span></span></p><h2 class="subhead_style" data-dcnode-id="281"><span data-dcnode-id="282" instrument_node="">Expert Response</span></h2><div class="response_wrapper" data-dcnode-id="250"><div class="response_block" data-dcnode-id="251"><div class="response" data-dcnode-id="262"><span data-dcnode-id="280" instrument_node="">Hello, below are some general guidelines for pruning spruce and other conifers. First of all, we need to define what you're pruning. &nbsp;If you're looking to prune back the ends of the branches to produce a desired shape (shearing), then late spring or early summer in the growing season is best. &nbsp;Dead branches can be pruned off at any time, but if you want to remove whole, live branches then prune from late winter to early spring before new growth starts. &nbsp;When removing the whole branch, be sure to leave the branch collar intact to ensure the pruning wound heals correctly.</span><br data-dcnode-id="279"><span data-dcnode-id="278" instrument_node="">Good&nbsp;luck!</span><br data-dcnode-id="277"><br data-dcnode-id="276"><a data-dcnode-id="274" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.cals.uidaho.edu/edcomm/pdf/BUL/BUL0644.pdf" rel="nofollow" target="_blank"><span data-dcnode-id="275" instrument_node="">https://www.cals.uidaho.edu/edcomm/pdf/BUL/BUL0644.pdf</span></a><span data-dcnode-id="273" instrument_node="">&nbsp; &nbsp; &nbsp; &nbsp;</span><a data-dcnode-id="271" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//pubs.ext.vt.edu/430/430-457/430-457.html" rel="nofollow" target="_blank"><span data-dcnode-id="272" instrument_node="">https://pubs.ext.vt.edu/430/430-457/430-457.html</span></a><br data-dcnode-id="270"><br data-dcnode-id="269"><br data-dcnode-id="268"><br data-dcnode-id="267"><br data-dcnode-id="266"><br data-dcnode-id="265"><br data-dcnode-id="264"><br data-dcnode-id="263"></div><div class="response-attachments" data-dcnode-id="261"></div><div class="author" data-dcnode-id="252"><a class="thumb" data-dcnode-id="259" target="_blank"><span class="avatar_with_badge" data-dcnode-id="260"></span></a><a class="author-name" data-dcnode-id="257" target="_blank"><span data-dcnode-id="258" instrument_node="">Bob Parker</span></a><small data-dcnode-id="253"><span data-dcnode-id="256" instrument_node=""> Replied </span><span class="date" data-dcnode-id="254"><span data-dcnode-id="255" instrument_node="">September 11, 2017, 5:37 PM EDT</span></span></small></div></div></div><input data-dcnode-id="249" id="hidden-tags" type="hidden" value=""></div><span data-dcnode-id="247" instrument_node="">
