</span><div class="comp text-passage structured-content sc-page mntl-sc-page mntl-block" data-bind-scroll-on-start="true" data-dcnode-id="1019" data-sc-ad-label-height="11" data-sc-ad-track-spacing="100" data-sc-breakpoint="50em" data-sc-content-positions="[1, 1, 1, 1250, 1, 1, 1, 1]" data-sc-load-immediate="5" data-sc-max-track-height="600" data-sc-min-track-height="250" data-sc-sticky-offset="138" id="sc-page_1-0"><span data-dcnode-id="1253" instrument_node="">
</span><p class="comp text-passage u-how-to-title-align mntl-sc-block lifestyle-sc-block-html mntl-sc-block-html" data-dcnode-id="1248" id="mntl-sc-block_1-0"><span data-dcnode-id="1252" instrument_node="">
After your magnolia tree matures and starts getting very wide and tall, you may wonder whether or not to </span><a data-component="link" data-dcnode-id="1250" data-ordinal="1" data-source="inlineLink" data-type="internalLink" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.thespruce.com/prune-brown-foliage-on-my-magnolia-tree-2132817"><span data-dcnode-id="1251" instrument_node="">prune</span></a><span data-dcnode-id="1249" instrument_node=""> it and, if so, how and when to do so. There are some general rules to follow here that will give you guidance. But there are also exceptions to the rules. There are hundreds of varieties of magnolias and they do not all need the same pruning.
</span></p><span data-dcnode-id="1247" instrument_node="">
</span><div class="comp u-no-article-width-restriction mntl-sc-block lifestyle-sc-block-adslot mntl-sc-block-adslot mntl-block" data-dcnode-id="1246" id="mntl-sc-block_1-0-1"></div><span data-dcnode-id="1245" instrument_node="">
</span><span class="heading-toc" data-dcnode-id="1244" id="toc-whether-when-and-how-to-prune-magnolia-trees"></span><span data-dcnode-id="1243" instrument_node=""> </span><h2 class="comp u-how-to-title-align mntl-sc-block lifestyle-sc-block-heading mntl-sc-block-heading" data-dcnode-id="1238" id="mntl-sc-block_1-0-2"><span data-dcnode-id="1242" instrument_node=""> </span><span class="mntl-sc-block-heading__text" data-dcnode-id="1240"><span data-dcnode-id="1241" instrument_node=""> Whether, When, and How to Prune Magnolia Trees </span></span><span data-dcnode-id="1239" instrument_node=""> </span></h2><span data-dcnode-id="1237" instrument_node="">
</span><p class="comp text-passage u-how-to-title-align mntl-sc-block lifestyle-sc-block-html mntl-sc-block-html" data-dcnode-id="1232" id="mntl-sc-block_1-0-3"><span data-dcnode-id="1236" instrument_node="">
With some exceptions, pruning really is not widely considered a must (or even desirable) for this popular </span><a data-component="link" data-dcnode-id="1234" data-ordinal="1" data-source="inlineLink" data-type="internalLink" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.thespruce.com/types-of-flowering-trees-4069714"><span data-dcnode-id="1235" instrument_node="">flowering tree</span></a><span data-dcnode-id="1233" instrument_node="">. For one thing, magnolia trees do not heal as well as most trees from pruning cuts (which can lead to the introduction of diseases), and, for another, you can easily spoil the looks of a magnolia tree by getting carried away in pruning it. But if you still decide to prune, consider this advice:
</span></p><span data-dcnode-id="1231" instrument_node="">
</span><div class="comp u-no-article-width-restriction mntl-sc-block lifestyle-sc-block-adslot mntl-sc-block-adslot mntl-block" data-dcnode-id="1230" id="mntl-sc-block_1-0-4"></div><span data-dcnode-id="1229" instrument_node="">
</span><ul class="comp text-passage u-how-to-title-align mntl-sc-block lifestyle-sc-block-html mntl-sc-block-html" data-dcnode-id="1222" id="mntl-sc-block_1-0-5"><span data-dcnode-id="1228" instrument_node="">
</span><li data-dcnode-id="1226"><span data-dcnode-id="1227" instrument_node="">Do so just after flowering is done, not only so you can at least enjoy the current year’s blooms, but also because magnolia trees bloom on old wood (which means that pruning too late in the year puts you at risk for losing the buds for next year's flowers).</span></li><li data-dcnode-id="1224"><span data-dcnode-id="1225" instrument_node="">Trim off only a small amount, with an eye to shaping the plant to your liking.</span></li><span data-dcnode-id="1223" instrument_node="">
</span></ul><span data-dcnode-id="1221" instrument_node="">
</span><div class="comp u-no-article-width-restriction mntl-sc-block lifestyle-sc-block-adslot mntl-sc-block-adslot mntl-block" data-dcnode-id="1213" id="mntl-sc-block_1-0-6"><div class="comp mntl-native" data-dcnode-id="1214" data-right-rail-index="2" id="mntl-native_3-0" style="--native-ad-height: auto"><span data-dcnode-id="1220" instrument_node="">
</span><div class="comp scads-to-load mntl-native__adunit mntl-gpt-dynamic-adunit mntl-gpt-adunit gpt native dynamic js-immediate-ad" data-dcnode-id="1216" id="mntl-native__adunit_3-0"><span data-dcnode-id="1219" instrument_node="">
</span><div class="wrapper" data-dcnode-id="1218" data-pos="native" data-priority="4" data-rtb="true" data-sizes="[[1, 3],&quot;fluid&quot;]" data-targeting="{}" data-type="native" id="native"></div><span data-dcnode-id="1217" instrument_node="">
</span></div><span data-dcnode-id="1215" instrument_node="">
</span></div></div><span data-dcnode-id="1212" instrument_node="">
</span><p class="comp text-passage u-how-to-title-align mntl-sc-block lifestyle-sc-block-html mntl-sc-block-html" data-dcnode-id="1207" id="mntl-sc-block_1-0-7"><span data-dcnode-id="1211" instrument_node="">
Because magnolia trees heal relatively poorly after you prune them, making them susceptible to diseases, also keep the following in mind if you feel that you must prune:</span><span class="mntl-inline-citation mntl-dynamic-tooltip--trigger" data-dcnode-id="1209" data-id="#citation-1"><span data-dcnode-id="1210" instrument_node="">1</span></span><span data-dcnode-id="1208" instrument_node="">
</span></p><span data-dcnode-id="1206" instrument_node="">
</span><div class="comp u-no-article-width-restriction mntl-sc-block lifestyle-sc-block-adslot mntl-sc-block-adslot mntl-block" data-dcnode-id="1205" id="mntl-sc-block_1-0-8"></div><span data-dcnode-id="1204" instrument_node="">
</span><ul class="comp text-passage u-how-to-title-align mntl-sc-block lifestyle-sc-block-html mntl-sc-block-html" data-dcnode-id="1187" id="mntl-sc-block_1-0-9"><span data-dcnode-id="1203" instrument_node="">
</span><li data-dcnode-id="1195"><span data-dcnode-id="1202" instrument_node="">Make your cuts with </span><a data-component="link" data-dcnode-id="1200" data-ordinal="1" data-source="inlineLink" data-type="internalLink" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.thespruce.com/garden-pruner-preference-1403219"><span data-dcnode-id="1201" instrument_node="">pruners</span></a><span data-dcnode-id="1199" instrument_node=""> or </span><a data-component="link" data-dcnode-id="1197" data-ordinal="2" data-source="inlineLink" data-type="internalLink" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.thespruce.com/top-pole-pruners-for-tall-plants-2132322"><span data-dcnode-id="1198" instrument_node="">loppers</span></a><span data-dcnode-id="1196" instrument_node=""> that have first been thoroughly disinfected (for example, with ethanol or isopropyl alcohol) and sharpened.</span></li><span data-dcnode-id="1194" instrument_node="">
</span><li data-dcnode-id="1192"><span data-dcnode-id="1193" instrument_node="">Cut off dead branches first. Next, inspect the plant for areas where two branches are rubbing against each other; decide which one will lend itself better to the overall shape you are aiming for, then remove the other one. Finally, prune off any limbs that you suspect are infected by a disease (you want to make sure that the disease does not spread). Disinfect your cutting tool once again after this part of the job is done and before continuing to prune.</span></li><span data-dcnode-id="1191" instrument_node="">
</span><li data-dcnode-id="1189"><span data-dcnode-id="1190" instrument_node="">Make clean cuts with your pruners. Prune all of the way through the wood. Do not leave a branch hanging "by a thread" and then attempt to yank it off with your hand. In the process,&nbsp;you could end up ripping some bark off the trunk.&nbsp;</span></li><span data-dcnode-id="1188" instrument_node="">
</span></ul><span data-dcnode-id="1186" instrument_node="">
</span><div class="comp u-no-article-width-restriction mntl-sc-block lifestyle-sc-block-adslot mntl-sc-block-adslot mntl-block" data-dcnode-id="1185" id="mntl-sc-block_1-0-10"></div><span data-dcnode-id="1184" instrument_node="">

</span><span class="heading-toc" data-dcnode-id="1152" id="toc-exceptions-to-the-rule-pruning-after-storm-damage-on-young-trees"></span><span data-dcnode-id="1151" instrument_node=""> </span><h2 class="comp u-how-to-title-align mntl-sc-block lifestyle-sc-block-heading mntl-sc-block-heading" data-dcnode-id="1146" id="mntl-sc-block_1-0-12"><span data-dcnode-id="1150" instrument_node=""> </span><span class="mntl-sc-block-heading__text" data-dcnode-id="1148"><span data-dcnode-id="1149" instrument_node=""> Exceptions to the Rule: Pruning After Storm Damage, on Young Trees </span></span><span data-dcnode-id="1147" instrument_node=""> </span></h2><span data-dcnode-id="1145" instrument_node="">
</span><p class="comp text-passage u-how-to-title-align mntl-sc-block lifestyle-sc-block-html mntl-sc-block-html" data-dcnode-id="1143" id="mntl-sc-block_1-0-13"><span data-dcnode-id="1144" instrument_node="">
Pruning magnolia trees is generally unnecessary, but there are exceptions. One exception relates to storm damage, another to the age of the tree in question. Regarding the former, consider the following scenario:
</span></p><span data-dcnode-id="1142" instrument_node="">
</span><div class="comp u-no-article-width-restriction mntl-sc-block lifestyle-sc-block-adslot mntl-sc-block-adslot mntl-block" data-dcnode-id="1141" id="mntl-sc-block_1-0-14"></div><span data-dcnode-id="1140" instrument_node="">
</span><ul class="comp text-passage u-how-to-title-align mntl-sc-block lifestyle-sc-block-html mntl-sc-block-html" data-dcnode-id="1120" id="mntl-sc-block_1-0-15"><span data-dcnode-id="1139" instrument_node="">
</span><li data-dcnode-id="1131"><span data-dcnode-id="1138" instrument_node="">During a severe wind storm (or snowstorm or ice storm), a huge pine bough falls on your&nbsp;</span><a data-component="link" data-dcnode-id="1136" data-ordinal="1" data-source="inlineLink" data-type="internalLink" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.thespruce.com/jane-magnolia-to-brighten-spring-yard-2132129"><span data-dcnode-id="1137" instrument_node="">Jane magnolia tree</span></a><span data-dcnode-id="1135" instrument_node=""> (</span><em data-dcnode-id="1133"><span data-dcnode-id="1134" instrument_node="">Magnolia</span></em><span data-dcnode-id="1132" instrument_node=""> Jane).</span></li><span data-dcnode-id="1130" instrument_node="">
</span><li data-dcnode-id="1125"><span data-dcnode-id="1129" instrument_node="">An accidental "pruning" results from the damage and </span><a data-component="link" data-dcnode-id="1127" data-ordinal="2" data-source="inlineLink" data-type="internalLink" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.thespruce.com/how-and-when-to-prune-plants-1403009"><span data-dcnode-id="1128" instrument_node="">the tree's leader</span></a><span data-dcnode-id="1126" instrument_node=""> is broken, altering its shape and growth habit forever.</span></li><span data-dcnode-id="1124" instrument_node="">
</span><li data-dcnode-id="1122"><span data-dcnode-id="1123" instrument_node="">Your Jane magnolia takes on a shrub form thereafter.</span></li><span data-dcnode-id="1121" instrument_node="">
</span></ul><span data-dcnode-id="1119" instrument_node="">
</span><div class="comp u-no-article-width-restriction mntl-sc-block lifestyle-sc-block-adslot mntl-sc-block-adslot mntl-block" data-dcnode-id="1118" id="mntl-sc-block_1-0-16"></div><span data-dcnode-id="1117" instrument_node="">
</span><p class="comp text-passage u-how-to-title-align mntl-sc-block lifestyle-sc-block-html mntl-sc-block-html" data-dcnode-id="1109" id="mntl-sc-block_1-0-17"><span data-dcnode-id="1116" instrument_node="">
After such damage from a winter storm, you may wish to change your approach to how you prune the magnolia. Accepting the fact that it will now be growing as a shrub (not a tree), maybe you will now want to prune it so as to give it the most pleasing shape that you can within the limits of its new </span><a data-component="link" data-dcnode-id="1114" data-ordinal="1" data-source="inlineLink" data-type="internalLink" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.thespruce.com/plant-texture-meaning-application-2131117"><span data-dcnode-id="1115" instrument_node="">plant form</span></a><span data-dcnode-id="1113" instrument_node="">.</span><span class="mntl-inline-citation mntl-dynamic-tooltip--trigger" data-dcnode-id="1111" data-id="#citation-1"><span data-dcnode-id="1112" instrument_node="">1</span></span><span data-dcnode-id="1110" instrument_node=""> The tree form may have been the ideal, but it is advisable to adapt your expectations and your pruning regimen to the new reality.
</span></p><span data-dcnode-id="1108" instrument_node="">
</span><div class="comp u-no-article-width-restriction mntl-sc-block lifestyle-sc-block-adslot mntl-sc-block-adslot mntl-block" data-dcnode-id="1107" id="mntl-sc-block_1-0-18"></div><span data-dcnode-id="1106" instrument_node="">
</span><p class="comp text-passage u-how-to-title-align mntl-sc-block lifestyle-sc-block-html mntl-sc-block-html" data-dcnode-id="1104" id="mntl-sc-block_1-0-19"><span data-dcnode-id="1105" instrument_node="">
By pruning the damaged plant judiciously, at least you will be able to maintain it as a compact shrub that fits neatly into a designated nook or cranny in your landscape. Depending on your personal tastes, while the "wild look" may suit a magnolia just fine in tree form, a more manicured look may suit the plant better in shrub form.
</span></p><span data-dcnode-id="1103" instrument_node="">
</span><div class="comp u-no-article-width-restriction mntl-sc-block lifestyle-sc-block-adslot mntl-sc-block-adslot mntl-block" data-dcnode-id="1102" id="mntl-sc-block_1-0-20"></div><span data-dcnode-id="1101" instrument_node="">
</span><p class="comp text-passage u-how-to-title-align mntl-sc-block lifestyle-sc-block-html mntl-sc-block-html" data-dcnode-id="1099" id="mntl-sc-block_1-0-21"><span data-dcnode-id="1100" instrument_node="">
Here is another exception to the no pruning rule. Many gardeners prune their magnolia tree when it is young, leaving it alone thereafter. Two benefits come from pruning young magnolia trees:
</span></p><span data-dcnode-id="1098" instrument_node="">
</span><div class="comp u-no-article-width-restriction mntl-sc-block lifestyle-sc-block-adslot mntl-sc-block-adslot mntl-block" data-dcnode-id="1097" id="mntl-sc-block_1-0-22"></div><span data-dcnode-id="1096" instrument_node="">
</span><ul class="comp text-passage u-how-to-title-align mntl-sc-block lifestyle-sc-block-html mntl-sc-block-html" data-dcnode-id="1089" id="mntl-sc-block_1-0-23"><span data-dcnode-id="1095" instrument_node="">
</span><li data-dcnode-id="1093"><span data-dcnode-id="1094" instrument_node="">By taking advantage of the fact that the plant is just starting out, pruning can ensure that the mature specimen will have a shape suited to your tastes. For example, remove low branches if you prefer a tree form. That way, energy will go into creating stronger upper branches.</span></li><li data-dcnode-id="1091"><span data-dcnode-id="1092" instrument_node="">This early pruning can also promote better flowering.</span></li><span data-dcnode-id="1090" instrument_node="">
</span></ul><span data-dcnode-id="1088" instrument_node="">
</span><div class="comp u-no-article-width-restriction mntl-sc-block lifestyle-sc-block-adslot mntl-sc-block-adslot mntl-block" data-dcnode-id="1087" id="mntl-sc-block_1-0-24"></div><span data-dcnode-id="1086" instrument_node="">
</span><span class="heading-toc" data-dcnode-id="1085" id="toc-pruning-by-common-variety"></span><span data-dcnode-id="1084" instrument_node=""> </span><h2 class="comp u-how-to-title-align mntl-sc-block lifestyle-sc-block-heading mntl-sc-block-heading" data-dcnode-id="1079" id="mntl-sc-block_1-0-25"><span data-dcnode-id="1083" instrument_node=""> </span><span class="mntl-sc-block-heading__text" data-dcnode-id="1081"><span data-dcnode-id="1082" instrument_node=""> Pruning by Common Variety </span></span><span data-dcnode-id="1080" instrument_node=""> </span></h2><span data-dcnode-id="1078" instrument_node="">
</span><p class="comp text-passage u-how-to-title-align mntl-sc-block lifestyle-sc-block-html mntl-sc-block-html" data-dcnode-id="1076" id="mntl-sc-block_1-0-26"><span data-dcnode-id="1077" instrument_node="">
Here are the pruning needs for the four most common magnolias planted in home gardens.
</span></p><span data-dcnode-id="1075" instrument_node="">
</span><div class="comp u-no-article-width-restriction mntl-sc-block lifestyle-sc-block-adslot mntl-sc-block-adslot mntl-block" data-dcnode-id="1074" id="mntl-sc-block_1-0-27"></div><span data-dcnode-id="1073" instrument_node="">
</span><ul class="comp text-passage u-how-to-title-align mntl-sc-block lifestyle-sc-block-html mntl-sc-block-html" data-dcnode-id="1042" id="mntl-sc-block_1-0-28"><span data-dcnode-id="1072" instrument_node="">
</span><li data-dcnode-id="1065"><strong data-dcnode-id="1067"><span data-dcnode-id="1071" instrument_node="">Southern Magnolia (</span><em data-dcnode-id="1069"><span data-dcnode-id="1070" instrument_node="">Magnolia grandiflora</span></em><span data-dcnode-id="1068" instrument_node="">)</span></strong><span data-dcnode-id="1066" instrument_node="">: Its symmetrical shape can be kept by pruning in summer when it's done blooming.</span></li><li data-dcnode-id="1058"><strong data-dcnode-id="1060"><span data-dcnode-id="1064" instrument_node="">Saucer Magnolia (</span><em data-dcnode-id="1062"><span data-dcnode-id="1063" instrument_node="">Magnolia x soulangeana</span></em><span data-dcnode-id="1061" instrument_node="">)</span></strong><span data-dcnode-id="1059" instrument_node="">: This magnolia can reach 25 ft. tall in its growing zones 4-9 (USDA). It has multiple stems and should be pruned young to train on teh number of trains the gardener wants. Prune and shape after spring flowers and then only sparingly after 20 years because it heals slowly. </span></li><li data-dcnode-id="1051"><strong data-dcnode-id="1053"><span data-dcnode-id="1057" instrument_node="">Star Magnolia (</span><em data-dcnode-id="1055"><span data-dcnode-id="1056" instrument_node="">Magnolia stellata</span></em><span data-dcnode-id="1054" instrument_node="">)</span></strong><span data-dcnode-id="1052" instrument_node="">: This 15 - 20 ft. tall magnolia has multiple stems and grows in zones 4-8. The tree can be bloomed after its spring flowering.</span></li><li data-dcnode-id="1044"><strong data-dcnode-id="1046"><span data-dcnode-id="1050" instrument_node="">Sweetbay Magnolia (</span><em data-dcnode-id="1048"><span data-dcnode-id="1049" instrument_node="">Magnolia virginiana</span></em><span data-dcnode-id="1047" instrument_node="">)</span></strong><span data-dcnode-id="1045" instrument_node="">: This multi-stemmed magnolia is summer blooming in growing zones 5-10. It should be pruned at the end of winter before it has its growth spurt or you risk cutting off buds.</span></li><span data-dcnode-id="1043" instrument_node="">
</span></ul><span data-dcnode-id="1041" instrument_node="">
