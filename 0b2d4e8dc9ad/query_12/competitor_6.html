pan><li data-dcnode-id="796"><span data-dcnode-id="800" instrument_node=""> </span><a aria-label="Link to How to Trim Shrubs With a Hedge Trimmer" data-dcnode-id="798" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//homeguides.sfgate.com/trim-shrubs-hedge-trimmer-34784.html"><span data-dcnode-id="799" instrument_node=""> How to Trim Shrubs With a Hedge Trimmer </span></a><span data-dcnode-id="797" instrument_node=""> </span></li><span data-dcnode-id="795" instrument_node=""> </span></ul><span data-dcnode-id="793" instrument_node=""> </span></div><span data-dcnode-id="791" instrument_node=""> </span></div><span data-dcnode-id="789" instrument_node=""> </span></div><span data-dcnode-id="787" instrument_node=""> </span><div class="freestyle-content article-content" data-dcnode-id="687"><span data-dcnode-id="786" instrument_node=""> </span><div class="parts" data-dcnode-id="760"><span data-dcnode-id="785" instrument_node=""> </span><div class="content" data-dcnode-id="776"><p data-dcnode-id="777"><span data-dcnode-id="784" instrument_node="">Few trees are easier to prune than the forgiving yew (​</span><em data-dcnode-id="782"><span data-dcnode-id="783" instrument_node="">Taxus</span></em><span data-dcnode-id="781" instrument_node="">​ spp.) According to </span><a data-dcnode-id="779" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.bhg.com/gardening/plant-dictionary/shrub/yew/" rel="nofollow noopener"><span data-dcnode-id="780" instrument_node="">Better Homes &amp; Gardens</span></a><span data-dcnode-id="778" instrument_node="">, yews are best grown in USDA zones 4 through 7, depending on the variety. With gleaming, dark-green needles spiraling down upright stems year-round plus holiday-red berries in summer, yews are comely shrubs and a great choice for ground covers, specimen shrubs and dense, vertical hedges that can reach 20 feet or more in height. You can count on your yews being around for a while too. Most grow slowly, but can live for hundreds or even thousands of years. They're also welcome guests in the garden, given their low maintenance requirements and ability to develop new growth on old wood. What does this mean for a gardener? It means that you can prune with impunity without having to be afraid of making an irreversible mistake.</span></p></div><span data-dcnode-id="775" instrument_node=""> </span><div class="mobile-only-min-height-250 ad-unit inline-ad" data-ad-unit-name="inline-mobile" data-dcnode-id="774"></div><span data-dcnode-id="773" instrument_node=""> </span><div class="desktop-only-min-height-280 ad-unit centered" data-ad-id="Leaf2" data-ad-unit-name="inline-desktop" data-dcnode-id="771" data-is-refreshable="true" data-page-index="0"><div data-dcnode-id="772" data-has-intersected="true" id="Leaf2"></div></div><span data-dcnode-id="770" instrument_node=""> </span><div class="section" data-dcnode-id="762" id="tips"><span data-dcnode-id="769" instrument_node=""> </span><h4 data-dcnode-id="767"><span data-dcnode-id="768" instrument_node="">Tip</span></h4><span data-dcnode-id="766" instrument_node=""> </span><p data-dcnode-id="764"><span data-dcnode-id="765" instrument_node="">To help prevent the spread of diseases between plants, remember to sterilize the blades of your pruning tools before and after pruning by soaking them for 30 minutes in a solution of 1 part bleach to 9 parts water. Then rinse thoroughly to avoid the corrosive effects of the bleach.</span></p><span data-dcnode-id="763" instrument_node=""> </span></div><span data-dcnode-id="761" instrument_node=""> </span></div><span data-dcnode-id="759" instrument_node=""> </span><h2 class="title" data-dcnode-id="757" data-for="Maintenance Pruning"><span data-dcnode-id="758" instrument_node=""> Maintenance Pruning</span></h2><span data-dcnode-id="756" instrument_node=""> </span><div class="parts" data-dcnode-id="727"><span data-dcnode-id="755" instrument_node=""> </span><div class="content" data-dcnode-id="752"><p data-dcnode-id="753"><span data-dcnode-id="754" instrument_node="">Yews are one of the easiest evergreens to prune and reliably sprout on bare wood, so if you cut your yews back severely or shear them into a hedge form, they'll fill out quickly.</span></p></div><span data-dcnode-id="751" instrument_node=""> </span><div class="content" data-dcnode-id="748"><p data-dcnode-id="749"><span data-dcnode-id="750" instrument_node="">Late winter or early spring is the best time to prune yews for size reduction. Do it before you see a burst of new growth. Fit in another trimming in early to midsummer to spiff them up for the rest of the season and control their size.</span></p></div><span data-dcnode-id="747" instrument_node=""> </span><div class="mobile-only-min-height-250 ad-unit inline-ad" data-ad-unit-name="partner-A300-mobile" data-dcnode-id="746"></div><span data-dcnode-id="745" instrument_node=""> </span><div class="desktop-only-min-height-90 ad-unit inline-ad" data-ad-id="Leaf3" data-ad-unit-name="lowline-desktop" data-dcnode-id="743" data-is-refreshable="true" data-page-index="0"><div data-dcnode-id="744" data-has-intersected="true" id="Leaf3"></div></div><span data-dcnode-id="742" instrument_node=""> </span><div class="content" data-dcnode-id="736"><p data-dcnode-id="737"><span data-dcnode-id="741" instrument_node="">If you're planning an annual shearing, wait until after new growth has begun. Continue with follow-up shearing throughout the growing season, but stop by late summer, says </span><a data-dcnode-id="739" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.mortonarb.org/trees-plants/tree-and-plant-advice/horticulture-care/pruning-evergreens" rel="nofollow noopener"><span data-dcnode-id="740" instrument_node="">Morton Arboretum</span></a><span data-dcnode-id="738" instrument_node="">. You don't want to stimulate growth in autumn because the new shoots will be prone to winter injury.</span></p></div><span data-dcnode-id="735" instrument_node=""> </span><div class="content" data-dcnode-id="729"><p data-dcnode-id="730"><span data-dcnode-id="734" instrument_node="">As you prune, keep the natural growth pattern of yews in mind. Clipping the tops will slow growth to a snail's pace for the rest of the growing season. You can finesse this by waiting to trim the tops until they're a few inches taller than the height you want them to be. The form of your yews is also important. Some varieties are naturally pyramidal. Maintain this form by trimming your yews so that the bottoms are somewhat wider than the tops to ensure that the bottom branches get enough sunlight, recommends </span><a data-dcnode-id="732" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.hawkslandscape.com/yew-pruning-winter-care-and-fertilizing/" rel="nofollow noopener"><span data-dcnode-id="733" instrument_node="">Hawks Landscape</span></a><span data-dcnode-id="731" instrument_node="">.</span></p></div><span data-dcnode-id="728" instrument_node=""> </span></div><span data-dcnode-id="726" instrument_node=""> </span><h2 class="title" data-dcnode-id="724" data-for="Pruning Overgrown Yews"><span data-dcnode-id="725" instrument_node=""> Pruning Overgrown Yews</span></h2><span data-dcnode-id="723" instrument_node=""> </span><div class="parts" data-dcnode-id="688"><span data-dcnode-id="722" instrument_node=""> </span><div class="content" data-dcnode-id="719"><p data-dcnode-id="720"><span data-dcnode-id="721" instrument_node="">If the front of your house has been overwhelmed by yew shrubs that have outgrown their site, take heart. You have a few good options.</span></p></div><span data-dcnode-id="718" instrument_node=""> </span><div class="content" data-dcnode-id="715"><p data-dcnode-id="716"><span data-dcnode-id="717" instrument_node="">Were these yews intended to be living, evergreen statuary, sheared into some rounded shape as front-of-the-house decorations? If so, your first and possibly best course of action is to let them grow out to their natural shape. Given time, they'll stop looking like shapeless lumps and become open and appealing large shrubs. As their branches spread and grow airy, you'll also admire their mahogany-brown, flaky bark.</span></p></div><span data-dcnode-id="714" instrument_node=""> </span><div class="content" data-dcnode-id="711"><p data-dcnode-id="712"><span data-dcnode-id="713" instrument_node="">Another option is severe pruning or cutting them back to a skeleton of naked branches. You're fortunate to have overgrown yews to deal with, rather than other types of evergreens that aren't able to recover from such heavy-handed pruning. Yews bounce back quickly from deep or even botched pruning cuts, so no worries.</span></p></div><span data-dcnode-id="710" instrument_node=""> </span><div class="content" data-dcnode-id="707"><p data-dcnode-id="708"><span data-dcnode-id="709" instrument_node="">How to prune a yew? Don't work only on the surface of the shrubs. Reach inside as well using long-handled lopping shears. Remove several of the longest branches by cutting them back to a branch connection. Then cut back dead, dying, diseased or broken branches till you reach healthy wood. These interior cuts stimulate latent buds to grow, so you'll end up with denser, more attractive plants in the long run.</span></p></div><span data-dcnode-id="706" instrument_node=""> </span><div class="section" data-dcnode-id="690" id="things-needed"><span data-dcnode-id="705" instrument_node=""> </span><h4 data-dcnode-id="703"><span data-dcnode-id="704" instrument_node="">Things You Will Need</span></h4><span data-dcnode-id="702" instrument_node=""> </span><ul data-dcnode-id="692"><span data-dcnode-id="701" instrument_node=""> </span><li data-dcnode-id="698"><p data-dcnode-id="699"><span data-dcnode-id="700" instrument_node="">Gardening gloves</span></p></li><span data-dcnode-id="697" instrument_node=""> </span><li data-dcnode-id="694"><p data-dcnode-id="695"><span data-dcnode-id="696" instrument_node="">Long-handled lopping shears</span></p></li><span data-dcnode-id="693" instrument_node=""> </span></ul><span data-dcnode-id="691" instrument_node=""> </span></div><span data-dcnode-id="689" instrument_node=""> </span></div></div><span data-dcnode-id="686" instrument_node=""> </span><div class="min-height-250 ad-unit main-ad" data-ad-id="Leaf4" data-ad-unit-name="main" data-dcnode-id="684" data-is-refreshable="true" data-page-index="0"><div data-dcnode-id="685" data-has-intersected="true" id="Leaf4"></div></div><span data-dcnode-id="683" instrument_node=""> </span><div class="hst-exco-player pbs" data-dcnode-id="679" data-exs-config="{&quot;customParams&quot;:{&quot;section1&quot;:&quot;&quot;,&quot;section2&quot;:&quot;&quot;,&quot;section3&quot;:&quot;&quot;,&quot;page_type2&quot;:&quot;&quot;,&quot;permutive&quot;:&quot;&quot;}}" data-pbs-position="static" data-pbs-root="true" id="bfd120c4-7961-4553-8db6-72038c76a9c1"><div class="pbs__player" data-dcnode-id="680" id="exp_049228ca-bbad-4736-9982-2cc424bceada"><div class="pb-stream" data-dcnode-id="681" id="video671266652a673646a-5973-4ad8-8552-05111f455cb9" style="width: 660px; height: 371px;"></div></div></div><span data-dcnode-id="678" instrument_node=""> </span><div class="dropdowns-wrapper" data-dcnode-id="621"><span data-dcnode-id="677" instrument_node=""> </span><div class="dropdowns-container" data-dcnode-id="623"><span data-dcnode-id="676" instrument_node=""> </span><div class="headings-line" data-dcnode-id="628"><span data-dcnode-id="675" instrument_node=""> </span><p class="heading" data-dcnode-id="673"><span data-dcnode-id="674" instrument_node="">References</span></p><span data-dcnode-id="672" instrument_node=""> </span><div class="dropdown-content" data-dcnode-id="653"><span data-dcnode-id="671" instrument_node=""> </span><ul data-dcnode-id="655"><li data-dcnode-id="666"><span data-dcnode-id="670" instrument_node=""> </span><a aria-label="http://www.mortonarb.org/trees-plants/tree-and-plant-advice/horticulture-care/pruning-evergreens" data-dcnode-id="668" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.mortonarb.org/trees-plants/tree-and-plant-advice/horticulture-care/pruning-evergreens" rel="nofollow"><span data-dcnode-id="669" instrument_node=""> Morton Arboretum: Pruning Evergreens </span></a><span data-dcnode-id="667" instrument_node=""> </span></li><li data-dcnode-id="661"><span data-dcnode-id="665" instrument_node=""> </span><a aria-label="http://www.hawkslandscape.com/yew-pruning-winter-care-and-fertilizing/" data-dcnode-id="663" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.hawkslandscape.com/yew-pruning-winter-care-and-fertilizing/" rel="nofollow"><span data-dcnode-id="664" instrument_node=""> Hawks Landscape: Yew Pruning and winter Care </span></a><span data-dcnode-id="662" instrument_node=""> </span></li><li data-dcnode-id="656"><span data-dcnode-id="660" instrument_node=""> </span><a aria-label="https://www.bhg.com/gardening/plant-dictionary/shrub/yew/" data-dcnode-id="658" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.bhg.com/gardening/plant-dictionary/shrub/yew/" rel="nofollow"><span data-dcnode-id="659" instrument_node=""> BHG: Yew Shrub </span></a><span data-dcnode-id="657" instrument_node=""> </span></li></ul><span data-dcnode-id="654" instrument_node=""> </span></div><span data-dcnode-id="652" instrument_node=""> </span><p class="heading" data-dcnode-id="650"><span data-dcnode-id="651" instrument_node="">Warnings</span></p><span data-dcnode-id="649" instrument_node=""> </span><div class="dropdown-content" data-dcnode-id="639"><span data-dcnode-id="648" instrument_node=""> </span><ul data-dcnode-id="641"><li data-dcnode-id="646"><span data-dcnode-id="647" instrument_node=""> Dispose of yew clippings where they cannot be accessed by livestock. The clippings, even when dried, can kill cows, sheep, horses and goats. </span></li><li data-dcnode-id="644"><span data-dcnode-id="645" instrument_node=""> Tell young children never to pick or eat the bright red berries. Just a few of the yew's seeds can kill a small child. Plant male yews, which don't produce berries, to reduce this risk. </span></li><li data-dcnode-id="642"><span data-dcnode-id="643" instrument_node=""> It may take two to three years for your shrub to fully grow in after renovation pruning. </span></li></ul><span data-dcnode-id="640" instrument_node=""> </span></div><span data-dcnode-id="638" instrument_node=""> </span><p class="heading" data-dcnode-id="636"><span data-dcnode-id="637" instrument_node="">Writer Bio</span></p><span data-dcnode-id="635" instrument_node=""> </span><div class="dropdown-content" data-dcnode-id="630"><span data-dcnode-id="634" instrument_node=""> </span><p data-dcnode-id="632"><span data-dcnode-id="633" instrument_node="">From Alaska to California, from France's Basque Country to Mexico's Pacific Coast, Teo Spengler has dug the soil, planted seeds and helped trees, flowers and veggies thrive. A professional writer and consummate gardener, Spengler has written about home and garden for Gardening Know How, San Francisco Chronicle, Gardening Guide and Go Banking Rates. She earned a BA from U.C. Santa Cruz, a law degree from U.C. Berkeley's Boalt Hall, and an MA and MFA from San Francisco State. She currently divides her life between San Francisco and southwestern France.</span></p><span data-dcnode-id="631" instrument_node=""> </span></div><span data-dcnode-id="629" instrument_node=""> </span></div><span data-dcnode-id="627" instrument_node=""> </span><div class="dropdown-content-target" data-dcnode-id="625"><span data-dcnode-id="626" instrument_node=""> </span></div><span data-dcnode-id="624" instrument_node=""> </span></div><span data-dcnode-id="622" instrument_node=""> </span></div><span data-dcnode-id="620" instrument_node=""> </span><div class="mobile-only-min-height-250 ad-
