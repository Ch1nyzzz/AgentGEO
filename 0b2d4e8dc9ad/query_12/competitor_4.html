r"><span data-dcnode-id="1774" instrument_node="">Table of Contents</span></h6><ul data-dcnode-id="1736"><li data-dcnode-id="1769"><a class="LinkBase-sc-2ngoxx-0 gEoinl backyard link size--medium color--interactive" color="interactive" data-dcnode-id="1770" data-id="WhyPrune?" href="#WhyPrune?"><span class="label link-label" data-dcnode-id="1771"><span data-dcnode-id="1772" instrument_node="">Why Prune?</span></span></a></li><li data-dcnode-id="1765"><a class="LinkBase-sc-2ngoxx-0 gEoinl backyard link size--medium color--interactive" color="interactive" data-dcnode-id="1766" data-id="WhentoPrune" href="#WhentoPrune"><span class="label link-label" data-dcnode-id="1767"><span data-dcnode-id="1768" instrument_node="">When to Prune</span></span></a></li><li data-dcnode-id="1761"><a class="LinkBase-sc-2ngoxx-0 gEoinl backyard link size--medium color--interactive" color="interactive" data-dcnode-id="1762" data-id="PruninginSpring" href="#PruninginSpring"><span class="label link-label" data-dcnode-id="1763"><span data-dcnode-id="1764" instrument_node="">Pruning in Spring</span></span></a></li><li data-dcnode-id="1757"><a class="LinkBase-sc-2ngoxx-0 gEoinl backyard link size--medium color--interactive" color="interactive" data-dcnode-id="1758" data-id="PruninginSummer" href="#PruninginSummer"><span class="label link-label" data-dcnode-id="1759"><span data-dcnode-id="1760" instrument_node="">Pruning in Summer</span></span></a></li><li data-dcnode-id="1753"><a class="LinkBase-sc-2ngoxx-0 gEoinl backyard link size--medium color--interactive" color="interactive" data-dcnode-id="1754" data-id="PruningEvergreens" href="#PruningEvergreens"><span class="label link-label" data-dcnode-id="1755"><span data-dcnode-id="1756" instrument_node="">Pruning Evergreens</span></span></a></li><li data-dcnode-id="1749"><a class="LinkBase-sc-2ngoxx-0 gEoinl backyard link size--medium color--interactive" color="interactive" data-dcnode-id="1750" data-id="UnderstandingGrowthBuds" href="#UnderstandingGrowthBuds"><span class="label link-label" data-dcnode-id="1751"><span data-dcnode-id="1752" instrument_node="">Understanding Growth Buds</span></span></a></li><li data-dcnode-id="1745"><a class="LinkBase-sc-2ngoxx-0 gEoinl backyard link size--medium color--interactive" color="interactive" data-dcnode-id="1746" data-id="PruningCuts" href="#PruningCuts"><span class="label link-label" data-dcnode-id="1747"><span data-dcnode-id="1748" instrument_node="">Pruning Cuts</span></span></a></li><li data-dcnode-id="1741"><a class="LinkBase-sc-2ngoxx-0 gEoinl backyard link size--medium color--interactive" color="interactive" data-dcnode-id="1742" data-id="ReasonstoContactanArborist" href="#ReasonstoContactanArborist"><span class="label link-label" data-dcnode-id="1743"><span data-dcnode-id="1744" instrument_node="">Reasons to Contact an Arborist</span></span></a></li><li data-dcnode-id="1737"><a class="LinkBase-sc-2ngoxx-0 gEoinl backyard link size--medium color--interactive" color="interactive" data-dcnode-id="1738" data-id="PruningTools" href="#PruningTools"><span class="label link-label" data-dcnode-id="1739"><span data-dcnode-id="1740" instrument_node="">Pruning Tools</span></span></a></li></ul></nav><div class="sc-hKwDye hRtSae" data-dcnode-id="1343" id="article-content-wrapper"><div class="sc-eGPXGI kmNxBt head-section--mobile" data-dcnode-id="1731"><div class="sc-gsDKAQ epSHBn" data-dcnode-id="1734"></div><div class="sc-gsDKAQ epSHBn" data-dcnode-id="1733"></div><div class="sc-gsDKAQ epSHBn" data-dcnode-id="1732"></div></div><div data-dcnode-id="1638" style="display: contents;"><section class="sc-bqiRlB mDTQC" data-dcnode-id="1639" id="WhyPrune?"><h2 class="styles__H2-sc-11vpuyu-1 irzRON typography variant--h2 align--left sc-1rfl5s_engage-common-0 AMMzD" color="text_primary" data-dcnode-id="1729"><span data-dcnode-id="1730" instrument_node="">Why Prune? </span></h2><div class="sc-1rfl5s_engage-common-1 ibmvuP" data-dcnode-id="1663"><div class="small-image-wrapper" data-dcnode-id="1722"><noscript data-dcnode-id="1728"></noscript><span class="d7qutn_engage-common-1 kyXdRh lazy-load-image-background opacity lazy-load-image-loaded" data-dcnode-id="1723" height="auto" width="100%"><picture data-dcnode-id="1724"><source data-dcnode-id="1727" srcset="https://mobileimages.lowes.com/marketingimages/30e5771e-d94a-448e-961b-ce0ab409d0c5/ht-pruning-branchestoremove.jpg?im=Scale,width=1,height=1&amp;fmt=webp" type="image/webp"><source data-dcnode-id="1726" srcset="https://mobileimages.lowes.com/marketingimages/30e5771e-d94a-448e-961b-ce0ab409d0c5/ht-pruning-branchestoremove.jpg?im=Scale,width=1,height=1" type="image/jpeg"><img alt="branches to remove when pruning" class="d7qutn_engage-common-0 ldZopE" data-dcnode-id="1725" data-placeholder="data:image/svg+xml;base64,PHN2ZyB4bWxucz0naHR0cDovL3d3dy53My5vcmcvMjAwMC9zdmcnIHZpZXdCb3g9JzAgMCAzIDInPjwvc3ZnPg==" height="auto" srcset="" title="" width="100%"></picture></span></div><div class="ifxsfn_engage-common-0 eWBThw" data-dcnode-id="1664"><p data-dcnode-id="1720"><span data-dcnode-id="1721" instrument_node="">A well-maintained tree or shrub is healthier and looks better — two very good reasons to learn how to prune correctly. Proper tree-pruning and shrub-pruning helps:</span></p><span data-dcnode-id="1719" instrument_node="">
</span><p data-dcnode-id="1713"><br data-dcnode-id="1718"><span data-dcnode-id="1717" instrument_node=""> </span><b data-dcnode-id="1715"><span data-dcnode-id="1716" instrument_node="">Maintain Safety:</span></b><span data-dcnode-id="1714" instrument_node=""> Remove low-growing branches if they impede passing vehicles or obscure oncoming traffic from view. You may also need to take out split or broken branches before they have the chance to come crashing down on a person, car or building. It's also wise to prune out low-hanging, whip-like branches (especially those with thorns) that may strike passersby.</span></p><span data-dcnode-id="1712" instrument_node="">
</span><p data-dcnode-id="1706"><br data-dcnode-id="1711"><span data-dcnode-id="1710" instrument_node=""> </span><b data-dcnode-id="1708"><span data-dcnode-id="1709" instrument_node="">Alter or Rejuvenate Growth:</span></b><span data-dcnode-id="1707" instrument_node=""> Neglected, overgrown shrubs can sometimes be turned into small multitrunked trees if you remove their lower limbs, which may be a better approach than digging out the shrub and planting another in its place.</span></p><span data-dcnode-id="1705" instrument_node="">
</span><p data-dcnode-id="1699"><br data-dcnode-id="1704"><span data-dcnode-id="1703" instrument_node=""> </span><b data-dcnode-id="1701"><span data-dcnode-id="1702" instrument_node="">Direct Growth:</span></b><span data-dcnode-id="1700" instrument_node=""> Pruning influences the direction in which a plant grows: Each time you make a cut, you stop growth in one direction and encourage it in another. This principle is important to keep in mind when you train young trees to develop a strong branching structure.</span></p><span data-dcnode-id="1698" instrument_node="">
</span><p data-dcnode-id="1692"><br data-dcnode-id="1697"><span data-dcnode-id="1696" instrument_node=""> </span><b data-dcnode-id="1694"><span data-dcnode-id="1695" instrument_node="">Remove Undesirable Growth:</span></b><span data-dcnode-id="1693" instrument_node=""> Prune out unwanted growth periodically. Cut out wayward branches, take out thin growth, remove suckers (stems growing up from the roots) and water sprouts (upright shoots growing from the trunk and branches).</span></p><span data-dcnode-id="1691" instrument_node="">
</span><p data-dcnode-id="1682"><br data-dcnode-id="1690"><span data-dcnode-id="1689" instrument_node=""> </span><b data-dcnode-id="1687"><span data-dcnode-id="1688" instrument_node="">Promote Plant Health:</span></b><span data-dcnode-id="1686" instrument_node=""> Trees and shrubs stay </span><a data-dcnode-id="1684" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.lowes.com/pl/Plant-care-Plant-care-protection-Plants-planters-Lawn-garden/4294612529"><span data-dcnode-id="1685" instrument_node="">healthier</span></a><span data-dcnode-id="1683" instrument_node=""> if you remove branches that are diseased, dead, pest-ridden or rubbing together.</span></p><span data-dcnode-id="1681" instrument_node="">
</span><p data-dcnode-id="1675"><br data-dcnode-id="1680"><span data-dcnode-id="1679" instrument_node=""> </span><b data-dcnode-id="1677"><span data-dcnode-id="1678" instrument_node="">Create Particular Shapes:</span></b><span data-dcnode-id="1676" instrument_node=""> You can prune a line of closely planted trees or shrubs as a unit to create a hedge. If you're a hobbyist who practices topiary, you can prune trees and shrubs into fanciful shapes.</span></p><span data-dcnode-id="1674" instrument_node="">
</span><p data-dcnode-id="1665"><br data-dcnode-id="1673"><span data-dcnode-id="1672" instrument_node=""> </span><b data-dcnode-id="1670"><span data-dcnode-id="1671" instrument_node="">Produce More Flowers or Fruits:</span></b><span data-dcnode-id="1669" instrument_node=""> </span><a data-dcnode-id="1667" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.lowes.com/l/gardencenter.html"><span data-dcnode-id="1668" instrument_node="">Flowering plants</span></a><span data-dcnode-id="1666" instrument_node=""> and some fruit trees are pruned to increase the yield of blossoms and fruit, and to improve their quality. You'll need, for example, to remove spent flowers from roses throughout their bloom time. For some fruit trees, you'll make many small, precise cuts each dormant season. Although this sort of pruning sometimes ranks as a tedious chore, remember that your efforts will pay off in lavish bloom and generous crops of fruit at harvest time.</span></p></div></div><div class="sc-1rfl5s_engage-common-4 knhOhO" data-dcnode-id="1640"><div data-dcnode-id="1641" style="display: contents;"><div class="sc-dkPtRN iyickD" data-dcnode-id="1642"><div class="sc-1ss2zi5_engage-common-0 jmFMHH" data-dcnode-id="1643" data-testid="shopLinks"><div class="sc-1ss2zi5_engage-common-1 kUovJn" data-dcnode-id="1644"><a class="LinkBase-sc-2ngoxx-0 bGZDJC backyard link size--medium color--interactive sc-1ss2zi5_engage-common-2 cUlSPk" color="interactive" data-dcnode-id="1657" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.lowes.com/pl/Hedge-trimmers-Trimmers-edgers-Outdoor-tools-equipment-Outdoors/4294612633"><span class="label link-label bold" data-dcnode-id="1658"><span data-dcnode-id="1662" instrument_node="">Shop Hedge Trimmers</span><span class="link-end-icon" data-dcnode-id="1659"><svg aria-hidden="true" class="styles__StyledSVG-sc-1houmlx-0 eSCqIh icon icon-chevron-right" color="text_primary" data-dcnode-id="1660" role="presentation" viewBox="0 0 24 24"><path d="M8.88 4L7 5.88 13.1067 12 7 18.12 8.88 20l8-8z" data-dcnode-id="1661" fill-rule="evenodd"></path></svg></span></span></a><a class="LinkBase-sc-2ngoxx-0 bGZDJC backyard link size--medium color--interactive sc-1ss2zi5_engage-common-2 cUlSPk" color="interactive" data-dcnode-id="1651" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.lowes.com/pl/Hand-pruning-tools-Lawn-garden-hand-tools-Outdoor-tools-equipment-Outdoors/4294612734"><span class="label link-label bold" data-dcnode-id="1652"><span data-dcnode-id="1656" instrument_node="">Shop Hand Pruning Tools</span><span class="link-end-icon" data-dcnode-id="1653"><svg aria-hidden="true" class="styles__StyledSVG-sc-1houmlx-0 eSCqIh icon icon-chevron-right" color="text_primary" data-dcnode-id="1654" role="presentation" viewBox="0 0 24 24"><path d="M8.88 4L7 5.88 13.1067 12 7 18.12 8.88 20l8-8z" data-dcnode-id="1655" fill-rule="evenodd"></path></svg></span></span></a><a class="LinkBase-sc-2ngoxx-0 bGZDJC backyard link size--medium color--interactive sc-1ss2zi5_engage-common-2 cUlSPk" color="interactive" data-dcnode-id="1645" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.lowes.com/c/Chainsaws-pole-saws-Outdoor-tools-equipment-Outdoors"><span class="label link-label bold" data-dcnode-id="1646"><span data-dcnode-id="1650" instrument_node="">Shop Chainsaws &amp; Pole Saws</span><span class="link-end-icon" data-dcnode-id="1647"><svg aria-hidden="true" class="styles__StyledSVG-sc-1houmlx-0 eSCqIh icon icon-chevron-right" color="text_primary" data-dcnode-id="1648" role="presentation" viewBox="0 0 24 24"><path d="M8.88 4L7 5.88 13.1067 12 7 18.12 8.88 20l8-8z" data-dcnode-id="1649" fill-rule="evenodd"></path></svg></span></span></a></div></div></div></div></div></section></div><div data-dcnode-id="1624" style="display: contents;"><section class="sc-bqiRlB mDTQC" data-dcnode-id="1625" id="WhentoPrune"><h2 class="styles__H2-sc-11vpuyu-1 irzRON typography variant--h2 align--left sc-1rfl5s_engage-common-0 AMMzD" color="text_primary" data-dcnode-id="1636"><span data-dcnode-id="1637" instrument_node="">When to Prune</span></h2><div class="ifxsfn_engage-common-0 eWBThw" data-dcnode-id="1626"><p data-dcnode-id="1634"><span data-dcnode-id="1635" instrument_node="">Pruning at the wrong time won’t damage plants, but it can sacrifice that year's flowers or fruit. As a rule of thumb, prune spring-flowering shrubs and trees immediately after the flowers fade. Prune summer-blooming trees and shrubs in winter or early spring, before new growth emerges. In regions that have harsh winters, late-summer pruning encourages new growth that might not harden before the cold settles in.</span></p><span data-dcnode-id="1633" instrument_node="">
</span><p data-dcnode-id="1627"><br data-dcnode-id="1632"><span data-dcnode-id="1631" instrument_node=""> These guidelines are most pertinent to climates with four distinct seasons and definite winter chill. In warmer winter areas, timing will vary depending on the particular plant's </span><a data-dcnode-id="1629" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//plantguide.lowes.com/ColdHardinessMap.aspx" target="_blank"><span data-dcnode-id="1630" instrument_node="">native climate</span></a><span data-dcnode-id="1628" instrument_node="">. If you have any doubts about the best time to prune a particular plant, ask your Lowe's nursery specialist or your cooperative extension office for advice.</span></p></div></section></div><div data-dcnode-id="1577" style="display: contents;"><section class="sc-bqiRlB mDTQC" data-dcnode-id="1578" id="PruninginSpring"><h2 class="styles__H2-sc-11vpuyu-1 irzRON typography variant--h2 align--left sc-1rfl5s_engage-common-0 AMMzD" color="text_primary" data-dcnode-id="1622"><span data-dcnode-id="1623" instrument_node="">Pruning in Spring</span></h2><div class="sc-1rfl5s_engage-common-1 ibmvuP" data-dcnode-id="1579"><div class="small-image-wrapper" data-dcnode-id="1615"><noscript data-dcnode-id="1621"></noscript><span class="d7qutn_engage-common-1 kyXdRh lazy-load-image-background opacity lazy-load-image-loaded" data-dcnode-id="1616" height="auto" width="100%"><picture data-dcnode-id="1617"><source data-dcnode-id="1620" srcset="https://mobileimages.lowes.com/marketingimages/a81a8e7d-7836-4c84-aee3-7c6372a87ee7/ht-pruning-heavybranches.jpg?im=Scale,width=1,height=1&amp;fmt=webp" type="image/webp"><source data-dcnode-id="1619" srcset="https://mobileimages.lowes.com/marketingimages/a81a8e7d-7836-4c84-aee3-7c6372a87ee7/ht-pruning-heavybranches.jpg?im=Scale,width=1,height=1" type="image/jpeg"><img alt="Illustration of how to remove heavy branches." class="d7qutn_engage-common-0 ldZopE" data-dcnode-id="1618" data-placeholder="data:image/svg+xml;base64,PHN2ZyB4bWxucz0naHR0cDovL3d3dy53My5vcmcvMjAwMC9zdmcnIHZpZXdCb3g9JzAgMCAzIDInPjwvc3ZnPg==" height="auto" srcset="" title="" width="100%"></picture></span></div><div class="ifxsfn_engage-common-0 eWBThw" data-dcnode-id="1580"><p data-dcnode-id="1610"><span data-dcnode-id="1614" instrument_node="">Many plants, especially </span><a data-dcnode-id="1612" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.lowes.com/n/buying-guide/popular-shrubs-vines-and-trees-for-your-landscape"><span data-dcnode-id="1613" instrument_node="">deciduous trees and shrubs</span></a><span data-dcnode-id="1611" instrument_node="">, are best pruned in late winter or early spring, just before they break dormancy. Once heavy frosts have abated, the plants are less likely to suffer cold damage at the point where you make your cuts. Deciduous plants are still bare, so you can easily spot broken and awkwardly growing branches and decide how to direct growth. And because growth will soon start, your pruning cuts will stimulate new growth in the direction you want.</span></p><span data-dcnode-id="1609" instrument_node="">
</span><p data-dcnode-id="1606"><br data-dcnode-id="1608"><span data-dcnode-id="1607" instrument_node=""> For flowering trees and shrubs, you'll need to know whether the flowers are produced on old or new growth. If early spring flowers come on last year's wood — as in the case of forsythia, flowering quince and flowering trees such as peach and plum — you'll lose many flowers by pruning before plants break dormancy. It's best to leave tree trimming until flowering has finished. Plants such as cinquefoil, which bear flowers on leafy new growth formed in spring, can safely be pruned while dormant.</span></p><span data-dcnode-id="1605" instrument_node="">
</span><p data-dcnode-id="1602"><br data-dcnode-id="1604"><span data-dcnode-id="1603" instrument_node=""> When removing heavy branches, avoid ripping the bark by shortening the branch to a stub before cutting it off at the branch collar. Use a sharp pruning saw and make these three cuts as described below:</span></p><span data-dcnode-id="1601" instrument_node="">
</span><h5 data-dcnode-id="1598"><br data-dcnode-id="1600"><span data-dcnode-id="1599" instrument_node=""> Step 1: Cut From Below</span></h5><span data-dcnode-id="1597" instrument_node="">
</span><p data-dcnode-id="1595"><span data-dcnode-id="1596" instrument_node="">About a foot from the branch collar, make a cut from the underside approximately a third of the way through.</span></p><span data-dcnode-id="1594" instrument_node="">
</span><h5 data-dcnode-id="1591"><br data-dcnode-id="1593"><span data-dcnode-id="1592" instrument_node=""> Step 2: Cut the Branch Top</span></h5><span data-dcnode-id="1590" instrument_node="">
</span><p data-dcnode-id="1588"><span data-dcnode-id="1589" instrument_node="">About an inch further out on the branch, cut through the top until the branch rips off. The branch should split cleanly between the two cuts.</span></p><span data-dcnode-id="1587" instrument_node="">
</span><h5 data-dcnode-id="1584"><br data-dcnode-id="1586"><span data-dcnode-id="1585" instrument_node=""> Step 3: Cut to the Branch Collar</span></h5><span data-dcnode-id="1583" instrument_node="">
</span><p data-dcnode-id="1581"><span data-dcnode-id="1582" instrument_node="">Make the final cut by placing the saw beside the branch bark ridge and cutting downward just outside the branch collar. (If the branch angle is very narrow, cut upward from the bottom to avoid cutting into the branch collar.)</span></p></div></div></section></div><div data-dcnode-id="1570" style="display: contents;"><section class="sc-bqiRlB mDTQC" data-dcnode-id="1571" id="PruninginSummer"><h2 class="styles__H2-sc-11vpuyu-1 irzRON typography variant--h2 align--left sc-1rfl5s_engage-common-0 AMMzD" color="text_primary" data-dcnode-id="1575"><span data-dcnode-id="1576" instrument_node="">Pruning in Summer</span></h2><div class="ifxsfn_engage-common-0 eWBThw" data-dcnode-id="1572"><p data-dcnode-id="1573"><span data-dcnode-id="1574" instrument_node="">A second time to prune is in late summer. Some gardeners like to thin plants in summer because it's easier to see how much thinning is really needed when branches still have thick foliage. And because growth is slower at this time of year, pruning is less likely to stimulate new growth — an advantage when you're thinning. In cold-winter regions, don't do summer pruning later than one month before the first frost. If you do, an early frost may damage the plant at the point of the cuts.</span></p></div></section></div><div data-dcnode-id="1553" style="display: contents;"><section class="sc-bqiRlB mDTQC" data-dcnode-id="1554" id="PruningEvergreens"><h2 class="styles__H2-sc-11vpuyu-1 irzRON typography variant--h2 align--left sc-1rfl5s_engage-common-0 AMMzD" color="text_primary" data-dcnode-id="1568"><span data-dcnode-id="1569" instrument_node="">Pruning Evergreens</span></h2><div class="ifxsfn_engage-common-0 eWBThw" data-dcnode-id="1555"><p data-dcnode-id="1560"><span data-dcnode-id="1567" instrument_node="">Although evergreen trees and shrubs don't drop their leaves, they approach a near-dormant state during the winter months. This group includes </span><a data-dcnode-id="1565" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.lowes.com/n/how-to/growing-trees-shrubs-privacy-screens"><span data-dcnode-id="1566" instrument_node="">broadleaf evergreens</span></a><span data-dcnode-id="1564" instrument_node=""> (such as boxwood and camellia) and </span><a data-dcnode-id="1562" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.lowes.com/pl/Pine--Trees-Plants-bulbs-seeds-Plants-planters-Lawn-garden/4294612540%3Frefinement%3D2810922122"><span data-dcnode-id="1563" instrument_node="">conifers</span></a><span data-dcnode-id="1561" instrument_node=""> (such as spruce and pine). Broadleaf evergreens are usually best pruned in late dormancy or in summer, as outlined above. For flowering broadleaf evergreens, however, timing is a bit more precise; you'll need to prune with an eye toward preserving flower buds. Prune after bloom for evergreens flowering on last season's growth; prune before spring growth begins for those that bloom on new growth.</span></p><span data-dcnode-id="1559" instrument_node="">
</span><p data-dcnode-id="1556"><br data-dcnode-id="1558"><span data-dcnode-id="1557" instrument_node=""> Most conifers are pruned only in their first two or three years in order to direct their basic shape; it's best to leave them alone from then on. Some of the most badly botched pruning you'll see is on conifers that have been pruned too severely — usually to keep them confined to a location that's too small — although a few conifers, including arborvitae, yew and hemlock, lend themselves to shearing into hedges.</span></p></div></section></div><div data-dcnode-id="1526" style="display: contents;"><section class="sc-bqiRlB mDTQC" data-dcnode-id="1527" id="UnderstandingGrowthBuds"><h2 class="styles__H2-sc-11vpuyu-1 irzRON typography variant--h2 align--left sc-1rfl5s_engage-common-0 AMMzD" color="text_primary" data-dcnode-id="1551"><span data-dcnode-id="1552" instrument_node="">Understanding Growth Buds</span></h2><div class="ifxsfn_engage-common-0 eWBThw" data-dcnode-id="1528"><p data-dcnode-id="1547"><span data-dcnode-id="1550" instrument_node="">Pruning makes sense when you understand the role and locations of growth buds. Select the bud you want to keep and cut just beyond it. The resulting growth will vary depending on the bud. You'll need to learn to recognize three different kinds of growth buds to get the effect you want.</span><br data-dcnode-id="1549"><span data-dcnode-id="1548" instrument_node=""> &nbsp;</span></p><span data-dcnode-id="1546" instrument_node="">
</span><ul class="list-disc" data-dcnode-id="1529"><span data-dcnode-id="1545" instrument_node="">
</span><li data-dcnode-id="1541"><b data-dcnode-id="1543"><span data-dcnode-id="1544" instrument_node="">Terminal buds</span></b><span data-dcnode-id="1542" instrument_node=""> grow at the tip of a shoot and cause the shoot to grow longer. These buds produce hormones that move downward along the shoot, inhibiting the growth of other buds on that shoot.</span></li><span data-dcnode-id="1540" instrument_node="">
</span><li data-dcnode-id="1536"><b data-dcnode-id="1538"><span data-dcnode-id="1539" instrument_node="">Lateral buds</span></b><span data-dcnode-id="1537" instrument_node=""> grow along the sides of a shoot and give rise to the sideways growth that makes a plant bushy. These buds stay dormant until the shoot has grown long enough to diminish the influence of the hormones produced by the terminal bud or until the terminal bud is pruned off — before they begin their growth. If you remove lateral buds, you'll redirect growth to the terminal bud; the shoot will lengthen dramatically and tend to grow upward.</span></li><span data-dcnode-id="1535" instrument_node="">
</span><li data-dcnode-id="1531"><b data-dcnode-id="1533"><span data-dcnode-id="1534" instrument_node="">Latent buds</span></b><span data-dcnode-id="1532" instrument_node=""> lie dormant beneath the bark. If a branch breaks or is cut off just above a latent bud, the bud may develop a new shoot to replace the wood that's been removed. If you need to repair a damaged plant, look for a latent bud and cut above it.</span></li><span data-dcnode-id="1530" instrument_node="">
</span></ul></div></section></div><div data-dcnode-id="1426" style="display: contents;"><section class="sc-bqiRlB mDTQC" data-dcnode-id="1427" id="PruningCuts"><h2 class="styles__H2-sc-11vpuyu-1 irzRON typography variant--h2 align--left sc-1rfl5s_engage-common-0 AMMzD" color="text_primary" data-dcnode-id="1524"><span data-dcnode-id="1525" instrument_node="">Pruning Cuts</span></h2><div class="sc-1rfl5s_engage-common-1 ibmvuP" data-dcnode-id="1511"><div class="small-image-wrapper" data-dcnode-id="1517"><noscript data-dcnode-id="1523"></noscript><span class="d7qutn_engage-common-1 kyXdRh lazy-load-image-background opacity lazy-load-image-loaded" data-dcnode-id="1518" height="auto" width="100%"><picture data-dcnode-id="1519"><source data-dcnode-id="1522" srcset="https://mobileimages.lowes.com/marketingimages/6c4cc868-52be-4d0d-a9f3-a3b19b62da25/ht-pruning-cuttingabovebud.jpg?im=Scale,width=1,height=1&amp;fmt=webp" type="image/webp"><source data-dcnode-id="1521" srcset="https://mobileimages.lowes.com/marketingimages/6c4cc868-52be-4d0d-a9f3-a3b19b62da25/ht-pruning-cuttingabovebud.jpg?im=Scale,width=1,height=1" type="image/jpeg"><img alt="Pruning cuts illustration" class="d7qutn_engage-common-0 ldZopE" data-dcnode-id="1520" data-placeholder="data:image/svg+xml;base64,PHN2ZyB4bWxucz0naHR0cDovL3d3dy53My5vcmcvMjAwMC9zdmcnIHZpZXdCb3g9JzAgMCAzIDInPjwvc3ZnPg==" height="auto" srcset="" title="" width="100%"></picture></span></div><div class="ifxsfn_engage-common-0 eWBThw" data-dcnode-id="1512"><p data-dcnode-id="1513"><span data-dcnode-id="1516" instrument_node="">There are four basic pruning cuts, each aimed at producing a different effect. For cuts that involve cutting above a growth bud, make your cut as shown at left above. Angle it at about 45 degrees, with the lowest point of the cut opposite the bud and even with it — the highest point about 1/4 inch above the bud. Each of the steps below can be applied to your specific pruning need.</span><br data-dcnode-id="1515"><span data-dcnode-id="1514" instrument_node=""> </span></p></div></div><div class="sc-1rfl5s_engage-common-4 knhOhO" data-dcnode-id="1428"><div data-dcnode-id="1429" style="display: contents;"><div class="sc-dkPtRN iyickD" data-dcnode-id="1430"><h4 class="styles__H4-sc-11vpuyu-3 mgkOZ typography variant--h4 align--left sc-fKVqWL ieJrAX" color="text_primary" data-dcnode-id="1509"><span data-dcnode-id="1510" instrument_node=""> </span></h4><div data-dcnode-id="1494" style="display: contents;"><div class="AccordionWrapper-pnamy6-0 FXZXv backyard accordion size--small shape--rounded opened sc-bBHxTw kaWTUp" data-dcnode-id="1495"><button class="accordion-header opened" data-dcnode-id="1503" tabindex="0" type="button"><h4 class="styles__H4-sc-11vpuyu-3 mgkOZ typography variant--h4 align--left accordion-title" color="text_primary" data-dcnode-id="1507"><span data-dcnode-id="1508" instrument_node="">Step 1: Pinching</span></h4><div class="accordion-icon" data-dcnode-id="1504"><svg aria-hidden="true" class="styles__StyledSVG-sc-1houmlx-0 eSCqIh icon icon-minus" color="text_primary" data-dcnode-id="1505" role="presentation" viewBox="0 0 24 24"><path d="M20 13.1429H4v-2.2858h16z" data-dcnode-id="1506" fill-rule="evenodd"></path></svg></div></button><span aria-hidden="true" class="accordion-content opened" data-dcnode-id="1496"><div class="ifxsfn_engage-common-0 eWBThw" data-dcnode-id="1497"><p data-dcnode-id="1498"><span data-dcnode-id="1502" instrument_node="">Pinching is one of the easiest ways to prune without cutting: You simply pinch off a terminal bud with your thumb and forefinger. This stops the stem from elongating and encourages bushy growth. It's typically done on </span><a data-dcnode-id="1500" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.lowes.com/pl/Plants-bulbs-seeds-Plants-planters-Lawn-garden/4294612566%3Frefinement%3D2490810268%2C3861871746"><span data-dcnode-id="1501" instrument_node="">annual and perennial flowers</span></a><span data-dcnode-id="1499" instrument_node=""> and on some vegetables. It's also used to direct growth of small-leaved shrubs and give the plant an even shape.</span></p></div></span></div></div><div data-dcnode-id="1474" style="display: contents;"><div class="AccordionWrapper-pnamy6-0 FXZXv backyard accordion size--small shape--rounded closed sc-bBHxTw kaWTUp" data-dcnode-id="1475"><button class="accordion-header closed" data-dcnode-id="1488" tabindex="0" type="button"><h4 class="styles__H4-sc-11vpuyu-3 mgkOZ typography variant--h4 align--left accordion-title" color="text_primary" data-dcnode-id="1492"><span data-dcnode-id="1493" instrument_node="">Step 2: Heading</span></h4><div class="accordion-icon" data-dcnode-id="1489"><svg aria-hidden="true" class="styles__StyledSVG-sc-1houmlx-0 eSCqIh icon icon-plus" color="text_primary" data-dcnode-id="1490" role="presentation" viewBox="0 0 24 24"><path d="M20 13.1429h-6.8571V20h-2.2858v-6.8571H4v-2.2858h6.8571V4h2.2858v6.8571H20z" data-dcnode-id="1491" fill-rule="evenodd"></path></svg></div></button><span aria-hidden="true" class="accordion-content closed" data-dcnode-id="1476"><div class="sc-1rfl5s_engage-common-1 ibmvuP" data-dcnode-id="1477"><div class="small-image-wrapper" data-dcnode-id="1481"><noscript data-dcnode-id="1487"></noscript><span class="d7qutn_engage-common-1 hSRWND lazy-load-image-background opacity" data-dcnode-id="1482" height="auto" width="100%"><picture data-dcnode-id="1483"><source data-dcnode-id="1486" data-srcset="https://mobileimages.lowes.com/marketingimages/9cff6b5d-0d36-4cfc-bf45-17e8615b476e/ht-pruning-heading.jpg?im=Scale,width=1,height=1&amp;fmt=webp" type="image/webp"><source data-dcnode-id="1485" data-srcset="https://mobileimages.lowes.com/marketingimages/9cff6b5d-0d36-4cfc-bf45-17e8615b476e/ht-pruning-heading.jpg?im=Scale,width=1,height=1" type="image/jpeg"><img alt="heading pruning cuts" class="d7qutn_engage-common-0 ldZopE" data-dcnode-id="1484" data-srcset="" height="auto" src="data:image/svg+xml;base64,PHN2ZyB4bWxucz0naHR0cDovL3d3dy53My5vcmcvMjAwMC9zdmcnIHZpZXdCb3g9JzAgMCAzIDInPjwvc3ZnPg==" srcset="data:image/svg+xml;base64,PHN2ZyB4bWxucz0naHR0cDovL3d3dy53My5vcmcvMjAwMC9zdmcnIHZpZXdCb3g9JzAgMCAzIDInPjwvc3ZnPg==" title="" width="100%"></picture></span></div><div class="ifxsfn_engage-common-0 eWBThw" data-dcnode-id="1478"><p data-dcnode-id="1479"><span data-dcnode-id="1480" instrument_node="">Heading means cutting farther back on the shoot than you would for pinching. In most cases, the lateral bud has already grown a leaf, and you cut right above the leaf. Usually done with handheld pruners, heading stimulates the buds just below the cut, encouraging dense growth.</span></p></div></div></span></div></div><div data-dcnode-id="1451" style="display: contents;"><div class="AccordionWrapper-pnamy6-0 FXZXv backyard accordion size--small shape--rounded closed sc-bBHxTw kaWTUp" data-dcnode-id="1452"><button class="accordion-header closed" data-dcnode-id="1468" tabindex="0" type="button"><h4 class="styles__H4-sc-11vpuyu-3 mgkOZ typography variant--h4 align--left accordion-title" color="text_primary" data-dcnode-id="1472"><span data-dcnode-id="1473" instrument_node="">Step 3: Shearing</span></h4><div class="accordion-icon" data-dcnode-id="1469"><svg aria-hidden="true" class="styles__StyledSVG-sc-1houmlx-0 eSCqIh icon icon-plus" color="text_primary" data-dcnode-id="1470" role="presentation" viewBox="0 0 24 24"><path d="M20 13.1429h-6.8571V20h-2.2858v-6.8571H4v-2.2858h6.8571V4h2.2858v6.8571H20z" data-dcnode-id="1471" fill-rule="evenodd"></path></svg></div></button><span aria-hidden="true" class="accordion-content closed" data-dcnode-id="1453"><div class="sc-1rfl5s_engage-common-1 ibmvuP" data-dcnode-id="1454"><div class="small-image-wrapper" data-dcnode-id="1461"><noscript data-dcnode-id="1467"></noscript><span class="d7qutn_engage-common-1 hSRWND lazy-load-image-background opacity" data-dcnode-id="1462" height="auto" width="100%"><picture data-dcnode-id="1463"><source data-dcnode-id="1466" data-srcset="https://mobileimages.lowes.com/marketingimages/e4568f9d-5688-49ba-8558-e257d1aa3cdb/ht-pruning-shearing.jpg?im=Scale,width=1,height=1&amp;fmt=webp" type="image/webp"><source data-dcnode-id="1465" data-srcset="https://mobileimages.lowes.com/marketingimages/e4568f9d-5688-49ba-8558-e257d1aa3cdb/ht-pruning-shearing.jpg?im=Scale,width=1,height=1" type="image/jpeg"><img alt="shearing pruning cuts" class="d7qutn_engage-common-0 ldZopE" data-dcnode-id="1464" data-srcset="" height="auto" src="data:image/svg+xml;base64,PHN2ZyB4bWxucz0naHR0cDovL3d3dy53My5vcmcvMjAwMC9zdmcnIHZpZXdCb3g9JzAgMCAzIDInPjwvc3ZnPg==" srcset="data:image/svg+xml;base64,PHN2ZyB4bWxucz0naHR0cDovL3d3dy53My5vcmcvMjAwMC9zdmcnIHZpZXdCb3g9JzAgMCAzIDInPjwvc3ZnPg==" title="" width="100%"></picture></span></div><div class="ifxsfn_engage-common-0 eWBThw" data-dcnode-id="1455"><p data-dcnode-id="1456"><span data-dcnode-id="1460" instrument_node="">Customarily used to create a hedge or a bush with spherical or square form, shearing is a form of heading that makes no attempt to cut back to a bud. Plants chosen for this treatment typically have many lateral buds close together, so you'll usually end up cutting near a bud. Shearing stimulates many buds to produce new growth; you'll be repeating the job regularly after you start. Because this method cuts right through leaves, it's best done on small-leaved plants, where damage is less noticeable. Use handheld or </span><a data-dcnode-id="1458" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.lowes.com/pl/Hedge-trimmers-Trimmers-edgers-Outdoor-tools-equipment-Outdoors/4294612633"><span data-dcnode-id="1459" instrument_node="">electric hedge shears</span></a><span data-dcnode-id="1457" instrument_node=""> for this kind of pruning.</span></p></div></div></span></div></div><div data-dcnode-id="1431" style="display: contents;"><div class="AccordionWrapper-pnamy6-0 FXZXv backyard accordion size--small shape--rounded closed sc-bBHxTw kaWTUp" data-dcnode-id="1432"><button class="accordion-header closed" data-dcnode-id="1445" tabindex="0" type="button"><h4 class="styles__H4-sc-11vpuyu-3 mgkOZ typography variant--h4 align--left accordion-title" color="text_primary" data-dcnode-id="1449"><span data-dcnode-id="1450" instrument_node="">Step 4: Thinning</span></h4><div class="accordion-icon" data-dcnode-id="1446"><svg aria-hidden="true" class="styles__StyledSVG-sc-1houmlx-0 eSCqIh icon icon-plus" color="text_primary" data-dcnode-id="1447" role="presentation" viewBox="0 0 24 24"><path d="M20 13.1429h-6.8571V20h-2.2858v-6.8571H4v-2.2858h6.8571V4h2.2858v6.8571H20z" data-dcnode-id="1448" fill-rule="evenodd"></path></svg></div></button><span aria-hidden="true" class="accordion-content closed" data-dcnode-id="1433"><div class="sc-1rfl5s_engage-common-1 ibmvuP" data-dcnode-id="1434"><div class="small-image-wrapper" data-dcnode-id="1438"><noscript data-dcnode-id="1444"></noscript><span class="d7qutn_engage-common-1 hSRWND lazy-load-image-background opacity" data-dcnode-id="1439" height="auto" width="100%"><picture data-dcnode-id="1440"><source data-dcnode-id="1443" data-srcset="https://mobileimages.lowes.com/marketingimages/8152bae2-5d04-49ff-b4c2-fe70ede401cc/ht-pruning-thinning.jpg?im=Scale,width=1,height=1&amp;fmt=webp" type="image/webp"><source data-dcnode-id="1442" data-srcset="https://mobileimages.lowes.com/marketingimages/8152bae2-5d04-49ff-b4c2-fe70ede401cc/ht-pruning-thinning.jpg?im=Scale,width=1,height=1" type="image/jpeg"><img alt="thinning pruning cuts" class="d7qutn_engage-common-0 ldZopE" data-dcnode-id="1441" data-srcset="" height="auto" src="data:image/svg+xml;base64,PHN2ZyB4bWxucz0naHR0cDovL3d3dy53My5vcmcvMjAwMC9zdmcnIHZpZXdCb3g9JzAgMCAzIDInPjwvc3ZnPg==" srcset="data:image/svg+xml;base64,PHN2ZyB4bWxucz0naHR0cDovL3d3dy53My5vcmcvMjAwMC9zdmcnIHZpZXdCb3g9JzAgMCAzIDInPjwvc3ZnPg==" title="" width="100%"></picture></span></div><div class="ifxsfn_engage-common-0 eWBThw" data-dcnode-id="1435"><p data-dcnode-id="1436"><span data-dcnode-id="1437" instrument_node="">This method reduces the bulk of a plant with minimal regrowth: Each cut removes an entire stem or branch, either back to its point of origin on the main stem or to the point where it joins another branch. Because you remove a number of lateral buds along with the stem or branch, you're less likely to wind up with clusters of unwanted shoots than you would when making heading cuts. (A common mistake of inexperienced gardeners is to make a heading cut when a thinning cut is needed.) Use handheld pruners, loppers or a pruning saw to make thinning cuts, depending on the thickness of the branch being cut.</span></p></div></div></span></div></div></div></div></div></section></div><div data-dcnode-id="1396" style="display: contents;"><section class="sc-bqiRlB mDTQC" data-dcnode-id="1397" id="ReasonstoContactanArborist"><h2 class="styles__H2-sc-11vpuyu-1 irzRON typography variant--h2 align--left sc-1rfl5s_engage-common-0 AMMzD" color="text_primary" data-dcnode-id="1424"><span data-dcnode-id="1425" instrument_node="">Reasons to Contact an Arborist</span></h2><div class="sc-1rfl5s_engage-common-1 ibmvuP" data-dcnode-id="1398"><div class="small-image-wrapper" data-dcnode-id="1417"><noscript data-dcnode-id="1423"></noscript><span class="d7qutn_engage-common-1 kyXdRh lazy-load-image-background opacity lazy-load-image-loaded" data-dcnode-id="1418" height="auto" width="100%"><picture data-dcnode-id="1419"><source data-dcnode-id="1422" srcset="https://mobileimages.lowes.com/marketingimages/a8bcaf96-2474-4b4f-9603-2e9f3937242e/DP18-164731-NPC-HT-GirdlingRoots-ACC.jpg?im=Scale,width=1,height=1&amp;fmt=webp" type="image/webp"><source data-dcnode-id="1421" srcset="https://mobileimages.lowes.com/marketingimages/a8bcaf96-2474-4b4f-9603-2e9f3937242e/DP18-164731-NPC-HT-GirdlingRoots-ACC.jpg?im=Scale,width=1,height=1" type="image/jpeg"><img alt="Small girdling tree roots growing around the trunk of a tree." class="d7qutn_engage-common-0 ldZopE" data-dcnode-id="1420" data-placeholder="data:image/svg+xml;base64,PHN2ZyB4bWxucz0naHR0cDovL3d3dy53My5vcmcvMjAwMC9zdmcnIHZpZXdCb3g9JzAgMCAzIDInPjwvc3ZnPg==" height="auto" srcset="" title="" width="100%"></picture></span></div><div class="ifxsfn_engage-common-0 eWBThw" data-dcnode-id="1399"><p data-dcnode-id="1415"><span data-dcnode-id="1416" instrument_node="">While pruning, thoroughly check your tree for the following conditions. Contact a professional arborist to address these issues or if you're unsure about the tree’s overall health:</span></p><span data-dcnode-id="1414" instrument_node="">
</span><ul class="list-disc" data-dcnode-id="1400"><span data-dcnode-id="1413" instrument_node="">
</span><li data-dcnode-id="1411"><span data-dcnode-id="1412" instrument_node="">Decayed or hollowed-out wood</span></li><span data-dcnode-id="1410" instrument_node="">
</span><li data-dcnode-id="1408"><span data-dcnode-id="1409" instrument_node="">Peeling bark</span></li><span data-dcnode-id="1407" instrument_node="">
</span><li data-dcnode-id="1405"><span data-dcnode-id="1406" instrument_node="">Raised soil or bare roots around the tree base</span></li><span data-dcnode-id="1404" instrument_node="">
</span><li data-dcnode-id="1402"><span data-dcnode-id="1403" instrument_node="">Girdling roots (roots wrapping around the tree’s trunk)</span></li><span data-dcnode-id="1401" instrument_node="">
</span></ul></div></div></section></div><div data-dcnode-id="1360" style="display: contents;"><section class="sc-bqiRlB mDTQC" data-dcnode-id="1361" id="PruningTools"><h2 class="styles__H2-sc-11vpuyu-1 irzRON typography variant--h2 align--left sc-1rfl5s_engage-common-0 AMMzD" color="text_primary" data-dcnode-id="1394"><span data-dcnode-id="1395" instrument_node="">Pruning Tools</span></h2><div class="ifxsfn_engage-common-0 eWBThw" data-dcnode-id="1362"><p data-dcnode-id="1390"><a data-dcnode-id="1392" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.lowes.com/pl/Hand-pruners-Hand-pruning-tools-Lawn-garden-hand-tools-Outdoor-tools-equipment-Outdoors/4294612732"><span data-dcnode-id="1393" instrument_node="">Hand Shears:</span></a><span data-dcnode-id="1391" instrument_node=""> Use for branches up to&nbsp;1/4&nbsp;inch in diameter. Scissor-type shears make tight, close cuts on plants. Hand shears are ideal for pruning hydrangeas. Test shears to make sure they fit your hand and feel comfortable.</span></p><span data-dcnode-id="1389" instrument_node="">
</span><p data-dcnode-id="1383"><br data-dcnode-id="1388"><span data-dcnode-id="1387" instrument_node=""> </span><a data-dcnode-id="1385" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.lowes.com/pl/Loppers-Hand-pruning-tools-Lawn-garden-hand-tools-Outdoor-tools-equipment-Outdoors/4294612731"><span data-dcnode-id="1386" instrument_node="">Lopping Shears:</span></a><span data-dcnode-id="1384" instrument_node=""> For use on branches up to 1-1/2 inches in diameter. Buy shears with lightweight handles for easy use. Extendable handles let you reach higher branches.</span></p><span data-dcnode-id="1382" instrument_node="">
</span><p data-dcnode-id="1376"><br data-dcnode-id="1381"><span data-dcnode-id="1380" instrument_node=""> </span><a data-dcnode-id="1378" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.lowes.com/pl/Pole-pruning-saws-Chainsaws-pole-saws-Outdoor-tools-equipment-Outdoors/4294612755"><span data-dcnode-id="1379" instrument_node="">Pruning Saws:</span></a><span data-dcnode-id="1377" instrument_node=""> Use for branches more than 1-1/2 inches in diameter. Coarse teeth cut on the pull stroke for easy and safe pruning.</span></p><span data-dcnode-id="1375" instrument_node="">
</span><p data-dcnode-id="1370"><b data-dcnode-id="1372"><br data-dcnode-id="1374"><span data-dcnode-id="1373" instrument_node=""> Pole Pruners:</span></b><span data-dcnode-id="1371" instrument_node=""> For branches more than 1 inch thick and beyond arm’s reach. Pole pruners feature a pruning shear head or saw that works via rope action. Look for pruners with a handle that disassembles for easy storage.</span></p><span data-dcnode-id="1369" instrument_node="">
