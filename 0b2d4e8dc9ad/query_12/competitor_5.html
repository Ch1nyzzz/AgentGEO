    </span></div></div></div><span data-dcnode-id="446" instrument_node=""> </span></div><div class="component-article-section-content ui-body article-section-content" data-dcnode-id="440"><p data-dcnode-id="442"><span data-dcnode-id="443" instrument_node="">The genus Euonymus contains dozens of plants, including shrubs that are either deciduous types or broadleaf evergreens, with leaves rather than needles. Euonymus shrubs have many garden uses, but they're vigorous growers and a bit of pruning is sometimes in order, either to improve a plant's shape, to remove damaged branches or to help keep its size under control.</span></p><span data-dcnode-id="441" instrument_node="">
</span></div><div class="component-article-section-inline-ad" data-dcnode-id="433"><div class="inline-ad inline-ad--mobile" data-dcnode-id="434"><p class="inline-ad__label ui-label" data-dcnode-id="438"><span data-dcnode-id="439" instrument_node="">

    Choosing the Time
  </span></h2></div><div class="component-article-section-content ui-body article-section-content" data-dcnode-id="404"><p data-dcnode-id="406"><span data-dcnode-id="407" instrument_node="">It's best to prune a euonymus shrub either at the end of winter or in early spring, when it's poised to put out new growth. For a deciduous plant, this timing also lets you to see the "skeleton" of the shrub, making it easier to decide what to remove. Some euonymus shrubs are spring-bloomers -- these include the European spindletree (Euonymus europaeus), which grows in U.S Department of Agriculture plant hardiness zones 4 through 7. To enjoy their flowers, delay pruning these plants until just after they bloom -- this allows enough time for new buds to form before winter arrives. Don't prune a euonymus in late summer or fall, because new growth may be damaged by winter's cold.</span></p><span data-dcnode-id="405" instrument_node="">
</span></div><div class="component-article-section-inline-ad" data-dcnode-id="397"><div class="inline-ad inline-ad--mobile" data-dcnode-id="398"><p class="inline-ad__label ui-label" data-dcnode-id="402"><span data-dcnode-id="403" instrument_node="">

    </span></p><span data-dcnode-id="401" instrument_node=""> </span><div class="inline-ad__wrapper inline-ad__wrapper_runway" data-dcnode-id="399"><div class="component-ad-gpt ad slot ad-mobile" data-ad-batch="1" data-ad-bidding="true" data-ad-breakpoint="small" data-ad-path="/6117/hunker.mw/slot1-2" data-ad-refresh="false" data-ad-sizes="[[300,250]]" data-ad-targeting="{&quot;loc&quot;:&quot;ad_2&quot;}" data-ad-type="gpt" data-dcnode-id="400" id="slot1-2" reveadrefresh="false"></div></div></div></div><div class="component-article-section-heading article-section-content" data-dcnode-id="394"><h2 data-dcnode-id="395" id="shaping-a-plant"><span data-dcnode-id="396" instrument_node="">
    Shaping a Plant
  </span></h2></div><div class="component-article-section-content ui-body article-section-content" data-dcnode-id="390"><p data-dcnode-id="392"><span data-dcnode-id="393" instrument_node="">Most euonymus shrubs have a naturally pleasing shape, but sometimes a mature plant might look a bit leggy, with some open space between branches, a problem that can be corrected by pruning. Pinching back growing tips of young shoots stimulates new growth at the outer limits of a shrub, increasing its overall bushiness. Deciduous shrubs respond well to shearing with a hedge trimmer, held parallel to the plant's surface while cutting back outer branches. Avoid shearing an evergreen euonymus -- it's best to thin it by removing several branches at their origins, helping preserve a more natural look and avoiding the appearance of cut foliage at its surface. To prevent spread of plant diseases, disinfect your cutting blades by wiping them with rubbing alcohol between cuts.</span></p><span data-dcnode-id="391" instrument_node="">
</span></div><div class="component-article-section-inline-ad" data-dcnode-id="383"><div class="inline-ad inline-ad--mobile" data-dcnode-id="384"><p class="inline-ad__label ui-label" data-dcnode-id="388"><span data-dcnode-id="389" instrument_node="">
      Advertisement
    </span></p><span data-dcnode-id="387" instrument_node=""> </span><div class="inline-ad__wrapper" data-dcnode-id="385"><div class="component-ad-gpt ad slot ad-mobile" data-ad-batch="2" data-ad-bidding="true" data-ad-breakpoint="small" data-ad-path="/6117/hunker.mw/slot1-3" data-ad-refresh="false" data-ad-sizes="[[300,250],[320,50],[320,100]]" data-ad-targeting="{&quot;loc&quot;:&quot;ad_3&quot;}" data-ad-type="gpt" data-dcnode-id="386" id="slot1-3" reveadrefresh="false"></div></div></div></div><div class="component-article-section-heading article-section-content" data-dcnode-id="380"><h2 data-dcnode-id="381" id="controlling-size"><span data-dcnode-id="382" instrument_node="">
    Controlling Size
  </span></h2></div><div class="component-article-section-content ui-body article-section-content" data-dcnode-id="376"><p data-dcnode-id="378"><span data-dcnode-id="379" instrument_node="">If a euonymus shrub has outgrown its space, you can prune it to bring it back within bounds. Head back main branches by about one-third to one-half on all sides of the plant, cutting at a spot just ahead of a bud or a smaller, lateral branch -- choose buds or lateral branches that point in the direction you want to see new growth. Make your cuts on a slant, cutting about 1/4 inch ahead of a bud or lateral branch. It's also a good idea to cut branches at slightly different lengths around the plant to keep its shape looking natural as it puts out new growth.</span></p><span data-dcnode-id="377" instrument_node="">
</span></div><div class="component-article-section-inline-ad" data-dcnode-id="369"><div class="inline-ad inline-ad--mobile" data-dcnode-id="370"><p class="inline-ad__label ui-label" data-dcnode-id="374"><span data-dcnode-id="375" instrument_node="">
      Advertisement
    </span></p><span data-dcnode-id="373" instrument_node=""> </span><div class="inline-ad__wrapper" data-dcnode-id="371"><div class="component-ad-gpt ad slot ad-mobile" data-ad-batch="2" data-ad-bidding="true" data-ad-breakpoint="small" data-ad-path="/6117/hunker.mw/slot1-4" data-ad-refresh="false" data-ad-sizes="[[300,250],[320,50],[320,100]]" data-ad-targeting="{&quot;loc&quot;:&quot;ad_4&quot;}" data-ad-type="gpt" data-dcnode-id="372" id="slot1-4" reveadrefresh="false"></div></div></div></div><div class="component-article-section-heading article-section-content" data-dcnode-id="366"><h2 data-dcnode-id="367" id="maintaining-health"><span data-dcnode-id="368" instrument_node="">
    Maintaining Health
  </span></h2></div><div class="component-article-section-content ui-body article-section-content" data-dcnode-id="362"><p data-dcnode-id="364"><span data-dcnode-id="365" instrument_node="">Pruning also helps maintain a healthy shrub. Examine the plant at the end of winter and remove any branches damaged or broken by storms, and monitor it for any other damage during the growing season, removing branches as needed. Euonymus shrubs are are usually disease- and pest-free, but some types, including the European spindletree, can develop mildew or other fungal problems, causing leaves and twigs to blacken and die. Prune these branches back, cutting into healthy tissue just behind the affected area. Fungal problems are best prevented by planting a euonymus in an area with good air circulation, using a soaker hose to avoid wetting foliage and clearing away debris from under the plant regularly.</span></p><span data-dcnode-id="363" instrument_node="">
</span></div><div class="component-article-section-inline-ad" data-dcnode-id="355"><div class="inline-ad inline-ad--mobile" data-dcnode-id="356"><p class="inline-ad__label ui-label" data-dcnode-id="360"><span data-dcnode-id="361" instrument_node="">
