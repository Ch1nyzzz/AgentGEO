</span><p data-dcnode-id="3105"><span data-dcnode-id="3106" instrument_node="">Shrub roses are a popular garden plant, and for good reason: they are beautiful and smell wonderful. They are easy to take care of, but if you want a healthier shrub rose with more blooms, you will have to prune it. Knowing how to prune a rose properly is very important. How you care for the rose afterwards is also important, as improper care can result in pests or disease.

</span><b class="whb" data-dcnode-id="2751"><span data-dcnode-id="2759" instrument_node="">Cut at 45-degree angles, </span><span class="frac nowrap" data-dcnode-id="2753"><sup data-dcnode-id="2757"><span data-dcnode-id="2758" instrument_node="">1</span></sup><span data-dcnode-id="2756" instrument_node="">⁄</span><sub data-dcnode-id="2754"><span data-dcnode-id="2755" instrument_node="">4</span></sub></span><span data-dcnode-id="2752" instrument_node=""> inch (0.64&nbsp;cm) above outward-facing buds.</span></b><span data-dcnode-id="2750" instrument_node=""> Outward-facing buds are buds that are facing you (or away from the center of the plant). The highest part of the angle should be on the same side as the bud. This will help prevent water from dripping into the bud which could lead to rot and decay.</span><sup aria-label="Link to Reference 5" class="reference" data-dcnode-id="2734" id="_ref-5"><a data-dcnode-id="2748" href="#_note-5"><span data-dcnode-id="2749" instrument_node="">[5]</span></a><span class="ts_popup" data-dcnode-id="2736" hidden="" id="ts_popup_5" style="display: none;"><span data-dcnode-id="2747" instrument_node="">

</span><ul data-dcnode-id="2701"><span data-dcnode-id="2732" instrument_node="">
</span><li data-dcnode-id="2730"><span data-dcnode-id="2731" instrument_node="">You will be using this technique for all parts of the rose, unless otherwise noted. Consider practicing on a few dead stems to get the hang of it.</span></li><span data-dcnode-id="2729" instrument_node="">
</span><li data-dcnode-id="2703"><span data-dcnode-id="2728" instrument_node="">Don't cut closer than </span><span class="frac nowrap" data-dcnode-id="2722"><sup data-dcnode-id="2726"><span data-dcnode-id="2727" instrument_node="">1</span></sup><span data-dcnode-id="2725" instrument_node="">⁄</span><sub data-dcnode-id="2723"><span data-dcnode-id="2724" instrument_node="">4</span></sub></span><span data-dcnode-id="2721" instrument_node=""> inch (0.64&nbsp;cm), or you risk damaging the bud. Don't cut further either, or you risk the stem developing disease or hosting pests.</span><sup aria-label="Link to Reference 6" class="reference" data-dcnode-id="2705" id="_ref-6"><a data-dcnode-id="2719" href="#_note-6"><span data-dcnode-id="2720" instrument_node="">[6]</span></a><span class="ts_popup" data-dcnode-id="2707" hidden="" id="ts_popup_6" style="display: none;"><span data-dcnode-id="2718" instrument_node="">

</span><b class="whb" data-dcnode-id="2666"><span data-dcnode-id="2667" instrument_node="">Cut down diseased stems with loppers or bypass pruners.</span></b><span data-dcnode-id="2665" instrument_node=""> To remove all traces of the disease, and to reduce the chances of it coming back, cut the cane down to a bud that is at least 1 inch (2.5&nbsp;cm) below the diseased portion.</span><sup aria-label="Link to Reference 7" class="reference" data-dcnode-id="2649" id="_ref-7"><a data-dcnode-id="2663" href="#_note-7"><span data-dcnode-id="2664" instrument_node="">[7]</span></a><span class="ts_popup" data-dcnode-id="2651" hidden="" id="ts_popup_7" style="display: none;"><span data-dcnode-id="2662" instrument_node="">
</span><span class="ts_close" data-dcnode-id="2660"><span data-dcnode-id="2661" instrument_node="">X</span></span><span data-dcnode-id="2659" instrument_node="">

</span></span><span data-dcnode-id="2650" instrument_node="">
</span></sup><span data-dcnode-id="2648" instrument_node=""> Use loppers on canes thicker than a pencil, and bypass pruners on thinner canes.
</span><ul data-dcnode-id="2645"><li data-dcnode-id="2646"><span data-dcnode-id="2647" instrument_node="">Dead and diseased canes appear black or shriveled throughout. Healthy canes appear green on the outside and white on the inside.</span></li></ul><span data-dcnode-id="2644" instrument_node="">
