_spacer" data-dcnode-id="313"></div><div class="blog__header-progress" data-dcnode-id="312" style="width: 0%;"></div><section class="section section section--blog-post" data-dcnode-id="147" id="article-section"><div data-dcnode-id="148"><div class="blog-post blog-post--header-wrapper" data-dcnode-id="301"><div class="blog-post blog-post--header-wrapper__left" data-dcnode-id="304"><div class="blog-post blog-post--header-text" data-dcnode-id="305"><p class="blog blog--category-label" data-dcnode-id="310"><span data-dcnode-id="311" instrument_node="">Tips</span></p><h1 class="blog-post blog-post--header-title" data-dcnode-id="308"><span data-dcnode-id="309" instrument_node="">Cleaning your lungs after quitting smoking</span></h1><p class="blog-post blog-post--header-subtitle" data-dcnode-id="306"><span data-dcnode-id="307" instrument_node="">As you know, smoking harms your lungs. But did you know that there are some simple tips to clean your lungs after quitting smoking?</span></p></div></div><div class="blog-post blog-post--header-wrapper__right" data-dcnode-id="302"><img alt="a women blowing on a dandelion" class="blog-post blog-post--header-img" data-dcnode-id="303" height="619" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//kwit.app/images/en/preview/women-dandelion&amp;raw" width="1005"></div></div><div class="blog-post blog-post--separator-wrapper blog-post--separator-wrapper--top" data-dcnode-id="298"><p class="blog-post blog-post--separator-text" data-dcnode-id="299"><span data-dcnode-id="300" instrument_node="">December 11, 2019</span></p></div><div class="blog-post blog-post--main-container" data-dcnode-id="171" id="blog-post"><p class="blog-post blog-post--component blog-post--component--short-introduction" data-dcnode-id="296"><span data-dcnode-id="297" instrument_node="">When we smoke, cigarette smoke is deposited on our bronchial tubes and lungs. This impacts our breath, especially since inhaled carbon monoxide disrupts the body's oxygenation. Contrary to popular belief, this phenomenon isn't irreversible, and by quitting smoking, we offer our body the opportunity to cleanse itself of the harmful effects of tobacco. Here are a few tips to help you cleanse your lungs after quitting smoking.</span></p><div class="blog-post blog-post--component blog-post--component--chapter" data-dcnode-id="234"><h2 class="blog-post blog-post--component blog-post--component--chapter__title" data-dcnode-id="294"><span data-dcnode-id="295" instrument_node="">Cleaning your lungs with a balanced diet</span></h2><p class="blog-post blog-post--component blog-post--component--text" data-dcnode-id="286"><span data-dcnode-id="293" instrument_node="">Having a </span><a data-dcnode-id="291" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//kwit.app/en/blog/posts/how-to-change-your-diet-to-quiet-smoking-without-gaining-weight"><span data-dcnode-id="292" instrument_node="">balanced diet</span></a><span data-dcnode-id="290" instrument_node=""> is important, especially when quitting smoking. But what exactly is a balanced diet? It is a diet that provides enough fat, carbohydrates and proteins, but also the nutrients, vitamins and molecules necessary for the proper functioning of the human body. Among these elements, antioxidants are essential. In particular, they are known to fight against free radicals. What is less well known is that, </span><a data-dcnode-id="288" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//journaljammr.com/index.php/JAMMR/article/view/12396" rel="noopener" target="_blank"><span data-dcnode-id="289" instrument_node="">in normal doses, free radicals are also beneficial to the immune system</span></a><span data-dcnode-id="287" instrument_node="">.</span></p><p class="blog-post blog-post--component blog-post--component--text" data-dcnode-id="281"><span data-dcnode-id="285" instrument_node="">Just as it's bad to consume too little antioxidants, it's also bad to take in more than the recommended amounts. Some studies suggest that </span><a data-dcnode-id="283" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.sciencedaily.com/releases/2015/10/151014134537.htm" rel="noopener" target="_blank"><span data-dcnode-id="284" instrument_node="">too much antioxidant in the body may increase the risk of cancer</span></a><span data-dcnode-id="282" instrument_node="">.</span></p><p class="blog-post blog-post--component blog-post--component--text" data-dcnode-id="279"><span data-dcnode-id="280" instrument_node="">It's therefore essential to eat a balanced diet, which provides just enough antioxidants, and to draw a line under antioxidants as a dietary supplement. In order to do so, Kwit suggests that you integrate certain foods into your diet.</span></p><div data-dcnode-id="276"><h3 class="blog-post blog-post--component blog-post--component--chapter__title" data-dcnode-id="277"><span data-dcnode-id="278" instrument_node="">Quercetin, an ally for your lungs</span></h3></div><p class="blog-post blog-post--component blog-post--component--text" data-dcnode-id="268"><span data-dcnode-id="275" instrument_node="">According to several studies, </span><a data-dcnode-id="273" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//cancerres.aacrjournals.org/content/68/9_Supplement/3084" rel="noopener" target="_blank"><span data-dcnode-id="274" instrument_node="">foods rich in quercetin and isothiocyanates may reduce the risk of lung cancer</span></a><span data-dcnode-id="272" instrument_node="">, especially among former smokers. </span><a data-dcnode-id="270" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.sciencedirect.com/science/article/abs/pii/S0889157504000675" rel="noopener" target="_blank"><span data-dcnode-id="271" instrument_node="">Onions, especially yellow onions, are known to be an important source of quercetin</span></a><span data-dcnode-id="269" instrument_node="">. A good reason to consume it! However, if you don't like it, apples, figs, cabbage, asparagus and even dark chocolate also contain it.</span></p><div data-dcnode-id="265"><h3 class="blog-post blog-post--component blog-post--component--chapter__title" data-dcnode-id="266"><span data-dcnode-id="267" instrument_node="">Selenium to limit the risk of cancer</span></h3></div><p class="blog-post blog-post--component blog-post--component--text" data-dcnode-id="260"><span data-dcnode-id="264" instrument_node="">Studies suggest that </span><a data-dcnode-id="262" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.nature.com/articles/srep19213" rel="noopener" target="_blank"><span data-dcnode-id="263" instrument_node="">selenium also plays a role in the fight against cancer, particularly lung cancer</span></a><span data-dcnode-id="261" instrument_node="">. The good news is that selenium is present in many foods, so you won't run out of it. For example, Brazil nuts are recognized as an important source of selenium. But these nuts are so rich in selenium that one a day is enough to meet your needs and cleanse your body. So don't abuse them!</span></p><p class="blog-post blog-post--component blog-post--component--text" data-dcnode-id="258"><span data-dcnode-id="259" instrument_node="">Selenium can also be found in other foods: seafood, brewer's yeast or egg yolk.</span></p><div data-dcnode-id="255"><h3 class="blog-post blog-post--component blog-post--component--chapter__title" data-dcnode-id="256"><span data-dcnode-id="257" instrument_node="">Cleaning your lungs thanks to flavonoids</span></h3></div><p class="blog-post blog-post--component blog-post--component--text" data-dcnode-id="250"><span data-dcnode-id="254" instrument_node="">Flavonoids are known to purge the lungs and strengthen the respiratory and digestive systems. </span><a data-dcnode-id="252" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//pubmed.ncbi.nlm.nih.gov/10639518/" rel="noopener" target="_blank"><span data-dcnode-id="253" instrument_node="">They therefore contribute to the fight against lung cancer</span></a><span data-dcnode-id="251" instrument_node="">.</span></p><p class="blog-post blog-post--component blog-post--component--text" data-dcnode-id="248"><span data-dcnode-id="249" instrument_node="">Grapefruit and pomelo are known to be important sources of flavonoids. 4 glasses of grapefruit juice per week would be enough to effectively cleanse your lungs.</span></p><div data-dcnode-id="245"><h3 class="blog-post blog-post--component blog-post--component--chapter__title" data-dcnode-id="246"><span data-dcnode-id="247" instrument_node="">Foods with Antibacterial and Antiseptic Virtues to Expel Impurities.</span></h3></div><p class="blog-post blog-post--component blog-post--component--text" data-dcnode-id="240"><span data-dcnode-id="244" instrument_node="">Foods with antibacterial and antiseptic properties help fight coughs. This is notably the case of ginger, also </span><a data-dcnode-id="242" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.ncbi.nlm.nih.gov/pmc/articles/PMC3604064/" rel="noopener" target="_blank"><span data-dcnode-id="243" instrument_node="">recognized as an element in the fight against certain respiratory diseases</span></a><span data-dcnode-id="241" instrument_node="">. This root has the characteristic of opening the bronchial tubes, allowing the lungs to clear and expel impurities. Good reasons to make infusions of ginger and lemon!</span></p><div data-dcnode-id="237"><h3 class="blog-post blog-post--component blog-post--component--chapter__title" data-dcnode-id="238"><span data-dcnode-id="239" instrument_node="">Mullein herbal teas</span></h3></div><p class="blog-post blog-post--component blog-post--component--text" data-dcnode-id="235"><span data-dcnode-id="236" instrument_node="">Mullein is a plant that increases respiratory capacity, removes excess mucus from the lungs, cleanses the bronchial tubes and reduces inflammation of the airways. The ideal is to consume it in the form of herbal tea. This plant is easy to find in pharmacies or drugstores. Then do not wait, this plant cleans the lungs of former heavy smokers!</span></p></div><div class="blog-post blog-post--component blog-post--component--chapter" data-dcnode-id="210"><h2 class="blog-post blog-post--component blog-post--component--chapter__title" data-dcnode-id="232"><span data-dcnode-id="233" instrument_node="">Cleaning your lungs by getting back into sports</span></h2><p class="blog-post blog-post--component blog-post--component--text" data-dcnode-id="227"><span data-dcnode-id="231" instrument_node="">By quitting smoking, you will gradually get your breath back. This is the perfect opportunity to </span><a data-dcnode-id="229" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//kwit.app/en/blog/posts/getting-back-into-sports-to-quit-smoking"><span data-dcnode-id="230" instrument_node="">get into sports</span></a><span data-dcnode-id="228" instrument_node="">! In addition, it will help you clear your lungs and improve your breathing capacity.</span></p><p class="blog-post blog-post--component blog-post--component--text" data-dcnode-id="219"><span data-dcnode-id="226" instrument_node="">The benefits of sport are not limited to the lungs. Among other things, sport will allow you to reduce the </span><a data-dcnode-id="224" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//kwit.app/en/blog/posts/stop-smoking-weight-gain"><span data-dcnode-id="225" instrument_node="">risk of weight gain</span></a><span data-dcnode-id="223" instrument_node="">, to surpass yourself, to </span><a data-dcnode-id="221" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//kwit.app/en/blog/posts/how-to-manage-your-stress-when-you-quit-smoking"><span data-dcnode-id="222" instrument_node="">control your stress</span></a><span data-dcnode-id="220" instrument_node=""> and to find pleasure when you stop smoking. This is true even if you are not a great sportsman, the most important thing is to find a sport that suits you.</span></p><p class="blog-post blog-post--component blog-post--component--text" data-dcnode-id="211"><span data-dcnode-id="218" instrument_node="">It doesn't matter what kind of physical activity you do, as long as it suits you. However, regularity is quite important. As with everything, it’s indeed preferable to do sports a little every day, rather than doing a lot once in a while, even if you are disgusted with it. If you are </span><a data-dcnode-id="216" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//kwit.app/en/blog/posts/change-your-habits-hapiness-close-to-hand"><span data-dcnode-id="217" instrument_node="">not used to doing sports</span></a><span data-dcnode-id="215" instrument_node="">, why not </span><a data-dcnode-id="213" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//kwit.app/en/blog/posts/the-back-to-work-yoga-routine"><span data-dcnode-id="214" instrument_node="">try a quiet activity like yoga</span></a><span data-dcnode-id="212" instrument_node="">? Moreover, some of its variations, such as pranayama yoga are known to help you develop your breathing capacities!</span></p></div><img alt="Woman making soap bubbles" class="blog-post blog-post--component blog-post--component--image" data-dcnode-id="209" data-pin-nopin="true" height="620" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//kwit.app/images/en/woman-making-soap-bubbles&amp;raw" width="1005"><div class="blog-post blog-post--component blog-post--component--chapter" data-dcnode-id="183"><h2 class="blog-post blog-post--component blog-post--component--chapter__title" data-dcnode-id="207"><span data-dcnode-id="208" instrument_node="">It's never too late to quit smoking and start cleaning your lungs!</span></h2><p class="blog-post blog-post--component blog-post--component--text" data-dcnode-id="205"><span data-dcnode-id="206" instrument_node="">Indeed, very quickly, your body gets better and eliminates the harmful effects of tobacco!</span></p><ul class="blog-post blog-post--component blog-post--component--unordered-list" data-dcnode-id="188"><li class="blog-post blog-post--component blog-post--component--list-item" data-dcnode-id="203"><span data-dcnode-id="204" instrument_node="">👉 20 minutes: blood pressure and heartbeat return to normal.</span></li><li class="blog-post blog-post--component blog-post--component--list-item" data-dcnode-id="201"><span data-dcnode-id="202" instrument_node="">👉 8 hours: the amount of carbon monoxide in the blood drops by half. Oxygenation of the cells returns to normal.</span></li><li class="blog-post blog-post--component blog-post--component--list-item" data-dcnode-id="199"><span data-dcnode-id="200" instrument_node="">👉 24 hours: the risk of heart attack decreases. The lungs eliminate the smoke residue.</span></li><li class="blog-post blog-post--component blog-post--component--list-item" data-dcnode-id="197"><span data-dcnode-id="198" instrument_node="">👉 48 hours: taste and smell improve.</span></li><li class="blog-post blog-post--component blog-post--component--list-item" data-dcnode-id="195"><span data-dcnode-id="196" instrument_node="">👉 72 hours: breathing becomes easier.</span></li><li class="blog-post blog-post--component blog-post--component--list-item" data-dcnode-id="193"><span data-dcnode-id="194" instrument_node="">👉 24 to 72 hours*: your body is free of nicotine.</span></li><li class="blog-post blog-post--component blog-post--component--list-item" data-dcnode-id="191"><span data-dcnode-id="192" instrument_node="">👉 2 weeks to 3 months: coughing and fatigue decrease. Breathing recovers. Walking is easier.</span></li><li class="blog-post blog-post--component blog-post--component--list-item" data-dcnode-id="189"><span data-dcnode-id="190" instrument_node="">👉 After 9 months: bronchial lashes grow back.</span></li></ul><p class="blog-post blog-post--component blog-post--component--text" data-dcnode-id="186"><span data-dcnode-id="187" instrument_node="">*In most cases, your body will take between 24 and 72 hours to eliminate nicotine. However, this may vary depending on how much you smoke and how long you've been smoking. This process can take up to 10 days for some people.</span></p><p class="blog-post blog-post--component blog-post--component--text" data-dcnode-id="184"><span data-dcnode-id="185" instrument_node="">The whole team wishes you good luck if you have decided to stop smoking or have already started withdrawal, and remember: Kwit is here to help you! 💪</span></p></div><div class="blog-post blog-post--component__similar" data-dcnode-id="172"><a data-dcnode-id="173" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//kwit.app/en/blog/posts/getting-back-into-sports-to-quit-smoking"><div class="blog-post blog-post--component__similar__bloc" data-dcnode-id="174"><div class="blog-post blog-post--component__similar__text blog-post--component__similar__text--arrow" data-dcnode-id="179"><p class="blog-post blog-post--component__similar__text blog-post--component__similar__text--header" data-dcnode-id="181"><span data-dcnode-id="182" instrument_node="">Related article</span></p><img alt="Right arrow" class="left-right-arrow right-arrow" data-dcnode-id="180" height="50" id="arrow-right" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//kwit.app/images/en/right-arrow&amp;raw" width="50"></div><p class="blog-post blog-post--component__similar__text blog-post--component__similar__text--title" data-dcnode-id="177"><span data-dcnode-id="178" instrument_node="">Getting back into sports to quit smoking</span></p><p class="blog-post blog-post--component__similar__text blog-post--component__similar__text--preview" data-dcnode-id="175"><span data-dcnode-id="176" instrument_node="">Are you afraid of the side effects of quitting smoking? Why don't you get back to sports? It is beneficial for both your physical and mental health. Physical exercise will give you a boost, and it will make it much easier for you to stop.</span></p></div></a></div></div><div class="blog-post blog-post--footer-wrapper" data-dcnode-id="149"><div class="blog-post blog-post--footer-wrapper__share-section blog-post blog-post--separator-wrapper blog-post--separator-wrapper--bottom" data-dcnode-id="167"><p class="blog-post blog-post--footer-wrapper__share-text" data-dcnode-id="169"><span data-dcnode-id="170" instrument_node="">Did you like this article? Share it !</span></p><div class="blog-post blog-post--separator-bar" data-dcnode-id="168"></div></div><div class="blog-post__bottom-footer" data-dcnode-id="150"><div data-dcnode-id="158"><a data-dcnode-id="165" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//twitter.com/intent/tweet%3Ftext%3Dhttps%3A//kwit.app/en/blog/posts/Cleaning-your-lungs-after-quitting-smoking"><img alt="Twitter icon" class="blog-post blog-post--footer-wrapper__share-button" data-dcnode-id="166" height="48" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//kwit.app/images/en/twitter-icon&amp;raw" width="48"></a><a data-dcnode-id="163" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.linkedin.com/shareArticle%3Furl%3Dhttps%3A//kwit.app/en/blog/posts/Cleaning-your-lungs-after-quitting-smoking"><img alt="LinkedInIcon icon" class="blog-post blog-post--footer-wrapper__share-button" data-dcnode-id="164" height="48" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//kwit.app/images/en/linkedInIcon-icon&amp;raw" width="48"></a><a data-dcnode-id="161" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.facebook.com/sharer/sharer.php%3Fu%3Dhttps%3A//kwit.app/en/blog/posts/Cleaning-
