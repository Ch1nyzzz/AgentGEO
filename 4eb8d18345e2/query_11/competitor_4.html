</span><meta content="Smoking is the main risk factor in the development of chronic obstructive pulmonary disease (COPD), and smoking cessation is the only effective treatment for avoiding or reducing the progression of this disease.

Despite the fact that smoking cessation is a very important health issue, information about the underlying mechanisms of the effects of smoking cessation on the lungs is surprisingly scarce. It is likely that the reversibility of smoke-induced changes differs between smokers without chronic symptoms, smokers with nonobstructive chronic bronchitis and smokers with COPD. This review describes how these three groups differ regarding the effects of smoking cessation on respiratory symptoms, lung function (forced expiratory volume in one second), airway hyperresponsiveness, and pathological and inflammatory changes in the lung.

Smoking cessation clearly improves respiratory symptoms and bronchial hyperresponsiveness, and prevents excessive decline in lung function in all three groups.

Data from well-designed studies are lacking regarding the effects on inflammation and remodelling, and the few available studies show contradictory results. In chronic obstructive pulmonary disease, a few histopathological studies suggest that airway inflammation persists in exsmokers. Nevertheless, many studies have shown that smoking cessation improves the accelerated decline in forced expiratory volume in one second, which strongly indicates that important inflammatory and/or remodelling processes are positively affected." data-dcnode-id="8700" name="DC.Description"><span data-dcnode-id="8699" instrument_node="">

</span><meta content="Smoking is the main risk factor in the development of chronic obstructive pulmonary disease (COPD), and smoking cessation is the only effective treatment for avoiding or reducing the progression of this disease.

Despite the fact that smoking cessation is a very important health issue, information about the underlying mechanisms of the effects of smoking cessation on the lungs is surprisingly scarce. It is likely that the reversibility of smoke-induced changes differs between smokers without chronic symptoms, smokers with nonobstructive chronic bronchitis and smokers with COPD. This review describes how these three groups differ regarding the effects of smoking cessation on respiratory symptoms, lung function (forced expiratory volume in one second), airway hyperresponsiveness, and pathological and inflammatory changes in the lung.

Smoking cessation clearly improves respiratory symptoms and bronchial hyperresponsiveness, and prevents excessive decline in lung function in all three groups.

Data from well-designed studies are lacking regarding the effects on inflammation and remodelling, and the few available studies show contradictory results. In chronic obstructive pulmonary disease, a few histopathological studies suggest that airway inflammation persists in exsmokers. Nevertheless, many studies have shown that smoking cessation improves the accelerated decline in forced expiratory volume in one second, which strongly indicates that important inflammatory and/or remodelling processes are positively affected." data-dcnode-id="8384" name="twitter:description"><span data-dcnode-id="8383" instrument_node="">

</span><div class="highwire-markup" data-dcnode-id="1631"><div class="content-block-markup" data-dcnode-id="1632" data-highwire-cite-ref-tooltip-instance="highwire_reflinks_tooltip" xmlns="http://www.w3.org/1999/xhtml" xmlns:xhtml="http://www.w3.org/1999/xhtml"><div class="article fulltext-view" data-dcnode-id="1634"><span class="highwire-journal-article-marker-start" data-dcnode-id="7430"></span><div class="section abstract" data-dcnode-id="7414" id="abstract-1"><h2 data-dcnode-id="7428"><span data-dcnode-id="7429" instrument_node="">Abstract</span></h2><span data-dcnode-id="7427" instrument_node="">
</span><p data-dcnode-id="7425" id="p-1"><span data-dcnode-id="7426" instrument_node="">Smoking is the main risk factor in the development of chronic obstructive pulmonary disease (COPD), and smoking cessation is the only effective treatment for avoiding or reducing the progression of this disease.</span></p><span data-dcnode-id="7424" instrument_node="">
</span><p data-dcnode-id="7422" id="p-2"><span data-dcnode-id="7423" instrument_node="">Despite the fact that smoking cessation is a very important health issue, information about the underlying mechanisms of the effects of smoking cessation on the lungs is surprisingly scarce. It is likely that the reversibility of smoke-induced changes differs between smokers without chronic symptoms, smokers with nonobstructive chronic bronchitis and smokers with COPD. This review describes how these three groups differ regarding the effects of smoking cessation on respiratory symptoms, lung function (forced expiratory volume in one second), airway hyperresponsiveness, and pathological and inflammatory changes in the lung.</span></p><span data-dcnode-id="7421" instrument_node="">
</span><p data-dcnode-id="7419" id="p-3"><span data-dcnode-id="7420" instrument_node="">Smoking cessation clearly improves respiratory symptoms and bronchial hyperresponsiveness, and prevents excessive decline in lung function in all three groups.</span></p><span data-dcnode-id="7418" instrument_node="">
</span><p data-dcnode-id="7416" id="p-4"><span data-dcnode-id="7417" instrument_node="">Data from well-designed studies are lacking regarding the effects on inflammation and remodelling, and the few available studies show contradictory results. In chronic obstructive pulmonary disease, a few histopathological studies suggest that airway inflammation persists in exsmokers. Nevertheless, many studies have shown that smoking cessation improves the accelerated decline in forced expiratory volume in one second, which strongly indicates that important inflammatory and/or remodelling processes are positively affected.</span></p><span data-dcnode-id="7415" instrument_node="">
</span></div><ul class="kwd-group KWD" data-dcnode-id="7401"><li class="kwd" data-dcnode-id="7411"><a class="hw-term hw-article-keyword hw-article-keyword-chronic-obstructive-pulmonary-disease" data-dcnode-id="7412" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//erj.ersjournals.com/keyword/chronic-obstructive-pulmonary-disease" rel="nofollow"><span data-dcnode-id="7413" instrument_node="">chronic obstructive pulmonary disease</span></a></li><li class="kwd" data-dcnode-id="7408"><a class="hw-term hw-article-keyword hw-article-keyword-inflammation" data-dcnode-id="7409" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//erj.ersjournals.com/keyword/inflammation" rel="nofollow"><span data-dcnode-id="7410" instrument_node="">inflammation</span></a></li><li class="kwd" data-dcnode-id="7405"><a class="hw-term hw-article-keyword hw-article-keyword-review" data-dcnode-id="7406" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//erj.ersjournals.com/keyword/review" rel="nofollow"><span data-dcnode-id="7407" instrument_node="">review</span></a></li><li class="kwd" data-dcnode-id="7402"><a class="hw-term hw-article-keyword hw-article-keyword-smoking-cessation" data-dcnode-id="7403" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//erj.ersjournals.com/keyword/smoking-cessation" rel="nofollow"><span data-dcnode-id="7404" instrument_node="">smoking cessation</span></a></li></ul><div class="section" data-dcnode-id="7357" id="sec-1"><span data-dcnode-id="7400" instrument_node="">
</span><p data-dcnode-id="7359" id="p-5"><span data-dcnode-id="7399" instrument_node="">Smoking may lead to clinically recognised chronic obstructive pulmonary disease (COPD) in 15–20% of those who smoke. COPD is characterised clinically by chronic respiratory symptoms such as cough and sputum production, airflow limitation (according to the European Respiratory Society (ERS), a forced expiratory volume in one second (FEV</span><sub data-dcnode-id="7397"><span data-dcnode-id="7398" instrument_node="">1</span></sub><span data-dcnode-id="7396" instrument_node="">)/vital capacity (VC) ratio of &lt;88% of the predicted value in males or &lt;89% pred in females) and an accelerated decline in FEV</span><sub data-dcnode-id="7394"><span data-dcnode-id="7395" instrument_node="">1</span></sub><span data-dcnode-id="7393" instrument_node=""> (&gt;50 mL·yr</span><sup data-dcnode-id="7391"><span data-dcnode-id="7392" instrument_node="">−1</span></sup><span data-dcnode-id="7390" instrument_node="">). Smoking is the most important risk factor for developing COPD </span><a class="xref-bibr" data-dcnode-id="7388" href="#ref-1" id="xref-ref-1-1"><span data-dcnode-id="7389" instrument_node="">1</span></a><span data-dcnode-id="7387" instrument_node="">, and smoking cessation is the only effective treatment slowing down the accelerated decline in FEV</span><sub data-dcnode-id="7385"><span data-dcnode-id="7386" instrument_node="">1</span></sub><span data-dcnode-id="7384" instrument_node=""> </span><a class="xref-bibr" data-dcnode-id="7382" href="#ref-2" id="xref-ref-2-1"><span data-dcnode-id="7383" instrument_node="">2</span></a><span data-dcnode-id="7381" instrument_node="">, </span><a class="xref-bibr" data-dcnode-id="7379" href="#ref-3" id="xref-ref-3-1"><span data-dcnode-id="7380" instrument_node="">3</span></a><span data-dcnode-id="7378" instrument_node="">. Pathological changes in the airways of COPD patients are increased with respect to: 1) the number and size of glands, 2) inflammation, 3) fibrosis, and 4) destruction of alveolar attachments. In contrast, almost 50% of smokers develop chronic bronchitis, </span><em data-dcnode-id="7376"><span data-dcnode-id="7377" instrument_node="">i.e.</span></em><span data-dcnode-id="7375" instrument_node=""> chronic respiratory symptoms without airway obstruction </span><a class="xref-bibr" data-dcnode-id="7373" href="#ref-1" id="xref-ref-1-2"><span data-dcnode-id="7374" instrument_node="">1</span></a><span data-dcnode-id="7372" instrument_node="">. Chronic bronchitis is characterised by chronic cough and sputum production, being associated with the abundant presence of mucus-producing elements in the large airways. Approximately 30% of smokers do not show chronic symptoms or abnormal lung function. Nevertheless, even these so-called “healthy smokers” show subtle changes in lung morphology, lung inflammation and lung function </span><a class="xref-bibr" data-dcnode-id="7370" href="#ref-4" id="xref-ref-4-1"><span data-dcnode-id="7371" instrument_node="">4</span></a><span data-dcnode-id="7369" instrument_node="">–</span><a class="xref-bibr" data-dcnode-id="7367" href="#ref-9" id="xref-ref-9-1"><span data-dcnode-id="7368" instrument_node="">9</span></a><span data-dcnode-id="7366" instrument_node="">. Smoking, apparently, always affects the lungs, although the extent and severity of these changes differ between individuals. The question arises as to whether the reversibility of these changes also differs after smoking cessation. Consequently, the primary aim of the present review is to provide an overview of the effects of smoking cessation on respiratory symptoms, lung function (FEV</span><sub data-dcnode-id="7364"><span data-dcnode-id="7365" instrument_node="">1</span></sub><span data-dcnode-id="7363" instrument_node=""> and extent of longitudinal decline in FEV</span><sub data-dcnode-id="7361"><span data-dcnode-id="7362" instrument_node="">1</span></sub><span data-dcnode-id="7360" instrument_node="">), bronchial hyperresponsiveness, and the pathological and inflammatory changes in the lungs of the above-mentioned groups. Furthermore, important clinical variables are compared with the underlying pathological and inflammatory changes after smoking cessation.</span></p><span data-dcnode-id="7358" instrument_node="">
</span></div><div class="section" data-dcnode-id="7313" id="sec-2"><span data-dcnode-id="7356" instrument_node="">
</span><h2 data-dcnode-id="7354"><span data-dcnode-id="7355" instrument_node="">Definitions, selection of articles and structure</span></h2><span data-dcnode-id="7353" instrument_node="">
</span><p data-dcnode-id="7341" id="p-6"><span data-dcnode-id="7352" instrument_node="">Smokers were defined according to the definitions given in table 1</span><a class="xref-down-link" data-dcnode-id="7349" href="#T1" id="xref-table-wrap-1-1"><span data-dcnode-id="7350"><span data-dcnode-id="7351" instrument_node="">⇓</span></span></a><span data-dcnode-id="7348" instrument_node="">. ERS (1995) </span><a class="xref-bibr" data-dcnode-id="7346" href="#ref-1" id="xref-ref-1-3"><span data-dcnode-id="7347" instrument_node="">1</span></a><span data-dcnode-id="7345" instrument_node=""> rather than Global Initiative for Chronic Obstructive Lung Disease </span><a class="xref-bibr" data-dcnode-id="7343" href="#ref-10" id="xref-ref-10-1"><span data-dcnode-id="7344" instrument_node="">10</span></a><span data-dcnode-id="7342" instrument_node=""> criteria were used for chronic bronchitis and COPD, since most articles included in the present review were written before the introduction of these guidelines. References to chronic bronchitis are to the “pure” nonobstructive form. Especially in large general population studies, it was sometimes difficult to allocate subjects to one of the above-described groups, since, in such studies, all subjects were regarded as healthy at inclusion and yet, afterwards, some of them could be defined as having chronic bronchitis or asthma. Data from patients with asthma were excluded but not data regarding atopy since COPD patients can be atopic (most articles investigating COPD patients exclude atopic individuals). Only articles investigating adult subjects (aged &gt;18 yrs) were included.</span></p><div class="table pos-float" data-dcnode-id="7321" id="T1"><div class="table-inline table-callout-links" data-dcnode-id="7330"><div class="callout" data-dcnode-id="7331"><span data-dcnode-id="7339"><span data-dcnode-id="7340" instrument_node="">View this table:</span></span><ul class="callout-links" data-dcnode-id="7332"><li class="view-inline first" data-dcnode-id="7336"><a class="table-expand-inline highwireTablesMarkupProcessor-processed" data-dcnode-id="7337" data-hide-link-title="0" data-icon-position="" data-table-url="/highwire/markup/84867/expansion?postprocessors=highwire_tables%2Chighwire_reclass%2Chighwire_figures%2Chighwire_math%2Chighwire_inline_linked_media%2Chighwire_embed&amp;table-expand-inline=1" href="#%23"><span data-dcnode-id="7338" instrument_node="">View inline</span></a></li><li class="view-popup last" data-dcnode-id="7333"><a class="colorbox colorbox-load table-expand-popup init-colorbox-processed cboxElement" data-dcnode-id="7334" data-hide-link-title="0" data-icon-position="" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//erj.ersjournals.com/highwire/markup/84867/expansion%3Fwidth%3D1000%26height%3D500%26iframe%3Dtrue%26postprocessors%3Dhighwire_tables%252Chighwire_reclass%252Chighwire_figures%252Chighwire_math%252Chighwire_inline_linked_media%252Chighwire_embed" rel="gallery-fragment-tables"><span data-dcnode-id="7335" instrument_node="">View popup</span></a></li></ul></div></div><div class="table-caption" data-dcnode-id="7322"><span class="table-label" data-dcnode-id="7328"><span data-dcnode-id="7329" instrument_node="">Table 1</span></span><span data-dcnode-id="7327" instrument_node="">
</span><p class="first-child" data-dcnode-id="7325" id="p-49"><span data-dcnode-id="7326" instrument_node="">Definitions used for the different groups of smokers in this review</span></p><span data-dcnode-id="7324" instrument_node="">
</span><div class="sb-div caption-clear" data-dcnode-id="7323"></div></div></div><span data-dcnode-id="7320" instrument_node="">
</span><p data-dcnode-id="7318" id="p-7"><span data-dcnode-id="7319" instrument_node="">Both longitudinal studies investigating smokers (with or without COPD) before and after smoking cessation and cross-sectional studies comparing smokers and exsmokers (with or without COPD) were selected. In the present review, a “smoker” is defined as someone who smokes and does not have chronic respiratory symptoms and airway obstruction. An “exsmoker” is defined as someone who quits smoking before the start of the study and refrains from smoking during the study, whereas a “quitter” is someone who smokes at the start of the study but quits smoking during or at the start of the study.</span></p><span data-dcnode-id="7317" instrument_node="">
</span><p data-dcnode-id="7315" id="p-8"><span data-dcnode-id="7316" instrument_node="">The structure of the present review is as follows. The effects of smoking cessation on respiratory symptoms, lung function, airway hyperresponsiveness (AHR), and pathological and inflammatory changes are described in separate sections. In each section, the effects of smoking cessation in smokers without chronic bronchitis or COPD are described first, followed by the effects of smoking cessation in smokers with chronic bronchitis or with different stages of COPD. Within each category, cross-sectional studies are described first and then, if available, longitudinal studies.</span></p><span data-dcnode-id="7314" instrument_node="">
</span></div><div class="section" data-dcnode-id="7299" id="sec-3"><span data-dcnode-id="7312" instrument_node="">
</span><h2 data-dcnode-id="7310"><span data-dcnode-id="7311" instrument_node="">Collection of data</span></h2><span data-dcnode-id="7309" instrument_node="">
</span><p data-dcnode-id="7301" id="p-9"><span data-dcnode-id="7308" instrument_node="">The MEDLINE search (1966–2002) consisted of various combination of the following keywords: smok*, smoking cessation, healthy smokers, exsmoker, chronic bronchitis, COPD, chronic obstructive pulmonary disease, respiratory symptoms, symptoms, cough, sputum, phlegm, shortness of breath, breathlessness, dyspnea, dyspnoea, lung, lung function, FEV</span><sub data-dcnode-id="7306"><span data-dcnode-id="7307" instrument_node="">1</span></sub><span data-dcnode-id="7305" instrument_node="">, decline in FEV</span><sub data-dcnode-id="7303"><span data-dcnode-id="7304" instrument_node="">1</span></sub><span data-dcnode-id="7302" instrument_node="">, bronchial hyperresponsiveness, airway hyperresponsiveness, BHR, AHR, AMP, adenosine‐5'‐monophosphate, histamine, methacholine, inflammation, sputum, bronchial alveolar lavage, BAL, biopsy, exhaled nitric oxide and exhaled NO. Limits were set for the English language. Additional relevant studies were identified by manually searching the bibliographies of the articles retrieved.</span></p><span data-dcnode-id="7300" instrument_node="">
</span></div><div class="section" data-dcnode-id="7168" id="sec-4"><span data-dcnode-id="7298" instrument_node="">
</span><h2 data-dcnode-id="7296"><span data-dcnode-id="7297" instrument_node="">Respiratory symptoms</span></h2><span data-dcnode-id="7295" instrument_node="">
</span><div class="subsection" data-dcnode-id="7218" id="sec-5"><span data-dcnode-id="7294" instrument_node="">
</span><h3 data-dcnode-id="7292"><span data-dcnode-id="7293" instrument_node="">Subject without chronic respiratory symptoms</span></h3><span data-dcnode-id="7291" instrument_node="">
</span><p data-dcnode-id="7271" id="p-10"><span data-dcnode-id="7290" instrument_node="">The reported prevalences of intermittent cough, phlegm and wheeze are 5–21, 5–30 and 1–19%, respectively, in exsmokers, and 10–40% for both cough and phlegm and 7–32% for wheeze in smokers </span><a class="xref-bibr" data-dcnode-id="7288" href="#ref-11" id="xref-ref-11-1"><span data-dcnode-id="7289" instrument_node="">11</span></a><span data-dcnode-id="7287" instrument_node="">–</span><a class="xref-bibr" data-dcnode-id="7285" href="#ref-19" id="xref-ref-19-1"><span data-dcnode-id="7286" instrument_node="">19</span></a><span data-dcnode-id="7284" instrument_node="">. In contrast, the prevalence of dyspnoea is similar between exsmokers and smokers (ranging 2–41%), suggesting that the sensation of dyspnoea is either not reversible after smoking cessation, or due to factors other than lung disease. These cross-sectional studies suggest that respiratory symptoms improve after smoking cessation. However, these symptoms appear not to disappear as the prevalences of respiratory symptoms in exsmokers are reported as higher than or similar to those found in nonsmokers </span><a class="xref-bibr" data-dcnode-id="7282" href="#ref-11" id="xref-ref-11-2"><span data-dcnode-id="7283" instrument_node="">11</span></a><span data-dcnode-id="7281" instrument_node="">–</span><a class="xref-bibr" data-dcnode-id="7279" href="#ref-15" id="xref-ref-15-1"><span data-dcnode-id="7280" instrument_node="">15</span></a><span data-dcnode-id="7278" instrument_node="">, </span><a class="xref-bibr" data-dcnode-id="7276" href="#ref-12" id="xref-ref-12-1"><span data-dcnode-id="7277" instrument_node="">19</span></a><span data-dcnode-id="7275" instrument_node="">, </span><a class="xref-bibr" data-dcnode-id="7273" href="#ref-13" id="xref-ref-13-1"><span data-dcnode-id="7274" instrument_node="">20</span></a><span data-dcnode-id="7272" instrument_node="">.</span></p><span data-dcnode-id="7270" instrument_node="">
</span><p data-dcnode-id="7223" id="p-11"><span data-dcnode-id="7269" instrument_node="">Longitudinal studies are in line with the above cross-sectional studies, showing that most intermittent symptoms (cough, phlegm and wheeze) decrease within 1–2 months after smoking cessation </span><a class="xref-bibr" data-dcnode-id="7267" href="#ref-21" id="xref-ref-21-1"><span data-dcnode-id="7268" instrument_node="">21</span></a><span data-dcnode-id="7266" instrument_node="">–</span><a class="xref-bibr" data-dcnode-id="7264" href="#ref-27" id="xref-ref-27-1"><span data-dcnode-id="7265" instrument_node="">27</span></a><span data-dcnode-id="7263" instrument_node="">. The prevalence of cough and wheeze decreases to that in nonsmokers, whereas the prevalence of phlegm remains slightly higher </span><a class="xref-bibr" data-dcnode-id="7261" href="#ref-21" id="xref-ref-21-2"><span data-dcnode-id="7262" instrument_node="">21</span></a><span data-dcnode-id="7260" instrument_node="">, </span><a class="xref-bibr" data-dcnode-id="7258" href="#ref-25" id="xref-ref-25-1"><span data-dcnode-id="7259" instrument_node="">25</span></a><span data-dcnode-id="7257" instrument_node="">. Furthermore, symptoms are also less likely to develop later in life if smokers without chronic symptoms quit smoking </span><a class="xref-bibr" data-dcnode-id="7255" href="#ref-28" id="xref-ref-28-1"><span data-dcnode-id="7256" instrument_node="">28</span></a><span data-dcnode-id="7254" instrument_node="">, </span><a class="xref-bibr" data-dcnode-id="7252" href="#ref-29" id="xref-ref-29-1"><span data-dcnode-id="7253" instrument_node="">29</span></a><span data-dcnode-id="7251" instrument_node="">. For instance, Krzyzanowski </span><em data-dcnode-id="7249"><span data-dcnode-id="7250" instrument_node="">et al.</span></em><span data-dcnode-id="7248" instrument_node=""> </span><a class="xref-bibr" data-dcnode-id="7246" href="#ref-28" id="xref-ref-28-2"><span data-dcnode-id="7247" instrument_node="">28</span></a><span data-dcnode-id="7245" instrument_node=""> showed that only 12% of quitters </span><em data-dcnode-id="7243"><span data-dcnode-id="7244" instrument_node="">versus</span></em><span data-dcnode-id="7242" instrument_node=""> 29% of persistent smokers developed cough or phlegm. The effect of smoking cessation on dyspnoea in this group of smokers is not uniform in different studies. Three studies, in which the duration of smoking cessation ranged 2–6 weeks to 1–12 yrs, showed no difference in the prevalence of dyspnoea after smoking cessation. In these studies, dyspnoea was defined as the feeling of “shortness of breath” or “having to stop for a breath while walking up a slight hill” or “walking with other people of the same age on the level ground” </span><a class="xref-bibr" data-dcnode-id="7240" href="#ref-25" id="xref-ref-25-2"><span data-dcnode-id="7241" instrument_node="">25</span></a><span data-dcnode-id="7239" instrument_node="">, </span><a class="xref-bibr" data-dcnode-id="7237" href="#ref-27" id="xref-ref-27-2"><span data-dcnode-id="7238" instrument_node="">27</span></a><span data-dcnode-id="7236" instrument_node="">, </span><a class="xref-bibr" data-dcnode-id="7234" href="#ref-28" id="xref-ref-28-3"><span data-dcnode-id="7235" instrument_node="">28</span></a><span data-dcnode-id="7233" instrument_node="">. Another study suggested that 5 yrs of smoking cessation led to a small increase in dyspnoea when hurrying on the level or walking up a slight hill (41 to 52%) </span><a class="xref-bibr" data-dcnode-id="7231" href="#ref-21" id="xref-ref-21-3"><span data-dcnode-id="7232" instrument_node="">21</span></a><span data-dcnode-id="7230" instrument_node="">. An increase in body weight, as often occurs during smoking cessation, might explain the increase in dyspnoea, but this was not investigated in this study. Using yet another definition, “difficulty breathing”, Peterson </span><em data-dcnode-id="7228"><span data-dcnode-id="7229" instrument_node="">et al.</span></em><span data-dcnode-id="7227" instrument_node=""> </span><a class="xref-bibr" data-dcnode-id="7225" href="#ref-30" id="xref-ref-30-1"><span data-dcnode-id="7226" instrument_node="">30</span></a><span data-dcnode-id="7224" instrument_node=""> showed that dyspnoea improved in 12 smokers after 1 and 18 months' smoking cessation, despite an increase in body weight.</span></p><span data-dcnode-id="7222" instrument_node="">
</span><p data-dcnode-id="7220" id="p-12"><span data-dcnode-id="7221" instrument_node="">The wide range of prevalences found among the available studies might be due to differences in the definition of symptoms, questionnaires used and/or study population, such as age, sex and geographical differences. This may also be an explanation for the differences in the effect of smoking cessation on dyspnoea. As mentioned above, dyspnoea in healthy smokers may be due to factors other than lung disease. In addition, it is unlikely that subjects without chronic respiratory symptoms experience the same degree of dyspnoea as COPD patients. Thus the severity of dyspnoea may be very low at the start of the studies, and hence improvement would be almost impossible after smoking cessation. Furthermore, the cumulative or daily cigarette consumption is not always mentioned, and, if it is, also varies between the studies. Nevertheless, this cannot explain all of the differences observed.</span></p><span data-dcnode-id="7219" instrument_node="">
</span></div><span data-dcnode-id="7217" instrument_node="">
</span><div class="subsection" data-dcnode-id="7170" id="sec-6"><span data-dcnode-id="7216" instrument_node="">
</span><h3 data-dcnode-id="7214"><span data-dcnode-id="7215" instrument_node="">Chronic bronchitis or chronic obstructive pulmonary disease</span></h3><span data-dcnode-id="7213" instrument_node="">
</span><p data-dcnode-id="7205" id="p-13"><span data-dcnode-id="7212" instrument_node="">In a cross-sectional study, patients with mild or moderate COPD (both smokers and exsmokers) reported cough and phlegm more often than patients with severe COPD (84 </span><em data-dcnode-id="7210"><span data-dcnode-id="7211" instrument_node="">versus</span></em><span data-dcnode-id="7209" instrument_node=""> 68%). Conversely, dyspnoea was more prevalent in patients with severe COPD (80%) than in patients with mild (33%) or moderate (53%) COPD. The difference between smokers and exsmokers was not investigated separately in this study, but the group of patients with severe COPD (n=38) contained relatively more exsmokers (35%) than did the group of patients with mild or moderate COPD (n=424; 20%) </span><a class="xref-bibr" data-dcnode-id="7207" href="#ref-31" id="xref-ref-31-1"><span data-dcnode-id="7208" instrument_node="">31</span></a><span data-dcnode-id="7206" instrument_node="">. This might suggest that chronic cough and phlegm decrease after smoking cessation, in contrast to dyspnoea.</span></p><span data-dcnode-id="7204" instrument_node="">
</span><p data-dcnode-id="7199" id="p-14"><span data-dcnode-id="7203" instrument_node="">Very few longitudinal data are available with regard to the effect of smoking cessation on respiratory symptoms in smokers with chronic bronchitis or COPD. Friedman and Siegelaub </span><a class="xref-bibr" data-dcnode-id="7201" href="#ref-32" id="xref-ref-32-1"><span data-dcnode-id="7202" instrument_node="">32</span></a><span data-dcnode-id="7200" instrument_node=""> showed that chronic cough had disappeared after 1.5 yrs in almost all smokers with chronic bronchitis who quitted smoking.</span></p><span data-dcnode-id="7198" instrument_node="">
</span><p data-dcnode-id="7175" id="p-15"><span data-dcnode-id="7197" instrument_node="">The Lung Health Study is a 5‐yr follow-up study which assessed whether smoking cessation (and/or regular use of bronchodilators) ameliorated FEV</span><sub data-dcnode-id="7195"><span data-dcnode-id="7196" instrument_node="">1</span></sub><span data-dcnode-id="7194" instrument_node=""> decline in patients with mild-to-moderate COPD. This study included 5,887 smokers, aged 35–60 yrs, with an FEV</span><sub data-dcnode-id="7192"><span data-dcnode-id="7193" instrument_node="">1</span></sub><span data-dcnode-id="7191" instrument_node="">/forced VC of &lt;70% pred and FEV</span><sub data-dcnode-id="7189"><span data-dcnode-id="7190" instrument_node="">1</span></sub><span data-dcnode-id="7188" instrument_node=""> of 50–90% pred. The prevalences of chronic cough, chronic phlegm, wheeze (“day and night”) and dyspnoea at the start of the study were 48, 43, 32 and 43%, respectively </span><a class="xref-bibr" data-dcnode-id="7186" href="#ref-33" id="xref-ref-33-1"><span data-dcnode-id="7187" instrument_node="">33</span></a><span data-dcnode-id="7185" instrument_node="">. The prevalence of these respiratory symptoms decreased by &gt;80% after 5 yrs of smoking cessation. The greatest decrease occurred within the first year. In addition, the risk of developing respiratory symptoms </span><em data-dcnode-id="7183"><span data-dcnode-id="7184" instrument_node="">de novo</span></em><span data-dcnode-id="7182" instrument_node=""> during the 5‐yr follow-up was higher in persistent smokers (28%) than in successful quitters (4%) </span><a class="xref-bibr" data-dcnode-id="7180" href="#ref-2" id="xref-ref-2-2"><span data-dcnode-id="7181" instrument_node="">2</span></a><span data-dcnode-id="7179" instrument_node="">, </span><a class="xref-bibr" data-dcnode-id="7177" href="#ref-34" id="xref-ref-34-1"><span data-dcnode-id="7178" instrument_node="">34</span></a><span data-dcnode-id="7176" instrument_node="">.</span></p><span data-dcnode-id="7174" instrument_node="">
</span><p data-dcnode-id="7172" id="p-16"><span data-dcnode-id="7173" instrument_node="">Although there is an improvement in symptoms after smoking cessation in smokers with chronic bronchitis and COPD, smoking cessation only induces complete normalisation when airflow limitation is absent.</span></p><span data-dcnode-id="7171" instrument_node="">
</span></div><span data-dcnode-id="7169" instrument_node="">
</span></div><div class="section" data-dcnode-id="6768" id="sec-7"><span data-dcnode-id="7167" instrument_node="">
</span><h2 data-dcnode-id="7165"><span data-dcnode-id="7166" instrument_node="">Lung function (forced expiratory volume in one second)</span></h2><span data-dcnode-id="7164" instrument_node="">
</span><div class="subsection" data-dcnode-id="6930" id="sec-8"><span data-dcnode-id="7163" instrument_node="">
</span><h3 data-dcnode-id="7161"><span data-dcnode-id="7162" instrument_node="">Subjects without chronic respiratory symptoms</span></h3><span data-dcnode-id="7160" instrument_node="">
</span><p data-dcnode-id="7140" id="p-17"><span data-dcnode-id="7159" instrument_node="">Cross-sectional studies have shown that FEV</span><sub data-dcnode-id="7157"><span data-dcnode-id="7158" instrument_node="">1</span></sub><span data-dcnode-id="7156" instrument_node=""> is lowest in individuals without chronic symptoms who smoke, highest in those who have never smoked and intermediate in exsmokers </span><a class="xref-bibr" data-dcnode-id="7154" href="#ref-20" id="xref-ref-20-1"><span data-dcnode-id="7155" instrument_node="">20</span></a><span data-dcnode-id="7153" instrument_node="">, </span><a class="xref-bibr" data-dcnode-id="7151" href="#ref-35" id="xref-ref-35-1"><span data-dcnode-id="7152" instrument_node="">35</span></a><span data-dcnode-id="7150" instrument_node="">–</span><a class="xref-bibr" data-dcnode-id="7148" href="#ref-42" id="xref-ref-42-1"><span data-dcnode-id="7149" instrument_node="">42</span></a><span data-dcnode-id="7147" instrument_node="">. One exception is the finding that exsmokers aged &gt;70 yrs tend to have lower lung function than smokers of the same age. This can be attributed to a “healthy smoker” effect </span><a class="xref-bibr" data-dcnode-id="7145" href="#ref-43" id="xref-ref-43-1"><span data-dcnode-id="7146" instrument_node="">43</span></a><span data-dcnode-id="7144" instrument_node="">, </span><em data-dcnode-id="7142"><span data-dcnode-id="7143" instrument_node="">i.e.</span></em><span data-dcnode-id="7141" instrument_node=""> smokers who are not troubled by their habit continue to smoke (so-called healthy smokers), whereas smokers who are troubled by their habit are more likely to quit smoking.</span></p><span data-dcnode-id="7139" instrument_node="">
</span><p data-dcnode-id="7085" id="p-18"><span data-dcnode-id="7138" instrument_node="">Most studies show a significant excess decline in FEV</span><sub data-dcnode-id="7136"><span data-dcnode-id="7137" instrument_node="">1</span></sub><span data-dcnode-id="7135" instrument_node=""> in smokers over nonsmokers, exsmokers and quitters </span><a class="xref-bibr" data-dcnode-id="7133" href="#ref-6" id="xref-ref-6-1"><span data-dcnode-id="7134" instrument_node="">6</span></a><span data-dcnode-id="7132" instrument_node="">, </span><a class="xref-bibr" data-dcnode-id="7130" href="#ref-8" id="xref-ref-8-1"><span data-dcnode-id="7131" instrument_node="">8</span></a><span data-dcnode-id="7129" instrument_node="">, </span><a class="xref-bibr" data-dcnode-id="7127" href="#ref-16" id="xref-ref-16-1"><span data-dcnode-id="7128" instrument_node="">16</span></a><span data-dcnode-id="7126" instrument_node="">, </span><a class="xref-bibr" data-dcnode-id="7124" href="#ref-25" id="xref-ref-25-3"><span data-dcnode-id="7125" instrument_node="">25</span></a><span data-dcnode-id="7123" instrument_node="">, </span><a class="xref-bibr" data-dcnode-id="7121" href="#ref-39" id="xref-ref-39-1"><span data-dcnode-id="7122" instrument_node="">39</span></a><span data-dcnode-id="7120" instrument_node="">, </span><a class="xref-bibr" data-dcnode-id="7118" href="#ref-44" id="xref-ref-44-1"><span data-dcnode-id="7119" instrument_node="">44</span></a><span data-dcnode-id="7117" instrument_node="">–</span><a class="xref-bibr" data-dcnode-id="7115" href="#ref-56" id="xref-ref-56-1"><span data-dcnode-id="7116" instrument_node="">56</span></a><span data-dcnode-id="7114" instrument_node="">. Longitudinal data are shown in table 2</span><a class="xref-down-link" data-dcnode-id="7111" href="#T2" id="xref-table-wrap-2-1"><span data-dcnode-id="7112"><span data-dcnode-id="7113" instrument_node="">⇓</span></span></a><span data-dcnode-id="7110" instrument_node="">. There is considerable overlap between studies in the reported decline in FEV</span><sub data-dcnode-id="7108"><span data-dcnode-id="7109" instrument_node="">1</span></sub><span data-dcnode-id="7107" instrument_node=""> in smokers without chronic symptoms, exsmokers, quitters and nonsmokers. This large overlap cannot be explained by differences in age, baseline FEV</span><sub data-dcnode-id="7105"><span data-dcnode-id="7106" instrument_node="">1</span></sub><span data-dcnode-id="7104" instrument_node=""> or sex. However, it could be due to differences in the prevalence of respiratory symptoms and severity of bronchial hyperresponsiveness </span><a class="xref-bibr" data-dcnode-id="7102" href="#ref-15" id="xref-ref-15-2"><span data-dcnode-id="7103" instrument_node="">15</span></a><span data-dcnode-id="7101" instrument_node="">, </span><a class="xref-bibr" data-dcnode-id="7099" href="#ref-17" id="xref-ref-17-1"><span data-dcnode-id="7100" instrument_node="">17</span></a><span data-dcnode-id="7098" instrument_node="">, </span><a class="xref-bibr" data-dcnode-id="7096" href="#ref-46" id="xref-ref-46-1"><span data-dcnode-id="7097" instrument_node="">46</span></a><span data-dcnode-id="7095" instrument_node="">, </span><a class="xref-bibr" data-dcnode-id="7093" href="#ref-47" id="xref-ref-47-1"><span data-dcnode-id="7094" instrument_node="">47</span></a><span data-dcnode-id="7092" instrument_node="">, </span><a class="xref-bibr" data-dcnode-id="7090" href="#ref-56" id="xref-ref-56-2"><span data-dcnode-id="7091" instrument_node="">56</span></a><span data-dcnode-id="7089" instrument_node="">–</span><a class="xref-bibr" data-dcnode-id="7087" href="#ref-58" id="xref-ref-58-1"><span data-dcnode-id="7088" instrument_node="">58</span></a><span data-dcnode-id="7086" instrument_node="">.</span></p><div class="table pos-float" data-dcnode-id="7065" id="T2"><div class="table-inline table-callout-links" data-dcnode-id="7074"><div class="callout" data-dcnode-id="7075"><span data-dcnode-id="7083"><span data-dcnode-id="7084" instrument_node="">View this table:</span></span><ul class="callout-links" data-dcnode-id="7076"><li class="view-inline first" data-dcnode-id="7080"><a class="table-expand-inline highwireTablesMarkupProcessor-processed" data-dcnode-id="7081" data-hide-link-title="0" data-icon-position="" data-table-url="/highwire/markup/84873/expansion?postprocessors=highwire_tables%2Chighwire_reclass%2Chighwire_figures%2Chighwire_math%2Chighwire_inline_linked_media%2Chighwire_embed&amp;table-expand-inline=1" href="#%23"><span data-dcnode-id="7082" instrument_node="">View inline</span></a></li><li class="view-popup last" data-dcnode-id="7077"><a class="colorbox colorbox-load table-expand-popup init-colorbox-processed cboxElement" data-dcnode-id="7078" data-hide-link-title="0" data-icon-position="" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//erj.ersjournals.com/highwire/markup/84873/expansion%3Fwidth%3D1000%26height%3D500%26iframe%3Dtrue%26postprocessors%3Dhighwire_tables%252Chighwire_reclass%252Chighwire_figures%252Chighwire_math%252Chighwire_inline_linked_media%252Chighwire_embed" rel="gallery-fragment-tables"><span data-dcnode-id="7079" instrument_node="">View popup</span></a></li></ul></div></div><div class="table-caption" data-dcnode-id="7066"><span class="table-label" data-dcnode-id="7072"><span data-dcnode-id="7073" instrument_node="">Table 2</span></span><span data-dcnode-id="7071" instrument_node="">
</span><p class="first-child" data-dcnode-id="7069" id="p-58"><span data-dcnode-id="7070" instrument_node="">Longitudinal data on lung function decline in smokers, exsmokers, quitters and nonsmokers without chronic respiratory symptoms</span></p><span data-dcnode-id="7068" instrument_node="">
</span><div class="sb-div caption-clear" data-dcnode-id="7067"></div></div></div><span data-dcnode-id="7064" instrument_node="">
</span><p data-dcnode-id="6971" id="p-19"><span data-dcnode-id="7063" instrument_node="">Prospective population studies have shown that smoking cessation in smokers without chronic symptoms slows the accelerated decline in lung function towards that observed in nonsmokers (table 2</span><a class="xref-up-link" data-dcnode-id="7060" href="#T2" id="xref-table-wrap-2-2"><span data-dcnode-id="7061"><span data-dcnode-id="7062" instrument_node="">⇑</span></span></a><span data-dcnode-id="7059" instrument_node="">) </span><a class="xref-bibr" data-dcnode-id="7057" href="#ref-8" id="xref-ref-8-2"><span data-dcnode-id="7058" instrument_node="">8</span></a><span data-dcnode-id="7056" instrument_node="">, </span><a class="xref-bibr" data-dcnode-id="7054" href="#ref-25" id="xref-ref-25-4"><span data-dcnode-id="7055" instrument_node="">25</span></a><span data-dcnode-id="7053" instrument_node="">, </span><a class="xref-bibr" data-dcnode-id="7051" href="#ref-45" id="xref-ref-45-1"><span data-dcnode-id="7052" instrument_node="">45</span></a><span data-dcnode-id="7050" instrument_node="">–</span><a class="xref-bibr" data-dcnode-id="7048" href="#ref-47" id="xref-ref-47-2"><span data-dcnode-id="7049" instrument_node="">47</span></a><span data-dcnode-id="7047" instrument_node="">, </span><a class="xref-bibr" data-dcnode-id="7045" href="#ref-46" id="xref-ref-46-2"><span data-dcnode-id="7046" instrument_node="">51</span></a><span data-dcnode-id="7044" instrument_node="">, </span><a class="xref-bibr" data-dcnode-id="7042" href="#ref-47" id="xref-ref-47-3"><span data-dcnode-id="7043" instrument_node="">52</span></a><span data-dcnode-id="7041" instrument_node="">, </span><a class="xref-bibr" data-dcnode-id="7039" href="#ref-51" id="xref-ref-51-1"><span data-dcnode-id="7040" instrument_node="">55</span></a><span data-dcnode-id="7038" instrument_node="">, </span><a class="xref-bibr" data-dcnode-id="7036" href="#ref-52" id="xref-ref-52-1"><span data-dcnode-id="7037" instrument_node="">56</span></a><span data-dcnode-id="7035" instrument_node="">. The decline in FEV</span><sub data-dcnode-id="7033"><span data-dcnode-id="7034" instrument_node="">1</span></sub><span data-dcnode-id="7032" instrument_node=""> normalises 2 yrs after smoking cessation </span><a class="xref-bibr" data-dcnode-id="7030" href="#ref-45" id="xref-ref-45-2"><span data-dcnode-id="7031" instrument_node="">45</span></a><span data-dcnode-id="7029" instrument_node="">, </span><a class="xref-bibr" data-dcnode-id="7027" href="#ref-55" id="xref-ref-55-1"><span data-dcnode-id="7028" instrument_node="">55</span></a><span data-dcnode-id="7026" instrument_node="">. However, in one study, a more rapid decline in FEV</span><sub data-dcnode-id="7024"><span data-dcnode-id="7025" instrument_node="">1</span></sub><span data-dcnode-id="7023" instrument_node=""> was found in exsmokers than in nonsmokers (20 and 6 mL·yr</span><sup data-dcnode-id="7021"><span data-dcnode-id="7022" instrument_node="">−1</span></sup><span data-dcnode-id="7020" instrument_node="">, respectively). The decline in FEV</span><sub data-dcnode-id="7018"><span data-dcnode-id="7019" instrument_node="">1</span></sub><span data-dcnode-id="7017" instrument_node=""> in quitters was similar to that in nonsmokers in this study </span><a class="xref-bibr" data-dcnode-id="7015" href="#ref-49" id="xref-ref-49-1"><span data-dcnode-id="7016" instrument_node="">49</span></a><span data-dcnode-id="7014" instrument_node="">. Only one longitudinal study, using a small number of subjects, showed that FEV</span><sub data-dcnode-id="7012"><span data-dcnode-id="7013" instrument_node="">1</span></sub><span data-dcnode-id="7011" instrument_node=""> improved after smoking cessation </span><a class="xref-bibr" data-dcnode-id="7009" href="#ref-59" id="xref-ref-59-1"><span data-dcnode-id="7010" instrument_node="">59</span></a><span data-dcnode-id="7008" instrument_node="">, but most studies do not show this </span><a class="xref-bibr" data-dcnode-id="7006" href="#ref-8" id="xref-ref-8-3"><span data-dcnode-id="7007" instrument_node="">8</span></a><span data-dcnode-id="7005" instrument_node="">, </span><a class="xref-bibr" data-dcnode-id="7003" href="#ref-24" id="xref-ref-24-1"><span data-dcnode-id="7004" instrument_node="">24</span></a><span data-dcnode-id="7002" instrument_node="">, </span><a class="xref-bibr" data-dcnode-id="7000" href="#ref-26" id="xref-ref-26-1"><span data-dcnode-id="7001" instrument_node="">26</span></a><span data-dcnode-id="6999" instrument_node="">, </span><a class="xref-bibr" data-dcnode-id="6997" href="#ref-30" id="xref-ref-30-2"><span data-dcnode-id="6998" instrument_node="">30</span></a><span data-dcnode-id="6996" instrument_node="">, </span><a class="xref-bibr" data-dcnode-id="6994" href="#ref-39" id="xref-ref-39-2"><span data-dcnode-id="6995" instrument_node="">39</span></a><span data-dcnode-id="6993" instrument_node="">, </span><a class="xref-bibr" data-dcnode-id="6991" href="#ref-45" id="xref-ref-45-3"><span data-dcnode-id="6992" instrument_node="">45</span></a><span data-dcnode-id="6990" instrument_node="">, </span><a class="xref-bibr" data-dcnode-id="6988" href="#ref-47" id="xref-ref-47-4"><span data-dcnode-id="6989" instrument_node="">47</span></a><span data-dcnode-id="6987" instrument_node="">, </span><a class="xref-bibr" data-dcnode-id="6985" href="#ref-49" id="xref-ref-49-2"><span data-dcnode-id="6986" instrument_node="">49</span></a><span data-dcnode-id="6984" instrument_node="">, </span><a class="xref-bibr" data-dcnode-id="6982" href="#ref-51" id="xref-ref-51-2"><span data-dcnode-id="6983" instrument_node="">51</span></a><span data-dcnode-id="6981" instrument_node="">, </span><a class="xref-bibr" data-dcnode-id="6979" href="#ref-55" id="xref-ref-55-2"><span data-dcnode-id="6980" instrument_node="">55</span></a><span data-dcnode-id="6978" instrument_node="">, </span><a class="xref-bibr" data-dcnode-id="6976" href="#ref-60" id="xref-ref-60-1"><span data-dcnode-id="6977" instrument_node="">60</span></a><span data-dcnode-id="6975" instrument_node="">, </span><a class="xref-bibr" data-dcnode-id="6973" href="#ref-61" id="xref-ref-61-1"><span data-dcnode-id="6974" instrument_node="">61</span></a><span data-dcnode-id="6972" instrument_node="">. A probable explanation is the already normal lung function in these participants before smoking cessation.</span></p><span data-dcnode-id="6970" instrument_node="">
</span><p data-dcnode-id="6932" id="p-20"><span data-dcnode-id="6969" instrument_node="">Several studies in smaller numbers of subjects (n=10–50) have investigated the effects of smoking cessation on uneven ventilation and small airway closure using the single-breath nitrogen-washout test. In this test, uneven ventilation is reflected by the slope of phase III (change in nitrogen concentration (ΔN</span><sub data-dcnode-id="6967"><span data-dcnode-id="6968" instrument_node="">2</span></sub><span data-dcnode-id="6966" instrument_node="">)), and small airway closure by closing volume (CV)/VC and closing capacity (CC)/total lung capacity (TLC). Although smokers without chronic symptoms exhibited normal FEV</span><sub data-dcnode-id="6964"><span data-dcnode-id="6965" instrument_node="">1</span></sub><span data-dcnode-id="6963" instrument_node="">, many showed higher ΔN</span><sub data-dcnode-id="6961"><span data-dcnode-id="6962" instrument_node="">2</span></sub><span data-dcnode-id="6960" instrument_node="">, CV/VC and CC/TLC than nonsmokers. This could not be attributed to any difference in other variables such as cumulative cigarette consumption, age or other lung function variables </span><a class="xref-bibr" data-dcnode-id="6958" href="#ref-24" id="xref-ref-24-2"><span data-dcnode-id="6959" instrument_node="">24</span></a><span data-dcnode-id="6957" instrument_node="">, </span><a class="xref-bibr" data-dcnode-id="6955" href="#ref-59" id="xref-ref-59-2"><span data-dcnode-id="6956" instrument_node="">59</span></a><span data-dcnode-id="6954" instrument_node="">. Since a higher CV and CC indicate earlier small airway closure at end-expiration, this might indicate that the small airways are already changed in these smokers. This is supported by the results of Niewoehner </span><em data-dcnode-id="6952"><span data-dcnode-id="6953" instrument_node="">et al.</span></em><span data-dcnode-id="6951" instrument_node=""> </span><a class="xref-bibr" data-dcnode-id="6949" href="#ref-5" id="xref-ref-5-1"><span data-dcnode-id="6950" instrument_node="">5</span></a><span data-dcnode-id="6948" instrument_node="">, who found inflammation in the small airways of smokers without chronic symptoms. Smoking cessation improved ΔN</span><sub data-dcnode-id="6946"><span data-dcnode-id="6947" instrument_node="">2</span></sub><span data-dcnode-id="6945" instrument_node="">, CV/VC and CC/TLC, indicating that these smoke-induced changes are probably reversible in this population </span><a class="xref-bibr" data-dcnode-id="6943" href="#ref-24" id="xref-ref-24-3"><span data-dcnode-id="6944" instrument_node="">24</span></a><span data-dcnode-id="6942" instrument_node="">, </span><a class="xref-bibr" data-dcnode-id="6940" href="#ref-25" id="xref-ref-25-5"><span data-dcnode-id="6941" instrument_node="">25</span></a><span data-dcnode-id="6939" instrument_node="">, </span><a class="xref-bibr" data-dcnode-id="6937" href="#ref-59" id="xref-ref-59-3"><span data-dcnode-id="6938" instrument_node="">59</span></a><span data-dcnode-id="6936" instrument_node="">, </span><a class="xref-bibr" data-dcnode-id="6934" href="#ref-62" id="xref-ref-62-1"><span data-dcnode-id="6935" instrument_node="">62</span></a><span data-dcnode-id="6933" instrument_node="">.</span></p><span data-dcnode-id="6931" instrument_node="">
</span></div><span data-dcnode-id="6929" instrument_node="">
</span><div class="subsection" data-dcnode-id="6770" id="sec-9"><span data-dcnode-id="6928" instrument_node="">
</span><h3 data-dcnode-id="6926"><span data-dcnode-id="6927" instrument_node="">Chronic bronchitis or chronic obstructive pulmonary disease</span></h3><span data-dcnode-id="6925" instrument_node="">
</span><p data-dcnode-id="6846" id="p-21"><span data-dcnode-id="6924" instrument_node="">Table 3</span><a class="xref-down-link" data-dcnode-id="6921" href="#T3" id="xref-table-wrap-3-1"><span data-dcnode-id="6922"><span data-dcnode-id="6923" instrument_node="">⇓</span></span></a><span data-dcnode-id="6920" instrument_node=""> presents a literature overview of the effect of smoking cessation on lung function (FEV</span><sub data-dcnode-id="6918"><span data-dcnode-id="6919" instrument_node="">1</span></sub><span data-dcnode-id="6917" instrument_node="">) decline in patients with chronic bronchitis or COPD. Fletcher and Peto </span><a class="xref-bibr" data-dcnode-id="6915" href="#ref-63" id="xref-ref-63-1"><span data-dcnode-id="6916" instrument_node="">63</span></a><span data-dcnode-id="6914" instrument_node=""> investigated males with mild airway obstruction and showed that the accelerated decline in FEV</span><sub data-dcnode-id="6912"><span data-dcnode-id="6913" instrument_node="">1</span></sub><span data-dcnode-id="6911" instrument_node=""> in exsmokers was slower than that in smokers (37 and 62 mL·yr</span><sup data-dcnode-id="6909"><span data-dcnode-id="6910" instrument_node="">−1</span></sup><span data-dcnode-id="6908" instrument_node="">, respectively). In addition, Postma </span><em data-dcnode-id="6906"><span data-dcnode-id="6907" instrument_node="">et al.</span></em><span data-dcnode-id="6905" instrument_node=""> </span><a class="xref-bibr" data-dcnode-id="6903" href="#ref-67" id="xref-ref-67-1"><span data-dcnode-id="6904" instrument_node="">67</span></a><span data-dcnode-id="6902" instrument_node=""> showed that smoking cessation in smokers with moderate COPD reduced the accelerated decline in FEV</span><sub data-dcnode-id="6900"><span data-dcnode-id="6901" instrument_node="">1</span></sub><span data-dcnode-id="6899" instrument_node=""> by ∼50%, from 85 to 49 mL·yr</span><sup data-dcnode-id="6897"><span data-dcnode-id="6898" instrument_node="">−1</span></sup><span data-dcnode-id="6896" instrument_node="">. The results of the Lung Health Study in mild-to-moderate COPD patients showed a similar reduction in the 5 yrs following their date of smoking cessation, </span><em data-dcnode-id="6894"><span data-dcnode-id="6895" instrument_node="">i.e.</span></em><span data-dcnode-id="6893" instrument_node=""> 63 mL·yr</span><sup data-dcnode-id="6891"><span data-dcnode-id="6892" instrument_node="">−1</span></sup><span data-dcnode-id="6890" instrument_node=""> in persistent smokers and 34 mL·yr</span><sup data-dcnode-id="6888"><span data-dcnode-id="6889" instrument_node="">−1</span></sup><span data-dcnode-id="6887" instrument_node=""> in quitters </span><a class="xref-bibr" data-dcnode-id="6885" href="#ref-3" id="xref-ref-3-2"><span data-dcnode-id="6886" instrument_node="">3</span></a><span data-dcnode-id="6884" instrument_node="">, </span><a class="xref-bibr" data-dcnode-id="6882" href="#ref-64" id="xref-ref-64-1"><span data-dcnode-id="6883" instrument_node="">64</span></a><span data-dcnode-id="6881" instrument_node="">–</span><a class="xref-bibr" data-dcnode-id="6879" href="#ref-66" id="xref-ref-66-1"><span data-dcnode-id="6880" instrument_node="">66</span></a><span data-dcnode-id="6878" instrument_node="">, </span><a class="xref-bibr" data-dcnode-id="6876" href="#ref-65" id="xref-ref-65-1"><span data-dcnode-id="6877" instrument_node="">71</span></a><span data-dcnode-id="6875" instrument_node=""> (fig. 1</span><a class="xref-down-link" data-dcnode-id="6872" href="#F1" id="xref-fig-1-1"><span data-dcnode-id="6873"><span data-dcnode-id="6874" instrument_node="">⇓</span></span></a><span data-dcnode-id="6871" instrument_node="">). During the first year after smoking cessation, FEV</span><sub data-dcnode-id="6869"><span data-dcnode-id="6870" instrument_node="">1</span></sub><span data-dcnode-id="6868" instrument_node=""> improved by 57 mL in quitters, whereas it fell by 32 mL in persistent smokers </span><a class="xref-bibr" data-dcnode-id="6866" href="#ref-64" id="xref-ref-64-2"><span data-dcnode-id="6867" instrument_node="">64</span></a><span data-dcnode-id="6865" instrument_node="">. After 11 yrs of follow-up, the decline in FEV</span><sub data-dcnode-id="6863"><span data-dcnode-id="6864" instrument_node="">1</span></sub><span data-dcnode-id="6862" instrument_node=""> in quitters was 30 mL·yr</span><sup data-dcnode-id="6860"><span data-dcnode-id="6861" instrument_node="">−1</span></sup><span data-dcnode-id="6859" instrument_node=""> for males and 22 mL·yr</span><sup data-dcnode-id="6857"><span data-dcnode-id="6858" instrument_node="">−1</span></sup><span data-dcnode-id="6856" instrument_node=""> for females, whereas, in continuous smokers, the decline was 66 mL·yr</span><sup data-dcnode-id="6854"><span data-dcnode-id="6855" instrument_node="">−1</span></sup><span data-dcnode-id="6853" instrument_node=""> and 54 mL·yr</span><sup data-dcnode-id="6851"><span data-dcnode-id="6852" instrument_node="">−1</span></sup><span data-dcnode-id="6850" instrument_node="">, respectively </span><a class="xref-bibr" data-dcnode-id="6848" href="#ref-71" id="xref-ref-71-1"><span data-dcnode-id="6849" instrument_node="">71</span></a><span data-dcnode-id="6847" instrument_node="">.</span></p><div class="fig pos-float odd" data-dcnode-id="6813" id="F1"><div class="highwire-figure" data-dcnode-id="6828"><div class="fig-inline-img-wrapper" data-dcnode-id="6839"><div class="fig-inline-img" data-dcnode-id="6840"><a class="highwire-fragment fragment-images colorbox-load highwireFiguresMarkupProcessor-processed cboxElement" data-dcnode-id="6841" data-figure-caption="<div class=&quot;highwire-markup&quot;>Effect of smoking cessation (○: persistent smoking cessation; •: continued smoking) on postbronchodilator forced expiratory volume in one second (FEV1) decline. From 64.</div>" data-hide-link-title="0" data-icon-position="" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//erj.ersjournals.com/content/erj/23/3/464/F1.large.jpg%3Fwidth%3D800%26height%3D600%26carousel%3D1" rel="gallery-fragment-images-1031786615" title="Effect of smoking cessation (○: persistent smoking cessation; •: continued smoking) on postbronchodilator forced expiratory volume in one second (FEV1) decline. From 64."><span class="hw-responsive-img" data-dcnode-id="6842"><img alt="Fig. 1.—" class="highwire-fragment fragment-image lazyload" data-dcnode-id="6845" data-src="https://erj.ersjournals.com/content/erj/23/3/464/F1.medium.gif" src="data:image/gif;base64,R0lGODlhAQABAIAAAAAAAP///yH5BAEAAAAALAAAAAABAAEAAAIBRAA7"><noscript data-dcnode-id="6843"><span data-dcnode-id="6844" instrument_node="">&lt;img class="highwire-fragment fragment-image" alt="Fig. 1.&amp;#x2014;" src="https://erj.ersjournals.com/content/erj/23/3/464/F1.medium.gif"/&gt;</span></noscript></span></a></div></div><ul class="highwire-figure-links inline" data-dcnode-id="6829"><li class="download-fig first" data-dcnode-id="6836"><a class="highwire-figure-link highwire-figure-link-download" data-dcnode-id="6837" data-hide-link-title="0" data-icon-position="" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//erj.ersjournals.com/content/erj/23/3/464/F1.large.jpg%3Fdownload%3Dtrue" title="Download Fig. 1.—"><span data-dcnode-id="6838" instrument_node="">Download figure</span></a></li><li class="new-tab" data-dcnode-id="6833"><a class="highwire-figure-link highwire-figure-link-newtab" data-dcnode-id="6834" data-hide-link-title="0" data-icon-position="" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//erj.ersjournals.com/content/erj/23/3/464/F1.large.jpg" target="_blank"><span data-dcnode-id="6835" instrument_node="">Open in new tab</span></a></li><li class="download-ppt last" data-dcnode-id="6830"><a class="highwire-figure-link highwire-figure-link-ppt" data-dcnode-id="6831" data-hide-link-title="0" data-icon-position="" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//erj.ersjournals.com/highwire/powerpoint/84856"><span data-dcnode-id="6832" instrument_node="">Download powerpoint</span></a></li></ul></div><div class="fig-caption" data-dcnode-id="6814" xmlns:xhtml="http://www.w3.org/1999/xhtml"><span class="fig-label" data-dcnode-id="6826"><span data-dcnode-id="6827" instrument_node="">Fig. 1.—</span></span><span data-dcnode-id="6825" instrument_node="">
</span><p class="first-child" data-dcnode-id="6817" id="p-48"><span data-dcnode-id="6824" instrument_node="">Effect of smoking cessation (○: persistent smoking cessation; •: continued smoking) on postbronchodilator forced expiratory volume in one second (FEV</span><sub data-dcnode-id="6822"><span data-dcnode-id="6823" instrument_node="">1</span></sub><span data-dcnode-id="6821" instrument_node="">) decline. From </span><a class="xref-bibr" data-dcnode-id="6819" href="#ref-64" id="xref-ref-64-3"><span data-dcnode-id="6820" instrument_node="">64</span></a><span data-dcnode-id="6818" instrument_node="">.</span></p><span data-dcnode-id="6816" instrument_node="">
</span><div class="sb-div caption-clear" data-dcnode-id="6815"></div></div></div><div class="table pos-float" data-dcnode-id="6793" id="T3"><div class="table-inline table-callout-links" data-dcnode-id="6802"><div class="callout" data-dcnode-id="6803"><span data-dcnode-id="6811"><span data-dcnode-id="6812" instrument_node="">View this table:</span></span><ul class="callout-links" data-dcnode-id="6804"><li class="view-inline first" data-dcnode-id="6808"><a class="table-expand-inline highwireTablesMarkupProcessor-processed" data-dcnode-id="6809" data-hide-link-title="0" data-icon-position="" data-table-url="/highwire/markup/84880/expansion?postprocessors=highwire_tables%2Chighwire_reclass%2Chighwire_figures%2Chighwire_math%2Chighwire_inline_linked_media%2Chighwire_embed&amp;table-expand-inline=1" href="#%23"><span data-dcnode-id="6810" instrument_node="">View inline</span></a></li><li class="view-popup last" data-dcnode-id="6805"><a class="colorbox colorbox-load table-expand-popup init-colorbox-processed cboxElement" data-dcnode-id="6806" data-hide-link-title="0" data-icon-position="" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//erj.ersjournals.com/highwire/markup/84880/expansion%3Fwidth%3D1000%26height%3D500%26iframe%3Dtrue%26postprocessors%3Dhighwire_tables%252Chighwire_reclass%252Chighwire_figures%252Chighwire_math%252Chighwire_inline_linked_media%252Chighwire_embed" rel="gallery-fragment-tables"><span data-dcnode-id="6807" instrument_node="">View popup</span></a></li></ul></div></div><div class="table-caption" data-dcnode-id="6794"><span class="table-label" data-dcnode-id="6800"><span data-dcnode-id="6801" instrument_node="">Table 3</span></span><span data-dcnode-id="6799" instrument_node="">
</span><p class="first-child" data-dcnode-id="6797" id="p-77"><span data-dcnode-id="6798" instrument_node="">Effects of smoking cessation on decline in lung function in smokers with chronic bronchitis (CB) or chronic obstructive pulmonary disease (COPD)</span></p><span data-dcnode-id="6796" instrument_node="">
</span><div class="sb-div caption-clear" data-dcnode-id="6795"></div></div></div><span data-dcnode-id="6792" instrument_node="">
</span><p data-dcnode-id="6772" id="p-22"><span data-dcnode-id="6791" instrument_node="">Decline in FEV</span><sub data-dcnode-id="6789"><span data-dcnode-id="6790" instrument_node="">1</span></sub><span data-dcnode-id="6788" instrument_node=""> is strongly related to cumulative cigarette consumption and severity of pre-existent bronchial hyperresponsiveness in smokers with COPD </span><a class="xref-bibr" data-dcnode-id="6786" href="#ref-65" id="xref-ref-65-2"><span data-dcnode-id="6787" instrument_node="">65</span></a><span data-dcnode-id="6785" instrument_node="">, </span><a class="xref-bibr" data-dcnode-id="6783" href="#ref-67" id="xref-ref-67-2"><span data-dcnode-id="6784" instrument_node="">67</span></a><span data-dcnode-id="6782" instrument_node="">. Decline in FEV</span><sub data-dcnode-id="6780"><span data-dcnode-id="6781" instrument_node="">1</span></sub><span data-dcnode-id="6779" instrument_node=""> is also related to the number of cigarettes smoked: heavy smokers with mild-to-moderate COPD showed a greater decline than light smokers, and these heavy smokers showed greater FEV</span><sub data-dcnode-id="6777"><span data-dcnode-id="6778" instrument_node="">1</span></sub><span data-dcnode-id="6776" instrument_node=""> improvement after smoking cessation than light smokers </span><a class="xref-bibr" data-dcnode-id="6774" href="#ref-65" id="xref-ref-65-3"><span data-dcnode-id="6775" instrument_node="">65</span></a><span data-dcnode-id="6773" instrument_node="">.</span></p><span data-dcnode-id="6771" instrument_node="">
</span></div><span data-dcnode-id="6769" instrument_node="">
</span></div><div class="section" data-dcnode-id="6577" id="sec-10"><span data-dcnode-id="6767" instrument_node="">
</span><h2 data-dcnode-id="6765"><span data-dcnode-id="6766" instrument_node="">Airway hyperresponsiveness</span></h2><span data-dcnode-id="6764" instrument_node="">
</span><div class="subsection" data-dcnode-id="6636" id="sec-11"><span data-dcnode-id="6763" instrument_node="">
</span><h3 data-dcnode-id="6761"><span data-dcnode-id="6762" instrument_node="">Subjects without chronic respiratory symptoms</span></h3><span data-dcnode-id="6760" instrument_node="">
</span><p data-dcnode-id="6712" id="p-23"><span data-dcnode-id="6759" instrument_node="">The prevalence of AHR to histamine has been reported to be similar in smokers and exsmokers without chronic symptoms </span><a class="xref-bibr" data-dcnode-id="6757" href="#ref-15" id="xref-ref-15-3"><span data-dcnode-id="6758" instrument_node="">15</span></a><span data-dcnode-id="6756" instrument_node="">, </span><a class="xref-bibr" data-dcnode-id="6754" href="#ref-53" id="xref-ref-53-1"><span data-dcnode-id="6755" instrument_node="">53</span></a><span data-dcnode-id="6753" instrument_node="">, </span><a class="xref-bibr" data-dcnode-id="6751" href="#ref-73" id="xref-ref-73-1"><span data-dcnode-id="6752" instrument_node="">73</span></a><span data-dcnode-id="6750" instrument_node="">, whereas the prevalence of AHR to methacholine is higher in smokers than in exsmokers (table 4</span><a class="xref-down-link" data-dcnode-id="6747" href="#T4" id="xref-table-wrap-4-1"><span data-dcnode-id="6748"><span data-dcnode-id="6749" instrument_node="">⇓</span></span></a><span data-dcnode-id="6746" instrument_node="">) </span><a class="xref-bibr" data-dcnode-id="6744" href="#ref-54" id="xref-ref-54-1"><span data-dcnode-id="6745" instrument_node="">54</span></a><span data-dcnode-id="6743" instrument_node="">, </span><a class="xref-bibr" data-dcnode-id="6741" href="#ref-74" id="xref-ref-74-1"><span data-dcnode-id="6742" instrument_node="">74</span></a><span data-dcnode-id="6740" instrument_node="">, </span><a class="xref-bibr" data-dcnode-id="6738" href="#ref-75" id="xref-ref-75-1"><span data-dcnode-id="6739" instrument_node="">75</span></a><span data-dcnode-id="6737" instrument_node="">, </span><a class="xref-bibr" data-dcnode-id="6735" href="#ref-77" id="xref-ref-77-1"><span data-dcnode-id="6736" instrument_node="">77</span></a><span data-dcnode-id="6734" instrument_node="">. This suggests that AHR to histamine is less reversible after smoking cessation than that to methacholine. This is, however, as yet unresolved since Rijcken </span><em data-dcnode-id="6732"><span data-dcnode-id="6733" instrument_node="">et al.</span></em><span data-dcnode-id="6731" instrument_node=""> </span><a class="xref-bibr" data-dcnode-id="6729" href="#ref-15" id="xref-ref-15-4"><span data-dcnode-id="6730" instrument_node="">15</span></a><span data-dcnode-id="6728" instrument_node=""> found no differences in the prevalence of AHR to histamine in smokers, exsmokers and nonsmokers, whereas Taylor </span><em data-dcnode-id="6726"><span data-dcnode-id="6727" instrument_node="">et al.</span></em><span data-dcnode-id="6725" instrument_node=""> </span><a class="xref-bibr" data-dcnode-id="6723" href="#ref-53" id="xref-ref-53-2"><span data-dcnode-id="6724" instrument_node="">53</span></a><span data-dcnode-id="6722" instrument_node=""> found a higher prevalence of AHR to histamine in exsmokers than in nonsmokers. The prevalence of AHR to methacholine has been reported to be similar in exsmokers and nonsmokers </span><a class="xref-bibr" data-dcnode-id="6720" href="#ref-54" id="xref-ref-54-2"><span data-dcnode-id="6721" instrument_node="">54</span></a><span data-dcnode-id="6719" instrument_node="">, </span><a class="xref-bibr" data-dcnode-id="6717" href="#ref-74" id="xref-ref-74-2"><span data-dcnode-id="6718" instrument_node="">74</span></a><span data-dcnode-id="6716" instrument_node="">–</span><a class="xref-bibr" data-dcnode-id="6714" href="#ref-77" id="xref-ref-77-2"><span data-dcnode-id="6715" instrument_node="">77</span></a><span data-dcnode-id="6713" instrument_node="">, suggesting at least a real improvement in AHR to methacholine after smoking cessation.</span></p><div class="table pos-float" data-dcnode-id="6692" id="T4"><div class="table-inline table-callout-links" data-dcnode-id="6701"><div class="callout" data-dcnode-id="6702"><span data-dcnode-id="6710"><span data-dcnode-id="6711" instrument_node="">View this table:</span></span><ul class="callout-links" data-dcnode-id="6703"><li class="view-inline first" data-dcnode-id="6707"><a class="table-expand-inline highwireTablesMarkupProcessor-processed" data-dcnode-id="6708" data-hide-link-title="0" data-icon-position="" data-table-url="/highwire/markup/84887/expansion?postprocessors=highwire_tables%2Chighwire_reclass%2Chighwire_figures%2Chighwire_math%2Chighwire_inline_linked_media%2Chighwire_embed&amp;table-expand-inline=1" href="#%23"><span data-dcnode-id="6709" instrument_node="">View inline</span></a></li><li class="view-popup last" data-dcnode-id="6704"><a class="colorbox colorbox-load table-expand-popup init-colorbox-processed cboxElement" data-dcnode-id="6705" data-hide-link-title="0" data-icon-position="" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//erj.ersjournals.com/highwire/markup/84887/expansion%3Fwidth%3D1000%26height%3D500%26iframe%3Dtrue%26postprocessors%3Dhighwire_tables%252Chighwire_reclass%252Chighwire_figures%252Chighwire_math%252Chighwire_inline_linked_media%252Chighwire_embed" rel="gallery-fragment-tables"><span data-dcnode-id="6706" instrument_node="">View popup</span></a></li></ul></div></div><div class="table-caption" data-dcnode-id="6693"><span class="table-label" data-dcnode-id="6699"><span data-dcnode-id="6700" instrument_node="">Table 4</span></span><span data-dcnode-id="6698" instrument_node="">
</span><p class="first-child" data-dcnode-id="6696" id="p-96"><span data-dcnode-id="6697" instrument_node="">Cross-sectional data on airway hyperresponsiveness (AHR) in smokers, exsmokers and nonsmokers without chronic respiratory symptoms</span></p><span data-dcnode-id="6695" instrument_node="">
</span><div class="sb-div caption-clear" data-dcnode-id="6694"></div></div></div><span data-dcnode-id="6691" instrument_node="">
</span><p data-dcnode-id="6676" id="p-24"><span data-dcnode-id="6690" instrument_node="">Only three studies have investigated the longitudinal effects of smoking cessation on AHR in smokers without chronic symptoms (table 5</span><a class="xref-down-link" data-dcnode-id="6687" href="#T5" id="xref-table-wrap-5-1"><span data-dcnode-id="6688"><span data-dcnode-id="6689" instrument_node="">⇓</span></span></a><span data-dcnode-id="6686" instrument_node="">), predominantly showing that AHR to methacholine or carbachol does not change after smoking cessation </span><a class="xref-bibr" data-dcnode-id="6684" href="#ref-23" id="xref-ref-23-1"><span data-dcnode-id="6685" instrument_node="">23</span></a><span data-dcnode-id="6683" instrument_node="">, </span><a class="xref-bibr" data-dcnode-id="6681" href="#ref-27" id="xref-ref-27-3"><span data-dcnode-id="6682" instrument_node="">27</span></a><span data-dcnode-id="6680" instrument_node="">, </span><a class="xref-bibr" data-dcnode-id="6678" href="#ref-61" id="xref-ref-61-2"><span data-dcnode-id="6679" instrument_node="">61</span></a><span data-dcnode-id="6677" instrument_node="">. However, the number of subjects investigated was small (n=10–17), and most individuals had no AHR at the start of the study, which made it virtually impossible to find a significant improvement after smoking cessation.</span></p><div class="table pos-float" data-dcnode-id="6656" id="T5"><div class="table-inline table-callout-links" data-dcnode-id="6665"><div class="callout" data-dcnode-id="6666"><span data-dcnode-id="6674"><span data-dcnode-id="6675" instrument_node="">View this table:</span></span><ul class="callout-links" data-dcnode-id="6667"><li class="view-inline first" data-dcnode-id="6671"><a class="table-expand-inline highwireTablesMarkupProcessor-processed" data-dcnode-id="6672" data-hide-link-title="0" data-icon-position="" data-table-url="/highwire/markup/84898/expansion?postprocessors=highwire_tables%2Chighwire_reclass%2Chighwire_figures%2Chighwire_math%2Chighwire_inline_linked_media%2Chighwire_embed&amp;table-expand-inline=1" href="#%23"><span data-dcnode-id="6673" instrument_node="">View inline</span></a></li><li class="view-popup last" data-dcnode-id="6668"><a class="colorbox colorbox-load table-expand-popup init-colorbox-processed cboxElement" data-dcnode-id="6669" data-hide-link-title="0" data-icon-position="" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//erj.ersjournals.com/highwire/markup/84898/expansion%3Fwidth%3D1000%26height%3D500%26iframe%3Dtrue%26postprocessors%3Dhighwire_tables%252Chighwire_reclass%252Chighwire_figures%252Chighwire_math%252Chighwire_inline_linked_media%252Chighwire_embed" rel="gallery-fragment-tables"><span data-dcnode-id="6670" instrument_node="">View popup</span></a></li></ul></div></div><div class="table-caption" data-dcnode-id="6657"><span class="table-label" data-dcnode-id="6663"><span data-dcnode-id="6664" instrument_node="">Table 5</span></span><span data-dcnode-id="6662" instrument_node="">
</span><p class="first-child" data-dcnode-id="6660" id="p-121"><span data-dcnode-id="6661" instrument_node="">Effect of smoking cessation (SC) on airway hyperresponsiveness (AHR) in smokers without chronic respiratory symptoms</span></p><span data-dcnode-id="6659" instrument_node="">
</span><div class="sb-div caption-clear" data-dcnode-id="6658"></div></div></div><span data-dcnode-id="6655" instrument_node="">
</span><p data-dcnode-id="6638" id="p-25"><span data-dcnode-id="6654" instrument_node="">Lim </span><em data-dcnode-id="6652"><span data-dcnode-id="6653" instrument_node="">et al.</span></em><span data-dcnode-id="6651" instrument_node=""> </span><a class="xref-bibr" data-dcnode-id="6649" href="#ref-73" id="xref-ref-73-2"><span data-dcnode-id="6650" instrument_node="">73</span></a><span data-dcnode-id="6648" instrument_node=""> showed that the severity of AHR to histamine deteriorated in smokers without chronic symptoms who continued smoking: the provocative concentration of histamine causing a 20% fall in FEV</span><sub data-dcnode-id="6646"><span data-dcnode-id="6647" instrument_node="">1</span></sub><span data-dcnode-id="6645" instrument_node=""> changed significantly from 7.1 to 3.3 mg·mL</span><sup data-dcnode-id="6643"><span data-dcnode-id="6644" instrument_node="">−1</span></sup><span data-dcnode-id="6642" instrument_node=""> over 4 yrs. In contrast, AHR did not change (from 6.7 to 6.0 mg·mL</span><sup data-dcnode-id="6640"><span data-dcnode-id="6641" instrument_node="">−1</span></sup><span data-dcnode-id="6639" instrument_node="">) in subjects who refrained from smoking. Taken together, this suggests that smoking cessation would prevent future deterioration in AHR, although it does not lead to improvement.</span></p><span data-dcnode-id="6637" instrument_node="">
</span></div><span data-dcnode-id="6635" instrument_node="">
</span><div class="subsection" data-dcnode-id="6579" id="sec-12"><span data-dcnode-id="6634" instrument_node="">
</span><h3 data-dcnode-id="6632"><span data-dcnode-id="6633" instrument_node="">Chronic bronchitis and chronic obstructive pulmonary disease</span></h3><span data-dcnode-id="6631" instrument_node="">
</span><p data-dcnode-id="6613" id="p-26"><span data-dcnode-id="6630" instrument_node="">Cross-sectional studies investigating AHR in smokers and exsmokers with chronic bronchitis or COPD are presented in table 6</span><a class="xref-down-link" data-dcnode-id="6627" href="#T6" id="xref-table-wrap-6-1"><span data-dcnode-id="6628"><span data-dcnode-id="6629" instrument_node="">⇓</span></span></a><span data-dcnode-id="6626" instrument_node="">. The severity of AHR to histamine or methacholine is similar in smokers and exsmokers with moderate COPD </span><a class="xref-bibr" data-dcnode-id="6624" href="#ref-81" id="xref-ref-81-1"><span data-dcnode-id="6625" instrument_node="">81</span></a><span data-dcnode-id="6623" instrument_node="">, </span><a class="xref-bibr" data-dcnode-id="6621" href="#ref-82" id="xref-ref-82-1"><span data-dcnode-id="6622" instrument_node="">82</span></a><span data-dcnode-id="6620" instrument_node="">. This suggests that AHR to histamine and methacholine does not revert to normal levels after smoking cessation in COPD, which could be due to either ongoing inflammation or irreversible structural changes in the lung. In contrast, hyperresponsiveness to adenosine‐5'‐monophosphate is more severe in current smokers than in exsmokers with moderate COPD, even when AHR to methacholine is similar between these groups </span><a class="xref-bibr" data-dcnode-id="6618" href="#ref-81" id="xref-ref-81-2"><span data-dcnode-id="6619" instrument_node="">81</span></a><span data-dcnode-id="6617" instrument_node="">. These cross-sectional data suggest that AHR to adenosine‐5'‐monophosphate improves after smoking cessation, possibly as a consequence of a decrease in the number of mast cells in the lung </span><a class="xref-bibr" data-dcnode-id="6615" href="#ref-85" id="xref-ref-85-1"><span data-dcnode-id="6616" instrument_node="">85</span></a><span data-dcnode-id="6614" instrument_node="">.</span></p><div class="table pos-float" data-dcnode-id="6593" id="T6"><div class="table-inline table-callout-links" data-dcnode-id="6602"><div class="callout" data-dcnode-id="6603"><span data-dcnode-id="6611"><span data-dcnode-id="6612" instrument_node="">View this table:</span></span><ul class="callout-links" data-dcnode-id="6604"><li class="view-inline first" data-dcnode-id="6608"><a class="table-expand-inline highwireTablesMarkupProcessor-processed" data-dcnode-id="6609" data-hide-link-title="0" data-icon-position="" data-table-url="/highwire/markup/84906/expansion?postprocessors=highwire_tables%2Chighwire_reclass%2Chighwire_figures%2Chighwire_math%2Chighwire_inline_linked_media%2Chighwire_embed&amp;table-expand-inline=1" href="#%23"><span data-dcnode-id="6610" instrument_node="">View inline</span></a></li><li class="view-popup last" data-dcnode-id="6605"><a class="colorbox colorbox-load table-expand-popup init-colorbox-processed cboxElement" data-dcnode-id="6606" data-hide-link-title="0" data-icon-position="" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//erj.ersjournals.com/highwire/markup/84906/expansion%3Fwidth%3D1000%26height%3D500%26iframe%3Dtrue%26postprocessors%3Dhighwire_tables%252Chighwire_reclass%252Chighwire_figures%252Chighwire_math%252Chighwire_inline_linked_media%252Chighwire_embed" rel="gallery-fragment-tables"><span data-dcnode-id="6607" instrument_node="">View popup</span></a></li></ul></div></div><div class="table-caption" data-dcnode-id="6594"><span class="table-label" data-dcnode-id="6600"><span data-dcnode-id="6601" instrument_node="">Table 6</span></span><span data-dcnode-id="6599" instrument_node="">
</span><p class="first-child" data-dcnode-id="6597" id="p-135"><span data-dcnode-id="6598" instrument_node="">Cross-sectional data on airway hyperresponsiveness (AHR) in smokers and exsmokers with chronic bronchitis (CB) or chronic obstructive pulmonary disease (COPD)</span></p><span data-dcnode-id="6596" instrument_node="">
</span><div class="sb-div caption-clear" data-dcnode-id="6595"></div></div></div><span data-dcnode-id="6592" instrument_node="">
</span><p data-dcnode-id="6581" id="p-27"><span data-dcnode-id="6591" instrument_node="">The above cross-sectional data are not in line with the 5‐yr follow-up data of the Lung Health Study </span><a class="xref-bibr" data-dcnode-id="6589" href="#ref-86" id="xref-ref-86-1"><span data-dcnode-id="6590" instrument_node="">86</span></a><span data-dcnode-id="6588" instrument_node="">. Continuous smokers showed a more than three-fold deterioration in AHR to methacholine compared to sustained quitters. Interestingly, the authors also showed that a considerable degree of the effect of smoking on AHR could be accounted for by the induced changes in FEV</span><sub data-dcnode-id="6586"><span data-dcnode-id="6587" instrument_node="">1</span></sub><span data-dcnode-id="6585" instrument_node=""> </span><a class="xref-bibr" data-dcnode-id="6583" href="#ref-86" id="xref-ref-86-2"><span data-dcnode-id="6584" instrument_node="">86</span></a><span data-dcnode-id="6582" instrument_node="">.</span></p><span data-dcnode-id="6580" instrument_node="">
</span></div><span data-dcnode-id="6578" instrument_node="">
</span></div><div class="section" data-dcnode-id="6284" id="sec-13"><span data-dcnode-id="6576" instrument_node="">
</span><h2 data-dcnode-id="6574"><span data-dcnode-id="6575" instrument_node="">Pathological and inflammatory changes in the lungs</span></h2><span data-dcnode-id="6573" instrument_node="">
</span><div class="subsection" data-dcnode-id="6424" id="sec-14"><span data-dcnode-id="6572" instrument_node="">
