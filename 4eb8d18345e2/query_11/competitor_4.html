</span><h3 data-dcnode-id="6570"><span data-dcnode-id="6571" instrument_node="">Subjects without chronic respiratory symptoms</span></h3><span data-dcnode-id="6569" instrument_node="">
</span><p data-dcnode-id="6561" id="p-28"><span data-dcnode-id="6568" instrument_node="">The effect of smoking cessation on pathological changes and inflammation in smokers without chronic respiratory symptoms has not been extensively investigated. Only two studies have assessed pathological changes in smokers and exsmokers without chronic symptoms undergoing surgical treatment for a lung tumour </span><a class="xref-bibr" data-dcnode-id="6566" href="#ref-87" id="xref-ref-87-1"><span data-dcnode-id="6567" instrument_node="">87</span></a><span data-dcnode-id="6565" instrument_node="">, </span><a class="xref-bibr" data-dcnode-id="6563" href="#ref-88" id="xref-ref-88-1"><span data-dcnode-id="6564" instrument_node="">88</span></a><span data-dcnode-id="6562" instrument_node="">. Goblet cell hyperplasia was observed remarkably less in these exsmokers. Squamous metaplasia was not different in the central airways, but tended to be less abundant in the peripheral airways of exsmokers compared to smokers. Gland size and smooth muscle mass in the peripheral and central airways were similar in both groups. No differences were found in the amount of fibrosis in the peripheral airways or pigment deposition in the airway wall and the number of destroyed alveoli. Apparently, such pathological changes are not or less reversible after smoking cessation, in contrast to goblet cell hyperplasia.</span></p><span data-dcnode-id="6560" instrument_node="">
</span><p data-dcnode-id="6510" id="p-29"><span data-dcnode-id="6559" instrument_node="">The aforementioned studies </span><a class="xref-bibr" data-dcnode-id="6557" href="#ref-87" id="xref-ref-87-2"><span data-dcnode-id="6558" instrument_node="">87</span></a><span data-dcnode-id="6556" instrument_node="">, </span><a class="xref-bibr" data-dcnode-id="6554" href="#ref-88" id="xref-ref-88-2"><span data-dcnode-id="6555" instrument_node="">88</span></a><span data-dcnode-id="6553" instrument_node=""> also assessed inflammation, but found no differences in the intensity of inflammation in central and peripheral airways. Other cross-sectional studies, using indirect and direct measures of airway inflammation or more specific immunological techniques, have shown different results. In blood, leukocyte counts are lower in exsmokers than in smokers, suggesting improvement </span><a class="xref-bibr" data-dcnode-id="6551" href="#ref-32" id="xref-ref-32-2"><span data-dcnode-id="6552" instrument_node="">32</span></a><span data-dcnode-id="6550" instrument_node="">, </span><a class="xref-bibr" data-dcnode-id="6548" href="#ref-89" id="xref-ref-89-1"><span data-dcnode-id="6549" instrument_node="">89</span></a><span data-dcnode-id="6547" instrument_node="">–</span><a class="xref-bibr" data-dcnode-id="6545" href="#ref-92" id="xref-ref-92-1"><span data-dcnode-id="6546" instrument_node="">92</span></a><span data-dcnode-id="6544" instrument_node=""> but not always normalisation </span><a class="xref-bibr" data-dcnode-id="6542" href="#ref-89" id="xref-ref-89-2"><span data-dcnode-id="6543" instrument_node="">89</span></a><span data-dcnode-id="6541" instrument_node=""> after smoking cessation. In exsmokers, the percentage of CD4+ lymphocytes is lower than in smokers and normalises after 2 yrs of smoking cessation </span><a class="xref-bibr" data-dcnode-id="6539" href="#ref-90" id="xref-ref-90-1"><span data-dcnode-id="6540" instrument_node="">90</span></a><span data-dcnode-id="6538" instrument_node="">, </span><a class="xref-bibr" data-dcnode-id="6536" href="#ref-93" id="xref-ref-93-1"><span data-dcnode-id="6537" instrument_node="">93</span></a><span data-dcnode-id="6535" instrument_node="">. In addition, the percentage of natural killer cells is higher in exsmokers than in smokers </span><a class="xref-bibr" data-dcnode-id="6533" href="#ref-93" id="xref-ref-93-2"><span data-dcnode-id="6534" instrument_node="">93</span></a><span data-dcnode-id="6532" instrument_node="">, </span><a class="xref-bibr" data-dcnode-id="6530" href="#ref-94" id="xref-ref-94-1"><span data-dcnode-id="6531" instrument_node="">94</span></a><span data-dcnode-id="6529" instrument_node="">. In exhaled air, exsmokers show similar nitric oxide levels to nonsmokers, in contrast to the lower levels measured in smokers </span><a class="xref-bibr" data-dcnode-id="6527" href="#ref-95" id="xref-ref-95-1"><span data-dcnode-id="6528" instrument_node="">95</span></a><span data-dcnode-id="6526" instrument_node="">–</span><a class="xref-bibr" data-dcnode-id="6524" href="#ref-100" id="xref-ref-100-1"><span data-dcnode-id="6525" instrument_node="">100</span></a><span data-dcnode-id="6523" instrument_node="">. In sputum, interleukin (IL)‐8 levels are similar in exsmokers and smokers </span><a class="xref-bibr" data-dcnode-id="6521" href="#ref-101" id="xref-ref-101-1"><span data-dcnode-id="6522" instrument_node="">101</span></a><span data-dcnode-id="6520" instrument_node="">, but remain higher than in nonsmokers </span><a class="xref-bibr" data-dcnode-id="6518" href="#ref-102" id="xref-ref-102-1"><span data-dcnode-id="6519" instrument_node="">102</span></a><span data-dcnode-id="6517" instrument_node="">, </span><a class="xref-bibr" data-dcnode-id="6515" href="#ref-103" id="xref-ref-103-1"><span data-dcnode-id="6516" instrument_node="">103</span></a><span data-dcnode-id="6514" instrument_node="">, suggesting that pro-inflammatory activity might not change after smoking cessation. Only one bronchoalveolar lavage fluid (BALF) study compared exsmokers (age 62 yrs, n=6), smokers (age 49 yrs, n=14) and nonsmokers (age 48 yrs, n=15). The percentages of all cells in BALF were similar between smokers and exsmokers. The number of neutrophils, however, tended to be lower in exsmokers than in smokers, but remained higher than in nonsmokers. In addition, the number of macrophages was lower in exsmokers than in smokers, and similar to the number of macrophages in nonsmokers. The same study reported that the concentration of monocyte chemotactic protein‐1 (MCP‐1), an important chemoattractant for macrophages, was higher in smokers than in exsmokers and nonsmokers, with no difference between the latter groups. The concentration of macrophage inhibitory protein‐1b, another monocyte chemoattractant, in BALF was similar between the groups. Thus, after smoking cessation, the higher number of macrophages and MCP‐1 levels seem to normalise, whereas the number of neutrophils does not </span><a class="xref-bibr" data-dcnode-id="6512" href="#ref-104" id="xref-ref-104-1"><span data-dcnode-id="6513" instrument_node="">104</span></a><span data-dcnode-id="6511" instrument_node="">.</span></p><span data-dcnode-id="6509" instrument_node="">
</span><p data-dcnode-id="6497" id="p-30"><span data-dcnode-id="6508" instrument_node="">A few studies have assessed the effect of smoking cessation on inflammation in smokers without chronic respiratory symptoms in a longitudinal way (table 7</span><a class="xref-down-link" data-dcnode-id="6505" href="#T7" id="xref-table-wrap-7-1"><span data-dcnode-id="6506"><span data-dcnode-id="6507" instrument_node="">⇓</span></span></a><span data-dcnode-id="6504" instrument_node="">). Endobronchial findings showed that macroscopic signs of chronic bronchitis (oedema, erythema and mucus) decreased within 3 months after smoking cessation, and totally disappeared after 6 months </span><a class="xref-bibr" data-dcnode-id="6502" href="#ref-115" id="xref-ref-115-1"><span data-dcnode-id="6503" instrument_node="">115</span></a><span data-dcnode-id="6501" instrument_node="">. Exhaled NO levels increased almost to normal values within 1 week of smoking cessation, suggesting that the smoke-induced inhibition of inducible nitric oxide synthase production by epithelial cells is reversible </span><a class="xref-bibr" data-dcnode-id="6499" href="#ref-105" id="xref-ref-105-1"><span data-dcnode-id="6500" instrument_node="">105</span></a><span data-dcnode-id="6498" instrument_node="">.</span></p><div class="table pos-float" data-dcnode-id="6477" id="T7"><div class="table-inline table-callout-links" data-dcnode-id="6486"><div class="callout" data-dcnode-id="6487"><span data-dcnode-id="6495"><span data-dcnode-id="6496" instrument_node="">View this table:</span></span><ul class="callout-links" data-dcnode-id="6488"><li class="view-inline first" data-dcnode-id="6492"><a class="table-expand-inline highwireTablesMarkupProcessor-processed" data-dcnode-id="6493" data-hide-link-title="0" data-icon-position="" data-table-url="/highwire/markup/84914/expansion?postprocessors=highwire_tables%2Chighwire_reclass%2Chighwire_figures%2Chighwire_math%2Chighwire_inline_linked_media%2Chighwire_embed&amp;table-expand-inline=1" href="#%23"><span data-dcnode-id="6494" instrument_node="">View inline</span></a></li><li class="view-popup last" data-dcnode-id="6489"><a class="colorbox colorbox-load table-expand-popup init-colorbox-processed cboxElement" data-dcnode-id="6490" data-hide-link-title="0" data-icon-position="" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//erj.ersjournals.com/highwire/markup/84914/expansion%3Fwidth%3D1000%26height%3D500%26iframe%3Dtrue%26postprocessors%3Dhighwire_tables%252Chighwire_reclass%252Chighwire_figures%252Chighwire_math%252Chighwire_inline_linked_media%252Chighwire_embed" rel="gallery-fragment-tables"><span data-dcnode-id="6491" instrument_node="">View popup</span></a></li></ul></div></div><div class="table-caption" data-dcnode-id="6478"><span class="table-label" data-dcnode-id="6484"><span data-dcnode-id="6485" instrument_node="">Table 7</span></span><span data-dcnode-id="6483" instrument_node="">
</span><p class="first-child" data-dcnode-id="6481" id="p-148"><span data-dcnode-id="6482" instrument_node="">Effect of smoking cessation (SC) on inflammation in blood, sputum and bronchoalveolar lavage fluid (BALF) in smokers without chronic respiratory symptoms</span></p><span data-dcnode-id="6480" instrument_node="">
</span><div class="sb-div caption-clear" data-dcnode-id="6479"></div></div></div><span data-dcnode-id="6476" instrument_node="">
</span><p data-dcnode-id="6441" id="p-31"><span data-dcnode-id="6475" instrument_node="">The number of blood leukocytes fell almost immediately after smoking cessation, the largest effect occurring within the first 9 months </span><a class="xref-bibr" data-dcnode-id="6473" href="#ref-89" id="xref-ref-89-3"><span data-dcnode-id="6474" instrument_node="">89</span></a><span data-dcnode-id="6472" instrument_node="">, </span><a class="xref-bibr" data-dcnode-id="6470" href="#ref-106" id="xref-ref-106-1"><span data-dcnode-id="6471" instrument_node="">106</span></a><span data-dcnode-id="6469" instrument_node="">, </span><a class="xref-bibr" data-dcnode-id="6467" href="#ref-107" id="xref-ref-107-1"><span data-dcnode-id="6468" instrument_node="">107</span></a><span data-dcnode-id="6466" instrument_node="">. In addition, a fall in the number of macrophages in sputum and BALF was already evident 1–2 months after smoking cessation, reaching normal levels in BALF at 6 months </span><a class="xref-bibr" data-dcnode-id="6464" href="#ref-106" id="xref-ref-106-2"><span data-dcnode-id="6465" instrument_node="">106</span></a><span data-dcnode-id="6463" instrument_node="">, </span><a class="xref-bibr" data-dcnode-id="6461" href="#ref-115" id="xref-ref-115-2"><span data-dcnode-id="6462" instrument_node="">115</span></a><span data-dcnode-id="6460" instrument_node="">, </span><a class="xref-bibr" data-dcnode-id="6458" href="#ref-116" id="xref-ref-116-1"><span data-dcnode-id="6459" instrument_node="">116</span></a><span data-dcnode-id="6457" instrument_node="">. BALF neutrophils and lymphocytes normalised at 9 and 15 months, respectively, after smoking cessation </span><a class="xref-bibr" data-dcnode-id="6455" href="#ref-106" id="xref-ref-106-3"><span data-dcnode-id="6456" instrument_node="">106</span></a><span data-dcnode-id="6454" instrument_node="">. Not only did the number of inflammatory cells in blood and BALF decrease after smoking cessation, but these cells also seemed to be less activated </span><a class="xref-bibr" data-dcnode-id="6452" href="#ref-112" id="xref-ref-112-1"><span data-dcnode-id="6453" instrument_node="">112</span></a><span data-dcnode-id="6451" instrument_node="">, </span><a class="xref-bibr" data-dcnode-id="6449" href="#ref-115" id="xref-ref-115-3"><span data-dcnode-id="6450" instrument_node="">115</span></a><span data-dcnode-id="6448" instrument_node="">. In addition, a decrease in pro-inflammatory mediator (soluble intercellular adhesion molecules and soluble CD44) levels has been reported </span><a class="xref-bibr" data-dcnode-id="6446" href="#ref-110" id="xref-ref-110-1"><span data-dcnode-id="6447" instrument_node="">110</span></a><span data-dcnode-id="6445" instrument_node="">, </span><a class="xref-bibr" data-dcnode-id="6443" href="#ref-111" id="xref-ref-111-1"><span data-dcnode-id="6444" instrument_node="">111</span></a><span data-dcnode-id="6442" instrument_node="">.</span></p><span data-dcnode-id="6440" instrument_node="">
</span><p data-dcnode-id="6429" id="p-32"><span data-dcnode-id="6439" instrument_node="">Smoking reduction, like smoking cessation, also reduced airway inflammation. Rennard </span><em data-dcnode-id="6437"><span data-dcnode-id="6438" instrument_node="">et al.</span></em><span data-dcnode-id="6436" instrument_node=""> </span><a class="xref-bibr" data-dcnode-id="6434" href="#ref-118" id="xref-ref-118-1"><span data-dcnode-id="6435" instrument_node="">118</span></a><span data-dcnode-id="6433" instrument_node=""> investigated the BALF of 15 heavy smokers who reduced their cigarette consumption from a mean of 50 to 19 cigarettes·day</span><sup data-dcnode-id="6431"><span data-dcnode-id="6432" instrument_node="">−1</span></sup><span data-dcnode-id="6430" instrument_node="">. After 2 months of smoking reduction, the number of neutrophils and macrophages and elastase levels decreased significantly.</span></p><span data-dcnode-id="6428" instrument_node="">
</span><p data-dcnode-id="6426" id="p-33"><span data-dcnode-id="6427" instrument_node="">Longitudinal data on blood, BALF and sputum show that smoke-induced changes are reversible after smoking cessation in smokers without chronic respiratory symptoms; however, cross-sectional studies on BALF and sputum suggest that they are only partially reversible. Although longitudinal data on smoking cessation in lung tissue are lacking, the available data indicate that the inflammatory changes in this group of smokers are (at least partially) reversible after smoking cessation.</span></p><span data-dcnode-id="6425" instrument_node="">
</span></div><span data-dcnode-id="6423" instrument_node="">
</span><div class="subsection" data-dcnode-id="6286" id="sec-15"><span data-dcnode-id="6422" instrument_node="">
</span><h3 data-dcnode-id="6420"><span data-dcnode-id="6421" instrument_node="">Chronic bronchitis or chronic obstructive pulmonary disease</span></h3><span data-dcnode-id="6419" instrument_node="">
</span><p data-dcnode-id="6390" id="p-34"><span data-dcnode-id="6418" instrument_node="">Only a few cross-sectional studies provide any information about the possible effects of smoking cessation in patients with chronic bronchitis or COPD </span><a class="xref-bibr" data-dcnode-id="6416" href="#ref-85" id="xref-ref-85-2"><span data-dcnode-id="6417" instrument_node="">85</span></a><span data-dcnode-id="6415" instrument_node="">, </span><a class="xref-bibr" data-dcnode-id="6413" href="#ref-87" id="xref-ref-87-3"><span data-dcnode-id="6414" instrument_node="">87</span></a><span data-dcnode-id="6412" instrument_node="">, </span><a class="xref-bibr" data-dcnode-id="6410" href="#ref-88" id="xref-ref-88-3"><span data-dcnode-id="6411" instrument_node="">88</span></a><span data-dcnode-id="6409" instrument_node="">, </span><a class="xref-bibr" data-dcnode-id="6407" href="#ref-93" id="xref-ref-93-3"><span data-dcnode-id="6408" instrument_node="">93</span></a><span data-dcnode-id="6406" instrument_node="">, </span><a class="xref-bibr" data-dcnode-id="6404" href="#ref-98" id="xref-ref-98-1"><span data-dcnode-id="6405" instrument_node="">98</span></a><span data-dcnode-id="6403" instrument_node="">, </span><a class="xref-bibr" data-dcnode-id="6401" href="#ref-100" id="xref-ref-100-2"><span data-dcnode-id="6402" instrument_node="">100</span></a><span data-dcnode-id="6400" instrument_node="">, </span><a class="xref-bibr" data-dcnode-id="6398" href="#ref-101" id="xref-ref-101-2"><span data-dcnode-id="6399" instrument_node="">101</span></a><span data-dcnode-id="6397" instrument_node="">, </span><a class="xref-bibr" data-dcnode-id="6395" href="#ref-119" id="xref-ref-119-1"><span data-dcnode-id="6396" instrument_node="">119</span></a><span data-dcnode-id="6394" instrument_node="">–</span><a class="xref-bibr" data-dcnode-id="6392" href="#ref-125" id="xref-ref-125-1"><span data-dcnode-id="6393" instrument_node="">125</span></a><span data-dcnode-id="6391" instrument_node="">. A major drawback in most of these studies is that they were not originally designed to compare smokers and exsmokers, and, therefore, the number of subjects was often too small to perform separate analyses.</span></p><span data-dcnode-id="6389" instrument_node="">
</span><p data-dcnode-id="6381" id="p-35"><span data-dcnode-id="6388" instrument_node="">In the central airways of patients with chronic bronchitis, there was less goblet cell hyperplasia in exsmokers than in smokers. In contrast, there was more squamous metaplasia in exsmokers </span><a class="xref-bibr" data-dcnode-id="6386" href="#ref-88" id="xref-ref-88-4"><span data-dcnode-id="6387" instrument_node="">88</span></a><span data-dcnode-id="6385" instrument_node="">. In the peripheral airways, goblet cell hyperplasia and squamous metaplasia occurred at similar levels in both groups. More inflammatory cells were present near the secretory glands in the central airways of the exsmokers, which may explain the diminished but still ongoing cough and sputum production after smoking cessation in these patients. More inflammatory cells were present in the wall of the peripheral airways of these exsmokers than in smokers, which contrasted with the lower number of macrophages in the airway lumen in the exsmokers. The presence of glands, smooth muscle mass, fibrosis or cartilage were similar in both groups </span><a class="xref-bibr" data-dcnode-id="6383" href="#ref-88" id="xref-ref-88-5"><span data-dcnode-id="6384" instrument_node="">88</span></a><span data-dcnode-id="6382" instrument_node="">. It is not yet known whether the composition of inflammatory cells and their mediators in the lungs changes after smoking cessation in patients with chronic bronchitis.</span></p><span data-dcnode-id="6380" instrument_node="">
</span><p data-dcnode-id="6375" id="p-36"><span data-dcnode-id="6379" instrument_node="">In patients with mild COPD, there tended to be less goblet cell hyperplasia in exsmokers who had quitted smoking for &lt;2 yrs than in smokers and exsmokers who had quitted smoking for &gt;2 yrs. Goblet cell hyperplasia in the latter two groups was similar. This was a cross-sectional study, and it cannot be ruled out that subjects who had quit for &gt;2 yrs had more goblet cell hyperplasia at baseline </span><a class="xref-bibr" data-dcnode-id="6377" href="#ref-119" id="xref-ref-119-2"><span data-dcnode-id="6378" instrument_node="">119</span></a><span data-dcnode-id="6376" instrument_node="">.</span></p><span data-dcnode-id="6374" instrument_node="">
</span><p data-dcnode-id="6366" id="p-37"><span data-dcnode-id="6373" instrument_node="">The presence of squamous metaplasia, inflammatory cells, fibrosis and muscle hypertrophy in the peripheral airways was similar in exsmokers and smokers with mild COPD. Unlike patients with chronic bronchitis, the number of macrophages in the lumen was similar between smokers and exsmokers with COPD </span><a class="xref-bibr" data-dcnode-id="6371" href="#ref-87" id="xref-ref-87-4"><span data-dcnode-id="6372" instrument_node="">87</span></a><span data-dcnode-id="6370" instrument_node="">, </span><a class="xref-bibr" data-dcnode-id="6368" href="#ref-119" id="xref-ref-119-3"><span data-dcnode-id="6369" instrument_node="">119</span></a><span data-dcnode-id="6367" instrument_node="">. These data suggest that most pathological changes are not reversible in patients with COPD, except for goblet cell hyperplasia, which seems at least partly reversible.</span></p><span data-dcnode-id="6365" instrument_node="">
</span><p data-dcnode-id="6321" id="p-38"><span data-dcnode-id="6364" instrument_node="">Although structural changes in COPD patients do not reverse after smoking cessation, FEV</span><sub data-dcnode-id="6362"><span data-dcnode-id="6363" instrument_node="">1</span></sub><span data-dcnode-id="6361" instrument_node=""> decline slows. This might be due to a reduction in inflammation in these patients. Indeed, exsmokers showed a lower percentage of B‐cells (CD19+) in peripheral blood than smokers, but similar percentages of CD3+, CD4+ and CD8+ T‐lymphocytes </span><a class="xref-bibr" data-dcnode-id="6359" href="#ref-93" id="xref-ref-93-4"><span data-dcnode-id="6360" instrument_node="">93</span></a><span data-dcnode-id="6358" instrument_node="">. Exsmokers and smokers with mild-to-moderate COPD (n=18) showed similar blood levels of soluble tumour necrosis factor (TNF) receptor (sTNFR) 55, sTNFR‐75 and IL‐8 </span><a class="xref-bibr" data-dcnode-id="6356" href="#ref-101" id="xref-ref-101-3"><span data-dcnode-id="6357" instrument_node="">101</span></a><span data-dcnode-id="6355" instrument_node="">. However, in a larger group of mild-to-severe COPD patients (n=55), exsmokers exhibited higher levels of sTNFR‐55 and ‐75 than smokers, which may indicate a decrease in inflammation after smoking cessation </span><a class="xref-bibr" data-dcnode-id="6353" href="#ref-122" id="xref-ref-122-1"><span data-dcnode-id="6354" instrument_node="">122</span></a><span data-dcnode-id="6352" instrument_node="">. In the latter study, no differences were found in levels of blood leukocytes, acute phase proteins, such as C‐reactive protein and lipopolysaccharide-binding protein, and soluble IL‐1 receptor type II </span><a class="xref-bibr" data-dcnode-id="6350" href="#ref-122" id="xref-ref-122-2"><span data-dcnode-id="6351" instrument_node="">122</span></a><span data-dcnode-id="6349" instrument_node="">. Higher levels of sTNFR‐55 and ‐75 were also found in the sputum of exsmokers compared to smokers with mild-to-moderate COPD </span><a class="xref-bibr" data-dcnode-id="6347" href="#ref-101" id="xref-ref-101-4"><span data-dcnode-id="6348" instrument_node="">101</span></a><span data-dcnode-id="6346" instrument_node="">, again indicating a decrease in inflammation upon smoking cessation. In contrast, IL‐8 levels were also higher in exsmokers, suggesting increased inflammation. In another group of moderate-to-severe COPD patients, IL‐6 and ‐8 levels in sputum were similar between current and exsmokers </span><a class="xref-bibr" data-dcnode-id="6344" href="#ref-123" id="xref-ref-123-1"><span data-dcnode-id="6345" instrument_node="">123</span></a><span data-dcnode-id="6343" instrument_node="">. Unfortunately, 51 of the 57 included COPD patients used inhaled corticosteroids; thus the effect of smoking cessation may have been masked by the use of corticosteroids. In spontaneous sputum from mild-to-severe COPD patients who did not use corticosteroids, no differences were found in IL‐8, myeloperoxidase and eosinophil cationic protein levels between smokers and exsmokers </span><a class="xref-bibr" data-dcnode-id="6341" href="#ref-126" id="xref-ref-126-1"><span data-dcnode-id="6342" instrument_node="">126</span></a><span data-dcnode-id="6340" instrument_node="">. In contrast, myeloperoxidase and IL‐8 levels in sputum from severe COPD patients were lower in exsmokers. Unfortunately, interpretation is again difficult as 18 of the 42 patients used inhaled corticosteroids. No differences were found between the groups with respect to levels of the neutrophil chemoattractant leukotriene B</span><sub data-dcnode-id="6338"><span data-dcnode-id="6339" instrument_node="">4</span></sub><span data-dcnode-id="6337" instrument_node=""> or neutrophil elastase activity, or in the activity of one of the natural inhibitors of neutrophil elastase, secretory leukoprotease inhibitor </span><a class="xref-bibr" data-dcnode-id="6335" href="#ref-127" id="xref-ref-127-1"><span data-dcnode-id="6336" instrument_node="">127</span></a><span data-dcnode-id="6334" instrument_node="">. Finally, exhaled NO levels in COPD patients are higher in exsmokers than in smokers and nonsmokers </span><a class="xref-bibr" data-dcnode-id="6332" href="#ref-100" id="xref-ref-100-3"><span data-dcnode-id="6333" instrument_node="">100</span></a><span data-dcnode-id="6331" instrument_node="">, </span><a class="xref-bibr" data-dcnode-id="6329" href="#ref-120" id="xref-ref-120-1"><span data-dcnode-id="6330" instrument_node="">120</span></a><span data-dcnode-id="6328" instrument_node="">, </span><a class="xref-bibr" data-dcnode-id="6326" href="#ref-121" id="xref-ref-121-1"><span data-dcnode-id="6327" instrument_node="">121</span></a><span data-dcnode-id="6325" instrument_node="">, although one study reported no differences </span><a class="xref-bibr" data-dcnode-id="6323" href="#ref-98" id="xref-ref-98-2"><span data-dcnode-id="6324" instrument_node="">98</span></a><span data-dcnode-id="6322" instrument_node="">. Since exhaled NO is thought to reflect airway inflammation, this suggests a worsening situation. However, NO also has bronchodilatory and anti-inflammatory effects. A major drawback for interpretation is that none of the above-described studies gave specific information on cumulative cigarette consumption or the mean duration of smoking cessation. These data suggest that levels of anti-inflammatory mediators in blood and sputum might increase after smoking cessation, whereas most studies report that the levels of pro-inflammatory mediators do not change.</span></p><span data-dcnode-id="6320" instrument_node="">
</span><p data-dcnode-id="6300" id="p-39"><span data-dcnode-id="6319" instrument_node="">Only three studies have investigated bronchial biopsy specimens or lung tissue from smokers and exsmokers with COPD. Pesci </span><em data-dcnode-id="6317"><span data-dcnode-id="6318" instrument_node="">et al.</span></em><span data-dcnode-id="6316" instrument_node=""> </span><a class="xref-bibr" data-dcnode-id="6314" href="#ref-85" id="xref-ref-85-3"><span data-dcnode-id="6315" instrument_node="">85</span></a><span data-dcnode-id="6313" instrument_node=""> showed that exsmokers tended to have lower numbers of mast cells in the epithelium, lamina propria and BALF than smokers. de Boer </span><em data-dcnode-id="6311"><span data-dcnode-id="6312" instrument_node="">et al.</span></em><span data-dcnode-id="6310" instrument_node=""> </span><a class="xref-bibr" data-dcnode-id="6308" href="#ref-124" id="xref-ref-124-1"><span data-dcnode-id="6309" instrument_node="">124</span></a><span data-dcnode-id="6307" instrument_node=""> found no differences in expression of IL‐8 and MCP‐1 and its receptor CC chemokine receptor 2 in the lung tissue of smokers and exsmokers with moderate-to-severe COPD. Finally, Turato </span><em data-dcnode-id="6305"><span data-dcnode-id="6306" instrument_node="">et al.</span></em><span data-dcnode-id="6304" instrument_node=""> </span><a class="xref-bibr" data-dcnode-id="6302" href="#ref-125" id="xref-ref-125-2"><span data-dcnode-id="6303" instrument_node="">125</span></a><span data-dcnode-id="6301" instrument_node=""> investigated submucosal inflammation in bronchial biopsy specimens from a group of smoking or exsmoking patients with chronic bronchitis and/or mild-to-moderate COPD, and also from nonsmokers. No differences between smokers (49 pack-yrs) and exsmokers (34 pack-yrs) were found in levels of neutrophils, eosinophils, macrophages and lymphocytes (CD3+, CD4+ and CD8+), and the pro-inflammatory markers TNF‐α, IL‐1β and IL‐2 receptor, and expression of the adhesion molecules very late activation antigen‐1 (VLA‐1), intercellular adhesion molecule‐1 (ICAM‐1) and E‐selectin. However, macrophage numbers and expression of IL‐2 receptor, VLA‐1, ICAM‐1 and E‐selectin were higher in both smokers and exsmokers than in nonsmokers. Thus, in COPD patients, inflammation seems to persist in lung tissue after smoking cessation.</span></p><span data-dcnode-id="6299" instrument_node="">
</span><p data-dcnode-id="6291" id="p-40"><span data-dcnode-id="6298" instrument_node="">The few published studies, presented above, that compare smokers and exsmokers with COPD suggest either a decrease in or persistence of inflammation after smoking cessation. This contradiction may be explained in several ways. First, the design of all of the studies was cross-sectional and studies using bronchial biopsy specimens or lung tissue, especially, contained a small number of subjects. Secondly, the smoking cessation period varied between the studies, or was not described at all. Thirdly, different methods such as biopsy specimens and BALF were used to study inflammation. Fourthly, heterogeneous groups of patients were investigated, both between and within studies. For example, Turato </span><em data-dcnode-id="6296"><span data-dcnode-id="6297" instrument_node="">et al.</span></em><span data-dcnode-id="6295" instrument_node=""> </span><a class="xref-bibr" data-dcnode-id="6293" href="#ref-125" id="xref-ref-125-3"><span data-dcnode-id="6294" instrument_node="">125</span></a><span data-dcnode-id="6292" instrument_node=""> investigated patients who all showed symptoms of chronic bronchitis, but not all had airway obstruction. Finally and fifthly, not all studies investigated the same biological markers or immunological pathways.</span></p><span data-dcnode-id="6290" instrument_node="">
</span><p data-dcnode-id="6288" id="p-41"><span data-dcnode-id="6289" instrument_node="">Whether smoking cessation reduces inflammation in COPD patients cannot easily be concluded from the available data. Airway inflammation seems to persist in lung tissue after smoking cessation, whereas studies using sputum, BALF and blood suggest that a reduction occurs, measuring indirect markers of airway inflammation. In addition, goblet cell hyperplasia seems to be at least partially reversible, whereas most of the pathological changes are not.</span></p><span data-dcnode-id="6287" instrument_node="">
</span></div><span data-dcnode-id="6285" instrument_node="">
</span></div><div class="section" data-dcnode-id="6225" id="sec-16"><span data-dcnode-id="6283" instrument_node="">
</span><h2 data-dcnode-id="6281"><span data-dcnode-id="6282" instrument_node="">Discussion</span></h2><span data-dcnode-id="6280" instrument_node="">
</span><p data-dcnode-id="6275" id="p-42"><span data-dcnode-id="6279" instrument_node="">Ideally, the results of longitudinal prospective studies would be reviewed to assess the effects of smoking cessation on the lungs. This was to some extent feasible with respect to the effects of smoking cessation on respiratory symptoms and FEV</span><sub data-dcnode-id="6277"><span data-dcnode-id="6278" instrument_node="">1</span></sub><span data-dcnode-id="6276" instrument_node=""> in smokers without chronic respiratory symptoms. However, longitudinal data describing the effects of smoking cessation on airway inflammation in patients with established COPD are lacking. Only 14 cross-sectional studies have been published, describing airway inflammation and comparing smokers and exsmokers. Obviously, there is an astonishing discrepancy between the global consensus that smoking cessation is one of the most important health issues and the very scarce information regarding its effects on the lungs. In the following section, the findings described above are summarised, with special attention to the contrasting results between smokers without chronic respiratory symptoms and smokers with chronic bronchitis and COPD.</span></p><span data-dcnode-id="6274" instrument_node="">
</span><div class="subsection" data-dcnode-id="6263" id="sec-17"><span data-dcnode-id="6273" instrument_node="">
</span><h3 data-dcnode-id="6271"><span data-dcnode-id="6272" instrument_node="">Smokers without chronic respiratory symptoms</span></h3><span data-dcnode-id="6270" instrument_node="">
</span><p data-dcnode-id="6265" id="p-43"><span data-dcnode-id="6269" instrument_node="">Smoking cessation decreases episodic respiratory symptoms and normalises the excessive decline in FEV</span><sub data-dcnode-id="6267"><span data-dcnode-id="6268" instrument_node="">1</span></sub><span data-dcnode-id="6266" instrument_node="">. It does not improve AHR to direct stimuli, but prevents future deterioration. Smoking cessation reduces the number of goblet cells in the peripheral airways, which may explain why respiratory symptoms such as cough and sputum production decrease in this group. Smoking cessation does not change smooth muscle mass and fibrosis in the peripheral airways; however, it improves peripheral airway collapse in the single-breath nitrogen-washout test. The present authors are not aware of any histological studies that show whether smoking cessation reduces local inflammatory cell infiltration in the airway wall and parenchyma. Nevertheless, the levels of inflammatory cells and inflammatory mediators in blood, sputum and BALF decrease towards normal values within 1 yr of smoking cessation. Thus most studies in smokers without chronic respiratory symptoms suggest that the smoke-induced subtle changes in the lung (especially in the peripheral airways) are at least partially reversible.</span></p><span data-dcnode-id="6264" instrument_node="">
</span></div><span data-dcnode-id="6262" instrument_node="">
</span><div class="subsection" data-dcnode-id="6248" id="sec-18"><span data-dcnode-id="6261" instrument_node="">
</span><h3 data-dcnode-id="6259"><span data-dcnode-id="6260" instrument_node="">Chronic bronchitis</span></h3><span data-dcnode-id="6258" instrument_node="">
</span><p data-dcnode-id="6250" id="p-44"><span data-dcnode-id="6257" instrument_node="">The effect of smoking cessation on sputum production, dyspnoea, FEV</span><sub data-dcnode-id="6255"><span data-dcnode-id="6256" instrument_node="">1</span></sub><span data-dcnode-id="6254" instrument_node="">, AHR and inflammation has not formally been investigated in chronic bronchitis, reflecting the neglect shown towards this disease since the 1970s. Smoking cessation evidently decreases chronic cough, most probably due to a decrease in goblet cell number in the central airways. Moreover, it is associated with normalisation of the accelerated decline in lung function, similar to that seen in smokers without chronic respiratory symptoms. In contrast, smoking cessation does not reduce the number of goblet cells or submucosal glands, smooth muscle mass or fibrosis in the peripheral airways. Taken together, the few available studies in these patients suggest that smoking cessation reduces bronchitis of the large airways, resulting in a reduction of cough and accelerated decline in FEV</span><sub data-dcnode-id="6252"><span data-dcnode-id="6253" instrument_node="">1</span></sub><span data-dcnode-id="6251" instrument_node="">.</span></p><span data-dcnode-id="6249" instrument_node="">
</span></div><span data-dcnode-id="6247" instrument_node="">
</span><div class="subsection" data-dcnode-id="6227" id="sec-19"><span data-dcnode-id="6246" instrument_node="">
</span><h3 data-dcnode-id="6244"><span data-dcnode-id="6245" instrument_node="">Chronic obstructive pulmonary disease</span></h3><span data-dcnode-id="6243" instrument_node="">
</span><p data-dcnode-id="6235" id="p-45"><span data-dcnode-id="6242" instrument_node="">The most important clinical features of COPD patients are respiratory symptoms and an accelerated decline in FEV</span><sub data-dcnode-id="6240"><span data-dcnode-id="6241" instrument_node="">1</span></sub><span data-dcnode-id="6239" instrument_node="">. Smoking cessation in COPD patients improves respiratory symptoms and normalises the excessive FEV</span><sub data-dcnode-id="6237"><span data-dcnode-id="6238" instrument_node="">1</span></sub><span data-dcnode-id="6236" instrument_node=""> decline in all stages of the disease. The improvement in respiratory symptoms may be caused by a decrease in goblet cell number, just as in healthy smokers and smokers with chronic bronchitis. Indirect bronchial hyperresponsiveness seems to improve after smoking cessation. After smoking cessation, an increase in anti-inflammatory receptor levels in blood and sputum occurs in mild-to-severe COPD patients. In addition, levels of neutrophil chemoattractants in sputum are reduced in severe COPD. Taken together, this suggests an improvement of inflammation. However, no effects of smoking cessation on blood leukocyte numbers or acute phase protein levels, or on inflammatory cell numbers and mediators in lung tissue, occur.</span></p><span data-dcnode-id="6234" instrument_node="">
</span><p data-dcnode-id="6229" id="p-46"><span data-dcnode-id="6233" instrument_node="">In summary, although some indirect markers of airway inflammation suggest a reduction in inflammation after smoking cessation in COPD patients, histopathological studies show persistent airway inflammation. Since smoking cessation improves respiratory symptoms and slows the rapid FEV</span><sub data-dcnode-id="6231"><span data-dcnode-id="6232" instrument_node="">1</span></sub><span data-dcnode-id="6230" instrument_node=""> decline in COPD patients, it is obvious that the primary therapeutic intervention for these patients is to quit smoking. However, the exact nature of the changes in airway inflammation and the relationship with symptoms, lung function and AHR after smoking cessation remain to be established.</span></p><span data-dcnode-id="6228" instrument_node="">
</span></div><span data-dcnode-id="6226" instrument_node="">
</span></div><div class="section" data-dcnode-id="6217" id="sec-20"><span data-dcnode-id="6224" instrument_node="">
</span><h2 data-dcnode-id="6222"><span data-dcnode-id="6223" instrument_node="">Conclusion</span></h2><span data-dcnode-id="6221" instrument_node="">
</span><p data-dcnode-id="6219" id="p-47"><span data-dcnode-id="6220" instrument_node="">Smoking cessation improves respiratory symptoms and bronchial hyperresponsiveness, and prevents accelerated decline in lung function, in all smokers, with or without chronic obstructive pulmonary disease. In chronic obstructive pulmonary disease, the underlying fibrosis and loss of alveolar attachments is probably irreversible, explaining why the forced expiratory volume in one second does not normalise after smoking cessation in these patients. It is now well established that smoking cessation improves the accelerated decline in forced expiratory volume in one second, which strongly indicates that smoking cessation positively influences important inflammatory and/or remodelling processes in the lungs. Thus it is attractive to speculate that remodelling may indeed be influenced to some extent by smoking cessation; however, acute inflammatory processes are ongoing, which may simply reflect a repair (remodelling) process but not ongoing damage to the airways and lung tissue. Therefore, the challenge for future research is to investigate the relevant biological markers that represent these changes. Further information regarding the persistence of inflammation after smoking cessation is important and may offer a target for future pharmacological interventions.</span></p><span data-dcnode-id="6218" instrument_node="">
