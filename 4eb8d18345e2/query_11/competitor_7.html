</span><article class="article" data-dcnode-id="551"><span data-dcnode-id="6392" instrument_node="">
</span><p class="fulltext" data-dcnode-id="6391"></p><div class="hlFld-Abstract" data-dcnode-id="6350"><p class="fulltext" data-dcnode-id="6389"></p><a class="scroll-offset" data-dcnode-id="6388" data-feathr-click-track="true" name="abstract"></a><div class="sectionInfo abstractSectionHeading" data-dcnode-id="6354"><h4 class="sectionHeading" data-dcnode-id="6386"><span data-dcnode-id="6387" instrument_node="">Abstract</span></h4><div class="sectionJumpTo" data-dcnode-id="6355"><div class="content" data-dcnode-id="6356"><div class="sectionLabel" data-dcnode-id="6384"><span data-dcnode-id="6385" instrument_node="">Section:</span></div><form data-dcnode-id="6360" style="margin-bottom:0"><select class="fulltextdd" data-dcnode-id="6361" name="select23" onchange="GoTo(this, 'self')"><option data-dcnode-id="6382" selected="#" value="#">Choose</option><option data-dcnode-id="6380" value="#">Top of page</option><option data-dcnode-id="6378" value="">Abstract &lt;&lt;</option><option data-dcnode-id="6376" value="#_i2">What are the Acute Effect...</option><option data-dcnode-id="6374" value="#_i3">What are the Chronic Effe...</option><option data-dcnode-id="6372" value="#_i11">Is Regular Smoking of Mar...</option><option data-dcnode-id="6370" value="#_i14">Does Marijuana Smoking In...</option><option data-dcnode-id="6368" value="#_i15">Possible Associations of ...</option><option data-dcnode-id="6366" value="#_i16">Summary and Conclusions</option><option data-dcnode-id="6364" value="#_i17">References</option><option data-dcnode-id="6362" value="#citart1">CITING ARTICLES</option></select></form><div class="nextPrevSec" data-dcnode-id="6357"><a class="down" data-dcnode-id="6358" data-feathr-click-track="true" href="#_i2"><img alt="Next section" border="0" data-dcnode-id="6359" height="9" hspace="5" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.atsjournals.org/templates/jsp/images/arrow_down.gif&amp;raw" width="11"></a></div></div></div></div><div class="abstractSection abstractInFull" data-dcnode-id="6351"><p data-dcnode-id="6352"><span data-dcnode-id="6353" instrument_node="">Regular smoking of marijuana by itself causes visible and microscopic injury to the large airways that is consistently associated with an increased likelihood of symptoms of chronic bronchitis that subside after cessation of use. On the other hand, habitual use of marijuana alone does not appear to lead to significant abnormalities in lung function when assessed either cross-sectionally or longitudinally, except for possible increases in lung volumes and modest increases in airway resistance of unclear clinical significance. Therefore, no clear link to chronic obstructive pulmonary disease has been established. Although marijuana smoke contains a number of carcinogens and cocarcinogens, findings from a limited number of well-designed epidemiological studies do not suggest an increased risk for the development of either lung or upper airway cancer from light or moderate use, although evidence is mixed concerning possible carcinogenic risks of heavy, long-term use. Although regular marijuana smoking leads to bronchial epithelial ciliary loss and impairs the microbicidal function of alveolar macrophages, evidence is inconclusive regarding possible associated risks for lower respiratory tract infection. Several case reports have implicated marijuana smoking as an etiologic factor in pneumothorax/pneumomediastinum and bullous lung disease, although evidence of a possible causal link from epidemiologic studies is lacking. In summary, the accumulated weight of evidence implies far lower risks for pulmonary complications of even regular heavy use of marijuana compared with the grave pulmonary consequences of tobacco.</span></p></div></div><div class="abstractKeywords" data-dcnode-id="6327"><div class="hlFld-KeywordText" data-dcnode-id="6330"><kwd-group data-dcnode-id="6331"><b data-dcnode-id="6347"><span data-dcnode-id="6348" instrument_node="">Keywords</span></b><span data-dcnode-id="6346" instrument_node="">: </span><a class="attributes" data-dcnode-id="6344" data-feathr-click-track="true" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.atsjournals.org/keyword/Marijuana"><span data-dcnode-id="6345" instrument_node="">marijuana</span></a><span data-dcnode-id="6343" instrument_node="">; </span><a class="attributes" data-dcnode-id="6341" data-feathr-click-track="true" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.atsjournals.org/keyword/Chronic%2BBronchitis"><span data-dcnode-id="6342" instrument_node="">chronic bronchitis</span></a><span data-dcnode-id="6340" instrument_node="">; </span><a class="attributes" data-dcnode-id="6338" data-feathr-click-track="true" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.atsjournals.org/keyword/Lung%2BFunction"><span data-dcnode-id="6339" instrument_node="">lung function</span></a><span data-dcnode-id="6337" instrument_node="">; </span><a class="attributes" data-dcnode-id="6335" data-feathr-click-track="true" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.atsjournals.org/keyword/Chronic%2BObstructive%2BLung%2BDisease"><span data-dcnode-id="6336" instrument_node="">chronic obstructive lung disease</span></a><span data-dcnode-id="6334" instrument_node="">; </span><a class="attributes" data-dcnode-id="6332" data-feathr-click-track="true" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.atsjournals.org/keyword/Lung%2BCancer"><span data-dcnode-id="6333" instrument_node="">lung cancer</span></a></kwd-group></div><span class="ellipsis" data-dcnode-id="6328" style="display:none"><span data-dcnode-id="6329" instrument_node="">... Show All</span></span></div><div class="hlFld-Fulltext ui-helper-clearfix" data-dcnode-id="572"><p data-dcnode-id="6312"><span data-dcnode-id="6325" instrument_node="">Marijuana is the second most widely smoked substance in our society after tobacco. In 2011, 36.4% of high school seniors in the United States reported using marijuana within the past year, 22.6% within the past month, and 6.6% on a daily basis (</span><a class="ref showRefEvent" data-dcnode-id="6323" data-feathr-click-track="true" data-reflink="_i17" data-rid="bib1" href="#"><span data-dcnode-id="6324" instrument_node="">1</span></a><span data-dcnode-id="6322" instrument_node="">). By comparison, daily use of tobacco was reported by 10.3% of 12th graders. Because the principal route of marijuana use is by inhalation of the smoke from a cigarette (“joint”) or a water pipe (“bong”), there is obvious concern over the potential harmful effects on the lung, by analogy with the well-known pulmonary consequences of tobacco smoking, including chronic obstructive pulmonary disease (COPD), lung cancer, and an increased risk of lower respiratory tract infections. This concern is heightened by the finding that the smoke contents of marijuana and a comparable quantity of tobacco (unfiltered Kentucky reference cigarette) include roughly similar amounts of volatile constituents (including ammonia, hydrocyanic acid, and nitrosamines) and qualitatively similar tar components (including phenols, naphthalene, and the procarcinogenic benzopyrene and benzanthracene) with the major exceptions of nicotine (found only in tobacco) and Δ</span><sup data-dcnode-id="6320"><span data-dcnode-id="6321" instrument_node="">9</span></sup><span data-dcnode-id="6319" instrument_node="">-tetrahydrocannabinol (THC), the major psychoactive ingredient in marijuana, and a number of other THC-like (cannabinoid) compounds that are found only in marijuana (</span><a class="ref showRefEvent" data-dcnode-id="6317" data-feathr-click-track="true" data-reflink="_i17" data-rid="bib2" href="#"><span data-dcnode-id="6318" instrument_node="">2</span></a><span data-dcnode-id="6316" instrument_node="">, </span><a class="ref showRefEvent" data-dcnode-id="6314" data-feathr-click-track="true" data-reflink="_i17" data-rid="bib3" href="#"><span data-dcnode-id="6315" instrument_node="">3</span></a><span data-dcnode-id="6313" instrument_node="">). Many of the components common to tobacco and marijuana smoke have toxic effects on respiratory tissue. Consequently, the similarity in these potentially injurious smoke contents raises the possibility that marijuana smoking might be a risk factor for the development of COPD and lung cancer. This review examines the evidence from largely human studies concerning potential associations between marijuana smoking and tobacco-related pulmonary consequences.</span></p><div class="NLM_sec NLM_sec_level_1" data-dcnode-id="6251"><a class="scroll-offset" data-dcnode-id="6310" data-feathr-click-track="true" name="_i2"></a><div class="sectionInfo" data-dcnode-id="6275"><div class="sectionHeading" data-dcnode-id="6308"><span data-dcnode-id="6309" instrument_node="">What are the Acute Effects of Smoking Marijuana on Airway Physiology?</span></div><div class="sectionJumpTo" data-dcnode-id="6276"><div class="sectionLabel" data-dcnode-id="6306"><span data-dcnode-id="6307" instrument_node="">Section:</span></div><form data-dcnode-id="6282" style="margin-bottom:0"><select class="fulltextdd" data-dcnode-id="6283" name="select23" onchange="GoTo(this, 'self')"><option data-dcnode-id="6304" selected="#" value="#">Choose</option><option data-dcnode-id="6302" value="#">Top of page</option><option data-dcnode-id="6300" value="#abstract">Abstract</option><option data-dcnode-id="6298" value="">What are the Acute Effect... &lt;&lt;</option><option data-dcnode-id="6296" value="#_i3">What are the Chronic Effe...</option><option data-dcnode-id="6294" value="#_i11">Is Regular Smoking of Mar...</option><option data-dcnode-id="6292" value="#_i14">Does Marijuana Smoking In...</option><option data-dcnode-id="6290" value="#_i15">Possible Associations of ...</option><option data-dcnode-id="6288" value="#_i16">Summary and Conclusions</option><option data-dcnode-id="6286" value="#_i17">References</option><option data-dcnode-id="6284" value="#citart1">CITING ARTICLES</option></select></form><div class="nextPrevSec" data-dcnode-id="6277"><a class="up" data-dcnode-id="6280" data-feathr-click-track="true" href="#abstract"><img alt="Previous section" border="0" data-dcnode-id="6281" height="9" hspace="5" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.atsjournals.org/templates/jsp/images/arrow_up.gif&amp;raw" width="11"></a><a class="down" data-dcnode-id="6278" data-feathr-click-track="true" href="#_i3"><img alt="Next section" border="0" data-dcnode-id="6279" height="9" hspace="5" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.atsjournals.org/templates/jsp/images/arrow_down.gif&amp;raw" width="11"></a></div></div></div><p data-dcnode-id="6252"><span data-dcnode-id="6274" instrument_node="">The acute effects of smoking marijuana on the lung have been assessed mainly by studying its effects on bronchial dynamics. Smoking a single tobacco cigarette causes a modest degree of acute bronchoconstriction, which has been attributed to an irritant effect of the smoke leading to cholinergically mediated reflex bronchospasm (</span><a class="ref showRefEvent" data-dcnode-id="6272" data-feathr-click-track="true" data-reflink="_i17" data-rid="bib4" href="#"><span data-dcnode-id="6273" instrument_node="">4</span></a><span data-dcnode-id="6271" instrument_node="">). In contrast, smoking a single “joint” of marijuana (7 mg/kg) containing 2% THC by weight caused acute bronchodilation in healthy subjects, the degree of which exceeded that produced by nebulized isoproterenol (1.25 mg) (</span><a class="ref showRefEvent" data-dcnode-id="6269" data-feathr-click-track="true" data-reflink="_i17" data-rid="bib5" href="#"><span data-dcnode-id="6270" instrument_node="">5</span></a><span data-dcnode-id="6268" instrument_node="">). This effect, which persisted for at least 1 hour, was due to the THC content of the “joint” because the effect was not seen when the THC was extracted but was subsequently reproduced after the “joint” was spiked with synthetic THC. Similar results were reported by Vachon and colleagues (</span><a class="ref showRefEvent" data-dcnode-id="6266" data-feathr-click-track="true" data-reflink="_i17" data-rid="bib6" href="#"><span data-dcnode-id="6267" instrument_node="">6</span></a><span data-dcnode-id="6265" instrument_node="">). Smoking a single marijuana cigarette (2% THC) also produced bronchodilation in subjects with mild asthma with a rapid onset and duration of at least 2 hours (</span><a class="ref showRefEvent" data-dcnode-id="6263" data-feathr-click-track="true" data-reflink="_i17" data-rid="bib7" href="#"><span data-dcnode-id="6264" instrument_node="">7</span></a><span data-dcnode-id="6262" instrument_node="">) and acutely reversed methacholine- and exercise-induced bronchospasm (</span><a class="ref showRefEvent" data-dcnode-id="6260" data-feathr-click-track="true" data-reflink="_i17" data-rid="bib8" href="#"><span data-dcnode-id="6261" instrument_node="">8</span></a><span data-dcnode-id="6259" instrument_node="">). Rodent studies suggest that the mechanism of THC-induced bronchodilation may be mediated by binding to cannabinoid type 1 (CB1) receptors expressed on axon terminals of postganglionic vagal nerves in the airway, resulting in inhibition of acetylcholine release from the nerve endings with reduction in bronchomotor tone (</span><a class="ref showRefEvent" data-dcnode-id="6257" data-feathr-click-track="true" data-reflink="_i17" data-rid="bib9" href="#"><span data-dcnode-id="6258" instrument_node="">9</span></a><span data-dcnode-id="6256" instrument_node="">). Interestingly, the bronchodilator properties of marijuana were recognized in the nineteenth century when marijuana was used for the treatment of asthma (</span><a class="ref showRefEvent" data-dcnode-id="6254" data-feathr-click-track="true" data-reflink="_i17" data-rid="bib10" href="#"><span data-dcnode-id="6255" instrument_node="">10</span></a><span data-dcnode-id="6253" instrument_node="">).</span></p></div><div class="NLM_sec NLM_sec_level_1" data-dcnode-id="5793"><a class="scroll-offset" data-dcnode-id="6249" data-feathr-click-track="true" name="_i3"></a><div class="sectionInfo" data-dcnode-id="6214"><div class="sectionHeading" data-dcnode-id="6247"><span data-dcnode-id="6248" instrument_node="">What are the Chronic Effects of Habitual Smoking of Marijuana on the Lung?</span></div><div class="sectionJumpTo" data-dcnode-id="6215"><div class="sectionLabel" data-dcnode-id="6245"><span data-dcnode-id="6246" instrument_node="">Section:</span></div><form data-dcnode-id="6221" style="margin-bottom:0"><select class="fulltextdd" data-dcnode-id="6222" name="select23" onchange="GoTo(this, 'self')"><option data-dcnode-id="6243" selected="#" value="#">Choose</option><option data-dcnode-id="6241" value="#">Top of page</option><option data-dcnode-id="6239" value="#abstract">Abstract</option><option data-dcnode-id="6237" value="#_i2">What are the Acute Effect...</option><option data-dcnode-id="6235" value="">What are the Chronic Effe... &lt;&lt;</option><option data-dcnode-id="6233" value="#_i11">Is Regular Smoking of Mar...</option><option data-dcnode-id="6231" value="#_i14">Does Marijuana Smoking In...</option><option data-dcnode-id="6229" value="#_i15">Possible Associations of ...</option><option data-dcnode-id="6227" value="#_i16">Summary and Conclusions</option><option data-dcnode-id="6225" value="#_i17">References</option><option data-dcnode-id="6223" value="#citart1">CITING ARTICLES</option></select></form><div class="nextPrevSec" data-dcnode-id="6216"><a class="up" data-dcnode-id="6219" data-feathr-click-track="true" href="#_i2"><img alt="Previous section" border="0" data-dcnode-id="6220" height="9" hspace="5" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.atsjournals.org/templates/jsp/images/arrow_up.gif&amp;raw" width="11"></a><a class="down" data-dcnode-id="6217" data-feathr-click-track="true" href="#_i11"><img alt="Next section" border="0" data-dcnode-id="6218" height="9" hspace="5" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.atsjournals.org/templates/jsp/images/arrow_down.gif&amp;raw" width="11"></a></div></div></div><p data-dcnode-id="6212"><span data-dcnode-id="6213" instrument_node="">These have been examined in both experimental animal and human studies.</span></p><div class="NLM_sec NLM_sec_level_2" data-dcnode-id="6198"><div class="head-b" data-dcnode-id="6210"><span data-dcnode-id="6211" instrument_node="">Animal Studies</span></div><p data-dcnode-id="6199"><span data-dcnode-id="6209" instrument_node="">Animal exposure studies have shown histopathologic alterations in the airways and lung parenchyma after chronic exposure to various amounts of marijuana smoke (</span><a class="ref showRefEvent" data-dcnode-id="6207" data-feathr-click-track="true" data-reflink="_i17" data-rid="bib11" href="#"><span data-dcnode-id="6208" instrument_node="">11</span></a><span data-dcnode-id="6206" instrument_node="">–</span><a class="ref showRefEvent" data-dcnode-id="6204" data-feathr-click-track="true" data-reflink="_i17" data-rid="bib14" href="#"><span data-dcnode-id="6205" instrument_node="">14</span></a><span data-dcnode-id="6203" instrument_node="">). On the other hand, exposure of rats to various amounts of marijuana smoke for up to 1 year did not reveal any morphologic or physiological evidence of emphysema, in contrast to emphysematous changes that developed in similar animals exposed to comparable amounts of tobacco smoke (</span><a class="ref showRefEvent" data-dcnode-id="6201" data-feathr-click-track="true" data-reflink="_i17" data-rid="bib15" href="#"><span data-dcnode-id="6202" instrument_node="">15</span></a><span data-dcnode-id="6200" instrument_node="">).</span></p></div><div class="NLM_sec NLM_sec_level_2" data-dcnode-id="5794"><div class="head-b" data-dcnode-id="6196"><span data-dcnode-id="6197" instrument_node="">Human Studies</span></div><p data-dcnode-id="6188"><span data-dcnode-id="6195" instrument_node="">Most human studies have compared the effects of smoking marijuana with those of smoking tobacco. Because the quantity of tobacco smoked by most regular tobacco cigarette smokers (usually approximately 20 cigarettes per day or more) generally exceeds the quantity of marijuana smoked by most regular users of marijuana (usually less than a few joints per day), it is a plausible concept that differences in the effects of regular tobacco versus regular marijuana smoking on the lung could be attributable, at least in part, to differences in the quantity of the two substances smoked, rather than to qualitative or quantitative differences in the composition of the contents of the two plant substances. On the other hand, the amount of exposure of the lung to the smoke components from each type of plant substance is determined not only by the number of cigarettes (or joints) smoked but also by differences in smoking topography for the two substances. For example, it has been shown that regular marijuana smokers take larger puffs, inhale the smoke more deeply into their lungs, and hold their breath approximately four times longer compared with regular tobacco cigarette smokers (</span><a class="ref showRefEvent" data-dcnode-id="6193" data-feathr-click-track="true" data-reflink="_i17" data-rid="bib16" href="#"><span data-dcnode-id="6194" instrument_node="">16</span></a><span data-dcnode-id="6192" instrument_node="">). These differences in smoking technique are responsible for an approximately fourfold increase in the amount of tar deposited in the lower respiratory tract from the smoke of marijuana compared with the smoke generated from the same quantity of tobacco, thus potentially amplifying the impact of smoking a given amount of marijuana compared with the same quantity of tobacco (</span><a class="ref showRefEvent" data-dcnode-id="6190" data-feathr-click-track="true" data-reflink="_i17" data-rid="bib16" href="#"><span data-dcnode-id="6191" instrument_node="">16</span></a><span data-dcnode-id="6189" instrument_node="">).</span></p><div class="NLM_sec NLM_sec_level_3" data-dcnode-id="5968"><div class="head-c" data-dcnode-id="6186"><span data-dcnode-id="6187" instrument_node="">Effects on chronic respiratory symptoms.</span></div><p data-dcnode-id="6169"><span data-dcnode-id="6185" instrument_node="">Several studies (</span><a class="ref" data-dcnode-id="6183" data-feathr-click-track="true" href="javascript:popRef('tbl1')"><span data-dcnode-id="6184" instrument_node="">Table 1</span></a><span data-dcnode-id="6182" instrument_node="">) have compared responses to respiratory symptom questionnaires in samples of regular marijuana smokers with responses in age-matched nonsmokers of marijuana, controlling for concomitant tobacco smoking. One study examined a convenience sample from Los Angeles County of 144 habitual (near-daily for ≥5 yr) smokers of marijuana alone (MS), 135 habitual smokers of both marijuana and tobacco (MTS), 79 regular tobacco-only smokers (TS), and 97 nonsmokers of any substance (NS) (mean ages, 31.6–37.0 yr) (</span><a class="ref showRefEvent" data-dcnode-id="6180" data-feathr-click-track="true" data-reflink="_i17" data-rid="bib17" href="#"><span data-dcnode-id="6181" instrument_node="">17</span></a><span data-dcnode-id="6179" instrument_node="">). In the smokers of marijuana alone, tobacco alone, or marijuana plus tobacco, the prevalence of chronic cough (18–24%), sputum production (20–26%), wheeze for at least 3 weeks/year (25–37%), and at least two prolonged episodes of acute bronchitis during the previous 3 years (10–14%) were significantly higher than in the nonsmokers (</span><i data-dcnode-id="6177"><span data-dcnode-id="6178" instrument_node="">P</span></i><span data-dcnode-id="6176" instrument_node=""> &lt; 0.05), but no differences in the prevalence of cough, sputum, or wheeze were noted between smokers of marijuana only, tobacco only, and combined smokers of both marijuana and tobacco. Analogous findings were reported by Bloom and colleagues (</span><a class="ref showRefEvent" data-dcnode-id="6174" data-feathr-click-track="true" data-reflink="_i17" data-rid="bib18" href="#"><span data-dcnode-id="6175" instrument_node="">18</span></a><span data-dcnode-id="6173" instrument_node="">) in a stratified random sample of residents of Tucson, Arizona (mean age, 27–29 yr) comprising 38 marijuana-only smokers, 209 tobacco-only smokers, 56 smokers of both marijuana and tobacco, and 502 nonsmokers, with the exception that chronic cough and sputum were less frequent in the marijuana-only smokers (32 and 26%, respectively) than in the tobacco-only smokers (54 and 43%, respectively) and the effects of combined smoking of marijuana and tobacco on cough and sputum appeared to be additive (68 and 63%, respectively). These differences from the Los Angeles study results might be attributed to the fact that the marijuana-only smokers in the Tucson sample smoked marijuana less frequently than their Los Angeles counterparts. A 2-year follow-up study of 452 daily marijuana-only smokers and 450 nonsmokers among Kaiser Permanente Medical Care Program participants revealed a small but significant increase in outpatient visits for respiratory illnesses among the marijuana smokers (relative risk [RR], 1.19; 95% confidence interval [CI], 1.01–1.41) (</span><a class="ref showRefEvent" data-dcnode-id="6171" data-feathr-click-track="true" data-reflink="_i17" data-rid="bib19" href="#"><span data-dcnode-id="6172" instrument_node="">19</span></a><span data-dcnode-id="6170" instrument_node="">), consistent with the finding among the daily marijuana-only smokers in the Los Angeles study of a significant increase in acute bronchitic episodes.</span></p><div class="anchor-spacer" data-dcnode-id="6168" id="tbl1"></div><div class="article-table-content" data-dcnode-id="6001" id="tbl1"><table class="table article-section__table" data-dcnode-id="6013"><caption data-dcnode-id="6162"><p data-dcnode-id="6163"><span class="captionLabel" data-dcnode-id="6165"><b data-dcnode-id="6166"><span data-dcnode-id="6167" instrument_node="">Table 1.</span></b></span><span data-dcnode-id="6164" instrument_node=""> Effects of regular use of marijuana alone on chronic respiratory symptoms and lung function in comparison with nonsmoking control subjects</span></p></caption><thead data-dcnode-id="6158"><tr class="rowsep1" data-dcnode-id="6159" valign="top"><th align="center" class="rowsep1 align_center last" data-dcnode-id="6160"><span data-dcnode-id="6161" instrument_node="">Symptoms</span></th></tr></thead><tbody data-dcnode-id="6014"><tr data-dcnode-id="6128" valign="top"><td align="left" class="align_left last" data-dcnode-id="6129"><span data-dcnode-id="6157" instrument_node="">Increased prevalence of chronic cough or sputum (</span><a class="ref showRefEvent" data-dcnode-id="6155" data-feathr-click-track="true" data-reflink="_i17" data-rid="bib17" href="#"><span data-dcnode-id="6156" instrument_node="">17</span></a><span data-dcnode-id="6154" instrument_node="">, </span><a class="ref showRefEvent" data-dcnode-id="6152" data-feathr-click-track="true" data-reflink="_i17" data-rid="bib18" href="#"><span data-dcnode-id="6153" instrument_node="">18</span></a><span data-dcnode-id="6151" instrument_node="">, </span><a class="ref showRefEvent" data-dcnode-id="6149" data-feathr-click-track="true" data-reflink="_i17" data-rid="bib20" href="#"><span data-dcnode-id="6150" instrument_node="">20</span></a><span data-dcnode-id="6148" instrument_node="">–</span><a class="ref showRefEvent" data-dcnode-id="6146" data-feathr-click-track="true" data-reflink="_i17" data-rid="bib22" href="#"><span data-dcnode-id="6147" instrument_node="">22</span></a><span data-dcnode-id="6145" instrument_node="">), wheezing (</span><a class="ref showRefEvent" data-dcnode-id="6143" data-feathr-click-track="true" data-reflink="_i17" data-rid="bib17" href="#"><span data-dcnode-id="6144" instrument_node="">17</span></a><span data-dcnode-id="6142" instrument_node="">, </span><a class="ref showRefEvent" data-dcnode-id="6140" data-feathr-click-track="true" data-reflink="_i17" data-rid="bib18" href="#"><span data-dcnode-id="6141" instrument_node="">18</span></a><span data-dcnode-id="6139" instrument_node="">, </span><a class="ref showRefEvent" data-dcnode-id="6137" data-feathr-click-track="true" data-reflink="_i17" data-rid="bib20" href="#"><span data-dcnode-id="6138" instrument_node="">20</span></a><span data-dcnode-id="6136" instrument_node="">–</span><a class="ref showRefEvent" data-dcnode-id="6134" data-feathr-click-track="true" data-reflink="_i17" data-rid="bib22" href="#"><span data-dcnode-id="6135" instrument_node="">22</span></a><span data-dcnode-id="6133" instrument_node="">), and shortness of breath (</span><a class="ref showRefEvent" data-dcnode-id="6131" data-feathr-click-track="true" data-reflink="_i17" data-rid="bib20" href="#"><span data-dcnode-id="6132" instrument_node="">20</span></a><span data-dcnode-id="6130" instrument_node="">)</span></td></tr><tr class="rowsep1" data-dcnode-id="6119" valign="top"><td align="left" class="rowsep1 align_left last" data-dcnode-id="6120"><span data-dcnode-id="6127" instrument_node="">Increased incidence of acute bronchitic episodes (</span><a class="ref showRefEvent" data-dcnode-id="6125" data-feathr-click-track="true" data-reflink="_i17" data-rid="bib17" href="#"><span data-dcnode-id="6126" instrument_node="">17</span></a><span data-dcnode-id="6124" instrument_node="">) or clinic visits for acute respiratory illness (</span><a class="ref showRefEvent" data-dcnode-id="6122" data-feathr-click-track="true" data-reflink="_i17" data-rid="bib19" href="#"><span data-dcnode-id="6123" instrument_node="">19</span></a><span data-dcnode-id="6121" instrument_node="">)</span></td></tr><tr class="rowsep1" data-dcnode-id="6116" valign="top"><td align="center" class="rowsep1 align_center last" data-dcnode-id="6117"><span data-dcnode-id="6118" instrument_node="">Lung Function</span></td></tr><tr data-dcnode-id="6101" valign="top"><td align="left" class="align_left last" data-dcnode-id="6102"><span data-dcnode-id="6115" instrument_node="">No difference in FEV</span><sub data-dcnode-id="6113"><span data-dcnode-id="6114" instrument_node="">1</span></sub><span data-dcnode-id="6112" instrument_node=""> or FVC (</span><a class="ref showRefEvent" data-dcnode-id="6110" data-feathr-click-track="true" data-reflink="_i17" data-rid="bib17" href="#"><span data-dcnode-id="6111" instrument_node="">17</span></a><span data-dcnode-id="6109" instrument_node="">, </span><a class="ref showRefEvent" data-dcnode-id="6107" data-feathr-click-track="true" data-reflink="_i17" data-rid="bib20" href="#"><span data-dcnode-id="6108" instrument_node="">20</span></a><span data-dcnode-id="6106" instrument_node="">, </span><a class="ref showRefEvent" data-dcnode-id="6104" data-feathr-click-track="true" data-reflink="_i17" data-rid="bib21" href="#"><span data-dcnode-id="6105" instrument_node="">21</span></a><span data-dcnode-id="6103" instrument_node="">)</span></td></tr><tr data-dcnode-id="6089" valign="top"><td align="left" class="align_left last" data-dcnode-id="6090"><span data-dcnode-id="6100" instrument_node="">Increase in FVC (</span><a class="ref showRefEvent" data-dcnode-id="6098" data-feathr-click-track="true" data-reflink="_i17" data-rid="bib23" href="#"><span data-dcnode-id="6099" instrument_node="">23</span></a><span data-dcnode-id="6097" instrument_node="">, </span><a class="ref showRefEvent" data-dcnode-id="6095" data-feathr-click-track="true" data-reflink="_i17" data-rid="bib27" href="#"><span data-dcnode-id="6096" instrument_node="">27</span></a><span data-dcnode-id="6094" instrument_node="">, </span><a class="ref showRefEvent" data-dcnode-id="6092" data-feathr-click-track="true" data-reflink="_i17" data-rid="bib29" href="#"><span data-dcnode-id="6093" instrument_node="">29</span></a><span data-dcnode-id="6091" instrument_node="">)</span></td></tr><tr data-dcnode-id="6080" valign="top"><td align="left" class="align_left last" data-dcnode-id="6081"><span data-dcnode-id="6088" instrument_node="">Increase in FEV</span><sub data-dcnode-id="6086"><span data-dcnode-id="6087" instrument_node="">1</span></sub><span data-dcnode-id="6085" instrument_node=""> (</span><a class="ref showRefEvent" data-dcnode-id="6083" data-feathr-click-track="true" data-reflink="_i17" data-rid="bib23" href="#"><span data-dcnode-id="6084" instrument_node="">23</span></a><span data-dcnode-id="6082" instrument_node="">)</span></td></tr><tr data-dcnode-id="6068" valign="top"><td align="left" class="align_left last" data-dcnode-id="6069"><span data-dcnode-id="6079" instrument_node="">Decrease in FEV</span><sub data-dcnode-id="6077"><span data-dcnode-id="6078" instrument_node="">1</span></sub><span data-dcnode-id="6076" instrument_node="">/FVC (</span><a class="ref showRefEvent" data-dcnode-id="6074" data-feathr-click-track="true" data-reflink="_i17" data-rid="bib18" href="#"><span data-dcnode-id="6075" instrument_node="">18</span></a><span data-dcnode-id="6073" instrument_node="">, </span><a class="ref showRefEvent" data-dcnode-id="6071" data-feathr-click-track="true" data-reflink="_i17" data-rid="bib20" href="#"><span data-dcnode-id="6072" instrument_node="">20</span></a><span data-dcnode-id="6070" instrument_node="">)</span></td></tr><tr data-dcnode-id="6059" valign="top"><td align="left" class="align_left last" data-dcnode-id="6060"><span data-dcnode-id="6067" instrument_node="">No difference in single-breath nitrogen washout measures (</span><a class="ref showRefEvent" data-dcnode-id="6065" data-feathr-click-track="true" data-reflink="_i17" data-rid="bib17" href="#"><span data-dcnode-id="6066" instrument_node="">17</span></a><span data-dcnode-id="6064" instrument_node="">, </span><a class="ref showRefEvent" data-dcnode-id="6062" data-feathr-click-track="true" data-reflink="_i17" data-rid="bib25" href="#"><span data-dcnode-id="6063" instrument_node="">25</span></a><span data-dcnode-id="6061" instrument_node="">)</span></td></tr><tr data-dcnode-id="6050" valign="top"><td align="left" class="align_left last" data-dcnode-id="6051"><span data-dcnode-id="6058" instrument_node="">No differences in FRC, TLC, or RV (</span><a class="ref showRefEvent" data-dcnode-id="6056" data-feathr-click-track="true" data-reflink="_i17" data-rid="bib17" href="#"><span data-dcnode-id="6057" instrument_node="">17</span></a><span data-dcnode-id="6055" instrument_node="">, </span><a class="ref showRefEvent" data-dcnode-id="6053" data-feathr-click-track="true" data-reflink="_i17" data-rid="bib21" href="#"><span data-dcnode-id="6054" instrument_node="">21</span></a><span data-dcnode-id="6052" instrument_node="">)</span></td></tr><tr data-dcnode-id="6044" valign="top"><td align="left" class="align_left last" data-dcnode-id="6045"><span data-dcnode-id="6049" instrument_node="">Increases in FRC, TLC, and RV (</span><a class="ref showRefEvent" data-dcnode-id="6047" data-feathr-click-track="true" data-reflink="_i17" data-rid="bib27" href="#"><span data-dcnode-id="6048" instrument_node="">27</span></a><span data-dcnode-id="6046" instrument_node="">)</span></td></tr><tr data-dcnode-id="6032" valign="top"><td align="left" class="align_left last" data-dcnode-id="6033"><span data-dcnode-id="6043" instrument_node="">Increase in Raw and decrease in SGaw (</span><a class="ref showRefEvent" data-dcnode-id="6041" data-feathr-click-track="true" data-reflink="_i17" data-rid="bib17" href="#"><span data-dcnode-id="6042" instrument_node="">17</span></a><span data-dcnode-id="6040" instrument_node="">, </span><a class="ref showRefEvent" data-dcnode-id="6038" data-feathr-click-track="true" data-reflink="_i17" data-rid="bib25" href="#"><span data-dcnode-id="6039" instrument_node="">25</span></a><span data-dcnode-id="6037" instrument_node="">, </span><a class="ref showRefEvent" data-dcnode-id="6035" data-feathr-click-track="true" data-reflink="_i17" data-rid="bib27" href="#"><span data-dcnode-id="6036" instrument_node="">27</span></a><span data-dcnode-id="6034" instrument_node="">)</span></td></tr><tr class="last" data-dcnode-id="6015" valign="top"><td align="left" class="align_left last" data-dcnode-id="6016"><span data-dcnode-id="6031" instrument_node="">No difference in D</span><span class="smallcaps smallerCapital" data-dcnode-id="6029"><span data-dcnode-id="6030" instrument_node="">l</span></span><sub data-dcnode-id="6027"><span data-dcnode-id="6028" instrument_node="">CO</span></sub><span data-dcnode-id="6026" instrument_node=""> (</span><a class="ref showRefEvent" data-dcnode-id="6024" data-feathr-click-track="true" data-reflink="_i17" data-rid="bib17" href="#"><span data-dcnode-id="6025" instrument_node="">17</span></a><span data-dcnode-id="6023" instrument_node="">, </span><a class="ref showRefEvent" data-dcnode-id="6021" data-feathr-click-track="true" data-reflink="_i17" data-rid="bib21" href="#"><span data-dcnode-id="6022" instrument_node="">21</span></a><span data-dcnode-id="6020" instrument_node="">, </span><a class="ref showRefEvent" data-dcnode-id="6018" data-feathr-click-track="true" data-reflink="_i17" data-rid="bib27" href="#"><span data-dcnode-id="6019" instrument_node="">27</span></a><span data-dcnode-id="6017" instrument_node="">)</span></td></tr></tbody></table><div class="tableFooter" data-dcnode-id="6002"><div class="footnote" data-dcnode-id="6003"><p data-dcnode-id="6004"><i data-dcnode-id="6011"><span data-dcnode-id="6012" instrument_node="">Definition of abbreviations</span></i><span data-dcnode-id="6010" instrument_node="">: D</span><span class="smallcaps smallerCapital" data-dcnode-id="6008"><span data-dcnode-id="6009" instrument_node="">l</span></span><sub data-dcnode-id="6006"><span data-dcnode-id="6007" instrument_node="">CO</span></sub><span data-dcnode-id="6005" instrument_node=""> = single-breath diffusing capacity for carbon monoxide; FRC = functional residual capacity; Raw = airway resistance; RV = residual volume; SGaw = specific airway conductance; TLC = total lung capacity.</span></p></div></div></div><p data-dcnode-id="5984"><span data-dcnode-id="6000" instrument_node="">Respiratory symptoms were also assessed in 943 adults, 21 years of age, from a birth cohort of subjects born in Dunedin, New Zealand, of whom 9.7% were cannabis-dependent (</span><a class="ref showRefEvent" data-dcnode-id="5998" data-feathr-click-track="true" data-reflink="_i17" data-rid="bib20" href="#"><span data-dcnode-id="5999" instrument_node="">20</span></a><span data-dcnode-id="5997" instrument_node="">). After controlling for tobacco use, early morning sputum production, wheezing apart from colds, nocturnal awakenings with chest tightness, and exercise-induced shortness of breath were increased among the cannabis-dependent subjects by 144% (</span><i data-dcnode-id="5995"><span data-dcnode-id="5996" instrument_node="">P</span></i><span data-dcnode-id="5994" instrument_node=""> &lt; 0.01), 61%, 65%, and 72% (all </span><i data-dcnode-id="5992"><span data-dcnode-id="5993" instrument_node="">P</span></i><span data-dcnode-id="5991" instrument_node=""> &lt; 0.05), respectively, compared with nonsmokers (</span><a class="ref showRefEvent" data-dcnode-id="5989" data-feathr-click-track="true" data-reflink="_i17" data-rid="bib20" href="#"><span data-dcnode-id="5990" instrument_node="">20</span></a><span data-dcnode-id="5988" instrument_node="">). In another New Zealand study that examined a random population-based sample (supplemented by a convenience sample) of adult residents of Wellington, New Zealand, comprising 75 marijuana-only smokers, 92 tobacco-only smokers, 91 smokers of both marijuana and tobacco, and 81 nonsmokers (mean ages, 41–46 yr) (</span><a class="ref showRefEvent" data-dcnode-id="5986" data-feathr-click-track="true" data-reflink="_i17" data-rid="bib21" href="#"><span data-dcnode-id="5987" instrument_node="">21</span></a><span data-dcnode-id="5985" instrument_node="">), odds ratios (95% CI) for the association of cough with marijuana smoking and tobacco smoking were 1.5 (1.1–1.7) and 1.9 (1.4–2.6), respectively, and of chronic sputum production were 2.0 (1.4–2.7) and 1.6 (1.2–2.2), respectively, without evidence of any additive effects of marijuana and tobacco, consistent with the findings in the Los Angeles study.</span></p><p data-dcnode-id="5979"><span data-dcnode-id="5983" instrument_node="">Respiratory effects of marijuana have also been reported for self-reported marijuana-smoking participants in the U.S. National Health and Nutrition Examination Survey (NHANES III) (</span><a class="ref showRefEvent" data-dcnode-id="5981" data-feathr-click-track="true" data-reflink="_i17" data-rid="bib22" href="#"><span data-dcnode-id="5982" instrument_node="">22</span></a><span data-dcnode-id="5980" instrument_node="">). Odds ratios (ORs) (95% CI) for respiratory symptoms in the 414 marijuana users versus 4,789 nonsmokers (controlling for sex, age, current asthma, and concomitant tobacco use) were 2.17 (1.1–4.26) for chronic cough, 1.89 (1.35–2.66) for chronic sputum, and 2.98 (2.05–4.34) for wheeze. By comparison, the ORs (95% CI) among tobacco-only smokers for chronic cough, sputum production, and wheeze versus nonsmokers were 5.02 (3.58–7.04), 3.71 (2.45–5.62), and 3.39 (2.54–4.53).</span></p><p data-dcnode-id="5974"><span data-dcnode-id="5978" instrument_node="">In a survey of a random sample of 878 older adults (≥40 yr) residing in Vancouver, Canada, as part of the Burden of Obstructive Lung Diseases (BOLD) study, the OR for chronic respiratory symptoms was not increased among the 49% of respondents who reported ever using marijuana alone (</span><a class="ref showRefEvent" data-dcnode-id="5976" data-feathr-click-track="true" data-reflink="_i17" data-rid="bib23" href="#"><span data-dcnode-id="5977" instrument_node="">23</span></a><span data-dcnode-id="5975" instrument_node="">). However, concurrent use of marijuana and tobacco was associated with a higher OR for respiratory symptoms (OR, 2.59; 95% CI, 1.58–3.62) than was smoking tobacco alone (OR, 1.50; 95% CI, 1.05–2.14), consistent with a possible synergistic interaction between marijuana and tobacco.</span></p><p data-dcnode-id="5969"><span data-dcnode-id="5973" instrument_node="">Taken together, the weight of evidence points to a significant association of marijuana use with symptoms of chronic bronchitis that may be comparable to or less than that of tobacco smoking alone, possibly dependent on the frequency and quantity of marijuana smoked. Evidence is mixed regarding the possibility of additive or synergistic effects of combined smoking of marijuana and tobacco on chronic respiratory symptoms. However, cessation of marijuana smoking by marijuana-only smokers has been associated with resolution of preexisting symptoms of chronic bronchitis (</span><a class="ref showRefEvent" data-dcnode-id="5971" data-feathr-click-track="true" data-reflink="_i17" data-rid="bib24" href="#"><span data-dcnode-id="5972" instrument_node="">24</span></a><span data-dcnode-id="5970" instrument_node="">).</span></p></div><div class="NLM_sec NLM_sec_level_3" data-dcnode-id="5872"><div class="head-c" data-dcnode-id="5966"><span data-dcnode-id="5967" instrument_node="">Effects on lung function.</span></div><p data-dcnode-id="5886"><span data-dcnode-id="5965" instrument_node="">Lung function has been assessed in several studies (</span><a class="ref" data-dcnode-id="5963" data-feathr-click-track="true" href="javascript:popRef('tbl1')"><span data-dcnode-id="5964" instrument_node="">Table 1</span></a><span data-dcnode-id="5962" instrument_node="">) conducted in either convenience or population-based samples of smokers and nonsmokers of marijuana. In the Los Angeles cohort study (</span><a class="ref showRefEvent" data-dcnode-id="5960" data-feathr-click-track="true" data-reflink="_i17" data-rid="bib17" href="#"><span data-dcnode-id="5961" instrument_node="">17</span></a><span data-dcnode-id="5959" instrument_node="">), no differences were noted between the 135 marijuana-only smokers and 99 nonsmokers in spirometric measures, indices derived from single-breath nitrogen washout or the single-breath diffusing capacity of the lung for carbon monoxide (D</span><span class="smallcaps smallerCapital" data-dcnode-id="5957"><span data-dcnode-id="5958" instrument_node="">l</span></span><sub data-dcnode-id="5955"><span data-dcnode-id="5956" instrument_node="">CO</span></sub><span data-dcnode-id="5954" instrument_node="">); however, airway resistance (Raw) was slightly (26%) but significantly elevated in the marijuana-only smokers compared with both the nonsmokers and tobacco-only smokers (</span><i data-dcnode-id="5952"><span data-dcnode-id="5953" instrument_node="">P</span></i><span data-dcnode-id="5951" instrument_node=""> &lt; 0.05); similar findings had been noted in an earlier study of 50 habitual marijuana-only smokers compared with matched control subjects from a population-based cohort in the same geographic area (</span><a class="ref showRefEvent" data-dcnode-id="5949" data-feathr-click-track="true" data-reflink="_i17" data-rid="bib25" href="#"><span data-dcnode-id="5950" instrument_node="">25</span></a><span data-dcnode-id="5948" instrument_node="">). Longitudinal assessment of the age-related decline in FEV</span><sub data-dcnode-id="5946"><span data-dcnode-id="5947" instrument_node="">1</span></sub><span data-dcnode-id="5945" instrument_node=""> over 8 years in 65% of the Los Angeles subjects who volunteered to undergo follow-up studies revealed no significant difference between the marijuana-only smokers (30.8 ml/yr) and the nonsmokers (25.3 ml/yr), whereas tobacco-only smokers showed a significantly higher rate of decline (56.5 ml/yr) (</span><a class="ref showRefEvent" data-dcnode-id="5943" data-feathr-click-track="true" data-reflink="_i17" data-rid="bib26" href="#"><span data-dcnode-id="5944" instrument_node="">26</span></a><span data-dcnode-id="5942" instrument_node="">). In the Tucson study, the ratio of FEV</span><sub data-dcnode-id="5940"><span data-dcnode-id="5941" instrument_node="">1</span></sub><span data-dcnode-id="5939" instrument_node=""> to FVC was significantly lower in marijuana-only smokers (0.90) than in nonsmokers (0.98) (</span><i data-dcnode-id="5937"><span data-dcnode-id="5938" instrument_node="">P</span></i><span data-dcnode-id="5936" instrument_node=""> &lt; 0.05). Consistent findings were reported in the Dunedin, New Zealand, birth-cohort study in which a significantly higher proportion of cannabis-dependent subjects than nonsmokers at age 21 years had an FEV</span><sub data-dcnode-id="5934"><span data-dcnode-id="5935" instrument_node="">1</span></sub><span data-dcnode-id="5933" instrument_node="">/FVC ratio less than 0.80 (</span><a class="ref showRefEvent" data-dcnode-id="5931" data-feathr-click-track="true" data-reflink="_i17" data-rid="bib20" href="#"><span data-dcnode-id="5932" instrument_node="">20</span></a><span data-dcnode-id="5930" instrument_node="">). On the other hand, in the Wellington, New Zealand, study, no significant differences were noted in spirometry, lung volumes or D</span><span class="smallcaps smallerCapital" data-dcnode-id="5928"><span data-dcnode-id="5929" instrument_node="">l</span></span><sub data-dcnode-id="5926"><span data-dcnode-id="5927" instrument_node="">CO</span></sub><span data-dcnode-id="5925" instrument_node=""> in marijuana-only smokers compared with nonsmokers (</span><a class="ref showRefEvent" data-dcnode-id="5923" data-feathr-click-track="true" data-reflink="_i17" data-rid="bib20" href="#"><span data-dcnode-id="5924" instrument_node="">20</span></a><span data-dcnode-id="5922" instrument_node="">). Moreover, in an extended follow-up of the Dunedin birth cohort, at age 32 years (n = 841–919), no association was found between marijuana use (after adjustment for the concomitant use of tobacco) and lung function (spirometry, lung volumes, and D</span><span class="smallcaps smallerCapital" data-dcnode-id="5920"><span data-dcnode-id="5921" instrument_node="">l</span></span><sub data-dcnode-id="5918"><span data-dcnode-id="5919" instrument_node="">CO</span></sub><span data-dcnode-id="5917" instrument_node="">), except for increases in FVC, total lung capacity (TLC), functional residual capacity (FRC), residual volume (RV), and Raw and a decrease in specific airway conductance (SGaw) (</span><a class="ref showRefEvent" data-dcnode-id="5915" data-feathr-click-track="true" data-reflink="_i17" data-rid="bib27" href="#"><span data-dcnode-id="5916" instrument_node="">27</span></a><span data-dcnode-id="5914" instrument_node="">); longitudinal analysis of spirometry performed in this cohort since age 18 years revealed that marijuana smoking was associated with a significant increase in FVC without any significant change in FEV</span><sub data-dcnode-id="5912"><span data-dcnode-id="5913" instrument_node="">1</span></sub><span data-dcnode-id="5911" instrument_node="">. The authors concluded that the isolated decrease in FEV</span><sub data-dcnode-id="5909"><span data-dcnode-id="5910" instrument_node="">1</span></sub><span data-dcnode-id="5908" instrument_node="">/FVC ratio previously reported among marijuana-only smokers versus nonsmokers at age 21 years from the same birth cohort (</span><a class="ref showRefEvent" data-dcnode-id="5906" data-feathr-click-track="true" data-reflink="_i17" data-rid="bib20" href="#"><span data-dcnode-id="5907" instrument_node="">20</span></a><span data-dcnode-id="5905" instrument_node="">) may have been a spurious finding attributable to an increase in FVC. Significant increases in both FVC (</span><i data-dcnode-id="5903"><span data-dcnode-id="5904" instrument_node="">P</span></i><span data-dcnode-id="5902" instrument_node=""> &lt; 0.001) and FEV</span><sub data-dcnode-id="5900"><span data-dcnode-id="5901" instrument_node="">1</span></sub><span data-dcnode-id="5899" instrument_node=""> (</span><i data-dcnode-id="5897"><span data-dcnode-id="5898" instrument_node="">P</span></i><span data-dcnode-id="5896" instrument_node=""> &lt; 0.05) have also been noted in marijuana smokers compared with those with no history of marijuana use in the Vancouver BOLD study (</span><a class="ref showRefEvent" data-dcnode-id="5894" data-feathr-click-track="true" data-reflink="_i17" data-rid="bib23" href="#"><span data-dcnode-id="5895" instrument_node="">23</span></a><span data-dcnode-id="5893" instrument_node="">). The mechanism of the observed increase in FVC is not clear but might be related to “stretching” the lung from the repeated deep inhalations characteristic of marijuana-smoking topography (</span><a class="ref showRefEvent" data-dcnode-id="5891" data-feathr-click-track="true" data-reflink="_i17" data-rid="bib16" href="#"><span data-dcnode-id="5892" instrument_node="">16</span></a><span data-dcnode-id="5890" instrument_node="">), analogous to the elevated vital capacity noted in elite athletes (</span><a class="ref showRefEvent" data-dcnode-id="5888" data-feathr-click-track="true" data-reflink="_i17" data-rid="bib28" href="#"><span data-dcnode-id="5889" instrument_node="">28</span></a><span data-dcnode-id="5887" instrument_node="">).</span></p><p data-dcnode-id="5875"><span data-dcnode-id="5885" instrument_node="">In an observational study of a cohort of 5,115 current and former smokers and nonsmokers of tobacco or marijuana in four U.S. cities monitored for more than 20 years with serial measurements of lung function, no significant association was found between decrements in FEV</span><sub data-dcnode-id="5883"><span data-dcnode-id="5884" instrument_node="">1</span></sub><span data-dcnode-id="5882" instrument_node=""> and intensity of current marijuana smoking or cumulative lifetime exposure to marijuana (joint-years), although a significant association was noted between joint-years and an increase in FVC (</span><a class="ref showRefEvent" data-dcnode-id="5880" data-feathr-click-track="true" data-reflink="_i17" data-rid="bib29" href="#"><span data-dcnode-id="5881" instrument_node="">29</span></a><span data-dcnode-id="5879" instrument_node="">). Using cubic spline analysis the authors found a nonlinear association between heavy lifetime exposures (&gt;20 joint-years) and lower levels of FEV</span><sub data-dcnode-id="5877"><span data-dcnode-id="5878" instrument_node="">1</span></sub><span data-dcnode-id="5876" instrument_node="">; however, the latter findings need to be interpreted cautiously because less than 1% of the observations were made in subjects with more than 20 joint-years of use.</span></p><p data-dcnode-id="5873"><span data-dcnode-id="5874" instrument_node="">In summary, most cross-sectional, as well as longitudinal, studies have failed to find a significant association between marijuana use (in the absence of, or controlling for, concomitant tobacco use) and measures of airflow obstruction. Moreover, no additive adverse effects of marijuana when smoked along with tobacco have been reported. These findings argue against the concept that smoking marijuana, by itself, is a risk factor for the development of COPD.</span></p></div><div class="NLM_sec NLM_sec_level_3" data-dcnode-id="5861"><div class="head-c" data-dcnode-id="5870"><span data-dcnode-id="5871" instrument_node="">Effects on lung structure, including emphysema.</span></div><p data-dcnode-id="5862"><span data-dcnode-id="5869" instrument_node="">Thoracic high-resolution computed tomography scans (slices of 1 mm in thickness at 1-cm intervals) were performed in 75 marijuana-only smokers, 91 smokers of both marijuana and tobacco, 92 tobacco-only smokers, and 81 nonsmokers participating in the Wellington, New Zealand, study (</span><a class="ref showRefEvent" data-dcnode-id="5867" data-feathr-click-track="true" data-reflink="_i17" data-rid="bib21" href="#"><span data-dcnode-id="5868" instrument_node="">21</span></a><span data-dcnode-id="5866" instrument_node="">). The proportion of marijuana-only smokers with a relative area of lung occupied by attenuation values lower than –950 Hounsfield units as a percentage of total lung area (RA950) in an apical slice was significantly higher in marijuana-only smokers (7.3%) than nonsmokers (6.1%). However, the proportion with low attenuation averaged over three apical slices in marijuana-only smokers (6.7%) was comparable to that in nonsmokers (6.3%). Moreover, no significant increase was observed in the proportion of marijuana-only smokers with macroscopic emphysema (1.3%) compared with that of nonsmokers (0%); in contrast, macroscopic emphysema was noted in 18.5% of tobacco-only smokers and 16.5% of smokers of both marijuana and tobacco. These findings provide further evidence against the notion that marijuana is a risk factor for the development of emphysema, although the low-attenuation findings at the apices could be clinically relevant regarding potential risks for barotrauma and bullous lung disease (</span><i data-dcnode-id="5864"><span data-dcnode-id="5865" instrument_node="">see below</span></i><span data-dcnode-id="5863" instrument_node="">).</span></p></div><div class="NLM_sec NLM_sec_level_3" data-dcnode-id="5824"><div class="head-c" data-dcnode-id="5859"><span data-dcnode-id="5860" instrument_node="">Effects on bronchial pathology.</span></div><p data-dcnode-id="5833"><span data-dcnode-id="5858" instrument_node="">Few investigational bronchoscopic studies have been conducted in otherwise healthy smokers of marijuana and control subjects. Videobronchoscopy was performed in 40 healthy young smokers of marijuana or tobacco (10 each for marijuana-only smokers, tobacco-only smokers, smokers of both marijuana and tobacco, and nonsmokers), 20–49 years of age, participating in the Los Angeles cohort study (</span><a class="ref showRefEvent" data-dcnode-id="5856" data-feathr-click-track="true" data-reflink="_i17" data-rid="bib30" href="#"><span data-dcnode-id="5857" instrument_node="">30</span></a><span data-dcnode-id="5855" instrument_node="">); the videotapes were scored by an independent observer for three components of the bronchitis index (erythema, edema, mucous secretions) (</span><a class="ref showRefEvent" data-dcnode-id="5853" data-feathr-click-track="true" data-reflink="_i17" data-rid="bib31" href="#"><span data-dcnode-id="5854" instrument_node="">31</span></a><span data-dcnode-id="5852" instrument_node="">) on a scale of 0 to 3, 3 representing the most abnormal finding. The bronchitis index score was significantly higher for the marijuana-only smokers (8.2 ± 5.4 SD) than for the nonsmokers (4.4 ± 1.6 SD) (</span><i data-dcnode-id="5850"><span data-dcnode-id="5851" instrument_node="">P</span></i><span data-dcnode-id="5849" instrument_node=""> &lt; 0.05) and comparable to the bronchitis index score for the tobacco-only smokers (8.0 ± 2.5 SD). Pronounced edema that narrowed lobar and segmental airways was often noted in the marijuana-only smokers (</span><a class="ref showRefEvent" data-dcnode-id="5847" data-feathr-click-track="true" data-reflink="_i17" data-rid="bib30" href="#"><span data-dcnode-id="5848" instrument_node="">30</span></a><span data-dcnode-id="5846" instrument_node="">), possibly accounting for the increase in airway resistance observed in physiological studies of marijuana-only smokers (</span><a class="ref showRefEvent" data-dcnode-id="5844" data-feathr-click-track="true" data-reflink="_i17" data-rid="bib16" href="#"><span data-dcnode-id="5845" instrument_node="">16</span></a><span data-dcnode-id="5843" instrument_node="">, </span><a class="ref showRefEvent" data-dcnode-id="5841" data-feathr-click-track="true" data-reflink="_i17" data-rid="bib24" href="#"><span data-dcnode-id="5842" instrument_node="">24</span></a><span data-dcnode-id="5840" instrument_node="">, </span><a class="ref showRefEvent" data-dcnode-id="5838" data-feathr-click-track="true" data-reflink="_i17" data-rid="bib26" href="#"><span data-dcnode-id="5839" instrument_node="">26</span></a><span data-dcnode-id="5837" instrument_node="">). Endobronchial biopsies at five different sites revealed vascular proliferation in 70% of marijuana-only smokers versus 0% of nonsmokers and 56% of tobacco-only smokers, submucosal edema in 75% of marijuana-only smokers versus 20% of nonsmokers and 88% of tobacco-only smokers, and goblet cell hyperplasia in 60% of marijuana-only smokers versus 20% of nonsmokers and 89% of tobacco-only smokers (</span><i data-dcnode-id="5835"><span data-dcnode-id="5836" instrument_node="">P</span></i><span data-dcnode-id="5834" instrument_node=""> &lt; 0.05 for all comparisons with nonsmokers). These findings indicate that regular smoking of marijuana by young adults is associated with significant airway inflammation/injury that is similar to that observed in tobacco smokers.</span></p><p data-dcnode-id="5825"><span data-dcnode-id="5832" instrument_node="">Endobronchial biopsies performed in 40 marijuana-only smokers, 44 smokers of both marijuana and tobacco, 31 tobacco-only smokers, and 53 nonsmokers participating in the University of California (Los Angeles, CA) cohort study revealed a significantly higher percentage of histopathologic alterations in marijuana-only smokers compared with nonsmokers (</span><i data-dcnode-id="5830"><span data-dcnode-id="5831" instrument_node="">P</span></i><span data-dcnode-id="5829" instrument_node=""> &lt; 0.05) and a similar percentage compared with tobacco-only smokers: reserve cell hyperplasia (73% marijuana-only smokers, 12% nonsmokers, 75% tobacco-only smokers); goblet cell hyperplasia (68% marijuana-only smokers, 29% nonsmokers and 77% tobacco-only smokers); squamous cell metaplasia (33% marijuana-only smokers, 6% nonsmokers, 31% tobacco-only smokers); cellular disorganization (58% marijuana-only smokers, 33% nonsmokers, 53% tobacco-only smokers); and increased nuclear-to-cytoplasmic ratio (40% marijuana-only smokers, 6% nonsmokers and 30% tobacco-only smokers) (</span><a class="ref showRefEvent" data-dcnode-id="5827" data-feathr-click-track="true" data-reflink="_i17" data-rid="bib32" href="#"><span data-dcnode-id="5828" instrument_node="">32</span></a><span data-dcnode-id="5826" instrument_node="">). The increased frequency of goblet cell hyperplasia (leading to increased mucus production) and of reserve cell hyperplasia and squamous metaplasia with the associated loss of cilia in the marijuana-only smokers would be expected to diminish their capacity to clear the airways of the excess mucus, consistent with their increased prevalence of symptoms of chronic bronchitis.</span></p></div><div class="NLM_sec NLM_sec_level_3" data-dcnode-id="5795"><div class="head-c" data-dcnode-id="5822"><span data-dcnode-id="5823" instrument_node="">Effects on alveolar macrophages.</span></div><p data-dcnode-id="5796"><span data-dcnode-id="5821" instrument_node="">Bronchial alveolar lavage conducted in 14 marijuana-only smokers, 13 tobacco-only smokers, 16 smokers of both marijuana and tobacco, and 19 nonsmokers from the Los Angeles cohort revealed a nearly threefold increase in the number of alveolar macrophages (AMs) per milliliter recovered from the marijuana-only smokers, a similar increase from the tobacco-only smokers, and a nearly sixfold increase from the smokers of both marijuana and tobacco (</span><a class="ref showRefEvent" data-dcnode-id="5819" data-feathr-click-track="true" data-reflink="_i17" data-rid="bib33" href="#"><span data-dcnode-id="5820" instrument_node="">33</span></a><span data-dcnode-id="5818" instrument_node="">). Increases in neutrophils were also observed in all smoking groups. Subsequent functional studies have demonstrated significant impairment in fungicidal activity of AMs from both marijuana-only and tobacco-only smokers (</span><a class="ref showRefEvent" data-dcnode-id="5816" data-feathr-click-track="true" data-reflink="_i17" data-rid="bib34" href="#"><span data-dcnode-id="5817" instrument_node="">34</span></a><span data-dcnode-id="5815" instrument_node="">, </span><a class="ref showRefEvent" data-dcnode-id="5813" data-feathr-click-track="true" data-reflink="_i17" data-rid="bib35" href="#"><span data-dcnode-id="5814" instrument_node="">35</span></a><span data-dcnode-id="5812" instrument_node="">), as well as significant impairment in phagocytic and bactericidal activity of AMs from marijuana-only smokers (but not tobacco-only smokers) against </span><i data-dcnode-id="5810"><span data-dcnode-id="5811" instrument_node="">Staphylococcus aureus</span></i><span data-dcnode-id="5809" instrument_node=""> (</span><a class="ref showRefEvent" data-dcnode-id="5807" data-feathr-click-track="true" data-reflink="_i17" data-rid="bib35" href="#"><span data-dcnode-id="5808" instrument_node="">35</span></a><span data-dcnode-id="5806" instrument_node="">). The defect in microbicidal activity of AMs from marijuana-only smokers may be related to an immunosuppressant effect of THC (mediated via cannabinoid type 2 [CB2] receptors, which are highly expressed on immune cells) manifested, in part, by THC-induced inhibition of production of inducible nitric oxide synthase (iNOS) during infection, leading, in turn, to impairment in production of reactive nitrogen intermediates that are important effector molecules in bacterial killing. The inhibition of iNOS production by marijuana appears to be caused by THC-related impairment in the production of key proinflammatory cytokines that mediate the induction of iNOS (</span><a class="ref showRefEvent" data-dcnode-id="5804" data-feathr-click-track="true" data-reflink="_i17" data-rid="bib35" href="#"><span data-dcnode-id="5805" instrument_node="">35</span></a><span data-dcnode-id="5803" instrument_node="">, </span><a class="ref showRefEvent" data-dcnode-id="5801" data-feathr-click-track="true" data-reflink="_i17" data-rid="bib36" href="#"><span data-dcnode-id="5802" instrument_node="">36</span></a><span data-dcnode-id="5800" instrument_node="">). Potential clinical implications of marijuana-related impairment in AM microbicidal activity are an increased susceptibility to lung infection (</span><i data-dcnode-id="5798"><span data-dcnode-id="5799" instrument_node="">see below</span></i><span data-dcnode-id="5797" instrument_node="">).</span></p></div></div></div><div class="NLM_sec NLM_sec_level_1" data-dcnode-id="5595"><a class="scroll-offset" data-dcnode-id="5791" data-feathr-click-track="true" name="_i11"></a><div class="sectionInfo" data-dcnode-id="5756"><div class="sectionHeading" data-dcnode-id="5789"><span data-dcnode-id="5790" instrument_node="">Is Regular Smoking of Marijuana a Risk Factor for Respiratory Cancer?</span></div><div class="sectionJumpTo" data-dcnode-id="5757"><div class="sectionLabel" data-dcnode-id="5787"><span data-dcnode-id="5788" instrument_node="">Section:</span></div><form data-dcnode-id="5763" style="margin-bottom:0"><select class="fulltextdd" data-dcnode-id="5764" name="select23" onchange="GoTo(this, 'self')"><option data-dcnode-id="5785" selected="#" value="#">Choose</option><option data-dcnode-id="5783" value="#">Top of page</option><option data-dcnode-id="5781" value="#abstract">Abstract</option><option data-dcnode-id="5779" value="#_i2">What are the Acute Effect...</option><option data-dcnode-id="5777" value="#_i3">What are the Chronic Effe...</option><option data-dcnode-id="5775" value="">Is Regular Smoking of Mar... &lt;&lt;</option><option data-dcnode-id="5773" value="#_i14">Does Marijuana Smoking In...</option><option data-dcnode-id="5771" value="#_i15">Possible Associations of ...</option><option data-dcnode-id="5769" value="#_i16">Summary and Conclusions</option><option data-dcnode-id="5767" value="#_i17">References</option><option data-dcnode-id="5765" value="#citart1">CITING ARTICLES</option></select></form><div class="nextPrevSec" data-dcnode-id="5758"><a class="up" data-dcnode-id="5761" data-feathr-click-track="true" href="#_i3"><img alt="Previous section" border="0" data-dcnode-id="5762" height="9" hspace="5" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.atsjournals.org/templates/jsp/images/arrow_up.gif&amp;raw" width="11"></a><a class="down" data-dcnode-id="5759" data-feathr-click-track="true" href="#_i14"><img alt="Next section" border="0" data-dcnode-id="5760" height="9" hspace="5" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.atsjournals.org/templates/jsp/images/arrow_down.gif&amp;raw" width="11"></a></div></div></div><p data-dcnode-id="5751"><span data-dcnode-id="5755" instrument_node="">Several lines of evidence exist both for and against a link between marijuana use and respiratory cancer (</span><a class="ref" data-dcnode-id="5753" data-feathr-click-track="true" href="javascript:popRef('tbl2')"><span data-dcnode-id="5754" instrument_node="">Table 2</span></a><span data-dcnode-id="5752" instrument_node="">).</span></p><div class="anchor-spacer" data-dcnode-id="5750" id="tbl2"></div><div class="article-table-content" data-dcnode-id="5689" id="tbl2"><table class="table article-section__table" data-dcnode-id="5694"><caption data-dcnode-id="5742"><p data-dcnode-id="5743"><span class="captionLabel" data-dcnode-id="5747"><b data-dcnode-id="5748"><span data-dcnode-id="5749" instrument_node="">Table 2.</span></b></span><span data-dcnode-id="5746" instrument_node=""> Associations of marijuana use with lung or upper airway cancer: epidemiologic studies</span><a class="ref table-fn" data-dcnode-id="5744" data-feathr-click-track="true" href="javascript:popRef('tblfn1')" id="tblfn1"><span data-dcnode-id="5745" instrument_node="">*</span></a></p></caption><thead data-dcnode-id="5738"><tr class="rowsep1" data-dcnode-id="5739" valign="top"><th align="center" class="rowsep1 align_center last" data-dcnode-id="5740"><span data-dcnode-id="5741" instrument_node="">Lung Cancer</span></th></tr></thead><tbody data-dcnode-id="5695"><tr data-dcnode-id="5729" valign="top"><td align="left" class="align_left last" data-dcnode-id="5730"><span data-dcnode-id="5737" instrument_node="">No positive association (</span><a class="ref showRefEvent" data-dcnode-id="5735" data-feathr-click-track="true" data-reflink="_i17" data-rid="bib57" href="#"><span data-dcnode-id="5736" instrument_node="">57</span></a><span data-dcnode-id="5734" instrument_node="">, </span><a class="ref showRefEvent" data-dcnode-id="5732" data-feathr-click-track="true" data-reflink="_i17" data-rid="bib61" href="#"><span data-dcnode-id="5733" instrument_node="">61</span></a><span data-dcnode-id="5731" instrument_node="">)</span></td></tr><tr data-dcnode-id="5723" valign="top"><td align="left" class="align_left last" data-dcnode-id="5724"><span data-dcnode-id="5728" instrument_node="">Significantly increased risk only in heavy marijuana smokers (&gt;10.5 joint-years), but numbers of heavy marijuana smokers among case and control subjects were small (</span><a class="ref showRefEvent" data-dcnode-id="5726" data-feathr-click-track="true" data-reflink="_i17" data-rid="bib62" href="#"><span data-dcnode-id="5727" instrument_node="">62</span></a><span data-dcnode-id="5725" instrument_node="">)</span></td></tr><tr class="rowsep1" data-dcnode-id="5714" valign="top"><td align="left" class="rowsep1 align_left last" data-dcnode-id="5715"><span data-dcnode-id="5722" instrument_node="">Significantly increased risk, but confounded by concomitant tobacco use (</span><a class="ref showRefEvent" data-dcnode-id="5720" data-feathr-click-track="true" data-reflink="_i17" data-rid="bib45" href="#"><span data-dcnode-id="5721" instrument_node="">45</span></a><span data-dcnode-id="5719" instrument_node="">, </span><a class="ref showRefEvent" data-dcnode-id="5717" data-feathr-click-track="true" data-reflink="_i17" data-rid="bib46" href="#"><span data-dcnode-id="5718" instrument_node="">46</span></a><span data-dcnode-id="5716" instrument_node="">)</span></td></tr><tr class="rowsep1" data-dcnode-id="5711" valign="top"><td align="center" class="rowsep1 align_center last" data-dcnode-id="5712"><span data-dcnode-id="5713" instrument_node="">Upper Airway Cancer</span></td></tr><tr data-dcnode-id="5702" valign="top"><td align="left" class="align_left last" data-dcnode-id="5703"><span data-dcnode-id="5710" instrument_node="">No positive association (</span><a class="ref showRefEvent" data-dcnode-id="5708" data-feathr-click-track="true" data-reflink="_i17" data-rid="bib57" href="#"><span data-dcnode-id="5709" instrument_node="">57</span></a><span data-dcnode-id="5707" instrument_node="">–</span><a class="ref showRefEvent" data-dcnode-id="5705" data-feathr-click-track="true" data-reflink="_i17" data-rid="bib60" href="#"><span data-dcnode-id="5706" instrument_node="">60</span></a><span data-dcnode-id="5704" instrument_node="">)</span></td></tr><tr class="last" data-dcnode-id="5696" valign="top"><td align="left" class="align_left last" data-dcnode-id="5697"><span data-dcnode-id="5701" instrument_node="">Significantly increased risk, but control subjects not adequately matched with case subjects (</span><a class="ref showRefEvent" data-dcnode-id="5699" data-feathr-click-track="true" data-reflink="_i17" data-rid="bib44" href="#"><span data-dcnode-id="5700" instrument_node="">44</span></a><span data-dcnode-id="5698" instrument_node="">)</span></td></tr></tbody></table><div class="tableFooter" data-dcnode-id="5690"><div class="footnote" data-dcnode-id="5691" id="tblfn1"><p data-dcnode-id="5692"><span data-dcnode-id="5693" instrument_node="">*Nonsmokers as reference; adjustments for tobacco smoking and other known potential confounders.</span></p></div></div></div><div class="NLM_sec NLM_sec_level_2" data-dcnode-id="5636"><div class="head-b" data-dcnode-id="5687"><span data-dcnode-id="5688" instrument_node="">Evidence for a Link</span></div><p data-dcnode-id="5676"><span data-dcnode-id="5686" instrument_node="">Marijuana smoke contains about 50% more benzopyrene and nearly 75% more benzanthracene, both polycyclic aromatic hydrocarbon procarcinogens, than the smoke from a comparable quantity of an unfiltered Kentucky reference tobacco cigarette, as well as other carcinogens and cocarcinogens found in tobacco smoke, including phenols, vinyl chlorides, nitrosamines, and reactive oxygen species (</span><a class="ref showRefEvent" data-dcnode-id="5684" data-feathr-click-track="true" data-reflink="_i17" data-rid="bib2" href="#"><span data-dcnode-id="5685" instrument_node="">2</span></a><span data-dcnode-id="5683" instrument_node="">, </span><a class="ref showRefEvent" data-dcnode-id="5681" data-feathr-click-track="true" data-reflink="_i17" data-rid="bib3" href="#"><span data-dcnode-id="5682" instrument_node="">3</span></a><span data-dcnode-id="5680" instrument_node="">). Moreover, differences in the technique of smoking marijuana compared with tobacco, including deeper inhalation and much longer breath-holding time, in addition to the lower rod filtration offered by the more loosely packed marijuana in a “joint,” result in a fourfold increase in deposition of the tar from marijuana than from a comparable amount of tobacco (</span><a class="ref showRefEvent" data-dcnode-id="5678" data-feathr-click-track="true" data-reflink="_i17" data-rid="bib27" href="#"><span data-dcnode-id="5679" instrument_node="">27</span></a><span data-dcnode-id="5677" instrument_node="">), thus amplifying exposure of the lung to the carcinogens within the smoke.</span></p><p data-dcnode-id="5665"><span data-dcnode-id="5675" instrument_node="">Endobronchial biopsies from habitual marijuana-only smokers reveal widespread histopathologic alterations, such as squamous cell metaplasia and cellular atypia, comparable to those observed in biopsies from tobacco-only smokers (</span><a class="ref showRefEvent" data-dcnode-id="5673" data-feathr-click-track="true" data-reflink="_i17" data-rid="bib32" href="#"><span data-dcnode-id="5674" instrument_node="">32</span></a><span data-dcnode-id="5672" instrument_node="">) and are recognized as precursors to the subsequent development of malignancy (</span><a class="ref showRefEvent" data-dcnode-id="5670" data-feathr-click-track="true" data-reflink="_i17" data-rid="bib37" href="#"><span data-dcnode-id="5671" instrument_node="">37</span></a><span data-dcnode-id="5669" instrument_node="">). In addition, immunohistology of bronchial tissue from the marijuana-only smokers revealed marked overexpression of the nuclear proliferation antigen Ki-67, and of epidermal growth factor receptor, both molecular markers of pretumor progression (</span><a class="ref showRefEvent" data-dcnode-id="5667" data-feathr-click-track="true" data-reflink="_i17" data-rid="bib38" href="#"><span data-dcnode-id="5668" instrument_node="">38</span></a><span data-dcnode-id="5666" instrument_node="">).</span></p><p data-dcnode-id="5657"><span data-dcnode-id="5664" instrument_node="">Although lung and upper airway cancer are relatively uncommon in young individuals (&lt;40–45 yr), several small case series have identified an unusually high proportion of regular marijuana smokers among young persons with these respiratory cancers compared with the proportion of regular smokers of marijuana in the general population (</span><a class="ref showRefEvent" data-dcnode-id="5662" data-feathr-click-track="true" data-reflink="_i17" data-rid="bib39" href="#"><span data-dcnode-id="5663" instrument_node="">39</span></a><span data-dcnode-id="5661" instrument_node="">–</span><a class="ref showRefEvent" data-dcnode-id="5659" data-feathr-click-track="true" data-reflink="_i17" data-rid="bib43" href="#"><span data-dcnode-id="5660" instrument_node="">43</span></a><span data-dcnode-id="5658" instrument_node="">). However, case series represent uncontrolled observations from which causality cannot be inferred, indicating the need for well-designed epidemiologic studies.</span></p><p data-dcnode-id="5637"><span data-dcnode-id="5656" instrument_node="">A few small case–control studies have been performed demonstrating significantly positive associations between self-reported cannabis use and either upper airway cancer (</span><a class="ref showRefEvent" data-dcnode-id="5654" data-feathr-click-track="true" data-reflink="_i17" data-rid="bib44" href="#"><span data-dcnode-id="5655" instrument_node="">44</span></a><span data-dcnode-id="5653" instrument_node="">) or lung cancer (</span><a class="ref showRefEvent" data-dcnode-id="5651" data-feathr-click-track="true" data-reflink="_i17" data-rid="bib45" href="#"><span data-dcnode-id="5652" instrument_node="">45</span></a><span data-dcnode-id="5650" instrument_node="">, </span><a class="ref showRefEvent" data-dcnode-id="5648" data-feathr-click-track="true" data-reflink="_i17" data-rid="bib46" href="#"><span data-dcnode-id="5649" instrument_node="">46</span></a><span data-dcnode-id="5647" instrument_node="">). The single study showing a positive association between marijuana smoking and upper airway cancer (RR, 2.6; 95% CI, 1.1–6.6) was flawed by inappropriate matching of control subjects to case subjects (</span><a class="ref showRefEvent" data-dcnode-id="5645" data-feathr-click-track="true" data-reflink="_i17" data-rid="bib44" href="#"><span data-dcnode-id="5646" instrument_node="">44</span></a><span data-dcnode-id="5644" instrument_node="">). Moreover, the two North African studies revealing significantly positive associations between cannabis and lung cancer (RR, 8.2; 95% CI, 1.3–15.5; and RR, 5.6; 95% CI, 1.6–20.5) were confounded by concomitant tobacco use for which no adjustment was possible because the two substances are typically mixed together in the form of a “kiff” and smoked (</span><a class="ref showRefEvent" data-dcnode-id="5642" data-feathr-click-track="true" data-reflink="_i17" data-rid="bib45" href="#"><span data-dcnode-id="5643" instrument_node="">45</span></a><span data-dcnode-id="5641" instrument_node="">, </span><a class="ref showRefEvent" data-dcnode-id="5639" data-feathr-click-track="true" data-reflink="_i17" data-rid="bib46" href="#"><span data-dcnode-id="5640" instrument_node="">46</span></a><span data-dcnode-id="5638" instrument_node="">).</span></p></div><div class="NLM_sec NLM_sec_level_2" data-dcnode-id="5596"><div class="head-b" data-dcnode-id="5634"><span data-dcnode-id="5635" instrument_node="">Evidence against a Link</span></div><p data-dcnode-id="5626"><span data-dcnode-id="5633" instrument_node="">Several investigators have demonstrated antitumoral effects of THC and other cannabinoids on a variety of malignancies, including lung cancer, in both cell culture systems and animal models (</span><a class="ref showRefEvent" data-dcnode-id="5631" data-feathr-click-track="true" data-reflink="_i17" data-rid="bib47" href="#"><span data-dcnode-id="5632" instrument_node="">47</span></a><span data-dcnode-id="5630" instrument_node="">–</span><a class="ref showRefEvent" data-dcnode-id="5628" data-feathr-click-track="true" data-reflink="_i17" data-rid="bib56" href="#"><span data-dcnode-id="5629" instrument_node="">56</span></a><span data-dcnode-id="5627" instrument_node="">). Such effects might be mediated by the antimitogenic, proapoptotic, and antiangiogenic properties of THC, which could counteract the protumoral effects of the carcinogens in marijuana smoke. However, epidemiologic (longitudinal cohort or case–control) studies are needed to assess the net effect of marijuana smoking on the risk for developing respiratory malignancy</span></p><p data-dcnode-id="5621"><span data-dcnode-id="5625" instrument_node="">A retrospective cohort study of nearly 65,000 members of the Kaiser Permanente health maintenance orga
