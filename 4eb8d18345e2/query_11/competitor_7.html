nization in northern California who were monitored for up to 8 years failed to find any increased risk for tobacco-related malignancies, including lung and upper airway cancer, in association with ever or current marijuana use, after adjustment for tobacco smoking (</span><a class="ref showRefEvent" data-dcnode-id="5623" data-feathr-click-track="true" data-reflink="_i17" data-rid="bib57" href="#"><span data-dcnode-id="5624" instrument_node="">57</span></a><span data-dcnode-id="5622" instrument_node="">). However, limitations of this study include the relatively young age (mean, 48 yr) of the members at the end of the follow-up period and the inclusion of few long-term or heavy smokers of marijuana.</span></p><p data-dcnode-id="5607"><span data-dcnode-id="5620" instrument_node="">A well-designed population-based case–control study in Washington State failed to find any increased risk for upper airway cancer in association with marijuana use (RR, 0.9; 95% CI, 0.6–1.3) or any trend toward a dose response in relation to frequency or duration of use (</span><a class="ref showRefEvent" data-dcnode-id="5618" data-feathr-click-track="true" data-reflink="_i17" data-rid="bib58" href="#"><span data-dcnode-id="5619" instrument_node="">58</span></a><span data-dcnode-id="5617" instrument_node="">). Two smaller case–control studies in the United Kingdom also failed to find a significant association between marijuana use and oral cancer (</span><a class="ref showRefEvent" data-dcnode-id="5615" data-feathr-click-track="true" data-reflink="_i17" data-rid="bib59" href="#"><span data-dcnode-id="5616" instrument_node="">59</span></a><span data-dcnode-id="5614" instrument_node="">, </span><a class="ref showRefEvent" data-dcnode-id="5612" data-feathr-click-track="true" data-reflink="_i17" data-rid="bib60" href="#"><span data-dcnode-id="5613" instrument_node="">60</span></a><span data-dcnode-id="5611" instrument_node="">), although the small size of these studies probably reduced sensitivity for demonstrating increased risks. A large case–control study of 611 lung cancer cases, 601 cases of upper aerodigestive tract cancers and 1,040 matched control subjects conducted in Los Angeles county failed to find any significant associations between marijuana use and either lung or upper aerodigestive tract cancer irrespective of the intensity/duration of marijuana use, after adjustment for demographic variables, educational level, tobacco, and alcohol (</span><a class="ref showRefEvent" data-dcnode-id="5609" data-feathr-click-track="true" data-reflink="_i17" data-rid="bib61" href="#"><span data-dcnode-id="5610" instrument_node="">61</span></a><span data-dcnode-id="5608" instrument_node="">). In fact, for all degrees of marijuana use, the estimated odds ratios were less than 1.0, without any suggestion of a dose–response. In contrast, the risks associated with tobacco use were highly significant with clear-cut dose–response relationships.</span></p><p data-dcnode-id="5599"><span data-dcnode-id="5606" instrument_node="">A subsequent, case–control study of marijuana use and lung cancer risk that included only 79 cancer case subjects and 324 matched control subjects was conducted in New Zealand (</span><a class="ref showRefEvent" data-dcnode-id="5604" data-feathr-click-track="true" data-reflink="_i17" data-rid="bib62" href="#"><span data-dcnode-id="5605" instrument_node="">62</span></a><span data-dcnode-id="5603" instrument_node="">). The latter study did not find a significant association between lung cancer and either any use of marijuana (RR, 1.2; 95% CI, 0.5–2.6) or use of marijuana among smokers in the first and second tertiles of marijuana use (RR, 0.3 and 0.9, respectively), after adjustment for other relevant factors, including tobacco use. However, an increased risk was noted among the 14 case subjects and 4 control subjects in the highest tertile of marijuana use (RR, 5.7; 95% CI, 1.5–21.6), corresponding to a life-time history of more than 10.5 joint-years (number of joints per day times number of years smoked). This study has been criticized because of the small number of case and control subjects in the third tertile (</span><a class="ref showRefEvent" data-dcnode-id="5601" data-feathr-click-track="true" data-reflink="_i17" data-rid="bib63" href="#"><span data-dcnode-id="5602" instrument_node="">63</span></a><span data-dcnode-id="5600" instrument_node="">). In contrast, the Los Angeles study, which notably failed to find any increased risk of even heavy marijuana use for respiratory cancer, included 115 control subjects with more than 10 joint-years of use. Therefore, it seems likely that the small sample size of the New Zealand study led to imprecise and vastly inflated estimates.</span></p><p data-dcnode-id="5597"><span data-dcnode-id="5598" instrument_node="">Epidemiologic studies for assessing the association between marijuana use and cancer risk are fraught with several limitations, including errors in subject recall regarding past marijuana use, dishonest reporting (because marijuana use is illegal), the relatively limited number of long-term heavy users, possible selection bias, and limited ability to control for all potential confounders. Therefore, even though population-based studies have generally failed to show increased risks, one cannot be entirely certain that some individuals (especially heavier marijuana users) may incur an elevated risk, although such risks appear to be small in relation to the well-known hazards of tobacco smoking. This issue is important for weighing the benefits and risks of medicinal marijuana.</span></p></div></div><div class="NLM_sec NLM_sec_level_1" data-dcnode-id="5451"><a class="scroll-offset" data-dcnode-id="5593" data-feathr-click-track="true" name="_i14"></a><div class="sectionInfo" data-dcnode-id="5558"><div class="sectionHeading" data-dcnode-id="5591"><span data-dcnode-id="5592" instrument_node="">Does Marijuana Smoking Increase the Risk of Lower Respiratory Tract Infection?</span></div><div class="sectionJumpTo" data-dcnode-id="5559"><div class="sectionLabel" data-dcnode-id="5589"><span data-dcnode-id="5590" instrument_node="">Section:</span></div><form data-dcnode-id="5565" style="margin-bottom:0"><select class="fulltextdd" data-dcnode-id="5566" name="select23" onchange="GoTo(this, 'self')"><option data-dcnode-id="5587" selected="#" value="#">Choose</option><option data-dcnode-id="5585" value="#">Top of page</option><option data-dcnode-id="5583" value="#abstract">Abstract</option><option data-dcnode-id="5581" value="#_i2">What are the Acute Effect...</option><option data-dcnode-id="5579" value="#_i3">What are the Chronic Effe...</option><option data-dcnode-id="5577" value="#_i11">Is Regular Smoking of Mar...</option><option data-dcnode-id="5575" value="">Does Marijuana Smoking In... &lt;&lt;</option><option data-dcnode-id="5573" value="#_i15">Possible Associations of ...</option><option data-dcnode-id="5571" value="#_i16">Summary and Conclusions</option><option data-dcnode-id="5569" value="#_i17">References</option><option data-dcnode-id="5567" value="#citart1">CITING ARTICLES</option></select></form><div class="nextPrevSec" data-dcnode-id="5560"><a class="up" data-dcnode-id="5563" data-feathr-click-track="true" href="#_i11"><img alt="Previous section" border="0" data-dcnode-id="5564" height="9" hspace="5" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.atsjournals.org/templates/jsp/images/arrow_up.gif&amp;raw" width="11"></a><a class="down" data-dcnode-id="5561" data-feathr-click-track="true" href="#_i15"><img alt="Next section" border="0" data-dcnode-id="5562" height="9" hspace="5" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.atsjournals.org/templates/jsp/images/arrow_down.gif&amp;raw" width="11"></a></div></div></div><p data-dcnode-id="5514"><span data-dcnode-id="5557" instrument_node="">Biologic evidence suggests that smoking marijuana may increase the risk of lower respiratory tract infection (</span><a class="ref" data-dcnode-id="5555" data-feathr-click-track="true" href="javascript:popRef('tbl3')"><span data-dcnode-id="5556" instrument_node="">Table 3</span></a><span data-dcnode-id="5554" instrument_node="">). The airway injury from marijuana smoking results in a loss of cilia and an increase in mucous secretions that likely lead to impairment in mucociliary clearance, compromising the lung’s first line of defense against infection. In addition, the immunosuppressive effects of THC and other cannabinoids have been well documented (</span><a class="ref showRefEvent" data-dcnode-id="5552" data-feathr-click-track="true" data-reflink="_i17" data-rid="bib63" href="#"><span data-dcnode-id="5553" instrument_node="">63</span></a><span data-dcnode-id="5551" instrument_node="">), including marijuana-related impairment in alveolar macrophage phagocytic and microbicidal activity (</span><a class="ref showRefEvent" data-dcnode-id="5549" data-feathr-click-track="true" data-reflink="_i17" data-rid="bib34" href="#"><span data-dcnode-id="5550" instrument_node="">34</span></a><span data-dcnode-id="5548" instrument_node="">–</span><a class="ref showRefEvent" data-dcnode-id="5546" data-feathr-click-track="true" data-reflink="_i17" data-rid="bib36" href="#"><span data-dcnode-id="5547" instrument_node="">36</span></a><span data-dcnode-id="5545" instrument_node="">), which further compromises host defense against pulmonary infection. Moreover, marijuana has been reported to be contaminated with potentially pathogenic bacteria (</span><a class="ref showRefEvent" data-dcnode-id="5543" data-feathr-click-track="true" data-reflink="_i17" data-rid="bib65" href="#"><span data-dcnode-id="5544" instrument_node="">65</span></a><span data-dcnode-id="5542" instrument_node="">), as well as with </span><i data-dcnode-id="5540"><span data-dcnode-id="5541" instrument_node="">Aspergillus fumigatus</span></i><span data-dcnode-id="5539" instrument_node=""> (</span><a class="ref showRefEvent" data-dcnode-id="5537" data-feathr-click-track="true" data-reflink="_i17" data-rid="bib66" href="#"><span data-dcnode-id="5538" instrument_node="">66</span></a><span data-dcnode-id="5536" instrument_node="">), thereby providing a vehicle for the introduction of pathogens into the lung. Isolated cases of invasive </span><i data-dcnode-id="5534"><span data-dcnode-id="5535" instrument_node="">Aspergillus</span></i><span data-dcnode-id="5533" instrument_node=""> pneumonia in patients already immunocompromised due to AIDS, chronic granulomatous disease, bone marrow or renal transplantation, or cancer chemotherapy have been reported in marijuana smokers (</span><a class="ref showRefEvent" data-dcnode-id="5531" data-feathr-click-track="true" data-reflink="_i17" data-rid="bib67" href="#"><span data-dcnode-id="5532" instrument_node="">67</span></a><span data-dcnode-id="5530" instrument_node="">–</span><a class="ref showRefEvent" data-dcnode-id="5528" data-feathr-click-track="true" data-reflink="_i17" data-rid="bib71" href="#"><span data-dcnode-id="5529" instrument_node="">71</span></a><span data-dcnode-id="5527" instrument_node="">). More recently, sharing a marijuana water pipe (bong) with a patient with cavitary pulmonary tuberculosis has been associated with an increased risk of acquiring infection with tuberculosis (</span><a class="ref showRefEvent" data-dcnode-id="5525" data-feathr-click-track="true" data-reflink="_i17" data-rid="bib72" href="#"><span data-dcnode-id="5526" instrument_node="">72</span></a><span data-dcnode-id="5524" instrument_node="">); it is not clear, however, whether the acquisition of tuberculous infection was due to close contact with a case of active TB or marijuana-induced impairment in host defense. A few older epidemiologic studies appear to have demonstrated marijuana to be a significant independent risk factor for opportunistic pulmonary infection in patients seropositive for HIV (</span><a class="ref showRefEvent" data-dcnode-id="5522" data-feathr-click-track="true" data-reflink="_i17" data-rid="bib73" href="#"><span data-dcnode-id="5523" instrument_node="">73</span></a><span data-dcnode-id="5521" instrument_node="">–</span><a class="ref showRefEvent" data-dcnode-id="5519" data-feathr-click-track="true" data-reflink="_i17" data-rid="bib75" href="#"><span data-dcnode-id="5520" instrument_node="">75</span></a><span data-dcnode-id="5518" instrument_node="">). On the other hand, follow-up examination of a large cohort of gay men (the Multicenter AIDS Cohort Study) failed to find an increased risk from self-reported marijuana use for either HIV seroconversion, progression of AIDS, or the development of opportunistic infection (</span><a class="ref showRefEvent" data-dcnode-id="5516" data-feathr-click-track="true" data-reflink="_i17" data-rid="bib76" href="#"><span data-dcnode-id="5517" instrument_node="">76</span></a><span data-dcnode-id="5515" instrument_node="">). Therefore, whether or to what extent marijuana use might predispose to pulmonary infection remains unclear.</span></p><div class="anchor-spacer" data-dcnode-id="5513" id="tbl3"></div><div class="article-table-content" data-dcnode-id="5452" id="tbl3"><table class="table article-section__table" data-dcnode-id="5453"><caption data-dcnode-id="5507"><p data-dcnode-id="5508"><span class="captionLabel" data-dcnode-id="5510"><b data-dcnode-id="5511"><span data-dcnode-id="5512" instrument_node="">Table 3.</span></b></span><span data-dcnode-id="5509" instrument_node=""> Miscellaneous effects</span></p></caption><thead data-dcnode-id="5503"><tr data-dcnode-id="5504" valign="top"><th align="center" class="align_center last" data-dcnode-id="5505"><span data-dcnode-id="5506" instrument_node="">Possible Association of Marijuana Use with Lower Respiratory Tract Infection</span></th></tr></thead><tbody data-dcnode-id="5454"><tr data-dcnode-id="5494" valign="top"><td align="left" class="align_left last" data-dcnode-id="5495"><span data-dcnode-id="5502" instrument_node="">Case reports of pulmonary aspergillosis in immunocompromised patients who smoked marijuana (</span><a class="ref showRefEvent" data-dcnode-id="5500" data-feathr-click-track="true" data-reflink="_i17" data-rid="bib67" href="#"><span data-dcnode-id="5501" instrument_node="">67</span></a><span data-dcnode-id="5499" instrument_node="">–</span><a class="ref showRefEvent" data-dcnode-id="5497" data-feathr-click-track="true" data-reflink="_i17" data-rid="bib71" href="#"><span data-dcnode-id="5498" instrument_node="">71</span></a><span data-dcnode-id="5496" instrument_node="">)</span></td></tr><tr data-dcnode-id="5488" valign="top"><td align="left" class="align_left last" data-dcnode-id="5489"><span data-dcnode-id="5493" instrument_node="">Case report of a cluster of pulmonary tuberculosis in smokers of marijuana who shared a water pipe with patients with cavitary tuberculosis (</span><a class="ref showRefEvent" data-dcnode-id="5491" data-feathr-click-track="true" data-reflink="_i17" data-rid="bib72" href="#"><span data-dcnode-id="5492" instrument_node="">72</span></a><span data-dcnode-id="5490" instrument_node="">)</span></td></tr><tr data-dcnode-id="5482" valign="top"><td align="left" class="align_left last" data-dcnode-id="5483"><span data-dcnode-id="5487" instrument_node="">Older epidemiologic study suggesting an increased risk of bacterial pneumonia in HIV-seropositive marijuana users (</span><a class="ref showRefEvent" data-dcnode-id="5485" data-feathr-click-track="true" data-reflink="_i17" data-rid="bib75" href="#"><span data-dcnode-id="5486" instrument_node="">75</span></a><span data-dcnode-id="5484" instrument_node="">)</span></td></tr><tr class="rowsep1" data-dcnode-id="5476" valign="top"><td align="left" class="rowsep1 align_left last" data-dcnode-id="5477"><span data-dcnode-id="5481" instrument_node="">Multicenter AIDS cohort study failing to find an association of marijuana use with progression of AIDS or acquisition of opportunistic pneumonia (</span><a class="ref showRefEvent" data-dcnode-id="5479" data-feathr-click-track="true" data-reflink="_i17" data-rid="bib76" href="#"><span data-dcnode-id="5480" instrument_node="">76</span></a><span data-dcnode-id="5478" instrument_node="">)</span></td></tr><tr class="rowsep1" data-dcnode-id="5473" valign="top"><td align="center" class="rowsep1 align_center last" data-dcnode-id="5474"><span data-dcnode-id="5475" instrument_node="">Association of Marijuana Use with Pulmonary Barotraumas or Bullous Lung Disease</span></td></tr><tr data-dcnode-id="5464" valign="top"><td align="left" class="align_left last" data-dcnode-id="5465"><span data-dcnode-id="5472" instrument_node="">Several reports of pneumothorax or pneumomediastinum in marijuana smokers (</span><a class="ref showRefEvent" data-dcnode-id="5470" data-feathr-click-track="true" data-reflink="_i17" data-rid="bib77" href="#"><span data-dcnode-id="5471" instrument_node="">77</span></a><span data-dcnode-id="5469" instrument_node="">–</span><a class="ref showRefEvent" data-dcnode-id="5467" data-feathr-click-track="true" data-reflink="_i17" data-rid="bib84" href="#"><span data-dcnode-id="5468" instrument_node="">84</span></a><span data-dcnode-id="5466" instrument_node="">)</span></td></tr><tr class="last" data-dcnode-id="5455" valign="top"><td align="left" class="align_left last" data-dcnode-id="5456"><span data-dcnode-id="5463" instrument_node="">Case reports of lung bullae associated with marijuana smoking (</span><a class="ref showRefEvent" data-dcnode-id="5461" data-feathr-click-track="true" data-reflink="_i17" data-rid="bib85" href="#"><span data-dcnode-id="5462" instrument_node="">85</span></a><span data-dcnode-id="5460" instrument_node="">–</span><a class="ref showRefEvent" data-dcnode-id="5458" data-feathr-click-track="true" data-reflink="_i17" data-rid="bib88" href="#"><span data-dcnode-id="5459" instrument_node="">88</span></a><span data-dcnode-id="5457" instrument_node="">)</span></td></tr></tbody></table></div></div><div class="NLM_sec NLM_sec_level_1" data-dcnode-id="5385"><a class="scroll-offset" data-dcnode-id="5449" data-feathr-click-track="true" name="_i15"></a><div class="sectionInfo" data-dcnode-id="5414"><div class="sectionHeading" data-dcnode-id="5447"><span data-dcnode-id="5448" instrument_node="">Possible Associations of Marijuana Use with Pulmonary Barotrauma and Bullous Lung Disease</span></div><div class="sectionJumpTo" data-dcnode-id="5415"><div class="sectionLabel" data-dcnode-id="5445"><span data-dcnode-id="5446" instrument_node="">Section:</span></div><form data-dcnode-id="5421" style="margin-bottom:0"><select class="fulltextdd" data-dcnode-id="5422" name="select23" onchange="GoTo(this, 'self')"><option data-dcnode-id="5443" selected="#" value="#">Choose</option><option data-dcnode-id="5441" value="#">Top of page</option><option data-dcnode-id="5439" value="#abstract">Abstract</option><option data-dcnode-id="5437" value="#_i2">What are the Acute Effect...</option><option data-dcnode-id="5435" value="#_i3">What are the Chronic Effe...</option><option data-dcnode-id="5433" value="#_i11">Is Regular Smoking of Mar...</option><option data-dcnode-id="5431" value="#_i14">Does Marijuana Smoking In...</option><option data-dcnode-id="5429" value="">Possible Associations of ... &lt;&lt;</option><option data-dcnode-id="5427" value="#_i16">Summary and Conclusions</option><option data-dcnode-id="5425" value="#_i17">References</option><option data-dcnode-id="5423" value="#citart1">CITING ARTICLES</option></select></form><div class="nextPrevSec" data-dcnode-id="5416"><a class="up" data-dcnode-id="5419" data-feathr-click-track="true" href="#_i14"><img alt="Previous section" border="0" data-dcnode-id="5420" height="9" hspace="5" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.atsjournals.org/templates/jsp/images/arrow_up.gif&amp;raw" width="11"></a><a class="down" data-dcnode-id="5417" data-feathr-click-track="true" href="#_i16"><img alt="Next section" border="0" data-dcnode-id="5418" height="9" hspace="5" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.atsjournals.org/templates/jsp/images/arrow_down.gif&amp;raw" width="11"></a></div></div></div><p data-dcnode-id="5397"><span data-dcnode-id="5413" instrument_node="">Several cases of spontaneous pneumothorax or pneumomediastinum have been reported in association with marijuana smoking (</span><a class="ref showRefEvent" data-dcnode-id="5411" data-feathr-click-track="true" data-reflink="_i17" data-rid="bib77" href="#"><span data-dcnode-id="5412" instrument_node="">77</span></a><span data-dcnode-id="5410" instrument_node="">–</span><a class="ref showRefEvent" data-dcnode-id="5408" data-feathr-click-track="true" data-reflink="_i17" data-rid="bib84" href="#"><span data-dcnode-id="5409" instrument_node="">84</span></a><span data-dcnode-id="5407" instrument_node="">) (</span><a class="ref" data-dcnode-id="5405" data-feathr-click-track="true" href="javascript:popRef('tbl3')"><span data-dcnode-id="5406" instrument_node="">Table 3</span></a><span data-dcnode-id="5404" instrument_node="">). Possible mechanisms for this association might involve either repeated deep inhalations during the smoking of marijuana, a typical marijuana-smoking technique, followed by prolonged Valsalva maneuvers that pressurize the air in the lungs or successive deep inhalations through a high-resistance smoking apparatus simulating Muller maneuvers; in either case, rupture of subpleural blebs or alveoli might ensue with dissection of air to the pleural space or mediastinum (</span><a class="ref showRefEvent" data-dcnode-id="5402" data-feathr-click-track="true" data-reflink="_i17" data-rid="bib79" href="#"><span data-dcnode-id="5403" instrument_node="">79</span></a><span data-dcnode-id="5401" instrument_node="">, </span><a class="ref showRefEvent" data-dcnode-id="5399" data-feathr-click-track="true" data-reflink="_i17" data-rid="bib84" href="#"><span data-dcnode-id="5400" instrument_node="">84</span></a><span data-dcnode-id="5398" instrument_node="">).</span></p><p data-dcnode-id="5386"><span data-dcnode-id="5396" instrument_node="">Several cases of large lung bullae have been reported in young to middle-aged, mostly heavy smokers of marijuana along with various amounts of tobacco (</span><a class="ref showRefEvent" data-dcnode-id="5394" data-feathr-click-track="true" data-reflink="_i17" data-rid="bib85" href="#"><span data-dcnode-id="5395" instrument_node="">85</span></a><span data-dcnode-id="5393" instrument_node="">–</span><a class="ref showRefEvent" data-dcnode-id="5391" data-feathr-click-track="true" data-reflink="_i17" data-rid="bib88" href="#"><span data-dcnode-id="5392" instrument_node="">88</span></a><span data-dcnode-id="5390" instrument_node="">). However, because the prevalence of bullous lung disease among marijuana smokers compared with that in the general population is unknown, no firm conclusions can be drawn as to whether or not bullous lung disease is causally linked to marijuana smoking (</span><a class="ref showRefEvent" data-dcnode-id="5388" data-feathr-click-track="true" data-reflink="_i17" data-rid="bib89" href="#"><span data-dcnode-id="5389" instrument_node="">89</span></a><span data-dcnode-id="5387" instrument_node="">).</span></p></div><div class="NLM_sec NLM_sec_level_1" data-dcnode-id="5345"><a class="scroll-offset" data-dcnode-id="5383" data-feathr-click-track="true" name="_i16"></a><div class="sectionInfo" data-dcnode-id="5348"><div class="sectionHeading" data-dcnode-id="5381"><span data-dcnode-id="5382" instrument_node="">Summary and Conclusions</span></div><div class="sectionJumpTo" data-dcnode-id="5349"><div class="sectionLabel" data-dcnode-id="5379"><span data-dcnode-id="5380" instrument_node="">Section:</span></div><form data-dcnode-id="5355" style="margin-bottom:0"><select class="fulltextdd" data-dcnode-id="5356" name="select23" onchange="GoTo(this, 'self')"><option data-dcnode-id="5377" selected="#" value="#">Choose</option><option data-dcnode-id="5375" value="#">Top of page</option><option data-dcnode-id="5373" value="#abstract">Abstract</option><option data-dcnode-id="5371" value="#_i2">What are the Acute Effect...</option><option data-dcnode-id="5369" value="#_i3">What are the Chronic Effe...</option><option data-dcnode-id="5367" value="#_i11">Is Regular Smoking of Mar...</option><option data-dcnode-id="5365" value="#_i14">Does Marijuana Smoking In...</option><option data-dcnode-id="5363" value="#_i15">Possible Associations of ...</option><option data-dcnode-id="5361" value="">Summary and Conclusions &lt;&lt;</option><option data-dcnode-id="5359" value="#_i17">References</option><option data-dcnode-id="5357" value="#citart1">CITING ARTICLES</option></select></form><div class="nextPrevSec" data-dcnode-id="5350"><a class="up" data-dcnode-id="5353" data-feathr-click-track="true" href="#_i15"><img alt="Previous section" border="0" data-dcnode-id="5354" height="9" hspace="5" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.atsjournals.org/templates/jsp/images/arrow_up.gif&amp;raw" width="11"></a><a class="down" data-dcnode-id="5351" data-feathr-click-track="true" href="#_i17"><img alt="Next section" border="0" data-dcnode-id="5352" height="9" hspace="5" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.atsjournals.org/templates/jsp/images/arrow_down.gif&amp;raw" width="11"></a></div></div></div><p data-dcnode-id="5346"><span data-dcnode-id="5347" instrument_node="">Regular use of marijuana causes airway injury leading to symptoms of chronic bronchitis in some smokers but no physiological or high-resolution computed tomography evidence of emphysema. Despite the presence of procarcinogenic components in marijuana smoke, a limited number of appropriately performed and analyzed epidemiologic studies have failed to demonstrate an increased risk for either lung or upper airway cancer in association with marijuana smoking, although evidence is mixed regarding the risk of heavy, long-term use. The immunosuppressive effects of THC and reports of bacterial and fungal contamination of marijuana imply an increased risk of pneumonia. While this increased risk is also suggested by isolated case reports in immunocompromised patients and by older epidemiologic studies, it has not been confirmed in a large AIDS cohort study. Isolated case reports of pneumothorax/pneumomediastinum and bullous lung disease in heavy users of marijuana have implicated marijuana as an etiologic factor, but epidemiologic confirmation of a causal link is absent. Overall, the risks of pulmonary complications of regular use of marijuana appear to be relative small and far lower than those of tobacco smoking. However, such potential pulmonary risks need to be weighed against possible benefits in considerations regarding medicinal use of marijuana.</span></p></div><a class="scroll-offset" data-dcnode-id="5343" data-feathr-click-track="true" name="_i17"></a><div class="sectionInfo" data-dcnode-id="5308"><div class="sectionHeading" data-dcnode-id="5341"><span data-dcnode-id="5342" instrument_node="">References</span></div><div class="sectionJumpTo" data-dcnode-id="5309"><div class="sectionLabel" data-dcnode-id="5339"><span data-dcnode-id="5340" instrument_node="">Section:</span></div><form data-dcnode-id="5315" style="margin-bottom:0"><select class="fulltextdd" data-dcnode-id="5316" name="select23" onchange="GoTo(this, 'self')"><option data-dcnode-id="5337" selected="#" value="#">Choose</option><option data-dcnode-id="5335" value="#">Top of page</option><option data-dcnode-id="5333" value="#abstract">Abstract</option><option data-dcnode-id="5331" value="#_i2">What are the Acute Effect...</option><option data-dcnode-id="5329" value="#_i3">What are the Chronic Effe...</option><option data-dcnode-id="5327" value="#_i11">Is Regular Smoking of Mar...</option><
