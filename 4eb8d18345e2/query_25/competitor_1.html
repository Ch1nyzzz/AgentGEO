</span><div class="content" data-dcnode-id="1834"><h3 data-dcnode-id="1911"><span data-dcnode-id="1912" instrument_node="">What are the effects of high altitude training on athletes?</span></h3><span data-dcnode-id="1910" instrument_node="">
</span><p data-dcnode-id="1908"><span data-dcnode-id="1909" instrument_node="">We all know that the top teams always go back to the mountains to row there. But what are the benefits of altitude training for athletes? Is altitude training really a source of performance improvement or just a fashion trend?</span></p><span data-dcnode-id="1907" instrument_node="">
</span><p data-dcnode-id="1905"><span data-dcnode-id="1906" instrument_node="">Whether long-distance runners, rowers or swimmers – the training over 1500 m is usually part of the annual program for top athlete. The&nbsp;athletic amateur has ever heard of red blood cells that multiply in higher regions and enable the blood to carry more oxygen. Consequence: The rowing athlete can row faster and more persistently at low altitudes. (Photo Credit: Rowing in Europe altitude camps)</span></p><span data-dcnode-id="1904" instrument_node="">
</span><h3 data-dcnode-id="1902"><span data-dcnode-id="1903" instrument_node="">Effects of altitude training on athletes</span></h3><span data-dcnode-id="1901" instrument_node="">
</span><p data-dcnode-id="1899"><span data-dcnode-id="1900" instrument_node="">Altitude training as a means of performance enhancement is interesting for professionals, because training at higher altitudes ensures a better supply of oxygen to the muscles. This is beneficial for every athlete, whether top athletes or recreational rower.</span></p><span data-dcnode-id="1898" instrument_node="">
</span><p data-dcnode-id="1894"><a data-dcnode-id="1896" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.rowperfect.co.uk/wp-content/uploads/2019/02/BWB-4.jpg"><img alt="" data-dcnode-id="1897" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.rowperfect.co.uk/wp-content/uploads/2019/02/BWB-4.jpg&amp;raw"></a><span data-dcnode-id="1895" instrument_node=""> Photo Credit: Rowing in Europe</span></p><span data-dcnode-id="1893" instrument_node="">
</span><p data-dcnode-id="1888"><span data-dcnode-id="1892" instrument_node="">“Staying at an altitude of more than 1,500 meters leads to a series of adaptation processes in the organism, which have a performance-related importance, especially in endurance exercise,” </span><a data-dcnode-id="1890" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.runnersworld.de/training"><span data-dcnode-id="1891" instrument_node=""> Prof. Andreas Nieß,</span></a><span data-dcnode-id="1889" instrument_node=""> head of the sports medicine department of the University of Tübingen, Germany. In an interview with running athletes he explained further: “The best and probably most important example is the increased release of erythropoietin, the hormone that stimulates the formation of red blood cells. Furthermore, there is evidence that altitude training affects plasma volume and buffer capacity. They stay increased for a certain amount of time after returning from the higher altitude. If training takes place at high altitude conditions, the increased breathing activity (thinner air) may also exert an additional training stimulus on the respiratory muscles. Last but not least, it is also assumed altitude training has favourable effects of on the size and function of the mitochondria and also stimulates the release of growth hormones.”</span></p><span data-dcnode-id="1887" instrument_node="">
</span><h4 data-dcnode-id="1885"><span data-dcnode-id="1886" instrument_node="">Effects of altitude training on athletes</span></h4><span data-dcnode-id="1884" instrument_node="">
</span><p data-dcnode-id="1880"><a data-dcnode-id="1882" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.rowperfect.co.uk/wp-content/uploads/2019/02/1060.jpg"><img alt="" data-dcnode-id="1883" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.rowperfect.co.uk/wp-content/uploads/2019/02/1060.jpg&amp;raw"></a><span data-dcnode-id="1881" instrument_node=""> Rowing on the Walensee, SUI</span></p><span data-dcnode-id="1879" instrument_node="">
</span><p data-dcnode-id="1877"><span data-dcnode-id="1878" instrument_node="">This means applied: A better oxygenation of the muscles, a shorter recovery time after stress, an improvement in lipid metabolism and an increase in energy turnover. The latter effect can generally make altitude training even for overweight people meaningful.</span></p><span data-dcnode-id="1876" instrument_node="">
</span><p data-dcnode-id="1874"><span data-dcnode-id="1875" instrument_node="">At a higher altitude, the air is thinner and the air pressure is lower than at sea level. All parts of the breathing air are equally reduced. The lower oxygen content of the mountain air must be compensated for by extra work of the lungs. This applies to physical rest as well as under stress. There have been researchers who suspect that the positive effect of altitude training is solely based on the additional&nbsp;training&nbsp;of the respiratory muscles.</span></p><span data-dcnode-id="1873" instrument_node="">
</span><h4 data-dcnode-id="1871"><span data-dcnode-id="1872" instrument_node="">Hematosis</span></h4><span data-dcnode-id="1870" instrument_node="">
</span><p data-dcnode-id="1868"><span data-dcnode-id="1869" instrument_node="">The real primary reason for endurance athletes to visit an altitude training camp is medically and lies in the stimulation of red blood cell formation. Already during the first hour at a higher altitude, the kidneys release a hormone, which stimulates the formation of blood: erythropoietin. The stimulation of the hormone ensures that the oxygen-carrying red blood cells multiply. There is also evidence that plasma volume and buffer capacity are increased after returning from altitude for some time. Last but not least, it is also assumed altitude training has favourable effects of on the size and function of the mitochondria and also stimulates the release of growth hormones.</span></p><span data-dcnode-id="1867" instrument_node="">
</span><h4 data-dcnode-id="1865"><span data-dcnode-id="1866" instrument_node="">More effects of altitude Training: Breathing is stimulated:&nbsp;</span></h4><span data-dcnode-id="1864" instrument_node="">
</span><p data-dcnode-id="1860"><span data-dcnode-id="1863" instrument_node="">Zadditional stimulation of the respiratory muscles via the increased respiratory activity.</span><br data-dcnode-id="1862"><span data-dcnode-id="1861" instrument_node="">
Increased respiratory activity due to the thinner air may also exert an additional training stimulus on the respiratory muscles. Even though the oxygen supply can still be maintained at a sufficient level, the increased respiration also has certain “side effects”. Although on the one hand the oxygen concentration in the tissue can and must be maintained, increased respiration results in an increased release of the gas carbon dioxide. Lowering the carbon dioxide concentration in the body, in turn, leads to a noticeable shift in the chemical balance. The feeling of such “alkalization” should be familiar to anyone who has been breathing for a short while before resting.</span></p><span data-dcnode-id="1859" instrument_node="">
</span><h4 data-dcnode-id="1857"><span data-dcnode-id="1858" instrument_node="">Increased carbohydrate burning</span></h4><span data-dcnode-id="1856" instrument_node="">
</span><p data-dcnode-id="1854"><span data-dcnode-id="1855" instrument_node="">The mitochondria (cell power plants of the body) are positively influenced in size and function. When loaded, the energy metabolism increases and shifts towards carbohydrate combustion. As a result, the glycogen stores in the body are more stressed and thus consumed faster.</span></p><span data-dcnode-id="1853" instrument_node="">
</span><h4 data-dcnode-id="1851"><span data-dcnode-id="1852" instrument_node="">Decrease in buffer capacity</span></h4><span data-dcnode-id="1850" instrument_node="">
</span><p data-dcnode-id="1848"><span data-dcnode-id="1849" instrument_node="">The kidneys protect the organism against this change by the excretion of the substance bicarbonate. This process does not remain without consequences. The excretion of bicarbonate in higher altitudes leads to a reduced buffer function of the body. As a result, the hyperacidity caused by intense rowing cannot be compensated so well, the fatigue occurs faster. Such a change in buffer capacity happens very quickly. After returning to sea level, however, the bicarbonate will then reach a higher level with better buffer capacity than before the altitude stay.</span></p><span data-dcnode-id="1847" instrument_node="">
</span><h3 data-dcnode-id="1845"><span data-dcnode-id="1846" instrument_node="">Altitude training in Mexico, Switzerland and the Rockies</span></h3><span data-dcnode-id="1844" instrument_node="">
</span><p data-dcnode-id="1840"><span data-dcnode-id="1843" instrument_node="">Rowperfect UK and our partners are planning three altitude camps in October 2019. In Mexico, Switzerland and in the USA (Rocky Mountains). We are happy to receive your request. More information: </span><a data-dcnode-id="1841" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.rowperfect.co.uk/effects-of-altitude-training-on-athletes/info%40rowperfect.co.uk"><span data-dcnode-id="1842" instrument_node="">Email us.</span></a></p><span data-dcnode-id="1839" instrument_node="">
</span><p data-dcnode-id="1836"><strong data-dcnode-id="1837"><span data-dcnode-id="1838" instrument_node="">Sources and more info: for example, Runnersworld.de</span></strong></p><span data-dcnode-id="1835" instrument_node="">
