</span><section class="elementor-section elementor-top-section elementor-element elementor-element-1af49c27 elementor-section-boxed elementor-section-height-default elementor-section-height-default" data-dcnode-id="467" data-element_type="section" data-id="1af49c27"><span data-dcnode-id="1761" instrument_node="">
</span><div class="elementor-container elementor-column-gap-default" data-dcnode-id="469"><span data-dcnode-id="1760" instrument_node="">
</span><div class="elementor-column elementor-col-100 elementor-top-column elementor-element elementor-element-349a83a3" data-dcnode-id="471" data-element_type="column" data-id="349a83a3"><span data-dcnode-id="1759" instrument_node="">
</span><div class="elementor-widget-wrap elementor-element-populated" data-dcnode-id="473"><span data-dcnode-id="1758" instrument_node="">
</span><div class="elementor-element elementor-element-5d268a8c elementor-widget elementor-widget-text-editor" data-dcnode-id="475" data-element_type="widget" data-id="5d268a8c" data-widget_type="text-editor.default"><span data-dcnode-id="1757" instrument_node="">
</span><div class="elementor-widget-container" data-dcnode-id="477"><span data-dcnode-id="1756" instrument_node="">
</span><span data-dcnode-id="1753" instrument_node=""> </span><span data-dcnode-id="1751" instrument_node="">
</span><blockquote class="wp-block-quote" data-dcnode-id="1745"><p data-dcnode-id="1749"><span data-dcnode-id="1750" instrument_node="">Strength training is critical for endurance and mountain sports. It is also easily misunderstood. What exercises to use, whether to push heavy weights or focus on high repetitions, how to add strength without adding bulk or mass—these are all important considerations for the mountain athlete.</span></p><p data-dcnode-id="1746"><em data-dcnode-id="1747"><span data-dcnode-id="1748" instrument_node="">-by Uphill Athlete coaches Steve House, Scott Johnston, and Sam Naney</span></em></p></blockquote><span data-dcnode-id="1744" instrument_node="">
</span><span data-dcnode-id="1742" instrument_node="">
</span><span data-dcnode-id="1740" instrument_node="">
</span><h2 data-dcnode-id="1738"><span data-dcnode-id="1739" instrument_node="">WHY TRAIN STRENGTH FOR MOUNTAIN SPORTS?</span></h2><span data-dcnode-id="1737" instrument_node="">
</span><span data-dcnode-id="1735" instrument_node="">
</span><span data-dcnode-id="1733" instrument_node="">
</span><p data-dcnode-id="1731"><span data-dcnode-id="1732" instrument_node="">People can and have summited mountains, raced ultras, blazed skimo races, and sent 5.13 without lifting a single weight in the gym. But strength training—everything from pull-ups and squats to focused muscular endurance work—is fundamental to becoming a well-rounded mountain athlete with a long, injury-free career. The Uphill Athlete philosophy of strength training is to build functional strength that translates to improved performance.</span></p><span data-dcnode-id="1730" instrument_node="">
</span><span data-dcnode-id="1728" instrument_node="">
</span><span data-dcnode-id="1726" instrument_node="">
</span><p data-dcnode-id="1724"><span data-dcnode-id="1725" instrument_node="">A proper strength program will help you develop into a more durable, more powerful, and more efficient alpinist, runner, skier, or climber—a mountain athlete capable of moving well over a period of many hours, sometimes day after day. As with any well-engineered training progression, an endurance-oriented strength regimen starts out fairly general and sharpens into something more specific over time. Ideally it should be geared toward the unique physical demands of your pursuit.</span></p><span data-dcnode-id="1723" instrument_node="">
</span><span data-dcnode-id="1721" instrument_node="">
</span><span data-dcnode-id="1719" instrument_node="">
</span><p data-dcnode-id="1717"><span data-dcnode-id="1718" instrument_node="">In this article we define strength training and explain how to apply it most effectively to enhance your training diet. You will find several sample workouts you can do in the gym, on the trail, or at the crag. Strength training is a tool that, when wielded expertly, will hone your specificity for your sport.</span></p><span data-dcnode-id="1716" instrument_node="">
</span><span data-dcnode-id="1714" instrument_node="">
</span><span data-dcnode-id="1712" instrument_node="">
</span><div class="wp-block-image" data-dcnode-id="1709"><figure class="aligncenter" data-dcnode-id="1710"><img alt="" class="wp-image-15315" data-dcnode-id="1711" height="683" loading="lazy" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//uphillathlete.com/wp-content/uploads/2018/12/M.THURK_1033-1024x683.jpg&amp;raw" width="1024"></figure></div><span data-dcnode-id="1708" instrument_node="">
</span><span data-dcnode-id="1706" instrument_node="">
</span><span data-dcnode-id="1704" instrument_node="">
</span><p data-dcnode-id="1699"><em data-dcnode-id="1700"><span data-dcnode-id="1703" instrument_node="">Steve House doing a hill bounding workout. This specific form of strength training uses explosive bounding movements, where the goal is to maximize “time in the air” not the speed up the hill. </span><a data-dcnode-id="1701" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.mthurk.com/" rel="noopener noreferrer" target="_blank"><span data-dcnode-id="1702" instrument_node="">M.THURK Photography.</span></a></em></p><span data-dcnode-id="1698" instrument_node="">
</span><span data-dcnode-id="1696" instrument_node="">
</span><span data-dcnode-id="1694" instrument_node="">
</span><h2 data-dcnode-id="1688"><strong data-dcnode-id="1689"><span data-dcnode-id="1693" instrument_node="">What </span><em data-dcnode-id="1691"><span data-dcnode-id="1692" instrument_node="">Is</span></em><span data-dcnode-id="1690" instrument_node=""> Strength?</span></strong></h2><span data-dcnode-id="1687" instrument_node="">
</span><span data-dcnode-id="1685" instrument_node="">
</span><span data-dcnode-id="1683" instrument_node="">
</span><p data-dcnode-id="1681"><span data-dcnode-id="1682" instrument_node="">In the context of sports, strength is the ability to exert the greatest force with the least effort. Under this umbrella definition, it is possible to account for a broad swath of applications—from the Olympic weightlifter who can snatch 300 pounds to the mountain runner who finishes a marathon with 8,800 feet of climbing in 3:45 (as Kilian Jornet did in July 2017). In both cases, the athlete has to overcome some form of resistance; they leverage an ability—their “strength”—to accomplish that load with great efficiency. However, they are drawing upon very different sport-specific strength qualities to resist and overcome gravity. For the weightlifter, that quality is their maximal explosive power. For the mountain runner, it is the the ability to generate submaximal forces for hours on end without a diminution in those forces.</span></p><span data-dcnode-id="1680" instrument_node="">
</span><span data-dcnode-id="1678" instrument_node="">
</span><span data-dcnode-id="1676" instrument_node="">
</span><h3 data-dcnode-id="1673"><strong data-dcnode-id="1674"><span data-dcnode-id="1675" instrument_node="">Speed Is a Form of Strength</span></strong></h3><span data-dcnode-id="1672" instrument_node="">
</span><span data-dcnode-id="1670" instrument_node="">
</span><span data-dcnode-id="1668" instrument_node="">
</span><p data-dcnode-id="1666"><span data-dcnode-id="1667" instrument_node="">An athlete’s speed depends to a large extent on their power (the rate that strength is applied), which is rooted in their strength. In order to move faster, you need to be able to create higher forces (strength) in the locomotive muscles, and you need to be able to do so more quickly.</span></p><span data-dcnode-id="1665" instrument_node="">
</span><span data-dcnode-id="1663" instrument_node="">
</span><span data-dcnode-id="1661" instrument_node="">
</span><p data-dcnode-id="1659"><span data-dcnode-id="1660" instrument_node="">When a track sprinter like Usain Bolt steps to the line of a 100-meter sprint, his muscles and tendons tension with incredible potential energy. At the moment the gun goes off, his brain communicates a nearly instantaneous signal to those muscles to contract with tremendous power, propelling him off the blocks and into a world-record performance. In this example, we can identify Bolt’s power in two capacities: the contractile force of his muscles and the neuromuscular efficiency of his central and peripheral nervous systems as they command function from those muscles at incredible rates. That, too, is strength.</span></p><span data-dcnode-id="1658" instrument_node="">
</span><span data-dcnode-id="1656" instrument_node="">
</span><span data-dcnode-id="1654" instrument_node="">
</span><p data-dcnode-id="1652"><span data-dcnode-id="1653" instrument_node="">While Bolt’s display of power is obvious, the same principles apply to the mountain athlete, just in a less obvious way.</span></p><span data-dcnode-id="1651" instrument_node="">
</span><span data-dcnode-id="1649" instrument_node="">
</span><span data-dcnode-id="1647" instrument_node="">
</span><h3 data-dcnode-id="1644"><strong data-dcnode-id="1645"><span data-dcnode-id="1646" instrument_node="">An “Ideal” of Fitness</span></strong></h3><span data-dcnode-id="1643" instrument_node="">
</span><span data-dcnode-id="1641" instrument_node="">
</span><span data-dcnode-id="1639" instrument_node="">
</span><p data-dcnode-id="1637"><span data-dcnode-id="1638" instrument_node="">Any athlete interested in maximizing their performance should look first at what component parts make up their “ideal” of fitness. Taking the mountain runner as an example, we can identify the following pieces of this puzzle:</span></p><span data-dcnode-id="1636" instrument_node="">
</span><span data-dcnode-id="1634" instrument_node="">
</span><span data-dcnode-id="1632" instrument_node="">
</span><ul data-dcnode-id="1615"><li data-dcnode-id="1628"><em data-dcnode-id="1630"><span data-dcnode-id="1631" instrument_node="">Aerobic efficiency</span></em><span data-dcnode-id="1629" instrument_node="">: This is the metabolic ability of the body to utilize fat as fuel while running (or skiing or climbing) at an overall power output.</span></li><li data-dcnode-id="1624"><em data-dcnode-id="1626"><span data-dcnode-id="1627" instrument_node="">Speed</span></em><span data-dcnode-id="1625" instrument_node="">: This is a form of strength or power, as mentioned above.</span></li><li data-dcnode-id="1620"><em data-dcnode-id="1622"><span data-dcnode-id="1623" instrument_node="">Muscular endurance (ME)</span></em><span data-dcnode-id="1621" instrument_node="">: This is the ability of the muscles to produce a higher work output over longer durations and in a predominantly aerobic state—another form of strength.</span></li><li data-dcnode-id="1616"><em data-dcnode-id="1618"><span data-dcnode-id="1619" instrument_node="">Form/technique</span></em><span data-dcnode-id="1617" instrument_node="">: This is the runner’s proficiency at moving quickly over the terrain, which encompasses their ability to avoid injury and maintain good form despite accumulating fatigue. It is yet another form of strength!</span></li></ul><span data-dcnode-id="1614" instrument_node="">
</span><span data-dcnode-id="1612" instrument_node="">
</span><span data-dcnode-id="1610" instrument_node="">
</span><p data-dcnode-id="1608"><span data-dcnode-id="1609" instrument_node="">Our hypothetical runner may now examine those pieces and decide how to train each one, first individually and then in combination, implementing increasingly complex, specific workouts as their goal event approaches.</span></p><span data-dcnode-id="1607" instrument_node="">
</span><span data-dcnode-id="1605" instrument_node="">
</span><span data-dcnode-id="1603" instrument_node="">
</span><h3 data-dcnode-id="1600"><strong data-dcnode-id="1601"><span data-dcnode-id="1602" instrument_node="">Mountain Strong Isn’t Gym Strong</span></strong></h3><span data-dcnode-id="1599" instrument_node="">
</span><span data-dcnode-id="1597" instrument_node="">
</span><span data-dcnode-id="1595" instrument_node="">
</span><p data-dcnode-id="1590"><span data-dcnode-id="1594" instrument_node="">For many, the term </span><em data-dcnode-id="1592"><span data-dcnode-id="1593" instrument_node="">strength training</span></em><span data-dcnode-id="1591" instrument_node=""> conjures images of muscle-bound gym-goers grunting out bicep curls in front of a mirror or chasing a new one-rep max for a particular lift. Banish that from your mind, because that is not what strength training should look like for you as an endurance athlete. A trail runner, mountaineer, climber, or skier ultimately needs to develop event specific functional strength for their given activity, not bulk they’ll then have to haul up a hill, mountain, or route. You simply can’t afford to gain strength at the expense of adding appreciable muscle mass.</span></p><span data-dcnode-id="1589" instrument_node="">
</span><span data-dcnode-id="1587" instrument_node="">
</span><span data-dcnode-id="1585" instrument_node="">
</span><p data-dcnode-id="1583"><span data-dcnode-id="1584" instrument_node="">Mountain strength training has two primary aims: first, to unlock your full performance potential in your chosen mountain sport; second, to prevent injuries. The goal is not to become stronger at a certain gym-based exercise. You may lift weights to address deficiencies in your general strength, as discussed below. But once you have accomplished that, it will benefit your performance to transition to more sport-specific strength work. In mountain athletics, weightlifting should never be an end unto itself.</span></p><span data-dcnode-id="1582" instrument_node="">
</span><span data-dcnode-id="1580" instrument_node="">
</span><span data-dcnode-id="1578" instrument_node="">
</span><div class="wp-block-image" data-dcnode-id="1574"><figure class="aligncenter" data-dcnode-id="1575"><a data-dcnode-id="1576" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//uphillathlete.com/strength-training-for-the-mountain-athlete/m-thurk_1239/" rel="attachment wp-att-15336"><img alt="mountain strength" class="wp-image-15336" data-dcnode-id="1577" height="683" loading="lazy" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//uphillathlete.com/wp-content/uploads/2018/12/M.THURK_1239-1024x683.jpg&amp;raw" width="1024"></a></figure></div><span data-dcnode-id="1573" instrument_node="">
</span><span data-dcnode-id="1571" instrument_node="">
</span><span data-dcnode-id="1569" instrument_node="">
</span><p data-dcnode-id="1564"><em data-dcnode-id="1565"><span data-dcnode-id="1568" instrument_node="">Steve House doing a MoonBoard workout—a very sport-specific form of strength training. </span><a data-dcnode-id="1566" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.mthurk.com/" rel="noopener noreferrer" target="_blank"><span data-dcnode-id="1567" instrument_node="">M.THURK Photography.</span></a></em></p><span data-dcnode-id="1563" instrument_node="">
</span><span data-dcnode-id="1561" instrument_node="">
</span><span data-dcnode-id="1559" instrument_node="">
</span><h3 data-dcnode-id="1556"><strong data-dcnode-id="1557"><span data-dcnode-id="1558" instrument_node="">General Strength vs. Specific Strength</span></strong></h3><span data-dcnode-id="1555" instrument_node="">
</span><span data-dcnode-id="1553" instrument_node="">
</span><span data-dcnode-id="1551" instrument_node="">
</span><p data-dcnode-id="1544"><em data-dcnode-id="1549"><span data-dcnode-id="1550" instrument_node="">General strength</span></em><span data-dcnode-id="1548" instrument_node=""> is usually not sport specific, meaning that it may bear little or even no similarity to the movement, speed, or range of motion of the sport you are training for. For an athlete, general strength provides a base for the more sport-specific strength training that is to follow, and it makes you less prone to injury. </span><em data-dcnode-id="1546"><span data-dcnode-id="1547" instrument_node="">Specific strength</span></em><span data-dcnode-id="1545" instrument_node=""> is sport specific, meaning it mimics quite closely—exactly, in some cases—the demands of your sport. This type of strength training has a direct bearing on your athletic performance.</span></p><span data-dcnode-id="1543" instrument_node="">
</span><span data-dcnode-id="1541" instrument_node="">
</span><span data-dcnode-id="1539" instrument_node="">
</span><p data-dcnode-id="1537"><span data-dcnode-id="1538" instrument_node="">Most popular gym-based strength exercises fall under the “general” category. They are specific only to themselves: a bench press improves your ability to bench press a heavy weight and is not even semirelated to any of the mountain sports we care about. A pull-up, while not exactly sport specific, does improve your pulling force, which can benefit you in sports like climbing and skimo.</span></p><span data-dcnode-id="1536" instrument_node="">
</span><span data-dcnode-id="1534" instrument_node="">
</span><span data-dcnode-id="1532" instrument_node="">
</span><p data-dcnode-id="1530"><span data-dcnode-id="1531" instrument_node="">So why bother with general strength training at all? While there certainly are mountain athletes who eschew general strength training, you’d be wise to consider your own needs rather than blindly following what others do. If you are at all deficient in basic strength, you may find it worthwhile to engage in a simple general strength training program before segueing into sport-specific strength training. Addressing your weaknesses first will make the specific training more effective in the long run.</span></p><span data-dcnode-id="1529" instrument_node="">
</span><span data-dcnode-id="1527" instrument_node="">
</span><span data-dcnode-id="1525" instrument_node="">
</span><hr class="wp-block-separator" data-dcnode-id="1524" id="general-strength"><span data-dcnode-id="1523" instrument_node="">
</span><span data-dcnode-id="1521" instrument_node="">
</span><span data-dcnode-id="1519" instrument_node="">
</span><h2 data-dcnode-id="1517"><span data-dcnode-id="1518" instrument_node="">GENERAL STRENGTH FOR THE MOUNTAIN ATHLETE</span></h2><span data-dcnode-id="1516" instrument_node="">
</span><span data-dcnode-id="1514" instrument_node="">
</span><span data-dcnode-id="1512" instrument_node="">
</span><p data-dcnode-id="1507"><span data-dcnode-id="1511" instrument_node="">There is ample empirical evidence that improving general strength can positively influence your endurance performance. But when it comes to general strength training, it is easy to get swept up in the “gym strong” mentality and lose sight of your end goal as a mountain athlete: to become a more efficient/faster skier, runner, alpinist, or climber. Spending undue time and effort on general strength can deprive you of the greater benefits gained through specific training. Plus, it is possible to become </span><em data-dcnode-id="1509"><span data-dcnode-id="1510" instrument_node="">too</span></em><span data-dcnode-id="1508" instrument_node=""> strong.</span></p><span data-dcnode-id="1506" instrument_node="">
</span><span data-dcnode-id="1504" instrument_node="">
</span><span data-dcnode-id="1502" instrument_node="">
</span><h3 data-dcnode-id="1499"><strong data-dcnode-id="1500"><span data-dcnode-id="1501" instrument_node="">How Strong Is Strong Enough?</span></strong></h3><span data-dcnode-id="1498" instrument_node="">
</span><span data-dcnode-id="1496" instrument_node="">
</span><span data-dcnode-id="1494" instrument_node="">
</span><p data-dcnode-id="1492"><span data-dcnode-id="1493" instrument_node="">Take the back squat, for example: It is a popular general strength movement for many sports because it engages some of the biggest prime-mover muscles in the hips and legs as well as the core. Improving this strength—up to a point—will translate to better athletic performance. But where is that point?</span></p><span data-dcnode-id="1491" instrument_node="">
</span><span data-dcnode-id="1489" instrument_node="">
</span><span data-dcnode-id="1487" instrument_node="">
</span><p data-dcnode-id="1482"><span data-dcnode-id="1486" instrument_node="">For sports dominated by speed and power, such as sprinting, the field events of throwing and jumping, and American football, increasing squat strength will correlate quite closely with improved performance. When it comes to endurance sports, not being able to squat your own body weight probably indicates that your performance and durability would improve with added strength. However, being able to squat </span><em data-dcnode-id="1484"><span data-dcnode-id="1485" instrument_node="">twice</span></em><span data-dcnode-id="1483" instrument_node=""> your body weight is unlikely to add anything to your performance and may in fact detract from it. Instead of increasing your squat by 20 pounds, it would be a better use of your time to focus on something more sport specific like running uphill.</span></p><span data-dcnode-id="1481" instrument_node="">
</span><span data-dcnode-id="1479" instrument_node="">
</span><span data-dcnode-id="1477" instrument_node="">
</span><h3 data-dcnode-id="1474"><strong data-dcnode-id="1475"><span data-dcnode-id="1476" instrument_node="">Time Is Precious</span></strong></h3><span data-dcnode-id="1473" instrument_node="">
</span><span data-dcnode-id="1471" instrument_node="">
</span><span data-dcnode-id="1469" instrument_node="">
</span><p data-dcnode-id="1467"><span data-dcnode-id="1468" instrument_node="">No athlete, especially one with work, school, and family obligations, has unlimited time or energy to devote to training. You need to examine the strength demands of your sport before diving headlong into a program that may have little to no bearing on your performance. In other words, don’t devote precious hours to a bench press program when your goal is to improve your vertical kilometer time. Mountain running, backcountry skiing/ski mountaineering, skimo, cross-country skiing, and mountaineering are all locomotive sports that involve single-legged propulsion. This type of movement relies on good hip stabilization so that the prime-mover muscles can function optimally. Even general strength training for these sports should place heavy emphasis on resisted single-leg movements.</span></p><span data-dcnode-id="1466" instrument_node="">
</span><span data-dcnode-id="1464" instrument_node="">
</span><span data-dcnode-id="1462" instrument_node="">
</span><p data-dcnode-id="1460"><span data-dcnode-id="1461" instrument_node="">Similarly, if you’re a climber who can’t do a single pull-up, you would undoubtedly see gains by improving this upper-body aspect of general strength. But if you can crank off 12 pull-ups, there’s a very good chance that general pulling strength is not holding you back in your climbing.</span></p><span data-dcnode-id="1459" instrument_node="">
</span><span data-dcnode-id="1457" instrument_node="">
</span><span data-dcnode-id="1455" instrument_node="">
</span><h3 data-dcnode-id="1452"><strong data-dcnode-id="1453"><span data-dcnode-id="1454" instrument_node="">Assessing General Strength: Where Are You Deficient?</span></strong></h3><span data-dcnode-id="1451" instrument_node="">
</span><span data-dcnode-id="1449" instrument_node="">
</span><span data-dcnode-id="1447" instrument_node="">
</span><p data-dcnode-id="1445"><span data-dcnode-id="1446" instrument_node="">Mountain endurance sports require many thousands of repetitive movements, and activities like running produce high impact forces with each stride. At the very least, the slightest muscular imbalances or joint misalignments can result in wasted effort. In the worst-case scenarios, these can lead to overuse injuries—the bane of all endurance athletes. To determine if you suffer from any musculoskeletal deficiencies, and thus would benefit from building a solid base of general strength before making a beeline into sport-specific strength work, conduct the following three assessment tests centered on the legs and hips. They are listed from easiest to hardest.</span></p><span data-dcnode-id="1444" instrument_node="">
</span><span data-dcnode-id="1442" instrument_node="">
</span><span data-dcnode-id="1440" instrument_node="">
</span><blockquote data-dcnode-id="1415"><h5 data-dcnode-id="1437" style="text-align: center;"><strong data-dcnode-id="1438"><span data-dcnode-id="1439" instrument_node="">Squat (Easy)</span></strong></h5><p data-dcnode-id="1435"><span data-dcnode-id="1436" instrument_node="">Stand with your feet slightly wider than shoulder width apart, toes angled out slightly. Squat down as low as you can while keeping your spine as vertical as you can. This action should drop your hips down between and slightly behind your heels. Do your knees cave in toward your center line as you descend and then stand back up? This indicates weak hip (gluteal) muscles.</span></p><figure data-dcnode-id="1432"><a data-dcnode-id="1433" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//uphillathlete.com/m-thurk_0789/"><img alt="mountain strength" class="aligncenter wp-image-15296 size-medium" data-dcnode-id="1434" height="300" loading="lazy" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//uphillathlete.com/wp-content/uploads/2018/12/M.THURK_0789-200x300.jpg&amp;raw" width="200"></a></figure><p data-dcnode-id="1430"><span data-dcnode-id="1431" instrument_node="">FIX: Place a rubber band or cord around your knees and squat while resisting the inward pressure. Do 3 sets of 20 squats 3–4 times/week.</span></p><h5 data-dcnode-id="1427" style="text-align: center;"><strong data-dcnode-id="1428"><span data-dcnode-id="1429" instrument_node="">Back Half-Squat (Medium)</span></strong></h5><p data-dcnode-id="1423"><strong data-dcnode-id="1425"><span data-dcnode-id="1426" instrument_node="">Caution: Squatting technique requires instruction to do safely. Seek qualified help to learn this movement.</span></strong><span data-dcnode-id="1424" instrument_node=""> Perform a proper back half-squat using a barbell weighing the same as your body. Can you do this without your knees caving inward, with stable shoulders and hips and with no wobbling? Great! You have good general strength. If not, this can be an exercise for you to include in your strength routine.</span></p><p data-dcnode-id="1421"><span data-dcnode-id="1422" instrument_node="">FIX: Do 4–5 sets of 10–12 reps 2–3 times/week using 40–60 percent of your body weight while working on perfect form. Build toward 3–4 sets of 4–6 reps using about 80–90 percent of your body weight 2 times/week.</span></p><h5 data-dcnode-id="1418" style="text-align: center;"><strong data-dcnode-id="1419"><span data-dcnode-id="1420" instrument_node="">Box Step-up (Hard)</span></strong></h5><p data-dcnode-id="1416"><span data-dcnode-id="1417" instrument_node="">Stand facing a box or bench about 12–16 inches away that is about knee height. Place one foot on the box and step up onto the box with a barbell that is 25 percent of your body weight without using the foot on the ground for assistance. Does your weighted knee fall to the inside as you step up? This indicates weak hip (gluteal) muscles. Can you control it consciously or is it an uncontrollable reaction to stepping up? Either of these signs indicates a need for general strength improvement.</span></p></blockquote><span data-dcnode-id="1414" instrument_node="">
</span><span data-dcnode-id="1412" instrument_node="">
</span><span data-dcnode-id="1410" instrument_node="">
</span><div class="wp-block-image" data-dcnode-id="1403"><figure class="alignleft" data-dcnode-id="1404"><a data-dcnode-id="1408" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//uphillathlete.com/"><img alt="mountain strength" class="wp-image-15302" data-dcnode-id="1409" height="300" loading="lazy" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//uphillathlete.com/wp-content/uploads/2018/12/M.THURK_0756-200x300.jpg&amp;raw" width="200"></a><figcaption data-dcnode-id="1405"><em data-dcnode-id="1406"><span data-dcnode-id="1407" instrument_node="">Correct: Box should be about 75 percent of the height of the knee.</span></em></figcaption></figure></div><span data-dcnode-id="1402" instrument_node="">
</span><span data-dcnode-id="1400" instrument_node="">
</span><span data-dcnode-id="1398" instrument_node="">
</span><div class="wp-block-image" data-dcnode-id="1391"><figure class="alignright" data-dcnode-id="1392"><a data-dcnode-id="1396" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//uphillathlete.com/"><img alt="mountain strength" class="wp-image-15303" data-dcnode-id="1397" height="300" loading="lazy" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//uphillathlete.com/wp-content/uploads/2018/12/M.THURK_0749-200x300.jpg&amp;raw" width="200"></a><figcaption data-dcnode-id="1393"><em data-dcnode-id="1394"><span data-dcnode-id="1395" instrument_node="">Correct: In this photo the knee is tracking correctly.</span></em></figcaption></figure></div><span data-dcnode-id="1390" instrument_node="">
</span><span data-dcnode-id="1388" instrument_node="">
</span><span data-dcnode-id="1386" instrument_node="">
</span><div class="wp-block-image" data-dcnode-id="1379"><figure class="aligncenter" data-dcnode-id="1380"><a data-dcnode-id="1384" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//uphillathlete.com/strength-training-for-the-mountain-athlete/m-thurk_0743/" rel="attachment wp-att-15304"><img alt="mountain strength" class="wp-image-15304" data-dcnode-id="1385" height="300" loading="lazy" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//uphillathlete.com/wp-content/uploads/2018/12/M.THURK_0743-200x300.jpg&amp;raw" width="200"></a><figcaption data-dcnode-id="1381"><em data-dcnode-id="1382"><span data-dcnode-id="1383" instrument_node="">Incorrect: The knee is tracking to the midline of the body.</span></em></figcaption></figure></div><span data-dcnode-id="1378" instrument_node="">
</span><span data-dcnode-id="1376" instrument_node="">
</span><span data-dcnode-id="1374" instrument_node="">
</span><p data-dcnode-id="1372"><span data-dcnode-id="1373" instrument_node="">FIX: Start with as low a box height as it takes to allow your knee to track over your toes during the step-up. Use no added weight at first and do 3 sets of 20 reps per leg 3–4 times/week. Raise the box height as you gain strength. Add resistance with a barbell on your shoulders or a weighted backpack to make bigger strength gains; in this case, do 3 sets of 8–10 reps per leg 2–3 times/week.</span></p><span data-dcnode-id="1371" instrument_node="">
</span><span data-dcnode-id="1369" instrument_node="">
</span><span data-dcnode-id="1367" instrument_node="">
</span><div class="wp-block-image" data-dcnode-id="1363"><figure class="aligncenter" data-dcnode-id="1364"><a data-dcnode-id="1365" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//uphillathlete.com/"><img alt="mountain strength" class="wp-image-15314" data-dcnode-id="1366" height="683" loading="lazy" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//uphillathlete.com/wp-content/uploads/2018/12/M.THURK_0757-1024x683.jpg&amp;raw" width="1024"></a></figure></div><span data-dcnode-id="1362" instrument_node="">
</span><span data-dcnode-id="1360" instrument_node="">
</span><span data-dcnode-id="1358" instrument_node="">
</span><p data-dcnode-id="1353"><em data-dcnode-id="1354"><span data-dcnode-id="1357" instrument_node="">Steve (above) is showing the push-up plank position. For those with less shoulder and arm strength, the forearm plank referred to in the text below places the forearms on the floor. The goal of all these plank positions is to hold the spine in a neutral position (neither flexed nor extended) and to not drop or raise the hips. Note that an imaginary straight line between Steve’s ankles and his shoulders passes through his hip joints. </span><a data-dcnode-id="1355" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.mthurk.com/" rel="noopener noreferrer" target="_blank"><span data-dcnode-id="1356" instrument_node="">M.THURK Photography.</span></a></em></p><span data-dcnode-id="1352" instrument_node="">
</span><span data-dcnode-id="1350" instrument_node="">
</span><span data-dcnode-id="1348" instrument_node="">
</span><h3 data-dcnode-id="1345"><strong data-dcnode-id="1346"><span data-dcnode-id="1347" instrument_node="">Assessing Core Strength</span></strong></h3><span data-dcnode-id="1344" instrument_node="">
</span><span data-dcnode-id="1342" instrument_node="">
</span><span data-dcnode-id="1340" instrument_node="">
</span><p data-dcnode-id="1338"><span data-dcnode-id="1339" instrument_node="">The mountain endurance athlete’s midsection stabilizes the hips and shoulders so that the arms and especially the legs can go about their business of propulsion from a solid foundation. Core strength training is general in nature because it is a support that enables effective sport-specific training.</span></p><span data-dcnode-id="1337" instrument_node="">
</span><span data-dcnode-id="1335" instrument_node="">
</span><span data-dcnode-id="1333" instrument_node="">
</span><p data-dcnode-id="1325"><span data-dcnode-id="1332" instrument_node="">There are several muscles involved in this stabilization, as well as in the flexing, extending, and twisting of the spine. But the principal core stability muscle is one called the </span><em data-dcnode-id="1330"><span data-dcnode-id="1331" instrument_node="">transverse abdominus</span></em><span data-dcnode-id="1329" instrument_node=""> (TA). This deepest layer of core muscle wraps around your midsection like a girdle. It does not perform a movement function the way some of the more glamorous core muscles do, such as the </span><em data-dcnode-id="1327"><span data-dcnode-id="1328" instrument_node="">abdominus rectus</span></em><span data-dcnode-id="1326" instrument_node=""> (“six pack”), which flexes the spine. The humble TA muscle’s sole purpose—besides containing your visceral organs—is to stabilize the spine and hips. Because it does not move any major joints, it is difficult to activate and harder to isolate, meaning it can be challenging to strengthen. A consequence is that the bigger prime-mover core muscles end up taking up the slack for a weak TA. This compensation often leads to a further weakening of the TA.</span></p><span data-dcnode-id="1324" instrument_node="">
</span><span data-dcnode-id="1322" instrument_node="">
</span><span data-dcnode-id="1320" instrument_node="">
</span><blockquote data-dcnode-id="1311"><h5 data-dcnode-id="1317" style="text-align: center;"><strong data-dcnode-id="1318"><span data-dcnode-id="1319" instrument_node="">The Forearm Plank Test</span></strong></h5><p data-dcnode-id="1312"><span data-dcnode-id="1316" instrument_node="">Assume a prone position on the floor. Support your body weight on your </span><span data-dcnode-id="1314" style="text-decoration: underline;"><span data-dcnode-id="1315" instrument_node="">forearms and toes</span></span><span data-dcnode-id="1313" instrument_node=""> with your body aligned such that a line drawn from the base of your neck to your heels would be straight, hips neither sagging nor raised. (Reference the image above for good form, but again, keep your forearms on the floor.) Hold this position for as long as you can before shaking or losing this form. If you can’t maintain good form for 30 seconds, you lack strength and endurance in the TA muscle and need to prioritize this type of strength training.</span></p></blockquote><span data-dcnode-id="1310" instrument_node="">
</span><span data-dcnode-id="1308" instrument_node="">
</span><span data-dcnode-id="1306" instrument_node="">
</span><p data-dcnode-id="1304"><span data-dcnode-id="1305" instrument_node="">The TA is one muscle that can never be too strong, so include frequent plank training in your routine. A reasonable program might be 4–5 max holds with a minute of rest between. When you can hold a good plank for over 1 minute, progress by adding resistance or a greater challenge: Use a weight vest or balance a weight plate on your hips. Alternate lifting an arm and a foot so you are balanced on three points during your holds.</span></p><span data-dcnode-id="1303" instrument_node="">
</span><span data-dcnode-id="1301" instrument_node="">
</span><span data-dcnode-id="1299" instrument_node="">
</span><p data-dcnode-id="1291"><span data-dcnode-id="1298" instrument_node="">For more core exercises, check out these videos: </span><a data-dcnode-id="1296" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//uphillathlete.com/strength-demo-basic-core-routine/"><span data-dcnode-id="1297" instrument_node="">Basic Core Routine</span></a><span data-dcnode-id="1295" instrument_node=""> and </span><a data-dcnode-id="1293" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//uphillathlete.com/how-to-do-core/"><span data-dcnode-id="1294" instrument_node="">Scott’s Killer Core Routine</span></a><span data-dcnode-id="1292" instrument_node="">.</span></p><span data-dcnode-id="1290" instrument_node="">
</span><span data-dcnode-id="1288" instrument_node="">
</span><span data-dcnode-id="1286" instrument_node="">
</span><hr class="wp-block-separator" data-dcnode-id="1285" id="mtn-strength-training"><span data-dcnode-id="1284" instrument_node="">
</span><span data-dcnode-id="1282" instrument_node="">
</span><span data-dcnode-id="1280" instrument_node="">
</span><h2 data-dcnode-id="1278"><span data-dcnode-id="1279" instrument_node="">MOUNTAIN ATHLETE STRENGTH TRAINING: CONVERTING GENERAL TO SPECIFIC</span></h2><span data-dcnode-id="1277" instrument_node="">
</span><span data-dcnode-id="1275" instrument_node="">
</span><span data-dcnode-id="1273" instrument_node="">
</span><p data-dcnode-id="1268"><span data-dcnode-id="1272" instrument_node="">Specific strength workouts should involve ranges of motion and speeds very similar to the event you are training for. That’s because the brain’s muscle recruitment patterns are a learned skill. Doing very heavy and slow movement in a general strength exercise like a single box step-up will increase strength in those muscles. But when running uphill, the speed of muscle contraction will be much higher than those slow, heavy box step-ups. Your motor neurons need to be trained to produce the sport-specific movement pattern—in terms of both speed </span><em data-dcnode-id="1270"><span data-dcnode-id="1271" instrument_node="">and</span></em><span data-dcnode-id="1269" instrument_node=""> strength. These specific demands are the justification for why many endurance athletes (whether they understand it or not) rely predominantly on specific strength methods.</span></p><span data-dcnode-id="1267" instrument_node="">
</span><span data-dcnode-id="1265" instrument_node="">
</span><span data-dcnode-id="1263" instrument_node="">
</span><p data-dcnode-id="1259"><em data-dcnode-id="1261"><span data-dcnode-id="1262" instrument_node="">Before you transition from general strength training to specific strength training, make sure you have a good aerobic base.</span></em><span data-dcnode-id="1260" instrument_node=""> This means that your Aerobic Threshold, as measured by heart rate, is within 10 percent of your Anaerobic Threshold. With this aerobic foundation in place, you will be more receptive to the loads imposed by the specific power and muscular endurance workouts outlined below. In other words, you will be better able to absorb the work and recover from it. You will gain more from the time you put in, over the short term and the long term.</span></p><span data-dcnode-id="1258" instrument_node="">
</span><span data-dcnode-id="1256" instrument_node="">
</span><span data-dcnode-id="1254" instrument_node="">
</span><h3 data-dcnode-id="1251"><strong data-dcnode-id="1252"><span data-dcnode-id="1253" instrument_node="">Targeting Speed: Hill Sprints and Hill Bounding</span></strong></h3><span data-dcnode-id="1250" instrument_node="">
</span><span data-dcnode-id="1248" instrument_node="">
</span><span data-dcnode-id="1246" instrument_node="">
</span><p data-dcnode-id="1238"><span data-dcnode-id="1245" instrument_node="">A simple and very powerful workout for any mountain athlete needing to move uphill faster is one we call </span><em data-dcnode-id="1243"><span data-dcnode-id="1244" instrument_node="">hill sprints</span></em><span data-dcnode-id="1242" instrument_node=""> or </span><em data-dcnode-id="1240"><span data-dcnode-id="1241" instrument_node="">hill bounding</span></em><span data-dcnode-id="1239" instrument_node="">. Bounding maximizes the distance covered in each stride, whereas sprinting maximizes the cadence. Your speed and the gradient of the hill add resistance (due to overcoming the pull of gravity), resulting in the desired strength training effect, and the action itself involves movement patterns specific to running, hiking, and skiing. This workout develops leg strength and power that will come into play during the subsequent muscular endurance phase.</span></p><span data-dcnode-id="1237" instrument_node="">
</span><span data-dcnode-id="1235" instrument_node="">
</span><span data-dcnode-id="1233" instrument_node="">
</span><div class="wp-block-image" data-dcnode-id="1229"><figure class="aligncenter" data-dcnode-id="1230"><a data-dcnode-id="1231" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//uphillathlete.com/strength-training-for-the-mountain-athlete/m-thurk_0995/" rel="attachment wp-att-15317"><img alt="mountain strength" class="wp-image-15317" data-dcnode-id="1232" height="683" loading="lazy" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//uphillathlete.com/wp-content/uploads/2018/12/M.THURK_0995-1024x683.jpg&amp;raw" width="1024"></a></figure></div><span data-dcnode-id="1228" instrument_node="">
</span><span data-dcnode-id="1226" instrument_node="">
</span><span data-dcnode-id="1224" instrument_node="">
</span><p data-dcnode-id="1219"><em data-dcnode-id="1220"><span data-dcnode-id="1223" instrument_node="">Steve House doing a hill sprint workout, another form of specific strength for all mountain athletes. The goal of these is to maximize the speed up the hill. </span><a data-dcnode-id="1221" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.mthurk.com/" rel="noopener noreferrer" target="_blank"><span data-dcnode-id="1222" instrument_node="">M.THURK Photography.</span></a></em></p><span data-dcnode-id="1218" instrument_node="">
</span><span data-dcnode-id="1216" instrument_node="">
</span><span data-dcnode-id="1214" instrument_node="">
</span><p data-dcnode-id="1212"><span data-dcnode-id="1213" instrument_node="">It may strike you as counterintuitive, but speed of movement is directly related to your strength in that movement. In general, the stronger you are the easier it will be for you to overcome the resistance to your movement. For mountain sports, overcoming gravity when going uphill, or resisting it when going down, requires strength. Hill sprints/bounding can form a vital part of your training not just in the Base Period (1–2 times/week) but also throughout the full training cycle. Use them as maintenance workouts—once every 12–14 days—to sustain your leg strength and power.</span></p><span data-dcnode-id="1211" instrument_node="">
</span><span data-dcnode-id="1209" instrument_node="">
</span><span data-dcnode-id="1207" instrument_node="">
</span><blockquote data-dcnode-id="1199"><h5 data-dcnode-id="1204" style="text-align: center;"><strong data-dcnode-id="1205"><span data-dcnode-id="1206" instrument_node="">Hill Sprints/Bounding Workout</span></strong></h5><p data-dcnode-id="1202"><span data-dcnode-id="1203" instrument_node="">Find a steep hill that is at least 15 seconds long at a full sprint. Steeper is better as long as the footing is good. While up to 10 percent grades can work well for road runners, we recommend searching out a hill with at least a 20 percent grade. We have successfully used hills with grades as steep as 50–60 percent, but traction can be an issue. Very steep stairs work perfectly if you can find them. They provide excellent footing, ensuring you derive maximum power from each leg push.</span></p><p data-dcnode-id="1200"><span data-dcnode-id="1201" instrument_node="">Perform a warm-up that ends with two moderately hard 30-second runs up this hill with an easy walk down between. Then do 6–8 reps of 10-second max sprints or bounding up this hill with at least 3 minutes’ full recovery between each 10-second repetition. You can progress this workout by using a steeper hill or by carrying/wearing up to 10 percent of your body weight in a small and tightly worn pack or weight vest as you gain strength. The workout has had its effect when you feel the power drop off; don’t keep doing more reps after that point or you will be training endurance and not power. Stop at the first indication of pain, and use it judiciously.</span></p></blockquote><span data-dcnode-id="1198" instrument_node="">
</span><span data-dcnode-id="1196" instrument_node="">
</span><span data-dcnode-id="1194" instrument_node="">
</span><hr class="wp-block-separator" data-dcnode-id="1193" id="me"><span data-dcnode-id="1192" instrument_node="">
</span><span data-dcnode-id="1190" instrument_node="">
</span><span data-dcnode-id="1188" instrument_node="">
</span><h2 data-dcnode-id="1186"><span data-dcnode-id="1187" instrument_node="">MUSCULAR ENDURANCE FOR MOUNTAIN ATHLETES: THE MOST SPORT-SPECIFIC STRENGTH</span></h2><span data-dcnode-id="1185" instrument_node="">
</span><span data-dcnode-id="1183" instrument_node="">
</span><span data-dcnode-id="1181" instrument_node="">
</span><p data-dcnode-id="1179"><span data-dcnode-id="1180" instrument_node="">Muscular endurance (ME) is the ability of a muscle to produce a relatively high percentage of its maximum force for many repetitions without fatiguing. ME relies on a combination of a muscle’s strength and its endurance. The stronger the muscle, the less strength needed to complete the endurance task. The more endurance trained the muscle is, the more contractions it can sustain before fatiguing.</span></p><span data-dcnode-id="1178" instrument_node="">
</span><span data-dcnode-id="1176" instrument_node="">
</span><span data-dcnode-id="1174" instrument_node="">
</span><p data-dcnode-id="1172"><span data-dcnode-id="1173" instrument_node="">Whether we speak of a rock climber’s ability to climb a difficult (for her) route without getting “pumped” and falling off or the skimo racer’s or mountain runner’s ability to sustain a moderate power output on long climbs without getting dropped, we’re referring to manifestations of ME. This type of strength has a direct impact on performance.</span></p><span data-dcnode-id="1171" instrument_node="">
</span><span data-dcnode-id="1169" instrument_node="">
</span><span data-dcnode-id="1167" instrument_node="">
</span><div class="wp-block-image" data-dcnode-id="1163"><figure class="aligncenter" data-dcnode-id="1164"><a data-dcnode-id="1165" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//uphillathlete.com/wp-content/uploads/2018/12/M.THURK_1187-e1544659691215.jpg"><img alt="mountain strength" class="wp-image-15320" data-dcnode-id="1166" height="300" loading="lazy" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//uphillathlete.com/wp-content/uploads/2018/12/M.THURK_1187-200x300.jpg&amp;raw" width="200"></a></figure></div><span data-dcnode-id="1162" instrument_node="">
</span><span data-dcnode-id="1160" instrument_node="">
</span><span data-dcnode-id="1158" instrument_node="">
</span><p data-dcnode-id="1156"><span data-dcnode-id="1157" style="font-size: 14px;"></span></p><span data-dcnode-id="1155" instrument_node="">
</span><span data-dcnode-id="1153" instrument_node="">
</span><span data-dcnode-id="1151" instrument_node="">
</span><p data-dcnode-id="1148"><em data-dcnode-id="1149"><span data-dcnode-id="1150" instrument_node="">Steve is doing a sport-specific muscular endurance (ME) workout on a Treadwall while wearing a weight vest.</span></em></p><span data-dcnode-id="1147" instrument_node="">
</span><span data-dcnode-id="1145" instrument_node="">
</span><span data-dcnode-id="1143" instrument_node="">
</span><h5 data-dcnode-id="1139"><strong data-dcnode-id="1140"><span data-dcnode-id="1141" style="font-size: 14px;"><span data-dcnode-id="1142" instrument_node="">The definition of what constitutes ME depends on your sport. </span></span></strong></h5><span data-dcnode-id="1138" instrument_node="">
</span><span data-dcnode-id="1136" instrument_node="">
</span><span data-dcnode-id="1134" instrument_node="">
</span><p data-dcnode-id="1131"><span data-dcnode-id="1132" style="font-size: 14px;"><span data-dcnode-id="1133" instrument_node="">In the strength and conditioning world, where strength qualities predominate in determining ME, “endurance” may mean 15 repetitions. At Uphill Athlete, it can mean 15 hours. A weightlifter, sprinter, or boulderer can generate very high forces but can maintain those forces for only very short times. Endurance athletes typically find themselves at the other end of this imaginary physiological spectrum in that they need to produce moderate amounts of muscular force over thousands of repetitions without stopping. The aerobic metabolic qualities of their muscles dominate in determining ME. So even though max strength plays a role in ME, it becomes less of a factor the longer the duration of the event.</span></span></p><span data-dcnode-id="1130" instrument_node="">
</span><span data-dcnode-id="1128" instrument_node="">
</span><span data-dcnode-id="1126" instrument_node="">
</span><h5 data-dcnode-id="1120"><strong data-dcnode-id="1121"><span data-dcnode-id="1125" instrument_node="">It is best to focus on </span><em data-dcnode-id="1123"><span data-dcnode-id="1124" instrument_node="">localized </span></em><span data-dcnode-id="1122" instrument_node="">ME training.</span></strong></h5><span data-dcnode-id="1119" instrument_node="">
</span><span data-dcnode-id="1117" instrument_node="">
</span><span data-dcnode-id="1115" instrument_node="">
</span><p data-dcnode-id="1107"><span data-dcnode-id="1114" instrument_node="">ME is the most trainable of all endurance qualities, so it should not be overlooked. However, many conventional training methods have the athlete getting their ME training effect through high-intensity intervals. This imposes a high global endurance load—combined cardio and muscular—rather than one that is </span><em data-dcnode-id="1112"><span data-dcnode-id="1113" instrument_node="">localized</span></em><span data-dcnode-id="1111" instrument_node=""> in the propulsion muscles. Targeted </span><em data-dcnode-id="1109"><span data-dcnode-id="1110" instrument_node="">local</span></em><span data-dcnode-id="1108" instrument_node=""> muscular endurance training, as described below, can and should be a part of every endurance athlete’s base training. Improve your sport-specific ME, and you will increase the benefits you reap from more traditional endurance training like intervals.</span></p><span data-dcnode-id="1106" instrument_node="">
</span><span data-dcnode-id="1104" instrument_node="">
</span><span data-dcnode-id="1102" instrument_node="">
</span><h5 data-dcnode-id="1099"><strong data-dcnode-id="1100"><span data-dcnode-id="1101" instrument_node="">ME workouts should accompany easy aerobic base training.</span></strong></h5><span data-dcnode-id="1098" instrument_node="">
</span><span data-dcnode-id="1096" instrument_node="">
</span><span data-dcnode-id="1094" instrument_node="">
</span><p data-dcnode-id="1089"><span data-dcnode-id="1093" instrument_node="">It is important to maintain a high volume of easy base aerobic work in tandem with any ME regimen. The excitement of seeing rapid gains when starting an ME cycle can lead folks to overemphasize these “money” workouts at the expense of time spent training easier aerobic paces. DO NOT make this mistake. Due to the duration and heavy muscular loading of these workouts, you must </span><em data-dcnode-id="1091"><span data-dcnode-id="1092" instrument_node="">supplement</span></em><span data-dcnode-id="1090" instrument_node=""> your lower-intensity aerobic volume with this training. If you replace rather than add, the gains will be quick—but they won’t last. You will hit a plateau, and eventually you will see a decline in performance. Only athletes with an extensive background in high-intensity work will be able to fit additional high-intensity training on top of the ME workouts detailed here.</span></p><span data-dcnode-id="1088" instrument_node="">
</span><span data-dcnode-id="1086" instrument_node="">
</span><span data-dcnode-id="1084" instrument_node="">
</span><h3 data-dcnode-id="1081"><strong data-dcnode-id="1082"><span data-dcnode-id="1083" instrument_node="">Muscular Endurance Progression</span></strong></h3><span data-dcnode-id="1080" instrument_node="">
</span><span data-dcnode-id="1078" instrument_node="">
</span><span data-dcnode-id="1076" instrument_node="">
</span><p data-dcnode-id="1074"><span data-dcnode-id="1075" instrument_node="">A typical ME progression will include one workout per week and last about six to eight weeks. We have a had great luck with ME periods of up to 16 weeks. To begin, allow for at least two days of easy recovery workouts after each ME workout as you learn how your body reacts to them. This training block is best used during the early Base Period for runners and skiers and in the late Base/Specific Period for mountaineers and alpinists.</span></p><span data-dcnode-id="1073" instrument_node="">
</span><span data-dcnode-id="1071" instrument_node="">
</span><span data-dcnode-id="1069" instrument_node="">
</span><p data-dcnode-id="1067"><span data-dcnode-id="1068" instrument_node="">For many endurance athletes, ME training will be the predominant form of strength training in their programs. There is plenty of evidence to support this approach as the best way to improve endurance performance in the short term. Even athletes with general strength deficiencies will see gains using these methods. However, we hope that our “big picture” arguments have been persuasive in convincing you of the need for an adequate base of general strength.</span></p><span data-dcnode-id="1066" instrument_node="">
</span><span data-dcnode-id="1064" instrument_node="">
</span><span data-dcnode-id="1062" instrument_node="">
</span><p data-dcnode-id="1060"><span data-dcnode-id="1061" instrument_node="">For mountain endurance athletes, ME workouts typically mimic the movement of the sport very closely but with added resistance. This added resistance can come in the form of steeper rock climbs, steeper hill grades, or additional weight.</span></p><span data-dcnode-id="1059" instrument_node="">
</span><span data-dcnode-id="1057" instrument_node="">
</span><span data-dcnode-id="1055" instrument_node="">
</span><div class="wp-block-image" data-dcnode-id="1051"><figure class="aligncenter" data-dcnode-id="1052"><a data-dcnode-id="1053" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//uphillathlete.com/m-thurk_1052/"><img alt="mountain strength" class="wp-image-15316" data-dcnode-id="1054" height="683" loading="lazy" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//uphillathlete.com/wp-content/uploads/2018/12/M.THURK_1052-1024x683.jpg&amp;raw" width="1024"></a></figure></div><span data-dcnode-id="1050" instrument_node="">
</span><span data-dcnode-id="1048" instrument_node="">
</span><span data-dcnode-id="1046" instrument_node="">
</span><p data-dcnode-id="1041"><em data-dcnode-id="1042"><span data-dcnode-id="1045" instrument_node="">Steve House wears a weight vest while doing a muscular endurance hill climb workout on steep, off-trail terrain. Grades of over 20 percent are the most useful for these workouts. </span><a data-dcnode-id="1043" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.mthurk.com/" rel="noopener noreferrer" target="_blank"><span data-dcnode-id="1044" instrument_node="">M.THURK Photography.</span></a></em></p><span data-dcnode-id="1040" instrument_node="">
</span><span data-dcnode-id="1038" instrument_node="">
</span><span data-dcnode-id="1036" instrument_node="">
</span><blockquote data-dcnode-id="1008"><h5 data-dcnode-id="1033" style="text-align: center;"><strong data-dcnode-id="1034"><span data-dcnode-id="1035" instrument_node="">Muscular Endurance Workout for Mountaineers and Alpinists: </span></strong></h5><h5 data-dcnode-id="1030" style="text-align: center;"><strong data-dcnode-id="1031"><span data-dcnode-id="1032" instrument_node="">Uphill Weighted Carry</span></strong></h5><p data-dcnode-id="1025"><span data-dcnode-id="1029" instrument_node="">Mountaineering and alpinism often involve carrying a heavy pack steeply uphill for thousands of feet. A workout we have prescribed over many years for many athletes—a tried-and-true Uphill Athlete staple—is the </span><a data-dcnode-id="1027" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//uphillathlete.com/vertical-beast-mode-what-is-muscular-endurance-why-it-is-important-for-any-alpinist-or-mountaineer-and-how-do-you-train-it"><span data-dcnode-id="1028" instrument_node="">uphill weighted carry</span></a><span data-dcnode-id="1026" instrument_node="">. The premise is straightforward: Load a pack with water jugs or rocks or use a weight vest. Find a steep hill. Hike up it. For the mountaineer or alpinist, this “intensity” workout would fall in the final preparation phase leading into the goal climb or climbing season. It can also serve as base training to build less sport-specific ME for the mountain runner or ski mountaineer who, after six to eight weeks, would progress to more sport-specific interval training.</span></p><p data-dcnode-id="1023"><span data-dcnode-id="1024" instrument_node="">When doing these workouts, you want the limitation to come from your muscles, not your lungs. A great gauge we use is that you should be able to carry on a conversation while your legs are burning. The effort should feel sustainable but just barely so, and if you went any harder your legs would give out in a few seconds. Finding this sweet spot of intensity requires that you adjust the steepness of the hill and the weight on your back.</span></p><h5 data-dcnode-id="1020" style="text-align: center;"><strong data-dcnode-id="1021"><span data-dcnode-id="1022" instrument_node="">The Weight</span></strong></h5><p data-dcnode-id="1018"><span data-dcnode-id="1019" instrument_node="">At Uphill Athlete we typically start folks about 10 percent of body weight (BW), if they have no experience with this type of training and are relatively new to hard aerobic work. Many strong mountaineers feel comfortable with a 30 percent BW load. The final goal for this training progression should be a load greater than the weight you’ll carry on the climb. Unless you want the additional strength and stability challenge of carrying a heavy load downhill, we recommend you dump your water before descending to save your knees the extra beating.</span></p><h5 data-dcnode-id="1015" style="text-align: center;"><strong data-dcnode-id="1016"><span data-dcnode-id="1017" instrument_node="">The Hill</span></strong></h5><p data-dcnode-id="1011"><span data-dcnode-id="1014" instrument_node="">Your chosen hill should be fairly steep. We have had good success on slopes with grades that range from 30 to 60 percent (17 to 31 degrees). A 50 percent slope is one on which you can just barely reach out to stabilize yourself with your hands while bending forward only slightly at the waist. Ski poles or hiking poles can be helpful for balance. The length of your hill may require many laps or one long push to the top. If you don’t have a hill, find a tall building. As we like to say, the most common barriers to training are motivation and imagination.</span><strong data-dcnode-id="1012"><span data-dcnode-id="1013" instrument_node="">&nbsp;</span></strong></p><p data-dcnode-id="1009"><span data-dcnode-id="1010" instrument_node="">It is important to implement this training in a structured, progressive manner. Ideally you’ll do 6–10 of these workouts over the course of a couple of months, and the training stimulus needs to increase gradually as you adapt to the new loads. We like to progress either the weight or the volume (total vertical) in a stairstep fashion, not both at the same time. Ideally, the final workouts will encompass more vertical and more weight than you will cover and carry on the biggest day of your upcoming climb.</span></p></blockquote><span data-dcnode-id="1007" instrument_node="">
</span><span data-dcnode-id="1005" instrument_node="">
</span><span data-dcnode-id="1003" instrument_node="">
</span><div class="wp-block-image" data-dcnode-id="999"><figure class="aligncenter" data-dcnode-id="1000"><a data-dcnode-id="1001" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//uphillathlete.com/strength-training-for-the-mountain-athlete/m-thurk_0858/" rel="attachment wp-att-15307"><img alt="mountain strength" class="wp-image-15307" data-dcnode-id="1002" height="683" loading="lazy" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//uphillathlete.com/wp-content/uploads/2018/12/M.THURK_0858-1024x683.jpg&amp;raw" width="1024"></a></figure></div><span data-dcnode-id="998" instrument_node="">
</span><span data-dcnode-id="996" instrument_node="">
</span><span data-dcnode-id="994" instrument_node="">
</span><blockquote data-dcnode-id="967"><h5 data-dcnode-id="991" style="text-align: center;"><strong data-dcnode-id="992"><span data-dcnode-id="993" instrument_node="">Gym-Based Muscular Endurance Workout for Runners and Skiers</span></strong></h5><p data-dcnode-id="989"><span data-dcnode-id="990" instrument_node="">The following gym-based ME program is ideal for runners, skiers, alpinists, and any other mountain athletes who need to prime themselves for steep uphill travel. It is especially well suited to those who lack easy access to steep hills. Whether you are an elite-level athlete or a back-of-the-pack racer, you are guaranteed to see gains from this workout. It is another Uphill Athlete staple.</span></p><p data-dcnode-id="987"><span data-dcnode-id="988" instrument_node="">What we outline here is the beginning workout. Unless you have extensive experience with these exercises, use body weight (BW) only for the first two to three workouts to learn the movements and avoid severe muscle soreness. The progression shown is a suggestion that should work well for most people. However, variations in individual starting strength will mean that some people will progress faster than others. Expect to be mildly stiff and sore for two days after each workout, so allow for two to three days of easy recovery workouts. Most people will not need to do this routine more than once per week to see significant gains. Because it is easy to overdo ME work, start slowly and progress at your own rate.</span></p><h5 data-dcnode-id="984" style="text-align: center;"><strong data-dcnode-id="985"><span data-dcnode-id="986" instrument_node="">Warm-up</span></strong></h5><p data-dcnode-id="970" style="text-align: center;"><a data-dcnode-id="982" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.youtube.com/watch%3Fv%3Dlbozu0DPcYI%26t%3D4s"><span data-dcnode-id="983" instrument_node="">5-minute dynamic stretch routine</span></a><br data-dcnode-id="981"><span data-dcnode-id="980" instrument_node="">20x air squats</span><br data-dcnode-id="979"><span data-dcnode-id="978" instrument_node="">10x Turkish Get Ups</span><br data-dcnode-id="977"><span data-dcnode-id="976" instrument_node="">10x burpees</span><br data-dcnode-id="975"><span data-dcnode-id="974" instrument_node="">Core: Pick 4–5 of your most challenging core exercises. You can </span><a data-dcnode-id="972" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//uphillathlete.com/how-to-do-core/"><span data-dcnode-id="973" instrument_node="">select from this group</span></a><span data-dcnode-id="971" instrument_node="">, or incorporate some others that you like. Do 2 sets and add enough resistance that 4–6 reps of each exercise is all you can manage.</span></p><p data-dcnode-id="968" style="text-align: center;"><span data-dcnode-id="969" instrument_node="">Air Squat</span></p></blockquote><span data-dcnode-id="966" instrument_node="">
</span><span data-dcnode-id="964" instrument_node="">
</span><span data-dcnode-id="962" instrument_node="">
</span><div class="wp-block-image" data-dcnode-id="955"><figure class="aligncenter" data-dcnode-id="956"><a data-dcnode-id="960" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//uphillathlete.com/"><img alt="" class="wp-image-15294" data-dcnode-id="961" height="300" loading="lazy" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//uphillathlete.com/wp-content/uploads/2018/12/M.THURK_0827-200x300.jpg&amp;raw" width="200"></a><figcaption data-dcnode-id="957"><em data-dcnode-id="958"><span data-dcnode-id="959" instrument_node="">Lower as deep as you can, arms forward, eyes ahead.</span></em></figcaption></figure></div><span data-dcnode-id="954" instrument_node="">
</span><span data-dcnode-id="952" instrument_node="">
</span><span data-dcnode-id="950" instrument_node="">
</span><h5 data-dcnode-id="947"><strong data-dcnode-id="948"><span data-dcnode-id="949" instrument_node="">Workout</span></strong></h5><span data-dcnode-id="946" instrument_node="">
</span><span data-dcnode-id="944" instrument_node="">
</span><span data-dcnode-id="942" instrument_node="">
</span><p class="has-text-align-left" data-dcnode-id="940"><span data-dcnode-id="941" instrument_node="">Complete all sets of each exercise before moving on to the next exercise. Do not speed through these. Use a tempo of 1 rep every 1–2 seconds. Rest about 60 seconds after each set of an exercise. On the box step-ups and front lunges, do all your right leg repetitions and then all your left leg repetitions, and rest only 30 seconds between sets. Go through the full circuit once.</span></p><span data-dcnode-id="939" instrument_node="">
</span><span data-dcnode-id="937" instrument_node="">
</span><span data-dcnode-id="935" instrument_node="">
</span><p class="has-text-align-center" data-dcnode-id="933"><span data-dcnode-id="934" instrument_node="">Split Jump Squat</span></p><span data-dcnode-id="932" instrument_node="">
</span><span data-dcnode-id="930" instrument_node="">
</span><span data-dcnode-id="928" instrument_node="">
</span><div class="wp-block-image" data-dcnode-id="924"><figure class="alignright" data-dcnode-id="925"><a data-dcnode-id="926" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//uphillathlete.com/"><img alt="mountain strength" class="wp-image-15307" data-dcnode-id="927" height="200" loading="lazy" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//uphillathlete.com/wp-content/uploads/2018/12/M.THURK_0858-300x200.jpg&amp;raw" width="300"></a></figure></div><span data-dcnode-id="923" instrument_node="">

</span><p class="has-text-align-center" data-dcnode-id="907"><em data-dcnode-id="908"><span data-dcnode-id="909" instrument_node="">Execute the split jump squat with an athletic, forward posture, as if you’re sprinting.</span></em></p><span data-dcnode-id="906" instrument_node="">
</span><span data-dcnode-id="904" instrument_node="">
</span><span data-dcnode-id="902" instrument_node="">
</span><ol data-dcnode-id="866"><li data-dcnode-id="897"><span data-dcnode-id="901" instrument_node="">Do 4 sets of 10 reps on each leg of the </span><strong data-dcnode-id="899"><span data-dcnode-id="900" instrument_node="">split jump squat</span></strong><span data-dcnode-id="898" instrument_node="">. If unsure, start with a short split stance of 30 centimeters. Work to deepen your split as you gain strength.</span></li><li data-dcnode-id="895"><span data-dcnode-id="896" instrument_node="">Rest 2 minutes.</span></li><li data-dcnode-id="890"><span data-dcnode-id="894" instrument_node="">Do 4 sets of 10 reps of </span><strong data-dcnode-id="892"><span data-dcnode-id="893" instrument_node="">squat jumps</span></strong><span data-dcnode-id="891" instrument_node="">.</span></li><li data-dcnode-id="888"><span data-dcnode-id="889" instrument_node="">Rest 2 minutes.</span></li><li data-dcnode-id="880"><span data-dcnode-id="887" instrument_node="">Do 4 sets of 10 reps on each leg of </span><strong data-dcnode-id="885"><span data-dcnode-id="886" instrument_node="">box step-ups</span></strong><span data-dcnode-id="884" instrument_node=""> with minimal rear leg assist. Use a box/step that is 75 percent of the height of the bottom of your kneecap. </span><a data-dcnode-id="882" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.youtube.com/watch%3Fv%3Dl4AA5d5mInQ"><span data-dcnode-id="883" instrument_node="">Watch this video tutorial</span></a><span data-dcnode-id="881" instrument_node="">.</span></li><li data-dcnode-id="878"><span data-dcnode-id="879" instrument_node="">Rest 2 minutes.</span></li><li data-dcnode-id="867"><span data-dcnode-id="877" instrument_node="">Do 4 sets of 10 reps on each leg of </span><strong data-dcnode-id="875"><span data-dcnode-id="876" instrument_node="">front lunges</span></strong><span data-dcnode-id="874" instrument_node="">. If new to the lunge, </span><a data-dcnode-id="872" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.youtube.com/watch%3Fv%3DQOVaHwm-Q6U"><span data-dcnode-id="873" instrument_node="">start with this Simple Standing Lunge for your first 2–3 workouts</span></a><span data-dcnode-id="871" instrument_node="">. Once you are comfortable with that, you can progress to </span><a data-dcnode-id="869" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.youtube.com/watch%3Fv%3D7WH2-z99e1A"><span data-dcnode-id="870" instrument_node="">this stepping front lunge</span></a><span data-dcnode-id="868" instrument_node="">.</span></li></ol><span data-dcnode-id="865" instrument_node="">
</span><span data-dcnode-id="863" instrument_node="">
</span><span data-dcnode-id="861" instrument_node="">

</span><span data-dcnode-id="855" instrument_node="">
</span><span data-dcnode-id="853" instrument_node="">
</span><p class="has-text-align-center" data-dcnode-id="851"><span data-dcnode-id="852" instrument_node="">10 minutes of easy aerobic exercise</span></p><span data-dcnode-id="850" instrument_node="">

</span><h5 data-dcnode-id="782"><strong data-dcnode-id="783"><span data-dcnode-id="784" instrument_node="">Progression</span></strong></h5><span data-dcnode-id="781" instrument_node="">
</span><span data-dcnode-id="779" instrument_node="">
</span><span data-dcnode-id="777" instrument_node="">
</span><ul data-dcnode-id="742"><li data-dcnode-id="775"><span data-dcnode-id="776" instrument_node="">WOs #1 and #2: Use BW only. Do 4 sets of 10 reps of each exercise.</span></li><li data-dcnode-id="773"><span data-dcnode-id="774" instrument_node="">WO #3: Increase to 5 sets of 10 reps of each exercise.</span></li><li data-dcnode-id="771"><span data-dcnode-id="772" instrument_node="">WO #4: May add weight, ideally using a weight vest. Start with no more than 10 percent BW. If you haven’t already, increase to 5 sets of 10 reps. Also add the following new exercises:</span></li><li data-dcnode-id="765"><span data-dcnode-id="770" instrument_node="">Do 5 sets of 10 reps of </span><a data-dcnode-id="767" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.youtube.com/watch%3Fv%3DlKgmJM8wW7g"><strong data-dcnode-id="768"><span data-dcnode-id="769" instrument_node="">goblet squat/overhead press</span></strong></a><span data-dcnode-id="766" instrument_node="">.</span></li><li data-dcnode-id="763"><span data-dcnode-id="764" instrument_node="">Rest 2 minutes after the last set.</span></li><li data-dcnode-id="757"><span data-dcnode-id="762" instrument_node="">Do 5 sets of 10 reps of </span><a data-dcnode-id="759" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.youtube.com/watch%3Fv%3DAoxOikJ4HDI"><strong data-dcnode-id="760"><span data-dcnode-id="761" instrument_node="">two-hand kettlebell swing</span></strong></a><span data-dcnode-id="758" instrument_node="">.</span></li><li data-dcnode-id="755"><span data-dcnode-id="756" instrument_node="">Rest 2 minutes after the last set.</span></li><li data-dcnode-id="753"><span data-dcnode-id="754" instrument_node="">WO #5: Add 10 percent BW. Increase to 6 sets of 10 reps. Cut your rest to 45 seconds per set. Continue to rest for 30 seconds for box step-ups and front lunges.</span></li><li data-dcnode-id="751"><span data-dcnode-id="752" instrument_node="">WO #6: Add 10 percent BW. Increase to 7 sets of 10 reps.</span></li><li data-dcnode-id="749"><span data-dcnode-id="750" instrument_node="">WO #7: Add 15 percent BW. Do 7 sets of 10 reps.</span></li><li data-dcnode-id="747"><span data-dcnode-id="748" instrument_node="">WO #8: Add 15 percent BW. Do 7 sets of 10 reps. Cut rest between sets to 30 seconds for all exercises.</span></li><li data-dcnode-id="745"><span data-dcnode-id="746" instrument_node="">WO #9: Add 20 percent BW. Do 7 sets of 10 reps. Rest 45 seconds per set, with 30 seconds for box step-ups and front lunges.</span></li><li data-dcnode-id="743"><span data-dcnode-id="744" instrument_node="">WO #10: Add 20 percent BW. Increase to 8 sets of 10 reps. Rest 45 seconds per set, with 30 seconds for box step-ups and front lunges.</span></li></ul><span data-dcnode-id="741" instrument_node="">
</span><span data-dcnode-id="739" instrument_node="">
</span><span data-dcnode-id="737" instrument_node="">

</span><div class="wp-block-image wp-image-15309 size-medium" data-dcnode-id="724"><figure class="alignleft" data-dcnode-id="725"><img alt="mountain strength" class="wp-image-15309" data-dcnode-id="729" height="300" loading="lazy" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//uphillathlete.com/wp-content/uploads/2018/12/M.THURK_0881-200x300.jpg&amp;raw" width="200"><figcaption data-dcnode-id="726"><em data-dcnode-id="727"><span data-dcnode-id="728" instrument_node="">Goblet squat using a kettle bell.</span></em></figcaption></figure></div><span data-dcnode-id="723" instrument_node="">

</span><span data-dcnode-id="703" instrument_node="">
</span><span data-dcnode-id="701" instrument_node="">
</span><div class="wp-block-image" data-dcnode-id="697"><figure class="aligncenter" data-dcnode-id="698"><a data-dcnode-id="699" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//uphillathlete.com/strength-training-for-the-mountain-athlete/m-thurk_0927/" rel="attachment wp-att-15332"><img alt="mountain strength" class="wp-image-15332" data-dcnode-id="700" height="200" loading="lazy" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//uphillathlete.com/wp-content/uploads/2018/12/M.THURK_0927-300x200.jpg&amp;raw" width="300"></a></figure></div><span data-dcnode-id="696" instrument_node="">
