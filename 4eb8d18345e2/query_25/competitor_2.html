</span><h3 data-dcnode-id="690"><span data-dcnode-id="691" instrument_node="">&nbsp;</span></h3><span data-dcnode-id="689" instrument_node="">
</span><span data-dcnode-id="687" instrument_node="">
</span><span data-dcnode-id="685" instrument_node="">
</span><hr class="wp-block-separator" data-dcnode-id="684" id="planning"><span data-dcnode-id="683" instrument_node="">
</span><span data-dcnode-id="681" instrument_node="">
</span><span data-dcnode-id="679" instrument_node="">
</span><h2 data-dcnode-id="677"><span data-dcnode-id="678" instrument_node="">PLANNING STRENGTH CYCLES</span></h2><span data-dcnode-id="676" instrument_node="">
</span><span data-dcnode-id="674" instrument_node="">
</span><span data-dcnode-id="672" instrument_node="">
</span><p data-dcnode-id="670"><span data-dcnode-id="671" instrument_node="">Determining the order, relative importance, and magnitude of your strength training cycles will present a number of challenges. As with all forms of training, there is no one recipe that will work for everyone. It’s almost easier to tell you what NOT to do than what TO do. Let’s start with an example of a common mistake.</span></p><span data-dcnode-id="669" instrument_node="">
</span><span data-dcnode-id="667" instrument_node="">
</span><span data-dcnode-id="665" instrument_node="">
</span><p data-dcnode-id="663"><span data-dcnode-id="664" instrument_node="">Have you ever been to a climbing gym or crag and seen the best climbers working on routes right at their limits? If you knew nothing about training theory, you might suspect that the secret to success for you—presumably a climber looking to improve—would be to follow that lead, get on something hard, and flail away until you have to be lowered to the ground with forearms that are quivering masses of jello. However, if you have some knowledge of training theory (which we hope you have gleaned from our book and this website), you will recognize these “climb to failure” workouts as a form of sport-specific ME training that occupy a critical place in the overall plan but can easily be overused by the uninformed.</span></p><span data-dcnode-id="662" instrument_node="">
</span><span data-dcnode-id="660" instrument_node="">
</span><span data-dcnode-id="658" instrument_node="">
</span><p data-dcnode-id="656"><span data-dcnode-id="657" instrument_node="">Don’t make this classic mistake of overusing a very powerful training stimulus.</span></p><span data-dcnode-id="655" instrument_node="">
</span><span data-dcnode-id="653" instrument_node="">
</span><span data-dcnode-id="651" instrument_node="">
</span><p data-dcnode-id="649"><span data-dcnode-id="650" instrument_node="">It is not a stretch to say that this inability to recognize and contextualize different types of strength training is what keeps people doing bench presses or heavy squats when what they want to do is run or climb uphill faster. We see this kind of mistake on a daily basis and it’s why we devote so much electronic ink to the theory of training.</span></p><span data-dcnode-id="648" instrument_node="">
</span><span data-dcnode-id="646" instrument_node="">
</span><span data-dcnode-id="644" instrument_node="">
</span><blockquote data-dcnode-id="611"><h3 data-dcnode-id="641"><strong data-dcnode-id="642"><span data-dcnode-id="643" instrument_node="">Strength Training Guidelines</span></strong></h3><p data-dcnode-id="639"><span data-dcnode-id="640" instrument_node="">Here are some general guidelines for helping you structure an effective strength training program. To a significant extent, the best outcome for you will be determined by trial and error—while keeping these guidelines in mind.</span></p><h5 data-dcnode-id="636"><strong data-dcnode-id="637"><span data-dcnode-id="638" instrument_node="">Pick a single goal.</span></strong></h5><p data-dcnode-id="634"><span data-dcnode-id="635" instrument_node="">This is especially important if you are new to training and strength training in particular. It can be tempting to think that you can do it all: climb 5.13 and break 20 hours in the Leadville 100-mile race. If you’re new to this stuff, focus first on a single sport in order to learn how to manage the training. Once you’ve mastered the training for one sport, you’ll be much better equipped to branch out to others.</span></p><h5 data-dcnode-id="631"><strong data-dcnode-id="632"><span data-dcnode-id="633" instrument_node="">Give yourself enough time. </span></strong></h5><p data-dcnode-id="629"><span data-dcnode-id="630" instrument_node="">Unless you are an accomplished athlete with a good base of strength, don’t expect to cram an effective general-to-specific strength program into four weeks. Even if that’s all you have between summer rock climbing season and winter ski touring season.</span></p><h5 data-dcnode-id="626"><strong data-dcnode-id="627"><span data-dcnode-id="628" instrument_node="">Critically evaluate your personal general strength weaknesses.</span></strong></h5><p data-dcnode-id="624"><span data-dcnode-id="625" instrument_node="">If your knee caves in 4 inches toward your center line when you step up (unweighted) onto a 12-inch box, you probably need to delay the introduction of hill sprints into your program until you develop sufficient hip stability.</span></p><p data-dcnode-id="622"><span data-dcnode-id="623" instrument_node="">This holds true even if you are doing more sport-specific strength; apply the same critique to those methods.</span></p><h5 data-dcnode-id="619"><strong data-dcnode-id="620"><span data-dcnode-id="621" instrument_node="">An effective general strength program should be a minimum of four weeks.</span></strong></h5><p data-dcnode-id="617"><span data-dcnode-id="618" instrument_node="">And for the beginner or young person, a general strength program can easily extend to 12 weeks. This program would include two workouts per week focused on several basic multi-joint movements in the hips and shoulders. The prescription for general strength starts with activation and recruitment in the proper movement patterns. This means good ranges of motion and proper form as defined above. High repetitions with low loads is the most effective way to engrain these neuromuscular patterns. Only when they are perfected should you begin to add resistance. As you gain strength with proper form, you can increase the resistance and reduce the repetitions.</span></p><h5 data-dcnode-id="614"><strong data-dcnode-id="615"><span data-dcnode-id="616" instrument_node="">When you begin a more sport-specific program, be very selective with the exercises you choose. </span></strong></h5><p data-dcnode-id="612"><span data-dcnode-id="613" instrument_node="">Pick those that model the demands of your sport. For foot-powered mountain sports like skiing, running, and mountaineering/alpinism, you can’t go wrong starting with hill sprints or bounding drills (for strength) and then progressing to weighted steep uphill hikes (for muscular endurance).</span></p></blockquote><span data-dcnode-id="610" instrument_node="">
</span><span data-dcnode-id="608" instrument_node="">
</span><span data-dcnode-id="606" instrument_node="">
</span><h3 data-dcnode-id="604"><span data-dcnode-id="605" instrument_node="">&nbsp;</span></h3><span data-dcnode-id="603" instrument_node="">
</span><span data-dcnode-id="601" instrument_node="">
</span><span data-dcnode-id="599" instrument_node="">
</span><hr class="wp-block-separator" data-dcnode-id="598" id="rock-strength-training"><span data-dcnode-id="597" instrument_node="">
</span><span data-dcnode-id="595" instrument_node="">
</span><span data-dcnode-id="593" instrument_node="">
</span><h2 data-dcnode-id="591"><span data-dcnode-id="592" instrument_node="">STRENGTH TRAINING FOR ROCK AND ICE CLIMBING</span></h2><span data-dcnode-id="590" instrument_node="">
</span><span data-dcnode-id="588" instrument_node="">
</span><span data-dcnode-id="586" instrument_node="">
</span><p data-dcnode-id="584"><span data-dcnode-id="585" instrument_node="">Strength training for rock and ice climbing should follow a similar progression from general to specific, though with a greater emphasis on upper-body exercises. While base training for climbing involves doing a large volume of easier pitches, it is not enough to merely get out and climb a bunch. If you want to see gains in finger strength, dynamic power, and endurance, you have to train those aspects of your climbing specifically.</span></p><span data-dcnode-id="583" instrument_node="">
</span><span data-dcnode-id="581" instrument_node="">
</span><span data-dcnode-id="579" instrument_node="">
</span><p data-dcnode-id="571"><span data-dcnode-id="578" instrument_node="">To determine what you need to work on, </span><a data-dcnode-id="576" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//uphillathlete.com/skill-vs-strength-rock-climbing/"><span data-dcnode-id="577" instrument_node="">assess your weaknesses</span></a><span data-dcnode-id="575" instrument_node="">. Are your climbing skills—footwork, route-reading ability, balance—holding you back from your goals? Or are your skills solid and you lack power and grip strength? Don’t be surprised if you’re deficient in certain skills and certain elements of strength. No matter your weak points, isolate your physical training and your </span><a data-dcnode-id="573" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//uphillathlete.com/article-two-skill-training-for-rock-climbing/"><span data-dcnode-id="574" instrument_node="">technique training</span></a><span data-dcnode-id="572" instrument_node=""> so as to give individual, focused attention to each. By doing this, not only will you be better able to monitor and measure your progress, you’ll also make progress more quickly.</span></p><span data-dcnode-id="570" instrument_node="">
</span><span data-dcnode-id="568" instrument_node="">
