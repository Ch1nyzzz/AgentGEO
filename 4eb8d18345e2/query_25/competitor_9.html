</span><h4 data-dcnode-id="1512"><span data-dcnode-id="1513" instrument_node="">Effect of vital capacity</span></h4><span data-dcnode-id="1511" instrument_node="">
</span><p class="mb0" data-dcnode-id="1500"><span data-dcnode-id="1510" instrument_node="">Mean (SD) VC was 7.9 (0.36) L in the three top-scorers and 6.7 (0.19; </span><i data-dcnode-id="1508"><span data-dcnode-id="1509" instrument_node="">P</span></i><span data-dcnode-id="1507" instrument_node=""> &lt; 0.01) in the three lowest-scoring divers (Figure </span><a data-dcnode-id="1505" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//s7.addthis.com/static/sh.f48a1a04fe8dbf021b4cda1d.html%23F2"><span data-dcnode-id="1506" instrument_node="">2</span></a><span data-dcnode-id="1504" instrument_node="">). The mean VC in the three best divers was thus more than 1 L greater than in the three lowest-scoring divers, equivalent to approximately 200 mL of extra O</span><sub data-dcnode-id="1502"><span data-dcnode-id="1503" instrument_node="">2</span></sub><span data-dcnode-id="1501" instrument_node=""> storage, allowing for an extension of apneic duration by approximately 1 min.</span></p><span data-dcnode-id="1499" instrument_node="">
</span><a class="reset-hash-position" data-dcnode-id="1498" id="h5"></a><h2 data-dcnode-id="1496"><span data-dcnode-id="1497" instrument_node="">Discussion</span></h2><span data-dcnode-id="1495" instrument_node="">
</span><p class="mb0" data-dcnode-id="1493"><span data-dcnode-id="1494" instrument_node="">A significant correlation was found between accumulated competition score and both spleen volume and lung volume, despite the relatively small number of subjects investigated in this study, suggesting that both these factors may predict competitive apneic performance. There was a large span of individual variation in spleen- and lung volume among divers, showing that specific values of such traits are not necessarily prerequisite for participation at the elite level. However, from the group correlation analysis it is clear that both these factors were associated with the production of top results. This is a novel finding, which may be useful in predicting performance in apneic divers. An interesting question arising from these findings is whether apnea-specific training can increase spleen and lung size, or if successful divers self-recruit to the sport by virtue of this physiological predisposition.</span></p><span data-dcnode-id="1492" instrument_node="">
</span><h3 data-dcnode-id="1490"><span data-dcnode-id="1491" instrument_node="">Spleen Volume</span></h3><span data-dcnode-id="1489" instrument_node="">
</span><p class="mb15" data-dcnode-id="1472"><span data-dcnode-id="1488" instrument_node="">Previously reported spleen volumes in the general population vary greatly, and the average in 140 healthy Caucasians of both genders was found to be 215 mL, spanning from 107 to 342 mL (</span><a data-dcnode-id="1486" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//s7.addthis.com/static/sh.f48a1a04fe8dbf021b4cda1d.html%23B29"><span data-dcnode-id="1487" instrument_node="">Prassopoulos et al., 1997</span></a><span data-dcnode-id="1485" instrument_node="">). These values appear to be lower than the mean of 336 mL observed in our study’s elite apneists. The span 215–598 mL in our studied divers starts with the normal value reported by </span><a data-dcnode-id="1483" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//s7.addthis.com/static/sh.f48a1a04fe8dbf021b4cda1d.html%23B29"><span data-dcnode-id="1484" instrument_node="">Prassopoulos et al. (1997)</span></a><span data-dcnode-id="1482" instrument_node="">. In accordance with that study, we found no correlation between subject height or weight and spleen volume, and they also did not find any difference between genders or age groups. Geraghty and associates reported a mean value of 238 mL in 47 mid-aged males, spanning 76–400 mL, but a volume of only 180 mL in females (</span><a data-dcnode-id="1480" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//s7.addthis.com/static/sh.f48a1a04fe8dbf021b4cda1d.html%23B19"><span data-dcnode-id="1481" instrument_node="">Geraghty et al., 2004</span></a><span data-dcnode-id="1479" instrument_node="">). They had corrected values for height and weight using a standardized body size. When standardized for height and weight, our divers’ mean spleen volume was in the 90th percentile of Geraghty and associates’ observed range and the values of our three best divers more than 100 mL above their recorded maximum. Our lowest-scoring divers were in the 60th percentile, thus near the median presented by Geraghty and associates. It cannot be ruled out that differences in methods between the studies cited above and the present study could yield different results. However, in a study on 10 non-divers of both genders, using the same method for spleen measurements as in the present study but with subjects in a prone position, we found a mean spleen volume of 275 mL, with a range of 185–391 mL (</span><a data-dcnode-id="1477" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//s7.addthis.com/static/sh.f48a1a04fe8dbf021b4cda1d.html%23B42"><span data-dcnode-id="1478" instrument_node="">Schagatay et al., 2005</span></a><span data-dcnode-id="1476" instrument_node="">). This is similar to the other values reported for non-divers, but clearly less than the 336 mL found in the elite divers in the present study. </span><a data-dcnode-id="1474" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//s7.addthis.com/static/sh.f48a1a04fe8dbf021b4cda1d.html%23B7"><span data-dcnode-id="1475" instrument_node="">Bakovic et al. (2003)</span></a><span data-dcnode-id="1473" instrument_node=""> reported a mean spleen volume in 10 elite divers of 344 mL, which corresponds well to the divers in the present study, but spleen volume in their control group was only slightly smaller.</span></p><span data-dcnode-id="1471" instrument_node="">
</span><p class="mb15" data-dcnode-id="1457"><span data-dcnode-id="1470" instrument_node="">This is the first report of competitive apneists’ spleen volumes in relation to their performance. The finding supports a previous indication that trained apneists may have larger spleens or more pronounced spleen contraction, or possibly a higher spleen hematocrit than non-divers; a greater elevation of Hb was observed after three maximal apneas in trained apneic divers compared to both non-diving athletes and sedentary non-divers (</span><a data-dcnode-id="1468" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//s7.addthis.com/static/sh.f48a1a04fe8dbf021b4cda1d.html%23B32"><span data-dcnode-id="1469" instrument_node="">Richardson et al., 2005</span></a><span data-dcnode-id="1467" instrument_node="">). Studies by </span><a data-dcnode-id="1465" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//s7.addthis.com/static/sh.f48a1a04fe8dbf021b4cda1d.html%23B21"><span data-dcnode-id="1466" instrument_node="">Hurford et al. (1990)</span></a><span data-dcnode-id="1464" instrument_node="">, </span><a data-dcnode-id="1462" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//s7.addthis.com/static/sh.f48a1a04fe8dbf021b4cda1d.html%23B7"><span data-dcnode-id="1463" instrument_node="">Bakovic et al. (2003)</span></a><span data-dcnode-id="1461" instrument_node=""> and </span><a data-dcnode-id="1459" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//s7.addthis.com/static/sh.f48a1a04fe8dbf021b4cda1d.html%23B30"><span data-dcnode-id="1460" instrument_node="">Prommer et al. (2007)</span></a><span data-dcnode-id="1458" instrument_node=""> also suggest that spleen contraction could be at least somewhat augmented in apneic divers. However, in previous studies the apneas performed by the divers have been longer than for non-divers, which could possibly account for their more powerful spleen contraction.</span></p><span data-dcnode-id="1456" instrument_node="">
</span><p class="mb0" data-dcnode-id="1442"><span data-dcnode-id="1455" instrument_node="">Seal species performing deep and long during dives appear to have larger spleens that average suggesting that benefits of such traits are present in diving mammals (</span><a data-dcnode-id="1453" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//s7.addthis.com/static/sh.f48a1a04fe8dbf021b4cda1d.html%23B31"><span data-dcnode-id="1454" instrument_node="">Qvist et al., 1986</span></a><span data-dcnode-id="1452" instrument_node="">). It is not known if training can increase mammalian spleen volume, but the spleen appears to have a high regenerative ability. After the experimental removal of 2/3 of the spleen, the remaining tissue showed compensatory growth in baboons (</span><a data-dcnode-id="1450" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//s7.addthis.com/static/sh.f48a1a04fe8dbf021b4cda1d.html%23B46"><span data-dcnode-id="1451" instrument_node="">van Rensburg et al., 1991</span></a><span data-dcnode-id="1449" instrument_node="">). In humans, growth of a small, accessory spleen after removal of the main spleen has been demonstrated (</span><a data-dcnode-id="1447" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//s7.addthis.com/static/sh.f48a1a04fe8dbf021b4cda1d.html%23B20"><span data-dcnode-id="1448" instrument_node="">Hong et al., 1963</span></a><span data-dcnode-id="1446" instrument_node="">) and the intact human spleen increased in volume to 179% its original size within a month in parallel with liver regeneration after part of the liver had been surgically removed (</span><a data-dcnode-id="1444" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//s7.addthis.com/static/sh.f48a1a04fe8dbf021b4cda1d.html%23B22"><span data-dcnode-id="1445" instrument_node="">Kotton and Fine, 2008</span></a><span data-dcnode-id="1443" instrument_node="">), suggesting that the same growth factors are involved. Whether our findings indicate training-stimulated growth or reflects individual predisposition can not be determined in this study, but the spleen volume of the three most successful divers is clearly in the upper range of that observed in healthy humans, which may indicate this possibility.</span></p><span data-dcnode-id="1441" instrument_node="">
</span><h3 data-dcnode-id="1439"><span data-dcnode-id="1440" instrument_node="">Lung Volume</span></h3><span data-dcnode-id="1438" instrument_node="">
</span><p class="mb15" data-dcnode-id="1418"><span data-dcnode-id="1437" instrument_node="">Previously reported mean VC in the general adult male population was 4.1 L for 225 Caucasian subjects with a mean age of 19 years and height of 162 cm (</span><a data-dcnode-id="1435" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//s7.addthis.com/static/sh.f48a1a04fe8dbf021b4cda1d.html%23B13"><span data-dcnode-id="1436" instrument_node="">Chiba et al., 1984</span></a><span data-dcnode-id="1434" instrument_node="">; </span><a data-dcnode-id="1432" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//s7.addthis.com/static/sh.f48a1a04fe8dbf021b4cda1d.html%23B23"><span data-dcnode-id="1433" instrument_node="">Laub et al., 1993</span></a><span data-dcnode-id="1431" instrument_node="">) and after correction for differences in height, our subjects’ mean VC was 158% of this reference group. Thus, the 7.3 L mean lung volume, with a span from 5.5 to 8.9 L in our study’s elite divers, was well above normal. Previously reported mean VC in eight male divers was 6.1 L (span 5.6–6.7 L; </span><a data-dcnode-id="1429" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//s7.addthis.com/static/sh.f48a1a04fe8dbf021b4cda1d.html%23B5"><span data-dcnode-id="1430" instrument_node="">Andersson et al., 2002</span></a><span data-dcnode-id="1428" instrument_node="">) and 6.3 L in another group of 15 male divers (span 5.0–7.1 L; </span><a data-dcnode-id="1426" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//s7.addthis.com/static/sh.f48a1a04fe8dbf021b4cda1d.html%23B6"><span data-dcnode-id="1427" instrument_node="">Andersson et al., 2004</span></a><span data-dcnode-id="1425" instrument_node="">), where both groups were of similar age, height, and weight as in the present study but also included recreational apnea divers. No comparison between competition results and VC among divers has been published previously, but the results are in line with studies comparing groups of non-divers with trained divers and reporting greater lung volumes in the divers (see review by </span><a data-dcnode-id="1423" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//s7.addthis.com/static/sh.f48a1a04fe8dbf021b4cda1d.html%23B15"><span data-dcnode-id="1424" instrument_node="">Ferretti and Costa, 2003</span></a><span data-dcnode-id="1422" instrument_node="">). There is also a report of similar lung volumes between apnea divers and non-divers (</span><a data-dcnode-id="1420" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//s7.addthis.com/static/sh.f48a1a04fe8dbf021b4cda1d.html%23B7"><span data-dcnode-id="1421" instrument_node="">Bakovic et al., 2003</span></a><span data-dcnode-id="1419" instrument_node="">).</span></p><span data-dcnode-id="1417" instrument_node="">
</span><p class="mb15" data-dcnode-id="1400"><span data-dcnode-id="1416" instrument_node="">Large lungs in skilled divers could be due to individual predisposition, increased respiratory muscle strength or chest flexibility, or it could be due to training-stimulated lung growth. A direct increase in lung volume as a response to training is suggested by the longitudinal changes in divers observed by </span><a data-dcnode-id="1414" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//s7.addthis.com/static/sh.f48a1a04fe8dbf021b4cda1d.html%23B12"><span data-dcnode-id="1415" instrument_node="">Carey et al. (1956)</span></a><span data-dcnode-id="1413" instrument_node="">. Other research suggests an enlarging effect on the lungs by high altitude exposure and by swimming, but most likely not by other sports (</span><a data-dcnode-id="1411" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//s7.addthis.com/static/sh.f48a1a04fe8dbf021b4cda1d.html%23B18"><span data-dcnode-id="1412" instrument_node="">Gaultier and Crapo, 1997</span></a><span data-dcnode-id="1410" instrument_node="">). The presence of stem cells in lung tissue (</span><a data-dcnode-id="1408" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//s7.addthis.com/static/sh.f48a1a04fe8dbf021b4cda1d.html%23B22"><span data-dcnode-id="1409" instrument_node="">Kotton and Fine, 2008</span></a><span data-dcnode-id="1407" instrument_node="">), as well as the observation that lobular removal of lung lobes in children may lead to regeneration to normal size within 2 years (</span><a data-dcnode-id="1405" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//s7.addthis.com/static/sh.f48a1a04fe8dbf021b4cda1d.html%23B25"><span data-dcnode-id="1406" instrument_node="">Nakajima et al., 1998</span></a><span data-dcnode-id="1404" instrument_node="">) suggests that lung growth may be induced in man, at least at a young age. It is also suggested by statements from elite divers that lung volume has been increased substantially since they started training in adult age by specific lung training protocols (personal communication), and while only minor (3%) increases in VC were observed in a study using lung packing alone in previously untrained subjects (</span><a data-dcnode-id="1402" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//s7.addthis.com/static/sh.f48a1a04fe8dbf021b4cda1d.html%23B26"><span data-dcnode-id="1403" instrument_node="">Nygren-Bonnier et al., 2007</span></a><span data-dcnode-id="1401" instrument_node="">) we have seen a larger increase in lung volume after training, using the complex training programs developed by elite divers (unpublished results).</span></p><span data-dcnode-id="1399" instrument_node="">
</span><p class="mb0" data-dcnode-id="1388"><span data-dcnode-id="1398" instrument_node="">While many mammalian divers have lung volumes comparable to terrestrial mammals, there are also semiaquatic species with large lungs, e.g., the sea otter (</span><a data-dcnode-id="1396" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//s7.addthis.com/static/sh.f48a1a04fe8dbf021b4cda1d.html%23B24"><span data-dcnode-id="1397" instrument_node="">Lenfant et al., 1970</span></a><span data-dcnode-id="1395" instrument_node="">). With a diving pattern resembling the natural diving in humans (</span><a data-dcnode-id="1393" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//s7.addthis.com/static/sh.f48a1a04fe8dbf021b4cda1d.html%23B9"><span data-dcnode-id="1394" instrument_node="">Bodkin et al., 2004</span></a><span data-dcnode-id="1392" instrument_node="">; </span><a data-dcnode-id="1390" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//s7.addthis.com/static/sh.f48a1a04fe8dbf021b4cda1d.html%23B41"><span data-dcnode-id="1391" instrument_node="">Schagatay et al., 2011</span></a><span data-dcnode-id="1389" instrument_node="">) it is likely that sea otters also benefit from maximizing lung oxygen storage, while deep diving species may on the contrary exhale before submersing and allow lung collapse at depth.</span></p><span data-dcnode-id="1387" instrument_node="">
</span><h3 data-dcnode-id="1385"><span data-dcnode-id="1386" instrument_node="">Contributions from Spleen and Lung to Apneic Duration in Top Athletes</span></h3><span data-dcnode-id="1384" instrument_node="">
</span><p class="mb15" data-dcnode-id="1288"><span data-dcnode-id="1383" instrument_node="">Extended apneic duration is required for good performance in all disciplines of competitive apnea. Previous research has shown an apnea-prolonging effect by repeated apneas in intact but not in splenectomized subjects, ascribed to splenic contraction (</span><a data-dcnode-id="1381" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//s7.addthis.com/static/sh.f48a1a04fe8dbf021b4cda1d.html%23B40"><span data-dcnode-id="1382" instrument_node="">Schagatay et al., 2001</span></a><span data-dcnode-id="1380" instrument_node="">; </span><a data-dcnode-id="1378" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//s7.addthis.com/static/sh.f48a1a04fe8dbf021b4cda1d.html%23B7"><span data-dcnode-id="1379" instrument_node="">Bakovic et al., 2003</span></a><span data-dcnode-id="1377" instrument_node="">). A larger spleen with the ability to eject more stored red blood cells would be beneficial for the apnea diver, allowing enhancement of both body oxygen stores and asphyxia tolerance via increased buffering of CO</span><sub data-dcnode-id="1375"><span data-dcnode-id="1376" instrument_node="">2</span></sub><span data-dcnode-id="1374" instrument_node="">, and subsequent prolonged apneic duration. The estimated contribution of the spleen blood to apneic duration in the most successful divers, compared to the least successful divers was 15 s, based on the estimated difference in spleen volume reduction between these groups. Reported spleen volume reductions of between 18 and 35% in other studies (</span><a data-dcnode-id="1372" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//s7.addthis.com/static/sh.f48a1a04fe8dbf021b4cda1d.html%23B21"><span data-dcnode-id="1373" instrument_node="">Hurford et al., 1990</span></a><span data-dcnode-id="1371" instrument_node="">; </span><a data-dcnode-id="1369" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//s7.addthis.com/static/sh.f48a1a04fe8dbf021b4cda1d.html%23B7"><span data-dcnode-id="1370" instrument_node="">Bakovic et al., 2003</span></a><span data-dcnode-id="1368" instrument_node="">; </span><a data-dcnode-id="1366" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//s7.addthis.com/static/sh.f48a1a04fe8dbf021b4cda1d.html%23B42"><span data-dcnode-id="1367" instrument_node="">Schagatay et al., 2005</span></a><span data-dcnode-id="1365" instrument_node="">; </span><a data-dcnode-id="1363" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//s7.addthis.com/static/sh.f48a1a04fe8dbf021b4cda1d.html%23B33"><span data-dcnode-id="1364" instrument_node="">Richardson et al., 2006</span></a><span data-dcnode-id="1362" instrument_node="">) shows that the spleen contractions seen in our top three divers was indeed high, and suggests that the low scorers would probably not display a more powerful contraction. With less relative spleen contraction in low scorers the time gain in high-scorers would be even greater. It should further be noted that the single, non-maximal apnea used in this study would, perhaps not have elicited the full spleen response (</span><a data-dcnode-id="1360" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//s7.addthis.com/static/sh.f48a1a04fe8dbf021b4cda1d.html%23B40"><span data-dcnode-id="1361" instrument_node="">Schagatay et al., 2001</span></a><span data-dcnode-id="1359" instrument_node="">, </span><a data-dcnode-id="1357" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//s7.addthis.com/static/sh.f48a1a04fe8dbf021b4cda1d.html%23B42"><span data-dcnode-id="1358" instrument_node="">2005</span></a><span data-dcnode-id="1356" instrument_node="">). Metabolic rate during apnea performance is most likely lower than in any other sport, and apnea performance is often preceded by meditation-like stages. The VO</span><sub data-dcnode-id="1354"><span data-dcnode-id="1355" instrument_node="">2</span></sub><span data-dcnode-id="1353" instrument_node=""> during resting apnea in 78 healthy males was found to be 2.67 mL O</span><sub data-dcnode-id="1351"><span data-dcnode-id="1352" instrument_node="">2</span></sub><span data-dcnode-id="1350" instrument_node="">/kg/min via indirect calorimetry (</span><a data-dcnode-id="1348" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//s7.addthis.com/static/sh.f48a1a04fe8dbf021b4cda1d.html%23B11"><span data-dcnode-id="1349" instrument_node="">Byrne et al., 2005</span></a><span data-dcnode-id="1347" instrument_node="">) which is lower than most RMR values reported. As divers have low metabolic rate, we estimated that our divers would use about 200 mL O</span><sub data-dcnode-id="1345"><span data-dcnode-id="1346" instrument_node="">2</span></sub><span data-dcnode-id="1344" instrument_node="">/min. It is even possible that apneic </span><span class="MathJax_Preview" data-dcnode-id="1343" style="color: inherit; display: none;"></span><span class="MathJax" data-dcnode-id="1301" data-mathml="<math xmlns=&quot;http://www.w3.org/1998/Math/MathML&quot; id=&quot;M2&quot;><mrow><mover accent=&quot;true&quot;><mtext>V</mtext><mo>&amp;#x2D9;</mo></mover><msub><mtext>O</mtext><mn>2</mn></msub></mrow></math>" id="MathJax-Element-2-Frame" role="presentation" style="position: relative;" tabindex="0"><nobr aria-hidden="true" data-dcnode-id="1315"><span class="math" data-dcnode-id="1316" id="M2" style="width: 2.055em; display: inline-block;"><span data-dcnode-id="1318" style="display: inline-block; position: relative; width: 1.852em; height: 0px; font-size: 111%;"><span data-dcnode-id="1319" style="position: absolute; clip: rect(1.077em, 1001.85em, 2.402em, -1000em); top: -2.102em; left: 0em;"><span class="mrow" data-dcnode-id="1321" id="MathJax-Span-11"><span class="mrow" data-dcnode-id="1322" id="MathJax-Span-12"><span class="mover" data-dcnode-id="1333" id="MathJax-Span-13"><span data-dcnode-id="1334" style="display: inline-block; position: relative; width: 0.701em; height: 0px;"><span data-dcnode-id="1339" style="position: absolute; clip: rect(3.216em, 1000.68em, 4.175em, -1000em); top: -4.004em; left: 0em;"><span class="mtext" data-dcnode-id="1341" id="MathJax-Span-14"><img data-dcnode-id="1342" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//cdnjs.cloudflare.com/ajax/libs/mathjax/2.7.1/fonts/HTML-CSS/TeX/png/Main/Regular/400/0056.png%3FV%3D2.7.1&amp;raw" style="width: 14px; height: 13px; vertical-align: -1px; margin-right: 0.019em;"></span><span data-dcnode-id="1340" style="display: inline-block; width: 0px; height: 4.004em;"></span></span><span data-dcnode-id="1335" style="position: absolute; clip: rect(3.229em, 1000.29em, 3.641em, -1000em); top: -4.254em; left: 0.117em;"><span class="mo" data-dcnode-id="1337" id="MathJax-Span-15"><img data-dcnode-id="1338" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//cdnjs.cloudflare.com/ajax/libs/mathjax/2.7.1/fonts/HTML-CSS/TeX/png/Main/Regular/400/02D9.png%3FV%3D2.7.1&amp;raw" style="width: 6px; height: 2px; vertical-align: 10px; margin-right: 0.178em;"></span><span data-dcnode-id="1336" style="display: inline-block; width: 0px; height: 4.004em;"></span></span></span></span><span class="msub" data-dcnode-id="1323" id="MathJax-Span-16"><span data-dcnode-id="1324" style="display: inline-block; position: relative; width: 1.136em; height: 0px;"><span data-dcnode-id="1329" style="position: absolute; clip: rect(3.195em, 1000.67em, 4.175em, -1000em); top: -4.004em; left: 0em;"><span class="mtext" data-dcnode-id="1331" id="MathJax-Span-17"><img data-dcnode-id="1332" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//cdnjs.cloudflare.com/ajax/libs/mathjax/2.7.1/fonts/HTML-CSS/TeX/png/Main/Regular/400/004F.png%3FV%3D2.7.1&amp;raw" style="width: 13px; height: 14px; vertical-align: 0px; margin-right: 0.052em;"></span><span data-dcnode-id="1330" style="display: inline-block; width: 0px; height: 4.004em;"></span></span><span data-dcnode-id="1325" style="position: absolute; top: -3.854em; left: 0.727em;"><span class="mn" data-dcnode-id="1327" id="MathJax-Span-18" style="font-size: 70.7%;"><img data-dcnode-id="1328" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//cdnjs.cloudflare.com/ajax/libs/mathjax/2.7.1/fonts/HTML-CSS/TeX/png/Main/Regular/283/0032.png%3FV%3D2.7.1&amp;raw" style="width: 6px; height: 9px; margin-right: 0.048em;"></span><span data-dcnode-id="1326" style="display: inline-block; width: 0px; height: 4.004em;"></span></span></span></span></span></span><span data-dcnode-id="1320" style="display: inline-block; width: 0px; height: 2.102em;"></span></span></span><span data-dcnode-id="1317" style="display: inline-block; overflow: hidden; vertical-align: -0.222em; border-left: 0px solid; width: 0px; height: 1.249em;"></span></span></nobr><span class="MJX_Assistive_MathML" data-dcnode-id="1302" role="presentation"><math data-dcnode-id="1303" id="M2" xmlns="http://www.w3.org/1998/Math/MathML"><mrow data-dcnode-id="1304"><mover accent="true" data-dcnode-id="1310"><mtext data-dcnode-id="1313"><span data-dcnode-id="1314" instrument_node="">V</span></mtext><mo data-dcnode-id="1311"><span data-dcnode-id="1312" instrument_node="">˙</span></mo></mover><msub data-dcnode-id="1305"><mtext data-dcnode-id="1308"><span data-dcnode-id="1309" instrument_node="">O</span></mtext><mn data-dcnode-id="1306"><span data-dcnode-id="1307" instrument_node="">2</span></mn></msub></mrow></math></span></span><span data-dcnode-id="1298" instrument_node=""> is lower, as &gt;20% reduction of the resting aerobic metabolism during apnea on account of the diving response has been demonstrated (</span><a data-dcnode-id="1296" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//s7.addthis.com/static/sh.f48a1a04fe8dbf021b4cda1d.html%23B4"><span data-dcnode-id="1297" instrument_node="">Andersson et al., 2008</span></a><span data-dcnode-id="1295" instrument_node="">). In addition to the increased oxygen storage, the increased Hb during apnea would enhance the CO</span><sub data-dcnode-id="1293"><span data-dcnode-id="1294" instrument_node="">2</span></sub><span data-dcnode-id="1292" instrument_node=""> buffering capacity and delay the urge to breathe and the individual breaking point. In competitive apnea, the differences in splenic contribution may thus play a decisive role for competition results, and spleen contraction may be initiated during the warm up procedures often seen (</span><a data-dcnode-id="1290" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//s7.addthis.com/static/sh.f48a1a04fe8dbf021b4cda1d.html%23B37"><span data-dcnode-id="1291" instrument_node="">Schagatay, 2010</span></a><span data-dcnode-id="1289" instrument_node="">).</span></p><span data-dcnode-id="1287" instrument_node="">
</span><p class="mb0" data-dcnode-id="1261"><span data-dcnode-id="1286" instrument_node="">The mean VC in the three most successful divers studied was more than 1 L greater than in the three lowest-scoring divers, likely affecting apneic duration by adding about 200 mL of O</span><sub data-dcnode-id="1284"><span data-dcnode-id="1285" instrument_node="">2</span></sub><span data-dcnode-id="1283" instrument_node=""> to the total body stores corresponding an additional 60 s of apnea, which shows that lung volume is a major factor for determining human apneic duration. Aside from enhanced O</span><sub data-dcnode-id="1281"><span data-dcnode-id="1282" instrument_node="">2</span></sub><span data-dcnode-id="1280" instrument_node=""> storage, the CO</span><sub data-dcnode-id="1278"><span data-dcnode-id="1279" instrument_node="">2</span></sub><span data-dcnode-id="1277" instrument_node=""> storage capacity would be increased by the larger VC by a dilution effect which could prolong apneas further. An enlarged VC could furthermore contribute to faster recovery after apnea by reducing relative dead space and increasing alveolar gas exchange by enlarging minute ventilation at a given respiratory frequency. This could provide additional benefits to competitive apneists, and also be important in repeated diving in for example fishing divers. However, lung volume is not known to be large among diving mammals, and some seals dive after exhalation, likely reducing buoyancy and avoiding decompression illness by limiting alveolar gas exchange when the lungs are allowed to collapse during diving (</span><a data-dcnode-id="1275" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//s7.addthis.com/static/sh.f48a1a04fe8dbf021b4cda1d.html%23B10"><span data-dcnode-id="1276" instrument_node="">Butler, 2001</span></a><span data-dcnode-id="1274" instrument_node="">). This may be compared to professional Ama divers, diving with only 85% of VC for repeated sea harvesting at moderate depths (</span><a data-dcnode-id="1272" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//s7.addthis.com/static/sh.f48a1a04fe8dbf021b4cda1d.html%23B20"><span data-dcnode-id="1273" instrument_node="">Hong et al., 1963</span></a><span data-dcnode-id="1271" instrument_node="">). Thus not only positive effects result from using large lung volumes and for sub-maximal dives the optimal volume may be below total lung capacity (TLC). Competitive apneists instead fill their lungs beyond TLC by “lung packing” (</span><a data-dcnode-id="1269" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//s7.addthis.com/static/sh.f48a1a04fe8dbf021b4cda1d.html%23B27"><span data-dcnode-id="1270" instrument_node="">Örnhagen et al., 1998</span></a><span data-dcnode-id="1268" instrument_node="">) which has been shown to prolong apneas compared to diving at TLC, which in turn yielded longer apneas than using 85% of TLC (</span><a data-dcnode-id="1266" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//s7.addthis.com/static/sh.f48a1a04fe8dbf021b4cda1d.html%23B28"><span data-dcnode-id="1267" instrument_node="">Overgaard et al., 2006</span></a><span data-dcnode-id="1265" instrument_node="">). This demonstrates the great importance of lung gas storage capacity for extended human diving. The TLC to RV ratio is also important for reaching great depths and increasing TLC without increasing RV would thus be beneficial for deep diving (</span><a data-dcnode-id="1263" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//s7.addthis.com/static/sh.f48a1a04fe8dbf021b4cda1d.html%23B35"><span data-dcnode-id="1264" instrument_node="">Schaefer et al., 1968</span></a><span data-dcnode-id="1262" instrument_node="">).</span></p><span data-dcnode-id="1260" instrument_node="">
</span><h3 data-dcnode-id="1258"><span data-dcnode-id="1259" instrument_node="">Other Factors</span></h3><span data-dcnode-id="1257" instrument_node="">
</span><h4 class="pt0" data-dcnode-id="1255"><span data-dcnode-id="1256" instrument_node="">Training</span></h4><span data-dcnode-id="1254" instrument_node="">
</span><p class="mb0" data-dcnode-id="1240"><span data-dcnode-id="1253" instrument_node="">The tendency for a negative correlation between time spent with general physical training and apneic performance could possibly reflect a time limitation when divers spent more time with apnea related training during the weeks before the competition, but it is also in line with the previous findings that there is no increase of the diving response with increasing physical fitness (</span><a data-dcnode-id="1251" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//s7.addthis.com/static/sh.f48a1a04fe8dbf021b4cda1d.html%23B45"><span data-dcnode-id="1252" instrument_node="">Strømme and Ingjer, 1978</span></a><span data-dcnode-id="1250" instrument_node="">; </span><a data-dcnode-id="1248" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//s7.addthis.com/static/sh.f48a1a04fe8dbf021b4cda1d.html%23B43"><span data-dcnode-id="1249" instrument_node="">Schagatay et al., 2000</span></a><span data-dcnode-id="1247" instrument_node="">). The lack of correlation between time invested in apnea training and competition result was somewhat surprising (Table </span><a data-dcnode-id="1245" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//s7.addthis.com/static/sh.f48a1a04fe8dbf021b4cda1d.html%23T1"><span data-dcnode-id="1246" instrument_node="">1</span></a><span data-dcnode-id="1244" instrument_node="">), as previous findings have found that apnea training enhanced diving bradycardia and prolonged apneic duration (</span><a data-dcnode-id="1242" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//s7.addthis.com/static/sh.f48a1a04fe8dbf021b4cda1d.html%23B43"><span data-dcnode-id="1243" instrument_node="">Schagatay et al., 2000</span></a><span data-dcnode-id="1241" instrument_node="">). It is clear, however, that specific apnea training, with effects on several systems essential for apneic diving, is necessary at this level of performance, as the average time spent on apnea training in the tested group was &gt;6 h/week.</span></p><span data-dcnode-id="1239" instrument_node="">
</span><h4 data-dcnode-id="1237"><span data-dcnode-id="1238" instrument_node="">Physiological responses and techniques</span></h4><span data-dcnode-id="1236" instrument_node="">
</span><p class="mb15" data-dcnode-id="1189"><span data-dcnode-id="1235" instrument_node="">Many physiological factors aside from spleen- and lung volume are likely involved in setting the limits in competitive apnea diving (reviewed in </span><a data-dcnode-id="1233" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//s7.addthis.com/static/sh.f48a1a04fe8dbf021b4cda1d.html%23B36"><span data-dcnode-id="1234" instrument_node="">Schagatay, 2009</span></a><span data-dcnode-id="1232" instrument_node="">, </span><a data-dcnode-id="1230" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//s7.addthis.com/static/sh.f48a1a04fe8dbf021b4cda1d.html%23B37"><span data-dcnode-id="1231" instrument_node="">2010</span></a><span data-dcnode-id="1229" instrument_node="">, </span><a data-dcnode-id="1227" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//s7.addthis.com/static/sh.f48a1a04fe8dbf021b4cda1d.html%23B38"><span data-dcnode-id="1228" instrument_node="">2011</span></a><span data-dcnode-id="1226" instrument_node="">). In the swimming disciplines, in addition to the tolerance to hypoxia, technique, and work economy are important (</span><a data-dcnode-id="1224" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//s7.addthis.com/static/sh.f48a1a04fe8dbf021b4cda1d.html%23B37"><span data-dcnode-id="1225" instrument_node="">Schagatay, 2010</span></a><span data-dcnode-id="1223" instrument_node="">). Also the magnitude of diving response (</span><a data-dcnode-id="1221" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//s7.addthis.com/static/sh.f48a1a04fe8dbf021b4cda1d.html%23B1"><span data-dcnode-id="1222" instrument_node="">Andersson and Schagatay, 1998a</span></a><span data-dcnode-id="1220" instrument_node="">; </span><a data-dcnode-id="1218" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//s7.addthis.com/static/sh.f48a1a04fe8dbf021b4cda1d.html%23B39"><span data-dcnode-id="1219" instrument_node="">Schagatay and Andersson, 1998</span></a><span data-dcnode-id="1217" instrument_node="">) anaerobic capacity and tolerance of accumulation of hypoxia induced factors are likely factors involved in determining individual performance (</span><a data-dcnode-id="1215" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//s7.addthis.com/static/sh.f48a1a04fe8dbf021b4cda1d.html%23B37"><span data-dcnode-id="1216" instrument_node="">Schagatay, 2010</span></a><span data-dcnode-id="1214" instrument_node="">). Baseline hematocrit is known to be high in divers (</span><a data-dcnode-id="1212" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//s7.addthis.com/static/sh.f48a1a04fe8dbf021b4cda1d.html%23B32"><span data-dcnode-id="1213" instrument_node="">Richardson et al., 2005</span></a><span data-dcnode-id="1211" instrument_node="">), a condition which may be induced by apnea training (</span><a data-dcnode-id="1209" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//s7.addthis.com/static/sh.f48a1a04fe8dbf021b4cda1d.html%23B14"><span data-dcnode-id="1210" instrument_node="">de Bruijn et al., 2008</span></a><span data-dcnode-id="1208" instrument_node="">). Depth disciplines are dependent on advanced training and use of specific equalization techniques to avoid squeeze when the lung is compressed below RV, and factors such as the capacity for “blood shift” (</span><a data-dcnode-id="1206" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//s7.addthis.com/static/sh.f48a1a04fe8dbf021b4cda1d.html%23B16"><span data-dcnode-id="1207" instrument_node="">Ferrigno et al., 1987</span></a><span data-dcnode-id="1205" instrument_node="">) and the ability to use free-fall (Table </span><a data-dcnode-id="1203" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//s7.addthis.com/static/sh.f48a1a04fe8dbf021b4cda1d.html%23T2"><span data-dcnode-id="1204" instrument_node="">2</span></a><span data-dcnode-id="1202" instrument_node="">) in order to conserve energy will affect the depth reached (</span><a data-dcnode-id="1200" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//s7.addthis.com/static/sh.f48a1a04fe8dbf021b4cda1d.html%23B38"><span data-dcnode-id="1201" instrument_node="">Schagatay, 2011</span></a><span data-dcnode-id="1199" instrument_node="">). For depth, also the neuropsychological tolerance to nitrogen narcosis (</span><a data-dcnode-id="1197" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//s7.addthis.com/static/sh.f48a1a04fe8dbf021b4cda1d.html%23B34"><span data-dcnode-id="1198" instrument_node="">Ridgway and McFarland, 2006</span></a><span data-dcnode-id="1196" instrument_node="">) will be increasingly important, and with depths increasing beyond 100 m there is also an increasing risk of developing decompression sickness on ascent (</span><a data-dcnode-id="1194" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//s7.addthis.com/static/sh.f48a1a04fe8dbf021b4cda1d.html%23B38"><span data-dcnode-id="1195" instrument_node="">Schagatay, 2011</span></a><span data-dcnode-id="1193" instrument_node="">) and a negative effect of a large lung air supply may become evident; divers may eventually have to allow lung collapse to reach further (</span><a data-dcnode-id="1191" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//s7.addthis.com/static/sh.f48a1a04fe8dbf021b4cda1d.html%23B17"><span data-dcnode-id="1192" instrument_node="">Fitz-Clarke, 2007</span></a><span data-dcnode-id="1190" instrument_node="">).</span></p><span data-dcnode-id="1188" instrument_node="">
</span><p class="mb0" data-dcnode-id="1186"><span data-dcnode-id="1187" instrument_node="">Not only physiological features and individual results determine who participates in the world championship in a young sport like apnea. There is little financial incentive in apneic diving, and the sport is generally not supported by national talent development programs. Therefore, socioeconomic factors may also determine the circumstances for training and participation in competitions. Despite limited recruitment, there have been dramatic and continual improvements in elite apneic performance in recent years, showing that human diving capacity may approach that of some semiaquatic species, e.g., the sea otter, once the full capacity is explored. Individual spleen- and lung volume measurement may be an effective method of identifying “hidden” talent on performance. Longitudinal study is necessary to determine whether these features are inherent or acquired by apnea-specific training.</span></p><span data-dcnode-id="1185" instrument_node="">
</span><a class="reset-hash-position" data-dcnode-id="1184" id="h6"></a><h2 data-dcnode-id="1182"><span data-dcnode-id="1183" instrument_node="">Conclusion</span></h2><span data-dcnode-id="1181" instrument_node="">
</span><p class="mb0" data-dcnode-id="1176"><span data-dcnode-id="1180" instrument_node="">This study suggests that spleen volume as well as lung volume may contribute to successful apnea performance in humans. A correlation of spleen volume with apneic performance has never been described before but is functionally logical, as ejection of additional red blood cells to circulation will both enhance oxygen storage and CO</span><sub data-dcnode-id="1178"><span data-dcnode-id="1179" instrument_node="">2</span></sub><span data-dcnode-id="1177" instrument_node=""> buffering capacity. Lung volume has previously been reported to be greater in divers than in non-divers, but this is the first report connecting VC to apnea competition results on the individual level. Studies of performance-predicting factors in competitive apnea will provide a functional evaluation of human apneic diving ability in a mammalian context and, from a sports perspective, it may help to identify talent and aid divers in improving training techniques and performance.</span></p><span data-dcnode-id="1175" instrument_node="">
