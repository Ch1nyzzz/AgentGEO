</span><meta content="Humans share with e.g. seals the ability to contract the spleen and increase circulating hematocrit, which may improve apneic performance by enhancing gas storage. Seals have large spleens and while human spleen size is small in comparison, it shows great individual variation. Unlike many marine mammals, human divers rely to a great extent on lung oxygen stores, but the impact of lung volume on competitive apnea performance has never been determined. We studied if spleen- and lung size correlated with performance in elite apnea divers. Volunteers were 14 male apnea world championship participants, with a mean(SE) of 5.8(1.2) years of previous apnea training. Spleen volume was calculated from spleen length, width and thickness measured via ultrasound during rest, and vital capacity via spirometry. Accumulated competition scores from dives of maximal depth, time and distance were compared to anthropometric measurements and training data. Mean dive performance was 75(4) m for constant weight depth, 5 min 53(39) s for static apnea and 139(13) m for dynamic apnea distance. Subjects’ mean height was 184(2) cm, weight 82(3) kg, vital capacity (VC) 7.3(0.3) L and spleen volume 336(32) ml. Spleen volume did not correlate with subject height or weight, but was positively correlated with competition score (r=0.57; P&amp;lt;0.05). Total competition score was also positively correlated with VC (r=0.54; P&amp;lt;0.05). The three highest scoring divers had the greatest spleen volumes, averaging 538(53) ml, while the three lowest scoring divers had a volume of 270(71) ml (P&amp;lt;0.01). VC was also greater in the high-scorers, at 7.9(0.36) L as compared to 6.7(0.19) L in the low-scorers (P&amp;lt;0.01). Spleen volume was reduced to half after 2 min of apnea in the highest scoring divers, and the estimated resting apnea time gain from the difference between high and low scorers was 15 s for spleen volume and 60 s for VC. We conclude that both spleen- and lung volume predict apnea performance in elite divers." data-dcnode-id="2839" name="citation_abstract"><span data-dcnode-id="2838" instrument_node="">

</span><p data-dcnode-id="1984"><span data-dcnode-id="2003" instrument_node="">Humans share with seals the ability to contract the spleen and increase circulating hematocrit, which may improve apneic performance by enhancing gas storage. Seals have large spleens and while human spleen size is small in comparison, it shows great individual variation. Unlike many marine mammals, human divers rely to a great extent on lung oxygen stores, but the impact of lung volume on competitive apnea performance has never been determined. We studied if spleen- and lung size correlated with performance in elite apnea divers. Volunteers were 14 male apnea world championship participants, with a mean (SE) of 5.8 (1.2) years of previous apnea training. Spleen volume was calculated from spleen length, width, and thickness measured via ultrasound during rest, and vital capacity via spirometry. Accumulated competition scores from dives of maximal depth, time, and distance were compared to anthropometric measurements and training data. Mean (SE) diving performance was 75 (4) m for constant weight depth, 5 min 53 (39) s for static apnea and 139 (13) m for dynamic apnea distance. Subjects’ mean height was 184 (2) cm, weight 82 (3) kg, vital capacity (VC) 7.3 (0.3) L and spleen volume 336 (32) mL. Spleen volume did not correlate with subject height or weight, but was positively correlated with competition score (</span><i data-dcnode-id="2001"><span data-dcnode-id="2002" instrument_node="">r</span></i><span data-dcnode-id="2000" instrument_node=""> = 0.57; </span><i data-dcnode-id="1998"><span data-dcnode-id="1999" instrument_node="">P</span></i><span data-dcnode-id="1997" instrument_node=""> &lt; 0.05). Total competition score was also positively correlated with VC (</span><i data-dcnode-id="1995"><span data-dcnode-id="1996" instrument_node="">r</span></i><span data-dcnode-id="1994" instrument_node=""> = 0.54; </span><i data-dcnode-id="1992"><span data-dcnode-id="1993" instrument_node="">P</span></i><span data-dcnode-id="1991" instrument_node=""> &lt; 0.05). The three highest scoring divers had the greatest spleen volumes, averaging 538 (53) mL, while the three lowest-scoring divers had a volume of 270 (71) mL (</span><i data-dcnode-id="1989"><span data-dcnode-id="1990" instrument_node="">P</span></i><span data-dcnode-id="1988" instrument_node=""> &lt; 0.01). VC was also greater in the high-scorers, at 7.9 (0.36) L as compared to 6.7 (0.19) L in the low scorers (</span><i data-dcnode-id="1986"><span data-dcnode-id="1987" instrument_node="">P</span></i><span data-dcnode-id="1985" instrument_node=""> &lt; 0.01). Spleen volume was reduced to half after 2 min of apnea in the highest scoring divers, and the estimated resting apnea time gain from the difference between high and low scorers was 15 s for spleen volume and 60 s for VC. We conclude that both spleen- and lung volume predict apnea performance in elite divers.</span></p><span data-dcnode-id="1983" instrument_node="">

</span><a class="reset-hash-position" data-dcnode-id="1977" id="h2"></a><h2 data-dcnode-id="1975"><span data-dcnode-id="1976" instrument_node="">Introduction</span></h2><span data-dcnode-id="1974" instrument_node="">
</span><p class="mb15" data-dcnode-id="1939"><span data-dcnode-id="1973" instrument_node="">Humans have the ability to contract the spleen during diving and increase circulating hematocrit (</span><a data-dcnode-id="1971" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//s7.addthis.com/static/sh.f48a1a04fe8dbf021b4cda1d.html%23B21"><span data-dcnode-id="1972" instrument_node="">Hurford et al., 1990</span></a><span data-dcnode-id="1970" instrument_node="">) which seems to prolong apneas when performed in series (</span><a data-dcnode-id="1968" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//s7.addthis.com/static/sh.f48a1a04fe8dbf021b4cda1d.html%23B40"><span data-dcnode-id="1969" instrument_node="">Schagatay et al., 2001</span></a><span data-dcnode-id="1967" instrument_node="">). This response is well known in seals, where spleen size varies greatly between species and in some deep divers like the Weddell seal it is exceptionally large with the ability to store 2/3 of the body’s erythrocytes during rest (</span><a data-dcnode-id="1965" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//s7.addthis.com/static/sh.f48a1a04fe8dbf021b4cda1d.html%23B31"><span data-dcnode-id="1966" instrument_node="">Qvist et al., 1986</span></a><span data-dcnode-id="1964" instrument_node="">). In highly aerobic species like the horse and the dog, the spleen contracts and elevates hematocrit during exercise (</span><a data-dcnode-id="1962" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//s7.addthis.com/static/sh.f48a1a04fe8dbf021b4cda1d.html%23B8"><span data-dcnode-id="1963" instrument_node="">Barcroft and Stevens, 1927</span></a><span data-dcnode-id="1961" instrument_node="">). The human spleen also contracts, increasing circulating Hb and Hct during both apnea (</span><a data-dcnode-id="1959" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//s7.addthis.com/static/sh.f48a1a04fe8dbf021b4cda1d.html%23B40"><span data-dcnode-id="1960" instrument_node="">Schagatay et al., 2001</span></a><span data-dcnode-id="1958" instrument_node="">) and exercise (</span><a data-dcnode-id="1956" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//s7.addthis.com/static/sh.f48a1a04fe8dbf021b4cda1d.html%23B23"><span data-dcnode-id="1957" instrument_node="">Laub et al., 1993</span></a><span data-dcnode-id="1955" instrument_node="">; </span><a data-dcnode-id="1953" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//s7.addthis.com/static/sh.f48a1a04fe8dbf021b4cda1d.html%23B44"><span data-dcnode-id="1954" instrument_node="">Stewart and McKenzie, 2002</span></a><span data-dcnode-id="1952" instrument_node="">), which will increase blood gas storage capacity. The spleen contraction is probably active, i.e., not due to reduced blood flow to the organ (</span><a data-dcnode-id="1950" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//s7.addthis.com/static/sh.f48a1a04fe8dbf021b4cda1d.html%23B7"><span data-dcnode-id="1951" instrument_node="">Bakovic et al., 2003</span></a><span data-dcnode-id="1949" instrument_node="">) and the reversible elevations of Hct and Hb are not due to hemoconcentration by extravasation of plasma (</span><a data-dcnode-id="1947" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//s7.addthis.com/static/sh.f48a1a04fe8dbf021b4cda1d.html%23B40"><span data-dcnode-id="1948" instrument_node="">Schagatay et al., 2001</span></a><span data-dcnode-id="1946" instrument_node="">). Spleen size shows great individual variation in humans (</span><a data-dcnode-id="1944" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//s7.addthis.com/static/sh.f48a1a04fe8dbf021b4cda1d.html%23B29"><span data-dcnode-id="1945" instrument_node="">Prassopoulos et al., 1997</span></a><span data-dcnode-id="1943" instrument_node="">), and also its ability to contract appears to vary between individuals (</span><a data-dcnode-id="1941" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//s7.addthis.com/static/sh.f48a1a04fe8dbf021b4cda1d.html%23B42"><span data-dcnode-id="1942" instrument_node="">Schagatay et al., 2005</span></a><span data-dcnode-id="1940" instrument_node="">) but it has never been determined whether these factors correlate with individual apneic diving ability.</span></p><span data-dcnode-id="1938" instrument_node="">
</span><p class="mb15" data-dcnode-id="1933"><span data-dcnode-id="1937" instrument_node="">The sport Apnea has developed during the past 15 years, and involves disciplines with the aim to reach the greatest possible depth, immersion time and horizontal distance under water, and serves as a good model for studying maximal apneic diving performance in humans. The ability to perform extended apnea depends mainly on three factors: (1) the total body gas storage capacity in lungs, blood, and tissues; (2) asphyxia tolerance, or the tolerable levels of hypoxia and hypercapnia as determined by, e.g., brain hypoxia tolerance and the CO</span><sub data-dcnode-id="1935"><span data-dcnode-id="1936" instrument_node="">2</span></sub><span data-dcnode-id="1934" instrument_node=""> buffering capacity; and (3) metabolic rate, which is determined mainly by work economy and the ability to restrict metabolism via the diving response. A large spleen with the ability to eject a great quantity of stored erythrocytes into circulation would be beneficial for apneic duration both by increasing blood oxygen storage and enhancing buffering capacity, and an important part of oxygen storage in humans is the lung supply.</span></p><span data-dcnode-id="1932" instrument_node="">
</span><p class="mb15" data-dcnode-id="1906"><span data-dcnode-id="1931" instrument_node="">A way to increase gas storage capacity would be to maximize lung volume, thereby increasing oxygen stores and also allowing more CO</span><sub data-dcnode-id="1929"><span data-dcnode-id="1930" instrument_node="">2</span></sub><span data-dcnode-id="1928" instrument_node=""> to be transferred to the lungs during apnea via dilution effect. In addition, large lungs with small residual volume (RV) also help the diver to attain greater depth without risking “squeeze,” as the depth at which compression to RV is reached would be greater. Increased lung volume furthermore facilitates equalization of middle ears and sinuses. Breath-hold divers are known to overfill their lungs before diving via buccal pumping or “lung packing” (</span><a data-dcnode-id="1926" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//s7.addthis.com/static/sh.f48a1a04fe8dbf021b4cda1d.html%23B27"><span data-dcnode-id="1927" instrument_node="">Örnhagen et al., 1998</span></a><span data-dcnode-id="1925" instrument_node="">), i.e., by pumping air into the lungs via a swallowing motion. However, there are also negative effects of large lung volume including increased buoyancy as well as a high intra-thoracic pressure, with a negative effect on venous return and increased risk of syncope (</span><a data-dcnode-id="1923" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//s7.addthis.com/static/sh.f48a1a04fe8dbf021b4cda1d.html%23B3"><span data-dcnode-id="1924" instrument_node="">Andersson et al., 1998</span></a><span data-dcnode-id="1922" instrument_node="">). The diving response, known to limit metabolism during diving, may also be decreased by a large inspired lung volume (</span><a data-dcnode-id="1920" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//s7.addthis.com/static/sh.f48a1a04fe8dbf021b4cda1d.html%23B1"><span data-dcnode-id="1921" instrument_node="">Andersson and Schagatay, 1998a</span></a><span data-dcnode-id="1919" instrument_node="">,</span><a data-dcnode-id="1917" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//s7.addthis.com/static/sh.f48a1a04fe8dbf021b4cda1d.html%23B2"><span data-dcnode-id="1918" instrument_node="">b</span></a><span data-dcnode-id="1916" instrument_node="">), and over filling of the lungs could, by counteracting the diving response, elevate metabolism during diving, at least while the diver is not at depth. Trained apnea divers have previously been reported to have large lungs (</span><a data-dcnode-id="1914" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//s7.addthis.com/static/sh.f48a1a04fe8dbf021b4cda1d.html%23B12"><span data-dcnode-id="1915" instrument_node="">Carey et al., 1956</span></a><span data-dcnode-id="1913" instrument_node="">) suggesting that the positive effects may outweigh the disadvantages. However, the lungs of typical marine mammals are no larger than those of terrestrial, and, e.g., the deep diving Weddell seal exhales before diving in order to avoid excess nitrogen loading, and relies mainly on blood- and tissue (mainly muscle myoglobin) oxygen storage during diving (</span><a data-dcnode-id="1911" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//s7.addthis.com/static/sh.f48a1a04fe8dbf021b4cda1d.html%23B10"><span data-dcnode-id="1912" instrument_node="">Butler, 2001</span></a><span data-dcnode-id="1910" instrument_node="">). Conversely, competitive apneists are known to train to increase lung volume, by stretching and lung packing maneuvers (</span><a data-dcnode-id="1908" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//s7.addthis.com/static/sh.f48a1a04fe8dbf021b4cda1d.html%23B27"><span data-dcnode-id="1909" instrument_node="">Örnhagen et al., 1998</span></a><span data-dcnode-id="1907" instrument_node="">), but to our knowledge no systematic study of the effect of lung volume on competitive apnea diving performance in elite apneists has been performed.</span></p><span data-dcnode-id="1905" instrument_node="">
</span><p class="mb0" data-dcnode-id="1903"><span data-dcnode-id="1904" instrument_node="">We therefore aimed to compare spleen and lung volume, two possible dive-prolonging characteristics, to the individual scores in an apnea world championship competition. We hypothesized that scores in the competition would be positively correlated with both spleen and lung volume.</span></p><span data-dcnode-id="1902" instrument_node="">
</span><a class="reset-hash-position" data-dcnode-id="1901" id="h3"></a><h2 data-dcnode-id="1899"><span data-dcnode-id="1900" instrument_node="">Materials and Methods</span></h2><span data-dcnode-id="1898" instrument_node="">
</span><h3 class="pt0" data-dcnode-id="1896"><span data-dcnode-id="1897" instrument_node="">Participants and Setting</span></h3><span data-dcnode-id="1895" instrument_node="">
</span><p class="mb0" data-dcnode-id="1890"><span data-dcnode-id="1894" instrument_node="">This study complied with the Declaration of Helsinki and the methods used had been approved by the local human ethics board. Information about the study was posted in the competition area of the championship. Fourteen male subjects from 10 different nations volunteered for the study and, after receiving more detailed information about the study, signed an informed consent form. Their mean (SE) age was 29 (2) years, and several were individual world record holders. The participants had an average of 5.8 (1.2) years of experience in apnea training. Their total apnea training load averaged 6.2 (0.6) h/week and other physical training 6.3 (0.7) h/week in the month leading up to the competition. Apnea training varied between individuals, but always included serial and maximal static dry and immersed apneas, walking apnea and dynamic apneas in a pool, and, for the weeks leading up to the competition, dynamic deep diving on a line in the sea or a lake. Physical training mainly included endurance training like swimming, running and cycling, which some divers combined with strength training of major swimming muscles. Anthropometric and training data is presented in Table </span><a data-dcnode-id="1892" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//s7.addthis.com/static/sh.f48a1a04fe8dbf021b4cda1d.html%23T1"><span data-dcnode-id="1893" instrument_node="">1</span></a><span data-dcnode-id="1891" instrument_node="">.</span></p><span data-dcnode-id="1889" instrument_node="">

</span><p class="mt15 w100pc float_left" data-dcnode-id="1860"><span data-dcnode-id="1864" instrument_node="">The apnea competition involved accumulation of points from dives of maximal depth, time and horizontal distance for a total score (Table </span><a data-dcnode-id="1862" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//s7.addthis.com/static/sh.f48a1a04fe8dbf021b4cda1d.html%23T2"><span data-dcnode-id="1863" instrument_node="">2</span></a><span data-dcnode-id="1861" instrument_node="">). In competitive apnea, points are gained in direct relation to depth, time, and distance in the respective disciplines, producing an overall score that renders the winner by adding up the scores from three disciplines. The three disciplines were Constant weight deep diving with fins, where 1 m depth generates 1 point, Static apnea, where 5 s generates 1 point, and Dynamic apnea with fins, where 2 m yields 1 point. The total score was used as a representation of individual overall diving performance.</span></p><span data-dcnode-id="1859" instrument_node="">

</span><a data-dcnode-id="1850" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.frontiersin.org/files/Articles/23386/fphys-03-00173-HTML/image_m/fphys-03-00173-t002.jpg" target="_blank"><span data-dcnode-id="1852" instrument_node="">

</span><h3 data-dcnode-id="1824"><span data-dcnode-id="1825" instrument_node="">Measurements</span></h3><span data-dcnode-id="1823" instrument_node="">
</span><p class="mb15" data-dcnode-id="1815"><span data-dcnode-id="1822" instrument_node="">Subjects arrived at the laboratory after at least 45 min without apnea, physical activity, or eating. Ambient temperature was 23–25°C. Vital capacity (VC) in the standing position, without lung packing, was measured three times (Microlab spirometer, Micro Medical Ltd., Kent, UK). Subjects’ height and weight were also measured and training data collected. Spleen measurements were obtained via ultrasonic imaging (Mindray DP-6600, Shenzhen Mindray Bio-Medical Electronics Co., Ltd., Shenzhen, China) using the following protocol: Divers were semi-seated vertically on an elevated stool for approximately 3 min while the site for spleen measurements was identified from the dorsal side, followed by measurement of spleen maximal length, width, and thickness every minute for 7 min. From these triaxial measurements of length (L), width (W), and thickness (T), spleen volume was calculated using the Pilström formula: Lπ (WT − T</span><sup data-dcnode-id="1820"><span data-dcnode-id="1821" instrument_node="">2</span></sup><span data-dcnode-id="1819" instrument_node="">)/3 (</span><a data-dcnode-id="1817" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//s7.addthis.com/static/sh.f48a1a04fe8dbf021b4cda1d.html%23B42"><span data-dcnode-id="1818" instrument_node="">Schagatay et al., 2005</span></a><span data-dcnode-id="1816" instrument_node="">).</span></p><span data-dcnode-id="1814" instrument_node="">
</span><p class="mb0" data-dcnode-id="1812"><span data-dcnode-id="1813" instrument_node="">In order to estimate the contribution of the expelled blood volume to resting apneic duration, the three highest scoring divers were asked to perform a time limited apnea of 2 min, to determine their magnitude of spleen contraction, in addition to the baseline measurements. This short apnea was performed in the sitting position without prior hyperventilation. Triaxial spleen measurements were obtained every minute before the apnea and after the apnea to obtain a recovery profile.</span></p><span data-dcnode-id="1811" instrument_node="">
</span><h3 data-dcnode-id="1809"><span data-dcnode-id="1810" instrument_node="">Analysis</span></h3><span data-dcnode-id="1808" instrument_node="">
</span><p class="mb15" data-dcnode-id="1797"><span data-dcnode-id="1807" instrument_node="">To obtain an individual baseline measurement of spleen volume, the mean of the two largest subsequent volume measurements recorded during the 7 min resting period was used, this was done to minimize the influence of measurement error due to slight changes in probe placement, and to limit the influence of the pulsatile changes in spleen volume. With measurements of VC the largest of the three measurements was used in the analysis, which is the standard procedure to limit the influence of the unaccustomed subject’s failure to fill or empty lungs completely in each test. Spleen and lung volume, height, weight and training data from the divers were compared with the individual total scores in the competition via Pearson product-moment correlation. For an estimation of the relative contribution to apneic duration of spleen- and lung volumes, the mean values of spleen and lung volumes from the three subjects with the highest competition scores were compared to those of the three lowest-scoring divers. Between-group comparisons were completed using unpaired Student’s </span><i data-dcnode-id="1805"><span data-dcnode-id="1806" instrument_node="">t</span></i><span data-dcnode-id="1804" instrument_node="">-tests and within-group tests using paired </span><i data-dcnode-id="1802"><span data-dcnode-id="1803" instrument_node="">t</span></i><span data-dcnode-id="1801" instrument_node="">-tests. The accepted level for differences was </span><i data-dcnode-id="1799"><span data-dcnode-id="1800" instrument_node="">P</span></i><span data-dcnode-id="1798" instrument_node=""> &lt; 0.05.</span></p><span data-dcnode-id="1796" instrument_node="">
</span><p class="mb0" data-dcnode-id="1784"><span data-dcnode-id="1795" instrument_node="">A statistical multivariable regression partial least squares model, with cross-validation, was established using the software SIMCA-P+ v.12. The degree of fit (</span><i data-dcnode-id="1793"><span data-dcnode-id="1794" instrument_node="">R</span></i><sup data-dcnode-id="1791"><span data-dcnode-id="1792" instrument_node="">2</span></sup><span data-dcnode-id="1790" instrument_node="">) of the model was 63% and the model validity (</span><i data-dcnode-id="1788"><span data-dcnode-id="1789" instrument_node="">Q</span></i><sup data-dcnode-id="1786"><span data-dcnode-id="1787" instrument_node="">2</span></sup><span data-dcnode-id="1785" instrument_node="">) 55%, where the variables spleen volume, lung volume, height, number of years of apnea training and the amount of physical training per week were described by the model. A permutation test was conducted to validate the results.</span></p><span data-dcnode-id="1783" instrument_node="">
</span><a class="reset-hash-position" data-dcnode-id="1782" id="h4"></a><h2 data-dcnode-id="1780"><span data-dcnode-id="1781" instrument_node="">Results</span></h2><span data-dcnode-id="1779" instrument_node="">
</span><h3 class="pt0" data-dcnode-id="1777"><span data-dcnode-id="1778" instrument_node="">Diving Performance</span></h3><span data-dcnode-id="1776" instrument_node="">
</span><p class="mb0" data-dcnode-id="1774"><span data-dcnode-id="1775" instrument_node="">Mean (SE) competition dive performances of participating subjects were 75 (4) m for constant weight deep diving, 5 min 53 (39) s for static apnea and 139 (13) m for dynamic apnea, which are to our knowledge the highest mean performances reported in any subject group studied in apnea physiology. The mean total competition score for the tested divers was 211 (8) points.</span></p><span data-dcnode-id="1773" instrument_node="">
</span><h3 data-dcnode-id="1771"><span data-dcnode-id="1772" instrument_node="">Correlations between Anthropometric Data and Performance</span></h3><span data-dcnode-id="1770" instrument_node="">
</span><h4 class="pt0" data-dcnode-id="1768"><span data-dcnode-id="1769" instrument_node="">Spleen Volume</span></h4><span data-dcnode-id="1767" instrument_node="">
</span><p class="mb0" data-dcnode-id="1741"><span data-dcnode-id="1766" instrument_node="">Mean (SE) spleen volume was 336 (32) mL with range 215–598 mL. Spleen volume was not correlated with individual height or weight, but was positively correlated with total competition score (</span><i data-dcnode-id="1764"><span data-dcnode-id="1765" instrument_node="">r</span></i><span data-dcnode-id="1763" instrument_node=""> = 0.57; </span><i data-dcnode-id="1761"><span data-dcnode-id="1762" instrument_node="">P</span></i><span data-dcnode-id="1760" instrument_node=""> &lt; 0.05; Figure </span><a data-dcnode-id="1758" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//s7.addthis.com/static/sh.f48a1a04fe8dbf021b4cda1d.html%23F1"><span data-dcnode-id="1759" instrument_node="">1</span></a><span data-dcnode-id="1757" instrument_node="">A), and also after correction for height (</span><i data-dcnode-id="1755"><span data-dcnode-id="1756" instrument_node="">r</span></i><span data-dcnode-id="1754" instrument_node=""> = 0.55; </span><i data-dcnode-id="1752"><span data-dcnode-id="1753" instrument_node="">P</span></i><span data-dcnode-id="1751" instrument_node=""> &lt; 0.05) and weight (</span><i data-dcnode-id="1749"><span data-dcnode-id="1750" instrument_node="">r</span></i><span data-dcnode-id="1748" instrument_node=""> = 0.57; </span><i data-dcnode-id="1746"><span data-dcnode-id="1747" instrument_node="">P</span></i><span data-dcnode-id="1745" instrument_node=""> &lt; 0.05; Table </span><a data-dcnode-id="1743" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//s7.addthis.com/static/sh.f48a1a04fe8dbf021b4cda1d.html%23T1"><span data-dcnode-id="1744" instrument_node="">1</span></a><span data-dcnode-id="1742" instrument_node="">).</span></p><span data-dcnode-id="1740" instrument_node="">
</span><div class="DottedLine" data-dcnode-id="1739"></div><span data-dcnode-id="1738" instrument_node="">

</span><img alt="www.frontiersin.org" data-dcnode-id="1732" id="F1" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.frontiersin.org/files/Articles/23386/fphys-03-00173-HTML/image_t/fphys-03-00173-g001.gif&amp;raw"></a><span data-dcnode-id="1730" instrument_node="">
</span><p data-dcnode-id="1711"><strong data-dcnode-id="1728"><span data-dcnode-id="1729" instrument_node="">Figure 1. Scatter diagram of spleen volume (SV; A) and vital capacity (VC; B) against total points in apnea competition</span></strong><span data-dcnode-id="1727" instrument_node="">. For </span><strong data-dcnode-id="1725"><span data-dcnode-id="1726" instrument_node="">(A)</span></strong><span data-dcnode-id="1724" instrument_node="">, </span><i data-dcnode-id="1722"><span data-dcnode-id="1723" instrument_node="">r</span></i><span data-dcnode-id="1721" instrument_node=""> = 0.57 and for </span><strong data-dcnode-id="1719"><span data-dcnode-id="1720" instrument_node="">(B)</span></strong><span data-dcnode-id="1718" instrument_node="">, </span><i data-dcnode-id="1716"><span data-dcnode-id="1717" instrument_node="">r</span></i><span data-dcnode-id="1715" instrument_node=""> = 0.54 (both </span><i data-dcnode-id="1713"><span data-dcnode-id="1714" instrument_node="">P</span></i><span data-dcnode-id="1712" instrument_node=""> &lt; 0.05).</span></p><span data-dcnode-id="1710" instrument_node="">

</span><h4 data-dcnode-id="1702"><span data-dcnode-id="1703" instrument_node="">Vital capacity</span></h4><span data-dcnode-id="1701" instrument_node="">
</span><p class="mb0" data-dcnode-id="1690"><span data-dcnode-id="1700" instrument_node="">Mean (SE) VC was 7.3 (0.25) L with a range from 5.5 to 8.9 L. No correlation between VC and subjects height or weight was observed. There was a positive correlation between VC and total competition score (</span><i data-dcnode-id="1698"><span data-dcnode-id="1699" instrument_node="">r</span></i><span data-dcnode-id="1697" instrument_node=""> = 0.54; </span><i data-dcnode-id="1695"><span data-dcnode-id="1696" instrument_node="">P</span></i><span data-dcnode-id="1694" instrument_node=""> &lt; 0.05; Figure </span><a data-dcnode-id="1692" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//s7.addthis.com/static/sh.f48a1a04fe8dbf021b4cda1d.html%23F1"><span data-dcnode-id="1693" instrument_node="">1</span></a><span data-dcnode-id="1691" instrument_node="">B).</span></p><span data-dcnode-id="1689" instrument_node="">
</span><h4 data-dcnode-id="1687"><span data-dcnode-id="1688" instrument_node="">Other factors</span></h4><span data-dcnode-id="1686" instrument_node="">
</span><p class="mb0" data-dcnode-id="1672"><span data-dcnode-id="1685" instrument_node="">Subject height, weight, and BMI were not correlated with performance (Table </span><a data-dcnode-id="1683" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//s7.addthis.com/static/sh.f48a1a04fe8dbf021b4cda1d.html%23T1"><span data-dcnode-id="1684" instrument_node="">1</span></a><span data-dcnode-id="1682" instrument_node="">). There was no correlation between performance and hours of apnea training during the month prior to the competition, but there was a trend toward negative correlation between physical training and performance (</span><i data-dcnode-id="1680"><span data-dcnode-id="1681" instrument_node="">r</span></i><span data-dcnode-id="1679" instrument_node=""> = −0.48; </span><i data-dcnode-id="1677"><span data-dcnode-id="1678" instrument_node="">P</span></i><span data-dcnode-id="1676" instrument_node=""> &lt; 0.1; Table </span><a data-dcnode-id="1674" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//s7.addthis.com/static/sh.f48a1a04fe8dbf021b4cda1d.html%23T1"><span data-dcnode-id="1675" instrument_node="">1</span></a><span data-dcnode-id="1673" instrument_node="">).</span></p><span data-dcnode-id="1671" instrument_node="">
</span><h4 data-dcnode-id="1669"><span data-dcnode-id="1670" instrument_node="">Multivariable analysis</span></h4><span data-dcnode-id="1668" instrument_node="">
</span><p class="mb0" data-dcnode-id="1666"><span data-dcnode-id="1667" instrument_node="">Spleen- and lung volume were significantly (99%) related to the total sum of scores the divers accomplished from the three disciplines. The variables height, number of years of apnea training and the amount of apnea training or physical training per week were not significantly related to the total sum of scores. The result was confirmed by the permutation test.</span></p><span data-dcnode-id="1665" instrument_node="">
</span><h3 data-dcnode-id="1663"><span data-dcnode-id="1664" instrument_node="">Estimated Contributions from Spleen and Lung Volumes to Apneic Performance</span></h3><span data-dcnode-id="1662" instrument_node="">
</span><h4 class="pt0" data-dcnode-id="1660"><span data-dcnode-id="1661" instrument_node="">Effect of spleen volume</span></h4><span data-dcnode-id="1659" instrument_node="">
</span><p class="mb0" data-dcnode-id="1651"><span data-dcnode-id="1658" instrument_node="">The three highest scoring divers (mean 242 pts) had a mean (SD) spleen volume of 538 (53) mL and the three lowest-scoring divers (mean 172 pts) a volume of 270 (71) mL; (</span><i data-dcnode-id="1656"><span data-dcnode-id="1657" instrument_node="">P</span></i><span data-dcnode-id="1655" instrument_node=""> &lt; 0.01; Figure </span><a data-dcnode-id="1653" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//s7.addthis.com/static/sh.f48a1a04fe8dbf021b4cda1d.html%23F2"><span data-dcnode-id="1654" instrument_node="">2</span></a><span data-dcnode-id="1652" instrument_node="">) while height and weight of the two groups were similar, at 183 (4.7) and 183 (4.0) cm, and 77 (3) and 91 (23) kg, respectively (NS).</span></p><span data-dcnode-id="1650" instrument_node="">
</span><div class="DottedLine" data-dcnode-id="1649"></div><span data-dcnode-id="1648" instrument_node="">
</span><div class="Imageheaders" data-dcnode-id="1646"><span data-dcnode-id="1647" instrument_node="">FIGURE 2</span></div><span data-dcnode-id="1645" instrument_node="">

</span><a data-dcnode-id="1641" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.frontiersin.org/files/Articles/23386/fphys-03-00173-HTML/image_m/fphys-03-00173-g002.jpg" target="_blank"><span data-dcnode-id="1643" instrument_node="">
</span><img alt="www.frontiersin.org" data-dcnode-id="1642" id="F2" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.frontiersin.org/files/Articles/23386/fphys-03-00173-HTML/image_t/fphys-03-00173-g002.gif&amp;raw"></a><span data-dcnode-id="1640" instrument_node="">
</span><p data-dcnode-id="1627"><strong data-dcnode-id="1632"><span data-dcnode-id="1639" instrument_node="">Figure 2. Mean (SD) spleen volume (SV) and lung volumes vital capacity (VC) in highest (</span><i data-dcnode-id="1637"><span data-dcnode-id="1638" instrument_node="">n</span></i><span data-dcnode-id="1636" instrument_node=""> = 3) and lowest (</span><i data-dcnode-id="1634"><span data-dcnode-id="1635" instrument_node="">n</span></i><span data-dcnode-id="1633" instrument_node=""> = 3) scoring divers</span></strong><span data-dcnode-id="1631" instrument_node="">. Significance at </span><i data-dcnode-id="1629"><span data-dcnode-id="1630" instrument_node="">P</span></i><span data-dcnode-id="1628" instrument_node=""> &lt; 0.01 is indicated by **.</span></p><span data-dcnode-id="1626" instrument_node="">

</span><p class="mt15 w100pc float_left" data-dcnode-id="1539"><span data-dcnode-id="1619" instrument_node="">When the highest scoring subjects performed a 2 min apnea, their mean spleen volume decreased by 260 mL (</span><i data-dcnode-id="1617"><span data-dcnode-id="1618" instrument_node="">P</span></i><span data-dcnode-id="1616" instrument_node=""> &lt; 0.05; Figure </span><a data-dcnode-id="1614" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//s7.addthis.com/static/sh.f48a1a04fe8dbf021b4cda1d.html%23F3"><span data-dcnode-id="1615" instrument_node="">3</span></a><span data-dcnode-id="1613" instrument_node="">). Based on the spleen volume reduction observed, the splenic blood contribution to apneic duration in high performing divers was estimated. Spleen blood contains at least double the normal hematocrit (</span><a data-dcnode-id="1611" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//s7.addthis.com/static/sh.f48a1a04fe8dbf021b4cda1d.html%23B23"><span data-dcnode-id="1612" instrument_node="">Laub et al., 1993</span></a><span data-dcnode-id="1610" instrument_node="">; </span><a data-dcnode-id="1608" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//s7.addthis.com/static/sh.f48a1a04fe8dbf021b4cda1d.html%23B44"><span data-dcnode-id="1609" instrument_node="">Stewart and McKenzie, 2002</span></a><span data-dcnode-id="1607" instrument_node="">) and with 260 mL of spleen blood being added to the circulation, equivalent in Hb content to at least 500 mL of whole blood, it could bind another 100 mL of O</span><sub data-dcnode-id="1605"><span data-dcnode-id="1606" instrument_node="">2</span></sub><span data-dcnode-id="1604" instrument_node="">. Estimating </span><span class="MathJax_Preview" data-dcnode-id="1603" style="color: inherit; display: none;"></span><span class="MathJax" data-dcnode-id="1561" data-mathml="<math xmlns=&quot;http://www.w3.org/1998/Math/MathML&quot; id=&quot;M1&quot;><mrow><mover accent=&quot;true&quot;><mtext>V</mtext><mo>&amp;#x2D9;</mo></mover><msub><mtext>O</mtext><mn>2</mn></msub></mrow></math>" id="MathJax-Element-1-Frame" role="presentation" style="position: relative;" tabindex="0"><nobr aria-hidden="true" data-dcnode-id="1575"><span class="math" data-dcnode-id="1576" id="M1" style="width: 2.055em; display: inline-block;"><span data-dcnode-id="1578" style="display: inline-block; position: relative; width: 1.852em; height: 0px; font-size: 111%;"><span data-dcnode-id="1579" style="position: absolute; clip: rect(1.077em, 1001.85em, 2.402em, -1000em); top: -2.102em; left: 0em;"><span class="mrow" data-dcnode-id="1581" id="MathJax-Span-2"><span class="mrow" data-dcnode-id="1582" id="MathJax-Span-3"><span class="mover" data-dcnode-id="1593" id="MathJax-Span-4"><span data-dcnode-id="1594" style="display: inline-block; position: relative; width: 0.701em; height: 0px;"><span data-dcnode-id="1599" style="position: absolute; clip: rect(3.216em, 1000.68em, 4.175em, -1000em); top: -4.004em; left: 0em;"><span class="mtext" data-dcnode-id="1601" id="MathJax-Span-5"><img data-dcnode-id="1602" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//cdnjs.cloudflare.com/ajax/libs/mathjax/2.7.1/fonts/HTML-CSS/TeX/png/Main/Regular/400/0056.png%3FV%3D2.7.1&amp;raw" style="width: 14px; height: 13px; vertical-align: -1px; margin-right: 0.019em;"></span><span data-dcnode-id="1600" style="display: inline-block; width: 0px; height: 4.004em;"></span></span><span data-dcnode-id="1595" style="position: absolute; clip: rect(3.229em, 1000.29em, 3.641em, -1000em); top: -4.254em; left: 0.117em;"><span class="mo" data-dcnode-id="1597" id="MathJax-Span-6"><img data-dcnode-id="1598" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//cdnjs.cloudflare.com/ajax/libs/mathjax/2.7.1/fonts/HTML-CSS/TeX/png/Main/Regular/400/02D9.png%3FV%3D2.7.1&amp;raw" style="width: 6px; height: 2px; vertical-align: 10px; margin-right: 0.178em;"></span><span data-dcnode-id="1596" style="display: inline-block; width: 0px; height: 4.004em;"></span></span></span></span><span class="msub" data-dcnode-id="1583" id="MathJax-Span-7"><span data-dcnode-id="1584" style="display: inline-block; position: relative; width: 1.136em; height: 0px;"><span data-dcnode-id="1589" style="position: absolute; clip: rect(3.195em, 1000.67em, 4.175em, -1000em); top: -4.004em; left: 0em;"><span class="mtext" data-dcnode-id="1591" id="MathJax-Span-8"><img data-dcnode-id="1592" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//cdnjs.cloudflare.com/ajax/libs/mathjax/2.7.1/fonts/HTML-CSS/TeX/png/Main/Regular/400/004F.png%3FV%3D2.7.1&amp;raw" style="width: 13px; height: 14px; vertical-align: 0px; margin-right: 0.052em;"></span><span data-dcnode-id="1590" style="display: inline-block; width: 0px; height: 4.004em;"></span></span><span data-dcnode-id="1585" style="position: absolute; top: -3.854em; left: 0.727em;"><span class="mn" data-dcnode-id="1587" id="MathJax-Span-9" style="font-size: 70.7%;"><img data-dcnode-id="1588" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//cdnjs.cloudflare.com/ajax/libs/mathjax/2.7.1/fonts/HTML-CSS/TeX/png/Main/Regular/283/0032.png%3FV%3D2.7.1&amp;raw" style="width: 6px; height: 9px; margin-right: 0.048em;"></span><span data-dcnode-id="1586" style="display: inline-block; width: 0px; height: 4.004em;"></span></span></span></span></span></span><span data-dcnode-id="1580" style="display: inline-block; width: 0px; height: 2.102em;"></span></span></span><span data-dcnode-id="1577" style="display: inline-block; overflow: hidden; vertical-align: -0.222em; border-left: 0px solid; width: 0px; height: 1.249em;"></span></span></nobr><span class="MJX_Assistive_MathML" data-dcnode-id="1562" role="presentation"><math data-dcnode-id="1563" id="M1" xmlns="http://www.w3.org/1998/Math/MathML"><mrow data-dcnode-id="1564"><mover accent="true" data-dcnode-id="1570"><mtext data-dcnode-id="1573"><span data-dcnode-id="1574" instrument_node="">V</span></mtext><mo data-dcnode-id="1571"><span data-dcnode-id="1572" instrument_node="">˙</span></mo></mover><msub data-dcnode-id="1565"><mtext data-dcnode-id="1568"><span data-dcnode-id="1569" instrument_node="">O</span></mtext><mn data-dcnode-id="1566"><span data-dcnode-id="1567" instrument_node="">2</span></mn></msub></mrow></math></span></span><span data-dcnode-id="1558" instrument_node=""> during resting apnea, based on RMR measurements via indirect calorimetry (</span><a data-dcnode-id="1556" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//s7.addthis.com/static/sh.f48a1a04fe8dbf021b4cda1d.html%23B11"><span data-dcnode-id="1557" instrument_node="">Byrne et al., 2005</span></a><span data-dcnode-id="1555" instrument_node="">), 2.67 mL O</span><sub data-dcnode-id="1553"><span data-dcnode-id="1554" instrument_node="">2</span></sub><span data-dcnode-id="1552" instrument_node="">/kg/min, as approximately 200 mL O</span><sub data-dcnode-id="1550"><span data-dcnode-id="1551" instrument_node="">2</span></sub><span data-dcnode-id="1549" instrument_node="">/min, the extra O</span><sub data-dcnode-id="1547"><span data-dcnode-id="1548" instrument_node="">2</span></sub><span data-dcnode-id="1546" instrument_node=""> stored in the three top-scoring divers would last for 30 s. The smaller spleens in the three lowest-scoring divers would, assuming a similar 50% spleen volume reduction, contribute extra O</span><sub data-dcnode-id="1544"><span data-dcnode-id="1545" instrument_node="">2</span></sub><span data-dcnode-id="1543" instrument_node=""> lasting approximately 15 s. Thus, the three best divers could extend apneic duration by 15 s in comparison to the three lowest-scoring divers, due to the extra O</span><sub data-dcnode-id="1541"><span data-dcnode-id="1542" instrument_node="">2</span></sub><span data-dcnode-id="1540" instrument_node=""> storage capacity resulting from the Hb expelled by their larger spleens.</span></p><span data-dcnode-id="1538" instrument_node="">
</span><div class="DottedLine" data-dcnode-id="1537"></div><span data-dcnode-id="1536" instrument_node="">
