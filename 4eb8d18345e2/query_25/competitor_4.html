pecifically for baseball players. After checking out the baseball workouts on STACK.com, browse through the articles and videos below for drills, advice, and motivation from some of the nation’s top coaches, college baseball programs, and elite athletes.</span></span></span></a></li><li class="menu-item menu-item-type-taxonomy menu-item-object-category menu-item-314601 fusion-dropdown-submenu" data-dcnode-id="2239" id="menu-item-314601"><span class="background-default transition-fade" data-dcnode-id="2246"></span><span class="background-active transition-fade" data-dcnode-id="2245"></span><a class="fusion-background-highlight" data-dcnode-id="2240" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.stack.com/a/category/basketball/"><span data-dcnode-id="2241"><span data-dcnode-id="2244" instrument_node="">Basketball</span><span class="fusion-menu-description" data-dcnode-id="2242"><span data-dcnode-id="2243" instrument_node="">Basketball is a fast-paced sport that requires explosive strength, top speed, agility and fine-tuned on-court skills. You’ll find the basketball workouts and drills you’re looking for to take your game to the next level. Come back daily for basketball training videos and drills from some of the nation’s top basketball programs and advice from professional coaches and trainers.</span></span></span></a></li><li class="menu-item menu-item-type-taxonomy menu-item-object-category menu-item-314602 fusion-dropdown-submenu" data-dcnode-id="2231" id="menu-item-314602"><span class="background-default transition-fade" data-dcnode-id="2238"></span><span class="background-active transition-fade" data-dcnode-id="2237"></span><a class="fusion-background-highlight" data-dcnode-id="2232" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.stack.com/a/category/football/"><span data-dcnode-id="2233"><span data-dcnode-id="2236" instrument_node="">Football</span><span class="fusion-menu-description" data-dcnode-id="2234"><span data-dcnode-id="2235" instrument_node="">If you want to become a better football player, regardless of your position, you’ll need to develop a high level of conditioning. At STACK, you’ll not only get football-specific conditioning workouts, you’ll also find strength and power workouts from pros. Build your football workout today!</span></span></span></a></li><li class="menu-item menu-item-type-taxonomy menu-item-object-category menu-item-314603 fusion-dropdown-submenu" data-dcnode-id="2223" id="menu-item-314603"><span class="background-default transition-fade" data-dcnode-id="2230"></span><span class="background-active transition-fade" data-dcnode-id="2229"></span><a class="fusion-background-highlight" data-dcnode-id="2224" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.stack.com/a/category/hockey/"><span data-dcnode-id="2225"><span data-dcnode-id="2228" instrument_node="">Hockey</span><span class="fusion-menu-description" data-dcnode-id="2226"><span data-dcnode-id="2227" instrument_node="">Check out STACK’s workouts and drills tailored specifically for hockey players. Whether you want to become a stronger skater, develop your stick-handling skills, buy better gear or eat healthier, you’ll find everything you need at STACK.com. Check out hockey drills and workouts from goaltender Jean-Sebastien Giguere, defenseman Duncan Keith, the University of Michigan hockey team and others.</span></span></span></a></li><li class="menu-item menu-item-type-taxonomy menu-item-object-category menu-item-314604 fusion-dropdown-submenu" data-dcnode-id="2215" id="menu-item-314604"><span class="background-default transition-fade" data-dcnode-id="2222"></span><span class="background-active transition-fade" data-dcnode-id="2221"></span><a class="fusion-background-highlight" data-dcnode-id="2216" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.stack.com/a/category/lacrosse/"><span data-dcnode-id="2217"><span data-dcnode-id="2220" instrument_node="">Lacrosse</span><span class="fusion-menu-description" data-dcnode-id="2218"><span data-dcnode-id="2219" instrument_node="">Through STACK, you’ll find the explosive workouts, conditioning and full-body strength training you need to get bigger, faster and stronger on the lacrosse field. In addition to off-season lacrosse workouts, you’ll find plenty of on-the-field drill for all lacrosse positions. For more lacrosse training, nutrition and gear advice from the nation’s top coaches and players, see our lacrosse training videos.</span></span></span></a></li><li class="menu-item menu-item-type-taxonomy menu-item-object-category menu-item-314605 fusion-dropdown-submenu" data-dcnode-id="2207" id="menu-item-314605"><span class="background-default transition-fade" data-dcnode-id="2214"></span><span class="background-active transition-fade" data-dcnode-id="2213"></span><a class="fusion-background-highlight" data-dcnode-id="2208" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.stack.com/a/category/soccer/"><span data-dcnode-id="2209"><span data-dcnode-id="2212" instrument_node="">Soccer</span><span class="fusion-menu-description" data-dcnode-id="2210"><span data-dcnode-id="2211" instrument_node="">Become a better soccer player through the conditioning workouts, speed training and foot drills on STACK.com. With content ranging from Abby Wambach’s workout to the latest gear reviews to Real Salt Lake’s speed training, there’s something here for soccer players of all levels. Check out more workouts and drills in our soccer training video gallery.</span></span></span></a></li><li class="menu-item menu-item-type-taxonomy menu-item-object-category menu-item-314606 fusion-dropdown-submenu" data-dcnode-id="2199" id="menu-item-314606"><span class="background-default transition-fade" data-dcnode-id="2206"></span><span class="background-active transition-fade" data-dcnode-id="2205"></span><a class="fusion-background-highlight" data-dcnode-id="2200" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.stack.com/a/category/softball/"><span data-dcnode-id="2201"><span data-dcnode-id="2204" instrument_node="">Softball</span><span class="fusion-menu-description" data-dcnode-id="2202"><span data-dcnode-id="2203" instrument_node="">Take your game to the next level with softball drills and workouts at STACK.com. Whether you want to become a better infielder, develop your bunt technique or increase pitching power, you’ll find videos, articles and interviews with some of the game’s top minds to help you become a better player. For even more softball training, check out softball video library.</span></span></span></a></li><li class="menu-item menu-item-type-taxonomy menu-item-object-category menu-item-314599 fusion-dropdown-submenu" data-dcnode-id="2191" id="menu-item-314599"><span class="background-default transition-fade" data-dcnode-id="2198"></span><span class="background-active transition-fade" data-dcnode-id="2197"></span><a class="fusion-background-highlight" data-dcnode-id="2192" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.stack.com/a/category/wrestling/"><span data-dcnode-id="2193"><span data-dcnode-id="2196" instrument_node="">Wrestling</span><span class="fusion-menu-description" data-dcnode-id="2194"><span data-dcnode-id="2195" instrument_node="">Train for wrestling with workouts that provide the explosive strength and power you need to take down an opponent. In addition to STACK’s wrestling workouts, we also provide plenty of nutrition advice to help wrestlers make and maintain weight throughout their training. Maximize your performance with workouts, drills and advice from coaches and athletes from some of the top college wrestling programs in the nation in our wrestling training video library.</span></span></span></a></li><li class="menu-item menu-item-type-taxonomy menu-item-object-category menu-item-314598 fusion-dropdown-submenu" data-dcnode-id="2183" id="menu-item-314598"><span class="background-default transition-fade" data-dcnode-id="2190"></span><span class="background-active transition-fade" data-dcnode-id="2189"></span><a class="fusion-background-highlight" data-dcnode-id="2184" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.stack.com/a/category/volleyball/"><span data-dcnode-id="2185"><span data-dcnode-id="2188" instrument_node="">Volleyball</span><span class="fusion-menu-description" data-dcnode-id="2186"><span data-dcnode-id="2187" instrument_node="">STACK has the volleyball drills and workouts you need to take your game to the next level. Develop first-step quickness, serve with power and add inches to your vertical with volleyball training from some of today’s top coaches. Once you’ve built up your conditioning, check out some of our advanced volleyball drills and mental techniques. For even more volleyball training content, check out our volleyball video library.</span></span></span></a></li></ul></li><li class="menu-item menu-item-type-taxonomy menu-item-object-category current-post-ancestor menu-item-314106" data-dcnode-id="2173" data-item-id="314106" id="menu-item-314106"><span class="background-default transition-fade" data-dcnode-id="2180"></span><span class="background-active transition-fade" data-dcnode-id="2179"></span><a class="fusion-flex-link fusion-background-highlight fusion-has-description" data-dcnode-id="2174" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.stack.com/a/category/training/"><span class="menu-text" data-dcnode-id="2175"><span data-dcnode-id="2178" instrument_node="">Training</span><span class="fusion-menu-description" data-dcnode-id="2176"><span data-dcnode-id="2177" instrument_node="">Sports performance training is the physical and mental process of working toward specific athletic, performance or fitness goals through a regimented program. Research shows that to significantly improve sports performance, overall athleticism and physical ability, athletes must complete training sessions in addition to playing their sport. Training refers to the workouts, exercises and drills they perform outside of organized practices to improve their Strength, Speed, Conditioning and Flexibility, as well to rehab and prevent injury. Well-rounded programs also include Sports Psychology training. Maximize your sports performance with advice from today’s top coaches and elite athletes.</span></span></span></a></li><li class="menu-item menu-item-type-taxonomy menu-item-object-category menu-item-has-children menu-item-307410 fusion-dropdown-menu" data-dcnode-id="2156" data-item-id="307410" id="menu-item-307410"><span class="background-default transition-fade" data-dcnode-id="2172"></span><span class="background-active transition-fade" data-dcnode-id="2171"></span><a class="fusion-flex-link fusion-background-highlight fusion-has-description" data-dcnode-id="2165" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.stack.com/a/category/recruiting-lifestyle/"><span class="menu-text" data-dcnode-id="2167"><span data-dcnode-id="2170" instrument_node="">College Recruiting</span><span class="fusion-menu-description" data-dcnode-id="2168"><span data-dcnode-id="2169" instrument_node="">The athletic recruiting process is a lot like dating, with college coaches/scouts and high-school student-athletes sizing each other up and searching for the right match. The process requires participants to understand and observe NCAA rules and regulations, conduct thorough research, schedule home and campus visits, network and communicate appropriately, and, for most student-athletes, engage in self-marketing. Learn best practices from athletes who have achieved success and the experts who have helped them.</span></span></span><span class="fusion-open-nav-submenu" data-dcnode-id="2166"></span></a><button aria-expanded="false" aria-label="Open </span><p data-dcnode-id="1678"><span data-dcnode-id="1679" instrument_node="">Anaerobic forms of exercise feature short yet intense bursts of high-effort movement. You can only perform this type of exercise for a short period of time (0-120 seconds) before needing to rest. Think sprinting or lifting a heavy weight. Most athletes’ regimens largely consist of anaerobic exercise.</span></p><span data-dcnode-id="1677" instrument_node="">
</span><p data-dcnode-id="1675"><span data-dcnode-id="1676" instrument_node="">Aerobic exercise, on the other hand, features lower intensity yet longer duration. Think jogging or walking. Aerobic exercise may not be as flashy as anaerobic exercise, or as capable of producing the same type of superficial results, but it remains a critical aspect in athletic performance. Let’s dive into this form of exercise to give you a better idea of why every athlete needs aerobic training.</span></p><div class="advads-content" data-dcnode-id="1665" id="advads-1145529522"><span data-dcnode-id="1672" instrument_node="">

</span></div><span data-dcnode-id="1664" instrument_node="">
</span><h2 class="fusion-responsive-typography-calculated" data-dcnode-id="1662" data-fontsize="28" data-lineheight="33.6px" style="--fontSize:28; line-height: 1.2;"><span data-dcnode-id="1663" instrument_node="">What is Aerobic Training?</span></h2><span data-dcnode-id="1661" instrument_node="">
</span><p data-dcnode-id="1659"><img alt="" class="lazyload alignnone wp-image-293629 size-full" data-dcnode-id="1660" data-orig-sizes="(max-width: 654px) 100vw, 654px" data-orig-src="https://media.stack.com/stack-content/uploads/2018/08/10174036/Aerobic-Training-Athletes-STACK.jpg" data-sizes="auto" data-srcset="https://media.stack.com/stack-content/uploads/2018/08/10174036/Aerobic-Training-Athletes-STACK-200x113.jpg 200w, https://media.stack.com/stack-content/uploads/2018/08/10174036/Aerobic-Training-Athletes-STACK-300x169.jpg 300w, https://media.stack.com/stack-content/uploads/2018/08/10174036/Aerobic-Training-Athletes-STACK-400x225.jpg 400w, https://media.stack.com/stack-content/uploads/2018/08/10174036/Aerobic-Training-Athletes-STACK-600x338.jpg 600w, https://media.stack.com/stack-content/uploads/2018/08/10174036/Aerobic-Training-Athletes-STACK.jpg 654w" height="368" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//media.stack.com/stack-content/uploads/2018/08/10174036/Aerobic-Training-Athletes-STACK.jpg&amp;raw" srcset="data:image/svg+xml,%3Csvg%20xmlns%3D%27http%3A%2F%2Fwww.w3.org%2F2000%2Fsvg%27%20width%3D%27654%27%20height%3D%27368%27%20viewBox%3D%270%200%20654%20368%27%3E%3Crect%20width%3D%27654%27%20height%3D%27368%27%20fill-opacity%3D%220%22%2F%3E%3C%2Fsvg%3E" width="654"></p><span data-dcnode-id="1658" instrument_node="">
</span><p data-dcnode-id="1656"><span data-dcnode-id="1657" instrument_node="">Aerobic training, also known as cardio, improves an athlete’s ability to use oxygen to sustain activity for periods of time. The aerobic energy system utilizes fats, carbohydrates and sometimes proteins for re-synthesizing of Adenosine Triphosphate (ATP) for energy use. ATP is the primary energy carrier in all living organisms. The aerobic system produces far more ATP than either of the other energy systems (the other two being the lactic acid system and the ATP-PC system), but it produces the ATP much more slowly. Therefore, it cannot fuel intense exercise that demands fast production of ATP. However, aerobic training for athletes is key to optimizing performance.</span></p><span data-dcnode-id="1655" instrument_node="">
</span><h2 class="fusion-responsive-typography-calculated" data-dcnode-id="1653" data-fontsize="28" data-lineheight="33.6px" style="--fontSize:28; line-height: 1.2;"><span data-dcnode-id="1654" instrument_node="">Why Does Aerobic Training Matter for Athletes?</span></h2><span data-dcnode-id="1652" instrument_node="">
</span><p data-dcnode-id="1650"><span data-dcnode-id="1651" instrument_node="">The aerobic system is the dominant source of energy in sport and activities lasting longer than 3 minutes of continuous activity. But even if you aren’t one of these types of athletes, you can benefit from aerobic training. Building a larger aerobic base will help increase anaerobic thresholds and improve your energy efficiency.</span></p><span data-dcnode-id="1649" instrument_node="">
</span><p data-dcnode-id="1647"><span data-dcnode-id="1648" instrument_node="">Just as our bodies develop fast-twitch muscle fibers in response to anaerobic exercise, our bodies also adapt to aerobic exercise. Sustained workouts of low-to-moderate intensity improve your body’s ability to breathe and use oxygen. Here are the types of adjustments our bodies make internally to make these improvements:</span></p><span data-dcnode-id="1646" instrument_node="">
</span><ol data-dcnode-id="1626"><span data-dcnode-id="1645" instrument_node="">
</span><li data-dcnode-id="1643"><span data-dcnode-id="1644" instrument_node="">Increases in the number of mitochondria inside muscle cells that produce energy from oxygen</span></li><span data-dcnode-id="1642" instrument_node="">
</span><li data-dcnode-id="1640"><span data-dcnode-id="1641" instrument_node="">Increases in the muscle’s ability to use fat as fuel</span></li><span data-dcnode-id="1639" instrument_node="">
</span><li data-dcnode-id="1637"><span data-dcnode-id="1638" instrument_node="">Greater lung capacity</span></li><span data-dcnode-id="1636" instrument_node="">
</span><li data-dcnode-id="1634"><span data-dcnode-id="1635" instrument_node="">Improved heart stroke volume (the amount of blood pumped with each beat)</span></li><span data-dcnode-id="1633" instrument_node="">
</span><li data-dcnode-id="1631"><span data-dcnode-id="1632" instrument_node="">Changes in hormones that break down and move fat through the body for use as a fuel</span></li><span data-dcnode-id="1630" instrument_node="">
</span><li data-dcnode-id="1628"><span data-dcnode-id="1629" instrument_node="">Increased lean body mass</span></li><span data-dcnode-id="1627" instrument_node="">
</span></ol><span data-dcnode-id="1625" instrument_node="">
</span><p data-dcnode-id="1623"><span data-dcnode-id="1624" instrument_node="">Obviously, such changes hold benefit for a huge variety of athletes.</span></p><div class="advads-content_2" data-dcnode-id="1613" id="advads-271319752"><span data-dcnode-id="1620" instrument_node="">
</span><div class="content-ad-2" data-dcnode-id="1614" style="margin: 20px auto; text-align: center; width: 100%;"><span data-dcnode-id="1619" instrument_node="">
</span><span data-dcnode-id="1617" instrument_node="">
</span><div class="tmsads" data-dcnode-id="1616" id="unit-1631716722074"></div><span data-dcnode-id="1615" instrument_node="">
</span></div></div><span data-dcnode-id="1612" instrument_node="">
</span><h2 class="fusion-responsive-typography-calculated" data-dcnode-id="1610" data-fontsize="28" data-lineheight="33.6px" style="--fontSize:28; line-height: 1.2;"><span data-dcnode-id="1611" instrument_node="">What are the Best Aerobic Training Workouts?</span></h2><span data-dcnode-id="1609" instrument_node="">
</span><p data-dcnode-id="1607"><img alt="" class="lazyload alignnone wp-image-293627 size-full" data-dcnode-id="1608" data-orig-sizes="(max-width: 654px) 100vw, 654px" data-orig-src="https://media.stack.com/stack-content/uploads/2018/08/10174032/Aerobic-Training-STACK.jpg" data-sizes="auto" data-srcset="https://media.stack.com/stack-content/uploads/2018/08/10174032/Aerobic-Training-STACK-200x113.jpg 200w, https://media.stack.com/stack-content/uploads/2018/08/10174032/Aerobic-Training-STACK-300x169.jpg 300w, https://media.stack.com/stack-content/uploads/2018/08/10174032/Aerobic-Training-STACK-400x225.jpg 400w, https://media.stack.com/stack-content/uploads/2018/08/10174032/Aerobic-Training-STACK-600x338.jpg 600w, https://media.stack.com/stack-content/uploads/2018/08/10174032/Aerobic-Training-STACK.jpg 654w" height="368" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//media.stack.com/stack-content/uploads/2018/08/10174032/Aerobic-Training-STACK.jpg&amp;raw" srcset="data:image/svg+xml,%3Csvg%20xmlns%3D%27http%3A%2F%2Fwww.w3.org%2F2000%2Fsvg%27%20width%3D%27654%27%20height%3D%27368%27%20viewBox%3D%270%200%20654%20368%27%3E%3Crect%20width%3D%27654%27%20height%3D%27368%27%20fill-opacity%3D%220%22%2F%3E%3C%2Fsvg%3E" width="654"></p><span data-dcnode-id="1606" instrument_node="">
</span><p data-dcnode-id="1604"><span data-dcnode-id="1605" instrument_node="">Intensity (how hard), duration (how long) and frequency (how often) are the keys to consider when it comes to improving your ability to maintain aerobic activity. Fitness improves when intensity is between 70-80% of maximum heart rate, but this may not be adequate enough for endurance athletes in some sports and events.</span></p><span data-dcnode-id="1603" instrument_node="">
</span><p data-dcnode-id="1601"><span data-dcnode-id="1602" instrument_node="">Elite endurance athletes often utilize high-intensity interval (HIIT) exercise in their training regimens. Recent studies indicate that HIIT is a time-efficient strategy to stimulate a number of muscle adaptations that are comparable to traditional endurance training. Athletes may include other sport-specific activities in interval training workouts.</span></p><span data-dcnode-id="1600" instrument_node="">
</span><p data-dcnode-id="1598"><span data-dcnode-id="1599" instrument_node="">The aerobic energy system can be developed with various types of training, including interval, continuous and Fartlek.</span></p><span data-dcnode-id="1597" instrument_node="">
</span><ul data-dcnode-id="1586"><span data-dcnode-id="1596" instrument_node="">
</span><li data-dcnode-id="1594"><span data-dcnode-id="1595" instrument_node="">Interval training for the long-term aerobic energy system would have a work-rest ratio of 1:1 or 1:2. The work periods would usually exceed several minutes and the rest periods would be active but at a lower intensity that could be sustained.</span></li><span data-dcnode-id="1593" instrument_node="">
</span><li data-dcnode-id="1591"><span data-dcnode-id="1592" instrument_node="">Continuous training is training that maintains a constant intensity and lasts for a prolonged period of time (usually longer than 15 minutes.)</span></li><span data-dcnode-id="1590" instrument_node="">
</span><li data-dcnode-id="1588"><span data-dcnode-id="1589" instrument_node="">“Fartlek” training, Fartlek being Swedish for “speed play,” is a type of interval training where the exerciser varies the speed and effort throughout the training session according to how they feel, ensuring that they can continue to exercise at all times. There are no rest intervals in this type of training, but the intensity is varied, making it a sort of mixture between interval and continuous training.</span></li><span data-dcnode-id="1587" instrument_node="">
</span></ul><span data-dcnode-id="1585" instrument_node="">
</span><p data-dcnode-id="1580"><span data-dcnode-id="1584" instrument_node="">Examples of </span><a data-dcnode-id="1582" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.stack.com/a/4-cardio-workouts-that-dont-suck" rel="noopener" target="_blank"><span data-dcnode-id="1583" instrument_node="">aerobic training workouts</span></a><span data-dcnode-id="1581" instrument_node=""> include:</span></p><div class="advads-content_3" data-dcnode-id="1570" id="advads-148293293"><span data-dcnode-id="1577" instrument_node="">
</span><div class="content-ad-3" data-dcnode-id="1571" style="margin: 20px auto; text-align: center; width: 100%;"><span data-dcnode-id="1576" instrument_node="">
</span><span data-dcnode-id="1574" instrument_node="">
</span><div class="tmsads" data-dcnode-id="1573" id="unit-1631716739048"></div><span data-dcnode-id="1572" instrument_node="">
</span></div></div><span data-dcnode-id="1569" instrument_node="">
</span><ul data-dcnode-id="1558"><span data-dcnode-id="1568" instrument_node="">
</span><li data-dcnode-id="1566"><span data-dcnode-id="1567" instrument_node="">Running for two minutes at moderate/high intensity, followed by two minutes at low intensity (active recovery). Continue this sequence for 30 minutes.</span></li><span data-dcnode-id="1565" instrument_node="">
</span><li data-dcnode-id="1563"><span data-dcnode-id="1564" instrument_node="">30 minutes low/moderate intensity cycling, swimming or jogging without changing intensity.</span></li><span data-dcnode-id="1562" instrument_node="">
</span><li data-dcnode-id="1560"><span data-dcnode-id="1561" instrument_node="">A 30-minute jog on a route that includes hills, thereby ensuring bursts of extra effort every now and then, but never stopping throughout the jog.</span></li><span data-dcnode-id="1559" instrument_node="">
</span></ul><span data-dcnode-id="1557" instrument_node="">
</span><p data-dcnode-id="1555"><span data-dcnode-id="1556" instrument_node="">Aerobic training is much more than simply plodding away on a treadmill for a seemingly endless amount of time. Tuning your aerobic training to your athletic needs ensures the benefits you’re receiving can help you elevate your performance.</span></p><span data-dcnode-id="1554" instrument_node="">

</span></div></div><span data-dcnode-id="830" instrument_node="">
</span><p data-dcnode-id="828"><span data-dcnode-id="829" instrument_node="">Anaerobic forms of exercise feature short yet intense bursts of high-effort movement. You can only perform this type of exercise for a short period of time (0-120 seconds) before needing to rest. Think sprinting or lifting a heavy weight. Most athletes’ regimens largely consist of anaerobic exercise.</span></p><span data-dcnode-id="827" instrument_node="">
</span><p data-dcnode-id="825"><span data-dcnode-id="826" instrument_node="">Aerobic exercise, on the other hand, features lower intensity yet longer duration. Think jogging or walking. Aerobic exercise may not be as flashy as anaerobic exercise, or as capable of producing the same type of superficial results, but it remains a critical aspect in athletic performance. Let’s dive into this form of exercise to give you a better idea of why every athlete needs aerobic training.</span></p><div class="advads-mobile-content-1_2" data-dcnode-id="815" id="advads-1651700538"><span data-dcnode-id="822" instrument_node="">
</span><div class="content-ad-1" data-dcnode-id="817" style="margin: 20px auto; text-align: center; width: 100%;"><span data-dcnode-id="820" instrument_node="">
</span><div class="tmsads" data-dcnode-id="819" id="unit-1631716707554"></div><span data-dcnode-id="818" instrument_node="">
</span></div><span data-dcnode-id="816" instrument_node="">
</span></div><span data-dcnode-id="814" instrument_node="">
</span><h2 class="fusion-responsive-typography-calculated" data-dcnode-id="812" data-fontsize="28" data-lineheight="33.6px" style="--fontSize:28; line-height: 1.2;"><span data-dcnode-id="813" instrument_node="">What is Aerobic Training?</span></h2><span data-dcnode-id="811" instrument_node="">
</span><p data-dcnode-id="809"><img alt="" class="alignnone wp-image-293629 size-full lazyautosizes lazyloaded" data-dcnode-id="810" data-orig-sizes="(max-width: 654px) 100vw, 654px" data-orig-src="https://media.stack.com/stack-content/uploads/2018/08/10174036/Aerobic-Training-Athletes-STACK.jpg" data-sizes="auto" data-srcset="https://media.stack.com/stack-content/uploads/2018/08/10174036/Aerobic-Training-Athletes-STACK-200x113.jpg 200w, https://media.stack.com/stack-content/uploads/2018/08/10174036/Aerobic-Training-Athletes-STACK-300x169.jpg 300w, https://media.stack.com/stack-content/uploads/2018/08/10174036/Aerobic-Training-Athletes-STACK-400x225.jpg 400w, https://media.stack.com/stack-content/uploads/2018/08/10174036/Aerobic-Training-Athletes-STACK-600x338.jpg 600w, https://media.stack.com/stack-content/uploads/2018/08/10174036/Aerobic-Training-Athletes-STACK.jpg 654w" height="368" sizes="298px" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//media.stack.com/stack-content/uploads/2018/08/10174036/Aerobic-Training-Athletes-STACK.jpg&amp;raw" srcset="https://media.stack.com/stack-content/uploads/2018/08/10174036/Aerobic-Training-Athletes-STACK-200x113.jpg 200w, https://media.stack.com/stack-content/uploads/2018/08/10174036/Aerobic-Training-Athletes-STACK-300x169.jpg 300w, https://media.stack.com/stack-content/uploads/2018/08/10174036/Aerobic-Training-Athletes-STACK-400x225.jpg 400w, https://media.stack.com/stack-content/uploads/2018/08/10174036/Aerobic-Training-Athletes-STACK-600x338.jpg 600w, https://media.stack.com/stack-content/uploads/2018/08/10174036/Aerobic-Training-Athletes-STACK.jpg 654w" width="654"></p><span data-dcnode-id="808" instrument_node="">
</span><p data-dcnode-id="806"><span data-dcnode-id="807" instrument_node="">Aerobic training, also known as cardio, improves an athlete’s ability to use oxygen to sustain activity for periods of time. The aerobic energy system utilizes fats, carbohydrates and sometimes proteins for re-synthesizing of Adenosine Triphosphate (ATP) for energy use. ATP is the primary energy carrier in all living organisms. The aerobic system produces far more ATP than either of the other energy systems (the other two being the lactic acid system and the ATP-PC system), but it produces the ATP much more slowly. Therefore, it cannot fuel intense exercise that demands fast production of ATP. However, aerobic training for athletes is key to optimizing performance.</span></p><span data-dcnode-id="805" instrument_node="">
</span><h2 class="fusion-responsive-typography-calculated" data-dcnode-id="803" data-fontsize="28" data-lineheight="33.6px" style="--fontSize:28; line-height: 1.2;"><span data-dcnode-id="804" instrument_node="">Why Does Aerobic Training Matter for Athletes?</span></h2><span data-dcnode-id="802" instrument_node="">
</span><p data-dcnode-id="800"><span data-dcnode-id="801" instrument_node="">The aerobic system is the dominant source of energy in sport and activities lasting longer than 3 minutes of continuous activity. But even if you aren’t one of these types of athletes, you can benefit from aerobic training. Building a larger aerobic base will help increase anaerobic thresholds and improve your energy efficiency.</span></p><div class="advads-article-in-content-5" data-dcnode-id="790" id="advads-1229132750"><span data-dcnode-id="797" instrument_node="">
</span><div class="content-ad-5" data-dcnode-id="791" style="margin: 20px auto; text-align: center; width: 100%;"><span data-dcnode-id="796" instrument_node="">
</span><span data-dcnode-id="794" instrument_node="">
</span><div class="tmsads" data-dcnode-id="793" id="unit-1631716770262"></div><span data-dcnode-id="792" instrument_node="">
</span></div></div><span data-dcnode-id="789" instrument_node="">
</span><p data-dcnode-id="787"><span data-dcnode-id="788" instrument_node="">Just as our bodies develop fast-twitch muscle fibers in response to anaerobic exercise, our bodies also adapt to aerobic exercise. Sustained workouts of low-to-moderate intensity improve your body’s ability to breathe and use oxygen. Here are the types of adjustments our bodies make internally to make these improvements:</span></p><div class="advads-mobile-content-2" data-dcnode-id="777" id="advads-1592133185"><span data-dcnode-id="784" instrument_node="">
</span><div class="content-ad-2" data-dcnode-id="778" style="margin: 20px auto; text-align: center; width: 100%;"><span data-dcnode-id="783" instrument_node="">
</span><span data-dcnode-id="781" instrument_node="">
</span><div class="tmsads" data-dcnode-id="780" id="unit-1631716722074"></div><span data-dcnode-id="779" instrument_node="">
</span></div></div><span data-dcnode-id="776" instrument_node="">
</span><ol data-dcnode-id="756"><span data-dcnode-id="775" instrument_node="">
</span><li data-dcnode-id="773"><span data-dcnode-id="774" instrument_node="">Increases in the number of mitochondria inside muscle cells that produce energy from oxygen</span></li><span data-dcnode-id="772" instrument_node="">
</span><li data-dcnode-id="770"><span data-dcnode-id="771" instrument_node="">Increases in the muscle’s ability to use fat as fuel</span></li><span data-dcnode-id="769" instrument_node="">
</span><li data-dcnode-id="767"><span data-dcnode-id="768" instrument_node="">Greater lung capacity</span></li><span data-dcnode-id="766" instrument_node="">
</span><li data-dcnode-id="764"><span data-dcnode-id="765" instrument_node="">Improved heart stroke volume (the amount of blood pumped with each beat)</span></li><span data-dcnode-id="763" instrument_node="">
</span><li data-dcnode-id="761"><span data-dcnode-id="762" instrument_node="">Changes in hormones that break down and move fat through the body for use as a fuel</span></li><span data-dcnode-id="760" instrument_node="">
</span><li data-dcnode-id="758"><span data-dcnode-id="759" instrument_node="">Increased lean body mass</span></li><span data-dcnode-id="757" instrument_node="">
</span></ol><span data-dcnode-id="755" instrument_node="">
</span><p data-dcnode-id="753"><span data-dcnode-id="754" instrument_node="">Obviously, such changes hold benefit for a huge variety of athletes.</span></p><span data-dcnode-id="752" instrument_node="">
</span><h2 class="fusion-responsive-typography-calculated" data-dcnode-id="750" data-fontsize="28" data-lineheight="33.6px" style="--fontSize:28; line-height: 1.2;"><span data-dcnode-id="751" instrument_node="">What are the Best Aerobic Training Workouts?</span></h2><span data-dcnode-id="749" instrument_node="">
</span><p data-dcnode-id="747"><img alt="" class="alignnone wp-image-293627 size-full lazyautosizes lazyloaded" data-dcnode-id="748" data-orig-sizes="(max-width: 654px) 100vw, 654px" data-orig-src="https://media.stack.com/stack-content/uploads/2018/08/10174032/Aerobic-Training-STACK.jpg" data-sizes="auto" data-srcset="https://media.stack.com/stack-content/uploads/2018/08/10174032/Aerobic-Training-STACK-200x113.jpg 200w, https://media.stack.com/stack-content/uploads/2018/08/10174032/Aerobic-Training-STACK-300x169.jpg 300w, https://media.stack.com/stack-content/uploads/2018/08/10174032/Aerobic-Training-STACK-400x225.jpg 400w, https://media.stack.com/stack-content/uploads/2018/08/10174032/Aerobic-Training-STACK-600x338.jpg 600w, https://media.stack.com/stack-content/uploads/2018/08/10174032/Aerobic-Training-STACK.jpg 654w" height="368" sizes="298px" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//media.stack.com/stack-content/uploads/2018/08/10174032/Aerobic-Training-STACK.jpg&amp;raw" srcset="https://media.stack.com/stack-content/uploads/2018/08/10174032/Aerobic-Training-STACK-200x113.jpg 200w, https://media.stack.com/stack-content/uploads/2018/08/10174032/Aerobic-Training-STACK-300x169.jpg 300w, https://media.stack.com/stack-content/uploads/2018/08/10174032/Aerobic-Training-STACK-400x225.jpg 400w, https://media.stack.com/stack-content/uploads/2018/08/10174032/Aerobic-Training-STACK-600x338.jpg 600w, https://media.stack.com/stack-content/uploads/2018/08/10174032/Aerobic-Training-STACK.jpg 654w" width="654"></p><span data-dcnode-id="746" instrument_node="">
</span><p data-dcnode-id="744"><span data-dcnode-id="745" instrument_node="">Intensity (how hard), duration (how long) and frequency (how often) are the keys to consider when it comes to improving your ability to maintain aerobic activity. Fitness improves when intensity is between 70-80% of maximum heart rate, but this may not be adequate enough for endurance athletes in some sports and events.</span></p><span data-dcnode-id="743" instrument_node="">
</span><p data-dcnode-id="741"><span data-dcnode-id="742" instrument_node="">Elite endurance athletes often utilize high-intensity interval (HIIT) exercise in their training regimens. Recent studies indicate that HIIT is a time-efficient strategy to stimulate a number of muscle adaptations that are comparable to traditional endurance training. Athletes may include other sport-specific activities in interval training workouts.</span></p><div class="advads-mobile-content-3" data-dcnode-id="731" id="advads-271763929"><span data-dcnode-id="738" instrument_node="">
</span><div class="content-ad-3" data-dcnode-id="732" style="margin: 20px auto; text-align: center; width: 100%;"><span data-dcnode-id="737" instrument_node="">
</span><span data-dcnode-id="735" instrument_node="">
</span><div class="tmsads" data-dcnode-id="734" id="unit-1631716739048"></div><span data-dcnode-id="733" instrument_node="">
</span></div></div><span data-dcnode-id="730" instrument_node="">
</span><p data-dcnode-id="728"><span data-dcnode-id="729" instrument_node="">The aerobic energy system can be developed with various types of training, including interval, continuous and Fartlek.</span></p><span data-dcnode-id="727" instrument_node="">
</span><ul data-dcnode-id="716"><span data-dcnode-id="726" instrument_node="">
</span><li data-dcnode-id="724"><span data-dcnode-id="725" instrument_node="">Interval training for the long-term aerobic energy system would have a work-rest ratio of 1:1 or 1:2. The work periods would usually exceed several minutes and the rest periods would be active but at a lower intensity that could be sustained.</span></li><span data-dcnode-id="723" instrument_node="">
</span><li data-dcnode-id="721"><span data-dcnode-id="722" instrument_node="">Continuous training is training that maintains a constant intensity and lasts for a prolonged period of time (usually longer than 15 minutes.)</span></li><span data-dcnode-id="720" instrument_node="">
</span><li data-dcnode-id="718"><span data-dcnode-id="719" instrument_node="">“Fartlek” training, Fartlek being Swedish for “speed play,” is a type of interval training where the exerciser varies the speed and effort throughout the training session according to how they feel, ensuring that they can continue to exercise at all times. There are no rest intervals in this type of training, but the intensity is varied, making it a sort of mixture between interval and continuous training.</span></li><span data-dcnode-id="717" instrument_node="">
</span></ul><span data-dcnode-id="715" instrument_node="">
</span><p data-dcnode-id="710"><span data-dcnode-id="714" instrument_node="">Examples of </span><a data-dcnode-id="712" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.stack.com/a/4-cardio-workouts-that-dont-suck" rel="noopener" target="_blank"><span data-dcnode-id="713" instrument_node="">aerobic training workouts</span></a><span data-dcnode-id="711" instrument_node=""> include:</span></p><span data-dcnode-id="709" instrument_node="">
</span><ul data-dcnode-id="698"><span data-dcnode-id="708" instrument_node="">
</span><li data-dcnode-id="706"><span data-dcnode-id="707" instrument_node="">Running for two minutes at moderate/high intensity, followed by two minutes at low intensity (active recovery). Continue this sequence for 30 minutes.</span></li><span data-dcnode-id="705" instrument_node="">
</span><li data-dcnode-id="703"><span data-dcnode-id="704" instrument_node="">30 minutes low/moderate intensity cycling, swimming or jogging without changing intensity.</span></li><span data-dcnode-id="702" instrument_node="">
</span><li data-dcnode-id="700"><span data-dcnode-id="701" instrument_node="">A 30-minute jog on a route that includes hills, thereby ensuring bursts of extra effort every now and then, but never stopping throughout the jog.</span></li><span data-dcnode-id="699" instrument_node="">
</span></ul><span data-dcnode-id="697" instrument_node="">
</span><p data-dcnode-id="695"><span data-dcnode-id="696" instrument_node="">Aerobic training is much more than simply plodding away on a treadmill for a seemingly endless amount of time. Tuning your aerobic training to your athletic needs ensures the benefits you’re receiving can help you elevate your performance.</span></p><span data-dcnode-id="694" instrument_node="">
</span><p data-dcnode-id="689"><em data-dcnode-id="692"><span data-dcnode-id="693" instrument_node="">Photo Credit: PeopleImages/iStock,&nbsp;</span></em><i data-dcnode-id="690"><span data-dcnode-id="691" instrument_node="">shironosov/iStock, FOTOKITA/iStock</span></i></p><div class="advads-mobile-content-4" data-dcnode-id="679" id="advads-57943235"><span data-dcnode-id="686" instrument_node="">

</span><span data-dcnode-id="683" instrument_node="">
</span><div class="tmsads" data-dcnode-id="682" id="unit-1631716753658"></div><span data-dcnode-id="681" instrument_node="">
</span></div></div><span data-dcnode-id="678" instrument_node="">
