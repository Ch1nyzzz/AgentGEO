nt_node="">†</span></sup></sup><i data-dcnode-id="4055"><span data-dcnode-id="4056" instrument_node="">P</span></i><span data-dcnode-id="4054" instrument_node=""> &lt; 0.01, differences between pre- and posttest.</span></p></div></div></div><div class="tableToggle__image imageTable" data-dcnode-id="4049"></div></div><div class="table__viewer__opener" data-dcnode-id="4031" id="T3"><a data-dcnode-id="4046" href="#"><i aria-hidden="true" class="icon-table" data-dcnode-id="4047"></i></a><div data-dcnode-id="4032"><p data-dcnode-id="4035"><span class="captionLabel" data-dcnode-id="4044"><span data-dcnode-id="4045" instrument_node="">Table 3.</span></span><span data-dcnode-id="4043" instrument_node=""> </span><i data-dcnode-id="4036"><span data-dcnode-id="4042" instrument_node="">V̇</span><span class="smallcaps smallerCapital" data-dcnode-id="4040"><span data-dcnode-id="4041" instrument_node="">o</span></span><sub data-dcnode-id="4038"><span data-dcnode-id="4039" instrument_node="">2max</span></sub><span data-dcnode-id="4037" instrument_node=""> test and 5,000-m time trial results measured before and after the 24-day “live high-train low” altitude training camp in the altitude group</span></i></p><a data-dcnode-id="4033" href="#"><span data-dcnode-id="4034" instrument_node="">Enlarge table</span></a></div></div></div><h3 class="article-section__title" data-dcnode-id="4028" id="_i20"><span data-dcnode-id="4029" instrument_node="">5,000-m time trials.</span></h3><p data-dcnode-id="4011"><span data-dcnode-id="4027" instrument_node="">The athletes improved 5,000-m running time by ∼18 s (1.6%; </span><i data-dcnode-id="4025"><span data-dcnode-id="4026" instrument_node="">P</span></i><span data-dcnode-id="4024" instrument_node=""> &lt; 0.05), with no difference in HR</span><sub data-dcnode-id="4022"><span data-dcnode-id="4023" instrument_node="">max</span></sub><span data-dcnode-id="4021" instrument_node="">, [La</span><sup data-dcnode-id="4019"><span data-dcnode-id="4020" instrument_node="">−</span></sup><span data-dcnode-id="4018" instrument_node="">]</span><sub data-dcnode-id="4016"><span data-dcnode-id="4017" instrument_node="">b-max</span></sub><span data-dcnode-id="4015" instrument_node=""> (</span><a class="primary-blue-color ref showTableEvent" data-dcnode-id="4013" data-id="T3" href="#T3" id="T3R"><span data-dcnode-id="4014" instrument_node="">Table 3</span></a><span data-dcnode-id="4012" instrument_node="">), or RPE (18.7 ± 0.7 vs. 19.0 ± 1.0).</span></p><h1 class="article-section__title section__title" data-dcnode-id="4009" id="_i21"><span data-dcnode-id="4010" instrument_node="">DISCUSSION</span></h1><p data-dcnode-id="3993"><span data-dcnode-id="4008" instrument_node="">The main results of the present study show that Hb</span><sub data-dcnode-id="4006"><span data-dcnode-id="4007" instrument_node="">mass</span></sub><span data-dcnode-id="4005" instrument_node=""> and RCV increased by ∼5% after living at 2,456 m while training at lower altitudes (1,800 and 1,000 m) for 24 days. There was no change in Hb</span><sub data-dcnode-id="4003"><span data-dcnode-id="4004" instrument_node="">mass</span></sub><span data-dcnode-id="4002" instrument_node=""> and RCV in a control group living and training at altitudes between 500 and 1,600 m for 24 days. The improvements in Hb</span><sub data-dcnode-id="4000"><span data-dcnode-id="4001" instrument_node="">mass</span></sub><span data-dcnode-id="3999" instrument_node=""> and RCV in the AG were associated with increased sEpo, Rct, TF, sTfR, and decreased Ftn values as well as improved V̇</span><span class="smallcaps smallerCapital" data-dcnode-id="3997"><span data-dcnode-id="3998" instrument_node="">o</span></span><sub data-dcnode-id="3995"><span data-dcnode-id="3996" instrument_node="">2 max</span></sub><span data-dcnode-id="3994" instrument_node=""> and 5,000-m running times.</span></p><h2 class="article-section__title section__title" data-dcnode-id="3991" id="_i22"><span data-dcnode-id="3992" instrument_node="">Limitations of the Study</span></h2><p data-dcnode-id="3961"><span data-dcnode-id="3990" instrument_node="">Any research conducted with elite athletes will encounter the challenge to have an appropriate control group, ideally with a randomized design. To have a sufficient number of elite endurance athletes for one altitude group and one control group, we recruited national team member athletes of two different endurance disciplines. It was not possible to randomly assign athletes to either altitude or normal training, because the athletes and coaches in each discipline preferred to train together. Thus the allocation to the AG or CG was based on the specific endurance discipline. This nonrandomized classification raises the question of whether the athletes in both groups have similar endurance characteristics. Indeed, the cross-country skiers had higher V̇</span><span class="smallcaps smallerCapital" data-dcnode-id="3988"><span data-dcnode-id="3989" instrument_node="">o</span></span><sub data-dcnode-id="3986"><span data-dcnode-id="3987" instrument_node="">2 max</span></sub><span data-dcnode-id="3985" instrument_node=""> values than the orienteers, but their V̇</span><span class="smallcaps smallerCapital" data-dcnode-id="3983"><span data-dcnode-id="3984" instrument_node="">o</span></span><sub data-dcnode-id="3981"><span data-dcnode-id="3982" instrument_node="">2 max</span></sub><span data-dcnode-id="3980" instrument_node=""> test was conducted at a lower altitude, which may partly explain the higher results (</span><a class="primary-blue-color tab-link" data-dcnode-id="3978" data-tab="pane-pcw-references" href="#R35" id="R35R"><span data-dcnode-id="3979" instrument_node="">35</span></a><span data-dcnode-id="3977" instrument_node="">). However, both groups consisted of elite athletes who have trained seriously for many years, suggesting that the differences in aerobic capacity were more a genetic predisposition than a difference in training status. Importantly, both Hb</span><sub data-dcnode-id="3975"><span data-dcnode-id="3976" instrument_node="">mass</span></sub><span data-dcnode-id="3974" instrument_node=""> and RCV were not different between the groups at pretest. We did not perform specific doping tests during the study, but it must be noted that Switzerland has one of the toughest anti-doping programs, which includes numerous unannounced doping controls. In addition, the reasonable increases in Hb</span><sub data-dcnode-id="3972"><span data-dcnode-id="3973" instrument_node="">mass</span></sub><span data-dcnode-id="3971" instrument_node=""> and RCV as well as the small variation between the subjects do not support the suspicion of blood doping during this study. It was not possible to measure sEpo, Ret, TF, and sTfR in the CG. However, these parameters have been measured in previous controlled studies with a sea-level control group (</span><a class="primary-blue-color tab-link" data-dcnode-id="3969" data-tab="pane-pcw-references" href="#R1" id="R1R"><span data-dcnode-id="3970" instrument_node="">1</span></a><span data-dcnode-id="3968" instrument_node="">, </span><a class="primary-blue-color tab-link" data-dcnode-id="3966" data-tab="pane-pcw-references" href="#R8" id="R8R"><span data-dcnode-id="3967" instrument_node="">8</span></a><span data-dcnode-id="3965" instrument_node="">), so our results may be compared with these. With the above considerations, we feel that the design adaptations made in this study to evaluate the effect of LHTL training on Hb</span><sub data-dcnode-id="3963"><span data-dcnode-id="3964" instrument_node="">mass</span></sub><span data-dcnode-id="3962" instrument_node=""> and RCV did not compromise the validity of the results.</span></p><h2 class="article-section__title section__title" data-dcnode-id="3956" id="_i23"><span data-dcnode-id="3960" instrument_node="">Increased Hb</span><sub data-dcnode-id="3958"><span data-dcnode-id="3959" instrument_node="">mass</span></sub><span data-dcnode-id="3957" instrument_node=""> and RCV After the LHTL</span></h2><p data-dcnode-id="3762"><span data-dcnode-id="3955" instrument_node="">The influence of 3- to 4-wk altitude exposure at 2,100–2,500 m on Hb</span><sub data-dcnode-id="3953"><span data-dcnode-id="3954" instrument_node="">mass</span></sub><span data-dcnode-id="3952" instrument_node=""> and RCV in endurance athletes is controversial (</span><a class="primary-blue-color tab-link" data-dcnode-id="3950" data-tab="pane-pcw-references" href="#R2" id="R2R"><span data-dcnode-id="3951" instrument_node="">2</span></a><span data-dcnode-id="3949" instrument_node="">, </span><a class="primary-blue-color tab-link" data-dcnode-id="3947" data-tab="pane-pcw-references" href="#R16" id="R16R"><span data-dcnode-id="3948" instrument_node="">16</span></a><span data-dcnode-id="3946" instrument_node="">, </span><a class="primary-blue-color tab-link" data-dcnode-id="3944" data-tab="pane-pcw-references" href="#R23" id="R23R"><span data-dcnode-id="3945" instrument_node="">23</span></a><span data-dcnode-id="3943" instrument_node="">, </span><a class="primary-blue-color tab-link" data-dcnode-id="3941" data-tab="pane-pcw-references" href="#R25" id="R25R"><span data-dcnode-id="3942" instrument_node="">25</span></a><span data-dcnode-id="3940" instrument_node="">, </span><a class="primary-blue-color tab-link" data-dcnode-id="3938" data-tab="pane-pcw-references" href="#R27" id="R27R"><span data-dcnode-id="3939" instrument_node="">27</span></a><span data-dcnode-id="3937" instrument_node="">) and has recently been part of a point (</span><a class="primary-blue-color tab-link" data-dcnode-id="3935" data-tab="pane-pcw-references" href="#R25" id="R25R"><span data-dcnode-id="3936" instrument_node="">25</span></a><span data-dcnode-id="3934" instrument_node="">)-counterpoint (</span><a class="primary-blue-color tab-link" data-dcnode-id="3932" data-tab="pane-pcw-references" href="#R16" id="R16R"><span data-dcnode-id="3933" instrument_node="">16</span></a><span data-dcnode-id="3931" instrument_node="">) debate in this journal. Within this debate, it is important to differentiate between a number of methodological distinctions, such as different altitudes chosen for living and training, different methods of measuring changes in Hb</span><sub data-dcnode-id="3929"><span data-dcnode-id="3930" instrument_node="">mass</span></sub><span data-dcnode-id="3928" instrument_node=""> or RCV (</span><a class="primary-blue-color tab-link" data-dcnode-id="3926" data-tab="pane-pcw-references" href="#R16" id="R16R"><span data-dcnode-id="3927" instrument_node="">16</span></a><span data-dcnode-id="3925" instrument_node="">), and the different performance levels of the athletes. In the classical well-controlled LHTL study conducted by Levine and Stray-Gundersen (</span><a class="primary-blue-color tab-link" data-dcnode-id="3923" data-tab="pane-pcw-references" href="#R24" id="R24R"><span data-dcnode-id="3924" instrument_node="">24</span></a><span data-dcnode-id="3922" instrument_node="">), RCV increased by ∼5% in the LHTL group after a 4-wk period of living at 2,500 m and training at 1,250 m. These results have been debated (</span><a class="primary-blue-color tab-link" data-dcnode-id="3920" data-tab="pane-pcw-references" href="#R2" id="R2R"><span data-dcnode-id="3921" instrument_node="">2</span></a><span data-dcnode-id="3919" instrument_node="">, </span><a class="primary-blue-color tab-link" data-dcnode-id="3917" data-tab="pane-pcw-references" href="#R17" id="R17R"><span data-dcnode-id="3918" instrument_node="">17</span></a><span data-dcnode-id="3916" instrument_node="">), because they measured RCV indirectly with the Evans blue dye method, for which the adequacy for estimating RCV after hypoxic exposure has been questioned (</span><a class="primary-blue-color tab-link" data-dcnode-id="3914" data-tab="pane-pcw-references" href="#R16" id="R16R"><span data-dcnode-id="3915" instrument_node="">16</span></a><span data-dcnode-id="3913" instrument_node="">, </span><a class="primary-blue-color tab-link" data-dcnode-id="3911" data-tab="pane-pcw-references" href="#R27" id="R27R"><span data-dcnode-id="3912" instrument_node="">27</span></a><span data-dcnode-id="3910" instrument_node="">). Studies using the CO-rebreathing method to directly measure Hb</span><sub data-dcnode-id="3908"><span data-dcnode-id="3909" instrument_node="">mass</span></sub><span data-dcnode-id="3907" instrument_node=""> have shown contradictory results. Most of these studies failed to show increased Hb</span><sub data-dcnode-id="3905"><span data-dcnode-id="3906" instrument_node="">mass</span></sub><span data-dcnode-id="3904" instrument_node=""> and RCV after altitude training (either LHTL or LHTH) (</span><a class="primary-blue-color tab-link" data-dcnode-id="3902" data-tab="pane-pcw-references" href="#R2" id="R2R"><span data-dcnode-id="3903" instrument_node="">2</span></a><span data-dcnode-id="3901" instrument_node="">, </span><a class="primary-blue-color tab-link" data-dcnode-id="3899" data-tab="pane-pcw-references" href="#R3" id="R3R"><span data-dcnode-id="3900" instrument_node="">3</span></a><span data-dcnode-id="3898" instrument_node="">, </span><a class="primary-blue-color tab-link" data-dcnode-id="3896" data-tab="pane-pcw-references" href="#R8" id="R8R"><span data-dcnode-id="3897" instrument_node="">8</span></a><span data-dcnode-id="3895" instrument_node="">, </span><a class="primary-blue-color tab-link" data-dcnode-id="3893" data-tab="pane-pcw-references" href="#R15" id="R15R"><span data-dcnode-id="3894" instrument_node="">15</span></a><span data-dcnode-id="3892" instrument_node="">, </span><a class="primary-blue-color tab-link" data-dcnode-id="3890" data-tab="pane-pcw-references" href="#R34" id="R34R"><span data-dcnode-id="3891" instrument_node="">34</span></a><span data-dcnode-id="3889" instrument_node="">). However, as we previously pointed out, it seems obvious that the hypoxic dose is a key factor in this debate. There is no doubt about elevated Hb</span><sub data-dcnode-id="3887"><span data-dcnode-id="3888" instrument_node="">mass</span></sub><span data-dcnode-id="3886" instrument_node=""> in lifelong residents (</span><a class="primary-blue-color tab-link" data-dcnode-id="3884" data-tab="pane-pcw-references" href="#R19" id="R19R"><span data-dcnode-id="3885" instrument_node="">19</span></a><span data-dcnode-id="3883" instrument_node="">) of moderate altitude (2,600–3,550 m), including athletes (</span><a class="primary-blue-color tab-link" data-dcnode-id="3881" data-tab="pane-pcw-references" href="#R30" id="R30R"><span data-dcnode-id="3882" instrument_node="">30</span></a><span data-dcnode-id="3880" instrument_node="">). It has therefore been suggested that the hypoxic dose in these studies (</span><a class="primary-blue-color tab-link" data-dcnode-id="3878" data-tab="pane-pcw-references" href="#R2" id="R2R"><span data-dcnode-id="3879" instrument_node="">2</span></a><span data-dcnode-id="3877" instrument_node="">, </span><a class="primary-blue-color tab-link" data-dcnode-id="3875" data-tab="pane-pcw-references" href="#R3" id="R3R"><span data-dcnode-id="3876" instrument_node="">3</span></a><span data-dcnode-id="3874" instrument_node="">, </span><a class="primary-blue-color tab-link" data-dcnode-id="3872" data-tab="pane-pcw-references" href="#R8" id="R8R"><span data-dcnode-id="3873" instrument_node="">8</span></a><span data-dcnode-id="3871" instrument_node="">, </span><a class="primary-blue-color tab-link" data-dcnode-id="3869" data-tab="pane-pcw-references" href="#R15" id="R15R"><span data-dcnode-id="3870" instrument_node="">15</span></a><span data-dcnode-id="3868" instrument_node="">, </span><a class="primary-blue-color tab-link" data-dcnode-id="3866" data-tab="pane-pcw-references" href="#R34" id="R34R"><span data-dcnode-id="3867" instrument_node="">34</span></a><span data-dcnode-id="3865" instrument_node="">) was too low to significantly increase Hb</span><sub data-dcnode-id="3863"><span data-dcnode-id="3864" instrument_node="">mass</span></sub><span data-dcnode-id="3862" instrument_node=""> and RCV (</span><a class="primary-blue-color tab-link" data-dcnode-id="3860" data-tab="pane-pcw-references" href="#R23" id="R23R"><span data-dcnode-id="3861" instrument_node="">23</span></a><span data-dcnode-id="3859" instrument_node="">, </span><a class="primary-blue-color tab-link" data-dcnode-id="3857" data-tab="pane-pcw-references" href="#R28" id="R28R"><span data-dcnode-id="3858" instrument_node="">28</span></a><span data-dcnode-id="3856" instrument_node="">). It is likely that either the living altitudes were too low (</span><a class="primary-blue-color tab-link" data-dcnode-id="3854" data-tab="pane-pcw-references" href="#R8" id="R8R"><span data-dcnode-id="3855" instrument_node="">8</span></a><span data-dcnode-id="3853" instrument_node="">, </span><a class="primary-blue-color tab-link" data-dcnode-id="3851" data-tab="pane-pcw-references" href="#R15" id="R15R"><span data-dcnode-id="3852" instrument_node="">15</span></a><span data-dcnode-id="3850" instrument_node="">, </span><a class="primary-blue-color tab-link" data-dcnode-id="3848" data-tab="pane-pcw-references" href="#R34" id="R34R"><span data-dcnode-id="3849" instrument_node="">34</span></a><span data-dcnode-id="3847" instrument_node="">) and/or the durations of altitude exposure were too short (</span><a class="primary-blue-color tab-link" data-dcnode-id="3845" data-tab="pane-pcw-references" href="#R2" id="R2R"><span data-dcnode-id="3846" instrument_node="">2</span></a><span data-dcnode-id="3844" instrument_node="">, </span><a class="primary-blue-color tab-link" data-dcnode-id="3842" data-tab="pane-pcw-references" href="#R3" id="R3R"><span data-dcnode-id="3843" instrument_node="">3</span></a><span data-dcnode-id="3841" instrument_node="">), compared with regimens that increased Hb</span><sub data-dcnode-id="3839"><span data-dcnode-id="3840" instrument_node="">mass</span></sub><span data-dcnode-id="3838" instrument_node=""> or RCV after LHTL or LHTH (</span><a class="primary-blue-color tab-link" data-dcnode-id="3836" data-tab="pane-pcw-references" href="#R28" id="R28R"><span data-dcnode-id="3837" instrument_node="">28</span></a><span data-dcnode-id="3835" instrument_node="">). The hypoxic dose used in our study was very similar to the one used in the LHTL study conducted by Levine and Stray-Gundersen (</span><a class="primary-blue-color tab-link" data-dcnode-id="3833" data-tab="pane-pcw-references" href="#R24" id="R24R"><span data-dcnode-id="3834" instrument_node="">24</span></a><span data-dcnode-id="3832" instrument_node="">), as the athletes lived at the same altitude (2,456 m in our study, 2,500 m in the Levine and Stray-Gundersen study) for a similar duration (24 vs. 28 days) and trained at a similar altitude (1,800 and 1,000 m vs. 1,250 m). RCV results were also very similar, with RCV increasing by 5% and Hb</span><sub data-dcnode-id="3830"><span data-dcnode-id="3831" instrument_node="">mass</span></sub><span data-dcnode-id="3829" instrument_node=""> by 5.3% in our study and RCV increasing by 5.3% in the Levine and Stray-Gundersen study. In addition, the increases in Hb</span><sub data-dcnode-id="3827"><span data-dcnode-id="3828" instrument_node="">mass</span></sub><span data-dcnode-id="3826" instrument_node=""> and RCV in our study related well (</span><a class="primary-blue-color tab-link" data-dcnode-id="3824" data-tab="pane-pcw-references" href="#R21" id="R21R"><span data-dcnode-id="3825" instrument_node="">21</span></a><span data-dcnode-id="3823" instrument_node="">) to the measurement reproducibility (the increase was 3.1 times higher than the CV for the Hb</span><sub data-dcnode-id="3821"><span data-dcnode-id="3822" instrument_node="">mass</span></sub><span data-dcnode-id="3820" instrument_node=""> and 2.3 times higher than the CV for RCV). To our knowledge, no other study has been published that used the LHTL protocol at real altitude and found an increased Hb</span><sub data-dcnode-id="3818"><span data-dcnode-id="3819" instrument_node="">mass</span></sub><span data-dcnode-id="3817" instrument_node=""> and RCV. Two recently published studies that used the LHTH protocol also found increased Hb</span><sub data-dcnode-id="3815"><span data-dcnode-id="3816" instrument_node="">mass</span></sub><span data-dcnode-id="3814" instrument_node=""> in endurance athletes after a 3-wk altitude training camp at real altitude (</span><a class="primary-blue-color tab-link" data-dcnode-id="3812" data-tab="pane-pcw-references" href="#R9" id="R9R"><span data-dcnode-id="3813" instrument_node="">9</span></a><span data-dcnode-id="3811" instrument_node="">, </span><a class="primary-blue-color tab-link" data-dcnode-id="3809" data-tab="pane-pcw-references" href="#R18" id="R18R"><span data-dcnode-id="3810" instrument_node="">18</span></a><span data-dcnode-id="3808" instrument_node="">). Hb</span><sub data-dcnode-id="3806"><span data-dcnode-id="3807" instrument_node="">mass</span></sub><span data-dcnode-id="3805" instrument_node=""> increased 6% after 3 wk of LHTH at 2,100–2,300 m in junior swimmers (</span><a class="primary-blue-color tab-link" data-dcnode-id="3803" data-tab="pane-pcw-references" href="#R9" id="R9R"><span data-dcnode-id="3804" instrument_node="">9</span></a><span data-dcnode-id="3802" instrument_node="">) and 9% in elite biathlon athletes living and training for 3 wk at 2,050 m (</span><a class="primary-blue-color tab-link" data-dcnode-id="3800" data-tab="pane-pcw-references" href="#R18" id="R18R"><span data-dcnode-id="3801" instrument_node="">18</span></a><span data-dcnode-id="3799" instrument_node="">). The higher increase in Hb</span><sub data-dcnode-id="3797"><span data-dcnode-id="3798" instrument_node="">mass</span></sub><span data-dcnode-id="3796" instrument_node=""> in the biathlete study was mainly due to the result of one athlete, whose Hb</span><sub data-dcnode-id="3794"><span data-dcnode-id="3795" instrument_node="">mass</span></sub><span data-dcnode-id="3793" instrument_node=""> increased by 18%, whereas Hb</span><sub data-dcnode-id="3791"><span data-dcnode-id="3792" instrument_node="">mass</span></sub><span data-dcnode-id="3790" instrument_node=""> increased by 7% for the rest of the group (</span><a class="primary-blue-color tab-link" data-dcnode-id="3788" data-tab="pane-pcw-references" href="#R31" id="R31R"><span data-dcnode-id="3789" instrument_node="">31</span></a><span data-dcnode-id="3787" instrument_node="">). Unfortunately, neither LHTH study included a control group, reported the reproducibility of Hb</span><sub data-dcnode-id="3785"><span data-dcnode-id="3786" instrument_node="">mass</span></sub><span data-dcnode-id="3784" instrument_node=""> measurement, or controlled for blood doping (</span><a class="primary-blue-color tab-link" data-dcnode-id="3782" data-tab="pane-pcw-references" href="#R33" id="R33R"><span data-dcnode-id="3783" instrument_node="">33</span></a><span data-dcnode-id="3781" instrument_node="">). In addition, they used a relatively small amount of CO in the CO-rebreathing method in relation to the barometric pressure and the estimated magnitude of the athletes' Hb</span><sub data-dcnode-id="3779"><span data-dcnode-id="3780" instrument_node="">mass</span></sub><span data-dcnode-id="3778" instrument_node="">, which may lead to a high measurement error (</span><a class="primary-blue-color tab-link" data-dcnode-id="3776" data-tab="pane-pcw-references" href="#R6" id="R6R"><span data-dcnode-id="3777" instrument_node="">6</span></a><span data-dcnode-id="3775" instrument_node="">). There is only one study (LHTH protocol, no study with LHTL protocol) that used an estimated adequate hypoxic dose and found no increase in Hb</span><sub data-dcnode-id="3773"><span data-dcnode-id="3774" instrument_node="">mass</span></sub><span data-dcnode-id="3772" instrument_node="">: Gore et al. (</span><a class="primary-blue-color tab-link" data-dcnode-id="3770" data-tab="pane-pcw-references" href="#R14" id="R14R"><span data-dcnode-id="3771" instrument_node="">14</span></a><span data-dcnode-id="3769" instrument_node="">) reported no increase in absolute Hb</span><sub data-dcnode-id="3767"><span data-dcnode-id="3768" instrument_node="">mass</span></sub><span data-dcnode-id="3766" instrument_node=""> after 31 days LHTH at 2,690 m. However, the authors pointed out that all athletes in the study succumbed to illness during the period, a condition that can have depressive effects on the erythropoiesis (</span><a class="primary-blue-color tab-link" data-dcnode-id="3764" data-tab="pane-pcw-references" href="#R11" id="R11R"><span data-dcnode-id="3765" instrument_node="">11</span></a><span data-dcnode-id="3763" instrument_node="">).</span></p><h2 class="article-section__title section__title" data-dcnode-id="3760" id="_i24"><span data-dcnode-id="3761" instrument_node="">Changes in Blood and Iron Parameters After LHTL</span></h2><p data-dcnode-id="3689"><span data-dcnode-id="3759" instrument_node="">The increases in Hb</span><sub data-dcnode-id="3757"><span data-dcnode-id="3758" instrument_node="">mass</span></sub><span data-dcnode-id="3756" instrument_node=""> and RCV in this study were in line with changes in several iron and blood parameters during the LHTL phase. sEpo was elevated 120% at </span><i data-dcnode-id="3754"><span data-dcnode-id="3755" instrument_node="">day 1</span></i><span data-dcnode-id="3753" instrument_node=""> at altitude compared with the pretest. Such an increase has also been seen in other studies, in which sEpo increased, with considerable individual variation, from sea level to ∼2,500 m by 50–150%, measured after ∼24 h of altitude exposure (</span><a class="primary-blue-color tab-link" data-dcnode-id="3751" data-tab="pane-pcw-references" href="#R1" id="R1R"><span data-dcnode-id="3752" instrument_node="">1</span></a><span data-dcnode-id="3750" instrument_node="">, </span><a class="primary-blue-color tab-link" data-dcnode-id="3748" data-tab="pane-pcw-references" href="#R8" id="R8R"><span data-dcnode-id="3749" instrument_node="">8</span></a><span data-dcnode-id="3747" instrument_node="">, </span><a class="primary-blue-color tab-link" data-dcnode-id="3745" data-tab="pane-pcw-references" href="#R12" id="R12R"><span data-dcnode-id="3746" instrument_node="">12</span></a><span data-dcnode-id="3744" instrument_node="">, </span><a class="primary-blue-color tab-link" data-dcnode-id="3742" data-tab="pane-pcw-references" href="#R24" id="R24R"><span data-dcnode-id="3743" instrument_node="">24</span></a><span data-dcnode-id="3741" instrument_node="">). The increase in sEpo in the AG in our study was even higher than the 60% reported in the study by Chapman et al. (</span><a class="primary-blue-color tab-link" data-dcnode-id="3739" data-tab="pane-pcw-references" href="#R7" id="R7R"><span data-dcnode-id="3740" instrument_node="">7</span></a><span data-dcnode-id="3738" instrument_node="">) after 30-h altitude exposure for the “responder” group of their athletes. Our results are also supported by Ge et al. (</span><a class="primary-blue-color tab-link" data-dcnode-id="3736" data-tab="pane-pcw-references" href="#R12" id="R12R"><span data-dcnode-id="3737" instrument_node="">12</span></a><span data-dcnode-id="3735" instrument_node="">), who measured the sEpo responses at different altitudes and concluded that the threshold altitude for a robust increase in sEpo is ∼2,100–2,500 m. In our study, sEpo was still elevated at </span><i data-dcnode-id="3733"><span data-dcnode-id="3734" instrument_node="">day 12</span></i><span data-dcnode-id="3732" instrument_node=""> at altitude, which has been determined to be an important factor for a relevant increase in RCV (</span><a class="primary-blue-color tab-link" data-dcnode-id="3730" data-tab="pane-pcw-references" href="#R7" id="R7R"><span data-dcnode-id="3731" instrument_node="">7</span></a><span data-dcnode-id="3729" instrument_node="">). However, an increased sEpo is not necessarily associated with an increase in Rct and Hb</span><sub data-dcnode-id="3727"><span data-dcnode-id="3728" instrument_node="">mass</span></sub><span data-dcnode-id="3726" instrument_node="">. Ashenden et al. (</span><a class="primary-blue-color tab-link" data-dcnode-id="3724" data-tab="pane-pcw-references" href="#R1" id="R1R"><span data-dcnode-id="3725" instrument_node="">1</span></a><span data-dcnode-id="3723" instrument_node="">) showed no different changes in Rct between an altitude group with three 5-day LHTL exposures at 2,650 m in an altitude house and a sea-level control group. It must be noted that Rct is affected not only by altitude exposure but also by normal endurance training (</span><a class="primary-blue-color tab-link" data-dcnode-id="3721" data-tab="pane-pcw-references" href="#R29" id="R29R"><span data-dcnode-id="3722" instrument_node="">29</span></a><span data-dcnode-id="3720" instrument_node="">). The absolute changes in Rct in controlled altitude training studies that did not show a change in Hb</span><sub data-dcnode-id="3718"><span data-dcnode-id="3719" instrument_node="">mass</span></sub><span data-dcnode-id="3717" instrument_node=""> were within 2–4‰ in the sea-level control groups (</span><a class="primary-blue-color tab-link" data-dcnode-id="3715" data-tab="pane-pcw-references" href="#R2" id="R2R"><span data-dcnode-id="3716" instrument_node="">2</span></a><span data-dcnode-id="3714" instrument_node="">, </span><a class="primary-blue-color tab-link" data-dcnode-id="3712" data-tab="pane-pcw-references" href="#R3" id="R3R"><span data-dcnode-id="3713" instrument_node="">3</span></a><span data-dcnode-id="3711" instrument_node="">, </span><a class="primary-blue-color tab-link" data-dcnode-id="3709" data-tab="pane-pcw-references" href="#R8" id="R8R"><span data-dcnode-id="3710" instrument_node="">8</span></a><span data-dcnode-id="3708" instrument_node="">) during controlled periods as long as 30 (</span><a class="primary-blue-color tab-link" data-dcnode-id="3706" data-tab="pane-pcw-references" href="#R2" id="R2R"><span data-dcnode-id="3707" instrument_node="">2</span></a><span data-dcnode-id="3705" instrument_node="">) and 70 (</span><a class="primary-blue-color tab-link" data-dcnode-id="3703" data-tab="pane-pcw-references" href="#R3" id="R3R"><span data-dcnode-id="3704" instrument_node="">3</span></a><span data-dcnode-id="3702" instrument_node="">) days. Thus an absolute change in the reticulocytes of ∼2–4‰ reflect normal changes due to training. In our study, the mean absolute change in Rct was within 3‰ during the first 12 days of the LHTL phase but was increased by 7‰ (from 10.2 to 17.5‰) from </span><i data-dcnode-id="3700"><span data-dcnode-id="3701" instrument_node="">day 12</span></i><span data-dcnode-id="3699" instrument_node=""> to the posttest. It is interesting that this increase occurred at the end of and even after the LHTL phase. We do not know how much of this increase in Rct is due to the altitude-induced increase in erythropoiesis and how much can be attributed to changes in training intensity. However, these results may suggest the importance of spending a sufficient amount of time at altitude. TF and sTfR also increased in the AG, whereas Ftn values decreased, even if the absolute changes were smaller than in the study by Levine and Stray-Gundersen (</span><a class="primary-blue-color tab-link" data-dcnode-id="3697" data-tab="pane-pcw-references" href="#R24" id="R24R"><span data-dcnode-id="3698" instrument_node="">24</span></a><span data-dcnode-id="3696" instrument_node="">). Such changes in iron metabolism have been interpreted to occur with increased erythropoiesis (</span><a class="primary-blue-color tab-link" data-dcnode-id="3694" data-tab="pane-pcw-references" href="#R4" id="R4R"><span data-dcnode-id="3695" instrument_node="">4</span></a><span data-dcnode-id="3693" instrument_node="">) and therefore support our findings of increased Hb</span><sub data-dcnode-id="3691"><span data-dcnode-id="3692" instrument_node="">mass</span></sub><span data-dcnode-id="3690" instrument_node=""> and RCV.</span></p><h2 class="article-section__title section__title" data-dcnode-id="3687" id="_i25"><span data-dcnode-id="3688" instrument_node="">Performance Parameters</span></h2><p data-dcnode-id="3640"><span data-dcnode-id="3686" instrument_node="">Because the aim of our study was primarily to investigate the effect of the LHTL phase on hematological parameters, performance parameters were only measured in the AG and we do not know what performance changes may have taken place in the CG. Therefore, the improvement in performance in the AG should be interpreted with caution, because it could have been influenced by training and their own expectation of improved performance after the LHTL camp. Changes in the AG performance are reported, however, because it cannot be taken for granted that our athletes improved performance after 4 wk of LHTL training only. Both V̇</span><span class="smallcaps smallerCapital" data-dcnode-id="3684"><span data-dcnode-id="3685" instrument_node="">o</span></span><sub data-dcnode-id="3682"><span data-dcnode-id="3683" instrument_node="">2 max</span></sub><span data-dcnode-id="3681" instrument_node=""> (+4.1%) and TTE (+11.6%) were increased after the LHTL phase. The almost identical [La</span><sup data-dcnode-id="3679"><span data-dcnode-id="3680" instrument_node="">−</span></sup><span data-dcnode-id="3678" instrument_node="">]</span><sub data-dcnode-id="3676"><span data-dcnode-id="3677" instrument_node="">b-max</span></sub><span data-dcnode-id="3675" instrument_node=""> values at the pre- and posttest support that the athletes ran with a similar volitional exhaustion in the tests. The 5,000-m time trial performance improved (−1.6%), and measurement of HR</span><sub data-dcnode-id="3673"><span data-dcnode-id="3674" instrument_node="">max</span></sub><span data-dcnode-id="3672" instrument_node="">, [La</span><sup data-dcnode-id="3670"><span data-dcnode-id="3671" instrument_node="">−</span></sup><span data-dcnode-id="3669" instrument_node="">]</span><sub data-dcnode-id="3667"><span data-dcnode-id="3668" instrument_node="">b-max</span></sub><span data-dcnode-id="3666" instrument_node="">, and RPE indicated that volitional exhaustion was similar for both trials. Considering the small number of subjects, the correlation between the increase in Hb</span><sub data-dcnode-id="3664"><span data-dcnode-id="3665" instrument_node="">mass</span></sub><span data-dcnode-id="3663" instrument_node=""> and the increase in V̇</span><span class="smallcaps smallerCapital" data-dcnode-id="3661"><span data-dcnode-id="3662" instrument_node="">o</span></span><sub data-dcnode-id="3659"><span data-dcnode-id="3660" instrument_node="">2 max</span></sub><span data-dcnode-id="3658" instrument_node=""> must be put into perspective. However, the decrease in 5,000-m time and the increase in V̇</span><span class="smallcaps smallerCapital" data-dcnode-id="3656"><span data-dcnode-id="3657" instrument_node="">o</span></span><sub data-dcnode-id="3654"><span data-dcnode-id="3655" instrument_node="">2 max</span></sub><span data-dcnode-id="3653" instrument_node=""> were very similar to those of Levine and Stray-Gundersen (</span><a class="primary-blue-color tab-link" data-dcnode-id="3651" data-tab="pane-pcw-references" href="#R24" id="R24R"><span data-dcnode-id="3652" instrument_node="">24</span></a><span data-dcnode-id="3650" instrument_node="">, </span><a class="primary-blue-color tab-link" data-dcnode-id="3648" data-tab="pane-pcw-references" href="#R32" id="R32R"><span data-dcnode-id="3649" instrument_node="">32</span></a><span data-dcnode-id="3647" instrument_node="">), and it is known that increased Hb</span><sub data-dcnode-id="3645"><span data-dcnode-id="3646" instrument_node="">mass</span></sub><span data-dcnode-id="3644" instrument_node=""> and RCV is associated with increased endurance performance (</span><a class="primary-blue-color tab-link" data-dcnode-id="3642" data-tab="pane-pcw-references" href="#R22" id="R22R"><span data-dcnode-id="3643" instrument_node="">22</span></a><span data-dcnode-id="3641" instrument_node="">). Therefore, the improved performance parameters may be supported by the increases in the hematological parameters.</span></p><p data-dcnode-id="3635"><span data-dcnode-id="3639" instrument_node="">We conclude that Hb</span><sub data-dcnode-id="3637"><span data-dcnode-id="3638" instrument_node="">mass</span></sub><span data-dcnode-id="3636" instrument_node=""> and RCV in elite endurance athletes are increased by ∼5% after living at 2,500 m and training at 1,800 and 1,000 m for 24 days.</span></p><h2 class="article-section__title section__title" data-dcnode-id="3633" id="d10331321e1372"><span data-dcnode-id="3634" instrument_node="">FOOTNOTES</span></h2><ul class="foot-notes" data-dcnode-id="3626"><li data-dcnode-id="3627"><p data-dcnode-id="3628"><span data-dcnode-id="3632" instrument_node="">The costs of publication of this article were defrayed in part by the payment of page charges. The article must therefore be hereby marked “</span><i data-dcnode-id="3630"><span data-dcnode-id="3631" instrument_node="">advertisement</span></i><span data-dcnode-id="3629" instrument_node="">” in accordance with 18 U.S.C. Section 1734 solely to indicate this fact.</span></p></li></ul><div class="ack" data-dcnode-id="3623"><p data-dcnode-id="3624"><span data-dcnode-id="3625" instrument_node="">We thank all athletes and coaches for their cooperation. A special thanks goes to Prof. W. Schmidt and Dr. Nicole Prommer for instruction on the CO-rebreathing method. We further gratefully acknowledge the laboratory assistance of Theres Appenzeller, the supplementation plans of Christof Mannhart, the medical attendance of the athletes by Dr. G. Clénin, Dr. B. Villiger, and Dr. W. Frey, the statistical support of Dr. Urs Mäder, and the proofreading of Jennifer Arnesen.</span></p></div></div><h2 class="article-section__title section__title" data-dcnode-id="3617" id="d10331321e92"><span data-dcnode-id="3618" instrument_node="">AUTHOR NOTES</span></h2><ul class="author-notes" data-dcnode-id="3611"><li data-dcnode-id="3612"><span data-dcnode-id="3616" instrument_node="">Address for reprint requests and other correspondence: J. P. Wehrlin, Swiss Federal Institute of Sports, Section for Elite Sport, 2532 Magglingen, Switzerland (e-mail: </span><a class="email" data-dcnode-id="3614" href="mailto:jon.wehrlin@baspo.admin.ch"><span data-dcnode-id="3615" instrument_node="">jon.wehrlin@baspo.admin.ch</span></a><span data-dcnode-id="3613" instrument_node="">)</span></li></ul><div class="response" data-dcnode-id="3609"><div class="sub-article-title" data-dcnode-id="3610"></div></div></div></div></div><span data-dcnode-id="3605" instrument_node="">

5252Fcontent%25252Fjappl%25252F2006%25252Fjappl.2006.100.issue-6%25252Fjappl.2006.100.issue-6%25252Fproduction%25252Fjappl.2006.100.issue-6.cover.gif%2526site_name%253DJournal%252520of%252520Applied%252520Physiology%2526description%253DThe%252520effect%252520of%252520live%252520high-train%252520low%252520on%252520hemoglobin%252520mass%252520%28Hbmass%29%252520and%252520red%252520cell%252520volume%252520%28RCV%29%252520in%252520elite%252520endurance%252520athletes%252520is%252520still%252520controversial.%252520We%252520expected%252520that%252520Hbmass%252520and%252520RCV%252520would%252520increase%25252C%252520when%252520using%252520a%252520presumably%252520adequate%252520hypoxic%252520dose.%252520An%252520altitude%252520group%252520%28AG%29%252520of%25252010%252520Swiss%252520national%252520team%252520orienteers%252520%285%252520men%252520and%2525205%252520women%29%252520lived%252520at%2525202%25252C500%252520m%252520%2818%252520h%252520per%252520day%29%252520and%252520trained%252520at%2525201%25252C800%252520and%2525201%25252C000%252520m%252520above%252520sea%252520level%252520for%25252024%252520days.%252520Before%252520and%252520after%252520altitude%25252C%252520Hbmass%25252C%252520RCV%252520%28carbon%252520monoxide%252520rebreathing%252520method%29%25252C%252520blood%25252C%252520iron%25252C%252520and%252520performance%252520parameters%252520were%252520determined.%252520Seven%252520Swiss%252520national%252520team%252520cross-country%252520skiers%252520%283%252520men%252520and%2525204%252520women%29%252520served%252520as%252520%2525E2%252580%25259Csea%252520level%2525E2%252580%25259D%252520%28500%2525E2%252580%2525931%25252C600%252520m%29%252520control%252520group%252520%28CG%29%252520for%252520the%252520changes%252520in%252520Hbmass%252520and%252520RCV.%252520The%252520AG%252520increased%252520Hbmass%252520%28805%252520%2525C2%2525B1%252520209%252520vs.%252520848%252520%2525C2%2525B1%252520225%252520g%25253B%252520P%252520%25253C%2525200.01%29%252520and%252520RC
