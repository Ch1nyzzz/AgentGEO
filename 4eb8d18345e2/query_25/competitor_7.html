</span><meta content="The effect of live high-train low on hemoglobin mass (Hbmass) and red cell volume (RCV) in elite endurance athletes is still controversial. We expected that Hbmass and RCV would increase, when using a presumably adequate hypoxic dose. An altitude group (AG) of 10 Swiss national team orienteers (5 men and 5 women) lived at 2,500 m (18 h per day) and trained at 1,800 and 1,000 m above sea level for 24 days. Before and after altitude, Hbmass, RCV (carbon monoxide rebreathing method), blood, iron, and performance parameters were determined. Seven Swiss national team cross-country skiers (3 men and 4 women) served as “sea level” (500–1,600 m) control group (CG) for the changes in Hbmass and RCV. The AG increased Hbmass (805 ± 209 vs. 848 ± 225 g; P < 0.01) and RCV (2,353 ± 611 vs. 2,470 ± 653 ml; P < 0.01), whereas there was no change for the CG (Hbmass: 849 ± 197 vs. 858 ± 205 g; RCV: 2,373 ± 536 vs. 2,387 ± 551 ml). Serum erythropoietin (P < 0.001), reticulocytes (P < 0.001), transferrin (P < 0.001), soluble transferrin receptor (P < 0.05), and hematocrit (P < 0.01) increased, whereas ferritin (P < 0.05) decreased in the AG. These changes were associated with an increased maximal oxygen uptake (3,515 ± 837 vs. 3,660 ± 770 ml/min; P < 0.05) and improved 5,000-m running times (1,098 ± 104 vs. 1,080 ± 98 s; P < 0.01) from pre- to postaltitude. Living at 2,500 m and training at lower altitudes for 24 days increases Hbmass and RCV. These changes may contribute to enhance performance of elite endurance athletes." data-dcnode-id="6445" property="og:description"><span data-dcnode-id="6444" instrument_node="">

</span></ul></div></nav></div><div data-dcnode-id="3606"><div class="article__body" data-dcnode-id="3607"><div class="col-md-12" data-dcnode-id="3608"><p class="fulltext" data-dcnode-id="5058"></p><div class="hlFld-Abstract" data-dcnode-id="4999"><p class="fulltext" data-dcnode-id="5056"></p><h2 class="article-section__title section__title" data-dcnode-id="5054" id="d10331321e1"><span data-dcnode-id="5055" instrument_node="">Abstract</span></h2><div class="abstractSection abstractInFull" data-dcnode-id="5000"><p data-dcnode-id="5001"><span data-dcnode-id="5053" instrument_node="">The effect of live high-train low on hemoglobin mass (Hb</span><sub data-dcnode-id="5051"><span data-dcnode-id="5052" instrument_node="">mass</span></sub><span data-dcnode-id="5050" instrument_node="">) and red cell volume (RCV) in elite endurance athletes is still controversial. We expected that Hb</span><sub data-dcnode-id="5048"><span data-dcnode-id="5049" instrument_node="">mass</span></sub><span data-dcnode-id="5047" instrument_node=""> and RCV would increase, when using a presumably adequate hypoxic dose. An altitude group (AG) of 10 Swiss national team orienteers (5 men and 5 women) lived at 2,500 m (18 h per day) and trained at 1,800 and 1,000 m above sea level for 24 days. Before and after altitude, Hb</span><sub data-dcnode-id="5045"><span data-dcnode-id="5046" instrument_node="">mass</span></sub><span data-dcnode-id="5044" instrument_node="">, RCV (carbon monoxide rebreathing method), blood, iron, and performance parameters were determined. Seven Swiss national team cross-country skiers (3 men and 4 women) served as “sea level” (500–1,600 m) control group (CG) for the changes in Hb</span><sub data-dcnode-id="5042"><span data-dcnode-id="5043" instrument_node="">mass</span></sub><span data-dcnode-id="5041" instrument_node=""> and RCV. The AG increased Hb</span><sub data-dcnode-id="5039"><span data-dcnode-id="5040" instrument_node="">mass</span></sub><span data-dcnode-id="5038" instrument_node=""> (805 ± 209 vs. 848 ± 225 g; </span><i data-dcnode-id="5036"><span data-dcnode-id="5037" instrument_node="">P</span></i><span data-dcnode-id="5035" instrument_node=""> &lt; 0.01) and RCV (2,353 ± 611 vs. 2,470 ± 653 ml; </span><i data-dcnode-id="5033"><span data-dcnode-id="5034" instrument_node="">P</span></i><span data-dcnode-id="5032" instrument_node=""> &lt; 0.01), whereas there was no change for the CG (Hb</span><sub data-dcnode-id="5030"><span data-dcnode-id="5031" instrument_node="">mass</span></sub><span data-dcnode-id="5029" instrument_node="">: 849 ± 197 vs. 858 ± 205 g; RCV: 2,373 ± 536 vs. 2,387 ± 551 ml). Serum erythropoietin (</span><i data-dcnode-id="5027"><span data-dcnode-id="5028" instrument_node="">P</span></i><span data-dcnode-id="5026" instrument_node=""> &lt; 0.001), reticulocytes (</span><i data-dcnode-id="5024"><span data-dcnode-id="5025" instrument_node="">P</span></i><span data-dcnode-id="5023" instrument_node=""> &lt; 0.001), transferrin (</span><i data-dcnode-id="5021"><span data-dcnode-id="5022" instrument_node="">P</span></i><span data-dcnode-id="5020" instrument_node=""> &lt; 0.001), soluble transferrin receptor (</span><i data-dcnode-id="5018"><span data-dcnode-id="5019" instrument_node="">P</span></i><span data-dcnode-id="5017" instrument_node=""> &lt; 0.05), and hematocrit (</span><i data-dcnode-id="5015"><span data-dcnode-id="5016" instrument_node="">P</span></i><span data-dcnode-id="5014" instrument_node=""> &lt; 0.01) increased, whereas ferritin (</span><i data-dcnode-id="5012"><span data-dcnode-id="5013" instrument_node="">P</span></i><span data-dcnode-id="5011" instrument_node=""> &lt; 0.05) decreased in the AG. These changes were associated with an increased maximal oxygen uptake (3,515 ± 837 vs. 3,660 ± 770 ml/min; </span><i data-dcnode-id="5009"><span data-dcnode-id="5010" instrument_node="">P</span></i><span data-dcnode-id="5008" instrument_node=""> &lt; 0.05) and improved 5,000-m running times (1,098 ± 104 vs. 1,080 ± 98 s; </span><i data-dcnode-id="5006"><span data-dcnode-id="5007" instrument_node="">P</span></i><span data-dcnode-id="5005" instrument_node=""> &lt; 0.01) from pre- to postaltitude. Living at 2,500 m and training at lower altitudes for 24 days increases Hb</span><sub data-dcnode-id="5003"><span data-dcnode-id="5004" instrument_node="">mass</span></sub><span data-dcnode-id="5002" instrument_node=""> and RCV. These changes may contribute to enhance performance of elite endurance athletes.</span></p></div></div><div class="hlFld-Fulltext" data-dcnode-id="3622"><p data-dcnode-id="4936"><span class="smallcaps smallerCapital" data-dcnode-id="4995"><span data-dcnode-id="4996" instrument_node="">the concept of living at</span></span><span data-dcnode-id="4994" instrument_node=""> “high” altitude and training at “low” altitude (“live high-train low,” LHTL) has been increasingly used in recent years by endurance athletes with the expectation that sea-level performance may as a consequence be improved (</span><a class="primary-blue-color tab-link" data-dcnode-id="4992" data-tab="pane-pcw-references" href="#R36" id="R36R"><span data-dcnode-id="4993" instrument_node="">36</span></a><span data-dcnode-id="4991" instrument_node="">). The LHTL strategy combines living at moderate altitude, to increase hemoglobin mass (Hb</span><sub data-dcnode-id="4989"><span data-dcnode-id="4990" instrument_node="">mass</span></sub><span data-dcnode-id="4988" instrument_node="">) and red cell volume (RCV), with training at low altitude to maintain a high absolute training intensity (</span><a class="primary-blue-color tab-link" data-dcnode-id="4986" data-tab="pane-pcw-references" href="#R26" id="R26R"><span data-dcnode-id="4987" instrument_node="">26</span></a><span data-dcnode-id="4985" instrument_node="">). This concept has been shown to be superior to normal sea-level training or classical live high-train high (LHTH) altitude training for improving sea-level performance in elite endurance athletes (</span><a class="primary-blue-color tab-link" data-dcnode-id="4983" data-tab="pane-pcw-references" href="#R24" id="R24R"><span data-dcnode-id="4984" instrument_node="">24</span></a><span data-dcnode-id="4982" instrument_node="">). However, studies of whether exposure to moderate altitude increases Hb</span><sub data-dcnode-id="4980"><span data-dcnode-id="4981" instrument_node="">mass</span></sub><span data-dcnode-id="4979" instrument_node=""> and RCV in elite endurance athletes have given controversial results (</span><a class="primary-blue-color tab-link" data-dcnode-id="4977" data-tab="pane-pcw-references" href="#R2" id="R2R"><span data-dcnode-id="4978" instrument_node="">2</span></a><span data-dcnode-id="4976" instrument_node="">, </span><a class="primary-blue-color tab-link" data-dcnode-id="4974" data-tab="pane-pcw-references" href="#R16" id="R16R"><span data-dcnode-id="4975" instrument_node="">16</span></a><span data-dcnode-id="4973" instrument_node="">, </span><a class="primary-blue-color tab-link" data-dcnode-id="4971" data-tab="pane-pcw-references" href="#R25" id="R25R"><span data-dcnode-id="4972" instrument_node="">25</span></a><span data-dcnode-id="4970" instrument_node="">). Results from the only published LHTL study that reported increase in RCV (</span><a class="primary-blue-color tab-link" data-dcnode-id="4968" data-tab="pane-pcw-references" href="#R24" id="R24R"><span data-dcnode-id="4969" instrument_node="">24</span></a><span data-dcnode-id="4967" instrument_node="">) have been discussed (</span><a class="primary-blue-color tab-link" data-dcnode-id="4965" data-tab="pane-pcw-references" href="#R2" id="R2R"><span data-dcnode-id="4966" instrument_node="">2</span></a><span data-dcnode-id="4964" instrument_node="">, </span><a class="primary-blue-color tab-link" data-dcnode-id="4962" data-tab="pane-pcw-references" href="#R17" id="R17R"><span data-dcnode-id="4963" instrument_node="">17</span></a><span data-dcnode-id="4961" instrument_node="">), because RCV was measured indirectly with the Evans blue dye method, for which the adequacy for estimating RCV after hypoxic exposure has been questioned (</span><a class="primary-blue-color tab-link" data-dcnode-id="4959" data-tab="pane-pcw-references" href="#R13" id="R13R"><span data-dcnode-id="4960" instrument_node="">13</span></a><span data-dcnode-id="4958" instrument_node="">, </span><a class="primary-blue-color tab-link" data-dcnode-id="4956" data-tab="pane-pcw-references" href="#R16" id="R16R"><span data-dcnode-id="4957" instrument_node="">16</span></a><span data-dcnode-id="4955" instrument_node="">, </span><a class="primary-blue-color tab-link" data-dcnode-id="4953" data-tab="pane-pcw-references" href="#R27" id="R27R"><span data-dcnode-id="4954" instrument_node="">27</span></a><span data-dcnode-id="4952" instrument_node="">). LHTL studies that directly measured Hb</span><sub data-dcnode-id="4950"><span data-dcnode-id="4951" instrument_node="">mass</span></sub><span data-dcnode-id="4949" instrument_node=""> with the carbon monoxide (CO)-rebreathing method did not report increased Hb</span><sub data-dcnode-id="4947"><span data-dcnode-id="4948" instrument_node="">mass</span></sub><span data-dcnode-id="4946" instrument_node=""> and RCV (</span><a class="primary-blue-color tab-link" data-dcnode-id="4944" data-tab="pane-pcw-references" href="#R2" id="R2R"><span data-dcnode-id="4945" instrument_node="">2</span></a><span data-dcnode-id="4943" instrument_node="">, </span><a class="primary-blue-color tab-link" data-dcnode-id="4941" data-tab="pane-pcw-references" href="#R3" id="R3R"><span data-dcnode-id="4942" instrument_node="">3</span></a><span data-dcnode-id="4940" instrument_node="">, </span><a class="primary-blue-color tab-link" data-dcnode-id="4938" data-tab="pane-pcw-references" href="#R8" id="R8R"><span data-dcnode-id="4939" instrument_node="">8</span></a><span data-dcnode-id="4937" instrument_node="">).</span></p><p data-dcnode-id="4910"><span data-dcnode-id="4935" instrument_node="">However, two LHTH studies, in which subjects generally spend more time at altitude, have recently reported increased Hb</span><sub data-dcnode-id="4933"><span data-dcnode-id="4934" instrument_node="">mass</span></sub><span data-dcnode-id="4932" instrument_node=""> after exposure to moderate altitude (</span><a class="primary-blue-color tab-link" data-dcnode-id="4930" data-tab="pane-pcw-references" href="#R9" id="R9R"><span data-dcnode-id="4931" instrument_node="">9</span></a><span data-dcnode-id="4929" instrument_node="">, </span><a class="primary-blue-color tab-link" data-dcnode-id="4927" data-tab="pane-pcw-references" href="#R18" id="R18R"><span data-dcnode-id="4928" instrument_node="">18</span></a><span data-dcnode-id="4926" instrument_node="">). Thus it has been hypothesized that the hypoxic dose (living altitude combined with the duration of the altitude exposure) is the key factor (</span><a class="primary-blue-color tab-link" data-dcnode-id="4924" data-tab="pane-pcw-references" href="#R23" id="R23R"><span data-dcnode-id="4925" instrument_node="">23</span></a><span data-dcnode-id="4923" instrument_node="">, </span><a class="primary-blue-color tab-link" data-dcnode-id="4921" data-tab="pane-pcw-references" href="#R28" id="R28R"><span data-dcnode-id="4922" instrument_node="">28</span></a><span data-dcnode-id="4920" instrument_node="">). To our knowledge, no controlled LHTL study has been published that has used a presumably adequate hypoxic dose at real altitude similar to the study by Levine and Stray-Gundersen (</span><a class="primary-blue-color tab-link" data-dcnode-id="4918" data-tab="pane-pcw-references" href="#R24" id="R24R"><span data-dcnode-id="4919" instrument_node="">24</span></a><span data-dcnode-id="4917" instrument_node="">) and measured Hb</span><sub data-dcnode-id="4915"><span data-dcnode-id="4916" instrument_node="">mass</span></sub><span data-dcnode-id="4914" instrument_node=""> directly with the CO-rebreathing technique. Therefore, the purpose of our study was to investigate the effects of living at an altitude of ∼2,500 m and training at lower altitudes for 24 days on erythropoiesis in elite endurance athletes by using direct measurement of Hb</span><sub data-dcnode-id="4912"><span data-dcnode-id="4913" instrument_node="">mass</span></sub><span data-dcnode-id="4911" instrument_node="">.</span></p><h1 class="article-section__title section__title" data-dcnode-id="4908" id="_i1"><span data-dcnode-id="4909" instrument_node="">MATERIAL AND METHODS</span></h1><h2 class="article-section__title section__title" data-dcnode-id="4906" id="_i2"><span data-dcnode-id="4907" instrument_node="">Subjects</span></h2><p data-dcnode-id="4904"><span data-dcnode-id="4905" instrument_node="">Ten athletes (5 women and 5 men) from the Swiss national orienteering team, aged 23 ± 4 yr, and seven athletes from the Swiss national cross-country team (4 women and 3 men), aged 21 ± 1 yr, gave written, informed consent to participate in the study, which was approved by the institutional review board of the Swiss Federal Institute of Sport and was carried out according to the recommendations of the Helsinki Declaration.</span></p><h2 class="article-section__title section__title" data-dcnode-id="4902" id="_i3"><span data-dcnode-id="4903" instrument_node="">Study Design</span></h2><p data-dcnode-id="4878"><span data-dcnode-id="4901" instrument_node="">The orienteering athletes were assigned to the altitude group (AG) and completed a 24-day LHTL phase, living 18 h per day at 2,456 m and training at 1,800 and 1,000 m above sea level, in the Swiss Alps. The cross-country skiers were assigned to the control group (CG), completing a normal training phase, which consisted of living and training between 500 and 1,600 m for 24 days. The study was carried out during the preseason for both groups (different time of the year for orienteers and cross-country skiers). An outline of the study design is presented in </span><a class="primary-blue-color" data-dcnode-id="4899" data-tab="pane-pcw-Figures" href="#F1" id="F1R"><span data-dcnode-id="4900" instrument_node="">Fig. 1</span></a><span data-dcnode-id="4898" instrument_node="">. Approximately 4 wk before the LHTL phase (AG) and before the experimental phase (CG) (A), blood samples were taken for measurement of serum ferritin (Ftn) to assess bone marrow iron stores. At the pretest (B), 1 day before the LHTL phase began, a blood sample was taken and the athletes from both groups performed a maximal oxygen uptake (V̇</span><span class="smallcaps smallerCapital" data-dcnode-id="4896"><span data-dcnode-id="4897" instrument_node="">o</span></span><sub data-dcnode-id="4894"><span data-dcnode-id="4895" instrument_node="">2 max</span></sub><span data-dcnode-id="4893" instrument_node="">) test in the laboratory. About 7–10 h later on the same day, the AG ran a 5,000-m time trial on a 400-m track. The blood volume parameters were measured the next day (AG and CG). Additional blood samples where taken from the AG athletes at </span><i data-dcnode-id="4891"><span data-dcnode-id="4892" instrument_node="">day 1</span></i><span data-dcnode-id="4890" instrument_node=""> (C), </span><i data-dcnode-id="4888"><span data-dcnode-id="4889" instrument_node="">day 12</span></i><span data-dcnode-id="4887" instrument_node=""> (D), and </span><i data-dcnode-id="4885"><span data-dcnode-id="4886" instrument_node="">day 24</span></i><span data-dcnode-id="4884" instrument_node=""> (E) of the LHTL phase. Eight days after the 24-day phase (F), the athletes performed the posttest with identical measurements as at the pretest B with the exception that the CG did not perform the V̇</span><span class="smallcaps smallerCapital" data-dcnode-id="4882"><span data-dcnode-id="4883" instrument_node="">o</span></span><sub data-dcnode-id="4880"><span data-dcnode-id="4881" instrument_node="">2 max</span></sub><span data-dcnode-id="4879" instrument_node=""> test.</span></p><figure class="figure article__inlineFigure" data-dcnode-id="4869" data-figure-id="F1" id="F1"><img alt="Fig. 1." class="figure__image" data-dcnode-id="4877" data-lg-src="/cms/10.1152/japplphysiol.01284.2005/asset/images/large/zdg0060666600001.jpeg" loading="lazy" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//journals.physiology.org/cms/10.1152/japplphysiol.01284.2005/asset/images/medium/zdg0060666600001.jpeg&amp;raw" title=""><figcaption data-dcnode-id="4870"><strong data-dcnode-id="4876"></strong><span class="figure__caption hlFld-FigureCaption" data-dcnode-id="4871"><p data-dcnode-id="4872"><strong class="figure__title" data-dcnode-id="4874"><span data-dcnode-id="4875" instrument_node="">Fig. 1.</span></strong><span data-dcnode-id="4873" instrument_node="">Study design. A–F refer to the text. *Measurements in the altitude group only.</span></p></span></figcaption></figure><div class="figure-extra" data-dcnode-id="4864"><a alt="figure" data-dcnode-id="4867" download="" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//journals.physiology.org/na101/home/literatum/publisher/physio/journals/content/jappl/2006/jappl.2006.100.issue-6/japplphysiol.01284.2005/production/images/large/zdg0060666600001.jpeg"><span data-dcnode-id="4868" instrument_node="">Download figure</span></a><a class="ppt-figure-link" data-dcnode-id="4865" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//journals.physiology.org/action/downloadFigures%3Fid%3DF1%26doi%3D10.1152/japplphysiol.01284.2005"><span data-dcnode-id="4866" instrument_node="">Download PowerPoint</span></a></div><br data-dcnode-id="4863"><h2 class="article-section__title section__title" data-dcnode-id="4861" id="_i5"><span data-dcnode-id="4862" instrument_node="">Evaluation of Blood Volume Parameters</span></h2><p data-dcnode-id="4827"><span data-dcnode-id="4860" instrument_node="">Hb</span><sub data-dcnode-id="4858"><span data-dcnode-id="4859" instrument_node="">mass</span></sub><span data-dcnode-id="4857" instrument_node="">, RCV, plasma volume (PV), and blood volume (BV) were determined by the CO-rebreathing method according to Burge and Skinner (</span><a class="primary-blue-color tab-link" data-dcnode-id="4855" data-tab="pane-pcw-references" href="#R6" id="R6R"><span data-dcnode-id="4856" instrument_node="">6</span></a><span data-dcnode-id="4854" instrument_node="">) with minor modifications (</span><a class="primary-blue-color tab-link" data-dcnode-id="4852" data-tab="pane-pcw-references" href="#R20" id="R20R"><span data-dcnode-id="4853" instrument_node="">20</span></a><span data-dcnode-id="4851" instrument_node="">). The method is briefly described here. After 15 min in a sitting position, four capillary blood samples (30 μl) were taken from an earlobe and analyzed for carboxyhemoglobin (HbCO) by a hemoximeter (ABL 520, Radiometer A/S, Copenhagen, Denmark). The mean of the four HbCO values was taken as the baseline HbCO value. Subjects were then connected to a Krogh spirometer filled with a mixture of oxygen (5 liters) and CO. The volume of inspired CO varied between 50 and 100 ml depending on gender, barometric pressure, measured V̇</span><span class="smallcaps smallerCapital" data-dcnode-id="4849"><span data-dcnode-id="4850" instrument_node="">o</span></span><sub data-dcnode-id="4847"><span data-dcnode-id="4848" instrument_node="">2 max</span></sub><span data-dcnode-id="4846" instrument_node="">, and body mass with the goal of reaching a ΔHbCO (difference between baseline values and plateau values) between 5 and 7%. The athletes breathed the gas mixture in the closed system for 12 min. If necessary, oxygen was refilled. Every 2 min, earlobe blood samples were taken for assessment of HbCO. All blood samples for measurement of HbCO were immediately analyzed (&lt;10 s). The HbCO plateau was normally seen after 6–10 min and the mean of three adjacent HbCO values between the 6th and the 12th minute was taken as the plateau value of HbCO. Hb</span><sub data-dcnode-id="4844"><span data-dcnode-id="4845" instrument_node="">mass</span></sub><span data-dcnode-id="4843" instrument_node="">, RCV, BV, and PV were then calculated as described elsewhere (</span><a class="primary-blue-color tab-link" data-dcnode-id="4841" data-tab="pane-pcw-references" href="#R20" id="R20R"><span data-dcnode-id="4842" instrument_node="">20</span></a><span data-dcnode-id="4840" instrument_node="">). For the RCV, PV, and BV calculations, the hemoglobin (Hb) and hematocrit (Hct) values from a venous blood sample taken on the same day were used. The same equipment was used by the same investigators for all tests. The reproducibility of the blood volume parameters (coefficient of variance; CV) was determined in a separate experiment, in which Hb</span><sub data-dcnode-id="4838"><span data-dcnode-id="4839" instrument_node="">mass</span></sub><span data-dcnode-id="4837" instrument_node="">, RCV, PV, and BV were measured in other subjects two times separated by 24 h. We did this twice, once during the LHTL phase of the AG (</span><i data-dcnode-id="4835"><span data-dcnode-id="4836" instrument_node="">n</span></i><span data-dcnode-id="4834" instrument_node=""> = 11) and once during the experimental phase of the CG (</span><i data-dcnode-id="4832"><span data-dcnode-id="4833" instrument_node="">n</span></i><span data-dcnode-id="4831" instrument_node=""> = 7). The mean measured CV during the AG and CG were Hb</span><sub data-dcnode-id="4829"><span data-dcnode-id="4830" instrument_node="">mass</span></sub><span data-dcnode-id="4828" instrument_node=""> = 1.7 and 1.4%, RCV = 2.2 and 2.1%, PV = 4.8 and 4.5%, BV = 3.4 and 3.5%, respectively.</span></p><h2 class="article-section__title section__title" data-dcnode-id="4825" id="_i6"><span data-dcnode-id="4826" instrument_node="">Blood Sample</span></h2><p data-dcnode-id="4823"><span data-dcnode-id="4824" instrument_node="">All blood samples were drawn from a cubital vein under standardized conditions (between 7:00 and 8:00 AM before breakfast, in supine position after 15 min of rest). Blood samples from both groups were analyzed for Hb concentration (modified cyanomethemoglobin method, Coulter Gen S, Beckmann), Hct (Coulter Gen S, Beckmann), and serum Ftn (photochemiluminescence; Advia Centaur, Bayer, Leverkusen, Germany). Blood samples from the AG were also analyzed for serum erythropoietin (sEpo; chemiluminescence immunoassay; Advantage, Nichols Institute Diagnostics, San Juan Capistrano, CA), reticulocytes (Rct; flow cytometry; Epics XL, Beckmann), transferrin (TF; immunoassay; Cobas Integra 800; Roche Diagnostics, Basel, Switzerland), and soluble transferrin receptor (sTfR; immunoturbidimetric assay; Cobas Integra 800; Roche Diagnostics). At the pretest, all blood samples were analyzed twice and the CV for the different parameters was calculated: Hb = 0.3%, Hct = 0.6%, Ftn = 4.5%, sEpo = 9.8%, Rct = 6.7%, TF = 0.64% and sTfR = 2.0%.</span></p><h2 class="article-section__title section__title" data-dcnode-id="4821" id="_i7"><span data-dcnode-id="4822" instrument_node="">Evaluation of Performance</span></h2><h3 class="article-section__title" data-dcnode-id="4819" id="_i8"><span data-dcnode-id="4820" instrument_node="">5,000-m time trial (AG).</span></h3><p data-dcnode-id="4814"><span data-dcnode-id="4818" instrument_node="">The pre- and posttest 5,000-m time trials were conducted on a 400-m track at 400 m above sea level at 7 PM under similar conditions (temperature 19.8 and 20.3°C, humidity 79 and 67%; air pressure 969 and 972 hPa, for pre- and posttest, respectively). Heart rate was monitored throughout the run, and rating of perceived exertion (RPE) was recorded immediately after the run by using the category scale of Borg (</span><a class="primary-blue-color tab-link" data-dcnode-id="4816" data-tab="pane-pcw-references" href="#R5" id="R5R"><span data-dcnode-id="4817" instrument_node="">5</span></a><span data-dcnode-id="4815" instrument_node="">). A capillary blood sample was taken from the earlobe to measure blood lactate concentration.</span></p><h3 class="article-section__title" data-dcnode-id="4807" id="_i9"><span data-dcnode-id="4813" instrument_node="">V̇</span><span class="smallcaps smallerCapital" data-dcnode-id="4811"><span data-dcnode-id="4812" instrument_node="">o</span></span><sub data-dcnode-id="4809"><span data-dcnode-id="4810" instrument_node="">2 max</span></sub><span data-dcnode-id="4808" instrument_node=""> tests.</span></h3><p data-dcnode-id="4776"><span data-dcnode-id="4806" instrument_node="">The AG performed V̇</span><span class="smallcaps smallerCapital" data-dcnode-id="4804"><span data-dcnode-id="4805" instrument_node="">o</span></span><sub data-dcnode-id="4802"><span data-dcnode-id="4803" instrument_node="">2 max</span></sub><span data-dcnode-id="4801" instrument_node=""> tests at pre- and posttest to determine V̇</span><span class="smallcaps smallerCapital" data-dcnode-id="4799"><span data-dcnode-id="4800" instrument_node="">o</span></span><sub data-dcnode-id="4797"><span data-dcnode-id="4798" instrument_node="">2 max</span></sub><span data-dcnode-id="4796" instrument_node="">, maximal ventilation, maximal heart rate (HR</span><sub data-dcnode-id="4794"><span data-dcnode-id="4795" instrument_node="">max</span></sub><span data-dcnode-id="4793" instrument_node="">), maximal blood lactate ([La</span><sup data-dcnode-id="4791"><span data-dcnode-id="4792" instrument_node="">−</span></sup><span data-dcnode-id="4790" instrument_node="">]</span><sub data-dcnode-id="4788"><span data-dcnode-id="4789" instrument_node="">b-max</span></sub><span data-dcnode-id="4787" instrument_node="">), and time to exhaustion (TTE). These tests were conducted on a treadmill in the laboratory at the Swiss Olympic Medical Center (SOMC) in Magglingen, located 900 m above sea level. After a 10-min warm-up jog, the athletes began running at their individual anaerobic threshold intensity (previously determined). The speed was increased by 1 km/h every minute until the subjects reported having ∼90 s left until exhaustion. The treadmill incline was set at 0% throughout the test. Identical “individual” tests were used for the pre- and the posttest. Gas exchange was measured breath by breath with an open-circuit system (Oxycon Pro, Jaeger-Toennies, Hochberg, Germany), heart rate was monitored with Polar Accurex plus (Polar Electro, Kempele, Finland), and blood lactate was analyzed with Ebbio-Plus (Eppendorf, Germany). The CG performed a V̇</span><span class="smallcaps smallerCapital" data-dcnode-id="4785"><span data-dcnode-id="4786" instrument_node="">o</span></span><sub data-dcnode-id="4783"><span data-dcnode-id="4784" instrument_node="">2 max</span></sub><span data-dcnode-id="4782" instrument_node=""> test at pretest only, at the SOMC Bad Ragaz located 400 m above sea level, using identical equipment, but another protocol: After a warm-up jog, the male athletes began running at 13 km/h. The speed was increased by 1 km/h every minute for the first 3 min of the test and thereafter by 0.5 km/h every 30 s until exhaustion. The female athletes followed the same protocol but started at 11 km/h. The treadmill incline was set at 7% throughout the test. During the V̇</span><span class="smallcaps smallerCapital" data-dcnode-id="4780"><span data-dcnode-id="4781" instrument_node="">o</span></span><sub data-dcnode-id="4778"><span data-dcnode-id="4779" instrument_node="">2 max</span></sub><span data-dcnode-id="4777" instrument_node=""> tests, both athletes and experimenters were blinded for any result.</span></p><h3 class="article-section__title" data-dcnode-id="4774" id="_i10"><span data-dcnode-id="4775" instrument_node="">Training regimen.</span></h3><p data-dcnode-id="4772"><span data-dcnode-id="4773" instrument_node="">The AG completed low- and moderate-intensity training at an altitude of 1,800 m (1–2 training sessions per day), whereas the high-intensity training was performed at 1,000 m above sea level (twice per week). The CG completed all training (1–2 training sessions per day) at altitudes between 400 and 1,600 m. For both groups, ∼85% of the training completed was at low and moderate intensity and 15% was at high intensity.</span></p><h3 class="article-section__title" data-dcnode-id="4770" id="_i11"><span data-dcnode-id="4771" instrument_node="">Supplementation (AG).</span></h3><p data-dcnode-id="4762"><span data-dcnode-id="4769" instrument_node="">The AG athletes started a combined iron (Ferrum Hausmann, 100 mg Fe</span><sup data-dcnode-id="4767"><span data-dcnode-id="4768" instrument_node="">2+</span></sup><span data-dcnode-id="4766" instrument_node="">/day orally; Astellas Pharma, Leiderdorp, Netherlands), multivitamin (Burgerstein multivitamin-mineral ABC 25; Burgerstein Nährstoffe; Rapperswil, Switzerland), and vitamin C (Burgerstein vitamin C; Burgerstein Nährstoffe) supplementation when the LHTL phase began. Despite preliminary testing and oral supplementation, two female and one male athlete had Ftn levels below 20 μg/l at the start of the LHTL phase. The low Ftn values must be seen in the light of high PV, and we assume that these athletes actually had no relevant iron deficiency under normal sea-level training conditions. Because we wanted to be on the safe side for the novel circumstances at altitude, these athletes received venous iron supplementation (Venofer; Novartis, Basel, Switzerland) in the first week. The iron status results of these three subjects were therefore excluded from the data. The changes in Hb</span><sub data-dcnode-id="4764"><span data-dcnode-id="4765" instrument_node="">mass</span></sub><span data-dcnode-id="4763" instrument_node=""> and performance values during LHTL in these subjects did not differ from those observed in the other athletes. We therefore did not exclude other data from these three athletes.</span></p><h2 class="article-section__title section__title" data-dcnode-id="4760" id="_i12"><span data-dcnode-id="4761" instrument_node="">Statistics</span></h2><p data-dcnode-id="4732"><span data-dcnode-id="4759" instrument_node="">Data are presented as means ± SD in tables and as means ± SE in figures. The effect of time on several blood parameters measured before, during, and after the LHTL phase was evaluated with one-factor analysis of variance for repeated measures. When the </span><i data-dcnode-id="4757"><span data-dcnode-id="4758" instrument_node="">F</span></i><span data-dcnode-id="4756" instrument_node=""> value was considered statistically significant (</span><i data-dcnode-id="4754"><span data-dcnode-id="4755" instrument_node="">P</span></i><span data-dcnode-id="4753" instrument_node=""> &lt; 0.05), the Bonferroni correction was used to evaluate differences at the different time points in relation to the pretest value at sea level. Differences between pre- and posttest within the groups were evaluated by paired Student's </span><i data-dcnode-id="4751"><span data-dcnode-id="4752" instrument_node="">t</span></i><span data-dcnode-id="4750" instrument_node="">-tests, and differences between the two groups were analyzed by comparing the absolute group differences between pre- and posttest with unpaired </span><i data-dcnode-id="4748"><span data-dcnode-id="4749" instrument_node="">t</span></i><span data-dcnode-id="4747" instrument_node="">-tests. The relationship between increase in Hb</span><sub data-dcnode-id="4745"><span data-dcnode-id="4746" instrument_node="">mass</span></sub><span data-dcnode-id="4744" instrument_node=""> and the increase in V̇</span><span class="smallcaps smallerCapital" data-dcnode-id="4742"><span data-dcnode-id="4743" instrument_node="">o</span></span><sub data-dcnode-id="4740"><span data-dcnode-id="4741" instrument_node="">2 max</span></sub><span data-dcnode-id="4739" instrument_node=""> was compared by linear regression and Pearson's coefficient. All statistical tests were done with the SPSS statistical package 13.0 (SPSS, Chicago, IL). Significance was set at </span><i data-dcnode-id="4737"><span data-dcnode-id="4738" instrument_node="">P</span></i><span data-dcnode-id="4736" instrument_node=""> &lt; 0.05; </span><i data-dcnode-id="4734"><span data-dcnode-id="4735" instrument_node="">P</span></i><span data-dcnode-id="4733" instrument_node=""> &lt; 0.1 was called a trend.</span></p><h1 class="article-section__title section__title" data-dcnode-id="4730" id="_i13"><span data-dcnode-id="4731" instrument_node="">RESULTS</span></h1><p data-dcnode-id="4714"><span data-dcnode-id="4729" instrument_node="">There was no difference in height, weight, body-mass index, Hb</span><sub data-dcnode-id="4727"><span data-dcnode-id="4728" instrument_node="">mass</span></sub><span data-dcnode-id="4726" instrument_node="">, RCV, PV, and BV between the groups, but the cross-country skiers (CG) had higher V̇</span><span class="smallcaps smallerCapital" data-dcnode-id="4724"><span data-dcnode-id="4725" instrument_node="">o</span></span><sub data-dcnode-id="4722"><span data-dcnode-id="4723" instrument_node="">2 max</span></sub><span data-dcnode-id="4721" instrument_node=""> values than the orienteers (AG) (</span><a class="primary-blue-color ref showTableEvent" data-dcnode-id="4719" data-id="T1" href="#T1" id="T1R"><span data-dcnode-id="4720" instrument_node="">Table 1</span></a><span data-dcnode-id="4718" instrument_node=""> and </span><a class="primary-blue-color" data-dcnode-id="4716" data-tab="pane-pcw-Figures" href="#F2" id="F2R"><span data-dcnode-id="4717" instrument_node="">Fig. 2</span></a><span data-dcnode-id="4715" instrument_node="">).</span></p><figure class="figure article__inlineFigure" data-dcnode-id="4702" data-figure-id="F2" id="F2"><img alt="Fig. 2." class="figure__image" data-dcnode-id="4713" data-lg-src="/cms/10.1152/japplphysiol.01284.2005/asset/images/large/zdg0060666600002.jpeg" loading="lazy" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//journals.physiology.org/cms/10.1152/japplphysiol.01284.2005/asset/images/medium/zdg0060666600002.jpeg&amp;raw" title=""><figcaption data-dcnode-id="4703"><strong data-dcnode-id="4712"></strong><span class="figure__caption hlFld-FigureCaption" data-dcnode-id="4704"><p data-dcnode-id="4705"><strong class="figure__title" data-dcnode-id="4710"><span data-dcnode-id="4711" instrument_node="">Fig. 2.</span></strong><span data-dcnode-id="4709" instrument_node="">Effects of 24 days of either “live high-train low” altitude training (altitude group) or normal “sea-level” training (control group) on body mass-related hemoglobin mass, red cell volume, plasma volume, and blood volume. Open symbols represent female athletes, solid symbols male athletes, and hexagon represents mean values. **Differences (</span><i data-dcnode-id="4707"><span data-dcnode-id="4708" instrument_node="">P</span></i><span data-dcnode-id="4706" instrument_node=""> &lt; 0.01) before and after the altitude training camp for 1 group (women and men together) or differences between the groups; ns, no difference.</span></p></span></figcaption></figure><div class="figure-extra" data-dcnode-id="4697"><a alt="figure" data-dcnode-id="4700" download="" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//journals.physiology.org/na101/home/literatum/publisher/physio/journals/content/jappl/2006/jappl.2006.100.issue-6/japplphysiol.01284.2005/production/images/large/zdg0060666600002.jpeg"><span data-dcnode-id="4701" instrument_node="">Download figure</span></a><a class="ppt-figure-link" data-dcnode-id="4698" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//journals.physiology.org/action/downloadFigures%3Fid%3DF2%26doi%3D10.1152/japplphysiol.01284.2005"><span data-dcnode-id="4699" instrument_node="">Download PowerPoint</span></a></div><br data-dcnode-id="4696"><div class="tableToggle" data-dcnode-id="4523"><div class="article-table-content" data-dcnode-id="4536"><div class="tableTogg  valign="bottom"></th><th align="center" class="align_center" colspan="1" data-dcnode-id="4669" rowspan="1" valign="bottom"><span data-dcnode-id="4670" instrument_node="">Height, cm</span></th><th align="center" class="align_center" colspan="1" data-dcnode-id="4667" rowspan="1" valign="bottom"><span data-dcnode-id="4668" instrument_node="">Weight, kg</span></th><th align="center" class="align_center" colspan="1" data-dcnode-id="4663" rowspan="1" valign="bottom"><span data-dcnode-id="4666" instrument_node="">BMI, kg/m</span><sup data-dcnode-id="4664"><span data-dcnode-id="4665" instrument_node="">2</span></sup></th><th align="center" class="align_center" colspan="1" data-dcnode-id="4651" rowspan="1" valign="bottom"><span data-dcnode-id="4662" instrument_node="">V̇</span><span class="smallcaps smallerCapital" data-dcnode-id="4660"><span data-dcnode-id="4661" instrument_node="">o</span></span><sub data-dcnode-id="4658"><span data-dcnode-id="4659" instrument_node="">2max</span></sub><span data-dcnode-id="4657" instrument_node="">, ml·kg</span><sup data-dcnode-id="4655"><span data-dcnode-id="4656" instrument_node="">−1</span></sup><span data-dcnode-id="4654" instrument_node="">·min</span><sup data-dcnode-id="4652"><span data-dcnode-id="4653" instrument_node="">−1</span></sup></th><th align="center" class="align_center" colspan="1" data-dcnode-id="4649" rowspan="1" valign="bottom"><span data-dcnode-id="4650" instrument_node="">Height, cm</span></th><th align="center" class="align_center" colspan="1" data-dcnode-id="4647" rowspan="1" valign="bottom"><span data-dcnode-id="4648" instrument_node="">Weight, kg</span></th><th align="center" class="align_center" colspan="1" data-dcnode-id="4643" rowspan="1" valign="bottom"><span data-dcnode-id="4646" instrument_node="">BMI, kg/m</span><sup data-dcnode-id="4644"><span data-dcnode-id="4645" instrument_node="">2</span></sup></th><th align="center" class="align_center last" colspan="1" data-dcnode-id="4631" rowspan="1" valign="botto sEpo values at </span><i data-dcnode-id="4354"><span data-dcnode-id="4355" instrument_node="">day 1</span></i><span data-dcnode-id="4353" instrument_node=""> (</span><i data-dcnode-id="4351"><span data-dcnode-id="4352" instrument_node="">P</span></i><span data-dcnode-id="4350" instrument_node=""> &lt; 0.001; +120%) and </span><i data-dcnode-id="4348"><span data-dcnode-id="4349" instrument_node="">day 12</span></i><span data-dcnode-id="4347" instrument_node=""> (</span><i data-dcnode-id="4345"><span data-dcnode-id="4346" instrument_node="">P</span></i><span data-dcnode-id="4344" instrument_node=""> &lt; 0.05; +34%) than at pretest, whereas the values at </span><i data-dcnode-id="4342"><span data-dcnode-id="4343" instrument_node="">day 24</span></i><span data-dcnode-id="4341" instrument_node=""> and the posttest were not different from the pretest values. Rct values were affected by the LHTL phase (</span><i data-dcnode-id="4339"><span data-dcnode-id="4340" instrument_node="">P</span></i><span data-dcnode-id="4338" instrument_node=""> &lt; 0.001), and post hoc analysis reported higher values at posttest (17.5 ± 4.2‰; </span><i data-dcnode-id="4336"><span data-dcnode-id="4337" instrument_node="">P</span></i><span data-dcnode-id="4335" instrument_node=""> &lt; 0.05) than at pretest (12.2 ± 2.9‰). Ftn decreased (</span><i data-dcnode-id="4333"><span data-dcnode-id="4334" instrument_node="">P</span></i><span data-dcnode-id="4332" instrument_node=""> &lt; 0.05), TF increased (</span><i data-dcnode-id="4330"><span data-dcnode-id="4331" instrument_node="">P</span></i><span data-dcnode-id="4329" instrument_node=""> &lt; 0.001), and sTfR increased (</span><i data-dcnode-id="4327"><span data-dcnode-id="4328" instrument_node="">P</span></i><span data-dcnode-id="4326" instrument_node=""> &lt; 0.05) during the LHTL phase. For the CG, Hct (43.9 ± 3.7 vs. 42.7 ± 3.5%), Hb (15.7 ± 1.2 vs. 15.5 ± 1.1 g/dl), and Ftn (65 ± 17 vs. 62 ± 19 μg/l) did not change during the experimental period (pre- and posttest values, respectively).</span></p><figure class="figure article__inlineFigure" data-dcnode-id="4289" data-figure-id="F3" id="F3"><img alt="Fig. 3." class="figure__image" data-dcnode-id="4324" data-lg-src="/cms/10.1152/japplphysiol.01284.2005/asset/images/large/zdg0060666600003.jpeg" data-src="/cms/10.1152/japplphysiol.01284.2005/asset/images/medium/zdg0060666600003.jpeg" loading="lazy" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//journals.physiology.org/cms/10.1152/japplphysiol.01284.2005/asset/images/medium/zdg0060666600003.jpeg&amp;raw" title=""><figcaption data-dcnode-id="4290"><strong data-dcnode-id="4323"></strong><span class="figure__caption hlFld-FigureCaption" data-dcnode-id="4291"><p data-dcnode-id="4292"><strong class="figure__title" data-dcnode-id="4321"><span data-dcnode-id="4322" instrument_node="">Fig. 3.</span></strong><span data-dcnode-id="4320" instrument_node="">Time course of hematocrit, erythropoietin, reticulocytes, ferritin, transferrin, and the soluble transferrin receptor in the altitude group (5 female and 5 male national team orienteers) measured before and after (</span><i data-dcnode-id="4318"><span data-dcnode-id="4319" instrument_node="">day −1</span></i><span data-dcnode-id="4317" instrument_node=""> and </span><i data-dcnode-id="4315"><span data-dcnode-id="4316" instrument_node="">day +8</span></i><span data-dcnode-id="4314" instrument_node="">) and during a “live high” (2,456 m)-“train low” (1,800 and 1,000 m) altitude training camp (</span><i data-dcnode-id="4312"><span data-dcnode-id="4313" instrument_node="">day 1</span></i><span data-dcnode-id="4311" instrument_node="">, </span><i data-dcnode-id="4309"><span data-dcnode-id="4310" instrument_node="">day 12</span></i><span data-dcnode-id="4308" instrument_node="">, and </span><i data-dcnode-id="4306"><span data-dcnode-id="4307" instrument_node="">day 24</span></i><span data-dcnode-id="4305" instrument_node="">). Data are means ± SE. </span><i data-dcnode-id="4303"><span data-dcnode-id="4304" instrument_node="">P</span></i><span data-dcnode-id="4302" instrument_node=""> value indicates the effect of time on the parameter. *</span><i data-dcnode-id="4300"><span data-dcnode-id="4301" instrument_node="">P</span></i><span data-dcnode-id="4299" instrument_node=""> &lt; 0.05 and ***</span><i data-dcnode-id="4297"><span data-dcnode-id="4298" instrument_node="">P</span></i><span data-dcnode-id="4296" instrument_node=""> &lt; 0.001, post hoc differences from sea-level conditions (</span><i data-dcnode-id="4294"><span data-dcnode-id="4295" instrument_node="">day −1</span></i><span data-dcnode-id="4293" instrument_node="">).</span></p></span></figcaption></figure><div class="figure-extra" data-dcnode-id="4284"><a alt="figure" data-dcnode-id="4287" download="" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//journals.physiology.org/na101/home/literatum/publisher/physio/journals/content/jappl/2006/jappl.2006.100.issue-6/japplphysiol.01284.2005/production/images/large/zdg0060666600003.jpeg"><span data-dcnode-id="4288" instrument_node="">Download figure</span></a><a class="ppt-figure-link" data-dcnode-id="4285" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//journals.physiology.org/action/downloadFigures%3Fid%3DF3%26doi%3D10.1152/japplphysiol.01284.2005"><span data-dcnode-id="4286" instrument_node="">Download PowerPoint</span></a></div><br data-dcnode-id="4283"><h2 class="article-section__title section__title" data-dcnode-id="4281" id="_i18"><span data-dcnode-id="4282" instrument_node="">Performance Parameters (AG Only)</span></h2><h3 class="article-section__title" data-dcnode-id="4274" id="_i19"><span data-dcnode-id="4280" instrument_node="">V̇</span><span class="smallcaps smallerCapital" data-dcnode-id="4278"><span data-dcnode-id="4279" instrument_node="">o</span></span><sub data-dcnode-id="4276"><span data-dcnode-id="4277" instrument_node="">2 max</sp
