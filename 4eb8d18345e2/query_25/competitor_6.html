</span><div class="ArticleContent" data-dcnode-id="459"><span data-dcnode-id="654" instrument_node="">
</span><img alt="Improving Lung Capacity" class="FeaturePhoto wp-post-image" data-dcnode-id="653" height="208" sizes="(max-width: 250px) 100vw, 250px" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.sportsscience.co/wp-content/uploads/2013/04/improving-lung-capacity.jpg&amp;raw" srcset="https://www.sportsscience.co/wp-content/uploads/2013/04/improving-lung-capacity.jpg 250w, https://www.sportsscience.co/wp-content/uploads/2013/04/improving-lung-capacity-150x124.jpg 150w" width="250"><p data-dcnode-id="648"><span data-dcnode-id="652" instrument_node="">Do you feel that your lungs or lactic acid build-up are holding you back?  Well both of those issues can be decreased through lung training.  In this article we compare various methods of improving your lung capacity, endurance and strength.</span><br data-dcnode-id="651"><span data-dcnode-id="650" instrument_node="">
</span><span data-dcnode-id="649" id="more-1868"></span></p><span data-dcnode-id="647" instrument_node="">
</span><h2 data-dcnode-id="645"><span data-dcnode-id="646" instrument_node="">Endurance Training versus Resistance (Weight) Training</span></h2><span data-dcnode-id="644" instrument_node="">
</span><p data-dcnode-id="639"><span data-dcnode-id="643" instrument_node="">47 males training for 12 weeks showed the following improvements in the table and chart below.</span><a class="footnote-link footnote-identifier-link" data-dcnode-id="641" href="#footnote_0_1868" id="identifier_0_1868" title="The effects of either high-intensity resistance or endurance training on resting metabolic rate. Craig E Broeder, Keith A Burrhus, Lars S Svanevik, and Jack H Wilmore"><span data-dcnode-id="642" instrument_node="">[1]</span></a><span data-dcnode-id="640" instrument_node="">  The results were very clear, the endurance training group improved their lung power (VO2MAX) far more than the resistance training group (11.2% vs 3.3%), and the resistance training group increased their strength far more than the endurance training group (21.6% vs 4.6%).  That result is as would be expected.  It shows that resistance training is somewhat effective at improving lung capacity, but is not optimal.</span></p><span data-dcnode-id="638" instrument_node="">
</span><p data-dcnode-id="631"><span data-dcnode-id="637" instrument_node="">Also notable, the resistance training group had the greatest improvement in body composition (reduction in body fat percentage), a fall of 2.5% compared to 1.5% in the endurance training group.  The resistance training group increased muscle and decreased fat, while the endurance training group only decreased fat.</span><br data-dcnode-id="636"><span data-dcnode-id="635" instrument_node="">
</span><img alt="Resistance versus Endurance Training for Lung Capacity" data-dcnode-id="634" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.sportsscience.co/wp-content/uploads/2013/04/resistance-versus-endurance-training-for-lung-capacity.jpg&amp;raw" style="width: 100%;"><br data-dcnode-id="633"><span data-dcnode-id="632" instrument_node="">
</span></p><center data-dcnode-id="629"><img alt="Endurance and Resistance Training for Oxygen Consumption and Strength" data-dcnode-id="630" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.sportsscience.co/wp-content/uploads/2013/04/endurance-and-resistance-oxygen-consumption-and-strength.jpg&amp;raw"></center><p data-dcnode-id="628"></p><span data-dcnode-id="627" instrument_node="">
</span><h2 data-dcnode-id="625"><span data-dcnode-id="626" instrument_node="">Voluntary Isocapnic Hyperpnea Training versus Resistive Respiratory Muscle Training</span></h2><span data-dcnode-id="624" instrument_node="">
</span><p data-dcnode-id="622"><span data-dcnode-id="623" instrument_node="">Let’s refer to these two as VIHT and RRMT.  They’re complicated to explain, but I’ll try to do so simply with pictures:</span></p><span data-dcnode-id="621" instrument_node="">
</span><ul data-dcnode-id="600"><span data-dcnode-id="620" instrument_node="">
</span><li data-dcnode-id="612"><span data-dcnode-id="619" instrument_node="">VIHT involves re-inhaling some of your exhaled CO2 to reduce the amount of oxygen inhaled.  These machines are rare however, mainly existing in laboratories.</span><br data-dcnode-id="618"><span data-dcnode-id="617" instrument_node="">
</span><img alt="CO2 Re-inhalation" data-dcnode-id="616" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.sportsscience.co/wp-content/uploads/2013/04/co2-reinhalation.jpg&amp;raw"><br data-dcnode-id="615"><span data-dcnode-id="614" instrument_node="">
</span><img alt="Isocapnic Hyperpnea" data-dcnode-id="613" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.sportsscience.co/wp-content/uploads/2013/04/isocapnic-hyperpnea.jpg&amp;raw"></li><span data-dcnode-id="611" instrument_node="">
</span><li data-dcnode-id="602"><span data-dcnode-id="610" instrument_node="">RRMT adds resistance to your inhaling and exhaling.  This equipment is far more available to the average person, it’s even available to purchase on Amazon (</span><a data-dcnode-id="608" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.amazon.com/gp/product/B00063Q910%3Fie%3DUTF8%26linkCode%3Dxm2%26camp%3D2025%26creative%3D6738%26tag%3Dsportsscience-20%26creativeASIN%3DB00063Q910%26SubscriptionId%3D" rel="nofollow" target="_blank"><span data-dcnode-id="609" instrument_node="">Power Lung</span></a><span data-dcnode-id="607" instrument_node="">) for a little over $100.</span><br data-dcnode-id="606"><span data-dcnode-id="605" instrument_node="">
</span><a data-dcnode-id="603" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.amazon.com/gp/product/B00063Q910%3Fie%3DUTF8%26linkCode%3Dxm2%26camp%3D2025%26creative%3D6738%26tag%3Dsportsscience-20%26creativeASIN%3DB00063Q910%26SubscriptionId%3D" rel="nofollow" target="_blank"><img alt="Power Lung" data-dcnode-id="604" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.sportsscience.co/wp-content/uploads/2013/04/power-lung.jpg&amp;raw"></a></li><span data-dcnode-id="601" instrument_node="">
</span></ul><span data-dcnode-id="599" instrument_node="">
</span><p data-dcnode-id="594"><span data-dcnode-id="598" instrument_node="">So let’s get to the results.</span><a class="footnote-link footnote-identifier-link" data-dcnode-id="596" href="#footnote_1_1868" id="identifier_1_1868" title="Effects of Different Types of Respiratory Muscle Training on
Exercise Performance in Runners. Hiromi Uemura, MS; Claes E.G. Lundgren, MD, PhD; Andrew D. Ray, BS, MS, PhD;
David R. Pendergast, EdD"><span data-dcnode-id="597" instrument_node="">[2]</span></a><span data-dcnode-id="595" instrument_node="">  This study was done on 8 experienced runners for 3 days per week, 30 minutes per day.  It included 4 weeks of RRMT then 4 weeks of VIHT after that.  So don’t be confused by the chart below, the RRMT group had 4 weeks or training while the VIHT group had 4+4 weeks of training.</span></p><span data-dcnode-id="593" instrument_node="">
</span><p data-dcnode-id="591"><span data-dcnode-id="592" instrument_node="">RRMT alone increased endurance run time by 18% while RRMT+VIHT increased endurance run time by 46%, so the additional 4 weeks of VIHT added an additional 28% to the endurance run time.  VIHT looks to be somewhat superior, but RRMT was also effective.  Considering their comparative availability, I’d recommend VIHT only to serious athletes with a big budget, and RRMT to other athletes.</span></p><span data-dcnode-id="590" instrument_node="">
</span><p data-dcnode-id="589"></p><center data-dcnode-id="587"><img alt="RRMT Versus VIHT" data-dcnode-id="588" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.sportsscience.co/wp-content/uploads/2013/04/rrmt-versus-viht.jpg&amp;raw"></center><p data-dcnode-id="586"></p><span data-dcnode-id="585" instrument_node="">
</span><p data-dcnode-id="580"><span data-dcnode-id="584" instrument_node="">Another study found that 4 weeks of training for 30 minutes per day, 5 times per week increased swimming endurance time by 33% from RRMT, and 38% from VIHT.</span><a class="footnote-link footnote-identifier-link" data-dcnode-id="582" href="#footnote_2_1868" id="identifier_2_1868" title="Respiratory muscle training improves swimming endurance in divers. Juli A. Wylegala, David R. Pendergast, Luc E. Gosselin, Dan E. Warkander, Claes E. G. Lundgren"><span data-dcnode-id="583" instrument_node="">[3]</span></a><span data-dcnode-id="581" instrument_node="">  Considering the results are similar, RRMT is very useful for swimmers.  </span></p><span data-dcnode-id="579" instrument_node="">
</span><p data-dcnode-id="568"><span data-dcnode-id="578" instrument_node="">An alternative RRMT product to the </span><a data-dcnode-id="576" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.amazon.com/gp/product/B00063Q910%3Fie%3DUTF8%26linkCode%3Dxm2%26camp%3D2025%26creative%3D6738%26tag%3Dsportsscience-20%26creativeASIN%3DB00063Q910%26SubscriptionId%3D" rel="nofollow" target="_blank"><span data-dcnode-id="577" instrument_node="">Power Lung</span></a><span data-dcnode-id="575" instrument_node=""> mentioned above is the </span><a data-dcnode-id="573" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.amazon.com/gp/product/B000NJMLPA%3Fie%3DUTF8%26linkCode%3Dxm2%26camp%3D2025%26creative%3D6738%26tag%3Dsportsscience-20%26creativeASIN%3DB000NJMLPA%26SubscriptionId%3D" rel="nofollow" target="_blank"><span data-dcnode-id="574" instrument_node="">Power Breathe</span></a><span data-dcnode-id="572" instrument_node=""> for a little under $100.  If you want to measure your progress over time, </span><a data-dcnode-id="570" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.amazon.com/gp/product/B0010LG7NW%3Fie%3DUTF8%26linkCode%3Dxm2%26camp%3D2025%26creative%3D6738%26tag%3Dsportsscience-20%26creativeASIN%3DB0010LG7NW%26SubscriptionId%3D" rel="nofollow" target="_blank"><span data-dcnode-id="571" instrument_node="">Peak Flow Meters</span></a><span data-dcnode-id="569" instrument_node=""> are very affordable.</span></p><span data-dcnode-id="567" instrument_node="">
</span><h2 data-dcnode-id="565"><span data-dcnode-id="566" instrument_node="">Singing</span></h2><span data-dcnode-id="564" instrument_node="">
</span><p data-dcnode-id="559"><span data-dcnode-id="563" instrument_node="">Personally I’d rather the respiratory resistance training devices mentioned above, but singing is also effective for increasing lung capacity.  As you can see in the table below, both girls and boys who sing have 24% higher lung capacity than those who don’t.  So if you sing loud and often, it will in turn improve your lung capacity and in turn your sports endurance (swimming, running, rowing, etc).</span><br data-dcnode-id="562"><span data-dcnode-id="561" instrument_node="">
</span><img alt="Singing Lung Capacity Chart" data-dcnode-id="560" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.sportsscience.co/wp-content/uploads/2013/04/singing-lung-capacity.jpg&amp;raw" style="width: 100%;"></p><span data-dcnode-id="558" instrument_node="">
</span><h2 data-dcnode-id="556"><span data-dcnode-id="557" instrument_node="">Swimming</span></h2><span data-dcnode-id="555" instrument_node="">
</span><p data-dcnode-id="550"><span data-dcnode-id="554" instrument_node="">You probably guessed this already, but swimming leads to improved lung capacity.</span><a class="footnote-link footnote-identifier-link" data-dcnode-id="552" href="#footnote_3_1868" id="identifier_3_1868" title="Lung Volumes and Maximal Respiratory Pressures in Collegiate Swimmers and Runners. Loren Cordaina, Alan Tuckerb, Debbie Moona &amp; Joel M. Stagerc"><span data-dcnode-id="553" instrument_node="">[4]</span></a><span data-dcnode-id="551" instrument_node="">  One thing of note though is that swimming is superior to running for lung capacity, so swimming could be beneficial for runners in that regard.</span></p><span data-dcnode-id="549" instrument_node="">
</span><h2 data-dcnode-id="547"><span data-dcnode-id="548" instrument_node="">Swimming for Asthma</span></h2><span data-dcnode-id="546" instrument_node="">
</span><p data-dcnode-id="541"><span data-dcnode-id="545" instrument_node="">Swimming reduces the symptoms of asthma and is less asthma inducing than other sports.</span><a class="footnote-link footnote-identifier-link" data-dcnode-id="543" href="#footnote_4_1868" id="identifier_4_1868" title="Benefits of Swim Training for Children and Adolescents with Asthma. Cherri Rosimini"><span data-dcnode-id="544" instrument_node="">[5]</span></a><span data-dcnode-id="542" instrument_node="">  So not only is swimming good for lung capacity for sport, but it’s good for asthma sufferers too.</span></p><span data-dcnode-id="540" instrument_node="">
</span><h2 data-dcnode-id="538"><span data-dcnode-id="539" instrument_node="">Lung Capacity Test</span></h2><span data-dcnode-id="537" instrument_node="">
</span><p data-dcnode-id="532"><span data-dcnode-id="536" instrument_node="">If you’re looking to test your lungs then a </span><a data-dcnode-id="534" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.amazon.com/gp/product/B0010LG7NW%3Fie%3DUTF8%26linkCode%3Dxm2%26camp%3D2025%26creative%3D6738%26tag%3Dsportsscience-20%26creativeASIN%3DB0010LG7NW%26SubscriptionId%3D" rel="nofollow" target="_blank"><span data-dcnode-id="535" instrument_node="">Peak Flow Meter</span></a><span data-dcnode-id="533" instrument_node=""> will test your lung strength or simply blowing up a balloon with a single breath then measuring the size/diameter can test your lung capacity (make sure to use the same batch of balloons for future comparison tests).</span></p><span data-dcnode-id="531" instrument_node="">
</span><p data-dcnode-id="526"><a data-dcnode-id="529" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.amazon.com/gp/product/B0010LG7NW%3Fie%3DUTF8%26linkCode%3Dxm2%26camp%3D2025%26creative%3D6738%26tag%3Dsportsscience-20%26creativeASIN%3DB0010LG7NW%26SubscriptionId%3D" rel="nofollow" target="_blank"><img alt="Peak Flow Meter" data-dcnode-id="530" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.sportsscience.co/wp-content/uploads/2013/04/peak-flow-meter.jpg&amp;raw"></a><span data-dcnode-id="528" instrument_node=""> </span><img alt="Balloon Lung Capacity" data-dcnode-id="527" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.sportsscience.co/wp-content/uploads/2013/04/balloon-lung-capacity.gif&amp;raw" style="height: 250px;"></p><span data-dcnode-id="525" instrument_node="">
</span><h2 data-dcnode-id="523"><span data-dcnode-id="524" instrument_node="">Conclusion</span></h2><span data-dcnode-id="522" instrument_node="">
</span><p data-dcnode-id="520"><span data-dcnode-id="521" instrument_node="">Simply practicing endurance exercise at a good intensity does help your lung capacity, but there are also devices available that can help you to improve even further.  As with most of our articles, the goal is to help you beat the competition or improve yourself, and lung training is just one more way you can do so.</span></p><span data-dcnode-id="519" instrument_node="">
