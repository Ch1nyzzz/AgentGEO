</span><li class="l1" data-dcnode-id="1672"><a data-dcnode-id="1673" href="#h5"><span data-dcnode-id="1674" instrument_node="">Can dietary supplements for exercise and athletic performance be harmful?</span></a></li><span data-dcnode-id="1671" instrument_node="">
</span><li class="l1" data-dcnode-id="1668"><a data-dcnode-id="1669" href="#h6"><span data-dcnode-id="1670" instrument_node="">Choosing a sensible approach to improving exercise and athletic performance</span></a></li><span data-dcnode-id="1667" instrument_node="">

</span><li data-dcnode-id="1660"><a data-dcnode-id="1661" href="#disc"><span data-dcnode-id="1662" instrument_node="">Disclaimer</span></a></li><span data-dcnode-id="1659" instrument_node="">

</span><span data-dcnode-id="1653" instrument_node="">
</span></div><p data-dcnode-id="1645"><em data-dcnode-id="1650"><span data-dcnode-id="1651" instrument_node="">This is a reader-friendly overview of Dietary Supplements for Exercise and Athletic Performance.  For more details, see our</span></em><span data-dcnode-id="1649" instrument_node=""> </span><a data-dcnode-id="1647" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//ods.od.nih.gov/factsheets/ExerciseAndAthleticPerformance-HealthProfessional/"><span data-dcnode-id="1648" instrument_node="">health professional fact sheet on Dietary Supplements for Exercise and Athletic Performance</span></a><span data-dcnode-id="1646" instrument_node="">.</span></p><h2 data-dcnode-id="1643" id="h1"><span data-dcnode-id="1644" instrument_node="">What are dietary supplements for exercise and athletic performance and what do they do?</span></h2><span data-dcnode-id="1642" instrument_node="">
</span><p data-dcnode-id="1637"><span data-dcnode-id="1641" instrument_node="">If you get regular exercise—and especially if you’re an athlete and compete in sporting events—you know that a nutritionally adequate diet and plenty of fluids are important for maximizing your physical performance. But you may wonder if </span><a class="fscopy" data-dcnode-id="1639" href="#" onclick="showTerm('/factsheets/showterm.aspx?tID=121')"><span data-dcnode-id="1640" instrument_node="">dietary supplements</span></a><span data-dcnode-id="1638" instrument_node=""> could help you train harder, improve performance, or gain a competitive edge.</span></p><span data-dcnode-id="1636" instrument_node="">
</span><p data-dcnode-id="1622"><span data-dcnode-id="1635" instrument_node="">This fact sheet describes what’s known about the </span><a class="fscopy" data-dcnode-id="1633" href="#" onclick="showTerm('/factsheets/showterm.aspx?tID=188')"><span data-dcnode-id="1634" instrument_node="">effectiveness</span></a><span data-dcnode-id="1632" instrument_node=""> and safety of many </span><a class="fscopy" data-dcnode-id="1630" href="#" onclick="showTerm('/factsheets/showterm.aspx?tID=655')"><span data-dcnode-id="1631" instrument_node="">ingredients</span></a><span data-dcnode-id="1629" instrument_node=""> in dietary </span><a class="fscopy" data-dcnode-id="1627" href="#" onclick="showTerm('/factsheets/showterm.aspx?tID=135')"><span data-dcnode-id="1628" instrument_node="">supplements</span></a><span data-dcnode-id="1626" instrument_node=""> that are promoted to improve exercise and athletic performance. These products are sometimes called “ergogenic aids,” but this fact sheet simply refers to them as “performance supplements.” Sellers of these supplements might claim that their products improve strength or endurance, help you achieve a performance goal more quickly, or increase your </span><a class="fscopy" data-dcnode-id="1624" href="#" onclick="showTerm('/factsheets/showterm.aspx?tID=437')"><span data-dcnode-id="1625" instrument_node="">tolerance</span></a><span data-dcnode-id="1623" instrument_node=""> for more intense training. They might also claim that their supplements can help prepare your body for exercise, reduce the chance of injury during training, or assist with recovery after exercise.</span></p><span data-dcnode-id="1621" instrument_node="">
</span><p data-dcnode-id="1619"><span data-dcnode-id="1620" instrument_node="">Performance supplements cannot substitute for a healthy diet, but some of them may have value, depending on the type and intensity of your activity. Other supplements don’t seem to work, and a few might be harmful.</span></p><span data-dcnode-id="1618" instrument_node="">
</span><p data-dcnode-id="1610"><span data-dcnode-id="1617" instrument_node="">If you’re thinking about taking a performance supplement, talk to your </span><a class="fscopy" data-dcnode-id="1615" href="#" onclick="showTerm('/factsheets/showterm.aspx?tID=514')"><span data-dcnode-id="1616" instrument_node="">healthcare provider</span></a><span data-dcnode-id="1614" instrument_node="">. If you have a trainer or coach with knowledge of sports medicine, ask them about performance supplements. Talking to an expert is important if you’re a teenager or have any medical conditions. It’s also important to find out whether medications you take might </span><a class="fscopy" data-dcnode-id="1612" href="#" onclick="showTerm('/factsheets/showterm.aspx?tID=389')"><span data-dcnode-id="1613" instrument_node="">interact</span></a><span data-dcnode-id="1611" instrument_node=""> with the performance supplements you’re considering.</span></p><span data-dcnode-id="1609" instrument_node="">
</span><h2 data-dcnode-id="1607" id="h2"><span data-dcnode-id="1608" instrument_node="">What are ingredients in supplements for exercise and athletic performance?</span></h2><span data-dcnode-id="1606" instrument_node="">
</span><p data-dcnode-id="1598"><span data-dcnode-id="1605" instrument_node="">Performance supplements can contain many ingredients—like vitamins and minerals, protein, </span><a class="fscopy" data-dcnode-id="1603" href="#" onclick="showTerm('/factsheets/showterm.aspx?tID=112')"><span data-dcnode-id="1604" instrument_node="">amino acids</span></a><span data-dcnode-id="1602" instrument_node="">, and herbs—in different amounts and in many combinations. These products are sold in various forms, such as </span><a class="fscopy" data-dcnode-id="1600" href="#" onclick="showTerm('/factsheets/showterm.aspx?tID=115')"><span data-dcnode-id="1601" instrument_node="">capsules</span></a><span data-dcnode-id="1599" instrument_node="">, tablets, liquids, and powders.</span></p><span data-dcnode-id="1597" instrument_node="">
</span><p data-dcnode-id="1595"><span data-dcnode-id="1596" instrument_node="">This fact sheet describes ingredients in performance supplements below in alphabetical order. You’ll learn whether each ingredient is effective and safe and get expert advice about using it. But keep in mind that many performance supplements in the marketplace contain more than one ingredient, and ingredients can work differently when they’re combined. Because most ingredient combinations have not been studied, we don’t know how effective or safe they are in improving performance.</span></p><span data-dcnode-id="1594" instrument_node="">
</span><p data-dcnode-id="1592"><span data-dcnode-id="1593" instrument_node="">You may be surprised to learn that makers of performance supplements usually don’t carry out studies in people to find out whether their products really work and are safe. When studies on performance supplement ingredients and ingredient-combinations are done (mainly by researchers at colleges and universities), they often involve small numbers of people taking the supplement for just a few days, weeks, or months. Much of the research is done in young healthy men, but not women, middle-aged and older adults, or teenagers. And often, studies haven’t looked at the use of supplement ingredients or combinations in people involved in the same athletic activity as you. For example, the results from a study in weightlifters might not apply to you if you are a distance runner.</span></p><span data-dcnode-id="1591" instrument_node="">
</span><h2 data-dcnode-id="1589" id="h3"><span data-dcnode-id="1590" instrument_node="">Ingredients in supplements for exercise and athletic performance</span></h2><span data-dcnode-id="1588" instrument_node="">
</span><table class="ingredients" data-dcnode-id="837"><tbody data-dcnode-id="838"><tr data-dcnode-id="1579"><th data-dcnode-id="1586"><span data-dcnode-id="1587" instrument_node="">INGREDIENT</span></th><th data-dcnode-id="1584"><span data-dcnode-id="1585" instrument_node="">DOES IT WORK?</span></th><th data-dcnode-id="1582"><span data-dcnode-id="1583" instrument_node="">IS IT SAFE?</span></th><th class="th4" data-dcnode-id="1580"><span data-dcnode-id="1581" instrument_node="">BOTTOM LINE</span></th></tr><tr class="light" data-dcnode-id="1573" id="tr930_open"><td colspan="3" data-dcnode-id="1575"><span class="expand" data-dcnode-id="1578" onclick="toggleIngredient('tr930');"></span><span class="title" data-dcnode-id="1576" id="Antioxidants"><span data-dcnode-id="1577" instrument_node="">Antioxidants (vitamin C, vitamin E, and coenzyme Q10)</span></span></td><td class="col4" data-dcnode-id="1574"></td></tr><tr class="collapsed" data-dcnode-id="1545" id="tr930_close"><td data-dcnode-id="1567"><span class="collapse" data-dcnode-id="1572" onclick="toggleIngredient('tr930');"></span><span class="title" data-dcnode-id="1570" id="Antioxidants"><span data-dcnode-id="1571" instrument_node="">Antioxidants (vitamin C, vitamin E, and coenzyme Q10)</span></span><br data-dcnode-id="1569"><span data-dcnode-id="1568" instrument_node="">You breathe in more oxygen when you exercise. As a result, free radicals form and damage muscle cells. Because antioxidants can reduce free-radical damage to muscle, some people think that taking them in a supplement might reduce muscle inflammation, soreness, and fatigue.</span></td><td data-dcnode-id="1562"><span class="h" data-dcnode-id="1565"><span data-dcnode-id="1566" instrument_node="">Does it work?</span></span><br data-dcnode-id="1564"><span data-dcnode-id="1563" instrument_node="">No. The free radicals that form when you exercise seem to help muscle fibers grow and produce more energy. Antioxidant supplements might actually reduce some of the benefits of exercise, including muscle growth and power output. Also, they have little effect on aerobic fitness and performance in endurance activities like distance running.</span></td><td data-dcnode-id="1551"><span class="h" data-dcnode-id="1560"><span data-dcnode-id="1561" instrument_node="">Is it safe?</span></span><br data-dcnode-id="1559"><span data-dcnode-id="1558" instrument_node="">Everyone needs adequate amounts of </span><a data-dcnode-id="1556" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//ods.od.nih.gov/factsheets/VitaminC-Consumer"><span data-dcnode-id="1557" instrument_node="">vitamin C</span></a><span data-dcnode-id="1555" instrument_node=""> and </span><a data-dcnode-id="1553" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//ods.od.nih.gov/factsheets/VitaminE-Consumer"><span data-dcnode-id="1554" instrument_node="">vitamin E</span></a><span data-dcnode-id="1552" instrument_node=""> for good health. Getting too much of these nutrients can be harmful, but the amounts of vitamin C (about 1,000 milligrams) and vitamin E (about 500 IU) typically used in studies of performance supplements are below safe upper limits. The side effects from coenzyme Q10 can include tiredness, insomnia, headaches, and some gastrointestinal (GI) discomfort, but these effects tend to be mild.</span></td><td class="col4" data-dcnode-id="1546"><span class="h" data-dcnode-id="1549"><span data-dcnode-id="1550" instrument_node="">Bottom Line</span></span><br data-dcnode-id="1548"><span data-dcnode-id="1547" instrument_node="">There’s little scientific evidence to support taking supplements containing vitamins C and E or coenzyme Q10 to improve performance if you’re getting adequate amounts of these nutrients from a nutritious diet.</span></td></tr><tr class="collapsed" data-dcnode-id="1540" id="tr930_close2"><td class="m4" colspan="4" data-dcnode-id="1541"><span class="h" data-dcnode-id="1543"><span data-dcnode-id="1544" instrument_node="">Bottom Line</span></span><span data-dcnode-id="1542" instrument_node="">: There’s little scientific evidence to support taking supplements containing vitamins C and E or coenzyme Q10 to improve performance if you’re getting adequate amounts of these nutrients from a nutritious diet.</span></td></tr><tr class="dark" data-dcnode-id="1534" id="tr931_open"><td colspan="3" data-dcnode-id="1536"><span class="expand" data-dcnode-id="1539" onclick="toggleIngredient('tr931');"></span><span class="title" data-dcnode-id="1537" id="Arginine"><span data-dcnode-id="1538" instrument_node="">Arginine</span></span></td><td class="col4" data-dcnode-id="1535"></td></tr><tr class="collapsed" data-dcnode-id="1512" id="tr931_close"><td data-dcnode-id="1528"><span class="collapse" data-dcnode-id="1533" onclick="toggleIngredient('tr931');"></span><span class="title" data-dcnode-id="1531" id="Arginine"><span data-dcnode-id="1532" instrument_node="">Arginine</span></span><br data-dcnode-id="1530"><span data-dcnode-id="1529" instrument_node="">Arginine is an amino acid in foods that contain protein, like meat, poultry, fish, eggs, dairy products, and legumes. A nutritious diet supplies about 4 to 5 grams a day. Supplement sellers claim that taking larger amounts of arginine in supplements improves performance, partly because the body converts it into nitric oxide, which expands blood vessels and increases blood flow. Increased blood flow helps deliver oxygen and nutrients to exercising muscle and speeds up the removal of waste products that cause muscle fatigue.</span></td><td data-dcnode-id="1523"><span class="h" data-dcnode-id="1526"><span data-dcnode-id="1527" instrument_node="">Does it work?</span></span><br data-dcnode-id="1525"><span data-dcnode-id="1524" instrument_node="">Although the research is limited, arginine supplements seem to have little to no effect on strengthening and muscle-building exercises (like bodybuilding) or aerobic activities (like running and cycling). Studies have used 2 to 20 grams a day of arginine for up to 3 months.</span></td><td data-dcnode-id="1518"><span class="h" data-dcnode-id="1521"><span data-dcnode-id="1522" instrument_node="">Is it safe?</span></span><br data-dcnode-id="1520"><span data-dcnode-id="1519" instrument_node="">Arginine supplements seem safe when users take up to 9 grams a day for several days or weeks. Taking more can cause GI discomfort and can slightly lower blood pressure.</span></td><td class="col4" data-dcnode-id="1513"><span class="h" data-dcnode-id="1516"><span data-dcnode-id="1517" instrument_node="">Bottom Line</span></span><br data-dcnode-id="1515"><span data-dcnode-id="1514" instrument_node="">There’s little scientific evidence to support taking arginine supplements to increase strength, improve performance, or help tired and sore muscles recover after exercise.</span></td></tr><tr class="collapsed" data-dcnode-id="1507" id="tr931_close2"><td class="m4" colspan="4" data-dcnode-id="1508"><span class="h" data-dcnode-id="1510"><span data-dcnode-id="1511" instrument_node="">Bottom Line</span></span><span data-dcnode-id="1509" instrument_node="">: There’s little scientific evidence to support taking arginine supplements to increase strength, improve performance, or help tired and sore muscles recover after exercise.</span></td></tr><tr class="light" data-dcnode-id="1501" id="tr932_open"><td colspan="3" data-dcnode-id="1503"><span class="expand" data-dcnode-id="1506" onclick="toggleIngredient('tr932');"></span><span class="title" data-dcnode-id="1504" id="Beetroot"><span data-dcnode-id="1505" instrument_node="">Beetroot or beet juice</span></span></td><td class="col4" data-dcnode-id="1502"></td></tr><tr class="collapsed" data-dcnode-id="1479" id="tr932_close"><td data-dcnode-id="1495"><span class="collapse" data-dcnode-id="1500" onclick="toggleIngredient('tr932');"></span><span class="title" data-dcnode-id="1498" id="Beetroot"><span data-dcnode-id="1499" instrument_node="">Beetroot or beet juice</span></span><br data-dcnode-id="1497"><span data-dcnode-id="1496" instrument_node="">Beets and beet juice are among the best food sources of nitrate. Beet juice might improve athletic performance because the body converts some of this nitrate to nitric oxide, which expands blood vessels. This blood vessel expansion increases blood flow and the delivery of oxygen and nutrients to exercising muscle. The expanded blood vessels also speed up the removal of waste products that cause muscle fatigue.</span></td><td data-dcnode-id="1490"><span class="h" data-dcnode-id="1493"><span data-dcnode-id="1494" instrument_node="">Does it work?</span></span><br data-dcnode-id="1492"><span data-dcnode-id="1491" instrument_node="">Many, but not all, studies have found that beet juice can improve performance and endurance in aerobic activities like running, swimming, cycling, and rowing. But whether it helps with strengthening and bodybuilding exercises isn’t known. Beet juice is more likely to improve the performance of recreational exercisers than highly-trained athletes. The usual approach in studies is for participants to drink 2 cups of beet juice about 2.5 to 3 hours before exercise.</span></td><td data-dcnode-id="1485"><span class="h" data-dcnode-id="1488"><span data-dcnode-id="1489" instrument_node="">Is it safe?</span></span><br data-dcnode-id="1487"><span data-dcnode-id="1486" instrument_node="">Drinking moderate amounts of beet juice is safe, but it can turn your urine pink or red.</span></td><td class="col4" data-dcnode-id="1480"><span class="h" data-dcnode-id="1483"><span data-dcnode-id="1484" instrument_node="">Bottom Line</span></span><br data-dcnode-id="1482"><span data-dcnode-id="1481" instrument_node="">Beet juice might improve aerobic exercise performance if you’re recreationally active. But whether dietary supplements containing beetroot powder have the same effects as beet juice isn’t known.</span></td></tr><tr class="collapsed" data-dcnode-id="1474" id="tr932_close2"><td class="m4" colspan="4" data-dcnode-id="1475"><span class="h" data-dcnode-id="1477"><span data-dcnode-id="1478" instrument_node="">Bottom Line</span></span><span data-dcnode-id="1476" instrument_node="">: Beet juice might improve aerobic exercise performance if you’re recreationally active. But whether dietary supplements containing beetroot powder have the same effects as beet juice isn’t known.</span></td></tr><tr class="dark" data-dcnode-id="1468" id="tr933_open"><td colspan="3" data-dcnode-id="1470"><span class="expand" data-dcnode-id="1473" onclick="toggleIngredient('tr933');"></span><span class="title" data-dcnode-id="1471" id="Beta-alanine"><span data-dcnode-id="1472" instrument_node="">Beta-alanine</span></span></td><td class="col4" data-dcnode-id="1469"></td></tr><tr class="collapsed" data-dcnode-id="1446" id="tr933_close"><td data-dcnode-id="1462"><span class="collapse" data-dcnode-id="1467" onclick="toggleIngredient('tr933');"></span><span class="title" data-dcnode-id="1465" id="Beta-alanine"><span data-dcnode-id="1466" instrument_node="">Beta-alanine</span></span><br data-dcnode-id="1464"><span data-dcnode-id="1463" instrument_node="">Beta-alanine is an amino acid in foods such as meat, poultry, and fish. People get up to about 1 gram a day of beta-alanine, depending on their diet. Your body uses beta-alanine to make carnosine in skeletal muscles. When you exercise intensely for several minutes, your muscles produce lactic acid, which reduces muscular force and causes tiredness. Carnosine reduces the buildup of lactic acid. Beta-alanine supplements increase muscle carnosine levels by different amounts, depending on the person.</span></td><td data-dcnode-id="1457"><span class="h" data-dcnode-id="1460"><span data-dcnode-id="1461" instrument_node="">Does it work?</span></span><br data-dcnode-id="1459"><span data-dcnode-id="1458" instrument_node="">Some, but not all, studies have shown that beta-alanine produces small performance improvements in swimming and team sports, like hockey and football, that require high-intensity, intermittent effort over short periods. Whether beta-alanine helps with endurance activities like cycling isn’t clear. It’s also not clear whether beta-alanine mainly benefits trained athletes or recreational exercisers. In most studies, participants took 1.6 to 6.4 grams a day of beta-alanine for 4 to 8 weeks.</span></td><td data-dcnode-id="1452"><span class="h" data-dcnode-id="1455"><span data-dcnode-id="1456" instrument_node="">Is it safe?</span></span><br data-dcnode-id="1454"><span data-dcnode-id="1453" instrument_node="">Taking 800 milligrams or more beta-alanine can cause moderate to severe paresthesia, a tingling, prickling, or burning sensation in your face, neck, back of the hands, and upper trunk. This effect can last 60 to 90 minutes but is not considered serious or harmful. Taking divided doses or a sustained-release form of beta-alanine can reduce or eliminate this paresthesia. It isn’t known whether it’s safe to take beta-alanine supplements daily for more than several months.</span></td><td class="col4" data-dcnode-id="1447"><span class="h" data-dcnode-id="1450"><span data-dcnode-id="1451" instrument_node="">Bottom Line</span></span><br data-dcnode-id="1449"><span data-dcnode-id="1448" instrument_node="">Sports-medicine experts disagree on the value of taking beta-alanine supplements to enhance performance in high-intensity, intermittent activities. The International Society of Sports Nutrition recommends that if you are healthy and want to try beta-alanine supplements, take a daily loading dose of 4 to 6 grams per day (in divided doses with meals) for at least 2 weeks to see if it helps.</span></td></tr><tr class="collapsed" data-dcnode-id="1441" id="tr933_close2"><td class="m4" colspan="4" data-dcnode-id="1442"><span class="h" data-dcnode-id="1444"><span data-dcnode-id="1445" instrument_node="">Bottom Line</span></span><span data-dcnode-id="1443" instrument_node="">: Sports-medicine experts disagree on the value of taking beta-alanine supplements to enhance performance in high-intensity, intermittent activities. The International Society of Sports Nutrition recommends that if you are healthy and want to try beta-alanine supplements, take a daily loading dose of 4 to 6 grams per day (in divided doses with meals) for at least 2 weeks to see if it helps.</span></td></tr><tr class="light" data-dcnode-id="1435" id="tr934_open"><td colspan="3" data-dcnode-id="1437"><span class="expand" data-dcnode-id="1440" onclick="toggleIngredient('tr934');"></span><span class="title" data-dcnode-id="1438" id="Beta-hydroxy-beta-methylbutyrate"><span data-dcnode-id="1439" instrument_node="">Beta-hydroxy-beta-methylbutyrate (HMB)</span></span></td><td class="col4" data-dcnode-id="1436"></td></tr><tr class="collapsed" data-dcnode-id="1413" id="tr934_close"><td data-dcnode-id="1429"><span class="collapse" data-dcnode-id="1434" onclick="toggleIngredient('tr934');"></span><span class="title" data-dcnode-id="1432" id="Beta-hydroxy-beta-methylbutyrate"><span data-dcnode-id="1433" instrument_node="">Beta-hydroxy-beta-methylbutyrate (HMB)</span></span><br data-dcnode-id="1431"><span data-dcnode-id="1430" instrument_node="">Your body converts a small amount of leucine, one of the amino acids in foods and protein powders, to HMB. Your liver then converts the HMB into another compound that experts think helps muscle cells restore their structure and function after exercise. HMB also helps build protein in muscle and reduces muscle-protein breakdown.</span></td><td data-dcnode-id="1424"><span class="h" data-dcnode-id="1427"><span data-dcnode-id="1428" instrument_node="">Does it work?</span></span><br data-dcnode-id="1426"><span data-dcnode-id="1425" instrument_node="">It’s hard to know whether you might benefit from using HMB supplements because the research on these supplements has included adults of very different ages and fitness levels who took widely varying doses for different amounts of time. Overall, HMB seems to speed up recovery from exercise that’s intense enough and long enough to cause muscle damage. Therefore, if you’re a trained athlete, you’ll need to exert yourself more than recreationally active people to cause the muscle damage that HMB might help treat.</span></td><td data-dcnode-id="1419"><span class="h" data-dcnode-id="1422"><span data-dcnode-id="1423" instrument_node="">Is it safe?</span></span><br data-dcnode-id="1421"><span data-dcnode-id="1420" instrument_node="">Studies haven’t reported any side effects in adults taking 3 grams per day of HMB for up to 8 weeks.</span></td><td class="col4" data-dcnode-id="1414"><span class="h" data-dcnode-id="1417"><span data-dcnode-id="1418" instrument_node="">Bottom Line</span></span><br data-dcnode-id="1416"><span data-dcnode-id="1415" instrument_node="">It’s not clear whether taking HMB supplements will improve athletic performance. The International Society of Sports Nutrition recommends that if you are a healthy adult who wants to try HMB supplements, to take 3 grams per day in three equal servings of 1 gram for at least 2 weeks to see if it helps. HMB comes in two forms: one with calcium and one without. A dose of 3 grams of the type with calcium supplies about 400 milligrams of calcium.</span></td></tr><tr class="collapsed" data-dcnode-id="1408" id="tr934_close2"><td class="m4" colspan="4" data-dcnode-id="1409"><span class="h" data-dcnode-id="1411"><span data-dcnode-id="1412" instrument_node="">Bottom Line</span></span><span data-dcnode-id="1410" instrument_node="">: It’s not clear whether taking HMB supplements will improve athletic performance. The International Society of Sports Nutrition recommends that if you are a healthy adult who wants to try HMB supplements, to take 3 grams per day in three equal servings of 1 gram for at least 2 weeks to see if it helps. HMB comes in two forms: one with calcium and one without. A dose of 3 grams of the type with calcium supplies about 400 milligrams of calcium.</span></td></tr><tr class="dark" data-dcnode-id="1402" id="tr935_open"><td colspan="3" data-dcnode-id="1404"><span class="expand" data-dcnode-id="1407" onclick="toggleIngredient('tr935');"></span><span class="title" data-dcnode-id="1405" id="Betaine"><span data-dcnode-id="1406" instrument_node="">Betaine</span></span></td><td class="col4" data-dcnode-id="1403"></td></tr><tr class="collapsed" data-dcnode-id="1380" id="tr935_close"><td data-dcnode-id="1396"><span class="collapse" data-dcnode-id="1401" onclick="toggleIngredient('tr935');"></span><span class="title" data-dcnode-id="1399" id="Betaine"><span data-dcnode-id="1400" instrument_node="">Betaine</span></span><br data-dcnode-id="1398"><span data-dcnode-id="1397" instrument_node="">Your body makes betaine, and it is also found in foods such as beets, spinach, and whole-grain bread. You get about 100 to 300 milligrams a day of betaine when you eat a nutritious diet. How betaine supplements might affect or improve your performance isn’t known.</span></td><td data-dcnode-id="1391"><span class="h" data-dcnode-id="1394"><span data-dcnode-id="1395" instrument_node="">Does it work?</span></span><br data-dcnode-id="1393"><span data-dcnode-id="1392" instrument_node="">Only a few, mostly small, studies have evaluated betaine as a performance supplement. Most of these studies examined the use of betaine supplements to improve strength and power performance in bodybuilders. The studies found either no performance improvements or only modest ones. Participants in these studies took 2 to 5 grams a day of betaine for up to 15 days.</span></td><td data-dcnode-id="1386"><span class="h" data-dcnode-id="1389"><span data-dcnode-id="1390" instrument_node="">Is it safe?</span></span><br data-dcnode-id="1388"><span data-dcnode-id="1387" instrument_node="">The few studies in which athletes took betaine supplements didn’t find any side effects. But there hasn’t been enough research to know for sure whether it’s really safe.</span></td><td class="col4" data-dcnode-id="1381"><span class="h" data-dcnode-id="1384"><span data-dcnode-id="1385" instrument_node="">Bottom Line</span></span><br data-dcnode-id="1383"><span data-dcnode-id="1382" instrument_node="">There’s little scientific evidence to support taking betaine supplements to improve performance if you eat a nutritious diet.</span></td></tr><tr class="collapsed" data-dcnode-id="1375" id="tr935_close2"><td class="m4" colspan="4" data-dcnode-id="1376"><span class="h" data-dcnode-id="1378"><span data-dcnode-id="1379" instrument_node="">Bottom Line</span></span><span data-dcnode-id="1377" instrument_node="">: There’s little scientific evidence to support taking betaine supplements to improve performance if you eat a nutritious diet.</span></td></tr><tr class="light" data-dcnode-id="1369" id="tr936_open"><td colspan="3" data-dcnode-id="1371"><span class="expand" data-dcnode-id="1374" onclick="toggleIngredient('tr936');"></span><span class="title" data-dcnode-id="1372" id="Branched-chain"><span data-dcnode-id="1373" instrument_node="">Branched-chain amino acids (BCAAs)</span></span></td><td class="col4" data-dcnode-id="1370"></td></tr><tr class="collapsed" data-dcnode-id="1347" id="tr936_close"><td data-dcnode-id="1363"><span class="collapse" data-dcnode-id="1368" onclick="toggleIngredient('tr936');"></span><span class="title" data-dcnode-id="1366" id="Branched-chain"><span data-dcnode-id="1367" instrument_node="">Branched-chain amino acids (BCAAs)</span></span><br data-dcnode-id="1365"><span data-dcnode-id="1364" instrument_node="">The amino acids leucine, isoleucine, and valine are known as BCAAs. Animal foods, like meat, fish, and milk, contain BCAAs. Your muscles can use these three amino acids to provide energy during exercise. Leucine might also help build muscle.</span></td><td data-dcnode-id="1358"><span class="h" data-dcnode-id="1361"><span data-dcnode-id="1362" instrument_node="">Does it work?</span></span><br data-dcnode-id="1360"><span data-dcnode-id="1359" instrument_node="">There’s little evidence that BCAA supplements improve performance in endurance activities like distance running. BCAA supplements might help increase your muscle size and strength together with a weight-training program. But it isn’t clear whether taking BCAA supplements will help you build more muscle than just eating enough high-quality protein foods.</span></td><td data-dcnode-id="1353"><span class="h" data-dcnode-id="1356"><span data-dcnode-id="1357" instrument_node="">Is it safe?</span></span><br data-dcnode-id="1355"><span data-dcnode-id="1354" instrument_node="">A nutritious diet with enough protein can easily provide 10 to 20 grams a day of the BCAAs. Taking up to another 20 grams a day of BCAAs in supplements seems to be safe.</span></td><td class="col4" data-dcnode-id="1348"><span class="h" data-dcnode-id="1351"><span data-dcnode-id="1352" instrument_node="">Bottom Line</span></span><br data-dcnode-id="1350"><span data-dcnode-id="1349" instrument_node="">There’s not much scientific evidence to support taking BCAA supplements to improve performance, build muscle, or help tired and sore muscles to recover after exercise. Eating foods containing protein automatically increases your intake of BCAAs.</span></td></tr><tr class="collapsed" data-dcnode-id="1342" id="tr936_close2"><td class="m4" colspan="4" data-dcnode-id="1343"><span class="h" data-dcnode-id="1345"><span data-dcnode-id="1346" instrument_node="">Bottom Line</span></span><span data-dcnode-id="1344" instrument_node="">: There’s not much scientific evidence to support taking BCAA supplements to improve performance, build muscle, or help tired and sore muscles to recover after exercise. Eating foods containing protein automatically increases your intake of BCAAs.</span></td></tr><tr class="dark" data-dcnode-id="1336" id="tr937_open"><td colspan="3" data-dcnode-id="1338"><span class="expand" data-dcnode-id="1341" onclick="toggleIngredient('tr937');"></span><span class="title" data-dcnode-id="1339" id="Caffeine"><span data-dcnode-id="1340" instrument_node="">Caffeine</span></span></td><td class="col4" data-dcnode-id="1337"></td></tr><tr class="collapsed" data-dcnode-id="1310" id="tr937_close"><td data-dcnode-id="1330"><span class="collapse" data-dcnode-id="1335" onclick="toggleIngredient('tr937');"></span><span class="title" data-dcnode-id="1333" id="Caffeine"><span data-dcnode-id="1334" instrument_node="">Caffeine</span></span><br data-dcnode-id="1332"><span data-dcnode-id="1331" instrument_node="">Caffeine is a stimulant in beverages (like coffee, tea, and energy drinks) and in herbs (such as guarana and kola nut). Caffeine is also added to some dietary supplements. Moderate amounts of caffeine might increase your energy levels and reduce fatigue for several hours.</span></td><td data-dcnode-id="1321"><span class="h" data-dcnode-id="1328"><span data-dcnode-id="1329" instrument_node="">Does it work?</span></span><br data-dcnode-id="1327"><span data-dcnode-id="1326" instrument_node="">Caffeine might improve endurance, strength, and power in team sports. It’s most likely to help with endurance activities (such as distance running) and sports that require intense, intermittent effort (like soccer and tennis). Caffeine doesn’t help with short, intense exercise like sprinting or weightlifting. People have different responses to caffeine. It doesn’t boost performance in everyone, or may only slightly boost performance.</span><br data-dcnode-id="1325"><span data-dcnode-id="1324" instrument_node="">
</span><br data-dcnode-id="1323"><span data-dcnode-id="1322" instrument_node="">
The usual dose of caffeine to aid performance is 2 to 6 milligrams per kilogram of body weight, or about 210 to 420 mg caffeine for a 154-pound person. (By comparison, a cup of coffee has about 85 to 100 milligrams of caffeine.) Taking more probably doesn’t improve performance further and can increase the risk of side effects.</span></td><td data-dcnode-id="1316"><span class="h" data-dcnode-id="1319"><span data-dcnode-id="1320" instrument_node="">Is it safe?</span></span><br data-dcnode-id="1318"><span data-dcnode-id="1317" instrument_node="">Caffeine intakes of up to 400 to 500 milligrams a day seem safe in adults. Teenagers should limit their caffeine intake to no more than 100 milligrams a day. Taking 500 milligrams or more a day can reduce rather than improve physical performance, disturb sleep, and cause irritability and anxiety. Taking 10,000 milligrams or more in a single dose (one tablespoon of pure caffeine powder) can be fatal.</span></td><td class="col4" data-dcnode-id="1311"><span class="h" data-dcnode-id="1314"><span data-dcnode-id="1315" instrument_node="">Bottom Line</span></span><br data-dcnode-id="1313"><span data-dcnode-id="1312" instrument_node="">Sports-medicine experts agree that caffeine can help you exercise at the same intensity level for longer and reduce feelings of fatigue. They suggest taking 2 to 6 milligrams per kilogram of body weight 15 to 60 minutes before you exercise. The National Collegiate Athletic Association and International Olympic Committee limit the amount of caffeine that athletes can take before a competition.</span></td></tr><tr class="collapsed" data-dcnode-id="1305" id="tr937_close2"><td class="m4" colspan="4" data-dcnode-id="1306"><span class="h" data-dcnode-id="1308"><span data-dcnode-id="1309" instrument_node="">Bottom Line</span></span><span data-dcnode-id="1307" instrument_node="">: Sports-medicine experts agree that caffeine can help you exercise at the same intensity level for longer and reduce feelings of fatigue. They suggest taking 2 to 6 milligrams per kilogram of body weight 15 to 60 minutes before you exercise. The National Collegiate Athletic Association and International Olympic Committee limit the amount of caffeine that athletes can take before a competition.</span></td></tr><tr class="light" data-dcnode-id="1299" id="tr938_open"><td colspan="3" data-dcnode-id="1301"><span class="expand" data-dcnode-id="1304" onclick="toggleIngredient('tr938');"></span><span class="title" data-dcnode-id="1302" id="Citrulline"><span data-dcnode-id="1303" instrument_node="">Citrulline</span></span></td><td class="col4" data-dcnode-id="1300"></td></tr><tr class="collapsed" data-dcnode-id="1277" id="tr938_close"><td data-dcnode-id="1293"><span class="collapse" data-dcnode-id="1298" onclick="toggleIngredient('tr938');"></span><span class="title" data-dcnode-id="1296" id="Citrulline"><span data-dcnode-id="1297" instrument_node="">Citrulline</span></span><br data-dcnode-id="1295"><span data-dcnode-id="1294" instrument_node="">Citrulline is an amino acid that your body produces; it is also present in some foods. Your kidneys convert most citrulline into another amino acid, arginine. Your body then transforms the arginine into nitric oxide, which expands blood vessels. This expansion increases blood flow and the delivery of oxygen and nutrients to exercising muscles and speeds up the removal of waste products that cause muscle fatigue.</span></td><td data-dcnode-id="1288"><span class="h" data-dcnode-id="1291"><span data-dcnode-id="1292" instrument_node="">Does it work?</span></span><br data-dcnode-id="1290"><span data-dcnode-id="1289" instrument_node="">The research on citrulline as a performance supplement is limited. The few studies find that citrulline might help improve, hinder, or have no effect on performance. In these studies, participants took up to 9 grams of citrulline for 1 day or 6 grams per day for up to 16 days.</span></td><td data-dcnode-id="1283"><span class="h" data-dcnode-id="1286"><span data-dcnode-id="1287" instrument_node="">Is it safe?</span></span><br data-dcnode-id="1285"><span data-dcnode-id="1284" instrument_node="">There isn’t enough research on citrulline to know for sure whether it’s safe. Some users have reported that it can cause stomach discomfort.</span></td><td class="col4" data-dcnode-id="1278"><span class="h" data-dcnode-id="1281"><span data-dcnode-id="1282" instrument_node="">Bottom Line</span></span><br data-dcnode-id="1280"><span data-dcnode-id="1279" instrument_node="">There’s not much scientific evidence to support taking citrulline supplements to improve exercise or athletic performance.</span></td></tr><tr class="collapsed" data-dcnode-id="1272" id="tr938_close2"><td class="m4" colspan="4" data-dcnode-id="1273"><span class="h" data-dcnode-id="1275"><span data-dcnode-id="1276" instrument_node="">Bottom Line</span></span><span data-dcnode-id="1274" instrument_node="">: There’s not much scientific evidence to support taking citrulline supplements to improve exercise or athletic performance.</span></td></tr><tr class="dark" data-dcnode-id="1266" id="tr939_open"><td colspan="3" data-dcnode-id="1268"><span class="expand" data-dcnode-id="1271" onclick="toggleIngredient('tr939');"></span><span class="title" data-dcnode-id="1269" id="Creatine"><span data-dcnode-id="1270" instrument_node="">Creatine</span></span></td><td class="col4" data-dcnode-id="1267"></td></tr><tr class="collapsed" data-dcnode-id="1240" id="tr939_close"><td data-dcnode-id="1260"><span class="collapse" data-dcnode-id="1265" onclick="toggleIngredient('tr939');"></span><span class="title" data-dcnode-id="1263" id="Creatine"><span data-dcnode-id="1264" instrument_node="">Creatine</span></span><br data-dcnode-id="1262"><span data-dcnode-id="1261" instrument_node="">Creatine is a compound that is stored in your muscles and supplies them with energy. Your body produces some creatine (about 1 gram a day), and you get some creatine from eating animal-based foods, such as beef and salmon (about 500 milligrams in a 4-ounce serving). But it is only when you take much larger amounts of creatine from dietary supplements that it might improve certain types of performance.</span></td><td data-dcnode-id="1251"><span class="h" data-dcnode-id="1258"><span data-dcnode-id="1259" instrument_node="">Does it work?</span></span><br data-dcnode-id="1257"><span data-dcnode-id="1256" instrument_node="">Creatine supplements can increase strength, power, and the ability to contract muscles for maximum effort. But the extent of performance improvements from creatine supplements differs among individuals.</span><br data-dcnode-id="1255"><span data-dcnode-id="1254" instrument_node="">
</span><br data-dcnode-id="1253"><span data-dcnode-id="1252" instrument_node="">
Use of creatine supplements for several weeks or months can help with training. Overall, creatine enhances performance during repeated short bursts of intense, intermittent activity (lasting up to about 2.5 minutes at a time), such as sprinting and weight lifting. Creatine seems to have little value for endurance activities, such as distance running, cycling, or swimming.</span></td><td data-dcnode-id="1246"><span class="h" data-dcnode-id="1249"><span data-dcnode-id="1250" instrument_node="">Is it safe?</span></span><br data-dcnode-id="1248"><span data-dcnode-id="1247" instrument_node="">Creatine is safe for healthy adults to take for several weeks or months. It also seems safe for long-term use over several years. Creatine usually causes some weight gain because it increases water retention. Rare individual reactions to creatine include some muscle stiffness and cramps as well as GI distress.</span></td><td class="col4" data-dcnode-id="1241"><span class="h" data-dcnode-id="1244"><span data-dcnode-id="1245" instrument_node="">Bottom Line</span></span><br data-dcnode-id="1243"><span data-dcnode-id="1242" instrument_node="">Sports-medicine experts agree that creatine supplements can improve performance in activities that involve intense effort followed by short recovery periods. It can also be valuable in training for certain athletic competitions. In studies, people often took a loading dose of about 20 grams per day of creatine (in four equal portions) for 5 to 7 days and then 3 to 5 grams a day. Creatine monohydrate is the most widely used and studied form of creatine in supplements.</span></td></tr><tr class="collapsed" data-dcnode-id="1235" id="tr939_close2"><td class="m4" colspan="4" data-dcnode-id="1236"><span class="h" data-dcnode-id="1238"><span data-dcnode-id="1239" instrument_node="">Bottom Line</span></span><span data-dcnode-id="1237" instrument_node="">: Sports-medicine experts agree that creatine supplements can improve performance in activities that involve intense effort followed by short recovery periods. It can also be valuable in training for certain athletic competitions. In studies, people often took a loading dose of about 20 grams per day of creatine (in four equal portions) for 5 to 7 days and then 3 to 5 grams a day. Creatine monohydrate is the most widely used and studied form of creatine in supplements.</span></td></tr><tr class="light" data-dcnode-id="1229" id="tr940_open"><td colspan="3" data-dcnode-id="1231"><span class="expand" data-dcnode-id="1234" onclick="toggleIngredient('tr940');"></span><span class="title" data-dcnode-id="1232" id="Deer"><span data-dcnode-id="1233" instrument_node="">Deer antler velvet</span></span></td><td class="col4" data-dcnode-id="1230"></td></tr><tr class="collapsed" data-dcnode-id="1207" id="tr940_close"><td data-dcnode-id="1223"><span class="collapse" data-dcnode-id="1228" onclick="toggleIngredient('tr940');"></span><span class="title" data-dcnode-id="1226" id="Deer"><span data-dcnode-id="1227" instrument_node="">Deer antler velvet</span></span><br data-dcnode-id="1225"><span data-dcnode-id="1224" instrument_node="">Deer antler velvet supplements are made from the antlers of deer or elk before the antlers turn into bone. Deer antlers might contain growth factors that could promote muscle growth.</span></td><td data-dcnode-id="1218"><span class="h" data-dcnode-id="1221"><span data-dcnode-id="1222" instrument_node="">Does it work?</span></span><br data-dcnode-id="1220"><span data-dcnode-id="1219" instrument_node="">There’s been little research on use of deer antler velvet to improve performance in either strength or endurance activities. The few published studies have found no benefit from taking the supplement.</span></td><td data-dcnode-id="1213"><span class="h" data-dcnode-id="1216"><span data-dcnode-id="1217" instrument_node="">Is it safe?</span></span><br data-dcnode-id="1215"><span data-dcnode-id="1214" instrument_node="">Deer antler velvet hasn’t been studied enough to know whether taking it is safe.</span></td><td class="col4" data-dcnode-id="1208"><span class="h" data-dcnode-id="1211"><span data-dcnode-id="1212" instrument_node="">Bottom Line</span></span><br data-dcnode-id="1210"><span data-dcnode-id="1209" instrument_node="">There’s no scientific evidence to support taking deer antler velvet supplements to improve exercise or athletic performance.</span></td></tr><tr class="collapsed" data-dcnode-id="1202" id="tr940_close2"><td class="m4" colspan="4" data-dcnode-id="1203"><span class="h" data-dcnode-id="1205"><span data-dcnode-id="1206" instrument_node="">Bottom Line</span></span><span data-dcnode-id="1204" instrument_node="">: There’s no scientific evidence to support taking deer antler velvet supplements to improve exercise or athletic performance.</span></td></tr><tr class="dark" data-dcnode-id="1196" id="tr941_open"><td colspan="3" data-dcnode-id="1198"><span class="expand" data-dcnode-id="1201" onclick="toggleIngredient('tr941');"></span><span class="title" data-dcnode-id="1199" id="Dehydroepiandrosterone"><span data-dcnode-id="1200" instrument_node="">Dehydroepiandrosterone (DHEA)</span></span></td><td class="col4" data-dcnode-id="1197"></td></tr><tr class="collapsed" data-dcnode-id="1174" id="tr941_close"><td data-dcnode-id="1190"><span class="collapse" data-dcnode-id="1195" onclick="toggleIngredient('tr941');"></span><span class="title" data-dcnode-id="1193" id="Dehydroepiandrosterone"><span data-dcnode-id="1194" instrument_node="">Dehydroepiandrosterone (DHEA)</span></span><br data-dcnode-id="1192"><span data-dcnode-id="1191" instrument_node="">DHEA is a steroid hormone produced by the adrenal glands. Your body converts some DHEA into testosterone, the male hormone that enhances muscle size and strength.</span></td><td data-dcnode-id="1185"><span class="h" data-dcnode-id="1188"><span data-dcnode-id="1189" instrument_node="">Does it work?</span></span><br data-dcnode-id="1187"><span data-dcnode-id="1186" instrument_node="">There’s been little study of the use of DHEA supplements to improve performance. The few published studies (all in men) have found no benefit from taking the supplement. Muscle size or strength and aerobic capacity didn’t improve, and testosterone levels didn’t rise.</span></td><td data-dcnode-id="1180"><span class="h" data-dcnode-id="1183"><span data-dcnode-id="1184" instrument_node="">Is it safe?</span></span><br data-dcnode-id="1182"><span data-dcnode-id="1181" instrument_node="">DHEA hasn’t been studied enough to know whether it’s safe to take. Two small studies in men found no side effects. But in women, taking DHEA supplements for months can increase testosterone levels, which can cause acne and facial hair growth.</span></td><td class="col4" data-dcnode-id="1175"><span class="h" data-dcnode-id="1178"><span data-dcnode-id="1179" instrument_node="">Bottom Line</span></span><br data-dcnode-id="1177"><span data-dcnode-id="1176" instrument_node="">There’s no scientific evidence to support taking DHEA to improve exercise or athletic performance. The National Collegiate Athletic Association and the World Anti-Doping Agency prohibit the use of DHEA in athletic competitions.</span></td></tr><tr class="collapsed" data-dcnode-id="1169" id="tr941_close2"><td class="m4" colspan="4" data-dcnode-id="1170"><span class="h" data-dcnode-id="1172"><span data-dcnode-id="1173" instrument_node="">Bottom Line</span></span><span data-dcnode-id="1171" instrument_node="">: There’s no scientific evidence to support taking DHEA to improve exercise or athletic performance. The National Collegiate Athletic Association and the World Anti-Doping Agency prohibit the use of DHEA in athletic competitions.</span></td></tr><tr class="light" data-dcnode-id="1163" id="tr942_open"><td colspan="3" data-dcnode-id="1165"><span class="expand" data-dcnode-id="1168" onclick="toggleIngredient('tr942');"></span><span class="title" data-dcnode-id="1166" id="Ginseng"><span data-dcnode-id="1167" instrument_node="">Ginseng</span></span></td><td class="col4" data-dcnode-id="1164"></td></tr><tr class="collapsed" data-dcnode-id="1130" id="tr942_close"><td data-dcnode-id="1154"><span class="collapse" data-dcnode-id="1162" onclick="toggleIngredient('tr942');"></span><span class="title" data-dcnode-id="1160" id="Ginseng"><span data-dcnode-id="1161" instrument_node="">Ginseng</span></span><br data-dcnode-id="1159"><span data-dcnode-id="1158" instrument_node="">Ginseng is the root of a plant used for thousands of years in traditional Chinese medicine. Some experts believe that </span><em data-dcnode-id="1156"><span data-dcnode-id="1157" instrument_node="">Panax</span></em><span data-dcnode-id="1155" instrument_node=""> (also known as Chinese, Korean, Japanese, or American) ginseng might improve stamina and vitality. Siberian or Russian ginseng has been used to fight fatigue and strengthen the immune system.</span></td><td data-dcnode-id="1146"><span class="h" data-dcnode-id="1152"><span data-dcnode-id="1153" instrument_node="">Does it work?</span></span><br data-dcnode-id="1151"><span data-dcnode-id="1150" instrument_node="">Several small studies have examined whether </span><em data-dcnode-id="1148"><span data-dcnode-id="1149" instrument_node="">Panax</span></em><span data-dcnode-id="1147" instrument_node=""> or Siberian ginseng supplements can improve performance. This research provides little evidence that various doses and preparations of these supplements improve performance in athletes or recreational exercisers.</span></td><td data-dcnode-id="1138"><span class="h" data-dcnode-id="1144"><span data-dcnode-id="1145" instrument_node="">Is it safe?</span></span><br data-dcnode-id="1143"><span data-dcnode-id="1142" instrument_node="">Both </span><em data-dcnode-id="1140"><span data-dcnode-id="1141" instrument_node="">Panax</span></em><span data-dcnode-id="1139" instrument_node=""> and Siberian ginseng seem to be safe. However, ginseng supplements can cause headaches or GI effects and disturb sleep.</span></td><td class="col4" data-dcnode-id="1131"><span class="h" data-dcnode-id="1136"><span data-dcnode-id="1137" instrument_node="">Bottom Line</span></span><br data-dcnode-id="1135"><span data-dcnode-id="1134" instrument_node="">There’s little scientific evidence to support taking ginseng supplements to improve exercise or athletic performance.</span><br data-dcnode-id="1133"><span data-dcnode-id="1132" instrument_node="">
&nbsp;</span></td></tr><tr class="collapsed" data-dcnode-id="1123" id="tr942_close2"><td class="m4" colspan="4" data-dcnode-id="1124"><span class="h" data-dcnode-id="1128"><span data-dcnode-id="1129" instrument_node="">Bottom Line</span></span><span data-dcnode-id="1127" instrument_node="">: There’s little scientific evidence to support taking ginseng supplements to improve exercise or athletic performance.</span><br data-dcnode-id="1126"><span data-dcnode-id="1125" instrument_node="">
&nbsp;</span></td></tr><tr class="dark" data-dcnode-id="1117" id="tr943_open"><td colspan="3" data-dcnode-id="1119"><span class="expand" data-dcnode-id="1122" onclick="toggleIngredient('tr943');"></span><span class="title" data-dcnode-id="1120" id="Glutamine"><span data-dcnode-id="1121" instrument_node="">Glutamine</span></span></td><td class="col4" data-dcnode-id="1118"></td></tr><tr class="collapsed" data-dcnode-id="1092" id="tr943_close"><td data-dcnode-id="1108"><span class="collapse" data-dcnode-id="1116" onclick="toggleIngredient('tr943');"></span><span class="title" data-dcnode-id="1114" id="Glutamine"><span data-dcnode-id="1115" instrument_node="">Glutamine</span></span><br data-dcnode-id="1113"><span data-dcnode-id="1112" instrument_node="">Glutamine is an amino acid that your body uses to produce energy. Adults consume about 3 to 6 grams a day from protein-containing foods such as meat, poultry, fish, eggs, dairy products, and legumes. Your body also makes some glutamine, mainly from </span><a data-dcnode-id="1110" href="#Branched-chain" onclick="toggleIngredient('tr7');"><span data-dcnode-id="1111" instrument_node="">BCAAs</span></a><span data-dcnode-id="1109" instrument_node="">.</span></td><td data-dcnode-id="1103"><span class="h" data-dcnode-id="1106"><span data-dcnode-id="1107" instrument_node="">Does it work?</span></span><br data-dcnode-id="1105"><span data-dcnode-id="1104" instrument_node="">Only a few studies have examined the use of glutamine supplements for improving performance in strengthening and muscle-building exercises (like bodybuilding) and for recovering from these exercises (for example, by reducing muscle soreness). Glutamine has either no effect or provides only a small benefit.</span></td><td data-dcnode-id="1098"><span class="h" data-dcnode-id="1101"><span data-dcnode-id="1102" instrument_node="">Is it safe?</span></span><br data-dcnode-id="1100"><span data-dcnode-id="1099" instrument_node="">Studies haven’t reported any side effects from the use of up to 45 grams a day of glutamine for several weeks in adults.</span></td><td class="col4" data-dcnode-id="1093"><span class="h" data-dcnode-id="1096"><span data-dcnode-id="1097" instrument_node="">Bottom Line</span></span><br data-dcnode-id="1095"><span data-dcnode-id="1094" instrument_node="">There’s little scientific evidence to support taking glutamine supplements to improve exercise or athletic performance.</span></td></tr><tr class="collapsed" data-dcnode-id="1087" id="tr943_close2"><td class="m4" colspan="4" data-dcnode-id="1088"><span class="h" data-dcnode-id="1090"><span data-dcnode-id="1091" instrument_node="">Bottom Line</span></span><span data-dcnode-id="1089" instrument_node="">: There’s little scientific evidence to support taking glutamine supplements to improve exercise or athletic performance.</span></td></tr><tr class="light" data-dcnode-id="1081" id="tr944_open"><td colspan="3" data-dcnode-id="1083"><span class="expand" data-dcnode-id="1086" onclick="toggleIngredient('tr944');"></span><span class="title" data-dcnode-id="1084" id="Iron"><span data-dcnode-id="1085" instrument_node="">Iron</span></span></td><td class="col4" data-dcnode-id="1082"></td></tr><tr class="collapsed" data-dcnode-id="1055" id="tr944_close"><td data-dcnode-id="1071"><span class="collapse" data-dcnode-id="1080" onclick="toggleIngredient('tr944');"></span><span class="title" data-dcnode-id="1078" id="Iron"><span data-dcnode-id="1079" instrument_node="">Iron</span></span><br data-dcnode-id="1077"><span data-dcnode-id="1076" instrument_node="">Iron is a mineral that delivers oxygen to muscles and tissues throughout your body. Cells also need iron to turn food into energy. Iron deficiency, especially with anemia, limits your ability to exercise and be active because it makes you tired and reduces your performance.</span><br data-dcnode-id="1075"><span data-dcnode-id="1074" instrument_node="">
</span><br data-dcnode-id="1073"><span data-dcnode-id="1072" instrument_node="">
The recommended amount of iron to get each day is 11 milligrams for teenage boys, 15 milligrams for teenage girls, 8 milligrams for men to age 50, 18 milligrams for women to age 50, and 8 milligrams for older adults of both sexes. Recommended amounts are even higher for athletes, vegetarians, and vegans. Teenage girls and premenopausal women have the greatest risk of not getting enough iron from their diets.</span></td><td data-dcnode-id="1066"><span class="h" data-dcnode-id="1069"><span data-dcnode-id="1070" instrument_node="">Does it work?</span></span><br data-dcnode-id="1068"><span data-dcnode-id="1067" instrument_node="">For people with iron deficiency anemia, taking an iron supplement will probably improve performance in both strength and endurance activities. But if you get enough iron from your diet, taking extra iron won’t help. It’s not clear whether milder iron deficiency without anemia reduces exercise and athletic performance.</span></td><td data-dcnode-id="1061"><span class="h" data-dcnode-id="1064"><span data-dcnode-id="1065" instrument_node="">Is it safe?</span></span><br data-dcnode-id="1063"><span data-dcnode-id="1062" instrument_node="">Taking less than 45 milligrams of iron in a supplement is safe for teenagers and adults. Higher doses can cause upset stomach, constipation, nausea, abdominal pain, vomiting, and fainting. However, doctors sometimes prescribe large amounts of iron for a short time to treat iron-deficiency anemia.</span></td><td class="col4" data-dcnode-id="1056"><span class="h" data-dcnode-id="1059"><span data-dcnode-id="1060" instrument_node="">Bottom Line</span></span><br data-dcnode-id="1058"><span data-dcnode-id="1057" instrument_node="">Taking enough iron in supplements to treat iron-deficiency anemia improves exercise capacity. But a healthcare provider should diagnose this condition before you start taking iron supplements. If you want to improve your athletic performance, you should eat a healthy diet containing foods rich in iron, such as lean meats, seafood, poultry, beans, nuts, and raisins. If needed, an iron-containing dietary supplement can help you get the recommended amount of iron.</span></td></tr><tr class="collapsed" data-dcnode-id="1050" id="tr944_close2"><td class="m4" colspan="4" data-dcnode-id="1051"><span class="h" data-dcnode-id="1053"><span data-dcnode-id="1054" instrument_node="">Bottom Line</span></span><span data-dcnode-id="1052" instrument_node="">: Taking enough iron in supplements to treat iron-deficiency anemia improves exercise capacity. But a healthcare provider should diagnose this condition before you start taking iron supplements. If you want to improve your athletic performance, you should eat a healthy diet containing foods rich in iron, such as lean meats, seafood, poultry, beans, nuts, and raisins. If needed, an iron-containing dietary supplement can help you get the recommended amount of iron.</span></td></tr><tr class="dark" data-dcnode-id="1044" id="tr945_open"><td colspan="3" data-dcnode-id="1046"><span class="expand" data-dcnode-id="1049" onclick="toggleIngredient('tr945');"></span><span class="title" data-dcnode-id="1047" id="Protein"><span data-dcnode-id="1048" instrument_node="">Protein</span></span></td><td class="col4" data-dcnode-id="1045"></td></tr><tr class="collapsed" data-dcnode-id="1022" id="tr945_close"><td data-dcnode-id="1038"><span class="collapse" data-dcnode-id="1043" onclick="toggleIngredient('tr945');"></span><span class="title" data-dcnode-id="1041" id="Protein"><span data-dcnode-id="1042" instrument_node="">Protein</span></span><br data-dcnode-id="1040"><span data-dcnode-id="1039" instrument_node="">Protein helps to build, maintain, and repair your muscles. It improves your body’s response to athletic training and helps shorten the time you need to recover after exercise. Protein is made from amino acids. Your body makes some amino acids but needs to get others (known as essential amino acids or EAAs) from food. Animal foods like meat, poultry, fish, eggs, and dairy products contain all of the EAAs. Plant foods like grains and legumes contain different EAAs, so eating a diet containing different types of plant-based foods is one way to get all EAAs. Most protein powders and drinks contain whey, a protein in milk that provides all the EAAs.</span></td><td data-dcnode-id="1033"><span class="h" data-dcnode-id="1036"><span data-dcnode-id="1037" instrument_node="">Does it work?</span></span><br data-dcnode-id="1035"><span data-dcnode-id="1034" instrument_node="">Adequate protein in your diet provides the EAAs necessary for making muscle proteins and reduces the breakdown of proteins in your muscles. Athletes need about 0.5 to 0.9 grams of protein per pound of body weight a day (or about 75 to 135 grams for a person weighing 150 pounds). You might need even more for a short time when you’re training intensely or if you reduce your food intake to improve your physique or achieve a competition weight.</span></td><td data-dcnode-id="1028"><span class="h" data-dcnode-id="1031"><span data-dcnode-id="1032" instrument_node="">Is it safe?</span></span><br data-dcnode-id="1030"><span data-dcnode-id="1029" instrument_node="">High intakes of protein seem to be quite safe, but there is no benefit to consuming more than recommended amounts.</span></td><td class="col4" data-dcnode-id="1023"><span class="h" data-dcnode-id="1026"><span data-dcnode-id="1027" instrument_node="">Bottom Line</span></span><br data-dcnode-id="1025"><span data-dcnode-id="1024" instrument_node="">If you are an athlete, you can probably eat enough foods that contain protein to meet your needs for protein. If needed, protein supplements and protein-fortified food and beverage products can help you get enough protein. Sports-science experts recommend that athletes consume 0.14 grams of protein per pound of body weight (about 20 grams for a person weighing 150 pounds) of high-quality protein (from animal foods and/or a mix of different plant foods) every 3 to 5 hours, including before sleep and within 2 hours after exercising.</span></td></tr><tr class="collapsed" data-dcnode-id="1017" id="tr945_close2"><td class="m4" colspan="4" data-dcnode-id="1018"><span class="h" data-dcnode-id="1020"><span data-dcnode-id="1021" instrument_node="">Bottom Line</span></span><span data-dcnode-id="1019" instrument_node="">: If you are an athlete, you can probably eat enough foods that contain protein to meet your needs for protein. If needed, protein supplements and protein-fortified food and beverage products can help you get enough protein. Sports-science experts recommend that athletes consume 0.14 grams of protein per pound of body weight (about 20 grams for a person weighing 150 pounds) of high-quality protein (from animal foods and/or a mix of different plant foods) every 3 to 5 hours, including before sleep and within 2 hours after exercising.</span></td></tr><tr class="light" data-dcnode-id="1011" id="tr946_open"><td colspan="3" data-dcnode-id="1013"><span class="expand" data-dcnode-id="1016" onclick="toggleIngredient('tr946');"></span><span class="title" data-dcnode-id="1014" id="Quercetin"><span data-dcnode-id="1015" instrument_node="">Quercetin</span></span></td><td class="col4" data-dcnode-id="1012"></td></tr><tr class="collapsed" data-dcnode-id="989" id="tr946_close"><td data-dcnode-id="1005"><span class="collapse" data-dcnode-id="1010" onclick="toggleIngredient('tr946');"></span><span class="title" data-dcnode-id="1008" id="Quercetin"><span data-dcnode-id="1009" instrument_node="">Quercetin</span></span><br data-dcnode-id="1007"><span data-dcnode-id="1006" instrument_node="">Quercetin is a compound found in fruits, vegetables, and some beverages (like tea). Some experts suggest that quercetin supplements increase energy production in muscle and improve blood flow throughout your body. A nutritious diet provides up to about 13 milligrams a day of quercetin.</span></td><td data-dcnode-id="1000"><span class="h" data-dcnode-id="1003"><span data-dcnode-id="1004" instrument_node="">Does it work?</span></span><br data-dcnode-id="1002"><span data-dcnode-id="1001" instrument_node="">There’s limited research on the use of quercetin supplements to improve performance. The studies found that any benefits, when they occur, tend to be small. In these studies, participants took about 1,000 milligrams a day of quercetin for up to 8 weeks.</span></td><td data-dcnode-id="995"><span class="h" data-dcnode-id="998"><span data-dcnode-id="999" instrument_node="">Is it safe?</span></span><br data-dcnode-id="997"><span data-dcnode-id="996" instrument_node="">The studies of quercetin supplements didn’t find any side effects in the athletes who took them. But quercetin hasn’t been studied enough to know whether it’s really safe.</span></td><td class="col4" data-dcnode-id="990"><span class="h" data-dcnode-id="993"><span data-dcnode-id="994" instrument_node="">Bottom Line</span></span><br data-dcnode-id="992"><span data-dcnode-id="991" instrument_node="">There’s little scientific evidence to support taking quercetin supplements to improve exercise or athletic performance.</span></td></tr><tr class="collapsed" data-dcnode-id="984" id="tr946_close2"><td class="m4" colspan="4" data-dcnode-id="985"><span class="h" data-dcnode-id="987"><span data-dcnode-id="988" instrument_node="">Bottom Line</span></span><span data-dcnode-id="986" instrument_node="">: There’s little scientific evidence to support taking quercetin supplements to improve exercise or athletic performance.</span></td></tr><tr class="dark" data-dcnode-id="978" id="tr947_open"><td colspan="3" data-dcnode-id="980"><span class="expand" data-dcnode-id="983" onclick="toggleIngredient('tr947');"></span><span class="title" data-dcnode-id="981" id="Ribose"><span data-dcnode-id="982" instrument_node="">Ribose</span></span></td><td class="col4" data-dcnode-id="979"></td></tr><tr class="collapsed" data-dcnode-id="956" id="tr947_close"><td data-dcnode-id="972"><span class="collapse" data-dcnode-id="977" onclick="toggleIngredient('tr947');"></span><span class="title" data-dcnode-id="975" id="Ribose"><span data-dcnode-id="976" instrument_node="">Ribose</span></span><br data-dcnode-id="974"><span data-dcnode-id="973" instrument_node="">Ribose is a natural sugar your body makes that helps with energy production in muscle. Some scientists believe that ribose supplements help muscles produce more energy.</span></td><td data-dcnode-id="967"><span class="h" data-dcnode-id="970"><span data-dcnode-id="971" instrument_node="">Does it work?</span></span><br data-dcnode-id="969"><span data-dcnode-id="968" instrument_node="">There’s been little study of the use of ribose supplements to improve performance. The few published studies in both trained athletes and occasional exercisers have shown little if any benefit from doses ranging from 625 milligrams to 10,000 milligrams a day for up to 8 weeks.</span></td><td data-dcnode-id="962"><span class="h" data-dcnode-id="965"><span data-dcnode-id="966" instrument_node="">Is it safe?</span></span><br data-dcnode-id="964"><span data-dcnode-id="963" instrument_node="">The studies of athletes taking ribose supplements have found no side effects. But ribose hasn’t been studied enough to know whether it’s really safe when taken in large amounts for several months or more.</span></td><td class="col4" data-dcnode-id="957"><span class="h" data-dcnode-id="960"><span data-dcnode-id="961" instrument_node="">Bottom Line</span></span><br data-dcnode-id="959"><span data-dcnode-id="958" instrument_node="">There’s very little scientific evidence to support taking ribose supplements to improve exercise or athletic performance.</span></td></tr><tr class="collapsed" data-dcnode-id="951" id="tr947_close2"><td class="m4" colspan="4" data-dcnode-id="952"><span class="h" data-dcnode-id="954"><span data-dcnode-id="955" instrument_node="">Bottom Line</span></span><span data-dcnode-id="953" instrument_node="">: There’s very little scientific evidence to support taking ribose supplements to improve exercise or athletic performance.</span></td></tr><tr class="light" data-dcnode-id="945" id="tr948_open"><td colspan="3" data-dcnode-id="947"><span class="expand" data-dcnode-id="950" onclick="toggleIngredient('tr948');"></span><span class="title" data-dcnode-id="948" id="Sodium"><span data-dcnode-id="949" instrument_node="">Sodium bicarbonate</span></span></td><td class="col4" data-dcnode-id="946"></td></tr><tr class="collapsed" data-dcnode-id="923" id="tr948_close"><td data-dcnode-id="939"><span class="collapse" data-dcnode-id="944" onclick="toggleIngredient('tr948');"></span><span class="title" data-dcnode-id="942" id="Sodium"><span data-dcnode-id="943" instrument_node="">Sodium bicarbonate</span></span><br data-dcnode-id="941"><span data-dcnode-id="940" instrument_node="">Sodium bicarbonate is commonly known as baking soda. Exercising intensely over several minutes causes muscles to produce acids, such as lactic acid, that reduce muscle force and cause tiredness. Sodium bicarbonate can reduce the buildup of these acids.</span></td><td data-dcnode-id="934"><span class="h" data-dcnode-id="937"><span data-dcnode-id="938" instrument_node="">Does it work?</span></span><br data-dcnode-id="936"><span data-dcnode-id="935" instrument_node="">Studies show that athletes who take sodium bicarbonate might improve their performance a little in intense, short-term activities (like sprinting and swimming) and in intermittently intense sports (like tennis and boxing). But different athletes respond differently to sodium bicarbonate. Sodium bicarbonate might actually hinder performance in some people. The usual dose taken is 300 milligrams per kilogram of body weight, or about 4 to 5 teaspoons of baking soda. Some people find this amount of sodium bicarbonate, dissolved in liquid, too salty to drink.</span></td><td data-dcnode-id="929"><span class="h" data-dcnode-id="932"><span data-dcnode-id="933" instrument_node="">Is it safe?</span></span><br data-dcnode-id="931"><span data-dcnode-id="930" instrument_node="">Sodium bicarbonate can cause GI distress, including nausea and vomiting, and weight gain due to water retention. It is also high in sodium (1,260 milligrams per teaspoon).</span></td><td class="col4" data-dcnode-id="924"><span class="h" data-dcnode-id="927"><span data-dcnode-id="928" instrument_node="">Bottom Line</span></span><br data-dcnode-id="926"><span data-dcnode-id="925" instrument_node="">Sodium bicarbonate might provide some performance benefit in strenuous exercise that lasts several minutes and in sports that require intermittent, intense activity, especially for trained athletes. However, in some people, sodium bicarbonate provides no performance benefit, and it can even reduce performance.</span></td></tr><tr class="collapsed" data-dcnode-id="918" id="tr948_close2"><td class="m4" colspan="4" data-dcnode-id="919"><span class="h" data-dcnode-id="921"><span data-dcnode-id="922" instrument_node="">Bottom Line</span></span><span data-dcnode-id="920" instrument_node="">: Sodium bicarbonate might provide some performance benefit in strenuous exercise that lasts several minutes and in sports that require intermittent, intense activity, especially for trained athletes. However, in some people, sodium bicarbonate provides no performance benefit, and it can even reduce performance.</span></td></tr><tr class="dark" data-dcnode-id="912" id="tr949_open"><td colspan="3" data-dcnode-id="914"><span class="expand" data-dcnode-id="917" onclick="toggleIngredient('tr949');"></span><span class="title" data-dcnode-id="915" id="Tart"><span data-dcnode-id="916" instrument_node="">Tart or sour cherry</span></span></td><td class="col4" data-dcnode-id="913"></td></tr><tr class="collapsed" data-dcnode-id="890" id="tr949_close"><td data-dcnode-id="906"><span class="collapse" data-dcnode-id="911" onclick="toggleIngredient('tr949');"></span><span class="title" data-dcnode-id="909" id="Tart"><span data-dcnode-id="910" instrument_node="">Tart or sour cherry</span></span><br data-dcnode-id="908"><span data-dcnode-id="907" instrument_node="">Tart or sour cherries of the Montmorency variety contain compounds that might help you recover from strenuous exercise. Specifically, these cherries might help to reduce pain, muscle damage from strength-related activities, and lung trauma from endurance activities that require deep, heavy breathing.</span></td><td data-dcnode-id="901"><span class="h" data-dcnode-id="904"><span data-dcnode-id="905" instrument_node="">Does it work?</span></span><br data-dcnode-id="903"><span data-dcnode-id="902" instrument_node="">There’s limited research on tart cherry as a performance supplement. The studies that have been done suggest that it might help bodybuilders recover their strength faster and feel less muscle soreness after exercising. The supplements could also help runners race faster and be less likely to develop a cold or respiratory problem after a marathon. The typical dose is about 2 cups of juice or 500 milligrams of tart-cherry-skin powder for a week before the exercise and for 2 days afterwards.</span></td><td data-dcnode-id="896"><span class="h" data-dcnode-id="899"><span data-dcnode-id="900" instrument_node="">Is it safe?</span></span><br data-dcnode-id="898"><span data-dcnode-id="897" instrument_node="">Studies of tart-cherry products in athletes have not found any side effects. But the safety of tart-cherry supplements has not been well studied.</span></td><td class="col4" data-dcnode-id="891"><span class="h" data-dcnode-id="894"><span data-dcnode-id="895" instrument_node="">Bottom Line</span></span><br data-dcnode-id="893"><span data-dcnode-id="892" instrument_node="">There’s limited scientific evidence to support taking tart-cherry products to improve exercise and athletic performance.</span></td></tr><tr class="collapsed" data-dcnode-id="885" id="tr949_close2"><td class="m4" colspan="4" data-dcnode-id="886"><span class="h" data-dcnode-id="888"><span data-dcnode-id="889" instrument_node="">Bottom Line</span></span><span data-dcnode-id="887" instrument_node="">: There’s limited scientific evidence to support taking tart-cherry products to improve exercise and athletic performance.</span></td></tr><tr class="light" data-dcnode-id="879" id="tr950_open"><td colspan="3" data-dcnode-id="881"><span class="expand" data-dcnode-id="884" onclick="toggleIngredient('tr950');"></span><span class="title" data-dcnode-id="882" id="Tribulus"><span data-dcnode-id="883" instrument_node="">Tribulus terrestris</span></span></td><td class="col4" data-dcnode-id="880"></td></tr><tr class="collapsed" data-dcnode-id="847" id="tr950_close"><td data-dcnode-id="871"><span class="collapse" data-dcnode-id="878" onclick="toggleIngredient('tr950');"></span><span class="title" data-dcnode-id="876" id="Tribulus"><span data-dcnode-id="877" instrument_node="">Tribulus terrestris</span></span><br data-dcnode-id="875"><em data-dcnode-id="873"><span data-dcnode-id="874" instrument_node="">Tribulus terrestris</span></em><span data-dcnode-id="872" instrument_node=""> is a plant containing compounds that some sellers claim can improve performance by increasing levels of several hormones, including the male hormone testosterone.</span></td><td data-dcnode-id="863"><span class="h" data-dcnode-id="869"><span data-dcnode-id="870" instrument_node="">Does it work?</span></span><br data-dcnode-id="868"><span data-dcnode-id="867" instrument_node="">There’s limited research on the use of </span><em data-dcnode-id="865"><span data-dcnode-id="866" instrument_node="">Tribulus terrestris</span></em><span data-dcnode-id="864" instrument_node=""> supplements to increase strength or muscle mass. The few studies investigating it did not find that it had any benefit.</span></td><td data-dcnode-id="856"><span class="h" data-dcnode-id="861"><span data-dcnode-id="862" instrument_node="">Is it safe?</span></span><br data-dcnode-id="860"><em data-dcnode-id="858"><span data-dcnode-id="859" instrument_node="">Tribulus terrestris</span></em><span data-dcnode-id="857" instrument_node=""> hasn’t been studied enough to know whether it’s safe. Studies in animals show that high doses can cause heart, liver, and kidney damage.</span></td><td class="col4" data-dcnode-id="848"><span class="h" data-dcnode-id="854"><span data-dcnode-id="855" instrument_node="">Bottom Line</span></span><br data-dcnode-id="853"><span data-dcnode-id="852" instrument_node="">There’s no scientific support for taking </span><em data-dcnode-id="850"><span data-dcnode-id="851" instrument_node="">Tribulus terrestris</span></em><span data-dcnode-id="849" instrument_node=""> supplements to improve exercise or athletic performance. Some sports-medicine experts advise against taking any dietary supplements claimed to boost testosterone.</span></td></tr><tr class="collapsed" data-dcnode-id="839" id="tr950_close2"><td class="m4" colspan="4" data-dcnode-id="840"><span class="h" data-dcnode-id="845"><span data-dcnode-id="846" instrument_node="">Bottom Line</span></span><span data-dcnode-id="844" instrument_node="">: There’s no scientific support for taking </span><em data-dcnode-id="842"><span data-dcnode-id="843" instrument_node="">Tribulus terrestris</span></em><span data-dcnode-id="841" instrument_node=""> supplements to improve exercise or athletic performance. Some sports-medicine experts advise against taking any dietary supplements claimed to boost testosterone.</span></td></tr></tbody></table><span data-dcnode-id="836" instrument_node="">
</span><p data-dcnode-id="835"></p><span data-dcnode-id="834" instrument_node="">
</span><h2 data-dcnode-id="832" id="h4"><span data-dcnode-id="833" instrument_node="">How does the U.S. government regulate dietary supplements for exercise and athletic performance?</span></h2><span data-dcnode-id="831" instrument_node="">
</span><p data-dcnode-id="820"><span data-dcnode-id="830" instrument_node="">The </span><a class="fscopy" data-dcnode-id="828" href="#" onclick="showTerm('/factsheets/showterm.aspx?tID=190')"><span data-dcnode-id="829" instrument_node="">U.S. Food and Drug Administration</span></a><span data-dcnode-id="827" instrument_node=""> (FDA) regulates dietary supplements for exercise and athletic performance differently from </span><a class="fscopy" data-dcnode-id="825" href="#" onclick="showTerm('/factsheets/showterm.aspx?tID=409')"><span data-dcnode-id="826" instrument_node="">prescription</span></a><span data-dcnode-id="824" instrument_node=""> or over-the-counter drugs. As with other dietary supplements, the FDA does not test or approve performance supplements before they are sold. Manufacturers are responsible for making sure that their supplements are safe and that the claims on the product </span><a class="fscopy" data-dcnode-id="822" href="#" onclick="showTerm('/factsheets/showterm.aspx?tID=196')"><span data-dcnode-id="823" instrument_node="">labels</span></a><span data-dcnode-id="821" instrument_node=""> are truthful and not misleading.</span></p><span data-dcnode-id="819" instrument_node="">
