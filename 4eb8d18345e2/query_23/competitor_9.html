</span><p data-dcnode-id="808"><span data-dcnode-id="818" instrument_node="">When the FDA finds an unsafe dietary supplement, it can remove the supplement from the market or ask the supplement maker to recall the product. The FDA and the </span><a class="fscopy" data-dcnode-id="816" href="#" onclick="showTerm('/factsheets/showterm.aspx?tID=794')"><span data-dcnode-id="817" instrument_node="">Federal Trade Commission</span></a><span data-dcnode-id="815" instrument_node=""> can also take action against companies that make false performance-improvement claims about their supplements; add pharmaceutical drugs or other adulterants to their supplements; or claim that their supplements can </span><a class="fscopy" data-dcnode-id="813" href="#" onclick="showTerm('/factsheets/showterm.aspx?tID=120')"><span data-dcnode-id="814" instrument_node="">diagnose</span></a><span data-dcnode-id="812" instrument_node="">, treat, cure, or </span><a class="fscopy" data-dcnode-id="810" href="#" onclick="showTerm('/factsheets/showterm.aspx?tID=131')"><span data-dcnode-id="811" instrument_node="">prevent</span></a><span data-dcnode-id="809" instrument_node=""> a disease.</span></p><span data-dcnode-id="807" instrument_node="">
</span><p data-dcnode-id="799"><span data-dcnode-id="806" instrument_node="">For more information about dietary supplement regulations, see the </span><a class="fscopy" data-dcnode-id="804" href="#" onclick="showTerm('/factsheets/showterm.aspx?tID=681')"><span data-dcnode-id="805" instrument_node="">Office of Dietary Supplements</span></a><span data-dcnode-id="803" instrument_node=""> publication, </span><a data-dcnode-id="801" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//ods.od.nih.gov/HealthInformation/DS_WhatYouNeedToKnow.aspx"><span data-dcnode-id="802" instrument_node="">Dietary Supplements: What You Need to Know</span></a><span data-dcnode-id="800" instrument_node="">.</span></p><span data-dcnode-id="798" instrument_node="">
</span><h2 data-dcnode-id="796" id="h5"><span data-dcnode-id="797" instrument_node="">Can dietary supplements for exercise and athletic performance be harmful?</span></h2><span data-dcnode-id="795" instrument_node="">
</span><p data-dcnode-id="790"><span data-dcnode-id="794" instrument_node="">Like all dietary supplements, performance supplements can have </span><a class="fscopy" data-dcnode-id="792" href="#" onclick="showTerm('/factsheets/showterm.aspx?tID=355')"><span data-dcnode-id="793" instrument_node="">side effects</span></a><span data-dcnode-id="791" instrument_node=""> and might interact with prescription and over-the-counter medications. Many of these products contain multiple ingredients that have not been adequately tested in combination with each another.</span></p><span data-dcnode-id="789" instrument_node="">
</span><p data-dcnode-id="775"><strong data-dcnode-id="787"><span data-dcnode-id="788" instrument_node="">- Interactions with medications</span></strong><br data-dcnode-id="786"><span data-dcnode-id="785" instrument_node="">
Some dietary supplements for improving exercise and athletic performance can interact or interfere with other medications or supplements. For example, ginseng can reduce the blood-thinning effects of warfarin (Coumadin). Cimetidine (Tagamet HB, used to </span><a class="fscopy" data-dcnode-id="783" href="#" onclick="showTerm('/factsheets/showterm.aspx?tID=161')"><span data-dcnode-id="784" instrument_node="">treat</span></a><span data-dcnode-id="782" instrument_node=""> duodenal </span><a class="fscopy" data-dcnode-id="780" href="#" onclick="showTerm('/factsheets/showterm.aspx?tID=691')"><span data-dcnode-id="781" instrument_node="">ulcers</span></a><span data-dcnode-id="779" instrument_node="">) can slow the removal of caffeine from the body and thus increase the </span><a class="fscopy" data-dcnode-id="777" href="#" onclick="showTerm('/factsheets/showterm.aspx?tID=336')"><span data-dcnode-id="778" instrument_node="">risk</span></a><span data-dcnode-id="776" instrument_node=""> of side effects from caffeine consumption.</span></p><span data-dcnode-id="774" instrument_node="">
</span><p data-dcnode-id="772"><span data-dcnode-id="773" instrument_node="">If you take dietary supplements and medications on a regular basis, tell your healthcare provider.</span></p><span data-dcnode-id="771" instrument_node="">
</span><p data-dcnode-id="754"><strong data-dcnode-id="766"><span data-dcnode-id="770" instrument_node="">- Fraudulent and </span><a class="fscopy" data-dcnode-id="768" href="#" onclick="showTerm('/factsheets/showterm.aspx?tID=164')"><span data-dcnode-id="769" instrument_node="">adulterated</span></a><span data-dcnode-id="767" instrument_node=""> products</span></strong><br data-dcnode-id="765"><span data-dcnode-id="764" instrument_node="">
The FDA warns that some products marketed as dietary supplements to improve exercise and athletic performance might contain inappropriate, unlabeled, or unlawful </span><a class="fscopy" data-dcnode-id="762" href="#" onclick="showTerm('/factsheets/showterm.aspx?tID=427')"><span data-dcnode-id="763" instrument_node="">stimulants</span></a><span data-dcnode-id="761" instrument_node="">, steroids, hormone-like ingredients, </span><a class="fscopy" data-dcnode-id="759" href="#" onclick="showTerm('/factsheets/showterm.aspx?tID=272')"><span data-dcnode-id="760" instrument_node="">controlled</span></a><span data-dcnode-id="758" instrument_node=""> substances, prescription medications, or unapproved </span><a class="fscopy" data-dcnode-id="756" href="#" onclick="showTerm('/factsheets/showterm.aspx?tID=497')"><span data-dcnode-id="757" instrument_node="">drugs</span></a><span data-dcnode-id="755" instrument_node="">. Using these tainted products can cause health problems and disqualify athletes from competitions.</span></p><span data-dcnode-id="753" instrument_node="">
</span><p data-dcnode-id="748"><span data-dcnode-id="752" instrument_node="">The FDA prohibits certain ingredients that some performance dietary supplements used to contain. These prohibited ingredients include androstenedione, dimethylamylamine (DMAA), and ephedra. Not only are these ingredients unsafe, but there is no scientific </span><a class="fscopy" data-dcnode-id="750" href="#" onclick="showTerm('/factsheets/showterm.aspx?tID=122')"><span data-dcnode-id="751" instrument_node="">evidence</span></a><span data-dcnode-id="749" instrument_node=""> showing that they can improve performance.</span></p><span data-dcnode-id="747" instrument_node="">
</span><p data-dcnode-id="730"><span data-dcnode-id="746" instrument_node="">Sellers of some performance supplements ask certain companies to evaluate their products and certify that they are free from many banned ingredients and drugs. The major companies providing this certification service are </span><a data-dcnode-id="744" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.nsf.org/" target="external"><span data-dcnode-id="745" instrument_node="">NSF</span></a><a data-dcnode-id="742" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//ods.od.nih.gov/About/exit_disclaimer.aspx" title="External Website"><img alt="external link disclaimer" class="externallink" data-dcnode-id="743" height="12" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//ods.od.nih.gov/images/Common/externallink.png&amp;raw" width="12"></a><span data-dcnode-id="741" instrument_node=""> through its Certified for Sport® program, </span><a data-dcnode-id="739" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//informed-choice.org/" target="external"><span data-dcnode-id="740" instrument_node="">Informed-Choice,</span></a><a data-dcnode-id="737" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//ods.od.nih.gov/About/exit_disclaimer.aspx" title="External Website"><img alt="external link disclaimer" class="externallink" data-dcnode-id="738" height="12" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//ods.od.nih.gov/images/Common/externallink.png&amp;raw" width="12"></a><span data-dcnode-id="736" instrument_node=""> and the </span><a data-dcnode-id="734" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.bscg.org/" target="external"><span data-dcnode-id="735" instrument_node="">Banned Substances Control Group.</span></a><a data-dcnode-id="732" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//ods.od.nih.gov/About/exit_disclaimer.aspx" title="External Website"><img alt="external link disclaimer" class="externallink" data-dcnode-id="733" height="12" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//ods.od.nih.gov/images/Common/externallink.png&amp;raw" width="12"></a><span data-dcnode-id="731" instrument_node=""> Products that pass these tests may carry the certifier’s official logo and are listed on the certifier’s website.</span></p><span data-dcnode-id="729" instrument_node="">
</span><h2 data-dcnode-id="727" id="h6"><span data-dcnode-id="728" instrument_node="">Choosing a sensible approach to improving exercise and athletic performance</span></h2><span data-dcnode-id="726" instrument_node="">
If you are a competitive or recreational athlete, you will perform at your best and recover most quickly when you eat a </span><a class="fscopy" data-dcnode-id="724" href="#" onclick="showTerm('/factsheets/showterm.aspx?tID=314')"><span data-dcnode-id="725" instrument_node="">nutritionally</span></a><span data-dcnode-id="723" instrument_node=""> adequate diet, drink enough fluids, are physically fit, and are properly trained. Only a few dietary supplements have enough scientific evidence showing that they can improve certain types of exercise and athletic performance. Athletes might use these supplements, if interested, if they already eat a good diet, train properly, and obtain guidance from a healthcare provider or sports-medicine expert.

</span><p data-dcnode-id="722"></p><span data-dcnode-id="721" instrument_node="">
</span><p data-dcnode-id="713"><span data-dcnode-id="720" instrument_node="">In most cases, only adults should use performance supplements. The </span><a class="fscopy" data-dcnode-id="718" href="#" onclick="showTerm('/factsheets/showterm.aspx?tID=259')"><span data-dcnode-id="719" instrument_node="">American Academy of Pediatrics</span></a><span data-dcnode-id="717" instrument_node="">, for example, states that performance supplements don’t improve the abilities of teenage athletes beyond those that come from proper </span><a class="fscopy" data-dcnode-id="715" href="#" onclick="showTerm('/factsheets/showterm.aspx?tID=455')"><span data-dcnode-id="716" instrument_node="">nutrition</span></a><span data-dcnode-id="714" instrument_node=""> and training.</span></p><span data-dcnode-id="712" instrument_node="">
</span><a data-dcnode-id="711" name="change"></a><span data-dcnode-id="710" instrument_node="">

</span><p data-dcnode-id="655"><span data-dcnode-id="656" instrument_node="">This fact sheet by the National Institutes of Health (NIH) Office of Dietary Supplements provides information that should not take the place of medical advice. We encourage you to talk to your healthcare providers (doctor, registered dietitian, pharmacist, etc.) about your interest in, questions about, or use of dietary supplements and what may be best for your overall health. Any mention in this publication of a specific product or service, or recommendation from an organization or professional society, does not represent an endorsement by ODS of that product, service, or expert advice.</span></p><span data-dcnode-id="654" instrument_node="">
