</span><li class="expanded active-trail active menu-mlid-1751" data-dcnode-id="3396"><a class="active-trail active-trail active" data-dcnode-id="3397" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.blf.org.uk/support-for-you/smoking/how-can-i-quit" title="Evidence suggests smokers are three times more likely to quit successfully if they use NHS support.&nbsp;On this page, we explain the different ways you can stop smoking, what to do when you’re ready to quit, and further information and support available to you."><span data-dcnode-id="3398" instrument_node="">How can I quit?</span></a></li><span data-dcnode-id="3395" instrument_node="">
</span><li class="leaf menu-mlid-1749" data-dcnode-id="3392"><a data-dcnode-id="3393" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.blf.org.uk/support-for-you/smoking/when-will-i-feel-better"><span data-dcnode-id="3394" instrument_node="">When will I feel better?</span></a></li><span data-dcnode-id="3391" instrument_node="">
</span><li class="leaf menu-mlid-2800" data-dcnode-id="3388"><a data-dcnode-id="3389" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.blf.org.uk/support-for-you/smoking/withdrawal-symptoms-from-quitting-smoking" title="When you stop smoking, you might experience some withdrawal symptoms. On this page, we explain the withdrawal symptoms you might experience, ways to help you cope and what to do if you relapse."><span data-dcnode-id="3390" instrument_node="">Withdrawal symptoms</span></a></li><span data-dcnode-id="3387" instrument_node="">
</span><li class="last leaf menu-mlid-6156" data-dcnode-id="3384"><a data-dcnode-id="3385" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.blf.org.uk/support-for-you/smoking/stories" title=""><span data-dcnode-id="3386" instrument_node="">Your stop smoking stories </span></a></li><span data-dcnode-id="3383" instrument_node="">
</span></ul><ul class="menu" data-dcnode-id="3373"><li class="first leaf menu-mlid-7672" data-dcnode-id="3379"><a data-dcnode-id="3380" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.blf.org.uk/support-for-you/smoking/vaping-e-cigarettes"><span data-dcnode-id="3381" instrument_node="">Vaping and e-cigarettes</span></a></li><span data-dcnode-id="3378" instrument_node="">
</span><li class="last leaf menu-mlid-2804" data-dcnode-id="3375"><a data-dcnode-id="3376" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.blf.org.uk/support-for-you/smoking/am-i-ready-to-quit" title="If you’re thinking about quitting smoking, it’s a good idea to think about how you’ll benefit from giving up. This will give you motivation to quit."><span data-dcnode-id="3377" instrument_node="">How can I benefit?</span></a></li><span data-dcnode-id="3374" instrument_node="">

</span><div about="/support-for-you/smoking/how-can-i-quit" data-dcnode-id="2876" typeof="sioc:Item foaf:Document"><span data-dcnode-id="3366" instrument_node="">
</span><div class="wrap-content" data-dcnode-id="2963"><span data-dcnode-id="3365" instrument_node="">
</span><h1 data-dcnode-id="3363"><span data-dcnode-id="3364" instrument_node="">How can I stop smoking?</span></h1><span data-dcnode-id="3362" instrument_node=""> </span><p class="intro" data-dcnode-id="3360"><span data-dcnode-id="3361" instrument_node="">Evidence suggests smokers are three times more likely to quit successfully if they use NHS support.&nbsp;On this page, we explain the different ways you can stop smoking, what to do when you’re ready to quit, and further information and support available to you.</span></p><span data-dcnode-id="3359" instrument_node="">
</span><p data-dcnode-id="3357"><span data-dcnode-id="3358" instrument_node="">It can be very hard to change a long-term habit, whether it’s what you eat, how much you exercise or smoking. You don’t have to do it on your own. With support from friends, family and professionals, you’re more likely to be successful.</span></p><span data-dcnode-id="3356" instrument_node="">
</span><p data-dcnode-id="3354"><span data-dcnode-id="3355" instrument_node="">On this page:</span></p><span data-dcnode-id="3353" instrument_node="">
</span><ul data-dcnode-id="3315"><span data-dcnode-id="3352" instrument_node="">
</span><li data-dcnode-id="3349"><a data-dcnode-id="3350" href="#stop-smoking-clinics"><span data-dcnode-id="3351" instrument_node="">Smoking cessation (stop smoking clinics)</span></a></li><span data-dcnode-id="3348" instrument_node="">
</span><li data-dcnode-id="3329"><a data-dcnode-id="3346" href="#treatments"><span data-dcnode-id="3347" instrument_node="">Stop smoking treatments</span></a><span data-dcnode-id="3345" instrument_node="">
</span><ul data-dcnode-id="3331"><span data-dcnode-id="3344" instrument_node="">
</span><li data-dcnode-id="3341"><a data-dcnode-id="3342" href="#nrt"><span data-dcnode-id="3343" instrument_node="">Nicotine replacement therapy (NRT)</span></a></li><span data-dcnode-id="3340" instrument_node="">
</span><li data-dcnode-id="3337"><a data-dcnode-id="3338" href="#medications"><span data-dcnode-id="3339" instrument_node="">Other stop smoking medications</span></a></li><span data-dcnode-id="3336" instrument_node="">
</span><li data-dcnode-id="3333"><a data-dcnode-id="3334" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.blf.org.uk/support-for-you/smoking/vaping-e-cigarettes" target="_blank"><span data-dcnode-id="3335" instrument_node="">E-cigarettes (vaping)</span></a></li><span data-dcnode-id="3332" instrument_node="">
</span></ul><span data-dcnode-id="3330" instrument_node="">
</span></li><span data-dcnode-id="3328" instrument_node="">
</span><li data-dcnode-id="3325"><a data-dcnode-id="3326" href="#benefits"><span data-dcnode-id="3327" instrument_node="">How will I benefit from stopping smoking?</span></a></li><span data-dcnode-id="3324" instrument_node="">
</span><li data-dcnode-id="3321"><a data-dcnode-id="3322" href="#im-ready"><span data-dcnode-id="3323" instrument_node="">I’m ready to stop smoking – what should I do?</span></a></li><span data-dcnode-id="3320" instrument_node="">
</span><li data-dcnode-id="3317"><a data-dcnode-id="3318" href="#further-support"><span data-dcnode-id="3319" instrument_node="">Further information and support</span></a></li><span data-dcnode-id="3316" instrument_node="">
</span></ul><span data-dcnode-id="3314" instrument_node="">
</span><h2 data-dcnode-id="3311"><span data-dcnode-id="3313" instrument_node="">Smoking cessation (stop smoking clinics)</span><a data-dcnode-id="3312" id="stop-smoking-clinics" name="stop-smoking-clinics"></a></h2><span data-dcnode-id="3310" instrument_node="">
</span><p data-dcnode-id="3304"><strong data-dcnode-id="3305"><span data-dcnode-id="3309" instrument_node="">You’re around three times more likely&nbsp;to stop successfully if you use a combination of stop smoking </span><a data-dcnode-id="3307" href="#treatments"><span data-dcnode-id="3308" instrument_node="">treatment</span></a><span data-dcnode-id="3306" instrument_node=""> and specialist help.</span></strong></p><span data-dcnode-id="3303" instrument_node="">
</span><p data-dcnode-id="3298"><span data-dcnode-id="3302" instrument_node="">You can start your stop smoking attempt with your GP. They will be able to give you a prescription to reduce nicotine cravings, as well as nicotine replacement therapy (NRT) such as patches and gum. Your GP should also be able to advise on </span><a data-dcnode-id="3300" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.blf.org.uk/support-for-you/smoking/vaping-e-cigarettes" target="_blank"><span data-dcnode-id="3301" instrument_node="">using e-cigarettes</span></a><span data-dcnode-id="3299" instrument_node="">, which can be an effective quitting tool, despite not being risk free themselves.</span></p><span data-dcnode-id="3297" instrument_node="">
</span><p data-dcnode-id="3290"><span data-dcnode-id="3296" instrument_node="">Your GP will also be able to refer you to local specialist stop smoking services. But </span><strong data-dcnode-id="3292"><span data-dcnode-id="3295" instrument_node="">you can also </span><a data-dcnode-id="3293" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.nhs.uk/better-health/quit-smoking/find-your-local-stop-smoking-service/" target="_blank"><span data-dcnode-id="3294" instrument_node="">contact your local stop smoking service yourself</span></a></strong><span data-dcnode-id="3291" instrument_node="">, for support in your stop smoking journey. Using aids prescribed by your GP alongside the behavioural support offered by stop smoking services is the most effective way to quit.</span></p><span data-dcnode-id="3289" instrument_node="">
</span><blockquote class="breakout" data-dcnode-id="3278" style="font-size:100%;"><span data-dcnode-id="3288" instrument_node="">
</span><p data-dcnode-id="3280"><span data-dcnode-id="3287" instrument_node="">If you have a long-term lung condition, like </span><a data-dcnode-id="3285" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.blf.org.uk/support-for-you/copd" target="_blank"><span data-dcnode-id="3286" instrument_node="">chronic obstructive pulmonary disease (COPD)</span></a><span data-dcnode-id="3284" instrument_node=""> or </span><a data-dcnode-id="3282" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.blf.org.uk/support-for-you/pulmonary-fibrosis" target="_blank"><span data-dcnode-id="3283" instrument_node="">pulmonary fibrosis</span></a><span data-dcnode-id="3281" instrument_node="">, your doctor should offer you support in stopping smoking every time you meet them.</span></p><span data-dcnode-id="3279" instrument_node="">
</span></blockquote><span data-dcnode-id="3277" instrument_node="">
</span><p data-dcnode-id="3269"><span data-dcnode-id="3276" instrument_node="">Find information on specialist stop smoking services near you </span><a data-dcnode-id="3274" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.nhs.uk/better-health/quit-smoking/find-your-local-stop-smoking-service/" target="_blank"><span data-dcnode-id="3275" instrument_node="">on the NHS website</span></a><span data-dcnode-id="3273" instrument_node="">. The NHS also has detailed information about </span><a data-dcnode-id="3271" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.nhs.uk/live-well/quit-smoking/nhs-stop-smoking-services-help-you-quit/" target="_blank"><span data-dcnode-id="3272" instrument_node="">what to expect from a stop smoking service</span></a><span data-dcnode-id="3270" instrument_node="">, which you might find useful to read through. Depending on where you live in the UK, sessions may happen remotely, by phone&nbsp;or video call, or in person at GP surgeries or pharmacies.&nbsp; You may be offered support through an app, text messages or another digital platform in addition to help you stop smoking.&nbsp;There are plenty of apps available to help you stop smoking – search online for one that suits you.</span></p><span data-dcnode-id="3268" instrument_node="">
</span><blockquote class="breakout" data-dcnode-id="3260" style="font-size:100%;"><span data-dcnode-id="3267" instrument_node="">
</span><h3 data-dcnode-id="3265"><span data-dcnode-id="3266" instrument_node="">Go smokefree with your mobile phone</span></h3><span data-dcnode-id="3264" instrument_node="">
</span><p data-dcnode-id="3262"><span data-dcnode-id="3263" instrument_node="">Download the free Smokefree app. It’s a four-week programme of practical support, encouragement and tailored advice.</span></p><span data-dcnode-id="3261" instrument_node="">
</span></blockquote><span data-dcnode-id="3259" instrument_node="">
</span><h2 data-dcnode-id="3256"><span data-dcnode-id="3258" instrument_node="">Stop smoking treatments</span><a data-dcnode-id="3257" id="treatments" name="treatments"></a></h2><span data-dcnode-id="3255" instrument_node="">
</span><h3 data-dcnode-id="3252"><span data-dcnode-id="3254" instrument_node="">Nicotine replacement therapy</span><a data-dcnode-id="3253" id="nrt" name="nrt"></a></h3><span data-dcnode-id="3251" instrument_node="">
</span><p data-dcnode-id="3249"><span data-dcnode-id="3250" instrument_node="">Nicotine replacement therapy (NRT) comes in different forms and helps you to overcome urges to smoke. It’s available on prescription from your GP or local stop smoking service, or to buy from a pharmacy. All the therapies give you a low level of nicotine, without the tar, carbon monoxide and other poisonous chemicals that are in tobacco smoke.</span></p><span data-dcnode-id="3248" instrument_node="">
</span><p data-dcnode-id="3243"><span data-dcnode-id="3247" instrument_node="">Therapies include patches, gum, sprays, lozenges, and inhalators (a device to inhale something). Patches release nicotine slowly, whereas other therapies act more quickly. For most people </span><strong data-dcnode-id="3245"><span data-dcnode-id="3246" instrument_node="">the best approach is to combine two sorts of NRT</span></strong><span data-dcnode-id="3244" instrument_node="">. Usually this means a patch to provide a background level of NRT and a faster-acting product, such as gum, inhalator or nasal spray to use when you get cravings.&nbsp;People usually take NRT for 8-12 weeks before gradually reducing the dose and stopping.&nbsp;Ask your GP, pharmacist or stop smoking service for help to select the best combination for you.</span></p><span data-dcnode-id="3242" instrument_node="">
</span><p data-dcnode-id="3238"><a data-dcnode-id="3240" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.blf.org.uk/support-for-you/smoking/vaping-e-cigarettes" target="_blank"><span data-dcnode-id="3241" instrument_node="">E-cigarettes</span></a><span data-dcnode-id="3239" instrument_node=""> are also a form of nicotine replacement treatment, as the vapour usually includes nicotine. Evidence suggests that they are at least as effective at helping people quit smoking as other NRT products, but people have individual preferences.</span></p><span data-dcnode-id="3237" instrument_node="">
</span><h3 data-dcnode-id="3234"><span data-dcnode-id="3236" instrument_node="">Other stop smoking medications</span><a data-dcnode-id="3235" id="medications" name="medications"></a></h3><span data-dcnode-id="3233" instrument_node="">
</span><p data-dcnode-id="3228"><span data-dcnode-id="3232" instrument_node="">Medication is available on the NHS to help you quit smoking: buproprion (Zyban) and varenicline (Champix). </span><a data-dcnode-id="3230" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//blog.blf.org.uk/blog/champix-shortage-what-should-i-do" target="_blank"><span data-dcnode-id="3231" instrument_node="">Champix is currently unavailable in the UK</span></a><span data-dcnode-id="3229" instrument_node="">. Both can double your chances of stopping.&nbsp;Talk to your GP about stop smoking medication.</span></p><span data-dcnode-id="3227" instrument_node="">
</span><blockquote class="breakout breakout-tip" data-dcnode-id="3222" style="font-size:100%;"><span data-dcnode-id="3226" instrument_node="">
</span><p data-dcnode-id="3224"><span data-dcnode-id="3225" instrument_node="">For advice on stop smoking treatments speak to your GP, pharmacist or local stop smoking service.</span></p><span data-dcnode-id="3223" instrument_node="">
</span></blockquote><span data-dcnode-id="3221" instrument_node="">
</span><h2 data-dcnode-id="3218"><span data-dcnode-id="3220" instrument_node="">How will I benefit from stopping smoking?</span><a data-dcnode-id="3219" id="benefits" name="benefits"></a></h2><span data-dcnode-id="3217" instrument_node="">
</span><p data-dcnode-id="3212"><span data-dcnode-id="3216" instrument_node="">Fill in our </span><a data-dcnode-id="3214" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.blf.org.uk/support-for-you/smoking/am-i-ready-to-quit" target="_blank"><span data-dcnode-id="3215" instrument_node="">online questionnaire</span></a><span data-dcnode-id="3213" instrument_node=""> to remind yourself why you want to quit and how you’re going to do it. You can print it out so you can keep it somewhere you can see it.</span></p><span data-dcnode-id="3211" instrument_node="">
</span><p data-dcnode-id="3203"><span data-dcnode-id="3210" instrument_node="">According to the </span><a data-dcnode-id="3208" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.ncsct.co.uk/publication_quick_wins_the_short_term_benefits_of_cessation.php" target="_blank"><span data-dcnode-id="3209" instrument_node="">National Centre for Smoking Cessation and Training</span></a><span data-dcnode-id="3207" instrument_node="">, there are many immediate benefits to stopping smoking (quick wins). They include improved lung function, fewer flare-ups in COPD, and improved sense of taste and smell.&nbsp; Read more about </span><a data-dcnode-id="3205" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.blf.org.uk/support-for-you/smoking/why-is-smoking-bad-for-me%23benefits" target="_blank"><span data-dcnode-id="3206" instrument_node="">why you should stop smoking</span></a><span data-dcnode-id="3204" instrument_node="">.</span></p><span data-dcnode-id="3202" instrument_node="">
</span><h2 data-dcnode-id="3199"><span data-dcnode-id="3201" instrument_node="">I’m ready to stop smoking – what should I do?</span><a data-dcnode-id="3200" id="im-ready" name="im-ready"></a></h2><span data-dcnode-id="3198" instrument_node="">
</span><p data-dcnode-id="3196"><span data-dcnode-id="3197" instrument_node="">When you’re ready to stop smoking – have a plan.&nbsp;Our top tips:</span></p><span data-dcnode-id="3195" instrument_node="">
</span><ul class="list-arrows" data-dcnode-id="3138"><span data-dcnode-id="3194" instrument_node="">
</span><li data-dcnode-id="3190"><strong data-dcnode-id="3192"><span data-dcnode-id="3193" instrument_node="">Go to see your GP</span></strong><span data-dcnode-id="3191" instrument_node=""> and ask for a prescription for medication to help you to quit smoking, as well as a referral to your stop smoking service. They’ll be able to discuss with you the range of things you can try to help you quit, and which might be the best method for you.&nbsp;With this help you’re three times more likely to quit successfully.</span></li><span data-dcnode-id="3189" instrument_node="">
</span><li data-dcnode-id="3185"><strong data-dcnode-id="3187"><span data-dcnode-id="3188" instrument_node="">Pick a date to stop and decide you’ll be a non-smoker from that day</span></strong><span data-dcnode-id="3186" instrument_node="">. Tell your family and friends and plan something to do to take your mind off it.</span></li><span data-dcnode-id="3184" instrument_node="">
</span><li data-dcnode-id="3180"><strong data-dcnode-id="3182"><span data-dcnode-id="3183" instrument_node="">Ask your friends and family for support</span></strong><span data-dcnode-id="3181" instrument_node="">. If someone close to you is thinking of stopping, why not stop at the same time so you can support each other?</span></li><span data-dcnode-id="3179" instrument_node="">
</span><li data-dcnode-id="3175"><strong data-dcnode-id="3177"><span data-dcnode-id="3178" instrument_node="">Think of situations where you’re likely to be tempted </span></strong><span data-dcnode-id="3176" instrument_node="">and come up with ways to overcome the urge. For example: ‘If I’m with friends who are smoking, I’ll leave the room or use my vape.’</span></li><span data-dcnode-id="3174" instrument_node="">
</span><li data-dcnode-id="3170"><strong data-dcnode-id="3172"><span data-dcnode-id="3173" instrument_node="">If you find yourself struggling, go back to the stop smoking services for help</span></strong><span data-dcnode-id="3171" instrument_node="">. There are also stop smoking apps available that some find helpful for additional support.&nbsp;</span></li><span data-dcnode-id="3169" instrument_node="">
</span><li data-dcnode-id="3165"><strong data-dcnode-id="3167"><span data-dcnode-id="3168" instrument_node="">Keep your hands and mouth busy </span></strong><span data-dcnode-id="3166" instrument_node="">- when you’re out, try putting your drink in the hand that usually holds a cigarette and drink from a straw.</span></li><span data-dcnode-id="3164" instrument_node="">
</span><li data-dcnode-id="3160"><strong data-dcnode-id="3162"><span data-dcnode-id="3163" instrument_node="">A craving can last five minutes </span></strong><span data-dcnode-id="3161" instrument_node="">- so think of five-minute strategies. If you find a certain time of day or place hard, try a new routine.</span></li><span data-dcnode-id="3159" instrument_node="">
</span><li data-dcnode-id="3155"><strong data-dcnode-id="3157"><span data-dcnode-id="3158" instrument_node="">Make a list of your reasons for quitting</span></strong><span data-dcnode-id="3156" instrument_node=""> - read it when you need motivation.</span></li><span data-dcnode-id="3154" instrument_node="">
</span><li data-dcnode-id="3150"><strong data-dcnode-id="3152"><span data-dcnode-id="3153" instrument_node="">Call yourself a non-smoker </span></strong><span data-dcnode-id="3151" instrument_node="">and think of yourself as one.</span></li><span data-dcnode-id="3149" instrument_node="">
</span><li data-dcnode-id="3145"><strong data-dcnode-id="3147"><span data-dcnode-id="3148" instrument_node="">Think about the possible withdrawal symptoms</span></strong><span data-dcnode-id="3146" instrument_node=""> and how you will cope.</span></li><span data-dcnode-id="3144" instrument_node="">
</span><li data-dcnode-id="3140"><strong data-dcnode-id="3142"><span data-dcnode-id="3143" instrument_node="">Reward yourself when you’re doing well</span></strong><span data-dcnode-id="3141" instrument_node="">, but don’t beat yourself up if you’re struggling. If the method you’re using isn’t working for you, try something else. Don’t quit quitting!</span></li><span data-dcnode-id="3139" instrument_node="">
</span></ul><span data-dcnode-id="3137" instrument_node="">
</span><blockquote data-dcnode-id="3127"><span data-dcnode-id="3136" instrument_node="">
</span><p data-dcnode-id="3134"><span data-dcnode-id="3135" instrument_node="">We were going away after Christmas. I decided that would be a good time to stop, as I would be away from the places that I usually smoked. Going out of the back door to smoke became just a natural habit.&nbsp;</span></p><span data-dcnode-id="3133" instrument_node="">
</span><p data-dcnode-id="3129"><span data-dcnode-id="3132" instrument_node="">Just before we went away, I had my last cigarette – and I’ve never looked back.&nbsp;</span><em data-dcnode-id="3130"><span data-dcnode-id="3131" instrument_node="">Judith</span></em></p><span data-dcnode-id="3128" instrument_node="">
</span></blockquote><span data-dcnode-id="3126" instrument_node="">
</span><blockquote class="breakout" data-dcnode-id="3115"><span data-dcnode-id="3125" instrument_node="">
</span><h3 data-dcnode-id="3123"><span data-dcnode-id="3124" instrument_node="">Your personal quit plan</span></h3><span data-dcnode-id="3122" instrument_node="">
</span><p data-dcnode-id="3117"><span data-dcnode-id="3121" instrument_node="">Get a </span><a data-dcnode-id="3119" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.nhs.uk/better-health/quit-smoking/personal-quit-plan/" target="_blank"><span data-dcnode-id="3120" instrument_node="">free personal quit plan</span></a><span data-dcnode-id="3118" instrument_node=""> from the NHS website.</span></p><span data-dcnode-id="3116" instrument_node="">
