</span><p data-dcnode-id="1698"><span data-dcnode-id="1699" instrument_node="">Years of scientific research have clearly established that particle pollution and ozone are a threat to human health at every stage of life, increasing the risk of premature birth, causing or worsening lung and heart disease, and shortening lives. Some groups of people are more at risk of illness and death than others, because they are more likely to be exposed, or are more vulnerable to health harm, or often both.</span></p><span data-dcnode-id="1697" instrument_node="">

</span><div class="global-container" data-dcnode-id="1576"><span data-dcnode-id="1591" instrument_node="">
</span><div class="row" data-dcnode-id="1578"><span data-dcnode-id="1590" instrument_node="">
</span><div class="col-12" data-dcnode-id="1580"><span data-dcnode-id="1589" instrument_node="">
</span><div class="fr-view" data-dcnode-id="1582"><span data-dcnode-id="1588" instrument_node="">
</span><h2 data-dcnode-id="1586"><span data-dcnode-id="1587" instrument_node="">Health Effects of Particle Pollution</span></h2><p data-dcnode-id="1584"><span data-dcnode-id="1585" instrument_node="">Particle pollution—also known as particulate matter—is a deadly and growing threat to public health in communities around the country. The more researchers learn about the health effects of particle pollution, the more dangerous it is recognized to be.</span></p><span data-dcnode-id="1583" instrument_node="">
</span></div><span data-dcnode-id="1581" instrument_node="">
</span></div><span data-dcnode-id="1579" instrument_node="">
</span></div><span data-dcnode-id="1577" instrument_node="">
</span></div><span data-dcnode-id="1575" instrument_node="">
</span></section><span data-dcnode-id="1573" instrument_node="">
</span><section class="section" data-dcnode-id="1328" id="section_acd777f0d1f6" style=""><span data-dcnode-id="1572" instrument_node="">
</span><div class="global-container" data-dcnode-id="1330"><span data-dcnode-id="1571" instrument_node="">
</span><div class="row" data-dcnode-id="1332"><span data-dcnode-id="1570" instrument_node="">
</span><div class="col-12" data-dcnode-id="1334"><span data-dcnode-id="1569" instrument_node="">
</span><div class="card accordion widget" data-dcnode-id="1537" id="panel_fe300b80883c"><span data-dcnode-id="1568" instrument_node="">
</span><button aria-expanded="false" class="card-title accordion-title" data-dcnode-id="1566"><span data-dcnode-id="1567" instrument_node="">
        What Is Particle Pollution?
    </span></button><span data-dcnode-id="1565" instrument_node="">
</span><section aria-labelledby="What Is Particle Pollution?" class="card-content accordion-content" data-dcnode-id="1539"><span data-dcnode-id="1564" instrument_node="">
</span><p data-dcnode-id="1562"><span data-dcnode-id="1563" instrument_node="">Particle pollution refers to a mixture of tiny bits of solids and liquids in the air we breathe. Particle pollution comes from many sources. Factories, power plants, and diesel- and gasoline-powered motor vehicles (cars, trucks and buses) and equipment either directly emit fine particles or generate other pollutants such as nitrogen oxides (NOx), known as precursors because they can then form into fine particles in the atmosphere. Other sources of particle pollution include wildfires, burning wood in wood stoves or residential fireplaces and burning biomass for electricity.&nbsp;</span></p><div class="row widget image-container" data-dcnode-id="1556"><div class="col-sm-6" data-dcnode-id="1560"><img class="fr-fil fr-dib js-lazy js-webp" data-dcnode-id="1561" data-image="/optimize/getmedia/7bb1da32-5525-48f0-a363-58065218cc70/sota-rec-1-notext.jpg?format=webp" data-image-webp="/optimize/getmedia/7bb1da32-5525-48f0-a363-58065218cc70/sota-rec-1-notext.jpg?format=webp"></div><div class="col-sm-6" data-dcnode-id="1557" style="align-self: center;"><p data-dcnode-id="1558" style="font-size: 26px; font-size: 1.625rem; font-weight: 700; line-height: 1.44; color: #0d2354;"><span data-dcnode-id="1559" instrument_node="">Sources of particle pollution include motor vehicles, factories, power plants, equipment, wood burning and wildfires.</span></p></div></div><p data-dcnode-id="1554"><br data-dcnode-id="1555"></p><p data-dcnode-id="1543"><span data-dcnode-id="1553" instrument_node="">Individual particles may be too small to be visible, but when pollution levels are high, they can make the air appear thick and hazy. Researchers and regulators categorize particles according to size, grouping them as coarse, fine and ultrafine. Coarse particles, called PM</span><sub data-dcnode-id="1551"><span data-dcnode-id="1552" instrument_node="">10</span></sub><span data-dcnode-id="1550" instrument_node="">, can include wind-blown dust, ash, pollen and smoke. Fine particles, PM</span><sub data-dcnode-id="1548"><span data-dcnode-id="1549" instrument_node="">2.5</span></sub><span data-dcnode-id="1547" instrument_node="">, are most often a by-product of burning wood or fossil fuels. The tiniest are called ultrafine particles, or PM</span><sub data-dcnode-id="1545"><span data-dcnode-id="1546" instrument_node="">0.1</span></sub><span data-dcnode-id="1544" instrument_node="">, which are also produced by combustion.</span></p><p data-dcnode-id="1541"><span data-dcnode-id="1542" instrument_node="">The differences in size make a big difference in where and how particles affect our health. Our bodies’ natural defenses help us to keep coarse particles out of the deepest parts of our lungs, although these particles do deposit in the larger airways. However, those defenses do not keep smaller fine or ultrafine particles from penetrating to the air sacs of the lungs. Many of these particles get trapped in the air sacs, while the smallest are so minute that they can pass from the air sacs into the bloodstream and disperse to other organs of the body.</span></p><span data-dcnode-id="1540" instrument_node=""> </span></section><span data-dcnode-id="1538" instrument_node="">
</span></div><span data-dcnode-id="1536" instrument_node="">
</span><div class="card accordion widget" data-dcnode-id="1395" id="panel_ab1d24f81dda"><span data-dcnode-id="1535" instrument_node="">
</span><button aria-expanded="false" class="card-title accordion-title" data-dcnode-id="1533"><span data-dcnode-id="1534" instrument_node="">
        What Can Particles Do to Your Health?
    </span></button><span data-dcnode-id="1532" instrument_node="">
</span><section aria-labelledby="What Can Particles Do to Your Health?" class="card-content accordion-content" data-dcnode-id="1397"><span data-dcnode-id="1531" instrument_node="">
</span><p data-dcnode-id="1524"><span data-dcnode-id="1530" instrument_node="">Particle pollution can be very dangerous to breathe, especially at higher concentrations. It can trigger illness, hospitalization and premature death. Researchers estimate that PM</span><sub data-dcnode-id="1528"><span data-dcnode-id="1529" instrument_node="">2.5</span></sub><span data-dcnode-id="1527" instrument_node=""> is responsible for nearly 48,000 premature deaths in the United States every year.</span><sup data-dcnode-id="1525"><span data-dcnode-id="1526" instrument_node="">1</span></sup></p><p data-dcnode-id="1521"><strong data-dcnode-id="1522"><span data-dcnode-id="1523" instrument_node="">Short-Term Exposure</span></strong></p><p data-dcnode-id="1517"><span data-dcnode-id="1520" instrument_node="">Short-term spikes in particle pollution that last from a few hours to a few days can kill. Premature deaths from breathing these particles can occur on the very day that particle levels are high, or up to a month or two afterward. Most premature deaths are from respiratory and cardiovascular causes. Particle pollution does not just make people die a few days earlier than they might otherwise—in many cases these deaths would not have occurred for years if the air were cleaner.</span><sup data-dcnode-id="1518"><span data-dcnode-id="1519" instrument_node="">2</span></sup></p><p data-dcnode-id="1507"><span data-dcnode-id="1516" instrument_node="">Studies linking short-term exposure to PM</span><sub data-dcnode-id="1514"><span data-dcnode-id="1515" instrument_node="">2.5</span></sub><span data-dcnode-id="1513" instrument_node=""> to death from all causes have been accumulating for a number of years. Taken together, this body of research provides consistent evidence of positive associations between particle pollution and mortality across diverse geographic locations and in populations with a wide range of demographic characteristics. Recently, a large international study found an association between short-term exposure to PM</span><sub data-dcnode-id="1511"><span data-dcnode-id="1512" instrument_node="">2.5</span></sub><span data-dcnode-id="1510" instrument_node=""> and daily all-cause, cardiovascular and respiratory mortality in more than 600 cities across the globe.</span><sup data-dcnode-id="1508"><span data-dcnode-id="1509" instrument_node="">3</span></sup></p><p data-dcnode-id="1499"><span data-dcnode-id="1506" instrument_node="">Even low daily levels of fine particles can be deadly. A 2016 study found that people aged 65 and older in New England faced a higher risk of premature death from particle pollution, even in places that met current standards for short-term particle pollution.</span><sup data-dcnode-id="1504"><span data-dcnode-id="1505" instrument_node="">4</span></sup><span data-dcnode-id="1503" instrument_node=""> Looking nationwide in a 2017 study, researchers found more evidence that older adults faced a higher risk of premature death even when levels of short-term particle pollution remained well within the current national standards. This was consistent whether the older adults lived in cities, suburbs or rural areas</span><sup data-dcnode-id="1501"><span data-dcnode-id="1502" instrument_node="">5</span></sup><span data-dcnode-id="1500" instrument_node="">.</span></p><p data-dcnode-id="1497"><span data-dcnode-id="1498" instrument_node="">Particle pollution also has many other harmful effects, ranging from decreased lung function to heart attacks. Extensive research has linked short-term increases in particle pollution to:</span></p><ul data-dcnode-id="1480"><li data-dcnode-id="1493"><span data-dcnode-id="1496" instrument_node="">increased mortality in infants;</span><sup data-dcnode-id="1494"><span data-dcnode-id="1495" instrument_node="">6</span></sup></li><li data-dcnode-id="1489"><span data-dcnode-id="1492" instrument_node="">increased hospital admissions for cardiovascular disease, including heart attacks and strokes;</span><sup data-dcnode-id="1490"><span data-dcnode-id="1491" instrument_node="">7</span></sup></li><li data-dcnode-id="1485"><span data-dcnode-id="1488" instrument_node="">increased hospital admissions and emergency department visits for COPD;</span><sup data-dcnode-id="1486"><span data-dcnode-id="1487" instrument_node="">8</span></sup></li><li data-dcnode-id="1481"><span data-dcnode-id="1484" instrument_node="">increased severity of asthma attacks and hospitalization for asthma among children;</span><sup data-dcnode-id="1482"><span data-dcnode-id="1483" instrument_node="">9,10</span></sup></li></ul><p data-dcnode-id="1477"><strong data-dcnode-id="1478"><span data-dcnode-id="1479" instrument_node="">Year-Round Exposure</span></strong></p><p data-dcnode-id="1473"><span data-dcnode-id="1476" instrument_node="">Decades of research have firmly established that breathing particle pollution day in and day out can also be deadly. Across numerous seminal studies that look at different groups of people living in different parts of the country the results consistently showed a clear relationship between exposure to particulate matter and mortality.</span><sup data-dcnode-id="1474"><span data-dcnode-id="1475" instrument_node="">11</span></sup></p><p data-dcnode-id="1457"><span data-dcnode-id="1472" instrument_node="">Recent research using publicly available data on a cohort of more than one million adults in the U.S. reconfirmed that long-term exposure to PM</span><sub data-dcnode-id="1470"><span data-dcnode-id="1471" instrument_node="">2.5</span></sub><span data-dcnode-id="1469" instrument_node=""> was associated with elevated risks of early death. The increased risk was primarily associated with death from cardiovascular and respiratory causes, including heart disease, stroke, influenza and pneumonia. Researchers also found a similar association between exposure to fine particle pollution and an increased risk of death from lung cancer among never-smokers.</span><sup data-dcnode-id="1467"><span data-dcnode-id="1468" instrument_node="">12</span></sup><span data-dcnode-id="1466" instrument_node=""> Another study of 68.5 million Medicare-enrolled adults in the United States between 2000 and 2016 found a 6-8% increase in risk of all-cause mortality for every 10µg/m</span><sup data-dcnode-id="1464"><span data-dcnode-id="1465" instrument_node="">3</span></sup><span data-dcnode-id="1463" instrument_node=""> increase in PM</span><sub data-dcnode-id="1461"><span data-dcnode-id="1462" instrument_node="">2.5</span></sub><span data-dcnode-id="1460" instrument_node="">.</span><sup data-dcnode-id="1458"><span data-dcnode-id="1459" instrument_node="">13</span></sup></p><p data-dcnode-id="1455"><span data-dcnode-id="1456" instrument_node="">Research has also linked year-round exposure to particle pollution to a wide array of serious health effects at every stage of life, from conception through old age. Among pregnant people, fetuses and children, long-term particle pollution exposure is linked to:</span></p><ul data-dcnode-id="1438"><li data-dcnode-id="1451"><span data-dcnode-id="1454" instrument_node="">Increased risk of preterm birth and low birth weight;</span><sup data-dcnode-id="1452"><span data-dcnode-id="1453" instrument_node="">14</span></sup></li><li data-dcnode-id="1447"><span data-dcnode-id="1450" instrument_node="">Increased fetal and infant mortality;</span><sup data-dcnode-id="1448"><span data-dcnode-id="1449" instrument_node="">15</span></sup></li><li data-dcnode-id="1443"><span data-dcnode-id="1446" instrument_node="">Reduced lung development and impaired lung function in children;</span><sup data-dcnode-id="1444"><span data-dcnode-id="1445" instrument_node="">16</span></sup></li><li data-dcnode-id="1439"><span data-dcnode-id="1442" instrument_node="">Higher likelihood of children developing asthma.</span><sup data-dcnode-id="1440"><span data-dcnode-id="1441" instrument_node="">17</span></sup></li></ul><p data-dcnode-id="1436"><span data-dcnode-id="1437" instrument_node="">In adults, long-term particle pollution exposure is linked to:</span></p><ul data-dcnode-id="1419"><li data-dcnode-id="1432"><span data-dcnode-id="1435" instrument_node="">Increased risk from existing cardiovascular and respiratory disease, including a worsening of heart disease, atherosclerosis and COPD;</span><sup data-dcnode-id="1433"><span data-dcnode-id="1434" instrument_node="">18,19</span></sup></li><li data-dcnode-id="1428"><span data-dcnode-id="1431" instrument_node="">Higher likelihood of developing diabetes;</span><sup data-dcnode-id="1429"><span data-dcnode-id="1430" instrument_node="">20</span></sup></li><li data-dcnode-id="1424"><span data-dcnode-id="1427" instrument_node="">Higher likelihood of getting lung cancer and of dying from it;</span><sup data-dcnode-id="1425"><span data-dcnode-id="1426" instrument_node="">21</span></sup></li><li data-dcnode-id="1420"><span data-dcnode-id="1423" instrument_node="">Impaired cognitive functioning and an increased risk of Parkinson’s disease, Alzheimer’s disease and other dementias later in life.</span><sup data-dcnode-id="1421"><span data-dcnode-id="1422" instrument_node="">22, 23</span></sup></li></ul><p data-dcnode-id="1412"><span data-dcnode-id="1418" instrument_node="">The good news is, cleaning up particle pollution makes a difference. Research has shown a consistent relationship between decreasing PM</span><sub data-dcnode-id="1416"><span data-dcnode-id="1417" instrument_node="">2.5</span></sub><span data-dcnode-id="1415" instrument_node=""> concentrations and improving respiratory health in children and adults in communities that have reduced their levels of year-round particle pollution.</span><sup data-dcnode-id="1413"><span data-dcnode-id="1414" instrument_node="">24</span></sup></p><div class="bg-gray promo-card-content" data-dcnode-id="1399"><p data-dcnode-id="1409"><strong data-dcnode-id="1410"><span data-dcnode-id="1411" instrument_node="">Air Pollution and COVID-19</span></strong></p><p data-dcnode-id="1404"><span data-dcnode-id="1408" instrument_node="">In the early days of the COVID-19 pandemic, several well-respected research teams in the U.S. set out to investigate possible links between long-term exposure to air pollution, especially PM</span><sub data-dcnode-id="1406"><span data-dcnode-id="1407" instrument_node="">2.5</span></sub><span data-dcnode-id="1405" instrument_node="">, and increased risk of infection and death from the SARS CoV-2 virus that causes the disease. Using the limited population-based data available at the time, some of them found a positive association and estimates of a specific percentage of COVID deaths attributable to air pollution. However, there were a number of methodological issues that may have influenced their results. The virus had not yet reached many parts of the country; community testing was extremely limited; the number of infections and death was probably dramatically undercounted; and little was known about how the disease was spreading through the population.</span></p><p data-dcnode-id="1400"><span data-dcnode-id="1403" instrument_node="">Since that time, the virus has become more widespread and better understood, but much remains uncertain about the nature of the mechanisms linking exposure to air pollution with COVID-19-related infection, severity and death. But some connections are clear. Air pollution is known to impact the functioning of the immune system and increase susceptibility to respiratory infections in general. Air pollution also increases the risk of chronic lung and cardiovascular diseases that put people at higher risk of poor outcomes from COVID-19. Communities of color, which have been especially hard hit by the pandemic, are also disproportionately exposed to unhealthy air.</span><sup data-dcnode-id="1401"><span data-dcnode-id="1402" instrument_node="">25</span></sup></p></div><span data-dcnode-id="1398" instrument_node=""> </span></section><span data-dcnode-id="1396" instrument_node="">
</span></div><span data-dcnode-id="1394" instrument_node="">
</span><div class="card accordion widget" data-dcnode-id="1336" id="panel_4c0baa5ba593"><span data-dcnode-id="1393" instrument_node="">
</span><button aria-expanded="false" class="card-title accordion-title" data-dcnode-id="1391"><span data-dcnode-id="1392" instrument_node="">
        Who Is Most at Risk from Particle Pollution?
    </span></button><span data-dcnode-id="1390" instrument_node="">
</span><section aria-labelledby="Who Is Most at Risk from Particle Pollution?" class="card-content accordion-content" data-dcnode-id="1338"><span data-dcnode-id="1389" instrument_node="">
</span><p data-dcnode-id="1380"><span data-dcnode-id="1388" instrument_node="">Anyone who lives where particle pollution levels are high is at risk. Some people face higher risk, however, based on their underlying health and other characteristics. </span><em data-dcnode-id="1382"><span data-dcnode-id="1387" instrument_node="">(See the </span><a data-dcnode-id="1384" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//lung.org/research/sota/health-risks%23peopleatrisk"><strong data-dcnode-id="1385"><span data-dcnode-id="1386" instrument_node="">People at Risk</span></strong></a><span data-dcnode-id="1383" instrument_node=""> section for more information about vulnerable groups.)</span></em><span data-dcnode-id="1381" instrument_node=""> Research has shown that the groups at the greatest risk from particle pollution include:</span></p><p data-dcnode-id="1378"><span data-dcnode-id="1379" instrument_node="">Research has shown that the groups at the greatest risk from particle pollution include:</span></p><ul data-dcnode-id="1340"><li data-dcnode-id="1374"><span data-dcnode-id="1377" instrument_node="">Pregnant people and fetuses;</span><sup data-dcnode-id="1375"><span data-dcnode-id="1376" instrument_node="">26</span></sup></li><li data-dcnode-id="1370"><span data-dcnode-id="1373" instrument_node="">Infants, children and older people (&gt;65 years of age);</span><sup data-dcnode-id="1371"><span data-dcnode-id="1372" instrument_node="">27</span></sup></li><li data-dcnode-id="1366"><span data-dcnode-id="1369" instrument_node="">People with lung disease, especially asthma, but also people with COPD;</span><sup data-dcnode-id="1367"><span data-dcnode-id="1368" instrument_node="">28</span></sup></li><li data-dcnode-id="1362"><span data-dcnode-id="1365" instrument_node="">People with cardiovascular disease;</span><sup data-dcnode-id="1363"><span data-dcnode-id="1364" instrument_node="">29</span></sup></li><li data-dcnode-id="1358"><span data-dcnode-id="1361" instrument_node="">People with lung cancer;</span><sup data-dcnode-id="1359"><span data-dcnode-id="1360" instrument_node="">30</span></sup></li><li data-dcnode-id="1354"><span data-dcnode-id="1357" instrument_node="">People of color;</span><sup data-dcnode-id="1355"><span data-dcnode-id="1356" instrument_node="">31</span></sup></li><li data-dcnode-id="1350"><span data-dcnode-id="1353" instrument_node="">Current or former smokers;</span><sup data-dcnode-id="1351"><span data-dcnode-id="1352" instrument_node="">32</span></sup></li><li data-dcnode-id="1345"><span data-dcnode-id="1349" instrument_node="">People with low incomes;</span><sup data-dcnode-id="1347"><span data-dcnode-id="1348" instrument_node="">33</span></sup><span data-dcnode-id="1346" instrument_node=""> and</span></li><li data-dcnode-id="1341"><span data-dcnode-id="1344" instrument_node="">People who are obese or have diabetes.</span><sup data-dcnode-id="1342"><span data-dcnode-id="1343" instrument_node="">34</span></sup></li></ul><span data-dcnode-id="1339" instrument_node=""> </span></section><span data-dcnode-id="1337" instrument_node="">
</span></div><span data-dcnode-id="1335" instrument_node="">
</span></div><span data-dcnode-id="1333" instrument_node="">
</span></div><span data-dcnode-id="1331" instrument_node="">
</span></div><span data-dcnode-id="1329" instrument_node="">
</span></section><span data-dcnode-id="1327" instrument_node="">
</span><section class="padding-bottom no-padding-top" data-dcnode-id="1287" id="section_da529b776c38" style=""><span data-dcnode-id="1326" instrument_node="">
</span><div class="global-container" data-dcnode-id="1289"><span data-dcnode-id="1325" instrument_node="">
</span><div class="row" data-dcnode-id="1291"><span data-dcnode-id="1324" instrument_node="">
</span><div class="col-12" data-dcnode-id="1293"><span data-dcnode-id="1323" instrument_node="">
</span><div class="fr-view" data-dcnode-id="1295"><span data-dcnode-id="1322" instrument_node="">
</span><div class="bg-gray promo-card-content" data-dcnode-id="1297"><p data-dcnode-id="1319"><em data-dcnode-id="1320"><span data-dcnode-id="1321" instrument_node="">Summertime should be a great time to be outdoors in Montana, with warm weather and sunshine in a state full of natural splendors. But wildfire smoke often forces people to stay indoors.&nbsp;</span></em></p><p data-dcnode-id="1316"><em data-dcnode-id="1317"><span data-dcnode-id="1318" instrument_node="">Bailey B. lives in Butte, a western Montana city surrounded by mountains on three sides. Some days in the summer, thick smoke fully obscures the mountains. “There are times you can’t go outside in the summertime,” she says. &nbsp;</span></em></p><p data-dcnode-id="1313"><em data-dcnode-id="1314"><span data-dcnode-id="1315" instrument_node="">“There’s no point in going outside if you can’t breathe.”&nbsp;</span></em></p><p data-dcnode-id="1310"><em data-dcnode-id="1311"><span data-dcnode-id="1312" instrument_node="">She notices more issues with runny noses, irritated eyes and coughing when wildfire smoke is in the air. Her father-in-law, who uses supplemental oxygen, can’t leave the house on such days without wearing a good mask.&nbsp;</span></em></p><p data-dcnode-id="1307"><em data-dcnode-id="1308"><span data-dcnode-id="1309" instrument_node="">A Montana resident for the last 12 years, Bailey looks forward to hiking and camping in the summer, but she says wildfire smoke makes her consider spending those months elsewhere.&nbsp;</span></em></p><p data-dcnode-id="1304"><em data-dcnode-id="1305"><span data-dcnode-id="1306" instrument_node="">“The air quality in Montana is bad enough that if I could leave in the summers, I would.”&nbsp;</span></em></p><p data-dcnode-id="1298"><strong data-dcnode-id="1299"><em data-dcnode-id="1300"><span data-dcnode-id="1303" instrument_node="">Bailey B.</span><br data-dcnode-id="1302"><span data-dcnode-id="1301" instrument_node="">Butte, Montana</span></em></strong></p></div><span data-dcnode-id="1296" instrument_node="">
</span></div><span data-dcnode-id="1294" instrument_node="">
</span></div><span data-dcnode-id="1292" instrument_node="">
</span></div><span data-dcnode-id="1290" instrument_node="">
</span></div><span data-dcnode-id="1288" instrument_node="">
</span></section><span data-dcnode-id="1286" instrument_node="">
</span><section class="padding-top no-padding-bottom" data-dcnode-id="1267" id="section_792801770712" style=""><span data-dcnode-id="1285" instrument_node="">
</span><div class="global-container" data-dcnode-id="1269"><span data-dcnode-id="1284" instrument_node="">
</span><div class="row" data-dcnode-id="1271"><span data-dcnode-id="1283" instrument_node="">
</span><div class="col-12" data-dcnode-id="1273"><span data-dcnode-id="1282" instrument_node="">
</span><div class="fr-view" data-dcnode-id="1275"><span data-dcnode-id="1281" instrument_node="">
</span><h2 data-dcnode-id="1279"><span data-dcnode-id="1280" instrument_node="">Health Effects of Ozone Pollution</span></h2><p data-dcnode-id="1277"><span data-dcnode-id="1278" instrument_node="">Ozone air pollution, sometimes known as smog, is one of the most widespread pollutants in the United States. It is also one of the most dangerous. Scientists have studied the effects of ozone on human health for decades. Hundreds of studies have confirmed that ozone harms people at levels currently found in many parts of the United States. </span></p><span data-dcnode-id="1276" instrument_node="">
</span></div><span data-dcnode-id="1274" instrument_node="">
</span></div><span data-dcnode-id="1272" instrument_node="">
</span></div><span data-dcnode-id="1270" instrument_node="">
</span></div><span data-dcnode-id="1268" instrument_node="">
</span></section><span data-dcnode-id="1266" instrument_node="">
</span><section class="section" data-dcnode-id="1131" id="section_0c70392542f4" style=""><span data-dcnode-id="1265" instrument_node="">
</span><div class="global-container" data-dcnode-id="1133"><span data-dcnode-id="1264" instrument_node="">
</span><div class="row" data-dcnode-id="1135"><span data-dcnode-id="1263" instrument_node="">
</span><div class="col-12" data-dcnode-id="1137"><span data-dcnode-id="1262" instrument_node="">
</span><div class="card accordion widget" data-dcnode-id="1245" id="panel_6227dfde2996"><span data-dcnode-id="1261" instrument_node="">
</span><button aria-expanded="false" class="card-title accordion-title" data-dcnode-id="1259"><span data-dcnode-id="1260" instrument_node="">
        What Is Ozone?
    </span></button><span data-dcnode-id="1258" instrument_node="">
</span><section aria-labelledby="What Is Ozone?" class="card-content accordion-content" data-dcnode-id="1247"><span data-dcnode-id="1257" instrument_node="">
</span><p data-dcnode-id="1255"><span data-dcnode-id="1256" instrument_node="">Ozone is a gas composed of molecules with three oxygen atoms. (The oxygen we need for life is made up of molecules with two oxygen atoms). Ozone forms in the lower atmosphere when a combination of other pollutants, usually nitrogen oxides (NOx) and volatile organic compounds (VOCs), “cook” together in sunlight through a series of chemical reactions. NOx and VOCs are produced primarily when fossil fuels such as gasoline, diesel, oil, natural gas or coal are burned or when solvents and some other chemicals evaporate. NOx is emitted from power plants, motor vehicles and other sources of high-heat combustion. VOCs are emitted from motor vehicles, oil and gas operations, chemical plants, refineries, factories, gas stations, paint, consumer products and other sources.</span></p><p data-dcnode-id="1253"><img class="fr-fic fr-dii js-lazy js-webp" data-dcnode-id="1254" data-image="/optimize/getmedia/475576e2-64fc-48cd-9a61-ad70bbf3a7b6/sotc-22-voc-ozone.jpg?format=webp" data-image-webp="/optimize/getmedia/475576e2-64fc-48cd-9a61-ad70bbf3a7b6/sotc-22-voc-ozone.jpg?format=webp"></p><p data-dcnode-id="1251"><span data-dcnode-id="1252" instrument_node="">If these ingredients are present under the right conditions, they react to form ozone. Sunlight is key, with higher temperatures increasing ozone production. Because the reactions take place in the atmosphere, ozone often shows up downwind of the sources of the original emissions, sometimes many miles from where it formed.&nbsp;</span></p><p data-dcnode-id="1249"><span data-dcnode-id="1250" instrument_node="">Ozone air pollution is sometimes called ground-level ozone, to distinguish it from the much higher-altitude stratospheric ozone layer that protects the Earth from damaging ultraviolet rays from the sun.&nbsp;</span></p><span data-dcnode-id="1248" instrument_node=""> </span></section><span data-dcnode-id="1246" instrument_node="">
</span></div><span data-dcnode-id="1244" instrument_node="">
</span><div class="card accordion widget" data-dcnode-id="1175" id="panel_eb7dc39e8ffe"><span data-dcnode-id="1243" instrument_node="">
</span><button aria-expanded="false" class="card-title accordion-title" data-dcnode-id="1241"><span data-dcnode-id="1242" instrument_node="">
        How Does Ozone Pollution Harm Your Health?
    </span></button><span data-dcnode-id="1240" instrument_node="">
</span><section aria-labelledby="How Does Ozone Pollution Harm Your Health?" class="card-content accordion-content" data-dcnode-id="1177"><span data-dcnode-id="1239" instrument_node="">
</span><p data-dcnode-id="1237"><span data-dcnode-id="1238" instrument_node="">Ozone gas is a powerful lung irritant. When it is inhaled into the lungs, it reacts with the delicate lining of the airways, causing inflammation and other damage that can impact multiple body systems. Ozone exposure can also shorten lives.</span></p><p data-dcnode-id="1233"><span data-dcnode-id="1236" instrument_node="">Ozone has a serious effect on the respiratory system, both in the short term and over the course of years of exposure. When ozone levels are high, many people experience breathing problems such as chest tightness, coughing and shortness of breath, often within hours of exposure. Even healthy young adults may experience respiratory symptoms and decreased lung function.</span><sup data-dcnode-id="1234"><span data-dcnode-id="1235" instrument_node="">35</span></sup></p><p data-dcnode-id="1231"><span data-dcnode-id="1232" instrument_node="">Other breathing problems that have been tied to short-term exposure to ozone include:</span></p><ul data-dcnode-id="1222"><li data-dcnode-id="1227"><span data-dcnode-id="1230" instrument_node="">Worsening of symptoms, increased medication use and increased emergency department visits and hospital admissions for people with asthma and COPD;</span><sup data-dcnode-id="1228"><span data-dcnode-id="1229" instrument_node="">36</span></sup></li><li data-dcnode-id="1223"><span data-dcnode-id="1226" instrument_node="">Susceptibility to respiratory infections such as pneumonia, resulting in an increased likelihood of emergency department visits and hospitalizations.</span><sup data-dcnode-id="1224"><span data-dcnode-id="1225" instrument_node="">37</span></sup></li></ul><p data-dcnode-id="1220"><span data-dcnode-id="1221" instrument_node="">Living with ozone pollution long-term may cause lasting damage to respiratory health, including:</span></p><ul data-dcnode-id="1207"><li data-dcnode-id="1216"><span data-dcnode-id="1219" instrument_node="">Development of new cases of asthma in children;</span><sup data-dcnode-id="1217"><span data-dcnode-id="1218" instrument_node="">38</span></sup></li><li data-dcnode-id="1212"><span data-dcnode-id="1215" instrument_node="">Damage to the airways, leading to development of COPD;</span><sup data-dcnode-id="1213"><span data-dcnode-id="1214" instrument_node="">39</span></sup></li><li data-dcnode-id="1208"><span data-dcnode-id="1211" instrument_node="">&nbsp;Increased allergic response.</span><sup data-dcnode-id="1209"><span data-dcnode-id="1210" instrument_node="">40</span></sup></li></ul><p data-dcnode-id="1205"><span data-dcnode-id="1206" instrument_node="">The inflammation and systemic stress caused by short- and long-term exposure to ozone can also do damage to tissues, DNA and proteins throughout the body, which can cause or worsen other disease conditions over time. These include:</span></p><ul data-dcnode-id="1186"><li data-dcnode-id="1201"><span data-dcnode-id="1204" instrument_node="">Increased risk of metabolic disorders, including glucose intolerance, hyperglycemia and diabetes;</span><sup data-dcnode-id="1202"><span data-dcnode-id="1203" instrument_node="">41</span></sup></li><li data-dcnode-id="1197"><span data-dcnode-id="1200" instrument_node="">Impact on the central nervous system, including brain inflammation, structural changes and possible increased risk of cognitive decline;</span><sup data-dcnode-id="1198"><span data-dcnode-id="1199" instrument_node="">42, 43</span></sup></li><li data-dcnode-id="1191"><span data-dcnode-id="1196" instrument_node="">Increased likelihood of reproductive and developmental harm, including reduced fertility, preterm birth, stillbirth and low birth weight;</span><sup data-dcnode-id="1194"><span data-dcnode-id="1195" instrument_node="">44,&nbsp;</span></sup><sup data-dcnode-id="1192"><span data-dcnode-id="1193" instrument_node="">45</span></sup></li><li data-dcnode-id="1187"><span data-dcnode-id="1190" instrument_node="">Possible cardiovascular effects – although according to the most recent EPA review, the evidence linking ozone to heart disease, heart failure and stroke is mixed.</span><sup data-dcnode-id="1188"><span data-dcnode-id="1189" instrument_node="">46</span></sup></li></ul><p data-dcnode-id="1179"><span data-dcnode-id="1185" instrument_node="">The damage ozone does to the body can be deadly. Recent research has affirmed earlier findings that short-term exposure to ozone, even at levels below the current standard, likely increases the risk of premature death, particularly for older adults.</span><sup data-dcnode-id="1183"><span data-dcnode-id="1184" instrument_node="">47</span></sup><span data-dcnode-id="1182" instrument_node=""> There is also a growing body of evidence that long-term exposures to ambient ozone may be associated with an increased risk of cardiovascular and respiratory disease mortality.</span><sup data-dcnode-id="1180"><span data-dcnode-id="1181" instrument_node="">48</span></sup></p><span data-dcnode-id="1178" instrument_node=""> </span></section><span data-dcnode-id="1176" instrument_node="">
</span></div><span data-dcnode-id="1174" instrument_node="">
</span><div class="card accordion widget" data-dcnode-id="1139" id="panel_776f9031688e"><span data-dcnode-id="1173" instrument_node="">
</span><button aria-expanded="false" class="card-title accordion-title" data-dcnode-id="1171"><span data-dcnode-id="1172" instrument_node="">
        Who Is Most at Risk from Ozone Pollution?
    </span></button><span data-dcnode-id="1170" instrument_node="">
</span><section aria-labelledby="Who Is Most at Risk from Ozone Pollution?" class="card-content accordion-content" data-dcnode-id="1141"><span data-dcnode-id="1169" instrument_node="">
</span><p data-dcnode-id="1158"><span data-dcnode-id="1168" instrument_node="">Anyone who spends time outdoors where ozone pollution levels are high may be at risk. Some people face a higher-than-average risk, however, because of their underlying health and other characteristics. </span><em data-dcnode-id="1166"><span data-dcnode-id="1167" instrument_node="">(See the</span></em><a data-dcnode-id="1162" href="#peopleatrisk"><em data-dcnode-id="1163"><strong data-dcnode-id="1164"><span data-dcnode-id="1165" instrument_node="">&nbsp;People at Risk</span></strong></em></a><em data-dcnode-id="1160"><span data-dcnode-id="1161" instrument_node=""> section for more information about vulnerable groups.)</span></em><span data-dcnode-id="1159" instrument_node=""> Research has shown that the groups at greatest risk from ozone pollution include:</span></p><ul data-dcnode-id="1143"><li data-dcnode-id="1154"><span data-dcnode-id="1157" instrument_node="">pregnant people and fetuses</span><sup data-dcnode-id="1155"><span data-dcnode-id="1156" instrument_node="">49</span></sup></li><li data-dcnode-id="1152"><span data-dcnode-id="1153" instrument_node="">children;</span></li><li data-dcnode-id="1150"><span data-dcnode-id="1151" instrument_node="">&nbsp;anyone age 65 and older;</span></li><li data-dcnode-id="1148"><span data-dcnode-id="1149" instrument_node="">people with existing lung disease such as asthma and COPD;</span></li><li data-dcnode-id="1144"><span data-dcnode-id="1147" instrument_node="">people who work or exercise outdoors;</span><sup data-dcnode-id="1145"><span data-dcnode-id="1146" instrument_node="">50</span></sup></li></ul><span data-dcnode-id="1142" instrument_node=""> </span></section><span data-dcnode-id="1140" instrument_node="">
</span></div><span data-dcnode-id="1138" instrument_node="">
</span></div><span data-dcnode-id="1136" instrument_node="">
</span></div><span data-dcnode-id="1134" instrument_node="">
</span></div><span data-dcnode-id="1132" instrument_node="">
</span></section><span data-dcnode-id="1130" instrument_node="">
</span><section class="section" data-dcnode-id="1092" id="peopleatrisk" style=""><span data-dcnode-id="1129" instrument_node="">
</span><div class="global-container" data-dcnode-id="1094"><span data-dcnode-id="1128" instrument_node="">
</span><div class="row" data-dcnode-id="1096"><span data-dcnode-id="1127" instrument_node="">
</span><div class="col-12" data-dcnode-id="1098"><span data-dcnode-id="1126" instrument_node="">
</span><div class="fr-view" data-dcnode-id="1100"><span data-dcnode-id="1125" instrument_node="">
</span><h2 data-dcnode-id="1123"><span data-dcnode-id="1124" instrument_node="">People at Risk</span></h2><p data-dcnode-id="1121"><span data-dcnode-id="1122" instrument_node="">The health burden of air pollution is not evenly shared. There are people more at risk of illness and death from air pollution than others. Several key factors affect an individual’s level of risk:&nbsp;</span></p><ul data-dcnode-id="1104"><li data-dcnode-id="1117"><strong data-dcnode-id="1119"><span data-dcnode-id="1120" instrument_node="">Exposure&nbsp;</span></strong><span data-dcnode-id="1118" instrument_node="">– Where someone lives, where they go to school and where they work make a big difference in how much air pollution they breathe. In general, the higher the exposure, the greater the risk of harm.&nbsp;</span></li><li data-dcnode-id="1113"><strong data-dcnode-id="1115"><span data-dcnode-id="1116" instrument_node="">Susceptibility&nbsp;</span></strong><span data-dcnode-id="1114" instrument_node="">– Pregnant people and their fetuses, children, older adults and people living with chronic conditions, especially heart and lung disease, may be physically more susceptible to the health impacts of air pollution than other adults.&nbsp;</span></li><li data-dcnode-id="1109"><strong data-dcnode-id="1111"><span data-dcnode-id="1112" instrument_node="">Access to healthcare</span></strong><span data-dcnode-id="1110" instrument_node=""> – Whether or not a person has health coverage, a healthcare provider and access to linguistically and culturally appropriate health information may influence their overall health status, and how they are impacted by environmental stressors like air pollution.&nbsp;</span></li><li data-dcnode-id="1105"><strong data-dcnode-id="1107"><span data-dcnode-id="1108" instrument_node="">Psychosocial stress</span></strong><span data-dcnode-id="1106" instrument_node=""> – There is increasing evidence that non-physical stressors such as poverty, racial/ethnic discrimination and fear of deportation can amplify the harmful effects of air pollution.</span></li></ul><p data-dcnode-id="1102"><span data-dcnode-id="1103" instrument_node="">These risk factors are not mutually exclusive and often interact in ways that lead to significant health inequities among subgroups of the population.&nbsp;</span></p><span data-dcnode-id="1101" instrument_node="">
</span></div><span data-dcnode-id="1099" instrument_node="">
</span></div><span data-dcnode-id="1097" instrument_node="">
</span></div><span data-dcnode-id="1095" instrument_node="">
</span></div><span data-dcnode-id="1093" instrument_node="">
</span></section><span data-dcnode-id="1091" instrument_node="">
</span><section class="padding-bottom no-padding-top" data-dcnode-id="955" id="section_418fbd64882e" style=""><span data-dcnode-id="1090" instrument_node="">
</span><div class="global-container" data-dcnode-id="957"><span data-dcnode-id="1089" instrument_node="">
</span><div class="row" data-dcnode-id="959"><span data-dcnode-id="1088" instrument_node="">
</span><div class="col-12" data-dcnode-id="961"><span data-dcnode-id="1087" instrument_node="">
</span><div class="card accordion widget" data-dcnode-id="1064" id="panel_d7a6dd9405c0"><span data-dcnode-id="1086" instrument_node="">
</span><button aria-expanded="false" class="card-title accordion-title" data-dcnode-id="1084"><span data-dcnode-id="1085" instrument_node="">
        People of Color 
    </span></button><span data-dcnode-id="1083" instrument_node="">
</span><section aria-labelledby="People of Color " class="card-content accordion-content" data-dcnode-id="1066"><span data-dcnode-id="1082" instrument_node="">
</span><p data-dcnode-id="1072"><span data-dcnode-id="1081" instrument_node="">Research has shown that people of color are more likely to be exposed to air pollution and more likely to suffer harm to their health from air pollution than white people.</span><sup data-dcnode-id="1079"><span data-dcnode-id="1080" instrument_node="">51, 52&nbsp;</span></sup><span data-dcnode-id="1078" instrument_node="">Much of this inequity can be traced to the long history of systemic racism in the United States. Practices such as redlining, the discriminatory outlining of riskier neighborhoods by mortgage lenders, institutionalized residential segregation in the 20</span><sup data-dcnode-id="1076"><span data-dcnode-id="1077" instrument_node="">th</span></sup><span data-dcnode-id="1075" instrument_node=""> century, impairing the ability of many people of color to build wealth and limiting their mobility and political power. Over the years, decision-makers have found it easier to place sources of pollution, such as power plants, industrial facilities, landfills and highways, in economically disadvantaged communities of color than in more affluent, predominantly white neighborhoods. The resulting disproportionate exposure to air pollution has contributed to high rates of emergency department visits for asthma and other diseases.</span><sup data-dcnode-id="1073"><span data-dcnode-id="1074" instrument_node="">53, 54</span></sup></p><p data-dcnode-id="1068"><span data-dcnode-id="1071" instrument_node="">People of color are also more likely than white people to be living with one or more chronic conditions that make them more susceptible to the health impact of air pollution, including asthma, diabetes and heart disease.</span><sup data-dcnode-id="1069"><span data-dcnode-id="1070" instrument_node="">55</span></sup></p><span data-dcnode-id="1067" instrument_node=""> </span></section><span data-dcnode-id="1065" instrument_node="">
</span></div><span data-dcnode-id="1063" instrument_node="">
</span><div class="card accordion widget" data-dcnode-id="1043" id="panel_9761dab8d452"><span data-dcnode-id="1062" instrument_node="">
</span><button aria-expanded="false" class="card-title accordion-title" data-dcnode-id="1060"><span data-dcnode-id="1061" instrument_node="">
        People Experiencing Poverty
    </span></button><span data-dcnode-id="1059" instrument_node="">
</span><section aria-labelledby="People Experiencing Poverty" class="card-content accordion-content" data-dcnode-id="1045"><span data-dcnode-id="1058" instrument_node="">
</span><p data-dcnode-id="1047"><span data-dcnode-id="1057" instrument_node="">There is evidence that having low income or living in lower income areas puts people at increased risk from air pollution, although the correlation is not as strong as with race and ethnicity.</span><sup data-dcnode-id="1055"><span data-dcnode-id="1056" instrument_node="">56, 57&nbsp;</span></sup><span data-dcnode-id="1054" instrument_node="">People living in poverty are more likely to live in close proximity to sources of pollution and have fewer resources to relocate than people with more financial security.</span><sup data-dcnode-id="1052"><span data-dcnode-id="1053" instrument_node="">58</span></sup><span data-dcnode-id="1051" instrument_node=""> Poverty itself, along with the problems that beset many low-income communities, such as lack of safety, have been associated with increased psychosocial distress and chronic stress, which in turn make people more vulnerable to pollution-related health effects.</span><sup data-dcnode-id="1049"><span data-dcnode-id="1050" instrument_node="">59</span></sup><span data-dcnode-id="1048" instrument_node=""> People with low income also have lower rates of health coverage and less access to quality and affordable healthcare to provide relief to them when they get sick.</span></p><span data-dcnode-id="1046" instrument_node=""> </span></section><span data-dcnode-id="1044" instrument_node="">
</span></div><span data-dcnode-id="1042" instrument_node="">
</span><div class="card accordion widget" data-dcnode-id="1027" id="panel_13aa286512ba"><span data-dcnode-id="1041" instrument_node="">
</span><button aria-expanded="false" class="card-title accordion-title" data-dcnode-id="1039"><span data-dcnode-id="1040" instrument_node="">
        Children
    </span></button><span data-dcnode-id="1038" instrument_node="">
</span><section aria-labelledby="Children" class="card-content accordion-content" data-dcnode-id="1029"><span data-dcnode-id="1037" instrument_node="">
</span><p data-dcnode-id="1033"><span data-dcnode-id="1036" instrument_node="">Children are both more susceptible to harm from air pollution and more likely to be exposed than adults. The growth and development of a child’s lungs and breathing ability start in utero and continue into early adulthood. Exposure to air pollution at any stage of that development process can have both immediate and lasting impacts on developing lungs and children’s health. In addition, the body’s defenses that help adults fight off infections are still developing in children. Children have more respiratory infections than adults, which also seems to increase their susceptibility to air pollution.</span><sup data-dcnode-id="1034"><span data-dcnode-id="1035" instrument_node="">60</span></sup></p><p data-dcnode-id="1031"><span data-dcnode-id="1032" instrument_node="">Children breathe more rapidly and inhale more air relative to their size than do adults. They are more likely to spend time outdoors, running around, being active and breathing hard. Consequently, they are more exposed to polluted outdoor air than adults typically are. </span></p><span data-dcnode-id="1030" instrument_node=""> </span></section><span data-dcnode-id="1028" instrument_node="">
</span></div><span data-dcnode-id="1026" instrument_node="">
</span><div class="card accordion widget" data-dcnode-id="1011" id="panel_3cef099d6f08"><span data-dcnode-id="1025" instrument_node="">
</span><button aria-expanded="false" class="card-title accordion-title" data-dcnode-id="1023"><span data-dcnode-id="1024" instrument_node="">
        Older Adults
    </span></button><span data-dcnode-id="1022" instrument_node="">
</span><section aria-labelledby="Older Adults" class="card-content accordion-content" data-dcnode-id="1013"><span data-dcnode-id="1021" instrument_node="">
</span><p data-dcnode-id="1017"><span data-dcnode-id="1020" instrument_node="">Much of the illness and premature death caused by air pollution occurs in older adults, who are at increased risk of harm for several reasons. As a person ages, the normal process of thinning and weakening of the lung tissue and the supporting muscle and bones of the ribcage results in diminishing lung function over time. The increased impairment that results from exposure to air pollutants then has an add-on effect, putting stress on the lungs and heart. Older people are also more likely to be living with chronic diseases, and there is evidence that co-existing chronic lung, heart or circulatory conditions may worsen following exposure to environmental pollutants.</span><sup data-dcnode-id="1018"><span data-dcnode-id="1019" instrument_node="">61</span></sup></p><p data-dcnode-id="1015"><span data-dcnode-id="1016" instrument_node="">The strength of the immune system also declines with age, leaving older people at greater risk of contracting infections and less able to get them under control before they become serious. Because exposure to air pollution increases susceptibility to respiratory infections, it also increases the risk of severe illness and death in older adults.</span></p><span data-dcnode-id="1014" instrument_node=""> </span></section><span data-dcnode-id="1012" instrument_node="">
</span></div><span data-dcnode-id="1010" instrument_node="">
</span><div class="card accordion widget" data-dcnode-id="999" id="panel_7f1230f0502b"><span data-dcnode-id="1009" instrument_node="">
</span><button aria-expanded="false" class="card-title accordion-title" data-dcnode-id="1007"><span data-dcnode-id="1008" instrument_node="">
        People with Underlying Health Conditions
    </span></button><span data-dcnode-id="1006" instrument_node="">
</span><section aria-labelledby="People with Underlying Health Conditions" class="card-content accordion-content" data-dcnode-id="1001"><span data-dcnode-id="1005" instrument_node="">
</span><p data-dcnode-id="1003"><span data-dcnode-id="1004" instrument_node="">For the millions of people in the U.S. living with illnesses such as asthma, COPD, diabetes, heart disease and lung cancer, exposure to air pollution places them at greater risk of harm to their health than those without disease. The cellular injury and systemic inflammation triggered by breathing ozone and particle pollution put additional stress on people’s lungs, heart and other organs already compromised by disease. This can result in a worsening of symptoms, increased medication use, more frequent emergency department visits and hospitalizations, an overall reduced quality of life and, far too often, premature death.</span></p><span data-dcnode-id="1002" instrument_node=""> </span></section><span data-dcnode-id="1000" instrument_node="">
</span></div><span data-dcnode-id="998" instrument_node="">
</span><div class="card accordion widget" data-dcnode-id="981" id="pregnancy"><span data-dcnode-id="997" instrument_node="">
</span><button aria-expanded="false" class="card-title accordion-title" data-dcnode-id="995"><span data-dcnode-id="996" instrument_node="">
        Pregnant People and Fetuses
    </span></button><span data-dcnode-id="994" instrument_node="">
</span><section aria-labelledby="Pregnant People and Fetuses" class="card-content accordion-content" data-dcnode-id="983"><span data-dcnode-id="993" instrument_node="">
</span><p data-dcnode-id="989"><span data-dcnode-id="992" instrument_node="">Pregnancy is always a susceptible time for both the pregnant person and the developing fetus. The pregnant body undergoes dramatic physiological changes in hormone levels, metabolism and circulation throughout months of gestation. The rapid and complex development of the fetus is a precisely timed and sequenced process. The inflammation and oxidative stress resulting from exposure to air pollution during pregnancy can increase the risk of hypertensive disorders, including preeclampsia, in the pregnant person and lead to intrauterine inflammation and damage to the placenta that can disrupt the growth and development of the fetus. Fetal health may also be impacted in a number of ways by environmental contaminants that have been shown to cross the placenta.</span><sup data-dcnode-id="990"><span data-dcnode-id="991" instrument_node="">62</span></sup></p><p data-dcnode-id="985"><span data-dcnode-id="988" instrument_node="">Exposure to both ozone and particle pollution during pregnancy is strongly associated with premature birth, low birth weight and stillbirth. These risks are amplified in pregnancies where the pregnant person is already at higher risk, such as people of color and those chronic conditions, especially asthma.</span><sup data-dcnode-id="986"><span data-dcnode-id="987" instrument_node="">63</span></sup></p><span data-dcnode-id="984" instrument_node=""> </span></section><span data-dcnode-id="982" instrument_node="">
</span></div><span data-dcnode-id="980" instrument_node="">
</span><div class="card accordion widget" data-dcnode-id="963" id="panel_94bc90f9c7a6"><span data-dcnode-id="979" instrument_node="">
</span><button aria-expanded="false" class="card-title accordion-title" data-dcnode-id="977"><span data-dcnode-id="978" instrument_node="">
        People with a Smoking History
    </span></button><span data-dcnode-id="976" instrument_node="">
</span><section aria-labelledby="People with a Smoking History" class="card-content accordion-content" data-dcnode-id="965"><span data-dcnode-id="975" instrument_node="">
</span><p data-dcnode-id="967"><span data-dcnode-id="974" instrument_node="">There is some recent evidence suggesting that current and former smokers are at greater risk of health harm from exposure to fine particle pollution compared with never-smokers. They are more likely to develop lung cancer and to die prematurely.</span><sup data-dcnode-id="972"><span data-dcnode-id="973" instrument_node="">64</span></sup><span data-dcnode-id="971" instrument_node=""> Smoking damages the lungs, heart, blood vessels and other organs.</span><sup data-dcnode-id="969"><span data-dcnode-id="970" instrument_node="">65</span></sup><span data-dcnode-id="968" instrument_node=""> This impairment leaves the person with a smoking history more vulnerable to the health impact of air pollution than a never-smoker.</span></p><span data-dcnode-id="966" instrument_node=""> </span></section><span data-dcnode-id="964" instrument_node="">
</span></div><span data-dcnode-id="962" instrument_node="">
</span></div><span data-dcnode-id="960" instrument_node="">
</span></div><span data-dcnode-id="958" instrument_node="">
</span></div><span data-dcnode-id="956" instrument_node="">
</span></section><span data-dcnode-id="954" instrument_node="">
</span><section class="padding-bottom no-padding-top" data-dcnode-id="918" id="section_4e4f536e7535" style=""><span data-dcnode-id="953" instrument_node="">
</span><div class="global-container" data-dcnode-id="920"><span data-dcnode-id="952" instrument_node="">
</span><div class="row" data-dcnode-id="922"><span data-dcnode-id="951" instrument_node="">
</span><div class="col-12" data-dcnode-id="924"><span data-dcnode-id="950" instrument_node="">
</span><div class="fr-view" data-dcnode-id="926"><span data-dcnode-id="949" instrument_node="">
</span><div class="bg-gray promo-card-content" data-dcnode-id="928"><p data-dcnode-id="946"><em data-dcnode-id="947"><span data-dcnode-id="948" instrument_node="">For people with lung conditions like asthma, checking the air quality is a regular part of life.&nbsp;</span></em></p><p data-dcnode-id="943"><em data-dcnode-id="944"><span data-dcnode-id="945" instrument_node="">“It’s something we automatically think about before we do outside activities,” says LA resident Jaime K., who has asthma. “If the air quality is bad, we don’t go out to the grocery store, out for walks or out to play with my daughter.”&nbsp;</span></em></p><p data-dcnode-id="940"><em data-dcnode-id="941"><span data-dcnode-id="942" instrument_node="">She says in an ideal world, she’d live near the ocean. But because housing costs by the water are so high, she purchased a home further inland near a highway. Despite using air filters to improve the air quality inside, soot builds up daily due to vehicles and, increasingly, wildfire smoke.&nbsp;</span></em></p><p data-dcnode-id="937"><em data-dcnode-id="938"><span data-dcnode-id="939" instrument_node="">“No matter how much I clean,” Jaime says, “I always have a layer of dust the next day.”&nbsp;</span></em></p><p data-dcnode-id="929"><strong data-dcnode-id="934"><em data-dcnode-id="935"><span data-dcnode-id="936" instrument_node="">Jamie K.</span></em></strong><br data-dcnode-id="933"><strong data-dcnode-id="930"><em data-dcnode-id="931"><span data-dcnode-id="932" instrument_node="">Los Angeles, California</span></em></strong></p></div><span data-dcnode-id="927" instrument_node="">
</span></div><span data-dcnode-id="925" instrument_node="">
</span></div><span data-dcnode-id="923" instrument_node="">
</span></div><span data-dcnode-id="921" instrument_node="">
</span></div><span data-dcnode-id="919" instrument_node="">
</span></section><span data-dcnode-id="917" instrument_node="">
</span><section class="section" data-dcnode-id="898" id="section_b92bef877e36" style=""><span data-dcnode-id="916" instrument_node="">
</span><div class="global-container" data-dcnode-id="900"><span data-dcnode-id="915" instrument_node="">
</span><div class="row" data-dcnode-id="902"><span data-dcnode-id="914" instrument_node="">
</span><div class="col-12" data-dcnode-id="904"><span data-dcnode-id="913" instrument_node="">
</span><div class="fr-view" data-dcnode-id="906"><span data-dcnode-id="912" instrument_node="">
</span><h2 data-dcnode-id="910"><span data-dcnode-id="911" instrument_node="">Emerging Threats</span></h2><p data-dcnode-id="908"><span data-dcnode-id="909" instrument_node="">Since the passage of the Clean Air Act in 1970, the federal, state, local and Tribal governments and businesses, community leaders and advocates have invested years of effort into reducing the public health threat from air pollution. By many measures, the air the nation breathes is dramatically cleaner than it was 50 years ago. &nbsp;“State of the Air” has documented this long-term improvement over the past 22 years. In recent years, however, new threats have emerged that are causing air pollution levels to rise and the potential harm to vulnerable populations to increase.</span></p><span data-dcnode-id="907" instrument_node="">
</span></div><span data-dcnode-id="905" instrument_node="">
</span></div><span data-dcnode-id="903" instrument_node="">
</span></div><span data-dcnode-id="901" instrument_node="">
</span></div><span data-dcnode-id="899" instrument_node="">
</span></section><span data-dcnode-id="897" instrument_node="">
</span><section class="padding-bottom no-padding-top" data-dcnode-id="797" id="section_3cce786c1c17" style=""><span data-dcnode-id="896" instrument_node="">
</span><div class="global-container" data-dcnode-id="799"><span data-dcnode-id="895" instrument_node="">
</span><div class="row" data-dcnode-id="801"><span data-dcnode-id="894" instrument_node="">
</span><div class="col-12" data-dcnode-id="803"><span data-dcnode-id="893" instrument_node="">
</span><div class="card accordion widget" data-dcnode-id="863" id="panel_04f24306cc6a"><span data-dcnode-id="892" instrument_node="">
</span><button aria-expanded="false" class="card-title accordion-title" data-dcnode-id="890"><span data-dcnode-id="891" instrument_node="">
        Climate Change
    </span></button><span data-dcnode-id="889" instrument_node="">
</span><section aria-labelledby="Climate Change" class="card-content accordion-content" data-dcnode-id="865"><span data-dcnode-id="888" instrument_node="">
</span><p data-dcnode-id="886"><span data-dcnode-id="887" instrument_node="">The scientific evidence has clearly shown for years that impacts from climate change threaten human health. These health impacts are no longer a concern for the future. They’re happening now. What remains to be seen is how much these impacts increase in severity, how much action to reduce greenhouse gas emissions is able to mitigate them, and how much communities are able to adapt to the impacts that can’t be avoided.&nbsp;</span></p><p data-dcnode-id="884"><span data-dcnode-id="885" instrument_node="">The rising global temperatures and disruption of short- and long-term weather patterns caused by climate change are putting the health Americans at risk. The impacts of climate change currently being experienced in communities nationwide include an increase in extreme weather events, deterioration of air quality from increased ozone formation and wildfire smoke, expansion of the range of disease-carrying pests and increased stresses that affect mental health and well-being.&nbsp;</span></p><p data-dcnode-id="882"><span data-dcnode-id="883" instrument_node="">People and communities are differentially exposed to these climate-related hazards as well as being disproportionately affected by climate-related health risks. Populations experiencing greater health risks include children, older adults, low-income communities and some communities of color. &nbsp;</span></p><p data-dcnode-id="874"><span data-dcnode-id="881" instrument_node="">“State of the Air” largely focuses on the health harms linked to increases in particle pollution and ozone, but increasing heat itself is another significant risk factor that adds to the climate vulnerability of some of the same populations who face increased risk from air pollution.</span><sup data-dcnode-id="879"><span data-dcnode-id="880" instrument_node="">66</span></sup><span data-dcnode-id="878" instrument_node=""> Children are especially vulnerable to extreme heat. They spend more time playing outside and participating in vigorous activity than the average adult. Their bodies have a high surface area-to-mass ratio, so must divert more blood flow to their skin to dissipate heat, which may strain other bodily functions.</span><sup data-dcnode-id="876"><span data-dcnode-id="877" instrument_node="">67</span></sup><span data-dcnode-id="875" instrument_node=""> &nbsp;</span></p><p data-dcnode-id="867"><span data-dcnode-id="873" instrument_node="">Among older adults, increased heat and exposure to air pollution raises the risk of premature death and results in more emergency room visits and hospital admissions, especially among those older adults who spend more time outdoors. The physical changes associated with aging—including those that affect breathing and movement—can make it even more difficult to respond to climate change. In the past two decades, heat-related mortality for older persons has almost doubled, reaching a record high 19,000 deaths in 2018.</span><sup data-dcnode-id="871"><span data-dcnode-id="872" instrument_node="">68</span></sup><span data-dcnode-id="870" instrument_node=""> Heat waves also significantly increase the risk of illness and death in people living with chronic lung disease.</span><sup data-dcnode-id="868"><span data-dcnode-id="869" instrument_node="">69</span></sup></p><span data-dcnode-id="866" instrument_node=""> </span></section><span data-dcnode-id="864" instrument_node="">
</span></div><span data-dcnode-id="862" instrument_node="">
</span><div class="card accordion widget" data-dcnode-id="833" id="panel_3120d1fbf0ea"><span data-dcnode-id="861" instrument_node="">
</span><button aria-expanded="false" class="card-title accordion-title" data-dcnode-id="859"><span data-dcnode-id="860" instrument_node="">
        Wildfires
    </span></button><span data-dcnode-id="858" instrument_node="">
</span><section aria-labelledby="Wildfires" class="card-content accordion-content" data-dcnode-id="835"><span data-dcnode-id="857" instrument_node="">
</span><p data-dcnode-id="853"><span data-dcnode-id="856" instrument_node="">&nbsp;Wildfires are posing a growing threat to public health in many parts of the U.S. Increased heat and drought caused by climate change are resulting in larger, more frequent fires that blanket communities in smoke and leave residents gasping for air. Smoke from large fires can spread over hundreds or thousands of miles, polluting the air breathed by millions of people. In the years 2016-2019, individuals in the U.S. experienced a 19% increase in the number of days they were exposed to high wildfire risk compared to 2001-2004.</span><sup data-dcnode-id="854"><span data-dcnode-id="855" instrument_node="">70</span></sup></p><p data-dcnode-id="849"><span data-dcnode-id="852" instrument_node="">Wildfire smoke is a complex mixture of fine and course particulate matter and gases, including carbon monoxide, nitrogen oxides, volatile organic compounds and air toxics. The chemical composition of wildfire smoke varies widely depending on the location of the fire and the material burned. The details of how these differences impact health is the subject of ongoing research.</span><sup data-dcnode-id="850"><span data-dcnode-id="851" instrument_node="">71</span></sup></p><p data-dcnode-id="839"><span data-dcnode-id="848" instrument_node="">The most widespread health threat from smoke is from fine particles. Like other sources of fine particle pollution, wildfire smoke can be extremely harmful to the lungs, especially for children, older adults and people with asthma, COPD, chronic heart disease and diabetes. Recent research has confirmed that severe wildfire episodes are associated with increased risk of hospital admissions for respiratory diseases for Medicare recipients.</span><sup data-dcnode-id="846"><span data-dcnode-id="847" instrument_node="">72</span></sup><span data-dcnode-id="845" instrument_node=""> Pregnant people exposed to wildfire smoke are more likely to experience adverse pregnancy outcomes, including preterm birth.</span><sup data-dcnode-id="843"><span data-dcnode-id="844" instrument_node="">73</span></sup><span data-dcnode-id="842" instrument_node=""> There is also strong evidence linking smoke exposure to increased risk of premature death.</span><sup data-dcnode-id="840"><span data-dcnode-id="841" instrument_node="">74</span></sup></p><p data-dcnode-id="837"><span data-dcnode-id="838" instrument_node="">The health impact of breathing wildfire smoke for extended periods of time, year after year, as is happening in some hard-hit communities, remains unknown.</span></p><span data-dcnode-id="836" instrument_node=""> </span></section><span data-dcnode-id="834" instrument_node="">
</span></div><span data-dcnode-id="832" instrument_node="">
</span><div class="card accordion widget" data-dcnode-id="805" id="panel_796a46fb06a6"><span data-dcnode-id="831" instrument_node="">
</span><button aria-expanded="false" class="card-title accordion-title" data-dcnode-id="829"><span data-dcnode-id="830" instrument_node="">
        E-Commerce Shipping and Transport
    </span></button><span data-dcnode-id="828" instrument_node="">
</span><section aria-labelledby="E-Commerce Shipping and Transport" class="card-content accordion-content" data-dcnode-id="807"><span data-dcnode-id="827" instrument_node="">
</span><p data-dcnode-id="820"><span data-dcnode-id="826" instrument_node="">The COVID-19 pandemic has transformed personal shopping behavior, accelerating the shift from in-store shopping for products and services to ordering them online. This has increased demand for fast, personalized delivery service and has resulted in a rising number of delivery trucks and vans on neighborhood streets, supported by a proliferation of warehouses, distribution centers and long-distance haulers on highways. To maximize their efficiency, large retailers and shipping companies are clustering new warehouses together in sprawling complexes, often in already highly-polluted communities. More traffic in and out of these areas, especially since the bulk of it is diesel-powered, brings more unhealthy air pollution to the communities where it is concentrated.</span><sup data-dcnode-id="824"><span data-dcnode-id="825" instrument_node="">75</span></sup><span data-dcnode-id="823" instrument_node=""> U.S. EPA estimates that 72 million Americans live along major truck freight routes, and notes that they are more likely to be people of color and have lower incomes.</span><sup data-dcnode-id="821"><span data-dcnode-id="822" instrument_node="">76</span></sup></p><p data-dcnode-id="816"><span data-dcnode-id="819" instrument_node="">Changes in consumer behavior have also had a major impact on port cities, which are dealing with an increase in cargo imports. The rapid growth in shipping traffic has resulted in backlogs of ships idling in harbors and off-shore waiting to unload, as well as increased congestion of the port-related cargo freight system of trucks, trains and planes. Between January and September 2021, the busy Ports of Los Angeles and Long Beach in California saw an average increase of 20% in cargo movement compared to the same time in 2019 prior to the COVID-19 pandemic. According to estimates from the California Air Resources Board, as of October 2021, the increased congestion had resulted in overall container ship emissions increases of 20 tons per day (tpd) of oxides of nitrogen (NOx) and 0.5 tpd of particulate matter. This increase in NOx emissions from container ships is roughly equivalent to the total emissions from 5.8 million passenger cars. Additionally, the increased diesel particulate emissions are comparable to the exhaust particulate emissions from almost 100,000 diesel trucks.</span><sup data-dcnode-id="817"><span data-dcnode-id="818" instrument_node="">77</span></sup></p><p data-dcnode-id="809"><span data-dcnode-id="815" instrument_node="">Exposure to traffic-related pollution is a serious health hazard to those living in freight-impacted communities. The mixture of emissions has been linked to poor birth outcomes, reduced lung and cognitive development, development and worsening of chronic respiratory and cardiovascular diseases, increased risk of dementia, cancer and premature death.</span><sup data-dcnode-id="813"><span data-dcnode-id="814" instrument_node="">78</span></sup><span data-dcnode-id="812" instrument_node=""> Unfortunately, the health burden for e-commerce-related pollution tends to disproportionately impact disadvantaged communities. Since low-income communities and communities of color make up a significant proportion of residents in disadvantaged communities, they are often burdened with the negative by-products of congestion and exposure to on-road emissions.</span><sup data-dcnode-id="810"><span data-dcnode-id="811" instrument_node="">79</span></sup></p><span data-dcnode-id="808" instrument_node=""> </span></section><span data-dcnode-id="806" instrument_node="">

</span><div class="global-container" data-dcnode-id="696"><span data-dcnode-id="794" instrument_node="">
</span><div class="row" data-dcnode-id="698"><span data-dcnode-id="793" instrument_node="">

</span><div class="widget widget-txt" data-dcnode-id="707"><span data-dcnode-id="788" instrument_node="">
</span><div class="bg-gray block bottom" data-dcnode-id="712" id="didyouknow"><span data-dcnode-id="787" instrument_node="">
</span><div class="random" data-dcnode-id="716"><span data-dcnode-id="786" instrument_node="">
</span><h2 data-dcnode-id="780"><span data-dcnode-id="785" instrument_node="">Did You </span><strong data-dcnode-id="783"><span data-dcnode-id="784" instrument_node="">Know</span></strong><span data-dcnode-id="781"><span data-dcnode-id="782" instrument_node="">?</span></span></h2><span data-dcnode-id="779" instrument_node="">
</span><ol data-dcnode-id="720" id="facts"><span data-dcnode-id="778" instrument_node="">
</span><li data-dcnode-id="776"><span data-dcnode-id="777" instrument_node="">More than four in ten Americans live where the air they breathe earned an F in “State of the Air” 2022.</span></li><span data-dcnode-id="775" instrument_node="">
</span><li data-dcnode-id="773"><span data-dcnode-id="774" instrument_node="">More than 137 million people live in counties that received an F for either ozone or particle pollution in “State of the Air” 2022.</span></li><span data-dcnode-id="772" instrument_node="">
</span><li data-dcnode-id="770"><span data-dcnode-id="771" instrument_node="">Close to 19.8 million people live in counties that got an F for all three air pollution measures in “State of the Air” 2022.</span></li><span data-dcnode-id="769" instrument_node="">
</span><li data-dcnode-id="767"><span data-dcnode-id="768" instrument_node="">Breathing ozone irritates the lungs, resulting in inflammation—as if there were a bad sunburn within the lungs.</span></li><span data-dcnode-id="766" instrument_node="">
</span><li data-dcnode-id="764"><span data-dcnode-id="765" instrument_node="">Breathing in particle pollution can increase the risk of lung cancer.</span></li><span data-dcnode-id="763" instrument_node="">
</span><li data-dcnode-id="761"><span data-dcnode-id="762" instrument_node="">Particle pollution can cause early death and heart attacks, strokes and emergency room visits.</span></li><span data-dcnode-id="760" instrument_node="">
</span><li data-dcnode-id="758"><span data-dcnode-id="759" instrument_node="">Particles in air pollution can be smaller than 1/30th the diameter of a human hair. When you inhale them, they are small enough to get past the body's natural defenses.</span></li><span data-dcnode-id="757" instrument_node="">
</span><li data-dcnode-id="755"><span data-dcnode-id="756" instrument_node="">Ozone and particle pollution are both linked to increased risk of lower birth weight in newborns.</span></li><span data-dcnode-id="754" instrument_node="">
</span><li data-dcnode-id="752"><span data-dcnode-id="753" instrument_node="">If you live or work near a busy highway, traffic pollution may put you at greater risk of harm.</span></li><span data-dcnode-id="751" instrument_node="">
</span><li data-dcnode-id="749"><span data-dcnode-id="750" instrument_node="">People who work or exercise outside face increased risk from the effects of air pollution.</span></li><span data-dcnode-id="748" instrument_node="">
</span><li data-dcnode-id="746"><span data-dcnode-id="747" instrument_node="">Millions of people are especially vulnerable to the effects of air pollution, including children, older adults and people with lung diseases such as asthma.</span></li><span data-dcnode-id="745" instrument_node="">
</span><li data-dcnode-id="743"><span data-dcnode-id="744" instrument_node="">People of color and those earning lower incomes are disproportionately affected by air pollution that puts them at higher risk for illness.</span></li><span data-dcnode-id="742" instrument_node="">
</span><li data-dcnode-id="740"><span data-dcnode-id="741" instrument_node="">Air pollution is a serious health threat. It can trigger asthma attacks, harm lung development in children, and even be deadly.</span></li><span data-dcnode-id="739" instrument_node="">
</span><li data-dcnode-id="737"><span data-dcnode-id="738" instrument_node="">You can protect yourself by checking the air quality forecasts in your community and avoiding exercising or working outdoors when unhealthy air is expected.</span></li><span data-dcnode-id="736" instrument_node="">
</span><li data-dcnode-id="734"><span data-dcnode-id="735" instrument_node="">Climate change enhances conditions for ozone pollution to form and makes it harder clean up communities where ozone levels are high.</span></li><span data-dcnode-id="733" instrument_node="">
</span><li data-dcnode-id="731"><span data-dcnode-id="732" instrument_node="">Climate change increases the risk of wildfires that spread particle pollution in the smoke.</span></li><span data-dcnode-id="730" instrument_node="">
</span><li data-dcnode-id="728"><span data-dcnode-id="729" instrument_node="">The Biden Administration has made bold commitments to improve air quality, especially in communities that have faced disproportionate levels of pollution. The Lung Association is advocating to make sure they are realized.</span></li><span data-dcnode-id="727" instrument_node="">
</span><li data-dcnode-id="725"><span data-dcnode-id="726" instrument_node="">The nation has the Clean Air Act to thank for decades of improvements in air quality. This landmark law has driven pollution reduction for 50 years.</span></li><span data-dcnode-id="724" instrument_node="">
</span><li data-dcnode-id="722"><span data-dcnode-id="723" instrument_node="">Cutting air pollution through the Clean Air Act was projected to prevent over 230,000 deaths and save nearly $2 trillion in 2020 alone.</span></li><span data-dcnode-id="721" instrument_node="">
</span></ol><span data-dcnode-id="719" instrument_node="">
