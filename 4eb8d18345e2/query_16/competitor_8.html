</span><meta content="From a physiological standpoint, the lung volumes are either dynamic or static. Both subclasses are measured at different degrees of inspiration or expiration; however, dynamic lung volumes are characteristically dependent on the rate of air flow. The static lung volumes/capacities are further subdivided into four standard volumes (tidal, inspiratory reserve, expiratory reserve, and residual volumes) and four standard capacities (inspiratory, functional residual, vital and total lung capacities). The dynamic lung volumes are mostly derived from vital capacity. While dynamic lung volumes are essential for diagnosis and follow up of obstructive lung diseases, static lung volumes are equally important for evaluation of obstructive as well as restrictive ventilatory defects. This review intends to update the reader with the physiological basis, clinical significance and interpretative approaches of the standard static lung volumes&nbsp;and capacities." data-dcnode-id="5153" name="citation_abstract"><span data-dcnode-id="5152" instrument_node="">

</span><meta content="The physiological basis and clinical significance of lung volume measurements - Multidisciplinary Respiratory Medicine" data-dcnode-id="4806" property="og:title"><span data-dcnode-id="4805" instrument_node="">
</span><meta content="From a physiological standpoint, the lung volumes are either dynamic or static. Both subclasses are measured at different degrees of inspiration or expiration; however, dynamic lung volumes are characteristically dependent on the rate of air flow. The static lung volumes/capacities are further subdivided into four standard volumes (tidal, inspiratory reserve, expiratory reserve, and residual volumes) and four standard capacities (inspiratory, functional residual, vital and total lung capacities). The dynamic lung volumes are mostly derived from vital capacity. While dynamic lung volumes are essential for diagnosis and follow up of obstructive lung diseases, static lung volumes are equally important for evaluation of obstructive as well as restrictive ventilatory defects. This review intends to update the reader with the physiological basis, clinical significance and interpretative approaches of the standard static lung volumes and capacities." data-dcnode-id="4804" property="og:description"><span data-dcnode-id="4803" instrument_node="">

</span><section aria-labelledby="Abs1" data-dcnode-id="4232" data-title="Abstract" lang="en"><div class="c-article-section" data-dcnode-id="4233" id="Abs1-section"><h2 class="c-article-section__title js-section-title js-c-reading-companion-sections-item" data-dcnode-id="4237" id="Abs1"><span data-dcnode-id="4238" instrument_node="">Abstract</span></h2><div class="c-article-section__content" data-dcnode-id="4234" id="Abs1-content"><p data-dcnode-id="4235"><span data-dcnode-id="4236" instrument_node="">From a physiological standpoint, the lung volumes are either dynamic or static. Both subclasses are measured at different degrees of inspiration or expiration; however, dynamic lung volumes are characteristically dependent on the rate of air flow. The static lung volumes/capacities are further subdivided into four standard volumes (tidal, inspiratory reserve, expiratory reserve, and residual volumes) and four standard capacities (inspiratory, functional residual, vital and total lung capacities). The dynamic lung volumes are mostly derived from vital capacity. While dynamic lung volumes are essential for diagnosis and follow up of obstructive lung diseases, static lung volumes are equally important for evaluation of obstructive as well as restrictive ventilatory defects. This review intends to update the reader with the physiological basis, clinical significance and interpretative approaches of the standard static lung volumes&nbsp;and capacities.</span></p></div></div></section><span data-dcnode-id="4231" instrument_node="">
</span><section data-dcnode-id="4173" data-title="Background"><div class="c-article-section" data-dcnode-id="4174" id="Sec1-section"><h2 class="c-article-section__title js-section-title js-c-reading-companion-sections-item" data-dcnode-id="4229" id="Sec1"><span data-dcnode-id="4230" instrument_node="">Background</span></h2><div class="c-article-section__content" data-dcnode-id="4175" id="Sec1-content"><p data-dcnode-id="4209"><span data-dcnode-id="4228" instrument_node="">Four standard lung volumes, namely, tidal (TV), inspiratory reserve (IRV), expiratory reserve (ERV), and residual volumes (RV) are described in the literature. Alternatively, the standard lung capacities are inspiratory (IC), functional residual (FRC), vital (VC) and total lung capacities (TLC). Figure&nbsp;</span><a data-dcnode-id="4226" data-track="click" data-track-action="figure anchor" data-track-label="link" href="#Fig1"><span data-dcnode-id="4227" instrument_node="">1</span></a><span data-dcnode-id="4225" instrument_node=""> gives a schematic summary of the standard lung volumes and capacities [</span><a aria-label="Reference 1" data-dcnode-id="4223" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR1" id="ref-link-section-d222060581e695" title="Barr RG, Stemple KJ, Mesia-Vela S, Basner RC, Derk SJ, Henneberger PK,&nbsp;et al. Reproducibility and validity of a handheld spirometer. Respir Care. 2008;53(4):433–41. 
                    http://www.ncbi.nlm.nih.gov/pubmed/18364054
                    
                  .&nbsp;"><span data-dcnode-id="4224" instrument_node="">1</span></a><span data-dcnode-id="4222" instrument_node="">–</span><a aria-label="Reference 3" data-dcnode-id="4220" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR3" id="ref-link-section-d222060581e698" title="Liistro G, Vanwelde C, Vincken W, Vandevoorde J, Verleden G, Buffels J, et al. Technical and functional assessment of 10 office spirometers: A multicenter comparative study. Chest. 2006;130(3):657–65."><span data-dcnode-id="4221" instrument_node="">3</span></a><span data-dcnode-id="4219" instrument_node="">]. RV constitutes part of FRC as well as TLC and, therefore, these capacities are impossible to measure through simple spirometers. The procedures used for measurement of RV, FRC and TLC are based on radiological, plethysmographic or dilutional techniques (helium dilution and nitrogen washout methods) [</span><a aria-label="Reference 4" data-dcnode-id="4217" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR4" id="ref-link-section-d222060581e701" title="Ruppel GL. What is the clinical value of lung volumes? Respir Care. 2012;57(1):26-35-8."><span data-dcnode-id="4218" instrument_node="">4</span></a><span data-dcnode-id="4216" instrument_node="">]. However, body plethysmography and dilutional techniques may under-and overestimate lung volumes and capacities, respectively [</span><a aria-label="Reference 5" data-dcnode-id="4214" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR5" id="ref-link-section-d222060581e704" title="Sue DY. Measurement of lung volumes in patients with obstructive lung disease. A matter of time (constants). Ann Am Thorac Soc. 2013;10(5):525–30."><span data-dcnode-id="4215" instrument_node="">5</span></a><span data-dcnode-id="4213" instrument_node="">]. For the details of the procedures, advantages, disadvantages and recommendations for best practice of these techniques, the reader can refer to the reports revised and published by the joint committee of ATS/ERS [</span><a aria-label="Reference 6" data-dcnode-id="4211" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR6" id="ref-link-section-d222060581e708" title="Swanney MP, Beckert LE, Frampton CM, Wallace LA, Jensen RL, Crapo RO. Validity of the American Thoracic Society and other spirometric algorithms using FVC and forced expiratory volume at 6s for predicting a reduced total lung capacity. Chest. 2004;126(6):1861–6."><span data-dcnode-id="4212" instrument_node="">6</span></a><span data-dcnode-id="4210" instrument_node="">].</span></p><div class="c-article-section__figure js-c-reading-companion-figures-item" data-container-section="figure" data-dcnode-id="4179" data-test="figure" data-title="Fig. 1" id="figure-1"><figure data-dcnode-id="4180"><figcaption data-dcnode-id="4206"><b class="c-article-section__figure-caption" data-dcnode-id="4207" data-test="figure-caption-text" id="Fig1"><span data-dcnode-id="4208" instrument_node="">Fig. 1</span></b></figcaption><div class="c-article-section__figure-content" data-dcnode-id="4191"><div class="c-article-section__figure-item" data-dcnode-id="4201"><a class="c-article-section__figure-link" data-dcnode-id="4202" data-test="img-link" data-track="click" data-track-action="view figure" data-track-label="image" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//mrmjournal.biomedcentral.com/articles/10.1186/s40248-017-0084-5/figures/1" rel="nofollow"><picture data-dcnode-id="4203"><source data-dcnode-id="4205" srcset="//media.springernature.com/lw685/springer-static/image/art%3A10.1186%2Fs40248-017-0084-5/MediaObjects/40248_2017_84_Fig1_HTML.gif?as=webp" type="image/webp"><img alt="figure 1" aria-describedby="Fig1" data-dcnode-id="4204" loading="lazy" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//media.springernature.com/lw685/springer-static/image/art%253A10.1186/s40248-017-0084-5/MediaObjects/40248_2017_84_Fig1_HTML.gif&amp;raw"></picture></a></div><div class="c-article-section__figure-description" data-dcnode-id="4192" data-test="bottom-caption" id="figure-1-desc"><p data-dcnode-id="4193"><span data-dcnode-id="4200" instrument_node="">Standard lung volumes and capacities from a spirometer trace. The solid </span><i data-dcnode-id="4198"><span data-dcnode-id="4199" instrument_node="">black</span></i><span data-dcnode-id="4197" instrument_node=""> and </span><i data-dcnode-id="4195"><span data-dcnode-id="4196" instrument_node="">gray</span></i><span data-dcnode-id="4194" instrument_node=""> arrows indicate lung volumes and capacities respectively</span></p></div></div><div class="u-text-right u-hide-print" data-dcnode-id="4181"><a aria-label="Full size image figure 1" class="c-article__pill-button" data-dcnode-id="4182" data-test="article-link" data-track="click" data-track-action="view figure" data-track-dest="link:Figure1 Full size image" data-track-label="button" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//mrmjournal.biomedcentral.com/articles/10.1186/s40248-017-0084-5/figures/1" rel="nofollow"><span data-dcnode-id="4189"><span data-dcnode-id="4190" instrument_node="">Full size image</span></span><svg aria-hidden="true" class="u-icon" data-dcnode-id="4183" focusable="false" height="16" role="img" width="16"><use data-dcnode-id="4184" xlink:href="#global-icon-chevron-right" xmlns:xlink="http://www.w3.org/1999/xlink"><svg data-dcnode-id="4185" id="global-icon-chevron-right" viewBox="0 0 16 16"></svg></use></svg><span data-dcnode-id="4188" instrument_node="">
</span><path d="M7.782 7L5.3 4.518c-.393-.392-.4-1.022-.02-1.403a1.001 1.001 0 011.417 0l4.176 4.177a1.001 1.001 0 010 1.416l-4.176 4.177a.991.991 0 01-1.4.016 1 1 0 01.003-1.42L7.782 9l1.013-.998z" data-dcnode-id="4187" fill-rule="evenodd"></path><span data-dcnode-id="4186" instrument_node="">
</span></a></div></figure></div><span data-dcnode-id="4178" instrument_node="">
</span><p data-dcnode-id="4176"><span data-dcnode-id="4177" instrument_node="">The way&nbsp;how static lung volumes and capacities change in different physiological/pathological conditions depends on the understanding of the mechanics of breathing and the physiological determinants of pulmonary ventilation, which will be discussed in the following paragraphs.</span></p></div></div></section><section data-dcnode-id="3721" data-title="Mechanics of breathing"><div class="c-article-section" data-dcnode-id="3722" id="Sec2-section"><h2 class="c-article-section__title js-section-title js-c-reading-companion-sections-item" data-dcnode-id="4171" id="Sec2"><span data-dcnode-id="4172" instrument_node="">Mechanics of breathing</span></h2><div class="c-article-section__content" data-dcnode-id="3723" id="Sec2-content"><p data-dcnode-id="4163"><span data-dcnode-id="4170" instrument_node="">Towards the end of tidal expiration, the lungs tend to recoil inward while the chest wall tends to recoil outwards. These two opposing forces lead to a negative pressure within the potential space between the parietal and visceral pleurae. The negative intrapleural pressure (P</span><sub data-dcnode-id="4168"><span data-dcnode-id="4169" instrument_node="">Pl</span></sub><span data-dcnode-id="4167" instrument_node="">) is one of the important factors that keep the patency of small airways, which lack cartilaginous support. The rhythmic contraction of inspiratory muscles causes cyclic changes in the dimensions of the thoracic cage and consequently comparable cyclic fluctuation of P</span><sub data-dcnode-id="4165"><span data-dcnode-id="4166" instrument_node="">Pl</span></sub><span data-dcnode-id="4164" instrument_node="">.</span></p><p data-dcnode-id="4116"><span data-dcnode-id="4162" instrument_node="">During tidal inspiration, P</span><sub data-dcnode-id="4160"><span data-dcnode-id="4161" instrument_node="">Pl</span></sub><span data-dcnode-id="4159" instrument_node=""> drops from −5 to −8 cmH</span><sub data-dcnode-id="4157"><span data-dcnode-id="4158" instrument_node="">2</span></sub><span data-dcnode-id="4156" instrument_node="">O enforcing the intra-alveolar pressure (P</span><sub data-dcnode-id="4154"><span data-dcnode-id="4155" instrument_node="">alv</span></sub><span data-dcnode-id="4153" instrument_node="">) to drop one cmH</span><sub data-dcnode-id="4151"><span data-dcnode-id="4152" instrument_node="">2</span></sub><span data-dcnode-id="4150" instrument_node="">O below atmospheric pressure (P</span><sub data-dcnode-id="4148"><span data-dcnode-id="4149" instrument_node="">atm</span></sub><span data-dcnode-id="4147" instrument_node="">), Fig.&nbsp;</span><a data-dcnode-id="4145" data-track="click" data-track-action="figure anchor" data-track-label="link" href="#Fig2"><span data-dcnode-id="4146" instrument_node="">2a</span></a><span data-dcnode-id="4144" instrument_node="">. As a result, air flows into the alveoli. The drop of P</span><sub data-dcnode-id="4142"><span data-dcnode-id="4143" instrument_node="">Pl</span></sub><span data-dcnode-id="4141" instrument_node=""> also decreases the airways resistance by dilating the small airways and thus enhancing the air flow further. The sequence of events reverses during tidal expiration. When inspiratory muscles relax, dimensions of the thoracic cage decrease, P</span><sub data-dcnode-id="4139"><span data-dcnode-id="4140" instrument_node="">Pl</span></sub><span data-dcnode-id="4138" instrument_node=""> increases from −8 back to −5 cmH</span><sub data-dcnode-id="4136"><span data-dcnode-id="4137" instrument_node="">2</span></sub><span data-dcnode-id="4135" instrument_node="">O and P</span><sub data-dcnode-id="4133"><span data-dcnode-id="4134" instrument_node="">alv</span></sub><span data-dcnode-id="4132" instrument_node=""> increases one cmH</span><sub data-dcnode-id="4130"><span data-dcnode-id="4131" instrument_node="">2</span></sub><span data-dcnode-id="4129" instrument_node="">O above P</span><sub data-dcnode-id="4127"><span data-dcnode-id="4128" instrument_node="">atm</span></sub><span data-dcnode-id="4126" instrument_node="">. As a result, air flows outside the alveoli following the pressure gradient, Fig.&nbsp;</span><a data-dcnode-id="4124" data-track="click" data-track-action="figure anchor" data-track-label="link" href="#Fig2"><span data-dcnode-id="4125" instrument_node="">2b</span></a><span data-dcnode-id="4123" instrument_node="">. Tidal expiration is therefore a passive process, which needs no further muscle contraction. During tidal breathing, whether inspiratory or expiratory, intra-airways (P</span><sub data-dcnode-id="4121"><span data-dcnode-id="4122" instrument_node="">aw</span></sub><span data-dcnode-id="4120" instrument_node="">) pressure is always more than P</span><sub data-dcnode-id="4118"><span data-dcnode-id="4119" instrument_node="">Pl</span></sub><span data-dcnode-id="4117" instrument_node="">. This explains why small airways are always opened, even at the end of tidal expiration.</span></p><div class="c-article-section__figure js-c-reading-companion-figures-item" data-container-section="figure" data-dcnode-id="4074" data-test="figure" data-title="Fig. 2" id="figure-2"><figure data-dcnode-id="4075"><figcaption data-dcnode-id="4113"><b class="c-article-section__figure-caption" data-dcnode-id="4114" data-test="figure-caption-text" id="Fig2"><span data-dcnode-id="4115" instrument_node="">Fig. 2</span></b></figcaption><div class="c-article-section__figure-content" data-dcnode-id="4086"><div class="c-article-section__figure-item" data-dcnode-id="4108"><a class="c-article-section__figure-link" data-dcnode-id="4109" data-test="img-link" data-track="click" data-track-action="view figure" data-track-label="image" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//mrmjournal.biomedcentral.com/articles/10.1186/s40248-017-0084-5/figures/2" rel="nofollow"><picture data-dcnode-id="4110"><source data-dcnode-id="4112" srcset="//media.springernature.com/lw685/springer-static/image/art%3A10.1186%2Fs40248-017-0084-5/MediaObjects/40248_2017_84_Fig2_HTML.gif?as=webp" type="image/webp"><img alt="figure 2" aria-describedby="Fig2" data-dcnode-id="4111" loading="lazy" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//media.springernature.com/lw685/springer-static/image/art%253A10.1186/s40248-017-0084-5/MediaObjects/40248_2017_84_Fig2_HTML.gif&amp;raw"></picture></a></div><div class="c-article-section__figure-description" data-dcnode-id="4087" data-test="bottom-caption" id="figure-2-desc"><p data-dcnode-id="4088"><span data-dcnode-id="4107" instrument_node="">Intrapleural and alveolar pressures towards the end of inspiration (</span><b data-dcnode-id="4105"><span data-dcnode-id="4106" instrument_node="">a</span></b><span data-dcnode-id="4104" instrument_node="">), expiration (</span><b data-dcnode-id="4102"><span data-dcnode-id="4103" instrument_node="">b</span></b><span data-dcnode-id="4101" instrument_node="">), and forceful expiration (</span><b data-dcnode-id="4099"><span data-dcnode-id="4100" instrument_node="">c</span></b><span data-dcnode-id="4098" instrument_node="">). The dotted line indicates the change in thoracic dimensions during </span><b data-dcnode-id="4096"><span data-dcnode-id="4097" instrument_node="">a</span></b><span data-dcnode-id="4095" instrument_node="">, </span><b data-dcnode-id="4093"><span data-dcnode-id="4094" instrument_node="">b</span></b><span data-dcnode-id="4092" instrument_node=""> and </span><b data-dcnode-id="4090"><span data-dcnode-id="4091" instrument_node="">c</span></b><span data-dcnode-id="4089" instrument_node=""> compared with the previous phase of the respiratory cycle</span></p></div></div><div class="u-text-right u-hide-print" data-dcnode-id="4076"><a aria-label="Full size image figure 2" class="c-article__pill-button" data-dcnode-id="4077" data-test="article-link" data-track="click" data-track-action="view figure" data-track-dest="link:Figure2 Full size image" data-track-label="button" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//mrmjournal.biomedcentral.com/articles/10.1186/s40248-017-0084-5/figures/2" rel="nofollow"><span data-dcnode-id="4084"><span data-dcnode-id="4085" instrument_node="">Full size image</span></span><svg aria-hidden="true" class="u-icon" data-dcnode-id="4078" focusable="false" height="16" role="img" width="16"><use data-dcnode-id="4079" xlink:href="#global-icon-chevron-right" xmlns:xlink="http://www.w3.org/1999/xlink"><svg data-dcnode-id="4080" id="global-icon-chevron-right" viewBox="0 0 16 16"></svg></use></svg><span data-dcnode-id="4083" instrument_node="">
</span><path d="M7.782 7L5.3 4.518c-.393-.392-.4-1.022-.02-1.403a1.001 1.001 0 011.417 0l4.176 4.177a1.001 1.001 0 010 1.416l-4.176 4.177a.991.991 0 01-1.4.016 1 1 0 01.003-1.42L7.782 9l1.013-.998z" data-dcnode-id="4082" fill-rule="evenodd"></path><span data-dcnode-id="4081" instrument_node="">
</span></a></div></figure></div><span data-dcnode-id="4073" instrument_node="">
</span><p data-dcnode-id="4032"><span data-dcnode-id="4072" instrument_node="">If inspiration above the tidal limit is required, accessory muscles of inspiration must be activated. Thoracic cage expands more leading to higher drop in P</span><sub data-dcnode-id="4070"><span data-dcnode-id="4071" instrument_node="">Pl</span></sub><span data-dcnode-id="4069" instrument_node=""> and P</span><sub data-dcnode-id="4067"><span data-dcnode-id="4068" instrument_node="">alv</span></sub><span data-dcnode-id="4066" instrument_node=""> compared with tidal inspiration, which explains why more air is delivered to the alveoli compared with tidal inspiration. Alternatively, expiration below the tidal level is an active process that requires contraction of expiratory muscles. During forceful expiration, the thoracic cage is compressed to the maximum. Both P</span><sub data-dcnode-id="4064"><span data-dcnode-id="4065" instrument_node="">Pl</span></sub><span data-dcnode-id="4063" instrument_node=""> and P</span><sub data-dcnode-id="4061"><span data-dcnode-id="4062" instrument_node="">alv</span></sub><span data-dcnode-id="4060" instrument_node=""> rise above P</span><sub data-dcnode-id="4058"><span data-dcnode-id="4059" instrument_node="">atm</span></sub><span data-dcnode-id="4057" instrument_node="">; however, P</span><sub data-dcnode-id="4055"><span data-dcnode-id="4056" instrument_node="">alv</span></sub><span data-dcnode-id="4054" instrument_node=""> remains more than P</span><sub data-dcnode-id="4052"><span data-dcnode-id="4053" instrument_node="">Pl</span></sub><span data-dcnode-id="4051" instrument_node=""> due to the effect of elastic recoil pressure (P</span><sub data-dcnode-id="4049"><span data-dcnode-id="4050" instrument_node="">el</span></sub><span data-dcnode-id="4048" instrument_node="">) of the alveolar wall. As demonstrated in Fig.&nbsp;</span><a data-dcnode-id="4046" data-track="click" data-track-action="figure anchor" data-track-label="link" href="#Fig3"><span data-dcnode-id="4047" instrument_node="">3c</span></a><span data-dcnode-id="4045" instrument_node="">, P</span><sub data-dcnode-id="4043"><span data-dcnode-id="4044" instrument_node="">aw</span></sub><span data-dcnode-id="4042" instrument_node=""> decreases from the area next to the alveoli upwards. This gradual drop in P</span><sub data-dcnode-id="4040"><span data-dcnode-id="4041" instrument_node="">aw</span></sub><span data-dcnode-id="4039" instrument_node=""> is secondary to simultaneous increase in the airways resistance towards the trachea. Taking into consideration the relatively constant P</span><sub data-dcnode-id="4037"><span data-dcnode-id="4038" instrument_node="">Pl</span></sub><span data-dcnode-id="4036" instrument_node=""> around the lung, each small airway can be subdivided into three segments (Fig.&nbsp;</span><a data-dcnode-id="4034" data-track="click" data-track-action="figure anchor" data-track-label="link" href="#Fig2"><span data-dcnode-id="4035" instrument_node="">2c</span></a><span data-dcnode-id="4033" instrument_node="">):</span></p><ul class="u-list-style-bullet" data-dcnode-id="3994"><span data-dcnode-id="4031" instrument_node="">
</span><li data-dcnode-id="4020"><span data-dcnode-id="4030" instrument_node="">
</span><p data-dcnode-id="4022"><span data-dcnode-id="4029" instrument_node="">An inflated segment, where P</span><sub data-dcnode-id="4027"><span data-dcnode-id="4028" instrument_node="">Pl</span></sub><span data-dcnode-id="4026" instrument_node=""> is lower than P</span><sub data-dcnode-id="4024"><span data-dcnode-id="4025" instrument_node="">aw</span></sub><span data-dcnode-id="4023" instrument_node="">.</span></p><span data-dcnode-id="4021" instrument_node="">
</span></li><span data-dcnode-id="4019" instrument_node="">
</span><li data-dcnode-id="4008"><span data-dcnode-id="4018" instrument_node="">
</span><p data-dcnode-id="4010"><span data-dcnode-id="4017" instrument_node="">An equal pressure point, where P</span><sub data-dcnode-id="4015"><span data-dcnode-id="4016" instrument_node="">Pl</span></sub><span data-dcnode-id="4014" instrument_node=""> is equal to P</span><sub data-dcnode-id="4012"><span data-dcnode-id="4013" instrument_node="">aw</span></sub><span data-dcnode-id="4011" instrument_node="">.</span></p><span data-dcnode-id="4009" instrument_node="">
</span></li><span data-dcnode-id="4007" instrument_node="">
</span><li data-dcnode-id="3996"><span data-dcnode-id="4006" instrument_node="">
</span><p data-dcnode-id="3998"><span data-dcnode-id="4005" instrument_node="">An airflow limiting segment, where P</span><sub data-dcnode-id="4003"><span data-dcnode-id="4004" instrument_node="">Pl</span></sub><span data-dcnode-id="4002" instrument_node=""> is higher than P</span><sub data-dcnode-id="4000"><span data-dcnode-id="4001" instrument_node="">aw</span></sub><span data-dcnode-id="3999" instrument_node="">.</span></p><span data-dcnode-id="3997" instrument_node="">
</span></li><span data-dcnode-id="3995" instrument_node="">
</span></ul><span data-dcnode-id="3993" instrument_node="">
</span><div class="c-article-section__figure js-c-reading-companion-figures-item" data-container-section="figure" data-dcnode-id="3969" data-test="figure" data-title="Fig. 3" id="figure-3"><figure data-dcnode-id="3970"><figcaption data-dcnode-id="3990"><b class="c-article-section__figure-caption" data-dcnode-id="3991" data-test="figure-caption-text" id="Fig3"><span data-dcnode-id="3992" instrument_node="">Fig. 3</span></b></figcaption><div class="c-article-section__figure-content" data-dcnode-id="3981"><div class="c-article-section__figure-item" data-dcnode-id="3985"><a class="c-article-section__figure-link" data-dcnode-id="3986" data-test="img-link" data-track="click" data-track-action="view figure" data-track-label="image" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//mrmjournal.biomedcentral.com/articles/10.1186/s40248-017-0084-5/figures/3" rel="nofollow"><picture data-dcnode-id="3987"><source data-dcnode-id="3989" srcset="//media.springernature.com/lw685/springer-static/image/art%3A10.1186%2Fs40248-017-0084-5/MediaObjects/40248_2017_84_Fig3_HTML.gif?as=webp" type="image/webp"><img alt="figure 3" aria-describedby="Fig3" data-dcnode-id="3988" loading="lazy" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//media.springernature.com/lw685/springer-static/image/art%253A10.1186/s40248-017-0084-5/MediaObjects/40248_2017_84_Fig3_HTML.gif&amp;raw"></picture></a></div><div class="c-article-section__figure-description" data-dcnode-id="3982" data-test="bottom-caption" id="figure-3-desc"><p data-dcnode-id="3983"><span data-dcnode-id="3984" instrument_node="">Static PVC of the lungs and chest wall. The lung and chest wall curve was plotted by the addition of the individual lung and chest wall curves</span></p></div></div><div class="u-text-right u-hide-print" data-dcnode-id="3971"><a aria-label="Full size image figure 3" class="c-article__pill-button" data-dcnode-id="3972" data-test="article-link" data-track="click" data-track-action="view figure" data-track-dest="link:Figure3 Full size image" data-track-label="button" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//mrmjournal.biomedcentral.com/articles/10.1186/s40248-017-0084-5/figures/3" rel="nofollow"><span data-dcnode-id="3979"><span data-dcnode-id="3980" instrument_node="">Full size image</span></span><svg aria-hidden="true" class="u-icon" data-dcnode-id="3973" focusable="false" height="16" role="img" width="16"><use data-dcnode-id="3974" xlink:href="#global-icon-chevron-right" xmlns:xlink="http://www.w3.org/1999/xlink"><svg data-dcnode-id="3975" id="global-icon-chevron-right" viewBox="0 0 16 16"></svg></use></svg><span data-dcnode-id="3978" instrument_node="">
</span><path d="M7.782 7L5.3 4.518c-.393-.392-.4-1.022-.02-1.403a1.001 1.001 0 011.417 0l4.176 4.177a1.001 1.001 0 010 1.416l-4.176 4.177a.991.991 0 01-1.4.016 1 1 0 01.003-1.42L7.782 9l1.013-.998z" data-dcnode-id="3977" fill-rule="evenodd"></path><span data-dcnode-id="3976" instrument_node="">
</span></a></div></figure></div><span data-dcnode-id="3968" instrument_node="">
</span><p data-dcnode-id="3936"><span data-dcnode-id="3967" instrument_node="">Development of airflow limiting segments occurs in small airways that lack cartilaginous support and explains why the lungs cannot be&nbsp;empty completely. What limits airflow upon forceful expiration was previously explained by development of choke points i.e. the points where local flow velocity equalizes the local speed of pressure wave propagation (wave speed theory) [</span><a aria-label="Reference 7" data-dcnode-id="3965" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR7" id="ref-link-section-d222060581e913" title="Dawson SV, Elliott EA. Wave-speed limitation on expiratory flow-a unifying concept. J Appl Physiol. 1977;43(3):498–515. 
                    http://www.ncbi.nlm.nih.gov/pubmed/914721
                    
                  . Accessed 24 Dec 2016."><span data-dcnode-id="3966" instrument_node="">7</span></a><span data-dcnode-id="3964" instrument_node="">, </span><a aria-label="Reference 8" data-dcnode-id="3962" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR8" id="ref-link-section-d222060581e916" title="Elliott EA, Dawson SV. Test of wave-speed theory of flow limitation in elastic tubes. J Appl Physiol. 1977;43(3):516–22. 
                    http://www.ncbi.nlm.nih.gov/pubmed/914722
                    
                  . Accessed 24 Dec 2016."><span data-dcnode-id="3963" instrument_node="">8</span></a><span data-dcnode-id="3961" instrument_node="">]. This is akin to a waterfall in which height and flow upstream the river are unlikely to affect the speed of the free falling water; nevertheless, if waterfall is broader, an extra water will be displaced. It is important to note that upon forced expiration, the increase in P</span><sub data-dcnode-id="3959"><span data-dcnode-id="3960" instrument_node="">alv</span></sub><span data-dcnode-id="3958" instrument_node=""> is accompanied by gas compression within the lung. This will result in reduction of both lung volume and P</span><sub data-dcnode-id="3956"><span data-dcnode-id="3957" instrument_node="">el</span></sub><span data-dcnode-id="3955" instrument_node="">. The decrease in P</span><sub data-dcnode-id="3953"><span data-dcnode-id="3954" instrument_node="">el</span></sub><span data-dcnode-id="3952" instrument_node=""> in turn attenuates the driving as well as the distending pressures at the choke points. This explains why the actual volume of forcefully expired air is always less than that measured with body plethysmograph. Based on the preceding narrative, it is easy to interpret why FEV</span><sub data-dcnode-id="3950"><span data-dcnode-id="3951" instrument_node="">1</span></sub><span data-dcnode-id="3949" instrument_node=""> measured with spirometer (FEV</span><sub data-dcnode-id="3947"><span data-dcnode-id="3948" instrument_node="">1-Sp</span></sub><span data-dcnode-id="3946" instrument_node="">) is typically less than that measured with body plethysmograph (FEV</span><sub data-dcnode-id="3944"><span data-dcnode-id="3945" instrument_node="">1-Pl</span></sub><span data-dcnode-id="3943" instrument_node="">) by an amount equal to thoracic gas compression volume (TGCV) [</span><a aria-label="Reference 9" data-dcnode-id="3941" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR9" id="ref-link-section-d222060581e932" title="Krowka MJ, Enright PL, Rodarte JR, Hyatt RE. Effect of Effort on Measurement of Forced Expiratory Volume in One Second. Am Rev Respir Dis. 1987;136(4):829–33."><span data-dcnode-id="3942" instrument_node="">9</span></a><span data-dcnode-id="3940" instrument_node="">–</span><a aria-label="Reference 11" data-dcnode-id="3938" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR11" id="ref-link-section-d222060581e935" title="Sharafkhaneh A, Babb TG, Officer TM, Hanania NA, Sharafkhaneh H, Boriek AM. The Confounding Effects of Thoracic Gas Compression on Measurement of Acute Bronchodilator Response. Am J Respir Crit Care Med. 2007;175(4):330–5."><span data-dcnode-id="3939" instrument_node="">11</span></a><span data-dcnode-id="3937" instrument_node="">].</span></p><p data-dcnode-id="3928"><span data-dcnode-id="3935" instrument_node="">Expiration after development of airflow limiting segments is effort independent. What remains in the lungs when small airways start to close is called the closing capacity (CC) [</span><a aria-label="Reference 12" data-dcnode-id="3933" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR12" id="ref-link-section-d222060581e942" title="Milic-Emili J, Torchio R, D’Angelo E. Closing volume: a reappraisal (1967–2007). Eur J Appl Physiol. 2007;99(6):567–83."><span data-dcnode-id="3934" instrument_node="">12</span></a><span data-dcnode-id="3932" instrument_node="">, </span><a aria-label="Reference 13" data-dcnode-id="3930" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR13" id="ref-link-section-d222060581e945" title="Leblanc P, Ruff F, Milic-Emili J. Effects of age and body position on &quot;airway closure&quot; in man. J Appl Physiol. 1970;28(4):448–51. 
                    http://www.ncbi.nlm.nih.gov/pubmed/5437433
                    
                  . Accessed 24 Dec 2016."><span data-dcnode-id="3931" instrument_node="">13</span></a><span data-dcnode-id="3929" instrument_node="">]. Alternatively, RV remains in the lung when all small airways are closed. The volume of air expired between CC and RV is called the closing volume (CV).</span></p><p data-dcnode-id="3926"><span data-dcnode-id="3927" instrument_node="">It is evident from the above description that pulmonary ventilation depends on the airways resistance offered to the airflow and expansibility (compliance) of the lungs and the thoracic cage. These two major determinants of pulmonary ventilation are crucial for understanding the pattern of change in static lung volume in different types of lung diseases.</span></p><ol class="u-list-style-none" data-dcnode-id="3915"><span data-dcnode-id="3925" instrument_node="">
</span><li data-dcnode-id="3917"><span data-dcnode-id="3924" instrument_node="">
</span><span class="u-custom-list-number" data-dcnode-id="3922"><span data-dcnode-id="3923" instrument_node="">1.</span></span><span data-dcnode-id="3921" instrument_node="">
</span><p data-dcnode-id="3919"><span data-dcnode-id="3920" instrument_node="">Airways resistance</span></p><span data-dcnode-id="3918" instrument_node="">
</span></li><span data-dcnode-id="3916" instrument_node="">
</span></ol><span data-dcnode-id="3914" instrument_node="">
</span><p data-dcnode-id="3912"><span data-dcnode-id="3913" instrument_node="">The tracheobronchial tree undergoes successive dichotomizations, where the airways become narrower but more distensible as we proceed downward. It is, therefore, difficult to apply simple laws of physics that govern fluid flow across single, non-branched, non-distensible tube system to evaluate respiratory airways resistance. For example, the lowest airways resistance resides on smallest bronchioles but not large airways. Because bronchioles are arranged in parallel, their resistances depend on the total cross sectional area of all bronchioles rather than the radius of a single bronchiole.</span></p><p data-dcnode-id="3904"><span data-dcnode-id="3911" instrument_node="">Airways resistance is inversely proportional to the lung volume. P</span><sub data-dcnode-id="3909"><span data-dcnode-id="3910" instrument_node="">Pl</span></sub><span data-dcnode-id="3908" instrument_node=""> decreases significantly upon inspiration, which enhances distension of airways especially small bronchioles. At higher lung volumes, attachments from the alveolar walls pull small airways apart and hence enhance the effect of P</span><sub data-dcnode-id="3906"><span data-dcnode-id="3907" instrument_node="">Pl</span></sub><span data-dcnode-id="3905" instrument_node=""> on decreasing airways resistance. In contrast, airways resistance increases significantly during forceful expiration due to formation of flow limiting segments.</span></p><ol class="u-list-style-none" data-dcnode-id="3893"><span data-dcnode-id="3903" instrument_node="">
</span><li data-dcnode-id="3895"><span data-dcnode-id="3902" instrument_node="">
</span><span class="u-custom-list-number" data-dcnode-id="3900"><span data-dcnode-id="3901" instrument_node="">2.</span></span><span data-dcnode-id="3899" instrument_node="">
</span><p data-dcnode-id="3897"><span data-dcnode-id="3898" instrument_node="">Compliance of the lung and the chest wall</span></p><span data-dcnode-id="3896" instrument_node="">
</span></li><span data-dcnode-id="3894" instrument_node="">
</span></ol><span data-dcnode-id="3892" instrument_node="">
</span><p data-dcnode-id="3863"><span data-dcnode-id="3891" instrument_node="">Compliance is a physical term used to predict the change in volume per unit change in the transmural pressure (P</span><sub data-dcnode-id="3889"><span data-dcnode-id="3890" instrument_node="">T</span></sub><span data-dcnode-id="3888" instrument_node="">) i.e. the pressure difference across two sides of a wall. From physiological perspective, the P</span><sub data-dcnode-id="3886"><span data-dcnode-id="3887" instrument_node="">T</span></sub><span data-dcnode-id="3885" instrument_node=""> for the lungs (trans-pulmonary pressure), chest wall (trans-chest wall pressure) and respiratory system (trans-respiratory pressure) are calculated by subtracting P</span><sub data-dcnode-id="3883"><span data-dcnode-id="3884" instrument_node="">alv</span></sub><span data-dcnode-id="3882" instrument_node=""> – P</span><sub data-dcnode-id="3880"><span data-dcnode-id="3881" instrument_node="">Pl</span></sub><span data-dcnode-id="3879" instrument_node="">, P</span><sub data-dcnode-id="3877"><span data-dcnode-id="3878" instrument_node="">Pl</span></sub><span data-dcnode-id="3876" instrument_node=""> – P</span><sub data-dcnode-id="3874"><span data-dcnode-id="3875" instrument_node="">atm</span></sub><span data-dcnode-id="3873" instrument_node=""> and P</span><sub data-dcnode-id="3871"><span data-dcnode-id="3872" instrument_node="">alv</span></sub><span data-dcnode-id="3870" instrument_node=""> – P</span><sub data-dcnode-id="3868"><span data-dcnode-id="3869" instrument_node="">atm</span></sub><span data-dcnode-id="3867" instrument_node="">, respectively. According to physics, if P</span><sub data-dcnode-id="3865"><span data-dcnode-id="3866" instrument_node="">T</span></sub><span data-dcnode-id="3864" instrument_node=""> is equal to zero then the system is resting i.e. neither inflating nor deflating.</span></p><p data-dcnode-id="3849"><span data-dcnode-id="3862" instrument_node="">Like lung volumes, the lung compliance can be measured under static and dynamic conditions. Figure&nbsp;</span><a data-dcnode-id="3860" data-track="click" data-track-action="figure anchor" data-track-label="link" href="#Fig3"><span data-dcnode-id="3861" instrument_node="">3</span></a><span data-dcnode-id="3859" instrument_node=""> shows the static pressure volume curves (PVC) of the lungs and the chest wall. The entire lung PVC in Fig.&nbsp;</span><a data-dcnode-id="3857" data-track="click" data-track-action="figure anchor" data-track-label="link" href="#Fig3"><span data-dcnode-id="3858" instrument_node="">3</span></a><span data-dcnode-id="3856" instrument_node=""> falls within the positive limb of P</span><sub data-dcnode-id="3854"><span data-dcnode-id="3855" instrument_node="">aw</span></sub><span data-dcnode-id="3853" instrument_node="">, suggesting the tendency of the lungs to collapse at any degree of pulmonary inflation. The lungs are never rested within the chest cage i.e. trans-pulmonary pressure never reaches zero. If removed outside the body then trans-pulmonary pressure can reach zero; however, the lung will not be empty completely, Fig.&nbsp;</span><a data-dcnode-id="3851" data-track="click" data-track-action="figure anchor" data-track-label="link" href="#Fig3"><span data-dcnode-id="3852" instrument_node="">3</span></a><span data-dcnode-id="3850" instrument_node="">.</span></p><p data-dcnode-id="3844"><span data-dcnode-id="3848" instrument_node="">In comparison, chest wall tends to recoil outward as far as the lung is filled with 80% of TLC or less. At lung volumes more than 80%&nbsp;of TLC, the chest wall recoils inward, Fig.&nbsp;</span><a data-dcnode-id="3846" data-track="click" data-track-action="figure anchor" data-track-label="link" href="#Fig3"><span data-dcnode-id="3847" instrument_node="">3</span></a><span data-dcnode-id="3845" instrument_node="">.</span></p><p data-dcnode-id="3833"><span data-dcnode-id="3843" instrument_node="">The lung–chest wall system is rested when P</span><sub data-dcnode-id="3841"><span data-dcnode-id="3842" instrument_node="">alv</span></sub><span data-dcnode-id="3840" instrument_node=""> is equal P</span><sub data-dcnode-id="3838"><span data-dcnode-id="3839" instrument_node="">atm</span></sub><span data-dcnode-id="3837" instrument_node=""> and the lungs are filled with FRC. At this point the inward recoil tendency of the lungs is equal to the outward recoil tendency of the chest wall, Fig.&nbsp;</span><a data-dcnode-id="3835" data-track="click" data-track-action="figure anchor" data-track-label="link" href="#Fig3"><span data-dcnode-id="3836" instrument_node="">3</span></a><span data-dcnode-id="3834" instrument_node="">.</span></p><p data-dcnode-id="3828"><span data-dcnode-id="3832" instrument_node="">The PVC of the lungs can also be recorded during breathing to evaluate dynamic lung compliance. It is evident from Fig.&nbsp;</span><a data-dcnode-id="3830" data-track="click" data-track-action="figure anchor" data-track-label="link" href="#Fig4"><span data-dcnode-id="3831" instrument_node="">4a</span></a><span data-dcnode-id="3829" instrument_node=""> that dynamic PVC for inspiration and expiration are separate and do not follow the same pathway. This phenomenon is known as hysteresis and can be explained by the variations of surface tension at alveolar air-fluid interface during inspiration and expiration. Pulmonary surfactant is a natural substance that reduces surface tension of the fluid layer lining the alveoli. During inspiration, alveolar surface tension is likely to increase because pulmonary surfactant spreads over a wider alveolar surface. The reverse occurs during expiration, where pulmonary surfactant condenses in a smaller alveolar surface. Hysteresis can also be explained by progressive opening “recruitment” and closure “derecruitment” of small airways and alveoli during inspiration and expiration respectively.</span></p><div class="c-article-section__figure js-c-reading-companion-figures-item" data-container-section="figure" data-dcnode-id="3798" data-test="figure" data-title="Fig. 4" id="figure-4"><figure data-dcnode-id="3799"><figcaption data-dcnode-id="3825"><b class="c-article-section__figure-caption" data-dcnode-id="3826" data-test="figure-caption-text" id="Fig4"><span data-dcnode-id="3827" instrument_node="">Fig. 4</span></b></figcaption><div class="c-article-section__figure-content" data-dcnode-id="3810"><div class="c-article-section__figure-item" data-dcnode-id="3820"><a class="c-article-section__figure-link" data-dcnode-id="3821" data-test="img-link" data-track="click" data-track-action="view figure" data-track-label="image" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//mrmjournal.biomedcentral.com/articles/10.1186/s40248-017-0084-5/figures/4" rel="nofollow"><picture data-dcnode-id="3822"><source data-dcnode-id="3824" srcset="//media.springernature.com/lw685/springer-static/image/art%3A10.1186%2Fs40248-017-0084-5/MediaObjects/40248_2017_84_Fig4_HTML.gif?as=webp" type="image/webp"><img alt="figure 4" aria-describedby="Fig4" data-dcnode-id="3823" loading="lazy" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//media.springernature.com/lw685/springer-static/image/art%253A10.1186/s40248-017-0084-5/MediaObjects/40248_2017_84_Fig4_HTML.gif&amp;raw"></picture></a></div><div class="c-article-section__figure-description" data-dcnode-id="3811" data-test="bottom-caption" id="figure-4-desc"><p data-dcnode-id="3812"><span data-dcnode-id="3819" instrument_node="">
</span><b data-dcnode-id="3817"><span data-dcnode-id="3818" instrument_node="">a</span></b><span data-dcnode-id="3816" instrument_node=""> Dynamic PVC of the lungs. </span><b data-dcnode-id="3814"><span data-dcnode-id="3815" instrument_node="">b</span></b><span data-dcnode-id="3813" instrument_node=""> Work of breathing</span></p></div></div><div class="u-text-right u-hide-print" data-dcnode-id="3800"><a aria-label="Full size image figure 4" class="c-article__pill-button" data-dcnode-id="3801" data-test="article-link" data-track="click" data-track-action="view figure" data-track-dest="link:Figure4 Full size image" data-track-label="button" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//mrmjournal.biomedcentral.com/articles/10.1186/s40248-017-0084-5/figures/4" rel="nofollow"><span data-dcnode-id="3808"><span data-dcnode-id="3809" instrument_node="">Full size image</span></span><svg aria-hidden="true" class="u-icon" data-dcnode-id="3802" focusable="false" height="16" role="img" width="16"><use data-dcnode-id="3803" xlink:href="#global-icon-chevron-right" xmlns:xlink="http://www.w3.org/1999/xlink"><svg data-dcnode-id="3804" id="global-icon-chevron-right" viewBox="0 0 16 16"></svg></use></svg><span data-dcnode-id="3807" instrument_node="">
</span><path d="M7.782 7L5.3 4.518c-.393-.392-.4-1.022-.02-1.403a1.001 1.001 0 011.417 0l4.176 4.177a1.001 1.001 0 010 1.416l-4.176 4.177a.991.991 0 01-1.4.016 1 1 0 01.003-1.42L7.782 9l1.013-.998z" data-dcnode-id="3806" fill-rule="evenodd"></path><span data-dcnode-id="3805" instrument_node="">
</span></a></div></figure></div><span data-dcnode-id="3797" instrument_node="">
</span><p data-dcnode-id="3789"><span data-dcnode-id="3796" instrument_node="">The work of breathing is usually estimated by the area under the dynamic PVC of the lungs (Fig.&nbsp;</span><a data-dcnode-id="3794" data-track="click" data-track-action="figure anchor" data-track-label="link" href="#Fig4"><span data-dcnode-id="3795" instrument_node="">4b</span></a><span data-dcnode-id="3793" instrument_node="">). During inspiration, the work needed to overcome elastic forces of the chest wall, lungs parenchyma and alveolar surface tension is called elastic work of breathing. In addition, a resistive work is needed during inspiration to overcome tissue and airways resistance. In contrast to inspiration, only resistive work of breathing is required during expiration. Under physiological condition the work needed for inspiration is more than that needed for expiration. The energy stored in the elastic lung structures during inspiration is partly consumed as expiratory resistive work and partly dissipated as heat (Fig.&nbsp;</span><a data-dcnode-id="3791" data-track="click" data-track-action="figure anchor" data-track-label="link" href="#Fig4"><span data-dcnode-id="3792" instrument_node="">4b</span></a><span data-dcnode-id="3790" instrument_node="">).</span></p><p data-dcnode-id="3769"><span data-dcnode-id="3788" instrument_node="">Physiologically, the diseases that affect the respiratory system are characterized by restrictive, obstructive or combined pattern of ventilatory defects [</span><a aria-label="Reference 14" data-dcnode-id="3786" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR14" id="ref-link-section-d222060581e1085" title="Mannino DM, Ford ES, Redd SC. Obstructive and restrictive lung disease and functional limitation: data from the Third National Health and Nutrition Examination. J Intern Med. 2003;254(6):540–7. 
                    http://www.ncbi.nlm.nih.gov/pubmed/14641794
                    
                  . Accessed 19 Oct 2016."><span data-dcnode-id="3787" instrument_node="">14</span></a><span data-dcnode-id="3785" instrument_node="">, </span><a aria-label="Reference 15" data-dcnode-id="3783" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR15" id="ref-link-section-d222060581e1088" title="Arabalibeik H, Khomami MH, Agin K, Setayeshi S. Classification of restrictive and obstructive pulmonary diseases using spirometry data. Stud Health Technol Inform. 2009;142:25–7. 
                    http://www.ncbi.nlm.nih.gov/pubmed/19377105
                    
                  . Accessed 19 Oct 2016."><span data-dcnode-id="3784" instrument_node="">15</span></a><span data-dcnode-id="3782" instrument_node="">]. Restrictive lung diseases (RLD) are associated with decreased compliance of the lungs, chest wall or both. This results in rightward shift of static PVC of the lungs, chest wall or both [</span><a aria-label="Reference 15" data-dcnode-id="3780" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR15" id="ref-link-section-d222060581e1091" title="Arabalibeik H, Khomami MH, Agin K, Setayeshi S. Classification of restrictive and obstructive pulmonary diseases using spirometry data. Stud Health Technol Inform. 2009;142:25–7. 
                    http://www.ncbi.nlm.nih.gov/pubmed/19377105
                    
                  . Accessed 19 Oct 2016."><span data-dcnode-id="3781" instrument_node="">15</span></a><span data-dcnode-id="3779" instrument_node="">]. It is evident from Fig.&nbsp;</span><a data-dcnode-id="3777" data-track="click" data-track-action="figure anchor" data-track-label="link" href="#Fig5"><span data-dcnode-id="3778" instrument_node="">5</span></a><span data-dcnode-id="3776" instrument_node=""> (a and b) that decreased compliance of the lungs increases P</span><sub data-dcnode-id="3774"><span data-dcnode-id="3775" instrument_node="">Pl</span></sub><span data-dcnode-id="3773" instrument_node=""> needed for tidal inspiration, yet tidal volume is below the expected average. In RLD, the rightward shift of dynamic lung compliance curves increases the elastic work of breathing required for inspiration, which is usually compensated by rapid shallow breathing [</span><a aria-label="Reference 16" data-dcnode-id="3771" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR16" id="ref-link-section-d222060581e1100" title="Javaheri S, Sicilian L. Lung function, breathing pattern, and gas exchange in interstitial lung disease. Thorax. 1992;47(2):93–7. 
                    http://www.ncbi.nlm.nih.gov/pubmed/1549829
                    
                  . Accessed 19 Oct 2016."><span data-dcnode-id="3772" instrument_node="">16</span></a><span data-dcnode-id="3770" instrument_node="">]. Causes of RLD may be intrinsic or extrinsic to the lung parenchyma. Examples of intrinsic causes are interstitial lung diseases, pneumonia and surfactant deficiency e.g. acute respiratory distress syndrome. Alternatively, respiratory muscles weakness, chest deformities, cardiomegaly, hemothorax, pneumothorax, empyema, pleural effusion or thickening are examples of extrinsic causes.</span></p><div class="c-article-section__figure js-c-reading-companion-figures-item" data-container-section="figure" data-dcnode-id="3736" data-test="figure" data-title="Fig. 5" id="figure-5"><figure data-dcnode-id="3737"><figcaption data-dcnode-id="3766"><b class="c-article-section__figure-caption" data-dcnode-id="3767" data-test="figure-caption-text" id="Fig5"><span data-dcnode-id="3768" instrument_node="">Fig. 5</span></b></figcaption><div class="c-article-section__figure-content" data-dcnode-id="3748"><div class="c-article-section__figure-item" data-dcnode-id="3761"><a class="c-article-section__figure-link" data-dcnode-id="3762" data-test="img-link" data-track="click" data-track-action="view figure" data-track-label="image" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//mrmjournal.biomedcentral.com/articles/10.1186/s40248-017-0084-5/figures/5" rel="nofollow"><picture data-dcnode-id="3763"><source data-dcnode-id="3765" srcset="//media.springernature.com/lw685/springer-static/image/art%3A10.1186%2Fs40248-017-0084-5/MediaObjects/40248_2017_84_Fig5_HTML.gif?as=webp" type="image/webp"><img alt="figure 5" aria-describedby="Fig5" data-dcnode-id="3764" loading="lazy" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//media.springernature.com/lw685/springer-static/image/art%253A10.1186/s40248-017-0084-5/MediaObjects/40248_2017_84_Fig5_HTML.gif&amp;raw"></picture></a></div><div class="c-article-section__figure-description" data-dcnode-id="3749" data-test="bottom-caption" id="figure-5-desc"><p data-dcnode-id="3750"><span data-dcnode-id="3760" instrument_node="">Work of breathing in &nbsp;normal subjects (</span><b data-dcnode-id="3758"><span data-dcnode-id="3759" instrument_node="">a</span></b><span data-dcnode-id="3757" instrument_node="">) and patients with RLD (</span><b data-dcnode-id="3755"><span data-dcnode-id="3756" instrument_node="">b</span></b><span data-dcnode-id="3754" instrument_node="">) and OLD&nbsp;(</span><b data-dcnode-id="3752"><span data-dcnode-id="3753" instrument_node="">c</span></b><span data-dcnode-id="3751" instrument_node="">)</span></p></div></div><div class="u-text-right u-hide-print" data-dcnode-id="3738"><a aria-label="Full size image figure 5" class="c-article__pill-button" data-dcnode-id="3739" data-test="article-link" data-track="click" data-track-action="view figure" data-track-dest="link:Figure5 Full size image" data-track-label="button" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//mrmjournal.biomedcentral.com/articles/10.1186/s40248-017-0084-5/figures/5" rel="nofollow"><span data-dcnode-id="3746"><span data-dcnode-id="3747" instrument_node="">Full size image</span></span><svg aria-hidden="true" class="u-icon" data-dcnode-id="3740" focusable="false" height="16" role="img" width="16"><use data-dcnode-id="3741" xlink:href="#global-icon-chevron-right" xmlns:xlink="http://www.w3.org/1999/xlink"><svg data-dcnode-id="3742" id="global-icon-chevron-right" viewBox="0 0 16 16"></svg></use></svg><span data-dcnode-id="3745" instrument_node="">
</span><path d="M7.782 7L5.3 4.518c-.393-.392-.4-1.022-.02-1.403a1.001 1.001 0 011.417 0l4.176 4.177a1.001 1.001 0 010 1.416l-4.176 4.177a.991.991 0 01-1.4.016 1 1 0 01.003-1.42L7.782 9l1.013-.998z" data-dcnode-id="3744" fill-rule="evenodd"></path><span data-dcnode-id="3743" instrument_node="">
</span></a></div></figure></div><span data-dcnode-id="3735" instrument_node="">
</span><p data-dcnode-id="3724"><span data-dcnode-id="3734" instrument_node="">In obstructive lung diseases (OLD), the pulmonary compliance is normal or increased especially if emphysematous lung changes co-exist. No extra-negative P</span><sub data-dcnode-id="3732"><span data-dcnode-id="3733" instrument_node="">Pl</span></sub><span data-dcnode-id="3731" instrument_node=""> is needed as dynamic lung compliance curves are either not displaced or shifted leftward if emphysematous lung changes developed (Fig.&nbsp;</span><a data-dcnode-id="3729" data-track="click" data-track-action="figure anchor" data-track-label="link" href="#Fig5"><span data-dcnode-id="3730" instrument_node="">5c</span></a><span data-dcnode-id="3728" instrument_node="">). The main defect in OLD is increased airways resistance, especially during expiration. Normally, expiration is a passive process as the energy needed to overcome expiratory resistive work of breathing is stored in the elastic fibers of the lung during inspiration. It is evident from Fig.&nbsp;</span><a data-dcnode-id="3726" data-track="click" data-track-action="figure anchor" data-track-label="link" href="#Fig5"><span data-dcnode-id="3727" instrument_node="">5c</span></a><span data-dcnode-id="3725" instrument_node=""> that expiration is not completely passive if OLD exists as an extra-work is needed during expiration, which is usually performed with the aid of expiratory muscles. Famous examples of obstructive pulmonary diseases include bronchial asthma, emphysema, chronic bronchitis and bronchiectasis.</span></p></div></div></section><section data-dcnode-id="3556" data-title="Physiological determinant of the static lung volumes&nbsp;and capacities "><div class="c-article-section" data-dcnode-id="3557" id="Sec3-section"><h2 class="c-article-section__title js-section-title js-c-reading-companion-sections-item" data-dcnode-id="3719" id="Sec3"><span data-dcnode-id="3720" instrument_node="">Physiological determinant of the static lung volumes&nbsp;and capacities </span></h2><div class="c-article-section__content" data-dcnode-id="3558" id="Sec3-content"><h3 class="c-article__sub-heading" data-dcnode-id="3717" id="Sec4"><span data-dcnode-id="3718" instrument_node="">Age</span></h3><p data-dcnode-id="3676"><span data-dcnode-id="3716" instrument_node="">The lung volumes increase steadily from birth to adulthood. The lungs mature at the age of 20–25 years, yet only minimal changes occur in the lung volumes over the following 10&nbsp;years [</span><a aria-label="Reference 17" data-dcnode-id="3714" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR17" id="ref-link-section-d222060581e1154" title="Sharma G, Goodwin J. Effect of aging on respiratory system physiology and immunology. Clin Interv Aging. 2006;1(3):253–60. 
                    http://www.ncbi.nlm.nih.gov/pubmed/18046878
                    
                  . Accessed 16 Oct 2016."><span data-dcnode-id="3715" instrument_node="">17</span></a><span data-dcnode-id="3713" instrument_node="">]. After 35&nbsp;years, aging is associated with gradual changes in the lung volumes and other pulmonary functions [</span><a aria-label="Reference 18" data-dcnode-id="3711" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR18" id="ref-link-section-d222060581e1157" title="Zeleznik J. Normative aging of the respiratory system. Clin Geriatr Med. 2003;19(1):1–18. 
                    http://www.ncbi.nlm.nih.gov/pubmed/12735112
                    
                  . Accessed 16 Oct 2016."><span data-dcnode-id="3712" instrument_node="">18</span></a><span data-dcnode-id="3710" instrument_node="">]. These changes include enhanced static lung compliance due to diminished alveolar elastic recoil and depressed chest wall compliance due to stiffening and increased outward recoil of the thoracic cage [</span><a aria-label="Reference 19" data-dcnode-id="3708" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR19" id="ref-link-section-d222060581e1160" title="Mittman C, Edelman NH, Norris AH, Shock NW. Relationship between chest wall and pulmonary compliance and age. J Appl Physiol. 1965;20(6):1211–6. 
                    http://jap.physiology.org/content/20/6/1211
                    
                  . Accessed 16 Oct 2016."><span data-dcnode-id="3709" instrument_node="">19</span></a><span data-dcnode-id="3707" instrument_node="">, </span><a aria-label="Reference 20" data-dcnode-id="3705" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR20" id="ref-link-section-d222060581e1163" title="Janssens JP, Pache JC, Nicod LP. Physiological changes in respiratory function associated with ageing. Eur Respir J. 1999;13(1):197–205. 
                    http://www.ncbi.nlm.nih.gov/pubmed/10836348
                    
                  . Accessed 16 Oct 2016."><span data-dcnode-id="3706" instrument_node="">20</span></a><span data-dcnode-id="3704" instrument_node="">]. As a result of these changes in the lung and chest wall compliances, the inward recoil of the lung balances the outward recoil of the chest at higher FRC as age progress [</span><a aria-label="Reference 12" data-dcnode-id="3702" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR12" id="ref-link-section-d222060581e1166" title="Milic-Emili J, Torchio R, D’Angelo E. Closing volume: a reappraisal (1967–2007). Eur J Appl Physiol. 2007;99(6):567–83."><span data-dcnode-id="3703" instrument_node="">12</span></a><span data-dcnode-id="3701" instrument_node="">, </span><a aria-label="Reference 13" data-dcnode-id="3699" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR13" id="ref-link-section-d222060581e1170" title="Leblanc P, Ruff F, Milic-Emili J. Effects of age and body position on &quot;airway closure&quot; in man. J Appl Physiol. 1970;28(4):448–51. 
                    http://www.ncbi.nlm.nih.gov/pubmed/5437433
                    
                  . Accessed 24 Dec 2016."><span data-dcnode-id="3700" instrument_node="">13</span></a><span data-dcnode-id="3698" instrument_node="">]. These variations in lung and chest wall compliances act synergistically to cause early closure of small airways upon forced expiration and hence explain increased RV in elder people [</span><a aria-label="Reference 19" data-dcnode-id="3696" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR19" id="ref-link-section-d222060581e1173" title="Mittman C, Edelman NH, Norris AH, Shock NW. Relationship between chest wall and pulmonary compliance and age. J Appl Physiol. 1965;20(6):1211–6. 
                    http://jap.physiology.org/content/20/6/1211
                    
                  . Accessed 16 Oct 2016."><span data-dcnode-id="3697" instrument_node="">19</span></a><span data-dcnode-id="3695" instrument_node="">]. As shown in Fig.&nbsp;</span><a data-dcnode-id="3693" data-track="click" data-track-action="figure anchor" data-track-label="link" href="#Fig6"><span data-dcnode-id="3694" instrument_node="">6</span></a><span data-dcnode-id="3692" instrument_node="">, TLC corrected for age remains almost constant throughout life. However, gradual increase in FRC and RV with age results in simultaneous decrease in IC and VC, respectively [</span><a aria-label="Reference 17" data-dcnode-id="3690" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR17" id="ref-link-section-d222060581e1179" title="Sharma G, Goodwin J. Effect of aging on respiratory system physiology and immunology. Clin Interv Aging. 2006;1(3):253–60. 
                    http://www.ncbi.nlm.nih.gov/pubmed/18046878
                    
                  . Accessed 16 Oct 2016."><span data-dcnode-id="3691" instrument_node="">17</span></a><span data-dcnode-id="3689" instrument_node="">]. It is also apparent from Fig.&nbsp;</span><a data-dcnode-id="3687" data-track="click" data-track-action="figure anchor" data-track-label="link" href="#Fig6"><span data-dcnode-id="3688" instrument_node="">6</span></a><span data-dcnode-id="3686" instrument_node=""> that the increase in CC when age advances is more compared with FRC. This results in a reduction of the difference between these two capacities i.e. D (FRC ─ CC) as age progress. In the sitting position, CC is likely to exceed FRC at an age of 75&nbsp;years or more [</span><a aria-label="Reference 12" data-dcnode-id="3684" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR12" id="ref-link-section-d222060581e1185" title="Milic-Emili J, Torchio R, D’Angelo E. Closing volume: a reappraisal (1967–2007). Eur J Appl Physiol. 2007;99(6):567–83."><span data-dcnode-id="3685" instrument_node="">12</span></a><span data-dcnode-id="3683" instrument_node="">] (Fig.&nbsp;</span><a data-dcnode-id="3681" data-track="click" data-track-action="figure anchor" data-track-label="link" href="#Fig6"><span data-dcnode-id="3682" instrument_node="">6</span></a><span data-dcnode-id="3680" instrument_node="">), but much earlier in the supine position (≈44&nbsp;years) [</span><a aria-label="Reference 13" data-dcnode-id="3678" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR13" id="ref-link-section-d222060581e1192" title="Leblanc P, Ruff F, Milic-Emili J. Effects of age and body position on &quot;airway closure&quot; in man. J Appl Physiol. 1970;28(4):448–51. 
                    http://www.ncbi.nlm.nih.gov/pubmed/5437433
                    
                  . Accessed 24 Dec 2016."><span data-dcnode-id="3679" instrument_node="">13</span></a><span data-dcnode-id="3677" instrument_node="">].</span></p><div class="c-article-section__figure js-c-reading-companion-figures-item" data-container-section="figure" data-dcnode-id="3652" data-test="figure" data-title="Fig. 6" id="figure-6"><figure data-dcnode-id="3653"><figcaption data-dcnode-id="3673"><b class="c-article-section__figure-caption" data-dcnode-id="3674" data-test="figure-caption-text" id="Fig6"><span data-dcnode-id="3675" instrument_node="">Fig. 6</span></b></figcaption><div class="c-article-section__figure-content" data-dcnode-id="3664"><div class="c-article-section__figure-item" data-dcnode-id="3668"><a class="c-article-section__figure-link" data-dcnode-id="3669" data-test="img-link" data-track="click" data-track-action="view figure" data-track-label="image" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//mrmjournal.biomedcentral.com/articles/10.1186/s40248-017-0084-5/figures/6" rel="nofollow"><picture data-dcnode-id="3670"><source data-dcnode-id="3672" srcset="//media.springernature.com/lw685/springer-static/image/art%3A10.1186%2Fs40248-017-0084-5/MediaObjects/40248_2017_84_Fig6_HTML.gif?as=webp" type="image/webp"><img alt="figure 6" aria-describedby="Fig6" data-dcnode-id="3671" loading="lazy" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//media.springernature.com/lw685/springer-static/image/art%253A10.1186/s40248-017-0084-5/MediaObjects/40248_2017_84_Fig6_HTML.gif&amp;raw"></picture></a></div><div class="c-article-section__figure-description" data-dcnode-id="3665" data-test="bottom-caption" id="figure-6-desc"><p data-dcnode-id="3666"><span data-dcnode-id="3667" instrument_node="">Changes in static lung volume&nbsp;and capacities with age</span></p></div></div><div class="u-text-right u-hide-print" data-dcnode-id="3654"><a aria-label="Full size image figure 6" class="c-article__pill-button" data-dcnode-id="3655" data-test="article-link" data-track="click" data-track-action="view figure" data-track-dest="link:Figure6 Full size image" data-track-label="button" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//mrmjournal.biomedcentral.com/articles/10.1186/s40248-017-0084-5/figures/6" rel="nofollow"><span data-dcnode-id="3662"><span data-dcnode-id="3663" instrument_node="">Full size image</span></span><svg aria-hidden="true" class="u-icon" data-dcnode-id="3656" focusable="false" height="16" role="img" width="16"><use data-dcnode-id="3657" xlink:href="#global-icon-chevron-right" xmlns:xlink="http://www.w3.org/1999/xlink"><svg data-dcnode-id="3658" id="global-icon-chevron-right" viewBox="0 0 16 16"></svg></use></svg><span data-dcnode-id="3661" instrument_node="">
</span><path d="M7.782 7L5.3 4.518c-.393-.392-.4-1.022-.02-1.403a1.001 1.001 0 011.417 0l4.176 4.177a1.001 1.001 0 010 1.416l-4.176 4.177a.991.991 0 01-1.4.016 1 1 0 01.003-1.42L7.782 9l1.013-.998z" data-dcnode-id="3660" fill-rule="evenodd"></path><span data-dcnode-id="3659" instrument_node="">
</span></a></div></figure></div><span data-dcnode-id="3651" instrument_node="">
</span><h3 class="c-article__sub-heading" data-dcnode-id="3649" id="Sec5"><span data-dcnode-id="3650" instrument_node="">Gender</span></h3><p data-dcnode-id="3638"><span data-dcnode-id="3648" instrument_node="">Standard morphometric methods confirmed that males had larger lung size, more respiratory bronchioles and wider airways diameters compared with females with the same age and stature [</span><a aria-label="Reference 21" data-dcnode-id="3646" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR21" id="ref-link-section-d222060581e1221" title="Martin TR, Castile RG, Fredberg JJ, Wohl ME, Mead J. Airway size is related to sex but not lung size in normal adults. J Appl Physiol. 1987;63(5):2042–7. 
                    http://www.ncbi.nlm.nih.gov/pubmed/3693235
                    
                  . Accessed 16 Oct 2016."><span data-dcnode-id="3647" instrument_node="">21</span></a><span data-dcnode-id="3645" instrument_node="">, </span><a aria-label="Reference 22" data-dcnode-id="3643" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR22" id="ref-link-section-d222060581e1224" title="Thurlbeck WM. Postnatal human lung growth. Thorax. 1982;37(8):564–71. 
                    http://www.ncbi.nlm.nih.gov/pubmed/7179184
                    
                  . Accessed 16 Oct 2016."><span data-dcnode-id="3644" instrument_node="">22</span></a><span data-dcnode-id="3642" instrument_node="">]. These anatomical lung differences between males and females explain the gender variations in static lung volumes and capacities. Males tend to have larger anthropometric measurements and are, therefore, more likely to have increased static lung volumes and capacities [</span><a aria-label="Reference 23" data-dcnode-id="3640" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR23" id="ref-link-section-d222060581e1227" title="Carey MA, Card JW, Voltz JW, Germolec DR, Korach KS, Zeldin DC. The impact of sex and sex hormones on lung physiology and disease: lessons from animal studies. Am J Physiol Lung Cell Mol Physiol. 2007;293(2):L272–8.&nbsp;"><span data-dcnode-id="3641" instrument_node="">23</span></a><span data-dcnode-id="3639" instrument_node="">].</span></p><h3 class="c-article__sub-heading" data-dcnode-id="3636" id="Sec6"><span data-dcnode-id="3637" instrument_node="">Anthropometric measurements</span></h3><p data-dcnode-id="3610"><span data-dcnode-id="3635" instrument_node="">Tall stature is typically associated with higher static lung volumes and capacities [</span><a aria-label="Reference 24" data-dcnode-id="3633" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR24" id="ref-link-section-d222060581e1238" title="Bhatti U, Rani K, Memon MQ. Variation in lung volumes and capacities among young males in relation to height. J Ayub Med Coll Abbottabad. 26(2):200–2. 
                    http://www.ncbi.nlm.nih.gov/pubmed/25603677
                    
                  . Accessed 16 Oct 2016."><span data-dcnode-id="3634" instrument_node="">24</span></a><span data-dcnode-id="3632" instrument_node="">]. Increased body weight is associated with lower lung volumes in obese subjects [</span><a aria-label="Reference 25" data-dcnode-id="3630" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR25" id="ref-link-section-d222060581e1241" title="Littleton SW. Impact of obesity on respiratory function. Respirology. 2012;17(1):43–9."><span data-dcnode-id="3631" instrument_node="">25</span></a><span data-dcnode-id="3629" instrument_node="">]. Central obesity preferentially depresses chest wall compliance leading to marked decrease in FRC and ERV [</span><a aria-label="Reference 26" data-dcnode-id="3627" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR26" id="ref-link-section-d222060581e1244" title="Jones RL, Nzekwu M-MU. The effects of body mass index on lung volumes. Chest. 2006;130(3):827–33."><span data-dcnode-id="3628" instrument_node="">26</span></a><span data-dcnode-id="3626" instrument_node="">]. Waist-to-hip ratio could be a better predictor for fat distribution than BMI [</span><a aria-label="Reference 27" data-dcnode-id="3624" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR27" id="ref-link-section-d222060581e1247" title="Zavorsky GS, Murias JM, Kim DJ, Gow J, Sylvestre J-L, Christou NV. Waist-to-Hip Ratio Is Associated With Pulmonary Gas Exchange in the Morbidly Obese. Chest. 2007;131(2):362–7.&nbsp;"><span data-dcnode-id="3625" instrument_node="">27</span></a><span data-dcnode-id="3623" instrument_node="">]. However, the effects of obesity on the highest (TLC) and lowest (RV) lung volumes are modest [</span><a aria-label="Reference 28" data-dcnode-id="3621" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR28" id="ref-link-section-d222060581e1250" title="Mehari A, Afreen S, Ngwa J, Setse R, Thomas AN, Poddar V, et al. Obesity and Pulmonary Function in African Americans. PLoS One. 2015;10(10):e0140610."><span data-dcnode-id="3622" instrument_node="">28</span></a><span data-dcnode-id="3620" instrument_node="">]. In athletes, repeated muscular exercise increases muscle mass and consequently body weight. In such condition, the static lung volumes and capacities are expected to increase with weight [</span><a aria-label="Reference 29" data-dcnode-id="3618" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR29" id="ref-link-section-d222060581e1254" title="Myrianthefs P, Grammatopoulou I, Katsoulas T, Baltopoulos G. Spirometry may underestimate airway obstruction in professional Greek athletes. Clin Respir J. 2014;8(2):240–7."><span data-dcnode-id="3619" instrument_node="">29</span></a><span data-dcnode-id="3617" instrument_node="">–</span><a aria-label="Reference 32" data-dcnode-id="3615" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR32" id="ref-link-section-d222060581e1257" title="Rong C, Bei H, Yun M, Yuzhu W, Mingwu Z. Lung function and cytokine levels in professional athletes. J Asthma. 2008;45(4):343–8."><span data-dcnode-id="3616" instrument_node="">32</span></a><span data-dcnode-id="3614" instrument_node="">]. Increased total body fat content, therefore, seems better than high BMI as an indicator of obesity as well as predictor for decreased static lung volumes and capacities [</span><a aria-label="Reference 33" data-dcnode-id="3612" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR33" id="ref-link-section-d222060581e1260" title="Kamal R, Kesavachandran CN, Bihari V, Sathian B, Srivastava AK. Alterations in Lung Functions Based on BMI and Body Fat % Among Obese Indian Population at National Capital Region. Nepal J Epidemiol. 2015;5(2):470–9."><span data-dcnode-id="3613" instrument_node="">33</span></a><span data-dcnode-id="3611" instrument_node="">].</span></p><h3 class="c-article__sub-heading" data-dcnode-id="3608" id="Sec7"><span data-dcnode-id="3609" instrument_node="">Ethnicity</span></h3><p data-dcnode-id="3591"><span data-dcnode-id="3607" instrument_node="">Previous studies demonstrated ethnic differences in the lung volumes/capacities [</span><a aria-label="Reference 34" data-dcnode-id="3605" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR34" id="ref-link-section-d222060581e1271" title="Piirilä P, Seikkula T, Välimäki P. Differences between Finnish and European reference values for pulmonary diffusing capacity. Int J Circumpolar Health. 2007;66(5):449–57. 
                    http://www.ncbi.nlm.nih.gov/pubmed/18274210
                    
                  . Accessed 16 Oct 2016."><span data-dcnode-id="3606" instrument_node="">34</span></a><span data-dcnode-id="3604" instrument_node="">, </span><a aria-label="Reference 35" data-dcnode-id="3602" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR35" id="ref-link-section-d222060581e1274" title="Korotzer B, Ong S, Hansen JE. Ethnic differences in pulmonary function in healthy nonsmoking Asian-Americans and European-Americans. Am J Respir Crit Care Med. 2000;161(4 Pt 1):1101–8."><span data-dcnode-id="3603" instrument_node="">35</span></a><span data-dcnode-id="3601" instrument_node="">]. Such variations were largely attributed to anthropometric differences between different ethnic groups. For example, white Americans of European descent have larger trunk/leg ratio, and consequently higher lung volumes, compared with black Americans of African descent [</span><a aria-label="Reference 36" data-dcnode-id="3599" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR36" id="ref-link-section-d222060581e1277" title="Rossiter CE, Weill H. Ethnic differences in lung function: evidence for proportional differences. Int J Epidemiol. 1974;3(1):55–61. 
                    http://www.ncbi.nlm.nih.gov/pubmed/4838716
