                  . Accessed 16 Oct 2016."><span data-dcnode-id="3600" instrument_node="">36</span></a><span data-dcnode-id="3598" instrument_node="">]. Other studies failed to justify ethnic differences in lung volumes by the variations in chest contours and suggest differences in inspiratory muscle strength and/or lung compliance as alternative explanation(s) [</span><a aria-label="Reference 37" data-dcnode-id="3596" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR37" id="ref-link-section-d222060581e1280" title="Whittaker AL, Sutton AJ, Beardsmore CS. Are ethnic differences in lung function explained by chest size? Arch Dis Child Fetal Neonatal Ed. 2005;90(5):F423–8."><span data-dcnode-id="3597" instrument_node="">37</span></a><span data-dcnode-id="3595" instrument_node="">]. Recently, GLI (Global Lung Initiative) offered spirometric prediction equations, that also considered ethnic differences, to be used worldwide [</span><a aria-label="Reference 38" data-dcnode-id="3593" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR38" id="ref-link-section-d222060581e1283" title="Quanjer PH, Stanojevic S, Cole TJ, Baur X, Hall GL, Culver BH, et al. Multi-ethnic reference values for spirometry for the 3–95-yr age range: the global lung function 2012 equations. Eur Respir J. 2012;40(6):1324–43.&nbsp;"><span data-dcnode-id="3594" instrument_node="">38</span></a><span data-dcnode-id="3592" instrument_node="">].</span></p><h3 class="c-article__sub-heading" data-dcnode-id="3589" id="Sec8"><span data-dcnode-id="3590" instrument_node="">Other factors</span></h3><p data-dcnode-id="3587"><span data-dcnode-id="3588" instrument_node="">Although age, gender, weight, height and ethnicity are the main physiological determinants of the static lung volumes/capacities, other factors should be considered while interpreting results of spirometry.</span></p><p data-dcnode-id="3573"><span data-dcnode-id="3586" instrument_node="">Lung volumes correlate well with the level of physical activity [</span><a aria-label="Reference 39" data-dcnode-id="3584" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR39" id="ref-link-section-d222060581e1298" title="Nystad W, Samuelsen SO, Nafstad P, Langhammer A. Association between level of physical activity and lung function among Norwegian men and women: the HUNT study. Int J Tuberc Lung Dis. 2006;10(12):1399–405. 
                    http://www.ncbi.nlm.nih.gov/pubmed/17167959
                    
                  . Accessed 16 Oct 2016."><span data-dcnode-id="3585" instrument_node="">39</span></a><span data-dcnode-id="3583" instrument_node="">], regular exercise, especially swimming and endurance training [</span><a aria-label="Reference 32" data-dcnode-id="3581" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR32" id="ref-link-section-d222060581e1301" title="Rong C, Bei H, Yun M, Yuzhu W, Mingwu Z. Lung function and cytokine levels in professional athletes. J Asthma. 2008;45(4):343–8."><span data-dcnode-id="3582" instrument_node="">32</span></a><span data-dcnode-id="3580" instrument_node="">]. Alternatively, ascending to high altitude may decrease lung volumes probably due to increased pulmonary blood flow, pulmonary edema or premature small airways closure [</span><a aria-label="Reference 40" data-dcnode-id="3578" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR40" id="ref-link-section-d222060581e1304" title="Pollard AJ, Mason NP, Barry PW, Pollard RC, Collier DJ, Fraser RS, et al. Effect of altitude on spirometric parameters and the performance of peak flow meters. Thorax. 1996;51(2):175–8. 
                    http://www.ncbi.nlm.nih.gov/pubmed/8711651
                    
                  . Accessed 16 Oct 2016."><span data-dcnode-id="3579" instrument_node="">40</span></a><span data-dcnode-id="3577" instrument_node="">]. Alterations in lung volumes associated with high altitude are usually temporal and resolve after returning to the sea level [</span><a aria-label="Reference 41" data-dcnode-id="3575" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR41" id="ref-link-section-d222060581e1307" title="Cogo A, Legnani D, Allegra L. Respiratory function at different altitudes. Respiration. 1997;64(6):416–21. 
                    http://www.ncbi.nlm.nih.gov/pubmed/9383816
                    
                  . Accessed 16 Oct 2016."><span data-dcnode-id="3576" instrument_node="">41</span></a><span data-dcnode-id="3574" instrument_node="">].</span></p><p data-dcnode-id="3559"><span data-dcnode-id="3572" instrument_node="">The position of the subject is important while measuring lung volumes and capacities [</span><a aria-label="Reference 42" data-dcnode-id="3570" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR42" id="ref-link-section-d222060581e1313" title="Melam GR, Buragadda S, Alhusaini A, Alghamdi MA, Alghamdi MS, Kaushal P. Effect of Different Positions on FVC and FEV1 Measurements of Asthmatic Patients. J Phys Ther Sci. 2014;26(4):591–3."><span data-dcnode-id="3571" instrument_node="">42</span></a><span data-dcnode-id="3569" instrument_node="">]. Compared with the standing position, the effect of gravity on abdominal viscera is less at sitting position and least if lying supine [</span><a aria-label="Reference 43" data-dcnode-id="3567" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR43" id="ref-link-section-d222060581e1316" title="Kera T, Maruyama H. The effect of posture on respiratory activity of the abdominal muscles. J Physiol Anthropol Appl Human Sci. 2005;24(4):259–65. 
                    http://www.ncbi.nlm.nih.gov/pubmed/16079565
                    
                  . Accessed 16 Oct 2016."><span data-dcnode-id="3568" instrument_node="">43</span></a><span data-dcnode-id="3566" instrument_node="">]. The supine position, therefore, compromises diaphragmatic movement and chest wall recoil during breathing. FRC and ERV are higher upon standing compared with sitting and supine positions [</span><a aria-label="Reference 44" data-dcnode-id="3564" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR44" id="ref-link-section-d222060581e1319" title="Nielsen KG, Holte K, Kehlet H. Effects of posture on postoperative pulmonary function. Acta Anaesthesiol Scand. 2003;47(10):1270–5. 
                    http://www.ncbi.nlm.nih.gov/pubmed/14616326
                    
                  . Accessed 16 Oct 2016."><span data-dcnode-id="3565" instrument_node="">44</span></a><span data-dcnode-id="3563" instrument_node="">]. Increased intra-abdominal pressure during pregnancy also causes decreased FRC and ERV [</span><a aria-label="Reference 45" data-dcnode-id="3561" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR45" id="ref-link-section-d222060581e1322" title="LoMauro A, Aliverti A. Respiratory physiology of pregnancy: Physiology masterclass. Breathe (Sheff). 2015;11(4):297–301.&nbsp;"><span data-dcnode-id="3562" instrument_node="">45</span></a><span data-dcnode-id="3560" instrument_node="">].</span></p></div></div></section><section data-dcnode-id="3529" data-title="Interpretation of static lung volumes and capacities"><div class="c-article-section" data-dcnode-id="3530" id="Sec9-section"><h2 class="c-article-section__title js-section-title js-c-reading-companion-sections-item" data-dcnode-id="3554" id="Sec9"><span data-dcnode-id="3555" instrument_node="">Interpretation of static lung volumes and capacities</span></h2><div class="c-article-section__content" data-dcnode-id="3531" id="Sec9-content"><p data-dcnode-id="3543"><span data-dcnode-id="3553" instrument_node="">The quality and accuracy of the test(s) used for estimation of the lung volumes/capacities should be ensured before interpretation [</span><a aria-label="Reference 46" data-dcnode-id="3551" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR46" id="ref-link-section-d222060581e1334" title="Pellegrino R, Viegi G, Brusasco V, Crapo RO, Burgos F, Casaburi R, et al. Interpretative strategies for lung function tests. Eur Respir J. 2005;26(5):948–68.&nbsp;"><span data-dcnode-id="3552" instrument_node="">46</span></a><span data-dcnode-id="3550" instrument_node="">]. The measurement&nbsp;of the lung volumes is not an easy task and requires cooperative patients and qualified technicians. Personnel in the pulmonary laboratory must be able to judge precisely test acceptability and reproducibility criteria for the different techniques used for estimation of the lung volumes/capacities [</span><a aria-label="Reference 46" data-dcnode-id="3548" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR46" id="ref-link-section-d222060581e1337" title="Pellegrino R, Viegi G, Brusasco V, Crapo RO, Burgos F, Casaburi R, et al. Interpretative strategies for lung function tests. Eur Respir J. 2005;26(5):948–68.&nbsp;"><span data-dcnode-id="3549" instrument_node="">46</span></a><span data-dcnode-id="3547" instrument_node="">]. Special attention should be given to the accuracy of the method used for estimation of the static lung volumes&nbsp;and capacities. Plethysmography was claimed to overestimate while dilutional techniques may underestimate the true measurements of the lung volumes&nbsp;and capacities [</span><a aria-label="Reference 5" data-dcnode-id="3545" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR5" id="ref-link-section-d222060581e1340" title="Sue DY. Measurement of lung volumes in patients with obstructive lung disease. A matter of time (constants). Ann Am Thorac Soc. 2013;10(5):525–30."><span data-dcnode-id="3546" instrument_node="">5</span></a><span data-dcnode-id="3544" instrument_node="">].</span></p><p data-dcnode-id="3532"><span data-dcnode-id="3542" instrument_node="">The normal lung volumes and capacities can be predicted based on gender, age, weight, height and ethnicity of the subject [</span><a aria-label="Reference 47" data-dcnode-id="3540" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR47" id="ref-link-section-d222060581e1346" title="Degens P, Merget R. Reference values for spirometry of the European Coal and Steel Community: time for change. Eur Respir J. 2008;31(3):687-8-9."><span data-dcnode-id="3541" instrument_node="">47</span></a><span data-dcnode-id="3539" instrument_node="">]. Although authorized spirometric reference values are available for most populations, normal ranges of lung volumes and capacities were not established in others yet. Static lung volumes and capacities are frequently expressed as a percent of the predicted value, where 80% and 120% are considered as the lower (LLN) and upper (ULN) limits of normal. However, the use of these cut-off points may be misleading in characterizing ventilatory defects in some pulmonary diseases if only simple spirometry is performed [</span><a aria-label="Reference 48" data-dcnode-id="3537" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR48" id="ref-link-section-d222060581e1349" title="Miller MR, Quanjer PH, Swanney MP, Ruppel G, Enright PL. Interpreting lung function data using 80% predicted and fixed thresholds misclassifies more than 20% of patients. Chest. 2011;139(1):52–9."><span data-dcnode-id="3538" instrument_node="">48</span></a><span data-dcnode-id="3536" instrument_node="">, </span><a aria-label="Reference 49" data-dcnode-id="3534" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR49" id="ref-link-section-d222060581e1352" title="Mannino DM, Diaz-Guzman E. Interpreting lung function data using 80% predicted and fixed thresholds identifies patients at increased risk of mortality. Chest. 2012;141(1):73–80.&nbsp;"><span data-dcnode-id="3535" instrument_node="">49</span></a><span data-dcnode-id="3533" instrument_node="">].</span></p></div></div></section><section data-dcnode-id="3199" data-title="Patterns of changes of static lung volumes&nbsp;and capacities in pulmonary diseases"><div class="c-article-section" data-dcnode-id="3200" id="Sec10-section"><h2 class="c-article-section__title js-section-title js-c-reading-companion-sections-item" data-dcnode-id="3527" id="Sec10"><span data-dcnode-id="3528" instrument_node="">Patterns of changes of static lung volumes&nbsp;and capacities in pulmonary diseases</span></h2><div class="c-article-section__content" data-dcnode-id="3201" id="Sec10-content"><h3 class="c-article__sub-heading" data-dcnode-id="3525" id="Sec11"><span data-dcnode-id="3526" instrument_node="">Restrictive lung diseases</span></h3><p data-dcnode-id="3487"><span data-dcnode-id="3524" instrument_node="">Diseases associated with diminished pulmonary compliance interfere with lung expansion and ultimately reduce static lung volumes/capacities, Fig.&nbsp;</span><a data-dcnode-id="3522" data-track="click" data-track-action="figure anchor" data-track-label="link" href="#Fig7"><span data-dcnode-id="3523" instrument_node="">7</span></a><span data-dcnode-id="3521" instrument_node="">. According to ATS/ERS, restrictive ventilatory defect is ideally confirmed by a reduction in TLC below the 5</span><sup data-dcnode-id="3519"><span data-dcnode-id="3520" instrument_node="">th</span></sup><span data-dcnode-id="3518" instrument_node=""> percentile of the predicted value, and a normal FEV</span><sub data-dcnode-id="3516"><span data-dcnode-id="3517" instrument_node="">1</span></sub><span data-dcnode-id="3515" instrument_node="">/VC [</span><a aria-label="Reference 46" data-dcnode-id="3513" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR46" id="ref-link-section-d222060581e1374" title="Pellegrino R, Viegi G, Brusasco V, Crapo RO, Burgos F, Casaburi R, et al. Interpretative strategies for lung function tests. Eur Respir J. 2005;26(5):948–68.&nbsp;"><span data-dcnode-id="3514" instrument_node="">46</span></a><span data-dcnode-id="3512" instrument_node="">], though most pulmonary laboratories use VC instead because it constitutes most of the TLC [</span><a aria-label="Reference 50" data-dcnode-id="3510" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR50" id="ref-link-section-d222060581e1377" title="Lutfi MF. Review Article Vital capacity derived spirometric measurements. Sudan Med J. 2012;48(1):86–100."><span data-dcnode-id="3511" instrument_node="">50</span></a><span data-dcnode-id="3509" instrument_node="">, </span><a aria-label="Reference 51" data-dcnode-id="3507" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR51" id="ref-link-section-d222060581e1381" title="Venkateshiah SB, Ioachimescu OC, McCarthy K, Stoller JK. The utility of spirometry in diagnosing pulmonary restriction. Lung. 186(1):19–25.&nbsp;"><span data-dcnode-id="3508" instrument_node="">51</span></a><span data-dcnode-id="3506" instrument_node="">]. The use of VC as a surrogate for TLC in diagnosis of RLD assumes a proportional decrease in RV and TLC so that their ratio remains constant [</span><a aria-label="Reference 46" data-dcnode-id="3504" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR46" id="ref-link-section-d222060581e1384" title="Pellegrino R, Viegi G, Brusasco V, Crapo RO, Burgos F, Casaburi R, et al. Interpretative strategies for lung function tests. Eur Respir J. 2005;26(5):948–68.&nbsp;"><span data-dcnode-id="3505" instrument_node="">46</span></a><span data-dcnode-id="3503" instrument_node="">, </span><a aria-label="Reference 52" data-dcnode-id="3501" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR52" id="ref-link-section-d222060581e1387" title="Mehrparvar AH, Sakhvidi MJZ, Mostaghaci M, Davari MH, Hashemi SH, Zare Z. Spirometry values for detecting a restrictive pattern in occupational health settings. Tanaffos. 2014;13(2):27–34. 
                    http://www.ncbi.nlm.nih.gov/pubmed/25506373
                    
                  . Accessed 19 Oct 2016."><span data-dcnode-id="3502" instrument_node="">52</span></a><span data-dcnode-id="3500" instrument_node="">]. Simultaneous increase of RV with VC reduction is indicative of obstructive lung disease because of small airway closure or expiratory flow limitation [</span><a aria-label="Reference 53" data-dcnode-id="3498" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR53" id="ref-link-section-d222060581e1390" title="Dykstra BJ, Scanlon PD, Kester MM, Beck KC, Enright PL. Lung volumes in 4,774 patients with obstructive lung disease. Chest. 1999;115(1):68–74. 
                    http://www.ncbi.nlm.nih.gov/pubmed/9925064
                    
                  . Accessed 19 Oct 2016."><span data-dcnode-id="3499" instrument_node="">53</span></a><span data-dcnode-id="3497" instrument_node="">]. Therefore, decreased VC readings are better interpreted in conjunction with other clinical and spirometric indicators of OLD, especially if measurements of RV and TLC are not available [</span><a aria-label="Reference 54" data-dcnode-id="3495" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR54" id="ref-link-section-d222060581e1393" title="Quadrelli S, Bosio M, Salvado A, Chertcoff J. [Accuracy of spirometry in the diagnosis of pulmonary restriction]. Medicina (B Aires). 2007;67(6 Pt 2):685–90. 
                    http://www.ncbi.nlm.nih.gov/pubmed/18422058
                    
                  . Accessed 20 Oct 2016."><span data-dcnode-id="3496" instrument_node="">54</span></a><span data-dcnode-id="3494" instrument_node="">]. According to Aaron et al., the chances of restrictive ventilatory defect are 2.4% and 58% in those with normal and low VC readings, respectively [</span><a aria-label="Reference 55" data-dcnode-id="3492" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR55" id="ref-link-section-d222060581e1396" title="Aaron SD, Dales RE, Cardinal P. How accurate is spirometry at predicting restrictive pulmonary impairment? Chest. 1999;115(3):869–73. 
                    http://www.ncbi.nlm.nih.gov/pubmed/10084506
                    
                  . Accessed 20 Oct 2016."><span data-dcnode-id="3493" instrument_node="">55</span></a><span data-dcnode-id="3491" instrument_node="">]. These findings suggest that normal VC may be effective in exclusion, but not confirmation, of RLD. This hypothesis is further supported by Vandevoorde et al., who concluded that RLD can be ruled out if FVC is more than 100% of predicted in males or greater than 85% of predicted in females [</span><a aria-label="Reference 56" data-dcnode-id="3489" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR56" id="ref-link-section-d222060581e1400" title="Vandevoorde J, Verbanck S, Schuermans D, Broekaert L, Devroey D, Kartounian J, et al. Forced vital capacity and forced expiratory volume in six seconds as predictors of reduced total lung capacity. Eur Respir J. 2008;31(2):391-5."><span data-dcnode-id="3490" instrument_node="">56</span></a><span data-dcnode-id="3488" instrument_node="">].</span></p><div class="c-article-section__figure js-c-reading-companion-figures-item" data-container-section="figure" data-dcnode-id="3463" data-test="figure" data-title="Fig. 7" id="figure-7"><figure data-dcnode-id="3464"><figcaption data-dcnode-id="3484"><b class="c-article-section__figure-caption" data-dcnode-id="3485" data-test="figure-caption-text" id="Fig7"><span data-dcnode-id="3486" instrument_node="">Fig. 7</span></b></figcaption><div class="c-article-section__figure-content" data-dcnode-id="3475"><div class="c-article-section__figure-item" data-dcnode-id="3479"><a class="c-article-section__figure-link" data-dcnode-id="3480" data-test="img-link" data-track="click" data-track-action="view figure" data-track-label="image" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//mrmjournal.biomedcentral.com/articles/10.1186/s40248-017-0084-5/figures/7" rel="nofollow"><picture data-dcnode-id="3481"><source data-dcnode-id="3483" srcset="//media.springernature.com/lw685/springer-static/image/art%3A10.1186%2Fs40248-017-0084-5/MediaObjects/40248_2017_84_Fig7_HTML.gif?as=webp" type="image/webp"><img alt="figure 7" aria-describedby="Fig7" data-dcnode-id="3482" loading="lazy" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//media.springernature.com/lw685/springer-static/image/art%253A10.1186/s40248-017-0084-5/MediaObjects/40248_2017_84_Fig7_HTML.gif&amp;raw"></picture></a></div><div class="c-article-section__figure-description" data-dcnode-id="3476" data-test="bottom-caption" id="figure-7-desc"><p data-dcnode-id="3477"><span data-dcnode-id="3478" instrument_node="">Typical changes in the static lung volumes and capacities in RLD and OLD</span></p></div></div><div class="u-text-right u-hide-print" data-dcnode-id="3465"><a aria-label="Full size image figure 7" class="c-article__pill-button" data-dcnode-id="3466" data-test="article-link" data-track="click" data-track-action="view figure" data-track-dest="link:Figure7 Full size image" data-track-label="button" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//mrmjournal.biomedcentral.com/articles/10.1186/s40248-017-0084-5/figures/7" rel="nofollow"><span data-dcnode-id="3473"><span data-dcnode-id="3474" instrument_node="">Full size image</span></span><svg aria-hidden="true" class="u-icon" data-dcnode-id="3467" focusable="false" height="16" role="img" width="16"><use data-dcnode-id="3468" xlink:href="#global-icon-chevron-right" xmlns:xlink="http://www.w3.org/1999/xlink"><svg data-dcnode-id="3469" id="global-icon-chevron-right" viewBox="0 0 16 16"></svg></use></svg><span data-dcnode-id="3472" instrument_node="">
</span><path d="M7.782 7L5.3 4.518c-.393-.392-.4-1.022-.02-1.403a1.001 1.001 0 011.417 0l4.176 4.177a1.001 1.001 0 010 1.416l-4.176 4.177a.991.991 0 01-1.4.016 1 1 0 01.003-1.42L7.782 9l1.013-.998z" data-dcnode-id="3471" fill-rule="evenodd"></path><span data-dcnode-id="3470" instrument_node="">
</span></a></div></figure></div><span data-dcnode-id="3462" instrument_node="">
</span><p data-dcnode-id="3436"><span data-dcnode-id="3461" instrument_node="">If thoracic cage expansion is restricted, rightward displacement of the chest wall static PVC takes place. This readjusts the point where the inward recoil of the lung equalizes the outward recoil of the chest wall at a lower FRC level. In cases with severe central obesity, decreased chest wall compliance reduces FRC and ERV [</span><a aria-label="Reference 57" data-dcnode-id="3459" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR57" id="ref-link-section-d222060581e1424" title="Lin C-K, Lin C-C. Work of breathing and respiratory drive in obesity. Respirology. 2012;17(3):402–11.&nbsp;"><span data-dcnode-id="3460" instrument_node="">57</span></a><span data-dcnode-id="3458" instrument_node="">]. According to Jones et al., FRC and ERV at a body mass index (BMI) of 30&nbsp;kg/m</span><sup data-dcnode-id="3456"><span data-dcnode-id="3457" instrument_node="">2</span></sup><span data-dcnode-id="3455" instrument_node=""> were about 75% and 47% of the respective measurements for subjects with BMI of 20&nbsp;kg/m</span><sup data-dcnode-id="3453"><span data-dcnode-id="3454" instrument_node="">2</span></sup><span data-dcnode-id="3452" instrument_node=""> [</span><a aria-label="Reference 26" data-dcnode-id="3450" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR26" id="ref-link-section-d222060581e1431" title="Jones RL, Nzekwu M-MU. The effects of body mass index on lung volumes. Chest. 2006;130(3):827–33."><span data-dcnode-id="3451" instrument_node="">26</span></a><span data-dcnode-id="3449" instrument_node="">]. The same study failed to demonstrate a significant effect of high BMI on RV/TLC ratio, which indicates proportional reduction in RV and TLC in overweight and obese subjects. Marked reduction of FRC and ERV in such cases may induce premature formation of flow limiting segments during quiet breathing, especially in the lower regions of the lungs [</span><a aria-label="Reference 57" data-dcnode-id="3447" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR57" id="ref-link-section-d222060581e1434" title="Lin C-K, Lin C-C. Work of breathing and respiratory drive in obesity. Respirology. 2012;17(3):402–11.&nbsp;"><span data-dcnode-id="3448" instrument_node="">57</span></a><span data-dcnode-id="3446" instrument_node="">]. This implication is further supported by the studies that confirm an inverse relationship between FRC and airway resistance in obese patients [</span><a aria-label="Reference 58" data-dcnode-id="3444" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR58" id="ref-link-section-d222060581e1438" title="Pelosi P, Croci M, Ravagnan I, Tredici S, Pedoto A, Lissoni A, et al. The effects of body mass on lung volumes, respiratory mechanics, and gas exchange during general anesthesia. Anesth Analg. 1998;87(3):654–60. 
                    http://www.ncbi.nlm.nih.gov/pubmed/9728848
                    
                  . Accessed 20 Oct 2016."><span data-dcnode-id="3445" instrument_node="">58</span></a><span data-dcnode-id="3443" instrument_node="">, </span><a aria-label="Reference 59" data-dcnode-id="3441" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR59" id="ref-link-section-d222060581e1441" title="Zerah F, Harf A, Perlemuter L, Lorino H, Lorino AM, Atlan G. Effects of obesity on respiratory resistance. Chest. 1993;103(5):1470–6. 
                    http://www.ncbi.nlm.nih.gov/pubmed/8486029
                    
                  . Accessed 20 Oct 2016."><span data-dcnode-id="3442" instrument_node="">59</span></a><span data-dcnode-id="3440" instrument_node="">]. Furthermore, temporal variability of ventilation heterogeneities increases in obesity when FRC falls approximately below 65% of predicted or ERV below 0.6 l, promoting ventilation perfusion inhomogeneity and eventually hypoxemia [</span><a aria-label="Reference 60" data-dcnode-id="3438" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR60" id="ref-link-section-d222060581e1444" title="Pellegrino R, Gobbi A, Antonelli A, Torchio R, Gulotta C, Pellegrino GM, et al. Ventilation heterogeneity in obesity. J Appl Physiol. 2014;116(9):1175–81. doi:
                    10.1152/japplphysiol.01339.2013
                    
                  ."><span data-dcnode-id="3439" instrument_node="">60</span></a><span data-dcnode-id="3437" instrument_node="">].</span></p><h3 class="c-article__sub-heading" data-dcnode-id="3434" id="Sec12"><span data-dcnode-id="3435" instrument_node="">Obstructive lung diseases</span></h3><p data-dcnode-id="3420"><span data-dcnode-id="3433" instrument_node="">ATS/ERS defined obstructive ventilatory defect as “disproportionate reduction of maximal airflow from the lung in relation to the maximal volume (i.e. VC) that can be displaced from the lung” [</span><a aria-label="Reference 46" data-dcnode-id="3431" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR46" id="ref-link-section-d222060581e1455" title="Pellegrino R, Viegi G, Brusasco V, Crapo RO, Burgos F, Casaburi R, et al. Interpretative strategies for lung function tests. Eur Respir J. 2005;26(5):948–68.&nbsp;"><span data-dcnode-id="3432" instrument_node="">46</span></a><span data-dcnode-id="3430" instrument_node="">]. Obstructive ventilatory defect is ideally confirmed by FEV</span><sub data-dcnode-id="3428"><span data-dcnode-id="3429" instrument_node="">1</span></sub><span data-dcnode-id="3427" instrument_node="">/VC ratio below the 5</span><sup data-dcnode-id="3425"><span data-dcnode-id="3426" instrument_node="">th</span></sup><span data-dcnode-id="3424" instrument_node=""> percentile of the predicted value [</span><a aria-label="Reference 46" data-dcnode-id="3422" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR46" id="ref-link-section-d222060581e1462" title="Pellegrino R, Viegi G, Brusasco V, Crapo RO, Burgos F, Casaburi R, et al. Interpretative strategies for lung function tests. Eur Respir J. 2005;26(5):948–68.&nbsp;"><span data-dcnode-id="3423" instrument_node="">46</span></a><span data-dcnode-id="3421" instrument_node="">].</span></p><p data-dcnode-id="3394"><span data-dcnode-id="3419" instrument_node="">VC can be measured while doing slow (SIVC) or forceful (FIVC) inspiration starting from RV up to the level of TLC [</span><a aria-label="Reference 61" data-dcnode-id="3417" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR61" id="ref-link-section-d222060581e1468" title="Bencowitz HZ. Inspiratory and expiratory vital capacity. Chest. 1984;85(6):834–5. 
                    http://www.ncbi.nlm.nih.gov/pubmed/6723401
                    
                  . Accessed 22 Oct 2016."><span data-dcnode-id="3418" instrument_node="">61</span></a><span data-dcnode-id="3416" instrument_node="">, </span><a aria-label="Reference 62" data-dcnode-id="3414" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR62" id="ref-link-section-d222060581e1471" title="Brusasco V, Pellegrino R, Rodarte JR. Vital capacities in acute and chronic airway obstruction: dependence on flow and volume histories. Eur Respir J. 1997;10(6):1316–20. 
                    http://www.ncbi.nlm.nih.gov/pubmed/9192935
                    
                  . Accessed 22 Oct 2016."><span data-dcnode-id="3415" instrument_node="">62</span></a><span data-dcnode-id="3413" instrument_node="">]. Likewise, VC can be estimated while doing slow (SEVC) or forceful (FEVC) expiration starting from TLC up to the level of RV [</span><a aria-label="Reference 62" data-dcnode-id="3411" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR62" id="ref-link-section-d222060581e1474" title="Brusasco V, Pellegrino R, Rodarte JR. Vital capacities in acute and chronic airway obstruction: dependence on flow and volume histories. Eur Respir J. 1997;10(6):1316–20. 
                    http://www.ncbi.nlm.nih.gov/pubmed/9192935
                    
                  . Accessed 22 Oct 2016."><span data-dcnode-id="3412" instrument_node="">62</span></a><span data-dcnode-id="3410" instrument_node="">, </span><a aria-label="Reference 63" data-dcnode-id="3408" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR63" id="ref-link-section-d222060581e1477" title="Chhabra SK. Forced vital capacity, slow vital capacity, or inspiratory vital capacity: which is the best measure of vital capacity? J Asthma. 1998;35(4):361–5. 
                    http://www.ncbi.nlm.nih.gov/pubmed/9669830
                    
                  . Accessed 22 Oct 2016."><span data-dcnode-id="3409" instrument_node="">63</span></a><span data-dcnode-id="3407" instrument_node="">]. Taking into consideration the variations in airways resistance between inspiration and expiration, it is easy to conclude that different types of VC are not equal. The differences between the four types of VC are minimal in those with no ventilatory defect [</span><a aria-label="Reference 61" data-dcnode-id="3405" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR61" id="ref-link-section-d222060581e1480" title="Bencowitz HZ. Inspiratory and expiratory vital capacity. Chest. 1984;85(6):834–5. 
                    http://www.ncbi.nlm.nih.gov/pubmed/6723401
                    
                  . Accessed 22 Oct 2016."><span data-dcnode-id="3406" instrument_node="">61</span></a><span data-dcnode-id="3404" instrument_node="">]. In patients with OLD, FIVC &gt; SIVC &gt; SEVC &gt; FEVC [</span><a aria-label="Reference 50" data-dcnode-id="3402" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR50" id="ref-link-section-d222060581e1484" title="Lutfi MF. Review Article Vital capacity derived spirometric measurements. Sudan Med J. 2012;48(1):86–100."><span data-dcnode-id="3403" instrument_node="">50</span></a><span data-dcnode-id="3401" instrument_node="">, </span><a aria-label="Reference 63" data-dcnode-id="3399" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR63" id="ref-link-section-d222060581e1487" title="Chhabra SK. Forced vital capacity, slow vital capacity, or inspiratory vital capacity: which is the best measure of vital capacity? J Asthma. 1998;35(4):361–5. 
                    http://www.ncbi.nlm.nih.gov/pubmed/9669830
                    
                  . Accessed 22 Oct 2016."><span data-dcnode-id="3400" instrument_node="">63</span></a><span data-dcnode-id="3398" instrument_node="">]. FEVC (commonly abbreviated as FVC) is, therefore, the most affected type of VC in cases with severe obstructive lung disease [</span><a aria-label="Reference 63" data-dcnode-id="3396" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR63" id="ref-link-section-d222060581e1490" title="Chhabra SK. Forced vital capacity, slow vital capacity, or inspiratory vital capacity: which is the best measure of vital capacity? J Asthma. 1998;35(4):361–5. 
                    http://www.ncbi.nlm.nih.gov/pubmed/9669830
                    
                  . Accessed 22 Oct 2016."><span data-dcnode-id="3397" instrument_node="">63</span></a><span data-dcnode-id="3395" instrument_node="">].</span></p><p data-dcnode-id="3383"><span data-dcnode-id="3393" instrument_node="">In OLD, formation of flow limiting segments occurs early due to narrowing of airways. Premature closure of small airways in OLD results in increased RV. In such conditions, RV may increase at the expense of VC so that TLC remains unchanged [</span><a aria-label="Reference 53" data-dcnode-id="3391" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR53" id="ref-link-section-d222060581e1496" title="Dykstra BJ, Scanlon PD, Kester MM, Beck KC, Enright PL. Lung volumes in 4,774 patients with obstructive lung disease. Chest. 1999;115(1):68–74. 
                    http://www.ncbi.nlm.nih.gov/pubmed/9925064
                    
                  . Accessed 19 Oct 2016."><span data-dcnode-id="3392" instrument_node="">53</span></a><span data-dcnode-id="3390" instrument_node="">]. Alternatively, RV may increase while VC remains almost unchanged leading to higher TLC values [</span><a aria-label="Reference 64" data-dcnode-id="3388" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR64" id="ref-link-section-d222060581e1499" title="Ranu H, Wilde M, Madden B. Pulmonary function tests. Ulster Med J. 2011;80(2):84–90. 
                    http://www.ncbi.nlm.nih.gov/pubmed/22347750
                    
                  . Accessed 21 Oct 2016."><span data-dcnode-id="3389" instrument_node="">64</span></a><span data-dcnode-id="3387" instrument_node="">]. In both scenarios, RV/TLC ratio is likely to increase irrespective of the changes in the VC, a fact that explains the superiority RV/TLC over TLC in evaluation of OLD [</span><a aria-label="Reference 65" data-dcnode-id="3385" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR65" id="ref-link-section-d222060581e1502" title="Shin TR, Oh Y-M, Park JH, et al. The Prognostic Value of Residual Volume/Total Lung Capacity in Patients with Chronic Obstructive Pulmonary Disease. J Korean Med Sci. 2015;30(10):1459–65."><span data-dcnode-id="3386" instrument_node="">65</span></a><span data-dcnode-id="3384" instrument_node="">].</span></p><p data-dcnode-id="3360"><span data-dcnode-id="3382" instrument_node="">Similar to the RV and VC changes occurring in patients with OLD, FRC may increase at the expense of IC so that TLC remains unchanged [</span><a aria-label="Reference 4" data-dcnode-id="3380" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR4" id="ref-link-section-d222060581e1508" title="Ruppel GL. What is the clinical value of lung volumes? Respir Care. 2012;57(1):26-35-8."><span data-dcnode-id="3381" instrument_node="">4</span></a><span data-dcnode-id="3379" instrument_node="">]. IC can directly be measured by spirometry, which is advantageous in places where there are no facilities to measure RV and TLC. There are accumulating evidences that indices derived from IC are helpful to assess severity, prognosis and response to treatment of many OLD [</span><a aria-label="Reference 66" data-dcnode-id="3377" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR66" id="ref-link-section-d222060581e1511" title="Celli BR, Decramer M, Lystig T, Kesten S, Tashkin DP. Longitudinal inspiratory capacity changes in chronic obstructive pulmonary disease. Respir Res. 2012;13:66."><span data-dcnode-id="3378" instrument_node="">66</span></a><span data-dcnode-id="3376" instrument_node="">–</span><a aria-label="Reference 69" data-dcnode-id="3374" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR69" id="ref-link-section-d222060581e1514" title="Zaman M, Mahmood S, Altayeh A. Low inspiratory capacity to total lung capacity ratio is a risk factor for chronic obstructive pulmonary disease exacerbation. Am J Med Sci. 2010;339(5):411–4."><span data-dcnode-id="3375" instrument_node="">69</span></a><span data-dcnode-id="3373" instrument_node="">]. According to Yetkin and Gunen, IC is more efficient than FEV</span><sub data-dcnode-id="3371"><span data-dcnode-id="3372" instrument_node="">1</span></sub><span data-dcnode-id="3370" instrument_node=""> is assessing severity of COPD during acute exacerbation [</span><a aria-label="Reference 68" data-dcnode-id="3368" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR68" id="ref-link-section-d222060581e1519" title="Yetkin O, Gunen H. Inspiratory capacity and forced expiratory volume in the first second in exacerbation of chronic obstructive pulmonary disease. Clin Respir J. 2008;2(1):36–40."><span data-dcnode-id="3369" instrument_node="">68</span></a><span data-dcnode-id="3367" instrument_node="">]. In another study, COPD patients with IC/TLC ratio &lt; 25% are more likely to have unscheduled doctor visits due to exacerbations or need of carefully monitored treatment [</span><a aria-label="Reference 69" data-dcnode-id="3365" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR69" id="ref-link-section-d222060581e1523" title="Zaman M, Mahmood S, Altayeh A. Low inspiratory capacity to total lung capacity ratio is a risk factor for chronic obstructive pulmonary disease exacerbation. Am J Med Sci. 2010;339(5):411–4."><span data-dcnode-id="3366" instrument_node="">69</span></a><span data-dcnode-id="3364" instrument_node="">]. This fact is further supported by the finding of French et al., where IC/TLC ≤ 25% was identified as significant predictor of death in patients with emphysematous COPD [</span><a aria-label="Reference 67" data-dcnode-id="3362" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR67" id="ref-link-section-d222060581e1526" title="French A, Balfe D, Mirocha JM, Falk JA, Mosenifar Z. The inspiratory capacity/total lung capacity ratio as a predictor of survival in an emphysematous phenotype of chronic obstructive pulmonary disease. Int J Chron Obstruct Pulmon Dis. 2015;10:1305–12."><span data-dcnode-id="3363" instrument_node="">67</span></a><span data-dcnode-id="3361" instrument_node="">].</span></p><p data-dcnode-id="3307"><span data-dcnode-id="3359" instrument_node="">It is evident from the above reports that air trapping in obstructive ventilatory defects correlates positively with RV, FRC, TLC and RV/TLC, but negatively with VC, IC and IC/TLC. As described earlier, FIVC &gt; SIVC &gt; SEVC &gt; FEVC in patients with OLD [</span><a aria-label="Reference 50" data-dcnode-id="3357" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR50" id="ref-link-section-d222060581e1533" title="Lutfi MF. Review Article Vital capacity derived spirometric measurements. Sudan Med J. 2012;48(1):86–100."><span data-dcnode-id="3358" instrument_node="">50</span></a><span data-dcnode-id="3356" instrument_node="">, </span><a aria-label="Reference 63" data-dcnode-id="3354" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR63" id="ref-link-section-d222060581e1536" title="Chhabra SK. Forced vital capacity, slow vital capacity, or inspiratory vital capacity: which is the best measure of vital capacity? J Asthma. 1998;35(4):361–5. 
                    http://www.ncbi.nlm.nih.gov/pubmed/9669830
                    
                  . Accessed 22 Oct 2016."><span data-dcnode-id="3355" instrument_node="">63</span></a><span data-dcnode-id="3353" instrument_node="">]. Accordingly, lung hyperinflation can also be evaluated by assessing the difference between FIVC and FEVC [</span><a aria-label="Reference 62" data-dcnode-id="3351" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR62" id="ref-link-section-d222060581e1539" title="Brusasco V, Pellegrino R, Rodarte JR. Vital capacities in acute and chronic airway obstruction: dependence on flow and volume histories. Eur Respir J. 1997;10(6):1316–20. 
                    http://www.ncbi.nlm.nih.gov/pubmed/9192935
                    
                  . Accessed 22 Oct 2016."><span data-dcnode-id="3352" instrument_node="">62</span></a><span data-dcnode-id="3350" instrument_node="">, </span><a aria-label="Reference 63" data-dcnode-id="3348" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR63" id="ref-link-section-d222060581e1542" title="Chhabra SK. Forced vital capacity, slow vital capacity, or inspiratory vital capacity: which is the best measure of vital capacity? J Asthma. 1998;35(4):361–5. 
                    http://www.ncbi.nlm.nih.gov/pubmed/9669830
                    
                  . Accessed 22 Oct 2016."><span data-dcnode-id="3349" instrument_node="">63</span></a><span data-dcnode-id="3347" instrument_node="">, </span><a aria-label="Reference 70" data-dcnode-id="3345" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR70" id="ref-link-section-d222060581e1545" title="Engel T, Heinig JH, Madsen F, Nikander K. Peak inspiratory flow and inspiratory vital capacity of patients with asthma measured with and without a new dry-powder inhaler device (Turbuhaler). Eur Respir J. 1990;3(9):1037–41. 
                    http://www.ncbi.nlm.nih.gov/pubmed/2289551
                    
                  . Accessed 22 Oct 2016."><span data-dcnode-id="3346" instrument_node="">70</span></a><span data-dcnode-id="3344" instrument_node="">, </span><a aria-label="Reference 71" data-dcnode-id="3342" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR71" id="ref-link-section-d222060581e1549" title="Yuan W, He X, Xu Q-F, Wang H-Y, Casaburi R. Increased difference between slow and forced vital capacity is associated with reduced exercise tolerance in COPD patients. BMC Pulm Med. 2014;14:16."><span data-dcnode-id="3343" instrument_node="">71</span></a><span data-dcnode-id="3341" instrument_node="">]. Larger difference between FIVC and FEVC had been validated not only as an efficient index of severity of airflow limitation, but also as powerful predictor of exercise tolerance in patients with COPD [</span><a aria-label="Reference 62" data-dcnode-id="3339" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR62" id="ref-link-section-d222060581e1552" title="Brusasco V, Pellegrino R, Rodarte JR. Vital capacities in acute and chronic airway obstruction: dependence on flow and volume histories. Eur Respir J. 1997;10(6):1316–20. 
                    http://www.ncbi.nlm.nih.gov/pubmed/9192935
                    
                  . Accessed 22 Oct 2016."><span data-dcnode-id="3340" instrument_node="">62</span></a><span data-dcnode-id="3338" instrument_node="">, </span><a aria-label="Reference 71" data-dcnode-id="3336" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR71" id="ref-link-section-d222060581e1555" title="Yuan W, He X, Xu Q-F, Wang H-Y, Casaburi R. Increased difference between slow and forced vital capacity is associated with reduced exercise tolerance in COPD patients. BMC Pulm Med. 2014;14:16."><span data-dcnode-id="3337" instrument_node="">71</span></a><span data-dcnode-id="3335" instrument_node="">]. Likewise, lung hyperinflation secondary to air trapping can be estimated by calculating the difference between lung volumes measured by plethysmography and dilutional techniques. This assumption was validated by Tantucci et al. when they evaluated FRC in asthmatic patient by plethysmography (FRC</span><sub data-dcnode-id="3333"><span data-dcnode-id="3334" instrument_node="">pl</span></sub><span data-dcnode-id="3332" instrument_node="">) and helium dilution method (FRC</span><sub data-dcnode-id="3330"><span data-dcnode-id="3331" instrument_node="">He</span></sub><span data-dcnode-id="3329" instrument_node="">) following methacholine challenge test [</span><a aria-label="Reference 72" data-dcnode-id="3327" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR72" id="ref-link-section-d222060581e1562" title="Tantucci C, Guerini M, Boni E, Corda L, Pini L. Tidal airway closure during bronchoconstriction in asthma: usefulness of lung volume measurements. J Asthma. 2011;48(1):33–40."><span data-dcnode-id="3328" instrument_node="">72</span></a><span data-dcnode-id="3326" instrument_node="">]. The results confirmed that comparing FRC</span><sub data-dcnode-id="3324"><span data-dcnode-id="3325" instrument_node="">pl</span></sub><span data-dcnode-id="3323" instrument_node=""> with FRC</span><sub data-dcnode-id="3321"><span data-dcnode-id="3322" instrument_node="">He</span></sub><span data-dcnode-id="3320" instrument_node=""> was helpful in identifying asthmatic patients at risk of tidal airway closure induced by methacholine. In addition, Tantucci et al. demonstrated significant correlation between (FRC</span><sub data-dcnode-id="3318"><span data-dcnode-id="3319" instrument_node="">pl</span></sub><span data-dcnode-id="3317" instrument_node=""> ─ FRC</span><sub data-dcnode-id="3315"><span data-dcnode-id="3316" instrument_node="">He</span></sub><span data-dcnode-id="3314" instrument_node="">) and the unventilated lung volume following provocation of bronchoconstriction [</span><a aria-label="Reference 72" data-dcnode-id="3312" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR72" id="ref-link-section-d222060581e1574" title="Tantucci C, Guerini M, Boni E, Corda L, Pini L. Tidal airway closure during bronchoconstriction in asthma: usefulness of lung volume measurements. J Asthma. 2011;48(1):33–40."><span data-dcnode-id="3313" instrument_node="">72</span></a><span data-dcnode-id="3311" instrument_node="">]. Typical changes in the static lung volumes and capacities in OLD are summarized in Fig.&nbsp;</span><a data-dcnode-id="3309" data-track="click" data-track-action="figure anchor" data-track-label="link" href="#Fig7"><span data-dcnode-id="3310" instrument_node="">7</span></a><span data-dcnode-id="3308" instrument_node="">.</span></p><p data-dcnode-id="3254"><span data-dcnode-id="3306" instrument_node="">It is important to note that FEV</span><sub data-dcnode-id="3304"><span data-dcnode-id="3305" instrument_node="">1</span></sub><span data-dcnode-id="3303" instrument_node=""> should be interpreted with caution when measured with spirometers (FEV</span><sub data-dcnode-id="3301"><span data-dcnode-id="3302" instrument_node="">1-Sp</span></sub><span data-dcnode-id="3300" instrument_node="">) rather than plethysmography (FEV</span><sub data-dcnode-id="3298"><span data-dcnode-id="3299" instrument_node="">1-Pl</span></sub><span data-dcnode-id="3297" instrument_node="">). As explaineed earlier, FEV</span><sub data-dcnode-id="3295"><span data-dcnode-id="3296" instrument_node="">1-Sp</span></sub><span data-dcnode-id="3294" instrument_node="">, but not FEV</span><sub data-dcnode-id="3292"><span data-dcnode-id="3293" instrument_node="">1-Pl</span></sub><span data-dcnode-id="3291" instrument_node="">, is biased by TGCV [</span><a aria-label="Reference 9" data-dcnode-id="3289" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR9" id="ref-link-section-d222060581e1594" title="Krowka MJ, Enright PL, Rodarte JR, Hyatt RE. Effect of Effort on Measurement of Forced Expiratory Volume in One Second. Am Rev Respir Dis. 1987;136(4):829–33."><span data-dcnode-id="3290" instrument_node="">9</span></a><span data-dcnode-id="3288" instrument_node="">–</span><a aria-label="Reference 11" data-dcnode-id="3286" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR11" id="ref-link-section-d222060581e1597" title="Sharafkhaneh A, Babb TG, Officer TM, Hanania NA, Sharafkhaneh H, Boriek AM. The Confounding Effects of Thoracic Gas Compression on Measurement of Acute Bronchodilator Response. Am J Respir Crit Care Med. 2007;175(4):330–5."><span data-dcnode-id="3287" instrument_node="">11</span></a><span data-dcnode-id="3285" instrument_node="">]. In a recent study involving asthmatic patients during methacholine challenge, FEV</span><sub data-dcnode-id="3283"><span data-dcnode-id="3284" instrument_node="">1-Sp</span></sub><span data-dcnode-id="3282" instrument_node=""> overestimated bronchoconstrictor response in those with larger lung volume [</span><a aria-label="Reference 73" data-dcnode-id="3280" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR73" id="ref-link-section-d222060581e1602" title="Pellegrino R, Antonelli A, Crimi E, Gulotta C, Torchio R, Dutto L, et al. Dependence of bronchoconstrictor and bronchodilator responses on thoracic gas compression volume. Respirology. 2014;19(7):1040–5.&nbsp;"><span data-dcnode-id="3281" instrument_node="">73</span></a><span data-dcnode-id="3279" instrument_node="">]. FEV</span><sub data-dcnode-id="3277"><span data-dcnode-id="3278" instrument_node="">1-Sp</span></sub><span data-dcnode-id="3276" instrument_node=""> also overestimated bronchodilator response following administration of salbutamol to the same patients. In another study, FEV</span><sub data-dcnode-id="3274"><span data-dcnode-id="3275" instrument_node="">1-Sp</span></sub><span data-dcnode-id="3273" instrument_node=""> and FEV</span><sub data-dcnode-id="3271"><span data-dcnode-id="3272" instrument_node="">1-Pl</span></sub><span data-dcnode-id="3270" instrument_node=""> were simultaneously measured in 47 and 51 subjects with dominant emphysema and dominant chronic bronchitis, respectively [</span><a aria-label="Reference 74" data-dcnode-id="3268" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR74" id="ref-link-section-d222060581e1612" title="Pellegrino R, Crimi E, Gobbi A, Torchio R, Antonelli A, Gulotta C, et al. Severity grading of chronic obstructive pulmonary disease: the confounding effect of phenotype and thoracic gas compression. J Appl Physiol. 2015;118(7):796–802."><span data-dcnode-id="3269" instrument_node="">74</span></a><span data-dcnode-id="3267" instrument_node="">]. The results confirmed larger lung volumes and lower FEV</span><sub data-dcnode-id="3265"><span data-dcnode-id="3266" instrument_node="">1-Sp</span></sub><span data-dcnode-id="3264" instrument_node=""> in emphysematous patients compared with those with dominant chronic bronchitis. When FEV</span><sub data-dcnode-id="3262"><span data-dcnode-id="3263" instrument_node="">1-Pl</span></sub><span data-dcnode-id="3261" instrument_node=""> was used instead of FEV</span><sub data-dcnode-id="3259"><span data-dcnode-id="3260" instrument_node="">1-Sp</span></sub><span data-dcnode-id="3258" instrument_node="">, the disease severity was less in classes with dominant emphysema than those with dominant chronic bronchitis. The study concluded that FEV</span><sub data-dcnode-id="3256"><span data-dcnode-id="3257" instrument_node="">1-Sp</span></sub><span data-dcnode-id="3255" instrument_node=""> was biased by TGCV more in patients with dominant emphysema because their TLCs were larger.</span></p><h3 class="c-article__sub-heading" data-dcnode-id="3252" id="Sec13"><span data-dcnode-id="3253" instrument_node="">Mixed obstructive and restrictive lung diseases</span></h3><p data-dcnode-id="3202"><span data-dcnode-id="3251" instrument_node="">Decreased TLC in patients with spirometric evidence of airways obstruction e.g. RV above ULN or FEV</span><sub data-dcnode-id="3249"><span data-dcnode-id="3250" instrument_node="">1</span></sub><span data-dcnode-id="3248" instrument_node="">% below LLN is suggestive of mixed obstructive-restrictive lung diseases (MORLD). In MORLD, premature formation of flow limiting segments and diminished pulmonary compliance synergistically decrease FVC. The reduction in FVC sometimes exceeds that occurs in FEV</span><sub data-dcnode-id="3246"><span data-dcnode-id="3247" instrument_node="">1</span></sub><span data-dcnode-id="3245" instrument_node=""> and consequently results in relatively higher FEV</span><sub data-dcnode-id="3243"><span data-dcnode-id="3244" instrument_node="">1</span></sub><span data-dcnode-id="3242" instrument_node="">% [</span><a aria-label="Reference 75" data-dcnode-id="3240" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR75" id="ref-link-section-d222060581e1637" title="Wesołowski S, Boros P. Restrictive pattern in spirometry: does FEV(1)/FVC need to be increased? Pneumonol Alergol Pol. 2011;79(6):382–7. 
                    http://www.ncbi.nlm.nih.gov/pubmed/22028116
                    
                  . Accessed 23 Oct 2016."><span data-dcnode-id="3241" instrument_node="">75</span></a><span data-dcnode-id="3239" instrument_node="">]. This fact explains the findings of Balfe et al. study, which compared grading of airway obstruction based FEV</span><sub data-dcnode-id="3237"><span data-dcnode-id="3238" instrument_node="">1</span></sub><span data-dcnode-id="3236" instrument_node=""> (American Thoracic Society (ATS) recommendation) and FEV</span><sub data-dcnode-id="3234"><span data-dcnode-id="3235" instrument_node="">1</span></sub><span data-dcnode-id="3233" instrument_node="">% (Intermountain Thoracic Society (ITS) recommendation). According to Balfe et al. results, ATS recommendation graded 90% of 147 MORLD patients as having severe obstruction while ITS recommendation graded only 3% with the same degree of obstruction [</span><a aria-label="Reference 76" data-dcnode-id="3231" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR76" id="ref-link-section-d222060581e1645" title="Balfe DL, Lewis M, Mohsenifar Z. Grading the severity of obstruction in the presence of a restrictive ventilatory defect. Chest. 2002;122(4):1365–9. 
                    http://www.ncbi.nlm.nih.gov/pubmed/12377866
                    
                  . Accessed 23 Oct 2016."><span data-dcnode-id="3232" instrument_node="">76</span></a><span data-dcnode-id="3230" instrument_node="">]. An additional evidence was given by another study that demonstrated an inverse correlation between FEV</span><sub data-dcnode-id="3228"><span data-dcnode-id="3229" instrument_node="">1</span></sub><span data-dcnode-id="3227" instrument_node="">% and RV/TLC in patients with MORLD [</span><a aria-label="Reference 77" data-dcnode-id="3225" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR77" id="ref-link-section-d222060581e1650" title="Boros P, Franczuk M, Wesołowski S. [&quot;Mixed&quot; changes in spirometry--verification of the pattern of lung function impairment]. Pneumonol Alergol Pol. 2003;71(11–12):527–32. 
                    http://www.ncbi.nlm.nih.gov/pubmed/15305658
                    
                  . Accessed 23 Oct 2016."><span data-dcnode-id="3226" instrument_node="">77</span></a><span data-dcnode-id="3224" instrument_node="">]. Accordingly, adjustment of FEV</span><sub data-dcnode-id="3222"><span data-dcnode-id="3223" instrument_node="">1</span></sub><span data-dcnode-id="3221" instrument_node="">% for the reduction in TLC is likely to improve grading of the severity of obstruction in patients with MORLD. This assumption was verified in a study evaluating 199 patients with MORLD, where FEV</span><sub data-dcnode-id="3219"><span data-dcnode-id="3220" instrument_node="">1</span></sub><span data-dcnode-id="3218" instrument_node="">%/TLC was used for adjustment for the degree of restriction [</span><a aria-label="Reference 78" data-dcnode-id="3216" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR78" id="ref-link-section-d222060581e1658" title="Gardner ZS, Ruppel GL, Kaminsky DA. Grading the severity of obstruction in mixed obstructive-restrictive lung disease. Chest. 2011;140(3):598–603.&nbsp;"><span data-dcnode-id="3217" instrument_node="">78</span></a><span data-dcnode-id="3215" instrument_node="">]. Based on ATS/ERS grading, 76% and 11% of MORLD patients were classified as having severe and mild-to-moderate obstruction, respectively. In comparison, the adjusted FEV</span><sub data-dcnode-id="3213"><span data-dcnode-id="3214" instrument_node="">1</span></sub><span data-dcnode-id="3212" instrument_node="">% (FEV</span><sub data-dcnode-id="3210"><span data-dcnode-id="3211" instrument_node="">1</span></sub><span data-dcnode-id="3209" instrument_node="">%/TLC) classified 33% and 44% of the same patients as having severe and mild-to-moderate obstruction. The study concluded that subdividing FEV</span><sub data-dcnode-id="3207"><span data-dcnode-id="3208" instrument_node="">1</span></sub><span data-dcnode-id="3206" instrument_node="">% by TLC resulted in an appropriate severity classification of obstruction when restriction coexists [</span><a aria-label="Reference 78" data-dcnode-id="3204" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR78" id="ref-link-section-d222060581e1667" title="Gardner ZS, Ruppel GL, Kaminsky DA. Grading the severity of obstruction in mixed obstructive-restrictive lung disease. Chest. 2011;140(3):598–603.&nbsp;"><span data-dcnode-id="3205" instrument_node="">78</span></a><span data-dcnode-id="3203" instrument_node="">].</span></p></div></div></section><section data-dcnode-id="3156" data-title="Non-specific pattern of changes in lung volumes&nbsp;and capacities"><div class="c-article-section" data-dcnode-id="3157" id="Sec14-section"><h2 class="c-article-section__title js-section-title js-c-reading-companion-sections-item" data-dcnode-id="3197" id="Sec14"><span data-dcnode-id="3198" instrument_node="">Non-specific pattern of changes in lung volumes&nbsp;and capacities</span></h2><div class="c-article-section__content" data-dcnode-id="3158" id="Sec14-content"><p data-dcnode-id="3159"><span data-dcnode-id="3196" instrument_node="">The term non-specific pattern (NSP) is used to describe coexistence of low FEV</span><sub data-dcnode-id="3194"><span data-dcnode-id="3195" instrument_node="">1</span></sub><span data-dcnode-id="3193" instrument_node=""> and FVC with normal TLC and FEV</span><sub data-dcnode-id="3191"><span data-dcnode-id="3192" instrument_node="">1</span></sub><span data-dcnode-id="3190" instrument_node="">% [</span><a aria-label="Reference 46" data-dcnode-id="3188" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR46" id="ref-link-section-d222060581e1684" title="Pellegrino R, Viegi G, Brusasco V, Crapo RO, Burgos F, Casaburi R, et al. Interpretative strategies for lung function tests. Eur Respir J. 2005;26(5):948–68.&nbsp;"><span data-dcnode-id="3189" instrument_node="">46</span></a><span data-dcnode-id="3187" instrument_node="">, </span><a aria-label="Reference 79" data-dcnode-id="3185" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR79" id="ref-link-section-d222060581e1687" title="Chevalier-Bidaud B, Gillet-Juvin K, Callens E, Chenu R, Graba S, Essalhi M, et al. Non specific pattern of lung function in a respiratory physiology unit: causes and prevalence: results of an observational cross-sectional and longitudinal study. BMC Pulm Med. 2014;14:148.&nbsp;"><span data-dcnode-id="3186" instrument_node="">79</span></a><span data-dcnode-id="3184" instrument_node="">]. Although lower values of both FEV</span><sub data-dcnode-id="3182"><span data-dcnode-id="3183" instrument_node="">1</span></sub><span data-dcnode-id="3181" instrument_node=""> and FVC are associated with obstructive as well as restrictive ventilatory defect, the other components of NSP (i.e. normal TLC and FEV</span><sub data-dcnode-id="3179"><span data-dcnode-id="3180" instrument_node="">1</span></sub><span data-dcnode-id="3178" instrument_node="">%) minimize the possibility of these conditions. Hypothetically, if RV increases while TLC remains unchanged, VC and consequently FEV</span><sub data-dcnode-id="3176"><span data-dcnode-id="3177" instrument_node="">1</span></sub><span data-dcnode-id="3175" instrument_node=""> are expected to decrease below the normal limits. NSP may, therefore, reflect an obstructive impairment of small airways, where RV expands at the expense of VC so that TLC remains unaffected [</span><a aria-label="Reference 53" data-dcnode-id="3173" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR53" id="ref-link-section-d222060581e1697" title="Dykstra BJ, Scanlon PD, Kester MM, Beck KC, Enright PL. Lung volumes in 4,774 patients with obstructive lung disease. Chest. 1999;115(1):68–74. 
                    http://www.ncbi.nlm.nih.gov/pubmed/9925064
                    
                  . Accessed 19 Oct 2016."><span data-dcnode-id="3174" instrument_node="">53</span></a><span data-dcnode-id="3172" instrument_node="">, </span><a aria-label="Reference 79" data-dcnode-id="3170" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR79" id="ref-link-section-d222060581e1700" title="Chevalier-Bidaud B, Gillet-Juvin K, Callens E, Chenu R, Graba S, Essalhi M, et al. Non specific pattern of lung function in a respiratory physiology unit: causes and prevalence: results of an observational cross-sectional and longitudinal study. BMC Pulm Med. 2014;14:148.&nbsp;"><span data-dcnode-id="3171" instrument_node="">79</span></a><span data-dcnode-id="3169" instrument_node="">]. However, NSP was also demonstrated in patients with restrictive ventilatory defects [</span><a aria-label="Reference 80" data-dcnode-id="3167" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR80" id="ref-link-section-d222060581e1703" title="Hyatt RE, Cowl CT, Bjoraker JA, Scanlon PD. Conditions associated with an abnormal nonspecific pattern of pulmonary function tests. Chest. 2009;135(2):419–24.&nbsp;"><span data-dcnode-id="3168" instrument_node="">80</span></a><span data-dcnode-id="3166" instrument_node="">]. In a previous study, in depth evaluation of a random sample of patients with the NSP confirmed OLD and RLD as a possible cause in 68% and 32% of the examined subjects, respectively [</span><a aria-label="Reference 80" data-dcnode-id="3164" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR80" id="ref-link-section-d222060581e1706" title="Hyatt RE, Cowl CT, Bjoraker JA, Scanlon PD. Conditions associated with an abnormal nonspecific pattern of pulmonary function tests. Chest. 2009;135(2):419–24.&nbsp;"><span data-dcnode-id="3165" instrument_node="">80</span></a><span data-dcnode-id="3163" instrument_node="">]. In another study, NSP persisted in 64% of 1,284 patients after 3&nbsp;years follow up. Nonetheless, the NSP changed to RLD, OLD, MORLD and normal patterns in 16%, 15%, 2% and 3% of the studied patients, respectively [</span><a aria-label="Reference 81" data-dcnode-id="3161" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR81" id="ref-link-section-d222060581e1710" title="Iyer VN, Schroeder DR, Parker KO, Hyatt RE, Scanlon PD. The nonspecific pulmonary function test: longitudinal follow-up and outcomes. Chest. 2011;139(4):878–86.&nbsp;"><span data-dcnode-id="3162" instrument_node="">81</span></a><span data-dcnode-id="3160" instrument_node="">]. Possible explanation for NSP in patients with restrictive ventilatory defects remains for further investigations and researches.</span></p></div></div></section><section data-dcnode-id="3131" data-title="Conclusions"><div class="c-article-section" data-dcnode-id="3132" id="Sec15-section"><h2 class="c-article-section__title js-section-title js-c-reading-companion-sections-item" data-dcnode-id="3154" id="Sec15"><span data-dcnode-id="3155" instrument_node="">Conclusions</span></h2><div class="c-article-section__content" data-dcnode-id="3133" id="Sec15-content"><p data-dcnode-id="3152"><span data-dcnode-id="3153" instrument_node="">Physiological factors that influence lung volumes/capacities include age, gender, weight, height and ethnicity, physical activity, altitude and others, which should be considered while interpreting results of spirometry. Likewise, the quality and accuracy of the test(s) used for estimation of the lung volumes/capacities should be considered before interpretation.</span></p><p data-dcnode-id="3150"><span data-dcnode-id="3151" instrument_node="">RLDs are ideally confirmed by low TLC, though most pulmonary laboratories use VC instead. VC instead of TLC may be effective in exclusion, but not confirmation, of RLD. Simultaneous increase in RV with VC reduction is indicative of obstructive lung disease. Therefore, decreased VC readings are better interpreted in conjunction with other clinical and spirometric indicators of OLD. In RLD like central obesity, decreased chest wall compliance reduces FRC and ERV, which may induce premature formation of flow limiting segments during quiet breathing.</span></p><p data-dcnode-id="3148"><span data-dcnode-id="3149" instrument_node="">Premature closure of small airways in OLDs results in increased RV. In such conditions, RV may increase at the expense of VC so that TLC remains unchanged. Alternatively, RV may increase while VC remains almost unchanged leading to higher TLC values. In both scenarios, RV/TLC ratio is likely to increase irrespective of the changes in the VC, a fact that explains the superiority RV/TLC over TLC in evaluation of OLD. Similarly, FRC may increase at the expense of IC so that TLC remains unchanged.</span></p><p data-dcnode-id="3134"><span data-dcnode-id="3147" instrument_node="">Decreased TLC in patients with spirometric evidence of airways obstruction is suggestive of MORLD. In such conditions, the reduction in FVC exceeds that occurs in FEV</span><sub data-dcnode-id="3145"><span data-dcnode-id="3146" instrument_node="">1</span></sub><span data-dcnode-id="3144" instrument_node=""> and consequently results in relatively higher FEV</span><sub data-dcnode-id="3142"><span data-dcnode-id="3143" instrument_node="">1</span></sub><span data-dcnode-id="3141" instrument_node="">%. The term NSP is used to describe coexistence of low FEV</span><sub data-dcnode-id="3139"><span data-dcnode-id="3140" instrument_node="">1</span></sub><span data-dcnode-id="3138" instrument_node=""> and FVC with normal TLC and FEV</span><sub data-dcnode-id="3136"><span data-dcnode-id="3137" instrument_node="">1</span></sub><span data-dcnode-id="3135" instrument_node="">%. NSP may reflect an obstructive impairment of small airways, where RV expands at the expense of VC so that TLC remains unaffected. NSP was also demonstrated in patients with restrictive ventilatory defects, which needs further investigations and researches.</span></p></div></div></section><span data-dcnode-id="3130" instrument_node="">
