/h3><p data-dcnode-id="3946"><span data-dcnode-id="3947" instrument_node="">Heart Failure and Transplant Cardiology, Pulmonary Hypertension Program, Hospital of University of Pennsylvania, Philadelphia, Pennsylvania, USA</span></p><div data-dcnode-id="3942"><span data-dcnode-id="3945" instrument_node="">Find articles by </span><a data-dcnode-id="3943" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//pubmed.ncbi.nlm.nih.gov/%3Fterm%3DForfia%2520PR%255BAuthor%255D"><span data-dcnode-id="3944" instrument_node="">Paul R. Forfia</span></a></div></div><div data-dcnode-id="3932" id="_co_idm140601359691040"><h3 class="no_margin" data-dcnode-id="3939"><span data-dcnode-id="3940" instrument_node="">Anjali Vaidya</span></h3><p data-dcnode-id="3937"><span data-dcnode-id="3938" instrument_node="">Heart Failure and Transplant Cardiology, Pulmonary Hypertension Program, Hospital of University of Pennsylvania, Philadelphia, Pennsylvania, USA</span></p><div data-dcnode-id="3933"><span data-dcnode-id="3936" instrument_node="">Find articles by </span><a data-dcnode-id="3934" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//pubmed.ncbi.nlm.nih.gov/%3Fterm%3DVaidya%2520A%255BAuthor%255D"><span data-dcnode-id="3935" instrument_node="">Anjali Vaidya</span></a></div></div><div data-dcnode-id="3923" id="_co_idm140601388279936"><h3 class="no_margin" data-dcnode-id="3930"><span data-dcnode-id="3931" instrument_node="">Susan E. Wiegers</span></h3><p data-dcnode-id="3928"><span data-dcnode-id="3929" instrument_node="">Heart Failure and Transplant Cardiology, Pulmonary Hypertension Program, Hospital of University of Pennsylvania, Philadelphia, Pennsylvania, USA</span></p><div data-dcnode-id="3924"><span data-dcnode-id="3927" instrument_node="">Find articles by </span><a data-dcnode-id="3925" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//pubmed.ncbi.nlm.nih.gov/%3Fterm%3DWiegers%2520SE%255BAuthor%255D"><span data-dcnode-id="3926" instrument_node="">Susan E. Wiegers</span></a></div></div></div></div><div class="half_rhythm" data-dcnode-id="3894"><div class="togglers fm-copyright-license" data-dcnode-id="3912"><a class="pmctoggle" data-dcnode-id="3919" href="#" rid="idm140601466360432_ai"><span data-dcnode-id="3920" instrument_node="">Author information</span></a><span data-dcnode-id="3918" instrument_node=""> </span><a class="pmctoggle" data-dcnode-id="3916" href="#" rid="idm140601466360432_cpl"><span data-dcnode-id="3917" instrument_node="">Copyright and License information</span></a><span data-dcnode-id="3915" instrument_node=""> </span><a data-dcnode-id="3913" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.ncbi.nlm.nih.gov/pmc/about/disclaimer/" style="margin-left: 1em"><span data-dcnode-id="3914" instrument_node="">Disclaimer</span></a></div><div class="fm-authors-info hide half_rhythm" data-dcnode-id="3903" id="idm140601466360432_ai" style="display:none"><div class="fm-affl" data-dcnode-id="3910" id="aff1"><span data-dcnode-id="3911" instrument_node="">Heart Failure and Transplant Cardiology, Pulmonary Hypertension Program, Hospital of University of Pennsylvania, Philadelphia, Pennsylvania, USA</span></div><div data-dcnode-id="3904" id="cor1"><strong data-dcnode-id="3908"><span data-dcnode-id="3909" instrument_node="">Address correspondence to:</span></strong><span data-dcnode-id="3907" instrument_node=""> Paul Robert Forfia, Pulmonary Hypertension Program, Hospital of University of Pennsylvania, Philadelphia, Pennsylvania, USA </span><a class="oemail" data-dcnode-id="3905" data-email="moc.liamg@paifrof" href="mailto:dev@null"><span data-dcnode-id="3906" instrument_node="">moc.liamg@paifrof</span></a></div></div><div class="fm-article-notes half_rhythm" data-dcnode-id="3902"></div><div class="permissions half_rhythm hide" data-dcnode-id="3895" id="idm140601466360432_cpl" style="display:none"><div class="fm-copyright half_rhythm" data-dcnode-id="3898"><a data-dcnode-id="3900" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.ncbi.nlm.nih.gov/pmc/about/copyright/"><span data-dcnode-id="3901" instrument_node="">Copyright</span></a><span data-dcnode-id="3899" instrument_node=""> : © Pulmonary Circulation</span></div><div class="license half_rhythm" data-dcnode-id="3896"><span data-dcnode-id="3897" instrument_node="">This is an open-access article distributed under the terms of the Creative Commons Attribution-Noncommercial-Share Alike 3.0 Unported, which permits unrestricted use, distribution, and reproduction in any medium, provided the original work is properly cited.</span></div></div></div><div aria-label="Related or updated information about this article." class="links-box whole_rhythm" data-dcnode-id="3888" id="pmclinksbox" role="complementary"><div data-dcnode-id="3889"><span data-dcnode-id="3893" instrument_node="">This article has been </span><a data-dcnode-id="3891" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.ncbi.nlm.nih.gov/pmc/articles/PMC3641739/citedby/"><span data-dcnode-id="3892" instrument_node="">cited by</span></a><span data-dcnode-id="3890" instrument_node=""> other articles in PMC.</span></div></div></div><div class="sec" data-dcnode-id="3886"></div><div class="tsec sec" data-dcnode-id="3870" id="abstract-1" lang="en"><div class="goto jig-ncbiinpagenav-goto-container" data-dcnode-id="3882"><span data-dcnode-id="3883" role="menubar"><a aria-expanded="false" aria-haspopup="true" class="tgt_dark page-toc-label jig-ncbiinpagenav-goto-heading" data-dcnode-id="3884" href="#" role="menuitem" title="Go to other sections in this page"><span data-dcnode-id="3885" instrument_node="">Go to:</span></a></span></div><h2 class="head no_bottom_margin ui-helper-clearfix" data-dcnode-id="3880" id="abstract-1title"><span data-dcnode-id="3881" instrument_node="">Abstract</span></h2><div data-dcnode-id="3876"><p class="p p-first-last" data-dcnode-id="3877" id="__p1"><span data-dcnode-id="3878" instrument_node="">Pulmonary heart disease (PHD) refers to altered structure or function of the right ventricle occurring in association with abnormal respiratory function. Although nearly always associated with some degree of PH, the degree, nature, severity, and causality of PH in relation to the PHD is not necessarily linear and direct. Abnormal gas exchange is a fundamental underpinning of PHD, affecting pulmonary vascular, cardiac, renal, and neurohormonal systems. Direct and indirect effects of chronic respiratory disease can disrupt the right ventricular-pulmonary arterial (RV-PA) interaction and, likewise, factors such as sympathetic nervous system activation, altered blood viscosity, and salt and water retention can function in a feedback loop to further influence RV-PA function. Left heart function may also be affected, especially in those with pre-existing left heart disease. Thus, the physiologic interactions between abnormal respiratory and cardiovascular function are complex, with PHD representing a heterogeneous end organ effect of an integrated multisystem process. In this review, we propose to separate PHD into two distinct entities, “Type I” and “Type II” PHD. Type I PHD is most common, and refers to subjects with chronic respiratory disease (CRD) where the perturbations in respiratory function dominate over more mild cardiac and circulatory disruptions. In contrast, Type II PHD refers to the smaller subset of patients with more severe pulmonary vascular and right heart dysfunction, whom often present in a fashion similar to patients with PAH. Phenotypic differences are not made by PA pressure alone, but instead by differences in the overall physiology and clinical syndrome. Thus, key differences can be seen in symptomatology, physical signs, cardiac imaging, hemodynamics, and the cardiovascular and gas exchange responses to exercise. Such key baseline differences in the overall physiologic phenotype are likely critical to predicting response to PH specific therapy. Recognizing PHD as distinct phenotypes assists in the necessary distinction of these patients, and may also provide a key clinical and pathophysiologic framework for improved patient selection for future studies investigating the role of pulmonary hypertension-specific therapies in PHD.</span></p></div><div class="sec" data-dcnode-id="3871"><strong class="kwd-title" data-dcnode-id="3874"><span data-dcnode-id="3875" instrument_node="">Keywords: </span></strong><span class="kwd-text" data-dcnode-id="3872"><span data-dcnode-id="3873" instrument_node="">pulmonary heart disease, cor pulmonale, pulmonary hypertension, group 3 pulmonary hypertension, pulmonary vascular disease, chronic respiratory disease, right ventricular function, exercise physiology, ventilatory inefficiency</span></span></div></div><div class="tsec sec" data-dcnode-id="3832" id="body-1"><h2 class="headless nomenu" data-dcnode-id="3869"></h2><p class="p p-first" data-dcnode-id="3858" id="__p2"><span data-dcnode-id="3868" instrument_node="">The term “cor pulmonale” classically refers to the associated hypertrophic remodeling of the right ventricle (RV) that may accompany a variety of chronic respiratory diseases.[</span><a aria-expanded="false" aria-haspopup="true" class="bibr popnode tag_hotlink tag_tooltip" data-dcnode-id="3866" href="#ref1" id="__tag_310253777" rid="ref1" role="button"><span data-dcnode-id="3867" instrument_node="">1</span></a><span data-dcnode-id="3865" instrument_node="">] Pulmonary heart disease (PHD) may be considered a more modern definition of this entity, generally referring to altered structure and/or function of the right ventricle occurring in association with abnormal respiratory function. Pulmonary heart disease is nearly always associated with pulmonary hypertension (PH), which falls under the World Health Organization's Group III category-pulmonary hypertension “Associated with Lung Diseases and/or Hypoxemia.” Many prefer the term chronic respiratory disorder (CRD) as this description accounts for chronic obstructive pulmonary diseases (COPD), interstitial lung diseases (ILD), and the hypoventilatory disorders.[</span><a aria-expanded="false" aria-haspopup="true" class="bibr popnode tag_hotlink tag_tooltip" data-dcnode-id="3863" href="#ref2" id="__tag_310253821" rid="ref2" role="button"><span data-dcnode-id="3864" instrument_node="">2</span></a><span data-dcnode-id="3862" instrument_node="">,</span><a aria-expanded="false" aria-haspopup="true" class="bibr popnode tag_hotlink tag_tooltip" data-dcnode-id="3860" href="#ref3" id="__tag_310253818" rid="ref3" role="button"><span data-dcnode-id="3861" instrument_node="">3</span></a><span data-dcnode-id="3859" instrument_node="">] Pulmonary arterial hypertension (PAH; WHO Group I) and chronic thromboembolic disease (WHO Group IV) are diseases largely isolated to the pulmonary vasculature, and are thus excluded from discussions on PHD. However, PAH and thromboembolic-related PH are “prototype” conditions, where pulmonary vascular disease and its imposed limitations on the RV in part provide a framework for our understanding of the ways in which altered lung structure and function can affect the heart and, moreover, how treatment of these conditions leads to predictable improvements in right heart function, thus translating into improvements in functional status and outcome in these patients.</span></p><p class="p" data-dcnode-id="3852" id="__p3"><span data-dcnode-id="3857" instrument_node="">The physiological interactions between abnormal respiratory and cardiac function are complex, with pulmonary heart disease often representing an end-organ effect of an integrated multisystem process. The phenotypes of PHD vary widely, owed to the heterogeneity of CRD, the degree and nature of associated pulmonary hypertension, and the varied manner in which these processes interact with and alter cardiac function. An appreciation for the direct and indirect physiological consequences of abnormal respiratory function on cardiac function is required to best appreciate PHD (</span><a class="fig-table-link figpopup" co-legend-rid="lgnd_F1" data-dcnode-id="3854" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.ncbi.nlm.nih.gov/pmc/articles/PMC3641739/figure/F1/" rid-figpopup="F1" rid-ob="ob-F1" target="figure"><span data-dcnode-id="3855"><span data-dcnode-id="3856" instrument_node="">Fig. 1</span></span></a><span data-dcnode-id="3853" instrument_node="">). Although PHD is primarily a “right heart” issue leading to perturbations in RV size, shape, and function, we will also discuss ways in which abnormal respiratory function can exacerbate left heart disease.</span></p><div class="fig iconblock whole_rhythm" co-legend-rid="lgnd_F1" data-dcnode-id="3833" id="F1"><a data-dcnode-id="3846" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.ncbi.nlm.nih.gov/pmc/articles/PMC3641739/figure/F1/" rid-figpopup="F1" rid-ob="ob-F1" target="figure"><div class="figure" data-dcnode-id="3847" data-largeobj="" data-largeobj-link-rid="largeobj_idm140601392166784"><img alt="An external file that holds a picture, illustration, etc.
Object name is PC-3-5-g001.jpg" class="fig-image" data-dcnode-id="3848" loading="lazy" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.ncbi.nlm.nih.gov/pmc/articles/PMC3641739/bin/PC-3-5-g001.jpg&amp;raw" title="An external file that holds a picture, illustration, etc.
Object name is PC-3-5-g001.jpg"></div></a><div class="largeobj-link align_right" data-dcnode-id="3842" id="largeobj_idm140601392166784" style="display: none;"><a data-dcnode-id="3845" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.ncbi.nlm.nih.gov/pmc/articles/PMC3641739/figure/F1/" rid-figpopup="F1" rid-ob="ob-F1" target="figure"></a><a data-dcnode-id="3843" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.ncbi.nlm.nih.gov/pmc/articles/PMC3641739/figure/F1/%3Freport%3Dobjectonly" rel="noopener" target="object"><span data-dcnode-id="3844" instrument_node="">Open in a separate window</span></a></div><div class="icnblk_cntnt" data-dcnode-id="3834" id="lgnd_F1"><div data-dcnode-id="3839"><a class="figpopup" data-dcnode-id="3840" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.ncbi.nlm.nih.gov/pmc/articles/PMC3641739/figure/F1/" rid-figpopup="F1" rid-ob="ob-F1" target="figure"><span data-dcnode-id="3841" instrument_node="">Figure 1</span></a></div><div class="caption" data-dcnode-id="3835"><p data-dcnode-id="3836" id="__p4"><span data-dcnode-id="3837" instrument_node="">Flow diagram depicts the varying effects that abnormal lung structure and function may have an integrated physiology. Note the numerous ways in which abnormal respiratory structure and function can affect the pulmonary vascular structure and function. Similarly, how these perturbations can either directly, indirectly, or via feedback mechanisms, effect cardiac (especially right ventricular) function. A key concept in this diagram is how these varying pathophysiologic stimuli affect the cardiopulmonary unit, and namely, the right ventricular-pulmonary arterial interaction (RV-PA interaction). The nature of the RV-PA interaction dictates the relative impact of any given degree of pulmonary hypertension and pulmonary vascular disease on overall circulatory homeostasis. If the RV-PA interaction permits for relative adaptation of the RV to RV afterload, typically, the degree of lung pathology will predominate over the degree of RV-PA pathology. In this case, the type I PHD phenotype is present, where the respiratory pathology dominates the clinical picture. If there is a maladaptive RV-PA interaction, the degree of RV dysfunction and pulmonary vascular disease will often override the lung pathology, and the type II PHD phenotype is present.</span></p></div></div></div></div><div class="tsec sec" data-dcnode-id="3814" id="sec1-1"><div class="goto jig-ncbiinpagenav-goto-container" data-dcnode-id="3829"><a aria-expanded="false" aria-haspopup="true" class="tgt_dark page-toc-label jig-ncbiinpagenav-goto-heading" data-dcnode-id="3830" href="#" role="button" title="Go to other sections in this page"><span data-dcnode-id="3831" instrument_node="">Go to:</span></a></div><h2 class="head no_bottom_margin ui-helper-clearfix" data-dcnode-id="3827" id="sec1-1title"><span data-dcnode-id="3828" instrument_node="">NORMAL CARDIOPULMONARY ANATOMY AND PHYSIOLOGY</span></h2><p class="p p-first" data-dcnode-id="3822" id="__p5"><span data-dcnode-id="3826" instrument_node="">The RV is a thin-walled, distensible structure approximately one-sixth the mass of the left ventricle. It is anatomically linked to the left ventricle via the shared interventricular septum and interlacing epicardial muscle fibers. The pulmonary vasculature is comprised of thin-walled proximal pulmonary arteries and less prominent resistance arterioles. Pulmonary artery compliance is one-half and vascular resistance one-tenth systemic values. Normal respiratory function requires normal parenchymal lung structure, thus normal airways and terminal alveoli, a normal alveolar-capillary interface, and normal lung and chest wall compliance. Descent of the diaphragm and chest wall expansion with inspiration typically generate a fall in pleural pressure of 3-5 cm H</span><sub data-dcnode-id="3824"><span data-dcnode-id="3825" instrument_node="">2</span></sub><span data-dcnode-id="3823" instrument_node="">O, which is sufficient to generate a normal tidal volume of 5-7 cc per kilogram. The normal fall in pleural pressure is partially transmitted across the thin-walled pulmonary vessels, causing modest differences between right atrial, pulmonary arterial, and left atrial (also, pulmonary artery wedge pressure, PAWP) pressures between inspiration and end-expiration. Correct measurement of these pressures should be done at end-expiration, when gas flow and pressure in the lung is near zero, allowing for pressure estimation in the absence of respiratory influence. The appropriate matching of ventilation and perfusion as well as normal alveolar-capillary diffusion distance typically ensure normal oxygenation, while normal ventilation requires appropriate central control and peripheral (airway, chest wall) function to regulate arterial carbon dioxide tension.</span></p><p data-dcnode-id="3817" id="__p6"><span data-dcnode-id="3821" instrument_node="">It is useful to think of the heart and lung as functioning as a coupled unit. We will consider coupling at two anato-physiological interfaces. First, there is the right heart-pulmonary vascular interface. The compliant and relatively nonmuscular RV is normally coupled to a low impedence pulmonary circulation, permitting the RV to eject large volumes of blood at low filling pressures and at a low energetic cost. As such, the RV can be thought of as a flow generator, in contrast to the LV which generates a great deal more pressure at the same level of flow. The second interface occurs at the alveolar-pulmonary vascular level. With elastic recoil of the chest-lung unit, alveolar pressure is ≈0 mmHg at end-expiration. Thus, at the base of the lung, or West Lung Zone 3 (where the bulk of ventilation and perfusion occur in upright posture), alveolar pressure does not exert any resistance effect on the pulmonary vasculature.[</span><a aria-expanded="false" aria-haspopup="true" class="bibr popnode tag_hotlink tag_tooltip" data-dcnode-id="3819" href="#ref4" id="__tag_310253790" rid="ref4" role="button"><span data-dcnode-id="3820" instrument_node="">4</span></a><span data-dcnode-id="3818" instrument_node="">] Changes in pleural pressure generation and transmission can be thought of as another interface between the heart and lung and will be incorporated into the discussion.</span></p><p class="p p-last" data-dcnode-id="3815" id="__p7"><span data-dcnode-id="3816" instrument_node="">Considering the conceptual framework of normal heart-lung coupling, it becomes more apparent how various perturbations, or uncoupling, of the heart-lung interaction can lead to various expressions and degrees of PHD.</span></p></div><div class="tsec sec" data-dcnode-id="3697" id="sec1-2"><div class="goto jig-ncbiinpagenav-goto-container" data-dcnode-id="3811"><a aria-expanded="false" aria-haspopup="true" class="tgt_dark page-toc-label jig-ncbiinpagenav-goto-heading" data-dcnode-id="3812" href="#" role="button" title="Go to other sections in this page"><span data-dcnode-id="3813" instrument_node="">Go to:</span></a></div><h2 class="head no_bottom_margin ui-helper-clearfix" data-dcnode-id="3809" id="sec1-2title"><span data-dcnode-id="3810" instrument_node="">EFFECTS OF CRD ON LUNG FUNCTION</span></h2><p class="p p-first" data-dcnode-id="3800" id="__p8"><span data-dcnode-id="3808" instrument_node="">Please refer to the flow diagram (</span><a class="fig-table-link figpopup" co-legend-rid="lgnd_F1" data-dcnode-id="3805" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.ncbi.nlm.nih.gov/pmc/articles/PMC3641739/figure/F1/" rid-figpopup="F1" rid-ob="ob-F1" target="figure"><span data-dcnode-id="3806"><span data-dcnode-id="3807" instrument_node="">Fig. 1</span></span></a><span data-dcnode-id="3804" instrument_node="">) which illustrates the varying physiological perturbations and integrated physiological changes that occur in response to an abnormal respiratory structure and function. Chronic obstructive pulmonary disease, ILD, and hypoventilatory disorders may lead to PHD. In each case, there is an invariable association between abnormal gas exchange, pulmonary hypertension, and altered right heart structure and/or function. Thus, it is distinctly uncommon for CRD to lead to PHD without concomitant hypoxemia and/or hypercapnia. Thus, an abnormal arterial blood gas may be as much a </span><em data-dcnode-id="3802"><span data-dcnode-id="3803" instrument_node="">sine qua non</span></em><span data-dcnode-id="3801" instrument_node=""> for PHD as pulmonary hypertension.</span></p><p data-dcnode-id="3771" id="__p9"><span data-dcnode-id="3799" instrument_node="">Hypoxia leads to vasodilation in systemic arteries and vasoconstriction in the pulmonary vascular bed. Hypoxic pulmonary vasoconstriction (HPV) is a physiological response designed to maintain ventilation-perfusion matching in response to alveolar hypoxia. This unique vascular response was first noted in the feline circulation, but is present in varying intensity across mammalian species once the alveolar pO</span><sub data-dcnode-id="3797"><span data-dcnode-id="3798" instrument_node="">2</span></sub><span data-dcnode-id="3796" instrument_node=""> drops below 50-60 mmHg.[</span><a aria-expanded="false" aria-haspopup="true" class="bibr popnode" data-dcnode-id="3794" href="#ref5" rid="ref5" role="button"><span data-dcnode-id="3795" instrument_node="">5</span></a><span data-dcnode-id="3793" instrument_node="">,</span><a aria-expanded="false" aria-haspopup="true" class="bibr popnode tag_hotlink tag_tooltip" data-dcnode-id="3791" href="#ref6" id="__tag_310253800" rid="ref6" role="button"><span data-dcnode-id="3792" instrument_node="">6</span></a><span data-dcnode-id="3790" instrument_node="">] Mechanisms involved in HPV include direct oxygen sensing within the vascular smooth muscle, changes in redox state, and altered paracrine signaling from the vascular endothelium.[</span><a aria-expanded="false" aria-haspopup="true" class="bibr popnode tag_hotlink tag_tooltip" data-dcnode-id="3788" href="#ref6" id="__tag_310253820" rid="ref6" role="button"><span data-dcnode-id="3789" instrument_node="">6</span></a><span data-dcnode-id="3787" instrument_node="">] Generally, HPV leads to a rise in the PA pressure; however, the pulmonary hemodynamic responses to hypoxia are quite variable. Studies in healthy human volunteers and patients with COPD have shown that pulmonary hypertension in response to acute hypoxia represents an aggregate effect of both a modest increase in the cardiac output (CO) and increased pulmonary vascular resistance (PVR).[</span><a aria-expanded="false" aria-haspopup="true" class="bibr popnode tag_hotlink tag_tooltip" data-dcnode-id="3785" href="#ref7" id="__tag_310253785" rid="ref7" role="button"><span data-dcnode-id="3786" instrument_node="">7</span></a><span data-dcnode-id="3784" instrument_node="">–</span><a aria-expanded="false" aria-haspopup="true" class="bibr popnode tag_hotlink tag_tooltip" data-dcnode-id="3782" href="#ref9" id="__tag_310253761" rid="ref9" role="button"><span data-dcnode-id="3783" instrument_node="">9</span></a><span data-dcnode-id="3781" instrument_node="">] The variability in the HPV response is likely multifactorial, but seems to relate in part to the degree of muscularization of the pulmonary arteries at baseline, modulating effects of blood pH, and possibly genetic predisposition.[</span><a aria-expanded="false" aria-haspopup="true" class="bibr popnode tag_hotlink tag_tooltip" data-dcnode-id="3779" href="#ref10" id="__tag_310253763" rid="ref10" role="button"><span data-dcnode-id="3780" instrument_node="">10</span></a><span data-dcnode-id="3778" instrument_node="">] Acute correction of hypoxia with supplemental oxygen exerts the opposite hemodynamic effects, with the fall in pulmonary artery pressure typically occurring due to reductions in heart rate, stroke volume, and PVR; as with HPV, changes in mean pulmonary artery pressure (mPAP) to oxygen are variable. In response to hypoxia or hyperoxia, the respective rise and fall in mPAP varies in proportion to the magnitude change in pO</span><sub data-dcnode-id="3776"><span data-dcnode-id="3777" instrument_node="">2</span></sub><span data-dcnode-id="3775" instrument_node="">.[</span><a aria-expanded="false" aria-haspopup="true" class="bibr popnode tag_hotlink tag_tooltip" data-dcnode-id="3773" href="#ref9" id="__tag_310253795" rid="ref9" role="button"><span data-dcnode-id="3774" instrument_node="">9</span></a><span data-dcnode-id="3772" instrument_node="">]</span></p><p data-dcnode-id="3751" id="__p10"><span data-dcnode-id="3770" instrument_node="">Chronic hypoxia effects the pulmonary vasculature through both tonic vasoconstriction and likely to a greater degree, vascular remodeling with muscularization and proliferation of the vascular media and intima, respectively.[</span><a aria-expanded="false" aria-haspopup="true" class="bibr popnode tag_hotlink tag_tooltip" data-dcnode-id="3768" href="#ref11" id="__tag_310253819" rid="ref11" role="button"><span data-dcnode-id="3769" instrument_node="">11</span></a><span data-dcnode-id="3767" instrument_node="">] Patients with COPD and healthy natives at altitudes &gt; 3,500 meters demonstrate similar pulmonary vascular morphology.[</span><a aria-expanded="false" aria-haspopup="true" class="bibr popnode" data-dcnode-id="3765" href="#ref12" rid="ref12" role="button"><span data-dcnode-id="3766" instrument_node="">12</span></a><span data-dcnode-id="3764" instrument_node="">] Vascular remodeling likely explains why there is only partial reversal of the increased PVR in response to oxygen administration or inhaled nitric oxide in patients with PH and CRD.[</span><a aria-expanded="false" aria-haspopup="true" class="bibr popnode tag_hotlink tag_tooltip" data-dcnode-id="3762" href="#ref2" id="__tag_310253805" rid="ref2" role="button"><span data-dcnode-id="3763" instrument_node="">2</span></a><span data-dcnode-id="3761" instrument_node="">,</span><a aria-expanded="false" aria-haspopup="true" class="bibr popnode tag_hotlink tag_tooltip" data-dcnode-id="3759" href="#ref13" id="__tag_310253786" rid="ref13" role="button"><span data-dcnode-id="3760" instrument_node="">13</span></a><span data-dcnode-id="3758" instrument_node="">] Interestingly, long-term oxygen therapy (LTOT) in patients with COPD did not lead to significant reductions in mPAP or PVR over a six-year period; however, despite progressive worsening of FEV</span><sub data-dcnode-id="3756"><span data-dcnode-id="3757" instrument_node="">1</span></sub><span data-dcnode-id="3755" instrument_node=""> and hypoxemia, the hemodynamics remained stable, suggesting that part of the survival benefit for LTOT relates to interrupted hemodynamic decline in these patients as lung function progressively deteriorates.[</span><a aria-expanded="false" aria-haspopup="true" class="bibr popnode tag_hotlink tag_tooltip" data-dcnode-id="3753" href="#ref13" id="__tag_310253793" rid="ref13" role="button"><span data-dcnode-id="3754" instrument_node="">13</span></a><span data-dcnode-id="3752" instrument_node="">]</span></p><p data-dcnode-id="3728" id="__p11"><span data-dcnode-id="3750" instrument_node="">Hypercapnia seems to have a comparatively lesser effect on pulmonary vascular tone as hypoxia, with the increase in hydrogen ion concentration, and not the pCO</span><sub data-dcnode-id="3748"><span data-dcnode-id="3749" instrument_node="">2</span></sub><span data-dcnode-id="3747" instrument_node=""> itself mediating the vasoconstriction. However, the ventilatory response to hypoxia seems to exert an important modulating effect on the degree of HPV, as changes in minute ventilation and arterial pCO</span><sub data-dcnode-id="3745"><span data-dcnode-id="3746" instrument_node="">2</span></sub><span data-dcnode-id="3744" instrument_node=""> correlate inversely with the vascular response to hypoxia; more robust ventilatory responses to hypoxia both abrogate the fall in pO</span><sub data-dcnode-id="3742"><span data-dcnode-id="3743" instrument_node="">2</span></sub><span data-dcnode-id="3741" instrument_node=""> and maintain a normal or low pCO</span><sub data-dcnode-id="3739"><span data-dcnode-id="3740" instrument_node="">2</span></sub><span data-dcnode-id="3738" instrument_node=""> during hypoxia. This serves to lessen the amplifying effect of a falling pH on HPV.[</span><a aria-expanded="false" aria-haspopup="true" class="bibr popnode tag_hotlink tag_tooltip" data-dcnode-id="3736" href="#ref7" id="__tag_310253771" rid="ref7" role="button"><span data-dcnode-id="3737" instrument_node="">7</span></a><span data-dcnode-id="3735" instrument_node="">,</span><a aria-expanded="false" aria-haspopup="true" class="bibr popnode tag_hotlink tag_tooltip" data-dcnode-id="3733" href="#ref14" id="__tag_310253810" rid="ref14" role="button"><span data-dcnode-id="3734" instrument_node="">14</span></a><span data-dcnode-id="3732" instrument_node="">] Thus, patients with both hypoxia and hypercapnia (i.e., obesity hypoventilation) are at greater risk of developing PH in response to hypoxia; this may explain why patients with sleep-disordered breathing generally require both daytime hypoxia and hypercapnia to develop significant daytime pulmonary hypertension.[</span><a aria-expanded="false" aria-haspopup="true" class="bibr popnode tag_hotlink tag_tooltip" data-dcnode-id="3730" href="#ref15" id="__tag_310253801" rid="ref15" role="button"><span data-dcnode-id="3731" instrument_node="">15</span></a><span data-dcnode-id="3729" instrument_node="">] We will discuss important extracardiac physiological effects of hypercapnia below.</span></p><p data-dcnode-id="3720" id="__p12"><span data-dcnode-id="3727" instrument_node="">More directly, PVR varies in a U-shaped distribution with lung volumes. As such, at very low lung volumes, or in the setting of widespread atelectasis, a derecruitment of the passive pulmonary vasculature leads to relative loss vascular surface area and can increase the PVR. This may occur in patients with sleep-disordered breathing during an apneic event. The more common scenario in clinical medicine is hyperinflation; at extremes of hyperinflation, such as severe air trapping from reactive airway disease or during the process known as “auto-peep” or “breath stacking” in mechanically ventilated patients, alveolar pressure may increase quite substantially, greatly exceeding pulmonary capillary and arteriolar pressure, thus compressing the pulmonary vasculature and increasing vascular resistance.[</span><a aria-expanded="false" aria-haspopup="true" class="bibr popnode tag_hotlink tag_tooltip" data-dcnode-id="3725" href="#ref16" id="__tag_310253826" rid="ref16" role="button"><span data-dcnode-id="3726" instrument_node="">16</span></a><span data-dcnode-id="3724" instrument_node="">–</span><a aria-expanded="false" aria-haspopup="true" class="bibr popnode tag_hotlink tag_tooltip" data-dcnode-id="3722" href="#ref18" id="__tag_310253828" rid="ref18" role="button"><span data-dcnode-id="3723" instrument_node="">18</span></a><span data-dcnode-id="3721" instrument_node="">]</span></p><p data-dcnode-id="3712" id="__p13"><span data-dcnode-id="3719" instrument_node="">Longstanding hypoxemia leads to secondary erythrocytosis and a rise in blood viscosity. An increase in the hemoglobin concentration from 12-17 g/dl can increase the blood viscosity by 50-75%. At hemoglobin concentrations above 17 g/dl, blood viscosity increases exponentially to values three-fold normal.[</span><a aria-expanded="false" aria-haspopup="true" class="bibr popnode" data-dcnode-id="3717" href="#ref19" rid="ref19" role="button"><span data-dcnode-id="3718" instrument_node="">19</span></a><span data-dcnode-id="3716" instrument_node="">] Owed to the direct relationship between blood viscosity (η) and vascular resistance (R = η L/r</span><sup data-dcnode-id="3714"><span data-dcnode-id="3715" instrument_node="">4</span></sup><span data-dcnode-id="3713" instrument_node="">), pulmonary vascular resistance will rise in direct proportion.</span></p><p data-dcnode-id="3706" id="__p14"><span data-dcnode-id="3711" instrument_node="">Lastly, loss of pulmonary vascular surface area due to lung destruction serves to increase the pulmonary vascular resistance. In the relative absence of pulmonary vascular disease in viable lung tissue, extensive lung destruction is required to cause a substantive increase in the PVR. However, if pulmonary vascular disease is present, vascular loss and vasoconstriction will have additive effects, typically leading to marked increases in the PVR (</span><a class="fig-table-link figpopup" co-legend-rid="lgnd_F1" data-dcnode-id="3708" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.ncbi.nlm.nih.gov/pmc/articles/PMC3641739/figure/F1/" rid-figpopup="F1" rid-ob="ob-F1" target="figure"><span data-dcnode-id="3709"><span data-dcnode-id="3710" instrument_node="">Fig. 1</span></span></a><span data-dcnode-id="3707" instrument_node="">).</span></p><p class="p p-last" data-dcnode-id="3698" id="__p15"><span data-dcnode-id="3705" instrument_node="">Thus, in the setting of CRD, varying degrees of hypoxia, hypercapnia, lung hyperinflation, secondary erythrocytosis, and loss of pulmonary vascular surface area lead to the inevitable association of CRD with varying degrees of pulmonary hypertension. Despite the invariable association between PH and PHD, the degree to which the PH itself is directly causal to the PHD varies quite substantially. Although most patients with CRD, PH, and PHD have a normal left atrial pressure, this should not be assumed, especially in older subjects and those with obesity and sleep-disordered breathing, where left atrial hypertension is quite common and may be the predominant cause of PH.[</span><a aria-expanded="false" aria-haspopup="true" class="bibr popnode tag_hotlink tag_tooltip" data-dcnode-id="3703" href="#ref20" id="__tag_310253778" rid="ref20" role="button"><span data-dcnode-id="3704" instrument_node="">20</span></a><span data-dcnode-id="3702" instrument_node="">,</span><a aria-expanded="false" aria-haspopup="true" class="bibr popnode tag_hotlink tag_tooltip" data-dcnode-id="3700" href="#ref21" id="__tag_310253766" rid="ref21" role="button"><span data-dcnode-id="3701" instrument_node="">21</span></a><span data-dcnode-id="3699" instrument_node="">] Pulmonary venous congestion is often very poorly tolerated in these patients, likely in part to the added deleterious effect on already compromised lung mechanics and gas exchange. In this setting, the diagnosis and treatment of underlying left heart congestion can lead to marked clinical improvements. The varying hemodynamics within PHD will be discussed in greater detail in the sections on cardiopulmonary interaction, as well as when we discuss the phenotypes of Type I and II PHD.</span></p></div><div class="tsec sec" data-dcnode-id="3641" id="sec1-3"><div class="goto jig-ncbiinpagenav-goto-container" data-dcnode-id="3694"><a aria-expanded="false" aria-haspopup="true" class="tgt_dark page-toc-label jig-ncbiinpagenav-goto-heading" data-dcnode-id="3695" href="#" role="button" title="Go to other sections in this page"><span data-dcnode-id="3696" instrument_node="">Go to:</span></a></div><h2 class="head no_bottom_margin ui-helper-clearfix" data-dcnode-id="3692" id="sec1-3title"><span data-dcnode-id="3693" instrument_node="">EFFECTS OF CRD ON CARDIOVASCULAR FUNCTION</span></h2><p class="p p-first" data-dcnode-id="3690" id="__p16"><span data-dcnode-id="3691" instrument_node="">Basic physiology dictates that changes in ventricular preload, afterload, and contractility modulate biventricular performance. Cardiac and renal functions are linked by the effects of cardiovascular reflexes on renal blood flow distribution and neurohormonal control of salt and water handling, which thus alters cardiac preload. Chronic respiratory diseases may affect any or all aspects of cardiorenal function with cardiac performance in the individual patient being determined by a complex interplay between these factors.</span></p><p data-dcnode-id="3676" id="__p17"><span data-dcnode-id="3689" instrument_node="">Arterial hypoxemia (pO</span><sub data-dcnode-id="3687"><span data-dcnode-id="3688" instrument_node="">2</span></sub><span data-dcnode-id="3686" instrument_node=""> &lt; 60 mmHg) leads to stimulation of peripheral chemoreceptors in the carotid body and aorta. The primary physiological effects of peripheral chemoreceptor activation include intense systemic vasoconstriction (this overrides the direct systemic vasodilatory effect of hypoxia) to the renal, splanchnic, skeletal muscle, and cutaneous circulations, with cerebral and coronary artery vasodilation (“head and heart” circulation) as well as bradycardia. This redistributes relatively desaturated blood to the most vital organs and reduces myocardial oxygen demand. However, in the intact circulation, arterial hypoxia also stimulates increased ventilation (to correct hypercapnia and hypoxemia), which stimulates pulmonary stretch receptors that override the chemoreceptor vasoconstrictor response, leading to net systemic vasodilation and increased sympathetic tone to the heart. As a result, hypoxemia typically results in a fall in systemic vascular resistance (SVR) and increased sympathetic input, both of which lead to increases in stroke volume, heart rate, and cardiac output. Chronic stimulation of the peripheral chemoreflex is likely an important reason for why patients with advanced lung disease commonly are in a relatively high cardiac output state. The increased cardiac output is also likely to be driven in part by reflex-mediated and direct sympathomimetic effects of dyspnea. In fact, patients with advanced COPD are in a constant state of increased sympathetic tone.[</span><a aria-expanded="false" aria-haspopup="true" class="bibr popnode tag_hotlink tag_tooltip" data-dcnode-id="3684" href="#ref22" id="__tag_310253798" rid="ref22" role="button"><span data-dcnode-id="3685" instrument_node="">22</span></a><span data-dcnode-id="3683" instrument_node="">yn</span><a aria-expanded="false" aria-haspopup="true" class="bibr popnode tag_hotlink tag_tooltip" data-dcnode-id="3681" href="#ref24" id="__tag_310253797" rid="ref24" role="button"><span data-dcnode-id="3682" instrument_node="">24</span></a><span data-dcnode-id="3680" instrument_node="">] In turn, acute oxygen administration in the setting of hypoxemia typically leads to rapid reductions in heart rate and cardiac output, likely from chemoreceptor deactivation and thus, sympatholysis.[</span><a aria-expanded="false" aria-haspopup="true" class="bibr popnode tag_hotlink tag_tooltip" data-dcnode-id="3678" href="#ref9" id="__tag_310253808" rid="ref9" role="button"><span data-dcnode-id="3679" instrument_node="">9</span></a><span data-dcnode-id="3677" instrument_node="">]</span></p><p data-dcnode-id="3674" id="__p18"><span data-dcnode-id="3675" instrument_node="">An often overlooked physiological effect of hypoxemia, and in particular, hypercapnia is on renal blood flow and ultimately, salt and water reabsorption. Patients with PHD are often edematous, and edema is often used synonymously with right heart failure. However, this deserves clarification. In the context of heart failure, edema results from net expansion of the extracellular volume compartment as a result of a fall in effective circulating volume, leading to arterial and renal baroreceptor stimulation and activation of the renin-angiotensin-aldosterone-sympathetic (RAAS) cascade. Classically, this is associated with a reduced cardiac stroke volume and output as well as cardiac congestion. However, most patients with CRD and edema have normal or high cardiac outputs in the context of edema, and many have normal right atrial pressure. Moreover, following resolution of the edema, patients with CRD typically have a fall in cardiac output; taken together, these findings make a pure “cardiocentric” explanation for edema in PHD far less likely.</span></p><p data-dcnode-id="3657" id="__p19"><span data-dcnode-id="3673" instrument_node="">Early observations of patients with COPD and edema noted the poor correlation between edema, cardiac output, and right atrial pressure, as well as pulmonary artery pressures. A far stronger correlation was seen between edema and hypercapnia. Campbell et al., state “oedema is rarely present if the pCO</span><sub data-dcnode-id="3671"><span data-dcnode-id="3672" instrument_node="">2</span></sub><span data-dcnode-id="3670" instrument_node=""> is normal. If oedema is present, the pCO</span><sub data-dcnode-id="3668"><span data-dcnode-id="3669" instrument_node="">2</span></sub><span data-dcnode-id="3667" instrument_node=""> is almost always raised.” Typically, hypoxemia is more severe in the edematous patient with CRD; however, without concomitant hypercapnia, edema is usually not present.[</span><a aria-expanded="false" aria-haspopup="true" class="bibr popnode tag_hotlink tag_tooltip" data-dcnode-id="3665" href="#ref25" id="__tag_310253787" rid="ref25" role="button"><span data-dcnode-id="3666" instrument_node="">25</span></a><span data-dcnode-id="3664" instrument_node="">,</span><a aria-expanded="false" aria-haspopup="true" class="bibr popnode tag_hotlink tag_tooltip" data-dcnode-id="3662" href="#ref26" id="__tag_310253781" rid="ref26" role="button"><span data-dcnode-id="3663" instrument_node="">26</span></a><span data-dcnode-id="3661" instrument_node="">] Indeed, there is evidence to suggest that hypercapnia, and likely hypoxemia, through direct effects and peripheral chemoreceptor reflex stimulation, leads to marked reductions in renal blood flow, even in the presence of a normal or increased cardiac output. In the context of reduced renal blood flow, the glomerular filtration rate typically remains normal, indicating that renal filtration fraction increases which promotes increased proximal tubular salt/water retention. This process is aided by RAAS activation, which is known to occur in CRD, likely primarily from the effects of hypoxemia and hypercapnia on chemoreceptor activation and disruptions in renal blood flow. Some have theorized that the associated systemic vasodilation of hypercapnia leads to a reduction in effective circulating volume (similar to cirrhosis or nephrotic syndrome), RAAS activation, altered renal blood flow, and net renal sodium/water reabsorption.[</span><a aria-expanded="false" aria-haspopup="true" class="bibr popnode tag_hotlink tag_tooltip" data-dcnode-id="3659" href="#ref27" id="__tag_310253779" rid="ref27" role="button"><span data-dcnode-id="3660" instrument_node="">27</span></a><span data-dcnode-id="3658" instrument_node="">] Presumably, the added stimulus of an impaired cardiac output, seen in some patients with PHD, would only serve to amplify this feedback loop. It generally holds true that patients with chronic respiratory diseases typically associated with hypercapnia (i.e., COPD, thoracic cage abnormalities, obesity hypoventilation syndrome) are more likely to present with edema, as opposed to the diseases associated with hypoxia alone (i.e., idiopathic pulmonary fibrosis).</span></p><p class="p" data-dcnode-id="3649" id="__p20"><span data-dcnode-id="3656" instrument_node="">Correction of hypercapnia and hypoxemia often leads to decreased renal vascular resistance, thus restoring renal blood flow to normal.[</span><a aria-expanded="false" aria-haspopup="true" class="bibr popnode tag_hotlink tag_tooltip" data-dcnode-id="3654" href="#ref28" id="__tag_310253794" rid="ref28" role="button"><span data-dcnode-id="3655" instrument_node="">28</span></a><span data-dcnode-id="3653" instrument_node="">,</span><a aria-expanded="false" aria-haspopup="true" class="bibr popnode tag_hotlink tag_tooltip" data-dcnode-id="3651" href="#ref29" id="__tag_310253806" rid="ref29" role="button"><span data-dcnode-id="3652" instrument_node="">29</span></a><span data-dcnode-id="3650" instrument_node="">] This typically results in diuresis and natriuresis as has been reported by some, and consistently observed by clinicians in edematous patients with decompensated CRD shortly after correction of hypoxemia and hypercapnia even in the absence of diuretics.</span></p><div class="sec sec-last" data-dcnode-id="3642" id="sec2-1"><h3 data-dcnode-id="3647" id="sec2-1title"><span data-dcnode-id="3648" instrument_node="">Right heart congestion and right heart failure</span></h3><p class="p p-first" data-dcnode-id="3645" id="__p21"><span data-dcnode-id="3646" instrument_node="">Is there a difference between right heart congestion and right heart failure? Many conditions can lead to increased right atrial pressure or congestion. However, this may not necessarily indicate that the right heart is indeed failing. This seems to be an important distinction, as the term right heart failure often implicates the RV as the root cause, when in fact, the RV may be an innocent bystander in many subjects with CRD and mildly increased jugular venous pressure. Thus, we prefer to use the term right heart failure when there is evidence of both right heart congestion and impaired RV systolic function. Ideally, right heart failure should be supported by both echocardiographic evidence of impaired RV systolic function and hemodynamics showing an increased right atrial pressure and depressed stroke volume index. Moreover, there should be a relative absence of echocardiographic and hemodynamic features of left heart dysfunction. In the context of mildly increased right heart filling pressures and normal RV systolic function, the right heart is congested, but not failing.</span></p><p class="p p-last" data-dcnode-id="3643" id="__p22"><span data-dcnode-id="3644" instrument_node="">Edema is variably present with RHF, often dictated by the tempo of onset of the RV failure. Thus, the presence or absence of edema should not be used as the primary judge of whether RHF is present. Moreover, edema should be considered as an integrated cardiorenal response, which, in the setting of CRD, may primarily reflect acute or chronic hypoxemia and hypercapnia even if cardiac function is normal. In most patients with PHD, when edematous, there is either no evidence, or mild evidence, of right heart congestion in the context of a normal cardiac output. A smaller subset of patients with PHD have a more traditional presentation of RHF, with overt right heart congestion, objective evidence of RV dysfunction, and a depressed cardiac output, typically with a markedly increased PVR.</span></p></div></div><div class="tsec sec" data-dcnode-id="3582" id="sec1-4"><div class="goto jig-ncbiinpagenav-goto-container" data-dcnode-id="3638"><a aria-expanded="false" aria-haspopup="true" class="tgt_dark page-toc-label jig-ncbiinpagenav-goto-heading" data-dcnode-id="3639" href="#" role="button" title="Go to other sections in this page"><span data-dcnode-id="3640" instrument_node="">Go to:</span></a></div><h2 class="head no_bottom_margin ui-helper-clearfix" data-dcnode-id="3636" id="sec1-4title"><span data-dcnode-id="3637" instrument_node="">EFFECTS OF CRD ON THE CARDIOPULMONARY INTERACTION</span></h2><div class="sec sec-first" data-dcnode-id="3623" id="sec2-2"><h3 data-dcnode-id="3634" id="sec2-2title"><span data-dcnode-id="3635" instrument_node="">Diastolic interactions</span></h3><p class="p p-first" data-dcnode-id="3632" id="__p23"><span data-dcnode-id="3633" instrument_node="">Right ventricular hypertrophy is inherent to PHD, likely owed to an overall increase (in varying proportion) in pressure-volume work imposed by CRD and associated PH, and possibly other factors such as increased RV afterload related to extremes of pleural pressure, and possibly the hypertrophic effects of chronic neurohormonal activation on the RV. Volume expansion is common in PHD for the reasons highlighted above. Even in the presence of normal RV systolic function, the distensibility of the right heart in PHD is abnormal, thus predisposing the patient to mild-to-moderate RV congestion in parallel with increased ECV status. This is analogous to the effects of the interaction between impaired renal function and LV “diastolic dysfunction” in patients with hypertensive heart disease. The imposition of overt RV systolic dysfunction typically lends to more severe RV congestion, both by providing an increased stimulus for RAAS activation through a reduced cardiac output as well as a lesser ability to compensate for the increased preload due to a flattened cardiac function curve.</span></p><p class="p p-last" data-dcnode-id="3624" id="__p24"><span data-dcnode-id="3631" instrument_node="">Owed to shared risk factors, such as tobacco abuse and older age, many patients with COPD have concomitant left heart disease, including coronary artery disease, systemic arteriosclerosis, and hypertensive heart disease. As such, volume retention related to their respiratory disease will often expose or exacerbate concomitant left heart disease, and thus symptomatic left heart congestion must be considered in these patients, especially during acute respiratory exacerbations. This same paradigm holds true in patients with obesity and sleep-disordered breathing, where hypertensive heart disease and nonsystolic heart failure are quite common, and in fact, may dominate the clinical picture.[</span><a aria-expanded="false" aria-haspopup="true" class="bibr popnode tag_hotlink tag_tooltip" data-dcnode-id="3629" href="#ref21" id="__tag_310253814" rid="ref21" role="button"><span data-dcnode-id="3630" instrument_node="">21</span></a><span data-dcnode-id="3628" instrument_node="">,</span><a aria-expanded="false" aria-haspopup="true" class="bibr popnode tag_hotlink tag_tooltip" data-dcnode-id="3626" href="#ref30" id="__tag_310253807" rid="ref30" role="button"><span data-dcnode-id="3627" instrument_node="">30</span></a><span data-dcnode-id="3625" instrument_node="">]</span></p></div><div class="sec" data-dcnode-id="3604" id="sec2-3"><h3 data-dcnode-id="3621" id="sec2-3title"><span data-dcnode-id="3622" instrument_node="">Systolic interactions</span></h3><p class="p p-first" data-dcnode-id="3609" id="__p25"><span data-dcnode-id="3620" instrument_node="">As detailed above, the right heart and pulmonary circulation function as a coupled unit such that the ventricular-vascular interaction, or relationship between intrinsic contractility of the RV and its afterload, ultimately dictates RV systolic performance (</span><a class="fig-table-link figpopup" co-legend-rid="lgnd_F1" data-dcnode-id="3617" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.ncbi.nlm.nih.gov/pmc/articles/PMC3641739/figure/F1/" rid-figpopup="F1" rid-ob="ob-F1" target="figure"><span data-dcnode-id="3618"><span data-dcnode-id="3619" instrument_node="">Fig. 1</span></span></a><span data-dcnode-id="3616" instrument_node="">). In most patients with PHD, RV contractility is normal or increased due to the lack of primary insults to the RV such as ischemia, infiltrative disease, or other forms of myopathy. Thus, RV afterload is the critical determinant of RV performance in the setting of CRD.[</span><a aria-expanded="false" aria-haspopup="true" class="bibr popnode tag_hotlink tag_tooltip" data-dcnode-id="3614" href="#ref31" id="__tag_310253775" rid="ref31" role="button"><span data-dcnode-id="3615" instrument_node="">31</span></a><span data-dcnode-id="3613" instrument_node="">,</span><a aria-expanded="false" aria-haspopup="true" class="bibr popnode tag_hotlink tag_tooltip" data-dcnode-id="3611" href="#ref32" id="__tag_310253782" rid="ref32" role="button"><span data-dcnode-id="3612" instrument_node="">32</span></a><span data-dcnode-id="3610" instrument_node="">] Naturally, if the RV is intrinsically dysfunctional, then any added vascular load is especially devastating.</span></p><p data-dcnode-id="3607" id="__p26"><span data-dcnode-id="3608" instrument_node="">Varying degrees of pulmonary hypertension often result from an abnormal RV-pulmonary vascular interaction. However, the increased pulmonary artery pressure is the result, not the cause, of the RV-PA mismatch. Therefore, pulmonary artery pressure should not be used interchangeably with RV afterload. Afterload represents the opposition to blood flow, and is accounted for by proximal artery stiffness (which dictates the degree and timing of arterial wave reflection) and distal pulmonary vascular resistance. Pulmonary vascular resistance accounts for approximately 80% of afterload in most patients and represents the mostly clearly quantifiable aspect of afterload in clinical medicine. Thus, PVR is a far better measure of afterload than pressure. Practically speaking, this is why PH is far more common than the combination of PH and RV systolic failure in the context of PHD.</span></p><p class="p p-last" data-dcnode-id="3605" id="__p27"><span data-dcnode-id="3606" instrument_node="">It is best not to consider the pressure in isolation, but rather, to consider the components of the pressure (flow, resistance, left atrial pressure) in order to understand its “upstream” effect on the RV. Naturally, invasive quantitation of hemodynamics is not plausible in every patient with pulmonary heart disease. However, the noninvasive assessment provides important insights into the pathophysiology of PH in an individual patient, and allows direct visualization of size, shape, and function changes that are fundamental to relative degrees of uncoupling of the right heart from the pulmonary circulation. Most patients with PHD have relatively mild PH related to mildly increased pulmonary vascular resistance with preserved RV systolic function, and thus, preserved RV stroke volume and cardiac output. In contrast, a small but important subset of patients with PHD has PH related to marked increases in the pulmonary vascular resistance, such that the RV can no longer adapt, and over RV systolic dysfunction results. In essence, the fundamental distinction between these two phenotypes is the degree of pulmonary vascular disease, which provides an important pathophysiologic foundation for the two different phenotypes of PHD, which will be discussed below.</span></p></div><div class="sec sec-last" data-dcnode-id="3583" id="sec2-4"><h3 data-dcnode-id="3602" id="sec2-4title"><span data-dcnode-id="3603" instrument_node="">Respiratory interactions</span></h3><p class="p p-first" data-dcnode-id="3591" id="__p28"><span data-dcnode-id="3601" instrument_node="">As mentioned above, pulmonary mechanics can affect cardiac function. In the context of airway obstruction, alveolar pressure increases and can exert a compressive effect on the neighboring pulmonary vasculature. As such, with marked hyperinflation, the pulmonary vascular resistance will increase. This scenario is especially relevant during extremes of hyperinflation, as seen in patients with acute exacerbations of asthma or COPD. Following the principles of ventricular-vascular coupling, the greater the degree of RV dysfunction at baseline, the greater the hemodynamic significance of any added vascular load imposed by the Starling resistor effect of airway pressure on pulmonary resistance. Some have theorized that the diseased lungs themselves may exert an external constraint on the heart, particularly when hyperinflated, thus modifying cardiac performance.[</span><a aria-expanded="false" aria-haspopup="true" class="bibr popnode tag_hotlink tag_tooltip" data-dcnode-id="3599" href="#ref33" id="__tag_310253802" rid="ref33" role="button"><span data-dcnode-id="3600" instrument_node="">33</span></a><span data-dcnode-id="3598" instrument_node="">] Moreover, marked changes in pleural pressure can also be transmitted to the heart and circulation, and may lead to significant increases in ventricular wall tension. Echocardiographic studies in patients with acute bronchoconstriction have shown acute RV dilatation during inspiration, with return of normal RV dimension during expiration, likely owed to the combined effects of hyperinflation on PVR and negative pleural pressure on RV wall tension. These same studies have shown that LV cavity dimensions reciprocally diminish during RV dilatation, which may explain the frequent finding of pulsus paradoxus in patients with acute bronchoconstriction.[</span><a aria-expanded="false" aria-haspopup="true" class="bibr popnode tag_hotlink tag_tooltip" data-dcnode-id="3596" href="#ref17" id="__tag_310253765" rid="ref17" role="button"><span data-dcnode-id="3597" instrument_node="">17</span></a><span data-dcnode-id="3595" instrument_node="">,</span><a aria-expanded="false" aria-haspopup="true" class="bibr popnode tag_hotlink tag_tooltip" data-dcnode-id="3593" href="#ref34" id="__tag_310253791" rid="ref34" role="button"><span data-dcnode-id="3594" instrument_node="">34</span></a><span data-dcnode-id="3592" instrument_node="">]</span></p><p data-dcnode-id="3586" id="__p29"><span data-dcnode-id="3590" instrument_node="">Similarly, patients with obstructive sleep apnea often generate markedly negative pleural pressures during periods of upper airway obstruction, analogous to the physiology of a Mueller maneuver. Cyclic, repeated increases in ventricular wall tension are thought to be one of the mechanisms responsible for sympathetic nervous system activation in these patients, perhaps contributing to their propensity to salt and water retention, as well as the development of systemic hypertension and left ventricular hypertrophy.[</span><a aria-expanded="false" aria-haspopup="true" class="bibr popnode tag_hotlink tag_tooltip" data-dcnode-id="3588" href="#ref30" id="__tag_310253792" rid="ref30" role="button"><span data-dcnode-id="3589" instrument_node="">30</span></a><span data-dcnode-id="3587" instrument_node="">]</span></p><p class="p p-last" data-dcnode-id="3584" id="__p30"><span data-dcnode-id="3585" instrument_node="">More practically, patients with obesity, as well as obstructive and restrictive lung disease, must generate more negative pleural pressures to generate a normal tidal volume, given increased stiffness in the lung parenchyma itself or chest/abdominal constraint to normal ventilation. These larger swings in pleural pressure are transmitted to the heart and pulmonary vasculature, leading to relatively marked variation in pressure recordings obtained at end expiration versus inspiration. This is exaggerated further by lying supine, which adds further mechanical disadvantage to respiration in these patients. Thus, it is imperative that cardiac filling pressures and pulmonary artery pressures are obtained at end expiration, when respiratory influence on hemodynamics is near zero, and not taken as the electronic average of pressures across the respiratory cycle. The latter method is a common default in the modern era, where pressure recordings are often measured by the catheterization laboratory's hemodynamic acquisition software and not over-read manually by the performing physician. This can lead to marked errors in the accuracy of the hemodynamic recordings. A common scenario would be the case of an obese patient with COPD, with a pulmonary artery occlusion (wedge) pressure of 28 mmHg at end expiration and 5 mmHg with inspiration, leading to an “average” wedge pressure recorded of 15 mmHg. The result is marked underestimation of the left atrial pressure, and thus, overestimation of the PVR, leading to erroneous diagnosis of pulmonary arterial hypertension in a patient with decompensated left heart failure, with the potential for misguided pharmacotherapy.</span></p></div></div><div class="tsec sec" data-dcnode-id="3363" id="sec1-5"><div class="goto jig-ncbiinpagenav-goto-container" data-dcnode-id="3579"><a aria-expanded="false" aria-haspopup="true" class="tgt_dark page-toc-label jig-ncbiinpagenav-goto-heading" data-dcnode-id="3580" href="#" role="button" title="Go to other sections in this page"><span data-dcnode-id="3581" instrument_node="">Go to:</span></a></div><h2 class="head no_bottom_margin ui-helper-clearfix" data-dcnode-id="3577" id="sec1-5title"><span data-dcnode-id="3578" instrument_node="">PATIENT PHENOTYPES</span></h2><p class="p p-first" data-dcnode-id="3575" id="__p31"><span data-dcnode-id="3576" instrument_node="">As discussed above, PHD is a heterogeneous condition. In many patients, PHD is a marker of a severe underlying respiratory condition, with the direct and indirect effects of abnormal gas exchange being the critical determinants of altered cardiac performance. In others with PHD, cardiac size and function are more severely affected, and the (right) heart disease itself can dominate the clinical picture. Recognition of these different patient phenotypes is critically important to fully appreciate the clinical and potential therapeutic approaches to these patients.</span></p><p data-dcnode-id="3573" id="__p32"><span data-dcnode-id="3574" instrument_node="">Although not a customary schema, we will discuss PHD as occurring as two distinct entities, “Type I” and “Type II” PHD, the goal being to highlight the typical clinical, echocardiographic, and hemodynamic findings of two different phenotypes of PHD. Type I PHD will refer to subjects with chronic respiratory disease (CRD) and less than moderate degrees of RV systolic dysfunction, relatively mild increases in the pulmonary vascular resistance, with a cardiac index maintained within the normal range. This phenotype comprises the majority of PHD patients. In contrast, Type II PHD will refer to the smaller subset of patients with more marked increases in the pulmonary vascular resistance leading to a more advanced degree of right heart dysfunction, often characterized by marked RV enlargement, right heart congestion, and overt RV systolic dysfunction. Patients with this latter phenotype of PHD can often present in a fashion similar to patients with PAH. We will also discuss the treatment of PHD; however, we will do so largely in a theoretical context as the role for direct treatment of PHD and PH in CRD remains vastly understudied, and thus, poorly understood.</span></p><p data-dcnode-id="3571" id="__p33"><span data-dcnode-id="3572" instrument_node="">The fundamental distinction between the Type I and Type II PHD patient is the degree of pulmonary vascular disease present. Pulmonary vascular disease, as measured by an increased PVR, not only adversely affects right heart function, but also further impairs gas exchange, ventilatory efficiency, and in some ways, adds a “second disease” to the underlying respiratory condition. The result is that patients with PHD, with and without significant pulmonary vascular disease, often have different overall clinical presentations that cannot be distinguished on the basis of a single metric. Therefore, it seems best to describe the overall differences in the clinical, echocardiographic, hemodynamic, and exercise physiology manifestations of the two groups. We recognize that dichotomization of PHD is subject to oversimplification, given an intermediate phenotype is missed; however, by providing the boundaries of the two patient phenotypes, we trust the clinician will be able to recognize the patient with PHD whom may lie somewhere in between.</span></p><p class="p" data-dcnode-id="3563" id="__p34"><span data-dcnode-id="3570" instrument_node="">We have deliberately avoided separating the PHD phenotypes on the basis of PA pressure severity, given the presence of an increased PA pressure does not necessarily denote the presence of pulmonary vascular disease nor what comprises the pressure. It is common to consider the PA pressure in CRD as being “proportionate” or “disproportionate” to the underlying respiratory condition. For example, most patients with CRD have mild PH (i.e., mean PA pressure &lt; 35 mmHg) and this is typically considered proportionate to their underlying condition. So called disproportionate PH typically refers to patients with more severe PH (i.e., mean PA pressure &gt; 35 mmHg). This terminology has practical value, especially at the extremes of PH and also when used in real-time to describe relative changes in PA pressure (i.e., by echo-Doppler examination) relative to changes in respiratory function (i.e., pulmonary function tests or radiographic findings) in the individual patient. However, describing PHD or PH in terms of their proportionality to an underlying respiratory condition is limited by the inherent subjectivity of what one considers proportionate or not, and still does not provide sufficient pathophysiologic information about the PH itself, nor its effects on the right heart. Moreover, there is such substantial overlap in the degree of PH using the “proportionate” schema, that this approach is not especially useful when trying to differentiate one patient from another. Another pitfall of using PA pressure as the focal point of PHD is that the pressure is most commonly derived via echo-Doppler examination, which may differ significantly from invasively derived PA pressure.[</span><a aria-expanded="false" aria-haspopup="true" class="bibr popnode tag_hotlink tag_tooltip" data-dcnode-id="3568" href="#ref35" id="__tag_310253788" rid="ref35" role="button"><span data-dcnode-id="3569" instrument_node="">35</span></a><span data-dcnode-id="3567" instrument_node="">,</span><a aria-expanded="false" aria-haspopup="true" class="bibr popnode tag_hotlink tag_tooltip" data-dcnode-id="3565" href="#ref36" id="__tag_310253764" rid="ref36" role="button"><span data-dcnode-id="3566" instrument_node="">36</span></a><span data-dcnode-id="3564" instrument_node="">]</span></p><div class="sec" data-dcnode-id="3498" id="sec2-5"><h3 data-dcnode-id="3561" id="sec2-5title"><span data-dcnode-id="3562" instrument_node="">Type I PHD</span></h3><p class="p p-first" data-dcnode-id="3555" id="__p35"><span data-dcnode-id="3560" instrument_node="">Patients with Type I PHD typically have a clinical presentation that most closely resembles that of their primary underlying respiratory condition (</span><a class="fig-table-link figpopup" co-legend-rid="" data-dcnode-id="3557" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.ncbi.nlm.nih.gov/pmc/articles/PMC3641739/table/T1/" rid-figpopup="T1" rid-ob="ob-T1" target="table"><span data-dcnode-id="3558"><span data-dcnode-id="3559" instrument_node="">Table 1</span></span></a><span data-dcnode-id="3556" instrument_node="">). Therefore, increasing dyspnea will coincide with parallel deterioration of respiratory function and, in turn, will lead to transient, and typically modest, degrees of right heart congestion. Edema may or may not be present. Improvement in the underlying respiratory condition will typically coincide with improved edema and RV congestion. Exertional angina, syncope, or presyncope are distinctly uncommon, with a history of cough, wheezing, and respiratory infection often dominating the clinical picture. Aside from modest right heart congestion, the physical examination will typically reveal normal or increased arterial pulse volume and turgor. The left parasternal border is typically inactive, and the examination is more typically dominated by the respiratory findings than cardiovascular findings. The electrocardiogram may or may not manifest RVH, and the axis is either normal or vertical, typically without frank right axis deviation or RV strain. Oftentimes, the vertical axis is caused by lung hyperinflation and diaphragmatic flattening. Pulmonary function testing typically reveals relatively balanced reductions in the forced vital capacity (FVC) and diffusing capacity for carbon monoxide (DLCO), with the relative proportion of these measures remaining stable even in the context of worsening respiratory function.</span></p><div class="table-wrap anchored whole_rhythm" data-dcnode-id="3541" id="T1"><h3 data-dcnode-id="3551"><span data-dcnode-id="3552" instrument_node="">Table 1</span></h3><div class="caption" data-dcnode-id="3547"><p data-dcnode-id="3548" id="__p36"><span data-dcnode-id="3549" instrument_node="">Clinical history</span></p></div><div class="figure" data-dcnode-id="3545" data-largeobj="" data-largeobj-link-rid="largeobj_idm140601392967776"><img alt="An external file that holds a picture, illustration, etc.
Object name is PC-3-5-g002.jpg" class="fig-image" data-dcnode-id="3546" loading="lazy" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.ncbi.nlm.nih.gov/pmc/articles/PMC3641739/bin/PC-3-5-g002.jpg&amp;raw" title="An external file that holds a picture, illustration, etc.
Object name is PC-3-5-g002.jpg"></div><div class="largeobj-link align_right" data-dcnode-id="3542" id="largeobj_idm140601392967776" style="display: none;"><a data-dcnode-id="3543" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.ncbi.nlm.nih.gov/pmc/articles/PMC3641739/table/T1/%3Freport%3Dobjectonly" rel="noopener" target="object"><span data-dcnode-id="3544" instrument_node="">Open in a separate window</span></a></div></div><p data-dcnode-id="3533" id="__p37"><span data-dcnode-id="3540" instrument_node="">The echocardiogram of patients with Type I PHD will typically reveal variable degrees of increased RV wall thickness, although this is often difficult to quantify. The RV dimensions will typically remain within normal range or increase to a mild degree, with the ratio of RV to LV diastolic dimensions typically not exceeding 1.0. Importantly, right ventricular systolic function typically remains within normal limits or at most, mildly reduced. Right ventricular systolic function may be quantified using relatively simple, reproducible methods such as tricuspid annular plane systolic excursion (TAPSE) or by tissue Doppler imaging at the base of the RV. Both methods assess RV shortening along its longitudinal axis and do not require endocardial definition or volumetric estimates.[</span><a aria-expanded="false" aria-haspopup="true" class="bibr popnode tag_hotlink tag_tooltip" data-dcnode-id="3538" href="#ref37" id="__tag_310253815" rid="ref37" role="button"><span data-dcnode-id="3539" instrument_node="">37</span></a><span data-dcnode-id="3537" instrument_node="">,</span><a aria-expanded="false" aria-haspopup="true" class="bibr popnode tag_hotlink tag_tooltip" data-dcnode-id="3535" href="#ref38" id="__tag_310253772" rid="ref38" role="button"><span data-dcnode-id="3536" instrument_node="">38</span></a><span data-dcnode-id="3534" instrument_node="">] The degree of TR present is variable, depending on the degree of volume excess and annular dilatation at the time the study is performed.</span></p><p data-dcnode-id="3510" id="__p38"><span data-dcnode-id="3532" instrument_node="">Most patients with CRD have either normal PA pressure or mild pulmonary hypertension. More significant PH in the Type I PHD patient typically arises from a high cardiac output state and sometimes, concomitant left heart congestion. By Doppler estimate, the PA systolic pressure will usually not exceed 55 mmHg. In a large cohort of patients with severe COPD, the average RA pressure was 9 mmHg, with a cardiac index of 3.0 L/min/m</span><sup data-dcnode-id="3530"><span data-dcnode-id="3531" instrument_node="">2</span></sup><span data-dcnode-id="3529" instrument_node="">. The mean PA pressure was approximately 27 mmHg (systolic PA pressure 45-50 mmHg) with an average PVR of &lt; 3 mmHg/l/min.[</span><a aria-expanded="false" aria-haspopup="true" class="bibr popnode tag_hotlink tag_tooltip" data-dcnode-id="3527" href="#ref39" id="__tag_310253799" rid="ref39" role="button"><span data-dcnode-id="3528" instrument_node="">39</span></a><span data-dcnode-id="3526" instrument_node="">] Similar hemodynamics were noted in the majority of patients with idiopathic pulmonary fibrosis.[</span><a aria-expanded="false" aria-haspopup="true" class="bibr popnode tag_hotlink tag_tooltip" data-dcnode-id="3524" href="#ref40" id="__tag_310253804" rid="ref40" role="button"><span data-dcnode-id="3525" instrument_node="">40</span></a><span data-dcnode-id="3523" instrument_node="">] Likewise, most patients with sleep apnea have either normal or mildly increased PA pressure, with a normal or increased cardiac index and a PVR that rarely exceeds 3 mmHg/L/min.[</span><a aria-expanded="false" aria-haspopup="true" class="bibr popnode tag_hotlink tag_tooltip" data-dcnode-id="3521" href="#ref15" id="__tag_310253824" rid="ref15" role="button"><span data-dcnode-id="3522" instrument_node="">15</span></a><span data-dcnode-id="3520" instrument_node="">] In one study of morbidly obese subjects at the time of gastric bypass surgery, the average right atrial pressure and pulmonary artery wedge pressure were approximately 18 and 22 mmHg, respectively, while the average PVR was &lt; 4 mmHg/l/min with an average RVEF &gt; 40%.[</span><a aria-expanded="false" aria-haspopup="true" class="bibr popnode tag_hotlink tag_tooltip" data-dcnode-id="3518" href="#ref41" id="__tag_310253796" rid="ref41" role="button"><span data-dcnode-id="3519" instrument_node="">41</span></a><span data-dcnode-id="3517" instrument_node="">] Importantly, the predictors of PH during waking hours in patients with sleep apnea are not predicted by nocturnal events, with daytime hypoxemia, hypercapnia, greater body mass index, and decreased lung function (i.e., low FVC) being important associates. Also, it cannot be overemphasized that many patients with OSA and obesity hypoveniltation syndrome have increased left atrial pressure, and in several studies, left heart congestion has been shown to be the single most important predictor of pulmonary hypertension.[</span><a aria-expanded="false" aria-haspopup="true" class="bibr popnode tag_hotlink tag_tooltip" data-dcnode-id="3515" href="#ref20" id="__tag_310253769" rid="ref20" role="button"><span data-dcnode-id="3516" instrument_node="">20</span></a><span data-dcnode-id="3514" instrument_node="">,</span><a aria-expanded="false" aria-haspopup="true" class="bibr popnode tag_hotlink tag_tooltip" data-dcnode-id="3512" href="#ref21" id="__tag_310253827" rid="ref21" role="button"><span data-dcnode-id="3513" instrument_node="">21</span></a><span data-dcnode-id="3511" instrument_node="">] In our experience, the vast majority of obese subjects with significant sleep-disordered breathing and moderate or greater degrees of PH have systemic hypertension and an increased left atrial pressure at the time of right heart catheterization, with a normal or increased cardiac output and a PVR that is within the normal range. This is often overlooked, and suggests that many cases of “right heart failure” in this setting are, in fact, due to left heart congestion.</span></p><p class="p p-last" data-dcnode-id="3499" id="__p39"><span data-dcnode-id="3509" instrument_node="">Exercise induced PH is common in patients with COPD, resulting from a rise in the cardiac output and lack of fall of the PVR.[</span><a aria-expanded="false" aria-haspopup="true" class="bibr popnode tag_hotlink tag_tooltip" data-dcnode-id="3507" href="#ref42" id="__tag_310253789" rid="ref42" role="button"><span data-dcnode-id="3508" instrument_node="">42</span></a><span data-dcnode-id="3506" instrument_node="">] Dynamic hyperinflation may also contribute, by way of vascular compression. Importantly, patients with severe COPD and mild-to-moderate PH exhibit the same aerobic exercise capacity as COPD patients without PH; in both groups, exercise capacity was related to an exhausted ventilatory reserve and not to PA pressure, nor differences in the oxygen pulse, a surrogate for cardiac stroke volume.[</span><a aria-expanded="false" aria-haspopup="true" class="bibr popnode tag_hotlink tag_tooltip" data-dcnode-id="3504" href="#ref43" id="__tag_310253767" rid="ref43" role="button"><span data-dcnode-id="3505" instrument_node="">43</span></a><span data-dcnode-id="3503" instrument_node="">] Likewise, exercise-induced PH is common to sleep apnea, and was explained by a rise in the pulmonary artery wedge pressure with exertion, while the PVR remained within the normal range in all subjects.[</span><a aria-expanded="false" aria-haspopup="true" class="bibr popnode tag_hotlink tag_tooltip" data-dcnode-id="3501" href="#ref20" id="__tag_310253813" rid="ref20" role="button"><span data-dcnode-id="3502" instrument_node="">20</span></a><span data-dcnode-id="3500" instrument_node="">] Thus, the presence of exercise-induced PH should not necessarily be taken to indicate that pulmonary vascular disease is present, nor that the PH or RV function are in fact the source
