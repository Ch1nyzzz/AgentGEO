 of the functional limitations. This is especially true when considering submaximal exercise.</span></p></div><div class="sec" data-dcnode-id="3438" id="sec2-6"><h3 data-dcnode-id="3496" id="sec2-6title"><span data-dcnode-id="3497" instrument_node="">Type II PHD</span></h3><p class="p p-first" data-dcnode-id="3494" id="__p40"><span data-dcnode-id="3495" instrument_node="">The presence of pulmonary vascular disease can greatly modify the overall clinical presentation of a patient with CRD and PHD. Often, the clinical course seems to become detached from changes in the underlying respiratory condition, as if a patient has taken on another condition. As such, dyspnea may progress in a manner that is disparate to objective studies of respiratory function, such as pulmonary function testing or imaging studies. The history may include reporting of exertional angina, syncope, or near syncope, similar to the presentation of patients with "pure" pulmonary vascular disease states such as PAH or chronic thromboembolic pulmonary hypertension.</span></p><p data-dcnode-id="3485" id="__p41"><span data-dcnode-id="3493" instrument_node="">As Paul Wood pointed out some four decades ago, “when the pulmonary vascular resistance is high in cor pulmonale the physical signs are different…”[</span><a aria-expanded="false" aria-haspopup="true" class="bibr popnode" data-dcnode-id="3491" href="#ref44" rid="ref44" role="button"><span data-dcnode-id="3492" instrument_node="">44</span></a><span data-dcnode-id="3490" instrument_node="">] These differences primarily reflect the presence of RV systolic dysfunction and decreased systemic perfusion. The jugular venous pulse is typically markedly elevated, while the arterial pulses are low in volume with less tension, indicative of a depressed stroke volume and pulse pressure. Cyanosis is often more prominent. The ECG will more commonly display RVH, right axis deviation, and RV strain, similar to that seen in PAH. Pulmonary function testing will often suggest pulmonary vascular disease, with an increasing FVC/DLCO ratio (</span><a class="fig-table-link figpopup" co-legend-rid="" data-dcnode-id="3487" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.ncbi.nlm.nih.gov/pmc/articles/PMC3641739/table/T1/" rid-figpopup="T1" rid-ob="ob-T1" target="table"><span data-dcnode-id="3488"><span data-dcnode-id="3489" instrument_node="">Table 1</span></span></a><span data-dcnode-id="3486" instrument_node="">). The falling DLCO likely belies the nearly universal progression of hypoxemia in these patients, which is unmasked further during ambulation. A stable, mild oxygen requirement makes Type II PHD far less likely.</span></p><p data-dcnode-id="3470" id="__p42"><span data-dcnode-id="3484" instrument_node="">With more advanced PH, and thus the Type II PHD phenotype, the cardiopulmonary exercise stress test (CPET) data more closely resembles that of a PAH patient (</span><a class="fig-table-link figpopup" co-legend-rid="" data-dcnode-id="3481" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.ncbi.nlm.nih.gov/pmc/articles/PMC3641739/table/T1/" rid-figpopup="T1" rid-ob="ob-T1" target="table"><span data-dcnode-id="3482"><span data-dcnode-id="3483" instrument_node="">Table 1</span></span></a><span data-dcnode-id="3480" instrument_node="">). Patients will demonstrate a ventilatory limitation to exercise (similar to Type I PHD); however, they will also exhibit a significant circulatory limitation to exercise (i.e., lower oxygen pulse, lower peak systolic blood pressure to exercise) and a markedly increased VE/VCO</span><sub data-dcnode-id="3478"><span data-dcnode-id="3479" instrument_node="">2</span></sub><span data-dcnode-id="3477" instrument_node=""> relationship as compared to the Type I PHD patient.[</span><a aria-expanded="false" aria-haspopup="true" class="bibr popnode tag_hotlink tag_tooltip" data-dcnode-id="3475" href="#ref45" id="__tag_310253823" rid="ref45" role="button"><span data-dcnode-id="3476" instrument_node="">45</span></a><span data-dcnode-id="3474" instrument_node="">–</span><a aria-expanded="false" aria-haspopup="true" class="bibr popnode tag_hotlink tag_tooltip" data-dcnode-id="3472" href="#ref47" id="__tag_310253774" rid="ref47" role="button"><span data-dcnode-id="3473" instrument_node="">47</span></a><span data-dcnode-id="3471" instrument_node="">]</span></p><p data-dcnode-id="3459" id="__p43"><span data-dcnode-id="3469" instrument_node="">The echocardiographic findings in Type II PHD are often indistinguishable from PAH, with marked RV dilation, right to left septal flattening in systole, and depressed RV systolic function. The flow velocity envelope (FVE) obtained with pulsed Doppler interrogation in the RV outflow tract often demonstrates a “notched” configuration, representing early arrival of reflected arterial waves from the distal pulmonary vasculature, with the notch representing temporary flow interruption due to increased RV impedence.[</span><a aria-expanded="false" aria-haspopup="true" class="bibr popnode tag_hotlink tag_tooltip" data-dcnode-id="3467" href="#ref48" id="__tag_310253780" rid="ref48" role="button"><span data-dcnode-id="3468" instrument_node="">48</span></a><span data-dcnode-id="3466" instrument_node="">] We recently showed that a notched FVE in the RV outflow tract was highly sensitive and specific for underlying pulmonary vascular disease in patients with pulmonary hypertension of varying etiologies.[</span><a aria-expanded="false" aria-haspopup="true" class="bibr popnode tag_hotlink tag_tooltip" data-dcnode-id="3464" href="#ref49" id="__tag_310253803" rid="ref49" role="button"><span data-dcnode-id="3465" instrument_node="">49</span></a><span data-dcnode-id="3463" instrument_node="">] In patients with CRD and pulmonary hypertension, subjects without a notched FVE had an average mean PA pressure of 37 mmHg and PVR of 4.5 mmHg/l/min versus patients with a notched FVE, whom demonstrated a mean PA pressure of 48 mmHg, a PVR of 9 mmHg/l/min, and significantly greater echocardiographic evidence of RV systolic dysfunction.[</span><a aria-expanded="false" aria-haspopup="true" class="bibr popnode" data-dcnode-id="3461" href="#ref50" rid="ref50" role="button"><span data-dcnode-id="3462" instrument_node="">50</span></a><span data-dcnode-id="3460" instrument_node="">]</span></p><p class="p p-last" data-dcnode-id="3439" id="__p44"><span data-dcnode-id="3458" instrument_node="">Approximately 1-5% of patients with COPD demonstrate hemodynamics that are comparable to patients with PAH, with a mean PA pressure &gt; 50 mmHg in the context of a markedly elevated PVR and decreased cardiac index.[</span><a aria-expanded="false" aria-haspopup="true" class="bibr popnode tag_hotlink tag_tooltip" data-dcnode-id="3456" href="#ref39" id="__tag_310253773" rid="ref39" role="button"><span data-dcnode-id="3457" instrument_node="">39</span></a><span data-dcnode-id="3455" instrument_node="">,</span><a aria-expanded="false" aria-haspopup="true" class="bibr popnode tag_hotlink tag_tooltip" data-dcnode-id="3453" href="#ref51" id="__tag_310253825" rid="ref51" role="button"><span data-dcnode-id="3454" instrument_node="">51</span></a><span data-dcnode-id="3452" instrument_node="">] Interestingly, the subjects with COPD and pulmonary vascular disease are significantly more hypoxic than those with mild-moderate PH with a normal PVR, and have a pCO</span><sub data-dcnode-id="3450"><span data-dcnode-id="3451" instrument_node="">2</span></sub><span data-dcnode-id="3449" instrument_node=""> less than 40 mmHg; these arterial blood gas findings are more consistent with the findings of PAH than COPD. Moreover, these patients demonstrated lesser degrees of pulmonary obstruction than subjects without pulmonary vascular disease. Pulmonary sarcoid seems to have a particular predilection for pulmonary vascular involvement, and represents the diagnosis that we most commonly see in our Type II PHD patients. Other parenchymal lung disorders that present a higher risk of significant pulmonary vascular involvement include Langerhans cell histiocytosis and interstitial lung disease associated with scleroderma.[</span><a aria-expanded="false" aria-haspopup="true" class="bibr popnode tag_hotlink tag_tooltip" data-dcnode-id="3447" href="#ref52" id="__tag_310253811" rid="ref52" role="button"><span data-dcnode-id="3448" instrument_node="">52</span></a><span data-dcnode-id="3446" instrument_node="">–</span><a aria-expanded="false" aria-haspopup="true" class="bibr popnode tag_hotlink tag_tooltip" data-dcnode-id="3444" href="#ref54" id="__tag_310253783" rid="ref54" role="button"><span data-dcnode-id="3445" instrument_node="">54</span></a><span data-dcnode-id="3443" instrument_node="">] Combined pulmonary fibrosis with emphysema can also be associated with a severe PH phenotype. A subgroup of idiopathic pulmonary fibrosis patients can also manifest a more severe PHD phenotype, with the degree of PH, pulmonary vascular disease, and right heart dysfunction more closely resembling PAH than a typical Group III PH patient.[</span><a aria-expanded="false" aria-haspopup="true" class="bibr popnode tag_hotlink tag_tooltip" data-dcnode-id="3441" href="#ref55" id="__tag_310253784" rid="ref55" role="button"><span data-dcnode-id="3442" instrument_node="">55</span></a><span data-dcnode-id="3440" instrument_node="">] Taken together, clinical observations as well as the published literature indicate that subgroups of many different forms of chronic respiratory disease can manifest a more severe PHD phenotype. This phenotypic distinction cannot be made by PA pressure estimation alone. Therefore, clinicians need be aware of the varying clinical, CPET, echocardiographic, and hemodynamic parameters that set a Type I PHD patient apart from a Type II patient.</span></p></div><div class="sec sec-last" data-dcnode-id="3364" id="sec2-7"><h3 data-dcnode-id="3436" id="sec2-7title"><span data-dcnode-id="3437" instrument_node="">Treatment</span></h3><p class="p p-first" data-dcnode-id="3428" id="__p45"><span data-dcnode-id="3435" instrument_node="">In patients with Type I and Type II PHD, if the initial diagnosis is made in the presence of an acute respiratory exacerbation, the focus is directed toward aggressive treatment of the underlying trigger—i.e., infection, bronchospasm. Patients should be re-evaluated in a steady state, as their initial assessment often overestimates the degree of PHD that will remain following resolution of the acute exacerbation. Hypoxemia and hypercapnia should be aggressively treated. For patients with suspected sleep-disordered breathing, prompt diagnosis and initiation of continuous positive airway pressure should be pursued. Diuretics should be used to treat volume excess, especially when associated with right heart congestion. Long term oxygen therapy is the cornerstone of treatment of PHD in patients with COPD and, along with smoking cessation, remains the only intervention associated with improved survival in COPD.[</span><a aria-expanded="false" aria-haspopup="true" class="bibr popnode tag_hotlink tag_tooltip" data-dcnode-id="3433" href="#ref56" id="__tag_310253822" rid="ref56" role="button"><span data-dcnode-id="3434" instrument_node="">56</span></a><span data-dcnode-id="3432" instrument_node="">,</span><a aria-expanded="false" aria-haspopup="true" class="bibr popnode tag_hotlink tag_tooltip" data-dcnode-id="3430" href="#ref57" id="__tag_310253776" rid="ref57" role="button"><span data-dcnode-id="3431" instrument_node="">57</span></a><span data-dcnode-id="3429" instrument_node="">] Physicians treating patients with COPD over the past three decades will attest to the observed decline in PHD seen in the post oxygen therapy era. Patients should also be treated for ambulatory and nocturnal hypoxemia whenever possible.</span></p><p data-dcnode-id="3426" id="__p46"><span data-dcnode-id="3427" instrument_node="">With the rapid expansion of therapies available for the treatment of patients with PAH, it is tempting to try and extend our PH specific therapies to patients with PH and related PHD. However, the efficacy and safety of PH specific therapy in patients with WHO Group III pulmonary hypertension and PHD remain unproven. Thus, we will discuss the use of PH specific therapies within a specific clinical and pathophysiologic context that may provide a framework for more tailored investigation and rational application of these therapies in PHD.</span></p><p data-dcnode-id="3418" id="__p47"><span data-dcnode-id="3425" instrument_node="">Conceptually, for PH specific therapy to be safe and efficacious in the setting of PHD, it seems that a minimum of four conditions must be met. First, patients must have underlying pulmonary vascular disease and thus increased RV afterload (i.e., increased PVR). Second, patients must have evidence of RV systolic dysfunction on the basis of the increased PVR. This combination of an increased PVR and depressed RV function indicates relative uncoupling of the RV and pulmonary vasculature, and represents the basic physiologic paradigm that lends to both the circulatory limitation to exertion as well as the propensity toward hemodynamic improvements in response to pulmonary vasodilating therapy.[</span><a aria-expanded="false" aria-haspopup="true" class="bibr popnode tag_hotlink tag_tooltip" data-dcnode-id="3423" href="#ref58" id="__tag_310253809" rid="ref58" role="button"><span data-dcnode-id="3424" instrument_node="">58</span></a><span data-dcnode-id="3422" instrument_node="">,</span><a aria-expanded="false" aria-haspopup="true" class="bibr popnode tag_hotlink tag_tooltip" data-dcnode-id="3420" href="#ref59" id="__tag_310253770" rid="ref59" role="button"><span data-dcnode-id="3421" instrument_node="">59</span></a><span data-dcnode-id="3419" instrument_node="">] Patients with Type I PHD have mild pulmonary vascular disease and mild RV dysfunction, and thus, a relatively small separation or uncoupling between RV function and afterload. This does not lend toward a significant circulatory limitation to exertion or a hemodynamic benefit from PH specific therapies. In contrast, patients described as Type II PHD meet both criteria, with RV-PA uncoupling that more closely resembles that seen in patients with PAH.</span></p><p data-dcnode-id="3416" id="__p48"><span data-dcnode-id="3417" instrument_node="">The third condition that must be met is that pulmonary vasodilation should not worsen gas exchange to the point that the drop in oxygen saturation occurs in disproportion to an improvement in cardiac output. If the relative degree of hypoxia exceeds the relative rise in cardiac output, then the net effect may be reduced peripheral oxygen delivery. In contrast, if there is a mild reduction in oxygen saturation in response to PH specific therapy, yet a marked rise in cardiac output owed to improved right heart function, net oxygen delivery to tissue may still be significantly elevated despite a modest increase in hypoxia. It seems logical that an essential element to avoiding the scenario where PH specific therapy would lead to hypoxia in disproportion to improved cardiac function is to select the appropriate PH phenotype. In patients with PAH, pulmonary vasodilating therapy often improves oxygenation by improving V/Q mismatch (via a drop in PVR), improving the transport of more saturated mixed venous blood to the alveolar-capillary interface (via the increase in cardiac output), and occasionally, by alleviating a right to left shunt through a patent foraman ovale as the right atrial pressure falls. In a Type II PHD patient, the circulatory physiology resembles PAH. As such, even if there is some degree of intrapulmonary shunt that occurs in response to pulmonary vasodilatation, an improved cardiac output (and thus, delivery of more oxygenated mixed venous blood to the alveolar-capillary interface) and falling right atrial pressure (and alleviation of a right to left shunt) can offset the effect of the shunt, leading to stable or even improved oxygenation.</span></p><p data-dcnode-id="3408" id="__p49"><span data-dcnode-id="3415" instrument_node="">In most patients with PHD, the degree of pulmonary vascular disease is mild and relates to hypoxic pulmonary vasoconstriction, remodeling, and loss of lung surface area. The use of pulmonary vasodilators in patients with relatively mild PH in association to CRD tends to make patients more hypoxic, as was seen in a cohort of patients with COPD treated for 12 weeks with bosentan, where the alveolar-arterial oxygen gradient increased and functional capacity worsened.[</span><a aria-expanded="false" aria-haspopup="true" class="bibr popnode tag_hotlink tag_tooltip" data-dcnode-id="3413" href="#ref60" id="__tag_310253768" rid="ref60" role="button"><span data-dcnode-id="3414" instrument_node="">60</span></a><span data-dcnode-id="3412" instrument_node="">] In contrast, patients with Type II PHD exhibit PVR elevations that are well beyond that seen from HPV alone. Moreover, due to a reduced cardiac output, these subjects often have reduced mixed venous oxygen saturation. Therefore, a drop in the PVR may leave HPV relatively intact, and also improve mixed venous oxygen saturation, thus preventing a net fall in arterial oxygen saturation, similar to what occurs in PAH. The consequent reduction in right atrial pressure may also improve oxygenation via alleviation of right to left shunting through a patent foramen ovale. Therapy selection may also matter, as inhaled therapies as well as oral sildenafil are less apt to cause increased hypoxemia through vasodilation than calcium channel blockers or acute administration of intravenous epoprostenol.[</span><a aria-expanded="false" aria-haspopup="true" class="bibr popnode tag_hotlink tag_tooltip" data-dcnode-id="3410" href="#ref61" id="__tag_310253812" rid="ref61" role="button"><span data-dcnode-id="3411" instrument_node="">61</span></a><span data-dcnode-id="3409" instrument_node="">] The inhaled therapies deliver drug to ventilated areas and thus tend to preserve V/Q matching, while sildenafil is relatively more pulmonary selective as compared to calcium channel blockers and parenteral prostacyclins. Of note, no studies have investigated the effects of chronic, gradual titration of parenteral prostacyclin therapy in a severe pulmonary heart disease phenotype. It may be that slow, steady titration of parenteral prostacyclin therapies in this context do not lead to increases in intrapulmonary shunting as was seen with acute intravenous administration. This may be especially true when the PH phenotype is robust, such that the improved PVR and right heart function improve gas exchange, thus offsetting the chance that a modest increase in intrapulmonary shunt would lead to a significant increase in hypoxia.</span></p><p data-dcnode-id="3406" id="__p50"><span data-dcnode-id="3407" instrument_node="">The fourth condition that must be met is that pulmonary vasodilation, improved right heart function, and improved hemodynamics should translate into functional improvements and decreased symptoms for the patient. The translation of improved circulatory reserve into overall clinical and functional improvements represents a complex physiologic algorithm, where the net improvement in functional capacity should occur due to a change in the balance of circulatory and ventilatory dependent functional limitations following treatment. Indeed, it is challenging to precisely predict the extent to which improved cardiac function will improve overall functional capacity in the context of significant pulmonary disease. However, it is logical that there must be a requisite baseline level of right heart dysfunction and increased pulmonary arterial afterload present, such that there is a coexisting cardiovascular limitation to exercise as well.</span></p><p data-dcnode-id="3404" id="__p51"><span data-dcnode-id="3405" instrument_node="">Without a sufficient disruption of cardiac reserve on the basis of abnormal RV-PA interaction, the chances of demonstrating a treatment effect with PH therapies would be nil. Considering the relatively minor disruption in the RV-PA relationship that occurs at baseline in the Type I PHD patient, it stands to reason that patients with Type I PHD are not poised to significantly benefit from a hemodynamic perspective from pulmonary vasodilator therapy. As such, whether there is no change or a modest improvement in circulatory function following PH specific therapy, the relative change in circulatory reserve is not sufficient to offset the predominant and uncorrected ventilatory limitation. As a result, the functional capacity will remain essentially unchanged. If gas exchange worsens at the same time, overall functional capacity may even decline.</span></p><p data-dcnode-id="3392" id="__p52"><span data-dcnode-id="3403" instrument_node="">In contrast, patients with Type II PHD are poised to improve hemodynamically with PH therapies, typically without worsening gas exchange. In these patients, liberalizing cardiac reserve may serve to alleviate the superimposed cardiac limitation to their functional impairment, leaving only the ventilatory limitation behind. The net functional improvement then depends on the extent of the circulatory limitation imposed by the PH at baseline, its response to PH therapy, and the relative balance of this limitation to the background ventilatory limitation. Interestingly, a recent </span><em data-dcnode-id="3401"><span data-dcnode-id="3402" instrument_node="">post hoc</span></em><span data-dcnode-id="3400" instrument_node=""> analysis of a placebo-controlled randomized clinical trial in IPF showed that the subgroup of patients with RV dysfunction and RV hypertrophy improved their six minute walk distance in response to sildenafil, while subjects without RV dysfunction and hypertrophy did not respond to therapy.[</span><a aria-expanded="false" aria-haspopup="true" class="bibr popnode" data-dcnode-id="3398" href="#ref62" rid="ref62" role="button"><span data-dcnode-id="3399" instrument_node="">62</span></a><span data-dcnode-id="3397" instrument_node="">] </span><a class="fig-table-link figpopup" co-legend-rid="lgnd_F2" data-dcnode-id="3394" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.ncbi.nlm.nih.gov/pmc/articles/PMC3641739/figure/F2/" rid-figpopup="F2" rid-ob="ob-F2" target="figure"><span data-dcnode-id="3395"><span data-dcnode-id="3396" instrument_node="">Figure 2</span></span></a><span data-dcnode-id="3393" instrument_node=""> illustrates the relative balance of respiratory disease and corresponding ventilatory reserve as well as the degree of circulatory impairment and reserve in subjects with Type I and Type II PHD at baseline and in response to PH specific therapy. Predicted changes each of these parameters in addition to hypoxia are compared among the PHD I and II phenotypes and how PH specific therapy would potentially affect overall functional status.</span></p><div class="fig iconblock whole_rhythm" co-legend-rid="lgnd_F2" data-dcnode-id="3367" id="F2"><a data-dcnode-id="3386" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.ncbi.nlm.nih.gov/pmc/articles/PMC3641739/figure/F2/" rid-figpopup="F2" rid-ob="ob-F2" target="figure"><div class="figure" data-dcnode-id="3387" data-largeobj="" data-largeobj-link-rid="largeobj_idm140601386279296"><img alt="An external file that holds a picture, illustration, etc.
Object name is PC-3-5-g003.jpg" class="fig-image" data-dcnode-id="3388" loading="lazy" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.ncbi.nlm.nih.gov/pmc/articles/PMC3641739/bin/PC-3-5-g003.jpg&amp;raw" title="An external file that holds a picture, illustration, etc.
Object name is PC-3-5-g003.jpg"></div></a><div class="largeobj-link align_right" data-dcnode-id="3382" id="largeobj_idm140601386279296" style="display: none;"><a data-dcnode-id="3385" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.ncbi.nlm.nih.gov/pmc/articles/PMC3641739/figure/F2/" rid-figpopup="F2" rid-ob="ob-F2" target="figure"></a><a data-dcnode-id="3383" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.ncbi.nlm.nih.gov/pmc/articles/PMC3641739/figure/F2/%3Freport%3Dobjectonly" rel="noopener" target="object"><span data-dcnode-id="3384" instrument_node="">Open in a separate window</span></a></div><div class="icnblk_cntnt" data-dcnode-id="3368" id="lgnd_F2"><div data-dcnode-id="3379"><a class="figpopup" data-dcnode-id="3380" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.ncbi.nlm.nih.gov/pmc/articles/PMC3641739/figure/F2/" rid-figpopup="F2" rid-ob="ob-F2" target="figure"><span data-dcnode-id="3381" instrument_node="">Figure 2</span></a></div><div class="caption" data-dcnode-id="3369"><p data-dcnode-id="3370" id="__p53"><span data-dcnode-id="3377" instrument_node="">Illustrates the qualitative degree of respiratory disease (blue) and ventilatory reserve (green) as well as circulatory disease (red) and reserve (green) of subjects with Type I (top half of figure) and Type II pulmonary heart disease (bottom half of figure). Note that in the Type I phenotype, there is significant respiratory disease at baseline; the degree of respiratory disease &gt;degree of circulatory disease. Therefore, the circulatory reserve is &gt;degree of ventilatory reserve. In response to PH specific therapy, the balance of respiratory disease and ventilatory reserve remain unchanged. The degree of circulatory disease decreases modestly, with a small increase in circulatory reserve. Given no change in the respiratory disease in response to therapy and only a small improvement in circulatory function, there is no net change in functional capacity. If oxygenation worsens significantly, the functional status may even decline. Note that in the Type II phenotype, there is a similar degree of baseline respiratory disease and ventilatory reserve as seen in the Type I subject. However, there is a much greater degree of circulatory disease, such that the degree of circulatory disease is comparable to the degree of respiratory disease. As such, the degree of circulatory reserve is much lower than in the type I PHD example. In response to PH specific therapy, the balance of respiratory disease and ventilatory reserve remain unchanged. However, the degree of circulatory disease decreases substantially while there is a significant improvement in circulatory reserve. The degree of hypoxia may not change, or may even improve. This most often leads to a net improvement in functional status. </span><sup data-dcnode-id="3375"><span data-dcnode-id="3376" instrument_node="">*</span></sup><span data-dcnode-id="3374" instrument_node="">Respiratory disease-may refer to obstructive or restrictive respiratory disorders. </span><sup data-dcnode-id="3372"><span data-dcnode-id="3373" instrument_node="">**</span></sup><span data-dcnode-id="3371" instrument_node="">Circulatory disease-refers to the severity of right ventricular afterload (pulmonary vascular resistance) and the degree of right ventricular dysfunction.</span></p></div></div></div><p class="p p-last" data-dcnode-id="3365" id="__p54"><span data-dcnode-id="3366" instrument_node="">With a mild or moderate baseline ventilatory limitation, the functional improvements in response to treatment of type II PHD are more predictable and may be very impressive. In patients with truly end-stage lung disease, treatment of the PHD often provides a temporary, but critically important “bridge” that allows a patient to survive and remain relatively physiologically intact awaiting lung transplantation.</span></p></div></div><div class="tsec sec" data-dcnode-id="3322" id="sec1-6"><div class="goto jig-ncbiinpagenav-goto-container" data-dcnode-id="3360"><a aria-expanded="false" aria-haspopup="true" class="tgt_dark page-toc-label jig-ncbiinpagenav-goto-heading" data-dcnode-id="3361" href="#" role="button" title="Go to other sections in this page"><span data-dcnode-id="3362" instrument_node="">Go to:</span></a></div><h2 class="head no_bottom_margin ui-helper-clearfix" data-dcnode-id="3358" id="sec1-6title"><span data-dcnode-id="3359" instrument_node="">CASE ILLUSTRATION</span></h2><p class="p p-first" data-dcnode-id="3353" id="__p55"><a class="fig-table-link figpopup" co-legend-rid="lgnd_F3" data-dcnode-id="3355" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.ncbi.nlm.nih.gov/pmc/articles/PMC3641739/figure/F3/" rid-figpopup="F3" rid-ob="ob-F3" target="figure"><span data-dcnode-id="3356"><span data-dcnode-id="3357" instrument_node="">Figure 3</span></span></a><span data-dcnode-id="3354" instrument_node=""> shows representative echo-Doppler images, hemodynamics and PFTs from a patient with Type I PHD (panel A) and type II PHD (panel B). Both patients had significant COPD and PH, and both were treated with oral PH-specific therapy for six months. Patient A had near normal baseline RV systolic function, which further improved in response to PH therapy (TAPSE increased from 2.0 cm to 2.4 cm). The BNP level also fell. In spite of these improvements, patient A had a fall in 6 MWD from 320 to 300 m and a worsening in NYHA Functional Class from 3 to 4. Patient B had a comparable degree of PH (mean PA pressure), yet significantly worse baseline RV function and a much higher PVR as compared to Patient A. The TAPSE improved significantly in response to PH therapy and the BNP fell. However, in contrast to Patient A, in Patient B, the improved RV function paralleled a relatively marked increase in the 6MWD from 238 m to 320 m, and a fall in NYHA Functional Class from 4 to 3. Thus, the RV function improvements correlated with improved clinical status in the Type II PHD patient only. This likely relates to the relatively greater burden of pulmonary vascular disease, RV dysfunction, and RV-PA uncoupling in this patient, which should predict a greater baseline circulatory limitation to exercise, and thus a more robust clinical response to improved right heart-pulmonary vascular interaction.</span></p><div class="fig iconblock whole_rhythm" co-legend-rid="lgnd_F3" data-dcnode-id="3334" id="F3"><a data-dcnode-id="3347" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.ncbi.nlm.nih.gov/pmc/articles/PMC3641739/figure/F3/" rid-figpopup="F3" rid-ob="ob-F3" target="figure"><div class="figure" data-dcnode-id="3348" data-largeobj="" data-largeobj-link-rid="largeobj_idm140601359297936"><img alt="An external file that holds a picture, illustration, etc.
Object name is PC-3-5-g004.jpg" class="fig-image" data-dcnode-id="3349" loading="lazy" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.ncbi.nlm.nih.gov/pmc/articles/PMC3641739/bin/PC-3-5-g004.jpg&amp;raw" title="An external file that holds a picture, illustration, etc.
Object name is PC-3-5-g004.jpg"></div></a><div class="largeobj-link align_right" data-dcnode-id="3343" id="largeobj_idm140601359297936" style="display: none;"><a data-dcnode-id="3346" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.ncbi.nlm.nih.gov/pmc/articles/PMC3641739/figure/F3/" rid-figpopup="F3" rid-ob="ob-F3" target="figure"></a><a data-dcnode-id="3344" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.ncbi.nlm.nih.gov/pmc/articles/PMC3641739/figure/F3/%3Freport%3Dobjectonly" rel="noopener" target="object"><span data-dcnode-id="3345" instrument_node="">Open in a separate window</span></a></div><div class="icnblk_cntnt" data-dcnode-id="3335" id="lgnd_F3"><div data-dcnode-id="3340"><a class="figpopup" data-dcnode-id="3341" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.ncbi.nlm.nih.gov/pmc/articles/PMC3641739/figure/F3/" rid-figpopup="F3" rid-ob="ob-F3" target="figure"><span data-dcnode-id="3342" instrument_node="">Figure 3</span></a></div><div class="caption" data-dcnode-id="3336"><p data-dcnode-id="3337" id="__p56"><span data-dcnode-id="3338" instrument_node="">Representative apical four chamber view and Doppler flow velocity envelope (FVE) in right ventricular outflow tract (RVOT). Data were taken from two separate patients: (A) one with PHD I phenotype and (B) one with PHD II phenotype. Below each panel are representative pulmonary function tests and invasive hemodynamics for each patient. Note the greater degree of RVH, and lesser degree of RV dilatation and dysfunction in the patient in panel A vs. panel B. Similarly, the subject in panel A has a late-systolic notch pattern RV outflow tract Doppler pattern, which is consistent with a modest and comparatively lesser degree of RV afterload as compared to the mid-systolic notch pattern seen in the Doppler pattern of the subject in panel B. The subjects had a similar degree of respiratory disease. FVC = forced vital capacity; DLCO = carbon monoxide diffusing capacity; mPAP = mean pulmonary artery pressure; PVR = pulmonary vascular resistance; WU = Wood units; CI = cardiac index. Both patients in Figure 1 had COPD and both were treated with oral PH-specific therapy for 6 months. Patient A (PHD I phenotype) had a fall in 6 MW from 320 m to 300 m and a worsening in NYHA functional class from 3 to 4. RV function improved as evidenced by an increase in TAPSE from 2.0 cm to 2.4 cm and a 40% fall in the BNP level. Patient B (PHD II phenotype) had an increase in 6 MW from 238 m to 320 m with a fall in NYHA functional class from 4 to 3. RV function also improved, as evidenced by an increase in TAPSE from 1.4 cm to 1.9 cm and a 40% fall in the BNP level. Note that in both patients A and B, BNP fell and RV function improved, however only in patient B with the PHD II phenotype did the RV function improvement correlate with overall improvements in clinical status. The differences in clinical response likely relate to the fact the subject with the type II PHD phenotype had a greater degree of RV-PA uncoupling, and thus, a greater degree of functional impairment on the basis of a circulatory limitation. As such, direct PH treatment in this context translates into overall improved functional capacity, even though the background ventilatory limitation remains.</span></p></div></div></div><p class="p p-last" data-dcnode-id="3323" id="__p57"><span data-dcnode-id="3333" instrument_node="">With this in mind, it is not likely coincidence that evidence from small case series and case reports of the effectiveness of PH therapies in the context of CRD are almost exclusively seen in patients with severe PVD, RV dysfunction, and a phenotype closely resembling that of our proposed Type II PHD patient.[</span><a aria-expanded="false" aria-haspopup="true" class="bibr popnode tag_hotlink tag_tooltip" data-dcnode-id="3331" href="#ref55" id="__tag_310253817" rid="ref55" role="button"><span data-dcnode-id="3332" instrument_node="">55</span></a><span data-dcnode-id="3330" instrument_node="">,</span><a aria-expanded="false" aria-haspopup="true" class="bibr popnode tag_hotlink tag_tooltip" data-dcnode-id="3328" href="#ref63" id="__tag_310253816" rid="ref63" role="button"><span data-dcnode-id="3329" instrument_node="">63</span></a><span data-dcnode-id="3327" instrument_node="">–</span><a aria-expanded="false" aria-haspopup="true" class="bibr popnode tag_hotlink tag_tooltip" data-dcnode-id="3325" href="#ref66" id="__tag_310253762" rid="ref66" role="button"><span data-dcnode-id="3326" instrument_node="">66</span></a><span data-dcnode-id="3324" instrument_node="">]</span></p></div><div class="tsec sec" data-dcnode-id="3312" id="sec1-7"><div class="goto jig-ncbiinpagenav-goto-container" data-dcnode-id="3319"><a aria-expanded="false" aria-haspopup="true" class="tgt_dark page-toc-label jig-ncbiinpagenav-goto-heading" data-dcnode-id="3320" href="#" role="button" title="Go to other sections in this page"><span data-dcnode-id="3321" instrument_node="">Go to:</span></a></div><h2 class="head no_bottom_margin ui-helper-clearfix" data-dcnode-id="3317" id="sec1-7title"><span data-dcnode-id="3318" instrument_node="">SUMMARY</span></h2><p class="p p-first" data-dcnode-id="3315" id="__p58"><span data-dcnode-id="3316" instrument_node="">Pulmonary heart disease is a heterogeneous condition with its clinical, echocardiographic and hemodynamic manifestations varying in proportion to the ways in which abnormal lung function can affect the heart. Most patients with PHD have relatively mild pulmonary vascular disease and cardiac dysfunction, mostly the direct or indirect results of abnormal pulmonary gas exchange. In these patients, the PHD signifies the underlying respiratory condition, but the PHD does not dominate the clinical picture. In these patients, it is the lungs, and not the heart that remains the primary therapeutic target.</span></p><p class="p p-last" data-dcnode-id="3313" id="__p59"><span data-dcnode-id="3314" instrument_node="">In contrast, a smaller subset of patients with CRD can develop severe PVD and right heart dysfunction, similar to patients with PAH. These patients typically clinically deteriorate despite optimization of treatment of their underlying CRD, suggesting they have taken on a second disease. Recognizing PHD as distinct phenotypes may assist in the recognition of these very ill patients, and may also provide a clinical and pathophysiological framework that may prove useful in patient selection for future studies investigating the role of PH specific therapies in PHD. The failure to recognize the different phenotypes of PHD serves to oversimplify the condition, which increases the potential for misapplication of therapy, and also, the potential for a missed opportunity to adequately refine clinical trial design to ascertain whether certain subgroups of patients with PHD may indeed benefit from PH specific therapy.</span></p></div><div class="tsec sec" data-dcnode-id="3291" id="fn-group-1"><div class="goto jig-ncbiinpagenav-goto-container" data-dcnode-id="3309"><a aria-expanded="false" aria-haspopup="true" class="tgt_dark page-toc-label jig-ncbiinpagenav-goto-heading" data-dcnode-id="3310" href="#" role="button" title="Go to other sections in this page"><span data-dcnode-id="3311" instrument_node="">Go to:</span></a></div><h2 class="head no_bottom_margin ui-helper-clearfix" data-dcnode-id="3307" id="fn-group-1title"><span data-dcnode-id="3308" instrument_node="">Footnotes</span></h2><div class="fm-sec half_rhythm small" data-dcnode-id="3292"><p class="fn sec" data-dcnode-id="3305" id="fn-1"></p><p class="p p-first-last" data-dcnode-id="3301" id="__p60"><strong data-dcnode-id="3303"><span data-dcnode-id="3304" instrument_node="">Source of Support:</span></strong><span data-dcnode-id="3302" instrument_node=""> Nil</span></p><p data-dcnode-id="3300"></p><p class="fn sec" data-dcnode-id="3298" id="fn-2"><span data-dcnode-id="3299"
