</span><div class="comp structured-content article-content expert-content right-rail__offset lock-journey health-sc-page mntl-sc-page mntl-block" data-bind-scroll-on-start="true" data-dcnode-id="1218" data-sc-ad-label-height="24" data-sc-ad-track-spacing="100" data-sc-breakpoint="50em" data-sc-content-positions="[400, 1400, 1400, 1700, 2000, 2200, 2400, 2600, 2800]" data-sc-load-immediate="4" data-sc-max-track-height="600" data-sc-min-track-height="250" data-sc-sticky-offset="60" id="health-sc-page_1-0"><span data-dcnode-id="1567" instrument_node="">
</span><p class="comp mntl-sc-block mntl-sc-block-html" data-dcnode-id="1562" id="mntl-sc-block_1-0"><span data-dcnode-id="1566" instrument_node="">
Waist circumference is the measurement taken around the abdomen at the level of the umbilicus (belly button). Health experts commonly use waist measurement to screen patients for possible weight-related health problems. While a helpful tool, waist size is just one indicator that may point to certain health conditions, and it is not used to singularly diagnose any conditions or </span><a data-component="link" data-dcnode-id="1564" data-ordinal="1" data-source="inlineLink" data-type="internalLink" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.verywellfit.com/more-years-of-obesity-leads-to-higher-risk-for-disease-5092893"><span data-dcnode-id="1565" instrument_node="">diseases</span></a><span data-dcnode-id="1563" instrument_node="">.
</span></p><span data-dcnode-id="1561" instrument_node="">
</span><div class="comp mntl-sc-block mntl-sc-block-adslot mntl-block" data-dcnode-id="1560" id="mntl-sc-block_1-0-1"></div><span data-dcnode-id="1559" instrument_node="">
</span><p class="comp mntl-sc-block mntl-sc-block-html" data-dcnode-id="1557" id="mntl-sc-block_1-0-2"><span data-dcnode-id="1558" instrument_node="">
While health experts and physicians may use this method in-office, you can also measure your own waist circumference at home.
</span></p><span data-dcnode-id="1556" instrument_node="">
</span><div class="comp mntl-sc-block mntl-sc-block-adslot mntl-block" data-dcnode-id="1555" id="mntl-sc-block_1-0-3"></div><span data-dcnode-id="1554" instrument_node="">
</span><span class="heading-toc" data-dcnode-id="1553" id="toc-what-waist-circumference-tells-us"></span><span data-dcnode-id="1552" instrument_node=""> </span><h2 class="comp mntl-sc-block health-sc-block-heading mntl-sc-block-heading" data-dcnode-id="1547" id="mntl-sc-block_1-0-4"><span data-dcnode-id="1551" instrument_node=""> </span><span class="mntl-sc-block-heading__text" data-dcnode-id="1549"><span data-dcnode-id="1550" instrument_node=""> What Waist Circumference Tells Us </span></span><span data-dcnode-id="1548" instrument_node=""> </span></h2><span data-dcnode-id="1546" instrument_node="">
</span><p class="comp mntl-sc-block mntl-sc-block-html" data-dcnode-id="1541" id="mntl-sc-block_1-0-5"><span data-dcnode-id="1545" instrument_node="">
Measuring the size of your waist can help you understand your risk for certain weight-related health conditions. Waist circumference alone cannot indicate that you have a medical condition or that you'll develop one in the future, but it can help you and your healthcare provider to determine </span><a data-component="link" data-dcnode-id="1543" data-ordinal="1" data-source="inlineLink" data-type="internalLink" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.verywellfit.com/visceral-fat-location-tips-to-reduce-3495173"><span data-dcnode-id="1544" instrument_node="">where fat is located on your body</span></a><span data-dcnode-id="1542" instrument_node=""> and if that body fat may cause health problems for you in the future.
</span></p><span data-dcnode-id="1540" instrument_node="">
</span><div class="comp mntl-sc-block mntl-sc-block-adslot mntl-block" data-dcnode-id="1532" id="mntl-sc-block_1-0-6"><div class="comp mntl-native" data-dcnode-id="1533" data-right-rail-index="1" id="mntl-native_1-0" style="--native-ad-height: auto"><span data-dcnode-id="1539" instrument_node="">
</span><div class="comp scads-to-load mntl-native__adunit mntl-gpt-dynamic-adunit mntl-gpt-adunit gpt native dynamic js-immediate-ad" data-dcnode-id="1535" id="mntl-native__adunit_1-0"><span data-dcnode-id="1538" instrument_node="">
</span><div class="wrapper" data-dcnode-id="1537" data-pos="native" data-priority="4" data-rtb="true" data-sizes="[[1, 3],&quot;fluid&quot;]" data-targeting="{}" data-type="native" id="native"></div><span data-dcnode-id="1536" instrument_node="">
</span></div><span data-dcnode-id="1534" instrument_node="">
</span></div></div><span data-dcnode-id="1531" instrument_node="">
</span><p class="comp mntl-sc-block mntl-sc-block-html" data-dcnode-id="1523" id="mntl-sc-block_1-0-7"><span data-dcnode-id="1530" instrument_node="">
According to the National Institutes of Health (NIH), if more fat is located around your waist rather than around your hips, you are at higher risk for conditions including heart disease and type 2 diabetes.</span><span class="mntl-inline-citation mntl-dynamic-tooltip--trigger" data-dcnode-id="1528" data-id="#citation-2"><span data-dcnode-id="1529" instrument_node="">1</span></span><span data-dcnode-id="1527" instrument_node=""> You can use your waist measurement to </span><a data-component="link" data-dcnode-id="1525" data-ordinal="1" data-source="inlineLink" data-type="internalLink" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.verywellfit.com/waist-to-hip-ratio-and-examples-3496140"><span data-dcnode-id="1526" instrument_node="">calculate your waist-hip ratio (WHR)</span></a><span data-dcnode-id="1524" instrument_node="">, which provides another screening tool for weight-related disease risk.
</span></p><span data-dcnode-id="1522" instrument_node="">
</span><div class="comp mntl-sc-block mntl-sc-block-adslot mntl-block" data-dcnode-id="1521" id="mntl-sc-block_1-0-8"></div><span data-dcnode-id="1520" instrument_node="">
</span><p class="comp mntl-sc-block mntl-sc-block-html" data-dcnode-id="1512" id="mntl-sc-block_1-0-9"><span data-dcnode-id="1519" instrument_node="">
Your healthcare provider may also use a </span><a data-component="link" data-dcnode-id="1517" data-ordinal="1" data-source="inlineLink" data-type="internalLink" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.verywellfit.com/bmi-what-is-bmi-or-body-mass-index-3120088"><span data-dcnode-id="1518" instrument_node="">body mass index (BMI)</span></a><span data-dcnode-id="1516" instrument_node=""> measurement as a health indicator. However, a 2019 study concluded that both hip-adjusted waist circumference and waist-to-height ratio were stronger indicators of health and potential health conditions than BMI.</span><span class="mntl-inline-citation mntl-dynamic-tooltip--trigger" data-dcnode-id="1514" data-id="#citation-3"><span data-dcnode-id="1515" instrument_node="">2</span></span><span data-dcnode-id="1513" instrument_node="">
</span></p><span data-dcnode-id="1511" instrument_node="">
</span><div class="comp mntl-sc-block mntl-sc-block-adslot mntl-block" data-dcnode-id="1510" id="mntl-sc-block_1-0-10"></div><span data-dcnode-id="1509" instrument_node="">
</span><div class="comp theme-takeaway mntl-sc-block mntl-sc-block-callout mntl-block" data-dcnode-id="1491" data-tracking-container="true" data-tracking-id="mntl-sc-block-callout" id="mntl-sc-block_1-0-12"><span data-dcnode-id="1508" instrument_node="">
</span><div class="comp expert-content mntl-sc-block-callout-body mntl-text-block" data-dcnode-id="1493" id="mntl-sc-block-callout-body_1-0"><span data-dcnode-id="1507" instrument_node="">
</span><p data-dcnode-id="1503"><a data-component="link" data-dcnode-id="1505" data-ordinal="1" data-source="inlineLink" data-type="internalLink" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.verywellfit.com/bmi-what-is-bmi-or-body-mass-index-3120088"><span data-dcnode-id="1506" instrument_node="">Body Mass Index (BMI)</span></a><span data-dcnode-id="1504" instrument_node=""> is a dated, biased measure that doesn’t account for several factors, such as body composition, ethnicity, race, gender, and age.&nbsp;</span></p><span data-dcnode-id="1502" instrument_node="">
</span><p data-dcnode-id="1500"><span data-dcnode-id="1501" instrument_node="">&nbsp;</span></p><span data-dcnode-id="1499" instrument_node="">
</span><p data-dcnode-id="1494"><span data-dcnode-id="1498" instrument_node="">Despite being a </span><a data-component="link" data-dcnode-id="1496" data-ordinal="2" data-source="inlineLink" data-type="internalLink" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.verywellfit.com/why-bmi-may-not-be-the-best-metric-5192145"><span data-dcnode-id="1497" instrument_node="">flawed measure</span></a><span data-dcnode-id="1495" instrument_node="">, BMI is widely used today in the medical community because it is an inexpensive and quick method for analyzing potential health status and outcomes.</span></p></div><span data-dcnode-id="1492" instrument_node="">
</span></div><span data-dcnode-id="1490" instrument_node="">
</span><span class="heading-toc" data-dcnode-id="1489" id="toc-how-to-measure-your-waist"></span><span data-dcnode-id="1488" instrument_node=""> </span><h2 class="comp mntl-sc-block health-sc-block-heading mntl-sc-block-heading" data-dcnode-id="1483" id="mntl-sc-block_1-0-13"><span data-dcnode-id="1487" instrument_node=""> </span><span class="mntl-sc-block-heading__text" data-dcnode-id="1485"><span data-dcnode-id="1486" instrument_node=""> How to Measure Your Waist </span></span><span data-dcnode-id="1484" instrument_node=""> </span></h2><span data-dcnode-id="1482" instrument_node="">
</span><p class="comp mntl-sc-block mntl-sc-block-html" data-dcnode-id="1480" id="mntl-sc-block_1-0-14"><span data-dcnode-id="1481" instrument_node="">
To measure waist circumference correctly, you should use a flexible tape measure that is not elastic (i.e., the tape measure should not stretch when you are taking the measurement). You should also remove any bulky clothing that can add padding around your abdomen.
</span></p><span data-dcnode-id="1479" instrument_node="">
</span><div class="comp mntl-sc-block mntl-sc-block-adslot mntl-block" data-dcnode-id="1478" id="mntl-sc-block_1-0-15"></div><span data-dcnode-id="1477" instrument_node="">
</span><p class="comp mntl-sc-block mntl-sc-block-html" data-dcnode-id="1475" id="mntl-sc-block_1-0-16"><span data-dcnode-id="1476" instrument_node="">
Follow these steps to measure your waist:
</span></p><span data-dcnode-id="1474" instrument_node="">
</span><div class="comp mntl-sc-block mntl-sc-block-adslot mntl-block" data-dcnode-id="1473" id="mntl-sc-block_1-0-17"></div><span data-dcnode-id="1472" instrument_node="">
</span><ol class="comp mntl-sc-block mntl-sc-block-html" data-dcnode-id="1463" id="mntl-sc-block_1-0-18"><span data-dcnode-id="1471" instrument_node="">
</span><li data-dcnode-id="1469"><span data-dcnode-id="1470" instrument_node="">Stand up to get an accurate waist measurement.</span></li><li data-dcnode-id="1467"><span data-dcnode-id="1468" instrument_node="">Wrap the tape measure around the widest part of your stomach, across your belly button. The tape measure should rest gently on your skin.</span></li><li data-dcnode-id="1465"><span data-dcnode-id="1466" instrument_node="">Once the tape measure is positioned correctly, breathe in gently and then take the measurement on the exhale.</span></li><span data-dcnode-id="1464" instrument_node="">
</span></ol><span data-dcnode-id="1462" instrument_node="">
</span><div class="comp mntl-sc-block mntl-sc-block-adslot mntl-block" data-dcnode-id="1461" id="mntl-sc-block_1-0-19"></div><span data-dcnode-id="1460" instrument_node="">
</span><p class="comp mntl-sc-block mntl-sc-block-html" data-dcnode-id="1458" id="mntl-sc-block_1-0-20"><span data-dcnode-id="1459" instrument_node="">
Take the measurement three times to make sure you get a consistent result. Holding the tape too tight so that it digs into your flesh or holding it too loosely so that it droops will cause you to get an incorrect result.
</span></p><span data-dcnode-id="1457" instrument_node="">
</span><div class="comp mntl-sc-block mntl-sc-block-adslot mntl-block" data-dcnode-id="1456" id="mntl-sc-block_1-0-21"></div><span data-dcnode-id="1455" instrument_node="">
</span><div class="comp related-link mntl-sc-block mntl-sc-block-featuredlink mntl-block" data-dcnode-id="1449" id="mntl-sc-block_1-0-23"><span data-dcnode-id="1454" instrument_node="">
</span><a class="mntl-sc-block-featuredlink__link mntl-text-link" data-dcnode-id="1451" data-tracking-container="true" data-tracking-id="featured-link" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.verywellfit.com/how-to-take-your-body-measurements-1231126" id="mntl-sc-block-featuredlink__link_1-0"><span class="link__wrapper" data-dcnode-id="1452"><span data-dcnode-id="1453" instrument_node="">How to Properly Take Body Measurements</span></span></a><span data-dcnode-id="1450" instrument_node="">
</span></div><span data-dcnode-id="1448" instrument_node="">
</span><div class="comp mntl-sc-block mntl-sc-block-adslot mntl-block" data-dcnode-id="1447" id="mntl-sc-block_1-0-24"></div><span data-dcnode-id="1446" instrument_node="">
</span><span class="heading-toc" data-dcnode-id="1445" id="toc-check-your-health-risk"></span><span data-dcnode-id="1444" instrument_node=""> </span><h2 class="comp mntl-sc-block health-sc-block-heading mntl-sc-block-heading" data-dcnode-id="1439" id="mntl-sc-block_1-0-25"><span data-dcnode-id="1443" instrument_node=""> </span><span class="mntl-sc-block-heading__text" data-dcnode-id="1441"><span data-dcnode-id="1442" instrument_node=""> Check Your Health Risk </span></span><span data-dcnode-id="1440" instrument_node=""> </span></h2><span data-dcnode-id="1438" instrument_node="">
</span><p class="comp mntl-sc-block mntl-sc-block-html" data-dcnode-id="1436" id="mntl-sc-block_1-0-26"><span data-dcnode-id="1437" instrument_node="">
To find out how your waist circumference measures up, use this chart to see if your waist measurement indicates that you are at an increased risk for disease. Individual circumstances may vary, so seek the advice of a doctor to determine next steps.
</span></p><span data-dcnode-id="1435" instrument_node="">
</span><div class="comp mntl-sc-block mntl-sc-block-adslot mntl-block" data-dcnode-id="1434" id="mntl-sc-block_1-0-27"></div><span data-dcnode-id="1433" instrument_node="">
</span><p class="comp mntl-sc-block mntl-sc-block-html" data-dcnode-id="1425" id="mntl-sc-block_1-0-28"><span data-dcnode-id="1432" instrument_node="">
If your waist measurement is greater than the numbers indicated below, your risk for weight-related health problems may be increased.</span><span class="mntl-inline-citation mntl-dynamic-tooltip--trigger" data-dcnode-id="1430" data-id="#citation-1"><span data-dcnode-id="1431" instrument_node="">3</span></span><span data-dcnode-id="1429" instrument_node=""> For Asians, the waist circumference recommendation may need to be lower. A 2019 study done on 209 chinese men and 318 chinese women found that increased insulin resistance is observed when waist circumferences are greater than 29 inches for women and 32.5 inches for men.</span><span class="mntl-inline-citation mntl-dynamic-tooltip--trigger" data-dcnode-id="1427" data-id="#citation-4"><span data-dcnode-id="1428" instrument_node="">4</span></span><span data-dcnode-id="1426" instrument_node="">
</span></p><span data-dcnode-id="1424" instrument_node="">

</span><span class="heading-toc" data-dcnode-id="1368" id="toc-how-to-reduce-your-waist-measurement"></span><span data-dcnode-id="1367" instrument_node=""> </span><h2 class="comp mntl-sc-block health-sc-block-heading mntl-sc-block-heading" data-dcnode-id="1362" id="mntl-sc-block_1-0-33"><span data-dcnode-id="1366" instrument_node=""> </span><span class="mntl-sc-block-heading__text" data-dcnode-id="1364"><span data-dcnode-id="1365" instrument_node=""> How to Reduce Your Waist Measurement </span></span><span data-dcnode-id="1363" instrument_node=""> </span></h2><span data-dcnode-id="1361" instrument_node="">
</span><p class="comp mntl-sc-block mntl-sc-block-html" data-dcnode-id="1353" id="mntl-sc-block_1-0-34"><span data-dcnode-id="1360" instrument_node="">
If your waist circumference is in the high-risk range according to the table above,&nbsp;</span><a data-component="link" data-dcnode-id="1358" data-ordinal="1" data-source="inlineLink" data-type="internalLink" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.verywellfit.com/nutrition-4157081"><span data-dcnode-id="1359" instrument_node="">working with your doctor</span></a><span data-dcnode-id="1357" instrument_node=""> and a </span><a data-component="link" data-dcnode-id="1355" data-ordinal="2" data-source="inlineLink" data-type="internalLink" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.verywellfit.com/dietitian-nutritionist-difference-2506622"><span data-dcnode-id="1356" instrument_node="">registered dietitian</span></a><span data-dcnode-id="1354" instrument_node=""> to&nbsp;lose body fat&nbsp;and&nbsp;reduce the fat in your midsection&nbsp;can improve your health and well-being. To get started, consider the following daily habits.
</span></p><span data-dcnode-id="1352" instrument_node="">
</span><div class="comp mntl-sc-block mntl-sc-block-adslot mntl-block" data-dcnode-id="1351" id="mntl-sc-block_1-0-35"></div><span data-dcnode-id="1350" instrument_node="">
</span><h3 class="comp mntl-sc-block mntl-sc-block-subheading" data-dcnode-id="1345" id="mntl-sc-block_1-0-37"><span data-dcnode-id="1349" instrument_node=""> </span><span class="mntl-sc-block-subheading__text" data-dcnode-id="1347"><span data-dcnode-id="1348" instrument_node=""> Diet </span></span><span data-dcnode-id="1346" instrument_node=""> </span></h3><span data-dcnode-id="1344" instrument_node="">
</span><p class="comp mntl-sc-block mntl-sc-block-html" data-dcnode-id="1339" id="mntl-sc-block_1-0-38"><span data-dcnode-id="1343" instrument_node="">
The first step to reducing your waist measurement for your overall health is to evaluate your eating habits. To get started, try observing your portion sizes and comparing your portions to the recommended serving size. If you're not sure how much to eat, use a calorie calculator to estimate your body's daily caloric needs. Then </span><a data-component="link" data-dcnode-id="1341" data-ordinal="1" data-source="inlineLink" data-type="internalLink" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.verywellfit.com/calorie-counting-dos-and-donts-3495627"><span data-dcnode-id="1342" instrument_node="">count calories</span></a><span data-dcnode-id="1340" instrument_node=""> to make sure you're getting the right amount to fuel your body and lose weight safely.
</span></p><span data-dcnode-id="1338" instrument_node="">
</span><div class="comp mntl-sc-block mntl-sc-block-adslot mntl-block" data-dcnode-id="1337" id="mntl-sc-block_1-0-39"></div><span data-dcnode-id="1336" instrument_node="">
</span><div class="comp mntl-sc-block--weight-loss-calculator mntl-sc-block mntl-sc-block-tool mntl-block" data-dcnode-id="1332" id="mntl-sc-block_1-0-40"><span data-dcnode-id="1335" instrument_node="">
</span><div class="comp weight-loss-calculator mntl-block" data-dcnode-id="1334" data-defer="load" data-defer-params="" id="weight-loss-calculator_1-0-1"></div><span data-dcnode-id="1333" instrument_node="">
</span></div><span data-dcnode-id="1331" instrument_node="">
</span><div class="comp mntl-sc-block mntl-sc-block-adslot mntl-block" data-dcnode-id="1330" id="mntl-sc-block_1-0-41"></div><span data-dcnode-id="1329" instrument_node="">
</span><p class="comp mntl-sc-block mntl-sc-block-html" data-dcnode-id="1322" id="mntl-sc-block_1-0-42"><span data-dcnode-id="1328" instrument_node="">
Additionally, consider </span><a data-component="link" data-dcnode-id="1326" data-ordinal="1" data-source="inlineLink" data-type="internalLink" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.verywellfit.com/nutrient-density-is-key-to-healthy-eating-2507077"><span data-dcnode-id="1327" instrument_node="">increasing the nutrient density</span></a><span data-dcnode-id="1325" instrument_node=""> of your diet by incorporating more nutrient-packed foods into your meal planning, including fruits, vegetables, whole grains, nuts, seeds, lean proteins, and other unprocessed foods.</span><br data-dcnode-id="1324"><span data-dcnode-id="1323" instrument_node="">
</span></p><span data-dcnode-id="1321" instrument_node="">
</span><div class="comp mntl-sc-block mntl-sc-block-adslot mntl-block" data-dcnode-id="1320" id="mntl-sc-block_1-0-43"></div><span data-dcnode-id="1319" instrument_node="">
</span><p class="comp mntl-sc-block mntl-sc-block-html" data-dcnode-id="1311" id="mntl-sc-block_1-0-44"><span data-dcnode-id="1318" instrument_node="">
Nearly a quarter of all Americans skip breakfast.</span><span class="mntl-inline-citation mntl-dynamic-tooltip--trigger" data-dcnode-id="1316" data-id="#citation-5"><span data-dcnode-id="1317" instrument_node="">5</span></span><span data-dcnode-id="1315" instrument_node=""> Although more research is needed to solidify the importance of breakfast, a 2019 meta-analysis including eight studies and about 284,000 participants suggests that skipping breakfast increases the risk for heart disease. Skipping breakfast may also increase the risk for diabetes, becoming overweight, high blood pressure, and insulin resistance.</span><span class="mntl-inline-citation mntl-dynamic-tooltip--trigger" data-dcnode-id="1313" data-id="#citation-6"><span data-dcnode-id="1314" instrument_node="">6</span></span><span data-dcnode-id="1312" instrument_node="">
</span></p><span data-dcnode-id="1310" instrument_node="">
</span><div class="comp mntl-sc-block mntl-sc-block-adslot mntl-block" data-dcnode-id="1309" id="mntl-sc-block_1-0-45"></div><span data-dcnode-id="1308" instrument_node="">
</span><p class="comp mntl-sc-block mntl-sc-block-html" data-dcnode-id="1303" id="mntl-sc-block_1-0-46"><span data-dcnode-id="1307" instrument_node="">
Eliminating sugar-sweetened beverages—soda, especially—can also cut down your sugar and calorie intake. </span><a data-component="link" data-dcnode-id="1305" data-ordinal="1" data-source="inlineLink" data-type="internalLink" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.verywellfit.com/how-to-stop-drinking-soda-3495784"><span data-dcnode-id="1306" instrument_node="">Quitting a sugared beverage habit</span></a><span data-dcnode-id="1304" instrument_node=""> can offer multiple benefits, including improved sleep, increased energy, and notably, weight loss. This weight loss can then lead to a reduction in your waist measurement and disease risk.
</span></p><span data-dcnode-id="1302" instrument_node="">
</span><div class="comp mntl-sc-block mntl-sc-block-adslot mntl-block" data-dcnode-id="1301" id="mntl-sc-block_1-0-47"></div><span data-dcnode-id="1300" instrument_node="">
</span><h3 class="comp mntl-sc-block mntl-sc-block-subheading" data-dcnode-id="1295" id="mntl-sc-block_1-0-49"><span data-dcnode-id="1299" instrument_node=""> </span><span class="mntl-sc-block-subheading__text" data-dcnode-id="1297"><span data-dcnode-id="1298" instrument_node=""> Exercise </span></span><span data-dcnode-id="1296" instrument_node=""> </span></h3><span data-dcnode-id="1294" instrument_node="">
</span><p class="comp mntl-sc-block mntl-sc-block-html" data-dcnode-id="1286" id="mntl-sc-block_1-0-50"><span data-dcnode-id="1293" instrument_node="">
Once you've implemented a sustainable healthy eating plan, try increasing your activity level to burn more calories throughout the day and support a strong, healthy body. Again, use a </span><a data-component="link" data-dcnode-id="1291" data-ordinal="1" data-source="inlineLink" data-type="internalLink" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.verywellfit.com/how-many-calories-do-i-burn-every-day-3495464"><span data-dcnode-id="1292" instrument_node="">calorie estimator</span></a><span data-dcnode-id="1290" instrument_node=""> to find out how many calories you currently burn each day, then add small habit changes to burn a few more. For example, you can take the stairs instead of the elevator at work or go for a walk every evening after dinner. Every step counts in your path to healthier living. The CDC recommends that you get 150 minutes of moderate-intense aerobic activity or 75 minutes of vigorous aerobic activity with at least 2 days of the week doing muscle-strengthening training.</span><span class="mntl-inline-citation mntl-dynamic-tooltip--trigger" data-dcnode-id="1288" data-id="#citation-7"><span data-dcnode-id="1289" instrument_node="">7</span></span><span data-dcnode-id="1287" instrument_node="">
</span></p><span data-dcnode-id="1285" instrument_node="">
</span><div class="comp mntl-sc-block mntl-sc-block-adslot mntl-block" data-dcnode-id="1284" id="mntl-sc-block_1-0-51"></div><span data-dcnode-id="1283" instrument_node="">
</span><div class="comp learnmore-link mntl-sc-block mntl-sc-block-featuredlink mntl-block" data-dcnode-id="1277" id="mntl-sc-block_1-0-53"><span data-dcnode-id="1282" instrument_node="">
</span><a class="mntl-sc-block-featuredlink__link mntl-text-link" data-dcnode-id="1279" data-tracking-container="true" data-tracking-id="featured-link" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.verywellfit.com/exercise-tips-that-make-weight-loss-easier-3495390" id="mntl-sc-block-featuredlink__link_1-0-1"><span class="link__wrapper" data-dcnode-id="1280"><span data-dcnode-id="1281" instrument_node="">7 Exercise Tips That Make Weight Loss Easier</span></span></a><span data-dcnode-id="1278" instrument_node="">
</span></div><span data-dcnode-id="1276" instrument_node="">
</span><div class="comp mntl-sc-block mntl-sc-block-adslot mntl-block" data-dcnode-id="1275" id="mntl-sc-block_1-0-54"></div><span data-dcnode-id="1274" instrument_node="">
</span><h3 class="comp mntl-sc-block mntl-sc-block-subheading" data-dcnode-id="1269" id="mntl-sc-block_1-0-56"><span data-dcnode-id="1273" instrument_node=""> </span><span class="mntl-sc-block-subheading__text" data-dcnode-id="1271"><span data-dcnode-id="1272" instrument_node=""> Lifestyle Changes </span></span><span data-dcnode-id="1270" instrument_node=""> </span></h3><span data-dcnode-id="1268" instrument_node="">
</span><p class="comp mntl-sc-block mntl-sc-block-html" data-dcnode-id="1266" id="mntl-sc-block_1-0-57"><span data-dcnode-id="1267" instrument_node="">
Alongside diet and exercise, some lifestyle changes can help in reducing waist circumference and improving overall health. If you consistently get too little sleep or poor sleep, it can be even more difficult to find the motivation to make healthier choices. Improving your sleep and reducing fatigue can have a direct impact on your weight loss. The National Sleep Foundation recommends adults receive 7-9 hours of sleep per night.
</span></p><span data-dcnode-id="1265" instrument_node="">
</span><div class="comp mntl-sc-block mntl-sc-block-adslot mntl-block" data-dcnode-id="1264" id="mntl-sc-block_1-0-58"></div><span data-dcnode-id="1263" instrument_node="">
</span><p class="comp mntl-sc-block mntl-sc-block-html" data-dcnode-id="1258" id="mntl-sc-block_1-0-59"><span data-dcnode-id="1262" instrument_node="">
Stress, like sleep, is also intricately linked to health. Research has shown that </span><a data-component="link" data-dcnode-id="1260" data-ordinal="1" data-source="inlineLink" data-type="internalLink" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.verywellfit.com/overcome-emotional-stress-to-lose-weight-3495947"><span data-dcnode-id="1261" instrument_node="">high stress can often lead to overeating</span></a><span data-dcnode-id="1259" instrument_node="">, and the foods we choose while stressed tend to be high in calories and low in nutrients.
</span></p><span data-dcnode-id="1257" instrument_node="">
</span><div class="comp mntl-sc-block mntl-sc-block-adslot mntl-block" data-dcnode-id="1256" id="mntl-sc-block_1-0-60"></div><span data-dcnode-id="1255" instrument_node="">
</span><p class="comp mntl-sc-block mntl-sc-block-html" data-dcnode-id="1247" id="mntl-sc-block_1-0-61"><span data-dcnode-id="1254" instrument_node="">
Finally, </span><a data-component="link" data-dcnode-id="1252" data-ordinal="1" data-source="inlineLink" data-type="internalLink" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.verywellfit.com/should-i-quit-drinking-to-lose-weight-3495749"><span data-dcnode-id="1253" instrument_node="">reducing alcohol consumption</span></a><span data-dcnode-id="1251" instrument_node=""> can also slash your calorie intake and help support weight loss. Eliminating or cutting down on these </span><a data-component="link" data-dcnode-id="1249" data-ordinal="2" data-source="inlineLink" data-type="internalLink" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.verywellfit.com/empty-calories-guidelines-and-examples-3966903"><span data-dcnode-id="1250" instrument_node="">empty calories</span></a><span data-dcnode-id="1248" instrument_node=""> can aid in reducing your waist circumference measurement.
</span></p><span data-dcnode-id="1246" instrument_node="">
</span><div class="comp mntl-sc-block mntl-sc-block-adslot mntl-block" data-dcnode-id="1245" id="mntl-sc-block_1-0-62"></div><span data-dcnode-id="1244" instrument_node="">
</span><span class="heading-toc" data-dcnode-id="1243" id="toc-a-word-from-verywell"></span><span data-dcnode-id="1242" instrument_node=""> </span><h2 class="comp mntl-sc-block health-sc-block-heading mntl-sc-block-heading" data-dcnode-id="1237" id="mntl-sc-block_1-0-63"><span data-dcnode-id="1241" instrument_node=""> </span><span class="mntl-sc-block-heading__text" data-dcnode-id="1239"><span data-dcnode-id="1240" instrument_node=""> A Word From Verywell </span></span><span data-dcnode-id="1238" instrument_node=""> </span></h2><span data-dcnode-id="1236" instrument_node="">
</span><p class="comp mntl-sc-block mntl-sc-block-html" data-dcnode-id="1234" id="mntl-sc-block_1-0-64"><span data-dcnode-id="1235" instrument_node="">
There are many different ways to evaluate your health and your risk for disease—waist circumference is just one of them. If you find that yours is higher than you'd like it to be, talk to your healthcare provider about your personal health risks and get suggestions for the best ways to improve your overall health.
</span></p><span data-dcnode-id="1233" instrument_node="">
</span><div class="comp mntl-sc-block mntl-sc-block-adslot mntl-block" data-dcnode-id="1232" id="mntl-sc-block_1-0-65"></div><span data-dcnode-id="1231" instrument_node="">
</span><p class="comp mntl-sc-block mntl-sc-block-html" data-dcnode-id="1229" id="mntl-sc-block_1-0-66"><span data-dcnode-id="1230" instrument_node="">
Often, it's small, incremental changes to your lifestyle that ultimately make the biggest difference in your health and pave the path toward sustainable weight loss, so it's important to begin the conversation.
</span></p><span data-dcnode-id="1228" instrument_node="">
</span><div class="comp mntl-sc-block mntl-sc-block-adslot mntl-block" data-dcnode-id="1227" id="mntl-sc-block_1-0-67"></div><span data-dcnode-id="1226" instrument_node="">
