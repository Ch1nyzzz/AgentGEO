</span><a data-dcnode-id="637" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//twitter.com/intent/tweet%3Foriginal_referer%3Dhttps%253A%252F%252Fpulmonaryfibrosisnews.com%252Fspirometry-test-for-the-diagnosis-of-pf%252F%26url%3Dhttps%253A%252F%252Fpulmonaryfibrosisnews.com%252Fspirometry-test-for-the-diagnosis-of-pf%252F%26text%3DA%2520pulmonary%2520function%2520test%2520known%2520as%2520spirometry%2520measures%2520the%2520rate%2520of%2520air%2520flow%2520in%2520and%2520out%2520of%2520the%2520lungs%252C%2520and%2520a%2520person%2527s%2520estimated%2520lung%2520size.%2520Spirometry%2520is%2520just%2520one%2520of%2520the%2520tests%2520used%2520to%2520diagnose%2520pulmonary%2520fibrosis%2520%2528PF%2529.%2520No%2520single%2520test%2520is%2520definitive%252C%2520so..."><img data-dcnode-id="638" height="40px" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//bionews.com/global-code/images/twitter.png&amp;raw" width="40px"></a><span data-dcnode-id="636" instrument_node="">

</span><a data-dcnode-id="629" href="mailto:?subject=Share:%20Spirometry%20Test%20for%20the%20Diagnosis%20of%20PF&amp;body=Spirometry%20Test%20for%20the%20Diagnosis%20of%20PF%20%E2%80%93%20A%20pulmonary%20function%20test%20known%20as%20spirometry%20measures%20the%20rate%20of%20air%20flow%20in%20and%20out%20of%20the%20lungs%2C%20and%20a%20person's%20estimated%20lung%20size.%20Spirometry%20is%20just%20one%20of%20the%20tests%20used%20to%20diagnose%20pulmonary%20fibrosis%20(PF).%20No%20single%20test%20is%20definitive%2C%20so%20physicians%20often%20order%20up%20a%20battery%20of%20exams%20to%20come%20up%20with%20a%20diagnosis.%20Spirometry%20tests%20can%20be%20used%20to%20help%20diagnose%20a%20number%20of%20lung%20diseases%2C%20including%20asthma%2C%20chronic%20obstructive%20pulmonary%20disease...%0D%0A%0D%0ARead%20more%20at%20https:%2F%2Fpulmonaryfibrosisnews.com%2Fspirometry-test-for-the-diagnosis-of-pf%2F%0D%0A"><img data-dcnode-id="630" height="40px" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//bionews.com/global-code/images/mail.png&amp;raw" width="40px"></a><span data-dcnode-id="628" instrument_node="">
</span></div><span data-dcnode-id="626" instrument_node="">
</span></li></ul></div></div><div class="pf-content" data-dcnode-id="488"><p data-dcnode-id="613"><span data-dcnode-id="617" instrument_node="">A pulmonary function test known as&nbsp;</span><a data-dcnode-id="615" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.nhlbi.nih.gov/health/health-topics/topics/lft" onclick="javascript:window.open('https://www.nhlbi.nih.gov/health/health-topics/topics/lft'); return false;"><span data-dcnode-id="616" instrument_node="">spirometry</span></a><span data-dcnode-id="614" instrument_node="">&nbsp;measures the rate of air flow in and out of the lungs, and a person’s estimated lung size.</span></p><span data-dcnode-id="612" instrument_node="">
</span><p data-dcnode-id="610"><span data-dcnode-id="611" instrument_node="">Spirometry is just one of the tests used to diagnose pulmonary fibrosis (PF). No single test is definitive, so physicians often order up a battery of exams to come up with a diagnosis.</span></p><div class="code-block code-block-4" data-dcnode-id="602" style="margin: 0px auto; text-align: center; display: inline; clear: both;"><span data-dcnode-id="609" instrument_node="">
</span><div class="bio-ad mobile" data-dcnode-id="604" style=""><span data-dcnode-id="608" instrument_node="">
</span><div class="ads_container disclaimer-center disclaimer-show-true" data-ad-pos="4" data-ad-refresh="false" data-ad-size1="300,250" data-ad-size2="" data-ad-target="pf_ros_mob_two_300" data-dcnode-id="606" data-disclaimer-position="center" data-show-disclaimer="true" data-show-mobile="true" id="bionews-div-ros_mob_two_300-gpt-ad-4" style="width:300px"><span data-dcnode-id="607" instrument_node="">
</span></div><span data-dcnode-id="605" instrument_node="">
</span></div><span data-dcnode-id="603" instrument_node="">
</span></div><span data-dcnode-id="601" instrument_node="">
</span><p data-dcnode-id="596"><span data-dcnode-id="600" instrument_node="">Spirometry tests can be used to help diagnose&nbsp;</span><a data-dcnode-id="598" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.mayoclinic.org/tests-procedures/spirometry/basics/definition/prc-20012673" onclick="javascript:window.open('https://www.mayoclinic.org/tests-procedures/spirometry/basics/definition/prc-20012673'); return false;"><span data-dcnode-id="599" instrument_node="">a number of lung diseases</span></a><span data-dcnode-id="597" instrument_node="">, including asthma, chronic obstructive pulmonary disease (COPD) and other conditions that affect breathing. The test can also be used to see if a treatment is effective.</span></p><span data-dcnode-id="595" instrument_node="">
</span><h2 data-dcnode-id="593"><span data-dcnode-id="594" instrument_node="">What are air flow rates?</span></h2><span data-dcnode-id="592" instrument_node="">
</span><p data-dcnode-id="588"><a data-dcnode-id="590" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.mayoclinic.org/tests-procedures/spirometry/basics/results/prc-20012673" onclick="javascript:window.open('https://www.mayoclinic.org/tests-procedures/spirometry/basics/results/prc-20012673'); return false;"><span data-dcnode-id="591" instrument_node="">Air flow rates are measurements </span></a><span data-dcnode-id="589" instrument_node="">of the amount of air passing through the lungs in a specific period.</span></p><div class="code-block code-block-5" data-dcnode-id="580" style="margin: 0px auto; text-align: center; display: inline; clear: both;"><span data-dcnode-id="587" instrument_node="">
</span><div class="bio-ad mobile" data-dcnode-id="582" style=""><span data-dcnode-id="586" instrument_node="">
</span><div class="ads_container disclaimer-center disclaimer-show-true" data-ad-pos="5" data-ad-refresh="false" data-ad-size1="300,250" data-ad-size2="" data-ad-target="pf_ros_mob_three_300" data-dcnode-id="584" data-disclaimer-position="center" data-show-disclaimer="true" data-show-mobile="true" id="bionews-div-ros_mob_three_300-gpt-ad-5" style="width:300px"><span data-dcnode-id="585" instrument_node="">
</span></div><span data-dcnode-id="583" instrument_node="">
</span></div><span data-dcnode-id="581" instrument_node="">
</span></div><span data-dcnode-id="579" instrument_node="">
</span><p data-dcnode-id="577"><span data-dcnode-id="578" instrument_node="">Key spirometry air flow measurements include:</span></p><span data-dcnode-id="576" instrument_node="">
</span><ul data-dcnode-id="568"><span data-dcnode-id="575" instrument_node="">
</span><li data-dcnode-id="573"><span data-dcnode-id="574" instrument_node="">Forced vital capacity (FVC) – This is a measurement of lung size, in liters. It represents the volume of air in the lungs that can be exhaled after a deep inhaled breath.</span></li><span data-dcnode-id="572" instrument_node="">
</span><li data-dcnode-id="570"><span data-dcnode-id="571" instrument_node="">Forced expiratory volume in one second (FEV-1) – This measures how much air can be exhaled in one second after a deep inhaled breath.</span></li><span data-dcnode-id="569" instrument_node="">
</span></ul><span data-dcnode-id="567" instrument_node="">
</span><p data-dcnode-id="565"><span data-dcnode-id="566" instrument_node="">Low FVC values indicate restricted breathing. Low FEV-1 values indicate significant obstruction.</span></p><div class="code-block code-block-6" data-dcnode-id="557" style="margin: 0px auto; text-align: center; display: inline; clear: both;"><span data-dcnode-id="564" instrument_node="">
</span><div class="bio-ad mobile" data-dcnode-id="559" style=""><span data-dcnode-id="563" instrument_node="">
</span><div class="ads_container disclaimer-center disclaimer-show-true" data-ad-pos="6" data-ad-refresh="false" data-ad-size1="300,250" data-ad-size2="" data-ad-target="pf_ros_mob_four_300" data-dcnode-id="561" data-disclaimer-position="center" data-show-disclaimer="true" data-show-mobile="true" id="bionews-div-ros_mob_four_300-gpt-ad-6" style="width:300px"><span data-dcnode-id="562" instrument_node="">
</span></div><span data-dcnode-id="560" instrument_node="">
</span></div><span data-dcnode-id="558" instrument_node="">
</span></div><span data-dcnode-id="556" instrument_node="">
</span><p data-dcnode-id="551"><span data-dcnode-id="555" instrument_node="">When you receive your </span><a data-dcnode-id="553" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.worker-health.org/breathingtestresults.html" onclick="javascript:window.open('http://www.worker-health.org/breathingtestresults.html'); return false;"><span data-dcnode-id="554" instrument_node="">spirometry results</span></a><span data-dcnode-id="552" instrument_node="">, you will likely see an FEV1/FVC ratio. This number represents the percent of the lung size (FVC) that can be exhaled in one second. If the FEV1 is 4 and FVC is 5, then the FEV1/FVC ratio would be 4/5 or 80 percent. This means the patient can breathe out 80 percent of the air inhaled into the lungs in one second.</span></p><span data-dcnode-id="550" instrument_node="">
</span><h2 data-dcnode-id="548"><span data-dcnode-id="549" instrument_node="">How does a spirometry test work?</span></h2><span data-dcnode-id="547" instrument_node="">
</span><p data-dcnode-id="542"><span data-dcnode-id="546" instrument_node="">A </span><a data-dcnode-id="544" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.mayoclinic.org/tests-procedures/spirometry/basics/what-you-can-expect/prc-20012673" onclick="javascript:window.open('https://www.mayoclinic.org/tests-procedures/spirometry/basics/what-you-can-expect/prc-20012673'); return false;"><span data-dcnode-id="545" instrument_node="">spirometry test requires</span></a><span data-dcnode-id="543" instrument_node="">&nbsp;you to breathe into a tube attached to a device called a spirometer. Before you perform the test, a doctor or nurse will give you instructions. Make the most of this pre-test moment to clarify questions you may have.</span></p><div class="code-block code-block-7" data-dcnode-id="534" style="margin: 0px auto; text-align: center; display: inline; clear: both;"><span data-dcnode-id="541" instrument_node="">
</span><div class="bio-ad mobile" data-dcnode-id="536" style=""><span data-dcnode-id="540" instrument_node="">
</span><div class="ads_container disclaimer-center disclaimer-show-true" data-ad-pos="7" data-ad-refresh="false" data-ad-size1="300,250" data-ad-size2="" data-ad-target="pf_ros_mob_five_300" data-dcnode-id="538" data-disclaimer-position="center" data-show-disclaimer="true" data-show-mobile="true" id="bionews-div-ros_mob_five_300-gpt-ad-7" style="width:300px"><span data-dcnode-id="539" instrument_node="">
</span></div><span data-dcnode-id="537" instrument_node="">
</span></div><span data-dcnode-id="535" instrument_node="">
</span></div><span data-dcnode-id="533" instrument_node="">
</span><p data-dcnode-id="531"><span data-dcnode-id="532" instrument_node="">During the test, you will likely be seated, and a clip will be placed on your nose to keep your nostrils closed.</span></p><span data-dcnode-id="530" instrument_node="">
</span><p data-dcnode-id="528"><span data-dcnode-id="529" instrument_node="">You will be told to take a deep breath and breathe out as hard as you can for several seconds. Make sure your lips seal the tube you are exhaling into, so no air escapes.</span></p><span data-dcnode-id="527" instrument_node="">
</span><p data-dcnode-id="525"><span data-dcnode-id="526" instrument_node="">You’ll need to repeat the test at least three times, to even out the results. If there is a lot of variation in the results, you may be asked to repeat the test an additional time. The combined results are the final result. Usually, the entire testing and feedback process takes no more than 15 minutes.</span></p><span data-dcnode-id="524" instrument_node="">
</span><p data-dcnode-id="522"><span data-dcnode-id="523" instrument_node="">Your doctor may give you a bronchodilator medicine to open your lungs after an initial round of spirometry. You’ll then need to wait 15 minutes and repeat the test. Your doctor will compare the results with and without the bronchodilator’s help.</span></p><span data-dcnode-id="521" instrument_node="">
</span><h2 data-dcnode-id="519"><span data-dcnode-id="520" instrument_node="">How to prepare for the test</span></h2><span data-dcnode-id="518" instrument_node="">
</span><p data-dcnode-id="514"><a data-dcnode-id="516" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.mayoclinic.org/tests-procedures/spirometry/basics/how-you-prepare/prc-20012673" onclick="javascript:window.open('https://www.mayoclinic.org/tests-procedures/spirometry/basics/how-you-prepare/prc-20012673'); return false;"><span data-dcnode-id="517" instrument_node="">Ask your doctor</span></a><span data-dcnode-id="515" instrument_node=""> before the test if you should stop using inhaled-breathing or other medications you are using, and how long you should stop before the test.</span></p><span data-dcnode-id="513" instrument_node="">
</span><p data-dcnode-id="511"><span data-dcnode-id="512" instrument_node="">Be sure to wear loose clothing that does not affect your ability to take a deep breath. And avoid eating a big meal before the test, so it’s easier to breathe.</span></p><span data-dcnode-id="510" instrument_node="">
</span><h2 data-dcnode-id="508"><span data-dcnode-id="509" instrument_node="">What are the risks involved with the test?</span></h2><span data-dcnode-id="507" instrument_node="">
</span><p data-dcnode-id="502"><span data-dcnode-id="506" instrument_node="">Spirometry is </span><a data-dcnode-id="504" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.mayoclinic.org/tests-procedures/spirometry/basics/risks/prc-20012673" onclick="javascript:window.open('https://www.mayoclinic.org/tests-procedures/spirometry/basics/risks/prc-20012673'); return false;"><span data-dcnode-id="505" instrument_node="">safe</span></a><span data-dcnode-id="503" instrument_node="">. You may feel dizzy or experience shortness of breath right after the test but this will go away. If you recently had a heart attack or other heart-related episode, you should not take a spirometry test. On rare occasions, the test has triggered worse breathing problems for a patient.</span></p><span data-dcnode-id="501" instrument_node="">
</span><p data-dcnode-id="494"><em data-dcnode-id="495"><span class="s1" data-dcnode-id="496"><span data-dcnode-id="500" instrument_node="">Note: </span><a data-dcnode-id="498" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//pulmonaryfibrosisnews.com/"><span data-dcnode-id="499" instrument_node="">Pulmonary Fibrosis News</span></a><span data-dcnode-id="497" instrument_node=""> is strictly a news and information website about the disease. It does not provide medical advice, diagnosis, or treatment. This content is not intended to be a substitute for professional medical advice, diagnosis, or treatment. Always seek the advice of your physician or other qualified health provider with any questions you may have regarding a medical condition. Never disregard professional medical advice or delay in seeking it because of something you have read on this website.</span></span></em></p><span data-dcnode-id="493" instrument_node="">
