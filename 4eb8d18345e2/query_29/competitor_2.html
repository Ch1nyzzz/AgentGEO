</span><h1 class="page__title title" data-dcnode-id="836" id="page-title"><span data-dcnode-id="837" instrument_node="">Spirometry </span></h1><span data-dcnode-id="835" instrument_node="">

</span><div class="content-inner clearfix" data-dcnode-id="186"><span data-dcnode-id="832" instrument_node="">
</span><article about="https://www.lung.ca/lung-health/lung-disease/spirometry" class="node-2488 node node-disease-book view-mode-full clearfix" data-dcnode-id="215" typeof="sioc:Item foaf:Document"><span data-dcnode-id="831" instrument_node="">
</span><header data-dcnode-id="827"><span data-dcnode-id="830" instrument_node="">
</span><span class="rdf-meta element-hidden" content="Spirometry " data-dcnode-id="829" property="dc:title"></span><span data-dcnode-id="828" instrument_node="">
</span></header><span data-dcnode-id="826" instrument_node="">
</span><div class="field field-name-body field-type-text-with-summary field-label-hidden" data-dcnode-id="217"><div class="field-items" data-dcnode-id="218"><div class="field-item even" data-dcnode-id="219" property="content:encoded"><p data-dcnode-id="824"><span data-dcnode-id="825" instrument_node="">Spirometry is a common and effective diagnostic test that can easily be done in your doctor's office or at a nearby hospital or clinic. You will be asked to take in a big breath, and then blow as hard and long as you can into a machine. The machine measures how much air you can blow out from your lungs and how fast you can blow it out. Spirometry is the most reliable way to test your lungs for COPD (chronic obstructive pulmonary disease) and asthma.</span></p><span data-dcnode-id="823" instrument_node="">
</span><p data-dcnode-id="821"><span data-dcnode-id="822" instrument_node="">Your doctor may call spirometry by another name including: pulmonary function test (PFT) or lung function test.</span></p><span data-dcnode-id="820" instrument_node="">

p-fullscreen-button-corner-3" data-dcnode-id="319"><use class="ytp-svg-shadow" data-dcnode-id="321" href="#ytp-id-9"><path class="ytp-svg-fill" d="M 12,20 10,20 10,26 l 6,0 0,-2 -4,0 0,-4 0,0 z" data-dcnode-id="322" id="ytp-id-9"></path></use><path class="ytp-svg-fill" d="M 12,20 10,20 10,26 l 6,0 0,-2 -4,0 0,-4 0,0 z" data-dcnode-id="320" id="ytp-id-9"></path></g></svg></button></div></div></div></div></div><noscript data-dcnode-id="306"><span data-dcnode-id="307" instrument_node="">&lt;div class="player-unavailable"&gt;&lt;h1 class="message"&gt;An error occurred.&lt;/h1&gt;&lt;div class="submessage"&gt;&lt;a href="https://www.youtube.com/watch?v=LeXgXKIyRA0" target="_blank"&gt;Try watching this video on www.youtube.com&lt;/a&gt;, or enable JavaScript if it is disabled in your browser.&lt;/div&gt;&lt;/div&gt;</span></noscript></body></html></iframe></div><span data-dcnode-id="300" instrument_node="">
</span><h2 data-dcnode-id="298"><span data-dcnode-id="299" instrument_node="">Why is spirometry important?</span></h2><span data-dcnode-id="297" instrument_node="">
</span><p data-dcnode-id="295"><span data-dcnode-id="296" instrument_node="">Spirometry can be used to diagnose and manage many different types of lung disease. If you have questions or concerns about your lung health, talk to you doctor about spirometry.</span></p><span data-dcnode-id="294" instrument_node="">
</span><p data-dcnode-id="292"><span data-dcnode-id="293" instrument_node="">The earlier spirometry is done, the earlier lung disease can be detected and treated. There are many treatments to reduce symptoms, to prevent lung disease from becoming worse, decrease flare-ups (exacerbations) and improve your day-to-day life.</span></p><span data-dcnode-id="291" instrument_node="">
</span><h2 data-dcnode-id="289"><span data-dcnode-id="290" instrument_node="">Who should have spirometry testing?</span></h2><span data-dcnode-id="288" instrument_node="">
</span><ul data-dcnode-id="273"><li data-dcnode-id="286"><span data-dcnode-id="287" instrument_node="">People with asthma</span></li><span data-dcnode-id="285" instrument_node="">
</span><li data-dcnode-id="283"><span data-dcnode-id="284" instrument_node="">Spirometry is an important diagnosis and management tool for people with asthma. If you have asthma and never had a spirometry test, please talk to your doctor about spirometry.</span></li><span data-dcnode-id="282" instrument_node="">
</span><li data-dcnode-id="280"><span data-dcnode-id="281" instrument_node="">Smokers and former smokers</span></li><span data-dcnode-id="279" instrument_node="">
</span><li data-dcnode-id="275"><span data-dcnode-id="278" instrument_node="">If you are over 40 and smoke or used to smoke, you may have COPD. Take this </span><a data-dcnode-id="276" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.lung.ca/lung-health/lung-disease/copd/symptoms"><span data-dcnode-id="277" instrument_node="">quick test to screen for symptoms of COPD.</span></a></li><span data-dcnode-id="274" instrument_node="">
</span></ul><h2 data-dcnode-id="271"><span data-dcnode-id="272" instrument_node="">What happens in a spirometry test?</span></h2><span data-dcnode-id="270" instrument_node="">
</span><p data-dcnode-id="268"><span data-dcnode-id="269" instrument_node="">Spirometry is a painless test that can often be done in your doctor’s office or in a nearby clinic. The entire test usually takes less than 10 minutes, although sometimes it is repeated after taking a puffer medication.</span></p><span data-dcnode-id="267" instrument_node="">
</span><p data-dcnode-id="265"><span data-dcnode-id="266" instrument_node="">You will be asked to breathe through a mouthpiece while wearing a nose clip. The tester will coach you to take in as big a breath as possible. You will then blast the air out as fast as you can until your lungs are completely empty. You may then be asked to take another deep breath in again. You will do this three times or more to make sure the results are accurate. You may also be given a medication to breathe in. The test would then be repeated to show if your lungs have responded to the medication.</span></p><span data-dcnode-id="264" instrument_node="">
</span><p data-dcnode-id="262"><span data-dcnode-id="263" instrument_node="">How to prepare for the test:</span></p><span data-dcnode-id="261" instrument_node="">
</span><ul data-dcnode-id="242"><li data-dcnode-id="259"><span data-dcnode-id="260" instrument_node="">Do not smoke for one hour before test</span></li><span data-dcnode-id="258" instrument_node="">
</span><li data-dcnode-id="256"><span data-dcnode-id="257" instrument_node="">Do not drink alcohol within four hours of test</span></li><span data-dcnode-id="255" instrument_node="">
</span><li data-dcnode-id="253"><span data-dcnode-id="254" instrument_node="">Do not eat a large meal within two hours of test</span></li><span data-dcnode-id="252" instrument_node="">
</span><li data-dcnode-id="250"><span data-dcnode-id="251" instrument_node="">Please wear loose clothing</span></li><span data-dcnode-id="249" instrument_node="">
</span><li data-dcnode-id="247"><span data-dcnode-id="248" instrument_node="">Do not perform vigorous exercise within 30 minutes of test</span></li><span data-dcnode-id="246" instrument_node="">
</span><li data-dcnode-id="244"><span data-dcnode-id="245" instrument_node="">If you are on puffer medications, you may be asked to not take them for a few hours before spirometry. Ask your doctor (or the center performing the test) beforehand if this applies to you.</span></li><span data-dcnode-id="243" instrument_node="">
</span></ul><h2 data-dcnode-id="240"><span data-dcnode-id="241" instrument_node="">What does spirometry measure?</span></h2><span data-dcnode-id="239" instrument_node="">
</span><ul data-dcnode-id="223"><li data-dcnode-id="237"><span data-dcnode-id="238" instrument_node="">Spirometry tells your doctor if your lungs are functioning normally. It does this through different breathing measurements, some of the most common measurements include:</span></li><span data-dcnode-id="236" instrument_node="">
</span><li data-dcnode-id="234"><span data-dcnode-id="235" instrument_node="">Forced Vital Capacity (FVC) – The largest amount of air that you can blow out after you take your biggest breath in.</span></li><span data-dcnode-id="233" instrument_node="">
</span><li data-dcnode-id="231"><span data-dcnode-id="232" instrument_node="">Forced Expiratory Volume (FEV1) – The amount of air you can blow out of your lungs in the first second.</span></li><span data-dcnode-id="230" instrument_node="">
</span><li data-dcnode-id="228"><span data-dcnode-id="229" instrument_node="">If the amount of air you blow out in the first second is low, you might have a lung disease such as asthma or COPD.</span></li><span data-dcnode-id="227" instrument_node="">
</span><li data-dcnode-id="225"><span data-dcnode-id="226" instrument_node="">If you have already been diagnosed with asthma or COPD, spirometry can be useful to determine if your current treatment is working.</span></li><span data-dcnode-id="224" instrument_node="">
</span></ul><p data-dcnode-id="221"><span data-dcnode-id="222" instrument_node="">So show your lungs some love. Talk to your doctor about spirometry.</span></p><span data-dcnode-id="220" instrument_node="">
</span></div></div></div><span data-dcnode-id="216" instrument_node="">
</span></article><span data-dcnode-id="214" instrument_node="">
