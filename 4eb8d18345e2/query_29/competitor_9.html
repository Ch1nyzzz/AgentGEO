</span><p data-dcnode-id="2539"><span data-dcnode-id="2546" instrument_node="">When considering lung volumes, it is useful to divide the total space within the lungs into </span><strong data-dcnode-id="2544"><span data-dcnode-id="2545" instrument_node="">volumes</span></strong><span data-dcnode-id="2543" instrument_node=""> and </span><strong data-dcnode-id="2541"><span data-dcnode-id="2542" instrument_node="">capacities</span></strong><span data-dcnode-id="2540" instrument_node="">. These allow an assessment of the mechanical condition of the lungs, its musculature, airway resistance and the effectiveness of gas exchange at the alveolar membrane. Furthermore they are generally cheap, non-invasive and simple tests.</span></p><span data-dcnode-id="2538" instrument_node="">
</span><p data-dcnode-id="2536"><span data-dcnode-id="2537" instrument_node="">In this article we will look at the volumes and capacities within the lungs, how they can be measured and how they are affected by pathology.</span></p><span data-dcnode-id="2535" instrument_node="">

</span><p data-dcnode-id="2367" style="text-align: left;"><span data-dcnode-id="2371" instrument_node="">Requires adequate </span><strong data-dcnode-id="2369"><span data-dcnode-id="2370" instrument_node="">compliance</span></strong><span data-dcnode-id="2368" instrument_node="">, muscle strength and low airway resistance</span></p><span data-dcnode-id="2366" instrument_node="">
</span></td></tr><tr data-dcnode-id="2345"><td data-dcnode-id="2358" style="text-align: left;" width="131"><strong data-dcnode-id="2359"><span data-dcnode-id="2360" instrument_node="">Inspiratory capacity</span></strong></td><td data-dcnode-id="2355" style="text-align: left;" width="159"><span data-dcnode-id="2356" instrument_node="">Volume breathed in from quiet expiration to maximum inspiration</span></td><td data-dcnode-id="2352" style="text-align: left;" width="153"><span data-dcnode-id="2353" instrument_node="">Tidal volume + inspiratory reserve volume</span></td><td data-dcnode-id="2349" style="text-align: left;" width="68"><span data-dcnode-id="2350" instrument_node="">3L</span></td><td data-dcnode-id="2347" width="202"></td></tr><tr data-dcnode-id="2326"><td data-dcnode-id="2340" style="text-align: left;" width="131"><strong data-dcnode-id="2341"><span data-dcnode-id="2342" instrument_node="">Functional residual capacity</span></strong></td><td data-dcnode-id="2337" style="text-align: left;" width="159"><span data-dcnode-id="2338" instrument_node="">Volume remaining after quiet expiration</span></td><td data-dcnode-id="2334" style="text-align: left;" width="153"><span data-dcnode-id="2335" instrument_node="">Expiratory reserve volume + residual volume</span></td><td data-dcnode-id="2331" style="text-align: left;" width="68"><span data-dcnode-id="2332" instrument_node="">3L</span></td><td data-dcnode-id="2328" style="text-align: left;" width="202"><span data-dcnode-id="2329" instrument_node="">Affected by height, gender, posture, changes in lung compliance. Height has the greatest influence.</span></td></tr><tr data-dcnode-id="2293"><td data-dcnode-id="2321" style="text-align: left;" width="131"><strong data-dcnode-id="2322"><span data-dcnode-id="2323" instrument_node="">Total lung capacity</span></strong></td><td data-dcnode-id="2318" style="text-align: left;" width="159"><span data-dcnode-id="2319" instrument_node="">Volume of air in lungs after maximum inspiration</span></td><td data-dcnode-id="2315" style="text-align: left;" width="153"><span data-dcnode-id="2316" instrument_node="">Sum of all volumes</span></td><td data-dcnode-id="2312" style="text-align: left;" width="68"><span data-dcnode-id="2313" instrument_node="">6L</span></td><td data-dcnode-id="2295" width="202"><span data-dcnode-id="2310" instrument_node="">
</span><p data-dcnode-id="2308" style="text-align: left;"><span data-dcnode-id="2309" instrument_node="">Restriction &lt; 80% predicted</span></p><span data-dcnode-id="2307" instrument_node="">
</span><p data-dcnode-id="2305" style="text-align: left;"><span data-dcnode-id="2306" instrument_node="">Hyperinflation &gt; 120% predicted</span></p><span data-dcnode-id="2304" instrument_node="">
</span><p data-dcnode-id="2297" style="text-align: left;"><span data-dcnode-id="2303" instrument_node="">Measured with </span><strong data-dcnode-id="2301"><span data-dcnode-id="2302" instrument_node="">helium</span></strong><span data-dcnode-id="2300" instrument_node=""> </span><strong data-dcnode-id="2298"><span data-dcnode-id="2299" instrument_node="">dilution</span></strong></p><span data-dcnode-id="2296" instrument_node="">
</span></td></tr></tbody></table><span data-dcnode-id="2288" instrument_node="">
</span><p data-dcnode-id="2284"><strong data-dcnode-id="2286"><span data-dcnode-id="2287" instrument_node="">Anatomical (serial) dead space</span></strong><span data-dcnode-id="2285" instrument_node=""> is the volume of air that never reaches alveoli and so never participates in respiration. It includes volume in upper and lower respiratory tract up to and including the terminal bronchioles</span></p><span data-dcnode-id="2283" instrument_node="">
</span><p data-dcnode-id="2276"><strong data-dcnode-id="2281"><span data-dcnode-id="2282" instrument_node="">Alveolar (distributive) dead space</span></strong><span data-dcnode-id="2280" instrument_node=""> is the volume of air that reaches alveoli but never participates in respiration. This can reflect alveoli that are ventilated but not perfused, for example secondary to a </span><strong data-dcnode-id="2278"><span data-dcnode-id="2279" instrument_node="">pulmonary embolus</span></strong><span data-dcnode-id="2277" instrument_node="">.</span></p><span data-dcnode-id="2275" instrument_node="">
</span><div class="wp-caption aligncenter" data-dcnode-id="2268" id="attachment_14565"><div class="copyright" data-dcnode-id="2273"><span data-dcnode-id="2274" instrument_node="">By OpenStax College [CC BY 3.0 (http://creativecommons.org/licenses/by/3.0)], via Wikimedia Commons</span></div><a data-dcnode-id="2271" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//teachmephysiology.com/wp-content/uploads/2017/06/lung-volumes.jpg" rel="lightbox" title=" Fig 1 – Diagram showing various lung volumes."><img alt="" class="size-full wp-image-14565" data-dcnode-id="2272" height="322" loading="lazy" sizes="(max-width: 800px) 100vw, 800px" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//teachmephysiology.com/wp-content/uploads/2017/06/lung-volumes.jpg&amp;raw" srcset="https://teachmephysiology.com/wp-content/uploads/2017/06/lung-volumes.jpg 800w, https://teachmephysiology.com/wp-content/uploads/2017/06/lung-volumes-300x121.jpg 300w, https://teachmephysiology.com/wp-content/uploads/2017/06/lung-volumes-768x309.jpg 768w, https://teachmephysiology.com/wp-content/uploads/2017/06/lung-volumes-600x242.jpg 600w" width="800"></a><p class="wp-caption-text" data-dcnode-id="2269"><span data-dcnode-id="2270" instrument_node=""> Fig 1 – Diagram showing various lung volumes.</span></p></div><span data-dcnode-id="2267" instrument_node="">
</span></div></div></div></div><div class="article-row" data-dcnode-id="2154"><div class="container" data-dcnode-id="2155"><div class="row" data-dcnode-id="2156"><div class="col-12 col-lg-8 pr-lg-5 article-col col-p-12" data-dcnode-id="2157"><h2 data-dcnode-id="2259"><span data-dcnode-id="2260" id="Measuring_Volumes_and_Capacities"><strong data-dcnode-id="2261"><span data-dcnode-id="2262" instrument_node="">Measuring Volumes and Capacities</span></strong></span></h2><span data-dcnode-id="2258" instrument_node="">
</span><h3 data-dcnode-id="2254"><span data-dcnode-id="2255" id="Simple_Spirometry"><strong data-dcnode-id="2256"><span data-dcnode-id="2257" instrument_node="">Simple Spirometry</span></strong></span></h3><span data-dcnode-id="2253" instrument_node="">
</span><p data-dcnode-id="2242"><span data-dcnode-id="2252" instrument_node="">Simple spirometry can measure </span><strong data-dcnode-id="2250"><span data-dcnode-id="2251" instrument_node="">tidal volume</span></strong><span data-dcnode-id="2249" instrument_node="">, </span><strong data-dcnode-id="2247"><span data-dcnode-id="2248" instrument_node="">inspiratory reserve volume</span></strong><span data-dcnode-id="2246" instrument_node=""> and </span><strong data-dcnode-id="2244"><span data-dcnode-id="2245" instrument_node="">expiratory reserve volume</span></strong><span data-dcnode-id="2243" instrument_node="">. However, it cannot measure residual volume.</span></p><span data-dcnode-id="2241" instrument_node="">
</span><p data-dcnode-id="2239"><span data-dcnode-id="2240" instrument_node="">Measured values are standardised for height, age and sex, although height is the factor with the greatest influence upon capacities.</span></p><span data-dcnode-id="2238" instrument_node="">
</span><p data-dcnode-id="2224"><span data-dcnode-id="2234" style="text-decoration: underline;"><span data-dcnode-id="2237" instrument_node="">Process</span><br data-dcnode-id="2236"><span data-dcnode-id="2235" instrument_node="">
</span></span><br data-dcnode-id="2233"><span data-dcnode-id="2232" instrument_node="">
The subject breathes from a closed circuit over water. The chamber is filled with oxygen and as they breathe, gas increased and reduces the volumes within the circuit. A weight above the chamber changes height with each ventilation according to the circuit volume. Its height is recorded with a pen to reflect the </span><strong data-dcnode-id="2230"><span data-dcnode-id="2231" instrument_node="">volume</span></strong><span data-dcnode-id="2229" instrument_node="">&nbsp;inspired or expired over&nbsp;</span><strong data-dcnode-id="2227"><span data-dcnode-id="2228" instrument_node="">time</span></strong><strong data-dcnode-id="2225"><span data-dcnode-id="2226" instrument_node="">.</span></strong></p><span data-dcnode-id="2223" instrument_node="">
</span><div class="wp-caption aligncenter" data-dcnode-id="2216" id="attachment_16990"><div class="copyright" data-dcnode-id="2221"><span data-dcnode-id="2222" instrument_node="">British Lung Foundation</span></div><a data-dcnode-id="2219" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//teachmephysiology.com/wp-content/uploads/2020/04/Simple-spirometry-1.jpg" rel="lightbox" title=" Fig 2 – Simple spirometry"><img alt="" class="size-medium wp-image-16990" data-dcnode-id="2220" height="167" loading="lazy" sizes="(max-width: 300px) 100vw, 300px" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//teachmephysiology.com/wp-content/uploads/2020/04/Simple-spirometry-1-300x167.jpg&amp;raw" srcset="https://teachmephysiology.com/wp-content/uploads/2020/04/Simple-spirometry-1-300x167.jpg 300w, https://teachmephysiology.com/wp-content/uploads/2020/04/Simple-spirometry-1-768x429.jpg 768w, https://teachmephysiology.com/wp-content/uploads/2020/04/Simple-spirometry-1.jpg 894w" width="300"></a><p class="wp-caption-text" data-dcnode-id="2217"><span data-dcnode-id="2218" instrument_node=""> Fig 2 – Simple spirometry</span></p></div><span data-dcnode-id="2215" instrument_node="">
</span><h3 data-dcnode-id="2208"><span data-dcnode-id="2209" id="Helium_dilution"><strong data-dcnode-id="2213"><span data-dcnode-id="2214" instrument_node="">Helium</span></strong><span data-dcnode-id="2212" instrument_node=""> </span><strong data-dcnode-id="2210"><span data-dcnode-id="2211" instrument_node="">dilution</span></strong></span></h3><span data-dcnode-id="2207" instrument_node="">
</span><p data-dcnode-id="2199"><span data-dcnode-id="2206" instrument_node="">Helium dilution is used to measure </span><strong data-dcnode-id="2204"><span data-dcnode-id="2205" instrument_node="">total lung capacity.</span></strong><span data-dcnode-id="2203" instrument_node=""> However, it is only accurate if the lungs are not obstructed. If there is a point of obstruction, helium may not reach all areas of the lung during a ventilation, producing an underestimate as only </span><em data-dcnode-id="2201"><span data-dcnode-id="2202" instrument_node="">ventilated</span></em><span data-dcnode-id="2200" instrument_node=""> lung volumes are measured.</span></p><span data-dcnode-id="2198" instrument_node="">
</span><p data-dcnode-id="2195"><span data-dcnode-id="2196" style="text-decoration: underline;"><span data-dcnode-id="2197" instrument_node="">Process</span></span></p><span data-dcnode-id="2194" instrument_node="">
</span><p data-dcnode-id="2189"><span data-dcnode-id="2193" instrument_node="">After quiet expiration, the subject breathes in a gas with a known concentration of helium (an inert gas). They hold their breath for 10 seconds, allowing helium to mix with air in the lungs, diluting the concentration of helium. The concentration of helium is then measured after expiration. The </span><strong data-dcnode-id="2191"><span data-dcnode-id="2192" instrument_node="">volume</span></strong><span data-dcnode-id="2190" instrument_node="">&nbsp;of air which is ventilated is then calculated according to the degree of dilution of the helium.</span></p><span data-dcnode-id="2188" instrument_node="">
</span><h3 data-dcnode-id="2181"><span data-dcnode-id="2182" id="Nitrogen_washout"><strong data-dcnode-id="2186"><span data-dcnode-id="2187" instrument_node="">Nitrogen</span></strong><span data-dcnode-id="2185" instrument_node=""> </span><strong data-dcnode-id="2183"><span data-dcnode-id="2184" instrument_node="">washout</span></strong></span></h3><span data-dcnode-id="2180" instrument_node="">
</span><p data-dcnode-id="2175"><span data-dcnode-id="2179" instrument_node="">A method for calculating </span><strong data-dcnode-id="2177"><span data-dcnode-id="2178" instrument_node="">serial/anatomical&nbsp;dead space</span></strong><span data-dcnode-id="2176" instrument_node="">&nbsp;in the conducting airways up to and including the terminal bronchioles (usually 150mL).</span></p><span data-dcnode-id="2174" instrument_node="">
</span><p data-dcnode-id="2171"><span data-dcnode-id="2172" style="text-decoration: underline;"><span data-dcnode-id="2173" instrument_node="">Process</span></span></p><span data-dcnode-id="2170" instrument_node="">
</span><p data-dcnode-id="2168"><span data-dcnode-id="2169" instrument_node="">The subject takes a breath of pure oxygen and then exhales through a valve which measures nitrogen levels. At first, pure oxygen is exhaled, representing the dead space volume as the air exhaled never reached the alveoli and underwent gaseous exchange.</span></p><span data-dcnode-id="2167" instrument_node="">
</span><p data-dcnode-id="2159"><span data-dcnode-id="2166" instrument_node="">Then, a mixture of dead space air and alveolar air is expired, meaning the detected concentration of nitrogen increases as nitrogen rich air from the dead space reaches the valve. After a few breaths, the lungs are washed out of pure oxygen, meaning that purely alveolar air is expired, with the nitrogen levels reflecting that of alveolar air. The levels of nitrogen measured over time can be used to calculate the&nbsp;</span><strong data-dcnode-id="2164"><span data-dcnode-id="2165" instrument_node="">anatomical</span></strong><span data-dcnode-id="2163" instrument_node=""> </span><strong data-dcnode-id="2161"><span data-dcnode-id="2162" instrument_node="">dead space volume</span></strong><span data-dcnode-id="2160" instrument_node=""> of the lungs.</span></p><span data-dcnode-id="2158" instrument_node="">
</span></div></div></div></div><div class="article-row" data-dcnode-id="1884"><div class="container" data-dcnode-id="1885"><div class="row" data-dcnode-id="1886"><div class="col-12 col-lg-8 pr-lg-5 article-col col-p-12" data-dcnode-id="1887"><h2 data-dcnode-id="2150"><span data-dcnode-id="2151" id="Visualising_lung_volumes"><strong data-dcnode-id="2152"><span data-dcnode-id="2153" instrument_node="">Visualising lung volumes</span></strong></span></h2><span data-dcnode-id="2149" instrument_node="">
</span><h3 data-dcnode-id="2145"><span data-dcnode-id="2146" id="Vitalograph"><strong data-dcnode-id="2147"><span data-dcnode-id="2148" instrument_node="">Vitalograph</span></strong></span></h3><span data-dcnode-id="2144" instrument_node="">
</span><p data-dcnode-id="2142"><span data-dcnode-id="2143" instrument_node="">A vitalograph creates plots of volume againt time, using data collected from spirometry tests.</span></p><span data-dcnode-id="2141" instrument_node="">
</span><p data-dcnode-id="2139"><span data-dcnode-id="2140" instrument_node="">Two important spirometry volumes that can be measured from a Vitalograph are:</span></p><span data-dcnode-id="2138" instrument_node="">
</span><ul data-dcnode-id="2123"><span data-dcnode-id="2137" instrument_node="">
</span><li data-dcnode-id="2133"><strong data-dcnode-id="2135"><span data-dcnode-id="2136" instrument_node="">FVC</span></strong><span data-dcnode-id="2134" instrument_node=""> (forced vital capacity)&nbsp; – the maximal volume of air that a subject can expel in one maximal expiration from a point of maximal inspiration.</span></li><span data-dcnode-id="2132" instrument_node="">
</span><li data-dcnode-id="2125"><strong data-dcnode-id="2127"><span data-dcnode-id="2131" instrument_node="">FEV</span><sub data-dcnode-id="2129"><span data-dcnode-id="2130" instrument_node="">1</span></sub><span data-dcnode-id="2128" instrument_node=""> &nbsp;</span></strong><span data-dcnode-id="2126" instrument_node="">(forced expiratory volume in one second) – the maximal volume of air that a subject can expel in one second from a point of maximal inspiration.</span></li><span data-dcnode-id="2124" instrument_node="">
</span></ul><span data-dcnode-id="2122" instrument_node="">
</span><p data-dcnode-id="2108"><span data-dcnode-id="2121" instrument_node="">The proportion of air that can be exhaled in the first second compared to the total volume of air that can be exhaled is important in assessing for possible airway </span><strong data-dcnode-id="2119"><span data-dcnode-id="2120" instrument_node="">obstruction</span></strong><span data-dcnode-id="2118" instrument_node="">. This proportion is known as the </span><strong data-dcnode-id="2113"><span data-dcnode-id="2117" instrument_node="">FEV</span><sub data-dcnode-id="2115"><span data-dcnode-id="2116" instrument_node="">1</span></sub><span data-dcnode-id="2114" instrument_node="">/FVC</span></strong><span data-dcnode-id="2112" instrument_node=""> </span><strong data-dcnode-id="2110"><span data-dcnode-id="2111" instrument_node="">ratio</span></strong><span data-dcnode-id="2109" instrument_node="">.</span></p><span data-dcnode-id="2107" instrument_node="">
</span><div class="wp-caption aligncenter" data-dcnode-id="2100" id="attachment_14567"><div class="copyright" data-dcnode-id="2105"><span data-dcnode-id="2106" instrument_node="">By National Heart Lung and Blood Insitute (NIH) (National Heart Lung and Blood Insitute (NIH)) [Public domain], via Wikimedia Commons</span></div><a data-dcnode-id="2103" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//teachmephysiology.com/wp-content/uploads/2017/06/spirometer.jpg" rel="lightbox" title=" Fig 3 – Image showing the process of spirometry using a spirometer."><img alt="" class="size-full wp-image-14567" data-dcnode-id="2104" height="412" loading="lazy" sizes="(max-width: 475px) 100vw, 475px" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//teachmephysiology.com/wp-content/uploads/2017/06/spirometer.jpg&amp;raw" srcset="https://teachmephysiology.com/wp-content/uploads/2017/06/spirometer.jpg 475w, https://teachmephysiology.com/wp-content/uploads/2017/06/spirometer-300x260.jpg 300w" width="475"></a><p class="wp-caption-text" data-dcnode-id="2101"><span data-dcnode-id="2102" instrument_node=""> Fig 3 – Image showing the process of spirometry using a spirometer.</span></p></div><span data-dcnode-id="2099" instrument_node="">
</span><h3 data-dcnode-id="2089"><span data-dcnode-id="2090" id="Flow_volume_loop"><strong data-dcnode-id="2097"><span data-dcnode-id="2098" instrument_node="">Flow</span></strong><span data-dcnode-id="2096" instrument_node=""> </span><strong data-dcnode-id="2094"><span data-dcnode-id="2095" instrument_node="">volume</span></strong><span data-dcnode-id="2093" instrument_node=""> </span><strong data-dcnode-id="2091"><span data-dcnode-id="2092" instrument_node="">loop</span></strong></span></h3><span data-dcnode-id="2088" instrument_node="">
</span><p data-dcnode-id="2086"><span data-dcnode-id="2087" instrument_node="">This plots flow over volume (showing expiratory flow and inspiratory flow as positive and negative values respectively).</span></p><span data-dcnode-id="2085" instrument_node="">
</span><p data-dcnode-id="2083"><span data-dcnode-id="2084" instrument_node="">Important factors to consider when assessing flow-volume curves are as follows:</span></p><span data-dcnode-id="2082" instrument_node="">
</span><ul data-dcnode-id="2062"><span data-dcnode-id="2081" instrument_node="">
</span><li data-dcnode-id="2074"><strong data-dcnode-id="2079"><span data-dcnode-id="2080" instrument_node="">Peak Expiratory Flow Rate (PEFR)</span></strong><span data-dcnode-id="2078" instrument_node="">&nbsp;– the </span><em data-dcnode-id="2076"><span data-dcnode-id="2077" instrument_node="">rate</span></em><span data-dcnode-id="2075" instrument_node=""> of flow.</span></li><span data-dcnode-id="2073" instrument_node="">
</span><li data-dcnode-id="2069"><strong data-dcnode-id="2071"><span data-dcnode-id="2072" instrument_node="">Vital capacity&nbsp;</span></strong><span data-dcnode-id="2070" instrument_node="">– the volume expired, calculated from the X-axis.</span></li><span data-dcnode-id="2068" instrument_node="">
</span><li data-dcnode-id="2064"><strong data-dcnode-id="2066"><span data-dcnode-id="2067" instrument_node="">Shape&nbsp;</span></strong><span data-dcnode-id="2065" instrument_node="">of the curve – ‘spooning’ in obstructive disease, small overall loop in restrictive disease.</span></li><span data-dcnode-id="2063" instrument_node="">
</span></ul><span data-dcnode-id="2061" instrument_node="">
</span><div class="wp-caption aligncenter" data-dcnode-id="2054" id="attachment_14566"><div class="copyright" data-dcnode-id="2059"><span data-dcnode-id="2060" instrument_node="">By Evgenios Metaxas MD MSc, Pulmonologist Ευγένιος Μεταξάς MD MSc, Πνευμονολόγος [CC BY-SA 3.0 (http://creativecommons.org/licenses/by-sa/3.0)], via Wikimedia Commons</span></div><a data-dcnode-id="2057" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//teachmephysiology.com/wp-content/uploads/2017/06/spirometry.png" rel="lightbox" title=" Fig 4 – A flow-volume loop"><img alt="" class="size-full wp-image-14566" data-dcnode-id="2058" height="232" loading="lazy" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//teachmephysiology.com/wp-content/uploads/2017/06/spirometry.png&amp;raw" width="182"></a><p class="wp-caption-text" data-dcnode-id="2055"><span data-dcnode-id="2056" instrument_node=""> Fig 4 – A flow-volume loop</span></p></div><span data-dcnode-id="2053" instrument_node="">
</span><h3 data-dcnode-id="2043"><span data-dcnode-id="2044" id="Nitrogen_washout_graph"><strong data-dcnode-id="2051"><span data-dcnode-id="2052" instrument_node="">Nitrogen</span></strong><span data-dcnode-id="2050" instrument_node=""> </span><strong data-dcnode-id="2048"><span data-dcnode-id="2049" instrument_node="">washout</span></strong><span data-dcnode-id="2047" instrument_node=""> </span><strong data-dcnode-id="2045"><span data-dcnode-id="2046" instrument_node="">graph</span></strong></span></h3><span data-dcnode-id="2042" instrument_node="">
</span><p data-dcnode-id="2040"><span data-dcnode-id="2041" instrument_node="">This plots the percentage concentration of nitrogen in exhaled air (%N) against the total volume of air expired.</span></p><span data-dcnode-id="2039" instrument_node="">
</span><p data-dcnode-id="2029"><span data-dcnode-id="2038" instrument_node="">The </span><strong data-dcnode-id="2036"><span data-dcnode-id="2037" instrument_node="">anatomical </span></strong><strong data-dcnode-id="2034"><span data-dcnode-id="2035" instrument_node="">dead space</span></strong><span data-dcnode-id="2033" instrument_node=""> is determined by the volume of exhaled air at which the volume below the washout curve (A1) is </span><strong data-dcnode-id="2031"><span data-dcnode-id="2032" instrument_node="">equal</span></strong><span data-dcnode-id="2030" instrument_node=""> to the volume above the washout curve (A2).</span></p><span data-dcnode-id="2028" instrument_node="">

</span><p data-dcnode-id="1941"><span data-dcnode-id="1954" instrument_node="">In </span><strong data-dcnode-id="1952"><span data-dcnode-id="1953" instrument_node="">obstructive</span></strong><span data-dcnode-id="1951" instrument_node=""> </span><strong data-dcnode-id="1949"><span data-dcnode-id="1950" instrument_node="">disease,</span></strong><span data-dcnode-id="1948" instrument_node=""> the FEV</span><sub data-dcnode-id="1946"><span data-dcnode-id="1947" instrument_node="">1</span></sub><span data-dcnode-id="1945" instrument_node=""> is reduced due to increased resistance&nbsp;during expiration. Air trapping can also occur where more air is inspired than is expired, which can cause the residual volume to increase. In asthma, the obstruction is reversible which can aid in diagnosis. This means that FEV</span><sub data-dcnode-id="1943"><span data-dcnode-id="1944" instrument_node="">1</span></sub><span data-dcnode-id="1942" instrument_node="">/FVC will recover on re-test after the application of a bronchodilator such as salbutamol.</span></p><span data-dcnode-id="1940" instrument_node="">
</span><p data-dcnode-id="1929"><span data-dcnode-id="1939" instrument_node="">The so-called ‘</span><strong data-dcnode-id="1937"><span data-dcnode-id="1938" instrument_node="">spooning</span></strong><span data-dcnode-id="1936" instrument_node="">‘ of a flow-volume curve in </span><strong data-dcnode-id="1934"><span data-dcnode-id="1935" instrument_node="">obstructive</span></strong><span data-dcnode-id="1933" instrument_node=""> disease arises when the affected </span><strong data-dcnode-id="1931"><span data-dcnode-id="1932" instrument_node="">small airways</span></strong><span data-dcnode-id="1930" instrument_node=""> begin to collapse.</span></p><span data-dcnode-id="1928" instrument_node="">
</span><p data-dcnode-id="1923"><span data-dcnode-id="1927" instrument_node="">As air exits the thorax in expiration, the pressure within the small airways </span><strong data-dcnode-id="1925"><span data-dcnode-id="1926" instrument_node="">reduces</span></strong><span data-dcnode-id="1924" instrument_node=""> and thus the small airways are no longer propped open. This increases resistance to expiration and therefore reduces flow.</span></p><span data-dcnode-id="1922" instrument_node="">
</span><p data-dcnode-id="1917"><span data-dcnode-id="1921" instrument_node="">Examples of obstructive diseases are </span><strong data-dcnode-id="1919"><span data-dcnode-id="1920" instrument_node="">asthma,</span></strong><span data-dcnode-id="1918" instrument_node=""> COPD (chronic bronchitis, emphysema), tracheal stenosis and large airway tumors.</span></p><span data-dcnode-id="1916" instrument_node="">
</span><div class="wp-caption aligncenter" data-dcnode-id="1909" id="attachment_14568"><div class="copyright" data-dcnode-id="1914"><span data-dcnode-id="1915" instrument_node="">By User:Evgenios Metaxas MD MSc, Pulmonologist Ευγένιος Μεταξάς MD MSc, Πνευμονολόγος [CC BY-SA 3.0 (http://creativecommons.org/licenses/by-sa/3.0)], via Wikimedia Commons</span></div><a data-dcnode-id="1912" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//teachmephysiology.com/wp-content/uploads/2017/06/asthma-spirometry.png" rel="lightbox" title=" Fig 6 – Spirometry of a patient with asthma, an obstructive disorder."><img alt="" class="size-full wp-image-14568" data-dcnode-id="1913" height="232" loading="lazy" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//teachmephysiology.com/wp-content/uploads/2017/06/asthma-spirometry.png&amp;raw" width="206"></a><p class="wp-caption-text" data-dcnode-id="1910"><span data-dcnode-id="1911" instrument_node=""> Fig 6 – Spirometry of a patient with asthma, an obstructive disorder.</span></p></div><span data-dcnode-id="1908" instrument_node="">
</span><p data-dcnode-id="1900"><span data-dcnode-id="1907" instrument_node="">In </span><strong data-dcnode-id="1905"><span data-dcnode-id="1906" instrument_node="">restrictive</span></strong><span data-dcnode-id="1904" instrument_node=""> </span><strong data-dcnode-id="1902"><span data-dcnode-id="1903" instrument_node="">disease</span></strong><span data-dcnode-id="1901" instrument_node="">, the FVC is reduced due to poor lung expansion. This can be neurological, due to weak inspiratory muscles or due to an anatomical deformity. This causes the inspiratory reserve volume to be reduced as the lungs can’t inflate as much during maximum inspiration. Residual volume can also be reduced as expiration is more effective than inspiration.</span></p><span data-dcnode-id="1899" instrument_node="">
</span><p data-dcnode-id="1894"><span data-dcnode-id="1898" instrument_node="">Examples of restrictive diseases are interstitial pulmonary fibrosis, muscle weakness, </span><strong data-dcnode-id="1896"><span data-dcnode-id="1897" instrument_node="">kyphoscoliosis,</span></strong><span data-dcnode-id="1895" instrument_node=""> obesity, tense ascites.</span></p><span data-dcnode-id="1893" instrument_node="">

</span><p data-dcnode-id="1403"><span data-dcnode-id="1410" instrument_node="">When considering lung volumes, it is useful to divide the total space within the lungs into </span><strong data-dcnode-id="1408"><span data-dcnode-id="1409" instrument_node="">volumes</span></strong><span data-dcnode-id="1407" instrument_node=""> and </span><strong data-dcnode-id="1405"><span data-dcnode-id="1406" instrument_node="">capacities</span></strong><span data-dcnode-id="1404" instrument_node="">. These allow an assessment of the mechanical condition of the lungs, its musculature, airway resistance and the effectiveness of gas exchange at the alveolar membrane. Furthermore they are generally cheap, non-invasive and simple tests.</span></p><span data-dcnode-id="1402" instrument_node="">
</span><p data-dcnode-id="1400"><span data-dcnode-id="1401" instrument_node="">In this article we will look at the volumes and capacities within the lungs, how they can be measured and how they are affected by pathology.</span></p><span data-dcnode-id="1399" instrument_node="">

</span><p data-dcnode-id="1319" style="text-align: left;"><span data-dcnode-id="1325" instrument_node="">Relies on muscle strength and low </span><strong data-dcnode-id="1323"><span data-dcnode-id="1324" instrument_node="">airway</span></strong><span data-dcnode-id="1322" instrument_node=""> </span><strong data-dcnode-id="1320"><span data-dcnode-id="1321" instrument_node="">resistance</span></strong></p><span data-dcnode-id="1318" instrument_node="">
</span><p data-dcnode-id="1313" style="text-align: left;"><span data-dcnode-id="1317" instrument_node="">Reduced in </span><strong data-dcnode-id="1315"><span data-dcnode-id="1316" instrument_node="">pregnancy</span></strong><span data-dcnode-id="1314" instrument_node="">, obesity, severe obstruction or proximal (of trachea/bronchi obstruction)</span></p></td></tr><tr data-dcnode-id="1295"><td data-dcnode-id="1305" style="text-align: left;" width="121"><strong data-dcnode-id="1306"><span data-dcnode-id="1307" instrument_node="">Residual volume/reserve volume</span></strong></td><td data-dcnode-id="1302" style="text-align: left;" width="243"><span data-dcnode-id="1303" instrument_node="">Volume remaining after maximum expiration</span></td><td data-dcnode-id="1299" style="text-align: left;" width="68"><span data-dcnode-id="1300" instrument_node="">1.5L</span></td><td data-dcnode-id="1296" style="text-align: left;" width="282"><span data-dcnode-id="1297" instrument_node="">Cannot be measured by spirometry</span></td></tr></tbody></table><span data-dcnode-id="1291" instrument_node="">

</span><p data-dcnode-id="1243" style="text-align: left;"><span data-dcnode-id="1247" instrument_node="">Requires adequate </span><strong data-dcnode-id="1245"><span data-dcnode-id="1246" instrument_node="">compliance</span></strong><span data-dcnode-id="1244" instrument_node="">, muscle strength and low airway resistance</span></p></td></tr><tr data-dcnode-id="1223"><td data-dcnode-id="1235" style="text-align: left;" width="131"><strong data-dcnode-id="1236"><span data-dcnode-id="1237" instrument_node="">Inspiratory capacity</span></strong></td><td data-dcnode-id="1232" style="text-align: left;" width="159"><span data-dcnode-id="1233" instrument_node="">Volume breathed in from quiet expiration to maximum inspiration</span></td><td data-dcnode-id="1229" style="text-align: left;" width="153"><span data-dcnode-id="1230" instrument_node="">Tidal volume + inspiratory reserve volume</span></td><td data-dcnode-id="1226" style="text-align: left;" width="68"><span data-dcnode-id="1227" instrument_node="">3L</span></td><td data-dcnode-id="1224" width="202"></td></tr><tr data-dcnode-id="1205"><td data-dcnode-id="1218" style="text-align: left;" width="131"><strong data-dcnode-id="1219"><span data-dcnode-id="1220" instrument_node="">Functional residual capacity</span></strong></td><td data-dcnode-id="1215" style="text-align: left;" width="159"><span data-dcnode-id="1216" instrument_node="">Volume remaining after quiet expiration</span></td><td data-dcnode-id="1212" style="text-align: left;" width="153"><span data-dcnode-id="1213" instrument_node="">Expiratory reserve volume + residual volume</span></td><td data-dcnode-id="1209" style="text-align: left;" width="68"><span data-dcnode-id="1210" instrument_node="">3L</span></td><td data-dcnode-id="1206" style="text-align: left;" width="202"><span data-dcnode-id="1207" instrument_node="">Affected by height, gender, posture, changes in lung compliance. Height has the greatest influence.</span></td></tr><tr data-dcnode-id="1173"><td data-dcnode-id="1200" style="text-align: left;" width="131"><strong data-dcnode-id="1201"><span data-dcnode-id="1202" instrument_node="">Total lung capacity</span></strong></td><td data-dcnode-id="1197" style="text-align: left;" width="159"><span data-dcnode-id="1198" instrument_node="">Volume of air in lungs after maximum inspiration</span></td><td data-dcnode-id="1194" style="text-align: left;" width="153"><span data-dcnode-id="1195" instrument_node="">Sum of all volumes</span></td><td data-dcnode-id="1191" style="text-align: left;" width="68"><span data-dcnode-id="1192" instrument_node="">6L</span></td><td data-dcnode-id="1175" width="202"><span data-dcnode-id="1189" instrument_node="">
</span><p data-dcnode-id="1187" style="text-align: left;"><span data-dcnode-id="1188" instrument_node="">Restriction &lt; 80% predicted</span></p><span data-dcnode-id="1186" instrument_node="">

</span><p data-dcnode-id="1176" style="text-align: left;"><span data-dcnode-id="1182" instrument_node="">Measured with </span><strong data-dcnode-id="1180"><span data-dcnode-id="1181" instrument_node="">helium</span></strong><span data-dcnode-id="1179" instrument_node=""> </span><strong data-dcnode-id="1177"><span data-dcnode-id="1178" instrument_node="">dilution</span></strong></p></td></tr></tbody></table><span data-dcnode-id="1169" instrument_node="">
</span><p data-dcnode-id="1165"><strong data-dcnode-id="1167"><span data-dcnode-id="1168" instrument_node="">Anatomical (serial) dead space</span></strong><span data-dcnode-id="1166" instrument_node=""> is the volume of air that never reaches alveoli and so never participates in respiration. It includes volume in upper and lower respiratory tract up to and including the terminal bronchioles</span></p><span data-dcnode-id="1164" instrument_node="">
</span><p data-dcnode-id="1157"><strong data-dcnode-id="1162"><span data-dcnode-id="1163" instrument_node="">Alveolar (distributive) dead space</span></strong><span data-dcnode-id="1161" instrument_node=""> is the volume of air that reaches alveoli but never participates in respiration. This can reflect alveoli that are ventilated but not perfused, for example secondary to a </span><strong data-dcnode-id="1159"><span data-dcnode-id="1160" instrument_node="">pulmonary embolus</span></strong><span data-dcnode-id="1158" instrument_node="">.</span></p><span data-dcnode-id="1156" instrument_node="">
</span><p data-dcnode-id="1155"></p><div class="shortcode" data-dcnode-id="1151" data-name="caption"><span data-dcnode-id="1154" instrument_node="">[caption id="attachment_14565" align="aligncenter" width="800"]</span><img alt="" class="size-full wp-image-14565" data-dcnode-id="1153" height="322" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//teachmephysiology.com/wp-content/uploads/2017/06/lung-volumes.jpg&amp;raw" width="800"><span data-dcnode-id="1152" instrument_node=""> Fig 1 - Diagram showing various lung volumes.[/caption]</span></div><p data-dcnode-id="1150"></p><span data-dcnode-id="1149" instrument_node="">
</span><h2 data-dcnode-id="1146"><strong data-dcnode-id="1147"><span data-dcnode-id="1148" instrument_node="">Measuring Volumes and Capacities</span></strong></h2><span data-dcnode-id="1145" instrument_node="">
</span><h3 data-dcnode-id="1142"><strong data-dcnode-id="1143"><span data-dcnode-id="1144" instrument_node="">Simple Spirometry</span></strong></h3><span data-dcnode-id="1141" instrument_node="">
</span><p data-dcnode-id="1130"><span data-dcnode-id="1140" instrument_node="">Simple spirometry can measure </span><strong data-dcnode-id="1138"><span data-dcnode-id="1139" instrument_node="">tidal volume</span></strong><span data-dcnode-id="1137" instrument_node="">, </span><strong data-dcnode-id="1135"><span data-dcnode-id="1136" instrument_node="">inspiratory reserve volume</span></strong><span data-dcnode-id="1134" instrument_node=""> and </span><strong data-dcnode-id="1132"><span data-dcnode-id="1133" instrument_node="">expiratory reserve volume</span></strong><span data-dcnode-id="1131" instrument_node="">. However, it cannot measure residual volume.</span></p><span data-dcnode-id="1129" instrument_node="">
</span><p data-dcnode-id="1127"><span data-dcnode-id="1128" instrument_node="">Measured values are standardised for height, age and sex, although height is the factor with the greatest influence upon capacities.</span></p><span data-dcnode-id="1126" instrument_node="">
</span><p data-dcnode-id="1112"><span data-dcnode-id="1122" style="text-decoration: underline;"><span data-dcnode-id="1125" instrument_node="">Process</span><br data-dcnode-id="1124"><span data-dcnode-id="1123" instrument_node="">
</span></span><br data-dcnode-id="1121"><span data-dcnode-id="1120" instrument_node="">
The subject breathes from a closed circuit over water. The chamber is filled with oxygen and as they breathe, gas increased and reduces the volumes within the circuit. A weight above the chamber changes height with each ventilation according to the circuit volume. Its height is recorded with a pen to reflect the </span><strong data-dcnode-id="1118"><span data-dcnode-id="1119" instrument_node="">volume</span></strong><span data-dcnode-id="1117" instrument_node="">&nbsp;inspired or expired over&nbsp;</span><strong data-dcnode-id="1115"><span data-dcnode-id="1116" instrument_node="">time</span></strong><strong data-dcnode-id="1113"><span data-dcnode-id="1114" instrument_node="">.</span></strong></p><span data-dcnode-id="1111" instrument_node="">
</span><p data-dcnode-id="1110"></p><div class="shortcode" data-dcnode-id="1106" data-name="caption"><span data-dcnode-id="1109" instrument_node="">[caption id="attachment_16990" align="aligncenter" width="300"]</span><img alt="" class="size-medium wp-image-16990" data-dcnode-id="1108" height="167" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//teachmephysiology.com/wp-content/uploads/2020/04/Simple-spirometry-1-300x167.jpg&amp;raw" width="300"><span data-dcnode-id="1107" instrument_node=""> Fig 2 - Simple spirometry[/caption]</span></div><p data-dcnode-id="1105"></p><span data-dcnode-id="1104" instrument_node="">
</span><h3 data-dcnode-id="1098"><strong data-dcnode-id="1102"><span data-dcnode-id="1103" instrument_node="">Helium</span></strong><span data-dcnode-id="1101" instrument_node=""> </span><strong data-dcnode-id="1099"><span data-dcnode-id="1100" instrument_node="">dilution</span></strong></h3><span data-dcnode-id="1097" instrument_node="">
</span><p data-dcnode-id="1089"><span data-dcnode-id="1096" instrument_node="">Helium dilution is used to measure </span><strong data-dcnode-id="1094"><span data-dcnode-id="1095" instrument_node="">total lung capacity.</span></strong><span data-dcnode-id="1093" instrument_node=""> However, it is only accurate if the lungs are not obstructed. If there is a point of obstruction, helium may not reach all areas of the lung during a ventilation, producing an underestimate as only </span><em data-dcnode-id="1091"><span data-dcnode-id="1092" instrument_node="">ventilated</span></em><span data-dcnode-id="1090" instrument_node=""> lung volumes are measured.</span></p><span data-dcnode-id="1088" instrument_node="">
</span><p data-dcnode-id="1085"><span data-dcnode-id="1086" style="text-decoration: underline;"><span data-dcnode-id="1087" instrument_node="">Process</span></span></p><span data-dcnode-id="1084" instrument_node="">
</span><p data-dcnode-id="1079"><span data-dcnode-id="1083" instrument_node="">After quiet expiration, the subject breathes in a gas with a known concentration of helium (an inert gas). They hold their breath for 10 seconds, allowing helium to mix with air in the lungs, diluting the concentration of helium. The concentration of helium is then measured after expiration. The </span><strong data-dcnode-id="1081"><span data-dcnode-id="1082" instrument_node="">volume</span></strong><span data-dcnode-id="1080" instrument_node="">&nbsp;of air which is ventilated is then calculated according to the degree of dilution of the helium.</span></p><span data-dcnode-id="1078" instrument_node="">
</span><h3 data-dcnode-id="1072"><strong data-dcnode-id="1076"><span data-dcnode-id="1077" instrument_node="">Nitrogen</span></strong><span data-dcnode-id="1075" instrument_node=""> </span><strong data-dcnode-id="1073"><span data-dcnode-id="1074" instrument_node="">washout</span></strong></h3><span data-dcnode-id="1071" instrument_node="">
</span><p data-dcnode-id="1066"><span data-dcnode-id="1070" instrument_node="">A method for calculating </span><strong data-dcnode-id="1068"><span data-dcnode-id="1069" instrument_node="">serial/anatomical&nbsp;dead space</span></strong><span data-dcnode-id="1067" instrument_node="">&nbsp;in the conducting airways up to and including the terminal bronchioles (usually 150mL).</span></p><span data-dcnode-id="1065" instrument_node="">
</span><p data-dcnode-id="1062"><span data-dcnode-id="1063" style="text-decoration: underline;"><span data-dcnode-id="1064" instrument_node="">Process</span></span></p><span data-dcnode-id="1061" instrument_node="">
</span><p data-dcnode-id="1059"><span data-dcnode-id="1060" instrument_node="">The subject takes a breath of pure oxygen and then exhales through a valve which measures nitrogen levels. At first, pure oxygen is exhaled, representing the dead space volume as the air exhaled never reached the alveoli and underwent gaseous exchange.</span></p><span data-dcnode-id="1058" instrument_node="">
</span><p data-dcnode-id="1050"><span data-dcnode-id="1057" instrument_node="">Then, a mixture of dead space air and alveolar air is expired, meaning the detected concentration of nitrogen increases as nitrogen rich air from the dead space reaches the valve. After a few breaths, the lungs are washed out of pure oxygen, meaning that purely alveolar air is expired, with the nitrogen levels reflecting that of alveolar air. The levels of nitrogen measured over time can be used to calculate the&nbsp;</span><strong data-dcnode-id="1055"><span data-dcnode-id="1056" instrument_node="">anatomical</span></strong><span data-dcnode-id="1054" instrument_node=""> </span><strong data-dcnode-id="1052"><span data-dcnode-id="1053" instrument_node="">dead space volume</span></strong><span data-dcnode-id="1051" instrument_node=""> of the lungs.</span></p><span data-dcnode-id="1049" instrument_node="">
</span><h2 data-dcnode-id="1046"><strong data-dcnode-id="1047"><span data-dcnode-id="1048" instrument_node="">Visualising lung volumes</span></strong></h2><span data-dcnode-id="1045" instrument_node="">
</span><h3 data-dcnode-id="1042"><strong data-dcnode-id="1043"><span data-dcnode-id="1044" instrument_node="">Vitalograph</span></strong></h3><span data-dcnode-id="1041" instrument_node="">
</span><p data-dcnode-id="1039"><span data-dcnode-id="1040" instrument_node="">A vitalograph creates plots of volume againt time, using data collected from spirometry tests.</span></p><span data-dcnode-id="1038" instrument_node="">
</span><p data-dcnode-id="1036"><span data-dcnode-id="1037" instrument_node="">Two important spirometry volumes that can be measured from a Vitalograph are:</span></p><span data-dcnode-id="1035" instrument_node="">
</span><ul data-dcnode-id="1021"><span data-dcnode-id="1034" instrument_node="">
</span><li data-dcnode-id="1030"><strong data-dcnode-id="1032"><span data-dcnode-id="1033" instrument_node="">FVC</span></strong><span data-dcnode-id="1031" instrument_node=""> (forced vital capacity)&nbsp; – the maximal volume of air that a subject can expel in one maximal expiration from a point of maximal inspiration.</span></li><span data-dcnode-id="1029" instrument_node="">
</span><li data-dcnode-id="1022"><strong data-dcnode-id="1024"><span data-dcnode-id="1028" instrument_node="">FEV</span><sub data-dcnode-id="1026"><span data-dcnode-id="1027" instrument_node="">1</span></sub><span data-dcnode-id="1025" instrument_node=""> &nbsp;</span></strong><span data-dcnode-id="1023" instrument_node="">(forced expiratory volume in one second) - the maximal volume of air that a subject can expel in one second from a point of maximal inspiration.</span></li></ul><span data-dcnode-id="1020" instrument_node="">
</span><p data-dcnode-id="1006"><span data-dcnode-id="1019" instrument_node="">The proportion of air that can be exhaled in the first second compared to the total volume of air that can be exhaled is important in assessing for possible airway </span><strong data-dcnode-id="1017"><span data-dcnode-id="1018" instrument_node="">obstruction</span></strong><span data-dcnode-id="1016" instrument_node="">. This proportion is known as the </span><strong data-dcnode-id="1011"><span data-dcnode-id="1015" instrument_node="">FEV</span><sub data-dcnode-id="1013"><span data-dcnode-id="1014" instrument_node="">1</span></sub><span data-dcnode-id="1012" instrument_node="">/FVC</span></strong><span data-dcnode-id="1010" instrument_node=""> </span><strong data-dcnode-id="1008"><span data-dcnode-id="1009" instrument_node="">ratio</span></strong><span data-dcnode-id="1007" instrument_node="">.</span></p><span data-dcnode-id="1005" instrument_node="">
</span><p data-dcnode-id="1004"></p><div class="shortcode" data-dcnode-id="1000" data-name="caption"><span data-dcnode-id="1003" instrument_node="">[caption id="attachment_14567" align="aligncenter" width="475"]</span><img alt="" class="size-full wp-image-14567" data-dcnode-id="1002" height="412" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//teachmephysiology.com/wp-content/uploads/2017/06/spirometer.jpg&amp;raw" width="475"><span data-dcnode-id="1001" instrument_node=""> Fig 3 - Image showing the process of spirometry using a spirometer.[/caption]</span></div><p data-dcnode-id="999"></p><span data-dcnode-id="998" instrument_node="">
</span><h3 data-dcnode-id="989"><strong data-dcnode-id="996"><span data-dcnode-id="997" instrument_node="">Flow</span></strong><span data-dcnode-id="995" instrument_node=""> </span><strong data-dcnode-id="993"><span data-dcnode-id="994" instrument_node="">volume</span></strong><span data-dcnode-id="992" instrument_node=""> </span><strong data-dcnode-id="990"><span data-dcnode-id="991" instrument_node="">loop</span></strong></h3><span data-dcnode-id="988" instrument_node="">
</span><p data-dcnode-id="986"><span data-dcnode-id="987" instrument_node="">This plots flow over volume (showing expiratory flow and inspiratory flow as positive and negative values respectively).</span></p><span data-dcnode-id="985" instrument_node="">
</span><p data-dcnode-id="983"><span data-dcnode-id="984" instrument_node="">Important factors to consider when assessing flow-volume curves are as follows:</span></p><span data-dcnode-id="982" instrument_node="">
</span><ul data-dcnode-id="963"><span data-dcnode-id="981" instrument_node="">
</span><li data-dcnode-id="974"><strong data-dcnode-id="979"><span data-dcnode-id="980" instrument_node="">Peak Expiratory Flow Rate (PEFR)</span></strong><span data-dcnode-id="978" instrument_node="">&nbsp;– the </span><em data-dcnode-id="976"><span data-dcnode-id="977" instrument_node="">rate</span></em><span data-dcnode-id="975" instrument_node=""> of flow.</span></li><span data-dcnode-id="973" instrument_node="">
</span><li data-dcnode-id="969"><strong data-dcnode-id="971"><span data-dcnode-id="972" instrument_node="">Vital capacity&nbsp;</span></strong><span data-dcnode-id="970" instrument_node="">- the volume expired, calculated from the X-axis.</span></li><span data-dcnode-id="968" instrument_node="">
</span><li data-dcnode-id="964"><strong data-dcnode-id="966"><span data-dcnode-id="967" instrument_node="">Shape&nbsp;</span></strong><span data-dcnode-id="965" instrument_node="">of the curve - 'spooning' in obstructive disease, small overall loop in restrictive disease.</span></li></ul><span data-dcnode-id="962" instrument_node="">
</span><p data-dcnode-id="961"></p><div class="shortcode" data-dcnode-id="957" data-name="caption"><span data-dcnode-id="960" instrument_node="">[caption id="attachment_14566" align="aligncenter" width="182"]</span><img alt="" class="size-full wp-image-14566" data-dcnode-id="959" height="232" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//teachmephysiology.com/wp-content/uploads/2017/06/spirometry.png&amp;raw" width="182"><span data-dcnode-id="958" instrument_node=""> Fig 4 - A flow-volume loop[/caption]</span></div><p data-dcnode-id="956"></p><span data-dcnode-id="955" instrument_node="">
</span><h3 data-dcnode-id="946"><strong data-dcnode-id="953"><span data-dcnode-id="954" instrument_node="">Nitrogen</span></strong><span data-dcnode-id="952" instrument_node=""> </span><strong data-dcnode-id="950"><span data-dcnode-id="951" instrument_node="">washout</span></strong><span data-dcnode-id="949" instrument_node=""> </span><strong data-dcnode-id="947"><span data-dcnode-id="948" instrument_node="">graph</span></strong></h3><span data-dcnode-id="945" instrument_node="">
</span><p data-dcnode-id="943"><span data-dcnode-id="944" instrument_node="">This plots the percentage concentration of nitrogen in exhaled air (%N) against the total volume of air expired.</span></p><span data-dcnode-id="942" instrument_node="">
</span><p data-dcnode-id="932"><span data-dcnode-id="941" instrument_node="">The </span><strong data-dcnode-id="939"><span data-dcnode-id="940" instrument_node="">anatomical </span></strong><strong data-dcnode-id="937"><span data-dcnode-id="938" instrument_node="">dead space</span></strong><span data-dcnode-id="936" instrument_node=""> is determined by the volume of exhaled air at which the volume below the washout curve (A1) is </span><strong data-dcnode-id="934"><span data-dcnode-id="935" instrument_node="">equal</span></strong><span data-dcnode-id="933" instrument_node=""> to the volume above the washout curve (A2).</span></p><span data-dcnode-id="931" instrument_node="">
</span><p data-dcnode-id="930"></p><div class="shortcode" data-dcnode-id="926" data-name="caption"><span data-dcnode-id="929" instrument_node="">[caption id="attachment_16992" align="aligncenter" width="300"]</span><img alt="" class="wp-image-16992 size-medium" data-dcnode-id="928" height="180" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//teachmephysiology.com/wp-content/uploads/2020/04/Nitrogen-washout-curve-e1587631783244-300x180.jpg&amp;raw" width="300"><span data-dcnode-id="927" instrument_node=""> Figure 5 - A nitrogen washout curve[/caption]</span></div><p data-dcnode-id="925"></p><span data-dcnode-id="924" instrument_node="">
</span><p data-dcnode-id="923"></p><div class="shortcode" data-dcnode-id="921" data-name="start-clinical"><span data-dcnode-id="922" instrument_node="">[start-clinical]</span></div><p data-dcnode-id="920"></p><span data-dcnode-id="919" instrument_node="">
</span><h2 data-dcnode-id="914"><strong data-dcnode-id="917"><span data-dcnode-id="918" instrument_node="">Clinical relevance -&nbsp;</span></strong><strong data-dcnode-id="915"><span data-dcnode-id="916" instrument_node="">Obstructive and Restrictive Deficits</span></strong></h2><span data-dcnode-id="913" instrument_node="">
</span><span data-dcnode-id="912" instrument_node="">
</span><span data-dcnode-id="911" instrument_node="">
</span><span data-dcnode-id="910" instrument_node="">
</span><span data-dcnode-id="906" instrument_node="">
</span><span data-dcnode-id="900" instrument_node="">
</span><span data-dcnode-id="896" instrument_node="">
</span><span data-dcnode-id="891" instrument_node="">
</span><span data-dcnode-id="890" instrument_node="">
</span><span data-dcnode-id="887" instrument_node="">
</span><span data-dcnode-id="884" instrument_node="">
</span><span data-dcnode-id="879" instrument_node="">
</span><span data-dcnode-id="875" instrument_node="">
</span><span data-dcnode-id="874" instrument_node="">
</span><span data-dcnode-id="871" instrument_node="">
</span><span data-dcnode-id="868" instrument_node="">
</span><span data-dcnode-id="865" instrument_node="">
</span><span data-dcnode-id="861" instrument_node="">
</span><table data-dcnode-id="859" width="623"><tbody data-dcnode-id="860"><tr data-dcnode-id="892"><td data-dcnode-id="907" width="157"><strong data-dcnode-id="908"><span data-dcnode-id="909" instrument_node="">Process</span></strong></td><td data-dcnode-id="901" width="152"><strong data-dcnode-id="902"><span data-dcnode-id="905" instrument_node="">FEV</span><sub data-dcnode-id="903"><span data-dcnode-id="904" instrument_node="">1</span></sub></strong></td><td data-dcnode-id="897" width="152"><strong data-dcnode-id="898"><span data-dcnode-id="899" instrument_node="">FVC</span></strong></td><td data-dcnode-id="893" width="151"><strong data-dcnode-id="894"><span data-dcnode-id="895" instrument_node="">FEV1/FVC</span></strong></td></tr><tr data-dcnode-id="876"><td data-dcnode-id="888" width="157"><span data-dcnode-id="889" instrument_node="">Obstructive</span></td><td data-dcnode-id="885" width="152"><span data-dcnode-id="886" instrument_node="">&lt;80% of predicted</span></td><td data-dcnode-id="880" width="152"><span data-dcnode-id="883" instrument_node="">Reduced, but not to same degree as FEV</span><sub data-dcnode-id="881"><span data-dcnode-id="882" instrument_node="">1</span></sub></td><td data-dcnode-id="877" width="151"><span data-dcnode-id="878" instrument_node="">&lt;0.7</span></td></tr><tr data-dcnode-id="862"><td data-dcnode-id="872" width="157"><span data-dcnode-id="873" instrument_node="">Restrictive</span></td><td data-dcnode-id="869" width="152"><span data-dcnode-id="870" instrument_node="">&lt;80% of predicted</span></td><td data-dcnode-id="866" width="152"><span data-dcnode-id="867" instrument_node="">&lt;80% of predicted</span></td><td data-dcnode-id="863" width="151"><span data-dcnode-id="864" instrument_node="">&gt;=0.7</span></td></tr></tbody></table><span data-dcnode-id="858" instrument_node="">
</span><p data-dcnode-id="844"><span data-dcnode-id="857" instrument_node="">In </span><strong data-dcnode-id="855"><span data-dcnode-id="856" instrument_node="">obstructive</span></strong><span data-dcnode-id="854" instrument_node=""> </span><strong data-dcnode-id="852"><span data-dcnode-id="853" instrument_node="">disease,</span></strong><span data-dcnode-id="851" instrument_node=""> the FEV</span><sub data-dcnode-id="849"><span data-dcnode-id="850" instrument_node="">1</span></sub><span data-dcnode-id="848" instrument_node=""> is reduced due to increased resistance&nbsp;during expiration. Air trapping can also occur where more air is inspired than is expired, which can cause the residual volume to increase. In asthma, the obstruction is reversible which can aid in diagnosis. This means that FEV</span><sub data-dcnode-id="846"><span data-dcnode-id="847" instrument_node="">1</span></sub><span data-dcnode-id="845" instrument_node="">/FVC will recover on re-test after the application of a bronchodilator such as salbutamol.</span></p><span data-dcnode-id="843" instrument_node="">
</span><p data-dcnode-id="832"><span data-dcnode-id="842" instrument_node="">The so-called '</span><strong data-dcnode-id="840"><span data-dcnode-id="841" instrument_node="">spooning</span></strong><span data-dcnode-id="839" instrument_node="">' of a flow-volume curve in </span><strong data-dcnode-id="837"><span data-dcnode-id="838" instrument_node="">obstructive</span></strong><span data-dcnode-id="836" instrument_node=""> disease arises when the affected </span><strong data-dcnode-id="834"><span data-dcnode-id="835" instrument_node="">small airways</span></strong><span data-dcnode-id="833" instrument_node=""> begin to collapse.</span></p><span data-dcnode-id="831" instrument_node="">
</span><p data-dcnode-id="826"><span data-dcnode-id="830" instrument_node="">As air exits the thorax in expiration, the pressure within the small airways </span><strong data-dcnode-id="828"><span data-dcnode-id="829" instrument_node="">reduces</span></strong><span data-dcnode-id="827" instrument_node=""> and thus the small airways are no longer propped open. This increases resistance to expiration and therefore reduces flow.</span></p><span data-dcnode-id="825" instrument_node="">
</span><p data-dcnode-id="820"><span data-dcnode-id="824" instrument_node="">Examples of obstructive diseases are </span><strong data-dcnode-id="822"><span data-dcnode-id="823" instrument_node="">asthma,</span></strong><span data-dcnode-id="821" instrument_node=""> COPD (chronic bronchitis, emphysema), tracheal stenosis and large airway tumors.</span></p><span data-dcnode-id="819" instrument_node="">
</span><p data-dcnode-id="818"></p><div class="shortcode" data-dcnode-id="814" data-name="caption"><span data-dcnode-id="817" instrument_node="">[caption id="attachment_14568" align="aligncenter" width="206"]</span><img alt="" class="size-full wp-image-14568" data-dcnode-id="816" height="232" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//teachmephysiology.com/wp-content/uploads/2017/06/asthma-spirometry.png&amp;raw" width="206"><span data-dcnode-id="815" instrument_node=""> Fig 6 - Spirometry of a patient with asthma, an obstructive disorder.[/caption]</span></div><p data-dcnode-id="813"></p><span data-dcnode-id="812" instrument_node="">
</span><p data-dcnode-id="804"><span data-dcnode-id="811" instrument_node="">In </span><strong data-dcnode-id="809"><span data-dcnode-id="810" instrument_node="">restrictive</span></strong><span data-dcnode-id="808" instrument_node=""> </span><strong data-dcnode-id="806"><span data-dcnode-id="807" instrument_node="">disease</span></strong><span data-dcnode-id="805" instrument_node="">, the FVC is reduced due to poor lung expansion. This can be neurological, due to weak inspiratory muscles or due to an anatomical deformity. This causes the inspiratory reserve volume to be reduced as the lungs can’t inflate as much during maximum inspiration. Residual volume can also be reduced as expiration is more effective than inspiration.</span></p><span data-dcnode-id="803" instrument_node="">
</span><p data-dcnode-id="798"><span data-dcnode-id="802" instrument_node="">Examples of restrictive diseases are interstitial pulmonary fibrosis, muscle weakness, </span><strong data-dcnode-id="800"><span data-dcnode-id="801" instrument_node="">kyphoscoliosis,</span></strong><span data-dcnode-id="799" instrument_node=""> obesity, tense ascites.</span></p><span data-dcnode-id="797" instrument_node="">
