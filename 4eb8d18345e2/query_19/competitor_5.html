at do you mean by tidal volume?</span></a></li><li class="ez-toc-page-1 ez-toc-heading-level-2" data-dcnode-id="1425"><a class="ez-toc-link ez-toc-heading-7" data-dcnode-id="1426" href="#What_is_tidal_lung_capacity" title="What is tidal lung capacity?"><span data-dcnode-id="1427" instrument_node="">What is tidal lung capacity?</span></a></li><li class="ez-toc-page-1 ez-toc-heading-level-2" data-dcnode-id="1422"><a class="ez-toc-link ez-toc-heading-8" data-dcnode-id="1423" href="#What_is_tidal_volume_and_vital_capacity" title="What is tidal volume and vital capacity?"><span data-dcnode-id="1424" instrument_node="">What is tidal volume and vital capacity?</span></a></li><li class="ez-toc-page-1 ez-toc-heading-level-2" data-dcnode-id="1419"><a class="ez-toc-link ez-toc-heading-9" data-dcnode-id="1420" href="#What_is_a_normal_resting_tidal_volume" title="What is a normal resting tidal volume?"><span data-dcnode-id="1421" instrument_node="">What is a normal resting tidal volume?</span></a></li><li class="ez-toc-page-1 ez-toc-heading-level-2" data-dcnode-id="1416"><a class="ez-toc-link ez-toc-heading-10" data-dcnode-id="1417" href="#What_best_describes_tidal_volume" title="What best describes tidal volume?"><span data-dcnode-id="1418" instrument_node="">What best describes tidal volume?</span></a></li><li class="ez-toc-page-1 ez-toc-heading-level-2" data-dcnode-id="1413"><a class="ez-toc-link ez-toc-heading-11" data-dcnode-id="1414" href="#What_is_vital_lung_capacity" title="What is vital lung capacity?"><span data-dcnode-id="1415" instrument_node="">What is vital lung capacity?</span></a></li><li class="ez-toc-page-1 ez-toc-heading-level-2" data-dcnode-id="1410"><a class="ez-toc-link ez-toc-heading-12" data-dcnode-id="1411" href="#What_causes_low_tidal_volume" title="What causes low tidal volume?"><span data-dcnode-id="1412" instrument_node="">What causes low tidal volume?</span></a></li></ul></nav></div><span data-dcnode-id="1406" instrument_node="">
</span><h2 data-dcnode-id="1402"><span class="ez-toc-section" data-dcnode-id="1405" id="What_is_the_formula_for_tidal_volume"></span><span data-dcnode-id="1404" instrument_node="">What is the formula for tidal volume?</span><span class="ez-toc-section-end" data-dcnode-id="1403"></span></h2><span data-dcnode-id="1401" instrument_node="">
</span><p data-dcnode-id="1399"><span data-dcnode-id="1400" instrument_node="">Tidal volume = alveolar space + dead space.</span></p><div class="code-block code-block-4" data-dcnode-id="1394" style="margin: 8px auto; text-align: center; display: block; clear: both;"><span data-dcnode-id="1398" instrument_node="">
</span><div data-dcnode-id="1397" data-endpoint="//trends.revcontent.com" data-rc-widget="" data-widget-host="habitat" data-widget-id="251381" id="rc-widget-618603"></div><span data-dcnode-id="1396" instrument_node="">
</span></div><span data-dcnode-id="1393" instrument_node="">
</span><h2 data-dcnode-id="1389"><span class="ez-toc-section" data-dcnode-id="1392" id="What_is_tidal_volume_and_How_Is_It_measured"></span><span data-dcnode-id="1391" instrument_node="">What is tidal volume and How Is It measured?</span><span class="ez-toc-section-end" data-dcnode-id="1390"></span></h2><span data-dcnode-id="1388" instrument_node="">
</span><p data-dcnode-id="1386"><span data-dcnode-id="1387" instrument_node="">Tidal volume (Vt or TV) is a physiological term used to describe the amount of air typically moved during inspiration and expiration while you are at rest. It is measured by spirometry. On average, adults breathe 7 milliliters (mL) per kilogram (kg) of ideal body weight.</span></p><span data-dcnode-id="1385" instrument_node="">
</span><h2 data-dcnode-id="1381"><span class="ez-toc-section" data-dcnode-id="1384" id="How_do_you_calculate_tidal_volume_for_ventilation"></span><span data-dcnode-id="1383" instrument_node="">How do you calculate tidal volume for ventilation?</span><span class="ez-toc-section-end" data-dcnode-id="1382"></span></h2><span data-dcnode-id="1380" instrument_node="">
</span><p data-dcnode-id="1378"><span data-dcnode-id="1379" instrument_node="">To determine the adequate tidal volume (Vt) to deliver during protective ventilation, it is necessary to calculate the patient’s PBW. This is accomplished by using the Devine’s formulas (3) adjusted by gender: Male: PBW = 50 + 0.91 × (height in cm–152.4) Kg. Female: PBW = 45.5 + 0.91 × (height in cm–152.4) Kg.</span></p><span data-dcnode-id="1377" instrument_node="">
</span><h2 data-dcnode-id="1373"><span class="ez-toc-section" data-dcnode-id="1376" id="What_is_the_normal_tidal_volume"></span><span data-dcnode-id="1375" instrument_node="">What is the normal tidal volume?</span><span class="ez-toc-section-end" data-dcnode-id="1374"></span></h2><span data-dcnode-id="1372" instrument_node="">
</span><p data-dcnode-id="1370"><span data-dcnode-id="1371" instrument_node="">Tidal volume is the volume of gas that is moved in and out of the lungs per breath. The normal tidal volume is 6 to 8 ml/kg, regardless of age.</span></p><div class="code-block code-block-5" data-dcnode-id="1363" style="margin: 8px auto; text-align: center; display: block; clear: both;"><span data-dcnode-id="1369" instrument_node="">
</span><center data-dcnode-id="1364"><div data-dcnode-id="1365" id="Ad.Plus-336x280-1"></div></center></div><span data-dcnode-id="1362" instrument_node="">
</span><h2 data-dcnode-id="1358"><span class="ez-toc-section" data-dcnode-id="1361" id="What_is_ideal_tidal_volume"></span><span data-dcnode-id="1360" instrument_node="">What is ideal tidal volume?</span><span class="ez-toc-section-end" data-dcnode-id="1359"></span></h2><span data-dcnode-id="1357" instrument_node="">
</span><p data-dcnode-id="1355"><span data-dcnode-id="1356" instrument_node="">Spirometry records tidal volume while the patient breathes quietly. In healthy adults, it measures approximately 7 mL/kg of ideal body weight. In an average healthy adult, 500 mL enters the lung with each tidal breath, of which only 350 mL reaches the respiratory zone since dead space measures approximately 150 mL.[5]</span></p><span data-dcnode-id="1354" instrument_node="">
</span><h2 data-dcnode-id="1350"><span class="ez-toc-section" data-dcnode-id="1353" id="What_do_you_mean_by_tidal_volume"></span><span data-dcnode-id="1352" instrument_node="">What do you mean by tidal volume?</span><span class="ez-toc-section-end" data-dcnode-id="1351"></span></h2><span data-dcnode-id="1349" instrument_node="">
</span><p data-dcnode-id="1347"><span data-dcnode-id="1348" instrument_node="">Tidal volume is the amount of air that moves in or out of the lungs with each respiratory cycle. It measures around 500 mL in an average healthy adult male and approximately 400 mL in a healthy female. It is a vital clinical parameter that allows for proper ventilation to take place.</span></p><span data-dcnode-id="1346" instrument_node="">
</span><h2 data-dcnode-id="1342"><span class="ez-toc-section" data-dcnode-id="1345" id="What_is_tidal_lung_capacity"></span><span data-dcnode-id="1344" instrument_node="">What is tidal lung capacity?</span><span class="ez-toc-section-end" data-dcnode-id="1343"></span></h2><span data-dcnode-id="1341" instrument_node="">
</span><h2 data-dcnode-id="1337"><span class="ez-toc-section" data-dcnode-id="1340" id="What_is_tidal_volume_and_vital_capacity"></span><span data-dcnode-id="1339" instrument_node="">What is tidal volume and vital capacity?</span><span class="ez-toc-section-end" data-dcnode-id="1338"></span></h2><span data-dcnode-id="1336" instrument_node="">
</span><p data-dcnode-id="1334"><span data-dcnode-id="1335" instrument_node="">Vital capacity: the volume of air breathed out after the deepest inhalation. VT. Tidal volume: that volume of air moved into or out of the lungs during quiet breathing (VT indicates a subdivision of the lung; when tidal volume is precisely measured, as in gas exchange calculation, the symbol TV or VT is used.)</span></p><div class="code-block code-block-6" data-dcnode-id="1319" style="margin: 8px auto; text-align: center; display: block; clear: both;"><span data-dcnode-id="1333" instrument_node="">
</span><span data-dcnode-id="1331" instrument_node="">
</span><span data-dcnode-id="1328" instrument_node="">
</span><span data-dcnode-id="1325" instrument_node="">
</span><center data-dcnode-id="1320"><div data-dcnode-id="1321" id="responsive-2"><span data-dcnode-id="1324" instrument_node="">
</span></div></center></div><span data-dcnode-id="1318" instrument_node="">
</span><h2 data-dcnode-id="1314"><span class="ez-toc-section" data-dcnode-id="1317" id="What_is_a_normal_resting_tidal_volume"></span><span data-dcnode-id="1316" instrument_node="">What is a normal resting tidal volume?</span><span class="ez-toc-section-end" data-dcnode-id="1315"></span></h2><span data-dcnode-id="1313" instrument_node="">
</span><p data-dcnode-id="1311"><span data-dcnode-id="1312" instrument_node="">In a healthy, young human adult, tidal volume is approximately 500 ml per inspiration or 7 ml/kg of body mass.</span></p><span data-dcnode-id="1310" instrument_node="">
</span><h2 data-dcnode-id="1306"><span class="ez-toc-section" data-dcnode-id="1309" id="What_best_describes_tidal_volume"></span><span data-dcnode-id="1308" instrument_node="">What best describes tidal volume?</span><span class="ez-toc-section-end" data-dcnode-id="1307"></span></h2><span data-dcnode-id="1305" instrument_node="">
</span><p data-dcnode-id="1303"><span data-dcnode-id="1304" instrument_node="">Tidal volume is the air exchanged during normal breathing. What statement best describes tidal volume? Tidal volume is the air forcibly expelled after normal expiration. Tidal volume is the air exhaled after normal inspiration.</span></p><span data-dcnode-id="1302" instrument_node="">
</span><h2 data-dcnode-id="1298"><span class="ez-toc-section" data-dcnode-id="1301" id="What_is_vital_lung_capacity"></span><span data-dcnode-id="1300" instrument_node="">What is vital lung capacity?</span><span class="ez-toc-section-end" data-dcnode-id="1299"></span></h2><span data-dcnode-id="1297" instrument_node="">
</span><p data-dcnode-id="1295"><span data-dcnode-id="1296" instrument_node="">Background: Vital Capacity (VC) is defined as a change in volume of lung after maximal inspiration followed by maximal expiration is called Vital Capacity of lungs. It is the sum of tidal volume, inspiratory reserve volume . and expiratory reserve volume. Vital capacity of normal adults ranges between 3 to 5 litres.</span></p><div class="code-block code-block-7" data-dcnode-id="1289" style="margin: 8px auto; text-align: center; display: block; clear: both;"><span data-dcnode-id="1294" instrument_node="">
</span><center data-dcnode-id="1290"><div clicktrack="%%CLICK_URL_ESC%%" data-dcnode-id="1293" id="27862x300x250x4659x_ADSLOT1"></div><span data-dcnode-id="1292" instrument_node="">
</span></center></div><span data-dcnode-id="1288" instrument_node="">
</span><h2 data-dcnode-id="1284"><span class="ez-toc-section" data-dcnode-id="1287" id="What_causes_low_tidal_volume"></span><span data-dcnode-id="1286" instrument_node="">What causes low tidal volume?</span><span class="ez-toc-section-end" data-dcnode-id="1285"></span></h2><span data-dcnode-id="1283" instrument_node="">
</span><p data-dcnode-id="1281"><span data-dcnode-id="1282" instrument_node="">A low tidal volume alarm is most often precipitated by high airway pressure. Remember that the patient gets little or no ventilation when a high-pressure alarm is active, so naturally, the exhaled tidal volume is very low.</span></p><span data-dcnode-id="1280" instrument_node="">

 volume from tidal volume?"><span data-dcnode-id="1114" instrument_node="">How do you calculate minute volume from tidal volume?</span></a></li><li class="ez-toc-page-1 ez-toc-heading-level-2" data-dcnode-id="1109"><a class="ez-toc-link ez-toc-heading-14" data-dcnode-id="1110" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//answerstoall.com/popular/what-is-the-formula-for-tidal-volume/%23What_is_the_value_of_a_tidal_volume" title="What is the value of a tidal volume?"><span data-dcnode-id="1111" instrument_node="">What is the value of a tidal volume?</span></a></li></ul></nav></div><span data-dcnode-id="1105" instrument_node="">
</span><h2 data-dcnode-id="1101"><span class="ez-toc-section" data-dcnode-id="1104" id="What_is_the_formula_for_tidal_volume"></span><span data-dcnode-id="1103" instrument_node="">What is the formula for tidal volume?</span><span class="ez-toc-section-end" data-dcnode-id="1102"></span></h2><span data-dcnode-id="1100" instrument_node="">
</span><p data-dcnode-id="1098"><span data-dcnode-id="1099" instrument_node="">Tidal volume = alveolar space + dead space.</span></p><span data-dcnode-id="1097" instrument_node="">
</span><h2 data-dcnode-id="1093"><span class="ez-toc-section" data-dcnode-id="1096" id="What_is_the_tidal_volume"></span><span data-dcnode-id="1095" instrument_node="">What is the tidal volume?</span><span class="ez-toc-section-end" data-dcnode-id="1094"></span></h2><span data-dcnode-id="1092" instrument_node="">
</span><p data-dcnode-id="1090"><span data-dcnode-id="1091" instrument_node="">Tidal volume is essentially every breath a person takes. It is one of the main determinants of minute ventilation and alveolar ventilation. Minute ventilation, also known as total ventilation, is a measurement of the amount of air that enters the lungs per minute. It is the product of respiratory rate and tidal volume.</span></p><span data-dcnode-id="1089" instrument_node="">
</span><h2 data-dcnode-id="1085"><span class="ez-toc-section" data-dcnode-id="1088" id="How_do_you_calculate_tidal_volume_from_vital_capacity"></span><span data-dcnode-id="1087" instrument_node="">How do you calculate tidal volume from vital capacity?</span><span class="ez-toc-section-end" data-dcnode-id="1086"></span></h2><span data-dcnode-id="1084" instrument_node="">
</span><p data-dcnode-id="1082"><span data-dcnode-id="1083" instrument_node="">*VT is the volume of air inspired/expired with each breath. (Also, VT= IC-IRV. VT= VC-(IRV+ERV), VT= TLC-(IRV+ERV+RV).</span></p><span data-dcnode-id="1081" instrument_node="">
</span><h2 data-dcnode-id="1077"><span class="ez-toc-section" data-dcnode-id="1080" id="How_do_you_calculate_tidal_volume_in_adults"></span><span data-dcnode-id="1079" instrument_node="">How do you calculate tidal volume in adults?</span><span class="ez-toc-section-end" data-dcnode-id="1078"></span></h2><span data-dcnode-id="1076" instrument_node="">
</span><p data-dcnode-id="1074"><span data-dcnode-id="1075" instrument_node="">To determine the adequate tidal volume (Vt) to deliver during protective ventilation, it is necessary to calculate the patient’s PBW. This is accomplished by using the Devine’s formulas (3) adjusted by gender: Male: PBW = 50 + 0.91 × (height in cm–152.4) Kg. Female: PBW = 45.5 + 0.91 × (height in cm–152.4) Kg.</span></p><span data-dcnode-id="1073" instrument_node="">
</span><h2 data-dcnode-id="1069"><span class="ez-toc-section" data-dcnode-id="1072" id="What_is_vital_capacity_formula"></span><span data-dcnode-id="1071" instrument_node="">What is vital capacity formula?</span><span class="ez-toc-section-end" data-dcnode-id="1070"></span></h2><span data-dcnode-id="1068" instrument_node="">
</span><p data-dcnode-id="1066"><span data-dcnode-id="1067" instrument_node="">Vital Capacity(VC) It is the total amount of air exhaled after maximal inhalation. The value is about 4800mL and it varies according to age and body size. It is calculated by summing tidal volume, inspiratory reserve volume, and expiratory reserve volume. VC = TV+IRV+ERV.</span></p><span data-dcnode-id="1065" instrument_node="">
</span><h2 data-dcnode-id="1061"><span class="ez-toc-section" data-dcnode-id="1064" id="What_is_vital_capacity_and_tidal_volume"></span><span data-dcnode-id="1063" instrument_node="">What is vital capacity and tidal volume?</span><span class="ez-toc-section-end" data-dcnode-id="1062"></span></h2><span data-dcnode-id="1060" instrument_node="">
</span><p data-dcnode-id="1058"><span data-dcnode-id="1059" instrument_node="">Vital capacity: the volume of air breathed out after the deepest inhalation. VT. Tidal volume: that volume of air moved into or out of the lungs during quiet breathing (VT indicates a subdivision of the lung; when tidal volume is precisely measured, as in gas exchange calculation, the symbol TV or VT is used.)</span></p><span data-dcnode-id="1057" instrument_node="">
</span><h2 data-dcnode-id="1053"><span class="ez-toc-section" data-dcnode-id="1056" id="How_do_vets_calculate_tidal_volume"></span><span data-dcnode-id="1055" instrument_node="">How do vets calculate tidal volume?</span><span class="ez-toc-section-end" data-dcnode-id="1054"></span></h2><span data-dcnode-id="1052" instrument_node="">
</span><p data-dcnode-id="1050"><span data-dcnode-id="1051" instrument_node="">The tidal volume (in ml) is calculated by multiplying a volume factor by the bodyweight of the patient in kg. This factor is taken as I Oml/kg in medium and large dogs and 15ml/kg in small dogs and cats, so the tidal volume is calculated as I 0 x bodyweight or 15 x bodyweight depending on the size of the animal.</span></p><span data-dcnode-id="1049" instrument_node="">
</span><h2 data-dcnode-id="1045"><span class="ez-toc-section" data-dcnode-id="1048" id="How_do_you_calculate_tidal_volume_a_level"></span><span data-dcnode-id="1047" instrument_node="">How do you calculate tidal volume a level?</span><span class="ez-toc-section-end" data-dcnode-id="1046"></span></h2><span data-dcnode-id="1044" instrument_node="">
</span><p data-dcnode-id="1042"><span data-dcnode-id="1043" instrument_node="">Tidal volume (TV) is the amount of air breathed in with each normal breath. The average tidal volume is 0.5 litres (500 ml). Minute ventilation (VE) is the total volume of air entering the lungs in a minute….VE = BR × TV.</span></p><span data-dcnode-id="1041" instrument_node="">
</span><span data-dcnode-id="1040" instrument_node="">
</span><span data-dcnode-id="1039" instrument_node="">
</span><span data-dcnode-id="1037" instrument_node="">
</span><span data-dcnode-id="1034" instrument_node="">
</span><span data-dcnode-id="1031" instrument_node="">
</span><span data-dcnode-id="1029" instrument_node="">
</span><span data-dcnode-id="1028" instrument_node="">
</span><span data-dcnode-id="1025" instrument_node="">
</span><span data-dcnode-id="1022" instrument_node="">
</span><span data-dcnode-id="1019" instrument_node="">
</span><span data-dcnode-id="1017" instrument_node="">
</span><table data-dcnode-id="1015"><tbody data-dcnode-id="1016"><tr data-dcnode-id="1030"><th data-dcnode-id="1038"></th><th data-dcnode-id="1035"><span data-dcnode-id="1036" instrument_node="">Rest</span></th><th data-dcnode-id="1032"><span data-dcnode-id="1033" instrument_node="">Exercise</span></th></tr><tr data-dcnode-id="1018"><td data-dcnode-id="1026"><span data-dcnode-id="1027" instrument_node="">Minute ventilation</span></td><td data-dcnode-id="1023"><span data-dcnode-id="1024" instrument_node="">6 litres per minute</span></td><td data-dcnode-id="1020"><span data-dcnode-id="1021" instrument_node="">90 litres per minute</span></td></tr></tbody></table><span data-dcnode-id="1014" instrument_node="">
</span><h2 data-dcnode-id="1010"><span class="ez-toc-section" data-dcnode-id="1013" id="How_do_you_calculate_tidal"></span><span data-dcnode-id="1012" instrument_node="">How do you calculate tidal?</span><span class="ez-toc-section-end" data-dcnode-id="1011"></span></h2><span data-dcnode-id="1009" instrument_node="">
</span><p data-dcnode-id="1007"><span data-dcnode-id="1008" instrument_node="">The rule of twelfths works like this; take the difference in height between the high and low tide on that day, and divide that by 12 equal chunks.</span></p><span data-dcnode-id="1006" instrument_node="">
</span><h2 data-dcnode-id="1002"><span class="ez-toc-section" data-dcnode-id="1005" id="How_do_you_calculate_Cats_minute_volume"></span><span data-dcnode-id="1004" instrument_node="">How do you calculate Cat’s minute volume?</span><span class="ez-toc-section-end" data-dcnode-id="1003"></span></h2><span data-dcnode-id="1001" instrument_node="">
</span><p data-dcnode-id="999"><span data-dcnode-id="1000" instrument_node="">The minute volume, which represents the total volume of gas inhaled and exhaled per minute, can be calculated by multiplying the respiratory rate by the tidal volume.</span></p><span data-dcnode-id="998" instrument_node="">
</span><h2 data-dcnode-id="994"><span class="ez-toc-section" data-dcnode-id="997" id="What_is_the_formula_for_calculating_tidal_volume"></span><span data-dcnode-id="996" instrument_node="">What is the formula for calculating tidal volume?</span><span class="ez-toc-section-end" data-dcnode-id="995"></span></h2><span data-dcnode-id="993" instrument_node="">
</span><p data-dcnode-id="991"><span data-dcnode-id="992" instrument_node="">Calculate the tidal volume by multiplying 12 ml by the ideal body weight in kg. Keep in mind that this is not a physiologic determination of tidal volume–only an estimation. This formula is for someone who is resting comfortably and in excellent health. For patients with asthma or emphysema , multiply 10 ml by the ideal body weight. 

</span></p><h2 data-dcnode-id="987"><span class="ez-toc-section" data-dcnode-id="990" id="How_do_you_measure_tidal_volume"></span><span data-dcnode-id="989" instrument_node="">How do you measure tidal volume?</span><span class="ez-toc-section-end" data-dcnode-id="988"></span></h2><span data-dcnode-id="986" instrument_node="">
</span><p data-dcnode-id="984"><span data-dcnode-id="985" instrument_node="">To measure tidal volume, place the mouthpiece loosely between your lips and breathe normally through the corner of your mouth (not the mouthpiece) for several breaths to establish a normal breathing pattern. Then, exhale five successive breaths into the spirometer. 

</span></p><h2 data-dcnode-id="980"><span class="ez-toc-section" data-dcnode-id="983" id="How_do_you_calculate_minute_volume_from_tidal_volume"></span><span data-dcnode-id="982" instrument_node="">How do you calculate minute volume from tidal volume?</span><span class="ez-toc-section-end" data-dcnode-id="981"></span></h2><span data-dcnode-id="979" instrument_node="">
</span><p data-dcnode-id="977"><span data-dcnode-id="978" instrument_node="">Multiply the tidal volume times the number of breaths in a minute to find the minute volume. For instance, if a person’s tidal volume is 50 mL and he breathes 15 times in a minute, multiply 50 times 15 to get a minute volume of 750 mL per minute. 

</span></p><h2 data-dcnode-id="973"><span class="ez-toc-section" data-dcnode-id="976" id="What_is_the_value_of_a_tidal_volume"></span><span data-dcnode-id="975" instrument_node="">What is the value of a tidal volume?</span><span class="ez-toc-section-end" data-dcnode-id="974"></span></h2><span data-dcnode-id="972" instrument_node="">
</span><p data-dcnode-id="970"><span data-dcnode-id="971" instrument_node="">During normal breathing, your average tidal volume is about 500 mL according to “Essentials of Exercise Physiology” by William McKardle. In people with normal lung functioning, this value can double to 1000 mL of air moved per full breath during exercise. 

</span></p><p data-dcnode-id="451"><iframe allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture" allowfullscreen="" data-dcnode-id="452" frameborder="0" height="600" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.youtube.com/embed/6mB2ZOsZa8g%3Ffeature%3Doembed&amp;raw" title="Respiratory Therapy - How to Calculate RR or Tidal Volume from Minute Volume" width="800"><html data-cast-api-enabled="true" data-dcnode-id="454" dir="ltr" lang="en"><head data-dcnode-id="944"><meta charset="utf-8"><meta content="width=device-width, initial-scale=1" data-dcnode-id="964" name="viewport"/><link data-dcnode-id="959" href="https://www.youtube.com/s/player/534c466c/www-player.css" name="www-player" nonce="u+Amqn52WPJM4RzxhC+xzA" rel="stylesheet"/><title data-dcnode-id="946">YouTube</title><link data-dcnode-id="945" href="https://www.youtube.com/watch?v=6mB2ZOsZa8g" rel="canonical"/></meta></head><body class="date-20220424 en_US ltr site-center-aligned site-as-giant-card" data-dcnode-id="455" dir="ltr"><div data-dcnode-id="462" id="player" style="width: 100%; height: 100%;"><div aria-label="YouTube Video Player" class="html5-video-player ytp-exp-bottom-control-flexbox ytp-title-enable-channel-logo ytp-embed ytp-embed-playlist unstarted-mode ytp-hide-controls" data-dcnode-id="463" data-version="/s/player/534c466c/player_ias.vflset/en_US/base.js" id="movie_player" tabindex="-1"><div class="html5-video-container" data-dcnode-id="942" data-layer="0"><video class="video-stream html5-main-video" controlslist="nodownload" data-dcnode-id="943" playsinline="" style="width: 645px; height: 600px; left: 0px; top: -600px;" tabindex="-1" webkit-playsinline=""></video></div><div class="ytp-gradient-top" data-dcnode-id="941" data-layer="1"></div><div class="ytp-chrome-top ytp-show-cards-title" data-dcnode-id="866" data-layer="1"><div class="ytp-title-channel ytp-flyout-fix-experiment" data-dcnode-id="931"><div class="ytp-tit
