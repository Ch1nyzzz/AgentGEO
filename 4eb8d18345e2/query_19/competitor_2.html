</span><div data-dcnode-id="1056" id="th_flex_btf_1_desk"></div><span data-dcnode-id="1055" instrument_node="">
</span><div data-dcnode-id="1054" id="th_lb_atf_content"></div><span data-dcnode-id="1053" instrument_node="">
</span><br data-dcnode-id="1052"><span data-dcnode-id="1051" instrument_node=""> Also question is,  what is vital capacity and tidal volume?</span><p data-dcnode-id="1030"><span data-dcnode-id="1031"><span data-dcnode-id="1032"><b data-dcnode-id="1049"><span data-dcnode-id="1050" instrument_node="">Vital capacity</span></b><span data-dcnode-id="1048" instrument_node=""> (VC) is the maximum amount of air a person can expel from the lungs after a maximum inhalation. It is equal to the sum of inspiratory reserve </span><b data-dcnode-id="1046"><span data-dcnode-id="1047" instrument_node="">volume</span></b><span data-dcnode-id="1045" instrument_node="">, </span><b data-dcnode-id="1043"><span data-dcnode-id="1044" instrument_node="">tidal volume</span></b><span data-dcnode-id="1042" instrument_node="">, and expiratory reserve </span><b data-dcnode-id="1040"><span data-dcnode-id="1041" instrument_node="">volume</span></b><span data-dcnode-id="1039" instrument_node="">. Lung </span><b data-dcnode-id="1037"><span data-dcnode-id="1038" instrument_node="">volumes</span></b><span data-dcnode-id="1036" instrument_node=""> are directly measured, whereas lung capacities are inferred from </span><b data-dcnode-id="1034"><span data-dcnode-id="1035" instrument_node="">volumes</span></b><span data-dcnode-id="1033" instrument_node="">.</span></span></span></p><p data-dcnode-id="1007"><span data-dcnode-id="1029" instrument_node="">Also,  does vital capacity change as tidal volume increases or decreases? </span><span data-dcnode-id="1008"><span data-dcnode-id="1009"><span data-dcnode-id="1028" instrument_node="">The </span><b data-dcnode-id="1026"><span data-dcnode-id="1027" instrument_node="">tidal volume</span></b><span data-dcnode-id="1025" instrument_node=""> therefore expands into the expiratory reserve </span><b data-dcnode-id="1023"><span data-dcnode-id="1024" instrument_node="">volume</span></b><span data-dcnode-id="1022" instrument_node=""> and the inspiratory reserve </span><b data-dcnode-id="1020"><span data-dcnode-id="1021" instrument_node="">volume</span></b><span data-dcnode-id="1019" instrument_node=""> (Fig. 10.15). The consensus of opinion is that the </span><b data-dcnode-id="1017"><span data-dcnode-id="1018" instrument_node="">vital capacity does</span></b><span data-dcnode-id="1016" instrument_node=""> not </span><b data-dcnode-id="1014"><span data-dcnode-id="1015" instrument_node="">change</span></b><span data-dcnode-id="1013" instrument_node="">. However, the residual </span><b data-dcnode-id="1011"><span data-dcnode-id="1012" instrument_node="">volume decreases</span></b><span data-dcnode-id="1010" instrument_node=""> by about 200 mL, possibly due to the large intra-abdominal swelling.</span></span></span></p><p data-dcnode-id="1005"><span data-dcnode-id="1006" instrument_node=""> Also Know,  what is the difference between total lung capacity and vital capacity?</span></p><p data-dcnode-id="988"><span data-dcnode-id="1004" instrument_node=""> </span><span data-dcnode-id="989"><span data-dcnode-id="990"><span data-dcnode-id="1003" instrument_node="">The </span><b data-dcnode-id="1001"><span data-dcnode-id="1002" instrument_node="">vital capacity</span></b><span data-dcnode-id="1000" instrument_node=""> (VC) measures the maximum amount of air that can be inhaled or exhaled during a respiratory cycle. It is the sum of the expiratory reserve volume, tidal volume, and inspiratory reserve volume. The </span><b data-dcnode-id="998"><span data-dcnode-id="999" instrument_node="">total lung capacity</span></b><span data-dcnode-id="997" instrument_node=""> (TLC) is a measurement of the </span><b data-dcnode-id="995"><span data-dcnode-id="996" instrument_node="">total</span></b><span data-dcnode-id="994" instrument_node=""> amount of air that the </span><b data-dcnode-id="992"><span data-dcnode-id="993" instrument_node="">lung</span></b><span data-dcnode-id="991" instrument_node=""> can hold.</span></span></span></p><p data-dcnode-id="986"><span data-dcnode-id="987" instrument_node="">What is a tidal volume?</span></p><p data-dcnode-id="968"><span data-dcnode-id="969"><span data-dcnode-id="970"><b data-dcnode-id="984"><span data-dcnode-id="985" instrument_node="">Tidal volume</span></b><span data-dcnode-id="983" instrument_node=""> (symbol V</span><sub data-dcnode-id="981"><span data-dcnode-id="982" instrument_node="">T</span></sub><span data-dcnode-id="980" instrument_node=""> or TV) is the lung </span><b data-dcnode-id="978"><span data-dcnode-id="979" instrument_node="">volume</span></b><span data-dcnode-id="977" instrument_node=""> representing the normal </span><b data-dcnode-id="975"><span data-dcnode-id="976" instrument_node="">volume</span></b><span data-dcnode-id="974" instrument_node=""> of air displaced between normal inhalation and exhalation when extra effort is not applied. In a healthy, young human adult, </span><b data-dcnode-id="972"><span data-dcnode-id="973" instrument_node="">tidal volume</span></b><span data-dcnode-id="971" instrument_node=""> is approximately 500 mL per inspiration or 7 mL/kg of body mass.</span></span></span></p><span data-dcnode-id="967" instrument_node=""> </span><div class="pg-lazy" data-dcnode-id="966" data-gpt-parent="th_flex_desk"></div><span data-dcnode-id="965" instrument_node="">

</span><p data-dcnode-id="885"></p><div data-dcnode-id="873"><span data-dcnode-id="874"><span data-dcnode-id="875"><b data-dcnode-id="883"><span data-dcnode-id="884" instrument_node="">Tidal volume</span></b><span data-dcnode-id="882" instrument_node=""> is </span><b data-dcnode-id="880"><span data-dcnode-id="881" instrument_node="">measured</span></b><span data-dcnode-id="879" instrument_node=""> using several techniques and at several sites in the breathing circuit. Common </span><b data-dcnode-id="877"><span data-dcnode-id="878" instrument_node="">measures</span></b><span data-dcnode-id="876" instrument_node=""> include the setting on the ventilator control panel, bellows excursion, and flow through the inspiratory or expiratory limbs of the circuit.</span></span></span></div><p data-dcnode-id="872"></p><span data-dcnode-id="871" instrument_node="">

</span><p data-dcnode-id="855"></p><div data-dcnode-id="833"><span data-dcnode-id="854" instrument_node=""> </span><div data-dcnode-id="850"><span data-dcnode-id="851"><b data-dcnode-id="852"><span data-dcnode-id="853" instrument_node="">Measure Tidal Volume</span></b></span></div><span data-dcnode-id="849" instrument_node=""> </span><span data-dcnode-id="834"><span data-dcnode-id="835"><span data-dcnode-id="848" instrument_node="">Take a normal breath in, hold your nose and take a normal breath out into the lung </span><b data-dcnode-id="846"><span data-dcnode-id="847" instrument_node="">volume</span></b><span data-dcnode-id="845" instrument_node=""> bag mouthpiece. Slide a paper towel along the bag to push all the air to the lower end and </span><b data-dcnode-id="843"><span data-dcnode-id="844" instrument_node="">measure</span></b><span data-dcnode-id="842" instrument_node=""> the </span><b data-dcnode-id="840"><span data-dcnode-id="841" instrument_node="">volume</span></b><span data-dcnode-id="839" instrument_node=""> of air it contains. (The bag has liter and 1/10 liter graduations.) Record this as </span><b data-dcnode-id="837"><span data-dcnode-id="838" instrument_node="">tidal volume</span></b><span data-dcnode-id="836" instrument_node="">.</span></span></span></div><p data-dcnode-id="832"></p><span data-dcnode-id="831" instrument_node="">

</span><p data-dcnode-id="815"></p><div data-dcnode-id="808"><span data-dcnode-id="809"><span data-dcnode-id="810"><span data-dcnode-id="814" instrument_node="">During exercise, </span><b data-dcnode-id="812"><span data-dcnode-id="813" instrument_node="">tidal volume</span></b><span data-dcnode-id="811" instrument_node=""> increases as the depth of breathing increases and the rate of breathing increases too. This has the effect of taking more oxygen into the body and removing more carbon dioxide.</span></span></span></div><p data-dcnode-id="807"></p><span data-dcnode-id="806" instrument_node="">

</span></h3><span data-dcnode-id="791" instrument_node="">
</span><p data-dcnode-id="790"></p><div data-dcnode-id="771"><span data-dcnode-id="772"><span data-dcnode-id="773"><span data-dcnode-id="789" instrument_node="">Introduction. </span><b data-dcnode-id="787"><span data-dcnode-id="788" instrument_node="">Lung capacity</span></b><span data-dcnode-id="786" instrument_node=""> or total </span><b data-dcnode-id="784"><span data-dcnode-id="785" instrument_node="">lung capacity</span></b><span data-dcnode-id="783" instrument_node=""> (TLC) is the volume of air in the </span><b data-dcnode-id="781"><span data-dcnode-id="782" instrument_node="">lungs</span></b><span data-dcnode-id="780" instrument_node=""> upon the maximum effort of inspiration. Among healthy adults, the </span><b data-dcnode-id="778"><span data-dcnode-id="779" instrument_node="">average lung capacity</span></b><span data-dcnode-id="777" instrument_node=""> is about 6 liters. Age, gender, body composition, and ethnicity are factors affecting the different ranges of </span><b data-dcnode-id="775"><span data-dcnode-id="776" instrument_node="">lung capacity</span></b><span data-dcnode-id="774" instrument_node=""> among individuals</span></span></span></div><p data-dcnode-id="770"></p><span data-dcnode-id="769" instrument_node="">

</span></h3><span data-dcnode-id="748" instrument_node="">
</span><p data-dcnode-id="747"></p><div data-dcnode-id="736"><span data-dcnode-id="746" instrument_node=""> </span><div data-dcnode-id="741"><span data-dcnode-id="742"><b data-dcnode-id="744"><span data-dcnode-id="745" instrument_node="">Vital Capacity</span></b><span data-dcnode-id="743" instrument_node="">(VC)</span></span></div><span data-dcnode-id="740" instrument_node=""> </span><span data-dcnode-id="737"><span data-dcnode-id="738"><span data-dcnode-id="739" instrument_node="">It is the total amount of air exhaled after maximal inhalation. The value is about 4800mL and it varies according to age and body size. It is calculated by summing tidal volume, inspiratory reserve volume, and expiratory reserve volume. VC = TV+IRV+ERV.</span></span></span></div><p data-dcnode-id="735"></p><span data-dcnode-id="734" instrument_node="">

</span></h3><span data-dcnode-id="719" instrument_node="">
</span><p data-dcnode-id="718"></p><div data-dcnode-id="705"><span data-dcnode-id="706"><span data-dcnode-id="707"><span data-dcnode-id="717" instrument_node="">Get some resistance. Aerobic exercise can't </span><b data-dcnode-id="715"><span data-dcnode-id="716" instrument_node="">increase lung</span></b><span data-dcnode-id="714" instrument_node=""> function, but it can help improve </span><b data-dcnode-id="712"><span data-dcnode-id="713" instrument_node="">lung capacity</span></b><span data-dcnode-id="711" instrument_node=""> — the amount of oxygen you take in with each breath. "That raises your heart rate and makes you breathe harder, which ultimately can help improve </span><b data-dcnode-id="709"><span data-dcnode-id="710" instrument_node="">lung capacity</span></b><span data-dcnode-id="708" instrument_node="">."</span></span></span></div><p data-dcnode-id="704"></p><span data-dcnode-id="703" instrument_node="">

</span></h3><span data-dcnode-id="688" instrument_node="">
</span><p data-dcnode-id="687"></p><div data-dcnode-id="677"><span data-dcnode-id="678"><span data-dcnode-id="679"><span data-dcnode-id="686" instrument_node="">There is no change in </span><b data-dcnode-id="684"><span data-dcnode-id="685" instrument_node="">tidal volume</span></b><span data-dcnode-id="683" instrument_node=""> with </span><b data-dcnode-id="681"><span data-dcnode-id="682" instrument_node="">age</span></b><span data-dcnode-id="680" instrument_node="">, and older individuals maintain the required minute ventilation by increasing the respiratory rate. The ventilatory response to lower oxygen tension or raised carbon dioxide tension is markedly impaired in older adults.</span></span></span></div><p data-dcnode-id="676"></p><span data-dcnode-id="675" instrument_node="">

</span></h3><span data-dcnode-id="660" instrument_node="">
</span><p data-dcnode-id="659"></p><div data-dcnode-id="637"><span data-dcnode-id="638"><span data-dcnode-id="639"><span data-dcnode-id="658" instrument_node="">As you </span><b data-dcnode-id="656"><span data-dcnode-id="657" instrument_node="">age</span></b><span data-dcnode-id="655" instrument_node="">, changes </span><b data-dcnode-id="653"><span data-dcnode-id="654" instrument_node="">affect</span></b><span data-dcnode-id="652" instrument_node=""> your </span><b data-dcnode-id="650"><span data-dcnode-id="651" instrument_node="">lung</span></b><span data-dcnode-id="649" instrument_node=""> tissue, muscles and bones, which all impact your breathing. The maximum amount of air your </span><b data-dcnode-id="647"><span data-dcnode-id="648" instrument_node="">lungs</span></b><span data-dcnode-id="646" instrument_node=""> can hold—your total </span><b data-dcnode-id="644"><span data-dcnode-id="645" instrument_node="">lung capacity</span></b><span data-dcnode-id="643" instrument_node="">—is about six liters. After about 35, their function declines as you </span><b data-dcnode-id="641"><span data-dcnode-id="642" instrument_node="">age</span></b><span data-dcnode-id="640" instrument_node=""> and as a result, breathing can slowly become more difficult over time.</span></span></span></div><p data-dcnode-id="636"></p><span data-dcnode-id="635" instrument_node="">

</span></h3><span data-dcnode-id="620" instrument_node="">
</span><p data-dcnode-id="619"></p><div data-dcnode-id="601"><span data-dcnode-id="602"><span data-dcnode-id="603"><b data-dcnode-id="617"><span data-dcnode-id="618" instrument_node="">Lung Capacity</span></b><span data-dcnode-id="616" instrument_node=""> and Aging. Did you know that the </span><b data-dcnode-id="614"><span data-dcnode-id="615" instrument_node="">maximum</span></b><span data-dcnode-id="613" instrument_node=""> amount of air your </span><b data-dcnode-id="611"><span data-dcnode-id="612" instrument_node="">lungs</span></b><span data-dcnode-id="610" instrument_node=""> can hold—your total </span><b data-dcnode-id="608"><span data-dcnode-id="609" instrument_node="">lung capacity</span></b><span data-dcnode-id="607" instrument_node="">—is about 6 liters? That is about three large soda bottles. Your </span><b data-dcnode-id="605"><span data-dcnode-id="606" instrument_node="">lungs</span></b><span data-dcnode-id="604" instrument_node=""> mature by the time you are about 20-25 years old.</span></span></span></div><p data-dcnode-id="600"></p><span data-dcnode-id="599" instrument_node="">

</span><a data-dcnode-id="581" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//treehozz.com/open-detail/750A14" rel="nofollow" target="_blank"><span data-dcnode-id="582" instrument_node="">How can height affect lung capacity?</span></a><span data-dcnode-id="580" instrument_node="">
</span></h3><span data-dcnode-id="578" instrument_node="">
</span><p data-dcnode-id="577"></p><div data-dcnode-id="555"><span data-dcnode-id="556"><span data-dcnode-id="557"><span data-dcnode-id="576" instrument_node="">FVC and FEV1 decline with age, while </span><b data-dcnode-id="574"><span data-dcnode-id="575" instrument_node="">volumes</span></b><span data-dcnode-id="573" instrument_node=""> and </span><b data-dcnode-id="571"><span data-dcnode-id="572" instrument_node="">capacities</span></b><span data-dcnode-id="570" instrument_node="">, such as RV and FRC, increase. TLC, VC, RV, FVC and FEV1 are affected by </span><b data-dcnode-id="568"><span data-dcnode-id="569" instrument_node="">height</span></b><span data-dcnode-id="567" instrument_node="">, since they are proportional </span><b data-dcnode-id="565"><span data-dcnode-id="566" instrument_node="">to</span></b><span data-dcnode-id="564" instrument_node=""> body size. This means that a tall individual </span><b data-dcnode-id="562"><span data-dcnode-id="563" instrument_node="">will</span></b><span data-dcnode-id="561" instrument_node=""> experience greater decrease in </span><b data-dcnode-id="559"><span data-dcnode-id="560" instrument_node="">lung volumes</span></b><span data-dcnode-id="558" instrument_node=""> as they get older.</span></span></span></div><p data-dcnode-id="554"></p><span data-dcnode-id="553" instrument_node="">
