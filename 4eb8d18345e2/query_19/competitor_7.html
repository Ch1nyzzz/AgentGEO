</span><div class="h1-banner-title" data-dcnode-id="1808"><h1 data-dcnode-id="1809"><span data-dcnode-id="1810" instrument_node="">Lung Volumes and Lung Capacity</span></h1></div><span data-dcnode-id="1807" instrument_node="">
</span><article class="post-135199 post type-post status-publish format-standard hentry category-biology" data-dcnode-id="1683" id="post-135199"><span data-dcnode-id="1806" instrument_node="">
</span><link data-dcnode-id="1805" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//byjus.com/wp-content/themes/html5blank-stable/styles/mathjax.css&amp;raw" rel="stylesheet" type="text/css"><link data-dcnode-id="1804" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//byjus.com/wp-content/themes/html5blank-stable/styles/mathjax.css&amp;raw" rel="stylesheet" type="text/css"><p data-dcnode-id="1802"><span data-dcnode-id="1803" instrument_node="">The lung capacities of different animals vary based on their activities. E.g., the lung capacity of cheetahs is much higher than humans. This is because they require a large amount of oxygen for their muscles that help them to run fast. The lung capacity of elephants is also higher due to their large body size.</span></p><span data-dcnode-id="1801" instrument_node="">
</span><p data-dcnode-id="1799"><span data-dcnode-id="1800" instrument_node="">A human lung can hold a maximum of six litres of air.&nbsp;The volume of air involved in the breathing process can be evaluated with the help of a spirometer. It is an equipment which is used to examine the total volume of air inhaled and&nbsp;exhaled by the lungs. It is also used in testing the pulmonary function.</span></p><span data-dcnode-id="1798" instrument_node="">
</span><p data-dcnode-id="1796"><span data-dcnode-id="1797" instrument_node="">The air in the lungs is measured in terms of lung volume and lung capacity. Lung volume measures the amount of air for inhalation or exhalation. Whereas, lung capacity measures how much air can be inhaled from the end of a maximal exhalation.</span></p><span data-dcnode-id="1795" instrument_node="">
</span><p data-dcnode-id="1790"><strong data-dcnode-id="1793"><span data-dcnode-id="1794" instrument_node="">Also Read:&nbsp;</span></strong><a data-dcnode-id="1791" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//byjus.com/biology/mechanism-of-breathing/"><span data-dcnode-id="1792" instrument_node="">Mechanism of Breathing</span></a></p><span data-dcnode-id="1789" instrument_node="">
</span><p data-dcnode-id="1787"><span data-dcnode-id="1788" instrument_node="">Read on to explore the terms related to lung volume and lung capacity such as tidal volume, residual volume, vital capacity, inspiratory capacity, etc.</span></p><span data-dcnode-id="1786" instrument_node="">
</span><h2 data-dcnode-id="1784" style="text-align: justify;"><span data-dcnode-id="1785" instrument_node="">Lung Volumes and Lung Capacities</span></h2><span data-dcnode-id="1783" instrument_node="">
</span><div class="wp-caption aligncenter" data-dcnode-id="1779" id="attachment_15337" style="width: 760px"><img alt="Lung Volumes and Capacities" class="wp-image-15337 size-full" data-dcnode-id="1782" height="337" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//cdn1.byjus.com/wp-content/uploads/2019/04/Lung-Volumes-and-Lung-Capacity2.png&amp;raw" title="Lung Volumes and Capacities" width="750"><p class="wp-caption-text" data-dcnode-id="1780"><span data-dcnode-id="1781" instrument_node="">Lung Volumes and Lung Capacities</span></p></div><span data-dcnode-id="1778" instrument_node="">
</span><h3 data-dcnode-id="1776"><span data-dcnode-id="1777" instrument_node="">Lung Volumes</span></h3><span data-dcnode-id="1775" instrument_node="">
</span><p data-dcnode-id="1773"><span data-dcnode-id="1774" instrument_node="">The lung volume can be described by the following terms:</span></p><span data-dcnode-id="1772" instrument_node="">
</span><h4 data-dcnode-id="1770" style="text-align: justify;"><span data-dcnode-id="1771" instrument_node="">Tidal Volume</span></h4><span data-dcnode-id="1769" instrument_node="">
</span><p data-dcnode-id="1764" style="text-align: justify;"><span data-dcnode-id="1768" instrument_node="">The tidal volume&nbsp;is the&nbsp;total amount of air inhaled or exhaled during regular </span><a data-dcnode-id="1766" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//byjus.com/biology/respiration/"><span data-dcnode-id="1767" instrument_node="">respiration</span></a><span data-dcnode-id="1765" instrument_node=""> or relaxed breathing. Approximately 500 ml of air is utilized during normal respiration in a healthy man.</span></p><span data-dcnode-id="1763" instrument_node="">
</span><h4 data-dcnode-id="1761" style="text-align: justify;"><span data-dcnode-id="1762" instrument_node="">Inspiratory Reserve Volume</span></h4><span data-dcnode-id="1760" instrument_node="">
</span><p data-dcnode-id="1758" style="text-align: justify;"><span data-dcnode-id="1759" instrument_node="">An&nbsp;inspiratory reserve volume is a supplementary volume, approximately ranging between 2500 to 3100 ml of air which could be effectively inhaled after the inspiration of a standard tidal volume.</span></p><span data-dcnode-id="1757" instrument_node="">
</span><h4 data-dcnode-id="1755" style="text-align: justify;"><span data-dcnode-id="1756" instrument_node="">Expiratory Reserve Volume</span></h4><span data-dcnode-id="1754" instrument_node="">
</span><p data-dcnode-id="1752" style="text-align: justify;"><span data-dcnode-id="1753" instrument_node="">An expiratory reserve volume refers to the additional capacity of air which is&nbsp;about 1200 ml are that could be forcibly exhaled out after the expiration of a standard tidal volume.</span></p><span data-dcnode-id="1751" instrument_node="">
</span><h4 data-dcnode-id="1749" style="text-align: justify;"><span data-dcnode-id="1750" instrument_node="">Residual Volume/Reserve Volume</span></h4><span data-dcnode-id="1748" instrument_node="">
</span><p data-dcnode-id="1746" style="text-align: justify;"><span data-dcnode-id="1747" instrument_node="">The residual volume is about the total volume of air around 1100 ml to 1200 ml residing in the lungs after the reserve volume is emitted or breathed out.</span></p><span data-dcnode-id="1745" instrument_node="">
</span><h3 data-dcnode-id="1743"><span data-dcnode-id="1744" instrument_node="">Lung Capacities</span></h3><span data-dcnode-id="1742" instrument_node="">
</span><p data-dcnode-id="1740" style="text-align: justify;"><span data-dcnode-id="1741" instrument_node="">The lung capacities can be explained by the following terms:</span></p><span data-dcnode-id="1739" instrument_node="">
</span><h4 data-dcnode-id="1737" style="text-align: justify;"><span data-dcnode-id="1738" instrument_node="">Total Lung Capacity</span></h4><span data-dcnode-id="1736" instrument_node="">
</span><p data-dcnode-id="1734" style="text-align: justify;"><span data-dcnode-id="1735" instrument_node="">The total lung capacity applies to the total volume of air-filled in the lungs after&nbsp;a forced inspiration. The lung capacity of a healthy man is estimated to be 6000 ml.</span></p><span data-dcnode-id="1733" instrument_node="">
</span><p data-dcnode-id="1731" style="text-align: center;"><span data-dcnode-id="1732" instrument_node="">&nbsp;TLC = TV + ERV + IRV + RV</span></p><span data-dcnode-id="1730" instrument_node="">
</span><h4 data-dcnode-id="1728" style="text-align: justify;"><span data-dcnode-id="1729" instrument_node="">Vital Capacity</span></h4><span data-dcnode-id="1727" instrument_node="">
</span><p data-dcnode-id="1725" style="text-align: justify;"><span data-dcnode-id="1726" instrument_node="">The vital capacity is the total volume of air that can be expired after a maximum inhalation or maximum air that a person can breathe in after forced expiration. It is an important measure of a person’s respiratory health. A decreased vital capacity is an indication of restrictive lung disease where the lungs cannot expand completely. In the case of normal vital capacity, the improper functioning of lungs indicates obstructive lung disease where the lungs are blocked in the airways.</span></p><span data-dcnode-id="1724" instrument_node="">
</span><p data-dcnode-id="1722" style="text-align: center;"><span data-dcnode-id="1723" instrument_node="">VC = TV + ERV + IRV</span></p><span data-dcnode-id="1721" instrument_node="">
</span><h4 data-dcnode-id="1719" style="text-align: left;"><span data-dcnode-id="1720" instrument_node="">Inspiratory Capacity</span></h4><span data-dcnode-id="1718" instrument_node="">
</span><p data-dcnode-id="1716" style="text-align: left;"><span data-dcnode-id="1717" instrument_node="">The inspiratory capacity&nbsp;is the total volume of air that can be inspired which is about 3600 ml.</span></p><span data-dcnode-id="1715" instrument_node="">
</span><p data-dcnode-id="1713" style="text-align: center;"><span data-dcnode-id="1714" instrument_node="">IC = TV + IRV</span></p><span data-dcnode-id="1712" instrument_node="">
</span><h4 data-dcnode-id="1710" style="text-align: justify;"><span data-dcnode-id="1711" instrument_node="">Functional Residual Capacity</span></h4><span data-dcnode-id="1709" instrument_node="">
</span><p data-dcnode-id="1707" style="text-align: justify;"><span data-dcnode-id="1708" instrument_node="">The functional residual capacity is the total volume of air residing within the lungs after an exhalation process and it is about 2400 ml.</span></p><span data-dcnode-id="1706" instrument_node="">
</span><p data-dcnode-id="1704" style="text-align: center;"><span data-dcnode-id="1705" instrument_node="">FRC = ERV + RV</span></p><span data-dcnode-id="1703" instrument_node="">
</span><p data-dcnode-id="1701"><img alt="lung-volumes-and-capacities-graph" class="aligncenter wp-image-15346 size-full" data-dcnode-id="1702" height="236" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//cdn1.byjus.com/wp-content/uploads/2018/11/biology/2017/12/06100201/lung-volumes-and-capacities-graph.jpeg&amp;raw" title="lung-volumes-and-capacities-graph" width="495"></p><span data-dcnode-id="1700" instrument_node="">
</span><p data-dcnode-id="1698" style="text-align: justify;"><span data-dcnode-id="1699" instrument_node="">The residing air present within the lungs which does not participate in gas exchange is located in the portion of the airways inside the bronchi and bronchioles and outside the alveoli.</span></p><span data-dcnode-id="1697" instrument_node="">
</span><p data-dcnode-id="1692"><strong data-dcnode-id="1695"><span data-dcnode-id="1696" instrument_node="">Also Read:&nbsp;</span></strong><a data-dcnode-id="1693" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//byjus.com/biology/lung-diseases/"><span data-dcnode-id="1694" instrument_node="">Lung Diseases</span></a></p><span data-dcnode-id="1691" instrument_node="">
