umn" data-dcnode-id="256"><span data-dcnode-id="1119" instrument_node=""> </span><div class="breadcrumbs" data-dcnode-id="1114"><span data-dcnode-id="1118" instrument_node=""> </span><a aria-label="Nutrition" data-dcnode-id="1116" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//healthfully.com/nutrition/"><span data-dcnode-id="1117" instrument_node="">Nutrition</span></a><span data-dcnode-id="1115" instrument_node=""> </span></div><span data-dcnode-id="1113" instrument_node=""> </span><div class="title-image-wrapper" data-dcnode-id="1049"><span data-dcnode-id="1112" instrument_node=""> </span><div class="article-title-container" data-dcnode-id="1077"><span data-dcnode-id="1111" instrument_node=""> </span><h1 class="title" data-dcnode-id="1109"><span data-dcnode-id="1110" instrument_node="">What Are the Steps of Breathing?</span></h1><span data-dcnode-id="1108" instrument_node=""> </span><div class="toc-container" data-dcnode-id="1079"><span data-dcnode-id="1107" instrument_node=""> </span><ul class="anchor-container" data-dcnode-id="1081"><span data-dcnode-id="1106" instrument_node=""> </span><li data-dcnode-id="1101"><span data-dcnode-id="1105" instrument_node=""> </span><a aria-label="The-Urge-to-Breathe-link" data-dcnode-id="1103" href="#the-urge-to-breathe"><span data-dcnode-id="1104" instrument_node=""> The Urge to Breathe </span></a><span data-dcnode-id="1102" instrument_node=""> </span></li><span data-dcnode-id="1100" instrument_node=""> </span><li data-dcnode-id="1095"><span data-dcnode-id="1099" instrument_node=""> </span><a aria-label="Inhalation-link" data-dcnode-id="1097" href="#inhalation"><span data-dcnode-id="1098" instrument_node=""> Inhalation </span></a><span data-dcnode-id="1096" instrument_node=""> </span></li><span data-dcnode-id="1094" instrument_node=""> </span><li data-dcnode-id="1089"><span data-dcnode-id="1093" instrument_node=""> </span><a aria-label="Gas-Exchange-link" data-dcnode-id="1091" href="#gas-exchange"><span data-dcnode-id="1092" instrument_node=""> Gas Exchange </span></a><span data-dcnode-id="1090" instrument_node=""> </span></li><span data-dcnode-id="1088" instrument_node=""> </span><li data-dcnode-id="1083"><span data-dcnode-id="1087" instrument_node=""> </span><a aria-label="Exhalation-link" data-dcnode-id="1085" href="#exhalation"><span data-dcnode-id="1086" instrument_node=""> Exhalation </span></a><span data-dcnode-id="1084" instrument_node=""> </span></li><span data-dcnode-id="1082" instrument_node=""> </span></ul><span data-dcnode-id="1080" instrument_node=""> </span></div><span data-dcnode-id="1078" instrument_node=""> </span></div><span data-dcnode-id="1076" instrument_node=""> </span><div class="non-desktop-byline" data-dcnode-id="1051"><span data-dcnode-id="1075" instrument_node=""> </span><div class="byline-wrapper" data-dcnode-id="1067"><span data-dcnode-id="1074" instrument_node=""> </span><span class="author-headline" data-dcnode-id="1072"><span data-dcnode-id="1073" instrument_node="">Written by </span></span><span data-dcnode-id="1071" instrument_node=""> </span><span class="author" data-dcnode-id="1069"><span data-dcnode-id="1070" instrument_node="">Dr. Terry L. Levin </span></span><span data-dcnode-id="1068" instrument_node=""> </span></div><span data-dcnode-id="1066" instrument_node=""> </span><div class="dates-wrapper" data-dcnode-id="1061"><span data-dcnode-id="1065" instrument_node=""> </span><span class="date" data-dcnode-id="1063"><span data-dcnode-id="1064" instrument_node=""> 14 August, 2017 </span></span><span data-dcnode-id="1062" instrument_node=""> </span></div><span data-dcnode-id="1060" instrument_node=""> </span><div class="trust-icon" data-dcnode-id="1053"><span data-dcnode-id="1059" instrument_node=""> </span><div class="checkmark" data-dcnode-id="1058"></div><span data-dcnode-id="1057" instrument_node=""> </span><p class="trust-copy" data-dcnode-id="1055"><span data-dcnode-id="1056" instrument_node="">Fact Checked</span></p><span data-dcnode-id="1054" instrument_node=""> </span></div><span data-dcnode-id="1052" instrument_node=""> </span></div><span data-dcnode-id="1050" instrument_node=""> </span></div><span data-dcnode-id="1048" instrument_node=""> </span><div class="article-content-container" data-dcnode-id="258"><span data-dcnode-id="1047" instrument_node=""> </span><div class="freestyle-content" data-dcnode-id="873"><span data-dcnode-id="1046" instrument_node=""> </span><p data-dcnode-id="1044"><span data-dcnode-id="1045" instrument_node="">Breathing provides your body with a way to exchange gases with the atmosphere. It provides the oxygen that your organs need to survive. And it also allows your body to get rid of gases that it does not need, like carbon dioxide. Breathing is a complicated process, but it occurs subconsciously without you even being aware of its different steps: stimulation of the respiratory control centers in your brain, inhalation, gas exchange and exhalation.</span></p><span data-dcnode-id="1043" instrument_node=""> </span><div class="inline-parent-container" data-dcnode-id="1033"><span data-dcnode-id="1042" instrument_node=""> </span><div class="adsense-inline" data-ad-unit-name="adsense-inline-has-loaded" data-dcnode-id="1035"><span data-dcnode-id="1041" instrument_node="">

</span><ins class="adsbygoogle" data-ad-client="ca-pub-3235755782694080" data-ad-format="auto" data-ad-slot="1094622535" data-dcnode-id="1037" data-full-width-responsive="true" style="display:block"><span data-dcnode-id="1038" instrument_node="">
</span></ins><span data-dcnode-id="1036" instrument_node=""> </span></div><span data-dcnode-id="1034" instrument_node=""> </span></div><span data-dcnode-id="1032" instrument_node=""> </span><div class="mobile-display-ad" data-ad-unit-index="1" data-ad-unit-name="slot" data-dcnode-id="1031"></div><span data-dcnode-id="1030" instrument_node=""> </span><h2 class="toc-target" data-dcnode-id="1028" id="the-urge-to-breathe"><span data-dcnode-id="1029" instrument_node="">The Urge to Breathe</span></h2><span data-dcnode-id="1027" instrument_node=""> </span><p data-dcnode-id="1025"><span data-dcnode-id="1026" instrument_node="">The urge to breathe comes from the respiratory center, located at the base of your brain. It sends signals via the spinal cord to your diaphragm and the muscles between your ribs telling them when to contract or relax. There are also sensors that control respiration in the major arteries of your body. While your breathing rate changes -- for example when you exercise or are anxious -- your urge to breathe is based primarily on the amount of carbon dioxide in the blood. With higher levels of carbon dioxide, your breathing rate increases.</span></p><span data-dcnode-id="1024" instrument_node=""> </span><div class="custom-module end-section" data-dcnode-id="1006"><span data-dcnode-id="1023" instrument_node=""> </span><div class="wrapper" data-dcnode-id="1008"><span data-dcnode-id="1022" instrument_node=""> </span><div class="copy" data-dcnode-id="1010"><span data-dcnode-id="1021" instrument_node=""> </span><ul data-dcnode-id="1012"><span data-dcnode-id="1020" instrument_node=""> </span><li data-dcnode-id="1017"><span data-dcnode-id="1019" instrument_node="">The urge to breathe comes from the respiratory center, located at the base of your brain.</span><br data-dcnode-id="1018"></li><span data-dcnode-id="1016" instrument_node=""> </span><li data-dcnode-id="1014"><span data-dcnode-id="1015" instrument_node="">There are also sensors that control respiration in the major arteries of your body.</span></li><span data-dcnode-id="1013" instrument_node=""> </span></ul><span data-dcnode-id="1011" instrument_node=""> </span></div><span data-dcnode-id="1009" instrument_node=""> </span></div><span data-dcnode-id="1007" instrument_node=""> </span></div><span data-dcnode-id="1005" instrument_node=""> </span><h2 class="toc-target" data-dcnode-id="1003" id="inhalation"><span data-dcnode-id="1004" instrument_node="">Inhalation</span></h2><span data-dcnode-id="1002" instrument_node=""> </span><a aria-label="Importance of Breathing During Exercise" class="mobile-inline-rcp-tile" data-dcnode-id="977" data-rcp-rendered="inline" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//healthfully.com/importance-of-breathing-during-exercise-4732263.html"><span data-dcnode-id="1001" instrument_node=""> </span><div class="article-image" data-dcnode-id="1000" style="background-image:url(//img-aws.ehowcdn.com/300x180/photos.demandstudios.com/getty/article/92/195/100611379.jpg), url('/public/images/logo-fallback.svg')"></div><span data-dcnode-id="999" instrument_node=""> </span><h3 class="title" data-dcnode-id="997"><span data-dcnode-id="998" instrument_node="">Importance of Breathing During Exercise</span></h3><span data-dcnode-id="996" instrument_node=""> </span><div class="cta" data-dcnode-id="979"><span data-dcnode-id="995" instrument_node=""> </span><div class="arrow" data-dcnode-id="984"><svg data-dcnode-id="985" height="14px" version="1.1" viewBox="0 0 20 14" width="20px" xmlns="http://www.w3.org/2000/svg" xmlns:xlink="http://www.w3.org/1999/xlink"></svg><span data-dcnode-id="994" instrument_node=""> </span><g data-dcnode-id="987" fill="none" fill-rule="evenodd" stroke="none" stroke-width="1"><span data-dcnode-id="993" instrument_node=""> </span><g data-dcnode-id="989" fill="#fff" fill-rule="nonzero"><span data-dcnode-id="992" instrument_node=""> </span><path d="M19.8779297,6.38507812 L13.6279297,0.135078125 C13.4651563,-0.0276953125 13.2014844,-0.0276953125 13.03875,0.135078125 C12.8759766,0.297851562 12.8759766,0.561523437 13.03875,0.724257812 L18.5775,6.26300781 L0.416679688,6.26300781 C0.186367188,6.26300781 0,6.449375 0,6.6796875 C0,6.91 0.186367188,7.09636719 0.416679688,7.09636719 L18.5775,7.09636719 L13.03875,12.6350781 C12.8759766,12.7978516 12.8759766,13.0615234 13.03875,13.2242578 C13.1201172,13.305625 13.2267578,13.3463281 13.3333594,13.3463281 C13.4399609,13.3463281 13.5465625,13.305625 13.6279687,13.2242578 L19.8779687,6.97425781 C20.0407031,6.81152344 20.0407031,6.54785156 19.8779297,6.38507812 Z" data-dcnode-id="991"></path><span data-dcnode-id="990" instrument_node=""> </span></g><span data-dcnode-id="988" instrument_node=""> </span></g><span data-dcnode-id="986" instrument_node=""> </span></div><span data-dcnode-id="983" instrument_node=""> </span><p class="learn-more" data-dcnode-id="981"><span data-dcnode-id="982" instrument_node="">Learn More</span></p><span data-dcnode-id="980" instrument_node=""> </span></div><span data-dcnode-id="978" instrument_node=""> </span></a><span data-dcnode-id="976" instrument_node=""> </span><p data-dcnode-id="971"><span data-dcnode-id="975" instrument_node="">When you breathe, the diaphragm -- the large muscle that divides your chest and abdomen -- contracts and moves downward. Additionally, your ribs move outward. This enlarges your chest and your lungs expand. Lung expansion creates a vacuum </span><a data-dcnode-id="973" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//books.google.com/books%3Fhl%3Den%26lr%3D%26id%3Dk-ShRYqBaNAC%26oi%3Dfnd%26pg%3DPR5%26dq%3DThe%2Bregulation%2Bof%2Bnormal%2Blung%2Bfunction.%26ots%3DAi_-fBAqA0%26sig%3DThkrFnscf5CLnykvXLAQPNS0IWs%23v%3Donepage%26q%3DThe%2520regulation%2520of%2520normal%2520lung%2520function.%26f%3Dfalse" title="inline-reference::Lung Fuction; John E. Cotes et al."><span data-dcnode-id="974" instrument_node="">1</span></a><span data-dcnode-id="972" instrument_node="">. Air enters your nose and mouth and is pulled into your windpipe -- the trachea. The trachea divides into smaller airways called bronchi. These continue to divide as they get farther from the trachea, like the branches of a tree. Finally, the tiny airways deliver the air to the smallest structures in your lung -- the alveoli -- where gas exchange takes place.</span></p><span data-dcnode-id="970" instrument_node=""> </span><div class="mobile-display-ad" data-ad-unit-index="3" data-ad-unit-name="slot" data-dcnode-id="969"></div><span data-dcnode-id="968" instrument_node=""> </span><div class="custom-module end-section" data-dcnode-id="950"><span data-dcnode-id="967" instrument_node=""> </span><div class="wrapper" data-dcnode-id="952"><span data-dcnode-id="966" instrument_node=""> </span><div class="copy" data-dcnode-id="954"><span data-dcnode-id="965" instrument_node=""> </span><ul data-dcnode-id="956"><span data-dcnode-id="964" instrument_node=""> </span><li data-dcnode-id="961"><span data-dcnode-id="963" instrument_node="">When you breathe, the diaphragm -- the large muscle that divides your chest and abdomen -- contracts and moves downward.</span><br data-dcnode-id="962"></li><span data-dcnode-id="960" instrument_node=""> </span><li data-dcnode-id="958"><span data-dcnode-id="959" instrument_node="">Finally, the tiny airways deliver the air to the smallest structures in your lung -- the alveoli -- where gas exchange takes place.</span></li><span data-dcnode-id="957" instrument_node=""> </span></ul><span data-dcnode-id="955" instrument_node=""> </span></div><span data-dcnode-id="953" instrument_node=""> </span></div><span data-dcnode-id="951" instrument_node=""> </span></div><span data-dcnode-id="949" instrument_node=""> </span><h2 class="toc-target" data-dcnode-id="947" id="gas-exchange"><span data-dcnode-id="948" instrument_node="">Gas Exchange</span></h2><span data-dcnode-id="946" instrument_node=""> </span><p data-dcnode-id="944"><span data-dcnode-id="945" instrument_node="">There are millions of alveoli in your lungs surrounded by a mesh of tiny blood vessels, called capillaries. Both the alveoli and the surrounding capillaries have very thin walls. Oxygen readily passes through the alveolar walls into the blood vessels, where it is carried to the rest of your body to be used by the cells. Similarly, the metabolic waste product carbon dioxide readily crosses from your blood into the alveoli to be eliminated by exhalation.</span></p><span data-dcnode-id="943" instrument_node=""> </span><div class="custom-module end-section" data-dcnode-id="925"><span data-dcnode-id="942" instrument_node=""> </span><div class="wrapper" data-dcnode-id="927"><span data-dcnode-id="941" instrument_node=""> </span><div class="copy" data-dcnode-id="929"><span data-dcnode-id="940" instrument_node=""> </span><ul data-dcnode-id="931"><span data-dcnode-id="939" instrument_node=""> </span><li data-dcnode-id="936"><span data-dcnode-id="938" instrument_node="">There are millions of alveoli in your lungs surrounded by a mesh of tiny blood vessels, called capillaries.</span><br data-dcnode-id="937"></li><span data-dcnode-id="935" instrument_node=""> </span><li data-dcnode-id="933"><span data-dcnode-id="934" instrument_node="">Oxygen readily passes through the alveolar walls into the blood vessels, where it is carried to the rest of your body to be used by the cells.</span></li><span data-dcnode-id="932" instrument_node=""> </span></ul><span data-dcnode-id="930" instrument_node=""> </span></div><span data-dcnode-id="928" instrument_node=""> </span></div><span data-dcnode-id="926" instrument_node=""> </span></div><span data-dcnode-id="924" instrument_node=""> </span><h2 class="toc-target" data-dcnode-id="922" id="exhalation"><span data-dcnode-id="923" instrument_node="">Exhalation</span></h2><span data-dcnode-id="921" instrument_node=""> </span><a aria-label="How to Expand Your Lung Capacity" class="mobile-inline-rcp-tile" data-dcnode-id="89
