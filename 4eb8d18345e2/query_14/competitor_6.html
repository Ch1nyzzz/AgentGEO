</span><div class="site-inner" data-dcnode-id="887"><div class="content-sidebar-wrap" data-dcnode-id="888"><main class="content" data-dcnode-id="1046" id="genesis-content"><article aria-label="Mechanism of Breathing- Definition, Muscles and Mechanism Involved" class="post-389042 post type-post status-publish format-standard category-cbse-class-12 category-foundation category-k12-online-school tag-exhalation tag-expiration tag-inhalation tag-inspiration tag-mechanism-of-breathing tag-mechanism-of-breathing-definition tag-muscles-involved-in-breathing entry active-post" data-dcnode-id="1088"><header class="entry-header" data-dcnode-id="2231"><p class="entry-meta" data-dcnode-id="2232"><span data-dcnode-id="2244" instrument_node="">Written by</span><span class="entry-author" data-dcnode-id="2240"><a class="entry-author-link" data-dcnode-id="2241" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.embibe.com/exams/author/taufiya-tazeen/" rel="author"><span class="entry-author-name" data-dcnode-id="2242"><span data-dcnode-id="2243" instrument_node="">Taufiya Tazeen</span></span></a></span><span data-dcnode-id="2239" instrument_node=""> |  Last Modified </span><time class="entry-modified-time" data-dcnode-id="2237"><span data-dcnode-id="2238" instrument_node="">03-02-2022</span></time><span data-dcnode-id="2236" instrument_node=""> | </span><span class="entry-comments-link" data-dcnode-id="2233"><a data-dcnode-id="2234" data-disqus-identifier="389042 https://www.embibe.com/exams/?p=389042" href="#disqus_thread"><span data-dcnode-id="2235" instrument_node="">0 Comments</span></a></span></p></header><h1 class="entry-title" data-dcnode-id="2229"><span data-dcnode-id="2230" instrument_node="">Mechanism of Breathing- Definition, Muscles and Mechanism Involved</span></h1><span data-dcnode-id="2228" instrument_node="">
</span><div class="entry-content" data-dcnode-id="1103"><span data-dcnode-id="2227" instrument_node="">
</span><p data-dcnode-id="2222"><span data-dcnode-id="2226" instrument_node="">Have you ever wondered how an organism breathes? What is the mechanism involved in this process? Breathing is one of the most important characteristics of all living organisms. It is one of the essential functions that begins from the time of birth of the organism. We inhale oxygen and exhale carbon dioxide in the air; this process is called breathing. Though breathing involves the movement of gases in and out the body, it could be performed in different ways in different organisms based on organs involved, habitat, species, etc. In this article, we will learn what breathing is, what are the different muscles involved in this process and what is the exact </span><strong data-dcnode-id="2224"><span data-dcnode-id="2225" instrument_node="">Mechanism of Breathing</span></strong><span data-dcnode-id="2223" instrument_node="">.</span></p><span data-dcnode-id="2221" instrument_node="">
</span><figure class="wp-block-image size-large" data-dcnode-id="2216"><a data-dcnode-id="2217" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//embibe-student-web.app.link/e/xSCYZBMv9kb" rel="noopener" target="_blank"><img alt="Learn, Practice &amp; Test on India's Largest Education Platform - Embibe" class="entered error" data-dcnode-id="2220" data-lazy-src="https://www.embibe.com/exams/wp-content/uploads/2021/11/Generic_Banner_Option_02.png" data-ll-status="error" onclick="trackcall(this)" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.embibe.com/exams/wp-content/uploads/2021/11/Generic_Banner_Option_02.png&amp;raw"><noscript data-dcnode-id="2218"><span data-dcnode-id="2219" instrument_node="">&lt;img onclick="trackcall(this)" src="https://www.embibe.com/exams/wp-content/uploads/2021/11/Generic_Banner_Option_02.png" alt="Learn, Practice &amp;amp; Test on India's Largest Education Platform - Embibe"/&gt;</span></noscript></a></figure><span data-dcnode-id="2215" instrument_node="">

</span><nav data-dcnode-id="2178" style=""><ul class="ez-toc-list ez-toc-list-level-1" data-dcnode-id="2179"><li class="ez-toc-page-1 ez-toc-heading-level-2" data-dcnode-id="2180"><a class="ez-toc-link ez-toc-heading-1" data-dcnode-id="2203" href="#What_is_Breathing" title="What is Breathing?"><span data-dcnode-id="2204" instrument_node="">What is Breathing?</span></a><ul class="ez-toc-list-level-3" data-dcnode-id="2181"><li class="ez-toc-heading-level-3" data-dcnode-id="2200"><a class="ez-toc-link ez-toc-heading-2" data-dcnode-id="2201" href="#Differences_Between_the_Respiration_and_Breathing" title="Differences Between the Respiration and Breathing"><span data-dcnode-id="2202" instrument_node="">Differences Between the Respiration and Breathing</span></a></li><li class="ez-toc-page-1 ez-toc-heading-level-3" data-dcnode-id="2197"><a class="ez-toc-link ez-toc-heading-3" data-dcnode-id="2198" href="#Muscles_Involved_in_the_Breathing" title="Muscles Involved in the Breathing"><span data-dcnode-id="2199" instrument_node="">Muscles Involved in the Breathing</span></a></li><li class="ez-toc-page-1 ez-toc-heading-level-3" data-dcnode-id="2194"><a class="ez-toc-link ez-toc-heading-4" data-dcnode-id="2195" href="#Mechanism_of_Breathing" title="Mechanism of Breathing"><span data-dcnode-id="2196" instrument_node="">Mechanism of Breathing</span></a></li><li class="ez-toc-page-1 ez-toc-heading-level-3" data-dcnode-id="2191"><a class="ez-toc-link ez-toc-heading-5" data-dcnode-id="2192" href="#Inspiration" title="Inspiration"><span data-dcnode-id="2193" instrument_node="">Inspiration</span></a></li><li class="ez-toc-page-1 ez-toc-heading-level-3" data-dcnode-id="2188"><a class="ez-toc-link ez-toc-heading-6" data-dcnode-id="2189" href="#Expiration" title="Expiration"><span data-dcnode-id="2190" instrument_node="">Expiration</span></a></li><li class="ez-toc-page-1 ez-toc-heading-level-3" data-dcnode-id="2185"><a class="ez-toc-link ez-toc-heading-7" data-dcnode-id="2186" href="#Summary" title="Summary"><span data-dcnode-id="2187" instrument_node="">Summary</span></a></li><li class="ez-toc-page-1 ez-toc-heading-level-3" data-dcnode-id="2182"><a class="ez-toc-link ez-toc-heading-8" data-dcnode-id="2183" href="#Frequently_Asked_Questions_FAQs_on_Mechanism_of_Breathing" title="Frequently Asked Questions (FAQs) on Mechanism of Breathing"><span data-dcnode-id="2184" instrument_node="">Frequently Asked Questions (FAQs) on Mechanism of Breathing</span></a></li></ul></li></ul></nav></div><span data-dcnode-id="2176" instrument_node="">
</span><h2 data-dcnode-id="2172"><span class="ez-toc-section" data-dcnode-id="2175" id="What_is_Breathing"></span><span data-dcnode-id="2174" instrument_node="">What is Breathing?</span><span class="ez-toc-section-end" data-dcnode-id="2173"></span></h2><span data-dcnode-id="2171" instrument_node="">
</span><p data-dcnode-id="2139"><span data-dcnode-id="2170" instrument_node="">The simple definition of breathing is the process of </span><strong data-dcnode-id="2168"><span data-dcnode-id="2169" instrument_node="">inhalation </span></strong><span data-dcnode-id="2167" instrument_node="">of air (oxygen) from the nose or mouth into the lungs due to </span><strong data-dcnode-id="2165"><span data-dcnode-id="2166" instrument_node="">muscle contraction,</span></strong><span data-dcnode-id="2164" instrument_node=""> and </span><strong data-dcnode-id="2162"><span data-dcnode-id="2163" instrument_node="">exhaling </span></strong><span data-dcnode-id="2161" instrument_node="">it out due to </span><strong data-dcnode-id="2159"><span data-dcnode-id="2160" instrument_node="">muscle relaxation</span></strong><span data-dcnode-id="2158" instrument_node=""> is known as </span><strong data-dcnode-id="2156"><span data-dcnode-id="2157" instrument_node="">breathing</span></strong><span data-dcnode-id="2155" instrument_node="">. Breathing is also known as </span><strong data-dcnode-id="2153"><span data-dcnode-id="2154" instrument_node="">pulmonary ventilation</span></strong><span data-dcnode-id="2152" instrument_node=""> since pulmonary muscles are involved in the process. Pulmonary ventilation comprises two phases, </span><strong data-dcnode-id="2150"><span data-dcnode-id="2151" instrument_node="">inspiration </span></strong><span data-dcnode-id="2149" instrument_node="">also known as </span><strong data-dcnode-id="2147"><span data-dcnode-id="2148" instrument_node="">inhalation </span></strong><span data-dcnode-id="2146" instrument_node="">and </span><strong data-dcnode-id="2144"><span data-dcnode-id="2145" instrument_node="">expiration, </span></strong><span data-dcnode-id="2143" instrument_node="">also known as </span><strong data-dcnode-id="2141"><span data-dcnode-id="2142" instrument_node="">exhalation</span></strong><span data-dcnode-id="2140" instrument_node="">.</span></p><span data-dcnode-id="2138" instrument_node="">
</span><p data-dcnode-id="2134" style="text-align:center"><b data-dcnode-id="2135"><a class="btn-red cta_1" data-dcnode-id="2136" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//embibe-student-web.app.link/e/otUYJpFfelb" rel="noopener noreferrer" target="_blank"><span data-dcnode-id="2137" instrument_node="">Learn Exam Concepts on Embibe</span></a></b></p><span data-dcnode-id="2133" instrument_node="">
</span><p data-dcnode-id="2122"><span data-dcnode-id="2132" instrument_node="">Animals breathe in oxygen released by plants at the end of the photosynthesis process and release carbon dioxide which is used by plants. How do you think all the organisms breathe? Different organisms have different methods of breathing. Plants breathe through the small pores present in their leaves known as </span><strong data-dcnode-id="2130"><span data-dcnode-id="2131" instrument_node="">stomata</span></strong><span data-dcnode-id="2129" instrument_node=""> which are guarded by guard cells whereas animals breathe through their nose or sometimes mouth. Not all animals breathe through their noses, there are few exceptions. Certain animals like amphibians or reptiles respire from their </span><strong data-dcnode-id="2127"><span data-dcnode-id="2128" instrument_node="">skin</span></strong><span data-dcnode-id="2126" instrument_node="">. Fishes have a specialized organ known as </span><strong data-dcnode-id="2124"><span data-dcnode-id="2125" instrument_node="">gills</span></strong><span data-dcnode-id="2123" instrument_node=""> that perform the function of respiration. Now let us study the mechanism of breathing in animals, particularly mammals.</span></p><span data-dcnode-id="2121" instrument_node="">
</span><div class="wp-block-image" data-dcnode-id="2116"><figure class="aligncenter size-large" data-dcnode-id="2117"><img alt="Process of Breathing" class="wp-image-392388 entered lazyloaded" data-dcnode-id="2120" data-lazy-src="https://d2cyt36b7wnvt9.cloudfront.net/exams/wp-content/uploads/2021/07/13202623/image463.png" data-ll-status="loaded" height="490" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//d2cyt36b7wnvt9.cloudfront.net/exams/wp-content/uploads/2021/07/13202623/image463.png&amp;raw" width="653"><noscript data-dcnode-id="2118"><span data-dcnode-id="2119" instrument_node="">&lt;img width="653" height="490" src="https://d2cyt36b7wnvt9.cloudfront.net/exams/wp-content/uploads/2021/07/13202623/image463.png" alt="Process of Breathing" class="wp-image-392388"/&gt;</span></noscript></figure></div><span data-dcnode-id="2115" instrument_node="">
</span><p class="has-text-align-center" data-dcnode-id="2113"><span data-dcnode-id="2114" instrument_node="">Fig: Process of Breathing</span></p><span data-dcnode-id="2112" instrument_node="">
</span><p class="has-text-align-center" data-dcnode-id="2108"><a data-dcnode-id="2109" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.embibe.com/study/breathing-concept%3Futm_source%3DExams%26utm_medium%3Dinternal%26utm_campaign%3DExams_to_PTL" rel="noreferrer noopener" target="_blank"><strong data-dcnode-id="2110"><span data-dcnode-id="2111" instrument_node="">Study The Concept Of Breathing Here  </span></strong></a></p><span data-dcnode-id="2107" instrument_node="">
</span><h3 data-dcnode-id="2103"><span class="ez-toc-section" data-dcnode-id="2106" id="Differences_Between_the_Respiration_and_Breathing"></span><span data-dcnode-id="2105" instrument_node="">Differences Between the Respiration and Breathing</span><span class="ez-toc-section-end" data-dcnode-id="2104"></span></h3><span data-dcnode-id="2102" instrument_node="">
</span><p data-dcnode-id="2100"><span data-dcnode-id="2101" instrument_node="">Respiration and breathing are two processes that are often confused with being the same, but which is not at all the truth. Cellular respiration and breathing are two completely different processes with significant differences between them. These differences are mentioned in brief for a better understanding.</span></p><span data-dcnode-id="2099" instrument_node="">
</span><figure class="wp-block-table" data-dcnode-id="2030"><table data-dcnode-id="2031"><tbody data-dcnode-id="2032"><tr data-dcnode-id="2089"><td data-dcnode-id="2096"><strong data-dcnode-id="2097"><span data-dcnode-id="2098" instrument_node="">Characteristic</span></strong></td><td data-dcnode-id="2093"><strong data-dcnode-id="2094"><span data-dcnode-id="2095" instrument_node="">Breathing</span></strong></td><td data-dcnode-id="2090"><strong data-dcnode-id="2091"><span data-dcnode-id="2092" instrument_node="">Respiration</span></strong></td></tr><tr data-dcnode-id="2081"><td data-dcnode-id="2086"><strong data-dcnode-id="2087"><span data-dcnode-id="2088" instrument_node="">Definition</span></strong></td><td data-dcnode-id="2084"><span data-dcnode-id="2085" instrument_node="">Breathing is the process of inhaling oxygen and exhaling carbon dioxide.</span></td><td data-dcnode-id="2082"><span data-dcnode-id="2083" instrument_node="">Respiration is the process of breaking down glucose to produce energy, which is used by cells to carry out cellular functions.</span></td></tr><tr data-dcnode-id="2073"><td data-dcnode-id="2078"><strong data-dcnode-id="2079"><span data-dcnode-id="2080" instrument_node="">Location</span></strong></td><td data-dcnode-id="2076"><span data-dcnode-id="2077" instrument_node="">Breathing takes place in the lungs. It also involves other organs like the nose, mouth and pharynx.</span></td><td data-dcnode-id="2074"><span data-dcnode-id="2075" instrument_node="">Respiration takes place in the cells of the body. &nbsp;</span></td></tr><tr data-dcnode-id="2065"><td data-dcnode-id="2070"><strong data-dcnode-id="2071"><span data-dcnode-id="2072" instrument_node="">Type</span></strong></td><td data-dcnode-id="2068"><span data-dcnode-id="2069" instrument_node="">Breathing is voluntary as well as an involuntary physical process.</span></td><td data-dcnode-id="2066"><span data-dcnode-id="2067" instrument_node="">Respiration is an involuntary process. Unlike breathing, it is a chemical process.</span></td></tr><tr data-dcnode-id="2057"><td data-dcnode-id="2062"><strong data-dcnode-id="2063"><span data-dcnode-id="2064" instrument_node="">Energy production</span></strong></td><td data-dcnode-id="2060"><span data-dcnode-id="2061" instrument_node="">Breathing does not involve the production of energy.</span></td><td data-dcnode-id="2058"><span data-dcnode-id="2059" instrument_node="">Energy is produced and released in the form of ATP during respiration.</span></td></tr><tr data-dcnode-id="2049"><td data-dcnode-id="2054"><strong data-dcnode-id="2055"><span data-dcnode-id="2056" instrument_node="">Cellular activity</span></strong></td><td data-dcnode-id="2052"><span data-dcnode-id="2053" instrument_node="">It is known as the extracellular process as it occurs outside the cell. It takes place in between the organism and the external environment.</span></td><td data-dcnode-id="2050"><span data-dcnode-id="2051" instrument_node="">It is known as the intracellular process as it takes place within the cells. &nbsp;</span></td></tr><tr data-dcnode-id="2041"><td data-dcnode-id="2046"><strong data-dcnode-id="2047"><span data-dcnode-id="2048" instrument_node="">Enzymes</span></strong></td><td data-dcnode-id="2044"><span data-dcnode-id="2045" instrument_node="">There are no enzymes involved in this physical process.</span></td><td data-dcnode-id="2042"><span data-dcnode-id="2043" instrument_node="">Many enzymes like oxidase, hexokinase, etc., are involved in this chemical process.</span></td></tr><tr data-dcnode-id="2033"><td data-dcnode-id="2038"><strong data-dcnode-id="2039"><span data-dcnode-id="2040" instrument_node="">Organs</span></strong></td><td data-dcnode-id="2036"><span data-dcnode-id="2037" instrument_node="">Organs of the respiratory system, like the nose, lungs, etc., are involved in this process.</span></td><td data-dcnode-id="2034"><span data-dcnode-id="2035" instrument_node="">Cell organelle like mitochondria is involved in this process.</span></td></tr></tbody></table></figure><span data-dcnode-id="2029" instrument_node="">
</span><h3 data-dcnode-id="2025"><span class="ez-toc-section" data-dcnode-id="2028" id="Muscles_Involved_in_the_Breathing"></span><span data-dcnode-id="2027" instrument_node="">Muscles Involved in the Breathing</span><span class="ez-toc-section-end" data-dcnode-id="2026"></span></h3><span data-dcnode-id="2024" instrument_node="">
</span><p data-dcnode-id="1994"><span data-dcnode-id="2023" instrument_node="">The muscles that perform the function of respiration are known as</span><strong data-dcnode-id="2021"><span data-dcnode-id="2022" instrument_node=""> breathing pump muscles</span></strong><span data-dcnode-id="2020" instrument_node="">.</span><br data-dcnode-id="2019"><span data-dcnode-id="2018" instrument_node="">The inherent potential that causes breathing action is caused by all the muscles that are attached to the </span><strong data-dcnode-id="2016"><span data-dcnode-id="2017" instrument_node="">rib cage</span></strong><span data-dcnode-id="2015" instrument_node="">.</span><br data-dcnode-id="2014"><span data-dcnode-id="2013" instrument_node="">The muscles that perform the function of expanding the thoracic cavity are called </span><strong data-dcnode-id="2011"><span data-dcnode-id="2012" instrument_node="">inspiratory muscles </span></strong><span data-dcnode-id="2010" instrument_node="">as they help in </span><strong data-dcnode-id="2008"><span data-dcnode-id="2009" instrument_node="">inhalation</span></strong><span data-dcnode-id="2007" instrument_node="">, whereas the muscles that help to contract or compress the thoracic cavity are called </span><strong data-dcnode-id="2005"><span data-dcnode-id="2006" instrument_node="">expiratory muscles </span></strong><span data-dcnode-id="2004" instrument_node="">as they induce </span><strong data-dcnode-id="2002"><span data-dcnode-id="2003" instrument_node="">exhalation</span></strong><span data-dcnode-id="2001" instrument_node="">. The speciality of these muscles is that they are made up of </span><strong data-dcnode-id="1999"><span data-dcnode-id="2000" instrument_node="">fatigue-resistant muscle fibres</span></strong><span data-dcnode-id="1998" instrument_node="">. The muscles involved in inspiration elevate the ribs and sternum, and the muscles involved in expiration depress the ribs and sternum. Certain </span><strong data-dcnode-id="1996"><span data-dcnode-id="1997" instrument_node="">accessory muscles</span></strong><span data-dcnode-id="1995" instrument_node=""> are recruited during exercise due to increased metabolic activity and also during the dysfunction in the respiratory system. There are mainly three groups of muscles involved in respiration.</span></p><span data-dcnode-id="1993" instrument_node="">
</span><figure class="wp-block-image size-large" data-dcnode-id="1988"><a data-dcnode-id="1989" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//embibe-student-web.app.link/e/xSCYZBMv9kb" rel="noopener" target="_blank"><img alt="Learn, Practice &amp; Test on India's Largest Education Platform - Embibe" class="entered lazyloaded" data-dcnode-id="1992" data-lazy-src="https://www.embibe.com/exams/wp-content/uploads/2021/11/Generic_Banner_Option_01.png" data-ll-status="loaded" onclick="trackcall(this)" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.embibe.com/exams/wp-content/uploads/2021/11/Generic_Banner_Option_01.png&amp;raw"><noscript data-dcnode-id="1990"><span data-dcnode-id="1991" instrument_node="">&lt;img onclick="trackcall(this)" src="https://www.embibe.com/exams/wp-content/uploads/2021/11/Generic_Banner_Option_01.png" alt="Learn, Practice &amp;amp; Test on India's Largest Education Platform - Embibe"/&gt;</span></noscript></a></figure><span data-dcnode-id="1987" instrument_node="">
</span><ol data-dcnode-id="1980" type="1"><li data-dcnode-id="1985"><span data-dcnode-id="1986" instrument_node="">Diaphragm</span></li><li data-dcnode-id="1983"><span data-dcnode-id="1984" instrument_node="">Intercostal muscles (Ribcage muscles)</span></li><li data-dcnode-id="1981"><span data-dcnode-id="1982" instrument_node="">Abdominal muscles</span></li></ol><span data-dcnode-id="1979" instrument_node="">
</span><div class="wp-block-image" data-dcnode-id="1974"><figure class="aligncenter size-large" data-dcnode-id="1975"><img alt="Muscles Involved in the Breathing" class="wp-image-389187 entered error" data-dcnode-id="1978" data-lazy-src="https://d2cyt36b7wnvt9.cloudfront.net/exams/wp-content/uploads/2021/07/09210534/image317.png" data-ll-status="error" height="291" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//d2cyt36b7wnvt9.cloudfront.net/exams/wp-content/uploads/2021/07/09210534/image317.png&amp;raw" width="416"><noscript data-dcnode-id="1976"><span data-dcnode-id="1977" instrument_node="">&lt;img width="416" height="291" src="https://d2cyt36b7wnvt9.cloudfront.net/exams/wp-content/uploads/2021/07/09210534/image317.png" alt="Muscles Involved in the Breathing" class="wp-image-389187"/&gt;</span></noscript></figure></div><span data-dcnode-id="1973" instrument_node="">
</span><p class="has-text-align-center" data-dcnode-id="1971"><span data-dcnode-id="1972" instrument_node="">Fig: Muscles Involved in the Breathing</span></p><span data-dcnode-id="1970" instrument_node="">
</span><p data-dcnode-id="1966"><strong data-dcnode-id="1968"><span data-dcnode-id="1969" instrument_node="">Diaphragm: </span></strong><span data-dcnode-id="1967" instrument_node="">It is a thin internal double doomed sheet of skeletal or striated muscle that is located in the inferior most aspect of the rib cage and separates the abdomen from the thoracic region. It is a special parachute-shaped fibrous muscle. It expands and contracts rhythmically during respiration. It flattens and contracts during inspiration which creates a vacuum effect that pulls air into the lungs. During expiration, the diaphragm relaxes, and the air is pushed out of the lungs.</span></p><span data-dcnode-id="1965" instrument_node="">
</span><p data-dcnode-id="1961" style="text-align:center"><b data-dcnode-id="1962"><a class="btn-red cta_2" data-dcnode-id="1963" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//embibe-student-web.app.link/e/UtXJQjMielb" rel="noopener noreferrer" target="_blank"><span data-dcnode-id="1964" instrument_node="">Practice Exam Questions</span></a></b></p><span data-dcnode-id="1960" instrument_node="">
</span><p data-dcnode-id="1956"><strong data-dcnode-id="1958"><span data-dcnode-id="1959" instrument_node="">Intercostal muscles: </span></strong><span data-dcnode-id="1957" instrument_node="">The intercostal muscles lie in between the ribs in the chest cavity. They help in expanding and shrinking or compressing the chest cavity while breathing. There are two kinds of intercostals that help in respiration, internal intercostals and external intercostals. The external intercostal is the one that helps in breathing. Some fibres are angled obliquely from downward to the upward layer of ribs that help in contracting and relaxing the rib cage while breathing. On the other hand, internal intercostal muscles are angled obliquely downward and backward from ribs to ribs, thereby helping it during exhalation. </span></p><span data-dcnode-id="1955" instrument_node="">
</span><p data-dcnode-id="1951"><strong data-dcnode-id="1953"><span data-dcnode-id="1954" instrument_node="">Abdominal muscles: </span></strong><span data-dcnode-id="1952" instrument_node="">These are the accessory muscles that help to raise the diaphragm during inspiration and give power to the diaphragm to inhale air, and also helps to relax the diaphragm during exhalation. Once the air inhaled crosses the diaphragm bearing limits and the pleural pressure is more than the atmospheric pressure, the abdominal muscles facilitate the diaphragm for easy exhalation of air.</span></p><span data-dcnode-id="1950" instrument_node="">
</span><h3 data-dcnode-id="1946"><span class="ez-toc-section" data-dcnode-id="1949" id="Mechanism_of_Breathing"></span><span data-dcnode-id="1948" instrument_node="">Mechanism of Breathing</span><span class="ez-toc-section-end" data-dcnode-id="1947"></span></h3><span data-dcnode-id="1945" instrument_node="">
</span><p data-dcnode-id="1943"><span data-dcnode-id="1944" instrument_node="">The space between the outer surface of the lungs and the inner thoracic wall is called the pleural space. It is usually packed with pleural fluid, which forms a seal to hold the lungs against the thoracic wall by the force of surface tension. This seal assures that when the thoracic cavity enlarges or decreases, the lungs undergo expansion or reduction in size accordingly.</span></p><span data-dcnode-id="1942" instrument_node="">
</span><p data-dcnode-id="1940"><span data-dcnode-id="1941" instrument_node="">During breathing, the contraction and relaxation of muscles lead to a change in the volume of the thoracic cavity. As the thoracic cavity and lungs move together, the change in the volume of the lungs changes the pressure inside the lungs. The major mechanisms that drive pulmonary ventilation are the three types of pressures.</span></p><span data-dcnode-id="1939" instrument_node="">
</span><ol data-dcnode-id="1725" type="1"><li data-dcnode-id="1867"><strong data-dcnode-id="1869"><span data-dcnode-id="1938" instrument_node="">Atmospheric pressure </span><span class="MathJax_Preview" data-dcnode-id="1937" style="color: inherit;"></span><span class="MathJax" data-dcnode-id="1873" data-mathml="<math xmlns=&quot;http://www.w3.org/1998/Math/MathML&quot;><mrow><mo>(</mo><mrow class=&quot;MJX-TeXAtom-ORD&quot;><mrow class=&quot;MJX-TeXAtom-ORD&quot;><msub><mrow class=&quot;MJX-TeXAtom-ORD&quot;><mrow class=&quot;MJX-TeXAtom-ORD&quot;><mi mathvariant=&quot;normal&quot;>P</mi></mrow></mrow><mrow class=&quot;MJX-TeXAtom-ORD&quot;><mrow class=&quot;MJX-TeXAtom-ORD&quot;><mrow class=&quot;MJX-TeXAtom-ORD&quot;><mi mathvariant=&quot;normal&quot;>a</mi><mi mathvariant=&quot;normal&quot;>t</mi><mi mathvariant=&quot;normal&quot;>m</mi></mrow></mrow></mrow></msub></mrow></mrow><mo>)</mo></mrow></math>" id="MathJax-Element-1-Frame" role="presentation" style="position: relative;" tabindex="0"><nobr aria-hidden="true" data-dcnode-id="1897"><span class="math" data-dcnode-id="1898" id="MathJax-Span-1" style="width: 3.076em; display: inline-block;"><span data-dcnode-id="1900" style="display: inline-block; position: relative; width: 2.552em; height: 0px; font-size: 120%;"><span data-dcnode-id="1901" style="position: absolute; clip: rect(2.344em, 1002.46em, 3.628em, -1000em); top: -3.229em; left: 0em;"><span class="mrow" data-dcnode-id="1903" id="MathJax-Span-2"><span class="mrow" data-dcnode-id="1904" id="MathJax-Span-3"><span class="mo" data-dcnode-id="1935" id="MathJax-Span-4"><img data-dcnode-id="1936" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//cdnjs.cloudflare.com/ajax/libs/mathjax/2.7.5/fonts/HTML-CSS/TeX/png/Main/Regular/400/0028.png%3FV%3D2.7.5&amp;raw" style="width: 6px; height: 19px; vertical-align: -5px; margin-right: 0.054em;"></span><span class="texatom" data-dcnode-id="1907" id="MathJax-Span-5"><span class="mrow" data-dcnode id="1765" id="MathJax-Span-54"><span class="texatom" data-dcnode-id="1766" id="MathJax-Span-55"><span class="mrow" data-dcnode-id="1767" id="MathJax-Span-56"><span class="msubsup" data-dcnode-id="1768" id="MathJax-Span-57"><span data-dcnode-id="1769" style="display: inline-block; position: relative; width: 1.316em; height: 0px;"><span data-dcnode-id="1782" style="position: absolute; clip: rect(3.19em, 1000.61em, 4.167em, -1000em); top: -4.01em; left: 0em;"><span class="texatom" data-dcnode-id="1784" id="MathJax-Span-58"><span class="mrow" data-dcnode-id="1785" id="MathJax-Span-59"><span class="texatom" data-dcnode-id="1786" id="MathJax-Span-60"><span class="mrow" data-dcnode-id="1787" id="MathJax-Span-61"><span class="mi" data-dcnode-id="1788" id="MathJax-Span-62"><img data-dcnode-id="1789" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//cdnjs.cloudflare.com/ajax/libs/mathjax/2.7.5/fonts/HTML-CSS/TeX/png/Main/Regular/400/0050.png%3FV%3D2.7.5&amp;raw" style="width: 12px; height: 13px; margin-right: 0.055em;"></span></span></span></span></span><span data-dcnode-id="1783" style="display: inline-block; width: 0px; height: 4.01em;"></span></span><span data-dcnode-id="1770" style="position: absolute; top: -3.86em; left: 0.662em;"><span class="texatom" data-dcnode-id="1772" id="MathJax-Span-63"><span class="mrow" data-dcnode-id="1773" id="MathJax-Span-64"><span class="texatom" data-dcnode-id="1774" id="MathJax-Span-65"><span class="mrow" data-dcnode-id="1775" id="MathJax-Span-66"><span class="texatom" data-dcnode-id="1776" id="MathJax-Span-67"><span class="mrow" data-dcnode-id="1777" id="MathJax-Span-68"><span class="mi" data-dcnode-id="1780" id="MathJax-Span-69" style="font-size: 70.7%;"><img data-dcnode-id="1781" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//cdnjs.cloudflare.com/ajax/libs/mathjax/2.7.5/fonts/HTML-CSS/TeX/png/Main/Regular/283/0069.png%3FV%3D2.7.5&amp;raw" style="width: 3px; height: 9px; margin-right: 0.023em;"></span><span class="mi" data-dcnode-id="1778" id="MathJax-Span-70" style="font-size: 70.7%;"><img data-dcnode-id="1779" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//cdnjs.cloudflare.com/ajax/libs/mathjax/2.7.5/fonts/HTML-CSS/TeX/png/Main/Regular/283/0070.png%3FV%3D2.7.5&amp;raw" style="width: 7px; height: 8px; vertical-align: -3px; margin-right: 0.033em;"></span></span></span></span></span></span></span><span data-dcnode-id="1771" style="display: inline-block; width: 0px; height: 4.01em;"></span></span></span></span></span></span></span></span><span class="mo" data-dcnode-id="1761" id="MathJax-Span-71" style="position: relative; top: -0.007em;"><span data-dcnode-id="1762"><img data-dcnode-id="1763" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//cdnjs.cloudflare.com/ajax/libs/mathjax/2.7.5/fonts/HTML-CSS/TeX/png/Main/Regular/400/0029.png%3FV%3D2.7.5&amp;raw" style="width: 6px; height: 19px; vertical-align: -5px; margin-right: 0.092em;"></span></span></span></span><span data-dcnode-id="1758" style="display: inline-block; width: 0px; height: 3.229em;"></span></span></span><span data-dcnode-id="1755" style="display: inline-block; overflow: hidden; vertical-align: -0.404em; border-left: 0px solid; width: 0px; height: 1.35em;"></span></span></nobr><span class="MJX_Assistive_MathML" data-dcnode-id="1732" role="presentation"><math data-dcnode-id="1733" xmlns="http://www.w3.org/1998/Math/MathML"><mrow data-dcnode-id="1734"><mo data-dcnode-id="1751"><span data-dcnode-id="1752" instrument_node="">(</span></mo><mrow class="MJX-TeXAtom-ORD" data-dcnode-id="1737"><mrow class="MJX-TeXAtom-ORD" data-dcnode-id="1738"><msub data-dcnode-id="1739"><mrow class="MJX-TeXAtom-ORD" data-dcnode-id="1747"><mrow class="MJX-TeXAtom-ORD" data-dcnode-id="1748"><mi data-dcnode-id="1749" mathvariant="normal"><span data-dcnode-id="1750" instrument_node="">P</span></mi></mrow></mrow><mrow class="MJX-TeXAtom-ORD" data-dcnode-id="1740"><mrow class="MJX-TeXAtom-ORD" data-dcnode-id="1741"><mrow class="MJX-TeXAtom-ORD" data-dcnode-id="1742"><mi data-dcnode-id="1745" mathvariant="normal"><span data-dcnode-id="1746" instrument_node="">i</span></mi><mi data-dcnode-id="1743" mathvariant="normal"><span data-dcnode-id="1744" instrument_node="">p</span></mi></mrow></mrow></mrow></msub></mrow></mrow><mo data-dcnode-id="1735"><span data-dcnode-id="1736" instrument_node="">)</span></mo></mrow></math></span></span></strong><span data-dcnode-id="1727" instrument_node=""> is the pressure within the pleural cavities.</span></li></ol><span data-dcnode-id="1724" instrument_node="">
</span><p data-dcnode-id="1714"><span data-dcnode-id="1723" instrument_node="">The mechanism of breathing follows Boyle’s law states that the volume of gas is inversely proportional to pressure (at constant temperature). Hence,</span><br data-dcnode-id="1722"><strong data-dcnode-id="1720"><span data-dcnode-id="1721" instrument_node="">When the volume of the thoracic cavity raises</span></strong><span data-dcnode-id="1719" instrument_node="">: The volume of the lungs increases, and the pressure within the lungs decreases. </span><br data-dcnode-id="1718"><strong data-dcnode-id="1716"><span data-dcnode-id="1717" instrument_node="">When the volume of the thoracic cavity falls</span></strong><span data-dcnode-id="1715" instrument_node="">: The volume of the lungs decreases, and the pressure within the lungs increases.</span></p><span data-dcnode-id="1713" instrument_node="">
</span><div class="wp-block-image" data-dcnode-id="1708"><figure class="aligncenter size-large is-resized" data-dcnode-id="1709"><img alt="Simple Diagram to Show Breathing Process" class="wp-image-392386" data-dcnode-id="1712" data-lazy-src="https://d2cyt36b7wnvt9.cloudfront.net/exams/wp-content/uploads/2021/07/13202546/image-92.png" height="381" src="data:image/svg+xml,%3Csvg%20xmlns='http://www.w3.org/2000/svg'%20viewBox='0%200%20628%20381'%3E%3C/svg%3E" width="628"><noscript data-dcnode-id="1710"><span data-dcnode-id="1711" instrument_node="">&lt;img src="https://d2cyt36b7wnvt9.cloudfront.net/exams/wp-content/uploads/2021/07/13202546/image-92.png" alt="Simple Diagram to Show Breathing Process" class="wp-image-392386" width="628" height="381"/&gt;</span></noscript></figure></div><span data-dcnode-id="1707" instrument_node="">
</span><p class="has-text-align-center" data-dcnode-id="1705"><span data-dcnode-id="1706" instrument_node="">Fig: Simple Diagram to Show Breathing Process</span></p><span data-dcnode-id="1704" instrument_node="">
</span><p data-dcnode-id="1702"><span data-dcnode-id="1703" instrument_node="">The intra-alveolar pressure is always equal to the atmospheric pressure since it is connected to the atmosphere via tubings of the airways, whereas inter pleural pressures are always lower due to certain characteristics of the lungs. The pressure difference drives the pulmonary ventilation as the air flows down the pressure gradient (the air flows from the region of higher pressure to the region of lower pressure). Air moves into the lungs based on this principle.</span></p><span data-dcnode-id="1701" instrument_node="">
</span><figure class="wp-block-image size-large" data-dcnode-id="1696"><a data-dcnode-id="1697" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//embibe-student-web.app.link/e/svSyK3XLclb" rel="noopener" target="_blank"><img alt="Learn, Practice &amp; Test on India's Largest Education Platform - Embibe" data-dcnode-id="1700" data-lazy-src="https://www.embibe.com/exams/wp-content/uploads/2021/11/Generic_Banner_Option_02.png" onclick="trackcall(this)" src="data:image/svg+xml,%3Csvg%20xmlns='http://www.w3.org/2000/svg'%20viewBox='0%200%200%200'%3E%3C/svg%3E"><noscript data-dcnode-id="1698"><span data-dcnode-id="1699" instrument_node="">&lt;img onclick="trackcall(this)" src="https://www.embibe.com/exams/wp-content/uploads/2021/11/Generic_Banner_Option_02.png" alt="Learn, Practice &amp;amp; Test on India's Largest Education Platform - Embibe"/&gt;</span></noscript></a></figure><span data-dcnode-id="1695" instrument_node="">
</span><p data-dcnode-id="1682"><span data-dcnode-id="1694" instrument_node="">The atmospheric pressure is higher than the intra-alveolar pressure, which is higher than the intrapleural pressure. The same principle is followed during expiration; that is, the pressure in the intrapleural cavity is greater than the intra-alveolar cavity, which is greater than the atmospheric pressure.</span><br data-dcnode-id="1693"><span data-dcnode-id="1692" instrument_node="">Breathing involves two major steps: </span><strong data-dcnode-id="1690"><span data-dcnode-id="1691" instrument_node="">Inspiration </span></strong><span data-dcnode-id="1689" instrument_node="">(the process that allows air into the lungs) and </span><strong data-dcnode-id="1687"><span data-dcnode-id="1688" instrument_node="">Expiration </span></strong><span data-dcnode-id="1686" instrument_node="">(the process that allows air to leave the lungs). One sequence of inspiration and expiration comprises a </span><strong data-dcnode-id="1684"><span data-dcnode-id="1685" instrument_node="">respiratory cycle</span></strong><span data-dcnode-id="1683" instrument_node="">. Let us learn these steps in more detail.</span></p><span data-dcnode-id="1681" instrument_node="">
</span><p data-dcnode-id="1677" style="text-align:center"><b data-dcnode-id="1678"><a class="btn-red cta_3" data-dcnode-id="1679" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//embibe-student-web.app.link/e/1zbj3owjelb" rel="noopener noreferrer" target="_blank"><span data-dcnode-id="1680" instrument_node="">Attempt Mock Tests</span></a></b></p><span data-dcnode-id="1676" instrument_node="">
</span><div class="wp-block-image" data-dcnode-id="1671"><figure class="aligncenter size-large" data-dcnode-id="1672"><img alt="Mechanism of Breathing" class="wp-image-389110" data-dcnode-id="1675" data-lazy-src="https://d2cyt36b7wnvt9.cloudfront.net/exams/wp-content/uploads/2021/07/09202500/image310.png" height="321" src="data:image/svg+xml,%3Csvg%20xmlns='http://www.w3.org/2000/svg'%20viewBox='0%200%20602%20321'%3E%3C/svg%3E" width="602"><noscript data-dcnode-id="1673"><span data-dcnode-id="1674" instrument_node="">&lt;img width="602" height="321" src="https://d2cyt36b7wnvt9.cloudfront.net/exams/wp-content/uploads/2021/07/09202500/image310.png" alt="Mechanism of Breathing" class="wp-image-389110"/&gt;</span></noscript></figure></div><span data-dcnode-id="1670" instrument_node="">
</span><p class="has-text-align-center" data-dcnode-id="1668"><span data-dcnode-id="1669" instrument_node="">Fig: Mechanism of Breathing</span></p><span data-dcnode-id="1667" instrument_node="">
</span><h3 data-dcnode-id="1663"><span class="ez-toc-section" data-dcnode-id="1666" id="Inspiration"></span><span data-dcnode-id="1665" instrument_node="">Inspiration</span><span class="ez-toc-section-end" data-dcnode-id="1664"></span></h3><span data-dcnode-id="1662" instrument_node="">
</span><p data-dcnode-id="1654"><span data-dcnode-id="1661" instrument_node="">Inspiration is the process through which air enters the nostrils and reaches the lungs. It occurs due to the increase in the lung volume due to the diaphragm contraction and chest wall expansion, which results in a decrease in lung pressure compared to the atmospheric pressure; thereby, air rushes into the airway. In general, two kinds of muscles are used during normal inspiration, </span><strong data-dcnode-id="1659"><span data-dcnode-id="1660" instrument_node="">diaphragm </span></strong><span data-dcnode-id="1658" instrument_node="">and </span><strong data-dcnode-id="1656"><span data-dcnode-id="1657" instrument_node="">external intercostal muscles</span></strong><span data-dcnode-id="1655" instrument_node="">. Certain accessory muscles are also used during a deep breath.</span></p><span data-dcnode-id="1653" instrument_node="">
</span><p data-dcnode-id="1643"><span data-dcnode-id="1652" instrument_node="">1. During the contraction of the diaphragm, the diaphragm moves inferiorly towards the abdominal cavity, creating a larger thoracic cavity and a larger space for the lungs.</span><br data-dcnode-id="1651"><span data-dcnode-id="1650" instrument_node="">2. Since the external intercostal muscles contract, the ribs move upwards and outwards, causing the expansion of the rib cage, thus, increasing the volume of the thoracic cavity.</span><br data-dcnode-id="1649"><span data-dcnode-id="1648" instrument_node="">3. The pleural cavity has pleural fluid in it, which has the adhesive force and also facilitates the expansion of the thoracic cavity. Thus, it forces the lungs to stretch and expand.</span><br data-dcnode-id="1647"><span data-dcnode-id="1646" instrument_node="">4. As there is an increase in the volume of the lungs, it leads to a decrease in the intra-alveolar pressure, which creates a pressure lower than the atmospheric pressure.</span><br data-dcnode-id="1645"><span data-dcnode-id="1644" instrument_node="">5. As a result, the pressure gradient is created, and hence the air is driven into the lungs.</span></p><span data-dcnode-id="1642" instrument_node="">
</span><div class="wp-block-image" data-dcnode-id="1637"><figure class="aligncenter size-large" data-dcnode-id="1638"><img alt="Simple Flowchart of Inhalation Process" class="wp-image-389113" data-dcnode-id="1641" data-lazy-src="https://d2cyt36b7wnvt9.cloudfront.net/exams/wp-content/uploads/2021/07/09202705/image311.png" height="412" src="data:image/svg+xml,%3Csvg%20xmlns='http://www.w3.org/2000/svg'%20viewBox='0%200%20442%20412'%3E%3C/svg%3E" width="442"><noscript data-dcnode-id="1639"><span data-dcnode-id="1640" instrument_node="">&lt;img width="442" height="412" src="https://d2cyt36b7wnvt9.cloudfront.net/exams/wp-content/uploads/2021/07/09202705/image311.png" alt="Simple Flowchart of Inhalation Process" class="wp-image-389113"/&gt;</span></noscript></figure></div><span data-dcnode-id="1636" instrument_node="">
</span><p class="has-text-align-center" data-dcnode-id="1634"><span data-dcnode-id="1635" instrument_node="">Fig: Simple Flowchart of Inhalation Process</span></p><span data-dcnode-id="1633" instrument_node="">
</span><h3 data-dcnode-id="1629"><span class="ez-toc-section" data-dcnode-id="1632" id="Expiration"></span><span data-dcnode-id="1631" instrument_node="">Expiration</span><span class="ez-toc-section-end" data-dcnode-id="1630"></span></h3><span data-dcnode-id="1628" instrument_node="">
</span><p data-dcnode-id="1618"><strong data-dcnode-id="1626"><span data-dcnode-id="1627" instrument_node="">Expiration</span></strong><span data-dcnode-id="1625" instrument_node=""> is the process through which the air present in the lungs is </span><strong data-dcnode-id="1623"><span data-dcnode-id="1624" instrument_node="">exhaled out</span></strong><span data-dcnode-id="1622" instrument_node="">. It occurs due to the decrease in the lung volume, which happens because of the elastic recoil of the lung tissue, which increases the lung pressure in comparison to the atmospheric pressure; thereby, air moves out of the airway. There is no muscle contraction during exhalation. Therefore, it is considered as a</span><strong data-dcnode-id="1620"><span data-dcnode-id="1621" instrument_node=""> passive process</span></strong><span data-dcnode-id="1619" instrument_node=""> which means that there is no utilization of energy for the outward movement of air from the lungs.</span></p><span data-dcnode-id="1617" instrument_node="">
</span><p data-dcnode-id="1611"><span data-dcnode-id="1616" instrument_node="">1. The elasticity of the lung tissue helps to recoil the lungs since the diaphragm and external intercostal muscles relax the following inspiration.</span><br data-dcnode-id="1615"><span data-dcnode-id="1614" instrument_node="">2. Followed by the decrease in the thoracic cavity and lung cavity, there is an increase in intrapulmonary pressure.</span><br data-dcnode-id="1613"><span data-dcnode-id="1612" instrument_node="">3. The increase in the intrapulmonary pressure increases the atmospheric pressure, which creates a pressure gradient, allowing the air to flow out of the lungs.</span></p><span data-dcnode-id="1610" instrument_node="">
</span><div class="wp-block-image" data-dcnode-id="1605"><figure class="aligncenter size-large" data-dcnode-id="1606"><img alt="Simple Flowchart of Exhalation Process" class="wp-image-389122" data-dcnode-id="1609" data-lazy-src="https://d2cyt36b7wnvt9.cloudfront.net/exams/wp-content/uploads/2021/07/09203626/image313.png" height="451" src="data:image/svg+xml,%3Csvg%20xmlns='http://www.w3.org/2000/svg'%20viewBox='0%200%20533%20451'%3E%3C/svg%3E" width="533"><noscript data-dcnode-id="1607"><span data-dcnode-id="1608" instrument_node="">&lt;img width="533" height="451" src="https://d2cyt36b7wnvt9.cloudfront.net/exams/wp-content/uploads/2021/07/09203626/image313.png" alt="Simple Flowchart of Exhalation Process" class="wp-image-389122"/&gt;</span></noscript></figure></div><span data-dcnode-id="1604" instrument_node="">
</span><p class="has-text-align-center" data-dcnode-id="1602"><span data-dcnode-id="1603" instrument_node="">Fig: Simple Flowchart of Exhalation Process</span></p><span data-dcnode-id="1601" instrument_node="">
</span><h4 data-dcnode-id="1599"><span data-dcnode-id="1600" instrument_node="">Respiratory Volumes and Capacities</span></h4><span data-dcnode-id="1598" instrument_node="">
</span><p data-dcnode-id="1585"><span data-dcnode-id="1597" instrument_node="">Air present in the lungs is measured in terms of lung volumes and lung capacities. </span><strong data-dcnode-id="1595"><span data-dcnode-id="1596" instrument_node="">Lung volumes</span></strong><span data-dcnode-id="1594" instrument_node=""> estimate the amount of air for a particular function, whereas </span><strong data-dcnode-id="1592"><span data-dcnode-id="1593" instrument_node="">lung capacities</span></strong><span data-dcnode-id="1591" instrument_node=""> are the sum of two or more volumes. Lung volumes are measured by a technique called </span><strong data-dcnode-id="1589"><span data-dcnode-id="1590" instrument_node="">spirometry</span></strong><span data-dcnode-id="1588" instrument_node="">.</span><br data-dcnode-id="1587"><span data-dcnode-id="1586" instrument_node="">Various animals show different lung capacities depending on their activities. For instance, cheetahs have developed a much higher lung capacity than us to provide enough oxygen to all the muscles of the body and allow them to run pretty fast. Similarly, Elephants also have a large lung capacity due to their heavy body and their requirement to take up oxygen by their body size. In simple terms:</span></p><span data-dcnode-id="1584" instrument_node="">
</span><p data-dcnode-id="1543"><strong data-dcnode-id="1582"><span data-dcnode-id="1583" instrument_node="">Volume</span></strong><span data-dcnode-id="1581" instrument_node="">: Volume measures the amount of air for one function, such as inhalation or exhalation. </span><strong data-dcnode-id="1579"><span data-dcnode-id="1580" instrument_node="">Capacity</span></strong><span data-dcnode-id="1578" instrument_node="">: Capacity is any two or more volumes, for example, how much can be inhaled from the end of a maximal exhalation. </span><br data-dcnode-id="1577"><span data-dcnode-id="1576" instrument_node="">The volume in the lung can be divided into four units:</span><br data-dcnode-id="1575"><span data-dcnode-id="1574" instrument_node="">1. </span><strong data-dcnode-id="1572"><span data-dcnode-id="1573" instrument_node="">Tidal Volume </span></strong><span data-dcnode-id="1571" instrument_node="">(</span><strong data-dcnode-id="1569"><span data-dcnode-id="1570" instrument_node="">TV</span></strong><span data-dcnode-id="1568" instrument_node="">): It measures the amount of air that is inspired and expired during a normal breath.</span><br data-dcnode-id="1567"><span data-dcnode-id="1566" instrument_node="">2. </span><strong data-dcnode-id="1564"><span data-dcnode-id="1565" instrument_node="">Expiratory Reserve Volume</span></strong><span data-dcnode-id="1563" instrument_node=""> (</span><strong data-dcnode-id="1561"><span data-dcnode-id="1562" instrument_node="">ERV</span></strong><span data-dcnode-id="1560" instrument_node="">): It is the additional or reserve amount of air that can be exhaled after a normal exhalation.</span><br data-dcnode-id="1559"><span data-dcnode-id="1558" instrument_node="">3. </span><strong data-dcnode-id="1556"><span data-dcnode-id="1557" instrument_node="">Inspiratory Reserve Volume</span></strong><span data-dcnode-id="1555" instrument_node=""> (</span><strong data-dcnode-id="1553"><span data-dcnode-id="1554" instrument_node="">IRV</span></strong><span data-dcnode-id="1552" instrument_node="">): It is the additional amount of air that can be inhaled after a normal inhalation.</span><br data-dcnode-id="1551"><span data-dcnode-id="1550" instrument_node="">4. </span><strong data-dcnode-id="1548"><span data-dcnode-id="1549" instrument_node="">Residual Volume</span></strong><span data-dcnode-id="1547" instrument_node=""> (</span><strong data-dcnode-id="1545"><span data-dcnode-id="1546" instrument_node="">RV</span></strong><span data-dcnode-id="1544" instrument_node="">): It is the amount of air left after expiratory reserve volume is exhaled.</span></p><span data-dcnode-id="1542" instrument_node="">
</span><p data-dcnode-id="1233"><span data-dcnode-id="1541" instrument_node="">The lung capacities can be explained by the terms mentioned below:</span><br data-dcnode-id="1540"><span data-dcnode-id="1539" instrument_node="">1. </span><strong data-dcnode-id="1537"><span data-dcnode-id="1538" instrument_node="">Total Lung Capacity</span></strong><span data-dcnode-id="1536" instrument_node=""> (</span><strong data-dcnode-id="1534"><span data-dcnode-id="1535" instrument_node="">TLC</span></strong><span data-dcnode-id="1533" instrument_node="">): It is the total volume of air-filled in the lungs after a forced inspiration. Hence, we can say that, </span><span class="MathJax_Preview" data-dcnode-id="1532" style="color: inherit;"></span><span class="MathJax" data-dcnode-id="1448" data-mathml="<math xmlns=&quot;http://www.w3.org/1998/Math/MathML&quot;><mrow class=&quot;MJX-TeXAtom-ORD&quot;><mrow class=&quot;MJX-TeXAtom-ORD&quot;><mi mathvariant=&quot;normal&quot;>T</mi><mi mathvariant=&quot;normal&quot;>L</mi><mi mathvariant=&quot;normal&quot;>C</mi><mo>=</mo><mi mathvariant=&quot;normal&quot;>T</mi><mi mathvariant=&quot;normal&quot;>V</mi><mo>+</mo><mi mathvariant=&quot;normal&quot;>E</mi><mi mathvariant=&quot;normal&quot;>R</mi><mi mathvariant=&quot;normal&quot;>V</mi><mo>+</mo><mi mathvariant=&quot;normal&quot;>I</mi><mi mathvariant=&quot;normal&quot;>R</mi><mi mathvariant=&quot;normal&quot;>V</mi><mo>+</mo><mi mathvariant=&quot;normal&quot;>R</mi><mi mathvariant=&quot;normal&quot;>V</mi></mrow></mrow></math>" id="MathJax-Element-4-Frame" role="presentation" style="position: relative;" tabindex="0"><nobr aria-hidden="true" data-dcnode-id="1487"><span class="math" data-dcnode-id="1488" id="MathJax-Span-72" style="width: 15.836em; display: inline-block;"><span data-dcnode-id="1490" style="display: inline-block; position: relative; width: 13.177em; height: 0px; font-size: 120%;"><span data-dcnode-id="1491" style="position: absolute; clip: rect(2.127em, 1013.16em, 3.205em, -1000em); top: -2.969em; left: 0em;"><span class="mrow" data-dcnode-id="1493" id="MathJax-Span-73"><span class="texatom" data-dcnode-id="1494" id="MathJax-Span-74"><span class="mrow" data-dcnode-id="1495" id="MathJax-Span-75"><span class="texatom" data-dcnode-id="1496" id="MathJax-Span-76"><span class="mrow" data-dcnode-id="1497" id="MathJax-Span-77"><span class="mi" data-dcnode-id="1530" id="MathJax-Span-78"><img data-dcnode-id="1531" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//cdnjs.cloudflare.com/ajax/libs/mathjax/2.7.5/fonts/HTML-CSS/TeX/png/Main/Regular/400/0054.png%3FV%3D2.7.5&amp;raw" style="width: 13px; height: 13px; margin-right: 0.036em;"></span><span class="mi" data-dcnode-id="1528" id="MathJax-Span-79"><img data-dcnode-id="1529" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//cdnjs.cloudflare.com/ajax/libs/mathjax/2.7.5/fonts/HTML-CSS/TeX/png/Main/Regular/400/004C.png%3FV%3D2.7.5&amp;raw" style="width: 11px; height: 13px; margin-right: 0.042em;"></span><span class="mi" data-dcnode-id="1526" id="MathJax-Span-80"><img data-dcnode-id="1527" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//cdnjs.cloudflare.com/ajax/libs/mathjax/2.7.5/fonts/HTML-CSS/TeX/png/Main/Regular/400/0043.png%3FV%3D2.7.5&amp;raw" style="width: 12px; height: 14px; vertical-align: 0px; margin-right: 0.054em;"></span><span class="mo" data-dcnode-id="1524" id="MathJax-Span-81" style="padding-left: 0.278em;"><img data-dcnode-id="1525" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//cdnjs.cloudflare.com/ajax/libs/mathjax/2.7.5/fonts/HTML-CSS/TeX/png/Main/Regular/400/003D.png%3FV%3D2.7.5&amp;raw" style="width: 13px; height: 4px; vertical-align: 2px; margin-right: 0.054em;"></span><span class="mi" data-dcnode-id="1522" id="MathJax-Span-82" style="padding-left: 0.278em;"><img data-dcnode-id="1523" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//cdnjs.cloudfl n-right: 0.019em;"></span><span class="mo" data-dcnode-id="1510" id="MathJax-Span-88" style="padding-left: 0.222em;"><img data-dcnode-id="1511" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//cdnjs.cloudflare.com/ajax/libs/mathjax/2.7.5/fonts/HTML-CSS/TeX/png/Main/Regular/400/002B.png%3FV%3D2.7.5&amp;raw" style="width: 13px; height: 13px; vertical-align: -2px; margin-right: 0.054em;"></span><span class="mi" data-dcnode-id="1508" id="MathJax-Span-89" style="padding-left: 0.222em;"><img data-dcnode-id="1509" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//cdnjs.cloudflare.com/ajax/libs/mathjax/2.7.5/fonts/HTML-CSS/TeX/png/Main/Regular/400/0049.png%3FV%3D2.7.5&amp;raw" style="width: 6px; height: 13px; margin-right: 0.021em;"></span><span class="mi" data-dcnode-id="1506" id="MathJax-Span-90"><img data-dcnode-id="1507" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//cdnjs.cloudflare.com/ajax/libs/mathjax/2.7.5/fonts/HTML-CSS/TeX/png/Main/Regular/400/0052.png%3FV%3D2.7.5&amp;raw" style="width: 14px; height: 13px; vertical-align: 0px; margin-right: 0.004em;"></span><span class="mi" data-dcnode-id="1504" id="MathJax-Span-91"><img data-dcnode-id="1505" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//cdnjs.cloudflare.com/ajax/libs/mathjax/2.7.5/fonts/HTML-CSS/TeX/png/Main/Regular/400/0056.png%3FV%3D2.7.5&amp;raw" style="width: 14px; height: 13px; vertical-align: -1px; margin-right: 0.019em;"></span><span class="mo" data-dcnode-id="1502" id="MathJax-Span-92" style="padding-left: 0.222em;"><img data-dcnode-id="1503" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//cdnjs.cloudflare.com/ajax/libs/mathjax/2.7.5/fonts/HTML-CSS/TeX/png/Main/Regular/400/002B.png%3FV%3D2.7.5&amp;raw" style="width: 13px; height: 13px; vertical-align: -2px; margin-right: 0.054em;"></span><span class="mi" data-dcnode-id="1500" id="MathJax-Span-93" style="padding-left: 0.22 %3FV%3D2.7.5&amp;raw" style="width: 14px; height: 13px; vertical-align: 0px; margin-right: 0.004em;"></span><span class="mi" data-dcnode-id="1272" id="MathJax-Span-144"><img data-dcnode-id="1273" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//cdnjs.cloudflare.com/ajax/libs/mathjax/2.7.5/fonts/HTML-CSS/TeX/png/Main/Regular/400/0056.png%3FV%3D2.7.5&amp;raw" style="width: 14px; height: 13px; vertical-align: -1px; margin-right: 0.019em;"></span></span></span></span></span></span><span data-dcnode-id="1266" style="display: inline-block; width: 0px; height: 2.969em;"></span></span></span><span data-dcnode-id="1263" style="display: inline-block; overflow: hidden; vertical-align: -0.158em; border-left: 0px solid; width: 0px; height: 1.043em;"></span></span></nobr><span class="MJX_Assistive_MathML" data-dcnode-id="1237" role="presentation"><math data-dcnode-id="1238" xmlns="http://www.w3.org/1998/Math/MathML"><mrow class="MJX-TeXAtom-ORD" data-dcnode-id="1239"><mrow class="MJX-TeXAtom-ORD" data-dcnode-id="1240"><mi data-dcnode-id="1259" mathvariant="normal"><span data-dcnode-id="1260" instrument_node="">F</span></mi><mi data-dcnode-id="1257" mathvariant="normal"><span data-dcnode-id="1258" instrument_node="">R</span></mi><mi data-dcnode-id="1255" mathvariant="normal"><span data-dcnode-id="1256" instrument_node="">C</span></mi><mo data-dcnode-id="1253"><span data-dcnode-id="1254" instrument_node="">=</span></mo><mi data-dcnode-id="1251" mathvariant="normal"><span data-dcnode-id="1252" instrument_node="">E</span></mi><mi data-dcnode-id="1249" mathvariant="normal"><span data-dcnode-id="1250" instrument_node="">R</span></mi><mi data-dcnode-id="1247" mathvariant="normal"><span data-dcnode-id="1248" instrument_node="">V</span></mi><mo data-dcnode-id="1245"><span data-dcnode-id="1246" instrument_node="">+</span></mo><mi data-dcnode-id="1243" mathvariant="normal"><span data-dcnode-id="1244" instrument_node="">R</span></mi><mi data-dcnode-id="1241" mathvariant="normal"><span data-dcnode-id="1242" instrument_node="">V</span></mi></mrow></mrow></math></span></span></p><span data-dcnode-id="1232" instrument_node="">

</span><p class="has-text-align-center" data-dcnode-id="1224"><span data-dcnode-id="1225" instrument_node="">Fig: Lung Volumes and Capacity</span></p><span data-dcnode-id="1223" instrument_node="">
</span><h3 data-dcnode-id="1219"><span class="ez-toc-section" data-dcnode-id="1222" id="Summary"></span><span data-dcnode-id="1221" instrument_node="">Summary</span><span class="ez-toc-section-end" data-dcnode-id="1220"></span></h3><span data-dcnode-id="1218" instrument_node="">
</span><p data-dcnode-id="1216"><span data-dcnode-id="1217" instrument_node="">Breathing is a natural process that involves inhaling oxygen and exhaling carbon dioxide. Inspiration and expiration are two main processes involved in the mechanism of breathing. Contraction of the diaphragm and the external intercostal causes inspiration, and relaxation of these muscles causes expiration. Change in atmospheric pressure, alveolar pressure and intrapleural pressure causes contraction and relaxation of muscles leading to gaseous movement from the air to the body and reverse. The diaphragm, intercostal muscles (Rib cage muscles), and abdominal muscles are the main muscles involved in breathing.</span></p><span data-dcnode-id="1215" instrument_node="">
</span><h3 data-dcnode-id="1211"><span class="ez-toc-section" data-dcnode-id="1214" id="Frequently_Asked_Questions_FAQs_on_Mechanism_of_Breathing"></span><span data-dcnode-id="1213" instrument_node="">Frequently Asked Questions (FAQs) on Mechanism of Breathing</span><span class="ez-toc-section-end" data-dcnode-id="1212"></span></h3><span data-dcnode-id="1210" instrument_node="">
</span><p data-dcnode-id="1208"><span data-dcnode-id="1209" instrument_node="">The most frequently asked questions about Mechanism of Breathing are answered here:</span></p><span data-dcnode-id="1207" instrument_node="">
</span><figure class="wp-block-table" data-dcnode-id="1193"><table data-dcnode-id="1194"><tbody data-dcnode-id="1195"><tr data-dcnode-id="1196"><td data-dcnode-id="1197"><strong data-dcnode-id="1204"><em data-dcnode-id="1205"><span data-dcnode-id="1206" instrument_node="">Q.1. What is the mechanical process of breathing?</span></em></strong><br data-dcnode-id="1203"><strong data-dcnode-id="1199"><em data-dcnode-id="1201"><span data-dcnode-id="1202" instrument_node="">Ans:</span></em><span data-dcnode-id="1200" instrument_node=""> </span></strong><span data-dcnode-id="1198" instrument_node="">Breathing is known as pulmonary ventilation since pulmonary muscles are involved in the process. Pulmonary ventilation comprises two phases, inspiration, also known as inhalation and Expiration, also known as exhalation. It is a mechanical process as it involves a change in the volume in the chest cavity with respect to the difference in the pressure gradient.</span></td></tr></tbody></table></figure><span data-dcnode-id="1192" instrument_node="">
</span><figure class="wp-block-table" data-dcnode-id="1168"><table data-dcnode-id="1169"><tbody data-dcnode-id="1170"><tr data-dcnode-id="1171"><td data-dcnode-id="1172"><strong data-dcnode-id="1189"><em data-dcnode-id="1190"><span data-dcnode-id="1191" instrument_node="">Q.2. What are the 2 steps of breathing?&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;</span></em></strong><br data-dcnode-id="1188"><strong data-dcnode-id="1184"><em data-dcnode-id="1186"><span data-dcnode-id="1187" instrument_node="">Ans:</span></em><span data-dcnode-id="1185" instrument_node=""> </span></strong><span data-dcnode-id="1183" instrument_node="">The process of breathing is divided into two different steps.</span><br data-dcnode-id="1182"><span data-dcnode-id="1181" instrument_node="">1. The first stage is termed </span><strong data-dcnode-id="1179"><span data-dcnode-id="1180" instrument_node="">inspiration </span></strong><span data-dcnode-id="1178" instrument_node="">or inhaling. When the lungs inhale oxygen, the diaphragm contracts and pull downward. Meanwhile, the muscles between the ribs contract and pull upward. This results in an increase in the size of the thoracic cavity and reduces the pressure inside. As a result, air rushes in and fills the lungs.</span><br data-dcnode-id="1177"><span data-dcnode-id="1176" instrument_node="">2. </span><strong data-dcnode-id="1174"><span data-dcnode-id="1175" instrument_node="">Expiration </span></strong><span data-dcnode-id="1173" instrument_node="">or exhaling is the second stage. When the lungs exhale, the diaphragm relaxes, leading to a decrease in the volume of the thoracic cavity while the pressure in it rises. As a result, the lungs contract and air is forced out.</span></td></tr></tbody></table></figure><span data-dcnode-id="1167" instrument_node="">
</span><figure class="wp-block-table" data-dcnode-id="1147"><table data-dcnode-id="1148"><tbody data-dcnode-id="1149"><tr data-dcnode-id="1150"><td data-dcnode-id="1151"><strong data-dcnode-id="1164"><em data-dcnode-id="1165"><span data-dcnode-id="1166" instrument_node="">Q.3. What are the muscles involved in the mechanism of breathing?</span></em></strong><br data-dcnode-id="1163"><strong data-dcnode-id="1159"><em data-dcnode-id="1161"><span data-dcnode-id="1162" instrument_node="">Ans:</span></em><span data-dcnode-id="1160" instrument_node=""> </span></strong><span data-dcnode-id="1158" instrument_node="">There are mainly three groups of muscles involved in respiration.</span><br data-dcnode-id="1157"><span data-dcnode-id="1156" instrument_node="">1. Diaphragm</span><br data-dcnode-id="1155"><span data-dcnode-id="1154" instrument_node="">2. Intercostal muscles (Rib cage muscles)</span><br data-dcnode-id="1153"><span data-dcnode-id="1152" instrument_node="">3. Abdominal muscles.</span></td></tr></tbody></table></figure><span data-dcnode-id="1146" instrument_node="">
</span><figure class="wp-block-table" data-dcnode-id="1134"><table data-dcnode-id="1135"><tbody data-dcnode-id="1136"><tr data-dcnode-id="1137"><td data-dcnode-id="1138"><strong data-dcnode-id="1140"><em data-dcnode-id="1142"><span data-dcnode-id="1145" instrument_node="">Q.4. What is the purpose of breathing exercises?</span><br data-dcnode-id="1144"><span data-dcnode-id="1143" instrument_node="">Ans:</span></em><span data-dcnode-id="1141" instrument_node=""> </span></strong><span data-dcnode-id="1139" instrument_node="">Breathing exercises can help us to get rid of accumulated stale air in the lungs, increase oxygen levels in the body and also help the diaphragm to perform its function and help us to breathe easily.</span></td></tr></tbody></table></figure><span data-dcnode-id="1133" instrument_node="">
</span><figure class="wp-block-table" data-dcnode-id="1119"><table data-dcnode-id="1120"><tbody data-dcnode-id="1121"><tr data-dcnode-id="1122"><td data-dcnode-id="1123"><strong data-dcnode-id="1130"><em data-dcnode-id="1131"><span data-dcnode-id="1132" instrument_node="">Q.5. How is respiration different from breathing?</span></em></strong><br data-dcnode-id="1129"><em data-dcnode-id="1125"><strong data-dcnode-id="1127"><span data-dcnode-id="1128" instrument_node="">Ans</span></strong><span data-dcnode-id="1126" instrument_node="">:</span></em><span data-dcnode-id="1124" instrument_node=""> Breathing and respiration are two entirely distinct but interrelated processes of the body. These help body organs to function properly. Breathing is the physical process of exchanging gases whereas respiration is a chemical process that takes place at a cellular level to produces energy.</span></td></tr></tbody></table></figure><span data-dcnode-id="1118" instrument_node="">
</span><span data-dcnode-id="1115" instrument_node="">
