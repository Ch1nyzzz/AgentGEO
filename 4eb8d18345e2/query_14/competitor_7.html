</span><h2 aria-level="2" class="mb-3" data-dcnode-id="861" id="what-does-medical-evaluation-mean" role="heading"><span data-dcnode-id="862" instrument_node="">What Does Medical Evaluation Mean?</span></h2><span data-dcnode-id="860" instrument_node="">
</span><p data-dcnode-id="858"><span data-dcnode-id="859" instrument_node="">A medical evaluation is a comprehensive assessment of a patient's overall medical history and current condition for the purpose of identifying health problems and planning treatment. Medical evaluations may be part of an individual's routine healthcare or required under certain work related circumstances, such as an employee's return to work after an injury. A medical evaluation may also be referred to as a medical examination.</span></p><span data-dcnode-id="857" instrument_node="">
</span></div><span data-dcnode-id="855" instrument_node="">
</span><div class="ad__wrapper mt-2" data-dcnode-id="845" itemscope="" itemtype="https://schema.org/WPAdBlock"><span data-dcnode-id="854" instrument_node="">

</span><h2 aria-level="2" class="mb-3" data-dcnode-id="824" id="workplace-explains-medical-evaluation" role="heading"><span data-dcnode-id="825" instrument_node="">WorkplaceTesting Explains Medical Evaluation</span></h2><span data-dcnode-id="823" instrument_node="">
</span><p data-dcnode-id="821"><span data-dcnode-id="822" instrument_node="">A medical evaluation, or examination, is a clinical appraisal of an individual's health. A medical evaluation may assess the patient's physical or mental health, or both.</span></p><p data-dcnode-id="819"><span data-dcnode-id="820" instrument_node="">Medical evaluations are often required for an employee to return to work after an illness or injury. The U.S. Department of Labor's Occupational Safety and Health Administration (OSHA), requires medical evaluations to be conducted in a number of specific circumstances. For example, because respirators can make breathing more difficult, an employee must be medically evaluated prior to being assigned a job in which wearing a respirator is required.</span></p><p data-dcnode-id="817"><span data-dcnode-id="818" instrument_node="">Outside of the workplace, a medical evaluation may be required as part of an individual's application for life insurance coverage. An insurer, or government agency, may also require a medical evaluation for an individual seeking to receive compensation or benefits for an injury or disability. A medical examination is also commonly performed when an employee seeks worker's compensation for an on the job injury.</span></p><span data-dcnode-id="816" instrument_node="">
</span></div><span data-dcnode-id="814" instrument_node="">
