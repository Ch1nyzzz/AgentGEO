</span><h3 class="col-heading" data-dcnode-id="658"><span data-dcnode-id="659" instrument_node="">
											Lung cancer is one of those diseases where no one is immune...
										</span></h3><span data-dcnode-id="657" instrument_node="">
</span><div class="col-content" data-dcnode-id="645"><span data-dcnode-id="656" instrument_node="">
</span><p data-dcnode-id="650"><span data-dcnode-id="655" instrument_node="">and the root cause is not always evident. Some risk factors, such as smoking tobacco, are more obvious than others. After all, not only are there are more than 60 carcinogens in cigarette smoke, but </span><a data-dcnode-id="652" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.lung-cancer.com/vulnerability" rel="noopener" target="_blank"><span data-dcnode-id="653"><span data-dcnode-id="654" instrument_node="">smoking also weakens the lungs</span></span></a><span data-dcnode-id="651" instrument_node="">. The weakening in the lungs reduces their capacity to get rid of toxins, making them much more susceptible and vulnerable to be attacked by carcinogens. However, even people who have never smoked can be diagnosed with lung cancer.&nbsp;</span></p><span data-dcnode-id="649" instrument_node="">
</span><p data-dcnode-id="647"><span data-dcnode-id="648" instrument_node="">Smoking aside, scientists agree that many other factors can increase the chances of developing the disease.&nbsp;</span></p><span data-dcnode-id="646" instrument_node="">

</span><h2 data-dcnode-id="575"><span data-dcnode-id="576" instrument_node="">Other Causes Of Lung Cancer</span></h2><span data-dcnode-id="574" instrument_node="">
</span><h3 data-dcnode-id="572"><span data-dcnode-id="573" instrument_node="">Radon&nbsp;</span></h3><span data-dcnode-id="571" instrument_node="">
</span><p data-dcnode-id="561"><span data-dcnode-id="570" instrument_node="">A gaseous decay product of radium-226 and uranium-238, radon can damage the respiratory epithelium (the cells that line the lungs) through alpha particle emissions (a form of radiation). Uranium miners face an increased risk of lung cancer, probably due to radon radiation. Many armed forces members came into contact with depleted uranium and radon during military service, as did employees of defense contractors. See our pages on </span><a data-dcnode-id="567" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.lung-cancer.com/radon" rel="noopener"><span data-dcnode-id="568"><span data-dcnode-id="569" instrument_node="">radon as a cause of lung cancer</span></span></a><span data-dcnode-id="566" instrument_node=""> and </span><a data-dcnode-id="563" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.lung-cancer.com/uranium" rel="noopener"><span data-dcnode-id="564"><span data-dcnode-id="565" instrument_node="">uranium as a cause of lung cancer</span></span></a><span data-dcnode-id="562" instrument_node="">.</span></p><span data-dcnode-id="560" instrument_node="">
</span><h3 data-dcnode-id="558"><span data-dcnode-id="559" instrument_node="">Secondhand Smoke (SHS)</span></h3><span data-dcnode-id="557" instrument_node="">
</span><p data-dcnode-id="551"><span data-dcnode-id="556" instrument_node="">Also referred to as environmental tobacco smoke (ETS), secondhand smoke has been identified as a significant risk factor for lung cancer in </span><a data-dcnode-id="553" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.lung-cancer.com/non-smoker" rel="noopener"><span data-dcnode-id="554"><span data-dcnode-id="555" instrument_node="">people who have never smoked</span></span></a><span data-dcnode-id="552" instrument_node="">. According to the American Cancer Society, up to 20% of lung cancer cases among never-smokers are associated with ETS.</span></p><span data-dcnode-id="550" instrument_node="">
</span><p data-dcnode-id="544"><span data-dcnode-id="549" instrument_node="">More on </span><a data-dcnode-id="546" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.lung-cancer.com/tobacco" rel="noopener"><span data-dcnode-id="547"><span data-dcnode-id="548" instrument_node="">secondhand smoke as a cause of lung cancer.</span></span></a><span data-dcnode-id="545" instrument_node="">&nbsp;</span></p><span data-dcnode-id="543" instrument_node="">
</span><h3 data-dcnode-id="540"><img alt="lung-cancer-causes-and-risks-factors-asbestos" data-dcnode-id="542" loading="lazy" sizes="(max-width: 400px) 100vw, 400px" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.lung-cancer.com/hs-fs/hubfs/lung-cancer-causes-and-risks-factors-asbestos.jpg%3Fwidth%3D400%26name%3Dlung-cancer-causes-and-risks-factors-asbestos.jpg&amp;raw" srcset="https://www.lung-cancer.com/hs-fs/hubfs/lung-cancer-causes-and-risks-factors-asbestos.jpg?width=200&amp;name=lung-cancer-causes-and-risks-factors-asbestos.jpg 200w, https://www.lung-cancer.com/hs-fs/hubfs/lung-cancer-causes-and-risks-factors-asbestos.jpg?width=400&amp;name=lung-cancer-causes-and-risks-factors-asbestos.jpg 400w, https://www.lung-cancer.com/hs-fs/hubfs/lung-cancer-causes-and-risks-factors-asbestos.jpg?width=600&amp;name=lung-cancer-causes-and-risks-factors-asbestos.jpg 600w, https://www.lung-cancer.com/hs-fs/hubfs/lung-cancer-causes-and-risks-factors-asbestos.jpg?width=800&amp;name=lung-cancer-causes-and-risks-factors-asbestos.jpg 800w, https://www.lung-cancer.com/hs-fs/hubfs/lung-cancer-causes-and-risks-factors-asbestos.jpg?width=1000&amp;name=lung-cancer-causes-and-risks-factors-asbestos.jpg 1000w, https://www.lung-cancer.com/hs-fs/hubfs/lung-cancer-causes-and-risks-factors-asbestos.jpg?width=1200&amp;name=lung-cancer-causes-and-risks-factors-asbestos.jpg 1200w" style="width: 400px; float: left; margin: 0px 25px 0px 0px;" width="400"><span data-dcnode-id="541" instrument_node="">Asbestos</span></h3><span data-dcnode-id="539" instrument_node="">
</span><p data-dcnode-id="529"><span data-dcnode-id="538" instrument_node="">Asbestos is a known cause of several types of cancer, </span><a data-dcnode-id="535" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.lung-cancer.com/asbestos" rel="noopener"><span data-dcnode-id="536"><span data-dcnode-id="537" instrument_node="">including lung cancer</span></span></a><span data-dcnode-id="534" instrument_node="">. The asbestos fibers can become airborne and get into your lungs. Often, lung cancer (or even mesothelioma) doesn’t show up until decades after your asbestos exposure. If you have lung cancer and were exposed to asbestos, even decades ago, you may be eligible for compensation. </span><a data-dcnode-id="531" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.lung-cancer.com/asbestos-compensation" rel="noopener"><span data-dcnode-id="532"><span data-dcnode-id="533" instrument_node="">Click here to learn more</span></span></a><span data-dcnode-id="530" instrument_node="">.</span></p><span data-dcnode-id="528" instrument_node="">
</span><p data-dcnode-id="522"><span data-dcnode-id="527" instrument_node="">Studies have shown a </span><a data-dcnode-id="524" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.ncbi.nlm.nih.gov/pubmed/10401875"><span data-dcnode-id="525"><span data-dcnode-id="526" instrument_node="">synergistic relationship</span></span></a><span data-dcnode-id="523" instrument_node=""> between asbestos and tobacco smoke in the causation of lung cancer. The studies found that in approximately a third of the lung cancer cases where smokers had asbestos exposure, the lung cancer was attributable to the “synergy” of the two working together rather than either individual carcinogen.&nbsp;</span></p><span data-dcnode-id="521" instrument_node="">
</span><p data-dcnode-id="519"><span data-dcnode-id="520" instrument_node="">The combination of tobacco and asbestos exposure has been proven to cause lung cancer much more frequently than either smoking or asbestos on its own. In fact, when a smoker is exposed to asbestos fibers, his or her risk of lung cancer increases 50-fold.</span></p><span data-dcnode-id="518" instrument_node="">
</span><h3 data-dcnode-id="516"><span data-dcnode-id="517" instrument_node="">Agent Orange</span></h3><span data-dcnode-id="515" instrument_node="">
</span><p data-dcnode-id="509"><span data-dcnode-id="514" instrument_node="">Agent Orange was a mixture of plant-killing chemicals (herbicides) sprayed from airplanes during the Vietnam War that became airborne and entered the lungs of ground troops. The Department of Veterans Affairs has acknowledged that Agent Orange is carcinogenic and provides benefits for qualified cancer patients with a history of exposure. See our page on </span><a data-dcnode-id="511" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.lung-cancer.com/agent-orange" rel="noopener"><span data-dcnode-id="512"><span data-dcnode-id="513" instrument_node="">Agent Orange as a cause of lung cancer</span></span></a><span data-dcnode-id="510" instrument_node="">.</span></p><span data-dcnode-id="508" instrument_node="">
</span><h3 data-dcnode-id="506"><span data-dcnode-id="507" instrument_node="">Environmental Carcinogens&nbsp;</span></h3><span data-dcnode-id="505" instrument_node="">
</span><p data-dcnode-id="503"><span data-dcnode-id="504" instrument_node="">Environmental exposures that damage DNA can also result in lung cancer. These exposures may include:&nbsp;</span></p><span data-dcnode-id="502" instrument_node="">
</span><ul data-dcnode-id="481"><span data-dcnode-id="501" instrument_node="">
</span><li aria-level="1" data-dcnode-id="496"><a data-dcnode-id="498" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.lung-cancer.com/metals" rel="noopener"><span data-dcnode-id="499"><span data-dcnode-id="500" instrument_node="">Heavy metals</span></span></a><span data-dcnode-id="497" instrument_node="">, such as arsenic, beryllium, cadmium, and chromium. Heavy metals are in many products and waste streams. Due to health concerns, the United States lowered permissible arsenic levels in drinking water several years ago.&nbsp;&nbsp;</span></li><span data-dcnode-id="495" instrument_node="">
</span><li aria-level="1" data-dcnode-id="489"><span data-dcnode-id="494" instrument_node="">Radioactive elements like </span><a data-dcnode-id="491" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.lung-cancer.com/uranium" rel="noopener"><span data-dcnode-id="492"><span data-dcnode-id="493" instrument_node="">uranium</span></span></a><span data-dcnode-id="490" instrument_node="">, which occur in water, soil, or mineral deposits.</span></li><span data-dcnode-id="488" instrument_node="">
</span><li aria-level="1" data-dcnode-id="483"><a data-dcnode-id="485" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.lung-cancer.com/organics" rel="noopener"><span data-dcnode-id="486"><span data-dcnode-id="487" instrument_node="">Hydrocarbon</span></span></a><span data-dcnode-id="484" instrument_node=""> substances such as motor oil, gasoline, diesel exhaust, mineral spirits, kerosene, paints, rubber cement, dry cleaning chemicals, and solvents. Exposure to a specific class of hydrocarbons called polycyclic aromatic hydrocarbons (PAHs) may increase lung cancer incidence.&nbsp;</span></li><span data-dcnode-id="482" instrument_node="">
</span></ul><span data-dcnode-id="480" instrument_node="">

</span><h3 data-dcnode-id="317"><span data-dcnode-id="318" instrument_node="">Workplace Exposures</span></h3><span data-dcnode-id="316" instrument_node="">
</span><p data-dcnode-id="311"><span data-dcnode-id="315" instrument_node="">Several types of </span><a data-dcnode-id="313" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.lung-cancer.com/asbestos-exposure-workplace" rel="noopener"><span data-dcnode-id="314" instrument_node="">occupational exposures</span></a><span data-dcnode-id="312" instrument_node=""> have been identified as factors that increase lung cancer risk among smokers and never smokers. Many other jobs brought workers into close contact with asbestos and other carcinogens, including:</span></p><span data-dcnode-id="310" instrument_node="">
</span><ul data-dcnode-id="293"><span data-dcnode-id="309" instrument_node="">
</span><li aria-level="1" data-dcnode-id="307"><span data-dcnode-id="308" instrument_node="">Electricians</span></li><span data-dcnode-id="306" instrument_node="">
</span><li aria-level="1" data-dcnode-id="304"><span data-dcnode-id="305" instrument_node="">Painters</span></li><span data-dcnode-id="303" instrument_node="">
</span><li aria-level="1" data-dcnode-id="301"><span data-dcnode-id="302" instrument_node="">Plumbers</span></li><span data-dcnode-id="300" instrument_node="">
</span><li aria-level="1" data-dcnode-id="298"><span data-dcnode-id="299" instrument_node="">Steamfitters</span></li><span data-dcnode-id="297" instrument_node="">
</span><li aria-level="1" data-dcnode-id="295"><span data-dcnode-id="296" instrument_node="">Pipefitters</span></li><span data-dcnode-id="294" instrument_node="">
</span></ul><span data-dcnode-id="292" instrument_node="">
</span><p data-dcnode-id="275"><span data-dcnode-id="291" instrument_node="">Men and women in these trades may have come into contact with asbestos in insulation, cement, ceiling tiles, brakes, and other hazardous materials. Carcinogens in these materials include </span><span data-dcnode-id="289"><span data-dcnode-id="290" instrument_node="">asbestos</span></span><span data-dcnode-id="288" instrument_node="">, </span><a data-dcnode-id="285" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.lung-cancer.com/beryllium" rel="noopener"><span data-dcnode-id="286"><span data-dcnode-id="287" instrument_node="">beryllium</span></span></a><span data-dcnode-id="284" instrument_node="">, </span><a data-dcnode-id="281" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.lung-cancer.com/metals" rel="noopener"><span data-dcnode-id="282"><span data-dcnode-id="283" instrument_node="">heavy metals</span></span></a><span data-dcnode-id="280" instrument_node="">, and </span><a data-dcnode-id="277" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.lung-cancer.com/organics" rel="noopener"><span data-dcnode-id="278"><span data-dcnode-id="279" instrument_node="">hydrocarbons</span></span></a><span data-dcnode-id="276" instrument_node="">.</span></p><span data-dcnode-id="274" instrument_node="">
</span><h3 data-dcnode-id="272"><span data-dcnode-id="273" instrument_node="">Military Service Exposure&nbsp;</span></h3><span data-dcnode-id="271" instrument_node="">
</span><p data-dcnode-id="254"><span data-dcnode-id="270" instrument_node="">Thousands of veterans have contracted lung cancer after being exposed to </span><a data-dcnode-id="267" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.lung-cancer.com/assistance/military-asbestos-exposure" rel="noopener"><span data-dcnode-id="268"><span data-dcnode-id="269" instrument_node="">asbestos</span></span></a><span data-dcnode-id="266" instrument_node="">. Often lung cancer doesn't show up until decades after asbestos exposure. Members of all branches of the military were exposed to the same materials as civilian workers were. Exposure to </span><span data-dcnode-id="264"><span data-dcnode-id="265" instrument_node="">beryllium</span></span><span data-dcnode-id="263" instrument_node=""> and </span><a data-dcnode-id="260" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.lung-cancer.com/uranium" rel="noopener"><span data-dcnode-id="261"><span data-dcnode-id="262" instrument_node="">depleted uranium</span></span></a><span data-dcnode-id="259" instrument_node=""> was widespread among service members because those metals were used in defense systems. Also, the </span><a data-dcnode-id="256" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.lung-cancer.com/agent-orange-causes-of-lung-cancer" rel="noopener"><span data-dcnode-id="257"><span data-dcnode-id="258" instrument_node="">Agent Orange</span></span></a><span data-dcnode-id="255" instrument_node=""> herbicide was used extensively during the Vietnam War.</span></p><span data-dcnode-id="253" instrument_node="">
</span><h3 data-dcnode-id="251"><span data-dcnode-id="252" instrument_node="">Home Exposure</span></h3><span data-dcnode-id="250" instrument_node="">
</span><p data-dcnode-id="238"><span data-dcnode-id="249" instrument_node="">Radon accumulates in buildings’ basements in some areas of the country, and </span><a data-dcnode-id="247" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.lung-cancer.com/assistance/asbestos-at-home" rel="noopener"><span data-dcnode-id="248" instrument_node="">asbestos was used widely in home construction</span></a><span data-dcnode-id="246" instrument_node=""> for decades. Both </span><a data-dcnode-id="243" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.lung-cancer.com/radon" rel="noopener"><span data-dcnode-id="244"><span data-dcnode-id="245" instrument_node="">radon</span></span></a><span data-dcnode-id="242" instrument_node=""> and </span><span data-dcnode-id="240"><span data-dcnode-id="241" instrument_node="">asbestos</span></span><span data-dcnode-id="239" instrument_node=""> are known causes of lung cancer and pose risks for people who live in homes with those carcinogens.</span></p><span data-dcnode-id="237" instrument_node="">
</span><h2 data-dcnode-id="235"><span data-dcnode-id="236" instrument_node="">Compensation for Lung Cancer Victims</span></h2><span data-dcnode-id="234" instrument_node="">
</span><p data-dcnode-id="225"><span data-dcnode-id="233" instrument_node="">You could have been </span><span data-dcnode-id="231"><span data-dcnode-id="232" instrument_node="">exposed to carcinogens</span></span><span data-dcnode-id="230" instrument_node=""> decades ago, and many people with lung cancer cannot easily remember these exposures. Even if you are or have been a smoker, or if you have never smoked, you may be </span><a data-dcnode-id="227" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.lung-cancer.com/compensation" rel="noopener"><span data-dcnode-id="228"><span data-dcnode-id="229" instrument_node="">entitled to compensation</span></span></a><span data-dcnode-id="226" instrument_node="">.&nbsp;</span></p><span data-dcnode-id="224" instrument_node="">

</span><div class="text" data-dcnode-id="78"><p data-dcnode-id="79" style="font-size: 12px;"><span data-dcnode-id="83" instrument_node="">Lung Cancer Answers is a website devoted to life issues for lung cancer patients and their families and is sponsored by Brad Cooper* of Cooper, Hart, Leggiero &amp; Whitehead, PLLC. Cooper, Hart, Leggiero &amp; Whitehead is located in The Woodlands, Texas (Greater Houston Area), handles cases nationwide with co-counsel in state of filing, and can be reached toll-free at 1-800-998-9729 for more information on lung cancer. Brad Cooper is not a medical doctor. The information on these pages is for the education of lung cancer patients and their families regarding potential medical and legal options. Patients are advised to consult with a medical doctor. </span><br data-dcnode-id="82"><br data-dcnode-id="81"><span data-dcnode-id="80" instrument_node="">* Licensed by the Supreme Courts of Texas.</span></p></div><span data-dcnode-id="77" instrument_node="">
