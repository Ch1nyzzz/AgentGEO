</span><h2 data-dcnode-id="886"><span data-dcnode-id="887" instrument_node="">Measuring Lung Capacity With A Balloon</span></h2><span data-dcnode-id="885" instrument_node="">
</span><p data-dcnode-id="883"><span data-dcnode-id="884" instrument_node="">Then I situated the bucket in the center of the tray. 8. Once I placed the bucket in the center of the tray, I dunk the balloon into the water being careful in the process in order to not spill extra water into the tray. 9. As I was introducing the balloon the water started pouring out of the bucket and fall into the oven tray. 10. When the balloon is fully submerged I took the bucket with the balloon away from the tray. 11. Finally I poured the water from the oven tray into a graduated cylinder and wrote down the results. VI. Safety Precautions In order to take precautions in the lab I used a lab coat to prevent getting wet.</span></p><span data-dcnode-id="882" instrument_node="">
</span><p data-dcnode-id="880"><span data-dcnode-id="881" instrument_node="">Also, because we don’t want anything to break I handle the bucket, oven tray and graduated cylinder with caution. Is not extra to remember that even though the substance being analyzed is water, do not taste or drink any because it may be contaminated with undesired chemicals from prior laboratories. Also since I’m working with humans I include the B experimentation with animals policy: Any planned and actual experimentation involving animals must be subject to approval Following a discussion between teacher and student(s) based on the B animal experimentation policy. Experiments involving animals must be eased on observing and measuring aspects of natural animal behavior. Any experimentation should not result in any pain or undue stress on any animal (vertebrate or invertebrate) or compromise its health in any way. Therefore experiments that administer drugs or medicines or manipulate the environment or diet beyond that easily tolerated by the animal are unacceptable. Experiments resulting in the death of any animal are unacceptable. Any experimentation involving humans must be with their written permission and must follow the above guidelines. Experiments involving body fluids must not be performed due o the risk of the transmission of blood-borne pathogens. Internal assessment moderators or extended essay examiners who see evidence of breaches of the above policy in the sample work sent for moderation or in extended essays are required to complete a problem report form (PRE) to be submitted to B Cardiff.</span></p><span data-dcnode-id="879" instrument_node="">
</span><p data-dcnode-id="877"><span data-dcnode-id="878" instrument_node="">VII. Raw Data elaborated two tables based on the subjects who do exercise constantly and the subjects who don’t, I present those tables in table 1 (athletic people) and table 2 (people who doesn’t do exercise constantly) TABLE 1: This table represents the lung capacity of people who do exercise instantly, their lung capacity was measured with the balloon who after that was introduce into the bucket and water was represented en ml in the table below.</span></p><span data-dcnode-id="876" instrument_node="">
</span><p data-dcnode-id="874"><span data-dcnode-id="875" instrument_node="">As it can be observed, the blue column (represented by the average of athlete people) shows a clearly advantage above the red column (represented by the average of other subjects), that’s why it can be determined that the athlete’s total mug capacity in each sample performed was always higher than other person’s average. X. Conclusion As the results clearly show, we can see that athlete people have much more lung capacity that people who doses ‘t do exercise often, this is due because there is a correlation between lung capacity and athletes.</span></p><span data-dcnode-id="873" instrument_node="">
</span><p data-dcnode-id="871"><span data-dcnode-id="872" instrument_node="">Athletes are able to better manage their air intake thanks to the lung capacity. The heavy breathing that comes from practicing and competing aids in the process as well. Also A vital capacity of an athlete is higher than a non-athlete because they are trained to o hard work so their lung get’s bigger overtime and makes it easier for them to take long breaths when they are running or doing any other exercise. While non athlete’s doses ‘t have their lungs trained and so their lung capacity don ‘t increase because they doesn’t have that need.</span></p><span data-dcnode-id="870" instrument_node="">
</span><p data-dcnode-id="868"><span data-dcnode-id="869" instrument_node="">XSL. Evaluation It’s important to take into consideration that there exists many external factors that may alter the original results, such as not being precise enough when performing the lab, in many cases the position in which you are lying or standing might affect your total lung capacity. However, controlled this the more I could y working with the people in the same position and with the same factors such as smokers and not smokers, and trying to reduce the error the most.</span></p><span data-dcnode-id="867" instrument_node="">
</span><p data-dcnode-id="865"><span data-dcnode-id="866" instrument_node="">When repeating each performance make sure you do it in the same circumstances in order to avoid variability between data and at the same time achieve concordance between data. Weaknesses and limitations I Suggested Improvements I Variability of data I The data may vary considering the position, subject age or temperature at which the balloon is blown. However since I realize the experiment with the same conditions the data doesn’t vary a lot. In order to educe this errors all the process I recommend to do realize the experiment in the same room with the same temperature and with subjects of the same age in order to reduce the error.</span></p><span data-dcnode-id="864" instrument_node="">
</span><p data-dcnode-id="862"><span data-dcnode-id="863" instrument_node="">I Systematic errors I Systematic errors may affect the results such as the instrument at which the level of water is measured or the materials of the balloon. In this case the instrument doses ‘t affect a lot the results however, the main error could happen at the moment when the water was trespassed from the tray since I spill some I I suggest take careful measures and avoid seeing the measure of the amount of water collected in different angles, and in this way avoid systematic errors and also be careful at the moment of displaced the water from the tray.</span></p><span data-dcnode-id="861" instrument_node="">
