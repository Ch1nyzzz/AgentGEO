t.chatnoir.eu/?index=cw22&amp;url=https%3A//www.healthline.com/medical-team"><span data-dcnode-id="1075" instrument_node="">Judith Marcin, M.D.</span></a></span><span data-dcnode-id="1072" instrument_node=""> — </span><span data-dcnode-id="1068"><span data-dcnode-id="1071" instrument_node="">Written by </span><span data-dcnode-id="1069"><span data-dcnode-id="1070" instrument_node="">Elizabeth Connor</span></span></span><span data-dcnode-id="1067" instrument_node=""> — </span><span data-dcnode-id="1065"><span data-dcnode-id="1066" instrument_node=""> Updated on April 7, 2017</span></span></div></section><div data-dcnode-id="760"><nav class="css-7u7i0a" data-dcnode-id="1049" id="tab-bar-0"><ul class="css-17ztj4b" data-dcnode-id="1050"><li class="css-t753mo" data-dcnode-id="1060"><a class="css-1ggiqr2" data-dcnode-id="1061" href="#copd-risk-factors"><span data-dcnode-id="1062" instrument_node="">COPD risk factors</span></a></li><li class="css-t753mo" data-dcnode-id="1057"><a class="css-1ggiqr2" data-dcnode-id="1058" href="#symptoms-in-nonsmokers"><span data-dcnode-id="1059" instrument_node="">Symptoms in non-smokers</span></a></li><li class="css-t753mo" data-dcnode-id="1054"><a class="css-1ggiqr2" data-dcnode-id="1055" href="#diagnosis"><span data-dcnode-id="1056" instrument_node="">Diagnosis</span></a></li><li class="css-t753mo" data-dcnode-id="1051"><a class="css-1ggiqr2" data-dcnode-id="1052" href="#prevention"><span data-dcnode-id="1053" instrument_node="">Prevention</span></a></li></ul></nav><article class="article-body css-d2znx6 undefined" data-dcnode-id="762"><div class="css-1u22pos" data-dcnode-id="963"><span data-dcnode-id="1048" style="font-size:0;line-height:0"></span><p class="h2" data-dcnode-id="1046"><span data-dcnode-id="1047" instrument_node=""> The link between smoking and COPD</span></p><p data-dcnode-id="1041"><span data-dcnode-id="1045" instrument_node="">Smoking is a major risk factor for </span><a class="content-link css-5r4717" data-dcnode-id="1043" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.healthline.com/health/copd"><span data-dcnode-id="1044" instrument_node="">chronic obstructive pulmonary disorder</span></a><span data-dcnode-id="1042" instrument_node=""> (COPD). But not all smokers get COPD, and not everyone who has COPD smokes. Even people who have never smoked can get COPD.</span></p><p data-dcnode-id="1039"><span data-dcnode-id="1040" instrument_node="">COPD is a general term used for conditions marked by permanent inflammation of the bronchi, the tubes that bring air into the lungs. COPD also includes damage to the air sacks of the lungs. This can make it hard to breathe.</span></p><p data-dcnode-id="1021"><span data-dcnode-id="1038" instrument_node="">COPD affects an estimated </span><hl-trusted-source class="css-12hs4c5" data-dcnode-id="1031" rationale="Highly respected database from the National Institutes of Health" source="PubMed Central"><a class="content-link css-5r4717" data-dcnode-id="1033" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.ncbi.nlm.nih.gov/pmc/articles/PMC3762609/" rel="noopener noreferrer" target="_blank"><span data-dcnode-id="1037" instrument_node="">65 million</span><span class="css-1mdvjzu icon-hl-trusted-source-after" data-dcnode-id="1034"><span class="sro" data-dcnode-id="1035"><span data-dcnode-id="1036" instrument_node="">Trusted Source</span></span></span></a><span data-dcnode-id="1032"></span></hl-trusted-source><span data-dcnode-id="1030" instrument_node=""> people worldwide. One </span><hl-trusted-source class="css-12hs4c5" data-dcnode-id="1023" rationale="Governmental authority" source="Centers for Disease Control and Prevention (CDC)"><a class="content-link css-5r4717" data-dcnode-id="1025" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.cdc.gov/copd/index.html" rel="noopener noreferrer" target="_blank"><span data-dcnode-id="1029" instrument_node="">estimate</span><span class="css-1mdvjzu icon-hl-trusted-source-after" data-dcnode-id="1026"><span class="sro" data-dcnode-id="1027"><span data-dcnode-id="1028" instrument_node="">Trusted Source</span></span></span></a><span data-dcnode-id="1024"></span></hl-trusted-source><span data-dcnode-id="1022" instrument_node=""> from the U.S. Centers for Disease Control and Prevention puts the number of people in the United States with COPD at 15.7 million. The actual number is probably much higher, as researchers believe that many more people are not aware that they have the condition. </span></p><p data-dcnode-id="1016"><span data-dcnode-id="1020" instrument_node="">Also, studies suggest the disease is much more common among non-smokers than previously believed. Between 10 and 20 percent of people with COPD have never smoked. A recent large </span><a class="content-link css-5r4717" data-dcnode-id="1018" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//thorax.bmj.com/content/70/9/822" rel="noopener noreferrer" target="_blank"><span data-dcnode-id="1019" instrument_node="">study</span></a><span data-dcnode-id="1017" instrument_node=""> of Canadian residents found that non-smokers make up almost 30 percent of those with COPD.</span></p><p data-dcnode-id="1012"><strong data-dcnode-id="1013"><a class="content-link css-5r4717" data-dcnode-id="1014" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.healthline.com/health/copd/effects-on-lungs"><span data-dcnode-id="1015" instrument_node="">Learn more: COPD’s effects on the lungs in pictures »</span></a></strong></p><div data-dcnode-id="970" id="m27614131-3eac-4106-aa33-ce556c5dd800"><div data-dcnode-id="971"><form data-dcnode-id="972" novalidate=""><div data-dcnode-id="973"><section class="css-11k39sg" data-dcnode-id="974"><div class="css-1x6oboy" data-dcnode-id="1011"></div><div class="css-1rx43lg" data-dcnode-id="976"><div class="css-7nn8wn" data-dcnode-id="1007"><div class="css-k008qs" data-dcnode-id="1008"><a class="css-yvmi2y" data-dcnode-id="1009" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.healthline.com/health/copd/inline%3FcorrelationId%3Dc307bc99-763b-459e-bc15-d4414fa596f2" rel="noopener noreferrer sponsored" target="_blank"><lazy-image alt="SIGN UP NOW" classname="css-5enzam" data-dcnode-id="1010" src="//i0.wp.com/images-prod.healthline.com/hlcmsresource/images/hl-newsletter-new/img/COPD.png?w=1155" srcset="//i0.wp.com/images-prod.healthline.com/hlcmsresource/images/hl-newsletter-new/img/COPD.png?w=483 230w"></lazy-image></a></div></div><div class="css-1rr4qq7" data-dcnode-id="977"><div class="css-rp3d6" data-dcnode-id="978"><div class="css-8rcmo0" data-dcnode-id="1005"><span data-dcnode-id="1006" instrument_node="">HEALTHLINE NEWSLETTER</span></div><div class="css-kp58b2" data-dcnode-id="1000"><div class="css-1dxn28w" data-dcnode-id="1003"><span data-dcnode-id="1004" instrument_node="">Get our weekly COPD newsletter</span></div><p class="css-1cr3nkl" data-dcnode-id="1001"><span data-dcnode-id="1002" instrument_node="">To help meet the challenges of living with COPD, we'll send  support and advice for both patients and caregivers.</span></p></div><div class="css-8nu43k" data-dcnode-id="979"><div data-dcnode-id="980"><div class="css-12wslxx" data-dcnode-id="990"><div class="css-11eiosp" data-dcnode-id="995"><div class="css-1rr4qq7" data-dcnode-id="996"><div class="css-qddt1o" data-dcnode-id="998"><span data-dcnode-id="999" instrument_node="">Enter your email</span></div><input aria-label="Enter your email" class="css-kljuul" data-dcnode-id="997" name="email" placeholder="Enter your email" type="email" value=""></div></div><button class="css-1hitip5" data-dcnode-id="991" type="submit"><span class="css-14ktbsh" data-dcnode-id="992"><span class="css-1huyk6v" data-dcnode-id="993"><span data-dcnode-id="994" instrument_node="">SIGN UP NOW</span></span></span></button></div><div class="css-6jxmuv" data-dcnode-id="986"><label class="css-i6imnh" data-dcnode-id="987"><input class="css-1law5zt" data-dcnode-id="989" name="withNewsletter" type="checkbox" value="1"><span data-dcnode-id="988" instrument_node="">Also sign up for our popular Heart Health newsletter</span></label></div><p class="css-nz9v2z" data-dcnode-id="981"><span data-dcnode-id="985" instrument_node="">Your </span><a class="css-1pule1j" data-dcnode-id="983" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.healthline.com/privacy-policy" rel="noopener noreferrer" target="_blank"><span data-dcnode-id="984" instrument_node="">privacy</span></a><span data-dcnode-id="982" instrument_node=""> is important to us</span></p></div></div></div></div></div><div class="css-1tuviqo" data-dcnode-id="975"></div></section></div></form></div></div><div class="css-umsscj" data-dcnode-id="964"><aside class="css-0 css-0" data-dcnode-id="965"><div data-dcnode-id="966"><div class="css-10gx9pb" data-dcnode-id="967" data-empty="true"><div class="css-1hjaa0k" data-dcnode-id="969"></div><div class="css-1l7cd95" data-ad="true" data-adbridg-ad-class="inline2" data-dcnode-id="968" id="inline2__slot"></div></div></div></aside></div></div><div class="css-0" data-dcnode-id="907"><span data-dcnode-id="962" style="font-size:0;line-height:0"></span><h2 data-dcnode-id="958"><div data-dcnode-id="959"><a class="chartbeat-section" data-dcnode-id="960" name="copd-risk-factors"><span data-dcnode-id="961" instrument_node=""> Can you have COPD if you’ve never smoked?</span></a></div></h2><p data-dcnode-id="956"><span data-dcnode-id="957" instrument_node="">Both people who currently do not smoke (non-smokers) and people who have never smoked (never-smokers) can get COPD. Other risk factors besides smoking help predict COPD in never-smokers.</span></p><p data-dcnode-id="954"><span data-dcnode-id="955" instrument_node="">Four major risk factors for COPD are:</span></p><ol data-dcnode-id="929"><li data-dcnode-id="950"><strong data-dcnode-id="952"><span data-dcnode-id="953" instrument_node="">Exposure to secondhand smoke:</span></strong><span data-dcnode-id="951" instrument_node=""> Being exposed to secondhand smoke as an adult can lead to COPD.</span></li><li data-dcnode-id="946"><strong data-dcnode-id="948"><span data-dcnode-id="949" instrument_node="">Exposure to air pollution:</span></strong><span data-dcnode-id="947" instrument_node=""> You can develop COPD if you are exposed long-term to air pollution. You can also develop COPD from inhaling dust or the fumes of fuel burned for cooking or heating purposes. COPD can also be caused by chemicals or fumes found in the workplace.</span></li><li data-dcnode-id="934"><strong data-dcnode-id="944"><span data-dcnode-id="945" instrument_node="">Genetics:</span></strong><span data-dcnode-id="943" instrument_node=""> COPD has a strong genetic component. As many as </span><hl-trusted-source class="css-12hs4c5" data-dcnode-id="936" rationale="Highly respected database from the National Institutes of Health" source="PubMed Central"><a class="content-link css-5r4717" data-dcnode-id="938" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.ncbi.nlm.nih.gov/pmc/articles/PMC3447047/" rel="noopener noreferrer" target="_blank"><span data-dcnode-id="942" instrument_node="">5 percent</span><span class="css-1mdvjzu icon-hl-trusted-source-after" data-dcnode-id="939"><span class="sro" data-dcnode-id="940"><span data-dcnode-id="941" instrument_node="">Trusted Source</span></span></span></a><span data-dcnode-id="937"></span></hl-trusted-source><span data-dcnode-id="935" instrument_node=""> of people with COPD have a genetic condition known as alpha-1 antitrypsin deficiency. People with this condition have too little alpha-1 antitrypsin, a protein helps protect the lungs from damage. Having too little of it can cause your lungs to deteriorate, leading to COPD. This condition also affects the liver.</span></li><li data-dcnode-id="930"><strong data-dcnode-id="932"><span data-dcnode-id="933" instrument_node="">Age:</span></strong><span data-dcnode-id="931" instrument_node=""> Most people who have COPD are over 40 years old.</span></li></ol><p data-dcnode-id="924"><span data-dcnode-id="928" instrument_node="">Additional </span><a class="content-link css-5r4717" data-dcnode-id="926" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//journals.sagepub.com/doi/abs/10.1177/1753465813479428" rel="noopener noreferrer" target="_blank"><span data-dcnode-id="927" instrument_node="">factors</span></a><span data-dcnode-id="925" instrument_node=""> include stressors to young, developing lungs. These factors include maternal smoking during pregnancy, low birth weight, tobacco exposure in childhood, and childhood respiratory infections. These conditions might also help identify people at risk for COPD.</span></p><p data-dcnode-id="914"><span data-dcnode-id="923" instrument_node="">Having asthma may also play a role in developing COPD. One </span><hl-trusted-source class="css-12hs4c5" data-dcnode-id="916" rationale="Highly respected database from the National Institutes of Health" source="PubMed Central"><a class="content-link css-5r4717" data-dcnode-id="918" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.ncbi.nlm.nih.gov/pmc/articles/PMC4514018/" rel="noopener noreferrer" target="_blank"><span data-dcnode-id="922" instrument_node="">study</span><span class="css-1mdvjzu icon-hl-trusted-source-after" data-dcnode-id="919"><span class="sro" data-dcnode-id="920"><span data-dcnode-id="921" instrument_node="">Trusted Source</span></span></span></a><span data-dcnode-id="917"></span></hl-trusted-source><span data-dcnode-id="915" instrument_node=""> found that the presence of asthma helped predict COPD in non-smokers.</span></p><div class="css-1cg0byz" data-dcnode-id="908"><aside class="css-0 css-0" data-dcnode-id="909"><div data-dcnode-id="910"><div class="css-az6x7v" data-dcnode-id="911" data-empty="true"><div class="css-1hjaa0k" data-dcnode-id="913"></div><div class="css-itezwm" data-ad="true" data-adbridg-ad-class="inline5" data-dcnode-id="912" id="inline5__slot"></div></div></div></aside></div></div><div class="css-0" data-dcnode-id="835"><span data-dcnode-id="906" style="font-size:0;line-height:0"></span><h2 data-dcnode-id="902"><div data-dcnode-id="903"><a class="chartbeat-section" data-dcnode-id="904" name="symptoms-in-nonsmokers"><span data-dcnode-id="905" instrument_node=""> Are COPD symptoms different for non-smokers?</span></a></div></h2><p data-dcnode-id="900"><span data-dcnode-id="901" instrument_node="">Common symptoms of COPD include:</span></p><ul data-dcnode-id="885"><li data-dcnode-id="898"><span data-dcnode-id="899" instrument_node="">needing to clear your throat often due to excessive mucus</span></li><li data-dcnode-id="896"><span data-dcnode-id="897" instrument_node="">being short of breath, even after mild exercise</span></li><li data-dcnode-id="894"><span data-dcnode-id="895" instrument_node="">wheezing, or noisy breathing </span></li><li data-dcnode-id="892"><span data-dcnode-id="893" instrument_node="">chest tightness</span></li><li data-dcnode-id="890"><span data-dcnode-id="891" instrument_node="">chronic cough</span></li><li data-dcnode-id="888"><span data-dcnode-id="889" instrument_node="">having low energy</span></li><li data-dcnode-id="886"><span data-dcnode-id="887" instrument_node="">recurrent respiratory infections</span></li></ul><p data-dcnode-id="875"><span data-dcnode-id="884" instrument_node="">The symptoms of COPD are the same in both smokers and non-smokers. But research has shown that never-smokers with COPD may have milder symptoms than both current and former smokers. A Danish </span><hl-trusted-source class="css-12hs4c5" data-dcnode-id="877" rationale="Highly respected journal,Expert written journal,Peer reviewed journal" source="The Lancet"><a class="content-link css-5r4717" data-dcnode-id="879" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.thelancet.com/journals/lanres/article/PIIS2213-2600%2813%2970137-1/abstract%3Frss%3Dyes" rel="noopener noreferrer" target="_blank"><span data-dcnode-id="883" instrument_node="">study</span><span class="css-1mdvjzu icon-hl-trusted-source-after" data-dcnode-id="880"><span class="sro" data-dcnode-id="881"><span data-dcnode-id="882" instrument_node="">Trusted Source</span></span></span></a><span data-dcnode-id="878"></span></hl-trusted-source><span data-dcnode-id="876" instrument_node=""> looked at the results of 6,623 people with COPD. Of these people, 1,476 had never smoked, 2,696 were former smokers, and 2,451 were current smokers. People who had never smoked experienced fewer symptoms, a milder form of the disease, and less inflammation than current or former smokers.</span></p><p data-dcnode-id="870"><span data-dcnode-id="874" instrument_node="">COPD is often first diagnosed when people raise concerns with their doctor because shortness of breath has become a problem. However, the </span><a class="content-link css-5r4717" data-dcnode-id="872" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.mayoclinic.org/diseases-conditions/copd/symptoms-causes/dxc-20204886" rel="noopener noreferrer" target="_blank"><span data-dcnode-id="873" instrument_node="">symptoms</span></a><span data-dcnode-id="871" instrument_node=""> of COPD usually don’t appear until there is already significant lung damage. Because the disease can be less severe in non-smokers, this can lead to them being diagnosed with COPD at a later age. </span></p><p data-dcnode-id="868"><span data-dcnode-id="869" instrument_node="">Non-smokers also have fewer comorbidities, or other conditions that occur at the same time as COPD. But non-smokers can still experience flare-ups of their COPD symptoms, known as exacerbations.</span></p><div data-dcnode-id="842" id="m765d0075-7b39-4d8f-b7f9-8d09dfdee63b"><div data-dcnode-id="843"><div data-dcnode-id="844"><div class="css-get1og" data-dcnode-id="845"><div class="css-lhqo36" data-dcnode-id="852"><h2 class="css-ijren8" data-dcnode-id="866"><span data-dcnode-id="867" instrument_node="">FEATURED</span></h2><h3 class="css-6j1tng" data-dcnode-id="863"><a class="css-yvmi2y" data-dcnode-id="864" data-event="Driver Content Promo_Single Article Take Action|Driver Click_/health/copd/non-smoker_middle_contentmerchandising_copd_middle_hl_trelegy20_37391|slot1_/health/copd/breathing-exercises" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.healthline.com/health/copd/breathing-exercises%3Fsource%3Dnative%26medium%3Dntd%26subid%3Dcontentmerchandising_copd_middle_hl_trelegy20_37391%26correlationId%3D04f7b1e7-33f9-4ce3-98ea-4783826c985c"><span data-dcnode-id="865" instrument_node="">5 Breathing Exercises with COPD</span></a></h3><picture class="css-u71ja5" data-dcnode-id="859"><source data-dcnode-id="862" media="(min-width: 990px)" srcset="https://post.healthline.com/wp-content/uploads/2020/03/12256-Breathing_Exercises_with_COPD-732x549-Thumbnail.jpg"><source data-dcnode-id="861" media="(min-width: 768px)" srcset="https://post.healthline.com/wp-content/uploads/2020/03/12256-Breathing_Exercises_with_COPD-732x549-Thumbnail.jpg"><img alt="" data-dcnode-id="860" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//post.healthline.com/wp-content/uploads/2020/03/12256-Breathing_Exercises_with_COPD-732x549-Thumbnail.jpg&amp;raw"></picture><p class="css-1nubf86" data-dcnode-id="857"><span data-dcnode-id="858" instrument_node="">People with COPD who use breathing exercises report improvements in exercise capacity, reduced shortness of breath and improved quality of life.</span></p><a class="css-1813szp" data-dcnode-id="853" data-event="Driver Content Promo_Single Article Take Action|Driver Click_/health/copd/non-smoker_middle_contentmerchandising_copd_middle_hl_trelegy20_37391|slot1_/health/copd/breathing-exercises" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.healthline.com/health/copd/breathing-exercises%3Fsource%3Dnative%26medium%3Dntd%26subid%3Dcontentmerchandising_copd_middle_hl_trelegy20_37391%26correlationId%3D04f7b1e7-33f9-4ce3-98ea-4783826c985c"><span class="css-14ktbsh" data-dcnode-id="854"><span class="css-1huyk6v" data-dcnode-id="855"><span data-dcnode-id="856" instrument_node="">LEARN MORE</span></span></span></a></div><div class="css-1537uod" data-dcnode-id="851"></div><div class="css-x1qz84" data-dcnode-id="846"><picture class="css-9z7k4b" data-dcnode-id="847"><source data-dcnode-id="850" media="(min-width: 990px)" srcset="https://post.healthline.com/wp-content/uploads/2020/03/12256-Breathing_Exercises_with_COPD-732x549-Thumbnail.jpg"><source data-dcnode-id="849" media="(min-width: 768px)" srcset="https://post.healthline.com/wp-content/uploads/2020/03/12256-Breathing_Exercises_with_COPD-732x549-Thumbnail.jpg"><img alt="" data-dcnode-id="848" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//post.healthline.com/wp-content/uploads/2020/03/12256-Breathing_Exercises_with_COPD-732x549-Thumbnail.jpg&amp;raw"></picture></div></div></div></div></div><div class="css-umsscj" data-dcnode-id="836"><aside class="css-0 css-0" data-dcnode-id="837"><div data-dcnode-id="838"><div class="css-10gx9pb" data-dcnode-id="839" data-empty="true"><div class="css-1hjaa0k" data-dcnode-id="841"></div><div class="css-1l7cd95" data-ad="true" data-adbridg-ad-class="inline8" data-dcnode-id="840" id="inline8__slot"></div></div></div></aside></div></div><div class="css-0" data-dcnode-id="776"><span data-dcnode-id="834" style="font-size:0;line-height:0"></span><h2 data-dcnode-id="830"><div data-dcnode-id="831"><a class="chartbeat-section" data-dcnode-id="832" name="diagnosis"><span data-dcnode-id="833" instrument_node=""> Diagnosing COPD in non-smokers</span></a></div></h2><p data-dcnode-id="822"><span data-dcnode-id="829" instrument_node="">There is no single test to diagnose COPD. Doctors rely on your medical history, physical examination, lung function tests, and chest imaging tests like an </span><a class="content-link css-5r4717" data-dcnode-id="827" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.healthline.com/health/chest-x-ray"><span data-dcnode-id="828" instrument_node="">X-ray</span></a><span data-dcnode-id="826" instrument_node=""> or </span><a class="content-link css-5r4717" data-dcnode-id="824" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.healthline.com/health/ct-scan"><span data-dcnode-id="825" instrument_node="">CT scan</span></a><span data-dcnode-id="823" instrument_node="">.</span></p><p data-dcnode-id="817"><span data-dcnode-id="821" instrument_node="">A key tool used for diagnosing COPD is the lung function test known as </span><a class="content-link css-5r4717" data-dcnode-id="819" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.healthline.com/health/copd/spirometry-score"><span data-dcnode-id="820" instrument_node="">spirometry</span></a><span data-dcnode-id="818" instrument_node="">, a test that measures airflow out of your lungs. However, some doctors may rely instead on the presence of smoking and physical symptoms. That has led to a concern that the disease might be overdiagnosed in smokers and underdiagnosed in non-smokers.</span></p><p data-dcnode-id="791"><span data-dcnode-id="816" instrument_node="">To help primary care doctors identify who should be tested for COPD with spirometry, researchers have been working on a simple, five-question test. It’s called </span><a class="content-link css-5r4717" data-dcnode-id="814" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.atsjournals.org/doi/abs/10.1164/rccm.201603-0622OC" rel="noopener noreferrer" target="_blank"><span data-dcnode-id="815" instrument_node="">CAPTURE</span></a><span data-dcnode-id="813" instrument_node="">: </span><strong data-dcnode-id="811"><span data-dcnode-id="812" instrument_node="">C</span></strong><span data-dcnode-id="810" instrument_node="">OPD </span><strong data-dcnode-id="808"><span data-dcnode-id="809" instrument_node="">A</span></strong><span data-dcnode-id="807" instrument_node="">ssessment in </span><strong data-dcnode-id="805"><span data-dcnode-id="806" instrument_node="">P</span></strong><span data-dcnode-id="804" instrument_node="">rimary Care </span><strong data-dcnode-id="802"><span data-dcnode-id="803" instrument_node="">T</span></strong><span data-dcnode-id="801" instrument_node="">o Identify </span><strong data-dcnode-id="799"><span data-dcnode-id="800" instrument_node="">U</span></strong><span data-dcnode-id="798" instrument_node="">ndiagnosed </span><strong data-dcnode-id="796"><span data-dcnode-id="797" instrument_node="">R</span></strong><span data-dcnode-id="795" instrument_node="">espiratory Disease and </span><strong data-dcnode-id="793"><span data-dcnode-id="794" instrument_node="">E</span></strong><span data-dcnode-id="792" instrument_node="">xacerbation Risk. </span></p><p data-dcnode-id="783"><span data-dcnode-id="790" instrument_node="">“It actually does not include a question about smoking,” says Dr. MeiLan King Han, an associate professor of medicine at the University of Michigan. She says that according to their </span><a class="content-link css-5r4717" data-dcnode-id="788" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.atsjournals.org/doi/abs/10.1164/rccm.201603-0622OC" rel="noopener noreferrer" target="_blank"><span data-dcnode-id="789" instrument_node="">research</span></a><span data-dcnode-id="787" instrument_node="">, factors other than smoking were more likely to predict who was likely to be diagnosed with COPD. Dr. Han is one of the researchers who helped develop the </span><a class="content-link css-5r4717" data-dcnode-id="785" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.thoracic.org/about/newsroom/press-releases/journal/2016/novel-approach-in-primary-care-setting-may-help-identify-patients-with-copd.php" rel="noopener noreferrer" target="_blank"><span data-dcnode-id="786" instrument_node="">questionnaire</span></a><span data-dcnode-id="784" instrument_node="">, which appears below.</span></p><p data-dcnode-id="779"><strong data-dcnode-id="780"><a class="content-link css-5r4717" data-dcnode-id="781" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.healthline.com/health/copd/and-you-symptom-management"><span data-dcnode-id="782" instrument_node="">Learn more: How to manage COPD »</span></a></strong></p><div class="css-1sxbpyw" data-adbridg-ad-class="hl-incontent" data-dcnode-id="778" id="hl-incontent-video-ad"></div><div class="css-1h5aco8" data-dcnode-id="777" id="div-gpt-ad-out-of-page"></div></div><div class="css-0" data-dcnode-id="763"><span data-dcnode-id="775" style="font-size:0;line-height:0"></span><h2 data-dcnode-id="771"><div data-dcnode-id="772"><a class="chartbeat-section" data-dcnode-id="773" name="prevention"><span data-dcnode-id="774" instrument_node=""> Preventing COPD</span></a></div></h2><p data-dcnode-id="769"><span data-dcnode-id="770" instrument_node="">Tips for preventing for COPD usually revolve around telling smokers to quit. If you don’t smoke, don’t start. Another way to reduce your risk of developing COPD is by avoiding secondhand smoke, air pollution, and other fumes or chemicals.</span></p><p data-dcnode-id="764"><span data-dcnode-id="768" instrument_node="">There’s no cure for COPD, but you can prevent the condition from becoming worse. Getting a diagnosis early on and following your </span><a class="content-link css-5r4717" data-dcnode-id="766" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.healthline.com/health/copd/treatment-options"><span data-dcnode-id="767" instrument_node="">treatment plan</span></a><span data-dcnode-id="765" instrument_node=""> are the most important steps to slowing the progression of your COPD.</span></p></div></article><div data-dcnode-id="761" id="bottom-of-article"></div></div><p class="css-1kir5of" data-dcnode-id="757"><span data-dcnode-id="758"><span data-dcnode-id="759" instrument_node=""> Last medically reviewed on  April 7, 2017</span></span></p><div class="css-zvkybb" data-dcnode-id="524"><div class="css-55guol" data-dcnode-id="546"><div aria-controls="article-resources" aria-expanded="false" class="css-ln6pc0" data-dcnode-id="748" role="button"><p class="css-lkhgkk" data-dcnode-id="749"><span class="css-fjmckk icon-hlvideo-minus" data-dcnode-id="756"></span><span class="css-fjmckk icon-hlvideo-plus" data-dcnode-id="755"></span><span data-dcnode-id="754" instrument_node=""> </span><span class="css-11nuv7j" data-dcnode-id="752"><span data-dcnode-id="753" instrument_node="">19 sources</span></span><span class="sro" data-dcnode-id="750"><span data-dcnode-id="751" instrument_node="">collapsed</span></span></p></div><div class="css-j247ue" data-dcnode-id="547" id="article-resources" role="region"><div class="css-2udk3k" data-dcnode-id="741"><span data-dcnode-id="747" instrument_node="">Healthline has strict sourcing guidelines and relies on peer-reviewed studies, academic research institutions, and medical associations. We avoid using tertiary references. You can learn more about how we ensure our content is accurate and current by reading our</span><span data-dcnode-id="745" instrument_node=""> </span><a class="css-5r4717" data-dcnode-id="743" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.healthline.com/process"><span data-dcnode-id="744" instrument_node="">editorial policy</span></a><span data-dcnode-id="742" instrument_node="">.</span></div><ul class="css-1gxh91s" data-dcnode-id="548"><li class="css-dp76we" data-dcnode-id="734"><cite data-dcnode-id="735"><span
