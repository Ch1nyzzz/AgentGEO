</span><div class="post-image" data-dcnode-id="1034"><span data-dcnode-id="1042" instrument_node="">
</span><a data-dcnode-id="1038" data-rel="penci-gallery-image-content" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//d2goauph7ju525.cloudfront.net/wp-content/uploads/2021/07/0F4A7768-750.jpg"><span data-dcnode-id="1041" instrument_node=""> </span><img alt="" class="attachment-penci-full-thumb size-penci-full-thumb penci-lazy wp-post-image pc-singlep-img lazyloaded error" data-dcnode-id="1040" data-ll-status="error" data-sizes="(max-width: 767px) 585px, 1170px" data-src="https://d2goauph7ju525.cloudfront.net/wp-content/uploads/2021/07/0F4A7768-750.jpg" data-srcset="https://d2goauph7ju525.cloudfront.net/wp-content/uploads/2021/07/0F4A7768-750-585x390.jpg 585w,https://d2goauph7ju525.cloudfront.net/wp-content/uploads/2021/07/0F4A7768-750.jpg" height="500" sizes="(max-width: 767px) 585px, 1170px" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//d2goauph7ju525.cloudfront.net/wp-content/uploads/2021/07/0F4A7768-750.jpg&amp;raw" srcset="https://d2goauph7ju525.cloudfront.net/wp-content/uploads/2021/07/0F4A7768-750-585x390.jpg 585w,https://d2goauph7ju525.cloudfront.net/wp-content/uploads/2021/07/0F4A7768-750.jpg" width="750"><span data-dcnode-id="1039" instrument_node="">

</span><div class="header-standard header-classic single-header" data-dcnode-id="1004"><span data-dcnode-id="1032" instrument_node="">
</span><h1 class="post-title single-post-title entry-title" data-dcnode-id="1030"><span data-dcnode-id="1031" instrument_node="">High Altitude Training</span></h1><span data-dcnode-id="1029" instrument_node="">
</span><div class="penci-hide-tagupdated" data-dcnode-id="1019"><span data-dcnode-id="1028" instrument_node="">
</span><span class="author-italic author vcard" data-dcnode-id="1024"><span data-dcnode-id="1027" instrument_node=""> </span><a class="url fn n" data-dcnode-id="1025" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//ultrarunning.com/author/iansharman/"><span data-dcnode-id="1026" instrument_node="">Ian Sharman</span></a></span><span data-dcnode-id="1023" instrument_node="">
</span><time class="entry-date published" data-dcnode-id="1021" datetime="2021-07-07T16:40:35-07:00"><span data-dcnode-id="1022" instrument_node="">07/07/2021</span></time><span data-dcnode-id="1020" instrument_node=""> </span></div><span data-dcnode-id="1018" instrument_node="">
</span><div class="post-box-meta-single" data-dcnode-id="1006"><span data-dcnode-id="1017" instrument_node="">
</span><span class="author-post byline" data-dcnode-id="1012"><span class="author vcard" data-dcnode-id="1013"><span data-dcnode-id="1016" instrument_node=""> </span><a class="author-url url fn n" data-dcnode-id="1014" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//ultrarunning.com/author/iansharman/"><span data-dcnode-id="1015" instrument_node="">Ian Sharman</span></a></span></span><span data-dcnode-id="1011" instrument_node="">
</span><span data-dcnode-id="1008"><time class="entry-date published" data-dcnode-id="1009" datetime="2021-07-07T16:40:35-07:00"><span data-dcnode-id="1010" instrument_node="">07/07/2021</span></time></span><span data-dcnode-id="1007" instrument_node="">
</span></div><span data-dcnode-id="1005" instrument_node="">
</span></div><span data-dcnode-id="1003" instrument_node="">
</span><div class="post-entry blockquote-style-1" data-dcnode-id="844"><span data-dcnode-id="1002" instrument_node="">
</span><div class="inner-post-entry entry-content" data-dcnode-id="846" id="penci-post-entry-inner"><span data-dcnode-id="1001" instrument_node="">
</span><p data-dcnode-id="999"><span data-dcnode-id="1000" instrument_node="">People who’ve lived at altitude for generations, like Tibetans and Andeans, show genetic adaptations to altitude to overcome the lower barometric pressure and corresponding lower oxygen density in the air. However, the main adaptations that occur are related to immediately reduced blood plasma volume (thus raising your hematocrit level since your hemoglobin per unit of blood is higher), then over days your body releases more natural EPO to increase red blood cell production to transport more oxygen. You’ll also find your maximal heart rate is lower, even once you’re fully adapted to altitude, plus your breathing will adapt after initially leaving you more out of breath. The process is more detailed and complex, but I want to get to the practical applications for training.</span></p><span data-dcnode-id="998" instrument_node="">
</span><p data-dcnode-id="996"><span data-dcnode-id="997" instrument_node="">Below is a high level overview which aims to prepare runners for the specifics of dealing with high altitude races, as defined below. In particular, I’ve used Leadville Trail 100-miler as an example since it’s one of the most historic ultras, and a personal favorite where I’ve enjoyed battling for wins and coached two other winners and numerous finishers.</span></p><span data-dcnode-id="995" instrument_node="">
</span><p data-dcnode-id="992"><strong data-dcnode-id="993"><span data-dcnode-id="994" instrument_node="">Altitude and Side Effects</span></strong></p><span data-dcnode-id="991" instrument_node="">
</span><p data-dcnode-id="989"><span data-dcnode-id="990" instrument_node="">Generally, altitude can be separated into three practical bands for the effects it has on physical activity:</span></p><span data-dcnode-id="988" instrument_node="">
</span><ol data-dcnode-id="968"><span data-dcnode-id="987" instrument_node="">
</span><li data-dcnode-id="980"><strong data-dcnode-id="985"><span data-dcnode-id="986" instrument_node="">Low Altitude</span></strong><span data-dcnode-id="984" instrument_node=""> – up to 4,000 ft (1,219m): Almost no effect on performance with </span><a data-dcnode-id="982" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//runsmartproject.com/calculator/"><span data-dcnode-id="983" instrument_node="">Jack Daniels’ VDOT Running Calculator</span></a><span data-dcnode-id="981" instrument_node="">&nbsp;estimating a 7.7-second/mile slow down in a three-hour marathon at 4,000 ft due to lower oxygen uptake per breath, thus slightly lowering VO₂max. No other noticeable ill effects.</span></li><span data-dcnode-id="979" instrument_node="">
</span><li data-dcnode-id="975"><strong data-dcnode-id="977"><span data-dcnode-id="978" instrument_node="">Medium Altitude</span></strong><span data-dcnode-id="976" instrument_node=""> – between 4,000–8,000 ft (1,219–2,438m): More pronounced slowdown but usually no illness. Jack Daniels’ estimate for the effect on a three-hour marathon at 8,000ft is slowing 27.8 seconds/mile. Races at these altitudes can generally still be undertaken coming straight from sea level.</span></li><span data-dcnode-id="974" instrument_node="">
</span><li data-dcnode-id="970"><strong data-dcnode-id="972"><span data-dcnode-id="973" instrument_node="">High Altitude</span></strong><span data-dcnode-id="971" instrument_node=""> – above 8,000 ft (2,438m) especially above 10,000 ft (3,048m): Possibility of Acute Mountain Sickness (AMS) with symptoms similar to a hangover, including headache and nausea. Risks increase as altitude rises, including High Altitude Pulmonary Edema (HAPE) with a build-up of fluid on the lungs that can be very dangerous, or High Altitude Cerebral Edema (HACE) with fluid on the brain which is life threatening and requires immediate medical attention. Plus, the difficulties and dangers of exercising at altitude increase exponentially as you get higher, but even small reductions in altitude quickly help you feel better.</span></li><span data-dcnode-id="969" instrument_node="">
</span></ol><span data-dcnode-id="967" instrument_node="">
</span><p data-dcnode-id="965"><span data-dcnode-id="966" instrument_node="">Data on running at really high altitude is scarce, but one of the greatest mountain runners of all time (and the course record holder at Leadville), Matt Carpenter, ran a 2:52 marathon at 14,350 ft (4,374m) and an amazing 3:22 at 17,060 ft (5,200m) to show the relative equivalent upper limits.</span></p><span data-dcnode-id="964" instrument_node="">
</span><p data-dcnode-id="962"><span data-dcnode-id="963" instrument_node="">The City of Leadville is at 10,200 ft (3,109m) and most of the Leadville 100-miler is above that altitude, topping out at 12,600 ft (3,840m). Therefore, the advice below applies to races run in the “High Altitude” category for the majority of the race, and does not pertain to events where there are brief sections that high, such as Ultra-Trail du Mont Blanc (UTMB) which has a few passes at just over 8,000 ft.</span></p><span data-dcnode-id="961" instrument_node="">
</span><p data-dcnode-id="958"><strong data-dcnode-id="959"><span data-dcnode-id="960" instrument_node="">The Ideal Way to Adapt </span></strong></p><span data-dcnode-id="957" instrument_node="">
</span><p data-dcnode-id="955"><span data-dcnode-id="956" instrument_node="">Unlike most training adaptations like speed work or heat training, altitude adaptation occurs mainly due to non-stop exposure to altitude and is unrelated to effort, so simply hiking or even sleeping are fine. Most sources recommend at least 12 hours a day at altitude to see a benefit, with around 12–16 hours being a common estimate. That means that altitude tents are unlikely to be of much use unless you can stay in them for longer than just while you sleep. However, bear in mind that most research in this area is either for providing altitude training benefits for sea level professional road or track racing, or for survival for mountaineers. Our niche of racing at high altitude is small enough to avoid much attention.</span></p><span data-dcnode-id="954" instrument_node="">
</span><p data-dcnode-id="952"><span data-dcnode-id="953" instrument_node="">One key consideration is that increases in red blood cells are significantly greater above around 7–8,000 ft, so even athletes living in places like Boulder (5,328 ft) or Flagstaff (6,909 feet) will benefit significantly from going up higher. This is also borne out by the general experience of Colorado runners taking on races like Leadville and Hardrock.</span></p><span data-dcnode-id="951" instrument_node="">
</span><div class="wp-caption alignright" data-dcnode-id="946" id="attachment_218182" style="width: 310px"><a data-dcnode-id="949" data-rel="penci-gallery-image-content" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//d2goauph7ju525.cloudfront.net/wp-content/uploads/2021/07/Leadville_Liza-Howard-photo-by-Caleb-Wilson-750.jpg"><img alt="" aria-describedby="caption-attachment-218182" class="wp-image-218182" data-dcnode-id="950" height="452" sizes="(max-width: 300px) 100vw, 300px" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//d2goauph7ju525.cloudfront.net/wp-content/uploads/2021/07/Leadville_Liza-Howard-photo-by-Caleb-Wilson-750-199x300.jpg&amp;raw" srcset="https://d2goauph7ju525.cloudfront.net/wp-content/uploads/2021/07/Leadville_Liza-Howard-photo-by-Caleb-Wilson-750-199x300.jpg 199w, https://d2goauph7ju525.cloudfront.net/wp-content/uploads/2021/07/Leadville_Liza-Howard-photo-by-Caleb-Wilson-750-250x377.jpg 250w, https://d2goauph7ju525.cloudfront.net/wp-content/uploads/2021/07/Leadville_Liza-Howard-photo-by-Caleb-Wilson-750-120x180.jpg 120w, https://d2goauph7ju525.cloudfront.net/wp-content/uploads/2021/07/Leadville_Liza-Howard-photo-by-Caleb-Wilson-750-332x500.jpg 332w, https://d2goauph7ju525.cloudfront.net/wp-content/uploads/2021/07/Leadville_Liza-Howard-photo-by-Caleb-Wilson-750.jpg 498w" width="300"></a><p class="wp-caption-text" data-dcnode-id="947" id="caption-attachment-218182"><span data-dcnode-id="948" instrument_node="">Liza Howard at Leadville 100. Photo: Caleb Wilson</span></p></div><span data-dcnode-id="945" instrument_node="">
</span><p data-dcnode-id="943"><span data-dcnode-id="944" instrument_node="">The first few days at high altitude are tough on the body due to the difficulties of breathing with little positive adaptation kicking in. Two-time Leadville winner and flatlander from Texas, Liza Howard, would arrive 10–12 days pre-race in Leadville and have a headache and lack of appetite for the first couple of days, then find things gradually improving each day. Arriving anywhere from 2–6 days before the race is typically the worst option and it’s only by around day seven that your body will overcome the initial lack of adaptation. By around 28 days, the vast majority of altitude adaptations have occurred so the optimum time to arrive is 14–28 days before the race, which also fits in with tapering. Any longer will make it difficult to train hard during peak training. In fact, 2–4 weeks of light hiking to altitudes above race altitude is the perfect way to taper as well as maximize how good you’ll feel at the higher points during the race.</span></p><span data-dcnode-id="942" instrument_node="">
</span><p data-dcnode-id="940"><span data-dcnode-id="941" instrument_node="">I don’t recommend arriving within a couple days of the race, which is common for most lower altitude events. At the least, you’ll compromise on performance, but the likelihood of some form of altitude sickness ending your race will be significantly higher than if you can arrive a week or more prior to the start. Personally, I arrive at altitudes of 9,000 ft and above two weeks out from Leadville, and hike up 14ers regularly until the final few days.</span></p><span data-dcnode-id="939" instrument_node="">
</span><p data-dcnode-id="936"><strong data-dcnode-id="937"><span data-dcnode-id="938" instrument_node="">Second Best Option: Heat Training</span></strong></p><span data-dcnode-id="935" instrument_node="">
</span><p data-dcnode-id="933"><span data-dcnode-id="934" instrument_node="">Not everyone has over a week of spare time to spend at altitude, so the next best way to improve how you feel at altitude is through heat training. This can be done over a period of around three weeks with around 10 sessions of an hour each where you get uncomfortably hot, ideally while exercising. Wearing extra layers of clothing can simulate this, but even a hot tub or sauna will be of use.</span></p><span data-dcnode-id="932" instrument_node="">
</span><p data-dcnode-id="930"><span data-dcnode-id="931" instrument_node="">All other modalities for preparing for altitude, such as masks or legal supplements, are likely to be marginal at best and harmful to your training at worst. However, the fitter you are the more efficient your body is at using oxygen, so it’s easier to keep your intensity sustainable at altitude. Therefore, simply getting faster and better trained for the specific terrain of your target race will definitely help.</span></p><span data-dcnode-id="929" instrument_node="">
</span><p data-dcnode-id="926"><strong data-dcnode-id="927"><span data-dcnode-id="928" instrument_node="">Key Takeaways</span></strong></p><span data-dcnode-id="925" instrument_node="">
</span><ul data-dcnode-id="905"><span data-dcnode-id="924" instrument_node="">
</span><li data-dcnode-id="922"><span data-dcnode-id="923" instrument_node="">Altitude training is a lot of hassle and luckily isn’t essential for races below 8,000 feet.</span></li><span data-dcnode-id="921" instrument_node="">
</span><li data-dcnode-id="919"><span data-dcnode-id="920" instrument_node="">Staying at altitudes close to your target race’s altitude makes the biggest difference, ideally for 1-4 weeks.</span></li><span data-dcnode-id="918" instrument_node="">
</span><li data-dcnode-id="916"><span data-dcnode-id="917" instrument_node="">Heat training helps speed up the adaptation to altitude to compensate for less time at altitude pre-race, but the exact relationship hasn’t been quantified for this purpose. So, the one-week minimum rule for staying at altitude is still advisable.</span></li><span data-dcnode-id="915" instrument_node="">
</span><li data-dcnode-id="913"><span data-dcnode-id="914" instrument_node="">No matter how well you adapt to altitude it will still slow you down, so power-hiking becomes even more important and gradients that may be runnable at sea level will require hiking higher up.</span></li><span data-dcnode-id="912" instrument_node="">
</span><li data-dcnode-id="910"><span data-dcnode-id="911" instrument_node="">Recovery, especially sleep quality, will also be reduced at altitude, so arriving too far in advance or training hard while there may adversely affect your performance.</span></li><span data-dcnode-id="909" instrument_node="">
</span><li data-dcnode-id="907"><span data-dcnode-id="908" instrument_node="">There’s individual variability in how you adapt, plus factors like low iron may limit red blood cell creation, so some degree of trial and error is needed to find what works best for you.</span></li><span data-dcnode-id="906" instrument_node="">
</span></ul><span data-dcnode-id="904" instrument_node="">
</span><hr data-dcnode-id="903"><span data-dcnode-id="902" instrument_node="">
</span><p data-dcnode-id="899"><strong data-dcnode-id="900"><span data-dcnode-id="901" instrument_node="">References</span></strong></p><span data-dcnode-id="898" instrument_node="">

</span><p data-dcnode-id="811"><span data-dcnode-id="815" instrument_node="">Ian Sharman is an </span><a data-dcnode-id="813" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.sharmanultra.com/"><span data-dcnode-id="814" instrument_node="">ultrarunning coach</span></a><span data-dcnode-id="812" instrument_node=""> with USATF and NASM certification. He is on the Altra Running Team and has represented England for ultrarunning. He only started running in 2005 but quickly got addicted to races and became a student of the sport, interested in all types of running terrain and style of event. 

In particular, Ian loves to explore the world through running and has raced in six continents with almost 200 marathon and ultra finishes. Some highlights include setting the record for the Grand Slam of Ultrarunning in 2013, during which he won the Leadville Trail 100. He also set the fastest North American 100-mile trail time at his Rocky Raccoon 100 course record of 12:44.</span></p><span data-dcnode-id="810" instrument_node="">

</span><div class="comment-content" data-dcnode-id="773" itemprop="commentText"><p data-dcnode-id="775"><span data-dcnode-id="776" instrument_node="">So is there any benefit in going up to the high country to train? It is easy enough to get to above 10k a few times a week but live at about 6k feet. Or would this just detract from my intensity and hurt training?</span></p><span data-dcnode-id="774" instrument_node="">

</span><div class="comment-content" data-dcnode-id="739" itemprop="commentText"><p data-dcnode-id="741"><span data-dcnode-id="742" instrument_node="">It’s good to go up high to see how it feels, get mountain skills and for the beauty, but occasional trips up high for a few hours haven’t been shown to produce the adaptations to altitude that are needed for racing at high altitude. Unfortunately the best thing is simply being at altitude for longer periods non-stop, with heat training being a second best option for physical benefits. But don’t underestimate the psychological benefits and additional confidence from training up high and on terrain similar to the race.</span></p><span data-dcnode-id="740" instrument_node="">
