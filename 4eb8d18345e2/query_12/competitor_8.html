 m (1,000 ft) per day.</span><a class="superscript bibrRef" data-dcnode-id="1762" href="#afp19980415p1907-b9"><span data-dcnode-id="1763" instrument_node="">9</span></a><span data-dcnode-id="1761" instrument_node=""> The altitude where each night is spent should be no more than 305 m (1,000 ft) above the altitude of the previous night, and two nights should be spent at the same altitude every three days.</span><a class="superscript bibrRef" data-dcnode-id="1759" href="#afp19980415p1907-b24"><span data-dcnode-id="1760" instrument_node="">24</span></a><span data-dcnode-id="1758" instrument_node=""> Descent should be undertaken if symptoms occur. Sleep at night should take place at least 460 m (1,500 ft) lower than the altitude climbed during the day (“climb high, sleep low”).</span></p><p data-dcnode-id="1755"><span data-dcnode-id="1756" instrument_node="">Another option is the staged ascent. This involves traveling to an intermediate altitude and camping for several nights before continuing the ascent to the target altitude. For example, if a person is planning a prolonged trek at 3,000 to 4,300 m (10,000 to 14,000 ft), he or she should acclimatize at 1,800 to 2,500 m (6,000 to 8,000 ft) two to four days beforehand.</span></p><p data-dcnode-id="1751"><span data-dcnode-id="1754" instrument_node="">Acetazolamide can reduce the severity of AMS symptoms. The dosage is 250 to 1,000 mg per day, starting 12 to 24 hours before the climb and continuing for three to four days. Dexamethasone is useful for preventing and treating AMS and for treating HACE, but because of its side effects, including euphoria and glucosuria, it is best used for the treatment of HACE and for prophylaxis in acetazolamideintolerant (and sulfa-allergic) persons.</span><a class="superscript bibrRef" data-dcnode-id="1752" href="#afp19980415p1907-b2"><span data-dcnode-id="1753" instrument_node="">2</span></a></p><p data-dcnode-id="1747"><span data-dcnode-id="1750" instrument_node="">For more information on high-altitude medicine, visit the Himalayan Rescue Association Nepal home page at </span><a data-dcnode-id="1748" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.gorge.net/hamg/AMS-LakeLouise.html"><span data-dcnode-id="1749" instrument_node="">http://www.gorge.net/hamg/AMS-LakeLouise.html</span></a></p></div></div></div><div data-dcnode-id="1704" id="gradientContainer" style="display:none;" xmlns:xlink="http://www.w3.org/1999/xlink"><div class="afpblue" data-dcnode-id="1709"><div data-dcnode-id="1710" id="spopup" style="display: none; position: relative;"><center data-dcnode-id="1738"><p data-dcnode-id="1739"><b data-dcnode-id="1740"><span data-dcnode-id="1741" instrument_node="">Read the full article.</span></b></p></center><div class="spopuplist" data-dcnode-id="1730"><ul data-dcnode-id="1731"><li data-dcnode-id="1736"><span data-dcnode-id="1737" instrument_node="">Get immediate access, anytime, anywhere.</span></li><li data-dcnode-id="1734"><span data-dcnode-id="1735" instrument_node="">Choose a single article, issue, or full-access subscription.</span></li><li data-dcnode-id="1732"><span data-dcnode-id="1733" instrument_node="">Earn up to 6 CME credits per issue.</span></li></ul></div><center data-dcnode-id="1711"><table data-dcnode-id="1712"><tbody data-dcnode-id="1713"><tr data-dcnode-id="1714"><td data-dcnode-id="1724" style="text-align:center !important;margin:0 auto; padding:0; float:none;"><div class="spopupbottom1" data-dcnode-id="1728"><span data-dcnode-id="1729" instrument_node="">Already a member/subscriber?</span></div><br data-dcnode-id="1727"><a class="button simple loginLink" data-dcnode-id="1725" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.aafp.org/cgi-bin/lg.pl%3Fredirect%3Dhttps%3A//www.aafp.org/afp/1998/0415/p1907.html" style="margin-top:-15px;"><span data-dcnode-id="1726" instrument_node="">

d></tr><tr data-dcnode-id="368"><td align="left" colspan="1" data-dcnode-id="372" rowspan="1" valign="top"><p class="Tabledata" data-dcnode-id="373"></p></td><td align="left" colspan="1" data-dcnode-id="369" rowspan="1" valign="top"><p class="Tabledata" data-dcnode-id="370"><span data-dcnode-id="371" instrument_node="">Cough</span></p></td></tr><tr data-dcnode-id="362"><td align="left" colspan="1" data-dcnode-id="366" rowspan="1" valign="top"><p class="Tabledata" data-dcnode-id="367"></p></td><td align="left" colspan="1" data-dcnode-id="363" rowspan="1" valign="top"><p class="Tabledata" data-dcnode-id="364"><span data-dcnode-id="365" instrument_node="">Weakness or decreased exercise performance</span></p></td></tr><tr data-dcnode-id="356"><td align="left" colspan="1" data-dcnode-id="360" rowspan="1" valign="top"><p class="Tabledata" data-dcnode-id="361"></p></td><td align="left" colspan="1" data-dcnode-id="357" rowspan="1" valign="top"><p class="Tabledata" data-dcnode-id="358"><span data-dcnode-id="359" instrument_node="">Chest tightness or congestion</span></p></td></tr><tr data-dcnode-id="352"><td align="left" colspan="2" data-dcnode-id="353" rowspan="1" valign="top"><p class="Tabledata" data-dcnode-id="354"><span data-dcnode-id="355" instrument_node="">At least two of the following signs:</span></p></td></tr><tr data-dcnode-id="346"><td align="left" colspan="1" data-dcnode-id="350" rowspan="1" valign="top"><p class="Tabledata" data-dcnode-id="351"></p></td><td align="left" colspan="1" data-dcnode-id="347" rowspan="1" valign="top"><p class="Tabledata" data-dcnode-id="348"><span data-dcnode-id="349" instrument_node="">Central cyanosis</span></p></td></tr><tr data-dcnode-id="340"><td align="left" colspan="1" data-dcnode-id="344" rowspan="1" valign="top"><p class="Tabledata" data-dcnode-id="345"></p></td><td align="left" colspan="1" data-dcnode-id="341" rowspan="1" valign="top"><p class="Tabledata" data-dcnode-id="342"><span data-dcnode-id="343" instrument_node="">Audible rales or wheezing in at least one lung field</span></p></td></tr><tr data-dcnode-id="334"><td align="left" colspan="1" data-dcnode-id="338" rowspan="1" valign="top"><p class="Tabledata" data-dcnode-id="339"></p></td><td align="left" colspan="1" data-dcnode-id="335" rowspan="1" valign="top"><p class="Tabledata" data-dcnode-id="336"><span data-dcnode-id="337" instrument_node="">Tachypnea</span></p></td></tr><tr data-dcnode-id="328"><td align="left" colspan="1" data-dcnode-id="332" rowspan="1" valign="top"><p class="Tabledata" data-dcnode-id="333"></p></td><td align="left" colspan="1" data-dcnode-id="329" rowspan="1" valign="top"><p class="Tabledata" data-dcnode-id="330"><span data-dcnode-id="331" instrument_node="">Tachycardia</span></p></td></tr><tr data-dcnode-id="323"><td align="left" colspan="2" data-dcnode-id="324" rowspan="1" valign="top"><p class="Tabledata" data-dcnode-id="325"><span class="bold" data-dcnode-id="326"><span data-dcnode-id="327" instrument_node="">High-altitude cerebral edema (HACE)</span></span></p></td></tr><tr data-dcnode-id="319"><td align="left" colspan="2" data-dcnode-id="320" rowspan="1" valign="top"><p class="Tabledata" data-dcnode-id="321"><span data-dcnode-id="322" instrument_node="">Either the presence of a change in mental status and/or ataxia in a person with AMS or the presence of both mental status changes and ataxia in a person without AMS</span></p></td></tr></tbody></table><hr class="table-foot" data-dcnode-id="316"><div class="table-foot" data-dcnode-id="303"><div class="fn" data-dcnode-id="311"><p class="fn" data-dcnode-id="312"><span class="italic" data-dcnode-id="314"><span data-dcnode-id="315" instrument_node="">*—Symptoms and signs occur in the setting of a recent gain in altitude</span></span><span data-dcnode-id="313" instrument_node="">.</span></p></div><div class="fn" data-dcnode-id="304"><p class="fn" data-dcnode-id="305"><span class="italic" data-dcnode-id="307"><span data-dcnode-id="310" instrument_node="">In play: none; z-index: 1000; outline: 0px; position: absolute;" tabindex="-1"><div class="ui-dialog-titlebar ui-widget-header ui-corner-all ui-helper-clearfix" data-dcnode-id="278"><span class="ui-dialog-title" data-dcnode-id="282" id="ui-dialog-title-3"><span data-dcnode-id="283" instrument_node="">TABLE 3</span></span><a class="ui-dialog-titlebar-close ui-corner-all" data-dcnode-id="279" href="#" role="button"><span class="ui-icon ui-icon-closethick" data-dcnode-id="280"><span data-dcnode-id="281" instrument_node="">close</span></span></a></div><div class="jModal ui-dialog-content ui-widget-content" data-dcnode-id="221" name="afp19980415p1907-t3" style="display: block;"><div class="tableModal" data-dcnode-id="222"><span class="table-label" data-dcnode-id="276"><span data-dcnode-id="277" instrument_node="">TABLE 3</span></span><h4 class="table-title" data-dcnode-id="274"><span data-dcnode-id="275" instrument_node="">Treatment of High-Altitude Illness</span></h4><table class="no-mobile-table" data-dcnode-id="243"><thead data-dcnode-id="266"><tr data-dcnode-id="267"><th align="left" class="th" colspan="1" data-dcnode-id="271" rowspan="1" valign="bottom"><span class="italic" data-dcnode-id="272"><span data-dcnode-id="273" instrument_node="">Illness</span></span></th><th align="left" class="th" colspan="1" data-dcnode-id="268" rowspan="1" valign="bottom"><span class="italic" data-dcnode-id="269"><span data-dcnode-id="270" instrument_node="">Treatment</span></span></th></tr></thead><tbody data-dcnode-id="244"><tr data-dcnode-id="259"><td align="left" colspan="1" data-dcnode-id="263" rowspan="1" valign="top"><p class="Tabledata" data-dcnode-id="264"><span data-dcnode-id="265" instrument_node="">Acute mountain sickness (AMS)</span></p></td><td align="left" colspan="1" data-dcnode-id="260" rowspan="1" valign="top"><p class="Tabledata" data-dcnode-id="261"><span data-dcnode-id="262" instrument_node="">Stop ascent, acclimatize at the same altitude; give acetazolamide (Diamox), 125 to 250 mg orally two times a day. Or descend 460 m (1,500 ft) or more until symptoms have resolved.</span></p></td></tr><tr data-dcnode-id="252"><td align="left" colspan="1" data-dcnode-id="256" rowspan="1" valign="top"><p class="Tabledata" data-dcnode-id="257"><span data-dcnode-id="258" instrument_node="">High-altitude pulmonary edema (HAPE)</span></p></td><td align="left" colspan="1" data-dcnode-id="253" rowspan="1" valign="top"><p class="Tabledata" data-dcnode-id="254"><span data-dcnode-id="255" instrument_node="">Descend at least 610 m (2,000 ft) and keep descending until the symptoms have resolved. If that is impossible, temporize with oxygen, 4 to 6 L per minute; give nifedipine (Adalat, Procardia),10 mg by mouth initially, then 30 mg by mouth twice daily; keep the person warm and minimize his or her exertion. Use a Gamow or Chamberlite bag for hyperbaric therapy if available.</span></p></td></tr><tr data-dcnode-id="245"><td align="left" colspan="1" data-dcnode-id="249" rowspan="1" valign="top"><p class="Tabledata" data-dcnode-id="250"><span data-dcnode-id="251" instrument_node="">High-altitude cerebral edema (HACE)</span></p></td><td align="left" colspan="1" data-dcnode-id="246" rowspan="1" valign="top"><p class="Tabledata" data-dcnode-id="247"><span data-dcnode-id="248" instrument_node="">Descend at least 610 m (2,000 ft) and keep descending until symptoms have resolved. If that is impossible, temporize with oxygen, 4 L per minute; give dexamethasone, 4 mg orally every 6 hours, and hyperbaric therapy as above.</span></p></td></tr></tbody></table><hr class="table-foot" data-dcnode-id="242"><div class="table-foot" data-dcnode-id="223"><div class="fn" data-dcnode-id="224"><p class="fn" data-dcnode-id="225"><span class="italic" data-dcnode-id="227"><span data-dcnode-id="241" instrument_node="">Information from references </span><a class="bibrRef" data-dcnode-id="239" href="#afp19980415p1907-b1"><span data-dcnode-id="240" instrument_node="">1</span></a><span data-dcnode-id="237"><span data-dcnode-id="238" instrument_node="">, </span></span><a class="bibrRef" data-dcnode-id="235" href="#afp19980415p1907-b2"><span data-dcnode-id="236" instrument_node="">2</span></a><span data-dcnode-id="233"><span data-dcnode-id="234" instrument_node="">, </span></span><a class="bibrRef" data-dcnode-id="231" href="#afp19980415p1907-b3"><span data-dcnode-id="232" instrument_node="">3</span></a><span data-dcnode-id="230" instrument_node=""> and </span><a class="bibrRef" data-dcnode-id="228" href="#afp19980415p1907-b9"><span data-dcnode-id="229" instrument_node="">9</span></a></span><span data-dcnode-id="226" instrument_node="">.</span></p></div></div></div></div><div class="ui-resizable-handle ui-resizable-n" data-dcnode-id="220" style="z-index: 1000;"></div><div class="ui-resizable-handle ui-resizable-e" data-dcnode-id="219" style="z-index: 1000;"></div><div class="ui-resizable-handle ui-resizable-s" data-dcnode-id="218" style="z-index: 1000;"></div><div class="ui-resizable-handle ui-resizable-w" data-dcnode-id="217" style="z-index: 1000;"></div><div class="ui-resizable-handle ui-resizable-se ui-icon ui-icon-gripsmall-diagonal-se ui-icon-grip-diagonal-se" data-dcnode-id="216" style="z-index: 1000;"></div><div class="ui-resizable-handle ui-resizable-sw" data-dcnode-id="215" style="z-index: 1000;"></div><div class="ui-resizable-handle ui-resizable-ne" data-dcnode-id="214" style="z-index: 1000;"></div><div class="ui-resizable-handle ui-resizable-nw" data-dcnode-id="213" style="z-index: 1000;"></div><div class="ui-dialog-buttonpane ui-widget-content ui-helper-clearfix" data-dcnode-id="205"><div class="ui-dialog-buttonset" data-dcnode-id="206"><button aria-disabled="false" class="ui-button ui-widget ui-state-default ui-corner-all ui-button-text-only" data-dcnode-id="210" role="button" type="button"><span class="ui-button-text" data-dcnode-id="211"><span data-dcnode-id="212" instrument_node="">Close</span></span></button><button aria-disabled=" "><td align="left" colspan="1" data-dcnode-id="183" rowspan="1" valign="top"><p class="Tabledata" data-dcnode-id="184"><span data-dcnode-id="185" instrument_node="">High-altitude retinopathy</span></p></td><td align="left" colspan="1" data-dcnode-id="180" rowspan="1" valign="top"><p class="Tabledata" data-dcnode-id="181"><span data-dcnode-id="182" instrument_node="">Maintain good fluid intake to reduce hemoconcentration; spontaneously resolves</span></p></td></tr><tr data-dcnode-id="172"><td align="left" colspan="1" data-dcnode-id="176" rowspan="1" valign="top"><p class="Tabledata" data-dcnode-id="177"><span data-dcnode-id="178" instrument_node="">Peripheral edema</span></p></td><td align="left" colspan="1" data-dcnode-id="173" rowspan="1" valign="top"><p class="Tabledata" data-dcnode-id="174"><span data-dcnode-id="175" instrument_node="">Treat with a diuretic in the absence of AMS, HACE or HAPE; condition spontaneously resolves on descent</span></p></td></tr><tr data-dcnode-id="165"><td align="left" colspan="1" data-dcnode-id="169" rowspan="1" valign="top"><p class="Tabledata" data-dcnode-id="170"><span data-dcnode-id="171" instrument_node="">Venous stasis and thrombotic complications</span></p></td><td align="left" colspan="1" data-dcnode-id="166" rowspan="1" valign="top"><p class="Tabledata" data-dcnode-id="167"><span data-dcnode-id="168" instrument_node="">Stay active, keep well hydrated and descend if needed</span></p></td></tr><tr data-dcnode-id="158"><td align="left" colspan="1" data-dcnode-id="162" rowspan="1" valign="top"><p class="Tabledata" data-dcnode-id="163"><span data-dcnode-id="164" instrument_node="">High-altitude pharyngitis and bronchitis</span></p></td><td align="left" colspan="1" data-dcnode-id="159" rowspan="1" valign="top"><p class="Tabledata" data-dcnode-id="160"><span data-dcnode-id="161" instrument_node="">Suck on hard candy, breathe through a face mask and drink plenty of fluids</span></p></td></tr><tr data-dcnode-id="151"><td align="left" colspan="1" data-dcnode-id="155" rowspan="1" valign="top"><p class="Tabledata" data-dcnode-id="156"><span data-dcnode-id="157" instrument_node="">Ultraviolet keratitis (snow blindness)</span></p></td><td align="left" colspan="1" data-dcnode-id="152" rowspan="1" valign="top"><p class="Tabledata" data-dcnode-id="153"><span data-dcnode-id="154" instrument_node="">Remove contact lenses, patch affected eye, use oral analgesics to decrease pain; prevent by wearing sunglasses</span></p></td></tr></tbody></table><hr class="table-foot" data-dcnode-id="148"><div class="table-foot" data-dcnode-id="132"><div class="fn" data-dcnode-id="143"><p class="fn" data-dcnode-id="144"><span class="italic" data-dcnode-id="146"><span data-dcnode-id="147" instrument_node="">AMS = acute mountain sickness; HACE = high-altitude cerebral edema; HAPE = high-altitude pulmonary edema</span></span><span data-dcnode-id="145" instrument_node="">.</span></p></div><div class="fn" data-dcnode-id="133"><p class="fn" data-dcnode-id="134"><span class="italic" data-dcnode-id="136"><span data-dcnode-id="142" instrument_node="">Information from references </span><a class="bibrRef" data-dcnode-id="140" href="#afp19980415p1907-b2"><span data-dcnode-id="141" instrument_node="">2</span></a><span data-dcnode-id="139" instrument_node=""> and </span><a class="bibrRef" data-dcnode-id="137" href="#afp19980415p1907-b3"><span data-dcnode-id="138" instrument_node="">3</span></a></span><span data-dcnode-id="135" instrument_node="">.</span></p></div></div></div></div><div class="ui-resizable-handle ui-resizable-n" data-dcnode-id="129" style="z-index: 1000;"></div><div class="ui-resizable-handle ui-resizable-e" data-dcnode-id="128" style="z-index: 1000;"></div><div class="ui-resizable-handle ui-resizable-s" data-dcnode-id="127" style="z-index: 1000;"></div><div class="ui-resizable-handle ui-resizable-w" data-dcnode-id="126" style="z-index: 1000;"></div><div class="ui-resizable-handle ui-resizable-se ui-icon ui-icon-gripsmal
