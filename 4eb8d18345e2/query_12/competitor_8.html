</span><meta content="As more people enjoy the outdoors, high-altitude illness is increasingly becoming a problem that family physicians across the country must treat. High-altitude illness, which usually occurs at altitudes of over 1,500 m (4,921 ft), is caused primarily by hypoxia but is compounded by cold and exposure. It presents as one of three forms: acute mountain sickness (AMS), high-altitude pulmonary edema (HAPE) and high-altitude cerebral edema (HACE). But high-altitude illness can have many other manifestations. Cardinal symptoms include dyspnea on exertion and at rest, cough, nausea, difficulty sleeping, headache and mental status changes. Treatment requires descent, and gradual acclimatization provides the most effective prevention. Acetazolimide is an effective preventive aid and can be used in certain conditions as treatment." data-dcnode-id="3243" name="description"><span data-dcnode-id="3242" instrument_node="">

</span></div></div><div class="afpContent" data-dcnode-id="2729"><div class="cmeMobile" data-dcnode-id="2730" style="display:none;"><span data-dcnode-id="2731" instrument_node=""> </span></div></div><div align="center" data-dcnode-id="2724"><div class="outline" data-dcnode-id="2725" style="margin-top:10px;width:275px;"><p data-dcnode-id="2726"><a data-dcnode-id="2727" href="#afp19980415p1907-c1"><span data-dcnode-id="2728" instrument_node="">This is a corrected version of the article that appeared in print.</span></a></p></div></div></div><div class="afpContent" data-dcnode-id="2679"><p class="byline no-margin" data-dcnode-id="2719"><span data-dcnode-id="2720" instrument_node="">MARK D. HARRIS, FS, MAJ, MC, USA, JAMES TERRIO, MAJ, MC, USA, WILLIAM F. MISER, M.D., and JOSEPH F. YETTER III, COL, MC, USA, Madigan Army Medical Center, Tacoma, Washington</span></p><p class="self-citation" data-dcnode-id="2715"><i data-dcnode-id="2717"><span data-dcnode-id="2718" instrument_node="">Am Fam Physician.</span></i><span data-dcnode-id="2716" instrument_node="">&nbsp;1998&nbsp;Apr&nbsp;15;57(8):1907-1914.</span></p><p class="blurb" data-dcnode-id="2707"><img data-dcnode-id="2714" height="9" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.aafp.org/afp/images/arrow.gif&amp;raw" width="15"><span data-dcnode-id="2713" instrument_node="">&nbsp;
                            </span><span class="italic" data-dcnode-id="2708"><span data-dcnode-id="2712" instrument_node="">See related patient information handout on </span><a data-dcnode-id="2710" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.aafp.org/afp/1998/0415/p1924.html"><span data-dcnode-id="2711" instrument_node="">high-altitude illness</span></a><span data-dcnode-id="2709" instrument_node="">, written by the authors of this article.</span></span></p><p class="blurb" data-dcnode-id="2706"></p><div data-dcnode-id="2705" style="display:none;"></div><div class="noPrint articleSections" data-dcnode-id="2680"><h3 data-dcnode-id="2703"><span data-dcnode-id="2704" instrument_node="">Article Sections</span></h3><ul data-dcnode-id="2681"><li data-dcnode-id="2700"><a alt="Abstract" data-dcnode-id="2701" href="#abstract"><span data-dcnode-id="2702" instrument_node="">
                                                Abstract
                                            </span></a></li><li data-dcnode-id="2697"><a data-dcnode-id="2698" href="#sec-1"><span data-dcnode-id="2699" instrument_node="">Illustrative Case</span></a></li><li data-dcnode-id="2694"><a data-dcnode-id="2695" href="#sec-2"><span data-dcnode-id="2696" instrument_node="">Pathophysiology</span></a></li><li data-dcnode-id="2691"><a data-dcnode-id="2692" href="#sec-3"><span data-dcnode-id="2693" instrument_node="">General Characteristics of High-Altitude Illness</span></a></li><li data-dcnode-id="2688"><a data-dcnode-id="2689" href="#sec-4"><span data-dcnode-id="2690" instrument_node="">Effects of High Altitude on Chronic Illness</span></a></li><li data-dcnode-id="2685"><a data-dcnode-id="2686" href="#sec-5"><span data-dcnode-id="2687" instrument_node="">Prevention</span></a></li><li data-dcnode-id="2682"><a data-dcnode-id="2683" href="#ref-list-1" id="mobRefLink"><span data-dcnode-id="2684" instrument_node="">References</span></a></li></ul></div></div><div class="afpContent" data-dcnode-id="1745"><div class="abstract" data-dcnode-id="2676" id="abstract"><p data-dcnode-id="2677"><span data-dcnode-id="2678" instrument_node="">As more people enjoy the outdoors, high-altitude illness is increasingly becoming a problem that family physicians across the country must treat. High-altitude illness, which usually occurs at altitudes of over 1,500 m (4,921 ft), is caused primarily by hypoxia but is compounded by cold and exposure. It presents as one of three forms: acute mountain sickness (AMS), high-altitude pulmonary edema (HAPE) and high-altitude cerebral edema (HACE). But high-altitude illness can have many other manifestations. Cardinal symptoms include dyspnea on exertion and at rest, cough, nausea, difficulty sleeping, headache and mental status changes. Treatment requires descent, and gradual acclimatization provides the most effective prevention. Acetazolimide is an effective preventive aid and can be used in certain conditions as treatment.</span></p></div><p data-dcnode-id="2669"><span data-dcnode-id="2675" instrument_node="">More than ever before, our patients are traveling to the ends of the earth and to the top of world in search of adventure. Every year, thousands go trekking in the Himalayas, climbing in the Rockies and skiing in the Alps. An estimated 34 million people traversed terrain above 2,285 m (7,500 ft) in 1984, and since then that number has grown dramatically.</span><a class="superscript bibrRef" data-dcnode-id="2673" href="#afp19980415p1907-b1"><span data-dcnode-id="2674" instrument_node="">1</span></a><span data-dcnode-id="2672" instrument_node=""> Nearly 25 percent of those who travel above an elevation of 2,590 m (8,500 ft) develop manifestations of high-altitude illness.</span><a class="superscript bibrRef" data-dcnode-id="2670" href="#afp19980415p1907-b1"><span data-dcnode-id="2671" instrument_node="">1</span></a></p><p data-dcnode-id="2667"><span data-dcnode-id="2668" instrument_node="">How would you counsel a patient who is planning a trip to a high-altitude area? What would you do if one of your patients had a high-altitude illness? This article summarizes the pathophysiology, signs and symptoms, treatment and prevention of acute high-altitude illness.</span></p><div class="jSection" data-dcnode-id="2629" id="sec-1"><h2 data-dcnode-id="2665"><span data-dcnode-id="2666" instrument_node="">Illustrative Case</span></h2><div class="mjToggle noPrint" data-dcnode-id="2638"><div class="mjHeader noPrint" data-dcnode-id="2662"><span class="mobileSectionLink" data-dcnode-id="2663" style="margin:5px;"><span data-dcnode-id="2664" instrument_node="">Jump to section +</span></span></div><div class="mjContent noPrint" data-dcnode-id="2639" style="display: none;"><ul data-dcnode-id="2640"><li data-dcnode-id="2659"><a alt="Abstract" data-dcnode-id="2660" href="#abstract"><span data-dcnode-id="2661" instrument_node="">
                                    Abstract
                                </span></a></li><li data-dcnode-id="2656"><a data-dcnode-id="2657" href="#sec-1"><span data-dcnode-id="2658" instrument_node="">Illustrative Case</span></a></li><li data-dcnode-id="2653"><a data-dcnode-id="2654" href="#sec-2"><span data-dcnode-id="2655" instrument_node="">Pathophysiology</span></a></li><li data-dcnode-id="2650"><a data-dcnode-id="2651" href="#sec-3"><span data-dcnode-id="2652" instrument_node="">General Characteristics of High-Altitude Illness</span></a></li><li data-dcnode-id="2647"><a data-dcnode-id="2648" href="#sec-4"><span data-dcnode-id="2649" instrument_node="">Effects of High Altitude on Chronic Illness</span></a></li><li data-dcnode-id="2644"><a data-dcnode-id="2645" href="#sec-5"><span data-dcnode-id="2646" instrument_node="">Prevention</span></a></li><li data-dcnode-id="2641"><a data-dcnode-id="2642" href="#ref-list-1"><span data-dcnode-id="2643" instrument_node="">References</span></a></li></ul></div></div><p data-dcnode-id="2636"><span data-dcnode-id="2637" instrument_node="">M.H., a 26-year-old man, and R.M., a 28-year-old man, drive from Los Angeles (sea level) to the trailhead for the Mount Whitney Summit Trail, where the altitude is 2,440 m (8,000 ft). M.H. lives in El Paso, Tex., where the altitude is 1,145 m (3,762 ft), and exercises regularly, while R.M. lives in Los Angeles, is overweight and primarily sedentary.</span></p><p data-dcnode-id="2634"><span data-dcnode-id="2635" instrument_node="">The two men sleep in the car overnight at the trailhead and begin their ascent the next day. On the first day they hike to the base camp, at 3,660 m (12,000 ft) elevation. Later that day R.M. complains of dyspnea on exertion, lightheadedness, nausea, fatigue and headache. M.H. has fatigue and mild shortness of breath but no other complaints.</span></p><p data-dcnode-id="2632"><span data-dcnode-id="2633" instrument_node="">On the following morning, after a restless night for R.M., the two men discuss proceeding to the summit versus turning back. Both want to proceed. They begin at 8 a.m. and reach the summit (4,433 m [14,500 ft]) at 2 p.m. Throughout the climb, R.M. complains of worsening symptoms but does not have a cough or pink, frothy sputum, altered consciousness or ataxia. After reaching the summit, the men return to base camp, where R.M. has another restless night.</span></p><p data-dcnode-id="2630"><span data-dcnode-id="2631" instrument_node="">On the third morning, they return to the trailhead and depart. R.M. later visits his primary care physician, who retrospectively diagnoses acute mountain sickness (AMS) and recommends that R.M. avoid elevations above 3,050 m (10,000 ft).</span></p></div><div class="jSection" data-dcnode-id="2452" id="sec-2"><h2 data-dcnode-id="2627"><span data-dcnode-id="2628" instrument_node="">Pathophysiology</span></h2><div class="mjToggle noPrint" data-dcnode-id="2600"><div class="mjHeader noPrint" data-dcnode-id="2624"><span class="mobileSectionLink" data-dcnode-id="2625" style="margin:5px;"><span data-dcnode-id="2626" instrument_node="">Jump to section +</span></span></div><div class="mjContent noPrint" data-dcnode-id="2601" style="display: none;"><ul data-dcnode-id="2602"><li data-dcnode-id="2621"><a alt="Abstract" data-dcnode-id="2622" href="#abstract"><span data-dcnode-id="2623" instrument_node="">
                                    Abstract
                                </span></a></li><li data-dcnode-id="2618"><a data-dcnode-id="2619" href="#sec-1"><span data-dcnode-id="2620" instrument_node="">Illustrative Case</span></a></li><li data-dcnode-id="2615"><a data-dcnode-id="2616" href="#sec-2"><span data-dcnode-id="2617" instrument_node="">Pathophysiology</span></a></li><li data-dcnode-id="2612"><a data-dcnode-id="2613" href="#sec-3"><span data-dcnode-id="2614" instrument_node="">General Characteristics of High-Altitude Illness</span></a></li><li data-dcnode-id="2609"><a data-dcnode-id="2610" href="#sec-4"><span data-dcnode-id="2611" instrument_node="">Effects of High Altitude on Chronic Illness</span></a></li><li data-dcnode-id="2606"><a data-dcnode-id="2607" href="#sec-5"><span data-dcnode-id="2608" instrument_node="">Prevention</span></a></li><li data-dcnode-id="2603"><a data-dcnode-id="2604" href="#ref-list-1"><span data-dcnode-id="2605" instrument_node="">References</span></a></li></ul></div></div><p data-dcnode-id="2586"><span data-dcnode-id="2599" instrument_node="">Hypoxia is the main contributor to high-altitude illness. Atmospheric pressure and the partial pressure of oxygen decrease rapidly at increasing levels above the earth's surface </span><span class="italic" data-dcnode-id="2594"><span data-dcnode-id="2598" instrument_node="">(</span><a data-dcnode-id="2596" href="#afp19980415p1907-t1"><span data-dcnode-id="2597" instrument_node="">Table 1</span></a><span data-dcnode-id="2595" instrument_node="">)</span></span><span data-dcnode-id="2593" instrument_node="">.</span><a class="superscript bibrRef" data-dcnode-id="2591" href="#afp19980415p1907-b2"><span data-dcnode-id="2592" instrument_node="">2</span></a><span data-dcnode-id="2590" instrument_node=""> The partial pressure of oxygen is also lower as one moves northward. The barometric pressure of Mount Everest (8,850 m [29,028 ft]) is 253 mm Hg at latitude 27 degrees north. However, if Mount Everest were at the same latitude as Mount McKinley (6,200 m [20,320 ft] elevation and 62 degrees north), the barometric pressure would be 222 mm Hg, probably too low for an ascent without oxygen.</span><a class="superscript bibrRef" data-dcnode-id="2588" href="#afp19980415p1907-b2"><span data-dcnode-id="2589" instrument_node="">2</span></a><span data-dcnode-id="2587" instrument_node=""> The barometric pressure also fluctuates with the season (it is lower in the winter), the weather and the temperature.</span></p><div class="table-format" data-dcnode-id="2503" id="afp19980415p1907-t1"><div class="calltoactionbox" data-dcnode-id="2504"><div class="jDialog highlights" data-dcnode-id="2505"><div class="container secondary" data-dcnode-id="2506"><div class="jDialogPrintHide" data-dcnode-id="2507"><p data-dcnode-id="2582" style="text-align:right;margin-bottom:6px;margin-top:4px;"><a class="jOpener" data-dcnode-id="2583" name="afp19980415p1907-t1"><strong data-dcnode-id="2584"><span data-dcnode-id="2585" instrument_node="">View/Print Table</span></strong></a></p><div class="journalTable" data-dcnode-id="2508" style="max-height: 6044px;"><span class="table-label" data-dcnode-id="2580"><span data-dcnode-id="2581" instrument_node="">TABLE 1</span></span><h4 class="table-title" data-dcnode-id="2575"><span data-dcnode-id="2579" instrument_node="">Atmospheric Pressure and PaO</span><sub data-dcnode-id="2577"><span data-dcnode-id="2578" instrument_node="">2</span></sub><span data-dcnode-id="2576" instrument_node=""> in Relation to Altitude</span></h4><table class="no-mobile-table" data-dcnode-id="2529"><thead data-dcnode-id="2561"><tr data-dcnode-id="2562"><th align="left" class="th" colspan="1" data-dcnode-id="2572" rowspan="1" valign="bottom"><span class="italic" data-dcnode-id="2573"><span data-dcnode-id="2574" instrument_node="">Elevation</span></span></th><th align="left" class="th" colspan="1" data-dcnode-id="2569" rowspan="1" valign="bottom"><span class="italic" data-dcnode-id="2570"><span data-dcnode-id="2571" instrument_node="">Atmospheric pressure (mm Hg)</span></span></th><th align="left" class="th" colspan="1" data-dcnode-id="2563" rowspan="1" valign="bottom"><span class="italic" data-dcnode-id="2564"><span data-dcnode-id="2568" instrument_node="">PaO</span><sub data-dcnode-id="2566"><span data-dcnode-id="2567" instrument_node="">2</span></sub><span data-dcnode-id="2565" instrument_node=""> in a young, healthy person (mm Hg)</span></span></th></tr></thead><tbody data-dcnode-id="2530"><tr data-dcnode-id="2551"><td align="left" colspan="1" data-dcnode-id="2558" rowspan="1" valign="top"><p class="Tabledata" data-dcnode-id="2559"><span data-dcnode-id="2560" instrument_node="">Sea level</span></p></td><td align="left" colspan="1" data-dcnode-id="2555" rowspan="1" valign="top"><p class="Tabledata" data-dcnode-id="2556"><span data-dcnode-id="2557" instrument_node="">760</span></p></td><td align="left" colspan="1" data-dcnode-id="2552" rowspan="1" valign="top"><p class="Tabledata" data-dcnode-id="2553"><span data-dcnode-id="2554" instrument_node="">90 to 95</span></p></td></tr><tr data-dcnode-id="2541"><td align="left" colspan="1" data-dcnode-id="2548" rowspan="1" valign="top"><p class="Tabledata" data-dcnode-id="2549"><span data-dcnode-id="2550" instrument_node="">2,800 m (9,200 ft)</span></p></td><td align="left" colspan="1" data-dcnode-id="2545" rowspan="1" valign="top"><p class="Tabledata" data-dcnode-id="2546"><span data-dcnode-id="2547" instrument_node="">543</span></p></td><td align="left" colspan="1" data-dcnode-id="2542" rowspan="1" valign="top"><p class="Tabledata" data-dcnode-id="2543"><span data-dcnode-id="2544" instrument_node="">60</span></p></td></tr><tr data-dcnode-id="2531"><td align="left" colspan="1" data-dcnode-id="2538" rowspan="1" valign="top"><p class="Tabledata" data-dcnode-id="2539"><span data-dcnode-id="2540" instrument_node="">6,100 m (20,140 ft)</span></p></td><td align="left" colspan="1" data-dcnode-id="2535" rowspan="1" valign="top"><p class="Tabledata" data-dcnode-id="2536"><span data-dcnode-id="2537" instrument_node="">356</span></p></td><td align="left" colspan="1" data-dcnode-id="2532" rowspan="1" valign="top"><p class="Tabledata" data-dcnode-id="2533"><span data-dcnode-id="2534" instrument_node="">35</span></p></td></tr></tbody></table><hr class="table-foot" data-dcnode-id="2528"><div class="table-foot" data-dcnode-id="2509"><div class="fn" data-dcnode-id="2520"><p class="fn" data-dcnode-id="2521"><span class="italic" data-dcnode-id="2523"><span data-dcnode-id="2527" instrument_node="">PaO</span><sub data-dcnode-id="2525"><span data-dcnode-id="2526" instrument_node="">2</span></sub><span data-dcnode-id="2524" instrument_node=""> = partial pressure of arterial oxygen</span></span><span data-dcnode-id="2522" instrument_node="">.</span></p></div><div class="fn" data-dcnode-id="2510"><p class="fn" data-dcnode-id="2511"><span class="italic" data-dcnode-id="2513"><span data-dcnode-id="2519" instrument_node="">Information from references </span><a class="bibrRef" data-dcnode-id="2517" href="#afp19980415p1907-b1"><span data-dcnode-id="2518" instrument_node="">1</span></a><span data-dcnode-id="2516" instrument_node=""> and </span><a class="bibrRef" data-dcnode-id="2514" href="#afp19980415p1907-b2"><span data-dcnode-id="2515" instrument_node="">2</span></a></span><span data-dcnode-id="2512" instrument_node="">.</span></p></div></div></div></div></div></div></div></div><p data-dcnode-id="2490"><span data-dcnode-id="2502" instrument_node="">Hypoxia, however, does not act alone. In one study,</span><a class="superscript bibrRef" data-dcnode-id="2500" href="#afp19980415p1907-b4"><span data-dcnode-id="2501" instrument_node="">4</span></a><span data-dcnode-id="2499" instrument_node=""> it was found that symptoms of AMS are worse with the combination of normal oxygen and hypobaria (to simulate altitude) than with hypoxia and normal pressure. Several other altitude-related changes contribute directly or indirectly to AMS. Environmental temperature decreases an average of 6.5°C per 1,000 m (3,280 ft) gain in elevation,</span><a class="superscript bibrRef" data-dcnode-id="2497" href="#afp19980415p1907-b2"><span data-dcnode-id="2498" instrument_node="">2</span></a><span data-dcnode-id="2496" instrument_node=""> which increases the amount of oxygen required to maintain body temperature. Ultraviolet (UV) light penetration increases 4 percent per 300 m (985 ft) gain in altitude, increasing the danger of snow blindness, sunburn and, in the long-term, skin cancer. UV light also reflects off snow and ice and can produce temperatures of 40°C to 42°C (104°F to 107.6°F) in enclosed spaces, such as mountaineering tents,</span><a class="superscript bibrRef" data-dcnode-id="2494" href="#afp19980415p1907-b3"><span data-dcnode-id="2495" instrument_node="">3</span></a><span data-dcnode-id="2493" instrument_node=""> so even heat exhaustion is a danger. Dehydration is often a problem, since insensible losses are increased as a result of hyperventilation and increased work, and since the only way to get water at high altitude is to melt snow or ice.</span><a class="superscript bibrRef" data-dcnode-id="2491" href="#afp19980415p1907-b5"><span data-dcnode-id="2492" instrument_node="">5</span></a></p><p data-dcnode-id="2473"><span data-dcnode-id="2489" instrument_node="">During ascent to altitude, chemoreceptors in the carotid body detect the decreasing partial pressure of arterial oxygen (PaO</span><sub data-dcnode-id="2487"><span data-dcnode-id="2488" instrument_node="">2</span></sub><span data-dcnode-id="2486" instrument_node="">) and stimulate the hypoxic ventilatory response.6 This causes hyperventilation, which results in water loss, increased PaO</span><sub data-dcnode-id="2484"><span data-dcnode-id="2485" instrument_node="">2</span></sub><span data-dcnode-id="2483" instrument_node=""> and decreased partial pressure of arterial carbon dioxide (PaCO</span><sub data-dcnode-id="2481"><span data-dcnode-id="2482" instrument_node="">2</span></sub><span data-dcnode-id="2480" instrument_node="">). Fluctuations in PaO</span><sub data-dcnode-id="2478"><span data-dcnode-id="2479" instrument_node="">2</span></sub><span data-dcnode-id="2477" instrument_node=""> and PaCO</span><sub data-dcnode-id="2475"><span data-dcnode-id="2476" instrument_node="">2</span></sub><span data-dcnode-id="2474" instrument_node=""> cause nocturnal periodic breathing (Cheyne-Stokes respiration). Respiratory alkalosis results, but the pH is usually stabilized within 24 to 48 hours by bicarbonate excretion from the kidneys.</span></p><p data-dcnode-id="2466"><span data-dcnode-id="2472" instrument_node="">Since the PaO</span><sub data-dcnode-id="2470"><span data-dcnode-id="2471" instrument_node="">2</span></sub><span data-dcnode-id="2469" instrument_node=""> is low because of atmospheric hypoxia and the blood volume is low because of dehydration, circulating levels of catecholamines increase, causing increased heart rate, blood pressure and venous tone. Clinicians can use this tachycardic response to roughly estimate how well a person is acclimatizing. Initially at high altitude, a person's pulse on awakening in the morning rises 20 percent or more, but after a week at altitude, it should be declining toward normal levels.</span><a class="superscript bibrRef" data-dcnode-id="2467" href="#afp19980415p1907-b1"><span data-dcnode-id="2468" instrument_node="">1</span></a></p><p data-dcnode-id="2458"><span data-dcnode-id="2465" instrument_node="">Hypoxia also increases the contractility of pulmonary vessels, thereby increasing pulmonary artery pressure and cerebral blood flow. Hypocapnea balances this change by decreasing the cerebral blood flow. To improve the blood's oxygen-carrying ability, hemoconcentration occurs immediately, resulting in increased erythropoietin levels within two hours and new red blood cells within four days.</span><a class="superscript bibrRef" data-dcnode-id="2463" href="#afp19980415p1907-b2"><span data-dcnode-id="2464" instrument_node="">2</span></a><span data-dcnode-id="2462" instrument_node=""> Increased 2,3-diphosphoglycerate (2,3-DPG) production shifts the oxygen–hemoglobin dissociation curve to the right, resulting in improved tissue release of oxygen and acting against the leftward shift caused by alkalosis and hypocarbia.</span><a class="superscript bibrRef" data-dcnode-id="2460" href="#afp19980415p1907-b7"><span data-dcnode-id="2461" instrument_node="">7</span></a><span data-dcnode-id="2459" instrument_node=""> Capillary density in skeletal muscle also increases.</span></p><p data-dcnode-id="2453"><span data-dcnode-id="2457" instrument_node="">These acute adaptations (they occur within hours) are remarkably effective: five of the 10 people reported from 1947 to 1993 to have stowed away without survival gear in the wheel wells of commercial airliners that flew as high as 11,900 m (39,000 ft) on transcontinental flights survived.</span><a class="superscript bibrRef" data-dcnode-id="2455" href="#afp19980415p1907-b8"><span data-dcnode-id="2456" instrument_node="">8</span></a><span data-dcnode-id="2454" instrument_node=""> Together, the acute and chronic adaptations allow humans both to ascend to high altitudes and to reside at such altitudes.</span></p></div><div class="jSection" data-dcnode-id="1996" id="sec-3"><h2 data-dcnode-id="2450"><span data-dcnode-id="2451" instrument_node="">General Characteristics of High-Altitude Illness</span></h2><div class="mjToggle noPrint" data-dcnode-id="2423"><div class="mjHeader noPrint" data-dcnode-id="2447"><span class="mobileSectionLink" data-dcnode-id="2448" style="margin:5px;"><span data-dcnode-id="2449" instrument_node="">Jump to section +</span></span></div><div class="mjContent noPrint" data-dcnode-id="2424" style="display: none;"><ul data-dcnode-id="2425"><li data-dcnode-id="2444"><a alt="Abstract" data-dcnode-id="2445" href="#abstract"><span data-dcnode-id="2446" instrument_node="">
                                    Abstract
                                </span></a></li><li data-dcnode-id="2441"><a data-dcnode-id="2442" href="#sec-1"><span data-dcnode-id="2443" instrument_node="">Illustrative Case</span></a></li><li data-dcnode-id="2438"><a data-dcnode-id="2439" href="#sec-2"><span data-dcnode-id="2440" instrument_node="">Pathophysiology</span></a></li><li data-dcnode-id="2435"><a data-dcnode-id="2436" href="#sec-3"><span data-dcnode-id="2437" instrument_node="">General Characteristics of High-Altitude Illness</span></a></li><li data-dcnode-id="2432"><a data-dcnode-id="2433" href="#sec-4"><span data-dcnode-id="2434" instrument_node="">Effects of High Altitude on Chronic Illness</span></a></li><li data-dcnode-id="2429"><a data-dcnode-id="2430" href="#sec-5"><span data-dcnode-id="2431" instrument_node="">Prevention</span></a></li><li data-dcnode-id="2426"><a data-dcnode-id="2427" href="#ref-list-1"><span data-dcnode-id="2428" instrument_node="">References</span></a></li></ul></div></div><p data-dcnode-id="2418"><span data-dcnode-id="2422" instrument_node="">High-altitude illness is a spectrum of disease related to hypobaric hypoxia and its consequences. It includes AMS, high-altitude cerebral edema (HACE) and high-altitude pulmonary edema (HAPE). The diagnosis is based primarily on the history and physical examination. When available, chest radiographs may show multiple small patchy infiltrates,</span><a class="superscript bibrRef" data-dcnode-id="2420" href="#afp19980415p1907-b9"><span data-dcnode-id="2421" instrument_node="">9</span></a><span data-dcnode-id="2419" instrument_node=""> and the electrocardiogram may show a right strain pattern.</span></p><h3 data-dcnode-id="2416"><span data-dcnode-id="2417" instrument_node="">Acute Mountain Sickness</span></h3><p data-dcnode-id="2406"><span data-dcnode-id="2415" instrument_node="">The first description of AMS, written in 37 to 32 </span><span class="smallcap" data-dcnode-id="2413" style="font-variant:small-caps"><span data-dcnode-id="2414" instrument_node="">b.c</span></span><span data-dcnode-id="2412" instrument_node="">., is attributed to To Kan, a Chinese governmental official, who noted, “A man's face turns pale, his head aches and he begins to vomit” when crossing the Himalayan Kilak Pass.</span><a class="superscript bibrRef" data-dcnode-id="2410" href="#afp19980415p1907-b10"><span data-dcnode-id="2411" instrument_node="">10</span></a><span data-dcnode-id="2409" instrument_node=""> The occurrence of AMS depends primarily on the rate of ascent, the altitude attained and the individual person's susceptibility. AMS affects 15 to 30 percent of Colorado resort skiers, 50 percent of climbers on Mount McKinley, 70 percent of climbers on Mount Rainier, and 25 to 50 percent of climbers who trek to the base of Mount Everest.</span><a class="superscript bibrRef" data-dcnode-id="2407" href="#afp19980415p1907-b1"><span data-dcnode-id="2408" instrument_node="">1</span></a></p><p data-dcnode-id="2381"><span data-dcnode-id="2405" instrument_node="">Symptoms include headache, fatigue, weakness, gastrointestinal upset, difficulty sleeping and lightheadedness </span><span class="italic" data-dcnode-id="2400"><span data-dcnode-id="2404" instrument_node="">(</span><a data-dcnode-id="2402" href="#afp19980415p1907-t2"><span data-dcnode-id="2403" instrument_node="">Table 2</span></a><span data-dcnode-id="2401" instrument_node="">)</span></span><span data-dcnode-id="2399" instrument_node="">.</span><a class="superscript bibrRef" data-dcnode-id="2397" href="#afp19980415p1907-b11"><span data-dcnode-id="2398" instrument_node="">11</span></a><span data-dcnode-id="2396" instrument_node=""> According to the 1991 International Hypoxia Symposium at Lake Louise, Canada, AMS can be diagnosed when headache and one other symptom are present in the setting of a recent gain in altitude.</span><a class="superscript bibrRef" data-dcnode-id="2394" href="#afp19980415p1907-b3"><span data-dcnode-id="2395" instrument_node="">3</span></a><span class="superscript" data-dcnode-id="2392"><span data-dcnode-id="2393" instrument_node="">,</span></span><a class="superscript bibrRef" data-dcnode-id="2390" href="#afp19980415p1907-b11"><span data-dcnode-id="2391" instrument_node="">11</span></a><span class="superscript" data-dcnode-id="2388"><span data-dcnode-id="2389" instrument_node="">,</span></span><a class="superscript bibrRef" data-dcnode-id="2386" href="#afp19980415p1907-b12"><span data-dcnode-id="2387" instrument_node="">12</span></a><span data-dcnode-id="2385" instrument_node=""> The headache is probably caused by a mild increase in intracranial pressure and is typically throbbing, bitemporal or occipital, worse at night or in the early morning, and worse with the Valsalva maneuver or when bending forward. Dyspnea on exertion is common at altitude, but dyspnea at rest indicates more severe AMS or HAPE. Cough and ataxia may occur in severe AMS but are also symptoms of HAPE and HACE, respectively.</span><a class="superscript bibrRef" data-dcnode-id="2383" href="#afp19980415p1907-b3"><span data-dcnode-id="2384" instrument_node="">3</span></a><span data-dcnode-id="2382" instrument_node=""> Similar symptoms may occur as a result of viral illness, hangover, exhaustion or dehydration. Carbon monoxide poisoning, which may be caused by the use of cooking stoves in the small windproof tents used by mountaineers, may mimic AMS.</span></p><div class="table-format" data-dcnode-id="2248" id="afp19980415p1907-t2"><div class="calltoactionbox" data-dcnode-id="2249"><div class="jDialog highlights" data-dcnode-id="2250"><div class="container secondary" data-dcnode-id="2251"><div class="jDialogPrintHide" data-dcnode-id="2252"><p data-dcnode-id="2377" style="text-align:right;margin-bottom:6px;margin-top:4px;"><a class="jOpener" data-dcnode-id="2378" name="afp19980415p1907-t2"><strong data-dcnode-id="2379"><span data-dcnode-id="2380" instrument_node="">View/Print Table</span></strong></a></p><div class="journalTable" data-dcnode-id="2253" style="max-height: 6044px;"><span class="table-label" data-dcnode-id="2375"><span data-dcnode-id="2376" instrument_node="">TABLE 2</span></span><h4 class="table-title" data-dcnode-id="2373"><span data-dcnode-id="2374" instrument_node="">Consensus on the Definition of High-Altitude Illnesses*</span></h4><table class="no-mobile-table" data-dcnode-id="2268"><tbody data-dcnode-id="2269"><tr data-dcnode-id="2368"><td align="left" colspan="2" data-dcnode-id="2369" rowspan="1" valign="top"><p class="Tabledata" data-dcnode-id="2370"><span class="bold" data-dcnode-id="2371"><span data-dcnode-id="2372" instrument_node="">Acute mountain sickness (AMS)</span></span></p></td></tr><tr data-dcnode-id="2364"><td align="left" colspan="2" data-dcnode-id="2365" rowspan="1" valign="top"><p class="Tabledata" data-dcnode-id="2366"><span data-dcnode-id="2367" instrument_node="">Headache, plus at least one of the following:</span></p></td></tr><tr data-dcnode-id="2358"><td align="left" colspan="1" data-dcnode-id="2362" rowspan="1" valign="top"><p class="Tabledata" data-dcnode-id="2363"></p></td><td align="left" colspan="1" data-dcnode-id="2359" rowspan="1" valign="top"><p class="Tabledata" data-dcnode-id="2360"><span data-dcnode-id="2361" instrument_node="">Fatigue or weakness</span></p></td></tr><tr data-dcnode-id="2352"><td align="left" colspan="1" data-dcnode-id="2356" rowspan="1" valign="top"><p class="Tabledata" data-dcnode-id="2357"></p></td><td align="left" colspan="1" data-dcnode-id="2353" rowspan="1" valign="top"><p class="Tabledata" data-dcnode-id="2354"><span data-dcnode-id="2355" instrument_node="">Gastrointestinal symptoms (nausea, vomiting or anorexia)</span></p></td></tr><tr data-dcnode-id="2346"><td align="left" colspan="1" data-dcnode-id="2350" rowspan="1" valign="top"><p class="Tabledata" data-dcnode-id="2351"></p></td><td align="left" colspan="1" data-dcnode-id="2347" rowspan="1" valign="top"><p class="Tabledata" data-dcnode-id="2348"><span data-dcnode-id="2349" instrument_node="">Dizziness or lightheadedness</span></p></td></tr><tr data-dcnode-id="2340"><td align="left" colspan="1" data-dcnode-id="2344" rowspan="1" valign="top"><p class="Tabledata" data-dcnode-id="2345"></p></td><td align="left" colspan="1" data-dcnode-id="2341" rowspan="1" valign="top"><p class="Tabledata" data-dcnode-id="2342"><span data-dcnode-id="2343" instrument_node="">Difficulty sleeping</span></p></td></tr><tr data-dcnode-id="2335"><td align="left" colspan="2" data-dcnode-id="2336" rowspan="1" valign="top"><p class="Tabledata" data-dcnode-id="2337"><span class="bold" data-dcnode-id="2338"><span data-dcnode-id="2339" instrument_node="">High-altitude pulmonary edema (HAPE)</span></span></p></td></tr><tr data-dcnode-id="2331"><td align="left" colspan="2" data-dcnode-id="2332" rowspan="1" valign="top"><p class="Tabledata" data-dcnode-id="2333"><span data-dcnode-id="2334" instrument_node="">At least two of the following symptoms:</span></p></td></tr><tr data-dcnode-id="2325"><td align="left" colspan="1" data-dcnode-id="2329" rowspan="1" valign="top"><p class="Tabledata" data-dcnode-id="2330"></p></td><td align="left" colspan="1" data-dcnode-id="2326" rowspan="1" valign="top"><p class="Tabledata" data-dcnode-id="2327"><span data-dcnode-id="2328" instrument_node="">Dyspnea at rest</span></p></td></tr><tr data-dcnode-id="2319"><td align="left" colspan="1" data-dcnode-id="2323" rowspan="1" valign="top"><p class="Tabledata" data-dcnode-id="2324"></p></td><td align="left" colspan="1" data-dcnode-id="2320" rowspan="1" valign="top"><p class="Tabledata" data-dcnode-id="2321"><span data-dcnode-id="2322" instrument_node="">Cough</span></p></td></tr><tr data-dcnode-id="2313"><td align="left" colspan="1" data-dcnode-id="2317" rowspan="1" valign="top"><p class="Tabledata" data-dcnode-id="2318"></p></td><td align="left" colspan="1" data-dcnode-id="2314" rowspan="1" valign="top"><p class="Tabledata" data-dcnode-id="2315"><span data-dcnode-id="2316" instrument_node="">Weakness or decreased exercise performance</span></p></td></tr><tr data-dcnode-id="2307"><td align="left" colspan="1" data-dcnode-id="2311" rowspan="1" valign="top"><p class="Tabledata" data-dcnode-id="2312"></p></td><td align="left" colspan="1" data-dcnode-id="2308" rowspan="1" valign="top"><p class="Tabledata" data-dcnode-id="2309"><span data-dcnode-id="2310" instrument_node="">Chest tightness or congestion</span></p></td></tr><tr data-dcnode-id="2303"><td align="left" colspan="2" data-dcnode-id="2304" rowspan="1" valign="top"><p class="Tabledata" data-dcnode-id="2305"><span data-dcnode-id="2306" instrument_node="">At least two of the following signs:</span></p></td></tr><tr data-dcnode-id="2297"><td align="left" colspan="1" data-dcnode-id="2301" rowspan="1" valign="top"><p class="Tabledata" data-dcnode-id="2302"></p></td><td align="left" colspan="1" data-dcnode-id="2298" rowspan="1" valign="top"><p class="Tabledata" data-dcnode-id="2299"><span data-dcnode-id="2300" instrument_node="">Central cyanosis</span></p></td></tr><tr data-dcnode-id="2291"><td align="left" colspan="1" data-dcnode-id="2295" rowspan="1" valign="top"><p class="Tabledata" data-dcnode-id="2296"></p></td><td align="left" colspan="1" data-dcnode-id="2292" rowspan="1" valign="top"><p class="Tabledata" data-dcnode-id="2293"><span data-dcnode-id="2294" instrument_node="">Audible rales or wheezing in at least one lung field</span></p></td></tr><tr data-dcnode-id="2285"><td align="left" colspan="1" data-dcnode-id="2289" rowspan="1" valign="top"><p class="Tabledata" data-dcnode-id="2290"></p></td><td align="left" colspan="1" data-dcnode-id="2286" rowspan="1" valign="top"><p class="Tabledata" data-dcnode-id="2287"><span data-dcnode-id="2288" instrument_node="">Tachypnea</span></p></td></tr><tr data-dcnode-id="2279"><td align="left" colspan="1" data-dcnode-id="2283" rowspan="1" valign="top"><p class="Tabledata" data-dcnode-id="2284"></p></td><td align="left" colspan="1" data-dcnode-id="2280" rowspan="1" valign="top"><p class="Tabledata" data-dcnode-id="2281"><span data-dcnode-id="2282" instrument_node="">Tachycardia</span></p></td></tr><tr data-dcnode-id="2274"><td align="left" colspan="2" data-dcnode-id="2275" rowspan="1" valign="top"><p class="Tabledata" data-dcnode-id="2276"><span class="bold" data-dcnode-id="2277"><span data-dcnode-id="2278" instrument_node="">High-altitude cerebral edema (HACE)</span></span></p></td></tr><tr data-dcnode-id="2270"><td align="left" colspan="2" data-dcnode-id="2271" rowspan="1" valign="top"><p class="Tabledata" data-dcnode-id="2272"><span data-dcnode-id="2273" instrument_node="">Either the presence of a change in mental status and/or ataxia in a person with AMS or the presence of both mental status changes and ataxia in a person without AMS</span></p></td></tr></tbody></table><hr class="table-foot" data-dcnode-id="2267"><div class="table-foot" data-dcnode-id="2254"><div class="fn" data-dcnode-id="2262"><p class="fn" data-dcnode-id="2263"><span class="italic" data-dcnode-id="2265"><span data-dcnode-id="2266" instrument_node="">*—Symptoms and signs occur in the setting of a recent gain in altitude</span></span><span data-dcnode-id="2264" instrument_node="">.</span></p></div><div class="fn" data-dcnode-id="2255"><p class="fn" data-dcnode-id="2256"><span class="italic" data-dcnode-id="2258"><span data-dcnode-id="2261" instrument_node="">Information from reference </span><a class="bibrRef" data-dcnode-id="2259" href="#afp19980415p1907-b11"><span data-dcnode-id="2260" instrument_node="">11</span></a></span><span data-dcnode-id="2257" instrument_node="">.</span></p></div></div></div></div></div></div></div></div><p data-dcnode-id="2229"><span data-dcnode-id="2247" instrument_node="">The treatment of AMS consists of stopping the ascent and allowing acclimatization at the same altitude. In addition, therapy should be started with oral acetazolamide (Diamox), a carbonic anhydrase inhibitor with weak diuretic properties; the dosage is 125 to 250 mg twice daily </span><span class="italic" data-dcnode-id="2242"><span data-dcnode-id="2246" instrument_node="">(</span><a data-dcnode-id="2244" href="#afp19980415p1907-t3"><span data-dcnode-id="2245" instrument_node="">Table 3</span></a><span data-dcnode-id="2243" instrument_node="">)</span></span><span data-dcnode-id="2241" instrument_node="">.</span><a class="superscript bibrRef" data-dcnode-id="2239" href="#afp19980415p1907-b1"><span data-dcnode-id="2240" instrument_node="">1</span></a><span class="superscript" data-dcnode-id="2237"><span data-dcnode-id="2238" instrument_node="">–</span></span><a class="superscript bibrRef" data-dcnode-id="2235" href="#afp19980415p1907-b3"><span data-dcnode-id="2236" instrument_node="">3</span></a><span class="superscript" data-dcnode-id="2233"><span data-dcnode-id="2234" instrument_node="">,</span></span><a class="superscript bibrRef" data-dcnode-id="2231" href="#afp19980415p1907-b9"><span data-dcnode-id="2232" instrument_node="">9</span></a><span data-dcnode-id="2230" instrument_node=""> Alternatively, the affected person can descend 460 m (1,500 ft) or more until symptoms resolve, depending on the severity of AMS. The ascent can usually be resumed once symptoms have resolved. Aspirin is useful to treat headache, and nonbarbiturate sedatives can improve sleep. There is no evidence to support counseling a patient to avoid high altitudes after an episode of AMS.</span></p><div class="table-format" data-dcnode-id="2164" id="afp19980415p1907-t3"><div class="calltoactionbox" data-dcnode-id="2165"><div class="jDialog highlights" data-dcnode-id="2166"><div class="container secondary" data-dcnode-id="2167"><div class="jDialogPrintHide" data-dcnode-id="2168"><p data-dcnode-id="2225" style="text-align:right;margin-bottom:6px;margin-top:4px;"><a class="jOpener" data-dcnode-id="2226" name="afp19980415p1907-t3"><strong data-dcnode-id="2227"><span data-dcnode-id="2228" instrument_node="">View/Print Table</span></strong></a></p><div class="journalTable" data-dcnode-id="2169" style="max-height: 6044px;"><span class="table-label" data-dcnode-id="2223"><span data-dcnode-id="2224" instrument_node="">TABLE 3</span></span><h4 class="table-title" data-dcnode-id="2221"><span data-dcnode-id="2222" instrument_node="">Treatment of High-Altitude Illness</span></h4><table class="no-mobile-table" data-dcnode-id="2190"><thead data-dcnode-id="2213"><tr data-dcnode-id="2214"><th align="left" class="th" colspan="1" data-dcnode-id="2218" rowspan="1" valign="bottom"><span class="italic" data-dcnode-id="2219"><span data-dcnode-id="2220" instrument_node="">Illness</span></span></th><th align="left" class="th" colspan="1" data-dcnode-id="2215" rowspan="1" valign="bottom"><span class="italic" data-dcnode-id="2216"><span data-dcnode-id="2217" instrument_node="">Treatment</span></span></th></tr></thead><tbody data-dcnode-id="2191"><tr data-dcnode-id="2206"><td align="left" colspan="1" data-dcnode-id="2210" rowspan="1" valign="top"><p class="Tabledata" data-dcnode-id="2211"><span data-dcnode-id="2212" instrument_node="">Acute mountain sickness (AMS)</span></p></td><td align="left" colspan="1" data-dcnode-id="2207" rowspan="1" valign="top"><p class="Tabledata" data-dcnode-id="2208"><span data-dcnode-id="2209" instrument_node="">Stop ascent, acclimatize at the same altitude; give acetazolamide (Diamox), 125 to 250 mg orally two times a day. Or descend 460 m (1,500 ft) or more until symptoms have resolved.</span></p></td></tr><tr data-dcnode-id="2199"><td align="left" colspan="1" data-dcnode-id="2203" rowspan="1" valign="top"><p class="Tabledata" data-dcnode-id="2204"><span data-dcnode-id="2205" instrument_node="">High-altitude pulmonary edema (HAPE)</span></p></td><td align="left" colspan="1" data-dcnode-id="2200" rowspan="1" valign="top"><p class="Tabledata" data-dcnode-id="2201"><span data-dcnode-id="2202" instrument_node="">Descend at least 610 m (2,000 ft) and keep descending until the symptoms have resolved. If that is impossible, temporize with oxygen, 4 to 6 L per minute; give nifedipine (Adalat, Procardia),10 mg by mouth initially, then 30 mg by mouth twice daily; keep the person warm and minimize his or her exertion. Use a Gamow or Chamberlite bag for hyperbaric therapy if available.</span></p></td></tr><tr data-dcnode-id="2192"><td align="left" colspan="1" data-dcnode-id="2196" rowspan="1" valign="top"><p class="Tabledata" data-dcnode-id="2197"><span data-dcnode-id="2198" instrument_node="">High-altitude cerebral edema (HACE)</span></p></td><td align="left" colspan="1" data-dcnode-id="2193" rowspan="1" valign="top"><p class="Tabledata" data-dcnode-id="2194"><span data-dcnode-id="2195" instrument_node="">Descend at least 610 m (2,000 ft) and keep descending until symptoms have resolved. If that is impossible, temporize with oxygen, 4 L per minute; give dexamethasone, 4 mg orally every 6 hours, and hyperbaric therapy as above.</span></p></td></tr></tbody></table><hr class="table-foot" data-dcnode-id="2189"><div class="table-foot" data-dcnode-id="2170"><div class="fn" data-dcnode-id="2171"><p class="fn" data-dcnode-id="2172"><span class="italic" data-dcnode-id="2174"><span data-dcnode-id="2188" instrument_node="">Information from references </span><a class="bibrRef" data-dcnode-id="2186" href="#afp19980415p1907-b1"><span data-dcnode-id="2187" instrument_node="">1</span></a><span data-dcnode-id="2184"><span data-dcnode-id="2185" instrument_node="">, </span></span><a class="bibrRef" data-dcnode-id="2182" href="#afp19980415p1907-b2"><span data-dcnode-id="2183" instrument_node="">2</span></a><span data-dcnode-id="2180"><span data-dcnode-id="2181" instrument_node="">, </span></span><a class="bibrRef" data-dcnode-id="2178" href="#afp19980415p1907-b3"><span data-dcnode-id="2179" instrument_node="">3</span></a><span data-dcnode-id="2177" instrument_node=""> and </span><a class="bibrRef" data-dcnode-id="2175" href="#afp19980415p1907-b9"><span data-dcnode-id="2176" instrument_node="">9</span></a></span><span data-dcnode-id="2173" instrument_node="">.</span></p></div></div></div></div></div></div></div></div><h3 data-dcnode-id="2162"><span data-dcnode-id="2163" instrument_node="">High-Altitude Pulmonary Edema</span></h3><p data-dcnode-id="2155"><span data-dcnode-id="2161" instrument_node="">Up to 15 percent of travelers to altitudes over 2,500 m (8,202 ft) will develop HAPE, depending on the traveler's age and sex, and the rate of ascent.</span><a class="superscript bibrRef" data-dcnode-id="2159" href="#afp19980415p1907-b13"><span data-dcnode-id="2160" instrument_node="">13</span></a><span data-dcnode-id="2158" instrument_node=""> HAPE is a form of noncardiogenic pulmonary edema and is associated with marked pulmonary hypertension. It is more common in persons under 20 years of age.</span><a class="superscript bibrRef" data-dcnode-id="2156" href="#afp19980415p1907-b14"><span data-dcnode-id="2157" instrument_node="">14</span></a></p><p data-dcnode-id="2147"><span data-dcnode-id="2154" instrument_node="">The Lake Louise symposium proposed diagnostic criteria for HAPE. In the setting of a recent gain in altitude, at least two of the following symptoms must be present: dyspnea at rest, cough, weakness or decreased exercise performance, chest tightness or congestion. In addition, at least two of the following signs must be present: rales or wheezing in at least one lung field (usually the right middle lobe), central cyanosis, tachycardia or tachypnea.</span><a class="superscript bibrRef" data-dcnode-id="2152" href="#afp19980415p1907-b11"><span data-dcnode-id="2153" instrument_node="">11</span></a><span class="superscript" data-dcnode-id="2150"><span data-dcnode-id="2151" instrument_node="">,</span></span><a class="superscript bibrRef" data-dcnode-id="2148" href="#afp19980415p1907-b14"><span data-dcnode-id="2149" instrument_node="">14</span></a></p><p data-dcnode-id="2143"><span data-dcnode-id="2146" instrument_node="">HAPE usually occurs at night, one to three days after an ascent is begun. It is a medical emergency and the most common cause of death from high altitude.</span><a class="superscript bibrRef" data-dcnode-id="2144" href="#afp19980415p1907-b2"><span data-dcnode-id="2145" instrument_node="">2</span></a></p><p data-dcnode-id="2135"><span data-dcnode-id="2142" instrument_node="">The treatment of choice is immediate descent of at least 610 m (2,000 ft) until the symptoms have resolved. A repeat ascent should not be attempted soon after the episode, because up to two weeks may be required for the person to regain full strength.</span><a class="superscript bibrRef" data-dcnode-id="2140" href="#afp19980415p1907-b2"><span data-dcnode-id="2141" instrument_node="">2</span></a><span data-dcnode-id="2139" instrument_node=""> If HAPE is severe and the person cannot descend, he or she should rest, keep warm, receive oxygen at a rate of 4 to 6 L per minute and be given oral nifedipine (Adalat, Procardia), 10 mg once and then 30 mg (sustained-release form) every 12 hours. If available, portable hyperbaric bags, such as the Gamow bag or the Chamberlite bag, can be used.</span><a class="superscript bibrRef" data-dcnode-id="2137" href="#afp19980415p1907-b15"><span data-dcnode-id="2138" instrument_node="">15</span></a><span data-dcnode-id="2136" instrument_node=""> These bags can provide temporary treatment for severe AMS, HACE and HAPE, before descent is achieved.</span></p><p data-dcnode-id="2128"><span data-dcnode-id="2134" instrument_node="">There is no definitive treatment for HAPE other than descent. If HAPE is diagnosed early and treated appropriately, patients usually recover completely. The mortality rate for untreated patients can be as high as 44 percent.</span><a class="superscript bibrRef" data-dcnode-id="2132" href="#afp19980415p1907-b1"><span data-dcnode-id="2133" instrument_node="">1</span></a><span data-dcnode-id="2131" instrument_node=""> In one study, 66 percent of HAPE patients had a recurrence of HAPE on subsequent climbs.</span><a class="superscript bibrRef" data-dcnode-id="2129" href="#afp19980415p1907-b1"><span data-dcnode-id="2130" instrument_node="">1</span></a></p><h3 data-dcnode-id="2126"><span data-dcnode-id="2127" instrument_node="">High-Altitude Cerebral Edema</span></h3><p data-dcnode-id="2118"><span data-dcnode-id="2125" instrument_node="">HACE constitutes the progression of severe AMS or HAPE to include involvement of the brain, causing encephalopathy. It is probably related to vasogenic cerebral edema, resulting in increased intracranial pressure. Patients often have severe lassitude and altered consciousness, but the most sensitive indicator for HACE may be ataxia.</span><a class="superscript bibrRef" data-dcnode-id="2123" href="#afp19980415p1907-b16"><span data-dcnode-id="2124" instrument_node="">16</span></a><span data-dcnode-id="2122" instrument_node=""> The tandem gait test is the best test for evaluating this; HACE does not affect finger-to-nose tests for ataxia.</span><a class="superscript bibrRef" data-dcnode-id="2120" href="#afp19980415p1907-b12"><span data-dcnode-id="2121" instrument_node="">12</span></a><span data-dcnode-id="2119" instrument_node=""> Focal neurologic signs are rare. While mild AMS may progress to HACE with unconsciousness within 12 hours, HACE usually requires one to three days to develop. The symptoms of HACE, like HAPE, are worse at night.</span></p><p data-dcnode-id="2116"><span data-dcnode-id="2117" instrument_node="">Treatment of HACE requires immediate descent of at least 610 m (2,000 ft) and if improvement does not occur, descent should continue until the symptoms have resolved. If immediate descent is impossible, oxygen should be administered at a rate of 2 to 4 L per minute, along with dexamethasone (Decadron), 4 mg orally or intramuscularly every six hours, and hyperbaric therapy (as mentioned in the treatment of HAPE) until descent is possible.</span></p><p data-dcnode-id="2112"><span data-dcnode-id="2115" instrument_node="">Sequelae from HACE can last weeks but, eventually, patients usually recover completely. Overall mortality in untreated patients is 13 percent, which rises to 60 percent if coma occurs.</span><a class="superscript bibrRef" data-dcnode-id="2113" href="#afp19980415p1907-b16"><span data-dcnode-id="2114" instrument_node="">16</span></a></p><h3 data-dcnode-id="2110"><span data-dcnode-id="2111" instrument_node="">Other Altitude-Related Disease</span></h3><p data-dcnode-id="2099"><span class="italic" data-dcnode-id="2107"><a data-dcnode-id="2108" href="#afp19980415p1907-t4"><span data-dcnode-id="2109" instrument_node="">Table 4</span></a></span><a class="superscript bibrRef" data-dcnode-id="2105" href="#afp19980415p1907-b2"><span data-dcnode-id="2106" instrument_node="">2</span></a><span class="superscript" data-dcnode-id="2103"><span data-dcnode-id="2104" instrument_node="">,</span></span><a class="superscript bibrRef" data-dcnode-id="2101" href="#afp19980415p1907-b3"><span data-dcnode-id="2102" instrument_node="">3</span></a><span data-dcnode-id="2100" instrument_node=""> describes other altitude-related disorders and their treatment.</span></p><div class="table-format" data-dcnode-id="2023" id="afp19980415p1907-t4"><div class="calltoactionbox" data-dcnode-id="2024"><div class="jDialog highlights" data-dcnode-id="2025"><div class="container secondary" data-dcnode-id="2026"><div class="jDialogPrintHide" data-dcnode-id="2027"><p data-dcnode-id="2095" style="text-align:right;margin-bottom:6px;margin-top:4px;"><a class="jOpener" data-dcnode-id="2096" name="afp19980415p1907-t4"><strong data-dcnode-id="2097"><span data-dcnode-id="2098" instrument_node="">View/Print Table</span></strong></a></p><div class="journalTable" data-dcnode-id="2028" style="max-height: 6044px;"><span class="table-label" data-dcnode-id="2093"><span data-dcnode-id="2094" instrument_node="">TABLE 4</span></span><h4 class="table-title" data-dcnode-id="2091"><span data-dcnode-id="2092" instrument_node="">Other Altitude-Related Disorders</span></h4><table class="no-mobile-table" data-dcnode-id="2046"><thead data-dcnode-id="2083"><tr data-dcnode-id="2084"><th align="left" class="th" colspan="1" data-dcnode-id="2088" rowspan="1" valign="bottom"><span class="italic" data-dcnode-id="2089"><span data-dcnode-id="2090" instrument_node="">Disorder</span></span></th><th align="left" class="th" colspan="1" data-dcnode-id="2085" rowspan="1" valign="bottom"><span class="italic" data-dcnode-id="2086"><span data-dcnode-id="2087" instrument_node="">Treatment</span></span></th></tr></thead><tbody data-dcnode-id="2047"><tr data-dcnode-id="2076"><td align="left" colspan="1" data-dcnode-id="2080" rowspan="1" valign="top"><p class="Tabledata" data-dcnode-id="2081"><span data-dcnode-id="2082" instrument_node="">High-altitude retinopathy</span></p></td><td align="left" colspan="1" data-dcnode-id="2077" rowspan="1" valign="top"><p class="Tabledata" data-dcnode-id="2078"><span data-dcnode-id="2079" instrument_node="">Maintain good fluid intake to reduce hemoconcentration; spontaneously resolves</span></p></td></tr><tr data-dcnode-id="2069"><td align="left" colspan="1" data-dcnode-id="2073" rowspan="1" valign="top"><p class="Tabledata" data-dcnode-id="2074"><span data-dcnode-id="2075" instrument_node="">Peripheral edema</span></p></td><td align="left" colspan="1" data-dcnode-id="2070" rowspan="1" valign="top"><p class="Tabledata" data-dcnode-id="2071"><span data-dcnode-id="2072" instrument_node="">Treat with a diuretic in the absence of AMS, HACE or HAPE; condition spontaneously resolves on descent</span></p></td></tr><tr data-dcnode-id="2062"><td align="left" colspan="1" data-dcnode-id="2066" rowspan="1" valign="top"><p class="Tabledata" data-dcnode-id="2067"><span data-dcnode-id="2068" instrument_node="">Venous stasis and thrombotic complications</span></p></td><td align="left" colspan="1" data-dcnode-id="2063" rowspan="1" valign="top"><p class="Tabledata" data-dcnode-id="2064"><span data-dcnode-id="2065" instrument_node="">Stay active, keep well hydrated and descend if needed</span></p></td></tr><tr data-dcnode-id="2055"><td align="left" colspan="1" data-dcnode-id="2059" rowspan="1" valign="top"><p class="Tabledata" data-dcnode-id="2060"><span data-dcnode-id="2061" instrument_node="">High-altitude pharyngitis and bronchitis</span></p></td><td align="left" colspan="1" data-dcnode-id="2056" rowspan="1" valign="top"><p class="Tabledata" data-dcnode-id="2057"><span data-dcnode-id="2058" instrument_node="">Suck on hard candy, breathe through a face mask and drink plenty of fluids</span></p></td></tr><tr data-dcnode-id="2048"><td align="left" colspan="1" data-dcnode-id="2052" rowspan="1" valign="top"><p class="Tabledata" data-dcnode-id="2053"><span data-dcnode-id="2054" instrument_node="">Ultraviolet keratitis (snow blindness)</span></p></td><td align="left" colspan="1" data-dcnode-id="2049" rowspan="1" valign="top"><p class="Tabledata" data-dcnode-id="2050"><span data-dcnode-id="2051" instrument_node="">Remove contact lenses, patch affected eye, use oral analgesics to decrease pain; prevent by wearing sunglasses</span></p></td></tr></tbody></table><hr class="table-foot" data-dcnode-id="2045"><div class="table-foot" data-dcnode-id="2029"><div class="fn" data-dcnode-id="2040"><p class="fn" data-dcnode-id="2041"><span class="italic" data-dcnode-id="2043"><span data-dcnode-id="2044" instrument_node="">AMS = acute mountain sickness; HACE = high-altitude cerebral edema; HAPE = high-altitude pulmonary edema</span></span><span data-dcnode-id="2042" instrument_node="">.</span></p></div><div class="fn" data-dcnode-id="2030"><p class="fn" data-dcnode-id="2031"><span class="italic" data-dcnode-id="2033"><span data-dcnode-id="2039" instrument_node="">Information from references </span><a class="bibrRef" data-dcnode-id="2037" href="#afp19980415p1907-b2"><span data-dcnode-id="2038" instrument_node="">2</span></a><span data-dcnode-id="2036" instrument_node=""> and </span><a class="bibrRef" data-dcnode-id="2034" href="#afp19980415p1907-b3"><span data-dcnode-id="2035" instrument_node="">3</span></a></span><span data-dcnode-id="2032" instrument_node="">.</span></p></div></div></div></div></div></div></div></div><p data-dcnode-id="2016"><span data-dcnode-id="2022" instrument_node="">High-altitude retinopathy is related to hypoxia</span><a class="superscript bibrRef" data-dcnode-id="2020" href="#afp19980415p1907-b17"><span data-dcnode-id="2021" instrument_node="">17</span></a><span data-dcnode-id="2019" instrument_node=""> and is manifested by cotton-wool exudates, tortuosity and dilation of retinal veins and scotomata. It commonly occurs at altitudes over 5,000 m (16,000 ft), is usually asymptomatic and usually resolves after one to two weeks, even if the patient remains at altitude.</span><a class="superscript bibrRef" data-dcnode-id="2017" href="#afp19980415p1907-b1"><span data-dcnode-id="2018" instrument_node="">1</span></a></p><p data-dcnode-id="2012"><span data-dcnode-id="2015" instrument_node="">Peripheral edema may develop in the hands, face and ankles, and can be treated with diuretics, in the absence of AMS.</span><a class="superscript bibrRef" data-dcnode-id="2013" href="#afp19980415p1907-b2"><span data-dcnode-id="2014" instrument_node="">2</span></a></p><p data-dcnode-id="2010"><span data-dcnode-id="2011" instrument_node="">Thrombotic events such as a pulmonary embolus, stroke and venous thrombosis are a greater danger at high altitudes than at sea level, probably because of the combination of dehydration, polycythemia, cold and constrictive clothing. Bad weather can force prolonged periods of inactivity, causing venous stasis, which may also contribute to thrombosis. To avoid venous stasis and a thrombotic event, patients should be advised to keep active and well hydrated, and to descend immediately if serious complications arise.</span></p><p data-dcnode-id="2003"><span data-dcnode-id="2009" instrument_node="">At high altitude, active immunity and B cell function remain normal, while T cell function is impaired.</span><a class="superscript bibrRef" data-dcnode-id="2007" href="#afp19980415p1907-b1"><span data-dcnode-id="2008" instrument_node="">1</span></a><span data-dcnode-id="2006" instrument_node=""> This effect is probably related to the release of adrenocorticotropic hormone (ACTH), cortisol and endorphins, and results in increased susceptibility to bacterial (but not viral) infections. People at altitude, especially those with AMS, show an increased incidence of infectious symptoms, such as coryza, cough, sore throat and diarrhea. But it is difficult to know if such symptoms represent a real increase in infection or just overlapping symptoms of high-altitude illness.</span><a class="superscript bibrRef" data-dcnode-id="2004" href="#afp19980415p1907-b12"><span data-dcnode-id="2005" instrument_node="">12</span></a></p><p data-dcnode-id="1999"><span data-dcnode-id="2002" instrument_node="">High-altitude pharyngitis and bronchitis are almost universal in people who spend over two weeks at altitudes higher than approximately 5,500 m (18,000 ft). Pharyngitis and bronchitis are probably caused by the effect of cold dry air on the respiratory mucosa, especially with hyperventilation and mouth breathing. Vasomotor rhinitis is common and can be treated with a decongestant nasal spray. Bronchitis can cause coughing fits, which can be disabling. Note that these symptoms are similar to those of early HAPE. Patients should be advised to wear a face mask, suck on hard candy and drink plenty of fluids to decrease these problems.</span><a class="superscript bibrRef" data-dcnode-id="2000" href="#afp19980415p1907-b3"><span data-dcnode-id="2001" instrument_node="">3</span></a></p><p data-dcnode-id="1997"><span data-dcnode-id="1998" instrument_node="">Ultraviolet keratitis (snow blindness) occurs when bright sun reflecting off snow causes corneal burns. Damage can occur in one hour, but symptoms may not develop for six to 12 hours. Patients have severe pain, a “gritty” sensation in the eyes, photophobia, tearing, chemosis, conjunctival erythema and eyelid swelling. The keratitis usually resolves spontaneously in 24 hours, but treatment includes patching of the affected eye, rest and oral nonsteroidal anti-inflammatory drugs to control pain. Snow blindness can be prevented by wearing sunglasses.</span></p></div><div class="jSection" data-dcnode-id="1802" id="sec-4"><h2 data-dcnode-id="1994"><span data-dcnode-id="1995" instrument_node="">Effects of High Altitude on Chronic Illness</span></h2><div class="mjToggle noPrint" data-dcnode-id="1967"><div class="mjHeader noPrint" data-dcnode-id="1991"><span class="mobileSectionLink" data-dcnode-id="1992" style="margin:5px;"><span data-dcnode-id="1993" instrument_node="">Jump to section +</span></span></div><div class="mjContent noPrint" data-dcnode-id="1968" style="display: none;"><ul data-dcnode-id="1969"><li data-dcnode-id="1988"><a alt="Abstract" data-dcnode-id="1989" href="#abstract"><span data-dcnode-id="1990" instrument_node="">
                                    Abstract
                                </span></a></li><li data-dcnode-id="1985"><a data-dcnode-id="1986" href="#sec-1"><span data-dcnode-id="1987" instrument_node="">Illustrative Case</span></a></li><li data-dcnode-id="1982"><a data-dcnode-id="1983" href="#sec-2"><span data-dcnode-id="1984" instrument_node="">Pathophysiology</span></a></li><li data-dcnode-id="1979"><a data-dcnode-id="1980" href="#sec-3"><span data-dcnode-id="1981" instrument_node="">General Characteristics of High-Altitude Illness</span></a></li><li data-dcnode-id="1976"><a data-dcnode-id="1977" href="#sec-4"><span data-dcnode-id="1978" instrument_node="">Effects of High Altitude on Chronic Illness</span></a></li><li data-dcnode-id="1973"><a data-dcnode-id="1974" href="#sec-5"><span data-dcnode-id="1975" instrument_node="">Prevention</span></a></li><li data-dcnode-id="1970"><a data-dcnode-id="1971" href="#ref-list-1"><span data-dcnode-id="1972" instrument_node="">References</span></a></li></ul></div></div><p data-dcnode-id="1951"><span class="italic" data-dcnode-id="1964"><a data-dcnode-id="1965" href="#afp19980415p1907-t5"><span data-dcnode-id="1966" instrument_node="">Table 5</span></a></span><span data-dcnode-id="1963" instrument_node=""> </span><a class="superscript bibrRef" data-dcnode-id="1961" href="#afp19980415p1907-b2"><span data-dcnode-id="1962" instrument_node="">2</span></a><span class="superscript" data-dcnode-id="1959"><span data-dcnode-id="1960" instrument_node="">,</span></span><a class="superscript bibrRef" data-dcnode-id="1957" href="#afp19980415p1907-b3"><span data-dcnode-id="1958" instrument_node="">3</span></a><span class="superscript" data-dcnode-id="1955"><span data-dcnode-id="1956" instrument_node="">,</span></span><a class="superscript bibrRef" data-dcnode-id="1953" href="#afp19980415p1907-b18"><span data-dcnode-id="1954" instrument_node="">18</span></a><span data-dcnode-id="1952" instrument_node=""> summarizes the disorders that require caution with high-altitude travel or that prohibit high-altitude travel.</span></p><div class="table-format" data-dcnode-id="1856" id="afp19980415p1907-t5"><div class="calltoactionbox" data-dcnode-id="1857"><div class="jDialog highlights" data-dcnode-id="1858"><div class="container secondary" data-dcnode-id="1859"><div class="jDialogPrintHide" data-dcnode-id="1860"><p data-dcnode-id="1947" style="text-align:right;margin-bottom:6px;margin-top:4px;"><a class="jOpener" data-dcnode-id="1948" name="afp19980415p1907-t5"><strong data-dcnode-id="1949"><span data-dcnode-id="1950" instrument_node="">View/Print Table</span></strong></a></p><div class="journalTable" data-dcnode-id="1861" style="max-height: 6044px;"><span class="table-label" data-dcnode-id="1945"><span data-dcnode-id="1946" instrument_node="">TABLE 5</span></span><h4 class="table-title" data-dcnode-id="1943"><span data-dcnode-id="1944" instrument_node="">Contraindications and Cautions for High-Altitude Travel</span></h4><table class="no-mobile-table" data-dcnode-id="1883"><tbody data-dcnode-id="1884"><tr data-dcnode-id="1938"><td align="left" colspan="1" data-dcnode-id="1939" rowspan="1" valign="top"><p class="Tabledata" data-dcnode-id="1940"><span class="bold" data-dcnode-id="1941"><span data-dcnode-id="1942" instrument_node="">Contraindications</span></span></p></td></tr><tr data-dcnode-id="1934"><td align="left" colspan="1" data-dcnode-id="1935" rowspan="1" valign="top"><p class="Tabledata" data-dcnode-id="1936"><span data-dcnode-id="1937" instrument_node="">Uncompensated congestive heart failure</span></p></td></tr><tr data-dcnode-id="1930"><td align="left" colspan="1" data-dcnode-id="1931" rowspan="1" valign="top"><p class="Tabledata" data-dcnode-id="1932"><span data-dcnode-id="1933" instrument_node="">Pulmonary hypertension</span></p></td></tr><tr data-dcnode-id="1926"><td align="left" colspan="1" data-dcnode-id="1927" rowspan="1" valign="top"><p class="Tabledata" data-dcnode-id="1928"><span data-dcnode-id="1929" instrument_node="">Sickle cell anemia</span></p></td></tr><tr data-dcnode-id="1922"><td align="left" colspan="1" data-dcnode-id="1923" rowspan="1" valign="top"><p class="Tabledata" data-dcnode-id="1924"><span data-dcnode-id="1925" instrument_node="">Severe COPD</span></p></td></tr><tr data-dcnode-id="1917"><td align="left" colspan="1" data-dcnode-id="1918" rowspan="1" valign="top"><p class="Tabledata" data-dcnode-id="1919"><span class="bold" data-dcnode-id="1920"><span data-dcnode-id="1921" instrument_node="">Cautions</span></span></p></td></tr><tr data-dcnode-id="1913"><td align="left" colspan="1" data-dcnode-id="1914" rowspan="1" valign="top"><p class="Tabledata" data-dcnode-id="1915"><span data-dcnode-id="1916" instrument_node="">Compensated congestive heart failure</span></p></td></tr><tr data-dcnode-id="1909"><td align="left" colspan="1" data-dcnode-id="1910" rowspan="1" valign="top"><p class="Tabledata" data-dcnode-id="1911"><span data-dcnode-id="1912" instrument_node="">Troublesome arrhythmias</span></p></td></tr><tr data-dcnode-id="1905"><td align="left" colspan="1" data-dcnode-id="1906" rowspan="1" valign="top"><p class="Tabledata" data-dcnode-id="1907"><span data-dcnode-id="1908" instrument_node="">Sickle cell trait</span></p></td></tr><tr data-dcnode-id="1901"><td align="left" colspan="1" data-dcnode-id="1902" rowspan="1" valign="top"><p class="Tabledata" data-dcnode-id="1903"><span data-dcnode-id="1904" instrument_node="">Moderate COPD</span></p></td></tr><tr data-dcnode-id="1897"><td align="left" colspan="1" data-dcnode-id="1898" rowspan="1" valign="top"><p class="Tabledata" data-dcnode-id="1899"><span data-dcnode-id="1900" instrument_node="">Seizure disorders (not controlled on medication)</span></p></td></tr><tr data-dcnode-id="1893"><td align="left" colspan="1" data-dcnode-id="1894" rowspan="1" valign="top"><p class="Tabledata" data-dcnode-id="1895"><span data-dcnode-id="1896" instrument_node="">Stable angina or coronary artery disease</span></p></td></tr><tr data-dcnode-id="1889"><td align="left" colspan="1" data-dcnode-id="1890" rowspan="1" valign="top"><p class="Tabledata" data-dcnode-id="1891"><span data-dcnode-id="1892" instrument_node="">Sleep apnea</span></p></td></tr><tr data-dcnode-id="1885"><td align="left" colspan="1" data-dcnode-id="1886" rowspan="1" valign="top"><p class="Tabledata" data-dcnode-id="1887"><span data-dcnode-id="1888" instrument_node="">High-risk pregnancy</span></p></td></tr></tbody></table><hr class="table-foot" data-dcnode-id="1882"><div class="table-foot" data-dcnode-id="1862"><div class="fn" data-dcnode-id="1877"><p class="fn" data-dcnode-id="1878"><span class="italic" data-dcnode-id="1880"><span data-dcnode-id="1881" instrument_node="">COPD = chronic obstructive pulmonary disease</span></span><span data-dcnode-id="1879" instrument_node="">.</span></p></div><div class="fn" data-dcnode-id="1863"><p class="fn" data-dcnode-id="1864"><span class="italic" data-dcnode-id="1866"><span data-dcnode-id="1876" instrument_node="">Information from references </span><a class="bibrRef" data-dcnode-id="1874" href="#afp19980415p1907-b2"><span data-dcnode-id="1875" instrument_node="">2</span></a><span data-dcnode-id="1872"><span data-dcnode-id="1873" instrument_node="">, </span></span><a class="bibrRef" data-dcnode-id="1870" href="#afp19980415p1907-b3"><span data-dcnode-id="1871" instrument_node="">3</span></a><span data-dcnode-id="1869" instrument_node=""> and </span><a class="bibrRef" data-dcnode-id="1867" href="#afp19980415p1907-b18"><span data-dcnode-id="1868" instrument_node="">18</span></a></span><span data-dcnode-id="1865" instrument_node="">.</span></p></div></div></div></div></div></div></div></div><p data-dcnode-id="1852"><span data-dcnode-id="1855" instrument_node="">Patients with sickle cell anemia should not ascend to high altitudes because they can have a sickle crisis at elevations as low as 1,500 m (4,900 ft). Splenic infarction syndrome is also more common at altitude. The incidence of problems in persons with sickle trait is low.</span><a class="superscript bibrRef" data-dcnode-id="1853" href="#afp19980415p1907-b3"><span data-dcnode-id="1854" instrument_node="">3</span></a></p><p data-dcnode-id="1832"><span data-dcnode-id="1851" instrument_node="">Older patients with coronary artery disease do not appear to be at increased risk of AMS on ascent to 2,440 to 3,050 m (8,000 to 10,000 ft).</span><a class="superscript bibrRef" data-dcnode-id="1849" href="#afp19980415p1907-b18"><span data-dcnode-id="1850" instrument_node="">18</span></a><span class="superscript" data-dcnode-id="1847"><span data-dcnode-id="1848" instrument_node="">,</span></span><a class="superscript bibrRef" data-dcnode-id="1845" href="#afp19980415p1907-b19"><span data-dcnode-id="1846" instrument_node="">19</span></a><span data-dcnode-id="1844" instrument_node=""> In one study, active older travelers with preexisting asymptomatic cardiovascular and pulmonary disease traveled to moderate altitudes without exacerbation of their disorders.</span><a class="superscript bibrRef" data-dcnode-id="1842" href="#afp19980415p1907-b19"><span data-dcnode-id="1843" instrument_node="">19</span></a><span data-dcnode-id="1841" instrument_node=""> Exercise testing may be a consideration in patients who are at risk of or who have documented atherosclerotic heart disease. (Authorities in Argentina require the results of an exercise test for everyone applying to climb Mount Aconcagua.</span><a class="superscript bibrRef" data-dcnode-id="1839" href="#afp19980415p1907-b1"><span data-dcnode-id="1840" instrument_node="">1</span></a><span data-dcnode-id="1838" instrument_node="">) Patients with minimal symptoms of angina who are taking few medications and can exercise for over nine minutes on a Bruce protocol will probably tolerate high altitude from a cardiovascular standpoint. However, exercise tolerance at low altitude does not predict a patient's immunity from AMS at high altitude.</span><a class="superscript bibrRef" data-dcnode-id="1836" href="#afp19980415p1907-b1"><span data-dcnode-id="1837" instrument_node="">1</span></a><span data-dcnode-id="1835" instrument_node=""> Patients with essential hypertension are not at increased risk for altitude sickness.</span><a class="superscript bibrRef" data-dcnode-id="1833" href="#afp19980415p1907-b2"><span data-dcnode-id="1834" instrument_node="">2</span></a></p><p data-dcnode-id="1810"><span data-dcnode-id="1831" instrument_node="">Many patients with asthma report improvement in breathing at high altitude, possibly because of the lack of allergens, but some have an increase in cold- or exercise-induced bronchospasm. Investigators in India found that forced vital capacity (FVC) and forced expiratory volume in one second (FEV</span><sub data-dcnode-id="1829"><span data-dcnode-id="1830" instrument_node="">1</span></sub><span data-dcnode-id="1828" instrument_node="">) decline at high altitude, probably because of increased upper airway resistance.</span><a class="superscript bibrRef" data-dcnode-id="1826" href="#afp19980415p1907-b20"><span data-dcnode-id="1827" instrument_node="">20</span></a><span data-dcnode-id="1825" instrument_node=""> Patients with mild chronic obstructive pulmonary disease (COPD) will probably have no trouble without supplemental oxygen at high or very high altitudes. Patients with moderate COPD, however, should exercise caution, and high mountaineering is contraindicated in patients with marked arterial desaturation and carbon dioxide retention.</span><a class="superscript bibrRef" data-dcnode-id="1823" href="#afp19980415p1907-b1"><span data-dcnode-id="1824" instrument_node="">1</span></a><span data-dcnode-id="1822" instrument_node=""> [
</span><a class="object" data-dcnode-id="1820" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.aafp.org/afp/1998/0915/p866.html" id="afp19980415p1907-c1"><span data-dcnode-id="1821" instrument_node="">corrected</span></a><span data-dcnode-id="1819" instrument_node="">] Few data from mountaineering literature are available to define mild, moderate and severe COPD, but the travel medicine literature uses room-air PaCO</span><sub data-dcnode-id="1817"><span data-dcnode-id="1818" instrument_node="">2</span></sub><span data-dcnode-id="1816" instrument_node=""> of greater than 50 mm Hg and PaO</span><sub data-dcnode-id="1814"><span data-dcnode-id="1815" instrument_node="">2</span></sub><span data-dcnode-id="1813" instrument_node=""> of less than 55 percent as contraindications to airline travel without supplemental oxygen (cabin altitude of 2,440 m [8,000 ft]). These figures may serve as guidelines for high-altitude travelers.</span><a class="superscript bibrRef" data-dcnode-id="1811" href="#afp19980415p1907-b21"><span data-dcnode-id="1812" instrument_node="">21</span></a></p><p data-dcnode-id="1803"><span data-dcnode-id="1809" instrument_node="">With regard to pregnancy, exposure to moderate altitude does not seem to increase the incidence of spontaneous abortion, abruptio placenta or placenta previa.</span><a class="superscript bibrRef" data-dcnode-id="1807" href="#afp19980415p1907-b4"><span data-dcnode-id="1808" instrument_node="">4</span></a><span data-dcnode-id="1806" instrument_node=""> Some authorities advise against pregnant patients trekking in remote areas above 2,440 m (8,000 ft).</span><a class="superscript bibrRef" data-dcnode-id="1804" href="#afp19980415p1907-b22"><span data-dcnode-id="1805" instrument_node="">22</span></a></p></div><div class="jSection" data-dcnode-id="1746" id="sec-5"><h2 data-dcnode-id="1800"><span data-dcnode-id="1801" instrument_node="">Prevention</span></h2><div class="mjToggle noPrint" data-dcnode-id="1773"><div class="mjHeader noPrint" data-dcnode-id="1797"><span class="mobileSectionLink" data-dcnode-id="1798" style="margin:5px;"><span data-dcnode-id="1799" instrument_node="">Jump to section +</span></span></div><div class="mjContent noPrint" data-dcnode-id="1774" style="display: none;"><ul data-dcnode-id="1775"><li data-dcnode-id="1794"><a alt="Abstract" data-dcnode-id="1795" href="#abstract"><span data-dcnode-id="1796" instrument_node="">
                                    Abstract
                                </span></a></li><li data-dcnode-id="1791"><a data-dcnode-id="1792" href="#sec-1"><span data-dcnode-id="1793" instrument_node="">Illustrative Case</span></a></li><li data-dcnode-id="1788"><a data-dcnode-id="1789" href="#sec-2"><span data-dcnode-id="1790" instrument_node="">Pathophysiology</span></a></li><li data-dcnode-id="1785"><a data-dcnode-id="1786" href="#sec-3"><span data-dcnode-id="1787" instrument_node="">General Characteristics of High-Altitude Illness</span></a></li><li data-dcnode-id="1782"><a data-dcnode-id="1783" href="#sec-4"><span data-dcnode-id="1784" instrument_node="">Effects of High Altitude on Chronic Illness</span></a></li><li data-dcnode-id="1779"><a data-dcnode-id="1780" href="#sec-5"><span data-dcnode-id="1781" instrument_node="">Prevention</span></a></li><li data-dcnode-id="1776"><a data-dcnode-id="1777" href="#ref-list-1"><span data-dcnode-id="1778" instrument_node="">References</span></a></li></ul></div></div><p data-dcnode-id="1765"><span data-dcnode-id="1772" instrument_node="">Being physically fit does not affect the incidence of AMS,</span><a class="superscript bibrRef" data-dcnode-id="1770" href="#afp19980415p1907-b23"><span data-dcnode-id="1771" instrument_node="">23</span></a><span data-dcnode-id="1769" instrument_node=""> but physical fitness does improve exercise tolerance. It also may help to prevent HACE and HAPE by improving the hemodynamic response to exercise.</span><a class="superscript bibrRef" data-dcnode-id="1767" href="#afp19980415p1907-b9"><span data-dcnode-id="1768" instrument_node="">9</span></a><span data-dcnode-id="1766" instrument_node=""> People going to a high altitude should keep well hydrated by forcing fluids and avoiding alcohol and drugs.</span></p><p data-dcnode-id="1757"><span data-dcnode-id="1764" instrument_node="">On expeditions, mountaineers should use graded ascents to acclimatize. One recommendation is to begin below 2,440 m (8,000 ft), rest the first day and ascend 305
