="#" title="Lan Zhao"><span data-dcnode-id="8203"><span data-dcnode-id="8204" instrument_node="">Lan Zhao</span></span><i aria-hidden="true" class="icon-arrow_d_n" data-dcnode-id="8202"></i></a><div class="author-info accordion-tabbed__content" data-db-target-of="a5" data-dcnode-id="8187"><strong data-dcnode-id="8199"><span data-dcnode-id="8200" instrument_node="">Lan Zhao</span></strong><p class="author-type" data-dcnode-id="8198"></p><span data-dcnode-id="8197" instrument_node=""> </span><p data-dcnode-id="8196"></p><span data-dcnode-id="8195" instrument_node="">From Experimental Medicine, Imperial College London, Hammersmith Hospital, United Kingdom (M.R.W., H.-A.G., L.Z.); Excellence Cluster Cardio-Pulmonary System, Universities of Giessen, Germany (M.R.W., H.-A.G., N.W., L.Z.); University of Giessen Marburg Lung Center, Justus-Liebig-University, Germany (M.R.W., H.-A.G., N.W., L.Z.); Kerckhoff Clinic, Bad Nauheim, Germany (H.-A.G.); Institute of Molecular Biology and Medicine, Bishkek, Kyrgyzstan (A.A.). </span><div class="bottom-info" data-dcnode-id="8189"><span data-dcnode-id="8194" instrument_node=""> </span><p data-dcnode-id="8191"><a data-dcnode-id="8192" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.ahajournals.org/action/doSearch%3FContribAuthorRaw%3DZhao%252C%2BLan"><span data-dcnode-id="8193" instrument_node=""> Search for more papers by this author </span></a></p><span data-dcnode-id="8190" instrument_node=""> </span></div><span data-dcnode-id="8188" instrument_node=""> </span></div><span data-dcnode-id="8186" instrument_node=""> </span></div><span data-dcnode-id="8184" instrument_node=""> </span></div><span data-dcnode-id="8182" instrument_node=""> </span></div><span data-dcnode-id="8180" instrument_node=""> </span></div><span data-dcnode-id="8178" instrument_node=""> </span><div class="epub-section" data-dcnode-id="8167"><span class="epub-section__item" data-dcnode-id="8173"><span class="epub-section__state" data-dcnode-id="8176"><span data-dcnode-id="8177" instrument_node="">Originally published</span></span><span class="epub-section__date" data-dcnode-id="8174"><span data-dcnode-id="8175" instrument_node="">10 Feb 2015</span></span></span><span class="epub-section__item" data-dcnode-id="8170"><a class="epub-section__doi__text" data-dcnode-id="8171" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//doi.org/10.1161/CIRCULATIONAHA.114.006977"><span data-dcnode-id="8172" instrument_node="">https://doi.org/10.1161/CIRCULATIONAHA.114.006977</span></a></span><span class="epub-section__item" data-dcnode-id="8168"><span data-dcnode-id="8169" instrument_node="">Circulation. 2015;131:582–590</span></span></div><ul class="rlist--inline article__corrections corrections-articles" data-dcnode-id="8166"></ul></div><div class="article__body show-references" data-dcnode-id="4545"><p class="fulltext" data-dcnode-id="8164"></p><div class="hlFld-Abstract" data-dcnode-id="8161"><p class="fulltext" data-dcnode-id="8162"></p></div><div class="hlFld-Fulltext" data-dcnode-id="4549"><p data-dcnode-id="8137"><span data-dcnode-id="8158" instrument_node="">It is estimated that &gt;140 million people live above 2500 m in various regions of the world.</span><sup data-dcnode-id="8155"><a class="tab-link" data-dcnode-id="8156" data-tab="pane-pcw-references" href="#R1" id="R1R"><span data-dcnode-id="8157" instrument_node="">1</span></a></sup><span data-dcnode-id="8154" instrument_node=""> There are many challenges to living at high altitude, but chronic exposure to alveolar hypoxia is prominent among them. Inspired P</span><span class="smallcaps smallerCapital" data-dcnode-id="8152"><span data-dcnode-id="8153" instrument_node="">o</span></span><sub data-dcnode-id="8150"><span data-dcnode-id="8151" instrument_node="">2</span></sub><span data-dcnode-id="8149" instrument_node=""> falls from ≈150 mm Hg at sea level to ≈100 mm Hg at 3000 m and 43 mm Hg on the summit of Everest (8400 m).</span><sup data-dcnode-id="8143"><a class="tab-link" data-dcnode-id="8147" data-tab="pane-pcw-references" href="#R2" id="R2R"><span data-dcnode-id="8148" instrument_node="">2</span></a><span data-dcnode-id="8146" instrument_node="">,</span><a class="tab-link" data-dcnode-id="8144" data-tab="pane-pcw-references" href="#R3" id="R3R"><span data-dcnode-id="8145" instrument_node="">3</span></a></sup><span data-dcnode-id="8142" instrument_node=""> The body responds by hyperventilating, increasing resting heart rate, and stimulating red cell production in an attempt to maintain the oxygen content of arterial blood at or above sea level values.</span><sup data-dcnode-id="8139"><a class="tab-link" data-dcnode-id="8140" data-tab="pane-pcw-references" href="#R2" id="R2R"><span data-dcnode-id="8141" instrument_node="">2</span></a></sup><span data-dcnode-id="8138" instrument_node=""> However, hypoxic pulmonary vasoconstriction (HPV) and vascular remodeling, together with increased erythropoiesis, place an increased pressure load on the right ventricle (RV). How well healthy humans adapt to hypoxia depends on their rate of ascent to altitude, the severity and duration of their exposure, and their genetic background.</span></p><div class="anchor-spacer" data-dcnode-id="8136" id="acd3e240"></div><h3 class="article-section__title to-section" data-dcnode-id="8134" id="d3e240"><span data-dcnode-id="8135" instrument_node="">Pathophysiology of Acclimatization to Hypoxia</span></h3><div class="anchor-spacer" data-dcnode-id="8133" id="acd3e243"></div><h4 class="article-section__title" data-dcnode-id="8131" id="d3e243"><span data-dcnode-id="8132" instrument_node="">Pulmonary Vascular Response to Hypoxia</span></h4><p data-dcnode-id="8122"><span data-dcnode-id="8130" instrument_node="">For most mammals, including humans, a rise in pulmonary artery pressure (PAP) is an early and inevitable consequence of ascent to high altitude. Resting mean PAP increases along a parabolic curve from 15 mm Hg at 2000 m to ≈30 mm Hg at 4500 m.</span><sup data-dcnode-id="8127"><a class="tab-link" data-dcnode-id="8128" data-tab="pane-pcw-references" href="#R4" id="R4R"><span data-dcnode-id="8129" instrument_node="">4</span></a></sup><span data-dcnode-id="8126" instrument_node=""> The exceptions and interindividual variation in the magnitude of response offer a natural experiment that might provide insight into fundamental underlying mechanisms (</span><i data-dcnode-id="8124"><span data-dcnode-id="8125" instrument_node="">vide infra</span></i><span data-dcnode-id="8123" instrument_node="">).</span></p><p data-dcnode-id="8100"><span data-dcnode-id="8121" instrument_node="">The initial rise in PAP on exposure to hypoxia is attributed to HPV. With chronic hypoxia, other mechanisms that likely drive vascular remodeling soon contribute to the elevated pressure (</span><a class="" data-dcnode-id="8119" data-tab="pane-pcw-Figures" href="#F1" id="F1R"><span data-dcnode-id="8120" instrument_node="">Figure 1A</span></a><span data-dcnode-id="8118" instrument_node="">). After 2 or 3 weeks of hypoxia, there is little response to rebreathing 100% oxygen, indicating a structural resistance to pulmonary blood flow rather than one based solely on increased vasomotor tone.</span><sup data-dcnode-id="8115"><a class="tab-link" data-dcnode-id="8116" data-tab="pane-pcw-references" href="#R6" id="R6R"><span data-dcnode-id="8117" instrument_node="">6</span></a></sup><span data-dcnode-id="8114" instrument_node=""> A fall in PAP on re-exposure to a normal oxygen environment is evident in rats monitored by telemetry over days after removal from a hypoxic chamber</span><sup data-dcnode-id="8111"><a class="tab-link" data-dcnode-id="8112" data-tab="pane-pcw-references" href="#R7" id="R7R"><span data-dcnode-id="8113" instrument_node="">7</span></a></sup><span data-dcnode-id="8110" instrument_node=""> (</span><a class="" data-dcnode-id="8108" data-tab="pane-pcw-Figures" href="#F1" id="F1R"><span data-dcnode-id="8109" instrument_node="">Figure 1B</span></a><span data-dcnode-id="8107" instrument_node="">) and is also documented in humans.</span><sup data-dcnode-id="8101"><a class="tab-link" data-dcnode-id="8105" data-tab="pane-pcw-references" href="#R4" id="R4R"><span data-dcnode-id="8106" instrument_node="">4</span></a><span data-dcnode-id="8104" instrument_node="">,</span><a class="tab-link" data-dcnode-id="8102" data-tab="pane-pcw-references" href="#R8" id="R8R"><span data-dcnode-id="8103" instrument_node="">8</span></a></sup></p><figure class="article__inlineFigure" data-dcnode-id="8074" id="F1"><img alt="Figure 1." class="figure__image" data-dcnode-id="8099" data-lg-src="/cms/asset/8659c94b-e0aa-40d5-82eb-fb0e8ebc3f13/582fig01.jpg" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.ahajournals.org/cms/asset/773bb91f-6861-435a-8574-cf0b5e16d15b/582fig01.jpg&amp;raw"><div class="figure-links" data-dcnode-id="8091"><ul class="rlist--inline" data-dcnode-id="8092"><li data-dcnode-id="8096"><a data-dcnode-id="8097" download="" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.ahajournals.org/cms/asset/e7d7f843-dd71-4465-a6ce-aeada446cf53/582fig01.jpeg"><span data-dcnode-id="8098" instrument_node="">Download figure</span></a></li><li data-dcnode-id="8093"><a class="ppt-figure-link" data-dcnode-id="8094" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.ahajournals.org/action/downloadFigures%3Fid%3DF1%26doi%3D10.1161%252FCIRCULATIONAHA.114.006977"><span data-dcnode-id="8095" instrument_node="">Download PowerPoint</span></a></li></ul></div><figcaption data-dcnode-id="8075"><strong data-dcnode-id="8090"></strong><span class="figure__caption" data-dcnode-id="8076"><p data-dcnode-id="8077"><strong class="captionLabel" data-dcnode-id="8088"><span data-dcnode-id="8089" instrument_node="">Figure 1.</span></strong><span data-dcnode-id="8087" instrument_node=""> Contribution of hypoxic pulmonary vasoconstriction (HPV) and vascular remodeling to the rise in pulmonary artery pressure (PAP) in chronic hypoxia. </span><strong data-dcnode-id="8085"><span data-dcnode-id="8086" instrument_node="">A</span></strong><span data-dcnode-id="8084" instrument_node="">, The initial rise in PAP in hypoxia is driven by HPV. The pressor response to hypoxia does not return to baseline on return to normoxia in isolated perfused rabbit lungs, even if the perfusate is replaced to remove hypoxia-stimulated circulating vasoactive factors. Modified from Weissmann et al.</span><sup data-dcnode-id="8081"><a class="tab-link" data-dcnode-id="8082" data-tab="pane-pcw-references" href="#R2" id="R2R"><span data-dcnode-id="8083" instrument_node="">5</span></a></sup><strong data-dcnode-id="8079"><span data-dcnode-id="8080" instrument_node="">B</span></strong><span data-dcnode-id="8078" instrument_node="">, Elevated PAP in a telemetered rat takes days to return to baseline after removal from 2 weeks in a hypoxic chamber.</span></p></span></figcaption></figure><div class="anchor-spacer" data-dcnode-id="8073" id="acd3e297"></div><h4 class="article-section__title" data-dcnode-id="8071" id="d3e297"><span data-dcnode-id="8072" instrument_node="">Pulmonary Arteriolar Vasoconstriction Dominates the Acute Pulmonary Vascular Response to Hypoxia</span></h4><p data-dcnode-id="8044"><span data-dcnode-id="8070" instrument_node="">Oxygen tension is a major regulator of pulmonary vascular tone and a physiological mechanism for matching perfusion with ventilation. A fall in alveolar P</span><span class="smallcaps smallerCapital" data-dcnode-id="8068"><span data-dcnode-id="8069" instrument_node="">o</span></span><sub data-dcnode-id="8066"><span data-dcnode-id="8067" instrument_node="">2</span></sub><span data-dcnode-id="8065" instrument_node=""> is the main stimulus for HPV, but a reduction in mixed venous and bronchial arterial P</span><span class="smallcaps smallerCapital" data-dcnode-id="8063"><span data-dcnode-id="8064" instrument_node="">o</span></span><sub data-dcnode-id="8061"><span data-dcnode-id="8062" instrument_node="">2</span></sub><span data-dcnode-id="8060" instrument_node=""> may also contribute.</span><sup data-dcnode-id="8057"><a class="tab-link" data-dcnode-id="8058" data-tab="pane-pcw-references" href="#R9" id="R9R"><span data-dcnode-id="8059" instrument_node="">9</span></a></sup><span data-dcnode-id="8056" instrument_node=""> Ventilation of intact lungs with a hypoxic gaseous mixture (eg, fraction of inspired oxygen=0.10) leads to acute pulmonary vasoconstriction throughout the pulmonary vascular bed, including nonmuscular arterioles, capillaries, and veins, but is most pronounced in small pulmonary arterioles.</span><sup data-dcnode-id="8049"><a class="tab-link" data-dcnode-id="8054" data-tab="pane-pcw-references" href="#R10" id="R10R"><span data-dcnode-id="8055" instrument_node="">10</span></a><a class="tab-link" data-dcnode-id="8052" data-tab="pane-pcw-references" href="#R11%20R12" id="R11 R12R"><span data-dcnode-id="8053" instrument_node="">–</span></a><a class="tab-link" data-dcnode-id="8050" data-tab="pane-pcw-references" href="#R13" id="R13R"><span data-dcnode-id="8051" instrument_node="">13</span></a></sup><span data-dcnode-id="8048" instrument_node=""> That said, HPV is not distributed evenly throughout the lung and lung perfusion is inhomogeneous during hypoxia.</span><sup data-dcnode-id="8045"><a class="tab-link" data-dcnode-id="8046" data-tab="pane-pcw-references" href="#R14" id="R14R"><span data-dcnode-id="8047" instrument_node="">14</span></a></sup></p><p data-dcnode-id="8028"><span data-dcnode-id="8043" instrument_node="">HPV has at least 2 phases (</span><a class="" data-dcnode-id="8041" data-tab="pane-pcw-Figures" href="#F1" id="F1R"><span data-dcnode-id="8042" instrument_node="">Figure 1A</span></a><span data-dcnode-id="8040" instrument_node="">). An initial constrictor response that starts within seconds and reaches a maximum within minutes is followed by a sustained phase, which develops after 30 to 120 minutes.</span><sup data-dcnode-id="8037"><a class="tab-link" data-dcnode-id="8038" data-tab="pane-pcw-references" href="#R9" id="R9R"><span data-dcnode-id="8039" instrument_node="">9</span></a></sup><span data-dcnode-id="8036" instrument_node=""> A transient phase of vasodilation may be observed linking the two, and a third phase of even more pronounced vasoconstriction can occur after 120 minutes. The phases are regulated, at least in part, by different signaling pathways.</span><sup data-dcnode-id="8033"><a class="tab-link" data-dcnode-id="8034" data-tab="pane-pcw-references" href="#R15" id="R15R"><span data-dcnode-id="8035" instrument_node="">15</span></a></sup><span data-dcnode-id="8032" instrument_node=""> In vivo, factors such as neurohumoral mediators, red blood cells, and lung innervation may influence the response.</span><sup data-dcnode-id="8029"><a class="tab-link" data-dcnode-id="8030" data-tab="pane-pcw-references" href="#R16" id="R16R"><span data-dcnode-id="8031" instrument_node="">16</span></a></sup></p><p data-dcnode-id="8004"><span data-dcnode-id="8027" instrument_node="">Alveolar capillaries have been proposed as a site for oxygen sensing with propagation of the hypoxic signal by endothelial membrane depolarization to upstream arterioles in a connexin 40-dependent manner.</span><sup data-dcnode-id="8024"><a class="tab-link" data-dcnode-id="8025" data-tab="pane-pcw-references" href="#R17" id="R17R"><span data-dcnode-id="8026" instrument_node="">17</span></a></sup><span data-dcnode-id="8023" instrument_node=""> However, the recapitulation of contraction to hypoxia in cultured pulmonary artery smooth muscle cells, the effector cells, indicates that an oxygen-sensing mechanism is intrinsic to these cells.</span><sup data-dcnode-id="8020"><a class="tab-link" data-dcnode-id="8021" data-tab="pane-pcw-references" href="#R18" id="R18R"><span data-dcnode-id="8022" instrument_node="">18</span></a></sup><span data-dcnode-id="8019" instrument_node=""> Both mitochondria and nicotinamide adenine dinucleotide (phosphate) oxidases have been suggested as oxygen sensors. A change in the levels of reactive oxygen species is thought to be important, but there is a lack of agreement regarding whether the signal is an increase or decrease in reactive oxygen species (</span><a class="" data-dcnode-id="8017" data-tab="pane-pcw-Figures" href="#F2" id="F2R"><span data-dcnode-id="8018" instrument_node="">Figure 2</span></a><span data-dcnode-id="8016" instrument_node="">).</span><sup data-dcnode-id="8009"><a class="tab-link" data-dcnode-id="8014" data-tab="pane-pcw-references" href="#R19" id="R19R"><span data-dcnode-id="8015" instrument_node="">19</span></a><a class="tab-link" data-dcnode-id="8012" data-tab="pane-pcw-references" href="#R20" id="R20R"><span data-dcnode-id="8013" instrument_node="">–</span></a><a class="tab-link" data-dcnode-id="8010" data-tab="pane-pcw-references" href="#R21" id="R21R"><span data-dcnode-id="8011" instrument_node="">21</span></a></sup><span data-dcnode-id="8008" instrument_node=""> Differences in techniques used contribute to the different observations, but the spatial distribution of reactive oxygen species signaling may also be significant.</span><sup data-dcnode-id="8005"><a class="tab-link" data-dcnode-id="8006" data-tab="pane-pcw-references" href="#R22" id="R22R"><span data-dcnode-id="8007" instrument_node="">22</span></a></sup></p><figure class="article__inlineFigure" data-dcnode-id="7917" id="F2"><img alt="Figure 2." class="figure__image" data-dcnode-id="8003" data-lg-src="/cms/asset/ee4c20ee-8ae5-4edd-b13e-681292e09ea8/582fig02.jpg" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.ahajournals.org/cms/asset/f0334387-e177-4ac0-bb87-e3c60806f9b1/582fig02.jpg&amp;raw"><div class="figure-links" data-dcnode-id="7995"><ul class="rlist--inline" data-dcnode-id="7996"><li data-dcnode-id="8000"><a data-dcnode-id="8001" download="" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.ahajournals.org/cms/asset/b73acccf-0606-47b6-a225-56ca02e6157f/582fig02.jpeg"><span data-dcnode-id="8002" instrument_node="">Download figure</span></a></li><li data-dcnode-id="7997"><a class="ppt-figure-link" data-dcnode-id="7998" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.ahajournals.org/action/downloadFigures%3Fid%3DF2%26doi%3D10.1161%252FCIRCULATIONAHA.114.006977"><span data-dcnode-id="7999" instrument_node="">Download PowerPoint</span></a></li></ul></div><figcaption data-dcnode-id="7918"><strong data-dcnode-id="7994"></strong><span class="figure__caption" data-dcnode-id="7919"><p data-dcnode-id="7920"><strong class="captionLabel" data-dcnode-id="7992"><span data-dcnode-id="7993" instrument_node="">Figure 2.</span></strong><span data-dcnode-id="7991" instrument_node=""> Signaling mechanisms underlying acute hypoxic pulmonary vasoconstriction (HPV). Pathways activated by hypoxia are depicted in blue; those inhibited by hypoxia are depicted in red. Both mitochondria and nicotinamide adenine dinucleotide (phosphate) oxidases have been suggested as oxygen sensors. A reduction in the cytosolic redox state could inhibit voltage-dependent potassium channels, subsequent membrane depolarization of PASMCs, opening of </span><span class="smallcaps smallerCapital" data-dcnode-id="7989"><span data-dcnode-id="7990" instrument_node="">l</span></span><span data-dcnode-id="7988" instrument_node="">-type calcium channels and Ca</span><sup data-dcnode-id="7986"><span data-dcnode-id="7987" instrument_node="">2+</span></sup><span data-dcnode-id="7985" instrument_node=""> influx.</span><sup data-dcnode-id="7982"><a class="tab-link" data-dcnode-id="7983" data-tab="pane-pcw-references" href="#R20" id="R20R"><span data-dcnode-id="7984" instrument_node="">20</span></a></sup><span data-dcnode-id="7981" instrument_node=""> By contrast, increased cytosolic ROS levels can result in Ca</span><sup data-dcnode-id="7979"><span data-dcnode-id="7980" instrument_node="">2+</span></sup><span data-dcnode-id="7978" instrument_node=""> release from the SR, possibly through the oxidation of cysteine residues in RyRs and the opening of IP</span><sub data-dcnode-id="7976"><span data-dcnode-id="7977" instrument_node="">3</span></sub><span data-dcnode-id="7975" instrument_node="">-gated calcium stores.</span><sup data-dcnode-id="7972"><a class="tab-link" data-dcnode-id="7973" data-tab="pane-pcw-references" href="#R19" id="R19R"><span data-dcnode-id="7974" instrument_node="">19</span></a></sup><span data-dcnode-id="7971" instrument_node=""> Increased ROS could also provoke an influx of extracellular Ca</span><sup data-dcnode-id="7969"><span data-dcnode-id="7970" instrument_node="">2+</span></sup><span data-dcnode-id="7968" instrument_node=""> or Na</span><sup data-dcnode-id="7966"><span data-dcnode-id="7967" instrument_node="">+</span></sup><span data-dcnode-id="7965" instrument_node=""> through transient receptor potential channels (TRPC6).</span><sup data-dcnode-id="7962"><a class="tab-link" data-dcnode-id="7963" data-tab="pane-pcw-references" href="#R21" id="R21R"><span data-dcnode-id="7964" instrument_node="">21</span></a></sup><span data-dcnode-id="7961" instrument_node=""> In this scenario, the increase of acute hypoxia-induced ROS triggers an accumulation of DAG, resulting from the activation of phospholipase C or phospholipase D or inhibition of DAG-degrading DAG kinases. Another proposal assumes that acute hypoxia leads to inhibition of the respiratory chain and a subtle decrease in ATP production, which does not affect energy state, but rather acts as a mediator and alters the cellular AMP/ATP ratio. An increase in the AMP/ATP ratio activates AMPK, followed by an increase in cADPR that triggers the release of [Ca</span><sup data-dcnode-id="7959"><span data-dcnode-id="7960" instrument_node="">2+</span></sup><span data-dcnode-id="7958" instrument_node="">]</span><sub data-dcnode-id="7956"><span data-dcnode-id="7957" instrument_node="">i</span></sub><span data-dcnode-id="7955" instrument_node=""> through RyR of SR.</span><sup data-dcnode-id="7952"><a class="tab-link" data-dcnode-id="7953" data-tab="pane-pcw-references" href="#R9" id="R9R"><span data-dcnode-id="7954" instrument_node="">9</span></a></sup><span data-dcnode-id="7951" instrument_node=""> The level of ROS could be relevant through ROS-dependent alteration of function of AMPK and cADPR. AMPK indicates AMP–activated protein kinase; Ca</span><sup data-dcnode-id="7949"><span data-dcnode-id="7950" instrument_node="">2+</span></sup><span data-dcnode-id="7948" instrument_node="">, calcium; cADPR, cyclic ADP–ribose; DAG, diacylglycerol; DGK, DAG kinases; E</span><sub data-dcnode-id="7946"><span data-dcnode-id="7947" instrument_node="">m</span></sub><span data-dcnode-id="7945" instrument_node="">, membrane potential; GSH, glutathione; GSSG, glutathione disulfide; IP</span><sub data-dcnode-id="7943"><span data-dcnode-id="7944" instrument_node="">3</span></sub><span data-dcnode-id="7942" instrument_node="">, inositol trisphosphate; IP</span><sub data-dcnode-id="7940"><span data-dcnode-id="7941" instrument_node="">3</span></sub><span data-dcnode-id="7939" instrument_node="">R, inositol trisphosphate receptor; K</span><sup data-dcnode-id="7937"><span data-dcnode-id="7938" instrument_node="">+</span></sup><span data-dcnode-id="7936" instrument_node="">, potassium; K</span><sub data-dcnode-id="7934"><span data-dcnode-id="7935" instrument_node="">v</span></sub><span data-dcnode-id="7933" instrument_node="">, voltage-dependent potassium channels; Na</span><sup data-dcnode-id="7931"><span data-dcnode-id="7932" instrument_node="">+</span></sup><span data-dcnode-id="7930" instrument_node="">, sodium; NAD</span><sup data-dcnode-id="7928"><span data-dcnode-id="7929" instrument_node="">+</span></sup><span data-dcnode-id="7927" instrument_node="">, nicotinamide adenine dinucleotide; NADH, reduced form of NAD; NAD(P)H, nicotinamide adenine dinucleotide (phosphate) oxidase; O</span><sub data-dcnode-id="7925"><span data-dcnode-id="7926" instrument_node="">2</span></sub><span data-dcnode-id="7924" instrument_node="">, oxygen; PASMC, pulmonary arterial smooth muscle cell; ROS, reactive oxygen species; RyR, ryanodine receptors; SR, sarcoplasmic reticulum; TRPC6, transient receptor potential cation channel 6; and VOCC, voltage–dependent calcium channels (includes </span><span class="smallcaps smallerCapital" data-dcnode-id="7922"><span data-dcnode-id="7923" instrument_node="">l</span></span><span data-dcnode-id="7921" instrument_node="">-type calcium channels).</span></p></span></figcaption></figure><p data-dcnode-id="7898"><span data-dcnode-id="7916" instrument_node="">The second phase of HPV is influenced by endothelial cell function. The endothelium releases a variety of vasoactive mediators, such as endothelin 1, prostacyclin, and nitric oxide (NO; </span><a class="" data-dcnode-id="7914" data-tab="pane-pcw-Figures" href="#F3" id="F3R"><span data-dcnode-id="7915" instrument_node="">Figure 3</span></a><span data-dcnode-id="7913" instrument_node="">),</span><sup data-dcnode-id="7907"><a class="tab-link" data-dcnode-id="7911" data-tab="pane-pcw-references" href="#R9" id="R9R"><span data-dcnode-id="7912" instrument_node="">9</span></a><span data-dcnode-id="7910" instrument_node="">,</span><a class="tab-link" data-dcnode-id="7908" data-tab="pane-pcw-references" href="#R16" id="R16R"><span data-dcnode-id="7909" instrument_node="">16</span></a></sup><span data-dcnode-id="7906" instrument_node=""> and their production is perturbed by hypoxia. For example, oxygen is a substrate for NO synthases, and NO bioavailability is reduced by hypoxia.</span><sup data-dcnode-id="7903"><a class="tab-link" data-dcnode-id="7904" data-tab="pane-pcw-references" href="#R23" id="R23R"><span data-dcnode-id="7905" instrument_node="">23</span></a></sup><span data-dcnode-id="7902" instrument_node=""> In addition, sustained HPV has been shown to depend on glucose level.</span><sup data-dcnode-id="7899"><a class="tab-link" data-dcnode-id="7900" data-tab="pane-pcw-references" href="#R24" id="R24R"><span data-dcnode-id="7901" instrument_node="">24</span></a></sup></p><figure class="article__inlineFigure" data-dcnode-id="7855" id="F3"><img alt="Figure 3." class="figure__image" data-dcnode-id="7897" data-lg-src="/cms/asset/e7dcaab4-0528-40f2-8c48-e5af5533d0ea/582fig03.jpg" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.ahajournals.org/cms/asset/ee5eb783-50bc-4d35-8733-030924a6bf1b/582fig03.jpg&amp;raw"><div class="figure-links" data-dcnode-id="7889"><ul class="rlist--inline" data-dcnode-id="7890"><li data-dcnode-id="7894"><a data-dcnode-id="7895" download="" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.ahajournals.org/cms/asset/00a43a21-f6be-4606-8543-4889335bf897/582fig03.jpeg"><span data-dcnode-id="7896" instrument_node="">Download figure</span></a></li><li data-dcnode-id="7891"><a class="ppt-figure-link" data-dcnode-id="7892" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.ahajournals.org/action/downloadFigures%3Fid%3DF3%26doi%3D10.1161%252FCIRCULATIONAHA.114.006977"><span data-dcnode-id="7893" instrument_node="">Download PowerPoint</span></a></li></ul></div><figcaption data-dcnode-id="7856"><strong data-dcnode-id="7888"></strong><span class="figure__caption" data-dcnode-id="7857"><p data-dcnode-id="7858"><strong class="captionLabel" data-dcnode-id="7886"><span data-dcnode-id="7887" instrument_node="">Figure 3.</span></strong><span data-dcnode-id="7885" instrument_node=""> Signaling mechanisms underlying sustained hypoxic pulmonary vasoconstriction (HPV). The endothelium releases a variety of vasoactive mediators, such as endothelin 1, prostacyclin, and nitric oxide (NO),</span><sup data-dcnode-id="7879"><a class="tab-link" data-dcnode-id="7883" data-tab="pane-pcw-references" href="#R9" id="R9R"><span data-dcnode-id="7884" instrument_node="">9</span></a><span data-dcnode-id="7882" instrument_node="">,</span><a class="tab-link" data-dcnode-id="7880" data-tab="pane-pcw-references" href="#R16" id="R16R"><span data-dcnode-id="7881" instrument_node="">16</span></a></sup><span data-dcnode-id="7878" instrument_node=""> and their production is perturbed by hypoxia. In addition to changes in intracellular Ca</span><sup data-dcnode-id="7876"><span data-dcnode-id="7877" instrument_node="">2+</span></sup><span data-dcnode-id="7875" instrument_node=""> levels, changes in PASMC myofilament sensitivity to Ca</span><sup data-dcnode-id="7873"><span data-dcnode-id="7874" instrument_node="">2+</span></sup><span data-dcnode-id="7872" instrument_node="">, arising from inhibition of MLCP via RhoA/Rho kinase or protein kinase C (PKC), or a decreased activation of MLCP by decreased NO signaling,</span><sup data-dcnode-id="7869"><a class="tab-link" data-dcnode-id="7870" data-tab="pane-pcw-references" href="#R9" id="R9R"><span data-dcnode-id="7871" instrument_node="">9</span></a></sup><span data-dcnode-id="7868" instrument_node=""> also contributes to sustained HVP. ADMA indicates asymmetrical dimethylarginine; cGMP, cyclic guanosine monophosphate; DDAH, dimethylarginine dimethylaminohydrolase; DMA, dimethylamine; ET-1, endothelin 1; EC, endothelial cell; MLC</span><sub data-dcnode-id="7866"><span data-dcnode-id="7867" instrument_node="">20</span></sub><span data-dcnode-id="7865" instrument_node="">, regulatory myosin light chain; MLCP, myosin light chain phosphatase; NO, nitric oxide; NOS, nitric oxide synthase; O</span><sub data-dcnode-id="7863"><span data-dcnode-id="7864" instrument_node="">2</span></sub><span data-dcnode-id="7862" instrument_node="">, oxygen; PASMC, pulmonary arterial smooth muscle cell; PGI</span><sub data-dcnode-id="7860"><span data-dcnode-id="7861" instrument_node="">2</span></sub><span data-dcnode-id="7859" instrument_node="">, prostacyclin; Rho, Ras homolog gene family; ROS, reactive oxygen species; and sGC, soluble guanylyl cyclase. Phosphorylated proteins are indicated by a white “P” in a blue circle.</span></p></span></figcaption></figure><p data-dcnode-id="7840"><span data-dcnode-id="7854" instrument_node="">In addition to changes in intracellular Ca</span><sup data-dcnode-id="7852"><span data-dcnode-id="7853" instrument_node="">2+</span></sup><span data-dcnode-id="7851" instrument_node=""> levels, changes in pulmonary artery smooth muscle cell myofilament sensitivity to Ca</span><sup data-dcnode-id="7849"><span data-dcnode-id="7850" instrument_node="">2+</span></sup><span data-dcnode-id="7848" instrument_node=""> arising from inhibition of myosin light chain phosphatase via RhoA/Rho kinase or protein kinase C or a decreased activation of myosin light chain phosphatase by decreased NO signaling</span><sup data-dcnode-id="7845"><a class="tab-link" data-dcnode-id="7846" data-tab="pane-pcw-references" href="#R9" id="R9R"><span data-dcnode-id="7847" instrument_node="">9</span></a></sup><span data-dcnode-id="7844" instrument_node=""> also contribute to sustained HPV. A recent observation that still has to be reconciled with the effects of global hypoxia-inducible factor (HIF)-1α haploinsufficiency on the pulmonary vasculature is that HIF-1α levels in pulmonary artery smooth muscle cells maintain low pulmonary vascular tone by decreasing myosin light chain phosphorylation.</span><sup data-dcnode-id="7841"><a class="tab-link" data-dcnode-id="7842" data-tab="pane-pcw-references" href="#R25" id="R25R"><span data-dcnode-id="7843" instrument_node="">25</span></a></sup></p><p data-dcnode-id="7831"><span data-dcnode-id="7839" instrument_node="">Rho kinase inhibitors are very effective at preventing and attenuating HPV, underlying the importance of the RhoA/Rho kinase signaling pathway in regulating pulmonary vascular tone. Acute administration of a Rho kinase inhibitor significantly reduces pulmonary vascular resistance in chronically hypoxic rats,</span><sup data-dcnode-id="7836"><a class="tab-link" data-dcnode-id="7837" data-tab="pane-pcw-references" href="#R26" id="R26R"><span data-dcnode-id="7838" instrument_node="">26</span></a></sup><span data-dcnode-id="7835" instrument_node=""> advancing the argument that vasoconstriction is an important pathophysiological mechanism in high-altitude pulmonary hypertension (HAPH), perhaps as important or more important than vascular remodeling.</span><sup data-dcnode-id="7832"><a class="tab-link" data-dcnode-id="7833" data-tab="pane-pcw-references" href="#R27" id="R27R"><span data-dcnode-id="7834" instrument_node="">27</span></a></sup></p><div class="anchor-spacer" data-dcnode-id="7830" id="acd3e531"></div><h4 class="article-section__title" data-dcnode-id="7828" id="d3e531"><span data-dcnode-id="7829" instrument_node="">Vascular Remodeling Contributes to and Sustains the Chronic Pulmonary Vascular Response to Hypoxia</span></h4><p data-dcnode-id="7794"><span data-dcnode-id="7827" instrument_node="">Chronic global alveolar hypoxia is accompanied by structural remodeling of pulmonary vessels. This has been described in a number of species, including rat,</span><sup data-dcnode-id="7824"><a class="tab-link" data-dcnode-id="7825" data-tab="pane-pcw-references" href="#R28" id="R28R"><span data-dcnode-id="7826" instrument_node="">28</span></a></sup><span data-dcnode-id="7823" instrument_node=""> cow,</span><sup data-dcnode-id="7820"><a class="tab-link" data-dcnode-id="7821" data-tab="pane-pcw-references" href="#R29" id="R29R"><span data-dcnode-id="7822" instrument_node="">29</span></a></sup><span data-dcnode-id="7819" instrument_node=""> and humans,</span><sup data-dcnode-id="7816"><a class="tab-link" data-dcnode-id="7817" data-tab="pane-pcw-references" href="#R30" id="R30R"><span data-dcnode-id="7818" instrument_node="">30</span></a></sup><span data-dcnode-id="7815" instrument_node=""> although some species seem resistant.</span><sup data-dcnode-id="7812"><a class="tab-link" data-dcnode-id="7813" data-tab="pane-pcw-references" href="#R31" id="R31R"><span data-dcnode-id="7814" instrument_node="">31</span></a></sup><span data-dcnode-id="7811" instrument_node=""> All of the layers of the vascular wall, including fibroblasts, are involved in the remodeling (</span><a class="" data-dcnode-id="7809" data-tab="pane-pcw-Figures" href="#F4" id="F4R"><span data-dcnode-id="7810" instrument_node="">Figure 4</span></a><span data-dcnode-id="7808" instrument_node="">),</span><sup data-dcnode-id="7802"><a class="tab-link" data-dcnode-id="7806" data-tab="pane-pcw-references" href="#R32" id="R32R"><span data-dcnode-id="7807" instrument_node="">32</span></a><span data-dcnode-id="7805" instrument_node="">,</span><a class="tab-link" data-dcnode-id="7803" data-tab="pane-pcw-references" href="#R33" id="R33R"><span data-dcnode-id="7804" instrument_node="">33</span></a></sup><span data-dcnode-id="7801" instrument_node=""> but the hallmark of the vascular response to chronic hypoxia is increased muscularization of distal vessels with extension of muscle into previously unmuscularized arterioles.</span><sup data-dcnode-id="7795"><a class="tab-link" data-dcnode-id="7799" data-tab="pane-pcw-references" href="#R28" id="R28R"><span data-dcnode-id="7800" instrument_node="">28</span></a><span data-dcnode-id="7798" instrument_node="">,</span><a class="tab-link" data-dcnode-id="7796" data-tab="pane-pcw-references" href="#R30" id="R30R"><span data-dcnode-id="7797" instrument_node="">30</span></a></sup></p><figure class="article__inlineFigure" data-dcnode-id="7735" id="F4"><img alt="Figure 4." class="figure__image" data-dcnode-id="7793" data-lg-src="/cms/asset/774cff57-644c-4bd0-9013-0ac3099f0362/582fig04.jpg" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.ahajournals.org/cms/asset/5805cb88-96bd-4b59-b7a1-a59b16787b9c/582fig04.jpg&amp;raw"><div class="figure-links" data-dcnode-id="7785"><ul class="rlist--inline" data-dcnode-id="7786"><li data-dcnode-id="7790"><a data-dcnode-id="7791" download="" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.ahajournals.org/cms/asset/8894bcd7-0bdf-44d3-baef-1f0773d466bc/582fig04.jpeg"><span data-dcnode-id="7792" instrument_node="">Download figure</span></a></li><li data-dcnode-id="7787"><a class="ppt-figure-link" data-dcnode-id="7788" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.ahajournals.org/action/downloadFigures%3Fid%3DF4%26doi%3D10.1161%252FCIRCULATIONAHA.114.006977"><span data-dcnode-id="7789" instrument_node="">Download PowerPoint</span></a></li></ul></div><figcaption data-dcnode-id="7736"><strong data-dcnode-id="7784"></strong><span class="figure__caption" data-dcnode-id="7737"><p data-dcnode-id="7738"><strong class="captionLabel" data-dcnode-id="7782"><span data-dcnode-id="7783" instrument_node="">Figure 4.</span></strong><span data-dcnode-id="7781" instrument_node=""> Mechanisms of vascular remodeling in chronic hypoxia. The vascular remodeling in response to chronic hypoxia involves all 3 layers of the vascular wall–intima, media, and adventitia.</span><sup data-dcnode-id="7778"><a class="tab-link" data-dcnode-id="7779" data-tab="pane-pcw-references" href="#R32" id="R32R"><span data-dcnode-id="7780" instrument_node="">32</span></a></sup><span data-dcnode-id="7777" instrument_node=""> Endothelial cell dysfunction and intimal proliferation are evident and prominent in some species, such as the rat, exposed to moderately severe hypoxia.</span><sup data-dcnode-id="7774"><a class="tab-link" data-dcnode-id="7775" data-tab="pane-pcw-references" href="#R34" id="R34R"><span data-dcnode-id="7776" instrument_node="">34</span></a></sup><span data-dcnode-id="7773" instrument_node=""> However, the hallmark of HAPH is increased muscularization of distal vessels with extension of muscle into previously unmuscularized arterioles.</span><sup data-dcnode-id="7767"><a class="tab-link" data-dcnode-id="7771" data-tab="pane-pcw-references" href="#R28" id="R28R"><span data-dcnode-id="7772" instrument_node="">28</span></a><span data-dcnode-id="7770" instrument_node="">,</span><a class="tab-link" data-dcnode-id="7768" data-tab="pane-pcw-references" href="#R30" id="R30R"><span data-dcnode-id="7769" instrument_node="">30</span></a></sup><span data-dcnode-id="7766" instrument_node=""> There is thickening of the media of large and medium pulmonary arteries, which, in large mammals (including humans), is attributable mainly to the proliferation of smooth muscle cells, along with increased collagen and elastin deposition.</span><sup data-dcnode-id="7763"><a class="tab-link" data-dcnode-id="7764" data-tab="pane-pcw-references" href="#R32" id="R32R"><span data-dcnode-id="7765" instrument_node="">32</span></a></sup><span data-dcnode-id="7762" instrument_node=""> The medial layer of proximal vessels contains a heterogeneous population of smooth muscle cells, which includes a reservoir of cells that can divide when exposed to hypoxia and could contribute to vascular hyperplasia.</span><sup data-dcnode-id="7759"><a class="tab-link" data-dcnode-id="7760" data-tab="pane-pcw-references" href="#R32" id="R32R"><span data-dcnode-id="7761" instrument_node="">32</span></a></sup><span data-dcnode-id="7758" instrument_node=""> Medial smooth muscle cells from distal resistance pulmonary arterioles have a lower capacity for proliferation. Remodeling in the distal vasculature may depend on the presence of cells from other vascular compartments, including circulating inflammatory cells and peripheral blood hematopoietic cells, that might stimulate proliferation or transdifferentiate into smooth muscle-like cells. Increasing recognition is given to an adventitial reaction mediated by the fibroblast in response to hypoxia and vascular wall stress.</span><sup data-dcnode-id="7755"><a class="tab-link" data-dcnode-id="7756" data-tab="pane-pcw-references" href="#R33" id="R33R"><span data-dcnode-id="7757" instrument_node="">33</span></a></sup><span data-dcnode-id="7754" instrument_node=""> In addition, an inflammatory cell infiltrate, composed of monocytes, dendritic cells, and T cells, is evident.</span><sup data-dcnode-id="7751"><a class="tab-link" data-dcnode-id="7752" data-tab="pane-pcw-references" href="#R35" id="R35R"><span data-dcnode-id="7753" instrument_node="">35</span></a></sup><span data-dcnode-id="7750" instrument_node=""> Evidence for epigenetic regulation of pulmonary vascular remodeling comes from experiments with HDACs. Class I HDAC inhibitors markedly decreased cytokine/chemokine mRNA expression levels in these cells proliferating adventitial fibroblasts and their ability to induce monocyte migration and inflammation.</span><sup data-dcnode-id="7747"><a class="tab-link" data-dcnode-id="7748" data-tab="pane-pcw-references" href="#R36" id="R36R"><span data-dcnode-id="7749" instrument_node="">36</span></a></sup><span data-dcnode-id="7746" instrument_node=""> This in part may be attributed to modulation of microRNA-124 expression.</span><sup data-dcnode-id="7743"><a class="tab-link" data-dcnode-id="7744" data-tab="pane-pcw-references" href="#R37" id="R37R"><span data-dcnode-id="7745" instrument_node="">37</span></a></sup><span data-dcnode-id="7742" instrument_node=""> ECAM indicates endothelial cell adhesion molecule; FGF, fibroblast growth factor; HDAC, histone deacetylase; GM-CSF, granulocyte macrophage colony stimulating factor; HIF, hypoxia-inducible factor; ICAM, intercellular adhesion molecule; IL-1β, interleukin 6; IL-6, interleukin 6; NO-sGC-cGMP, nitric oxide-soluble guanylate cyclase-cyclic GMP; PDGF, platelet-derived growth factor; PGI</span><sub data-dcnode-id="7740"><span data-dcnode-id="7741" instrument_node="">2</span></sub><span data-dcnode-id="7739" instrument_node="">, prostacyclin; ROS, reactive oxygen species; TRPC6, transient receptor potential cation channel 6; and VCAM, vascular cell adhesion molecule.</span></p></span></figcaption></figure><p data-dcnode-id="7715"><span data-dcnode-id="7734" instrument_node="">Hypoxia leads to changes in endothelial cell membrane properties that compromise barrier function, resulting in an influx of plasma proteins that may activate vascular wall proteases.</span><sup data-dcnode-id="7731"><a class="tab-link" data-dcnode-id="7732" data-tab="pane-pcw-references" href="#R34" id="R34R"><span data-dcnode-id="7733" instrument_node="">34</span></a></sup><span data-dcnode-id="7730" instrument_node=""> In addition, mechanical stress, blood-borne and locally produced factors, and the recruitment of circulating cells act collectively to drive the vascular remodeling of small and large pulmonary vessels, with increasing recognition of the role of inflammation (</span><a class="" data-dcnode-id="7728" data-tab="pane-pcw-Figures" href="#F4" id="F4R"><span data-dcnode-id="7729" instrument_node="">Figure 4</span></a><span data-dcnode-id="7727" instrument_node="">).</span><sup data-dcnode-id="7720"><a class="tab-link" data-dcnode-id="7725" data-tab="pane-pcw-references" href="#R35" id="R35R"><span data-dcnode-id="7726" instrument_node="">35</span></a><a class="tab-link" data-dcnode-id="7723" data-tab="pane-pcw-references" href="#R36" id="R36R"><span data-dcnode-id="7724" instrument_node="">–</span></a><a class="tab-link" data-dcnode-id="7721" data-tab="pane-pcw-references" href="#R37" id="R37R"><span data-dcnode-id="7722" instrument_node="">37</span></a></sup><span data-dcnode-id="7719" instrument_node=""> Rapid expansion of the adventitial vasa vasorum serves to facilitate the arrival of these cells.</span><sup data-dcnode-id="7716"><a class="tab-link" data-dcnode-id="7717" data-tab="pane-pcw-references" href="#R33" id="R33R"><span data-dcnode-id="7718" instrument_node="">33</span></a></sup></p><p data-dcnode-id="7684"><span data-dcnode-id="7714" instrument_node="">HIFs and nuclear factor-κB are key transcriptional regulators of the proliferative and inflammatory responses to hypoxia. Pulmonary hypertension in hypoxic mice haploinsufficient for </span><i data-dcnode-id="7712"><span data-dcnode-id="7713" instrument_node="">HIF-1α</span></i><span data-dcnode-id="7711" instrument_node=""> (Hif1α</span><i data-dcnode-id="7709"><span data-dcnode-id="7710" instrument_node="">+/</span></i><span data-dcnode-id="7708" instrument_node="">-) or </span><i data-dcnode-id="7706"><span data-dcnode-id="7707" instrument_node="">HIF-2α</span></i><span data-dcnode-id="7705" instrument_node=""> (Hif2α</span><i data-dcnode-id="7703"><span data-dcnode-id="7704" instrument_node="">+/</span></i><span data-dcnode-id="7702" instrument_node="">-) is attenuated.</span><sup data-dcnode-id="7696"><a class="tab-link" data-dcnode-id="7700" data-tab="pane-pcw-references" href="#R38" id="R38R"><span data-dcnode-id="7701" instrument_node="">38</span></a><span data-dcnode-id="7699" instrument_node="">,</span><a class="tab-link" data-dcnode-id="7697" data-tab="pane-pcw-references" href="#R39" id="R39R"><span data-dcnode-id="7698" instrument_node="">39</span></a></sup><span data-dcnode-id="7695" instrument_node=""> Conversely, gain-of-function mutations in </span><i data-dcnode-id="7693"><span data-dcnode-id="7694" instrument_node="">HIF-2α</span></i><span data-dcnode-id="7692" instrument_node=""> are associated with the development of pulmonary hypertension in mice and humans.</span><sup data-dcnode-id="7685"><a class="tab-link" data-dcnode-id="7690" data-tab="pane-pcw-references" href="#R40" id="R40R"><span data-dcnode-id="7691" instrument_node="">40</span></a><a class="tab-link" data-dcnode-id="7688" data-tab="pane-pcw-references" href="#R41" id="R41R"><span data-dcnode-id="7689" instrument_node="">–</span></a><a class="tab-link" data-dcnode-id="7686" data-tab="pane-pcw-references" href="#R42" id="R42R"><span data-dcnode-id="7687" instrument_node="">42</span></a></sup></p><p data-dcnode-id="7674"><span data-dcnode-id="7683" instrument_node="">Although in part caused by and adaptive to the increase in hemodynamic stress, the vascular remodeling contributes to and sustains the elevated PAP. Indeed, the structural changes take a considerable time to resolve on return to a sea-level oxygen environment and may persist in some form.</span><sup data-dcnode-id="7680"><a class="tab-link" data-dcnode-id="7681" data-tab="pane-pcw-references" href="#R43" id="R43R"><span data-dcnode-id="7682" instrument_node="">43</span></a></sup><span data-dcnode-id="7679" instrument_node=""> The extent to which the structural changes in pulmonary resistance vessels infringe on the lumen and contribute a physical obstruction to blood flow (ie, the argument being that vascular growth is outward rather than inward) and the extent of vascular rarefaction in response to chronic hypoxia are unclear.</span><sup data-dcnode-id="7676"><a class="tab-link" data-dcnode-id="7677" data-tab="pane-pcw-references" href="#R44" id="R44R"><span data-dcnode-id="7678" instrument_node="">44</span></a></sup><span data-dcnode-id="7675" instrument_node=""> These may vary between species.</span></p><p data-dcnode-id="7665"><span data-dcnode-id="7673" instrument_node="">Mechanisms other than narrowing of the vessel lumen are relevant to this discussion, specifically the contribution of changes in vascular compliance.</span><sup data-dcnode-id="7670"><a class="tab-link" data-dcnode-id="7671" data-tab="pane-pcw-references" href="#R45" id="R45R"><span data-dcnode-id="7672" instrument_node="">45</span></a></sup><span data-dcnode-id="7669" instrument_node=""> Changes in the stiffness of proximal vessels leads to changes in the propagation of high-energy pulsatile waves. These are transmitted to the microcirculation, where they might perpetuate or potentially even cause the microcirculatory changes, as well as contribute to the burden on the RV.</span><sup data-dcnode-id="7666"><a class="tab-link" data-dcnode-id="7667" data-tab="pane-pcw-references" href="#R46" id="R46R"><span data-dcnode-id="7668" instrument_node="">46</span></a></sup></p><div class="anchor-spacer" data-dcnode-id="7664" id="acd3e693"></div><h4 class="article-section__title" data-dcnode-id="7662" id="d3e693"><span data-dcnode-id="7663" instrument_node="">Cardiac Response to Chronic Hypoxia</span></h4><p data-dcnode-id="7643"><span data-dcnode-id="7661" instrument_node="">Studies of healthy subjects exposed to hypoxia report an increase in resting heart rate and an initial increase in cardiac output in an attempt to maintain oxygen delivery to tissues.</span><sup data-dcnode-id="7658"><a class="tab-link" data-dcnode-id="7659" data-tab="pane-pcw-references" href="#R47" id="R47R"><span data-dcnode-id="7660" instrument_node="">47</span></a></sup><span data-dcnode-id="7657" instrument_node=""> After 2 to 3 days of hypoxia, stroke volume falls. Heart rate remains elevated, and so cardiac output remains at or just below sea level. Oxygen delivery to tissues is maintained by increased oxygen extraction. The roles of activation of the sympathetic nervous system, hypovolemia (from hyperventilation and increased diuresis), hypocapnia (from hyperventilation), and myocardial contractility in this response are difficult to discern.</span><sup data-dcnode-id="7654"><a class="tab-link" data-dcnode-id="7655" data-tab="pane-pcw-references" href="#R47" id="R47R"><span data-dcnode-id="7656" instrument_node="">47</span></a></sup><span data-dcnode-id="7653" instrument_node=""> On the whole, myocardial contractility is preserved, although reversible reductions in cardiac mass and myocardial phosphocreatine/ATP have been documented in healthy volunteers after a 17-day trek to 5300 m.</span><sup data-dcnode-id="7650"><a class="tab-link" data-dcnode-id="7651" data-tab="pane-pcw-references" href="#R48" id="R48R"><span data-dcnode-id="7652" instrument_node="">48</span></a></sup><span data-dcnode-id="7649" instrument_node=""> Right heart failure is a risk in some previously healthy individuals, precipitated by more extreme pulmonary vascular responses to hypoxia, and also in the context of chronic mountain sickness (CMS), from pronounced erythrocytosis and fluid retention (from relatively higher P</span><span class="smallcaps smallerCapital" data-dcnode-id="7647"><span data-dcnode-id="7648" instrument_node="">co</span></span><sub data-dcnode-id="7645"><span data-dcnode-id="7646" instrument_node="">2</span></sub><span data-dcnode-id="7644" instrument_node="">).</span></p><div class="anchor-spacer" data-dcnode-id="7642" id="acd3e715"></div><h4 class="article-section__title" data-dcnode-id="7640" id="d3e715"><span data-dcnode-id="7641" instrument_node="">Exercise</span></h4><p data-dcnode-id="7613"><span data-dcnode-id="7639" instrument_node="">Exercise capacity is reduced at altitude, even after acclimatization, but the contribution of pulmonary hypertension is controversial.</span><sup data-dcnode-id="7633"><a class="tab-link" data-dcnode-id="7637" data-tab="pane-pcw-references" href="#R49" id="R49R"><span data-dcnode-id="7638" instrument_node="">49</span></a><span data-dcnode-id="7636" instrument_node="">,</span><a class="tab-link" data-dcnode-id="7634" data-tab="pane-pcw-references" href="#R50" id="R50R"><span data-dcnode-id="7635" instrument_node="">50</span></a></sup><span data-dcnode-id="7632" instrument_node=""> PAP increases more sharply with the increase in cardiac output on exercise at altitude than at sea level.</span><sup data-dcnode-id="7629"><a class="tab-link" data-dcnode-id="7630" data-tab="pane-pcw-references" href="#R51" id="R51R"><span data-dcnode-id="7631" instrument_node="">51</span></a></sup><span data-dcnode-id="7628" instrument_node=""> This augmented rise in PAP with exercise can persist for some time in acclimatized highlanders on descent to sea level, most likely reflecting structural remodeling of the pulmonary vasculature with chronic exposure.</span><sup data-dcnode-id="7622"><a class="tab-link" data-dcnode-id="7626" data-tab="pane-pcw-references" href="#R5" id="R5R"><span data-dcnode-id="7627" instrument_node="">5</span></a><span data-dcnode-id="7625" instrument_node="">,</span><a class="tab-link" data-dcnode-id="7623" data-tab="pane-pcw-references" href="#R8" id="R8R"><span data-dcnode-id="7624" instrument_node="">8</span></a></sup><span data-dcnode-id="7621" instrument_node=""> The increase in PAP may impair gas exchange from interstitial and alveolar edema and reduce maximal cardiac output, leading to a reduction in oxygen transport to exercising muscles.</span><sup data-dcnode-id="7618"><a class="tab-link" data-dcnode-id="7619" data-tab="pane-pcw-references" href="#R49" id="R49R"><span data-dcnode-id="7620" instrument_node="">49</span></a></sup><span data-dcnode-id="7617" instrument_node=""> However, definitive data from direct measurements of RV function at altitude are few, and not all are convinced that the improvement in exercise capacity at altitude reported with some pulmonary vasodilators is attributed to a reduction in RV afterload.</span><sup data-dcnode-id="7614"><a class="tab-link" data-dcnode-id="7615" data-tab="pane-pcw-references" href="#R50" id="R50R"><span data-dcnode-id="7616" instrument_node="">50</span></a></sup></p><div class="anchor-spacer" data-dcnode-id="7612" id="acd3e745"></div><h4 class="article-section__title" data-dcnode-id="7610" id="d3e745"><span data-dcnode-id="7611" instrument_node="">Erythropoietic Response to Hypoxia</span></h4><p data-dcnode-id="7593"><span data-dcnode-id="7609" instrument_node="">Exposure to hypoxia leads to changes in blood-O</span><sub data-dcnode-id="7607"><span data-dcnode-id="7608" instrument_node="">2</span></sub><span data-dcnode-id="7606" instrument_node=""> affinity and stimulates red cell production in an attempt to improve tissue oxygenation. Increased red cell 2,3 diphosphoglycerate levels have an allosteric effect on hemoglobin, reducing its affinity for O</span><sub data-dcnode-id="7604"><span data-dcnode-id="7605" instrument_node="">2</span></sub><span data-dcnode-id="7603" instrument_node=""> and facilitating its release to tissues, although this is at the expense of impairing O</span><sub data-dcnode-id="7601"><span data-dcnode-id="7602" instrument_node="">2</span></sub><span data-dcnode-id="7600" instrument_node=""> capture as blood passes through the lungs. Increasing red cell mass also has its downside, as it increases blood viscosity. Little attention has been paid to the contribution of increased blood viscosity to PAP, because the increase in PAP precedes the rise in hemoglobin, and patients with polycythemia at sea level do not have pulmonary hypertension. A recent re-evaluation of the effect of increased blood viscosity on PAP measurements at altitude suggests that some correction for hematocrit is important.</span><sup data-dcnode-id="7594"><a class="tab-link" data-dcnode-id="7598" data-tab="pane-pcw-references" href="#R52" id="R52R"><span data-dcnode-id="7599" instrument_node="">52</span></a><span data-dcnode-id="7597" instrument_node="">,</span><a class="tab-link" data-dcnode-id="7595" data-tab="pane-pcw-references" href="#R53" id="R53R"><span data-dcnode-id="7596" instrument_node="">53</span></a></sup></p><div class="anchor-spacer" data-dcnode-id="7592" id="acd3e766"></div><h3 class="article-section__title to-section" data-dcnode-id="7590" id="d3e766"><span data-dcnode-id="7591" instrument_node="">Clinical Presentations From Maladaptation to Hypoxia</span></h3><div class="anchor-spacer" data-dcnode-id="7589" id="acd3e769"></div><h4 class="article-section__title" data-dcnode-id="7587" id="d3e769"><span data-dcnode-id="7588" instrument_node="">Variation in Susceptibility to High-Altitude Pulmonary Vascular Disease</span></h4><p data-dcnode-id="7565"><span data-dcnode-id="7586" instrument_node="">The rise in PAP in chronic hypoxia is generally modest, certainly compared with that seen in idiopathic pulmonary arterial hypertension, and is compatible with a normal life at high altitude. However, variation in the pulmonary vascular response to hypoxia is well recognized, both between and within species,</span><sup data-dcnode-id="7574"><a class="tab-link" data-dcnode-id="7584" data-tab="pane-pcw-references" href="#R16" id="R16R"><span data-dcnode-id="7585" instrument_node="">16</span></a><span data-dcnode-id="7583" instrument_node="">,</span><a class="tab-link" data-dcnode-id="7581" data-tab="pane-pcw-references" href="#R31" id="R31R"><span data-dcnode-id="7582" instrument_node="">31</span></a><span data-dcnode-id="7580" instrument_node="">,</span><a class="tab-link" data-dcnode-id="7578" data-tab="pane-pcw-references" href="#R54" id="R54R"><span data-dcnode-id="7579" instrument_node="">54</span></a><span data-dcnode-id="7577" instrument_node="">,</span><a class="tab-link" data-dcnode-id="7575" data-tab="pane-pcw-references" href="#R55" id="R55R"><span data-dcnode-id="7576" instrument_node="">55</span></a></sup><span data-dcnode-id="7573" instrument_node=""> and in humans the magnitude of HPV can vary ≈5-fold among individuals.</span><sup data-dcnode-id="7567"><a class="tab-link" data-dcnode-id="7571" data-tab="pane-pcw-references" href="#R16" id="R16R"><span data-dcnode-id="7572" instrument_node="">16</span></a><span data-dcnode-id="7570" instrument_node="">,</span><a class="tab-link" data-dcnode-id="7568" data-tab="pane-pcw-references" href="#R55" id="R55R"><span data-dcnode-id="7569" instrument_node="">55</span></a></sup><span data-dcnode-id="7566" instrument_node=""> Extreme responders are at highest risk of presenting acutely on arrival at altitude with high-altitude pulmonary edema (HAPE) or over weeks, months, and years with right heart failure secondary to severe pulmonary hypertension or excessive erythrocytosis.</span></p><div class="anchor-spacer" data-dcnode-id="7564" id="acd3e794"></div><h4 class="article-section__title" data-dcnode-id="7562" id="d3e794"><span data-dcnode-id="7563" instrument_node="">High-Altitude Pulmonary Edema</span></h4><p data-dcnode-id="7542"><span data-dcnode-id="7561" instrument_node="">The pathognomonic clinical feature is breathlessness accompanied by cough, initially dry but later productive of white and then pink frothy sputum.</span><sup data-dcnode-id="7555"><a class="tab-link" data-dcnode-id="7559" data-tab="pane-pcw-references" href="#R3" id="R3R"><span data-dcnode-id="7560" instrument_node="">3</span></a><span data-dcnode-id="7558" instrument_node="">,</span><a class="tab-link" data-dcnode-id="7556" data-tab="pane-pcw-references" href="#R56" id="R56R"><span data-dcnode-id="7557" instrument_node="">56</span></a></sup><span data-dcnode-id="7554" instrument_node=""> Tachycardia, mild pyrexia, and sometimes cyanosis are also evident. The chest radiograph shows pulmonary edema. The condition develops in susceptible individuals within the first 2 to 4 days of arrival at altitudes above 2500 m. It is precipitated by rapid ascent and exercise and is potentially lethal if not treated. The incidence is variously recorded, depending on the subject population, rapidity of ascent, and final altitude; everyone is at risk of HAPE if they ascend fast and high enough. It is caused by exaggerated and uneven HPV leading to high capillary pressures in regions of the lung and an exudation that might invoke a secondary inflammatory response.</span><sup data-dcnode-id="7547"><a class="tab-link" data-dcnode-id="7552" data-tab="pane-pcw-references" href="#R57" id="R57R"><span data-dcnode-id="7553" instrument_node="">57</span></a><a class="tab-link" data-dcnode-id="7550" data-tab="pane-pcw-references" href="#R58" id="R58R"><span data-dcnode-id="7551" instrument_node="">–</span></a><a class="tab-link" data-dcnode-id="7548" data-tab="pane-pcw-references" href="#R59" id="R59R"><span data-dcnode-id="7549" instrument_node="">59</span></a></sup><span data-dcnode-id="7546" instrument_node=""> Susceptible individuals exhibit a marked rise in PAP on exposure to hypoxia mediated by pulmonary arteriolar vasoconstriction and a greater rise in PAP on exercise in a normal oxygen environment, indicating a hyperactive pulmonary circulation.</span><sup data-dcnode-id="7543"><a class="tab-link" data-dcnode-id="7544" data-tab="pane-pcw-references" href="#R56" id="R56R"><span data-dcnode-id="7545" instrument_node="">56</span></a></sup></p><p data-dcnode-id="7522"><span data-dcnode-id="7541" instrument_node="">The emphasis in management is on prevention. Travelers should manage their rate of ascent to 300 to 500 m per day along with a day of rest every 3 to 4 days when traveling above 3000 m.</span><sup data-dcnode-id="7538"><a class="tab-link" data-dcnode-id="7539" data-tab="pane-pcw-references" href="#R56" id="R56R"><span data-dcnode-id="7540" instrument_node="">56</span></a></sup><span data-dcnode-id="7537" instrument_node=""> Pharmacologic measures that have been evaluated and demonstrated efficacy in reducing the incidence of HAPE include slow-release nifedipine (30 mg BID),</span><sup data-dcnode-id="7534"><a class="tab-link" data-dcnode-id="7535" data-tab="pane-pcw-references" href="#R60" id="R60R"><span data-dcnode-id="7536" instrument_node="">60</span></a></sup><span data-dcnode-id="7533" instrument_node=""> the phosphodiesterase type 5 inhibitor tadalafil (10 mg BID), and dexamethasone (8 mg BID).</span><sup data-dcnode-id="7530"><a class="tab-link" data-dcnode-id="7531" data-tab="pane-pcw-references" href="#R61" id="R61R"><span data-dcnode-id="7532" instrument_node="">61</span></a></sup><span data-dcnode-id="7529" instrument_node=""> The β</span><sub data-dcnode-id="7527"><span data-dcnode-id="7528" instrument_node="">2</span></sub><span data-dcnode-id="7526" instrument_node="">-agonist salmeterol (125 μg BID) by inhalation appears to be less effective.</span><sup data-dcnode-id="7523"><a class="tab-link" data-dcnode-id="7524" data-tab="pane-pcw-references" href="#R62" id="R62R"><span data-dcnode-id="7525" instrument_node="">62</span></a></sup></p><p data-dcnode-id="7513"><span data-dcnode-id="7521" instrument_node="">When treatment is required, consideration should be given to descent to a lower altitude coupled with supplemental oxygen (2–4 L/min) where possible.</span><sup data-dcnode-id="7515"><a class="tab-link" data-dcnode-id="7519" data-tab="pane-pcw-references" href="#R56" id="R56R"><span data-dcnode-id="7520" instrument_node="">56</span></a><span data-dcnode-id="7518" instrument_node="">,</span><a class="tab-link" data-dcnode-id="7516" data-tab="pane-pcw-references" href="#R63" id="R63R"><span data-dcnode-id="7517" instrument_node="">63</span></a></sup><span data-dcnode-id="7514" instrument_node=""> Nifedine is the standard treatment. A phosphodiesterase type 5 inhibitor may be helpful but has not been formally trialed. There is no role for diuretics. A fully conscious person with mild-to-moderate HAPE may be managed at altitude if the appropriate expertise and facilities are available.</span></p><div class="anchor-spacer" data-dcnode-id="7512" id="acd3e846"></div><h4 class="article-section__title" data-dcnode-id="7510" id="d3e846"><span data-dcnode-id="7511" instrument_node="">HAPH and Heart Failure</span></h4><p data-dcnode-id="7498"><span data-dcnode-id="7509" instrument_node="">By convention, the definition of HAPH is a resting mean PAP &gt;30 mm Hg.</span><sup data-dcnode-id="7506"><a class="tab-link" data-dcnode-id="7507" data-tab="pane-pcw-references" href="#R64" id="R64R"><span data-dcnode-id="7508" instrument_node="">64</span></a></sup><span data-dcnode-id="7505" instrument_node=""> This needs revisiting and reconciling with international guidelines for the definition of pulmonary hypertension, which is a resting mean PAP &gt;25 mm Hg.</span><sup data-dcnode-id="7499"><a class="tab-link" data-dcnode-id="7503" data-tab="pane-pcw-references" href="#R53" id="R53R"><span data-dcnode-id="7504" instrument_node="">53</span></a><span data-dcnode-id="7502" instrument_node="">,</span><a class="tab-link" data-dcnode-id="7500" data-tab="pane-pcw-references" href="#R65" id="R65R"><span data-dcnode-id="7501" instrument_node="">65</span></a></sup></p><p data-dcnode-id="7492"><span data-dcnode-id="7497" instrument_node="">Data on the prevalence of HAPH are sparse. Prevalence will vary according to altitude and ethnic background, but some 14% of Kyrgyz highlanders have been found to have ECG evidence of right ventricular hypertrophy.</span><sup data-dcnode-id="7494"><a class="tab-link" data-dcnode-id="7495" data-tab="pane-pcw-references" href="#R66" id="R66R"><span data-dcnode-id="7496" instrument_node="">66</span></a></sup><span data-dcnode-id="7493" instrument_node=""> A much smaller percentage progress to and present with heart failure.</span></p><p data-dcnode-id="7471"><span data-dcnode-id="7491" instrument_node="">The RV generally copes well with a pressure load, and there is doubt as to whether pressure load itself is sufficient to cause heart failure, suggesting that other factors, such as myocardial hypoxia and neurohumoral factors, are important.</span><sup data-dcnode-id="7488"><a class="tab-link" data-dcnode-id="7489" data-tab="pane-pcw-references" href="#R67" id="R67R"><span data-dcnode-id="7490" instrument_node="">67</span></a></sup><span data-dcnode-id="7487" instrument_node=""> Nonetheless, pulmonary hypertension progressing to fatal right heart failure, recognized as infantile subacute mountain sickness, has been described in infants of Chinese Han origin who are born at low altitude and taken to high altitudes.</span><sup data-dcnode-id="7484"><a class="tab-link" data-dcnode-id="7485" data-tab="pane-pcw-references" href="#R68" id="R68R"><span data-dcnode-id="7486" instrument_node="">68</span></a></sup><span data-dcnode-id="7483" instrument_node=""> They develop heart failure within a few weeks or months and the pathology reveals extreme medial hypertrophy of the small pulmonary arteries accompanied by hypertrophy and dilatation of the RV. Heart failure has also been described in Indian soldiers posted at the high-altitude borders in China</span><sup data-dcnode-id="7480"><a class="tab-link" data-dcnode-id="7481" data-tab="pane-pcw-references" href="#R69" id="R69R"><span data-dcnode-id="7482" instrument_node="">69</span></a></sup><span data-dcnode-id="7479" instrument_node=""> and occasionally in previously healthy travelers,</span><sup data-dcnode-id="7476"><a class="tab-link" data-dcnode-id="7477" data-tab="pane-pcw-references" href="#R70" id="R70R"><span data-dcnode-id="7478" instrument_node="">70</span></a></sup><span data-dcnode-id="7475" instrument_node=""> and HAPH is thought to be the major factor.</span><sup data-dcnode-id="7472"><a class="tab-link" data-dcnode-id="7473" data-tab="pane-pcw-references" href="#R71" id="R71R"><span data-dcnode-id="7474" instrument_node="">71</span></a></sup></p><p data-dcnode-id="7451"><span data-dcnode-id="7470" instrument_node="">Descent to lower altitude is life saving for severe cases of heart failure. There are a number of potential pharmacologic treatments for managing less severe disease, but few have been formally trialed in HAPH. Phosphodiesterase type 5 inhibitors appear effective at reducing pulmonary vascular resistance,</span><sup data-dcnode-id="7467"><a class="tab-link" data-dcnode-id="7468" data-tab="pane-pcw-references" href="#R72" id="R72R"><span data-dcnode-id="7469" instrument_node="">72</span></a></sup><span data-dcnode-id="7466" instrument_node=""> and acetazolamide</span><sup data-dcnode-id="7463"><a class="tab-link" data-dcnode-id="7464" data-tab="pane-pcw-references" href="#R73" id="R73R"><span data-dcnode-id="7465" instrument_node="">73</span></a></sup><span data-dcnode-id="7462" instrument_node=""> and the Rho-kinase inhibitor, fasudil</span><sup data-dcnode-id="7459"><a class="tab-link" data-dcnode-id="7460" data-tab="pane-pcw-references" href="#R74" id="R74R"><span data-dcnode-id="7461" instrument_node="">74</span></a></sup><span data-dcnode-id="7458" instrument_node="">, are promising. The benefits of endothelin receptor antagonists are less clear.</span><sup data-dcnode-id="7452"><a class="tab-link" data-dcnode-id="7456" data-tab="pane-pcw-references" href="#R75" id="R75R"><span data-dcnode-id="7457" instrument_node="">75</span></a><span data-dcnode-id="7455" instrument_node="">,</span><a class="tab-link" data-dcnode-id="7453" data-tab="pane-pcw-references" href="#R76" id="R76R"><span data-dcnode-id="7454" instrument_node="">76</span></a></sup></p><div class="anchor-spacer" data-dcnode-id="7450" id="acd3e908"></div><h4 class="article-section__title" data-dcnode-id="7448" id="d3e908"><span data-dcnode-id="7449" instrument_node="">Chronic Mountain Sickness</span></h4><p data-dcnode-id="7433"><span data-dcnode-id="7447" instrument_node="">The defining feature of chronic mountain sickness (CMS) is excessive erythrocytosis accompanied by neurologic symptoms, such as headache, dizziness, and fatigue.</span><sup data-dcnode-id="7444"><a class="tab-link" data-dcnode-id="7445" data-tab="pane-pcw-references" href="#R64" id="R64R"><span data-dcnode-id="7446" instrument_node="">64</span></a></sup><span data-dcnode-id="7443" instrument_node=""> By consensus, the hemoglobin should exceed ≥21g/dL in men and ≥19 g/dL in women. Hypoventilation leading to hypoxemia may stimulate red cell production,</span><sup data-dcnode-id="7440"><a class="tab-link" data-dcnode-id="7441" data-tab="pane-pcw-references" href="#R4" id="R4R"><span data-dcnode-id="7442" instrument_node="">4</span></a></sup><span data-dcnode-id="7439" instrument_node=""> but an alternative possibility is that polycythemia is the primary abnormality, which, by reducing P</span><span class="smallcaps smallerCapital" data-dcnode-id="7437"><span data-dcnode-id="7438" instrument_node="">co</span></span><sub data-dcnode-id="7435"><span data-dcnode-id="7436" instrument_node="">2</span></sub><span data-dcnode-id="7434" instrument_node=""> drive, leads to hypoventilation. Pulmonary hypertension may accompany the polycythemia but is not a prerequisite.</span></p><p data-dcnode-id="7417"><span data-dcnode-id="7432" instrument_node="">Descent to low altitudes is the best treatment but may not be acceptable to patients for personal reasons. An alternative to phlebotomy is acetazolamide. Acetazolamide (250 mg daily) has been shown to reduce hematocrit, increase Pa</span><span class="smallcaps smallerCapital" data-dcnode-id="7430"><span data-dcnode-id="7431" instrument_node="">o</span></span><sub data-dcnode-id="7428"><span data-dcnode-id="7429" instrument_node="">2</span></sub><span data-dcnode-id="7427" instrument_node=""> and oxygen saturation, and decrease in Pa</span><span class="smallcaps smallerCapital" data-dcnode-id="7425"><span data-dcnode-id="7426" instrument_node="">co</span></span><sub data-dcnode-id="7423"><span data-dcnode-id="7424" instrument_node="">2</span></sub><span data-dcnode-id="7422" instrument_node=""> in CMS, most likely via metabolic acidosis stimulating ventilation.</span><sup data-dcnode-id="7419"><a class="tab-link" data-dcnode-id="7420" data-tab="pane-pcw-references" href="#R73" id="R73R"><span data-dcnode-id="7421" instrument_node="">73</span></a></sup><span data-dcnode-id="7418" instrument_node=""> Pulmonary vascular resistance was also reduced and cardiac output increased without a change in pulmonary pressure.</span></p><div class="anchor-spacer" data-dcnode-id="7416" id="acd3e943"></div><h3 class="article-section__title to-section" data-dcnode-id="7414" id="d3e943"><span data-dcnode-id="7415" instrument_node="">Insights From Humans Adapted to Hypoxia</span></h3><div class="anchor-spacer" data-dcnode-id="7413" id="acd3e946"></div><h4 class="article-section__title" data-dcnode-id="7411" id="d3e946"><span data-dcnode-id="7412" instrument_node="">Variation in Susceptibility to High-Altitude Pulmonary Vascular Disease</span></h4><p data-dcnode-id="7381"><span data-dcnode-id="7410" instrument_node="">The variation in pulmonary vascular response has a strong genetic basis, which provides the substrate for environmental selection pressures and adaptation to high-altitude living. Tibetans appear less susceptible than recent migrants to HAPH</span><sup data-dcnode-id="7404"><a class="tab-link" data-dcnode-id="7408" data-tab="pane-pcw-references" href="#R77" id="R77R"><span data-dcnode-id="7409" instrument_node="">77</span></a><span data-dcnode-id="7407" instrument_node="">,</span><a class="tab-link" data-dcnode-id="7405" data-tab="pane-pcw-references" href="#R78" id="R78R"><span data-dcnode-id="7406" instrument_node="">78</span></a></sup><span data-dcnode-id="7403" instrument_node=""> and CMS,</span><sup data-dcnode-id="7400"><a class="tab-link" data-dcnode-id="7401" data-tab="pane-pcw-references" href="#R79" id="R79R"><span data-dcnode-id="7402" instrument_node="">79</span></a></sup><span data-dcnode-id="7399" instrument_node=""> most likely the result of living above 3000 m for thousands of years. Data are few, but PAP measurements in ethnic Tibetans living over 3600 m are in the range typical of healthy adults at sea level,</span><sup data-dcnode-id="7393"><a class="tab-link" data-dcnode-id="7397" data-tab="pane-pcw-references" href="#R77" id="R77R"><span data-dcnode-id="7398" instrument_node="">77</span></a><span data-dcnode-id="7396" instrument_node="">,</span><a class="tab-link" data-dcnode-id="7394" data-tab="pane-pcw-references" href="#R78" id="R78R"><span data-dcnode-id="7395" instrument_node="">78</span></a></sup><span data-dcnode-id="7392" instrument_node=""> and postmortem studies show little vascular remodeling.</span><sup data-dcnode-id="7386"><a class="tab-link" data-dcnode-id="7390" data-tab="pane-pcw-references" href="#R78" id="R78R"><span data-dcnode-id="7391" instrument_node="">78</span></a><span data-dcnode-id="7389" instrument_node="">,</span><a class="tab-link" data-dcnode-id="7387" data-tab="pane-pcw-references" href="#R80" id="R80R"><span data-dcnode-id="7388" instrument_node="">80</span></a></sup><span data-dcnode-id="7385" instrument_node=""> A blunted pulmonary vascular pressor response to acute and sustained hypoxia is retained by Tibetans at sea level.</span><sup data-dcnode-id="7382"><a class="tab-link" data-dcnode-id="7383" data-tab="pane-pcw-references" href="#R81" id="R81R"><span data-dcnode-id="7384" instrument_node="">81</span></a></sup></p><div class="anchor-spacer" data-dcnode-id="7380" id="acd3e979"></div><h4 class="article-section__title" data-dcnode-id="7378" id="d3e979"><span data-dcnode-id="7379" instrument_node="">Recent Genomic Studies in Humans</span></h4><p data-dcnode-id="7365"><span data-dcnode-id="7377" instrument_node="">A number of attempts have been made to understand adaptation to high-altitude life based on differences in candidate pathways, such as the ability of Tibetans to preserve NO production at altitude</span><sup data-dcnode-id="7374"><a class="tab-link" data-dcnode-id="7375" data-tab="pane-pcw-references" href="#R82" id="R82R"><span data-dcnode-id="7376" instrument_node="">82</span></a></sup><span data-dcnode-id="7373" instrument_node=""> and candidate genes,</span><sup data-dcnode-id="7367"><a class="tab-link" data-dcnode-id="7371" data-tab="pane-pcw-references" href="#R66" id="R66R"><span data-dcnode-id="7372" instrument_node="">66</span></a><span data-dcnode-id="7370" instrument_node="">,</span><a class="tab-link" data-dcnode-id="7368" data-tab="pane-pcw-references" href="#R83" id="R83R"><span data-dcnode-id="7369" instrument_node="">83</span></a></sup><span data-dcnode-id="7366" instrument_node=""> but this approach is selective and the data come from small subject numbers. The advent of high-throughput genome sequencing has enabled a less-biased strategy for investigating gene associations. The priority to date has been to compare the genetic architecture of people living at high altitude with that of lowlanders or recent migrants (genome-wide selection scans) rather than to compare well-phenotyped populations with and without pulmonary vascular disease at altitude (genome-wide association studies).</span></p><p data-dcnode-id="7323"><span data-dcnode-id="7364" instrument_node="">Seven genome-wide selection scans of Tibetan DNA have been reported. All have shown evidence of natural selection for noncoding variants in and around 2 HIF pathway genes, </span><i data-dcnode-id="7362"><span data-dcnode-id="7363" instrument_node="">EPAS1</span></i><span data-dcnode-id="7361" instrument_node=""> (HIF-2α) and </span><i data-dcnode-id="7359"><span data-dcnode-id="7360" instrument_node="">EGNL1</span></i><span data-dcnode-id="7358" instrument_node=""> (HIF prolyl 4-hydroxylase 2).</span><sup data-dcnode-id="7351"><a class="tab-link" data-dcnode-id="7356" data-tab="pane-pcw-references" href="#R84" id="R84R"><span data-dcnode-id="7357" instrument_node="">84</span></a><a class="tab-link" data-dcnode-id="7354" data-tab="pane-pcw-references" href="#R85%20R86%20R87%20R88%20R89" id="R85 R86 R87 R88 R89R"><span data-dcnode-id="7355" instrument_node="">–</span></a><a class="tab-link" data-dcnode-id="7352" data-tab="pane-pcw-references" href="#R90" id="R90R"><span data-dcnode-id="7353" instrument_node="">90</span></a></sup><span data-dcnode-id="7350" instrument_node=""> Key to the interpretation of genetic data is robust phenotyping. Tibetans average ≥1 g/dL and as much as 3.5 g/dL (ie, ≈10% to 20%) lower hemoglobin concentration compared with acclimatized lowlanders. At first sight, a paradox, a lower red cell mass by reducing blood viscosity may be an important factor enabling the cardiopulmonary circulation to adapt to high-altitude life. Significantly, the polymorphisms in </span><i data-dcnode-id="7348"><span data-dcnode-id="7349" instrument_node="">EPAS1</span></i><span data-dcnode-id="7347" instrument_node=""> and </span><i data-dcnode-id="7345"><span data-dcnode-id="7346" instrument_node="">EGLN1</span></i><span data-dcnode-id="7344" instrument_node=""> in Tibetans correlate with hemoglobin concentration.</span><sup data-dcnode-id="7331"><a class="tab-link" data-dcnode-id="7342" data-tab="pane-pcw-references" href="#R84" id="R84R"><span data-dcnode-id="7343" instrument_node="">84</span></a><span data-dcnode-id="7341" instrument_node="">,</span><a class="tab-link" data-dcnode-id="7339" data-tab="pane-pcw-references" href="#R86" id="R86R"><span data-dcnode-id="7340" instrument_node="">86</span></a><a class="tab-link" data-dcnode-id="7337" data-tab="pane-pcw-references" href="#R87" id="R87R"><span data-dcnode-id="7338" instrument_node="">–</span></a><a class="tab-link" data-dcnode-id="7335" data-tab="pane-pcw-references" href="#R88" id="R88R"><span data-dcnode-id="7336" instrument_node="">88</span></a><span data-dcnode-id="7334" instrument_node="">,</span><a class="tab-link" data-dcnode-id="7332" data-tab="pane-pcw-references" href="#R90" id="R90R"><span data-dcnode-id="7333" instrument_node="">90</span></a></sup><span data-dcnode-id="7330" instrument_node=""> A high-frequency missense mutation has recently been identified in </span><i data-dcnode-id="7328"><span data-dcnode-id="7329" instrument_node="">EGLN1</span></i><span data-dcnode-id="7327" instrument_node=""> that encodes a variant prolyl 4-hydroxylase 2 with increased hydroxylase activity under hypoxic conditions that would contribute to this adaptive response.</span><sup data-dcnode-id="7324"><a class="tab-link" data-dcnode-id="7325" data-tab="pane-pcw-references" href="#R91" id="R91R"><span data-dcnode-id="7326" instrument_node="">91</span></a></sup></p><p data-dcnode-id="7293"><span data-dcnode-id="7322" instrument_node="">A genome study in Andeans has found evidence of positive selection for </span><i data-dcnode-id="7320"><span data-dcnode-id="7321" instrument_node="">EGLN1</span></i><span data-dcnode-id="7319" instrument_node=""> bu
