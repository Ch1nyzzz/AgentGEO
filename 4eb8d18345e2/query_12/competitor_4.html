t not </span><i data-dcnode-id="7317"><span data-dcnode-id="7318" instrument_node="">EPAS1</span></i><span data-dcnode-id="7316" instrument_node="">.</span><sup data-dcnode-id="7313"><a class="tab-link" data-dcnode-id="7314" data-tab="pane-pcw-references" href="#R92" id="R92R"><span data-dcnode-id="7315" instrument_node="">92</span></a></sup><span data-dcnode-id="7312" instrument_node=""> Neither were candidates in reported studies in Ethiopian highlanders.</span><sup data-dcnode-id="7305"><a class="tab-link" data-dcnode-id="7310" data-tab="pane-pcw-references" href="#R93" id="R93R"><span data-dcnode-id="7311" instrument_node="">93</span></a><a class="tab-link" data-dcnode-id="7308" data-tab="pane-pcw-references" href="#R94" id="R94R"><span data-dcnode-id="7309" instrument_node="">–</span></a><a class="tab-link" data-dcnode-id="7306" data-tab="pane-pcw-references" href="#R95" id="R95R"><span data-dcnode-id="7307" instrument_node="">95</span></a></sup><span data-dcnode-id="7304" instrument_node=""> Moreover, Andeans exhibit a robust erythropoietic response to altitude and polymorphisms identified in </span><i data-dcnode-id="7302"><span data-dcnode-id="7303" instrument_node="">EGLN1</span></i><span data-dcnode-id="7301" instrument_node=""> in Andeans, albeit different from those in Tibetans, did not associate with hemoglobin level. Analysis of other quantitative traits, such as resting ventilation, hypoxic ventilator response, and oxygen saturation, also show differences between Tibetans and other Asian and European populations studied at the same altitude.</span><sup data-dcnode-id="7298"><a class="tab-link" data-dcnode-id="7299" data-tab="pane-pcw-references" href="#R96" id="R96R"><span data-dcnode-id="7300" instrument_node="">96</span></a></sup><span data-dcnode-id="7297" instrument_node=""> It is likely that the Andean and Tibetan populations have developed different genetic adaptations to high-altitude hypoxia, although pathways may converge. In the case of Tibetans, one source of adaptation is likely to be attributed to the introduction of genetic variants from archaic Denisovan-like individuals into the ancestral Tibetan gene pool.</span><sup data-dcnode-id="7294"><a class="tab-link" data-dcnode-id="7295" data-tab="pane-pcw-references" href="#R97" id="R97R"><span data-dcnode-id="7296" instrument_node="">97</span></a></sup></p><p data-dcnode-id="7281"><span data-dcnode-id="7292" instrument_node="">Aside from HIF, genes encoding downstream components of the HIF pathway remain a priori candidates for natural selection to hypoxia. A recent study of single nucleotide polymorphisms in 5 Ethiopian populations at altitude suggest positive selection for </span><i data-dcnode-id="7290"><span data-dcnode-id="7291" instrument_node="">BHLHE41</span></i><span data-dcnode-id="7289" instrument_node="">, a gene transcriptionally regulated by HIF-1α and with a major regulatory role in the same hypoxia-sensing pathway described in Tibetans, indicative of convergent evolution.</span><sup data-dcnode-id="7286"><a class="tab-link" data-dcnode-id="7287" data-tab="pane-pcw-references" href="#R95" id="R95R"><span data-dcnode-id="7288" instrument_node="">95</span></a></sup><span data-dcnode-id="7285" instrument_node=""> Other pathways may emerge from unbiased genome-wide studies in larger population cohorts. Evidence for adaptation outside the HIF family comes from a study of Eurasians exposed to mild-to-moderate hypoxia, where the strongest adaptive signal came from the μ-opioid receptor-encoding gene (OPRM1, 2.54_10_9).</span><sup data-dcnode-id="7282"><a class="tab-link" data-dcnode-id="7283" data-tab="pane-pcw-references" href="#R98" id="R98R"><span data-dcnode-id="7284" instrument_node="">98</span></a></sup></p><p data-dcnode-id="7260"><span data-dcnode-id="7280" instrument_node="">Whole-genome sequencing of Andean highlanders, 10 with and 10 without CMS, followed by expression studies in fibroblasts identified 2 genes, </span><i data-dcnode-id="7278"><span data-dcnode-id="7279" instrument_node="">SENP1</span></i><span data-dcnode-id="7277" instrument_node=""> and </span><i data-dcnode-id="7275"><span data-dcnode-id="7276" instrument_node="">ANP32D</span></i><span data-dcnode-id="7274" instrument_node="">, that exhibit a higher transcription response to hypoxia in CMS subjects.</span><sup data-dcnode-id="7271"><a class="tab-link" data-dcnode-id="7272" data-tab="pane-pcw-references" href="#R99" id="R99R"><span data-dcnode-id="7273" instrument_node="">99</span></a></sup><span data-dcnode-id="7270" instrument_node=""> Downregulation of the orthologs of these genes in flies enhanced their survival rates in a hypoxic environment. </span><i data-dcnode-id="7268"><span data-dcnode-id="7269" instrument_node="">SENP1</span></i><span data-dcnode-id="7267" instrument_node=""> is known to regulate erythropoiesis and </span><i data-dcnode-id="7265"><span data-dcnode-id="7266" instrument_node="">SENP1-/</span></i><span data-dcnode-id="7264" instrument_node="">- mice die early because of anemia, lending biological plausibility to this gene as a candidate for a role in CMS. There is widely believed to be a genetic predisposition to HAPE, but to date only candidate genes have been examined with no consensus observations.</span><sup data-dcnode-id="7261"><a class="tab-link" data-dcnode-id="7262" data-tab="pane-pcw-references" href="#R100" id="R100R"><span data-dcnode-id="7263" instrument_node="">100</span></a></sup></p><div class="anchor-spacer" data-dcnode-id="7259" id="acd3e1104"></div><h3 class="article-section__title to-section" data-dcnode-id="7257" id="d3e1104"><span data-dcnode-id="7258" instrument_node="">Conclusions</span></h3><p data-dcnode-id="7255"><span data-dcnode-id="7256" instrument_node="">Humans can live a normal life at high altitudes given sufficient time to acclimatize. People who exhibit a marked pulmonary vascular or erythropoietic response to hypoxia identify themselves as at risk of heart failure. Studies in Tibetan people adapted genetically to high altitude highlight the importance of the HIF pathway in determining the magnitude of response, but other pathways may emerge from studies of Tibetan cohorts better phenotyped for pulmonary hemodynamics, as well as studies of other ethnic groups. Considerable progress has been made in understanding the pathology of HAPH, but few drugs studied in animal models have been formally trialed in humans.</span></p><div class="anchor-spacer" data-dcnode-id="7254" id="acd3e1113"></div><h3 class="article-section__title to-section" data-dcnode-id="7252" id="d3e1113"><span data-dcnode-id="7253" instrument_node="">Acknowledgments</span></h3><p data-dcnode-id="7250"><span data-dcnode-id="7251" instrument_node="">We thank Dr Oleg Pak for his assistance with the figures.</span></p><div class="articleInformation" data-dcnode-id="7235"><div class="anchor-spacer" data-dcnode-id="7249" id="acd3e1119"></div><h3 class="article-section__title to-section" data-dcnode-id="7247" id="d3e1119"><span data-dcnode-id="7248" instrument_node="">Sources of Funding</span></h3><p data-dcnode-id="7236"><span data-dcnode-id="7246" instrument_node="">Drs Wilkins and Zhao are funded by the </span><funding-source data-dcnode-id="7244" source-type="grant-sponsor"><span data-dcnode-id="7245" instrument_node="">British Heart Foundation</span></funding-source><span data-dcnode-id="7243" instrument_node="">. Drs Weissmann and Ghofrani are funded by the </span><funding-source data-dcnode-id="7241" source-type="grant-sponsor"><span data-dcnode-id="7242" instrument_node="">German Research Foundation</span></funding-source><span data-dcnode-id="7240" instrument_node="">, Excellence Cluster Cardio-Pulmonary System (</span><named-content content-type="grant-num" data-dcnode-id="7238"><span data-dcnode-id="7239" instrument_node="">EXC 147</span></named-content><span data-dcnode-id="7237" instrument_node="">).</span></p></div><div class="articleInformation" data-dc
