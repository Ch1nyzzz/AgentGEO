</span><h1 class="entry-title" data-dcnode-id="1473"><span data-dcnode-id="1474" instrument_node="">How to Measure Lung Capacity</span></h1><span data-dcnode-id="1472" instrument_node=""> </span><div class="entry-taxonomies" data-dcnode-id="1455"><span data-dcnode-id="1471" instrument_node="">
</span><span class="category-links term-links category-style-normal" data-dcnode-id="1457"><span data-dcnode-id="1470" instrument_node="">
</span><a data-dcnode-id="1468" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//blogshewrote.org/category/high-school/" rel="tag"><span data-dcnode-id="1469" instrument_node="">high school</span></a><span data-dcnode-id="1467" instrument_node=""> | </span><a data-dcnode-id="1465" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//blogshewrote.org/category/life-science/" rel="tag"><span data-dcnode-id="1466" instrument_node="">life science</span></a><span data-dcnode-id="1464" instrument_node=""> | </span><a data-dcnode-id="1462" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//blogshewrote.org/category/middle-school/" rel="tag"><span data-dcnode-id="1463" instrument_node="">middle school</span></a><span data-dcnode-id="1461" instrument_node=""> | </span><a data-dcnode-id="1459" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//blogshewrote.org/category/science/" rel="tag"><span data-dcnode-id="1460" instrument_node="">science</span></a><span data-dcnode-id="1458" instrument_node=""> </span></span><span data-dcnode-id="1456" instrument_node="">
</span></div><span data-dcnode-id="1453" instrument_node="">
</span></header><span data-dcnode-id="1450" instrument_node="">
</span><div class="entry-content single-content" data-dcnode-id="1097"><span data-dcnode-id="1449" instrument_node="">
</span><p data-dcnode-id="1441"><span data-dcnode-id="1448" instrument_node="">We’re continuing our study of the human body for Biology I and Life  Science this year with our 5th, 8th, and 10th graders. Check out </span><a data-dcnode-id="1446" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//blogshewrote.org/stem-activities-for-teens/"><span data-dcnode-id="1447" instrument_node="">STEM Activities for Teens</span></a><span data-dcnode-id="1445" instrument_node=""> for more middle and high school STEM. Today we will do an investigation- </span><strong data-dcnode-id="1443"><span data-dcnode-id="1444" instrument_node="">How to Measure Lung Capacity</span></strong><span data-dcnode-id="1442" instrument_node="">. </span></p><span data-dcnode-id="1440" instrument_node="">
</span><div class="wp-block-image" data-dcnode-id="1435"><figure class="aligncenter" data-dcnode-id="1436"><img alt="Science Quest Measuring Lung Capacity" class="wp-image-19987 entered lazyloaded" data-dcnode-id="1439" data-lazy-sizes="(max-width: 760px) 100vw, 760px" data-lazy-src="https://blogshewrote.org/wp-content/uploads/2016/04/lung-1-1-760x1024.jpg" data-lazy-srcset="https://blogshewrote.org/wp-content/uploads/2016/04/lung-1-1-760x1024.jpg 760w, https://blogshewrote.org/wp-content/uploads/2016/04/lung-1-1-650x876.jpg 650w, https://blogshewrote.org/wp-content/uploads/2016/04/lung-1-1-223x300.jpg 223w, https://blogshewrote.org/wp-content/uploads/2016/04/lung-1-1-768x1035.jpg 768w, https://blogshewrote.org/wp-content/uploads/2016/04/lung-1-1.jpg 1024w" data-ll-status="loaded" height="1024" sizes="(max-width: 760px) 100vw, 760px" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//blogshewrote.org/wp-content/uploads/2016/04/lung-1-1-760x1024.jpg&amp;raw" srcset="https://blogshewrote.org/wp-content/uploads/2016/04/lung-1-1-760x1024.jpg 760w, https://blogshewrote.org/wp-content/uploads/2016/04/lung-1-1-650x876.jpg 650w, https://blogshewrote.org/wp-content/uploads/2016/04/lung-1-1-223x300.jpg 223w, https://blogshewrote.org/wp-content/uploads/2016/04/lung-1-1-768x1035.jpg 768w, https://blogshewrote.org/wp-content/uploads/2016/04/lung-1-1.jpg 1024w" width="760"><noscript data-dcnode-id="1437"><span data-dcnode-id="1438" instrument_node="">&lt;img width="760" height="1024" src="https://blogshewrote.org/wp-content/uploads/2016/04/lung-1-1-760x1024.jpg" alt="Science Quest Measuring Lung Capacity" class="wp-image-19987" srcset="https://blogshewrote.org/wp-content/uploads/2016/04/lung-1-1-760x1024.jpg 760w, https://blogshewrote.org/wp-content/uploads/2016/04/lung-1-1-650x876.jpg 650w, https://blogshewrote.org/wp-content/uploads/2016/04/lung-1-1-223x300.jpg 223w, https://blogshewrote.org/wp-content/uploads/2016/04/lung-1-1-768x1035.jpg 768w, https://blogshewrote.org/wp-content/uploads/2016/04/lung-1-1.jpg 1024w" sizes="(max-width: 760px) 100vw, 760px" /&gt;</span></noscript></figure></div><span data-dcnode-id="1434" instrument_node="">
</span><p data-dcnode-id="1431" style="text-align:center"><em data-dcnode-id="1432"><span data-dcnode-id="1433" instrument_node="">This post may contain affiliate links. Thanks for your support!</span></em></p><span data-dcnode-id="1430" instrument_node="">
</span><h2 data-dcnode-id="1428"><span data-dcnode-id="1429" instrument_node="">Let’s Investigate Lung Capacity</span></h2><span data-dcnode-id="1427" instrument_node="">
</span><p data-dcnode-id="1422"><span data-dcnode-id="1426" instrument_node="">Lung capacity refers to </span><strong data-dcnode-id="1424"><span data-dcnode-id="1425" instrument_node="">the amount of air your lungs can hold</span></strong><span data-dcnode-id="1423" instrument_node="">. There are a number of things that can affect your lung capacity, such as:</span></p><span data-dcnode-id="1421" instrument_node="">
</span><ul data-dcnode-id="1410"><li data-dcnode-id="1419"><span data-dcnode-id="1420" instrument_node="">your overall health</span></li><li data-dcnode-id="1417"><span data-dcnode-id="1418" instrument_node="">specific health conditions- like asthma or emphysema</span></li><li data-dcnode-id="1415"><span data-dcnode-id="1416" instrument_node="">athleticism- how active you are</span></li><li data-dcnode-id="1413"><span data-dcnode-id="1414" instrument_node="">size</span></li><li data-dcnode-id="1411"><span data-dcnode-id="1412" instrument_node="">age</span></li></ul><span data-dcnode-id="1409" instrument_node="">
</span><p data-dcnode-id="1405"><span data-dcnode-id="1408" instrument_node="">This activity aims to determine your lung capacity and to make predictions about what can affect it. Talk about lung capacity and have your kids make a hypothesis about what things can change it- for the better or the worse. Then test your hypothesis!</span><br data-dcnode-id="1407"><span data-dcnode-id="1406" instrument_node="">
</span></p><span data-dcnode-id="1404" instrument_node="">
</span><h2 data-dcnode-id="1402"><span data-dcnode-id="1403" instrument_node="">Measure Lung Capacity</span></h2><span data-dcnode-id="1401" instrument_node="">
</span><p data-dcnode-id="1399"><span data-dcnode-id="1400" instrument_node="">The purpose of the investigation is to determine our own lung capacity and then depending on your student’s hypothesis do some additional testing and measure lung capacity again. You will need a balloon (the kind that blows up into a regular balloon shape, not the oblong sort), a measuring tape or ruler, and something to record data with and on. In general, the following procedure will get you started.</span></p><span data-dcnode-id="1398" instrument_node="">
</span><ol data-dcnode-id="1383"><li data-dcnode-id="1396"><span data-dcnode-id="1397" instrument_node="">Stretch your balloon.</span></li><li data-dcnode-id="1394"><span data-dcnode-id="1395" instrument_node="">Take a deep breath and blow all at once into the balloon and close it off.</span></li><li data-dcnode-id="1392"><span data-dcnode-id="1393" instrument_node="">Shape the balloon into a sphere shape while holding the air in.</span></li><li data-dcnode-id="1390"><span data-dcnode-id="1391" instrument_node="">Ask a partner to measure the circumference of the balloon at the middle. (You could measure the diameter and for younger kids this might be best, but it’s less accurate)</span></li><li data-dcnode-id="1388"><span data-dcnode-id="1389" instrument_node="">Record the number in centimeters.</span></li><li data-dcnode-id="1386"><span data-dcnode-id="1387" instrument_node="">Repeat two more times.</span></li><li data-dcnode-id="1384"><span data-dcnode-id="1385" instrument_node="">If your hypothesis indicates exercise, repeat after doing a set of exercises.</span></li></ol><span data-dcnode-id="1382" instrument_node="">
</span><div class="wp-block-image" data-dcnode-id="1377"><figure class="aligncenter" data-dcnode-id="1378"><img alt="Science Quest Measuring Lung Capacity" class="wp-image-19996 entered lazyloaded" data-dcnode-id="1381" data-lazy-sizes="(max-width: 1024px) 100vw, 1024px" data-lazy-src="https://blogshewrote.org/wp-content/uploads/2016/04/lung-4-1.jpg" data-lazy-srcset="https://blogshewrote.org/wp-content/uploads/2016/04/lung-4-1.jpg 1024w, https://blogshewrote.org/wp-content/uploads/2016/04/lung-4-1-500x500.jpg 500w, https://blogshewrote.org/wp-content/uploads/2016/04/lung-4-1-100x100.jpg 100w, https://blogshewrote.org/wp-content/uploads/2016/04/lung-4-1-650x650.jpg 650w, https://blogshewrote.org/wp-content/uploads/2016/04/lung-4-1-150x150.jpg 150w, https://blogshewrote.org/wp-content/uploads/2016/04/lung-4-1-300x300.jpg 300w, https://blogshewrote.org/wp-content/uploads/2016/04/lung-4-1-768x768.jpg 768w" data-ll-status="loaded" height="1024" sizes="(max-width: 1024px) 100vw, 1024px" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//blogshewrote.org/wp-content/uploads/2016/04/lung-4-1.jpg&amp;raw" srcset="https://blogshewrote.org/wp-content/uploads/2016/04/lung-4-1.jpg 1024w, https://blogshewrote.org/wp-content/uploads/2016/04/lung-4-1-500x500.jpg 500w, https://blogshewrote.org/wp-content/uploads/2016/04/lung-4-1-100x100.jpg 100w, https://blogshewrote.org/wp-content/uploads/2016/04/lung-4-1-650x650.jpg 650w, https://blogshewrote.org/wp-content/uploads/2016/04/lung-4-1-150x150.jpg 150w, https://blogshewrote.org/wp-content/uploads/2016/04/lung-4-1-300x300.jpg 300w, https://blogshewrote.org/wp-content/uploads/2016/04/lung-4-1-768x768.jpg 768w" width="1024"><noscript data-dcnode-id="1379"><span data-dcnode-id="1380" instrument_node="">&lt;img width="1024" height="1024" src="https://blogshewrote.org/wp-content/uploads/2016/04/lung-4-1.jpg" alt="Science Quest Measuring Lung Capacity" class="wp-image-19996" srcset="https://blogshewrote.org/wp-content/uploads/2016/04/lung-4-1.jpg 1024w, https://blogshewrote.org/wp-content/uploads/2016/04/lung-4-1-500x500.jpg 500w, https://blogshewrote.org/wp-content/uploads/2016/04/lung-4-1-100x100.jpg 100w, https://blogshewrote.org/wp-content/uploads/2016/04/lung-4-1-650x650.jpg 650w, https://blogshewrote.org/wp-content/uploads/2016/04/lung-4-1-150x150.jpg 150w, https://blogshewrote.org/wp-content/uploads/2016/04/lung-4-1-300x300.jpg 300w, https://blogshewrote.org/wp-content/uploads/2016/04/lung-4-1-768x768.jpg 768w" sizes="(max-width: 1024px) 100vw, 1024px" /&gt;</span></noscript></figure></div><span data-dcnode-id="1376" instrument_node="">
</span><h2 data-dcnode-id="1374"><span data-dcnode-id="1375" instrument_node="">Collect Data on Lung Capacity</span></h2><span data-dcnode-id="1373" instrument_node="">
</span><p data-dcnode-id="1371"><span data-dcnode-id="1372" instrument_node="">The data you collect will depend on the hypothesis your students put forward. Originally, I instructed my kids to compare lung capacity with height, but they chose to investigate other possibilities. In the classroom, all students would do the same lab, but in a homeschool why not? We discussed how their ideas changed the way they’d go about it and we proceeded. At a minimum, you need to record:</span></p><span data-dcnode-id="1370" instrument_node="">
</span><ul data-dcnode-id="1354"><li data-dcnode-id="1365"><span data-dcnode-id="1369" instrument_node="">The </span><strong data-dcnode-id="1367"><span data-dcnode-id="1368" instrument_node="">circumference of the balloon</span></strong><span data-dcnode-id="1366" instrument_node=""> which you determine with the measuring tape.</span></li><li data-dcnode-id="1361"><strong data-dcnode-id="1363"><span data-dcnode-id="1364" instrument_node="">Record all your measurements in centimeters</span></strong><span data-dcnode-id="1362" instrument_node="">. The metric system is mathematical language of the science world. This is important for U.S. students!</span></li><li data-dcnode-id="1359"><span data-dcnode-id="1360" instrument_node="">The person’s name so you can match the data with the right person</span></li><li data-dcnode-id="1357"><span data-dcnode-id="1358" instrument_node="">Age and height if you need them</span></li><li data-dcnode-id="1355"><span data-dcnode-id="1356" instrument_node="">The diameter can be measured, but it’s easier to be accurate when measuring the circumference. However, I left room to write the diameter which will be calculated from the circumference.</span></li></ul><span data-dcnode-id="1353" instrument_node="">
</span><h2 data-dcnode-id="1351"><span data-dcnode-id="1352" instrument_node="">Calculate Lung Capacity</span></h2><span data-dcnode-id="1350" instrument_node="">
</span><p data-dcnode-id="1348"><span data-dcnode-id="1349" instrument_node="">The bonus in this science lab is the math that kids get to do! You will be calculating two things in order to interpret the results.</span></p><span data-dcnode-id="1347" instrument_node="">
</span><ul data-dcnode-id="1338"><li data-dcnode-id="1343"><strong data-dcnode-id="1345"><span data-dcnode-id="1346" instrument_node="">Determine the diameter of the sphere</span></strong><span data-dcnode-id="1344" instrument_node=""> from the circumference using the equation circumference = 2πr. Remember that r is half of the diameter and that we have measured circumference. So, circumference is&nbsp;πd and d= c/π.</span></li><li data-dcnode-id="1339"><strong data-dcnode-id="1341"><span data-dcnode-id="1342" instrument_node="">Calculate the Volume of a Sphere</span></strong><span data-dcnode-id="1340" instrument_node=""> using the diameter to find the radius and then the equation below.</span></li></ul><span data-dcnode-id="1337" instrument_node="">
</span><p data-dcnode-id="1332"><span data-dcnode-id="1336" instrument_node="">All of our kids from 5th to 10th grade were able to use these equations and ultimately calculate the volume of the balloon that they&nbsp; had blown into. </span><strong data-dcnode-id="1334"><span data-dcnode-id="1335" instrument_node="">If the math is out of reach of your students, then you can simply use the diameter</span></strong><span data-dcnode-id="1333" instrument_node=""> to determine which is the largest and smallest balloon. I encourage you to challenge your student with the extra math.</span></p><span data-dcnode-id="1331" instrument_node="">
</span><div class="wp-block-image" data-dcnode-id="1325"><figure class="aligncenter" data-dcnode-id="1326"><a data-dcnode-id="1327" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//blogshewrote.org/wp-content/uploads/2016/04/Measuring-Lung-Capacity.pdf"><img alt="Science Quest Measuring Lung Capacity" class="wp-image-19995 entered lazyloaded" data-dcnode-id="1330" data-lazy-sizes="(max-width: 1024px) 100vw, 1024px" data-lazy-src="https://blogshewrote.org/wp-content/uploads/2016/04/lung-3-1024x704.jpg" data-lazy-srcset="https://blogshewrote.org/wp-content/uploads/2016/04/lung-3.jpg 1024w, https://blogshewrote.org/wp-content/uploads/2016/04/lung-3-650x447.jpg 650w, https://blogshewrote.org/wp-content/uploads/2016/04/lung-3-300x206.jpg 300w, https://blogshewrote.org/wp-content/uploads/2016/04/lung-3-768x528.jpg 768w" data-ll-status="loaded" height="704" sizes="(max-width: 1024px) 100vw, 1024px" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//blogshewrote.org/wp-content/uploads/2016/04/lung-3-1024x704.jpg&amp;raw" srcset="https://blogshewrote.org/wp-content/uploads/2016/04/lung-3.jpg 1024w, https://blogshewrote.org/wp-content/uploads/2016/04/lung-3-650x447.jpg 650w, https://blogshewrote.org/wp-content/uploads/2016/04/lung-3-300x206.jpg 300w, https://blogshewrote.org/wp-content/uploads/2016/04/lung-3-768x528.jpg 768w" width="1024"><noscript data-dcnode-id="1328"><span data-dcnode-id="1329" instrument_node="">&lt;img width="1024" height="704" src="https://blogshewrote.org/wp-content/uploads/2016/04/lung-3-1024x704.jpg" alt="Science Quest Measuring Lung Capacity" class="wp-image-19995" srcset="https://blogshewrote.org/wp-content/uploads/2016/04/lung-3.jpg 1024w, https://blogshewrote.org/wp-content/uploads/2016/04/lung-3-650x447.jpg 650w, https://blogshewrote.org/wp-content/uploads/2016/04/lung-3-300x206.jpg 300w, https://blogshewrote.org/wp-content/uploads/2016/04/lung-3-768x528.jpg 768w" sizes="(max-width: 1024px) 100vw, 1024px" /&gt;</span></noscript></a></figure></div><span data-dcnode-id="1324" instrument_node="">
</span><h2 data-dcnode-id="1322"><span data-dcnode-id="1323" instrument_node="">Drawing Conclusions about Lung Capacity</span></h2><span data-dcnode-id="1321" instrument_node="">
</span><p data-dcnode-id="1319"><span data-dcnode-id="1320" instrument_node="">Now it’s time to look at your data and decide whether or not it supports your hypothesis. Did the numbers match what you thought would happen? Rather than answering a bunch of questions, a conclusion can simply be a statement. Feel free to discuss the results with your kids to help them form their thoughts. Include:</span></p><span data-dcnode-id="1318" instrument_node="">
</span><ul data-dcnode-id="1307"><li data-dcnode-id="1316"><span data-dcnode-id="1317" instrument_node="">A summary of the results</span></li><li data-dcnode-id="1314"><span data-dcnode-id="1315" instrument_node="">How the date supports or refutes the hypothesis</span></li><li data-dcnode-id="1312"><span data-dcnode-id="1313" instrument_node="">Reasons why you think the results came out the way they did</span></li><li data-dcnode-id="1310"><span data-dcnode-id="1311" instrument_node="">How you would conduct the experiment differently if you were to repeat it</span></li><li data-dcnode-id="1308"><span data-dcnode-id="1309" instrument_node="">Summary statement on the outcome based on the data you have interpreted</span></li></ul><span data-dcnode-id="1306" instrument_node="">
</span><h2 data-dcnode-id="1304"><span data-dcnode-id="1305" instrument_node="">Lab Sheet on Measuring Lung Capacity</span></h2><span data-dcnode-id="1303" instrument_node="">
</span><p data-dcnode-id="1293"><span data-dcnode-id="1302" instrument_node="">To help you along, I thought I’d include a </span><a data-dcnode-id="1299" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//blogshewrote.org/wp-content/uploads/2016/04/Measuring-Lung-Capacity.pdf" rel="noopener noreferrer" target="_blank"><strong data-dcnode-id="1300"><span data-dcnode-id="1301" instrument_node="">lab sheet</span></strong></a><span data-dcnode-id="1298" instrument_node=""> with today’s Science Quest. My own kids jotted all this down on a piece of notebook paper (my favorite) and they made their own data chart. Making their own data charts helps kids and teens to learn how to organize information on their own which is an important skill. However, having the procedure written out already will make it easy to </span><a data-dcnode-id="1295" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//blogshewrote.org/wp-content/uploads/2016/04/Measuring-Lung-Capacity.pdf" rel="noopener noreferrer" target="_blank"><strong data-dcnode-id="1296"><span data-dcnode-id="1297" instrument_node="">print and go</span></strong></a><span data-dcnode-id="1294" instrument_node="">!</span></p><span data-dcnode-id="1292" instrument_node="">

</span><div class="wp-block-image" data-dcnode-id="1117"><figure class="aligncenter" data-dcnode-id="1118"><img alt="How to Determine the Frequency of a Trait" class="wp-image-19842" data-dcnode-id="1121" data-lazy-sizes="(max-width: 1024px) 100vw, 1024px" data-lazy-src="https://blogshewrote.org/wp-content/uploads/2016/03/frequency-1.jpg" data-lazy-srcset="https://blogshewrote.org/wp-content/uploads/2016/03/frequency-1.jpg 1024w, https://blogshewrote.org/wp-content/uploads/2016/03/frequency-1-500x500.jpg 500w, https://blogshewrote.org/wp-content/uploads/2016/03/frequency-1-100x100.jpg 100w, https://blogshewrote.org/wp-content/uploads/2016/03/frequency-1-650x650.jpg 650w, https://blogshewrote.org/wp-content/uploads/2016/03/frequency-1-400x400.jpg 400w, https://blogshewrote.org/wp-content/uploads/2016/03/frequency-1-150x150.jpg 150w, https://blogshewrote.org/wp-content/uploads/2016/03/frequency-1-300x300.jpg 300w, https://blogshewrote.org/wp-content/uploads/2016/03/frequency-1-768x768.jpg 768w, https://blogshewrote.org/wp-content/uploads/2016/03/frequency-1-90x90.jpg 90w" height="1024" src="data:image/svg+xml,%3Csvg%20xmlns='http://www.w3.org/2000/svg'%20viewBox='0%200%201024%201024'%3E%3C/svg%3E" width="1024"><noscript data-dcnode-id="1119"><span data-dcnode-id="1120" instrument_node="">&lt;img width="1024" height="1024" src="https://blogshewrote.org/wp-content/uploads/2016/03/frequency-1.jpg" alt="How to Determine the Frequency of a Trait" class="wp-image-19842" srcset="https://blogshewrote.org/wp-content/uploads/2016/03/frequency-1.jpg 1024w, https://blogshewrote.org/wp-content/uploads/2016/03/frequency-1-500x500.jpg 500w, https://blogshewrote.org/wp-content/uploads/2016/03/frequency-1-100x100.jpg 100w, https://blogshewrote.org/wp-content/uploads/2016/03/frequency-1-650x650.jpg 650w, https://blogshewrote.org/wp-content/uploads/2016/03/frequency-1-400x400.jpg 400w, https://blogshewrote.org/wp-content/uploads/2016/03/frequency-1-150x150.jpg 150w, https://blogshewrote
