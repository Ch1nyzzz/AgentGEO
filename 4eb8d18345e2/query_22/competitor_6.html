cnode-id="913" instrument_node=""> Quick At Home Lung Test – Easy Way to Check Your Lung Function</span></div><article aria-label="Quick At Home Lung Test – Easy Way to Check Your Lung Function" class="post-628 post type-post status-publish format-standard category-tips-and-support tag-at-home-lung-test tag-lung-health tag-lung-tests entry" data-dcnode-id="723"><header class="entry-header" data-dcnode-id="897"><h1 class="entry-title" data-dcnode-id="910"><span data-dcnode-id="911" instrument_node="">Quick At Home Lung Test – Easy Way to Check Your Lung Function</span></h1><span data-dcnode-id="909" instrument_node="">
</span><p class="entry-meta" data-dcnode-id="898"><span data-dcnode-id="908" instrument_node="">By </span><span class="entry-author" data-dcnode-id="904"><a class="entry-author-link" data-dcnode-id="905" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.ciggyfree.com/author/editor/" rel="author"><span class="entry-author-name" data-dcnode-id="906"><span data-dcnode-id="907" instrument_node="">Editor</span></span></a></span><span data-dcnode-id="903" instrument_node=""> </span><span class="entry-comments-link" data-dcnode-id="900"><a data-dcnode-id="901" href="#respond"><span data-dcnode-id="902" instrument_node="">Leave a Comment</span></a></span><span data-dcnode-id="899" instrument_node=""> </span></p></header><div class="entry-content" data-dcnode-id="741"><p data-dcnode-id="895"><span data-dcnode-id="896" instrument_node="">This is a series of do at home lung tests you can do to test the strength of your lungs.</span></p><span data-dcnode-id="894" instrument_node="">
</span><p data-dcnode-id="892"><span data-dcnode-id="893" instrument_node="">They are very simple and just take a couple of minutes.</span></p><span data-dcnode-id="891" instrument_node="">
</span><p data-dcnode-id="889"><span data-dcnode-id="890" instrument_node="">You may want to pass this information on to a all the smokers you know and see how well they do.</span></p><span data-dcnode-id="888" instrument_node="">
</span><p data-dcnode-id="886"><span data-dcnode-id="887" instrument_node="">This simple test may get their attention and provide a nudge to help them quit smoking.</span></p><span data-dcnode-id="885" instrument_node="">
</span><h2 data-dcnode-id="883"><span data-dcnode-id="884" instrument_node="">The Match Test</span></h2><span data-dcnode-id="882" instrument_node="">
</span><p data-dcnode-id="880"><span data-dcnode-id="881" instrument_node="">Light a match in a draft-free room, let it burn halfway, hold it 6 inches from your mouth, and try to blow it out with your mouth wide open. If  you can’t, your lungs may not be in the best condition.</span></p><span data-dcnode-id="879" instrument_node="">
</span><h2 data-dcnode-id="877"><span data-dcnode-id="878" instrument_node="">Measure Your Chest</span></h2><span data-dcnode-id="876" instrument_node="">
</span><p data-dcnode-id="874"><span data-dcnode-id="875" instrument_node="">Measure your chest at rest. Men should measure the chest around the nipples; women should measure just under the breasts.</span></p><span data-dcnode-id="873" instrument_node="">
</span><p data-dcnode-id="870"><img alt="Match Test" data-dcnode-id="872" height="26" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//i0.wp.com/www.ciggyfree.com/wp-content/uploads/2007/11/litmatch.thumbnail.jpg&amp;raw" width="93"><span data-dcnode-id="871" instrument_node="">Take a full breath and measure again while holding the breath. The second          measurement should be at least 1.5 inches more than the first one. If your chest expands less than 1.5 inches with a deep breath, your lungs may be weak and you should see your doctor.</span></p><span data-dcnode-id="869" instrument_node="">
</span><h2 data-dcnode-id="867"><span data-dcnode-id="868" instrument_node="">Time Your Exhalation</span></h2><span data-dcnode-id="866" instrument_node="">
</span><p data-dcnode-id="864"><span data-dcnode-id="865" instrument_node="">Take a deep breath, then time yourself while you exhale it as fast as possible. Time only the exhalation, not the inhalation. If it takes longer than 3 to 4 seconds to exhale, you may have a lung disorder and should see your doctor.</span></p><span data-dcnode-id="863" instrument_node="">
</span><p data-dcnode-id="861"><span data-dcnode-id="862" instrument_node="">Source: Weiss RJ, Sharpe-Subak G, and the editors of Consumer Reports          Books: The Columbia University School of Public Health 40+ Guide to Good          Health. Yonkers, NY, Consumer Reports Books, 1993.</span></p><span data-dcnode-id="860" instrument_node="">
