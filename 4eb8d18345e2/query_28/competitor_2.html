</span></div><h2 data-dcnode-id="2230"><span class="mw-headline" data-dcnode-id="2242" id="Description"><span data-dcnode-id="2243" instrument_node="">Description</span></span><span class="mw-editsection" data-dcnode-id="2231"><span class="mw-editsection-bracket" data-dcnode-id="2240"><span data-dcnode-id="2241" instrument_node="">[</span></span><a class="mw-editsection-visualeditor" data-dcnode-id="2238" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.physio-pedia.com/index.php%3Ftitle%3DLung_Volumes%26veaction%3Dedit%26section%3D1" title="Edit section: Description"><span data-dcnode-id="2239" instrument_node="">edit</span></a><span class="mw-editsection-divider" data-dcnode-id="2236"><span data-dcnode-id="2237" instrument_node=""> | </span></span><a data-dcnode-id="2234" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.physio-pedia.com/index.php%3Ftitle%3DLung_Volumes%26action%3Dedit%26section%3D1" title="Edit section: Description"><span data-dcnode-id="2235" instrument_node="">edit source</span></a><span class="mw-editsection-bracket" data-dcnode-id="2232"><span data-dcnode-id="2233" instrument_node="">]</span></span></span></h2><span data-dcnode-id="2229" instrument_node="">
</span><p data-dcnode-id="2223"><span data-dcnode-id="2228" instrument_node="">Lung volumes are also known as respiratory volumes. It refers to the volume of gas in the lungs at a given time during the respiratory cycle. Lung capacities are derived from a summation of different lung volumes. The average total lung capacity of an adult human male is about 6&nbsp;litres&nbsp;of&nbsp;air. Lung volumes measurement is an integral part of pulmonary function test. These volumes tend to vary, depending on the depth of respiration, ethnicity, gender, age, body composition</span><sup class="reference" data-dcnode-id="2225" id="cite_ref-1"><a data-dcnode-id="2226" href="#cite_note-1"><span data-dcnode-id="2227" instrument_node="">[1]</span></a></sup><span data-dcnode-id="2224" instrument_node=""> and in certain respiratory diseases. A number of the lung volumes can be measured by Spirometry- Tidal volume, Inspiratory reserve volume, and Expiratory reserve volume.  However, measurement of Residual volume,&nbsp;Functional residual capacity, and Total lung capacity is through body plethysmography, nitrogen washout and helium dilution technique. 
</span></p><p data-dcnode-id="2219"><a class="image" data-dcnode-id="2221" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.physio-pedia.com/File%3ALungs_-_Kenhub.png"><img alt="Lungs in situ - anterior view" class="img-responsive" data-dcnode-id="2222" decoding="async" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.physio-pedia.com/images/thumb/e/ec/Lungs_-_Kenhub.png/700px-Lungs_-_Kenhub.png&amp;raw" srcset="/images/thumb/e/ec/Lungs_-_Kenhub.png/1050px-Lungs_-_Kenhub.png 1.5x, /images/e/ec/Lungs_-_Kenhub.png 2x"></a><span data-dcnode-id="2220" instrument_node="">
</span></p><p data-dcnode-id="2213"><span data-dcnode-id="2218" instrument_node="">Image: Lungs in situ - anterior view </span><sup class="reference" data-dcnode-id="2215" id="cite_ref-2"><a data-dcnode-id="2216" href="#cite_note-2"><span data-dcnode-id="2217" instrument_node="">[2]</span></a></sup><span data-dcnode-id="2214" instrument_node="">
</span></p><span data-dcnode-id="2212" instrument_node="">
</span><h2 data-dcnode-id="2198"><span class="mw-headline" data-dcnode-id="2210" id="Lung_Volumes"><span data-dcnode-id="2211" instrument_node="">Lung Volumes</span></span><span class="mw-editsection" data-dcnode-id="2199"><span class="mw-editsection-bracket" data-dcnode-id="2208"><span data-dcnode-id="2209" instrument_node="">[</span></span><a class="mw-editsection-visualeditor" data-dcnode-id="2206" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.physio-pedia.com/index.php%3Ftitle%3DLung_Volumes%26veaction%3Dedit%26section%3D2" title="Edit section: Lung Volumes"><span data-dcnode-id="2207" instrument_node="">edit</span></a><span class="mw-editsection-divider" data-dcnode-id="2204"><span data-dcnode-id="2205" instrument_node=""> | </span></span><a data-dcnode-id="2202" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.physio-pedia.com/index.php%3Ftitle%3DLung_Volumes%26action%3Dedit%26section%3D2" title="Edit section: Lung Volumes"><span data-dcnode-id="2203" instrument_node="">edit source</span></a><span class="mw-editsection-bracket" data-dcnode-id="2200"><span data-dcnode-id="2201" instrument_node="">]</span></span></span></h2><span data-dcnode-id="2197" instrument_node="">
</span><ul data-dcnode-id="2193"><li data-dcnode-id="2194"><b data-dcnode-id="2195"><span data-dcnode-id="2196" instrument_node="">Tidal Volume(TV)</span></b></li></ul><span data-dcnode-id="2192" instrument_node="">
</span><p data-dcnode-id="2182"><span data-dcnode-id="2191" instrument_node="">It is the amount of air that can be inhaled or exhaled during one respiratory cycle</span><sup class="reference" data-dcnode-id="2188" id="cite_ref-3"><a data-dcnode-id="2189" href="#cite_note-3"><span data-dcnode-id="2190" instrument_node="">[3]</span></a></sup><span data-dcnode-id="2187" instrument_node="">. This depicts the functions of the respiratory centres, respiratory muscles and the mechanics of the lung and chest wall</span><sup class="reference" data-dcnode-id="2184" id="cite_ref-:0_4-0"><a data-dcnode-id="2185" href="#cite_note-:0-4"><span data-dcnode-id="2186" instrument_node="">[4]</span></a></sup><span data-dcnode-id="2183" instrument_node="">. 
</span></p><p data-dcnode-id="2172"><span data-dcnode-id="2181" instrument_node="">The normal adult value is 10% of vital capacity (VC), approximately  300-500ml (6‐8 ml/kg)</span><sup class="reference" data-dcnode-id="2178" id="cite_ref-:0_4-1"><a data-dcnode-id="2179" href="#cite_note-:0-4"><span data-dcnode-id="2180" instrument_node="">[4]</span></a></sup><span data-dcnode-id="2177" instrument_node="">; but can increase up to 50% of VC on exercise</span><sup class="reference" data-dcnode-id="2174" id="cite_ref-5"><a data-dcnode-id="2175" href="#cite_note-5"><span data-dcnode-id="2176" instrument_node="">[5]</span></a></sup><span data-dcnode-id="2173" instrument_node="">
</span></p><span data-dcnode-id="2171" instrument_node="">
</span><ul data-dcnode-id="2167"><li data-dcnode-id="2168"><b data-dcnode-id="2169"><span data-dcnode-id="2170" instrument_node="">Inspiratory Reserve Volume(IRV)</span></b></li></ul><span data-dcnode-id="2166" instrument_node="">
</span><p data-dcnode-id="2164"><span data-dcnode-id="2165" instrument_node="">It is the amount of air that can be forcibly inhaled after a normal tidal volume.IRV is usually kept in reserve, but is used during deep breathing. The normal adult value is 1900-3300ml.
</span></p><span data-dcnode-id="2163" instrument_node="">
</span><ul data-dcnode-id="2159"><li data-dcnode-id="2160"><b data-dcnode-id="2161"><span data-dcnode-id="2162" instrument_node="">Expiratory Reserve Volume(ERV)</span></b></li></ul><span data-dcnode-id="2158" instrument_node="">
</span><p data-dcnode-id="2152"><span data-dcnode-id="2157" instrument_node="">It is the volume of air that can be exhaled forcibly after exhalation of normal tidal volume. The normal adult value is 700-1200ml. ERV is reduced with obesity, ascites or after upper abdominal surgery</span><sup class="reference" data-dcnode-id="2154" id="cite_ref-:0_4-2"><a data-dcnode-id="2155" href="#cite_note-:0-4"><span data-dcnode-id="2156" instrument_node="">[4]</span></a></sup><span data-dcnode-id="2153" instrument_node="">
</span></p><span data-dcnode-id="2151" instrument_node="">
</span><ul data-dcnode-id="2147"><li data-dcnode-id="2148"><b data-dcnode-id="2149"><span data-dcnode-id="2150" instrument_node="">Residual Volume(RV)</span></b></li></ul><span data-dcnode-id="2146" instrument_node="">
</span><p data-dcnode-id="2144"><span data-dcnode-id="2145" instrument_node="">It is the volume of air remaining in the lungs after maximal exhalation. Normal adult value is averaged at 1200ml(20‐25 ml/kg)&nbsp;.It is indirectly measured from summation of FRC and ERV and cannot be measured by spirometry.
</span></p><p data-dcnode-id="2132"><span data-dcnode-id="2143" instrument_node="">In obstructive lung diseases with features of incomplete emptying of the lungs and air trapping, RV may be significantly high. The RV can also be expressed as a percentage of total lung capacity and values in excess of 140% significantly increase the risks of barotrauma, </span><a data-dcnode-id="2141" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.physio-pedia.com/Pneumothorax" title="Pneumothorax"><span data-dcnode-id="2142" instrument_node="">pneumothorax</span></a><span data-dcnode-id="2140" instrument_node="">, infection and reduced venous return due to high intra thoracic pressures as  noticed in patients with high RV who require surgery and </span><a data-dcnode-id="2138" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.physio-pedia.com/Ventilation_and_Weaning" title="Ventilation and Weaning"><span data-dcnode-id="2139" instrument_node="">mechanical ventilation</span></a><span data-dcnode-id="2137" instrument_node=""> thus needs high peri-operative inflation pressures. </span><sup class="reference" data-dcnode-id="2134" id="cite_ref-6"><a data-dcnode-id="2135" href="#cite_note-6"><span data-dcnode-id="2136" instrument_node="">[6]</span></a></sup><span data-dcnode-id="2133" instrument_node="">
</span></p><span data-dcnode-id="2131" instrument_node="">
</span><h2 data-dcnode-id="2117"><span class="mw-headline" data-dcnode-id="2129" id="Lung_capacities"><span data-dcnode-id="2130" instrument_node="">Lung capacities</span></span><span class="mw-editsection" data-dcnode-id="2118"><span class="mw-editsection-bracket" data-dcnode-id="2127"><span data-dcnode-id="2128" instrument_node="">[</span></span><a class="mw-editsection-visualeditor" data-dcnode-id="2125" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.physio-pedia.com/index.php%3Ftitle%3DLung_Volumes%26veaction%3Dedit%26section%3D3" title="Edit section: Lung capacities"><span data-dcnode-id="2126" instrument_node="">edit</span></a><span class="mw-editsection-divider" data-dcnode-id="2123"><span data-dcnode-id="2124" instrument_node=""> | </span></span><a data-dcnode-id="2121" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.physio-pedia.com/index.php%3Ftitle%3DLung_Volumes%26action%3Dedit%26section%3D3" title="Edit section: Lung capacities"><span data-dcnode-id="2122" instrument_node="">edit source</span></a><span class="mw-editsection-bracket" data-dcnode-id="2119"><span data-dcnode-id="2120" instrument_node="">]</span></span></span></h2><span data-dcnode-id="2116" instrument_node="">
</span><ul data-dcnode-id="2112"><li data-dcnode-id="2113"><b data-dcnode-id="2114"><span data-dcnode-id="2115" instrument_node="">Inspiratory capacity(IC)</span></b></li></ul><span data-dcnode-id="2111" instrument_node="">
</span><p data-dcnode-id="2109"><span data-dcnode-id="2110" instrument_node="">It is the maximum volume of air that can be inhaled following a resting state. It is calculated from the sum of inspiratory reserve volume and tidal volume. IC = IRV+TV
</span></p><span data-dcnode-id="2108" instrument_node="">
</span><ul data-dcnode-id="2104"><li data-dcnode-id="2105"><b data-dcnode-id="2106"><span data-dcnode-id="2107" instrument_node="">Total Lung Capacity(TLC)</span></b></li></ul><span data-dcnode-id="2103" instrument_node="">
</span><p data-dcnode-id="2101"><span data-dcnode-id="2102" instrument_node="">It is the maximum volume of air the lungs can accommodate or sum of all volume compartments or volume of air in lungs after maximum inspiration. The normal value is about 6,000mL(4‐6 L). TLC is calculated by summation of the four primary lung volumes (TV, IRV, ERV, RV). 
</span></p><p data-dcnode-id="2090"><span data-dcnode-id="2100" instrument_node="">TLC may be increased in patients with obstructive defects such as </span><a data-dcnode-id="2098" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.physio-pedia.com/Emphysema" title="Emphysema"><span data-dcnode-id="2099" instrument_node="">emphysema</span></a><span data-dcnode-id="2097" instrument_node=""> and decreased in patients with restrictive abnormalities including chest wall abnormalities and </span><a data-dcnode-id="2095" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.physio-pedia.com/Scheuermann%2527s_Kyphosis" title="Scheuermann's Kyphosis"><span data-dcnode-id="2096" instrument_node="">kyphoscoliosis</span></a><sup class="reference" data-dcnode-id="2092" id="cite_ref-:2_7-0"><a data-dcnode-id="2093" href="#cite_note-:2-7"><span data-dcnode-id="2094" instrument_node="">[7]</span></a></sup><span data-dcnode-id="2091" instrument_node="">.
</span></p><span data-dcnode-id="2089" instrument_node="">
</span><ul data-dcnode-id="2085"><li data-dcnode-id="2086"><b data-dcnode-id="2087"><span data-dcnode-id="2088" instrument_node="">Vital Capacity(VC)</span></b></li></ul><span data-dcnode-id="2084" instrument_node="">
</span><p data-dcnode-id="2082"><span data-dcnode-id="2083" instrument_node="">It is the total amount of air exhaled after maximal inhalation. The value is about 4800mL and it varies according to age and body size. It is calculated by summing tidal volume, inspiratory reserve volume, and expiratory reserve volume.  VC = TV+IRV+ERV. 
</span></p><p data-dcnode-id="2072"><span data-dcnode-id="2081" instrument_node="">VC indicates ability to breathe deeply and cough, reflecting inspiratory and expiratory muscle strength.VC should be 3 times greater than TV for effective cough</span><sup class="reference" data-dcnode-id="2078" id="cite_ref-:1_8-0"><a data-dcnode-id="2079" href="#cite_note-:1-8"><span data-dcnode-id="2080" instrument_node="">[8]</span></a></sup><span data-dcnode-id="2077" instrument_node="">. VC is sometimes reduced in obstructive disorders and always in restrictive disorders</span><sup class="reference" data-dcnode-id="2074" id="cite_ref-:1_8-1"><a data-dcnode-id="2075" href="#cite_note-:1-8"><span data-dcnode-id="2076" instrument_node="">[8]</span></a></sup><span data-dcnode-id="2073" instrument_node="">
</span></p><span data-dcnode-id="2071" instrument_node="">
</span><ul data-dcnode-id="2067"><li data-dcnode-id="2068"><b data-dcnode-id="2069"><span data-dcnode-id="2070" instrument_node="">Function Residual Capacity(FRC)</span></b></li></ul><span data-dcnode-id="2066" instrument_node="">
</span><p data-dcnode-id="2064"><span data-dcnode-id="2065" instrument_node="">It is the amount of air remaining in the lungs at the end of a normal exhalation. It is calculated by adding together residual and expiratory reserve volumes. The normal value is about 1800 – 2200 mL.  FRC = RV+ERV.
</span></p><p data-dcnode-id="2054"><span data-dcnode-id="2063" instrument_node="">FRC does not rely on effort and highlights the resting position when inner and outer elastic recoils are balanced. FRC is reduced in restrictive disorders. The ratio of FRC to TLC is an index of hyperinflation</span><sup class="reference" data-dcnode-id="2060" id="cite_ref-9"><a data-dcnode-id="2061" href="#cite_note-9"><span data-dcnode-id="2062" instrument_node="">[9]</span></a></sup><span data-dcnode-id="2059" instrument_node="">. In COPD, FRC is upto 80% of TLC</span><sup class="reference" data-dcnode-id="2056" id="cite_ref-:0_4-3"><a data-dcnode-id="2057" href="#cite_note-:0-4"><span data-dcnode-id="2058" instrument_node="">[4]</span></a></sup><span data-dcnode-id="2055" instrument_node="">.
</span></p><span data-dcnode-id="2053" instrument_node="">

</span><h2 data-dcnode-id="1516"><span class="mw-headline" data-dcnode-id="1528" id="Measurement_of_Lung_Volumes"><span data-dcnode-id="1529" instrument_node="">Measurement of Lung Volumes</span></span><span class="mw-editsection" data-dcnode-id="1517"><span class="mw-editsection-bracket" data-dcnode-id="1526"><span data-dcnode-id="1527" instrument_node="">[</span></span><a class="mw-editsection-visualeditor" data-dcnode-id="1524" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.youtube.com/index.php%3Ftitle%3DLung_Volumes%26veaction%3Dedit%26section%3D4" title="Edit section: Measurement of Lung Volumes"><span data-dcnode-id="1525" instrument_node="">edit</span></a><span class="mw-editsection-divider" data-dcnode-id="1522"><span data-dcnode-id="1523" instrument_node=""> | </span></span><a data-dcnode-id="1520" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.youtube.com/index.php%3Ftitle%3DLung_Volumes%26action%3Dedit%26section%3D4" title="Edit section: Measurement of Lung Volumes"><span data-dcnode-id="1521" instrument_node="">edit source</span></a><span class="mw-editsection-bracket" data-dcnode-id="1518"><span data-dcnode-id="1519" instrument_node="">]</span></span></span></h2><span data-dcnode-id="1515" instrument_node="">
</span><p data-dcnode-id="1502"><span data-dcnode-id="1514" instrument_node="">Measurements of lung volume are important for a correct physiological diagnosis, however, its role in the assessment of disease severity, functional disability, the course of disease and response to treatment remains controversial.</span><sup class="reference" data-dcnode-id="1511" id="cite_ref-10"><a data-dcnode-id="1512" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.youtube.com/embed/9VdHhD1vcDU%23cite_note-10"><span data-dcnode-id="1513" instrument_node="">[10]</span></a></sup><span data-dcnode-id="1510" instrument_node=""> Measurement can be done using Spirometry </span><a data-dcnode-id="1508" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.youtube.com/Pulmonary_Function_Test" title="Pulmonary Function Test"><span data-dcnode-id="1509" instrument_node="">see...</span></a><span data-dcnode-id="1507" instrument_node="">, Body plethysmography, Nitrogen washout and Helium dilution with the latter three techniques used in measuring static lung volumes</span><sup class="reference" data-dcnode-id="1504" id="cite_ref-:2_7-1"><a data-dcnode-id="1505" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.youtube.com/embed/9VdHhD1vcDU%23cite_note-%3A2-7"><span data-dcnode-id="1506" instrument_node="">[7]</span></a></sup><span data-dcnode-id="1503" instrument_node="">.
</span></p><span data-dcnode-id="1501" instrument_node="">
</span><h3 data-dcnode-id="1487"><span class="mw-headline" data-dcnode-id="1499" id="Body_Plethysmography"><span data-dcnode-id="1500" instrument_node="">Body Plethysmography</span></span><span class="mw-editsection" data-dcnode-id="1488"><span class="mw-editsection-bracket" data-dcnode-id="1497"><span data-dcnode-id="1498" instrument_node="">[</span></span><a class="mw-editsection-visualeditor" data-dcnode-id="1495" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.youtube.com/index.php%3Ftitle%3DLung_Volumes%26veaction%3Dedit%26section%3D5" title="Edit section: Body Plethysmography"><span data-dcnode-id="1496" instrument_node="">edit</span></a><span class="mw-editsection-divider" data-dcnode-id="1493"><span data-dcnode-id="1494" instrument_node=""> | </span></span><a data-dcnode-id="1491" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.youtube.com/index.php%3Ftitle%3DLung_Volumes%26action%3Dedit%26section%3D5" title="Edit section: Body Plethysmography"><span data-dcnode-id="1492" instrument_node="">edit source</span></a><span class="mw-editsection-bracket" data-dcnode-id="1489"><span data-dcnode-id="1490" instrument_node="">]</span></span></span></h3><span data-dcnode-id="1486" instrument_node="">
</span><p data-dcnode-id="1484"><span data-dcnode-id="1485" instrument_node="">Plethysmography is derived from Greek word meaning enlargement . Body plethysmography primarily measures FRC using Boyle's law. It is particularly appropriate for patients who have air spaces within the lung that do not communicate with the bronchial tree.                                                                                                                 
</span></p><p data-dcnode-id="1482"><span data-dcnode-id="1483" instrument_node="">The person is seated comfortably in an airtight box(Static lung volumes can be obtained either by measuring the changes in pressure in a constant volume box or volume in a constant pressure box)  in which changes in pressure and volume can be measured accurately.
</span></p><span data-dcnode-id="1481" instrument_node="">
</span><h3 data-dcnode-id="1467"><span class="mw-headline" data-dcnode-id="1479" id="Nitrogen_Washout"><span data-dcnode-id="1480" instrument_node="">Nitrogen Washout</span></span><span class="mw-editsection" data-dcnode-id="1468"><span class="mw-editsection-bracket" data-dcnode-id="1477"><span data-dcnode-id="1478" instrument_node="">[</span></span><a class="mw-editsection-visualeditor" data-dcnode-id="1475" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.youtube.com/index.php%3Ftitle%3DLung_Volumes%26veaction%3Dedit%26section%3D6" title="Edit section: Nitrogen Washout"><span data-dcnode-id="1476" instrument_node="">edit</span></a><span class="mw-editsection-divider" data-dcnode-id="1473"><span data-dcnode-id="1474" instrument_node=""> | </span></span><a data-dcnode-id="1471" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.youtube.com/index.php%3Ftitle%3DLung_Volumes%26action%3Dedit%26section%3D6" title="Edit section: Nitrogen Washout"><span data-dcnode-id="1472" instrument_node="">edit source</span></a><span class="mw-editsection-bracket" data-dcnode-id="1469"><span data-dcnode-id="1470" instrument_node="">]</span></span></span></h3><span data-dcnode-id="1466" instrument_node="">
</span><p data-dcnode-id="1464"><span data-dcnode-id="1465" instrument_node="">This technique is based on washing out the N2&nbsp;from the lungs, while the patient breathes 100% O2 using dilution properties of gases.
</span></p><span data-dcnode-id="1463" instrument_node="">
</span><ul data-dcnode-id="1454"><li data-dcnode-id="1461"><span data-dcnode-id="1462" instrument_node="">The patient breathes 100% oxygen, and all the nitrogen in the lungs is washed out.</span></li><span data-dcnode-id="1460" instrument_node="">
</span><li data-dcnode-id="1458"><span data-dcnode-id="1459" instrument_node="">The exhaled volume and the nitrogen concentration in that volume are measured.</span></li><span data-dcnode-id="1457" instrument_node="">
</span><li data-dcnode-id="1455"><span data-dcnode-id="1456" instrument_node="">The difference in nitrogen volume at the initial concentration and at the final exhaled concentration allows a calculation of intrathoracic volume, usually FRC.</span></li></ul><span data-dcnode-id="1453" instrument_node="">
</span><h3 data-dcnode-id="1439"><span class="mw-headline" data-dcnode-id="1451" id="Helium_Dilution"><span data-dcnode-id="1452" instrument_node="">Helium Dilution</span></span><span class="mw-editsection" data-dcnode-id="1440"><span class="mw-editsection-bracket" data-dcnode-id="1449"><span data-dcnode-id="1450" instrument_node="">[</span></span><a class="mw-editsection-visualeditor" data-dcnode-id="1447" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.youtube.com/index.php%3Ftitle%3DLung_Volumes%26veaction%3Dedit%26section%3D7" title="Edit section: Helium Dilution"><span data-dcnode-id="1448" instrument_node="">edit</span></a><span class="mw-editsection-divider" data-dcnode-id="1445"><span data-dcnode-id="1446" instrument_node=""> | </span></span><a data-dcnode-id="1443" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.youtube.com/index.php%3Ftitle%3DLung_Volumes%26action%3Dedit%26section%3D7" title="Edit section: Helium Dilution"><span data-dcnode-id="1444" instrument_node="">edit source</span></a><span class="mw-editsection-bracket" data-dcnode-id="1441"><span data-dcnode-id="1442" instrument_node="">]</span></span></span></h3><span data-dcnode-id="1438" instrument_node="">
</span><p data-dcnode-id="1436"><span data-dcnode-id="1437" instrument_node="">The method for measuring lung volumes is based on the equilibration of gas in the lung with a known volume of gas containing helium. This technique involves the subject being connected to a spirometer filled with 10% helium in oxygen. After the subject re-breathes the helium–oxygen mixture and equilibrates with the spirometer, the helium concentration in the lungs will become the same as in the spirometer.  From the conservation of mass principle, we can write that:  C1 × V1 = C2 (V1 + V2)  Where C1 equals the initial concentration of helium in the spirometer,
</span></p><span data-dcnode-id="1435" instrument_node="">
</span><ul data-dcnode-id="1423"><li data-dcnode-id="1433"><span data-dcnode-id="1434" instrument_node="">V1 equals the initial volume of helium–oxygen mixture in the spirometer,</span></li><span data-dcnode-id="1432" instrument_node="">
</span><li data-dcnode-id="1430"><span data-dcnode-id="1431" instrument_node="">C2 equals helium concentration after equilibration,</span></li><span data-dcnode-id="1429" instrument_node="">
</span><li data-dcnode-id="1427"><span data-dcnode-id="1428" instrument_node="">V2 equals unknown volume in the lungs.</span></li><span data-dcnode-id="1426" instrument_node="">
</span><li data-dcnode-id="1424"><span data-dcnode-id="1425" instrument_node="">V2=V1 (C1-C2)/C2</span></li></ul><span data-dcnode-id="1422" instrument_node="">
</span><ul data-dcnode-id="1413"><li data-dcnode-id="1420"><span data-dcnode-id="1421" instrument_node="">If the test begins at the end of a normal tidal volume (end of expiration), the volume of air remaining in the lungs represents FRC.</span></li><span data-dcnode-id="1419" instrument_node="">
</span><li data-dcnode-id="1417"><span data-dcnode-id="1418" instrument_node="">If the test begins at the end of an FVC, then the test will measure RV.</span></li><span data-dcnode-id="1416" instrument_node="">
</span><li data-dcnode-id="1414"><span data-dcnode-id="1415" instrument_node="">Similarly, if the test starts after a maximal inspiration, then V2 would equal Total lung capacity.</span></li></ul><span data-dcnode-id="1412" instrument_node="">
</span><p data-dcnode-id="1410"><span data-dcnode-id="1411" instrument_node="">To further understand the technique of lung volume estimation, watch the video below

</span><span class="st-ui-type-heading" data-dcnode-id="824"><span data-dcnode-id="825" instrument_node="">Lung Volumes - Physiopedia</span></span><span data-dcnode-id="823" instrument_node="">
</span><span class="st-ui-type-detail" data-dcnode-id="821"><span data-dcnode-id="822" instrument_node=""> Description Lung volumes are also known as respiratory volumes. It refers to the volume of gas in the lungs at a given time during the respiratory cycle. Lung capacities are derived from a summation of different lung volumes. The average total lung capacity of an adult human male is about 6&nbsp;litres&nbsp;of&nbsp;air. Lung volumes measurement is an integral part of pulmonary function test. These volumes tend to vary, depending on the depth of respiration, ethnicity, gender, age, body composition[1] and in certain respiratory diseases. A number of the lung volumes can be measured by Spirometry- Tidal volume, Inspiratory reserve volume, and Expiratory reserve volume. However, measurement of Residual volume,&nbsp;Functional residual capacity, and Total lung capacity is through body plethysmography, nitrogen washout and helium dilution technique. Lung Volumes Tidal Volume(TV) It is the amount of air that can be inhaled or exhaled during one respiratory cycle[2]. This depicts the functions of the respiratory centres, respiratory muscles and the mechanics of the lung and chest wall[3]. The normal adult value is 10% of vital capacity (VC), approximately 300-500ml (6‐8 ml/kg)[3]; but can increase up to 50% of VC on exercise[4] Inspiratory Reserve Volume(IRV) It is the amount of air that can be forcibly inhaled after a normal tidal volume.IRV is usually kept in reserve, but is used during deep breathing. The normal adult value is 1900-3300ml. Expiratory Reserve Volume(ERV) It is the volume of air that can be exhaled forcibly after exhalation of normal tidal volume. The normal adult value is 700-1200ml. ERV is reduced with obesity, ascites or after upper abdominal surgery[3] Residual Volume(RV) It is the volume of air remaining in the lungs after maximal exhalation. Normal adult value is averaged at 1200ml(20‐25 ml/kg)&nbsp;.It is indirectly measured from summation of FRC and ERV and cannot be measured by spirometry. In obstructive lung diseases with features of incomplete emptying of the lungs and air trapping, RV may be significantly high. The RV can also be expressed as a percentage of total lung capacity and values in excess of 140% significantly increase the risks of barotrauma, pneumothorax, infection and reduced venous return due to high intra thoracic pressures as noticed in patients with high RV who require surgery and mechanical ventilation thus needs high peri-operative inflation pressures. [5] Lung capacities Inspiratory capacity(IC) It is the maximum volume of air that can be inhaled following a resting state. It is calculated from the sum of inspiratory reserve volume and tidal volume. IC = IRV+TV Total Lung Capacity(TLC) It is the maximum volume of air the lungs can accommodate or sum of all volume compartments or volume of air in lungs after maximum inspiration. The normal value is about 6,000mL(4‐6 L). TLC is calculated by summation of the four primary lung volumes (TV, IRV, ERV, RV). TLC may be increased in patients with obstructive defects such as emphysema and decreased in patients with restrictive abnormalities including chest wall abnormalities and kyphoscoliosis[6]. Vital Capacity(VC) It is the total amount of air exhaled after maximal inhalation. The value is about 4800mL and it varies according to age and body size. It is calculated by summing tidal volume, inspiratory reserve volume, and expiratory reserve volume. VC = TV+IRV+ERV. VC indicates ability to breathe deeply and cough, reflecting inspiratory and expiratory muscle strength.VC should be 3 times greater than TV for effective cough[7]. VC is sometimes reduced in obstructive disorders and always in restrictive disorders[7] Function Residual Capacity(FRC) It is the amount of air remaining in the lungs at the end of a normal exhalation. It is calculated by adding together residual and expiratory reserve volumes. The normal value is about 1800 – 2200 mL. FRC = RV+ERV. FRC does not rely on effort and highlights the resting position when inner and outer elastic recoils are balanced. FRC is reduced in restrictive disorders. The ratio of FRC to TLC is an index of hyperinflation[8]. In COPD, FRC is upto 80% of TLC[3]. Measurement of Lung Volumes Measurements of lung volume are important for a correct physiological diagnosis, however, its role in the assessment of disease severity, functional disability, the course of disease and response to treatment remains controversial.[9] Measurement can be done using Spirometry see..., Body plethysmography, Nitrogen washout and Helium dilution with the latter three techniques used in measuring static lung volumes[6]. Body Plethysmography Plethysmography is derived from Greek word meaning enlargement . Body plethysmography primarily measures FRC using Boyle's law. It is particularly appropriate for patients who have air spaces within the lung that do not communicate with the bronchial tree. The person is seated comfortably in an airtight box(Static lung volumes can be obtained either by measuring the changes in pressure in a constant volume box or volume in a constant pressure box) in which changes in pressure and volume can be measured accurately. Nitrogen Washout This technique is based on washing out the N2&nbsp;from the lungs, while the patient breathes 100% O2 using dilution properties of gases. The patient breathes 100% oxygen, and all the nitrogen in the lungs is washed out. The exhaled volume and the nitrogen concentration in that volume are measured. The difference in nitrogen volume at the initial concentration and at the final exhaled concentration allows a calculation of intrathoracic volume, usually FRC. Helium Dilution The method for measuring lung volumes is based on the equilibration of gas in the lung with a known volume of gas containing helium. This technique involves the subject being connected to a spirometer filled with 10% helium in oxygen. After the subject re-breathes the helium–oxygen mixture and equilibrates with the spirometer, the helium concentration in the lungs will become the same as in the spirometer. From the conservation of mass principle, we can write that: C1 × V1 = C2 (V1 + V2) Where C1 equals the initial concentration of helium in the spirometer, V1 equals the initial volume of helium–oxygen mixture in the spirometer, C2 equals helium concentration after equilibration, V2 equals unknown volume in the lungs. V2=V1 (C1-C2)/C2 If the test begins at the end of a normal tidal volume (end of expiration), the volume of air remaining in the lungs represents FRC. If the test begins at the end of an FVC, then the test will measure RV. Similarly, if the test starts after a maximal inspiration, then V2 would equal Total lung capacity. To further understand the technique of lung volume estimation, watch the video below Resources European Respiratory Journal http://erj.ersjournals.com/content/26/3/511 https://www.ncbi.nlm.nih.gov/pmc/articles/PMC32298 Lutfi MF. The physiological basis and clinical significance of lung volume measurements.Multidisciplinary Respiratory Medicine, 2017; 12: 3 Ruppel GL. What Is the Clinical Value of Lung Volumes? Respiratory care, 2012;57(1):126–35. </span></span><span data-dcnode-id="820" instrument_node="">

</span><span class="st-ui-type-detail" data-dcnode-id="812"><span data-dcnode-id="813" instrument_node=""> Introduction Pulmonary compliance, a measure of the lung expandability, is important in ideal respiratory system function. It refers to the ability of the lungs to stretch and expand. Lung compliance can be calculated by dividing volume by pressure. Factors affecting lung compliance include elasticity from the elastin in connective tissue and surface tension, which is decreased by surfactant production. Lung compliance participates in the lung-chest wall system by opposing the outward pull of chest wall compliance. The net compliance (lung-chest wall system) allows the lungs to achieve appropriate functional residual capacity, the volume remaining after passive expiration[1]. Transmural Pressures[edit | edit source] The compliance of the lung describes the relationship between the transmural pressure (ie pressure passing through a wall eg hollow structure) across the lung compared with organ's volume. By transmural pressure, we mean the relative pressure between the alveoli compared with that in the intrapleural space. Positive transmural pressures mean greater alveolar pressures than intrapleural pressures.[2] Although positive transmural pressures are required to expand the lung, they are not achieved by generating positive alveolar air pressures. Rather, lung expansion is achieved by generating progressively negative pressures within the intrapleural space. Conceptually, one can think of this as inflating a balloon not by breathing into it and thus increasing the internal pressure above that of atmospheric pressure, but rather by placing it within a chamber and generating a progressive vacuum around the balloon. Appreciation of this important feature of lung expansion is critical for understanding how lung expansion can be achieved given the fact that the lung is not physically attached to the chest wall and is instead separated by the intrapleural space. Similar to a balloon, the lungs expand by generating positive transmural pressures. However, unlike a balloon, these positive transmural pressures are generated by creating negative surrounding pressure within the intrapleural space. As shown, the pressure of air within the lungs remains equivalent to that of the atmosphere at the peak inspiration or expiration[3]. Function[edit | edit source] Compliance of the respiratory system describes the expandability of the lungs and chest wall. There are two types of compliance: dynamic and static. Dynamic compliance describes the compliance measured during breathing, which involves a combination of lung compliance and airway resistance. Defined as the change in lung volume per unit change in pressure in the presence of flow. Static compliance describes pulmonary compliance when there is no airflow, like an inspiratory pause. Defined as the change in lung volume per unit change in pressure in the absence of flow. For example, If a person was to fill the lung with pressure and then not move it, the pressure would eventually decrease; this is the static compliance measurement. Dynamic compliance is measured by dividing the tidal volume, the average volume of air in one breath cycle, by the difference between the pressure of the lungs at full inspiration and full expiration. Static compliance is always a higher value than dynamic[4]. Pressure-volume curves are common schemes to express the relationship of dynamic and static compliance where the slope is compliance.[5] Important Factors[edit | edit source] Two important factors of lung compliance are elastic fibers and surface tension.[6] More elastic fibers in the tissue lead to ease in expandability and, therefore, compliance. Surface tension within the alveoli is decreased by the production of surfactant to prevent collapse. Compliance is more easily achieved by decreasing surface tension. Elastin: a highly stretchable protein that is found widely throughout the pulmonary interstitial connective tissue. Molecularly, elastin proteins naturally tend toward a globular structure but can be stretched if a force is applied; however, once the protein is fully extended the molecule is highly resistant to further stretching, similar to a rubber band. The elastic recoil of the lung and its tendency to have higher compliance at lower lung volumes is in large part explained by the combined action of the elastin fibers spread throughout the pulmonary interstitium. These fibers serve to powerfully recoil the lung and only stretch when a force is applied; however, once the lung is stretched to large volumes, these proteins become highly resistant to further stretching. Surface Tension: a physical property of water that causes surfaces of water to achieve the smallest possible area. Surface tension arises from the energetic preference of water molecules to interact with one another through hydrogen bonding rather than with air. Individual alveoli all contain a highly thin inner lining of water-based fluid whose surface tension exerts a collapsing force on the alveolus. This is because smaller alveolar volumes would naturally reduce the surface area of the thin fluid lining. The combined force of surface tension throughout the lung's alveoli serves as a powerful contributor to the elastic recoil of the lung. Increased lung volumes would require expansion of individual alveoli which is highly resisted by the surface tension of the alveolar fluid inner lining. In fact, the recoiling force of alveolar surface tension is so powerful that special surfactant chemicals must be synthesized and secreted into the inner lining fluid to reduce the surface tension. Failure to produce these surfactants is an important contributor to major pulmonary pathologies; eg Neonatal Respiratory Distress Syndrome.[3] Pathophysiology[edit | edit source] Lung compliance changes can indicate when there are issues with the lungs. A decreased compliance might show restrictive lung diseases. Restrictive lung disease can result from mechanical issues with peripheral hypoventilation, including poor muscular effort or structural dysfunction. Conditions like muscular dystrophy, polio, myasthenia gravis, and Guillain-barre syndrome can cause poor muscular effort. Scoliosis or morbid obesity can also cause structural limitations Increased compliance can indicate a state of disease where there is degeneration of tissue that causes the lungs to have to work harder to expand, such as emphysema. With emphysema, the tissue damage means that it is easier to inhale, as there is less resistance, but it is harder to exhale[4] There are cases of lung compliance pathology caused by problems with the surfactant.&nbsp;The recoiling force of alveolar surface tension is so powerful that special surfactant chemicals must be synthesized and secreted into the inner lining fluid to reduce the surface tension. Failure to produce these surfactants is an important contributor to major pulmonary pathologies eg Neonatal Respiratory Distress Syndrome.[3].[4] Pneumothorax: This condition characteristically demonstrates the accumulation of air in the intrapleural space. This leads to the equalization of intrapleural pressure with atmospheric pressure. As a result, the chest wall protrudes outward, and lungs collapse as this is the natural tendency without transmural pressure. The patient will commonly present with dyspnea, chest pain, uneven expansion of the chest, and diminished breath sound on the affected side. Without proper transmural pressure, lung-chest wall compliance is inoperable. Obesity results in low lung compliance with reduced functional residual capacity and expiratory reserve volume. Scoliosis decreases the chest wall and lung compliance that results in increased respiratory workload. Aging is accompanied by a decrease in muscular strength and elastic recoil. Therefore, lung compliance increases and chest wall compliance decreases as age increases[1] Lung compliance Chest wall compliance Increased &nbsp;lung compliance Lung surfactant Lung volume: compliance is at its&nbsp;highest at&nbsp;FRC Posture (supine, upright) Loss of lung connective tissue associated with age Emphysema Increased chest wall compliance Ehler-Dahlos syndrome and other connective tissue diseases Rib resection Cachexia Flail segment rib fractures Open chest (eg clamshell) Decreased static lung compliance Loss of surfactant (eg. ARDS) Decreased lung elasticity Pulmonary fibrosis[6] Pulmonary oedema Decreased functional lung volume Pneumonectomy or lobectomy Pneumonia Atelectasis Small stature Alveolar derecruitment Alveolar overdistension Decreased dynamic lung compliance Increased airway resistance (eg. asthma) Increased airflow (increased resp rate) Decreased chest wall compliance Structural abnormalities Kyphosis / scoliosis Pectus excavatum Circumferential burns Surgical rib fixation Functional abnormalities Muscle spasm, eg. seizure or tetanus Extrathoracic influences on chest/diaphragmatic excursion Obesity Abdominal compartment syndrome Prone position </span></span><span data-dcnode-id="811" instrument_node="">

</span><span class="st-ui-type-heading" data-dcnode-id="797"><span data-dcnode-id="798" instrument_node="">Lung Anatomy - Physiopedia</span></span><span data-dcnode-id="796" instrument_node="">
</span><span class="st-ui-type-detail" data-dcnode-id="794"><span data-dcnode-id="795" instrument_node=""> Introduction and Location The lungs, which is the organ for respiration is a paired cone shaped organs lying in the thoracic cavity separated from each other by the heart and other structures in the mediastinum. Image: Lungs in situ - anterior view [1] Each lung has a base resting on the diaphragm and an apex extending superiorly to a point approximately 2.5 cm superior to the clavicle[2]. It also has a medial surface and with three borders- anterior, posterior and inferior. The broad coastal surface of the lungs is pressed against the rib cage, while the smaller mediastinal surface faces medially. The lungs receives the bronchus, blood vessels, lymphatic vessels and nerves through a slit in the mediastinal surface called the helium, and the structures entering the helium constitutes the lungs root[3]. The right lung is larger and weighs more than the left lung[4][3]. Since the heart tilts to the left, the left lung is smaller than the right and has an indentation called the cardiac impression to accommodate the heart. This indentation shapes the inferior and anterior parts of the superior lobe into a thin tongue-like process called the lingual.[3] Pleura[edit | edit source] Each lung is invested by and enclosed in a serous pleural sac that consists of two continuous membranes. The visceral or pulmonary pleura invest the lungs, The parietal pleura line the pulmonary cavities and adhere to the thoracic wall, mediastinum and diaphragm. The parietal pleura consist of four parts: coastal pleura which lines the internal surface of the thoracic wall, mediastinal pleura which lines the lateral aspect of the mediastinum, diaphragmatic pleura which lines the superior surface of the diaphragm on each side of the mediastinum, cervical pleura extends through the superior thoracic aperture into the root of the neck, forming a cup-shaped dome over the apex of the lung[3]. Pleural Cavity[edit | edit source] The pleural cavity is the potential space between the visceral and parietal layers of the pleural and it contains a capillary layer of serous pleural fluid which lubricates the pleural surfaces and allows the layers to slide smoothly over each other during respiration. Surface tension created by the pleural cavity provides the cohesion that keeps the lung surface in contact with the thoracic wall[2]. &nbsp; Lobes and Fissures of the Lungs[edit | edit source] Each lung is divided into lobes by fissures. Both lungs have oblique fissure and the right is further divided by a transverse fissure. The oblique fissure in the left lung separates the superior and the inferior lobe. The oblique and horizontal fissure divides the lungs into superior, middle and inferior lobes. Thus the right lung has three lobes while the left has two. Each lobe is supplied by a lobar bronchus. The lobes are subdivided by bronchopulmonary segments which are supplied by the segmental bronchi.[5] Tracheobronchial Tree[edit | edit source] All the respiratory passages from the trachea to the respiratory bronchioles are called the tracheobronchial tree[2][3][4]. The trachea divides at the sternal angle into right and left primary bronchus which goes into the right and left lungs. Each bronchus enters the lung at a notch called the hilum. Blood vessels and nerves also connect with the lungs here and together with the bronchus forms a region called the root of the lungs. The right main bronchus is larger in diameter and more vertical making it directly in line with the trachea than the left main bronchus[3]. Thus swallowed objects that accidentally enter the lower respiratory tract are most likely to become lodged in the right main bronchus[6]. The main bronchi divide into lobar or secondary bronchi within each lung. Two lobar bronchi exist in the left lung, and three exist in the right lung. The lobar bronchi, in turn give rise to segmental or tertiary bronchi. The tertiary bronchi supply the bronchopulmonary segments. Bronchopulmonary Segment[edit | edit source] Functionally, the lung is divided into a series of bronchopulmonary segments. The bronchopulmonary segments are the largest subdivision of a lobe. They are separated from adjacent segments by connective tissue septa and are also surgically resectable. They are 10 bronchopulmonary segments in the left lung and 8-10 in the left lung[7]. The bronchi further divides, finally giving rise to the bronchioles which are less than 1mm in diameter. Each bronchioles divides into 50 to 80 terminal bronchioles, the final branches of respiratory bronchioles. The functional unit of the lungs which is the acinus includes the respiratory bronchioles, alveolar ducts, and sacs and the alveolar[2]. Approximately 16 generations of branching occur from the trachea to the terminal bronchioles[2]. As the air passageways of the lungs become smaller, the structure of their walls changes[4]. Histology of Bronchopulmonary Segment[edit | edit source] The major airways from the trachea through the ten generations of bronchi have descending amounts of cartilaginous support surrounded by smooth muscles and elastic fibres, they have goblet cells for mucus production and are lined with ciliated columnar epithelium. Sputum is not saliva but the thick mucus (sometimes called phlegm) which is coughed up from the lungs. secretion clearance.[7] The next five generation of bronchioles have no cartilage or goblet cells, but still have elastic tissue and smooth muscle fibres. They lined with ciliated cuboidal epithelium. Relaxation and contraction of the smooth muscles of the bronchi and bronchioles can change the diameter of the air passageways and so change the volume of air moving through them. The alveoli provide a large surface area for gas exchange. The alveolar walls consist of simple squamous epithelium. Also the tissues surrounding the alveoli contain elastic fibres which allow the alveoli to expand during inspiration and recoil during expiration.[7] The epithelium of the respiratory zone is not ciliated but debris from the air can be removed by macrophages that move over the surface of the cells. Approximately 300 million alveoli are in the lungs. The average diameter of the alveoli is approximately 250um and their walls are extremely thin. There are two types of cells in the alveoli: type I pneumocytes which are thin squamous epithelia cells that forms 90% of the alveoli surface. Most of the gas exchange take place between these cells. Type II pneumocytes are round secretory that produce surfactant, which makes it easier for the alveoli to expand during inspiration[7]. Blood supply[edit | edit source] The bronchial arteries arising from the aorta provide blood supply to the non-respiratory airways, pleura, and connective tissue while the pulmonary arteries supply the respiratory units (acini) and participate in gas exchange.[3][4] Venous drainage is mainly by the pulmonary veins (right and left superior and inferior pulmonary veins), though the venous of drainage from the walls of the larger bronchi is carried out by the bronchial veins. All four veins (pulmonary veins) drain into the left atrium.[3][4] Nerves supply[edit | edit source] The lungs and airways are innervated by the branches of sympathetic trunk and vagus nerve[3]. Sympathetic nervous stimulation results in bronchodilation and slight vasoconstriction, while parasympathetic nervous system stimulation results in bronchoconstriction and indirect vasodilation. The function of the lungs is controlled through the respiratory centre with groups of neurons located at the pons and the medulla oblongata, and complex interactions of specialized peripheral central chemoreceptors.[4] Relevance to Physiotherapy[edit | edit source] Auscultation of the lungs and percussion of the thorax are important techniques used during physical examination. Auscultation assesses airflow through the tracheobronchial tree into the lungs. Percussion helps establish whether the underlining tissues are air filled (resonant sound), fluid filled (dull sound) or solid (flat sound). Based on the anatomy of the bronchial tree, gravity can be used to assist the clearance of bronchial secretions through the use of positioning. Also Bronchial disorders such as tumour and abscesses may be localized in a bronchopulmonary segments and may be surgically removed without disrupting the surrounding lung tissue.[4][6] Defences of the Lungs[edit | edit source] There are a number of structures that protects the lungs from inhaled organisms and particles: Nasal mucosa and hairs: warm and humidify inhaled air and filter out particle. Goblet cell and bronchial seromucous glands: produce mucous which contain immunoglobulin A, cytokines, and other cytolytic substances, with extensive mucosal production of nitric oxide by the nose and paranasal sinuses; all of these have potent antimicrobial activity, to protect underlining tissues and trap organisms and particles. Bacteria are destroyed by lysozyme in the mucus.&nbsp; Also additional protection against bacteria is contributed by lymphocytes which populate the lamina propria in large numbers. The lamina propria contain large blood vessels that help to warm the air.[8] Furthermore, the inferior concha has an especially large venous plexus called the erectile tissue. Every 30 to 60 minutes, the erectile tissue on one side becomes engorged and restricts air flow through that fossa, causing air to be redirected through the other nostrils and fossa thus allowing the engorged side to time to recover from drying. The flow of air shifts between the right and the left nostrils once or twice each hour.&nbsp;&nbsp; Mucous production is increased by inflammation (e.g. in conditions like asthma and bronchitis) and its composition can be altered by diseases.[8] Cilia: structures move nucleus up the carina and the throat through mucocilliary transport.&nbsp;&nbsp; Mucocilliary transport is impaired by inhalation of toxic gases (e,g cigarete smoke and air pollution), acute inflammation, infection, anaesthesia, etc[8]. Type II pneumocytes: produces surfactant which protects underlining tissue and repairs damaged alveoli epithelium. Alveoli macrophages: engulfs foreign matter and bacteria. Their activity can be hindered by cigeret smoke, air pollution, alveolar hypoxia, radiation, corticosteroid therapy, and ingestion of alcohol. B lymphocytes: produce gamma globulin for the production of antibodies to resist infections. Polymorphonuclear leukocytes engulf and kill blood borne gram negative organisms.[8] Gaseous Exchange[edit | edit source] The pharynx, or throat, receives air through the mouth or nose and immediately passes to the pharynx. It then enters the trachea after passing through the larynx, or voice box. The trachea is a robust tube that is protected from collapsing by cartilage rings. The trachea splits into left and right bronchus within the lungs. These are further divided into bronchioles, which are smaller branches. The bronchioles that are the smallest end in tiny air sacs. These are referred to as alveoli. When a person inhales, they expand, and when they exhale, they deflate. Oxygen is transferred from the lungs to the bloodstream during gas exchange. Carbon dioxide is transported from the bloodstream to the lungs at the same moment. This occurs in the lungs, between the alveoli and a network of microscopic blood arteries known as capillaries, which are found in the alveoli's walls. Red blood cells are seen passing through capillaries. The alveolar walls and capillary walls share a membrane. This allows oxygen and carbon dioxide to readily pass from the respiratory system to the bloodstream. Oxygen molecules bind to red blood cells as they return to the heart. At the same time, when a person exhales, the carbon dioxide molecules in the alveoli are blown out of the body. The body uses gas exchange to replenish oxygen and remove carbon dioxide. It is vital to do both in order to survive.[5] Resources[edit | edit source] [9] </span></span><span data-dcnode-id="793" instrument_node="">

</span><span class="st-ui-type-heading" data-dcnode-id="788"><span data-dcnode-id="789" instrument_node="">Autogenic Drainage - Physiopedia</span></span><span data-dcnode-id="787" instrument_node="">
</span><span class="st-ui-type-detail" data-dcnode-id="785"><span data-dcnode-id="786" instrument_node=""> Introduction Autogenic Drainage (AD), is an airway clearance technique that is characterised by breathing control, where the individual aims to adjust the rate, depth, and location of lung volumes during respiration[1]. AD is based on a series of physiological principles believed to enable the patient to achieve an independent airway clearance regimen that is adapted to their individual pathology and pulmonary function[2]. Autogenic drainage was developed in Belgium in the late 1960s by Chevaillier. During 1980's, it was utilized throughout Europe to treat asthmatic patients who had suffered retention of secretions in the chest and difficulty in clearing the secretions.[3] [4] The overall aim of AD is to reach the highest possible expiratory airflow in different generations of the bronchi simultaneously with an active, but not forced expiration. Secretions are systematically transported from peripheral to more central airways by breathing at lower lung volumes in the expiratory reserve volume (ERV), through progressively higher lung volumes in the inspiratory reserve volume (IRV)[5]. Chevaillier previously described these three phases as 'unstick', 'collect', and 'evacuate'. Nowadays, these phases are not seen as separate, rather that they blend into one another. It uses breathing at different lung volumes to loosen, mobilize, and move secretions in three stages towards the larger central airways. (fig.1) Error creating thumbnail: Unable to save thumbnail to destination It consists of three stages:(fig.2) Stage 1 Unstick secretions - breathe as much air out of your chest as you can then take a small breath in, using your tummy, feeling your breath at the bottom of your chest. You may hear secretions start to crackle. Resist any desire to cough. Loosening peripheral secretions by breathing at low lung volumes (slow, deep air movement) Repeat for at least 3 breaths. Stage 2 Collect secretions - as the crackle of secretions starts to get louder, change to medium-sized breaths in. Feel the breaths more in the middle of your chest. Repeat for at least 3 breaths. Collecting secretions from central airways by breathing at low to middle lung volumes (slow, mid-range air movement) Stage 3 Evacuate secretions - when the crackles are louder still, take long, slow, full breaths into your absolute maximum. Repeat for at least 3 breaths. Expelling secretions from the central airways by breathing at mid to high lung volumes (shallow air movements)[6] Error creating thumbnail: Unable to save thumbnail to destination The velocity or force of the expiratory airflow must be adjusted at each level of inspiration so that the highest possible airflow is reached in that generation of bronchi, without being high enough to cause the airways to collapse during coughing. Autogenic drainage is performed whilst sitting upright and does not utilize Postural Drainage positions. The Rationale behind the Autogenic Drainage Technique The rationale for the technique is the generation of shearing forces induced by airflow. The speed of the expiratory flow may mobilize secretions by shearing them from the bronchial walls and transporting them from the peripheral to the central airways. Procedure Posture (Fig.3) Error creating thumbnail: Unable to save thumbnail to destination Choose a breath-stimulating position like sitting or reclining[7]. Relax, with the neck slightly extended. Clear your nose and throat by blowing your nose and huffing. Breathing in Slowly breathe in through the nose to keep the upper airways open. Use the diaphragm and/or the abdomen if possible. First, take a large breath in, hold it for a moment. Breathe all the way out for as long as you can. Now you are at low lung volume. See picture below. The size of breath and level at which you breathe depends on where the mucus is located. Take a small to normal breath in, and pause. Hold your breath for about 3 seconds. All the upper airways should be kept open. This improves the even filling of all lung parts. The pause allows time for the air to get behind the mucus. Breathing out Breathe out through the mouth. Keep the upper airways open. This is your glottis, throat, and mouth. Breathing out is done in a sighing manner. When you force your breath out the airways can collapse. You will hear a wheeze. At low lung level, breath using your abdominal muscles. Squeeze all the air out until you can breathe out no more. You hear the mucus rattling in the airways when breathing the right way. Put a hand on your upper chest, and feel the mucus vibrating. High frequencies mean that the mucus is in the small airways. Low frequencies mean that the mucus is in the large airways. Using this feedback lets you easily adjust the technique. Repeat the cycle. Inhale slowly to avoid sending the mucus back down. Keep breathing at a low level until the mucus collects and moves upward. Signs of this are: The crackling of the mucus can be heard as you exhale. You feel the mucus moving up. You feel a strong urge to cough. The level of breathing is raised when any of the above occurs. Refer to the picture below. Moving the breathing from lower to higher lung area takes the mucus with it. Finally, the collected mucus reaches the large airways where it can be cleared by a high lung volume huff. Don't cough until the mucus is in the larger airways. Cough only if a huff did not move the mucus to the mouth. You have now finished one cycle. Take a break of one to two minutes. Relax and perform breathing control before you start on the next cycle. The cycles are repeated during the session. A session lasts between twenty to forty-five minutes or until you feel all the mucus has been cleared. Do sessions of AD more often if you still have mucus present at the end of a session. Length and Frequency of AD treatment sessions The length of an AD session is dependent on the disease severity, knowledge of the technique, quantity of secretions etc.[7] The aim is to clear the most secretions possible by the end of the treatment so that previously obstructed areas of lung re-expand. The frequency of AD also depends upon the same factors as previously mentioned. The more secretions, the more times and/or sessions per day. [5] Benefits of AD No equipment is required Patients can perform their airway clearance independently Less effort is be required to expectorate which reduces stress on the pelvic floor Disadvantages of AD Patients generally need to be over 8 years old The technique can be difficult to teach Patients need the cognitive ability to understand the basic physiology behind the technique To benefit from the auditory feedback, patients need to have a moderate or large amount of sputum Combining AD with other techniques AD can also be performed in conjunction with other airway clearance devices and also positive pressure. PEP: Traditionally AD has been combined with PEP via pursed lip breathing to assist the patient in balancing expiratory forces during AD, or flow modulation[2]. If increased levels of PEP are required to modulate flow, an oscillatory PEP device might be used e.g. PEP mask, Acapella, Flutter, or Cornet.[8] Evidence Published studies of autogenic drainage are limited with the majority of trials being in the cystic fibrosis (CF) cohort. The physiological rationale lends support for the use of AD in non-CF bronchiectasis. Most of the studies of AD compare its efficacy with other airway clearance[9][10]. However, all these studies have methodological problems, for example, small sample size or are of short treatment duration.The ACPCF standards of care outlined strong recommendations to consider autogenic drainage when choosing an airway clearance technique. There is some evidence to suggest that autogenic drainage is as effective as other airway clearance techniques. In a long term study of patients with CF comparing AD with postural drainage and percussion, the patients expressed a marked preference for AD (Davidson et al 1992). In a comparison with ACBT, postural drainage and manual techniques, AD was found to be equally effective in improving lung function in patients with COPD with copious secretions (Savci 2000). Greater expectoration was achieved with AD compared to PEP therapy (Lindemann 1990). The long term effects of AD on quality of life and lung function, compared to other airway clearance techniques, was similar[9]. There are no studies evaluating assisted AD (AAD) in the bronchiectasis population group. In the Cystic fibrosis population, studies have found no provocation of GOR has been associated with AAD, bouncing or the combination of both (Van Ginderdeuren 2001, 2003). Resources Paula Agostini and Nicola Knowles, Autogenic drainage: the technique, physiological basis and evidence, Physiotherapy, Volume 93, Issue 2, June 2007, Pages 157-163 Autogenic Drainage&nbsp;by Dr. Vinod Ravaliya, MPT </span></span><span data-dcnode-id="784" instrument_node="">
