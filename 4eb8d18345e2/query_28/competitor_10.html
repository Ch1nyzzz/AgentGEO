-id="2681" instrument_node="">.</span><span class="refLink-block" data-dcnode-id="2666"><span data-dcnode-id="2680" instrument_node="">&nbsp;</span><span class="xlinks-container" data-dcnode-id="2671"><a data-dcnode-id="2678" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.tandfonline.com/servlet/linkout%3Fsuffix%3DCIT0011%26dbid%3D16%26doi%3D10.1080%252F00223980.2018.1548202%26key%3D10.1007%252Fs12160-013-9523-5" target="_blank"><span data-dcnode-id="2679" instrument_node="">[Crossref]</span></a><span data-dcnode-id="2677" instrument_node="">, </span><a data-dcnode-id="2675" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.tandfonline.com/servlet/linkout%3Fsuffix%3DCIT0011%26dbid%3D8%26doi%3D10.1080%252F00223980.2018.1548202%26key%3D23780734" target="_blank"><span data-dcnode-id="2676" instrument_node="">[PubMed]</span></a><span data-dcnode-id="2674" instrument_node="">, </span><a data-dcnode-id="2672" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.tandfonline.com/servlet/linkout%3Fsuffix%3DCIT0011%26dbid%3D128%26doi%3D10.1080%252F00223980.2018.1548202%26key%3D000331646100009" target="_blank"><span data-dcnode-id="2673" instrument_node="">[Web of Science ®]</span></a></span><span class="googleScholar-container" data-dcnode-id="2667"><span data-dcnode-id="2670" instrument_node="">,&nbsp;</span><a class="google-scholar" data-dcnode-id="2668" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//scholar.google.com/scholar_lookup%3Fhl%3Den%26volume%3D47%26publication_year%3D2014%26pages%3D79-91%26issue%3D1%26author%3DE.%2BC.%2BKarademas%26author%3DI%2BIoannis%2BTsaousis%26title%3DThe%2Brelationship%2Bof%2Bpatient%2Band%2Bspouse%2Bpersonality%2Bto%2Bcardiac%2Bpatients%25E2%2580%2599%2Bhealth%3A%2BTwo%2Bobservational%2Bstudies%2Bof%2Bmediation%2Band%2Bmoderation" target="_blank"><span data-dcnode-id="2669" instrument_node="">[Google Scholar]</span></a></span></span></span></span></span><span data-dcnode-id="2662" instrument_node="">) maintained that “Illness-related behavior is heavily influenced by complex processes that refer to recognizing and interpreting symptoms, understanding illness, and planning appropriate actions for coping with the disease” (p. 80). The authors examined the effect of personality and personality characteristics, on mental and physical health and well-being. In that context, Karademas reviewed the Five-Factor Model (FFM), considered now the dominant framework for describing the manner in which we think, feel, and behave, pointing to five main dimensions: extraversion, agreeableness, conscientiousness, neuroticism or emotional stability, and openness to experience. Reviewing the related literature, Karademas pointed out that research indicated that high levels of neuroticism, for instance, was positively correlated with poorer physical functioning, worse illness outcomes, greater alcohol consumption as well as increased cigarette smoking (Goodwin &amp; Stein, </span><span class="ref-lnk lazy-ref" data-dcnode-id="2615"><a data-dcnode-id="2660" data-reflink="_i1" data-rid="CIT0009" href="#"><span data-dcnode-id="2661" instrument_node="">2003</span></a><span class="ref-overlay scrollable-ref rs_skip" data-dcnode-id="2616"><span class="ref-close" data-dcnode-id="2659" tabindex="0"></span><span class="ref-icon" data-dcnode-id="2658"></span><span data-dcnode-id="2617"><span class="hlFld-ContribAuthor" data-dcnode-id="2654"><span data-dcnode-id="2657" instrument_node="">Goodwin, </span><span class="NLM_given-names" data-dcnode-id="2655"><span data-dcnode-id="2656" instrument_node="">R. D.</span></span></span><span data-dcnode-id="2653" instrument_node="">, &amp; </span><span class="hlFld-ContribAuthor" data-dcnode-id="2649"><span data-dcnode-id="2652" instrument_node="">Stein, </span><span class="NLM_given-names" data-dcnode-id="2650"><span data-dcnode-id="2651" instrument_node="">M. B</span></span></span><span data-dcnode-id="2648" instrument_node="">. (</span><span class="NLM_year" data-dcnode-id="2646"><span data-dcnode-id="2647" instrument_node="">2003</span></span><span data-dcnode-id="2645" instrument_node="">). </span><span class="NLM_article-title" data-dcnode-id="2643"><span data-dcnode-id="2644" instrument_node="">Peptic ulcer disease and neuroticism in the United States adult population</span></span><span data-dcnode-id="2642" instrument_node="">. Psychotherapy and Psychosomatics, </span><i data-dcnode-id="2640"><span data-dcnode-id="2641" instrument_node="">72</span></i><span data-dcnode-id="2639" instrument_node="">(1), </span><span class="NLM_fpage" data-dcnode-id="2637"><span data-dcnode-id="2638" instrument_node="">10</span></span><span data-dcnode-id="2636" instrument_node="">–</span><span class="NLM_lpage" data-dcnode-id="2634"><span data-dcnode-id="2635" instrument_node="">15</span></span><span data-dcnode-id="2633" instrument_node="">.</span><span class="refLink-block" data-dcnode-id="2618"><span data-dcnode-id="2632" instrument_node="">&nbsp;</span><span class="xlinks-container" data-dcnode-id="2623"><a data-dcnode-id="2630" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.tandfonline.com/servlet/linkout%3Fsuffix%3DCIT0009%26dbid%3D16%26doi%3D10.1080%252F00223980.2018.1548202%26key%3D10.1159%252F000067184" target="_blank"><span data-dcnode-id="2631" instrument_node="">[Crossref]</span></a><span data-dcnode-id="2629" instrument_node="">, </span><a data-dcnode-id="2627" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.tandfonline.com/servlet/linkout%3Fsuffix%3DCIT0009%26dbid%3D8%26doi%3D10.1080%252F00223980.2018.1548202%26key%3D12466633" target="_blank"><span data-dcnode-id="2628" instrument_node="">[PubMed]</span></a><span data-dcnode-id="2626" instrument_node="">, </span><a data-dcnode-id="2624" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.tan <span data-dcnode-id="2348" instrument_node="">,&nbsp;</span><a class="google-scholar" data-dcnode-id="2346" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//scholar.google.com/scholar_lookup%3Fhl%3Den%26publication_year%3D2006%26author%3DD.%2BJ.%2BWiebe%26author%3DK.%2BT%2BFortenberry%26title%3DMechanisms%2Brelating%2Bpersonality%2Band%2Bhealth" target="_blank"><span data-dcnode-id="2347" instrument_node="">[Google Scholar]</span></a></span></span></span></span></span><span data-dcnode-id="2340" instrument_node="">). Shoda, LeeTiernan, and Mischel (</span><span class="ref-lnk lazy-ref" data-dcnode-id="2291"><a data-dcnode-id="2338" data-reflink="_i1" data-rid="CIT0016" href="#"><span data-dcnode-id="2339" instrument_node="">2002</span></a><span class="ref-overlay scrollable-ref rs_skip" data-dcnode-id="2292"><span class="ref-close" data-dcnode-id="2337" tabindex="0"></span><span class="ref-icon" data-dcnode-id="2336"></span><span data-dcnode-id="2293"><span class="hlFld-ContribAuthor" data-dcnode-id="2332"><span data-dcnode-id="2335" instrument_node="">Shoda, </span><span class="NLM_given-names" data-dcnode-id="2333"><span data-dcnode-id="2334" instrument_node="">Y.</span></span></span><span data-dcnode-id="2331" instrument_node="">, </span><span class="hlFld-ContribAuthor" data-dcnode-id="2327"><span data-dcnode-id="2330" instrument_node="">LeeTiernan, </span><span class="NLM_given-names" data-dcnode-id="2328"><span data-dcnode-id="2329" instrument_node="">S.</span></span></span><span data-dcnode-id="2326" instrument_node="">, &amp; </span><span class="hlFld-ContribAuthor" data-dcnode-id="2322"><span data-dcnode-id="2325" instrument_node="">Mischel, </span><span class="NLM_given-names" data-dcnode-id="2323"><span data-dcnode-id="2324" instrument_node="">W</span></span></span><span data-dcnode-id="2321" instrument_node="">. (</span><span class="NLM_year" data-dcnode-id="2319"><span data-dcnode-id="2320" instrument_node="">2002</span></span><span data-dcnode-id="2318" instrument_node="">). </span><span class="NLM_article-title" data-dcnode-id="2316"><span data-dcnode-id="2317" instrument_node="">Personality as a dynamic system: Emergence of stability and distinctiveness from intra- and interpersonal interactions</span></span><span data-dcnode-id="2315" instrument_node="">. Personality and Social Psychology Review, </span><i data-dcnode-id="2313"><span data-dcnode-id="2314" instrument_node="">6</span></i><span data-dcnode-id="2312" instrument_node="">(4), </span><span class="NLM_fpage" data-dcnode-id="2310"><span data-dcnode-id="2311" instrument_node="">316</span></span><span data-dcnode-id="2309" instrument_node="">–</span><span class="NLM_lpage" data-dcnode-id="2307"><span data-dcnode-id="2308" instrument_node="">325</span></span><span data-dcnode-id="2306" instrument_node="">.</span><span class="refLink-block" data-dcnode-id="2294"><span data-dcnode-id="2305" instrument_node="">&nbsp;</span><span class="xlinks-container" data-dcnode-id="2299"><a data-dcnode-id="2303" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.tandfonline.com/servlet/linkout%3Fsuffix%3DCIT0016%26dbid%3D16%26doi%3D10.1080%252F00223980.2018.1548202%26key%3D10.1207%252FS15327957PSPR0604_06" target="_blank"><span data-dcnode-id="2304" instrument_node="">[Crossref]</span></a><span data-dcnode-id="2302" instrument_node="">, </span><a data-dcnode-id="2300" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.tandfonline.com/servlet/linkout%3Fsuffix%3DCIT0016%26dbid%3D128%26doi%3D10.1080%252F00223980.2018.1548202%26key%3D000179203800006" target="_blank"><span data-dcnode-id="2301" instrument_node="">[Web of Science ®]</span></a></span><span class="googleScholar-container" data-dcnode-id="2295"><span data-dcnode-id="2298" instrument_node="">,&nbsp;</span><a class="google-scholar" data-dcnode-id="2296" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//scholar.google.com/scholar_lookup%3Fhl%3Den%26volume%3D6%26publication_year%3D2002%26pages%3D316-325%26issue%3D4%26author%3DY.%2BShoda%26author%3DS.%2BLeeTiernan%26author%3DW%2BMischel%26title%3DPersonality%2Bas%2Ba%2Bdynamic%2Bsystem%253A%2BEmergence%2Bof%2Bstability%2Band%2Bdistinctiveness%2Bfrom%2Bintra-%2Band%2Binterpersonal%2Binteractions" target="_blank"><span data-dcnode-id="2297" instrument_node="">[Google Scholar]</span></a></span></span></span></span></span><span data-dcnode-id="2290" instrument_node="">) observed that the thoughts, emotions and behaviors that people experience are closely related to the interpersonal system of which they are a part and not just as a result of their personality alone. Shoda et&nbsp;al. (</span><span class="ref-lnk lazy-ref" data-dcnode-id="2241"><a data-dcnode-id="2288" data-reflink="_i1" data-rid="CIT0016" href="#"><span data-dcnode-id="2289" instrument_node="">2002</span></a><span class="ref-overlay scrollable-ref rs_skip" data-dcnode-id="2242"><span class="ref-close" data-dcnode-id="2287" tabindex="0"></span><span class="ref-icon" data-dcnode-id="2286"></span><span data-dcnode-id="2243"><span class="hlFld-ContribAuthor" data-dcnode-id="2282"><span data-dcnode-id="2285" instrument_node="">Shoda, </span><span class="NLM_given-names" data-dcnode-id="2283"><span data-dcnode-id="2284" instrument_node="">Y.</span></span></span><span data-dcnode-id="2281" instrument_node="">, </span><span class="hlFld-ContribAuthor" data-dcnode-id="2277"><span data-dcnode-id="2280" instrument_node="">LeeTiernan, </span><span class="NLM_given-names" data-dcnode-id="2278"><span data-dcnode-id="2279" instrument_node="">S.</span></span></span><span data-dcnode-id="2276" instrument_node="">, &amp; </span><span class="hlFld-ContribAuthor" data-dcnode-id="2272"><span data-dcnode-id="2275" instrument_node="">Mischel, </span><span class="NLM_given-names" data-dcnode-id="2273"><span data-dcnode-id="2274" instrument_node="">W</span></span></span><span data-dcnode-id="2271" instrument_node="">. (</span><span class="NLM_year" data-dcnode-id="2269"><span data-dcnode-id="2270" instrument_node="">2002</span></span><span data-dcnode-id="2268" instrument_node="">). </span><span class="NLM_article-title" data-dcnode-id="2266"><span data-dcnode-id="2267" instrument_node="">Personality as a dynamic system: Emergence of stability and distinctiveness from intra- and interpersonal interactions</span></span><span data-dcnode-id="2265" instrument_node="">. Personality and Social Psychology Review, </span><i data-dcnode-id="2263"><span data-dcnode-id="2264" instrument_node="">6</span></i><span data-dcnode-id="2262" instrument_node="">(4), </span><span class="NLM_fpage" data-dcnode-id="2260"><span data-dcnode-id="2261" instrument_node="">316</span></span><span data-dcnode-id="2259" instrument_node="">–</span><span class="NLM_lpage" data-dcnode-id="2257"><span data-dcnode-id="2258" instrument_node="">325</span></span><span data-dcnode-id="2256" instrument_node="">.</span><span class="refLink-block" data-dcnode-id="2244"><span data-dcnode-id="2255" instrument_node="">&nbsp;</span><span class="xlinks-container" data-dcnode-id="2249"><a data-dcnode-id="2253" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.tandfonline.com/servlet/linkout%3Fsuffix%3DCIT0016%26dbid%3D16%26doi%3D10.1080%252F00223980.2018.1548202%26key%3D10.1207%252FS15327957PSPR0604_06" target="_blank"><span data-dcnode-id="2254" instrument_node="">[Crossref]</span></a><span data-dcnode-id="2252" instrument_node="">, </span><a data-dcnode-id="2250" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.tandfonline.com/servlet/linkout%3Fsuffix%3DCIT0016%26dbid%3D128%26doi%3D10.1080%252F00223980.2018.1548202%26key%3D000179203800006" target="_blank"><span data-dcnode-id="2251" instrument_node="">[Web of Science ®]</span></a></span><span class="googleScholar-container" data-dcnode-id="2245"><span data-dcnode-id="2248" instrument_node="">,&nbsp;</span><a class="google-scholar" data-dcnode-id="2246" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//scholar.google.com/scholar_lookup%3Fhl%3Den%26volume%3D6%26publication_year%3D2002%26pages%3D316-325%26issue%3D4%26author%3DY.%2BShoda%26author%3DS.%2BLeeTiernan%26author%3DW%2BMischel%26title%3DPersonality%2Bas%2Ba%2Bdynamic%2Bsystem%253A%2BEmergence%2Bof%2Bstability%2Band%2Bdistinctiveness%2Bfrom%2Bintra-%2Band%2Binterpersonal%2Binteractions" target="_blank"><span data-dcnode-id="2247" instrument_node="">[Google Scholar]</span></a></span></span></span></span></span><span data-dcnode-id="2240" instrument_node="">) observed that there are studies which have shown that partner personality characteristics, such as agreeableness, conscientiousness, and emotional stability, are associated with the quality of their relationship and that in turn is considered to be an important determinant of health. Similarly, people afflicted with chronic illness seem to adapt to their illness and symptoms not in isolation but while they interact and are supported by their partner (Dyrenforth, Kashy, Donnellan, &amp; Lucas, </span><span class="ref-lnk lazy-ref" data-dcnode-id="2181"><a data-dcnode-id="2238" data-reflink="_i1" data-rid="CIT0008" href="#"><span data-dcnode-id="2239" instrument_node="">2010</span></a><span class="ref-overlay scrollable-ref rs_skip" data-dcnode-id="2182"><span class="ref-close" data-dcnode-id="2237" tabindex="0"></span><span class="ref-icon" data-dcnode-id="2236"></span><span data-dcnode-id="2183"><span class="hlFld-ContribAuthor" data-dcnode-id="2232"><span data-dcnode-id="2235" instrument_node="">Dyrenforth, </span><span class="NLM_given-names" data-dcnode-id="2233"><span data-dcnode-id="2234" instrument_node="">P. S.</span></span></span><span data-dcnode-id="2231" instrument_node="">, </span><span class="hlFld-ContribAuthor" data-dcnode-id="2227"><span data-dcnode-id="2230" instrument_node="">Kashy, </span><span class="NLM_given-names" data-dcnode-id="2228"><span data-dcnode-id="2229" instrument_node="">D. A.</span></span></span><span data-dcnode-id="2226" instrument_node="">, </span><span class="hlFld-ContribAuthor" data-dcnode-id="2222"><span data-dcnode-id="2225" instrument_node="">Donnellan, </span><span class="NLM_given-names" data-dcnode-id="2223"><span data-dcnode-id="2224" instrument_node="">M. B.</span></span></span><span data-dcnode-id="2221" instrument_node="">, &amp; </span><span class="hlFld-ContribAuthor" data-dcnode-id="2217"><span data-dcnode-id="2220" instrument_node="">Lucas, </span><span class="NLM_given-names" data-dcnode-id="2218"><span data-dcnode-id="2219" instrument_node="">R. E</span></span></span><span data-dcnode-id="2216" instrument_node="">. (</span><span class="NLM_year" data-dcnode-id="2214"><span data-dcnode-id="2215" instrument_node="">2010</span></span><span data-dcnode-id="2213" instrument_node="">). </span><span class="NLM_article-title" data-dcnode-id="2211"><span data-dcnode-id="2212" instrument_node="">Predicting relationship and life satisfaction from personality in nationally representative samples from three countries: The relative importance of actor, partner, and similarity effects</span></span><span data-dcnode-id="2210" instrument_node="">. Journal of Personality and Social Psychology, </span><i data-dcnode-id="2208"><span data-dcnode-id="2209" instrument_node="">99</span></i><span data-dcnode-id="2207" instrument_node="">(4), </span><span class="NLM_fpage" data-dcnode-id="2205"><span data-dcnode-id="2206" instrument_node="">690</span></span><span data-dcnode-id="2204" instrument_node="">–</span><span class="NLM_lpage" data-dcnode-id="2202"><span data-dcnode-id="2203" instrument_node="">702</span></span><span data-dcnode-id="2201" instrument_node="">. doi:</span><span class="NLM_pub-id" data-dcnode-id="2199"><span data-dcnode-id="2200" instrument_node="">10.1037/a0020385</span></span><span class="refLink-block" data-dcnode-id="2184"><span data-dcnode-id="2198" instrument_node="">&nbsp;</span><span class="xlinks-container" data-dcnode-id="2189"><a data-dcnode-id="2196" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.tandfonline.com/servlet/linkout%3Fsuffix%3DCIT0008%26dbid%3D16%26doi%3D10.1080%252F00223980.2018.1548202%26key%3D10.1037%252Fa0020385" target="_blank"><span data-dcnode-id="2197" instrument_node="">[Crossref]</span></a><span data-dcnode-id="2195" instrument_node="">, </span><a data-dcnode-id="2193" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.tandfonline.com/servlet/linkout%3Fsuffix%3DCIT0008%26dbid%3D8%26doi%3D10.1080%252F00223980.2018.1548202%26key%3D20718544" target="_blank"><span data-dcnode-id="2194" instrument_node="">[PubMed]</span></a><span data-dcnode-id="2192" instrument_node="">, </span><a data-dcnode-id="2190" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.tandfonline.com/servlet/linkout%3Fsuffix%3DCIT0008%26dbid%3D128%26doi%3D10.1080%252F00223980.2018.1548202%26key%3D000282848000009" target="_blank"><span data-dcnode-id="2191" instrument_node="">[Web of Science ®]</span></a></span><span class="googleScholar-container" data-dcnode-id="2185"><span data-dcnode-id="2188" instrument_node="">,&nbsp;</span><a class="google-scholar" data-dcnode-id="2186" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//scholar.google.com/scholar_lookup%3Fhl%3Den%26volume%3D99%26publication_year%3D2010%26pages%3D690-702%26issue%3D4%26author%3DP.%2BS.%2BDyrenforth%26author%3DD.%2BA.%2BKashy%26author%3DM.%2BB.%2BDonnellan%26author%3DR.%2BE%2BLucas%26title%3DPredicting%2Brelationship%2Band%2Blife%2Bsatisfaction%2Bfrom%2Bpersonality%2Bin%2Bnationally%2Brepresentative%2Bsamples%2Bfrom%2Bthree%2Bcountries%253A%2BThe%2Brelative%2Bimportance%2Bof%2Bactor%252C%2Bpartner%252C%2Band%2Bsimilarity%2Beffects%26doi%3D10.1037%252Fa0020385" target="_blank"><span data-dcnode-id="2187" instrument_node="">[Google Scholar]</span></a></span></span></span></span></span><span data-dcnode-id="2180" instrument_node="">).</span></p><p data-dcnode-id="2177"><span data-dcnode-id="2178" instrument_node="">As is clear from the above brief summary of some of the recent research studies, there is still quite a lot unknown and unclear indications as to the interplay of psychological and physical factors in health and illness. The present volume aimed to add to the existing literature the observations, reviews, studies, and explorations of the major “players” in this wide field. Below is a brief summary of each of the articles included in this volume.</span></p><p data-dcnode-id="2173"><i data-dcnode-id="2175"><span data-dcnode-id="2176" instrument_node="">Karatekin</span></i><span data-dcnode-id="2174" instrument_node=""> examined the effects of adverse childhood experiences (ACE), such as maltreatment, exposure to violence, and family psychopathology, are stressful and potentially traumatic events that take place during childhood. They found that students with greater exposure to early adversity were more likely than others to seek psychological/psychiatric, formal, and informal types of help. Additionally, the most common reasons for seeking help were anxiety and stress in the low-ACEs group and depression in the high-ACEs group. Unfortunately, their research also demonstrated that although students with more ACEs seek more help than students with fewer ACEs, they are less likely to find these helpful and more likely to quit prematurely.</span></p><p data-dcnode-id="2169"><i data-dcnode-id="2171"><span data-dcnode-id="2172" instrument_node="">Svirsky, Taubman – Ben-Ari, Ben Shlomo, Azuri and Horowitz</span></i><span data-dcnode-id="2170" instrument_node=""> examined this issue in an even earlier time of life, during assisted reproduction, for women who required it. The authors were interested in the effects of the internal resources of meaning in life, attachment style as well as self-disclosure to a woman's level of perceived stress upon commencement of Assisted Reproductive Technology (ART). Results indicated that older age, greater self-disclosure to the mother, higher perception of meaning in life, and lower anxiety attachment were related to lower levels of perceived stress. As the authors remarked, they highlighted, in their study the importance of a woman’s personal and interpersonal resources for reducing the experience of stress in the early stages of ART.</span></p><p data-dcnode-id="2165"><i data-dcnode-id="2167"><span data-dcnode-id="2168" instrument_node="">Lee, Park, Bae and Lim</span></i><span data-dcnode-id="2166" instrument_node=""> examined Korean students and what moderates the effects of prevention-focus [one of Higgins’s self-regulatory strategies which encompasses the motivation to obtain security, avoid undesired end states, and satisfy one’s ought self] acts as a moderator of the journey from insecure attachment (attachment avoidance and attachment anxiety) to depression. They found a significant moderating effect for prevention-focus on the path from attachment avoidance to depression, but not on the path from attachment anxiety to depression. The authors, consequently, recommended that different interventions are needed for different combinations of persons’ insecure attachment dimensions and levels of prevention focus.</span></p><p data-dcnode-id="2160"><span data-dcnode-id="2164" instrument_node="">The last four articles address quality of life, first focusing on the couple (partner violence), and then on improving the individual’s satisfaction and functioning in life. </span><i data-dcnode-id="2162"><span data-dcnode-id="2163" instrument_node="">Lutwak</span></i><span data-dcnode-id="2161" instrument_node=""> focuses on the effects of intimate partner violence, which may include PTSD, a life-altering disorder, which may also result in severely disturbed behavior by the affected victims. And as the authors asserted, survivors may require support from mental health and social service experts and even medical and pharmaceutical agents in order for them to be able to improve the quality of life, reduce depression, decrease stress, ameliorate physical symptoms, and prevent suicidal ideology. Additionally, noted the authors, there may be need for economic and employment assistance as well as placement in safe housing.</span></p><p data-dcnode-id="2156"><i data-dcnode-id="2158"><span data-dcnode-id="2159" instrument_node="">Stepanikova et&nbsp;al.</span></i><span data-dcnode-id="2157" instrument_node=""> examined perinatal maternal stress and its effects on childhood infectious diseases. The diseases that they focused on were children's diseases, which include eye infection, ear infection, bronchitis/lung infection, laryngitis, strep throat, cold sores, and flu/flu-like infection. They found that perinatal stress is linked to susceptibility to infectious diseases in school-age children. They reviewed several intervention strategies to address stress in pregnant and postpartum women may benefit long-term children's health.</span></p><p data-dcnode-id="2151"><span data-dcnode-id="2155" instrument_node="">The article by </span><i data-dcnode-id="2153"><span data-dcnode-id="2154" instrument_node="">Chang et&nbsp;al.</span></i><span data-dcnode-id="2152" instrument_node=""> examines the role of basic psychological needs as a mediator of the association between future orientation and depressive symptoms in a sample of multiethnoracial adults. Results indicated that the association between future orientation and depressive symptoms was accounted for by dimensions of basic psychological needs. Specifically, future orientation was negatively related to depressive symptoms through positive associations involving autonomy and competence, but not relatedness. These results suggest possible mechanisms by which believing in a changeable future might foster stronger satisfaction of basic psychological needs, especially autonomy and competence, that might help multiethnoracials garner greater protection when encountering stressful situations in their lives.</span></p><p data-dcnode-id="2146"><span data-dcnode-id="2150" instrument_node="">The article by </span><i data-dcnode-id="2148"><span data-dcnode-id="2149" instrument_node="">Chan, Liu, Liang, Deng, Wu and Yan</span></i><span data-dcnode-id="2147" instrument_node=""> closes this special issue by addressing the considerable stress that we experience on a daily basis. Consequently, developing effective approaches to cope with mood problems is of importance in our day and age. A systematic review of the related literature indicated that while the jury is still out as far as the effect of aerobic exercises, in anaerobic training, moderate exercise intensity appears to be associated with greater mood improvements. It appears that psychological as well as neurophysiological accounts can explain the superiority of moderate intensity exercise. Moderate intensity exercise provides a sense of mastery, and in terms of neurophysiology, both stress and reward systems are affected by exercise.</span></p><p data-dcnode-id="2144"><span data-dcnode-id="2145" instrument_node="">It is hoped that the research and reviews included in this volume will not only enrich readers’ understanding of the field of psychology of health and illness but may be a catalyst for further research and development.</span></p></div></div><div class="pb-dropzone no-border-top" data-dcnode-id="2132" data-pb-dropzone="contentNavigationDropZoneFull"><div class="widget gql-content-navigation none widget-none" data-dcnode-id="2133" id="c8b0dea6-9842-46af-b708-142fe9107344"><span data-dcnode-id="2141" instrument_node="">
