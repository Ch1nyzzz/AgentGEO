</span><meta content="Secondary polycythemia is associated with cigarette smoking and chronic obstructive pulmonary disease (COPD). However, the prevalence of polycythemia in COPD and the contributing risk factors for polycythemia in COPD have not been extensively studied. We analyzed the presence of secondary polycythemia in current and former smokers with moderate to very severe COPD at the five-year follow-up visit in the observational COPDGene study. We used logistic regression to evaluate the association of polycythemia with age, sex, race, altitude, current smoking status, spirometry, diffusing capacity for carbon monoxide (DLCO), quantitative chest CT measurements (including emphysema, airway wall thickness, and pulmonary artery to aorta diameter ratio), resting hypoxemia, exercise-induced hypoxemia, and long-term oxygen therapy. In a total of 1928 COPDGene participants with moderate to very severe COPD, secondary polycythemia was found in 97 (9.2%) male and 31 (3.5%) female participants. In a multivariable logistic model, severe resting hypoxemia (OR 3.50, 95% CI 1.41–8.66), impaired DLCO (OR 1.28 for each 10-percent decrease in DLCO % predicted, CI 1.09–1.49), male sex (OR 3.60, CI 2.20–5.90), non-Hispanic white race (OR 3.33, CI 1.71–6.50), current smoking (OR 2.55, CI 1.49–4.38), and enrollment in the Denver clinical center (OR 4.42, CI 2.38–8.21) were associated with higher risk for polycythemia. In addition, continuous (OR 0.13, CI 0.05–0.35) and nocturnal (OR 0.46, CI 0.21–0.97) supplemental oxygen were associated with lower risk for polycythemia. Results were similar after excluding participants with anemia and participants enrolled at the Denver clinical center. In a large cohort of individuals with moderate to very severe COPD, male sex, current smoking, enrollment at the Denver clinical center, impaired DLCO, and severe hypoxemia were associated with increased risk for secondary polycythemia. Continuous or nocturnal supplemental oxygen use were associated with decreased risk for polycythemia." data-dcnode-id="4695" name="citation_abstract"><span data-dcnode-id="4694" instrument_node="">

</span><meta content="Secondary polycythemia in chronic obstructive pulmonary disease: prevalence and risk factors - BMC Pulmonary Medicine" data-dcnode-id="4332" property="og:title"><span data-dcnode-id="4331" instrument_node="">
</span><meta content="Background Secondary polycythemia is associated with cigarette smoking and chronic obstructive pulmonary disease (COPD). However, the prevalence of polycythemia in COPD and the contributing risk factors for polycythemia in COPD have not been extensively studied. Methods We analyzed the presence of secondary polycythemia in current and former smokers with moderate to very severe COPD at the five-year follow-up visit in the observational COPDGene study. We used logistic regression to evaluate the association of polycythemia with age, sex, race, altitude, current smoking status, spirometry, diffusing capacity for carbon monoxide (DLCO), quantitative chest CT measurements (including emphysema, airway wall thickness, and pulmonary artery to aorta diameter ratio), resting hypoxemia, exercise-induced hypoxemia, and long-term oxygen therapy. Results In a total of 1928 COPDGene participants with moderate to very severe COPD, secondary polycythemia was found in 97 (9.2%) male and 31 (3.5%) female participants. In a multivariable logistic model, severe resting hypoxemia (OR 3.50, 95% CI 1.41–8.66), impaired DLCO (OR 1.28 for each 10-percent decrease in DLCO % predicted, CI 1.09–1.49), male sex (OR 3.60, CI 2.20–5.90), non-Hispanic white race (OR 3.33, CI 1.71–6.50), current smoking (OR 2.55, CI 1.49–4.38), and enrollment in the Denver clinical center (OR 4.42, CI 2.38–8.21) were associated with higher risk for polycythemia. In addition, continuous (OR 0.13, CI 0.05–0.35) and nocturnal (OR 0.46, CI 0.21–0.97) supplemental oxygen were associated with lower risk for polycythemia. Results were similar after excluding participants with anemia and participants enrolled at the Denver clinical center. Conclusions In a large cohort of individuals with moderate to very severe COPD, male sex, current smoking, enrollment at the Denver clinical center, impaired DLCO, and severe hypoxemia were associated with increased risk for secondary polycythemia. Continuous or nocturnal supplemental oxygen use were associated with decreased risk for polycythemia." data-dcnode-id="4330" property="og:description"><span data-dcnode-id="4329" instrument_node="">

</span><section aria-labelledby="Abs1" data-dcnode-id="3630" data-title="Abstract" lang="en"><div class="c-article-section" data-dcnode-id="3631" id="Abs1-section"><h2 class="c-article-section__title js-section-title js-c-reading-companion-sections-item" data-dcnode-id="3649" id="Abs1"><span data-dcnode-id="3650" instrument_node="">Abstract</span></h2><div class="c-article-section__content" data-dcnode-id="3632" id="Abs1-content"><h3 class="c-article__sub-heading" data-dcnode-id="3647" data-test="abstract-sub-heading"><span data-dcnode-id="3648" instrument_node="">Background</span></h3><p data-dcnode-id="3645"><span data-dcnode-id="3646" instrument_node="">Secondary polycythemia is associated with cigarette smoking and chronic obstructive pulmonary disease (COPD). However, the prevalence of polycythemia in COPD and the contributing risk factors for polycythemia in COPD have not been extensively studied.</span></p><h3 class="c-article__sub-heading" data-dcnode-id="3643" data-test="abstract-sub-heading"><span data-dcnode-id="3644" instrument_node="">Methods</span></h3><p data-dcnode-id="3641"><span data-dcnode-id="3642" instrument_node="">We analyzed the presence of secondary polycythemia in current and former smokers with moderate to very severe COPD at the five-year follow-up visit in the observational COPDGene study. We used logistic regression to evaluate the association of polycythemia with age, sex, race, altitude, current smoking status, spirometry, diffusing capacity for carbon monoxide (DLCO), quantitative chest CT measurements (including emphysema, airway wall thickness, and pulmonary artery to aorta diameter ratio), resting hypoxemia, exercise-induced hypoxemia, and long-term oxygen therapy.</span></p><h3 class="c-article__sub-heading" data-dcnode-id="3639" data-test="abstract-sub-heading"><span data-dcnode-id="3640" instrument_node="">Results</span></h3><p data-dcnode-id="3637"><span data-dcnode-id="3638" instrument_node="">In a total of 1928 COPDGene participants with moderate to very severe COPD, secondary polycythemia was found in 97 (9.2%) male and 31 (3.5%) female participants. In a multivariable logistic model, severe resting hypoxemia (OR 3.50, 95% CI 1.41–8.66), impaired DLCO (OR 1.28 for each 10-percent decrease in DLCO % predicted, CI 1.09–1.49), male sex (OR 3.60, CI 2.20–5.90), non-Hispanic white race (OR 3.33, CI 1.71–6.50), current smoking (OR 2.55, CI 1.49–4.38), and enrollment in the Denver clinical center (OR 4.42, CI 2.38–8.21) were associated with higher risk for polycythemia. In addition, continuous (OR 0.13, CI 0.05–0.35) and nocturnal (OR 0.46, CI 0.21–0.97) supplemental oxygen were associated with lower risk for polycythemia. Results were similar after excluding participants with anemia and participants enrolled at the Denver clinical center.</span></p><h3 class="c-article__sub-heading" data-dcnode-id="3635" data-test="abstract-sub-heading"><span data-dcnode-id="3636" instrument_node="">Conclusions</span></h3><p data-dcnode-id="3633"><span data-dcnode-id="3634" instrument_node="">In a large cohort of individuals with moderate to very severe COPD, male sex, current smoking, enrollment at the Denver clinical center, impaired DLCO, and severe hypoxemia were associated with increased risk for secondary polycythemia. Continuous or nocturnal supplemental oxygen use were associated with decreased risk for polycythemia.</span></p></div></div></section><span data-dcnode-id="3629" instrument_node="">

</span><section data-dcnode-id="3538" data-title="Background"><div class="c-article-section" data-dcnode-id="3539" id="Sec1-section"><h2 class="c-article-section__title js-section-title js-c-reading-companion-sections-item" data-dcnode-id="3616" id="Sec1"><span data-dcnode-id="3617" instrument_node="">Background</span></h2><div class="c-article-section__content" data-dcnode-id="3540" id="Sec1-content"><p data-dcnode-id="3581"><span data-dcnode-id="3615" instrument_node="">Cigarette smoking and chronic obstructive pulmonary disease (COPD) are associated with secondary polycythemia [</span><a aria-label="Reference 1" data-dcnode-id="3613" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR1" id="ref-link-section-d26702105e912" title="Smith JR, Landaw SA. Smokers’ polycythemia. N Engl J Med. 1978;298(1):6–10."><span data-dcnode-id="3614" instrument_node="">1</span></a><span data-dcnode-id="3612" instrument_node="">, </span><a aria-label="Reference 2" data-dcnode-id="3610" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR2" id="ref-link-section-d26702105e915" title="Calverley PM, Leggett RJ, McElderry L, Flenley DC. Cigarette smoking and secondary polycythemia in hypoxic cor pulmonale. Am Rev Respir Dis. 1982;125(5):507–10."><span data-dcnode-id="3611" instrument_node="">2</span></a><span data-dcnode-id="3609" instrument_node="">], which may contribute to pulmonary hypertension (PH) [</span><a aria-label="Reference 3" data-dcnode-id="3607" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR3" id="ref-link-section-d26702105e918" title="Samareh Fekri M, Torabi M, Azizi Shoul S, Mirzaee M. Prevalence and predictors associated with severe pulmonary hypertension in COPD. Am J Emerg Med. 2018;36(2):277–80."><span data-dcnode-id="3608" instrument_node="">3</span></a><span data-dcnode-id="3606" instrument_node="">, </span><a aria-label="Reference 4" data-dcnode-id="3604" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR4" id="ref-link-section-d26702105e921" title="Nakamura A, Kasamatsu N, Hashizume I, Shirai T, Hanzawa S, Momiki S, et al. Effects of hemoglobin on pulmonary arterial pressure and pulmonary vascular resistance in patients with chronic emphysema. Respiration. 2000;67(5):502–6."><span data-dcnode-id="3605" instrument_node="">4</span></a><span data-dcnode-id="3603" instrument_node="">], venous thromboembolism [</span><a data-dcnode-id="3601" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR5" id="ref-link-section-d26702105e924" title="Ryan SF. Pulmonary embolism and thrombosis in chronic obstructive emphysema. Am J Pathol. 1963;43:767–73."><span data-dcnode-id="3602" instrument_node="">5</span></a><span data-dcnode-id="3600" instrument_node="">,</span><a data-dcnode-id="3598" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR6" id="ref-link-section-d26702105e924_1" title="Nadeem O, Gui J, Ornstein DL. Prevalence of venous thromboembolism in patients with secondary polycythemia. Clin Appl Thromb Hemost. 2013;19(4):363–6."><span data-dcnode-id="3599" instrument_node="">6</span></a><span data-dcnode-id="3597" instrument_node="">,</span><a aria-label="Reference 7" data-dcnode-id="3595" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR7" id="ref-link-section-d26702105e928" title="Schwarcz TH, Hogan LA, Endean ED, Roitman IT, Kazmers A, Hyde GL. Thromboembolic complications of polycythemia: polycythemia vera versus smokers’ polycythemia. J Vasc Surg. 1993;17(3):518–22 (discussion 22–3)."><span data-dcnode-id="3596" instrument_node="">7</span></a><span data-dcnode-id="3594" instrument_node="">], and mortality in COPD [</span><a data-dcnode-id="3592" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR8" id="ref-link-section-d26702105e931" title="Xu L, Chen Y, Xie Z, He Q, Chen S, Wang W, et al. High hemoglobin is associated with increased in-hospital death in patients with chronic obstructive pulmonary disease and chronic kidney disease: a retrospective multicenter population-based study. BMC Pulm Med. 2019;19(1):174."><span data-dcnode-id="3593" instrument_node="">8</span></a><span data-dcnode-id="3591" instrument_node="">,</span><a data-dcnode-id="3589" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR9" id="ref-link-section-d26702105e931_1" title="Cote C, Zilberberg MD, Mody SH, Dordelly LJ, Celli B. Haemoglobin level and its clinical impact in a cohort of patients with COPD. Eur Respir J. 2007;29(5):923–9."><span data-dcnode-id="3590" instrument_node="">9</span></a><span data-dcnode-id="3588" instrument_node="">,</span><a data-dcnode-id="3586" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR10" id="ref-link-section-d26702105e931_2" title="Guo L, Chughtai AR, Jiang H, Gao L, Yang Y, Yang Y, et al. Relationship between polycythemia and in-hospital mortality in chronic obstructive pulmonary disease patients with low-risk pulmonary embolism. J Thorac Dis. 2016;8(11):3119–31."><span data-dcnode-id="3587" instrument_node="">10</span></a><span data-dcnode-id="3585" instrument_node="">,</span><a aria-label="Reference 11" data-dcnode-id="3583" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR11" id="ref-link-section-d26702105e934" title="Chambellan A, Chailleux E, Similowski T, Group AO. Prognostic value of the hematocrit in patients with severe COPD receiving long-term oxygen therapy. Chest. 2005;128(3):1201–8."><span data-dcnode-id="3584" instrument_node="">11</span></a><span data-dcnode-id="3582" instrument_node="">].</span></p><p data-dcnode-id="3561"><span data-dcnode-id="3580" instrument_node="">Polycythemia prevalence in COPD outpatients ranges from 6 to 10.2% when defined by a hemoglobin ≥ 17&nbsp;g/dL in males and ≥ 15&nbsp;g/dL in females [</span><a aria-label="Reference 9" data-dcnode-id="3578" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR9" id="ref-link-section-d26702105e940" title="Cote C, Zilberberg MD, Mody SH, Dordelly LJ, Celli B. Haemoglobin level and its clinical impact in a cohort of patients with COPD. Eur Respir J. 2007;29(5):923–9."><span data-dcnode-id="3579" instrument_node="">9</span></a><span data-dcnode-id="3577" instrument_node="">, </span><a aria-label="Reference 12" data-dcnode-id="3575" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR12" id="ref-link-section-d26702105e943" title="Ferrari M, Manea L, Anton K, Bruzzone P, Meneghello M, Zamboni F, et al. Anemia and hemoglobin serum levels are associated with exercise capacity and quality of life in chronic obstructive pulmonary disease. BMC Pulm Med. 2015;15:58."><span data-dcnode-id="3576" instrument_node="">12</span></a><span data-dcnode-id="3574" instrument_node="">, </span><a aria-label="Reference 13" data-dcnode-id="3572" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR13" id="ref-link-section-d26702105e946" title="Boutou AK, Karrar S, Hopkinson NS, Polkey MI. Anemia and survival in chronic obstructive pulmonary disease: a dichotomous rather than a continuous predictor. Respiration. 2013;85(2):126–31."><span data-dcnode-id="3573" instrument_node="">13</span></a><span data-dcnode-id="3571" instrument_node="">]. The prevalence of a hematocrit ≥ 55% was 8.4% in a sample of patients with severe COPD receiving long-term oxygen therapy (LTOT) [</span><a aria-label="Reference 11" data-dcnode-id="3569" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR11" id="ref-link-section-d26702105e949" title="Chambellan A, Chailleux E, Similowski T, Group AO. Prognostic value of the hematocrit in patients with severe COPD receiving long-term oxygen therapy. Chest. 2005;128(3):1201–8."><span data-dcnode-id="3570" instrument_node="">11</span></a><span data-dcnode-id="3568" instrument_node="">]. Polycythemia in COPD has been noted to be less frequent following the widespread use of LTOT [</span><a aria-label="Reference 14" data-dcnode-id="3566" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR14" id="ref-link-section-d26702105e952" title="Kent BD, Mitchell PD, McNicholas WT. Hypoxemia in patients with COPD: cause, effects, and disease progression. Int J Chron Obstruct Pulmon Dis. 2011;6:199–208."><span data-dcnode-id="3567" instrument_node="">14</span></a><span data-dcnode-id="3565" instrument_node="">], yet a secular trend in polycythemia prevalence has not been well-established due to a lack of comparable samples of COPD patients across the full spectrum of disease severity. Additionally, in 2016 the World Health Organization (WHO) redefined polycythemia vera (a myeloproliferative neoplasm) as a hemoglobin &gt; 16.5&nbsp;g/dL and/or a hematocrit &gt; 49% in males and a hemoglobin &gt; 16.0&nbsp;g/dL and/or a hematocrit &gt; 48% in females [</span><a aria-label="Reference 15" data-dcnode-id="3563" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR15" id="ref-link-section-d26702105e956" title="Barbui T, Thiele J, Gisslinger H, Finazzi G, Vannucchi AM, Tefferi A. The 2016 revision of WHO classification of myeloproliferative neoplasms: clinical and molecular advances. Blood Rev. 2016;30(6):453–9."><span data-dcnode-id="3564" instrument_node="">15</span></a><span data-dcnode-id="3562" instrument_node="">]. The diagnosis of secondary polycythemia is extrapolated from the WHO definition for polycythemia vera. The prevalence of secondary polycythemia is unclear in a contemporary COPD population due to the recent change in the definition of polycythemia and an increased use of LTOT in COPD patients.</span></p><p data-dcnode-id="3541"><span data-dcnode-id="3560" instrument_node="">Increased carboxyhemoglobin (COHb) in active smokers and chronic hypoxemia in COPD patients are proposed to contribute to the development of secondary polycythemia; however, the underlying physiological mechanisms are not fully understood [</span><a aria-label="Reference 1" data-dcnode-id="3558" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR1" id="ref-link-section-d26702105e962" title="Smith JR, Landaw SA. Smokers’ polycythemia. N Engl J Med. 1978;298(1):6–10."><span data-dcnode-id="3559" instrument_node="">1</span></a><span data-dcnode-id="3557" instrument_node="">, </span><a aria-label="Reference 14" data-dcnode-id="3555" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR14" id="ref-link-section-d26702105e965" title="Kent BD, Mitchell PD, McNicholas WT. Hypoxemia in patients with COPD: cause, effects, and disease progression. Int J Chron Obstruct Pulmon Dis. 2011;6:199–208."><span data-dcnode-id="3556" instrument_node="">14</span></a><span data-dcnode-id="3554" instrument_node="">, </span><a aria-label="Reference 16" data-dcnode-id="3552" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR16" id="ref-link-section-d26702105e968" title="Sagone AL Jr, Balcerzak SP. Smoking as a cause of erythrocytosis. Ann Intern Med. 1975;82(4):512–5."><span data-dcnode-id="3553" instrument_node="">16</span></a><span data-dcnode-id="3551" instrument_node="">]. Hematocrit has been negatively correlated with: age, forced expiratory volume in 1&nbsp;s (FEV</span><sub data-dcnode-id="3549"><span data-dcnode-id="3550" instrument_node="">1</span></sub><span data-dcnode-id="3548" instrument_node="">) percent predicted, and ratio of FEV</span><sub data-dcnode-id="3546"><span data-dcnode-id="3547" instrument_node="">1</span></sub><span data-dcnode-id="3545" instrument_node=""> to forced vital capacity (FVC); and positively correlated with: male sex, current smoking, partial pressure of carbon dioxide in the blood, and body mass index (BMI) in COPD patients [</span><a aria-label="Reference 11" data-dcnode-id="3543" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR11" id="ref-link-section-d26702105e976" title="Chambellan A, Chailleux E, Similowski T, Group AO. Prognostic value of the hematocrit in patients with severe COPD receiving long-term oxygen therapy. Chest. 2005;128(3):1201–8."><span data-dcnode-id="3544" instrument_node="">11</span></a><span data-dcnode-id="3542" instrument_node="">]. However, secondary polycythemia risk factors have not been examined in an extensively phenotyped sample of COPD patients with and without hypoxemia. This study aims to evaluate the prevalence and risk factors of secondary polycythemia in a cohort of current- and former-smoking COPD patients in the Genetic Epidemiology of COPD (COPDGene) study. Part of the results of this study were published as an abstract for the 2020 American Thoracic Society annual meeting.</span></p></div></div></section><section data-dcnode-id="3369" data-title="Methods"><div class="c-article-section" data-dcnode-id="3370" id="Sec2-section"><h2 class="c-article-section__title js-section-title js-c-reading-companion-sections-item" data-dcnode-id="3536" id="Sec2"><span data-dcnode-id="3537" instrument_node="">Methods</span></h2><div class="c-article-section__content" data-dcnode-id="3371" id="Sec2-content"><h3 class="c-article__sub-heading" data-dcnode-id="3534" id="Sec3"><span data-dcnode-id="3535" instrument_node="">Study design and population</span></h3><p data-dcnode-id="3514"><span data-dcnode-id="3533" instrument_node="">We performed a cross-sectional analysis of selected participants from the COPDGene study (ClinicalTrials.gov Identifier: NCT00608764), an ongoing prospective observational study involving twenty-one clinical centers across the United States. Study design and methodology for COPDGene have been previously reported and are available online at </span><a data-dcnode-id="3531" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.copdgene.org/"><span data-dcnode-id="3532" instrument_node="">www.COPDGene.org</span></a><span data-dcnode-id="3530" instrument_node=""> [</span><a aria-label="Reference 17" data-dcnode-id="3528" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR17" id="ref-link-section-d26702105e998" title="Regan EA, Hokanson JE, Murphy JR, Make B, Lynch DA, Beaty TH, et al. Genetic epidemiology of COPD (COPDGene) study design. COPD. 2010;7(1):32–43."><span data-dcnode-id="3529" instrument_node="">17</span></a><span data-dcnode-id="3527" instrument_node="">]. Briefly, the COPDGene study included participants aged 45 to 80&nbsp;years with self-identified race/ethnicity of non-Hispanic white or African American and at least a 10 pack-year smoking history. Participants of the COPDGene study were asked to complete a demographic questionnaire and report their self-identified race as White, Black or African American, Asian, Pacific Islander, American Indian, and Other. The participants were also asked to report their self-identified ethnicity as Hispanic or Latino vs. Not Hispanic or Latino. Only participants identifying as “White” or “Black/African American” and “Not Hispanic or Latino” were eligible to participate given the study design of COPDGene study. Ancestry was assessed using genetic data and was confirmed to match well with self-identified race [</span><a aria-label="Reference 18" data-dcnode-id="3525" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR18" id="ref-link-section-d26702105e1001" title="Cho MH, McDonald M-LN, Zhou X, Mattheisen M, Castaldi PJ, Hersh CP, et al. Risk loci for chronic obstructive pulmonary disease: a genome-wide association study and meta-analysis. The Lancet Respir Med. 2014;2(3):214–25."><span data-dcnode-id="3526" instrument_node="">18</span></a><span data-dcnode-id="3524" instrument_node="">]. Current smoking status and pack-years of cigarette smoking were obtained based on self-report. COPD-related phenotypes including clinical, physiological, laboratory, and imaging features were collected in COPDGene. Our polycythemia investigation included participants from the COPDGene 5-year-follow-up visit with Global Initiative for Chronic Obstructive Lung Disease (GOLD) grade 2–4 airflow limitation severity (post-bronchodilator FEV</span><sub data-dcnode-id="3522"><span data-dcnode-id="3523" instrument_node="">1</span></sub><span data-dcnode-id="3521" instrument_node="">/FVC &lt; 0.7 and FEV</span><sub data-dcnode-id="3519"><span data-dcnode-id="3520" instrument_node="">1</span></sub><span data-dcnode-id="3518" instrument_node="">% predicted &lt; 80%) and available complete blood count (CBC) data. All phenotypic data were from the COPDGene 5-year follow-up visit with the exception of main pulmonary artery to ascending aorta diameter ratio (PA/A) which was obtained at the baseline COPDGene visit. The COPDGene study was approved by the respective Institutional Review Boards at all participating clinical centers, which are outlined in the Additional file </span><a data-dcnode-id="3516" data-track="click" data-track-action="supplementary material anchor" data-track-label="link" href="#MOESM2"><span data-dcnode-id="3517" instrument_node="">2</span></a><span data-dcnode-id="3515" instrument_node="">. Written informed consent was obtained from each study participant.</span></p><h3 class="c-article__sub-heading" data-dcnode-id="3512" id="Sec4"><span data-dcnode-id="3513" instrument_node="">Polycythemia</span></h3><p data-dcnode-id="3507"><span data-dcnode-id="3511" instrument_node="">The assignment of a secondary polycythemia diagnosis was extrapolated from the 2016 WHO diagnostic criteria for the myeloproliferative neoplasm, polycythemia vera (PV): hemoglobin &gt; 16.5&nbsp;g/dL and/or hematocrit &gt; 49% in males; hemoglobin &gt; 16.0&nbsp;g/dL and/or hematocrit &gt; 48% in females [</span><a aria-label="Reference 15" data-dcnode-id="3509" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR15" id="ref-link-section-d26702105e1020" title="Barbui T, Thiele J, Gisslinger H, Finazzi G, Vannucchi AM, Tefferi A. The 2016 revision of WHO classification of myeloproliferative neoplasms: clinical and molecular advances. Blood Rev. 2016;30(6):453–9."><span data-dcnode-id="3510" instrument_node="">15</span></a><span data-dcnode-id="3508" instrument_node="">]. The hemoglobin and hematocrit values were obtained from CBC data obtained at the COPDGene 5-year follow-up visit.</span></p><h3 class="c-article__sub-heading" data-dcnode-id="3505" id="Sec5"><span data-dcnode-id="3506" instrument_node="">Pulmonary function testing</span></h3><p data-dcnode-id="3488"><span data-dcnode-id="3504" instrument_node="">Spirometry and the diffusing capacity of the lungs for carbon monoxide (DLCO) were measured using the ndd EasyOne system (Zurich, Switzerland) in accordance with the 2005 ATS/ERS guidelines [</span><a aria-label="Reference 19" data-dcnode-id="3502" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR19" id="ref-link-section-d26702105e1031" title="Miller MR, Hankinson J, Brusasco V, Burgos F, Casaburi R, Coates A, et al. Standardisation of spirometry. Eur Respir J. 2005;26(2):319–38."><span data-dcnode-id="3503" instrument_node="">19</span></a><span data-dcnode-id="3501" instrument_node="">]. Spirometry was measured before and after administration of inhaled albuterol, and postbronchodilator spirometry was used in the present study. Extensive quality control of pulmonary function test data was performed by both an automated system and manual review. FEV</span><sub data-dcnode-id="3499"><span data-dcnode-id="3500" instrument_node="">1</span></sub><span data-dcnode-id="3498" instrument_node=""> and FVC percent predicted values were calculated with the National Health and Nutrition Examination Survey III equations [</span><a aria-label="Reference 20" data-dcnode-id="3496" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR20" id="ref-link-section-d26702105e1036" title="Hankinson JL, Odencrantz JR, Fedan KB. Spirometric reference values from a sample of the general U.S. population. Am J Respir Crit Care Med. 1999;159(1):179–87."><span data-dcnode-id="3497" instrument_node="">20</span></a><span data-dcnode-id="3495" instrument_node="">]. DLCO was adjusted for hemoglobin and altitude, and DLCO percent predicted values were calculated based on the Global Lung Initiative 2012 reference equations [</span><a aria-label="Reference 21" data-dcnode-id="3493" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR21" id="ref-link-section-d26702105e1039" title="Quanjer PH, Stanojevic S, Cole TJ, Baur X, Hall GL, Culver BH, et al. Multi-ethnic reference values for spirometry for the 3–95-yr age range: the global lung function 2012 equations. Eur Respir J. 2012;40(6):1324–43."><span data-dcnode-id="3494" instrument_node="">21</span></a><span data-dcnode-id="3492" instrument_node="">, </span><a aria-label="Reference 22" data-dcnode-id="3490" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR22" id="ref-link-section-d26702105e1042" title="Stanojevic S, Graham BL, Cooper BG, Thompson BR, Carter KW, Francis RW, et al. Official ERS technical standards: Global Lung Function Initiative reference values for the carbon monoxide transfer factor for Caucasians. Eur Respir J. 2017;50(3):1700010."><span data-dcnode-id="3491" instrument_node="">22</span></a><span data-dcnode-id="3489" instrument_node="">].</span></p><h3 class="c-article__sub-heading" data-dcnode-id="3486" id="Sec6"><span data-dcnode-id="3487" instrument_node="">Chest computed tomography imaging</span></h3><p data-dcnode-id="3454"><span data-dcnode-id="3485" instrument_node="">All participants had inspiratory and expiratory chest CT scans using whole-lung volumetric multidetector CT scanners with a standardized protocol [</span><a aria-label="Reference 17" data-dcnode-id="3483" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR17" id="ref-link-section-d26702105e1053" title="Regan EA, Hokanson JE, Murphy JR, Make B, Lynch DA, Beaty TH, et al. Genetic epidemiology of COPD (COPDGene) study design. COPD. 2010;7(1):32–43."><span data-dcnode-id="3484" instrument_node="">17</span></a><span data-dcnode-id="3482" instrument_node="">]. Quantitative analysis of CT scans was performed using LungQ software (Thirona, Nijmegen, Netherlands, </span><a data-dcnode-id="3480" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//thirona.eu/"><span data-dcnode-id="3481" instrument_node="">https://thirona.eu</span></a><span data-dcnode-id="3479" instrument_node="">). Percent emphysema (% emphysema) and percent air trapping (% air trapping) were defined as percentage of low attenuation lung areas below −&nbsp;950 Hounsfield units on inspiratory CT and below −&nbsp;856 Hounsfield units on expiratory CT, respectively [</span><a data-dcnode-id="3477" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR23" id="ref-link-section-d26702105e1063" title="Gevenois PA, De Vuyst P, de Maertelaer V, Zanen J, Jacobovitz D, Cosio MG, et al. Comparison of computed density and microscopic morphometry in pulmonary emphysema. Am J Respir Crit Care Med. 1996;154(1):187–92."><span data-dcnode-id="3478" instrument_node="">23</span></a><span data-dcnode-id="3476" instrument_node="">,</span><a data-dcnode-id="3474" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR24" id="ref-link-section-d26702105e1063_1" title="Arakawa A, Yamashita Y, Nakayama Y, Kadota M, Korogi H, Kawano O, et al. Assessment of lung volumes in pulmonary emphysema using multidetector helical CT: comparison with pulmonary function tests. Comput Med Imaging Graph. 2001;25(5):399–404."><span data-dcnode-id="3475" instrument_node="">24</span></a><span data-dcnode-id="3473" instrument_node="">,</span><a data-dcnode-id="3471" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR25" id="ref-link-section-d26702105e1063_2" title="Lee YK, Oh YM, Lee JH, Kim EK, Lee JH, Kim N, et al. Quantitative assessment of emphysema, air trapping, and airway thickening on computed tomography. Lung. 2008;186(3):157–65."><span data-dcnode-id="3472" instrument_node="">25</span></a><span data-dcnode-id="3470" instrument_node="">,</span><a aria-label="Reference 26" data-dcnode-id="3468" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR26" id="ref-link-section-d26702105e1066" title="Schroeder JD, McKenzie AS, Zach JA, Wilson CG, Curran-Everett D, Stinson DS, et al. Relationships between airflow obstruction and quantitative CT measurements of emphysema, air trapping, and airways in subjects with and without chronic obstructive pulmonary disease. AJR Am J Roentgenol. 2013;201(3):W460–70."><span data-dcnode-id="3469" instrument_node="">26</span></a><span data-dcnode-id="3467" instrument_node="">]. Airway wall thickness was quantified as the square root of the wall area of a theoretical airway of 10&nbsp;mm internal perimeter (Pi10) [</span><a aria-label="Reference 27" data-dcnode-id="3465" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR27" id="ref-link-section-d26702105e1069" title="Patel BD, Coxson HO, Pillai SG, Agusti AG, Calverley PM, Donner CF, et al. Airway wall thickening and emphysema show independent familial aggregation in chronic obstructive pulmonary disease. Am J Respir Crit Care Med. 2008;178(5):500–5."><span data-dcnode-id="3466" instrument_node="">27</span></a><span data-dcnode-id="3464" instrument_node="">]. Vasculature measurements were performed on axial images of inspiratory CT from the COPDGene baseline study visit using DICOM software (OsiriX DICOM Viewer v4.0, </span><a data-dcnode-id="3462" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.osirix-viewer.com/"><span data-dcnode-id="3463" instrument_node="">www.osirix-viewer.com</span></a><span data-dcnode-id="3461" instrument_node="">). Diameter of the main pulmonary artery was measured at its bifurcation, and diameter of the ascending aorta was measured at the same level in its maximum dimension. Pulmonary artery to aorta (PA/A) ratio was calculated, and relative PA enlargement was defined as a PA/A ratio greater than 1 [</span><a aria-label="Reference 28" data-dcnode-id="3459" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR28" id="ref-link-section-d26702105e1080" title="Wells JM, Washko GR, Han MK, Abbas N, Nath H, Mamary AJ, et al. Pulmonary arterial enlargement and acute exacerbations of COPD. N Engl J Med. 2012;367(10):913–21."><span data-dcnode-id="3460" instrument_node="">28</span></a><span data-dcnode-id="3458" instrument_node="">, </span><a aria-label="Reference 29" data-dcnode-id="3456" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR29" id="ref-link-section-d26702105e1083" title="Iyer AS, Wells JM, Vishin S, Bhatt SP, Wille KM, Dransfield MT. CT scan-measured pulmonary artery to aorta ratio and echocardiography for detecting pulmonary hypertension in severe COPD. Chest. 2014;145(4):824–32."><span data-dcnode-id="3457" instrument_node="">29</span></a><span data-dcnode-id="3455" instrument_node="">].</span></p><h3 class="c-article__sub-heading" data-dcnode-id="3452" id="Sec7"><span data-dcnode-id="3453" instrument_node="">Oxyhemoglobin saturation measurement</span></h3><p data-dcnode-id="3429"><span data-dcnode-id="3451" instrument_node="">Oxyhemoglobin saturation (SpO</span><sub data-dcnode-id="3449"><span data-dcnode-id="3450" instrument_node="">2</span></sub><span data-dcnode-id="3448" instrument_node="">) was measured by a pulse oximeter placed on a finger without nail polish. When a strong pulse was demonstrated on oximetry the SpO</span><sub data-dcnode-id="3446"><span data-dcnode-id="3447" instrument_node="">2</span></sub><span data-dcnode-id="3445" instrument_node=""> readings were monitored for at least one minute and a median value was recorded. Resting SpO</span><sub data-dcnode-id="3443"><span data-dcnode-id="3444" instrument_node="">2</span></sub><span data-dcnode-id="3442" instrument_node=""> was measured with participants in a seated position and resting SpO</span><sub data-dcnode-id="3440"><span data-dcnode-id="3441" instrument_node="">2</span></sub><span data-dcnode-id="3439" instrument_node=""> was recorded as 82% if SpO</span><sub data-dcnode-id="3437"><span data-dcnode-id="3438" instrument_node="">2</span></sub><span data-dcnode-id="3436" instrument_node=""> dropped to 82% or lower. Supplemental oxygen was discontinued for at least five minutes prior to testing for participants who used oxygen therapy at rest [</span><a aria-label="Reference 30" data-dcnode-id="3434" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR30" id="ref-link-section-d26702105e1106" title="Gruber P, Kwiatkowski T, Silverman R, Flaster E, Auerbach C. Time to equilibration of oxygen saturation using pulse oximetry. Acad Emerg Med. 1995;2(9):810–5."><span data-dcnode-id="3435" instrument_node="">30</span></a><span data-dcnode-id="3433" instrument_node="">]. For participants who completed a six-minute walk test (6MWT), exercise SpO</span><sub data-dcnode-id="3431"><span data-dcnode-id="3432" instrument_node="">2</span></sub><span data-dcnode-id="3430" instrument_node=""> was measured immediately after completion of the 6MWT. A participant could continue using supplemental oxygen during the 6MWT if the participant routinely used oxygen therapy with exercise.</span></p><h3 class="c-article__sub-heading" data-dcnode-id="3427" id="Sec8"><span data-dcnode-id="3428" instrument_node="">Long-term oxygen therapy (LTOT)</span></h3><p data-dcnode-id="3425"><span data-dcnode-id="3426" instrument_node="">Participants who reported the use of LTOT on a questionnaire were further asked to provide information on the situations in which they used LTOT (at rest, and/or during sleep, and/or during exercise) as well as the number of hours of supplemental oxygen use on a typical day.</span></p><h3 class="c-article__sub-heading" data-dcnode-id="3423" id="Sec9"><span data-dcnode-id="3424" instrument_node="">COPD comorbidities</span></h3><p data-dcnode-id="3421"><span data-dcnode-id="3422" instrument_node="">Common COPD comorbidities including congestive heart failure, diabetes, chronic kidney disease, and obstructive sleep apnea were self-reported. For participants reporting physician-diagnosed obstructive sleep apnea (OSA), further information on use of the use of a continuous positive airway pressure (CPAP) device was obtained.</span></p><h3 class="c-article__sub-heading" data-dcnode-id="3419" id="Sec10"><span data-dcnode-id="3420" instrument_node="">Statistical analysis</span></h3><p data-dcnode-id="3399"><span data-dcnode-id="3418" instrument_node="">Resting SpO</span><sub data-dcnode-id="3416"><span data-dcnode-id="3417" instrument_node="">2</span></sub><span data-dcnode-id="3415" instrument_node=""> was categorized as normal (&gt; 95%), mild hypoxemia (93–95%), moderate hypoxemia (89–92%), and severe hypoxemia (≤ 88%). Exercise-induced desaturation (EID) was defined as an SpO</span><sub data-dcnode-id="3413"><span data-dcnode-id="3414" instrument_node="">2</span></sub><span data-dcnode-id="3412" instrument_node=""> drop ≥ 4% from resting SpO</span><sub data-dcnode-id="3410"><span data-dcnode-id="3411" instrument_node="">2</span></sub><span data-dcnode-id="3409" instrument_node=""> and to &lt; 90% at the end of 6MWT [</span><a data-dcnode-id="3407" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR31" id="ref-link-section-d26702105e1141" title="Waatevik M, Johannessen A, Gomez Real F, Aanerud M, Hardie JA, Bakke PS, et al. Oxygen desaturation in 6-min walk test is a risk factor for adverse outcomes in COPD. Eur Respir J. 2016;48(1):82–91."><span data-dcnode-id="3408" instrument_node="">31</span></a><span data-dcnode-id="3406" instrument_node="">,</span><a data-dcnode-id="3404" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR32" id="ref-link-section-d26702105e1141_1" title="Jenkins S, Cecins N. Six-minute walk test: observed adverse events and oxygen desaturation in a large cohort of patients with chronic lung disease. Intern Med J. 2011;41(5):416–22."><span data-dcnode-id="3405" instrument_node="">32</span></a><span data-dcnode-id="3403" instrument_node="">,</span><a aria-label="Reference 33" data-dcnode-id="3401" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR33" id="ref-link-section-d26702105e1144" title="van Gestel AJ, Clarenbach CF, Stowhas AC, Teschler S, Russi EW, Teschler H, et al. Prevalence and prediction of exercise-induced oxygen desaturation in patients with chronic obstructive pulmonary disease. Respiration. 2012;84(5):353–9."><span data-dcnode-id="3402" instrument_node="">33</span></a><span data-dcnode-id="3400" instrument_node="">]. LTOT use was classified into four categories: (1) continuously (self-reported supplemental oxygen use both at rest and during sleep, or oxygen use at rest with more than 20&nbsp;h per day); (2) nocturnally (during sleep only, or during sleep and exercise); (3) intermittently (at rest and/or during exercise without use during sleep); and (4) no use.</span></p><p data-dcnode-id="3382"><span data-dcnode-id="3398" instrument_node="">We used the Wilcoxon rank-sum test for continuous variables and Fisher’s exact test for categorical variables to compare baseline characteristics in participants with and without polycythemia. We used logistic regression to examine the association between polycythemia and potential risk factors, which were determined a priori based on clinical plausibility. Polycythemia risk factors and potential confounding variables included age, sex, race, BMI, enrollment center, current smoking status, pack-years of cigarette smoking, lung function parameters (FEV</span><sub data-dcnode-id="3396"><span data-dcnode-id="3397" instrument_node="">1</span></sub><span data-dcnode-id="3395" instrument_node="">% predicted and DLCO % predicted), quantitative chest CT measurements (% emphysema, % air trapping, Pi10), relative PA enlargement (PA/A ratio &gt; 1), resting SpO</span><sub data-dcnode-id="3393"><span data-dcnode-id="3394" instrument_node="">2</span></sub><span data-dcnode-id="3392" instrument_node="">, EID, use of LTOT, and COPD comorbidities. Among all COPDGene clinical centers, Denver, Colorado (5280 feet above sea level) is significantly higher in altitude compared to other clinical centers and therefore enrollment center adjustment was based on participants being enrolled in a Denver versus non-Denver clinical center to control for differences in altitude. Multicollinearity among predictive variables was investigated using the variance inflation factor. We first examined the association between polycythemia and each risk factor, adjusting for the core covariates including age, sex, race, BMI, enrollment center, current smoking status, pack-years of cigarette smoking, and LTOT use. We then conducted a multivariable logistic regression that included all polycythemia risk factors with a suggestive statistical significance (</span><i data-dcnode-id="3390"><span data-dcnode-id="3391" instrument_node="">p</span></i><span data-dcnode-id="3389" instrument_node=""> &lt; 0.1) when adjusting for the core covariates. For all regression analyses we used participants with complete data for the outcome, all predictor variables, and core covariates. To reduce bias in estimates of coefficients, we used Firth’s logistic regression analyses when encountering rare events and/or quasi-separation of data [</span><a aria-label="Reference 34" data-dcnode-id="3387" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR34" id="ref-link-section-d26702105e1157" title="Firth D. Bias reduction of maximum likelihood estimates. Biometrika. 1993;80(1):27–38."><span data-dcnode-id="3388" instrument_node="">34</span></a><span data-dcnode-id="3386" instrument_node="">, </span><a aria-label="Reference 35" data-dcnode-id="3384" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR35" id="ref-link-section-d26702105e1160" title="Heinze G, Schemper M. A solution to the problem of separation in logistic regression. Stat Med. 2002;21(16):2409–19."><span data-dcnode-id="3385" instrument_node="">35</span></a><span data-dcnode-id="3383" instrument_node="">].</span></p><p data-dcnode-id="3377"><span data-dcnode-id="3381" instrument_node="">Self-identified race can serve as a proxy for one’s genetic ancestry though may be correlated with socioeconomic status (SES). We performed a sensitivity analysis to investigate the potential contribution of SES to our observed association of polycythemia with self-reported race, by including education level and income with race in the multivariable model. In a separate sensitivity analysis, we excluded participants with anemia (hemoglobin ≤ 13&nbsp;g/dL in males and ≤ 12&nbsp;g/dL in females) since anemic participants may have excess comorbidities and unmeasured confounders compared to non-anemic participants [</span><a aria-label="Reference 36" data-dcnode-id="3379" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR36" id="ref-link-section-d26702105e1166" title="Beutler E, Waalen J. The definition of anemia: what is the lower limit of normal of the blood hemoglobin concentration? Blood. 2006;107(5):1747–50."><span data-dcnode-id="3380" instrument_node="">36</span></a><span data-dcnode-id="3378" instrument_node="">]. We then conducted another sensitivity analysis, excluding participants enrolled in the Denver clinical center to assess for possible confounding by pathophysiology features enriched in or unique to Denver participants. Due to a decreased number of participants with polycythemia in the analyses excluding Denver participants, we restricted the logistic regression to adjustment for age, sex, race, and variables with statistical significance in the multivariable logistic model for all participants. Given that COPD severity and LTOT use could differ between current and former smokers, as a secondary analysis we examined polycythemia risk factors stratified by smoking status. Given LTOT was mostly prescribed to patients with hypoxemia, we performed a subgroup analysis in participants with resting desaturation (SpO2 ≤ 95%) and/or EID versus normal resting SpO2 (&gt; 95%) without EID.</span></p><p data-dcnode-id="3372"><span data-dcnode-id="3376" instrument_node="">A two-sided </span><i data-dcnode-id="3374"><span data-dcnode-id="3375" instrument_node="">p</span></i><span data-dcnode-id="3373" instrument_node=""> value &lt; 0.05 was considered statistically significant for all tests. All analyses were conducted using R version 3.6.3 (R Foundation for Statistical Computing, Vienna, Austria).</span></p></div></div></section><section data-dcnode-id="3209" data-title="Results"><div class="c-article-section" data-dcnode-id="3210" id="Sec11-section"><h2 class="c-article-section__title js-section-title js-c-reading-companion-sections-item" data-dcnode-id="3367" id="Sec11"><span data-dcnode-id="3368" instrument_node="">Results</span></h2><div class="c-article-section__content" data-dcnode-id="3211" id="Sec11-content"><h3 class="c-article__sub-heading" data-dcnode-id="3365" id="Sec12"><span data-dcnode-id="3366" instrument_node="">Sample characteristics</span></h3><p data-dcnode-id="3360"><span data-dcnode-id="3364" instrument_node="">Among 6284 former or current smokers with 10 pack-years or greater of tobacco consumption from the COPDGene study 5-year follow-up, 1928 participants (1054 males and 874 females) with moderate to very severe COPD and available hemoglobin and hematocrit data were included in this study. Of the 1928 participants, 128 (6.6%) individuals including 97 (9.2%) males and 31 (3.5%) females met the 2016 WHO diagnostic criteria for polycythemia. Individuals with polycythemia were more often male, non-Hispanic white, and enrolled in the Denver clinical center compared to individuals without polycythemia (Table </span><a data-dcnode-id="3362" data-track="click" data-track-action="table anchor" data-track-label="link" href="#Tab1"><span data-dcnode-id="3363" instrument_node="">1</span></a><span data-dcnode-id="3361" instrument_node="">). Comparing individuals with and without polycythemia, a greater proportion of individuals with polycythemia had severe airflow limitation (GOLD 3); however, a smaller proportion of individuals with polycythemia had very severe airflow limitation (GOLD 4). Participants with GOLD 4 airflow limitation were more often on LTOT (71.2% vs. 39.3%) compared to those with GOLD 3 airflow limitation. In addition, individuals with polycythemia more often had moderate or severe resting hypoxemia and less often reported use of continuous supplemental oxygen compared to individuals without polycythemia.</span></p><div class="c-article-table" data-container-section="table" data-dcnode-id="3345" data-test="inline-table" id="table-1"><figure data-dcnode-id="3346"><figcaption class="c-article-table__figcaption" data-dcnode-id="3357"><b data-dcnode-id="3358" data-test="table-caption" id="Tab1"><span data-dcnode-id="3359" instrument_node="">Table 1 Baseline characteristics according to the presence of polycythemia</span></b></figcaption><div class="u-text-right u-hide-print" data-dcnode-id="3347"><a aria-label="Full size table 1" class="c-article__pill-button" data-dcnode-id="3348" data-test="table-link" data-track="click" data-track-action="view table" data-track-label="button" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//bmcpulmmed.biomedcentral.com/articles/10.1186/s12890-021-01585-5/tables/1" rel="nofollow"><span data-dcnode-id="3355"><span data-dcnode-id="3356" instrument_node="">Full size table</span></span><svg aria-hidden="true" class="u-icon" data-dcnode-id="3349" focusable="false" height="16" role="img" width="16"><use data-dcnode-id="3350" xlink:href="#global-icon-chevron-right" xmlns:xlink="http://www.w3.org/1999/xlink"><svg data-dcnode-id="3351" id="global-icon-chevron-right" viewBox="0 0 16 16"></svg></use></svg><span data-dcnode-id="3354" instrument_node="">
</span><path d="M7.782 7L5.3 4.518c-.393-.392-.4-1.022-.02-1.403a1.001 1.001 0 011.417 0l4.176 4.177a1.001 1.001 0 010 1.416l-4.176 4.177a.991.991 0 01-1.4.016 1 1 0 01.003-1.42L7.782 9l1.013-.998z" data-dcnode-id="3353" fill-rule="evenodd"></path><span data-dcnode-id="3352" instrument_node="">
</span></a></div></figure></div><h3 class="c-article__sub-heading" data-dcnode-id="3343" id="Sec13"><span data-dcnode-id="3344" instrument_node="">Risk factors for secondary polycythemia</span></h3><p data-dcnode-id="3335"><span data-dcnode-id="3342" instrument_node="">The association analyses of secondary polycythemia with each risk factor are shown in Table </span><a data-dcnode-id="3340" data-track="click" data-track-action="table anchor" data-track-label="link" href="#Tab2"><span data-dcnode-id="3341" instrument_node="">2</span></a><span data-dcnode-id="3339" instrument_node="">. After adjusting for core covariates, FEV1% predicted (odds ratio [OR], 0.98; 95% confidence interval [CI], 0.97–1.00) and DLCO % predicted (OR, 0.98; 95% CI, 0.96–0.99) were inversely associated with risk for polycythemia. Moderate (OR, 1.90; 95% CI, 1.02–3.53) and severe (OR, 3.32; 95% CI, 1.50–7.33) resting hypoxemia were associated with a higher risk for polycythemia. A trend toward association of quantitative CT % emphysema with polycythemia (OR, 1.02; </span><i data-dcnode-id="3337"><span data-dcnode-id="3338" instrument_node="">p</span></i><span data-dcnode-id="3336" instrument_node=""> = 0.051) was found.</span></p><div class="c-article-table" data-container-section="table" data-dcnode-id="3320" data-test="inline-table" id="table-2"><figure data-dcnode-id="3321"><figcaption class="c-article-table__figcaption" data-dcnode-id="3332"><b data-dcnode-id="3333" data-test="table-caption" id="Tab2"><span data-dcnode-id="3334" instrument_node="">Table 2 Logistic regressions of each predictive variable on polycythemia</span></b></figcaption><div class="u-text-right u-hide-print" data-dcnode-id="3322"><a aria-label="Full size table 2" class="c-article__pill-button" data-dcnode-id="3323" data-test="table-link" data-track="click" data-track-action="view table" data-track-label="button" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//bmcpulmmed.biomedcentral.com/articles/10.1186/s12890-021-01585-5/tables/2" rel="nofollow"><span data-dcnode-id="3330"><span data-dcnode-id="3331" instrument_node="">Full size table</span></span><svg aria-hidden="true" class="u-icon" data-dcnode-id="3324" focusable="false" height="16" role="img" width="16"><use data-dcnode-id="3325" xlink:href="#global-icon-chevron-right" xmlns:xlink="http://www.w3.org/1999/xlink"><svg data-dcnode-id="3326" id="global-icon-chevron-right" viewBox="0 0 16 16"></svg></use></svg><span data-dcnode-id="3329" instrument_node="">
</span><path d="M7.782 7L5.3 4.518c-.393-.392-.4-1.022-.02-1.403a1.001 1.001 0 011.417 0l4.176 4.177a1.001 1.001 0 010 1.416l-4.176 4.177a.991.991 0 01-1.4.016 1 1 0 01.003-1.42L7.782 9l1.013-.998z" data-dcnode-id="3328" fill-rule="evenodd"></path><span data-dcnode-id="3327" instrument_node="">
</span></a></div></figure></div><p data-dcnode-id="3309"><span data-dcnode-id="3319" instrument_node="">The multivariable logistic regression for the association of polycythemia with all suggestive significant predictive variables (</span><i data-dcnode-id="3317"><span data-dcnode-id="3318" instrument_node="">p</span></i><span data-dcnode-id="3316" instrument_node=""> &lt; 0.1 in Table </span><a data-dcnode-id="3314" data-track="click" data-track-action="table anchor" data-track-label="link" href="#Tab2"><span data-dcnode-id="3315" instrument_node="">2</span></a><span data-dcnode-id="3313" instrument_node="">) and core covariates is shown in Table </span><a data-dcnode-id="3311" data-track="click" data-track-action="table anchor" data-track-label="link" href="#Tab3"><span data-dcnode-id="3312" instrument_node="">3</span></a><span data-dcnode-id="3310" instrument_node="">. In multivariable regression, polycythemia was associated with male sex, non-Hispanic white race (compared to African Americans), current smoking, and enrollment in the Denver clinical center. In addition, severe resting hypoxemia (OR, 3.50; 95% CI, 1.41–8.66) and impaired DLCO (OR, 1.28 for each 10-percent decrease in DLCO % predicted; 95% CI, 1.09–1.49) were associated with increased risk for polycythemia. Use of continuous (OR, 0.13; 95% CI, 0.05–0.35) or nocturnal (OR, 0.46; 95% CI 0.21–0.97) LTOT were associated with decreased risk for polycythemia.</span></p><div class="c-article-table" data-container-section="table" data-dcnode-id="3294" data-test="inline-table" id="table-3"><figure data-dcnode-id="3295"><figcaption class="c-article-table__figcaption" data-dcnode-id="3306"><b data-dcnode-id="3307" data-test="table-caption" id="Tab3"><span data-dcnode-id="3308" instrument_node="">Table 3 Multivariable logistic regression for polycythemia in COPD</span></b></figcaption><div class="u-text-right u-hide-print" data-dcnode-id="3296"><a aria-label="Full size table 3" class="c-article__pill-button" data-dcnode-id="3297" data-test="table-link" data-track="click" data-track-action="view table" data-track-label="button" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//bmcpulmmed.biomedcentral.com/articles/10.1186/s12890-021-01585-5/tables/3" rel="nofollow"><span data-dcnode-id="3304"><span data-dcnode-id="3305" instrument_node="">Full size table</span></span><svg aria-hidden="true" class="u-icon" data-dcnode-id="3298" focusable="false" height="16" role="img" width="16"><use data-dcnode-id="3299" xlink:href="#global-icon-chevron-right" xmlns:xlink="http://www.w3.org/1999/xlink"><svg data-dcnode-id="3300" id="global-icon-chevron-right" viewBox="0 0 16 16"></svg></use></svg><span data-dcnode-id="3303" instrument_node="">
</span><path d="M7.782 7L5.3 4.518c-.393-.392-.4-1.022-.02-1.403a1.001 1.001 0 011.417 0l4.176 4.177a1.001 1.001 0 010 1.416l-4.176 4.177a.991.991 0 01-1.4.016 1 1 0 01.003-1.42L7.782 9l1.013-.998z" data-dcnode-id="3302" fill-rule="evenodd"></path><span data-dcnode-id="3301" instrument_node="">
</span></a></div></figure></div><p data-dcnode-id="3283"><span data-dcnode-id="3293" instrument_node="">After further adjustment of our multivariable model for education and income, race remained significantly associated with polycythemia with a similar effect size; however, neither education nor income was independently associated with polycythemia (Additional file </span><a data-dcnode-id="3291" data-track="click" data-track-action="supplementary material anchor" data-track-label="link" href="#MOESM1"><span data-dcnode-id="3292" instrument_node="">1</span></a><span data-dcnode-id="3290" instrument_node="">: Table S1). The multivariable logistic regression results did not change significantly after excluding participants with anemia (Additional file </span><a data-dcnode-id="3288" data-track="click" data-track-action="supplementary material anchor" data-track-label="link" href="#MOESM1"><span data-dcnode-id="3289" instrument_node="">1</span></a><span data-dcnode-id="3287" instrument_node="">: Table S2) or after excluding participants enrolled in the Denver clinical center (Additional file </span><a data-dcnode-id="3285" data-track="click" data-track-action="supplementary material anchor" data-track-label="link" href="#MOESM1"><span data-dcnode-id="3286" instrument_node="">1</span></a><span data-dcnode-id="3284" instrument_node="">: Table S3).</span></p><h3 class="c-article__sub-heading" data-dcnode-id="3281" id="Sec14"><span data-dcnode-id="3282" instrument_node="">Stratified analyses by smoking status</span></h3><p data-dcnode-id="3276"><span data-dcnode-id="3280" instrument_node="">The prevalence of polycythemia in former smokers (n = 1266) was 7.0% in males and 2.5% in females, and in current smokers (n = 662) was 13.6% in males and 5.5% in females. Compared with current smokers, formers smokers were older, more often non-Hispanic white, and more often enrolled in the Denver clinical center (Additional file </span><a data-dcnode-id="3278" data-track="click" data-track-action="supplementary material anchor" data-track-label="link" href="#MOESM1"><span data-dcnode-id="3279" instrument_node="">1</span></a><span data-dcnode-id="3277" instrument_node="">: Table S4). Furthermore, former smokers appear to have more advanced COPD marked by more severe airflow limitation, lower DLCO % predicted, and more emphysema and air trapping on CT. In addition, compared with current smokers, former smokers more often had moderate or severe resting hypoxemia, and were more often on continuous or nocturnal LTOT.</span></p><p data-dcnode-id="3271"><span data-dcnode-id="3275" instrument_node="">Among former smokers with severe resting hypoxemia, 9.9% had polycythemia and 37.5% (3/8) of them were not on LTOT; in contrast, 18.5% (5/27) of current smokers with severe resting hypoxemia had polycythemia and 60% (3/5) of them were not on supplemental oxygen (Fig.&nbsp;</span><a data-dcnode-id="3273" data-track="click" data-track-action="figure anchor" data-track-label="link" href="#Fig1"><span data-dcnode-id="3274" instrument_node="">1</span></a><span data-dcnode-id="3272" instrument_node="">). For individuals with mild resting hypoxemia, 5.4% of former smokers and 10.7% of current smokers had polycythemia; and for individuals with moderate resting hypoxemia, 6.8% of former smokers and 21.3% of current smokers had polycythemia.</span></p><div class="c-article-section__figure js-c-reading-companion-figures-item" data-container-section="figure" data-dcnode-id="3242" data-test="figure" data-title="Fig. 1" id="figure-1"><figure data-dcnode-id="3243"><figcaption data-dcnode-id="3268"><b class="c-article-section__figure-caption" data-dcnode-id="3269" data-test="figure-caption-text" id="Fig1"><span data-dcnode-id="3270" instrument_node="">Fig. 1</span></b></figcaption><div class="c-article-section__figure-content" data-dcnode-id="3254"><div class="c-article-section__figure-item" data-dcnode-id="3263"><a class="c-article-section__figure-link" data-dcnode-id="3264" data-test="img-link" data-track="click" data-track-action="view figure" data-track-label="image" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//bmcpulmmed.biomedcentral.com/articles/10.1186/s12890-021-01585-5/figures/1" rel="nofollow"><picture data-dcnode-id="3265"><source data-dcnode-id="3267" srcset="//media.springernature.com/lw685/springer-static/image/art%3A10.1186%2Fs12890-021-01585-5/MediaObjects/12890_2021_1585_Fig1_HTML.png?as=webp" type="image/webp"><img alt="figure 1" aria-describedby="Fig1" data-dcnode-id="3266" height="365" loading="lazy" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//media.springernature.com/lw685/springer-static/image/art%253A10.1186/s12890-021-01585-5/MediaObjects/12890_2021_1585_Fig1_HTML.png&amp;raw" width="685"></picture></a></div><div class="c-article-section__figure-description" data-dcnode-id="3255" data-test="bottom-caption" id="figure-1-desc"><p data-dcnode-id="3256"><b data-dcnode-id="3261"><span data-dcnode-id="3262" instrument_node="">A</span></b><span data-dcnode-id="3260" instrument_node=""> Proportion of participants with polycythemia, </span><b data-dcnode-id="3258"><span data-dcnode-id="3259" instrument_node="">B</span></b><span data-dcnode-id="3257" instrument_node=""> proportion of participants with polycythemia who were not on long-term oxygen therapy (LTOT) according to severity of resting oxygen desaturation stratified by smoking status</span></p></div></div><div class="u-text-right u-hide-print" data-dcnode-id="3244"><a aria-label="Full size image figure 1" class="c-article__pill-button" data-dcnode-id="3245" data-test="article-link" data-track="click" data-track-action="view figure" data-track-dest="link:Figure1 Full size image" data-track-label="button" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//bmcpulmmed.biomedcentral.com/articles/10.1186/s12890-021-01585-5/figures/1" rel="nofollow"><span data-dcnode-id="3252"><span data-dcnode-id="3253" instrument_node="">Full size image</span></span><svg aria-hidden="true" class="u-icon" data-dcnode-id="3246" focusable="false" height="16" role="img" width="16"><use data-dcnode-id="3247" xlink:href="#global-icon-chevron-right" xmlns:xlink="http://www.w3.org/1999/xlink"><svg data-dcnode-id="3248" id="global-icon-chevron-right" viewBox="0 0 16 16"></svg></use></svg><span data-dcnode-id="3251" instrument_node="">
</span><path d="M7.782 7L5.3 4.518c-.393-.392-.4-1.022-.02-1.403a1.001 1.001 0 011.417 0l4.176 4.177a1.001 1.001 0 010 1.416l-4.176 4.177a.991.991 0 01-1.4.016 1 1 0 01.003-1.42L7.782 9l1.013-.998z" data-dcnode-id="3250" fill-rule="evenodd"></path><span data-dcnode-id="3249" instrument_node="">
</span></a></div></figure></div><p data-dcnode-id="3237"><span data-dcnode-id="3241" instrument_node="">Multivariable logistic regression models were examined separately in former smokers and current smokers (Table </span><a data-dcnode-id="3239" data-track="click" data-track-action="table anchor" data-track-label="link" href="#Tab4"><span data-dcnode-id="3240" instrument_node="">4</span></a><span data-dcnode-id="3238" instrument_node="">). In former smokers, impaired DLCO (OR, 1.40 for each 10-percent decrease in DLCO % predicted; 95% CI, 1.13–1.72) was associated with increased risk for polycythemia, while using LTOT continuously (OR, 0.24; 95% CI, 0.08–0.71) was associated with decreased risk; there was not a significant association between polycythemia and any severity of resting hypoxemia. In current smokers, moderate resting hypoxemia (OR, 4.00; 95% CI, 1.28–12.54), severe resting hypoxemia (OR, 8.23; 95% CI, 1.93–35.07), and EID (OR, 2.66; 95% CI, 1.18–6.01) were associated with increased risk for polycythemia. Continuous LTOT use (OR, 0.02; 95% CI 0.00–0.39) was associated with decreased risk of polycythemia. DLCO was not significantly associated with polycythemia in current smokers.</span></p><div class="c-article-table" data-container-section="table" data-dcnode-id="3222" data-test="inline-table" id="table-4"><figure data-dcnode-id="3223"><figcaption class="c-article-table__figcaption" data-dcnode-id="3234"><b data-dcnode-id="3235" data-test="table-caption" id="Tab4"><span data-dcnode-id="3236" instrument_node="">Table 4 Multivariable logistic regression on polycythemia stratified by smoking status</span></b></figcaption><div class="u-text-right u-hide-print" data-dcnode-id="3224"><a aria-label="Full size table 4" class="c-article__pill-button" data-dcnode-id="3225" data-test="table-link" data-track="click" data-track-action="view table" data-track-label="button" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//bmcpulmmed.biomedcentral.com/articles/10.1186/s12890-021-01585-5/tables/4" rel="nofollow"><span data-dcnode-id="3232"><span data-dcnode-id="3233" instrument_node="">Full size table</span></span><svg aria-hidden="true" class="u-icon" data-dcnode-id="3226" focusable="false" height="16" role="img" width="16"><use data-dcnode-id="3227" xlink:href="#global-icon-chevron-right" xmlns:xlink="http://www.w3.org/1999/xlink"><svg data-dcnode-id="3228" id="global-icon-chevron-right" viewBox="0 0 16 16"></svg></use></svg><span data-dcnode-id="3231" instrument_node="">
</span><path d="M7.782 7L5.3 4.518c-.393-.392-.4-1.022-.02-1.403a1.001 1.001 0 011.417 0l4.176 4.177a1.001 1.001 0 010 1.416l-4.176 4.177a.991.991 0 01-1.4.016 1 1 0 01.003-1.42L7.782 9l1.013-.998z" data-dcnode-id="3230" fill-rule="evenodd"></path><span data-dcnode-id="3229" instrument_node="">
</span></a></div></figure></div><h3 class="c-article__sub-heading" data-dcnode-id="3220" id="Sec15"><span data-dcnode-id="3221" instrument_node="">Stratified analyses by desaturation status</span></h3><p data-dcnode-id="3212"><span data-dcnode-id="3219" instrument_node="">In subjects with desaturation at rest or exercise, nocturnal (OR, 0.44; 95% CI 0.19–0.99) and continuous LTOT (OR, 0.10; 95% CI 0.03–0.30) were associated with reduced risk for polycythemia (Additional file </span><a data-dcnode-id="3217" data-track="click" data-track-action="supplementary material anchor" data-track-label="link" href="#MOESM1"><span data-dcnode-id="3218" instrument_node="">1</span></a><span data-dcnode-id="3216" instrument_node="">: Table S5). In participants without desaturation, we were not able to detect an association between LTOT use and polycythemia likely due to a very small number of participants (N = 2) who had polycythemia were on LTOT (Additional file </span><a data-dcnode-id="3214" data-track="click" data-track-action="supplementary material anchor" data-track-label="link" href="#MOESM1"><span data-dcnode-id="3215" instrument_node="">1</span></a><span data-dcnode-id="3213" instrument_node="">: Table S6).</span></p></div></div></section><section data-dcnode-id="3078" data-title="Discussion"><div class="c-article-section" data-dcnode-id="3079" id="Sec16-section"><h2 class="c-article-section__title js-section-title js-c-reading-companion-sections-item" data-dcnode-id="3207" id="Sec16"><span data-dcnode-id="3208" instrument_node="">Discussion</span></h2><div class="c-article-section__content" data-dcnode-id="3080" id="Sec16-content"><p data-dcnode-id="3205"><span data-dcnode-id="3206" instrument_node="">In this cohort of current and former smoking COPD patients from across the US, the overall prevalence of secondary polycythemia was 6.6% and was significantly higher in males, non-Hispanic whites, participants enrolled in Denver, and current smokers. A lower DLCO % predicted, severe resting hypoxemia, and exercise-induced desaturation (EID) were associated with a higher risk for polycythemia. Use of LTOT was associated with a lower risk for polycythemia.</span></p><p data-dcnode-id="3185"><span data-dcnode-id="3204" instrument_node="">Although secondary polycythemia has long been identified as a comorbidity in COPD, the prevalence of polycythemia in a contemporary sample of individuals with COPD was not well-established. Cote and colleagues reported a prevalence of polycythemia of 6% in 683 COPD outpatients from a single US clinical center [</span><a aria-label="Reference 9" data-dcnode-id="3202" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR9" id="ref-link-section-d26702105e4406" title="Cote C, Zilberberg MD, Mody SH, Dordelly LJ, Celli B. Haemoglobin level and its clinical impact in a cohort of patients with COPD. Eur Respir J. 2007;29(5):923–9."><span data-dcnode-id="3203" instrument_node="">9</span></a><span data-dcnode-id="3201" instrument_node="">]. Two other cohort studies, each less than 300 participants, evaluated the prevalence of polycythemia in European COPD outpatients [</span><a aria-label="Reference 12" data-dcnode-id="3199" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR12" id="ref-link-section-d26702105e4409" title="Ferrari M, Manea L, Anton K, Bruzzone P, Meneghello M, Zamboni F, et al. Anemia and hemoglobin serum levels are associated with exercise capacity and quality of life in chronic obstructive pulmonary disease. BMC Pulm Med. 2015;15:58."><span data-dcnode-id="3200" instrument_node="">12</span></a><span data-dcnode-id="3198" instrument_node="">, </span><a aria-label="Reference 13" data-dcnode-id="3196" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR13" id="ref-link-section-d26702105e4412" title="Boutou AK, Karrar S, Hopkinson NS, Polkey MI. Anemia and survival in chronic obstructive pulmonary disease: a dichotomous rather than a continuous predictor. Respiration. 2013;85(2):126–31."><span data-dcnode-id="3197" instrument_node="">13</span></a><span data-dcnode-id="3195" instrument_node="">]. Studies based on hospitalized COPD patients or severe COPD patients receiving LTOT may have inaccurate polycythemia prevalence estimates due to selection and misclassification biases [</span><a aria-label="Reference 10" data-dcnode-id="3193" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR10" id="ref-link-section-d26702105e4415" title="Guo L, Chughtai AR, Jiang H, Gao L, Yang Y, Yang Y, et al. Relationship between polycythemia and in-hospital mortality in chronic obstructive pulmonary disease patients with low-risk pulmonary embolism. J Thorac Dis. 2016;8(11):3119–31."><span data-dcnode-id="3194" instrument_node="">10</span></a><span data-dcnode-id="3192" instrument_node="">, </span><a aria-label="Reference 11" data-dcnode-id="3190" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR11" id="ref-link-section-d26702105e4418" title="Chambellan A, Chailleux E, Similowski T, Group AO. Prognostic value of the hematocrit in patients with severe COPD receiving long-term oxygen therapy. Chest. 2005;128(3):1201–8."><span data-dcnode-id="3191" instrument_node="">11</span></a><span data-dcnode-id="3189" instrument_node="">, </span><a aria-label="Reference 37" data-dcnode-id="3187" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR37" id="ref-link-section-d26702105e4422" title="Toft-Petersen AP, Torp-Pedersen C, Weinreich UM, Rasmussen BS. Association between hemoglobin and prognosis in patients admitted to hospital for COPD. Int J Chron Obstruct Pulmon Dis. 2016;11:2813–20."><span data-dcnode-id="3188" instrument_node="">37</span></a><span data-dcnode-id="3186" instrument_node="">]. The COPDGene study prospectively enrolled a large number of non-Hispanic white and African American current and former smokers with and without COPD from multiple clinical centers across the US. COPDGene study participants covered a wide distribution of ages and had a balanced sex distribution.</span></p><p data-dcnode-id="3174"><span data-dcnode-id="3184" instrument_node="">Our study found a significantly higher risk of polycythemia in male COPD subjects compared to female subjects (even when accounting for COPD severity) an observation not well-documented previously. The underlying cause for the sex discrepancy in polycythemia prevalence is unknown. Of note, the cutoff values for hemoglobin and hematocrit in the updated 2016 WHO diagnostic criteria of polycythemia vera are less different by sex (0.5&nbsp;g/dL difference in hemoglobin and 1% difference in hematocrit) than the former criteria (2&nbsp;g/dL difference in hemoglobin). That said, even the current diagnostic criteria for polycythemia may not fully account for the baseline hemoglobin/hematocrit differences between males and females and may contribute to the observed sex difference in secondary polycythemia risk. Additionally, we found non-Hispanic whites with COPD were at higher risk for polycythemia compared with African Americans, which may be due to a lower baseline hemoglobin level in African Americans [</span><a aria-label="Reference 38" data-dcnode-id="3182" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR38" id="ref-link-section-d26702105e4428" title="Beutler E, West C. Hematologic differences between African-Americans and whites: the roles of iron deficiency and alpha-thalassemia on hemoglobin levels and mean corpuscular volume. Blood. 2005;106(2):740–5."><span data-dcnode-id="3183" instrument_node="">38</span></a><span data-dcnode-id="3181" instrument_node="">, </span><a aria-label="Reference 39" data-dcnode-id="3179" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR39" id="ref-link-section-d26702105e4431" title="Robins EB, Blum S. Hematologic reference values for African American children and adolescents. Am J Hematol. 2007;82(7):611–4."><span data-dcnode-id="3180" instrument_node="">39</span></a><span data-dcnode-id="3178" instrument_node="">]. Race remained significantly associated with polycythemia after adjusting for education and income. However, we are unable to rule out confounders including other more detailed socioeconomic measures and environmental effects. As self-reported race and genetic ancestry are highly correlated in the COPDGene study, it is possible that an ancestry specific effect on red cell traits may account for the association between self-reported race and polycythemia. Also, African Americans in the COPDGene study tended to have less severe COPD which might have further contributed to the observed racial difference in polycythemia risk, even with the adjustment for COPD severity in multivariable regression models [</span><a aria-label="Reference 40" data-dcnode-id="3176" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR40" id="ref-link-section-d26702105e4434" title="Hansel NN, Washko GR, Foreman MG, Han MK, Hoffman EA, DeMeo DL, et al. Racial differences in CT phenotypes in COPD. COPD. 2013;10(1):20–7."><span data-dcnode-id="3177" instrument_node="">40</span></a><span data-dcnode-id="3175" instrument_node="">].</span></p><p data-dcnode-id="3151"><span data-dcnode-id="3173" instrument_node="">Study participants enrolled in the Denver clinical center were found to have significantly higher risk for secondary polycythemia compared to those enrolled in clinical centers closer to sea level. Living at high altitude is associated with
