increased COPD mortality [</span><a aria-label="Reference 41" data-dcnode-id="3171" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR41" id="ref-link-section-d26702105e4440" title="Cote TR, Stroup DF, Dwyer DM, Horan JM, Peterson DE. Chronic obstructive pulmonary disease mortality. A role for altitude Chest. 1993;103(4):1194–7."><span data-dcnode-id="3172" instrument_node="">41</span></a><span data-dcnode-id="3170" instrument_node="">, </span><a aria-label="Reference 42" data-dcnode-id="3168" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR42" id="ref-link-section-d26702105e4443" title="Ezzati M, Horwitz ME, Thomas DS, Friedman AB, Roach R, Clark T, et al. Altitude, life expectancy and mortality from ischaemic heart disease, stroke, COPD and cancers: national population-based analysis of US counties. J Epidemiol Community Health. 2012;66(7):e17."><span data-dcnode-id="3169" instrument_node="">42</span></a><span data-dcnode-id="3167" instrument_node="">], and healthy highlanders are more likely to have polycythemia [</span><a aria-label="Reference 43" data-dcnode-id="3165" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR43" id="ref-link-section-d26702105e4446" title="Penaloza D, Arias-Stella J. The heart and pulmonary circulation at high altitudes: healthy highlanders and chronic mountain sickness. Circulation. 2007;115(9):1132–46."><span data-dcnode-id="3166" instrument_node="">43</span></a><span data-dcnode-id="3164" instrument_node="">], together suggesting a possible complex interplay between COPD, high altitude, and polycythemia. Denver participants had lower resting SpO</span><sub data-dcnode-id="3162"><span data-dcnode-id="3163" instrument_node="">2</span></sub><span data-dcnode-id="3161" instrument_node=""> compared to non-Denver participants after adjustment of COPD severity [</span><a aria-label="Reference 44" data-dcnode-id="3159" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR44" id="ref-link-section-d26702105e4451" title="Kim DK, Jacobson FL, Washko GR, Casaburi R, Make BJ, Crapo JD, et al. Clinical and radiographic correlates of hypoxemia and oxygen therapy in the COPDGene study. Respir Med. 2011;105(8):1211–21."><span data-dcnode-id="3160" instrument_node="">44</span></a><span data-dcnode-id="3158" instrument_node="">], which likely reflects high-altitude induced hypoxemia. In the present study, resting SpO</span><sub data-dcnode-id="3156"><span data-dcnode-id="3157" instrument_node="">2</span></sub><span data-dcnode-id="3155" instrument_node=""> and EID were adjusted for in regression analyses, though may not have sufficiently accounted for differences in the pattern and magnitude of hypoxemia experienced by Denver and non-Denver study participants. It is unclear whether high altitude is a risk factor for polycythemia independent from the effects of hypoxemia. In addition, Denver study participants tended to have more severe COPD, and may have high-altitude related environmental exposures, lung mechanics, and coexisting cardiopulmonary conditions different from non-Denver participants [</span><a aria-label="Reference 45" data-dcnode-id="3153" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR45" id="ref-link-section-d26702105e4457" title="Stream JO, Luks AM, Grissom CK. Lung disease at high altitude. Expert Rev Respir Med. 2009;3(6):635–50."><span data-dcnode-id="3154" instrument_node="">45</span></a><span data-dcnode-id="3152" instrument_node="">]. Those largely unknown factors may have mediated or confounded the association between Denver location and polycythemia despite the adjustment for lung function and quantitative CT measurements in our analyses. Though, in a sensitivity analysis of polycythemia associations excluding Denver participants, the remaining risk factors for polycythemia including male sex, non-Hispanic white race, and severe oxygen desaturation, were similar to the analysis that included Denver participants.</span></p><p data-dcnode-id="3134"><span data-dcnode-id="3150" instrument_node="">In the present study, severe resting hypoxemia was associated with higher risk for polycythemia whereas continuous or nocturnal use of LTOT were associated with lower risk for polycythemia, which indicates a strong association between uncorrected severe hypoxemia and polycythemia in COPD subjects. These findings are consistent with the longstanding understanding of chronic hypoxemia leading to secondary polycythemia in COPD. In a smoking-stratified analysis, former smokers were older and had more advanced COPD and hypoxemia severity compared to current smokers. Moderate resting hypoxemia, severe resting hypoxemia, and exercise-induced desaturation were associated with polycythemia in current smokers but not in former smokers. The proportion of participants with moderate or severe resting hypoxemia receiving LTOT was substantially lower in current smokers compared to former smokers, and continuous LTOT was associated with a decreased risk for polycythemia in both current and former smokers. Taken together, these findings suggest that differences in prescription of LTOT between current and former smokers (most likely due to safety issues in prescribing oxygen to current smokers) may account for the observed increased prevalence of secondary polycythemia in current smokers with COPD. Current smokers have higher and more variable COHb levels compared with non-smokers [</span><a aria-label="Reference 46" data-dcnode-id="3148" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR46" id="ref-link-section-d26702105e4464" title="Turner JA, McNicol MW, Sillett RW. Distribution of carboxyhaemoglobin concentrations in smokers and non-smokers. Thorax. 1986;41(1):25–7."><span data-dcnode-id="3149" instrument_node="">46</span></a><span data-dcnode-id="3147" instrument_node="">, </span><a aria-label="Reference 47" data-dcnode-id="3145" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR47" id="ref-link-section-d26702105e4467" title="Wald N, Howard S, Smith PG, Bailey A. Use of carboxyhaemoglobin levels to predict the development of diseases associated with cigarette smoking. Thorax. 1975;30(2):133–40."><span data-dcnode-id="3146" instrument_node="">47</span></a><span data-dcnode-id="3144" instrument_node="">]. SpO</span><sub data-dcnode-id="3142"><span data-dcnode-id="3143" instrument_node="">2</span></sub><span data-dcnode-id="3141" instrument_node=""> measured by oximetry may overestimate oxyhemoglobin level depending on the amount of COHb in blood [</span><a aria-label="Reference 48" data-dcnode-id="3139" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR48" id="ref-link-section-d26702105e4472" title="Barker SJ, Tremper KK. The effect of carbon monoxide inhalation on pulse oximetry and transcutaneous PO2. Anesthesiology. 1987;66(5):677–9."><span data-dcnode-id="3140" instrument_node="">48</span></a><span data-dcnode-id="3138" instrument_node="">]. Blood COHb level was not available in this study. As a result, the SpO</span><sub data-dcnode-id="3136"><span data-dcnode-id="3137" instrument_node="">2</span></sub><span data-dcnode-id="3135" instrument_node=""> measurement in our study may have upward bias in current smokers and result in a systematic less severe categorization of hypoxemia in current smokers.</span></p><p data-dcnode-id="3111"><span data-dcnode-id="3133" instrument_node="">The present study describes an independent association between impaired DLCO and increased risk for polycythemia, though the underlying mechanism accounting for this association remains unknown. Impaired DLCO can be related to more severe emphysema, concomitant interstitial lung disease, and pulmonary hypertension (PH) in COPD [</span><a aria-label="Reference 49" data-dcnode-id="3131" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR49" id="ref-link-section-d26702105e4480" title="Grydeland TB, Thorsen E, Dirksen A, Jensen R, Coxson HO, Pillai SG, et al. Quantitative CT measures of emphysema and airway wall thickness are related to D(L)CO. Respir Med. 2011;105(3):343."><span data-dcnode-id="3132" instrument_node="">49</span></a><span data-dcnode-id="3130" instrument_node="">, </span><a aria-label="Reference 50" data-dcnode-id="3128" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR50" id="ref-link-section-d26702105e4483" title="Seeger W, Adir Y, Barbera JA, Champion H, Coghlan JG, Cottin V, et al. Pulmonary hypertension in chronic lung diseases. J Am Coll Cardiol. 2013;62(25 Suppl):D109–16."><span data-dcnode-id="3129" instrument_node="">50</span></a><span data-dcnode-id="3127" instrument_node="">]. In the current study, percent emphysema on CT showed a suggestive positive association with polycythemia in single variable regression but not in the multivariable regression which included DLCO. A possible explanation is that DLCO captured emphysema severity and additionally provided information of other underlying mechanisms contributing to polycythemia. Also, as a surrogate of invasively diagnosed PH, relative pulmonary artery (PA) enlargement on CT (PA/A ratio &gt; 1) was not significantly associated with polycythemia in current study, though a direct measurement of pulmonary artery pressure was not available [</span><a aria-label="Reference 29" data-dcnode-id="3125" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR29" id="ref-link-section-d26702105e4486" title="Iyer AS, Wells JM, Vishin S, Bhatt SP, Wille KM, Dransfield MT. CT scan-measured pulmonary artery to aorta ratio and echocardiography for detecting pulmonary hypertension in severe COPD. Chest. 2014;145(4):824–32."><span data-dcnode-id="3126" instrument_node="">29</span></a><span data-dcnode-id="3124" instrument_node="">, </span><a aria-label="Reference 51" data-dcnode-id="3122" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR51" id="ref-link-section-d26702105e4489" title="Ng CS, Wells AU, Padley SP. A CT sign of chronic pulmonary arterial hypertension: the ratio of main pulmonary artery to aortic diameter. J Thorac Imaging. 1999;14(4):270–8."><span data-dcnode-id="3123" instrument_node="">51</span></a><span data-dcnode-id="3121" instrument_node="">]. First, it should be noted that the PA/A ratio measurement occurred approximately 5&nbsp;years prior to the CBC measurements used to classify individuals as having secondary polycythemia, possibly introducing noise and misclassification bias to the association of PA/A ratio with polycythemia. Another possible explanation of the lack of association of PA/A ratio with polycythemia is that COPD patients with concomitant PH are prone to hospitalizations, which are associated with anemia [</span><a aria-label="Reference 52" data-dcnode-id="3119" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR52" id="ref-link-section-d26702105e4492" title="Martinez-Rivera C, Portillo K, Munoz-Ferrer A, Martinez-Ortiz ML, Molins E, Serra P, et al. Anemia is a mortality predictor in hospitalized patients for COPD exacerbation. COPD. 2012;9(3):243."><span data-dcnode-id="3120" instrument_node="">52</span></a><span data-dcnode-id="3118" instrument_node="">, </span><a aria-label="Reference 53" data-dcnode-id="3116" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR53" id="ref-link-section-d26702105e4496" title="Almagro P, Cabrera FJ, Diez J, Boixeda R, Alonso Ortiz MB, Murio C, et al. Comorbidities and short-term prognosis in patients hospitalized for acute exacerbation of COPD: the EPOC en Servicios de medicina interna (ESMI) study. Chest. 2012;142(5):1126–33."><span data-dcnode-id="3117" instrument_node="">53</span></a><span data-dcnode-id="3115" instrument_node="">]. Notably, in stratified analysis DLCO was not significantly associated with polycythemia in current smokers. One possible explanation could be the association was mitigated by an increased variability of DLCO measurement in current smokers. COHb is known to affect DLCO measurement through occupation of hemoglobin binding sites and decreasing driving pressure of carbon monoxide transport from alveoli to blood, with a total effect of reducing measured DLCO [</span><a aria-label="Reference 54" data-dcnode-id="3113" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR54" id="ref-link-section-d26702105e4499" title="Graham BL, Brusasco V, Burgos F, Cooper BG, Jensen R, Kendrick A, et al. 2017 ERS/ATS standards for single-breath carbon monoxide uptake in the lung. Eur Respir J. 2017;49(1):160016."><span data-dcnode-id="3114" instrument_node="">54</span></a><span data-dcnode-id="3112" instrument_node="">]. In the present study DLCO was not corrected for COHb, which may have biased the estimation of association between DLCO and polycythemia in current smokers to an unknown direction or magnitude. Other possible causes of the null association between DLCO and polycythemia in current smokers include lack of power (same direction of effect estimate in current and former smokers), less severely impaired DLCO in current smokers compared with former smokers (smaller estimate of effect size in current smokers), and heavier cigarette smoking in study participants with less severe COPD.</span></p><p data-dcnode-id="3094"><span data-dcnode-id="3110" instrument_node="">Secondary polycythemia may have important clinical impact, including various comorbidities (e.g., pulmonary hypertension and venous thromboembolism) and mortality, on COPD patients. This study has important clinical implications related to the interpretation of and intervention on polycythemia in COPD patients. First, the present study clarifies that the prevalence of secondary polycythemia is considerable (~ 6%) in contemporary US COPD patients, especially in males and current smokers. Second, the presence of polycythemia in COPD patients may warrant an active screening of uncorrected severe hypoxemia, which is a predictor of mortality in COPD [</span><a aria-label="Reference 55" data-dcnode-id="3108" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR55" id="ref-link-section-d26702105e4505" title="Nizet TA, van den Elshout FJ, Heijdra YF, van de Ven MJ, Mulder PG, Folgering HT. Survival of chronic hypercapnic COPD patients is predicted by smoking habits, comorbidity, and hypoxemia. Chest. 2005;127(6):1904–10."><span data-dcnode-id="3109" instrument_node="">55</span></a><span data-dcnode-id="3107" instrument_node="">, </span><a aria-label="Reference 56" data-dcnode-id="3105" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR56" id="ref-link-section-d26702105e4508" title="Coleta KD, Silveira LV, Lima DF, Rampinelli EA, Godoy I, Godoy I. Predictors of first-year survival in patients with advanced COPD treated using long-term oxygen therapy. Respir Med. 2008;102(4):512–8."><span data-dcnode-id="3106" instrument_node="">56</span></a><span data-dcnode-id="3104" instrument_node="">]. LTOT use in COPD patients with severe resting hypoxemia improves survival and was also found to be associated with lower risk for polycythemia in our study [</span><a data-dcnode-id="3102" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR57" id="ref-link-section-d26702105e4511" title="Continuous or nocturnal oxygen therapy in hypoxemic chronic obstructive lung disease: a clinical trial. Nocturnal Oxygen Therapy Trial Group. Ann Intern Med. 1980;93(3):391–8."><span data-dcnode-id="3103" instrument_node="">57</span></a><span data-dcnode-id="3101" instrument_node="">,</span><a data-dcnode-id="3099" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR58" id="ref-link-section-d26702105e4511_1" title="Long term domiciliary oxygen therapy in chronic hypoxic cor pulmonale complicating chronic bronchitis and emphysema. Report of the Medical Research Council Working Party. Lancet. 1981;1(8222):681–6."><span data-dcnode-id="3100" instrument_node="">58</span></a><span data-dcnode-id="3098" instrument_node="">,</span><a aria-label="Reference 59" data-dcnode-id="3096" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR59" id="ref-link-section-d26702105e4514" title="Cranston JM, Crockett AJ, Moss JR, Alpers JH. Domiciliary oxygen for chronic obstructive pulmonary disease. Cochrane Database Syst Rev. 2005;4:CD001744."><span data-dcnode-id="3097" instrument_node="">59</span></a><span data-dcnode-id="3095" instrument_node="">]. Polycythemia can be easily discovered through a complete blood count, one of the most routinely acquired labs in clinical practice. As a result, a careful evaluation of polycythemia may provide a valuable opportunity to uncover uncorrected hypoxemia in COPD patients. Third, DLCO may be helpful in the evaluation of COPD patients with polycythemia, in whom a low DLCO might prompt an evaluation of concomitant interstitial lung disease or pulmonary vascular disease if hypoxemia alone fails to justify the presence of polycythemia.</span></p><p data-dcnode-id="3092"><span data-dcnode-id="3093" instrument_node="">The strengths of this study include a large cohort of contemporary COPD patients with extensively curated phenotypes including post-bronchodilator spirometry, DLCO, quantitative chest CT measurements, and LTOT use. CBCs were drawn from participants in stable clinical conditions rather than during COPD exacerbations or hospitalizations which limited misclassification of polycythemia based on acute medical events.</span></p><p data-dcnode-id="3081"><span data-dcnode-id="3091" instrument_node="">Limitations of this study include the cross-sectional design, which precludes inference of directionality or causality between exposure and outcome variables. Oxygen saturation was measured by pulse oximetry instead of arterial blood gas analysis, which might result in measurement bias [</span><a aria-label="Reference 60" data-dcnode-id="3089" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR60" id="ref-link-section-d26702105e4523" title="Chan ED, Chan MM, Chan MM. Pulse oximetry: understanding its basic principles facilitates appreciation of its limitations. Respir Med. 2013;107(6):789–99."><span data-dcnode-id="3090" instrument_node="">60</span></a><span data-dcnode-id="3088" instrument_node="">]. Our available data did not allow us to definitely exclude polycythemia vera, though the prevalence of PV in US is quite low [</span><a aria-label="Reference 61" data-dcnode-id="3086" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR61" id="ref-link-section-d26702105e4526" title="Ma X, Vanasse G, Cartmel B, Wang Y, Selinger HA. Prevalence of polycythemia vera and essential thrombocythemia. Am J Hematol. 2008;83(5):359–62."><span data-dcnode-id="3087" instrument_node="">61</span></a><span data-dcnode-id="3085" instrument_node="">, </span><a aria-label="Reference 62" data-dcnode-id="3083" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR62" id="ref-link-section-d26702105e4529" title="Mehta J, Wang H, Iqbal SU, Mesa R. Epidemiology of myeloproliferative neoplasms in the United States. Leuk Lymphoma. 2014;55(3):595–600."><span data-dcnode-id="3084" instrument_node="">62</span></a><span data-dcnode-id="3082" instrument_node="">]. Finally, LTOT use was self-reported, and information about the setting of initial prescription, follow-up adjustment, or barriers to LTOT use was not available.</span></p></div></div></section><section data-dcnode-id="3071" data-title="Conclusions"><div class="c-article-section" data-dcnode-id="3072" id="Sec17-section"><h2 class="c-article-section__title js-section-title js-c-reading-companion-sections-item" data-dcnode-id="3076" id="Sec17"><span data-dcnode-id="3077" instrument_node="">Conclusions</span></h2><div class="c-article-section__content" data-dcnode-id="3073" id="Sec17-content"><p data-dcnode-id="3074"><span data-dcnode-id="3075" instrument_node="">In conclusion, in a large sample of current and former smoking individuals with COPD and moderate to very severe airflow limitation, we found a substantial prevalence of polycythemia. The prevalence of polycythemia was significantly higher in males and current smokers. Severe resting hypoxemia, impaired DLCO, and living at high altitude (Denver) were risk factors for polycythemia; whereas, continuous or nocturnal LTOT use were protective against secondary polycythemia in COPD. The longitudinal clinical impact of polycythemia and whether additional risk assessment for polycythemia can lead to improved COPD outcomes and management, such as a more in-depth evaluation for chronic hypoxemia, requires further study.</span></p></div></div></section><span data-dcnode-id="3070" instrument_node="">
