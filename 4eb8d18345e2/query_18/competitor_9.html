</span><h2 class="blog-details-headline text-black entry-title" data-dcnode-id="2816"><span data-dcnode-id="2817" instrument_node="">Expat cost of living in Laos in 2022</span></h2><span data-dcnode-id="2815" instrument_node="">
</span><div class="blog-date no-padding-top standard-post-meta" data-dcnode-id="2802"><span data-dcnode-id="2814" instrument_node="">Posted by  </span><span class="author vcard" data-dcnode-id="2811"><a class="url fn n" data-dcnode-id="2812" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//adamfayed.com/author/adamfayed/"><span data-dcnode-id="2813" instrument_node="">Adam Fayed</span></a></span><span data-dcnode-id="2810" instrument_node=""> | </span><span class="published" data-dcnode-id="2808"><span data-dcnode-id="2809" instrument_node="">May 12, 2021</span></span><time class="updated display-none" data-dcnode-id="2806" datetime="2022-02-24T08:40:32+00:00"><span data-dcnode-id="2807" instrument_node="">February 24, 2022</span></time><span data-dcnode-id="2805" instrument_node=""> | </span><a class="white-text" data-dcnode-id="2803" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//adamfayed.com/category/lifestyle/cost-of-living/" rel="category tag"><span data-dcnode-id="2804" instrument_node="">Cost of Living</span></a></div><div class="margin-tb-30px" data-dcnode-id="2796"><div class="blog-image bg-transparent" data-dcnode-id="2798"><img alt="" class="attachment-full size-full wp-post-image entered lazyloaded" data-dcnode-id="2801" data-lazy-sizes="(max-width: 2048px) 100vw, 2048px" data-lazy-src="https://adamfayed.com/wp-content/uploads/2021/05/a1-11-scaled.jpg" data-lazy-srcset="https://adamfayed.com/wp-content/uploads/2021/05/a1-11-scaled.jpg 2048w, https://adamfayed.com/wp-content/uploads/2021/05/a1-11-300x188.jpg 300w, https://adamfayed.com/wp-content/uploads/2021/05/a1-11-1024x641.jpg 1024w, https://adamfayed.com/wp-content/uploads/2021/05/a1-11-768x481.jpg 768w, https://adamfayed.com/wp-content/uploads/2021/05/a1-11-1536x961.jpg 1536w, https://adamfayed.com/wp-content/uploads/2021/05/a1-11-133x83.jpg 133w, https://adamfayed.com/wp-content/uploads/2021/05/a1-11-374x234.jpg 374w, https://adamfayed.com/wp-content/uploads/2021/05/a1-11-81x51.jpg 81w" data-ll-status="loaded" height="1282" sizes="(max-width: 2048px) 100vw, 2048px" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//adamfayed.com/wp-content/uploads/2021/05/a1-11-scaled.jpg&amp;raw" srcset="https://adamfayed.com/wp-content/uploads/2021/05/a1-11-scaled.jpg 2048w, https://adamfayed.com/wp-content/uploads/2021/05/a1-11-300x188.jpg 300w, https://adamfayed.com/wp-content/uploads/2021/05/a1-11-1024x641.jpg 1024w, https://adamfayed.com/wp-content/uploads/2021/05/a1-11-768x481.jpg 768w, https://adamfayed.com/wp-content/uploads/2021/05/a1-11-1536x961.jpg 1536w, https://adamfayed.com/wp-content/uploads/2021/05/a1-11-133x83.jpg 133w, https://adamfayed.com/wp-content/uploads/2021/05/a1-11-374x234.jpg 374w, https://adamfayed.com/wp-content/uploads/2021/05/a1-11-81x51.jpg 81w" width="2048"><noscript data-dcnode-id="2799"><span data-dcnode-id="2800" instrument_node="">&lt;img width="2048" height="1282" src="https://adamfayed.com/wp-content/uploads/2021/05/a1-11-scaled.jpg" class="attachment-full size-full wp-post-image" alt="" srcset="https://adamfayed.com/wp-content/uploads/2021/05/a1-11-scaled.jpg 2048w, https://adamfayed.com/wp-content/uploads/2021/05/a1-11-300x188.jpg 300w, https://adamfayed.com/wp-content/uploads/2021/05/a1-11-1024x641.jpg 1024w, https://adamfayed.com/wp-content/uploads/2021/05/a1-11-768x481.jpg 768w, https://adamfayed.com/wp-content/uploads/2021/05/a1-11-1536x961.jpg 1536w, https://adamfayed.com/wp-content/uploads/2021/05/a1-11-133x83.jpg 133w, https://adamfayed.com/wp-content/uploads/2021/05/a1-11-374x234.jpg 374w, https://adamfayed.com/wp-content/uploads/2021/05/a1-11-81x51.jpg 81w" sizes="(max-width: 2048px) 100vw, 2048px" /&gt;</span></noscript></div><span data-dcnode-id="2797" instrument_node=""> </span></div><span data-dcnode-id="2795" instrument_node="">
</span><div class="blog-details-text entry-content" data-dcnode-id="2271"><span data-dcnode-id="2794" instrument_node="">
</span><p data-dcnode-id="2792"><span data-dcnode-id="2793" instrument_node="">Expat cost of living in Laos in 2022 – that will be the topic of today’s article.</span></p><span data-dcnode-id="2791" instrument_node="">
</span><p data-dcnode-id="2789"><span data-dcnode-id="2790" instrument_node="">Nothing written here should be considered formal tax, financial, legal or any other kind of advice advice, and is written for entertainment purposes only.</span></p><span data-dcnode-id="2788" instrument_node="">
</span><p data-dcnode-id="2783"><span data-dcnode-id="2787" instrument_node="">For any questions, or if you are looking to invest as an expat, you can contact me using&nbsp;</span><a data-dcnode-id="2785" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//adamfayed.com/%23contact-me"><span data-dcnode-id="2786" instrument_node="">&nbsp;this form</span></a><span data-dcnode-id="2784" instrument_node="">, or use the WhatsApp function below.</span></p><span data-dcnode-id="2782" instrument_node="">
</span><p data-dcnode-id="2780"><span data-dcnode-id="2781" instrument_node="">The best time to review your situation is often when you are moving to a new country.</span></p><span data-dcnode-id="2779" instrument_node="">
</span><h4 data-dcnode-id="2776"><strong data-dcnode-id="2777"><span data-dcnode-id="2778" instrument_node="">Introduction </span></strong></h4><span data-dcnode-id="2775" instrument_node="">
</span><figure class="wp-block-image size-large" data-dcnode-id="2771"><img alt="" class="wp-image-27440" data-dcnode-id="2774" data-lazy-sizes="(max-width: 1024px) 100vw, 1024px" data-lazy-src="https://adamfayed.com/wp-content/uploads/2021/05/a2.jpg" data-lazy-srcset="https://adamfayed.com/wp-content/uploads/2021/05/a2.jpg 1024w, https://adamfayed.com/wp-content/uploads/2021/05/a2-300x225.jpg 300w, https://adamfayed.com/wp-content/uploads/2021/05/a2-768x576.jpg 768w, https://adamfayed.com/wp-content/uploads/2021/05/a2-81x61.jpg 81w" height="768" src="data:image/svg+xml,%3Csvg%20xmlns='http://www.w3.org/2000/svg'%20viewBox='0%200%201024%20768'%3E%3C/svg%3E" width="1024"><noscript data-dcnode-id="2772"><span data-dcnode-id="2773" instrument_node="">&lt;img width="1024" height="768" src="https://adamfayed.com/wp-content/uploads/2021/05/a2.jpg" alt="" class="wp-image-27440" srcset="https://adamfayed.com/wp-content/uploads/2021/05/a2.jpg 1024w, https://adamfayed.com/wp-content/uploads/2021/05/a2-300x225.jpg 300w, https://adamfayed.com/wp-content/uploads/2021/05/a2-768x576.jpg 768w, https://adamfayed.com/wp-content/uploads/2021/05/a2-81x61.jpg 81w" sizes="(max-width: 1024px) 100vw, 1024px" /&gt;</span></noscript></figure><span data-dcnode-id="2770" instrument_node="">
</span><p data-dcnode-id="2768"><span data-dcnode-id="2769" instrument_node="">Laos is an exotic wild country with its location in East Asia. On the western side, the state borders on Thailand, on the east – on Vietnam, on the north – the border with China, and on the south – on Cambodia. The capital of Laos is Vientiane.</span></p><span data-dcnode-id="2767" instrument_node="">
</span><p data-dcnode-id="2765"><span data-dcnode-id="2766" instrument_node="">Laos people are very peaceful and friendly citizens. They calmly and respectfully treat other people’s traditions and customs. To cope with everyday difficulties and problems they are helped by an excellent sense of humor, which is possessed by almost all the inhabitants of Laos. If newcomers come up to them with a smile, they will certainly respond in kind.</span></p><span data-dcnode-id="2764" instrument_node="">
</span><p data-dcnode-id="2762"><span data-dcnode-id="2763" instrument_node="">You should never expect aggression or rudeness from a Lao with a smile. Laos has a population of over 5 million. This number includes approximately 70 ethnic groups living on the lands of this state. Most Lao people prefer to practice Buddhism.&nbsp;</span></p><span data-dcnode-id="2761" instrument_node="">
</span><p data-dcnode-id="2759"><span data-dcnode-id="2760" instrument_node="">According to the customs of this religion, every man is obliged to spend at least a few years of his life at the monastery. This is what explains the huge number of monks who can be found on the roads.</span></p><span data-dcnode-id="2758" instrument_node="">
</span><h4 data-dcnode-id="2754"><strong data-dcnode-id="2755"><em data-dcnode-id="2756"><span data-dcnode-id="2757" instrument_node="">Laos climate</span></em></strong></h4><span data-dcnode-id="2753" instrument_node="">
</span><p data-dcnode-id="2751"><span data-dcnode-id="2752" instrument_node="">The climate of Laos is monsoon, subequatorial. The year is clearly divided into a rainy season (May to October) and a dry season (November to April).</span></p><span data-dcnode-id="2750" instrument_node="">
</span><p data-dcnode-id="2748"><span data-dcnode-id="2749" instrument_node="">The highest temperatures are on average in April and May: the heat is up to 35 degrees Celsius, and in May it is also humid. In December and January, the average temperature is 20 degrees Celsius.</span></p><span data-dcnode-id="2747" instrument_node="">
</span><p data-dcnode-id="2745"><span data-dcnode-id="2746" instrument_node="">The situation is slightly different in mountainous regions: there is a lot of precipitation, there are frosts.</span></p><span data-dcnode-id="2744" instrument_node="">
</span><p data-dcnode-id="2742"><span data-dcnode-id="2743" instrument_node="">Thus, if you go to the valley, it is better to do it in November – February, and to visit the mountains – in November – July.</span></p><span data-dcnode-id="2741" instrument_node="">
</span><h4 data-dcnode-id="2737"><strong data-dcnode-id="2738"><em data-dcnode-id="2739"><span data-dcnode-id="2740" instrument_node="">Safety in Laos</span></em></strong></h4><span data-dcnode-id="2736" instrument_node="">
</span><p data-dcnode-id="2734"><span data-dcnode-id="2735" instrument_node="">Despite its bloody history, Laos is now a fairly safe country. The mentality of the local population did not fade after the invasions and disasters, the level of crime did not become critically high. It is worth remembering the basic rules of conduct that will help a traveler avoid danger in Laos:</span></p><span data-dcnode-id="2733" instrument_node="">
</span><ul data-dcnode-id="2718"><li data-dcnode-id="2731"><span data-dcnode-id="2732" instrument_node="">beware of unfavorable areas: there is still theft;</span></li><li data-dcnode-id="2729"><span data-dcnode-id="2730" instrument_node="">carry a photocopy of documents with you;</span></li><li data-dcnode-id="2727"><span data-dcnode-id="2728" instrument_node="">to leave basic values ​​in the hotel;</span></li><li data-dcnode-id="2725"><span data-dcnode-id="2726" instrument_node="">try not to travel near the border with Cambodia without a decent escort;</span></li><li data-dcnode-id="2723"><span data-dcnode-id="2724" instrument_node="">avoid dangerous areas: there are non-mined fields in the country;</span></li><li data-dcnode-id="2721"><span data-dcnode-id="2722" instrument_node="">carry medications for prophylaxis against malaria;</span></li><li data-dcnode-id="2719"><span data-dcnode-id="2720" instrument_node="">drink only bottled water.</span></li></ul><span data-dcnode-id="2717" instrument_node="">
</span><p data-dcnode-id="2715"><span data-dcnode-id="2716" instrument_node="">Unfortunately, due to the history of Laos, full of disasters, the beautiful and mysterious Valley of Jugs, which is under consideration for inclusion in the UNESCO World Heritage List, is now inaccessible to tourists.</span></p><span data-dcnode-id="2714" instrument_node="">
</span><p data-dcnode-id="2712"><span data-dcnode-id="2713" instrument_node="">This valley is a large area covered with thousands of stone vessels, the origin and purpose of which has not yet been established. According to some legends, giants lived here, according to scientists, jugs are vessels for water or the burial of the dead.</span></p><span data-dcnode-id="2711" instrument_node="">
</span><p data-dcnode-id="2709"><span data-dcnode-id="2710" instrument_node="">But at present, you can visit only a small part of this valley, you should definitely do it with a competent guide and in no case visit dangerous, closed areas.</span></p><span data-dcnode-id="2708" instrument_node="">
</span><h4 data-dcnode-id="2704"><strong data-dcnode-id="2705"><em data-dcnode-id="2706"><span data-dcnode-id="2707" instrument_node="">Economic, social and political life of Laos</span></em></strong></h4><span data-dcnode-id="2703" instrument_node="">
</span><p data-dcnode-id="2701"><span data-dcnode-id="2702" instrument_node="">The socio-economic direction of Laos is focused on eliminating the backwardness of the country’s national economy, raising living standards, and reforming small farms. Agriculture employs 80% of the population.</span></p><span data-dcnode-id="2700" instrument_node="">
</span><p data-dcnode-id="2698"><span data-dcnode-id="2699" instrument_node="">The use of market leverage began in the 1980s. The entire banking system has undergone a reformation. The same can be said for taxation. Recently, much attention in the country has begun to be paid to social, labor and legal relations.</span></p><span data-dcnode-id="2697" instrument_node="">
</span><p data-dcnode-id="2695"><span data-dcnode-id="2696" instrument_node="">Among the sectors of the economy, the entrepreneurial direction, the industrial and agricultural sector has strengthened. Inflation has gradually decreased. All these changes were partly due to the inflow of foreign capital into the Lao economy in the form of direct investment. According to the International Monetary Fund, as of 01.01.2020, they amounted to USD 1.128 million. The main investor is Thailand.</span></p><span data-dcnode-id="2694" instrument_node="">
</span><p data-dcnode-id="2692"><span data-dcnode-id="2693" instrument_node="">One of the most problematic economic sectors in Laos is transport. There is no railway connection in the country. Mainly used by road, water transport and air travel. The only international airport is located in the capital of the state.</span></p><span data-dcnode-id="2691" instrument_node="">
</span><p data-dcnode-id="2689"><span data-dcnode-id="2690" instrument_node="">In Laos, telephone communications, a telegraph have been established, computers are widely used, and a post office is functioning.</span></p><span data-dcnode-id="2688" instrument_node="">
</span><p data-dcnode-id="2686"><span data-dcnode-id="2687" instrument_node="">The service sector and tourism began to develop rapidly. The banking system expanded widely, including the Central Bank and its branch network. Foreign trade deserves special attention.</span></p><span data-dcnode-id="2685" instrument_node="">
</span><h4 data-dcnode-id="2681"><strong data-dcnode-id="2682"><em data-dcnode-id="2683"><span data-dcnode-id="2684" instrument_node="">Standards of decency in Laos</span></em></strong></h4><span data-dcnode-id="2680" instrument_node="">
</span><p data-dcnode-id="2678"><span data-dcnode-id="2679" instrument_node="">As in other states, the inhabitants of Laos have developed certain standards of decency.</span></p><span data-dcnode-id="2677" instrument_node="">
</span><p data-dcnode-id="2675"><span data-dcnode-id="2676" instrument_node="">Laos people are very strict about the choice of clothing. It is strictly forbidden to wear too revealing clothes. For example, shorts are only allowed to be worn in a hotel or on the beach.</span></p><span data-dcnode-id="2674" instrument_node="">
</span><p data-dcnode-id="2672"><span data-dcnode-id="2673" instrument_node="">When visiting public places or temples, the length of the skirt / shorts should be such that the ankles are covered. Conservative views on clothing are barely softened only in large cities.</span></p><span data-dcnode-id="2671" instrument_node="">
</span><p data-dcnode-id="2669"><span data-dcnode-id="2670" instrument_node="">Tourists should take this issue seriously, so as not to deserve the indignation of the local population.</span></p><span data-dcnode-id="2668" instrument_node="">
</span><p data-dcnode-id="2666"><span data-dcnode-id="2667" instrument_node="">When talking with someone from Lao, do not try to touch or pat them on the head. This even applies to a child. In these parts of you it will be perceived as a personal insult. It is also considered unacceptable for a man and a woman to show their affection for each other in public.</span></p><span data-dcnode-id="2665" instrument_node="">
</span><p data-dcnode-id="2663"><span data-dcnode-id="2664" instrument_node="">When you are about to greet a stranger, you shouldn’t try to hug or kiss them. It will also be perceived as disrespectful and humiliating.</span></p><span data-dcnode-id="2662" instrument_node="">
</span><p data-dcnode-id="2660"><span data-dcnode-id="2661" instrument_node="">If you want to photograph someone, you should ask the person’s permission to do so. If you receive a refusal, do not try to insist or offer money. They absolutely do not like it.</span></p><span data-dcnode-id="2659" instrument_node="">
</span><p data-dcnode-id="2657"><span data-dcnode-id="2658" instrument_node="">In general, Lao people try to treat everything very calmly, without straining and with a smile.</span></p><span data-dcnode-id="2656" instrument_node="">
</span><p data-dcnode-id="2654"><span data-dcnode-id="2655" instrument_node="">In terms of security in Laos, there is nothing to worry about. This is a very calm and quiet country. Lao people are very fond of tourists and are happy when they visit their homelands. If you want to please the Lao people and earn their favor, keep a close eye on what and how they do, and try to repeat everything exactly.</span></p><span data-dcnode-id="2653" instrument_node="">
</span><p data-dcnode-id="2651"><span data-dcnode-id="2652" instrument_node="">If you happen to be invited to visit someone, never refuse fruit or tea that is offered to you. This will be seen as a lack of courtesy. At least try what is brought to you. Most often, this will be enough for the owners.</span></p><span data-dcnode-id="2650" instrument_node="">
</span><h4 data-dcnode-id="2646"><strong data-dcnode-id="2647"><em data-dcnode-id="2648"><span data-dcnode-id="2649" instrument_node="">Transport prices in Laos</span></em></strong></h4><span data-dcnode-id="2645" instrument_node="">
</span><p data-dcnode-id="2643"><span data-dcnode-id="2644" instrument_node="">Let’s now review some of the basic costs in Laos, as transport after some food or cafe prices:</span></p><span data-dcnode-id="2642" instrument_node="">
</span><p data-dcnode-id="2640"><span data-dcnode-id="2641" instrument_node="">A ready flight from your country to Laos – from $ 400-600</span></p><span data-dcnode-id="2639" instrument_node="">
</span><p data-dcnode-id="2637"><span data-dcnode-id="2638" instrument_node="">Bicycle rental – $ 1/day</span></p><span data-dcnode-id="2636" instrument_node="">
</span><p data-dcnode-id="2634"><span data-dcnode-id="2635" instrument_node="">Motorbike rental – from $ 9/ day. In some cities, the price goes up to $ 20.</span></p><span data-dcnode-id="2633" instrument_node="">
</span><p data-dcnode-id="2631"><span data-dcnode-id="2632" instrument_node="">1 liter of gasoline – $ 1</span></p><span data-dcnode-id="2630" instrument_node="">
</span><p data-dcnode-id="2628"><span data-dcnode-id="2629" instrument_node="">1 liter diesel – $ 1</span></p><span data-dcnode-id="2627" instrument_node="">
</span><p data-dcnode-id="2625"><span data-dcnode-id="2626" instrument_node="">Travel by city bus in Vientiane – $ 0.5</span></p><span data-dcnode-id="2624" instrument_node="">
</span><p data-dcnode-id="2622"><span data-dcnode-id="2623" instrument_node="">A trip by tuk-tuk – they ask tourists even for a short trip from $ 1-1.5, you need to bargain.</span></p><span data-dcnode-id="2621" instrument_node="">
</span><p data-dcnode-id="2619"><span data-dcnode-id="2620" instrument_node="">Bus Vientiane-Luang-Prabang – from $ 50</span></p><span data-dcnode-id="2618" instrument_node="">
</span><p data-dcnode-id="2616"><span data-dcnode-id="2617" instrument_node="">Bus Bangkok-Vientiane – from $ 30</span></p><span data-dcnode-id="2615" instrument_node="">
</span><p data-dcnode-id="2611"><strong data-dcnode-id="2612"><em data-dcnode-id="2613"><span data-dcnode-id="2614" instrument_node="">Food prices in Laos</span></em></strong></p><span data-dcnode-id="2610" instrument_node="">
</span><p data-dcnode-id="2608"><span data-dcnode-id="2609" instrument_node="">The price of food and drinks in shops and supermarkets in Laos:</span></p><span data-dcnode-id="2607" instrument_node="">
</span><p data-dcnode-id="2605"><span data-dcnode-id="2606" instrument_node="">Beer 0.6l. – $ 1.02</span></p><span data-dcnode-id="2604" instrument_node="">
</span><p data-dcnode-id="2602"><span data-dcnode-id="2603" instrument_node="">Local alcohol Champa 0.3l. – $ 0.86</span></p><span data-dcnode-id="2601" instrument_node="">
</span><p data-dcnode-id="2599"><span data-dcnode-id="2600" instrument_node="">Water 1.5l. – $ 0.53</span></p><span data-dcnode-id="2598" instrument_node="">
</span><p data-dcnode-id="2596"><span data-dcnode-id="2597" instrument_node="">Softdrink (Cola, Sprite, etc.) 1.5L. – $ 0.86</span></p><span data-dcnode-id="2595" instrument_node="">
</span><p data-dcnode-id="2593"><span data-dcnode-id="2594" instrument_node="">Softdrink (Cola, Sprite, etc.) 0.5l. – $ 0.42</span></p><span data-dcnode-id="2592" instrument_node="">
</span><p data-dcnode-id="2590"><span data-dcnode-id="2591" instrument_node="">Croissant in a bakery 1pc. – $ 1.07</span></p><span data-dcnode-id="2589" instrument_node="">
</span><p data-dcnode-id="2587"><span data-dcnode-id="2588" instrument_node="">Bread 1 loaf – $ 1.07</span></p><span data-dcnode-id="2586" instrument_node="">
</span><p data-dcnode-id="2584"><span data-dcnode-id="2585" instrument_node="">Mango 1 kg. – $ 2.5</span></p><span data-dcnode-id="2583" instrument_node="">
</span><p data-dcnode-id="2581"><span data-dcnode-id="2582" instrument_node="">Pomelo 1 pc. – $ 2</span></p><span data-dcnode-id="2580" instrument_node="">
</span><p data-dcnode-id="2578"><span data-dcnode-id="2579" instrument_node="">Pitahaya 1 kg. – $ 1.5</span></p><span data-dcnode-id="2577" instrument_node="">
</span><p data-dcnode-id="2575"><span data-dcnode-id="2576" instrument_node="">Mandarins 1 kg. – $ 1.8</span></p><span data-dcnode-id="2574" instrument_node="">
</span><p data-dcnode-id="2572"><span data-dcnode-id="2573" instrument_node="">Potatoes 1 kg. – $ 0.86</span></p><span data-dcnode-id="2571" instrument_node="">
</span><p data-dcnode-id="2569"><span data-dcnode-id="2570" instrument_node="">Lipton black tea 25 sachets – $ 2.02</span></p><span data-dcnode-id="2568" instrument_node="">
</span><p data-dcnode-id="2566"><span data-dcnode-id="2567" instrument_node="">Local coffee beans 400g. – $ 5</span></p><span data-dcnode-id="2565" instrument_node="">
</span><p data-dcnode-id="2563"><span data-dcnode-id="2564" instrument_node="">Fruit prices vary greatly according to the ripening season.</span></p><span data-dcnode-id="2562" instrument_node="">
</span><h4 data-dcnode-id="2558"><strong data-dcnode-id="2559"><em data-dcnode-id="2560"><span data-dcnode-id="2561" instrument_node="">Laos Real Estate</span></em></strong></h4><span data-dcnode-id="2557" instrument_node="">
</span><p data-dcnode-id="2555"><span data-dcnode-id="2556" instrument_node="">Real estate issues are regulated by the laws of the country. Land owned by Laos can be leased for a period not exceeding 30 years. If the site is not used for private construction, but is taken for a business, then a lease period of 50 years is allowed. The possibility of prolongation is not excluded. Rent 1 sq. m. of land can be about $ 10.</span></p><span data-dcnode-id="2554" instrument_node="">
</span><p data-dcnode-id="2552"><span data-dcnode-id="2553" instrument_node="">Real estate prices in Laos are low. For example, a house can be rented for $ 700 a month. Well, you can buy real estate at completely different prices, starting from 10-50 dollars and more. The pricing policy for real estate in Laos is unpredictable. It should be borne in mind that in the absence of funds, it is quite possible to find cheap real estate and be 100% in the win.</span></p><span data-dcnode-id="2551" instrument_node="">
</span><p data-dcnode-id="2549"><span data-dcnode-id="2550" instrument_node="">The unpredictability of property prices can be attributed to an unformed market and a lack of regulatory mechanisms. Moreover, no changes are expected in this area, at least in the next 5 years.</span></p><span data-dcnode-id="2548" instrument_node="">
</span><h4 data-dcnode-id="2544"><strong data-dcnode-id="2545"><em data-dcnode-id="2546"><span data-dcnode-id="2547" instrument_node="">Education in Laos</span></em></strong></h4><span data-dcnode-id="2543" instrument_node="">
</span><p data-dcnode-id="2541"><span data-dcnode-id="2542" instrument_node="">Oddly enough, illiteracy still exists in Laos. In order to eliminate this phenomenon, courses were organized, taught by people who can read well and are fluent in writing. Anyone could attend these courses. More than 750,000 people have been trained.</span></p><span data-dcnode-id="2540" instrument_node="">
</span><p data-dcnode-id="2538"><span data-dcnode-id="2539" instrument_node="">In addition, evening schools were created in Laos, in which about 400 thousand people received knowledge.</span></p><span data-dcnode-id="2537" instrument_node="">
</span><p data-dcnode-id="2535"><span data-dcnode-id="2536" instrument_node="">Teaching in the country is free of charge. In elementary school they study for 5 years, in incomplete (secondary) school – 3 years, complete secondary school – for another 3 years. For social disciplines and the exact sciences, new textbooks are gradually being published or textbooks in an updated edition are issued.</span></p><span data-dcnode-id="2534" instrument_node="">
</span><p data-dcnode-id="2532"><span data-dcnode-id="2533" instrument_node="">The Lao authorities began to pay special attention to the development of vocational education and training of specialists. In this case, the goal is to avoid a shortage of qualified personnel.</span></p><span data-dcnode-id="2531" instrument_node="">
</span><p data-dcnode-id="2529"><span data-dcnode-id="2530" instrument_node="">In connection with this trend, the number of specialized middle-level institutions, vocational schools and institutes is increasing in the country.</span></p><span data-dcnode-id="2528" instrument_node="">
</span><h4 data-dcnode-id="2524"><strong data-dcnode-id="2525"><em data-dcnode-id="2526"><span data-dcnode-id="2527" instrument_node="">Medicine in Laos</span></em></strong></h4><span data-dcnode-id="2523" instrument_node="">
</span><p data-dcnode-id="2521"><span data-dcnode-id="2522" instrument_node="">Unfortunately, the healthcare system in Laos is poor. The hospital business in the country is developing gradually. Some clinics are located exclusively in big cities, and the primary task is to train qualified personnel. There is no maternal and child welfare service in Laos. The main emphasis in clinics is on minimizing infectious diseases.</span></p><span data-dcnode-id="2520" instrument_node="">
</span><p data-dcnode-id="2518"><span data-dcnode-id="2519" instrument_node="">Responsibility for the health of people living in Laos is borne by: the main hospital of Laos (Magasot), a hospital in Vientiane with 100 beds, and several hospitals with 40-50 beds in small provincial towns. In small hospitals, there are hospitals, but medical care from specialists in large clinics is provided only for those citizens who are able to pay for it.</span></p><span data-dcnode-id="2517" instrument_node="">
</span><p data-dcnode-id="2515"><span data-dcnode-id="2516" instrument_node="">A significant advantage of the Lao healthcare system is the presence of the Red Cross and similar voluntary medical organizations. This explains the fact that the provision of medical care in Laos is mainly free of charge.</span></p><span data-dcnode-id="2514" instrument_node="">
</span><p data-dcnode-id="2512"><span data-dcnode-id="2513" instrument_node="">On the whole, there is a serious shortage of high-quality medical equipment and medicines throughout the country. Moreover, this problem also affected private medical institutions.</span></p><span data-dcnode-id="2511" instrument_node="">
</span><p data-dcnode-id="2509"><span data-dcnode-id="2510" instrument_node="">The fact that medical care in the country is not at the proper level is evidenced by the high infant mortality rate, in some regions it reaches 35%, and the short life expectancy of the population is 53 years. Among the most common diseases among children are malaria, frequent cases of pulmonary pneumonia, diarrhea, and a number of others.</span></p><span data-dcnode-id="2508" instrument_node="">
</span><h4 data-dcnode-id="2504"><strong data-dcnode-id="2505"><em data-dcnode-id="2506"><span data-dcnode-id="2507" instrument_node="">Pharmacies in Laos</span></em></strong></h4><span data-dcnode-id="2503" instrument_node="">
</span><p data-dcnode-id="2501"><span data-dcnode-id="2502" instrument_node="">There are not enough pharmacies in Laos. However, they operate on the basis of public hospitals around the clock.</span></p><span data-dcnode-id="2500" instrument_node="">
</span><p data-dcnode-id="2498"><span data-dcnode-id="2499" instrument_node="">At the same time, the prices for medicines in such pharmacies are an order of magnitude lower than in private ones. But private pharmacies are more stocked with drugs and the choice is much wider.</span></p><span data-dcnode-id="2497" instrument_node="">
</span><h4 data-dcnode-id="2493"><strong data-dcnode-id="2494"><em data-dcnode-id="2495"><span data-dcnode-id="2496" instrument_node="">Visas to Laos</span></em></strong></h4><span data-dcnode-id="2492" instrument_node="">
</span><p data-dcnode-id="2490"><span data-dcnode-id="2491" instrument_node="">Many representatives of foreign countries can visit Laos without a visa. This concerns the possibility of a short stay in the country. Some European countries are among these countries in 2021. A tourist trip involves a visa with a maximum period of two months. You should apply for a visa at the Laotian embassy. This can be done both immediately and after arrival in the country.</span></p><span data-dcnode-id="2489" instrument_node="">
</span><p data-dcnode-id="2487"><span data-dcnode-id="2488" instrument_node="">The second option is possible in case of arrival through the airports with their location in Pakse, Vientiane or Luang Prabang. Visa processing on arrival is also possible when crossing the border with Cambodia.</span></p><span data-dcnode-id="2486" instrument_node="">
</span><p data-dcnode-id="2484"><span data-dcnode-id="2485" instrument_node="">However, you cannot move to Laos for permanent residence or for the purpose of employment on a tourist visa. In this case, we are talking about issuing long-term visas, the category of each of which is determined depending on the purpose of the trip.</span></p><span data-dcnode-id="2483" instrument_node="">
</span><h4 data-dcnode-id="2479"><strong data-dcnode-id="2480"><em data-dcnode-id="2481"><span data-dcnode-id="2482" instrument_node="">Types of visas</span></em></strong></h4><span data-dcnode-id="2478" instrument_node="">
</span><p data-dcnode-id="2476"><span data-dcnode-id="2477" instrument_node="">A tourist visa to Lao PDR can be obtained directly at the country’s consulate or at the border upon arrival. With this permission document in hand, you can stay in the country for 30 days.</span></p><span data-dcnode-id="2475" instrument_node="">
</span><p data-dcnode-id="2473"><span data-dcnode-id="2474" instrument_node="">The law allows a double extension of a tourist visa for 15 days. The cost of issuing a document for Europeans is 30 US dollars.</span></p><span data-dcnode-id="2472" instrument_node="">
</span><p data-dcnode-id="2470"><span data-dcnode-id="2471" instrument_node="">Depending on the purpose of the trip, the following types of visas can be issued:</span></p><span data-dcnode-id="2469" instrument_node="">
</span><ul data-dcnode-id="2460"><li data-dcnode-id="2467"><span data-dcnode-id="2468" instrument_node="">Private.</span></li><li data-dcnode-id="2465"><span data-dcnode-id="2466" instrument_node="">Privileged. The period of stay in the country is from half a year to 12 months. Drawn up when implementing projects of a social and social nature. Suitable for delegations where there are agreements regarding the exchange of cultural property.</span></li><li data-dcnode-id="2463"><span data-dcnode-id="2464" instrument_node="">Commercial in nature. The presence of such a visa makes it possible to find a job.</span></li><li data-dcnode-id="2461"><span data-dcnode-id="2462" instrument_node="">Transit. Issued for up to 7 days. A penalty of $ 10 will be charged for each day overdue.</span></li></ul><span data-dcnode-id="2459" instrument_node="">
</span><p data-dcnode-id="2457"><span data-dcnode-id="2458" instrument_node="">The amount of the visa fee may be different and depends on the country from which you plan to leave.</span></p><span data-dcnode-id="2456" instrument_node="">
</span><h4 data-dcnode-id="2452"><strong data-dcnode-id="2453"><em data-dcnode-id="2454"><span data-dcnode-id="2455" instrument_node="">Living standards in Laos</span></em></strong></h4><span data-dcnode-id="2451" instrument_node="">
</span><p data-dcnode-id="2449"><span data-dcnode-id="2450" instrument_node="">Laos is an exotic country neighboring Thailand and Vietnam. Due to the abundance of mountains and dense forests, the population density is insignificant – 17 people per square meter.</span></p><span data-dcnode-id="2448" instrument_node="">
</span><p data-dcnode-id="2446"><span data-dcnode-id="2447" instrument_node="">Vientiane is the capital of a small country where most of the population lives. 1/3 of the population lives on the edge of poverty, the standard of living has not yet reached a decent level.</span></p><span data-dcnode-id="2445" instrument_node="">
</span><p data-dcnode-id="2443"><span data-dcnode-id="2444" instrument_node="">The official language is Lao, but outside the capital, residents speak dialects and ethnic languages. Among the educated population, French and English are spoken.</span></p><span data-dcnode-id="2442" instrument_node="">
</span><p data-dcnode-id="2440"><span data-dcnode-id="2441" instrument_node="">Agriculture is developed in the republic, where 80% of the population is employed.</span></p><span data-dcnode-id="2439" instrument_node="">
</span><p data-dcnode-id="2437"><span data-dcnode-id="2438" instrument_node="">The tourism industry and services are developing rapidly. The average salary is $ 210-220.</span></p><span data-dcnode-id="2436" instrument_node="">
</span><p data-dcnode-id="2434"><span data-dcnode-id="2435" instrument_node="">Comparing the GDP of some European or Asian countries and the tropical republic, the per capita indicator is 7 times lower. At the same time, the citizens of Laos do not need winter clothing, heating or insulation of houses.</span></p><span data-dcnode-id="2433" instrument_node="">
</span><p data-dcnode-id="2431"><span data-dcnode-id="2432" instrument_node="">Almost everyone with an average income is capable of acquiring personal real estate, because the cost of a one-room apartment is several times lower than in other countries.</span></p><span data-dcnode-id="2430" instrument_node="">
</span><p data-dcnode-id="2428"><span data-dcnode-id="2429" instrument_node="">The republic creates the most comfortable conditions for doing business for Western citizens: upon providing all the necessary papers, individual entrepreneurs can freely open a business, hire employees and maintain accountability.</span></p><span data-dcnode-id="2427" instrument_node="">
</span><p data-dcnode-id="2425"><span data-dcnode-id="2426" instrument_node="">Surprisingly, by age standards, cities and villages are inhabited by people under 62 years old, which indicates the minimum number of pensioners.</span></p><span data-dcnode-id="2424" instrument_node="">
</span><p data-dcnode-id="2422"><span data-dcnode-id="2423" instrument_node="">In order to eradicate illiteracy, the government has expanded the educational base: there are technical schools, evening schools, professional courses, institutes.</span></p><span data-dcnode-id="2421" instrument_node="">
</span><p data-dcnode-id="2419"><span data-dcnode-id="2420" instrument_node="">Only two universities graduate pedagogical and medical specialists. An acute shortage of qualified personnel has increased the flow of foreign students.</span></p><span data-dcnode-id="2418" instrument_node="">
</span><h4 data-dcnode-id="2414"><strong data-dcnode-id="2415"><em data-dcnode-id="2416"><span data-dcnode-id="2417" instrument_node="">How to get permanent residence and residence permit for immigrants?</span></em></strong></h4><span data-dcnode-id="2413" instrument_node="">
</span><p data-dcnode-id="2411"><span data-dcnode-id="2412" instrument_node="">It is not so easy to obtain the status of permanent residence in the Laotian republic. Based on the current legislation, applicants can be:</span></p><span data-dcnode-id="2410" instrument_node="">
</span><ul data-dcnode-id="2401"><li data-dcnode-id="2408"><span data-dcnode-id="2409" instrument_node="">foreign citizens who have lived in the country for about 10 years legally, leaving annually for no more than 2 months;</span></li><li data-dcnode-id="2406"><span data-dcnode-id="2407" instrument_node="">specialized qualified specialists, scientists, engineers;</span></li><li data-dcnode-id="2404"><span data-dcnode-id="2405" instrument_node="">foreigners who have made a significant contribution to the development of the republic;</span></li><li data-dcnode-id="2402"><span data-dcnode-id="2403" instrument_node="">foreign businessmen who have lived in the country for more than 5 years.</span></li></ul><span data-dcnode-id="2400" instrument_node="">
</span><p data-dcnode-id="2398"><span data-dcnode-id="2399" instrument_node="">A temporary residence permit is issued to migrants who came to the country on a certain type of visa and can live, find a job, do business, and share cultural experience for 360 days. At the end of the visa, it can be extended for a similar period.</span></p><span data-dcnode-id="2397" instrument_node="">
</span><h4 data-dcnode-id="2393"><strong data-dcnode-id="2394"><em data-dcnode-id="2395"><span data-dcnode-id="2396" instrument_node="">Rules of behavior in Laos</span></em></strong></h4><span data-dcnode-id="2392" instrument_node="">
</span><p data-dcnode-id="2390"><span data-dcnode-id="2391" instrument_node="">Laos has some special unspoken rules of conduct that even foreigners should adhere to:</span></p><span data-dcnode-id="2389" instrument_node="">
</span><ul data-dcnode-id="2376"><li data-dcnode-id="2387"><span data-dcnode-id="2388" instrument_node="">Here it is believed that the soul lives in the head, so you cannot touch this part of the body, especially the head of a child.</span></li><li data-dcnode-id="2385"><span data-dcnode-id="2386" instrument_node="">Women are forbidden to communicate and even more so to touch representatives of monasticism.</span></li><li data-dcnode-id="2383"><span data-dcnode-id="2384" instrument_node="">When entering the temple, you should dress in modest clothes that cover your shoulders and knees, and remove your shoes.</span></li><li data-dcnode-id="2381"><span data-dcnode-id="2382" instrument_node="">You should not show feelings of love in public – hugging, kissing.</span></li><li data-dcnode-id="2379"><span data-dcnode-id="2380" instrument_node="">Away, in order not to offend the owners, you need to accept all the treats.</span></li><li data-dcnode-id="2377"><span data-dcnode-id="2378" instrument_node="">You cannot take pictures of people without their permission – however, this rule works everywhere.</span></li></ul><span data-dcnode-id="2375" instrument_node="">
</span><h4 data-dcnode-id="2371"><strong data-dcnode-id="2372"><em data-dcnode-id="2373"><span data-dcnode-id="2374" instrument_node="">Advantages and disadvantages</span></em></strong></h4><span data-dcnode-id="2370" instrument_node="">
</span><p data-dcnode-id="2368"><span data-dcnode-id="2369" instrument_node="">If you are thinking about moving to Laos – we have collected all the advantages and disadvantages of this direction. The indisputable advantages include:</span></p><span data-dcnode-id="2367" instrument_node="">
</span><ul data-dcnode-id="2350"><li data-dcnode-id="2365"><span data-dcnode-id="2366" instrument_node="">Picturesque nature – rivers, caves, lakes, mountains.</span></li><li data-dcnode-id="2363"><span data-dcnode-id="2364" instrument_node="">A large number of cultural monuments of Buddhism.</span></li><li data-dcnode-id="2361"><span data-dcnode-id="2362" instrument_node="">Favorable weather conditions – it is never cold here, you just have to not choose the rainy season for your trip.</span></li><li data-dcnode-id="2359"><span data-dcnode-id="2360" instrument_node="">Relatively cheap accommodation, food and travel around the country.</span></li><li data-dcnode-id="2357"><span data-dcnode-id="2358" instrument_node="">A small number of tourists, which means that the country has not lost its identity.</span></li><li data-dcnode-id="2355"><span data-dcnode-id="2356" instrument_node="">The good disposition of the Lao people, who treat people from the countries of the former USSR with special warmth. The fact is that the states have developed good relations, many Laotians at one time studied at Soviet universities, and the Russians helped to raise the economy of Laos.</span></li><li data-dcnode-id="2353"><span data-dcnode-id="2354" instrument_node="">Ease of obtaining a visa – for a stay of up to 15 days, it is not needed, and for a longer period, a simplified system operates.</span></li><li data-dcnode-id="2351"><span data-dcnode-id="2352" instrument_node="">Calm, safe environment, almost complete absence of crime.</span></li></ul><span data-dcnode-id="2349" instrument_node="">
</span><p data-dcnode-id="2347"><span data-dcnode-id="2348" instrument_node="">The disadvantages include insufficiently established infrastructure, transport interchanges, medical services, the Internet and mobile communications.&nbsp;</span></p><span data-dcnode-id="2346" instrument_node="">
</span><p data-dcnode-id="2344"><span data-dcnode-id="2345" instrument_node="">Also, Laos does not have sea coasts that attract tourists so much, and therefore the weather can sometimes seem too hot. The prices, although lower than in most countries, are still higher than in Vietnam and Thailand.</span></p><span data-dcnode-id="2343" instrument_node="">
</span><p data-dcnode-id="2340"><strong data-dcnode-id="2341"><span data-dcnode-id="2342" instrument_node="">Pained by financial indecision? Want to invest with Adam?</span></strong></p><span data-dcnode-id="2339" instrument_node="">
