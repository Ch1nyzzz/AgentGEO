</span><meta content="High-altitude pulmonary hypertension (HAPH) is a specific disease affecting populations that live at high elevations. The prevalence of HAPH among those residing at high altitudes needs to be further defined. Whereas reduction in nitric oxide production may be one mechanism for the development of HAPH, the roles of endothelin-1 and prostaglandin I2 pathways in the pathogenesis of HAPH deserve further study.

Although some studies have suggested that genetic factors contribute to the pathogenesis of HAPH, data published to date are insufficient for the identification of a significant number of gene polymorphims in HAPH.

The clinical presentation of HAPH is nonspecific. Exertional dyspnoea is the most common symptom and signs related to right heart failure are common in late stages of HAPH. Echocardiography is the most useful screening tool and right heart catheterisation is the gold standard for the diagnosis of HAPH. The ideal management for HAPH is migration to lower altitudes. Phosphodiesterase 5 is an attractive drug target for the treatment of HAPH.

In addition, acetazolamide is a promising therapeutic agent for high-altitude pulmonary hypertension. To date, no evidence has confirmed whether endothelin-receptor antagonists have efficacy in the treatment of high-altitude pulmonary hypertension." data-dcnode-id="4595" name="DC.Description"><span data-dcnode-id="4594" instrument_node="">

</span><meta content="High-altitude pulmonary hypertension (HAPH) is a specific disease affecting populations that live at high elevations. The prevalence of HAPH among those residing at high altitudes needs to be further defined. Whereas reduction in nitric oxide production may be one mechanism for the development of HAPH, the roles of endothelin-1 and prostaglandin I2 pathways in the pathogenesis of HAPH deserve further study.

Although some studies have suggested that genetic factors contribute to the pathogenesis of HAPH, data published to date are insufficient for the identification of a significant number of gene polymorphims in HAPH.

The clinical presentation of HAPH is nonspecific. Exertional dyspnoea is the most common symptom and signs related to right heart failure are common in late stages of HAPH. Echocardiography is the most useful screening tool and right heart catheterisation is the gold standard for the diagnosis of HAPH. The ideal management for HAPH is migration to lower altitudes. Phosphodiesterase 5 is an attractive drug target for the treatment of HAPH.

In addition, acetazolamide is a promising therapeutic agent for high-altitude pulmonary hypertension. To date, no evidence has confirmed whether endothelin-receptor antagonists have efficacy in the treatment of high-altitude pulmonary hypertension." data-dcnode-id="4459" name="twitter:description"><span data-dcnode-id="4458" instrument_node="">

</span><div class="highwire-markup" data-dcnode-id="1624"><div class="content-block-markup" data-dcnode-id="1625" data-highwire-cite-ref-tooltip-instance="highwire_reflinks_tooltip" xmlns="http://www.w3.org/1999/xhtml" xmlns:xhtml="http://www.w3.org/1999/xhtml"><div class="article fulltext-view" data-dcnode-id="1627"><span class="highwire-journal-article-marker-start" data-dcnode-id="3575"></span><div class="section abstract" data-dcnode-id="3556" id="abstract-1"><h2 data-dcnode-id="3573"><span data-dcnode-id="3574" instrument_node="">Abstract</span></h2><span data-dcnode-id="3572" instrument_node="">
</span><p data-dcnode-id="3567" id="p-1"><span data-dcnode-id="3571" instrument_node="">High-altitude pulmonary hypertension (HAPH) is a specific disease affecting populations that live at high elevations. The prevalence of HAPH among those residing at high altitudes needs to be further defined. Whereas reduction in nitric oxide production may be one mechanism for the development of HAPH, the roles of endothelin-1 and prostaglandin I</span><sub data-dcnode-id="3569"><span data-dcnode-id="3570" instrument_node="">2</span></sub><span data-dcnode-id="3568" instrument_node=""> pathways in the pathogenesis of HAPH deserve further study.</span></p><span data-dcnode-id="3566" instrument_node="">
</span><p data-dcnode-id="3564" id="p-2"><span data-dcnode-id="3565" instrument_node="">Although some studies have suggested that genetic factors contribute to the pathogenesis of HAPH, data published to date are insufficient for the identification of a significant number of gene polymorphims in HAPH.</span></p><span data-dcnode-id="3563" instrument_node="">
</span><p data-dcnode-id="3561" id="p-3"><span data-dcnode-id="3562" instrument_node="">The clinical presentation of HAPH is nonspecific. Exertional dyspnoea is the most common symptom and signs related to right heart failure are common in late stages of HAPH. Echocardiography is the most useful screening tool and right heart catheterisation is the gold standard for the diagnosis of HAPH. The ideal management for HAPH is migration to lower altitudes. Phosphodiesterase 5 is an attractive drug target for the treatment of HAPH.</span></p><span data-dcnode-id="3560" instrument_node="">
</span><p data-dcnode-id="3558" id="p-4"><span data-dcnode-id="3559" instrument_node="">In addition, acetazolamide is a promising therapeutic agent for high-altitude pulmonary hypertension. To date, no evidence has confirmed whether endothelin-receptor antagonists have efficacy in the treatment of high-altitude pulmonary hypertension.</span></p><span data-dcnode-id="3557" instrument_node="">
</span></div><ul class="kwd-group KWD" data-dcnode-id="3537"><li class="kwd" data-dcnode-id="3553"><a class="hw-term hw-article-keyword hw-article-keyword-high-altitude-pulmonary-hypertension" data-dcnode-id="3554" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//err.ersjournals.com/search/%2520text_abstract_title%253AHigh-altitude%252Bpulmonary%252Bhypertension%2520text_abstract_title_flags%253Amatch-phrase%2520sort%253Apublication-date" rel="nofollow"><span data-dcnode-id="3555" instrument_node="">High-altitude pulmonary hypertension</span></a></li><li class="kwd" data-dcnode-id="3550"><a class="hw-term hw-article-keyword hw-article-keyword-hypoxia-inducible-factor-1" data-dcnode-id="3551" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//err.ersjournals.com/search/%2520text_abstract_title%253Ahypoxia-inducible%252Bfactor-1%2520text_abstract_title_flags%253Amatch-phrase%2520sort%253Apublication-date" rel="nofollow"><span data-dcnode-id="3552" instrument_node="">hypoxia-inducible factor-1</span></a></li><li class="kwd" data-dcnode-id="3547"><a class="hw-term hw-article-keyword hw-article-keyword-nitric-oxide" data-dcnode-id="3548" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//err.ersjournals.com/keyword/nitric-oxide" rel="nofollow"><span data-dcnode-id="3549" instrument_node="">nitric oxide</span></a></li><li class="kwd" data-dcnode-id="3544"><a class="hw-term hw-article-keyword hw-article-keyword-phosphodiesterase-inhibitors" data-dcnode-id="3545" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//err.ersjournals.com/search/%2520text_abstract_title%253Aphosphodiesterase%252Binhibitors%2520text_abstract_title_flags%253Amatch-phrase%2520sort%253Apublication-date" rel="nofollow"><span data-dcnode-id="3546" instrument_node="">phosphodiesterase inhibitors</span></a></li><li class="kwd" data-dcnode-id="3541"><a class="hw-term hw-article-keyword hw-article-keyword-pulmonary-vasoconstriction" data-dcnode-id="3542" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//err.ersjournals.com/search/%2520text_abstract_title%253Apulmonary%252Bvasoconstriction%2520text_abstract_title_flags%253Amatch-phrase%2520sort%253Apublication-date" rel="nofollow"><span data-dcnode-id="3543" instrument_node="">pulmonary vasoconstriction</span></a></li><li class="kwd" data-dcnode-id="3538"><a class="hw-term hw-article-keyword hw-article-keyword-right-heart-catheterisation" data-dcnode-id="3539" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//err.ersjournals.com/search/%2520text_abstract_title%253Aright%252Bheart%252Bcatheterisation%2520text_abstract_title_flags%253Amatch-phrase%2520sort%253Apublication-date" rel="nofollow"><span data-dcnode-id="3540" instrument_node="">right heart catheterisation</span></a></li></ul><div class="section" data-dcnode-id="3520" id="sec-1"><span data-dcnode-id="3536" instrument_node="">
</span><p data-dcnode-id="3531" id="p-5"><span data-dcnode-id="3535" instrument_node="">High-altitude pulmonary hypertension (HAPH) due to chronic exposure to high altitude is a designated subset of pulmonary hypertension (PH) according to the third clinical classification of PH, which was approved during a conference in 2003 in Venice, Italy [</span><a class="xref-bibr" data-dcnode-id="3533" href="#ref-1" id="xref-ref-1-1"><span data-dcnode-id="3534" instrument_node="">1</span></a><span data-dcnode-id="3532" instrument_node="">].</span></p><span data-dcnode-id="3530" instrument_node="">
</span><p data-dcnode-id="3522" id="p-6"><span data-dcnode-id="3529" instrument_node="">It is estimated that more than 140 million people live 2,500 m above sea level, and the number of temporary visitors to mountains is close to 40 million [</span><a class="xref-bibr" data-dcnode-id="3527" href="#ref-2" id="xref-ref-2-1"><span data-dcnode-id="3528" instrument_node="">2</span></a><span data-dcnode-id="3526" instrument_node="">, </span><a class="xref-bibr" data-dcnode-id="3524" href="#ref-3" id="xref-ref-3-1"><span data-dcnode-id="3525" instrument_node="">3</span></a><span data-dcnode-id="3523" instrument_node="">]. Due to the substantial population exposed to the effects of high altitude, HAPH has become a public health problem in mountainous regions throughout the world. There are three specific locations where high-altitude studies have recently been performed: 1) the Himalayas of Asia; 2) the Andes of South America; and 3) the Rocky Mountains of North America. The present review will focus on the epidemiology, pathophysiology, pathogenesis, clinical characteristics and treatment of HAPH.</span></p><span data-dcnode-id="3521" instrument_node="">
</span></div><div class="section" data-dcnode-id="3473" id="sec-2"><span data-dcnode-id="3519" instrument_node="">
</span><h2 data-dcnode-id="3517"><span data-dcnode-id="3518" instrument_node="">DEFINITION</span></h2><span data-dcnode-id="3516" instrument_node="">
</span><p data-dcnode-id="3495" id="p-7"><span data-dcnode-id="3515" instrument_node="">HAPH is a clinical syndrome seen in adults and children residing in high-altitude regions. As chronic mountain syndrome (CMS) is characterised by severe hypoxaemia, excessive polycythaemia and marked PH [</span><a class="xref-bibr" data-dcnode-id="3513" href="#ref-4" id="xref-ref-4-1"><span data-dcnode-id="3514" instrument_node="">4</span></a><span data-dcnode-id="3512" instrument_node="">], HAPH is regarded as an important subset of CMS. However, the definition and diagnostic criteria of HAPH remain somewhat vague. According to the 2003 conference on PH, HAPH is classified in the third group of PH (table 1</span><a class="xref-down-link" data-dcnode-id="3509" href="#T1" id="xref-table-wrap-1-1"><span data-dcnode-id="3510"><span data-dcnode-id="3511" instrument_node="">⇓</span></span></a><span data-dcnode-id="3508" instrument_node="">) [</span><a class="xref-bibr" data-dcnode-id="3506" href="#ref-1" id="xref-ref-1-2"><span data-dcnode-id="3507" instrument_node="">1</span></a><span data-dcnode-id="3505" instrument_node="">]. Thus, right heart catheterisation is required to establish the diagnosis of HAPH (PH is defined by a mean pulmonary artery pressure (</span><em data-dcnode-id="3503"><span data-dcnode-id="3504" instrument_node="">P̄</span></em><span data-dcnode-id="3502" instrument_node=""> </span><sub data-dcnode-id="3500"><span data-dcnode-id="3501" instrument_node="">pa</span></sub><span data-dcnode-id="3499" instrument_node="">) of &gt;25 mmHg at rest or &gt;30 mmHg with exercise) [</span><a class="xref-bibr" data-dcnode-id="3497" href="#ref-5" id="xref-ref-5-1"><span data-dcnode-id="3498" instrument_node="">5</span></a><span data-dcnode-id="3496" instrument_node="">].</span></p><div class="table pos-float" data-dcnode-id="3475" id="T1"><div class="table-inline table-callout-links" data-dcnode-id="3484"><div class="callout" data-dcnode-id="3485"><span data-dcnode-id="3493"><span data-dcnode-id="3494" instrument_node="">View this table:</span></span><ul class="callout-links" data-dcnode-id="3486"><li class="view-inline first" data-dcnode-id="3490"><a class="table-expand-inline highwireTablesMarkupProcessor-processed" data-dcnode-id="3491" data-hide-link-title="0" data-icon-position="" data-table-url="/highwire/markup/11528/expansion?postprocessors=highwire_tables%2Chighwire_reclass%2Chighwire_figures%2Chighwire_math%2Chighwire_inline_linked_media%2Chighwire_embed&amp;table-expand-inline=1" href="#%23"><span data-dcnode-id="3492" instrument_node="">View inline</span></a></li><li class="view-popup last" data-dcnode-id="3487"><a class="colorbox colorbox-load table-expand-popup init-colorbox-processed cboxElement" data-dcnode-id="3488" data-hide-link-title="0" data-icon-position="" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//err.ersjournals.com/highwire/markup/11528/expansion%3Fwidth%3D1000%26height%3D500%26iframe%3Dtrue%26postprocessors%3Dhighwire_tables%252Chighwire_reclass%252Chighwire_figures%252Chighwire_math%252Chighwire_inline_linked_media%252Chighwire_embed" rel="gallery-fragment-tables"><span data-dcnode-id="3489" instrument_node="">View popup</span></a></li></ul></div></div><div class="table-caption" data-dcnode-id="3476"><span class="table-label" data-dcnode-id="3482"><span data-dcnode-id="3483" instrument_node="">Table. 1—</span></span><span data-dcnode-id="3481" instrument_node="">
</span><p class="first-child" data-dcnode-id="3479" id="p-31"><span data-dcnode-id="3480" instrument_node="">Revised clinical classification of pulmonary hypertension(PH)</span></p><span data-dcnode-id="3478" instrument_node="">
</span><div class="sb-div caption-clear" data-dcnode-id="3477"></div></div></div><span data-dcnode-id="3474" instrument_node="">
</span></div><div class="section" data-dcnode-id="3403" id="sec-3"><span data-dcnode-id="3472" instrument_node="">
</span><h2 data-dcnode-id="3470"><span data-dcnode-id="3471" instrument_node="">EPIDEMIOLOGY</span></h2><span data-dcnode-id="3469" instrument_node="">
</span><p data-dcnode-id="3467" id="p-8"><span data-dcnode-id="3468" instrument_node="">Although HAPH is not a rare disorder in high-altitude residents and systolic pulmonary pressure can be evaluated easily, PH is infrequently noted in most CMS studies. As a result, the prevalence of HAPH among general highland residents is still unknown.</span></p><span data-dcnode-id="3466" instrument_node="">
</span><p data-dcnode-id="3432" id="p-9"><span data-dcnode-id="3465" instrument_node="">A</span><span class="sc" data-dcnode-id="3463"><span data-dcnode-id="3464" instrument_node="">ldashev </span></span><em data-dcnode-id="3461"><span data-dcnode-id="3462" instrument_node="">et al.</span></em><span data-dcnode-id="3460" instrument_node=""> [</span><a class="xref-bibr" data-dcnode-id="3458" href="#ref-6" id="xref-ref-6-1"><span data-dcnode-id="3459" instrument_node="">6</span></a><span data-dcnode-id="3457" instrument_node="">] surveyed the prevalence of HAPH in 741 high-altitude permanent inhabitants in a Kyrgyz population and in 2002 reported that ECG signs of cor pulmonale were presented in 23% of males and 6% of females (p&lt;0.0001). In total, 11 subjects (10 males and one female) from this cohort were further studied by right heart catheterisation. The </span><em data-dcnode-id="3455"><span data-dcnode-id="3456" instrument_node="">P̄</span></em><span data-dcnode-id="3454" instrument_node=""> </span><sub data-dcnode-id="3452"><span data-dcnode-id="3453" instrument_node="">pa</span></sub><span data-dcnode-id="3451" instrument_node=""> in this subgroup was 31.6±3.9 mmHg (range 20–64 mmHg). A resting </span><em data-dcnode-id="3449"><span data-dcnode-id="3450" instrument_node="">P̄</span></em><span data-dcnode-id="3448" instrument_node=""> </span><sub data-dcnode-id="3446"><span data-dcnode-id="3447" instrument_node="">pa</span></sub><span data-dcnode-id="3445" instrument_node=""> of &gt;25 mmHg was detected in eight subjects. However, all subjects had a pulmonary vascular resistance of &gt;200 dyn·s·m</span><sup data-dcnode-id="3443"><span data-dcnode-id="3444" instrument_node="">−5</span></sup><span data-dcnode-id="3442" instrument_node=""> (mean±</span><span class="sc" data-dcnode-id="3440"><span data-dcnode-id="3441" instrument_node="">sd</span></span><span data-dcnode-id="3439" instrument_node=""> 465±62 dyn·s·m</span><sup data-dcnode-id="3437"><span data-dcnode-id="3438" instrument_node="">−5</span></sup><span data-dcnode-id="3436" instrument_node="">, range 283–925 dyn·s·m</span><sup data-dcnode-id="3434"><span data-dcnode-id="3435" instrument_node="">−5</span></sup><span data-dcnode-id="3433" instrument_node="">).</span></p><span data-dcnode-id="3431" instrument_node="">
</span><p data-dcnode-id="3405" id="p-10"><span data-dcnode-id="3430" instrument_node="">Several studies have shown a prevalence of HAPH between 5 and 18% in the population living at ≥3,200 m on the Altiplano in South America [</span><a class="xref-bibr" data-dcnode-id="3428" href="#ref-7" id="xref-ref-7-1"><span data-dcnode-id="3429" instrument_node="">7</span></a><span data-dcnode-id="3427" instrument_node="">, </span><a class="xref-bibr" data-dcnode-id="3425" href="#ref-8" id="xref-ref-8-1"><span data-dcnode-id="3426" instrument_node="">8</span></a><span data-dcnode-id="3424" instrument_node="">]. W</span><span class="sc" data-dcnode-id="3422"><span data-dcnode-id="3423" instrument_node="">u</span></span><span data-dcnode-id="3421" instrument_node=""> and G</span><span class="sc" data-dcnode-id="3419"><span data-dcnode-id="3420" instrument_node="">e</span></span><span data-dcnode-id="3418" instrument_node=""> </span><a class="xref-bibr" data-dcnode-id="3416" href="#ref-9" id="xref-ref-9-1"><span data-dcnode-id="3417" instrument_node="">9</span></a><span data-dcnode-id="3415" instrument_node="">] reported that in the Qinghai Province of China HAPH is more common in children than adults and the enhanced incidence of HAPH with increasing altitude is more pronounced in children than adults. However, fewer HAPH patients were found among both children and adults in a population of Tibetan natives [</span><a class="xref-bibr" data-dcnode-id="3413" href="#ref-9" id="xref-ref-9-2"><span data-dcnode-id="3414" instrument_node="">9</span></a><span data-dcnode-id="3412" instrument_node="">]. In contrast, a study by C</span><span class="sc" data-dcnode-id="3410"><span data-dcnode-id="3411" instrument_node="">hen</span></span><span data-dcnode-id="3409" instrument_node=""> [</span><a class="xref-bibr" data-dcnode-id="3407" href="#ref-10" id="xref-ref-10-1"><span data-dcnode-id="3408" instrument_node="">10</span></a><span data-dcnode-id="3406" instrument_node="">] in Tibet on 300 adult HAPH patients (289 males and 11 females) disclosed evidence of severe PH and enlargement of right or both ventricles as shown by ECG and chest radiographic examination. Furthermore, PH was found to be a common feature of high-altitude heart diseases.</span></p><span data-dcnode-id="3404" instrument_node="">
</span></div><div class="section" data-dcnode-id="3342" id="sec-4"><span data-dcnode-id="3402" instrument_node="">
</span><h2 data-dcnode-id="3400"><span data-dcnode-id="3401" instrument_node="">PATHOLOGY</span></h2><span data-dcnode-id="3399" instrument_node="">
</span><p data-dcnode-id="3376" id="p-11"><span data-dcnode-id="3398" instrument_node="">HAPH is characterised by increased pulmonary vascular resistance secondary to hypoxia-induced pulmonary vasoconstriction and vascular remodelling of pulmonary arterioles [</span><a class="xref-bibr" data-dcnode-id="3396" href="#ref-11" id="xref-ref-11-1"><span data-dcnode-id="3397" instrument_node="">11</span></a><span data-dcnode-id="3395" instrument_node="">, </span><a class="xref-bibr" data-dcnode-id="3393" href="#ref-12" id="xref-ref-12-1"><span data-dcnode-id="3394" instrument_node="">12</span></a><span data-dcnode-id="3392" instrument_node="">]. The vascular alterations involve all elements of the vessel wall and include endothelial dysfunction, extension of smooth muscle into previously non-muscular vessels and adventitial thickening [</span><a class="xref-bibr" data-dcnode-id="3390" href="#ref-13" id="xref-ref-13-1"><span data-dcnode-id="3391" instrument_node="">13</span></a><span data-dcnode-id="3389" instrument_node="">, </span><a class="xref-bibr" data-dcnode-id="3387" href="#ref-14" id="xref-ref-14-1"><span data-dcnode-id="3388" instrument_node="">14</span></a><span data-dcnode-id="3386" instrument_node="">]. Sites of hypoxic pulmonary vasoconstriction are small pulmonary arterioles and veins with a diameter of &lt;900 μm. Venous changes account for ∼20% of the total increase in pulmonary vascular resistance caused by hypoxia [</span><a class="xref-bibr" data-dcnode-id="3384" href="#ref-7" id="xref-ref-7-2"><span data-dcnode-id="3385" instrument_node="">7</span></a><span data-dcnode-id="3383" instrument_node="">, </span><a class="xref-bibr" data-dcnode-id="3381" href="#ref-8" id="xref-ref-8-2"><span data-dcnode-id="3382" instrument_node="">8</span></a><span data-dcnode-id="3380" instrument_node="">]. The result of these changes is an increased pressure load on the right ventricle leading to reduced exercise capacity and premature death from right ventricular failure. The structural changes in the pulmonary vasculature are due, at least in part, to hypoxia-associated smooth muscle cell proliferation and, together with increased pulmonary vascular tone, represent targets for therapeutic intervention [</span><a class="xref-bibr" data-dcnode-id="3378" href="#ref-6" id="xref-ref-6-2"><span data-dcnode-id="3379" instrument_node="">6</span></a><span data-dcnode-id="3377" instrument_node="">].</span></p><span data-dcnode-id="3375" instrument_node="">
</span><p data-dcnode-id="3344" id="p-12"><span data-dcnode-id="3374" instrument_node="">Histological examination of the pulmonary vessels in high-altitude residents who died from causes other than CMS showed persistence of the typical fetal patterns (thickened media) [</span><a class="xref-bibr" data-dcnode-id="3372" href="#ref-15" id="xref-ref-15-1"><span data-dcnode-id="3373" instrument_node="">15</span></a><span data-dcnode-id="3371" instrument_node="">, </span><a class="xref-bibr" data-dcnode-id="3369" href="#ref-16" id="xref-ref-16-1"><span data-dcnode-id="3370" instrument_node="">16</span></a><span data-dcnode-id="3368" instrument_node="">]. The fact that high altitude-induced changes of the pulmonary vasculature and right heart are reversible upon relocation to a lower altitude suggests a rapid remodelling process of the pulmonary vessels in response to changes in atmospheric oxygen content [</span><a class="xref-bibr" data-dcnode-id="3366" href="#ref-17" id="xref-ref-17-1"><span data-dcnode-id="3367" instrument_node="">17</span></a><span data-dcnode-id="3365" instrument_node="">]. Moreover, the fact that at high altitude supplemental oxygen significantly decreases pulmonary arterial pressure (</span><em data-dcnode-id="3363"><span data-dcnode-id="3364" instrument_node="">P</span></em><sub data-dcnode-id="3361"><span data-dcnode-id="3362" instrument_node="">pa</span></sub><span data-dcnode-id="3360" instrument_node="">), both in acclimatised healthy subjects and long-term high-altitude residents, also supports this remodeling concept [</span><a class="xref-bibr" data-dcnode-id="3358" href="#ref-10" id="xref-ref-10-2"><span data-dcnode-id="3359" instrument_node="">10</span></a><span data-dcnode-id="3357" instrument_node="">, </span><a class="xref-bibr" data-dcnode-id="3355" href="#ref-18" id="xref-ref-18-1"><span data-dcnode-id="3356" instrument_node="">18</span></a><span data-dcnode-id="3354" instrument_node="">]. The study by L</span><span class="sc" data-dcnode-id="3352"><span data-dcnode-id="3353" instrument_node="">i</span></span><span data-dcnode-id="3351" instrument_node=""> and S</span><span class="sc" data-dcnode-id="3349"><span data-dcnode-id="3350" instrument_node="">ui</span></span><span data-dcnode-id="3348" instrument_node=""> [</span><a class="xref-bibr" data-dcnode-id="3346" href="#ref-19" id="xref-ref-19-1"><span data-dcnode-id="3347" instrument_node="">19</span></a><span data-dcnode-id="3345" instrument_node="">] reported autopsy results of 20 adults and 100 infants from Tibet who had died of HAPH. The major findings included dilatation of the pulmonary artery trunk, atheromas and thrombosis of the pulmonary artery, and hypertrophy and dilation of the right ventricle and right atrium. Hypertrophy of both ventricles was also found in some cases. Compared with the normal age-matched controls, the ratio of right to left ventricular weight of these patients was significantly greater and the weight of the right ventricle even exceeded the left ventricle in some cases. Severe medial hypertrophy of the small pulmonary arteries with crenation of the elastic laminae was the most significant histological finding in the pulmonary vasculature.</span></p><span data-dcnode-id="3343" instrument_node="">
</span></div><div class="section" data-dcnode-id="3306" id="sec-5"><span data-dcnode-id="3341" instrument_node="">
</span><h2 data-dcnode-id="3339"><span data-dcnode-id="3340" instrument_node="">PATHOPHYSIOLOGY</span></h2><span data-dcnode-id="3338" instrument_node="">
</span><p data-dcnode-id="3308" id="p-13"><span data-dcnode-id="3337" instrument_node="">Sustained alveolar hypoxia, such as that experienced by high-altitude residents, has a marked physiological impact on the pulmonary vasculature. The haemodynamic outcome (</span><em data-dcnode-id="3335"><span data-dcnode-id="3336" instrument_node="">i.e.</span></em><span data-dcnode-id="3334" instrument_node=""> increased </span><em data-dcnode-id="3332"><span data-dcnode-id="3333" instrument_node="">P</span></em><sub data-dcnode-id="3330"><span data-dcnode-id="3331" instrument_node="">pa</span></sub><span data-dcnode-id="3329" instrument_node="">) is due to enhanced pulmonary vasoconstriction and pulmonary vascular remodelling, both of which cause reduction of the vascular lumen diameter and an increase in pulmonary vascular resistance [</span><a class="xref-bibr" data-dcnode-id="3327" href="#ref-11" id="xref-ref-11-2"><span data-dcnode-id="3328" instrument_node="">11</span></a><span data-dcnode-id="3326" instrument_node="">, </span><a class="xref-bibr" data-dcnode-id="3324" href="#ref-12" id="xref-ref-12-2"><span data-dcnode-id="3325" instrument_node="">12</span></a><span data-dcnode-id="3323" instrument_node="">]. In rats exposed to hypoxia, pre-capillary vessels of a diameter of ∼25 mm, which normally do not have smooth muscle cells, begin to generate from adventitial fibroblasts within 24 h [</span><a class="xref-bibr" data-dcnode-id="3321" href="#ref-20" id="xref-ref-20-1"><span data-dcnode-id="3322" instrument_node="">20</span></a><span data-dcnode-id="3320" instrument_node="">]. Light microscopic examination of non-muscular arterioles after exposure to hypoxia shows that smooth muscle begins to appear by day 2 at simulated altitude, with the proportion of muscularised arterioles corresponding to the increasing </span><em data-dcnode-id="3318"><span data-dcnode-id="3319" instrument_node="">P</span></em><sub data-dcnode-id="3316"><span data-dcnode-id="3317" instrument_node="">pa</span></sub><span data-dcnode-id="3315" instrument_node=""> [</span><a class="xref-bibr" data-dcnode-id="3313" href="#ref-21" id="xref-ref-21-1"><span data-dcnode-id="3314" instrument_node="">21</span></a><span data-dcnode-id="3312" instrument_node="">, </span><a class="xref-bibr" data-dcnode-id="3310" href="#ref-22" id="xref-ref-22-1"><span data-dcnode-id="3311" instrument_node="">22</span></a><span data-dcnode-id="3309" instrument_node="">]. Interestingly, these previous studies show that after returning to normoxia, smooth muscle cells persisted in normally non-muscularised arterioles, suggesting that the histological changes may persist for a very long time after chronic exposure to hypoxia. If confirmed in humans, these findings suggest that hypoxia-associated smooth muscle proliferation in originally weakly muscularised arterioles and normally non-muscular pulmonary vessels is likely to be a major pathophysiological mechanism for the development of HAPH.</span></p><span data-dcnode-id="3307" instrument_node="">
</span></div><div class="section" data-dcnode-id="3254" id="sec-6"><span data-dcnode-id="3305" instrument_node="">
</span><h2 data-dcnode-id="3303"><span data-dcnode-id="3304" instrument_node="">PATHOGENESIS</span></h2><span data-dcnode-id="3302" instrument_node="">
</span><p data-dcnode-id="3277" id="p-14"><span data-dcnode-id="3301" instrument_node="">The biochemical mechanisms underlying the pathogenesis of HAPH are poorly understood, but a reduction in nitric oxide (NO) production is thought to play a role [</span><a class="xref-bibr" data-dcnode-id="3299" href="#ref-23" id="xref-ref-23-1"><span data-dcnode-id="3300" instrument_node="">23</span></a><span data-dcnode-id="3298" instrument_node="">]. Animal studies showed that the absence of endothelial NO synthase increased susceptibility to HAPH [</span><a class="xref-bibr" data-dcnode-id="3296" href="#ref-24" id="xref-ref-24-1"><span data-dcnode-id="3297" instrument_node="">24</span></a><span data-dcnode-id="3295" instrument_node="">]. A</span><span class="sc" data-dcnode-id="3293"><span data-dcnode-id="3294" instrument_node="">nand</span></span><span data-dcnode-id="3292" instrument_node=""> </span><em data-dcnode-id="3290"><span data-dcnode-id="3291" instrument_node="">et al.</span></em><span data-dcnode-id="3289" instrument_node=""> [</span><a class="xref-bibr" data-dcnode-id="3287" href="#ref-25" id="xref-ref-25-1"><span data-dcnode-id="3288" instrument_node="">25</span></a><span data-dcnode-id="3286" instrument_node="">] demonstrated that inhaled NO can cause an acute decrease in </span><em data-dcnode-id="3284"><span data-dcnode-id="3285" instrument_node="">P</span></em><sub data-dcnode-id="3282"><span data-dcnode-id="3283" instrument_node="">pa</span></sub><span data-dcnode-id="3281" instrument_node="">, intrapulmonary shunting and improvement in oxygenation in high-altitude pulmonary oedema patients. The roles of endothelin-1 and prostaglandin I</span><sub data-dcnode-id="3279"><span data-dcnode-id="3280" instrument_node="">2</span></sub><span data-dcnode-id="3278" instrument_node=""> pathways in the pathogenesis of HAPH are still not well characterised.</span></p><span data-dcnode-id="3276" instrument_node="">
</span><p data-dcnode-id="3256" id="p-15"><span data-dcnode-id="3275" instrument_node="">In the pulmonary vasculature, it appears that transmembrane ion flux plays an important role in controlling the cellular processes that underlie both vasoconstriction and medial hypertrophy and hyperplasia during hypoxic exposure [</span><a class="xref-bibr" data-dcnode-id="3273" href="#ref-26" id="xref-ref-26-1"><span data-dcnode-id="3274" instrument_node="">26</span></a><span data-dcnode-id="3272" instrument_node="">]. Alteration in the transport of K</span><sup data-dcnode-id="3270"><span data-dcnode-id="3271" instrument_node="">+</span></sup><span data-dcnode-id="3269" instrument_node=""> and Ca</span><sup data-dcnode-id="3267"><span data-dcnode-id="3268" instrument_node="">2+</span></sup><span data-dcnode-id="3266" instrument_node=""> through their respective ion channels modulates these processes by affecting cell volume, membrane potential, cytosolic Ca</span><sup data-dcnode-id="3264"><span data-dcnode-id="3265" instrument_node="">2+</span></sup><span data-dcnode-id="3263" instrument_node=""> concentration, gene transcription, apoptosis and cell-cycle progression. Precisely how K</span><sup data-dcnode-id="3261"><span data-dcnode-id="3262" instrument_node="">+</span></sup><span data-dcnode-id="3260" instrument_node=""> and Ca</span><sup data-dcnode-id="3258"><span data-dcnode-id="3259" instrument_node="">2+</span></sup><span data-dcnode-id="3257" instrument_node=""> channels “sense” changes in oxygen tension or how their activity and expression somehow “adapt” at higher altitudes is unclear. Although pulmonary physiologists are attempting to define this mechanism, it is becoming increasingly apparent that ion channels themselves are probably not the actual oxygen sensors.</span></p><span data-dcnode-id="3255" instrument_node="">
</span></div><div class="section" data-dcnode-id="3228" id="sec-7"><span data-dcnode-id="3253" instrument_node="">
</span><h2 data-dcnode-id="3251"><span data-dcnode-id="3252" instrument_node="">GENETICS</span></h2><span data-dcnode-id="3250" instrument_node="">
</span><p data-dcnode-id="3230" id="p-16"><span data-dcnode-id="3249" instrument_node="">It is possible that individuals who develop high-altitude PH share common and, as yet, unidentified genes that influence the pulmonary arteriolar and/or venous response to hypoxia and the generation of smooth muscle cells from adventitial fibroblasts in weakly and non-muscularised pulmonary vessels. Previous studies have shown that Tibetan-native Chinese, compared to Han Chinese or South American high-altitude natives, have a remarkable lack of muscularisation of pulmonary arteries, and lower hypoxic pulmonary vasoconstrictive response and haemoglobin concentration [</span><a class="xref-bibr" data-dcnode-id="3247" href="#ref-27" id="xref-ref-27-1"><span data-dcnode-id="3248" instrument_node="">27</span></a><span data-dcnode-id="3246" instrument_node="">]. This suggests that Tibetans’ protection from high altitude-related illnesses might be due to genetic factors. L</span><span class="sc" data-dcnode-id="3244"><span data-dcnode-id="3245" instrument_node="">eón</span></span><span data-dcnode-id="3243" instrument_node="">-V</span><span class="sc" data-dcnode-id="3241"><span data-dcnode-id="3242" instrument_node="">elarde</span></span><span data-dcnode-id="3240" instrument_node=""> and M</span><span class="sc" data-dcnode-id="3238"><span data-dcnode-id="3239" instrument_node="">ejÍa</span></span><span data-dcnode-id="3237" instrument_node=""> [</span><a class="xref-bibr" data-dcnode-id="3235" href="#ref-28" id="xref-ref-28-1"><span data-dcnode-id="3236" instrument_node="">28</span></a><span data-dcnode-id="3234" instrument_node="">] summarised the available data on genes known to be regulated by hypoxia-inducible factor-1 and/or by hypoxia that have been studied in populations from high-altitude regions suffering from HAPH. Even though some alleles are more prevalent (G allele of endothelial NO synthase polymorphism Glu298Asp in Sherpas and angiotensin-converting enzyme (ACE)I allele in HAPH Kyrgyz) or less prevalent (ACE D allele in high-altitude Andeans) in the different high-altitude populations, data published to date are inconclusive regarding these gene polymorphisms in HAPH [</span><a class="xref-bibr" data-dcnode-id="3232" href="#ref-28" id="xref-ref-28-2"><span data-dcnode-id="3233" instrument_node="">28</span></a><span data-dcnode-id="3231" instrument_node="">].</span></p><span data-dcnode-id="3229" instrument_node="">
</span></div><div class="section" data-dcnode-id="3089" id="sec-8"><span data-dcnode-id="3227" instrument_node="">
</span><h2 data-dcnode-id="3225"><span data-dcnode-id="3226" instrument_node="">CLINICAL PRESENTATIONS</span></h2><span data-dcnode-id="3224" instrument_node="">
</span><div class="subsection" data-dcnode-id="3210" id="sec-9"><span data-dcnode-id="3223" instrument_node="">
</span><h3 data-dcnode-id="3221"><span data-dcnode-id="3222" instrument_node="">Symptoms</span></h3><span data-dcnode-id="3220" instrument_node="">
</span><p data-dcnode-id="3212" id="p-17"><span data-dcnode-id="3219" instrument_node="">Polycythaemia, hypoxaemia and pulmonary arterial hypertension (PAH) are principal characteristics of CMS. It is highly intriguing that PAH has not been quantified as part of the proposed definition of CMS [</span><a class="xref-bibr" data-dcnode-id="3217" href="#ref-29" id="xref-ref-29-1"><span data-dcnode-id="3218" instrument_node="">29</span></a><span data-dcnode-id="3216" instrument_node="">]. At an early stage, PH may be asymptomatic but, as the condition progresses, exertional dyspnoea becomes the most frequent presenting symptom. Moreover, fatigue, weakness, anginal chest pain, syncope and exercise intolerance are also common complaints. In addition to these symptoms of PH, HAPH patients may also manifest common symptoms of CMS, such as headache, dizziness, insomnia, cognitive dysfunction, somnolence, slowed mental function, confusion and impaired memory [</span><a class="xref-bibr" data-dcnode-id="3214" href="#ref-30" id="xref-ref-30-1"><span data-dcnode-id="3215" instrument_node="">30</span></a><span data-dcnode-id="3213" instrument_node="">].</span></p><span data-dcnode-id="3211" instrument_node="">
</span></div><span data-dcnode-id="3209" instrument_node="">
</span><div class="subsection" data-dcnode-id="3192" id="sec-10"><span data-dcnode-id="3208" instrument_node="">
</span><h3 data-dcnode-id="3206"><span data-dcnode-id="3207" instrument_node="">Physical examination</span></h3><span data-dcnode-id="3205" instrument_node="">
</span><p data-dcnode-id="3194" id="p-18"><span data-dcnode-id="3204" instrument_node="">Episodes suggestive of right heart failure with dyspnoea, cough, turgid jugular veins and peripheral oedema follow the initial symptoms within a few years in Han Chinese subjects [</span><a class="xref-bibr" data-dcnode-id="3202" href="#ref-4" id="xref-ref-4-2"><span data-dcnode-id="3203" instrument_node="">4</span></a><span data-dcnode-id="3201" instrument_node="">, </span><a class="xref-bibr" data-dcnode-id="3199" href="#ref-31" id="xref-ref-31-1"><span data-dcnode-id="3200" instrument_node="">31</span></a><span data-dcnode-id="3198" instrument_node="">], but are rare in high-altitude residents in the Andes [</span><a class="xref-bibr" data-dcnode-id="3196" href="#ref-32" id="xref-ref-32-1"><span data-dcnode-id="3197" instrument_node="">32</span></a><span data-dcnode-id="3195" instrument_node="">]. In both populations, marked cyanosis of the face and fingers, clubbing of the digits, hepatomegaly and ascites may be present in the late stage of the disease.</span></p><span data-dcnode-id="3193" instrument_node="">
</span></div><span data-dcnode-id="3191" instrument_node="">
</span><div class="subsection" data-dcnode-id="3183" id="sec-11"><span data-dcnode-id="3190" instrument_node="">
</span><h3 data-dcnode-id="3188"><span data-dcnode-id="3189" instrument_node="">Electrocardiogram</span></h3><span data-dcnode-id="3187" instrument_node="">
</span><p data-dcnode-id="3185" id="p-19"><span data-dcnode-id="3186" instrument_node="">Indices of right ventricular hypertrophy can be seen on ECG including changes in the mean QRS electrical axis in the frontal plane (standard leads I, II and III) exceeding +90°.</span></p><span data-dcnode-id="3184" instrument_node="">
</span></div><span data-dcnode-id="3182" instrument_node="">
</span><div class="subsection" data-dcnode-id="3165" id="sec-12"><span data-dcnode-id="3181" instrument_node="">
</span><h3 data-dcnode-id="3179"><span data-dcnode-id="3180" instrument_node="">Pulmonary function test</span></h3><span data-dcnode-id="3178" instrument_node="">
</span><p data-dcnode-id="3167" id="p-20"><span data-dcnode-id="3177" instrument_node="">Patients with HAPH are usually more hypoxaemic than normal high-altitude residents, in part because of hypoventilation during both awake and sleep states. Compared with residents living at sea level, it has been found that both healthy residents at high altitude and patients with HAPH present a decreased ventilatory response to hypoxia, with the difference between those with and without HAPH not being statistically significant [</span><a class="xref-bibr" data-dcnode-id="3175" href="#ref-33" id="xref-ref-33-1"><span data-dcnode-id="3176" instrument_node="">33</span></a><span data-dcnode-id="3174" instrument_node="">]. However, compared with healthy high-altitude residents, patients with HAPH present higher end-tidal carbon dioxide tension and lower end-tidal oxygen tension, suggesting a lower level of alveolar ventilation rather than a hypoxic ventilatory response in these subjects [</span><a class="xref-bibr" data-dcnode-id="3172" href="#ref-33" id="xref-ref-33-2"><span data-dcnode-id="3173" instrument_node="">33</span></a><span data-dcnode-id="3171" instrument_node="">, </span><a class="xref-bibr" data-dcnode-id="3169" href="#ref-34" id="xref-ref-34-1"><span data-dcnode-id="3170" instrument_node="">34</span></a><span data-dcnode-id="3168" instrument_node="">]. Thus, from the results of these studies, it may be concluded that a lower level of alveolar ventilation rather than a reduced peripheral chemosensitivity to hypoxia is the primary mechanism leading to hypoxaemia.</span></p><span data-dcnode-id="3166" instrument_node="">
</span></div><span data-dcnode-id="3164" instrument_node="">
</span><div class="subsection" data-dcnode-id="3153" id="sec-13"><span data-dcnode-id="3163" instrument_node="">
</span><h3 data-dcnode-id="3161"><span data-dcnode-id="3162" instrument_node="">Chest radiography</span></h3><span data-dcnode-id="3160" instrument_node="">
</span><p data-dcnode-id="3155" id="p-21"><span data-dcnode-id="3159" instrument_node="">Enlargement of the heart, dilatation of the pulmonary trunk and general dilatation of the small lung vessels were found on chest radiography and reported in Han Chinese and South Americans. Kearly's B lines are characteristically absent in HAPH patients [</span><a class="xref-bibr" data-dcnode-id="3157" href="#ref-4" id="xref-ref-4-3"><span data-dcnode-id="3158" instrument_node="">4</span></a><span data-dcnode-id="3156" instrument_node="">]. These symptoms suggest that congestive right heart failure is associated with excessively elevated PAP in both populations.</span></p><span data-dcnode-id="3154" instrument_node="">
</span></div><span data-dcnode-id="3152" instrument_node="">
</span><div class="subsection" data-dcnode-id="3125" id="sec-14"><span data-dcnode-id="3151" instrument_node="">
</span><h3 data-dcnode-id="3149"><span data-dcnode-id="3150" instrument_node="">Echocardiography</span></h3><span data-dcnode-id="3148" instrument_node="">
</span><p data-dcnode-id="3127" id="p-22"><span data-dcnode-id="3147" instrument_node="">Echocardiography can provide both estimates of </span><em data-dcnode-id="3145"><span data-dcnode-id="3146" instrument_node="">P</span></em><sub data-dcnode-id="3143"><span data-dcnode-id="3144" instrument_node="">pa</span></sub><span data-dcnode-id="3142" instrument_node=""> and an assessment of cardiac structure and function [</span><a class="xref-bibr" data-dcnode-id="3140" href="#ref-35" id="xref-ref-35-1"><span data-dcnode-id="3141" instrument_node="">35</span></a><span data-dcnode-id="3139" instrument_node="">]. These features justify its application as the most commonly used screening tool in assessing patients with suspected HAPH. Systolic </span><em data-dcnode-id="3137"><span data-dcnode-id="3138" instrument_node="">P</span></em><sub data-dcnode-id="3135"><span data-dcnode-id="3136" instrument_node="">pa</span></sub><span data-dcnode-id="3134" instrument_node=""> is calculated by adding the estimated right atrial pressure to the pressure gradient between the right ventricle and the right atrium, RV and RA, respectively, (ΔP-RV/RA) using the modified Bernouilli equation, as follows:</span><span class="disp-formula" data-dcnode-id="3129" id="disp-formula-1"><span class="highwire-responsive-lazyload" data-dcnode-id="3130"><img alt="Embedded Image" class="highwire-embed lazyload" data-dcnode-id="3133" data-src="https://err.ersjournals.com/sites/default/files/highwire/errev/18/111/13/embed/graphic-1.gif" src="data:image/gif;base64,R0lGODlhAQABAIAAAAAAAP///yH5BAEAAAAALAAAAAABAAEAAAIBRAA7"><noscript data-dcnode-id="3131"><span data-dcnode-id="3132" instrument_node="">&lt;img class="highwire-embed" alt="Embedded Image" src="https://err.ersjournals.com/sites/default/files/highwire/errev/18/111/13/embed/graphic-1.gif"/&gt;</span></noscript></span></span><span data-dcnode-id="3128" instrument_node="">where V is the peak velocity of the regurgitant jet across the tricuspid valve and Δ indicates change.</span></p><span data-dcnode-id="3126" instrument_node="">
</span></div><span data-dcnode-id="3124" instrument_node="">
</span><div class="subsection" data-dcnode-id="3091" id="sec-15"><span data-dcnode-id="3123" instrument_node="">
</span><h3 data-dcnode-id="3121"><span data-dcnode-id="3122" instrument_node="">Right heart catheterisation</span></h3><span data-dcnode-id="3120" instrument_node="">
</span><p data-dcnode-id="3093" id="p-23"><span data-dcnode-id="3119" instrument_node="">For the purposes of confirming the diagnosis, as well as excluding PH due to other causes, right heart catheterisation measure of </span><em data-dcnode-id="3117"><span data-dcnode-id="3118" instrument_node="">P</span></em><sub data-dcnode-id="3115"><span data-dcnode-id="3116" instrument_node="">pa</span></sub><span data-dcnode-id="3114" instrument_node=""> is recommended [</span><a class="xref-bibr" data-dcnode-id="3112" href="#ref-35" id="xref-ref-35-2"><span data-dcnode-id="3113" instrument_node="">35</span></a><span data-dcnode-id="3111" instrument_node="">]. Pulmonary haemodynamic measurements performed in children and young adults show persistence of elevated </span><em data-dcnode-id="3109"><span data-dcnode-id="3110" instrument_node="">P</span></em><sub data-dcnode-id="3107"><span data-dcnode-id="3108" instrument_node="">pa</span></sub><span data-dcnode-id="3106" instrument_node=""> at high altitude for weeks, months or years [</span><a class="xref-bibr" data-dcnode-id="3104" href="#ref-36" id="xref-ref-36-1"><span data-dcnode-id="3105" instrument_node="">36</span></a><span data-dcnode-id="3103" instrument_node="">]. Performance of right heart catheterisation was reported in Han Chinese subjects who developed HAPH after residing in Lhasa at an elevation 3,658 m for 11–36 yrs, as well as in Andes natives residing at an elevation of ∼4,300 m [</span><a class="xref-bibr" data-dcnode-id="3101" href="#ref-32" id="xref-ref-32-2"><span data-dcnode-id="3102" instrument_node="">32</span></a><span data-dcnode-id="3100" instrument_node="">]. The haemodynamic data showed the </span><em data-dcnode-id="3098"><span data-dcnode-id="3099" instrument_node="">P̄</span></em><span data-dcnode-id="3097" instrument_node=""> </span><sub data-dcnode-id="3095"><span data-dcnode-id="3096" instrument_node="">pa</span></sub><span data-dcnode-id="3094" instrument_node=""> averaged 45 mmHg in Andes natives and 40 mmHg in Han Chinese subjects. In all subjects, right atrial pressure, pulmonary artery occlusion pressure and cardiac output were normal. Although right heart catheterisation is the gold standard for the diagnosis of PH, its use in the diagnosis of HAPH is quite limited and should be adopted more widely in the future by clinicians.</span></p><span data-dcnode-id="3092" instrument_node="">
</span></div><span data-dcnode-id="3090" instrument_node="">
</span></div><div class="section" data-dcnode-id="3017" id="sec-16"><span data-dcnode-id="3088" instrument_node="">
</span><h2 data-dcnode-id="3086"><span data-dcnode-id="3087" instrument_node="">TREATMENTS</span></h2><span data-dcnode-id="3085" instrument_node="">
</span><p data-dcnode-id="3083" id="p-24"><span data-dcnode-id="3084" instrument_node="">The ideal management for HAPH is migration to low altitude. However, for patients who choose to remain at high altitude, other means of reducing PH may be attempted, although their efficacy has not been fully established.</span></p><span data-dcnode-id="3082" instrument_node="">
</span><p data-dcnode-id="3080" id="p-25"><span data-dcnode-id="3081" instrument_node="">A number of treatments including oxygen supplementation, calcium channel blockers (such as nifedipine), NO inhalation, prostacyclins and endothelin-receptor antagonists, as well as phosphodiesterase inhibitors, have been demonstrated to decrease hypoxaemia, PH and the alveolar–arterial gradient in PAH. However, the efficacy of these treatments for HAPH needs to be further evaluated.</span></p><span data-dcnode-id="3079" instrument_node="">
</span><p data-dcnode-id="3051" id="p-26"><span data-dcnode-id="3078" instrument_node="">NO has vasorelaxant and antiproliferative effects that are mediated by cyclic guanosine monophosphate (cGMP). cGMP is hydrolysed by phosphodiesterases (PDEs). PDE5 is the major PDE subtype present in pulmonary vasculature and is more abundant in the lungs than in other tissues [</span><a class="xref-bibr" data-dcnode-id="3076" href="#ref-37" id="xref-ref-37-1"><span data-dcnode-id="3077" instrument_node="">37</span></a><span data-dcnode-id="3075" instrument_node="">]. This abundance of PDE5 in the lungs provides a mechanism for relatively selective pulmonary vasodilatation with little systemic hypotension. Agents with PDE5 inhibitory activity reduce </span><em data-dcnode-id="3073"><span data-dcnode-id="3074" instrument_node="">P</span></em><sub data-dcnode-id="3071"><span data-dcnode-id="3072" instrument_node="">pa</span></sub><span data-dcnode-id="3070" instrument_node=""> in animal models [</span><a class="xref-bibr" data-dcnode-id="3068" href="#ref-38" id="xref-ref-38-1"><span data-dcnode-id="3069" instrument_node="">38</span></a><span data-dcnode-id="3067" instrument_node="">]. A</span><span class="sc" data-dcnode-id="3065"><span data-dcnode-id="3066" instrument_node="">ldashev</span></span><span data-dcnode-id="3064" instrument_node=""> </span><em data-dcnode-id="3062"><span data-dcnode-id="3063" instrument_node="">et al.</span></em><span data-dcnode-id="3061" instrument_node=""> [</span><a class="xref-bibr" data-dcnode-id="3059" href="#ref-39" id="xref-ref-39-1"><span data-dcnode-id="3060" instrument_node="">39</span></a><span data-dcnode-id="3058" instrument_node="">] studied the effects of sildenafil in 14 HAPH patients and reported a reduction in </span><em data-dcnode-id="3056"><span data-dcnode-id="3057" instrument_node="">P̄</span></em><span data-dcnode-id="3055" instrument_node=""> </span><sub data-dcnode-id="3053"><span data-dcnode-id="3054" instrument_node="">pa</span></sub><span data-dcnode-id="3052" instrument_node="">, with an improvement in 6-min walk distance and an increase in cardiac index after 3 months. Therefore, PDE5 is an attractive drug target for the treatment of HAPH. Long-term treatment with a PDE5 inhibitor, such as sildenafil, maybe a promising therapy for HAPH.</span></p><span data-dcnode-id="3050" instrument_node="">
</span><p data-dcnode-id="3034" id="p-27"><span data-dcnode-id="3049" instrument_node="">Although endothelin-receptor antagonists have been proven to reduce </span><em data-dcnode-id="3047"><span data-dcnode-id="3048" instrument_node="">P</span></em><sub data-dcnode-id="3045"><span data-dcnode-id="3046" instrument_node="">pa</span></sub><span data-dcnode-id="3044" instrument_node=""> and increase exercise capacity in patients with PAH, their effects on exercise capacity at altitude are unknown. Recently, S</span><span class="sc" data-dcnode-id="3042"><span data-dcnode-id="3043" instrument_node="">eheult</span></span><span data-dcnode-id="3041" instrument_node=""> </span><em data-dcnode-id="3039"><span data-dcnode-id="3040" instrument_node="">et al.</span></em><span data-dcnode-id="3038" instrument_node=""> [</span><a class="xref-bibr" data-dcnode-id="3036" href="#ref-40" id="xref-ref-40-1"><span data-dcnode-id="3037" instrument_node="">40</span></a><span data-dcnode-id="3035" instrument_node="">] demonstrated that bosentan therapy initiated 5 days prior to ascent to high altitude did not improve exercise capacity or reduce systolic pulmonary arterial hypertension, and worsened arterial oxygen saturation measured by pulse oximetry during high-intensity exercise at altitude.</span></p><span data-dcnode-id="3033" instrument_node="">
</span><p data-dcnode-id="3019" id="p-28"><span data-dcnode-id="3032" instrument_node="">A number of studies have emphasised the mechanisms by which acetazolamide and angiotensin-converting enzyme inhibitors may be effective agents for the treatment of high-altitude pulmonary hypertension. R</span><span class="sc" data-dcnode-id="3030"><span data-dcnode-id="3031" instrument_node="">ichalet</span></span><span data-dcnode-id="3029" instrument_node=""> </span><em data-dcnode-id="3027"><span data-dcnode-id="3028" instrument_node="">et al.</span></em><span data-dcnode-id="3026" instrument_node=""> [</span><a class="xref-bibr" data-dcnode-id="3024" href="#ref-41" id="xref-ref-41-1"><span data-dcnode-id="3025" instrument_node="">41</span></a><span data-dcnode-id="3023" instrument_node="">] demonstrated that acetazolamide reduces hypoventilation, improves pulmonary circulation and decreases erythropoiesis. Its use as a chronic treatment for high-altitude pulmonary hypertension has been shown to be efficacious and safe [</span><a class="xref-bibr" data-dcnode-id="3021" href="#ref-42" id="xref-ref-42-1"><span data-dcnode-id="3022" instrument_node="">42</span></a><span data-dcnode-id="3020" instrument_node="">]. The low cost of acetazolamide may allow for wide adoption with a considerable positive impact on public health in high-altitude regions. The study of angiotensin-converting enzyme inhibitors in the treatment of high-altitude pulmonary hypertension is still ongoing.</span></p><span data-dcnode-id="3018" instrument_node="">
</span></div><div class="section" data-dcnode-id="3009" id="sec-17"><span data-dcnode-id="3016" instrument_node="">
</span><h2 data-dcnode-id="3014"><span data-dcnode-id="3015" instrument_node="">Statement of interest</span></h2><span data-dcnode-id="3013" instrument_node="">
</span><p data-dcnode-id="3011" id="p-29"><span data-dcnode-id="3012" instrument_node="">None declared.</span></p><span data-dcnode-id="3010" instrument_node="">
</span></div><div class="section" data-dcnode-id="3001" id="sec-18"><span data-dcnode-id="3008" instrument_node="">
