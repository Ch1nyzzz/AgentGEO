</span><meta content="The loss of pulmonary vessels has been shown to be related to the severity of pulmonary hypertension in patients with chronic obstructive pulmonary disease (COPD). The severity of hypoxaemia is also related to pulmonary hypertension and pulmonary vascular resistance in these patients, suggesting that the hypoxic condition probably plays an important role in this form of pulmonary hypertension.

However, pulmonary hypertension also develops in patients with mild COPD without hypoxaemia. Oxygen supplementation therapy often fails to reverse the pulmonary hypertension in these COPD patients, thus suggesting that the pulmonary vascular alterations in those patients may involve different sites of the pulmonary vasculature or a different form of vascular remodelling. It has recently been demonstrated that pulmonary vascular remodelling, resulting in pulmonary hypertension in COPD patients, can develop independently from parenchymal destruction and loss of lung vessels.

We wonder whether the changes in the lung microenvironment due to hypoxia and vessel loss have a causative role in the development of pulmonary hypertension in patients with COPD. Herein we review the pathobiological features of the pulmonary vasculature in COPD patients and suggest that pulmonary hypertension can occur with and without emphysematous lung tissue destruction and with and without loss of lung vessels." data-dcnode-id="6768" name="DC.Description"><span data-dcnode-id="6767" instrument_node="">

</span><meta content="The loss of pulmonary vessels has been shown to be related to the severity of pulmonary hypertension in patients with chronic obstructive pulmonary disease (COPD). The severity of hypoxaemia is also related to pulmonary hypertension and pulmonary vascular resistance in these patients, suggesting that the hypoxic condition probably plays an important role in this form of pulmonary hypertension.

However, pulmonary hypertension also develops in patients with mild COPD without hypoxaemia. Oxygen supplementation therapy often fails to reverse the pulmonary hypertension in these COPD patients, thus suggesting that the pulmonary vascular alterations in those patients may involve different sites of the pulmonary vasculature or a different form of vascular remodelling. It has recently been demonstrated that pulmonary vascular remodelling, resulting in pulmonary hypertension in COPD patients, can develop independently from parenchymal destruction and loss of lung vessels.

We wonder whether the changes in the lung microenvironment due to hypoxia and vessel loss have a causative role in the development of pulmonary hypertension in patients with COPD. Herein we review the pathobiological features of the pulmonary vasculature in COPD patients and suggest that pulmonary hypertension can occur with and without emphysematous lung tissue destruction and with and without loss of lung vessels." data-dcnode-id="6576" name="twitter:description"><span data-dcnode-id="6575" instrument_node="">

</span><div class="highwire-markup" data-dcnode-id="1664"><div class="content-block-markup" data-dcnode-id="1667" data-highwire-cite-ref-tooltip-instance="highwire_reflinks_tooltip" xmlns="http://www.w3.org/1999/xhtml" xmlns:xhtml="http://www.w3.org/1999/xhtml"><div class="article fulltext-view" data-dcnode-id="1669"><span class="highwire-journal-article-marker-start" data-dcnode-id="5575"></span><div class="section abstract" data-dcnode-id="5562" id="abstract-1"><h2 data-dcnode-id="5573"><span data-dcnode-id="5574" instrument_node="">Abstract</span></h2><span data-dcnode-id="5572" instrument_node="">
</span><p data-dcnode-id="5570" id="p-2"><span data-dcnode-id="5571" instrument_node="">The loss of pulmonary vessels has been shown to be related to the severity of pulmonary hypertension in patients with chronic obstructive pulmonary disease (COPD). The severity of hypoxaemia is also related to pulmonary hypertension and pulmonary vascular resistance in these patients, suggesting that the hypoxic condition probably plays an important role in this form of pulmonary hypertension.</span></p><span data-dcnode-id="5569" instrument_node="">
</span><p data-dcnode-id="5567" id="p-3"><span data-dcnode-id="5568" instrument_node="">However, pulmonary hypertension also develops in patients with mild COPD without hypoxaemia. Oxygen supplementation therapy often fails to reverse the pulmonary hypertension in these COPD patients, thus suggesting that the pulmonary vascular alterations in those patients may involve different sites of the pulmonary vasculature or a different form of vascular remodelling. It has recently been demonstrated that pulmonary vascular remodelling, resulting in pulmonary hypertension in COPD patients, can develop independently from parenchymal destruction and loss of lung vessels.</span></p><span data-dcnode-id="5566" instrument_node="">
</span><p data-dcnode-id="5564" id="p-4"><span data-dcnode-id="5565" instrument_node="">We wonder whether the changes in the lung microenvironment due to hypoxia and vessel loss have a causative role in the development of pulmonary hypertension in patients with COPD. Herein we review the pathobiological features of the pulmonary vasculature in COPD patients and suggest that pulmonary hypertension can occur with and without emphysematous lung tissue destruction and with and without loss of lung vessels.</span></p><span data-dcnode-id="5563" instrument_node="">
</span></div><div class="section" data-dcnode-id="5421" id="sec-1"><span data-dcnode-id="5561" instrument_node="">
</span><h2 data-dcnode-id="5559"><span data-dcnode-id="5560" instrument_node="">Introduction</span></h2><span data-dcnode-id="5558" instrument_node="">
</span><p data-dcnode-id="5541" id="p-5"><span data-dcnode-id="5557" instrument_node="">Chronic obstructive pulmonary disease (COPD) is generally acknowledged to be a lung disease that presents with extrapulmonary manifestations, including skeletal muscle dysfunction, weight loss and osteoporosis [</span><a class="xref-bibr" data-dcnode-id="5555" href="#ref-1" id="xref-ref-1-1"><span data-dcnode-id="5556" instrument_node="">1</span></a><span data-dcnode-id="5554" instrument_node="">]. COPD is characterised by chronic airflow limitation owing to lung parenchymal destruction and a narrowed airway calibre, frequently associated with alveolar hypoxia [</span><a class="xref-bibr" data-dcnode-id="5552" href="#ref-2" id="xref-ref-2-1"><span data-dcnode-id="5553" instrument_node="">2</span></a><span data-dcnode-id="5551" instrument_node="">]. It is generally recognised that a loss of pulmonary vessels may contribute to secondary pulmonary hypertension in COPD, although its precise pathogenesis has not been fully elucidated. In truth, diminution and narrowing of the pulmonary vessels by angiography has been shown in patients with COPD [</span><a class="xref-bibr" data-dcnode-id="5549" href="#ref-3" id="xref-ref-3-1"><span data-dcnode-id="5550" instrument_node="">3</span></a><span data-dcnode-id="5548" instrument_node="">, </span><a class="xref-bibr" data-dcnode-id="5546" href="#ref-4" id="xref-ref-4-1"><span data-dcnode-id="5547" instrument_node="">4</span></a><span data-dcnode-id="5545" instrument_node="">], and a diminished number of small pulmonary vessels, assessed by chest computed tomography (CT) scanning, contributes to the severity of pulmonary hypertension in patients with COPD [</span><a class="xref-bibr" data-dcnode-id="5543" href="#ref-5" id="xref-ref-5-1"><span data-dcnode-id="5544" instrument_node="">5</span></a><span data-dcnode-id="5542" instrument_node="">].</span></p><span data-dcnode-id="5540" instrument_node="">
</span><p data-dcnode-id="5502" id="p-6"><span data-dcnode-id="5539" instrument_node="">In addition, the severity of hypoxaemia has been related to the increase in pulmonary arterial pressure (PAP) and pulmonary vascular resistance in patients with COPD [</span><a class="xref-bibr" data-dcnode-id="5537" href="#ref-6" id="xref-ref-6-1"><span data-dcnode-id="5538" instrument_node="">6</span></a><span data-dcnode-id="5536" instrument_node="">, </span><a class="xref-bibr" data-dcnode-id="5534" href="#ref-7" id="xref-ref-7-1"><span data-dcnode-id="5535" instrument_node="">7</span></a><span data-dcnode-id="5533" instrument_node="">]. The 4th World Symposium on Pulmonary Hypertension classified COPD-related pulmonary hypertension under group 3 “pulmonary hypertension associated with lung disease and/or hypoxia”, thus indicating that hypoxic conditions play an important role in this form of pulmonary hypertension [</span><a class="xref-bibr" data-dcnode-id="5531" href="#ref-8" id="xref-ref-8-1"><span data-dcnode-id="5532" instrument_node="">8</span></a><span data-dcnode-id="5530" instrument_node="">]. Alveolar hypoxia induces regional pulmonary vasoconstriction, which plays an important role in the maintenance of the ventilation/perfusion balance [</span><a class="xref-bibr" data-dcnode-id="5528" href="#ref-9" id="xref-ref-9-1"><span data-dcnode-id="5529" instrument_node="">9</span></a><span data-dcnode-id="5527" instrument_node="">, </span><a class="xref-bibr" data-dcnode-id="5525" href="#ref-10" id="xref-ref-10-1"><span data-dcnode-id="5526" instrument_node="">10</span></a><span data-dcnode-id="5524" instrument_node="">]. For instance, in healthy high-altitude natives, long-term alveolar hypoxia can cause pulmonary vascular alterations, including medial wall thickening and muscularisation of nonmuscularised arterioles [</span><a class="xref-bibr" data-dcnode-id="5522" href="#ref-11" id="xref-ref-11-1"><span data-dcnode-id="5523" instrument_node="">11</span></a><span data-dcnode-id="5521" instrument_node="">]. These are caused by the hypoxic pulmonary vasoconstriction (HPV) associated with high fluid shear  stress (</span><a class="xref-fig" data-dcnode-id="5519" href="#F1" id="xref-fig-1-1"><span data-dcnode-id="5520" instrument_node="">fig. 1</span></a><span data-dcnode-id="5518" instrument_node="">). These vascular changes are potentially reversible, because when such subjects return to sea level for a sufficient amount of time, the shear stress decreases and pulmonary hypertension is ameliorated [</span><a class="xref-bibr" data-dcnode-id="5516" href="#ref-12" id="xref-ref-12-1"><span data-dcnode-id="5517" instrument_node="">12</span></a><span data-dcnode-id="5515" instrument_node="">]. It has been reported that the pulmonary vascular remodelling in patients with advanced COPD resembles the lesions observed in healthy high-altitude natives [</span><a class="xref-bibr" data-dcnode-id="5513" href="#ref-13" id="xref-ref-13-1"><span data-dcnode-id="5514" instrument_node="">13</span></a><span data-dcnode-id="5512" instrument_node="">, </span><a class="xref-bibr" data-dcnode-id="5510" href="#ref-14" id="xref-ref-14-1"><span data-dcnode-id="5511" instrument_node="">14</span></a><span data-dcnode-id="5509" instrument_node="">]. However, pulmonary vascular remodelling also develops in patients with nonhypoxaemic mild COPD [</span><a class="xref-bibr" data-dcnode-id="5507" href="#ref-15" id="xref-ref-15-1"><span data-dcnode-id="5508" instrument_node="">15</span></a><span data-dcnode-id="5506" instrument_node="">]. Moreover, oxygen therapy often fails to reverse the pulmonary hypertension in COPD patients [</span><a class="xref-bibr" data-dcnode-id="5504" href="#ref-16" id="xref-ref-16-1"><span data-dcnode-id="5505" instrument_node="">16</span></a><span data-dcnode-id="5503" instrument_node="">], suggesting that the pulmonary vascular remodelling in those patients includes different components not explained by hypoxic vasoconstriction.</span></p><span data-dcnode-id="5501" instrument_node="">
</span><div class="fig pos-float odd" data-dcnode-id="5474" id="F1"><div class="highwire-figure" data-dcnode-id="5483"><div class="fig-inline-img-wrapper" data-dcnode-id="5494"><div class="fig-inline-img" data-dcnode-id="5495"><a class="highwire-fragment fragment-images colorbox-load highwireFiguresMarkupProcessor-processed cboxElement" data-dcnode-id="5496" data-figure-caption="<div class=&quot;highwire-markup&quot;>A hypothetical mechanism underlying the pulmonary vascular remodelling in highlanders, chronic obstructive pulmonary disease (COPD) patients and idiopathic pulmonary arterial hypertension (IPAH) patients. In healthy highlanders, long-term alveolar hypoxia can cause pulmonary vascular alterations, including medial wall thickening and muscularisation of nonmuscularised arterioles with proliferative smooth muscle-like cells (SMLCs). These are caused by the high fluid shear stress owing to hypoxic pulmonary vasoconstriction (HPV), resulting in an elevated pulmonary arterial pressure. In the patients with COPD, both vascular injuries caused by toxic agents and airborne particulates, including tobacco smoke, and the haemodynamic changes induced by the hypoxic condition resulting from the parenchymal destruction and the decreased vascular bed, may have a role in inducing the neointimal lesions consisting of proliferative SMLCs in the pulmonary muscular arteries. These lesions are different from the pulmonary vascular alterations seen in highlanders and in the pulmonary hypertension models induced by chronic hypoxic exposure alone. In the patients with IPAH, the defining pulmonary vascular alterations are complex vascular lesions consisting of phenotypically altered and proliferating endothelial-like cells (ELCs). The distinction between the pathological features in IPAH and COPD seems to largely be the presence or absence of complex vascular lesions with phenotypically altered and proliferating ELCs. EC: endothelial cell; SMC: smooth muscle cell.</div>" data-hide-link-title="0" data-icon-position="" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//err.ersjournals.com/content/errev/23/133/350/F1.large.jpg%3Fwidth%3D800%26height%3D600%26carousel%3D1" rel="gallery-fragment-images-313073542" title="A hypothetical mechanism underlying the pulmonary vascular remodelling in highlanders, chronic obstructive pulmonary disease (COPD) patients and idiopathic pulmonary arterial hypertension (IPAH) patients. In healthy highlanders, long-term alveolar hypoxia can cause pulmonary vascular alterations, including medial wall thickening and muscularisation of nonmuscularised arterioles with proliferative smooth muscle-like cells (SMLCs). These are caused by the high fluid shear stress owing to hypoxic pulmonary vasoconstriction (HPV), resulting in an elevated pulmonary arterial pressure. In the patients with COPD, both vascular injuries caused by toxic agents and airborne particulates, including tobacco smoke, and the haemodynamic changes induced by the hypoxic condition resulting from the parenchymal destruction and the decreased vascular bed, may have a role in inducing the neointimal lesions consisting of proliferative SMLCs in the pulmonary muscular arteries. These lesions are different from the pulmonary vascular alterations seen in highlanders and in the pulmonary hypertension models induced by chronic hypoxic exposure alone. In the patients with IPAH, the defining pulmonary vascular alterations are complex vascular lesions consisting of phenotypically altered and proliferating endothelial-like cells (ELCs). The distinction between the pathological features in IPAH and COPD seems to largely be the presence or absence of complex vascular lesions with phenotypically altered and proliferating ELCs. EC: endothelial cell; SMC: smooth muscle cell."><span class="hw-responsive-img" data-dcnode-id="5497"><img alt="Figure 1." class="highwire-fragment fragment-image lazyloaded" data-dcnode-id="5500" data-src="https://err.ersjournals.com/content/errev/23/133/350/F1.medium.gif" height="350" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//err.ersjournals.com/content/errev/23/133/350/F1.medium.gif&amp;raw" width="440"><noscript data-dcnode-id="5498"><span data-dcnode-id="5499" instrument_node="">&lt;img class="highwire-fragment fragment-image" alt="Figure 1." src="https://err.ersjournals.com/content/errev/23/133/350/F1.medium.gif" width="440" height="350"/&gt;</span></noscript></span></a></div></div><ul class="highwire-figure-links inline" data-dcnode-id="5484"><li class="download-fig first" data-dcnode-id="5491"><a class="highwire-figure-link highwire-figure-link-download" data-dcnode-id="5492" data-hide-link-title="0" data-icon-position="" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//err.ersjournals.com/content/errev/23/133/350/F1.large.jpg%3Fdownload%3Dtrue" title="Download Figure 1."><span data-dcnode-id="5493" instrument_node="">Download figure</span></a></li><li class="new-tab" data-dcnode-id="5488"><a class="highwire-figure-link highwire-figure-link-newtab" data-dcnode-id="5489" data-hide-link-title="0" data-icon-position="" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//err.ersjournals.com/content/errev/23/133/350/F1.large.jpg" target="_blank"><span data-dcnode-id="5490" instrument_node="">Open in new tab</span></a></li><li class="download-ppt last" data-dcnode-id="5485"><a class="highwire-figure-link highwire-figure-link-ppt" data-dcnode-id="5486" data-hide-link-title="0" data-icon-position="" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//err.ersjournals.com/highwire/powerpoint/13043"><span data-dcnode-id="5487" instrument_node="">Download powerpoint</span></a></li></ul></div><div class="fig-caption" data-dcnode-id="5475" xmlns:xhtml="http://www.w3.org/1999/xhtml"><span class="fig-label" data-dcnode-id="5481"><span data-dcnode-id="5482" instrument_node="">Figure 1.</span></span><span data-dcnode-id="5480" instrument_node="">
</span><p class="first-child" data-dcnode-id="5478" id="p-7"><span data-dcnode-id="5479" instrument_node="">A hypothetical mechanism underlying the pulmonary vascular remodelling in highlanders, chronic obstructive pulmonary disease (COPD) patients and idiopathic pulmonary arterial hypertension (IPAH) patients. In healthy highlanders, long-term alveolar hypoxia can cause pulmonary vascular alterations, including medial wall thickening and muscularisation of nonmuscularised arterioles with proliferative smooth muscle-like cells (SMLCs). These are caused by the high fluid shear stress owing to hypoxic pulmonary vasoconstriction (HPV), resulting in an elevated pulmonary arterial pressure. In the patients with COPD, both vascular injuries caused by toxic agents and airborne particulates, including tobacco smoke, and the haemodynamic changes induced by the hypoxic condition resulting from the parenchymal destruction and the decreased vascular bed, may have a role in inducing the neointimal lesions consisting of proliferative SMLCs in the pulmonary muscular arteries. These lesions are different from the pulmonary vascular alterations seen in highlanders and in the pulmonary hypertension models induced by chronic hypoxic exposure alone. In the patients with IPAH, the defining pulmonary vascular alterations are complex vascular lesions consisting of phenotypically altered and proliferating endothelial-like cells (ELCs). The distinction between the pathological features in IPAH and COPD seems to largely be the presence or absence of complex vascular lesions with phenotypically altered and proliferating ELCs. EC: endothelial cell; SMC: smooth muscle cell.</span></p><span data-dcnode-id="5477" instrument_node="">
</span><div class="sb-div caption-clear" data-dcnode-id="5476"></div></div></div><span data-dcnode-id="5473" instrument_node="">
</span><p data-dcnode-id="5447" id="p-8"><span data-dcnode-id="5472" instrument_node="">Experimentally, tobacco smoke can cause the development of pulmonary vascular alterations, suggesting that hypoxia may not be a sufficient explanation for pulmonary arterial remodelling in COPD [</span><a class="xref-bibr" data-dcnode-id="5470" href="#ref-17" id="xref-ref-17-1"><span data-dcnode-id="5471" instrument_node="">17</span></a><span data-dcnode-id="5469" instrument_node="">, </span><a class="xref-bibr" data-dcnode-id="5467" href="#ref-18" id="xref-ref-18-1"><span data-dcnode-id="5468" instrument_node="">18</span></a><span data-dcnode-id="5466" instrument_node="">]. These reports suggest that the vascular lesions caused by tobacco smoke were probably different from the alterations caused by hypoxia. The pulmonary hypertension arising due to pulmonary vascular remodelling in COPD patients could develop independently from the emphysematous parenchymal destruction and lung vessel loss. S</span><span class="sc" data-dcnode-id="5464"><span data-dcnode-id="5465" instrument_node="">eimetz</span></span><span data-dcnode-id="5463" instrument_node=""> </span><em data-dcnode-id="5461"><span data-dcnode-id="5462" instrument_node="">et al.</span></em><span data-dcnode-id="5460" instrument_node=""> [</span><a class="xref-bibr" data-dcnode-id="5458" href="#ref-17" id="xref-ref-17-2"><span data-dcnode-id="5459" instrument_node="">17</span></a><span data-dcnode-id="5457" instrument_node="">] related the development of pulmonary hypertension and lung vascular remodelling to the inducible nitric oxide synthase (iNOS) pathway in bone marrow-derived cells, and the development of emphysema to the iNOS pathway in non-bone marrow-derived cells. F</span><span class="sc" data-dcnode-id="5455"><span data-dcnode-id="5456" instrument_node="">errer</span></span><span data-dcnode-id="5454" instrument_node=""> </span><em data-dcnode-id="5452"><span data-dcnode-id="5453" instrument_node="">et al.</span></em><span data-dcnode-id="5451" instrument_node=""> [</span><a class="xref-bibr" data-dcnode-id="5449" href="#ref-18" id="xref-ref-18-2"><span data-dcnode-id="5450" instrument_node="">18</span></a><span data-dcnode-id="5448" instrument_node="">] demonstrated that cigarette smoke-related endothelial dysfunction might induce proliferation of smooth muscle-like cells (SMLCs), resulting in neointimal lesions in patients with COPD, and that the remodelling caused by cigarette smoke might be enhanced by hypoxic conditions.</span></p><span data-dcnode-id="5446" instrument_node="">
</span><p data-dcnode-id="5429" id="p-9"><span data-dcnode-id="5445" instrument_node="">Clinically, M</span><span class="sc" data-dcnode-id="5443"><span data-dcnode-id="5444" instrument_node="">inai</span></span><span data-dcnode-id="5442" instrument_node=""> </span><em data-dcnode-id="5440"><span data-dcnode-id="5441" instrument_node="">et al</span></em><span data-dcnode-id="5439" instrument_node="">. [</span><a class="xref-bibr" data-dcnode-id="5437" href="#ref-19" id="xref-ref-19-1"><span data-dcnode-id="5438" instrument_node="">19</span></a><span data-dcnode-id="5436" instrument_node="">] emphasised that most patients with COPD had mild-to-moderate pulmonary hypertension and normal cardiac function. Severe pulmonary hypertension (defined as mean PAP &gt;40 mmHg) in COPD patients is rare, and the severity of pulmonary hypertension seems to be disproportionate to the respiratory impairment [</span><a class="xref-bibr" data-dcnode-id="5434" href="#ref-19" id="xref-ref-19-2"><span data-dcnode-id="5435" instrument_node="">19</span></a><span data-dcnode-id="5433" instrument_node="">]. Furthermore, in the COPD patients with mild-to-moderate hypoxaemia, PAP seems to progress slowly, at a rate of 0.4 mmHg per year [</span><a class="xref-bibr" data-dcnode-id="5431" href="#ref-20" id="xref-ref-20-1"><span data-dcnode-id="5432" instrument_node="">20</span></a><span data-dcnode-id="5430" instrument_node="">].</span></p><span data-dcnode-id="5428" instrument_node="">
</span><p data-dcnode-id="5426" id="p-10"><span data-dcnode-id="5427" instrument_node="">This review asks whether the lung microenvironment of hypoxia and vessel loss plays a causative role in the development of pulmonary hypertension in patients with COPD. We also wonder why the pulmonary hypertension in patients with COPD tends to be relatively mild and progresses slowly. As well as what the differences are in the development of vascular remodelling between pulmonary arterial hypertension (PAH), as classified under World Health Organization group 1, and pulmonary hypertension associated with COPD.</span></p><span data-dcnode-id="5425" instrument_node="">
</span><p data-dcnode-id="5423" id="p-11"><span data-dcnode-id="5424" instrument_node="">Herein we review the pathobiological features of the pulmonary vasculature in patients with COPD.</span></p><span data-dcnode-id="5422" instrument_node="">
</span></div><div class="section" data-dcnode-id="5329" id="sec-2"><span data-dcnode-id="5420" instrument_node="">
</span><h2 data-dcnode-id="5418"><span data-dcnode-id="5419" instrument_node="">Hypoxic conditions and reverse remodelling in COPD</span></h2><span data-dcnode-id="5417" instrument_node="">
</span><p data-dcnode-id="5382" id="p-12"><span data-dcnode-id="5416" instrument_node="">The destruction of the lung parenchyma and increased airway resistance induced by bronchial luminal obstruction with mucoid secretions can explain hypoxia in patients with COPD [</span><a class="xref-bibr" data-dcnode-id="5414" href="#ref-2" id="xref-ref-2-2"><span data-dcnode-id="5415" instrument_node="">2</span></a><span data-dcnode-id="5413" instrument_node="">]. In hypoxic rodent models of pulmonary hypertension, the exposure to hypoxic conditions causes media thickening and muscularisation of nonmuscularised arteries with hyperproliferative smooth muscle cells (SMCs), resulting in pulmonary hypertension [</span><a class="xref-bibr" data-dcnode-id="5411" href="#ref-21" id="xref-ref-21-1"><span data-dcnode-id="5412" instrument_node="">21</span></a><span data-dcnode-id="5410" instrument_node="">–</span><a class="xref-bibr" data-dcnode-id="5408" href="#ref-24" id="xref-ref-24-1"><span data-dcnode-id="5409" instrument_node="">24</span></a><span data-dcnode-id="5407" instrument_node="">]. Histologically, features that closely resemble these pulmonary arterial alterations have been confirmed in the pulmonary vasculature of COPD patients, including lumen narrowing caused by increased medial thickness and muscularisation in arterioles [</span><a class="xref-bibr" data-dcnode-id="5405" href="#ref-13" id="xref-ref-13-2"><span data-dcnode-id="5406" instrument_node="">13</span></a><span data-dcnode-id="5404" instrument_node="">, </span><a class="xref-bibr" data-dcnode-id="5402" href="#ref-14" id="xref-ref-14-2"><span data-dcnode-id="5403" instrument_node="">14</span></a><span data-dcnode-id="5401" instrument_node="">, </span><a class="xref-bibr" data-dcnode-id="5399" href="#ref-25" id="xref-ref-25-1"><span data-dcnode-id="5400" instrument_node="">25</span></a><span data-dcnode-id="5398" instrument_node="">]. This suggests that COPD patients may share one or several pathophysiological processes underlying the development of pulmonary vascular remodelling with chronic hypoxia rodent models [</span><a class="xref-bibr" data-dcnode-id="5396" href="#ref-21" id="xref-ref-21-2"><span data-dcnode-id="5397" instrument_node="">21</span></a><span data-dcnode-id="5395" instrument_node="">–</span><a class="xref-bibr" data-dcnode-id="5393" href="#ref-23" id="xref-ref-23-1"><span data-dcnode-id="5394" instrument_node="">23</span></a><span data-dcnode-id="5392" instrument_node="">]. Moreover, in COPD patients, pulmonary hypertension is usually slowly progressive and pulmonary hypertension is mild or moderate [</span><a class="xref-bibr" data-dcnode-id="5390" href="#ref-19" id="xref-ref-19-3"><span data-dcnode-id="5391" instrument_node="">19</span></a><span data-dcnode-id="5389" instrument_node="">], as in the rat model [</span><a class="xref-bibr" data-dcnode-id="5387" href="#ref-21" id="xref-ref-21-3"><span data-dcnode-id="5388" instrument_node="">21</span></a><span data-dcnode-id="5386" instrument_node="">, </span><a class="xref-bibr" data-dcnode-id="5384" href="#ref-24" id="xref-ref-24-2"><span data-dcnode-id="5385" instrument_node="">24</span></a><span data-dcnode-id="5383" instrument_node="">].</span></p><span data-dcnode-id="5381" instrument_node="">
</span><p data-dcnode-id="5376" id="p-13"><span data-dcnode-id="5380" instrument_node="">As described previously [</span><a class="xref-bibr" data-dcnode-id="5378" href="#ref-23" id="xref-ref-23-2"><span data-dcnode-id="5379" instrument_node="">23</span></a><span data-dcnode-id="5377" instrument_node="">], the vascular lesions consisting of proliferating SMCs may potentially be reversible as in hypoxic rodent models of pulmonary hypertension, while in severe angio-obliterative forms of PAH, lesions with phenotypically altered endothelial-like cells (ELCs) are irreversible. Due to the reasons described above, the vascular lesions in patients with COPD, which share pathophysiological processes with chronic hypoxia rodent models, may potentially be reversible.</span></p><span data-dcnode-id="5375" instrument_node="">
</span><p data-dcnode-id="5331" id="p-14"><span data-dcnode-id="5374" instrument_node="">Further confirming the differences between pulmonary vascular lesions, the complex vascular lesions in a rat model of severe PAH, which is based on the subcutaneous injection of vascular endothelial growth factor (VEGF) receptor blockade (Sugen5416; SUGEN Inc., San Francisco, CA, USA) and the second hit of chronic hypoxia [</span><a class="xref-bibr" data-dcnode-id="5372" href="#ref-26" id="xref-ref-26-1"><span data-dcnode-id="5373" instrument_node="">26</span></a><span data-dcnode-id="5371" instrument_node="">, </span><a class="xref-bibr" data-dcnode-id="5369" href="#ref-27" id="xref-ref-27-1"><span data-dcnode-id="5370" instrument_node="">27</span></a><span data-dcnode-id="5368" instrument_node="">], have been shown to be irreversible [</span><a class="xref-bibr" data-dcnode-id="5366" href="#ref-28" id="xref-ref-28-1"><span data-dcnode-id="5367" instrument_node="">28</span></a><span data-dcnode-id="5365" instrument_node="">]. In fact, the complex vascular lesions in patients with idiopathic PAH (IPAH) contain apoptosis-resistant [</span><a class="xref-bibr" data-dcnode-id="5363" href="#ref-29" id="xref-ref-29-1"><span data-dcnode-id="5364" instrument_node="">29</span></a><span data-dcnode-id="5362" instrument_node="">–</span><a class="xref-bibr" data-dcnode-id="5360" href="#ref-31" id="xref-ref-31-1"><span data-dcnode-id="5361" instrument_node="">31</span></a><span data-dcnode-id="5359" instrument_node="">], phenotypically altered and proliferating [</span><a class="xref-bibr" data-dcnode-id="5357" href="#ref-26" id="xref-ref-26-2"><span data-dcnode-id="5358" instrument_node="">26</span></a><span data-dcnode-id="5356" instrument_node="">, </span><a class="xref-bibr" data-dcnode-id="5354" href="#ref-32" id="xref-ref-32-1"><span data-dcnode-id="5355" instrument_node="">32</span></a><span data-dcnode-id="5353" instrument_node="">, </span><a class="xref-bibr" data-dcnode-id="5351" href="#ref-33" id="xref-ref-33-1"><span data-dcnode-id="5352" instrument_node="">33</span></a><span data-dcnode-id="5350" instrument_node="">] and monoclonal endothelial cells [</span><a class="xref-bibr" data-dcnode-id="5348" href="#ref-34" id="xref-ref-34-1"><span data-dcnode-id="5349" instrument_node="">34</span></a><span data-dcnode-id="5347" instrument_node="">], resulting in arterial occlusion that may be irreversible [</span><a class="xref-bibr" data-dcnode-id="5345" href="#ref-23" id="xref-ref-23-3"><span data-dcnode-id="5346" instrument_node="">23</span></a><span data-dcnode-id="5344" instrument_node="">, </span><a class="xref-bibr" data-dcnode-id="5342" href="#ref-35" id="xref-ref-35-1"><span data-dcnode-id="5343" instrument_node="">35</span></a><span data-dcnode-id="5341" instrument_node="">]. In IPAH patients, there are some complex vascular lesions, </span><em data-dcnode-id="5339"><span data-dcnode-id="5340" instrument_node="">i.e.</span></em><span data-dcnode-id="5338" instrument_node=""> plexiform lesions, in the pulmonary vasculature, which are the hallmark of severe PAH. In contrast, most COPD patients do not have these lesions [</span><a class="xref-bibr" data-dcnode-id="5336" href="#ref-6" id="xref-ref-6-2"><span data-dcnode-id="5337" instrument_node="">6</span></a><span data-dcnode-id="5335" instrument_node="">]. This may suggest that clinical features such as the mild-to-moderate pulmonary hypertension and slow pulmonary hypertension progression in COPD patients are attributable to the absence of these lesions and the absence of dysregulated ELCs (</span><a class="xref-fig" data-dcnode-id="5333" href="#F1" id="xref-fig-1-2"><span data-dcnode-id="5334" instrument_node="">fig. 1</span></a><span data-dcnode-id="5332" instrument_node="">).</span></p><span data-dcnode-id="5330" instrument_node="">
</span></div><div class="section" data-dcnode-id="5237" id="sec-3"><span data-dcnode-id="5328" instrument_node="">
</span><h2 data-dcnode-id="5326"><span data-dcnode-id="5327" instrument_node="">Intimal lesions of the pulmonary vasculature in COPD</span></h2><span data-dcnode-id="5325" instrument_node="">
</span><p data-dcnode-id="5272" id="p-15"><span data-dcnode-id="5324" instrument_node="">Pulmonary vascular remodelling in patients with COPD is also characterised by an increased intimal thickness due to proliferating SMLCs in pulmonary muscular arteries [</span><a class="xref-bibr" data-dcnode-id="5322" href="#ref-25" id="xref-ref-25-2"><span data-dcnode-id="5323" instrument_node="">25</span></a><span data-dcnode-id="5321" instrument_node="">, </span><a class="xref-bibr" data-dcnode-id="5319" href="#ref-36" id="xref-ref-36-1"><span data-dcnode-id="5320" instrument_node="">36</span></a><span data-dcnode-id="5318" instrument_node="">]. This suggests that the intimal lesions with SMLCs have different pathological features when compared to the pulmonary vascular alterations seen in the chronic hypoxia pulmonary hypertension models. SMLCs are positive for anti-α-smooth muscle actin (the SMC-specific marker) and vimentin (the mesenchymal-specific marker), and negative for desmin (the SMC-specific marker) [</span><a class="xref-bibr" data-dcnode-id="5316" href="#ref-37" id="xref-ref-37-1"><span data-dcnode-id="5317" instrument_node="">37</span></a><span data-dcnode-id="5315" instrument_node="">]. The expression pattern of these markers suggests that they are a subpopulation of immature SMCs that may be critical for effective vascular remodelling [</span><a class="xref-bibr" data-dcnode-id="5313" href="#ref-37" id="xref-ref-37-2"><span data-dcnode-id="5314" instrument_node="">37</span></a><span data-dcnode-id="5312" instrument_node="">, </span><a class="xref-bibr" data-dcnode-id="5310" href="#ref-38" id="xref-ref-38-1"><span data-dcnode-id="5311" instrument_node="">38</span></a><span data-dcnode-id="5309" instrument_node="">]. In addition, there is deposition of the extracellular matrix (ECM) in neointimal lesions in COPD patients [</span><a class="xref-bibr" data-dcnode-id="5307" href="#ref-37" id="xref-ref-37-3"><span data-dcnode-id="5308" instrument_node="">37</span></a><span data-dcnode-id="5306" instrument_node="">], which is thought to lead to intimal hypertrophy [</span><a class="xref-bibr" data-dcnode-id="5304" href="#ref-39" id="xref-ref-39-1"><span data-dcnode-id="5305" instrument_node="">39</span></a><span data-dcnode-id="5303" instrument_node="">]. However, the neointimal lesions in COPD patients do not demonstrate any phenotypically altered and proliferating ELCs, which is a different pathological feature when compared with the neointimal lesions seen in patients with IPAH (</span><a class="xref-fig" data-dcnode-id="5301" href="#F1" id="xref-fig-1-3"><span data-dcnode-id="5302" instrument_node="">fig. 1</span></a><span data-dcnode-id="5300" instrument_node="">). In fact, they occur in lesions in rats after the combination of pneumonectomy, with monocrotaline injection [</span><a class="xref-bibr" data-dcnode-id="5298" href="#ref-40" id="xref-ref-40-1"><span data-dcnode-id="5299" instrument_node="">40</span></a><span data-dcnode-id="5297" instrument_node="">–</span><a class="xref-bibr" data-dcnode-id="5295" href="#ref-42" id="xref-ref-42-1"><span data-dcnode-id="5296" instrument_node="">42</span></a><span data-dcnode-id="5294" instrument_node="">]. In this particular rodent model, the addition of increased blood flow, </span><em data-dcnode-id="5292"><span data-dcnode-id="5293" instrument_node="">i.e.</span></em><span data-dcnode-id="5291" instrument_node=""> high shear stress caused by pneumonectomy apparently induces neointimal lesions in the pulmonary arteries [</span><a class="xref-bibr" data-dcnode-id="5289" href="#ref-41" id="xref-ref-41-1"><span data-dcnode-id="5290" instrument_node="">41</span></a><span data-dcnode-id="5288" instrument_node="">]. However, pneumonectomised human patients show only medial thickening of the pulmonary arteries, but no neointimal lesions several years after the surgery [</span><a class="xref-bibr" data-dcnode-id="5286" href="#ref-43" id="xref-ref-43-1"><span data-dcnode-id="5287" instrument_node="">43</span></a><span data-dcnode-id="5285" instrument_node="">]. Taken together, these facts suggest that increased shear stress in the pulmonary arteries, in combination with vascular injury, can induce neointimal lesions. In truth, tobacco smoke products may directly cause endothelial cell dysfunction, resulting in impaired release of endothelial nitric oxide synthase [</span><a class="xref-bibr" data-dcnode-id="5283" href="#ref-18" id="xref-ref-18-3"><span data-dcnode-id="5284" instrument_node="">18</span></a><span data-dcnode-id="5282" instrument_node="">], increased expression of VEGF [</span><a class="xref-bibr" data-dcnode-id="5280" href="#ref-44" id="xref-ref-44-1"><span data-dcnode-id="5281" instrument_node="">44</span></a><span data-dcnode-id="5279" instrument_node="">], and increased numbers of inflammatory cells [</span><a class="xref-bibr" data-dcnode-id="5277" href="#ref-45" id="xref-ref-45-1"><span data-dcnode-id="5278" instrument_node="">45</span></a><span data-dcnode-id="5276" instrument_node="">]. Moreover, endothelial cell dysfunction-related factors have been shown, in principle, to be able to affect vascular SMC growth [</span><a class="xref-bibr" data-dcnode-id="5274" href="#ref-46" id="xref-ref-46-1"><span data-dcnode-id="5275" instrument_node="">46</span></a><span data-dcnode-id="5273" instrument_node="">].</span></p><span data-dcnode-id="5271" instrument_node="">
</span><p data-dcnode-id="5245" id="p-16"><span data-dcnode-id="5270" instrument_node="">As mentioned earlier, the development of pulmonary vascular alterations in patients with COPD appears to be tobacco smoke-induced, independent of hypoxaemia and perhaps independent of lung parenchymal destruction [</span><a class="xref-bibr" data-dcnode-id="5268" href="#ref-17" id="xref-ref-17-3"><span data-dcnode-id="5269" instrument_node="">17</span></a><span data-dcnode-id="5267" instrument_node="">, </span><a class="xref-bibr" data-dcnode-id="5265" href="#ref-18" id="xref-ref-18-4"><span data-dcnode-id="5266" instrument_node="">18</span></a><span data-dcnode-id="5264" instrument_node="">]. This suggests that there may be two types of vascular remodelling in patients with COPD, </span><em data-dcnode-id="5262"><span data-dcnode-id="5263" instrument_node="">i.e.</span></em><span data-dcnode-id="5261" instrument_node=""> tobacco smoke-related remodelling and hypoxic vasoconstriction-related remodelling. In fact, pulmonary vascular remodelling also develops in patients with mild COPD who are not typically hypoxaemic [</span><a class="xref-bibr" data-dcnode-id="5259" href="#ref-15" id="xref-ref-15-2"><span data-dcnode-id="5260" instrument_node="">15</span></a><span data-dcnode-id="5258" instrument_node="">]. However, regional hypoxia in nonventilated areas of the lung may be present in COPD patients [</span><a class="xref-bibr" data-dcnode-id="5256" href="#ref-6" id="xref-ref-6-3"><span data-dcnode-id="5257" instrument_node="">6</span></a><span data-dcnode-id="5255" instrument_node="">], suggesting that regional vascular remodelling related to HPV may still exist, even in the absence of systemic hypoxaemia [</span><a class="xref-bibr" data-dcnode-id="5253" href="#ref-47" id="xref-ref-47-1"><span data-dcnode-id="5254" instrument_node="">47</span></a><span data-dcnode-id="5252" instrument_node="">]. In patients with COPD, not only the vascular injury caused by tobacco smoke, but also the haemodynamic changes induced by HPV, may combine to induce intimal lesions in the pulmonary arteries consisting of proliferating SMLCs. Supporting this idea, the pulmonary vascular alterations induced by tobacco smoke in a rodent model are only characterised by muscularisation of the arterioles, but not increased intimal thickness consisting of proliferative SMLCs in the pulmonary muscular arteries [</span><a class="xref-bibr" data-dcnode-id="5250" href="#ref-17" id="xref-ref-17-4"><span data-dcnode-id="5251" instrument_node="">17</span></a><span data-dcnode-id="5249" instrument_node="">]. Thus multiple “hits”, including both vascular injury and high shear stress, may be essential for the development of the intimal alterations in the pulmonary muscular arteries of patients with COPD (</span><a class="xref-fig" data-dcnode-id="5247" href="#F1" id="xref-fig-1-4"><span data-dcnode-id="5248" instrument_node="">fig. 1</span></a><span data-dcnode-id="5246" instrument_node="">).</span></p><span data-dcnode-id="5244" instrument_node="">
</span><p data-dcnode-id="5239" id="p-17"><span data-dcnode-id="5243" instrument_node="">However, so far, no complex vascular lesions consisting of phenotypically altered and proliferating ELCs have been described in the lungs of patients with COPD (</span><a class="xref-fig" data-dcnode-id="5241" href="#F1" id="xref-fig-1-5"><span data-dcnode-id="5242" instrument_node="">fig. 1</span></a><span data-dcnode-id="5240" instrument_node="">).</span></p><span data-dcnode-id="5238" instrument_node="">
</span></div><div class="section" data-dcnode-id="5166" id="sec-4"><span data-dcnode-id="5236" instrument_node="">
</span><h2 data-dcnode-id="5234"><span data-dcnode-id="5235" instrument_node="">Oxygen supplementation therapy and lung vessel loss in COPD</span></h2><span data-dcnode-id="5233" instrument_node="">
</span><p data-dcnode-id="5216" id="p-18"><span data-dcnode-id="5232" instrument_node="">As mentioned earlier, some of the components of the pulmonary vascular alterations in COPD patients include hypoxia-related remodelling, such as medial wall thickening. In fact, hypoxic conditions induce proliferation of not only medial SMCs [</span><a class="xref-bibr" data-dcnode-id="5230" href="#ref-21" id="xref-ref-21-4"><span data-dcnode-id="5231" instrument_node="">21</span></a><span data-dcnode-id="5229" instrument_node="">–</span><a class="xref-bibr" data-dcnode-id="5227" href="#ref-24" id="xref-ref-24-3"><span data-dcnode-id="5228" instrument_node="">24</span></a><span data-dcnode-id="5226" instrument_node="">], but also adventitial fibroblasts [</span><a class="xref-bibr" data-dcnode-id="5224" href="#ref-48" id="xref-ref-48-1"><span data-dcnode-id="5225" instrument_node="">48</span></a><span data-dcnode-id="5223" instrument_node="">]. Fibroblast proliferation induces deposition of the ECM in pulmonary vasculature in COPD patients [</span><a class="xref-bibr" data-dcnode-id="5221" href="#ref-37" id="xref-ref-37-4"><span data-dcnode-id="5222" instrument_node="">37</span></a><span data-dcnode-id="5220" instrument_node="">], which results in decreased pulmonary vascular compliance [</span><a class="xref-bibr" data-dcnode-id="5218" href="#ref-48" id="xref-ref-48-2"><span data-dcnode-id="5219" instrument_node="">48</span></a><span data-dcnode-id="5217" instrument_node="">].</span></p><span data-dcnode-id="5215" instrument_node="">
</span><p data-dcnode-id="5198" id="p-19"><span data-dcnode-id="5214" instrument_node="">Although oxygen supplementation therapy does not normalise the remodelled vessels in COPD patients [</span><a class="xref-bibr" data-dcnode-id="5212" href="#ref-16" id="xref-ref-16-2"><span data-dcnode-id="5213" instrument_node="">16</span></a><span data-dcnode-id="5211" instrument_node="">], this therapy has been shown to improve PAP in COPD patients, increasing their exercise capacity and decreasing the frequency of exacerbations [</span><a class="xref-bibr" data-dcnode-id="5209" href="#ref-49" id="xref-ref-49-1"><span data-dcnode-id="5210" instrument_node="">49</span></a><span data-dcnode-id="5208" instrument_node="">]. However, this therapy also reduces the ventilatory drive and can result in hypercapnia [</span><a class="xref-bibr" data-dcnode-id="5206" href="#ref-50" id="xref-ref-50-1"><span data-dcnode-id="5207" instrument_node="">50</span></a><span data-dcnode-id="5205" instrument_node="">]. Therefore, strictly controlled oxygen use with arterial oxygen saturation measured by pulse oximetry in the 90–92% range is important to avoid hypercapnia [</span><a class="xref-bibr" data-dcnode-id="5203" href="#ref-51" id="xref-ref-51-1"><span data-dcnode-id="5204" instrument_node="">51</span></a><span data-dcnode-id="5202" instrument_node="">]. This restricted oxygen supplementation may be the reason why oxygen therapy often fails to reverse the increased pulmonary arterial pressure in COPD patients [</span><a class="xref-bibr" data-dcnode-id="5200" href="#ref-16" id="xref-ref-16-3"><span data-dcnode-id="5201" instrument_node="">16</span></a><span data-dcnode-id="5199" instrument_node="">]; another reason may be that there is a nonhypoxic vasoconstriction participating in the pulmonary hypertension of COPD patients.</span></p><span data-dcnode-id="5197" instrument_node="">
</span><p data-dcnode-id="5180" id="p-20"><span data-dcnode-id="5196" instrument_node="">Studies have shown that people living at high altitude have pulmonary hypertension with reversible medial wall thickening and muscularisation of nonmuscularised arterioles [</span><a class="xref-bibr" data-dcnode-id="5194" href="#ref-11" id="xref-ref-11-2"><span data-dcnode-id="5195" instrument_node="">11</span></a><span data-dcnode-id="5193" instrument_node="">, </span><a class="xref-bibr" data-dcnode-id="5191" href="#ref-12" id="xref-ref-12-2"><span data-dcnode-id="5192" instrument_node="">12</span></a><span data-dcnode-id="5190" instrument_node="">]. Indeed, some components of pulmonary vascular remodelling in patients with COPD consist of medial wall thickening resembling that in healthy highlanders [</span><a class="xref-bibr" data-dcnode-id="5188" href="#ref-13" id="xref-ref-13-3"><span data-dcnode-id="5189" instrument_node="">13</span></a><span data-dcnode-id="5187" instrument_node="">, </span><a class="xref-bibr" data-dcnode-id="5185" href="#ref-14" id="xref-ref-14-3"><span data-dcnode-id="5186" instrument_node="">14</span></a><span data-dcnode-id="5184" instrument_node="">]. Therefore, if oxygen therapy can increase the oxygen tension in the destroyed lung units without causing ventilation/perfusion mismatch, reduced ventilatory drive and hypercapnia (in patients with COPD), some components of the pulmonary vascular alterations, including medial wall thickening (</span><em data-dcnode-id="5182"><span data-dcnode-id="5183" instrument_node="">i.e.</span></em><span data-dcnode-id="5181" instrument_node=""> hypoxia-related remodelling), might be reversed.</span></p><span data-dcnode-id="5179" instrument_node="">
</span><p data-dcnode-id="5168" id="p-21"><span data-dcnode-id="5178" instrument_node="">The pathophysiological factors that lead to an elevated PAP in patients with COPD are compression of alveolar vessels due to hyperinflation, hypoxia-induced pulmonary vasoconstriction and the obliteration of the pulmonary vasculature [</span><a class="xref-bibr" data-dcnode-id="5176" href="#ref-52" id="xref-ref-52-1"><span data-dcnode-id="5177" instrument_node="">52</span></a><span data-dcnode-id="5175" instrument_node="">]. However, the fact that &gt;60% of the total pulmonary arteries need to be obliterated or lost for pulmonary hypertension to develop suggests that the destruction of the lung capillary bed is not a major factor in the development of pulmonary hypertension in patients with mild COPD [</span><a class="xref-bibr" data-dcnode-id="5173" href="#ref-53" id="xref-ref-53-1"><span data-dcnode-id="5174" instrument_node="">53</span></a><span data-dcnode-id="5172" instrument_node="">]. Obliteration of the pulmonary vasculature may not be the principal cause of the development of pulmonary hypertension in the early stages of COPD, but may contribute during the progressive stage of this disease. Although the loss of pulmonary vessels assessed by chest CT scans has been shown to be closely related to the severity of pulmonary hypertension in COPD patients [</span><a class="xref-bibr" data-dcnode-id="5170" href="#ref-5" id="xref-ref-5-2"><span data-dcnode-id="5171" instrument_node="">5</span></a><span data-dcnode-id="5169" instrument_node="">], the degree of lung vessel loss may be related to the severity of parenchymal destruction. The pulmonary hypertension may not only be related to lung vessel loss, but also to the pulmonary vasoconstrictive reactivity and/or the severity of vascular remodelling.</span></p><span data-dcnode-id="5167" instrument_node="">
</span></div><div class="section" data-dcnode-id="5140" id="sec-5"><span data-dcnode-id="5165" instrument_node="">
</span><h2 data-dcnode-id="5163"><span data-dcnode-id="5164" instrument_node="">Conclusions</span></h2><span data-dcnode-id="5162" instrument_node="">
</span><p data-dcnode-id="5148" id="p-22"><span data-dcnode-id="5161" instrument_node="">In patients with COPD, vascular injury caused by toxic agents and airborne particulates, including tobacco smoke, and haemodynamic changes induced by hypoxic conditions resulting from parenchymal destruction and lung vessel loss are factors that influence regional lung blood flow behaviour. The combination of vascular injury and high shear stress may result in the formation of neointimal lesions [</span><a class="xref-bibr" data-dcnode-id="5159" href="#ref-6" id="xref-ref-6-4"><span data-dcnode-id="5160" instrument_node="">6</span></a><span data-dcnode-id="5158" instrument_node="">, </span><a class="xref-bibr" data-dcnode-id="5156" href="#ref-25" id="xref-ref-25-3"><span data-dcnode-id="5157" instrument_node="">25</span></a><span data-dcnode-id="5155" instrument_node="">, </span><a class="xref-bibr" data-dcnode-id="5153" href="#ref-54" id="xref-ref-54-1"><span data-dcnode-id="5154" instrument_node="">54</span></a><span data-dcnode-id="5152" instrument_node="">], which are different from the pulmonary vascular alterations seen in highlanders and the pulmonary hypertension models induced by chronic hypoxia alone (</span><a class="xref-fig" data-dcnode-id="5150" href="#F1" id="xref-fig-1-6"><span data-dcnode-id="5151" instrument_node="">fig. 1</span></a><span data-dcnode-id="5149" instrument_node="">).</span></p><span data-dcnode-id="5147" instrument_node="">
</span><p data-dcnode-id="5142" id="p-23"><span data-dcnode-id="5146" instrument_node="">The distinction between the pathological features of IPAH and COPD is attributable to the presence or absence of complex vascular lesions which are composed of phenotypically altered and proliferating ELCs (</span><a class="xref-fig" data-dcnode-id="5144" href="#F1" id="xref-fig-1-7"><span data-dcnode-id="5145" instrument_node="">fig. 1</span></a><span data-dcnode-id="5143" instrument_node="">).</span></p><span data-dcnode-id="5141" instrument_node="">
</span></div><div class="section fn-group" data-dcnode-id="5127" id="fn-group-1"><h2 data-dcnode-id="5138"><span data-dcnode-id="5139" instrument_node="">Footnotes</span></h2><ul data-dcnode-id="5128"><li class="fn-financial-disclosure" data-dcnode-id="5135" id="fn-1"><p data-dcnode-id="5136" id="p-24"><span data-dcnode-id="5137" instrument_node="">Support statement: This study was supported by research grants from the Respiratory Failure Research Group (24-046) and the Cardiovascular Diseases Research Group (24–57) from the Ministry of Health, Labour and Welfare (Japan).</span></p></li><li class="fn" data-dcnode-id="5132" id="fn-2"><p data-dcnode-id="5133" id="p-25"><span data-dcnode-id="5134" instrument_node="">Provenance: Submitted article, peer reviewed.</span></p></li><li class="fn-conflict" data-dcnode-id="5129" id="fn-3"><p data-dcnode-id="5130" id="p-26"><span data-dcnode-id="5131" instrument_node="">Conflict of interest: None declared.</span></p></li></ul></div><ul class="history-list" data-dcnode-id="5118"><li class="received" data-dcnode-id="5123" hwp:start="2013-10-29" xmlns:hwp="http://schema.highwire.org/Journal"><span class="received-label" data-dcnode-id="5125"><span data-dcnode-id="5126" instrument_node="">Received </span></span><span data-dcnode-id="5124" instrument_node="">October 29, 2013.</span></li><li class="accepted" data-dcnode-id="5119" hwp:start="2013-11-18" xmlns:hwp="http://schema.highwire.org/Journal"><span class="accepted-label" data-dcnode-id="5121"><span data-dcnode-id="5122" instrument_node="">Accepted </span></span><span data-dcnode-id="5120" instrument_node="">November 18, 2013.</span></li></ul><ul class="copyright-statement" data-dcnode-id="5115"><li class="fn" data-dcnode-id="5116" id="copyright-statement-1"><span data-dcnode-id="5117" instrument_node="">©ERS 2014</span></li></ul><div class="license" data-dcnode-id="5109" id="license-1"><p data-dcnode-id="5110" id="p-1"><span data-dcnode-id="5114" instrument_node="">ERR articles
