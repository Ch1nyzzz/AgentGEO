</span><a data-dcnode-id="4463" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.jci.org/articles/view/137558/pdf"><span data-dcnode-id="4465" instrument_node="">View PDF </span><img class="article-tools-icon" data-dcnode-id="4464" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//dm5migu4zj3pb.cloudfront.net/images/adobe_pdf_file_icon.png&amp;raw"></a><span data-dcnode-id="4462" instrument_node="">
</span><div class="content_well" data-dcnode-id="445"><span data-dcnode-id="4461" instrument_node="">
</span><a class="in-page" data-dcnode-id="4460" name="ABS"></a><dl class="article-section" data-accordion="" data-dcnode-id="4449"><dd class="accordion-navigation active" data-dcnode-id="4450"><span data-dcnode-id="4459" instrument_node="">
</span><a aria-expanded="true" data-dcnode-id="4455" href="#section-abstract"><span class="toggle-icon" data-dcnode-id="4458"></span><span class="section-title" data-dcnode-id="4456"><span data-dcnode-id="4457" instrument_node="">Abstract</span></span></a><div class="content active" data-dcnode-id="4452" id="section-abstract"><p data-dcnode-id="4453"><span data-dcnode-id="4454" instrument_node="">Pulmonary hypertension (PH) is characterized by pulmonary artery remodeling that can subsequently culminate in right heart failure and premature death. Emerging evidence suggests that hypoxia-inducible factor (HIF) signaling plays a fundamental and pivotal role in the pathogenesis of PH. This Review summarizes the regulation of HIF isoforms and their impact in various PH subtypes, as well as the elaborate conditional and cell-specific knockout mouse studies that brought the role of this pathway to light. We also discuss the current preclinical status of pan- and isoform-selective HIF inhibitors, and propose new research areas that may facilitate HIF isoform-specific inhibition as a novel therapeutic strategy for PH and right heart failure.</span></p></div><span data-dcnode-id="4451" instrument_node="">
</span></dd></dl><span data-dcnode-id="4448" instrument_node="">
</span><a class="in-page" data-dcnode-id="4447" name="SEC1"></a><dl class="article-section" data-accordion="" data-dcnode-id="4417"><dd class="accordion-navigation active" data-dcnode-id="4418"><span data-dcnode-id="4446" instrument_node="">
</span><a aria-expanded="true" data-dcnode-id="4442" href="#section-1"><span class="toggle-icon" data-dcnode-id="4445"></span><span class="section-title" data-dcnode-id="4443"><span data-dcnode-id="4444" instrument_node="">HIF signaling and biology</span></span></a><div class="content active" data-dcnode-id="4420" id="section-1"><p data-dcnode-id="4421"><span data-dcnode-id="4441" instrument_node="">The transcription factor hypoxia-inducible factor (HIF) is a master regulator of oxygen homeostasis that acts as a heterodimeric complex composed of the oxygen-sensitive α subunit (HIF-α; including HIF-1α, HIF-2α [EPAS1], and HIF-3α) and the oxygen-insensitive β subunit (HIF-β; including HIF-1β [aryl hydrocarbon receptor nuclear translocator, ARNT1], ARNT2, and ARNT3) (</span><span class="xref" data-dcnode-id="4438"><a data-dcnode-id="4439" href="#B1" id="#B1-link" onclick="showRefSection();"><span data-dcnode-id="4440" instrument_node="">1</span></a></span><span data-dcnode-id="4437" instrument_node="">). In oxygenized cells, the HIF-α subunit is inactivated via hydroxylation by prolyl hydroxylase domain proteins (PHDs) and factor inhibiting HIF (FIH), which allows the binding of von Hippel–Lindau (VHL) tumor suppressor protein, a component of an E3 ubiquitin ligase complex that subsequently targets hydroxylated HIF-α for proteasomal degradation. Under hypoxic conditions, oxygen becomes limited, leading to the attenuation of HIF-α hydroxylation and resulting in stabilization of HIF-α subunits. This initiates nuclear translocation and binding of the HIF-α subunit with the HIF-β subunit, and this activated HIF initiates an adaptive response to hypoxia by inducing or repressing a broad range of genes involved in regulation of vascular tone, angiogenesis, erythropoiesis, cellular metabolism, proliferation, survival, and autophagic response (</span><span class="xref" data-dcnode-id="4433"><span class="gen" data-dcnode-id="4436"></span><a data-dcnode-id="4434" href="#B1" id="#B1-link" onclick="showRefSection();"><span data-dcnode-id="4435" instrument_node="">1</span></a></span><span data-dcnode-id="4432" instrument_node="">). However, nonhypoxic conditions, i.e., growth factors, hormones, or cytokines, also modulate HIF-α subunits at various levels (gene transcription, mRNA processing, protein-protein interactions, and posttranslational modifications; for a detailed description see refs. </span><span class="xref" data-dcnode-id="4428"><span class="gen" data-dcnode-id="4431"></span><a data-dcnode-id="4429" href="#B1" id="#B1-link" onclick="showRefSection();"><span data-dcnode-id="4430" instrument_node="">1</span></a></span><span data-dcnode-id="4427" instrument_node="">, </span><span class="xref" data-dcnode-id="4423"><span class="gen" data-dcnode-id="4426"></span><a data-dcnode-id="4424" href="#B2" id="#B2-link" onclick="showRefSection();"><span data-dcnode-id="4425" instrument_node="">2</span></a></span><span data-dcnode-id="4422" instrument_node="">) and regulate a plethora of signaling pathways. In the lung, HIFs orchestrate a physiological response to hypoxia and contribute to the pathogenesis of numerous disorders, including lung cancer, chronic obstructive pulmonary disease (COPD), pulmonary fibrosis (PF), and pulmonary hypertension.</span></p></div><span data-dcnode-id="4419" instrument_node="">
</span></dd></dl><span data-dcnode-id="4416" instrument_node="">
</span><a class="in-page" data-dcnode-id="4415" name="SEC2"></a><dl class="article-section" data-accordion="" data-dcnode-id="4253"><dd class="accordion-navigation active" data-dcnode-id="4254"><span data-dcnode-id="4414" instrument_node="">
</span><a aria-expanded="true" data-dcnode-id="4410" href="#section-2"><span class="toggle-icon" data-dcnode-id="4413"></span><span class="section-title" data-dcnode-id="4411"><span data-dcnode-id="4412" instrument_node="">Regulation of HIF signaling pathways in PH patients</span></span></a><div class="content active" data-dcnode-id="4256" id="section-2"><p data-dcnode-id="4257"><span data-dcnode-id="4409" instrument_node="">Pulmonary hypertension (PH) is a severe pulmonary vascular disorder characterized by excessive proliferation of vascular cells, increased extracellular matrix deposition, and accumulation of inflammatory cells within the pulmonary vascular wall, collectively resulting in increased pulmonary vascular resistance (</span><span class="xref" data-dcnode-id="4406"><a data-dcnode-id="4407" href="#B3" id="#B3-link" onclick="showRefSection();"><span data-dcnode-id="4408" instrument_node="">3</span></a></span><span data-dcnode-id="4405" instrument_node="">). Despite extensive research in this field, the mechanisms underlying disease development and progression are incompletely understood (</span><span class="xref" data-dcnode-id="4401"><span class="gen" data-dcnode-id="4404"></span><a data-dcnode-id="4402" href="#B4" id="#B4-link" onclick="showRefSection();"><span data-dcnode-id="4403" instrument_node="">4</span></a></span><span data-dcnode-id="4400" instrument_node="">). Among many dysregulated signaling pathways, HIF signaling has been identified as one underlying mechanism determining disease progression not only in pulmonary arterial hypertension (PAH; group I PH), but also in PH due to lung diseases and/or hypoxia, including PH associated with chronic high altitude exposure (</span><span class="xref" data-dcnode-id="4396"><span class="gen" data-dcnode-id="4399"></span><a data-dcnode-id="4397" href="#B5" id="#B5-link" onclick="showRefSection();"><span data-dcnode-id="4398" instrument_node="">5</span></a></span><span data-dcnode-id="4395" instrument_node="">, </span><span class="xref" data-dcnode-id="4391"><span class="gen" data-dcnode-id="4394"></span><a data-dcnode-id="4392" href="#B6" id="#B6-link" onclick="showRefSection();"><span data-dcnode-id="4393" instrument_node="">6</span></a></span><span data-dcnode-id="4390" instrument_node="">), COPD (</span><span class="xref" data-dcnode-id="4386"><span class="gen" data-dcnode-id="4389"></span><a data-dcnode-id="4387" href="#B7" id="#B7-link" onclick="showRefSection();"><span data-dcnode-id="4388" instrument_node="">7</span></a></span><span data-dcnode-id="4385" instrument_node="">), and PF (</span><span class="xref" data-dcnode-id="4381"><span class="gen" data-dcnode-id="4384"></span><a data-dcnode-id="4382" href="#B8" id="#B8-link" onclick="showRefSection();"><span data-dcnode-id="4383" instrument_node="">8</span></a></span><span data-dcnode-id="4380" instrument_node="">) (group III PH). Notably, augmented expression of HIF-1α has been observed in lung tissues of patients with PAH (</span><span class="xref" data-dcnode-id="4376"><span class="gen" data-dcnode-id="4379"></span><a data-dcnode-id="4377" href="#B9" id="#B9-link" onclick="showRefSection();"><span data-dcnode-id="4378" instrument_node="">9</span></a></span><span data-dcnode-id="4375" instrument_node="">–</span><span class="xref" data-dcnode-id="4371"><span class="gen" data-dcnode-id="4374"></span><a data-dcnode-id="4372" href="#B13" id="#B13-link" onclick="showRefSection();"><span data-dcnode-id="4373" instrument_node="">13</span></a></span><span data-dcnode-id="4370" instrument_node="">), chronic thromboembolic PH (</span><span class="xref" data-dcnode-id="4366"><span class="gen" data-dcnode-id="4369"></span><a data-dcnode-id="4367" href="#B14" id="#B14-link" onclick="showRefSection();"><span data-dcnode-id="4368" instrument_node="">14</span></a></span><span data-dcnode-id="4365" instrument_node="">), and idiopathic PF-associated PH (</span><span class="xref" data-dcnode-id="4361"><span class="gen" data-dcnode-id="4364"></span><a data-dcnode-id="4362" href="#B15" id="#B15-link" onclick="showRefSection();"><span data-dcnode-id="4363" instrument_node="">15</span></a></span><span data-dcnode-id="4360" instrument_node="">, </span><span class="xref" data-dcnode-id="4356"><span class="gen" data-dcnode-id="4359"></span><a data-dcnode-id="4357" href="#B16" id="#B16-link" onclick="showRefSection();"><span data-dcnode-id="4358" instrument_node="">16</span></a></span><span data-dcnode-id="4355" instrument_node="">), while HIF-2α has been associated with congenital diaphragmatic hernia–associated PH (</span><span class="xref" data-dcnode-id="4351"><span class="gen" data-dcnode-id="4354"></span><a data-dcnode-id="4352" href="#B17" id="#B17-link" onclick="showRefSection();"><span data-dcnode-id="4353" instrument_node="">17</span></a></span><span data-dcnode-id="4350" instrument_node="">). In addition, neonatal patients with acute respiratory disease–associated PH also display increased circulating levels of HIF-1α (</span><span class="xref" data-dcnode-id="4346"><span class="gen" data-dcnode-id="4349"></span><a data-dcnode-id="4347" href="#B18" id="#B18-link" onclick="showRefSection();"><span data-dcnode-id="4348" instrument_node="">18</span></a></span><span data-dcnode-id="4345" instrument_node="">). Moreover, HIF-1α and its target genes vascular endothelial growth factor (</span><i data-dcnode-id="4343"><span data-dcnode-id="4344" instrument_node="">VEGF</span></i><span data-dcnode-id="4342" instrument_node="">) and erythropoietin (</span><i data-dcnode-id="4340"><span data-dcnode-id="4341" instrument_node="">EPO</span></i><span data-dcnode-id="4339" instrument_node="">) are upregulated in peripheral blood cells of newborns with cyanosis and persistent PH, therefore representing early markers of generalized hypoxia (</span><span class="xref" data-dcnode-id="4336"><a data-dcnode-id="4337" href="#B19" id="#B19-link" onclick="showRefSection();"><span data-dcnode-id="4338" instrument_node="">19</span></a></span><span data-dcnode-id="4335" instrument_node="">). Similarly, increases in circulating bone marrow–derived progenitor cells observed in PAH patients are regulated by HIF-1α–driven C-X-C motif chemokine ligand 12 (</span><i data-dcnode-id="4333"><span data-dcnode-id="4334" instrument_node="">CXCL12</span></i><span data-dcnode-id="4332" instrument_node="">) expression in pulmonary artery endothelial cells (PAECs) (</span><span class="xref" data-dcnode-id="4329"><a data-dcnode-id="4330" href="#B20" id="#B20-link" onclick="showRefSection();"><span data-dcnode-id="4331" instrument_node="">20</span></a></span><span data-dcnode-id="4328" instrument_node="">). The cellular sources of increased HIF-1α expression in lung tissue of PH patients are PAECs (</span><span class="xref" data-dcnode-id="4324"><span class="gen" data-dcnode-id="4327"></span><a data-dcnode-id="4325" href="#B16" id="#B16-link" onclick="showRefSection();"><span data-dcnode-id="4326" instrument_node="">16</span></a></span><span data-dcnode-id="4323" instrument_node="">, </span><span class="xref" data-dcnode-id="4319"><span class="gen" data-dcnode-id="4322"></span><a data-dcnode-id="4320" href="#B21" id="#B21-link" onclick="showRefSection();"><span data-dcnode-id="4321" instrument_node="">21</span></a></span><span data-dcnode-id="4318" instrument_node="">) and pulmonary artery smooth muscle cells (PASMCs) (</span><span class="xref" data-dcnode-id="4314"><span class="gen" data-dcnode-id="4317"></span><a data-dcnode-id="4315" href="#B22" id="#B22-link" onclick="showRefSection();"><span data-dcnode-id="4316" instrument_node="">22</span></a></span><span data-dcnode-id="4313" instrument_node="">, </span><span class="xref" data-dcnode-id="4309"><span class="gen" data-dcnode-id="4312"></span><a data-dcnode-id="4310" href="#B23" id="#B23-link" onclick="showRefSection();"><span data-dcnode-id="4311" instrument_node="">23</span></a></span><span data-dcnode-id="4308" instrument_node="">). While some reports show HIF-1α upregulation in the pulmonary arteries of PAH patients (</span><span class="xref" data-dcnode-id="4304"><span class="gen" data-dcnode-id="4307"></span><a data-dcnode-id="4305" href="#B24" id="#B24-link" onclick="showRefSection();"><span data-dcnode-id="4306" instrument_node="">24</span></a></span><span data-dcnode-id="4303" instrument_node="">), others provide evidence of decreased HIF-1α in PASMCs isolated from idiopathic PAH (IPAH) patients (</span><span class="xref" data-dcnode-id="4299"><span class="gen" data-dcnode-id="4302"></span><a data-dcnode-id="4300" href="#B25" id="#B25-link" onclick="showRefSection();"><span data-dcnode-id="4301" instrument_node="">25</span></a></span><span data-dcnode-id="4298" instrument_node="">, </span><span class="xref" data-dcnode-id="4294"><span class="gen" data-dcnode-id="4297"></span><a data-dcnode-id="4295" href="#B26" id="#B26-link" onclick="showRefSection();"><span data-dcnode-id="4296" instrument_node="">26</span></a></span><span data-dcnode-id="4293" instrument_node="">). PAH patients also display increased pulmonary expression of HIF-1β (</span><span class="xref" data-dcnode-id="4289"><span class="gen" data-dcnode-id="4292"></span><a data-dcnode-id="4290" href="#B11" id="#B11-link" onclick="showRefSection();"><span data-dcnode-id="4291" instrument_node="">11</span></a></span><span data-dcnode-id="4288" instrument_node="">), and similarly, the expression of HIF-2α has been found to be increased in pulmonary arteries of patients with PAH (</span><span class="xref" data-dcnode-id="4284"><span class="gen" data-dcnode-id="4287"></span><a data-dcnode-id="4285" href="#B24" id="#B24-link" onclick="showRefSection();"><span data-dcnode-id="4286" instrument_node="">24</span></a></span><span data-dcnode-id="4283" instrument_node="">, </span><span class="xref" data-dcnode-id="4279"><span class="gen" data-dcnode-id="4282"></span><a data-dcnode-id="4280" href="#B27" id="#B27-link" onclick="showRefSection();"><span data-dcnode-id="4281" instrument_node="">27</span></a></span><span data-dcnode-id="4278" instrument_node="">) and IPF-associated PH (</span><span class="xref" data-dcnode-id="4274"><span class="gen" data-dcnode-id="4277"></span><a data-dcnode-id="4275" href="#B16" id="#B16-link" onclick="showRefSection();"><span data-dcnode-id="4276" instrument_node="">16</span></a></span><span data-dcnode-id="4273" instrument_node="">). The cellular sources of increased HIF-2α expression in the lung tissue of PH patients are mainly PAECs (</span><span class="xref" data-dcnode-id="4269"><span class="gen" data-dcnode-id="4272"></span><a data-dcnode-id="4270" href="#B16" id="#B16-link" onclick="showRefSection();"><span data-dcnode-id="4271" instrument_node="">16</span></a></span><span data-dcnode-id="4268" instrument_node="">, </span><span class="xref" data-dcnode-id="4264"><span class="gen" data-dcnode-id="4267"></span><a data-dcnode-id="4265" href="#B27" id="#B27-link" onclick="showRefSection();"><span data-dcnode-id="4266" instrument_node="">27</span></a></span><span data-dcnode-id="4263" instrument_node="">, </span><span class="xref" data-dcnode-id="4259"><span class="gen" data-dcnode-id="4262"></span><a data-dcnode-id="4260" href="#B28" id="#B28-link" onclick="showRefSection();"><span data-dcnode-id="4261" instrument_node="">28</span></a></span><span data-dcnode-id="4258" instrument_node="">), suggesting cell type– and context-specific regulation of HIF isoforms in PH.</span></p></div><span data-dcnode-id="4255" instrument_node="">
</span></dd></dl><span data-dcnode-id="4252" instrument_node="">
</span><a class="in-page" data-dcnode-id="4251" name="SEC3"></a><dl class="article-section" data-accordion="" data-dcnode-id="3901"><dd class="accordion-navigation active" data-dcnode-id="3902"><span data-dcnode-id="4250" instrument_node="">
</span><a aria-expanded="true" data-dcnode-id="4246" href="#section-3"><span class="toggle-icon" data-dcnode-id="4249"></span><span class="section-title" data-dcnode-id="4247"><span data-dcnode-id="4248" instrument_node="">Upstream regulators of the HIF system in PH</span></span></a><div class="content active" data-dcnode-id="3904" id="section-3"><span data-dcnode-id="4245" instrument_node="">
</span><p data-dcnode-id="4240"><span data-dcnode-id="4244" instrument_node="">Activation of HIFs in various subtypes of PH suggests that along with chronic hypoxia, other factors responsible for the initiation of PH (gene variants, vasoconstriction, endothelial dysfunction, mitochondrial abnormalities, dysregulated cell growth, and inflammation) can activate HIF signaling pathways to trigger alterations in pulmonary vascular cells, inflammatory cells, and cardiac cells that remodel lung vasculature and right ventricle (RV) (</span><a data-dcnode-id="4242" href="#F1" id="#F1-link" onclick="showFigSection(this);"><span data-dcnode-id="4243" instrument_node="">Figure 1</span></a><span data-dcnode-id="4241" instrument_node="">).</span></p><span data-dcnode-id="4239" instrument_node="">
</span><a class="in-page" data-dcnode-id="4238" id="F1-target" name="F1"></a><div class="figure" data-dcnode-id="4221"><span data-dcnode-id="4237" instrument_node="">
</span><a data-dcnode-id="4235" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.jci.org/articles/view/137558/figure/1"><img align="left" alt="Emerging concepts of HIF signaling in pulmonary hypertension." class="figure_thumbnail" data-dcnode-id="4236" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//dm5migu4zj3pb.cloudfront.net/manuscripts/137000/137558/small/JCI137558.f1.gif&amp;raw" title="Emerging concepts of HIF signaling in pulmonary hypertension."></a><a class="figure_number" data-dcnode-id="4233" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.jci.org/articles/view/137558/figure/1"><span data-dcnode-id="4234" instrument_node="">Figure 1</span></a><p data-dcnode-id="4223"><span class="figure_title" data-dcnode-id="4231"><span data-dcnode-id="4232" instrument_node="">Emerging concepts of HIF signaling in pulmonary hypertension.</span></span><span data-dcnode-id="4230" instrument_node=""> Emerging evidence shows that many pro-PH factors apart from hypoxia, such as inflammation, mechanical stretch, oxidative stress, and genetic predisposition, converge on HIF signaling pathways, causing alterations in vascular tone, angiogenesis, metabolism, and cell survival that subsequently lead to pulmonary vascular and right ventricular remodeling. VHL, von Hippel–Lindau tumor suppressor; α</span><sub data-dcnode-id="4228"><span data-dcnode-id="4229" instrument_node="">1β</span></sub><span data-dcnode-id="4227" instrument_node="">AR, α</span><sub data-dcnode-id="4225"><span data-dcnode-id="4226" instrument_node="">1</span></sub><span data-dcnode-id="4224" instrument_node="">β-adrenergic receptor; iNOS, inducible nitric oxide synthase; HO-1, heme oxygenase-1; TRPC1, transient receptor potential canonical 1; KCNA5, potassium voltage-gated channel, shaker-related subfamily, member 5; KCNMB1, calcium-activated potassium channel subunit beta-1; PAI-1, plasminogen activator inhibitor-1; TF, transferrin; TFR, transferrin receptor; EPO, erythropoietin; PDK1, pyruvate dehydrogenase kinase 1; IGF2BP1, insulin-like growth factor 2 mRNA-binding protein 1; p21, cyclin-dependent kinase inhibitor 1; CCNG2, cyclin-G2; DEC1, deleted in esophageal cancer 1.</span></p><span data-dcnode-id="4222" instrument_node="">
</span></div><span data-dcnode-id="4220" instrument_node="">
</span><p data-dcnode-id="4182"><span class="level-4" data-dcnode-id="4218"><span data-dcnode-id="4219" instrument_node="">Gene variants of the HIF pathway.</span></span><span data-dcnode-id="4217" instrument_node=""> Gene variants of HIF pathway molecules identified in high-altitude populations and in patients with Chuvash polycythemia illustrate the HIF pathway’s importance in pulmonary vascular adaptation and remodeling. Chuvash polycythemia is characterized by the presence of the R200W (598C&gt;T) missense mutation in VHL, which reduces its binding to hydroxylated HIF-α subunits and thus increases HIF-1α and HIF-2α levels (</span><span class="xref" data-dcnode-id="4214"><a data-dcnode-id="4215" href="#B29" id="#B29-link" onclick="showRefSection();"><span data-dcnode-id="4216" instrument_node="">29</span></a></span><span data-dcnode-id="4213" instrument_node="">). This leads to expression of HIF target genes including </span><i data-dcnode-id="4211"><span data-dcnode-id="4212" instrument_node="">EPO</span></i><span data-dcnode-id="4210" instrument_node=""> and </span><i data-dcnode-id="4208"><span data-dcnode-id="4209" instrument_node="">VEGF</span></i><span data-dcnode-id="4207" instrument_node=""> and results in development of polycythemia. In Chuvash polycythemia, apart from erythrocytosis, several VHL loss-of-function mutations, including D126N (376G&gt;A) (</span><span class="xref" data-dcnode-id="4204"><a data-dcnode-id="4205" href="#B30" id="#B30-link" onclick="showRefSection();"><span data-dcnode-id="4206" instrument_node="">30</span></a></span><span data-dcnode-id="4203" instrument_node="">), D126N (376G&gt;A)/S183L (548C&gt;T) (</span><span class="xref" data-dcnode-id="4199"><span class="gen" data-dcnode-id="4202"></span><a data-dcnode-id="4200" href="#B31" id="#B31-link" onclick="showRefSection();"><span data-dcnode-id="4201" instrument_node="">31</span></a></span><span data-dcnode-id="4198" instrument_node="">), and M54I (162G&gt;C), were found to be associated with higher resting pulmonary artery pressure (PAP), severe PH, and RV dysfunction (</span><span class="xref" data-dcnode-id="4194"><span class="gen" data-dcnode-id="4197"></span><a data-dcnode-id="4195" href="#B32" id="#B32-link" onclick="showRefSection();"><span data-dcnode-id="4196" instrument_node="">32</span></a></span><span data-dcnode-id="4193" instrument_node="">–</span><span class="xref" data-dcnode-id="4189"><span class="gen" data-dcnode-id="4192"></span><a data-dcnode-id="4190" href="#B35" id="#B35-link" onclick="showRefSection();"><span data-dcnode-id="4191" instrument_node="">35</span></a></span><span data-dcnode-id="4188" instrument_node="">). Moreover, mutation in HIF-2α G537R, which impairs HIF-2α hydroxylation, causing familial erythrocytosis, is also associated with PH (</span><span class="xref" data-dcnode-id="4184"><span class="gen" data-dcnode-id="4187"></span><a data-dcnode-id="4185" href="#B36" id="#B36-link" onclick="showRefSection();"><span data-dcnode-id="4186" instrument_node="">36</span></a></span><span data-dcnode-id="4183" instrument_node="">).</span></p><span data-dcnode-id="4181" instrument_node="">
</span><p data-dcnode-id="4148"><span data-dcnode-id="4180" instrument_node="">Several genome-wide selection studies have been performed on high-altitude populations, including Tibetans, Ethiopians, and Andeans (</span><span class="xref" data-dcnode-id="4177"><a data-dcnode-id="4178" href="#B5" id="#B5-link" onclick="showRefSection();"><span data-dcnode-id="4179" instrument_node="">5</span></a></span><span data-dcnode-id="4176" instrument_node="">, </span><span class="xref" data-dcnode-id="4172"><span class="gen" data-dcnode-id="4175"></span><a data-dcnode-id="4173" href="#B6" id="#B6-link" onclick="showRefSection();"><span data-dcnode-id="4174" instrument_node="">6</span></a></span><span data-dcnode-id="4171" instrument_node="">), and identified signals of positive selection for gene variants in and around the HIF pathway enabling these populations to adapt to life at high-altitude hypoxia. However, long-term high-altitude residency may lead to a sustained increase in PAP and development of PH. Among all high-altitude populations, Tibetans have the lowest PAP (</span><span class="xref" data-dcnode-id="4167"><span class="gen" data-dcnode-id="4170"></span><a data-dcnode-id="4168" href="#B37" id="#B37-link" onclick="showRefSection();"><span data-dcnode-id="4169" instrument_node="">37</span></a></span><span data-dcnode-id="4166" instrument_node="">). A candidate gene study based on the results of genome-wide analyses that identified gene variants associated with high-altitude adaptation found that </span><i data-dcnode-id="4164"><span data-dcnode-id="4165" instrument_node="">EPAS1</span></i><span data-dcnode-id="4163" instrument_node=""> (HIF-2α) variants are associated with lower PAP in Tibetans (</span><span class="xref" data-dcnode-id="4160"><a data-dcnode-id="4161" href="#B38" id="#B38-link" onclick="showRefSection();"><span data-dcnode-id="4162" instrument_node="">38</span></a></span><span data-dcnode-id="4159" instrument_node="">). Furthermore, Tibetans who live at low altitudes but harbor gene variants in </span><i data-dcnode-id="4157"><span data-dcnode-id="4158" instrument_node="">EPAS1</span></i><span data-dcnode-id="4156" instrument_node=""> (encoding HIF-2α) and </span><i data-dcnode-id="4154"><span data-dcnode-id="4155" instrument_node="">EGLN1</span></i><span data-dcnode-id="4153" instrument_node=""> (encoding PHD2) display blunted hypoxic pulmonary vasoconstriction (</span><span class="xref" data-dcnode-id="4150"><a data-dcnode-id="4151" href="#B39" id="#B39-link" onclick="showRefSection();"><span data-dcnode-id="4152" instrument_node="">39</span></a></span><span data-dcnode-id="4149" instrument_node="">). Thus, future studies are required to delineate the role of HIF pathway gene variants in driving high-altitude PH susceptibility or resistance among indigenous high-altitude populations.</span></p><span data-dcnode-id="4147" instrument_node="">
</span><p data-dcnode-id="4096"><span class="level-4" data-dcnode-id="4145"><span data-dcnode-id="4146" instrument_node="">Vasomodulatory factors.</span></span><span data-dcnode-id="4144" instrument_node=""> Various vasomodulatory factors have been shown to regulate HIF isoform stability and transcriptional activity in PAECs (</span><a data-dcnode-id="4142" href="#F2" id="#F2-link" onclick="showFigSection(this);"><span data-dcnode-id="4143" instrument_node="">Figure 2</span></a><span data-dcnode-id="4141" instrument_node=""> and </span><a data-dcnode-id="4139" href="#T1"><span data-dcnode-id="4140" instrument_node="">Table 1</span></a><span data-dcnode-id="4138" instrument_node="">). Nitric oxide (NO) maintains pulmonary vascular tone, and its downregulation is implicated in PH pathogenesis. Recent studies indicate that the NO plays a central role in hypoxia/HIF axis regulation. For example, in PAECs, hypoxia leads to post-transcriptional negative regulation of endothelial NO synthase (eNOS) expression by the </span><i data-dcnode-id="4136"><span data-dcnode-id="4137" instrument_node="">cis</span></i><span data-dcnode-id="4135" instrument_node="">–natural antisense RNA sONE (</span><span class="xref" data-dcnode-id="4132"><a data-dcnode-id="4133" href="#B40" id="#B40-link" onclick="showRefSection();"><span data-dcnode-id="4134" instrument_node="">40</span></a></span><span data-dcnode-id="4131" instrument_node="">), which results in lower levels of NO and increased HIF-1α stability. Accordingly, low levels of NO due to eNOS deletion also cause HIF-1α stabilization and migration of normoxic endothelial cells (ECs) (</span><span class="xref" data-dcnode-id="4127"><span class="gen" data-dcnode-id="4130"></span><a data-dcnode-id="4128" href="#B41" id="#B41-link" onclick="showRefSection();"><span data-dcnode-id="4129" instrument_node="">41</span></a></span><span data-dcnode-id="4126" instrument_node="">). Moreover, endogenous regulators of NO production such as arginase-2 and asymmetric dimethyl arginine affect cell proliferation and inflammatory gene expression by stabilizing HIF-1α in PAECs (</span><span class="xref" data-dcnode-id="4122"><span class="gen" data-dcnode-id="4125"></span><a data-dcnode-id="4123" href="#B42" id="#B42-link" onclick="showRefSection();"><span data-dcnode-id="4124" instrument_node="">42</span></a></span><span data-dcnode-id="4121" instrument_node="">). Endothelin 1 (ET-1), a potent vasoconstrictor, also stabilizes HIF-1α, which in turn promotes the HIF-1α–induced glycolytic switch via eNOS-mediated reactive oxygen species (ROS) production in PAECs (</span><span class="xref" data-dcnode-id="4117"><span class="gen" data-dcnode-id="4120"></span><a data-dcnode-id="4118" href="#B43" id="#B43-link" onclick="showRefSection();"><span data-dcnode-id="4119" instrument_node="">43</span></a></span><span data-dcnode-id="4116" instrument_node="">). Likewise, stimulation of normoxic PASMCs with ET-1 increases stability of HIF-1α as a result of increased Ca</span><sup data-dcnode-id="4114"><span data-dcnode-id="4115" instrument_node="">2+</span></sup><span data-dcnode-id="4113" instrument_node=""> and ROS and increases transcriptional activity of HIF-1α due to ERK1/2 pathway activation, which phosphorylates p300 to increase its binding to HIF-1α (</span><span class="xref" data-dcnode-id="4110"><a data-dcnode-id="4111" href="#B44" id="#B44-link" onclick="showRefSection();"><span data-dcnode-id="4112" instrument_node="">44</span></a></span><span data-dcnode-id="4109" instrument_node="">). Moreover, ET-1 promotes HIF-1α protein stabilization in normoxic PASMCs via calcineurin-dependent RACK1 dephosphorylation, which in turn inhibits PHD2 activity (</span><span class="xref" data-dcnode-id="4105"><span class="gen" data-dcnode-id="4108"></span><a data-dcnode-id="4106" href="#B45" id="#B45-link" onclick="showRefSection();"><span data-dcnode-id="4107" instrument_node="">45</span></a></span><span data-dcnode-id="4104" instrument_node="">). Importantly, HIF has also been shown to regulate ET-1 synthesis. Mice with global deficiency for NEPAS, a transcript variant of HIF-3α, exhibit </span><i data-dcnode-id="4102"><span data-dcnode-id="4103" instrument_node="">ET-1</span></i><span data-dcnode-id="4101" instrument_node=""> overexpression, which leads to pulmonary vascular remodeling and dilated cardiomyopathy due to excessive tissue vascularization that is evident from birth and progresses in later stages of life (</span><span class="xref" data-dcnode-id="4098"><a data-dcnode-id="4099" href="#B46" id="#B46-link" onclick="showRefSection();"><span data-dcnode-id="4100" instrument_node="">46</span></a></span><span data-dcnode-id="4097" instrument_node="">). Thus, HIF and ET-1 form a bidirectional regulatory loop that plays an important role in driving pulmonary vascular remodeling.</span></p><span data-dcnode-id="4095" instrument_node="">
</span><a class="in-page" data-dcnode-id="4094" id="F2-target" name="F2"></a><div class="figure" data-dcnode-id="4080"><span data-dcnode-id="4093" instrument_node="">
</span><a data-dcnode-id="4091" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.jci.org/articles/view/137558/figure/2"><img align="left" alt="HIF signaling in PH: upstream and downstream modulators in pulmonary artery" class="figure_thumbnail" data-dcnode-id="4092" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//dm5migu4zj3pb.cloudfront.net/manuscripts/137000/137558/small/JCI137558.f2.gif&amp;raw" title="HIF signaling in PH: upstream and downstream modulators in pulmonary artery endothelial cells."></a><a class="figure_number" data-dcnode-id="4089" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.jci.org/articles/view/137558/figure/2"><span data-dcnode-id="4090" instrument_node="">Figure 2</span></a><p data-dcnode-id="4082"><span class="figure_title" data-dcnode-id="4087"><span data-dcnode-id="4088" instrument_node="">HIF signaling in PH: upstream and downstream modulators in pulmonary artery endothelial cells.</span></span><span data-dcnode-id="4086" instrument_node=""> Vasomodulatory, mitochondrial, and inflammatory growth factors and epigenetic abnormalities associated with PH regulate HIF isoform stability and transcriptional activity in pulmonary artery endothelial cells (PAECs). Subsequently, HIF isoforms transcriptionally activate a series of genes that participate in vascular tone, angiogenesis, metabolism, and cell proliferation. Long black lines with arrows indicate an activating effect; blocked red lines, an inhibiting effect; ↑, activation or upregulation; ↓, inactivation or downregulation. TFAM, mitochondrial transcription factor A; PlGF, placental growth factor; EPOR, erythropoietin receptor; ET</span><sub data-dcnode-id="4084"><span data-dcnode-id="4085" instrument_node="">A/B</span></sub><span data-dcnode-id="4083" instrument_node="">, endothelin receptor type A and B; sONE, antisense mRNA; ADMA, asymmetric dimethylarginine; Cul2, Cullin 2; ATOH8, atonal BHLH transcription factor 8; ISCU1/2, iron-sulfur (Fe-S) cluster assembly proteins 1 and 2; PGK1, phosphoglycerate kinase 1; PKM, pyruvate kinase M.</span></p><span data-dcnode-id="4081" instrument_node="">
</span></div><span data-dcnode-id="4079" instrument_node="">
</span><a class="in-page" data-dcnode-id="4078" id="T1-target" name="T1"></a><div class="figure" data-dcnode-id="4068"><span data-dcnode-id="4077" instrument_node="">
</span><a data-dcnode-id="4075" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.jci.org/articles/view/137558/table/1"><img align="left" class="table_thumbnail" data-dcnode-id="4076" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//dm5migu4zj3pb.cloudfront.net/manuscripts/137000/137558/small/JCI137558.t1.gif&amp;raw"></a><a class="figure_number" data-dcnode-id="4073" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.jci.org/articles/view/137558/table/1"><span data-dcnode-id="4074" instrument_node="">Table 1</span></a><p data-dcnode-id="4070"><span class="figure_title" data-dcnode-id="4071"><span data-dcnode-id="4072" instrument_node="">Summary of studies investigating upstream regulators of HIF signaling pathway in PH</span></span></p><span data-dcnode-id="4069" instrument_node="">
</span></div><span data-dcnode-id="4067" instrument_node="">
</span><p data-dcnode-id="4017"><span class="level-4" data-dcnode-id="4065"><span data-dcnode-id="4066" instrument_node="">Inflammation, growth factors, and microRNAs.</span></span><span data-dcnode-id="4064" instrument_node=""> Hypoxia induces upregulation of IL-33 and its receptor ST2 in PAECs, which activates downstream HIF-1α/VEGF signaling resulting in enhanced proliferation, adhesion, and angiogenesis in an ST2-dependent fashion (</span><span class="xref" data-dcnode-id="4061"><a data-dcnode-id="4062" href="#B47" id="#B47-link" onclick="showRefSection();"><span data-dcnode-id="4063" instrument_node="">47</span></a></span><span data-dcnode-id="4060" instrument_node="">). Similarly, hormones and growth factors such as bone morphogenetic protein (BMP), placental growth factor (PlGF), platelet-derived growth factor (PDGF), EPO, estradiol, and signaling molecules regulate HIF isoform transcriptional activity in PAECs. For example, in patients with sickle cell disease–associated (SCD-associated) PH, elevated levels of PlGF result in downregulation of microRNA-199a2 (miR-199a2), a negative regulator of HIF-1α. Furthermore, PPARα agonist–mediated transcription of miR-199a2 attenuates </span><i data-dcnode-id="4058"><span data-dcnode-id="4059" instrument_node="">ET-1</span></i><span data-dcnode-id="4057" instrument_node=""> expression and HIF-1α level, ameliorating PH in a mouse model of SCD (</span><span class="xref" data-dcnode-id="4054"><a data-dcnode-id="4055" href="#B48" id="#B48-link" onclick="showRefSection();"><span data-dcnode-id="4056" instrument_node="">48</span></a></span><span data-dcnode-id="4053" instrument_node="">–</span><span class="xref" data-dcnode-id="4049"><span class="gen" data-dcnode-id="4052"></span><a data-dcnode-id="4050" href="#B50" id="#B50-link" onclick="showRefSection();"><span data-dcnode-id="4051" instrument_node="">50</span></a></span><span data-dcnode-id="4048" instrument_node="">). Estradiol negatively regulates </span><i data-dcnode-id="4046"><span data-dcnode-id="4047" instrument_node="">ET-1</span></i><span data-dcnode-id="4045" instrument_node=""> expression in PAECs by interfering with HIF activity, possibly through competition for limiting quantities of CBP/p300 (</span><span class="xref" data-dcnode-id="4042"><a data-dcnode-id="4043" href="#B51" id="#B51-link" onclick="showRefSection();"><span data-dcnode-id="4044" instrument_node="">51</span></a></span><span data-dcnode-id="4041" instrument_node="">). Estradiol also negatively regulates HIF-2α by promoting its degradation by estrogen receptor β–mediated (ERβ-mediated) PHD2 upregulation in hypoxic PAECs (</span><span class="xref" data-dcnode-id="4037"><span class="gen" data-dcnode-id="4040"></span><a data-dcnode-id="4038" href="#B52" id="#B52-link" onclick="showRefSection();"><span data-dcnode-id="4039" instrument_node="">52</span></a></span><span data-dcnode-id="4036" instrument_node="">). By contrast, the BMP signaling molecules SMAD1 and SMAD5 transcriptionally activate atonal bHLH transcription factor 8 (</span><i data-dcnode-id="4034"><span data-dcnode-id="4035" instrument_node="">ATOH8</span></i><span data-dcnode-id="4033" instrument_node="">) expression, which interacts with HIF-2α to reduce its abundance and expression of its target genes delta-like protein 4 (</span><i data-dcnode-id="4031"><span data-dcnode-id="4032" instrument_node="">DLL4</span></i><span data-dcnode-id="4030" instrument_node="">) and angiopoietin-2 (</span><i data-dcnode-id="4028"><span data-dcnode-id="4029" instrument_node="">ANGPT2</span></i><span data-dcnode-id="4027" instrument_node="">) in hypoxia-exposed PAECs (</span><span class="xref" data-dcnode-id="4024"><a data-dcnode-id="4025" href="#B53" id="#B53-link" onclick="showRefSection();"><span data-dcnode-id="4026" instrument_node="">53</span></a></span><span data-dcnode-id="4023" instrument_node="">). ATOH8-KO mice spontaneously develop PH, suggesting an important role for BMP signaling in regulating the HIF pathway. Moreover, HIF-1α–driven expression of miR-322/424 in human ECs attenuates HIF-1α degradation by causing post-transcriptional repression of cullin-2, an E3 ubiquitin ligase scaffolding protein (</span><span class="xref" data-dcnode-id="4019"><span class="gen" data-dcnode-id="4022"></span><a data-dcnode-id="4020" href="#B54" id="#B54-link" onclick="showRefSection();"><span data-dcnode-id="4021" instrument_node="">54</span></a></span><span data-dcnode-id="4018" instrument_node="">).</span></p><span data-dcnode-id="4016" instrument_node="">
</span><p data-dcnode-id="3957"><span data-dcnode-id="4015" instrument_node="">However, with regard to PASMCs, cross-regulation between the adhesion molecule CD146 and HIF-1α via the NF-κB pathway in PASMCs has been shown to trigger pulmonary vascular remodeling. Disruption of the CD146/HIF-1α axis in PASMCs blunts vascular remodeling and produces a marked attenuation of PH (</span><span class="xref" data-dcnode-id="4012"><a data-dcnode-id="4013" href="#B55" id="#B55-link" onclick="showRefSection();"><span data-dcnode-id="4014" instrument_node="">55</span></a></span><span data-dcnode-id="4011" instrument_node="">). Furthermore, exaggerated proliferation in PASMCs occurs after exposure to growth factors, such as epidermal growth factor (EGF), FGF2, PDGF, or is mediated by HIF-1α but not HIF-2α activation (</span><span class="xref" data-dcnode-id="4007"><span class="gen" data-dcnode-id="4010"></span><a data-dcnode-id="4008" href="#B56" id="#B56-link" onclick="showRefSection();"><span data-dcnode-id="4009" instrument_node="">56</span></a></span><span data-dcnode-id="4006" instrument_node="">), suggesting that HIF-1α acts downstream of these growth factors, which are well established as disease-driving factors in PH. PPARγ agonists exert antiproliferative effects on PASMCs via PPARγ-mediated inhibition of HIF-1α and its downstream genes such as </span><i data-dcnode-id="4004"><span data-dcnode-id="4005" instrument_node="">PDK-1</span></i><span data-dcnode-id="4003" instrument_node="">, </span><i data-dcnode-id="4001"><span data-dcnode-id="4002" instrument_node="">TRPC1</span></i><span data-dcnode-id="4000" instrument_node="">, and </span><i data-dcnode-id="3998"><span data-dcnode-id="3999" instrument_node="">TRPC6</span></i><span data-dcnode-id="3997" instrument_node=""> (</span><span class="xref" data-dcnode-id="3994"><a data-dcnode-id="3995" href="#B57" id="#B57-link" onclick="showRefSection();"><span data-dcnode-id="3996" instrument_node="">57</span></a></span><span data-dcnode-id="3993" instrument_node="">, </span><span class="xref" data-dcnode-id="3989"><span class="gen" data-dcnode-id="3992"></span><a data-dcnode-id="3990" href="#B58" id="#B58-link" onclick="showRefSection();"><span data-dcnode-id="3991" instrument_node="">58</span></a></span><span data-dcnode-id="3988" instrument_node="">). However, hypoxia induces PPARγ downregulation via HIF-1α in PASMCs (</span><span class="xref" data-dcnode-id="3984"><span class="gen" data-dcnode-id="3987"></span><a data-dcnode-id="3985" href="#B57" id="#B57-link" onclick="showRefSection();"><span data-dcnode-id="3986" instrument_node="">57</span></a></span><span data-dcnode-id="3983" instrument_node="">, </span><span class="xref" data-dcnode-id="3979"><span class="gen" data-dcnode-id="3982"></span><a data-dcnode-id="3980" href="#B58" id="#B58-link" onclick="showRefSection();"><span data-dcnode-id="3981" instrument_node="">58</span></a></span><span data-dcnode-id="3978" instrument_node="">), suggesting a negative feedback loop mechanism between PPARγ and HIF-1α. Among other regulators, hypoxia-induced downregulation of miR-206 (</span><span class="xref" data-dcnode-id="3974"><span class="gen" data-dcnode-id="3977"></span><a data-dcnode-id="3975" href="#B59" id="#B59-link" onclick="showRefSection();"><span data-dcnode-id="3976" instrument_node="">59</span></a></span><span data-dcnode-id="3973" instrument_node="">) and miR-150 (</span><span class="xref" data-dcnode-id="3969"><span class="gen" data-dcnode-id="3972"></span><a data-dcnode-id="3970" href="#B60" id="#B60-link" onclick="showRefSection();"><span data-dcnode-id="3971" instrument_node="">60</span></a></span><span data-dcnode-id="3968" instrument_node="">) promotes a pro-proliferative and promigratory phenotype of PASMCs by targeting HIF-1α. Furthermore, in rat PASMCs, upregulation of molecules related to both SUMOylation (SUMO-1) and deSUMOylation (SENP1) leads to increased HIF-1α stability and transcriptional activity, thus increasing proliferation (</span><span class="xref" data-dcnode-id="3964"><span class="gen" data-dcnode-id="3967"></span><a data-dcnode-id="3965" href="#B61" id="#B61-link" onclick="showRefSection();"><span data-dcnode-id="3966" instrument_node="">61</span></a></span><span data-dcnode-id="3963" instrument_node="">, </span><span class="xref" data-dcnode-id="3959"><span class="gen" data-dcnode-id="3962"></span><a data-dcnode-id="3960" href="#B62" id="#B62-link" onclick="showRefSection();"><span data-dcnode-id="3961" instrument_node="">62</span></a></span><span data-dcnode-id="3958" instrument_node="">).</span></p><span data-dcnode-id="3956" instrument_node="">
</span><p data-dcnode-id="3906"><span class="level-4" data-dcnode-id="3954"><span data-dcnode-id="3955" instrument_node="">Mitochondrial abnormalities.</span></span><span data-dcnode-id="3953" instrument_node=""> The interplay between mitochondrial abnormalities, NADPH oxidases (NOXs), and ROS has been established as an important activator of HIF-1α in pulmonary vascular cells in PH (</span><span class="xref" data-dcnode-id="3950"><a data-dcnode-id="3951" href="#B63" id="#B63-link" onclick="showRefSection();"><span data-dcnode-id="3952" instrument_node="">63</span></a></span><span data-dcnode-id="3949" instrument_node="">–</span><span class="xref" data-dcnode-id="3945"><span class="gen" data-dcnode-id="3948"></span><a data-dcnode-id="3946" href="#B65" id="#B65-link" onclick="showRefSection();"><span data-dcnode-id="3947" instrument_node="">65</span></a></span><span data-dcnode-id="3944" instrument_node="">). For example, mitochondrial abnormalities that shift metabolism away from oxidative phosphorylation toward glycolysis (notably pyruvate dehydrogenase kinase [PDK] activation) lead to a normoxic impairment of electron flux and reduced mitochondrial ROS production (</span><span class="xref" data-dcnode-id="3940"><span class="gen" data-dcnode-id="3943"></span><a data-dcnode-id="3941" href="#B66" id="#B66-link" onclick="showRefSection();"><span data-dcnode-id="3942" instrument_node="">66</span></a></span><span data-dcnode-id="3939" instrument_node="">). This pseudohypoxic signal is associated with nuclear translocation of HIF-1α. On the contrary, reports suggest that low levels of superoxide dismutase 2 (SOD2), as observed in PAECs from patients with IPAH, promote HIF-1α stabilization due to increased ROS levels (</span><span class="xref" data-dcnode-id="3935"><span class="gen" data-dcnode-id="3938"></span><a data-dcnode-id="3936" href="#B21" id="#B21-link" onclick="showRefSection();"><span data-dcnode-id="3937" instrument_node="">21</span></a></span><span data-dcnode-id="3934" instrument_node="">). Mechanical stretch imposed on PASMCs due to pulmonary hemodynamic stress causes mitochondrial complex III–mediated ROS formation, which both induces the NF-κB pathway and inhibits Phd2, leading to HIF-1α activation (</span><span class="xref" data-dcnode-id="3930"><span class="gen" data-dcnode-id="3933"></span><a data-dcnode-id="3931" href="#B67" id="#B67-link" onclick="showRefSection();"><span data-dcnode-id="3932" instrument_node="">67</span></a></span><span data-dcnode-id="3929" instrument_node="">), indicating that hemodynamic stress itself serves as an independent regulator of HIF-1α. Indeed, several molecules that are upstream regulators of ROS are implicated in HIF-1α activation. For instance, loss of sirtuin 3, a crucial regulator of mitochondrial function in PASMCs, causes mitochondrial dysfunction leading to ROS production and HIF-1α stabilization (</span><span class="xref" data-dcnode-id="3925"><span class="gen" data-dcnode-id="3928"></span><a data-dcnode-id="3926" href="#B68" id="#B68-link" onclick="showRefSection();"><span data-dcnode-id="3927" instrument_node="">68</span></a></span><span data-dcnode-id="3924" instrument_node="">). As a consequence, sirtuin 3–KO mice develop spontaneous PH and RV hypertrophy (</span><span class="xref" data-dcnode-id="3920"><span class="gen" data-dcnode-id="3923"></span><a data-dcnode-id="3921" href="#B68" id="#B68-link" onclick="showRefSection();"><span data-dcnode-id="3922" instrument_node="">68</span></a></span><span data-dcnode-id="3919" instrument_node="">). Recently, we identified a molecular mechanism in which a scaffold protein, Ras association domain family 1A (RASSF1A), acts as a crucial regulator of HIF-1α signaling in PASMCs. Upon hypoxia, HIF-1α upregulates </span><i data-dcnode-id="3917"><span data-dcnode-id="3918" instrument_node="">RASSF1A</span></i><span data-dcnode-id="3916" instrument_node=""> expression, and RASSF1A is stabilized by ROS-driven and protein kinase C–mediated (PKC-mediated) phosphorylation. RASSF1A in turn stabilizes HIF-1α, leading to increased HIF-1 transcriptional activity (</span><span class="xref" data-dcnode-id="3913"><a data-dcnode-id="3914" href="#B69" id="#B69-link" onclick="showRefSection();"><span data-dcnode-id="3915" instrument_node="">69</span></a></span><span data-dcnode-id="3912" instrument_node="">). This crucial RASSF1A–HIF-1α feed-forward loop determines pro-proliferative and glycolytic switch of PASMCs and pulmonary artery adventitial fibroblasts (PAAFs) (</span><span class="xref" data-dcnode-id="3908"><span class="gen" data-dcnode-id="3911"></span><a data-dcnode-id="3909" href="#B69" id="#B69-link" onclick="showRefSection();"><span data-dcnode-id="3910" instrument_node="">69</span></a></span><span data-dcnode-id="3907" instrument_node="">). Disruption of RASSF1A/HIF-1α crosstalk by genetic ablation of RASSF1A mitigates pulmonary vascular remodeling in mice exposed to chronic hypoxia.</span></p><span data-dcnode-id="3905" instrument_node="">
</span></div><span data-dcnode-id="3903" instrument_node="">
</span></dd></dl><span data-dcnode-id="3900" instrument_node="">
</span><a class="in-page" data-dcnode-id="3899" name="SEC4"></a><dl class="article-section" data-accordion="" data-dcnode-id="3623"><dd class="accordion-navigation active" data-dcnode-id="3624"><span data-dcnode-id="3898" instrument_node="">
</span><a aria-expanded="true" data-dcnode-id="3894" href="#section-4"><span class="toggle-icon" data-dcnode-id="3897"></span><span class="section-title" data-dcnode-id="3895"><span data-dcnode-id="3896" instrument_node="">HIFs’ role in PH-associated cellular and molecular abnormalities</span></span></a><div class="content active" data-dcnode-id="3626" id="section-4"><span data-dcnode-id="3893" instrument_node="">
</span><p data-dcnode-id="3885"><span data-dcnode-id="3892" instrument_node="">Under extended exposure to reduced oxygen levels in pulmonary vascular cells, HIF isoforms transcriptionally activate a series of genes (</span><a data-dcnode-id="3890" href="#F2" id="#F2-link" onclick="showFigSection(this);"><span data-dcnode-id="3891" instrument_node="">Figures 2</span></a><span data-dcnode-id="3889" instrument_node=""> and </span><a data-dcnode-id="3887" href="#F3" id="#F3-link" onclick="showFigSection(this);"><span data-dcnode-id="3888" instrument_node="">3</span></a><span data-dcnode-id="3886" instrument_node="">) that regulate vascular tone, angiogenesis, metabolism, and proliferation. Moreover, recent studies highlighted the potential role of HIFs and the underlying molecular mechanisms in the dysregulation of the innate and adaptive immune system in PH.</span></p><span data-dcnode-id="3884" instrument_node="">
</span><a class="in-page" data-dcnode-id="3883" id="F3-target" name="F3"></a><div class="figure" data-dcnode-id="3872"><span data-dcnode-id="3882" instrument_node="">
</span><a data-dcnode-id="3880" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.jci.org/articles/view/137558/figure/3"><img align="left" alt="HIF signaling in PH: Upstream and downstream modulators in pulmonary artery" class="figure_thumbnail" data-dcnode-id="3881" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//dm5migu4zj3pb.cloudfront.net/manuscripts/137000/137558/small/JCI137558.f3.gif&amp;raw" title="HIF signaling in PH: Upstream and downstream modulators in pulmonary artery smooth muscle cells."></a><a class="figure_number" data-dcnode-id="3878" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.jci.org/articles/view/137558/figure/3"><span data-dcnode-id="3879" instrument_node="">Figure 3</span></a><p data-dcnode-id="3874"><span class="figure_title" data-dcnode-id="3876"><span data-dcnode-id="3877" instrument_node="">HIF signaling in PH: Upstream and downstream modulators in pulmonary artery smooth muscle cells.</span></span><span data-dcnode-id="3875" instrument_node=""> Signaling pathways associated with PH such as hypoxia, vasomodulation, growth factors, mechanical stress, and oxidative stress pathways regulate HIF isoform stability and transcriptional activity in PASMCs. This regulates genes related to cell proliferation and synthetic phenotypes, as well as genes related to Ca2+ modulation/ion channels, oxidative stress, mitochondrial fragmentation, and the renin-angiotensin-aldosterone system (RAAS) system. Long black lines with arrows indicate an activating effect; blocked red lines, an inhibiting effect; ↑, activation or upregulation; ↓, inactivation or downregulation. C-III, mitochondrial complex III; SIRT3, Sirtuin 3; TRPC6, transient receptor potential cation channel subfamily C member 1 or 6; FGFR, fibroblast growth factor receptor; Ang-I, angiotensin I; Ang-II, angiotensin II; Ang-(1-7), angiotensin (1-7); Mas, Ang-(1-7) receptor; ATR1/2, angiotensin receptor type 1 and 2; ACE, angiotensin converting enzyme; PIP2, phosphatidylinositol 4,5-bisphosphate; IP3, inositol trisphosphate; DAG, diacylglycerol; O2-, superoxide anion; PKCα, protein kinase C alpha; PAK1, P21 activated kinase 1; SENP-1, sentrin-specific protease 1.</span></p><span data-dcnode-id="3873" instrument_node="">
</span></div><span data-dcnode-id="3871" instrument_node="">
</span><p data-dcnode-id="3797"><span class="level-4" data-dcnode-id="3869"><span data-dcnode-id="3870" instrument_node="">PAECs.</span></span><span data-dcnode-id="3868" instrument_node=""> PAECs exhibit different phenotypes (proliferative, migratory, angiogenic, and/or endothelial-mesenchymal transition [EndoMT]) during PH pathogenesis, and HIF isoforms play a decisive role in defining these phenotypes. For example, HIF-1 induces cyclin-dependent kinase inhibitor 1B (</span><i data-dcnode-id="3864"><span data-dcnode-id="3867" instrument_node="">p27</span><sup data-dcnode-id="3865"><span data-dcnode-id="3866" instrument_node="">Kip1</span></sup></i><span data-dcnode-id="3863" instrument_node="">) upregulation and cyclin D1 downregulation, leading to decreased proliferation and migration of hypoxic PAECs (</span><span class="xref" data-dcnode-id="3860"><a data-dcnode-id="3861" href="#B70" id="#B70-link" onclick="showRefSection();"><span data-dcnode-id="3862" instrument_node="">70</span></a></span><span data-dcnode-id="3859" instrument_node="">). By contrast, HIF-2–driven octamer-binding transcription factor 4 (OCT4) expression via miR-130/131–mediated downregulation of PPARγ/apelin signaling results in increased proliferation of PAECs (</span><span class="xref" data-dcnode-id="3855"><span class="gen" data-dcnode-id="3858"></span><a data-dcnode-id="3856" href="#B71" id="#B71-link" onclick="showRefSection();"><span data-dcnode-id="3857" instrument_node="">71</span></a></span><span data-dcnode-id="3854" instrument_node="">). In addition, both HIF-1 and HIF-2 in PAECs contribute to altered metabolic phenotype by modulating the expression of distinct mitochondrial enzymes such as pyruvate dehydrogenase kinase 1 (</span><i data-dcnode-id="3852"><span data-dcnode-id="3853" instrument_node="">PDK1</span></i><span data-dcnode-id="3851" instrument_node="">), hexokinase 1,2 (</span><i data-dcnode-id="3849"><span data-dcnode-id="3850" instrument_node="">HK1,2</span></i><span data-dcnode-id="3848" instrument_node="">), lactate dehydrogenase A (</span><i data-dcnode-id="3846"><span data-dcnode-id="3847" instrument_node="">LDHA</span></i><span data-dcnode-id="3845" instrument_node="">), and glucose transporter 1,3 (</span><i data-dcnode-id="3843"><span data-dcnode-id="3844" instrument_node="">GLUT1,3</span></i><span data-dcnode-id="3842" instrument_node="">) to regulate anaerobic glycolysis and the Warburg effect (aerobic glycolysis). The influence of HIF-1 on glycolytic metabolism is well established (</span><span class="xref" data-dcnode-id="3839"><a data-dcnode-id="3840" href="#B72" id="#B72-link" onclick="showRefSection();"><span data-dcnode-id="3841" instrument_node="">72</span></a></span><span data-dcnode-id="3838" instrument_node="">); the Warburg effect in IPAH could possibly be driven by HIF-1α stabilization, independently of the hypoxic environment. On the other hand, HIF-2, but not HIF-1, by upregulating SNAI1 transcription factors, triggers EndoMT, a mechanism potentially involved in the development of occlusive intimal/neointimal lesions and severe pulmonary vascular wall thickening in IPAH (</span><span class="xref" data-dcnode-id="3834"><span class="gen" data-dcnode-id="3837"></span><a data-dcnode-id="3835" href="#B28" id="#B28-link" onclick="showRefSection();"><span data-dcnode-id="3836" instrument_node="">28</span></a></span><span data-dcnode-id="3833" instrument_node="">). Furthermore, EC HIF-2 influences the development of hypoxic PH via an arginase-1–dependent mechanism. The HIF-2/arginase-1 axis dysregulates vascular NO homeostasis (</span><span class="xref" data-dcnode-id="3829"><span class="gen" data-dcnode-id="3832"></span><a data-dcnode-id="3830" href="#B73" id="#B73-link" onclick="showRefSection();"><span data-dcnode-id="3831" instrument_node="">73</span></a></span><span data-dcnode-id="3828" instrument_node="">, </span><span class="xref" data-dcnode-id="3824"><span class="gen" data-dcnode-id="3827"></span><a data-dcnode-id="3825" href="#B74" id="#B74-link" onclick="showRefSection();"><span data-dcnode-id="3826" instrument_node="">74</span></a></span><span data-dcnode-id="3823" instrument_node="">), resulting in PH in hypoxia-exposed mice (</span><span class="xref" data-dcnode-id="3819"><span class="gen" data-dcnode-id="3822"></span><a data-dcnode-id="3820" href="#B73" id="#B73-link" onclick="showRefSection();"><span data-dcnode-id="3821" instrument_node="">73</span></a></span><span data-dcnode-id="3818" instrument_node="">). Consequently, EC arginase-1 loss attenuates PH in hypoxia-exposed mice (</span><span class="xref" data-dcnode-id="3814"><span class="gen" data-dcnode-id="3817"></span><a data-dcnode-id="3815" href="#B73" id="#B73-link" onclick="showRefSection();"><span data-dcnode-id="3816" instrument_node="">73</span></a></span><span data-dcnode-id="3813" instrument_node="">), and arginase inhibition prevents PH in monocrotaline-injected (MCT-injected) rats (</span><span class="xref" data-dcnode-id="3809"><span class="gen" data-dcnode-id="3812"></span><a data-dcnode-id="3810" href="#B75" id="#B75-link" onclick="showRefSection();"><span data-dcnode-id="3811" instrument_node="">75</span></a></span><span data-dcnode-id="3808" instrument_node="">). However, the expression of HIF-2–mediated angiopoietin-1 and -2 in ECs is shown to be essential to maintaining proper pulmonary vascular homeostasis (</span><span class="xref" data-dcnode-id="3804"><span class="gen" data-dcnode-id="3807"></span><a data-dcnode-id="3805" href="#B76" id="#B76-link" onclick="showRefSection();"><span data-dcnode-id="3806" instrument_node="">76</span></a></span><span data-dcnode-id="3803" instrument_node="">, </span><span class="xref" data-dcnode-id="3799"><span class="gen" data-dcnode-id="3802"></span><a data-dcnode-id="3800" href="#B77" id="#B77-link" onclick="showRefSection();"><span data-dcnode-id="3801" instrument_node="">77</span></a></span><span data-dcnode-id="3798" instrument_node="">). These data propose that HIF-1 and HIF-2 exert pathogenic roles in PH by regulating distinct cellular processes in PAECs.</span></p><span data-dcnode-id="3796" instrument_node="">
</span><p data-dcnode-id="3742"><span class="level-4" data-dcnode-id="3794"><span data-dcnode-id="3795" instrument_node="">PASMCs.</span></span><span data-dcnode-id="3793" instrument_node=""> In PASMCs, HIF isoforms regulate not only genes related to cell proliferation and synthetic phenotypes but also genes related to vasoconstriction (Ca</span><sup data-dcnode-id="3791"><span data-dcnode-id="3792" instrument_node="">2+</span></sup><span data-dcnode-id="3790" instrument_node=""> modulation/ion channels), oxidative stress, mitochondrial fragmentation, and the renin-angiotensin-aldosterone system (</span><a data-dcnode-id="3788" href="#F3" id="#F3-link" onclick="showFigSection(this);"><span data-dcnode-id="3789" instrument_node="">Figure 3</span></a><span data-dcnode-id="3787" instrument_node="">). Increased PASMC proliferation and the prosynthetic phenotypic switch observed in hypoxia are mediated by HIF-1–driven expression of miR-9-1 and miR-9-3, which negatively regulate myocardin (</span><i data-dcnode-id="3785"><span data-dcnode-id="3786" instrument_node="">MYOCD</span></i><span data-dcnode-id="3784" instrument_node="">) expression (</span><span class="xref" data-dcnode-id="3781"><a data-dcnode-id="3782" href="#B78" id="#B78-link" onclick="showRefSection();"><span data-dcnode-id="3783" instrument_node="">78</span></a></span><span data-dcnode-id="3780" instrument_node="">). Augmented proliferation of rat PASMCs is associated with inhibition of the BMP pathway as a result of HIF-1–induced, but not HIF-2–induced, miR-322, which causes posttranslational repression of </span><i data-dcnode-id="3778"><span data-dcnode-id="3779" instrument_node="">Bmpr1a</span></i><span data-dcnode-id="3777" instrument_node=""> and </span><i data-dcnode-id="3775"><span data-dcnode-id="3776" instrument_node="">Smad5</span></i><span data-dcnode-id="3774" instrument_node=""> genes (</span><span class="xref" data-dcnode-id="3771"><a data-dcnode-id="3772" href="#B79" id="#B79-link" onclick="showRefSection();"><span data-dcnode-id="3773" instrument_node="">79</span></a></span><span data-dcnode-id="3770" instrument_node="">). HIF-1–dependent upregulation of miR-210 causes apoptosis resistance in PASMCs by targeting transcription factor E2F3 (</span><span class="xref" data-dcnode-id="3766"><span class="gen" data-dcnode-id="3769"></span><a data-dcnode-id="3767" href="#B80" id="#B80-link" onclick="showRefSection();"><span data-dcnode-id="3768" instrument_node="">80</span></a></span><span data-dcnode-id="3765" instrument_node="">). By contrast, HIF-2 promotes hypoxia-responsive PASMC migration and contractility by upregulating thrombospondin-1 (</span><span class="xref" data-dcnode-id="3761"><span class="gen" data-dcnode-id="3764"></span><a data-dcnode-id="3762" href="#B81" id="#B81-link" onclick="showRefSection();"><span data-dcnode-id="3763" instrument_node="">81</span></a></span><span data-dcnode-id="3760" instrument_node="">). Thus, multiple mechanisms contribute to the pro-proliferative, promigratory, and apoptosis resistance phenotypes of PASMCs. Furthermore, hypoxia-induced muscularization of nonmuscularized pulmonary arterioles involves preexisting smooth muscle cell (SMC) progenitor cells that undergo dedifferentiation, migration to the distal vessel, proliferation, and redifferentiation (</span><span class="xref" data-dcnode-id="3756"><span class="gen" data-dcnode-id="3759"></span><a data-dcnode-id="3757" href="#B82" id="#B82-link" onclick="showRefSection();"><span data-dcnode-id="3758" instrument_node="">82</span></a></span><span data-dcnode-id="3755" instrument_node="">). Elegant studies by Sheikh et al. demonstrated that activation of these progenitor cells starts with HIF-1α–mediated PDGF-β expression (</span><span class="xref" data-dcnode-id="3751"><span class="gen" data-dcnode-id="3754"></span><a data-dcnode-id="3752" href="#B83" id="#B83-link" onclick="showRefSection();"><span data-dcnode-id="3753" instrument_node="">83</span></a></span><span data-dcnode-id="3750" instrument_node="">), and progresses with expansion of these progenitor-derived SMCs via HIF-1α–mediated Krüppel-like factor 4 (</span><i data-dcnode-id="3748"><span data-dcnode-id="3749" instrument_node="">KLF4</span></i><span data-dcnode-id="3747" instrument_node="">) expression (</span><span class="xref" data-dcnode-id="3744"><a data-dcnode-id="3745" href="#B84" id="#B84-link" onclick="showRefSection();"><span data-dcnode-id="3746" instrument_node="">84</span></a></span><span data-dcnode-id="3743" instrument_node="">). These studies demonstrate a central role of HIF-1 in the initiation as well as progression of pulmonary artery muscularization in hypoxia-induced PH.</span></p><span data-dcnode-id="3741" instrument_node="">
</span><p data-dcnode-id="3666"><span data-dcnode-id="3740" instrument_node="">Changes in intracellular K</span><sup data-dcnode-id="3738"><span data-dcnode-id="3739" instrument_node="">+</span></sup><span data-dcnode-id="3737" instrument_node=""> and intracellular Ca</span><sup data-dcnode-id="3735"><span data-dcnode-id="3736" instrument_node="">2+</span></sup><span data-dcnode-id="3734" instrument_node=""> concentration ([Ca</span><sup data-dcnode-id="3732"><span data-dcnode-id="3733" instrument_node="">2+</span></sup><span data-dcnode-id="3731" instrument_node="">]</span><sub data-dcnode-id="3729"><span data-dcnode-id="3730" instrument_node="">i</span></sub><span data-dcnode-id="3728" instrument_node="">) play a pivotal role in the regulation of contraction, migration, and proliferation of PASMCs (</span><span class="xref" data-dcnode-id="3725"><a data-dcnode-id="3726" href="#B2" id="#B2-link" onclick="showRefSection();"><span data-dcnode-id="3727" instrument_node="">2</span></a></span><span data-dcnode-id="3724" instrument_node="">). Notably, HIF-1 plays an essential role in modulating [Ca</span><sup data-dcnode-id="3722"><span data-dcnode-id="3723" instrument_node="">2+</span></sup><span data-dcnode-id="3721" instrument_node="">]</span><sub data-dcnode-id="3719"><span data-dcnode-id="3720" instrument_node="">i</span></sub><span data-dcnode-id="3718" instrument_node=""> levels in PASMCs by regulating the expression of various ion channels. HIF-1 promotes overexpression of the transient receptor potential (TRPC) channel members </span><i data-dcnode-id="3716"><span data-dcnode-id="3717" instrument_node="">TRPC1</span></i><span data-dcnode-id="3715" instrument_node=""> and </span><i data-dcnode-id="3713"><span data-dcnode-id="3714" instrument_node="">TRPC6</span></i><span data-dcnode-id="3712" instrument_node=""> and subsequently increases [Ca</span><sup data-dcnode-id="3710"><span data-dcnode-id="3711" instrument_node="">2+</span></sup><span data-dcnode-id="3709" instrument_node="">]</span><sub data-dcnode-id="3707"><span data-dcnode-id="3708" instrument_node="">i</span></sub><span data-dcnode-id="3706" instrument_node=""> in hypoxic PASMCs (</span><span class="xref" data-dcnode-id="3703"><a data-dcnode-id="3704" href="#B85" id="#B85-link" onclick="showRefSection();"><span data-dcnode-id="3705" instrument_node="">85</span></a></span><span data-dcnode-id="3702" instrument_node="">). In addition, HIF-1 via </span><i data-dcnode-id="3700"><span data-dcnode-id="3701" instrument_node="">ET-1</span></i><span data-dcnode-id="3699" instrument_node=""> represses voltage-gated K</span><sup data-dcnode-id="3697"><span data-dcnode-id="3698" instrument_node="">+</span></sup><span data-dcnode-id="3696" instrument_node=""> channels members that subsequently also increase [Ca</span><sup data-dcnode-id="3694"><span data-dcnode-id="3695" instrument_node="">2+</span></sup><span data-dcnode-id="3693" instrument_node="">]</span><sub data-dcnode-id="3691"><span data-dcnode-id="3692" instrument_node="">i</span></sub><span data-dcnode-id="3690" instrument_node=""> (</span><span class="xref" data-dcnode-id="3687"><a data-dcnode-id="3688" href="#B86" id="#B86-link" onclick="showRefSection();"><span data-dcnode-id="3689" instrument_node="">86</span></a></span><span data-dcnode-id="3686" instrument_node="">). On the other hand, HIF-1 activates expression of the β</span><sub data-dcnode-id="3684"><span data-dcnode-id="3685" instrument_node="">1</span></sub><span data-dcnode-id="3683" instrument_node=""> subunit (</span><i data-dcnode-id="3681"><span data-dcnode-id="3682" instrument_node="">KCNMB1</span></i><span data-dcnode-id="3680" instrument_node="">) of the calcium-sensitive K</span><sup data-dcnode-id="3678"><span data-dcnode-id="3679" instrument_node="">+</span></sup><span data-dcnode-id="3677" instrument_node=""> channel BKCa, which prevents an excessive rise in [Ca</span><sup data-dcnode-id="3675"><span data-dcnode-id="3676" instrument_node="">2+</span></sup><span data-dcnode-id="3674" instrument_node="">]</span><sub data-dcnode-id="3672"><span data-dcnode-id="3673" instrument_node="">i</span></sub><span data-dcnode-id="3671" instrument_node=""> in PASMCs (</span><span class="xref" data-dcnode-id="3668"><a data-dcnode-id="3669" href="#B87" id="#B87-link" onclick="showRefSection();"><span data-dcnode-id="3670" instrument_node="">87</span></a></span><span data-dcnode-id="3667" instrument_node="">).</span></p><span data-dcnode-id="3665" instrument_node="">
</span><p data-dcnode-id="3642"><span class="level-4" data-dcnode-id="3663"><span data-dcnode-id="3664" instrument_node="">PAAFs.</span></span><span data-dcnode-id="3662" instrument_node=""> Although both HIF-1α and HIF-2α are activated in PAAFs in response to hypoxia, HIF-2α induction appears to play the dominant role in the proliferation response, whereas both HIF-1 and HIF-2 increase PAAF migration to a similar extent (</span><span class="xref" data-dcnode-id="3659"><a data-dcnode-id="3660" href="#B88" id="#B88-link" onclick="showRefSection();"><span data-dcnode-id="3661" instrument_node="">88</span></a></span><span data-dcnode-id="3658" instrument_node="">). Furthermore, studies suggest that HIF-1 via the regulation of </span><i data-dcnode-id="3656"><span data-dcnode-id="3657" instrument_node="">ACE</span></i><span data-dcnode-id="3655" instrument_node=""> and </span><i data-dcnode-id="3653"><span data-dcnode-id="3654" instrument_node="">ACE2</span></i><span data-dcnode-id="3652" instrument_node=""> (a homolog of ACE that counterbalances the function of ACE) directly participates in the regulation of the renin-angiotensin-aldosterone system and consequently PAAF proliferation (</span><span class="xref" data-dcnode-id="3649"><a data-dcnode-id="3650" href="#B89" id="#B89-link" onclick="showRefSection();"><span data-dcnode-id="3651" instrument_node="">89</span></a></span><span data-dcnode-id="3648" instrument_node="">–</span><span class="xref" data-dcnode-id="3644"><span class="gen" data-dcnode-id="3647"></span><a data-dcnode-id="3645" href="#B91" id="#B91-link" onclick="showRefSection();"><span data-dcnode-id="3646" instrument_node="">91</span></a></span><span data-dcnode-id="3643" instrument_node="">).</span></p><span data-dcnode-id="3641" instrument_node="">
</span><p data-dcnode-id="3628"><span class="level-4" data-dcnode-id="3639"><span data-dcnode-id="3640" instrument_node="">Inflammatory cells.</span></span><span data-dcnode-id="3638" instrument_node=""> Immune cells play an essential role in pulmonary vascular remodeling by regulating the functions of pulmonary vascular cells (</span><span class="xref" data-dcnode-id="3635"><a data-dcnode-id="3636" href="#B92" id="#B92-link" onclick="showRefSection();"><span data-dcnode-id="3637" instrument_node="">92</span></a></span><span data-dcnode-id="3634" instrument_node="">). For example, hypoxic PAAFs drive profibrotic macrophage phenotypes under the control of HIF-1, resulting in the release of various paracrine factors. Importantly, macrophage-produced VEGF and IL-6 are shown to promote pulmonary vascular remodeling (</span><span class="xref" data-dcnode-id="3630"><span class="gen" data-dcnode-id="3633"></span><a data-dcnode-id="3631" href="#B12" id="#B12-link" onclick="showRefSection();"><span data-dcnode-id="3632" instrument_node="">12</span></a></span><span data-dcnode-id="3629" instrument_node="">).</span></p><span data-dcnode-id="3627" instrument_node="">
</span></div><span data-dcnode-id="3625" instrument_node="">
</span></dd></dl><span data-dcnode-id="3622" instrument_node="">
</span><a class="in-page" data-dcnode-id="3621" name="SEC5"></a><dl class="article-section" data-accordion="" data-dcnode-id="3311"><dd class="accordion-navigation active" data-dcnode-id="3312"><span data-dcnode-id="3620" instrument_node="">
</span><a aria-expanded="true" data-dcnode-id="3616" href="#section-5"><span class="toggle-icon" data-dcnode-id="3619"></span><span class="section-title" data-dcnode-id="3617"><span data-dcnode-id="3618" instrument_node="">The role of the HIF system in pulmonary vascular remodeling</span></span></a><div class="content active" data-dcnode-id="3314" id="section-5"><span data-dcnode-id="3615" instrument_node="">
</span><p data-dcnode-id="3533"><span data-dcnode-id="3614" instrument_node="">Considering the multitude of cellular and mechanistic roles of the HIF pathway, it is not surprising that knockout mouse models of the HIF pathway (</span><i data-dcnode-id="3612"><span data-dcnode-id="3613" instrument_node="">Hif1/2α</span></i><span data-dcnode-id="3611" instrument_node="">, </span><i data-dcnode-id="3609"><span data-dcnode-id="3610" instrument_node="">VHL</span></i><span data-dcnode-id="3608" instrument_node="">, and </span><i data-dcnode-id="3606"><span data-dcnode-id="3607" instrument_node="">Phd2</span></i><span data-dcnode-id="3605" instrument_node="">) provided valuable insights on the HIF pathway in the hypoxic adaptation of the pulmonary vasculature and the development of PH (</span><a data-dcnode-id="3603" href="#T2"><span data-dcnode-id="3604" instrument_node="">Table 2</span></a><span data-dcnode-id="3602" instrument_node="">). Earlier studies revealed that the genes of the HIF pathway are crucial for embryonic development and that biallelic deletion of the majority of those genes is lethal. For example, homozygous deletion of </span><i data-dcnode-id="3600"><span data-dcnode-id="3601" instrument_node="">Phd2</span></i><span data-dcnode-id="3599" instrument_node=""> in mice leads to embryonic lethality, although </span><i data-dcnode-id="3597"><span data-dcnode-id="3598" instrument_node="">Phd1/3</span></i><span data-dcnode-id="3596" instrument_node=""> double knockout leads to viable and fertile mice (</span><span class="xref" data-dcnode-id="3593"><a data-dcnode-id="3594" href="#B93" id="#B93-link" onclick="showRefSection();"><span data-dcnode-id="3595" instrument_node="">93</span></a></span><span data-dcnode-id="3592" instrument_node="">). Complete deletion of </span><i data-dcnode-id="3590"><span data-dcnode-id="3591" instrument_node="">Hif1a</span></i><span data-dcnode-id="3589" instrument_node=""> (</span><span class="xref" data-dcnode-id="3586"><a data-dcnode-id="3587" href="#B94" id="#B94-link" onclick="showRefSection();"><span data-dcnode-id="3588" instrument_node="">94</span></a></span><span data-dcnode-id="3585" instrument_node="">), </span><i data-dcnode-id="3583"><span data-dcnode-id="3584" instrument_node="">Hif2a</span></i><span data-dcnode-id="3582" instrument_node=""> (</span><span class="xref" data-dcnode-id="3579"><a data-dcnode-id="3580" href="#B95" id="#B95-link" onclick="showRefSection();"><span data-dcnode-id="3581" instrument_node="">95</span></a></span><span data-dcnode-id="3578" instrument_node="">), or </span><i data-dcnode-id="3576"><span data-dcnode-id="3577" instrument_node="">Hif1b</span></i><span data-dcnode-id="3575" instrument_node=""> (</span><span class="xref" data-dcnode-id="3572"><a data-dcnode-id="3573" href="#B96" id="#B96-link" onclick="showRefSection();"><span data-dcnode-id="3574" instrument_node="">96</span></a></span><span data-dcnode-id="3571" instrument_node="">) in mice results in embryonic lethality due to various developmental defects. In contrast, mice with global heterozygous deletion of either </span><i data-dcnode-id="3569"><span data-dcnode-id="3570" instrument_node="">Hif1a</span></i><span data-dcnode-id="3568" instrument_node=""> or </span><i data-dcnode-id="3566"><span data-dcnode-id="3567" instrument_node="">Hif2a</span></i><span data-dcnode-id="3565" instrument_node=""> reach adulthood and do not display phenotypes in homeostatic conditions, making them useful to study the role of HIFs in disease. For example, mice with heterozygous deletion of </span><i data-dcnode-id="3563"><span data-dcnode-id="3564" instrument_node="">Hif1a</span></i><span data-dcnode-id="3562" instrument_node=""> exhibit attenuated PH and RV hypertrophy upon hypoxia exposure (</span><span class="xref" data-dcnode-id="3559"><a data-dcnode-id="3560" href="#B97" id="#B97-link" onclick="showRefSection();"><span data-dcnode-id="3561" instrument_node="">97</span></a></span><span data-dcnode-id="3558" instrument_node="">). By contrast, mice with heterozygous deletion of </span><i data-dcnode-id="3556"><span data-dcnode-id="3557" instrument_node="">Hif2a</span></i><span data-dcnode-id="3555" instrument_node=""> are completely protected from hypoxia-induced PH (</span><span class="xref" data-dcnode-id="3552"><a data-dcnode-id="3553" href="#B98" id="#B98-link" onclick="showRefSection();"><span data-dcnode-id="3554" instrument_node="">98</span></a></span><span data-dcnode-id="3551" instrument_node="">). Further, to evaluate how global deletion of HIF isoforms during adult life affects hypoxia-induced PH, Hu et al. showed that global </span><i data-dcnode-id="3549"><span data-dcnode-id="3550" instrument_node="">Hif1a</span></i><span data-dcnode-id="3548" instrument_node=""> deletion in mice did not prevent hypoxia-induced PH, whereas mice with global </span><i data-dcnode-id="3546"><span data-dcnode-id="3547" instrument_node="">Hif2a</span></i><span data-dcnode-id="3545" instrument_node=""> deletion did not survive long-term hypoxia (</span><span class="xref" data-dcnode-id="3542"><a data-dcnode-id="3543" href="#B99" id="#B99-link" onclick="showRefSection();"><span data-dcnode-id="3544" instrument_node="">99</span></a></span><span data-dcnode-id="3541" instrument_node="">). Conversely, global partial </span><i data-dcnode-id="3539"><span data-dcnode-id="3540" instrument_node="">Hif2a</span></i><span data-dcnode-id="3538" instrument_node=""> deletion diminishes development of hypoxia-induced PH at 5 weeks in adult mice (</span><span class="xref" data-dcnode-id="3535"><a data-dcnode-id="3536" href="#B99" id="#B99-link" onclick="showRefSection();"><span data-dcnode-id="3537" instrument_node="">99</span></a></span><span data-dcnode-id="3534" instrument_node="">).</span></p><span data-dcnode-id="3532" instrument_node="">
</span><a class="in-page" data-dcnode-id="3531" id="T2-target" name="T2"></a><div class="figure" data-dcnode-id="3521"><span data-dcnode-id="3530" instrument_node="">
