</span><a data-dcnode-id="3528" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.jci.org/articles/view/137558/table/2"><img align="left" class="table_thumbnail" data-dcnode-id="3529" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//dm5migu4zj3pb.cloudfront.net/manuscripts/137000/137558/small/JCI137558.t2.gif&amp;raw"></a><a class="figure_number" data-dcnode-id="3526" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.jci.org/articles/view/137558/table/2"><span data-dcnode-id="3527" instrument_node="">Table 2</span></a><p data-dcnode-id="3523"><span class="figure_title" data-dcnode-id="3524"><span data-dcnode-id="3525" instrument_node="">Summary of studies evaluating the phenotypes of genetic manipulation of HIF and HIF regulators in animal models of PH</span></span></p><span data-dcnode-id="3522" instrument_node="">
</span></div><span data-dcnode-id="3520" instrument_node="">
</span><p data-dcnode-id="3434"><span data-dcnode-id="3519" instrument_node="">Furthermore, to tease out the cell- and postnatal-specific role of HIF pathway components in PH pathogenesis, various studies have used constitutive or inducible cell-specific knockout mouse models. For example, Ball et al. reported that SMC-specific postnatal (inducible) deletion of </span><i data-dcnode-id="3517"><span data-dcnode-id="3518" instrument_node="">Hif1a</span></i><span data-dcnode-id="3516" instrument_node=""> attenuated PH but did not affect RV hypertrophy (</span><span class="xref" data-dcnode-id="3513"><a data-dcnode-id="3514" href="#B100" id="#B100-link" onclick="showRefSection();"><span data-dcnode-id="3515" instrument_node="">100</span></a></span><span data-dcnode-id="3512" instrument_node="">). Meanwhile, in another study, mice with constitutive SMC-specific </span><i data-dcnode-id="3510"><span data-dcnode-id="3511" instrument_node="">Hif1a</span></i><span data-dcnode-id="3509" instrument_node=""> deletion showed exacerbated hypoxia-induced PH (</span><span class="xref" data-dcnode-id="3506"><a data-dcnode-id="3507" href="#B101" id="#B101-link" onclick="showRefSection();"><span data-dcnode-id="3508" instrument_node="">101</span></a></span><span data-dcnode-id="3505" instrument_node="">). More recent studies demonstrated that mice with constitutive EC-specific </span><i data-dcnode-id="3503"><span data-dcnode-id="3504" instrument_node="">Hif1a</span></i><span data-dcnode-id="3502" instrument_node=""> deletion are not protected from hypoxia-induced PH and RV hypertrophy (</span><span class="xref" data-dcnode-id="3499"><a data-dcnode-id="3500" href="#B28" id="#B28-link" onclick="showRefSection();"><span data-dcnode-id="3501" instrument_node="">28</span></a></span><span data-dcnode-id="3498" instrument_node="">, </span><span class="xref" data-dcnode-id="3494"><span class="gen" data-dcnode-id="3497"></span><a data-dcnode-id="3495" href="#B73" id="#B73-link" onclick="showRefSection();"><span data-dcnode-id="3496" instrument_node="">73</span></a></span><span data-dcnode-id="3493" instrument_node="">). However, in another study, mice with inducible EC </span><i data-dcnode-id="3491"><span data-dcnode-id="3492" instrument_node="">Hif1a</span></i><span data-dcnode-id="3490" instrument_node=""> deletion were protected from PH and RV hypertrophy under hypoxia (</span><span class="xref" data-dcnode-id="3487"><a data-dcnode-id="3488" href="#B84" id="#B84-link" onclick="showRefSection();"><span data-dcnode-id="3489" instrument_node="">84</span></a></span><span data-dcnode-id="3486" instrument_node="">). Interestingly, inducible </span><i data-dcnode-id="3484"><span data-dcnode-id="3485" instrument_node="">Hif1a</span></i><span data-dcnode-id="3483" instrument_node=""> deletion in either ECs and SMCs did not prevent hypoxia-induced PH and RV hypertrophy (</span><span class="xref" data-dcnode-id="3480"><a data-dcnode-id="3481" href="#B102" id="#B102-link" onclick="showRefSection();"><span data-dcnode-id="3482" instrument_node="">102</span></a></span><span data-dcnode-id="3479" instrument_node="">). In contrast, postnatal deletion of (PDGFR-β</span><sup data-dcnode-id="3477"><span data-dcnode-id="3478" instrument_node="">+</span></sup><span data-dcnode-id="3476" instrument_node="">)/SMC marker</span><sup data-dcnode-id="3474"><span data-dcnode-id="3475" instrument_node="">+</span></sup><span data-dcnode-id="3473" instrument_node=""> progenitors completely prevents PH and RV hypertrophy in hypoxia-exposed mice (</span><span class="xref" data-dcnode-id="3470"><a data-dcnode-id="3471" href="#B84" id="#B84-link" onclick="showRefSection();"><span data-dcnode-id="3472" instrument_node="">84</span></a></span><span data-dcnode-id="3469" instrument_node="">). With regard to HIF-2α, Skuli et al. reported that mice with EC-specific </span><i data-dcnode-id="3467"><span data-dcnode-id="3468" instrument_node="">Hif2a</span></i><span data-dcnode-id="3466" instrument_node=""> deletion develop PH and RV dilatation (but not RV hypertrophy) due to vascular leakage into the lung parenchyma (</span><span class="xref" data-dcnode-id="3463"><a data-dcnode-id="3464" href="#B103" id="#B103-link" onclick="showRefSection();"><span data-dcnode-id="3465" instrument_node="">103</span></a></span><span data-dcnode-id="3462" instrument_node="">). Similarly, Tang et al. demonstrated that EC-specific deletion of </span><i data-dcnode-id="3460"><span data-dcnode-id="3461" instrument_node="">Hif2a</span></i><span data-dcnode-id="3459" instrument_node="">, but not </span><i data-dcnode-id="3457"><span data-dcnode-id="3458" instrument_node="">Hif1a</span></i><span data-dcnode-id="3456" instrument_node="">, prevents mice from developing PH under hypoxic conditions (</span><span class="xref" data-dcnode-id="3453"><a data-dcnode-id="3454" href="#B28" id="#B28-link" onclick="showRefSection();"><span data-dcnode-id="3455" instrument_node="">28</span></a></span><span data-dcnode-id="3452" instrument_node="">). Interestingly, simultaneous deletion of </span><i data-dcnode-id="3450"><span data-dcnode-id="3451" instrument_node="">Hif1a</span></i><span data-dcnode-id="3449" instrument_node=""> and </span><i data-dcnode-id="3447"><span data-dcnode-id="3448" instrument_node="">Hif2a</span></i><span data-dcnode-id="3446" instrument_node=""> in ECs also provides protection against bleomycin-induced PH and RV hypertrophy despite lung fibrosis development (</span><span class="xref" data-dcnode-id="3443"><a data-dcnode-id="3444" href="#B16" id="#B16-link" onclick="showRefSection();"><span data-dcnode-id="3445" instrument_node="">16</span></a></span><span data-dcnode-id="3442" instrument_node="">). These data suggest that the prominent role of </span><i data-dcnode-id="3440"><span data-dcnode-id="3441" instrument_node="">Hif2a</span></i><span data-dcnode-id="3439" instrument_node=""> in ECs is critical in the initiation and progression of PH. However, results of EC-specific gene-deletion mouse models should be interpreted cautiously, since, depending on whether a Cre/ERT2 or Cre23 system was used, gene deletion may be exclusively EC-specific or target other cell types, respectively (</span><span class="xref" data-dcnode-id="3436"><a data-dcnode-id="3437" href="#B104" id="#B104-link" onclick="showRefSection();"><span data-dcnode-id="3438" instrument_node="">104</span></a></span><span data-dcnode-id="3435" instrument_node="">).</span></p><span data-dcnode-id="3433" instrument_node="">
</span><p data-dcnode-id="3361"><span data-dcnode-id="3432" instrument_node="">Notably, multiple groups have shown that mice with </span><i data-dcnode-id="3430"><span data-dcnode-id="3431" instrument_node="">Phd2</span></i><span data-dcnode-id="3429" instrument_node=""> deletion in ECs spontaneously develop severe PH associated with massive pulmonary vascular lesions and adverse RV remodeling that is evident from the age of 1.5 months (</span><span class="xref" data-dcnode-id="3426"><a data-dcnode-id="3427" href="#B10" id="#B10-link" onclick="showRefSection();"><span data-dcnode-id="3428" instrument_node="">10</span></a></span><span data-dcnode-id="3425" instrument_node="">, </span><span class="xref" data-dcnode-id="3421"><span class="gen" data-dcnode-id="3424"></span><a data-dcnode-id="3422" href="#B105" id="#B105-link" onclick="showRefSection();"><span data-dcnode-id="3423" instrument_node="">105</span></a></span><span data-dcnode-id="3420" instrument_node="">, </span><span class="xref" data-dcnode-id="3416"><span class="gen" data-dcnode-id="3419"></span><a data-dcnode-id="3417" href="#B106" id="#B106-link" onclick="showRefSection();"><span data-dcnode-id="3418" instrument_node="">106</span></a></span><span data-dcnode-id="3415" instrument_node="">). Concomitant deletion of both </span><i data-dcnode-id="3413"><span data-dcnode-id="3414" instrument_node="">Phd2</span></i><span data-dcnode-id="3412" instrument_node=""> and </span><i data-dcnode-id="3410"><span data-dcnode-id="3411" instrument_node="">Hif1a</span></i><span data-dcnode-id="3409" instrument_node=""> or </span><i data-dcnode-id="3407"><span data-dcnode-id="3408" instrument_node="">Phd2</span></i><span data-dcnode-id="3406" instrument_node=""> and </span><i data-dcnode-id="3404"><span data-dcnode-id="3405" instrument_node="">Hif2a</span></i><span data-dcnode-id="3403" instrument_node=""> in ECs identified HIF-2α activation as a critical downstream modulator of PHD2 deficiency in PH development (</span><span class="xref" data-dcnode-id="3400"><a data-dcnode-id="3401" href="#B10" id="#B10-link" onclick="showRefSection();"><span data-dcnode-id="3402" instrument_node="">10</span></a></span><span data-dcnode-id="3399" instrument_node="">, </span><span class="xref" data-dcnode-id="3395"><span class="gen" data-dcnode-id="3398"></span><a data-dcnode-id="3396" href="#B105" id="#B105-link" onclick="showRefSection();"><span data-dcnode-id="3397" instrument_node="">105</span></a></span><span data-dcnode-id="3394" instrument_node="">). Interestingly, these mice show increased mortality within 6–9 months of age, presumably due to progressive RV failure (</span><span class="xref" data-dcnode-id="3390"><span class="gen" data-dcnode-id="3393"></span><a data-dcnode-id="3391" href="#B10" id="#B10-link" onclick="showRefSection();"><span data-dcnode-id="3392" instrument_node="">10</span></a></span><span data-dcnode-id="3389" instrument_node="">, </span><span class="xref" data-dcnode-id="3385"><span class="gen" data-dcnode-id="3388"></span><a data-dcnode-id="3386" href="#B105" id="#B105-link" onclick="showRefSection();"><span data-dcnode-id="3387" instrument_node="">105</span></a></span><span data-dcnode-id="3384" instrument_node="">). Supporting this role of HIF-2α activity in the effect of PHD2 deficiency, mice with both heterozygous and homozygous </span><i data-dcnode-id="3382"><span data-dcnode-id="3383" instrument_node="">Hif2a</span></i><span data-dcnode-id="3381" instrument_node=""> G536W gain-of-function mutations develop spontaneous PH and RV hypertrophy without RV dilatation (</span><span class="xref" data-dcnode-id="3378"><a data-dcnode-id="3379" href="#B107" id="#B107-link" onclick="showRefSection();"><span data-dcnode-id="3380" instrument_node="">107</span></a></span><span data-dcnode-id="3377" instrument_node="">). Furthermore, mice bearing homozygous knockin of a human R200W VHL mutation (as found in patients with Chuvash polycythemia) develop PH (</span><span class="xref" data-dcnode-id="3373"><span class="gen" data-dcnode-id="3376"></span><a data-dcnode-id="3374" href="#B108" id="#B108-link" onclick="showRefSection();"><span data-dcnode-id="3375" instrument_node="">108</span></a></span><span data-dcnode-id="3372" instrument_node="">). Notably, development of PH in this model is attenuated in the setting of heterozygous deletion of </span><i data-dcnode-id="3370"><span data-dcnode-id="3371" instrument_node="">Hif2a</span></i><span data-dcnode-id="3369" instrument_node="">, but not of </span><i data-dcnode-id="3367"><span data-dcnode-id="3368" instrument_node="">Hif1a</span></i><span data-dcnode-id="3366" instrument_node=""> (</span><span class="xref" data-dcnode-id="3363"><a data-dcnode-id="3364" href="#B108" id="#B108-link" onclick="showRefSection();"><span data-dcnode-id="3365" instrument_node="">108</span></a></span><span data-dcnode-id="3362" instrument_node="">), suggesting a prominent role of HIF-2α in PH induced by VHL loss of function.</span></p><span data-dcnode-id="3360" instrument_node="">
</span><p data-dcnode-id="3319"><span data-dcnode-id="3359" instrument_node="">Furthermore, in a study exploring the inflammatory- and immune-specific roles of HIF isoforms in the pathogenesis of PH, mice with EC-specific deletion of </span><i data-dcnode-id="3357"><span data-dcnode-id="3358" instrument_node="">Phd2</span></i><span data-dcnode-id="3356" instrument_node=""> developed spontaneous PH due to </span><i data-dcnode-id="3354"><span data-dcnode-id="3355" instrument_node="">Hif2a</span></i><span data-dcnode-id="3353" instrument_node=""> stabilization, which was partially attenuated by transplantation with WT bone marrow–derived cells, suggesting that HIF-2 activation in bone marrow–derived cells contributes to pulmonary vascular remodeling (</span><span class="xref" data-dcnode-id="3350"><a data-dcnode-id="3351" href="#B10" id="#B10-link" onclick="showRefSection();"><span data-dcnode-id="3352" instrument_node="">10</span></a></span><span data-dcnode-id="3349" instrument_node="">). In addition, mice with </span><i data-dcnode-id="3347"><span data-dcnode-id="3348" instrument_node="">Hif1a</span></i><span data-dcnode-id="3346" instrument_node=""> deletion in myeloid cells are partially protected from hypoxia-induced PH and RV hypertrophy, mainly as a result of attenuated macrophage activity (</span><span class="xref" data-dcnode-id="3343"><a data-dcnode-id="3344" href="#B109" id="#B109-link" onclick="showRefSection();"><span data-dcnode-id="3345" instrument_node="">109</span></a></span><span data-dcnode-id="3342" instrument_node="">). Similarly, mice with monocyte-specific </span><i data-dcnode-id="3340"><span data-dcnode-id="3341" instrument_node="">Hif1a</span></i><span data-dcnode-id="3339" instrument_node=""> deletion display attenuated PH, PA remodeling, and RV hypertrophy in response to hypoxia or hypoxia plus Sugen 5416 (SuHx) exposure (</span><span class="xref" data-dcnode-id="3336"><a data-dcnode-id="3337" href="#B110" id="#B110-link" onclick="showRefSection();"><span data-dcnode-id="3338" instrument_node="">110</span></a></span><span data-dcnode-id="3335" instrument_node="">). In addition to myeloid cells, the HIF pathway is also involved in the regulation of lymphoid cells. For example, </span><i data-dcnode-id="3333"><span data-dcnode-id="3334" instrument_node="">Hif2a</span></i><span data-dcnode-id="3332" instrument_node=""> activation induced by </span><i data-dcnode-id="3330"><span data-dcnode-id="3331" instrument_node="">Phd2</span></i><span data-dcnode-id="3329" instrument_node=""> deletion causes immunoregulatory dysfunction (</span><span class="xref" data-dcnode-id="3326"><a data-dcnode-id="3327" href="#B111" id="#B111-link" onclick="showRefSection();"><span data-dcnode-id="3328" instrument_node="">111</span></a></span><span data-dcnode-id="3325" instrument_node="">), which may partially explain PH development associated with reduced regulatory T cell function (</span><span class="xref" data-dcnode-id="3321"><span class="gen" data-dcnode-id="3324"></span><a data-dcnode-id="3322" href="#B112" id="#B112-link" onclick="showRefSection();"><span data-dcnode-id="3323" instrument_node="">112</span></a></span><span data-dcnode-id="3320" instrument_node="">). Collectively, these studies suggest that both bone marrow–derived macrophages and thymus-derived T cells are involved in pulmonary vascular remodeling at least in part because of HIF pathway activation.</span></p><span data-dcnode-id="3318" instrument_node="">
</span><p data-dcnode-id="3316"><span data-dcnode-id="3317" instrument_node="">Taken together, global, inducible, and cell-specific deletion of HIF isoforms and HIF pathway molecules established cell type– and context-specific roles of HIF isoforms in early as well as late stages of PH development in adult mice.</span></p><span data-dcnode-id="3315" instrument_node="">
</span></div><span data-dcnode-id="3313" instrument_node="">
</span></dd></dl><span data-dcnode-id="3310" instrument_node="">
</span><a class="in-page" data-dcnode-id="3309" name="SEC6"></a><dl class="article-section" data-accordion="" data-dcnode-id="3222"><dd class="accordion-navigation active" data-dcnode-id="3223"><span data-dcnode-id="3308" instrument_node="">
</span><a aria-expanded="true" data-dcnode-id="3304" href="#section-6"><span class="toggle-icon" data-dcnode-id="3307"></span><span class="section-title" data-dcnode-id="3305"><span data-dcnode-id="3306" instrument_node="">The role of the HIF system in RV remodeling</span></span></a><div class="content active" data-dcnode-id="3225" id="section-6"><span data-dcnode-id="3303" instrument_node="">
</span><p data-dcnode-id="3292"><span data-dcnode-id="3302" instrument_node="">RV failure is one of the most common causes of morbidity and mortality in PAH (</span><span class="xref" data-dcnode-id="3299"><a data-dcnode-id="3300" href="#B113" id="#B113-link" onclick="showRefSection();"><span data-dcnode-id="3301" instrument_node="">113</span></a></span><span data-dcnode-id="3298" instrument_node="">). Upon PH onset, the RV undergoes remodeling to maintain its contractility, characterized by increased RV wall thickness and mass and moderate dilatation, mediated by cardiomyocyte hypertrophy and extracellular matrix deposition. However, at some point during the course of persistent pressure overload, the compensatory mechanisms of the RV expire, and the RV fails (</span><span class="xref" data-dcnode-id="3294"><span class="gen" data-dcnode-id="3297"></span><a data-dcnode-id="3295" href="#B113" id="#B113-link" onclick="showRefSection();"><span data-dcnode-id="3296" instrument_node="">113</span></a></span><span data-dcnode-id="3293" instrument_node="">).</span></p><span data-dcnode-id="3291" instrument_node="">
</span><p data-dcnode-id="3227"><span data-dcnode-id="3290" instrument_node="">In physiological conditions, HIF-1α expression is significantly higher in the right than in the left ventricle (</span><span class="xref" data-dcnode-id="3287"><a data-dcnode-id="3288" href="#B114" id="#B114-link" onclick="showRefSection();"><span data-dcnode-id="3289" instrument_node="">114</span></a></span><span data-dcnode-id="3286" instrument_node="">). RV HIF-1α expression is increased in a number of animal models of PH, including MCT rats (</span><span class="xref" data-dcnode-id="3282"><span class="gen" data-dcnode-id="3285"></span><a data-dcnode-id="3283" href="#B115" id="#B115-link" onclick="showRefSection();"><span data-dcnode-id="3284" instrument_node="">115</span></a></span><span data-dcnode-id="3281" instrument_node="">), hypoxia-exposed (HOX) rats (</span><span class="xref" data-dcnode-id="3277"><span class="gen" data-dcnode-id="3280"></span><a data-dcnode-id="3278" href="#B116" id="#B116-link" onclick="showRefSection();"><span data-dcnode-id="3279" instrument_node="">116</span></a></span><span data-dcnode-id="3276" instrument_node="">), pulmonary artery–banded (PAB) rats (</span><span class="xref" data-dcnode-id="3272"><span class="gen" data-dcnode-id="3275"></span><a data-dcnode-id="3273" href="#B117" id="#B117-link" onclick="showRefSection();"><span data-dcnode-id="3274" instrument_node="">117</span></a></span><span data-dcnode-id="3271" instrument_node="">), SuHx rats (</span><span class="xref" data-dcnode-id="3267"><span class="gen" data-dcnode-id="3270"></span><a data-dcnode-id="3268" href="#B117" id="#B117-link" onclick="showRefSection();"><span data-dcnode-id="3269" instrument_node="">117</span></a></span><span data-dcnode-id="3266" instrument_node="">), and pulmonary embolism (PE) rats (</span><span class="xref" data-dcnode-id="3262"><span class="gen" data-dcnode-id="3265"></span><a data-dcnode-id="3263" href="#B118" id="#B118-link" onclick="showRefSection();"><span data-dcnode-id="3264" instrument_node="">118</span></a></span><span data-dcnode-id="3261" instrument_node="">). Rats with PE display increased RV HIF-1α expression, and its level is positively correlated with RV hypertrophy and PAP (</span><span class="xref" data-dcnode-id="3257"><span class="gen" data-dcnode-id="3260"></span><a data-dcnode-id="3258" href="#B118" id="#B118-link" onclick="showRefSection();"><span data-dcnode-id="3259" instrument_node="">118</span></a></span><span data-dcnode-id="3256" instrument_node="">). Interestingly, mice with </span><i data-dcnode-id="3254"><span data-dcnode-id="3255" instrument_node="">Hif2a</span></i><span data-dcnode-id="3253" instrument_node=""> gain-of-function mutations develop RV hypertrophy but do not show signs of RV dilatation despite a substantial increase in PAP, suggesting preserved RV function (</span><span class="xref" data-dcnode-id="3250"><a data-dcnode-id="3251" href="#B107" id="#B107-link" onclick="showRefSection();"><span data-dcnode-id="3252" instrument_node="">107</span></a></span><span data-dcnode-id="3249" instrument_node="">). In patients with repaired tetralogy of Fallot, the presence of gain-of-function mutations in HIF-1α is associated with preserved RV function and better outcome due to increased TGF-β1 (</span><i data-dcnode-id="3247"><span data-dcnode-id="3248" instrument_node="">TGFB1</span></i><span data-dcnode-id="3246" instrument_node="">) expression and myocardial fibrosis (</span><span class="xref" data-dcnode-id="3243"><a data-dcnode-id="3244" href="#B119" id="#B119-link" onclick="showRefSection();"><span data-dcnode-id="3245" instrument_node="">119</span></a></span><span data-dcnode-id="3242" instrument_node="">). Collectively, these reports suggest that presumably mild to moderate activation of both HIFs is associated with preserved RV function. By contrast, strong activation of HIFs adversely affects RV function. For example, mice with global inducible deletion of </span><i data-dcnode-id="3240"><span data-dcnode-id="3241" instrument_node="">Phd2</span></i><span data-dcnode-id="3239" instrument_node=""> display increased mortality due to severe polycythemia and dilated cardiomyopathy (</span><span class="xref" data-dcnode-id="3236"><a data-dcnode-id="3237" href="#B120" id="#B120-link" onclick="showRefSection();"><span data-dcnode-id="3238" instrument_node="">120</span></a></span><span data-dcnode-id="3235" instrument_node="">). Similarly, HIF-2 activation in mice with EC-specific </span><i data-dcnode-id="3233"><span data-dcnode-id="3234" instrument_node="">Phd2</span></i><span data-dcnode-id="3232" instrument_node=""> deletion leads to spontaneous PH with high mortality due to severe RV failure (</span><span class="xref" data-dcnode-id="3229"><a data-dcnode-id="3230" href="#B10" id="#B10-link" onclick="showRefSection();"><span data-dcnode-id="3231" instrument_node="">10</span></a></span><span data-dcnode-id="3228" instrument_node="">). However, the roles of HIFs and PHDs have not been studied in fixed-afterload models of RV hypertrophy and failure using cell-specific gene knockout or overexpression.</span></p><span data-dcnode-id="3226" instrument_node="">
</span></div><span data-dcnode-id="3224" instrument_node="">
</span></dd></dl><span data-dcnode-id="3221" instrument_node="">
</span><a class="in-page" data-dcnode-id="3220" name="SEC7"></a><dl class="article-section" data-accordion="" data-dcnode-id="3177"><dd class="accordion-navigation active" data-dcnode-id="3178"><span data-dcnode-id="3219" instrument_node="">
</span><a aria-expanded="true" data-dcnode-id="3215" href="#section-7"><span class="toggle-icon" data-dcnode-id="3218"></span><span class="section-title" data-dcnode-id="3216"><span data-dcnode-id="3217" instrument_node="">Therapeutic potential of HIF targeting in PH</span></span></a><div class="content active" data-dcnode-id="3180" id="section-7"><span data-dcnode-id="3214" instrument_node="">
</span><p data-dcnode-id="3194"><span data-dcnode-id="3213" instrument_node="">As we have discussed above, experiments in rodent models revealed that HIF-1/2α exerts a profound impact on pulmonary vascular remodeling. Moreover, antisense oligonucleotides to </span><i data-dcnode-id="3211"><span data-dcnode-id="3212" instrument_node="">Hif2</span></i><span data-dcnode-id="3210" instrument_node=""> (but not to </span><i data-dcnode-id="3208"><span data-dcnode-id="3209" instrument_node="">Hif1</span></i><span data-dcnode-id="3207" instrument_node="">) reduced vessel muscularization, rises in PAPs, and RV hypertrophy in mice exposed to hypoxia, suggesting that inhibition of HIF-2α can provide a therapeutic approach to prevent or reverse the development of PH (</span><span class="xref" data-dcnode-id="3204"><a data-dcnode-id="3205" href="#B99" id="#B99-link" onclick="showRefSection();"><span data-dcnode-id="3206" instrument_node="">99</span></a></span><span data-dcnode-id="3203" instrument_node="">). Thus, great interest has arisen in developing therapeutics targeting this pathway. Studies have specifically targeted components of the HIF pathway such as PHD2, HIF-1α, or HIF-2α with pharmacological agents in various rodent models of PH. Most tested agents that directly or indirectly inhibit HIFs have been able to prevent or reverse experimental PH (</span><a data-dcnode-id="3201" href="#T3"><span data-dcnode-id="3202" instrument_node="">Table 3</span></a><span data-dcnode-id="3200" instrument_node="">). Agents/compounds that inhibit HIF-1α at the level of mRNA (topotecan and camptothecin), protein synthesis (2-methoxyestradiol, digoxin, celastramycin, caffeic acid phenethyl ester), protein accumulation and transcriptional activity (YC-1), and targeting of the molecules regulating the HIF axis (anti-CD146, mAb AA98, apigenin), or that inhibit HIF-2α at the level of mRNA (C76) or at the level of heterodimerization and DNA binding (PT2567), have been evaluated. These inhibitors, given via different routes (intraperitoneal, intravenous, subcutaneous, oral), were shown to prevent as well as reverse PH in various animal models of PH (hypoxia, MCT, and SuHx). Notably, the HIF-2α inhibitor C76 showed strong anti-remodeling effects in three experimental models of PH (</span><span class="xref" data-dcnode-id="3196"><span class="gen" data-dcnode-id="3199"></span><a data-dcnode-id="3197" href="#B27" id="#B27-link" onclick="showRefSection();"><span data-dcnode-id="3198" instrument_node="">27</span></a></span><span data-dcnode-id="3195" instrument_node="">), indicating that inhibition of HIF-2 may be a promising therapeutic approach for PH.</span></p><span data-dcnode-id="3193" instrument_node="">
</span><a class="in-page" data-dcnode-id="3192" id="T3-target" name="T3"></a><div class="figure" data-dcnode-id="3182"><span data-dcnode-id="3191" instrument_node="">
</span><a data-dcnode-id="3189" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.jci.org/articles/view/137558/table/3"><img align="left" class="table_thumbnail" data-dcnode-id="3190" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//dm5migu4zj3pb.cloudfront.net/manuscripts/137000/137558/small/JCI137558.t3.gif&amp;raw"></a><a class="figure_number" data-dcnode-id="3187" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.jci.org/articles/view/137558/table/3"><span data-dcnode-id="3188" instrument_node="">Table 3</span></a><p data-dcnode-id="3184"><span class="figure_title" data-dcnode-id="3185"><span data-dcnode-id="3186" instrument_node="">Summary of studies evaluating the effects of pharmacological agents targeting HIF signaling in animal models of PH</span></span></p><span data-dcnode-id="3183" instrument_node="">
</span></div><span data-dcnode-id="3181" instrument_node="">
</span></div><span data-dcnode-id="3179" instrument_node="">
</span></dd></dl><span data-dcnode-id="3176" instrument_node="">
</span><a class="in-page" data-dcnode-id="3175" name="SEC8"></a><dl class="article-section" data-accordion="" data-dcnode-id="3072"><dd class="accordion-navigation active" data-dcnode-id="3073"><span data-dcnode-id="3174" instrument_node="">
</span><a aria-expanded="true" data-dcnode-id="3170" href="#section-8"><span class="toggle-icon" data-dcnode-id="3173"></span><span class="section-title" data-dcnode-id="3171"><span data-dcnode-id="3172" instrument_node="">Conclusions and future directions</span></span></a><div class="content active" data-dcnode-id="3075" id="section-8"><span data-dcnode-id="3169" instrument_node="">
</span><p data-dcnode-id="3158"><span data-dcnode-id="3168" instrument_node="">Data obtained from cell systems, animal models, and patient-derived materials have consistently confirmed that HIF isoforms are important components of PH pathogenesis. The hypoxic and pseudohypoxic states that occur in different groups of PH may vary in intensity and duration, thus allowing an intricate interplay between HIF-1 and HIF-2 in driving the pathological processes that underlie pulmonary vascular and RV remodeling. Animal models have helped elucidate the nonredundant and complementary roles of HIF-1 and HIF-2. For example, HIF-1 plays a major role in driving vasoconstriction, PASMC proliferation, angiogenesis, and RV contractility, whereas HIF-2 plays a major role in inflammatory cell recruitment and in EC phenotypic switch to a proinflammatory state and to EndoMT. These data suggest dynamic regulation of HIF isoforms as well as cell- and context-specific roles of HIF-1 and HIF-2 in the initiation, progression, and establishment phases of pulmonary vascular and RV remodeling. Although head-to-head comparisons of mice with cell-specific deletions of HIF-1α and HIF-2α at different time points of hypoxic exposure are still needed to determine their influence on pulmonary vasculature and RV, it is conceivable that HIF-2α may play a major role in the initiation of the disease, whereas HIF-1α may play a major role in the progression and perpetuation of the disease. However, in cancers, HIF-1α plays the dominant role in the response to acute hypoxia, whereas HIF-2α drives the response to chronic hypoxia, although both are involved in cancer progression (</span><span class="xref" data-dcnode-id="3165"><a data-dcnode-id="3166" href="#B121" id="#B121-link" onclick="showRefSection();"><span data-dcnode-id="3167" instrument_node="">121</span></a></span><span data-dcnode-id="3164" instrument_node="">). Intriguingly, this HIF switch is also observed in pulmonary vascular endothelial and smooth muscle cells upon exposure to hypoxia (</span><span class="xref" data-dcnode-id="3160"><span class="gen" data-dcnode-id="3163"></span><a data-dcnode-id="3161" href="#B122" id="#B122-link" onclick="showRefSection();"><span data-dcnode-id="3162" instrument_node="">122</span></a></span><span data-dcnode-id="3159" instrument_node="">), which may allow HIF-1 and HIF-2 to play divergent and complementary roles during hypoxic and pseudohypoxic responses of pulmonary vascular and cardiac cells in PH.</span></p><span data-dcnode-id="3157" instrument_node="">
</span><p data-dcnode-id="3111"><span data-dcnode-id="3156" instrument_node="">These contradictory data in knockout mouse models versus in vitro cell models may be explained by the use of acute exposure to hypoxia (maximum exposure of 1–4 days) in the in vitro experiments versus the use of small-animal models (mice) for PH in the knockout studies. Thus, further studies with inducible deletion of HIF isoforms in severe animal models of PH (MCT, SuHx in mice and rats) and in vascular cells isolated from PH patients and large animals (cows), which exhibit and maintain their unique phenotypes in vitro (</span><span class="xref" data-dcnode-id="3153"><a data-dcnode-id="3154" href="#B44" id="#B44-link" onclick="showRefSection();"><span data-dcnode-id="3155" instrument_node="">44</span></a></span><span data-dcnode-id="3152" instrument_node="">), are needed to provide deeper insights into cell type– and context-specific roles of HIF isoforms in PH. Furthermore, understanding the molecular mechanisms that determine HIF-1/2 switches or activation of cell type– and context-specific HIF isoforms in PH will facilitate a better understanding of the pathophysiological roles exerted by HIF isoforms and the potential clinical implications of targeting them. For example, PHD2 has relatively more influence on HIF-1α, whereas PHD3 has relatively more influence on HIF-2α (</span><span class="xref" data-dcnode-id="3148"><span class="gen" data-dcnode-id="3151"></span><a data-dcnode-id="3149" href="#B123" id="#B123-link" onclick="showRefSection();"><span data-dcnode-id="3150" instrument_node="">123</span></a></span><span data-dcnode-id="3147" instrument_node="">). In addition, molecules like sirtuin 1, hypoxia-associated factor (HAF), and heat shock proteins (HSP70, HSP90) differentially regulated the degradation and activities of different HIF isoforms in various cell types (</span><span class="xref" data-dcnode-id="3143"><span class="gen" data-dcnode-id="3146"></span><a data-dcnode-id="3144" href="#B121" id="#B121-link" onclick="showRefSection();"><span data-dcnode-id="3145" instrument_node="">121</span></a></span><span data-dcnode-id="3142" instrument_node="">, </span><span class="xref" data-dcnode-id="3138"><span class="gen" data-dcnode-id="3141"></span><a data-dcnode-id="3139" href="#B124" id="#B124-link" onclick="showRefSection();"><span data-dcnode-id="3140" instrument_node="">124</span></a></span><span data-dcnode-id="3137" instrument_node="">). Furthermore, translation of HIF-2α (but not HIF-1α) is linked to iron metabolism due to an iron-responsive element in the 5′-untranslated region of HIF-2α (</span><span class="xref" data-dcnode-id="3133"><span class="gen" data-dcnode-id="3136"></span><a data-dcnode-id="3134" href="#B125" id="#B125-link" onclick="showRefSection();"><span data-dcnode-id="3135" instrument_node="">125</span></a></span><span data-dcnode-id="3132" instrument_node="">, </span><span class="xref" data-dcnode-id="3128"><span class="gen" data-dcnode-id="3131"></span><a data-dcnode-id="3129" href="#B126" id="#B126-link" onclick="showRefSection();"><span data-dcnode-id="3130" instrument_node="">126</span></a></span><span data-dcnode-id="3127" instrument_node="">). However, no studies to date have explored the mechanisms regulating the HIF-1/2 switch in pulmonary vascular and cardiac cells upon exposure to hypoxia and other nonhypoxic PH stimuli. Considering the pathophysiological roles of iron metabolism, sirtuins, and heat shock proteins in PH (</span><span class="xref" data-dcnode-id="3123"><span class="gen" data-dcnode-id="3126"></span><a data-dcnode-id="3124" href="#B68" id="#B68-link" onclick="showRefSection();"><span data-dcnode-id="3125" instrument_node="">68</span></a></span><span data-dcnode-id="3122" instrument_node="">, </span><span class="xref" data-dcnode-id="3118"><span class="gen" data-dcnode-id="3121"></span><a data-dcnode-id="3119" href="#B126" id="#B126-link" onclick="showRefSection();"><span data-dcnode-id="3120" instrument_node="">126</span></a></span><span data-dcnode-id="3117" instrument_node="">–</span><span class="xref" data-dcnode-id="3113"><span class="gen" data-dcnode-id="3116"></span><a data-dcnode-id="3114" href="#B128" id="#B128-link" onclick="showRefSection();"><span data-dcnode-id="3115" instrument_node="">128</span></a></span><span data-dcnode-id="3112" instrument_node="">), the possibility that these mechanisms are operative in the putative HIF-1/2 switch associated with PH warrants further investigation.</span></p><span data-dcnode-id="3110" instrument_node="">
</span><p data-dcnode-id="3099"><span data-dcnode-id="3109" instrument_node="">Despite striking similarity in protein sequence, dimerization partners, and binding sites among HIF-1α and HIF-2α proteins, it is well documented that HIF-1 and HIF-2 activate different subsets of hypoxia-inducible genes in various pathological conditions, including PH. Recent studies suggest that despite sharing an identical consensus recognition sequence, each HIF isoform has an inherent property that determines its binding distribution across the genome. For example, HIF-1 binds closer to promoters, while HIF-2 binds distal enhancers, and their inherent distributions are unaffected by the degree or duration of hypoxia or the cell type (</span><span class="xref" data-dcnode-id="3106"><a data-dcnode-id="3107" href="#B129" id="#B129-link" onclick="showRefSection();"><span data-dcnode-id="3108" instrument_node="">129</span></a></span><span data-dcnode-id="3105" instrument_node="">). In addition, differential recruitment of other transcription factors underlies HIF-mediated cell-specific hypoxia responses. Indeed, accumulating evidence suggests that HIF-1α and HIF-2α form separate multifactorial complexes with other transcription factors, cofactors, and RNA polymerase II to mediate the distinct functions of HIF-1 or HIF-2 (</span><span class="xref" data-dcnode-id="3101"><span class="gen" data-dcnode-id="3104"></span><a data-dcnode-id="3102" href="#B130" id="#B130-link" onclick="showRefSection();"><span data-dcnode-id="3103" instrument_node="">130</span></a></span><span data-dcnode-id="3100" instrument_node="">). Hence, it is important to identify these complexes and their common and unique target genes, not only to understand the distinct pathological processes mediated by HIF isoforms, but also to selectively inhibit HIF isoform functions as a therapeutic approach.</span></p><span data-dcnode-id="3098" instrument_node="">
</span><p data-dcnode-id="3077"><span data-dcnode-id="3097" instrument_node="">In summary, rapidly advancing research has brought to light the isoform-specific, context-specific, and cell-specific roles of the HIF pathway in regulating pulmonary vascular remodeling. This has introduced a novel therapeutic approach for the treatment of PH. Inline, HIF-2–selective inhibitors reversed PH in various animal models of PH without any significant side effects. Notably, a HIF-2–specific small-molecule inhibitor developed to treat renal cancer has demonstrated a favorable safety profile in a recent phase I trial (</span><span class="xref" data-dcnode-id="3094"><a data-dcnode-id="3095" href="#B131" id="#B131-link" onclick="showRefSection();"><span data-dcnode-id="3096" instrument_node="">131</span></a></span><span data-dcnode-id="3093" instrument_node="">), entered into phase II clinical trials, and will be considered for clinical trials among PH patients in the future. Head-to-head comparisons and multicenter preclinical studies of pan-HIF inhibitors and HIF-1– and HIF-2–selective inhibitors in various animal models of PH and RV dysfunction are warranted before moving into clinical development (</span><span class="xref" data-dcnode-id="3089"><span class="gen" data-dcnode-id="3092"></span><a data-dcnode-id="3090" href="#B132" id="#B132-link" onclick="showRefSection();"><span data-dcnode-id="3091" instrument_node="">132</span></a></span><span data-dcnode-id="3088" instrument_node="">). Notably, further studies are needed to develop personalized therapeutics, i.e., to determine under what conditions and in which PH patients HIF inhibition can provide an optimal therapeutic strategy. In addition, given the myriad roles of HIFs and their possible influence on extrapulmonary manifestations in patients with PH (</span><span class="xref" data-dcnode-id="3084"><span class="gen" data-dcnode-id="3087"></span><a data-dcnode-id="3085" href="#B15" id="#B15-link" onclick="showRefSection();"><span data-dcnode-id="3086" instrument_node="">15</span></a></span><span data-dcnode-id="3083" instrument_node="">, </span><span class="xref" data-dcnode-id="3079"><span class="gen" data-dcnode-id="3082"></span><a data-dcnode-id="3080" href="#B133" id="#B133-link" onclick="showRefSection();"><span data-dcnode-id="3081" instrument_node="">133</span></a></span><span data-dcnode-id="3078" instrument_node="">), it will be important to carefully assess the risk/benefit ratio of systemic versus pulmonary selective HIF inhibitors. Thus, more work needs to be done to identify novel, potent, and more specific inhibitors targeting clearly defined points in the HIF pathway, followed by lung-selective delivery of these inhibitors, which will be the key to developing potential therapeutic strategies for PH.</span></p><span data-dcnode-id="3076" instrument_node="">
</span></div><span data-dcnode-id="3074" instrument_node="">
</span></dd></dl><span data-dcnode-id="3071" instrument_node="">
