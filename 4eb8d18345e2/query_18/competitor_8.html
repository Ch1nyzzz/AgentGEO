Object name is joa0201-0335-f3.jpg" class="tileshop" data-dcnode-id="7539" loading="lazy" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.ncbi.nlm.nih.gov/pmc/articles/PMC1570922/bin/joa0201-0335-f3.jpg&amp;raw" title="Click on image to zoom"></a></div><div class="largeobj-link align_right" data-dcnode-id="7534" id="largeobj_idm139710742246432" style="display: none;"><a data-dcnode-id="7535" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.ncbi.nlm.nih.gov/pmc/articles/PMC1570922/figure/fig03/%3Freport%3Dobjectonly" rel="noopener" target="object"><span data-dcnode-id="7536" instrument_node="">Open in a separate window</span></a></div><div class="icnblk_cntnt" data-dcnode-id="7526" id="lgnd_fig03"><div data-dcnode-id="7531"><a class="figpopup" data-dcnode-id="7532" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.ncbi.nlm.nih.gov/pmc/articles/PMC1570922/figure/fig03/" rid-figpopup="fig03" rid-ob="ob-fig03" target="figure"><span data-dcnode-id="7533" instrument_node="">Fig. 3</span></a></div><div class="caption" data-dcnode-id="7527"><p data-dcnode-id="7528" id="__p35"><span data-dcnode-id="7529" instrument_node="">Mean (± SEM) reduction in wall tension in response to increasing concentrations of acetylcholine (ACh) in preconstricted pulmonary arterial rings isolated from control (n = 9) and chronically infected (n = 6) rats. Asterisk indicates significant difference between the two groups (P &lt; 0.05, ANOVA).</span></p></div></div></div><p data-dcnode-id="7511" id="__p18"><span data-dcnode-id="7524" instrument_node="">In other forms of chronic lung inflammation, the behaviour of endothelial NO synthase is controversial. </span><a aria-expanded="false" aria-haspopup="true" class="bibr popnode tag_hotlink tag_tooltip" data-dcnode-id="7522" href="#b144" id="__tag_124928646" rid="b144" role="button"><span data-dcnode-id="7523" instrument_node="">Tyler et al. (1999)</span></a><span data-dcnode-id="7521" instrument_node=""> reported that in monocrotaline-induced pulmonary hypertension in rats, eNOS expression is reduced. In support of these findings, lipopolysacharide and pro-inflammatory cytokines reduced endothelial NO expression and endothelium-dependent relaxation in pulmonary arteries in organ culture (</span><a aria-expanded="false" aria-haspopup="true" class="bibr popnode tag_hotlink tag_tooltip" data-dcnode-id="7519" href="#b151" id="__tag_124928481" rid="b151" role="button"><span data-dcnode-id="7520" instrument_node="">Ziesche et al. 1996</span></a><span data-dcnode-id="7518" instrument_node="">). However, others have reported that monocrotaline causes increased eNOS expression and increased endothelium-dependent relaxation in rat lungs (</span><a aria-expanded="false" aria-haspopup="true" class="bibr popnode tag_hotlink tag_tooltip" data-dcnode-id="7516" href="#b116" id="__tag_124928573" rid="b116" role="button"><span data-dcnode-id="7517" instrument_node="">Resta et al. 1997</span></a><span data-dcnode-id="7515" instrument_node="">). It has also been reported that hyperoxia-induced lung inflammation reduced endothelial NO synthase expression (</span><a aria-expanded="false" aria-haspopup="true" class="bibr popnode tag_hotlink tag_tooltip" data-dcnode-id="7513" href="#b136" id="__tag_124928592" rid="b136" role="button"><span data-dcnode-id="7514" instrument_node="">Steudel et al. 1999</span></a><span data-dcnode-id="7512" instrument_node="">). Thus, the role of endothelial NO synthase in these conditions is not as clear as its role in chronic airway inflammation and requires further investigation.</span></p><p data-dcnode-id="7467" id="__p19"><span data-dcnode-id="7510" instrument_node="">The position of the vascular endothelium, immediately adjacent to the blood vessel lumen, means that it must be the site at which alterations in shear stress are detected and transduced. Acute increases in shear stress can immediately activate shear stress-dependent channels, elevate intracellular inositol 1,4,5-triphosphate and diacylglycerol, activate the mitogen-activated and stress-activated protein kinase pathways and cause cytoskeletal reorganization in endothelial cells (</span><a aria-expanded="false" aria-haspopup="true" class="bibr popnode tag_hotlink tag_tooltip" data-dcnode-id="7508" href="#b3" id="__tag_124928487" rid="b3" role="button"><span data-dcnode-id="7509" instrument_node="">Ballermann et al. 1998</span></a><span data-dcnode-id="7507" instrument_node="">; </span><a aria-expanded="false" aria-haspopup="true" class="bibr popnode tag_hotlink tag_tooltip" data-dcnode-id="7505" href="#b28" id="__tag_124928612" rid="b28" role="button"><span data-dcnode-id="7506" instrument_node="">Fisher et al. 2001</span></a><span data-dcnode-id="7504" instrument_node="">). Change in shear stress also alters production of vasoactive mediators, including NO, prostacyclin and endothelin in cultured endothelial cells (</span><a aria-expanded="false" aria-haspopup="true" class="bibr popnode tag_hotlink tag_tooltip" data-dcnode-id="7502" href="#b30" id="__tag_124928511" rid="b30" role="button"><span data-dcnode-id="7503" instrument_node="">Frangos et al. 1985</span></a><span data-dcnode-id="7501" instrument_node="">; </span><a aria-expanded="false" aria-haspopup="true" class="bibr popnode tag_hotlink tag_tooltip" data-dcnode-id="7499" href="#b37" id="__tag_124928548" rid="b37" role="button"><span data-dcnode-id="7500" instrument_node="">Grabowski et al. 1985</span></a><span data-dcnode-id="7498" instrument_node="">; </span><a aria-expanded="false" aria-haspopup="true" class="bibr popnode tag_hotlink tag_tooltip" data-dcnode-id="7496" href="#b11" id="__tag_124928466" rid="b11" role="button"><span data-dcnode-id="7497" instrument_node="">Buga et al. 1991</span></a><span data-dcnode-id="7495" instrument_node="">; </span><a aria-expanded="false" aria-haspopup="true" class="bibr popnode tag_hotlink tag_tooltip" data-dcnode-id="7493" href="#b81" id="__tag_124928568" rid="b81" role="button"><span data-dcnode-id="7494" instrument_node="">Malek &amp; Izumo, 1992</span></a><span data-dcnode-id="7492" instrument_node="">; </span><a aria-expanded="false" aria-haspopup="true" class="bibr popnode tag_hotlink tag_tooltip" data-dcnode-id="7490" href="#b82" id="__tag_124928530" rid="b82" role="button"><span data-dcnode-id="7491" instrument_node="">Malek et al. 1993</span></a><span data-dcnode-id="7489" instrument_node="">; </span><a aria-expanded="false" aria-haspopup="true" class="bibr popnode tag_hotlink tag_tooltip" data-dcnode-id="7487" href="#b67" id="__tag_124928486" rid="b67" role="button"><span data-dcnode-id="7488" instrument_node="">Korenaga et al. 1994</span></a><span data-dcnode-id="7486" instrument_node="">). Shear stress response elements have been identified in the sequence of genes encoding important vascular growth factors (</span><a aria-expanded="false" aria-haspopup="true" class="bibr popnode tag_hotlink tag_tooltip" data-dcnode-id="7484" href="#b3" id="__tag_124928518" rid="b3" role="button"><span data-dcnode-id="7485" instrument_node="">Ballermann et al. 1998</span></a><span data-dcnode-id="7483" instrument_node="">). Furthermore, there is evidence that increased shear stress alters endothelial cell membrane potential and increases NO production in the isolated intact lung and in the whole organism (</span><a aria-expanded="false" aria-haspopup="true" class="bibr popnode tag_hotlink tag_tooltip" data-dcnode-id="7481" href="#b99" id="__tag_124928508" rid="b99" role="button"><span data-dcnode-id="7482" instrument_node="">Nakache &amp; Gaub, 1988</span></a><span data-dcnode-id="7480" instrument_node="">; </span><a aria-expanded="false" aria-haspopup="true" class="bibr popnode tag_hotlink tag_tooltip" data-dcnode-id="7478" href="#b45" id="__tag_124928615" rid="b45" role="button"><span data-dcnode-id="7479" instrument_node="">Hakim, 1994</span></a><span data-dcnode-id="7477" instrument_node="">; </span><a aria-expanded="false" aria-haspopup="true" class="bibr popnode tag_hotlink tag_tooltip" data-dcnode-id="7475" href="#b137" id="__tag_124928565" rid="b137" role="button"><span data-dcnode-id="7476" instrument_node="">Storme et al. 1999</span></a><span data-dcnode-id="7474" instrument_node="">; </span><a aria-expanded="false" aria-haspopup="true" class="bibr popnode tag_hotlink tag_tooltip" data-dcnode-id="7472" href="#b143" id="__tag_124928599" rid="b143" role="button"><span data-dcnode-id="7473" instrument_node="">Tworetzky et al. 2000</span></a><span data-dcnode-id="7471" instrument_node="">; </span><a aria-expanded="false" aria-haspopup="true" class="bibr popnode tag_hotlink tag_tooltip" data-dcnode-id="7469" href="#b101" id="__tag_124928605" rid="b101" role="button"><span data-dcnode-id="7470" instrument_node="">Ogasa et al. 2001</span></a><span data-dcnode-id="7468" instrument_node="">).</span></p><p class="p p-last" data-dcnode-id="7432" id="__p20"><span data-dcnode-id="7466" instrument_node="">While these data provide good evidence that shear stress can regulate endothelial cell function, they largely demonstrate changes, such as increased NO and PGI</span><sub data-dcnode-id="7464"><span data-dcnode-id="7465" instrument_node="">2</span></sub><span data-dcnode-id="7463" instrument_node=""> synthesis, that might be expected to minimize pulmonary vascular resistance, inhibit wall remodelling and prevent the development of pulmonary hypertension. However, prolonged excessive shear stress can lead to endothelial cell damage, reduce the production of vasodilator agents that inhibit wall remodelling, promote the production of mediators that lead to vascular wall remodelling, and increase the expression of adhesion molecules and cytokines that promote an inflammatory response in the vascular wall (</span><a aria-expanded="false" aria-haspopup="true" class="bibr popnode tag_hotlink tag_tooltip" data-dcnode-id="7461" href="#b23" id="__tag_124928645" rid="b23" role="button"><span data-dcnode-id="7462" instrument_node="">Esterly et al. 1968</span></a><span data-dcnode-id="7460" instrument_node="">; </span><a aria-expanded="false" aria-haspopup="true" class="bibr popnode tag_hotlink tag_tooltip" data-dcnode-id="7458" href="#b113" id="__tag_124928522" rid="b113" role="button"><span data-dcnode-id="7459" instrument_node="">Reidy &amp; Bowyer, 1977</span></a><span data-dcnode-id="7457" instrument_node="">; </span><a aria-expanded="false" aria-haspopup="true" class="bibr popnode tag_hotlink tag_tooltip" data-dcnode-id="7455" href="#b150" id="__tag_124928542" rid="b150" role="button"><span data-dcnode-id="7456" instrument_node="">Zhu et al. 1997</span></a><span data-dcnode-id="7454" instrument_node="">; </span><a aria-expanded="false" aria-haspopup="true" class="bibr popnode tag_hotlink tag_tooltip" data-dcnode-id="7452" href="#b100" id="__tag_124928619" rid="b100" role="button"><span data-dcnode-id="7453" instrument_node="">Nomura et al. 2001</span></a><span data-dcnode-id="7451" instrument_node="">). Chronic increase in shear stress caused by left to right shunting leads to impaired endothelium-dependent relaxation in pulmonary arteries (</span><a aria-expanded="false" aria-haspopup="true" class="bibr popnode tag_hotlink tag_tooltip" data-dcnode-id="7449" href="#b33" id="__tag_124928617" rid="b33" role="button"><span data-dcnode-id="7450" instrument_node="">Fullerton et al. 1996</span></a><span data-dcnode-id="7448" instrument_node="">). In support of these findings, endothelium-dependent arterial relaxation is attenuated and circulating endothelin and thromboxane concentrations are increased in patients with Eisenmengers syndrome (</span><a aria-expanded="false" aria-haspopup="true" class="bibr popnode tag_hotlink tag_tooltip" data-dcnode-id="7446" href="#b19" id="__tag_124928460" rid="b19" role="button"><span data-dcnode-id="7447" instrument_node="">Dinh Xuan et al. 1990</span></a><span data-dcnode-id="7445" instrument_node="">; </span><a aria-expanded="false" aria-haspopup="true" class="bibr popnode tag_hotlink tag_tooltip" data-dcnode-id="7443" href="#b148" id="__tag_124928535" rid="b148" role="button"><span data-dcnode-id="7444" instrument_node="">Yoshibayashi et al. 1991</span></a><span data-dcnode-id="7442" instrument_node="">; </span><a aria-expanded="false" aria-haspopup="true" class="bibr popnode tag_hotlink tag_tooltip" data-dcnode-id="7440" href="#b12" id="__tag_124928633" rid="b12" role="button"><span data-dcnode-id="7441" instrument_node="">Cacoub et al. 1993</span></a><span data-dcnode-id="7439" instrument_node="">; </span><a aria-expanded="false" aria-haspopup="true" class="bibr popnode tag_hotlink tag_tooltip" data-dcnode-id="7437" href="#b16" id="__tag_124928604" rid="b16" role="button"><span data-dcnode-id="7438" instrument_node="">Celermajer et al. 1993</span></a><span data-dcnode-id="7436" instrument_node="">; </span><a aria-expanded="false" aria-haspopup="true" class="bibr popnode tag_hotlink tag_tooltip" data-dcnode-id="7434" href="#b142" id="__tag_124928618" rid="b142" role="button"><span data-dcnode-id="7435" instrument_node="">Tweddell et al. 1994</span></a><span data-dcnode-id="7433" instrument_node="">). Thus, chronic excessive shear stress may promote the development of pulmonary hypertension, at least in part, by altering endothelial secretion of mediators that regulate vascular wall structure.</span></p></div><div class="tsec sec" data-dcnode-id="7330" id="__sec7"><div class="goto jig-ncbiinpagenav-goto-container" data-dcnode-id="7428"><a aria-expanded="false" aria-haspopup="true" class="tgt_dark page-toc-label jig-ncbiinpagenav-goto-heading" data-dcnode-id="7429" href="#" role="button" title="Go to other sections in this page"><span data-dcnode-id="7430" instrument_node="">Go to:</span></a></div><h2 class="head no_bottom_margin ui-helper-clearfix" data-dcnode-id="7426" id="__sec7title"><span data-dcnode-id="7427" instrument_node="">Vascular rarefaction in pulmonary hypertension</span></h2><p class="p p-first" data-dcnode-id="7400" id="__p21"><span data-dcnode-id="7425" instrument_node="">Intriguingly, in the pulmonary circulation it is reported that chronic hypoxia leads to a reduction in the pulmonary vascular bed in adult animals and man, rather than stimulating angiogenesis. In animal models of chronic hypoxic lung disease, the ratio of pulmonary arterioles to pulmonary alveoli is reduced, suggesting loss of these blood vessels (</span><a aria-expanded="false" aria-haspopup="true" class="bibr popnode tag_hotlink tag_tooltip" data-dcnode-id="7423" href="#b57" id="__tag_124928480" rid="b57" role="button"><span data-dcnode-id="7424" instrument_node="">Hislop &amp; Reid, 1976</span></a><span data-dcnode-id="7422" instrument_node="">; </span><a aria-expanded="false" aria-haspopup="true" class="bibr popnode tag_hotlink tag_tooltip" data-dcnode-id="7420" href="#b108" id="__tag_124928648" rid="b108" role="button"><span data-dcnode-id="7421" instrument_node="">Rabinovitch et al. 1979</span></a><span data-dcnode-id="7419" instrument_node="">; </span><a aria-expanded="false" aria-haspopup="true" class="bibr popnode" data-dcnode-id="7417" href="#b63" rid="b63" role="button"><span data-dcnode-id="7418" instrument_node="">Jones &amp; Reid, 1995</span></a><span data-dcnode-id="7416" instrument_node="">; </span><a aria-expanded="false" aria-haspopup="true" class="bibr popnode tag_hotlink tag_tooltip" data-dcnode-id="7414" href="#b103" id="__tag_124928636" rid="b103" role="button"><span data-dcnode-id="7415" instrument_node="">Partovian et al. 2000</span></a><span data-dcnode-id="7413" instrument_node="">). No remnants of these lost vessels could be found (</span><a aria-expanded="false" aria-haspopup="true" class="bibr popnode tag_hotlink tag_tooltip" data-dcnode-id="7411" href="#b57" id="__tag_124928620" rid="b57" role="button"><span data-dcnode-id="7412" instrument_node="">Hislop &amp; Reid, 1976</span></a><span data-dcnode-id="7410" instrument_node="">; </span><a aria-expanded="false" aria-haspopup="true" class="bibr popnode tag_hotlink tag_tooltip" data-dcnode-id="7408" href="#b108" id="__tag_124928488" rid="b108" role="button"><span data-dcnode-id="7409" instrument_node="">Rabinovitch et al. 1979</span></a><span data-dcnode-id="7407" instrument_node="">) and on re-introduction of animals to normoxic environments, some but not all of these ‘lost’ vessels were restored, suggesting a permanent reduction in the pulmonary vascular bed (</span><a aria-expanded="false" aria-haspopup="true" class="bibr popnode tag_hotlink tag_tooltip" data-dcnode-id="7405" href="#b58" id="__tag_124928611" rid="b58" role="button"><span data-dcnode-id="7406" instrument_node="">Hislop &amp; Reid, 1977</span></a><span data-dcnode-id="7404" instrument_node="">). Additionally, in human subjects suffering from congenital heart disease and pulmonary hypertension, a similar alteration in alveolar to arterial ratio has been observed in the lungs (</span><a aria-expanded="false" aria-haspopup="true" class="bibr popnode tag_hotlink tag_tooltip" data-dcnode-id="7402" href="#b108" id="__tag_124928562" rid="b108" role="button"><span data-dcnode-id="7403" instrument_node="">Rabinovitch et al. 1979</span></a><span data-dcnode-id="7401" instrument_node="">). Thus, it has been postulated that rarefaction is an important component of the structural basis for hypoxic pulmonary hypertension.</span></p><p data-dcnode-id="7374" id="__p22"><span data-dcnode-id="7399" instrument_node="">This hypoxia-induced loss of blood vessels in the pulmonary circulations is in stark contrast to the marked angiogenesis observed in the systemic circulation in hypoxia (</span><a aria-expanded="false" aria-haspopup="true" class="bibr popnode tag_hotlink tag_tooltip" data-dcnode-id="7397" href="#b69" id="__tag_124928465" rid="b69" role="button"><span data-dcnode-id="7398" instrument_node="">LaManna et al. 1992</span></a><span data-dcnode-id="7396" instrument_node="">; </span><a aria-expanded="false" aria-haspopup="true" class="bibr popnode" data-dcnode-id="7394" href="#b130" rid="b130" role="button"><span data-dcnode-id="7395" instrument_node="">Smith, 1997</span></a><span data-dcnode-id="7393" instrument_node="">; </span><a aria-expanded="false" aria-haspopup="true" class="bibr popnode" data-dcnode-id="7391" href="#b18" rid="b18" role="button"><span data-dcnode-id="7392" instrument_node="">Deveci et al. 1998</span></a><span data-dcnode-id="7390" instrument_node="">; </span><a aria-expanded="false" aria-haspopup="true" class="bibr popnode tag_hotlink tag_tooltip" data-dcnode-id="7388" href="#b83" id="__tag_124928629" rid="b83" role="button"><span data-dcnode-id="7389" instrument_node="">Marti &amp; Risau, 1999</span></a><span data-dcnode-id="7387" instrument_node="">; </span><a aria-expanded="false" aria-haspopup="true" class="bibr popnode tag_hotlink tag_tooltip" data-dcnode-id="7385" href="#b131" id="__tag_124928640" rid="b131" role="button"><span data-dcnode-id="7386" instrument_node="">Smith &amp; Marshall, 1999</span></a><span data-dcnode-id="7384" instrument_node="">; </span><a aria-expanded="false" aria-haspopup="true" class="bibr popnode tag_hotlink tag_tooltip" data-dcnode-id="7382" href="#b40" id="__tag_124928521" rid="b40" role="button"><span data-dcnode-id="7383" instrument_node="">Griffioen &amp; Molema, 2000</span></a><span data-dcnode-id="7381" instrument_node="">) and has led to the suggestion that the pulmonary circulation in the adult is incapable of angiogenesis. </span><a aria-expanded="false" aria-haspopup="true" class="bibr popnode tag_hotlink tag_tooltip" data-dcnode-id="7379" href="#b133" id="__tag_124928593" rid="b133" role="button"><span data-dcnode-id="7380" instrument_node="">Sobin et al. (1983)</span></a><span data-dcnode-id="7378" instrument_node="">, using transmission electronic microscopy specifically sought, but could not find, evidence of new capillary formation in chronically hypoxic rat lungs. Furthermore, adenovirally mediated over-expression of the specific endothelial cell mitogen vascular endothelial growth factor (VEGF) in the lung did not alter the ratio of vessels to alveoli (</span><a aria-expanded="false" aria-haspopup="true" class="bibr popnode tag_hotlink tag_tooltip" data-dcnode-id="7376" href="#b103" id="__tag_124928524" rid="b103" role="button"><span data-dcnode-id="7377" instrument_node="">Partovian et al. 2000</span></a><span data-dcnode-id="7375" instrument_node="">), in contrast to its potent angiogenic effects in systemic vascular beds.</span></p><p data-dcnode-id="7348" id="__p23"><span data-dcnode-id="7373" instrument_node="">Rarefaction is also thought to contribute significantly to the development of hypertension in chronic inflammatory conditions of the lung. Pulmonary hypertension produced by crotalaria ingestion led to a reduction in the ratio of arterioles to alveoli in the rat (</span><a aria-expanded="false" aria-haspopup="true" class="bibr popnode tag_hotlink tag_tooltip" data-dcnode-id="7371" href="#b89" id="__tag_124928503" rid="b89" role="button"><span data-dcnode-id="7372" instrument_node="">Meyrick &amp; Reid, 1979a</span></a><span data-dcnode-id="7370" instrument_node="">; </span><a aria-expanded="false" aria-haspopup="true" class="bibr popnode tag_hotlink tag_tooltip" data-dcnode-id="7368" href="#b91" id="__tag_124928566" rid="b91" role="button"><span data-dcnode-id="7369" instrument_node="">Meyrick et al. 1980</span></a><span data-dcnode-id="7367" instrument_node="">), while repeated endotoxin infusion in sheep led to a similar reduction (</span><a aria-expanded="false" aria-haspopup="true" class="bibr popnode tag_hotlink tag_tooltip" data-dcnode-id="7365" href="#b87" id="__tag_124928639" rid="b87" role="button"><span data-dcnode-id="7366" instrument_node="">Meyrick &amp; Brigham, 1986</span></a><span data-dcnode-id="7364" instrument_node="">). In human subjects suffering from cystic fibrosis-induced chronic airway infection, it has also been reported that the arterial to alveoli ratio is reduced (</span><a aria-expanded="false" aria-haspopup="true" class="bibr popnode tag_hotlink tag_tooltip" data-dcnode-id="7362" href="#b120" id="__tag_124928654" rid="b120" role="button"><span data-dcnode-id="7363" instrument_node="">Ryland &amp; Reid, 1975</span></a><span data-dcnode-id="7361" instrument_node="">). These findings have been interpreted to indicate a loss of blood vessels, a response that is again markedly different from the response of the systemic vasculature in chronic inflammation, where angiogenesis is prominent and plays a key role in the disease process (</span><a aria-expanded="false" aria-haspopup="true" class="bibr popnode tag_hotlink tag_tooltip" data-dcnode-id="7359" href="#b40" id="__tag_124928540" rid="b40" role="button"><span data-dcnode-id="7360" instrument_node="">Griffioen &amp; Molema, 2000</span></a><span data-dcnode-id="7358" instrument_node="">; </span><a aria-expanded="false" aria-haspopup="true" class="bibr popnode tag_hotlink tag_tooltip" data-dcnode-id="7356" href="#b139" id="__tag_124928549" rid="b139" role="button"><span data-dcnode-id="7357" instrument_node="">Sullivan et al. 2000</span></a><span data-dcnode-id="7355" instrument_node="">). Schraufnagel and colleagues used scanning electron microscopy to seek evidence of angiogenesis in moncrotaline-induced inflammation and pulmonary hypertension in rats. While they reported extensive new vessel formation in the peribronchial region and on the pleural surface arising from systemic vessels, they could find no evidence of new vessels in the alveolar walls, again suggesting that angiogenesis cannot occur in the adult pulmonary circulation (</span><a aria-expanded="false" aria-haspopup="true" class="bibr popnode tag_hotlink tag_tooltip" data-dcnode-id="7353" href="#b122" id="__tag_124928591" rid="b122" role="button"><span data-dcnode-id="7354" instrument_node="">Schraufnagel et al. 1986</span></a><span data-dcnode-id="7352" instrument_node="">; </span><a aria-expanded="false" aria-haspopup="true" class="bibr popnode tag_hotlink tag_tooltip" data-dcnode-id="7350" href="#b123" id="__tag_124928553" rid="b123" role="button"><span data-dcnode-id="7351" instrument_node="">Schraufnagel, 1990</span></a><span data-dcnode-id="7349" instrument_node="">).</span></p><p class="p p-last" data-dcnode-id="7331" id="__p24"><span data-dcnode-id="7347" instrument_node="">However, not all investigators agree that rarefaction occurs in pulmonary hypertension. Several studies of pulmonary hypertension in the rat report that the number of blood vessels in the lung was unaltered following chronic hypoxia (</span><a aria-expanded="false" aria-haspopup="true" class="bibr popnode tag_hotlink tag_tooltip" data-dcnode-id="7345" href="#b90" id="__tag_124928482" rid="b90" role="button"><span data-dcnode-id="7346" instrument_node="">Meyrick &amp; Reid, 1979b</span></a><span data-dcnode-id="7344" instrument_node="">; </span><a aria-expanded="false" aria-haspopup="true" class="bibr popnode tag_hotlink tag_tooltip" data-dcnode-id="7342" href="#b22" id="__tag_124928634" rid="b22" role="button"><span data-dcnode-id="7343" instrument_node="">Emery et al. 1981</span></a><span data-dcnode-id="7341" instrument_node="">; </span><a aria-expanded="false" aria-haspopup="true" class="bibr popnode tag_hotlink tag_tooltip" data-dcnode-id="7339" href="#b66" id="__tag_124928479" rid="b66" role="button"><span data-dcnode-id="7340" instrument_node="">Kay et al. 1982</span></a><span data-dcnode-id="7338" instrument_node="">; </span><a aria-expanded="false" aria-haspopup="true" class="bibr popnode tag_hotlink tag_tooltip" data-dcnode-id="7336" href="#b27" id="__tag_124928520" rid="b27" role="button"><span data-dcnode-id="7337" instrument_node="">Finlay et al. 1986</span></a><span data-dcnode-id="7335" instrument_node="">) and following chronic inflammatory lung disease (</span><a aria-expanded="false" aria-haspopup="true" class="bibr popnode tag_hotlink tag_tooltip" data-dcnode-id="7333" href="#b66" id="__tag_124928649" rid="b66" role="button"><span data-dcnode-id="7334" instrument_node="">Kay et al. 1982</span></a><span data-dcnode-id="7332" instrument_node="">).</span></p></div><div class="tsec sec" data-dcnode-id="7213" id="__sec8"><div class="goto jig-ncbiinpagenav-goto-container" data-dcnode-id="7327"><a aria-expanded="false" aria-haspopup="true" class="tgt_dark page-toc-label jig-ncbiinpagenav-goto-heading" data-dcnode-id="7328" href="#" role="button" title="Go to other sections in this page"><span data-dcnode-id="7329" instrument_node="">Go to:</span></a></div><h2 class="head no_bottom_margin ui-helper-clearfix" data-dcnode-id="7325" id="__sec8title"><span data-dcnode-id="7326" instrument_node="">Pulmonary vascular remodelling without pulmonary hypertension</span></h2><p class="p p-first" data-dcnode-id="7314" id="__p25"><span data-dcnode-id="7324" instrument_node="">A close association between remodelling of pulmonary resistance vessels and the development of hypertension is not invariably observed. We and others have reported that, in chronically infected lungs in rats, pulmonary hypertension did not occur and right ventricular hypertrophy was not observed, despite the development of thickened walls in pulmonary vessels (</span><a aria-expanded="false" aria-haspopup="true" class="bibr popnode tag_hotlink tag_tooltip" data-dcnode-id="7322" href="#b38" id="__tag_124928584" rid="b38" role="button"><span data-dcnode-id="7323" instrument_node="">Graham, 1990</span></a><span data-dcnode-id="7321" instrument_node="">; </span><a aria-expanded="false" aria-haspopup="true" class="bibr popnode tag_hotlink tag_tooltip" data-dcnode-id="7319" href="#b13" id="__tag_124928554" rid="b13" role="button"><span data-dcnode-id="7320" instrument_node="">Cadogan et al. 1999</span></a><span data-dcnode-id="7318" instrument_node="">). In a similar observation in human subjects with chronic obstructive pulmonary disease, </span><a aria-expanded="false" aria-haspopup="true" class="bibr popnode tag_hotlink tag_tooltip" data-dcnode-id="7316" href="#b146" id="__tag_124928510" rid="b146" role="button"><span data-dcnode-id="7317" instrument_node="">Wright et al. (1983)</span></a><span data-dcnode-id="7315" instrument_node=""> have reported marked thickening of the walls of pulmonary arterial vessels in the absence of pulmonary hypertension.</span></p><p data-dcnode-id="7300" id="__p26"><span data-dcnode-id="7313" instrument_node="">One possible explanation of these findings is that wall thickening occurred in an outward direction so that the size of the vascular lumen was not compromised. This phenomenon, termed compensatory enlargement, is well recognized in the systemic circulation (</span><a aria-expanded="false" aria-haspopup="true" class="bibr popnode tag_hotlink tag_tooltip" data-dcnode-id="7311" href="#b36" id="__tag_337480294" rid="b36" role="button"><span data-dcnode-id="7312" instrument_node="">Glagov et al. 1993</span></a><span data-dcnode-id="7310" instrument_node="">) but not in the pulmonary vasculature. We tested this hypothesis in chronically infected rat lungs produced using a well-described method of intratracheal inoculation of </span><em data-dcnode-id="7308"><span data-dcnode-id="7309" instrument_node="">Pseudomonas aeruginosa</span></em><span data-dcnode-id="7307" instrument_node=""> organisms that have been incorporated into agar beads. To obtain estimates of the absolute dimensions of maximally dilated, intra-acinar resistance vessels, we used quantitative stereological techniques (</span><a aria-expanded="false" aria-haspopup="true" class="bibr popnode tag_hotlink tag_tooltip" data-dcnode-id="7305" href="#b59" id="__tag_124928625" rid="b59" role="button"><span data-dcnode-id="7306" instrument_node="">Hopkins et al. 2001</span></a><span data-dcnode-id="7304" instrument_node="">). These demonstrated that chronic infection did not cause a reduction in mean lumen radius although wall thickness was increased. Thus compensatory hypertrophy had occurred, which may account, at least in part, for the absence of increased pulmonary vascular resistance in such chronically infected lungs (</span><a aria-expanded="false" aria-haspopup="true" class="bibr popnode tag_hotlink tag_tooltip" data-dcnode-id="7302" href="#b13" id="__tag_124928574" rid="b13" role="button"><span data-dcnode-id="7303" instrument_node="">Cadogan et al. 1999</span></a><span data-dcnode-id="7301" instrument_node="">).</span></p><p data-dcnode-id="7284" id="__p27"><span data-dcnode-id="7299" instrument_node="">A second possible mechanism that might have prevented the development of pulmonary hypertension is that angiogenesis had occurred in the pulmonary circulation in response to chronic airway infection. To test this hypothesis, we determined total vessel length in the gas exchange (intra-acinar) region of the lung, excluding capillaries, and the number of vascular branch points in those vessels in chronically infected rat lungs. These vessels included the arterioles accompanying respiratory bronchioles, those running in the alveolar walls and all the intra-acinar venules; the diameter of such vessels is approximately 35–45 µm. We observed a substantial increase in total vessel length (</span><a class="fig-table-link figpopup" co-legend-rid="lgnd_fig04" data-dcnode-id="7296" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.ncbi.nlm.nih.gov/pmc/articles/PMC1570922/figure/fig04/" rid-figpopup="fig04" rid-ob="ob-fig04" target="figure"><span data-dcnode-id="7297"><span data-dcnode-id="7298" instrument_node="">Fig. 4</span></span></a><span data-dcnode-id="7295" instrument_node="">) and in the total number of branch-points (</span><a class="fig-table-link figpopup" co-legend-rid="lgnd_fig05" data-dcnode-id="7292" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.ncbi.nlm.nih.gov/pmc/articles/PMC1570922/figure/fig05/" rid-figpopup="fig05" rid-ob="ob-fig05" target="figure"><span data-dcnode-id="7293"><span data-dcnode-id="7294" instrument_node="">Fig. 5</span></span></a><span data-dcnode-id="7291" instrument_node="">) in the pulmonary circulation, suggesting that angiogenesis had occurred (</span><a aria-expanded="false" aria-haspopup="true" class="bibr popnode tag_hotlink tag_tooltip" data-dcnode-id="7289" href="#b59" id="__tag_124928595" rid="b59" role="button"><span data-dcnode-id="7290" instrument_node="">Hopkins et al. 2001</span></a><span data-dcnode-id="7288" instrument_node="">). In particular, the evidence of increased branching suggests that angiogenesis led to formation of new arteriolar and venular vessels in addition to the pre-existing pathways. In the systemic circulation, capillary angiogenesis is accompanied by formation of new arterial vessels, so-called arteriogenesis (</span><a aria-expanded="false" aria-haspopup="true" class="bibr popnode tag_hotlink tag_tooltip" data-dcnode-id="7286" href="#b14" id="__tag_124928491" rid="b14" role="button"><span data-dcnode-id="7287" instrument_node="">Carmeliet, 2000</span></a><span data-dcnode-id="7285" instrument_node="">). Our evidence suggests that a similar behaviour can occur in the pulmonary circulation and may contribute to the maintenance of a normal low pulmonary vascular resistance.</span></p><div class="fig iconblock whole_rhythm" co-legend-rid="lgnd_fig04" data-dcnode-id="7263" id="fig04"><a data-dcnode-id="7280" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.ncbi.nlm.nih.gov/pmc/articles/PMC1570922/figure/fig04/" rid-figpopup="fig04" rid-ob="ob-fig04" target="figure"></a><div class="figure" data-dcnode-id="7275" data-largeobj="" data-largeobj-link-rid="largeobj_idm139710742242864"><a data-dcnode-id="7279" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.ncbi.nlm.nih.gov/pmc/articles/PMC1570922/figure/fig04/" rid-figpopup="fig04" rid-ob="ob-fig04" target="figure"></a><a class="inline_block ts_canvas" data-dcnode-id="7276" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.ncbi.nlm.nih.gov/core/lw/2.0/html/tileshop_pmc/tileshop_pmc_inline.html%3Ftitle%3DClick%2520on%2520image%2520to%2520zoom%26p%3DPMC3%26id%3D1570922_joa0201-0335-f4.jpg" rel="noopener" target="tileshopwindow"><div class="ts_bar small" data-dcnode-id="7278" title="Click on image to zoom"></div><img alt="An external file that holds a picture, illustration, etc.
Object name is joa0201-0335-f4.jpg" class="tileshop" data-dcnode-id="7277" loading="lazy" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.ncbi.nlm.nih.gov/pmc/articles/PMC1570922/bin/joa0201-0335-f4.jpg&amp;raw" title="Click on image to zoom"></a></div><div class="largeobj-link align_right" data-dcnode-id="7272" id="largeobj_idm139710742242864" style="display: none;"><a data-dcnode-id="7273" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.ncbi.nlm.nih.gov/pmc/articles/PMC1570922/figure/fig04/%3Freport%3Dobjectonly" rel="noopener" target="object"><span data-dcnode-id="7274" instrument_node="">Open in a separate window</span></a></div><div class="icnblk_cntnt" data-dcnode-id="7264" id="lgnd_fig04"><div data-dcnode-id="7269"><a class="figpopup" data-dcnode-id="7270" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.ncbi.nlm.nih.gov/pmc/articles/PMC1570922/figure/fig04/" rid-figpopup="fig04" rid-ob="ob-fig04" target="figure"><span data-dcnode-id="7271" instrument_node="">Fig. 4</span></a></div><div class="caption" data-dcnode-id="7265"><p data-dcnode-id="7266" id="__p36"><span data-dcnode-id="7267" instrument_node="">The mean (± SEM) total length of intra-acinar pulmonary blood vessels in the left lungs of normal control lungs (n = 8), lungs with chronic airway infection following inoculation with Pseudomonas aeruginosa in agar beads (n = 10), and lungs inoculated with sterile agar beads alone (n = 6). Asterisk indicates significant difference from noninoculated and placebo-inoculated groups (P &lt; 0.05, ANOVA). (Figure reproduced with permission from Hopkins et al. Journal of Applied Physiology, 91: 919–928, 2001.)</span></p></div></div></div><div class="fig iconblock whole_rhythm" co-legend-rid="lgnd_fig05" data-dcnode-id="7242" id="fig05"><a data-dcnode-id="7259" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.ncbi.nlm.nih.gov/pmc/articles/PMC1570922/figure/fig05/" rid-figpopup="fig05" rid-ob="ob-fig05" target="figure"></a><div class="figure" data-dcnode-id="7254" data-largeobj="" data-largeobj-link-rid="largeobj_idm139710742239296"><a data-dcnode-id="7258" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.ncbi.nlm.nih.gov/pmc/articles/PMC1570922/figure/fig05/" rid-figpopup="fig05" rid-ob="ob-fig05" target="figure"></a><a class="inline_block ts_canvas" data-dcnode-id="7255" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.ncbi.nlm.nih.gov/core/lw/2.0/html/tileshop_pmc/tileshop_pmc_inline.html%3Ftitle%3DClick%2520on%2520image%2520to%2520zoom%26p%3DPMC3%26id%3D1570922_joa0201-0335-f5.jpg" rel="noopener" target="tileshopwindow"><div class="ts_bar small" data-dcnode-id="7257" title="Click on image to zoom"></div><img alt="An external file that holds a picture, illustration, etc.
Object name is joa0201-0335-f5.jpg" class="tileshop" data-dcnode-id="7256" loading="lazy" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.ncbi.nlm.nih.gov/pmc/articles/PMC1570922/bin/joa0201-0335-f5.jpg&amp;raw" title="Click on image to zoom"></a></div><div class="largeobj-link align_right" data-dcnode-id="7251" id="largeobj_idm139710742239296" style="display: none;"><a data-dcnode-id="7252" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.ncbi.nlm.nih.gov/pmc/articles/PMC1570922/figure/fig05/%3Freport%3Dobjectonly" rel="noopener" target="object"><span data-dcnode-id="7253" instrument_node="">Open in a separate window</span></a></div><div class="icnblk_cntnt" data-dcnode-id="7243" id="lgnd_fig05"><div data-dcnode-id="7248"><a class="figpopup" data-dcnode-id="7249" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.ncbi.nlm.nih.gov/pmc/articles/PMC1570922/figure/fig05/" rid-figpopup="fig05" rid-ob="ob-fig05" target="figure"><span data-dcnode-id="7250" instrument_node="">Fig. 5</span></a></div><div class="caption" data-dcnode-id="7244"><p data-dcnode-id="7245" id="__p37"><span data-dcnode-id="7246" instrument_node="">The mean (± SEM) number of branch-points of intraacinar pulmonary blood vessels in the left lungs of control rats (n = 8), lungs with chronic airway infection following inoculation with Pseudomonas aeruginosa in agar beads (n = 10), and lungs inoculated with sterile agar beads alone (n = 6). Asterisk indicates significant difference from noninoculated and placebo-inoculated groups (P &lt; 0.05, ANOVA). (Figure reproduced with permission from Hopkins et al. Journal of Applied Physiology, 91: 919–928, 2001.)</span></p></div></div></div><p data-dcnode-id="7219" id="__p28"><span data-dcnode-id="7241" instrument_node="">More recent evidence supports our findings of new vessel formation in the pulmonary circulation. </span><a aria-expanded="false" aria-haspopup="true" class="bibr popnode tag_hotlink tag_tooltip" data-dcnode-id="7239" href="#b60" id="__tag_124928601" rid="b60" role="button"><span data-dcnode-id="7240" instrument_node="">Hsia et al. (1994)</span></a><span data-dcnode-id="7238" instrument_node=""> have shown that in adult dogs following right pneumonectomy there is proliferation of new alveolar septa and alveolar capillaries in the residual left lung. Other reports demonstrate that endothelial cells of the pulmonary circulation can replicate in a variety of circumstances. Following pneumonectomy, the total number of endothelial cells in the remaining lung increases significantly in rats (</span><a aria-expanded="false" aria-haspopup="true" class="bibr popnode tag_hotlink tag_tooltip" data-dcnode-id="7236" href="#b140" id="__tag_124928498" rid="b140" role="button"><span data-dcnode-id="7237" instrument_node="">Thet &amp; Law, 1984</span></a><span data-dcnode-id="7235" instrument_node="">). </span><a aria-expanded="false" aria-haspopup="true" class="bibr popnode tag_hotlink tag_tooltip" data-dcnode-id="7233" href="#b126" id="__tag_124928607" rid="b126" role="button"><span data-dcnode-id="7234" instrument_node="">Sekhon et al. (1994)</span></a><span data-dcnode-id="7232" instrument_node=""> have shown that airway inflammation caused by cigarette smoke stimulated endothelial cell proliferation in the lung as demonstrated by labelling of endothelial cell nuclei with bromodeoxyuridine. Endothelial cell proliferation in the pulmonary circulation has also been observed during the development of monocrotaline-induced pulmonary hypertension in rats (</span><a aria-expanded="false" aria-haspopup="true" class="bibr popnode tag_hotlink tag_tooltip" data-dcnode-id="7230" href="#b92" id="__tag_124928519" rid="b92" role="button"><span data-dcnode-id="7231" instrument_node="">Meyrick &amp; Reid, 1982</span></a><span data-dcnode-id="7229" instrument_node="">). </span><a aria-expanded="false" aria-haspopup="true" class="bibr popnode tag_hotlink tag_tooltip" data-dcnode-id="7227" href="#b125" id="__tag_124928545" rid="b125" role="button"><span data-dcnode-id="7228" instrument_node="">Schraufnagel et al. (1997)</span></a><span data-dcnode-id="7226" instrument_node=""> have reported evidence of pulmonary angiogensis in rat lung following the induction of biliary cirrhosis. Studies in humans with lung disease have also provided evidence of angiogenesis in the pulmonary circulation. </span><a aria-expanded="false" aria-haspopup="true" class="bibr popnode tag_hotlink tag_tooltip" data-dcnode-id="7224" href="#b124" id="__tag_124928473" rid="b124" role="button"><span data-dcnode-id="7225" instrument_node="">Schraufnagel et al. (1996)</span></a><span data-dcnode-id="7223" instrument_node="">, using scanning electron microscopic techniques, found evidence of new vessel formation in the lungs of a patient with pulmonary veno-occlusive disease. In addition, it has been demonstrated radiologically that the majority of metastatic tumours in the lung receive their blood supply either exclusively (46% of metastases) or predominantly (36% of metastases) from the pulmonary circulation (</span><a aria-expanded="false" aria-haspopup="true" class="bibr popnode tag_hotlink tag_tooltip" data-dcnode-id="7221" href="#b96" id="__tag_124928567" rid="b96" role="button"><span data-dcnode-id="7222" instrument_node="">Milne &amp; Zerhouni, 1987</span></a><span data-dcnode-id="7220" instrument_node="">). Taken together, these reports suggest that pulmonary endothelial cells can proliferate and form new vessels in the adult lung.</span></p><p class="p p-last" data-dcnode-id="7214" id="__p29"><span data-dcnode-id="7218" instrument_node="">The role played by vascular remodelling in the development of pulmonary hypertension in chronic lung infection is complex. Our data suggest that, under certain conditions, wall remodelling may be not result in reduction of the mean lumen diameter (</span><a aria-expanded="false" aria-haspopup="true" class="bibr popnode tag_hotlink tag_tooltip" data-dcnode-id="7216" href="#b59" id="__tag_124928501" rid="b59" role="button"><span data-dcnode-id="7217" instrument_node="">Hopkins et al. 2001</span></a><span data-dcnode-id="7215" instrument_node="">). Furthermore, the addition of parallel vascular pathways through the lungs may serve to oppose any increase in total pulmonary vascular resistance that might result from reductions in vascular lumen diameter in some vessels. If these two processes occur together, vascular resistance may not increase despite thickening of the vessel wall. However, in other circumstances, such as more persistent or more severe lung disease, remodelling of the vascular wall, including the wall of newly formed vessels, might lead to significant reductions in mean lumen diameter. Under such conditions, the increase in resistance caused by narrowed vessels might outweigh the extent to which new vessel formation could reduce resistance and the net effect might then become an increase in total pulmonary vascular resistance.</span></p></div><div class="tsec sec" data-dcnode-id="7179" id="__sec9"><div class="goto jig-ncbiinpagenav-goto-container" data-dcnode-id="7210"><a aria-expanded="false" aria-haspopup="true" class="tgt_dark page-toc-label jig-ncbiinpagenav-goto-heading" data-dcnode-id="7211" href="#" role="button" title="Go to other sections in this page"><span data-dcnode-id="7212" instrument_node="">Go to:</span></a></div><h2 class="head no_bottom_margin ui-helper-clearfix" data-dcnode-id="7208" id="__sec9title"><span data-dcnode-id="7209" instrument_node="">Quantification of vascular structure in the lung</span></h2><p class="p p-first" data-dcnode-id="7191" id="__p30"><span data-dcnode-id="7207" instrument_node="">It is clear that there are directly conflicting reports regarding rarefaction and angiogenesis in the pulmonary circulation in a variety of circumstances. The possibility that these apparent discrepancies might arise because of methodological problems is worthy of consideration. The normal lung is a highly vascular structure with a vast vascular network, which is required to provide adequate surface area for gas exchange. Given the extent of the normal vasculature when compared with other organs, it is extremely difficult to detect newly formed blood vessels in the lung. This problem has been reviewed and commented upon previously (</span><a aria-expanded="false" aria-haspopup="true" class="bibr popnode tag_hotlink tag_tooltip" data-dcnode-id="7205" href="#b98" id="__tag_124928651" rid="b98" role="button"><span data-dcnode-id="7206" instrument_node="">Mooi &amp; Wagenvoort, 1983</span></a><span data-dcnode-id="7204" instrument_node="">; </span><a aria-expanded="false" aria-haspopup="true" class="bibr popnode tag_hotlink tag_tooltip" data-dcnode-id="7202" href="#b124" id="__tag_124928490" rid="b124" role="button"><span data-dcnode-id="7203" instrument_node="">Schraufnagel et al. 1996</span></a><span data-dcnode-id="7201" instrument_node="">). In view of this, it is interesting to note that those studies that have clearly demonstrated angiogenesis in the pulmonary circulation have used the techniques of quantitative stereology (</span><a aria-expanded="false" aria-haspopup="true" class="bibr popnode tag_hotlink tag_tooltip" data-dcnode-id="7199" href="#b140" id="__tag_124928494" rid="b140" role="button"><span data-dcnode-id="7200" instrument_node="">Thet &amp; Law, 1984</span></a><span data-dcnode-id="7198" instrument_node="">; </span><a aria-expanded="false" aria-haspopup="true" class="bibr popnode tag_hotlink tag_tooltip" data-dcnode-id="7196" href="#b60" id="__tag_124928492" rid="b60" role="button"><span data-dcnode-id="7197" instrument_node="">Hsia et al. 1994</span></a><span data-dcnode-id="7195" instrument_node="">; </span><a aria-expanded="false" aria-haspopup="true" class="bibr popnode tag_hotlink tag_tooltip" data-dcnode-id="7193" href="#b59" id="__tag_124928496" rid="b59" role="button"><span data-dcnode-id="7194" instrument_node="">Hopkins et al. 2001</span></a><span data-dcnode-id="7192" instrument_node="">). Stereology allows statistical inferences about the three-dimensional structural parameters of objects based on two-dimensional information such as that provided by histological images. In addition, by using strict random sampling protocols, stereological approaches ensure that the data obtained are unbiased and representative of the whole lung. A further feature of stereology is that it carefully defines and quantifies a reference volume within which a particular parameter is to be measured. This step allows absolute quantities to be measured, e.g. the total length of intra-acinar resistance vessels in the lung.</span></p><p class="p p-last" data-dcnode-id="7180" id="__p31"><span data-dcnode-id="7190" instrument_node="">The task of identifying angiogenesis provides an example of the importance of these issues. Angiogenesis in the lung would increase the total length of vessels in the lung. If the lung increased in volume during the course of our experimental intervention (e.g. hypoxia), but the length of vessel per unit volume of lung were to remain constant, then the number of vessel transections per unit area of cross-section would remain constant, i.e. the number of vessels observed per microscopic field of view would be unaltered. A conventional approach such as this would conclude that no angiogenesis had taken place. However, a stereological approach, by recognizing the altered reference volume (total lung volume), would identify the increase in total vessel length (</span><a aria-expanded="false" aria-haspopup="true" class="bibr popnode tag_hotlink tag_tooltip" data-dcnode-id="7188" href="#b9" id="__tag_124928469" rid="b9" role="button"><span data-dcnode-id="7189" instrument_node="">Bolender et al. 1993</span></a><span data-dcnode-id="7187" instrument_node="">; </span><a aria-expanded="false" aria-haspopup="true" class="bibr popnode tag_hotlink tag_tooltip" data-dcnode-id="7185" href="#b42" id="__tag_124928539" rid="b42" role="button"><span data-dcnode-id="7186" instrument_node="">Gundersen et al. 1988a</span></a><span data-dcnode-id="7184" instrument_node="">, </span><a aria-expanded="false" aria-haspopup="true" class="bibr popnode tag_hotlink tag_tooltip" data-dcnode-id="7182" href="#b43" id="__tag_124928616" rid="b43" role="button"><span data-dcnode-id="7183" instrument_node="">b</span></a><span data-dcnode-id="7181" instrument_node="">). Use of inappropriate or undefined reference spaces can lead to significant errors. For example, an increased ratio of wall thickness to lumen diameter in a vessel might arise either because lumen diameter had reduced, or because wall thickness had increased without change in the lumen size. This implies that changes in this ratio do not allow any direct inference to be made about changes in vascular resistance.</span></p></div><div class="tsec sec" data-dcnode-id="7171" id="__sec10"><div class="goto jig-ncbiinpagenav-goto-container" data-dcnode-id="7176"><a aria-expanded="false" aria-haspopup="true" class="tgt_dark page-toc-label jig-ncbiinpagenav-goto-heading" data-dcnode-id="7177" href="#" role="button" title="Go to other sections in this page"><span data-dcnode-id="7178" instrument_node="">Go to:</span></a></div><h2 class="head no_bottom_margin ui-helper-clearfix" data-dcnode-id="7174" id="__sec10title"><span data-dcnode-id="7175" instrument_node="">Conclusions</span></h2><p class="p p-first-last" data-dcnode-id="7172" id="__p32"><span data-dcnode-id="7173" instrument_node="">Standard teaching suggests that secondary pulmonary hypertension results, in large part, from two major structural alterations in the pulmonary circulation. The first is thickening of the walls of resistance vessels that causes a reduction of the vascular lumen. The second structural alteration is a reduction in the total number of pulmonary vessels or rarefaction. Recent evidence demonstrates that vascular wall thickening can occur without structural alteration in lumen diameter. Furthermore, angiogenesis can occur in the pulmonary circulation and may serve to prevent or attenuate increased vascular resistance in lung disease. Quantitative stereological approaches are required to allow determination of the three-dimensional parameters that characterize this vascular bed. In view of these more recent data, the potential role of structural alterations in the pulmonary vasculature in the development of pulmonary hypertension should be carefully reconsidered.</span></p></div><div class="tsec sec" data-dcnode-id="4137" id="ref-list-1"><div class="goto jig-ncbiinpagenav-goto-container" data-dcnode-id="7168"><a aria-expanded="false" aria-haspopup="true" class="tgt_dark page-toc-label jig-ncbiinpagenav-goto-heading" data-dcnode-id="7169" href="#" role="button" title="Go to other sections in this page"><span data-dcnode-id="7170" instrument_node="">Go to:</span></a></div><h2 class="head no_bottom_margin ui-helper-clearfix" data-dcnode-id="7166" id="ref-list-1title"><span data-dcnode-id="7167" instrument_node="">References</span></h2><div class="ref-list-sec sec" data-dcnode-id="4138" id="reference-list"><ul class="first-line-outdent" data-dcnode-id="4139"><li data-dcnode-id="7141" id="b1"><span class="citation" data-dcnode-id="7142"><span data-dcnode-id="7165" instrument_node="">Adnot S, Raffestin B, Eddahibi S, Braquet P, Chabrier PE. Loss of endothelium-dependent relaxant activity in the pulmonary circulation of rats exposed to chronic hypoxia. </span><span data-dcnode-id="7158"><span class="ref-journal" data-dcnode-id="7163"><span data-dcnode-id="7164" instrument_node="">J. Clin. Invest. </span></span><span data-dcnode-id="7162" instrument_node="">1991;</span><span class="ref-vol" data-dcnode-id="7160"><span data-dcnode-id="7161" instrument_node="">87</span></span><span data-dcnode-id="7159" instrument_node="">:155–162.</span></span><span da
