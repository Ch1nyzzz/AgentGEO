/chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.ncbi.nlm.nih.gov/pubmed/12430958"><span data-dcnode-id="8195" instrument_node="">12430958</span></a></div></div></div><h1 class="content-title" data-dcnode-id="8189"><span data-dcnode-id="8190" instrument_node="">The structural basis of pulmonary hypertension in chronic lung disease: remodelling, rarefaction or angiogenesis?</span></h1><div class="half_rhythm" data-dcnode-id="8181"><div class="contrib-group fm-author" data-dcnode-id="8183"><a data-dcnode-id="8187" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.ncbi.nlm.nih.gov/pubmed/%3Fterm%3DHopkins%2520N%255BAuthor%255D%26cauthor%3Dtrue%26cauthor_uid%3D12430958"><span data-dcnode-id="8188" instrument_node="">Natalie Hopkins</span></a><span data-dcnode-id="8186" instrument_node=""> and  </span><a data-dcnode-id="8184" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.ncbi.nlm.nih.gov/pubmed/%3Fterm%3DMcLoughlin%2520P%255BAuthor%255D%26cauthor%3Dtrue%26cauthor_uid%3D12430958"><span data-dcnode-id="8185" instrument_node="">Paul McLoughlin</span></a></div><div class="contrib-group aff-tip" data-dcnode-id="8182" style="display:none"></div></div><div class="half_rhythm" data-dcnode-id="8151"><div class="togglers fm-copyright-license" data-dcnode-id="8169"><a class="pmctoggle" data-dcnode-id="8179" href="#" rid="idm139710778222880_ai"><span data-dcnode-id="8180" instrument_node="">Author information</span></a><span data-dcnode-id="8178" instrument_node=""> </span><a class="pmctoggle" data-dcnode-id="8176" href="#" rid="idm139710778222880_an"><span data-dcnode-id="8177" instrument_node="">Article notes</span></a><span data-dcnode-id="8175" instrument_node=""> </span><a class="pmctoggle" data-dcnode-id="8173" href="#" rid="idm139710778222880_cpl"><span data-dcnode-id="8174" instrument_node="">Copyright and License information</span></a><span data-dcnode-id="8172" instrument_node=""> </span><a data-dcnode-id="8170" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.ncbi.nlm.nih.gov/pmc/about/disclaimer/" style="margin-left: 1em"><span data-dcnode-id="8171" instrument_node="">Disclaimer</span></a></div><div class="fm-authors-info hide half_rhythm" data-dcnode-id="8160" id="idm139710778222880_ai" style="display:none"><div class="fm-affl" data-dcnode-id="8167" id="aff-1" lang="en"><span data-dcnode-id="8168" instrument_node="">Department of Human Anatomy and Physiology, Conway Institute of Biomolecular and Biomedical Research and Dublin Molecular Medicine Centre, University College, Earlsfort Terrace, Dublin 2, Ireland</span></div><div data-dcnode-id="8161" id="cor1"><em data-dcnode-id="8165"><span data-dcnode-id="8166" instrument_node="">Correspondence</span></em><span data-dcnode-id="8164" instrument_node=""> Professor P. McLoughlin, Department of Human Anatomy and Physiology, Conway Institute of Biomolecular and Biomedical Research, University College, Earlsfort Terrace, Dublin 2, Ireland. Tel. 353 1 716 7310; fax: 353 1 716 7417; e-mail: </span><a class="oemail" data-dcnode-id="8162" data-email=".e.i.dcu@nilhguolcm.luap" href="mailto:dev@null"><span data-dcnode-id="8163" instrument_node="">.e.i.dcu@nilhguolcm.luap</span></a></div></div><div class="fm-article-notes hide half_rhythm" data-dcnode-id="8157" id="idm139710778222880_an" style="display:none"><div class="fm-pubdate half_rhythm" data-dcnode-id="8158"><span data-dcnode-id="8159" instrument_node="">Accepted 2002 Jul 30.</span></div></div><div class="permissions half_rhythm hide" data-dcnode-id="8152" id="idm139710778222880_cpl" style="display:none"><div class="fm-copyright half_rhythm" data-dcnode-id="8153"><a data-dcnode-id="8155" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.ncbi.nlm.nih.gov/pmc/about/copyright/"><span data-dcnode-id="8156" instrument_node="">Copyright</span></a><span data-dcnode-id="8154" instrument_node=""> © Anatomical Society of Great Britain and Ireland 2002</span></div></div></div><div aria-label="Related or updated information about this article." class="links-box whole_rhythm" data-dcnode-id="8145" id="pmclinksbox" role="complementary"><div data-dcnode-id="8146"><span data-dcnode-id="8150" instrument_node="">This article has been </span><a data-dcnode-id="8148" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.ncbi.nlm.nih.gov/pmc/articles/PMC1570922/citedby/"><span data-dcnode-id="8149" instrument_node="">cited by</span></a><span data-dcnode-id="8147" instrument_node=""> other articles in PMC.</span></div></div></div><div class="sec" data-dcnode-id="8143"></div><div class="tsec sec" data-dcnode-id="8127" id="abstract-1" lang="en"><div class="goto jig-ncbiinpagenav-goto-container" data-dcnode-id="8139"><span data-dcnode-id="8140" role="menubar"><a aria-expanded="false" aria-haspopup="true" class="tgt_dark page-toc-label jig-ncbiinpagenav-goto-heading" data-dcnode-id="8141" href="#" role="menuitem" title="Go to other sections in this page"><span data-dcnode-id="8142" instrument_node="">Go to:</span></a></span></div><h2 class="head no_bottom_margin ui-helper-clearfix" data-dcnode-id="8137" id="abstract-1title"><span data-dcnode-id="8138" instrument_node="">Abstract</span></h2><div data-dcnode-id="8133"><p class="p p-first-last" data-dcnode-id="8134" id="__p1"><span data-dcnode-id="8135" instrument_node="">Chronic lung disease in humans is frequently complicated by the development of secondary pulmonary hypertension, which is associated with increased morbidity and mortality. Hypoxia, inflammation and increased shear stress are the primary stimuli although the exact pathways through which these initiating events lead to pulmonary hypertension remain to be completely elucidated. The increase in pulmonary vascular resistance is attributed, in part, to remodelling of the walls of resistance vessels. This consists of intimal, medial and adventitial hypertrophy, which can lead to encroachment into and reduction of the vascular lumen. In addition, it has been reported that there is a reduction in the number of blood vessels in the hypertensive lung, which could also contribute to increased vascular resistance. The pulmonary endothelium plays a key role in mediating and modulating these changes. These structural alterations in the pulmonary vasculature contrast sharply with the responses of the systemic vasculature to the same stimuli. In systemic organs, both hypoxia and inflammation cause angiogenesis. Furthermore, remodelling of the walls of resistance vessels is not observed in these conditions. Thus it has been generally stated that, in the adult pulmonary circulation, angiogenesis does not occur. Prompted by previous observations that chronic airway inflammation can lead to pulmonary vascular remodelling without hypertension, we have recently shown, using quantitative stereological techniques, that angiogenesis can occur in the adult pulmonary circulation. Pulmonary angiogenesis has also been reported in some other conditions including post-pneumonectomy lung growth, metastatic disease of the lung and in biliary cirrhosis. Such angiogenesis may serve to prevent or attenuate increased vascular resistance in lung disease. In view of these more recent data, the role of structural alterations in the pulmonary vasculature in the development of pulmonary hypertension should be carefully reconsidered.</span></p></div><div class="sec" data-dcnode-id="8128"><strong class="kwd-title" data-dcnode-id="8131"><span data-dcnode-id="8132" instrument_node="">Keywords: </span></strong><span class="kwd-text" data-dcnode-id="8129"><span data-dcnode-id="8130" instrument_node="">angiogenesis, chronic inflammation, endothelium, hypoxia, nitric oxide, pulmonary hypetension, remodelling</span></span></div></div><div class="tsec sec" data-dcnode-id="8076" id="__sec1"><div class="goto jig-ncbiinpagenav-goto-container" data-dcnode-id="8124"><a aria-expanded="false" aria-haspopup="true" class="tgt_dark page-toc-label jig-ncbiinpagenav-goto-heading" data-dcnode-id="8125" href="#" role="button" title="Go to other sections in this page"><span data-dcnode-id="8126" instrument_node="">Go to:</span></a></div><h2 class="head no_bottom_margin ui-helper-clearfix" data-dcnode-id="8122" id="__sec1title"><span data-dcnode-id="8123" instrument_node="">Introduction</span></h2><p class="p p-first" data-dcnode-id="8102" id="__p2"><span data-dcnode-id="8121" instrument_node="">Sustained pulmonary hypertension is a common complication of chronic lung diseases including chronic obstructive pulmonary disease, cystic fibrosis and bronchiectasis. Particularly in the presence of hypoxaemia, such secondary pulmonary hypertension is strongly associated with increased morbidity and reduced survival (</span><a aria-expanded="false" aria-haspopup="true" class="bibr popnode tag_hotlink tag_tooltip" data-dcnode-id="8119" href="#b127" id="__tag_124928627" rid="b127" role="button"><span data-dcnode-id="8120" instrument_node="">Semmens &amp; Reid, 1974</span></a><span data-dcnode-id="8118" instrument_node="">; </span><a aria-expanded="false" aria-haspopup="true" class="bibr popnode tag_hotlink tag_tooltip" data-dcnode-id="8116" href="#b120" id="__tag_124928613" rid="b120" role="button"><span data-dcnode-id="8117" instrument_node="">Ryland &amp; Reid, 1975</span></a><span data-dcnode-id="8115" instrument_node="">; </span><a aria-expanded="false" aria-haspopup="true" class="bibr popnode tag_hotlink tag_tooltip" data-dcnode-id="8113" href="#b78" id="__tag_124928497" rid="b78" role="button"><span data-dcnode-id="8114" instrument_node="">MacNee, 1994a</span></a><span data-dcnode-id="8112" instrument_node="">, </span><a aria-expanded="false" aria-haspopup="true" class="bibr popnode tag_hotlink tag_tooltip" data-dcnode-id="8110" href="#b79" id="__tag_124928582" rid="b79" role="button"><span data-dcnode-id="8111" instrument_node="">b</span></a><span data-dcnode-id="8109" instrument_node="">). Furthermore, the presence of cor pulmonale in these conditions is an independent predictor of increased mortality (</span><a aria-expanded="false" aria-haspopup="true" class="bibr popnode tag_hotlink tag_tooltip" data-dcnode-id="8107" href="#b61" id="__tag_124928561" rid="b61" role="button"><span data-dcnode-id="8108" instrument_node="">Incalzi et al. 1999</span></a><span data-dcnode-id="8106" instrument_node="">; </span><a aria-expanded="false" aria-haspopup="true" class="bibr popnode tag_hotlink tag_tooltip" data-dcnode-id="8104" href="#b129" id="__tag_124928523" rid="b129" role="button"><span data-dcnode-id="8105" instrument_node="">Skwarski et al. 1991</span></a><span data-dcnode-id="8103" instrument_node="">), suggesting that pulmonary hypertension contributes directly to increased mortality.</span></p><p data-dcnode-id="8079" id="__p3"><span data-dcnode-id="8101" instrument_node="">The poor prognosis observed in untreated primary pulmonary hypertension supports the view that secondary pulmonary hypertension increases mortality. Primary pulmonary hypertension is a syndrome characterized by chronically increased pulmonary vascular resistance in the absence of a known cause, which, if untreated, usually leads to death within four years (</span><a aria-expanded="false" aria-haspopup="true" class="bibr popnode tag_hotlink tag_tooltip" data-dcnode-id="8099" href="#b118" id="__tag_124928527" rid="b118" role="button"><span data-dcnode-id="8100" instrument_node="">Rubin, 1997</span></a><span data-dcnode-id="8098" instrument_node="">; </span><a aria-expanded="false" aria-haspopup="true" class="bibr popnode tag_hotlink tag_tooltip" data-dcnode-id="8096" href="#b48" id="__tag_124928572" rid="b48" role="button"><span data-dcnode-id="8097" instrument_node="">Haworth, 1998</span></a><span data-dcnode-id="8095" instrument_node="">; </span><a aria-expanded="false" aria-haspopup="true" class="bibr popnode tag_hotlink tag_tooltip" data-dcnode-id="8093" href="#b2" id="__tag_124928558" rid="b2" role="button"><span data-dcnode-id="8094" instrument_node="">Archer &amp; Rich, 2000</span></a><span data-dcnode-id="8092" instrument_node="">). Furthermore, successful treatment, which reduces pulmonary arterial pressure and vascular resistance, leads to long-term survival (</span><a aria-expanded="false" aria-haspopup="true" class="bibr popnode tag_hotlink tag_tooltip" data-dcnode-id="8090" href="#b2" id="__tag_124928538" rid="b2" role="button"><span data-dcnode-id="8091" instrument_node="">Archer &amp; Rich, 2000</span></a><span data-dcnode-id="8089" instrument_node="">; </span><a aria-expanded="false" aria-haspopup="true" class="bibr popnode tag_hotlink tag_tooltip" data-dcnode-id="8087" href="#b6" id="__tag_124928502" rid="b6" role="button"><span data-dcnode-id="8088" instrument_node="">Barst et al. 1996</span></a><span data-dcnode-id="8086" instrument_node="">; </span><a aria-expanded="false" aria-haspopup="true" class="bibr popnode tag_hotlink tag_tooltip" data-dcnode-id="8084" href="#b118" id="__tag_124928632" rid="b118" role="button"><span data-dcnode-id="8085" instrument_node="">Rubin, 1997</span></a><span data-dcnode-id="8083" instrument_node="">). These findings demonstrate that pulmonary hypertension </span><em data-dcnode-id="8081"><span data-dcnode-id="8082" instrument_node="">per se</span></em><span data-dcnode-id="8080" instrument_node=""> can shorten life.</span></p><p class="p p-last" data-dcnode-id="8077" id="__p4"><span data-dcnode-id="8078" instrument_node="">Taken together, this evidence suggests that secondary pulmonary hypertension contributes directly to premature mortality in human lung and cardiac diseases and causes substantial added morbidity. Because of this, intensive research efforts are focused on investigating the underlying mechanisms of this condition in order to identify potential novel therapeutic interventions.</span></p></div><div class="tsec sec" data-dcnode-id="7958" id="__sec2"><div class="goto jig-ncbiinpagenav-goto-container" data-dcnode-id="8073"><a aria-expanded="false" aria-haspopup="true" class="tgt_dark page-toc-label jig-ncbiinpagenav-goto-heading" data-dcnode-id="8074" href="#" role="button" title="Go to other sections in this page"><span data-dcnode-id="8075" instrument_node="">Go to:</span></a></div><h2 class="head no_bottom_margin ui-helper-clearfix" data-dcnode-id="8071" id="__sec2title"><span data-dcnode-id="8072" instrument_node="">Altered vascular structure in pulmonary hypertension</span></h2><p class="p p-first" data-dcnode-id="8063" id="__p5"><span data-dcnode-id="8070" instrument_node="">Secondary pulmonary hypertension results from sustained vasoconstriction and structural alterations to the pulmonary vascular bed. The major stimuli that are responsible for these changes are chronic alveolar hypoxia, chronic inflammation and excessive shear stress (</span><a aria-expanded="false" aria-haspopup="true" class="bibr popnode tag_hotlink tag_tooltip" data-dcnode-id="8068" href="#b145" id="__tag_124928652" rid="b145" role="button"><span data-dcnode-id="8069" instrument_node="">Voelkel &amp; Tuder, 1995</span></a><span data-dcnode-id="8067" instrument_node="">). Most commonly, these stimuli act together to produce increased pulmonary vascular resistance (</span><a aria-expanded="false" aria-haspopup="true" class="bibr popnode tag_hotlink tag_tooltip" data-dcnode-id="8065" href="#b145" id="__tag_124928507" rid="b145" role="button"><span data-dcnode-id="8066" instrument_node="">Voelkel &amp; Tuder, 1995</span></a><span data-dcnode-id="8064" instrument_node="">). Regardless of the stimuli that cause pulmonary hypertension, the structural changes that are thought to underlie the increased vascular resistance can be broadly classified into two processes: first, remodelling of the pulmonary resistance vessels and, second, a reduction in the total number of blood vessels in the lung, sometimes termed rarefaction or pruning.</span></p><p data-dcnode-id="8027" id="__p6"><span data-dcnode-id="8062" instrument_node="">Remodelling is a process that causes thickening of the arterial walls and is thought to increase resistance by causing the vessel walls to encroach into the lumen and reduce its diameter. A prominent feature of vascular remodelling is medial thickening, a change that is of particular interest because of the ability of medial smooth muscle to alter lumen size by contraction and relaxation. In previously muscularized, more proximal pulmonary vessels, medial enlargement is caused by hypertrophy and hyperplasia of the pre-existing vascular smooth muscle cells (</span><a aria-expanded="false" aria-haspopup="true" class="bibr popnode tag_hotlink tag_tooltip" data-dcnode-id="8060" href="#b88" id="__tag_124928472" rid="b88" role="button"><span data-dcnode-id="8061" instrument_node="">Meyrick &amp; Reid, 1978</span></a><span data-dcnode-id="8059" instrument_node="">, </span><a aria-expanded="false" aria-haspopup="true" class="bibr popnode tag_hotlink tag_tooltip" data-dcnode-id="8057" href="#b89" id="__tag_124928606" rid="b89" role="button"><span data-dcnode-id="8058" instrument_node="">1979a</span></a><span data-dcnode-id="8056" instrument_node="">; </span><a aria-expanded="false" aria-haspopup="true" class="bibr popnode tag_hotlink tag_tooltip" data-dcnode-id="8054" href="#b91" id="__tag_124928563" rid="b91" role="button"><span data-dcnode-id="8055" instrument_node="">Meyrick et al. 1980</span></a><span data-dcnode-id="8053" instrument_node="">; </span><a aria-expanded="false" aria-haspopup="true" class="bibr popnode tag_hotlink tag_tooltip" data-dcnode-id="8051" href="#b87" id="__tag_124928641" rid="b87" role="button"><span data-dcnode-id="8052" instrument_node="">Meyrick &amp; Brigham, 1986</span></a><span data-dcnode-id="8050" instrument_node="">). In addition, the smooth muscle cells elaborate extracellular matrix proteins, which also contribute to medial enlargement (</span><a aria-expanded="false" aria-haspopup="true" class="bibr popnode tag_hotlink tag_tooltip" data-dcnode-id="8048" href="#b106" id="__tag_124928586" rid="b106" role="button"><span data-dcnode-id="8049" instrument_node="">Poiani et al. 1990</span></a><span data-dcnode-id="8047" instrument_node="">). In previously non-muscular precapillary arterioles, the </span><em data-dcnode-id="8045"><span data-dcnode-id="8046" instrument_node="">de novo</span></em><span data-dcnode-id="8044" instrument_node=""> development of a muscular media is observed. The smooth muscle cells, which form this new media, are derived by differentiation of intermediate cells that are present in the normal walls of these vessels (</span><a aria-expanded="false" aria-haspopup="true" class="bibr popnode tag_hotlink tag_tooltip" data-dcnode-id="8042" href="#b88" id="__tag_124928493" rid="b88" role="button"><span data-dcnode-id="8043" instrument_node="">Meyrick &amp; Reid, 1978</span></a><span data-dcnode-id="8041" instrument_node="">; </span><a aria-expanded="false" aria-haspopup="true" class="bibr popnode tag_hotlink tag_tooltip" data-dcnode-id="8039" href="#b62" id="__tag_124928468" rid="b62" role="button"><span data-dcnode-id="8040" instrument_node="">Jones, 1992</span></a><span data-dcnode-id="8038" instrument_node="">). Smooth muscle cells are also formed by migration and differentiation of interstitial fibroblasts (</span><a aria-expanded="false" aria-haspopup="true" class="bibr popnode tag_hotlink tag_tooltip" data-dcnode-id="8036" href="#b62" id="__tag_124928597" rid="b62" role="button"><span data-dcnode-id="8037" instrument_node="">Jones, 1992</span></a><span data-dcnode-id="8035" instrument_node="">). A new internal elastic lamina is formed in these remodelled vessels so that their structure comes to resemble that of the resistance vessels of the systemic circulation (</span><a class="fig-table-link figpopup" co-legend-rid="lgnd_fig01" data-dcnode-id="8032" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.ncbi.nlm.nih.gov/pmc/articles/PMC1570922/figure/fig01/" rid-figpopup="fig01" rid-ob="ob-fig01" target="figure"><span data-dcnode-id="8033"><span data-dcnode-id="8034" instrument_node="">Fig. 1</span></span></a><span data-dcnode-id="8031" instrument_node="">). Adventitial hypertrophy is also a prominent feature of pulmonary hypertension. Resident fibroblasts proliferate and produce matrix proteins in response to hypoxia and chronic inflammation (</span><a aria-expanded="false" aria-haspopup="true" class="bibr popnode tag_hotlink tag_tooltip" data-dcnode-id="8029" href="#b90" id="__tag_124928610" rid="b90" role="button"><span data-dcnode-id="8030" instrument_node="">Meyrick &amp; Reid, 1979b</span></a><span data-dcnode-id="8028" instrument_node="">).</span></p><div class="fig iconblock whole_rhythm" co-legend-rid="lgnd_fig01" data-dcnode-id="8006" id="fig01"><a data-dcnode-id="8023" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.ncbi.nlm.nih.gov/pmc/articles/PMC1570922/figure/fig01/" rid-figpopup="fig01" rid-ob="ob-fig01" target="figure"></a><div class="figure" data-dcnode-id="8018" data-largeobj="" data-largeobj-link-rid="largeobj_idm139710742253424"><a data-dcnode-id="8022" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.ncbi.nlm.nih.gov/pmc/articles/PMC1570922/figure/fig01/" rid-figpopup="fig01" rid-ob="ob-fig01" target="figure"></a><a class="inline_block ts_canvas" data-dcnode-id="8019" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.ncbi.nlm.nih.gov/core/lw/2.0/html/tileshop_pmc/tileshop_pmc_inline.html%3Ftitle%3DClick%2520on%2520image%2520to%2520zoom%26p%3DPMC3%26id%3D1570922_joa0201-0335-f1.jpg" rel="noopener" target="tileshopwindow"><div class="ts_bar small" data-dcnode-id="8021" title="Click on image to zoom"></div><img alt="An external file that holds a picture, illustration, etc.
Object name is joa0201-0335-f1.jpg" class="tileshop" data-dcnode-id="8020" loading="lazy" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.ncbi.nlm.nih.gov/pmc/articles/PMC1570922/bin/joa0201-0335-f1.jpg&amp;raw" title="Click on image to zoom"></a></div><div class="largeobj-link align_right" data-dcnode-id="8015" id="largeobj_idm139710742253424" style="display: none;"><a data-dcnode-id="8016" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.ncbi.nlm.nih.gov/pmc/articles/PMC1570922/figure/fig01/%3Freport%3Dobjectonly" rel="noopener" target="object"><span data-dcnode-id="8017" instrument_node="">Open in a separate window</span></a></div><div class="icnblk_cntnt" data-dcnode-id="8007" id="lgnd_fig01"><div data-dcnode-id="8012"><a class="figpopup" data-dcnode-id="8013" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.ncbi.nlm.nih.gov/pmc/articles/PMC1570922/figure/fig01/" rid-figpopup="fig01" rid-ob="ob-fig01" target="figure"><span data-dcnode-id="8014" instrument_node="">Fig. 1</span></a></div><div class="caption" data-dcnode-id="8008"><p data-dcnode-id="8009" id="__p33"><span data-dcnode-id="8010" instrument_node="">Photomicrographs showing intra-acinar pulmonary blood vessels (v) from (a) a rat lung in which chronic airway infection had been induced by inoculation of Pseudomonas aeruginosa in agar beads, (b) lung inoculated with sterile agar beads alone, and (c) lung that had not been inoculated. Sections were stained with Miller's stain, which shows elastin as blue, and counter stained with haematoxylin to demonstrate nuclei. Note well-developed tunica media in chronically infected lungs with an internal and external elastic lamina, whereas no tunica media is seen and there is a single elastic lamina in non-inoculated lung and in lung inoculated with sterile agar beads. Scale bar = 40 μm in all panels. (Figure reproduced with permission from Hopkins et al. Journal of Applied Physiology, 91: 919–928, 2001.)</span></p></div></div></div><p class="p p-last" data-dcnode-id="7959" id="__p7"><span data-dcnode-id="8005" instrument_node="">Reduction in the total number of blood vessels in a vascular bed will increase vascular resistance by reducing the number of paralleled pathways through that circulation. Rarefaction of vessels in the pulmonary circulation has been reported in human subjects with pulmonary hypertension (</span><a aria-expanded="false" aria-haspopup="true" class="bibr popnode tag_hotlink tag_tooltip" data-dcnode-id="8003" href="#b120" id="__tag_124928504" rid="b120" role="button"><span data-dcnode-id="8004" instrument_node="">Ryland &amp; Reid, 1975</span></a><span data-dcnode-id="8002" instrument_node="">; </span><a aria-expanded="false" aria-haspopup="true" class="bibr popnode tag_hotlink tag_tooltip" data-dcnode-id="8000" href="#b108" id="__tag_124928516" rid="b108" role="button"><span data-dcnode-id="8001" instrument_node="">Rabinovitch et al. 1979</span></a><span data-dcnode-id="7999" instrument_node="">) and in animal models (</span><a aria-expanded="false" aria-haspopup="true" class="bibr popnode tag_hotlink tag_tooltip" data-dcnode-id="7997" href="#b57" id="__tag_124928478" rid="b57" role="button"><span data-dcnode-id="7998" instrument_node="">Hislop &amp; Reid, 1976</span></a><span data-dcnode-id="7996" instrument_node="">, </span><a aria-expanded="false" aria-haspopup="true" class="bibr popnode tag_hotlink tag_tooltip" data-dcnode-id="7994" href="#b58" id="__tag_124928647" rid="b58" role="button"><span data-dcnode-id="7995" instrument_node="">1977</span></a><span data-dcnode-id="7993" instrument_node="">; </span><a aria-expanded="false" aria-haspopup="true" class="bibr popnode tag_hotlink tag_tooltip" data-dcnode-id="7991" href="#b89" id="__tag_124928544" rid="b89" role="button"><span data-dcnode-id="7992" instrument_node="">Meyrick &amp; Reid, 1979a</span></a><span data-dcnode-id="7990" instrument_node="">; </span><a aria-expanded="false" aria-haspopup="true" class="bibr popnode tag_hotlink tag_tooltip" data-dcnode-id="7988" href="#b91" id="__tag_124928477" rid="b91" role="button"><span data-dcnode-id="7989" instrument_node="">Meyrick et al. 1980</span></a><span data-dcnode-id="7987" instrument_node="">; </span><a aria-expanded="false" aria-haspopup="true" class="bibr popnode tag_hotlink tag_tooltip" data-dcnode-id="7985" href="#b87" id="__tag_124928559" rid="b87" role="button"><span data-dcnode-id="7986" instrument_node="">Meyrick &amp; Brigham, 1986</span></a><span data-dcnode-id="7984" instrument_node="">; </span><a aria-expanded="false" aria-haspopup="true" class="bibr popnode" data-dcnode-id="7982" href="#b63" rid="b63" role="button"><span data-dcnode-id="7983" instrument_node="">Jones &amp; Reid, 1995</span></a><span data-dcnode-id="7981" instrument_node="">; </span><a aria-expanded="false" aria-haspopup="true" class="bibr popnode tag_hotlink tag_tooltip" data-dcnode-id="7979" href="#b103" id="__tag_124928467" rid="b103" role="button"><span data-dcnode-id="7980" instrument_node="">Partovian et al. 2000</span></a><span data-dcnode-id="7978" instrument_node="">). This loss of blood vessels has been detected as a reduction in the ratio of the number of blood vessels to the number of alveoli in the intra-acinar (gas exchange) regions of the lung. A similar process of blood vessel loss is well recognized in systemic hypertension and contributes significantly to increased peripheral vascular resistance (</span><a aria-expanded="false" aria-haspopup="true" class="bibr popnode tag_hotlink tag_tooltip" data-dcnode-id="7976" href="#b8" id="__tag_124928470" rid="b8" role="button"><span data-dcnode-id="7977" instrument_node="">Bohlen, 1989</span></a><span data-dcnode-id="7975" instrument_node="">; </span><a aria-expanded="false" aria-haspopup="true" class="bibr popnode tag_hotlink tag_tooltip" data-dcnode-id="7973" href="#b107" id="__tag_124928569" rid="b107" role="button"><span data-dcnode-id="7974" instrument_node="">Prewitt et al. 1982</span></a><span data-dcnode-id="7972" instrument_node="">; </span><a aria-expanded="false" aria-haspopup="true" class="bibr popnode tag_hotlink tag_tooltip" data-dcnode-id="7970" href="#b39" id="__tag_124928598" rid="b39" role="button"><span data-dcnode-id="7971" instrument_node="">Greene et al. 1989</span></a><span data-dcnode-id="7969" instrument_node="">; </span><a aria-expanded="false" aria-haspopup="true" class="bibr popnode tag_hotlink tag_tooltip" data-dcnode-id="7967" href="#b47" id="__tag_124928570" rid="b47" role="button"><span data-dcnode-id="7968" instrument_node="">Hansen-Smith et al. 1990</span></a><span data-dcnode-id="7966" instrument_node="">; </span><a aria-expanded="false" aria-haspopup="true" class="bibr popnode tag_hotlink tag_tooltip" data-dcnode-id="7964" href="#b121" id="__tag_124928602" rid="b121" role="button"><span data-dcnode-id="7965" instrument_node="">Schiffrin, 1992</span></a><span data-dcnode-id="7963" instrument_node="">; </span><a aria-expanded="false" aria-haspopup="true" class="bibr popnode tag_hotlink tag_tooltip" data-dcnode-id="7961" href="#b55" id="__tag_124928463" rid="b55" role="button"><span data-dcnode-id="7962" instrument_node="">Hernandez et al. 1999</span></a><span data-dcnode-id="7960" instrument_node="">).</span></p></div><div class="tsec sec" data-dcnode-id="7850" id="__sec3"><div class="goto jig-ncbiinpagenav-goto-container" data-dcnode-id="7955"><a aria-expanded="false" aria-haspopup="true" class="tgt_dark page-toc-label jig-ncbiinpagenav-goto-heading" data-dcnode-id="7956" href="#" role="button" title="Go to other sections in this page"><span data-dcnode-id="7957" instrument_node="">Go to:</span></a></div><h2 class="head no_bottom_margin ui-helper-clearfix" data-dcnode-id="7953" id="__sec3title"><span data-dcnode-id="7954" instrument_node="">Hypoxia and vascular remodelling</span></h2><p class="p p-first" data-dcnode-id="7906" id="__p8"><span data-dcnode-id="7952" instrument_node="">The evidence that chronic hypoxia leads to pulmonary hypertension is extensive and has been reviewed previously (</span><a aria-expanded="false" aria-haspopup="true" class="bibr popnode" data-dcnode-id="7950" href="#b29" rid="b29" role="button"><span data-dcnode-id="7951" instrument_node="">Fishman, 1985</span></a><span data-dcnode-id="7949" instrument_node="">; </span><a aria-expanded="false" aria-haspopup="true" class="bibr popnode tag_hotlink tag_tooltip" data-dcnode-id="7947" href="#b51" id="__tag_124928533" rid="b51" role="button"><span data-dcnode-id="7948" instrument_node="">Heath et al. 1973</span></a><span data-dcnode-id="7946" instrument_node="">; </span><a aria-expanded="false" aria-haspopup="true" class="bibr popnode tag_hotlink tag_tooltip" data-dcnode-id="7944" href="#b108" id="__tag_124928532" rid="b108" role="button"><span data-dcnode-id="7945" instrument_node="">Rabinovitch et al. 1979</span></a><span data-dcnode-id="7943" instrument_node="">; </span><a aria-expanded="false" aria-haspopup="true" class="bibr popnode" data-dcnode-id="7941" href="#b41" rid="b41" role="button"><span data-dcnode-id="7942" instrument_node="">Grover et al. 1983</span></a><span data-dcnode-id="7940" instrument_node="">; </span><a aria-expanded="false" aria-haspopup="true" class="bibr popnode tag_hotlink tag_tooltip" data-dcnode-id="7938" href="#b93" id="__tag_124928608" rid="b93" role="button"><span data-dcnode-id="7939" instrument_node="">Meyrick &amp; Reid, 1983</span></a><span data-dcnode-id="7937" instrument_node="">; </span><a aria-expanded="false" aria-haspopup="true" class="bibr popnode tag_hotlink tag_tooltip" data-dcnode-id="7935" href="#b78" id="__tag_124928575" rid="b78" role="button"><span data-dcnode-id="7936" instrument_node="">MacNee, 1994a</span></a><span data-dcnode-id="7934" instrument_node="">; </span><a aria-expanded="false" aria-haspopup="true" class="bibr popnode" data-dcnode-id="7932" href="#b63" rid="b63" role="button"><span data-dcnode-id="7933" instrument_node="">Jones &amp; Reid, 1995</span></a><span data-dcnode-id="7931" instrument_node="">). In brief, exposure of humans and a wide variety of animal species to hypoxic environments causes pulmonary hypertension associated with right ventricular hypertrophy and pulmonary vascular remodelling. There is a great variation in the magnitude of this response in different species and in individuals within species (</span><a aria-expanded="false" aria-haspopup="true" class="bibr popnode" data-dcnode-id="7929" href="#b29" rid="b29" role="button"><span data-dcnode-id="7930" instrument_node="">Fishman, 1985</span></a><span data-dcnode-id="7928" instrument_node="">; </span><a aria-expanded="false" aria-haspopup="true" class="bibr popnode" data-dcnode-id="7926" href="#b41" rid="b41" role="button"><span data-dcnode-id="7927" instrument_node="">Grover et al. 1983</span></a><span data-dcnode-id="7925" instrument_node="">). In some susceptible individuals, exposure to high altitude leads to progressively worsening pulmonary hypertension, right ventricular failure and ultimately death, e.g. chronic mountain sickness in human children and Brisket disease in cattle (</span><a aria-expanded="false" aria-haspopup="true" class="bibr popnode tag_hotlink tag_tooltip" data-dcnode-id="7923" href="#b52" id="__tag_124928564" rid="b52" role="button"><span data-dcnode-id="7924" instrument_node="">Hecht et al. 1962</span></a><span data-dcnode-id="7922" instrument_node="">; </span><a aria-expanded="false" aria-haspopup="true" class="bibr popnode tag_hotlink tag_tooltip" data-dcnode-id="7920" href="#b138" id="__tag_124928531" rid="b138" role="button"><span data-dcnode-id="7921" instrument_node="">Sui et al. 1988</span></a><span data-dcnode-id="7919" instrument_node="">). Return to an environment with a normal partial pressure of oxygen reverses these changes in normal and susceptible individuals (</span><a aria-expanded="false" aria-haspopup="true" class="bibr popnode tag_hotlink tag_tooltip" data-dcnode-id="7917" href="#b51" id="__tag_124928655" rid="b51" role="button"><span data-dcnode-id="7918" instrument_node="">Heath et al. 1973</span></a><span data-dcnode-id="7916" instrument_node="">; </span><a aria-expanded="false" aria-haspopup="true" class="bibr popnode tag_hotlink tag_tooltip" data-dcnode-id="7914" href="#b58" id="__tag_124928484" rid="b58" role="button"><span data-dcnode-id="7915" instrument_node="">Hislop &amp; Reid, 1977</span></a><span data-dcnode-id="7913" instrument_node="">; </span><a aria-expanded="false" aria-haspopup="true" class="bibr popnode" data-dcnode-id="7911" href="#b41" rid="b41" role="button"><span data-dcnode-id="7912" instrument_node="">Grover et al. 1983</span></a><span data-dcnode-id="7910" instrument_node="">; </span><a aria-expanded="false" aria-haspopup="true" class="bibr popnode" data-dcnode-id="7908" href="#b29" rid="b29" role="button"><span data-dcnode-id="7909" instrument_node="">Fishman, 1985</span></a><span data-dcnode-id="7907" instrument_node="">).</span></p><p data-dcnode-id="7871" id="__p9"><span data-dcnode-id="7905" instrument_node="">During the early period of hypoxic exposure, vascular resistance is elevated largely due to hypoxic vasoconstriction. However, following sustained hypoxia return to a normal </span><em data-dcnode-id="7903"><span data-dcnode-id="7904" instrument_node="">p</span></em><span data-dcnode-id="7902" instrument_node="">O</span><sub data-dcnode-id="7900"><span data-dcnode-id="7901" instrument_node="">2</span></sub><span data-dcnode-id="7899" instrument_node=""> causes an immediate small fall in pulmonary arterial pressure to a value that is substantially above normal (</span><a aria-expanded="false" aria-haspopup="true" class="bibr popnode tag_hotlink tag_tooltip" data-dcnode-id="7897" href="#b31" id="__tag_124928650" rid="b31" role="button"><span data-dcnode-id="7898" instrument_node="">Fried et al. 1983</span></a><span data-dcnode-id="7896" instrument_node="">; </span><a aria-expanded="false" aria-haspopup="true" class="bibr popnode tag_hotlink tag_tooltip" data-dcnode-id="7894" href="#b128" id="__tag_124928643" rid="b128" role="button"><span data-dcnode-id="7895" instrument_node="">Sime et al. 1971</span></a><span data-dcnode-id="7893" instrument_node="">; </span><a aria-expanded="false" aria-haspopup="true" class="bibr popnode tag_hotlink tag_tooltip" data-dcnode-id="7891" href="#b76" id="__tag_124928485" rid="b76" role="button"><span data-dcnode-id="7892" instrument_node="">Lockhart et al. 1976</span></a><span data-dcnode-id="7890" instrument_node="">), suggesting that structural changes in the pulmonary vascular bed become a major determinant of vascular resistance. Most attention has focused on the well-described remodelling of the precapillary resistance vessels as the cause of pulmonary hypertension. These structural changes include muscularization of previously non-muscular arterioles, increased medial thickness of previously partially and completely muscular arterioles and deposition of additional matrix components, including collagen and elastin, in the vascular walls, as described above (</span><a aria-expanded="false" aria-haspopup="true" class="bibr popnode" data-dcnode-id="7888" href="#b29" rid="b29" role="button"><span data-dcnode-id="7889" instrument_node="">Fishman, 1985</span></a><span data-dcnode-id="7887" instrument_node="">; </span><a aria-expanded="false" aria-haspopup="true" class="bibr popnode tag_hotlink tag_tooltip" data-dcnode-id="7885" href="#b108" id="__tag_124928590" rid="b108" role="button"><span data-dcnode-id="7886" instrument_node="">Rabinovitch et al. 1979</span></a><span data-dcnode-id="7884" instrument_node="">; </span><a aria-expanded="false" aria-haspopup="true" class="bibr popnode" data-dcnode-id="7882" href="#b41" rid="b41" role="button"><span data-dcnode-id="7883" instrument_node="">Grover et al. 1983</span></a><span data-dcnode-id="7881" instrument_node="">; </span><a aria-expanded="false" aria-haspopup="true" class="bibr popnode tag_hotlink tag_tooltip" data-dcnode-id="7879" href="#b134" id="__tag_124928614" rid="b134" role="button"><span data-dcnode-id="7880" instrument_node="">Stenmark &amp; Mecham, 1997</span></a><span data-dcnode-id="7878" instrument_node="">; </span><a aria-expanded="false" aria-haspopup="true" class="bibr popnode tag_hotlink tag_tooltip" data-dcnode-id="7876" href="#b111" id="__tag_124928556" rid="b111" role="button"><span data-dcnode-id="7877" instrument_node="">Rabinovitch, 1999</span></a><span data-dcnode-id="7875" instrument_node="">, </span><a aria-expanded="false" aria-haspopup="true" class="bibr popnode tag_hotlink tag_tooltip" data-dcnode-id="7873" href="#b112" id="__tag_124928609" rid="b112" role="button"><span data-dcnode-id="7874" instrument_node="">2001</span></a><span data-dcnode-id="7872" instrument_node="">).</span></p><p class="p p-last" data-dcnode-id="7851" id="__p10"><span data-dcnode-id="7870" instrument_node="">It is interesting to contrast this response of the pulmonary circulation with that of the systemic circulation. In rats, exposure to chronic hypoxia leads to reduced vascular response to vasoconstrictors both </span><em data-dcnode-id="7868"><span data-dcnode-id="7869" instrument_node="">in vivo</span></em><span data-dcnode-id="7867" instrument_node=""> and in isolated systemic vessels (</span><a aria-expanded="false" aria-haspopup="true" class="bibr popnode tag_hotlink tag_tooltip" data-dcnode-id="7865" href="#b21" id="__tag_124928514" rid="b21" role="button"><span data-dcnode-id="7866" instrument_node="">Doyle &amp; Walker, 1991</span></a><span data-dcnode-id="7864" instrument_node="">). Chronic hypoxia has also been shown to reduce systemic arterial blood pressure and increase maximal vascular conductance in normal rats (</span><a aria-expanded="false" aria-haspopup="true" class="bibr popnode tag_hotlink tag_tooltip" data-dcnode-id="7862" href="#b131" id="__tag_124928631" rid="b131" role="button"><span data-dcnode-id="7863" instrument_node="">Smith &amp; Marshall, 1999</span></a><span data-dcnode-id="7861" instrument_node="">). Furthermore, when spontaneously hypertensive rats are maintained in chronic hypoxia, systemic hypertension is abrogated (</span><a aria-expanded="false" aria-haspopup="true" class="bibr popnode tag_hotlink tag_tooltip" data-dcnode-id="7859" href="#b53" id="__tag_124928603" rid="b53" role="button"><span data-dcnode-id="7860" instrument_node="">Henley &amp; Tucker, 1987</span></a><span data-dcnode-id="7858" instrument_node="">). Studies of humans show that high altitude dwellers in the Andes have a lower incidence of systemic hypertension than age, socio-economic and racially matched sea-level residents (</span><a aria-expanded="false" aria-haspopup="true" class="bibr popnode tag_hotlink tag_tooltip" data-dcnode-id="7856" href="#b119" id="__tag_124928571" rid="b119" role="button"><span data-dcnode-id="7857" instrument_node="">Ruiz &amp; Penaloza, 1977</span></a><span data-dcnode-id="7855" instrument_node="">). </span><a aria-expanded="false" aria-haspopup="true" class="bibr popnode tag_hotlink tag_tooltip" data-dcnode-id="7853" href="#b84" id="__tag_124928489" rid="b84" role="button"><span data-dcnode-id="7854" instrument_node="">Marticorena et al. (1969)</span></a><span data-dcnode-id="7852" instrument_node=""> reported that long-term residence of native low-landers at high altitude leads to a reduction in systemic blood pressure Thus, the evidence from both animal and human studies demonstrates that chronic hypoxia leads to reduction in systemic blood pressure in direct contrast to the sustained hypertension observed in the pulmonary circulation.</span></p></div><div class="tsec sec" data-dcnode-id="7713" id="__sec4"><div class="goto jig-ncbiinpagenav-goto-container" data-dcnode-id="7847"><a aria-expanded="false" aria-haspopup="true" class="tgt_dark page-toc-label jig-ncbiinpagenav-goto-heading" data-dcnode-id="7848" href="#" role="button" title="Go to other sections in this page"><span data-dcnode-id="7849" instrument_node="">Go to:</span></a></div><h2 class="head no_bottom_margin ui-helper-clearfix" data-dcnode-id="7845" id="__sec4title"><span data-dcnode-id="7846" instrument_node="">Chronic inflammation and vascular remodelling</span></h2><p class="p p-first" data-dcnode-id="7776" id="__p11"><span data-dcnode-id="7844" instrument_node="">The second major stimulus to the development of pulmonary hypertension is the presence of chronic inflammation in the lungs. One of the most common forms of chronic lung inflammation is chronic airway inflammation, such as that produced by cigarette smoking or chronic airways infection. Experimentally induced chronic airway inflammation in rats leads to remodelling of pulmonary resistance vessels (</span><a aria-expanded="false" aria-haspopup="true" class="bibr popnode tag_hotlink tag_tooltip" data-dcnode-id="7842" href="#b15" id="__tag_124928621" rid="b15" role="button"><span data-dcnode-id="7843" instrument_node="">Cash et al. 1978</span></a><span data-dcnode-id="7841" instrument_node="">; </span><a aria-expanded="false" aria-haspopup="true" class="bibr popnode tag_hotlink tag_tooltip" data-dcnode-id="7839" href="#b54" id="__tag_124928576" rid="b54" role="button"><span data-dcnode-id="7840" instrument_node="">Herget et al. 1981</span></a><span data-dcnode-id="7838" instrument_node="">; </span><a aria-expanded="false" aria-haspopup="true" class="bibr popnode tag_hotlink tag_tooltip" data-dcnode-id="7836" href="#b38" id="__tag_124928471" rid="b38" role="button"><span data-dcnode-id="7837" instrument_node="">Graham et al. 1990</span></a><span data-dcnode-id="7835" instrument_node="">; </span><a aria-expanded="false" aria-haspopup="true" class="bibr popnode tag_hotlink tag_tooltip" data-dcnode-id="7833" href="#b86" id="__tag_124928551" rid="b86" role="button"><span data-dcnode-id="7834" instrument_node="">McCormack &amp; Paterson, 1993</span></a><span data-dcnode-id="7832" instrument_node="">; </span><a aria-expanded="false" aria-haspopup="true" class="bibr popnode tag_hotlink tag_tooltip" data-dcnode-id="7830" href="#b13" id="__tag_124928623" rid="b13" role="button"><span data-dcnode-id="7831" instrument_node="">Cadogan et al. 1999</span></a><span data-dcnode-id="7829" instrument_node="">) and the development of pulmonary hypertension (</span><a aria-expanded="false" aria-haspopup="true" class="bibr popnode tag_hotlink tag_tooltip" data-dcnode-id="7827" href="#b54" id="__tag_124928495" rid="b54" role="button"><span data-dcnode-id="7828" instrument_node="">Herget et al. 1981</span></a><span data-dcnode-id="7826" instrument_node="">; </span><a aria-expanded="false" aria-haspopup="true" class="bibr popnode tag_hotlink tag_tooltip" data-dcnode-id="7824" href="#b86" id="__tag_124928642" rid="b86" role="button"><span data-dcnode-id="7825" instrument_node="">McCormack &amp; Paterson, 1993</span></a><span data-dcnode-id="7823" instrument_node="">). The vascular remodelling induced by chronic airway inflammation is structurally similar to that observed in chronic hypoxic pulmonary hypertension (</span><a class="fig-table-link figpopup" co-legend-rid="lgnd_fig01" data-dcnode-id="7820" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.ncbi.nlm.nih.gov/pmc/articles/PMC1570922/figure/fig01/" rid-figpopup="fig01" rid-ob="ob-fig01" target="figure"><span data-dcnode-id="7821"><span data-dcnode-id="7822" instrument_node="">Fig. 1</span></span></a><span data-dcnode-id="7819" instrument_node="">). Most notably it causes marked medial hypertrophy suggesting that encroachment of the vessel wall on the vascular lumen contributes to increased resistance, in a manner similar to that described in chronic hypoxia. Airway inflammation caused by long-term inhalation of cigarette smoke also causes pulmonary vascular remodelling in rats (</span><a aria-expanded="false" aria-haspopup="true" class="bibr popnode tag_hotlink tag_tooltip" data-dcnode-id="7817" href="#b126" id="__tag_124928630" rid="b126" role="button"><span data-dcnode-id="7818" instrument_node="">Sekhon et al. 1994</span></a><span data-dcnode-id="7816" instrument_node="">). In human subjects who are cigarette smokers, the pulmonary vascular remodelling that is observed is disproportionate to the degree of arterial hypoxaemia, suggesting that it results in large part from chronic airway inflammation. Thus structural abnormalities of pulmonary vessels are observed in asymptomatic smokers (</span><a aria-expanded="false" aria-haspopup="true" class="bibr popnode tag_hotlink tag_tooltip" data-dcnode-id="7814" href="#b46" id="__tag_124928587" rid="b46" role="button"><span data-dcnode-id="7815" instrument_node="">Hale et al. 1984</span></a><span data-dcnode-id="7813" instrument_node="">; </span><a aria-expanded="false" aria-haspopup="true" class="bibr popnode tag_hotlink tag_tooltip" data-dcnode-id="7811" href="#b105" id="__tag_124928628" rid="b105" role="button"><span data-dcnode-id="7812" instrument_node="">Peinado et al. 1999</span></a><span data-dcnode-id="7810" instrument_node="">) and medial thickness in patients with COPD is unrelated to arterial </span><em data-dcnode-id="7808"><span data-dcnode-id="7809" instrument_node="">p</span></em><span data-dcnode-id="7807" instrument_node="">O</span><sub data-dcnode-id="7805"><span data-dcnode-id="7806" instrument_node="">2</span></sub><span data-dcnode-id="7804" instrument_node=""> (</span><a aria-expanded="false" aria-haspopup="true" class="bibr popnode tag_hotlink tag_tooltip" data-dcnode-id="7802" href="#b4" id="__tag_124928475" rid="b4" role="button"><span data-dcnode-id="7803" instrument_node="">Barbera et al. 1994</span></a><span data-dcnode-id="7801" instrument_node="">). Furthermore, vascular remodelling is observed in COPD even when arterial </span><em data-dcnode-id="7799"><span data-dcnode-id="7800" instrument_node="">p</span></em><span data-dcnode-id="7798" instrument_node="">O</span><sub data-dcnode-id="7796"><span data-dcnode-id="7797" instrument_node="">2</span></sub><span data-dcnode-id="7795" instrument_node=""> is greater than 8 kPa (</span><a aria-expanded="false" aria-haspopup="true" class="bibr popnode tag_hotlink tag_tooltip" data-dcnode-id="7793" href="#b146" id="__tag_124928461" rid="b146" role="button"><span data-dcnode-id="7794" instrument_node="">Wright et al. 1983</span></a><span data-dcnode-id="7792" instrument_node="">; </span><a aria-expanded="false" aria-haspopup="true" class="bibr popnode tag_hotlink tag_tooltip" data-dcnode-id="7790" href="#b80" id="__tag_124928579" rid="b80" role="button"><span data-dcnode-id="7791" instrument_node="">Magee et al. 1988</span></a><span data-dcnode-id="7789" instrument_node="">; </span><a aria-expanded="false" aria-haspopup="true" class="bibr popnode tag_hotlink tag_tooltip" data-dcnode-id="7787" href="#b105" id="__tag_124928483" rid="b105" role="button"><span data-dcnode-id="7788" instrument_node="">Peinado et al. 1999</span></a><span data-dcnode-id="7786" instrument_node="">), whereas in normal individuals chronic hypoxia in isolation does not cause pulmonary hypertension unless arterial </span><em data-dcnode-id="7784"><span data-dcnode-id="7785" instrument_node="">p</span></em><span data-dcnode-id="7783" instrument_node="">O</span><sub data-dcnode-id="7781"><span data-dcnode-id="7782" instrument_node="">2</span></sub><span data-dcnode-id="7780" instrument_node=""> is less than 8 kPa (</span><a aria-expanded="false" aria-haspopup="true" class="bibr popnode" data-dcnode-id="7778" href="#b41" rid="b41" role="button"><span data-dcnode-id="7779" instrument_node="">Grover et al. 1983</span></a><span data-dcnode-id="7777" instrument_node="">). Collectively, these data suggest that chronic airway inflammation leads to pulmonary vascular remodelling and contributes to the development of pulmonary hypertension by mechanisms that are independent of hypoxia.</span></p><p class="p p-last" data-dcnode-id="7714" id="__p12"><span data-dcnode-id="7775" instrument_node="">Inflammation of the pulmonary vasculature and diffuse interstitial inflammatory disease can also lead to remodelling and pulmonary hypertension. In animals, interventions that lead to vascular inflammation, including monocrotaline injection, Crotalaria ingestion and repeated injection of endotoxin, cause remodelling of resistance vessels and pulmonary hypertension (</span><a aria-expanded="false" aria-haspopup="true" class="bibr popnode tag_hotlink tag_tooltip" data-dcnode-id="7773" href="#b65" id="__tag_124928547" rid="b65" role="button"><span data-dcnode-id="7774" instrument_node="">Kay et al. 1967</span></a><span data-dcnode-id="7772" instrument_node="">; </span><a aria-expanded="false" aria-haspopup="true" class="bibr popnode" data-dcnode-id="7770" href="#b50" rid="b50" role="button"><span data-dcnode-id="7771" instrument_node="">Heath, 1969</span></a><span data-dcnode-id="7769" instrument_node="">; </span><a aria-expanded="false" aria-haspopup="true" class="bibr popnode tag_hotlink tag_tooltip" data-dcnode-id="7767" href="#b56" id="__tag_124928499" rid="b56" role="button"><span data-dcnode-id="7768" instrument_node="">Hislop &amp; Reid, 1974</span></a><span data-dcnode-id="7766" instrument_node="">; </span><a aria-expanded="false" aria-haspopup="true" class="bibr popnode tag_hotlink tag_tooltip" data-dcnode-id="7764" href="#b91" id="__tag_124928513" rid="b91" role="button"><span data-dcnode-id="7765" instrument_node="">Meyrick et al. 1980</span></a><span data-dcnode-id="7763" instrument_node="">; </span><a aria-expanded="false" aria-haspopup="true" class="bibr popnode tag_hotlink tag_tooltip" data-dcnode-id="7761" href="#b92" id="__tag_124928557" rid="b92" role="button"><span data-dcnode-id="7762" instrument_node="">Meyrick &amp; Reid, 1982</span></a><span data-dcnode-id="7760" instrument_node="">; </span><a aria-expanded="false" aria-haspopup="true" class="bibr popnode tag_hotlink tag_tooltip" data-dcnode-id="7758" href="#b87" id="__tag_124928464" rid="b87" role="button"><span data-dcnode-id="7759" instrument_node="">Meyrick &amp; Brigham, 1986</span></a><span data-dcnode-id="7757" instrument_node="">; </span><a aria-expanded="false" aria-haspopup="true" class="bibr popnode tag_hotlink tag_tooltip" data-dcnode-id="7755" href="#b94" id="__tag_124928626" rid="b94" role="button"><span data-dcnode-id="7756" instrument_node="">Meyrick &amp; Perkett, 1989</span></a><span data-dcnode-id="7754" instrument_node="">; </span><a aria-expanded="false" aria-haspopup="true" class="bibr popnode tag_hotlink tag_tooltip" data-dcnode-id="7752" href="#b114" id="__tag_124928555" rid="b114" role="button"><span data-dcnode-id="7753" instrument_node="">Reindel et al. 1990</span></a><span data-dcnode-id="7751" instrument_node="">). Diffuse interstitial inflammatory disease of the lung can also cause pulmonary vascular remodelling and hypertension in animal models (</span><a aria-expanded="false" aria-haspopup="true" class="bibr popnode tag_hotlink tag_tooltip" data-dcnode-id="7749" href="#b7" id="__tag_124928635" rid="b7" role="button"><span data-dcnode-id="7750" instrument_node="">Bishop et al. 1990</span></a><span data-dcnode-id="7748" instrument_node="">; </span><a aria-expanded="false" aria-haspopup="true" class="bibr popnode tag_hotlink tag_tooltip" data-dcnode-id="7746" href="#b75" id="__tag_124928578" rid="b75" role="button"><span data-dcnode-id="7747" instrument_node="">Lippmann, 1977</span></a><span data-dcnode-id="7745" instrument_node="">; </span><a aria-expanded="false" aria-haspopup="true" class="bibr popnode tag_hotlink tag_tooltip" data-dcnode-id="7743" href="#b95" id="__tag_124928515" rid="b95" role="button"><span data-dcnode-id="7744" instrument_node="">Michel et al. 1988</span></a><span data-dcnode-id="7742" instrument_node="">; </span><a aria-expanded="false" aria-haspopup="true" class="bibr popnode tag_hotlink tag_tooltip" data-dcnode-id="7740" href="#b17" id="__tag_124928534" rid="b17" role="button"><span data-dcnode-id="7741" instrument_node="">Champion et al. 1999</span></a><span data-dcnode-id="7739" instrument_node="">) and in human disease conditions, including adult respiratory distress syndrome (</span><a aria-expanded="false" aria-haspopup="true" class="bibr popnode tag_hotlink tag_tooltip" data-dcnode-id="7737" href="#b64" id="__tag_124928583" rid="b64" role="button"><span data-dcnode-id="7738" instrument_node="">Katz et al. 1984</span></a><span data-dcnode-id="7736" instrument_node="">; </span><a aria-expanded="false" aria-haspopup="true" class="bibr popnode tag_hotlink tag_tooltip" data-dcnode-id="7734" href="#b149" id="__tag_124928589" rid="b149" role="button"><span data-dcnode-id="7735" instrument_node="">Zapol &amp; Snider, 1977</span></a><span data-dcnode-id="7733" instrument_node="">; </span><a aria-expanded="false" aria-haspopup="true" class="bibr popnode tag_hotlink tag_tooltip" data-dcnode-id="7731" href="#b132" id="__tag_124928594" rid="b132" role="button"><span data-dcnode-id="7732" instrument_node="">Snow et al. 1982</span></a><span data-dcnode-id="7730" instrument_node="">; </span><a aria-expanded="false" aria-haspopup="true" class="bibr popnode tag_hotlink tag_tooltip" data-dcnode-id="7728" href="#b141" id="__tag_124928525" rid="b141" role="button"><span data-dcnode-id="7729" instrument_node="">Tomashefski et al. 1983</span></a><span data-dcnode-id="7727" instrument_node="">; </span><a aria-expanded="false" aria-haspopup="true" class="bibr popnode tag_hotlink tag_tooltip" data-dcnode-id="7725" href="#b74" id="__tag_124928622" rid="b74" role="button"><span data-dcnode-id="7726" instrument_node="">Leeman, 1999</span></a><span data-dcnode-id="7724" instrument_node="">; </span><a aria-expanded="false" aria-haspopup="true" class="bibr popnode tag_hotlink tag_tooltip" data-dcnode-id="7722" href="#b147" id="__tag_124928512" rid="b147" role="button"><span data-dcnode-id="7723" instrument_node="">Wyncoll &amp; Evans, 1999</span></a><span data-dcnode-id="7721" instrument_node="">), cryptogenic fibrosing alveolitis (</span><a aria-expanded="false" aria-haspopup="true" class="bibr popnode tag_hotlink tag_tooltip" data-dcnode-id="7719" href="#b34" id="__tag_124928476" rid="b34" role="button"><span data-dcnode-id="7720" instrument_node="">Giaid et al. 1993</span></a><span data-dcnode-id="7718" instrument_node="">) and systemic autoimmune diseases (</span><a aria-expanded="false" aria-haspopup="true" class="bibr popnode tag_hotlink tag_tooltip" data-dcnode-id="7716" href="#b44" id="__tag_124928560" rid="b44" role="button"><span data-dcnode-id="7717" instrument_node="">Gurubhagavatula &amp; Palevsky, 1997</span></a><span data-dcnode-id="7715" instrument_node="">).</span></p></div><div class="tsec sec" data-dcnode-id="7652" id="__sec5"><div class="goto jig-ncbiinpagenav-goto-container" data-dcnode-id="7710"><a aria-expanded="false" aria-haspopup="true" class="tgt_dark page-toc-label jig-ncbiinpagenav-goto-heading" data-dcnode-id="7711" href="#" role="button" title="Go to other sections in this page"><span data-dcnode-id="7712" instrument_node="">Go to:</span></a></div><h2 class="head no_bottom_margin ui-helper-clearfix" data-dcnode-id="7708" id="__sec5title"><span data-dcnode-id="7709" instrument_node="">Shear stress and vascular remodelling</span></h2><p class="p p-first" data-dcnode-id="7685" id="__p13"><span data-dcnode-id="7707" instrument_node="">It is well recognized that abnormal haemodynamic shear stress is a potent stimulus to vascular remodelling and the development of pulmonary hypertension. Congenital heart diseases that cause left to right shunt, including patent ductus arteriosus, atrial and ventricular septal defects, chronically augment vascular shear stress in the lung. If left uncorrected, these conditions frequently lead to pulmonary vascular remodelling, increased pulmonary vascular resistance, pulmonary hypertension, shunt reversal, right heart failure and death (</span><a aria-expanded="false" aria-haspopup="true" class="bibr popnode tag_hotlink tag_tooltip" data-dcnode-id="7705" href="#b49" id="__tag_124928462" rid="b49" role="button"><span data-dcnode-id="7706" instrument_node="">Heath &amp; Edwards, 1958</span></a><span data-dcnode-id="7704" instrument_node="">; </span><a aria-expanded="false" aria-haspopup="true" class="bibr popnode tag_hotlink tag_tooltip" data-dcnode-id="7702" href="#b109" id="__tag_124928506" rid="b109" role="button"><span data-dcnode-id="7703" instrument_node="">Rabinovitch et al. 1981</span></a><span data-dcnode-id="7701" instrument_node="">; </span><a aria-expanded="false" aria-haspopup="true" class="bibr popnode tag_hotlink tag_tooltip" data-dcnode-id="7699" href="#b93" id="__tag_124928500" rid="b93" role="button"><span data-dcnode-id="7700" instrument_node="">Meyrick &amp; Reid, 1983</span></a><span data-dcnode-id="7698" instrument_node="">). In animal models, it has been shown that increasing pulmonary blood flow, by the creation of left to right shunts, leads to vascular remodelling, increased resistance and pulmonary hypertension (</span><a aria-expanded="false" aria-haspopup="true" class="bibr popnode tag_hotlink tag_tooltip" data-dcnode-id="7696" href="#b10" id="__tag_124928653" rid="b10" role="button"><span data-dcnode-id="7697" instrument_node="">Bousamra et al. 2000</span></a><span data-dcnode-id="7695" instrument_node="">; </span><a aria-expanded="false" aria-haspopup="true" class="bibr popnode tag_hotlink tag_tooltip" data-dcnode-id="7693" href="#b32" id="__tag_124928588" rid="b32" role="button"><span data-dcnode-id="7694" instrument_node="">Friedli et al. 1975</span></a><span data-dcnode-id="7692" instrument_node="">; </span><a aria-expanded="false" aria-haspopup="true" class="bibr popnode tag_hotlink tag_tooltip" data-dcnode-id="7690" href="#b115" id="__tag_124928581" rid="b115" role="button"><span data-dcnode-id="7691" instrument_node="">Rendas et al. 1979</span></a><span data-dcnode-id="7689" instrument_node="">; </span><a aria-expanded="false" aria-haspopup="true" class="bibr popnode tag_hotlink tag_tooltip" data-dcnode-id="7687" href="#b24" id="__tag_124928580" rid="b24" role="button"><span data-dcnode-id="7688" instrument_node="">Everett et al. 1998</span></a><span data-dcnode-id="7686" instrument_node="">).</span></p><p class="p p-last" data-dcnode-id="7683" id="__p14"><span data-dcnode-id="7684" instrument_node="">Increased shear stress may be a significant contributory stimulus to the development of pulmonary hypertension in circumstances in which hypoxia and inflammation are the primary initiating stimulus. In a uniform rigid cylinder, shear stress (τ) at the interface between fluid and vessel wall is given by
</span></p><div class="disp-formula" data-dcnode-id="7676"><div class="f" data-dcnode-id="7677"><span data-dcnode-id="7682" instrument_node="">τ =&nbsp;4Qη/π</span><em data-dcnode-id="7680"><span data-dcnode-id="7681" instrument_node="">r</span></em><sup data-dcnode-id="7678"><span data-dcnode-id="7679" instrument_node="">3</span></sup></div></div><p data-dcnode-id="7653"><span data-dcnode-id="7675" instrument_node="">
where </span><em data-dcnode-id="7673"><span data-dcnode-id="7674" instrument_node="">Q</span></em><span data-dcnode-id="7672" instrument_node=""> is flow rate, η is the viscosity of the fluid and </span><em data-dcnode-id="7670"><span data-dcnode-id="7671" instrument_node="">r</span></em><span data-dcnode-id="7669" instrument_node=""> is the lumen radius. Since the pulmonary circulation must normally accommodate the whole cardiac output, total pulmonary blood flow must remain constant following luminal narrowing whether due to vasoconstriction or remodelling of the vessel wall. This means that shear stress at the vessel wall will increase markedly as it is inversely related to the third power of the radius. The importance of this contribution is clearly illustrated by the work of </span><a aria-expanded="false" aria-haspopup="true" class="bibr popnode tag_hotlink tag_tooltip" data-dcnode-id="7667" href="#b110" id="__tag_124928638" rid="b110" role="button"><span data-dcnode-id="7668" instrument_node="">Rabinovitch et al. (1983)</span></a><span data-dcnode-id="7666" instrument_node="">. They reduced the vascular shear stress in hypoxic lungs by constricting the left main branch of the pulmonary artery with a ‘band’ and demonstrated marked reduction of medial hypertrophy and the degree of extension of vascular smooth muscle into normally non-muscular vessels (</span><a aria-expanded="false" aria-haspopup="true" class="bibr popnode tag_hotlink tag_tooltip" data-dcnode-id="7664" href="#b110" id="__tag_124928536" rid="b110" role="button"><span data-dcnode-id="7665" instrument_node="">Rabinovitch et al. 1983</span></a><span data-dcnode-id="7663" instrument_node="">). Conversely, increased shear stress produced by pneumonectomy worsens monocrotaline-induced pulmonary hypertension in rats (</span><a aria-expanded="false" aria-haspopup="true" class="bibr popnode tag_hotlink tag_tooltip" data-dcnode-id="7661" href="#b102" id="__tag_124928600" rid="b102" role="button"><span data-dcnode-id="7662" instrument_node="">Okada et al. 1997</span></a><span data-dcnode-id="7660" instrument_node="">). In contrast to the pulmonary vascular response, long-term increases in blood flow in systemic vessels causes increased luminal diameter and reduced resistance (</span><a aria-expanded="false" aria-haspopup="true" class="bibr popnode tag_hotlink tag_tooltip" data-dcnode-id="7658" href="#b70" id="__tag_124928577" rid="b70" role="button"><span data-dcnode-id="7659" instrument_node="">Langille &amp; O'Donnell, 1986</span></a><span data-dcnode-id="7657" instrument_node="">; </span><a aria-expanded="false" aria-haspopup="true" class="bibr popnode tag_hotlink tag_tooltip" data-dcnode-id="7655" href="#b35" id="__tag_124928509" rid="b35" role="button"><span data-dcnode-id="7656" instrument_node="">Gibbons &amp; Dzau, 1994</span></a><span data-dcnode-id="7654" instrument_node="">).</span></p></div><div class="tsec sec" data-dcnode-id="7431" id="__sec6"><div class="goto jig-ncbiinpagenav-goto-container" data-dcnode-id="7649"><a aria-expanded="false" aria-haspopup="true" class="tgt_dark page-toc-label jig-ncbiinpagenav-goto-heading" data-dcnode-id="7650" href="#" role="button" title="Go to other sections in this page"><span data-dcnode-id="7651" instrument_node="">Go to:</span></a></div><h2 class="head no_bottom_margin ui-helper-clearfix" data-dcnode-id="7647" id="__sec6title"><span data-dcnode-id="7648" instrument_node="">Altered endothelial function and vascular remodelling</span></h2><p class="p p-first" data-dcnode-id="7627" id="__p15"><span data-dcnode-id="7646" instrument_node="">The pulmonary endothelial cell produces a number of important mediators that modulate pulmonary vascular smooth muscle tone and have important influences on vascular smooth muscle cell proliferation and wall remodelling. Amongst the more important vasodilators produced by the endothelium are nitric oxide (NO) and prostacyclin (PGI</span><sub data-dcnode-id="7644"><span data-dcnode-id="7645" instrument_node="">2</span></sub><span data-dcnode-id="7643" instrument_node="">), which are also potent inhibitors of wall remodelling. The endothelium-derived vasoconstrictor endothelin is a key mediator of resistance vessel wall remodelling (</span><a aria-expanded="false" aria-haspopup="true" class="bibr popnode tag_hotlink tag_tooltip" data-dcnode-id="7641" href="#b77" id="__tag_124928543" rid="b77" role="button"><span data-dcnode-id="7642" instrument_node="">MacLean, 1999</span></a><span data-dcnode-id="7640" instrument_node="">). Other mediators that also stimulate smooth muscle proliferation include prostaglandin F</span><sub data-dcnode-id="7638"><span data-dcnode-id="7639" instrument_node="">2α</span></sub><span data-dcnode-id="7637" instrument_node=""> (PGF</span><sub data-dcnode-id="7635"><span data-dcnode-id="7636" instrument_node="">2α</span></sub><span data-dcnode-id="7634" instrument_node="">) and platelet-derived growth factor-</span><em data-dcnode-id="7632"><span data-dcnode-id="7633" instrument_node="">B</span></em><span data-dcnode-id="7631" instrument_node="">. Furthermore, the endothelium has a key role in the uptake and catabolism of mediators that can promote remodelling, such as serotonin (</span><a aria-expanded="false" aria-haspopup="true" class="bibr popnode tag_hotlink tag_tooltip" data-dcnode-id="7629" href="#b77" id="__tag_124928526" rid="b77" role="button"><span data-dcnode-id="7630" instrument_node="">MacLean, 1999</span></a><span data-dcnode-id="7628" instrument_node="">). Alteration in endothelial production or catabolism of vasoactive mediators can play a central role in vascular remodelling.</span></p><p data-dcnode-id="7586" id="__p16"><span data-dcnode-id="7626" instrument_node="">Considerable attention has been focused on the role of altered NO production in the development of hypoxia-induced pulmonary hypertension. In chronically hypoxic rat lungs, impaired endothelium-dependent relaxation has been demonstrated (</span><a aria-expanded="false" aria-haspopup="true" class="bibr popnode tag_hotlink tag_tooltip" data-dcnode-id="7624" href="#b1" id="__tag_124928541" rid="b1" role="button"><span data-dcnode-id="7625" instrument_node="">Adnot et al. 1991</span></a><span data-dcnode-id="7623" instrument_node="">; </span><a aria-expanded="false" aria-haspopup="true" class="bibr popnode tag_hotlink tag_tooltip" data-dcnode-id="7621" href="#b85" id="__tag_124928517" rid="b85" role="button"><span data-dcnode-id="7622" instrument_node="">Maruyama &amp; Maruyama, 1994</span></a><span data-dcnode-id="7620" instrument_node="">) and a similar impairment has been demonstrated in patients with chronic hypoxic lung disease (</span><a aria-expanded="false" aria-haspopup="true" class="bibr popnode tag_hotlink tag_tooltip" data-dcnode-id="7618" href="#b20" id="__tag_124928585" rid="b20" role="button"><span data-dcnode-id="7619" instrument_node="">Dinh-Xuan et al. 1991</span></a><span data-dcnode-id="7617" instrument_node="">), suggesting that impaired endothelium-dependent relaxation may contribute to the increased pulmonary vascular resistance of chronic hypoxia. Expression of endothelial nitric oxide synthase is increased in experimental hypoxic pulmonary hypertension (</span><a aria-expanded="false" aria-haspopup="true" class="bibr popnode tag_hotlink tag_tooltip" data-dcnode-id="7615" href="#b73" id="__tag_124928528" rid="b73" role="button"><span data-dcnode-id="7616" instrument_node="">Le Cras et al. 1996</span></a><span data-dcnode-id="7614" instrument_node="">, </span><a aria-expanded="false" aria-haspopup="true" class="bibr popnode tag_hotlink tag_tooltip" data-dcnode-id="7612" href="#b72" id="__tag_124928552" rid="b72" role="button"><span data-dcnode-id="7613" instrument_node="">1998</span></a><span data-dcnode-id="7611" instrument_node="">; </span><a aria-expanded="false" aria-haspopup="true" class="bibr popnode tag_hotlink tag_tooltip" data-dcnode-id="7609" href="#b144" id="__tag_124928529" rid="b144" role="button"><span data-dcnode-id="7610" instrument_node="">Tyler et al. 1999</span></a><span data-dcnode-id="7608" instrument_node="">) but, despite this, NO production is reduced (</span><a aria-expanded="false" aria-haspopup="true" class="bibr popnode tag_hotlink tag_tooltip" data-dcnode-id="7606" href="#b71" id="__tag_124928596" rid="b71" role="button"><span data-dcnode-id="7607" instrument_node="">Le Cras &amp; McMurtry, 2001</span></a><span data-dcnode-id="7605" instrument_node="">). Hypoxic vascular remodelling and pulmonary arterial pressures are increased in endothelial nitric oxide synthase (eNOS) knockout mice (</span><a aria-expanded="false" aria-haspopup="true" class="bibr popnode tag_hotlink tag_tooltip" data-dcnode-id="7603" href="#b135" id="__tag_124928550" rid="b135" role="button"><span data-dcnode-id="7604" instrument_node="">Steudel et al. 1998</span></a><span data-dcnode-id="7602" instrument_node="">; </span><a aria-expanded="false" aria-haspopup="true" class="bibr popnode tag_hotlink tag_tooltip" data-dcnode-id="7600" href="#b26" id="__tag_124928637" rid="b26" role="button"><span data-dcnode-id="7601" instrument_node="">Fagan et al. 1999b</span></a><span data-dcnode-id="7599" instrument_node="">) while chronic administration of inhaled NO attenuates hypoxic vascular remodelling (</span><a aria-expanded="false" aria-haspopup="true" class="bibr popnode tag_hotlink tag_tooltip" data-dcnode-id="7597" href="#b68" id="__tag_124928505" rid="b68" role="button"><span data-dcnode-id="7598" instrument_node="">Kouyoumdjian et al. 1994</span></a><span data-dcnode-id="7596" instrument_node="">; </span><a aria-expanded="false" aria-haspopup="true" class="bibr popnode tag_hotlink tag_tooltip" data-dcnode-id="7594" href="#b117" id="__tag_124928624" rid="b117" role="button"><span data-dcnode-id="7595" instrument_node="">Roberts et al. 1995</span></a><span data-dcnode-id="7593" instrument_node="">). Stimulation of endogenous NO production by dietary supplementation with L-arginine also protects against hypoxia-induced vascular remodelling (</span><a aria-expanded="false" aria-haspopup="true" class="bibr popnode tag_hotlink tag_tooltip" data-dcnode-id="7591" href="#b97" id="__tag_124928546" rid="b97" role="button"><span data-dcnode-id="7592" instrument_node="">Mitani et al. 1997</span></a><span data-dcnode-id="7590" instrument_node="">; </span><a aria-expanded="false" aria-haspopup="true" class="bibr popnode tag_hotlink tag_tooltip" data-dcnode-id="7588" href="#b25" id="__tag_124928474" rid="b25" role="button"><span data-dcnode-id="7589" instrument_node="">Fagan et al. 1999a</span></a><span data-dcnode-id="7587" instrument_node="">). Taken together, these data suggest that impaired endothelial production of NO may contribute to the development of chronic hypoxic pulmonary hypertension.</span></p><p data-dcnode-id="7567" id="__p17"><span data-dcnode-id="7585" instrument_node="">The potential role of altered endothelial NO synthase expression and activity in chronic inflammatory lung disease has received much less attention. We have found that chronic airway infection in rats leads to reduced eNOS expression in the pulmonary vasculature (</span><a class="fig-table-link figpopup" co-legend-rid="lgnd_fig02" data-dcnode-id="7582" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.ncbi.nlm.nih.gov/pmc/articles/PMC1570922/figure/fig02/" rid-figpopup="fig02" rid-ob="ob-fig02" target="figure"><span data-dcnode-id="7583"><span data-dcnode-id="7584" instrument_node="">Fig. 2</span></span></a><span data-dcnode-id="7581" instrument_node="">) and that these chronically infected lungs are hypersensitive to the vasodilator effects of NO (</span><a aria-expanded="false" aria-haspopup="true" class="bibr popnode tag_hotlink tag_tooltip" data-dcnode-id="7579" href="#b13" id="__tag_124928537" rid="b13" role="button"><span data-dcnode-id="7580" instrument_node="">Cadogan et al. 1999</span></a><span data-dcnode-id="7578" instrument_node="">). Furthermore, isolated pulmonary arteries from these lungs demonstrate impaired endothelium-dependent relaxation (</span><a class="fig-table-link figpopup" co-legend-rid="lgnd_fig03" data-dcnode-id="7575" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.ncbi.nlm.nih.gov/pmc/articles/PMC1570922/figure/fig03/" rid-figpopup="fig03" rid-ob="ob-fig03" target="figure"><span data-dcnode-id="7576"><span data-dcnode-id="7577" instrument_node="">Fig. 3</span></span></a><span data-dcnode-id="7574" instrument_node="">). In human subjects with chronic inflammatory airway disease secondary to cigarette smoking, who are not hypoxic, pulmonary vascular endothelium-dependent relaxation is also impaired and eNOS expression is reduced (</span><a aria-expanded="false" aria-haspopup="true" class="bibr popnode tag_hotlink tag_tooltip" data-dcnode-id="7572" href="#b104" id="__tag_124928644" rid="b104" role="button"><span data-dcnode-id="7573" instrument_node="">Peinado et al. 1998</span></a><span data-dcnode-id="7571" instrument_node="">; </span><a aria-expanded="false" aria-haspopup="true" class="bibr popnode tag_hotlink tag_tooltip" data-dcnode-id="7569" href="#b5" id="__tag_337480295" rid="b5" role="button"><span data-dcnode-id="7570" instrument_node="">Barbera et al. 2001</span></a><span data-dcnode-id="7568" instrument_node="">). Taken together, these data demonstrate that chronic airway inflammation leads to reduced eNOS expression and activity and suggest that reduced NO production may contribute to the vascular remodelling observed in these conditions.</span></p><div class="fig iconblock whole_rhythm" co-legend-rid="lgnd_fig02" data-dcnode-id="7546" id="fig02"><a data-dcnode-id="7563" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.ncbi.nlm.nih.gov/pmc/articles/PMC1570922/figure/fig02/" rid-figpopup="fig02" rid-ob="ob-fig02" target="figure"></a><div class="figure" data-dcnode-id="7558" data-largeobj="" data-largeobj-link-rid="largeobj_idm139710742249792"><a data-dcnode-id="7562" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.ncbi.nlm.nih.gov/pmc/articles/PMC1570922/figure/fig02/" rid-figpopup="fig02" rid-ob="ob-fig02" target="figure"></a><a class="inline_block ts_canvas" data-dcnode-id="7559" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.ncbi.nlm.nih.gov/core/lw/2.0/html/tileshop_pmc/tileshop_pmc_inline.html%3Ftitle%3DClick%2520on%2520image%2520to%2520zoom%26p%3DPMC3%26id%3D1570922_joa0201-0335-f2.jpg" rel="noopener" target="tileshopwindow"><div class="ts_bar small" data-dcnode-id="7561" title="Click on image to zoom"></div><img alt="An external file that holds a picture, illustration, etc.
Object name is joa0201-0335-f2.jpg" class="tileshop" data-dcnode-id="7560" loading="lazy" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.ncbi.nlm.nih.gov/pmc/articles/PMC1570922/bin/joa0201-0335-f2.jpg&amp;raw" title="Click on image to zoom"></a></div><div class="largeobj-link align_right" data-dcnode-id="7555" id="largeobj_idm139710742249792" style="display: none;"><a data-dcnode-id="7556" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.ncbi.nlm.nih.gov/pmc/articles/PMC1570922/figure/fig02/%3Freport%3Dobjectonly" rel="noopener" target="object"><span data-dcnode-id="7557" instrument_node="">Open in a separate window</span></a></div><div class="icnblk_cntnt" data-dcnode-id="7547" id="lgnd_fig02"><div data-dcnode-id="7552"><a class="figpopup" data-dcnode-id="7553" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.ncbi.nlm.nih.gov/pmc/articles/PMC1570922/figure/fig02/" rid-figpopup="fig02" rid-ob="ob-fig02" target="figure"><span data-dcnode-id="7554" instrument_node="">Fig. 2</span></a></div><div class="caption" data-dcnode-id="7548"><p data-dcnode-id="7549" id="__p34"><span data-dcnode-id="7550" instrument_node="">Immunoperoxidase staining of endothelial NOS in control lungs, and in lung with chronic airway infection following inoculation with Pseudomonas aeruginosa in agar beads. (a) Photomicrograph showing staining of eNOS in endothelium of blood vessel of control lung and patchy staining in alveolar walls (blue-black colour). (b) Photomicrograph showing absence of staining of eNOS in endothelium of blood vessel of Pseudomonasinoculated lung. All original magnifications ×380. (Figure reproduced with permission from Cadogan et al. American Journal of Physiology, 277: L616–627, 1999.)</span></p></div></div></div><div class="fig iconblock whole_rhythm" co-legend-rid="lgnd_fig03" data-dcnode-id="7525" id="fig03"><a data-dcnode-id="7542" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.ncbi.nlm.nih.gov/pmc/articles/PMC1570922/figure/fig03/" rid-figpopup="fig03" rid-ob="ob-fig03" target="figure"></a><div class="figure" data-dcnode-id="7537" data-largeobj="" data-largeobj-link-rid="largeobj_idm139710742246432"><a data-dcnode-id="7541" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.ncbi.nlm.nih.gov/pmc/articles/PMC1570922/figure/fig03/" rid-figpopup="fig03" rid-ob="ob-fig03" target="figure"></a><a class="inline_block ts_canvas" data-dcnode-id="7538" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.ncbi.nlm.nih.gov/core/lw/2.0/html/tileshop_pmc/tileshop_pmc_inline.html%3Ftitle%3DClick%2520on%2520image%2520to%2520zoom%26p%3DPMC3%26id%3D1570922_joa0201-0335-f3.jpg" rel="noopener" target="tileshopwindow"><div class="ts_bar small" data-dcnode-id="7540" title="Click on image to zoom"></div><img alt="An external file that holds a picture, illustration, etc.
