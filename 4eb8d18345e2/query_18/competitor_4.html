/span></a></li><li class="ez-toc-page-1 ez-toc-heading-level-4" data-dcnode-id="1406"><a class="ez-toc-link ez-toc-heading-8" data-dcnode-id="1407" href="#Pulmonary_Circulation" title="Pulmonary Circulation"><span data-dcnode-id="1408" instrument_node="">Pulmonary Circulation</span></a></li><li class="ez-toc-page-1 ez-toc-heading-level-4" data-dcnode-id="1403"><a class="ez-toc-link ez-toc-heading-9" data-dcnode-id="1404" href="#The_Human_Breath" title="The Human Breath"><span data-dcnode-id="1405" instrument_node="">The Human Breath</span></a></li><li class="ez-toc-page-1 ez-toc-heading-level-4" data-dcnode-id="1400"><a class="ez-toc-link ez-toc-heading-10" data-dcnode-id="1401" href="#Pulmonary_Ventilation" title="Pulmonary Ventilation"><span data-dcnode-id="1402" instrument_node="">Pulmonary Ventilation</span></a></li><li class="ez-toc-page-1 ez-toc-heading-level-4" data-dcnode-id="1397"><a class="ez-toc-link ez-toc-heading-11" data-dcnode-id="1398" href="#Lungs" title="Lungs"><span data-dcnode-id="1399" instrument_node="">Lungs</span></a></li><li class="ez-toc-page-1 ez-toc-heading-level-4" data-dcnode-id="1394"><a class="ez-toc-link ez-toc-heading-12" data-dcnode-id="1395" href="#Pulmonary_Respiratory_System" title="Pulmonary Respiratory System"><span data-dcnode-id="1396" instrument_node="">Pulmonary Respiratory System</span></a></li><li class="ez-toc-page-1 ez-toc-heading-level-4" data-dcnode-id="1391"><a class="ez-toc-link ez-toc-heading-13" data-dcnode-id="1392" href="#Pulmonary_ventilation" title="Pulmonary ventilation"><span data-dcnode-id="1393" instrument_node="">Pulmonary ventilation</span></a></li><li class="ez-toc-page-1 ez-toc-heading-level-4" data-dcnode-id="1388"><a class="ez-toc-link ez-toc-heading-14" data-dcnode-id="1389" href="#PULMONARY_VENTILATION" title="PULMONARY VENTILATION"><span data-dcnode-id="1390" instrument_node="">PULMONARY VENTILATION</span></a></li></ul></nav></div><span data-dcnode-id="1384" instrument_node="">
</span><h4 data-dcnode-id="1380"><span class="ez-toc-section" data-dcnode-id="1383" id="What_is_lung_breathing"></span><span data-dcnode-id="1382" instrument_node="">What is lung breathing?</span><span class="ez-toc-section-end" data-dcnode-id="1381"></span></h4><span data-dcnode-id="1379" instrument_node="">
</span><p data-dcnode-id="1374"><span data-dcnode-id="1378" instrument_node="">The&nbsp;</span><strong data-dcnode-id="1376"><span data-dcnode-id="1377" instrument_node="">breath</span></strong><span data-dcnode-id="1375" instrument_node="">&nbsp;through the lungs is called pulmonary respiration.</span></p><span data-dcnode-id="1373" instrument_node="">
</span><p data-dcnode-id="1369"><strong data-dcnode-id="1371"><span data-dcnode-id="1372" instrument_node="">The mechanism of lung breathing:</span></strong><span data-dcnode-id="1370" instrument_node="">&nbsp;Includes breathing movement, exchange of gases, lungs, transport of gases through the blood and exchange of gas by tissue.</span></p><span data-dcnode-id="1368" instrument_node="">
</span><h4 data-dcnode-id="1364"><span class="ez-toc-section" data-dcnode-id="1367" id="Breathing_Movement"></span><span data-dcnode-id="1366" instrument_node="">Breathing Movement</span><span class="ez-toc-section-end" data-dcnode-id="1365"></span></h4><span data-dcnode-id="1363" instrument_node="">
</span><p data-dcnode-id="1361"><span data-dcnode-id="1362" instrument_node="">The thoracic cavity is a compressed air chamber that is closed by the dorsal vertebral column, ventrally by the sternum, laterally by the ribs, anteriorly by the neck and later by the diaphragm.&nbsp;Diaphragm is a dome-shaped partition of skeletal muscle between the thoracic cavity and the abdominal cavity.</span></p><span data-dcnode-id="1360" instrument_node="">
</span><p data-dcnode-id="1358"><span data-dcnode-id="1359" instrument_node="">Breathing includes two processes of inspiration and expiration.</span></p><span data-dcnode-id="1357" instrument_node="">
</span><p data-dcnode-id="1353"><strong data-dcnode-id="1355"><span data-dcnode-id="1356" instrument_node="">Inspiration</span></strong><span data-dcnode-id="1354" instrument_node="">&nbsp;is a process of entering air into the lungs.&nbsp;It is an active process.&nbsp;When the external intercostal muscles contract the diaphragm becomes flat and space inside increases thoracic cavity.&nbsp;At the same time, high pressure outside air flows into the lungs.</span></p><span data-dcnode-id="1352" instrument_node="">
</span><p data-dcnode-id="1348"><strong data-dcnode-id="1350"><span data-dcnode-id="1351" instrument_node="">Expiration</span></strong><span data-dcnode-id="1349" instrument_node="">&nbsp;is a process of expelling air from the lungs.</span></p><span data-dcnode-id="1347" instrument_node="">
</span><p data-dcnode-id="1345"><span data-dcnode-id="1346" instrument_node="">In this process, the internal intercostals contract and diphragam muscles makes dome-shaped originals and decreases the space within the thoracic cavity, the lungs are compressed and air is expelled outward.&nbsp;Therefore, ribs play important roles in women while diaphragm in males.</span></p><span data-dcnode-id="1344" instrument_node="">
</span><h4 data-dcnode-id="1340"><span class="ez-toc-section" data-dcnode-id="1343" id="Pulmonary_volume"></span><span data-dcnode-id="1342" instrument_node="">Pulmonary volume</span><span class="ez-toc-section-end" data-dcnode-id="1341"></span></h4><span data-dcnode-id="1339" instrument_node="">
</span><p data-dcnode-id="1337"><span data-dcnode-id="1338" instrument_node="">The recoding of volume of air circulation into and out of the lungs is called spirometry and is measured with the help of a spirometer.</span></p><span data-dcnode-id="1336" instrument_node="">
</span><p data-dcnode-id="1334"><span data-dcnode-id="1335" instrument_node="">The volume of air inhaled by the animals and exhaled with each breath is called tidal volume.&nbsp;The average is about 500 ml in humans.</span></p><span data-dcnode-id="1333" instrument_node="">
</span><p data-dcnode-id="1331"><span data-dcnode-id="1332" instrument_node="">The maximum volume of air that can be inhaled and exhaled during forced breathing is called vital capacity.&nbsp;It’s about 3.5-4.5 liters.</span></p><span data-dcnode-id="1330" instrument_node="">
</span><p data-dcnode-id="1328"><span data-dcnode-id="1329" instrument_node="">The vital capacity is greater in athletes, mountain dwellers and the lower women, by old age, and people smokers.</span></p><span data-dcnode-id="1327" instrument_node="">
</span><p data-dcnode-id="1325"><span data-dcnode-id="1326" instrument_node="">The volume of air is left in the lungs after forced expiration called residual volume.</span></p><span data-dcnode-id="1324" instrument_node="">
</span><p data-dcnode-id="1322"><span data-dcnode-id="1323" instrument_node="">It is 1200ml.&nbsp;the volume of air that can not be inspired, above normal tidal volume is called inspiratory reserve volume, or IRS (3000ml).</span></p><span data-dcnode-id="1321" instrument_node="">
</span><p data-dcnode-id="1319"><span data-dcnode-id="1320" instrument_node="">The amount of air that can not be expired forcefully beyond normal current expiration is called the expiratory reserve volume.&nbsp;It is about 1100 ml.</span></p><span data-dcnode-id="1318" instrument_node="">
</span><p data-dcnode-id="1316"><span data-dcnode-id="1317" instrument_node="">The dead space is the volume of air (150 ml) in nasopharynx, trachea, bronchi, which is not available for gas exchange.</span></p><span data-dcnode-id="1315" instrument_node="">
</span><h4 data-dcnode-id="1311"><span class="ez-toc-section" data-dcnode-id="1314" id="Rate_of_breathing"></span><span data-dcnode-id="1313" instrument_node="">Rate of breathing</span><span class="ez-toc-section-end" data-dcnode-id="1312"></span></h4><span data-dcnode-id="1310" instrument_node="">
</span><p data-dcnode-id="1305"><span data-dcnode-id="1309" instrument_node="">The&nbsp;</span><strong data-dcnode-id="1307"><span data-dcnode-id="1308" instrument_node="">respiration rate</span></strong><span data-dcnode-id="1306" instrument_node="">&nbsp;in humans is 15-25 per minute.&nbsp;In babies, it is 35 per minute.</span></p><span data-dcnode-id="1304" instrument_node="">
</span><h4 data-dcnode-id="1300"><span class="ez-toc-section" data-dcnode-id="1303" id="Breath_control"></span><span data-dcnode-id="1302" instrument_node="">Breath control</span><span class="ez-toc-section-end" data-dcnode-id="1301"></span></h4><span data-dcnode-id="1299" instrument_node="">
</span><p data-dcnode-id="1297"><span data-dcnode-id="1298" instrument_node="">Our respiratory centers are located in two regions of the brain-bulb (with inspiratory center and expiratory center) and varolii bridge (with pneumotaxic center).</span></p><span data-dcnode-id="1296" instrument_node="">
</span><p data-dcnode-id="1294"><span data-dcnode-id="1295" instrument_node="">The inspiratory center stimulates inspiratory muscles (diaphragm) to control the rate of breathing.&nbsp;The expiratory center remains inactive during normal breathing, but it controls both expiration and inspiration during exercise.</span></p><span data-dcnode-id="1293" instrument_node="">
</span><p data-dcnode-id="1291"><span data-dcnode-id="1292" instrument_node="">Pneumotaxic Center controls the shutdown of the breathing point by sending a signal to the inspiratory center.</span></p><span data-dcnode-id="1290" instrument_node="">
</span><p data-dcnode-id="1288"><span data-dcnode-id="1289" instrument_node="">The core control center detects the low pH of the tissue fluid, during the formation of more carbonic acids, the center increases the respiration rate to eliminate excess CO2.</span></p><span data-dcnode-id="1287" instrument_node="">
</span><p data-dcnode-id="1285"><span data-dcnode-id="1286" instrument_node="">The concentration of O2 has little effect on respiratory centers.</span></p><span data-dcnode-id="1284" instrument_node="">
</span><p data-dcnode-id="1282"><span data-dcnode-id="1283" instrument_node="">However, when the level of O2 is severely depressed, O2 sensors in the aorta and carotid arteries send signals to breathe control center to increase respiration rate.</span></p><span data-dcnode-id="1281" instrument_node="">
</span><h4 data-dcnode-id="1277"><span class="ez-toc-section" data-dcnode-id="1280" id="Pulmonary_gas_rates_external_respiration"></span><span data-dcnode-id="1279" instrument_node="">Pulmonary gas rates (external respiration)</span><span class="ez-toc-section-end" data-dcnode-id="1278"></span></h4><span data-dcnode-id="1276" instrument_node="">
</span><p data-dcnode-id="1274"><span data-dcnode-id="1275" instrument_node="">External breathing occurs between the blood in the alveolar capillaries and alveolar air.</span></p><span data-dcnode-id="1273" instrument_node="">
</span><p data-dcnode-id="1271"><span data-dcnode-id="1272" instrument_node="">The partial pressure of O2 (PO2) in the alveolar air is 100 mm Hg and in the venous blood has 40 mm Hg.</span></p><span data-dcnode-id="1270" instrument_node="">
</span><p data-dcnode-id="1268"><span data-dcnode-id="1269" instrument_node="">Thus, alveolar air oxygen diffuses into the venous blood and into the lungs, the CO2 or PCO2 partial pressure in the venous blood is 46 mm Hg and in the alveolar air is 40 mm Hg.</span></p><span data-dcnode-id="1267" instrument_node="">
</span><p data-dcnode-id="1265"><span data-dcnode-id="1266" instrument_node="">Therefore, CO2 diffuses from venous blood into the lungs of alveolar air.</span></p><span data-dcnode-id="1264" instrument_node="">
</span><p data-dcnode-id="1262"><span data-dcnode-id="1263" instrument_node="">However, N 2 is physiologically inert to respiration.</span></p><span data-dcnode-id="1261" instrument_node="">
</span><h6 data-dcnode-id="1260"></h6><span data-dcnode-id="1259" instrument_node="">
</span><p data-dcnode-id="1257"><span data-dcnode-id="1258" instrument_node="">It is the breath that allowed the existence of large animals in terrestrial environment.&nbsp;The air enters through some hole in the being and goes to the lung, an organ extremely vascularized and with an incredible surface of contact.</span></p><span data-dcnode-id="1256" instrument_node="">
</span><p data-dcnode-id="1254"><span data-dcnode-id="1255" instrument_node="">The function of respiration is essential to life and can be defined, in a simplified way, as the exchange of gases (O2 and CO2) between the cells of the organism and the atmosphere.</span></p><span data-dcnode-id="1253" instrument_node="">
</span><p data-dcnode-id="1248"><span data-dcnode-id="1252" instrument_node="">The&nbsp;</span><strong data-dcnode-id="1250"><span data-dcnode-id="1251" instrument_node="">pulmonary respiration</span></strong><span data-dcnode-id="1249" instrument_node="">&nbsp;is represented by ventilation (mechanical process input and output air from the lungs) and gas exchange.</span></p><span data-dcnode-id="1247" instrument_node="">
</span><p data-dcnode-id="1243"><strong data-dcnode-id="1245"><span data-dcnode-id="1246" instrument_node="">Pulmonary Respiration –</span></strong><span data-dcnode-id="1244" instrument_node="">&nbsp;is the exchange of gases (O2 and CO2) in the lungs (Ventilation).</span></p><span data-dcnode-id="1242" instrument_node="">
</span><p data-dcnode-id="1240"><span data-dcnode-id="1241" instrument_node="">Ambient air is taken and exchanged for air present in the lungs through the lung ventilation process.</span></p><span data-dcnode-id="1239" instrument_node="">
</span><h4 data-dcnode-id="1235"><span class="ez-toc-section" data-dcnode-id="1238" id="Definition"></span><span data-dcnode-id="1237" instrument_node="">Definition</span><span class="ez-toc-section-end" data-dcnode-id="1236"></span></h4><span data-dcnode-id="1234" instrument_node="">
</span><p data-dcnode-id="1229"><span data-dcnode-id="1233" instrument_node="">The&nbsp;</span><strong data-dcnode-id="1231"><span data-dcnode-id="1232" instrument_node="">pulmonary respiration</span></strong><span data-dcnode-id="1230" instrument_node="">&nbsp;is the process by which air enters the lungs and then sa i.&nbsp;It is a repetitive event that involves the whole set of organs of the respiratory system.</span></p><span data-dcnode-id="1228" instrument_node="">
</span><h4 data-dcnode-id="1224"><span class="ez-toc-section" data-dcnode-id="1227" id="Pulmonary_Circulation"></span><span data-dcnode-id="1226" instrument_node="">Pulmonary Circulation</span><span class="ez-toc-section-end" data-dcnode-id="1225"></span></h4><span data-dcnode-id="1223" instrument_node="">
</span><p data-dcnode-id="1221"><span data-dcnode-id="1222" instrument_node="">Pulmonary blood flow is peculiar in the sense that it occurs under relatively lower pressures than those of systemic arterioles.</span></p><span data-dcnode-id="1220" instrument_node="">
</span><p data-dcnode-id="1218"><span data-dcnode-id="1219" instrument_node="">The pulmonary blood vessels, especially the capillaries and venules, are made up of very thin and flexible walls.&nbsp;Unlike the systemic capillaries, the pulmonary capillaries increase in diameter.</span></p><span data-dcnode-id="1217" instrument_node="">
</span><p data-dcnode-id="1215"><span data-dcnode-id="1216" instrument_node="">The pulmonary capillaries within the alveolar walls separate adjacent alveoli with increases in blood pressure or decreases in alveolar pressure.</span></p><span data-dcnode-id="1214" instrument_node="">
</span><p data-dcnode-id="1212"><span data-dcnode-id="1213" instrument_node="">Blood flow in the lung is therefore significantly influenced by elastic deformation.&nbsp;Although pulmonary circulation is not significantly affected by neuronal and chemical controls, it responds readily to hypoxia.&nbsp;There is also a systemic blood circulation system at high pressures around the bronchi that is completely independent of the low pressure pulmonary circulation (~ 3330 N / m 2) in healthy individuals.</span></p><span data-dcnode-id="1211" instrument_node="">
</span><h4 data-dcnode-id="1206"><span class="ez-toc-section" data-dcnode-id="1210" id="The_Human_Breath"></span><strong data-dcnode-id="1208"><span data-dcnode-id="1209" instrument_node="">The Human Breath</span></strong><span class="ez-toc-section-end" data-dcnode-id="1207"></span></h4><span data-dcnode-id="1205" instrument_node="">
</span><p data-dcnode-id="1203"><span data-dcnode-id="1204" instrument_node="">In the human species the gases travel through a series of organs that make up the Respiratory Tube.</span></p><span data-dcnode-id="1202" instrument_node="">
</span><p data-dcnode-id="1198"><strong data-dcnode-id="1200"><span data-dcnode-id="1201" instrument_node="">Obtaining the sequence of:</span></strong><span data-dcnode-id="1199" instrument_node="">&nbsp;Nasal Cavities, Pharynx, Larynx, Trachea, Bronchi, Lungs.</span></p><span data-dcnode-id="1197" instrument_node="">
</span><p data-dcnode-id="1194"><strong data-dcnode-id="1195"><span data-dcnode-id="1196" instrument_node="">Inhaling and exhaling</span></strong></p><span data-dcnode-id="1193" instrument_node="">
</span><p class="imagem" data-dcnode-id="1186"><strong data-dcnode-id="1187"><img alt="Pulmonary Respiration" class="lazy" data-dcnode-id="1192" data-original="https://cdn.portalsaofrancisco.com.br/wp-content/uploads/2015/11/respir4.jpg" height="265" loading="lazy" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//cdn.portalsaofrancisco.com.br/wp-content/uploads/2015/11/respir4.jpg&amp;raw" title="Pulmonary Respiration" width="144"><br data-dcnode-id="1191"><span data-dcnode-id="1190" instrument_node="">

Exhaling</span><br data-dcnode-id="1181"><span data-dcnode-id="1180" instrument_node="">
</span></strong></p><span data-dcnode-id="1177" instrument_node="">
</span><p data-dcnode-id="1175"><span data-dcnode-id="1176" instrument_node="">Inhaling comprises the penetration of atmospheric air into the pulmonary alveoli.&nbsp;The exhaling is the elimination of the air contained in the lungs to the external environment.&nbsp;In these mechanisms, the participation of the diaphragm – a flattened muscle that separates the thoracic cavity from the abdominal cavity – and external intercostal muscles – is located between the ribs.</span></p><span data-dcnode-id="1174" instrument_node="">
</span><h4 data-dcnode-id="1170"><span class="ez-toc-section" data-dcnode-id="1173" id="Pulmonary_Ventilation"></span><span data-dcnode-id="1172" instrument_node="">Pulmonary Ventilation</span><span class="ez-toc-section-end" data-dcnode-id="1171"></span></h4><span data-dcnode-id="1169" instrument_node="">
</span><p class="imagem" data-dcnode-id="1164"><img alt="Pulmonary Respiration" class="lazy" data-dcnode-id="1168" data-original="https://cdn.portalsaofrancisco.com.br/wp-content/uploads/2015/11/respir6.jpg" height="232" loading="lazy" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//cdn.portalsaofrancisco.com.br/wp-content/uploads/2015/11/respir6.jpg&amp;raw" title="Pulmonary Respiration" width="326"><strong data-dcnode-id="1165"><br data-dcnode-id="1167"><span data-dcnode-id="1166" instrument_node="">
Pulmonary Ventilation</span></strong></p><span data-dcnode-id="1163" instrument_node="">
</span><blockquote data-dcnode-id="1160"><p data-dcnode-id="1161"><span data-dcnode-id="1162" instrument_node="">It is the process of conducting atmospheric air to the alveoli.</span></p></blockquote><span data-dcnode-id="1159" instrument_node="">
</span><blockquote data-dcnode-id="1144"><p data-dcnode-id="1157"><span data-dcnode-id="1158" instrument_node="">The air penetrates through the nose and mouth and flows to the conductive portion of the system</span></p><span data-dcnode-id="1156" instrument_node="">
</span><p data-dcnode-id="1154"><span data-dcnode-id="1155" instrument_node="">Adjusted to body temperature, filtered and moistened when passing through trachea</span></p><span data-dcnode-id="1153" instrument_node="">
</span><p data-dcnode-id="1151"><span data-dcnode-id="1152" instrument_node="">Air conditioning continues as it enters the two bronchi (leads to the lungs)</span></p><span data-dcnode-id="1150" instrument_node="">
</span><p data-dcnode-id="1148"><span data-dcnode-id="1149" instrument_node="">Bronchi subdivide into numerous bronchioles (leads to alveolar ducts)</span></p><span data-dcnode-id="1147" instrument_node="">
</span><p data-dcnode-id="1145"><span data-dcnode-id="1146" instrument_node="">Terminal branches of the duct are completely surrounded by alveoli (small pockets grouped around the respiratory bronchioles, whose shape and distribution resemble a hive).</span></p></blockquote><span data-dcnode-id="1143" instrument_node="">
</span><h4 data-dcnode-id="1139"><span class="ez-toc-section" data-dcnode-id="1142" id="Lungs"></span><span data-dcnode-id="1141" instrument_node="">Lungs</span><span class="ez-toc-section-end" data-dcnode-id="1140"></span></h4><span data-dcnode-id="1138" instrument_node="">
</span><blockquote data-dcnode-id="1129"><p data-dcnode-id="1136"><span data-dcnode-id="1137" instrument_node="">Main function is gas exchange</span></p><span data-dcnode-id="1135" instrument_node="">
</span><p data-dcnode-id="1133"><span data-dcnode-id="1134" instrument_node="">Transfer the O2 from the air to the venous blood and transfer the CO2 from that blood to the alveolar chambers (vital for the gas exchange – surfactant – Kohn pores)</span></p><span data-dcnode-id="1132" instrument_node="">
</span><p data-dcnode-id="1130"><span data-dcnode-id="1131" instrument_node="">Average volume of 4 to 6 L …</span></p></blockquote><span data-dcnode-id="1128" instrument_node="">
</span><p data-dcnode-id="1126"><span data-dcnode-id="1127" instrument_node="">&nbsp;</span></p><span data-dcnode-id="1125" instrument_node="">
</span><h6 data-dcnode-id="1124"></h6><span data-dcnode-id="1123" instrument_node="">
</span><h4 data-dcnode-id="1119"><span class="ez-toc-section" data-dcnode-id="1122" id="Pulmonary_Respiratory_System"></span><span data-dcnode-id="1121" instrument_node="">Pulmonary Respiratory System</span><span class="ez-toc-section-end" data-dcnode-id="1120"></span></h4><span data-dcnode-id="1118" instrument_node="">
</span><p data-dcnode-id="1113"><span data-dcnode-id="1117" instrument_node="">It is responsible for gas exchange between the body and the environment, a process known as&nbsp;</span><strong data-dcnode-id="1115"><span data-dcnode-id="1116" instrument_node="">lung breathing</span></strong><span data-dcnode-id="1114" instrument_node="">&nbsp;.</span></p><span data-dcnode-id="1112" instrument_node="">
</span><p data-dcnode-id="1110"><span data-dcnode-id="1111" instrument_node="">It is in the lungs that the exchanges with the blood capillaries occur, through millions of pulmonary alveoli.</span></p><span data-dcnode-id="1109" instrument_node="">
</span><p data-dcnode-id="1105"><strong data-dcnode-id="1107"><span data-dcnode-id="1108" instrument_node="">These changes (called hematosis: oxygen uptake and carbon dioxide output) are effected by diffusion:</span></strong><span data-dcnode-id="1106" instrument_node="">&nbsp;the oxygen gas passes from the alveoli to the blood cells.</span></p><span data-dcnode-id="1104" instrument_node="">
</span><p data-dcnode-id="1100"><strong data-dcnode-id="1102"><span data-dcnode-id="1103" instrument_node="">Pulmonary Respiration:</span></strong><span data-dcnode-id="1101" instrument_node="">&nbsp;The lungs are specific to air pockets located inside the body of some living beings, in which air enters and leaves in a process of pulmonary ventilation.&nbsp;In them the gas exchanges are carried out and the oxygen is taken to the whole body through the blood or the hemolymph, having a relation with the circulatory system.</span></p><span data-dcnode-id="1099" instrument_node="">
</span><p data-dcnode-id="1092"><strong data-dcnode-id="1097"><span data-dcnode-id="1098" instrument_node="">Pulmonary Breathing:</span></strong><span data-dcnode-id="1096" instrument_node="">&nbsp;consists of gas exchanges between air and blood.&nbsp;The name of this process is&nbsp;</span><strong data-dcnode-id="1094"><span data-dcnode-id="1095" instrument_node="">hematosis</span></strong><span data-dcnode-id="1093" instrument_node="">&nbsp;, and it occurs in the pulmonary alveoli.&nbsp;In this case, the respiratory gases are O2, used in the process of cellular respiration, and CO2, resulting from this same process.</span></p><span data-dcnode-id="1091" instrument_node="">
</span><h4 data-dcnode-id="1087"><span class="ez-toc-section" data-dcnode-id="1090" id="Pulmonary_ventilation"></span><span data-dcnode-id="1089" instrument_node="">Pulmonary ventilation</span><span class="ez-toc-section-end" data-dcnode-id="1088"></span></h4><span data-dcnode-id="1086" instrument_node="">
</span><p data-dcnode-id="1081"><span data-dcnode-id="1085" instrument_node="">The&nbsp;</span><strong data-dcnode-id="1083"><span data-dcnode-id="1084" instrument_node="">inspiration</span></strong><span data-dcnode-id="1082" instrument_node="">&nbsp;, which promotes the entry of air into the lungs, is caused by the contraction of the muscles of the diaphragm and the intercostal muscles.&nbsp;The diaphragm lowers and the ribs rise, promoting the increase of the rib cage, with consequent reduction of the internal pressure (in relation to the external one), forcing the air to enter the lungs.</span></p><span data-dcnode-id="1080" instrument_node="">
</span><p data-dcnode-id="1075"><span data-dcnode-id="1079" instrument_node="">The&nbsp;</span><strong data-dcnode-id="1077"><span data-dcnode-id="1078" instrument_node="">expiration</span></strong><span data-dcnode-id="1076" instrument_node="">&nbsp;, which promotes the exit of air from the lungs, occurs by relaxing the muscles of the diaphragm and intercostal muscles.&nbsp;The diaphragm rises and the ribs lower, which reduces the volume of the rib cage, with consequent increase of internal pressure, forcing the air out of the lungs.</span></p><span data-dcnode-id="1074" instrument_node="">
</span><h4 data-dcnode-id="1070"><span class="ez-toc-section" data-dcnode-id="1073" id="PULMONARY_VENTILATION"></span><span data-dcnode-id="1072" instrument_node="">PULMONARY VENTILATION</span><span class="ez-toc-section-end" data-dcnode-id="1071"></span></h4><span data-dcnode-id="1069" instrument_node="">
</span><p data-dcnode-id="1067"><span data-dcnode-id="1068" instrument_node="">Our cells need, while alive and performing their functions, a continuous supply of oxygen so that, in a chemical process of cellular respiration, they can generate the energy necessary for their perfect functioning and production of work.</span></p><span data-dcnode-id="1066" instrument_node="">
</span><p data-dcnode-id="1064"><span data-dcnode-id="1065" instrument_node="">In the same way that an automobile engine needs, to produce its mechanical work, in addition to the source of organic energy provided by the fuel (gasoline, alcohol or diesel), of constant oxygen supply;&nbsp;in the same way as a flame in a phosphorus stick, in order to remain lit it needs, besides the organic matter present in the wood of the toothpick, also of oxygen, our cells also, in order to maintain their perfect functioning they need, besides the source of energy provided by the various foods , of a constant supply of oxygen.</span></p><span data-dcnode-id="1063" instrument_node="">
</span><p data-dcnode-id="1061"><span data-dcnode-id="1062" instrument_node="">Oxygen exists in abundance in our atmosphere.&nbsp;And to get it we need our respiratory system.&nbsp;Through it, part of the oxygen in the atmosphere diffuses through a respiratory membrane and reaches our bloodstream, is carried by our blood and taken to the various cells present in the various tissues.&nbsp;The cells, after using the oxygen, release carbon dioxide that, after being transported by the same bloodstream, is also eliminated in the atmosphere by the same respiratory apparatus.</span></p><span data-dcnode-id="1060" instrument_node="">
</span><p data-dcnode-id="1058"><span data-dcnode-id="1059" instrument_node="">In order to allow an adequate diffusion of gases through the respiratory membrane, oxygen passing from the inside of the alveoli to the blood present in the pulmonary capillaries and carbon dioxide diffusing in the opposite direction requires a constant process of pulmonary ventilation.</span></p><span data-dcnode-id="1057" instrument_node="">
</span><p data-dcnode-id="1055"><span data-dcnode-id="1056" instrument_node="">Pulmonary ventilation consists of a continuous renewal of the air present inside the alveoli.&nbsp;For this to occur, it is necessary that, during all the time, movements occur that provide insufflation and deflation of all or almost all the alveoli.&nbsp;This causes, within the alveoli, a pressure slightly, sometimes more negative, and sometimes more positive than that present in the atmosphere.</span></p><span data-dcnode-id="1054" instrument_node="">
</span><p data-dcnode-id="1052"><span data-dcnode-id="1053" instrument_node="">During inspiration, due to an intra-alveolar pressure of approximately 3 mmHg.&nbsp;more negative than atmospheric, a certain amount of atmospheric air is inhaled by the respiratory apparatus;&nbsp;during expiration, due to an intra-alveolar pressure of approximately 3 mmHg.&nbsp;more positive than atmospheric, the same amount of air is returned to the atmosphere.</span></p><span data-dcnode-id="1051" instrument_node="">
</span><p data-dcnode-id="1049"><span data-dcnode-id="1050" instrument_node="">In order for us to inflate and deflate our alveoli, we must inflate and deflate our lungs.&nbsp;This is possible through movements that lead to increase and reduction of the volume inside our rib cage, where our lungs are located.</span></p><span data-dcnode-id="1048" instrument_node="">
</span><p data-dcnode-id="1046"><span data-dcnode-id="1047" instrument_node="">We can expand the volume of our rib cage by lifting our ribs and contracting our diaphragm muscle.</span></p><span data-dcnode-id="1045" instrument_node="">
</span><p data-dcnode-id="1041"><strong data-dcnode-id="1043"><span data-dcnode-id="1044" instrument_node="">To retract the volume of the rib cage we do exactly the opposite: we lower</span></strong><span data-dcnode-id="1042" instrument_node="">&nbsp;our ribs while we relax our diaphragm.</span></p><span data-dcnode-id="1040" instrument_node="">
</span><p data-dcnode-id="1037"><strong data-dcnode-id="1038"><span data-dcnode-id="1039" instrument_node="">So we have several muscles that are very important to us during our breathing:</span></strong></p><span data-dcnode-id="1036" instrument_node="">
</span><blockquote data-dcnode-id="1026"><p data-dcnode-id="1027"><strong data-dcnode-id="1034"><span data-dcnode-id="1035" instrument_node="">Muscles used in inspiration:</span></strong><span data-dcnode-id="1033" instrument_node="">&nbsp;diaphragm, sternocleidomastoids, external intercostals, scalenes, anterior serrations.</span><br data-dcnode-id="1032"><span data-dcnode-id="1031" instrument_node="">
</span><strong data-dcnode-id="1029"><span data-dcnode-id="1030" instrument_node="">Muscles used in exhalation:</span></strong><span data-dcnode-id="1028" instrument_node="">&nbsp;internal intercostals, abdominal straight and other muscles located in the anterior wall of the abdomen.</span></p></blockquote><span data-dcnode-id="1025" instrument_node="">
</span><p data-dcnode-id="1022"><strong data-dcnode-id="1023"><span data-dcnode-id="1024" instrument_node="">During inspiration and during exhalation, the air passes through several different segments that are part of the respiratory system:</span></strong></p><span data-dcnode-id="1021" instrument_node="">
</span><blockquote data-dcnode-id="991"><p data-dcnode-id="992"><strong data-dcnode-id="1019"><span data-dcnode-id="1020" instrument_node="">Nose:</span></strong><span data-dcnode-id="1018" instrument_node="">&nbsp;It is the first segment where, preferably, it passes the air during the inspiration.&nbsp;When passing through the nose, the air is filtered, humidified and heated.&nbsp;In the eventual impossibility of the passage of air through the nose, such passage can happen by a shortcut, the mouth.&nbsp;But unfortunately, when this happens, the air does not undergo the important modifications described above.</span><br data-dcnode-id="1017"><span data-dcnode-id="1016" instrument_node="">
</span><strong data-dcnode-id="1014"><span data-dcnode-id="1015" instrument_node="">Pharynx:</span></strong><span data-dcnode-id="1013" instrument_node="">&nbsp;After passage through the nose, before reaching the larynx, the air must pass through the pharynx, a segment that also serves as a passageway for food.</span><br data-dcnode-id="1012"><span data-dcnode-id="1011" instrument_node="">
</span><strong data-dcnode-id="1009"><span data-dcnode-id="1010" instrument_node="">Larynx:</span></strong><span data-dcnode-id="1008" instrument_node="">Usually allows only air passage.&nbsp;During swallowing of a food, a small membrane (epigloge) obstructs the opening of the larynx, which makes it difficult to pass fragments other than air into the lower respiratory tract.&nbsp;In the larynx are also located the vocal chords, responsible for the production of our voice.</span><br data-dcnode-id="1007"><span data-dcnode-id="1006" instrument_node="">
</span><strong data-dcnode-id="1004"><span data-dcnode-id="1005" instrument_node="">Trachea: A</span></strong><span data-dcnode-id="1003" instrument_node="">&nbsp;small cartilage tube connecting the upper and lower airways, just below.</span><br data-dcnode-id="1002"><span data-dcnode-id="1001" instrument_node="">
</span><strong data-dcnode-id="999"><span data-dcnode-id="1000" instrument_node="">Bronchi:</span></strong><span data-dcnode-id="998" instrument_node="">&nbsp;They are numerous and branching also numerous, like tree branches.&nbsp;Allow air to pass into the alveoli.</span><br data-dcnode-id="997"><span data-dcnode-id="996" instrument_node="">
</span><strong data-dcnode-id="994"><span data-dcnode-id="995" instrument_node="">Bronchioles:</span></strong><span data-dcnode-id="993" instrument_node="">&nbsp;More thin, are between the bronchi and the alveolar sacs, from where the alveoli come out.</span></p></blockquote><span data-dcnode-id="990" instrument_node="">
</span><p data-dcnode-id="988"><span data-dcnode-id="989" instrument_node="">Throughout the respiratory mucosa, from the nose to the bronchioles, there are numerous ciliated cells, with movable cilia, and large mucus production.&nbsp;All this helps a lot in the constant cleaning of the air that flows through the airways.</span></p><span data-dcnode-id="987" instrument_node="">
</span><p data-dcnode-id="985"><span data-dcnode-id="986" instrument_node="">The alveoli have a tendency to collapse.&nbsp;Such a collapse does not normally occur due to the more negative pressure present in pleural space, which forces the lungs to remain expanded.&nbsp;The major factor responsible for the tendency of alveoli to collapse is a phenomenon called Surface Tension.</span></p><span data-dcnode-id="984" instrument_node="">
</span><p data-dcnode-id="982"><span data-dcnode-id="983" instrument_node="">The superficial tension occurs inside the alveoli due to the large quantity of water molecules present and coating, also, all the internal wall of the alveoli.&nbsp;The superficial tension within the alveoli would certainly be much greater than it already is if it were not for the presence of a substance called pulmonary surfactant in the liquid lining the alveoli.&nbsp;Pulmonary surfactant is basically composed of phospholipids (dipalmitoyl lecithin) by cells present in the alveolar epithelium.&nbsp;The major importance of pulmonary surfactant is its ability to significantly reduce the surface tension of liquids lining the interior of the alleles and other airways.</span></p><span data-dcnode-id="981" instrument_node="">
</span></div><span data-dcnode-id="979" instrument_node="">
</span></div><span data-dcnode-id="976" instrument_node="">
