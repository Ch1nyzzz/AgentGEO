="614" instrument_node="">Adjusting to the elevation</span></h2><p data-dcnode-id="611"><span data-dcnode-id="612" instrument_node="">Flatlanders like us typically find adjusting to high elevation a bit bumpy for a few days due to the lower level of oxygen in the air. Categorically, this is referred to as altitude sickness. Individuals experience it in different ways.</span></p></div></div><div class="content__container content__container--html" data-dcnode-id="599"><div class="content__html" data-dcnode-id="600"><p data-dcnode-id="605"><span data-dcnode-id="608" instrument_node="">The mildest form is called acute mountain sickness (AMS), with common symptoms including headache, tiredness, vomiting, confusion, dizziness – and trouble sleeping. (See where this might be heading?) About 20 percent of people feel the effects of AMS after rapidly going up to 8,000 feet; 40 percent do at 10,000 feet.</span><sup data-dcnode-id="606"><span data-dcnode-id="607" instrument_node="">1</span></sup></p><h2 data-dcnode-id="603"><span data-dcnode-id="604" instrument_node="">Elevation and sleep</span></h2><p data-dcnode-id="601"><span data-dcnode-id="602" instrument_node="">High elevation can disrupt your slumber because the low oxygen can directly affect the sleep center of the brain. Frequent awakenings, light sleep, and less total time of sleep are the main problems, though they usually improve after a few nights as your body adjusts to its new reality.</span></p></div></div><div class="content__container content__container--ad-slot" data-dcnode-id="597"><div class="ad-slot ad-slot--halfpage ad-slot--dynamic" data-dcnode-id="598" id="gdfp_0"></div></div><div class="content__container content__container--html" data-dcnode-id="571"><div class="content__html" data-dcnode-id="572"><p data-dcnode-id="592"><span data-dcnode-id="596" instrument_node="">For people with </span><a data-dcnode-id="594" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//sleepapnea.sleep-disorders.net/basics"><span data-dcnode-id="595" instrument_node="">sleep apnea</span></a><span data-dcnode-id="593" instrument_node="">, higher altitude can make breathing more difficult. But other than being out of breath any time I exerted myself on the bike or a hike (the price you pay for adventure), I felt fine when we arrived at a friend’s house in Creede (8,799 ft.).</span></p><p data-dcnode-id="587"><span data-dcnode-id="591" instrument_node="">I dare say I even got a better night’s sleep than most of the household – snoozing a solid 8+ hours every evening. Could it have been because of my </span><a data-dcnode-id="589" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//sleepapnea.sleep-disorders.net/devices"><span data-dcnode-id="590" instrument_node="">CPAP machine</span></a><span data-dcnode-id="588" instrument_node="">? Maybe.</span></p><h2 data-dcnode-id="585"><span data-dcnode-id="586" instrument_node="">CPAP therapy and high elevation</span></h2><p data-dcnode-id="580"><span data-dcnode-id="584" instrument_node="">There’s been limited </span><a data-dcnode-id="582" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//sleepapnea.sleep-disorders.net/research"><span data-dcnode-id="583" instrument_node="">research</span></a><span data-dcnode-id="581" instrument_node=""> into whether CPAP treatment helps people with obstructive sleep apnea (OSA) living at high elevation. </span></p><p data-dcnode-id="573"><span data-dcnode-id="579" instrument_node="">A 2011 study found that people with moderate-to-severe OSA living at higher elevation were more likely to develop </span><a data-dcnode-id="577" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//sleepapnea.sleep-disorders.net/types"><span data-dcnode-id="578" instrument_node="">central sleep apnea</span></a><span data-dcnode-id="576" instrument_node=""> as well. But if they used a properly calibrated PAP machine, those who had developed central sleep apnea at higher altitudes did show clear improvements.</span><sup data-dcnode-id="574"><span data-dcnode-id="575" instrument_node="">2</span></sup></p></div></div><div class="content__container content__container--ad-slot" data-dcnode-id="569"><div class="ad-slot ad-slot--square ad-slot--dynamic" data-dcnode-id="570" id="gdfp_0"></div></div><div class="content__container content__container--html" data-dcnode-id="546"><div class="content__html" data-dcnode-id="547"><h3 data-dcnode-id="567"><span data-dcnode-id="568" instrument_node="">CPAP and high-altitude pulmonary edema</span></h3><p data-dcnode-id="563"><span data-dcnode-id="566" instrument_node="">CPAP therapy is also a tested temporary treatment for people who suffer from a very severe form of altitude sickness, high-altitude pulmonary edema (HAPE). With HAPE, fluid collects in the lungs of even healthy people when they rapidly go up in elevation. CPAP is used temporarily until sufferers can descend to lower elevation and receive supplemental oxygen.</span><sup data-dcnode-id="564"><span data-dcnode-id="565" instrument_node="">3</span></sup></p><h2 data-dcnode-id="561"><span data-dcnode-id="562" instrument_node="">Would my CPAP work in the Rockies?</span></h2><p data-dcnode-id="559"><span data-dcnode-id="560" instrument_node="">This is all knowledge gained after the fact, however. Although we travel to Colorado at least once a year, it honestly never occurred to me to investigate whether my CPAP would even work up in the Rockies!</span></p><p data-dcnode-id="557"><span data-dcnode-id="558" instrument_node="">Because I started out sleeping just fine, it wouldn’t have occurred to me this time either. Then we got to Leadville.</span></p><h2 data-dcnode-id="555"><span data-dcnode-id="556" instrument_node="">Two-mile-high city blues</span></h2><p data-dcnode-id="553"><span data-dcnode-id="554" instrument_node="">Leadville, CO, is the highest incorporated city in the U.S. at 10,152 feet – that’s almost 2 miles above sea level. I could feel it in every turn of my bike pedal, every step up a flight of stairs. And, for the first time, I felt it lying down as well.</span></p><p data-dcnode-id="548"><span data-dcnode-id="552" instrument_node="">At times, my heart pounded as I struggled to catch my breath. Putting on my </span><a data-dcnode-id="550" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//sleepapnea.sleep-disorders.net/living/choosing-cpap-mask"><span data-dcnode-id="551" instrument_node="">full-face mask</span></a><span data-dcnode-id="549" instrument_node="">, the pressure of the air streaming from my CPAP felt smothering, causing me moments of panic until I removed the mask for a breather.</span></p></div></div><div class="content__container content__container--nexus-poll" data-dcnode-id="512"><div data-dcnode-id="513" isfeatured="true" polldata="[object Object]"><div class="poll" data-dcnode-id="514" data-v-3f2b8781=""><div class="poll__main-container" data-dcnode-id="516" data-v-3f2b8781=""><div class="poll__image-container" data-dcnode-id="544" data-v-3f2b8781=""><img alt="poll graphic" class="poll__image" data-dcnode-id="545" data-v-3f2b8781="" height="129" loading="lazy" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//sleepapnea.sleep-disorders.net/common/nexus/poll_125.png&amp;raw" width="129"></div><div class="poll__content-container" data-dcnode-id="517" data-v-3f2b8781=""><h2 class="poll__heading" data-dcnode-id="542" data-v-3f2b8781=""><span data-dcnode-id="543" instrument_node=""> Community Poll </span></h2><p class="poll__question" data-dcnode-id="540" data-v-3f2b8781=""><span data-dcnode-id="541" instrument_node=""> Has high altitude ever affected your sleep or CPAP machine? </span></p><form class="poll-form" data-dcnode-id="518" data-v-0f460ba8="" data-v-3f2b8781=""><div class="poll-form__questions-container" data-dcnode-id="521" data-v-0f460ba8=""><div class="input-group poll-form__answers" data-dcnode-id="522" data-v-0f460ba8=""><fieldset data-dcnode-id="523"><div class="radio-button" data-dcnode-id="534" data-v-a84b826a="" limit="0" option-id="31102"><input class="radio-button__input" data-dcnode-id="538" data-v-a84b826a="" id="8007-31102" name="poll_8007" type="radio" value="31102"><label class="radio-button__label" data-dcnode-id="536" data-v-a84b826a="" for="8007-31102"><span data-dcnode-id="537" instrument_node=""> Yes </span></label></div><div class="radio-button" data-dcnode-id="529" data-v-a84b826a="" limit="0" option-id="31103"><input class="radio-button__input" data-dcnode-id="533" data-v-a84b826a="" id="8007-31103" name="poll_8007" type="radio" value="31103"><label class="radio-button__label" data-dcnode-id="531" data-v-a84b826a="" for="8007-31103"><span data-dcnode-id="532" instrument_node=""> No </span></label></div><div class="radio-button" data-dcnode-id="524" data-v-a84b826a="" limit="0" option-id="31104"><input class="radio-button__input" data-dcnode-id="528" data-v-a84b826a="" id="8007-31104" name="poll_8007" type="radio" value="31104"><label class="radio-button__label" data-dcnode-id="526" data-v-a84b826a="" for="8007-31104"><span data-dcnode-id="527" instrument_node=""> I'm not sure </span></label></div></fieldset></div></div><button class="poll-form__submit-button button" data-dcnode-id="519" data-v-0f460ba8="" type="submit"><span data-dcnode-id="520" instrument_node="">Submit</span></button></form></div></div></div></div></div><div class="content__container content__container--html" data-dcnode-id="486"><div class="content__html" data-dcnode-id="487"><h2 data-dcnode-id="510"><span data-dcnode-id="511" instrument_node="">Something was off with my AHI readings</span></h2><p data-dcnode-id="505"><span data-dcnode-id="509" instrument_node="">I woke up several times the first night, </span><a data-dcnode-id="507" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//sleepapnea.sleep-disorders.net/clinical/arousals"><span data-dcnode-id="508" instrument_node="">easily roused</span></a><span data-dcnode-id="506" instrument_node="">. I knew something was off when I looked at my sleep report the next morning. My AHI reading was 0.9! An average of less than 1 apnea per hour (a fraction of my normal reading)? Ha ha ha. If that were true, I should have been feeling awesome. Instead, I was drowsy. At the time, I couldn’t figure it out. In hindsight, I have a clue.</span></p><h2 data-dcnode-id="503"><span data-dcnode-id="504" instrument_node="">Pressure levels and PAP machine limits</span></h2><p data-dcnode-id="501"><span data-dcnode-id="502" instrument_node="">People talk about the air at high elevation being “thinner” because there are fewer oxygen molecules. Few oxygen molecules also mean a drop in the air pressure. So, the pressure exerted by the machine is lower than your prescribed pressure, even when it’s set at the pressure level your healthcare provider prescribed.</span></p><p data-dcnode-id="499"><span data-dcnode-id="500" instrument_node="">Fortunately, modern CPAP systems include a function called “auto-altitude adjustment,” where the machine automatically detects changes in elevation and adjusts the therapy pressure accordingly. But there’s a limit. For example, my ResMed Autosense 10 does adjust automatically to elevation. But the user manual also clearly states that it’s guaranteed valid only to 8,000 feet.</span></p><p data-dcnode-id="497"><span data-dcnode-id="498" instrument_node="">That’s usually plenty – but not in a perch like Leadville. So, my machine was struggling, and so was I, at least for a few days.</span></p><h2 data-dcnode-id="495"><span data-dcnode-id="496" instrument_node="">Talk to your healthcare provider</span></h2><p data-dcnode-id="493"><span data-dcnode-id="494" instrument_node="">Now I know that super-high elevation can affect both me AND my CPAP machine. So, if I plan to spend any nights well above 8,000 feet on my next vacation, I’m planning to talk to my doctor beforehand. </span></p><p data-dcnode-id="488"><span data-dcnode-id="492" instrument_node="">There are other treatments, such as a short course of the diuretic drug acetazolamide, that have been shown to help where a CPAP falls a little short.</span><sup data-dcnode-id="490"><span data-dcnode-id="491" instrument_node="">4</span></sup><span data-dcnode-id="489" instrument_node="">. Because this flatlander isn’t giving up her love for the mountains over a little less oxygen!</span></p></div></div><div class="content__container content__container--lead-gen" data-dcnode-id="468"><div class="lead-gen" data-dcnode-id="469"><form class="lead-gen__form" data-dcnode-id="470" method="post"><input data-dcnode-id="485" name="campaign" type="hidden" value="shortcode"><input data-dcnode-id="484" name="source" type="hidden" value="site"><div class="lead-gen__input-container" data-dcnode-id="476"><label class="lead-gen__label" data-dcnode-id="482" for="leadgen-email-address"><span data-dcnode-id="483" instrument_node=""> Sign up for emails from SleepApnea.Sleep-Disorders.net: </span></label><div class="text-input lead-gen__input text-input--full-width" data-dcnode-id="479"><input class="text-input__input" data-dcnode-id="480" id="leadgen-email-address" name="email" placeholder="Enter email address" type="email" value=""></div><button class="button lead-gen__button" data-dcnode-id="477" data-gtm_action="form_submit" data-gtm_category="lead_gen" data-gtm_label="lead_gen_shortcode"><span data-dcnode-id="478" instrument_node=""> Subscribe </span></button></div><p class="lead-gen__disclaimer disclaimer-text" data-dcnode-id="471"><span data-dcnode-id="475" instrument_node="">By providing your email address, you are agreeing to our </span><a data-dcnode-id="473" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//sleepapnea.sleep-disorders.net/privacy-policy"><span data-dcnode-id="474" instrument_node=""> privacy policy</span></a><spa
