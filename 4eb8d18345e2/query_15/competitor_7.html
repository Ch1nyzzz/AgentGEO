</span><article class="article" data-dcnode-id="974"><span data-dcnode-id="6538" instrument_node="">
</span><p class="fulltext" data-dcnode-id="6537"></p><div class="hlFld-Abstract" data-dcnode-id="6484"><p class="fulltext" data-dcnode-id="6535"></p><a class="scroll-offset" data-dcnode-id="6534" data-feathr-click-track="true" name="abstract"></a><div class="sectionInfo abstractSectionHeading" data-dcnode-id="6488"><h4 class="sectionHeading" data-dcnode-id="6532"><span data-dcnode-id="6533" instrument_node="">Abstract</span></h4><div class="sectionJumpTo" data-dcnode-id="6489"><div class="content" data-dcnode-id="6490"><div class="sectionLabel" data-dcnode-id="6530"><span data-dcnode-id="6531" instrument_node="">Section:</span></div><form data-dcnode-id="6494" style="margin-bottom:0"><select class="fulltextdd" data-dcnode-id="6495" name="select23" onchange="GoTo(this, 'self')"><option data-dcnode-id="6528" selected="#" value="#">Choose</option><option data-dcnode-id="6526" value="#">Top of page</option><option data-dcnode-id="6524" value="">Abstract &lt;&lt;</option><option data-dcnode-id="6522" value="#_i2">The Aircraft Cabin Enviro...</option><option data-dcnode-id="6520" value="#_i3">Consequences of Hypobaric...</option><option data-dcnode-id="6518" value="#_i6">Comorbid Cardiac Disease</option><option data-dcnode-id="6516" value="#_i7">Risk of Venous Thromboemb...</option><option data-dcnode-id="6514" value="#_i8">Assessment of Fitness to ...</option><option data-dcnode-id="6512" value="#_i9">Preflight Screening: Hist...</option><option data-dcnode-id="6510" value="#_i10">Preflight Screening: Asse...</option><option data-dcnode-id="6508" value="#_i11">Interpretation of Hypoxic...</option><option data-dcnode-id="6506" value="#_i12">Supplementary Oxygen</option><option data-dcnode-id="6504" value="#_i13">Arrangement of Supplement...</option><option data-dcnode-id="6502" value="#_i14">Respiratory Disease–Speci...</option><option data-dcnode-id="6500" value="#_i23">Conclusions</option><option data-dcnode-id="6498" value="#_i24">References</option><option data-dcnode-id="6496" value="#citart1">CITING ARTICLES</option></select></form><div class="nextPrevSec" data-dcnode-id="6491"><a class="down" data-dcnode-id="6492" data-feathr-click-track="true" href="#_i2"><img alt="Next section" border="0" data-dcnode-id="6493" height="9" hspace="5" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.atsjournals.org/templates/jsp/images/arrow_down.gif&amp;raw" width="11"></a></div></div></div></div><div class="abstractSection abstractInFull" data-dcnode-id="6485"><p data-dcnode-id="6486"><span data-dcnode-id="6487" instrument_node="">Patients with chronic lung disease may have mild hypoxemia at sea level. Some of these cases may go unrecognized, and even among those who are known to be hypoxemic, some do not use supplemental oxygen. During air travel in a hypobaric hypoxic environment, compensatory pulmonary mechanisms may be inadequate in patients with lung disease despite normal sea-level oxygen requirements. In addition, compensatory cardiovascular mechanisms may be less effective in some patients who are unable to increase cardiac output. Air travel also presents an increased risk of venous thromboembolism. Patients with cystic lung disease may also be at increased risk of pneumothorax. Although overall this risk appears to be relatively low, should a pneumothorax occur, it could present a significant challenge to the patient with chronic lung disease, particularly if hypoxemia is already present. As such, a thorough assessment of patients with chronic lung disease and cardiac disease who are contemplating air travel should be performed. The duration of the planned flight, the anticipated levels of activity, comorbid illnesses, and the presence of risk factors for venous thromboembolism are important considerations. Hypobaric hypoxic challenge testing reproduces an environment most similar to that encountered during actual air travel; however, it is not widely available. Assessment for hypoxia is otherwise best performed using a normobaric hypoxic challenge test. Patients in need of supplemental oxygen need to contact the airline and request this accommodation during flight. They should also be advised on arranging portable oxygen concentrators before air travel, and a discussion of the potential risks of travel should take place.</span></p></div></div><div class="abstractKeywords" data-dcnode-id="6464"><div class="hlFld-KeywordText" data-dcnode-id="6467"><kwd-group data-dcnode-id="6468"><b data-dcnode-id="6481"><span data-dcnode-id="6482" instrument_node="">Keywords</span></b><span data-dcnode-id="6480" instrument_node="">: </span><a class="attributes" data-dcnode-id="6478" data-feathr-click-track="true" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.atsjournals.org/keyword/Air%2BTravel%2BComplications"><span data-dcnode-id="6479" instrument_node="">air travel complications</span></a><span data-dcnode-id="6477" instrument_node="">; </span><a class="attributes" data-dcnode-id="6475" data-feathr-click-track="true" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.atsjournals.org/keyword/Hypoxia"><span data-dcnode-id="6476" instrument_node="">hypoxia</span></a><span data-dcnode-id="6474" instrument_node="">; </span><a class="attributes" data-dcnode-id="6472" data-feathr-click-track="true" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.atsjournals.org/keyword/Hypoxic%2BChallenge%2BTesting"><span data-dcnode-id="6473" instrument_node="">hypoxic challenge testing</span></a><span data-dcnode-id="6471" instrument_node="">; </span><a class="attributes" data-dcnode-id="6469" data-feathr-click-track="true" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.atsjournals.org/keyword/Chronic%2BLung%2BDisease"><span data-dcnode-id="6470" instrument_node="">chronic lung disease</span></a></kwd-group></div><span class="ellipsis" data-dcnode-id="6465" style="display:none"><span data-dcnode-id="6466" instrument_node="">... Show All</span></span></div><div class="hlFld-Fulltext ui-helper-clearfix" data-dcnode-id="997"><p data-dcnode-id="6449"><span data-dcnode-id="6462" instrument_node="">Each year worldwide, more than 2.75 billion passengers travel by air, 736 million in the United States alone (</span><a class="ref showRefEvent" data-dcnode-id="6460" data-feathr-click-track="true" data-reflink="_i24" data-rid="bib1" href="#"><span data-dcnode-id="6461" instrument_node="">1</span></a><span data-dcnode-id="6459" instrument_node="">). One study reports that over an approximately 3-year period, there were 11,920 in-flight medical emergency calls made by airlines to a medical communications center; this was estimated to represent almost 1 medical emergency for every 600 flights (</span><a class="ref showRefEvent" data-dcnode-id="6457" data-feathr-click-track="true" data-reflink="_i24" data-rid="bib2" href="#"><span data-dcnode-id="6458" instrument_node="">2</span></a><span data-dcnode-id="6456" instrument_node="">). Respiratory symptoms accounted for 12% of these in-air emergencies. The development of respiratory symptoms during flight was associated with an increased risk of hospitalization after air travel (odds ratio [OR], 2.13), second only to possible stroke (OR, 3.36). A previous study reported an average of 72 in-flight deaths per year (</span><a class="ref showRefEvent" data-dcnode-id="6454" data-feathr-click-track="true" data-reflink="_i24" data-rid="bib3" href="#"><span data-dcnode-id="6455" instrument_node="">3</span></a><span data-dcnode-id="6453" instrument_node="">), from a population representing approximately 50–60% of the total estimated number of worldwide passengers for that period. Of those deaths, 69% occurred in passengers with no known previous medical illness (</span><a class="ref showRefEvent" data-dcnode-id="6451" data-feathr-click-track="true" data-reflink="_i24" data-rid="bib3" href="#"><span data-dcnode-id="6452" instrument_node="">3</span></a><span data-dcnode-id="6450" instrument_node="">).</span></p><div class="NLM_sec NLM_sec_level_1" data-dcnode-id="6385"><a class="scroll-offset" data-dcnode-id="6447" data-feathr-click-track="true" name="_i2"></a><div class="sectionInfo" data-dcnode-id="6400"><div class="sectionHeading" data-dcnode-id="6445"><span data-dcnode-id="6446" instrument_node="">The Aircraft Cabin Environment</span></div><div class="sectionJumpTo" data-dcnode-id="6401"><div class="sectionLabel" data-dcnode-id="6443"><span data-dcnode-id="6444" instrument_node="">Section:</span></div><form data-dcnode-id="6407" style="margin-bottom:0"><select class="fulltextdd" data-dcnode-id="6408" name="select23" onchange="GoTo(this, 'self')"><option data-dcnode-id="6441" selected="#" value="#">Choose</option><option data-dcnode-id="6439" value="#">Top of page</option><option data-dcnode-id="6437" value="#abstract">Abstract</option><option data-dcnode-id="6435" value="">The Aircraft Cabin Enviro... &lt;&lt;</option><option data-dcnode-id="6433" value="#_i3">Consequences of Hypobaric...</option><option data-dcnode-id="6431" value="#_i6">Comorbid Cardiac Disease</option><option data-dcnode-id="6429" value="#_i7">Risk of Venous Thromboemb...</option><option data-dcnode-id="6427" value="#_i8">Assessment of Fitness to ...</option><option data-dcnode-id="6425" value="#_i9">Preflight Screening: Hist...</option><option data-dcnode-id="6423" value="#_i10">Preflight Screening: Asse...</option><option data-dcnode-id="6421" value="#_i11">Interpretation of Hypoxic...</option><option data-dcnode-id="6419" value="#_i12">Supplementary Oxygen</option><option data-dcnode-id="6417" value="#_i13">Arrangement of Supplement...</option><option data-dcnode-id="6415" value="#_i14">Respiratory Disease–Speci...</option><option data-dcnode-id="6413" value="#_i23">Conclusions</option><option data-dcnode-id="6411" value="#_i24">References</option><option data-dcnode-id="6409" value="#citart1">CITING ARTICLES</option></select></form><div class="nextPrevSec" data-dcnode-id="6402"><a class="up" data-dcnode-id="6405" data-feathr-click-track="true" href="#abstract"><img alt="Previous section" border="0" data-dcnode-id="6406" height="9" hspace="5" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.atsjournals.org/templates/jsp/images/arrow_up.gif&amp;raw" width="11"></a><a class="down" data-dcnode-id="6403" data-feathr-click-track="true" href="#_i3"><img alt="Next section" border="0" data-dcnode-id="6404" height="9" hspace="5" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.atsjournals.org/templates/jsp/images/arrow_down.gif&amp;raw" width="11"></a></div></div></div><p data-dcnode-id="6386"><span data-dcnode-id="6399" instrument_node="">Cruising altitudes of commercial aircraft typically range from approximately 30,000 to 40,000 feet, but at times may reach altitudes of 60,000 feet (</span><a class="ref showRefEvent" data-dcnode-id="6397" data-feathr-click-track="true" data-reflink="_i24" data-rid="bib4" href="#"><span data-dcnode-id="6398" instrument_node="">4</span></a><span data-dcnode-id="6396" instrument_node="">). However, the cabin altitude pressure equivalent is maintained at approximately 5,000–8,000 feet with cabin pressurization of approximately 520–570 mm Hg (</span><a class="ref showRefEvent" data-dcnode-id="6394" data-feathr-click-track="true" data-reflink="_i24" data-rid="bib5" href="#"><span data-dcnode-id="6395" instrument_node="">5</span></a><span data-dcnode-id="6393" instrument_node="">). Federal Aviation Administration (FAA) regulations require an aircraft to be capable of maintaining a minimal cabin pressure equivalent to an altitude of 8,000 feet under normal operating conditions (</span><a class="ref showRefEvent" data-dcnode-id="6391" data-feathr-click-track="true" data-reflink="_i24" data-rid="bib6" href="#"><span data-dcnode-id="6392" instrument_node="">6</span></a><span data-dcnode-id="6390" instrument_node="">). Pressurization of the aircraft cabin is achieved using exterior air that is compressed and mixed with filtered and recirculated cabin air. Up to 50% of the cabin air is not recirculated and is expelled, to be replaced with exterior air, with 20–30 complete air exchanges occurring per hour (</span><a class="ref showRefEvent" data-dcnode-id="6388" data-feathr-click-track="true" data-reflink="_i24" data-rid="bib7" href="#"><span data-dcnode-id="6389" instrument_node="">7</span></a><span data-dcnode-id="6387" instrument_node="">). As the aircraft ascends, the decreasing cabin air pressure results in gas expansion, which can cause a “popping” sensation in the ears of passengers due to air escaping from the middle ear and the sinuses.</span></p></div><div class="NLM_sec NLM_sec_level_1" data-dcnode-id="5724"><a class="scroll-offset" data-dcnode-id="6383" data-feathr-click-track="true" name="_i3"></a><div class="sectionInfo" data-dcnode-id="6336"><div class="sectionHeading" data-dcnode-id="6381"><span data-dcnode-id="6382" instrument_node="">Consequences of Hypobaric Hypoxia and Compensatory Mechanisms</span></div><div class="sectionJumpTo" data-dcnode-id="6337"><div class="sectionLabel" data-dcnode-id="6379"><span data-dcnode-id="6380" instrument_node="">Section:</span></div><form data-dcnode-id="6343" style="margin-bottom:0"><select class="fulltextdd" data-dcnode-id="6344" name="select23" onchange="GoTo(this, 'self')"><option data-dcnode-id="6377" selected="#" value="#">Choose</option><option data-dcnode-id="6375" value="#">Top of page</option><option data-dcnode-id="6373" value="#abstract">Abstract</option><option data-dcnode-id="6371" value="#_i2">The Aircraft Cabin Enviro...</option><option data-dcnode-id="6369" value="">Consequences of Hypobaric... &lt;&lt;</option><option data-dcnode-id="6367" value="#_i6">Comorbid Cardiac Disease</option><option data-dcnode-id="6365" value="#_i7">Risk of Venous Thromboemb...</option><option data-dcnode-id="6363" value="#_i8">Assessment of Fitness to ...</option><option data-dcnode-id="6361" value="#_i9">Preflight Screening: Hist...</option><option data-dcnode-id="6359" value="#_i10">Preflight Screening: Asse...</option><option data-dcnode-id="6357" value="#_i11">Interpretation of Hypoxic...</option><option data-dcnode-id="6355" value="#_i12">Supplementary Oxygen</option><option data-dcnode-id="6353" value="#_i13">Arrangement of Supplement...</option><option data-dcnode-id="6351" value="#_i14">Respiratory Disease–Speci...</option><option data-dcnode-id="6349" value="#_i23">Conclusions</option><option data-dcnode-id="6347" value="#_i24">References</option><option data-dcnode-id="6345" value="#citart1">CITING ARTICLES</option></select></form><div class="nextPrevSec" data-dcnode-id="6338"><a class="up" data-dcnode-id="6341" data-feathr-click-track="true" href="#_i2"><img alt="Previous section" border="0" data-dcnode-id="6342" height="9" hspace="5" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.atsjournals.org/templates/jsp/images/arrow_up.gif&amp;raw" width="11"></a><a class="down" data-dcnode-id="6339" data-feathr-click-track="true" href="#_i6"><img alt="Next section" border="0" data-dcnode-id="6340" height="9" hspace="5" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.atsjournals.org/templates/jsp/images/arrow_down.gif&amp;raw" width="11"></a></div></div></div><p data-dcnode-id="6296"><span data-dcnode-id="6335" instrument_node="">At 8,000 feet, the reduced barometric pressure and decreased partial pressure of oxygen is equivalent to breathing air that contains approximately 15.1% of oxygen while at sea level. This calculation forms the basis of the normobaric hypoxic challenge test, and results in a partial pressure of inspired oxygen of 100–105 mm Hg and partial pressure of arterial oxygen (Pa</span><sub data-dcnode-id="6331"><span data-dcnode-id="6334" instrument_node="">O</span><sub data-dcnode-id="6332"><span data-dcnode-id="6333" instrument_node="">2</span></sub></sub><span data-dcnode-id="6330" instrument_node="">) of approximately 60–70 mm Hg in healthy individuals (</span><a class="ref showRefEvent" data-dcnode-id="6328" data-feathr-click-track="true" data-reflink="_i24" data-rid="bib4" href="#"><span data-dcnode-id="6329" instrument_node="">4</span></a><span data-dcnode-id="6327" instrument_node="">). </span><span class="figure refFigure figuresContent" data-dcnode-id="6323" id="ref-fig1"><a class="showFiguresEEvent figure-no-fig1" data-attr-fig-id="fig1" data-dcnode-id="6324" data-feathr-click-track="true" href="#" title="Open Figure Viewer"><span data-dcnode-id="6326" instrument_node="">Figure 1</span><span class="overlay" data-dcnode-id="6325"></span></a></span><span data-dcnode-id="6322" instrument_node=""> illustrates the estimated alveolar oxygen tension (P</span><span class="smallcaps smallerCapital" data-dcnode-id="6320"><span data-dcnode-id="6321" instrument_node="">a</span></span><sub data-dcnode-id="6316"><span data-dcnode-id="6319" instrument_node="">O</span><sub data-dcnode-id="6317"><span data-dcnode-id="6318" instrument_node="">2</span></sub></sub><span data-dcnode-id="6315" instrument_node="">) with typical cabin altitudes experienced during commercial air travel, assuming a normal Pa</span><sub data-dcnode-id="6311"><span data-dcnode-id="6314" instrument_node="">CO</span><sub data-dcnode-id="6312"><span data-dcnode-id="6313" instrument_node="">2</span></sub></sub><span data-dcnode-id="6310" instrument_node=""> and a respiratory quotient of 0.8. In most healthy individuals, such a decrease in P</span><span class="smallcaps smallerCapital" data-dcnode-id="6308"><span data-dcnode-id="6309" instrument_node="">a</span></span><sub data-dcnode-id="6304"><span data-dcnode-id="6307" instrument_node="">O</span><sub data-dcnode-id="6305"><span data-dcnode-id="6306" instrument_node="">2</span></sub></sub><span data-dcnode-id="6303" instrument_node=""> as is seen at 8,000 feet is of little physiological consequence, as the compensatory mechanisms that occur with hypobaric hypoxia lead to increased minute ventilation, as well as increased heart rate and cardiac output (</span><a class="ref showRefEvent" data-dcnode-id="6301" data-feathr-click-track="true" data-reflink="_i24" data-rid="bib8" href="#"><span data-dcnode-id="6302" instrument_node="">8</span></a><span data-dcnode-id="6300" instrument_node="">, </span><a class="ref showRefEvent" data-dcnode-id="6298" data-feathr-click-track="true" data-reflink="_i24" data-rid="bib9" href="#"><span data-dcnode-id="6299" instrument_node="">9</span></a><span data-dcnode-id="6297" instrument_node="">).</span></p><div class="figure figuresContent" data-dcnode-id="6244" id="extrafiglink-fig1"><div class="holder" data-dcnode-id="6245"><a class="thumbnail showFiguresEEvent" data-attr-fig-id="fig1" data-dcnode-id="6293" data-feathr-click-track="true" href="#" title="Open Figure Viewer"><img alt="figure" data-dcnode-id="6295" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.atsjournals.org/na101/home/literatum/publisher/thoracic/journals/content/annalsats/2014/annalsats.2014.11.issue-10/annalsats.201406-234ps/20141226/images/medium/annalsats.201406-234ps_f1.gif&amp;raw"><span class="overlay" data-dcnode-id="6294"></span></a><div class="caption" data-dcnode-id="6246"><p data-dcnode-id="6257"><span class="captionLabel" data-dcnode-id="6290"><b data-dcnode-id="6291"><span data-dcnode-id="6292" instrument_node="">Figure 1.</span></b></span><span data-dcnode-id="6289" instrument_node=""> Relationship between cabin altitude and calculated alveolar oxygen tension (P</span><span class="smallcaps smallerCapital" data-dcnode-id="6287"><span data-dcnode-id="6288" instrument_node="">a</span></span><sub data-dcnode-id="6283"><span data-dcnode-id="6286" instrument_node="">O</span><sub data-dcnode-id="6284"><span data-dcnode-id="6285" instrument_node="">2</span></sub></sub><span data-dcnode-id="6282" instrument_node="">) in a person with normal P</span><span class="smallcaps smallerCapital" data-dcnode-id="6280"><span data-dcnode-id="6281" instrument_node="">a</span></span><sub data-dcnode-id="6276"><span data-dcnode-id="6279" instrument_node="">O</span><sub data-dcnode-id="6277"><span data-dcnode-id="6278" instrument_node="">2</span></sub></sub><span data-dcnode-id="6275" instrument_node=""> at sea level, an individual “at risk,” with decreased P</span><span class="smallcaps smallerCapital" data-dcnode-id="6273"><span data-dcnode-id="6274" instrument_node="">a</span></span><sub data-dcnode-id="6269"><span data-dcnode-id="6272" instrument_node="">O</span><sub data-dcnode-id="6270"><span data-dcnode-id="6271" instrument_node="">2</span></sub></sub><span data-dcnode-id="6268" instrument_node=""> that is within normal limits, and an individual with a P</span><span class="smallcaps smallerCapital" data-dcnode-id="6266"><span data-dcnode-id="6267" instrument_node="">a</span></span><sub data-dcnode-id="6262"><span data-dcnode-id="6265" instrument_node="">O</span><sub data-dcnode-id="6263"><span data-dcnode-id="6264" instrument_node="">2</span></sub></sub><span data-dcnode-id="6261" instrument_node=""> at sea level that would be associated with significant hypoxemia. Also indicated are altitude thresholds whereby pilot, air crew, and healthy passengers are required to use supplemental oxygen as per Federal Aviation Administration regulations. Data adapted by permission from Reference </span><a class="ref showRefEvent" data-dcnode-id="6259" data-feathr-click-track="true" data-reflink="_i24" data-rid="bib20" href="#"><span data-dcnode-id="6260" instrument_node="">20</span></a><span data-dcnode-id="6258" instrument_node="">.</span></p><div class="figure-links" data-dcnode-id="6251"><a data-dcnode-id="6255" data-feathr-click-track="true" download="" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.atsjournals.org/na101/home/literatum/publisher/thoracic/journals/content/annalsats/2014/annalsats.2014.11.issue-10/annalsats.201406-234ps/20141226/images/large/annalsats.201406-234ps_f1.jpeg"><span data-dcnode-id="6256" instrument_node="">
            Download Figure
            </span></a><span data-dcnode-id="6254" instrument_node=""> | </span><a data-dcnode-id="6252" data-feathr-click-track="true" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.atsjournals.org/action/downloadFigures%3Fid%3Dfig1%26doi%3D10.1513%252FAnnalsATS.201406-234PS"><span data-dcnode-id="6253" instrument_node="">Download Powerpoint</span></a></div><a class="showFigCap" data-dcnode-id="6249" data-feathr-click-track="true" href="#"><span data-dcnode-id="6250" instrument_node=""> [More]</span></a><a class="hideFigCap" data-dcnode-id="6247" data-feathr-click-track="true" href="#"><span data-dcnode-id="6248" instrument_node=""> [Minimize]</span></a></div></div></div><p data-dcnode-id="6232"><span class="figure refFigure figuresContent" data-dcnode-id="6240" id="ref-fig1"><a class="showFiguresEEvent figure-no-fig1" data-attr-fig-id="fig1" data-dcnode-id="6241" data-feathr-click-track="true" href="#" title="Open Figure Viewer"><span data-dcnode-id="6243" instrument_node="">Figure 1</span><span class="overlay" data-dcnode-id="6242"></span></a></span><span data-dcnode-id="6239" instrument_node=""> further illustrates how, in contrast to a healthy individual, other individuals may be at increased risk of significant hypoxemia, even at altitudes within the normal operating range of the aircraft. Compensatory mechanisms in patients with pulmonary or cardiac disease may also be less effective, placing these patients at further risk of significant hypoxemia (</span><a class="ref showRefEvent" data-dcnode-id="6237" data-feathr-click-track="true" data-reflink="_i24" data-rid="bib10" href="#"><span data-dcnode-id="6238" instrument_node="">10</span></a><span data-dcnode-id="6236" instrument_node="">–</span><a class="ref showRefEvent" data-dcnode-id="6234" data-feathr-click-track="true" data-reflink="_i24" data-rid="bib15" href="#"><span data-dcnode-id="6235" instrument_node="">15</span></a><span data-dcnode-id="6233" instrument_node="">).</span></p><p data-dcnode-id="6216"><span data-dcnode-id="6231" instrument_node="">The interactions between those factors predisposing to hypoxemia, the presence of comorbid illness, and the compensatory mechanisms in response to hypoxemia are illustrated in </span><span class="figure refFigure figuresContent" data-dcnode-id="6227" id="ref-fig2"><a class="showFiguresEEvent figure-no-fig2" data-attr-fig-id="fig2" data-dcnode-id="6228" data-feathr-click-track="true" href="#" title="Open Figure Viewer"><span data-dcnode-id="6230" instrument_node="">Figure 2</span><span class="overlay" data-dcnode-id="6229"></span></a></span><span data-dcnode-id="6226" instrument_node="">. In expiratory flow–limited patients, for example, an increase in minute ventilation may result in hyperinflation (</span><a class="ref showRefEvent" data-dcnode-id="6224" data-feathr-click-track="true" data-reflink="_i24" data-rid="bib16" href="#"><span data-dcnode-id="6225" instrument_node="">16</span></a><span data-dcnode-id="6223" instrument_node="">), and further exacerbate respiratory discomfort (</span><a class="ref showRefEvent" data-dcnode-id="6221" data-feathr-click-track="true" data-reflink="_i24" data-rid="bib17" href="#"><span data-dcnode-id="6222" instrument_node="">17</span></a><span data-dcnode-id="6220" instrument_node="">). In patients with restrictive lung disease (e.g., interstitial lung disease, kyphoscoliosis, and obesity), although an increase in minute ventilation may occur, this may also be limited as preexisting impairment of gas exchange may attenuate other compensatory mechanisms (</span><a class="ref showRefEvent" data-dcnode-id="6218" data-feathr-click-track="true" data-reflink="_i24" data-rid="bib12" href="#"><span data-dcnode-id="6219" instrument_node="">12</span></a><span data-dcnode-id="6217" instrument_node="">).</span></p><div class="figure figuresContent" data-dcnode-id="6156" id="extrafiglink-fig2"><div class="holder" data-dcnode-id="6157"><a class="thumbnail showFiguresEEvent" data-attr-fig-id="fig2" data-dcnode-id="6213" data-feathr-click-track="true" href="#" title="Open Figure Viewer"><img alt="figure" data-dcnode-id="6215" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.atsjournals.org/na101/home/literatum/publisher/thoracic/journals/content/annalsats/2014/annalsats.2014.11.issue-10/annalsats.201406-234ps/20141226/images/medium/annalsats.201406-234ps_f2.gif&amp;raw"><span class="overlay" data-dcnode-id="6214"></span></a><div class="caption" data-dcnode-id="6158"><p data-dcnode-id="6169"><span class="captionLabel" data-dcnode-id="6210"><b data-dcnode-id="6211"><span data-dcnode-id="6212" instrument_node="">Figure 2.</span></b></span><span data-dcnode-id="6209" instrument_node=""> Factors contributing to hypoxemia at altitude, compensatory mechanisms, the potential influence of comorbid illness, and possible end-organ complications of hypoxemia. HR = heart rate; V</span><sub data-dcnode-id="6206"><span class="smallcaps smallerCapital" data-dcnode-id="6207"><span data-dcnode-id="6208" instrument_node="">e</span></span></sub><span data-dcnode-id="6205" instrument_node=""> (</span><span class="equationTd inline-formula" data-dcnode-id="6174"><span class="MathJax_Preview" data-dcnode-id="6204" style="color: inherit;"></span><span class="MathJax" data-dcnode-id="6177" data-mathml="<math xmlns=&quot;http://www.w3.org/1998/Math/MathML&quot; id=&quot;m1&quot; overflow=&quot;scroll&quot; altimg=&quot;eq-00001.gif&quot;><mrow><mover accent=&quot;true&quot;><mi mathvariant=&quot;normal&quot;>V</mi><mo>.</mo></mover></mrow></math>" id="MathJax-Element-1-Frame" role="presentation" style="position: relative;" tabindex="0"><nobr aria-hidden="true" data-dcnode-id="6186"><span class="math" data-dcnode-id="6187" id="m1" overflow="scroll" style="width: 0.896em; display: inline-block;"><span data-dcnode-id="6189" style="display: inline-block; position: relative; width: 0.714em; height: 0px; font-size: 120%;"><span data-dcnode-id="6190" style="position: absolute; clip: rect(1.126em, 1000.7em, 2.401em, -1000em); top: -2.202em; left: 0em;"><span class="mrow" data-dcnode-id="6192" id="MathJax-Span-2"><span class="mrow" data-dcnode-id="6193" id="MathJax-Span-3"><span class="mover" data-dcnode-id="6194" id="MathJax-Span-4"><span data-dcnode-id="6195" style="display: inline-block; position: relative; width: 0.699em; height: 0px;"><span data-dcnode-id="6200" style="position: absolute; clip: rect(3.173em, 1000.68em, 4.187em, -1000em); top: -3.988em; left: 0em;"><span class="mi" data-dcnode-id="6202" id="MathJax-Span-5"><img data-dcnode-id="6203" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//cdnjs.cloudflare.com/ajax/libs/mathjax/2.7.5/fonts/HTML-CSS/TeX/png/Main/Regular/336/0056.png%3FV%3D2.7.5&amp;raw" style="width: 11px; height: 11px; vertical-align: -1px; margin-right: 0.019em;"></span><span data-dcnode-id="6201" style="display: inline-block; width: 0px; height: 3.988em;"></span></span><span data-dcnode-id="6196" style="position: absolute; clip: rect(3.698em, 1000.19em, 4.167em, -1000em); top: -4.774em; left: 0.22em;"><span class="mo" data-dcnode-id="6198" id="MathJax-Span-6"><img data-dcnode-id="6199" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//cdnjs.cloudflare.com/ajax/libs/mathjax/2.7.5/fonts/HTML-CSS/TeX/png/Main/Regular/336/002E.png%3FV%3D2.7.5&amp;raw" style="width: 3px; height: 2px; margin-right: 0.074em;"></span><span data-dcnode-id="6197" style="display: inline-block; width: 0px; height: 3.988em;"></span></span></span></span></span></span><span data-dcnode-id="6191" style="display: inline-block; width: 0px; height: 2.202em;"></span></span></span><span data-dcnode-id="6188" style="display: inline-block; overflow: hidden; vertical-align: -0.096em; border-left: 0px solid; width: 0px; height: 1.245em;"></span></span></nobr><span class="MJX_Assistive_MathML" data-dcnode-id="6178" role="presentation"><math altimg="eq-00001.gif" data-dcnode-id="6179" id="m1" overflow="scroll" xmlns="http://www.w3.org/1998/Math/MathML"><mrow data-dcnode-id="6180"><mover accent="true" data-dcnode-id="6181"><mi data-dcnode-id="6184" mathvariant="normal"><span data-dcnode-id="6185" instrument_node="">V</span></mi><mo data-dcnode-id="6182"><span data-dcnode-id="6183" instrument_node="">.</span></mo></mover></mrow></math></span></span></span><span class="formulaLabel" data-dcnode-id="6173"></span><span class="smallcaps smallerCapital" data-dcnode-id="6171"><span data-dcnode-id="6172" instrument_node="">e</span></span><span data-dcnode-id="6170" instrument_node="">) = minute ventilation.</span></p><div class="figure-links" data-dcnode-id="6163"><a data-dcnode-id="6167" data-feathr-click-track="true" download="" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.atsjournals.org/na101/home/literatum/publisher/thoracic/journals/content/annalsats/2014/annalsats.2014.11.issue-10/annalsats.201406-234ps/20141226/images/large/annalsats.201406-234ps_f2.jpeg"><span data-dcnode-id="6168" instrument_node="">
            Download Figure
            </span></a><span data-dcnode-id="6166" instrument_node=""> | </span><a data-dcnode-id="6164" data-feathr-click-track="true" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.atsjournals.org/action/downloadFigures%3Fid%3Dfig2%26doi%3D10.1513%252FAnnalsATS.201406-234PS"><span data-dcnode-id="6165" instrument_node="">Download Powerpoint</span></a></div><a class="showFigCap" data-dcnode-id="6161" data-feathr-click-track="true" href="#"><span data-dcnode-id="6162" instrument_node=""> [More]</span></a><a class="hideFigCap" data-dcnode-id="6159" data-feathr-click-track="true" href="#"><span data-dcnode-id="6160" instrument_node=""> [Minimize]</span></a></div></div></div><p data-dcnode-id="6126"><span data-dcnode-id="6155" instrument_node="">Other conditions contributing to high-altitude hypoxemia and in-flight complications include obstructive sleep apnea, pulmonary hypertension, pneumothorax, and cystic fibrosis (</span><a class="ref showRefEvent" data-dcnode-id="6153" data-feathr-click-track="true" data-reflink="_i24" data-rid="bib8" href="#"><span data-dcnode-id="6154" instrument_node="">8</span></a><span data-dcnode-id="6152" instrument_node="">, </span><a class="ref showRefEvent" data-dcnode-id="6150" data-feathr-click-track="true" data-reflink="_i24" data-rid="bib10" href="#"><span data-dcnode-id="6151" instrument_node="">10</span></a><span data-dcnode-id="6149" instrument_node="">, </span><a class="ref showRefEvent" data-dcnode-id="6147" data-feathr-click-track="true" data-reflink="_i24" data-rid="bib11" href="#"><span data-dcnode-id="6148" instrument_node="">11</span></a><span data-dcnode-id="6146" instrument_node="">, </span><a class="ref showRefEvent" data-dcnode-id="6144" data-feathr-click-track="true" data-reflink="_i24" data-rid="bib14" href="#"><span data-dcnode-id="6145" instrument_node="">14</span></a><span data-dcnode-id="6143" instrument_node="">, </span><a class="ref showRefEvent" data-dcnode-id="6141" data-feathr-click-track="true" data-reflink="_i24" data-rid="bib18" href="#"><span data-dcnode-id="6142" instrument_node="">18</span></a><span data-dcnode-id="6140" instrument_node="">). In many of these conditions, even at rest, hypoxemia can result in respiratory symptoms, and critical end-organ dysfunction such as arrhythmia or syncope can occur (</span><span class="figure refFigure figuresContent" data-dcnode-id="6136" id="ref-fig2"><a class="showFiguresEEvent figure-no-fig2" data-attr-fig-id="fig2" data-dcnode-id="6137" data-feathr-click-track="true" href="#" title="Open Figure Viewer"><span data-dcnode-id="6139" instrument_node="">Figure 2</span><span class="overlay" data-dcnode-id="6138"></span></a></span><span data-dcnode-id="6135" instrument_node="">) (</span><a class="ref showRefEvent" data-dcnode-id="6133" data-feathr-click-track="true" data-reflink="_i24" data-rid="bib19" href="#"><span data-dcnode-id="6134" instrument_node="">19</span></a><span data-dcnode-id="6132" instrument_node="">). Furthermore, patients with cardiovascular disease may be unable to adequately increase cardiac output, which could further worsen hypoxemia and exacerbate end-organ hypoxia (</span><span class="figure refFigure figuresContent" data-dcnode-id="6128" id="ref-fig2"><a class="showFiguresEEvent figure-no-fig2" data-attr-fig-id="fig2" data-dcnode-id="6129" data-feathr-click-track="true" href="#" title="Open Figure Viewer"><span data-dcnode-id="6131" instrument_node="">Figure 2</span><span class="overlay" data-dcnode-id="6130"></span></a></span><span data-dcnode-id="6127" instrument_node="">).</span></p><p data-dcnode-id="6101"><span data-dcnode-id="6125" instrument_node="">Even healthy individuals may experience symptoms of hypoxemia at altitudes encountered in a commercial aircraft. FAA regulations stipulate cabin altitude thresholds for supplemental oxygen for pilots, cabin crew, and passengers (</span><a class="ref showRefEvent" data-dcnode-id="6123" data-feathr-click-track="true" data-reflink="_i24" data-rid="bib20" href="#"><span data-dcnode-id="6124" instrument_node="">20</span></a><span data-dcnode-id="6122" instrument_node="">), and are outlined in </span><span class="figure refFigure figuresContent" data-dcnode-id="6118" id="ref-fig1"><a class="showFiguresEEvent figure-no-fig1" data-attr-fig-id="fig1" data-dcnode-id="6119" data-feathr-click-track="true" href="#" title="Open Figure Viewer"><span data-dcnode-id="6121" instrument_node="">Figure 1</span><span class="overlay" data-dcnode-id="6120"></span></a></span><span data-dcnode-id="6117" instrument_node=""> and </span><a class="ref" data-dcnode-id="6115" data-feathr-click-track="true" href="javascript:popRef('tbl1')"><span data-dcnode-id="6116" instrument_node="">Table 1</span></a><span data-dcnode-id="6114" instrument_node="">. Symptoms of hypoxemia include at the milder end of the spectrum, an effect on night vision, most relevant to pilots (</span><a class="ref showRefEvent" data-dcnode-id="6112" data-feathr-click-track="true" data-reflink="_i24" data-rid="bib20" href="#"><span data-dcnode-id="6113" instrument_node="">20</span></a><span data-dcnode-id="6111" instrument_node="">). It is therefore recommended that pilots use supplemental oxygen at altitudes above 5,000 feet when flying at night (</span><a class="ref showRefEvent" data-dcnode-id="6109" data-feathr-click-track="true" data-reflink="_i24" data-rid="bib20" href="#"><span data-dcnode-id="6110" instrument_node="">20</span></a><span data-dcnode-id="6108" instrument_node="">). At altitudes in excess of 12,000 feet, headache, impairment of judgment or memory, and euphoria may ensue. In excess of 15,000 feet, peripheral visual field defects, further cognitive dysfunction, and unconsciousness may result (</span><a class="ref showRefEvent" data-dcnode-id="6106" data-feathr-click-track="true" data-reflink="_i24" data-rid="bib20" href="#"><span data-dcnode-id="6107" instrument_node="">20</span></a><span data-dcnode-id="6105" instrument_node="">–</span><a class="ref showRefEvent" data-dcnode-id="6103" data-feathr-click-track="true" data-reflink="_i24" data-rid="bib22" href="#"><span data-dcnode-id="6104" instrument_node="">22</span></a><span data-dcnode-id="6102" instrument_node="">).</span></p><div class="anchor-spacer" data-dcnode-id="6100" id="tbl1"></div><div class="article-table-content" data-dcnode-id="5997" id="tbl1"><table class="table article-section__table" data-dcnode-id="6015"><caption data-dcnode-id="6094"><p data-dcnode-id="6095"><span class="captionLabel" data-dcnode-id="6097"><b data-dcnode-id="6098"><span data-dcnode-id="6099" instrument_node="">Table 1.</span></b></span><span data-dcnode-id="6096" instrument_node=""> Symptoms of acute hypoxemia and Federal Aviation Administration altitude thresholds for use of supplemental oxygen in crew and passengers</span></p></caption><thead data-dcnode-id="6077"><tr class="rowsep1" data-dcnode-id="6078" valign="top"><th align="left" class="rowsep1 align_left" data-dcnode-id="6092"><span data-dcnode-id="6093" instrument_node="">Cabin Altitude</span></th><th align="center" class="rowsep1 align_center" data-dcnode-id="6083"><span data-dcnode-id="6091" instrument_node="">P</span><span class="smallcaps smallerCapital" data-dcnode-id="6089"><span data-dcnode-id="6090" instrument_node="">i</span></span><sub data-dcnode-id="6085"><span data-dcnode-id="6088" instrument_node="">O</span><sub data-dcnode-id="6086"><span data-dcnode-id="6087" instrument_node="">2</span></sub></sub><span data-dcnode-id="6084" instrument_node="">: mm Hg (% of Sea-Level Values)</span></th><th align="center" class="rowsep1 align_center" data-dcnode-id="6081"><span data-dcnode-id="6082" instrument_node="">Symptoms</span></th><th align="center" class="rowsep1 align_center last" data-dcnode-id="6079"><span data-dcnode-id="6080" instrument_node="">FAA Recommendations on Use of Oxygen at Altitude</span></th></tr></thead><tbody data-dcnode-id="6016"><tr data-dcnode-id="6068" valign="top"><td align="left" class="align_left" data-dcnode-id="6075"><span data-dcnode-id="6076" instrument_node="">Sea level</span></td><td align="center" class="align_center" data-dcnode-id="6073"><span data-dcnode-id="6074" instrument_node="">150 (100)</span></td><td align="left" class="align_left" data-dcnode-id="6071"><span data-dcnode-id="6072" instrument_node="">• None</span></td><td align="left" class="align_left last" data-dcnode-id="6069"><span data-dcnode-id="6070" instrument_node="">• Supplemental oxygen not required</span></td></tr><tr data-dcnode-id="6059" valign="top"><td align="left" class="align_left" data-dcnode-id="6066"><span data-dcnode-id="6067" instrument_node="">5,000 ft</span></td><td align="center" class="align_center" data-dcnode-id="6064"><span data-dcnode-id="6065" instrument_node="">124 (83)</span></td><td align="left" class="align_left" data-dcnode-id="6062"><span data-dcnode-id="6063" instrument_node="">• Night vision may become affected</span></td><td align="left" class="align_left last" data-dcnode-id="6060"><span data-dcnode-id="6061" instrument_node="">• Pilots to use supplemental oxygen at night</span></td></tr><tr data-dcnode-id="6050" valign="top"><td align="left" class="align_left" data-dcnode-id="6057"><span data-dcnode-id="6058" instrument_node="">8,000 ft</span></td><td align="center" class="align_center" data-dcnode-id="6055"><span data-dcnode-id="6056" instrument_node="">110 (74)</span></td><td align="left" class="align_left" data-dcnode-id="6053"><span data-dcnode-id="6054" instrument_node="">• Night vision affected</span></td><td align="left" class="align_left last" data-dcnode-id="6051"><span data-dcnode-id="6052" instrument_node="">• Pilots to use supplemental oxygen during day at cabin altitudes above 10,000 ft</span></td></tr><tr data-dcnode-id="6041" valign="top"><td align="left" class="align_left" data-dcnode-id="6048" rowspan="5"><span data-dcnode-id="6049" instrument_node="">12,000–15,000 ft</span></td><td align="center" class="align_center" data-dcnode-id="6046" rowspan="5"><span data-dcnode-id="6047" instrument_node="">83–94 (56–63)</span></td><td align="left" class="align_left" data-dcnode-id="6044"><span data-dcnode-id="6045" instrument_node="">• Impairment of judgment</span></td><td align="left" class="align_left last" data-dcnode-id="6042" rowspan="5"><span data-dcnode-id="6043" instrument_node="">• Cabin crew to be provided with supplemental oxygen within 30 min of exposure to altitudes of 12,500–14,000 ft, and immediately above 14,000 ft</span></td></tr><tr data-dcnode-id="6038" valign="top"><td align="left" class="align_left" data-dcnode-id="6039"><span data-dcnode-id="6040" instrument_node="">• Memory impairment</span></td></tr><tr data-dcnode-id="6035" valign="top"><td align="left" class="align_left" data-dcnode-id="6036"><span data-dcnode-id="6037" instrument_node="">• Decreased alertness</span></td></tr><tr data-dcnode-id="6032" valign="top"><td align="left" class="align_left" data-dcnode-id="6033"><span data-dcnode-id="6034" instrument_node="">• Headache, dizziness</span></td></tr><tr data-dcnode-id="6029" valign="top"><td align="left" class="align_left" data-dcnode-id="6030"><span data-dcnode-id="6031" instrument_node="">• Euphoria</span></td></tr><tr data-dcnode-id="6020" valign="top"><td align="left" class="align_left" data-dcnode-id="6027" rowspan="2"><span data-dcnode-id="6028" instrument_node="">Above 15,000 ft</span></td><td align="center" class="align_center" data-dcnode-id="6025" rowspan="2"><span data-dcnode-id="6026" instrument_node="">&lt;83 (&lt;56)</span></td><td align="left" class="align_left" data-dcnode-id="6023"><span data-dcnode-id="6024" instrument_node="">• Peripheral visual field defects occur</span></td><td align="left" class="align_left last" data-dcnode-id="6021" rowspan="2"><span data-dcnode-id="6022" instrument_node="">• All occupants of aircraft require supplemental oxygen</span></td></tr><tr class="last" data-dcnode-id="6017" valign="top"><td align="left" class="align_left" data-dcnode-id="6018"><span data-dcnode-id="6019" instrument_node="">• Unconsciousness can occur</span></td></tr></tbody></table><div class="tableFooter" data-dcnode-id="5998"><div class="footnote" data-dcnode-id="6005"><p data-dcnode-id="6006"><span data-dcnode-id="6014" instrument_node="">Shown are cabin altitude, partial pressure of inspired oxygen (P</span><span class="smallcaps smallerCapital" data-dcnode-id="6012"><span data-dcnode-id="6013" instrument_node="">i</span></span><sub data-dcnode-id="6008"><span data-dcnode-id="6011" instrument_node="">O</span><sub data-dcnode-id="6009"><span data-dcnode-id="6010" instrument_node="">2</span></sub></sub><span data-dcnode-id="6007" instrument_node="">; mm Hg), and symptoms of hypoxemia together with Federal Aviation Administration (FAA) recommendations on supplemental oxygen for pilots, passengers, and crew.</span></p></div><div class="footnote" data-dcnode-id="5999"><p data-dcnode-id="6000"><span data-dcnode-id="6004" instrument_node="">Adapted by permission from Reference </span><a class="ref showRefEvent" data-dcnode-id="6002" data-feathr-click-track="true" data-reflink="_i24" data-rid="bib20" href="#"><span data-dcnode-id="6003" instrument_node="">20</span></a><span data-dcnode-id="6001" instrument_node="">.</span></p></div></div></div><p data-dcnode-id="5989"><span data-dcnode-id="5996" instrument_node="">It follows that in individuals either with preexisting hypoxemia or in those predisposed to hypoxemia, symptoms such as cognitive dysfunction could become apparent even at normal cabin altitudes. However, this does not appear to be the case for patients with mild to moderate chronic obstructive pulmonary disease (COPD) (</span><a class="ref showRefEvent" data-dcnode-id="5994" data-feathr-click-track="true" data-reflink="_i24" data-rid="bib23" href="#"><span data-dcnode-id="5995" instrument_node="">23</span></a><span data-dcnode-id="5993" instrument_node="">). The reasons for this are unclear, and may reflect an underpowered study, as acknowledged by the authors (</span><a class="ref showRefEvent" data-dcnode-id="5991" data-feathr-click-track="true" data-reflink="_i24" data-rid="bib23" href="#"><span data-dcnode-id="5992" instrument_node="">23</span></a><span data-dcnode-id="5990" instrument_node="">).</span></p><p data-dcnode-id="5984"><span data-dcnode-id="5988" instrument_node="">How hypoxemia may be manifested in other organ systems may be reflected by the types of illnesses reported in-flight. Although respiratory illnesses comprise approximately 12% of all in-flight emergencies, other emergencies include syncope (37.4%), cardiac symptoms (7.7%), stroke (2%), and cardiac arrest (0.3%) (</span><a class="ref showRefEvent" data-dcnode-id="5986" data-feathr-click-track="true" data-reflink="_i24" data-rid="bib2" href="#"><span data-dcnode-id="5987" instrument_node="">2</span></a><span data-dcnode-id="5985" instrument_node="">).</span></p><p data-dcnode-id="5973"><span data-dcnode-id="5983" instrument_node="">The most recently published British Thoracic Society (BTS) guidelines on the management of patients with respiratory disease who are planning air travel highlight many of the important issues relating to air travel in a population at increased risk of complications of hypoxemia (</span><a class="ref showRefEvent" data-dcnode-id="5981" data-feathr-click-track="true" data-reflink="_i24" data-rid="bib8" href="#"><span data-dcnode-id="5982" instrument_node="">8</span></a><span data-dcnode-id="5980" instrument_node="">). The BTS guidelines address specific pulmonary diseases, as well as patients with cardiac disease who may also be at risk of significant complications as a result of hypoxemia (</span><a class="ref showRefEvent" data-dcnode-id="5978" data-feathr-click-track="true" data-reflink="_i24" data-rid="bib8" href="#"><span data-dcnode-id="5979" instrument_node="">8</span></a><span data-dcnode-id="5977" instrument_node="">). </span><a class="ref" data-dcnode-id="5975" data-feathr-click-track="true" href="javascript:popRef('tbl2')"><span data-dcnode-id="5976" instrument_node="">Table 2</span></a><span data-dcnode-id="5974" instrument_node=""> outlines the pulmonary disease–specific recommendations in addition to recommendations for cardiac disease.</span></p><div class="anchor-spacer" data-dcnode-id="5972" id="tbl2"></div><div class="article-table-content" data-dcnode-id="5725" id="tbl2"><table class="table article-section__table" data-dcnode-id="5743"><caption data-dcnode-id="5966"><p data-dcnode-id="5967"><span class="captionLabel" data-dcnode-id="5969"><b data-dcnode-id="5970"><span data-dcnode-id="5971" instrument_node="">Table 2.</span></b></span><span data-dcnode-id="5968" instrument_node=""> Summary of British Thoracic Society 2011 guidelines with disease-specific recommendations and SIGN grading of evidence</span></p></caption><thead data-dcnode-id="5956"><tr class="rowsep1" data-dcnode-id="5957" valign="top"><th align="left" class="rowsep1 align_left" data-dcnode-id="5964"><span data-dcnode-id="5965" instrument_node="">Disease</span></th><th align="center" class="rowsep1 align_center" data-dcnode-id="5962"><span data-dcnode-id="5963" instrument_node="">Considerations</span></th><th align="center" class="rowsep1 align_center" data-dcnode-id="5960"><span data-dcnode-id="5961" instrument_node="">Recommendation</span></th><th align="center" class="rowsep1 align_center last" data-dcnode-id="5958"><span data-dcnode-id="5959" instrument_node="">SIGN Grading</span></th></tr></thead><tbody data-dcnode-id="5744"><tr data-dcnode-id="5947" valign="top"><td align="left" class="align_left" data-dcnode-id="5954" rowspan="3"><span data-dcnode-id="5955" instrument_node="">Asthma and COPD</span></td><td align="left" class="align_left" data-dcnode-id="5952"><span data-dcnode-id="5953" instrument_node="">• Acute exacerbation during flight</span></td><td align="left" class="align_left" data-dcnode-i " class="align_left" data-dcnode-id="5919" rowspan="3"><span data-dcnode-id="5920" instrument_node="">• General</span></td><td align="left" class="align_left" data-dcnode-id="5917"><span data-dcnode-id="5918" instrument_node="">• Careful assessment of patients recommended</span></td><td align="center" class="align_center last" data-dcnode-id="5915"><span data-dcnode-id="5916" instrument_node="">D</span></td></tr><tr data-dcnode-id="5909" valign="top"><td align="left" class="align_left" data-dcnode-id="5912"><span data-dcnode-id="5913" instrument_node="">• Consider oxygen supplementation if high-altitude destination</span></td><td align="center" class="align_center last" data-dcnode-id="5910"><span data-dcnode-id="5911" instrument_node="">D</span></td></tr><tr data-dcnode-id="5904" valign="top"><td align="left" class="align_left" data-dcnode-id="5907"><span data-dcnode-id="5908" instrument_node="">• Bring supply of antibiotics ± prednisone</span></td><td align="center" class="align_center last" data-dcnode-id="5905"><span data-dcnode-id="5906" instrument_node="">D</span></td></tr><tr data-dcnode-id="5892" valign="top"><td align="left" class="align_left" data-dcnode-id="5902" rowspan="2"><span data-dcnode-id="5903" instrument_node="">Cystic fibrosis</span></td><td align="left" class="align_left" data-dcnode-id="5900" rowspan="2"><span data-dcnode-id="5901" instrument_node="">• General</span></td><td align="left" class="align_left" data-dcnode-id="5895"><span data-dcnode-id="5899" instrument_node="">• HCT recommended if FEV</span><sub data-dcnode-id="5897"><span data-dcnode-id="5898" instrument_node="">1</span></sub><span data-dcnode-id="5896" instrument_node=""> &lt; 50% predicted</span></td><td align="center" class="align_center last" data-dcnode-id="5893"><span data-dcnode-id="5894" instrument_node="">C</span></td></tr><tr data-dcnode-id="5882" valign="top"><td align="left" class="align_left" data-dcnode-id="5885"><span data-dcnode-id="5891" instrument_node="">• If perable at altitude and with power supply at destination</span></td><td align="center" class="align_center last" data-dcnode-id="5857"><span data-dcnode-id="5858" instrument_node="">D</span></td></tr><tr data-dcnode-id="5847" valign="top"><td align="left" class="align_left" data-dcnode-id="5854" rowspan="4"><span data-dcnode-id="5855" instrument_node="">Pulmonary hypertension/heart failure</span></td><td align="left" class="align_left" data-dcnode-id="5852"><span data-dcnode-id="5853" instrument_node="">• NYHA class I–III without PH</span></td><td align="left" class="align_left" data-dcnode-id="5850"><span data-dcnode-id="5851" instrument_node="">• May fly without oxygen</span></td><td align="center" class="align_center last" data-dcnode-id="5848"><span data-dcnode-id="5849" instrument_node="">D</span></td></tr><tr data-dcnode-id="5840" valign="top"><td align="left" class="align_left" data-dcnode-id="5845"><span data-dcnode-id="5846" instrument_node="">• NYHA class I–II with PH</span></td><td align="left" class="align_left" data-dcnode-id="5843"><span data-dcnode-id="5844" instrument_node="">• May fly without oxygen</span></td><td align="center" class="align_center last" data-dcnode-id="5841"><span data-dcnode-id="5842" instrument_node="">D</span></td></tr><tr data-dcnode-id="5833" valign="top"><td align="left" class="align_left" data-dcnode-id="5838"><span data-dcnode-id="5839" instrument_node="">• NYHA class III–IV with PH</span></td><td align="left" class="align_left" data-dcnode-id="5836"><span data-dcnode-id="5837" instrument_node="">• Should receive in-flight oxygen</span></td><td align="center" class="align_center last" data-dcnode-id="5834"><span data-dcnode-id="5835" instrument_node="">D</span></td></tr><tr data-dcnode-id="5826" valign="top"><td align="left" class="align_left" data-dcnode-id="5831"><span data-dcnode-id="5832" instrument_node="">• NYHA class IV and severe PH</span></td><td align="left" class="align_left" data-dcnode-id="5829"><span data-dcno
