-id="4232" valign="top"><td align="left" class="align_left" data-dcnode-id="4253"><span data-dcnode-id="4256" instrument_node=""> Cost of rental of POC unit</span><a class="ref table-fn" data-dcnode-id="4254" data-feathr-click-track="true" href="javascript:popRef('tblfn1')" id="tblfn1"><span data-dcnode-id="4255" instrument_node="">*</span></a></td><td align="center" class="align_center" data-dcnode-id="4251"><span data-dcnode-id="4252" instrument_node="">325/wk</span></td><td align="center" class="align_center" data-dcnode-id="4249"><span data-dcnode-id="4250" instrument_node="">U</span></td><td align="center" class="align_center" data-dcnode-id="4247"><span data-dcnode-id="4248" instrument_node="">200</span></td><td align="center" class="align_center" data-dcnode-id="4245"><span data-dcnode-id="4246" instrument_node="">—</span></td><td align="center" class="align_center" data-dcnode-id="4243"><span data-dcnode-id="4244" instrument_node="">—</span></td><td align="center" class="align_center" data-dcnode-id="4241"><span data-dcnode-id="4242" instrument_node="">U</span></td><td align="center" class="align_center" data-dcnode-id="4239"><span data-dcnode-id="4240" instrument_node="">—</span></td><td align="center" class="align_center" data-dcnode-id="4237"><span data-dcnode-id="4238" instrument_node="">—</span></td><td align="center" class="align_center" data-dcnode-id="4235"><span data-dcnode-id="4236" instrument_node="">—</span></td><td align="center" class="align_center last" data-dcnode-id="4233"><span data-dcnode-id="4234" instrument_node="">325/wk</span></td></tr><tr class="last" data-dcnode-id="4209" valign="top"><td align="left" class="align_left" data-dcnode-id="4230"><span data-dcnode-id="4231" instrument_node=""> Compressed medical oxygen available from airline</span></td><td align="center" class="align_center" data-dcnode-id="4228"><span data-dcnode-id="4229" instrument_node="">N</span></td><td align="center" class="align_center" data-dcnode-id="4226"><span data-dcnode-id="4227" instrument_node="">N</span></td><td align="center" class="align_center" data-dcnode-id="4224"><span data-dcnode-id="4225" instrument_node="">N</span></td><td align="center" class="align_center" data-dcnode-id="4222"><span data-dcnode-id="4223" instrument_node="">C</span></td><td align="center" class="align_center" data-dcnode-id="4220"><span data-dcnode-id="4221" instrument_node="">N</span></td><td align="center" class="align_center" data-dcnode-id="4218"><span data-dcnode-id="4219" instrument_node="">Y</span></td><td align="center" class="align_center" data-dcnode-id="4216"><span data-dcnode-id="4217" instrument_node="">C</span></td><td align="center" class="align_center" data-dcnode-id="4214"><span data-dcnode-id="4215" instrument_node="">Y</span></td><td align="center" class="align_center" data-dcnode-id="4212"><span data-dcnode-id="4213" instrument_node="">N</span></td><td align="center" class="align_center last" data-dcnode-id="4210"><span data-dcnode-id="4211" instrument_node="">N</span></td></tr></tbody></table><div class="tableFooter" data-dcnode-id="4195"><div class="footnote" data-dcnode-id="4202"><p data-dcnode-id="4203"><i data-dcnode-id="4205"><span data-dcnode-id="4206" instrument_node="">Definition of abbreviations</span></i><span data-dcnode-id="4204" instrument_node="">: Am = American Airlines; C = in some circumstances; CE = China Eastern; Chi = China Airlines; Del = Delta; Ea = EasyJet; Lu = Lufthansa; N = no; POC = portable oxygen concentrator; Ry = Ryanair; Sou = Southwest; Un = United Airlines; US = US Airways; Y = yes; U = information unavailable.</span></p></div><div class="footnote" data-dcnode-id="4199"><p data-dcnode-id="4200"><span data-dcnode-id="4201" instrument_node="">Shown are Federal Aviation Administration and airline-specific information on portable oxygen concentrator use. Airlines shown are the 10 largest airlines worldwide, as determined by annual passenger numbers, with information on arranging in-flight portable oxygen obtained from each airline’s website, and correct as of August 2014.</span></p></div><div class="footnote" data-dcnode-id="4196" id="tblfn1"><p data-dcnode-id="4197"><span data-dcnode-id="4198" instrument_node="">*Cost of rental is in U.S. dollars per week or per flight.</span></p></div></div></div><p data-dcnode-id="4189"><span data-dcnode-id="4193" instrument_node="">Patients face a number of additional challenges with respect to arranging the use of portable concentrators. </span><a class="ref" data-dcnode-id="4191" data-feathr-click-track="true" href="javascript:popRef('tbl4')"><span data-dcnode-id="4192" instrument_node="">Table 4</span></a><span data-dcnode-id="4190" instrument_node=""> also outlines some of these. Patients typically must provide at least 48 hours’ notice of intent to travel, together with a physician statement for how and when the POC is to be used during flight. Many airlines do not guarantee a power outlet for use of the POC and instead recommend ensuring the machine is fully charged and that additional charged batteries are also carried. Finally, some airlines require patients to assume all risk by signing a waiver of liability before air travel.</span></p><p data-dcnode-id="4187"><span data-dcnode-id="4188" instrument_node="">It is important therefore that physicians be well informed on such challenges faced by patients, to provide them with the best information available. One speculates that a physician–patient discussion akin to informed consent might be appropriate under certain circumstances given the waiver of liability that the patient is expected to sign.</span></p></div><div class="NLM_sec NLM_sec_level_1" data-dcnode-id="3985"><a class="scroll-offset" data-dcnode-id="4184" data-feathr-click-track="true" name="_i14"></a><div class="sectionInfo" data-dcnode-id="4137"><div class="sectionHeading" data-dcnode-id="4182"><span data-dcnode-id="4183" instrument_node="">Respiratory Disease–Specific Recommendations</span></div><div class="sectionJumpTo" data-dcnode-id="4138"><div class="sectionLabel" data-dcnode-id="4180"><span data-dcnode-id="4181" instrument_node="">Section:</span></div><form data-dcnode-id="4144" style="margin-bottom:0"><select class="fulltextdd" data-dcnode-id="4145" name="select23" onchange="GoTo(this, 'self')"><option data-dcnode-id="4178" selected="#" value="#">Choose</option><option data-dcnode-id="4176" value="#">Top of page</option><option data-dcnode-id="4174" value="#abstract">Abstract</option><option data-dcnode-id="4172" value="#_i2">The Aircraft Cabin Enviro...</option><option data-dcnode-id="4170" value="#_i3">Consequences of Hypobaric...</option><option data-dcnode-id="4168" value="#_i6">Comorbid Cardiac Disease</option><option data-dcnode-id="4166" value="#_i7">Risk of Venous Thromboemb...</option><option data-dcnode-id="4164" value="#_i8">Assessment of Fitness to ...</option><option data-dcnode-id="4162" value="#_i9">Preflight Screening: Hist...</option><option data-dcnode-id="4160" value="#_i10">Preflight Screening: Asse...</option><option data-dcnode-id="4158" value="#_i11">Interpretation of Hypoxic...</option><option data-dcnode-id="4156" value="#_i12">Supplementary Oxygen</option><option data-dcnode-id="4154" value="#_i13">Arrangement of Supplement...</option><option data-dcnode-id="4152" value="">Respiratory Disease–Speci... &lt;&lt;</option><option data-dcnode-id="4150" value="#_i23">Conclusions</option><option data-dcnode-id="4148" value="#_i24">References</option><option data-dcnode-id="4146" value="#citart1">CITING ARTICLES</option></select></form><div class="nextPrevSec" data-dcnode-id="4139"><a class="up" data-dcnode-id="4142" data-feathr-click-track="true" href="#_i13"><img alt="Previous section" border="0" data-dcnode-id="4143" height="9" hspace="5" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.atsjournals.org/templates/jsp/images/arrow_up.gif&amp;raw" width="11"></a><a class="down" data-dcnode-id="4140" data-feathr-click-track="true" href="#_i23"><img alt="Next section" border="0" data-dcnode-id="4141" height="9" hspace="5" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.atsjournals.org/templates/jsp/images/arrow_down.gif&amp;raw" width="11"></a></div></div></div><p data-dcnode-id="4133"><a class="ref" data-dcnode-id="4135" data-feathr-click-track="true" href="javascript:popRef('tbl2')"><span data-dcnode-id="4136" instrument_node="">Table 2</span></a><span data-dcnode-id="4134" instrument_node=""> outlines disease-specific recommendations from the BTS 2011 guidelines, together with grading of the strength of evidence.</span></p><div class="NLM_sec NLM_sec_level_2" data-dcnode-id="4122"><div class="head-b" data-dcnode-id="4131"><span data-dcnode-id="4132" instrument_node="">Patients with Interstitial or Restrictive Lung Diseases</span></div><p data-dcnode-id="4123"><span data-dcnode-id="4130" instrument_node="">A detailed assessment should occur as described previously. In addition, if traveling to a high-altitude destination, supplemental oxygen should be considered. The patient should also bring a course of oral corticosteroids and antibiotics in the event of an acute exacerbation of their disease (</span><a class="ref showRefEvent" data-dcnode-id="4128" data-feathr-click-track="true" data-reflink="_i24" data-rid="bib8" href="#"><span data-dcnode-id="4129" instrument_node="">8</span></a><span data-dcnode-id="4127" instrument_node="">, </span><a class="ref showRefEvent" data-dcnode-id="4125" data-feathr-click-track="true" data-reflink="_i24" data-rid="bib41" href="#"><span data-dcnode-id="4126" instrument_node="">41</span></a><span data-dcnode-id="4124" instrument_node="">).</span></p></div><div class="NLM_sec NLM_sec_level_2" data-dcnode-id="4114"><div class="head-b" data-dcnode-id="4120"><span data-dcnode-id="4121" instrument_node="">Patients with Neuromuscular Disease or Chest Wall Disease</span></div><p data-dcnode-id="4115"><span data-dcnode-id="4119" instrument_node="">All patients should undergo assessment as described previously as well as hypoxic challenge testing (</span><a class="ref" data-dcnode-id="4117" data-feathr-click-track="true" href="javascript:popRef('tbl2')"><span data-dcnode-id="4118" instrument_node="">Table 2</span></a><span data-dcnode-id="4116" instrument_node="">).</span></p></div><div class="NLM_sec NLM_sec_level_2" data-dcnode-id="4088"><div class="head-b" data-dcnode-id="4112"><span data-dcnode-id="4113" instrument_node="">Patients with Cystic Lung Disease</span></div><p data-dcnode-id="4089"><span data-dcnode-id="4111" instrument_node="">In addition to hyperinflation within communicating airways, at an altitude of 8,000 feet, Boyle’s law predicts there will be a 38% increase in the size of closed air-filled pockets within the body (</span><a class="ref showRefEvent" data-dcnode-id="4109" data-feathr-click-track="true" data-reflink="_i24" data-rid="bib8" href="#"><span data-dcnode-id="4110" instrument_node="">8</span></a><span data-dcnode-id="4108" instrument_node="">, </span><a class="ref showRefEvent" data-dcnode-id="4106" data-feathr-click-track="true" data-reflink="_i24" data-rid="bib50" href="#"><span data-dcnode-id="4107" instrument_node="">50</span></a><span data-dcnode-id="4105" instrument_node="">). This gas expansion may be associated with an increased risk of pneumothorax in patients with bullous or cystic lung disease (</span><a class="ref showRefEvent" data-dcnode-id="4103" data-feathr-click-track="true" data-reflink="_i24" data-rid="bib8" href="#"><span data-dcnode-id="4104" instrument_node="">8</span></a><span data-dcnode-id="4102" instrument_node="">, </span><a class="ref showRefEvent" data-dcnode-id="4100" data-feathr-click-track="true" data-reflink="_i24" data-rid="bib14" href="#"><span data-dcnode-id="4101" instrument_node="">14</span></a><span data-dcnode-id="4099" instrument_node="">). However, from published data in patients with cystic lung disease, the incidence of pneumothorax related to air travel appears to be low (</span><a class="ref showRefEvent" data-dcnode-id="4097" data-feathr-click-track="true" data-reflink="_i24" data-rid="bib2" href="#"><span data-dcnode-id="4098" instrument_node="">2</span></a><span data-dcnode-id="4096" instrument_node="">, </span><a class="ref showRefEvent" data-dcnode-id="4094" data-feathr-click-track="true" data-reflink="_i24" data-rid="bib25" href="#"><span data-dcnode-id="4095" instrument_node="">25</span></a><span data-dcnode-id="4093" instrument_node="">, </span><a class="ref showRefEvent" data-dcnode-id="4091" data-feathr-click-track="true" data-reflink="_i24" data-rid="bib51" href="#"><span data-dcnode-id="4092" instrument_node="">51</span></a><span data-dcnode-id="4090" instrument_node="">). Nonetheless, in patients with chronic lung disease who are already at risk of hypoxemia, the development of a pneumothorax in-flight could be devastating. A previous history of pneumothorax may be more relevant in patients with lung disease, as rapid changes in barometric pressure may precipitate recurrence.</span></p></div><div class="NLM_sec NLM_sec_level_2" data-dcnode-id="4071"><div class="head-b" data-dcnode-id="4086"><span data-dcnode-id="4087" instrument_node="">Air Travel in Patients after Pneumothorax</span></div><p data-dcnode-id="4072"><span data-dcnode-id="4085" instrument_node="">Patients with a closed pneumothorax generally should not fly, with rare exceptions. It is currently recommended that patients not travel after a pneumothorax unless drainage has been performed and, in the case of recurrent pneumothoraces, when definitive surgical treatment has occurred (</span><a class="ref showRefEvent" data-dcnode-id="4083" data-feathr-click-track="true" data-reflink="_i24" data-rid="bib8" href="#"><span data-dcnode-id="4084" instrument_node="">8</span></a><span data-dcnode-id="4082" instrument_node="">, </span><a class="ref showRefEvent" data-dcnode-id="4080" data-feathr-click-track="true" data-reflink="_i24" data-rid="bib52" href="#"><span data-dcnode-id="4081" instrument_node="">52</span></a><span data-dcnode-id="4079" instrument_node="">). Otherwise, provided chest imaging has determined the pneumothorax has resolved, patients should be safe to travel provided a further 7 days has elapsed (</span><a class="ref showRefEvent" data-dcnode-id="4077" data-feathr-click-track="true" data-reflink="_i24" data-rid="bib8" href="#"><span data-dcnode-id="4078" instrument_node="">8</span></a><span data-dcnode-id="4076" instrument_node="">). However, it should be noted that patients with preexisting lung disease have a high risk of recurrence and that this risk remains increased for up to 1 year after a pneumothorax (</span><a class="ref showRefEvent" data-dcnode-id="4074" data-feathr-click-track="true" data-reflink="_i24" data-rid="bib53" href="#"><span data-dcnode-id="4075" instrument_node="">53</span></a><span data-dcnode-id="4073" instrument_node="">).</span></p></div><div class="NLM_sec NLM_sec_level_2" data-dcnode-id="4060"><div class="head-b" data-dcnode-id="4069"><span data-dcnode-id="4070" instrument_node="">Air Travel after Chest Surgery</span></div><p data-dcnode-id="4061"><span data-dcnode-id="4068" instrument_node="">Similar to the advice pertaining to pneumothorax, in those who have undergone chest surgery, radiographic demonstration of lung reexpansion and resolution of pneumothorax after chest drain removal should be performed (</span><a class="ref showRefEvent" data-dcnode-id="4066" data-feathr-click-track="true" data-reflink="_i24" data-rid="bib8" href="#"><span data-dcnode-id="4067" instrument_node="">8</span></a><span data-dcnode-id="4065" instrument_node="">). Signs or symptoms concerning for pneumothorax or postsurgical complications should prompt further investigation before air travel (</span><a class="ref showRefEvent" data-dcnode-id="4063" data-feathr-click-track="true" data-reflink="_i24" data-rid="bib8" href="#"><span data-dcnode-id="4064" instrument_node="">8</span></a><span data-dcnode-id="4062" instrument_node="">).</span></p></div><div class="NLM_sec NLM_sec_level_2" data-dcnode-id="4050"><div class="head-b" data-dcnode-id="4058"><span data-dcnode-id="4059" instrument_node="">Preflight Optimization of Pulmonary Status</span></div><p data-dcnode-id="4056"><span data-dcnode-id="4057" instrument_node="">In all of the previously described conditions, it would be prudent to recommend that patients not fly while symptoms of an acute exacerbation of their illness may be developing.</span></p><p data-dcnode-id="4051"><span data-dcnode-id="4055" instrument_node="">In contrast to this scenario, there may be some role for optimization of their pulmonary illness before flying, thus decreasing the risk of complications and potentially reducing the severity of hypoxemia. A period of more intensive chest physiotherapy may be of benefit to some patients with cystic fibrosis, for example (</span><a class="ref showRefEvent" data-dcnode-id="4053" data-feathr-click-track="true" data-reflink="_i24" data-rid="bib54" href="#"><span data-dcnode-id="4054" instrument_node="">54</span></a><span data-dcnode-id="4052" instrument_node="">). Similarly, optimized control of asthma symptoms, or symptoms of heart failure, would also seem to be appropriate recommendations, although there is no published evidence to support this.</span></p></div><div class="NLM_sec NLM_sec_level_2" data-dcnode-id="4045"><div class="head-b" data-dcnode-id="4048"><span data-dcnode-id="4049" instrument_node="">Patients for Whom Air Travel Is Contraindicated</span></div><p data-dcnode-id="4046"><span data-dcnode-id="4047" instrument_node="">Certain patients with pulmonary disease should be instructed not to fly. These include patients who pose risk to others such as those with active infectious diseases (e.g., tuberculosis or influenza), or those in whom air travel would pose a risk to themselves: hemoptysis, unresolved pneumothorax, and a sea-level supplemental oxygen requirement in excess of 4 L/minute.</span></p></div><div class="NLM_sec NLM_sec_level_2" data-dcnode-id="3986"><div class="head-b" data-dcnode-id="4043"><span data-dcnode-id="4044" instrument_node="">Additional Considerations When Evaluating Patients for Air Travel</span></div><p data-dcnode-id="4041"><span data-dcnode-id="4042" instrument_node="">It is important to highlight the following points in assessing patients for air travel:</span></p><table border="0" class="listgroup" data-dcnode-id="3988" list-type="order" width="95%"><tbody data-dcnode-id="3989"><tr class="li1" data-dcnode-id="4026"><td data-dcnode-id="4039" valign="top"><span data-dcnode-id="4040" instrument_node="">1.</span></td><td class="paragraph" colspan="5" data-dcnode-id="4027" valign="top"><p data-dcnode-id="4028"><span data-dcnode-id="4038" instrument_node="">Even at 35,000 feet, different types of commercial aircraft will have widely differing cabin altitudes, ranging from an equivalent of approximately 5,400 to 8,000 feet (</span><a class="ref showRefEvent" data-dcnode-id="4036" data-feathr-click-track="true" data-reflink="_i24" data-rid="bib4" href="#"><span data-dcnode-id="4037" instrument_node="">4</span></a><span data-dcnode-id="4035" instrument_node="">). In addition, commercial aircraft may also vary their cruising altitude a number of times during the flight, which in turn can alter cabin pressure (</span><a class="ref showRefEvent" data-dcnode-id="4033" data-feathr-click-track="true" data-reflink="_i24" data-rid="bib4" href="#"><span data-dcnode-id="4034" instrument_node="">4</span></a><span data-dcnode-id="4032" instrument_node="">, </span><a class="ref showRefEvent" data-dcnode-id="4030" data-feathr-click-track="true" data-reflink="_i24" data-rid="bib55" href="#"><span data-dcnode-id="4031" instrument_node="">55</span></a><span data-dcnode-id="4029" instrument_node="">).</span></p></td></tr><tr class="li1" data-dcnode-id="4017"><td data-dcnode-id="4024" valign="top"><span data-dcnode-id="4025" instrument_node="">2.</span></td><td class="paragraph" colspan="5" data-dcnode-id="4018" valign="top"><p data-dcnode-id="4019"><span data-dcnode-id="4023" instrument_node="">Respiratory symptoms may occur even despite having a preflight assessment. One study found 18% of patients with COPD developed respiratory symptoms despite having a preflight evaluation (</span><a class="ref showRefEvent" data-dcnode-id="4021" data-feathr-click-track="true" data-reflink="_i24" data-rid="bib56" href="#"><span data-dcnode-id="4022" instrument_node="">56</span></a><span data-dcnode-id="4020" instrument_node="">).</span></p></td></tr><tr class="li1" data-dcnode-id="4005"><td data-dcnode-id="4015" valign="top"><span data-dcnode-id="4016" instrument_node="">3.</span></td><td class="paragraph" colspan="5" data-dcnode-id="4006" valign="top"><p data-dcnode-id="4007"><span data-dcnode-id="4014" instrument_node="">Flight duration is another important factor to consider. Longer flight durations are associated with increased symptoms (</span><a class="ref showRefEvent" data-dcnode-id="4012" data-feathr-click-track="true" data-reflink="_i24" data-rid="bib42" href="#"><span data-dcnode-id="4013" instrument_node="">42</span></a><span data-dcnode-id="4011" instrument_node="">), particularly when lasting over 3 hours (</span><a class="ref showRefEvent" data-dcnode-id="4009" data-feathr-click-track="true" data-reflink="_i24" data-rid="bib57" href="#"><span data-dcnode-id="4010" instrument_node="">57</span></a><span data-dcnode-id="4008" instrument_node="">).</span></p></td></tr><tr class="li1" data-dcnode-id="3990"><td data-dcnode-id="4003" valign="top"><span data-dcnode-id="4004" instrument_node="">4.</span></td><td class="paragraph" colspan="5" data-dcnode-id="3991" valign="top"><p data-dcnode-id="3992"><span data-dcnode-id="4002" instrument_node="">The levels of activity of the patient during the flight should also be considered. Patients with COPD, restrictive lung disease, and cystic fibrosis demonstrate significant worsening of hypoxemia at simulated altitude with a workload equivalent to that of walking around the aircraft cabin (</span><a class="ref showRefEvent" data-dcnode-id="4000" data-feathr-click-track="true" data-reflink="_i24" data-rid="bib11" href="#"><span data-dcnode-id="4001" instrument_node="">11</span></a><span data-dcnode-id="3999" instrument_node="">, </span><a class="ref showRefEvent" data-dcnode-id="3997" data-feathr-click-track="true" data-reflink="_i24" data-rid="bib12" href="#"><span data-dcnode-id="3998" instrument_node="">12</span></a><span data-dcnode-id="3996" instrument_node="">, </span><a class="ref showRefEvent" data-dcnode-id="3994" data-feathr-click-track="true" data-reflink="_i24" data-rid="bib18" href="#"><span data-dcnode-id="3995" instrument_node="">18</span></a><span data-dcnode-id="3993" instrument_node="">).</span></p></td></tr></tbody></table><p data-dcnode-id="3987"></p></div></div><div class="NLM_sec NLM_sec-type_conclusions NLM_sec_level_1" data-dcnode-id="3933"><a class="scroll-offset" data-dcnode-id="3983" data-feathr-click-track="true" name="_i23"></a><div class="sectionInfo" data-dcnode-id="3936"><div class="sectionHeading" data-dcnode-id="3981"><span data-dcnode-id="3982" instrument_node="">Conclusions</span></div><div class="sectionJumpTo" data-dcnode-id="3937"><div class="sectionLabel" data-dcnode-id="3979"><span data-dcnode-id="3980" instrument_node="">Section:</span></div><form data-dcnode-id="3943" style="margin-bottom:0"><select class="fulltextdd" data-dcnode-id="3944" name="select23" onchange="GoTo(this, 'self')"><option data-dcnode-id="3977" selected="#" value="#">Choose</option><option data-dcnode-id="3975" value="#">Top of page</option><option data-dcnode-id="3973" value="#abstract">Abstract</option><option data-dcnode-id="3971" value="#_i2">The Aircraft Cabin Enviro...</option><option data-dcnode-id="3969" value="#_i3">Consequences of Hypobaric...</option><option data-dcnode-id="3967" value="#_i6">Comorbid Cardiac Disease</option><option data-dcnode-id="3965" value="#_i7">Risk of Venous Thromboemb...</option><option data-dcnode-id="3963" value="#_i8">Assessment of Fitness to ...</option><option data-dcnode-id="3961" value="#_i9">Preflight Screening: Hist...</option><option data-dcnode-id="3959" value="#_i10">Preflight Screening: Asse...</option><option data-dcnode-id="3957" value="#_i11">Interpretation of Hypoxic...</option><option data-dcnode-id="3955" value="#_i12">Supplementary Oxygen</option><option data-dcnode-id="3953" value="#_i13">Arrangement of Supplement...</option><option data-dcnode-id="3951" value="#_i14">Respiratory Disease–Speci...</option><option data-dcnode-id="3949" value="">Conclusions &lt;&lt;</option><option data-dcnode-id="3947" value="#_i24">References</option><option data-dcnode-id="3945" value="#citart1">CITING ARTICLES</option></select></form><div class="nextPrevSec" data-dcnode-id="3938"><a class="up" data-dcnode-id="3941" data-feathr-click-track="true" href="#_i14"><img alt="Previous section" border="0" data-dcnode-id="3942" height="9" hspace="5" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.atsjournals.org/templates/jsp/images/arrow_up.gif&amp;raw" width="11"></a><a class="down" data-dcnode-id="3939" data-feathr-click-track="true" href="#_i24"><img alt="Next section" border="0" data-dcnode-id="3940" height="9" hspace="5" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.atsjournals.org/templates/jsp/images/arrow_down.gif&amp;raw" width="11"></a></div></div></div><p data-dcnode-id="3934"><span data-dcnode-id="3935" instrument_node="">In summary, normobaric hypoxic challenge testing should be considered for patients with chronic and acute pulmonary diseases as they are potentially at risk of significant hypoxemia and complications during air travel. In addition, patients with comorbid illness, at risk of significant complications in hypoxic environments, particularly if compensatory mechanisms might be inadequate to deal with hypoxemia, should be assessed for fitness to fly. These also include patients with significant cardiac or cerebrovascular disease. Furthermore, when prescribing supplemental oxygen, consideration should also be given to the anticipated oxygen concentrator and delivery mode and also levels of patient activity aboard the flight.</span></p></div><a class="scroll-offset" data-dcnode-id="3931" data-feathr-click-track="true" name="_i24"></a><div class="sectionInfo" data-dcnode-id="3884"><div class="sectionHeading" data-dcnode-id="3929"><span data-dcnode-id="3930" instrument_node="">References</span></div><div class="sectionJumpTo" data-dcnode-id="3885"><div class="sectionLabel" data-dcnode-id="3927"><span data-dcnode-id="3928" instrument_node="">Section:</span></div><form data-dcnode-id="3891" style="margin-bottom:0"><select class="fulltextdd" data-dcnode-id="3892" name="select23" onchange="GoTo(this, 'self')"><option data-dcnode-id="3925" selected="#" value="#">Choose</option><option data-dcnode-id="3923" value="#">Top of page</option><option data-dcnode-id="3921" value="#abstract">Abstract</option><option data-dcnode-id="3919" value="#_i2">The Aircraft Cabin Enviro...</option><option data-dcnode-id="3917" value="#_i3">Consequences of Hypobaric...</option><option data-dcnode-id="3915" value="#_i6">Comorbid Cardiac Disease</option><option data-dcnode-id="3913" value="#_i7">Risk of Venous Thromboemb...</option><option data-dcnode-id="3911" value="#_i8">Assessment of Fitness to ...</option><option data-dcnode-id="3909" value="#_i9">Preflight Screening: Hist...</option><option data-dcnode-id="3907" value="#_i10">Preflight Screening: Asse...</option><option data-dcnode-id="3905" value="#_i11">Interpretation of Hypoxic...</option><option data-dcnode-id="3903" value="#_i12">Supplementary Oxygen</option><option data-dcnode-id="3901" value="#_i13">Arrangement o
