node-id="5800" instrument_node="">&nbsp;</span></td><td align="left" class="align_left" data-dcnode-id="5797"><span data-dcnode-id="5798" instrument_node="">• Those with NSTEMI should undergo PCI before planning air travel</span></td><td align="center" class="align_center last" data-dcnode-id="5795"><span data-dcnode-id="5796" instrument_node="">C</span></td></tr><tr data-dcnode-id="5787" valign="top"><td align="left" class="align_left" data-dcnode-id="5792"><span data-dcnode-id="5793" instrument_node="">• After coronary artery bypass grafting</span></td><td align="left" class="align_left" data-dcnode-id="5790"><span data-dcnode-id="5791" instrument_node="">• May fly 14 d after CABG once chest radiograph has excluded pneumothorax</span></td><td align="center" class="align_center last" data-dcnode-id="5788"><span data-dcnode-id="5789" instrument_node="">C</span></td></tr><tr data-dcnode-id="5780" valign="top"><td align="left" class="align_left" data-dcnode-id="5785"><span data-dcnode-id="5786" instrument_node="">• Angina CCS class III symptoms</span></td><td align="left" class="align_left" data-dcnode-id="5783"><span data-dcnode-id="5784" instrument_node="">• Patients with stable CCS class III angina are not expected to develop symptoms</span></td><td align="center" class="align_center last" data-dcnode-id="5781"><span data-dcnode-id="5782" instrument_node="">C</span></td></tr><tr data-dcnode-id="5773" valign="top"><td align="left" class="align_left" data-dcnode-id="5778"><span data-dcnode-id="5779" instrument_node="">• Angina CCS class IV symptoms</span></td><td align="left" class="align_left" data-dcnode-id="5776"><span data-dcnode-id="5777" instrument_node="">• Patients with CCS class IV symptoms should be discouraged from flying</span></td><td align="center" class="align_center last" data-dcnode-id="5774"><span data-dcnode-id="5775" instrument_node="">C</span></td></tr><tr data-dcnode-id="5766" valign="top"><td align="left" class="align_left" data-dcnode-id="5771"><span data-dcnode-id="5772" instrument_node="">• Cyanotic congenital heart disease</span></td><td align="left" class="align_left" data-dcnode-id="5769"><span data-dcnode-id="5770" instrument_node="">• At physician’s discretion to advise HCT and/or use supplemental oxygen</span></td><td align="center" class="align_center last" data-dcnode-id="5767"><span data-dcnode-id="5768" instrument_node="">D</span></td></tr><tr data-dcnode-id="5759" valign="top"><td align="center" class="align_center" data-dcnode-id="5764"><span data-dcnode-id="5765" instrument_node="">&nbsp;</span></td><td align="left" class="align_left" data-dcnode-id="5762"><span data-dcnode-id="5763" instrument_node="">• NYHA functional class IV should not travel, or should receive in-flight oxygen at 2 L/min</span></td><td align="center" class="align_center last" data-dcnode-id="5760"><span data-dcnode-id="5761" instrument_node="">D</span></td></tr><tr data-dcnode-id="5752" valign="top"><td align="left" class="align_left" data-dcnode-id="5757"><span data-dcnode-id="5758" instrument_node="">• Unstable arrhythmia</span></td><td align="left" class="align_left" data-dcnode-id="5755"><span data-dcnode-id="5756" instrument_node="">• Should not fly</span></td><td align="center" class="align_center last" data-dcnode-id="5753"><span data-dcnode-id="5754" instrument_node="">C</span></td></tr><tr class="last" data-dcnode-id="5745" valign="top"><td align="left" class="align_left" data-dcnode-id="5750"><span data-dcnode-id="5751" instrument_node="">• Valvular disease</span></td><td align="left" class="align_left" data-dcnode-id="5748"><span data-dcnode-id="5749" instrument_node="">• If hypoxemic at sea level, and coexisting lung or pulmonary vascular disease, consider HCT</span></td><td align="center" class="align_center last" data-dcnode-id="5746"><span data-dcnode-id="5747" instrument_node="">D</span></td></tr></tbody></table><div class="tableFooter" data-dcnode-id="5726"><div class="footnote" data-dcnode-id="5733"><p data-dcnode-id="5734"><i data-dcnode-id="5741"><span data-dcnode-id="5742" instrument_node="">Definition of abbreviations</span></i><span data-dcnode-id="5740" instrument_node="">: CABG = coronary artery bypass graft; CCS = Canadian Cardiovascular Society; COPD = chronic obstructive pulmonary disease; CPAP = continuous positive airway pressure; HCT = hypoxic challenge test; NSTEMI = non–ST elevation myocardial infarction; NYHA = New York Heart Association; PCI = percutaneous coronary intervention; PH = pulmonary hypertension; SIGN = Scottish Intercollegiate Guidelines Network; Sp</span><sub data-dcnode-id="5736"><span data-dcnode-id="5739" instrument_node="">O</span><sub data-dcnode-id="5737"><span data-dcnode-id="5738" instrument_node="">2</span></sub></sub><span data-dcnode-id="5735" instrument_node=""> = oxygen saturation as determined by pulse oximetry.</span></p></div><div class="footnote" data-dcnode-id="5727"><p data-dcnode-id="5728"><span data-dcnode-id="5732" instrument_node="">Shown are the British Thoracic Society 2011 guidelines with disease-specific recommendations for pulmonary and cardiac diseases (</span><a class="ref showRefEvent" data-dcnode-id="5730" data-feathr-click-track="true" data-reflink="_i24" data-rid="bib8" href="#"><span data-dcnode-id="5731" instrument_node="">8</span></a><span data-dcnode-id="5729" instrument_node="">).</span></p></div></div></div></div><div class="NLM_sec NLM_sec_level_1" data-dcnode-id="5655"><a class="scroll-offset" data-dcnode-id="5722" data-feathr-click-track="true" name="_i6"></a><div class="sectionInfo" data-dcnode-id="5675"><div class="sectionHeading" data-dcnode-id="5720"><span data-dcnode-id="5721" instrument_node="">Comorbid Cardiac Disease</span></div><div class="sectionJumpTo" data-dcnode-id="5676"><div class="sectionLabel" data-dcnode-id="5718"><span data-dcnode-id="5719" instrument_node="">Section:</span></div><form data-dcnode-id="5682" style="margin-bottom:0"><select class="fulltextdd" data-dcnode-id="5683" name="select23" onchange="GoTo(this, 'self')"><option data-dcnode-id="5716" selected="#" value="#">Choose</option><option data-dcnode-id="5714" value="#">Top of page</option><option data-dcnode-id="5712" value="#abstract">Abstract</option><option data-dcnode-id="5710" value="#_i2">The Aircraft Cabin Enviro...</option><option data-dcnode-id="5708" value="#_i3">Consequences of Hypobaric...</option><option data-dcnode-id="5706" value="">Comorbid Cardiac Disease &lt;&lt;</option><option data-dcnode-id="5704" value="#_i7">Risk of Venous Thromboemb...</option><option data-dcnode-id="5702" value="#_i8">Assessment of Fitness to ...</option><option data-dcnode-id="5700" value="#_i9">Preflight Screening: Hist...</option><option data-dcnode-id="5698" value="#_i10">Preflight Screening: Asse...</option><option data-dcnode-id="5696" value="#_i11">Interpretation of Hypoxic...</option><option data-dcnode-id="5694" value="#_i12">Supplementary Oxygen</option><option data-dcnode-id="5692" value="#_i13">Arrangement of Supplement...</option><option data-dcnode-id="5690" value="#_i14">Respiratory Disease–Speci...</option><option data-dcnode-id="5688" value="#_i23">Conclusions</option><option data-dcnode-id="5686" value="#_i24">References</option><option data-dcnode-id="5684" value="#citart1">CITING ARTICLES</option></select></form><div class="nextPrevSec" data-dcnode-id="5677"><a class="up" data-dcnode-id="5680" data-feathr-click-track="true" href="#_i3"><img alt="Previous section" border="0" data-dcnode-id="5681" height="9" hspace="5" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.atsjournals.org/templates/jsp/images/arrow_up.gif&amp;raw" width="11"></a><a class="down" data-dcnode-id="5678" data-feathr-click-track="true" href="#_i7"><img alt="Next section" border="0" data-dcnode-id="5679" height="9" hspace="5" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.atsjournals.org/templates/jsp/images/arrow_down.gif&amp;raw" width="11"></a></div></div></div><p data-dcnode-id="5664"><span data-dcnode-id="5674" instrument_node="">Cardiac arrest or sudden death accounts for 57% of the in-flight deaths reported by the International Air Transport Association (</span><a class="ref showRefEvent" data-dcnode-id="5672" data-feathr-click-track="true" data-reflink="_i24" data-rid="bib3" href="#"><span data-dcnode-id="5673" instrument_node="">3</span></a><span data-dcnode-id="5671" instrument_node="">), with pulmonary disease responsible for 8% of in-flight deaths (</span><a class="ref showRefEvent" data-dcnode-id="5669" data-feathr-click-track="true" data-reflink="_i24" data-rid="bib24" href="#"><span data-dcnode-id="5670" instrument_node="">24</span></a><span data-dcnode-id="5668" instrument_node="">). Although patients with preexisting pulmonary disease represent the largest group of patients attending preflight medical screenings, much of the remainder is composed of patients with cardiac disease (</span><a class="ref showRefEvent" data-dcnode-id="5666" data-feathr-click-track="true" data-reflink="_i24" data-rid="bib25" href="#"><span data-dcnode-id="5667" instrument_node="">25</span></a><span data-dcnode-id="5665" instrument_node="">).</span></p><p data-dcnode-id="5656"><span data-dcnode-id="5663" instrument_node="">Coexistent cardiac and pulmonary disease is also an important consideration given the interplay between hypoxemia, compensatory mechanisms, and comorbid illness. It is primarily for this reason that the authors of the 2011 BTS guidelines retained recommendations for patients with cardiac disease (</span><a class="ref showRefEvent" data-dcnode-id="5661" data-feathr-click-track="true" data-reflink="_i24" data-rid="bib8" href="#"><span data-dcnode-id="5662" instrument_node="">8</span></a><span data-dcnode-id="5660" instrument_node="">). Disease-specific recommendations are also summarized in </span><a class="ref" data-dcnode-id="5658" data-feathr-click-track="true" href="javascript:popRef('tbl2')"><span data-dcnode-id="5659" instrument_node="">Table 2</span></a><span data-dcnode-id="5657" instrument_node="">.</span></p></div><div class="NLM_sec NLM_sec_level_1" data-dcnode-id="5567"><a class="scroll-offset" data-dcnode-id="5653" data-feathr-click-track="true" name="_i7"></a><div class="sectionInfo" data-dcnode-id="5606"><div class="sectionHeading" data-dcnode-id="5651"><span data-dcnode-id="5652" instrument_node="">Risk of Venous Thromboembolism and Air Travel</span></div><div class="sectionJumpTo" data-dcnode-id="5607"><div class="sectionLabel" data-dcnode-id="5649"><span data-dcnode-id="5650" instrument_node="">Section:</span></div><form data-dcnode-id="5613" style="margin-bottom:0"><select class="fulltextdd" data-dcnode-id="5614" name="select23" onchange="GoTo(this, 'self')"><option data-dcnode-id="5647" selected="#" value="#">Choose</option><option data-dcnode-id="5645" value="#">Top of page</option><option data-dcnode-id="5643" value="#abstract">Abstract</option><option data-dcnode-id="5641" value="#_i2">The Aircraft Cabin Enviro...</option><option data-dcnode-id="5639" value="#_i3">Consequences of Hypobaric...</option><option data-dcnode-id="5637" value="#_i6">Comorbid Cardiac Disease</option><option data-dcnode-id="5635" value="">Risk of Venous Thromboemb... &lt;&lt;</option><option data-dcnode-id="5633" value="#_i8">Assessment of Fitness to ...</option><option data-dcnode-id="5631" value="#_i9">Preflight Screening: Hist...</option><option data-dcnode-id="5629" value="#_i10">Preflight Screening: Asse...</option><option data-dcnode-id="5627" value="#_i11">Interpretation of Hypoxic...</option><option data-dcnode-id="5625" value="#_i12">Supplementary Oxygen</option><option data-dcnode-id="5623" value="#_i13">Arrangement of Supplement...</option><option data-dcnode-id="5621" value="#_i14">Respiratory Disease–Speci...</option><option data-dcnode-id="5619" value="#_i23">Conclusions</option><option data-dcnode-id="5617" value="#_i24">References</option><option data-dcnode-id="5615" value="#citart1">CITING ARTICLES</option></select></form><div class="nextPrevSec" data-dcnode-id="5608"><a class="up" data-dcnode-id="5611" data-feathr-click-track="true" href="#_i6"><img alt="Previous section" border="0" data-dcnode-id="5612" height="9" hspace="5" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.atsjournals.org/templates/jsp/images/arrow_up.gif&amp;raw" width="11"></a><a class="down" data-dcnode-id="5609" data-feathr-click-track="true" href="#_i8"><img alt="Next section" border="0" data-dcnode-id="5610" height="9" hspace="5" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.atsjournals.org/templates/jsp/images/arrow_down.gif&amp;raw" width="11"></a></div></div></div><p data-dcnode-id="5586"><span data-dcnode-id="5605" instrument_node="">Air travel is also associated with an increased risk of venous thromboembolism, with the incidence of pulmonary embolism being 1.5 cases per million passengers if traveling distances greater than 5,000 km, and more than three times that for distances in excess of 10,000 km (</span><a class="ref showRefEvent" data-dcnode-id="5603" data-feathr-click-track="true" data-reflink="_i24" data-rid="bib26" href="#"><span data-dcnode-id="5604" instrument_node="">26</span></a><span data-dcnode-id="5602" instrument_node="">). The risk of venous thromboembolism in travelers is 2.8 times the risk for nontravelers (</span><a class="ref showRefEvent" data-dcnode-id="5600" data-feathr-click-track="true" data-reflink="_i24" data-rid="bib27" href="#"><span data-dcnode-id="5601" instrument_node="">27</span></a><span data-dcnode-id="5599" instrument_node="">), the risk being greatest among those traveling by air rather than using other means. These data suggest that the conditions encountered during commercial air travel may also predispose individuals to thrombotic complications. Immobility and dehydration may be important contributing factors to this increased risk; window seating and obesity are also associated with increased risk of venous thromboembolism during air travel (</span><a class="ref showRefEvent" data-dcnode-id="5597" data-feathr-click-track="true" data-reflink="_i24" data-rid="bib28" href="#"><span data-dcnode-id="5598" instrument_node="">28</span></a><span data-dcnode-id="5596" instrument_node="">, </span><a class="ref showRefEvent" data-dcnode-id="5594" data-feathr-click-track="true" data-reflink="_i24" data-rid="bib29" href="#"><span data-dcnode-id="5595" instrument_node="">29</span></a><span data-dcnode-id="5593" instrument_node="">). Other important risk factors include a history of previous venous thromboembolism, malignancy, oral contraceptive or hormone replacement therapy use, and a family history of venous thromboembolism (</span><a class="ref showRefEvent" data-dcnode-id="5591" data-feathr-click-track="true" data-reflink="_i24" data-rid="bib29" href="#"><span data-dcnode-id="5592" instrument_node="">29</span></a><span data-dcnode-id="5590" instrument_node="">, </span><a class="ref showRefEvent" data-dcnode-id="5588" data-feathr-click-track="true" data-reflink="_i24" data-rid="bib30" href="#"><span data-dcnode-id="5589" instrument_node="">30</span></a><span data-dcnode-id="5587" instrument_node="">).</span></p><p data-dcnode-id="5575"><span data-dcnode-id="5585" instrument_node="">Hypobaric hypoxia may also increase the risk of venous thromboembolism. Although simulated flight using a hypobaric chamber does not appear to alter blood coagulation in healthy individuals (</span><a class="ref showRefEvent" data-dcnode-id="5583" data-feathr-click-track="true" data-reflink="_i24" data-rid="bib31" href="#"><span data-dcnode-id="5584" instrument_node="">31</span></a><span data-dcnode-id="5582" instrument_node="">), air travel itself may affect blood clotting. Increases in levels of plasminogen activator inhibitor type 1 occur during long-haul flights, along with increases in the ratio of plasminogen activator inhibitor type 1 to tissue plasminogen activator, and also increases in factors VII and VIII (</span><a class="ref showRefEvent" data-dcnode-id="5580" data-feathr-click-track="true" data-reflink="_i24" data-rid="bib32" href="#"><span data-dcnode-id="5581" instrument_node="">32</span></a><span data-dcnode-id="5579" instrument_node="">). This suggests that a hypercoagulable state develops during air travel, with increases in clotting factors in addition to decreases in fibrinolytic mechanisms (</span><a class="ref showRefEvent" data-dcnode-id="5577" data-feathr-click-track="true" data-reflink="_i24" data-rid="bib32" href="#"><span data-dcnode-id="5578" instrument_node="">32</span></a><span data-dcnode-id="5576" instrument_node="">).</span></p><p data-dcnode-id="5570"><span data-dcnode-id="5574" instrument_node="">In contrast to these findings, a study of male airline pilots demonstrated a decreased risk of thromboembolism. It is possible that such a finding may reflect a selection bias as a result of age and sex, and also the regular medical screening evaluations that airline pilots undergo before obtaining a flying permit and throughout their career (</span><a class="ref showRefEvent" data-dcnode-id="5572" data-feathr-click-track="true" data-reflink="_i24" data-rid="bib33" href="#"><span data-dcnode-id="5573" instrument_node="">33</span></a><span data-dcnode-id="5571" instrument_node="">). Nonetheless, it is interesting that despite the duration and frequency of exposure to hypoxic conditions throughout their career, no increased risk was found. This would suggest that risk factors in addition to hypobaric hypoxia may be of greater significance.</span></p><p data-dcnode-id="5568"><span data-dcnode-id="5569" instrument_node="">Although controversial, overall there appears to be at least some evidence that flying predisposes to venous thromboembolism. Obesity and immobility are risk factors both at altitude and at sea level. Such factors are also particularly important for those with cardiac or pulmonary disease, as mobility in certain patients may become even more limited, especially in a hypoxic environment.</span></p></div><div class="NLM_sec NLM_sec_level_1" data-dcnode-id="5466"><a class="scroll-offset" data-dcnode-id="5565" data-feathr-click-track="true" name="_i8"></a><div class="sectionInfo" data-dcnode-id="5518"><div class="sectionHeading" data-dcnode-id="5563"><span data-dcnode-id="5564" instrument_node="">Assessment of Fitness to Fly</span></div><div class="sectionJumpTo" data-dcnode-id="5519"><div class="sectionLabel" data-dcnode-id="5561"><span data-dcnode-id="5562" instrument_node="">Section:</span></div><form data-dcnode-id="5525" style="margin-bottom:0"><select class="fulltextdd" data-dcnode-id="5526" name="select23" onchange="GoTo(this, 'self')"><option data-dcnode-id="5559" selected="#" value="#">Choose</option><option data-dcnode-id="5557" value="#">Top of page</option><option data-dcnode-id="5555" value="#abstract">Abstract</option><option data-dcnode-id="5553" value="#_i2">The Aircraft Cabin Enviro...</option><option data-dcnode-id="5551" value="#_i3">Consequences of Hypobaric...</option><option data-dcnode-id="5549" value="#_i6">Comorbid Cardiac Disease</option><option data-dcnode-id="5547" value="#_i7">Risk of Venous Thromboemb...</option><option data-dcnode-id="5545" value="">Assessment of Fitness to ... &lt;&lt;</option><option data-dcnode-id="5543" value="#_i9">Preflight Screening: Hist...</option><option data-dcnode-id="5541" value="#_i10">Preflight Screening: Asse...</option><option data-dcnode-id="5539" value="#_i11">Interpretation of Hypoxic...</option><option data-dcnode-id="5537" value="#_i12">Supplementary Oxygen</option><option data-dcnode-id="5535" value="#_i13">Arrangement of Supplement...</option><option data-dcnode-id="5533" value="#_i14">Respiratory Disease–Speci...</option><option data-dcnode-id="5531" value="#_i23">Conclusions</option><option data-dcnode-id="5529" value="#_i24">References</option><option data-dcnode-id="5527" value="#citart1">CITING ARTICLES</option></select></form><div class="nextPrevSec" data-dcnode-id="5520"><a class="up" data-dcnode-id="5523" data-feathr-click-track="true" href="#_i7"><img alt="Previous section" border="0" data-dcnode-id="5524" height="9" hspace="5" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.atsjournals.org/templates/jsp/images/arrow_up.gif&amp;raw" width="11"></a><a class="down" data-dcnode-id="5521" data-feathr-click-track="true" href="#_i9"><img alt="Next section" border="0" data-dcnode-id="5522" height="9" hspace="5" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.atsjournals.org/templates/jsp/images/arrow_down.gif&amp;raw" width="11"></a></div></div></div><p data-dcnode-id="5481"><span data-dcnode-id="5517" instrument_node="">To date, assessment of fitness to fly in patients with pulmonary disease has largely been studied in patients with COPD, although patients with restrictive lung disease and cystic fibrosis have also been studied (</span><a class="ref showRefEvent" data-dcnode-id="5515" data-feathr-click-track="true" data-reflink="_i24" data-rid="bib10" href="#"><span data-dcnode-id="5516" instrument_node="">10</span></a><span data-dcnode-id="5514" instrument_node="">–</span><a class="ref showRefEvent" data-dcnode-id="5512" data-feathr-click-track="true" data-reflink="_i24" data-rid="bib14" href="#"><span data-dcnode-id="5513" instrument_node="">14</span></a><span data-dcnode-id="5511" instrument_node="">, </span><a class="ref showRefEvent" data-dcnode-id="5509" data-feathr-click-track="true" data-reflink="_i24" data-rid="bib18" href="#"><span data-dcnode-id="5510" instrument_node="">18</span></a><span data-dcnode-id="5508" instrument_node="">, </span><a class="ref showRefEvent" data-dcnode-id="5506" data-feathr-click-track="true" data-reflink="_i24" data-rid="bib34" href="#"><span data-dcnode-id="5507" instrument_node="">34</span></a><span data-dcnode-id="5505" instrument_node="">–</span><a class="ref showRefEvent" data-dcnode-id="5503" data-feathr-click-track="true" data-reflink="_i24" data-rid="bib37" href="#"><span data-dcnode-id="5504" instrument_node="">37</span></a><span data-dcnode-id="5502" instrument_node="">). The Centers for Disease Control and Prevention (CDC, Atlanta, GA) estimates that approximately 15 million people have a diagnosis of COPD in the United States alone (</span><a class="ref showRefEvent" data-dcnode-id="5500" data-feathr-click-track="true" data-reflink="_i24" data-rid="bib38" href="#"><span data-dcnode-id="5501" instrument_node="">38</span></a><span data-dcnode-id="5499" instrument_node="">), while globally, although precise data from outside Europe and North America are lacking, the prevalence of COPD within other populations may be even greater (</span><a class="ref showRefEvent" data-dcnode-id="5497" data-feathr-click-track="true" data-reflink="_i24" data-rid="bib39" href="#"><span data-dcnode-id="5498" instrument_node="">39</span></a><span data-dcnode-id="5496" instrument_node="">). Furthermore, precise data on patients either with or at risk of significant hypoxemia are not available. However, within the COPDGene cohort, for example, 7.7% of those with an FEV</span><sub data-dcnode-id="5494"><span data-dcnode-id="5495" instrument_node="">1</span></sub><span data-dcnode-id="5493" instrument_node=""> less than 80% had resting hypoxemia (oxygen saturation as determined by pulse oximetry [Sp</span><sub data-dcnode-id="5489"><span data-dcnode-id="5492" instrument_node="">O</span><sub data-dcnode-id="5490"><span data-dcnode-id="5491" instrument_node="">2</span></sub></sub><span data-dcnode-id="5488" instrument_node="">] &lt; 88%) (</span><a class="ref showRefEvent" data-dcnode-id="5486" data-feathr-click-track="true" data-reflink="_i24" data-rid="bib40" href="#"><span data-dcnode-id="5487" instrument_node="">40</span></a><span data-dcnode-id="5485" instrument_node="">). Although this may be an overestimation, as many of these patients were recruited from the Denver study site (at an altitude of 5,280 ft) (</span><a class="ref showRefEvent" data-dcnode-id="5483" data-feathr-click-track="true" data-reflink="_i24" data-rid="bib40" href="#"><span data-dcnode-id="5484" instrument_node="">40</span></a><span data-dcnode-id="5482" instrument_node="">), this study highlights the frequency of hypoxemia even at a modest altitude in a significant number of patients with mild COPD.</span></p><p data-dcnode-id="5467"><span data-dcnode-id="5480" instrument_node="">Extrapolating these data to the CDC estimates, up to 288,750 patients with COPD in the United States may therefore be at increased risk of hypoxemia and in-flight complications. Even among those patients who are receiving supplemental oxygen, a significant number may be traveling with insufficient oxygen supplementation (</span><a class="ref showRefEvent" data-dcnode-id="5478" data-feathr-click-track="true" data-reflink="_i24" data-rid="bib25" href="#"><span data-dcnode-id="5479" instrument_node="">25</span></a><span data-dcnode-id="5477" instrument_node="">). The COPDGene study also found that 25% of patients with severe resting hypoxemia were not using supplemental oxygen (</span><a class="ref showRefEvent" data-dcnode-id="5475" data-feathr-click-track="true" data-reflink="_i24" data-rid="bib40" href="#"><span data-dcnode-id="5476" instrument_node="">40</span></a><span data-dcnode-id="5474" instrument_node="">). Data from 20 years ago also highlighted this issue, indicating that only 25% of the patients who were prescribed supplemental oxygen actually used it when traveling by air (</span><a class="ref showRefEvent" data-dcnode-id="5472" data-feathr-click-track="true" data-reflink="_i24" data-rid="bib25" href="#"><span data-dcnode-id="5473" instrument_node="">25</span></a><span data-dcnode-id="5471" instrument_node="">). However, a notable finding of this study was that despite arrangements being made with airlines before traveling, oxygen was still not available for some patients (</span><a class="ref showRefEvent" data-dcnode-id="5469" data-feathr-click-track="true" data-reflink="_i24" data-rid="bib25" href="#"><span data-dcnode-id="5470" instrument_node="">25</span></a><span data-dcnode-id="5468" instrument_node="">).</span></p></div><div class="NLM_sec NLM_sec_level_1" data-dcnode-id="5411"><a class="scroll-offset" data-dcnode-id="5464" data-feathr-click-track="true" name="_i9"></a><div class="sectionInfo" data-dcnode-id="5417"><div class="sectionHeading" data-dcnode-id="5462"><span data-dcnode-id="5463" instrument_node="">Preflight Screening: History, Physical Examination, and Spirometry</span></div><div class="sectionJumpTo" data-dcnode-id="5418"><div class="sectionLabel" data-dcnode-id="5460"><span data-dcnode-id="5461" instrument_node="">Section:</span></div><form data-dcnode-id="5424" style="margin-bottom:0"><select class="fulltextdd" data-dcnode-id="5425" name="select23" onchange="GoTo(this, 'self')"><option data-dcnode-id="5458" selected="#" value="#">Choose</option><option data-dcnode-id="5456" value="#">Top of page</option><option data-dcnode-id="5454" value="#abstract">Abstract</option><option data-dcnode-id="5452" value="#_i2">The Aircraft Cabin Enviro...</option><option data-dcnode-id="5450" value="#_i3">Consequences of Hypobaric...</option><option data-dcnode-id="5448" value="#_i6">Comorbid Cardiac Disease</option><option data-dcnode-id="5446" value="#_i7">Risk of Venous Thromboemb...</option><option data-dcnode-id="5444" value="#_i8">Assessment of Fitness to ...</option><option data-dcnode-id="5442" value="">Preflight Screening: Hist... &lt;&lt;</option><option data-dcnode-id="5440" value="#_i10">Preflight Screening: Asse...</option><option data-dcnode-id="5438" value="#_i11">Interpretation of Hypoxic...</option><option data-dcnode-id="5436" value="#_i12">Supplementary Oxygen</option><option data-dcnode-id="5434" value="#_i13">Arrangement of Supplement...</option><option data-dcnode-id="5432" value="#_i14">Respiratory Disease–Speci...</option><option data-dcnode-id="5430" value="#_i23">Conclusions</option><option data-dcnode-id="5428" value="#_i24">References</option><option data-dcnode-id="5426" value="#citart1">CITING ARTICLES</option></select></form><div class="nextPrevSec" data-dcnode-id="5419"><a class="up" data-dcnode-id="5422" data-feathr-click-track="true" href="#_i8"><img alt="Previous section" border="0" data-dcnode-id="5423" height="9" hspace="5" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.atsjournals.org/templates/jsp/images/arrow_up.gif&amp;raw" width="11"></a><a class="down" data-dcnode-id="5420" data-feathr-click-track="true" href="#_i10"><img alt="Next section" border="0" data-dcnode-id="5421" height="9" hspace="5" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.atsjournals.org/templates/jsp/images/arrow_down.gif&amp;raw" width="11"></a></div></div></div><p data-dcnode-id="5412"><span data-dcnode-id="5416" instrument_node="">As part of a preflight screening evaluation, medical history and physical examination should be performed. Comorbid conditions such as cardiovascular disease, cerebrovascular disease, other neurological disease, and anemia should be evaluated. In one study, up to 55% of patients attending a preflight screening had flown within the preceding 2 years (</span><a class="ref showRefEvent" data-dcnode-id="5414" data-feathr-click-track="true" data-reflink="_i24" data-rid="bib25" href="#"><span data-dcnode-id="5415" instrument_node="">25</span></a><span data-dcnode-id="5413" instrument_node="">). Any previous flying history should therefore be explored, as this may yield important information as to symptoms or complications that may have occurred during or after air travel. In the absence of any contraindication, spirometry should be performed on patients with a history of acute or chronic lung disease or with symptoms suggestive of lung disease. Contraindications would include pneumothorax, massive hemoptysis, recent chest surgery, and tuberculosis. Pulse oximetry at rest should also be done, with arterial blood gas confirmation in addition to this if hypercapnia is suspected.</span></p></div><div class="NLM_sec NLM_sec_level_1" data-dcnode-id="5103"><a class="scroll-offset" data-dcnode-id="5409" data-feathr-click-track="true" name="_i10"></a><div class="sectionInfo" data-dcnode-id="5362"><div class="sectionHeading" data-dcnode-id="5407"><span data-dcnode-id="5408" instrument_node="">Preflight Screening: Assessing the Risk for Hypoxemia</span></div><div class="sectionJumpTo" data-dcnode-id="5363"><div class="sectionLabel" data-dcnode-id="5405"><span data-dcnode-id="5406" instrument_node="">Section:</span></div><form data-dcnode-id="5369" style="margin-bottom:0"><select class="fulltextdd" data-dcnode-id="5370" name="select23" onchange="GoTo(this, 'self')"><option data-dcnode-id="5403" selected="#" value="#">Choose</option><option data-dcnode-id="5401" value="#">Top of page</option><option data-dcnode-id="5399" value="#abstract">Abstract</option><option data-dcnode-id="5397" value="#_i2">The Aircraft Cabin Enviro...</option><option data-dcnode-id="5395" value="#_i3">Consequences of Hypobaric...</option><option data-dcnode-id="5393" value="#_i6">Comorbid Cardiac Disease</option><option data-dcnode-id="5391" value="#_i7">Risk of Venous Thromboemb...</option><option data-dcnode-id="5389" value="#_i8">Assessment of Fitness to ...</option><option data-dcnode-id="5387" value="#_i9">Preflight Screening: Hist...</option><option data-dcnode-id="5385" value="">Preflight Screening: Asse... &lt;&lt;</option><option data-dcnode-id="5383" value="#_i11">Interpretation of Hypoxic...</option><option data-dcnode-id="5381" value="#_i12">Supplementary Oxygen</option><option data-dcnode-id="5379" value="#_i13">Arrangement of Supplement...</option><option data-dcnode-id="5377" value="#_i14">Respiratory Disease–Speci...</option><option data-dcnode-id="5375" value="#_i23">Conclusions</option><option data-dcnode-id="5373" value="#_i24">References</option><option data-dcnode-id="5371" value="#citart1">CITING ARTICLES</option></select></form><div class="nextPrevSec" data-dcnode-id="5364"><a class="up" data-dcnode-id="5367" data-feathr-click-track="true" href="#_i9"><img alt="Previous section" border="0" data-dcnode-id="5368" height="9" hspace="5" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.atsjournals.org/templates/jsp/images/arrow_up.gif&amp;raw" width="11"></a><a class="down" data-dcnode-id="5365" data-feathr-click-track="true" href="#_i11"><img alt="Next section" border="0" data-dcnode-id="5366" height="9" hspace="5" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.atsjournals.org/templates/jsp/images/arrow_down.gif&amp;raw" width="11"></a></div></div></div><p data-dcnode-id="5338"><span data-dcnode-id="5361" instrument_node="">A number of methods of assessment for hypoxemia risk during air travel are available (</span><a class="ref showRefEvent" data-dcnode-id="5359" data-feathr-click-track="true" data-reflink="_i24" data-rid="bib8" href="#"><span data-dcnode-id="5360" instrument_node="">8</span></a><span data-dcnode-id="5358" instrument_node="">, </span><a class="ref showRefEvent" data-dcnode-id="5356" data-feathr-click-track="true" data-reflink="_i24" data-rid="bib34" href="#"><span data-dcnode-id="5357" instrument_node="">34</span></a><span data-dcnode-id="5355" instrument_node="">, </span><a class="ref showRefEvent" data-dcnode-id="5353" data-feathr-click-track="true" data-reflink="_i24" data-rid="bib41" href="#"><span data-dcnode-id="5354" instrument_node="">41</span></a><span data-dcnode-id="5352" instrument_node="">). These include sea-level measurement of Sp</span><sub data-dcnode-id="5348"><span data-dcnode-id="5351" instrument_node="">O</span><sub data-dcnode-id="5349"><span data-dcnode-id="5350" instrument_node="">2</span></sub></sub><span data-dcnode-id="5347" instrument_node=""> and Pa</span><sub data-dcnode-id="5343"><span data-dcnode-id="5346" instrument_node="">O</span><sub data-dcnode-id="5344"><span data-dcnode-id="5345" instrument_node="">2</span></sub></sub><span data-dcnode-id="5342" instrument_node="">, the use of equations to predict hypoxemia at altitude, and also hypoxic challenge testing, performed under either normobaric or hypobaric conditions. </span><a class="ref" data-dcnode-id="5340" data-feathr-click-track="true" href="javascript:popRef('tbl3')"><span data-dcnode-id="5341" instrument_node="">Table 3</span></a><span data-dcnode-id="5339" instrument_node=""> summarizes the relative advantages and disadvantages of these methods.</span></p><div class="anchor-spacer" data-dcnode-id="5337" id="tbl3"></div><div class="article-table-content" data-dcnode-id="5241" id="tbl3"><table class="table article-section__table" data-dcnode-id="5256"><caption data-dcnode-id="5331"><p data-dcnode-id="5332"><span class="captionLabel" data-dcnode-id="5334"><b data-dcnode-id="5335"><span data-dcnode-id="5336" instrument_node="">Table 3.</span></b></span><span data-dcnode-id="5333" instrument_node=""> Methods for assessment of hypoxia at altitude</span></p></caption><thead data-dcnode-id="5321"><tr class="rowsep1" data-dcnode-id="5322" valign="top"><th align="left" class="rowsep1 align_left" data-dcnode-id="5329"><span data-dcnode-id="5330" instrument_node="">Method</span></th><th align="center" class="rowsep1 align_center" data-dcnode-id="5327"><span data-dcnode-id="5328" instrument_node="">Patients Studied</span></th><th align="center" class="rowsep1 align_center" data-dcnode-id="5325"><span data-dcnode-id="5326" instrument_node="">Advantages</span></th><th align="center" class="rowsep1 align_center last" data-dcnode-id="5323"><span data-dcnode-id="5324" instrument_node="">Disadvantages</span></th></tr></thead><tbody data-dcnode-id="5257"><tr data-dcnode-id="5308" valign="top"><td align="left" class="align_left" data-dcnode-id="5315"><span data-dcnode-id="5320" instrument_node="">Sea-level Sp</span><sub data-dcnode-id="5316"><span data-dcnode-id="5319" instrument_node="">O</span><sub data-dcnode-id="5317"><span data-dcnode-id="5318" instrument_node="">2</span></sub></sub></td><td align="left" class="align_left" data-dcnode-id="5313"><span data-dcnode-id="5314" instrument_node="">COPD, ILD, CF</span></td><td align="left" class="align_left" data-dcnode-id="5311"><span data-dcnode-id="5312" instrument_node="">Ease of use</span></td><td align="left" class="align_left last" data-dcnode-id="5309"><span data-dcnode-id="5310" instrument_node="">Underestimates oxygen requirements</span></td></tr><tr data-dcnode-id="5299" valign="top"><td align="left" class="align_left" data-dcnode-id="5306"><span data-dcnode-id="5307" instrument_node="">Predictive equations</span></td><td align="left" class="align_left" data-dcnode-id="5304"><span data-dcnode-id="5305" instrument_node="">COPD, ILD, CF</span></td><td align="left" class="align_left" data-dcnode-id="5302"><span data-dcnode-id="5303" instrument_node="">Ease of use</span></td><td align="left" class="align_left last" data-dcnode-id="5300"><span data-dcnode-id="5301" instrument_node="">Overestimates oxygen requirements</span></td></tr><tr data-dcnode-id="5285" valign="top"><td align="left" class="align_left" data-dcnode-id="5297" rowspan="2"><span data-dcnode-id="5298" instrument_node="">Normobaric hypoxic testing</span></td><td align="left" class="align_left" data-dcnode-id="5295" rowspan="2"><span data-dcnode-id="5296" instrument_node="">COPD, ILD, CF</span></td><td align="left" class="align_left" data-dcnode-id="5293"><span data-dcnode-id="5294" instrument_node="">Widely available</span></td><td align="left" class="align_left last" data-dcnode-id="5286" rowspan="2"><span data-dcnode-id="5292" instrument_node="">May underestimate Sp</span><sub data-dcnode-id="5288"><span data-dcnode-id="5291" instrument_node="">O</span><sub data-dcnode-id="5289"><span data-dcnode-id="5290" instrument_node="">2</span></sub></sub><span data-dcnode-id="5287" instrument_node=""> on exertion; suboptimal at titrating supplemental oxygen</span></td></tr><tr data-dcnode-id="5277" valign="top"><td align="left" class="align_left" data-dcnode-id="5278"><span data-dcnode-id="5284" instrument_node="">Good correlation with in-flight Sp</span><sub data-dcnode-id="5280"><span data-dcnode-id="5283" instrument_node="">O</span><sub data-dcnode-id="5281"><span data-dcnode-id="5282" instrument_node="">2</span></sub></sub><span data-dcnode-id="5279" instrument_node="">; technically easy to perform</span></td></tr><tr data-dcnode-id="5268" valign="top"><td align="left" class="align_left" data-dcnode-id="5275" rowspan="2"><span data-dcnode-id="5276" instrument_node="">Hypobaric hypoxic testing</span></td><td align="left" class="align_left" data-dcnode-id="5273" rowspan="2"><span data-dcnode-id="5274" instrument_node="">COPD, ILD, CF</span></td><td align="left" class="align_left" data-dcnode-id="5271"><span data-dcnode-id="5272" instrument_node="">Reproduces hypobaric environment</span></td><td align="left" class="align_left last" data-dcnode-id="5269"><span data-dcnode-id="5270" instrument_node="">Not widely available</span></td></tr><tr class="last" data-dcnode-id="5258" valign="top"><td align="left" class="align_left" data-dcnode-id="5261"><span data-dcnode-id="5267" instrument_node="">More accurate estimation of Sp</span><sub data-dcnode-id="5263"><span data-dcnode-id="5266" instrument_node="">O</span><sub data-dcnode-id="5264"><span data-dcnode-id="5265" instrument_node="">2</span></sub></sub><span data-dcnode-id="5262" instrument_node=""> at altitude; superior at titration of supplemental oxygen</span></td><td align="left" class="align_left last" data-dcnode-id="5259"><span data-dcnode-id="5260" instrument_node="">Technically more complex to perform</span></td></tr></tbody></table><div class="tableFooter" data-dcnode-id="5242"><div class="footnote" data-dcnode-id="5246"><p data-dcnode-id="5247"><i data-dcnode-id="5254"><span data-dcnode-id="5255" instrument_node="">Definition of abbreviations</span></i><span data-dcnode-id="5253" instrument_node="">: CF = cystic fibrosis; COPD = chronic obstructive pulmonary disease; ILD = interstitial lung disease; Sp</span><sub data-dcnode-id="5249"><span data-dcnode-id="5252" instrument_node="">O</span><sub data-dcnode-id="5250"><span data-dcnode-id="5251" instrument_node="">2</span></sub></sub><span data-dcnode-id="5248" instrument_node=""> = oxygen saturation as determined by pulse oximetry.</span></p></div><div class="footnote" data-dcnode-id="5243"><p data-dcnode-id="5244"><span data-dcnode-id="5245" instrument_node="">Shown are methods for assessment of hypoxemia at altitude and relative advantages and the disadvantages of each.</span></p></div></div></div><p data-dcnode-id="5205"><span data-dcnode-id="5240" instrument_node="">Compared with other methods, the use of Sp</span><sub data-dcnode-id="5236"><span data-dcnode-id="5239" instrument_node="">O</span><sub data-dcnode-id="5237"><span data-dcnode-id="5238" instrument_node="">2</span></sub></sub><span data-dcnode-id="5235" instrument_node=""> measurements at sea level to risk-stratify patients has become recognized as a less reliable predictor of in-flight Sp</span><sub data-dcnode-id="5231"><span data-dcnode-id="5234" instrument_node="">O</span><sub data-dcnode-id="5232"><span data-dcnode-id="5233" instrument_node="">2</span></sub></sub><span data-dcnode-id="5230" instrument_node=""> (</span><a class="ref showRefEvent" data-dcnode-id="5228" data-feathr-click-track="true" data-reflink="_i24" data-rid="bib8" href="#"><span data-dcnode-id="5229" instrument_node="">8</span></a><span data-dcnode-id="5227" instrument_node="">). In the 2002 BTS guidelines, an Sp</span><sub data-dcnode-id="5223"><span data-dcnode-id="5226" instrument_node="">O</span><sub data-dcnode-id="5224"><span data-dcnode-id="5225" instrument_node="">2</span></sub></sub><span data-dcnode-id="5222" instrument_node=""> of 92–95% without risk factors or Sp</span><sub data-dcnode-id="5218"><span data-dcnode-id="5221" instrument_node="">O</span><sub data-dcnode-id="5219"><span data-dcnode-id="5220" instrument_node="">2</span></sub></sub><span data-dcnode-id="5217" instrument_node=""> greater than 95% was used to indicate that no further testing was warranted (</span><a class="ref showRefEvent" data-dcnode-id="5215" data-feathr-click-track="true" data-reflink="_i24" data-rid="bib41" href="#"><span data-dcnode-id="5216" instrument_node="">41</span></a><span data-dcnode-id="5214" instrument_node="">). However, despite having Sp</span><sub data-dcnode-id="5210"><span data-dcnode-id="5213" instrument_node="">O</span><sub data-dcnode-id="5211"><span data-dcnode-id="5212" instrument_node="">2</span></sub></sub><span data-dcnode-id="5209" instrument_node=""> greater than 96%, 23% of patients in one study had significant hypoxemia warranting in-flight oxygen supplementation when tested by hypoxic challenge testing (</span><a class="ref showRefEvent" data-dcnode-id="5207" data-feathr-click-track="true" data-reflink="_i24" data-rid="bib42" href="#"><span data-dcnode-id="5208" instrument_node="">42</span></a><span data-dcnode-id="5206" instrument_node="">).</span></p><p data-dcnode-id="5185"><span data-dcnode-id="5204" instrument_node="">In addition, among 100 patients with COPD who were stratified on the basis of Sp</span><sub data-dcnode-id="5200"><span data-dcnode-id="5203" instrument_node="">O</span><sub data-dcnode-id="5201"><span data-dcnode-id="5202" instrument_node="">2</span></sub></sub><span data-dcnode-id="5199" instrument_node=""> thresholds from the 2002 BTS algorithm and then underwent pulse oximetry and normobaric hypoxic challenge testing, the sensitivity and specificity for these Sp</span><sub data-dcnode-id="5195"><span data-dcnode-id="5198" instrument_node="">O</span><sub data-dcnode-id="5196"><span data-dcnode-id="5197" instrument_node="">2</span></sub></sub><span data-dcnode-id="5194" instrument_node=""> thresholds were only 59 and 72%, respectively (</span><a class="ref showRefEvent" data-dcnode-id="5192" data-feathr-click-track="true" data-reflink="_i24" data-rid="bib43" href="#"><span data-dcnode-id="5193" instrument_node="">43</span></a><span data-dcnode-id="5191" instrument_node="">). Thus, a lower-normal Sp</span><sub data-dcnode-id="5187"><span data-dcnode-id="5190" instrument_node="">O</span><sub data-dcnode-id="5188"><span data-dcnode-id="5189" instrument_node="">2</span></sub></sub><span data-dcnode-id="5186" instrument_node=""> even without risk factors is no longer considered a sufficiently robust test by which to screen patients, and additional hypoxic challenge testing is recommended.</span></p><p data-dcnode-id="5166"><span data-dcnode-id="5184" instrument_node="">Predictive equations have also been used to estimate the risk of hypoxemia at high altitude; they incorporate sea-level measurements of Pa</span><sub data-dcnode-id="5180"><span data-dcnode-id="5183" instrument_node="">O</span><sub data-dcnode-id="5181"><span data-dcnode-id="5182" instrument_node="">2</span></sub></sub><span data-dcnode-id="5179" instrument_node=""> and other parameters such as FEV</span><sub data-dcnode-id="5177"><span data-dcnode-id="5178" instrument_node="">1</span></sub><span data-dcnode-id="5176" instrument_node=""> or anticipated cabin altitude (</span><a class="ref showRefEvent" data-dcnode-id="5174" data-feathr-click-track="true" data-reflink="_i24" data-rid="bib44" href="#"><span data-dcnode-id="5175" instrument_node="">44</span></a><span data-dcnode-id="5173" instrument_node="">, </span><a class="ref showRefEvent" data-dcnode-id="5171" data-feathr-click-track="true" data-reflink="_i24" data-rid="bib45" href="#"><span data-dcnode-id="5172" instrument_node="">45</span></a><span data-dcnode-id="5170" instrument_node="">). However, predictive equations do not compare favorably with hypoxic challenge testing in identifying the need for supplemental oxygen among patients with COPD, interstitial lung disease, or cystic fibrosis (</span><a class="ref showRefEvent" data-dcnode-id="5168" data-feathr-click-track="true" data-reflink="_i24" data-rid="bib34" href="#"><span data-dcnode-id="5169" instrument_node="">34</span></a><span data-dcnode-id="5167" instrument_node="">), as many of the equations consistently overestimated the need for supplemental oxygen, thus incurring unnecessary additional cost.</span></p><p data-dcnode-id="5133"><span data-dcnode-id="5165" instrument_node="">Normobaric hypoxic challenge testing is now the preferred method to assess risk of hypoxemia at altitude. It is becoming more widely available and correlates well with other means of assessment, and with air travel itself (</span><a class="ref showRefEvent" data-dcnode-id="5163" data-feathr-click-track="true" data-reflink="_i24" data-rid="bib42" href="#"><span data-dcnode-id="5164" instrument_node="">42</span></a><span data-dcnode-id="5162" instrument_node="">). It uses a decreased (normobaric) fraction of inspired oxygen (F</span><span class="smallcaps smallerCapital" data-dcnode-id="5160"><span data-dcnode-id="5161" instrument_node="">i</span></span><sub data-dcnode-id="5156"><span data-dcnode-id="5159" instrument_node="">O</span><sub data-dcnode-id="5157"><span data-dcnode-id="5158" instrument_node="">2</span></sub></sub><span data-dcnode-id="5155" instrument_node="">) to simulate the hypoxic conditions at altitude. Data from normobaric hypoxic challenge testing have been compared with actual in-flight data collated in the same individual patients with COPD (</span><a class="ref showRefEvent" data-dcnode-id="5153" data-feathr-click-track="true" data-reflink="_i24" data-rid="bib46" href="#"><span data-dcnode-id="5154" instrument_node="">46</span></a><span data-dcnode-id="5152" instrument_node="">). Sp</span><sub data-dcnode-id="5148"><span data-dcnode-id="5151" instrument_node="">O</span><sub data-dcnode-id="5149"><span data-dcnode-id="5150" instrument_node="">2</span></sub></sub><span data-dcnode-id="5147" instrument_node=""> decreased from 95% at sea level to 86% in-flight, which compared well with hypoxic challenge testing with a sea-level Sp</span><sub data-dcnode-id="5143"><span data-dcnode-id="5146" instrument_node="">O</span><sub data-dcnode-id="5144"><span data-dcnode-id="5145" instrument_node="">2</span></sub></sub><span data-dcnode-id="5142" instrument_node=""> of 96%, decreasing to 84% at simulated altitude. Hypoxic challenge testing correlated strongly with actual flight data (</span><i data-dcnode-id="5140"><span data-dcnode-id="5141" instrument_node="">r</span></i><span data-dcnode-id="5139" instrument_node=""> = 0.84). However, the mean nadir for Sp</span><sub data-dcnode-id="5135"><span data-dcnode-id="5138" instrument_node="">O</span><sub data-dcnode-id="5136"><span data-dcnode-id="5137" instrument_node="">2</span></sub></sub><span data-dcnode-id="5134" instrument_node=""> during commercial flight was 78%, occurring during periods of activity, demonstrating that the hypoxic challenge test tended to underestimate the severity of in-flight hypoxemia.</span></p><p data-dcnode-id="5104"><span data-dcnode-id="5132" instrument_node="">Although normobaric testing compares well with both hypobaric testing and actual air travel (</span><a class="ref showRefEvent" data-dcnode-id="5130" data-feathr-click-track="true" data-reflink="_i24" data-rid="bib35" href="#"><span data-dcnode-id="5131" instrument_node="">35</span></a><span data-dcnode-id="5129" instrument_node="">–</span><a class="ref showRefEvent" data-dcnode-id="5127" data-feathr-click-track="true" data-reflink="_i24" data-rid="bib37" href="#"><span data-dcnode-id="5128" instrument_node="">37</span></a><span data-dcnode-id="5126" instrument_node="">, </span><a class="ref showRefEvent" data-dcnode-id="5124" data-feathr-click-track="true" data-reflink="_i24" data-rid="bib46" href="#"><span data-dcnode-id="5125" instrument_node="">46</span></a><span data-dcnode-id="5123" instrument_node="">), the potential effects of decreased barometric pressure are not reproduced with a normobaric study. However, hypobaric testing is not widely available (</span><a class="ref showRefEvent" data-dcnode-id="5121" data-feathr-click-track="true" data-reflink="_i24" data-rid="bib8" href="#"><span data-dcnode-id="5122" instrument_node="">8</span></a><span data-dcnode-id="5120" instrument_node="">). It is unclear to what extent lower barometric pressure might alter the physiological changes encountered during commercial air travel. In experimental studies, a hypobaric environment is associated with a decrease in FEV</span><sub data-dcnode-id="5118"><span data-dcnode-id="5119" instrument_node="">1</span></sub><span data-dcnode-id="5117" instrument_node=""> and FVC in both normal individuals and those with COPD (</span><a class="ref showRefEvent" data-dcnode-id="5115" data-feathr-click-track="true" data-reflink="_i24" data-rid="bib47" href="#"><span data-dcnode-id="5116" instrument_node="">47</span></a><span data-dcnode-id="5114" instrument_node="">). An increase in residual volume, FRC, and TLC is also seen (</span><a class="ref showRefEvent" data-dcnode-id="5112" data-feathr-click-track="true" data-reflink="_i24" data-rid="bib48" href="#"><span data-dcnode-id="5113" instrument_node="">48</span></a><span data-dcnode-id="5111" instrument_node="">). Residual volume increases significantly in patients with COPD (</span><a class="ref showRefEvent" data-dcnode-id="5109" data-feathr-click-track="true" data-reflink="_i24" data-rid="bib47" href="#"><span data-dcnode-id="5110" instrument_node="">47</span></a><span data-dcnode-id="5108" instrument_node="">), and FRC and TLC increase in patients with cystic fibrosis (</span><a class="ref showRefEvent" data-dcnode-id="5106" data-feathr-click-track="true" data-reflink="_i24" data-rid="bib18" href="#"><span data-dcnode-id="5107" instrument_node="">18</span></a><span data-dcnode-id="5105" instrument_node="">). In a hypobaric hypoxic environment, these factors together with the demand for increased minute ventilation might further increase the risk of dynamic hyperinflation. Detection of clinically significant hyperinflation before air travel may therefore be relevant in some patients with obstructive lung disease.</span></p></div><div class="NLM_sec NLM_sec_level_1" data-dcnode-id="5038"><a class="scroll-offset" data-dcnode-id="5101" data-feathr-click-track="true" name="_i11"></a><div class="sectionInfo" data-dcnode-id="5054"><div class="sectionHeading" data-dcnode-id="5099"><span data-dcnode-id="5100" instrument_node="">Interpretation of Hypoxic Challenge Testing Results</span></div><div class="sectionJumpTo" data-dcnode-id="5055"><div class="sectionLabel" data-dcnode-id="5097"><span data-dcnode-id="5098" instrument_node="">Section:</span></div><form data-dcnode-id="5061" style="margin-bottom:0"><select class="fulltextdd" data-dcnode-id="5062" name="select23" onchange="GoTo(this, 'self')"><option data-dcnode-id="5095" selected="#" value="#">Choose</option><option data-dcnode-id="5093" value="#">Top of page</option><option data-dcnode-id="5091" value="#abstract">Abstract</option><option data-dcnode-id="5089" value="#_i2">The Aircraft Cabin Enviro...</option><option data-dcnode-id="5087" value="#_i3">Consequences of Hypobaric...</option><option data-dcnode-id="5085" value="#_i6">Comorbid Cardiac Disease</option><option data-dcnode-id="5083" value="#_i7">Risk of Venous Thromboemb...</option><option data-dcnode-id="5081" value="#_i8">Assessment of Fitness to ...</option><option data-dcnode-id="5079" value="#_i9">Preflight Screening: Hist...</option><option data-dcnode-id="5077" value="#_i10">Preflight Screening: Asse...</option><option data-dcnode-id="5075" value="">Interpretation of Hypoxic... &lt;&lt;</option><option data-dcnode-id="5073" value="#_i12">Supplementary Oxygen</option><option data-dcnode-id="5071" value="#_i13">Arrangement of Supplement...</option><option data-dcnode-id="5069" value="#_i14">Respiratory Disease–Speci...</option><option data-dcnode-id="5067" value="#_i23">Conclusions</option><option data-dcnode-id="5065" value="#_i24">References</option><option data-dcnode-id="5063" value="#citart1">CITING ARTICLES</option></select></form><div class="nextPrevSec" data-dcnode-id="5056"><a class="up" data-dcnode-id="5059" data-feathr-click-track="true" href="#_i10"><img alt="Previous section" border="0" data-dcnode-id="5060" height="9" hspace="5" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.atsjournals.org/templates/jsp/images/arrow_up.gif&amp;raw" width="11"></a><a class="down" data-dcnode-id="5057" data-feathr-click-track="true" href="#_i12"><img alt="Next section" border="0" data-dcnode-id="5058" height="9" hspace="5" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.atsjournals.org/templates/jsp/images/arrow_down.gif&amp;raw" width="11"></a></div></div></div><p data-dcnode-id="5039"><span data-dcnode-id="5053" instrument_node="">The BTS guidelines (2011) outline thresholds for prescribing supplemental oxygen for air travel. After the administration of a 15% fractional concentration of inspired oxygen for 20 minutes, a Pa</span><sub data-dcnode-id="5049"><span data-dcnode-id="5052" instrument_node="">O</span><sub data-dcnode-id="5050"><span data-dcnode-id="5051" instrument_node="">2</span></sub></sub><span data-dcnode-id="5048" instrument_node=""> greater than 50 mm Hg or an Sp</span><sub data-dcnode-id="5044"><span data-dcnode-id="5047" instrument_node="">O</span><sub data-dcnode-id="5045"><span data-dcnode-id="5046" instrument_node="">2</span></sub></sub><span data-dcnode-id="5043" instrument_node=""> of at least 85% could suggest that in-flight oxygen is not required. However, pulse oximeter or arterial blood gas values less than that require oxygen supplementation via nasal cannulas (</span><a class="ref showRefEvent" data-dcnode-id="5041" data-feathr-click-track="true" data-reflink="_i24" data-rid="bib8" href="#"><span data-dcnode-id="5042" instrument_node="">8</span></a><span data-dcnode-id="5040" instrument_node="">).</span></p></div><div class="NLM_sec NLM_sec_level_1" data-dcnode-id="4965"><a class="scroll-offset" data-dcnode-id="5036" data-feathr-click-track="true" name="_i12"></a><div class="sectionInfo" data-dcnode-id="4989"><div class="sectionHeading" data-dcnode-id="5034"><span data-dcnode-id="5035" instrument_node="">Supplementary Oxygen</span></div><div class="sectionJumpTo" data-dcnode-id="4990"><div class="sectionLabel" data-dcnode-id="5032"><span data-dcnode-id="5033" instrument_node="">Section:</span></div><form data-dcnode-id="4996" style="margin-bottom:0"><select class="fulltextdd" data-dcnode-id="4997" name="select23" onchange="GoTo(this, 'self')"><option data-dcnode-id="5030" selected="#" value="#">Choose</option><option data-dcnode-id="5028" value="#">Top of page</option><option data-dcnode-id="5026" value="#abstract">Abstract</option><option data-dcnode-id="5024" value="#_i2">The Aircraft Cabin Enviro...</option><option data-dcnode-id="5022" value="#_i3">Consequences of Hypobaric...</option><option data-dcnode-id="5020" value="#_i6">Comorbid Cardiac Disease</option><option data-dcnode-id="5018" value="#_i7">Risk of Venous Thromboemb...</option><option data-dcnode-id="5016" value="#_i8">Assessment of Fitness to ...</option><option data-dcnode-id="5014" value="#_i9">Preflight Screening: Hist...</option><option data-dcnode-id="5012" value="#_i10">Preflight Screening: Asse...</option><option data-dcnode-id="5010" value="#_i11">Interpretation of Hypoxic...</option><option data-dcnode-id="5008" value="">Supplementary Oxygen &lt;&lt;</option><option data-dcnode-id="5006" value="#_i13">Arrangement of Supplement...</option><option data-dcnode-id="5004" value="#_i14">Respiratory Disease–Speci...</option><option data-dcnode-id="5002" value="#_i23">Conclusions</option><option data-dcnode-id="5000" value="#_i24">References</option><option data-dcnode-id="4998" value="#citart1">CITING ARTICLES</option></select></form><div class="nextPrevSec" data-dcnode-id="4991"><a class="up" data-dcnode-id="4994" data-feathr-click-track="true" href="#_i11"><img alt="Previous section" border="0" data-dcnode-id="4995" height="9" hspace="5" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.atsjournals.org/templates/jsp/images/arrow_up.gif&amp;raw" width="11"></a><a class="down" data-dcnode-id="4992" data-feathr-click-track="true" href="#_i13"><img alt="Next section" border="0" data-dcnode-id="4993" height="9" hspace="5" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.atsjournals.org/templates/jsp/images/arrow_down.gif&amp;raw" width="11"></a></div></div></div><p data-dcnode-id="4966"><span data-dcnode-id="4988" instrument_node="">After a positive hypoxic challenge test, titration of supplemental oxygen can be performed. However, this presents a number of challenges with normobaric testing. Compared with titration during hypobaric testing, there is an underestimation of supplemental oxygen requirements (</span><a class="ref showRefEvent" data-dcnode-id="4986" data-feathr-click-track="true" data-reflink="_i24" data-rid="bib35" href="#"><span data-dcnode-id="4987" instrument_node="">35</span></a><span data-dcnode-id="4985" instrument_node="">, </span><a class="ref showRefEvent" data-dcnode-id="4983" data-feathr-click-track="true" data-reflink="_i24" data-rid="bib49" href="#"><span data-dcnode-id="4984" instrument_node="">49</span></a><span data-dcnode-id="4982" instrument_node="">), which may reflect poorer accuracy in terms of the actual F</span><span class="smallcaps smallerCapital" data-dcnode-id="4980"><span data-dcnode-id="4981" instrument_node="">i</span></span><sub data-dcnode-id="4976"><span data-dcnode-id="4979" instrument_node="">O</span><sub data-dcnode-id="4977"><span data-dcnode-id="4978" instrument_node="">2</span></sub></sub><span data-dcnode-id="4975" instrument_node=""> administered during a normobaric test with supplemental oxygen. In addition, during a normobaric or hypobaric hypoxic challenge test, pulsed dose oxygen may result in a lower Pa</span><sub data-dcnode-id="4971"><span data-dcnode-id="4974" instrument_node="">O</span><sub data-dcnode-id="4972"><span data-dcnode-id="4973" instrument_node="">2</span></sub></sub><span data-dcnode-id="4970" instrument_node=""> than continuous flow oxygen (</span><a class="ref showRefEvent" data-dcnode-id="4968" data-feathr-click-track="true" data-reflink="_i24" data-rid="bib35" href="#"><span data-dcnode-id="4969" instrument_node="">35</span></a><span data-dcnode-id="4967" instrument_node="">). Continuous flow oxygen may be delivered at rates of up to 6 L/minute depending on the portable concentrator used. Pulsed dose flow rates also vary depending on the portable oxygen concentrator used. For example, on a pulsed dose setting of 1, oxygen delivery may range from 9 to 16 ml/breath depending on the device, with rates of up to 192 ml/breath possible at higher settings on some devices. For this reason, if pulsed dosing rather than continuous flow is planned, it may be prudent to instruct the patient to bring his or her own particular portable oxygen concentrator to the hypoxic challenge test to assist in titration of oxygen using this specific setting.</span></p></div><div class="NLM_sec NLM_sec_level_1" data-dcnode-id="4186"><a class="scroll-offset" data-dcnode-id="4963" data-feathr-click-track="true" name="_i13"></a><div class="sectionInfo" data-dcnode-id="4916"><div class="sectionHeading" data-dcnode-id="4961"><span data-dcnode-id="4962" instrument_node="">Arrangement of Supplemental Oxygen for Travel</span></div><div class="sectionJumpTo" data-dcnode-id="4917"><div class="sectionLabel" data-dcnode-id="4959"><span data-dcnode-id="4960" instrument_node="">Section:</span></div><form data-dcnode-id="4923" style="margin-bottom:0"><select class="fulltextdd" data-dcnode-id="4924" name="select23" onchange="GoTo(this, 'self')"><option data-dcnode-id="4957" selected="#" value="#">Choose</option><option data-dcnode-id="4955" value="#">Top of page</option><option data-dcnode-id="4953" value="#abstract">Abstract</option><option data-dcnode-id="4951" value="#_i2">The Aircraft Cabin Enviro...</option><option data-dcnode-id="4949" value="#_i3">Consequences of Hypobaric...</option><option data-dcnode-id="4947" value="#_i6">Comorbid Cardiac Disease</option><option data-dcnode-id="4945" value="#_i7">Risk of Venous Thromboemb...</option><option data-dcnode-id="4943" value="#_i8">Assessment of Fitness to ...</option><option data-dcnode-id="4941" value="#_i9">Preflight Screening: Hist...</option><option data-dcnode-id="4939" value="#_i10">Preflight Screening: Asse...</option><option data-dcnode-id="4937" value="#_i11">Interpretation of Hypoxic...</option><option data-dcnode-id="4935" value="#_i12">Supplementary Oxygen</option><option data-dcnode-id="4933" value="">Arrangement of Supplement... &lt;&lt;</option><option data-dcnode-id="4931" value="#_i14">Respiratory Disease–Speci...</option><option data-dcnode-id="4929" value="#_i23">Conclusions</option><option data-dcnode-id="4927" value="#_i24">References</option><option data-dcnode-id="4925" value="#citart1">CITING ARTICLES</option></select></form><div class="nextPrevSec" data-dcnode-id="4918"><a class="up" data-dcnode-id="4921" data-feathr-click-track="true" href="#_i12"><img alt="Previous section" border="0" data-dcnode-id="4922" height="9" hspace="5" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.atsjournals.org/templates/jsp/images/arrow_up.gif&amp;raw" width="11"></a><a class="down" data-dcnode-id="4919" data-feathr-click-track="true" href="#_i14"><img alt="Next section" border="0" data-dcnode-id="4920" height="9" hspace="5" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.atsjournals.org/templates/jsp/images/arrow_down.gif&amp;raw" width="11"></a></div></div></div><p data-dcnode-id="4914"><span data-dcnode-id="4915" instrument_node="">Since 2009, after the U.S. Department of Transport ruling “Nondiscrimination on the Basis of Disability in Air Travel,” all airlines traveling to and from the United States are required by law to permit passengers to carry their portable oxygen concentrators (POCs), provided they have been approved for use by the Federal Aviation Administration.</span></p><p data-dcnode-id="4909"><span data-dcnode-id="4913" instrument_node="">The policy of individual airlines toward the specific concentrators that are permissible for use aboard the aircraft is, in turn, largely guided by the list of devices approved by the FAA. </span><a class="ref" data-dcnode-id="4911" data-feathr-click-track="true" href="javascript:popRef('tbl4')"><span data-dcnode-id="4912" instrument_node="">Table 4</span></a><span data-dcnode-id="4910" instrument_node=""> outlines the list of portable concentrators currently approved for use by the FAA, and also those currently approved by the 10 largest airlines worldwide, based on annual passenger numbers, and information currently available from the relevant airline’s website.</span></p><div class="anchor-spacer" data-dcnode-id="4908" id="tbl4"></div><div class="article-table-content" data-dcnode-id="4194" id="tbl4"><table class="table article-section__table" data-dcnode-id="4207"><caption data-dcnode-id="4902"><p data-dcnode-id="4903"><span class="captionLabel" data-dcnode-id="4905"><b data-dcnode-id="4906"><span data-dcnode-id="4907" instrument_node="">Table 4.</span></b></span><span data-dcnode-id="4904" instrument_node=""> Airline-specific information on portable oxygen concentrator use<
