</span><meta content="The cuff-leak test: what are we measuring? - Critical Care" data-dcnode-id="1801" property="og:title"><span data-dcnode-id="1800" instrument_node="">
</span><meta content="Stridor is one of the most frequent causes of early extubation failure. The cuff-leak test may help to identify patients at risk to develop post-extubation laryngeal edema. However the discrimination power of the cuff-leak test is highly variable and can be use, at best, to detect patients at risk to develop edema but should not be used to postpone extubation as tracheal extubation can still be successful in many patients with a positive test. In this editorial, the author discuss the factors influencing the leak and hence its predictive value." data-dcnode-id="1799" property="og:description"><span data-dcnode-id="1798" instrument_node="">

</span><section aria-labelledby="Abs1" data-dcnode-id="1219" data-title="Abstract" lang="en"><div class="c-article-section" data-dcnode-id="1220" id="Abs1-section"><h2 class="c-article-section__title js-section-title js-c-reading-companion-sections-item" data-dcnode-id="1224" id="Abs1"><span data-dcnode-id="1225" instrument_node="">Abstract</span></h2><div class="c-article-section__content" data-dcnode-id="1221" id="Abs1-content"><p data-dcnode-id="1222"><span data-dcnode-id="1223" instrument_node="">Stridor is one of the most frequent causes of early extubation failure. The cuff-leak test may help to identify patients at risk to develop post-extubation laryngeal edema. However the discrimination power of the cuff-leak test is highly variable and can be use, at best, to detect patients at risk to develop edema but should not be used to postpone extubation as tracheal extubation can still be successful in many patients with a positive test. In this editorial, the author discuss the factors influencing the leak and hence its predictive value.</span></p></div></div></section><span data-dcnode-id="1218" instrument_node="">
</span><div class="c-article-section__content c-article-section__content--separator" data-dcnode-id="1206"><p data-dcnode-id="1207"><span data-dcnode-id="1217" instrument_node="">Tracheal extubation of patients is still a major challenge, with the possibility of post-extubation stridor and then re-intubation if the patient is unable to sustain the increase in respiratory work. Stridor is responsible for 15–38% of extubation failures [</span><a aria-label="Reference 1" data-dcnode-id="1215" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR1" id="ref-link-section-d32087136e241" title="Esteban A, Alia I, Gordo F, Fernandez R, Solsona JF, Vallverdu I, Macias S, Allegue JM, Blanco J, Carriedo D, Leon M, de la Cal MA, Taboada F, Gonzalez d, Palazon E, Carrizosa F, Tomas R, Suarez J, Goldwasser RS: Extubation outcome after spontaneous breathing trials with T-tube or pressure support ventilation. The Spanish Lung Failure Collaborative Group. Am J Respir Crit Care Med 1997, 156: 459-465."><span data-dcnode-id="1216" instrument_node="">1</span></a><span data-dcnode-id="1214" instrument_node="">–</span><a aria-label="Reference 3" data-dcnode-id="1212" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR3" id="ref-link-section-d32087136e244" title="Epstein SK, Ciubotaru RL: Independent effects of etiology of failure and time to reintubation on outcome for patients failing extubation. Am J Respir Crit Care Med 1998, 158: 489-493."><span data-dcnode-id="1213" instrument_node="">3</span></a><span data-dcnode-id="1211" instrument_node="">] and for close to 38% of early extubation failures [</span><a aria-label="Reference 3" data-dcnode-id="1209" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR3" id="ref-link-section-d32087136e247" title="Epstein SK, Ciubotaru RL: Independent effects of etiology of failure and time to reintubation on outcome for patients failing extubation. Am J Respir Crit Care Med 1998, 158: 489-493."><span data-dcnode-id="1210" instrument_node="">3</span></a><span data-dcnode-id="1208" instrument_node="">]. Recognition of stridor is important because these patients can benefit from close monitoring and from specific therapies including non-invasive respiratory assistance, aerosolized adrenaline (epinephrine), and steroids (even though the efficacy of steroids remains under debate). Ideally, patients at risk of developing laryngeal edema should be identified as early as possible, and the cuff-leak test has been proposed for this purpose. The principle of this test is quite simple and is based on the fact that the air leak around a tracheal tube with a cuff deflated will be inversely related to the degree of laryngeal obstruction generated by laryngeal edema.</span></p></div><div class="c-article-section__content" data-dcnode-id="1179"><p data-dcnode-id="1195"><span data-dcnode-id="1205" instrument_node="">The cuff-leak test was developed initially in children with croup [</span><a aria-label="Reference 4" data-dcnode-id="1203" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR4" id="ref-link-section-d32087136e253" title="Adderley RJ, Mullins GC: When to extubate the croup patient: the 'leak' test. Can J Anaesth 1987, 34: 304-306."><span data-dcnode-id="1204" instrument_node="">4</span></a><span data-dcnode-id="1202" instrument_node="">]; extubation was likely to be successful if an air leak could be heard when the baby coughed during positive pressure ventilation. The test was further refined to allow quantitative measurements, using the difference between the expired tidal volume with the cuff inflated and with the cuff deflated: the higher the leak, the lower the likelihood that post-extubation stridor will occur. The discrimination power of the test is highly variable (Table </span><a data-dcnode-id="1200" data-track="click" data-track-action="table anchor" data-track-label="link" href="#Tab1"><span data-dcnode-id="1201" instrument_node="">1</span></a><span data-dcnode-id="1199" instrument_node="">), depending on the population investigated, the incidence of post-extubation stridor (ranging from to 4% to 38%), the method of determination of cuff leak (absolute value versus value relative to tidal volume measured with an inflated cuff, number of measurements of tidal volumes averaged, and so on). But perhaps more importantly, the cut-off value should be adapted to the situation; the cut-off that is usually given in most studies assumes an equivalent impact of false positive and false negative values. However, in clinical practice, both may not have equivalent weight. In some cases, a policy of minimizing the risk of false negatives and thus accepting a lower specificity may be preferred. This policy minimizes the risk of extubation failure and may be preferred in patients in whom tracheal intubation is difficult. On the other hand, a policy minimizing the risk of false positives, and thus less sensitive, may be preferred if one wishes to minimize the risk of unnecessary prolonged intubation. In any case, a low cuff-leak should never be used to preclude extubation because the specificity of the test is still low [</span><a aria-label="Reference 5" data-dcnode-id="1197" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR5" id="ref-link-section-d32087136e259" title="De Bast Y, De Backer D, Moraine JJ, Lemaire M, Vandenborght C, Vincent JL: The cuff leak test to predict failure of tracheal extubation for laryngeal edema. Intensive Care Med 2002, 28: 1267-1272. 10.1007/s00134-002-1422-3"><span data-dcnode-id="1198" instrument_node="">5</span></a><span data-dcnode-id="1196" instrument_node="">], even when the policy favoring minimizing false negatives is chosen so that the test can be used mainly to characterize patients at risk of developing post-extubation stridor.</span></p><div class="c-article-table" data-container-section="table" data-dcnode-id="1180" data-test="inline-table" id="table-1"><figure data-dcnode-id="1181"><figcaption class="c-article-table__figcaption" data-dcnode-id="1192"><b data-dcnode-id="1193" data-test="table-caption" id="Tab1"><span data-dcnode-id="1194" instrument_node="">Table 1 Characteristics of studies that used the cuff-leak test to predict extubation failure</span></b></figcaption><div class="u-text-right u-hide-print" data-dcnode-id="1182"><a aria-label="Full size table 1" class="c-article__pill-button" data-dcnode-id="1183" data-test="table-link" data-track="click" data-track-action="view table" data-track-label="button" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//ccforum.biomedcentral.com/articles/10.1186/cc3031/tables/1" rel="nofollow"><span data-dcnode-id="1190"><span data-dcnode-id="1191" instrument_node="">Full size table</span></span><svg aria-hidden="true" class="u-icon" data-dcnode-id="1184" focusable="false" height="16" role="img" width="16"><use data-dcnode-id="1185" xlink:href="#global-icon-chevron-right" xmlns:xlink="http://www.w3.org/1999/xlink"><svg data-dcnode-id="1186" id="global-icon-chevron-right" viewBox="0 0 16 16"></svg></use></svg><span data-dcnode-id="1189" instrument_node="">
</span><path d="M7.782 7L5.3 4.518c-.393-.392-.4-1.022-.02-1.403a1.001 1.001 0 011.417 0l4.176 4.177a1.001 1.001 0 010 1.416l-4.176 4.177a.991.991 0 01-1.4.016 1 1 0 01.003-1.42L7.782 9l1.013-.998z" data-dcnode-id="1188" fill-rule="evenodd"></path><span data-dcnode-id="1187" instrument_node="">
</span></a></div></figure></div></div><div class="c-article-section__content" data-dcnode-id="1173"><p data-dcnode-id="1174"><span data-dcnode-id="1178" instrument_node="">In this issue, Prinianakis and colleagues [</span><a aria-label="Reference 6" data-dcnode-id="1176" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR6" id="ref-link-section-d32087136e581" title="Prinianakis G, Alexopoulou C, Mamidakis E, Kondili E, Georgopoulos D: Determinants of the cuff-leak test: a physiological study. Crit Care 2005, 9: R24-R31. 10.1186/cc3012"><span data-dcnode-id="1177" instrument_node="">6</span></a><span data-dcnode-id="1175" instrument_node="">] shed some new light on the factors that might affect the leak, and hence the evaluation of the cuff-leak test. First, they separate the inspiratory and expiratory components of the leak. Usually, the leak is calculated by measuring five or more tidal volumes after deflation of the cuff. Of course, the inspired tidal volume effectively reaching the alveoli will also decrease so that the tidal volume measured with the cuff deflated is influenced by both inspiratory and expiratory leaks.</span></p></div><div class="c-article-section__content" data-dcnode-id="1167"><p data-dcnode-id="1168"><span data-dcnode-id="1172" instrument_node="">Prinianakis and colleagues [</span><a aria-label="Reference 6" data-dcnode-id="1170" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR6" id="ref-link-section-d32087136e587" title="Prinianakis G, Alexopoulou C, Mamidakis E, Kondili E, Georgopoulos D: Determinants of the cuff-leak test: a physiological study. Crit Care 2005, 9: R24-R31. 10.1186/cc3012"><span data-dcnode-id="1171" instrument_node="">6</span></a><span data-dcnode-id="1169" instrument_node="">] developed a method that limits the influence of the inspiratory leak. After an inspiratory pause, the cuff is deflated and the subsequent expired tidal volume is measured. This maneuver is repeated five times and the five values are averaged. The two methods were compared in 15 patients and the expiratory leak was consistently lower than the total leak. As the ratio between expiratory and total leak was constant (around one-third to one-quarter of the total leak) whatever the value of the leak, this suggests that factors affecting expiratory leak would similarly affect inspiratory leak, and thus total leak.</span></p></div><div class="c-article-section__content" data-dcnode-id="1164"><p data-dcnode-id="1165"><span data-dcnode-id="1166" instrument_node="">In the second part of the study, the authors used a lung model to evaluate the factors influencing the expiratory leak (and thus probably similarly the inspiratory leak). They obstructed the lumen between the endotracheal tube and the common tube of the model to obtain calibrated low and high leaks. Thereafter, they sequentially evaluated the impact of resistance, compliance, and flow. Factors affecting the leak were similar, independently of the size of the endotracheal tube. The total leak was not affected by the breathing pattern, with similar values in normal, restrictive, and obstructive patterns. As expected, factors influencing predominantly the inspiratory phase influenced total leak but not expiratory leak. Total leak was inversely related with inspiratory flow and with compliance. Airway resistance, which mostly affects expiration, affected total and expiratory leak similarly, with higher leaks at high resistances.</span></p></div><div class="c-article-section__content" data-dcnode-id="1152"><p data-dcnode-id="1153"><span data-dcnode-id="1163" instrument_node="">What are the clinical implications of these findings? First, should the measurement of the expiratory leak alone replace the measurement of the total leak? Probably not. The design of this study was not to compare the performance of both tests but rather to evaluate the factors influencing the leak. As these patients were deeply sedated and even muscle relaxants were used, extubation occurred quite a long time after the test so that the ability of the test to predict extubation failure could not be assessed. It is even likely that the inspiratory component might have a major role in the validity of the test. Inspiration occurs at high pressure, which favors leakage of gas around the tracheal tube. As the problem of the test is mainly its lack of specificity, suggesting that in some patients an absence of leak can be observed even when there is no airway obstruction, it is likely that using the expiratory leak would be even less discriminatory because this occurs at low pressure. Second, the findings reported by Prinianakis and colleagues [</span><a aria-label="Reference 6" data-dcnode-id="1161" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR6" id="ref-link-section-d32087136e596" title="Prinianakis G, Alexopoulou C, Mamidakis E, Kondili E, Georgopoulos D: Determinants of the cuff-leak test: a physiological study. Crit Care 2005, 9: R24-R31. 10.1186/cc3012"><span data-dcnode-id="1162" instrument_node="">6</span></a><span data-dcnode-id="1160" instrument_node="">] might explain, at least in part, some of the differences between studies. Series in post-operative patients showed that the capacity of the cuff-leak test to predict extubation failure was much lower than in populations of critically ill patients ventilated for at least 48 hours [</span><a aria-label="Reference 5" data-dcnode-id="1158" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR5" id="ref-link-section-d32087136e599" title="De Bast Y, De Backer D, Moraine JJ, Lemaire M, Vandenborght C, Vincent JL: The cuff leak test to predict failure of tracheal extubation for laryngeal edema. Intensive Care Med 2002, 28: 1267-1272. 10.1007/s00134-002-1422-3"><span data-dcnode-id="1159" instrument_node="">5</span></a><span data-dcnode-id="1157" instrument_node="">, </span><a aria-label="Reference 7" data-dcnode-id="1155" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR7" id="ref-link-section-d32087136e602" title="Engoren M: Evaluation of the cuff-leak test in a cardiac surgery population. Chest 1999, 116: 1029-1031. 10.1378/chest.116.4.1029"><span data-dcnode-id="1156" instrument_node="">7</span></a><span data-dcnode-id="1154" instrument_node="">]. This might be explained by the influence of decreased compliance or increased airflow resistance, which are more likely to occur in these patients. Because these factors increase the amount of leak, an absent leak is even more suggestive of airway obstruction.</span></p></div><div class="c-article-section__content" data-dcnode-id="1146"><p data-dcnode-id="1147"><span data-dcnode-id="1151" instrument_node="">In conclusion, the cuff-leak test can be used to identify patients at high risk of developing post-extubation stridor, who often require re-intubation. The use of this test in non-selected populations is of limited value but it might be more efficient in selected patients, even though an absent leak should never postpone extubation given the non-negligible rate of false positive tests. The data presented by Prinianakis and colleagues [</span><a aria-label="Reference 6" data-dcnode-id="1149" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR6" id="ref-link-section-d32087136e608" title="Prinianakis G, Alexopoulou C, Mamidakis E, Kondili E, Georgopoulos D: Determinants of the cuff-leak test: a physiological study. Crit Care 2005, 9: R24-R31. 10.1186/cc3012"><span data-dcnode-id="1150" instrument_node="">6</span></a><span data-dcnode-id="1148" instrument_node="">] help us understand the major roles of compliance, airway resistance, and flow in the interpretation of the cuff-leak test.</span></p></div><span data-dcnode-id="1145" instrument_node="">
</span><div data-dcnode-id="840" id="MagazineFulltextArticleBodySuffix"><section aria-labelledby="Bib1" data-dcnode-id="841" data-title="References"><div class="c-article-section" data-dcnode-id="842" id="Bib1-section"><h2 class="c-article-section__title js-section-title js-c-reading-companion-sections-item" data-dcnode-id="1143" id="Bib1"><span data-dcnode-id="1144" instrument_node="">References</span></h2><div class="c-article-section__content" data-dcnode-id="843" id="Bib1-content"><div data-container-section="references" data-dcnode-id="844"><ol class="c-article-references" data-dcnode-id="854"><li class="c-article-references__item js-c-reading-companion-references-item" data-counter="1." data-dcnode-id="1118"><p class="c-article-references__text" data-dcnode-id="1132" id="ref-CR1"><span data-dcnode-id="1142" instrument_node="">Esteban A, Alia I, Gordo F, Fernandez R, Solsona JF, Vallverdu I, Macias S, Allegue JM, Blanco J, Carriedo D, Leon M, de la Cal MA, Taboada F, Gonzalez d, Palazon E, Carrizosa F, Tomas R, Suarez J, Goldwasser RS: </span><b data-dcnode-id="1140"><span data-dcnode-id="1141" instrument_node="">Extubation outcome after spontaneous breathing trials with T-tube or pressure support ventilation. The Spanish Lung Failure Collaborative Group.</span></b><span data-dcnode-id="1139" instrument_node=""> </span><i data-dcnode-id="1137"><span data-dcnode-id="1138" instrument_node="">Am J Respir Crit Care Med</span></i><span data-dcnode-id="1136" instrument_node=""> 1997, </span><b data-dcnode-id="1134"><span data-dcnode-id="1135" instrument_node="">156:</span></b><span data-dcnode-id="1133" instrument_node=""> 459-465.</span></p><p class="c-article-references__links u-hide-print" data-dcnode-id="1119"><a aria-label="CAS reference 1" data-dcnode-id="1130" data-track="click" data-track-action="outbound reference" data-track-label="link" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//ccforum.biomedcentral.com/articles/cas-redire
