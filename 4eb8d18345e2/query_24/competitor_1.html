</span><div class="wrap-content" data-dcnode-id="2832"><span data-dcnode-id="3051" instrument_node="">
</span><h1 data-dcnode-id="3049"><span data-dcnode-id="3050" instrument_node="">Lung volume test</span></h1><span data-dcnode-id="3048" instrument_node=""> </span><h2 data-dcnode-id="3046"><span data-dcnode-id="3047" instrument_node="">What is a lung volume test?</span></h2><span data-dcnode-id="3045" instrument_node="">
</span><p data-dcnode-id="3043"><span data-dcnode-id="3044" instrument_node="">A lung volume test is a way of measuring the total amount of air in your lungs, and how much air is left after you have breathed out as far as you can.</span></p><span data-dcnode-id="3042" instrument_node="">
</span><figure class="size-full" data-dcnode-id="3036"><img alt="lung volume test" data-dcnode-id="3041" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.blf.org.uk/sites/default/files/styles/default/public/20130314_BLF-UCH-London_55.jpg&amp;raw"><span data-dcnode-id="3040" instrument_node="">
</span><figcaption data-dcnode-id="3038"><span data-dcnode-id="3039" instrument_node="">A lung volume test</span></figcaption><span data-dcnode-id="3037" instrument_node="">
</span></figure><span data-dcnode-id="3035" instrument_node="">
</span><h2 data-dcnode-id="3033"><span data-dcnode-id="3034" instrument_node="">What’s it used for?</span></h2><span data-dcnode-id="3032" instrument_node="">
</span><p data-dcnode-id="3030"><span data-dcnode-id="3031" instrument_node="">A lung volume test helps your health care professional to find out more about what’s happening in your lungs. It can tell them if your lung condition is restrictive or obstructive:</span></p><span data-dcnode-id="3029" instrument_node="">
</span><ul class="list-arrows" data-dcnode-id="3006"><span data-dcnode-id="3028" instrument_node="">
</span><li data-dcnode-id="3017"><span data-dcnode-id="3027" instrument_node="">If you have an obstructive lung condition, there is a narrowing of the airways inside your lungs. Your lungs never empty of air completely and more air than normal stays in your lungs after you breathe out. Examples of obstructive conditions are </span><a data-dcnode-id="3025" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.blf.org.uk/support-for-you/copd"><span data-dcnode-id="3026" instrument_node="">COPD</span></a><span data-dcnode-id="3024" instrument_node="">, </span><a data-dcnode-id="3022" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.blf.org.uk/support-for-you/asthma"><span data-dcnode-id="3023" instrument_node="">asthma</span></a><span data-dcnode-id="3021" instrument_node="">, bronchitis and </span><a data-dcnode-id="3019" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.blf.org.uk/support-for-you/bronchiectasis"><span data-dcnode-id="3020" instrument_node="">bronchiectasis</span></a><span data-dcnode-id="3018" instrument_node="">.</span></li><span data-dcnode-id="3016" instrument_node="">
</span><li data-dcnode-id="3008"><span data-dcnode-id="3015" instrument_node="">If you have a restrictive lung condition, you cannot fill your lungs fully with air. That’s because your lungs are restricted from expanding fully, as they have lost their elasticity. Examples of restrictive conditions are </span><a data-dcnode-id="3013" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.blf.org.uk/support-for-you/pulmonary-fibrosis"><span data-dcnode-id="3014" instrument_node="">pulmonary fibrosis</span></a><span data-dcnode-id="3012" instrument_node=""> and </span><a data-dcnode-id="3010" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.blf.org.uk/support-for-you/sarcoidosis"><span data-dcnode-id="3011" instrument_node="">sarcoidosis</span></a><span data-dcnode-id="3009" instrument_node="">. Sometimes this may also be seen in people who have a curvature of the spine or changes to shape of their ribcage, or in people who are obese.</span></li><span data-dcnode-id="3007" instrument_node="">
</span></ul><span data-dcnode-id="3005" instrument_node="">
</span><h2 data-dcnode-id="3003"><span data-dcnode-id="3004" instrument_node="">What happens during a lung volume test?</span></h2><span data-dcnode-id="3002" instrument_node="">
</span><p data-dcnode-id="3000"><span data-dcnode-id="3001" instrument_node="">To measure your lung volume, you will sit in a sealed, clear box which looks like a shower cubicle. It’s sometimes called a body-box which can sound a bit alarming, but it is perfectly safe. You’ll wear a clip on your nose to make sure that no air escapes from your nose.</span></p><span data-dcnode-id="2999" instrument_node="">
</span><blockquote class="breakout" data-dcnode-id="2994" style="font-size:100%"><span data-dcnode-id="2998" instrument_node="">
</span><p data-dcnode-id="2996"><span data-dcnode-id="2997" instrument_node="">People sometimes worry that they will have to sit in a box. You’ll be able to talk through an intercom to the health care professional performing the test throughout. Let them know if you are anxious. The tests only takes about 5 minutes.</span></p><span data-dcnode-id="2995" instrument_node="">
</span></blockquote><span data-dcnode-id="2993" instrument_node="">
</span><p data-dcnode-id="2991"><span data-dcnode-id="2992" instrument_node="">During the test you will be asked to pant, taking rapid shallow breaths for a few seconds. You will also be asked to put your hands firmly onto your cheeks, to stop them puffing in and out. You will then breathe in and out normally using a mouthpiece for a short time and then take some slow deep breaths in and out.</span></p><span data-dcnode-id="2990" instrument_node="">
</span><p data-dcnode-id="2988"><span data-dcnode-id="2989" instrument_node="">The effort you make to breathe causes changes in the pressure inside the box, as well as within your lungs. You will not feel any pressure changes, as they are very small. Changes in pressure inside the box are measured, and used to calculate your lung volume.</span></p><span data-dcnode-id="2987" instrument_node="">
</span><p data-dcnode-id="2985"><span data-dcnode-id="2986" instrument_node="">It can take a few goes to get the technique for the test right. Don’t worry, the health care professionals are very experienced at helping people to do this. The lung volume test is usually repeated 3 to 5 times to check that you are getting a consistent result. You may be asked to practise the breathing technique before the actual measurement starts.</span></p><span data-dcnode-id="2984" instrument_node="">
</span><p data-dcnode-id="2982"><span data-dcnode-id="2983" instrument_node="">The method used to measure lung volumes may vary depending on your condition or the equipment that is available at your hospital.</span></p><span data-dcnode-id="2981" instrument_node="">
</span><h2 data-dcnode-id="2979"><span data-dcnode-id="2980" instrument_node="">What will the results look like?</span></h2><span data-dcnode-id="2978" instrument_node="">
</span><p data-dcnode-id="2976"><span data-dcnode-id="2977" instrument_node="">Lung volume is measured in litres. Your predicted total lung capacity (TLC) is based on your age, height, sex and ethnicity, so results will differ from person to person. Normal results typically range between 80% and 120% of the prediction.</span></p><span data-dcnode-id="2975" instrument_node="">
</span><p data-dcnode-id="2973"><span data-dcnode-id="2974" instrument_node="">If your lung volume results fall outside of this normal range, this may suggest you have an obstructive or restrictive lung condition.</span></p><span data-dcnode-id="2972" instrument_node="">
</span><h3 data-dcnode-id="2970"><span data-dcnode-id="2971" instrument_node="">High lung volume</span></h3><span data-dcnode-id="2969" instrument_node="">
</span><p data-dcnode-id="2961"><span data-dcnode-id="2968" instrument_node="">When the lung volume is higher than normal, this may mean there is too much gas in your lungs - called lung hyperinflation. This is when gas gets trapped in the lungs and makes them inflate too much. Lung hyperinflation can happen with obstructive conditions like </span><a data-dcnode-id="2966" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.blf.org.uk/support-for-you/copd"><span data-dcnode-id="2967" instrument_node="">COPD</span></a><span data-dcnode-id="2965" instrument_node="">, bronchitis and </span><a data-dcnode-id="2963" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.blf.org.uk/support-for-you/bronchiolitis"><span data-dcnode-id="2964" instrument_node="">bronchiolitis</span></a><span data-dcnode-id="2962" instrument_node="">.</span></p><span data-dcnode-id="2960" instrument_node="">
</span><p data-dcnode-id="2958"><span data-dcnode-id="2959" instrument_node="">In people with COPD, if the tests show that there is a lot of trapped gas, bronchodilators may help to reduce this.</span></p><span data-dcnode-id="2957" instrument_node="">
</span><p data-dcnode-id="2952"><span data-dcnode-id="2956" instrument_node="">If you have chronic bronchitis or </span><a data-dcnode-id="2954" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.blf.org.uk/support-for-you/bronchiectasis"><span data-dcnode-id="2955" instrument_node="">bronchiectasis</span></a><span data-dcnode-id="2953" instrument_node="">, tests will indicate mucus in the airways. In this case, physiotherapy is the solution.</span></p><span data-dcnode-id="2951" instrument_node="">
</span><h3 data-dcnode-id="2949"><span data-dcnode-id="2950" instrument_node="">Low lung volume</span></h3><span data-dcnode-id="2948" instrument_node="">
</span><p data-dcnode-id="2940"><span data-dcnode-id="2947" instrument_node="">If your lung volume is lower than normal, this may be a sign of a restrictive lung condition such as </span><a data-dcnode-id="2945" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.blf.org.uk/support-for-you/pulmonary-fibrosis"><span data-dcnode-id="2946" instrument_node="">pulmonary fibrosis</span></a><span data-dcnode-id="2944" instrument_node=""> or </span><a data-dcnode-id="2942" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.blf.org.uk/support-for-you/sarcoidosis"><span data-dcnode-id="2943" instrument_node="">sarcoidosis</span></a><span data-dcnode-id="2941" instrument_node="">.</span></p><span data-dcnode-id="2939" instrument_node="">
</span><div data-dcnode-id="2840" id="webform-ajax-wrapper-975"><form accept-charset="UTF-8" action="/support-for-you/breathing-tests/lung-volume-test" class="webform-client-form webform-client-form-975" data-dcnode-id="2841" id="webform-client-form-975" method="post"><div data-dcnode-id="2842"><div class="form-item webform-component webform-component-radios webform-component--did-you-find-this-page-useful" data-dcnode-id="2916"><span data-dcnode-id="2938" instrument_node="">
