</span></a></div></figure></div><p data-dcnode-id="3069"><span data-dcnode-id="3076" instrument_node="">The best fit of the loss model (</span><a data-dcnode-id="3074" data-track="click" data-track-action="equation anchor" data-track-label="link" href="#Equ1"><span data-dcnode-id="3075" instrument_node="">Equation 2</span></a><span data-dcnode-id="3073" instrument_node="">) was obtained with a value of 1.00 for constant A and 2.63·10</span><sup data-dcnode-id="3071"><span data-dcnode-id="3072" instrument_node="">7</span></sup><span data-dcnode-id="3070" instrument_node=""> for the exponent b. The Pearson correlation coefficient between the observed data and theoretical values calculated from the particle loss model was 0.999.</span></p></div></div></section><section data-dcnode-id="2741" data-title="Discussion"><div class="c-article-section" data-dcnode-id="2742" id="Sec17-section"><h2 class="c-article-section__title js-section-title js-c-reading-companion-sections-item" data-dcnode-id="3064" id="Sec17"><span data-dcnode-id="3065" instrument_node="">Discussion</span></h2><div class="c-article-section__content" data-dcnode-id="2743" id="Sec17-content"><p data-dcnode-id="3062"><span data-dcnode-id="3063" instrument_node="">As shown by the results, the developed instrument measures the recovery of inhaled nanoparticles over a single breath with high sensitivity to changes in particle size, breath-holding time and subject characteristics. The recovery of inhaled nanoparticles was measured for a wide range of particle sizes and different breath holding times in a small group of healthy volunteers. Even though the subjects were a homogeneous group, the inter-subject variability was significantly higher than the intra-subject variability, and the results compared well to estimations from the MPPD model.</span></p><p data-dcnode-id="3057"><span data-dcnode-id="3061" instrument_node="">The experimental setup was designed considering the critical criteria and challenges stated in the introduction and elsewhere</span><sup data-dcnode-id="3059"><span data-dcnode-id="3060" instrument_node="">1</span></sup><span data-dcnode-id="3058" instrument_node="">. A stable concentration of aerosol in the inhalation reservoir was obtained by a flow through system. The aerosol reservoir was dimensioned to hold enough aerosol for breathing manoeuvres at forced vital capacity (FVC) and to dampen out small temporary concentration fluctuations, but still to provide fast mixing of the aerosol and aerosol exchange rates on the time scales of minutes. By continuously monitoring the aerosol from the aerosol reservoir, the reference for inhaled particle concentration could be assessed accurately.</span></p><p data-dcnode-id="3029"><span data-dcnode-id="3056" instrument_node="">In previous studies a number of different aerosol sources have been used, ranging from ambient air to spark discharge aerosols, oil droplets or even tobacco smoke</span><sup data-dcnode-id="3041"><a aria-label="Reference 5" data-dcnode-id="3054" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR5" id="ref-link-section-d180411273e906" title="Chalupa, D. C., Morrow, P. E., Oberdorster, G., Utell, M. J. &amp; Frampton, M. W. Ultrafine particle deposition in subjects with asthma. Environmental Health Perspectives 112, 879–882, doi: 10.1289/ehp.6851 (2004)."><span data-dcnode-id="3055" instrument_node="">5</span></a><span data-dcnode-id="3053" instrument_node="">,</span><a aria-label="Reference 6" data-dcnode-id="3051" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR6" id="ref-link-section-d180411273e909" title="Anderson, P. J., Wilson, J. D. &amp; Hiller, F. C. Respiratory-Tract Deposition of Ultrafine Particles in Subjects with Obstructive or Restrictive Lung-Disease. Chest 97, 1115–1120, doi: 10.1378/chest.97.5.1115 (1990)."><span data-dcnode-id="3052" instrument_node="">6</span></a><span data-dcnode-id="3050" instrument_node="">,</span><a aria-label="Reference 8" data-dcnode-id="3048" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR8" id="ref-link-section-d180411273e912" title="Brown, J. S., Zeman, K. L. &amp; Bennett, W. D. Ultrafine particle deposition and clearance in the healthy and obstructed lung. Am J Resp Crit Care 166, 1240–1247, doi: 10.1164/rccm.00205-399OC (2002)."><span data-dcnode-id="3049" instrument_node="">8</span></a><span data-dcnode-id="3047" instrument_node="">,</span><a aria-label="Reference 15" data-dcnode-id="3045" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR15" id="ref-link-section-d180411273e915" title="Invernizzi, G., Ruprecht, A., De Marco, C., Paredi, P. &amp; Boffi, R. Residual tobacco smoke: measurement of its washout time in the lung and of its contribution to environmental tobacco smoke. Tobacco Control 16, 29–33, doi: 10.1136/tc.2006.017020 (2007)."><span data-dcnode-id="3046" instrument_node="">15</span></a><span data-dcnode-id="3044" instrument_node="">,</span><a aria-label="Reference 16" data-dcnode-id="3042" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR16" id="ref-link-section-d180411273e918" title="Invernizzi, G. et al. Real-time measurement of particulate matter deposition in the lung. Biomarkers 11, 221–232, doi: 10.1080/13547500600648523 (2006)."><span data-dcnode-id="3043" instrument_node="">16</span></a></sup><span data-dcnode-id="3040" instrument_node="">. A few experiments have also been performed with monodisperse aerosols</span><sup data-dcnode-id="3031"><a aria-label="Reference 3" data-dcnode-id="3038" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR3" id="ref-link-section-d180411273e922" title="Jaques, P. A. &amp; Kim, C. S. Measurement of total lung deposition of inhaled ultrafine particles in healthy men and women. Inhal Toxicol 12, 715–731, doi: 10.1080/08958370050085156 (2000)."><span data-dcnode-id="3039" instrument_node="">3</span></a><span data-dcnode-id="3037" instrument_node="">,</span><a aria-label="Reference 17" data-dcnode-id="3035" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR17" id="ref-link-section-d180411273e925" title="Heyder, J. &amp; Rudolf, G. Deposition of aerosol particles in the human nose. Inhaled Part 4 Pt 1, 107–126 (1975)."><span data-dcnode-id="3036" instrument_node="">17</span></a><span data-dcnode-id="3034" instrument_node="">,</span><a aria-label="Reference 18" data-dcnode-id="3032" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR18" id="ref-link-section-d180411273e928" title="Schiller, C. F., Gebhart, J., Heyder, J., Rudolf, G. &amp; Stahlhofen, W. Factors Influencing Total Deposition of Ultrafine Aerosol-Particles in the Human Respiratory-Tract. J Aerosol Sci 17, 328–332, doi: 10.1016/0021-8502(86)90098-4 (1986)."><span data-dcnode-id="3033" instrument_node="">18</span></a></sup><span data-dcnode-id="3030" instrument_node="">. The electrospray has the advantages of a low, well-defined background that can be easily removed in the DMA, which also removes highly charged particles. Downstream the DMA the particles carry a single positive charge, which is unlikely to influence deposition. The particles used in the system are hydrophobic without hygroscopic residues. A limitation with the approach is the complexity of the electrospray and laborious maintenance for consistent performance.</span></p><p data-dcnode-id="2924"><span data-dcnode-id="3028" instrument_node="">The particle concentration in the inhaled and exhaled aerosol was measured with a condensation particle counter (CPC). There is a limited choice of technologies to detect and quantify airborne nanoparticles, especially if a fast response time is of importance. Previous reported studies have used several different technologies to detect and quantify nanoparticles, e.g. SMPS-systems</span><sup data-dcnode-id="3007"><a aria-label="Reference 5" data-dcnode-id="3026" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR5" id="ref-link-section-d180411273e935" title="Chalupa, D. C., Morrow, P. E., Oberdorster, G., Utell, M. J. &amp; Frampton, M. W. Ultrafine particle deposition in subjects with asthma. Environmental Health Perspectives 112, 879–882, doi: 10.1289/ehp.6851 (2004)."><span data-dcnode-id="3027" instrument_node="">5</span></a><span data-dcnode-id="3025" instrument_node="">,</span><a aria-label="Reference 9" data-dcnode-id="3023" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR9" id="ref-link-section-d180411273e938" title="Löndahl, J. et al. Size-resolved respiratory-tract deposition of fine and ultrafine hydrophobic and hygroscopic aerosol particles during rest and exercise. Inhal Toxicol 19, 109–116, doi: 10.1080/08958370601051677 (2007)."><span data-dcnode-id="3024" instrument_node="">9</span></a><span data-dcnode-id="3022" instrument_node="">,</span><a aria-label="Reference 10" data-dcnode-id="3020" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR10" id="ref-link-section-d180411273e941" title="Montoya, L. D. et al. Continuous measurements of ambient particle deposition in human subjects. Aerosol Sci Tech 38, 980–990, doi: 10.1080/027868290519049 (2004)."><span data-dcnode-id="3021" instrument_node="">10</span></a><span data-dcnode-id="3019" instrument_node="">,</span><a aria-label="Reference 19" data-dcnode-id="3017" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR19" id="ref-link-section-d180411273e944" title="Löndahl, J. et al. A set-up for field studies of respiratory tract deposition of fine and ultrafine particles in humans. J Aerosol Sci 37, 1152–1163, doi: 10.1016/j.jaerosci.2005.11.004 (2006)."><span data-dcnode-id="3018" instrument_node="">19</span></a><span data-dcnode-id="3016" instrument_node="">,</span><a aria-label="Reference 20" data-dcnode-id="3014" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR20" id="ref-link-section-d180411273e947" title="Rissler, J. et al. Experimental determination of deposition of diesel exhaust particles in the human respiratory tract. J Aerosol Sci 48, 18–33, doi: 10.1016/j.jaerosci.2012.01.005 (2012)."><span data-dcnode-id="3015" instrument_node="">20</span></a><span data-dcnode-id="3013" instrument_node="">,</span><a aria-label="Reference 21" data-dcnode-id="3011" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR21" id="ref-link-section-d180411273e950" title="Daigle, C. C. et al. Ultrafine particle deposition in humans during rest and exercise. Inhal Toxicol 15, 539–552, doi: 10.1080/08958370304468 (2003)."><span data-dcnode-id="3012" instrument_node="">21</span></a><span data-dcnode-id="3010" instrument_node="">,</span><a aria-label="Reference 22" data-dcnode-id="3008" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR22" id="ref-link-section-d180411273e954" title="Morawska, L., Barron, W. &amp; Hitchins, J. Experimental deposition of environmental tobacco smoke submicrometer particulate matter in the human respiratory tract. Am Ind Hyg Assoc J 60, 334–339, doi: 10.1080/00028899908984450 (1999)."><span data-dcnode-id="3009" instrument_node="">22</span></a></sup><span data-dcnode-id="3006" instrument_node="">, gamma cameras</span><sup data-dcnode-id="2994"><a aria-label="Reference 23" data-dcnode-id="3004" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR23" id="ref-link-section-d180411273e958" title="Wiebert, P. et al. Negligible clearance of ultrafine particles retained in healthy and affected human lungs. Eur Respir J 28, 286–290, doi: 10.1183/09031936.06.00103805 (2006)."><span data-dcnode-id="3005" instrument_node="">23</span></a><span data-dcnode-id="3003" instrument_node="">,</span><a aria-label="Reference 24" data-dcnode-id="3001" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR24" id="ref-link-section-d180411273e961" title="Wiebert, P. et al. No significant translocation of inhaled 35-nm carbon particles to the circulation in humans. Inhal Toxicol 18, 741–747, doi: 10.1080/08958370600748455 (2006)."><span data-dcnode-id="3002" instrument_node="">24</span></a><span data-dcnode-id="3000" instrument_node="">,</span><a aria-label="Reference 25" data-dcnode-id="2998" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR25" id="ref-link-section-d180411273e964" title="Hursh, J. B. &amp; Mercer, T. T. Measurement of 212Pb loss rate from human lungs. J Appl Physiol 28, 268–274 (1970)."><span data-dcnode-id="2999" instrument_node="">25</span></a><span data-dcnode-id="2997" instrument_node="">,</span><a aria-label="Reference 26" data-dcnode-id="2995" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR26" id="ref-link-section-d180411273e967" title="Roth, C., Scheuch, G. &amp; Stahlhofen, W. Clearance Measurements with Radioactively Labelled Ultrafine Particles. Inhaled Particles Vii 101–106 (1994)."><span data-dcnode-id="2996" instrument_node="">26</span></a></sup><span data-dcnode-id="2993" instrument_node="" and set-up of a portable device to monitor airway exhalation and deposition of particulate matter. Biomarkers 14, 326–339, doi: 10.1080/13547500902957192 (2009)."><span data-dcnode-id="2969" instrument_node="">31</span></a><span data-dcnode-id="2967" instrument_node="">,</span><a aria-label="Reference 32" data-dcnode-id="2965" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR32" id="ref-link-section-d180411273e997" title="Prodi, V. &amp; Mularoni, A. Electrostatic lung deposition experiments with humans and animals. Ann Occup Hyg 29, 229–240 (1985)."><span data-dcnode-id="2966" instrument_node="">32</span></a><span data-dcnode-id="2964" instrument_node="">,</span><a aria-label="Reference 33" data-dcnode-id="2962" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR33" id="ref-link-section-d180411273e1000" title="Altshuler, B., Yarmus, L., Palmes, E. D. &amp; Nelson, N. Aerosol deposition in the human respiratory tract. I. Experimental procedures and total deposition. AMA Arch Ind Health 15, 293–303 (1957)."><span data-dcnode-id="2963" instrument_node="">33</span></a></sup><span data-dcnode-id="2960" instrument_node="">, tapered element oscillating microbalance (TEOM)</span><sup data-dcnode-id="2954"><a aria-label="Reference 5" data-dcnode-id="2958" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR5" id="ref-link-section-d180411273e1005" title="Chalupa, D. C., Morrow, P. E., Oberdorster, G., Utell, M. J. &amp; Frampton, M. W. Ultrafine particle deposition in subjects with asthma. Environmental Health Perspectives 112, 879–882, doi: 10.1289/ehp.6851 (2004)."><span data-dcnode-id="2959" instrument_node="">5</span></a><span data-dcnode-id="2957" instrument_node="">,</span><a aria-label="Reference 21" data-dcnode-id="2955" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR21" id="ref-link-section-d180411273e1008" title="Daigle, C. C. et al. Ultrafine particle deposition in humans during rest and exercise. Inhal Toxicol 15, 539–552, doi: 10.1080/08958370304468 (2003)."><span data-dcnode-id="2956" instrument_node="">21</span></a></sup><span data-dcnode-id="2953" instrument_node="">, filter collection</span><sup data-dcnode-id="2944"><a aria-label="Reference 27" data-dcnode-id="2951" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR27" id="ref-link-section-d180411273e1012" title="George, A. &amp; Breslin, A. J. Deposition of radon daughters in humans exposed to uranium mine atmospheres. Health Phys 17, 115–124 (1969)."><span data-dcnode-id="2952" instrument_node="">27</span></a><span data-dcnode-id="2950" instrument_node="">,</span><a aria-label="Reference 28" data-dcnode-id="2948" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR28" id="ref-link-section-d180411273e1015" title="Holleman, D. F., Martz, D. E. &amp; Schiager, K. J. Total respiratory deposition of radon daughters from inhalation of uranium mine atmospheres. Health Phys 17, 187–192 (1969)."><span data-dcnode-id="2949" instrument_node="">28</span></a><span data-dcnode-id="2947" instrument_node="">,</span><a aria-label="Reference 29" data-dcnode-id="2945" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR29" id="ref-link-section-d180411273e1018" title="Wilson, I. B. &amp; Lamer, V. K. The retention of aerosol particles in the human respiratory tract as a function of particle radius. J Ind Hyg Toxicol 30, 265–280 (1948)."><span data-dcnode-id="2946" instrument_node="">29</span></a></sup><span data-dcnode-id="2943" instrument_node="">, impingers</span><sup data-dcnode-id="2937"><a aria-label="Reference 34" data-dcnode-id="2941" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR34" id="ref-link-section-d180411273e1022" title="Landahl, H. D. &amp; Herrmann, R. G. On the retention of air-borne particulates in the human lung. J Ind Hyg Toxicol 30, 181–188 (1948)."><span data-dcnode-id="2942" instrument_node="">34</span></a><span data-dcnode-id="2940" instrument_node="">,</span><a aria-label="Reference 35" data-dcnode-id="2938" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR35" id="ref-link-section-d180411273e1025" title="Landahl, H. D., Tracewell, T. N. &amp; Lassen, W. H. Retention of air-borne particulates in the human lung. III. AMA Arch Ind Hyg Occup Med 6, 508–511 (1952)."><span data-dcnode-id="2939" instrument_node="">35</span></a></sup><span data-dcnode-id="2936" instrument_node=""> and impactors</span><sup data-dcnode-id="2930"><a aria-label="Reference 34" data-dcnode-id="2934" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR34" id="ref-link-section-d180411273e1029" title="Landahl, H. D. &amp; Herrmann, R. G. On the retention of air-borne particulates in the human lung. J Ind Hyg Toxicol 30, 181–188 (1948)."><span data-dcnode-id="2935" instrument_node="">34</span></a><span data-dcnode-id="2933" instrument_node="">,</span><a aria-label="Reference 35" data-dcnode-id="2931" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR35" id="ref-link-section-d180411273e1032" title="Landahl, H. D., Tracewell, T. N. &amp; Lassen, W. H. Retention of air-borne particulates in the human lung. III. AMA Arch Ind Hyg Occup Med 6, 508–511 (1952)."><span data-dcnode-id="2932" instrument_node="">35</span></a></sup><span data-dcnode-id="2929" instrument_node="">. These techniques have various challenges: α- or β-counters or gamma cameras require radiolabelled particles; light scattering devices are not reliable for particles smaller than approximately 400 nm; filter collection, impingers and impactors have to be analysed offline. A TEOM provides a measure of total particle mass, but has poor time resolution and is sensitive to pressure fluctuations, which are hard to avoid when measuring from an inhalation system. A complete SMPS system is redundant as the aerosol is monodisperse and only the number concentration is of interest. When taking these factors into consideration, basically two alternatives remain for nanoparticles: condensation particle counters (CPC) or Faraday cup electrometers. Only one previous study of lung deposition of nanoparticles reports using an electrometer</span><sup data-dcnode-id="2926"><a aria-label="Reference 36" data-dcnode-id="2927" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR36" id="ref-link-section-d180411273e1036" title="Blanchard, J. D. &amp; Willeke, K. Total deposition of ultrafine sodium chloride particles in human lungs. J Appl Physiol Respir Environ Exerc Physiol 57, 1850–1856 (1984)."><span data-dcnode-id="2928" instrument_node="">36</span></a></sup><span data-dcnode-id="2925" instrument_node="">. Electrometers have the advantages of simplicity and robustness but are less sensitive at low particle concentrations than condensation particle counters.</span></p><p data-dcnode-id="2905"><span data-dcnode-id="2923" instrument_node="">The breathing protocol used in this study is basically the same as used in the measurement of D</span><sub data-dcnode-id="2921"><span data-dcnode-id="2922" instrument_node="">L,CO</span></sub><sup data-dcnode-id="2918"><a aria-label="Reference 12" data-dcnode-id="2919" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR12" id="ref-link-section-d180411273e1045" title="Macintyre, N. et al. Standardisation of the single-breath determination of carbon monoxide uptake in the lung. Eur Respir J 26, 720–735, doi: 10.1183/09031936.05.00034905 (2005)."><span data-dcnode-id="2920" instrument_node="">12</span></a></sup><span data-dcnode-id="2917" instrument_node="">. A modified version of the breathing protocol has previously been used in lung deposition studies, more specifically in the “single-breath” and the “particle concentration” versions of aerosol-derived airway morphometry</span><sup data-dcnode-id="2911"><a aria-label="Reference 37" data-dcnode-id="2915" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR37" id="ref-link-section-d180411273e1049" title="Brand, P., Selzer, T., Tuch, T., Schulz, A. &amp; Heyder, J. Accuracy and Resolution Power of Aerosol-Derived Airway Morphometry in a Simple Lung Model. Experimental Lung Research 20, 185–205, doi: 10.3109/01902149409064382 (1994)."><span data-dcnode-id="2916" instrument_node="">37</span></a><span data-dcnode-id="2914" instrument_node="">,</span><a aria-label="Reference 38" data-dcnode-id="2912" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR38" id="ref-link-section-d180411273e1052" title="Zeman, K. L. &amp; Bennett, W. D. Measuring Alveolar Dimensions at Total Lung Capacity by Aerosol-Derived Airway Morphometry. Journal of Aerosol Medicine-Deposition Clearance and Effects in the Lung 8, 135–147, doi: 10.1089/jam.1995.8.135 (1995)."><span data-dcnode-id="2913" instrument_node="">38</span></a></sup><span data-dcnode-id="2910" instrument_node=""> (ADAM). It has also been used in one study to determine particle deposition of nanoparticles, but with a bolus of radiolabelled particles</span><sup data-dcnode-id="2907"><a aria-label="Reference 7" data-dcnode-id="2908" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR7" id="ref-link-section-d180411273e1056" title="Möller, W. et al. Deposition, retention, and translocation of ultrafine particles from the central airways and lung periphery. Am J Respir Crit Care Med 177, 426–432, doi: 10.1164/rccm.200602-301OC (2008)."><span data-dcnode-id="2909" instrument_node="">7</span></a></sup><span data-dcnode-id="2906" instrument_node="">. The first exhalation to RV followed by inhalation to TLC minimizes the effect of mixing and dilution with residual air in the lungs. The rapid reduction in linear flow velocity in the distal lung and the breath holding time allows the nanoparticles to move by diffusion with minimal convective motions. Thus, the measured particle recovery is expected to correlate with the diffusion distances in the distal lung in their most inflated state.</span></p><p data-dcnode-id="2886"><span data-dcnode-id="2904" instrument_node="">It was concluded that the particle recovery declined exponentially with residence time in the lung, as expected from the theory of Brownian motion and previous studies</span><sup data-dcnode-id="2895"><a aria-label="Reference 18" data-dcnode-id="2902" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR18" id="ref-link-section-d180411273e1063" title="Schiller, C. F., Gebhart, J., Heyder, J., Rudolf, G. &amp; Stahlhofen, W. Factors Influencing Total Deposition of Ultrafine Aerosol-Particles in the Human Respiratory-Tract. J Aerosol Sci 17, 328–332, doi: 10.1016/0021-8502(86)90098-4 (1986)."><span data-dcnode-id="2903" instrument_node="">18</span></a><span data-dcnode-id="2901" instrument_node="">,</span><a aria-label="Reference 36" data-dcnode-id="2899" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR36" id="ref-link-section-d180411273e1066" title="Blanchard, J. D. &amp; Willeke, K. Total deposition of ultrafine sodium chloride particles in human lungs. J Appl Physiol Respir Environ Exerc Physiol 57, 1850–1856 (1984)."><span data-dcnode-id="2900" instrument_node="">36</span></a><span data-dcnode-id="2898" instrument_node="">,</span><a aria-label="Reference 39" data-dcnode-id="2896" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR39" id="ref-link-section-d180411273e1069" title="Heyder, J., Gebhart, J., Roth, C., Scheuch, G. &amp; Stahlhofen, W. Diffusional transport of aerosol particles. J Aerosol Sci 14, 279–280, doi: 10.1016/0021-8502(83)90110-6 (1982)."><span data-dcnode-id="2897" instrument_node="">39</span></a></sup><span data-dcnode-id="2894" instrument_node="">. However, comparison to previous work is not trivial. The available data for studies using nanoparticles are limited, and especially studies with a well-defined and varied residence time in the lung are missing. A study by Blanchard and Willeke</span><sup data-dcnode-id="2891"><a aria-label="Reference 36" data-dcnode-id="2892" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR36" id="ref-link-section-d180411273e1073" title="Blanchard, J. D. &amp; Willeke, K. Total deposition of ultrafine sodium chloride particles in human lungs. J Appl Physiol Respir Environ Exerc Physiol 57, 1850–1856 (1984)."><span data-dcnode-id="2893" instrument_node="">36</span></a></sup><span data-dcnode-id="2890" instrument_node=""> reports data for measurements on one individual with different breathing periods to illustrate the influence of residence time in the lung. They used hygroscopic saline particles that (when they are at equilibrium with the moist air in the lung) have a size around 100 nm. The reported particle deposition is in the range of the data observed in this study (</span><i data-dcnode-id="2888"><span data-dcnode-id="2889" instrument_node="">R</span></i><span data-dcnode-id="2887" instrument_node=""> ≈ 0.60–0.48 at 3–6 s estimated residence time), although the methodology differs on several important points. More studies with data for particle deposition during varied residence times are only available for larger, micron-sized particles.</span></p><p data-dcnode-id="2878"><span data-dcnode-id="2885" instrument_node="">The largest measurement uncertainties were found for the shortest (3 s) and longest (15–20 s) breath-holding times. The uncertainties at short residence times were expected, as the breath-holding time is short compared to the inhalation/exhalation procedure. At longer residence times the exhaled particle concentration is low, and even a minor contribution of particles from larger airspaces will have a large impact on the result. However, for all breath-holding times the repeatability of the results was within 7.4%, 5.7% and 2.1% of the measured </span><i data-dcnode-id="2883"><span data-dcnode-id="2884" instrument_node="">R</span></i><span data-dcnode-id="2882" instrument_node=""> for 50, 75 and 100 nm particles respectively (</span><a data-dcnode-id="2880" data-track="click" data-track-action="figure anchor" data-track-label="link" href="#Fig3"><span data-dcnode-id="2881" instrument_node="">Fig. 3</span></a><span data-dcnode-id="2879" instrument_node="">).</span></p><p data-dcnode-id="2866"><span data-dcnode-id="2877" instrument_node="">The measured recovery for the seven healthy subjects showed that the instrument had a precision significantly higher than the inter-subject individual variation. This indicates that the method could be suitable for investigating individual variations in lung deposition and morphology, which have been observed in previous studies</span><sup data-dcnode-id="2868"><a aria-label="Reference 11" data-dcnode-id="2875" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR11" id="ref-link-section-d180411273e1092" title="Tarroni, G. et al. An indication on the biological variability of aerosol total deposition in humans. Am Ind Hyg Assoc J 41, 826–831, doi: 10.1080/15298668091425707 (1980)."><span data-dcnode-id="2876" instrument_node="">11</span></a><span data-dcnode-id="2874" instrument_node="">,</span><a aria-label="Reference 40" data-dcnode-id="2872" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR40" id="ref-link-section-d180411273e1095" title="Wilson, F. J. Jr., Hiller, F. C., Wilson, J. D. &amp; Bone, R. C. Quantitative deposition of ultrafine stable particles in the human respiratory tract. J Appl Physiol (1985) 58, 223–229 (1985)."><span data-dcnode-id="2873" instrument_node="">40</span></a><span data-dcnode-id="2871" instrument_node="">,</span><a aria-label="Reference 41" data-dcnode-id="2869" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR41" id="ref-link-section-d180411273e1098" title="Heyder, J., Gebhart, J., Stahlhofen, W. &amp; Stuck, B. Biological Variability of Particle Deposition in the Human Respiratory-Tract during Controlled and Spontaneous Mouth-Breathing. Annals of Occupational Hygiene 26, 137–147, doi: 10.1093/annhyg/26.1.137 (1982)."><span data-dcnode-id="2870" instrument_node="">41</span></a></sup><span data-dcnode-id="2867" instrument_node="">.</span></p><p data-dcnode-id="2846"><span data-dcnode-id="2865" instrument_node="">There are several putative applications of the developed instrument: investigation of effects of inhaled nanoparticles at various regions of the lung, precise nanoparticle drug delivery, exposure assessment in toxicological studies and for assessment of individual variations in lung morphology. For instance, with minor modifications to the instrument software, aerosol can be delivered as boluses to specific volumetric lung depths. As the method is fast and uncomplicated (a measurement takes less than a minute and the breathing manoeuvre is known to be manageable also for patients with severe respiratory disease) it is suitable for screening studies to investigate distributions on large populations. This could contribute to a better understanding of questions related, for instance, to individual variations of lung morphology, where new methods are of high demand</span><sup data-dcnode-id="2862"><a aria-label="Reference 42" data-dcnode-id="2863" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR42" id="ref-link-section-d180411273e1105" title="Ochs, M. et al. The Number of Alveoli in the Human Lung. Am J Resp Crit Care 169, 120–124, doi: 10.1164/rccm.200308-1107OC (2004)."><span data-dcnode-id="2864" instrument_node="">42</span></a></sup><span data-dcnode-id="2861" instrument_node="">. Targeting the alveolar region of the lung is an attractive route for administration of peptide based pharmaceuticals such as insulin and has been suggested as a possible route for gene therapy and administration of monoclonal antibodies</span><sup data-dcnode-id="2852"><a aria-label="Reference 43" data-dcnode-id="2859" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR43" id="ref-link-section-d180411273e1109" title="Sung, J. C., Pulliam, B. L. &amp; Edwards, D. A. Nanoparticles for drug delivery to the lungs. Trends in Biotechnology 25, 563–570, doi: 10.1016/j.tibtech.2007.09.005 (2007)."><span data-dcnode-id="2860" instrument_node="">43</span></a><span data-dcnode-id="2858" instrument_node="">,</span><a aria-label="Reference 44" data-dcnode-id="2856" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR44" id="ref-link-section-d180411273e1112" title="Patton, J. S. et al. The Particle has Landed-Characterizing the Fate of Inhaled Pharmaceuticals. Journal of Aerosol Medicine and Pulmonary Drug Delivery 23, S71–S87, doi: 10.1089/jamp.2010.0836 (2010)."><span data-dcnode-id="2857" instrument_node="">44</span></a><span data-dcnode-id="2855" instrument_node="">,</span><a aria-label="Reference 45" data-dcnode-id="2853" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR45" id="ref-link-section-d180411273e1115" title="Guilleminault, L. et al. Fate of inhaled monoclonal antibodies after the deposition of aerosolized particles in the respiratory system. Journal of Controlled Release 196, 344–354, doi: 10.1016/j.jconrel.2014.10.003 (2014)."><span data-dcnode-id="2854" instrument_node="">45</span></a></sup><span data-dcnode-id="2851" instrument_node="">, avoiding the problem of mucociliary clearance followed by second pass metabolism of inhaled particles</span><sup data-dcnode-id="2848"><a aria-label="Reference 46" data-dcnode-id="2849" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR46" id="ref-link-section-d180411273e1119" title="Labiris, N. R. &amp; Dolovich, M. B. Pulmonary drug delivery. Part I: Physiological factors affecting therapeutic effectiveness of aerosolized medications. British Journal of Clinical Pharmacology 56, 588–599, doi: 10.1046/j.1365-2125.2003.01892.x (2003)."><span data-dcnode-id="2850" instrument_node="">46</span></a></sup><span data-dcnode-id="2847" instrument_node="">. Using the setup to deliver pharmaceuticals is primarily of interest for potent substances as it is difficult to deliver high mass concentrations by nanoparticles.</span></p><p data-dcnode-id="2806"><span data-dcnode-id="2845" instrument_node="">An application of special interest may be as a technique for assessment of pathological changes in lung anatomy, similar to previously developed aerosol-based techniques such as ADAM (e.g. refs </span><a aria-label="Reference 37" data-dcnode-id="2843" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR37" id="ref-link-section-d180411273e1125" title="Brand, P., Selzer, T., Tuch, T., Schulz, A. &amp; Heyder, J. Accuracy and Resolution Power of Aerosol-Derived Airway Morphometry in a Simple Lung Model. Experimental Lung Research 20, 185–205, doi: 10.3109/01902149409064382 (1994)."><span data-dcnode-id="2844" instrument_node="">37</span></a><span data-dcnode-id="2842" instrument_node="">,</span><a aria-label="Reference 38" data-dcnode-id="2840" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR38" id="ref-link-section-d180411273e1128" title="Zeman, K. L. &amp; Bennett, W. D. Measuring Alveolar Dimensions at Total Lung Capacity by Aerosol-Derived Airway Morphometry. Journal of Aerosol Medicine-Deposition Clearance and Effects in the Lung 8, 135–147, doi: 10.1089/jam.1995.8.135 (1995)."><span data-dcnode-id="2841" instrument_node="">38</span></a><span data-dcnode-id="2839" instrument_node="">,</span><a aria-label="Reference 47" data-dcnode-id="2837" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR47" id="ref-link-section-d180411273e1131" title="Beinert, T. et al. Aerosol Morphometry and Aerosol Dispersion in Comparison with Conventional Lung-Function Tests in Obstructive Ventilatory Disorders. Atemwegs-Und Lungenkrankheiten 16, 306–307 (1990)."><span data-dcnode-id="2838" instrument_node="">47</span></a><span data-dcnode-id="2836" instrument_node="">, </span><a aria-label="Reference 48" data-dcnode-id="2834" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR48" id="ref-link-section-d180411273e1134" title="Brand, P., Beinert, T., Fruhmann, G., Hillebrecht, A. &amp; Heyder, J. Aerosol Derived Airway Morphometry at Different Levels of Lung-Inflation. Journal of Aerosol Medicine-Deposition Clearance and Effects in the Lung 6, 165–176, doi: 10.1089/jam.1993.6.165 (1993)."><span data-dcnode-id="2835" instrument_node="">48</span></a><span data-dcnode-id="2833" instrument_node="">, </span><a aria-label="Reference 49" data-dcnode-id="2831" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR49" id="ref-link-section-d180411273e1137" title="Brand, P., Rieger, C., Beinert, T. &amp; Heyder, J. Aerosol derived airway morphometry in healthy subjects. Eur Respir J 8, 1639–1646 (1995)."><span data-dcnode-id="2832" instrument_node="">49</span></a><span data-dcnode-id="2830" instrument_node="">, </span><a aria-label="Reference 50" data-dcnode-id="2828" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR50" id="ref-link-section-d180411273e1141" title="Gebhart, J., Heyder, J. &amp; Stahlhofen, W. Use of Aerosols to Estimate Pulmonary Air-Space Dimensions. Journal of Applied Physiology 51, 465–476 (1981)."><span data-dcnode-id="2829" instrument_node="">50</span></a><span data-dcnode-id="2827" instrument_node="">, </span><a aria-label="Reference 51" data-dcnode-id="2825" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR51" id="ref-link-section-d180411273e1144" title="Heyder, J. Assessment of Airway Geometry with Inert Aerosols. J Aerosol Sci 2, 89–97 (1989)."><span data-dcnode-id="2826" instrument_node="">51</span></a><span data-dcnode-id="2824" instrument_node="">, </span><a aria-label="Reference 52" data-dcnode-id="2822" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR52" id="ref-link-section-d180411273e1147" title="Palmes, E. D. Measurement of Pulmonary Air Spaces Using Aerosols. Archives of Internal Medicine 131, 76–79, doi: 10.1001/archinte.131.1.76 (1973)."><span data-dcnode-id="2823" instrument_node="">52</span></a><span data-dcnode-id="2821" instrument_node="">, </span><a aria-label="Reference 53" data-dcnode-id="2819" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR53" id="ref-link-section-d180411273e1150" title="Scheuch, G., Schillerscotland, C. F. &amp; Stahlhofen, W. The Effect of Particle-Size on the Evaluation of Aerosol-Derived Effective Airway Dimension (Ead). Journal of Aerosol Medicine-Deposition Clearance and Effects in the Lung 5, 1–9, doi: 10.1089/Jam.1992.5.1 (1992)."><span data-dcnode-id="2820" instrument_node="">53</span></a><span data-dcnode-id="2818" instrument_node="">, </span><a aria-label="Reference 54" data-dcnode-id="2816" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR54" id="ref-link-section-d180411273e1153" title="Blanchard, J. D. Aerosol bolus dispersion and aerosol-derived airway morphometry: Assessment of lung pathology and response to therapy 2. Journal of Aerosol Medicine-Deposition Clearance and Effects in the Lung 9, 453–476, doi: 10.1089/jam.1996.9.453 (1996)."><span data-dcnode-id="2817" instrument_node="">54</span></a><span data-dcnode-id="2815" instrument_node="">). The here proposed technique, where nanoparticles rather than micron-sized particles are used, will further be referred to as Airspace Dimension Assessment (AiDA). AiDA has several similarities to ADAM, but differs regarding deposition mechanisms and technology. Particles in the size range 800–1000 nm are mainly deposited by sedimentation and inertial impaction. The particle size used in the ADAM techniques and in the aerosol bolus dispersion techniques is deliberately chosen to maximize the effect of sedimentation and to minimize the effect of diffusion</span><sup data-dcnode-id="2812"><a aria-label="Reference 55" data-dcnode-id="2813" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR55" id="ref-link-section-d180411273e1157" title="Gebhart, J. &amp; Heyder, J. Removal of Aerosol-Particles from Stationary Air within Porous-Media. J Aerosol Sci 16, 175–187, doi: 10.1016/0021-8502(85)90085-0 (1985)."><span data-dcnode-id="2814" instrument_node="">55</span></a></sup><span data-dcnode-id="2811" instrument_node="">. The theoretical models used to analyse ADAM measurements assume that all particles are deposited exclusively by sedimentation</span><sup data-dcnode-id="2808"><a aria-label="Reference 55" data-dcnode-id="2809" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR55" id="ref-link-section-d180411273e1162" title="Gebhart, J. &amp; Heyder, J. Removal of Aerosol-Particles from Stationary Air within Porous-Media. J Aerosol Sci 16, 175–187, doi: 10.1016/0021-8502(85)90085-0 (1985)."><span data-dcnode-id="2810" instrument_node="">55</span></a></sup><span data-dcnode-id="2807" instrument_node="">, although this is a simplification and as diffusion and, for moderate to high flow rates also impaction, will contribute. In contrast, diffusion is much more dominant for the AiDA technique and no other deposition mechanism need to be taken into account.</span></p><p data-dcnode-id="2794"><span data-dcnode-id="2805" instrument_node="">A substantial advantage with AiDA is the possibility to use comparatively high airflows during inhalation and exhalation. In ADAM, an airflow of 250 mL/s is typical in order to achieve repeatable and minimal particle losses</span><sup data-dcnode-id="2802"><a aria-label="Reference 54" data-dcnode-id="2803" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR54" id="ref-link-section-d180411273e1170" title="Blanchard, J. D. Aerosol bolus dispersion and aerosol-derived airway morphometry: Assessment of lung pathology and response to therapy 2. Journal of Aerosol Medicine-Deposition Clearance and Effects in the Lung 9, 453–476, doi: 10.1089/jam.1996.9.453 (1996)."><span data-dcnode-id="2804" instrument_node="">54</span></a></sup><span data-dcnode-id="2801" instrument_node="">. This can be challenging for untrained subjects or patients with respiratory disease. It also makes measurements at full lung inflation problematic. As seen in </span><a data-dcnode-id="2799" data-track="click" data-track-action="figure anchor" data-track-label="link" href="#Fig4"><span data-dcnode-id="2800" instrument_node="">Figs 4</span></a><span data-dcnode-id="2798" instrument_node=""> and </span><a data-dcnode-id="2796" data-track="click" data-track-action="figure anchor" data-track-label="link" href="#Fig5"><span data-dcnode-id="2797" instrument_node="">5</span></a><span data-dcnode-id="2795" instrument_node="">, the deposition of nanoparticles is almost completely independent of flow-rates during inhalation and exhalation with flows up to 10 L/s. This simplifies the breathing manoeuvre and enables measurements at full lung inflation.</span></p><p data-dcnode-id="2746"><span data-dcnode-id="2793" instrument_node="">The proposed diagnostic application of the technique, AiDA, also has several similarities with the measurement of diffusion capacity of the lungs for carbon monoxide, (D</span><sub data-dcnode-id="2791"><span data-dcnode-id="2792" instrument_node="">L,CO</span></sub><span data-dcnode-id="2790" instrument_node="">)</span><sup data-dcnode-id="2784"><a aria-label="Reference 56" data-dcnode-id="2788" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR56" id="ref-link-section-d180411273e1185" title="Hughes, J. M. &amp; Bates, D. V. Historical review: the carbon monoxide diffusing capacity (DLCO) and its membrane (DM) and red cell (Theta.Vc) components. Respir Physiol Neurobiol 138, 115–142 (2003)."><span data-dcnode-id="2789" instrument_node="">56</span></a><span data-dcnode-id="2787" instrument_node="">,</span><a aria-label="Reference 57" data-dcnode-id="2785" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR57" id="ref-link-section-d180411273e1188" title="Krogh, M. The diffusion of gases through the lungs of man. Journal of Physiology-London 49, 271–300 (1915)."><span data-dcnode-id="2786" instrument_node="">57</span></a></sup><span data-dcnode-id="2783" instrument_node="">. D</span><sub data-dcnode-id="2781"><span data-dcnode-id="2782" instrument_node="">L,CO</span></sub><span data-dcnode-id="2780" instrument_node=""> is a clinical standard technique with sensitivity for emphysema, but with less specificity compared to computed tomography and magnetic resonance imaging</span><sup data-dcnode-id="2777"><a aria-label="Reference 56" data-dcnode-id="2778" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR56" id="ref-link-section-d180411273e1194" title="Hughes, J. M. &amp; Bates, D. V. Historical review: the carbon monoxide diffusing capacity (DLCO) and its membrane (DM) and red cell (Theta.Vc) components. Respir Physiol Neurobiol 138, 115–142 (2003)."><span data-dcnode-id="2779" instrument_node="">56</span></a></sup><span data-dcnode-id="2776" instrument_node="">. Similarly to D</span><sub data-dcnode-id="2774"><span data-dcnode-id="2775" instrument_node="">L,CO</span></sub><span data-dcnode-id="2773" instrument_node="">, the particle recovery, </span><i data-dcnode-id="2771"><span data-dcnode-id="2772" instrument_node="">R</span></i><span data-dcnode-id="2770" instrument_node="">, is measured for air from a volumetric lung depth of about 1.5 L. As described earlier, particle recovery is expected to correlate with the diffusion distances of the distal lung units. AiDA might also reflect distal air space enlargement more specifically than D</span><sub data-dcnode-id="2768"><span data-dcnode-id="2769" instrument_node="">L,CO</span></sub><span data-dcnode-id="2767" instrument_node="">, as AiDA is expected to reflect the diffusion distances within the air spaces only, whereas D</span><sub data-dcnode-id="2765"><span data-dcnode-id="2766" instrument_node="">L,CO</span></sub><span data-dcnode-id="2764" instrument_node=""> depends also on a number of other factors such as the properties of the blood-gas barrier and the capillary blood volume</span><sup data-dcnode-id="2761"><a aria-label="Reference 58" data-dcnode-id="2762" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR58" id="ref-link-section-d180411273e1208" title="Löndahl, J., Jakobsson, J., Broday, D., Aaltonen, H. &amp; Wollmer, P. Do nanoparticles provide a new opportunity for diagnosis of distal airspace disease? International Journal of Nanomedicine accepted for publication (2016)."><span data-dcnode-id="2763" instrument_node="">58</span></a></sup><span data-dcnode-id="2760" instrument_node="">. Judging from the limited number of measurements in this study, the precision of AiDA is comparable, or better, than that of D</span><sub data-dcnode-id="2758"><span data-dcnode-id="2759" instrument_node="">L,CO</span></sub><span data-dcnode-id="2757" instrument_node="">. The coefficient of variation of repeated within-session measurements of D</span><sub data-dcnode-id="2755"><span data-dcnode-id="2756" instrument_node="">L,CO</span></sub><span data-dcnode-id="2754" instrument_node=""> is approximately 5%, i.e. similar to AiDA, whereas the long-term reproducibility is about 9% for D</span><sub data-dcnode-id="2752"><span data-dcnode-id="2753" instrument_node="">L,CO</span></sub><span data-dcnode-id="2751" instrument_node=""> but about 5% for AiDA in this study</span><sup data-dcnode-id="2748"><a aria-label="Reference 12" data-dcnode-id="2749" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR12" id="ref-link-section-d180411273e1219" title="Macintyre, N. et al. Standardisation of the single-breath determination of carbon monoxide uptake in the lung. Eur Respir J 26, 720–735, doi: 10.1183/09031936.05.00034905 (2005)."><span data-dcnode-id="2750" instrument_node="">12</span></a></sup><span data-dcnode-id="2747" instrument_node="">.</span></p><p data-dcnode-id="2744"><span data-dcnode-id="2745" instrument_node="">In conclusion, the presented instrument provides data for individual measurements of lung deposition of nanoparticles with size-resolution and time resolution on human subjects with precision on par with, or better than, in previous studies. The method has several advantages: it is fast, has high precision, yields highly reproducible results and can target specific volumetric lung depths. Possible applications are as a method to investigate the effects of inhaled nanoparticles at various regions of the lung, as a device for precise nanoparticle drug delivery, for exposures assessment in toxicological studies, or as a diagnostic tool for the lungs with possibility to monitor the progress of disease or effect of applied therapy.</span></p></div></div></section><section data-dcnode-id="2719" data-title="Additional Information"><div class="c-article-section" data-dcnode-id="2720" id="Sec18-section"><h2 class="c-article-section__title js-section-title js-c-reading-companion-sections-item" data-dcnode-id="2739" id="Sec18"><span data-dcnode-id="2740" instrument_node="">Additional Information</span></h2><div class="c-article-section__content" data-dcnode-id="2721" id="Sec18-content"><p data-dcnode-id="2726"><b data-dcnode-id="2737"><span data-dcnode-id="2738" instrument_node="">How to cite this article</span></b><span data-dcnode-id="2736" instrument_node="">: Jakobsson, J. K. F. </span><i data-dcnode-id="2734"><span data-dcnode-id="2735" instrument_node="">et al</span></i><span data-dcnode-id="2733" instrument_node="">. A new method for measuring lung deposition efficiency of airborne nanopart
