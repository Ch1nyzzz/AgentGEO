</span><meta content="Assessment of respiratory tract deposition of nanoparticles is a key link to understanding their health impacts. An instrument was developed to measure respiratory tract deposition of nanoparticles in a single breath. Monodisperse nanoparticles are generated, inhaled and sampled from a determined volumetric lung depth after a controlled residence time in the lung. The instrument was characterized for sensitivity to inter-subject variability, particle size (22, 50, 75 and 100 nm) and breath-holding time (3–20 s) in a group of seven healthy subjects. The measured particle recovery had an inter-subject variability 26–50 times larger than the measurement uncertainty and the results for various particle sizes and breath-holding times were in accordance with the theory for Brownian diffusion and values calculated from the Multiple-Path Particle Dosimetry model. The recovery was found to be determined by residence time and particle size, while respiratory flow-rate had minor importance in the studied range 1–10 L/s. The instrument will be used to investigate deposition of nanoparticles in patients with respiratory disease. The fast and precise measurement allows for both diagnostic applications, where the disease may be identified based on particle recovery, and for studies with controlled delivery of aerosol-based nanomedicine to specific regions of the lungs." data-dcnode-id="4569" name="dc.description"><span data-dcnode-id="4568" instrument_node="">

</span><section aria-labelledby="Abs1" data-dcnode-id="3584" data-title="Abstract" lang="en"><div class="c-article-section" data-dcnode-id="3585" id="Abs1-section"><h2 class="c-article-section__title js-section-title js-c-reading-companion-sections-item" data-dcnode-id="3589" id="Abs1"><span data-dcnode-id="3590" instrument_node="">Abstract</span></h2><div class="c-article-section__content" data-dcnode-id="3586" id="Abs1-content"><p data-dcnode-id="3587"><span data-dcnode-id="3588" instrument_node="">Assessment of respiratory tract deposition of nanoparticles is a key link to understanding their health impacts. An instrument was developed to measure respiratory tract deposition of nanoparticles in a single breath. Monodisperse nanoparticles are generated, inhaled and sampled from a determined volumetric lung depth after a controlled residence time in the lung. The instrument was characterized for sensitivity to inter-subject variability, particle size (22, 50, 75 and 100 nm) and breath-holding time (3–20 s) in a group of seven healthy subjects. The measured particle recovery had an inter-subject variability 26–50 times larger than the measurement uncertainty and the results for various particle sizes and breath-holding times were in accordance with the theory for Brownian diffusion and values calculated from the Multiple-Path Particle Dosimetry model. The recovery was found to be determined by residence time and particle size, while respiratory flow-rate had minor importance in the studied range 1–10 L/s. The instrument will be used to investigate deposition of nanoparticles in patients with respiratory disease. The fast and precise measurement allows for both diagnostic applications, where the disease may be identified based on particle recovery, and for studies with controlled delivery of aerosol-based nanomedicine to specific regions of the lungs.</span></p></div></div></section><span data-dcnode-id="3583" instrument_node="">
</span><noscript data-dcnode-id="3581"><span data-dcnode-id="3582" instrument_node="">
</span></noscript><span data-dcnode-id="3580" instrument_node="">
</span><section data-dcnode-id="3513" data-title="Introduction"><div class="c-article-section" data-dcnode-id="3514" id="Sec1-section"><h2 class="c-article-section__title js-section-title js-c-reading-companion-sections-item" data-dcnode-id="3578" id="Sec1"><span data-dcnode-id="3579" instrument_node="">Introduction</span></h2><div class="c-article-section__content" data-dcnode-id="3515" id="Sec1-content"><p data-dcnode-id="3576"><span data-dcnode-id="3577" instrument_node="">There is a need for efficient and precise methods for determination of respiratory tract deposition of inhaled airborne nanoparticles within pulmonary drug delivery, respiratory diagnostics and toxicology. The respiratory tract deposition of inhaled nanoparticles is a key link to understanding their health effects. In this paper, a method is presented to measure directly the deposition of nanoparticles in a controlled, low dose, single breath procedure.</span></p><p data-dcnode-id="3538"><span data-dcnode-id="3575" instrument_node="">To date only about 50 studies have been published that report experimental results for measuring respiratory tract deposition of particles &lt;300 nm in human lungs</span><sup data-dcnode-id="3572"><a aria-label="Reference 1" data-dcnode-id="3573" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR1" id="ref-link-section-d180411273e374" title="Löndahl, J. et al. Measurement Techniques for Respiratory Tract Deposition of Airborne Nanoparticles: A Critical Review. J Aerosol Med Pulm Drug Deliv, doi: 10.1089/jamp.2013.1044 (2014)."><span data-dcnode-id="3574" instrument_node="">1</span></a></sup><span data-dcnode-id="3571" instrument_node="">. Differences in methodology and small groups of subjects have contributed to significant divergence in the reported results</span><sup data-dcnode-id="3547"><a aria-label="Reference 2" data-dcnode-id="3569" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR2" id="ref-link-section-d180411273e378" title="Heyder, G. G., Heigwer, J., Roth, C. &amp; Stahlhofen, W. Experimental studies of the total deposition of aerosol particles in the human respiratory tract. Aerosol Science 4, 191–208 (1972)."><span data-dcnode-id="3570" instrument_node="">2</span></a><span data-dcnode-id="3568" instrument_node="">,</span><a aria-label="Reference 3" data-dcnode-id="3566" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR3" id="ref-link-section-d180411273e381" title="Jaques, P. A. &amp; Kim, C. S. Measurement of total lung deposition of inhaled ultrafine particles in healthy men and women. Inhal Toxicol 12, 715–731, doi: 10.1080/08958370050085156 (2000)."><span data-dcnode-id="3567" instrument_node="">3</span></a><span data-dcnode-id="3565" instrument_node="">,</span><a aria-label="Reference 4" data-dcnode-id="3563" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR4" id="ref-link-section-d180411273e384" title="Kim, C. S. &amp; Jaques, P. A. Total lung deposition of ultrafine particles in elderly subjects during controlled breathing. Inhalation Toxicology 17, 387–399, doi: 10.1080/08958370590929493 (2005)."><span data-dcnode-id="3564" instrument_node="">4</span></a><span data-dcnode-id="3562" instrument_node="">,</span><a aria-label="Reference 5" data-dcnode-id="3560" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR5" id="ref-link-section-d180411273e387" title="Chalupa, D. C., Morrow, P. E., Oberdorster, G., Utell, M. J. &amp; Frampton, M. W. Ultrafine particle deposition in subjects with asthma. Environmental Health Perspectives 112, 879–882, doi: 10.1289/ehp.6851 (2004)."><span data-dcnode-id="3561" instrument_node="">5</span></a><span data-dcnode-id="3559" instrument_node="">,</span><a aria-label="Reference 6" data-dcnode-id="3557" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR6" id="ref-link-section-d180411273e390" title="Anderson, P. J., Wilson, J. D. &amp; Hiller, F. C. Respiratory-Tract Deposition of Ultrafine Particles in Subjects with Obstructive or Restrictive Lung-Disease. Chest 97, 1115–1120, doi: 10.1378/chest.97.5.1115 (1990)."><span data-dcnode-id="3558" instrument_node="">6</span></a><span data-dcnode-id="3556" instrument_node="">,</span><a aria-label="Reference 7" data-dcnode-id="3554" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR7" id="ref-link-section-d180411273e393" title="Möller, W. et al. Deposition, retention, and translocation of ultrafine particles from the central airways and lung periphery. Am J Respir Crit Care Med 177, 426–432, doi: 10.1164/rccm.200602-301OC (2008)."><span data-dcnode-id="3555" instrument_node="">7</span></a><span data-dcnode-id="3553" instrument_node="">,</span><a aria-label="Reference 8" data-dcnode-id="3551" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR8" id="ref-link-section-d180411273e397" title="Brown, J. S., Zeman, K. L. &amp; Bennett, W. D. Ultrafine particle deposition and clearance in the healthy and obstructed lung. Am J Resp Crit Care 166, 1240–1247, doi: 10.1164/rccm.00205-399OC (2002)."><span data-dcnode-id="3552" instrument_node="">8</span></a><span data-dcnode-id="3550" instrument_node="">,</span><a aria-label="Reference 9" data-dcnode-id="3548" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR9" id="ref-link-section-d180411273e400" title="Löndahl, J. et al. Size-resolved respiratory-tract deposition of fine and ultrafine hydrophobic and hygroscopic aerosol particles during rest and exercise. Inhal Toxicol 19, 109–116, doi: 10.1080/08958370601051677 (2007)."><span data-dcnode-id="3549" instrument_node="">9</span></a></sup><span data-dcnode-id="3546" instrument_node="">. Many of the developed methods also take considerable time and effort to execute, in some cases several hours of measurements and as a consequence the inhaled particle dose has been substantial</span><sup data-dcnode-id="3540"><a aria-label="Reference 5" data-dcnode-id="3544" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR5" id="ref-link-section-d180411273e404" title="Chalupa, D. C., Morrow, P. E., Oberdorster, G., Utell, M. J. &amp; Frampton, M. W. Ultrafine particle deposition in subjects with asthma. Environmental Health Perspectives 112, 879–882, doi: 10.1289/ehp.6851 (2004)."><span data-dcnode-id="3545" instrument_node="">5</span></a><span data-dcnode-id="3543" instrument_node="">,</span><a aria-label="Reference 10" data-dcnode-id="3541" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR10" id="ref-link-section-d180411273e407" title="Montoya, L. D. et al. Continuous measurements of ambient particle deposition in human subjects. Aerosol Sci Tech 38, 980–990, doi: 10.1080/027868290519049 (2004)."><span data-dcnode-id="3542" instrument_node="">10</span></a></sup><span data-dcnode-id="3539" instrument_node="">.</span></p><p data-dcnode-id="3528"><span data-dcnode-id="3537" instrument_node="">No system for direct measurements of lung deposition of nanoparticles is commercially available, and there is no consensus of a standard reference with which to compare the different techniques. There are, however, several commercially available devices for monitoring the concentration, and assumed exposure, of inhalable airborne nanoparticles based on a model of average respiratory tract deposition fractions for hydrophobic particles</span><sup data-dcnode-id="3534"><a aria-label="Reference 1" data-dcnode-id="3535" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR1" id="ref-link-section-d180411273e414" title="Löndahl, J. et al. Measurement Techniques for Respiratory Tract Deposition of Airborne Nanoparticles: A Critical Review. J Aerosol Med Pulm Drug Deliv, doi: 10.1089/jamp.2013.1044 (2014)."><span data-dcnode-id="3536" instrument_node="">1</span></a></sup><span data-dcnode-id="3533" instrument_node="">. This approach provides estimations of exposures to airborne nanoparticles for an idealized normal case, but neither take into account the vast individual variations</span><sup data-dcnode-id="3530"><a aria-label="Reference 11" data-dcnode-id="3531" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR11" id="ref-link-section-d180411273e418" title="Tarroni, G. et al. An indication on the biological variability of aerosol total deposition in humans. Am Ind Hyg Assoc J 41, 826–831, doi: 10.1080/15298668091425707 (1980)."><span data-dcnode-id="3532" instrument_node="">11</span></a></sup><span data-dcnode-id="3529" instrument_node=""> of anatomical and physiological features, nor the varying properties of real-world aerosol particles. A device for direct measurements of respiratory tract deposition of nanoparticles is of great importance to reach a better understanding of the mechanisms determining the real-world situation, taking these, and possible other previously unknown factors into account.</span></p><p data-dcnode-id="3518"><span data-dcnode-id="3527" instrument_node="">Several critical design aspects have been identified as potential sources of uncertainty in previous studies</span><sup data-dcnode-id="3524"><a aria-label="Reference 1" data-dcnode-id="3525" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR1" id="ref-link-section-d180411273e425" title="Löndahl, J. et al. Measurement Techniques for Respiratory Tract Deposition of Airborne Nanoparticles: A Critical Review. J Aerosol Med Pulm Drug Deliv, doi: 10.1089/jamp.2013.1044 (2014)."><span data-dcnode-id="3526" instrument_node="">1</span></a></sup><span data-dcnode-id="3523" instrument_node=""> and should be taken into account. Most problems can be directly related to the aerosol source, the inhalation system or the particle detection system</span><sup data-dcnode-id="3520"><a aria-label="Reference 1" data-dcnode-id="3521" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR1" id="ref-link-section-d180411273e429" title="Löndahl, J. et al. Measurement Techniques for Respiratory Tract Deposition of Airborne Nanoparticles: A Critical Review. J Aerosol Med Pulm Drug Deliv, doi: 10.1089/jamp.2013.1044 (2014)."><span data-dcnode-id="3522" instrument_node="">1</span></a></sup><span data-dcnode-id="3519" instrument_node="">. There is a lack of simple, robust and reliable particle generators producing hydrophobic nanoparticles suitable for inhalation studies. Particle losses in the instrument are unavoidable and have to be minimized and accounted for during measurements. Detection and precise monitoring of nanoparticle concentrations is challenging due to their limited light scattering properties and small mass. We intend to implement state-of–the-art technology to solve these issues. The nano aerosol will be generated by an electrospray followed by electrostatic size-selection. The particle detection will be performed by a condensation particle counter and particle losses in the instrument will be accounted for by careful characterisation and particle loss correction models.</span></p><p data-dcnode-id="3516"><span data-dcnode-id="3517" instrument_node="">The aim of this study is to design an instrument for direct measurement of lung deposition of nanoparticles and to investigate suitable operational parameters for measurements on human subjects. A second aim is to evaluate the performance of the instrument with regard to precision, sensitivity and reproducibility for different particle sizes and breathing conditions in a group of healthy volunteers. Putative applications for the technology includes controlled nanoparticle drug delivery, assessment of lung deposition in toxicological studies and diagnosis based on differences in deposition between normal and diseased lungs.</span></p></div></div></section><section data-dcnode-id="3297" data-title="Material and Methods"><div class="c-article-section" data-dcnode-id="3298" id="Sec2-section"><h2 class="c-article-section__title js-section-title js-c-reading-companion-sections-item" data-dcnode-id="3511" id="Sec2"><span data-dcnode-id="3512" instrument_node="">Material and Methods</span></h2><div class="c-article-section__content" data-dcnode-id="3299" id="Sec2-content"><h3 class="c-article__sub-heading" data-dcnode-id="3509" id="Sec3"><span data-dcnode-id="3510" instrument_node="">Experimental setup</span></h3><p data-dcnode-id="3500"><span data-dcnode-id="3508" instrument_node="">As illustrated in </span><a data-dcnode-id="3506" data-track="click" data-track-action="figure anchor" data-track-label="link" href="#Fig1"><span data-dcnode-id="3507" instrument_node="">Fig. 1</span></a><span data-dcnode-id="3505" instrument_node="">, the instrument for measurement of particle deposition in the lungs consists of three main parts: 1) aerosol generation and conditioning, 2) inhalation system and 3) particle detection and analysis. The system is controlled by a computer with software written in LabView (LabView 10.0, National Instruments, US). Overall, the design follows principles previously described for respiratory tract deposition measurements</span><sup data-dcnode-id="3502"><a aria-label="Reference 1" data-dcnode-id="3503" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR1" id="ref-link-section-d180411273e451" title="Löndahl, J. et al. Measurement Techniques for Respiratory Tract Deposition of Airborne Nanoparticles: A Critical Review. J Aerosol Med Pulm Drug Deliv, doi: 10.1089/jamp.2013.1044 (2014)."><span data-dcnode-id="3504" instrument_node="">1</span></a></sup><span data-dcnode-id="3501" instrument_node="">.</span></p><div class="c-article-section__figure js-c-reading-companion-figures-item" data-container-section="figure" data-dcnode-id="3474" data-test="figure" data-title="Figure 1" id="figure-1"><figure data-dcnode-id="3475"><figcaption data-dcnode-id="3497"><b class="c-article-section__figure-caption" data-dcnode-id="3498" data-test="figure-caption-text" id="Fig1"><span data-dcnode-id="3499" instrument_node="">Figure 1</span></b></figcaption><div class="c-article-section__figure-content" data-dcnode-id="3486"><div class="c-article-section__figure-item" data-dcnode-id="3492"><a class="c-article-section__figure-link" data-dcnode-id="3493" data-test="img-link" data-track="click" data-track-action="view figure" data-track-label="image" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.nature.com/articles/srep36147/figures/1" rel="nofollow"><picture data-dcnode-id="3494"><source data-dcnode-id="3496" srcset="//media.springernature.com/lw685/springer-static/image/art%3A10.1038%2Fsrep36147/MediaObjects/41598_2016_Article_BFsrep36147_Fig1_HTML.jpg?as=webp" type="image/webp"><img alt="figure 1" aria-describedby="Fig1" data-dcnode-id="3495" height="564" loading="lazy" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//media.springernature.com/lw685/springer-static/image/art%253A10.1038/srep36147/MediaObjects/41598_2016_Article_BFsrep36147_Fig1_HTML.jpg&amp;raw" width="685"></picture></a></div><div class="c-article-section__figure-description" data-dcnode-id="3487" data-test="bottom-caption" id="figure-1-desc"><p data-dcnode-id="3490"><span data-dcnode-id="3491" instrument_node="">Schematic illustration of the instrument.</span></p><p data-dcnode-id="3488"><span data-dcnode-id="3489" instrument_node="">The aerosol is produced with an electrospray aerosol generator (E-spray), size selected with a differential mobility analyser (DMA) and transferred into an aerosol reservoir where it is diluted and mixed with particle free air. Aerosol from the distal airspaces is sampled into a separate volume and the particle concentration in inhaled and exhaled aerosol is measured with a condensation particle counter (CPC).</span></p></div></div><div class="u-text-right u-hide-print" data-dcnode-id="3476"><a aria-label="Full size image figure 1" class="c-article__pill-button" data-dcnode-id="3477" data-test="article-link" data-track="click" data-track-action="view figure" data-track-dest="link:Figure1 Full size image" data-track-label="button" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.nature.com/articles/srep36147/figures/1" rel="nofollow"><span data-dcnode-id="3484"><span data-dcnode-id="3485" instrument_node="">Full size image</span></span><svg aria-hidden="true" class="u-icon" data-dcnode-id="3478" focusable="false" height="16" role="img" width="16"><use data-dcnode-id="3479" xlink:href="#global-icon-chevron-right" xmlns:xlink="http://www.w3.org/1999/xlink"><svg data-dcnode-id="3480" id="global-icon-chevron-right" viewBox="0 0 16 16"></svg></use></svg><span data-dcnode-id="3483" instrument_node="">
</span><path d="M7.782 7L5.3 4.518c-.393-.392-.4-1.022-.02-1.403a1.001 1.001 0 011.417 0l4.176 4.177a1.001 1.001 0 010 1.416l-4.176 4.177a.991.991 0 01-1.4.016 1 1 0 01.003-1.42L7.782 9l1.013-.998z" data-dcnode-id="3482" fill-rule="evenodd"></path><span data-dcnode-id="3481" instrument_node="">
</span></a></div></figure></div><h3 class="c-article__sub-heading" data-dcnode-id="3472" id="Sec4"><span data-dcnode-id="3473" instrument_node="">Aerosol generation</span></h3><p data-dcnode-id="3470"><span data-dcnode-id="3471" instrument_node="">The aerosol was generated by electrospraying polystyrene latex nanospheres (PSL) (Polymer Microsphere Suspension, Microgenics Corp, Fremont CA, US) with an electrospray aerosol generator (model 3480, TSI Inc., Shoreview, MN, US). The aerosol generator contains a built-in Po-210 neutralizer (P-2042 Nuclespot Alpha ionizer, NRDStaticControl, NY, US) at the aerosol output. PSL nanospheres with the nominal sizes 22, 50, 75 and 100 nm were chosen to obtain well-defined, spherical, non-toxic and hydrophobic particles. Background particles, primarily smaller than 20 nm, were removed with a differential mobility analyzer (DMA, Model 3071, TSI GmbH, Aachen, Germany). The aerosol passes a Ni-63 neutralizer (design: Lund University, Lund, Sweden) before entering the DMA, to assure equilibrium charge. Downstream the DMA all particles have a single positive charge. Monodispersity of the aerosol was confirmed by characterization with a scanning mobility particle sizer (SMPS, design: Lund University, Lund, Sweden).</span></p><p data-dcnode-id="3465"><span data-dcnode-id="3469" instrument_node="">The monodisperse aerosol was led into a semi-flexible reservoir constructed of a 10 L rigid stainless steel tank and an antistatic 6 L rubber re-breathing bag. The monodisperse aerosol was diluted with particle-free air to a concentration of approximately 2000–6000 cm</span><sup data-dcnode-id="3467"><span data-dcnode-id="3468" instrument_node="">−3</span></sup><span data-dcnode-id="3466" instrument_node=""> at a flow-rate of 5–7 L/min. The aerosol in the reservoir was continuously substituted and the excess aerosol was removed through a filtered exhaust to assure a stable supply of test aerosol.</span></p><h3 class="c-article__sub-heading" data-dcnode-id="3463" id="Sec5"><span data-dcnode-id="3464" instrument_node="">Inhalation system</span></h3><p data-dcnode-id="3458"><span data-dcnode-id="3462" instrument_node="">The subject breathed through a mouthpiece connected to a high-speed, computer controlled, four-way valve (as used in MasterScreen PFT, Viasys GmbH-Erich Jaeger, Hoechberg, Germany) that switches between particle free air, the test aerosol reservoir and the sample collector (</span><a data-dcnode-id="3460" data-track="click" data-track-action="figure anchor" data-track-label="link" href="#Fig1"><span data-dcnode-id="3461" instrument_node="">Fig. 1</span></a><span data-dcnode-id="3459" instrument_node="">). The breathing pattern was monitored at a resolution of 100 Hz by a flow meter (pneumotachograph, Type 2, Dr. Fenyves und Gut, Hechingen, Germany) connected to the mouthpiece. The valve was opening and closing the ports with a time precision around 100 ms and a volume accuracy of 80–150 mL. To reduce particle losses, tubing lengths were minimized and all parts, with the exception of the four-way valve, were made of conducting or anti-static materials. The flow meter, four-way valve and sample collector were enclosed in a temperature-controlled box (35 °C) to avoid condensation of water vapour. Temperature and relative humidity were monitored in the aerosol reservoir, the sample collector and at the particle detector. The sample collector consists of a 1 m long brass tube with dimensions adjusted to prevent mixing of the sample and to minimize flow resistance.</span></p><h3 class="c-article__sub-heading" data-dcnode-id="3456" id="Sec6"><span data-dcnode-id="3457" instrument_node="">Particle detection and analysis</span></h3><p data-dcnode-id="3451"><span data-dcnode-id="3455" instrument_node="">Aerosol was continuously sampled from either the aerosol reservoir or the sample collector for monitoring of the particle number concentration. A condensation particle counter (CPC, Model 3760, TSI Inc., Aachen, Germany) was used to measure the concentration at a frequency of 1 Hz and a flow of 1 L/min (</span><a data-dcnode-id="3453" data-track="click" data-track-action="figure anchor" data-track-label="link" href="#Fig2"><span data-dcnode-id="3454" instrument_node="">Fig. 2</span></a><span data-dcnode-id="3452" instrument_node="">). A mean value obtained over 20 s from the aerosol reservoir, and over 10 s from the sample collector, was used for inhaled and exhaled concentrations, respectively. Sample location was selected with a three-way computer controlled valve (Solenoid Valve, type 330, Bürkert, Ingelfingen, Germany). The relative humidity of the analyzed aerosol was reduced below 20% with a Nafion single-tube drier (MD-110-48S, Perma Pure, Toms River, NJ, USA). The pressure upstream the CPC was monitored (PasCal 100, Hoffrichter, Schwerin, Germany) to make sure that sampling flow was even. The sampling lines from the aerosol reservoir and the sample collector have equal lengths to avoid a systematic error from differences in particle losses. To confirm quality of the data, measurements were also performed with two alternative CPCs, a TSI 3010 (CPC, Model 3010, TSI Inc., Aachen, Germany) and an Airmodus (bCPC, Model a20, Airmodus Ltd, Helsinki, Finland). All CPCs are checked regularly and performed consistently in the setup and yielded similar results on reference subjects.</span></p><div class="c-article-section__figure js-c-reading-companion-figures-item" data-container-section="figure" data-dcnode-id="3427" data-test="figure" data-title="Figure 2" id="figure-2"><figure data-dcnode-id="3428"><figcaption data-dcnode-id="3448"><b class="c-article-section__figure-caption" data-dcnode-id="3449" data-test="figure-caption-text" id="Fig2"><span data-dcnode-id="3450" instrument_node="">Figure 2</span></b></figcaption><div class="c-article-section__figure-content" data-dcnode-id="3439"><div class="c-article-section__figure-item" data-dcnode-id="3443"><a class="c-article-section__figure-link" data-dcnode-id="3444" data-test="img-link" data-track="click" data-track-action="view figure" data-track-label="image" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.nature.com/articles/srep36147/figures/2" rel="nofollow"><picture data-dcnode-id="3445"><source data-dcnode-id="3447" srcset="//media.springernature.com/lw685/springer-static/image/art%3A10.1038%2Fsrep36147/MediaObjects/41598_2016_Article_BFsrep36147_Fig2_HTML.jpg?as=webp" type="image/webp"><img alt="figure 2" aria-describedby="Fig2" data-dcnode-id="3446" height="756" loading="lazy" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//media.springernature.com/lw685/springer-static/image/art%253A10.1038/srep36147/MediaObjects/41598_2016_Article_BFsrep36147_Fig2_HTML.jpg&amp;raw" width="675"></picture></a></div><div class="c-article-section__figure-description" data-dcnode-id="3440" data-test="bottom-caption" id="figure-2-desc"><p data-dcnode-id="3441"><span data-dcnode-id="3442" instrument_node="">(Upper panel) Typical breathing pattern during measurements. From beginning of the measurement (min 30 s) to point (I), the subject breathed particle free air. Thereafter, the subject exhaled to residual volume. At point (II) the four-way valve switched and the subject inhaled particles from the aerosol reservoir. Between points (III) and (IV), all valves were closed and the subject held his breath. After a set period of time, at point (IV), the valve switched again and the subject exhaled into the sample collector. Once the determined sample volume was collected the valve to the sample collector was closed (V) and the subject exhaled to waste. (Lower panel) The measured particle number concentration during a typical measurement. The particle concentration in the aerosol reservoir was monitored until the exhaled sample was collected. Subsequently the exhaled aerosol concentration was measured. The particle recovery, R, was calculated from the mean values for the particle concentrations in inhaled and exhaled aerosols corrected for particle losses in the apparatus.</span></p></div></div><div class="u-text-right u-hide-print" data-dcnode-id="3429"><a aria-label="Full size image figure 2" class="c-article__pill-button" data-dcnode-id="3430" data-test="article-link" data-track="click" data-track-action="view figure" data-track-dest="link:Figure2 Full size image" data-track-label="button" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.nature.com/articles/srep36147/figures/2" rel="nofollow"><span data-dcnode-id="3437"><span data-dcnode-id="3438" instrument_node="">Full size image</span></span><svg aria-hidden="true" class="u-icon" data-dcnode-id="3431" focusable="false" height="16" role="img" width="16"><use data-dcnode-id="3432" xlink:href="#global-icon-chevron-right" xmlns:xlink="http://www.w3.org/1999/xlink"><svg data-dcnode-id="3433" id="global-icon-chevron-right" viewBox="0 0 16 16"></svg></use></svg><span data-dcnode-id="3436" instrument_node="">
</span><path d="M7.782 7L5.3 4.518c-.393-.392-.4-1.022-.02-1.403a1.001 1.001 0 011.417 0l4.176 4.177a1.001 1.001 0 010 1.416l-4.176 4.177a.991.991 0 01-1.4.016 1 1 0 01.003-1.42L7.782 9l1.013-.998z" data-dcnode-id="3435" fill-rule="evenodd"></path><span data-dcnode-id="3434" instrument_node="">
</span></a></div></figure></div><h3 class="c-article__sub-heading" data-dcnode-id="3425" id="Sec7"><span data-dcnode-id="3426" instrument_node="">Inhalation procedure</span></h3><p data-dcnode-id="3417"><span data-dcnode-id="3424" instrument_node="">The breathing protocol mimics the procudure used for measurement of the diffusing capacity for carbon monoxide (D</span><sub data-dcnode-id="3422"><span data-dcnode-id="3423" instrument_node="">L,CO</span></sub><span data-dcnode-id="3421" instrument_node="">) and is thus known to be managable by the vast majority of the population without any need for prior training. Before the measurement, the position of the mouthpiece was adjusted to allow the subject to breathe comfortably. A nose clip was used to assure that the subject only breathed through the mouth. The operator and the subject could follow the subject’s breathing on a computer screen, which aided the subject to follow the breathing protocol accurately. The inhalation procedure is illustrated in </span><a data-dcnode-id="3419" data-track="click" data-track-action="figure anchor" data-track-label="link" href="#Fig2"><span data-dcnode-id="3420" instrument_node="">Fig. 2</span></a><span data-dcnode-id="3418" instrument_node=""> (upper panel).</span></p><p data-dcnode-id="3409"><span data-dcnode-id="3416" instrument_node="">During the first phase of measurement the subject breathes particle free air for a minimum of 30 s. Next, the subject performs an exhalation to residual volume (RV; </span><a data-dcnode-id="3414" data-track="click" data-track-action="figure anchor" data-track-label="link" href="#Fig2"><span data-dcnode-id="3415" instrument_node="">Fig. 2</span></a><span data-dcnode-id="3413" instrument_node="">, point I-II) followed by inhalation to total lung capacity (TLC; point II-III). At the transition between exhalation and inhalation (point II) the four-way valve opens the port to the aerosol reservoir. After complete inhalation all ports in the four-way valve are closed and the subject holds his breath for a set period of time. When the breath-holding period has elapsed, the port to the sample collector opens and the subject exhales normally. Once the predetermined volume has passed the sample collector, the valve closes and the breathing procedure is finished. The operator guides the subject through the procedure, and both operator and subject can follow the breathing pattern visually on a display. Data collection from a typical measurement are shown in </span><a data-dcnode-id="3411" data-track="click" data-track-action="figure anchor" data-track-label="link" href="#Fig2"><span data-dcnode-id="3412" instrument_node="">Fig. 2</span></a><span data-dcnode-id="3410" instrument_node=""> (lower panel). A sample volume of approximately 300 mL is drawn from the top of the sample collector, corresponding to air from 1.2–1.5 L volumetric lung depth (the dead space in the mouthpiece, flow meter and four-way valve, including anatomical dead space is estimated to 300 mL).</span></p><h3 class="c-article__sub-heading" data-dcnode-id="3407" id="Sec8"><span data-dcnode-id="3408" instrument_node="">Particle loss model</span></h3><p data-dcnode-id="3384"><span data-dcnode-id="3406" instrument_node="">The particle recovery, </span><i data-dcnode-id="3404"><span data-dcnode-id="3405" instrument_node="">R</span></i><span data-dcnode-id="3403" instrument_node="">, is determined from the particle concentrations in the volumes for inhaled and exhaled aerosol (</span><i data-dcnode-id="3401"><span data-dcnode-id="3402" instrument_node="">C</span></i><sub data-dcnode-id="3398"><i data-dcnode-id="3399"><span data-dcnode-id="3400" instrument_node="">reservoir</span></i></sub><span data-dcnode-id="3397" instrument_node="">, and </span><i data-dcnode-id="3395"><span data-dcnode-id="3396" instrument_node="">C</span></i><sub data-dcnode-id="3392"><i data-dcnode-id="3393"><span data-dcnode-id="3394" instrument_node="">sample</span></i></sub><span data-dcnode-id="3391" instrument_node="">, respectively) with a correction for the penetration efficiency of particles in the mouthpiece, tubing and valves of the instrument expressed as </span><i data-dcnode-id="3389"><span data-dcnode-id="3390" instrument_node="">R</span></i><sub data-dcnode-id="3386"><i data-dcnode-id="3387"><span data-dcnode-id="3388" instrument_node="">instrument</span></i></sub><span data-dcnode-id="3385" instrument_node="">:</span></p><div class="c-article-equation" data-dcnode-id="3381" id="Equ2"><div class="c-article-equation__content" data-dcnode-id="3382"><img alt="" class="u-display-block" data-dcnode-id="3383" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//media.springernature.com/lw223/springer-static/image/art%253A10.1038/srep36147/MediaObjects/41598_2016_Article_BFsrep36147_Equ1_HTML.gif&amp;raw"></div></div><p data-dcnode-id="3370"><span data-dcnode-id="3380" instrument_node="">A semi-empirical model was constructed to correct for penetration efficiency of particles in the instrument. Because of the used particle size range, it was assumed that particle losses were due to diffusion. Diffusional losses deplete aerosol particle concentrations exponentially as a function of diffusion rate, container geometry and time. Loss of particles in the inhalation apparatus was measured by simulated breathing manoeuvres with a 3 L calibration syringe. The flow-rate was varied between 0.14 and 4.58 L/s. To minimize particle losses in the syringe the “breath-holding” period (III-IV in </span><a data-dcnode-id="3378" data-track="click" data-track-action="figure anchor" data-track-label="link" href="#Fig2"><span data-dcnode-id="3379" instrument_node="">Fig. 2</span></a><span data-dcnode-id="3377" instrument_node="">) was set to 200 ms. The measured particle recovery after passage through the system, expressed as </span><i data-dcnode-id="3375"><span data-dcnode-id="3376" instrument_node="">R</span></i><sub data-dcnode-id="3372"><i data-dcnode-id="3373"><span data-dcnode-id="3374" instrument_node="">instrument</span></i></sub><span data-dcnode-id="3371" instrument_node="">, was fitted to an empirical equation describing measured particle losses in the apparatus as a function of passage time and particle size.</span></p><div class="c-article-equation" data-dcnode-id="3367" id="Equ1"><div class="c-article-equation__content" data-dcnode-id="3368"><img alt="" class="u-display-block" data-dcnode-id="3369" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//media.springernature.com/lw288/springer-static/image/art%253A10.1038/srep36147/MediaObjects/41598_2016_Article_BFsrep36147_Equ2_HTML.gif&amp;raw"></div></div><p data-dcnode-id="3351"><i data-dcnode-id="3365"><span data-dcnode-id="3366" instrument_node="">D</span></i><span data-dcnode-id="3364" instrument_node=""> is the particle size dependent diffusion coefficient, A and b are empirical fitting parameters. The passage time, </span><i data-dcnode-id="3362"><span data-dcnode-id="3363" instrument_node="">t</span></i><sub data-dcnode-id="3359"><i data-dcnode-id="3360"><span data-dcnode-id="3361" instrument_node="">instrument</span></i></sub><span data-dcnode-id="3358" instrument_node="">, was derived from the individual breathing patterns when correcting </span><i data-dcnode-id="3356"><span data-dcnode-id="3357" instrument_node="">R</span></i><span data-dcnode-id="3355" instrument_node=""> for individual particle losses during inhalation and exhalation, V</span><sub data-dcnode-id="3353"><span data-dcnode-id="3354" instrument_node="">i</span></sub><span data-dcnode-id="3352" instrument_node=""> is the end-inspiratory lung volume, also derived from the individual breathing pattern.</span></p><h3 class="c-article__sub-heading" data-dcnode-id="3349" id="Sec9"><span data-dcnode-id="3350" instrument_node="">Subjects</span></h3><p data-dcnode-id="3318"><span data-dcnode-id="3348" instrument_node="">The system was evaluated for seven healthy, never-smoking volunteers, five males and two females, aged 20–34 years. Lung function, including measurement of vital capacity (VC), forced expiratory volume in one second (FEV</span><sub data-dcnode-id="3346"><span data-dcnode-id="3347" instrument_node="">1</span></sub><span data-dcnode-id="3345" instrument_node="">) and D</span><sub data-dcnode-id="3343"><span data-dcnode-id="3344" instrument_node="">L,CO</span></sub><span data-dcnode-id="3342" instrument_node="">, was measured according to current recommendations and the FEV</span><sub data-dcnode-id="3340"><span data-dcnode-id="3341" instrument_node="">1</span></sub><span data-dcnode-id="3339" instrument_node="">/VC ratio was calculated (MasterScreen PFT, Viasys GmbH-Erich Jaeger, Hoechberg, Germany)</span><sup data-dcnode-id="3336"><a aria-label="Reference 12" data-dcnode-id="3337" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR12" id="ref-link-section-d180411273e634" title="Macintyre, N. et al. Standardisation of the single-breath determination of carbon monoxide uptake in the lung. Eur Respir J 26, 720–735, doi: 10.1183/09031936.05.00034905 (2005)."><span data-dcnode-id="3338" instrument_node="">12</span></a></sup><span data-dcnode-id="3335" instrument_node="">. All subjects had normal spirometry and D</span><sub data-dcnode-id="3333"><span data-dcnode-id="3334" instrument_node="">L,CO</span></sub><span data-dcnode-id="3332" instrument_node="">. FEV</span><sub data-dcnode-id="3330"><span data-dcnode-id="3331" instrument_node="">1</span></sub><span data-dcnode-id="3329" instrument_node="">, VC, FEV</span><sub data-dcnode-id="3327"><span data-dcnode-id="3328" instrument_node="">1</span></sub><span data-dcnode-id="3326" instrument_node="">/VC and D</span><sub data-dcnode-id="3324"><span data-dcnode-id="3325" instrument_node="">L,CO</span></sub><span data-dcnode-id="3323" instrument_node=""> were 108 ± 10, 113 ± 11, 97 ± 3 and 91 ± 13% of predicted values</span><sup data-dcnode-id="3320"><a aria-label="Reference 13" data-dcnode-id="3321" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR13" id="ref-link-section-d180411273e647" title="Quanjer, P. H. et al. [Lung volumes and forced ventilatory flows. Work Group on Standardization of Respiratory Function Tests. European Community for Coal and Steel. Official position of the European Respiratory Society]. Rev Mal Respir 11 Suppl 3, 5–40 (1994)."><span data-dcnode-id="3322" instrument_node="">13</span></a></sup><span data-dcnode-id="3319" instrument_node="">, respectively. The study was approved by the Regional Ethical Review Board at Lund and performed in accordance with the Declaration of Helsinki. Informed written consent was obtained from all subjects.</span></p><h3 class="c-article__sub-heading" data-dcnode-id="3316" id="Sec10"><span data-dcnode-id="3317" instrument_node="">Experimental design</span></h3><p data-dcnode-id="3308"><span data-dcnode-id="3315" instrument_node="">The sensitivity of the instrument was characterized for particle size, particle concentration, and breath-holding time on seven young, healthy subjects. The particle sizes used were 22 nm, 50 nm, 75 nm and 100 nm. Tested breath-holding times were 3 s, 5 s, 7 s, 10 s, 15 s and 20 s. At least 3 measurements were carried out on each subject for each particle size and breath-holding time. To examine the sensitivity to alterations in flow-rate, measurements were performed on one subject with varying time for exhalation. During these measurements the inhalation of aerosol was made as a standard measurement, inhalation to FVC, but the exhalation flow rate was altered between 1.2–10.6 L/s which is covering the expected range of flow-rates for most subjects. To examine the sensitivity to inhaled particle concentration, measurements were carried out on one subject with particle concentrations varied from 1000 to 10 000 cm</span><sup data-dcnode-id="3313"><span data-dcnode-id="3314" instrument_node="">−3</span></sup><span data-dcnode-id="3312" instrument_node="">. The instrument was also characterized for inter-subject variability by comparing the measurements for the seven subjects. The stability over time was also evaluated from repeated measurements over a one year period on one subject. The inhaled particle concentration varied between 3000 and 6000 cm</span><sup data-dcnode-id="3310"><span data-dcnode-id="3311" instrument_node="">−3</span></sup><span data-dcnode-id="3309" instrument_node=""> for different particle sizes and measurement occasions during the experiments.</span></p><h3 class="c-article__sub-heading" data-dcnode-id="3306" id="Sec11"><span data-dcnode-id="3307" instrument_node="">Model calculation of recovery</span></h3><p data-dcnode-id="3300"><span data-dcnode-id="3305" instrument_node="">The accuracy of the measurements was evaluated by comparison with estimated results from the Multiple-Path Particle Dosimetry model (MPPD V2.1, Applied Research Associates Inc., Albuquerque, N.M, US, 2009). The model is constructed for tidal breathing patterns at constant exposure and could thus not fully replicate the procedure used in the measurements. A breathing pattern with 2.5 s inhalation and expiration times, a 10 s breath hold and tidal volume of 4500 mL was used. The Yeh-Shum 5-lobe lung model</span><sup data-dcnode-id="3302"><a aria-label="Reference 14" data-dcnode-id="3303" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR14" id="ref-link-section-d180411273e671" title="Yeh, H. C. &amp; Schum, G. M. Models of Human-Lung Airways and Their Application to Inhaled Particle Deposition. Bulletin of Mathematical Biology 42, 461–480, doi: Doi 10.1007/Bf02460796 (1980)."><span data-dcnode-id="3304" instrument_node="">14</span></a></sup><span data-dcnode-id="3301" instrument_node=""> was chosen for the calculations.</span></p></div></div></section><section data-dcnode-id="3066" data-title="Results"><div class="c-article-section" data-dcnode-id="3067" id="Sec12-section"><h2 class="c-article-section__title js-section-title js-c-reading-companion-sections-item" data-dcnode-id="3295" id="Sec12"><span data-dcnode-id="3296" instrument_node="">Results</span></h2><div class="c-article-section__content" data-dcnode-id="3068" id="Sec12-content"><h3 class="c-article__sub-heading" data-dcnode-id="3293" id="Sec13"><span data-dcnode-id="3294" instrument_node="">Sensitivity to particle size, breath-holding time, and particle concentration</span></h3><p data-dcnode-id="3279"><span data-dcnode-id="3292" instrument_node="">Particle recovery, </span><i data-dcnode-id="3290"><span data-dcnode-id="3291" instrument_node="">R</span></i><span data-dcnode-id="3289" instrument_node="">, for various particle sizes and breath-holding times for one subject is shown in </span><a data-dcnode-id="3287" data-track="click" data-track-action="figure anchor" data-track-label="link" href="#Fig3"><span data-dcnode-id="3288" instrument_node="">Fig. 3</span></a><span data-dcnode-id="3286" instrument_node="">. As expected from the theory of Brownian diffusion, </span><i data-dcnode-id="3284"><span data-dcnode-id="3285" instrument_node="">R</span></i><span data-dcnode-id="3283" instrument_node=""> decreased with increasing breath-holding time and decreasing particle size. For 22 nm particles </span><i data-dcnode-id="3281"><span data-dcnode-id="3282" instrument_node="">R</span></i><span data-dcnode-id="3280" instrument_node=""> was close to zero and therefore the effects of breath-holding time were difficult to observe.</span></p><div class="c-article-section__figure js-c-reading-companion-figures-item" data-container-section="figure" data-dcnode-id="3253" data-test="figure" data-title="Figure 3" id="figure-3"><figure data-dcnode-id="3254"><figcaption data-dcnode-id="3276"><b class="c-article-section__figure-caption" data-dcnode-id="3277" data-test="figure-caption-text" id="Fig3"><span data-dcnode-id="3278" instrument_node="">Figure 3</span></b></figcaption><div class="c-article-section__figure-content" data-dcnode-id="3265"><div class="c-article-section__figure-item" data-dcnode-id="3271"><a class="c-article-section__figure-link" data-dcnode-id="3272" data-test="img-link" data-track="click" data-track-action="view figure" data-track-label="image" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.nature.com/articles/srep36147/figures/3" rel="nofollow"><picture data-dcnode-id="3273"><source data-dcnode-id="3275" srcset="//media.springernature.com/lw685/springer-static/image/art%3A10.1038%2Fsrep36147/MediaObjects/41598_2016_Article_BFsrep36147_Fig3_HTML.jpg?as=webp" type="image/webp"><img alt="figure 3" aria-describedby="Fig3" data-dcnode-id="3274" height="470" loading="lazy" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//media.springernature.com/lw685/springer-static/image/art%253A10.1038/srep36147/MediaObjects/41598_2016_Article_BFsrep36147_Fig3_HTML.jpg&amp;raw" width="675"></picture></a></div><div class="c-article-section__figure-description" data-dcnode-id="3266" data-test="bottom-caption" id="figure-3-desc"><p data-dcnode-id="3269"><span data-dcnode-id="3270" instrument_node="">The recovery, R, for three particle sizes at varying breath-holding times.</span></p><p data-dcnode-id="3267"><span data-dcnode-id="3268" instrument_node="">Data are for one subject. Standard deviations show variations between three or more measurements (most of the error bars are too small to be visible on this scale).</span></p></div></div><div class="u-text-right u-hide-print" data-dcnode-id="3255"><a aria-label="Full size image figure 3" class="c-article__pill-button" data-dcnode-id="3256" data-test="article-link" data-track="click" data-track-action="view figure" data-track-dest="link:Figure3 Full size image" data-track-label="button" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.nature.com/articles/srep36147/figures/3" rel="nofollow"><span data-dcnode-id="3263"><span data-dcnode-id="3264" instrument_node="">Full size image</span></span><svg aria-hidden="true" class="u-icon" data-dcnode-id="3257" focusable="false" height="16" role="img" width="16"><use data-dcnode-id="3258" xlink:href="#global-icon-chevron-right" xmlns:xlink="http://www.w3.org/1999/xlink"><svg data-dcnode-id="3259" id="global-icon-chevron-right" viewBox="0 0 16 16"></svg></use></svg><span data-dcnode-id="3262" instrument_node="">
</span><path d="M7.782 7L5.3 4.518c-.393-.392-.4-1.022-.02-1.403a1.001 1.001 0 011.417 0l4.176 4.177a1.001 1.001 0 010 1.416l-4.176 4.177a.991.991 0 01-1.4.016 1 1 0 01.003-1.42L7.782 9l1.013-.998z" data-dcnode-id="3261" fill-rule="evenodd"></path><span data-dcnode-id="3260" instrument_node="">
</span></a></div></figure></div><p data-dcnode-id="3233"><span data-dcnode-id="3252" instrument_node="">The precision of the measured </span><i data-dcnode-id="3250"><span data-dcnode-id="3251" instrument_node="">R</span></i><span data-dcnode-id="3249" instrument_node=""> was assessed from the variability during repeated measurements. The standard deviation of </span><i data-dcnode-id="3247"><span data-dcnode-id="3248" instrument_node="">R</span></i><span data-dcnode-id="3246" instrument_node=""> for repeated measurements with the instrument was typically within 0.002–0.008, which is small compared to the total variation of </span><i data-dcnode-id="3244"><span data-dcnode-id="3245" instrument_node="">R</span></i><span data-dcnode-id="3243" instrument_node=""> that ranges between 0–0.65 for the seven subjects. Further, the stability over time was evaluated for one subject inhaling 50 nm particles with a 10 s breath-hold at 15 different occasions during a one year period. </span><i data-dcnode-id="3241"><span data-dcnode-id="3242" instrument_node="">R</span></i><span data-dcnode-id="3240" instrument_node=""> for these measurements was 0.0538 ± 0.003, which indicates a high consistency of the data. It was also verified that variations in particle concentration (within concentration span from 1000–10000 cm</span><sup data-dcnode-id="3238"><span data-dcnode-id="3239" instrument_node="">−3</span></sup><span data-dcnode-id="3237" instrument_node="">) in the reservoir for inhaled air did not alter the measured </span><i data-dcnode-id="3235"><span data-dcnode-id="3236" instrument_node="">R</span></i><span data-dcnode-id="3234" instrument_node=""> as long as the concentration was stable during the measurement period.</span></p><h3 class="c-article__sub-heading" data-dcnode-id="3231" id="Sec14"><span data-dcnode-id="3232" instrument_node="">Sensitivity to aerosol flow-rate</span></h3><p data-dcnode-id="3214"><span data-dcnode-id="3230" instrument_node="">Measurements were made on the same subject at different flow-rates for two breath-holding times (</span><a data-dcnode-id="3228" data-track="click" data-track-action="figure anchor" data-track-label="link" href="#Fig4"><span data-dcnode-id="3229" instrument_node="">Figs 4</span></a><span data-dcnode-id="3227" instrument_node=""> and </span><a data-dcnode-id="3225" data-track="click" data-track-action="figure anchor" data-track-label="link" href="#Fig5"><span data-dcnode-id="3226" instrument_node="">5</span></a><span data-dcnode-id="3224" instrument_node="">). The residence time in the lungs was defined as the time from when half of the test aerosol was inhaled to the midpoint time of the exhaled sample. As seen in </span><a data-dcnode-id="3222" data-track="click" data-track-action="figure anchor" data-track-label="link" href="#Fig4"><span data-dcnode-id="3223" instrument_node="">Figs 4</span></a><span data-dcnode-id="3221" instrument_node=""> and </span><a data-dcnode-id="3219" data-track="click" data-track-action="figure anchor" data-track-label="link" href="#Fig5"><span data-dcnode-id="3220" instrument_node="">5</span></a><span data-dcnode-id="3218" instrument_node="">, the main determinant of the observed recovery, </span><i data-dcnode-id="3216"><span data-dcnode-id="3217" instrument_node="">R</span></i><span data-dcnode-id="3215" instrument_node="">, is the residence time in the lungs (Pearson´s correlation coefficient = 0.94). Flow-rate does not strongly influence the results.</span></p><div class="c-article-section__figure js-c-reading-companion-figures-item" data-container-section="figure" data-dcnode-id="3188" data-test="figure" data-title="Figure 4" id="figure-4"><figure data-dcnode-id="3189"><figcaption data-dcnode-id="3211"><b class="c-article-section__figure-caption" data-dcnode-id="3212" data-test="figure-caption-text" id="Fig4"><span data-dcnode-id="3213" instrument_node="">Figure 4</span></b></figcaption><div class="c-article-section__figure-content" data-dcnode-id="3200"><div class="c-article-section__figure-item" data-dcnode-id="3206"><a class="c-article-section__figure-link" data-dcnode-id="3207" data-test="img-link" data-track="click" data-track-action="view figure" data-track-label="image" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.nature.com/articles/srep36147/figures/4" rel="nofollow"><picture data-dcnode-id="3208"><source data-dcnode-id="3210" srcset="//media.springernature.com/lw685/springer-static/image/art%3A10.1038%2Fsrep36147/MediaObjects/41598_2016_Article_BFsrep36147_Fig4_HTML.jpg?as=webp" type="image/webp"><img alt="figure 4" aria-describedby="Fig4" data-dcnode-id="3209" height="409" loading="lazy" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//media.springernature.com/lw685/springer-static/image/art%253A10.1038/srep36147/MediaObjects/41598_2016_Article_BFsrep36147_Fig4_HTML.jpg&amp;raw" width="675"></picture></a></div><div class="c-article-section__figure-description" data-dcnode-id="3201" data-test="bottom-caption" id="figure-4-desc"><p data-dcnode-id="3204"><span data-dcnode-id="3205" instrument_node="">Observed recovery for 50 nm particles with different flow rates (1.2–10.6 L/s) at 7 s and 10 s breath-holding times, plotted as a function of total residence time.</span></p><p data-dcnode-id="3202"><span data-dcnode-id="3203" instrument_node="">The data shows that there is correlation between recovery and total residence time (Pearson’s correlation coefficient = 0.94).</span></p></div></div><div class="u-text-right u-hide-print" data-dcnode-id="3190"><a aria-label="Full size image figure 4" class="c-article__pill-button" data-dcnode-id="3191" data-test="article-link" data-track="click" data-track-action="view figure" data-track-dest="link:Figure4 Full size image" data-track-label="button" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.nature.com/articles/srep36147/figures/4" rel="nofollow"><span data-dcnode-id="3198"><span data-dcnode-id="3199" instrument_node="">Full size image</span></span><svg aria-hidden="true" class="u-icon" data-dcnode-id="3192" focusable="false" height="16" role="img" width="16"><use data-dcnode-id="3193" xlink:href="#global-icon-chevron-right" xmlns:xlink="http://www.w3.org/1999/xlink"><svg data-dcnode-id="3194" id="global-icon-chevron-right" viewBox="0 0 16 16"></svg></use></svg><span data-dcnode-id="3197" instrument_node="">

a><span data-dcnode-id="3176" instrument_node="">), plotted as a function of flow-rate.</span></p><p data-dcnode-id="3173"><span data-dcnode-id="3174" instrument_node="">No correlation was found between flow-rate and recovery.</span></p></div></div><div class="u-text-right u-hide-print" data-dcnode-id="3161"><a aria-label="Full size image figure 5" class="c-article__pill-button" data-dcnode-id="3162" data-test="article-link" data-track="click" data-track-action="view figure" data-track-dest="link:Figure5 Full size image" data-track-label="button" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.nature.com/articles/srep36147/figures/5" rel="nofollow"><span data-dcnode-id="3169"><span data-dcnode-id="3170" instrument_node="">Full size image</span></span><svg aria-hidden="true" class="u-icon" data-dcnode-id="3163" focusable="false" height="16" role="img" width="16"><use data-dcnode-id="3164" xlink:href="#global-icon-chevron-right" xmlns:xlink="http://www.w3.org/1999/xlink"><svg data-dcnode-id="3165" id="global-icon-chevron-right" viewBox="0 0 16 16"></svg></use></svg><span data-dcnode-id="3168" instrument_node="">
</span><path d="M7.782 7L5.3 4.518c-.393-.392-.4-1.022-.02-1.403a1.001 1.001 0 011.417 0l4.176 4.177a1.001 1.001 0 010 1.416l-4.176 4.177a.991.991 0 01-1.4.016 1 1 0 01.003-1.42L7.782 9l1.013-.998z" data-dcnode-id="3167" fill-rule="evenodd"></path><span data-dcnode-id="3166" instrument_node="">
</span></a></div></figure></div><h3 class="c-article__sub-heading" data-dcnode-id="3157" id="Sec15"><span data-dcnode-id="3158" instrument_node="">Inter-subject variability and comparison with modelling</span></h3><p data-dcnode-id="3146"><span data-dcnode-id="3156" instrument_node="">The measured particle recovery for seven subjects breathing 50, 75 and 100 nm particles are shown in </span><a data-dcnode-id="3154" data-track="click" data-track-action="figure anchor" data-track-label="link" href="#Fig6"><span data-dcnode-id="3155" instrument_node="">Fig. 6</span></a><span data-dcnode-id="3153" instrument_node="">. The recovery was time normalized to 10 s residence time in the lungs by curve fitting. Values ranged between 0.012 and 0.068 for 50 nm particles, 0.06–0.24, for 75 nm particles and 0.14–0.44 for 100 nm particles. Standard deviations were on average 0.0022, 0.0080 and 0.0088 for the three particle sizes, respectively, at 10 s breath holding time. Thus, although the investigated group was homogenous (i.e. healthy and aged 20–35 yrs), the inter-subject variability was 26–50 times larger than the measurement precision, evaluated as the standard deviation for repeated measurements. Some subjects had a slightly higher standard deviation for repeated measurements, up to maximum 0.011. This was probably due to inconsistency when following the breathing protocol. As shown in </span><a data-dcnode-id="3151" data-track="click" data-track-action="figure anchor" data-track-label="link" href="#Fig6"><span data-dcnode-id="3152" instrument_node="">Fig. 6</span></a><span data-dcnode-id="3150" instrument_node="">, the </span><i data-dcnode-id="3148"><span data-dcnode-id="3149" instrument_node="">R</span></i><span data-dcnode-id="3147" instrument_node=""> values calculated with the MPPD model were in general agreement with the measurements. However, it was not possible to adjust the MPPD model to fully mimic the measurements and therefore the comparison could only provide an indication on the accuracy of the experiments, compared to the average for the 7 subjects.</span></p><div class="c-article-section__figure js-c-reading-companion-figures-item" data-container-section="figure" data-dcnode-id="3120" data-test="figure" data-title="Figure 6" id="figure-6"><figure data-dcnode-id="3121"><figcaption data-dcnode-id="3143"><b class="c-article-section__figure-caption" data-dcnode-id="3144" data-test="figure-caption-text" id="Fig6"><span data-dcnode-id="3145" instrument_node="">Figure 6</span></b></figcaption><div class="c-article-section__figure-content" data-dcnode-id="3132"><div class="c-article-section__figure-item" data-dcnode-id="3138"><a class="c-article-section__figure-link" data-dcnode-id="3139" data-test="img-link" data-track="click" data-track-action="view figure" data-track-label="image" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.nature.com/articles/srep36147/figures/6" rel="nofollow"><picture data-dcnode-id="3140"><source data-dcnode-id="3142" srcset="//media.springernature.com/lw685/springer-static/image/art%3A10.1038%2Fsrep36147/MediaObjects/41598_2016_Article_BFsrep36147_Fig6_HTML.jpg?as=webp" type="image/webp"><img alt="figure 6" aria-describedby="Fig6" data-dcnode-id="3141" height="448" loading="lazy" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//media.springernature.com/lw685/springer-static/image/art%253A10.1038/srep36147/MediaObjects/41598_2016_Article_BFsrep36147_Fig6_HTML.jpg&amp;raw" width="675"></picture></a></div><div class="c-article-section__figure-description" data-dcnode-id="3133" data-test="bottom-caption" id="figure-6-desc"><p data-dcnode-id="3136"><span data-dcnode-id="3137" instrument_node="">Particle recovery (R) for seven subjects, normalized to 10 s residence time in the lung, compared to calculation with the MPPD model.</span></p><p data-dcnode-id="3134"><span data-dcnode-id="3135" instrument_node="">The variability between the subjects is 26–50 times larger than the measurement precision.</span></p></div></div><div class="u-text-right u-hide-print" data-dcnode-id="3122"><a aria-label="Full size image figure 6" class="c-article__pill-button" data-dcnode-id="3123" data-test="article-link" data-track="click" data-track-action="view figure" data-track-dest="link:Figure6 Full size image" data-track-label="button" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.nature.com/articles/srep36147/figures/6" rel="nofollow"><span data-dcnode-id="3130"><span data-dcnode-id="3131" instrument_node="">Full size image</span></span><svg aria-hidden="true" class="u-icon" data-dcnode-id="3124" focusable="false" height="16" role="img" width="16"><use data-dcnode-id="3125" xlink:href="#global-icon-chevron-right" xmlns:xlink="http://www.w3.org/1999/xlink"><svg data-dcnode-id="3126" id="global-icon-chevron-right" viewBox="0 0 16 16"></svg></use></svg><span data-dcnode-id="3129" instrument_node="">
</span><path d="M7.782 7L5.3 4.518c-.393-.392-.4-1.022-.02-1.403a1.001 1.001 0 011.417 0l4.176 4.177a1.001 1.001 0 010 1.416l-4.176 4.177a.991.991 0 01-1.4.016 1 1 0 01.003-1.42L7.782 9l1.013-.998z" data-dcnode-id="3128" fill-rule="evenodd"></path><span data-dcnode-id="3127" instrument_node="">
</span></a></div></figure></div><h3 class="c-article__sub-heading" data-dcnode-id="3118" id="Sec16"><span data-dcnode-id="3119" instrument_node="">Particle loss model</span></h3><p data-dcnode-id="3101"><span data-dcnode-id="3117" instrument_node="">The measured and modelled particle penetration efficiencies through the instrument, reported as recovery, </span><i data-dcnode-id="3115"><span data-dcnode-id="3116" instrument_node="">R</span></i><sub data-dcnode-id="3112"><i data-dcnode-id="3113"><span data-dcnode-id="3114" instrument_node="">instrument</span></i></sub><span data-dcnode-id="3111" instrument_node="">, are illustrated in </span><a data-dcnode-id="3109" data-track="click" data-track-action="figure anchor" data-track-label="link" href="#Fig7"><span data-dcnode-id="3110" instrument_node="">Fig. 7</span></a><span data-dcnode-id="3108" instrument_node="">. </span><i data-dcnode-id="3106"><span data-dcnode-id="3107" instrument_node="">R</span></i><sub data-dcnode-id="3103"><i data-dcnode-id="3104"><span data-dcnode-id="3105" instrument_node="">instrument</span></i></sub><span data-dcnode-id="3102" instrument_node=""> varied from 0.948 for 100 nm particles at short residence times to 0.0781 for 22 nm particles with long residence times. Recovery measurements for 22 nm particles are uncertain, since losses in the instrument at residence times exceeding a few seconds are above 90%.</span></p><div class="c-article-section__figure js-c-reading-companion-figures-item" data-container-section="figure" data-dcnode-id="3077" data-test="figure" data-title="Figure 7" id="figure-7"><figure data-dcnode-id="3078"><figcaption data-dcnode-id="3098"><b class="c-article-section__figure-caption" data-dcnode-id="3099" data-test="figure-caption-text" id="Fig7"><span data-dcnode-id="3100" instrument_node="">Figure 7</span></b></figcaption><div class="c-article-section__figure-content" data-dcnode-id="3089"><div class="c-article-section__figure-item" data-dcnode-id="3093"><a class="c-article-section__figure-link" data-dcnode-id="3094" data-test="img-link" data-track="click" data-track-action="view figure" data-track-label="image" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.nature.com/articles/srep36147/figures/7" rel="nofollow"><picture data-dcnode-id="3095"><source data-dcnode-id="3097" srcset="//media.springernature.com/lw685/springer-static/image/art%3A10.1038%2Fsrep36147/MediaObjects/41598_2016_Article_BFsrep36147_Fig7_HTML.jpg?as=webp" type="image/webp"><img alt="figure 7" aria-describedby="Fig7" data-dcnode-id="3096" height="636" loading="lazy" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//media.springernature.com/lw685/springer-static/image/art%253A10.1038/srep36147/MediaObjects/41598_2016_Article_BFsrep36147_Fig7_HTML.jpg&amp;raw" width="675"></picture></a></div><div class="c-article-section__figure-description" data-dcnode-id="3090" data-test="bottom-caption" id="figure-7-desc"><p data-dcnode-id="3091"><span data-dcnode-id="3092" instrument_node="">Observed and modelled values for penetration efficiencies, i.e. recovery, in the inhalation system for various particle sizes and flow rates.</span></p></div></div><div class="u-text-right u-hide-print" data-dcnode-id="3079"><a aria-label="Full size image figure 7" class="c-article__pill-button" data-dcnode-id="3080" data-test="article-link" data-track="click" data-track-action="view figure" data-track-dest="link:Figure7 Full size image" data-track-label="button" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.nature.com/articles/srep36147/figures/7" rel="nofollow"><span data-dcnode-id="3087"><span data-dcnode-id="3088" instrument_node="">Full size image</span></span><svg aria-hidden="true" class="u-icon" data-dcnode-id="3081" focusable="false" height="16" role="img" width="16"><use data-dcnode-id="3082" xlink:href="#global-icon-chevron-right" xmlns:xlink="http://www.w3.org/1999/xlink"><svg data-
