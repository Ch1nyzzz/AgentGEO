</span><meta content="Measurement of the effects of drugs, mediators and infectious agents on various models of lung disease, as well as assessment of lung function in the intact mouse has the potential for significantly advancing our knowledge of lung disease. However, the small size of the mouse presents significant challenges for the assessment of lung function. Because of compromises made between precision and noninvasiveness, data obtained may have an uncertain bearing on the mechanical response of the lung. Nevertheless, considerable recent progress has been made in developing valid and useful measures of mouse lung function. These advances, resulting in our current ability to measure sophisticated indices of lung function in laboratory animals, are likely to lead to important insights into the mechanisms of lung disease." data-dcnode-id="5412" name="citation_abstract"><span data-dcnode-id="5411" instrument_node="">

</span><meta content="Measuring the lung function in the mouse: the challenge of size - Respiratory Research" data-dcnode-id="5121" property="og:title"><span data-dcnode-id="5120" instrument_node="">
</span><meta content="Measurement of the effects of drugs, mediators and infectious agents on various models of lung disease, as well as assessment of lung function in the intact mouse has the potential for significantly advancing our knowledge of lung disease. However, the small size of the mouse presents significant challenges for the assessment of lung function. Because of compromises made between precision and noninvasiveness, data obtained may have an uncertain bearing on the mechanical response of the lung. Nevertheless, considerable recent progress has been made in developing valid and useful measures of mouse lung function. These advances, resulting in our current ability to measure sophisticated indices of lung function in laboratory animals, are likely to lead to important insights into the mechanisms of lung disease." data-dcnode-id="5119" property="og:description"><span data-dcnode-id="5118" instrument_node="">

</span><section aria-labelledby="Abs1_195" data-dcnode-id="4528" data-title="Abstract" lang="en"><div class="c-article-section" data-dcnode-id="4529" id="Abs1_195-section"><h2 class="c-article-section__title js-section-title js-c-reading-companion-sections-item" data-dcnode-id="4533" id="Abs1_195"><span data-dcnode-id="4534" instrument_node="">Abstract</span></h2><div class="c-article-section__content" data-dcnode-id="4530" id="Abs1_195-content"><p data-dcnode-id="4531"><span data-dcnode-id="4532" instrument_node="">Measurement of the effects of drugs, mediators and infectious agents on various models of lung disease, as well as assessment of lung function in the intact mouse has the potential for significantly advancing our knowledge of lung disease. However, the small size of the mouse presents significant challenges for the assessment of lung function. Because of compromises made between precision and noninvasiveness, data obtained may have an uncertain bearing on the mechanical response of the lung. Nevertheless, considerable recent progress has been made in developing valid and useful measures of mouse lung function. These advances, resulting in our current ability to measure sophisticated indices of lung function in laboratory animals, are likely to lead to important insights into the mechanisms of lung disease.</span></p></div></div></section><span data-dcnode-id="4527" instrument_node="">
</span><section data-dcnode-id="4476" data-title="Introduction"><div class="c-article-section" data-dcnode-id="4477" id="Sec1_195-section"><h2 class="c-article-section__title js-section-title js-c-reading-companion-sections-item" data-dcnode-id="4525" id="Sec1_195"><span data-dcnode-id="4526" instrument_node="">Introduction</span></h2><div class="c-article-section__content" data-dcnode-id="4478" id="Sec1_195-content"><p data-dcnode-id="4505"><span data-dcnode-id="4524" instrument_node="">Much of our current understanding of the normal functioning of the lung and mechanisms of lung disease comes from studies utilizing animals. As one clear example, animal systems of a wide variety of species, including humans, provided the essential mechanistic proof of a link between inflammation and airways hyperresponsiveness that set the stage for current anti-inflammatory therapy [</span><a aria-label="Reference 1" data-dcnode-id="4522" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR1_195" id="ref-link-section-d239179398e616" title="Wanner A, Abraham WM, Douglas JS, Drazen JM, Richerson HB, Sri RJ: Models of airway hyperresponsiveness.
Am Rev Respir Dis 1990, 141:253–257."><span data-dcnode-id="4523" instrument_node="">1</span></a><span data-dcnode-id="4521" instrument_node="">]. Mice are now widely employed in lung research because of certain advantages this species is thought to provide [</span><a aria-label="Reference 2" data-dcnode-id="4519" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR2_195" id="ref-link-section-d239179398e619" title="Tu Y-P, Larsen GL, Irvin CG: Utility of murine systems to study asthma pathogenesis.
Eur Respir Rev 1995, 29:224–230."><span data-dcnode-id="4520" instrument_node="">2</span></a><span data-dcnode-id="4518" instrument_node="">]. Advantages of using mice include a well-understood immunologic system, the vast array of available reagents, a short reproductive cycle, a well-characterized genome, the advent of transgenic technology, and economic factors [</span><a aria-label="Reference 2" data-dcnode-id="4516" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR2_195" id="ref-link-section-d239179398e622" title="Tu Y-P, Larsen GL, Irvin CG: Utility of murine systems to study asthma pathogenesis.
Eur Respir Rev 1995, 29:224–230."><span data-dcnode-id="4517" instrument_node="">2</span></a><span data-dcnode-id="4515" instrument_node="">–</span><a aria-label="Reference 4" data-dcnode-id="4513" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR4_195" id="ref-link-section-d239179398e625" title="Gelfand E: Pro: mice are a good model of human airway disease.
Am J Resp Crit Care Med 2002, 166:5–8."><span data-dcnode-id="4514" instrument_node="">4</span></a><span data-dcnode-id="4512" instrument_node="">]. Using mice as models of human disease, in particular asthma, has certain shortcomings [</span><a aria-label="Reference 2" data-dcnode-id="4510" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR2_195" id="ref-link-section-d239179398e628" title="Tu Y-P, Larsen GL, Irvin CG: Utility of murine systems to study asthma pathogenesis.
Eur Respir Rev 1995, 29:224–230."><span data-dcnode-id="4511" instrument_node="">2</span></a><span data-dcnode-id="4509" instrument_node="">, </span><a aria-label="Reference 5" data-dcnode-id="4507" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR5_195" id="ref-link-section-d239179398e632" title="Persson CG: Con: mice are not a good model of human airway disease.
Am J Resp Crit Care Med 2002, 166:6–8."><span data-dcnode-id="4508" instrument_node="">5</span></a><span data-dcnode-id="4506" instrument_node="">] only some of which will be covered in this review. For any animal system to yield useful and valid insights into disease it must exhibit an appropriate phenotype. It has become apparent that the valid assessment of lung function in an animal as small as the mouse requires that a number of technical challenges be overcome.</span></p><p data-dcnode-id="4479"><span data-dcnode-id="4504" instrument_node="">The paucity of information on the measurement of lung function in the mouse has largely reflected the difficulty of measuring the necessary respiratory signals of flow, volume and transpulmonary pressure. This applies particularly to the small gas flows involved [</span><a aria-label="Reference 6" data-dcnode-id="4502" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR6_195" id="ref-link-section-d239179398e638" title="Schuessler TF, Bates JHT: A computer-controlled research ventilator for small animals: design and evaluation.
IEEE Trans Biomed Eng 1995, 42:860–866."><span data-dcnode-id="4503" instrument_node="">6</span></a><span data-dcnode-id="4501" instrument_node="">, </span><a aria-label="Reference 7" data-dcnode-id="4499" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR7_195" id="ref-link-section-d239179398e641" title="Lundblad KAL, Irvin CG, Adler A, Bates JHT: A reevaluation of the validity of unrestrained plethysmography in mice.
J Appl Physiol 2002, 93:1198–1207."><span data-dcnode-id="4500" instrument_node="">7</span></a><span data-dcnode-id="4498" instrument_node="">]. However, the work of Martin </span><i data-dcnode-id="4496"><span data-dcnode-id="4497" instrument_node="">et al</span></i><span data-dcnode-id="4495" instrument_node=""> in 1988 demonstrated that measurements of pulmonary resistance and compliance could be made in this small species [</span><a aria-label="Reference 8" data-dcnode-id="4493" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR8_195" id="ref-link-section-d239179398e647" title="Martin TR, Gerard NP, Galli SJ, Drazen JM: Pulmonary responses to bronchostrictor agonists in the mouse.
J Appl Physiol 1988, 64:2318–2323."><span data-dcnode-id="4494" instrument_node="">8</span></a><span data-dcnode-id="4492" instrument_node="">]. At about the same time, Levitt and Mitzner clearly illustrated the utility of using mice to explore the genetics of hyperresponsiveness [</span><a aria-label="Reference 9" data-dcnode-id="4490" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR9_195" id="ref-link-section-d239179398e650" title="Levitt RC, Mitzner W: Expression of airway hyperreactivity to acetylcholine as a simple autosomal recessive trait.
FASEB J 1998, 2:2605–2608."><span data-dcnode-id="4491" instrument_node="">9</span></a><span data-dcnode-id="4489" instrument_node="">, </span><a aria-label="Reference 10" data-dcnode-id="4487" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR10_195" id="ref-link-section-d239179398e654" title="Levitt RC, Mitzner W: Autosomal recessive inheritance of airway hyperreactivity to 5-hydroxytryptamine.
J Appl Physiol 1998, 67:1125–1132."><span data-dcnode-id="4488" instrument_node="">10</span></a><span data-dcnode-id="4486" instrument_node="">]. Since these studies, the use of mice to study lung disease has increased dramatically and a number of approaches have been developed in the ensuing years for measuring lung function in mice </span><i data-dcnode-id="4484"><span data-dcnode-id="4485" instrument_node="">in vivo</span></i><span data-dcnode-id="4483" instrument_node="">. In this review we examine these various methods and discuss their respective attributes. Each approach represents a compromise between accuracy, non-invasiveness, and convenience [</span><a aria-label="Reference 11" data-dcnode-id="4481" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR11_195" id="ref-link-section-d239179398e660" title="Bates JHT, Irvin CG: Measuring Lung Function in Mice: The Phenotyping Uncertainty Principle.
J Appl Physiol 2003, 94:1297–1306."><span data-dcnode-id="4482" instrument_node="">11</span></a><span data-dcnode-id="4480" instrument_node="">].</span></p></div></div></section><section data-dcnode-id="4414" data-title="Lung anatomy"><div class="c-article-section" data-dcnode-id="4415" id="Sec2_195-section"><h2 class="c-article-section__title js-section-title js-c-reading-companion-sections-item" data-dcnode-id="4474" id="Sec2_195"><span data-dcnode-id="4475" instrument_node="">Lung anatomy</span></h2><div class="c-article-section__content" data-dcnode-id="4416" id="Sec2_195-content"><p data-dcnode-id="4442"><span data-dcnode-id="4473" instrument_node="">One look through the microscope at a section of mouse lung (Figure </span><a data-dcnode-id="4471" data-track="click" data-track-action="figure anchor" data-track-label="link" href="#Fig1_195"><span data-dcnode-id="4472" instrument_node="">1</span></a><span data-dcnode-id="4470" instrument_node="">) demonstrates that the mouse lung is considerably different in structure from the human lung, although relatively little has been published about the architecture of the mouse lung compared to other species. What is known about the structure of the mouse lung probably has important bearing on its function [</span><a aria-label="Reference 12" data-dcnode-id="4468" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR12_195" id="ref-link-section-d239179398e674" title="McBride JT: Architecture of the tracheobronchial tree.
In Treatise on Pulmonary Toxicology: Comparative Biology of the Normal Lung
(Edited by: Parent RA). Boca Raton, Florida: CRC Press 1992, 49–61."><span data-dcnode-id="4469" instrument_node="">12</span></a><span data-dcnode-id="4467" instrument_node="">–</span><a aria-label="Reference 14" data-dcnode-id="4465" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR14_195" id="ref-link-section-d239179398e677" title="Gomes RFM, Bates JHT: Geometric determinants of airway resistance in two isomorphic rodent species.
Respir Physiol Neurobiol 2002, 130:317–325."><span data-dcnode-id="4466" instrument_node="">14</span></a><span data-dcnode-id="4464" instrument_node="">]. The total lung capacity (TLC) of the mouse is about 1 ml compared to 10 ml of the rat and 6,000 ml of a human. Like the human, there are 5 lobes in the right mouse lung, but unlike the human the mouse has only a single left lung. Also unlike the human lung, but similar to the rat, the mouse pleura is thin, yet it is strong enough to be inflated to considerably higher pressures than the 30 cm H</span><sub data-dcnode-id="4462"><span data-dcnode-id="4463" instrument_node="">2</span></sub><span data-dcnode-id="4461" instrument_node="">O normally associated with TLC (W Mitzner, personnel communications). The parenchyma of the mouse lung occupies a smaller fraction of the total lung than that of the rat but more than that of the human (mouse: 18%, rat: 24%, human: 12% lung volume). The alveoli of the mouse lung are smaller (80 μm mean linear intercept (MLI)) than those of the rat (MLI 100 μm) or human (MLI 210 μm). The blood-gas barrier thickness in the mouse (0.32 μm) is similar to that of the rat (0.38 μm) but somewhat smaller than that of the human (0.62 μm), which might have important implications for both gas exchange and parenchymal lung mechanics. The airways constitute a large percentage of the lung in mice (11%) compared to rats (5.7%). Cartilage is present in the mouse trachea but is less well organized than in other species; only the upper part of the trachea has the complete rings seen in other mammals and these rapidly change to plates as one proceeds distally. Mouse lungs have fewer respiratory bronchioles and airway generations (13–17 generations) than do human lungs (17–21 generations) with the airways of the mouse lung exhibiting a monopodial as opposed to dichotomous branching pattern. Two other significant features of the mouse lung are the thinness of the respiratory epithelium and the relatively large airway lumen [</span><a aria-label="Reference 12" data-dcnode-id="4459" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR12_195" id="ref-link-section-d239179398e682" title="McBride JT: Architecture of the tracheobronchial tree.
In Treatise on Pulmonary Toxicology: Comparative Biology of the Normal Lung
(Edited by: Parent RA). Boca Raton, Florida: CRC Press 1992, 49–61."><span data-dcnode-id="4460" instrument_node="">12</span></a><span data-dcnode-id="4458" instrument_node="">, </span><a aria-label="Reference 14" data-dcnode-id="4456" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR14_195" id="ref-link-section-d239179398e686" title="Gomes RFM, Bates JHT: Geometric determinants of airway resistance in two isomorphic rodent species.
Respir Physiol Neurobiol 2002, 130:317–325."><span data-dcnode-id="4457" instrument_node="">14</span></a><span data-dcnode-id="4455" instrument_node="">]. This large airway caliber is speculated to reduce the flow-resistive load that would otherwise result from the rapid respiratory rate (250–350 bpm) required by the mouse to maintain body temperature [</span><a aria-label="Reference 15" data-dcnode-id="4453" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR15_195" id="ref-link-section-d239179398e689" title="Bennett FM, Tenney SM: Comparative mechanics of the mammalian respiratory system.
Respir Physiol 1982, 49:131–140."><span data-dcnode-id="4454" instrument_node="">15</span></a><span data-dcnode-id="4452" instrument_node="">]. An important functional difference between mice and rats compared to humans is the paucity, or even complete absence, of submucosal glands and the presence of high numbers of Clara cells [</span><a aria-label="Reference 12" data-dcnode-id="4450" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR12_195" id="ref-link-section-d239179398e692" title="McBride JT: Architecture of the tracheobronchial tree.
In Treatise on Pulmonary Toxicology: Comparative Biology of the Normal Lung
(Edited by: Parent RA). Boca Raton, Florida: CRC Press 1992, 49–61."><span data-dcnode-id="4451" instrument_node="">12</span></a><span data-dcnode-id="4449" instrument_node="">]. Exactly what significance all these anatomical features of the mouse lung have for lung function is speculative, but it has been our experience that the baseline airway resistance of mice that have been sensitized and challenged with antigen differs imperceptibly from that of control animals [</span><a aria-label="Reference 16" data-dcnode-id="4447" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR16_195" id="ref-link-section-d239179398e695" title="Cieslewicz G, Tomkinson A, Adler A, Duez C, Schwarze J, Takeda K, Larson KA, Lee JJ, Irvin CG, Gelfand EW: The late but not the early phase reaction in a murine model of asthma is dependent on IL-5 and tissue eosinophils.
J Clin Invest 1999, 104:301–308."><span data-dcnode-id="4448" instrument_node="">16</span></a><span data-dcnode-id="4446" instrument_node="">, </span><a aria-label="Reference 17" data-dcnode-id="4444" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR17_195" id="ref-link-section-d239179398e698" title="Tomioka S, Bates JHT, Irvin CG: Airway and tissue mechanics in a murine model of asthma: alveolar capsules vs forced oscillations.
J Appl Physiol 2002, 93:263–270."><span data-dcnode-id="4445" instrument_node="">17</span></a><span data-dcnode-id="4443" instrument_node="">]. This suggests that inflammatory processes that could compromise lung function in larger animals (e.g. humans) might have little effect in mice because of their relatively large airway size and/or lack of mucous glands.</span></p><div class="c-article-section__figure js-c-reading-companion-figures-item" data-container-section="figure" data-dcnode-id="4418" data-test="figure" data-title="Figure 1" id="figure-1_195"><figure data-dcnode-id="4419"><figcaption data-dcnode-id="4439"><b class="c-article-section__figure-caption" data-dcnode-id="4440" data-test="figure-caption-text" id="Fig1_195"><span data-dcnode-id="4441" instrument_node="">Figure 1</span></b></figcaption><div class="c-article-section__figure-content" data-dcnode-id="4430"><div class="c-article-section__figure-item" data-dcnode-id="4434"><a class="c-article-section__figure-link" data-dcnode-id="4435" data-test="img-link" data-track="click" data-track-action="view figure" data-track-label="image" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//respiratory-research.biomedcentral.com/articles/10.1186/rr199/figures/1_195" rel="nofollow"><picture data-dcnode-id="4436"><source data-dcnode-id="4438" srcset="//media.springernature.com/lw685/springer-static/image/art%3A10.1186%2Frr199/MediaObjects/12931_2002_195_Fig1_HTML.jpg?as=webp" type="image/webp"><img alt="figure 1_195" aria-describedby="Fig1_195" data-dcnode-id="4437" loading="lazy" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//media.springernature.com/lw685/springer-static/image/art%253A10.1186/rr199/MediaObjects/12931_2002_195_Fig1_HTML.jpg&amp;raw"></picture></a></div><div class="c-article-section__figure-description" data-dcnode-id="4431" data-test="bottom-caption" id="figure-1_195-desc"><p data-dcnode-id="4432"><span data-dcnode-id="4433" instrument_node="">Photomicrograph of the parenchyma and respiratory bronchioles of a mouse (20 gram female BALB/c) lung. Note the rapid branching from a conducting airway into alveolar ducts and the relatively large airways. Stain is H &amp; E with 5 × magnification.</span></p></div></div><div class="u-text-right u-hide-print" data-dcnode-id="4420"><a aria-label="Full size image figure 1_195" class="c-article__pill-button" data-dcnode-id="4421" data-test="article-link" data-track="click" data-track-action="view figure" data-track-dest="link:Figure1_195 Full size image" data-track-label="button" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//respiratory-research.biomedcentral.com/articles/10.1186/rr199/figures/1_195" rel="nofollow"><span data-dcnode-id="4428"><span data-dcnode-id="4429" instrument_node="">Full size image</span></span><svg aria-hidden="true" class="u-icon" data-dcnode-id="4422" focusable="false" height="16" role="img" width="16"><use data-dcnode-id="4423" xlink:href="#global-icon-chevron-right" xmlns:xlink="http://www.w3.org/1999/xlink"><svg data-dcnode-id="4424" id="global-icon-chevron-right" viewBox="0 0 16 16"></svg></use></svg><span data-dcnode-id="4427" instrument_node="">
</span><path d="M7.782 7L5.3 4.518c-.393-.392-.4-1.022-.02-1.403a1.001 1.001 0 011.417 0l4.176 4.177a1.001 1.001 0 010 1.416l-4.176 4.177a.991.991 0 01-1.4.016 1 1 0 01.003-1.42L7.782 9l1.013-.998z" data-dcnode-id="4426" fill-rule="evenodd"></path><span data-dcnode-id="4425" instrument_node="">
</span></a></div></figure></div><span data-dcnode-id="4417" instrument_node="">
</span></div></div></section><section data-dcnode-id="4204" data-title="Basic mechanical models of the lung"><div class="c-article-section" data-dcnode-id="4205" id="Sec3_195-section"><h2 class="c-article-section__title js-section-title js-c-reading-companion-sections-item" data-dcnode-id="4412" id="Sec3_195"><span data-dcnode-id="4413" instrument_node="">Basic mechanical models of the lung</span></h2><div class="c-article-section__content" data-dcnode-id="4206" id="Sec3_195-content"><p data-dcnode-id="4395"><span data-dcnode-id="4411" instrument_node="">Measurement of the function of the lung, especially assessment of lung mechanics, is typically done in the context of a model of the lung [</span><a aria-label="Reference 18" data-dcnode-id="4409" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR18_195" id="ref-link-section-d239179398e727" title="Eidelman DN, Irvin CG: Airway mechanics in Asthma.
In Asthma and Rhinitis 2
(Edited by: Busse WW). Holgate Street: Blackwell Science 2000, 1237–1247."><span data-dcnode-id="4410" instrument_node="">18</span></a><span data-dcnode-id="4408" instrument_node="">–</span><a aria-label="Reference 20" data-dcnode-id="4406" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR20_195" id="ref-link-section-d239179398e730" title="Rodarte JR, Rehder K: Dynamics of respiration.
In Handbook of Physiology. The Respiratory System
(Edited by: Macklem PT, Mead J). Bethesda, MD: American Physiological Society 1986,III(1):131–144."><span data-dcnode-id="4407" instrument_node="">20</span></a><span data-dcnode-id="4405" instrument_node="">]. The simplest model is a tube connected to a bellows (Figure </span><a data-dcnode-id="4403" data-track="click" data-track-action="figure anchor" data-track-label="link" href="#Fig2_195"><span data-dcnode-id="4404" instrument_node="">2A</span></a><span data-dcnode-id="4402" instrument_node="">). This model works well for a single breathing frequency, but has major limitations when the changes in lung mechanics that occur with alterations in breathing frequency are considered. This is because the resistive and elastic properties of the lung are substantially dependent on breathing frequency. For example, the resistance of the lung falls as frequency increases over the range associated with normal breathing [</span><a aria-label="Reference 21" data-dcnode-id="4400" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR21_195" id="ref-link-section-d239179398e736" title="Peslin R, Fredberg JJ: Oscillation mechanics of the respiratory system.
In Handbook of Physiology. The Respiratory System
(Edited by: Macklem PT, Mead J). Bethesda, MD: American Physiological Society 1986,III(1):145–178."><span data-dcnode-id="4401" instrument_node="">21</span></a><span data-dcnode-id="4399" instrument_node="">]. To model this type of mechanical behavior, spring-and-dashpot assemblies capable of simulating viscoelastic behavior need to be included in the model (Figure </span><a data-dcnode-id="4397" data-track="click" data-track-action="figure anchor" data-track-label="link" href="#Fig2_195"><span data-dcnode-id="4398" instrument_node="">2B</span></a><span data-dcnode-id="4396" instrument_node="">). These basic models allow us to develop mathematical expressions, which can be used to quantitatively assess lung mechanics. The parameters of the models, that is, the resistive and elastic values of their individual components, constitute the endpoints we use to assess lung function experimentally.</span></p><div class="c-article-section__figure js-c-reading-companion-figures-item" data-container-section="figure" data-dcnode-id="4344" data-test="figure" data-title="Figure 2" id="figure-2_195"><figure data-dcnode-id="4345"><figcaption data-dcnode-id="4392"><b class="c-article-section__figure-caption" data-dcnode-id="4393" data-test="figure-caption-text" id="Fig2_195"><span data-dcnode-id="4394" instrument_node="">Figure 2</span></b></figcaption><div class="c-article-section__figure-content" data-dcnode-id="4356"><div class="c-article-section__figure-item" data-dcnode-id="4387"><a class="c-article-section__figure-link" data-dcnode-id="4388" data-test="img-link" data-track="click" data-track-action="view figure" data-track-label="image" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//respiratory-research.biomedcentral.com/articles/10.1186/rr199/figures/2_195" rel="nofollow"><picture data-dcnode-id="4389"><source data-dcnode-id="4391" srcset="//media.springernature.com/lw685/springer-static/image/art%3A10.1186%2Frr199/MediaObjects/12931_2002_195_Fig2_HTML.jpg?as=webp" type="image/webp"><img alt="figure 2_195" aria-describedby="Fig2_195" data-dcnode-id="4390" loading="lazy" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//media.springernature.com/lw685/springer-static/image/art%253A10.1186/rr199/MediaObjects/12931_2002_195_Fig2_HTML.jpg&amp;raw"></picture></a></div><div class="c-article-section__figure-description" data-dcnode-id="4357" data-test="bottom-caption" id="figure-2_195-desc"><p data-dcnode-id="4358"><span data-dcnode-id="4386" instrument_node="">Two common and basic mechanical models of the lung. A: A homogeneously ventilated model consisting of a single elastic balloon (elastance </span><i data-dcnode-id="4384"><span data-dcnode-id="4385" instrument_node="">E</span></i><span data-dcnode-id="4383" instrument_node="">) served by a single flow-resistive pipe (resistance </span><i data-dcnode-id="4381"><span data-dcnode-id="4382" instrument_node="">R</span></i><span data-dcnode-id="4380" instrument_node="">). B: A homogeneous model again with a single airway (resistance </span><i data-dcnode-id="4378"><span data-dcnode-id="4379" instrument_node="">R</span></i><span data-dcnode-id="4377" instrument_node="">
</span><sub data-dcnode-id="4375"><span data-dcnode-id="4376" instrument_node="">1</span></sub><span data-dcnode-id="4374" instrument_node="">), but with a Kelvin body consisting of two springs (</span><i data-dcnode-id="4372"><span data-dcnode-id="4373" instrument_node="">E</span></i><span data-dcnode-id="4371" instrument_node="">
</span><sub data-dcnode-id="4369"><span data-dcnode-id="4370" instrument_node="">1</span></sub><span data-dcnode-id="4368" instrument_node=""> and </span><i data-dcnode-id="4366"><span data-dcnode-id="4367" instrument_node="">E</span></i><span data-dcnode-id="4365" instrument_node="">
</span><sub data-dcnode-id="4363"><span data-dcnode-id="4364" instrument_node="">2</span></sub><span data-dcnode-id="4362" instrument_node="">) and a dashpot (resistance R</span><sub data-dcnode-id="4360"><span data-dcnode-id="4361" instrument_node="">2</span></sub><span data-dcnode-id="4359" instrument_node="">) to account for the viscoelastic behavior of the lung tissue.</span></p></div></div><div class="u-text-right u-hide-print" data-dcnode-id="4346"><a aria-label="Full size image figure 2_195" class="c-article__pill-button" data-dcnode-id="4347" data-test="article-link" data-track="click" data-track-action="view figure" data-track-dest="link:Figure2_195 Full size image" data-track-label="button" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//respiratory-research.biomedcentral.com/articles/10.1186/rr199/figures/2_195" rel="nofollow"><span data-dcnode-id="4354"><span data-dcnode-id="4355" instrument_node="">Full size image</span></span><svg aria-hidden="true" class="u-icon" data-dcnode-id="4348" focusable="false" height="16" role="img" width="16"><use data-dcnode-id="4349" xlink:href="#global-icon-chevron-right" xmlns:xlink="http://www.w3.org/1999/xlink"><svg data-dcnode-id="4350" id="global-icon-chevron-right" viewBox="0 0 16 16"></svg></use></svg><span data-dcnode-id="4353" instrument_node="">
</span><path d="M7.782 7L5.3 4.518c-.393-.392-.4-1.022-.02-1.403a1.001 1.001 0 011.417 0l4.176 4.177a1.001 1.001 0 010 1.416l-4.176 4.177a.991.991 0 01-1.4.016 1 1 0 01.003-1.42L7.782 9l1.013-.998z" data-dcnode-id="4352" fill-rule="evenodd"></path><span data-dcnode-id="4351" instrument_node="">
</span></a></div></figure></div><span data-dcnode-id="4343" instrument_node="">
</span><p data-dcnode-id="4302"><span data-dcnode-id="4342" instrument_node="">The viscoelastic model in Fig. </span><a data-dcnode-id="4340" data-track="click" data-track-action="figure anchor" data-track-label="link" href="#Fig2_195"><span data-dcnode-id="4341" instrument_node="">2B</span></a><span data-dcnode-id="4339" instrument_node=""> does a substantially better job of describing frequency-dependent nature lung mechanics than the model in Fig. </span><a data-dcnode-id="4337" data-track="click" data-track-action="figure anchor" data-track-label="link" href="#Fig2_195"><span data-dcnode-id="4338" instrument_node="">2A</span></a><span data-dcnode-id="4336" instrument_node="">. Nevertheless, the simple model in Fig. </span><a data-dcnode-id="4334" data-track="click" data-track-action="figure anchor" data-track-label="link" href="#Fig2_195"><span data-dcnode-id="4335" instrument_node="">2A</span></a><span data-dcnode-id="4333" instrument_node=""> still serves as the conceptual platform for most studies of lung mechanics and bronchial responsiveness. The mechanical behavior of this model is described by its equation of motion. This equation is based on simple physics and states that the force (pressure) applied to the model is equal and opposite to the opposing force (pressure) the model generates. The applied pressure, </span><i data-dcnode-id="4331"><span data-dcnode-id="4332" instrument_node="">P</span></i><span data-dcnode-id="4330" instrument_node="">, is that supplied either by the respiratory muscles or a mechanical ventilator. The opposing pressure is made up, in general, of three components: a resistive pressure (</span><i data-dcnode-id="4328"><span data-dcnode-id="4329" instrument_node="">P</span></i><span data-dcnode-id="4327" instrument_node="">
</span><sub data-dcnode-id="4322"><span data-dcnode-id="4326" instrument_node="">
</span><i data-dcnode-id="4324"><span data-dcnode-id="4325" instrument_node="">res</span></i><span data-dcnode-id="4323" instrument_node="">
</span></sub><span data-dcnode-id="4321" instrument_node="">), an elastic pressure (</span><i data-dcnode-id="4319"><span data-dcnode-id="4320" instrument_node="">P</span></i><span data-dcnode-id="4318" instrument_node="">
</span><sub data-dcnode-id="4313"><span data-dcnode-id="4317" instrument_node="">
</span><i data-dcnode-id="4315"><span data-dcnode-id="4316" instrument_node="">el</span></i><span data-dcnode-id="4314" instrument_node="">
</span></sub><span data-dcnode-id="4312" instrument_node="">), and an inertive pressure (</span><i data-dcnode-id="4310"><span data-dcnode-id="4311" instrument_node="">P</span></i><span data-dcnode-id="4309" instrument_node="">
</span><sub data-dcnode-id="4304"><span data-dcnode-id="4308" instrument_node="">
</span><i data-dcnode-id="4306"><span data-dcnode-id="4307" instrument_node="">in</span></i><span data-dcnode-id="4305" instrument_node="">
</span></sub><span data-dcnode-id="4303" instrument_node="">).</span></p><p data-dcnode-id="4300"><span data-dcnode-id="4301" instrument_node="">Thus,</span></p><span data-dcnode-id="4299" instrument_node="">
</span><div class="c-article-equation" data-dcnode-id="4296" id="Equ1_195"><div class="c-article-equation__content" data-dcnode-id="4297"><img alt="" class="u-display-block" data-dcnode-id="4298" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//media.springernature.com/full/springer-static/image/art%253A10.1186/rr199/MediaObjects/12931_2002_195_Eque_HTML.gif&amp;raw"></div></div><span data-dcnode-id="4295" instrument_node="">
</span><p data-dcnode-id="4284"><span data-dcnode-id="4294" instrument_node="">
</span><i data-dcnode-id="4292"><span data-dcnode-id="4293" instrument_node="">P</span></i><span data-dcnode-id="4291" instrument_node="">
</span><sub data-dcnode-id="4286"><span data-dcnode-id="4290" instrument_node="">
</span><i data-dcnode-id="4288"><span data-dcnode-id="4289" instrument_node="">res</span></i><span data-dcnode-id="4287" instrument_node="">
</span></sub><span data-dcnode-id="4285" instrument_node="">is described by Ohm's law:</span></p><span data-dcnode-id="4283" instrument_node="">
</span><div class="c-article-equation" data-dcnode-id="4280" id="Equ2_195"><div class="c-article-equation__content" data-dcnode-id="4281"><img alt="" class="u-display-block" data-dcnode-id="4282" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//media.springernature.com/full/springer-static/image/art%253A10.1186/rr199/MediaObjects/12931_2002_195_Equf_HTML.gif&amp;raw"></div></div><span data-dcnode-id="4279" instrument_node="">
</span><p data-dcnode-id="4263"><span data-dcnode-id="4278" instrument_node="">where </span><i data-dcnode-id="4276"><span data-dcnode-id="4277" instrument_node="">R</span></i><span data-dcnode-id="4275" instrument_node=""> is the resistance of the lung and </span><img alt="" data-dcnode-id="4274" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//media.springernature.com/full/springer-static/image/art%253A10.1186/rr199/MediaObjects/12931_2002_195_IEq2_HTML.gif&amp;raw"><span data-dcnode-id="4273" instrument_node=""> is flow of gas. </span><i data-dcnode-id="4271"><span data-dcnode-id="4272" instrument_node="">P</span></i><span data-dcnode-id="4270" instrument_node="">
</span><sub data-dcnode-id="4265"><span data-dcnode-id="4269" instrument_node="">
</span><i data-dcnode-id="4267"><span data-dcnode-id="4268" instrument_node="">el</span></i><span data-dcnode-id="4266" instrument_node="">
</span></sub><span data-dcnode-id="4264" instrument_node="">is described by Hooke's law:</span></p><span data-dcnode-id="4262" instrument_node="">
</span><div class="c-article-equation" data-dcnode-id="4259" id="Equ3_195"><div class="c-article-equation__content" data-dcnode-id="4260"><img alt="" class="u-display-block" data-dcnode-id="4261" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//media.springernature.com/full/springer-static/image/art%253A10.1186/rr199/MediaObjects/12931_2002_195_Equa_HTML.gif&amp;raw"></div></div><span data-dcnode-id="4258" instrument_node="">
</span><p data-dcnode-id="4220"><span data-dcnode-id="4257" instrument_node="">where </span><i data-dcnode-id="4255"><span data-dcnode-id="4256" instrument_node="">E</span></i><span data-dcnode-id="4254" instrument_node=""> is lung elastance (equal to the inverse of compliance, </span><i data-dcnode-id="4252"><span data-dcnode-id="4253" instrument_node="">C</span></i><span data-dcnode-id="4251" instrument_node="">) and </span><i data-dcnode-id="4249"><span data-dcnode-id="4250" instrument_node="">V</span></i><span data-dcnode-id="4248" instrument_node=""> is lung volume relative to functional residual capacity. </span><i data-dcnode-id="4246"><span data-dcnode-id="4247" instrument_node="">P</span></i><span data-dcnode-id="4245" instrument_node="">
</span><sub data-dcnode-id="4240"><span data-dcnode-id="4244" instrument_node="">
</span><i data-dcnode-id="4242"><span data-dcnode-id="4243" instrument_node="">in</span></i><span data-dcnode-id="4241" instrument_node="">
</span></sub><span data-dcnode-id="4239" instrument_node="">comes into play only at frequencies well above those of normal breathing, while both </span><i data-dcnode-id="4237"><span data-dcnode-id="4238" instrument_node="">P</span></i><span data-dcnode-id="4236" instrument_node="">
</span><sub data-dcnode-id="4231"><span data-dcnode-id="4235" instrument_node="">
</span><i data-dcnode-id="4233"><span data-dcnode-id="4234" instrument_node="">res</span></i><span data-dcnode-id="4232" instrument_node="">
</span></sub><span data-dcnode-id="4230" instrument_node="">and </span><i data-dcnode-id="4228"><span data-dcnode-id="4229" instrument_node="">P</span></i><span data-dcnode-id="4227" instrument_node="">
</span><sub data-dcnode-id="4222"><span data-dcnode-id="4226" instrument_node="">
</span><i data-dcnode-id="4224"><span data-dcnode-id="4225" instrument_node="">in</span></i><span data-dcnode-id="4223" instrument_node="">
</span></sub><span data-dcnode-id="4221" instrument_node="">become negligible when frequency is extremely low. Thus, the equation of motion relevant to normal breathing is</span></p><span data-dcnode-id="4219" instrument_node="">
</span><div class="c-article-equation" data-dcnode-id="4216" id="Equ4_195"><div class="c-article-equation__content" data-dcnode-id="4217"><img alt="" class="u-display-block" data-dcnode-id="4218" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//media.springernature.com/full/springer-static/image/art%253A10.1186/rr199/MediaObjects/12931_2002_195_Equb_HTML.gif&amp;raw"></div></div><span data-dcnode-id="4215" instrument_node="">
</span><p data-dcnode-id="4207"><span data-dcnode-id="4214" instrument_node="">The parameters </span><i data-dcnode-id="4212"><span data-dcnode-id="4213" instrument_node="">R</span></i><span data-dcnode-id="4211" instrument_node=""> and </span><i data-dcnode-id="4209"><span data-dcnode-id="4210" instrument_node="">E</span></i><span data-dcnode-id="4208" instrument_node=""> are both profoundly dependent on breathing frequency and lung volume.</span></p></div></div></section><section data-dcnode-id="4173" data-title="Lung volume"><div class="c-article-section" data-dcnode-id="4174" id="Sec4_195-section"><h2 class="c-article-section__title js-section-title js-c-reading-companion-sections-item" data-dcnode-id="4202" id="Sec4_195"><span data-dcnode-id="4203" instrument_node="">Lung volume</span></h2><div class="c-article-section__content" data-dcnode-id="4175" id="Sec4_195-content"><p data-dcnode-id="4176"><span data-dcnode-id="4201" instrument_node="">The volume of the lungs has an important influence on its pressure-flow relationships. For example, an increase in lung volume stretches the airways open and so causes airway resistance to fall (tethering). This also makes it more difficult for the airways to narrow when the airway smooth muscle contracts, and represents an important mechanism by which the challenged lung can defend airway caliber [</span><a aria-label="Reference 18" data-dcnode-id="4199" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR18_195" id="ref-link-section-d239179398e969" title="Eidelman DN, Irvin CG: Airway mechanics in Asthma.
In Asthma and Rhinitis 2
(Edited by: Busse WW). Holgate Street: Blackwell Science 2000, 1237–1247."><span data-dcnode-id="4200" instrument_node="">18</span></a><span data-dcnode-id="4198" instrument_node="">, </span><a aria-label="Reference 22" data-dcnode-id="4196" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR22_195" id="ref-link-section-d239179398e972" title="Irvin CG, Pak J, Martin RJ: Airway-parenchyma uncoupling in nocturnal asthma.
Am J Respir Crit Care Med 2000, 161:50–56."><span data-dcnode-id="4197" instrument_node="">22</span></a><span data-dcnode-id="4195" instrument_node="">]. Unlike larger laboratory animals, the measurement of lung volume in the mouse is particularly problematic due to its small size. For example, when thoracic gas volume is measured using the conventional Boyle's Law technique, the volumes of air in the transducers used to measure plethysmographic and airway-opening pressures must be small relative to the lung volume, or significant measurement errors will occur. It has only recently been reported that measurement of functional residual capacity (FRC) by this approach is at all feasible [</span><a aria-label="Reference 23" data-dcnode-id="4193" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR23_195" id="ref-link-section-d239179398e975" title="Lundblad KAL, Allen G, Irvin CG, Bates JHT: Reduced thoracic gas volume in a mouse model of acute lung injury.
Am J Resp Crit Care Med 2001, 165:A785."><span data-dcnode-id="4194" instrument_node="">23</span></a><span data-dcnode-id="4192" instrument_node="">]. The measurement of FRC with gas dilution is equally difficult, again due to the small size of the mouse lung, and there are only a few reports in the literature on the use of this technique [</span><a aria-label="Reference 24" data-dcnode-id="4190" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR24_195" id="ref-link-section-d239179398e978" title="Takezawa J, Miller FJ, O'Neill JJ: Single breath diffusing capacity and lung volume in small laboratory animals.
J Appl Physiol 1980, 48:1052–1059."><span data-dcnode-id="4191" instrument_node="">24</span></a><span data-dcnode-id="4189" instrument_node="">]. Other studies of mouse lung volume have used a buoyancy approach [</span><a aria-label="Reference 25" data-dcnode-id="4187" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR25_195" id="ref-link-section-d239179398e981" title="Fujita M, Shannon JM, Irvin CG, Fagan KA, Cool C, Augustin A, Mason RJ: Overexpression of tumor necrosis factor-alpha produces an increase in lung volumes and pulmonary hypertension.
Am J Physiol Lung Cell Mol Physiol 2001, 280:L39-L49."><span data-dcnode-id="4188" instrument_node="">25</span></a><span data-dcnode-id="4186" instrument_node="">], a degassing approach [</span><a aria-label="Reference 26" data-dcnode-id="4184" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR26_195" id="ref-link-section-d239179398e985" title="Tankersley CG, Rabold R, Mitzner W: Differential lung mechanics are genetically determined in inbred murine strains.
J Appl Physiol 1999, 86:1764–1769."><span data-dcnode-id="4185" instrument_node="">26</span></a><span data-dcnode-id="4183" instrument_node="">, </span><a aria-label="Reference 27" data-dcnode-id="4181" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR27_195" id="ref-link-section-d239179398e988" title="Gross NJ: Mechanical properties of mouse lungs: effects of degassing on normal, hyperoxic and irradiated lungs.
J Appl Physiol 1981, 51:391–398."><span data-dcnode-id="4182" instrument_node="">27</span></a><span data-dcnode-id="4180" instrument_node="">], and even a CT scanner method has been reported [</span><a aria-label="Reference 28" data-dcnode-id="4178" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR28_195" id="ref-link-section-d239179398e991" title="Mitzner W, Brown R, Lee W: In vivo measurement of lung volumes in mice.
Physiol Genomics 2001, 4:215–221."><span data-dcnode-id="4179" instrument_node="">28</span></a><span data-dcnode-id="4177" instrument_node="">]. None of these, however, is particularly practical for most study designs. Better techniques for measuring lung volumes in mice are certainly needed, so this will be a fruitful area for future research.</span></p></div></div></section><section data-dcnode-id="4133" data-title="Lung elastance (compliance)"><div class="c-article-section" data-dcnode-id="4134" id="Sec5_195-section"><h2 class="c-article-section__title js-section-title js-c-reading-companion-sections-item" data-dcnode-id="4171" id="Sec5_195"><span data-dcnode-id="4172" instrument_node="">Lung elastance (compliance)</span></h2><div class="c-article-section__content" data-dcnode-id="4135" id="Sec5_195-content"><p data-dcnode-id="4136"><span data-dcnode-id="4170" instrument_node="">The component of the transpulmonary pressure loss that is out of phase with flow and in phase with volume, as well as the recoil pressure exerted by the lung under static conditions, are caused by the elastic forces within the lung. The loss of elastic recoil within the lung defines emphysema while an increase defines restrictive processes [</span><a aria-label="Reference 18" data-dcnode-id="4168" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR18_195" id="ref-link-section-d239179398e1002" title="Eidelman DN, Irvin CG: Airway mechanics in Asthma.
In Asthma and Rhinitis 2
(Edited by: Busse WW). Holgate Street: Blackwell Science 2000, 1237–1247."><span data-dcnode-id="4169" instrument_node="">18</span></a><span data-dcnode-id="4167" instrument_node="">, </span><a aria-label="Reference 25" data-dcnode-id="4165" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR25_195" id="ref-link-section-d239179398e1005" title="Fujita M, Shannon JM, Irvin CG, Fagan KA, Cool C, Augustin A, Mason RJ: Overexpression of tumor necrosis factor-alpha produces an increase in lung volumes and pulmonary hypertension.
Am J Physiol Lung Cell Mol Physiol 2001, 280:L39-L49."><span data-dcnode-id="4166" instrument_node="">25</span></a><span data-dcnode-id="4164" instrument_node="">]. The chest walls and other thoracic structures in mice are extremely compliant, so most elastic recoil measured in an intact animal can be attributed specifically to the lung. Moreover, the elastic recoil of the lung shows considerable genetic variability that needs to be taken into account in study designs [</span><a aria-label="Reference 26" data-dcnode-id="4162" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR26_195" id="ref-link-section-d239179398e1008" title="Tankersley CG, Rabold R, Mitzner W: Differential lung mechanics are genetically determined in inbred murine strains.
J Appl Physiol 1999, 86:1764–1769."><span data-dcnode-id="4163" instrument_node="">26</span></a><span data-dcnode-id="4161" instrument_node="">]. The elastic recoil of the lung is conveniently assessed in terms of the quasi-static pressure-volume (</span><i data-dcnode-id="4159"><span data-dcnode-id="4160" instrument_node="">PV</span></i><span data-dcnode-id="4158" instrument_node="">) curve measured by inflating and deflating the lung in a step-wise fashion. The inspiratory limb of the curve traverses a path through values of P that are higher than those of the expiratory limb, the difference between the two limbs being termed hysteresis. Changes in the inspiratory limb of the </span><i data-dcnode-id="4156"><span data-dcnode-id="4157" instrument_node="">PV</span></i><span data-dcnode-id="4155" instrument_node=""> curve that cause an increase in hysteresis are taken to indicate enhanced airway closure, such as that observed in humans after dry cold gas inhalation [</span><a aria-label="Reference 29" data-dcnode-id="4153" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR29_195" id="ref-link-section-d239179398e1018" title="Kaminsky DA, Wenzel SE, Carcano C, Gurka D, Feldsien D, Irvin CG: Hyperpnea-induced changes in parenchymal lung mechanics in normal subjects and in asthmatics.
Am J Respir Crit Care Med 1997, 155:1260–1266."><span data-dcnode-id="4154" instrument_node="">29</span></a><span data-dcnode-id="4152" instrument_node="">] and recapitulated in mice with allergic inflammation [</span><a aria-label="Reference 30" data-dcnode-id="4150" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR30_195" id="ref-link-section-d239179398e1021" title="Wagers S, Lundblad L, Moriya HT, Bates JHT, Irvin CG: Non-linearities of respiratory mechanics during bronchoconstriction in mice with airway inflammation.
J Appl Physiol 2002, 92:1802–1804."><span data-dcnode-id="4151" instrument_node="">30</span></a><span data-dcnode-id="4149" instrument_node="">]. These changes in </span><i data-dcnode-id="4147"><span data-dcnode-id="4148" instrument_node="">PV</span></i><span data-dcnode-id="4146" instrument_node=""> characteristics can be sensitive indicators of lung dysfunction and contribute to the genesis of hyperresponsiveness. The shape of the pressure volume relationship is one manifestation of the nonlinear characteristics of lung mechanics in the normal, unperturbed lung. Airflow resistance also exhibits alinear behavior as the airflow reaches high rates of flow as sudden changes in lumenal dimensions occur (e.g. vocal chords). The mouse lung exhibits alinear elastic (compliance) behavior that increases following antigen challenge, a change that is most consistent with reopening airways that were closed [</span><a aria-label="Reference 29" data-dcnode-id="4144" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR29_195" id="ref-link-section-d239179398e1027" title="Kaminsky DA, Wenzel SE, Carcano C, Gurka D, Feldsien D, Irvin CG: Hyperpnea-induced changes in parenchymal lung mechanics in normal subjects and in asthmatics.
Am J Respir Crit Care Med 1997, 155:1260–1266."><span data-dcnode-id="4145" instrument_node="">29</span></a><span data-dcnode-id="4143" instrument_node="">, </span><a aria-label="Reference 30" data-dcnode-id="4141" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR30_195" id="ref-link-section-d239179398e1030" title="Wagers S, Lundblad L, Moriya HT, Bates JHT, Irvin CG: Non-linearities of respiratory mechanics during bronchoconstriction in mice with airway inflammation.
J Appl Physiol 2002, 92:1802–1804."><span data-dcnode-id="4142" instrument_node="">30</span></a><span data-dcnode-id="4140" instrument_node="">]. Airflow is not alinear (i.e. laminar flow regimes) in either condition as it is highly unlikely turbulent flow occurs in mouse lungs due to the small airway diameters, unlike humans where turbulent flow is a common occurrence [</span><a aria-label="Reference 30" data-dcnode-id="4138" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR30_195" id="ref-link-section-d239179398e1033" title="Wagers S, Lundblad L, Moriya HT, Bates JHT, Irvin CG: Non-linearities of respiratory mechanics during bronchoconstriction in mice with airway inflammation.
J Appl Physiol 2002, 92:1802–1804."><span data-dcnode-id="4139" instrument_node="">30</span></a><span data-dcnode-id="4137" instrument_node="">], pointing to a clear limitation of this species in exploring complex airflow conditions.</span></p></div></div></section><section data-dcnode-id="4089" data-title="Phenotyping uncertainty principle"><div class="c-article-section" data-dcnode-id="4090" id="Sec6_195-section"><h2 class="c-article-section__title js-section-title js-c-reading-companion-sections-item" data-dcnode-id="4131" id="Sec6_195"><span data-dcnode-id="4132" instrument_node="">Phenotyping uncertainty principle</span></h2><div class="c-article-section__content" data-dcnode-id="4091" id="Sec6_195-content"><p data-dcnode-id="4117"><span data-dcnode-id="4130" instrument_node="">Accurate and valid measurement of lung mechanics in laboratory animals is a balancing act between measurement precision and maintenance of "natural" conditions. This situation is similar to the Heidelberg uncertainty principle of quantum mechanics which states that the measurement of a particle's position interferes with the measurement of its movement, and </span><i data-dcnode-id="4128"><span data-dcnode-id="4129" instrument_node="">vice versa</span></i><span data-dcnode-id="4127" instrument_node=""> [</span><a aria-label="Reference 31" data-dcnode-id="4125" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR31_195" id="ref-link-section-d239179398e1048" title="Feynman RP, Leighton RB, Sands M: The Feynman Lectures on Physics: Quantum Mechanics
(Edited by: Reading MA). Addison-Wesley 1965, III:1–11."><span data-dcnode-id="4126" instrument_node="">31</span></a><span data-dcnode-id="4124" instrument_node="">]. In a similar fashion, as we make more precise measurements of lung function in an animal, we are forced to constrain the animal's behavior in a way that departs from the maintenance of natural conditions [</span><a aria-label="Reference 11" data-dcnode-id="4122" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR11_195" id="ref-link-section-d239179398e1051" title="Bates JHT, Irvin CG: Measuring Lung Function in Mice: The Phenotyping Uncertainty Principle.
J Appl Physiol 2003, 94:1297–1306."><span data-dcnode-id="4123" instrument_node="">11</span></a><span data-dcnode-id="4121" instrument_node="">]. At the extreme ends of this continuum are the measurements derived from the free roaming animal in a closed chamber, known as unrestrained plethysmography (UP), and the measurement of input impedance using forced oscillations performed in an anesthetized, tracheostomized animal (Figure </span><a data-dcnode-id="4119" data-track="click" data-track-action="figure anchor" data-track-label="link" href="#Fig3_195"><span data-dcnode-id="4120" instrument_node="">3</span></a><span data-dcnode-id="4118" instrument_node="">).</span></p><div class="c-article-section__figure js-c-reading-companion-figures-item" data-container-section="figure" data-dcnode-id="4093" data-test="figure" data-title="Figure 3" id="figure-3_195"><figure data-dcnode-id="4094"><figcaption data-dcnode-id="4114"><b class="c-article-section__figure-caption" data-dcnode-id="4115" data-test="figure-caption-text" id="Fig3_195"><span data-dcnode-id="4116" instrument_node="">Figure 3</span></b></figcaption><div class="c-article-section__figure-content" data-dcnode-id="4105"><div class="c-article-section__figure-item" data-dcnode-id="4109"><a class="c-article-section__figure-link" data-dcnode-id="4110" data-test="img-link" data-track="click" data-track-action="view figure" data-track-label="image" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//respiratory-research.biomedcentral.com/articles/10.1186/rr199/figures/3_195" rel="nofollow"><picture data-dcnode-id="4111"><source data-dcnode-id="4113" srcset="//media.springernature.com/lw685/springer-static/image/art%3A10.1186%2Frr199/MediaObjects/12931_2002_195_Fig3_HTML.jpg?as=webp" type="image/webp"><img alt="figure 3_195" aria-describedby="Fig3_195" data-dcnode-id="4112" loading="lazy" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//media.springernature.com/lw685/springer-static/image/art%253A10.1186/rr199/MediaObjects/12931_2002_195_Fig3_HTML.jpg&amp;raw"></picture></a></div><div class="c-article-section__figure-description" data-dcnode-id="4106" data-test="bottom-caption" id="figure-3_195-desc"><p data-dcnode-id="4107"><span data-dcnode-id="4108" instrument_node="">The non-invasiveness-precision continuum of the phenotyping uncertainty principle – see text for discussion.</span></p></div></div><div class="u-text-right u-hide-print" data-dcnode-id="4095"><a aria-label="Full size image figure 3_195" class="c-article__pill-button" data-dcnode-id="4096" data-test="article-link" data-track="click" data-track-action="view figure" data-track-dest="link:Figure3_195 Full size image" data-track-label="button" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//respiratory-research.biomedcentral.com/articles/10.1186/rr199/figures/3_195" rel="nofollow"><span data-dcnode-id="4103"><span data-dcnode-id="4104" instrument_node="">Full size image</span></span><svg aria-hidden="true" class="u-icon" data-dcnode-id="4097" focusable="false" height="16" role="img" width="16"><use data-dcnode-id="4098" xlink:href="#global-icon-chevron-right" xmlns:xlink="http://www.w3.org/1999/xlink"><svg data-dcnode-id="4099" id="global-icon-chevron-right" viewBox="0 0 16 16"></svg></use></svg><span data-dcnode-id="4102" instrument_node="">
</span><path d="M7.782 7L5.3 4.518c-.393-.392-.4-1.022-.02-1.403a1.001 1.001 0 011.417 0l4.176 4.177a1.001 1.001 0 010 1.416l-4.176 4.177a.991.991 0 01-1.4.016 1 1 0 01.003-1.42L7.782 9l1.013-.998z" data-dcnode-id="4101" fill-rule="evenodd"></path><span data-dcnode-id="4100" instrument_node="">
</span></a></div></figure></div><span data-dcnode-id="4092" instrument_node="">
</span></div></div></section><section data-dcnode-id="4026" data-title="Unrestrained plethysmography"><div class="c-article-section" data-dcnode-id="4027" id="Sec7_195-section"><h2 class="c-article-section__title js-section-title js-c-reading-companion-sections-item" data-dcnode-id="4087" id="Sec7_195"><span data-dcnode-id="4088" instrument_node="">Unrestrained plethysmography</span></h2><div class="c-article-section__content" data-dcnode-id="4028" id="Sec7_195-content"><p data-dcnode-id="4058"><span data-dcnode-id="4086" instrument_node="">This approach to assess lung function involves placing the subject into a small closed box and measuring the pressure changes within the box that occur as the animal breathes [</span><a aria-label="Reference 7" data-dcnode-id="4084" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR7_195" id="ref-link-section-d239179398e1083" title="Lundblad KAL, Irvin CG, Adler A, Bates JHT: A reevaluation of the validity of unrestrained plethysmography in mice.
J Appl Physiol 2002, 93:1198–1207."><span data-dcnode-id="4085" instrument_node="">7</span></a><span data-dcnode-id="4083" instrument_node="">, </span><a aria-label="Reference 11" data-dcnode-id="4081" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR11_195" id="ref-link-section-d239179398e1086" title="Bates JHT, Irvin CG: Measuring Lung Function in Mice: The Phenotyping Uncertainty Principle.
J Appl Physiol 2003, 94:1297–1306."><span data-dcnode-id="4082" instrument_node="">11</span></a><span data-dcnode-id="4080" instrument_node="">, </span><a aria-label="Reference 32" data-dcnode-id="4078" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR32_195" id="ref-link-section-d239179398e1089" title="Hammelmann E, Schwarze J, Takeda K, Oshiba A, Larson GL, Irvin CG, Gelfand EW: Noninvasive measurement of airway responsiveness in allergic mice using barometric plethysmography.
Am J Respir Crit Care Med 1997, 156:766–775."><span data-dcnode-id="4079" instrument_node="">32</span></a><span data-dcnode-id="4077" instrument_node="">]. The animal is conscious and unrestrained. This technique currently enjoys wide popularity (for example see [</span><a aria-label="Reference 33" data-dcnode-id="4075" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR33_195" id="ref-link-section-d239179398e1092" title="Finotto S, Neurath MF, Glickman JN, Qin S, Lehr HA, Green HY, Ackerman K, Haley K, Galle PR, Szabo SJ, Drazen JM, De Sanctis GT, Glimcher LH: Development of spontaneous airway changes consistent with human asthma in mice lacking T-bet.
Science 2002, 295:336–342."><span data-dcnode-id="4076" instrument_node="">33</span></a><span data-dcnode-id="4074" instrument_node="">]) because 1) it is simple and 2) the mouse remains unharmed after the experiment. The endpoint is the heuristic variable known as Penh, which stands for 'enhanced pause'. It is important to note that there is no linkage between Penh and other variables that are derived from mechanical principles – Penh is merely an empirical derivative of the respiratory variations in box pressure [</span><a aria-label="Reference 11" data-dcnode-id="4072" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR11_195" id="ref-link-section-d239179398e1095" title="Bates JHT, Irvin CG: Measuring Lung Function in Mice: The Phenotyping Uncertainty Principle.
J Appl Physiol 2003, 94:1297–1306."><span data-dcnode-id="4073" instrument_node="">11</span></a><span data-dcnode-id="4071" instrument_node="">]. While an earlier publication demonstrated reasonable correlations between Penh and invasive measures of lung mechanics [</span><a aria-label="Reference 32" data-dcnode-id="4069" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR32_195" id="ref-link-section-d239179398e1099" title="Hammelmann E, Schwarze J, Takeda K, Oshiba A, Larson GL, Irvin CG, Gelfand EW: Noninvasive measurement of airway responsiveness in allergic mice using barometric plethysmography.
Am J Respir Crit Care Med 1997, 156:766–775."><span data-dcnode-id="4070" instrument_node="">32</span></a><span data-dcnode-id="4068" instrument_node="">], recent publications draw into serious question the validity of using Penh to measure lung function [</span><a aria-label="Reference 7" data-dcnode-id="4066" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR7_195" id="ref-link-section-d239179398e1102" title="Lundblad KAL, Irvin CG, Adler A, Bates JHT: A reevaluation of the validity of unrestrained plethysmography in mice.
J Appl Physiol 2002, 93:1198–1207."><span data-dcnode-id="4067" instrument_node="">7</span></a><span data-dcnode-id="4065" instrument_node="">, </span><a aria-label="Reference 11" data-dcnode-id="4063" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR11_195" id="ref-link-section-d239179398e1105" title="Bates JHT, Irvin CG: Measuring Lung Function in Mice: The Phenotyping Uncertainty Principle.
J Appl Physiol 2003, 94:1297–1306."><span data-dcnode-id="4064" instrument_node="">11</span></a><span data-dcnode-id="4062" instrument_node="">, </span><a aria-label="Reference 34" data-dcnode-id="4060" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR34_195" id="ref-link-section-d239179398e1108" title="Petak F, Habre W, Donati YR, Hantos Z, Barazzone-Argiroffo C: Hyperoxia-induced changes in mouse lung mechanics: forced oscillations vs. barometric plethysmography.
J Appl Physiol 2001, 90:2221–2230."><span data-dcnode-id="4061" instrument_node="">34</span></a><span data-dcnode-id="4059" instrument_node="">].</span></p><p data-dcnode-id="4029"><span data-dcnode-id="4057" instrument_node="">The pressure changes occurring within the box as the mouse breathes are derived first from gas compression and decompression within the thorax – an event linked to the state of lung mechanics – and second from humidification and warming of inspired gas – an event unrelated to lung mechanics. During bronchoconstriction, both components increase [</span><a aria-label="Reference 7" data-dcnode-id="4055" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR7_195" id="ref-link-section-d239179398e1114" title="Lundblad KAL, Irvin CG, Adler A, Bates JHT: A reevaluation of the validity of unrestrained plethysmography in mice.
J Appl Physiol 2002, 93:1198–1207."><span data-dcnode-id="4056" instrument_node="">7</span></a><span data-dcnode-id="4054" instrument_node="">], but much of this increase is likely due to the increased stimulation to breathe that would arise from chemoreceptor receptors in the lung. Hence box pressure changes should be influenced by chemoreceptor sensitivity and genetics that control responses to chemo- or irritant- receptor stimulation and integration [</span><a aria-label="Reference 11" data-dcnode-id="4052" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR11_195" id="ref-link-section-d239179398e1117" title="Bates JHT, Irvin CG: Measuring Lung Function in Mice: The Phenotyping Uncertainty Principle.
J Appl Physiol 2003, 94:1297–1306."><span data-dcnode-id="4053" instrument_node="">11</span></a><span data-dcnode-id="4051" instrument_node="">, </span><a aria-label="Reference 35" data-dcnode-id="4049" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR35_195" id="ref-link-section-d239179398e1120" title="Tankersley CG, Fitzgerald RS, Mitzner WA, Kleeberger SR: Hypercapnic ventilatory responses in mice differentially susceptible to acute ozone exposure.
J Appl Physiol 1993, 75:2613–2619."><span data-dcnode-id="4050" instrument_node="">35</span></a><span data-dcnode-id="4048" instrument_node="">]. Recent studies show that changes in Penh depart from mechanical changes during a state of increased box temperature [</span><a aria-label="Reference 7" data-dcnode-id="4046" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR7_195" id="ref-link-section-d239179398e1123" title="Lundblad KAL, Irvin CG, Adler A, Bates JHT: A reevaluation of the validity of unrestrained plethysmography in mice.
J Appl Physiol 2002, 93:1198–1207."><span data-dcnode-id="4047" instrument_node="">7</span></a><span data-dcnode-id="4045" instrument_node="">, </span><a aria-label="Reference 34" data-dcnode-id="4043" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR34_195" id="ref-link-section-d239179398e1126" title="Petak F, Habre W, Donati YR, Hantos Z, Barazzone-Argiroffo C: Hyperoxia-induced changes in mouse lung mechanics: forced oscillations vs. barometric plethysmography.
J Appl Physiol 2001, 90:2221–2230."><span data-dcnode-id="4044" instrument_node="">34</span></a><span data-dcnode-id="4042" instrument_node="">] in an exactly opposite way during exposure to hyperoxic conditions [</span><a aria-label="Reference 34" data-dcnode-id="4040" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR34_195" id="ref-link-section-d239179398e1130" title="Petak F, Habre W, Donati YR, Hantos Z, Barazzone-Argiroffo C: Hyperoxia-induced changes in mouse lung mechanics: forced oscillations vs. barometric plethysmography.
J Appl Physiol 2001, 90:2221–2230."><span data-dcnode-id="4041" instrument_node="">34</span></a><span data-dcnode-id="4039" instrument_node="">, </span><a aria-label="Reference 35" data-dcnode-id="4037" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR35_195" id="ref-link-section-d239179398e1133" title="Tankersley CG, Fitzgerald RS, Mitzner WA, Kleeberger SR: Hypercapnic ventilatory responses in mice differentially susceptible to acute ozone exposure.
J Appl Physiol 1993, 75:2613–2619."><span data-dcnode-id="4038" instrument_node="">35</span></a><span data-dcnode-id="4036" instrument_node="">] and temporarily [</span><a aria-label="Reference 36" data-dcnode-id="4034" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR36_195" id="ref-link-section-d239179398e1136" title="Albertine KH, Wang L, Watanabe S, Marathe GK, Zimmerman GA, McIntyre TM: Temporal correlation of measurements of airway hyperresponsiveness in ovalbumin-sensitized mice.
Am J Physiol Lung Cell Mol Physiol 2002, 283:L219-L233."><span data-dcnode-id="4035" instrument_node="">36</span></a><span data-dcnode-id="4033" instrument_node="">]. These findings show that Penh is not a valid measurement of the lung function of the mouse except as a measure of patterns of respiration, and it has been known for a long time that patterns of respiration usually have little bearing on lung mechanics. Finally, a response in Penh may also be due to changes in nasal cavity resistance, as the upper airways are very significant contributors (50%) to total lung resistance and their contribution is likely to change depending on the experimental situation [</span><a aria-label="Reference 32" data-dcnode-id="4031" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR32_195" id="ref-link-section-d239179398e1139" title="Hammelmann E, Schwarze J, Takeda K, Oshiba A, Larson GL, Irvin CG, Gelfand EW: Noninvasive measurement of airway responsiveness in allergic mice using barometric plethysmography.
Am J Respir Crit Care Med 1997, 156:766–775."><span data-dcnode-id="4032" instrument_node="">32</span></a><span data-dcnode-id="4030" instrument_node="">].</span></p></div></div></section><section data-dcnode-id="3920" data-title="Lung impedance magnitude"><div class="c-article-section" data-dcnode-id="3921" id="Sec8_195-section"><h2 class="c-article-section__title js-section-title js-c-reading-companion-sections-item" data-dcnode-id="4024" id="Sec8_195"><span data-dcnode-id="4025" instrument_node="">Lung impedance magnitude</span></h2><div class="c-article-section__content" data-dcnode-id="3922" id="Sec8_195-content"><p data-dcnode-id="4005"><span data-dcnode-id="4023" instrument_node="">The next step on the phenotyping uncertainty continuum (Figure </span><a data-dcnode-id="4021" data-track="click" data-track-action="figure anchor" data-track-label="link" href="#Fig3_195"><span data-dcnode-id="4022" instrument_node="">3</span></a><span data-dcnode-id="4020" instrument_node="">) is the measurement of the magnitude of respiratory system or lung impedance. Lung impedance is a complex quantity having both real and imaginary parts (see section 'Forced oscillations and the constant phase model'), and its calculation requires rather sophisticated methods. The magnitude of impedance (|</span><i data-dcnode-id="4018"><span data-dcnode-id="4019" instrument_node="">Z</span></i><span data-dcnode-id="4017" instrument_node="">
</span><sub data-dcnode-id="4012"><span data-dcnode-id="4016" instrument_node="">
</span><i data-dcnode-id="4014"><span data-dcnode-id="4015" instrument_node="">rs</span></i><span data-dcnode-id="4013" instrument_node="">
</span></sub><span data-dcnode-id="4011" instrument_node="">|), however, is easily determined simply as the ratio of the absolute value of the swing in pressure (Δ</span><i data-dcnode-id="4009"><span data-dcnode-id="4010" instrument_node="">P</span></i><span data-dcnode-id="4008" instrument_node="">) to the absolute value of the swing in flow (Δ</span><img alt="" data-dcnode-id="4007" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//media.springernature.com/full/springer-static/image/art%253A10.1186/rr199/MediaObjects/12931_2002_195_IEq2_HTML.gif&amp;raw"><span data-dcnode-id="4006" instrument_node="">) occurring over a breath, thus</span></p><span data-dcnode-id="4004" instrument_node="">
</span><div class="c-article-equation" data-dcnode-id="4001" id="Equ5_195"><div class="c-article-equation__content" data-dcnode-id="4002"><img alt="" class="u-display-block" data-dcnode-id="4003" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//media.springernature.com/full/springer-static/image/art%253A10.1186/rr199/MediaObjects/12931_2002_195_Equc_HTML.gif&amp;raw"></div></div><span data-dcnode-id="4000" instrument_node="">

</span><p data-dcnode-id="3311"><span data-dcnode-id="3312" instrument_node="">We believe that the well-founded theoretical basis of the FOT, and its rigorous application in mice, will lead to considerable insight into the functioning of mouse models of lung disease.</span></p></div></div></section><section data-dcnode-id="3301" data-title="Conclusion"><div class="c-article-section" data-dcnode-id="3302" id="Sec11_195-section"><h2 class="c-article-section__title js-section-title js-c-reading-companion-sections-item" data-dcnode-id="3306" id="Sec11_195"><span data-dcnode-id="3307" instrument_node="">Conclusion</span></h2><div class="c-article-section__content" data-dcnode-id="3303" id="Sec11_195-content"><p data-dcnode-id="3304"><span data-dcnode-id="3305" instrument_node="">Measurement of lung function in a creature as small as the mouse presents considerable technical challenges. However, with the exception of the measurement of absolute lung volume and the analysis of blood gases, we have now conquered the challenge of miniaturizing the instrumentation necessary for mouse lung function assessment. Application of advanced techniques such as the FOT coupled with constant-phase model analysis hold particular promise for improved characterization of lung responses to intervention and pathology. With these approaches, we can now unravel the mechanisms of airways dysfunction, the influence of genetics and the immunological factors that define the physionome of the mouse.</span></p></div></div></section><span data-dcnode-id="3300" instrument_node="">
