</span><meta content="Lung volumes are considered part of a complete pulmonary function test, but their value for enhancing clinical decision making is unknown. Unlike spirometry and diffusing capacity of the lung for carbon monoxide (DLCO), which do contribute to confirming or excluding a diagnosis, there are few clear indications when lung volumes are discriminatory. Confirming “restriction” when vital capacity (VC) or FVC is reduced is perhaps the most important. A restrictive pattern can have many etiologies, and clinicians often use VC or FVC as a primary index of lung volume. This makes “physiologic” sense because, in healthy subjects, and in patients with true restriction, VC comprises most of the total lung capacity (TLC). Mixed obstruction-restriction and the nonspecific pattern (ie, reduced FVC and FEV1, normal FEV1/FVC and TLC) require measuring TLC to confirm the underlying physiology. In obesity, VC and TLC may remain within normal limits, but functional residual capacity (FRC) can exponentially decrease. Increased lung volumes, particularly residual volume (RV), are commonly observed in airway obstruction. TLC may be normal, but is frequently increased in the late stages of COPD. Hyperinflation and air-trapping are terms commonly used to reflect these changes, but are not well standardized. The variability of lung volumes related to degree of obstruction suggests that measuring gas-trapping may be needed to monitor therapy. Changes in inspiratory capacity, RV, or FRC may be important gauges of response to bronchodilators or other hyperinflation-reducing therapies. How lung volumes are measured may be important, especially in patients who have moderate or severe airway obstruction. Body plethysmography is often considered more accurate than gas dilution methods in the presence of obstruction. However, the differences between techniques are not completely understood. Newer approaches such as computed tomography, although not suitable for routine testing, may help to delineate the true underlying physiology." data-dcnode-id="8547" name="DC.Description"><span data-dcnode-id="8546" instrument_node="">

</span><meta content="<p>Lung volumes are considered part of a complete pulmonary function test, but their value for enhancing clinical decision making is unknown. Unlike spirometry and diffusing capacity of the lung for carbon monoxide (D<sub>LCO</sub>), which do contribute to confirming or excluding a diagnosis, there are few clear indications when lung volumes are discriminatory. Confirming “restriction” when vital capacity (VC) or FVC is reduced is perhaps the most important. A restrictive pattern can have many etiologies, and clinicians often use VC or FVC as a primary index of lung volume. This makes “physiologic” sense because, in healthy subjects, and in patients with true restriction, VC comprises most of the total lung capacity (TLC). Mixed obstruction-restriction and the nonspecific pattern (ie, reduced FVC and FEV<sub>1</sub>, normal FEV<sub>1</sub>/FVC and TLC) require measuring TLC to confirm the underlying physiology. In obesity, VC and TLC may remain within normal limits, but functional residual capacity (FRC) can exponentially decrease. Increased lung volumes, particularly residual volume (RV), are commonly observed in airway obstruction. TLC may be normal, but is frequently increased in the late stages of COPD. Hyperinflation and air-trapping are terms commonly used to reflect these changes, but are not well standardized. The variability of lung volumes related to degree of obstruction suggests that measuring gas-trapping may be needed to monitor therapy. Changes in inspiratory capacity, RV, or FRC may be important gauges of response to bronchodilators or other hyperinflation-reducing therapies. How lung volumes are measured may be important, especially in patients who have moderate or severe airway obstruction. Body plethysmography is often considered more accurate than gas dilution methods in the presence of obstruction. However, the differences between techniques are not completely understood. Newer approaches such as computed tomography, although not suitable for routine testing, may help to delineate the true underlying physiology.</p>" data-dcnode-id="8537" lang="en" name="citation_abstract"><span data-dcnode-id="8536" instrument_node="">

</span><meta content="Lung volumes are considered part of a complete pulmonary function test, but their value for enhancing clinical decision making is unknown. Unlike spirometry and diffusing capacity of the lung for carbon monoxide (DLCO), which do contribute to confirming or excluding a diagnosis, there are few clear indications when lung volumes are discriminatory. Confirming “restriction” when vital capacity (VC) or FVC is reduced is perhaps the most important. A restrictive pattern can have many etiologies, and clinicians often use VC or FVC as a primary index of lung volume. This makes “physiologic” sense because, in healthy subjects, and in patients with true restriction, VC comprises most of the total lung capacity (TLC). Mixed obstruction-restriction and the nonspecific pattern (ie, reduced FVC and FEV1, normal FEV1/FVC and TLC) require measuring TLC to confirm the underlying physiology. In obesity, VC and TLC may remain within normal limits, but functional residual capacity (FRC) can exponentially decrease. Increased lung volumes, particularly residual volume (RV), are commonly observed in airway obstruction. TLC may be normal, but is frequently increased in the late stages of COPD. Hyperinflation and air-trapping are terms commonly used to reflect these changes, but are not well standardized. The variability of lung volumes related to degree of obstruction suggests that measuring gas-trapping may be needed to monitor therapy. Changes in inspiratory capacity, RV, or FRC may be important gauges of response to bronchodilators or other hyperinflation-reducing therapies. How lung volumes are measured may be important, especially in patients who have moderate or severe airway obstruction. Body plethysmography is often considered more accurate than gas dilution methods in the presence of obstruction. However, the differences between techniques are not completely understood. Newer approaches such as computed tomography, although not suitable for routine testing, may help to delineate the true underlying physiology." data-dcnode-id="8365" name="twitter:description"><span data-dcnode-id="8364" instrument_node="">

</span><div class="highwire-markup" data-dcnode-id="1176"><div class="content-block-markup" data-dcnode-id="1177" data-highwire-cite-ref-tooltip-instance="highwire_reflinks_tooltip" xmlns="http://www.w3.org/1999/xhtml" xmlns:xhtml="http://www.w3.org/1999/xhtml"><div class="article fulltext-view" data-dcnode-id="1179"><span class="highwire-journal-article-marker-start" data-dcnode-id="7344"></span><div class="section abstract" data-dcnode-id="7328" id="abstract-1"><h2 data-dcnode-id="7342"><span data-dcnode-id="7343" instrument_node="">Abstract</span></h2><span data-dcnode-id="7341" instrument_node="">
</span><p data-dcnode-id="7330" id="p-1"><span data-dcnode-id="7340" instrument_node="">Lung volumes are considered part of a complete pulmonary function test, but their value for enhancing clinical decision making is unknown. Unlike spirometry and diffusing capacity of the lung for carbon monoxide (D</span><sub data-dcnode-id="7338"><span data-dcnode-id="7339" instrument_node="">LCO</span></sub><span data-dcnode-id="7337" instrument_node="">), which do contribute to confirming or excluding a diagnosis, there are few clear indications when lung volumes are discriminatory. Confirming “restriction” when vital capacity (VC) or FVC is reduced is perhaps the most important. A restrictive pattern can have many etiologies, and clinicians often use VC or FVC as a primary index of lung volume. This makes “physiologic” sense because, in healthy subjects, and in patients with true restriction, VC comprises most of the total lung capacity (TLC). Mixed obstruction-restriction and the nonspecific pattern (ie, reduced FVC and FEV</span><sub data-dcnode-id="7335"><span data-dcnode-id="7336" instrument_node="">1</span></sub><span data-dcnode-id="7334" instrument_node="">, normal FEV</span><sub data-dcnode-id="7332"><span data-dcnode-id="7333" instrument_node="">1</span></sub><span data-dcnode-id="7331" instrument_node="">/FVC and TLC) require measuring TLC to confirm the underlying physiology. In obesity, VC and TLC may remain within normal limits, but functional residual capacity (FRC) can exponentially decrease. Increased lung volumes, particularly residual volume (RV), are commonly observed in airway obstruction. TLC may be normal, but is frequently increased in the late stages of COPD. Hyperinflation and air-trapping are terms commonly used to reflect these changes, but are not well standardized. The variability of lung volumes related to degree of obstruction suggests that measuring gas-trapping may be needed to monitor therapy. Changes in inspiratory capacity, RV, or FRC may be important gauges of response to bronchodilators or other hyperinflation-reducing therapies. How lung volumes are measured may be important, especially in patients who have moderate or severe airway obstruction. Body plethysmography is often considered more accurate than gas dilution methods in the presence of obstruction. However, the differences between techniques are not completely understood. Newer approaches such as computed tomography, although not suitable for routine testing, may help to delineate the true underlying physiology.</span></p><span data-dcnode-id="7329" instrument_node="">
</span></div><ul class="kwd-group" data-dcnode-id="7321"><li class="kwd" data-dcnode-id="7325"><a class="hw-term hw-article-keyword hw-article-keyword-pulmonary-function" data-dcnode-id="7326" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//rc.rcjournal.com/keyword/pulmonary-function" rel="nofollow"><span data-dcnode-id="7327" instrument_node="">pulmonary function</span></a></li><li class="kwd" data-dcnode-id="7322"><a class="hw-term hw-article-keyword hw-article-keyword-lung-volumes" data-dcnode-id="7323" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//rc.rcjournal.com/keyword/lung-volumes" rel="nofollow"><span data-dcnode-id="7324" instrument_node="">lung volumes</span></a></li></ul><div class="section intro" data-dcnode-id="6932" id="sec-1"><span data-dcnode-id="7320" instrument_node="">
</span><h2 data-dcnode-id="7318"><span data-dcnode-id="7319" instrument_node="">Introduction</span></h2><span data-dcnode-id="7317" instrument_node="">
</span><p data-dcnode-id="7309" id="p-2"><span data-dcnode-id="7316" instrument_node="">The use of computer controlled pulmonary function equipment allows laboratories to perform an array of tests to investigate lung function in a repeatable and standardized manner. In addition to spirometry, measurements of diffusing capacity of the lung for carbon monoxide (D</span><sub data-dcnode-id="7314"><span data-dcnode-id="7315" instrument_node="">LCO</span></sub><span data-dcnode-id="7313" instrument_node="">) and lung volumes have become de rigueur components of a “complete” pulmonary function test (PFT). Lung volumes in this context include measurements of total lung capacity (TLC) and its components, functional residual capacity (FRC) and residual volume (RV). None of these volumes can be measured directly by spirometry; each depends on measurement of the gas trapped in the lung after a maximal exhalation—the RV. Spirometry provides the vital capacity (VC) or FVC and its components, inspiratory capacity (IC) and expiratory reserve volume (ERV), but must be combined with other methods (plethysmography, gas dilution, or imaging) to estimate the trapped volume. While spirometry and D</span><sub data-dcnode-id="7311"><span data-dcnode-id="7312" instrument_node="">LCO</span></sub><span data-dcnode-id="7310" instrument_node=""> each have a lengthy list of indications related to specific disease entities, the clinical indications for measurement of lung volumes are less well defined.</span></p><span data-dcnode-id="7308" instrument_node="">
</span><p data-dcnode-id="7287" id="p-3"><span data-dcnode-id="7307" instrument_node="">All the component tests of a complete PFT are measures of lung physiology. These tests are used to answer a specific clinical question (eg, why is the patient short of breath?), and the results of each should be considered as either supporting or negating the pre-test probability of a suspected diagnosis.</span><sup data-dcnode-id="7304"><a class="xref-bibr" data-dcnode-id="7305" href="#ref-1" id="xref-ref-1-1"><span data-dcnode-id="7306" instrument_node="">1</span></a></sup><span data-dcnode-id="7303" instrument_node=""> Like cardiopulmonary exercise testing, lung volume measurements do not usually reveal a specific diagnosis when used to evaluate dyspnea at rest or during exertion.</span><sup data-dcnode-id="7300"><a class="xref-bibr" data-dcnode-id="7301" href="#ref-2" id="xref-ref-2-1"><span data-dcnode-id="7302" instrument_node="">2</span></a></sup><span data-dcnode-id="7299" instrument_node=""> As is the case with exercise tests, lung volume measurements describe underlying physiologic patterns that should help to refine the differential diagnosis. In much of the literature, the concept of restriction is assessed solely using the VC or FVC,</span><sup data-dcnode-id="7296"><a class="xref-bibr" data-dcnode-id="7297" href="#ref-3" id="xref-ref-3-1"><span data-dcnode-id="7298" instrument_node="">3</span></a></sup><span data-dcnode-id="7295" instrument_node=""> particularly when the etiology relates to chest wall abnormalities. This makes physiologic sense because the VC accounts for approximately 75% of the TLC in healthy young adults, with the proportion decreasing to around 60% in old age (</span><a class="xref-fig" data-dcnode-id="7293" href="#F1" id="xref-fig-1-1"><span data-dcnode-id="7294" instrument_node="">Fig. 1</span></a><span data-dcnode-id="7292" instrument_node="">). FVC is easily measured, and a low value is suggestive of a reduction in TLC as well.</span><sup data-dcnode-id="7289"><a class="xref-bibr" data-dcnode-id="7290" href="#ref-4" id="xref-ref-4-1"><span data-dcnode-id="7291" instrument_node="">4</span></a></sup><span data-dcnode-id="7288" instrument_node=""> This relationship between FVC (VC) and TLC can be expressed as:</span></p><span data-dcnode-id="7286" instrument_node="">
</span><div class="fig pos-float odd" data-dcnode-id="7259" id="F1"><div class="highwire-figure" data-dcnode-id="7268"><div class="fig-inline-img-wrapper" data-dcnode-id="7279"><div class="fig-inline-img" data-dcnode-id="7280"><a class="highwire-fragment fragment-images colorbox-load highwireFiguresMarkupProcessor-processed cboxElement" data-dcnode-id="7281" data-figure-caption="<div class=&quot;highwire-markup&quot;>Ratio of residual volume (RV) to total lung capacity (TLC), plotted as a function of age for authors of white predicted sets in which the ratio was reported. In each study, age is the main coefficient, describing the relationship between RV and TLC (see text).</div>" data-hide-link-title="0" data-icon-position="" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//rc.rcjournal.com/content/respcare/57/1/26/F1.large.jpg%3Fwidth%3D800%26height%3D600%26carousel%3D1" rel="gallery-fragment-images-2018266041" title="Ratio of residual volume (RV) to total lung capacity (TLC), plotted as a function of age for authors of white predicted sets in which the ratio was reported. In each study, age is the main coefficient, describing the relationship between RV and TLC (see text)."><span class="hw-responsive-img" data-dcnode-id="7282"><img alt="Fig. 1." class="highwire-fragment fragment-image lazyloaded" data-dcnode-id="7285" data-src="http://rc.rcjournal.com/content/respcare/57/1/26/F1.medium.gif" height="199" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//rc.rcjournal.com/content/respcare/57/1/26/F1.medium.gif&amp;raw" width="440"><noscript data-dcnode-id="7283"><span data-dcnode-id="7284" instrument_node="">&lt;img class="highwire-fragment fragment-image" alt="Fig. 1." src="http://rc.rcjournal.com/content/respcare/57/1/26/F1.medium.gif" width="440" height="199"/&gt;</span></noscript></span></a></div></div><ul class="highwire-figure-links inline" data-dcnode-id="7269"><li class="download-fig first" data-dcnode-id="727 V%3D2.7.0&amp;raw" style="width: 7px; height: 16px; vertical-align: -4px; margin-right: 0.051em;"></span><span class="mrow" data-dcnode-id="7077" id="MathJax-Span-36" style="padding-left: 0.167em;"><span class="mo" data-dcnode-id="7100" id="MathJax-Span-37"><img data-dcnode-id="7101" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//cdnjs.cloudflare.com/ajax/libs/mathjax/2.7.0/fonts/HTML-CSS/TeX/png/Main/Regular/336/005B.png%3FV%3D2.7.0&amp;raw" style="width: 4px; height: 16px; vertical-align: -4px; margin-right: 0.021em;"></span><span class="mrow" data-dcnode-id="7080" id="MathJax-Span-38"><span class="mn" data-dcnode-id="7098" id="MathJax-Span-39"><img data-dcnode-id="7099" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//cdnjs.cloudflare.com/ajax/libs/mathjax/2.7.0/fonts/HTML-CSS/TeX/png/Main/Regular/336/0031.png%3FV%3D2.7.0&amp;raw" style="width: 7px; height: 10px; margin-right: 0.068em;"></span><span class="mo" data-dcnode-id="7096" id="MathJax-Span-40" style="padding-left: 0.222em;"><img data-dcnode-id="7097" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//cdnjs.cloudflare.com/ajax/libs/mathjax/2.7.0/fonts/HTML-CSS/TeX/png/Main/Regular/336/2212.png%3FV%3D2.7.0&amp;raw" style="width: 11px; height: 1px; vertical-align: 3px; margin-right: 0.078em;"></span><span class="mrow" data-dcnode-id="7081" id="MathJax-Span-41" style="padding-left: 0.222em;"><span class="mo" data-dcnode-id="7094" id="MathJax-Span-42"><img data-dcnode-id="7095" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//cdnjs.cloudflare.com/ajax/libs/mathjax/2.7.0/fonts/HTML-CSS/TeX/png/Main/Regular/336/0028.png%3FV%3D2.7.0&amp;raw" style="width: 5px; height: 16px; vertical-align: -4px; margin-right: 0.052em;"></span><span class="mrow" data-dcnode-id="7084" id="MathJax-Span-43"><span class="mtext" data-dcnode-id="7091" id="MathJax-Span-44"><img data-dcnode-id="7093" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//cdnjs.cloudflare.com/ajax/libs/mathjax/2.7.0/fonts/HTML-CSS/TeX/png/Main/Regular/336/0052.png%3FV%3D2.7.0&amp;raw" style="width: 11px; height: 11px; margin-right: 0.004em;"><img data-dcnode-id="7092" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//cdnjs.cloudflare.com/ajax/libs/mathjax/2.7.0/fonts/HTML-CSS/TeX/png/Main/Regular/336/0056.png%3FV%3D2.7.0&amp;raw" style="width: 11px; height: 11px; vertical-align: -1px; margin-right: 0.019em;"></span><span class="mo" data-dcnode-id="7089" id="MathJax-Span-45"><img data-dcnode-id="7090" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//cdnjs.cloudflare.com/ajax/libs/mathjax/2.7.0/fonts/HTML-CSS/TeX/png/Main/Regular/336/002F.png%3FV%3D2.7.0&amp;raw" style="width: 7px; height: 16px; vertical-align: -4px; margin-right: 0.051em;"></span><span class="mtext" data-dcnode-id="7085" id="MathJax-Span-46"><img data-dcnode-id="7088" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//cdnjs.cloudflare.com/ajax/libs/mathjax/2.7.0/fonts/HTML-CSS/TeX/png/Main/Regular/336/0054.png%3FV%3D2.7.0&amp;raw" style="width: 11px; height: 11px; margin-right: 0.035em;"><img data-dcnode-id="7087" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//cdnjs.cloudflare.com/ajax/libs/mathjax/2.7.0/fonts/HTML-CSS/TeX/png/Main/Regular/336/004C.png%3FV%3D2.7.0&amp;raw" style="width: 9px; height: 11px; margin-right: 0.04em;"><img data-dcnode-id="7086" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//cdnjs.cloudflare.com/ajax/libs/mathjax/2.7.0/fonts/HTML-CSS/TeX/png/Main/Regular/336/0043.png%3FV%3D2.7.0&amp;raw" style="width: 10px; height: 11px; vertical-align: 0px; margin-right: 0.052em;"></span></span><span class="mo" data-dcnode-id="7082" id="MathJax-Span-47"><img data-dcnode-id="7083" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//cdnjs.cloudflare.com/ajax/libs/mathjax/2.7.0/fonts/HTML-CSS/TeX/png/Main/Regular/336/0029.png%3FV%3D2.7.0&amp;raw" style="width: 5px; height: 16px; vertical-align: -4px; margin-right: 0.089em;"></span></span></span><span class="mo" data-dcnode-id="7078" id="MathJax-Span-48"><img data-dcnode-id="7079" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//cdnjs.cloudflare.com/ajax/libs/mathjax/2.7.0/fonts/HTML-CSS/TeX/png/Main/Regular/336/005D.png%3FV%3D2.7.0&amp;raw" style="width: 3px; height: 16px; vertical-align: -4px; margin-right: 0.111em;"></span></span></span></span><span data-dcnode-id="7074" style="display: inline-block; width: 0px; height: 2.202em;"></span></span></span><span data-dcnode-id="7071" style="display: inline-block; overflow: hidden; vertical-align: -0.351em; border-left: 0px solid; width: 0px; height: 1.262em;"></span></span></nobr><span class="MJX_Assistive_MathML MJX_Assistive_MathML_Block" data-dcnode-id="7036" role="presentation"><math data-dcnode-id="7037" display="block" id="mi3" overflow="scroll" xmlns="http://www.w3.org/1998/Math/MathML"><mrow data-dcnode-id="7038"><mtext data-dcnode-id="7067"><span data-dcnode-id="7068" instrument_node="">TLC</span></mtext><mo data-dcnode-id="7065"><span data-dcnode-id="7066" instrument_node="">=</span></mo><mtext data-dcnode-id="7063"><span data-dcnode-id="7064" instrument_node="">FVC</span></mtext><mo data-dcnode-id="7061"><span data-dcnode-id="7062" instrument_node="">/</span></mo><mrow data-dcnode-id="7039"><mo data-dcnode-id="7059"><span data-dcnode-id="7060" instrument_node="">[</span></mo><mrow data-dcnode-id="7042"><mn data-dcnode-id="7057"><span data-dcnode-id="7058" instrument_node="">1</span></mn><mo data-dcnode-id="7055"><span data-dcnode-id="7056" instrument_node="">−</span></mo><mrow data-dcnode-id="7043"><mo data-dcnode-id="7053"><span data-dcnode-id="7054" instrument_node="">(</span></mo><mrow data-dcnode-id="7046"><mtext data-dcnode-id="7051"><span data-dcnode-id="7052" instrument_node="">RV</span></mtext><mo data-dcnode-id="7049"><span data-dcnode-id="7050" instrument_node="">/</span></mo><mtext data-dcnode-id="7047"><span data-dcnode-id="7048" instrument_node="">TLC</span></mtext></mrow><mo data-dcnode-id="7044"><span data-dcnode-id="7045" instrument_node="">)</span></mo></mrow></mrow><mo data-dcnode-id="7040"><span data-dcnode-id="7041" instrument_node="">]</span></mo></mrow></mrow></math></span></span></div></span></span><span data-dcnode-id="7029" instrument_node="">
</span></blockquote><span data-dcnode-id="7027" instrument_node="">
</span><p data-dcnode-id="7022" id="p-7"><span data-dcnode-id="7026" instrument_node="">This has practical applications in that a predicted TLC can be estimated from predicted FVC (VC), but is dependent on how well the predicted FVC fits the patient (age, height, ethnicity, etc), as well as the assumption that RV/TLC ratio is solely a function of age.</span><sup data-dcnode-id="7023"><a class="xref-bibr" data-dcnode-id="7024" href="#ref-5" id="xref-ref-5-1"><span data-dcnode-id="7025" instrument_node="">5</span></a></sup></p><span data-dcnode-id="7021" instrument_node="">
</span><p data-dcnode-id="7004" id="p-8"><span data-dcnode-id="7020" instrument_node="">In many clinical situations, measurement of VC or FVC is all that may be required to assess a patient's lung function.</span><sup data-dcnode-id="7017"><a class="xref-bibr" data-dcnode-id="7018" href="#ref-6" id="xref-ref-6-1"><span data-dcnode-id="7019" instrument_node="">6</span></a></sup><span data-dcnode-id="7016" instrument_node=""> This is particularly true when the subject's diagnosis has been established and pulmonary function testing is being used to track the progression of the disease or response to therapy. It is important to note that measurement of VC or FVC must be performed acceptably. Poorly performed spirometry, whether a forced or slow maneuver, will usually underestimate the true lung volume.</span><sup data-dcnode-id="7013"><a class="xref-bibr" data-dcnode-id="7014" href="#ref-7" id="xref-ref-7-1"><span data-dcnode-id="7015" instrument_node="">7</span></a></sup><span data-dcnode-id="7012" instrument_node=""> Unlike many diagnostic procedures, spirometry and lung volume measurements require effort and cooperation on the part of the subject, along with attention to acceptability and repeatability judged by the testing personnel. In addition to the quality of the data obtained, reference values need to be carefully selected.</span><sup data-dcnode-id="7009"><a class="xref-bibr" data-dcnode-id="7010" href="#ref-1" id="xref-ref-1-2"><span data-dcnode-id="7011" instrument_node="">1</span></a></sup><span data-dcnode-id="7008" instrument_node=""> Although validated reference sets are available for some groups (National Health and Nutrition Examination Survey III for whites, African-Americans, and Mexican-Americans), there are other populations for whom healthy “normal” values are not widely available. VC and FVC are often expressed as percents of the predicted value. Percents of predicted introduce age and height bias. Using a fixed percentage, such as 80% of predicted, as the lower limit of normal (LLN) is inappropriate for judging if the FVC (or any other lung volume) is abnormally low.</span><sup data-dcnode-id="7005"><a class="xref-bibr" data-dcnode-id="7006" href="#ref-8" id="xref-ref-8-1"><span data-dcnode-id="7007" instrument_node="">8</span></a></sup></p><span data-dcnode-id="7003" instrument_node="">
</span><p data-dcnode-id="6984" id="p-9"><span data-dcnode-id="7002" instrument_node="">If the VC maneuver is properly performed and the result is below a statistically valid LLN, additional lung volume measurements may be indicated. A low FVC can be caused by either obstruction or restriction. In the former case, airway obstruction has already been diagnosed by pre- and post-bronchodilator spirometry. Measurement of lung volumes (ie, TLC) in the presence of obstruction will usually show a normal or increased volume. For patients with end-stage emphysema who are candidates for lung-volume reduction, or in the case of bullous emphysema, assessment of RV/TLC may be useful for planning therapy.</span><sup data-dcnode-id="6999"><a class="xref-bibr" data-dcnode-id="7000" href="#ref-9" id="xref-ref-9-1"><span data-dcnode-id="7001" instrument_node="">9</span></a></sup><span data-dcnode-id="6998" instrument_node=""> Lung volumes measured plethysmographically may be compared to those made using dilutional techniques to estimate the volume of trapped gas (see last section of this review). Less commonly, airway obstruction and a restrictive process may co-exist so that TLC is reduced below the LLN in spite of the obstructive process.</span><sup data-dcnode-id="6995"><a class="xref-bibr" data-dcnode-id="6996" href="#ref-10" id="xref-ref-10-1"><span data-dcnode-id="6997" instrument_node="">10</span></a></sup><span data-dcnode-id="6994" instrument_node=""> Some patients who present with symptoms of asthma may have a normal FEV</span><sub data-dcnode-id="6992"><span data-dcnode-id="6993" instrument_node="">1</span></sub><span data-dcnode-id="6991" instrument_node="">/FVC ratio but a decreased FVC or TLC, suggesting true restriction.</span><sup data-dcnode-id="6985"><a class="xref-bibr" data-dcnode-id="6989" href="#ref-11" id="xref-ref-11-1"><span data-dcnode-id="6990" instrument_node="">11</span></a><span data-dcnode-id="6988" instrument_node="">,</span><a class="xref-bibr" data-dcnode-id="6986" href="#ref-12" id="xref-ref-12-1"><span data-dcnode-id="6987" instrument_node="">12</span></a></sup></p><span data-dcnode-id="6983" instrument_node="">
</span><p data-dcnode-id="6981" id="p-10"><span data-dcnode-id="6982" instrument_node="">If the FVC or VC is reduced and there is no evidence of obstruction, lung volumes may be indicated to determine whether the RV is also decreased (see next section). The causes of a restrictive pattern (reduced VC, RV and TLC) can be divided into three categories:</span></p><span data-dcnode-id="6980" instrument_node="">
</span><ul class="list-unord" data-dcnode-id="6964" id="list-1"><li data-dcnode-id="6975" id="list-item-1"><span data-dcnode-id="6979" instrument_node="">
</span><p data-dcnode-id="6977" id="p-11"><span data-dcnode-id="6978" instrument_node="">Intrinsic (eg, interstitial lung disease, pneumonitis)</span></p><span data-dcnode-id="6976" instrument_node="">
</span></li><li data-dcnode-id="6970" id="list-item-2"><span data-dcnode-id="6974" instrument_node="">
</span><p data-dcnode-id="6972" id="p-12"><span data-dcnode-id="6973" instrument_node="">Extrinsic (eg, kyphoscoliosis, cardiomegaly)</span></p><span data-dcnode-id="6971" instrument_node="">
</span></li><li data-dcnode-id="6965" id="list-item-3"><span data-dcnode-id="6969" instrument_node="">
</span><p data-dcnode-id="6967" id="p-13"><span data-dcnode-id="6968" instrument_node="">Neuromuscular (eg, myasthenia, ALS)</span></p><span data-dcnode-id="6966" instrument_node="">
</span></li></ul><span data-dcnode-id="6963" instrument_node="">
</span><p data-dcnode-id="6958" id="p-14"><span data-dcnode-id="6962" instrument_node="">A differential diagnosis based on the patient's history and physical findings, along with a chest x-ray, may be sufficient to establish the cause of the reduced VC. Measurements of RV or TLC help to quantify the extent of the defect, but typically do not provide additional clinical information useful for therapeutic intervention. In cases where the therapy seeks to reverse pulmonary impairment, such as corrective surgery for kyphoscoliosis, lung volumes may be useful to document the improvement. There are a few clinical situations in which lung volumes are characteristically reduced and TLC may be more useful than VC or FVC alone (</span><a class="xref-table" data-dcnode-id="6960" href="#T1" id="xref-table-wrap-1-1"><span data-dcnode-id="6961" instrument_node="">Table 1</span></a><span data-dcnode-id="6959" instrument_node="">).</span></p><span data-dcnode-id="6957" instrument_node="">
</span><div class="table pos-float" data-dcnode-id="6934" id="T1"><div class="table-inline table-callout-links" data-dcnode-id="6943"><div class="callout" data-dcnode-id="6944"><span data-dcnode-id="6955"><span data-dcnode-id="6956" instrument_node="">View this table:</span></span><ul class="callout-links" data-dcnode-id="6945"><li class="view-inline first" data-dcnode-id="6952"><a class="table-expand-inline highwireTablesMarkupProcessor-processed" data-dcnode-id="6953" data-hide-link-title="0" data-icon-position="" data-table-url="/highwire/markup/4804/expansion?postprocessors=highwire_tables%2Chighwire_reclass%2Chighwire_figures%2Chighwire_math%2Chighwire_inline_linked_media%2Chighwire_embed&amp;table-expand-inline=1" href="#%23"><span data-dcnode-id="6954" instrument_node="">View inline</span></a></li><li class="view-popup" data-dcnode-id="6949"><a class="colorbox colorbox-load table-expand-popup init-colorbox-processed cboxElement" data-dcnode-id="6950" data-hide-link-title="0" data-icon-position="" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//rc.rcjournal.com/highwire/markup/4804/expansion%3Fwidth%3D1000%26height%3D500%26iframe%3Dtrue%26postprocessors%3Dhighwire_tables%252Chighwire_reclass%252Chighwire_figures%252Chighwire_math%252Chighwire_inline_linked_media%252Chighwire_embed" rel="gallery-fragment-tables"><span data-dcnode-id="6951" instrument_node="">View popup</span></a></li><li class="download-ppt last" data-dcnode-id="6946"><a class="highwire-figure-link highwire-figure-link-ppt" data-dcnode-id="6947" data-hide-link-title="0" data-icon-position="" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//rc.rcjournal.com/highwire/powerpoint/4804"><span data-dcnode-id="6948" instrument_node="">Download powerpoint</span></a></li></ul></div></div><div class="table-caption" data-dcnode-id="6935"><span class="table-label" data-dcnode-id="6941"><span data-dcnode-id="6942" instrument_node="">Table 1.</span></span><span data-dcnode-id="6940" instrument_node="">
</span><p class="first-child" data-dcnode-id="6938" id="p-15"><span data-dcnode-id="6939" instrument_node="">Clinical Conditions in Which Measurement of Lung Volumes May Be Indicated</span></p><span data-dcnode-id="6937" instrument_node="">
</span><div class="sb-div caption-clear" data-dcnode-id="6936"></div></div></div><span data-dcnode-id="6933" instrument_node="">
</span></div><div class="section" data-dcnode-id="6741" id="sec-2"><span data-dcnode-id="6931" instrument_node="">
</span><h2 data-dcnode-id="6929"><span data-dcnode-id="6930" instrument_node="">Is a Low TLC (ie, Restriction) a Useful Measurement?</span></h2><span data-dcnode-id="6928" instrument_node="">
</span><p data-dcnode-id="6916" id="p-16"><span data-dcnode-id="6927" instrument_node="">Aaron and colleagues</span><sup data-dcnode-id="6924"><a class="xref-bibr" data-dcnode-id="6925" href="#ref-4" id="xref-ref-4-2"><span data-dcnode-id="6926" instrument_node="">4</span></a></sup><span data-dcnode-id="6923" instrument_node=""> demonstrated what might be considered intuitive regarding the relationship between FVC, RV, and TLC. They evaluated 470 patients who had restriction (TLC &lt; 5% CI) to assess whether a low FVC could be used to predict that restriction. When the FVC was within the normal range, the probability of a restrictive pattern was very low (2.4%). If the FVC was reduced, the probability of a reduced RV (and hence a low TLC) was in the range of 50–60%. In effect, a validly performed FVC excludes restriction if it is normal, but requires an additional evaluation if it is low. They also found that a low FVC accompanied by evidence of obstruction (that is a low FEV</span><sub data-dcnode-id="6921"><span data-dcnode-id="6922" instrument_node="">1</span></sub><span data-dcnode-id="6920" instrument_node="">/FVC ratio) reduced the likelihood of restriction even further (</span><a class="xref-fig" data-dcnode-id="6918" href="#F2" id="xref-fig-2-1"><span data-dcnode-id="6919" instrument_node="">Fig. 2</span></a><span data-dcnode-id="6917" instrument_node="">).</span></p><span data-dcnode-id="6915" instrument_node="">
</span><div class="fig pos-float odd" data-dcnode-id="6888" id="F2"><div class="highwire-figure" data-dcnode-id="6897"><div class="fig-inline-img-wrapper" data-dcnode-id="6908"><div class="fig-inline-img" data-dcnode-id="6909"><a class="highwire-fragment fragment-images colorbox-load highwireFiguresMarkupProcessor-processed cboxElement" data-dcnode-id="6910" data-figure-caption="<div class=&quot;highwire-markup&quot;>Probability of restrictive lung disease plotted against FVC (percent of predicted) for a large population of subjects referred for pulmonary function tests. As FVC falls the likelihood of restriction increases, but only to about 50%, and it differs depending on the degree of obstruction present. (From Reference 4, with permission.)</div>" data-hide-link-title="0" data-icon-position="" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//rc.rcjournal.com/content/respcare/57/1/26/F2.large.jpg%3Fwidth%3D800%26height%3D600%26carousel%3D1" rel="gallery-fragment-images-2018266041" title="Probability of restrictive lung disease plotted against FVC (percent of predicted) for a large population of subjects referred for pulmonary function tests. As FVC falls the likelihood of restriction increases, but only to about 50%, and it differs depending on the degree of obstruction present. (From Reference 4, with permission.)"><span class="hw-responsive-img" data-dcnode-id="6911"><img alt="Fig. 2." class="highwire-fragment fragment-image lazyloaded" data-dcnode-id="6914" data-src="http://rc.rcjournal.com/content/respcare/57/1/26/F2.medium.gif" height="390" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//rc.rcjournal.com/content/respcare/57/1/26/F2.medium.gif&amp;raw" width="440"><noscript data-dcnode-id="6912"><span data-dcnode-id="6913" instrument_node="">&lt;img class="highwire-fragment fragment-image" alt="Fig. 2." src="http://rc.rcjournal.com/content/respcare/57/1/26/F2.medium.gif" width="440" height="390"/&gt;</span></noscript></span></a></div></div><ul class="highwire-figure-links inline" data-dcnode-id="6898"><li class="download-fig first" data-dcnode-id="6905"><a class="highwire-figure-link highwire-figure-link-download" data-dcnode-id="6906" data-hide-link-title="0" data-icon-position="" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//rc.rcjournal.com/content/respcare/57/1/26/F2.large.jpg%3Fdownload%3Dtrue" title="Download Fig. 2."><span data-dcnode-id="6907" instrument_node="">Download figure</span></a></li><li class="new-tab" data-dcnode-id="6902"><a class="highwire-figure-link highwire-figure-link-newtab" data-dcnode-id="6903" data-hide-link-title="0" data-icon-position="" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//rc.rcjournal.com/content/respcare/57/1/26/F2.large.jpg" target="_blank"><span data-dcnode-id="6904" instrument_node="">Open in new tab</span></a></li><li class="download-ppt last" data-dcnode-id="6899"><a class="highwire-figure-link highwire-figure-link-ppt" data-dcnode-id="6900" data-hide-link-title="0" data-icon-position="" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//rc.rcjournal.com/highwire/powerpoint/4866"><span data-dcnode-id="6901" instrument_node="">Download powerpoint</span></a></li></ul></div><div class="fig-caption" data-dcnode-id="6889"><span class="fig-label" data-dcnode-id="6895"><span data-dcnode-id="6896" instrument_node="">Fig. 2.</span></span><span data-dcnode-id="6894" instrument_node="">
</span><p class="first-child" data-dcnode-id="6892" id="p-17"><span data-dcnode-id="6893" instrument_node="">Probability of restrictive lung disease plotted against FVC (percent of predicted) for a large population of subjects referred for pulmonary function tests. As FVC falls the likelihood of restriction increases, but only to about 50%, and it differs depending on the degree of obstruction present. (From Reference 4, with permission.)</span></p><span data-dcnode-id="6891" instrument_node="">
</span><div class="sb-div caption-clear" data-dcnode-id="6890"></div></div></div><span data-dcnode-id="6887" instrument_node="">
</span><p data-dcnode-id="6862" id="p-18"><span data-dcnode-id="6886" instrument_node="">The same group modeled and validated an algorithm to assist in decision making regarding when to perform lung volumes to diagnose restriction.</span><sup data-dcnode-id="6883"><a class="xref-bibr" data-dcnode-id="6884" href="#ref-19" id="xref-ref-19-1"><span data-dcnode-id="6885" instrument_node="">19</span></a></sup><span data-dcnode-id="6882" instrument_node=""> Their model suggested that an FVC &lt; 85% of predicted and an FEV</span><sub data-dcnode-id="6880"><span data-dcnode-id="6881" instrument_node="">1</span></sub><span data-dcnode-id="6879" instrument_node="">/FVC &gt; 55% identified patients in whom lung volumes were needed to exclude restriction. This approach had a sensitivity of 96% and a negative predictive value of 98%. Vandervoorde et al</span><sup data-dcnode-id="6876"><a class="xref-bibr" data-dcnode-id="6877" href="#ref-20" id="xref-ref-20-1"><span data-dcnode-id="6878" instrument_node="">20</span></a></sup><span data-dcnode-id="6875" instrument_node=""> found similar results in a large cohort of patients using the FEV</span><sub data-dcnode-id="6873"><span data-dcnode-id="6874" instrument_node="">6</span></sub><span data-dcnode-id="6872" instrument_node=""> as a surrogate for FVC, and FEV</span><sub data-dcnode-id="6870"><span data-dcnode-id="6871" instrument_node="">1</span></sub><span data-dcnode-id="6869" instrument_node="">/FEV</span><sub data-dcnode-id="6867"><span data-dcnode-id="6868" instrument_node="">6</span></sub><span data-dcnode-id="6866" instrument_node=""> as a surrogate for the standard ratio. A normal FVC or FEV</span><sub data-dcnode-id="6864"><span data-dcnode-id="6865" instrument_node="">6</span></sub><span data-dcnode-id="6863" instrument_node=""> almost always excludes a restrictive pattern. Unless there is evidence from the patient's history or physical examination suggesting restriction, measurement of TLC is not needed if the FVC is within normal limits. Restriction is also unlikely in the presence of moderate to severe obstruction.</span></p><span data-dcnode-id="6861" instrument_node="">
</span><p data-dcnode-id="6839" id="p-19"><span data-dcnode-id="6860" instrument_node="">Hyatt et al</span><sup data-dcnode-id="6857"><a class="xref-bibr" data-dcnode-id="6858" href="#ref-21" id="xref-ref-21-1"><span data-dcnode-id="6859" instrument_node="">21</span></a></sup><span data-dcnode-id="6856" instrument_node=""> characterized a commonly observed pattern in which FVC and FEV</span><sub data-dcnode-id="6854"><span data-dcnode-id="6855" instrument_node="">1</span></sub><span data-dcnode-id="6853" instrument_node=""> are reduced, FEV</span><sub data-dcnode-id="6851"><span data-dcnode-id="6852" instrument_node="">1</span></sub><span data-dcnode-id="6850" instrument_node="">/FVC is normal or increased, and TLC is within normal limits; this combination has been termed the “nonspecific” pattern. In a sample of 100 patients with this pattern, two thirds had evidence of airways disease, while the remainder showed signs of thoracic restriction (eg, obesity, etc). The study investigators postulate a </span><em data-dcnode-id="6848"><span data-dcnode-id="6849" instrument_node="">volume de-recruitment</span></em><span data-dcnode-id="6847" instrument_node=""> mechanism to explain the relationship between FVC, RV, and TLC in the subjects with airway involvement. In a follow-up study, Iyer et al</span><sup data-dcnode-id="6844"><a class="xref-bibr" data-dcnode-id="6845" href="#ref-22" id="xref-ref-22-1"><span data-dcnode-id="6846" instrument_node="">22</span></a></sup><span data-dcnode-id="6843" instrument_node=""> looked at a larger cohort of patients with the nonspecific pattern who were tested on more than one occasion. They observed that the non-specific pattern persisted in 64% of the subjects, with equal numbers converting to either an obstructive or a restrictive pattern (15% and 16%, respectively). The overall prevalence of this nonspecific pattern is unknown but may be as high as 10–15%. Accurate measurement of TLC (along with FVC and VC) is required to make the diagnosis, but distinction between true restriction and the nonspecific pattern may be ascertained by clinical diagnosis as well.</span><sup data-dcnode-id="6840"><a class="xref-bibr" data-dcnode-id="6841" href="#ref-23" id="xref-ref-23-1"><span data-dcnode-id="6842" instrument_node="">23</span></a></sup></p><span data-dcnode-id="6838" instrument_node="">
</span><p data-dcnode-id="6806" id="p-20"><span data-dcnode-id="6837" instrument_node="">A reduced TLC can occur in patients with concomitant airway obstruction (ie, mixed obstruction and restriction). The prevalence of mixed obstruction-restriction is unknown but assumed to be an infrequent occurrence. Dykstra and colleagues</span><sup data-dcnode-id="6834"><a class="xref-bibr" data-dcnode-id="6835" href="#ref-24" id="xref-ref-24-1"><span data-dcnode-id="6836" instrument_node="">24</span></a></sup><span data-dcnode-id="6833" instrument_node=""> evaluated 4,774 patients with airway obstruction and found that only 9.5% of those with a reduced FVC also had a TLC below the LLN. In this study, patients who had mixed obstruction-restriction had a higher FEV</span><sub data-dcnode-id="6831"><span data-dcnode-id="6832" instrument_node="">1</span></sub><span data-dcnode-id="6830" instrument_node="">/FVC ratio and less severe obstruction. Balfe and co-workers</span><sup data-dcnode-id="6827"><a class="xref-bibr" data-dcnode-id="6828" href="#ref-10" id="xref-ref-10-2"><span data-dcnode-id="6829" instrument_node="">10</span></a></sup><span data-dcnode-id="6826" instrument_node=""> looked at the possibility of overestimation of the degree of obstruction when there is co-existing restriction. FEV</span><sub data-dcnode-id="6824"><span data-dcnode-id="6825" instrument_node="">1</span></sub><span data-dcnode-id="6823" instrument_node=""> % predicted is used almost universally to categorize the severity of obstruction. But because restrictive lung disease can reduce FEV</span><sub data-dcnode-id="6821"><span data-dcnode-id="6822" instrument_node="">1</span></sub><span data-dcnode-id="6820" instrument_node=""> along with FVC and TLC, the severity of obstruction may be less than in subjects who do not have a restrictive component. Balfe et al found this to be the case in a small cohort of patients and recommended grading severity of obstruction on the basis of their FEV</span><sub data-dcnode-id="6818"><span data-dcnode-id="6819" instrument_node="">1</span></sub><span data-dcnode-id="6817" instrument_node="">/FVC. Recently, Gardner et al</span><sup data-dcnode-id="6814"><a class="xref-bibr" data-dcnode-id="6815" href="#ref-15" id="xref-ref-15-1"><span data-dcnode-id="6816" instrument_node="">15</span></a></sup><span data-dcnode-id="6813" instrument_node=""> identified 199 patients from a large database who had combined obstruction and restriction. These investigators adjusted the FEV</span><sub data-dcnode-id="6811"><span data-dcnode-id="6812" instrument_node="">1</span></sub><span data-dcnode-id="6810" instrument_node=""> % predicted by dividing it by the TLC % predicted and found that three quarters of the patients moved into a less severe category of obstruction (using American Thoracic Society/European Respiratory Society [ATS/ERS] grading for COPD). Similar shifts were observed using asthma severity guidelines. They also noted that adjusted FEV</span><sub data-dcnode-id="6808"><span data-dcnode-id="6809" instrument_node="">1</span></sub><span data-dcnode-id="6807" instrument_node=""> % predicted values correlated better with the observed RV/TLC ratios in these patients. Measurement of TLC is needed to identify mixed obstructive-restrictive patterns and may be useful for more accurately assessing the obstructive component.</span></p><span data-dcnode-id="6805" instrument_node="">
</span><p data-dcnode-id="6777" id="p-21"><span data-dcnode-id="6804" instrument_node="">Some older studies of lung volumes suggested that obesity resulted in a restrictive pattern.</span><sup data-dcnode-id="6801"><a class="xref-bibr" data-dcnode-id="6802" href="#ref-25" id="xref-ref-25-1"><span data-dcnode-id="6803" instrument_node="">25</span></a></sup><span data-dcnode-id="6800" instrument_node=""> A recent investigation by Jones et al</span><sup data-dcnode-id="6797"><a class="xref-bibr" data-dcnode-id="6798" href="#ref-26" id="xref-ref-26-1"><span data-dcnode-id="6799" instrument_node="">26</span></a></sup><span data-dcnode-id="6796" instrument_node=""> looked at lung volumes in 373 patients, across a range of body mass index (BMI) values. In this population increasing BMI was associated with a linear decline in both VC and TLC, but with few individual patients falling below the LLN for either parameter, even in those with morbid obesity. However, the study found an exponential decrease in FRC and ERV, with the steepest decline in those patients in 25–35 kg/m</span><sup data-dcnode-id="6794"><span data-dcnode-id="6795" instrument_node="">2</span></sup><span data-dcnode-id="6793" instrument_node=""> BMI range (</span><a class="xref-fig" data-dcnode-id="6791" href="#F3" id="xref-fig-3-1"><span data-dcnode-id="6792" instrument_node="">Fig. 3</span></a><span data-dcnode-id="6790" instrument_node="">). Because airway resistance increases as FRC decreases, the authors speculate that increased shortness of breath may occur as BMI migrates from overweight into mild obesity. Leone and colleagues</span><sup data-dcnode-id="6787"><a class="xref-bibr" data-dcnode-id="6788" href="#ref-27" id="xref-ref-27-1"><span data-dcnode-id="6789" instrument_node="">27</span></a></sup><span data-dcnode-id="6786" instrument_node=""> investigated the relationship between abdominal obesity and impaired lung function in a very large population residing in Paris. They found that the larger the waist size, the lower the FVC, even in subjects whose overall weight was normal. This degree of abdominal obesity has become commonplace in the United States and is associated with increased risk of death from cardiovascular disease or cancer.</span><sup data-dcnode-id="6783"><a class="xref-bibr" data-dcnode-id="6784" href="#ref-28" id="xref-ref-28-1"><span data-dcnode-id="6785" instrument_node="">28</span></a></sup><span data-dcnode-id="6782" instrument_node=""> Some clinicians regard these spirometric findings as evidence of restriction, without measurement of TLC or FRC. As was observed in the study by Jones and Nzekwu,</span><sup data-dcnode-id="6779"><a class="xref-bibr" data-dcnode-id="6780" href="#ref-26" id="xref-ref-26-2"><span data-dcnode-id="6781" instrument_node="">26</span></a></sup><span data-dcnode-id="6778" instrument_node=""> VC can be significantly reduced but still within normal limits. Spirometry alone may not be able to answer the question, “Is the patient's shortness of breath due to obesity?”</span></p><span data-dcnode-id="6776" instrument_node="">
</span><div class="fig pos-float odd" data-dcnode-id="6743" id="F3"><div class="highwire-figure" data-dcnode-id="6758"><div class="fig-inline-img-wrapper" data-dcnode-id="6769"><div class="fig-inline-img" data-dcnode-id="6770"><a class="highwire-fragment fragment-images colorbox-load highwireFiguresMarkupProcessor-processed cboxElement" data-dcnode-id="6771" data-figure-caption="<div class=&quot;highwire-markup&quot;><div xmlns=&quot;http://www.w3.org/1999/xhtml&quot;>Lung volume changes in obesity. Functional residual capacity (FRC) and expiratory reserve volume (ERV) % predicted plotted versus body mass index (BMI) in 373 patients. Changes in each parameter are exponential (solid curved line), with the greatest change in the transition between overweight (> 25 kg/m<sup>2</sup>) and obese (> 30 kg/m<sup>2</sup>). (From Reference 26, with permission.)</div></div>" data-hide-link-title="0" data-icon-position="" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//rc.rcjournal.com/content/respcare/57/1/26/F3.large.jpg%3Fwidth%3D800%26height%3D600%26carousel%3D1" rel="gallery-fragment-images-2018266041" title="Lung volume changes in obesity. Functional residual capacity (FRC) and expiratory reserve volume (ERV) % predicted plotted versus body mass index (BMI) in 373 patients. Changes in each parameter are exponential (solid curved line), with the greatest change in the transition between overweight (> 25 kg/m2) and obese (> 30 kg/m2). (From Reference 26, with permission.)"><span class="hw-responsive-img" data-dcnode-id="6772"><img alt="Fig. 3." class="highwire-fragment fragment-image lazyload" data-dcnode-id="6775" data-src="http://rc.rcjournal.com/content/respcare/57/1/26/F3.medium.gif" height="440" src="data:image/gif;base64,R0lGODlhAQABAIAAAAAAAP///yH5BAEAAAAALAAAAAABAAEAAAIBRAA7" width="236"><noscript data-dcnode-id="6773"><span data-dcnode-id="6774" instrument_node="">&lt;img class="highwire-fragment fragment-image" alt="Fig. 3." src="http://rc.rcjournal.com/content/respcare/57/1/26/F3.medium.gif" width="236" height="440"/&gt;</span></noscript></span></a></div></div><ul class="highwire-figure-links inline" data-dcnode-id="6759"><li class="download-fig first" data-dcnode-id="6766"><a class="highwire-figure-link highwire-figure-link-download" data-dcnode-id="6767" data-hide-link-title="0" data-icon-position="" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//rc.rcjournal.com/content/respcare/57/1/26/F3.large.jpg%3Fdownload%3Dtrue" title="Download Fig. 3."><span data-dcnode-id="6768" instrument_node="">Download figure</span></a></li><li class="new-tab" data-dcnode-id="6763"><a class="highwire-figure-link highwire-figure-link-newtab" data-dcnode-id="6764" data-hide-link-title="0" data-icon-position="" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//rc.rcjournal.com/content/respcare/57/1/26/F3.large.jpg" target="_blank"><span data-dcnode-id="6765" instrument_node="">Open in new tab</span></a></li><li class="download-ppt last" data-dcnode-id="6760"><a class="highwire-figure-link highwire-figure-link-ppt" data-dcnode-id="6761" data-hide-link-title="0" data-icon-position="" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//rc.rcjournal.com/highwire/powerpoint/4862"><span data-dcnode-id="6762" instrument_node="">Download powerpoint</span></a></li></ul></div><div class="fig-caption" data-dcnode-id="6744"><span class="fig-label" data-dcnode-id="6756"><span data-dcnode-id="6757" instrument_node="">Fig. 3.</span></span><span data-dcnode-id="6755" instrument_node="">
</span><p class="first-child" data-dcnode-id="6747" id="p-22"><span data-dcnode-id="6754" instrument_node="">Lung volume changes in obesity. Functional residual capacity (FRC) and expiratory reserve volume (ERV) % predicted plotted versus body mass index (BMI) in 373 patients. Changes in each parameter are exponential (solid curved line), with the greatest change in the transition between overweight (&gt; 25 kg/m</span><sup data-dcnode-id="6752"><span data-dcnode-id="6753" instrument_node="">2</span></sup><span data-dcnode-id="6751" instrument_node="">) and obese (&gt; 30 kg/m</span><sup data-dcnode-id="6749"><span data-dcnode-id="6750" instrument_node="">2</span></sup><span data-dcnode-id="6748" instrument_node="">). (From Reference 26, with permission.)</span></p><span data-dcnode-id="6746" instrument_node="">
</span><div class="sb-div caption-clear" data-dcnode-id="6745"></div></div></div><span data-dcnode-id="6742" instrument_node="">
</span></div><div class="section" data-dcnode-id="6555" id="sec-3"><span data-dcnode-id="6740" instrument_node="">
</span><h2 data-dcnode-id="6738"><span data-dcnode-id="6739" instrument_node="">Do Lung Volumes Tell Us Anything Meaningful About Obstruction?</span></h2><span data-dcnode-id="6737" instrument_node="">
</span><p data-dcnode-id="6720" id="p-23"><span data-dcnode-id="6736" instrument_node="">The terms “air-trapping” and “hyperinflation” are frequently used in the interpretation of PFTs, although there are no widely accepted definitions for either. These descriptors are usually taken to mean that there are alterations in the normal configuration of lung volume compartments. The RV is increased, both in its absolute volume and in relation to the VC, the TLC, or both.</span><sup data-dcnode-id="6733"><a class="xref-bibr" data-dcnode-id="6734" href="#ref-29" id="xref-ref-29-1"><span data-dcnode-id="6735" instrument_node="">29</span></a></sup><span data-dcnode-id="6732" instrument_node=""> Two presentations of increased RV are commonly observed: one in which RV increases at the expense of the VC, with TLC remaining within normal limits, or a second scenario in which RV increases but with a preserved VC, resulting in an increased TLC.</span><sup data-dcnode-id="6729"><a class="xref-bibr" data-dcnode-id="6730" href="#ref-30" id="xref-ref-30-1"><span data-dcnode-id="6731" instrument_node="">30</span></a></sup><span data-dcnode-id="6728" instrument_node=""> It is unclear how best to describe these changes, but ratios such as the RV/TLC expressed as a percentage have been widely adopted. Many laboratories use a percent of predicted with fixed cutoffs (ie, 80–120%) to assess increases or decreases in lung volumes. Quanjer, in unpublished data (Phillip H Quanjer, on behalf of the Pulmonaria Group, personal communication, 2011), computed the upper limit of normal (ULN) for RV, using anthropometric data (age, height, sex) from the National Health and Nutrition Examination Survey III population and the lung volume equations promulgated by the European Community for Coal and Steel.</span><sup data-dcnode-id="6725"><a class="xref-bibr" data-dcnode-id="6726" href="#ref-31" id="xref-ref-31-1"><span data-dcnode-id="6727" instrument_node="">31</span></a></sup><span data-dcnode-id="6724" instrument_node=""> The value for the upper 5th percentile for each subject was expressed as a percentage of the predicted value. As shown in </span><a class="xref-fig" data-dcnode-id="6722" href="#F4" id="xref-fig-4-1"><span data-dcnode-id="6723" instrument_node="">Figure 4</span></a><span data-dcnode-id="6721" instrument_node=""> (for white subjects) the upper limit of normal for RV is in the range of 140–150% of predicted in young subjects, and decreases to 125–135% in elderly subjects. These data suggest that RV is quite variable in healthy subjects, and that the widely used fixed criterion of 120% may result in an overestimation of gas trapping.</span></p><span data-dcnode-id="6719" instrument_node="">
</span><div class="fig pos-float odd" data-dcnode-id="6692" id="F4"><div class="highwire-figure" data-dcnode-id="6701"><div class="fig-inline-img-wrapper" data-dcnode-id="6712"><div class="fig-inline-img" data-dcnode-id="6713"><a class="highwire-fragment fragment-images colorbox-load highwireFiguresMarkupProcessor-processed cboxElement" data-dcnode-id="6714" data-figure-caption="<div class=&quot;highwire-markup&quot;>Residual volume (RV) upper limit of normal plotted as a percentage of the predicted value. Height and age of white subjects enrolled in the National Health and Nutrition Examination Survey III study were used to calculate the predicted RV and its upper limit of normal, using the European Community for Coal and Steel equations. All values fall above 120% of predicted, a value frequently used as the upper limit of normal when assessing air-trapping. (Unpublished data from Phillip H Quanjer, used with permission.)</div>" data-hide-link-title="0" data-icon-position="" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//rc.rcjournal.com/content/respcare/57/1/26/F4.large.jpg%3Fwidth%3D800%26height%3D600%26carousel%3D1" rel="gallery-fragment-images-2018266041" title="Residual volume (RV) upper limit of normal plotted as a percentage of the predicted value. Height and age of white subjects enrolled in the National Health and Nutrition Examination Survey III study were used to calculate the predicted RV and its upper limit of normal, using the European Community for Coal and Steel equations. All values fall above 120% of predicted, a value frequently used as the upper limit of normal when assessing air-trapping. (Unpublished data from Phillip H Quanjer, used with permission.)"><span class="hw-responsive-img" data-dcnode-id="6715"><img alt="Fig. 4." class="highwire-fragment fragment-image lazyload" data-dcnode-id="6718" data-src="http://rc.rcjournal.com/content/respcare/57/1/26/F4.medium.gif" height="162" src="data:image/gif;base64,R0lGODlhAQABAIAAAAAAAP///yH5BAEAAAAALAAAAAABAAEAAAIBRAA7" width="440"><noscript data-dcnode-id="6716"><span data-dcnode-id="6717" instrument_node="">&lt;img class="highwire-fragment fragment-image" alt="Fig. 4." src="http://rc.rcjournal.com/content/respcare/57/1/26/F4.medium.gif" width="440" height="162"/&gt;</span></noscript></span></a></div></div><ul class="highwire-figure-links inline" data-dcnode-id="6702"><li class="download-fig first" data-dcnode-id="6709"><a class="highwire-figure-link highwire-figure-link-download" data-dcnode-id="6710" data-hide-link-title="0" data-icon-position="" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//rc.rcjournal.com/content/respcare/57/1/26/F4.large.jpg%3Fdownload%3Dtrue" title="Download Fig. 4."><span data-dcnode-id="6711" instrument_node="">Download figure</span></a></li><li class="new-tab" data-dcnode-id="6706"><a class="highwire-figure-link highwire-figure-link-newtab" data-dcnode-id="6707" data-hide-link-title="0" data-icon-position="" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//rc.rcjournal.com/content/respcare/57/1/26/F4.large.jpg" target="_blank"><span data-dcnode-id="6708" instrument_node="">Open in new tab</span></a></li><li class="download-ppt last" data-dcnode-id="6703"><a class="highwire-figure-link highwire-figure-link-ppt" data-dcnode-id="6704" data-hide-link-title="0" data-icon-position="" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//rc.rcjournal.com/highwire/powerpoint/4779"><span data-dcnode-id="6705" instrument_node="">Download powerpoint</span></a></li></ul></div><div class="fig-caption" data-dcnode-id="6693"><span class="fig-label" data-dcnode-id="6699"><span data-dcnode-id="6700" instrument_node="">Fig. 4.</span></span><span data-dcnode-id="6698" instrument_node="">
</span><p class="first-child" data-dcnode-id="6696" id="p-24"><span data-dcnode-id="6697" instrument_node="">Residual volume (RV) upper limit of normal plotted as a percentage of the predicted value. Height and age of white subjects enrolled in the National Health and Nutrition Examination Survey III study were used to calculate the predicted RV and its upper limit of normal, using the European Community for Coal and Steel equations. All values fall above 120% of predicted, a value frequently used as the upper limit of normal when assessing air-trapping. (Unpublished data from Phillip H Quanjer, used with permission.)</span></p><span data-dcnode-id="6695" instrument_node="">
</span><div class="sb-div caption-clear" data-dcnode-id="6694"></div></div></div><span data-dcnode-id="6691" instrument_node="">
</span><p data-dcnode-id="6670" id="p-25"><span data-dcnode-id="6690" instrument_node="">Dykstra and colleagues</span><sup data-dcnode-id="6687"><a class="xref-bibr" data-dcnode-id="6688" href="#ref-24" id="xref-ref-24-2"><span data-dcnode-id="6689" instrument_node="">24</span></a></sup><span data-dcnode-id="6686" instrument_node=""> evaluated TLC, RV, and the RV/TLC ratio in a large group of patients with airway obstruction to see whether lung volumes could discriminate between asthma and COPD. They found that RV and RV/TLC were more sensitive than TLC to the degree of airway obstruction. As airway obstruction (gauged by the FEV</span><sub data-dcnode-id="6684"><span data-dcnode-id="6685" instrument_node="">1</span></sub><span data-dcnode-id="6683" instrument_node=""> % predicted) falls from mild to moderate (∼50%), RV increases while TLC tends to remain the same. In general, lung volumes are not able to distinguish whether the increases are caused by COPD versus asthma, particularly when the diseases have progressed to moderate or severe airway obstruction. However, as shown in </span><a class="xref-fig" data-dcnode-id="6681" href="#F5" id="xref-fig-5-1"><span data-dcnode-id="6682" instrument_node="">Figure 5</span></a><span data-dcnode-id="6680" instrument_node="">, there is a great deal of variability in RV/TLC, particularly around the LLN for FEV</span><sub data-dcnode-id="6678"><span data-dcnode-id="6679" instrument_node="">1</span></sub><span data-dcnode-id="6677" instrument_node="">. Although RV or RV/TLC may not help make a diagnosis as to whether the patient has asthma or COPD, it may be important to know how much “hyperinflation” is present if reducing it is a therapeutic goal.</span><sup data-dcnode-id="6671"><a class="xref-bibr" data-dcnode-id="6675" href="#ref-32" id="xref-ref-32-1"><span data-dcnode-id="6676" instrument_node="">32</span></a><span data-dcnode-id="6674" instrument_node="">,</span><a class="xref-bibr" data-dcnode-id="6672" href="#ref-33" id="xref-ref-33-1"><span data-dcnode-id="6673" instrument_node="">33</span></a></sup></p><span data-dcnode-id="6669" instrument_node="">
</span><div class="fig pos-float odd" data-dcnode-id="6633" id="F5"><div class="highwire-figure" data-dcnode-id="6651"><div class="fig-inline-img-wrapper" data-dcnode-id="6662"><div class="fig-inline-img" data-dcnode-id="6663"><a class="highwire-fragment fragment-images colorbox-load highwireFiguresMarkupProcessor-processed cboxElement" data-dcnode-id="6664" data-figure-caption="<div class=&quot;highwire-markup&quot;><div xmlns=&quot;http://www.w3.org/1999/xhtml&quot;>Residual volume (RV) to total lung capacity (TLC) ratio versus FEV<sub>1</sub> % predicted. RV/TLC, expressed as a percent, is plotted against the % predicted FEV<sub>1</sub> for 4,774 patients with asthma or COPD, with solid lines representing the best fit for each. The shaded area or gray zone represents the large degree of variability for subjects near the lower limit of normal for the FEV<sub>1</sub>. (From Reference 24, with permission.)</div></div>" data-hide-link-title="0" data-icon-position="" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//rc.rcjournal.com/content/respcare/57/1/26/F5.large.jpg%3Fwidth%3D800%26height%3D600%26carousel%3D1" rel="gallery-fragment-images-2018266041" title="Residual volume (RV) to total lung capacity (TLC) ratio versus FEV1 % predicted. RV/TLC, expressed as a percent, is plotted against the % predicted FEV1 for 4,774 patients with asthma or COPD, with solid lines representing the best fit for each. The shaded area or gray zone represents the large degree of variability for subjects near the lower limit of normal for the FEV1. (From Reference 24, with permission.)"><span class="hw-responsive-img" data-dcnode-id="6665"><img alt="Fig. 5." class="highwire-fragment fragment-image lazyload" data-dcnode-id="6668" data-src="http://rc.rcjournal.com/content/respcare/57/1/26/F5.medium.gif" height="331" src="data:image/gif;base64,R0lGODlhAQABAIAAAAAAAP///yH5BAEAAAAALAAAAAABAAEAAAIBRAA7" width="440"><noscript data-dcnode-id="6666"><span data-dcnode-id="6667" instrument_node="">&lt;img class="highwire-fragment fragment-image" alt="Fig. 5." src="http://rc.rcjournal.com/content/respcare/57/1/26/F5.medium.gif" width="440" height="331"/&gt;</span></noscript></span></a></div></div><ul class="highwire-figure-links inline" data-dcnode-id="6652"><li class="download-fig first" data-dcnode-id="6659"><a class="highwire-figure-link highwire-figure-link-download" data-dcnode-id="6660" data-hide-link-title="0" data-icon-position="" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//rc.rcjournal.com/content/respcare/57/1/26/F5.large.jpg%3Fdownload%3Dtrue" title="Download Fig. 5."><span data-dcnode-id="6661" instrument_node="">Download figure</span></a></li><li class="new-tab" data-dcnode-id="6656"><a class="highwire-figure-link highwire-figure-link-newtab" data-dcnode-id="6657" data-hide-link-title="0" data-icon-position="" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//rc.rcjournal.com/content/respcare/57/1/26/F5.large.jpg" target="_blank"><span data-dcnode-id="6658" instrument_node="">Open in new tab</span></a></li><li class="download-ppt last" data-dcnode-id="6653"><a class="highwire-figure-link highwire-figure-link-ppt" data-dcnode-id="6654" data-hide-link-title="0" data-icon-position="" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//rc.rcjournal.com/highwire/powerpoint/4915"><span data-dcnode-id="6655" instrument_node="">Download powerpoint</span></a></li></ul></div><div class="fig-caption" data-dcnode-id="6634"><span class="fig-label" data-dcnode-id="6649"><span data-dcnode-id="6650" instrument_node="">Fig. 5.</span></span><span data-dcnode-id="6648" instrument_node="">
</span><p class="first-child" data-dcnode-id="6637" id="p-26"><span data-dcnode-id="6647" instrument_node="">Residual volume (RV) to total lung capacity (TLC) ratio versus FEV</span><sub data-dcnode-id="6645"><span data-dcnode-id="6646" instrument_node="">1</span></sub><span data-dcnode-id="6644" instrument_node=""> % predicted. RV/TLC, expressed as a percent, is plotted against the % predicted FEV</span><sub data-dcnode-id="6642"><span data-dcnode-id="6643" instrument_node="">1</span></sub><span data-dcnode-id="6641" instrument_node=""> for 4,774 patients with asthma or COPD, with solid lines representing the best fit for each. The shaded area or gray zone represents the large degree of variability for subjects near the lower limit of normal for the FEV</span><sub data-dcnode-id="6639"><span data-dcnode-id="6640" instrument_node="">1</span></sub><span data-dcnode-id="6638" instrument_node="">. (From Reference 24, with permission.)</span></p><span data-dcnode-id="6636" instrument_node="">
</span><div class="sb-div caption-clear" data-dcnode-id="6635"></div></div></div><span data-dcnode-id="6632" instrument_node="">
</span><p data-dcnode-id="6585" id="p-27"><span data-dcnode-id="6631" instrument_node="">There has been substantial interest in the IC as an index of hyperinflation.</span><sup data-dcnode-id="6625"><a class="xref-bibr" data-dcnode-id="6629" href="#ref-34" id="xref-ref-34-1"><span data-dcnode-id="6630" instrument_node="">34</span></a><span data-dcnode-id="6628" instrument_node="">,</span><a class="xref-bibr" data-dcnode-id="6626" href="#ref-35" id="xref-ref-35-1"><span data-dcnode-id="6627" instrument_node="">35</span></a></sup><span data-dcnode-id="6624" instrument_node=""> FRC typically increases as airway obstruction worsens; this frequently results in a reduction in IC, while TLC does not change significantly. For this reason, IC, which can be measured by spirometry, may be a useful way to assess lung volumes without actually measuring FRC or RV. Casanova et al</span><sup data-dcnode-id="6621"><a class="xref-bibr" data-dcnode-id="6622" href="#ref-36" id="xref-ref-36-1"><span data-dcnode-id="6623" instrument_node="">36</span></a></sup><span data-dcnode-id="6620" instrument_node=""> used the ratio of IC/TLC as one such indicator and related it to survival in a population of patients with COPD. They observed significantly increased respiratory and overall mortality when the IC/TLC fell to less than 25%. In addition to serving as an index for survival, IC has also emerged as a useful tool for assessing changes in gas trapping for various therapies. For example, Van Noord and co-workers</span><sup data-dcnode-id="6617"><a class="xref-bibr" data-dcnode-id="6618" href="#ref-37" id="xref-ref-37-1"><span data-dcnode-id="6619" instrument_node="">37</span></a></sup><span data-dcnode-id="6616" instrument_node=""> measured IC over a 24 hour epoch to evaluate reduction in air trapping following treatment with different combinations of bronchodilators. This study recorded acute improvement in IC, which exceeded that of the FEV</span><sub data-dcnode-id="6614"><span data-dcnode-id="6615" instrument_node="">1</span></sub><span data-dcnode-id="6613" instrument_node="">, as well as a larger average increment in IC over the 24-hour period (215 vs 198 mL). Multiple reports from O'Donnell and colleagues</span><sup data-dcnode-id="6607"><a class="xref-bibr" data-dcnode-id="6611" href="#ref-34" id="xref-ref-34-2"><span data-dcnode-id="6612" instrument_node="">34</span></a><span data-dcnode-id="6610" instrument_node="">,</span><a class="xref-bibr" data-dcnode-id="6608" href="#ref-38" id="xref-ref-38-1"><span data-dcnode-id="6609" instrument_node="">38</span></a></sup><span data-dcnode-id="6606" instrument_node=""> have demonstrated that air-trapping, whether measured by FRC or estimated from IC, is closely related to the sensation of dyspnea and to exercise limitation in patients who have COPD. A recent study from this group looked at bronchodilator response as gauged by spirometric (FVC, FEV</span><sub data-dcnode-id="6604"><span data-dcnode-id="6605" instrument_node="">1</span></sub><span data-dcnode-id="6603" instrument_node="">, IC) and lung volume (FRC, RV, TLC) parameters.</span><sup data-dcnode-id="6600"><a class="xref-bibr" data-dcnode-id="6601" href="#ref-39" id="xref-ref-39-1"><span data-dcnode-id="6602" instrument_node="">39</span></a></sup><span data-dcnode-id="6599" instrument_node=""> Notably, they found an increased RV in mild, moderate, and severe obstruction. They also observed that the largest change in percent of predicted following bronchodilator and the frequency of a positive response was greatest for RV (</span><a class="xref-fig" data-dcnode-id="6597" href="#F6" id="xref-fig-6-1"><span data-dcnode-id="6598" instrument_node="">Fig. 6</span></a><span data-dcnode-id="6596" instrument_node="">). Barisione and co-workers</span><sup data-dcnode-id="6593"><a class="xref-bibr" data-dcnode-id="6594" href="#ref-40" id="xref-ref-40-1"><span data-dcnode-id="6595" instrument_node="">40</span></a></sup><span data-dcnode-id="6592" instrument_node=""> reported a decrease in hyperinflation in a small group of subjects experiencing the bronchiolitis obliterans syndrome after hematopoietic stem cell transplantation. They observed an increase in partial flow volume curves that corresponded with a decrease in FRC, even though FEV</span><sub data-dcnode-id="6590"><span data-dcnode-id="6591" instrument_node="">1</span></sub><span data-dcnode-id="6589" instrument_node=""> and FVC did not change. The data from these studies suggest that air-trapping and hyperinflation, and the variables that quantify them, may be important for treating those who have obstruction. IC is a convenient tool for making these types of assessments, but RV may present the best way to evaluate therapies aimed at reducing air-trapping.</span><sup data-dcnode-id="6586"><a class="xref-bibr" data-dcnode-id="6587" href="#ref-41" id="xref-ref-41-1"><span data-dcnode-id="6588" instrument_node="">41</span></a></sup></p><span data-dcnode-id="6584" instrument_node="">
</span><div class="fig pos-float odd" data-dcnode-id="6557" id="F6"><div class="highwire-figure" data-dcnode-id="6566"><div class="fig-inline-img-wrapper" data-dcnode-id="6577"><div class="fig-inline-img" data-dcnode-id="6578"><a class="highwire-fragment fragment-images colorbox-load highwireFiguresMarkupProcessor-processed cboxElement" data-dcnode-id="6579" data-figure-caption="<div class=&quot;highwire-markup&quot;>A: Changes in percent of predicted following bronchodilator for spirometric and lung volumes variables. B: Frequency of a positive bronchodilator response (10% or greater change from baseline) in patients with COPD. RV showed the largest change and had the greatest frequency of positive responses. GOLD = Global Initiative for Chronic Obstructive Lung Disease. IC = inspiratory capacity. FRC = functional residual capacity. RV = residual volume. TLC = total lung capacity. (From Reference 39, with permission.)</div>" data-hide-link-title="0" data-icon-position="" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//rc.rcjournal.com/content/respcare/57/1/26/F6.large.jpg%3Fwidth%3D800%26height%3D600%26carousel%3D1" rel="gallery-fragment-images-2018266041" title="A: Changes in percent of predicted following bronchodilator for spirometric and lung volumes variables. B: Frequency of a positive bronchodilator response (10% or greater change from baseline) in patients with COPD. RV showed the largest change and had the greatest frequency of positive responses. GOLD = Global Initiative for Chronic Obstructive Lung Disease. IC = inspiratory capacity. FRC = functional residual capacity. RV = residual volume. TLC = total lung capacity. (From Reference 39, with permission.)"><span class="hw-responsive-img" data-dcnode-id="6580"><img alt="Fig. 6." class="highwire-fragment fragment-image lazyload" data-dcnode-id="6583" data-src="http://rc.rcjournal.com/content/respcare/57/1/26/F6.medium.gif" height="440" src="data:image/gif;base64,R0lGODlhAQABAIAAAAAAAP///yH5BAEAAAAALAAAAAABAAEAAAIBRAA7" width="404"><noscript data-dcnode-id="6581"><span data-dcnode-id="6582" instrument_node="">&lt;img class="highwire-fragment fragment-image" alt="Fig. 6." src="http://rc.rcjournal.com/content/respcare/57/1/26/F6.medium.gif" width="404" height="440"/&gt;</span></noscript></span></a></div></div><ul class="highwire-figure-links inline" data-dcnode-id="6567"><li class="download-fig first" data-dcnode-id="6574"><a class="highwire-figure-link highwire-figure-link-download" data-dcnode-id="6575" data-hide-link-title="0" data-icon-position="" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//rc.rcjournal.com/content/respcare/57/1/26/F6.large.jpg%3Fdownload%3Dtrue" title="Download Fig. 6."><span data-dcnode-id="6576" instrument_node="">Download figure</span></a></li><li class="new-tab" data-dcnode-id="6571"><a class="highwire-figure-link highwire-figure-link-newtab" data-dcnode-id="6572" data-hide-link-title="0" data-icon-position="" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//rc.rcjournal.com/content/respcare/57/1/26/F6.large.jpg" target="_blank"><span data-dcnode-id="6573" instrument_node="">Open in new tab</span></a></li><li class="download-ppt last" data-dcnode-id="6568"><a class="highwire-figure-link highwire-figure-link-ppt" data-dcnode-id="6569" data-hide-link-title="0" data-icon-position="" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//rc.rcjournal.com/highwire/powerpoint/4923"><span data-dcnode-id="6570" instrument_node="">Download powerpoint</span></a></li></ul></div><div class="fig-caption" data-dcnode-id="6558"><span class="fig-label" data-dcnode-id="6564"><span data-dcnode-id="6565" instrument_node="">Fig. 6.</span></span><span data-dcnode-id="6563" instrument_node="">
</span><p class="first-child" data-dcnode-id="6561" id="p-28"><span data-dcnode-id="6562" instrument_node="">A: Changes in percent of predicted following bronchodilator for spirometric and lung volumes variables. B: Frequency of a positive bronchodilator response (10% or greater change from baseline) in patients with COPD. RV showed the largest change and had the greatest frequency of positive responses. GOLD = Global Initiative for Chronic Obstructive Lung Disease. IC = inspiratory capacity. FRC = functional residual capacity. RV = residual volume. TLC = total lung capacity. (From Reference 39, with permission.)</span></p><span data-dcnode-id="6560" instrument_node="">
</span><div class="sb-div caption-clear" data-dcnode-id="6559"></div></div></div><span data-dcnode-id="6556" instrument_node="">
</span></div><div class="section" data-dcnode-id="6375" id="sec-4"><span data-dcnode-id="6554" instrument_node="">
</span><h2 data-dcnode-id="6552"><span data-dcnode-id="6553" instrument_node="">Does It Make Any Difference How You Measure Lung Volumes?</span></h2><span data-dcnode-id="6551" instrument_node="">
