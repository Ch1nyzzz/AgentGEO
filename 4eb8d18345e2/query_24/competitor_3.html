</span><p data-dcnode-id="6538" id="p-29"><span data-dcnode-id="6550" instrument_node="">In 2005 a joint committee of the ATS/ERS published the first comprehensive guidelines for performance of lung volumes.</span><sup data-dcnode-id="6547"><a class="xref-bibr" data-dcnode-id="6548" href="#ref-6" id="xref-ref-6-2"><span data-dcnode-id="6549" instrument_node="">6</span></a></sup><span data-dcnode-id="6546" instrument_node=""> Included in these were recommendations for performance of plethysmographic and gas dilution lung volumes. No one methodology was promoted over the others, but the advantages and disadvantages of each were laid out, along with “best practices,” as judged by the committee. Body plethysmography was recognized as a technique that overcomes problems of maldistribution of gas within the lung, but at the same time could overestimate lung volumes unless the subject was coached to pant at frequencies &lt; 1 Hz.</span><sup data-dcnode-id="6543"><a class="xref-bibr" data-dcnode-id="6544" href="#ref-42" id="xref-ref-42-1"><span data-dcnode-id="6545" instrument_node="">42</span></a></sup><span data-dcnode-id="6542" instrument_node=""> The guidelines also recognized that dilutional techniques (ie, He dilution or N</span><sub data-dcnode-id="6540"><span data-dcnode-id="6541" instrument_node="">2</span></sub><span data-dcnode-id="6539" instrument_node=""> washout) could underestimate lung volume in patients who have airway obstruction. Because each of these techniques measures FRC, linked slow VC maneuvers were recommended for the calculation of RV and TLC. The guidelines note that imaging techniques (computed tomography [CT], chest roentgenogram, etc) compare favorably with plethysmography and gas dilution. However, imaging technologies require the patient to breath-hold at or near TLC, may expose the patient to excessive radiation, and tend to be prohibitively expensive for routine measurements.</span></p><span data-dcnode-id="6537" instrument_node="">
</span><p data-dcnode-id="6518" id="p-30"><span data-dcnode-id="6536" instrument_node="">Plethysmographic overestimation of thoracic gas volume (V</span><sub data-dcnode-id="6534"><span data-dcnode-id="6535" instrument_node="">TG</span></sub><span data-dcnode-id="6533" instrument_node="">) in patients with moderate or severe obstruction was pointed out almost 30 years ago by Rodenstein and Stanescu</span><sup data-dcnode-id="6530"><a class="xref-bibr" data-dcnode-id="6531" href="#ref-43" id="xref-ref-43-1"><span data-dcnode-id="6532" instrument_node="">43</span></a></sup><span data-dcnode-id="6529" instrument_node=""> and Shore et al.</span><sup data-dcnode-id="6526"><a class="xref-bibr" data-dcnode-id="6527" href="#ref-44" id="xref-ref-44-1"><span data-dcnode-id="6528" instrument_node="">44</span></a></sup><span data-dcnode-id="6525" instrument_node=""> This was demonstrated by measuring esophageal pressure during plethysmographic maneuvers and comparing it to the conventional mouth pressure signal. In healthy subjects these 2 signals are quite similar, both reflecting changes in alveolar pressure. In obstructed patients, mouth pressure may not equal alveolar pressure for any of several reasons, and true alveolar pressure changes are usually underestimated. There may also be a significant phase shift between mouth and box pressures. As a result, the slope of the line that defines the relationship between mouth pressure and box pressure is spuriously reduced and V</span><sub data-dcnode-id="6523"><span data-dcnode-id="6524" instrument_node="">TG</span></sub><span data-dcnode-id="6522" instrument_node=""> is overestimated. Fortunately, these phenomena are frequency dependent; the magnitude of the error increases as panting frequencies rise above 1 Hz. To minimize overestimation of V</span><sub data-dcnode-id="6520"><span data-dcnode-id="6521" instrument_node="">TG</span></sub><span data-dcnode-id="6519" instrument_node=""> in obstructed patients, coach them to pant slowly at, 0.5 to 1.0 Hz.</span></p><span data-dcnode-id="6517" instrument_node="">
</span><p data-dcnode-id="6475" id="p-31"><span data-dcnode-id="6516" instrument_node="">A recent study by O'Donnell and colleagues</span><sup data-dcnode-id="6513"><a class="xref-bibr" data-dcnode-id="6514" href="#ref-45" id="xref-ref-45-1"><span data-dcnode-id="6515" instrument_node="">45</span></a></sup><span data-dcnode-id="6512" instrument_node=""> resurrected the discussion regarding overestimation of lung volumes by the plethysmographic method. These investigators looked at 132 patients in 3 centers and compared lung volumes measured by body plethysmography, He dilution, and CT. Standardized methodology was used for each lung volume technique. Significant differences were observed between plethysmography and either CT or He dilution, but not between CT and He dilution. In subjects with obstruction the mean differences between body plethysmograph and the other 2 techniques were approximately 1 L (</span><a class="xref-table" data-dcnode-id="6510" href="#T2" id="xref-table-wrap-2-1"><span data-dcnode-id="6511" instrument_node="">Table 2</span></a><span data-dcnode-id="6509" instrument_node="">). The largest differences (&gt; 1 L) were usually in patients with very severe obstruction (FEV</span><sub data-dcnode-id="6507"><span data-dcnode-id="6508" instrument_node="">1</span></sub><span data-dcnode-id="6506" instrument_node=""> &lt; 30% predicted). These results suggest that perhaps plethysmography, even if performed properly, may overestimate lung volumes in severely obstructed patients. It is noteworthy that this paper generated a substantial volume of responses.</span><sup data-dcnode-id="6500"><a class="xref-bibr" data-dcnode-id="6504" href="#ref-46" id="xref-ref-46-1"><span data-dcnode-id="6505" instrument_node="">46</span></a><span data-dcnode-id="6503" instrument_node="">,</span><a class="xref-bibr" data-dcnode-id="6501" href="#ref-47" id="xref-ref-47-1"><span data-dcnode-id="6502" instrument_node="">47</span></a></sup><span data-dcnode-id="6499" instrument_node=""> Most of these pointed out basic differences in the methodologies (eg, CT performed supine, breath-holding at TLC, etc). Milite et al</span><sup data-dcnode-id="6496"><a class="xref-bibr" data-dcnode-id="6497" href="#ref-48" id="xref-ref-48-1"><span data-dcnode-id="6498" instrument_node="">48</span></a></sup><span data-dcnode-id="6495" instrument_node=""> examined differences between single- and multiple-breath dilutional techniques and body plethysmograph in 55 patients with emphysema. In their comparison of He dilution and plethysmographic lung volumes they observed a mean difference of approximately 500 mL, which appeared to be unrelated to the severity of obstruction (</span><em data-dcnode-id="6493"><span data-dcnode-id="6494" instrument_node="">P</span></em><span data-dcnode-id="6492" instrument_node=""> for interaction = .25). This study also confirmed what has been demonstrated repeatedly, that lung volumes measured by single-breath dilution are significantly lower than either multiple-breath dilution or plethysmographic volumes</span><sup data-dcnode-id="6486"><a class="xref-bibr" data-dcnode-id="6490" href="#ref-49" id="xref-ref-49-1"><span data-dcnode-id="6491" instrument_node="">49</span></a><span data-dcnode-id="6489" instrument_node="">,</span><a class="xref-bibr" data-dcnode-id="6487" href="#ref-50" id="xref-ref-50-1"><span data-dcnode-id="6488" instrument_node="">50</span></a></sup><span data-dcnode-id="6485" instrument_node=""> (</span><a class="xref-fig" data-dcnode-id="6483" href="#F7" id="xref-fig-7-1"><span data-dcnode-id="6484" instrument_node="">Fig. 7</span></a><span data-dcnode-id="6482" instrument_node="">). When lung volumes are used to make therapeutic/clinical decisions, the method by which those volumes are derived may need to be considered.</span><sup data-dcnode-id="6476"><a class="xref-bibr" data-dcnode-id="6480" href="#ref-32" id="xref-ref-32-2"><span data-dcnode-id="6481" instrument_node="">32</span></a><span data-dcnode-id="6479" instrument_node="">,</span><a class="xref-bibr" data-dcnode-id="6477" href="#ref-51" id="xref-ref-51-1"><span data-dcnode-id="6478" instrument_node="">51</span></a></sup></p><span data-dcnode-id="6474" instrument_node="">
</span><div class="table pos-float" data-dcnode-id="6451" id="T2"><div class="table-inline table-callout-links" data-dcnode-id="6460"><div class="callout" data-dcnode-id="6461"><span data-dcnode-id="6472"><span data-dcnode-id="6473" instrument_node="">View this table:</span></span><ul class="callout-links" data-dcnode-id="6462"><li class="view-inline first" data-dcnode-id="6469"><a class="table-expand-inline highwireTablesMarkupProcessor-processed" data-dcnode-id="6470" data-hide-link-title="0" data-icon-position="" data-table-url="/highwire/markup/4963/expansion?postprocessors=highwire_tables%2Chighwire_reclass%2Chighwire_figures%2Chighwire_math%2Chighwire_inline_linked_media%2Chighwire_embed&amp;table-expand-inline=1" href="#%23"><span data-dcnode-id="6471" instrument_node="">View inline</span></a></li><li class="view-popup" data-dcnode-id="6466"><a class="colorbox colorbox-load table-expand-popup init-colorbox-processed cboxElement" data-dcnode-id="6467" data-hide-link-title="0" data-icon-position="" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//rc.rcjournal.com/highwire/markup/4963/expansion%3Fwidth%3D1000%26height%3D500%26iframe%3Dtrue%26postprocessors%3Dhighwire_tables%252Chighwire_reclass%252Chighwire_figures%252Chighwire_math%252Chighwire_inline_linked_media%252Chighwire_embed" rel="gallery-fragment-tables"><span data-dcnode-id="6468" instrument_node="">View popup</span></a></li><li class="download-ppt last" data-dcnode-id="6463"><a class="highwire-figure-link highwire-figure-link-ppt" data-dcnode-id="6464" data-hide-link-title="0" data-icon-position="" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//rc.rcjournal.com/highwire/powerpoint/4963"><span data-dcnode-id="6465" instrument_node="">Download powerpoint</span></a></li></ul></div></div><div class="table-caption" data-dcnode-id="6452"><span class="table-label" data-dcnode-id="6458"><span data-dcnode-id="6459" instrument_node="">Table 2.</span></span><span data-dcnode-id="6457" instrument_node="">
</span><p class="first-child" data-dcnode-id="6455" id="p-32"><span data-dcnode-id="6456" instrument_node="">Comparison of Mean Differences in Lung Volumes in Patients With Airway Obstruction*</span></p><span data-dcnode-id="6454" instrument_node="">
</span><div class="sb-div caption-clear" data-dcnode-id="6453"></div></div></div><span data-dcnode-id="6450" instrument_node="">
</span><div class="fig pos-float odd" data-dcnode-id="6396" id="F7"><div class="highwire-figure" data-dcnode-id="6432"><div class="fig-inline-img-wrapper" data-dcnode-id="6443"><div class="fig-inline-img" data-dcnode-id="6444"><a class="highwire-fragment fragment-images colorbox-load highwireFiguresMarkupProcessor-processed cboxElement" data-dcnode-id="6445" data-figure-caption="<div class=&quot;highwire-markup&quot;><div xmlns=&quot;http://www.w3.org/1999/xhtml&quot;>Comparison of total lung capacity (TLC) measured by single-breath (SB) gas dilution, rebreathing (RB) gas dilution, and plethysmography (pleth) as the reference in normal subjects and patients with emphysema. Bars represent quartiles of FEV<sub>1</sub> % predicted as an index of obstruction: quartile 1 = lowest quartile for FEV<sub>1</sub> %. <em>P</em> values represent the interaction between FEV<sub>1</sub> % (as a continuous measure) and the respective lung volume. <em>P</em> values < .05 indicate that lung volume agreement varies with the degree of obstruction (FEV<sub>1</sub> %). TLC<sub>SB</sub> significantly underestimates lung volume when compared to either RB or pleth. TLC<sub>RB</sub> does not show significant interaction with FEV<sub>1</sub> % in the patients with emphysema, suggesting that the rebreathing technique is minimally affected by airway obstruction. (From Reference 48, with permission.)</div></div>" data-hide-link-title="0" data-icon-position="" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//rc.rcjournal.com/content/respcare/57/1/26/F7.large.jpg%3Fwidth%3D800%26height%3D600%26carousel%3D1" rel="gallery-fragment-images-2018266041" title="Comparison of total lung capacity (TLC) measured by single-breath (SB) gas dilution, rebreathing (RB) gas dilution, and plethysmography (pleth) as the reference in normal subjects and patients with emphysema. Bars represent quartiles of FEV1 % predicted as an index of obstruction: quartile 1 = lowest quartile for FEV1 %. P values represent the interaction between FEV1 % (as a continuous measure) and the respective lung volume. P values < .05 indicate that lung volume agreement varies with the degree of obstruction (FEV1 %). TLCSB significantly underestimates lung volume when compared to either RB or pleth. TLCRB does not show significant interaction with FEV1 % in the patients with emphysema, suggesting that the rebreathing technique is minimally affected by airway obstruction. (From Reference 48, with permission.)"><span class="hw-responsive-img" data-dcnode-id="6446"><img alt="Fig. 7." class="highwire-fragment fragment-image lazyload" data-dcnode-id="6449" data-src="http://rc.rcjournal.com/content/respcare/57/1/26/F7.medium.gif" height="178" src="data:image/gif;base64,R0lGODlhAQABAIAAAAAAAP///yH5BAEAAAAALAAAAAABAAEAAAIBRAA7" width="440"><noscript data-dcnode-id="6447"><span data-dcnode-id="6448" instrument_node="">&lt;img class="highwire-fragment fragment-image" alt="Fig. 7." src="http://rc.rcjournal.com/content/respcare/57/1/26/F7.medium.gif" width="440" height="178"/&gt;</span></noscript></span></a></div></div><ul class="highwire-figure-links inline" data-dcnode-id="6433"><li class="download-fig first" data-dcnode-id="6440"><a class="highwire-figure-link highwire-figure-link-download" data-dcnode-id="6441" data-hide-link-title="0" data-icon-position="" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//rc.rcjournal.com/content/respcare/57/1/26/F7.large.jpg%3Fdownload%3Dtrue" title="Download Fig. 7."><span data-dcnode-id="6442" instrument_node="">Download figure</span></a></li><li class="new-tab" data-dcnode-id="6437"><a class="highwire-figure-link highwire-figure-link-newtab" data-dcnode-id="6438" data-hide-link-title="0" data-icon-position="" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//rc.rcjournal.com/content/respcare/57/1/26/F7.large.jpg" target="_blank"><span data-dcnode-id="6439" instrument_node="">Open in new tab</span></a></li><li class="download-ppt last" data-dcnode-id="6434"><a class="highwire-figure-link highwire-figure-link-ppt" data-dcnode-id="6435" data-hide-link-title="0" data-icon-position="" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//rc.rcjournal.com/highwire/powerpoint/4856"><span data-dcnode-id="6436" instrument_node="">Download powerpoint</span></a></li></ul></div><div class="fig-caption" data-dcnode-id="6397"><span class="fig-label" data-dcnode-id="6430"><span data-dcnode-id="6431" instrument_node="">Fig. 7.</span></span><span data-dcnode-id="6429" instrument_node="">
</span><p class="first-child" data-dcnode-id="6400" id="p-33"><span data-dcnode-id="6428" instrument_node="">Comparison of total lung capacity (TLC) measured by single-breath (SB) gas dilution, rebreathing (RB) gas dilution, and plethysmography (pleth) as the reference in normal subjects and patients with emphysema. Bars represent quartiles of FEV</span><sub data-dcnode-id="6426"><span data-dcnode-id="6427" instrument_node="">1</span></sub><span data-dcnode-id="6425" instrument_node=""> % predicted as an index of obstruction: quartile 1 = lowest quartile for FEV</span><sub data-dcnode-id="6423"><span data-dcnode-id="6424" instrument_node="">1</span></sub><span data-dcnode-id="6422" instrument_node=""> %. </span><em data-dcnode-id="6420"><span data-dcnode-id="6421" instrument_node="">P</span></em><span data-dcnode-id="6419" instrument_node=""> values represent the interaction between FEV</span><sub data-dcnode-id="6417"><span data-dcnode-id="6418" instrument_node="">1</span></sub><span data-dcnode-id="6416" instrument_node=""> % (as a continuous measure) and the respective lung volume. </span><em data-dcnode-id="6414"><span data-dcnode-id="6415" instrument_node="">P</span></em><span data-dcnode-id="6413" instrument_node=""> values &lt; .05 indicate that lung volume agreement varies with the degree of obstruction (FEV</span><sub data-dcnode-id="6411"><span data-dcnode-id="6412" instrument_node="">1</span></sub><span data-dcnode-id="6410" instrument_node=""> %). TLC</span><sub data-dcnode-id="6408"><span data-dcnode-id="6409" instrument_node="">SB</span></sub><span data-dcnode-id="6407" instrument_node=""> significantly underestimates lung volume when compared to either RB or pleth. TLC</span><sub data-dcnode-id="6405"><span data-dcnode-id="6406" instrument_node="">RB</span></sub><span data-dcnode-id="6404" instrument_node=""> does not show significant interaction with FEV</span><sub data-dcnode-id="6402"><span data-dcnode-id="6403" instrument_node="">1</span></sub><span data-dcnode-id="6401" instrument_node=""> % in the patients with emphysema, suggesting that the rebreathing technique is minimally affected by airway obstruction. (From Reference 48, with permission.)</span></p><span data-dcnode-id="6399" instrument_node="">
</span><div class="sb-div caption-clear" data-dcnode-id="6398"></div></div></div><span data-dcnode-id="6395" instrument_node="">
</span><p data-dcnode-id="6377" id="p-34"><span data-dcnode-id="6394" instrument_node="">CT scanning provides an option to body plethysmography or gas dilution for measuring lung volumes.</span><sup data-dcnode-id="6391"><a class="xref-bibr" data-dcnode-id="6392" href="#ref-52" id="xref-ref-52-1"><span data-dcnode-id="6393" instrument_node="">52</span></a></sup><span data-dcnode-id="6390" instrument_node=""> However, it is more expensive than any of the conventional methods. It also requires the subject to breath-hold at or near TLC, which may be difficult for many patients.</span><sup data-dcnode-id="6387"><a class="xref-bibr" data-dcnode-id="6388" href="#ref-53" id="xref-ref-53-1"><span data-dcnode-id="6389" instrument_node="">53</span></a></sup><span data-dcnode-id="6386" instrument_node=""> Although spirometry can be used to verify that the patient inspired to near TLC, this is not done routinely. A recent review of low dose ionizing radiation from procedures done after myocardial infarction suggests that there is an increased risk of cancer as result of these procedures.</span><sup data-dcnode-id="6383"><a class="xref-bibr" data-dcnode-id="6384" href="#ref-54" id="xref-ref-54-1"><span data-dcnode-id="6385" instrument_node="">54</span></a></sup><span data-dcnode-id="6382" instrument_node=""> CT of the chest typically gives a lower dose than myocardial perfusion imaging (7 vs 15.6 milli-Sieverts), but is similar to that of a cardiac catheterization or CT of the abdomen.</span><sup data-dcnode-id="6379"><a class="xref-bibr" data-dcnode-id="6380" href="#ref-55" id="xref-ref-55-1"><span data-dcnode-id="6381" instrument_node="">55</span></a></sup><span data-dcnode-id="6378" instrument_node=""> If a patient needs a chest CT for diagnostic purposes, calculation of lung volume may be a useful adjunct.</span></p><span data-dcnode-id="6376" instrument_node="">
</span></div><div class="section" data-dcnode-id="6340" id="sec-5"><span data-dcnode-id="6374" instrument_node="">
</span><h2 data-dcnode-id="6372"><span data-dcnode-id="6373" instrument_node="">Summary</span></h2><span data-dcnode-id="6371" instrument_node="">
</span><p data-dcnode-id="6366" id="p-35"><span data-dcnode-id="6370" instrument_node="">Lung volumes do not provide much additional information for clinical decision making in most patients. An estimate of TLC may be required to resolve whether proportionately reduced FVC and FEV</span><sub data-dcnode-id="6368"><span data-dcnode-id="6369" instrument_node="">1</span></sub><span data-dcnode-id="6367" instrument_node=""> are caused by obstruction or restriction. TLC is indicated only if it assists in confirming or rejecting a diagnosis, or if it is needed for planning a course of therapy. Clinicians should ask the question, “What will I do with the result of the lung volume measurement?”</span></p><span data-dcnode-id="6365" instrument_node="">
</span><p data-dcnode-id="6354" id="p-36"><span data-dcnode-id="6364" instrument_node="">Because the FVC (or VC) comprises most of the TLC in healthy subjects and in those with pure restrictive disorders, a valid measurement of FVC provides valuable information about the lung volumes in general. Many patients present with a nonspecific ventilatory pattern in which FVC and FEV</span><sub data-dcnode-id="6362"><span data-dcnode-id="6363" instrument_node="">1</span></sub><span data-dcnode-id="6361" instrument_node=""> are reduced, but FEV</span><sub data-dcnode-id="6359"><span data-dcnode-id="6360" instrument_node="">1</span></sub><span data-dcnode-id="6358" instrument_node="">/FVC is normal or supra-normal. The other feature of the nonspecific pattern is a normal TLC. In order to confirm this pattern, an estimate of TLC is needed. Current evidence suggests that the nonspecific pattern may be associated with airway obstruction or obesity, but a majority of these patients do not convert to a conventional obstructive or restrictive pattern. Mixed obstructive-restrictive patterns are not common but may occur in about 10% of patients referred for PFTs. Measurement of TLC (% predicted) can be used to adjust the FEV</span><sub data-dcnode-id="6356"><span data-dcnode-id="6357" instrument_node="">1</span></sub><span data-dcnode-id="6355" instrument_node=""> % predicted to better categorize the degree of obstruction in patients who have mixed disease. Obesity is frequently assumed to cause restriction, but it appears that the most significant reductions occur, not in TLC or VC, but in FRC and ERV. These reductions tend to be exponential, with the most significant changes in those who are just overweight or mildly obese.</span></p><span data-dcnode-id="6353" instrument_node="">
</span><p data-dcnode-id="6345" id="p-37"><span data-dcnode-id="6352" instrument_node="">The usefulness of lung volumes is largely dependent on whether or not we need to know how large the RV is. RV appears to be quite variable in healthy subjects, and the upper limit of normal is probably significantly greater than 120% of predicted. It is clear that RV, TLC, and the RV/TLC ratio all increase as airway obstruction worsens, but none of these measures does very well at distinguishing between asthma, COPD, or other causes of obstruction. But the variability of RV when the FEV</span><sub data-dcnode-id="6350"><span data-dcnode-id="6351" instrument_node="">1</span></sub><span data-dcnode-id="6349" instrument_node=""> is near its LLN may be reason enough to measure it if the result can assist in making therapeutic decisions. IC also reveals a lot about air-trapping because it reflects the end-expiratory level (ie, the FRC). Measuring IC requires only a spirometer; hence, it has demonstrated usefulness for quantifying increases in air-trapping during exercise as well as for decreases resulting from bronchodilator therapy. The prognosis for patients with airway obstruction, however, requires that the IC be related to the TLC (ie, IC/TLC ratio). Lastly, there is some evidence that changes in RV may be better than changes in FVC, FEV</span><sub data-dcnode-id="6347"><span data-dcnode-id="6348" instrument_node="">1</span></sub><span data-dcnode-id="6346" instrument_node="">, IC, or TLC to account for an individual patient's response to bronchodilator, particularly in advanced obstruction.</span></p><span data-dcnode-id="6344" instrument_node="">
</span><p data-dcnode-id="6342" id="p-38"><span data-dcnode-id="6343" instrument_node="">There are currently multiple methods for measuring lung volumes, including body plethysmography, single- and multiple-breath gas dilution, and imaging techniques such as CT scanning. The most recent ATS/ERS guidelines wisely refrained from advocating any one method over the others. Plethysmography, although sometimes considered the gold standard, can overestimate lung volumes in obstruction. Multiple-breath dilution techniques, long considered sub-optimal in patients with obstruction, may better represent the “true” lung volume than previously thought. Single-breath dilution techniques do progressively underestimate lung volumes as airway obstruction worsens. But this underestimation itself can be used as an index of ventilatory inhomogeneity within the lung. Although CT scanning offers an accurate alternative to the conventional methods, it is generally more expensive than traditional lung volume measurements. Technical problems such as prolonged breath-holding, and exposure to significant levels of ionizing radiation further limit its usefulness.</span></p><span data-dcnode-id="6341" instrument_node="">
</span></div><div class="section" data-dcnode-id="6294" id="sec-6"><span data-dcnode-id="6339" instrument_node="">
</span><h2 data-dcnode-id="6337"><span data-dcnode-id="6338" instrument_node="">Discussion</span></h2><span data-dcnode-id="6336" instrument_node="">
</span><div class="section" data-dcnode-id="6295" id="sec-7"><span data-dcnode-id="6335" instrument_node="">
</span><div class="section" data-dcnode-id="6327" id="sec-8"><span data-dcnode-id="6334" instrument_node="">
</span><h4 data-dcnode-id="6332"><span data-dcnode-id="6333" instrument_node="">Culver:</span></h4><span data-dcnode-id="6331" instrument_node="">
</span><p data-dcnode-id="6329" id="p-41"><span data-dcnode-id="6330" instrument_node="">With regard to the variability of the RV, the RV may vary a lot among normal individuals, but, as you said in the conclusion, the RV measurement itself is certainly variable. Some of that is just mathematical; we measure an FRC, we add and subtract other increments, all those errors get added and then the sum gets divided by a denominator that's 1.5 to 2 liters and it becomes a large percent error. With 3 different 150-milliliter errors when you make those measurements, it can end up with 25% variability just in the mathematics, superimposed on whatever human variability there is. We often see that when there is an error in the plethysmographic measurement and you end up with TLC that's 80% and an FRC that's 70% and the RV is 20% and you say,“How could that happen?” Just because that same absolute error has been applied to each subdivision and it looks biggest when it's applied to the smallest one.</span></p><span data-dcnode-id="6328" instrument_node="">
</span></div><span data-dcnode-id="6326" instrument_node="">
</span><div class="section" data-dcnode-id="6318" id="sec-9"><span data-dcnode-id="6325" instrument_node="">
</span><h4 data-dcnode-id="6323"><span data-dcnode-id="6324" instrument_node="">Ruppel:</span></h4><span data-dcnode-id="6322" instrument_node="">
</span><p data-dcnode-id="6320" id="p-42"><span data-dcnode-id="6321" instrument_node="">I agree with that, and I think the current guideline that recommends averaging IC and using that along with a mean measurement of FRC is probably a good approach. It can be problematic, depending on who makes the measurements and who decides how to average the values. It is an issue that we deal with on a day-to-day basis.</span></p><span data-dcnode-id="6319" instrument_node="">
</span></div><span data-dcnode-id="6317" instrument_node="">
</span><div class="section" data-dcnode-id="6309" id="sec-10"><span data-dcnode-id="6316" instrument_node="">
</span><h4 data-dcnode-id="6314"><span data-dcnode-id="6315" instrument_node="">Culver:</span></h4><span data-dcnode-id="6313" instrument_node="">
</span><p data-dcnode-id="6311" id="p-43"><span data-dcnode-id="6312" instrument_node="">In big studies RV has been shown to be quite a subtle and sensitive indicator of early airway obstruction, but in any individual patient it's very dicey. To use 20% is just one more misapplication of that silly rule.</span></p><span data-dcnode-id="6310" instrument_node="">
</span></div><span data-dcnode-id="6308" instrument_node="">
</span><div class="section" data-dcnode-id="6296" id="sec-11"><span data-dcnode-id="6307" instrument_node="">
</span><h4 data-dcnode-id="6305"><span data-dcnode-id="6306" instrument_node="">Busse:</span></h4><span data-dcnode-id="6304" instrument_node="">
</span><p data-dcnode-id="6298" id="p-44"><span data-dcnode-id="6303" instrument_node="">Ron Sorkness evaluated</span><sup data-dcnode-id="6300"><a class="xref-bibr" data-dcnode-id="6301" href="#ref-56" id="xref-ref-56-1"><span data-dcnode-id="6302" instrument_node="">1</span></a></sup><span data-dcnode-id="6299" instrument_node=""> the data from the SARP [Severe Asthma Research Program] network through the NIH [National Institutes of Health]. He has determined RV in patients with asthma. In patients with more severe disease there is an increase in RV and air trapping. Whether it reflects airway parenchyma and coupling or not is not clear, but it might tell you something about the disease and the lung functions associated with severe asthma. Air trapping is associated with increased risk for exacerbations.</span></p><span data-dcnode-id="6297" instrument_node="">
</span></div></div></div><div class="section" data-dcnode-id="6277" id="sec-12"><span data-dcnode-id="6293" instrument_node="">
</span><h2 data-dcnode-id="6291"><span data-dcnode-id="6292" instrument_node="">MacIntyre:</span></h2><span data-dcnode-id="6290" instrument_node="">
</span><p data-dcnode-id="6288" id="p-45"><span data-dcnode-id="6289" instrument_node="">A comment and then a question. The comment is that one of the things I find useful about lung volume measurements is in helping interpret the diffusing capacity. Specifically, what I'm interested in is how closely the single-breath measurement of lung volume (ie, alveolar volume) is to what we think is the real lung volume.</span></p><span data-dcnode-id="6287" instrument_node="">
</span><p data-dcnode-id="6282" id="p-46"><span data-dcnode-id="6286" instrument_node="">As you pointed out quite nicely, in obstructive lung disease those 2 things are often quite disparate, and when I see that on a diffusing capacity test, where alveolar volume is like 50% of the known TLC, I put up a big red flag and say, “I'm not sure you can interpret that D</span><sub data-dcnode-id="6284"><span data-dcnode-id="6285" instrument_node="">LCO</span></sub><span data-dcnode-id="6283" instrument_node="">, because the gases obviously didn't mix very well.” If the methane or the xenon or whatever you happen to be using as your tracer gas didn't mix, I guarantee you the CO didn't mix either. I don't know any way to fix that other than to say diffusing capacity is probably very difficult if not impossible to interpret.</span></p><span data-dcnode-id="6281" instrument_node="">
</span><p data-dcnode-id="6279" id="p-47"><span data-dcnode-id="6280" instrument_node="">A question I have that comes up all the time is the pattern of a patient who has a flat out normal VC but a 70% TLC. A lot of people try and tell me that means restriction, and I have a lot of trouble thinking about that physiologically because it would mean that the restrictive process is attacking the RV and leaving the VC alone. I, for one, can't think of a disease process that preferentially goes only after RV. Maybe I'm missing something, but I'd appreciate somebody's comments there.</span></p><span data-dcnode-id="6278" instrument_node="">
</span></div><div class="section" data-dcnode-id="6269" id="sec-13"><span data-dcnode-id="6276" instrument_node="">
</span><h2 data-dcnode-id="6274"><span data-dcnode-id="6275" instrument_node="">Hnatiuk:</span></h2><span data-dcnode-id="6273" instrument_node="">
</span><p data-dcnode-id="6271" id="p-48"><span data-dcnode-id="6272" instrument_node="">During my fellowship training, one of the staff informed me that early interstitial lung disease could present with a decrease in the residual volume before other lung volumes were affected. Now, I've never gone back and looked for data that myself—</span></p><span data-dcnode-id="6270" instrument_node="">
</span></div><div class="section" data-dcnode-id="6261" id="sec-14"><span data-dcnode-id="6268" instrument_node="">
</span><h2 data-dcnode-id="6266"><span data-dcnode-id="6267" instrument_node="">MacIntyre:</span></h2><span data-dcnode-id="6265" instrument_node="">
</span><p data-dcnode-id="6263" id="p-49"><span data-dcnode-id="6264" instrument_node="">Wait, before I let you off the hook here, I've looked for this, and the reading I've done suggests that early interstitial lung disease makes the lung stiff. As the lung gets stiff, you tend to lose VC first and the RV may trail behind it. So maybe after this conference we can finally find some literature to help us answer this question.</span></p><span data-dcnode-id="6262" instrument_node="">
</span></div><div class="section" data-dcnode-id="6253" id="sec-15"><span data-dcnode-id="6260" instrument_node="">
</span><h2 data-dcnode-id="6258"><span data-dcnode-id="6259" instrument_node="">Culver:</span></h2><span data-dcnode-id="6257" instrument_node="">
</span><p data-dcnode-id="6255" id="p-50"><span data-dcnode-id="6256" instrument_node="">I can comment on that, but I don't have a lot of data. Because RV beyond a 35 or 40 is mostly a function of airway closure, if you do have increased recoil, then you have delayed airway closure and you can get to a lower RV, and so it's rational that an interstitial process could be associated with that.</span></p><span data-dcnode-id="6254" instrument_node="">
</span></div><div class="section" data-dcnode-id="6245" id="sec-16"><span data-dcnode-id="6252" instrument_node="">
</span><h2 data-dcnode-id="6250"><span data-dcnode-id="6251" instrument_node="">MacIntyre:</span></h2><span data-dcnode-id="6249" instrument_node="">
</span><p data-dcnode-id="6247" id="p-51"><span data-dcnode-id="6248" instrument_node="">Did you just describe a larger RV? I'm sorry; did I misunderstand?</span></p><span data-dcnode-id="6246" instrument_node="">
</span></div><div class="section" data-dcnode-id="6237" id="sec-17"><span data-dcnode-id="6244" instrument_node="">
</span><h2 data-dcnode-id="6242"><span data-dcnode-id="6243" instrument_node="">Culver:</span></h2><span data-dcnode-id="6241" instrument_node="">
</span><p data-dcnode-id="6239" id="p-52"><span data-dcnode-id="6240" instrument_node="">No, there's more recoil, so the airways are less inclined to close. They go to a lower volume before they close and cause RV to be low. That pattern has been described, more particularly in sarcoidosis for some reason, which seems a little curious, because that often has an airway component as well, but I recall there was a small series years ago that showed that pattern in sarcoid patients.</span></p><span data-dcnode-id="6238" instrument_node="">
</span></div><div class="section" data-dcnode-id="6225" id="sec-18"><span data-dcnode-id="6236" instrument_node="">
</span><h2 data-dcnode-id="6234"><span data-dcnode-id="6235" instrument_node="">Ruppel:</span></h2><span data-dcnode-id="6233" instrument_node="">
</span><p data-dcnode-id="6227" id="p-53"><span data-dcnode-id="6232" instrument_node="">The reference that I showed from Piotr Boros</span><sup data-dcnode-id="6229"><a class="xref-bibr" data-dcnode-id="6230" href="#ref-57" id="xref-ref-57-1"><span data-dcnode-id="6231" instrument_node="">1</span></a></sup><span data-dcnode-id="6228" instrument_node=""> in which they looked at ILD [interstitial lung disease] concluded that the TLC was reduced more than the vital capacity in ILD patients, which suggests that the RV may be changing.</span></p><span data-dcnode-id="6226" instrument_node="">
</span></div><div class="section" data-dcnode-id="6217" id="sec-19"><span data-dcnode-id="6224" instrument_node="">
</span><h2 data-dcnode-id="6222"><span data-dcnode-id="6223" instrument_node="">Enright:</span></h2><span data-dcnode-id="6221" instrument_node="">
</span><p data-dcnode-id="6219" id="p-54"><span data-dcnode-id="6220" instrument_node="">A common problem is that the reference equations (predicted values) and the lower limits for FVC and for the TLC are taken from 2 entirely different studies. The lower limits may not have been appropriately analyzed in one or both of those studies. That could cause the difference. Reference values for spirometry and lung volumes should come from the same population-based study.</span></p><span data-dcnode-id="6218" instrument_node="">
</span></div><div class="section" data-dcnode-id="6209" id="sec-20"><span data-dcnode-id="6216" instrument_node="">
</span><h2 data-dcnode-id="6214"><span data-dcnode-id="6215" instrument_node="">Coates:</span></h2><span data-dcnode-id="6213" instrument_node="">
</span><p data-dcnode-id="6211" id="p-55"><span data-dcnode-id="6212" instrument_node="">What is going on in a lot of pediatric labs may be very different from adult labs, but despite the standards suggesting the frequency of panting should be at 1 Hz, I frequently find them panting at 2, 3, or 4 Hz. No matter how many times we tell the technicians, they and the patient both find it easier to pant at a much higher rate. That is going to introduce errors into the measurements, and those errors may well be the explanation as to why there is this discrepancy between dilutional techniques and plethysmographic techniques. It is possible that the plethysmographic techniques just were not done the right way.</span></p><span data-dcnode-id="6210" instrument_node="">
</span></div><div class="section" data-dcnode-id="6197" id="sec-21"><span data-dcnode-id="6208" instrument_node="">
</span><h2 data-dcnode-id="6206"><span data-dcnode-id="6207" instrument_node="">Ruppel:</span></h2><span data-dcnode-id="6205" instrument_node="">
</span><p data-dcnode-id="6199" id="p-56"><span data-dcnode-id="6204" instrument_node="">The O'Donnell paper that I discussed</span><sup data-dcnode-id="6201"><a class="xref-bibr" data-dcnode-id="6202" href="#ref-58" id="xref-ref-58-1"><span data-dcnode-id="6203" instrument_node="">1</span></a></sup><span data-dcnode-id="6200" instrument_node=""> didn't go into great detail, but they suggested each of their techniques (helium dilution, CT scanning, and plethysmography) followed the current guidelines.</span></p><span data-dcnode-id="6198" instrument_node="">
</span></div><div class="section" data-dcnode-id="6189" id="sec-22"><span data-dcnode-id="6196" instrument_node="">
</span><h2 data-dcnode-id="6194"><span data-dcnode-id="6195" instrument_node="">Coates:</span></h2><span data-dcnode-id="6193" instrument_node="">
</span><p data-dcnode-id="6191" id="p-57"><span data-dcnode-id="6192" instrument_node="">We try to insist in our lab that we follow the current guidelines, but as soon as I walk out the door, I often can hear rapid panting.</span></p><span data-dcnode-id="6190" instrument_node="">
</span></div><div class="section" data-dcnode-id="6175" id="sec-23"><span data-dcnode-id="6188" instrument_node="">
</span><h2 data-dcnode-id="6186"><span data-dcnode-id="6187" instrument_node="">Miller:</span></h2><span data-dcnode-id="6185" instrument_node="">
</span><p data-dcnode-id="6183" id="p-58"><span data-dcnode-id="6184" instrument_node="">Paul once again raised a critical issue. If you look at your own lab reports and at the predicted FVC versus the predicted VC, you'll see markedly different predicted values. This lack of concordance between reference values raises the question of what does the TLC really mean. One thing we've tried to do is take the RV/TLC or VC/TLC ratio from your lung volume predicteds and apply it to the FVC from your spirometric predicteds and generate a new RV and TLC from that. Statistically, the spirometry predicteds are much better, they're based on many more individuals who are better defined as normal, so I think that's a useful approach.</span></p><span data-dcnode-id="6182" instrument_node="">
</span><p data-dcnode-id="6180" id="p-59"><span data-dcnode-id="6181" instrument_node="">I'd like to bring up this question of losing out to the radiologists again, and I think that's really going to happen for reporting lung volume and diagnosing emphysema, because when you look at your patients, especially in the teaching centers, they're all getting CTs. It is available to the radiologist to report many things, emphysema score, percentage of lung volume with emphysema, TLC, and so on. They don't do it because nobody's interested, but very few of your patients whom you're considering as having severe emphysema or ILD escape getting a CT scan.</span></p><span data-dcnode-id="6179" instrument_node="">
</span><p data-dcnode-id="6177" id="p-60"><span data-dcnode-id="6178" instrument_node="">The last question I'd like to ask is something I get asked by my fellows all the time and I don't know how to answer. When you have something reducing your ERV, and of course obesity does this very readily, and there isn't necessarily a proportional change in FRC. So if obesity or some other condition like patient testing variability is giving you a low ERV and you're measuring a more or less normal FRC, then you're going to have to have a high RV. And what does that high RV mean in the presence of a low ERV? Does anybody have any suggestions there? I see you're nodding, Paul.</span></p><span data-dcnode-id="6176" instrument_node="">
</span></div><div class="section" data-dcnode-id="6167" id="sec-24"><span data-dcnode-id="6174" instrument_node="">
</span><h2 data-dcnode-id="6172"><span data-dcnode-id="6173" instrument_node="">Enright:</span></h2><span data-dcnode-id="6171" instrument_node="">
</span><p data-dcnode-id="6169" id="p-61"><span data-dcnode-id="6170" instrument_node="">What is the definition of hyperinflation? A high RV, a high RV/TLC, a high FRC, a high FRC/TLC, or a high trapped air volume? Which of those is best correlated with the airway obstruction in asthma or COPD, and which of those is the most responsive to interventions? Our ATS/ERS committee never addressed those definitions, and it leads to continued confusion in the literature.</span></p><span data-dcnode-id="6168" instrument_node="">
</span></div><div class="section" data-dcnode-id="6159" id="sec-25"><span data-dcnode-id="6166" instrument_node="">
</span><h2 data-dcnode-id="6164"><span data-dcnode-id="6165" instrument_node="">Kaminsky:</span></h2><span data-dcnode-id="6163" instrument_node="">
</span><p data-dcnode-id="6161" id="p-62"><span data-dcnode-id="6162" instrument_node="">The issue of the discrepancy you've talked about, I've always been puzzled by that as well. Why in obese patients do we see the relatively high RV to TLC? Are they really gas trapping and so it has to do with early airway closure? Or one thing I've always wondered is whether it's more of a mechanical effect, that is, since it's an effort-dependent maneuver, these patients just can't squeeze down to lung emptying as they would otherwise be able to do if they weren't obese. But I don't know the answer to that.</span></p><span data-dcnode-id="6160" instrument_node="">
</span></div><div class="section" data-dcnode-id="6151" id="sec-26"><span data-dcnode-id="6158" instrument_node="">
</span><h2 data-dcnode-id="6156"><span data-dcnode-id="6157" instrument_node="">Pichurko:</span></h2><span data-dcnode-id="6155" instrument_node="">
</span><p data-dcnode-id="6153" id="p-63"><span data-dcnode-id="6154" instrument_node="">As a pulmonary fellow I was introduced to RV as a volume that is either “dynamically determined,” that is, representing roughly the point of predominant airway closure and residual gas trapping, or “statically-determined,” as in disorders that reduce chest wall compliance and limit the “ride down” the respiratory system's static pressure-volume curve. Obesity, absent concurrent airway disease, is a common prototype of the statically determined elevated RV that is well above the airway closing volume. Neuromuscular weakness is another.</span></p><span data-dcnode-id="6152" instrument_node="">
</span></div><div class="section" data-dcnode-id="6143" id="sec-27"><span data-dcnode-id="6150" instrument_node="">
</span><h2 data-dcnode-id="6148"><span data-dcnode-id="6149" instrument_node="">Hnatiuk:</span></h2><span data-dcnode-id="6147" instrument_node="">
</span><p data-dcnode-id="6145" id="p-64"><span data-dcnode-id="6146" instrument_node="">In our lab, when you get a low FVC, a normal TLC, and a normal RV/TLC ratio. the question becomes, “What is going on?” This leads us to look at the maximum inspiratory pressure and maximum expiratory pressure. If they are normal, then we attribute the low FVC to submaximal patient effort during the FVC maneuver. But I think Gregg had a reference addressing this group of patients in his talk, who were followed longitudinally and I believe a substantial portion of them developed disease?</span></p><span data-dcnode-id="6144" instrument_node="">
</span></div><div class="section" data-dcnode-id="6127" id="sec-28"><span data-dcnode-id="6142" instrument_node="">
</span><h2 data-dcnode-id="6140"><span data-dcnode-id="6141" instrument_node="">Ruppel:</span></h2><span data-dcnode-id="6139" instrument_node="">
</span><p data-dcnode-id="6129" id="p-65"><span data-dcnode-id="6138" instrument_node="">Yes, the Mayo Clinic group.</span><sup data-dcnode-id="6135"><a class="xref-bibr" data-dcnode-id="6136" href="#ref-59" id="xref-ref-59-1"><span data-dcnode-id="6137" instrument_node="">1</span></a></sup><span data-dcnode-id="6134" instrument_node=""> Their patients had the nonspecific pattern, which is a little different than what we were just talking about, but yes, some of them did go on to develop restrictive disorders when they were tested sequentially. The large majority (64%) tended to remain in the nonspecific pattern grouping, but some did go into a restrictive pattern and some went into an obstructive pattern. That was similar to what Hyatt observed in the original group.</span><sup data-dcnode-id="6131"><a class="xref-bibr" data-dcnode-id="6132" href="#ref-60" id="xref-ref-60-1"><span data-dcnode-id="6133" instrument_node="">2</span></a></sup><span data-dcnode-id="6130" instrument_node=""> Obesity and subclinical obstruction seemed to be the characteristics of those patients who had that pattern.</span></p><span data-dcnode-id="6128" instrument_node="">
</span></div><div class="section" data-dcnode-id="6119" id="sec-29"><span data-dcnode-id="6126" instrument_node="">
</span><h2 data-dcnode-id="6124"><span data-dcnode-id="6125" instrument_node="">Hnatiuk:</span></h2><span data-dcnode-id="6123" instrument_node="">
</span><p data-dcnode-id="6121" id="p-66"><span data-dcnode-id="6122" instrument_node="">So is it worth it to say in the report, “repeat the spirometry in a year” and see where these people end up?</span></p><span data-dcnode-id="6120" instrument_node="">
</span></div><div class="section" data-dcnode-id="6111" id="sec-30"><span data-dcnode-id="6118" instrument_node="">
</span><h2 data-dcnode-id="6116"><span data-dcnode-id="6117" instrument_node="">Ruppel:</span></h2><span data-dcnode-id="6115" instrument_node="">
</span><p data-dcnode-id="6113" id="p-67"><span data-dcnode-id="6114" instrument_node="">I think that might be the case. If you observe the nonspecific pattern, the question would be, is this patient on the path to developing restriction? Again, you have to do the lung volume measurement.</span></p><span data-dcnode-id="6112" instrument_node="">
</span></div><div class="section" data-dcnode-id="6079" id="sec-31"><span data-dcnode-id="6110" instrument_node="">
</span><h2 data-dcnode-id="6108"><span data-dcnode-id="6109" instrument_node="">Salzman:</span></h2><span data-dcnode-id="6107" instrument_node="">
</span><p data-dcnode-id="6105" id="p-68"><span data-dcnode-id="6106" instrument_node="">To follow up on the issue of this nonspecific pattern and the whole interaction of obesity with asthma or mild obstructive lung disease, I think part of the problem is that we tend to interpret with thresholds, and it's a black-and-white approach: you're either normal or abnormal. The reality is that a lot of these things are a continuum, and we don't know how to deal with that in an individual patient.</span></p><span data-dcnode-id="6104" instrument_node="">
</span><p data-dcnode-id="6090" id="p-69"><span data-dcnode-id="6103" instrument_node="">I thought it was very interesting that you pointed out that with obesity, FVC and other lung volumes tend to migrate within the normal range, such that you end up with measurements that are still “normal,” but you're near the lower limit of normal. I think the same thing happens with mild obstructive lung disease, the FEV</span><sub data-dcnode-id="6101"><span data-dcnode-id="6102" instrument_node="">1</span></sub><span data-dcnode-id="6100" instrument_node=""> and the FEV</span><sub data-dcnode-id="6098"><span data-dcnode-id="6099" instrument_node="">1</span></sub><span data-dcnode-id="6097" instrument_node="">/FVC ratio are in that area just north of lower limit of normal, a little north of say 80% for FEV</span><sub data-dcnode-id="6095"><span data-dcnode-id="6096" instrument_node="">1</span></sub><span data-dcnode-id="6094" instrument_node=""> or 0.70 for FEV</span><sub data-dcnode-id="6092"><span data-dcnode-id="6093" instrument_node="">1</span></sub><span data-dcnode-id="6091" instrument_node="">/FVC. So when you combine obesity and asthma, two very common conditions, you end up with what the Mayo Clinic is calling the nonspecific pattern.</span></p><span data-dcnode-id="6089" instrument_node="">
</span><p data-dcnode-id="6081" id="p-70"><span data-dcnode-id="6088" instrument_node="">I think the better term that has lost out is pseudo-restriction. It's what you see a lot. I think obesity tends to cause a slightly low-normal FVC, and if we're talking about somebody who has mixed asthma and obesity, the FVC migrates downward from the obesity, the FEV</span><sub data-dcnode-id="6086"><span data-dcnode-id="6087" instrument_node="">1</span></sub><span data-dcnode-id="6085" instrument_node=""> migrates downward from the obstructive lung disease, and you end up with a normal FEV</span><sub data-dcnode-id="6083"><span data-dcnode-id="6084" instrument_node="">1</span></sub><span data-dcnode-id="6082" instrument_node="">/FVC ratio that you can't frankly call obstruction and you don't quite know how to deal with it, it looks like borderline restriction. I think it's a very common pattern that you see in PFT labs.</span></p><span data-dcnode-id="6080" instrument_node="">
</span></div><div class="section fn-group" data-dcnode-id="6052" id="fn-group-1"><h2 data-dcnode-id="6077"><span data-dcnode-id="6078" instrument_node="">Footnotes</span></h2><ul data-dcnode-id="6053"><li class="corresp" data-dcnode-id="6070" id="corresp-1"><span data-dcnode-id="6076" instrument_node="">Correspondence: Gregg L Ruppel MEd RRT RPFT FAARC, Pulmonary Function Laboratory, Saint Louis University Hospital, 3635 Vista Avenue, St Louis MO 63104. E-mail: </span><span class="em-link" data-dcnode-id="6072"><span class="em-addr" data-dcnode-id="6073"><a data-dcnode-id="6074" href="mailto:ruppelgl@slu.edu"><span data-dcnode-id="6075" instrument_node="">ruppelgl@slu.edu</span></a></span></span><span data-dcnode-id="6071" instrument_node="">.</span></li><li class="fn-presented-at" data-dcnode-id="6059" id="fn-1"><span data-dcnode-id="6069" instrument_node="">
</span><p data-dcnode-id="6061" id="p-39"><span data-dcnode-id="6068" instrument_node="">Mr Ruppel presented a version of this paper at the 48th R</span><span class="sc" data-dcnode-id="6066"><span data-dcnode-id="6067" instrument_node="">espiratory</span></span><span data-dcnode-id="6065" instrument_node=""> C</span><span class="sc" data-dcnode-id="6063"><span data-dcnode-id="6064" instrument_node="">are</span></span><span data-dcnode-id="6062" instrument_node=""> Journal Conference, “Pulmonary Function Testing,” held March 25–27, 2011, in Tampa, Florida.</span></p><span data-dcnode-id="6060" instrument_node="">
