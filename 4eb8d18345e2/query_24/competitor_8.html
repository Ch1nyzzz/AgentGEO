       </span></div><span data-dcnode-id="6544" instrument_node="">
</span><div class="next_btn" data-dcnode-id="6539"><a data-dcnode-id="6540" href="#a2" onclick="AdPageRefresh('https://emedicine.medscape.com/article/303239-overview#a2', '1', 'cr-sn_next', '#a2');"><span data-dcnode-id="6543" instrument_node="">Next: </span><span data-dcnode-id="6541"><span data-dcnode-id="6542" instrument_node="">Lung Volume Determination </span></span></a></div><span data-dcnode-id="6538" instrument_node="">
</span><div class="spacer" data-dcnode-id="6537"></div><span data-dcnode-id="6536" instrument_node="">
</span></div><span data-dcnode-id="6534" instrument_node="">
</span></div><span data-dcnode-id="6532" instrument_node="">
</span><span data-dcnode-id="6530" instrument_node="">
</span><div class="inactive" data-dcnode-id="4732" id="content_a7"><span data-dcnode-id="6529" instrument_node="">
</span><h2 data-dcnode-id="6527"><span data-dcnode-id="6528" instrument_node="">Cardiopulmonary Stress Testing</span></h2><span data-dcnode-id="6526" instrument_node="">
</span><div class="refsection_content" data-dcnode-id="4753"><span data-dcnode-id="6525" instrument_node="">
</span><span data-dcnode-id="6523" instrument_node="">
</span><h3 data-dcnode-id="6521"><span data-dcnode-id="6522" instrument_node="">Synonyms</span></h3><span data-dcnode-id="6520" instrument_node="">
</span><p data-dcnode-id="6518"><span data-dcnode-id="6519" instrument_node="">Cardiopulmonary exercise (CPX) test</span></p><span data-dcnode-id="6517" instrument_node="">
</span><div class="inContentAd" data-dcnode-id="6516" id="ads-pos-a7_1" rel="157"></div><span data-dcnode-id="6515" instrument_node="">
</span><h3 data-dcnode-id="6513"><span data-dcnode-id="6514" instrument_node="">Indications</span></h3><span data-dcnode-id="6512" instrument_node="">
</span><p data-dcnode-id="6510"><span data-dcnode-id="6511" instrument_node="">CPX test is used for evaluation of dyspnea that is out of proportion to findings on static pulmonary function tests, preoperative evaluation of operative risk when lung function is compromised or removal of lung segments is contemplated, evaluation of disability, identification of exercise-induced asthma, and evaluation of therapy.</span></p><span data-dcnode-id="6509" instrument_node="">
</span><div class="inContentAd" data-dcnode-id="6508" id="ads-pos-a7_2" rel="158"></div><span data-dcnode-id="6507" instrument_node="">
</span><h3 data-dcnode-id="6505"><span data-dcnode-id="6506" instrument_node="">Contraindications</span></h3><span data-dcnode-id="6504" instrument_node="">
</span><p data-dcnode-id="6499"><span data-dcnode-id="6503" instrument_node="">Absolute contraindications include unstable angina, aortic stenosis, uncontrolled hypertension, uncontrolled asthma, hypoxemia (SaO</span><sub data-dcnode-id="6501"><span data-dcnode-id="6502" instrument_node="">2</span></sub><span data-dcnode-id="6500" instrument_node="">&lt; 85% at rest), and febrile illness.</span></p><span data-dcnode-id="6498" instrument_node="">
</span><div class="inContentAd" data-dcnode-id="6497" id="ads-pos-a7_3" rel="159"></div><span data-dcnode-id="6496" instrument_node="">
</span><p data-dcnode-id="6494"><span data-dcnode-id="6495" instrument_node="">Relative contraindications include hypertension, cardiac disease, epilepsy, and locomotor disorder (inability to exercise).</span></p><span data-dcnode-id="6493" instrument_node="">
</span><div class="inContentAd" data-dcnode-id="6492" id="ads-pos-a7_4" rel="160"></div><span data-dcnode-id="6491" instrument_node="">
</span><h3 data-dcnode-id="6489"><span data-dcnode-id="6490" instrument_node="">Patient care/preparations</span></h3><span data-dcnode-id="6488" instrument_node="">
</span><p data-dcnode-id="6486"><span data-dcnode-id="6487" instrument_node="">Perform calibration of the volume-measuring device and gas analyzers. Patients should avoid eating a heavy meal 1-2 hours before the test. Patients should wear loose comfortable clothing and athletic shoes. If exercise-induced bronchoconstriction is considered, withhold medications as with the methacholine challenge. ECG electrodes/leads are applied. Adjustment of the seat height on a bicycle ergometer is made to permit near-full leg extension when one pedal is at its lowest position (slight bend at knee). Airtight fitting of a low dead-space mask or mouthpiece/nose clips is applied. Apply and correctly position a blood pressure cuff. A pulse oximeter probe is applied securely. Insertion of an indwelling arterial canula for arterial blood sampling is optional.</span></p><span data-dcnode-id="6485" instrument_node="">
</span><div class="inContentAd" data-dcnode-id="6484" id="ads-pos-a7_5" rel="161"></div><span data-dcnode-id="6483" instrument_node="">
</span><h3 data-dcnode-id="6481"><span data-dcnode-id="6482" instrument_node="">Test</span></h3><span data-dcnode-id="6480" instrument_node="">
</span><p data-dcnode-id="6478"><span data-dcnode-id="6479" instrument_node="">The cardiopulmonary exercise test is a means of measuring the integrated response of the pulmonary, cardiovascular, and muscular systems to a steadily increasing workload. The test may be performed on a bicycle ergometer or treadmill. Resting measurements are made for 3-5 minutes. Three minutes of unloaded cycling is performed as a warmup period. The workload is incremented at a rate designed to allow reaching maximum work capacity in 8-12 minutes. The test continues to a point of symptom limitation (severe dyspnea, chest pain, faintness, pallor, inability to continue pedaling or walking) or discontinuation by medical staff for one of the following conditions: significant ECG abnormalities, fall in systolic or diastolic blood pressure (BP) greater than 20 mm Hg below resting value, rise in systolic BP to greater than 250 mm Hg, rise in diastolic BP to greater than 120 mm Hg, severe oxygen desaturation (&lt; 80%), or achievement of maximum predicted heart rate.</span></p><span data-dcnode-id="6477" instrument_node="">
</span><div class="inContentAd" data-dcnode-id="6476" id="ads-pos-a7_6" rel="162"></div><span data-dcnode-id="6475" instrument_node="">
</span><p data-dcnode-id="6473"><span data-dcnode-id="6474" instrument_node="">Determining the proper rate of workload incrementation: The workload incrementation rate should be chosen to produce a test of 8-12 minutes in length. If the workload incrementation is too high, the test will be too brief. In this circumstance, the patient should be allowed to recover and should be retested. If the workload incrementation is too small, fatigue may prevent a valid second test. Below is Wasserman's method for estimating the workload increment size for cycle ergometry:</span></p><span data-dcnode-id="6472" instrument_node="">
</span><span data-dcnode-id="6470" instrument_node="">
</span><ul data-dcnode-id="6417"><span data-dcnode-id="6469" instrument_node="">
</span><span data-dcnode-id="6467" instrument_node="">
</span><li data-dcnode-id="6454"><span data-dcnode-id="6466" instrument_node="">
</span><div class="topbullet" data-dcnode-id="6455"><span data-dcnode-id="6465" instrument_node="">
</span><p data-dcnode-id="6457"><span data-dcnode-id="6464" instrument_node="">Estimate the unloaded oxygen consumption per minute (VO</span><sub data-dcnode-id="6462"><span data-dcnode-id="6463" instrument_node="">2</span></sub><span data-dcnode-id="6461" instrument_node="">): Unloaded VO</span><sub data-dcnode-id="6459"><span data-dcnode-id="6460" instrument_node="">2</span></sub><span data-dcnode-id="6458" instrument_node=""> (mL/min) = 150 + (6 × weight [kg])</span></p><span data-dcnode-id="6456" instrument_node="">
</span></div></li><span data-dcnode-id="6453" instrument_node="">
</span><span data-dcnode-id="6451" instrument_node="">
</span><li data-dcnode-id="6435"><span data-dcnode-id="6450" instrument_node="">
</span><div class="topbullet" data-dcnode-id="6436"><span data-dcnode-id="6449" instrument_node="">
</span><p data-dcnode-id="6438"><span data-dcnode-id="6448" instrument_node="">Estimate the peak VO</span><sub data-dcnode-id="6446"><span data-dcnode-id="6447" instrument_node="">2</span></sub><span data-dcnode-id="6445" instrument_node="">: Peak VO</span><sub data-dcnode-id="6443"><span data-dcnode-id="6444" instrument_node="">2</span></sub><span data-dcnode-id="6442" instrument_node=""> (mL/min) = (height [cm] – age [y]) × 20 for sedentary men or peak VO</span><sub data-dcnode-id="6440"><span data-dcnode-id="6441" instrument_node="">2</span></sub><span data-dcnode-id="6439" instrument_node=""> (mL/min) = (height [cm] – age [y]) × 14 for sedentary women</span></p><span data-dcnode-id="6437" instrument_node="">
</span></div></li><span data-dcnode-id="6434" instrument_node="">
</span><span data-dcnode-id="6432" instrument_node="">
</span><li data-dcnode-id="6419"><span data-dcnode-id="6431" instrument_node="">
</span><div class="topbullet" data-dcnode-id="6420"><span data-dcnode-id="6430" instrument_node="">
</span><p data-dcnode-id="6422"><span data-dcnode-id="6429" instrument_node="">Estimate the work rate increment: Work rate increment (watts/min) = (peak VO</span><sub data-dcnode-id="6427"><span data-dcnode-id="6428" instrument_node="">2</span></sub><span data-dcnode-id="6426" instrument_node=""> (mL/min) – unloaded VO</span><sub data-dcnode-id="6424"><span data-dcnode-id="6425" instrument_node="">2</span></sub><span data-dcnode-id="6423" instrument_node=""> (mL/min)/100</span></p><span data-dcnode-id="6421" instrument_node="">
</span></div></li><span data-dcnode-id="6418" instrument_node="">
</span></ul><span data-dcnode-id="6416" instrument_node="">
</span><div class="inContentAd" data-dcnode-id="6415" id="ads-pos-a7_7" rel="163"></div><span data-dcnode-id="6414" instrument_node="">
</span><p data-dcnode-id="6409"><span data-dcnode-id="6413" instrument_node="">Patients with significant reductions in the predicted VEmax (FEV</span><sub data-dcnode-id="6411"><span data-dcnode-id="6412" instrument_node="">1</span></sub><span data-dcnode-id="6410" instrument_node=""> below 50% of predicted) should use an increment of 10 watts/min or less. Patients with severe obstruction resulting in a preexercise maximum voluntary ventilation (MVV) of less than 40 L/min should use an incrementation rate of 5 watts/min.</span></p><span data-dcnode-id="6408" instrument_node="">
</span><div class="inContentAd" data-dcnode-id="6407" id="ads-pos-a7_8" rel="164"></div><span data-dcnode-id="6406" instrument_node="">
</span><h3 data-dcnode-id="6404"><span data-dcnode-id="6405" instrument_node="">Results</span></h3><span data-dcnode-id="6403" instrument_node="">
</span><p data-dcnode-id="6371"><span data-dcnode-id="6402" instrument_node="">The following parameters are measured or calculated on a breath-by-breath basis: minute ventilation (V</span><sub data-dcnode-id="6400"><span data-dcnode-id="6401" instrument_node="">E</span></sub><span data-dcnode-id="6399" instrument_node="">, L/min), tidal volume (V</span><sub data-dcnode-id="6397"><span data-dcnode-id="6398" instrument_node="">T</span></sub><span data-dcnode-id="6396" instrument_node="">, mL/breath), respiratory rate (RR, mL/breath), oxygen uptake (VO</span><sub data-dcnode-id="6394"><span data-dcnode-id="6395" instrument_node="">2</span></sub><span data-dcnode-id="6393" instrument_node="">, mL/min and mL/min/kg), carbon dioxide production (VCO</span><sub data-dcnode-id="6391"><span data-dcnode-id="6392" instrument_node="">2</span></sub><span data-dcnode-id="6390" instrument_node="">, mL/min), respiratory exchange ratio (RER, VCO</span><sub data-dcnode-id="6388"><span data-dcnode-id="6389" instrument_node="">2</span></sub><span data-dcnode-id="6387" instrument_node=""> -to-VO</span><sub data-dcnode-id="6385"><span data-dcnode-id="6386" instrument_node="">2</span></sub><span data-dcnode-id="6384" instrument_node="">), SpO</span><sub data-dcnode-id="6382"><span data-dcnode-id="6383" instrument_node="">2</span></sub><span data-dcnode-id="6381" instrument_node="">, heart rate (HR, beats/min), oxygen pulse (mL VO</span><sub data-dcnode-id="6379"><span data-dcnode-id="6380" instrument_node="">2</span></sub><span data-dcnode-id="6378" instrument_node="">/min/heartbeat), and BP (mm Hg). If ABG determinations are obtained, discrete values for the ratio of dead space to tidal volume (VD-to-V</span><sub data-dcnode-id="6376"><span data-dcnode-id="6377" instrument_node="">T</span></sub><span data-dcnode-id="6375" instrument_node="">) and alveolar to arterial oxygen gradient (A-a-to-O</span><sub data-dcnode-id="6373"><span data-dcnode-id="6374" instrument_node="">2</span></sub><span data-dcnode-id="6372" instrument_node="">) can be calculated for that interval of exercise.</span></p><span data-dcnode-id="6370" instrument_node="">
</span><div class="inContentAd" data-dcnode-id="6369" id="ads-pos-a7_9" rel="165"></div><span data-dcnode-id="6368" instrument_node="">
</span><h3 data-dcnode-id="6366"><span data-dcnode-id="6367" instrument_node="">Interpretation</span></h3><span data-dcnode-id="6365" instrument_node="">
</span><p data-dcnode-id="6360"><span data-dcnode-id="6364" instrument_node="">The assessment of a normal work capacity is made by evaluation of the peak oxygen uptake (VO</span><sub data-dcnode-id="6362"><span data-dcnode-id="6363" instrument_node="">2</span></sub><span data-dcnode-id="6361" instrument_node=""> peak). The normal value for oxygen uptake is based on sex, age, and weight.</span></p><span data-dcnode-id="6359" instrument_node="">
</span><div class="inContentAd" data-dcnode-id="6358" id="ads-pos-a7_10" rel="166"></div><span data-dcnode-id="6357" instrument_node="">
</span><p data-dcnode-id="6352"><span data-dcnode-id="6356" instrument_node="">The predicted peak VO</span><sub data-dcnode-id="6354"><span data-dcnode-id="6355" instrument_node="">2</span></sub><span data-dcnode-id="6353" instrument_node=""> is determined by the patient's age and sex. This value can be further refined for sedentary individuals by a three-step process (see below) that adjusts the predicted value up or down based on a comparison of the patient's weight and their ideal body weight. The predicted normal values for sedentary men and women from Wasserman et al are described below.</span></p><span data-dcnode-id="6351" instrument_node="">
</span><div class="inContentAd" data-dcnode-id="6350" id="ads-pos-a7_11" rel="167"></div><span data-dcnode-id="6349" instrument_node="">
</span><p data-dcnode-id="6347"><span data-dcnode-id="6348" instrument_node="">For sedentary men, calculate the cycle factor, ie, cycle factor = 50.72 – (0.372 × age), as follows:</span></p><span data-dcnode-id="6346" instrument_node="">
</span><span data-dcnode-id="6344" instrument_node="">
</span><ul data-dcnode-id="6270"><span data-dcnode-id="6343" instrument_node="">
</span><span data-dcnode-id="6341" instrument_node="">
</span><li data-dcnode-id="6334"><span data-dcnode-id="6340" instrument_node="">
</span><div class="topbullet" data-dcnode-id="6335"><span data-dcnode-id="6339" instrument_node="">
</span><p data-dcnode-id="6337"><span data-dcnode-id="6338" instrument_node="">Step 1: Measure the man's weight (W [kg]) and height (H [cm]) in light clothes and without shoes, and record his age (A [y]).</span></p><span data-dcnode-id="6336" instrument_node="">
</span></div></li><span data-dcnode-id="6333" instrument_node="">
</span><span data-dcnode-id="6331" instrument_node="">
</span><li data-dcnode-id="6324"><span data-dcnode-id="6330" instrument_node="">
</span><div class="topbullet" data-dcnode-id="6325"><span data-dcnode-id="6329" instrument_node="">
</span><p data-dcnode-id="6327"><span data-dcnode-id="6328" instrument_node="">Step 2: Calculate his normal (predicted) W in kg, ie, normal (predicted) W = (0.79 × H) – 60.7.</span></p><span data-dcnode-id="6326" instrument_node="">
</span></div></li><span data-dcnode-id="6323" instrument_node="">
</span><span data-dcnode-id="6321" instrument_node="">
</span><li data-dcnode-id="6311"><span data-dcnode-id="6320" instrument_node="">
</span><div class="topbullet" data-dcnode-id="6312"><span data-dcnode-id="6319" instrument_node="">
</span><p data-dcnode-id="6314"><span data-dcnode-id="6318" instrument_node="">Step 3A: If his actual W equals his normal W, the formula is predicted peak VO</span><sub data-dcnode-id="6316"><span data-dcnode-id="6317" instrument_node="">2</span></sub><span data-dcnode-id="6315" instrument_node=""> (mL/min) = actual W × cycle factor.</span></p><span data-dcnode-id="6313" instrument_node="">
</span></div></li><span data-dcnode-id="6310" instrument_node="">
</span><span data-dcnode-id="6308" instrument_node="">
</span><li data-dcnode-id="6298"><span data-dcnode-id="6307" instrument_node="">
</span><div class="topbullet" data-dcnode-id="6299"><span data-dcnode-id="6306" instrument_node="">
</span><p data-dcnode-id="6301"><span data-dcnode-id="6305" instrument_node="">Step 3B: If his actual W is less than his normal W, the formula is predicted peak VO</span><sub data-dcnode-id="6303"><span data-dcnode-id="6304" instrument_node="">2</span></sub><span data-dcnode-id="6302" instrument_node=""> (mL/min) = [(normal W + actual W)/2] × cycle factor.</span></p><span data-dcnode-id="6300" instrument_node="">
</span></div></li><span data-dcnode-id="6297" instrument_node="">
</span><span data-dcnode-id="6295" instrument_node="">
</span><li data-dcnode-id="6285"><span data-dcnode-id="6294" instrument_node="">
</span><div class="topbullet" data-dcnode-id="6286"><span data-dcnode-id="6293" instrument_node="">
</span><p data-dcnode-id="6288"><span data-dcnode-id="6292" instrument_node="">Step 3C: If his actual W exceeds his normal W, the formula is predicted peak VO</span><sub data-dcnode-id="6290"><span data-dcnode-id="6291" instrument_node="">2</span></sub><span data-dcnode-id="6289" instrument_node=""> (mL/min) = (normal W × cycle factor) + [6 × (actual W – normal W)].</span></p><span data-dcnode-id="6287" instrument_node="">
</span></div></li><span data-dcnode-id="6284" instrument_node="">
</span><span data-dcnode-id="6282" instrument_node="">
</span><li data-dcnode-id="6272"><span data-dcnode-id="6281" instrument_node="">
</span><div class="topbullet" data-dcnode-id="6273"><span data-dcnode-id="6280" instrument_node="">
</span><p data-dcnode-id="6275"><span data-dcnode-id="6279" instrument_node="">Step 4: If a treadmill is used rather than cycle, multiply predicted VO</span><sub data-dcnode-id="6277"><span data-dcnode-id="6278" instrument_node="">2</span></sub><span data-dcnode-id="6276" instrument_node=""> by 1.11.</span></p><span data-dcnode-id="6274" instrument_node="">
</span></div></li><span data-dcnode-id="6271" instrument_node="">
</span></ul><span data-dcnode-id="6269" instrument_node="">
</span><div class="inContentAd" data-dcnode-id="6268" id="ads-pos-a7_12" rel="168"></div><span data-dcnode-id="6267" instrument_node="">
</span><p data-dcnode-id="6265"><span data-dcnode-id="6266" instrument_node="">For sedentary women, calculate the cycle factor, ie, cycle factor = 22.78 – (0.17 × age), as follows:</span></p><span data-dcnode-id="6264" instrument_node="">
</span><span data-dcnode-id="6262" instrument_node="">
</span><ul data-dcnode-id="6188"><span data-dcnode-id="6261" instrument_node="">
</span><span data-dcnode-id="6259" instrument_node="">
</span><li data-dcnode-id="6252"><span data-dcnode-id="6258" instrument_node="">
</span><div class="topbullet" data-dcnode-id="6253"><span data-dcnode-id="6257" instrument_node="">
</span><p data-dcnode-id="6255"><span data-dcnode-id="6256" instrument_node="">Step 1: Measure her weight (W [kg]) and height (H [cm]) in light clothes and without shoes, and record age (A [y]).</span></p><span data-dcnode-id="6254" instrument_node="">
</span></div></li><span data-dcnode-id="6251" instrument_node="">
</span><span data-dcnode-id="6249" instrument_node="">
</span><li data-dcnode-id="6242"><span data-dcnode-id="6248" instrument_node="">
</span><div class="topbullet" data-dcnode-id="6243"><span data-dcnode-id="6247" instrument_node="">
</span><p data-dcnode-id="6245"><span data-dcnode-id="6246" instrument_node="">Step 2: Calculate her normal (predicted) W in kg, ie, normal (predicted) W = (0.65 × H) – 42.8.</span></p><span data-dcnode-id="6244" instrument_node="">
</span></div></li><span data-dcnode-id="6241" instrument_node="">
</span><span data-dcnode-id="6239" instrument_node="">
</span><li data-dcnode-id="6229"><span data-dcnode-id="6238" instrument_node="">
</span><div class="topbullet" data-dcnode-id="6230"><span data-dcnode-id="6237" instrument_node="">
</span><p data-dcnode-id="6232"><span data-dcnode-id="6236" instrument_node="">Step 3A: If her actual W equals her normal W, the formula is predicted peak VO</span><sub data-dcnode-id="6234"><span data-dcnode-id="6235" instrument_node="">2</span></sub><span data-dcnode-id="6233" instrument_node=""> (mL/min) = (actual W + 43) × cycle factor.</span></p><span data-dcnode-id="6231" instrument_node="">
</span></div></li><span data-dcnode-id="6228" instrument_node="">
</span><span data-dcnode-id="6226" instrument_node="">
</span><li data-dcnode-id="6216"><span data-dcnode-id="6225" instrument_node="">
</span><div class="topbullet" data-dcnode-id="6217"><span data-dcnode-id="6224" instrument_node="">
</span><p data-dcnode-id="6219"><span data-dcnode-id="6223" instrument_node="">Step 3B: If her actual W is less than her normal W, the formula is predicted peak VO</span><sub data-dcnode-id="6221"><span data-dcnode-id="6222" instrument_node="">2</span></sub><span data-dcnode-id="6220" instrument_node=""> (mL/min) = [(normal W + actual W + 86)/2] × cycle factor.</span></p><span data-dcnode-id="6218" instrument_node="">
</span></div></li><span data-dcnode-id="6215" instrument_node="">
</span><span data-dcnode-id="6213" instrument_node="">
</span><li data-dcnode-id="6203"><span data-dcnode-id="6212" instrument_node="">
</span><div class="topbullet" data-dcnode-id="6204"><span data-dcnode-id="6211" instrument_node="">
</span><p data-dcnode-id="6206"><span data-dcnode-id="6210" instrument_node="">Step 3C: If her actual W exceeds her normal W, the formula is predicted peak VO</span><sub data-dcnode-id="6208"><span data-dcnode-id="6209" instrument_node="">2</span></sub><span data-dcnode-id="6207" instrument_node=""> (mL/min) = [(normal W + 43) X cycle factor] + [6 × (actual W – normal W)].</span></p><span data-dcnode-id="6205" instrument_node="">
</span></div></li><span data-dcnode-id="6202" instrument_node="">
</span><span data-dcnode-id="6200" instrument_node="">
</span><li data-dcnode-id="6190"><span data-dcnode-id="6199" instrument_node="">
</span><div class="topbullet" data-dcnode-id="6191"><span data-dcnode-id="6198" instrument_node="">
</span><p data-dcnode-id="6193"><span data-dcnode-id="6197" instrument_node="">Step 4: If a treadmill is used rather than a cycle, multiply her predicted VO</span><sub data-dcnode-id="6195"><span data-dcnode-id="6196" instrument_node="">2</span></sub><span data-dcnode-id="6194" instrument_node=""> by 1.11.</span></p><span data-dcnode-id="6192" instrument_node="">
</span></div></li><span data-dcnode-id="6189" instrument_node="">
</span></ul><span data-dcnode-id="6187" instrument_node="">
</span><div class="inContentAd" data-dcnode-id="6186" id="ads-pos-a7_13" rel="169"></div><span data-dcnode-id="6185" instrument_node="">
</span><p data-dcnode-id="6177"><span data-dcnode-id="6184" instrument_node="">A normal CPX test demonstrates a normal peak VO</span><sub data-dcnode-id="6182"><span data-dcnode-id="6183" instrument_node="">2</span></sub><span data-dcnode-id="6181" instrument_node="">, the peak HR at or below the predicted maximum HR, and demonstration of ventilatory reserve (peak ventilation/predicted maximum ventilation &lt; 65-70%). When the VO</span><sub data-dcnode-id="6179"><span data-dcnode-id="6180" instrument_node="">2</span></sub><span data-dcnode-id="6178" instrument_node=""> peak is low, the peak HR is compared to the predicted maximum HR to determine cardiovascular reserve. A ratio of HRpeak to HRpredicted maximum that approaches or exceeds one indicates a clear cardiovascular limitation to exercise.</span></p><span data-dcnode-id="6176" instrument_node="">
</span><div class="inContentAd" data-dcnode-id="6175" id="ads-pos-a7_14" rel="170"></div><span data-dcnode-id="6174" instrument_node="">
</span><p data-dcnode-id="6157"><span data-dcnode-id="6173" instrument_node="">Likewise, the peak expired volume (minute ventilation, V</span><sub data-dcnode-id="6171"><span data-dcnode-id="6172" instrument_node="">E</span></sub><span data-dcnode-id="6170" instrument_node="">) is compared to the larger of a pretest MVV or FEV</span><sub data-dcnode-id="6168"><span data-dcnode-id="6169" instrument_node="">1</span></sub><span data-dcnode-id="6167" instrument_node=""> multiplied by 40 to determine the pulmonary reserve. A ratio of V</span><sub data-dcnode-id="6165"><span data-dcnode-id="6166" instrument_node="">E</span></sub><span data-dcnode-id="6164" instrument_node=""> peak to V</span><sub data-dcnode-id="6162"><span data-dcnode-id="6163" instrument_node="">E</span></sub><span data-dcnode-id="6161" instrument_node=""> predicted maximum that approaches or exceeds one is a clear indication of pulmonary limitation. A VO</span><sub data-dcnode-id="6159"><span data-dcnode-id="6160" instrument_node="">2</span></sub><span data-dcnode-id="6158" instrument_node=""> peak below 15 mL/min/kg often is used as an indication of disability. Pulmonary limitation also may cause significant oxygen desaturation due to the reduction of the transit time of the pulmonary capillary blood to a point where diffusion limitation can occur. In the absence of cardiovascular or pulmonary limitation, peripheral circulatory or skeletal muscle limitation may exist. This must be distinguished from poor effort or malingering.</span></p><span data-dcnode-id="6156" instrument_node="">
</span><div class="inContentAd" data-dcnode-id="6155" id="ads-pos-a7_15" rel="171"></div><span data-dcnode-id="6154" instrument_node="">
</span><p data-dcnode-id="6149"><span data-dcnode-id="6153" instrument_node="">The anaerobic threshold is defined as the workload (expressed as VO</span><sub data-dcnode-id="6151"><span data-dcnode-id="6152" instrument_node="">2</span></sub><span data-dcnode-id="6150" instrument_node="">) in which blood lactate levels rise significantly (&gt;4mmol/L), indicating that a significant fraction of the work is being accomplished by anaerobic metabolic sources. The establishment of the anaerobic threshold may have clinical importance, particularly when the evaluation seeks to determine the presence of an occupational disability.</span></p><span data-dcnode-id="6148" instrument_node="">
</span><div class="inContentAd" data-dcnode-id="6147" id="ads-pos-a7_16" rel="172"></div><span data-dcnode-id="6146" instrument_node="">
</span><p data-dcnode-id="6144"><span data-dcnode-id="6145" instrument_node="">Identifying the anaerobic threshold noninvasively: The noninvasive determination of the anaerobic threshold can be accomplished by analyzing time averaged (20- to 30-s intervals) plots of parameters measured or calculated during the CPX test. Two methods can be used, the V-slope method and the ventilatory equivalent method. Both methods allow determination of the same physiologic event, the increased production of carbon dioxide by isocapnic buffering of lactic acid produced by anaerobic metabolism and yield comparable estimations.</span></p><span data-dcnode-id="6143" instrument_node="">
</span><div class="inContentAd" data-dcnode-id="6142" id="ads-pos-a7_17" rel="173"></div><span data-dcnode-id="6141" instrument_node="">
</span><p data-dcnode-id="6127"><span data-dcnode-id="6140" instrument_node="">V-slope method: The V-slope method of determining the anaerobic threshold makes use of the fact that carbon dioxide production (VCO</span><sub data-dcnode-id="6138"><span data-dcnode-id="6139" instrument_node="">2</span></sub><span data-dcnode-id="6137" instrument_node="">) plotted against oxygen consumption (VO</span><sub data-dcnode-id="6135"><span data-dcnode-id="6136" instrument_node="">2</span></sub><span data-dcnode-id="6134" instrument_node="">) shows a slope of slightly less than 1 for work below the anaerobic threshold. A line of best fit for points obtained from the start of exercise is drawn through this plot to obtain the initial slope (S1). When this slope changes to a steeper slope (S2), it indicates an increase in carbon dioxide production from the isocapnic buffering of lactic acid. The intersection of S1 and S2 mark the anaerobic threshold, typically reported as either the absolute value of the oxygen uptake (VO</span><sub data-dcnode-id="6132"><span data-dcnode-id="6133" instrument_node="">2</span></sub><span data-dcnode-id="6131" instrument_node="">, mL/min) at that point or as the percentage of the predicted peak VO</span><sub data-dcnode-id="6129"><span data-dcnode-id="6130" instrument_node="">2</span></sub><span data-dcnode-id="6128" instrument_node="">.</span></p><span data-dcnode-id="6126" instrument_node="">
</span><div class="inContentAd" data-dcnode-id="6125" id="ads-pos-a7_18" rel="174"></div><span data-dcnode-id="6124" instrument_node="">
</span><p data-dcnode-id="6077"><span data-dcnode-id="6123" instrument_node="">Ventilatory equivalent method: The ventilatory equivalent method of determining the anaerobic threshold makes use of the derived values known as the ventilatory equivalents for oxygen and carbon dioxide. Carbon dioxide production (VCO</span><sub data-dcnode-id="6121"><span data-dcnode-id="6122" instrument_node="">2</span></sub><span data-dcnode-id="6120" instrument_node="">) and oxygen consumption (VO</span><sub data-dcnode-id="6118"><span data-dcnode-id="6119" instrument_node="">2</span></sub><span data-dcnode-id="6117" instrument_node="">) divided into the minute ventilation (V</span><sub data-dcnode-id="6115"><span data-dcnode-id="6116" instrument_node="">E</span></sub><span data-dcnode-id="6114" instrument_node="">, L/min) are known as the ventilatory equivalents for carbon dioxide (V</span><sub data-dcnode-id="6112"><span data-dcnode-id="6113" instrument_node="">E</span></sub><span data-dcnode-id="6111" instrument_node="">/VCO</span><sub data-dcnode-id="6109"><span data-dcnode-id="6110" instrument_node="">2</span></sub><span data-dcnode-id="6108" instrument_node="">) and oxygen (V</span><sub data-dcnode-id="6106"><span data-dcnode-id="6107" instrument_node="">E</span></sub><span data-dcnode-id="6105" instrument_node="">/VO</span><sub data-dcnode-id="6103"><span data-dcnode-id="6104" instrument_node="">2</span></sub><span data-dcnode-id="6102" instrument_node="">). When time averaged (20- to 30-s intervals) plots of V</span><sub data-dcnode-id="6100"><span data-dcnode-id="6101" instrument_node="">E</span></sub><span data-dcnode-id="6099" instrument_node="">/VO</span><sub data-dcnode-id="6097"><span data-dcnode-id="6098" instrument_node="">2</span></sub><span data-dcnode-id="6096" instrument_node=""> and V</span><sub data-dcnode-id="6094"><span data-dcnode-id="6095" instrument_node="">E</span></sub><span data-dcnode-id="6093" instrument_node="">/VCO</span><sub data-dcnode-id="6091"><span data-dcnode-id="6092" instrument_node="">2</span></sub><span data-dcnode-id="6090" instrument_node=""> are plotted against time, the point at which the V</span><sub data-dcnode-id="6088"><span data-dcnode-id="6089" instrument_node="">E</span></sub><span data-dcnode-id="6087" instrument_node="">/VO</span><sub data-dcnode-id="6085"><span data-dcnode-id="6086" instrument_node="">2</span></sub><span data-dcnode-id="6084" instrument_node=""> is seen to increase without a simultaneous increase in the V</span><sub data-dcnode-id="6082"><span data-dcnode-id="6083" instrument_node="">E</span></sub><span data-dcnode-id="6081" instrument_node="">/VCO</span><sub data-dcnode-id="6079"><span data-dcnode-id="6080" instrument_node="">2</span></sub><span data-dcnode-id="6078" instrument_node=""> marks the anaerobic threshold.</span></p><span data-dcnode-id="6076" instrument_node="">

 data-dcnode-id="4864"><span data-dcnode-id="4865" instrument_node="">2</span></sub><span data-dcnode-id="4863" instrument_node=""> (%) (rest, maximum)</span></p></td><td data-dcnode-id="4857"><p data-dcnode-id="4858"><span data-dcnode-id="4859" instrument_node="">&nbsp;</span></p></td><td data-dcnode-id="4853"><p data-dcnode-id="4854"><span data-dcnode-id="4855" instrument_node="">96, 94</span></p></td></tr></tbody></table><span data-dcnode-id="4846" instrument_node="">

</span><p data-dcnode-id="4838"><span data-dcnode-id="4839" instrument_node="">The patient terminated the exercise test citing shortness of breath. The results reveal a moderately reduced oxygen consumption with a cardiovascular limitation (HR maximum exceeded the predicted maximum HR) and adequate ventilatory reserve. The oxygen pulse did not increase normally during the study, with near-peak values observed during unloaded cycling and very little increase during the work phase of the study. Cardiac function studies demonstrated left ventricular failure secondary to mitral insufficiency.</span></p><span data-dcnode-id="4837" instrument_node="">
</span><div class="inContentAd" data-dcnode-id="4836" id="ads-pos-a7_31" rel="187"></div><span data-dcnode-id="4835" instrument_node="">
</span><h3 data-dcnode-id="4833"><span data-dcnode-id="4834" instrument_node="">Preoperative evaluation for pneumonectomy</span></h3><span data-dcnode-id="4832" instrument_node="">
</span><p data-dcnode-id="4827"><span data-dcnode-id="4831" instrument_node="">VO</span><sub data-dcnode-id="4829"><span data-dcnode-id="4830" instrument_node="">2</span></sub><span data-dcnode-id="4828" instrument_node=""> maximum values greater than 20/mL/kg/min or 75% of predicted indicate the ability to withstand pneumonectomy when the cardiac history is negative.</span></p><span data-dcnode-id="4826" instrument_node="">
</span><div class="inContentAd" data-dcnode-id="4825" id="ads-pos-a7_32" rel="188"></div><span data-dcnode-id="4824" instrument_node="">
</span><p data-dcnode-id="4813"><span data-dcnode-id="4823" instrument_node="">A VO</span><sub data-dcnode-id="4821"><span data-dcnode-id="4822" instrument_node="">2</span></sub><span data-dcnode-id="4820" instrument_node=""> maximum between 10 and 20 mL/kg/min and 40-75% of predicted require prediction of postoperative FEV</span><sub data-dcnode-id="4818"><span data-dcnode-id="4819" instrument_node="">1</span></sub><span data-dcnode-id="4817" instrument_node="">, DLCO, and VO</span><sub data-dcnode-id="4815"><span data-dcnode-id="4816" instrument_node="">2</span></sub><span data-dcnode-id="4814" instrument_node="">. Prediction of postoperative function is calculated by multiplying the preoperative value by the fraction of total perfusion ascribed to the remaining lung, as follows:</span></p><span data-dcnode-id="4812" instrument_node="">
</span><div class="inContentAd" data-dcnode-id="4811" id="ads-pos-a7_33" rel="189"></div><span data-dcnode-id="4810" instrument_node="">
</span><blockquote data-dcnode-id="4793"><span data-dcnode-id="4809" instrument_node="">
</span><p data-dcnode-id="4795"><span data-dcnode-id="4808" instrument_node="">Predicted postoperative (PPO) (FEV</span><sub data-dcnode-id="4806"><span data-dcnode-id="4807" instrument_node="">1</span></sub><span data-dcnode-id="4805" instrument_node="">, DLCO, or VO</span><sub data-dcnode-id="4803"><span data-dcnode-id="4804" instrument_node="">2</span></sub><span data-dcnode-id="4802" instrument_node="">) = preoperative (FEV</span><sub data-dcnode-id="4800"><span data-dcnode-id="4801" instrument_node="">1</span></sub><span data-dcnode-id="4799" instrument_node="">, DLCO, or VO</span><sub data-dcnode-id="4797"><span data-dcnode-id="4798" instrument_node="">2</span></sub><span data-dcnode-id="4796" instrument_node="">) × Q% of the remaining lung</span></p><span data-dcnode-id="4794" instrument_node="">
</span></blockquote><span data-dcnode-id="4792" instrument_node="">
</span><div class="inContentAd" data-dcnode-id="4791" id="ads-pos-a7_34" rel="190"></div><span data-dcnode-id="4790" instrument_node="">
</span><p data-dcnode-id="4782"><span data-dcnode-id="4789" instrument_node="">When the FEV</span><sub data-dcnode-id="4787"><span data-dcnode-id="4788" instrument_node="">1</span></sub><span data-dcnode-id="4786" instrument_node=""> PPO and DLCO PPO are greater than 40% and the VO</span><sub data-dcnode-id="4784"><span data-dcnode-id="4785" instrument_node="">2</span></sub><span data-dcnode-id="4783" instrument_node=""> PPO is greater than 10 mL/kg/min and 35% of predicted, resection up to the calculated extent is feasible.</span></p><span data-dcnode-id="4781" instrument_node="">
</span><div class="inContentAd" data-dcnode-id="4780" id="ads-pos-a7_35" rel="191"></div><span data-dcnode-id="4779" instrument_node="">
</span><p data-dcnode-id="4771"><span data-dcnode-id="4778" instrument_node="">A VO</span><sub data-dcnode-id="4776"><span data-dcnode-id="4777" instrument_node="">2</span></sub><span data-dcnode-id="4775" instrument_node=""> maximum of less than 40% or 10 mL/kg/min or VO</span><sub data-dcnode-id="4773"><span data-dcnode-id="4774" instrument_node="">2</span></sub><span data-dcnode-id="4772" instrument_node=""> maximum PPO of less than 35% or 10 mL/kg/min strongly suggest inoperability for lung resection candidates.</span></p><span data-dcnode-id="4770" instrument_node="">
</span><div class="inContentAd" data-dcnode-id="4769" id="ads-pos-a7_36" rel="192"></div><span data-dcnode-id="4768" instrument_node="">
</span><h3 data-dcnode-id="4766"><span data-dcnode-id="4767" instrument_node="">Technical considerations</span></h3><span data-dcnode-id="4765" instrument_node="">
</span><p data-dcnode-id="4757"><span data-dcnode-id="4764" instrument_node="">Because motion artifact typically causes an estimation of SpO</span><sub data-dcnode-id="4762"><span data-dcnode-id="4763" instrument_node="">2</span></sub><span data-dcnode-id="4761" instrument_node=""> of 85%, care should be taken to differentiate oxygen desaturation from motion artifact, particularly if circulation to the oximeter probe site is compromised by pressure on a treadmill handrail or ergometer handgrip. If arterial blood is sampled at peak exercise, it should be obtained while exercising because PaO</span><sub data-dcnode-id="4759"><span data-dcnode-id="4760" instrument_node="">2</span></sub><span data-dcnode-id="4758" instrument_node=""> values can recover in as little as 15-30 seconds after cessation of exercise.</span></p><span data-dcnode-id="4756" instrument_node="">

</span><h3 data-dcnode-id="4712"><span data-dcnode-id="4713" instrument_node="">Indications</span></h3><span data-dcnode-id="4711" instrument_node="">
</span><p data-dcnode-id="4709"><span data-dcnode-id="4710" instrument_node="">ABGs are used in the evaluation of ventilation, oxygenation, and acid-base status.</span></p><span data-dcnode-id="4708" instrument_node="">
</span><div class="inContentAd" data-dcnode-id="4707" id="ads-pos-a8_2" rel="195"></div><span data-dcnode-id="4706" instrument_node="">
</span><h3 data-dcnode-id="4704"><span data-dcnode-id="4705" instrument_node="">Contraindications</span></h3><span data-dcnode-id="4703" instrument_node="">
</span><p data-dcnode-id="4701"><span data-dcnode-id="4702" instrument_node="">No contraindications exist, although some sampling sites may be deemed unsuitable for use secondary to peripheral circulatory disorders.</span></p><span data-dcnode-id="4700" instrument_node="">
</span><div class="inContentAd" data-dcnode-id="4699" id="ads-pos-a8_3" rel="196"></div><span data-dcnode-id="4698" instrument_node="">
</span><h3 data-dcnode-id="4696"><span data-dcnode-id="4697" instrument_node="">Patient care/preparations</span></h3><span data-dcnode-id="4695" instrument_node="">
</span><p data-dcnode-id="4693"><span data-dcnode-id="4694" instrument_node="">Assess collateral circulation. If a baseline room air oxygen level is desired, patients should discontinue use of supplemental oxygen for 20 minutes. If the patient is receiving anticoagulant therapy, extra care must be taken to continue pressure on the sampling site until bleeding has stopped. Personnel obtaining and/or analyzing the sample should don rubber gloves and take appropriate infection control measures.</span></p><span data-dcnode-id="4692" instrument_node="">
</span><div class="inContentAd" data-dcnode-id="4691" id="ads-pos-a8_4" rel="197"></div><span data-dcnode-id="4690" instrument_node="">
</span><h3 data-dcnode-id="4688"><span data-dcnode-id="4689" instrument_node="">Test</span></h3><span data-dcnode-id="4687" instrument_node="">
</span><p data-dcnode-id="4685"><span data-dcnode-id="4686" instrument_node="">The sampling site of choice is the radial artery, unless tests of collateral circulation indicate otherwise. Samples also may be obtained from the brachial and femoral arteries.</span></p><span data-dcnode-id="4684" instrument_node="">
</span><div class="inContentAd" data-dcnode-id="4683" id="ads-pos-a8_5" rel="198"></div><span data-dcnode-id="4682" instrument_node="">
</span><h3 data-dcnode-id="4680"><span data-dcnode-id="4681" instrument_node="">Results</span></h3><span data-dcnode-id="4679" instrument_node="">
</span><p data-dcnode-id="4677"><span data-dcnode-id="4678" instrument_node="">See the list below:</span></p><span data-dcnode-id="4676" instrument_node="">
</span><span data-dcnode-id="4674" instrument_node="">
</span><ul data-dcnode-id="4634"><span data-dcnode-id="4673" instrument_node="">
</span><span data-dcnode-id="4671" instrument_node="">
</span><li data-dcnode-id="4655"><span data-dcnode-id="4670" instrument_node="">
</span><div class="topbullet" data-dcnode-id="4656"><span data-dcnode-id="4669" instrument_node="">
</span><p data-dcnode-id="4658"><span data-dcnode-id="4668" instrument_node="">Measured: pH, PaCO</span><sub data-dcnode-id="4666"><span data-dcnode-id="4667" instrument_node="">2</span></sub><span data-dcnode-id="4665" instrument_node=""> (mm Hg or kPa), PaO</span><sub data-dcnode-id="4663"><span data-dcnode-id="4664" instrument_node="">2</span></sub><span data-dcnode-id="4662" instrument_node=""> (mm Hg or kPa), and, if hemoximetry is performed, total hemoglobin (tHb, g/dL), oxyhemoglobin (O</span><sub data-dcnode-id="4660"><span data-dcnode-id="4661" instrument_node="">2</span></sub><span data-dcnode-id="4659" instrument_node=""> Hb [%]), and metHb (%)</span></p><span data-dcnode-id="4657" instrument_node="">
</span></div></li><span data-dcnode-id="4654" instrument_node="">
</span><span data-dcnode-id="4652" instrument_node="">
</span><li data-dcnode-id="4636"><span data-dcnode-id="4651" instrument_node="">
</span><div class="topbullet" data-dcnode-id="4637"><span data-dcnode-id="4650" instrument_node="">
</span><p data-dcnode-id="4639"><span data-dcnode-id="4649" instrument_node="">Calculated: Total bicarbonate (HCO</span><sub data-dcnode-id="4647"><span data-dcnode-id="4648" instrument_node="">3</span></sub><span data-dcnode-id="4646" instrument_node=""> [mEq/L]), base excess or deficit (mEq/L), oxygen content (CO</span><sub data-dcnode-id="4644"><span data-dcnode-id="4645" instrument_node="">2</span></sub><span data-dcnode-id="4643" instrument_node=""> [mL] O</span><sub data-dcnode-id="4641"><span data-dcnode-id="4642" instrument_node="">2</span></sub><span data-dcnode-id="4640" instrument_node="">/dL or volume%)</span></p><span data-dcnode-id="4638" instrument_node="">
</span></div></li><span data-dcnode-id="4635" instrument_node="">
</span></ul><span data-dcnode-id="4633" instrument_node="">
</span><div class="inContentAd" data-dcnode-id="4632" id="ads-pos-a8_6" rel="199"></div><span data-dcnode-id="4631" instrument_node="">
</span><h3 data-dcnode-id="4629"><span data-dcnode-id="4630" instrument_node="">Interpretation</span></h3><span data-dcnode-id="4628" instrument_node="">
</span><p data-dcnode-id="4614"><span data-dcnode-id="4627" instrument_node="">ABGs provide three assessments of the function of the respiratory system: evaluation of oxygenation (PaO</span><sub data-dcnode-id="4625"><span data-dcnode-id="4626" instrument_node="">2</span></sub><span data-dcnode-id="4624" instrument_node=""> [mm Hg] and A-a oxygen gradient PO</span><sub data-dcnode-id="4622"><span data-dcnode-id="4623" instrument_node="">2</span></sub><span data-dcnode-id="4621" instrument_node="">), evaluation of the adequacy of ventilation (PaCO</span><sub data-dcnode-id="4619"><span data-dcnode-id="4620" instrument_node="">2</span></sub><span data-dcnode-id="4618" instrument_node=""> [mm Hg]), and evaluation of the lung's role in acid-base balance of the arterial blood (pH, PaCO</span><sub data-dcnode-id="4616"><span data-dcnode-id="4617" instrument_node="">2</span></sub><span data-dcnode-id="4615" instrument_node="">).</span></p><span data-dcnode-id="4613" instrument_node="">
</span><div class="inContentAd" data-dcnode-id="4612" id="ads-pos-a8_7" rel="200"></div><span data-dcnode-id="4611" instrument_node="">
</span><h3 data-dcnode-id="4609"><span data-dcnode-id="4610" instrument_node="">Oxygenation</span></h3><span data-dcnode-id="4608" instrument_node="">
</span><p data-dcnode-id="4589"><span data-dcnode-id="4607" instrument_node="">In healthy subjects breathing room air at sea level, the normal PaO</span><sub data-dcnode-id="4605"><span data-dcnode-id="4606" instrument_node="">2</span></sub><span data-dcnode-id="4604" instrument_node=""> (mm Hg) is affected by age, body mass index (BMI), PaCO</span><sub data-dcnode-id="4602"><span data-dcnode-id="4603" instrument_node="">2</span></sub><span data-dcnode-id="4601" instrument_node=""> (mm Hg), and posture (upright vs supine).</span><sup data-dcnode-id="4594"><span data-dcnode-id="4600" instrument_node="">
</span><span data-dcnode-id="4598" instrument_node=""> [</span><a data-dcnode-id="4596" href="javascript:void(0);" onclick="showToolTip(this,'references-layer','4')"><span data-dcnode-id="4597" instrument_node="">4</span></a><span data-dcnode-id="4595" instrument_node="">] </span></sup><span data-dcnode-id="4593" instrument_node="">An average decline in PaO</span><sub data-dcnode-id="4591"><span data-dcnode-id="4592" instrument_node="">2</span></sub><span data-dcnode-id="4590" instrument_node=""> of 10 mm Hg occurs for each decade of life up to approximately 75 years.</span></p><span data-dcnode-id="4588" instrument_node="">
</span><div class="inContentAd" data-dcnode-id="4587" id="ads-pos-a8_8" rel="201"></div><span data-dcnode-id="4586" instrument_node="">
</span><p data-dcnode-id="4581"><span data-dcnode-id="4585" instrument_node="">Normal PaO</span><sub data-dcnode-id="4583"><span data-dcnode-id="4584" instrument_node="">2</span></sub><span data-dcnode-id="4582" instrument_node=""> can be predicted by the following equation:</span></p><span data-dcnode-id="4580" instrument_node="">
</span><div class="inContentAd" data-dcnode-id="4579" id="ads-pos-a8_9" rel="202"></div><span data-dcnode-id="4578" instrument_node="">
</span><blockquote data-dcnode-id="4570"><span data-dcnode-id="4577" instrument_node="">
</span><p data-dcnode-id="4572"><span data-dcnode-id="4576" instrument_node="">Normal resting, room air PaO</span><sub data-dcnode-id="4574"><span data-dcnode-id="4575" instrument_node="">2</span></sub><span data-dcnode-id="4573" instrument_node=""> = 104 – (0.27 × age) + 7 mm Hg</span></p><span data-dcnode-id="4571" instrument_node="">
</span></blockquote><span data-dcnode-id="4569" instrument_node="">
</span><div class="inContentAd" data-dcnode-id="4568" id="ads-pos-a8_10" rel="203"></div><span data-dcnode-id="4567" instrument_node="">
</span><p data-dcnode-id="4565"><span data-dcnode-id="4566" instrument_node="">Low levels of arterial oxygen can be attributed to one or more of five categories, as follows: (1) ventilation/perfusion (V/Q) mismatching, (2) alveolar-capillary diffusion limitation, (3) hypoventilation, (4) anatomic right-to-left shunts, and (5) low inspired oxygen partial pressures (eg, altitude).</span></p><span data-dcnode-id="4564" instrument_node="">
</span><div class="inContentAd" data-dcnode-id="4563" id="ads-pos-a8_11" rel="204"></div><span data-dcnode-id="4562" instrument_node="">
</span><p data-dcnode-id="4557"><span data-dcnode-id="4561" instrument_node="">Evaluation of hypoventilation as a cause for a reduced PaO</span><sub data-dcnode-id="4559"><span data-dcnode-id="4560" instrument_node="">2</span></sub><span data-dcnode-id="4558" instrument_node=""> can be made using the ideal alveolar air equation, which allows computation of an alveolar oxygen tension and calculation of an A-a oxygen gradient.</span></p><span data-dcnode-id="4556" instrument_node="">
</span><div class="inContentAd" data-dcnode-id="4555" id="ads-pos-a8_12" rel="205"></div><span data-dcnode-id="4554" instrument_node="">
</span><p data-dcnode-id="4552"><span data-dcnode-id="4553" instrument_node="">The simplified ideal alveolar gas equation is as follows:</span></p><span data-dcnode-id="4551" instrument_node="">
</span><div class="inContentAd" data-dcnode-id="4550" id="ads-pos-a8_13" rel="206"></div><span data-dcnode-id="4549" instrument_node="">
</span><blockquote data-dcnode-id="4535"><span data-dcnode-id="4548" instrument_node="">
</span><p data-dcnode-id="4537"><span data-dcnode-id="4547" instrument_node="">PaO</span><sub data-dcnode-id="4545"><span data-dcnode-id="4546" instrument_node="">2</span></sub><span data-dcnode-id="4544" instrument_node=""> = PIO</span><sub data-dcnode-id="4542"><span data-dcnode-id="4543" instrument_node="">2</span></sub><span data-dcnode-id="4541" instrument_node=""> – (PaCO</span><sub data-dcnode-id="4539"><span data-dcnode-id="4540" instrument_node="">2</span></sub><span data-dcnode-id="4538" instrument_node="">/R)</span></p><span data-dcnode-id="4536" instrument_node="">
</span></blockquote><span data-dcnode-id="4534" instrument_node="">
</span><div class="inContentAd" data-dcnode-id="4533" id="ads-pos-a8_14" rel="207"></div><span data-dcnode-id="4532" instrument_node="">
</span><p data-dcnode-id="4521"><span data-dcnode-id="4531" instrument_node="">PaO</span><sub data-dcnode-id="4529"><span data-dcnode-id="4530" instrument_node="">2</span></sub><span data-dcnode-id="4528" instrument_node=""> is the ideal alveolar oxygen tension, PIO</span><sub data-dcnode-id="4526"><span data-dcnode-id="4527" instrument_node="">2</span></sub><span data-dcnode-id="4525" instrument_node=""> is partial pressure of inspired oxygen, PaCO</span><sub data-dcnode-id="4523"><span data-dcnode-id="4524" instrument_node="">2</span></sub><span data-dcnode-id="4522" instrument_node=""> is partial pressure of arterial carbon dioxide, and R is the ratio of carbon dioxide production to oxygen consumption (generally assumed to be 0.8 at rest).</span></p><span data-dcnode-id="4520" instrument_node="">
</span><div class="inContentAd" data-dcnode-id="4519" id="ads-pos-a8_15" rel="208"></div><span data-dcnode-id="4518" instrument_node="">
</span><p data-dcnode-id="4510"><span data-dcnode-id="4517" instrument_node="">The measured partial pressure of oxygen in the arterial blood is subtracted from the ideal alveolar oxygen tension to calculate the A-a PO</span><sub data-dcnode-id="4515"><span data-dcnode-id="4516" instrument_node="">2</span></sub><span data-dcnode-id="4514" instrument_node=""> gradient. This gradient can be compared to a normal age-adjusted gradient (normal resting, room air A-a oxygen gradient = (age + 4)/4) to determine the effects of hypoventilation and hyperventilation. Reduced arterial oxygen tension secondary to pure hypoventilation exhibits a normal A-a PO</span><sub data-dcnode-id="4512"><span data-dcnode-id="4513" instrument_node="">2</span></sub><span data-dcnode-id="4511" instrument_node=""> gradient.</span></p><span data-dcnode-id="4509" instrument_node="">
</span><div class="inContentAd" data-dcnode-id="4508" id="ads-pos-a8_16" rel="209"></div><span data-dcnode-id="4507" instrument_node="">
</span><p data-dcnode-id="4502"><span data-dcnode-id="4506" instrument_node="">Determination of right-to-left shunt by blood gases: The fraction of the cardiac output that bypasses normal circulatory pathways can be estimated by obtaining an ABG sample after 20 minutes of breathing 100% oxygen from a large reservoir bag. This period of oxygen breathing should wash out all of the nitrogen from all ventilated alveoli. This makes the measured oxygen gradient (A-a PO</span><sub data-dcnode-id="4504"><span data-dcnode-id="4505" instrument_node="">2</span></sub><span data-dcnode-id="4503" instrument_node="">) independent of V/Q inequalities. While the true shunt requires a measurement of a mixed venous oxygen level, this often is not practical, and an estimated arterial-to-mixed venous oxygen content difference of 5 volume% often is assumed, as shown.</span></p><span data-dcnode-id="4501" instrument_node="">
</span><div class="inContentAd" data-dcnode-id="4500" id="ads-pos-a8_17" rel="210"></div><span data-dcnode-id="4499" instrument_node="">
</span><blockquote data-dcnode-id="4488"><span data-dcnode-id="4498" instrument_node="">
</span><p data-dcnode-id="4490"><span data-dcnode-id="4497" instrument_node="">Qs/Qt = (0.0031 X [A-a]PO</span><sub data-dcnode-id="4495"><span data-dcnode-id="4496" instrument_node="">2</span></sub><span data-dcnode-id="4494" instrument_node="">)/(0.0031 X [A-a]PO</span><sub data-dcnode-id="4492"><span data-dcnode-id="4493" instrument_node="">2</span></sub><span data-dcnode-id="4491" instrument_node=""> + 5)</span></p><span data-dcnode-id="4489" instrument_node="">
</span></blockquote><span data-dcnode-id="4487" instrument_node="">
</span><div class="inContentAd" data-dcnode-id="4486" id="ads-pos-a8_18" rel="211"></div><span data-dcnode-id="4485" instrument_node="">
</span><p data-dcnode-id="4477"><span data-dcnode-id="4484" instrument_node="">Qs/Qt is the calculated right-to-left shunt fraction, 0.0031 is the solubility coefficient of oxygen in blood, (A-a) PO</span><sub data-dcnode-id="4482"><span data-dcnode-id="4483" instrument_node="">2</span></sub><span data-dcnode-id="4481" instrument_node=""> is the gradient of alveolar to arterial oxygen partial pressure after 20 minutes of breathing 100% oxygen, and 5 is the assumed difference in resting arterial-to-mixed venous oxygen content. States of low and high cardiac output may invalidate the assumed arteriovenous oxygen (A-VO</span><sub data-dcnode-id="4479"><span data-dcnode-id="4480" instrument_node="">2</span></sub><span data-dcnode-id="4478" instrument_node="">) difference and cause significant error in the calculated shunt fraction.</span></p><span data-dcnode-id="4476" instrument_node="">
</span><div class="inContentAd" data-dcnode-id="4475" id="ads-pos-a8_19" rel="212"></div><span data-dcnode-id="4474" instrument_node="">
</span><p data-dcnode-id="4472"><span data-dcnode-id="4473" instrument_node="">Causes of increased right-to-left shunting may be intrapulmonary, such as pulmonary arteriovenous malformations, dilated capillaries in hepatopulmonary syndrome, lobar collapse or consolidation, or extrapulmonary conditions (eg, right-to-left intracardiac shunts, bronchial artery-to-pulmonary vein connections.</span></p><span data-dcnode-id="4471" instrument_node="">
</span><div class="inContentAd" data-dcnode-id="4470" id="ads-pos-a8_20" rel="213"></div><span data-dcnode-id="4469" instrument_node="">
</span><h3 data-dcnode-id="4467"><span data-dcnode-id="4468" instrument_node="">Technical considerations</span></h3><span data-dcnode-id="4466" instrument_node="">
</span><p data-dcnode-id="4451"><span data-dcnode-id="4465" instrument_node="">Samples must be mixed with an anticoagulant, preferably heparin (if liquid, dead space volume of syringe and needle should be filled before sampling with 1000 U/mL heparin), to avoid clotting before or during analysis. Samples should be analyzed immediately. Recommendations have been to store samples in ice water if analysis is delayed to reduce the drop in PO</span><sub data-dcnode-id="4463"><span data-dcnode-id="4464" instrument_node="">2</span></sub><span data-dcnode-id="4462" instrument_node=""> secondary to the metabolism of blood cells. However, one study demonstrated a significant increase in PO</span><sub data-dcnode-id="4460"><span data-dcnode-id="4461" instrument_node="">2</span></sub><span data-dcnode-id="4459" instrument_node=""> of arterial blood gas samples obtained in a plastic syringe and stored in ice water for 30 minutes.</span><sup data-dcnode-id="4452"><span data-dcnode-id="4458" instrument_node="">
</span><span data-dcnode-id="4456" instrument_node=""> [</span><a data-dcnode-id="4454" href="javascript:void(0);" onclick="showToolTip(this,'references-layer','20')"><span data-dcnode-id="4455" instrument_node="">20</span></a><span data-dcnode-id="4453" instrument_node="">] </span></sup></p><span data-dcnode-id="4450" instrument_node="">
</span><div class="inContentAd" data-dcnode-id="4449" id="ads-pos-a8_21" rel="214"></div><span data-dcnode-id="4448" instrument_node="">
</span></div><span data-dcnode-id="4446" instrument_node="">
</span><div class="emed-logo" data-dcnode-id="4442"><span data-dcnode-id="4445" instrument_node="">
</span><img alt="eMedicine Logo" data-dcnode-id="4444" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//img.medscapestatic.com/pi/global/logos/emed/logo-emedicine77x17.svg&amp;raw"><span data-dcnode-id="4443" instrument_node="">
</span></div><span data-dcnode-id="4441" instrument_node="">

</span><h2 data-dcnode-id="4420"><span data-dcnode-id="4421" instrument_node="">Exhaled Nitric Oxide</span></h2><span data-dcnode-id="4419" instrument_node="">
</span><div class="refsection_content" data-dcnode-id="4004"><span data-dcnode-id="4418" instrument_node="">
</span><span data-dcnode-id="4416" instrument_node="">
</span><h3 data-dcnode-id="4414"><span data-dcnode-id="4415" instrument_node="">Background</span></h3><span data-dcnode-id="4413" instrument_node="">
</span><p data-dcnode-id="4405"><span data-dcnode-id="4412" instrument_node="">Measurement of fractional exhaled nitric oxide (F</span><sub data-dcnode-id="4410"><span data-dcnode-id="4411" instrument_node="">E</span></sub><span data-dcnode-id="4409" instrument_node="">NO) is a noninvasive, safe, and simple method of quantifying airway inflammation. F</span><sub data-dcnode-id="4407"><span data-dcnode-id="4408" instrument_node="">E</span></sub><span data-dcnode-id="4406" instrument_node="">NO in asthma may have the utility of helping make the diagnosis, monitoring the patient's compliance with prescribed medications, and predicting pending exacerbations.</span></p><span data-dcnode-id="4404" instrument_node="">
</span><div class="inContentAd" data-dcnode-id="4403" id="ads-pos-a9_1" rel="215"></div><span data-dcnode-id="4402" instrument_node="">
</span><p data-dcnode-id="4388"><span data-dcnode-id="4401" instrument_node="">It is important to recognize that asthma is a clinical diagnosis and F</span><sub data-dcnode-id="4399"><span data-dcnode-id="4400" instrument_node="">E</span></sub><span data-dcnode-id="4398" instrument_node="">NO is not diagnostic for asthma, nor does a normal F</span><sub data-dcnode-id="4396"><span data-dcnode-id="4397" instrument_node="">E</span></sub><span data-dcnode-id="4395" instrument_node="">NO measurement not exclude the diagnosis of asthma. F</span><sub data-dcnode-id="4393"><span data-dcnode-id="4394" instrument_node="">E</span></sub><span data-dcnode-id="4392" instrument_node="">NO may be low in asthma not due to airway eosinophilia. F</span><sub data-dcnode-id="4390"><span data-dcnode-id="4391" instrument_node="">E</span></sub><span data-dcnode-id="4389" instrument_node="">NO does have utility in predicting steroid responsiveness, even in the absence of induced sputum eosinophils.</span></p><span data-dcnode-id="4387" instrument_node="">
</span><div class="inContentAd" data-dcnode-id="4386" id="ads-pos-a9_2" rel="216"></div><span data-dcnode-id="4385" instrument_node="">
</span><h3 data-dcnode-id="4383"><span data-dcnode-id="4384" instrument_node="">Indications</span></h3><span data-dcnode-id="4382" instrument_node="">
</span><p data-dcnode-id="4366"><span data-dcnode-id="4381" instrument_node="">Common reasons for obtaining a F</span><sub data-dcnode-id="4379"><span data-dcnode-id="4380" instrument_node="">E</span></sub><span data-dcnode-id="4378" instrument_node="">NO test include the following</span><sup data-dcnode-id="4368"><span data-dcnode-id="4377" instrument_node="">
</span><span data-dcnode-id="4375" instrument_node=""> [</span><a data-dcnode-id="4373" href="javascript:void(0);" onclick="showToolTip(this,'references-layer','21')"><span data-dcnode-id="4374" instrument_node="">21</span></a><span data-dcnode-id="4372" instrument_node="">, </span><a data-dcnode-id="4370" href="javascript:void(0);" onclick="showToolTip(this,'references-layer','22')"><span data-dcnode-id="4371" instrument_node="">22</span></a><span data-dcnode-id="4369" instrument_node="">] </span></sup><span data-dcnode-id="4367" instrument_node="">:</span></p><span data-dcnode-id="4365" instrument_node="">
</span><span data-dcnode-id="4363" instrument_node="">
</span><ul data-dcnode-id="4288"><span data-dcnode-id="4362" instrument_node="">
</span><span data-dcnode-id="4360" instrument_node="">
</span><li data-dcnode-id="4353"><span data-dcnode-id="4359" instrument_node="">
</span><div class="topbullet" data-dcnode-id="4354"><span data-dcnode-id="4358" instrument_node="">

</span><p data-dcnode-id="4271"><span data-dcnode-id="4281" instrument_node="">F</span><sub data-dcnode-id="4279"><span data-dcnode-id="4280" instrument_node="">E</span></sub><span data-dcnode-id="4278" instrument_node="">NO measurements have been shown to be increased by nitrate-containing foods such as lettuce and may be transiently lowered by drinking coffee or water and smoking cigarettes. Patients should refrain from smoking and the ingestion of food or beverages for 1 hour before F</span><sub data-dcnode-id="4276"><span data-dcnode-id="4277" instrument_node="">E</span></sub><span data-dcnode-id="4275" instrument_node="">NO measurement. Upper and lower respiratory tract viral infections may lead to increased levels of F</span><sub data-dcnode-id="4273"><span data-dcnode-id="4274" instrument_node="">E</span></sub><span data-dcnode-id="4272" instrument_node="">NO, and measurement should be deferred until recovery, if possible.</span></p><span data-dcnode-id="4270" instrument_node="">
</span><div class="inContentAd" data-dcnode-id="4269" id="ads-pos-a9_4" rel="218"></div><span data-dcnode-id="4268" instrument_node="">
</span><p data-dcnode-id="4266"><span data-dcnode-id="4267" instrument_node="">Clinical instruments for the measurement of exhaled nitric oxide typically require that the patient inhale fully through the device so that ambient nitric oxide can be scrubbed. The patient then exhales into the device, which affords greater than 5 cm water resistance to assist with velum closure, thereby preventing or minimizing nasal contribution to the exhaled gas sample (nasal nitric oxide is much higher than lower airway nitric oxide). The measuring device provides auditory and visual feedback to assist with maintaining a constant exhaled flow.&nbsp; A single sample deemed acceptable by the measuring device is sufficient.</span></p><span data-dcnode-id="4265" instrument_node="">

</span><div class="imgWrapper" data-dcnode-id="3178" data-rel="//img.medscapestatic.com/pi/meds/ckb/37/14637.jpg"></div><span data-dcnode-id="3177" instrument_node="">
</span><div class="captionWrapper" data-dcnode-id="3175"><span data-dcnode-id="3176" instrument_node="">
           Flow-volume characteristics of technically correct and technically deficient spirometry. 
          </span></div></li><span data-dcnode-id="3173" instrument_node="">
</span><span data-dcnode-id="3171" instrument_node="">
</span><li data-dcnode-id="3165" id="reimageid2"><span data-dcnode-id="3170" instrument_node="">
</span><div class="imgWrapper" data-dcnode-id="3169" data-rel="//img.medscapestatic.com/pi/meds/ckb/38/14638.jpg"></div><span data-dcnode-id="3168" instrument_node="">
</span><div class="captionWrapper" data-dcnode-id="3166"><span data-dcnode-id="3167" instrument_node="">
           This is a graph of lung volumes in health and in disease, showing the various lung subdivisions. Normal aging results in an increase in functional reserve capacity (FRC) and residual volume (RV) and a normal total lung capacity (TLC) percentage. Obstructive lung diseases cause hyperinflation (increase in RV and FRC) with a relatively normal forced vital capacity (FVC). In severe emphysema, the TLC percentage can exceed 150%, with the RV impinging on the FVC. Restrictive lung diseases exhibit reduced TLC percentage with relative preservation of the RV/TLC percentage in fibrosis, a reduced inspiratory capacity and expiratory reserve volume (ERV) in neuromuscular disease, and severe reduction of the ERV in extreme obesity. 
          </span></div></li><span data-dcnode-id="3164" instrument_node="">
</span><span data-dcnode-id="3162" instrument_node="">
</span><li data-dcnode-id="3156" id="reimageid3"><span data-dcnode-id="3161" instrument_node="">
</span><div class="imgWrapper" data-dcnode-id="3160" data-rel="//img.medscapestatic.com/pi/meds/ckb/40/14640.jpg"></div><span data-dcnode-id="3159" instrument_node="">
</span><div class="captionWrapper" data-dcnode-id="3157"><span data-dcnode-id="3158" instrument_node="">
           Flow reduction must be consistent on every effort to be considered actual flow limitation. Fixed upper airway obstruction may be caused by postintubation stenosis, goiter, endotracheal neoplasms, and bronchial stenosis. Variable intrathoracic obstruction may be caused by tracheomalacia, polychondritis, and tumors of the lower trachea or main bronchus. Variable extrathoracic obstruction may be caused by bilateral and unilateral vocal cord paralysis, vocal cord constriction, reduced pharyngeal cross-sectional area, and airway burns. 
          </span></div></li><span data-dcnode-id="3155" instrument_node="">
</span><span data-dcnode-id="3153" instrument_node="">
</span><li data-dcnode-id="3147" id="reimageid4"><span data-dcnode-id="3152" instrument_node="">
</span><div class="imgWrapper" data-dcnode-id="3151" data-rel="//img.medscapestatic.com/pi/meds/ckb/13/62313.png"></div><span data-dcnode-id="3150" instrument_node="">
</span><div class="captionWrapper" data-dcnode-id="3148"><span data-dcnode-id="3149" instrument_node="">
           Example of an acceptable spirometry testing session showing evidence 3 efforts that show evidence of an explosive start of forced exhalation that continues until empty and good repeatability of forced vital capacity (FVC) and forced expiratory volume in the first second of the forceful exhalation (FEV1), which usually indicates all efforts started from full inflation.
          </span></div></li><span data-dcnode-id="3146" instrument_node="">

0.100 L or 10% of the highest value, whichever is greater</span></p></td></tr><tr data-dcnode-id="2669"><td colspan="5" data-dcnode-id="2671"><p data-dcnode-id="2680"><sup data-dcnode-id="2682"><span data-dcnode-id="2683" instrument_node="">a</span></sup><span data-dcnode-id="2681" instrument_node="">For children ≤6 y, must have at least 0.75 s of expiration without glottis closure or cough for acceptable or useable measurement of FEV0.75.</span></p><p data-dcnode-id="2676"><sup data-dcnode-id="2678"><span data-dcnode-id="2679" instrument_node="">b</span></sup><span data-dcnode-id="2677" instrument_node="">Occurs when the patient cannot expire long enough to achieve a plateau (eg, children with high elastic recoil or patients with restrictive lung disease) or the patient inspires or comes off the mouthpiece before a plateau.&nbsp;For within-maneuver acceptability, the FVC must be larger than or within the repeatability tolerance of the largest FVC observed before this maneuver within the current prebronchodilator or the current postbronchodilator testing set.</span></p><p data-dcnode-id="2672"><sup data-dcnode-id="2674"><span data-dcnode-id="2675" instrument_node="">c</span></sup><span data-dcnode-id="2673" instrument_node="">Although the performance of a maximal forced inspiration is strongly recommended, its absence does not preclude a maneuver from being judged acceptable, unless extrathoracic obstruction is specifically being investigated.</span></p></td></tr></tbody></table><span data-dcnode-id="2664" instrument_node="">
