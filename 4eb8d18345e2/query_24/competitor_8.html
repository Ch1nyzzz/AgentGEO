</span><h2 data-dcnode-id="9511"><span data-dcnode-id="9512" instrument_node="">Spirometry</span></h2><span data-dcnode-id="9510" instrument_node="">
</span><div class="refsection_content" data-dcnode-id="8351"><span data-dcnode-id="9509" instrument_node="">
</span><span data-dcnode-id="9507" instrument_node="">
</span><h3 data-dcnode-id="9505"><span data-dcnode-id="9506" instrument_node="">Description</span></h3><span data-dcnode-id="9504" instrument_node="">
</span><p data-dcnode-id="9499"><span data-dcnode-id="9503" instrument_node="">Spirometry assesses the integrated mechanical function of the lung, chest wall, respiratory muscles, and airways by measuring the total volume of air exhaled from a full lung (total lung capacity [TLC]) to maximal expiration (residual volume [RV]). This volume, the forced vital capacity (FVC) and the forced expiratory volume in the first second of the forceful exhalation (FEV</span><sub data-dcnode-id="9501"><span data-dcnode-id="9502" instrument_node="">1</span></sub><span data-dcnode-id="9500" instrument_node="">), should be repeatable to within 0.15 L upon repeat efforts in the same measurement unless the largest value for either parameter is less than 1 L. In this case, the expected repeatability is to within 0.1 L of the largest value. The patient is instructed to inhale as much as possible and then exhale rapidly and forcefully for as long as flow can be maintained. The patient should exhale until one of the criteria defining the end of a forced exhalation has been reached. At the end of the forced exhalation, the patient should again inhale fully as rapidly as possible. The FVC should then be compared with that inhaled volume to verify that the forced expiratory maneuver did start from full inflation.</span></p><span data-dcnode-id="9498" instrument_node="">
</span><div class="AdUnit" data-dcnode-id="9497" id="ads-pos-1122"></div><span data-dcnode-id="9496" instrument_node="">
</span><span data-dcnode-id="9493" instrument_node="">
</span><p data-dcnode-id="9469"><span data-dcnode-id="9492" instrument_node="">Reduction in FEV</span><sub data-dcnode-id="9490"><span data-dcnode-id="9491" instrument_node="">1</span></sub><span data-dcnode-id="9489" instrument_node=""> may reflect reduction in the maximum inflation of the lungs (TLC); obstruction of the airways; respiratory muscle weakness; or submaximal expiratory force due to poor coaching, poor understanding, or malingering. Airway obstruction is the most common cause of reduction in FEV</span><sub data-dcnode-id="9487"><span data-dcnode-id="9488" instrument_node="">1</span></sub><span data-dcnode-id="9486" instrument_node="">. Airway obstruction may be secondary to bronchospasm, airway inflammation, loss of lung elastic recoil, increased secretions in the airway, or any combination of these causes. Response of FEV</span><sub data-dcnode-id="9484"><span data-dcnode-id="9485" instrument_node="">1</span></sub><span data-dcnode-id="9483" instrument_node=""> to inhaled bronchodilators is used to assess the reversibility of airway obstruction, although it is now widely appreciated that a response showing a lack of a significant increase in FEV</span><sub data-dcnode-id="9481"><span data-dcnode-id="9482" instrument_node="">1</span></sub><span data-dcnode-id="9480" instrument_node=""> does not indicate the patient will not benefit clinically from bronchodilator therapy. A significant increase in the inspiratory capacity (IC) and/or vital capacity (VC) after bronchodilator therapy can occur even when the FEV</span><sub data-dcnode-id="9478"><span data-dcnode-id="9479" instrument_node="">1</span></sub><span data-dcnode-id="9477" instrument_node=""> fails to show a significant change.</span><sup data-dcnode-id="9470"><span data-dcnode-id="9476" instrument_node="">
</span><span data-dcnode-id="9474" instrument_node=""> [</span><a data-dcnode-id="9472" href="javascript:void(0);" onclick="showToolTip(this,'references-layer','1')"><span data-dcnode-id="9473" instrument_node="">1</span></a><span data-dcnode-id="9471" instrument_node="">] </span></sup></p><span data-dcnode-id="9468" instrument_node="">
</span><p data-dcnode-id="9455"><span data-dcnode-id="9467" instrument_node="">The standards used to describe the quality of spirometry measurements are from the Standardization of Spirometry 2019 Update.</span><sup data-dcnode-id="9460"><span data-dcnode-id="9466" instrument_node="">
</span><span data-dcnode-id="9464" instrument_node=""> [</span><a data-dcnode-id="9462" href="javascript:void(0);" onclick="showToolTip(this,'references-layer','2')"><span data-dcnode-id="9463" instrument_node="">2</span></a><span data-dcnode-id="9461" instrument_node="">] </span></sup><span data-dcnode-id="9459" instrument_node="">&nbsp;This document provides examples of the most common technical problems associated with spirometry testing. See </span><a data-dcnode-id="9457" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.atsjournals.org/doi/full/10.1164/rccm.201908-1590ST" target="_blank"><span data-dcnode-id="9458" instrument_node="">Standardization of Spirometry 2019 Update. An Official American Thoracic Society and European Respiratory Society Technical Statement</span></a><span data-dcnode-id="9456" instrument_node="">&nbsp;for more information.</span></p><span data-dcnode-id="9454" instrument_node="">
</span><div class="txtAd520SpcHolder" data-dcnode-id="9450" id="plcHold-520"><span data-dcnode-id="9453" instrument_node="">
</span><div class="AdUnit" data-dcnode-id="9452" id="ads-pos-520"></div><span data-dcnode-id="9451" instrument_node="">
</span></div><span data-dcnode-id="9449" instrument_node="">
</span><span data-dcnode-id="9446" instrument_node="">
</span><h3 data-dcnode-id="9444"><span data-dcnode-id="9445" instrument_node="">Indications</span></h3><span data-dcnode-id="9443" instrument_node="">
</span><p data-dcnode-id="9441"><span data-dcnode-id="9442" instrument_node="">Spirometry is used to establish baseline lung function, evaluate dyspnea, detect pulmonary disease, monitor effects of therapies used to treat respiratory disease, evaluate respiratory impairment or disability, evaluate operative risk, and perform surveillance for occupational-related lung disease. It may also be used in research and clinical trials and epidemiological surveys.</span></p><span data-dcnode-id="9440" instrument_node="">
</span><div class="txtAd1520SpcHolder" data-dcnode-id="9436" id="plcHold-1520"><span data-dcnode-id="9439" instrument_node="">
</span><div class="AdUnit" data-dcnode-id="9438" id="ads-pos-1520"></div><span data-dcnode-id="9437" instrument_node="">
</span></div><span data-dcnode-id="9435" instrument_node="">
</span><span data-dcnode-id="9432" instrument_node="">
</span><h3 data-dcnode-id="9430"><span data-dcnode-id="9431" instrument_node="">Contraindications</span></h3><span data-dcnode-id="9429" instrument_node="">
</span><p data-dcnode-id="9427"><span data-dcnode-id="9428" instrument_node="">Relative contraindications (no absolute contraindications) for spirometry are as follows:</span></p><span data-dcnode-id="9426" instrument_node="">
</span><span data-dcnode-id="9424" instrument_node="">
</span><ul data-dcnode-id="9387"><span data-dcnode-id="9423" instrument_node="">
</span><span data-dcnode-id="9421" instrument_node="">
</span><li data-dcnode-id="9417"><span data-dcnode-id="9420" instrument_node="">
</span><div class="topbullet" data-dcnode-id="9418"><span data-dcnode-id="9419" instrument_node="">
          Conditions that may be negatively impacted by the increases in myocardial demand or changes in blood pressure associated with spirometry: These include recent (&lt; 1 week) myocardial infarction, systemic hypotension or severe hypertension, significant atrial/ventricular arrhythmia, noncompensated heart failure, uncontrolled pulmonary hypertension, acute cor pulmonale, clinically unstable pulmonary embolism, and a history of syncope associated with forced exhalation.
         </span></div></li><span data-dcnode-id="9416" instrument_node="">
</span><span data-dcnode-id="9414" instrument_node="">
</span><li data-dcnode-id="9410"><span data-dcnode-id="9413" instrument_node="">
</span><div class="topbullet" data-dcnode-id="9411"><span data-dcnode-id="9412" instrument_node="">
          Conditions that may be negatively impacted by the increase in intracranial/intraocular pressure associated with spirometry: These include cerebral aneurysm, recent (&lt; 4 weeks) brain surgery, recent concussion with continuing symptoms, and recent (within 1 week) eye surgery.
         </span></div></li><span data-dcnode-id="9409" instrument_node="">
</span><span data-dcnode-id="9407" instrument_node="">
</span><li data-dcnode-id="9403"><span data-dcnode-id="9406" instrument_node="">
</span><div class="topbullet" data-dcnode-id="9404"><span data-dcnode-id="9405" instrument_node="">
          Conditions that may be negatively impacted by increased sinus and middle ear pressures: Examples include recent (&lt; 1 week) sinus or middle ear surgery or infections.
         </span></div></li><span data-dcnode-id="9402" instrument_node="">
</span><span data-dcnode-id="9400" instrument_node="">
</span><li data-dcnode-id="9396"><span data-dcnode-id="9399" instrument_node="">
</span><div class="topbullet" data-dcnode-id="9397"><span data-dcnode-id="9398" instrument_node="">
          Conditions that may be negatively impacted by increased intrathoracic and intraabdominal pressures: Examples include the presence of pneumothorax, recent (&lt; 4 weeks) thoracic or abdominal surgery, and late-term pregnancy.
         </span></div></li><span data-dcnode-id="9395" instrument_node="">
</span><span data-dcnode-id="9393" instrument_node="">
</span><li data-dcnode-id="9389"><span data-dcnode-id="9392" instrument_node="">
</span><div class="topbullet" data-dcnode-id="9390"><span data-dcnode-id="9391" instrument_node="">
          Infection control issues, including active or suspected transmissible respiratory or systemic infections including tuberculosis, or physical conditions predisposing to transmission of infections such as hemoptysis, significant secretions or oral lesions or bleeding
         </span></div></li><span data-dcnode-id="9388" instrument_node="">
</span></ul><span data-dcnode-id="9386" instrument_node="">
</span><div class="inContentAd" data-dcnode-id="9385" id="ads-pos-a1_1" rel="4"></div><span data-dcnode-id="9384" instrument_node="">
</span><h3 data-dcnode-id="9382"><span data-dcnode-id="9383" instrument_node="">Patient care/preparations</span></h3><span data-dcnode-id="9381" instrument_node="">
</span><p data-dcnode-id="9379"><span data-dcnode-id="9380" instrument_node="">Two choices are available with respect to bronchodilator and medication use prior to testing. Patients may withhold oral and inhaled bronchodilators to establish baseline lung function and evaluate maximum bronchodilator response, or they may continue taking medication as prescribed. If medications are withheld, a risk of exacerbation of bronchial spasm exists.</span></p><span data-dcnode-id="9378" instrument_node="">
</span><div class="inContentAd" data-dcnode-id="9377" id="ads-pos-a1_2" rel="5"></div><span data-dcnode-id="9376" instrument_node="">
</span><h3 data-dcnode-id="9374"><span data-dcnode-id="9375" instrument_node="">Interpretation</span></h3><span data-dcnode-id="9373" instrument_node="">
</span><p data-dcnode-id="9371"><span data-dcnode-id="9372" instrument_node="">Interpretation of spirometry results should begin with an assessment of test quality. Failure to meet performance standards can result in unreliable test results (see the image below). The American Thoracic Society (ATS) defines acceptable spirometry as an expiratory effort that has the following characteristics:</span></p><span data-dcnode-id="9370" instrument_node="">
</span><div class="inContentAd" data-dcnode-id="9369" id="ads-pos-a1_3" rel="6"></div><span data-dcnode-id="9368" instrument_node="">
</span><p data-dcnode-id="9366"><span data-dcnode-id="9367" instrument_node="">Pulmonary function tests require patients to successfully perform respiratory maneuvers in a standardized manner in order to obtain clinically meaningful results. Spirometry is perhaps the most technically and physically demanding. The patient is required to inhale as fully as possible, exhale with as much force as possible, and continue their expiratory effort until they empty their lungs as completely as possible or are unable to continue.</span></p><span data-dcnode-id="9365" instrument_node="">
</span><div class="inContentAd" data-dcnode-id="9364" id="ads-pos-a1_4" rel="7"></div><span data-dcnode-id="9363" instrument_node="">
</span><p data-dcnode-id="9361"><span data-dcnode-id="9362" instrument_node="">The performance standards for acceptable spirometry are summarized below. The comments of the technologist administering the test can assist the interpreting physician in determining if results of a testing session that fail to meet some of the standards can still provide clinically useful data.</span></p><span data-dcnode-id="9360" instrument_node="">
</span><div class="inContentAd" data-dcnode-id="9359" id="ads-pos-a1_5" rel="8"></div><span data-dcnode-id="9358" instrument_node="">

</span></ul></td><td data-dcnode-id="9130"><p data-dcnode-id="9131"><span data-dcnode-id="9132" instrument_node="">-</span></p></td><td data-dcnode-id="9126"><p data-dcnode-id="9127"><span data-dcnode-id="9128" instrument_node="">+</span></p></td><td data-dcnode-id="9122"><p data-dcnode-id="9123"><span data-dcnode-id="9124" instrument_node="">-</span></p></td><td data-dcnode-id="9118"><p data-dcnode-id="9119"><span data-dcnode-id="9120" instrument_node="">-</span></p></td></tr><tr data-dcnode-id="9093"><td data-dcnode-id="9111"><p data-dcnode-id="9112"><span data-dcnode-id="9113" instrument_node="">Must have no evidence of obstructed mouthpiece or spirometer</span></p></td><td data-dcnode-id="9107"><p data-dcnode-id="9108"><span data-dcnode-id="9109" instrument_node="">+</span></p></td><td data-dcnode-id="9103"><p data-dcnode-id="9104"><span data-dcnode-id="9105" instrument_node="">+</span></p></td><td data-dcnode-id="9099"><p data-dcnode-id="9100"><span data-dcnode-id="9101" instrument_node="">-</span></p></td><td data-dcnode-id="9095"><p data-dcnode-id="9096"><span data-dcnode-id="9097" instrument_node="">-</span></p></td></tr><tr data-dcnode-id="9070"><td data-dcnode-id="9088"><p data-dcnode-id="9089"><span data-dcnode-id="9090" instrument_node="">Must have no evidence of a leak</span></p></td><td data-dcnode-id="9084"><p data-dcnode-id="9085"><span data-dcnode-id="9086" instrument_node="">+</span></p></td><td data-dcnode-id="9080"><p data-dcnode-id="9081"><span data-dcnode-id="9082" instrument_node="">+</span></p></td><td data-dcnode-id="9076"><p data-dcnode-id="9077"><span data-dcnode-id="9078" instrument_node="">-</span></p></td><td data-dcnode-id="9072"><p data-dcnode-id="9073"><span data-dcnode-id="9074" instrument_node="">-</span></p></td></tr><tr data-dcnode-id="9045"><td data-dcnode-id="9063"><p data-dcnode-id="9064"><span data-dcnode-id="9067" instrument_node="">If the maximal inspiration following end of forced expiration&nbsp;is &gt;FVC, then FIVC – FVC must be ≤ 0.100 L or 5% of FVC, whichever is greater</span><sup data-dcnode-id="9065"><span data-dcnode-id="9066" instrument_node="">c</span></sup></p></td><td data-dcnode-id="9059"><p data-dcnode-id="9060"><span data-dcnode-id="9061" instrument_node="">+</span></p></td><td data-dcnode-id="9055"><p data-dcnode-id="9056"><span data-dcnode-id="9057" instrument_node="">+</span></p></td><td data-dcnode-id="9051"><p data-dcnode-id="9052"><span data-dcnode-id="9053" instrument_node="">-</span></p></td><td data-dcnode-id="9047"><p data-dcnode-id="9048"><span data-dcnode-id="9049" instrument_node="">-</span></p></td></tr><tr data-dcnode-id="9033"><td colspan="5" data-dcnode-id="9035"><p data-dcnode-id="9036"><strong data-dcnode-id="9041"><span data-dcnode-id="9042" instrument_node="">Repeatability Criteria &nbsp;</span></strong><span data-dcnode-id="9040" instrument_node="">(applied to acceptable FVC and FEV</span><sub data-dcnode-id="9038"><span data-dcnode-id="9039" instrument_node="">1</span></sub><span data-dcnode-id="9037" instrument_node=""> values) &nbsp;</span></p></td></tr><tr data-dcnode-id="9023"><td colspan="5" data-dcnode-id="9025"><p data-dcnode-id="9026"><span data-dcnode-id="9030" instrument_node="">Age &gt;6 y:&nbsp; Difference between two largest FVC values must be ≤0.150 L, and the difference between two largest FEV</span><sub data-dcnode-id="9028"><span data-dcnode-id="9029" instrument_node="">1</span></sub><span data-dcnode-id="9027" instrument_node=""> values must be ≤0.150 L</span></p></td></tr><tr data-dcnode-id="9013"><td colspan="5" data-dcnode-id="9015"><p data-dcnode-id="9016"><span data-dcnode-id="9020" instrument_node="">Age ≤6 y:&nbsp; Difference between two largest FVC values must be ≤0.100 L or 10% of the highest value, whichever is greater, and the difference between two largest FEV</span><sub data-dcnode-id="9018"><span data-dcnode-id="9019" instrument_node="">1</span></sub><span data-dcnode-id="9017" instrument_node=""> values must be ≤0.100 L or 10% of the highest value, whichever is greater</span></p></td></tr><tr data-dcnode-id="8996"><td colspan="5" data-dcnode-id="8998"><p data-dcnode-id="9007"><sup data-dcnode-id="9009"><span data-dcnode-id="9010" instrument_node="">a</span></sup><span data-dcnode-id="9008" instrument_node="">For children ≤6 y, must have at least 0.75 s of expiration without glottis closure or cough for acceptable or useable measurement of FEV0.75.</span></p><p data-dcnode-id="9003"><sup data-dcnode-id="9005"><span data-dcnode-id="9006" instrument_node="">b</span></sup><span data-dcnode-id="9004" instrument_node="">Occurs when the patient cannot expire long enough to achieve a plateau (eg, children with high elastic recoil or patients with restrictive lung disease) or the patient inspires or comes off the mouthpiece before a plateau.&nbsp;For within-maneuver acceptability, the FVC must be larger than or within the repeatability tolerance of the largest FVC observed before this maneuver within the current prebronchodilator or the current postbronchodilator testing set.</span></p><p data-dcnode-id="8999"><sup data-dcnode-id="9001"><span data-dcnode-id="9002" instrument_node="">c</span></sup><span data-dcnode-id="9000" instrument_node="">Although the performance of a maximal forced inspiration is strongly recommended, its absence does not preclude a maneuver from being judged acceptable, unless extrathoracic obstruction is specifically being investigated.</span></p></td></tr></tbody></table><span data-dcnode-id="8991" instrument_node="">

</span><table class="datatable" data-dcnode-id="8878" id="t82c5c2613"><tbody data-dcnode-id="8880"><tr data-dcnode-id="8956"><td data-dcnode-id="8963"><p data-dcnode-id="8964"><strong data-dcnode-id="8965"><span data-dcnode-id="8966" instrument_node="">Grade</span></strong></p></td><td data-dcnode-id="8958"><p data-dcnode-id="8959"><strong data-dcnode-id="8960"><span data-dcnode-id="8961" instrument_node="">Criteria for Adults, Older Children, and Children Aged 2-6 Years</span></strong></p></td></tr><tr data-dcnode-id="8943"><td data-dcnode-id="8951"><p data-dcnode-id="8952"><span data-dcnode-id="8953" instrument_node="">A</span></p></td><td data-dcnode-id="8945"><p data-dcnode-id="8948"><span data-dcnode-id="8949" instrument_node="">&gt; 3 acceptable efforts with repeatability within 0.150 L</span></p><p data-dcnode-id="8946"><span data-dcnode-id="8947" instrument_node="">&nbsp;&nbsp;&nbsp;&nbsp; for age 2-6 y, 0.100 L, or 10% of highest value, whichever is greater</span></p></td></tr><tr data-dcnode-id="8930"><td data-dcnode-id="8938"><p data-dcnode-id="8939"><span data-dcnode-id="8940" instrument_node="">B</span></p></td><td data-dcnode-id="8932"><p data-dcnode-id="8935"><span data-dcnode-id="8936" instrument_node="">2 acceptable efforts with repeatability within 0.150 L</span></p><p data-dcnode-id="8933"><span data-dcnode-id="8934" instrument_node="">&nbsp;&nbsp;&nbsp;&nbsp; for age 2-6 y, 0.100 L, or 10% of highest value, whichever is greater</span></p></td></tr><tr data-dcnode-id="8917"><td data-dcnode-id="8925"><p data-dcnode-id="8926"><span data-dcnode-id="8927" instrument_node="">C</span></p></td><td data-dcnode-id="8919"><p data-dcnode-id="8922"><span data-dcnode-id="8923" instrument_node="">&gt; 2 acceptable efforts with repeatability within 0.200 L</span></p><p data-dcnode-id="8920"><span data-dcnode-id="8921" instrument_node="">&nbsp;&nbsp;&nbsp;&nbsp; for age 2-6 y, 0.150 L, or 10% of highest value, whichever is greater</span></p></td></tr><tr data-dcnode-id="8904"><td data-dcnode-id="8912"><p data-dcnode-id="8913"><span data-dcnode-id="8914" instrument_node="">D</span></p></td><td data-dcnode-id="8906"><p data-dcnode-id="8909"><span data-dcnode-id="8910" instrument_node="">&gt; 2 acceptable efforts with repeatability within 0.250 L</span></p><p data-dcnode-id="8907"><span data-dcnode-id="8908" instrument_node="">&nbsp;&nbsp;&nbsp;&nbsp; for age 2-6 y, 0.200 L, or 10% of highest value, whichever is greater</span></p></td></tr><tr data-dcnode-id="8893"><td data-dcnode-id="8899"><p data-dcnode-id="8900"><span data-dcnode-id="8901" instrument_node="">E</span></p></td><td data-dcnode-id="8895"><p data-dcnode-id="8896"><span data-dcnode-id="8897" instrument_node="">One acceptable&nbsp; effort</span></p></td></tr><tr data-dcnode-id="8882"><td data-dcnode-id="8888"><p data-dcnode-id="8889"><span data-dcnode-id="8890" instrument_node="">F</span></p></td><td data-dcnode-id="8884"><p data-dcnode-id="8885"><span data-dcnode-id="8886" instrument_node="">No acceptable efforts</span></p></td></tr></tbody></table><span data-dcnode-id="8877" instrument_node="">

</span><div class="inContentAd" data-dcnode-id="8874" id="ads-pos-a1_8" rel="11"></div><span data-dcnode-id="8873" instrument_node="">
</span><span data-dcnode-id="8871" instrument_node="">
</span><p data-dcnode-id="8866"><span data-dcnode-id="8870" instrument_node="">Note that FEV</span><sub data-dcnode-id="8868"><span data-dcnode-id="8869" instrument_node="">1</span></sub><span data-dcnode-id="8867" instrument_node=""> and FVC each are graded separately.</span></p><span data-dcnode-id="8865" instrument_node="">
</span><div class="inContentAd" data-dcnode-id="8864" id="ads-pos-a1_9" rel="12"></div><span data-dcnode-id="8863" instrument_node="">
</span><p data-dcnode-id="8861"><span data-dcnode-id="8862" instrument_node="">Characteristics of acceptable spirometry efforts are as follows:</span></p><span data-dcnode-id="8860" instrument_node="">
</span><span data-dcnode-id="8858" instrument_node="">
</span><ul data-dcnode-id="8804"><span data-dcnode-id="8857" instrument_node="">
</span><span data-dcnode-id="8855" instrument_node="">
</span><li data-dcnode-id="8851"><span data-dcnode-id="8854" instrument_node="">
</span><div class="topbullet" data-dcnode-id="8852"><span data-dcnode-id="8853" instrument_node="">
          The patient is vigorously coached to inspire rapidly to full inflation.
         </span></div></li><span data-dcnode-id="8850" instrument_node="">
</span><span data-dcnode-id="8848" instrument_node="">
</span><li data-dcnode-id="8844"><span data-dcnode-id="8847" instrument_node="">
</span><div class="topbullet" data-dcnode-id="8845"><span data-dcnode-id="8846" instrument_node="">
          The patient shows minimal hesitation at the start of the forced expiration (extrapolated volume &lt; 5% of FVC or 0.10 L, whichever is larger).
         </span></div></li><span data-dcnode-id="8843" instrument_node="">
</span><span data-dcnode-id="8841" instrument_node="">
</span><li data-dcnode-id="8837"><span data-dcnode-id="8840" instrument_node="">
</span><div class="topbullet" data-dcnode-id="8838"><span data-dcnode-id="8839" instrument_node="">
          The patients shows an explosive start of the forced exhalation (rise time to peak flow no greater than 0.150 s). Rise time to peak flow is not available on all spirometers. If it not available, it is not part of the assessment of the acceptability of the start of the forced exhalation.
         </span></div></li><span data-dcnode-id="8836" instrument_node="">
</span><span data-dcnode-id="8834" instrument_node="">
</span><li data-dcnode-id="8830"><span data-dcnode-id="8833" instrument_node="">
</span><div class="topbullet" data-dcnode-id="8831"><span data-dcnode-id="8832" instrument_node="">
          The patient shows no evidence of cough or artifact in the first second of forced exhalation.
         </span></div></li><span data-dcnode-id="8829" instrument_node="">
</span><span data-dcnode-id="8827" instrument_node="">
</span><li data-dcnode-id="8823"><span data-dcnode-id="8826" instrument_node="">
</span><div class="topbullet" data-dcnode-id="8824"><span data-dcnode-id="8825" instrument_node="">
          The results meets one of three criteria that define a valid end-of-forced exhalation: (1) smooth curvilinear rise of the volume-time tracing to a plateau (plateau defined as &lt; 0.025 L volume change in the last 1 s of expiration) of at least 1 second's duration; (2) if a forced test fails to exhibit an expiratory plateau, a forced expiratory time of 15 seconds; or (3) the FVC is within the repeatability tolerance of or is greater than the largest prior observed FVC.
         </span></div></li><span data-dcnode-id="8822" instrument_node="">
</span><span data-dcnode-id="8820" instrument_node="">
</span><li data-dcnode-id="8816"><span data-dcnode-id="8819" instrument_node="">
</span><div class="topbullet" data-dcnode-id="8817"><span data-dcnode-id="8818" instrument_node="">
          Upon completing the forced exhalation, the patient is coached to rapidly (&gt; 2 L/s flow) inhale to full inflation upon completing the forced exhalation providing a value for forced inspiratory vital capacity (FIVC). The maximum FIVC can be no more than 0.100 L or 5% of the FVC larger than the FVC (whichever is greater). If the maximum FIVC is more than 0.100 L or 5% of the FVC larger than the FVC, that effort is not acceptable and cannot be used for reporting of any parameters.
         </span></div></li><span data-dcnode-id="8815" instrument_node="">
</span><span data-dcnode-id="8813" instrument_node="">
</span><li data-dcnode-id="8806"><span data-dcnode-id="8812" instrument_node="">
</span><div class="topbullet" data-dcnode-id="8807"><span data-dcnode-id="8811" instrument_node="">
          Repeatability of the largest FVC and FEV
          </span><sub data-dcnode-id="8809"><span data-dcnode-id="8810" instrument_node="">1</span></sub><span data-dcnode-id="8808" instrument_node=""> within 0.150 L (within 0.100 L if age &lt; 6 y) is demonstrated in at least two efforts.
         </span></div></li><span data-dcnode-id="8805" instrument_node="">
</span></ul><span data-dcnode-id="8803" instrument_node="">
</span><div class="inContentAd" data-dcnode-id="8802" id="ads-pos-a1_10" rel="13"></div><span data-dcnode-id="8801" instrument_node="">
</span><span data-dcnode-id="8799" instrument_node="">
</span><div class="inlineImage" data-dcnode-id="8781"><span data-dcnode-id="8798" instrument_node="">
</span><a data-dcnode-id="8796" href="javascript:refImgShow(4)" onclick="wmdTrack('cr-im_4');"><img alt="Example of an acceptable spirometry testing sessio" class="pborder" data-dcnode-id="8797" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//img.medscapestatic.com/pi/meds/ckb/13/62313tn.jpg&amp;raw"></a><span data-dcnode-id="8795" instrument_node="">
</span><span data-dcnode-id="8793" instrument_node="">
</span><span data-dcnode-id="8791" instrument_node="">
</span><span class="capt" data-dcnode-id="8789"><span data-dcnode-id="8790" instrument_node="">Example of an acceptable spirometry testing session showing evidence 3 efforts that show evidence of an explosive start of forced exhalation that continues until empty and good repeatability of forced vital capacity (FVC) and forced expiratory volume in the first second of the forceful exhalation (FEV1), which usually indicates all efforts started from full inflation.</span></span><span data-dcnode-id="8788" instrument_node="">
</span><div class="galleryLink" data-dcnode-id="8783"><span data-dcnode-id="8787" instrument_node="">
</span><a data-dcnode-id="8785" href="javascript:refImgShow('001')" onclick="wmdTrack('cr-ar_view');"><span data-dcnode-id="8786" instrument_node="">View Media Gallery</span></a><span data-dcnode-id="8784" instrument_node="">
</span></div><span data-dcnode-id="8782" instrument_node="">
</span></div><span data-dcnode-id="8780" instrument_node="">
</span><div class="inContentAd" data-dcnode-id="8779" id="ads-pos-a1_11" rel="14"></div><span data-dcnode-id="8778" instrument_node="">
</span><p data-dcnode-id="8773"><span data-dcnode-id="8777" instrument_node="">Comprehensive treatment of technical acceptability of spirometry test results is beyond the scope of this review. Readers are directed to </span><a data-dcnode-id="8775" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.cdc.gov/niosh/docs/2012-116/pdfs/2012-116.pdf" target="_blank"><span data-dcnode-id="8776" instrument_node="">Spirometry Quality Assurance: Common Errors and Their Impact on Test Results</span></a><span data-dcnode-id="8774" instrument_node="">. A&nbsp;booklet can also be obtained from the Department of Health and Human Services. It provides examples of common spirometry performance errors and their impact on test results.</span></p><span data-dcnode-id="8772" instrument_node="">
</span><div class="inContentAd" data-dcnode-id="8771" id="ads-pos-a1_12" rel="15"></div><span data-dcnode-id="8770" instrument_node="">
</span><p data-dcnode-id="8759"><span data-dcnode-id="8769" instrument_node="">In patients that have significant loss of lung elastic recoil (pulmonary emphysema, COPD), spirometry may show negative effort dependence of forced expiratory flow. The effort that has the highest peak expiratory effort may produce a lower FEV</span><sub data-dcnode-id="8767"><span data-dcnode-id="8768" instrument_node="">1</span></sub><span data-dcnode-id="8766" instrument_node=""> because of the dynamic compression of the airways that results from the loss of elastic recoil support of airways that is characteristic of emphysema. In this circumstance, reporting the highest FEV</span><sub data-dcnode-id="8764"><span data-dcnode-id="8765" instrument_node="">1</span></sub><span data-dcnode-id="8763" instrument_node=""> coming from an effort with submaximal expiratory effort can lead to confusing results, particularly if a setting of assessing spirometric response to bronchodilators. Although not yet a spirometry acceptability standard, it appears that when reporting the FEV1 considering only efforts that have a time to peak flow (T</span><sub data-dcnode-id="8761"><span data-dcnode-id="8762" instrument_node="">PEF</span></sub><span data-dcnode-id="8760" instrument_node="">) less than or equal to 0.12 seconds helps eliminate this effect. This parameter can be displayed on most laboratory-based spirometry testing&nbsp;systems.&nbsp;</span></p><span data-dcnode-id="8758" instrument_node="">
</span><div class="inContentAd" data-dcnode-id="8757" id="ads-pos-a1_13" rel="16"></div><span data-dcnode-id="8756" instrument_node="">
</span><p data-dcnode-id="8742"><span data-dcnode-id="8755" instrument_node="">Inspection of the volume-time tracing aids in identification of early termination of expiration by evaluating the presence of an expiratory plateau. In the absence of an expiratory plateau, a 15-second expiratory time ensures the quality of the FVC. Inspection of the start of the volume-time tracing can help identify a hesitant start, which can result in a falsely low FEV</span><sub data-dcnode-id="8753"><span data-dcnode-id="8754" instrument_node="">1</span></sub><span data-dcnode-id="8752" instrument_node="">. Repeatability of the FVC and the FEV</span><sub data-dcnode-id="8750"><span data-dcnode-id="8751" instrument_node="">1</span></sub><span data-dcnode-id="8749" instrument_node=""> helps ensure that the results truly represent the patient's lung function. Attention should be focused on the repeatability of two key parameters: FVC and FEV</span><sub data-dcnode-id="8747"><span data-dcnode-id="8748" instrument_node="">1</span></sub><span data-dcnode-id="8746" instrument_node="">. It should be noted that while repeatability of the FVC and FEV</span><sub data-dcnode-id="8744"><span data-dcnode-id="8745" instrument_node="">1</span></sub><span data-dcnode-id="8743" instrument_node=""> strengthens the confidence that the forced exhalations started from full inflation, it is possible to demonstrate repeatability of these parameters even when forced exhalations start from a lung volume below full inflation. Demonstration that the difference between the largest FIVC and the FVC is no more than the larger of 0.100 L or 5% of the largest FIVC is a key acceptability criterion.</span></p><span data-dcnode-id="8741" instrument_node="">
</span><div class="inContentAd" data-dcnode-id="8740" id="ads-pos-a1_14" rel="17"></div><span data-dcnode-id="8739" instrument_node="">
</span><p data-dcnode-id="8718"><span data-dcnode-id="8738" instrument_node="">The reference equations published in 2012 by the Global Lung Initiative (GLI), a Task Force of the European Respiratory Society, provide normative values for males and females from age 3 to 95 years across a wide range of ethnicities,</span><sup data-dcnode-id="8731"><span data-dcnode-id="8737" instrument_node="">
</span><span data-dcnode-id="8735" instrument_node=""> [</span><a data-dcnode-id="8733" href="javascript:void(0);" onclick="showToolTip(this,'references-layer','3')"><span data-dcnode-id="8734" instrument_node="">3</span></a><span data-dcnode-id="8732" instrument_node="">] </span></sup><span data-dcnode-id="8730" instrument_node="">and these should be used as the default set of reference values for spirometry. The use of these predicted values for spirometry has been supported globally, including endorsements from the European Respiratory Society, the ATS, the American College of Chest Physicians, the Thoracic Society of Australia and New Zealand, the Australian and New Zealand Society of Respiratory Science, and the Asian Pacific Society for Respirology. The report is in accordance with the previously published recommendations of the ATS that called for the elimination of a fixed percent of predicted cut point to determine normality and a fixed lower limit of normal of the FEV</span><sub data-dcnode-id="8728"><span data-dcnode-id="8729" instrument_node="">1</span></sub><span data-dcnode-id="8727" instrument_node="">/FVC ratio to identify airway obstruction, both of which have been shown to result in significant misclassification of spirometry results.</span><sup data-dcnode-id="8720"><span data-dcnode-id="8726" instrument_node="">
</span><span data-dcnode-id="8724" instrument_node=""> [</span><a data-dcnode-id="8722" href="javascript:void(0);" onclick="showToolTip(this,'references-layer','2')"><span data-dcnode-id="8723" instrument_node="">2</span></a><span data-dcnode-id="8721" instrument_node="">] </span></sup><span data-dcnode-id="8719" instrument_node="">Guidelines for a standardized report format have been published and should be the default report format. The use of Z scores to determine severity of spirometric abnormalities is encouraged.</span></p><span data-dcnode-id="8717" instrument_node="">
</span><div class="inContentAd" data-dcnode-id="8716" id="ads-pos-a1_15" rel="18"></div><span data-dcnode-id="8715" instrument_node="">
</span><p data-dcnode-id="8713"><span data-dcnode-id="8714" instrument_node="">Abnormalities can be classified by the physiologic patterns outlined below.</span></p><span data-dcnode-id="8712" instrument_node="">
</span><div class="inContentAd" data-dcnode-id="8711" id="ads-pos-a1_16" rel="19"></div><span data-dcnode-id="8710" instrument_node="">
</span><h3 data-dcnode-id="8708"><span data-dcnode-id="8709" instrument_node="">Obstructive defects</span></h3><span data-dcnode-id="8707" instrument_node="">
</span><p data-dcnode-id="8696"><span data-dcnode-id="8706" instrument_node="">Disproportionate reduction in the FEV</span><sub data-dcnode-id="8704"><span data-dcnode-id="8705" instrument_node="">1</span></sub><span data-dcnode-id="8703" instrument_node=""> as compared with the FVC is reflected in the FEV</span><sub data-dcnode-id="8701"><span data-dcnode-id="8702" instrument_node="">1</span></sub><span data-dcnode-id="8700" instrument_node="">/FVC ratio and is the hallmark of obstructive lung diseases. This physiologic category of lung diseases includes but is not limited to asthma, acute and chronic bronchitis, emphysema, bronchiectasis, cystic fibrosis, and bronchiolitis. The forced expiratory flow at any given lung volume is reduced. The mechanism responsible for the reduction in airflow can be bronchial spasm, airway inflammation, increased intraluminal secretions, and/or reduction in parenchymal support of the airways due to loss of lung elastic recoil. Poor understanding and effort on the part of the patient is also a cause for reduced flows, and the diagnosis of airway obstruction should be limited to measurements composed of acceptable efforts demonstrating repeatability of FVC and FEV</span><sub data-dcnode-id="8698"><span data-dcnode-id="8699" instrument_node="">1</span></sub><span data-dcnode-id="8697" instrument_node="">.</span></p><span data-dcnode-id="8695" instrument_node="">
</span><div class="inContentAd" data-dcnode-id="8694" id="ads-pos-a1_17" rel="20"></div><span data-dcnode-id="8693" instrument_node="">
</span><p data-dcnode-id="8688"><span data-dcnode-id="8692" instrument_node="">The use of a fixed lower limit of normal for the FEV</span><sub data-dcnode-id="8690"><span data-dcnode-id="8691" instrument_node="">1</span></sub><span data-dcnode-id="8689" instrument_node="">/FVC ratio as proposed by the Global Initiative for Obstructive Lung Disease (GOLD) lacks a scientific basis and results in significant misclassification of patients at either end of the age spectrum. Young patients are classified as "normal" when airflow obstruction is present, and older patients are classified as showing obstruction when no airflow obstruction is present. The use of the GOLD threshold for identifying airway obstruction should be discouraged in clinical practice where or when computerized predicted values are available.</span></p><span data-dcnode-id="8687" instrument_node="">
</span><div class="inContentAd" data-dcnode-id="8686" id="ads-pos-a1_18" rel="21"></div><span data-dcnode-id="8685" instrument_node="">
</span><p data-dcnode-id="8683"><span data-dcnode-id="8684" instrument_node="">The recommended practice for identifying a spirometric abnormality is to use the predicted lower limit of normal for that individual based on the sex, age, height, and ethnicity. The GLI reference equations provide lower limits of normal for spirometric parameters.</span></p><span data-dcnode-id="8682" instrument_node="">
</span><div class="inContentAd" data-dcnode-id="8681" id="ads-pos-a1_19" rel="22"></div><span data-dcnode-id="8680" instrument_node="">
</span><h3 data-dcnode-id="8678"><span data-dcnode-id="8679" instrument_node="">Assessment of reversibility of airway obstruction</span></h3><span data-dcnode-id="8677" instrument_node="">
</span><p data-dcnode-id="8672"><span data-dcnode-id="8676" instrument_node="">When airway obstruction is identified on spirometry, assessing response to inhaled bronchodilators is useful. The ATS has recommended that the threshold for significant response be demonstration of an increase of at least 12% and 0.2 L in either FVC (provided the expiratory time for both sessions agree within 10%) or FEV</span><sub data-dcnode-id="8674"><span data-dcnode-id="8675" instrument_node="">1</span></sub><span data-dcnode-id="8673" instrument_node=""> on a spirogram performed 10-15 minutes after inhalation of a therapeutic dose of a bronchodilating agent. New standards recommend the use of four inhalations (100 mcg each, 400 mcg total dose) of albuterol administered through a valved spacer device. When concern about tremor or heart rate exists, lower doses may be used. Response to an anticholinergic drug may be assessed 30 minutes after four inhalations (40 mcg each, 160 mcg total dose) of ipratropium bromide. Failure to respond to bronchodilator challenge does not preclude clinical benefit from bronchodilators. A positive response to the bronchodilators may correlate with response to steroid therapy.</span></p><span data-dcnode-id="8671" instrument_node="">
</span><div class="inContentAd" data-dcnode-id="8670" id="ads-pos-a1_20" rel="23"></div><span data-dcnode-id="8669" instrument_node="">
</span><h3 data-dcnode-id="8667"><span data-dcnode-id="8668" instrument_node="">Restrictive defects</span></h3><span data-dcnode-id="8666" instrument_node="">
</span><p data-dcnode-id="8661"><span data-dcnode-id="8665" instrument_node="">Reduction in the FVC with a normal or elevated FEV</span><sub data-dcnode-id="8663"><span data-dcnode-id="8664" instrument_node="">1</span></sub><span data-dcnode-id="8662" instrument_node="">-to-FVC ratio should trigger further evaluation of total lung capacity (TLC) to rule out restrictive lung disease. Measuring the TLC and residual volume (RV) can confirm restriction suggested by spirometry (see Lung Volume Determination below). See the chart below.</span></p><span data-dcnode-id="8660" instrument_node="">
</span><div class="inContentAd" data-dcnode-id="8659" id="ads-pos-a1_21" rel="24"></div><span data-dcnode-id="8658" instrument_node="">
</span><span data-dcnode-id="8656" instrument_node="">
</span><div class="inlineImage" data-dcnode-id="8638"><span data-dcnode-id="8655" instrument_node="">
</span><a data-dcnode-id="8653" href="javascript:refImgShow(2)" onclick="wmdTrack('cr-im_2');"><img alt="This is a graph of lung volumes in health and in d" class="pborder" data-dcnode-id="8654" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//img.medscapestatic.com/pi/meds/ckb/38/14638tn.jpg&amp;raw"></a><span data-dcnode-id="8652" instrument_node="">
</span><span data-dcnode-id="8650" instrument_node="">
</span><span data-dcnode-id="8648" instrument_node="">
</span><span class="capt" data-dcnode-id="8646"><span data-dcnode-id="8647" instrument_node="">This is a graph of lung volumes in health and in disease, showing the various lung subdivisions. Normal aging results in an increase in functional reserve capacity (FRC) and residual volume (RV) and a normal total lung capacity (TLC) percentage. Obstructive lung diseases cause hyperinflation (increase in RV and FRC) with a relatively normal forced vital capacity (FVC). In severe emphysema, the TLC percentage can exceed 150%, with the RV impinging on the FVC. Restrictive lung diseases exhibit reduced TLC percentage with relative preservation of the RV/TLC percentage in fibrosis, a reduced inspiratory capacity and expiratory reserve volume (ERV) in neuromuscular disease, and severe reduction of the ERV in extreme obesity. </span></span><span data-dcnode-id="8645" instrument_node="">
</span><div class="galleryLink" data-dcnode-id="8640"><span data-dcnode-id="8644" instrument_node="">
</span><a data-dcnode-id="8642" href="javascript:refImgShow('001')" onclick="wmdTrack('cr-ar_view');"><span data-dcnode-id="8643" instrument_node="">View Media Gallery</span></a><span data-dcnode-id="8641" instrument_node="">
</span></div><span data-dcnode-id="8639" instrument_node="">
</span></div><span data-dcnode-id="8637" instrument_node="">
</span><div class="inContentAd" data-dcnode-id="8636" id="ads-pos-a1_22" rel="25"></div><span data-dcnode-id="8635" instrument_node="">
</span><h3 data-dcnode-id="8633"><span data-dcnode-id="8634" instrument_node="">Quantification of impairment by spirometry</span></h3><span data-dcnode-id="8632" instrument_node="">
</span><p data-dcnode-id="8618"><span data-dcnode-id="8631" instrument_node="">In normal spirometry, FVC, FEV</span><sub data-dcnode-id="8629"><span data-dcnode-id="8630" instrument_node="">1</span></sub><span data-dcnode-id="8628" instrument_node="">, and FEV</span><sub data-dcnode-id="8626"><span data-dcnode-id="8627" instrument_node="">1</span></sub><span data-dcnode-id="8625" instrument_node=""> -to-FVC ratio are above the lower limit of normal. The lower limit of normal is defined as the result of the mean predicted value (based on the patient's sex, age, and height) minus 1.64 times the standard error of the estimate from the population study on which the reference equation is based. If the lower limit of normal is not available, the FVC and FEV</span><sub data-dcnode-id="8623"><span data-dcnode-id="8624" instrument_node="">1</span></sub><span data-dcnode-id="8622" instrument_node=""> should be greater than or equal to 80% of predicted, and the FEV</span><sub data-dcnode-id="8620"><span data-dcnode-id="8621" instrument_node="">1</span></sub><span data-dcnode-id="8619" instrument_node=""> -to-FVC ratio should be no more than 8-9 absolute percentage points below the predicted ratio. The ATS has recommended the use of lower limits of normal instead of the 80% of predicted for setting the threshold that defines abnormal test results.</span></p><span data-dcnode-id="8617" instrument_node="">
</span><div class="inContentAd" data-dcnode-id="8616" id="ads-pos-a1_23" rel="26"></div><span data-dcnode-id="8615" instrument_node="">
</span><p data-dcnode-id="8607"><span data-dcnode-id="8614" instrument_node="">A reduced FVC on spirometry in the absence of a reduced FEV</span><sub data-dcnode-id="8612"><span data-dcnode-id="8613" instrument_node="">1</span></sub><span data-dcnode-id="8611" instrument_node="">/FVC ratio suggests a restrictive ventilatory problem. An inappropriately shortened exhalation during spirometry can (and often does) result in an artifactually reduced FVC. Causes of restriction on spirometry include obesity, cardiomegaly, ascites, pregnancy, pleural effusion, pleural tumors, kyphoscoliosis, pulmonary fibrosis, neuromuscular disease, diaphragm weakness or paralysis, space-occupying lesions, lung resection, congestive heart failure, inadequate inspiration or expiration secondary to pain, and severe obstructive lung disease. One scheme for describing the severity of reductions in the FVC and/or the FEV</span><sub data-dcnode-id="8609"><span data-dcnode-id="8610" instrument_node="">1</span></sub><span data-dcnode-id="8608" instrument_node=""> is shown below:&nbsp;</span></p><span data-dcnode-id="8606" instrument_node="">
</span><span data-dcnode-id="8604" instrument_node="">
</span><ul data-dcnode-id="8552"><span data-dcnode-id="8603" instrument_node="">
</span><span data-dcnode-id="8601" instrument_node="">
</span><li data-dcnode-id="8594"><span data-dcnode-id="8600" instrument_node="">
</span><div class="topbullet" data-dcnode-id="8595"><span data-dcnode-id="8599" instrument_node="">
</span><p data-dcnode-id="8597"><span data-dcnode-id="8598" instrument_node="">Mild - Greater than 70%&nbsp;of predicted</span></p><span data-dcnode-id="8596" instrument_node="">
</span></div></li><span data-dcnode-id="8593" instrument_node="">
</span><span data-dcnode-id="8591" instrument_node="">
</span><li data-dcnode-id="8584"><span data-dcnode-id="8590" instrument_node="">
</span><div class="topbullet" data-dcnode-id="8585"><span data-dcnode-id="8589" instrument_node="">
</span><p data-dcnode-id="8587"><span data-dcnode-id="8588" instrument_node="">Moderate - 60-69% of predicted</span></p><span data-dcnode-id="8586" instrument_node="">
</span></div></li><span data-dcnode-id="8583" instrument_node="">
</span><span data-dcnode-id="8581" instrument_node="">
</span><li data-dcnode-id="8574"><span data-dcnode-id="8580" instrument_node="">
</span><div class="topbullet" data-dcnode-id="8575"><span data-dcnode-id="8579" instrument_node="">
</span><p data-dcnode-id="8577"><span data-dcnode-id="8578" instrument_node="">Moderately severe - 50-59%</span></p><span data-dcnode-id="8576" instrument_node="">
</span></div></li><span data-dcnode-id="8573" instrument_node="">
</span><span data-dcnode-id="8571" instrument_node="">
</span><li data-dcnode-id="8564"><span data-dcnode-id="8570" instrument_node="">
</span><div class="topbullet" data-dcnode-id="8565"><span data-dcnode-id="8569" instrument_node="">
</span><p data-dcnode-id="8567"><span data-dcnode-id="8568" instrument_node="">Severe - 35-49% of predicted</span></p><span data-dcnode-id="8566" instrument_node="">
</span></div></li><span data-dcnode-id="8563" instrument_node="">
</span><span data-dcnode-id="8561" instrument_node="">
</span><li data-dcnode-id="8554"><span data-dcnode-id="8560" instrument_node="">
</span><div class="topbullet" data-dcnode-id="8555"><span data-dcnode-id="8559" instrument_node="">
</span><p data-dcnode-id="8557"><span data-dcnode-id="8558" instrument_node="">Very severe - Less than 35% of predicted</span></p><span data-dcnode-id="8556" instrument_node="">
</span></div></li><span data-dcnode-id="8553" instrument_node="">
</span></ul><span data-dcnode-id="8551" instrument_node="">
</span><div class="inContentAd" data-dcnode-id="8550" id="ads-pos-a1_24" rel="27"></div><span data-dcnode-id="8549" instrument_node="">
</span><p data-dcnode-id="8532"><span data-dcnode-id="8548" instrument_node="">The lower limit of normal for the FEF</span><sub data-dcnode-id="8546"><span data-dcnode-id="8547" instrument_node="">25-75%</span></sub><span data-dcnode-id="8545" instrument_node=""> can be less than 50% of the mean predicted value, making it important to use the lower limit of normal defined by the 95% confidence limit of the mean predicted value rather than a threshold defined by a fixed percentage of the predicted value. The FEF</span><sub data-dcnode-id="8543"><span data-dcnode-id="8544" instrument_node="">25-75%</span></sub><span data-dcnode-id="8542" instrument_node=""> is also very dependent on expiratory time. If expiratory times of spirometry efforts vary by more than 10%, comparisons of the FEF</span><sub data-dcnode-id="8540"><span data-dcnode-id="8541" instrument_node="">25-75%</span></sub><span data-dcnode-id="8539" instrument_node=""> before and after bronchodilator challenge are difficult to interpret. Early termination of expiration shifts the middle 50% of the exhaled volume toward the start of the exhalation, artifactually raising the FEF</span><sub data-dcnode-id="8537"><span data-dcnode-id="8538" instrument_node="">25-75%</span></sub><span data-dcnode-id="8536" instrument_node="">. For these reasons, the use of the FEF</span><sub data-dcnode-id="8534"><span data-dcnode-id="8535" instrument_node="">25-75% </span></sub><span data-dcnode-id="8533" instrument_node="">to assess airway function in adults is discouraged.</span></p><span data-dcnode-id="8531" instrument_node="">
</span><div class="inContentAd" data-dcnode-id="8530" id="ads-pos-a1_25" rel="28"></div><span data-dcnode-id="8529" instrument_node="">
</span><p data-dcnode-id="8527"><span data-dcnode-id="8528" instrument_node="">The FVC is a reliable means of assessing the clinical status in idiopathic pulmonary fibrosis (IPF). A minimum clinically important difference of the FVC, expressed as a percentage of the mean predicted normal value, of 2-6% of has been established. This obviates the need to obtain a total lung capacity (TLC) measurement to assess disease progression or the effects of medical therapy.</span></p><span data-dcnode-id="8526" instrument_node="">
</span><div class="inContentAd" data-dcnode-id="8525" id="ads-pos-a1_26" rel="29"></div><span data-dcnode-id="8524" instrument_node="">
</span><h3 data-dcnode-id="8522"><span data-dcnode-id="8523" instrument_node="">Special assessments</span></h3><span data-dcnode-id="8521" instrument_node="">
</span><p data-dcnode-id="8518"><em data-dcnode-id="8519"><span data-dcnode-id="8520" instrument_node="">Sitting versus supine vital capacity</span></em></p><span data-dcnode-id="8517" instrument_node="">
</span><div class="inContentAd" data-dcnode-id="8516" id="ads-pos-a1_27" rel="30"></div><span data-dcnode-id="8515" instrument_node="">
</span><p data-dcnode-id="8502"><span data-dcnode-id="8514" instrument_node="">Evaluation of diaphragm strength can be accomplished by measuring the vital capacity in an upright or sitting position followed by a measurement made in the supine position. A reduction in the vital capacity to less than 90% of the upright vital capacity suggests diaphragm weakness or paralysis. Interpreting an increased reduction in vital capacity in the supine position as diaphragm dysfunction should be made cautiously if the patient's body mass index is greater than 45 kg/m</span><sup data-dcnode-id="8512"><span data-dcnode-id="8513" instrument_node="">2</span></sup><span data-dcnode-id="8511" instrument_node="">.</span><sup data-dcnode-id="8504"><span data-dcnode-id="8510" instrument_node="">
</span><span data-dcnode-id="8508" instrument_node=""> [</span><a data-dcnode-id="8506" href="javascript:void(0);" onclick="showToolTip(this,'references-layer','4')"><span data-dcnode-id="8507" instrument_node="">4</span></a><span data-dcnode-id="8505" instrument_node="">] </span></sup><span data-dcnode-id="8503" instrument_node="">Studies reporting the normal reduction of the vital capacity of less than 10% from upright to supine were conducted with individuals who were not obese. Slightly greater reductions in obese individuals in a supine position may not indicate diaphragm dysfunction, but rather an increase in the resistive forces against which the diaphragm descends. Reductions in the supine vital capacity more than 20% of baseline indicate hemidiaphragm or diaphragm dysfunction or paralysis.</span></p><span data-dcnode-id="8501" instrument_node="">
</span><div class="inContentAd" data-dcnode-id="8500" id="ads-pos-a1_28" rel="31"></div><span data-dcnode-id="8499" instrument_node="">
</span><p data-dcnode-id="8494"><em data-dcnode-id="8497"><span data-dcnode-id="8498" instrument_node="">Identifying central</span></em><em data-dcnode-id="8495"><span data-dcnode-id="8496" instrument_node=""> airway obstructions</span></em></p><span data-dcnode-id="8493" instrument_node="">
</span><div class="inContentAd" data-dcnode-id="8492" id="ads-pos-a1_29" rel="32"></div><span data-dcnode-id="8491" instrument_node="">
</span><p data-dcnode-id="8489"><span data-dcnode-id="8490" instrument_node="">The configuration of the flow-volume curve of a properly performed spirometry test can be used to demonstrate various abnormalities of the larger central airways (larynx, trachea, right and left mainstem bronchi). Three patterns of flow-volume abnormalities can be detected: (1) variable intrathoracic obstructions, (2) variable extrathoracic obstructions, and (3) fixed upper airway obstructions. Reproducing these findings on every effort is important because spurious nonreproducible reductions in inspiratory flow are not uncommon after completion of forced expirations in subjects without upper airway obstruction. Examples of variable intrathoracic obstruction include localized tumors of the lower trachea or mainstem bronchus, tracheomalacia, and airway changes associated with polychondritis.</span></p><span data-dcnode-id="8488" instrument_node="">
</span><div class="inContentAd" data-dcnode-id="8487" id="ads-pos-a1_30" rel="33"></div><span data-dcnode-id="8486" instrument_node="">
</span><p data-dcnode-id="8484"><span data-dcnode-id="8485" instrument_node="">Variable upper airway obstructions demonstrate flow reductions that vary with the phase of forced respirations. Variable intrathoracic obstructions demonstrate reduction of airflow during forced expirations with preservation of a normal inspiratory flow configuration. This is observed as a plateau across a broad volume range on the expired flow limb of the flow-volume curve. The reduction in airflow results from a narrowing of the airway inside the thorax, in part because of a narrowing or collapse of the airway secondary to extraluminal pressures exceeding intraluminal pressures during expiration.</span></p><span data-dcnode-id="8483" instrument_node="">
</span><div class="inContentAd" data-dcnode-id="8482" id="ads-pos-a1_31" rel="34"></div><span data-dcnode-id="8481" instrument_node="">
</span><p data-dcnode-id="8479"><span data-dcnode-id="8480" instrument_node="">Variable extrathoracic obstructions demonstrate reduction of inspired flows during forced inspirations with preservation of expiratory flows. Again, the major cause of the reduced flow during inspiration is airway narrowing secondary to extraluminal pressures exceeding intraluminal pressures during inspiration. Causes of this type of upper airway obstruction include unilateral and bilateral vocal cord paralysis, vocal cord adhesions, vocal cord constriction, laryngeal edema, and upper airway narrowing associated with obstructive sleep apnea.</span></p><span data-dcnode-id="8478" instrument_node="">
</span><div class="inContentAd" data-dcnode-id="8477" id="ads-pos-a1_32" rel="35"></div><span data-dcnode-id="8476" instrument_node="">
</span><p data-dcnode-id="8474"><span data-dcnode-id="8475" instrument_node="">Fixed upper airway obstructions demonstrate plateaus of flow during both forced inspiration and forced expiration. Causes of fixed upper airway obstruction include goiters, endotracheal neoplasms, stenosis of both main bronchi, postintubation stenosis, and performance of the test through a tracheostomy tube or other fixed orifice device. (See the image below.)</span></p><span data-dcnode-id="8473" instrument_node="">
</span><div class="inContentAd" data-dcnode-id="8472" id="ads-pos-a1_33" rel="36"></div><span data-dcnode-id="8471" instrument_node="">
</span><span data-dcnode-id="8469" instrument_node="">
</span><div class="inlineImage" data-dcnode-id="8451"><span data-dcnode-id="8468" instrument_node="">
</span><a data-dcnode-id="8466" href="javascript:refImgShow(3)" onclick="wmdTrack('cr-im_3');"><img alt="Flow reduction must be consistent on every effort " class="pborder" data-dcnode-id="8467" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//img.medscapestatic.com/pi/meds/ckb/40/14640tn.jpg&amp;raw"></a><span data-dcnode-id="8465" instrument_node="">
</span><span data-dcnode-id="8463" instrument_node="">
</span><span data-dcnode-id="8461" instrument_node="">
</span><span class="capt" data-dcnode-id="8459"><span data-dcnode-id="8460" instrument_node="">Flow reduction must be consistent on every effort to be considered actual flow limitation. Fixed upper airway obstruction may be caused by postintubation stenosis, goiter, endotracheal neoplasms, and bronchial stenosis. Variable intrathoracic obstruction may be caused by tracheomalacia, polychondritis, and tumors of the lower trachea or main bronchus. Variable extrathoracic obstruction may be caused by bilateral and unilateral vocal cord paralysis, vocal cord constriction, reduced pharyngeal cross-sectional area, and airway burns. </span></span><span data-dcnode-id="8458" instrument_node="">
</span><div class="galleryLink" data-dcnode-id="8453"><span data-dcnode-id="8457" instrument_node="">
</span><a data-dcnode-id="8455" href="javascript:refImgShow('001')" onclick="wmdTrack('cr-ar_view');"><span data-dcnode-id="8456" instrument_node="">View Media Gallery</span></a><span data-dcnode-id="8454" instrument_node="">
</span></div><span data-dcnode-id="8452" instrument_node="">
</span></div><span data-dcnode-id="8450" instrument_node="">
</span><div class="inContentAd" data-dcnode-id="8449" id="ads-pos-a1_34" rel="37"></div><span data-dcnode-id="8448" instrument_node="">
</span><h3 data-dcnode-id="8446"><span data-dcnode-id="8447" instrument_node="">Assessment of operative risk</span></h3><span data-dcnode-id="8445" instrument_node="">
</span><p data-dcnode-id="8437"><span data-dcnode-id="8444" instrument_node="">While no single test can effectively predict intraoperative and postoperative morbidity and mortality from pulmonary complications, the FEV</span><sub data-dcnode-id="8442"><span data-dcnode-id="8443" instrument_node="">1</span></sub><span data-dcnode-id="8441" instrument_node=""> obtained from good quality spirometry is a useful tool. When the FEV</span><sub data-dcnode-id="8439"><span data-dcnode-id="8440" instrument_node="">1</span></sub><span data-dcnode-id="8438" instrument_node=""> is greater than 2 L or 50% of predicted, major complications are rare.</span></p><span data-dcnode-id="8436" instrument_node="">
</span><div class="inContentAd" data-dcnode-id="8435" id="ads-pos-a1_35" rel="38"></div><span data-dcnode-id="8434" instrument_node="">
</span><p data-dcnode-id="8432"><span data-dcnode-id="8433" instrument_node="">Operative risk is heavily dependent on the surgical site, with chest surgery having the highest risk for postoperative complications, followed by upper and lower abdominal sites. Patient-related factors associated with increased operative risk for pulmonary complications include preexisting pulmonary disease, cardiovascular disease, pulmonary hypertension, dyspnea upon exertion, heavy smoking history, respiratory infection, cough (particularly productive cough), advanced age (&gt;70 y), malnutrition, general debilitation, obesity, and prolonged surgery.</span></p><span data-dcnode-id="8431" instrument_node="">
</span><div class="inContentAd" data-dcnode-id="8430" id="ads-pos-a1_36" rel="39"></div><span data-dcnode-id="8429" instrument_node="">
</span><p data-dcnode-id="8421"><span data-dcnode-id="8428" instrument_node="">Assessment for lung surgery typically involves prediction of a postoperative FEV</span><sub data-dcnode-id="8426"><span data-dcnode-id="8427" instrument_node="">1</span></sub><span data-dcnode-id="8425" instrument_node=""> by using the preoperative FEV</span><sub data-dcnode-id="8423"><span data-dcnode-id="8424" instrument_node="">1</span></sub><span data-dcnode-id="8422" instrument_node="">. In a borderline case, consideration of the contribution of the remaining portions can be assessed by a perfusion scan. The relative percentage of perfusion (Q) of the remaining lung or lung segments usually is proportional to its contribution to ventilation and can be used to estimate postoperative function as shown in the following equation:</span></p><span data-dcnode-id="8420" instrument_node="">
</span><div class="inContentAd" data-dcnode-id="8419" id="ads-pos-a1_37" rel="40"></div><span data-dcnode-id="8418" instrument_node="">
</span><blockquote data-dcnode-id="8407"><span data-dcnode-id="8417" instrument_node="">
</span><p data-dcnode-id="8409"><span data-dcnode-id="8416" instrument_node="">Postoperative FEV</span><sub data-dcnode-id="8414"><span data-dcnode-id="8415" instrument_node="">1</span></sub><span data-dcnode-id="8413" instrument_node=""> = Preoperative FEV</span><sub data-dcnode-id="8411"><span data-dcnode-id="8412" instrument_node="">1</span></sub><span data-dcnode-id="8410" instrument_node=""> × Q% of the remaining lung</span></p><span data-dcnode-id="8408" instrument_node="">
</span></blockquote><span data-dcnode-id="8406" instrument_node="">
</span><div class="inContentAd" data-dcnode-id="8405" id="ads-pos-a1_38" rel="41"></div><span data-dcnode-id="8404" instrument_node="">
</span><p data-dcnode-id="8387"><span data-dcnode-id="8403" instrument_node="">For example, if the preoperative FEV</span><sub data-dcnode-id="8401"><span data-dcnode-id="8402" instrument_node="">1</span></sub><span data-dcnode-id="8400" instrument_node=""> is 1.6 L and the lung to be resected demonstrates 40% perfusion, the postoperative FEV</span><sub data-dcnode-id="8398"><span data-dcnode-id="8399" instrument_node="">1</span></sub><span data-dcnode-id="8397" instrument_node=""> would be 1.6 × 0.6 = 0.96 L. An estimated postoperative FEV</span><sub data-dcnode-id="8395"><span data-dcnode-id="8396" instrument_node="">1</span></sub><span data-dcnode-id="8394" instrument_node=""> of less than 0.8 L often is associated with chronic respiratory failure and may indicate an unacceptable degree of operative risk. </span><a data-dcnode-id="8392" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//emedicine.medscape.com/article/1982163-overview"><span data-dcnode-id="8393" instrument_node="">Arterial blood gases (ABGs)</span></a><span data-dcnode-id="8391" instrument_node=""> and cardiopulmonary exercise testing may help evaluate operative risk in patients who have a preoperative FEV</span><sub data-dcnode-id="8389"><span data-dcnode-id="8390" instrument_node="">1</span></sub><span data-dcnode-id="8388" instrument_node=""> below 2 L or 50% of predicted.</span></p><span data-dcnode-id="8386" instrument_node="">
</span><div class="inContentAd" data-dcnode-id="8385" id="ads-pos-a1_39" rel="42"></div><span data-dcnode-id="8384" instrument_node="">
</span><p data-dcnode-id="8363"><span data-dcnode-id="8383" instrument_node="">The algorithm for clearance of candidates for lung resection proposed by Bolinger and Perruchoud</span><sup data-dcnode-id="8376"><span data-dcnode-id="8382" instrument_node="">
</span><span data-dcnode-id="8380" instrument_node=""> [</span><a data-dcnode-id="8378" href="javascript:void(0);" onclick="showToolTip(this,'references-layer','5')"><span data-dcnode-id="8379" instrument_node="">5</span></a><span data-dcnode-id="8377" instrument_node="">] </span></sup><span data-dcnode-id="8375" instrument_node="">has been successfully evaluated in 137 consecutive patients who were referred for resection by Wyser et al</span><sup data-dcnode-id="8368"><span data-dcnode-id="8374" instrument_node="">
</span><span data-dcnode-id="8372" instrument_node=""> [</span><a data-dcnode-id="8370" href="javascript:void(0);" onclick="showToolTip(this,'references-layer','6')"><span data-dcnode-id="8371" instrument_node="">6</span></a><span data-dcnode-id="8369" instrument_node="">] </span></sup><span data-dcnode-id="8367" instrument_node="">with an overall mortality of 1.5% and is detailed in Cardiopulmonary Stress Testing. Patients with a negative cardiac history and ECG that demonstrate an FEV</span><sub data-dcnode-id="8365"><span data-dcnode-id="8366" instrument_node="">1</span></sub><span data-dcnode-id="8364" instrument_node=""> and a diffusing capacity of lung for carbon monoxide (DLCO) that are greater than 80% of predicted are judged to be able to undergo pneumonectomy safely.</span></p><span data-dcnode-id="8362" instrument_node="">
</span><div class="inContentAd" data-dcnode-id="8361" id="ads-pos-a1_40" rel="43"></div><span data-dcnode-id="8360" instrument_node="">
</span><h3 data-dcnode-id="8358"><span data-dcnode-id="8359" instrument_node="">Technical considerations</span></h3><span data-dcnode-id="8357" instrument_node="">
</span><p data-dcnode-id="8355"><span data-dcnode-id="8356" instrument_node="">The ATS has published guidelines for a standardized technique that includes spirometer performance standards. A reasonable end-point for the maneuver in the absence of true flow cessation (ie, airway obstruction is present) is 15 seconds. Patients often discontinue the forced exhalation prematurely because of the discomfort of prolonged forced exhalation. A modified technique in which the patient exhales with maximum force for four seconds followed by continued relaxed exhalation has been shown to enhance the patient's ability to sustain expiration, thereby yielding a larger FVC in patients with airflow obstruction. It should be noted that, strictly speaking, the FVC obtained from using this technique is not a true FVC because maximum expiratory effort was not sustained during the entire exhalation.&nbsp;</span></p><span data-dcnode-id="8354" instrument_node="">
</span><div class="inContentAd" data-dcnode-id="8353" id="ads-pos-a1_41" rel="44"></div><span data-dcnode-id="8352" instrument_node="">
</span></div><span data-dcnode-id="8350" instrument_node="">
</span><div class="emed-logo" data-dcnode-id="8346"><span data-dcnode-id="8349" instrument_node="">
</span><img alt="eMedicine Logo" data-dcnode-id="8348" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//img.medscapestatic.com/pi/global/logos/emed/logo-emedicine77x17.svg&amp;raw"><span data-dcnode-id="8347" instrument_node="">
</span></div><span data-dcnode-id="8345" instrument_node="">
</span><div class="back_next_btn active" data-dcnode-id="8335"><span data-dcnode-id="8344" instrument_node="">
</span><div class="next_btn" data-dcnode-id="8339"><a data-dcnode-id="8340" href="#a2" onclick="AdPageRefresh('https://emedicine.medscape.com/article/303239-overview#a2', '1', 'cr-sn_next', '#a2');"><span data-dcnode-id="8343" instrument_node="">Next: </span><span data-dcnode-id="8341"><span data-dcnode-id="8342" instrument_node="">Lung Volume Determination </span></span></a></div><span data-dcnode-id="8338" instrument_node="">
</span><div class="spacer" data-dcnode-id="8337"></div><span data-dcnode-id="8336" instrument_node="">
</span></div><span data-dcnode-id="8334" instrument_node="">
</span></div><span data-dcnode-id="8332" instrument_node="">
