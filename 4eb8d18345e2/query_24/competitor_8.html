       </span></div><span data-dcnode-id="7709" instrument_node="">
</span><div class="next_btn" data-dcnode-id="7704"><a data-dcnode-id="7705" href="#a2" onclick="AdPageRefresh('https://emedicine.medscape.com/article/303239-overview#a2', '1', 'cr-sn_next', '#a2');"><span data-dcnode-id="7708" instrument_node="">Next: </span><span data-dcnode-id="7706"><span data-dcnode-id="7707" instrument_node="">Lung Volume Determination </span></span></a></div><span data-dcnode-id="7703" instrument_node="">
</span><div class="spacer" data-dcnode-id="7702"></div><span data-dcnode-id="7701" instrument_node="">
</span></div><span data-dcnode-id="7699" instrument_node="">
</span></div><span data-dcnode-id="7697" instrument_node="">
</span><span data-dcnode-id="7695" instrument_node="">
</span><div class="inactive" data-dcnode-id="7380" id="content_a5"><span data-dcnode-id="7694" instrument_node="">
</span><h2 data-dcnode-id="7692"><span data-dcnode-id="7693" instrument_node="">Pulse Oximetry</span></h2><span data-dcnode-id="7691" instrument_node="">
</span><div class="refsection_content" data-dcnode-id="7401"><span data-dcnode-id="7690" instrument_node="">
</span><span data-dcnode-id="7688" instrument_node="">
</span><h3 data-dcnode-id="7686"><span data-dcnode-id="7687" instrument_node="">Synonyms</span></h3><span data-dcnode-id="7685" instrument_node="">
</span><p data-dcnode-id="7680"><span data-dcnode-id="7684" instrument_node="">Oximetry, oxygen saturation check, oxygen sat check, exercise oximetry, oxygen titration by oximetry, oxygen saturation measured using pulse oximetry (SpO</span><sub data-dcnode-id="7682"><span data-dcnode-id="7683" instrument_node="">2</span></sub><span data-dcnode-id="7681" instrument_node="">), oxygen desaturation test</span></p><span data-dcnode-id="7679" instrument_node="">
</span><div class="inContentAd" data-dcnode-id="7678" id="ads-pos-a5_1" rel="94"></div><span data-dcnode-id="7677" instrument_node="">
</span><h3 data-dcnode-id="7675"><span data-dcnode-id="7676" instrument_node="">Contraindications</span></h3><span data-dcnode-id="7674" instrument_node="">
</span><p data-dcnode-id="7672"><span data-dcnode-id="7673" instrument_node="">No contraindications exist.</span></p><span data-dcnode-id="7671" instrument_node="">
</span><div class="inContentAd" data-dcnode-id="7670" id="ads-pos-a5_2" rel="95"></div><span data-dcnode-id="7669" instrument_node="">
</span><h3 data-dcnode-id="7667"><span data-dcnode-id="7668" instrument_node="">Patient care/preparations</span></h3><span data-dcnode-id="7666" instrument_node="">
</span><p data-dcnode-id="7664"><span data-dcnode-id="7665" instrument_node="">Standard pulse oximeter probes may be placed on fingers or earlobes of ambulatory patients. Some oximeters use reflectance probes that can be placed on the forehead. Fingernail polish should be removed and peripheral circulation should be maximized by warming or by applying vasodilating cream, if necessary.</span></p><span data-dcnode-id="7663" instrument_node="">
</span><div class="inContentAd" data-dcnode-id="7662" id="ads-pos-a5_3" rel="96"></div><span data-dcnode-id="7661" instrument_node="">
</span><h3 data-dcnode-id="7659"><span data-dcnode-id="7660" instrument_node="">Test</span></h3><span data-dcnode-id="7658" instrument_node="">
</span><p data-dcnode-id="7656"><span data-dcnode-id="7657" instrument_node="">Although widely used, the practice of assessing oxygen desaturation by pulse oximetry is poorly standardized. The principle of oximetry measurement by spectrophotometry, although improving, is not as reliable as many practitioners believe. One side of the oximeter probe acts as a light-emitting source, and the other side acts as a photodetector. The probe is placed on a finger or earlobe. A forehead reflectance probe may also be used. The relative absorption of red (absorbed by oxygenated blood) and infrared (absorbed by deoxygenated blood) light of the pulsatile (systolic) component of the absorption waveform correlates to arterial blood oxygen saturation.</span></p><span data-dcnode-id="7655" instrument_node="">
</span><div class="inContentAd" data-dcnode-id="7654" id="ads-pos-a5_4" rel="97"></div><span data-dcnode-id="7653" instrument_node="">
</span><p data-dcnode-id="7651"><span data-dcnode-id="7652" instrument_node="">Resting readings should be made for at least 5 minutes and the stability of the reading should be characterized on the report. If a finger probe is used when standing, the hand should be placed on the chest at the level of the heart to minimize venous pulsation which can falsely lower the reading. Correlation of the heart rate displayed on the oximeter with an ECG rate or a manually palpated pulse can help characterize the quality of the signal. Agreement within five or more beats per minute generally rules out significant motion artifact. Ideally, correlation of pulse oximetry saturation should be made with a measured oxygen saturation by multiple wavelength spectrophotometry on a simultaneously obtained arterial blood gas sample.</span></p><span data-dcnode-id="7650" instrument_node="">
</span><div class="inContentAd" data-dcnode-id="7649" id="ads-pos-a5_5" rel="98"></div><span data-dcnode-id="7648" instrument_node="">
</span><h3 data-dcnode-id="7646"><span data-dcnode-id="7647" instrument_node="">Results</span></h3><span data-dcnode-id="7645" instrument_node="">
</span><p data-dcnode-id="7640"><span data-dcnode-id="7644" instrument_node="">Documentation of the type of pulse oximeter used, probe type, and probe site should be included on each report. The heart rate and SpO</span><sub data-dcnode-id="7642"><span data-dcnode-id="7643" instrument_node="">2</span></sub><span data-dcnode-id="7641" instrument_node=""> readings at rest should be reported.</span></p><span data-dcnode-id="7639" instrument_node="">
</span><div class="inContentAd" data-dcnode-id="7638" id="ads-pos-a5_6" rel="99"></div><span data-dcnode-id="7637" instrument_node="">
</span><p data-dcnode-id="7629"><span data-dcnode-id="7636" instrument_node="">When obtaining pulse oximetry readings during exercise, the type and intensity of exercise (eg, walking speed, duration of activity) along with the heart rate and SpO</span><sub data-dcnode-id="7634"><span data-dcnode-id="7635" instrument_node="">2</span></sub><span data-dcnode-id="7633" instrument_node=""> at the end of the activity should be reported. When desaturation is detected, the activity should be repeated with supplemental oxygen in place to demonstrate improvement in SpO</span><sub data-dcnode-id="7631"><span data-dcnode-id="7632" instrument_node="">2</span></sub><span data-dcnode-id="7630" instrument_node=""> values.</span></p><span data-dcnode-id="7628" instrument_node="">
</span><div class="inContentAd" data-dcnode-id="7627" id="ads-pos-a5_7" rel="100"></div><span data-dcnode-id="7626" instrument_node="">
</span><p data-dcnode-id="7616"><span data-dcnode-id="7625" instrument_node="">Pulse oximetry is often performed (though optional) in the setting of the 6-minute walk test, a standardized measure of functional exercise capacity.</span><sup data-dcnode-id="7618"><span data-dcnode-id="7624" instrument_node="">
</span><span data-dcnode-id="7622" instrument_node=""> [</span><a data-dcnode-id="7620" href="javascript:void(0);" onclick="showToolTip(this,'references-layer','14')"><span data-dcnode-id="7621" instrument_node="">14</span></a><span data-dcnode-id="7619" instrument_node="">] </span></sup><span data-dcnode-id="7617" instrument_node="">This test is a measure of the maximum distance the patient is able to walk in a hallway with a minimum of 100 feet marked in 5-foot increments. The patient is permitted to slow down or even stop, if required. However, the elapsed time counter continues during rest periods. This test should be performed while exercise oxygen needs are being adequately met with portable oxygen delivery. Borg dyspnea and fatigue scores are collected immediately after completion of the walk.</span></p><span data-dcnode-id="7615" instrument_node="">
</span><div class="inContentAd" data-dcnode-id="7614" id="ads-pos-a5_8" rel="101"></div><span data-dcnode-id="7613" instrument_node="">
</span><h3 data-dcnode-id="7611"><span data-dcnode-id="7612" instrument_node="">Interpretation</span></h3><span data-dcnode-id="7610" instrument_node="">
</span><p data-dcnode-id="7590"><span data-dcnode-id="7609" instrument_node="">Interpretation of oximetry studies, while seemingly simple, generally is not possible without characterizing oximeter accuracy by correlating SpO</span><sub data-dcnode-id="7607"><span data-dcnode-id="7608" instrument_node="">2</span></sub><span data-dcnode-id="7606" instrument_node=""> with at least one simultaneously obtained arterial oxygen saturation (SaO</span><sub data-dcnode-id="7604"><span data-dcnode-id="7605" instrument_node="">2</span></sub><span data-dcnode-id="7603" instrument_node="">). Laboratories should characterize the average oximeter bias (SpO</span><sub data-dcnode-id="7601"><span data-dcnode-id="7602" instrument_node="">2</span></sub><span data-dcnode-id="7600" instrument_node=""> – SaO</span><sub data-dcnode-id="7598"><span data-dcnode-id="7599" instrument_node="">2</span></sub><span data-dcnode-id="7597" instrument_node="">) through pooled data to better understand the limitations of using the oximeter but this does not eliminate the possibility that oximeter readings on individual patients may exhibit larger biases. While SpO</span><sub data-dcnode-id="7595"><span data-dcnode-id="7596" instrument_node="">2</span></sub><span data-dcnode-id="7594" instrument_node=""> readings greater than 95% make the probability of clinically significant hypoxemia unlikely, clinical suspicion of hypoxemia should initiate the examination of ABGs. The goal of titration of supplemental oxygen should be a stable SpO</span><sub data-dcnode-id="7592"><span data-dcnode-id="7593" instrument_node="">2</span></sub><span data-dcnode-id="7591" instrument_node=""> reading of 93% or higher. Arterial desaturation can be considered present when the pulse oximeter saturation falls more than 4% below the baseline reading.</span></p><span data-dcnode-id="7589" instrument_node="">
</span><div class="inContentAd" data-dcnode-id="7588" id="ads-pos-a5_9" rel="102"></div><span data-dcnode-id="7587" instrument_node="">
</span><p data-dcnode-id="7576"><span data-dcnode-id="7586" instrument_node="">The role of pulse oximetry in the Medicare guidelines for reimbursement for continuous supplemental oxygen therapy are demonstration of one of the following while at rest and breathing room air: PaO</span><sub data-dcnode-id="7584"><span data-dcnode-id="7585" instrument_node="">2</span></sub><span data-dcnode-id="7583" instrument_node=""> less than or equal to 55 mm Hg, SaO</span><sub data-dcnode-id="7581"><span data-dcnode-id="7582" instrument_node="">2</span></sub><span data-dcnode-id="7580" instrument_node=""> less than or equal to 88%, or SpO</span><sub data-dcnode-id="7578"><span data-dcnode-id="7579" instrument_node="">2</span></sub><span data-dcnode-id="7577" instrument_node=""> less than or equal to 88%.</span></p><span data-dcnode-id="7575" instrument_node="">
</span><div class="inContentAd" data-dcnode-id="7574" id="ads-pos-a5_10" rel="103"></div><span data-dcnode-id="7573" instrument_node="">
</span><p data-dcnode-id="7562"><span data-dcnode-id="7572" instrument_node="">If supplemental oxygen is prescribed at a flow rate of greater than 4 L/min, the results of a PaO</span><sub data-dcnode-id="7570"><span data-dcnode-id="7571" instrument_node="">2</span></sub><span data-dcnode-id="7569" instrument_node=""> or oxygen saturation (SaO</span><sub data-dcnode-id="7567"><span data-dcnode-id="7568" instrument_node="">2</span></sub><span data-dcnode-id="7566" instrument_node=""> or SpO</span><sub data-dcnode-id="7564"><span data-dcnode-id="7565" instrument_node="">2</span></sub><span data-dcnode-id="7563" instrument_node="">) taken on 4 L/min supplemental oxygen must be provided.</span></p><span data-dcnode-id="7561" instrument_node="">
</span><div class="inContentAd" data-dcnode-id="7560" id="ads-pos-a5_11" rel="104"></div><span data-dcnode-id="7559" instrument_node="">
</span><p data-dcnode-id="7548"><span data-dcnode-id="7558" instrument_node="">Patients may qualify for supplemental oxygen therapy reimbursement even if the PaO</span><sub data-dcnode-id="7556"><span data-dcnode-id="7557" instrument_node="">2</span></sub><span data-dcnode-id="7555" instrument_node=""> is greater than 55 mm Hg and the SaO</span><sub data-dcnode-id="7553"><span data-dcnode-id="7554" instrument_node="">2</span></sub><span data-dcnode-id="7552" instrument_node=""> or SpO</span><sub data-dcnode-id="7550"><span data-dcnode-id="7551" instrument_node="">2</span></sub><span data-dcnode-id="7549" instrument_node=""> is greater than 88% if one of the following conditions is met: (1) dependent edema due to congestive heart failure; (2) cor pulmonale documented by P pulmonale on an ECG or by an echocardiogram, gated blood pool scan, or direct pulmonary artery pressure measurement, and (3) hematocrit greater than 56%.</span></p><span data-dcnode-id="7547" instrument_node="">
</span><div class="inContentAd" data-dcnode-id="7546" id="ads-pos-a5_12" rel="105"></div><span data-dcnode-id="7545" instrument_node="">
</span><h3 data-dcnode-id="7543"><span data-dcnode-id="7544" instrument_node="">Technical considerations</span></h3><span data-dcnode-id="7542" instrument_node="">
</span><p data-dcnode-id="7531"><span data-dcnode-id="7541" instrument_node="">Carboxyhemoglobin (CoHb) and methemoglobin (metHb) absorb light at the same wavelength as deoxyhemoglobin, causing a very significant overestimation of SaO</span><sub data-dcnode-id="7539"><span data-dcnode-id="7540" instrument_node="">2</span></sub><span data-dcnode-id="7538" instrument_node=""> when these are elevated. Pulse oximetry has other shortcomings. It does not provide information about the oxygen content of the arterial blood. Tissue hypoxia can exist when SpO</span><sub data-dcnode-id="7536"><span data-dcnode-id="7537" instrument_node="">2</span></sub><span data-dcnode-id="7535" instrument_node=""> is normal when anemia is present. Elevated levels of dysfunctional hemoglobins (CoHb, metHb) can cause significant overestimation of the actual SaO</span><sub data-dcnode-id="7533"><span data-dcnode-id="7534" instrument_node="">2</span></sub><span data-dcnode-id="7532" instrument_node="">.</span></p><span data-dcnode-id="7530" instrument_node="">
</span><div class="inContentAd" data-dcnode-id="7529" id="ads-pos-a5_13" rel="106"></div><span data-dcnode-id="7528" instrument_node="">
</span><p data-dcnode-id="7520"><span data-dcnode-id="7527" instrument_node="">Additionally, pulse oximetry does not address the adequacy of ventilation, which can be assessed only by evaluation of the partial pressure of carbon dioxide in arterial gas (PaCO</span><sub data-dcnode-id="7525"><span data-dcnode-id="7526" instrument_node="">2</span></sub><span data-dcnode-id="7524" instrument_node="">). Motion of the finger within the probe can cause a motion artifact secondary to equal rhythmic absorption of red and infrared light that most oximeters interpret as an SpO</span><sub data-dcnode-id="7522"><span data-dcnode-id="7523" instrument_node="">2</span></sub><span data-dcnode-id="7521" instrument_node=""> reading of 85%. Disposable finger probes fixed to the probe site with adhesive and fixed positioning of the probe site during walking can minimize this.</span></p><span data-dcnode-id="7519" instrument_node="">
</span><div class="inContentAd" data-dcnode-id="7518" id="ads-pos-a5_14" rel="107"></div><span data-dcnode-id="7517" instrument_node="">
</span><p data-dcnode-id="7512"><span data-dcnode-id="7516" instrument_node="">Pulse oximetry tends to overestimate SaO</span><sub data-dcnode-id="7514"><span data-dcnode-id="7515" instrument_node="">2</span></sub><span data-dcnode-id="7513" instrument_node="">. One reason for this is the fact that pulse oximetry expresses the percentage of oxyhemoglobin, typically without consideration for CoHb or metHb (see below). One pulse oximetry manufacturer now offers options that allow reporting of total hemoglobin, oxygen content, CoHb and metHb, but these are not yet in widespread use. See below.</span></p><span data-dcnode-id="7511" instrument_node="">
</span><div class="inContentAd" data-dcnode-id="7510" id="ads-pos-a5_15" rel="108"></div><span data-dcnode-id="7509" instrument_node="">
</span><blockquote data-dcnode-id="7501"><span data-dcnode-id="7508" instrument_node="">
</span><p data-dcnode-id="7503"><span data-dcnode-id="7507" instrument_node="">SpO</span><sub data-dcnode-id="7505"><span data-dcnode-id="7506" instrument_node="">2</span></sub><span data-dcnode-id="7504" instrument_node=""> = oxyhemoglobin/(oxyhemoglobin + reduced hemoglobin [rHb])</span></p><span data-dcnode-id="7502" instrument_node="">
</span></blockquote><span data-dcnode-id="7500" instrument_node="">
</span><div class="inContentAd" data-dcnode-id="7499" id="ads-pos-a5_16" rel="109"></div><span data-dcnode-id="7498" instrument_node="">
</span><p data-dcnode-id="7496"><span data-dcnode-id="7497" instrument_node="">In contrast, spectrophotometrically determined oxygen saturation from an ABG sample expresses oxygen saturation as the percentage of the sum of reduced hemoglobin, oxyhemoglobin, CoHb, and MetHb. See below.</span></p><span data-dcnode-id="7495" instrument_node="">
</span><div class="inContentAd" data-dcnode-id="7494" id="ads-pos-a5_17" rel="110"></div><span data-dcnode-id="7493" instrument_node="">
</span><blockquote data-dcnode-id="7485"><span data-dcnode-id="7492" instrument_node="">
</span><p data-dcnode-id="7487"><span data-dcnode-id="7491" instrument_node="">SaO</span><sub data-dcnode-id="7489"><span data-dcnode-id="7490" instrument_node="">2</span></sub><span data-dcnode-id="7488" instrument_node=""> = oxyhemoglobin/(oxyhemoglobin + rHb + CoHb + metHb)</span></p><span data-dcnode-id="7486" instrument_node="">
</span></blockquote><span data-dcnode-id="7484" instrument_node="">
</span><div class="inContentAd" data-dcnode-id="7483" id="ads-pos-a5_18" rel="111"></div><span data-dcnode-id="7482" instrument_node="">
</span><p data-dcnode-id="7480"><span data-dcnode-id="7481" instrument_node="">This significant difference generally results in pulse oximeters reporting an oxyhemoglobin value that is 2-3% higher than the spectrophotometrically determined oxygen saturation, even when the pulse oximeter is functioning perfectly.</span></p><span data-dcnode-id="7479" instrument_node="">
</span><div class="inContentAd" data-dcnode-id="7478" id="ads-pos-a5_19" rel="112"></div><span data-dcnode-id="7477" instrument_node="">
</span><p data-dcnode-id="7463"><span data-dcnode-id="7476" instrument_node="">While the accuracy of pulse oximetry generally is good in population studies (SaO</span><sub data-dcnode-id="7474"><span data-dcnode-id="7475" instrument_node="">2</span></sub><span data-dcnode-id="7473" instrument_node=""> – SpO</span><sub data-dcnode-id="7471"><span data-dcnode-id="7472" instrument_node="">2</span></sub><span data-dcnode-id="7470" instrument_node="">&lt; 2%), SpO</span><sub data-dcnode-id="7468"><span data-dcnode-id="7469" instrument_node="">2</span></sub><span data-dcnode-id="7467" instrument_node=""> values in individual patients may show a much greater bias, even when dysfunctional Hb levels are normal. Anemia and polycythemia can cause greater oximeter overestimation. SaO</span><sub data-dcnode-id="7465"><span data-dcnode-id="7466" instrument_node="">2</span></sub><span data-dcnode-id="7464" instrument_node=""> from simultaneously obtained ABG determinations should be used to characterize oximeter bias in individual patients, although this is not commonly performed.</span></p><span data-dcnode-id="7462" instrument_node="">
</span><div class="inContentAd" data-dcnode-id="7461" id="ads-pos-a5_20" rel="113"></div><span data-dcnode-id="7460" instrument_node="">
</span><p data-dcnode-id="7452"><span data-dcnode-id="7459" instrument_node="">ABG determinations should be considered whenever the clinical suspicion of hypoxemia exists, even when the oximeter displays a value over the threshold of 88%. Finally, the shape of the oxygen dissociation curve causes the pulse oximeter to be inherently insensitive to mild hypoxemia because relatively large changes in PaO</span><sub data-dcnode-id="7457"><span data-dcnode-id="7458" instrument_node="">2</span></sub><span data-dcnode-id="7456" instrument_node=""> in the flat upper portion of the curve cause very small changes in blood SaO</span><sub data-dcnode-id="7454"><span data-dcnode-id="7455" instrument_node="">2</span></sub><span data-dcnode-id="7453" instrument_node="">.</span></p><span data-dcnode-id="7451" instrument_node="">
</span><div class="inContentAd" data-dcnode-id="7450" id="ads-pos-a5_21" rel="114"></div><span data-dcnode-id="7449" instrument_node="">
</span><p data-dcnode-id="7447"><span data-dcnode-id="7448" instrument_node="">Advantages of pulse oximetry include that it is noninvasive, simple, and can be used to evaluate trends (evaluation of oxygenation during exercise, sleep, during procedures).</span></p><span data-dcnode-id="7446" instrument_node="">
</span><div class="inContentAd" data-dcnode-id="7445" id="ads-pos-a5_22" rel="115"></div><span data-dcnode-id="7444" instrument_node="">
</span><p data-dcnode-id="7436"><span data-dcnode-id="7443" instrument_node="">Disadvantages of pulse oximetry include that it cannot be used to assess oxygen delivery (anemia) or adequacy of ventilation (PaCO</span><sub data-dcnode-id="7441"><span data-dcnode-id="7442" instrument_node="">2</span></sub><span data-dcnode-id="7440" instrument_node="">) and that accuracy is lessened in the presence of elevated dysfunctional hemoglobin levels (CoHb, metHb), with a tendency to overestimate SaO</span><sub data-dcnode-id="7438"><span data-dcnode-id="7439" instrument_node="">2</span></sub><span data-dcnode-id="7437" instrument_node=""> by an average of 2-3%.</span></p><span data-dcnode-id="7435" instrument_node="">
</span><div class="inContentAd" data-dcnode-id="7434" id="ads-pos-a5_23" rel="116"></div><span data-dcnode-id="7433" instrument_node="">
</span><h3 data-dcnode-id="7431"><span data-dcnode-id="7432" instrument_node="">Factors that influence the accuracy of pulse oximetry readings</span></h3><span data-dcnode-id="7430" instrument_node="">
</span><p data-dcnode-id="7422"><span data-dcnode-id="7429" instrument_node="">Overestimation of SaO</span><sub data-dcnode-id="7427"><span data-dcnode-id="7428" instrument_node="">2</span></sub><span data-dcnode-id="7426" instrument_node=""> is possible with bright sunlight on the probe, fluorescent lights, operating room lights, infrared heat lamps, elevated CoHb, elevated metHb, anemia, and motion artifact if the actual SaO</span><sub data-dcnode-id="7424"><span data-dcnode-id="7425" instrument_node="">2</span></sub><span data-dcnode-id="7423" instrument_node=""> is less than 85%.</span></p><span data-dcnode-id="7421" instrument_node="">
</span><div class="inContentAd" data-dcnode-id="7420" id="ads-pos-a5_24" rel="117"></div><span data-dcnode-id="7419" instrument_node="">
</span><p data-dcnode-id="7405"><span data-dcnode-id="7418" instrument_node="">Underestimation of SaO</span><sub data-dcnode-id="7416"><span data-dcnode-id="7417" instrument_node="">2</span></sub><span data-dcnode-id="7415" instrument_node=""> is possible because intravascular dyes, such as methylene blue and indocyanine green, produce transient reductions in SpO</span><sub data-dcnode-id="7413"><span data-dcnode-id="7414" instrument_node="">2</span></sub><span data-dcnode-id="7412" instrument_node="">. Fingernail polish, increased venous pressures, and motion artifact if the actual SaO</span><sub data-dcnode-id="7410"><span data-dcnode-id="7411" instrument_node="">2</span></sub><span data-dcnode-id="7409" instrument_node=""> is greater than 85% also can cause underestimation of the SaO</span><sub data-dcnode-id="7407"><span data-dcnode-id="7408" instrument_node="">2</span></sub><span data-dcnode-id="7406" instrument_node="">.</span></p><span data-dcnode-id="7404" instrument_node="">
</span><div class="inContentAd" data-dcnode-id="7403" id="ads-pos-a5_25" rel="118"></div><span data-dcnode-id="7402" instrument_node="">
</span></div><span data-dcnode-id="7400" instrument_node="">
</span><div class="emed-logo" data-dcnode-id="7396"><span data-dcnode-id="7399" instrument_node="">
</span><img alt="eMedicine Logo" data-dcnode-id="7398" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//img.medscapestatic.com/pi/global/logos/emed/logo-emedicine77x17.svg&amp;raw"><span data-dcnode-id="7397" instrument_node="">
</span></div><span data-dcnode-id="7395" instrument_node="">
</span><div class="back_next_btn active" data-dcnode-id="7382"><span data-dcnode-id="7394" instrument_node="">

</span><div class="inactive" data-dcnode-id="7097" id="content_a6"><span data-dcnode-id="7376" instrument_node="">
</span><h2 data-dcnode-id="7374"><span data-dcnode-id="7375" instrument_node="">Methacholine Challenge Testing</span></h2><span data-dcnode-id="7373" instrument_node="">
</span><div class="refsection_content" data-dcnode-id="7118"><span data-dcnode-id="7372" instrument_node="">
</span><span data-dcnode-id="7370" instrument_node="">
</span><h3 data-dcnode-id="7368"><span data-dcnode-id="7369" instrument_node="">Synonyms</span></h3><span data-dcnode-id="7367" instrument_node="">
</span><p data-dcnode-id="7365"><span data-dcnode-id="7366" instrument_node="">Mecholyl challenge, bronchial provocation test</span></p><span data-dcnode-id="7364" instrument_node="">
</span><div class="inContentAd" data-dcnode-id="7363" id="ads-pos-a6_1" rel="119"></div><span data-dcnode-id="7362" instrument_node="">
</span><h3 data-dcnode-id="7360"><span data-dcnode-id="7361" instrument_node="">Indications</span></h3><span data-dcnode-id="7359" instrument_node="">
</span><p data-dcnode-id="7347"><span data-dcnode-id="7358" instrument_node="">It is used diagnose asthma, confirm a&nbsp;diagnosis of </span><a data-dcnode-id="7356" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//emedicine.medscape.com/article/296301-overview"><span data-dcnode-id="7357" instrument_node="">asthma</span></a><span data-dcnode-id="7355" instrument_node="">, document the severity of hyperresponsiveness, and follow changes in hyperresponsiveness.</span><sup data-dcnode-id="7348"><span data-dcnode-id="7354" instrument_node="">
</span><span data-dcnode-id="7352" instrument_node=""> [</span><a data-dcnode-id="7350" href="javascript:void(0);" onclick="showToolTip(this,'references-layer','15')"><span data-dcnode-id="7351" instrument_node="">15</span></a><span data-dcnode-id="7349" instrument_node="">] </span></sup></p><span data-dcnode-id="7346" instrument_node="">
</span><div class="inContentAd" data-dcnode-id="7345" id="ads-pos-a6_2" rel="120"></div><span data-dcnode-id="7344" instrument_node="">
</span><h3 data-dcnode-id="7342"><span data-dcnode-id="7343" instrument_node="">Contraindications</span></h3><span data-dcnode-id="7341" instrument_node="">
</span><p data-dcnode-id="7336"><span data-dcnode-id="7340" instrument_node="">Absolute contraindications include FEV</span><sub data-dcnode-id="7338"><span data-dcnode-id="7339" instrument_node="">1</span></sub><span data-dcnode-id="7337" instrument_node=""> less than 1.5 L in adults, less than 1 L in children, recent severe acute asthma, myocardial infarction or cerebral vascular accident within 3 months, and arterial aneurysm.</span></p><span data-dcnode-id="7335" instrument_node="">
</span><div class="inContentAd" data-dcnode-id="7334" id="ads-pos-a6_3" rel="121"></div><span data-dcnode-id="7333" instrument_node="">
</span><p data-dcnode-id="7331"><span data-dcnode-id="7332" instrument_node="">Relative contraindications include moderate baseline airway obstruction, spirometry-induced bronchoconstriction, recent upper respiratory tract infection (URI), exacerbation of asthma, hypertension, pregnancy, and epilepsy.</span></p><span data-dcnode-id="7330" instrument_node="">
</span><div class="inContentAd" data-dcnode-id="7329" id="ads-pos-a6_4" rel="122"></div><span data-dcnode-id="7328" instrument_node="">
</span><h3 data-dcnode-id="7326"><span data-dcnode-id="7327" instrument_node="">Patient care/preparations</span></h3><span data-dcnode-id="7325" instrument_node="">
</span><p data-dcnode-id="7323"><span data-dcnode-id="7324" instrument_node="">The following medications are withdrawn before a methacholine challenge test for the specified period:</span></p><span data-dcnode-id="7322" instrument_node="">
</span><span data-dcnode-id="7320" instrument_node="">
</span><ul data-dcnode-id="7228"><span data-dcnode-id="7319" instrument_node="">
</span><span data-dcnode-id="7317" instrument_node="">
</span><li data-dcnode-id="7310"><span data-dcnode-id="7316" instrument_node="">
</span><div class="topbullet" data-dcnode-id="7311"><span data-dcnode-id="7315" instrument_node="">
</span><p data-dcnode-id="7313"><span data-dcnode-id="7314" instrument_node="">Short-acting beta agonists (6 h)</span></p><span data-dcnode-id="7312" instrument_node="">
</span></div></li><span data-dcnode-id="7309" instrument_node="">
</span><span data-dcnode-id="7307" instrument_node="">
</span><li data-dcnode-id="7300"><span data-dcnode-id="7306" instrument_node="">
</span><div class="topbullet" data-dcnode-id="7301"><span data-dcnode-id="7305" instrument_node="">
</span><p data-dcnode-id="7303"><span data-dcnode-id="7304" instrument_node="">Long-acting beta agonists (36 h)</span></p><span data-dcnode-id="7302" instrument_node="">
</span></div></li><span data-dcnode-id="7299" instrument_node="">
</span><span data-dcnode-id="7297" instrument_node="">
</span><li data-dcnode-id="7290"><span data-dcnode-id="7296" instrument_node="">
</span><div class="topbullet" data-dcnode-id="7291"><span data-dcnode-id="7295" instrument_node="">
</span><p data-dcnode-id="7293"><span data-dcnode-id="7294" instrument_node="">Oral beta agonists (24 h)</span></p><span data-dcnode-id="7292" instrument_node="">
</span></div></li><span data-dcnode-id="7289" instrument_node="">
</span><span data-dcnode-id="7287" instrument_node="">
</span><li data-dcnode-id="7280"><span data-dcnode-id="7286" instrument_node="">
</span><div class="topbullet" data-dcnode-id="7281"><span data-dcnode-id="7285" instrument_node="">
</span><p data-dcnode-id="7283"><span data-dcnode-id="7284" instrument_node="">Short-acting methylxanthines (12 h)</span></p><span data-dcnode-id="7282" instrument_node="">
</span></div></li><span data-dcnode-id="7279" instrument_node="">
</span><span data-dcnode-id="7277" instrument_node="">
</span><li data-dcnode-id="7270"><span data-dcnode-id="7276" instrument_node="">
</span><div class="topbullet" data-dcnode-id="7271"><span data-dcnode-id="7275" instrument_node="">
</span><p data-dcnode-id="7273"><span data-dcnode-id="7274" instrument_node="">Long-acting methylxanthines (48 h)</span></p><span data-dcnode-id="7272" instrument_node="">
</span></div></li><span data-dcnode-id="7269" instrument_node="">
</span><span data-dcnode-id="7267" instrument_node="">
</span><li data-dcnode-id="7260"><span data-dcnode-id="7266" instrument_node="">
</span><div class="topbullet" data-dcnode-id="7261"><span data-dcnode-id="7265" instrument_node="">
</span><p data-dcnode-id="7263"><span data-dcnode-id="7264" instrument_node="">Anticholinergics (6 h)</span></p><span data-dcnode-id="7262" instrument_node="">
</span></div></li><span data-dcnode-id="7259" instrument_node="">
</span><span data-dcnode-id="7257" instrument_node="">
</span><li data-dcnode-id="7250"><span data-dcnode-id="7256" instrument_node="">
</span><div class="topbullet" data-dcnode-id="7251"><span data-dcnode-id="7255" instrument_node="">
</span><p data-dcnode-id="7253"><span data-dcnode-id="7254" instrument_node="">Cromolyn sodium (24 h)</span></p><span data-dcnode-id="7252" instrument_node="">
</span></div></li><span data-dcnode-id="7249" instrument_node="">
</span><span data-dcnode-id="7247" instrument_node="">
</span><li data-dcnode-id="7240"><span data-dcnode-id="7246" instrument_node="">
</span><div class="topbullet" data-dcnode-id="7241"><span data-dcnode-id="7245" instrument_node="">
</span><p data-dcnode-id="7243"><span data-dcnode-id="7244" instrument_node="">Antihistamines (72 h)</span></p><span data-dcnode-id="7242" instrument_node="">
</span></div></li><span data-dcnode-id="7239" instrument_node="">
</span><span data-dcnode-id="7237" instrument_node="">
</span><li data-dcnode-id="7230"><span data-dcnode-id="7236" instrument_node="">
</span><div class="topbullet" data-dcnode-id="7231"><span data-dcnode-id="7235" instrument_node="">
</span><p data-dcnode-id="7233"><span data-dcnode-id="7234" instrument_node="">The withholding of oral or inhaled steroids before methacholine has not been shown to be necessary but may have an impact. The appropriateness of the methacholine challenge test in a patient who requires oral steroids should be considered (see Contraindications).</span></p><span data-dcnode-id="7232" instrument_node="">
</span></div></li><span data-dcnode-id="7229" instrument_node="">
</span></ul><span data-dcnode-id="7227" instrument_node="">
</span><div class="inContentAd" data-dcnode-id="7226" id="ads-pos-a6_5" rel="123"></div><span data-dcnode-id="7225" instrument_node="">
</span><h3 data-dcnode-id="7223"><span data-dcnode-id="7224" instrument_node="">Test</span></h3><span data-dcnode-id="7222" instrument_node="">
</span><p data-dcnode-id="7220"><span data-dcnode-id="7221" instrument_node="">The following list shows the most common schedule of methacholine dosing in use in the United States today. Some labs begin with the lowest strength methacholine solution immediately after baseline. Others experts advocate the use of a diluent stage between baseline and methacholine. This allows identification of a small percentage of individuals who exhibit significant bronchoconstriction in response to the diluent itself, suggestion, or repeated spirometry efforts. Abbreviated protocols that start with higher concentrations of methacholine should be used cautiously, if at all.</span></p><span data-dcnode-id="7219" instrument_node="">
</span><div class="inContentAd" data-dcnode-id="7218" id="ads-pos-a6_6" rel="124"></div><span data-dcnode-id="7217" instrument_node="">
</span><p data-dcnode-id="7215"><span data-dcnode-id="7216" instrument_node="">Methacholine challenge schedule: After establishing baseline spirometry measurements, the patient inhales five breaths of saline or diluent aerosol and then five breaths of each of the following strengths of aerosolized methacholine in solution: 0.0625 mg/mL, 0.25 mg/mL, 1 mg/mL, 4 mg/mL, and 16 mg/mL.</span></p><span data-dcnode-id="7214" instrument_node="">
</span><div class="inContentAd" data-dcnode-id="7213" id="ads-pos-a6_7" rel="125"></div><span data-dcnode-id="7212" instrument_node="">
</span><p data-dcnode-id="7210"><span data-dcnode-id="7211" instrument_node="">An alternative longer (10-stage) dosing schedule that may yield a more precise assessment of airway hyperreactivity calls for the patient to inhale five breaths of methacholine aerosol in the following strengths: 0.031 mg/mL, 0.0625 mg/mL, 0.125 mg/mL, 0.25 mg/mL, 0.5 mg/mL, 1 mg/mL, 2 mg/mL, 4 mg/mL, 8 mg/mL, and 16 mg/mL.</span></p><span data-dcnode-id="7209" instrument_node="">
</span><div class="inContentAd" data-dcnode-id="7208" id="ads-pos-a6_8" rel="126"></div><span data-dcnode-id="7207" instrument_node="">
</span><p data-dcnode-id="7198"><span data-dcnode-id="7206" instrument_node="">The following dosing schedule is approved by the US Food and Drug Administration and also may be used, although the ATS guidelines for methacholine challenge testing recommend one of the two schedules outlined above because the dosing steps are more even: 0.025 mg/mL, 0.25 mg/mL, 2.5 mg/mL, 10 mg/mL, and 25 mg/mL.</span><sup data-dcnode-id="7199"><span data-dcnode-id="7205" instrument_node="">
</span><span data-dcnode-id="7203" instrument_node=""> [</span><a data-dcnode-id="7201" href="javascript:void(0);" onclick="showToolTip(this,'references-layer','15')"><span data-dcnode-id="7202" instrument_node="">15</span></a><span data-dcnode-id="7200" instrument_node="">] </span></sup></p><span data-dcnode-id="7197" instrument_node="">
</span><div class="inContentAd" data-dcnode-id="7196" id="ads-pos-a6_9" rel="127"></div><span data-dcnode-id="7195" instrument_node="">
</span><p data-dcnode-id="7190"><span data-dcnode-id="7194" instrument_node="">Methacholine aerosol is delivered in a standardized fashion by using a dosimeter, a device that applies a 0.6-second burst of compressed air to the nebulizer at the start of the inhalation from FRC to TLC. Subjects should hold their breath for 5 seconds. Spirometry is performed 30-90 seconds after the end of the last breath of each stage of the challenge. Symptoms volunteered by the subject are recorded. The challenge is discontinued when a fall in FEV</span><sub data-dcnode-id="7192"><span data-dcnode-id="7193" instrument_node="">1</span></sub><span data-dcnode-id="7191" instrument_node=""> of greater than 20% is observed upon repeat efforts or a final cumulative dose of 188.64 cumulative dose units is received. Administration of a bronchodilator should immediately follow the final postmethacholine assessment.</span></p><span data-dcnode-id="7189" instrument_node="">
</span><div class="inContentAd" data-dcnode-id="7188" id="ads-pos-a6_10" rel="128"></div><span data-dcnode-id="7187" instrument_node="">
</span><h3 data-dcnode-id="7185"><span data-dcnode-id="7186" instrument_node="">Results</span></h3><span data-dcnode-id="7184" instrument_node="">
</span><p data-dcnode-id="7176"><span data-dcnode-id="7183" instrument_node="">Results are presented as both a table of spirometry parameters for each stage of the challenge and as a dose-response curve plotting the fall in FEV</span><sub data-dcnode-id="7181"><span data-dcnode-id="7182" instrument_node="">1</span></sub><span data-dcnode-id="7180" instrument_node=""> against the methacholine concentration or the cumulative dose delivered during the challenge. The reporting of the PC20 or PD20 (provocative concentration or dose in mg/mL or milligrams, respectively, causing a 20% fall in FEV</span><sub data-dcnode-id="7178"><span data-dcnode-id="7179" instrument_node="">1</span></sub><span data-dcnode-id="7177" instrument_node=""> from baseline) is the usual method of expressing the outcome of the challenge test.</span></p><span data-dcnode-id="7175" instrument_node="">
</span><div class="inContentAd" data-dcnode-id="7174" id="ads-pos-a6_11" rel="129"></div><span data-dcnode-id="7173" instrument_node="">
</span><h3 data-dcnode-id="7171"><span data-dcnode-id="7172" instrument_node="">Interpretation</span></h3><span data-dcnode-id="7170" instrument_node="">
</span><p data-dcnode-id="7162"><span data-dcnode-id="7169" instrument_node="">A 20% fall in FEV</span><sub data-dcnode-id="7167"><span data-dcnode-id="7168" instrument_node="">1</span></sub><span data-dcnode-id="7166" instrument_node=""> generally is considered a positive test. The American Thoracic Society recommends the use of a 35% fall specific airway conductance (SGaw) to denote the presence of airway hyperreactivity when technically good spirometry cannot be obtained. It has been suggested that a significant subset of patients will exhibit a 35% fall in SGaw when the FEV</span><sub data-dcnode-id="7164"><span data-dcnode-id="7165" instrument_node="">1</span></sub><span data-dcnode-id="7163" instrument_node=""> remains greater than 80% of its baseline value. This may represent a subset of patients that has widespread small airway changes.</span></p><span data-dcnode-id="7161" instrument_node="">
</span><div class="inContentAd" data-dcnode-id="7160" id="ads-pos-a6_12" rel="130"></div><span data-dcnode-id="7159" instrument_node="">
</span><p data-dcnode-id="7151"><span data-dcnode-id="7158" instrument_node="">One scheme for using the PC20 FEV</span><sub data-dcnode-id="7156"><span data-dcnode-id="7157" instrument_node="">1</span></sub><span data-dcnode-id="7155" instrument_node=""> to characterize the severity of clinical hyperreactivity has been used by Hargreave et al. PC20 FEV</span><sub data-dcnode-id="7153"><span data-dcnode-id="7154" instrument_node="">1</span></sub><span data-dcnode-id="7152" instrument_node=""> severity is assessed as follows: 0.03-0.124 is considered severe, 0.125-1.99 is considered moderate, 2.00-7.99 is considered mild, and 8-25 is considered an increased hyperresponsive reaction (however, clinically significant disease is not common).</span></p><span data-dcnode-id="7150" instrument_node="">
</span><div class="inContentAd" data-dcnode-id="7149" id="ads-pos-a6_13" rel="131"></div><span data-dcnode-id="7148" instrument_node="">
</span><h3 data-dcnode-id="7146"><span data-dcnode-id="7147" instrument_node="">Technical considerations</span></h3><span data-dcnode-id="7145" instrument_node="">
</span><p data-dcnode-id="7143"><span data-dcnode-id="7144" instrument_node="">Spurious nonreproducible decrements of expiratory airflow should not be considered valid. Continuation of the challenge beyond 25 mg/mL has little clinical value because responses of some healthy patients who are nonasthmatic begin at this level.</span></p><span data-dcnode-id="7142" instrument_node="">
</span><div class="inContentAd" data-dcnode-id="7141" id="ads-pos-a6_14" rel="132"></div><span data-dcnode-id="7140" instrument_node="">
</span><p data-dcnode-id="7138"><span data-dcnode-id="7139" instrument_node="">Failure to demonstrate bronchial hyperreactivity does not totally exclude asthma, particularly asthma triggered by specific exposure to chemicals (eg, methylene diisocyanate, toluene diisocyanate).</span></p><span data-dcnode-id="7137" instrument_node="">
</span><div class="inContentAd" data-dcnode-id="7136" id="ads-pos-a6_15" rel="133"></div><span data-dcnode-id="7135" instrument_node="">
</span><p data-dcnode-id="7133"><span data-dcnode-id="7134" instrument_node="">A positive methacholine challenge test does not by itself indicate the presence of asthma. Nonspecific bronchial hyperreactivity is characteristic of asthma but occurs after a viral respiratory illness, with resolution taking up to several months.</span></p><span data-dcnode-id="7132" instrument_node="">
</span><div class="inContentAd" data-dcnode-id="7131" id="ads-pos-a6_16" rel="134"></div><span data-dcnode-id="7130" instrument_node="">
</span><p data-dcnode-id="7122"><span data-dcnode-id="7129" instrument_node="">Nonspecific bronchial hyperreactivity also can be found in </span><a data-dcnode-id="7127" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//emedicine.medscape.com/article/297664-overview"><span data-dcnode-id="7128" instrument_node="">chronic obstructive pulmonary disease</span></a><span data-dcnode-id="7126" instrument_node="">, cystic fibrosis, and </span><a data-dcnode-id="7124" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//emedicine.medscape.com/article/296961-overview"><span data-dcnode-id="7125" instrument_node="">bronchiectasis</span></a><span data-dcnode-id="7123" instrument_node="">.</span></p><span data-dcnode-id="7121" instrument_node="">
</span><div class="inContentAd" data-dcnode-id="7120" id="ads-pos-a6_17" rel="135"></div><span data-dcnode-id="7119" instrument_node="">
</span></div><span data-dcnode-id="7117" instrument_node="">
</span><div class="emed-logo" data-dcnode-id="7113"><span data-dcnode-id="7116" instrument_node="">
</span><img alt="eMedicine Logo" data-dcnode-id="7115" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//img.medscapestatic.com/pi/global/logos/emed/logo-emedicine77x17.svg&amp;raw"><span data-dcnode-id="7114" instrument_node="">
</span></div><span data-dcnode-id="7112" instrument_node="">

</span><h2 data-dcnode-id="7091"><span data-dcnode-id="7092" instrument_node="">Six-Minute Walk Test</span></h2><span data-dcnode-id="7090" instrument_node="">
</span><div class="refsection_content" data-dcnode-id="6554"><span data-dcnode-id="7089" instrument_node="">
</span><span data-dcnode-id="7087" instrument_node="">
</span><h3 data-dcnode-id="7085"><span data-dcnode-id="7086" instrument_node="">Background</span></h3><span data-dcnode-id="7084" instrument_node="">
</span><p data-dcnode-id="7066"><span data-dcnode-id="7083" instrument_node="">The six-minute walk test (6mwt) is a test that can aid in assessing the functional capacity of patients with cardiopulmonary disease. The patient is instructed to walk as far as possible on a straight track, ideally 100 feet in length. Patients are advised that they can set their own pace and can pause to rest, if needed, but should resume walking as soon as they are able. If the patient does pause to rest, the elapsed timer for the test continues. Obtaining the total distance walked (six-minute walk distance [6mwd]) is the primary objective of the test, although the estimation of arterial oxygen saturation by pulse oximetry and the patient’s assessment of dyspnea and fatigue during the walk are typically collected. The test is increasingly used as a clinical tool, with reference equations now available for predicting a normal 6mwd and lower limit of normal. The minimum clinically important difference (MCID) for the 6mwd is 30 m in patients with IPF, PAH, or COPD.</span><sup data-dcnode-id="7067"><span data-dcnode-id="7082" instrument_node="">
</span><span data-dcnode-id="7080" instrument_node=""> [</span><a data-dcnode-id="7078" href="javascript:void(0);" onclick="showToolTip(this,'references-layer','16')"><span data-dcnode-id="7079" instrument_node="">16</span></a><span data-dcnode-id="7077" instrument_node="">, </span><a data-dcnode-id="7075" href="javascript:void(0);" onclick="showToolTip(this,'references-layer','17')"><span data-dcnode-id="7076" instrument_node="">17</span></a><span data-dcnode-id="7074" instrument_node="">, </span><a data-dcnode-id="7072" href="javascript:void(0);" onclick="showToolTip(this,'references-layer','18')"><span data-dcnode-id="7073" instrument_node="">18</span></a><span data-dcnode-id="7071" instrument_node="">, </span><a data-dcnode-id="7069" href="javascript:void(0);" onclick="showToolTip(this,'references-layer','19')"><span data-dcnode-id="7070" instrument_node="">19</span></a><span data-dcnode-id="7068" instrument_node="">] </span></sup></p><span data-dcnode-id="7065" instrument_node="">
</span><div class="inContentAd" data-dcnode-id="7064" id="ads-pos-a10_1" rel="136"></div><span data-dcnode-id="7063" instrument_node="">
</span><h3 data-dcnode-id="7061"><span data-dcnode-id="7062" instrument_node="">Indications</span></h3><span data-dcnode-id="7060" instrument_node="">
</span><p data-dcnode-id="7058"><span data-dcnode-id="7059" instrument_node="">It is used as an assessment of exercise tolerance (functional capacity) in patients with disease.</span></p><span data-dcnode-id="7057" instrument_node="">
</span><div class="inContentAd" data-dcnode-id="7056" id="ads-pos-a10_2" rel="137"></div><span data-dcnode-id="7055" instrument_node="">
</span><p data-dcnode-id="7053"><span data-dcnode-id="7054" instrument_node="">Preintervention and postintervention comparisons (medication changes, surgery, transplant) can be made.</span></p><span data-dcnode-id="7052" instrument_node="">
</span><div class="inContentAd" data-dcnode-id="7051" id="ads-pos-a10_3" rel="138"></div><span data-dcnode-id="7050" instrument_node="">

</span><p data-dcnode-id="6812"><span data-dcnode-id="6813" instrument_node="">Hypertrophic cardiomyopathy</span></p><span data-dcnode-id="6811" instrument_node="">
</span></div></li><span data-dcnode-id="6808" instrument_node="">
</span><span data-dcnode-id="6806" instrument_node="">
</span><li data-dcnode-id="6799"><span data-dcnode-id="6805" instrument_node="">
</span><div class="topbullet" data-dcnode-id="6800"><span data-dcnode-id="6804" instrument_node="">
</span><p data-dcnode-id="6802"><span data-dcnode-id="6803" instrument_node="">Significant pulmonary hypertension</span></p><span data-dcnode-id="6801" instrument_node="">
</span></div></li><span data-dcnode-id="6798" instrument_node="">
</span><span data-dcnode-id="6796" instrument_node="">
</span><li data-dcnode-id="6789"><span data-dcnode-id="6795" instrument_node="">
</span><div class="topbullet" data-dcnode-id="6790"><span data-dcnode-id="6794" instrument_node="">
</span><p data-dcnode-id="6792"><span data-dcnode-id="6793" instrument_node="">Advanced or complicated pregnancy</span></p><span data-dcnode-id="6791" instrument_node="">
</span></div></li><span data-dcnode-id="6788" instrument_node="">
</span><span data-dcnode-id="6786" instrument_node="">
</span><li data-dcnode-id="6779"><span data-dcnode-id="6785" instrument_node="">
</span><div class="topbullet" data-dcnode-id="6780"><span data-dcnode-id="6784" instrument_node="">
</span><p data-dcnode-id="6782"><span data-dcnode-id="6783" instrument_node="">Electrolyte abnormalities</span></p><span data-dcnode-id="6781" instrument_node="">
</span></div></li><span data-dcnode-id="6778" instrument_node="">
</span><span data-dcnode-id="6776" instrument_node="">
</span><li data-dcnode-id="6769"><span data-dcnode-id="6775" instrument_node="">
</span><div class="topbullet" data-dcnode-id="6770"><span data-dcnode-id="6774" instrument_node="">
</span><p data-dcnode-id="6772"><span data-dcnode-id="6773" instrument_node="">Orthopedic impairment that prevents walking</span></p><span data-dcnode-id="6771" instrument_node="">
</span></div></li><span data-dcnode-id="6768" instrument_node="">
</span></ul><span data-dcnode-id="6766" instrument_node="">
</span><div class="inContentAd" data-dcnode-id="6765" id="ads-pos-a10_5" rel="140"></div><span data-dcnode-id="6764" instrument_node="">
</span><h3 data-dcnode-id="6762"><span data-dcnode-id="6763" instrument_node="">Patient preparation</span></h3><span data-dcnode-id="6761" instrument_node="">
</span><p data-dcnode-id="6759"><span data-dcnode-id="6760" instrument_node="">Wear comfortable clothing and shoes for walking.</span></p><span data-dcnode-id="6758" instrument_node="">
</span><div class="inContentAd" data-dcnode-id="6757" id="ads-pos-a10_6" rel="141"></div><span data-dcnode-id="6756" instrument_node="">
</span><p data-dcnode-id="6754"><span data-dcnode-id="6755" instrument_node="">Use usual walking aids.</span></p><span data-dcnode-id="6753" instrument_node="">
</span><div class="inContentAd" data-dcnode-id="6752" id="ads-pos-a10_7" rel="142"></div><span data-dcnode-id="6751" instrument_node="">
</span><p data-dcnode-id="6749"><span data-dcnode-id="6750" instrument_node="">No vigorous exercise should be performed within 2 hours.</span></p><span data-dcnode-id="6748" instrument_node="">
</span><div class="inContentAd" data-dcnode-id="6747" id="ads-pos-a10_8" rel="143"></div><span data-dcnode-id="6746" instrument_node="">
</span><p data-dcnode-id="6744"><span data-dcnode-id="6745" instrument_node="">Repeat testing should occur at the same time of the day to reduce intraday variability.</span></p><span data-dcnode-id="6743" instrument_node="">
</span><div class="inContentAd" data-dcnode-id="6742" id="ads-pos-a10_9" rel="144"></div><span data-dcnode-id="6741" instrument_node="">
</span><p data-dcnode-id="6739"><span data-dcnode-id="6740" instrument_node="">When possible, perform PFTs prior to the 6mwt.</span></p><span data-dcnode-id="6738" instrument_node="">
</span><div class="inContentAd" data-dcnode-id="6737" id="ads-pos-a10_10" rel="145"></div><span data-dcnode-id="6736" instrument_node="">
</span><p data-dcnode-id="6734"><span data-dcnode-id="6735" instrument_node="">Oxygen should be administered as prescribed by the physician or protocol; oxygen flow should remain constant throughout the test. Oxygen is not to be titrated during the test; if titration is needed, this should be done as a separate test before the 6mwt and adequate rest (at least 15 min) should be allowed after exercise titration before the 6mwt.</span></p><span data-dcnode-id="6733" instrument_node="">
</span><div class="inContentAd" data-dcnode-id="6732" id="ads-pos-a10_11" rel="146"></div><span data-dcnode-id="6731" instrument_node="">
</span><p data-dcnode-id="6729"><span data-dcnode-id="6730" instrument_node="">Medications should be taken as prescribed.</span></p><span data-dcnode-id="6728" instrument_node="">
</span><div class="inContentAd" data-dcnode-id="6727" id="ads-pos-a10_12" rel="147"></div><span data-dcnode-id="6726" instrument_node="">
</span><p data-dcnode-id="6721"><span data-dcnode-id="6725" instrument_node="">Pretest assessment should include resting SpO</span><sub data-dcnode-id="6723"><span data-dcnode-id="6724" instrument_node="">2</span></sub><span data-dcnode-id="6722" instrument_node="">, heart rate, blood pressure, and baseline dyspnea and fatigue (modified Borg scale).</span></p><span data-dcnode-id="6720" instrument_node="">
</span><div class="inContentAd" data-dcnode-id="6719" id="ads-pos-a10_13" rel="148"></div><span data-dcnode-id="6718" instrument_node="">
</span><p data-dcnode-id="6716"><span data-dcnode-id="6717" instrument_node="">The following standardized instructions should be read to the patient:</span></p><span data-dcnode-id="6715" instrument_node="">
</span><div class="inContentAd" data-dcnode-id="6714" id="ads-pos-a10_14" rel="149"></div><span data-dcnode-id="6713" instrument_node="">
</span><blockquote data-dcnode-id="6696"><span data-dcnode-id="6712" instrument_node="">
</span><p data-dcnode-id="6710"><span data-dcnode-id="6711" instrument_node="">The aim of this test is to walk as far as possible for 6 minutes. You will walk along this hallway between the markers, as many times as you can in 6 minutes.</span></p><span data-dcnode-id="6709" instrument_node="">
</span><p data-dcnode-id="6707"><span data-dcnode-id="6708" instrument_node="">I will let you know as each minute goes past, and then at 6 minutes I will ask you to stop where you are.</span></p><span data-dcnode-id="6706" instrument_node="">
</span><p data-dcnode-id="6704"><span data-dcnode-id="6705" instrument_node="">Six minutes is a long time to walk, so you will be exerting yourself. You are permitted to slow down, to stop, and to rest as necessary, but please resume walking as soon as you are able.</span></p><span data-dcnode-id="6703" instrument_node="">
</span><p data-dcnode-id="6701"><span data-dcnode-id="6702" instrument_node="">Remember that the objective is to walk as far as possible for 6 minutes, but don’t run or jog.</span></p><span data-dcnode-id="6700" instrument_node="">
</span><p data-dcnode-id="6698"><span data-dcnode-id="6699" instrument_node="">Do you have any questions?</span></p><span data-dcnode-id="6697" instrument_node="">
</span></blockquote><span data-dcnode-id="6695" instrument_node="">
</span><div class="inContentAd" data-dcnode-id="6694" id="ads-pos-a10_15" rel="150"></div><span data-dcnode-id="6693" instrument_node="">
</span><h3 data-dcnode-id="6691"><span data-dcnode-id="6692" instrument_node="">Terminating the 6mwt</span></h3><span data-dcnode-id="6690" instrument_node="">
</span><p data-dcnode-id="6679"><span data-dcnode-id="6689" instrument_node="">Prior to the 2014 ATS/ERS Technical Standard for Field Walking tests, monitoring the patient with pulse oximetry was optional. This document established SpO</span><sub data-dcnode-id="6687"><span data-dcnode-id="6688" instrument_node="">2</span></sub><span data-dcnode-id="6686" instrument_node=""> falling below 80% as an indication for the operator to terminate the procedure, making the monitoring of pulse oximetry mandatory. This new standard was adopted to be consistent with guidelines for incremental exercise testing. In severely debilitated patients, a 6mwt does result in patients exerting themselves maximally, and stopping the 6mwt when the SpO</span><sub data-dcnode-id="6684"><span data-dcnode-id="6685" instrument_node="">2</span></sub><span data-dcnode-id="6683" instrument_node=""> falls below 80% is prudent for ensuring patient safety. The guidelines allow for the subject to resume the 6mwt if the SpO</span><sub data-dcnode-id="6681"><span data-dcnode-id="6682" instrument_node="">2</span></sub><span data-dcnode-id="6680" instrument_node=""> rises above 85% after stopping (the elapsed timer continues while the patient rests).</span></p><span data-dcnode-id="6678" instrument_node="">
</span><div class="inContentAd" data-dcnode-id="6677" id="ads-pos-a10_16" rel="151"></div><span data-dcnode-id="6676" instrument_node="">
</span><p data-dcnode-id="6671"><span data-dcnode-id="6675" instrument_node="">Other reasons for test cessation include chest pain, intolerable dyspnea, leg cramps, staggering, diaphoresis, and a pale or ashen appearance. If the test is stopped for any of these reasons, the patient should sit or lie supine as appropriate, and the operator should obtain blood pressure, pulse rate, SpO</span><sub data-dcnode-id="6673"><span data-dcnode-id="6674" instrument_node="">2</span></sub><span data-dcnode-id="6672" instrument_node=""> and a physician evaluation as deemed appropriate. Oxygen should be administered, if necessary.</span></p><span data-dcnode-id="6670" instrument_node="">
</span><div class="inContentAd" data-dcnode-id="6669" id="ads-pos-a10_17" rel="152"></div><span data-dcnode-id="6668" instrument_node="">
</span><h3 data-dcnode-id="6666"><span data-dcnode-id="6667" instrument_node="">Test repetition</span></h3><span data-dcnode-id="6665" instrument_node="">
</span><p data-dcnode-id="6660"><span data-dcnode-id="6664" instrument_node="">It is recommended that the initial 6mwt be repeated after an interval of at least 30 minutes with a return of the heartrate and SpO</span><sub data-dcnode-id="6662"><span data-dcnode-id="6663" instrument_node="">2</span></sub><span data-dcnode-id="6661" instrument_node=""> to baseline values prior to the second test in an effort to establish a stable baseline from which subsequent tests can be evaluated.</span></p><span data-dcnode-id="6659" instrument_node="">
</span><div class="inContentAd" data-dcnode-id="6658" id="ads-pos-a10_18" rel="153"></div><span data-dcnode-id="6657" instrument_node="">
</span><h3 data-dcnode-id="6655"><span data-dcnode-id="6656" instrument_node="">Standard phrases of encouragement</span></h3><span data-dcnode-id="6654" instrument_node="">
</span><p data-dcnode-id="6652"><span data-dcnode-id="6653" instrument_node="">The 6mwd is sensitive to the influence of the operator administering the test. It is recommended that the following standard phrases of encouragement be delivered in an even tone of voice at 1-minute intervals in order to minimize the influence of the operator:</span></p><span data-dcnode-id="6651" instrument_node="">
</span><span data-dcnode-id="6649" instrument_node="">
</span><ul data-dcnode-id="6574"><span data-dcnode-id="6648" instrument_node="">
</span><span data-dcnode-id="6646" instrument_node="">
</span><li data-dcnode-id="6639"><span data-dcnode-id="6645" instrument_node="">
</span><div class="topbullet" data-dcnode-id="6640"><span data-dcnode-id="6644" instrument_node="">
</span><p data-dcnode-id="6642"><span data-dcnode-id="6643" instrument_node="">1 minute: You are doing well. You have 5 minutes to go.</span></p><span data-dcnode-id="6641" instrument_node="">
</span></div></li><span data-dcnode-id="6638" instrument_node="">
</span><span data-dcnode-id="6636" instrument_node="">
</span><li data-dcnode-id="6629"><span data-dcnode-id="6635" instrument_node="">
</span><div class="topbullet" data-dcnode-id="6630"><span data-dcnode-id="6634" instrument_node="">
</span><p data-dcnode-id="6632"><span data-dcnode-id="6633" instrument_node="">2 minutes: Keep up the good work. You have 4 minutes to go.</span></p><span data-dcnode-id="6631" instrument_node="">
</span></div></li><span data-dcnode-id="6628" instrument_node="">
</span><span data-dcnode-id="6626" instrument_node="">
</span><li data-dcnode-id="6619"><span data-dcnode-id="6625" instrument_node="">
</span><div class="topbullet" data-dcnode-id="6620"><span data-dcnode-id="6624" instrument_node="">
</span><p data-dcnode-id="6622"><span data-dcnode-id="6623" instrument_node="">3 minutes: You are doing well. You are halfway.</span></p><span data-dcnode-id="6621" instrument_node="">
</span></div></li><span data-dcnode-id="6618" instrument_node="">
</span><span data-dcnode-id="6616" instrument_node="">
</span><li data-dcnode-id="6609"><span data-dcnode-id="6615" instrument_node="">
</span><div class="topbullet" data-dcnode-id="6610"><span data-dcnode-id="6614" instrument_node="">
</span><p data-dcnode-id="6612"><span data-dcnode-id="6613" instrument_node="">4 minutes: Keep up the good work. You have only 2 minutes left.</span></p><span data-dcnode-id="6611" instrument_node="">
</span></div></li><span data-dcnode-id="6608" instrument_node="">
</span><span data-dcnode-id="6606" instrument_node="">
</span><li data-dcnode-id="6599"><span data-dcnode-id="6605" instrument_node="">
</span><div class="topbullet" data-dcnode-id="6600"><span data-dcnode-id="6604" instrument_node="">
</span><p data-dcnode-id="6602"><span data-dcnode-id="6603" instrument_node="">5 minutes: You are doing well. You have only 1 minute to go.</span></p><span data-dcnode-id="6601" instrument_node="">
</span></div></li><span data-dcnode-id="6598" instrument_node="">
</span><span data-dcnode-id="6596" instrument_node="">
</span><li data-dcnode-id="6589"><span data-dcnode-id="6595" instrument_node="">
</span><div class="topbullet" data-dcnode-id="6590"><span data-dcnode-id="6594" instrument_node="">
</span><p data-dcnode-id="6592"><span data-dcnode-id="6593" instrument_node="">6 minutes: Please stop where you are.</span></p><span data-dcnode-id="6591" instrument_node="">
</span></div></li><span data-dcnode-id="6588" instrument_node="">
</span><span data-dcnode-id="6586" instrument_node="">
</span><li data-dcnode-id="6576"><span data-dcnode-id="6585" instrument_node="">
</span><div class="topbullet" data-dcnode-id="6577"><span data-dcnode-id="6584" instrument_node="">
</span><p data-dcnode-id="6579"><span data-dcnode-id="6583" instrument_node="">If the patient stops during the test, every 30 seconds once the SpO</span><sub data-dcnode-id="6581"><span data-dcnode-id="6582" instrument_node="">2</span></sub><span data-dcnode-id="6580" instrument_node=""> is greater than 85%: Please resume walking whenever you feel able.</span></p><span data-dcnode-id="6578" instrument_node="">
</span></div></li><span data-dcnode-id="6575" instrument_node="">
</span></ul><span data-dcnode-id="6573" instrument_node="">
</span><div class="inContentAd" data-dcnode-id="6572" id="ads-pos-a10_19" rel="154"></div><span data-dcnode-id="6571" instrument_node="">
</span><p data-dcnode-id="6566"><span data-dcnode-id="6570" instrument_node="">The total distance walked in 6 minutes is the primary outcome of the test. The lowest, stable SpO</span><sub data-dcnode-id="6568"><span data-dcnode-id="6569" instrument_node="">2</span></sub><span data-dcnode-id="6567" instrument_node=""> and the heart rate at the end of the walk should be recorded. The postwalk blood pressure should be measured as soon as possible after ending the walk, and the modified Borg scale should be shown to the patient to assess his or her perception of dyspnea and fatigue during the walk.</span></p><span data-dcnode-id="6565" instrument_node="">
</span><div class="inContentAd" data-dcnode-id="6564" id="ads-pos-a10_20" rel="155"></div><span data-dcnode-id="6563" instrument_node="">
</span><h3 data-dcnode-id="6561"><span data-dcnode-id="6562" instrument_node="">Interpretation</span></h3><span data-dcnode-id="6560" instrument_node="">
</span><p data-dcnode-id="6558"><span data-dcnode-id="6559" instrument_node="">The 6mwd should be compared with a mean predicted normal 6mwd and the lower limit of normal from reference equations that have been verified by the local population. The 6mwd should be compared with a previously obtained baseline 6mwd, if available.</span></p><span data-dcnode-id="6557" instrument_node="">
</span><div class="inContentAd" data-dcnode-id="6556" id="ads-pos-a10_21" rel="156"></div><span data-dcnode-id="6555" instrument_node="">
</span></div><span data-dcnode-id="6553" instrument_node="">
</span><div class="emed-logo" data-dcnode-id="6549"><span data-dcnode-id="6552" instrument_node="">
</span><img alt="eMedicine Logo" data-dcnode-id="6551" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//img.medscapestatic.com/pi/global/logos/emed/logo-emedicine77x17.svg&amp;raw"><span data-dcnode-id="6550" instrument_node="">
</span></div><span data-dcnode-id="6548" instrument_node="">
</span><div class="back_next_btn active" data-dcnode-id="6535"><span data-dcnode-id="6547" instrument_node="">
</span><div class="back_btn" data-dcnode-id="6545"><span data-dcnode-id="6546" instrument_node="">
