</span><div class="inactive" data-dcnode-id="8186" id="content_a2"><span data-dcnode-id="8329" instrument_node="">
</span><h2 data-dcnode-id="8327"><span data-dcnode-id="8328" instrument_node="">Lung Volume Determination</span></h2><span data-dcnode-id="8326" instrument_node="">
</span><div class="refsection_content" data-dcnode-id="8207"><span data-dcnode-id="8325" instrument_node="">
</span><span data-dcnode-id="8323" instrument_node="">
</span><h3 data-dcnode-id="8321"><span data-dcnode-id="8322" instrument_node="">Synonyms</span></h3><span data-dcnode-id="8320" instrument_node="">
</span><p data-dcnode-id="8318"><span data-dcnode-id="8319" instrument_node="">Functional reserve capacity (FRC), helium dilution lung volumes, nitrogen washout lung volumes, static lung volumes, lung subdivisions</span></p><span data-dcnode-id="8317" instrument_node="">
</span><div class="inContentAd" data-dcnode-id="8316" id="ads-pos-a2_1" rel="45"></div><span data-dcnode-id="8315" instrument_node="">
</span><h3 data-dcnode-id="8313"><span data-dcnode-id="8314" instrument_node="">Indications</span></h3><span data-dcnode-id="8312" instrument_node="">
</span><p data-dcnode-id="8310"><span data-dcnode-id="8311" instrument_node="">Lung volume determinations are used in the evaluation of suspected restrictive lung disease and the evaluation of hyperinflation.</span></p><span data-dcnode-id="8309" instrument_node="">
</span><div class="inContentAd" data-dcnode-id="8308" id="ads-pos-a2_2" rel="46"></div><span data-dcnode-id="8307" instrument_node="">
</span><h3 data-dcnode-id="8305"><span data-dcnode-id="8306" instrument_node="">Contraindications</span></h3><span data-dcnode-id="8304" instrument_node="">
</span><p data-dcnode-id="8302"><span data-dcnode-id="8303" instrument_node="">Inability to follow instructions is a contraindication. Patients with claustrophobia may not tolerate being closed into a confined space (body plethysmograph), but anxiety can often be overcome with good instruction and coaching.</span></p><span data-dcnode-id="8301" instrument_node="">
</span><div class="inContentAd" data-dcnode-id="8300" id="ads-pos-a2_3" rel="47"></div><span data-dcnode-id="8299" instrument_node="">
</span><h3 data-dcnode-id="8297"><span data-dcnode-id="8298" instrument_node="">Patient care/preparations</span></h3><span data-dcnode-id="8296" instrument_node="">
</span><p data-dcnode-id="8294"><span data-dcnode-id="8295" instrument_node="">Use of supplemental oxygen just prior to a nitrogen washout test may cause underestimation of FRC unless the initial exhaled nitrogen is considered in the calculations. Supplemental oxygen should be discontinued for at least 10 minutes before starting a nitrogen washout test. Duplicate measurements of FRC by either gas dilution technique should be delayed until a posttest interval is equivalent to 1.5 times the equilibration time to eliminate the effects of residual oxygen or helium.</span></p><span data-dcnode-id="8293" instrument_node="">
</span><div class="inContentAd" data-dcnode-id="8292" id="ads-pos-a2_4" rel="48"></div><span data-dcnode-id="8291" instrument_node="">
</span><h3 data-dcnode-id="8289"><span data-dcnode-id="8290" instrument_node="">Test</span></h3><span data-dcnode-id="8288" instrument_node="">
</span><p data-dcnode-id="8286"><span data-dcnode-id="8287" instrument_node="">Lung volumes provide useful information that confirms the presence of restrictive lung disease suggested by a low vital capacity on a spirometry test. Hyperinflation, elevation of the RV and TLC can be demonstrated by this test. The test is dependent first on an accurate measurement of the volume of gas in the lungs at a resting end-expiration, known as the FRC, which represents the balance of the elastic recoil properties of the lung and the chest wall.</span></p><span data-dcnode-id="8285" instrument_node="">
</span><div class="inContentAd" data-dcnode-id="8284" id="ads-pos-a2_5" rel="49"></div><span data-dcnode-id="8283" instrument_node="">
</span><p data-dcnode-id="8278"><span data-dcnode-id="8282" instrument_node="">FRC can be measured by one of three techniques, inert gas dilution, nitrogen washout, or whole-body plethysmography. Both gas dilution techniques are subject to error by leaks at the mouthpiece or nose clip or, occasionally, even small leaks from the eardrum. When measured by whole-body plethysmography, resting end-expiratory volume is known as the FRC</span><sub data-dcnode-id="8280"><span data-dcnode-id="8281" instrument_node="">pleth</span></sub><span data-dcnode-id="8279" instrument_node=""> and will include the volume of gas contained in noncommunicating spaces such as blebs or bullae that the FRC measured by gas dilution techniques will not measure. In addition to this advantage, body plethysmography allows multiple determinations of lung volumes to be made rapidly.</span></p><span data-dcnode-id="8277" instrument_node="">
</span><div class="inContentAd" data-dcnode-id="8276" id="ads-pos-a2_6" rel="50"></div><span data-dcnode-id="8275" instrument_node="">
</span><p data-dcnode-id="8273"><span data-dcnode-id="8274" instrument_node="">When measured by inert gas dilution or nitrogen washout, premature termination of the procedure before adequate demonstration of equilibrium or washout results in underestimation of FRC, RV, and TLC. Repeat measurements should allow a recovery period of 1.5 times the wash-in or wash-out time to prevent residual helium or oxygen from affecting the new measurement. Body plethysmography is performed rapidly, allowing multiple determinations in minutes. Ideally, each measurement of lung subdivisions should be linked to each FRC or ITGV measurement (patient should remain on the mouthpiece).</span></p><span data-dcnode-id="8272" instrument_node="">
</span><div class="inContentAd" data-dcnode-id="8271" id="ads-pos-a2_7" rel="51"></div><span data-dcnode-id="8270" instrument_node="">
</span><p data-dcnode-id="8265"><span data-dcnode-id="8269" instrument_node="">Two types of errors are known to occur with body plethysmography techniques. One involves the underestimation of mouth pressure swings during respiratory efforts when the airway is occluded. The assumption that when no airflow is present the mouth pressures accurately reflect alveolar pressure has been shown to be not true when respiratory efforts occur at a frequency of greater than 1 Hz (respiratory rate of 60 breaths per minute). Thus, FRC</span><sub data-dcnode-id="8267"><span data-dcnode-id="8268" instrument_node="">pleth</span></sub><span data-dcnode-id="8266" instrument_node=""> is overestimated if the frequency of the respiratory effort is not kept between 0.5 and 1.0 Hz (30-60 breaths/min) during shutter closure.</span></p><span data-dcnode-id="8264" instrument_node="">
</span><div class="inContentAd" data-dcnode-id="8263" id="ads-pos-a2_8" rel="52"></div><span data-dcnode-id="8262" instrument_node="">
</span><p data-dcnode-id="8260"><span data-dcnode-id="8261" instrument_node="">The second type of measurement error using body plethysmography involves trying to pace the patient's tidal breathing before shutter closure. The ideal respiratory rate during shutter closure is far in excess of the patient's resting respiratory rate and causes dynamic hyperinflation, increasing the lung volume above the resting lung volume. Patients should breathe at a relaxed spontaneous respiratory rate without coaching before shutter closure.</span></p><span data-dcnode-id="8259" instrument_node="">
</span><div class="inContentAd" data-dcnode-id="8258" id="ads-pos-a2_9" rel="53"></div><span data-dcnode-id="8257" instrument_node="">
</span><h3 data-dcnode-id="8255"><span data-dcnode-id="8256" instrument_node="">Results</span></h3><span data-dcnode-id="8254" instrument_node="">
</span><p data-dcnode-id="8252"><span data-dcnode-id="8253" instrument_node="">All lung volumes are expressed in liters to the nearest hundredth of a liter. FRC is the volume of gas in the lungs at the end of an average resting expiration. It is comprised of the expiratory reserve volume (ERV), the volume of gas that can be voluntarily exhaled beyond the FRC or ITGV, and the RV. The TLC then can be calculated by adding the RV to the vital capacity (VC). RV also is expressed as a fraction of the TLC, the RV-to-TLC ratio (see the image below). The expected repeatability of three repeated same-session measurements of FRC is ± 5%. The standards for expected repeatability of other parameters (RV, IC, TLC) have not been set, but the expected repeatability of the VC is the same as FVC, ≤ 0.15 L difference between the two largest.</span></p><span data-dcnode-id="8251" instrument_node="">
</span><div class="inContentAd" data-dcnode-id="8250" id="ads-pos-a2_10" rel="54"></div><span data-dcnode-id="8249" instrument_node="">
</span><span data-dcnode-id="8247" instrument_node="">
</span><div class="inlineImage" data-dcnode-id="8229"><span data-dcnode-id="8246" instrument_node="">
</span><a data-dcnode-id="8244" href="javascript:refImgShow(2)" onclick="wmdTrack('cr-im_2');"><img alt="This is a graph of lung volumes in health and in d" class="pborder" data-dcnode-id="8245" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//img.medscapestatic.com/pi/meds/ckb/38/14638tn.jpg&amp;raw"></a><span data-dcnode-id="8243" instrument_node="">
</span><span data-dcnode-id="8241" instrument_node="">
</span><span data-dcnode-id="8239" instrument_node="">
</span><span class="capt" data-dcnode-id="8237"><span data-dcnode-id="8238" instrument_node="">This is a graph of lung volumes in health and in disease, showing the various lung subdivisions. Normal aging results in an increase in functional reserve capacity (FRC) and residual volume (RV) and a normal total lung capacity (TLC) percentage. Obstructive lung diseases cause hyperinflation (increase in RV and FRC) with a relatively normal forced vital capacity (FVC). In severe emphysema, the TLC percentage can exceed 150%, with the RV impinging on the FVC. Restrictive lung diseases exhibit reduced TLC percentage with relative preservation of the RV/TLC percentage in fibrosis, a reduced inspiratory capacity and expiratory reserve volume (ERV) in neuromuscular disease, and severe reduction of the ERV in extreme obesity. </span></span><span data-dcnode-id="8236" instrument_node="">
</span><div class="galleryLink" data-dcnode-id="8231"><span data-dcnode-id="8235" instrument_node="">
</span><a data-dcnode-id="8233" href="javascript:refImgShow('001')" onclick="wmdTrack('cr-ar_view');"><span data-dcnode-id="8234" instrument_node="">View Media Gallery</span></a><span data-dcnode-id="8232" instrument_node="">
</span></div><span data-dcnode-id="8230" instrument_node="">
</span></div><span data-dcnode-id="8228" instrument_node="">
</span><div class="inContentAd" data-dcnode-id="8227" id="ads-pos-a2_11" rel="55"></div><span data-dcnode-id="8226" instrument_node="">
</span><h3 data-dcnode-id="8224"><span data-dcnode-id="8225" instrument_node="">Interpretation</span></h3><span data-dcnode-id="8223" instrument_node="">
</span><p data-dcnode-id="8221"><span data-dcnode-id="8222" instrument_node="">Obstructive lung diseases, particularly emphysema, result in an increase in the RV and RV-to-TLC ratio. In severe emphysema, particularly bullous emphysema, the TLC can show a marked increase. Bronchial spasm, airway inflammation, excessive secretions in the airway, and loss of lung elastic recoil increase airways resistance and result in an insidious progressive increase in the end-expiratory lung volume that results in chronic hyperinflation (elevated RV, TLC, and RV-to-TLC ratio). Other pulmonary causes of increased RV include pulmonary vascular congestion and mitral stenosis. Extrapulmonic causes of increased RV include expiratory muscle weakness as observed in spinal cord injuries and myopathies.</span></p><span data-dcnode-id="8220" instrument_node="">
</span><div class="inContentAd" data-dcnode-id="8219" id="ads-pos-a2_12" rel="56"></div><span data-dcnode-id="8218" instrument_node="">
</span><p data-dcnode-id="8216"><span data-dcnode-id="8217" instrument_node="">Increased body weight due to increased fat causes an increase in chest wall elastic recoil, which favors a lower end-expiratory lung volume, resulting in less hyperinflation for any degree of airflow obstruction.</span></p><span data-dcnode-id="8215" instrument_node="">
</span><div class="inContentAd" data-dcnode-id="8214" id="ads-pos-a2_13" rel="57"></div><span data-dcnode-id="8213" instrument_node="">
</span><p data-dcnode-id="8211"><span data-dcnode-id="8212" instrument_node="">Lung volumes can confirm the presence of restriction when a reduced vital capacity is seen on spirometry. A reduced TLC is the hallmark of restrictive lung disease. An isolated reduction of the residual volume may be an early sign of restrictive lung disease. Pulmonary processes that can reduce the TLC include interstitial lung disease, atelectasis, pneumothorax, pneumonectomy, consolidation, edema, and fibrosis. Extrapulmonary causes of restriction include obesity, respiratory muscle weakness, thoracic deformities, and disease of the pleura.</span></p><span data-dcnode-id="8210" instrument_node="">
</span><div class="inContentAd" data-dcnode-id="8209" id="ads-pos-a2_14" rel="58"></div><span data-dcnode-id="8208" instrument_node="">
</span></div><span data-dcnode-id="8206" instrument_node="">
</span><div class="emed-logo" data-dcnode-id="8202"><span data-dcnode-id="8205" instrument_node="">
</span><img alt="eMedicine Logo" data-dcnode-id="8204" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//img.medscapestatic.com/pi/global/logos/emed/logo-emedicine77x17.svg&amp;raw"><span data-dcnode-id="8203" instrument_node="">
</span></div><span data-dcnode-id="8201" instrument_node="">
</span><div class="back_next_btn active" data-dcnode-id="8188"><span data-dcnode-id="8200" instrument_node="">

       </span></div><span data-dcnode-id="8197" instrument_node="">
</span><div class="next_btn" data-dcnode-id="8192"><a data-dcnode-id="8193" href="#a2" onclick="AdPageRefresh('https://emedicine.medscape.com/article/303239-overview#a2', '1', 'cr-sn_next', '#a2');"><span data-dcnode-id="8196" instrument_node="">Next: </span><span data-dcnode-id="8194"><span data-dcnode-id="8195" instrument_node="">Lung Volume Determination </span></span></a></div><span data-dcnode-id="8191" instrument_node="">
</span><div class="spacer" data-dcnode-id="8190"></div><span data-dcnode-id="8189" instrument_node="">
</span></div><span data-dcnode-id="8187" instrument_node="">
</span></div><span data-dcnode-id="8185" instrument_node="">
</span><span data-dcnode-id="8183" instrument_node="">
</span><div class="inactive" data-dcnode-id="7849" id="content_a3"><span data-dcnode-id="8182" instrument_node="">
</span><h2 data-dcnode-id="8180"><span data-dcnode-id="8181" instrument_node="">Diffusing Capacity of Lung for Carbon Monoxide</span></h2><span data-dcnode-id="8179" instrument_node="">
</span><div class="refsection_content" data-dcnode-id="7870"><span data-dcnode-id="8178" instrument_node="">
</span><span data-dcnode-id="8176" instrument_node="">
</span><h3 data-dcnode-id="8174"><span data-dcnode-id="8175" instrument_node="">Synonyms</span></h3><span data-dcnode-id="8173" instrument_node="">
</span><p data-dcnode-id="8171"><span data-dcnode-id="8172" instrument_node="">Transfer factor of the lung for carbon monoxide (TLCO, mmol/min/kilopascal, commonly used in Europe); DLCO, diffusing capacity of lung for carbon monoxide (DL, mL/min/mmHg); transfer coefficient of the lung for carbon monoxide (KCO); and alveolar volume (VA, L), which is the single-breath estimate of the TLC determined by the dilution of the tracer gas concentration. The term KCO should be used instead of the term DLCO/VA, which incorrectly implies that the DLCO is being corrected for lung volume.&nbsp;</span></p><span data-dcnode-id="8170" instrument_node="">
</span><div class="inContentAd" data-dcnode-id="8169" id="ads-pos-a3_1" rel="59"></div><span data-dcnode-id="8168" instrument_node="">
</span><h3 data-dcnode-id="8166"><span data-dcnode-id="8167" instrument_node="">Contraindications</span></h3><span data-dcnode-id="8165" instrument_node="">
</span><p data-dcnode-id="8163"><span data-dcnode-id="8164" instrument_node="">Inability to follow instructions is a contraindication to a DLCO test (CPT code 94729). Patients should be alert, oriented, able to exhale completely and inhale to total lung capacity, able to maintain an airtight seal on a mouthpiece, and able to hold a large breath for 10 seconds.</span></p><span data-dcnode-id="8162" instrument_node="">
</span><div class="inContentAd" data-dcnode-id="8161" id="ads-pos-a3_2" rel="60"></div><span data-dcnode-id="8160" instrument_node="">
</span><h3 data-dcnode-id="8158"><span data-dcnode-id="8159" instrument_node="">Patient care/preparations</span></h3><span data-dcnode-id="8157" instrument_node="">
</span><p data-dcnode-id="8155"><span data-dcnode-id="8156" instrument_node="">Refrain from smoking for several hours before the test. Alcohol vapors can affect the accuracy of some fuel cell types of CO analyzers, thus alcoholic beverages should be withheld for eight hours.</span></p><span data-dcnode-id="8154" instrument_node="">
</span><div class="inContentAd" data-dcnode-id="8153" id="ads-pos-a3_3" rel="61"></div><span data-dcnode-id="8152" instrument_node="">
</span><h3 data-dcnode-id="8150"><span data-dcnode-id="8151" instrument_node="">Test</span></h3><span data-dcnode-id="8149" instrument_node="">
</span><p data-dcnode-id="8147"><span data-dcnode-id="8148" instrument_node="">DLCO, also known as the TLCO, is a measurement of the conductance or ease of transfer for CO molecules from alveolar gas to the hemoglobin of the red blood cells in the pulmonary circulation. It often is helpful for evaluating the presence of possible parenchymal lung disease when spirometry and/or lung volume determinations suggest a reduced vital capacity, RV, and/or TLC. It should be noted that different units of measure exist worldwide. In the United States, the test is known as the DLCO and the units of measure are mL/min/mm Hg (traditional unit of measure). In contrast, the test is also known as the TLCO and the units of measure are mmol/min/kPa (International System of Units or SI units). The conversion from SI units (mmol/min/kPa) to traditional (mL/min/mm Hg) can be done by multiplying the SI value by 2.987.</span></p><span data-dcnode-id="8146" instrument_node="">
</span><div class="inContentAd" data-dcnode-id="8145" id="ads-pos-a3_4" rel="62"></div><span data-dcnode-id="8144" instrument_node="">
</span><p data-dcnode-id="8134"><span data-dcnode-id="8143" instrument_node="">Recommendations for a standard technique for the test were first published by the American Thoracic Society (ATS) in 1995. A joint task force from the ATS and the European Respiratory Society (ERS) published updated standards in 2017.</span><sup data-dcnode-id="8136"><span data-dcnode-id="8142" instrument_node="">
</span><span data-dcnode-id="8140" instrument_node=""> [</span><a data-dcnode-id="8138" href="javascript:void(0);" onclick="showToolTip(this,'references-layer','7')"><span data-dcnode-id="8139" instrument_node="">7</span></a><span data-dcnode-id="8137" instrument_node="">] </span></sup><span data-dcnode-id="8135" instrument_node="">The updated standards include some important changes in the criteria used to determine the technical acceptability and expected repeatability of measurements, as well as recommendations on the increased utility of the procedure when rapid-responding gas analyzer (RGA) technology is used. RGA technology has been available for over a decade and most commercial equipment currently sold uses the RGA technology. It is likely that most of the slower-responding analyzer technology will phased out by equipment replacement over the coming decade.</span></p><span data-dcnode-id="8133" instrument_node="">
</span><div class="inContentAd" data-dcnode-id="8132" id="ads-pos-a3_5" rel="63"></div><span data-dcnode-id="8131" instrument_node="">
</span><p data-dcnode-id="8118"><span data-dcnode-id="8130" instrument_node="">Most pulmonary laboratories perform this test by the single-breath technique (DLCO SB) because it is quicker to perform and more reproducible than other techniques. Other techniques, such as the rebreathing technique, are not commonly available and are not described here. In the single-breath technique, the subject exhales to RV and then inspires the test gas (tracer gas, [commonly either 10% helium or 0.3% methane], 0.3% CO, 21% oxygen, and balance nitrogen) briskly to TLC. This vital capacity–size breath is held for 10 seconds and then exhaled either into a sample bag (discrete sampling) or past a sampling port leading to rapid-response analyzers after an initial discard of 0.75-1 L of the exhalate to minimize the contribution of dead space gas (mouthpiece, filter, measuring equipment, and anatomical areas where no gas exchange is expected) to the gas sample that will be analyzed to estimate uptake of CO by the alveolar capillaries. The grab sample (0.75-1 L) then is analyzed for tracer gas and CO. The dilution of the tracer gas in the vital capacity–size breath of test gas by the patient's RV provides both a means to estimate the initial alveolar concentration of CO and to estimate the patient's lung volume at full inflation. The rate of diffusion of the CO can be estimated by the change from this initial alveolar concentration to that of the expired grab sample. This change in the CO concentration is then multiplied by the single-breath estimate of TLC to calculate the diffusing capacity. Abnormal hemoglobin (Hb) levels can affect the diffusing capacity and, if known, should be used to mathematically correct the measured diffusing capacity to what it would be if the patient’s hemoglobin was normal. Although it has been recommended that the predicted value be adjusted for hemoglobin,</span><sup data-dcnode-id="8120"><span data-dcnode-id="8129" instrument_node="">
</span><span data-dcnode-id="8127" instrument_node=""> [</span><a data-dcnode-id="8125" href="javascript:void(0);" onclick="showToolTip(this,'references-layer','7')"><span data-dcnode-id="8126" instrument_node="">7</span></a><span data-dcnode-id="8124" instrument_node="">, </span><a data-dcnode-id="8122" href="javascript:void(0);" onclick="showToolTip(this,'references-layer','8')"><span data-dcnode-id="8123" instrument_node="">8</span></a><span data-dcnode-id="8121" instrument_node="">] </span></sup><span data-dcnode-id="8119" instrument_node="">providing an estimate of what the patient’s expected DLCO should be given their hemoglobin level, equipment manufacturers have been slow to offer this accommodation in the testing software and the older practice of adjusting the patient’s measured DLCO to what it would be if their hemoglobin was normal is still quite common. Both methods are presented below. Both methods yield identical values when the measured values are compared with the predicted values and expressed as a percentage of the predicted value. Regardless of whether the measured or predicted values are adjusted, both adjusted and unadjusted values should be displayed on the final report, along with the measured hemoglobin (and date of hemoglobin determination).</span></p><span data-dcnode-id="8117" instrument_node="">
</span><div class="inContentAd" data-dcnode-id="8116" id="ads-pos-a3_6" rel="64"></div><span data-dcnode-id="8115" instrument_node="">
</span><p data-dcnode-id="8113"><span data-dcnode-id="8114" instrument_node="">Adjusting the patient’s measured DLCO value for the measured hemoglobin (not currently recommended but still commonly used) is as follows:</span></p><span data-dcnode-id="8112" instrument_node="">
</span><span data-dcnode-id="8110" instrument_node="">
</span><ul data-dcnode-id="8094"><span data-dcnode-id="8109" instrument_node="">
</span><span data-dcnode-id="8107" instrument_node="">
</span><li data-dcnode-id="8103"><span data-dcnode-id="8106" instrument_node="">
</span><div class="topbullet" data-dcnode-id="8104"><span data-dcnode-id="8105" instrument_node="">
          Adolescent males and men: Hb adjusted DLCO (DLCOc) = measured DLCO ([10.22 + Hb g/dL]/[1.7 Hb])
         </span></div></li><span data-dcnode-id="8102" instrument_node="">
</span><span data-dcnode-id="8100" instrument_node="">
</span><li data-dcnode-id="8096"><span data-dcnode-id="8099" instrument_node="">
</span><div class="topbullet" data-dcnode-id="8097"><span data-dcnode-id="8098" instrument_node="">
          Children younger than 15 years and women: Hb adjusted DLCO (DLCOc) = measured DLCO ([9.38 + Hb g/dL]/[1.7 Hb])
         </span></div></li><span data-dcnode-id="8095" instrument_node="">
</span></ul><span data-dcnode-id="8093" instrument_node="">
</span><div class="inContentAd" data-dcnode-id="8092" id="ads-pos-a3_7" rel="65"></div><span data-dcnode-id="8091" instrument_node="">
</span><p data-dcnode-id="8089"><span data-dcnode-id="8090" instrument_node="">Adjusting the predicted DLCO (and lower limit of normal) for the patient’s measured hemoglobin (currently recommended) is as follows:</span></p><span data-dcnode-id="8088" instrument_node="">
</span><span data-dcnode-id="8086" instrument_node="">
</span><ul data-dcnode-id="8070"><span data-dcnode-id="8085" instrument_node="">
</span><span data-dcnode-id="8083" instrument_node="">
</span><li data-dcnode-id="8079"><span data-dcnode-id="8082" instrument_node="">
</span><div class="topbullet" data-dcnode-id="8080"><span data-dcnode-id="8081" instrument_node="">
          Adolescent males and men: DLCO (predicted for Hb) = DLCO (predicted) x (1.7 Hb/(10.22 + Hb))
         </span></div></li><span data-dcnode-id="8078" instrument_node="">
</span><span data-dcnode-id="8076" instrument_node="">
</span><li data-dcnode-id="8072"><span data-dcnode-id="8075" instrument_node="">
</span><div class="topbullet" data-dcnode-id="8073"><span data-dcnode-id="8074" instrument_node="">
          Children younger than 15 years and women: DLCO (predicted for Hb) = DLCO (predicted) x (1.7 Hb/(9.38 + Hb))
         </span></div></li><span data-dcnode-id="8071" instrument_node="">
</span></ul><span data-dcnode-id="8069" instrument_node="">
</span><div class="inContentAd" data-dcnode-id="8068" id="ads-pos-a3_8" rel="66"></div><span data-dcnode-id="8067" instrument_node="">
</span><p data-dcnode-id="8065"><span data-dcnode-id="8066" instrument_node="">Other factors have been shown to impact the measured DLCO, such as elevated blood carboxyhemoglobin (COHb) and barometric pressure. The impact of an elevated carboxyhemoglobin is twofold: (1) it reduces the alveolar-capillary pressure gradient for CO and (2) acts as a virtual anemia by holding onto sites on the hemoglobin molecule that could be used for binding CO (or oxygen). The net effect is a 2% decrease in DLCO for each 1% increase in COHb. RGA systems can measure the CO in the patient’s exhaled breath just prior to inhalation of the DLCO test gas and compensate for elevated CO by subtracting the estimated CO back-pressure from both the initial and final alveolar carbon monoxide partial pressures. This compensates for the reduced alveolar-capillary pressure gradient but does not compensate for the anemia effect. The 2017 DLCO standards paper shows a formula that also adjusts for the anemia effect, but this is not currently in use on most PFT systems.</span></p><span data-dcnode-id="8064" instrument_node="">
</span><div class="inContentAd" data-dcnode-id="8063" id="ads-pos-a3_9" rel="67"></div><span data-dcnode-id="8062" instrument_node="">
</span><p data-dcnode-id="8057"><span data-dcnode-id="8061" instrument_node="">The current recommendation is to correct the measured DLCO for barometric pressure. As barometric pressure falls, so does the partial pressure of inspired oxygen (PIO</span><sub data-dcnode-id="8059"><span data-dcnode-id="8060" instrument_node="">2</span></sub><span data-dcnode-id="8058" instrument_node="">) and DLCO increases. The typical variation in DLCO expected from atmospheric pressure fluctuation at a given altitude is +1.5%. Laboratories at higher altitude can produce higher values; the expected change is approximately 0.5% for each 100-meter increase in altitude. This adjustment can only be made if the barometric pressure is made or updated in the measuring system on a daily basis.</span></p><span data-dcnode-id="8056" instrument_node="">
</span><div class="inContentAd" data-dcnode-id="8055" id="ads-pos-a3_10" rel="68"></div><span data-dcnode-id="8054" instrument_node="">
</span><h3 data-dcnode-id="8052"><span data-dcnode-id="8053" instrument_node="">Quality grading for DLCO maneuvers</span></h3><span data-dcnode-id="8051" instrument_node="">
</span><p data-dcnode-id="8041"><span data-dcnode-id="8050" instrument_node="">The 2017 ATS/ERS DLCO standards paper specified changes to the acceptability and repeatability standards used to determine technical acceptability.</span><sup data-dcnode-id="8043"><span data-dcnode-id="8049" instrument_node="">
</span><span data-dcnode-id="8047" instrument_node=""> [</span><a data-dcnode-id="8045" href="javascript:void(0);" onclick="showToolTip(this,'references-layer','7')"><span data-dcnode-id="8046" instrument_node="">7</span></a><span data-dcnode-id="8044" instrument_node="">] </span></sup><span data-dcnode-id="8042" instrument_node="">It also proposed a quality control grading system that acknowledges that test results from efforts that fail to meet all of the acceptability criteria may still provide clinically useful data.</span></p><span data-dcnode-id="8040" instrument_node="">
</span><div class="inContentAd" data-dcnode-id="8039" id="ads-pos-a3_11" rel="69"></div><span data-dcnode-id="8038" instrument_node="">
</span><p data-dcnode-id="8036"><span data-dcnode-id="8037" instrument_node="">The 2017 criteria for acceptability of DLCO efforts are as follows:</span></p><span data-dcnode-id="8035" instrument_node="">
</span><span data-dcnode-id="8033" instrument_node="">
</span><ul data-dcnode-id="7996"><span data-dcnode-id="8032" instrument_node="">
</span><span data-dcnode-id="8030" instrument_node="">
</span><li data-dcnode-id="8026"><span data-dcnode-id="8029" instrument_node="">
</span><div class="topbullet" data-dcnode-id="8027"><span data-dcnode-id="8028" instrument_node="">
          VI (inspired volume of test gas) greater than 90% of the largest VC measured by same-day slow or forced spirometry (2005 standard was &gt;85%) or
         </span></div></li><span data-dcnode-id="8025" instrument_node="">
</span><span data-dcnode-id="8023" instrument_node="">
</span><li data-dcnode-id="8019"><span data-dcnode-id="8022" instrument_node="">
</span><div class="topbullet" data-dcnode-id="8020"><span data-dcnode-id="8021" instrument_node="">
          VI greater than 85% of largest VC and alveolar volume (VA) within 0.2 L or 5% (whichever is greater) of the largest VA from other acceptable maneuvers
         </span></div></li><span data-dcnode-id="8018" instrument_node="">
</span><span data-dcnode-id="8016" instrument_node="">
</span><li data-dcnode-id="8012"><span data-dcnode-id="8015" instrument_node="">
</span><div class="topbullet" data-dcnode-id="8013"><span data-dcnode-id="8014" instrument_node="">
          85% of test gas VI inhaled in less than 4 seconds (unchanged from 2005 standards)
         </span></div></li><span data-dcnode-id="8011" instrument_node="">
</span><span data-dcnode-id="8009" instrument_node="">
</span><li data-dcnode-id="8005"><span data-dcnode-id="8008" instrument_node="">
</span><div class="topbullet" data-dcnode-id="8006"><span data-dcnode-id="8007" instrument_node="">
          Breathe hold time of 10 + 2 seconds without evidence of significant leaks, Valsalva maneuver, or Mueller maneuver (unchanged from 2005 standards)
         </span></div></li><span data-dcnode-id="8004" instrument_node="">
</span><span data-dcnode-id="8002" instrument_node="">
</span><li data-dcnode-id="7998"><span data-dcnode-id="8001" instrument_node="">
</span><div class="topbullet" data-dcnode-id="7999"><span data-dcnode-id="8000" instrument_node="">
          Sample collection completed within 4 seconds of the start of exhalation (was 3 seconds in 2005 standards); for RGA systems, virtual sample collection should be initiated after dead-space washout is complete
         </span></div></li><span data-dcnode-id="7997" instrument_node="">
</span></ul><span data-dcnode-id="7995" instrument_node="">
</span><div class="inContentAd" data-dcnode-id="7994" id="ads-pos-a3_12" rel="70"></div><span data-dcnode-id="7993" instrument_node="">
</span><p data-dcnode-id="7991"><span data-dcnode-id="7992" instrument_node="">The 2017 criterion for DLCO repeatability is as follows:</span></p><span data-dcnode-id="7990" instrument_node="">
</span><span data-dcnode-id="7988" instrument_node="">
</span><ul data-dcnode-id="7979"><span data-dcnode-id="7987" instrument_node="">
</span><span data-dcnode-id="7985" instrument_node="">
</span><li data-dcnode-id="7981"><span data-dcnode-id="7984" instrument_node="">
</span><div class="topbullet" data-dcnode-id="7982"><span data-dcnode-id="7983" instrument_node="">
          At least two acceptable DLCO measurements within 2 mL/min/mm Hg (0.67 mmol/min/kPa) of each other (2005 standard was 3 mL/min/mm Hg or 1 mmol/min/kPa)
         </span></div></li><span data-dcnode-id="7980" instrument_node="">
</span></ul><span data-dcnode-id="7978" instrument_node="">
</span><div class="inContentAd" data-dcnode-id="7977" id="ads-pos-a3_13" rel="71"></div><span data-dcnode-id="7976" instrument_node="">
</span><p data-dcnode-id="7974"><span data-dcnode-id="7975" instrument_node="">Quality grading for DLCO measurements is as follows:</span></p><span data-dcnode-id="7973" instrument_node="">
</span><span data-dcnode-id="7971" instrument_node="">
</span><ul data-dcnode-id="7934"><span data-dcnode-id="7970" instrument_node="">
</span><span data-dcnode-id="7968" instrument_node="">
</span><li data-dcnode-id="7964"><span data-dcnode-id="7967" instrument_node="">
</span><div class="topbullet" data-dcnode-id="7965"><span data-dcnode-id="7966" instrument_node="">
          Score of A: (1) VI/VC 90% or VI/VC greater than 85% and VA within 0.2 L or 5% of largest VA from another acceptable maneuver; (2) breath hold time of 8-12 seconds; and (3) sample collection less than 4 seconds
         </span></div></li><span data-dcnode-id="7963" instrument_node="">
</span><span data-dcnode-id="7961" instrument_node="">
</span><li data-dcnode-id="7957"><span data-dcnode-id="7960" instrument_node="">
</span><div class="topbullet" data-dcnode-id="7958"><span data-dcnode-id="7959" instrument_node="">
          Score of B: (1) VI/VC greater than 85%; (2) breath hold time of 8-12 seconds; and (3) sample collection less than 4 seconds
         </span></div></li><span data-dcnode-id="7956" instrument_node="">
</span><span data-dcnode-id="7954" instrument_node="">
</span><li data-dcnode-id="7950"><span data-dcnode-id="7953" instrument_node="">
</span><div class="topbullet" data-dcnode-id="7951"><span data-dcnode-id="7952" instrument_node="">
          Score of C: (1) VI/VC greater than 80%; (2) breath hold time of 8-12 seconds; and (3) sample collection less than 5 seconds
         </span></div></li><span data-dcnode-id="7949" instrument_node="">
</span><span data-dcnode-id="7947" instrument_node="">
</span><li data-dcnode-id="7943"><span data-dcnode-id="7946" instrument_node="">
</span><div class="topbullet" data-dcnode-id="7944"><span data-dcnode-id="7945" instrument_node="">
          Score of D: (1) VI/VC greater than 80%; (2) breath hold time of less than 8 seconds or greater than 12 seconds; and (3) sample collection less than 5 seconds
         </span></div></li><span data-dcnode-id="7942" instrument_node="">
</span><span data-dcnode-id="7940" instrument_node="">
</span><li data-dcnode-id="7936"><span data-dcnode-id="7939" instrument_node="">
</span><div class="topbullet" data-dcnode-id="7937"><span data-dcnode-id="7938" instrument_node="">
          Score of F: (1) VI/VC less than 80%; (2) breath hold time of less than 8 seconds or greater than 12 seconds; and (3) sample collection greater than 5 seconds
         </span></div></li><span data-dcnode-id="7935" instrument_node="">
</span></ul><span data-dcnode-id="7933" instrument_node="">
</span><div class="inContentAd" data-dcnode-id="7932" id="ads-pos-a3_14" rel="72"></div><span data-dcnode-id="7931" instrument_node="">
</span><p data-dcnode-id="7929"><span data-dcnode-id="7930" instrument_node="">Only grade A maneuvers meet all acceptability criteria. The average DLCO values from two or more grade A maneuvers that meet repeatability criterion should be reported. If only one grade A maneuver is obtained, the DLCO value from that maneuver should be reported. If no grade A maneuver is obtained, maneuvers of grades B to D might still have clinical utility, and the average of such maneuvers should be reported. However, these deviations from the acceptability criteria must be noted to caution the interpreter of the test. Maneuvers of grade F are not useable.</span></p><span data-dcnode-id="7928" instrument_node="">
</span><div class="inContentAd" data-dcnode-id="7927" id="ads-pos-a3_15" rel="73"></div><span data-dcnode-id="7926" instrument_node="">
</span><h3 data-dcnode-id="7924"><span data-dcnode-id="7925" instrument_node="">Results</span></h3><span data-dcnode-id="7923" instrument_node="">
</span><p data-dcnode-id="7913"><span data-dcnode-id="7922" instrument_node="">The 2017 ATS recommendations for a standardized pulmonary function report details recommendations for reporting of DLCO.</span><sup data-dcnode-id="7915"><span data-dcnode-id="7921" instrument_node="">
</span><span data-dcnode-id="7919" instrument_node=""> [</span><a data-dcnode-id="7917" href="javascript:void(0);" onclick="showToolTip(this,'references-layer','8')"><span data-dcnode-id="7918" instrument_node="">8</span></a><span data-dcnode-id="7916" instrument_node="">] </span></sup><span data-dcnode-id="7914" instrument_node="">A major change is the recommendation to express the measured DLCO on a z-score scale, which expresses the result as the number of multiples of a standard deviation above or below a population mean.</span></p><span data-dcnode-id="7912" instrument_node="">
</span><div class="inContentAd" data-dcnode-id="7911" id="ads-pos-a3_16" rel="74"></div><span data-dcnode-id="7910" instrument_node="">
</span><p data-dcnode-id="7908"><span data-dcnode-id="7909" instrument_node="">When hemoglobin is measured and available, it should be shown on the report with a note indicating whether the measured or predicted value has been adjusted for this.</span></p><span data-dcnode-id="7907" instrument_node="">
</span><div class="inContentAd" data-dcnode-id="7906" id="ads-pos-a3_17" rel="75"></div><span data-dcnode-id="7905" instrument_node="">
</span><h3 data-dcnode-id="7903"><span data-dcnode-id="7904" instrument_node="">Interpretation</span></h3><span data-dcnode-id="7902" instrument_node="">
</span><p data-dcnode-id="7900"><span data-dcnode-id="7901" instrument_node="">Because the DLCO is directly proportional to VA (VA is the lung volume after inhalation of the DLCO test gas, based on the size of the breath of test gas and the dilution of the inspired tracer gas). Nonpulmonary processes that reduce the lung volume at full inflation cause reductions in the DLCO. If VA can be assessed accurately, these reductions produce a normal or elevated KCO. Examples of this include lung resection, thoracic cage abnormalities (eg, kyphoscoliosis), and small lungs. DLCO is reduced in pulmonary emphysema. However, because of the poor distribution of the inspired test gas, the VA may grossly underestimate the TLC, and the resultant KCO may be normal. A reduced DLCO and a reduced KCO suggest a true interstitial disease such as pulmonary fibrosis or pulmonary vascular disease. It has demonstrated that in healthy patients, the KCO is increased to above normal levels when the DLCO test is performed at volumes less than the TLC.</span></p><span data-dcnode-id="7899" instrument_node="">
</span><div class="inContentAd" data-dcnode-id="7898" id="ads-pos-a3_18" rel="76"></div><span data-dcnode-id="7897" instrument_node="">
</span><p data-dcnode-id="7879"><span data-dcnode-id="7896" instrument_node="">The pattern of a low DLCO and a normal KCO may not be sufficient to rule out the presence of parenchymal disease. The works of Johnson</span><sup data-dcnode-id="7889"><span data-dcnode-id="7895" instrument_node="">
</span><span data-dcnode-id="7893" instrument_node=""> [</span><a data-dcnode-id="7891" href="javascript:void(0);" onclick="showToolTip(this,'references-layer','9')"><span data-dcnode-id="7892" instrument_node="">9</span></a><span data-dcnode-id="7890" instrument_node="">] </span></sup><span data-dcnode-id="7888" instrument_node="">and Chinn et al</span><sup data-dcnode-id="7881"><span data-dcnode-id="7887" instrument_node="">
</span><span data-dcnode-id="7885" instrument_node=""> [</span><a data-dcnode-id="7883" href="javascript:void(0);" onclick="showToolTip(this,'references-layer','10')"><span data-dcnode-id="7884" instrument_node="">10</span></a><span data-dcnode-id="7882" instrument_node="">] </span></sup><span data-dcnode-id="7880" instrument_node="">advocate the volume correction of the predicted value for DLCO by using the measured VA to "correct" the predicted DLCO for low or high lung volumes. Further work is warranted, but studies demonstrating the nonlinearity of the relationship between lung volume and DLCO are sufficiently convincing that the practice of interpreting a low DLCO and a normal KCO (previously known as DLCO/VA) as ”normal” is discouraged. The degree of severity of reduction in the diffusing capacity can be assigned according to the following scheme: less than the predicted lower limit of normal but greater than 60% of predicted is mild, between 40% and 60% of predicted is moderate, and less than 40% is severe.</span></p><span data-dcnode-id="7878" instrument_node="">
</span><div class="inContentAd" data-dcnode-id="7877" id="ads-pos-a3_19" rel="77"></div><span data-dcnode-id="7876" instrument_node="">
</span><p data-dcnode-id="7874"><span data-dcnode-id="7875" instrument_node="">Nonperfusion of ventilated alveoli, such as in pulmonary vascular disease, produces reduction of both the DLCO and the KCO. Anemia produces a virtual reduction in pulmonary capillary blood volume that causes a reduction in DLCO that can be adjusted mathematically for the reduced hemoglobin. The DLCO may be reduced temporarily in a variety of disorders such as pneumonia, interstitial infiltrative disorders, and alveolar proteinosis. The importance of obtaining an inspiratory vital capacity (IVC) greater than 90% of the best measured VC from the day of the test cannot be overemphasized. Inability to achieve an IVC of greater than or equal to 90% of the largest VC measured that day must be noted on the report.</span></p><span data-dcnode-id="7873" instrument_node="">
</span><div class="inContentAd" data-dcnode-id="7872" id="ads-pos-a3_20" rel="78"></div><span data-dcnode-id="7871" instrument_node="">
</span></div><span data-dcnode-id="7869" instrument_node="">
</span><div class="emed-logo" data-dcnode-id="7865"><span data-dcnode-id="7868" instrument_node="">
</span><img alt="eMedicine Logo" data-dcnode-id="7867" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//img.medscapestatic.com/pi/global/logos/emed/logo-emedicine77x17.svg&amp;raw"><span data-dcnode-id="7866" instrument_node="">
</span></div><span data-dcnode-id="7864" instrument_node="">
</span><div class="back_next_btn active" data-dcnode-id="7851"><span data-dcnode-id="7863" instrument_node="">
</span><div class="back_btn" data-dcnode-id="7861"><span data-dcnode-id="7862" instrument_node="">

       </span></div><span data-dcnode-id="7860" instrument_node="">
</span><div class="next_btn" data-dcnode-id="7855"><a data-dcnode-id="7856" href="#a2" onclick="AdPageRefresh('https://emedicine.medscape.com/article/303239-overview#a2', '1', 'cr-sn_next', '#a2');"><span data-dcnode-id="7859" instrument_node="">Next: </span><span data-dcnode-id="7857"><span data-dcnode-id="7858" instrument_node="">Lung Volume Determination </span></span></a></div><span data-dcnode-id="7854" instrument_node="">
</span><div class="spacer" data-dcnode-id="7853"></div><span data-dcnode-id="7852" instrument_node="">

</span><h2 data-dcnode-id="7843"><span data-dcnode-id="7844" instrument_node="">Assessment of Respiratory Muscle Strength</span></h2><span data-dcnode-id="7842" instrument_node="">
</span><div class="refsection_content" data-dcnode-id="7719"><span data-dcnode-id="7841" instrument_node="">
</span><span data-dcnode-id="7839" instrument_node="">
</span><h3 data-dcnode-id="7837"><span data-dcnode-id="7838" instrument_node="">Synonyms</span></h3><span data-dcnode-id="7836" instrument_node="">
</span><p data-dcnode-id="7834"><span data-dcnode-id="7835" instrument_node="">Maximum inspiratory pressures (MIP), maximum expiratory pressures (MEP), negative inspiratory force (NIF), respiratory pressures, maximum respiratory pressures</span></p><span data-dcnode-id="7833" instrument_node="">
</span><div class="inContentAd" data-dcnode-id="7832" id="ads-pos-a4_1" rel="79"></div><span data-dcnode-id="7831" instrument_node="">
</span><h3 data-dcnode-id="7829"><span data-dcnode-id="7830" instrument_node="">Indications</span></h3><span data-dcnode-id="7828" instrument_node="">
</span><p data-dcnode-id="7819"><span data-dcnode-id="7827" instrument_node="">Assessing respiratory muscle strength allows for assessment ventilatory failure, restrictive lung disease, and respiratory muscle strength.</span><sup data-dcnode-id="7820"><span data-dcnode-id="7826" instrument_node="">
</span><span data-dcnode-id="7824" instrument_node=""> [</span><a data-dcnode-id="7822" href="javascript:void(0);" onclick="showToolTip(this,'references-layer','11')"><span data-dcnode-id="7823" instrument_node="">11</span></a><span data-dcnode-id="7821" instrument_node="">] </span></sup></p><span data-dcnode-id="7818" instrument_node="">
</span><div class="inContentAd" data-dcnode-id="7817" id="ads-pos-a4_2" rel="80"></div><span data-dcnode-id="7816" instrument_node="">
</span><h3 data-dcnode-id="7814"><span data-dcnode-id="7815" instrument_node="">Contraindications</span></h3><span data-dcnode-id="7813" instrument_node="">
</span><p data-dcnode-id="7811"><span data-dcnode-id="7812" instrument_node="">No contraindications exist.</span></p><span data-dcnode-id="7810" instrument_node="">
</span><div class="inContentAd" data-dcnode-id="7809" id="ads-pos-a4_3" rel="81"></div><span data-dcnode-id="7808" instrument_node="">
</span><h3 data-dcnode-id="7806"><span data-dcnode-id="7807" instrument_node="">Patient care/preparations</span></h3><span data-dcnode-id="7805" instrument_node="">
</span><p data-dcnode-id="7803"><span data-dcnode-id="7804" instrument_node="">Patients must be able to follow directions.</span></p><span data-dcnode-id="7802" instrument_node="">
</span><div class="inContentAd" data-dcnode-id="7801" id="ads-pos-a4_4" rel="82"></div><span data-dcnode-id="7800" instrument_node="">
</span><h3 data-dcnode-id="7798"><span data-dcnode-id="7799" instrument_node="">Test</span></h3><span data-dcnode-id="7797" instrument_node="">
</span><p data-dcnode-id="7795"><span data-dcnode-id="7796" instrument_node="">Determinations of respiratory muscle pressures are a quick and noninvasive means of assessing respiratory muscle strength.</span></p><span data-dcnode-id="7794" instrument_node="">
</span><div class="inContentAd" data-dcnode-id="7793" id="ads-pos-a4_5" rel="83"></div><span data-dcnode-id="7792" instrument_node="">
</span><p data-dcnode-id="7790"><span data-dcnode-id="7791" instrument_node="">For determining MIP, patients breathe through a flanged mouthpiece with nose clips in place. They are instructed to exhale to RV. At RV, a valve or shutter is closed, and the patient is coached to inhale as forcefully as possible. Maximum pull should be maintained for 1-2 seconds. A standardized leak must be present in the measurement system to eliminate significant overstatement of MIP by allowing the cheek muscles to contribute to the measured pressures. Initial maximum negative pressures that cannot be maintained for one full second are ignored.</span></p><span data-dcnode-id="7789" instrument_node="">
</span><div class="inContentAd" data-dcnode-id="7788" id="ads-pos-a4_6" rel="84"></div><span data-dcnode-id="7787" instrument_node="">
</span><p data-dcnode-id="7785"><span data-dcnode-id="7786" instrument_node="">MEP: Patients breathe through a flanged mouthpiece with nose clips in place. Patients are instructed to inhale to TLC. At TLC, a valve or shutter is closed and the patient is coached to exhale as forcefully as possible. Maximum push should be maintained for 1-2 seconds. Initial maximum positive pressures that cannot be maintained for a full 1 second are ignored.</span></p><span data-dcnode-id="7784" instrument_node="">
</span><div class="inContentAd" data-dcnode-id="7783" id="ads-pos-a4_7" rel="85"></div><span data-dcnode-id="7782" instrument_node="">
</span><p data-dcnode-id="7772"><span data-dcnode-id="7781" instrument_node="">The measurement of sniff nasal-inspiratory force (SNIF) shows promising utility in predicting mortality in patients with amyotrophic lateral sclerosis (ALS).</span><sup data-dcnode-id="7774"><span data-dcnode-id="7780" instrument_node="">
</span><span data-dcnode-id="7778" instrument_node=""> [</span><a data-dcnode-id="7776" href="javascript:void(0);" onclick="showToolTip(this,'references-layer','12')"><span data-dcnode-id="7777" instrument_node="">12</span></a><span data-dcnode-id="7775" instrument_node="">] </span></sup><span data-dcnode-id="7773" instrument_node="">A standardized device is not commercially available. A polyethylene catheter ending in a plug is attached to a pressure transducer, and the plug end is inserted into a nostril. The contralateral nostril is occluded, and the patient is instructed to exhale to FRC, then close the mouth and take a deep sniff or a maximal inspiratory effort. Both nostrils are tested, and the highest of six recorded pressures sustained for at least 1 second is reported.</span></p><span data-dcnode-id="7771" instrument_node="">
</span><div class="inContentAd" data-dcnode-id="7770" id="ads-pos-a4_8" rel="86"></div><span data-dcnode-id="7769" instrument_node="">
</span><h3 data-dcnode-id="7767"><span data-dcnode-id="7768" instrument_node="">Results</span></h3><span data-dcnode-id="7766" instrument_node="">
</span><p data-dcnode-id="7764"><span data-dcnode-id="7765" instrument_node="">Maximal inspiratory mouth pressure (PImax), maximal expiratory mouth pressure (PEmax), and SNIF are reported in centimeters of water pressure.</span></p><span data-dcnode-id="7763" instrument_node="">
</span><div class="inContentAd" data-dcnode-id="7762" id="ads-pos-a4_9" rel="87"></div><span data-dcnode-id="7761" instrument_node="">
</span><p data-dcnode-id="7751"><strong data-dcnode-id="7759"><span data-dcnode-id="7760" instrument_node="">Interpretation&nbsp;</span></strong><sup data-dcnode-id="7752"><span data-dcnode-id="7758" instrument_node="">
</span><span data-dcnode-id="7756" instrument_node=""> [</span><a data-dcnode-id="7754" href="javascript:void(0);" onclick="showToolTip(this,'references-layer','13')"><span data-dcnode-id="7755" instrument_node="">13</span></a><span data-dcnode-id="7753" instrument_node="">] </span></sup></p><span data-dcnode-id="7750" instrument_node="">
</span><div class="inContentAd" data-dcnode-id="7749" id="ads-pos-a4_10" rel="88"></div><span data-dcnode-id="7748" instrument_node="">
</span><p data-dcnode-id="7746"><span data-dcnode-id="7747" instrument_node="">As many as 10 efforts are needed before consistency (two measurements within 10% of the highest measured pressure) is achieved in some patients. When respiratory muscle fatigue or neuromuscular disease is present, fatigue may set in before consistency is achieved. Adequate rest between efforts is important.</span></p><span data-dcnode-id="7745" instrument_node="">
</span><div class="inContentAd" data-dcnode-id="7744" id="ads-pos-a4_11" rel="89"></div><span data-dcnode-id="7743" instrument_node="">
</span><p data-dcnode-id="7741"><span data-dcnode-id="7742" instrument_node="">The range of normal values is broad, suggesting wide variations in respiratory muscle strength among normal values. This makes interpretation of low values difficult. Initial values should be compared to the lower limit of normal values for the patient's age.</span></p><span data-dcnode-id="7740" instrument_node="">
</span><div class="inContentAd" data-dcnode-id="7739" id="ads-pos-a4_12" rel="90"></div><span data-dcnode-id="7738" instrument_node="">
</span><p data-dcnode-id="7736"><span data-dcnode-id="7737" instrument_node="">In general, a PImax more negative than -80 cm water pressure and a PEmax more positive than +80 cm water pressure excludes important weakness of the respiratory muscles. Patients with a PEmax less than 50 cm water pressure may have difficulty generating sufficient cough to clear respiratory secretions.</span></p><span data-dcnode-id="7735" instrument_node="">
</span><div class="inContentAd" data-dcnode-id="7734" id="ads-pos-a4_13" rel="91"></div><span data-dcnode-id="7733" instrument_node="">
</span><p data-dcnode-id="7731"><span data-dcnode-id="7732" instrument_node="">In patients with ALS, a SNIF pressure less than 40 cm water was associated with a hazard risk for death of 9.1 (confidence interval [CI], 4-20.8) and the median mortality was 6 ± 0.3 months (95% CI, 2.5-8.5 mo).</span></p><span data-dcnode-id="7730" instrument_node="">
</span><div class="inContentAd" data-dcnode-id="7729" id="ads-pos-a4_14" rel="92"></div><span data-dcnode-id="7728" instrument_node="">
</span><h3 data-dcnode-id="7726"><span data-dcnode-id="7727" instrument_node="">Technical considerations</span></h3><span data-dcnode-id="7725" instrument_node="">
</span><p data-dcnode-id="7723"><span data-dcnode-id="7724" instrument_node="">All tests are dependent on effort and technique. Good instruction, vigorous coaching, and adequate rest between efforts are essential. Maximum values should be reproducible within the greater of 10% or 5 cm water pressure. A controlled leak (1 mm diameter, 15 mm length) must be part of the system to prevent erroneously high MIP readings resulting from the use of cheek muscles. This leak is not needed for MEP or SNIF pressure measurements.</span></p><span data-dcnode-id="7722" instrument_node="">
</span><div class="inContentAd" data-dcnode-id="7721" id="ads-pos-a4_15" rel="93"></div><span data-dcnode-id="7720" instrument_node="">
</span></div><span data-dcnode-id="7718" instrument_node="">
</span><div class="emed-logo" data-dcnode-id="7714"><span data-dcnode-id="7717" instrument_node="">
</span><img alt="eMedicine Logo" data-dcnode-id="7716" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//img.medscapestatic.com/pi/global/logos/emed/logo-emedicine77x17.svg&amp;raw"><span data-dcnode-id="7715" instrument_node="">
</span></div><span data-dcnode-id="7713" instrument_node="">
</span><div class="back_next_btn active" data-dcnode-id="7700"><span data-dcnode-id="7712" instrument_node="">
</span><div class="back_btn" data-dcnode-id="7710"><span data-dcnode-id="7711" instrument_node="">
