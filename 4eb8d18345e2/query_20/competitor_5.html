</span><p data-dcnode-id="1578"><span data-dcnode-id="1579" instrument_node="">&nbsp;</span></p><span data-dcnode-id="1577" instrument_node="">
</span><h3 data-dcnode-id="1575"><span data-dcnode-id="1576" instrument_node="">How To Measure Respiration Rate</span></h3><span data-dcnode-id="1574" instrument_node="">
</span><p data-dcnode-id="1572"><span data-dcnode-id="1573" instrument_node="">Respiration rate is measured by counting your breaths for one minute at rest. The best way to measure respiration rate is for someone to count your breaths for you without telling you when they’re counting. If you’re observing your own breathing, you may try to breathe slower than usual, causing an inaccurate count.</span></p><span data-dcnode-id="1571" instrument_node="">
</span><ol data-dcnode-id="1563"><span data-dcnode-id="1570" instrument_node="">
</span><li data-dcnode-id="1568"><span data-dcnode-id="1569" instrument_node="">Make sure the person being tested is at rest and not focused on controlling their breathing</span></li><span data-dcnode-id="1567" instrument_node="">
</span><li data-dcnode-id="1565"><span data-dcnode-id="1566" instrument_node="">Count the number of times the person’s chest rises for one minute</span></li><span data-dcnode-id="1564" instrument_node="">
</span></ol><span data-dcnode-id="1562" instrument_node="">
</span><p data-dcnode-id="1560"><span data-dcnode-id="1561" instrument_node="">Answer the following questions to help your medical provider diagnose abnormal respiration rates.</span></p><span data-dcnode-id="1559" instrument_node="">
</span><ul data-dcnode-id="1548"><span data-dcnode-id="1558" instrument_node="">
</span><li data-dcnode-id="1556"><span data-dcnode-id="1557" instrument_node="">Are you having difficulty breathing at rest?&nbsp;</span></li><span data-dcnode-id="1555" instrument_node="">
</span><li data-dcnode-id="1553"><span data-dcnode-id="1554" instrument_node="">What is your depth of breathing?</span></li><span data-dcnode-id="1552" instrument_node="">
</span><li data-dcnode-id="1550"><span data-dcnode-id="1551" instrument_node="">What is your breathing pattern?</span></li><span data-dcnode-id="1549" instrument_node="">
</span></ul><span data-dcnode-id="1547" instrument_node="">
</span><p data-dcnode-id="1543"><span data-dcnode-id="1544" style="color: #008000;"><strong data-dcnode-id="1545"><span data-dcnode-id="1546" instrument_node="">&nbsp;</span></strong></span></p><span data-dcnode-id="1542" instrument_node="">
</span><h3 data-dcnode-id="1540"><span data-dcnode-id="1541" instrument_node="">What Is A High Respiration Rate?</span></h3><span data-dcnode-id="1539" instrument_node="">
</span><p data-dcnode-id="1531"><span data-dcnode-id="1538" instrument_node="">Respiration rates higher than normal are called tachypnea. A rate of 20 breaths per minute is considered higher than normal. A rate above 24 breaths per minute, unless related to a psychological condition such as a panic attack, generally indicates a serious health problem </span><strong data-dcnode-id="1533"><span data-dcnode-id="1537" instrument_node="">(</span><a data-dcnode-id="1535" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.verywellhealth.com/what-is-a-normal-respiratory-rate-2248932%23citation-11" rel="noopener" target="_blank"><span data-dcnode-id="1536" instrument_node="">16</span></a><span data-dcnode-id="1534" instrument_node="">)</span></strong><span data-dcnode-id="1532" instrument_node="">.</span></p><span data-dcnode-id="1530" instrument_node="">
</span><p data-dcnode-id="1528"><span data-dcnode-id="1529" instrument_node="">&nbsp;</span></p><span data-dcnode-id="1527" instrument_node="">
</span><h3 data-dcnode-id="1525"><span data-dcnode-id="1526" instrument_node="">What Causes A High Respiration Rate?</span></h3><span data-dcnode-id="1524" instrument_node="">
</span><p data-dcnode-id="1522"><span data-dcnode-id="1523" instrument_node="">Many variables can affect respiration rate, regardless of whether they’re related to the lungs or not. An increased respiration rate in adults could be caused by physiological conditions such as exercise, emotions, or pregnancy.</span></p><span data-dcnode-id="1521" instrument_node="">
</span><p data-dcnode-id="1519"><span data-dcnode-id="1520" instrument_node="">Underlying conditions that cause tachypnea include:</span></p><span data-dcnode-id="1518" instrument_node="">
</span><ul data-dcnode-id="1471"><span data-dcnode-id="1517" instrument_node="">
</span><li data-dcnode-id="1515"><span data-dcnode-id="1516" instrument_node="">Anxiety</span></li><span data-dcnode-id="1514" instrument_node="">
</span><li data-dcnode-id="1512"><span data-dcnode-id="1513" instrument_node="">Asthma</span></li><span data-dcnode-id="1511" instrument_node="">
</span><li data-dcnode-id="1509"><span data-dcnode-id="1510" instrument_node="">Carbon monoxide poisoning</span></li><span data-dcnode-id="1508" instrument_node="">
</span><li data-dcnode-id="1506"><span data-dcnode-id="1507" instrument_node="">Chronic Obstructive Pulmonary Disease (COPD)</span></li><span data-dcnode-id="1505" instrument_node="">
</span><li data-dcnode-id="1503"><span data-dcnode-id="1504" instrument_node="">Dehydration</span></li><span data-dcnode-id="1502" instrument_node="">
</span><li data-dcnode-id="1500"><span data-dcnode-id="1501" instrument_node="">Diabetic ketoacidosis&nbsp;</span></li><span data-dcnode-id="1499" instrument_node="">
</span><li data-dcnode-id="1497"><span data-dcnode-id="1498" instrument_node="">Exercise (temporarily)</span></li><span data-dcnode-id="1496" instrument_node="">
</span><li data-dcnode-id="1494"><span data-dcnode-id="1495" instrument_node="">Experiencing pain</span></li><span data-dcnode-id="1493" instrument_node="">
</span><li data-dcnode-id="1491"><span data-dcnode-id="1492" instrument_node="">Fever</span></li><span data-dcnode-id="1490" instrument_node="">
</span><li data-dcnode-id="1488"><span data-dcnode-id="1489" instrument_node="">Heart problems</span></li><span data-dcnode-id="1487" instrument_node="">
</span><li data-dcnode-id="1485"><span data-dcnode-id="1486" instrument_node="">Infections</span></li><span data-dcnode-id="1484" instrument_node="">
</span><li data-dcnode-id="1482"><span data-dcnode-id="1483" instrument_node="">Lung issues</span></li><span data-dcnode-id="1481" instrument_node="">
</span><li data-dcnode-id="1479"><span data-dcnode-id="1480" instrument_node="">Narcotics or drug overdose</span></li><span data-dcnode-id="1478" instrument_node="">
</span><li data-dcnode-id="1476"><span data-dcnode-id="1477" instrument_node="">Pneumonia</span></li><span data-dcnode-id="1475" instrument_node="">
</span><li data-dcnode-id="1473"><span data-dcnode-id="1474" instrument_node="">Sepsis</span></li><span data-dcnode-id="1472" instrument_node="">
</span></ul><span data-dcnode-id="1470" instrument_node="">
</span><p data-dcnode-id="1468"><span data-dcnode-id="1469" instrument_node="">&nbsp;</span></p><span data-dcnode-id="1467" instrument_node="">
</span><h3 data-dcnode-id="1465"><span data-dcnode-id="1466" instrument_node="">What Is A Low Respiration Rate?</span></h3><span data-dcnode-id="1464" instrument_node="">
</span><p data-dcnode-id="1462"><span data-dcnode-id="1463" instrument_node="">A respiration rate that’s lower than normal is called bradypnea. A rate of 12 breaths per minute is considered abnormal for adults.</span></p><span data-dcnode-id="1461" instrument_node="">
</span><p data-dcnode-id="1459"><span data-dcnode-id="1460" instrument_node="">Bradypnea can be due to any respiratory condition that causes respiratory failure or because of the following:</span></p><span data-dcnode-id="1458" instrument_node="">
</span><ul data-dcnode-id="1432"><span data-dcnode-id="1457" instrument_node="">
</span><li data-dcnode-id="1455"><span data-dcnode-id="1456" instrument_node="">Airway obstructions</span></li><span data-dcnode-id="1454" instrument_node="">
</span><li data-dcnode-id="1452"><span data-dcnode-id="1453" instrument_node="">Alcohol</span></li><span data-dcnode-id="1451" instrument_node="">
</span><li data-dcnode-id="1449"><span data-dcnode-id="1450" instrument_node="">Benzodiazepines</span></li><span data-dcnode-id="1448" instrument_node="">
</span><li data-dcnode-id="1446"><span data-dcnode-id="1447" instrument_node="">Hypothyroidism</span></li><span data-dcnode-id="1445" instrument_node="">
</span><li data-dcnode-id="1443"><span data-dcnode-id="1444" instrument_node="">Metabolic derangements</span></li><span data-dcnode-id="1442" instrument_node="">
</span><li data-dcnode-id="1440"><span data-dcnode-id="1441" instrument_node="">Narcotics/drug overdose</span></li><span data-dcnode-id="1439" instrument_node="">
</span><li data-dcnode-id="1437"><span data-dcnode-id="1438" instrument_node="">Sleep apnea</span></li><span data-dcnode-id="1436" instrument_node="">
</span><li data-dcnode-id="1434"><span data-dcnode-id="1435" instrument_node="">Stroke or head injury</span></li><span data-dcnode-id="1433" instrument_node="">
</span></ul><span data-dcnode-id="1431" instrument_node="">
</span><p data-dcnode-id="1429"><span data-dcnode-id="1430" instrument_node="">&nbsp;</span></p><span data-dcnode-id="1428" instrument_node="">
</span><h4 data-dcnode-id="1426"><span data-dcnode-id="1427" instrument_node="">Breathing Depth: Hyperpnea Vs. Hyperventilation</span></h4><span data-dcnode-id="1425" instrument_node="">
</span><p data-dcnode-id="1423"><span data-dcnode-id="1424" instrument_node="">The depth of breathing is also an important indicator. Abnormally deep or shallow breathing could be a sign of a serious condition.</span></p><span data-dcnode-id="1422" instrument_node="">
</span><p data-dcnode-id="1408"><strong data-dcnode-id="1420"><span data-dcnode-id="1421" instrument_node="">Hyperpnea</span></strong><span data-dcnode-id="1419" instrument_node=""> is an increased depth of breathing regardless of respiration rate </span><strong data-dcnode-id="1414"><span data-dcnode-id="1418" instrument_node="">(</span><a data-dcnode-id="1416" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//medical-dictionary.thefreedictionary.com/hyperpnea" rel="noopener" target="_blank"><span data-dcnode-id="1417" instrument_node="">17</span></a><span data-dcnode-id="1415" instrument_node="">)</span></strong><span data-dcnode-id="1413" instrument_node="">, Hyperpnea is mostly seen in the following (</span><strong data-dcnode-id="1410"><a data-dcnode-id="1411" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.healthline.com/health/what-is-hyperpnea%23causes" rel="noopener" target="_blank"><span data-dcnode-id="1412" instrument_node="">18</span></a></strong><span data-dcnode-id="1409" instrument_node="">):</span></p><span data-dcnode-id="1407" instrument_node="">
</span><ul data-dcnode-id="1378"><span data-dcnode-id="1406" instrument_node="">
</span><li data-dcnode-id="1404"><span data-dcnode-id="1405" instrument_node="">Anemia</span></li><span data-dcnode-id="1403" instrument_node="">
</span><li data-dcnode-id="1401"><span data-dcnode-id="1402" instrument_node="">Asthma&nbsp;</span></li><span data-dcnode-id="1400" instrument_node="">
</span><li data-dcnode-id="1398"><span data-dcnode-id="1399" instrument_node="">Congestive heart failure</span></li><span data-dcnode-id="1397" instrument_node="">
</span><li data-dcnode-id="1395"><span data-dcnode-id="1396" instrument_node="">COPD</span></li><span data-dcnode-id="1394" instrument_node="">
</span><li data-dcnode-id="1392"><span data-dcnode-id="1393" instrument_node="">Exercise</span></li><span data-dcnode-id="1391" instrument_node="">
</span><li data-dcnode-id="1389"><span data-dcnode-id="1390" instrument_node="">High altitude</span></li><span data-dcnode-id="1388" instrument_node="">
</span><li data-dcnode-id="1386"><span data-dcnode-id="1387" instrument_node="">Lung infections</span></li><span data-dcnode-id="1385" instrument_node="">
</span><li data-dcnode-id="1383"><span data-dcnode-id="1384" instrument_node="">Metabolic acidosis</span></li><span data-dcnode-id="1382" instrument_node="">
</span><li data-dcnode-id="1380"><span data-dcnode-id="1381" instrument_node="">Panic attacks</span></li><span data-dcnode-id="1379" instrument_node="">
</span></ul><span data-dcnode-id="1377" instrument_node="">
</span><p data-dcnode-id="1374"><span data-dcnode-id="1375" style="color: #008000;"><span data-dcnode-id="1376" instrument_node="">&nbsp;</span></span></p><span data-dcnode-id="1373" instrument_node="">
</span><p data-dcnode-id="1365"><strong data-dcnode-id="1371"><span data-dcnode-id="1372" instrument_node="">Hyperventilation</span></strong><span data-dcnode-id="1370" instrument_node=""> means both an increased rate and depth of breathing (</span><strong data-dcnode-id="1367"><a data-dcnode-id="1368" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.hopkinsmedicine.org/health/conditions-and-diseases/hyperventilation" rel="noopener" target="_blank"><span data-dcnode-id="1369" instrument_node="">19</span></a></strong><span data-dcnode-id="1366" instrument_node="">). Hyperventilation can be caused by:</span></p><span data-dcnode-id="1364" instrument_node="">
</span><ul data-dcnode-id="1350"><span data-dcnode-id="1363" instrument_node="">
</span><li data-dcnode-id="1361"><span data-dcnode-id="1362" instrument_node="">Anxiety</span></li><span data-dcnode-id="1360" instrument_node="">
</span><li data-dcnode-id="1358"><span data-dcnode-id="1359" instrument_node="">Diabetic ketoacidosis&nbsp;</span></li><span data-dcnode-id="1357" instrument_node="">
</span><li data-dcnode-id="1355"><span data-dcnode-id="1356" instrument_node="">Exercise</span></li><span data-dcnode-id="1354" instrument_node="">
</span><li data-dcnode-id="1352"><span data-dcnode-id="1353" instrument_node="">Lactic acidosis</span></li><span data-dcnode-id="1351" instrument_node="">
</span></ul><span data-dcnode-id="1349" instrument_node="">
</span><p data-dcnode-id="1347"><span data-dcnode-id="1348" instrument_node="">You breathe in oxygen and exhale carbon dioxide. Rapid breathing lowers carbon dioxide in the blood causing the following symptoms:</span></p><span data-dcnode-id="1346" instrument_node="">
</span><ul data-dcnode-id="1323"><span data-dcnode-id="1345" instrument_node="">
</span><li data-dcnode-id="1343"><span data-dcnode-id="1344" instrument_node="">Dizziness or lightheadedness</span></li><span data-dcnode-id="1342" instrument_node="">
</span><li data-dcnode-id="1340"><span data-dcnode-id="1341" instrument_node="">Chest pain&nbsp;</span></li><span data-dcnode-id="1339" instrument_node="">
</span><li data-dcnode-id="1337"><span data-dcnode-id="1338" instrument_node="">Confusion</span></li><span data-dcnode-id="1336" instrument_node="">
</span><li data-dcnode-id="1334"><span data-dcnode-id="1335" instrument_node="">Heart palpitations</span></li><span data-dcnode-id="1333" instrument_node="">
</span><li data-dcnode-id="1331"><span data-dcnode-id="1332" instrument_node="">Muscle spasms in hands and feet</span></li><span data-dcnode-id="1330" instrument_node="">
</span><li data-dcnode-id="1328"><span data-dcnode-id="1329" instrument_node="">Shortness of breath</span></li><span data-dcnode-id="1327" instrument_node="">
</span><li data-dcnode-id="1325"><span data-dcnode-id="1326" instrument_node="">Weakness</span></li><span data-dcnode-id="1324" instrument_node="">
</span></ul><span data-dcnode-id="1322" instrument_node="">
</span><p data-dcnode-id="1320"><span data-dcnode-id="1321" instrument_node="">&nbsp;</span></p><span data-dcnode-id="1319" instrument_node="">
</span><h2 data-dcnode-id="1317"><span data-dcnode-id="1318" instrument_node="">4. What Is Blood Pressure?</span></h2><span data-dcnode-id="1316" instrument_node="">
</span><p data-dcnode-id="1308"><span data-dcnode-id="1315" instrument_node="">Blood pressure is the force of blood pushing against your blood vessel walls during the contraction and relaxation of your heart </span><b data-dcnode-id="1310"><span data-dcnode-id="1314" instrument_node="">(</span><a data-dcnode-id="1312" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.heart.org/en/health-topics/high-blood-pressure/the-facts-about-high-blood-pressure/what-is-high-blood-pressure" rel="noopener" target="_blank"><span data-dcnode-id="1313" instrument_node="">20</span></a><span data-dcnode-id="1311" instrument_node="">).&nbsp;</span></b><span data-dcnode-id="1309" instrument_node="">A heartbeat means that the heart is squeezing blood out of the heart into the arteries. Blood pressure is highest when the heart contracts, and lowest when it relaxes.&nbsp;</span></p><span data-dcnode-id="1307" instrument_node="">
</span><p data-dcnode-id="1305"><span data-dcnode-id="1306" instrument_node="">Blood pressure is recorded as two numbers. The higher number (on the top) is the systolic pressure. Systolic pressure represents the pressure in the arteries when the heart contracts and pumps blood through your body. The lower number (on the bottom) is called diastolic pressure. Diastolic pressure is the pressure on the arteries when your heart rests and fills with blood.</span></p><span data-dcnode-id="1304" instrument_node="">
</span><p data-dcnode-id="1302"><span data-dcnode-id="1303" instrument_node="">Both systolic and diastolic blood pressures are recorded as “mm Hg” (millimeters of mercury).&nbsp;</span></p><span data-dcnode-id="1301" instrument_node="">
</span><p data-dcnode-id="1299"><span data-dcnode-id="1300" instrument_node="">&nbsp;</span></p><span data-dcnode-id="1298" instrument_node="">
</span><h3 data-dcnode-id="1296"><span data-dcnode-id="1297" instrument_node="">Blood Pressure Ranges</span></h3><span data-dcnode-id="1295" instrument_node="">
</span><p data-dcnode-id="1293"><span data-dcnode-id="1294" instrument_node="">There’s no normal blood pressure, but there’s a normal range. Blood pressure is categorized in the following stages:&nbsp;</span></p><span data-dcnode-id="1292" instrument_node="">
</span><ul data-dcnode-id="1265"><span data-dcnode-id="1291" instrument_node="">
</span><li data-dcnode-id="1287"><strong data-dcnode-id="1289"><span data-dcnode-id="1290" instrument_node="">Normal blood pressure: </span></strong><span data-dcnode-id="1288" instrument_node="">systolic pressure under 120 and diastolic under 80 (120/80)</span></li><span data-dcnode-id="1286" instrument_node="">
</span><li data-dcnode-id="1282"><strong data-dcnode-id="1284"><span data-dcnode-id="1285" instrument_node="">Elevated blood pressure: </span></strong><span data-dcnode-id="1283" instrument_node="">systolic pressure between 120 and 129 and diastolic under 80</span></li><span data-dcnode-id="1281" instrument_node="">
</span><li data-dcnode-id="1277"><strong data-dcnode-id="1279"><span data-dcnode-id="1280" instrument_node="">Stage 1 high blood pressure: </span></strong><span data-dcnode-id="1278" instrument_node="">systolic pressure between 130 and 139 and diastolic between 80 and 89</span></li><span data-dcnode-id="1276" instrument_node="">
</span><li data-dcnode-id="1272"><strong data-dcnode-id="1274"><span data-dcnode-id="1275" instrument_node="">Stage 2 high blood pressure: </span></strong><span data-dcnode-id="1273" instrument_node="">systolic pressure of 140 or higher and diastolic 90 or higher</span></li><span data-dcnode-id="1271" instrument_node="">
</span><li data-dcnode-id="1267"><strong data-dcnode-id="1269"><span data-dcnode-id="1270" instrument_node="">Hypertensive crisis:</span></strong><span data-dcnode-id="1268" instrument_node=""> a blood pressure reading that exceeds180/120 mmHg and remains high when measured again five minutes later. A hypertensive crisis requires immediate medical attention.</span></li><span data-dcnode-id="1266" instrument_node="">
</span></ul><span data-dcnode-id="1264" instrument_node="">
</span><p data-dcnode-id="1262"><span data-dcnode-id="1263" instrument_node="">What is normal varies, talk with your health provider about your normal blood pressure. But generally, your risk of disease increases with your blood pressure reading.&nbsp;</span></p><span data-dcnode-id="1261" instrument_node="">
</span><p data-dcnode-id="1259"><span data-dcnode-id="1260" instrument_node="">&nbsp;</span></p><span data-dcnode-id="1258" instrument_node="">
</span><h3 data-dcnode-id="1256"><span data-dcnode-id="1257" instrument_node="">How To Get The Most Accurate Blood Pressure Reading</span></h3><span data-dcnode-id="1255" instrument_node="">
</span><p data-dcnode-id="1253"><span data-dcnode-id="1254" instrument_node="">The American Heart Association recommends the following guidelines for monitoring blood pressure. Failing to follow these guidelines could lead to inaccurate results.</span></p><span data-dcnode-id="1252" instrument_node="">
</span><ul data-dcnode-id="1186"><span data-dcnode-id="1251" instrument_node="">
</span><li data-dcnode-id="1245"><span data-dcnode-id="1250" instrument_node="">Go to the bathroom before taking your blood pressure. Having a full bladder can add 10-15 mmHg to blood pressure readings (</span><strong data-dcnode-id="1247"><a data-dcnode-id="1248" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.health.nd.gov/sites/www/files/documents/Files/HSC/HP/OralHealth/Documents/Blood%2520Pressure%2520Guidelines.pdf" rel="noopener" target="_blank"><span data-dcnode-id="1249" instrument_node="">21</span></a></strong><span data-dcnode-id="1246" instrument_node="">).</span></li><span data-dcnode-id="1244" instrument_node="">
</span><li data-dcnode-id="1242"><span data-dcnode-id="1243" instrument_node="">Don’t smoke or use any nicotine products for at least 30 minutes before checking your blood pressure. And don’t consume caffeine at least an hour before.</span></li><span data-dcnode-id="1241" instrument_node="">
</span><li data-dcnode-id="1239"><span data-dcnode-id="1240" instrument_node="">Sit and relax for at least five minutes.</span></li><span data-dcnode-id="1238" instrument_node="">
</span><li data-dcnode-id="1232"><span data-dcnode-id="1237" instrument_node="">Sit with your back and feet supported, keep your feet on the ground, and keep your legs uncrossed.&nbsp; Having an unsupported back and feet can add 6 mmHg to the pressure readings, and crossed legs can add 2 to 4 mmHg (</span><strong data-dcnode-id="1234"><a data-dcnode-id="1235" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.health.nd.gov/sites/www/files/documents/Files/HSC/HP/OralHealth/Documents/Blood%2520Pressure%2520Guidelines.pdf" rel="noopener" target="_blank"><span data-dcnode-id="1236" instrument_node="">21</span></a></strong><span data-dcnode-id="1233" instrument_node="">)</span></li><span data-dcnode-id="1231" instrument_node="">
</span><li data-dcnode-id="1225"><span data-dcnode-id="1230" instrument_node="">Don’t talk during the test as talking or active listening can add 10 mmHg to blood pressure readings (</span><strong data-dcnode-id="1227"><a data-dcnode-id="1228" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.health.nd.gov/sites/www/files/documents/Files/HSC/HP/OralHealth/Documents/Blood%2520Pressure%2520Guidelines.pdf" rel="noopener" target="_blank"><span data-dcnode-id="1229" instrument_node="">21</span></a></strong><span data-dcnode-id="1226" instrument_node="">).</span></li><span data-dcnode-id="1224" instrument_node="">
</span><li data-dcnode-id="1218"><span data-dcnode-id="1223" instrument_node="">Keep your arm relaxed and supported at heart level on a solid flat surface. Having an unsupported arm can add 10 mmHg to blood pressure readings (</span><strong data-dcnode-id="1220"><a data-dcnode-id="1221" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.health.nd.gov/sites/www/files/documents/Files/HSC/HP/OralHealth/Documents/Blood%2520Pressure%2520Guidelines.pdf" rel="noopener" target="_blank"><span data-dcnode-id="1222" instrument_node="">21</span></a></strong><span data-dcnode-id="1219" instrument_node="">)</span></li><span data-dcnode-id="1217" instrument_node="">
</span><li data-dcnode-id="1206"><span data-dcnode-id="1216" instrument_node="">Place the blood pressure cuff an inch above the elbow. Make sure the cuff fits your arm. A cuff that’s too loose gives a falsely lower blood pressure. And a cuff that’s too tight gives a reading that’s falsely higher </span><a aria-expanded="false" aria-haspopup="true" data-bk-pop-href="#article-41801.r11" data-dcnode-id="1211" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.ncbi.nlm.nih.gov/books/NBK553213/" role="button"><span data-dcnode-id="1215" instrument_node="">(</span><strong data-dcnode-id="1213"><span data-dcnode-id="1214" instrument_node="">22</span></strong><span data-dcnode-id="1212" instrument_node="">).</span></a><span data-dcnode-id="1207" style="color: #0000ff;"><strong data-dcnode-id="1208"><br data-dcnode-id="1210"><span data-dcnode-id="1209" instrument_node="">
</span></strong></span></li><span data-dcnode-id="1205" instrument_node="">
</span><li data-dcnode-id="1203"><span data-dcnode-id="1204" instrument_node="">Measure your blood pressure at the same time every day, or when your health care provider recommends.</span></li><span data-dcnode-id="1202" instrument_node="">
</span><li data-dcnode-id="1200"><span data-dcnode-id="1201" instrument_node="">Take two to three measurements one minute apart and record each reading.</span></li><span data-dcnode-id="1199" instrument_node="">
</span><li data-dcnode-id="1197"><span data-dcnode-id="1198" instrument_node="">Record the date, time, and blood pressure reading.</span></li><span data-dcnode-id="1196" instrument_node="">
</span><li data-dcnode-id="1194"><span data-dcnode-id="1195" instrument_node="">Take your blood pressure record to your next medical appointment.&nbsp;</span></li><span data-dcnode-id="1193" instrument_node="">
</span><li data-dcnode-id="1191"><span data-dcnode-id="1192" instrument_node="">Call your medical provider if you have several high blood pressure readings. Or when your provider tells you to contact them if your blood pressure readings are out of the normal range.</span></li><span data-dcnode-id="1190" instrument_node="">
</span><li data-dcnode-id="1188"><span data-dcnode-id="1189" instrument_node="">Seek emergency medical attention if your systolic (top number) reaches 180, or your diastolic (bottom number) reaches 110 or higher.</span></li><span data-dcnode-id="1187" instrument_node="">
</span></ul><span data-dcnode-id="1185" instrument_node="">
</span><p data-dcnode-id="1183"><span data-dcnode-id="1184" instrument_node="">Use your blood pressure only as a guide. A single high blood pressure reading above normal isn’t necessarily bad. Your medical provider will study multiple blood pressure readings over days or weeks.</span></p><span data-dcnode-id="1182" instrument_node="">
</span><p data-dcnode-id="1180"><span data-dcnode-id="1181" instrument_node="">&nbsp;</span></p><span data-dcnode-id="1179" instrument_node="">
</span><h3 data-dcnode-id="1177"><span data-dcnode-id="1178" instrument_node="">What Is Hypertension?</span></h3><span data-dcnode-id="1176" instrument_node="">
</span><p data-dcnode-id="1170"><span data-dcnode-id="1175" instrument_node="">Hypertension, or high blood pressure, is when your blood pressure is consistently too high (</span><strong data-dcnode-id="1172"><a data-dcnode-id="1173" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.heart.org/en/health-topics/high-blood-pressure/the-facts-about-high-blood-pressure/what-is-high-blood-pressure" rel="noopener" target="_blank"><span data-dcnode-id="1174" instrument_node="">23</span></a></strong><span data-dcnode-id="1171" instrument_node="">). For adults, high blood pressure is generally above 130/80.&nbsp;</span></p><span data-dcnode-id="1169" instrument_node="">
</span><p data-dcnode-id="1167"><span data-dcnode-id="1168" instrument_node="">&nbsp;</span></p><span data-dcnode-id="1166" instrument_node="">
</span><h4 data-dcnode-id="1164"><span data-dcnode-id="1165" instrument_node="">What Are the Dangers of High Blood Pressure?</span></h4><span data-dcnode-id="1163" instrument_node="">
</span><p data-dcnode-id="1157"><span data-dcnode-id="1162" instrument_node="">Chronic high blood pressure (hypertension) can increase your risk of the following (</span><strong data-dcnode-id="1159"><a data-dcnode-id="1160" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.mayoclinic.org/diseases-conditions/high-blood-pressure/in-depth/high-blood-pressure/art-20045868" rel="noopener" target="_blank"><span data-dcnode-id="1161" instrument_node="">24</span></a></strong><span data-dcnode-id="1158" instrument_node="">):</span></p><span data-dcnode-id="1156" instrument_node="">
</span><ul data-dcnode-id="1136"><span data-dcnode-id="1155" instrument_node="">
</span><li data-dcnode-id="1153"><span data-dcnode-id="1154" instrument_node="">Atherosclerosis (hardening of the arteries)</span></li><span data-dcnode-id="1152" instrument_node="">
</span><li data-dcnode-id="1150"><span data-dcnode-id="1151" instrument_node="">Dementia</span></li><span data-dcnode-id="1149" instrument_node="">
</span><li data-dcnode-id="1147"><span data-dcnode-id="1148" instrument_node="">Heart attack</span></li><span data-dcnode-id="1146" instrument_node="">
</span><li data-dcnode-id="1144"><span data-dcnode-id="1145" instrument_node="">Heart failure</span></li><span data-dcnode-id="1143" instrument_node="">
</span><li data-dcnode-id="1141"><span data-dcnode-id="1142" instrument_node="">Kidney damage</span></li><span data-dcnode-id="1140" instrument_node="">
</span><li data-dcnode-id="1138"><span data-dcnode-id="1139" instrument_node="">Stroke</span></li><span data-dcnode-id="1137" instrument_node="">
</span></ul><span data-dcnode-id="1135" instrument_node="">
</span><h3 data-dcnode-id="1133"><span data-dcnode-id="1134" instrument_node="">&nbsp;</span></h3><span data-dcnode-id="1132" instrument_node="">
</span><h3 data-dcnode-id="1130"><span data-dcnode-id="1131" instrument_node="">What Is Hypotension?</span></h3><span data-dcnode-id="1129" instrument_node="">
</span><p data-dcnode-id="1123"><span data-dcnode-id="1128" instrument_node="">Low blood pressure, called hypotension, is generally a blood pressure reading below 90 mm Hg systolic, and 60 mm Hg diastolic (</span><strong data-dcnode-id="1125"><a data-dcnode-id="1126" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.mayoclinic.org/diseases-conditions/low-blood-pressure/symptoms-causes/syc-20355465" rel="noopener" target="_blank"><span data-dcnode-id="1127" instrument_node="">25</span></a></strong><span data-dcnode-id="1124" instrument_node="">).</span></p><span data-dcnode-id="1122" instrument_node="">
</span><p data-dcnode-id="1120"><span data-dcnode-id="1121" instrument_node="">&nbsp;</span></p><span data-dcnode-id="1119" instrument_node="">
</span><h3 data-dcnode-id="1117"><span data-dcnode-id="1118" instrument_node="">What Are the Symptoms of Low Blood Pressure?</span></h3><span data-dcnode-id="1116" instrument_node="">
</span><p data-dcnode-id="1114"><span data-dcnode-id="1115" instrument_node="">Low blood pressure means that your heart can’t deliver enough blood to your body, causing more serious problems. Symptoms of hypotension include the following:</span></p><span data-dcnode-id="1113" instrument_node="">
</span><ul data-dcnode-id="1084"><span data-dcnode-id="1112" instrument_node="">
</span><li data-dcnode-id="1110" id="ad-mobile-top-container"><span data-dcnode-id="1111" instrument_node="">Blurred vision</span></li><span data-dcnode-id="1109" instrument_node="">
</span><li data-dcnode-id="1107"><span data-dcnode-id="1108" instrument_node="">Confusion</span></li><span data-dcnode-id="1106" instrument_node="">
</span><li data-dcnode-id="1104"><span data-dcnode-id="1105" instrument_node="">Dizziness&nbsp;</span></li><span data-dcnode-id="1103" instrument_node="">
</span><li data-dcnode-id="1101"><span data-dcnode-id="1102" instrument_node="">Fainting</span></li><span data-dcnode-id="1100" instrument_node="">
</span><li data-dcnode-id="1098"><span data-dcnode-id="1099" instrument_node="">Fatigue</span></li><span data-dcnode-id="1097" instrument_node="">
</span><li data-dcnode-id="1095"><span data-dcnode-id="1096" instrument_node="">Lightheadedness</span></li><span data-dcnode-id="1094" instrument_node="">
</span><li data-dcnode-id="1092"><span data-dcnode-id="1093" instrument_node="">Nausea</span></li><span data-dcnode-id="1091" instrument_node="">
</span><li data-dcnode-id="1089"><span data-dcnode-id="1090" instrument_node="">Shock</span></li><span data-dcnode-id="1088" instrument_node="">
</span><li data-dcnode-id="1086"><span data-dcnode-id="1087" instrument_node="">Unexplained sleepiness</span></li><span data-dcnode-id="1085" instrument_node="">
</span></ul><span data-dcnode-id="1083" instrument_node="">
</span><p data-dcnode-id="1081"><span data-dcnode-id="1082" instrument_node="">You should tell your doctor about symptoms of low blood sugar because they could be signs of a more serious health problem. Keep a record of your symptoms and for your next appointment with your medical provider.&nbsp;</span></p><span data-dcnode-id="1080" instrument_node="">
</span><p data-dcnode-id="1078"><span data-dcnode-id="1079" instrument_node="">&nbsp;</span></p><span data-dcnode-id="1077" instrument_node="">
</span><h4 data-dcnode-id="1075"><span data-dcnode-id="1076" instrument_node="">When Is Low Blood Pressure An Emergency?</span></h4><span data-dcnode-id="1074" instrument_node="">
</span><p data-dcnode-id="1068"><span data-dcnode-id="1073" instrument_node="">Seek emergency medical attention if you have signs of shock. Shock symptoms include (</span><strong data-dcnode-id="1070"><a data-dcnode-id="1071" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.mayoclinic.org/diseases-conditions/low-blood-pressure/symptoms-causes/syc-20355465" rel="noopener" target="_blank"><span data-dcnode-id="1072" instrument_node="">25</span></a></strong><span data-dcnode-id="1069" instrument_node="">):</span></p><span data-dcnode-id="1067" instrument_node="">
</span><ul data-dcnode-id="1053"><span data-dcnode-id="1066" instrument_node="">
</span><li data-dcnode-id="1064"><span data-dcnode-id="1065" instrument_node="">Confusion</span></li><span data-dcnode-id="1063" instrument_node="">
</span><li data-dcnode-id="1061"><span data-dcnode-id="1062" instrument_node="">Cold, clammy, pale skin</span></li><span data-dcnode-id="1060" instrument_node="">
</span><li data-dcnode-id="1058"><span data-dcnode-id="1059" instrument_node="">Rapid, shallow breathing</span></li><span data-dcnode-id="1057" instrument_node="">
</span><li data-dcnode-id="1055"><span data-dcnode-id="1056" instrument_node="">Weak and rapid heart rate</span></li><span data-dcnode-id="1054" instrument_node="">
</span></ul><span data-dcnode-id="1052" instrument_node="">
</span><p data-dcnode-id="1050"><span data-dcnode-id="1051" instrument_node="">Chronically low blood pressure can harm your kidneys. And a dramatic drop in blood pressure can cause fainting, shock, coma, and death.</span></p><span data-dcnode-id="1049" instrument_node="">
</span><p data-dcnode-id="1046"><strong data-dcnode-id="1047"><span data-dcnode-id="1048" instrument_node="">Further Reading:</span></strong></p><span data-dcnode-id="1045" instrument_node="">
</span><p data-dcnode-id="1041"><a data-dcnode-id="1042" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//agelessinvesting.com/what-is-normal-blood-pressure/"><strong data-dcnode-id="1043"><span data-dcnode-id="1044" instrument_node="">What Is Normal Blood Pressure? Blood Pressure Chart By Age</span></strong></a></p><span data-dcnode-id="1040" instrument_node="">
</span><p data-dcnode-id="1036"><a data-dcnode-id="1037" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//agelessinvesting.com/what-is-normal-body-temperature-body-temperature/"><strong data-dcnode-id="1038"><span data-dcnode-id="1039" instrument_node="">What Is Normal Body Temperature Range?</span></strong></a></p><span data-dcnode-id="1035" instrument_node="">
</span><p data-dcnode-id="1033"><span data-dcnode-id="1034" instrument_node="">&nbsp;</span></p><span data-dcnode-id="1032" instrument_node="">
</span><h2 data-dcnode-id="1030"><span data-dcnode-id="1031" instrument_node="">Are Your Vital Signs In The Normal Range?</span></h2><span data-dcnode-id="1029" instrument_node="">
</span><p data-dcnode-id="1027"><span data-dcnode-id="1028" instrument_node="">Your health, or the health of your loved ones, is important to you. That’s why you want to know how to check your vital signs correctly and understand what they mean.</span></p><span data-dcnode-id="1026" instrument_node="">
</span><p data-dcnode-id="1024"><span data-dcnode-id="1025" instrument_node="">Now you know how to check your vital signs accurately and what’s the normal range for blood pressure, pulse rate, body temperature, and respiration rate.</span></p><span data-dcnode-id="1023" instrument_node="">
</span><p data-dcnode-id="1021"><span data-dcnode-id="1022" instrument_node="">Are you n the normal range? If you’re not, work with your medical provider to find your normal range, and find any problems before they become serious.</span></p><span data-dcnode-id="1020" instrument_node="">
