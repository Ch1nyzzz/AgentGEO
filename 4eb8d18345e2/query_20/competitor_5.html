</span><p data-dcnode-id="2347"><span data-dcnode-id="2348" instrument_node="">Vital signs are a measurement, or a snapshot, of your body’s basic (life-sustaining) functions. Not only do your vital signs tell you how well your body’s functioning, but they also provide early detection of serious health conditions.&nbsp;&nbsp;</span></p><span data-dcnode-id="2346" instrument_node="">
</span><p data-dcnode-id="2344"><span data-dcnode-id="2345" instrument_node="">Usually, you get your vitals checked at the doctor’s office or the emergency room, but you can check them at home. In this article, you’ll learn the vital signs, how to measure them, what’s normal, and what they mean for your health.</span></p><span data-dcnode-id="2343" instrument_node="">
</span><p data-dcnode-id="2341"><span data-dcnode-id="2342" instrument_node="">&nbsp;</span></p><span data-dcnode-id="2340" instrument_node="">
</span><p data-dcnode-id="2337"><strong data-dcnode-id="2338"><span data-dcnode-id="2339" instrument_node="">Table of Contents</span></strong></p><span data-dcnode-id="2336" instrument_node="">
</span><h2 data-dcnode-id="2334"><span data-dcnode-id="2335" instrument_node="">What Are The 4 Vital Signs?</span></h2><span data-dcnode-id="2333" instrument_node="">
</span><p data-dcnode-id="2331"><span data-dcnode-id="2332" instrument_node="">The four main vital signs monitored by health care providers are the following:</span></p><span data-dcnode-id="2330" instrument_node="">
</span><ul data-dcnode-id="2312"><span data-dcnode-id="2329" instrument_node="">
</span><li data-dcnode-id="2326"><strong data-dcnode-id="2327"><span data-dcnode-id="2328" instrument_node="">Body temperature</span></strong></li><span data-dcnode-id="2325" instrument_node="">
</span><li data-dcnode-id="2322"><strong data-dcnode-id="2323"><span data-dcnode-id="2324" instrument_node="">Pulse rate</span></strong></li><span data-dcnode-id="2321" instrument_node="">
</span><li data-dcnode-id="2318"><strong data-dcnode-id="2319"><span data-dcnode-id="2320" instrument_node="">Respiration rate (breathing rate)</span></strong></li><span data-dcnode-id="2317" instrument_node="">
</span><li data-dcnode-id="2314"><strong data-dcnode-id="2315"><span data-dcnode-id="2316" instrument_node="">Blood pressure</span></strong></li><span data-dcnode-id="2313" instrument_node="">
</span></ul><span data-dcnode-id="2311" instrument_node="">
</span><p data-dcnode-id="2304"></p><div class="dpsp-pin-it-wrapper aligncenter wp-image-8664" data-dcnode-id="2305"><img alt="A picture of a smiling young woman measuring listening to the heart of an older smiling woman with a stethoscope, headline &quot;How to Measure Vital Signs, whats the normal range?&quot;" class="" data-dcnode-id="2310" data-pin-description="Want to know four numbers that can warn you about most health problems? Vital signs are a measurement of your body's basic (life-sustaining) functions. Not only do your vital signs tell you how well your body's functioning, but they can also provide early detection of serious health conditions. You can get your vitals measured at the doctor's office, emergency room, or even at home. In this article, you'll learn the vital signs, how to measure them, and what they mean for your health." data-pin-id="834221530986824082" data-pin-title="How To Measure Vital Signs | What's The Normal Range For Vital Signs?" height="426" sizes="(max-width: 284px) 100vw, 284px" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//i0.wp.com/agelessinvesting.com/wp-content/uploads/2021/12/How-To-Measure-Vital-Signs.jpg%3Fresize%3D284%252C426%26ssl%3D1&amp;raw" srcset="https://i0.wp.com/agelessinvesting.com/wp-content/uploads/2021/12/How-To-Measure-Vital-Signs.jpg?resize=200%2C300&amp;ssl=1 200w, https://i0.wp.com/agelessinvesting.com/wp-content/uploads/2021/12/How-To-Measure-Vital-Signs.jpg?resize=683%2C1024&amp;ssl=1 683w, https://i0.wp.com/agelessinvesting.com/wp-content/uploads/2021/12/How-To-Measure-Vital-Signs.jpg?resize=768%2C1152&amp;ssl=1 768w, https://i0.wp.com/agelessinvesting.com/wp-content/uploads/2021/12/How-To-Measure-Vital-Signs.jpg?w=1000&amp;ssl=1 1000w" style="" width="284"><a class="dpsp-pin-it-button dpsp-pin-it-button-top-left dpsp-pin-it-button-shape-rectangular" data-dcnode-id="2306" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//pinterest.com/pin/834221530986824082/repin/x" rel="noopener" target="_blank"><span class="dpsp-network-icon" data-dcnode-id="2307"><svg data-dcnode-id="2308" height="32" viewBox="0 0 23 32" width="23" xmlns="http://www.w3.org/2000/svg"><path d="M0 10.656q0-1.92 0.672-3.616t1.856-2.976 2.72-2.208 3.296-1.408 3.616-0.448q2.816 0 5.248 1.184t3.936 3.456 1.504 5.12q0 1.728-0.32 3.36t-1.088 3.168-1.792 2.656-2.56 1.856-3.392 0.672q-1.216 0-2.4-0.576t-1.728-1.568q-0.16 0.704-0.48 2.016t-0.448 1.696-0.352 1.28-0.48 1.248-0.544 1.12-0.832 1.408-1.12 1.536l-0.224 0.096-0.16-0.192q-0.288-2.816-0.288-3.36 0-1.632 0.384-3.68t1.184-5.152 0.928-3.616q-0.576-1.152-0.576-3.008 0-1.504 0.928-2.784t2.368-1.312q1.088 0 1.696 0.736t0.608 1.824q0 1.184-0.768 3.392t-0.8 3.36q0 1.12 0.8 1.856t1.952 0.736q0.992 0 1.824-0.448t1.408-1.216 0.992-1.696 0.672-1.952 0.352-1.984 0.128-1.792q0-3.072-1.952-4.8t-5.12-1.728q-3.552 0-5.952 2.304t-2.4 5.856q0 0.8 0.224 1.536t0.48 1.152 0.48 0.832 0.224 0.544q0 0.48-0.256 1.28t-0.672 0.8q-0.032 0-0.288-0.032-0.928-0.288-1.632-0.992t-1.088-1.696-0.576-1.92-0.192-1.92z" data-dcnode-id="2309"></path></svg></span></a></div><p></p><span data-dcnode-id="2303" instrument_node="">
</span><p data-dcnode-id="2301"><span data-dcnode-id="2302" instrument_node="">&nbsp;</span></p><span data-dcnode-id="2300" instrument_node="">
</span><h2 data-dcnode-id="2298"><span data-dcnode-id="2299" instrument_node="">1. What Is A Normal Body Temperature?</span></h2><span data-dcnode-id="2297" instrument_node="">
</span><p data-dcnode-id="2289"><span data-dcnode-id="2296" instrument_node="">Normal body temperature ranges from 97.7 to 99.5°F (36.5 to 37.5°C) </span><strong data-dcnode-id="2291"><span data-dcnode-id="2295" instrument_node="">(</span><a data-dcnode-id="2293" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.ncbi.nlm.nih.gov/books/NBK553213/" rel="noopener" target="_blank"><span data-dcnode-id="2294" instrument_node="">1</span></a><span data-dcnode-id="2292" instrument_node="">)</span></strong><span data-dcnode-id="2290" instrument_node="">. A healthy body functions best at 98.6°F (37°C), but everyone has their own normal. Body temperature varies depending on gender, time of day, activity level, food or fluid consumption, and the site measured. Or for women, the stage of the menstrual cycle.&nbsp;&nbsp;</span></p><span data-dcnode-id="2288" instrument_node="">
</span><p data-dcnode-id="2286"><span data-dcnode-id="2287" instrument_node="">Your body constantly adapts its temperature to your environment. It elevates during exercise and lowers during sleep. It’s lowest when you wake up and highest later in the day.</span></p><span data-dcnode-id="2285" instrument_node="">
</span><p data-dcnode-id="2277"><span data-dcnode-id="2284" instrument_node="">Core body temperature is closely regulated by an area of the brain called the hypothalamus </span><strong data-dcnode-id="2279"><span data-dcnode-id="2283" instrument_node="">(</span><a data-dcnode-id="2281" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.ncbi.nlm.nih.gov/books/NBK279457/%23%3A~%3Atext%3DOur%2520internal%2520body%2520temperature%2520is%2Cbody%2520generates%2520and%2520maintains%2520heat." rel="noopener" target="_blank"><span data-dcnode-id="2282" instrument_node="">2</span></a><span data-dcnode-id="2280" instrument_node="">)</span></strong><span data-dcnode-id="2278" instrument_node="">.</span></p><span data-dcnode-id="2276" instrument_node="">
</span><p data-dcnode-id="2274"><span data-dcnode-id="2275" instrument_node="">The hypothalamus compares your current temperature with the normal temperature of about 98.6°F. If your temperature is too low, the hypothalamus prompts your body to generate and retain heat. If your temperature is too high, your body releases heat or produces sweat to cool your skin.</span></p><span data-dcnode-id="2273" instrument_node="">
</span><p data-dcnode-id="2271"><span data-dcnode-id="2272" instrument_node="">&nbsp;</span></p><span data-dcnode-id="2270" instrument_node="">
</span><h3 data-dcnode-id="2268"><span data-dcnode-id="2269" instrument_node="">Why Is Body Temperature Measured?</span></h3><span data-dcnode-id="2267" instrument_node="">
</span><ul data-dcnode-id="2256"><span data-dcnode-id="2266" instrument_node="">
</span><li data-dcnode-id="2264"><span data-dcnode-id="2265" instrument_node="">Check for a fever accompanied by signs of infection or inflammation</span></li><span data-dcnode-id="2263" instrument_node="">
</span><li data-dcnode-id="2261"><span data-dcnode-id="2262" instrument_node="">Check for signs of hypothermia accompanied with a low temperature</span></li><span data-dcnode-id="2260" instrument_node="">
</span><li data-dcnode-id="2258"><span data-dcnode-id="2259" instrument_node="">Establish a baseline for each person’s normal body temperature for both the location and the measuring conditions.&nbsp;</span></li><span data-dcnode-id="2257" instrument_node="">
</span></ul><span data-dcnode-id="2255" instrument_node="">
</span><p data-dcnode-id="2253"><span data-dcnode-id="2254" instrument_node="">Besides the time of day, their age, gender, activity level, and measuring site; what is a normal temperature for the patient? It’s important to track and review a patient’s temperature over time to make the right diagnosis.</span></p><span data-dcnode-id="2252" instrument_node="">
</span><p data-dcnode-id="2250"><span data-dcnode-id="2251" instrument_node="">&nbsp;</span></p><span data-dcnode-id="2249" instrument_node="">
</span><h3 data-dcnode-id="2247"><span data-dcnode-id="2248" instrument_node="">What Is A Fever?</span></h3><span data-dcnode-id="2246" instrument_node="">
</span><p data-dcnode-id="2244"><span data-dcnode-id="2245" instrument_node="">Fever, or hyperthermia, is when your temperature is higher than normal.</span></p><span data-dcnode-id="2243" instrument_node="">
</span><ul data-dcnode-id="2231"><span data-dcnode-id="2242" instrument_node="">
</span><li data-dcnode-id="2240"><span data-dcnode-id="2241" instrument_node="">A fever for adults is 100.4 °F (38 °C) or greater</span></li><span data-dcnode-id="2239" instrument_node="">
</span><li data-dcnode-id="2233"><span data-dcnode-id="2238" instrument_node="">A fever for children is 100.4°F (38°C) measured rectally, 99.5°F (37.5°C) orally, 99°F (37.2°C) measured axillary (</span><strong data-dcnode-id="2234"><a data-dcnode-id="2236" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.pennmedicine.org/for-patients-and-visitors/patient-information/conditions-treated-a-to-z/fever" rel="noopener" target="_blank"><span data-dcnode-id="2237" instrument_node="">3</span></a><span data-dcnode-id="2235" instrument_node="">)</span></strong></li><span data-dcnode-id="2232" instrument_node="">
</span></ul><span data-dcnode-id="2230" instrument_node="">
</span><p data-dcnode-id="2222"><span data-dcnode-id="2229" instrument_node="">A fever generally means that your body is trying to fight a virus or bacteria causing an infection. Other fever causes include the following </span><strong data-dcnode-id="2224"><span data-dcnode-id="2228" instrument_node="">(</span><a data-dcnode-id="2226" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//medlineplus.gov/ency/article/003400.htm" rel="noopener" target="_blank"><span data-dcnode-id="2227" instrument_node="">4</span></a><span data-dcnode-id="2225" instrument_node="">)</span></strong><span data-dcnode-id="2223" instrument_node="">:</span></p><span data-dcnode-id="2221" instrument_node="">
</span><ul data-dcnode-id="2195"><span data-dcnode-id="2220" instrument_node="">
</span><li data-dcnode-id="2218"><span data-dcnode-id="2219" instrument_node="">Antibiotics</span></li><span data-dcnode-id="2217" instrument_node="">
</span><li data-dcnode-id="2215"><span data-dcnode-id="2216" instrument_node="">Anti-seizure drugs</span></li><span data-dcnode-id="2214" instrument_node="">
</span><li data-dcnode-id="2212"><span data-dcnode-id="2213" instrument_node="">Autoimmune disease</span></li><span data-dcnode-id="2211" instrument_node="">
</span><li data-dcnode-id="2209"><span data-dcnode-id="2210" instrument_node="">Blood pressure medications</span></li><span data-dcnode-id="2208" instrument_node="">
</span><li data-dcnode-id="2206"><span data-dcnode-id="2207" instrument_node="">Cancer</span></li><span data-dcnode-id="2205" instrument_node="">
</span><li data-dcnode-id="2203"><span data-dcnode-id="2204" instrument_node="">Heat exhaustion</span></li><span data-dcnode-id="2202" instrument_node="">
</span><li data-dcnode-id="2200"><span data-dcnode-id="2201" instrument_node="">Heatstroke</span></li><span data-dcnode-id="2199" instrument_node="">
</span><li data-dcnode-id="2197"><span data-dcnode-id="2198" instrument_node="">Hyperthermia&nbsp;</span></li><span data-dcnode-id="2196" instrument_node="">
</span></ul><span data-dcnode-id="2194" instrument_node="">
</span><p data-dcnode-id="2192"><span data-dcnode-id="2193" instrument_node="">Other fever symptoms include:</span></p><span data-dcnode-id="2191" instrument_node="">
</span><ul data-dcnode-id="2180"><span data-dcnode-id="2190" instrument_node="">
</span><li data-dcnode-id="2188"><span data-dcnode-id="2189" instrument_node="">Achiness</span></li><span data-dcnode-id="2187" instrument_node="">
</span><li data-dcnode-id="2185"><span data-dcnode-id="2186" instrument_node="">Chills and shaking</span></li><span data-dcnode-id="2184" instrument_node="">
</span><li data-dcnode-id="2182"><span data-dcnode-id="2183" instrument_node="">Sweating</span></li><span data-dcnode-id="2181" instrument_node="">
</span></ul><span data-dcnode-id="2179" instrument_node="">
</span><p data-dcnode-id="2177"><span data-dcnode-id="2178" instrument_node="">&nbsp;</span></p><span data-dcnode-id="2176" instrument_node="">
</span><h3 data-dcnode-id="2174"><span data-dcnode-id="2175" instrument_node="">What Is Hypothermia?</span></h3><span data-dcnode-id="2173" instrument_node="">
</span><p data-dcnode-id="2165"><span data-dcnode-id="2172" instrument_node="">Hypothermia is an abnormally low body temperature caused by staying in cold temperatures for a long time </span><strong data-dcnode-id="2167"><span data-dcnode-id="2171" instrument_node="">(</span><a data-dcnode-id="2169" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.hopkinsmedicine.org/health/conditions-and-diseases/hypothermia" rel="noopener" target="_blank"><span data-dcnode-id="2170" instrument_node="">5</span></a><span data-dcnode-id="2168" instrument_node="">)</span></strong><span data-dcnode-id="2166" instrument_node="">. It’s defined as a drop in body temperature below 95°F (35 °C).</span></p><span data-dcnode-id="2164" instrument_node="">
</span><p data-dcnode-id="2156"><span data-dcnode-id="2163" instrument_node="">Hypothermia means the body is losing heat faster than it can produce it </span><strong data-dcnode-id="2158"><span data-dcnode-id="2162" instrument_node="">(</span><a data-dcnode-id="2160" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//my.clevelandclinic.org/health/articles/10881-vital-signs" rel="noopener" target="_blank"><span data-dcnode-id="2161" instrument_node="">6</span></a><span data-dcnode-id="2159" instrument_node="">)</span></strong><span data-dcnode-id="2157" instrument_node="">. If left untreated, severe hypothermia can range from an irregular heartbeat, respiratory and heart failure, and death. Hypothermia is dangerous because it impairs your ability to think clearly and move well, making it harder to get treatment in time.</span></p><span data-dcnode-id="2155" instrument_node="">
</span><p data-dcnode-id="2153"><span data-dcnode-id="2154" instrument_node="">Early symptoms of hypothermia include:</span></p><span data-dcnode-id="2152" instrument_node="">
</span><ul data-dcnode-id="2132"><span data-dcnode-id="2151" instrument_node="">
</span><li data-dcnode-id="2149"><span data-dcnode-id="2150" instrument_node="">Cold skin</span></li><span data-dcnode-id="2148" instrument_node="">
</span><li data-dcnode-id="2146"><span data-dcnode-id="2147" instrument_node="">Confusion</span></li><span data-dcnode-id="2145" instrument_node="">
</span><li data-dcnode-id="2143"><span data-dcnode-id="2144" instrument_node="">Drowsiness</span></li><span data-dcnode-id="2142" instrument_node="">
</span><li data-dcnode-id="2140"><span data-dcnode-id="2141" instrument_node="">Loss of coordination</span></li><span data-dcnode-id="2139" instrument_node="">
</span><li data-dcnode-id="2137"><span data-dcnode-id="2138" instrument_node="">Shivering</span></li><span data-dcnode-id="2136" instrument_node="">
</span><li data-dcnode-id="2134"><span data-dcnode-id="2135" instrument_node="">Weakness</span></li><span data-dcnode-id="2133" instrument_node="">
</span></ul><span data-dcnode-id="2131" instrument_node="">
</span><p data-dcnode-id="2129"><span data-dcnode-id="2130" instrument_node="">Even temperatures above 40°F or 4°C can cause hypothermia in someone who is cold due to sweat, rain, or being in cold water for a long period of time.</span></p><span data-dcnode-id="2128" instrument_node="">
</span><p data-dcnode-id="2126"><span data-dcnode-id="2127" instrument_node="">&nbsp;</span></p><span data-dcnode-id="2125" instrument_node="">
</span><h3 data-dcnode-id="2123"><span data-dcnode-id="2124" instrument_node="">Where To Take Body Temperature</span></h3><span data-dcnode-id="2122" instrument_node="">
</span><p data-dcnode-id="2120"><span data-dcnode-id="2121" instrument_node="">Body temperature is taken by choosing the best site of the body for the situation. Understanding the site differences is important. Each site has advantages and disadvantages depending on the need for accuracy or convenience.</span></p><span data-dcnode-id="2119" instrument_node="">
</span><p data-dcnode-id="2117"><span data-dcnode-id="2118" instrument_node="">The locations for taking body temperature include:</span></p><span data-dcnode-id="2116" instrument_node="">
</span><ul data-dcnode-id="2075"><span data-dcnode-id="2115" instrument_node="">
</span><li data-dcnode-id="2111"><strong data-dcnode-id="2113"><span data-dcnode-id="2114" instrument_node="">Orally: </span></strong><span data-dcnode-id="2112" instrument_node="">Oral temperature is taken by mouth with either a traditional glass thermometer or a digital thermometer. The oral temperature is both very convenient and reliable.</span></li><span data-dcnode-id="2110" instrument_node="">
</span><li data-dcnode-id="2100"><strong data-dcnode-id="2108"><span data-dcnode-id="2109" instrument_node="">Auxillary: </span></strong><span data-dcnode-id="2107" instrument_node="">Auxillary temperature is taken under the armpit with a glass or digital thermometer. The auxiliary temperature is about 0.5 °F lower than the oral temperature </span><strong data-dcnode-id="2104"><a aria-expanded="false" aria-haspopup="true" data-bk-pop-href="#article-41801.r8" data-dcnode-id="2105" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.ncbi.nlm.nih.gov/books/NBK553213/" role="button"><span data-dcnode-id="2106" instrument_node="">(7)</span></a></strong><span data-dcnode-id="2103" instrument_node="">. The auxiliary is convenient, but it isn’t recommended because it’s less accurate</span><a aria-expanded="false" aria-haspopup="true" data-bk-pop-href="#article-41801.r8" data-dcnode-id="2101" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.ncbi.nlm.nih.gov/books/NBK553213/" role="button"><span data-dcnode-id="2102" instrument_node="">.</span></a></li><span data-dcnode-id="2099" instrument_node="">
</span><li data-dcnode-id="2091"><strong data-dcnode-id="2097"><span data-dcnode-id="2098" instrument_node="">Rectally:&nbsp;</span></strong><span data-dcnode-id="2096" instrument_node="">Rectal temperature is taken in the bottom using a glass or digital thermometer. Rectal temperature tends to be 0.5 °F higher than the oral temperature</span><a data-dcnode-id="2093" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.ncbi.nlm.nih.gov/books/NBK553213/" rel="noopener" target="_blank"><strong data-dcnode-id="2094"><span data-dcnode-id="2095" instrument_node=""> (7)</span></strong></a><span data-dcnode-id="2092" instrument_node="">. This method is inconvenient, but it’s considered the “gold standard” for recording temperature. because it measures internal body temperature.&nbsp;&nbsp;</span></li><span data-dcnode-id="2090" instrument_node="">
</span><li data-dcnode-id="2082"><strong data-dcnode-id="2088"><span data-dcnode-id="2089" instrument_node="">Aural. </span></strong><span data-dcnode-id="2087" instrument_node="">Aural temperature is taken in the ear using a special device </span><a data-dcnode-id="2084" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.ncbi.nlm.nih.gov/books/NBK553213/" rel="noopener" target="_blank"><strong data-dcnode-id="2085"><span data-dcnode-id="2086" instrument_node="">(7)</span></strong></a><span data-dcnode-id="2083" instrument_node="">. This device is designed to measure the temperature of the eardrum, which reflects core body temperature. Aural temperature is convenient, but it’s also not recommended because it’s less accurate.</span></li><span data-dcnode-id="2081" instrument_node="">
</span><li data-dcnode-id="2077"><strong data-dcnode-id="2079"><span data-dcnode-id="2080" instrument_node="">Skin.</span></strong><span data-dcnode-id="2078" instrument_node=""> Skin temperature is measured using a special device designed for the skin.</span></li><span data-dcnode-id="2076" instrument_node="">
</span></ul><span data-dcnode-id="2074" instrument_node="">
</span><p data-dcnode-id="2072"><span data-dcnode-id="2073" instrument_node="">&nbsp;</span></p><span data-dcnode-id="2071" instrument_node="">
</span><h3 data-dcnode-id="2069"><span data-dcnode-id="2070" instrument_node="">Do This Before You Measure Body Temperature</span></h3><span data-dcnode-id="2068" instrument_node="">
</span><p data-dcnode-id="2066"><span data-dcnode-id="2067" instrument_node="">Certain activities affect body temperature temporarily. For the best results, wait until the patient’s body has time to return to normal.</span></p><span data-dcnode-id="2065" instrument_node="">
</span><ul data-dcnode-id="2057"><span data-dcnode-id="2064" instrument_node="">
</span><li data-dcnode-id="2062"><span data-dcnode-id="2063" instrument_node="">Wait 30 minutes after eating, drinking a cold or hot liquid, or smoking</span></li><span data-dcnode-id="2061" instrument_node="">
</span><li data-dcnode-id="2059"><span data-dcnode-id="2060" instrument_node="">Wait an hour after exercise or taking a hot shower or bath</span></li><span data-dcnode-id="2058" instrument_node="">
</span></ul><span data-dcnode-id="2056" instrument_node="">
</span><p data-dcnode-id="2054"><span data-dcnode-id="2055" instrument_node="">Besides the site and activity, make note of the time of day.</span></p><span data-dcnode-id="2053" instrument_node="">
</span><p data-dcnode-id="2051"><span data-dcnode-id="2052" instrument_node="">&nbsp;</span></p><span data-dcnode-id="2050" instrument_node="">
</span><h3 data-dcnode-id="2048"><span data-dcnode-id="2049" instrument_node="">How To Take Measure Temperature (Orally)</span></h3><span data-dcnode-id="2047" instrument_node="">
</span><p data-dcnode-id="2045"><span data-dcnode-id="2046" instrument_node="">For taking temperature, you’ll need a glass thermometer without mercury, or an electronic thermometer.</span></p><span data-dcnode-id="2044" instrument_node="">
</span><ul data-dcnode-id="2024"><span data-dcnode-id="2043" instrument_node="">
</span><li data-dcnode-id="2041"><span data-dcnode-id="2042" instrument_node="">Clean the thermometer before use</span></li><span data-dcnode-id="2040" instrument_node="">
</span><li data-dcnode-id="2038"><span data-dcnode-id="2039" instrument_node="">If it’s a glass thermometer, hold the opposite end of the bulb and shake the thermometer down until it reads 95°F or lower.</span></li><span data-dcnode-id="2037" instrument_node="">
</span><li data-dcnode-id="2035"><span data-dcnode-id="2036" instrument_node="">Place the thermometer under the tongue, where it meets the lower jaw. This area gives the best reliability.&nbsp;</span></li><span data-dcnode-id="2034" instrument_node="">
</span><li data-dcnode-id="2032"><span data-dcnode-id="2033" instrument_node="">Make sure the mouth is closed and the lips are holding the thermometer in place</span></li><span data-dcnode-id="2031" instrument_node="">
</span><li data-dcnode-id="2029"><span data-dcnode-id="2030" instrument_node="">For a glass thermometer, hold the thermometer in place for three minutes</span></li><span data-dcnode-id="2028" instrument_node="">
</span><li data-dcnode-id="2026"><span data-dcnode-id="2027" instrument_node="">For an electronic thermometer, wait for a beep</span></li><span data-dcnode-id="2025" instrument_node="">
</span></ul><span data-dcnode-id="2023" instrument_node="">
</span><p data-dcnode-id="2020"><span data-dcnode-id="2021" style="color: #800080;"><span data-dcnode-id="2022" instrument_node="">&nbsp;</span></span></p><span data-dcnode-id="2019" instrument_node="">
</span><h2 data-dcnode-id="2017"><span data-dcnode-id="2018" instrument_node="">2. What Is The Pulse Rate?</span></h2><span data-dcnode-id="2016" instrument_node="">
</span><p data-dcnode-id="2014"><span data-dcnode-id="2015" instrument_node="">The pulse rate (heart rate) is the number of times your heart beats per minute. As your heart pushes blood through your arteries, the arteries expand and contract as the blood flows.&nbsp;</span></p><span data-dcnode-id="2013" instrument_node="">
</span><p data-dcnode-id="2011"><span data-dcnode-id="2012" instrument_node="">&nbsp;</span></p><span data-dcnode-id="2010" instrument_node="">
</span><h3 data-dcnode-id="2008"><span data-dcnode-id="2009" instrument_node="">What Is A Normal Pulse Rate?</span></h3><span data-dcnode-id="2007" instrument_node="">
</span><p data-dcnode-id="1999"><span data-dcnode-id="2006" instrument_node="">A normal resting pulse rate for adults ranges from between 60 beats per minute (bpm) and 100 bpm </span><strong data-dcnode-id="2001"><span data-dcnode-id="2005" instrument_node="">(</span><a data-dcnode-id="2003" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.heart.org/en/health-topics/high-blood-pressure/the-facts-about-high-blood-pressure/all-about-heart-rate-pulse%23.WTnI5DOZPaZ" rel="noopener noreferrer" target="_blank"><span data-dcnode-id="2004" instrument_node="">8</span></a><span data-dcnode-id="2002" instrument_node="">)</span></strong><span data-dcnode-id="2000" instrument_node="">.&nbsp;</span></p><span data-dcnode-id="1998" instrument_node="">
</span><p data-dcnode-id="1996"><span data-dcnode-id="1997" instrument_node="">Athletes, or those who do a lot of cardio, may have heart rates around 40 bpm. Although their heart rates are abnormal, they’re still healthy because their hearts are strong enough to pump more blood per heartbeat.</span></p><span data-dcnode-id="1995" instrument_node="">
</span><p data-dcnode-id="1993"><span data-dcnode-id="1994" instrument_node="">Your normal heart rate depends on many variables such as the following:</span></p><span data-dcnode-id="1992" instrument_node="">
</span><ul data-dcnode-id="1969"><span data-dcnode-id="1991" instrument_node="">
</span><li data-dcnode-id="1989"><span data-dcnode-id="1990" instrument_node="">Age</span></li><span data-dcnode-id="1988" instrument_node="">
</span><li data-dcnode-id="1986"><span data-dcnode-id="1987" instrument_node="">Physical fitness</span></li><span data-dcnode-id="1985" instrument_node="">
</span><li data-dcnode-id="1983"><span data-dcnode-id="1984" instrument_node="">Bodyweight</span></li><span data-dcnode-id="1982" instrument_node="">
</span><li data-dcnode-id="1980"><span data-dcnode-id="1981" instrument_node="">Medications</span></li><span data-dcnode-id="1979" instrument_node="">
</span><li data-dcnode-id="1977"><span data-dcnode-id="1978" instrument_node="">Disease</span></li><span data-dcnode-id="1976" instrument_node="">
</span><li data-dcnode-id="1974"><span data-dcnode-id="1975" instrument_node="">Injury/pain</span></li><span data-dcnode-id="1973" instrument_node="">
</span><li data-dcnode-id="1971"><span data-dcnode-id="1972" instrument_node="">Emotions</span></li><span data-dcnode-id="1970" instrument_node="">
</span></ul><span data-dcnode-id="1968" instrument_node="">
</span><p data-dcnode-id="1966"><span data-dcnode-id="1967" instrument_node="">&nbsp;</span></p><span data-dcnode-id="1965" instrument_node="">

</span><p data-dcnode-id="1897"><span data-dcnode-id="1901" instrument_node="">Data from the&nbsp;</span><a data-dcnode-id="1899" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//medlineplus.gov/ency/article/003399.htm" rel="noopener" target="_blank"><span data-dcnode-id="1900" instrument_node="">National Institute of Health</span></a><span data-dcnode-id="1898" instrument_node="">:</span></p><span data-dcnode-id="1896" instrument_node="">
</span><p data-dcnode-id="1894"><span data-dcnode-id="1895" instrument_node="">&nbsp;</span></p><span data-dcnode-id="1893" instrument_node="">
</span><h2 data-dcnode-id="1891"><span data-dcnode-id="1892" instrument_node="">How To Check Your Pulse: Step-By-Step</span></h2><span data-dcnode-id="1890" instrument_node="">
</span><p data-dcnode-id="1888"><span data-dcnode-id="1889" instrument_node="">You can find your pulse on the inside of your wrist (radial artery), the side of your neck (carotid artery), or the inside of your elbow (brachial artery). Although clinicians mostly check the carotid artery in the neck, Generally, the wrist is the easiest to take your pulse.&nbsp;</span></p><span data-dcnode-id="1887" instrument_node="">
</span><p data-dcnode-id="1885"><span data-dcnode-id="1886" instrument_node="">Follow these guidelines from the American Heart Association to check your pulse:</span></p><span data-dcnode-id="1884" instrument_node="">
</span><ol data-dcnode-id="1873"><span data-dcnode-id="1883" instrument_node="">
</span><li data-dcnode-id="1881"><span data-dcnode-id="1882" instrument_node="">Find your pulse on the inside of your wrist (on the thumb side). Face your palm upward in front of you.</span></li><span data-dcnode-id="1880" instrument_node="">
</span><li data-dcnode-id="1878"><span data-dcnode-id="1879" instrument_node="">With the tips of your index and middle finger (don’t use your thumb), press your artery firmly but gently until you feel your pulse (a throbbing feeling)</span></li><span data-dcnode-id="1877" instrument_node="">
</span><li data-dcnode-id="1875"><span data-dcnode-id="1876" instrument_node="">Count the heartbeats for 60 seconds (or count for 30 seconds then multiply by two for your beats per minute).</span></li><span data-dcnode-id="1874" instrument_node="">
</span></ol><span data-dcnode-id="1872" instrument_node="">
</span><p data-dcnode-id="1870"><span data-dcnode-id="1871" instrument_node="">If you take your pulse on your lower neck, press lightly. But never press on the pulses on both sides of your lower neck at the same time, because this could block blood flow to your brain.</span></p><span data-dcnode-id="1869" instrument_node="">
</span><p data-dcnode-id="1867"><span data-dcnode-id="1868" instrument_node="">&nbsp;</span></p><span data-dcnode-id="1866" instrument_node="">
</span><h3 data-dcnode-id="1864"><span data-dcnode-id="1865" instrument_node="">What Does Your Pulse Tell You?</span></h3><span data-dcnode-id="1863" instrument_node="">
</span><p data-dcnode-id="1861"><span data-dcnode-id="1862" instrument_node="">Your pulse can tell you the following:</span></p><span data-dcnode-id="1860" instrument_node="">
</span><ul data-dcnode-id="1826"><span data-dcnode-id="1859" instrument_node="">
</span><li data-dcnode-id="1856"><strong data-dcnode-id="1857"><span data-dcnode-id="1858" instrument_node="">Amplitude</span></strong></li><span data-dcnode-id="1855" instrument_node="">
</span><li data-dcnode-id="1845"><strong data-dcnode-id="1853"><span data-dcnode-id="1854" instrument_node="">Heart rate:</span></strong><span data-dcnode-id="1852" instrument_node=""> A heart rate that’s too fast is </span><strong data-dcnode-id="1850"><span data-dcnode-id="1851" instrument_node="">tachycardia</span></strong><span data-dcnode-id="1849" instrument_node=""> (above 100 bpm), a heart rate that’s too slow is </span><strong data-dcnode-id="1847"><span data-dcnode-id="1848" instrument_node="">bradycardia </span></strong><span data-dcnode-id="1846" instrument_node="">(below 60 bpm)</span></li><span data-dcnode-id="1844" instrument_node="">
</span><li data-dcnode-id="1840"><strong data-dcnode-id="1842"><span data-dcnode-id="1843" instrument_node="">Heart rhythm:</span></strong><span data-dcnode-id="1841" instrument_node=""> Check whether the pulse rhythm could be regular, irregular, or irregularly irregular.&nbsp;</span></li><span data-dcnode-id="1839" instrument_node="">
</span><li data-dcnode-id="1836"><strong data-dcnode-id="1837"><span data-dcnode-id="1838" instrument_node="">Pulse strength</span></strong></li><span data-dcnode-id="1835" instrument_node="">
</span><li data-dcnode-id="1832"><strong data-dcnode-id="1833"><span data-dcnode-id="1834" instrument_node="">Symmetry</span></strong></li><span data-dcnode-id="1831" instrument_node="">
</span><li data-dcnode-id="1828"><strong data-dcnode-id="1829"><span data-dcnode-id="1830" instrument_node="">Volume</span></strong></li><span data-dcnode-id="1827" instrument_node="">
</span></ul><span data-dcnode-id="1825" instrument_node="">
</span><div data-dcnode-id="1772"><span data-dcnode-id="1824" instrument_node="">
</span><h3 data-dcnode-id="1822"><span data-dcnode-id="1823" instrument_node="">&nbsp;</span></h3><span data-dcnode-id="1821" instrument_node="">
</span><h3 data-dcnode-id="1819"><span data-dcnode-id="1820" instrument_node="">What Is A Low Heart Rate?</span></h3><span data-dcnode-id="1818" instrument_node="">
</span><p data-dcnode-id="1807"><span data-dcnode-id="1817" instrument_node="">A heart rate that’s too low, called </span><strong data-dcnode-id="1815"><span data-dcnode-id="1816" instrument_node="">bradycardia, </span></strong><span data-dcnode-id="1814" instrument_node="">generally is below 60 bpm </span><strong data-dcnode-id="1809"><span data-dcnode-id="1813" instrument_node="">(</span><a data-dcnode-id="1811" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.heart.org/en/health-topics/arrhythmia/about-arrhythmia/bradycardia--slow-heart-rate" rel="noopener noreferrer" target="_blank"><span data-dcnode-id="1812" instrument_node="">9</span></a><span data-dcnode-id="1810" instrument_node="">)</span></strong><span data-dcnode-id="1808" instrument_node="">. For people who don’t exercise, a heart rate below 60 bpm could be dangerous.&nbsp;</span></p><span data-dcnode-id="1806" instrument_node="">
</span><p data-dcnode-id="1804"><span data-dcnode-id="1805" instrument_node="">Underlying health conditions of a low heart rate include:</span></p><span data-dcnode-id="1803" instrument_node="">
</span><ul data-dcnode-id="1774"><span data-dcnode-id="1802" instrument_node="">
</span><li data-dcnode-id="1800"><span data-dcnode-id="1801" instrument_node="">An electrolyte imbalance</span></li><span data-dcnode-id="1799" instrument_node="">
</span><li data-dcnode-id="1797"><span data-dcnode-id="1798" instrument_node="">Congenital heart disease</span></li><span data-dcnode-id="1796" instrument_node="">
</span><li data-dcnode-id="1794"><span data-dcnode-id="1795" instrument_node="">Damage to the heart (from heart disease or heart attack)</span></li><span data-dcnode-id="1793" instrument_node="">
</span><li data-dcnode-id="1791"><span data-dcnode-id="1792" instrument_node="">Chronic inflammation</span></li><span data-dcnode-id="1790" instrument_node="">
</span><li data-dcnode-id="1788"><span data-dcnode-id="1789" instrument_node="">Hypotension (low blood pressure)</span></li><span data-dcnode-id="1787" instrument_node="">
</span><li data-dcnode-id="1785"><span data-dcnode-id="1786" instrument_node="">Medication side effects</span></li><span data-dcnode-id="1784" instrument_node="">
</span><li data-dcnode-id="1782"><span data-dcnode-id="1783" instrument_node="">Myocarditis (a heart infection)</span></li><span data-dcnode-id="1781" instrument_node="">
</span><li data-dcnode-id="1779"><span data-dcnode-id="1780" instrument_node="">Problems with the heart’s conduction system&nbsp;</span></li><span data-dcnode-id="1778" instrument_node="">
</span><li data-dcnode-id="1776"><span data-dcnode-id="1777" instrument_node="">Sleep apnea</span></li><span data-dcnode-id="1775" instrument_node="">
</span></ul><span data-dcnode-id="1773" instrument_node="">
</span></div><span data-dcnode-id="1771" instrument_node="">
</span><div data-dcnode-id="1766"><span data-dcnode-id="1770" instrument_node="">
</span><p data-dcnode-id="1768"><span data-dcnode-id="1769" instrument_node="">&nbsp;</span></p><span data-dcnode-id="1767" instrument_node="">
</span></div><span data-dcnode-id="1765" instrument_node="">
</span><h3 data-dcnode-id="1763"><span data-dcnode-id="1764" instrument_node="">What Is A High Heart Rate?</span></h3><span data-dcnode-id="1762" instrument_node="">
</span><p data-dcnode-id="1755"><span data-dcnode-id="1761" instrument_node="">A high heart rate, or tachycardia, is generally a heart rate over 100 bpm for adults </span><strong data-dcnode-id="1757"><a data-dcnode-id="1759" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.heart.org/en/health-topics/arrhythmia/about-arrhythmia/tachycardia--fast-heart-rate" rel="noopener" target="_blank"><span data-dcnode-id="1760" instrument_node="">(10</span></a><span data-dcnode-id="1758" instrument_node="">)</span></strong><span data-dcnode-id="1756" instrument_node="">. But what’s too fast for you depends on your age and physical condition. Having a high heart rate is usually only dangerous when there isn’t an obvious cause.</span></p><span data-dcnode-id="1754" instrument_node="">
</span><p data-dcnode-id="1751"><strong data-dcnode-id="1752"><span data-dcnode-id="1753" instrument_node="">Underlying health conditions that raise heart rate include:</span></strong></p><span data-dcnode-id="1750" instrument_node="">
</span><ul data-dcnode-id="1730"><span data-dcnode-id="1749" instrument_node="">
</span><li data-dcnode-id="1747"><span data-dcnode-id="1748" instrument_node="">Anemia&nbsp;</span></li><span data-dcnode-id="1746" instrument_node="">
</span><li data-dcnode-id="1744"><span data-dcnode-id="1745" instrument_node="">Congenital heart disease</span></li><span data-dcnode-id="1743" instrument_node="">
</span><li data-dcnode-id="1741"><span data-dcnode-id="1742" instrument_node="">Heart Disease that affects blood flow</span></li><span data-dcnode-id="1740" instrument_node="">
</span><li data-dcnode-id="1738"><span data-dcnode-id="1739" instrument_node="">Hyperthyroidism</span></li><span data-dcnode-id="1737" instrument_node="">
</span><li data-dcnode-id="1735"><span data-dcnode-id="1736" instrument_node="">Heart injury: for example, a heart attack</span></li><span data-dcnode-id="1734" instrument_node="">
</span><li data-dcnode-id="1732"><span data-dcnode-id="1733" instrument_node="">Ventricular or supraventricular arrhythmias</span></li><span data-dcnode-id="1731" instrument_node="">
</span></ul><span data-dcnode-id="1729" instrument_node="">
</span><p data-dcnode-id="1723"><span data-dcnode-id="1728" instrument_node="">Without proper treatment, tachycardia can cause the following:(</span><strong data-dcnode-id="1724"><a data-dcnode-id="1726" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.ncbi.nlm.nih.gov/books/NBK553128/" rel="noopener" target="_blank"><span data-dcnode-id="1727" instrument_node="">11</span></a><span data-dcnode-id="1725" instrument_node="">)</span></strong></p><span data-dcnode-id="1722" instrument_node="">
</span><ul data-dcnode-id="1702"><span data-dcnode-id="1721" instrument_node="">
</span><li data-dcnode-id="1719"><span data-dcnode-id="1720" instrument_node="">Cardiac arrest or death</span></li><span data-dcnode-id="1718" instrument_node="">
</span><li data-dcnode-id="1716"><span data-dcnode-id="1717" instrument_node="">Chest pain</span></li><span data-dcnode-id="1715" instrument_node="">
</span><li data-dcnode-id="1713"><span data-dcnode-id="1714" instrument_node="">Fainting or feeling dizzy</span></li><span data-dcnode-id="1712" instrument_node="">
</span><li data-dcnode-id="1710"><span data-dcnode-id="1711" instrument_node="">Heart damage</span></li><span data-dcnode-id="1709" instrument_node="">
</span><li data-dcnode-id="1707"><span data-dcnode-id="1708" instrument_node="">Organ failure</span></li><span data-dcnode-id="1706" instrument_node="">
</span><li data-dcnode-id="1704"><span data-dcnode-id="1705" instrument_node="">Stroke</span></li><span data-dcnode-id="1703" instrument_node="">
</span></ul><span data-dcnode-id="1701" instrument_node="">
</span><p data-dcnode-id="1699"><span data-dcnode-id="1700" instrument_node="">&nbsp;</span></p><span data-dcnode-id="1698" instrument_node="">
</span><p data-dcnode-id="1693"><span data-dcnode-id="1697" instrument_node="">Learn more about heart rates in </span><a data-dcnode-id="1694" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//agelessinvesting.com/what-is-a-dangerous-heart-rate/"><strong data-dcnode-id="1695"><span data-dcnode-id="1696" instrument_node="">What Is A Dangerous Heart Rate?</span></strong></a></p><span data-dcnode-id="1692" instrument_node="">
</span><p data-dcnode-id="1690"><span data-dcnode-id="1691" instrument_node="">&nbsp;</span></p><span data-dcnode-id="1689" instrument_node="">
</span><h2 data-dcnode-id="1687"><span data-dcnode-id="1688" instrument_node="">3. What Is Respiration Rate?</span></h2><span data-dcnode-id="1686" instrument_node="">
</span><p data-dcnode-id="1674"><span data-dcnode-id="1685" instrument_node="">Respiration rate is the number of breaths you take in one minute at rest (</span><strong data-dcnode-id="1681"><a data-dcnode-id="1683" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.verywellhealth.com/what-is-a-normal-respiratory-rate-2248932" rel="noopener" target="_blank"><span data-dcnode-id="1684" instrument_node="">12</span></a><span data-dcnode-id="1682" instrument_node="">)</span></strong><span data-dcnode-id="1680" instrument_node="">. The normal respiration rate for adults is 12 to 18 breaths per minute. Generally, women have slightly faster respiration rates than men</span><strong data-dcnode-id="1675"><span data-dcnode-id="1679" instrument_node=""> (</span><a data-dcnode-id="1677" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//breathe.ersjournals.com/content/14/2/131" rel="noopener" target="_blank"><span data-dcnode-id="1678" instrument_node="">13</span></a><span data-dcnode-id="1676" instrument_node="">).</span></strong></p><span data-dcnode-id="1673" instrument_node="">
</span><p data-dcnode-id="1671"><span data-dcnode-id="1672" instrument_node="">If your oxygen level in your blood is low, or your carbon dioxide level in your blood is high, your brain tells your body to breathe more frequently.</span></p><span data-dcnode-id="1670" instrument_node="">
</span><p data-dcnode-id="1659"><span data-dcnode-id="1669" instrument_node="">The respiratory rate is the most neglected vital sign. But it’s more sensitive than the other vital signs in detecting critically ill patients </span><strong data-dcnode-id="1666"><a aria-expanded="false" aria-haspopup="true" data-bk-pop-href="#article-41801.r13" data-dcnode-id="1667" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.ncbi.nlm.nih.gov/books/NBK553213/" role="button"><span data-dcnode-id="1668" instrument_node="">(14). </span></a></strong><span data-dcnode-id="1665" instrument_node="">One study found that elevated respiration rate was a better predictor of stable versus unstable patients than blood pressure or pulse rate </span><strong data-dcnode-id="1660"><span data-dcnode-id="1661" style="color: #33cccc;"><a class="broken_link" data-dcnode-id="1662" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//associationofanaesthetists-publications.onlinelibrary.wiley.com/doi/full/10.1046/j.1365-2044.2003.03258.x%3Fsid%3Dnlm%253Apubmed" rel="noopener" target="_blank"><span class="mntl-inline-citation mntl-dynamic-tooltip--trigger" data-dcnode-id="1663" data-id="#citation-5" data-tooltip-position-x="center" data-tooltip-position-y="top"><span data-dcnode-id="1664" instrument_node="">(15).</span></span></a></span></strong></p><span data-dcnode-id="1658" instrument_node="">
</span><div class="mntl-dynamic-tooltip" data-dcnode-id="1650" data-tracking-container="true" id="mntl-dynamic-tooltip"><span data-dcnode-id="1657" instrument_node="">
</span><div class="mntl-dynamic-tooltip--content" data-dcnode-id="1652"><span data-dcnode-id="1656" instrument_node="">
