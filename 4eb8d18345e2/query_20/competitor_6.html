</span><meta content="The function of the right ventricle determines the fate of patients with pulmonary hypertension. Since right heart failure is the consequence of increased afterload, a full physiological description of the cardiopulmonary unit consisting of both the right ventricle and pulmonary vascular system is required to interpret clinical data correctly. Here, we provide such a description of the unit and its components, including the functional interactions between the right ventricle and its load. This physiological description is used to provide a framework for the interpretation of right heart catheterisation data as well as imaging data of the right ventricle obtained by echocardiography or magnetic resonance imaging. Finally, an update is provided on the latest insights in the pathobiology of right ventricular failure, including key pathways of molecular adaptation of the pressure overloaded right ventricle. Based on these outcomes, future directions for research are proposed.

</span><meta content="The function of the right ventricle determines the fate of patients with pulmonary hypertension. Since right heart failure is the consequence of increased afterload, a full physiological description of the cardiopulmonary unit consisting of both the right ventricle and pulmonary vascular system is required to interpret clinical data correctly. Here, we provide such a description of the unit and its components, including the functional interactions between the right ventricle and its load. This physiological description is used to provide a framework for the interpretation of right heart catheterisation data as well as imaging data of the right ventricle obtained by echocardiography or magnetic resonance imaging. Finally, an update is provided on the latest insights in the pathobiology of right ventricular failure, including key pathways of molecular adaptation of the pressure overloaded right ventricle. Based on these outcomes, future directions for research are proposed.

</span><div class="highwire-markup" data-dcnode-id="1798"><div class="content-block-markup" data-dcnode-id="1799" data-highwire-cite-ref-tooltip-instance="highwire_reflinks_tooltip" xmlns="http://www.w3.org/1999/xhtml" xmlns:xhtml="http://www.w3.org/1999/xhtml"><div class="article fulltext-view" data-dcnode-id="1801"><span class="highwire-journal-article-marker-start" data-dcnode-id="9586"></span><div class="section abstract" data-dcnode-id="9581" id="abstract-1"><h2 data-dcnode-id="9584"><span data-dcnode-id="9585" instrument_node="">Abstract</span></h2><p data-dcnode-id="9582" id="p-2"><span data-dcnode-id="9583" instrument_node="">The function of the right ventricle determines the fate of patients with pulmonary hypertension. Since right heart failure is the consequence of increased afterload, a full physiological description of the cardiopulmonary unit consisting of both the right ventricle and pulmonary vascular system is required to interpret clinical data correctly. Here, we provide such a description of the unit and its components, including the functional interactions between the right ventricle and its load. This physiological description is used to provide a framework for the interpretation of right heart catheterisation data as well as imaging data of the right ventricle obtained by echocardiography or magnetic resonance imaging. Finally, an update is provided on the latest insights in the pathobiology of right ventricular failure, including key pathways of molecular adaptation of the pressure overloaded right ventricle. Based on these outcomes, future directions for research are proposed.</span></p></div><div class="section short-abstract tweetShortAbstract-processed" data-dcnode-id="9568" id="abstract-2"><h2 data-dcnode-id="9579"><span data-dcnode-id="9580" instrument_node="">Tweetable abstract @ERSpublications</span></h2><div class="short-abstract-content" data-dcnode-id="9569"><div class="abstract-twitter-link" data-dcnode-id="9576"><a class="click-tweet-button" data-dcnode-id="9577" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//twitter.com/intent/tweet%3Foriginal_referer%3Dhttps%3A//erj.ersjournals.com/content/53/1/1801900%26text%3DState%2520of%2520the%2520art%2520and%2520research%2520perspectives%2520in%2520pathophysiology%2520of%2520the%2520right%2520ventricle%2520and%2520of%2520the%2520pulmonary%2520circulation%2520in%2520pulmonary%2520hypertension%2520with%2520theoretical%2520and%2520practical%2520aspects%2520http%3A//ow.ly/18v830mgLiP"><span data-dcnode-id="9578" instrument_node="">click to tweet</span></a></div><p data-dcnode-id="9570" id="p-3"><strong data-dcnode-id="9574"><span data-dcnode-id="9575" instrument_node="">State of the art and research perspectives in pathophysiology of the right ventricle and of the pulmonary circulation in pulmonary hypertension with theoretical and practical aspects</span></strong><span data-dcnode-id="9573" instrument_node=""> </span><a data-dcnode-id="9571" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//ow.ly/18v830mgLiP"><span data-dcnode-id="9572" instrument_node="">http://ow.ly/18v830mgLiP</span></a></p></div></div><div class="section" data-dcnode-id="9435" id="sec-1"><h2 class="" data-dcnode-id="9566"><span data-dcnode-id="9567" instrument_node="">The cardiopulmonary unit: more than a sum of its parts</span></h2><p data-dcnode-id="9549" id="p-4"><span data-dcnode-id="9565" instrument_node="">The function of the right ventricle is of great clinical importance in severe pulmonary hypertension (PH) since it determines the outcome of the disease [</span><a class="xref-bibr" data-dcnode-id="9563" href="#ref-1" id="xref-ref-1-1"><span data-dcnode-id="9564" instrument_node="">1</span></a><span data-dcnode-id="9562" instrument_node="">, </span><a class="xref-bibr" data-dcnode-id="9560" href="#ref-2" id="xref-ref-2-1"><span data-dcnode-id="9561" instrument_node="">2</span></a><span data-dcnode-id="9559" instrument_node="">]. Given the fact that right heart failure in PH is the consequence of increased (arterial) afterload and not the mere consequence of a myocardial disease, a full description of the cardiopulmonary unit is required in the study of right heart failure (</span><a class="xref-fig" data-dcnode-id="9557" href="#F1" id="xref-fig-1-1"><span data-dcnode-id="9558" instrument_node="">figure 1a</span></a><span data-dcnode-id="9556" instrument_node=""> and b). The cardiopulmonary unit is composed of two main functional subsystems, </span><em data-dcnode-id="9554"><span data-dcnode-id="9555" instrument_node="">i.e.</span></em><span data-dcnode-id="9553" instrument_node=""> the right ventricle and the pulmonary vasculature, each having their own intrinsic characteristics (</span><a class="xref-fig" data-dcnode-id="9551" href="#F1" id="xref-fig-1-2"><span data-dcnode-id="9552" instrument_node="">figure 1b</span></a><span data-dcnode-id="9550" instrument_node="">). The ventricular pressure–volume loop analysis is central in understanding right ventricular physiology, while pressure–flow analysis is central in understanding pulmonary haemodynamics. For the right ventricle, intrinsic characteristics include contractility, chamber stiffness and, although perhaps less established, the time constant of ventricular relaxation (τ), which are all load independent; for the pulmonary vascular system, resistance and compliance provide intrinsic characteristics of the steady and pulsatile load.</span></p><div class="fig pos-float odd" data-dcnode-id="9501" id="F1"><div class="highwire-figure" data-dcnode-id="9531"><div class="fig-inline-img-wrapper" data-dcnode-id="9542"><div class="fig-inline-img" data-dcnode-id="9543"><a class="highwire-fragment fragment-images colorbox-load highwireFiguresMarkupProcessor-processed cboxElement" data-dcnode-id="9544" data-figure-caption="<div class=&quot;highwire-markup&quot;><div xmlns=&quot;http://www.w3.org/1999/xhtml&quot;>The cardiopulmonary system (CPS): a) function and b) characterisation. M<em>V</em><sub>O<sub>2</sub></sub>: myocardial oxygen consumption; RV: right ventricle; RA: right atrium; LA: left atrium; LV: left ventricle; <em>E</em><sub>es</sub>: end-systolic elastance; τ: time constant of ventricular relaxation; <em>E</em><sub>ed</sub>: end-diastolic elastance; PVR: pulmonary vascular resistance; PAC: pulmonary arterial compliance; <em>E</em><sub>a</sub>: arterial elastance; PAP: pulmonary arterial pressure; PAWP: pulmonary arterial wedge pressure; EF: ejection fraction; CO: cardiac output. Subsystems (or units: heart, respectively its load) are characterised by their intrinsic function, which can be derived from the ventricular pressure–volume relationship and the pulmonary pressure–flow relationship. The system parameters result from cardiopulmonary interaction.</div></div>" data-hide-link-title="0" data-icon-position="" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//erj.ersjournals.com/content/erj/53/1/1801900/F1.large.jpg%3Fwidth%3D800%26height%3D600%26carousel%3D1" rel="gallery-fragment-images-1480405563" title="The cardiopulmonary system (CPS): a) function and b) characterisation. MVO2: myocardial oxygen consumption; RV: right ventricle; RA: right atrium; LA: left atrium; LV: left ventricle; Ees: end-systolic elastance; τ: time constant of ventricular relaxation; Eed: end-diastolic elastance; PVR: pulmonary vascular resistance; PAC: pulmonary arterial compliance; Ea: arterial elastance; PAP: pulmonary arterial pressure; PAWP: pulmonary arterial wedge pressure; EF: ejection fraction; CO: cardiac output. Subsystems (or units: heart, respectively its load) are characterised by their intrinsic function, which can be derived from the ventricular pressure–volume relationship and the pulmonary pressure–flow relationship. The system parameters result from cardiopulmonary interaction."><span class="hw-responsive-img" data-dcnode-id="9545"><img alt="FIGURE&nbsp;1" class="highwire-fragment fragment-image lazyloaded" data-dcnode-id="9548" data-src="https://erj.ersjournals.com/content/erj/53/1/1801900/F1.medium.gif" height="144" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//erj.ersjournals.com/content/erj/53/1/1801900/F1.medium.gif&amp;raw" width="440"><noscript data-dcnode-id="9546"><span data-dcnode-id="9547" instrument_node="">&lt;img class="highwire-fragment fragment-image" alt="FIGURE&amp;#xA0;1" src="https://erj.ersjournals.com/content/erj/53/1/1801900/F1.medium.gif" width="440" height="144"/&gt;</span></noscript></span></a></div></div><ul class="highwire-figure-links inline" data-dcnode-id="9532"><li class="download-fig first" data-dcnode-id="9539"><a class="highwire-figure-link highwire-figure-link-download" data-dcnode-id="9540" data-hide-link-title="0" data-icon-position="" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//erj.ersjournals.com/content/erj/53/1/1801900/F1.large.jpg%3Fdownload%3Dtrue" title="Download FIGURE&nbsp;1"><span data-dcnode-id="9541" instrument_node="">Download figure</span></a></li><li class="new-tab" data-dcnode-id="9536"><a class="highwire-figure-link highwire-figure-link-newtab" data-dcnode-id="9537" data-hide-link-title="0" data-icon-position="" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//erj.ersjournals.com/content/erj/53/1/1801900/F1.large.jpg" target="_blank"><span data-dcnode-id="9538" instrument_node="">Open in new tab</span></a></li><li class="download-ppt last" data-dcnode-id="9533"><a class="highwire-figure-link highwire-figure-link-ppt" data-dcnode-id="9534" data-hide-link-title="0" data-icon-position="" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//erj.ersjournals.com/highwire/powerpoint/154421"><span data-dcnode-id="9535" instrument_node="">Download powerpoint</span></a></li></ul></div><div class="fig-caption" data-dcnode-id="9502" xmlns:xhtml="http://www.w3.org/1999/xhtml"><span class="fig-label" data-dcnode-id="9529"><span data-dcnode-id="9530" instrument_node="">FIGURE&nbsp;1</span></span><span data-dcnode-id="9528" instrument_node=""> </span><p class="first-child" data-dcnode-id="9504" id="p-5"><span data-dcnode-id="9527" instrument_node="">The cardiopulmonary system (CPS): a) function and b) characterisation. M</span><em data-dcnode-id="9525"><span data-dcnode-id="9526" instrument_node="">V</span></em><sub data-dcnode-id="9521"><span data-dcnode-id="9524" instrument_node="">O</span><sub data-dcnode-id="9522"><span data-dcnode-id="9523" instrument_node="">2</span></sub></sub><span data-dcnode-id="9520" instrument_node="">: myocardial oxygen consumption; RV: right ventricle; RA: right atrium; LA: left atrium; LV: left ventricle; </span><em data-dcnode-id="9518"><span data-dcnode-id="9519" instrument_node="">E</span></em><sub data-dcnode-id="9516"><span data-dcnode-id="9517" instrument_node="">es</span></sub><span data-dcnode-id="9515" instrument_node="">: end-systolic elastance; τ: time constant of ventricular relaxation; </span><em data-dcnode-id="9513"><span data-dcnode-id="9514" instrument_node="">E</span></em><sub data-dcnode-id="9511"><span data-dcnode-id="9512" instrument_node="">ed</span></sub><span data-dcnode-id="9510" instrument_node="">: end-diastolic elastance; PVR: pulmonary vascular resistance; PAC: pulmonary arterial compliance; </span><em data-dcnode-id="9508"><span data-dcnode-id="9509" instrument_node="">E</span></em><sub data-dcnode-id="9506"><span data-dcnode-id="9507" instrument_node="">a</span></sub><span data-dcnode-id="9505" instrument_node="">: arterial elastance; PAP: pulmonary arterial pressure; PAWP: pulmonary arterial wedge pressure; EF: ejection fraction; CO: cardiac output. Subsystems (or units: heart, respectively its load) are characterised by their intrinsic function, which can be derived from the ventricular pressure–volume relationship and the pulmonary pressure–flow relationship. The system parameters result from cardiopulmonary interaction.</span></p><div class="sb-div caption-clear" data-dcnode-id="9503"></div></div></div><p data-dcnode-id="9496" id="p-6"><span data-dcnode-id="9500" instrument_node="">The interaction between the intrinsic ventricular characteristics and load results in global function, and is commonly described by cardiac output (CO) and ejection fraction (EF), on the one hand, and pressure (mean, systolic and diastolic pressure), on the other hand. The pressure gradient over the pulmonary circulation also falls into this category. Energy transfer of right ventricular to arterial load is a special form of interaction for which we reserve the term “coupling”. The concept of coupling is particularly important in physiologically describing the continuum of ventricular adaptation in pulmonary arterial hypertension (PAH): well-adapted right ventricles often have preserved ventriculo-arterial coupling, while maladapted right ventricles have varying degrees of altered ventriculo-arterial coupling (</span><a class="xref-fig" data-dcnode-id="9498" href="#F2" id="xref-fig-2-1"><span data-dcnode-id="9499" instrument_node="">figure 2</span></a><span data-dcnode-id="9497" instrument_node="">). These concepts will be discussed in more detail in the following section.</span></p><div class="fig pos-float odd" data-dcnode-id="9449" id="F2"><div class="highwire-figure" data-dcnode-id="9478"><div class="fig-inline-img-wrapper" data-dcnode-id="9489"><div class="fig-inline-img" data-dcnode-id="9490"><a class="highwire-fragment fragment-images colorbox-load highwireFiguresMarkupProcessor-processed cboxElement" data-dcnode-id="9491" data-figure-caption="<div class=&quot;highwire-markup&quot;><div xmlns=&quot;http://www.w3.org/1999/xhtml&quot;>Right ventricular (RV) pressure–volume analysis. Pressure–volume loops at three different stages: normal (blue), pulmonary hypertension (green) and right ventricular failure (purple). <em>E</em><sub>es</sub>: end-systolic elastance; <em>E</em><sub>a</sub>: arterial elastance; τ: time constant of ventricular relaxation. <em>P</em>=α(e<sup>β<em>V</em></sup>−1) describes the diastolic pressure–volume relation. Reproduced and modified from [11] with permission.</div></div>" data-hide-link-title="0" data-icon-position="" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//erj.ersjournals.com/content/erj/53/1/1801900/F2.large.jpg%3Fwidth%3D800%26height%3D600%26carousel%3D1" rel="gallery-fragment-images-1480405563" title="Right ventricular (RV) pressure–volume analysis. Pressure–volume loops at three different stages: normal (blue), pulmonary hypertension (green) and right ventricular failure (purple). Ees: end-systolic elastance; Ea: arterial elastance; τ: time constant of ventricular relaxation. P=α(eβV−1) describes the diastolic pressure–volume relation. Reproduced and modified from [11] with permission."><span class="hw-responsive-img" data-dcnode-id="9492"><img alt="FIGURE&nbsp;2" class="highwire-fragment fragment-image lazyloaded" data-dcnode-id="9495" data-src="https://erj.ersjournals.com/content/erj/53/1/1801900/F2.medium.gif" height="344" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//erj.ersjournals.com/content/erj/53/1/1801900/F2.medium.gif&amp;raw" width="440"><noscript data-dcnode-id="9493"><span data-dcnode-id="9494" instrument_node="">&lt;img class="highwire-fragment fragment-image" alt="FIGURE&amp;#xA0;2" src="https://erj.ersjournals.com/content/erj/53/1/1801900/F2.medium.gif" width="440" height="344"/&gt;</span></noscript></span></a></div></div><ul class="highwire-figure-links inline" data-dcnode-id="9479"><li class="download-fig first" data-dcnode-id="9486"><a class="highwire-figure-link highwire-figure-link-download" data-dcnode-id="9487" data-hide-link-title="0" data-icon-position="" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//erj.ersjournals.com/content/erj/53/1/1801900/F2.large.jpg%3Fdownload%3Dtrue" title="Download FIGURE&nbsp;2"><span data-dcnode-id="9488" instrument_node="">Download figure</span></a></li><li class="new-tab" data-dcnode-id="9483"><a class="highwire-figure-link highwire-figure-link-newtab" data-dcnode-id="9484" data-hide-link-title="0" data-icon-position="" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//erj.ersjournals.com/content/erj/53/1/1801900/F2.large.jpg" target="_blank"><span data-dcnode-id="9485" instrument_node="">Open in new tab</span></a></li><li class="download-ppt last" data-dcnode-id="9480"><a class="highwire-figure-link highwire-figure-link-ppt" data-dcnode-id="9481" data-hide-link-title="0" data-icon-position="" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//erj.ersjournals.com/highwire/powerpoint/154469"><span data-dcnode-id="9482" instrument_node="">Download powerpoint</span></a></li></ul></div><div class="fig-caption" data-dcnode-id="9450"><span class="fig-label" data-dcnode-id="9476"><span data-dcnode-id="9477" instrument_node="">FIGURE&nbsp;2</span></span><span data-dcnode-id="9475" instrument_node=""> </span><p class="first-child" data-dcnode-id="9452" id="p-7"><span data-dcnode-id="9474" instrument_node="">Right ventricular (RV) pressure–volume analysis. Pressure–volume loops at three different stages: normal (blue), pulmonary hypertension (green) and right ventricular failure (purple). </span><em data-dcnode-id="9472"><span data-dcnode-id="9473" instrument_node="">E</span></em><sub data-dcnode-id="9470"><span data-dcnode-id="9471" instrument_node="">es</span></sub><span data-dcnode-id="9469" instrument_node="">: end-systolic elastance; </span><em data-dcnode-id="9467"><span data-dcnode-id="9468" instrument_node="">E</span></em><sub data-dcnode-id="9465"><span data-dcnode-id="9466" instrument_node="">a</span></sub><span data-dcnode-id="9464" instrument_node="">: arterial elastance; τ: time constant of ventricular relaxation. </span><em data-dcnode-id="9462"><span data-dcnode-id="9463" instrument_node="">P</span></em><span data-dcnode-id="9461" instrument_node="">=α(e</span><sup data-dcnode-id="9457"><span data-dcnode-id="9460" instrument_node="">β</span><em data-dcnode-id="9458"><span data-dcnode-id="9459" instrument_node="">V</span></em></sup><span data-dcnode-id="9456" instrument_node="">−1) describes the diastolic pressure–volume relation. Reproduced and modified from [</span><a class="xref-bibr" data-dcnode-id="9454" href="#ref-11" id="xref-ref-11-1"><span data-dcnode-id="9455" instrument_node="">11</span></a><span data-dcnode-id="9453" instrument_node="">] with permission.</span></p><div class="sb-div caption-clear" data-dcnode-id="9451"></div></div></div><p data-dcnode-id="9436" id="p-8"><span data-dcnode-id="9448" instrument_node="">This distinction between intrinsic characteristic of a subsystem and global function or system characteristics has important physiological implications. For example, despite the decrease in right ventricular EF (RVEF) in patients with PAH, right ventricle contractility as measured by ventricular elastance (</span><em data-dcnode-id="9446"><span data-dcnode-id="9447" instrument_node="">i.e.</span></em><span data-dcnode-id="9445" instrument_node=""> end-systolic elastance (</span><em data-dcnode-id="9443"><span data-dcnode-id="9444" instrument_node="">E</span></em><sub data-dcnode-id="9441"><span data-dcnode-id="9442" instrument_node="">es</span></sub><span data-dcnode-id="9440" instrument_node="">)) is usually increased and not decreased [</span><a class="xref-bibr" data-dcnode-id="9438" href="#ref-3" id="xref-ref-3-1"><span data-dcnode-id="9439" instrument_node="">3</span></a><span data-dcnode-id="9437" instrument_node="">].</span></p></div><div class="section" data-dcnode-id="9341" id="sec-2"><h2 class="" data-dcnode-id="9433"><span data-dcnode-id="9434" instrument_node="">Definitions</span></h2><p data-dcnode-id="9431"><span data-dcnode-id="9432" instrument_node="">The current section presents some definitions that may help standardise important concepts relevant to the field of right ventricular adaptation and right heart failure.
</span></p><ul class="list-unord" data-dcnode-id="9371" id="list-1"><li data-dcnode-id="9426" id="list-item-1"><p data-dcnode-id="9427" id="p-10"><em data-dcnode-id="9429"><span data-dcnode-id="9430" instrument_node="">Right heart failure</span></em><span data-dcnode-id="9428" instrument_node=""> in PH can be defined as a clinical syndrome characterised by decreased right ventricular function that leads to insufficient blood flow and/or elevated filling pressures at rest or during physiologically demanding conditions, such as exercise, developmental growth or pregnancy. The cardinal symptoms of right heart failure include dyspnoea and fatigue as well as congestion. The severity of heart failure is often subcategorised according to New&nbsp;York Heart Association (NYHA) Functional Class and by the degree of congestion.</span></p></li><li data-dcnode-id="9418" id="list-item-2"><p data-dcnode-id="9419" id="p-11"><em data-dcnode-id="9424"><span data-dcnode-id="9425" instrument_node="">Right ventricular adaptation</span></em><span data-dcnode-id="9423" instrument_node=""> in PH represents a continuum with an adapted right ventricle at one end and a maladapted ventricle at the other end. An adapted right ventricle in PH is characterised by a slightly dilated right ventricle with preserved stroke volume (SV), systolic function and normal filling pressures, whereas a maladapted right ventricle is characterised by a dilated right ventricle with reduced SV, systolic function and increased filling pressures. As will be discussed in the following section, adapted ventricles usually have preserved ventriculo-arterial coupling, while maladapted ventricles usually have uncoupled ventricles (</span><a class="xref-fig" data-dcnode-id="9421" href="#F2" id="xref-fig-2-2"><span data-dcnode-id="9422" instrument_node="">figure 2</span></a><span data-dcnode-id="9420" instrument_node="">).</span></p></li><li data-dcnode-id="9398" id="list-item-3"><p data-dcnode-id="9399" id="p-12"><em data-dcnode-id="9416"><span data-dcnode-id="9417" instrument_node="">Subsystem function (intrinsic properties of the cardiac or pulmonary vascular system)</span></em><span data-dcnode-id="9415" instrument_node="">: description of the right ventricle in a load-independent manner (</span><em data-dcnode-id="9413"><span data-dcnode-id="9414" instrument_node="">E</span></em><sub data-dcnode-id="9411"><span data-dcnode-id="9412" instrument_node="">es</span></sub><span data-dcnode-id="9410" instrument_node=""> and end-diastolic elastance (</span><em data-dcnode-id="9408"><span data-dcnode-id="9409" instrument_node="">E</span></em><sub data-dcnode-id="9406"><span data-dcnode-id="9407" instrument_node="">ed</span></sub><span data-dcnode-id="9405" instrument_node="">)) or pulmonary vascular load in a manner independent of right ventricular function (pulmonary arterial vascular resistance (PVR), or arterial elastance (</span><em data-dcnode-id="9403"><span data-dcnode-id="9404" instrument_node="">E</span></em><sub data-dcnode-id="9401"><span data-dcnode-id="9402" instrument_node="">a</span></sub><span data-dcnode-id="9400" instrument_node="">), and pulmonary arterial compliance (PAC)).</span></p></li><li data-dcnode-id="9390" id="list-item-4"><p data-dcnode-id="9391" id="p-13"><em data-dcnode-id="9396"><span data-dcnode-id="9397" instrument_node="">System function</span></em><span data-dcnode-id="9395" instrument_node=""> results from the interaction of the two subsystems, </span><em data-dcnode-id="9393"><span data-dcnode-id="9394" instrument_node="">i.e.</span></em><span data-dcnode-id="9392" instrument_node=""> the ventricular pump and its afterload. Interaction results in SV, CO, pressure and functional imaging parameters derived by echocardiography or cardiovascular magnetic resonance imaging (CMR). Descriptions of systolic function as RVEF or SV/right ventricular end-systolic volume (ESV) are also the result of functional interaction and not surrogates for coupling.</span></p></li><li data-dcnode-id="9372" id="list-item-5"><p data-dcnode-id="9373" id="p-14"><em data-dcnode-id="9388"><span data-dcnode-id="9389" instrument_node="">Coupling</span></em><span data-dcnode-id="9387" instrument_node="">: the condition that occurs when right ventricular function is adapted to the pulmonary vascular load such that energy transfer is most efficient. This coupling is described by systolic and arterial elastance, </span><em data-dcnode-id="9385"><span data-dcnode-id="9386" instrument_node="">E</span></em><sub data-dcnode-id="9383"><span data-dcnode-id="9384" instrument_node="">es</span></sub><span data-dcnode-id="9382" instrument_node="">/</span><em data-dcnode-id="9380"><span data-dcnode-id="9381" instrument_node="">E</span></em><sub data-dcnode-id="9378"><span data-dcnode-id="9379" instrument_node="">a</span></sub><span data-dcnode-id="9377" instrument_node=""> (</span><a class="xref-fig" data-dcnode-id="9375" href="#F1" id="xref-fig-1-3"><span data-dcnode-id="9376" instrument_node="">figures 1b</span></a><span data-dcnode-id="9374" instrument_node=""> and 2).</span></p></li></ul><p data-dcnode-id="9342"><span data-dcnode-id="9370" instrument_node="">Although this article focuses on the right ventricle, it is noteworthy that ventricular interdependency plays an important role in PH. Not only the right ventricle but also the left ventricle is involved in PH since the right ventricle and left ventricle have the septum in common, are encircled with common myocardial fibres and are within a (not acutely) distensible pericardium (</span><a class="xref-fig" data-dcnode-id="9368" href="#F1" id="xref-fig-1-4"><span data-dcnode-id="9369" instrument_node="">figure 1a</span></a><span data-dcnode-id="9367" instrument_node="">) [</span><a class="xref-bibr" data-dcnode-id="9365" href="#ref-4" id="xref-ref-4-1"><span data-dcnode-id="9366" instrument_node="">4</span></a><span data-dcnode-id="9364" instrument_node="">, </span><a class="xref-bibr" data-dcnode-id="9362" href="#ref-5" id="xref-ref-5-1"><span data-dcnode-id="9363" instrument_node="">5</span></a><span data-dcnode-id="9361" instrument_node="">]. This ventricular interdependency becomes visible in PH as rapid leftward bowing of the septum during early left ventricle diastole. This typical septal motion abnormality has been shown to be a consequence of a prolonged contraction of the right ventricle free wall relative to that of the septum and the left ventricle free wall, causing interventricular relaxation dyssynchrony [</span><a class="xref-bibr" data-dcnode-id="9359" href="#ref-6" id="xref-ref-6-1"><span data-dcnode-id="9360" instrument_node="">6</span></a><span data-dcnode-id="9358" instrument_node="">, </span><a class="xref-bibr" data-dcnode-id="9356" href="#ref-7" id="xref-ref-7-1"><span data-dcnode-id="9357" instrument_node="">7</span></a><span data-dcnode-id="9355" instrument_node="">]. As such, the septum acts as a whistleblower of a right–left ventricular tissue load imbalance, reflecting right ventricular tissue overload in the setting of PH. This rapid early-diastolic leftward motion of the septum is also associated with septal and left ventricular myocardial stretch during late right ventricular ejection [</span><a class="xref-bibr" data-dcnode-id="9353" href="#ref-8" id="xref-ref-8-1"><span data-dcnode-id="9354" instrument_node="">8</span></a><span data-dcnode-id="9352" instrument_node="">], causing mechanical inefficiency of the right ventricle and contributing to left ventricular underfilling [</span><a class="xref-bibr" data-dcnode-id="9350" href="#ref-9" id="xref-ref-9-1"><span data-dcnode-id="9351" instrument_node="">9</span></a><span data-dcnode-id="9349" instrument_node="">] and atrophy [</span><a class="xref-bibr" data-dcnode-id="9347" href="#ref-10" id="xref-ref-10-1"><span data-dcnode-id="9348" instrument_node="">10</span></a><span data-dcnode-id="9346" instrument_node="">]. The septal curvature is a useful metric in PH, reflecting both the interventricular pressure gradient and relative interventricular size, as well as dyssynchrony of contraction [</span><a class="xref-bibr" data-dcnode-id="9344" href="#ref-7" id="xref-ref-7-2"><span data-dcnode-id="9345" instrument_node="">7</span></a><span data-dcnode-id="9343" instrument_node="">].</span></p></div><div class="section" data-dcnode-id="9146" id="sec-3"><h2 class="" data-dcnode-id="9339"><span data-dcnode-id="9340" instrument_node="">Assessment of the right ventricle in a load-independent manner</span></h2><p data-dcnode-id="9328" id="p-15"><span data-dcnode-id="9338" instrument_node="">Right ventricular function can be characterised by the pressure–volume relation (</span><a class="xref-fig" data-dcnode-id="9336" href="#F2" id="xref-fig-2-3"><span data-dcnode-id="9337" instrument_node="">figure 2</span></a><span data-dcnode-id="9335" instrument_node="">) [</span><a class="xref-bibr" data-dcnode-id="9333" href="#ref-11" id="xref-ref-11-2"><span data-dcnode-id="9334" instrument_node="">11</span></a><span data-dcnode-id="9332" instrument_node="">], and measurement of right ventricular volumes and pressures are therefore useful for the assessment of the right ventricle in PH, particularly for physiological studies. A schematic overview of an approach to right ventricle phenotyping, integrating structural imaging, haemodynamics, molecular imaging and biomarkers is given in </span><a data-dcnode-id="9330" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//erj.ersjournals.com/lookup/doi/10.1183/13993003.01900-2018.figures-only%23fig-data-supplementary-materials"><span data-dcnode-id="9331" instrument_node="">supplementary figure S1a</span></a><span data-dcnode-id="9329" instrument_node="">.</span></p><div class="subsection" data-dcnode-id="9246" id="sec-4"><h3 data-dcnode-id="9326"><span data-dcnode-id="9327" instrument_node="">Systole</span></h3><p data-dcnode-id="9314" id="p-16"><em data-dcnode-id="9324"><span data-dcnode-id="9325" instrument_node="">E</span></em><sub data-dcnode-id="9322"><span data-dcnode-id="9323" instrument_node="">es</span></sub><span data-dcnode-id="9321" instrument_node=""> of the ventricle is a load-independent description of the right ventricle and the current reference measure of contractility; it depends on the contractile force of the myocyte and cardiac muscle mass (hypertrophy) [</span><a class="xref-bibr" data-dcnode-id="9319" href="#ref-12" id="xref-ref-12-1"><span data-dcnode-id="9320" instrument_node="">12</span></a><span data-dcnode-id="9318" instrument_node="">, </span><a class="xref-bibr" data-dcnode-id="9316" href="#ref-13" id="xref-ref-13-1"><span data-dcnode-id="9317" instrument_node="">13</span></a><span data-dcnode-id="9315" instrument_node="">].</span></p><p data-dcnode-id="9247" id="p-17"><span data-dcnode-id="9313" instrument_node="">The derivation of </span><em data-dcnode-id="9311"><span data-dcnode-id="9312" instrument_node="">E</span></em><sub data-dcnode-id="9309"><span data-dcnode-id="9310" instrument_node="">es</span></sub><span data-dcnode-id="9308" instrument_node=""> is based on the pressure–volume loop (</span><a class="xref-fig" data-dcnode-id="9306" href="#F2" id="xref-fig-2-4"><span data-dcnode-id="9307" instrument_node="">figure 2</span></a><span data-dcnode-id="9305" instrument_node="">). The best method to assess </span><em data-dcnode-id="9303"><span data-dcnode-id="9304" instrument_node="">E</span></em><sub data-dcnode-id="9301"><span data-dcnode-id="9302" instrument_node="">es</span></sub><span data-dcnode-id="9300" instrument_node=""> is to decrease ventricular filling, </span><em data-dcnode-id="9298"><span data-dcnode-id="9299" instrument_node="">e.g.</span></em><span data-dcnode-id="9297" instrument_node=""> by partial vena cava occlusion, and analyse the series of loops that result [</span><a class="xref-bibr" data-dcnode-id="9295" href="#ref-14" id="xref-ref-14-1"><span data-dcnode-id="9296" instrument_node="">14</span></a><span data-dcnode-id="9294" instrument_node="">]. Connection of the end-systolic pressure (</span><em data-dcnode-id="9292"><span data-dcnode-id="9293" instrument_node="">P</span></em><sub data-dcnode-id="9290"><span data-dcnode-id="9291" instrument_node="">es</span></sub><span data-dcnode-id="9289" instrument_node="">)–volume points results in the </span><em data-dcnode-id="9287"><span data-dcnode-id="9288" instrument_node="">P</span></em><sub data-dcnode-id="9285"><span data-dcnode-id="9286" instrument_node="">es</span></sub><span data-dcnode-id="9284" instrument_node="">–volume relation and its slope is </span><em data-dcnode-id="9282"><span data-dcnode-id="9283" instrument_node="">E</span></em><sub data-dcnode-id="9280"><span data-dcnode-id="9281" instrument_node="">es</span></sub><span data-dcnode-id="9279" instrument_node="">. Since this approach is invasive and not widely available in the clinic, single-beat methods have been developed [</span><a class="xref-bibr" data-dcnode-id="9277" href="#ref-13" id="xref-ref-13-2"><span data-dcnode-id="9278" instrument_node="">13</span></a><span data-dcnode-id="9276" instrument_node="">, </span><a class="xref-bibr" data-dcnode-id="9274" href="#ref-15" id="xref-ref-15-1"><span data-dcnode-id="9275" instrument_node="">15</span></a><span data-dcnode-id="9273" instrument_node="">]. </span><em data-dcnode-id="9271"><span data-dcnode-id="9272" instrument_node="">E</span></em><sub data-dcnode-id="9269"><span data-dcnode-id="9270" instrument_node="">es</span></sub><span data-dcnode-id="9268" instrument_node=""> can be increased 5-fold in PAH patients, reflecting that the right ventricle is performing at a high contractile state [</span><a class="xref-bibr" data-dcnode-id="9266" href="#ref-16" id="xref-ref-16-1"><span data-dcnode-id="9267" instrument_node="">16</span></a><span data-dcnode-id="9265" instrument_node="">]. In addition, the elastance response to pharmacological (usually dobutamine) or physiological stress (exercise) can be useful to assess contractile reserve. In the normal right ventricle, </span><em data-dcnode-id="9263"><span data-dcnode-id="9264" instrument_node="">E</span></em><sub data-dcnode-id="9261"><span data-dcnode-id="9262" instrument_node="">es</span></sub><span data-dcnode-id="9260" instrument_node=""> usually increases significantly with exercise [</span><a class="xref-bibr" data-dcnode-id="9258" href="#ref-3" id="xref-ref-3-2"><span data-dcnode-id="9259" instrument_node="">3</span></a><span data-dcnode-id="9257" instrument_node="">]. In the pressure overloaded right ventricle, although the baseline is higher than normal, the degree of increase is blunted with exercise or following dobutamine infusion [</span><a class="xref-bibr" data-dcnode-id="9255" href="#ref-3" id="xref-ref-3-3"><span data-dcnode-id="9256" instrument_node="">3</span></a><span data-dcnode-id="9254" instrument_node="">, </span><a class="xref-bibr" data-dcnode-id="9252" href="#ref-17" id="xref-ref-17-1"><span data-dcnode-id="9253" instrument_node="">17</span></a><span data-dcnode-id="9251" instrument_node="">]. Contractile reserve at exercise is absent in more advanced disease states or might even decrease [</span><a class="xref-bibr" data-dcnode-id="9249" href="#ref-3" id="xref-ref-3-4"><span data-dcnode-id="9250" instrument_node="">3</span></a><span data-dcnode-id="9248" instrument_node="">].</span></p></div><div class="subsection" data-dcnode-id="9147" id="sec-5"><h3 data-dcnode-id="9244"><span data-dcnode-id="9245" instrument_node="">Diastole</span></h3><p data-dcnode-id="9177" id="p-18"><span data-dcnode-id="9243" instrument_node="">In practice, right atrial pressure and central venous pressure are often used as surrogates for diastolic properties of the right ventricle; right atrial pressure has been consistently related to outcome in PAH starting with the original US National Institutes of Health registry study in 1991 [</span><a class="xref-bibr" data-dcnode-id="9241" href="#ref-18" id="xref-ref-18-1"><span data-dcnode-id="9242" instrument_node="">18</span></a><span data-dcnode-id="9240" instrument_node="">]. Using load-independent metrics has the advantage of allowing a better understanding of the responsiveness to volume status or change in filling conditions. </span><em data-dcnode-id="9238"><span data-dcnode-id="9239" instrument_node="">E</span></em><sub data-dcnode-id="9236"><span data-dcnode-id="9237" instrument_node="">ed</span></sub><span data-dcnode-id="9235" instrument_node=""> of the ventricle is a load-independent representation of the diastolic function and is best described by a diastolic elastance curve determined by multiple pressure–volume loops obtained by decreased loading by partial vena cave occlusion. The relation is curvilinear and the most adequate description is obtained by fitting the relation with an exponential curve through the diastolic pressure–volume points, with the formula </span><em data-dcnode-id="9233"><span data-dcnode-id="9234" instrument_node="">P</span></em><span data-dcnode-id="9232" instrument_node="">=α(e</span><sup data-dcnode-id="9228"><span data-dcnode-id="9231" instrument_node="">β</span><em data-dcnode-id="9229"><span data-dcnode-id="9230" instrument_node="">V</span></em></sup><span data-dcnode-id="9227" instrument_node="">−1), where α and β are curve-fitting constants (</span><a class="xref-fig" data-dcnode-id="9225" href="#F2" id="xref-fig-2-5"><span data-dcnode-id="9226" instrument_node="">figure 2</span></a><span data-dcnode-id="9224" instrument_node="">) [</span><a class="xref-bibr" data-dcnode-id="9222" href="#ref-11" id="xref-ref-11-3"><span data-dcnode-id="9223" instrument_node="">11</span></a><span data-dcnode-id="9221" instrument_node="">, </span><a class="xref-bibr" data-dcnode-id="9219" href="#ref-19" id="xref-ref-19-1"><span data-dcnode-id="9220" instrument_node="">19</span></a><span data-dcnode-id="9218" instrument_node="">]. A single-beat method has been developed to determine </span><em data-dcnode-id="9216"><span data-dcnode-id="9217" instrument_node="">E</span></em><sub data-dcnode-id="9214"><span data-dcnode-id="9215" instrument_node="">ed</span></sub><span data-dcnode-id="9213" instrument_node=""> [</span><a class="xref-bibr" data-dcnode-id="9211" href="#ref-20" id="xref-ref-20-1"><span data-dcnode-id="9212" instrument_node="">20</span></a><span data-dcnode-id="9210" instrument_node="">, </span><a class="xref-bibr" data-dcnode-id="9208" href="#ref-21" id="xref-ref-21-1"><span data-dcnode-id="9209" instrument_node="">21</span></a><span data-dcnode-id="9207" instrument_node="">]. </span><em data-dcnode-id="9205"><span data-dcnode-id="9206" instrument_node="">E</span></em><sub data-dcnode-id="9203"><span data-dcnode-id="9204" instrument_node="">ed</span></sub><span data-dcnode-id="9202" instrument_node=""> now can be calculated as </span><em data-dcnode-id="9200"><span data-dcnode-id="9201" instrument_node="">E</span></em><sub data-dcnode-id="9198"><span data-dcnode-id="9199" instrument_node="">ed</span></sub><span data-dcnode-id="9197" instrument_node="">=αβe</span><sup data-dcnode-id="9193"><span data-dcnode-id="9196" instrument_node="">β</span><em data-dcnode-id="9194"><span data-dcnode-id="9195" instrument_node="">V</span></em></sup><sub data-dcnode-id="9190"><sup data-dcnode-id="9191"><span data-dcnode-id="9192" instrument_node="">ed</span></sup></sub><span data-dcnode-id="9189" instrument_node="">, where </span><em data-dcnode-id="9187"><span data-dcnode-id="9188" instrument_node="">V</span></em><sub data-dcnode-id="9185"><span data-dcnode-id="9186" instrument_node="">ed</span></sub><span data-dcnode-id="9184" instrument_node=""> is the end-diastolic volume (EDV) [</span><a class="xref-bibr" data-dcnode-id="9182" href="#ref-21" id="xref-ref-21-2"><span data-dcnode-id="9183" instrument_node="">21</span></a><span data-dcnode-id="9181" instrument_node="">]. The so-defined diastolic stiffness predicts outcome in PAH as well as the more complex β calculation [</span><a class="xref-bibr" data-dcnode-id="9179" href="#ref-21" id="xref-ref-21-3"><span data-dcnode-id="9180" instrument_node="">21</span></a><span data-dcnode-id="9178" instrument_node="">].</span></p><p data-dcnode-id="9148" id="p-19"><span data-dcnode-id="9176" instrument_node="">Right ventricular diastolic function is closely associated with disease severity [</span><a class="xref-bibr" data-dcnode-id="9174" href="#ref-20" id="xref-ref-20-2"><span data-dcnode-id="9175" instrument_node="">20</span></a><span data-dcnode-id="9173" instrument_node="">], but also with </span><em data-dcnode-id="9171"><span data-dcnode-id="9172" instrument_node="">E</span></em><sub data-dcnode-id="9169"><span data-dcnode-id="9170" instrument_node="">es</span></sub><span data-dcnode-id="9168" instrument_node=""> [</span><a class="xref-bibr" data-dcnode-id="9166" href="#ref-21" id="xref-ref-21-4"><span data-dcnode-id="9167" instrument_node="">21</span></a><span data-dcnode-id="9165" instrument_node="">, </span><a class="xref-bibr" data-dcnode-id="9163" href="#ref-22" id="xref-ref-22-1"><span data-dcnode-id="9164" instrument_node="">22</span></a><span data-dcnode-id="9162" instrument_node="">]. Right ventricle diastolic stiffness in severe PH is accompanied by fibrosis and specific biological alterations, such as reduced titin phosphorylation [</span><a class="xref-bibr" data-dcnode-id="9160" href="#ref-20" id="xref-ref-20-3"><span data-dcnode-id="9161" instrument_node="">20</span></a><span data-dcnode-id="9159" instrument_node="">]. Although </span><em data-dcnode-id="9157"><span data-dcnode-id="9158" instrument_node="">E</span></em><sub data-dcnode-id="9155"><span data-dcnode-id="9156" instrument_node="">ed</span></sub><span data-dcnode-id="9154" instrument_node=""> is related to </span><em data-dcnode-id="9152"><span data-dcnode-id="9153" instrument_node="">E</span></em><sub data-dcnode-id="9150"><span data-dcnode-id="9151" instrument_node="">es</span></sub><span data-dcnode-id="9149" instrument_node="">, diastolic adaptability remains variable in patients with PH and whether it may serve as a biomarker of pending right ventricle failure is not completely resolved.</span></p></div></div><div class="section" data-dcnode-id="8897" id="sec-6"><h2 class="" data-dcnode-id="9144"><span data-dcnode-id="9145" instrument_node="">Assessment of the pulmonary circulation in a heart-independent manner</span></h2><div class="subsection" data-dcnode-id="9069" id="sec-7"><h3 data-dcnode-id="9142"><span data-dcnode-id="9143" instrument_node="">Pulmonary vascular resistance</span></h3><p data-dcnode-id="9106" id="p-20"><span data-dcnode-id="9141" instrument_node="">When analysing the pulmonary circulation, it is useful to distinguish a steady and pulsatile component of the load. These main components of arterial load are PVR and total PAC. In the pulmonary system these two components are inversely related (see later). PVR is calculated as PVR=(mPAP−PAWP)/CO, where mPAP is the mean pulmonary arterial pressure and PAWP is the pulmonary arterial wedge pressure. A measure of total load can also be estimated from the pressure–volume loop (</span><a class="xref-fig" data-dcnode-id="9139" href="#F2" id="xref-fig-2-6"><span data-dcnode-id="9140" instrument_node="">figure 2</span></a><span data-dcnode-id="9138" instrument_node="">) as </span><em data-dcnode-id="9136"><span data-dcnode-id="9137" instrument_node="">E</span></em><sub data-dcnode-id="9134"><span data-dcnode-id="9135" instrument_node="">a</span></sub><span data-dcnode-id="9133" instrument_node="">=</span><em data-dcnode-id="9131"><span data-dcnode-id="9132" instrument_node="">P</span></em><sub data-dcnode-id="9129"><span data-dcnode-id="9130" instrument_node="">es</span></sub><span data-dcnode-id="9128" instrument_node="">/SV. It has been proposed to use </span><em data-dcnode-id="9126"><span data-dcnode-id="9127" instrument_node="">E</span></em><sub data-dcnode-id="9124"><span data-dcnode-id="9125" instrument_node="">a</span></sub><span data-dcnode-id="9123" instrument_node="">∼mPAP/SV when </span><em data-dcnode-id="9121"><span data-dcnode-id="9122" instrument_node="">P</span></em><sub data-dcnode-id="9119"><span data-dcnode-id="9120" instrument_node="">es</span></sub><span data-dcnode-id="9118" instrument_node=""> is not available [</span><a class="xref-bibr" data-dcnode-id="9116" href="#ref-23" id="xref-ref-23-1"><span data-dcnode-id="9117" instrument_node="">23</span></a><span data-dcnode-id="9115" instrument_node="">]; however, this approximation should be used with caution since, especially in higher pressures ranges, </span><em data-dcnode-id="9113"><span data-dcnode-id="9114" instrument_node="">P</span></em><sub data-dcnode-id="9111"><span data-dcnode-id="9112" instrument_node="">es</span></sub><span data-dcnode-id="9110" instrument_node=""> is underestimated by mPAP [</span><a class="xref-bibr" data-dcnode-id="9108" href="#ref-24" id="xref-ref-24-1"><span data-dcnode-id="9109" instrument_node="">24</span></a><span data-dcnode-id="9107" instrument_node="">].</span></p><p data-dcnode-id="9086" id="p-21"><span data-dcnode-id="9105" instrument_node="">Pulmonary capillary flow is a dynamic process. In basal states, flow through an individual capillary is intermittent. Capillary recruitment occurs when the probability of a given capillary carrying flow increases. Capillary recruitment and distension both play a role in the lung's accommodation of pulmonary arterial blood flow. At basal or moderately increased blood flows, capillary recruitment is predominant [</span><a class="xref-bibr" data-dcnode-id="9103" href="#ref-25" id="xref-ref-25-1"><span data-dcnode-id="9104" instrument_node="">25</span></a><span data-dcnode-id="9102" instrument_node="">, </span><a class="xref-bibr" data-dcnode-id="9100" href="#ref-26" id="xref-ref-26-1"><span data-dcnode-id="9101" instrument_node="">26</span></a><span data-dcnode-id="9099" instrument_node="">]. At very high regional flows or pressures, after local full recruitment, capillary distension is predominant [</span><a class="xref-bibr" data-dcnode-id="9097" href="#ref-26" id="xref-ref-26-2"><span data-dcnode-id="9098" instrument_node="">26</span></a><span data-dcnode-id="9096" instrument_node="">–</span><a class="xref-bibr" data-dcnode-id="9094" href="#ref-29" id="xref-ref-29-1"><span data-dcnode-id="9095" instrument_node="">29</span></a><span data-dcnode-id="9093" instrument_node="">]. The local pattern of capillary recruitment/distension may vary regionally in the lung, with gravity, arterial and post-capillary venous pressures, airway pressures, and disease states all having effects [</span><a class="xref-bibr" data-dcnode-id="9091" href="#ref-30" id="xref-ref-30-1"><span data-dcnode-id="9092" instrument_node="">30</span></a><span data-dcnode-id="9090" instrument_node="">–</span><a class="xref-bibr" data-dcnode-id="9088" href="#ref-34" id="xref-ref-34-1"><span data-dcnode-id="9089" instrument_node="">34</span></a><span data-dcnode-id="9087" instrument_node="">].</span></p><p data-dcnode-id="9070" id="p-22"><span data-dcnode-id="9085" instrument_node="">Examining the pulmonary circulation as a whole, since in the (healthy) pulmonary circulation the arteries and veins are distensible, the assumption that the pulmonary vascular pressure difference–flow relationship is linear and crosses the origin is inaccurate. The simple formula then no longer holds and PVR can be described using two parameters: α (the pulmonary circulatory distensibility coefficient) and </span><em data-dcnode-id="9083"><span data-dcnode-id="9084" instrument_node="">R</span></em><sub data-dcnode-id="9081"><span data-dcnode-id="9082" instrument_node="">0</span></sub><span data-dcnode-id="9080" instrument_node=""> (a reference resistance usually assumed to be the resistance at rest) [</span><a class="xref-bibr" data-dcnode-id="9078" href="#ref-35" id="xref-ref-35-1"><span data-dcnode-id="9079" instrument_node="">35</span></a><span data-dcnode-id="9077" instrument_node="">, </span><a class="xref-bibr" data-dcnode-id="9075" href="#ref-36" id="xref-ref-36-1"><span data-dcnode-id="9076" instrument_node="">36</span></a><span data-dcnode-id="9074" instrument_node="">]. While α may be relevant for the detection of early pulmonary vascular remodelling and relates to exercise capacity, right ventricular function and outcome [</span><a class="xref-bibr" data-dcnode-id="9072" href="#ref-37" id="xref-ref-37-1"><span data-dcnode-id="9073" instrument_node="">37</span></a><span data-dcnode-id="9071" instrument_node="">], it requires accurate measurement of pulmonary vascular pressure and flow at rest and at exercise. It therefore cannot be currently recommended as part of standard haemodynamic evaluation of patients referred for PH.</span></p></div><div class="subsection" data-dcnode-id="9046" id="sec-8"><h3 data-dcnode-id="9067"><span data-dcnode-id="9068" instrument_node="">Pulmonary arterial compliance</span></h3><p data-dcnode-id="9047" id="p-23"><span data-dcnode-id="9066" instrument_node="">The pulsatile load of the pulmonary circulation is most often evaluated using PAC. The best method to calculate PAC is based on a two-element Windkessel model with flow waveform and resistance as inputs to estimate the compliance value that best predicts systolic and diastolic pressures, the so-called “pulse pressure” (PP) method [</span><a class="xref-bibr" data-dcnode-id="9064" href="#ref-38" id="xref-ref-38-1"><span data-dcnode-id="9065" instrument_node="">38</span></a><span data-dcnode-id="9063" instrument_node="">]. A simpler and accepted method to derive PAC is SV/PP [</span><a class="xref-bibr" data-dcnode-id="9061" href="#ref-39" id="xref-ref-39-1"><span data-dcnode-id="9062" instrument_node="">39</span></a><span data-dcnode-id="9060" instrument_node="">]. This ratio assumes that the SV is buffered in the large elastic arteries in systole, without any peripheral outflow. However, there is a continuous flow toward the periphery, reducing the vascular volume increase during ejection, resulting in an overestimation of the true PAC [</span><a class="xref-bibr" data-dcnode-id="9058" href="#ref-40" id="xref-ref-40-1"><span data-dcnode-id="9059" instrument_node="">40</span></a><span data-dcnode-id="9057" instrument_node="">]. It has been shown in intact experimental animals at various severities of induced PH that SV/PP overestimates PAC by 60–80% [</span><a class="xref-bibr" data-dcnode-id="9055" href="#ref-40" id="xref-ref-40-2"><span data-dcnode-id="9056" instrument_node="">40</span></a><span data-dcnode-id="9054" instrument_node="">, </span><a class="xref-bibr" data-dcnode-id="9052" href="#ref-41" id="xref-ref-41-1"><span data-dcnode-id="9053" instrument_node="">41</span></a><span data-dcnode-id="9051" instrument_node="">]. This overestimation probably depends on patient status. CMR-determined proximal arterial compliance amounts to around 20% of PAC [</span><a class="xref-bibr" data-dcnode-id="9049" href="#ref-42" id="xref-ref-42-1"><span data-dcnode-id="9050" instrument_node="">42</span></a><span data-dcnode-id="9048" instrument_node="">], showing the greater contribution of the smaller vessels compared with the systemic arterial vasculature.</span></p></div><div class="subsection" data-dcnode-id="8898" id="sec-9"><h3 data-dcnode-id="9044"><span data-dcnode-id="9045" instrument_node="">Time constant of the pulmonary circulation</span></h3><p data-dcnode-id="9039" id="p-24"><span data-dcnode-id="9043" instrument_node="">In the previous sections we described the steady and pulsatile components separately; however, as already mentioned, these are closely related by an inverse relationship. The PAP decay curve in diastole is determined by PVR and PAC. The combined effect can be formulated by the product of PVR and PAC. The unit of this product is time and, therefore, is called the arterial time constant (RC-time) [</span><a class="xref-bibr" data-dcnode-id="9041" href="#ref-43" id="xref-ref-43-1"><span data-dcnode-id="9042" instrument_node="">43</span></a><span data-dcnode-id="9040" instrument_node="">].</span></p><p data-dcnode-id="9016" id="p-25"><span data-dcnode-id="9038" instrument_node="">The inverse relationship between PVR and PAC was first reported in 1971 [</span><a class="xref-bibr" data-dcnode-id="9036" href="#ref-44" id="xref-ref-44-1"><span data-dcnode-id="9037" instrument_node="">44</span></a><span data-dcnode-id="9035" instrument_node="">]. A series of studies showed recently that PVR and PAC are inversely related, and RC-time is constant over a wide range of severities, aetiologies and treatments of PH (</span><a class="xref-fig" data-dcnode-id="9033" href="#F3" id="xref-fig-3-1"><span data-dcnode-id="9034" instrument_node="">figure 3</span></a><span data-dcnode-id="9032" instrument_node="">) [</span><a class="xref-bibr" data-dcnode-id="9030" href="#ref-41" id="xref-ref-41-2"><span data-dcnode-id="9031" instrument_node="">41</span></a><span data-dcnode-id="9029" instrument_node="">, </span><a class="xref-bibr" data-dcnode-id="9027" href="#ref-45" id="xref-ref-45-1"><span data-dcnode-id="9028" instrument_node="">45</span></a><span data-dcnode-id="9026" instrument_node="">, </span><a class="xref-bibr" data-dcnode-id="9024" href="#ref-46" id="xref-ref-46-1"><span data-dcnode-id="9025" instrument_node="">46</span></a><span data-dcnode-id="9023" instrument_node="">]. It is noteworthy that RC-time is decreased when PAWP increases in patients with heart failure [</span><a class="xref-bibr" data-dcnode-id="9021" href="#ref-47" id="xref-ref-47-1"><span data-dcnode-id="9022" instrument_node="">47</span></a><span data-dcnode-id="9020" instrument_node="">, </span><a class="xref-bibr" data-dcnode-id="9018" href="#ref-48" id="xref-ref-48-1"><span data-dcnode-id="9019" instrument_node="">48</span></a><span data-dcnode-id="9017" instrument_node="">]. The fact that PVR takes the wedge pressure into account, whereas compliance, calculated as SV/PP, does not, gives rise to an altered RC-time in post-capillary PH.</span></p><div class="fig pos-float odd" data-dcnode-id="8984" id="F3"><div class="highwire-figure" data-dcnode-id="8998"><div class="fig-inline-img-wrapper" data-dcnode-id="9009"><div class="fig-inline-img" data-dcnode-id="9010"><a class="highwire-fragment fragment-images colorbox-load highwireFiguresMarkupProcessor-processed cboxElement" data-dcnode-id="9011" data-figure-caption="<div class=&quot;highwire-markup&quot;><div xmlns=&quot;http://www.w3.org/1999/xhtml&quot;>The resistance–compliance relationship: the relationship between pulmonary vascular resistance (PVR) and pulmonary arterial compliance (PAC) is characterised by a constant value of RC-time (<em>i.e.</em> the product of PVR×PAC). PAWP: pulmonary arterial wedge pressure. Reproduced and modified from [11] with permission.</div></div>" data-hide-link-title="0" data-icon-position="" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//erj.ersjournals.com/content/erj/53/1/1801900/F3.large.jpg%3Fwidth%3D800%26height%3D600%26carousel%3D1" rel="gallery-fragment-images-1480405563" title="The resistance–compliance relationship: the relationship between pulmonary vascular resistance (PVR) and pulmonary arterial compliance (PAC) is characterised by a constant value of RC-time (i.e. the product of PVR×PAC). PAWP: pulmonary arterial wedge pressure. Reproduced and modified from [11] with permission."><span class="hw-responsive-img" data-dcnode-id="9012"><img alt="FIGURE&nbsp;3" class="highwire-fragment fragment-image lazyload" data-dcnode-id="9015" data-src="https://erj.ersjournals.com/content/erj/53/1/1801900/F3.medium.gif" height="272" src="data:image/gif;base64,R0lGODlhAQABAIAAAAAAAP///yH5BAEAAAAALAAAAAABAAEAAAIBRAA7" width="440"><noscript data-dcnode-id="9013"><span data-dcnode-id="9014" instrument_node="">&lt;img class="highwire-fragment fragment-image" alt="FIGURE&amp;#xA0;3" src="https://erj.ersjournals.com/content/erj/53/1/1801900/F3.medium.gif" width="440" height="272"/&gt;</span></noscript></span></a></div></div><ul class="highwire-figure-links inline" data-dcnode-id="8999"><li class="download-fig first" data-dcnode-id="9006"><a class="highwire-figure-link highwire-figure-link-download" data-dcnode-id="9007" data-hide-link-title="0" data-icon-position="" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//erj.ersjournals.com/content/erj/53/1/1801900/F3.large.jpg%3Fdownload%3Dtrue" title="Download FIGURE&nbsp;3"><span data-dcnode-id="9008" instrument_node="">Download figure</span></a></li><li class="new-tab" data-dcnode-id="9003"><a class="highwire-figure-link highwire-figure-link-newtab" data-dcnode-id="9004" data-hide-link-title="0" data-icon-position="" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//erj.ersjournals.com/content/erj/53/1/1801900/F3.large.jpg" target="_blank"><span data-dcnode-id="9005" instrument_node="">Open in new tab</span></a></li><li class="download-ppt last" data-dcnode-id="9000"><a class="highwire-figure-link highwire-figure-link-ppt" data-dcnode-id="9001" data-hide-link-title="0" data-icon-position="" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//erj.ersjournals.com/highwire/powerpoint/154448"><span data-dcnode-id="9002" instrument_node="">Download powerpoint</span></a></li></ul></div><div class="fig-caption" data-dcnode-id="8985"><span class="fig-label" data-dcnode-id="8996"><span data-dcnode-id="8997" instrument_node="">FIGURE&nbsp;3</span></span><span data-dcnode-id="8995" instrument_node=""> </span><p class="first-child" data-dcnode-id="8987" id="p-26"><span data-dcnode-id="8994" instrument_node="">The resistance–compliance relationship: the relationship between pulmonary vascular resistance (PVR) and pulmonary arterial compliance (PAC) is characterised by a constant value of RC-time (</span><em data-dcnode-id="8992"><span data-dcnode-id="8993" instrument_node="">i.e.</span></em><span data-dcnode-id="8991" instrument_node=""> the product of PVR×PAC). PAWP: pulmonary arterial wedge pressure. Reproduced and modified from [</span><a class="xref-bibr" data-dcnode-id="8989" href="#ref-11" id="xref-ref-11-4"><span data-dcnode-id="8990" instrument_node="">11</span></a><span data-dcnode-id="8988" instrument_node="">] with permission.</span></p><div class="sb-div caption-clear" data-dcnode-id="8986"></div></div></div><p data-dcnode-id="8950" id="p-27"><span data-dcnode-id="8983" instrument_node="">Owing to the inverse relationship between PVR and PAC, the dynamic range in PAC will be greater in patients with mild pulmonary vascular disease (PVD) (zone A in </span><a class="xref-fig" data-dcnode-id="8981" href="#F3" id="xref-fig-3-2"><span data-dcnode-id="8982" instrument_node="">figure 3</span></a><span data-dcnode-id="8980" instrument_node="">), while the dynamic range in PVR will be greater in patients with more advanced PVD (zone B in figure 3). Therefore, PAC may be more sensitive to detect changes in PVD in the early phase of disease. Moreover, several studies using linear prediction models found that PAC is an independent predictor of outcome in PAH [</span><a class="xref-bibr" data-dcnode-id="8978" href="#ref-49" id="xref-ref-49-1"><span data-dcnode-id="8979" instrument_node="">49</span></a><span data-dcnode-id="8977" instrument_node="">–</span><a class="xref-bibr" data-dcnode-id="8975" href="#ref-52" id="xref-ref-52-1"><span data-dcnode-id="8976" instrument_node="">52</span></a><span data-dcnode-id="8974" instrument_node="">] over a wide range of PVR [</span><a class="xref-bibr" data-dcnode-id="8972" href="#ref-53" id="xref-ref-53-1"><span data-dcnode-id="8973" instrument_node="">53</span></a><span data-dcnode-id="8971" instrument_node="">, </span><a class="xref-bibr" data-dcnode-id="8969" href="#ref-54" id="xref-ref-54-1"><span data-dcnode-id="8970" instrument_node="">54</span></a><span data-dcnode-id="8968" instrument_node="">]. Another implication of this remarkable structural characteristic of the pulmonary vasculature is that it dictates the reported tight correlation between systolic PAP (sPAP), diastolic PAP (dPAP) and mPAP in normal subjects and in patients with PH of all possible aetiologies [</span><a class="xref-bibr" data-dcnode-id="8966" href="#ref-55" id="xref-ref-55-1"><span data-dcnode-id="8967" instrument_node="">55</span></a><span data-dcnode-id="8965" instrument_node="">, </span><a class="xref-bibr" data-dcnode-id="8963" href="#ref-56" id="xref-ref-56-1"><span data-dcnode-id="8964" instrument_node="">56</span></a><span data-dcnode-id="8962" instrument_node="">], independently of PAWP (</span><a class="xref-fig" data-dcnode-id="8960" href="#F4" id="xref-fig-4-1"><span data-dcnode-id="8961" instrument_node="">figure 4</span></a><span data-dcnode-id="8959" instrument_node="">) [</span><a class="xref-bibr" data-dcnode-id="8957" href="#ref-57" id="xref-ref-57-1"><span data-dcnode-id="8958" instrument_node="">57</span></a><span data-dcnode-id="8956" instrument_node="">]:
</span><span class="disp-formula" data-dcnode-id="8951" id="disp-formula-1"><span class="highwire-responsive-lazyload" data-dcnode-id="8952"><img alt="Embedded Image" class="highwire-embed lazyload" data-dcnode-id="8955" data-src="https://erj.ersjournals.com/sites/default/files/highwire/erj/53/1/1801900/embed/graphic-4.gif" src="data:image/gif;base64,R0lGODlhAQABAIAAAAAAAP///yH5BAEAAAAALAAAAAABAAEAAAIBRAA7"><noscript data-dcnode-id="8953"><span data-dcnode-id="8954" instrument_node="">&lt;img class="highwire-embed" alt="Embedded Image" src="https://erj.ersjournals.com/sites/default/files/highwire/erj/53/1/1801900/embed/graphic-4.gif"/&gt;</span></noscript></span></span></p><div class="fig pos-float odd" data-dcnode-id="8921" id="F4"><div class="highwire-figure" data-dcnode-id="8932"><div class="fig-inline-img-wrapper" data-dcnode-id="8943"><div class="fig-inline-img" data-dcnode-id="8944"><a class="highwire-fragment fragment-images colorbox-load highwireFiguresMarkupProcessor-processed cboxElement" data-dcnode-id="8945" data-figure-caption="<div class=&quot;highwire-markup&quot;>The mean, systolic and diastolic pulmonary arterial pressure (mPAP, sPAP and dPAP) relationships: relative values of pressures in the pulmonary circulation are tightly related. Reproduced and modified from [57] with permission.</div>" data-hide-link-title="0" data-icon-position="" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//erj.ersjournals.com/content/erj/53/1/1801900/F4.large.jpg%3Fwidth%3D800%26height%3D600%26carousel%3D1" rel="gallery-fragment-images-1480405563" title="The mean, systolic and diastolic pulmonary arterial pressure (mPAP, sPAP and dPAP) relationships: relative values of pressures in the pulmonary circulation are tightly related. Reproduced and modified from [57] with permission."><span class="hw-responsive-img" data-dcnode-id="8946"><img alt="FIGURE&nbsp;4" class="highwire-fragment fragment-image lazyload" data-dcnode-id="8949" data-src="https://erj.ersjournals.com/content/erj/53/1/1801900/F4.medium.gif" height="282" src="data:image/gif;base64,R0lGODlhAQABAIAAAAAAAP///yH5BAEAAAAALAAAAAABAAEAAAIBRAA7" width="440"><noscript data-dcnode-id="8947"><span data-dcnode-id="8948" instrument_node="">&lt;img class="highwire-fragment fragment-image" alt="FIGURE&amp;#xA0;4" src="https://erj.ersjournals.com/content/erj/53/1/1801900/F4.medium.gif" width="440" height="282"/&gt;</span></noscript></span></a></div></div><ul class="highwire-figure-links inline" data-dcnode-id="8933"><li class="download-fig first" data-dcnode-id="8940"><a class="highwire-figure-link highwire-figure-link-download" data-dcnode-id="8941" data-hide-link-title="0" data-icon-position="" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//erj.ersjournals.com/content/erj/53/1/1801900/F4.large.jpg%3Fdownload%3Dtrue" title="Download FIGURE&nbsp;4"><span data-dcnode-id="8942" instrument_node="">Download figure</span></a></li><li class="new-tab" data-dcnode-id="8937"><a class="highwire-figure-link highwire-figure-link-newtab" data-dcnode-id="8938" data-hide-link-title="0" data-icon-position="" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//erj.ersjournals.com/content/erj/53/1/1801900/F4.large.jpg" target="_blank"><span data-dcnode-id="8939" instrument_node="">Open in new tab</span></a></li><li class="download-ppt last" data-dcnode-id="8934"><a class="highwire-figure-link highwire-figure-link-ppt" data-dcnode-id="8935" data-hide-link-title="0" data-icon-position="" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//erj.ersjournals.com/highwire/powerpoint/154479"><span data-dcnode-id="8936" instrument_node="">Download powerpoint</span></a></li></ul></div><div class="fig-caption" data-dcnode-id="8922"><span class="fig-label" data-dcnode-id="8930"><span data-dcnode-id="8931" instrument_node="">FIGURE&nbsp;4</span></span><span data-dcnode-id="8929" instrument_node=""> </span><p class="first-child" data-dcnode-id="8924" id="p-28"><span data-dcnode-id="8928" instrument_node="">The mean, systolic and diastolic pulmonary arterial pressure (mPAP, sPAP and dPAP) relationships: relative values of pressures in the pulmonary circulation are tightly related. Reproduced and modified from [</span><a class="xref-bibr" data-dcnode-id="8926" href="#ref-57" id="xref-ref-57-2"><span data-dcnode-id="8927" instrument_node="">57</span></a><span data-dcnode-id="8925" instrument_node="">] with permission.</span></p><div class="sb-div caption-clear" data-dcnode-id="8923"></div></div></div><p data-dcnode-id="8914" id="p-29"><span data-dcnode-id="8920" instrument_node="">and
</span><span class="disp-formula" data-dcnode-id="8915" id="disp-formula-2"><span class="highwire-responsive-lazyload" data-dcnode-id="8916"><img alt="Embedded Image" class="highwire-embed lazyload" data-dcnode-id="8919" data-src="https://erj.ersjournals.com/sites/default/files/highwire/erj/53/1/1801900/embed/graphic-6.gif" src="data:image/gif;base64,R0lGODlhAQABAIAAAAAAAP///yH5BAEAAAAALAAAAAABAAEAAAIBRAA7"><noscript data-dcnode-id="8917"><span data-dcnode-id="8918" instrument_node="">&lt;img class="highwire-embed" alt="Embedded Image" src="https://erj.ersjournals.com/sites/default/files/highwire/erj/53/1/1801900/embed/graphic-6.gif"/&gt;</span></noscript></span></span></p><p data-dcnode-id="8907" id="p-30"><span data-dcnode-id="8913" instrument_node="">The first relation implies that mPAP can be calculated from Doppler echocardiographic estimates of sPAP by the formula:
</span><span class="disp-formula" data-dcnode-id="8908" id="disp-formula-3"><span class="highwire-responsive-lazyload" data-dcnode-id="8909"><img alt="Embedded Image" class="highwire-embed lazyload" data-dcnode-id="8912" data-src="https://erj.ersjournals.com/sites/default/files/highwire/erj/53/1/1801900/embed/graphic-7.gif" src="data:image/gif;base64,R0lGODlhAQABAIAAAAAAAP///yH5BAEAAAAALAAAAAABAAEAAAIBRAA7"><noscript data-dcnode-id="8910"><span data-dcnode-id="8911" instrument_node="">&lt;img class="highwire-embed" alt="Embedded Image" src="https://erj.ersjournals.com/sites/default/files/highwire/erj/53/1/1801900/embed/graphic-7.gif"/&gt;</span></noscript></span></span></p><p data-dcnode-id="8899" id="p-31"><span data-dcnode-id="8906" instrument_node="">The mPAP calculated in this way provides an estimate of mPAP in patients referred for diagnostic work-up of PH [</span><a class="xref-bibr" data-dcnode-id="8904" href="#ref-58" id="xref-ref-58-1"><span data-dcnode-id="8905" instrument_node="">58</span></a><span data-dcnode-id="8903" instrument_node="">]. In echocardiography-based studies, different thresholds for right ventricular systolic pressure (</span><em data-dcnode-id="8901"><span data-dcnode-id="8902" instrument_node="">e.g.</span></em><span data-dcnode-id="8900" instrument_node=""> 30, 35 or 40 mmHg) have been used for defining PH. According to the formula, a right ventricular systolic pressure of 40 mmHg would best approximate a mPAP of 25 mmHg assuming a mild right ventricular outflow tract gradient and an insonation angle &lt;15°.</span></p></div></div><div class="section" data-dcnode-id="8705" id="sec-10"><h2 class="" data-dcnode-id="8895"><span data-dcnode-id="8896" instrument_node="">Assessment of the cardiopulmonary unit</span></h2><div class="subsection" data-dcnode-id="8841" id="sec-11"><h3 data-dcnode-id="8893"><span data-dcnode-id="8894" instrument_node="">Functional interaction</span></h3><p data-dcnode-id="8888" id="p-32"><span data-dcnode-id="8892" instrument_node="">In the clinic, the description of right ventricular function in relation to its load is of high prognostic value. Most imaging parameters as measured by echocardiography or CMR reflect system function of the interaction of the right ventricle and the vascular load. At present no recommendations on the most relevant measurements of right ventricular function can be made. Further clinical research is needed, preferably multicentre and prospective, with an </span><em data-dcnode-id="8890"><span data-dcnode-id="8891" instrument_node="">a priori</span></em><span data-dcnode-id="8889" instrument_node=""> established list of variables of interest. It should not be overlooked that adequate measurements do not only qualify based on their prognostic capability or prediction of clinical worsening; they should be reproducible and easy to assess in PH centres of expertise.</span></p><p data-dcnode-id="8874" id="p-33"><span data-dcnode-id="8887" instrument_node="">However, there is ample evidence that direct or indirect measurements of right ventricular EDV and ESV, derivation of SV, and filling pressures contain the foremost prognostic information. This can be explained by the pressure–volume loops derived from the adapted and failing right ventricle. In the adapted right ventricle, increased afterload in PH leads to hypertrophy and an increased contractility with more or less preserved dimensions and SV [</span><a class="xref-bibr" data-dcnode-id="8885" href="#ref-2" id="xref-ref-2-2"><span data-dcnode-id="8886" instrument_node="">2</span></a><span data-dcnode-id="8884" instrument_node="">, </span><a class="xref-bibr" data-dcnode-id="8882" href="#ref-4" id="xref-ref-4-2"><span data-dcnode-id="8883" instrument_node="">4</span></a><span data-dcnode-id="8881" instrument_node="">, </span><a class="xref-bibr" data-dcnode-id="8879" href="#ref-11" id="xref-ref-11-5"><span data-dcnode-id="8880" instrument_node="">11</span></a><span data-dcnode-id="8878" instrument_node="">, </span><a class="xref-bibr" data-dcnode-id="8876" href="#ref-59" id="xref-ref-59-1"><span data-dcnode-id="8877" instrument_node="">59</span></a><span data-dcnode-id="8875" instrument_node="">], whereas in progressive right ventricular failure, the right ventricle progressively dilates and decreases its SV.</span></p><p data-dcnode-id="8842" id="p-34"><span data-dcnode-id="8873" instrument_node="">It should be noted that SV/ESV is inversely related to RVEF, as indicated by the formula SV/ESV=EF/(1−EF). Indeed, V</span><span class="sc" data-dcnode-id="8871"><span data-dcnode-id="8872" instrument_node="">anderpool</span></span><span data-dcnode-id="8870" instrument_node=""> </span><em data-dcnode-id="8868"><span data-dcnode-id="8869" instrument_node="">et&nbsp;al</span></em><span data-dcnode-id="8867" instrument_node="">. [</span><a class="xref-bibr" data-dcnode-id="8865" href="#ref-22" id="xref-ref-22-2"><span data-dcnode-id="8866" instrument_node="">22</span></a><span data-dcnode-id="8864" instrument_node="">] showed this inverse relation exists in patients with PH [</span><a class="xref-bibr" data-dcnode-id="8862" href="#ref-22" id="xref-ref-22-3"><span data-dcnode-id="8863" instrument_node="">22</span></a><span data-dcnode-id="8861" instrument_node="">]. Thus, both SV/ESV and RVEF contain similar prognostic information, and should be considered as parameters of functional interaction, not coupling. RVEF and SV/ESV have been shown to be equally predictive of outcome in patients with PAH [</span><a class="xref-bibr" data-dcnode-id="8859" href="#ref-60" id="xref-ref-60-1"><span data-dcnode-id="8860" instrument_node="">60</span></a><span data-dcnode-id="8858" instrument_node="">]. Rigorously defined cut-off values for shortened survival are 0.35 for EF [</span><a class="xref-bibr" data-dcnode-id="8856" href="#ref-60" id="xref-ref-60-2"><span data-dcnode-id="8857" instrument_node="">60</span></a><span data-dcnode-id="8855" instrument_node="">, </span><a class="xref-bibr" data-dcnode-id="8853" href="#ref-61" id="xref-ref-61-1"><span data-dcnode-id="8854" instrument_node="">61</span></a><span data-dcnode-id="8852" instrument_node="">] and 0.54 for SV/ESV [</span><a class="xref-bibr" data-dcnode-id="8850" href="#ref-22" id="xref-ref-22-4"><span data-dcnode-id="8851" instrument_node="">22</span></a><span data-dcnode-id="8849" instrument_node="">, </span><a class="xref-bibr" data-dcnode-id="8847" href="#ref-60" id="xref-ref-60-3"><span data-dcnode-id="8848" instrument_node="">60</span></a><span data-dcnode-id="8846" instrument_node="">]. Although theoretically RVEF and SV/ESV should have similar predictive potential, due to the hyperbolic relationship between the two, the latter may be more sensitive to early changes [</span><a class="xref-bibr" data-dcnode-id="8844" href="#ref-62" id="xref-ref-62-1"><span data-dcnode-id="8845" instrument_node="">62</span></a><span data-dcnode-id="8843" instrument_node="">]. Then again, it is more difficult to determine ESV in an accurate manner. A large-scale head-to-head comparison of these two parameters may resolve this matter.</span></p></div><div class="subsection" data-dcnode-id="8706" id="sec-12"><h3 data-dcnode-id="8839"><span data-dcnode-id="8840" instrument_node="">Coupling</span></h3><p data-dcnode-id="8824" id="p-35"><span data-dcnode-id="8838" instrument_node="">Coupling implies efficiency of energy transfer from the ventricle to the arterial load and can be calculated as the ratio </span><em data-dcnode-id="8836"><span data-dcnode-id="8837" instrument_node="">E</span></em><sub data-dcnode-id="8834"><span data-dcnode-id="8835" instrument_node="">es</span></sub><span data-dcnode-id="8833" instrument_node="">/</span><em data-dcnode-id="8831"><span data-dcnode-id="8832" instrument_node="">E</span></em><sub data-dcnode-id="8829"><span data-dcnode-id="8830" instrument_node="">a.</span></sub><span data-dcnode-id="8828" instrument_node=""> The value will be between 1 and 2 if maximal energy transfer from ventricle to load occurs (</span><a class="xref-fig" data-dcnode-id="8826" href="#F2" id="xref-fig-2-7"><span data-dcnode-id="8827" instrument_node="">figure 2</span></a><span data-dcnode-id="8825" instrument_node="">).</span></p><p data-dcnode-id="8790" id="p-36"><span data-dcnode-id="8823" instrument_node="">Coupling has been reported in PAH patients, with single-beat calculation of the </span><em data-dcnode-id="8821"><span data-dcnode-id="8822" instrument_node="">E</span></em><sub data-dcnode-id="8819"><span data-dcnode-id="8820" instrument_node="">es</span></sub><span data-dcnode-id="8818" instrument_node="">/</span><em data-dcnode-id="8816"><span data-dcnode-id="8817" instrument_node="">E</span></em><sub data-dcnode-id="8814"><span data-dcnode-id="8815" instrument_node="">a</span></sub><span data-dcnode-id="8813" instrument_node=""> ratio from CMR measurements of right ventricular volumes and right heart catheterisation (RHC) measurements of right ventricular pressures [</span><a class="xref-bibr" data-dcnode-id="8811" href="#ref-63" id="xref-ref-63-1"><span data-dcnode-id="8812" instrument_node="">63</span></a><span data-dcnode-id="8810" instrument_node="">]. Single-beat determinations of </span><em data-dcnode-id="8808"><span data-dcnode-id="8809" instrument_node="">E</span></em><sub data-dcnode-id="8806"><span data-dcnode-id="8807" instrument_node="">es</span></sub><span data-dcnode-id="8805" instrument_node="">/</span><em data-dcnode-id="8803"><span data-dcnode-id="8804" instrument_node="">E</span></em><sub data-dcnode-id="8801"><span data-dcnode-id="8802" instrument_node="">a</span></sub><span data-dcnode-id="8800" instrument_node=""> have been implemented in experimental animal studies to show, for example, that acutely administered prostacyclin has no intrinsic inotropic effect [</span><a class="xref-bibr" data-dcnode-id="8798" href="#ref-64" id="xref-ref-64-1"><span data-dcnode-id="8799" instrument_node="">64</span></a><span data
