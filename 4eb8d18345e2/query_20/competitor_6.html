-dcnode-id="8797" instrument_node="">] and that β-blocker agents may either deteriorate (acutely) [</span><a class="xref-bibr" data-dcnode-id="8795" href="#ref-11" id="xref-ref-11-6"><span data-dcnode-id="8796" instrument_node="">11</span></a><span data-dcnode-id="8794" instrument_node="">] or improve (chronically) [</span><a class="xref-bibr" data-dcnode-id="8792" href="#ref-64" id="xref-ref-64-2"><span data-dcnode-id="8793" instrument_node="">64</span></a><span data-dcnode-id="8791" instrument_node="">] right ventriculo–arterial coupling.</span></p><p data-dcnode-id="8718" id="p-37"><span data-dcnode-id="8789" instrument_node="">Compared with controls, in PH the </span><em data-dcnode-id="8787"><span data-dcnode-id="8788" instrument_node="">E</span></em><sub data-dcnode-id="8785"><span data-dcnode-id="8786" instrument_node="">es</span></sub><span data-dcnode-id="8784" instrument_node="">/</span><em data-dcnode-id="8782"><span data-dcnode-id="8783" instrument_node="">E</span></em><sub data-dcnode-id="8780"><span data-dcnode-id="8781" instrument_node="">a</span></sub><span data-dcnode-id="8779" instrument_node=""> was decreased, indicating insufficient contractility adaptation (“homeometric”) and impending right ventricular failure. Results have been confirmed in small cohorts of patients with either PAH or chronic thromboembolic PH, and in one case report of a patient with a systemic-like pressured right ventricle [</span><a class="xref-bibr" data-dcnode-id="8777" href="#ref-3" id="xref-ref-3-5"><span data-dcnode-id="8778" instrument_node="">3</span></a><span data-dcnode-id="8776" instrument_node="">, </span><a class="xref-bibr" data-dcnode-id="8774" href="#ref-65" id="xref-ref-65-1"><span data-dcnode-id="8775" instrument_node="">65</span></a><span data-dcnode-id="8773" instrument_node="">–</span><a class="xref-bibr" data-dcnode-id="8771" href="#ref-68" id="xref-ref-68-1"><span data-dcnode-id="8772" instrument_node="">68</span></a><span data-dcnode-id="8770" instrument_node="">]. In these studies, </span><em data-dcnode-id="8768"><span data-dcnode-id="8769" instrument_node="">E</span></em><sub data-dcnode-id="8766"><span data-dcnode-id="8767" instrument_node="">es</span></sub><span data-dcnode-id="8765" instrument_node="">/</span><em data-dcnode-id="8763"><span data-dcnode-id="8764" instrument_node="">E</span></em><sub data-dcnode-id="8761"><span data-dcnode-id="8762" instrument_node="">a</span></sub><span data-dcnode-id="8760" instrument_node=""> was measured either by the single-beat method [</span><a class="xref-bibr" data-dcnode-id="8758" href="#ref-3" id="xref-ref-3-6"><span data-dcnode-id="8759" instrument_node="">3</span></a><span data-dcnode-id="8757" instrument_node="">, </span><a class="xref-bibr" data-dcnode-id="8755" href="#ref-63" id="xref-ref-63-2"><span data-dcnode-id="8756" instrument_node="">63</span></a><span data-dcnode-id="8754" instrument_node="">, </span><a class="xref-bibr" data-dcnode-id="8752" href="#ref-65" id="xref-ref-65-2"><span data-dcnode-id="8753" instrument_node="">65</span></a><span data-dcnode-id="8751" instrument_node="">, </span><a class="xref-bibr" data-dcnode-id="8749" href="#ref-67" id="xref-ref-67-1"><span data-dcnode-id="8750" instrument_node="">67</span></a><span data-dcnode-id="8748" instrument_node="">] or using multiple pressure–volume loops obtained by decreasing venous return through a Valsalva manoeuvre [</span><a class="xref-bibr" data-dcnode-id="8746" href="#ref-66" id="xref-ref-66-1"><span data-dcnode-id="8747" instrument_node="">66</span></a><span data-dcnode-id="8745" instrument_node="">, </span><a class="xref-bibr" data-dcnode-id="8743" href="#ref-68" id="xref-ref-68-2"><span data-dcnode-id="8744" instrument_node="">68</span></a><span data-dcnode-id="8742" instrument_node="">]. </span><em data-dcnode-id="8740"><span data-dcnode-id="8741" instrument_node="">E</span></em><sub data-dcnode-id="8738"><span data-dcnode-id="8739" instrument_node="">es</span></sub><span data-dcnode-id="8737" instrument_node="">/</span><em data-dcnode-id="8735"><span data-dcnode-id="8736" instrument_node="">E</span></em><sub data-dcnode-id="8733"><span data-dcnode-id="8734" instrument_node="">a</span></sub><span data-dcnode-id="8732" instrument_node=""> was either maintained or decreased at rest, but consistently decreased at exercise. Decreased </span><em data-dcnode-id="8730"><span data-dcnode-id="8731" instrument_node="">E</span></em><sub data-dcnode-id="8728"><span data-dcnode-id="8729" instrument_node="">es</span></sub><span data-dcnode-id="8727" instrument_node="">/</span><em data-dcnode-id="8725"><span data-dcnode-id="8726" instrument_node="">E</span></em><sub data-dcnode-id="8723"><span data-dcnode-id="8724" instrument_node="">a</span></sub><span data-dcnode-id="8722" instrument_node=""> at exercise was accompanied by an increase in right ventricular EDV [</span><a class="xref-bibr" data-dcnode-id="8720" href="#ref-68" id="xref-ref-68-3"><span data-dcnode-id="8721" instrument_node="">68</span></a><span data-dcnode-id="8719" instrument_node="">].</span></p><p data-dcnode-id="8707" id="p-38"><span data-dcnode-id="8717" instrument_node="">Coupling is maintained at resting conditions for as long as the ventricle can adapt (</span><a class="xref-fig" data-dcnode-id="8715" href="#F2" id="xref-fig-2-8"><span data-dcnode-id="8716" instrument_node="">figure 2</span></a><span data-dcnode-id="8714" instrument_node="">). Only in the late stages of pressure overload does uncoupling occur [</span><a class="xref-bibr" data-dcnode-id="8712" href="#ref-11" id="xref-ref-11-7"><span data-dcnode-id="8713" instrument_node="">11</span></a><span data-dcnode-id="8711" instrument_node="">, </span><a class="xref-bibr" data-dcnode-id="8709" href="#ref-21" id="xref-ref-21-5"><span data-dcnode-id="8710" instrument_node="">21</span></a><span data-dcnode-id="8708" instrument_node="">]. Therefore, coupling is not a sensitive parameter to identify an early disease state. Although coupling measured at exercise might contain more important clinical information, the complexity of these measurements will limit clinical use.</span></p></div></div><div class="section" data-dcnode-id="8522" id="sec-13"><h2 class="" data-dcnode-id="8703"><span data-dcnode-id="8704" instrument_node="">Practical assessment of pulmonary haemodynamics</span></h2><p data-dcnode-id="8695" id="p-39"><span data-dcnode-id="8702" instrument_node="">Single variables such as PAPs, SV and CO are the result of the interaction of the right ventricle to its load. This implies that from a single variable, </span><em data-dcnode-id="8700"><span data-dcnode-id="8701" instrument_node="">e.g.</span></em><span data-dcnode-id="8699" instrument_node=""> CO, no quantitative information can be obtained on either of the subsystems, </span><em data-dcnode-id="8697"><span data-dcnode-id="8698" instrument_node="">i.e.</span></em><span data-dcnode-id="8696" instrument_node=""> the heart or the arterial load. For this reason, a change in PAP at exercise cannot be considered as a measure of right ventricular contractility.</span></p><div class="subsection" data-dcnode-id="8681" id="sec-14"><h3 data-dcnode-id="8693"><span data-dcnode-id="8694" instrument_node="">Measuring the pressures correctly</span></h3><p data-dcnode-id="8682" id="p-40"><span data-dcnode-id="8692" instrument_node="">Measurements of PAP and PAWP during rest and especially at exercise are technically challenging because of respiratory pressure swings. To avoid spurious increases in PAWP at end-expiration during exercise caused by dynamic hyperinflation and/or decrease in lung volume, it is preferable to average the reading of pulmonary vascular pressure curves over several respiratory cycles [</span><a class="xref-bibr" data-dcnode-id="8690" href="#ref-69" id="xref-ref-69-1"><span data-dcnode-id="8691" instrument_node="">69</span></a><span data-dcnode-id="8689" instrument_node="">]. The 2015 European Society of Cardiology/European Respiratory Society PH guidelines recommend measurements at end-expiration at rest, as is standard procedure in most catheterisation laboratories, but allow for averaging over several respiratory cycles during exercise when respiration-related phasic changes become excessive [</span><a class="xref-bibr" data-dcnode-id="8687" href="#ref-1" id="xref-ref-1-2"><span data-dcnode-id="8688" instrument_node="">1</span></a><span data-dcnode-id="8686" instrument_node="">, </span><a class="xref-bibr" data-dcnode-id="8684" href="#ref-70" id="xref-ref-70-1"><span data-dcnode-id="8685" instrument_node="">70</span></a><span data-dcnode-id="8683" instrument_node="">].</span></p></div><div class="subsection" data-dcnode-id="8548" id="sec-15"><h3 data-dcnode-id="8679"><span data-dcnode-id="8680" instrument_node="">Provocation of the pulmonary circulation</span></h3><p data-dcnode-id="8677" id="p-41"><span data-dcnode-id="8678" instrument_node="">Provocative testing of the pulmonary circulation with exercise or a fluid challenge has been used by some centres in clinical practice for decades, but has only recently been standardised.</span></p><div class="subsection" data-dcnode-id="8578" id="sec-16"><h4 data-dcnode-id="8675"><span data-dcnode-id="8676" instrument_node="">Exercise</span></h4><p data-dcnode-id="8652" id="p-42"><span data-dcnode-id="8674" instrument_node="">The upper limit of normal of mPAP during an incremental dynamic exercise challenge is now well established at 30 mmHg at CO &lt;10 L·min</span><sup data-dcnode-id="8672"><span data-dcnode-id="8673" instrument_node="">−1</span></sup><span data-dcnode-id="8671" instrument_node=""> (</span><a class="xref-fig" data-dcnode-id="8669" href="#F5" id="xref-fig-5-1"><span data-dcnode-id="8670" instrument_node="">figure 5</span></a><span data-dcnode-id="8668" instrument_node="">), which corresponds to a total pulmonary resistance (TPR=mPAP/CO) of 3 WU [</span><a class="xref-bibr" data-dcnode-id="8666" href="#ref-37" id="xref-ref-37-2"><span data-dcnode-id="8667" instrument_node="">37</span></a><span data-dcnode-id="8665" instrument_node="">, </span><a class="xref-bibr" data-dcnode-id="8663" href="#ref-71" id="xref-ref-71-1"><span data-dcnode-id="8664" instrument_node="">71</span></a><span data-dcnode-id="8662" instrument_node="">, </span><a class="xref-bibr" data-dcnode-id="8660" href="#ref-72" id="xref-ref-72-1"><span data-dcnode-id="8661" instrument_node="">72</span></a><span data-dcnode-id="8659" instrument_node="">]. It has been recently proposed that exercise-induced increases in mPAP &gt;30 mmHg at CO &lt;10 L·min</span><sup data-dcnode-id="8657"><span data-dcnode-id="8658" instrument_node="">−1</span></sup><span data-dcnode-id="8656" instrument_node=""> be called “exercise PH” [</span><a class="xref-bibr" data-dcnode-id="8654" href="#ref-69" id="xref-ref-69-2"><span data-dcnode-id="8655" instrument_node="">69</span></a><span data-dcnode-id="8653" instrument_node="">].</span></p><div class="fig pos-float odd" data-dcnode-id="8620" id="F5"><div class="highwire-figure" data-dcnode-id="8634"><div class="fig-inline-img-wrapper" data-dcnode-id="8645"><div class="fig-inline-img" data-dcnode-id="8646"><a class="highwire-fragment fragment-images colorbox-load highwireFiguresMarkupProcessor-processed cboxElement" data-dcnode-id="8647" data-figure-caption="<div class=&quot;highwire-markup&quot;><div xmlns=&quot;http://www.w3.org/1999/xhtml&quot;>The mean pulmonary arterial pressure (mPAP)–cardiac output (CO) relationships: the ratio of Δ<em>P</em>/ΔCO in health and disease. PH: pulmonary hypertension; PAH: pulmonary arterial hypertension. Reproduced and modified from [71] with permission.</div></div>" data-hide-link-title="0" data-icon-position="" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//erj.ersjournals.com/content/erj/53/1/1801900/F5.large.jpg%3Fwidth%3D800%26height%3D600%26carousel%3D1" rel="gallery-fragment-images-1480405563" title="The mean pulmonary arterial pressure (mPAP)–cardiac output (CO) relationships: the ratio of ΔP/ΔCO in health and disease. PH: pulmonary hypertension; PAH: pulmonary arterial hypertension. Reproduced and modified from [71] with permission."><span class="hw-responsive-img" data-dcnode-id="8648"><img alt="FIGURE&nbsp;5" class="highwire-fragment fragment-image lazyload" data-dcnode-id="8651" data-src="https://erj.ersjournals.com/content/erj/53/1/1801900/F5.medium.gif" height="275" src="data:image/gif;base64,R0lGODlhAQABAIAAAAAAAP///yH5BAEAAAAALAAAAAABAAEAAAIBRAA7" width="440"><noscript data-dcnode-id="8649"><span data-dcnode-id="8650" instrument_node="">&lt;img class="highwire-fragment fragment-image" alt="FIGURE&amp;#xA0;5" src="https://erj.ersjournals.com/content/erj/53/1/1801900/F5.medium.gif" width="440" height="275"/&gt;</span></noscript></span></a></div></div><ul class="highwire-figure-links inline" data-dcnode-id="8635"><li class="download-fig first" data-dcnode-id="8642"><a class="highwire-figure-link highwire-figure-link-download" data-dcnode-id="8643" data-hide-link-title="0" data-icon-position="" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//erj.ersjournals.com/content/erj/53/1/1801900/F5.large.jpg%3Fdownload%3Dtrue" title="Download FIGURE&nbsp;5"><span data-dcnode-id="8644" instrument_node="">Download figure</span></a></li><li class="new-tab" data-dcnode-id="8639"><a class="highwire-figure-link highwire-figure-link-newtab" data-dcnode-id="8640" data-hide-link-title="0" data-icon-position="" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//erj.ersjournals.com/content/erj/53/1/1801900/F5.large.jpg" target="_blank"><span data-dcnode-id="8641" instrument_node="">Open in new tab</span></a></li><li class="download-ppt last" data-dcnode-id="8636"><a class="highwire-figure-link highwire-figure-link-ppt" data-dcnode-id="8637" data-hide-link-title="0" data-icon-position="" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//erj.ersjournals.com/highwire/powerpoint/154424"><span data-dcnode-id="8638" instrument_node="">Download powerpoint</span></a></li></ul></div><div class="fig-caption" data-dcnode-id="8621"><span class="fig-label" data-dcnode-id="8632"><span data-dcnode-id="8633" instrument_node="">FIGURE&nbsp;5</span></span><span data-dcnode-id="8631" instrument_node=""> </span><p class="first-child" data-dcnode-id="8623" id="p-43"><span data-dcnode-id="8630" instrument_node="">The mean pulmonary arterial pressure (mPAP)–cardiac output (CO) relationships: the ratio of Δ</span><em data-dcnode-id="8628"><span data-dcnode-id="8629" instrument_node="">P</span></em><span data-dcnode-id="8627" instrument_node="">/ΔCO in health and disease. PH: pulmonary hypertension; PAH: pulmonary arterial hypertension. Reproduced and modified from [</span><a class="xref-bibr" data-dcnode-id="8625" href="#ref-71" id="xref-ref-71-2"><span data-dcnode-id="8626" instrument_node="">71</span></a><span data-dcnode-id="8624" instrument_node="">] with permission.</span></p><div class="sb-div caption-clear" data-dcnode-id="8622"></div></div></div><p data-dcnode-id="8579" id="p-44"><span data-dcnode-id="8619" instrument_node="">The cause of “exercise PH” is either an upstream transmission of increased PAWP, such as in heart failure, or an increase in PVR, such as in PVD, disturbed lung mechanics or hypoxia [</span><a class="xref-bibr" data-dcnode-id="8617" href="#ref-37" id="xref-ref-37-3"><span data-dcnode-id="8618" instrument_node="">37</span></a><span data-dcnode-id="8616" instrument_node="">, </span><a class="xref-bibr" data-dcnode-id="8614" href="#ref-69" id="xref-ref-69-3"><span data-dcnode-id="8615" instrument_node="">69</span></a><span data-dcnode-id="8613" instrument_node="">, </span><a class="xref-bibr" data-dcnode-id="8611" href="#ref-71" id="xref-ref-71-3"><span data-dcnode-id="8612" instrument_node="">71</span></a><span data-dcnode-id="8610" instrument_node="">]. This differential diagnosis relies on a clinical probability and eventual invasive measurements of PAWP and left ventricular end-diastolic pressure. The upper limit of normal of PAWP during exercise is generally thought to be between 15 and 20 mmHg, but higher values can be recorded in athletes capable of very high CO and in elderly subjects [</span><a class="xref-bibr" data-dcnode-id="8608" href="#ref-73" id="xref-ref-73-1"><span data-dcnode-id="8609" instrument_node="">73</span></a><span data-dcnode-id="8607" instrument_node="">]. Some consider 20 mmHg as a reasonable upper limit of normal [</span><a class="xref-bibr" data-dcnode-id="8605" href="#ref-74" id="xref-ref-74-1"><span data-dcnode-id="8606" instrument_node="">74</span></a><span data-dcnode-id="8604" instrument_node="">]. However, a higher cut-off value of 25 mmHg has been proposed for the diagnosis of heart failure [</span><a class="xref-bibr" data-dcnode-id="8602" href="#ref-75" id="xref-ref-75-1"><span data-dcnode-id="8603" instrument_node="">75</span></a><span data-dcnode-id="8601" instrument_node="">]. As for mPAP, a flow-corrected measure may be more appropriate, but there has been no study specifically addressing this. Since TPR normally decreases by up to 30% during exercise, the PAWP/CO slope should not exceed 2 mmHg·L</span><sup data-dcnode-id="8599"><span data-dcnode-id="8600" instrument_node="">−1</span></sup><span data-dcnode-id="8598" instrument_node="">·min</span><sup data-dcnode-id="8596"><span data-dcnode-id="8597" instrument_node="">−1</span></sup><span data-dcnode-id="8595" instrument_node="">. Mean PAWP/CO slopes around 1 mmHg·L</span><sup data-dcnode-id="8593"><span data-dcnode-id="8594" instrument_node="">−1</span></sup><span data-dcnode-id="8592" instrument_node="">·min</span><sup data-dcnode-id="8590"><span data-dcnode-id="8591" instrument_node="">−1</span></sup><span data-dcnode-id="8589" instrument_node=""> have been reported in control groups of studies on exercise testing in heart failure patients [</span><a class="xref-bibr" data-dcnode-id="8587" href="#ref-71" id="xref-ref-71-4"><span data-dcnode-id="8588" instrument_node="">71</span></a><span data-dcnode-id="8586" instrument_node="">, </span><a class="xref-bibr" data-dcnode-id="8584" href="#ref-74" id="xref-ref-74-2"><span data-dcnode-id="8585" instrument_node="">74</span></a><span data-dcnode-id="8583" instrument_node="">, </span><a class="xref-bibr" data-dcnode-id="8581" href="#ref-75" id="xref-ref-75-2"><span data-dcnode-id="8582" instrument_node="">75</span></a><span data-dcnode-id="8580" instrument_node="">].</span></p></div><div class="subsection" data-dcnode-id="8549" id="sec-17"><h4 data-dcnode-id="8576"><span data-dcnode-id="8577" instrument_node="">Fluid challenge</span></h4><p data-dcnode-id="8550" id="p-45"><span data-dcnode-id="8575" instrument_node="">A fluid challenge will induce a rapid rise in PAWP in any condition associated with altered left ventricular diastolic compliance or mitral valvulopathy [</span><a class="xref-bibr" data-dcnode-id="8573" href="#ref-76" id="xref-ref-76-1"><span data-dcnode-id="8574" instrument_node="">76</span></a><span data-dcnode-id="8572" instrument_node="">]. Fluid loading increases PAWP in healthy volunteers as a function of age, sex, amount infused and infusion rate [</span><a class="xref-bibr" data-dcnode-id="8570" href="#ref-77" id="xref-ref-77-1"><span data-dcnode-id="8571" instrument_node="">77</span></a><span data-dcnode-id="8569" instrument_node="">]. There is an emerging consensus to infuse 500 mL of saline in 5–10 min as the best compromise between safety and stress efficacy, with 18 mmHg as the optimal PAWP cut-off to separate abnormal from normal [</span><a class="xref-bibr" data-dcnode-id="8567" href="#ref-76" id="xref-ref-76-2"><span data-dcnode-id="8568" instrument_node="">76</span></a><span data-dcnode-id="8566" instrument_node="">–</span><a class="xref-bibr" data-dcnode-id="8564" href="#ref-80" id="xref-ref-80-1"><span data-dcnode-id="8565" instrument_node="">80</span></a><span data-dcnode-id="8563" instrument_node="">]. This was recently underpinned by a report on 212 patients referred for PH who were challenged with 7 mL·kg</span><sup data-dcnode-id="8561"><span data-dcnode-id="8562" instrument_node="">−1</span></sup><span data-dcnode-id="8560" instrument_node=""> of saline given in &lt;5 min (corresponding to 0.5 L for a 70-kg patient) [</span><a class="xref-bibr" data-dcnode-id="8558" href="#ref-80" id="xref-ref-80-2"><span data-dcnode-id="8559" instrument_node="">80</span></a><span data-dcnode-id="8557" instrument_node="">]. To limit the number of healthy outliers [</span><a class="xref-bibr" data-dcnode-id="8555" href="#ref-80" id="xref-ref-80-3"><span data-dcnode-id="8556" instrument_node="">80</span></a><span data-dcnode-id="8554" instrument_node="">], a cut-off value of 20 mmHg might be preferable. Both exercise and fluid loading increase systemic venous return, but exercise has additional effects, including sympathetic nervous system activation, intrathoracic pressure changes and mixed venous or arterial hypoxaemia. These differences probably impact on their respective efficacies for diagnosis of latent disease [</span><a class="xref-bibr" data-dcnode-id="8552" href="#ref-81" id="xref-ref-81-1"><span data-dcnode-id="8553" instrument_node="">81</span></a><span data-dcnode-id="8551" instrument_node="">].</span></p></div></div><div class="subsection" data-dcnode-id="8523" id="sec-18"><h3 data-dcnode-id="8546"><span data-dcnode-id="8547" instrument_node="">The emerging role of non-invasive assessment of right ventricular function</span></h3><p data-dcnode-id="8529" id="p-46"><span data-dcnode-id="8545" instrument_node="">The role of right ventricular function estimated by non-invasive methods such as echocardiography (two-dimensional, three-dimensional, speckle tracking-derived echocardiography) or CMR is emerging rapidly in observational studies and has been reviewed elsewhere [</span><a class="xref-bibr" data-dcnode-id="8543" href="#ref-82" id="xref-ref-82-1"><span data-dcnode-id="8544" instrument_node="">82</span></a><span data-dcnode-id="8542" instrument_node="">]. Speckle-derived strain technology allows measurements of regional strains by either method and demonstrates heterogeneity of right ventricular strain depending on the region (</span><em data-dcnode-id="8540"><span data-dcnode-id="8541" instrument_node="">e.g.</span></em><span data-dcnode-id="8539" instrument_node=""> apical </span><em data-dcnode-id="8537"><span data-dcnode-id="8538" instrument_node="">versus</span></em><span data-dcnode-id="8536" instrument_node=""> mid or basal region) and occasionally significant differences between disease aetiologies, such as idiopathic PAH (IPAH) and systemic sclerosis (SSc)-associated PAH. Recent larger studies in echocardiography have demonstrated that right ventricular longitudinal strain or indices of right ventricular end-systolic remodelling in combination with N-terminal pro-brain natriuretic peptide and NYHA Functional Class provide good discrimination of outcome in PAH [</span><a class="xref-bibr" data-dcnode-id="8534" href="#ref-83" id="xref-ref-83-1"><span data-dcnode-id="8535" instrument_node="">83</span></a><span data-dcnode-id="8533" instrument_node="">, </span><a class="xref-bibr" data-dcnode-id="8531" href="#ref-84" id="xref-ref-84-1"><span data-dcnode-id="8532" instrument_node="">84</span></a><span data-dcnode-id="8530" instrument_node="">].</span></p><p data-dcnode-id="8524" id="p-47"><span data-dcnode-id="8528" instrument_node="">Imaging modalities may be incorporated into large multicentre clinical trials in PH using composite morbidity and mortality end-points, which would be ideal settings to validate potential right ventricle-based surrogate end-points. Since CMR has greater sensitivity and reproducibility than ultrasound, and can detect an efficacy signal with a small sample size in a relatively short period of time, validation of specific right ventricle surrogate CMR markers (</span><em data-dcnode-id="8526"><span data-dcnode-id="8527" instrument_node="">e.g.</span></em><span data-dcnode-id="8525" instrument_node=""> RVEF, right ventricular mass, right ventricular mass index; left ventricle size and function) in the setting of smaller phase 2 trials would be useful to help identify potentially promising therapies. This could allow the creation of prediction scores constructed from a hierarchically organised series of identified independent predictors.</span></p></div></div><div class="section" data-dcnode-id="8383" id="sec-19"><h2 class="" data-dcnode-id="8520"><span data-dcnode-id="8521" instrument_node="">Recent insights in the pathobiology of right ventricular failure</span></h2><p data-dcnode-id="8512" id="p-48"><span data-dcnode-id="8519" instrument_node="">Since the 5th World Symposium on Pulmonary Hypertension report in 2013 [</span><a class="xref-bibr" data-dcnode-id="8517" href="#ref-2" id="xref-ref-2-3"><span data-dcnode-id="8518" instrument_node="">2</span></a><span data-dcnode-id="8516" instrument_node="">], there have been major advances in understanding the underlying pathobiology of right ventricular remodelling and failure. This knowledge has been derived both from animal models, reviewed elsewhere [</span><a class="xref-bibr" data-dcnode-id="8514" href="#ref-85" id="xref-ref-85-1"><span data-dcnode-id="8515" instrument_node="">85</span></a><span data-dcnode-id="8513" instrument_node="">], and, importantly, from human tissue. Recent work has focused on several main themes and a thorough review of the complete breadth of right ventricular failure mechanisms is beyond the scope of the current article.</span></p><p data-dcnode-id="8480" id="p-49"><span data-dcnode-id="8511" instrument_node="">First, there has been an expansion of the understanding that genetic features may affect right ventricular stress responses. It is well recognised that patients with heritable forms of PAH (HPAH) have poorer survival than their IPAH counterparts, but recent work has demonstrated that this is related to more severe right ventricular failure in HPAH due to </span><em data-dcnode-id="8509"><span data-dcnode-id="8510" instrument_node="">BMPR2</span></em><span data-dcnode-id="8508" instrument_node=""> (bone morphogenetic protein receptor type 2) mutation despite similar levels of afterload, suggesting a genetic contribution to right ventricular failure [</span><a class="xref-bibr" data-dcnode-id="8506" href="#ref-86" id="xref-ref-86-1"><span data-dcnode-id="8507" instrument_node="">86</span></a><span data-dcnode-id="8505" instrument_node="">]. In a different series of investigations, </span><em data-dcnode-id="8503"><span data-dcnode-id="8504" instrument_node="">BMPR2</span></em><span data-dcnode-id="8502" instrument_node=""> mutation was shown to promote lipotoxicity in the </span><em data-dcnode-id="8500"><span data-dcnode-id="8501" instrument_node="">BMPR2</span></em><span data-dcnode-id="8499" instrument_node=""> mutant right ventricle in rodents, in humans and in cultured cardiomyocytes with overexpression of mutant </span><em data-dcnode-id="8497"><span data-dcnode-id="8498" instrument_node="">BMPR2</span></em><span data-dcnode-id="8496" instrument_node=""> [</span><a class="xref-bibr" data-dcnode-id="8494" href="#ref-87" id="xref-ref-87-1"><span data-dcnode-id="8495" instrument_node="">87</span></a><span data-dcnode-id="8493" instrument_node="">–</span><a class="xref-bibr" data-dcnode-id="8491" href="#ref-89" id="xref-ref-89-1"><span data-dcnode-id="8492" instrument_node="">89</span></a><span data-dcnode-id="8490" instrument_node="">]. More recently, P</span><span class="sc" data-dcnode-id="8488"><span data-dcnode-id="8489" instrument_node="">otus</span></span><span data-dcnode-id="8487" instrument_node=""> </span><em data-dcnode-id="8485"><span data-dcnode-id="8486" instrument_node="">et&nbsp;al</span></em><span data-dcnode-id="8484" instrument_node="">. [</span><a class="xref-bibr" data-dcnode-id="8482" href="#ref-90" id="xref-ref-90-1"><span data-dcnode-id="8483" instrument_node="">90</span></a><span data-dcnode-id="8481" instrument_node="">] demonstrated downregulation of miR-126 in human tissue and the monocrotaline model of right ventricular failure, with subsequent reduction in angiogenesis. Taken together, these data suggest a role for genetic regulation of right ventricular failure and may be used to develop new models of right ventricular failure.</span></p><p data-dcnode-id="8457" id="p-50"><span data-dcnode-id="8479" instrument_node="">The effect of sex hormones on the right ventricle has gained further attention. Male sex is known to be an independent risk factor for poor survival [</span><a class="xref-bibr" data-dcnode-id="8477" href="#ref-91" id="xref-ref-91-1"><span data-dcnode-id="8478" instrument_node="">91</span></a><span data-dcnode-id="8476" instrument_node="">] and J</span><span class="sc" data-dcnode-id="8474"><span data-dcnode-id="8475" instrument_node="">acobs</span></span><span data-dcnode-id="8473" instrument_node=""> </span><em data-dcnode-id="8471"><span data-dcnode-id="8472" instrument_node="">et&nbsp;al.</span></em><span data-dcnode-id="8470" instrument_node=""> [</span><a class="xref-bibr" data-dcnode-id="8468" href="#ref-92" id="xref-ref-92-1"><span data-dcnode-id="8469" instrument_node="">92</span></a><span data-dcnode-id="8467" instrument_node="">] found that despite a similar burden of PVD, male patients lack improvement in RVEF regardless of treatment, while their female counterparts improved RVEF. F</span><span class="sc" data-dcnode-id="8465"><span data-dcnode-id="8466" instrument_node="">rump</span></span><span data-dcnode-id="8464" instrument_node=""> </span><em data-dcnode-id="8462"><span data-dcnode-id="8463" instrument_node="">et&nbsp;al.</span></em><span data-dcnode-id="8461" instrument_node=""> [</span><a class="xref-bibr" data-dcnode-id="8459" href="#ref-93" id="xref-ref-93-1"><span data-dcnode-id="8460" instrument_node="">93</span></a><span data-dcnode-id="8458" instrument_node="">] demonstrated using the Sugen hypoxia models that oestrogen improves right ventricular function and bioenergetics, and reduces proapoptotic signalling and inflammatory cytokine expression, perhaps suggesting a protective role for oestrogen underlying the clinically recognised sex differences.</span></p><p data-dcnode-id="8431" id="p-51"><span data-dcnode-id="8456" instrument_node="">There is improved understanding of right ventricle metabolism with recent findings that right ventricular failure is characterised by reduced fatty acid oxidation in addition to increased glycolysis [</span><a class="xref-bibr" data-dcnode-id="8454" href="#ref-87" id="xref-ref-87-2"><span data-dcnode-id="8455" instrument_node="">87</span></a><span data-dcnode-id="8453" instrument_node="">, </span><a class="xref-bibr" data-dcnode-id="8451" href="#ref-88" id="xref-ref-88-1"><span data-dcnode-id="8452" instrument_node="">88</span></a><span data-dcnode-id="8450" instrument_node="">, </span><a class="xref-bibr" data-dcnode-id="8448" href="#ref-94" id="xref-ref-94-1"><span data-dcnode-id="8449" instrument_node="">94</span></a><span data-dcnode-id="8447" instrument_node="">, </span><a class="xref-bibr" data-dcnode-id="8445" href="#ref-95" id="xref-ref-95-1"><span data-dcnode-id="8446" instrument_node="">95</span></a><span data-dcnode-id="8444" instrument_node="">]. Presently, it is unknown if enhanced fatty acid oxidation or improved glucose oxidation would most successfully improve right ventricular function. Finally, there is a new perception of the contribution of altered cytoskeletal function in the right ventricle. Pulmonary artery banding was used to induce right ventricular hypertrophy and dysfunction in rats, resulting in increased myocardial stiffness with increased fibrosis- and myofibril-mediated stiffness [</span><a class="xref-bibr" data-dcnode-id="8442" href="#ref-96" id="xref-ref-96-1"><span data-dcnode-id="8443" instrument_node="">96</span></a><span data-dcnode-id="8441" instrument_node="">]. Using the monocrotaline model, P</span><span class="sc" data-dcnode-id="8439"><span data-dcnode-id="8440" instrument_node="">rins</span></span><span data-dcnode-id="8438" instrument_node=""> </span><em data-dcnode-id="8436"><span data-dcnode-id="8437" instrument_node="">et&nbsp;al.</span></em><span data-dcnode-id="8435" instrument_node=""> [</span><a class="xref-bibr" data-dcnode-id="8433" href="#ref-97" id="xref-ref-97-1"><span data-dcnode-id="8434" instrument_node="">97</span></a><span data-dcnode-id="8432" instrument_node="">] found abnormal t-tubule architecture associated with reduced junctophillin-2 expression. Colchicine ameliorated these findings, perhaps suggesting a new therapeutic avenue for the failing right ventricle. Taken together, these studies present new data on the role of the cytoskeleton and myocardial fibrosis in promoting right ventricular dysfunction.</span></p><p data-dcnode-id="8426" id="p-52"><span data-dcnode-id="8430" instrument_node="">Animal models of right ventricular failure related to group 2 PH should be developed and may require a “multiple-hit” rather than “single-hit” approach in order to more adequately reproduce the clinical syndrome [</span><a class="xref-bibr" data-dcnode-id="8428" href="#ref-98" id="xref-ref-98-1"><span data-dcnode-id="8429" instrument_node="">98</span></a><span data-dcnode-id="8427" instrument_node="">].</span></p><p data-dcnode-id="8384" id="p-53"><span data-dcnode-id="8425" instrument_node="">Finally, insight into the pathophysiology of right ventricular function is also emerging from human right ventricle biopsies. Isolated cardiomyocytes thus obtained may allow for deep phenotyping and mechanistic investigations of specific pathways. Using this approach in patients with end-stage PAH undergoing heart–lung transplantation, and comparing with non-failing donors, R</span><span class="sc" data-dcnode-id="8423"><span data-dcnode-id="8424" instrument_node="">ain</span></span><span data-dcnode-id="8422" instrument_node=""> </span><em data-dcnode-id="8420"><span data-dcnode-id="8421" instrument_node="">et&nbsp;al</span></em><span data-dcnode-id="8419" instrument_node="">. [</span><a class="xref-bibr" data-dcnode-id="8417" href="#ref-20" id="xref-ref-20-4"><span data-dcnode-id="8418" instrument_node="">20</span></a><span data-dcnode-id="8416" instrument_node="">] demonstrated increased fibrosis and stiffening of right ventricle sarcomeres in conjunction with decreased titin phosphorylation in PAH. A recent study by H</span><span class="sc" data-dcnode-id="8414"><span data-dcnode-id="8415" instrument_node="">su</span></span><span data-dcnode-id="8413" instrument_node=""> </span><em data-dcnode-id="8411"><span data-dcnode-id="8412" instrument_node="">et&nbsp;al</span></em><span data-dcnode-id="8410" instrument_node="">. [</span><a class="xref-bibr" data-dcnode-id="8408" href="#ref-99" id="xref-ref-99-1"><span data-dcnode-id="8409" instrument_node="">99</span></a><span data-dcnode-id="8407" instrument_node="">], using right ventricle biopsies obtained during RHC under echocardiographic guidance, revealed that patients with SSc-PAH have depressed sarcomeric function, which is manifested by a significant decline in maximal force (</span><em data-dcnode-id="8405"><span data-dcnode-id="8406" instrument_node="">F</span></em><sub data-dcnode-id="8403"><span data-dcnode-id="8404" instrument_node="">max</span></sub><span data-dcnode-id="8402" instrument_node="">) calcium dependence compared with non-PAH patients, while the opposite (</span><em data-dcnode-id="8400"><span data-dcnode-id="8401" instrument_node="">i.e.</span></em><span data-dcnode-id="8399" instrument_node=""> increased calcium-activated </span><em data-dcnode-id="8397"><span data-dcnode-id="8398" instrument_node="">F</span></em><sub data-dcnode-id="8395"><span data-dcnode-id="8396" instrument_node="">max</span></sub><span data-dcnode-id="8394" instrument_node="">) was demonstrated for patients with IPAH, in line with data obtained by R</span><span class="sc" data-dcnode-id="8392"><span data-dcnode-id="8393" instrument_node="">ain</span></span><span data-dcnode-id="8391" instrument_node=""> </span><em data-dcnode-id="8389"><span data-dcnode-id="8390" instrument_node="">et&nbsp;al</span></em><span data-dcnode-id="8388" instrument_node="">. [</span><a class="xref-bibr" data-dcnode-id="8386" href="#ref-20" id="xref-ref-20-5"><span data-dcnode-id="8387" instrument_node="">20</span></a><span data-dcnode-id="8385" instrument_node="">] in (non-scleroderma) PAH patients. Collectively, these findings may explain the significant differences in outcomes and survival in these two groups of patients.</span></p></div><div class="section" data-dcnode-id="8360" id="sec-20"><h2 class="" data-dcnode-id="8381"><span data-dcnode-id="8382" instrument_node="">Future directions</span></h2><p data-dcnode-id="8376" id="p-54"><span data-dcnode-id="8380" instrument_node="">A summary of future directions is given in </span><a data-dcnode-id="8378" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//erj.ersjournals.com/lookup/doi/10.1183/13993003.01900-2018.figures-only%23fig-data-supplementary-materials"><span data-dcnode-id="8379" instrument_node="">supplementary figure S1b</span></a><span data-dcnode-id="8377" instrument_node="">.</span></p><p data-dcnode-id="8371" id="p-55"><span data-dcnode-id="8375" instrument_node="">Our insights into the role of the right ventricle in PH have considerably improved over recent years. These insights allow for a full assessment of right ventricular function and pulmonary vascular load based on pressure and volume measurements in patients. Such an assessment permits us to test the differential effects of future drugs on the right ventricle and pulmonary vasculature. Use of CMR should be implemented in PAH clinical trials and clinical practice when possible. Molecular imaging should be used to translate from bench to bedside (and </span><em data-dcnode-id="8373"><span data-dcnode-id="8374" instrument_node="">vice versa</span></em><span data-dcnode-id="8372" instrument_node="">). Novel approaches are necessary to show the clinical value of echocardiography for predicting response and tailoring therapy.</span></p><p data-dcnode-id="8366" id="p-56"><span data-dcnode-id="8370" instrument_node="">Currently, the clinical relevance of an abnormal exercise pulmonary haemodynamic response is largely unknown and requires long-term follow-up studies. If PH is present, diuretics and atrioseptostomy are the only options available to treat the right ventricle, mainly by reducing wall tension [</span><a class="xref-bibr" data-dcnode-id="8368" href="#ref-100" id="xref-ref-100-1"><span data-dcnode-id="8369" instrument_node="">100</span></a><span data-dcnode-id="8367" instrument_node="">].</span></p><p data-dcnode-id="8361" id="p-57"><span data-dcnode-id="8365" instrument_node="">Better characterisation of normal right ventricular function, early dysfunction and irreversible failure is needed. Growing insights into how to prevent right ventricular failure at a biological level need to be translated to the clinic </span><em data-dcnode-id="8363"><span data-dcnode-id="8364" instrument_node="">via</span></em><span data-dcnode-id="8362" instrument_node=""> well-designed trials. If right ventricular failure is present, the role of inotropic agents is unknown. Based on the finding that contractile reserve of the right ventricle is absent in advanced disease, the effectiveness of inotropic drugs in end-stage right ventricular failure needs to be re-evaluated. Finally, the optimal medical care of patients in end-stage right heart failure needs to be&nbsp;defined.</span></p></div><div class="section" data-dcnode-id="8343" id="sec-21"><h2 class="" data-dcnode-id="8358"><span data-dcnode-id="8359" instrument_node="">Supplementary material</span></h2><div class="supplementary-material" data-dcnode-id="8344" id="DC1"><h3 class="" data-dcnode-id="8356"><span data-dcnode-id="8357" instrument_node="">Supplementary Material</span></h3><p data-dcnode-id="8352" id="p-58"><strong data-dcnode-id="8354"><span data-dcnode-id="8355" instrument_node="">Please note:</span></strong><span data-dcnode-id="8353" instrument_node=""> supplementary material is not edited by the Editorial Office, and is uploaded as it has been supplied by the author.</span></p><p data-dcnode-id="8345" id="p-59"><span data-dcnode-id="8351" instrument_node="">Supplementary figure S1 </span><span class="inline-linked-media-wrapper" data-dcnode-id="8346"><span class="inline-linked-media" data-dcnode-id="8347" id="DC1"><a class="" data-dcnode-id="8348" data-hide-link-title="0" data-icon-position="" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//erj.ersjournals.com/content/erj/53/1/1801900/DC1/embed/inline-supplementary-material-1.pdf%3Fdownload%3Dtrue"><span class="icon-download-alt" data-dcnode-id="8350"></span><span data-dcnode-id="8349" instrument_node="">ERJ-01900-2018_Supplement</span></a></span></span></p></div></div><div class="section fn-group" data-dcnode-id="8295" id="fn-group-1"><h2 data-dcnode-id="8341"><span data-dcnode-id="8342" instrument_node="">Footnotes</span></h2><ul data-dcnode-id="8296"><li class="fn-other" data-dcnode-id="8338" id="fn-1"><p data-dcnode-id="8339" id="p-60"><span data-dcnode-id="8340" instrument_node="">Number 3 in the series “Proceedings of the 6th World Symposium on Pulmonary Hypertension” Edited by N.&nbsp;Galiè, V.V.&nbsp;McLaughlin, L.J.&nbsp;Rubin and G.&nbsp;Simonneau</span></p></li><li class="fn-supplementary-material" data-dcnode-id="8333" id="fn-2"><p data-dcnode-id="8334" id="p-61"><span data-dcnode-id="8337" instrument_node="">This article has supplementary material available from </span><a data-dcnode-id="8335" href="https://chatnoir-
