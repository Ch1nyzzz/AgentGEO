a person with sickle cell disease in the United States was only 14 years. Advances in the diagnosis and care of sickle cell disease have made this improvement possible.</span></p><p data-dcnode-id="1473"><span data-dcnode-id="1478" instrument_node="">At the present time, hematopoietic stem cell transplantation is the only cure for sickle cell disease </span><sup class="footnote_plugin_tooltip_text" data-dcnode-id="1476" id="footnote_plugin_tooltip_12" onclick="footnote_moveToAnchor('footnote_plugin_reference_12');"><span data-dcnode-id="1477" instrument_node="">12)</span></sup><span class="footnote_tooltip" data-dcnode-id="1475" id="footnote_plugin_tooltip_text_12"></span><span data-dcnode-id="1474" instrument_node="">. Unfortunately, most people with sickle cell disease are either too old for a transplant or don’t have a relative who is a good enough genetic match for them to act as a donor. A well-matched donor is needed to have the best chance for a successful transplant.</span></p><p data-dcnode-id="1471"><span data-dcnode-id="1472" instrument_node="">There are effective treatments that can reduce symptoms and prolong life. Early diagnosis and regular medical care to prevent complications also contribute to improved well-being.</span></p><h4 data-dcnode-id="1468"><span data-dcnode-id="1469" id="What_Causes_Sickle_Cell_Disease"><span data-dcnode-id="1470" instrument_node="">What Causes Sickle Cell Disease ?</span></span></h4><p data-dcnode-id="1466"><span data-dcnode-id="1467" instrument_node="">Abnormal hemoglobin, called hemoglobin S, causes sickle cell disease.</span></p><p data-dcnode-id="1464"><span data-dcnode-id="1465" instrument_node="">The problem in hemoglobin S is caused by a small defect in the gene that directs the production of the beta globin part of hemoglobin. This small defect in the beta globin gene causes a problem in the beta globin part of hemoglobin, changing the way that hemoglobin works.</span></p><h4 data-dcnode-id="1461"><span data-dcnode-id="1462" id="How_Is_Sickle_Cell_Disease_Inherited"><span data-dcnode-id="1463" instrument_node="">How Is Sickle Cell Disease Inherited ?</span></span></h4><p data-dcnode-id="1459"><span data-dcnode-id="1460" instrument_node="">When the hemoglobin S gene is inherited from only one parent and a normal hemoglobin gene is inherited from the other, a person will have sickle cell trait. People with sickle cell trait are generally healthy.</span></p><p data-dcnode-id="1457"><span data-dcnode-id="1458" instrument_node="">Only rarely do people with sickle cell trait have complications similar to those seen in people with sickle cell disease. But people with sickle cell trait are carriers of a defective hemoglobin S gene. So, they can pass it on when they have a child.</span></p><p data-dcnode-id="1455"><span data-dcnode-id="1456" instrument_node="">If the child’s other parent also has sickle cell trait or another abnormal hemoglobin gene (like thalassemia, hemoglobin C, hemoglobin D, hemoglobin E), that child has a chance of having sickle cell disease.</span></p><p data-dcnode-id="1452"><strong data-dcnode-id="1453"><span data-dcnode-id="1454" instrument_node="">Figure 9. Sickle cell disease inheritance</span></strong></p><div class="entry-image" data-dcnode-id="1449"><a class="external single-popup" data-dcnode-id="1450" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//healthjade.com/wp-content/uploads/2017/09/sickle-cell-disease-inheritance.jpg" rel="nofollow"><img alt="sickle cell disease inheritance" class="aligncenter wp-image-7454 size-full" data-dcnode-id="1451" height="1756" sizes="(max-width: 1500px) 100vw, 1500px" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//healthjade.com/wp-content/uploads/2017/09/sickle-cell-disease-inheritance.jpg&amp;raw" srcset="https://healthjade.net/wp-content/uploads/2017/09/sickle-cell-disease-inheritance.jpg 1500w, https://healthjade.net/wp-content/uploads/2017/09/sickle-cell-disease-inheritance-256x300.jpg 256w, https://healthjade.net/wp-content/uploads/2017/09/sickle-cell-disease-inheritance-768x899.jpg 768w, https://healthjade.net/wp-content/uploads/2017/09/sickle-cell-disease-inheritance-875x1024.jpg 875w" width="1500"></a></div><span data-dcnode-id="1448" instrument_node=""> [Source </span><sup class="footnote_plugin_tooltip_text" data-dcnode-id="1446" id="footnote_plugin_tooltip_13" onclick="footnote_moveToAnchor('footnote_plugin_reference_13');"><span data-dcnode-id="1447" instrument_node="">13)</span></sup><span class="footnote_tooltip" data-dcnode-id="1445" id="footnote_plugin_tooltip_text_13"></span><span data-dcnode-id="1444" instrument_node="">]</span><p data-dcnode-id="1442"><span data-dcnode-id="1443" instrument_node="">In the image above, each parent has one hemoglobin A gene and one hemoglobin S gene, and each of their children has:</span></p><ul data-dcnode-id="1435"><li data-dcnode-id="1440"><span data-dcnode-id="1441" instrument_node="">A 25 percent chance of inheriting two normal genes: In this case the child does not have sickle cell trait or disease. (Blue)</span></li><li data-dcnode-id="1438"><span data-dcnode-id="1439" instrument_node="">A 50 percent chance of inheriting one hemoglobin A gene and one hemoglobin S gene: This child has sickle cell trait. (Purple)</span></li><li data-dcnode-id="1436"><span data-dcnode-id="1437" instrument_node="">A 25 percent chance of inheriting two hemoglobin S genes: This child has sickle cell disease. (Red)</span></li></ul><p data-dcnode-id="1433"><span data-dcnode-id="1434" instrument_node="">It is important to keep in mind that each time this couple has a child, the chances of that child having sickle cell disease remain the same. In other words, if the first-born child has sickle cell disease, there is still a 25 percent chance that the second child will also have the disease. Both boys and girls can inherit sickle cell trait, sickle cell disease, or normal hemoglobin.</span></p><p data-dcnode-id="1431"><span data-dcnode-id="1432" instrument_node="">If a person wants to know if he or she carries a sickle hemoglobin gene, a doctor can order a blood test to find out.</span></p><h4 data-dcnode-id="1428"><span data-dcnode-id="1429" id="What_Are_the_Signs_and_Symptoms_of_Sickle_Cell_Disease"><span data-dcnode-id="1430" instrument_node="">What Are the Signs and Symptoms of Sickle Cell Disease ?</span></span></h4><p data-dcnode-id="1425"><strong data-dcnode-id="1426"><span data-dcnode-id="1427" instrument_node="">Early Signs and Symptoms</span></strong></p><p data-dcnode-id="1423"><span data-dcnode-id="1424" instrument_node="">If a person has sickle cell disease, it is present at birth. But most infants do not have any problems from the disease until they are about 5 or 6 months of age. Every state in the United States, the District of Columbia, and the U.S. territories requires that all newborn babies receive screening for sickle cell disease. When a child has sickle cell disease, parents are notified before the child has symptoms.</span></p><p data-dcnode-id="1421"><span data-dcnode-id="1422" instrument_node="">Some children with sickle cell disease will start to have problems early on, and some later. Early symptoms of sickle cell disease may include:</span></p><ul data-dcnode-id="1414"><li data-dcnode-id="1419"><span data-dcnode-id="1420" instrument_node="">Painful swelling of the hands and feet, known as dactylitis</span></li><li data-dcnode-id="1417"><span data-dcnode-id="1418" instrument_node="">Fatigue or fussiness from anemia</span></li><li data-dcnode-id="1415"><span data-dcnode-id="1416" instrument_node="">A yellowish color of the skin, known as jaundice, or whites of the eyes, known as icteris, that occurs when a large number of red cells hemolyze</span></li></ul><p data-dcnode-id="1412"><span data-dcnode-id="1413" instrument_node="">The signs and symptoms of sickle cell disease will vary from person to person and can change over time. Most of the signs and symptoms of sickle cell disease are related to complications of the disease.</span></p><h4 data-dcnode-id="1409"><span data-dcnode-id="1410" id="Major_Complications_of_Sickle_Cell_Disease"><span data-dcnode-id="1411" instrument_node="">Major Complications of Sickle Cell Disease</span></span></h4><p data-dcnode-id="1406"><strong data-dcnode-id="1407"><span data-dcnode-id="1408" instrument_node="">Acute Pain (Sickle Cell or Vaso-occlusive) Crisis</span></strong></p><p data-dcnode-id="1404"><span data-dcnode-id="1405" instrument_node="">Pain episodes (crises) can occur without warning when sickle cells block blood flow and decrease oxygen delivery. People describe this pain as sharp, intense, stabbing, or throbbing. Severe crises can be even more uncomfortable than post-surgical pain or childbirth.</span></p><p data-dcnode-id="1402"><span data-dcnode-id="1403" instrument_node="">Pain can strike almost anywhere in the body and in more than one spot at a time. But the pain often occurs in the</span></p><ul data-dcnode-id="1391"><li data-dcnode-id="1400"><span data-dcnode-id="1401" instrument_node="">Lower back</span></li><li data-dcnode-id="1398"><span data-dcnode-id="1399" instrument_node="">Legs</span></li><li data-dcnode-id="1396"><span data-dcnode-id="1397" instrument_node="">Arms</span></li><li data-dcnode-id="1394"><span data-dcnode-id="1395" instrument_node="">Abdomen</span></li><li data-dcnode-id="1392"><span data-dcnode-id="1393" instrument_node="">Chest</span></li></ul><p data-dcnode-id="1388"><strong data-dcnode-id="1389"><span data-dcnode-id="1390" instrument_node="">A crisis can be brought on by</span></strong></p><ul data-dcnode-id="1377"><li data-dcnode-id="1386"><span data-dcnode-id="1387" instrument_node="">Illness</span></li><li data-dcnode-id="1384"><span data-dcnode-id="1385" instrument_node="">Temperature changes</span></li><li data-dcnode-id="1382"><span data-dcnode-id="1383" instrument_node="">Stress</span></li><li data-dcnode-id="1380"><span data-dcnode-id="1381" instrument_node="">Dehydration (not drinking enough)</span></li><li data-dcnode-id="1378"><span data-dcnode-id="1379" instrument_node="">Being at high altitudes</span></li></ul><p data-dcnode-id="1375"><span data-dcnode-id="1376" instrument_node="">But often a person does not know what triggers, or causes, the crisis.</span></p><p data-dcnode-id="1372"><strong data-dcnode-id="1373"><span data-dcnode-id="1374" instrument_node="">Chronic Pain</span></strong></p><p data-dcnode-id="1370"><span data-dcnode-id="1371" instrument_node="">Many adolescents and adults with sickle cell disease suffer from chronic pain. This kind of pain has been hard for people to describe, but it is usually different from crisis pain or the pain that results from organ damage.</span></p><p data-dcnode-id="1368"><span data-dcnode-id="1369" instrument_node="">Chronic pain can be severe and can make life difficult. Its cause is not well understood.</span></p><p data-dcnode-id="1365"><strong data-dcnode-id="1366"><span data-dcnode-id="1367" instrument_node="">Severe Anemia</span></strong></p><p data-dcnode-id="1363"><span data-dcnode-id="1364" instrument_node="">People with sickle cell disease usually have mild to moderate anemia. At times, however, they can have severe anemia. Severe anemia can be life threatening. Severe anemia in an infant or child with sickle cell disease may be caused by:</span></p><ul data-dcnode-id="1359"><li data-dcnode-id="1360"><strong data-dcnode-id="1361"><span data-dcnode-id="1362" instrument_node="">Splenic sequestration crisis</span></strong></li></ul><p data-dcnode-id="1357"><span data-dcnode-id="1358" instrument_node="">The spleen is an organ that is located in the upper left side of the belly. The spleen filters germs in the blood, breaks up blood cells, and makes a kind of white blood cell. A splenic sequestration crisis occurs when red blood cells get stuck in the spleen, making it enlarge quickly. Since the red blood cells are trapped in the spleen, there are fewer cells to circulate in the blood. This causes severe anemia.</span></p><p data-dcnode-id="1355"><span data-dcnode-id="1356" instrument_node="">A big spleen may also cause pain in the left side of the belly. A parent can usually palpate or feel the enlarged spleen in the belly of his or her child.</span></p><ul data-dcnode-id="1351"><li data-dcnode-id="1352"><strong data-dcnode-id="1353"><span data-dcnode-id="1354" instrument_node="">Aplastic crisis</span></strong></li></ul><p data-dcnode-id="1349"><span data-dcnode-id="1350" instrument_node="">Aplastic crisis is usually caused by a parvovirus B19 infection, also called fifth disease or slapped cheek syndrome. Parvovirus B19 is a very common infection, but in sickle cell disease it can cause the bone marrow to stop producing new red cells for a while, leading to severe anemia.</span></p><p data-dcnode-id="1347"><span data-dcnode-id="1348" instrument_node="">Splenic sequestration crisis and aplastic crisis most commonly occur in infants and children with sickle cell disease. Adults with sickle cell disease may also experience episodes of severe anemia, but these usually have other causes.</span></p><p data-dcnode-id="1345"><span data-dcnode-id="1346" instrument_node="">No matter the cause, severe anemia may lead to symptoms that include:</span></p><ul data-dcnode-id="1336"><li data-dcnode-id="1343"><span data-dcnode-id="1344" instrument_node="">Shortness of breath</span></li><li data-dcnode-id="1341"><span data-dcnode-id="1342" instrument_node="">Being very tired</span></li><li data-dcnode-id="1339"><span data-dcnode-id="1340" instrument_node="">Feeling dizzy</span></li><li data-dcnode-id="1337"><span data-dcnode-id="1338" instrument_node="">Having pale skin</span></li></ul><p data-dcnode-id="1334"><span data-dcnode-id="1335" instrument_node="">Babies and infants with severe anemia may feed poorly and seem very sluggish.</span></p><ul data-dcnode-id="1330"><li data-dcnode-id="1331"><strong data-dcnode-id="1332"><span data-dcnode-id="1333" instrument_node="">Infections</span></strong></li></ul><p data-dcnode-id="1328"><span data-dcnode-id="1329" instrument_node="">The spleen is important for protection against certain kinds of germs. Sickle cells can damage the spleen and weaken or destroy its function early in life.</span></p><p data-dcnode-id="1326"><span data-dcnode-id="1327" instrument_node="">People with sickle cell disease who have damaged spleens are at risk for serious bacterial infections that can be life-threatening. Some of these bacteria include:</span></p><ul data-dcnode-id="1311"><li data-dcnode-id="1324"><span data-dcnode-id="1325" instrument_node="">Pneumococcus</span></li><li data-dcnode-id="1322"><span data-dcnode-id="1323" instrument_node="">Hemophilus influenza type B</span></li><li data-dcnode-id="1320"><span data-dcnode-id="1321" instrument_node="">Meningococcus</span></li><li data-dcnode-id="1318"><span data-dcnode-id="1319" instrument_node="">Salmonella</span></li><li data-dcnode-id="1316"><span data-dcnode-id="1317" instrument_node="">Staphylococcus</span></li><li data-dcnode-id="1314"><span data-dcnode-id="1315" instrument_node="">Chlamydia</span></li><li data-dcnode-id="1312"><span data-dcnode-id="1313" instrument_node="">Mycoplasma pneumoniae</span></li></ul><p data-dcnode-id="1309"><span data-dcnode-id="1310" instrument_node="">Bacteria can cause:</span></p><ul data-dcnode-id="1300"><li data-dcnode-id="1307"><span data-dcnode-id="1308" instrument_node="">Blood infection (septicemia)</span></li><li data-dcnode-id="1305"><span data-dcnode-id="1306" instrument_node="">Lung infection (pneumonia)</span></li><li data-dcnode-id="1303"><span data-dcnode-id="1304" instrument_node="">Infection of the covering of the brain and spinal cord (meningitis)</span></li><li data-dcnode-id="1301"><span data-dcnode-id="1302" instrument_node="">Bone infection (osteomyelitis)</span></li></ul><h4 data-dcnode-id="1297"><span data-dcnode-id="1298" id="Acute_Chest_Syndrome"><span data-dcnode-id="1299" instrument_node="">Acute Chest Syndrome</span></span></h4><p data-dcnode-id="1295"><span data-dcnode-id="1296" instrument_node="">Sickling in blood vessels of the lungs can deprive a person’s lungs of oxygen. When this happens, areas of lung tissue are damaged and cannot exchange oxygen properly. This condition is known as acute chest syndrome. In acute chest syndrome, at least one segment of the lung is damaged.</span></p><p data-dcnode-id="1293"><span data-dcnode-id="1294" instrument_node="">This condition is very serious and should be treated right away at a hospital.</span></p><p data-dcnode-id="1291"><span data-dcnode-id="1292" instrument_node="">Acute chest syndrome often starts a few days after a painful crisis begins. A lung infection may accompany acute chest syndrome.</span></p><p data-dcnode-id="1289"><span data-dcnode-id="1290" instrument_node="">Symptoms may include:</span></p><ul data-dcnode-id="1278"><li data-dcnode-id="1287"><span data-dcnode-id="1288" instrument_node="">Chest pain</span></li><li data-dcnode-id="1285"><span data-dcnode-id="1286" instrument_node="">Fever</span></li><li data-dcnode-id="1283"><span data-dcnode-id="1284" instrument_node="">Shortness of breath</span></li><li data-dcnode-id="1281"><span data-dcnode-id="1282" instrument_node="">Rapid breathing</span></li><li data-dcnode-id="1279"><span data-dcnode-id="1280" instrument_node="">Cough</span></li></ul><h4 data-dcnode-id="1275"><span data-dcnode-id="1276" id="Brain_Complications"><span data-dcnode-id="1277" instrument_node="">Brain Complications</span></span></h4><p data-dcnode-id="1272"><strong data-dcnode-id="1273"><span data-dcnode-id="1274" instrument_node="">Clinical Stroke</span></strong></p><p data-dcnode-id="1270"><span data-dcnode-id="1271" instrument_node="">A stroke occurs when blood flow is blocked to a part of the brain. When this happens, brain cells can be damaged or can die. In sickle cell disease, a clinical stroke means that a person shows outward signs that something is wrong. The symptoms depend upon what part of the brain is affected. Symptoms of stroke may include:</span></p><ul data-dcnode-id="1261"><li data-dcnode-id="1268"><span data-dcnode-id="1269" instrument_node="">Weakness of an arm or leg on one side of the body</span></li><li data-dcnode-id="1266"><span data-dcnode-id="1267" instrument_node="">Trouble speaking, walking, or understanding</span></li><li data-dcnode-id="1264"><span data-dcnode-id="1265" instrument_node="">Loss of balance</span></li><li data-dcnode-id="1262"><span data-dcnode-id="1263" instrument_node="">Severe headache</span></li></ul><p data-dcnode-id="1259"><span data-dcnode-id="1260" instrument_node="">As many as 24 percent of people with hemoglobin SS and 10 percent of people with hemoglobin SC may suffer a clinical stroke by age 45.</span></p><p data-dcnode-id="1257"><span data-dcnode-id="1258" instrument_node="">In children, clinical stroke occurs most commonly between the ages of 2 and 9, but recent prevention strategies have lowered the risk.</span></p><p data-dcnode-id="1255"><span data-dcnode-id="1256" instrument_node="">When people with sickle cell disease show symptoms of stroke, their families or friends should call your local emergency number right away.</span></p><p data-dcnode-id="1252"><strong data-dcnode-id="1253"><span data-dcnode-id="1254" instrument_node="">Silent Stroke and Thinking Problems</span></strong></p><p data-dcnode-id="1250"><span data-dcnode-id="1251" instrument_node="">Brain imaging and tests of thinking (cognitive studies) have shown that children and adults with hemoglobin SS and hemoglobin Sβ0 thalassemia often have signs of silent brain injury, also called silent stroke. Silent brain injury is damage to the brain without showing outward signs of stroke.</span></p><p data-dcnode-id="1248"><span data-dcnode-id="1249" instrument_node="">This injury is common. Silent brain injury can lead to learning problems or trouble making decisions or holding down a job.</span></p><p data-dcnode-id="1245"><strong data-dcnode-id="1246"><span data-dcnode-id="1247" instrument_node="">Eye Problems</span></strong></p><p data-dcnode-id="1243"><span data-dcnode-id="1244" instrument_node="">Sickle cell disease can injure blood vessels in the eye.</span></p><p data-dcnode-id="1241"><span data-dcnode-id="1242" instrument_node="">The most common site of damage is the retina, where blood vessels can overgrow, get blocked, or bleed. The retina is the light-sensitive layer of tissue that lines the inside of the eye and sends visual messages through the optic nerve to the brain.</span></p><p data-dcnode-id="1239"><span data-dcnode-id="1240" instrument_node="">Detachment of the retina can occur. When the retina detaches, it is lifted or pulled from its normal position. These problems can cause visual impairment or loss.</span></p><p data-dcnode-id="1236"><strong data-dcnode-id="1237"><span data-dcnode-id="1238" instrument_node="">Heart Disease</span></strong></p><p data-dcnode-id="1234"><span data-dcnode-id="1235" instrument_node="">People with sickle cell disease can have problems with blood vessels in the heart and with heart function. The heart can become enlarged. People can also develop pulmonary hypertension.</span></p><p data-dcnode-id="1232"><span data-dcnode-id="1233" instrument_node="">People with sickle cell disease who have received frequent blood transfusions may also have heart damage from iron overload.</span></p><p data-dcnode-id="1229"><strong data-dcnode-id="1230"><span data-dcnode-id="1231" instrument_node="">Pulmonary Hypertension</span></strong></p><p data-dcnode-id="1227"><span data-dcnode-id="1228" instrument_node="">In adolescents and adults, injury to blood vessels in the lungs can make it hard for the heart to pump blood through them. This causes the pressure in lung blood vessels to rise. High pressure in these blood vessels is called pulmonary hypertension. Symptoms may include shortness of breath and fatigue.</span></p><p data-dcnode-id="1225"><span data-dcnode-id="1226" instrument_node="">When this condition is severe, it has been associated with a higher risk of death.</span></p><p data-dcnode-id="1222"><strong data-dcnode-id="1223"><span data-dcnode-id="1224" instrument_node="">Kidney Problems</span></strong></p><p data-dcnode-id="1220"><span data-dcnode-id="1221" instrument_node="">The kidneys are sensitive to the effects of red blood cell sickling.</span></p><p data-dcnode-id="1218"><span data-dcnode-id="1219" instrument_node="">Sickle cell disease causes the kidneys to have trouble making the urine as concentrated as it should be. This may lead to a need to urinate often and to have bedwetting or uncontrolled urination during the night (nocturnal enuresis). This often starts in childhood. Other problems may include:</span></p><ul data-dcnode-id="1209"><li data-dcnode-id="1216"><span data-dcnode-id="1217" instrument_node="">Blood in the urine</span></li><li data-dcnode-id="1214"><span data-dcnode-id="1215" instrument_node="">Decreased kidney function</span></li><li data-dcnode-id="1212"><span data-dcnode-id="1213" instrument_node="">Kidney disease</span></li><li data-dcnode-id="1210"><span data-dcnode-id="1211" instrument_node="">Protein loss in the urine</span></li></ul><p data-dcnode-id="1206"><strong data-dcnode-id="1207"><span data-dcnode-id="1208" instrument_node="">Priapism</span></strong></p><p data-dcnode-id="1204"><span data-dcnode-id="1205" instrument_node="">Males with sickle cell disease can have unwanted, sometimes prolonged, painful erections. This condition is called priapism.</span></p><p data-dcnode-id="1202"><span data-dcnode-id="1203" instrument_node="">Priapism happens when blood flow out of the erect penis is blocked by sickled cells. If it goes on for a long period of time, priapism can cause permanent damage to the penis and lead to impotence.</span></p><p data-dcnode-id="1200"><span data-dcnode-id="1201" instrument_node="">If priapism lasts for more than 4 hours, emergency medical care should be sought to avoid complications.</span></p><p data-dcnode-id="1197"><strong data-dcnode-id="1198"><span data-dcnode-id="1199" instrument_node="">Gallstones</span></strong></p><p data-dcnode-id="1195"><span data-dcnode-id="1196" instrument_node="">When red cells hemolyze, they release hemoglobin. Hemoglobin gets broken down into a substance called bilirubin. Bilirubin can form stones that get stuck in the gallbladder. The gallbladder is a small, sac-shaped organ beneath the liver that helps with digestion. Gallstones are a common problem in sickle cell disease.</span></p><p data-dcnode-id="1193"><span data-dcnode-id="1194" instrument_node="">Gallstones may be formed early on but may not produce symptoms for years. When symptoms develop, they may include:</span></p><ul data-dcnode-id="1186"><li data-dcnode-id="1191"><span data-dcnode-id="1192" instrument_node="">Right-sided upper belly pain</span></li><li data-dcnode-id="1189"><span data-dcnode-id="1190" instrument_node="">Nausea</span></li><li data-dcnode-id="1187"><span data-dcnode-id="1188" instrument_node="">Vomiting</span></li></ul><p data-dcnode-id="1184"><span data-dcnode-id="1185" instrument_node="">If problems continue or recur, a person may need surgery to remove the gallbladder.</span></p><p data-dcnode-id="1181"><strong data-dcnode-id="1182"><span data-dcnode-id="1183" instrument_node="">Liver Complications</span></strong></p><p data-dcnode-id="1179"><span data-dcnode-id="1180" instrument_node="">There are a number of ways in which the liver may be injured in sickle cell disease.</span></p><p data-dcnode-id="1177"><span data-dcnode-id="1178" instrument_node="">Sickle cell intrahepatic cholestasis is an uncommon, but severe, form of liver damage that occurs when sickled red cells block blood vessels in the liver. This blockage prevents enough oxygen from reaching liver tissue.</span></p><p data-dcnode-id="1175"><span data-dcnode-id="1176" instrument_node="">These episodes are usually sudden and may recur. Children often recover, but some adults may have chronic problems that lead to liver failure.</span></p><p data-dcnode-id="1173"><span data-dcnode-id="1174" instrument_node="">People with sickle cell disease who have received frequent blood transfusions may develop liver damage from iron overload.</span></p><p data-dcnode-id="1170"><strong data-dcnode-id="1171"><span data-dcnode-id="1172" instrument_node="">Leg Ulcers</span></strong></p><p data-dcnode-id="1168"><span data-dcnode-id="1169" instrument_node="">Sickle cell ulcers are sores that usually start small and then get larger and larger.</span></p><p data-dcnode-id="1166"><span data-dcnode-id="1167" instrument_node="">The number of ulcers can vary from one to many. Some ulcers will heal quickly, but others may not heal and may last for long periods of time. Some ulcers come back after healing.</span></p><p data-dcnode-id="1164"><span data-dcnode-id="1165" instrument_node="">People with sickle cell disease usually don’t get ulcers until after the age of 10.</span></p><p data-dcnode-id="1161"><strong data-dcnode-id="1162"><span data-dcnode-id="1163" instrument_node="">Joint Complications</span></strong></p><p data-dcnode-id="1159"><span data-dcnode-id="1160" instrument_node="">Sickling in the bones of the hip and, less commonly, the shoulder joints, knees, and ankles, can decrease oxygen flow and result in severe damage. This damage is a condition called avascular or aseptic necrosis. This disease is usually found in adolescents and adults.</span></p><p data-dcnode-id="1157"><span data-dcnode-id="1158" instrument_node="">Symptoms include pain and problems with walking and joint movement. A person may need pain medicines, surgery, or joint replacement if symptoms persist.</span></p><p data-dcnode-id="1154"><strong data-dcnode-id="1155"><span data-dcnode-id="1156" instrument_node="">Delayed Growth and Puberty</span></strong></p><p data-dcnode-id="1152"><span data-dcnode-id="1153" instrument_node="">Children with sickle cell disease may grow and develop more slowly than their peers because of anemia. They will reach full sexual maturity, but this may be delayed.</span></p><p data-dcnode-id="1149"><strong data-dcnode-id="1150"><span data-dcnode-id="1151" instrument_node="">Pregnancy</span></strong></p><p data-dcnode-id="1147"><span data-dcnode-id="1148" instrument_node="">Pregnancies in women with sickle cell disease can be risky for both the mother and the baby.</span></p><p data-dcnode-id="1145"><span data-dcnode-id="1146" instrument_node="">Mothers may have medical complications including:</span></p><ul data-dcnode-id="1136"><li data-dcnode-id="1143"><span data-dcnode-id="1144" instrument_node="">Infections</span></li><li data-dcnode-id="1141"><span data-dcnode-id="1142" instrument_node="">Blood clots</span></li><li data-dcnode-id="1139"><span data-dcnode-id="1140" instrument_node="">High blood pressure</span></li><li data-dcnode-id="1137"><span data-dcnode-id="1138" instrument_node="">Increased pain episodes</span></li></ul><p data-dcnode-id="1134"><span data-dcnode-id="1135" instrument_node="">They are also at higher risk for:</span></p><ul data-dcnode-id="1127"><li data-dcnode-id="1132"><span data-dcnode-id="1133" instrument_node="">Miscarriages</span></li><li data-dcnode-id="1130"><span data-dcnode-id="1131" instrument_node="">Premature births</span></li><li data-dcnode-id="1128"><span data-dcnode-id="1129" instrument_node="">“Small-for-dates babies” or underweight babies</span></li></ul><p data-dcnode-id="1124"><strong data-dcnode-id="1125"><span data-dcnode-id="1126" instrument_node="">Mental Health</span></strong></p><p data-dcnode-id="1122"><span data-dcnode-id="1123" instrument_node="">As in other chronic diseases, people with sickle cell disease may feel sad and frustrated at times. The limitations that sickle cell disease can impose on a person’s daily activities may cause them to feel isolated from others. Sometimes they become depressed.</span></p><p data-dcnode-id="1120"><span data-dcnode-id="1121" instrument_node="">People with sickle cell disease may also have trouble coping with pain and fatigue, as well as with frequent medical visits and hospitalizations.</span></p><h4 data-dcnode-id="1117"><span data-dcnode-id="1118" id="How_Is_Sickle_Cell_Disease_Diagnosed"><span data-dcnode-id="1119" instrument_node="">How Is Sickle Cell Disease Diagnosed ?</span></span></h4><p data-dcnode-id="1114"><strong data-dcnode-id="1115"><span data-dcnode-id="1116" instrument_node="">Screening Tests</span></strong></p><p data-dcnode-id="1112"><span data-dcnode-id="1113" instrument_node="">People who do not know whether they make sickle hemoglobin (hemoglobin S) or another abnormal hemoglobin (such as C, β thalassemia, E) can find out by having their blood tested. This way, they can learn whether they carry a gene (i.e., have the trait) for an abnormal hemoglobin that they could pass on to a child.</span></p><p data-dcnode-id="1110"><span data-dcnode-id="1111" instrument_node="">When each parent has this information, he or she can be better informed about the chances of having a child with some type of sickle cell disease, such as hemoglobin SS, SC, Sβ thalassemia, or others.</span></p><p data-dcnode-id="1107"><strong data-dcnode-id="1108"><span data-dcnode-id="1109" instrument_node="">Newborn Screening</span></strong></p><p data-dcnode-id="1105"><span data-dcnode-id="1106" instrument_node="">When a child has sickle cell disease, it is very important to diagnose it early to better prevent complications.</span></p><p data-dcnode-id="1103"><span data-dcnode-id="1104" instrument_node="">Every state in the United States, the District of Columbia, and the U.S. territories require that every baby is tested for sickle cell disease as part of a newborn screening program.</span></p><p data-dcnode-id="1101"><span data-dcnode-id="1102" instrument_node="">In newborn screening programs, blood from a heel prick is collected in “spots” on a special paper. The hemoglobin from this blood is then analyzed in special labs.</span></p><p data-dcnode-id="1099"><span data-dcnode-id="1100" instrument_node="">Newborn screening results are sent to the doctor who ordered the test and to the child’s primary doctor.</span></p><p data-dcnode-id="1097"><span data-dcnode-id="1098" instrument_node="">If a baby is found to have sickle cell disease, health providers from a special follow-up newborn screening group contact the family directly to make sure that the parents know the results. The child is always retested to be sure that the diagnosis is correct.</span></p><p data-dcnode-id="1095"><span data-dcnode-id="1096" instrument_node="">Newborn screening programs also find out whether the baby has an abnormal hemoglobin trait. If so, parents are informed, and counseling is offered.</span></p><p data-dcnode-id="1093"><span data-dcnode-id="1094" instrument_node="">Remember that when a child has sickle cell trait or sickle cell disease, a future sibling, or the child’s own future child, may be at risk. These possibilities should be discussed with the primary care doctor, a blood specialist called a hematologist, and/or a genetics counselor.</span></p><p data-dcnode-id="1090"><strong data-dcnode-id="1091"><span data-dcnode-id="1092" instrument_node="">Prenatal Screening</span></strong></p><p data-dcnode-id="1088"><span data-dcnode-id="1089" instrument_node="">Doctors can also diagnose sickle cell disease before a baby is born. This is done using a sample of amniotic fluid, the liquid in the sac surrounding a growing embryo, or tissue taken from the placenta, the organ that attaches the umbilical cord to the mother’s womb.</span></p><p data-dcnode-id="1086"><span data-dcnode-id="1087" instrument_node="">Testing before birth can be done as early as 8–10 weeks into the pregnancy. This testing looks for the sickle hemoglobin gene rather than the abnormal hemoglobin.</span></p><h4 data-dcnode-id="1083"><span data-dcnode-id="1084" id="How_Is_Sickle_Cell_Disease_Treated"><span data-dcnode-id="1085" instrument_node="">How Is Sickle Cell Disease Treated ?</span></span></h4><p data-dcnode-id="1079"><strong data-dcnode-id="1081"><span data-dcnode-id="1082" instrument_node="">Health Maintenance To Prevent Complication</span></strong><span data-dcnode-id="1080" instrument_node="">s</span></p><p data-dcnode-id="1077"><span data-dcnode-id="1078" instrument_node="">Babies with sickle cell disease should be referred to a doctor or provider group that has experience taking care of people with this disease. The doctor might be a hematologist (a doctor with special training in blood diseases) or an experienced general pediatrician, internist, or family practitioner.</span></p><p data-dcnode-id="1075"><span data-dcnode-id="1076" instrument_node="">For infants, the first sickle cell disease visit should take place before 8 weeks of age.</span></p><p data-dcnode-id="1073"><span data-dcnode-id="1074" instrument_node="">If someone was born in a country that doesn’t perform newborn sickle cell disease screening, he or she might be diagnosed with sickle cell disease later in childhood. These people should also be referred as soon as possible for special sickle cell disease care.</span></p><p data-dcnode-id="1071"><span data-dcnode-id="1072" instrument_node="">All people who have sickle cell disease should see their sickle cell disease care providers regularly. Regularly means every 3 to 12 months, depending on the person’s age. The sickle cell disease doctor or team can help to prevent problems by:</span></p><ul data-dcnode-id="1062"><li data-dcnode-id="1069"><span data-dcnode-id="1070" instrument_node="">Examining the person</span></li><li data-dcnode-id="1067"><span data-dcnode-id="1068" instrument_node="">Giving medicines and immunizations</span></li><li data-dcnode-id="1065"><span data-dcnode-id="1066" instrument_node="">Performing tests</span></li><li data-dcnode-id="1063"><span data-dcnode-id="1064" instrument_node="">Educating families about the disease and what to watch out for</span></li></ul><h4 data-dcnode-id="1059"><span data-dcnode-id="1060" id="Preventing_Infection"><span data-dcnode-id="1061" instrument_node="">Preventing Infection</span></span></h4><p data-dcnode-id="1057"><span data-dcnode-id="1058" instrument_node="">In sickle cell disease, the spleen doesn’t work properly or doesn’t work at all. This problem makes people with sickle cell disease more likely to get severe infections.</span></p><p data-dcnode-id="1054"><strong data-dcnode-id="1055"><span data-dcnode-id="1056" instrument_node="">Penicillin</span></strong></p><p data-dcnode-id="1052"><span data-dcnode-id="1053" instrument_node="">In children with sickle cell disease, taking penicillin two times a day has been shown to reduce the chance of having a severe infection caused by the pneumococcus bacteria. Infants need to take liquid penicillin. Older children can take tablets.</span></p><p data-dcnode-id="1050"><span data-dcnode-id="1051" instrument_node="">Many doctors will stop prescribing penicillin after a child has reached the age of 5. Some prefer to continue this antibiotic throughout life, particularly if a person has hemoglobin SS or hemoglobin Sβ0 thalassemia, since people with sickle cell disease are still at risk. All people who have had surgical removal of the spleen, called a splenectomy, or a past infection with pneumococcus should keep taking penicillin throughout life.</span></p><p data-dcnode-id="1047"><strong data-dcnode-id="1048"><span data-dcnode-id="1049" instrument_node="">Immunizations</span></strong></p><p data-dcnode-id="1045"><span data-dcnode-id="1046" instrument_node="">People with sickle cell diseaseshould receive all recommended childhood vaccines. They should also receive additional vaccines to prevent other infections.</span></p><p data-dcnode-id="1041"><strong data-dcnode-id="1043"><span data-dcnode-id="1044" instrument_node="">Pneumococcus</span></strong><span data-dcnode-id="1042" instrument_node="">. Even though all children routinely receive the vaccine against pneumococcus (PCV13), children with sickle cell disease should also receive a second kind of vaccine against pneumococcus (PPSV23). This second vaccine is given after 24 months of age and again 5 years later. Adults with sickle cell disease who have not received any pneumococcal vaccine should get a dose of the PCV13 vaccine. They should later receive the PPSV23 if they have not already received it or it has been more than 5 years since they did. A person should follow these guidelines even if he or she is still taking penicillin.</span></p><p data-dcnode-id="1037"><strong data-dcnode-id="1039"><span data-dcnode-id="1040" instrument_node="">Influenza</span></strong><span data-dcnode-id="1038" instrument_node="">. All people with sickle cell disease should receive an influenza shot every year at the start of flu season. This should begin at 6 months of age. Only the inactivated vaccine, which comes as a shot, should be used in people with sickle cell disease.</span></p><p data-dcnode-id="1033"><strong data-dcnode-id="1035"><span data-dcnode-id="1036" instrument_node="">Meningococcus</span></strong><span data-dcnode-id="1034" instrument_node="">. A child with sickle cell disease should receive this vaccine (Menactra or Menveo) at 2, 4, 6, and 12–15 months of age. The child should receive a booster vaccine 3 years after this series of shots, then every 5 years after that.</span></p><h4 data-dcnode-id="1030"><span data-dcnode-id="1031" id="Screening_Tests_and_Evaluations"><span data-dcnode-id="1032" instrument_node="">Screening Tests and Evaluations</span></span></h4><p data-dcnode-id="1028"><span data-dcnode-id="1029" instrument_node="">Height, Weight, Blood Pressure, and Oxygen Saturation</span></p><p data-dcnode-id="1026"><span data-dcnode-id="1027" instrument_node="">Doctors will monitor height and weight to be sure that a child is growing properly and that a person with sickle cell disease is maintaining a healthy weight.</span></p><p data-dcnode-id="1024"><span data-dcnode-id="1025" instrument_node="">Doctors will also track a person’s blood pressure. When a person with sickle cell disease has high blood pressure, it needs to be treated promptly because it can increase the risk of stroke.</span></p><p data-dcnode-id="1022"><span data-dcnode-id="1023" instrument_node="">Oxygen saturation testing provides information about how much oxygen the blood is carrying.</span></p><p data-dcnode-id="1019"><strong data-dcnode-id="1020"><span data-dcnode-id="1021" instrument_node="">Blood and Urine Testing</span></strong></p><p data-dcnode-id="1017"><span data-dcnode-id="1018" instrument_node="">People with sickle cell disease need to have frequent lab tests.</span></p><p data-dcnode-id="1015"><span data-dcnode-id="1016" instrument_node="">Blood tests help to establish a person’s “baseline” for problems like anemia. Blood testing also helps to show whether a person has organ damage, so that it can be treated early.</span></p><p data-dcnode-id="1013"><span data-dcnode-id="1014" instrument_node="">Urine testing can help to detect early kidney problems or infections.</span></p><p data-dcnode-id="1010"><strong data-dcnode-id="1011"><span data-dcnode-id="1012" instrument_node="">Transcranial Doppler Ultrasound Screening</span></strong></p><p data-dcnode-id="1008"><span data-dcnode-id="1009" instrument_node="">Children who have hemoglobin SS or hemoglobin Sβ0 thalassemia and are between the ages of 2 and 16 should have Transcranial Doppler Ultrasound testing once a year.</span></p><p data-dcnode-id="1006"><span data-dcnode-id="1007" instrument_node="">This study can find out whether a child is at higher risk for stroke. When the test is abnormal, regular blood transfusions can decrease the chances of having a stroke.</span></p><p data-dcnode-id="1004"><span data-dcnode-id="1005" instrument_node="">The child is awake during the Transcranial Doppler Ultrasound exam. The test does not hurt at all. The Transcranial Doppler Ultrasound machine uses sound waves to measure blood flow like the ultrasound machine used to examine pregnant women.</span></p><p data-dcnode-id="1001"><strong data-dcnode-id="1002"><span data-dcnode-id="1003" instrument_node="">Eye Examinations</span></strong></p><p data-dcnode-id="999"><span data-dcnode-id="1000" instrument_node="">An eye doctor, or ophthalmologist, should examine a person’s eyes every 1—2 years from the age of 10 onwards.</span></p><p data-dcnode-id="997"><span data-dcnode-id="998" instrument_node="">These exams can detect if there are sickle cell disease-related problems of the eye. Regular exams can help doctors find and treat problems early to prevent loss of vision. A person should see his or her doctor right away for any sudden change in vision.</span></p><p data-dcnode-id="994"><strong data-dcnode-id="995"><span data-dcnode-id="996" instrument_node="">Pulmonary Hypertension</span></strong></p><p data-dcnode-id="992"><span data-dcnode-id="993" instrument_node="">Doctors have different approaches to screening for pulmonary hypertension. This is because studies have not given clear information as to when and how a person should receive the screening. People with sickle cell disease and their caretakers should discuss with their doctor whether screening makes sense for them.</span></p><p data-dcnode-id="989"><strong data-dcnode-id="990"><span data-dcnode-id="991" instrument_node="">Cognitive Screening</span></strong></p><p data-dcnode-id="987"><span data-dcnode-id="988" instrument_node="">People with sickle cell disease can develop cognitive (thinking) problems that may be hard to notice early in life.</span></p><p data-dcnode-id="985"><span data-dcnode-id="986" instrument_node="">Sometimes these problems are caused by “silent” strokes that can only be seen with magnetic resonance imaging (MRI) of the brain.</span></p><p data-dcnode-id="983"><span data-dcnode-id="984" instrument_node="">People with sickle cell disease should tell their doctors or nurses if they have thinking problems, such as difficulties learning in school, slowed decision making, or trouble organizing their thoughts.</span></p><p data-dcnode-id="981"><span data-dcnode-id="982" instrument_node="">People can be referred for cognitive testing. This testing can identify areas in which a person could use extra help.</span></p><p data-dcnode-id="979"><span data-dcnode-id="980" instrument_node="">Children with sickle cell disease who have thinking problems may qualify for an Individualized Education Program. An&nbsp;Individualized Education Program is a plan that helps students to reach their educational goals. Adults may be able to enroll in vocational rehabilitation programs that can help them with job training.</span></p><p data-dcnode-id="976"><strong data-dcnode-id="977"><span data-dcnode-id="978" instrument_node="">Education and Guidance</span></strong></p><p data-dcnode-id="974"><span data-dcnode-id="975" instrument_node="">Doctors and other providers will talk with people who have sickle cell disease and their caretakers about complications and also review information at every visit.</span></p><p data-dcnode-id="972"><span data-dcnode-id="973" instrument_node="">Because there are a lot of things to discuss, new topics are often introduced as a child or adult reaches an age when that subject is important to know about.</span></p><p data-dcnode-id="970"><span data-dcnode-id="971" instrument_node="">Doctors and nurses know that there is a lot of information to learn, and they don’t expect people to know everything after one discussion. People with sickle cell disease and their families should not be afraid to ask questions.</span></p><p data-dcnode-id="968"><span data-dcnode-id="969" instrument_node="">Topics that are usually covered include:</span></p><ul data-dcnode-id="955"><li data-dcnode-id="966"><span data-dcnode-id="967" instrument_node="">Hours that medical staff are available and contact information to use when people with sickle cell disease or caretakers have questions</span></li><li data-dcnode-id="964"><span data-dcnode-id="965" instrument_node="">A plan for what to do and where to get care if a person has a fever, pain, or other signs of sickle cell disease complications that need immediate attention</span></li><li data-dcnode-id="962"><span data-dcnode-id="963" instrument_node="">How sickle cell disease is inherited and the risk of having a child with sickle cell disease</span></li><li data-dcnode-id="960"><span data-dcnode-id="961" instrument_node="">The importance of regular medical visits, screening tests, and evaluations</span></li><li data-dcnode-id="958"><span data-dcnode-id="959" instrument_node="">How to recognize and manage pain</span></li><li data-dcnode-id="956"><span data-dcnode-id="957" instrument_node="">How to palpate (feel) a child’s spleen. Because of the risk of splenic sequestration crisis, caretakers should learn how to palpate a child’s spleen. They should try to feel for the spleen daily and more frequently when the child is ill. If they feel that the spleen is bigger than usual, they should call the care provider.</span></li></ul><p data-dcnode-id="952"><strong data-dcnode-id="953"><span data-dcnode-id="954" instrument_node="">Transitioning Care</span></strong></p><p data-dcnode-id="950"><span data-dcnode-id="951" instrument_node="">When children with sickle cell disease become adolescents or young adults, they often need to transition from a pediatric care team to an adult care team. This period has been shown to be associated with increased hospital admissions and medical problems. There seem to be many reasons for this.</span></p><p data-dcnode-id="948"><span data-dcnode-id="949" instrument_node="">Some of the increased risk is directly related to the disease. As people with sickle cell disease get older, they often develop more organ damage and more disabilities.</span></p><p data-dcnode-id="946"><span data-dcnode-id="947" instrument_node="">The shift in care usually occurs at the same time that adolescents are undergoing many changes in their emotional, social, and academic lives. The transition to more independent self-management may be difficult, and following treatment plans may become less likely.</span></p><p data-dcnode-id="944"><span data-dcnode-id="945" instrument_node="">When compared with pediatrics, there are often fewer adult sickle cell disease programs available in a given region. This makes it more difficult for a person with sickle cell disease to find appropriate doctors, particularly those with whom they feel comfortable.</span></p><p data-dcnode-id="942"><span data-dcnode-id="943" instrument_node="">To improve use of regular medical care by people with sickle cell disease and to reduce age-related complications, many sickle cell disease teams have developed special programs that the make transition easier. Such programs should involve the pediatric and the adult care teams. They should also start early and continue over several years.</span></p><h5 data-dcnode-id="939"><span data-dcnode-id="940" id="Managing_Some_Complications_of_sickle_cell_disease"><span data-dcnode-id="941" instrument_node="">Managing Some Complications of sickle cell disease</span></span></h5><p data-dcnode-id="936"><strong data-dcnode-id="937"><span data-dcnode-id="938" instrument_node="">Acute Pain</span></strong></p><p data-dcnode-id="934"><span data-dcnode-id="935" instrument_node="">Each person with sickle cell disease should have a home treatment regimen that is best suited to their needs. The providers on the sickle cell disease team usually help a person develop a written, tailored care plan. If possible, the person with sickle cell disease should carry this plan with them when they go to the emergency room.</span></p><p data-dcnode-id="932"><span data-dcnode-id="933" instrument_node="">When an acute crisis is just starting, most doctors will advise the person to drink lots of fluids and to take a non-steroidal anti-inflammatory (NSAID) pain medication, such as ibuprofen. When a person has kidney problems, acetaminophen is often preferred.</span></p><p data-dcnode-id="930"><span data-dcnode-id="931" instrument_node="">If pain persists, many people will find that they need a stronger medicine.</span></p><p data-dcnode-id="928"><span data-dcnode-id="929" instrument_node="">Combining additional interventions, such as massage, relaxation methods, or a heating pad, may also help.</span></p><p data-dcnode-id="926"><span data-dcnode-id="927" instrument_node="">If a person with sickle cell disease cannot control the pain at home, he or she should go to an sickle cell disease day hospital/outpatient unit or an emergency room to receive additional, stronger medicines and intravenous (IV) fluids.</span></p><p data-dcnode-id="924"><span data-dcnode-id="925" instrument_node="">Some people may be able to return home once their pain is under better control. In this case, the doctor may prescribe additional pain medicines for a short course of therapy.</span></p><p data-dcnode-id="922"><span data-dcnode-id="923" instrument_node="">People often need to be admitted to the hospital to fully control an acute pain crisis.</span></p><p data-dcnode-id="920"><span data-dcnode-id="921" instrument_node="">When taken daily, hydroxyurea has been found to decrease the number and severity of pain episodes.</span></p><p data-dcnode-id="918"><span data-dcnode-id="919" instrument_node="">Some patients may have fewer visits to the hospital or hospitalizations due to severe pain, and may have shorter hospital stays for pain crises if they are taking L-glutamine oral powder (Endari) compared to patients who are not taking this medicine. More research is needed to understand how effective L-glutamine oral powder is as a treatment and which patients may benefit from using it.</span></p><p data-dcnode-id="915"><strong data-dcnode-id="916"><span data-dcnode-id="917" instrument_node="">Chronic Pain</span></strong></p><p data-dcnode-id="913"><span data-dcnode-id="914" instrument_node="">Sometimes chronic pain results from a complication, such as a leg ulcer or aseptic necrosis of the hip. In this case, doctors try to treat the complication causing the pain.</span></p><p data-dcnode-id="911"><span data-dcnode-id="912" instrument_node="">While chronic pain is common in adults with sickle cell disease, the cause is often poorly understood. Taking pain medicines daily may help to decrease the pain. Some examples of these medicines include:</span></p><ul data-dcnode-id="900"><li data-dcnode-id="909"><span data-dcnode-id="910" instrument_node="">NSAID drugs, such as ibuprofen</span></li><li data-dcnode-id="907"><span data-dcnode-id="908" instrument_node="">Duloxetine</span></li><li data-dcnode-id="905"><span data-dcnode-id="906" instrument_node="">Gabapentin</span></li><li data-dcnode-id="903"><span data-dcnode-id="904" instrument_node="">Amitriptyline</span></li><li data-dcnode-id="901"><span data-dcnode-id="902" instrument_node="">Strong pain medicines, such as opiates</span></li></ul><p data-dcnode-id="898"><span data-dcnode-id="899" instrument_node="">Other approaches, such as massage, heat, or acupuncture may be helpful in some cases. Chronic pain often comes with feelings of depression and anxiety. Supportive counseling and, sometimes, antidepressant medicines may help.</span></p><p data-dcnode-id="895"><strong data-dcnode-id="896"><span data-dcnode-id="897" instrument_node="">Severe Anemia</span></strong></p><p data-dcnode-id="893"><span data-dcnode-id="894" instrument_node="">People should see their doctors or go to a hospital right away if they develop anemia symptoms from a splenic sequestration crisis or an aplastic crisis. These conditions can be life-threatening, and the person will need careful monitoring and treatment in the hospital. A person also usually needs a blood transfusion.</span></p><p data-dcnode-id="891"><span data-dcnode-id="892" instrument_node="">People with sickle cell disease and symptoms of severe anemia from other causes should also see a doctor right away.</span></p><p data-dcnode-id="889"><span data-dcnode-id="890" instrument_node="">Some patients may have fewer hospital visits due to sickle cell crises, including splenic sequestration, if they are taking L-glutamine oral powder compared to patients who are not taking this medicine. More research is needed to understand how effective L-glutamine oral powder is as a treatment and which patients may benefit from using it.</span></p><p data-dcnode-id="886"><strong data-dcnode-id="887"><span data-dcnode-id="888" instrument_node="">Infections</span></strong></p><p data-dcnode-id="884"><span data-dcnode-id="885" instrument_node="">Fever is a medical emergency in sickle cell disease. All caretakers of infants and children with sickle cell disease should take their child to their doctor or go to a hospital right away when their child has a fever. Adults with sickle cell disease should also seek care for fever or other signs of infection.</span></p><p data-dcnode-id="882"><span data-dcnode-id="883" instrument_node="">All children and adults who have sickle cell disease and a fever (over 38.50 C or 101.30 F) must be seen by a doctor and treated with antibiotics right away.</span></p><p data-dcnode-id="880"><span data-dcnode-id="881" instrument_node="">Some people will need to be hospitalized, while others may receive care and follow-up as an outpatient.</span></p><p data-dcnode-id="877"><strong data-dcnode-id="878"><span data-dcnode-id="879" instrument_node="">Acute Chest Syndrome</span></strong></p><p data-dcnode-id="875"><span data-dcnode-id="876" instrument_node="">People with sickle cell disease and symptoms of acute chest syndrome should see their doctor or go to a hospital right away.</span></p><p data-dcnode-id="873"><span data-dcnode-id="874" instrument_node="">They will need to be admitted to the hospital where they should receive antibiotics and close monitoring. They may need oxygen therapy and a blood transfusion.</span></p><p data-dcnode-id="871"><span data-dcnode-id="872" instrument_node="">When taken daily, the medicine hydroxyurea has been found to decrease the number and severity of acute chest events.</span></p><p data-dcnode-id="869"><span data-dcnode-id="870" instrument_node="">Some patients may have fewer hospital visits due to sickle cell crises, including acute chest syndrome, if they are taking L-glutamine oral powder compared to patients who are not taking this medicine. More research is needed to understand how effective L-glutamine oral powder is as a treatment and which patients may benefit from using it.</span></p><p data-dcnode-id="866"><strong data-dcnode-id="867"><span data-dcnode-id="868" instrument_node="">Clinical Stroke</span></strong></p><p data-dcnode-id="864"><span data-dcnode-id="865" instrument_node="">People with sickle cell disease who have symptoms of stroke should be brought to the hospital right away by an ambulance. If a person is having symptoms of stroke, someone should call your local emergency number.</span></p><p data-dcnode-id="862"><span data-dcnode-id="863" instrument_node="">Symptoms of stroke may include:</span></p><ul data-dcnode-id="853"><li data-dcnode-id="860"><span data-dcnode-id="861" instrument_node="">Weakness of an arm or leg on one side of the body</span></li><li data-dcnode-id="858"><span data-dcnode-id="859" instrument_node="">Trouble speaking, walking, or understanding</span></li><li data-dcnode-id="856"><span data-dcnode-id="857" instrument_node="">Loss of balance</span></li><li data-dcnode-id="854"><span data-dcnode-id="855" instrument_node="">Severe headache</span></li></ul><p data-dcnode-id="851"><span data-dcnode-id="852" instrument_node="">If imaging studies reveal that the person has had an acute stroke, he or she may need an exchange transfusion. This procedure involves slowly removing an amount of the person’s blood and replacing it with blood from a donor who does not have sickle cell disease or sickle cell trait. Afterward, the person may need to receive monthly transfusions or other treatments to help to prevent another stroke.</span></p><p data-dcnode-id="848"><strong data-dcnode-id="849"><span data-dcnode-id="850" instrument_node="">Silent Stroke and Cognitive Problems</span></strong></p><p data-dcnode-id="846"><span data-dcnode-id="847" instrument_node="">Children and adults with sickle cell disease and cognitive problems may be able to get useful help based upon the results of their testing. For instance, children may qualify for an Individualized Education Program. Adults may be able to enroll in vocational, or job, training programs.</span></p><p data-dcnode-id="843"><strong data-dcnode-id="844"><span data-dcnode-id="845" instrument_node="">Priapism</span></strong></p><p data-dcnode-id="841"><span data-dcnode-id="842" instrument_node="">Sometimes, a person may be able to relieve priapism by:</span></p><ul data-dcnode-id="832"><li data-dcnode-id="839"><span data-dcnode-id="840" instrument_node="">Emptying the bladder by urinating</span></li><li data-dcnode-id="837"><span data-dcnode-id="838" instrument_node="">Taking medicine</span></li><li data-dcnode-id="835"><span data-dcnode-id="836" instrument_node="">Increasing fluid intake</span></li><li data-dcnode-id="833"><span data-dcnode-id="834" instrument_node="">Doing light exercise</span></li></ul><p data-dcnode-id="830"><span data-dcnode-id="831" instrument_node="">If a person has an episode that lasts for 4 hours or more, he should go to the hospital to see a hematologist and urologist.</span></p><p data-dcnode-id="828"><span data-dcnode-id="829" instrument_node="">Some patients may have fewer hospital visits due to sickle cell crises, including priapism, if they are taking L-glutamine oral powder compared to patients who are not taking this medicine. More research is needed to understand how effective L-glutamine oral powder is as a treatment and which patients may benefit from using it.</span></p><p data-dcnode-id="825"><strong data-dcnode-id="826"><span data-dcnode-id="827" instrument_node="">Pregnancy</span></strong></p><p data-dcnode-id="823"><span data-dcnode-id="824" instrument_node="">Pregnant women with sickle cell disease are at greater risk for problems. They should always see an obstetrician who has experience with sickle cell disease and high-risk pregnancies and deliveries.</span></p><p data-dcnode-id="821"><span data-dcnode-id="822" instrument_node="">The obstetrician should work with a hematologist or primary medical doctor who is well informed about sickle cell disease and its complications.</span></p><p data-dcnode-id="819"><span data-dcnode-id="820" instrument_node="">Pregnant women with sickle cell disease need more frequent medical visits so that their doctors can follow them closely. The doctor may prescribe certain vitamins and will be careful to prescribe pain medicines that are safe for the baby.</span></p><p data-dcnode-id="817"><span data-dcnode-id="818" instrument_node="">A pregnant woman with sickle cell disease may need to have one or more blood transfusions during her pregnancy to treat complications, such as worsening anemia or an increased number of pain or acute chest syndrome events.</span></p><h5 data-dcnode-id="814"><span data-dcnode-id="815" id="Hydroxyurea"><span data-dcnode-id="816" instrument_node="">Hydroxyurea</span></span></h5><p data-dcnode-id="812"><span data-dcnode-id="813" instrument_node="">Hydroxyurea is an oral medicine that has been shown to reduce or prevent several sickle cell disease complications.</span></p><p data-dcnode-id="810"><span data-dcnode-id="811" instrument_node="">This medicine was studied in patients with sickle cell disease because it was known to increase the amount of fetal hemoglobin (hemoglobin F) in the blood. Increased hemoglobin F provides some protection against the effects of hemoglobin S.</span></p><p data-dcnode-id="808"><span data-dcnode-id="809" instrument_node="">Hydroxyurea was later found to have several other benefits for a person with sickle cell disease, such as decreasing inflammation.</span></p><p data-dcnode-id="804"><span data-dcnode-id="807" instrument_node="">Use in adults. Many studies of adults with hemoglobin SS or hemoglobin Sβ thalassemia showed that hydroxyurea reduced the number of episodes of pain crises and acute chest syndrome. It also improved anemia and decreased the need for transfusions and hospital admissions.</span><br data-dcnode-id="806"><span data-dcnode-id="805" instrument_node=""> Use in children. Studies in children with severe hemoglobin SS or Sβ thalassemia showed that hydroxyurea reduced the number of vaso-occlusive crises and hospitalizations. A study of very young children (between the ages of 9 and 18 months) with hemoglobin SS or hemoglobin Sβ thalassemia also showed that hydroxyurea decreased the number of episodes of pain and dactylitis.</span></p><p data-dcnode-id="801"><strong data-dcnode-id="802"><span data-dcnode-id="803" instrument_node="">Who Should Use Hydroxyurea ?</span></strong></p><p data-dcnode-id="799"><span data-dcnode-id="800" instrument_node="">Since hydroxyurea can decrease several complications of sickle cell disease, most experts recommend that children and adults with hemoglobin SS or Sβ0 thalassemia who have frequent painful episodes, recurrent chest crises, or severe anemia take hydroxyurea daily.</span></p><p data-dcnode-id="797"><span data-dcnode-id="798" instrument_node="">Some experts offer hydroxyurea to all infants over 9 months of age and young children with hemoglobin SS or Sβ0 thalassemia, even if they do not have severe clinical problems, to prevent or reduce the chance of complications. There is no information about how safe or effective hydroxyurea is in children under 9 months of age.</span></p><p data-dcnode-id="795"><span data-dcnode-id="796" instrument_node="">Some experts will prescribe hydroxyurea to people with other types of sickle cell disease who have severe, recurrent pain. There is little information available about how effective hydroxyurea is for these types of sickle cell disease.</span></p><p data-dcnode-id="793"><span data-dcnode-id="794" instrument_node="">In all situations, people with sickle cell disease should discuss with their doctors whether or not hydroxyurea is an appropriate medication for them.</span></p><p data-dcnode-id="791"><span data-dcnode-id="792" instrument_node="">Pregnant women should not use hydroxyurea.</span></p><p data-dcnode-id="788"><strong data-dcnode-id="789"><span data-dcnode-id="790" instrument_node="">How Is Hydroxyurea Taken ?</span></strong></p><p data-dcnode-id="786"><span data-dcnode-id="787" instrument_node="">To work properly, hydroxyurea should be taken by mouth daily at the prescribed dose. When a person does not take it regularly, it will not work as well, or it won’t work at all.</span></p><p data-dcnode-id="784"><span data-dcnode-id="785" instrument_node="">A person with sickle cell disease who is taking hydroxyurea needs careful monitoring. This is particularly true in the early weeks of taking the medicine. Monitoring includes regular blood testing and dose adjustments.</span></p><p data-dcnode-id="781"><strong data-dcnode-id="782"><span data-dcnode-id="783" instrument_node="">What Are the Risks of Hydroxyurea ?</span></strong></p><p data-dcnode-id="779"><span data-dcnode-id="780" instrument_node="">Hydroxyurea can cause the blood’s white cell count or platelet count to drop. In rare cases, it can worsen anemia. These side effects usually go away quickly if a person stops taking the medication. When a person restarts it, a doctor usually prescribes a lower dose.</span></p><p data-dcnode-id="777"><span data-dcnode-id="778" instrument_node="">Other short-term side effects are less common.</span></p><p data-dcnode-id="775"><span data-dcnode-id="776" instrument_node="">It is still unclear whether hydroxyurea can cause problems later in life in people with sickle cell disease who take it for many years. Studies so far suggest that it does not put people at a higher risk of cancer and does not affect growth in children. But further studies are needed.</span></p><p data-dcnode-id="772"><strong data-dcnode-id="773"><span data-dcnode-id="774" instrument_node="">Red Blood Cell Transfusions</span></strong></p><p data-dcnode-id="770"><span data-dcnode-id="771" instrument_node="">Doctors may use acute and chronic red blood cell transfusions to treat and prevent certain sickle cell disease complications. The red blood cells in a transfusion have normal hemoglobin in them.</span></p><p data-dcnode-id="768"><span data-dcnode-id="769" instrument_node="">A transfusion helps to raise the number of red blood cells and provides normal red blood cells that are more flexible than red blood cells with sickle hemoglobin. These cells live longer in the circulation. Red blood cell transfusions decrease vaso-occlusion (blockage in the blood vessel) and improve oxygen delivery to the tissues and organs.</span></p><p data-dcnode-id="765"><strong data-dcnode-id="766"><span data-dcnode-id="767" instrument_node="">Acute Transfusion in sickle cell disease</span></strong></p><p data-dcnode-id="763"><span data-dcnode-id="764" instrument_node="">Doctors use blood transfusions in sickle cell disease for complications that cause severe anemia. They may also use them when a person has an acute stroke, in many cases of acute chest crises, and in multi-organ failure.</span></p><p data-dcnode-id="761"><span data-dcnode-id="762" instrument_node="">A person with sickle cell disease usually receives blood transfusions before surgery to prevent sickle cell disease-related complications afterwards.</span></p><p data-dcnode-id="758"><strong data-dcnode-id="759"><span data-dcnode-id="760" instrument_node="">Chronic Transfusion</span></strong></p><p data-dcnode-id="756"><span data-dcnode-id="757" instrument_node="">Doctors recommend regular or ongoing blood transfusions for people who have had an acute stroke, since transfusions decrease the chances of having another stroke.</span></p><p data-dcnode-id="754"><span data-dcnode-id="755" instrument_node="">Doctors also recommend chronic blood transfusions for children who have abnormal Transcranial Doppler Ultrasound results because transfusions can reduce the chance of having a first stroke.</span></p><p data-dcnode-id="752"><span data-dcnode-id="753" instrument_node="">Some doctors use this approach to treat complications that do not improve with hydroxyurea. They may also use transfusions in people who have too many side effects from hydroxyurea.</span></p><p data-dcnode-id="749"><strong data-dcnode-id="750"><span data-dcnode-id="751" instrument_node="">What Are the Risks of Transfusion Therapy ?</span></strong></p><p data-dcnode-id="747"><span data-dcnode-id="748" instrument_node="">Possible complications include:</span></p><ul data-dcnode-id="738"><li data-dcnode-id="745"><span data-dcnode-id="746" instrument_node="">Hemolysis</span></li><li data-dcnode-id="743"><span data-dcnode-id="744" instrument_node="">Iron overload, particularly in people receiving chronic transfusions (can severely impair heart and lung function)</span></li><li data-dcnode-id="741"><span data-dcnode-id="742" instrument_node="">Infection</span></li><li data-dcnode-id="739"><span data-dcnode-id="740" instrument_node="">Alloimmunization (can make it hard to find a matching unit of blood for a future transfusion)</span></li></ul><p data-dcnode-id="736"><span data-dcnode-id="737" instrument_node="">All blood banks and hospital personnel have adopted practices to reduce the risk of transfusion problems.</span></p><p data-dcnode-id="734"><span data-dcnode-id="735" instrument_node="">People with sickle cell disease who receive transfusions should be monitored for and immunized against hepatitis. They should also receive regular screenings for iron overload. If a person has iron overload, the doctor will give chelation therapy, a medicine to reduce the amount of iron in the body and the problems that iron overload causes.</span></p><h4 data-dcnode-id="731"><span data-dcnode-id="732" id="Hematopoietic_Stem_Cell_Transplantation"><span data-dcnode-id="733" instrument_node="">Hematopoietic Stem Cell Transplantation</span></span></h4><p data-dcnode-id="729"><span data-dcnode-id="730" instrument_node="">At the present time, hematopoietic stem cell transplantation (HSCT) is the only cure for sickle cell disease. People with sickle cell disease and their families should ask their doctor about this procedure.</span></p><p data-dcnode-id="726"><strong data-dcnode-id="727"><span data-dcnode-id="728" instrument_node="">What Are Stem Cells ?</span></strong></p><p data-dcnode-id="724"><span data-dcnode-id="725" instrument_node="">Stem cells are special cells that can divide over and over again. After they divide, these cells can go on to become blood red cells, white cells, or platelets.</span></p><p data-dcnode-id="722"><span data-dcnode-id="723" instrument_node="">A person with sickle cell disease has stem cells that make red blood cells that can sickle. People without sickle cell disease have stem cells that make red cells that usually won’t sickle.</span></p><p data-dcnode-id="719"><strong data-dcnode-id="720"><span data-dcnode-id="721" instrument_node="">What Stem Cells Are Used in hematopoietic stem cell transplantation ?</span></strong></p><p data-dcnode-id="717"><span data-dcnode-id="718" instrument_node="">In hematopoietic stem cell transplantation, stem cells are taken from the bone marrow or blood of a person who does not have sickle cell disease (the donor). The donor, however, may have sickle cell trait.</span></p><p data-dcnode-id="715"><span data-dcnode-id="716" instrument_node="">The donor is often the person’s sister or brother. This is because the safest and most successful transplants use stem cells that are matched for special proteins called HLA antigens. Since these antigens are inherited from parents, a sister or brother is the most likely person to have the same antigens as the person with sickle cell disease.</span></p><p data-dcnode-id="712"><strong data-dcnode-id="713"><span data-dcnode-id="714" instrument_node="">What Happens During hematopoietic stem cell transplantation ?</span></strong></p><p data-dcnode-id="710"><span data-dcnode-id="711" instrument_node="">First, stem cells are taken from the donor. After this, the person with sickle cell disease (the recipient) is treated with drugs that destroy or reduce his or her own bone marrow stem cells.</span></p><p data-dcnode-id="708"><span data-dcnode-id="709" instrument_node="">The donor stem cells are then injected into the person’s vein. The injected cells will make a home in the recipient’s bone marrow, gradually replacing the recipient’s cells. The new stem cells will make red cells that do not sickle.</span></p><p data-dcnode-id="705"><strong data-dcnode-id="706"><span data-dcnode-id="707" instrument_node="">Which People Receive hematopoietic stem cell transplantation ?</span></strong></p><p data-dcnode-id="703"><span data-dcnode-id="704" instrument_node="">At the present time, most sickle cell disease transplants are performed in children who have had complications such as strokes, acute chest crises, and recurring pain crises. These transplants usually use a matched donor.</span></p><p data-dcnode-id="701"><span data-dcnode-id="702" instrument_node="">Because only about 1 in 10 children with sickle cell disease has a matched donor without sickle cell disease in their families, the number of people with sickle cell disease who get transplants is low.</span></p><p data-dcnode-id="699"><span data-dcnode-id="700" instrument_node="">Hematopoietic stem cell transplantation is more risky in adults, and that is why most transplants are done in children.</span></p><p data-dcnode-id="697"><span data-dcnode-id="698" instrument_node="">There are several medical centers that are researching new sickle cell disease hematopoietic stem cell transplantation techniques in children and adults who don’t have a matched donor in the family or are older than most recipients. Hopefully, more people with sickle cell disease will be able to receive a transplant in the future, using these new methods.</span></p><p data-dcnode-id="694"><strong data-dcnode-id="695"><span data-dcnode-id="696" instrument_node="">What Are the Risks ?</span></strong></p><p data-dcnode-id="692"><span data-dcnode-id="693" instrument_node="">Hematopoietic stem cell transplantation is successful in about 85 percent of children when the donor is related and HLA matched. Even with this high success rate, hematopoietic stem cell transplantation still has risks.</span></p><p data-dcnode-id="690"><span data-dcnode-id="691" instrument_node="">Complications can include severe infections, seizures, and other clinical problems. About 5 percent of people have died. Sometimes transplanted cells attack the recipient’s organs (graft versus host disease).</span></p><p data-dcnode-id="688"><span data-dcnode-id="689" instrument_node="">Medicines are given to prevent many of the complications, but they still can happen.</span></p><h3 data-dcnode-id="685"><span data-dcnode-id="686" id="What_happens_when_you_have_too_many_red_blood_cells"><span data-dcnode-id="687" instrument_node="">What happens when you have too many red blood cells</span></span></h3><p data-dcnode-id="679"><span data-dcnode-id="684" instrument_node="">Polycythemia vera is a rare blood disease in which your your bone marrow makes too many red blood cells and it also can make too many white blood cells and platelets </span><sup class="footnote_plugin_tooltip_text" data-dcnode-id="682" id="footnote_plugin_tooltip_14" onclick="footnote_moveToAnchor('footnote_plugin_reference_14');"><span data-dcnode-id="683" instrument_node="">14)</span></sup><span class="footnote_tooltip" data-dcnode-id="681" id="footnote_plugin_tooltip_text_14"></span><span data-dcnode-id="680" instrument_node="">. The disease affects people of all ages, but it’s most common in adults who are older than 60. Polycythemia vera is rare in children and young adults. Men are at slightly higher risk for polycythemia vera than women.</span></p><p data-dcnode-id="677"><span data-dcnode-id="678" instrument_node="">The extra red blood cells make your blood thicker than normal. As a result, blood clots can form more easily. These clots can block blood flow through your arteries and veins, which can cause a heart attack or stroke.</span></p><p data-dcnode-id="675"><span data-dcnode-id="676" instrument_node="">Thicker blood also doesn’t flow as quickly to your body as normal blood. Slowed blood flow prevents your organs from getting enough oxygen, which can cause serious problems, such as angina (heart pain) and heart failure. Angina is chest pain or discomfort.</span></p><p data-dcnode-id="673"><span data-dcnode-id="674" instrument_node="">A mutation, or change, in the body’s JAK2 gene is the major cause of polycythemia vera. This gene makes a protein that helps the body produce blood cells. What causes the change in the JAK2 gene isn’t known. Polycythemia vera generally isn’t inherited—that is, passed from parents to children through genes.</span></p><p data-dcnode-id="671"><span data-dcnode-id="672" instrument_node="">Polycythemia vera develops slowly and may not cause symptoms for years. The disease often is found during routine blood tests done for other reasons.</span></p><p data-dcnode-id="669"><span data-dcnode-id="670" instrument_node="">When signs and symptoms are present, they’re the result of the thick blood that occurs with polycythemia vera. This thickness slows the flow of oxygen-rich blood to all parts of your body. Without enough oxygen, many parts of your body won’t work normally.</span></p><p data-dcnode-id="667"><span data-dcnode-id="668" instrument_node="">For example, slower blood flow deprives your arms, legs, lungs, and eyes of the oxygen they need. This can cause headaches, dizziness, itching, and vision problems, such as blurred or double vision.</span></p><p data-dcnode-id="665"><span data-dcnode-id="666" instrument_node="">Polycythemia vera is a serious, chronic (ongoing) disease that can be fatal if not diagnosed and treated. Polycythemia vera has no cure, but treatments can help control the disease and its complications.</span></p><p data-dcnode-id="663"><span data-dcnode-id="664" instrument_node="">Polycythemia vera is treated with procedures, medicines, and other methods. You may need one or more treatments to manage the disease.</span></p><h4 data-dcnode-id="660"><span data-dcnode-id="661" id="What_Causes_Polycythemia_Vera"><span data-dcnode-id="662" instrument_node="">What Causes Polycythemia Vera ?</span></span></h4><p data-dcnode-id="657"><strong data-dcnode-id="658"><span data-dcnode-id="659" instrument_node="">Primary Polycythemia</span></strong></p><p data-dcnode-id="655"><span data-dcnode-id="656" instrument_node="">Polycythemia vera also is known as primary polycythemia. A mutation, or change, in the body’s JAK2 gene is the main cause of polycythemia vera. The JAK2 gene makes a protein that helps the body produce blood cells.</span></p><p data-dcnode-id="653"><span data-dcnode-id="654" instrument_node="">What causes the change in the JAK2 gene isn’t known. Polycythemia vera generally isn’t inherited—that is, passed from parents to children through genes. However, in some families, the JAK2 gene may have a tendency to mutate. Other, unknown genetic factors also may play a role in causing polycythemia vera.</span></p><p data-dcnode-id="650"><strong data-dcnode-id="651"><span data-dcnode-id="652" instrument_node="">Secondary Polycythemia</span></str
