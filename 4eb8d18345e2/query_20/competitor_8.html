ong></p><p data-dcnode-id="648"><span data-dcnode-id="649" instrument_node="">Another type of polycythemia, called secondary polycythemia, isn’t related to the JAK2 gene. Long-term exposure to low oxygen levels causes secondary polycythemia.</span></p><p data-dcnode-id="646"><span data-dcnode-id="647" instrument_node="">A lack of oxygen over a long period can cause your body to make more of the hormone erythropoietin (EPO). High levels of EPO can prompt your body to make more red blood cells than normal. This leads to thicker blood, as seen in polycythemia vera.</span></p><p data-dcnode-id="644"><span data-dcnode-id="645" instrument_node="">People who have severe heart or lung disease may develop secondary polycythemia. People who smoke, spend long hours at high altitudes, or are exposed to high levels of carbon monoxide where they work or live also are at risk.</span></p><p data-dcnode-id="642"><span data-dcnode-id="643" instrument_node="">For example, working in an underground parking garage or living in a home with a poorly vented fireplace or furnace can raise your risk for secondary polycythemia.</span></p><p data-dcnode-id="640"><span data-dcnode-id="641" instrument_node="">Rarely, tumors can make and release EPO, or certain blood problems can cause the body to make more EPO.</span></p><p data-dcnode-id="638"><span data-dcnode-id="639" instrument_node="">Sometimes doctors can cure secondary polycythemia—it depends on whether the underlying cause can be stopped, controlled, or cured.</span></p><h4 data-dcnode-id="635"><span data-dcnode-id="636" id="What_Are_the_Signs_and_Symptoms_of_Polycythemia_Vera"><span data-dcnode-id="637" instrument_node="">What Are the Signs and Symptoms of Polycythemia Vera ?</span></span></h4><p data-dcnode-id="633"><span data-dcnode-id="634" instrument_node="">Polycythemia vera develops slowly. The disease may not cause signs or symptoms for years.</span></p><p data-dcnode-id="631"><span data-dcnode-id="632" instrument_node="">When signs and symptoms are present, they’re the result of the thick blood that occurs with polycythemia vera. This thickness slows the flow of oxygen-rich blood to all parts of your body. Without enough oxygen, many parts of your body won’t work normally.</span></p><p data-dcnode-id="629"><span data-dcnode-id="630" instrument_node="">The signs and symptoms of polycythemia vera include:</span></p><ul data-dcnode-id="608"><li data-dcnode-id="627"><span data-dcnode-id="628" instrument_node="">Headaches, dizziness, and weakness</span></li><li data-dcnode-id="625"><span data-dcnode-id="626" instrument_node="">Shortness of breath and problems breathing while lying down</span></li><li data-dcnode-id="623"><span data-dcnode-id="624" instrument_node="">Feelings of pressure or fullness on the left side of the abdomen due to an enlarged spleen (an organ in the abdomen)</span></li><li data-dcnode-id="621"><span data-dcnode-id="622" instrument_node="">Double or blurred vision and blind spots</span></li><li data-dcnode-id="619"><span data-dcnode-id="620" instrument_node="">Itching all over (especially after a warm bath), reddened face, and a burning feeling on your skin (especially your hands and feet)</span></li><li data-dcnode-id="617"><span data-dcnode-id="618" instrument_node="">Bleeding from your gums and heavy bleeding from small cuts</span></li><li data-dcnode-id="615"><span data-dcnode-id="616" instrument_node="">Unexplained weight loss</span></li><li data-dcnode-id="613"><span data-dcnode-id="614" instrument_node="">Fatigue (tiredness)</span></li><li data-dcnode-id="611"><span data-dcnode-id="612" instrument_node="">Excessive sweating</span></li><li data-dcnode-id="609"><span data-dcnode-id="610" instrument_node="">Very painful swelling in a single joint, usually the big toe (called gouty arthritis)</span></li></ul><p data-dcnode-id="606"><span data-dcnode-id="607" instrument_node="">In rare cases, people who have polycythemia vera may have pain in their bones.</span></p><h4 data-dcnode-id="603"><span data-dcnode-id="604" id="Polycythemia_Vera_Complications"><span data-dcnode-id="605" instrument_node="">Polycythemia Vera Complications</span></span></h4><p data-dcnode-id="601"><span data-dcnode-id="602" instrument_node="">If you have polycythemia vera, the thickness of your blood and the slowed blood flow can cause serious health problems.</span></p><p data-dcnode-id="599"><span data-dcnode-id="600" instrument_node="">Blood clots are the most serious complication of polycythemia vera. Blood clots can cause a heart attack or stroke. They also can cause your liver and spleen to enlarge. Blood clots in the liver and spleen can cause sudden, intense pain.</span></p><p data-dcnode-id="597"><span data-dcnode-id="598" instrument_node="">Slowed blood flow also prevents enough oxygen-rich blood from reaching your organs. This can lead to angina (chest pain or discomfort) and heart failure. The high levels of red blood cells that polycythemia vera causes can lead to stomach ulcers, gout, or kidney stones.</span></p><p data-dcnode-id="595"><span data-dcnode-id="596" instrument_node="">Some people who have polycythemia vera may develop myelofibrosis. This is a condition in which your bone marrow is replaced with scar tissue. Abnormal bone marrow cells may begin to grow out of control.</span></p><p data-dcnode-id="593"><span data-dcnode-id="594" instrument_node="">This abnormal growth can lead to acute myelogenous leukemia (AML), a cancer of the blood and bone marrow. This disease can worsen very quickly.</span></p><h4 data-dcnode-id="590"><span data-dcnode-id="591" id="How_Is_Polycythemia_Vera_Diagnosed"><span data-dcnode-id="592" instrument_node="">How Is Polycythemia Vera Diagnosed ?</span></span></h4><p data-dcnode-id="588"><span data-dcnode-id="589" instrument_node="">Polycythemia vera may not cause signs or symptoms for years. The disease often is found during routine blood tests done for other reasons. If the results of your blood tests aren’t normal, your doctor may want to do more tests.</span></p><p data-dcnode-id="586"><span data-dcnode-id="587" instrument_node="">Your doctor will diagnose polycythemia vera based on your signs and symptoms, your age and overall health, your medical history, a physical exam, and test results.</span></p><p data-dcnode-id="584"><span data-dcnode-id="585" instrument_node="">During the physical exam, your doctor will look for signs of polycythemia vera. He or she will check for an enlarged spleen, red skin on your face, and bleeding from your gums.</span></p><p data-dcnode-id="582"><span data-dcnode-id="583" instrument_node="">If your doctor confirms that you have polycythemia, the next step is to find out whether you have primary polycythemia or secondary polycythemia.</span></p><p data-dcnode-id="580"><span data-dcnode-id="581" instrument_node="">Your medical history and physical exam may confirm which type of polycythemia you have. If not, you may have tests that check the level of the hormone erythropoietin (EPO) in your blood.</span></p><p data-dcnode-id="578"><span data-dcnode-id="579" instrument_node="">People who have polycythemia vera have very low levels of EPO. People who have secondary polycythemia usually have normal or high levels of EPO.</span></p><p data-dcnode-id="575"><strong data-dcnode-id="576"><span data-dcnode-id="577" instrument_node="">Specialists Involved</span></strong></p><p data-dcnode-id="573"><span data-dcnode-id="574" instrument_node="">If your primary care doctor thinks you have polycythemia vera, he or she may refer you to a hematologist. A hematologist is a doctor who specializes in diagnosing and treating blood diseases and conditions.</span></p><p data-dcnode-id="570"><strong data-dcnode-id="571"><span data-dcnode-id="572" instrument_node="">Diagnostic Tests</span></strong></p><p data-dcnode-id="566"><span data-dcnode-id="569" instrument_node="">You may have blood tests to diagnose polycythemia vera. These tests include a complete blood count (CBC) and other tests, if necessary.</span><br data-dcnode-id="568"><span data-dcnode-id="567" instrument_node=""> Complete Blood Count</span></p><p data-dcnode-id="564"><span data-dcnode-id="565" instrument_node="">Often, the first test used to diagnose polycythemia vera is a CBC. The CBC measures many parts of your blood.</span></p><p data-dcnode-id="562"><span data-dcnode-id="563" instrument_node="">This test checks your hemoglobin and hematocrit levels. Hemoglobin is an iron-rich protein that helps red blood cells carry oxygen from the lungs to the rest of the body. Hematocrit is a measure of how much space red blood cells take up in your blood. A high level of hemoglobin or hematocrit may be a sign of polycythemia vera.</span></p><p data-dcnode-id="560"><span data-dcnode-id="561" instrument_node="">The CBC also checks the number of red blood cells, white blood cells, and platelets in your blood. Abnormal results may be a sign of polycythemia vera, a blood disorder, an infection, or another condition.</span></p><p data-dcnode-id="558"><span data-dcnode-id="559" instrument_node="">In addition to high red blood cell counts, people who have polycythemia vera also may have high white blood cell and/or platelet counts.</span></p><p data-dcnode-id="555"><strong data-dcnode-id="556"><span data-dcnode-id="557" instrument_node="">Other Blood Tests</span></strong></p><p data-dcnode-id="553"><span data-dcnode-id="554" instrument_node="">Blood smear. For this test, a small sample of blood is drawn from a vein, usually in your arm. The blood sample is examined under a microscope.</span></p><p data-dcnode-id="551"><span data-dcnode-id="552" instrument_node="">A blood smear can show whether you have a higher than normal number of red blood cells. The test also can show abnormal blood cells that are linked to myelofibrosis and other conditions related to polycythemia vera.</span></p><p data-dcnode-id="549"><span data-dcnode-id="550" instrument_node="">Erythropoietin level. This blood test measures the level of EPO in your blood. EPO is a hormone that prompts your bone marrow to make new blood cells. People who have polycythemia vera have very low levels of EPO. People who have secondary polycythemia usually have normal or high levels of EPO.</span></p><p data-dcnode-id="546"><strong data-dcnode-id="547"><span data-dcnode-id="548" instrument_node="">Bone Marrow Tests</span></strong></p><p data-dcnode-id="544"><span data-dcnode-id="545" instrument_node="">Bone marrow tests can show whether your bone marrow is healthy. These tests also show whether your bone marrow is making normal amounts of blood cells.</span></p><p data-dcnode-id="542"><span data-dcnode-id="543" instrument_node="">The two bone marrow tests are aspiration and biopsy. For aspiration, your doctor removes a small amount of fluid bone marrow through a needle. For a biopsy, your doctor removes a small amount of bone marrow tissue through a larger needle. The samples are then examined under a microscope.</span></p><p data-dcnode-id="540"><span data-dcnode-id="541" instrument_node="">If the tests show that your bone marrow is making too many blood cells, it may be a sign that you have polycythemia vera.</span></p><h4 data-dcnode-id="537"><span data-dcnode-id="538" id="How_Is_Polycythemia_Vera_Treated"><span data-dcnode-id="539" instrument_node="">How Is Polycythemia Vera Treated ?</span></span></h4><p data-dcnode-id="535"><span data-dcnode-id="536" instrument_node="">Polycythemia vera doesn’t have a cure. However, treatments can help control the disease and its complications. polycythemia vera is treated with procedures, medicines, and other methods. You may need one or more treatments to manage the disease.</span></p><p data-dcnode-id="532"><strong data-dcnode-id="533"><span data-dcnode-id="534" instrument_node="">Goals of Treatment</span></strong></p><p data-dcnode-id="530"><span data-dcnode-id="531" instrument_node="">The goals of treating polycythemia vera are to control symptoms and reduce the risk of complications, especially heart attack and stroke. To do this, polycythemia vera treatments reduce the number of red blood cells and the level of hemoglobin (an iron-rich protein) in the blood. This brings the thickness of your blood closer to normal.</span></p><p data-dcnode-id="528"><span data-dcnode-id="529" instrument_node="">Blood with normal thickness flows better through the blood vessels. This reduces the chance that blood clots will form and cause a heart attack or stroke.</span></p><p data-dcnode-id="526"><span data-dcnode-id="527" instrument_node="">Blood with normal thickness also ensures that your body gets enough oxygen. This can help reduce some of the signs and symptoms of polycythemia vera, such as headaches, vision problems, and itching.</span></p><p data-dcnode-id="524"><span data-dcnode-id="525" instrument_node="">Studies show that treating polycythemia vera greatly improves your chances of living longer.</span></p><p data-dcnode-id="522"><span data-dcnode-id="523" instrument_node="">The goal of treating secondary polycythemia is to control its underlying cause, if possible. For example, if the cause is carbon monoxide exposure, the goal is to find the source of the carbon monoxide and fix or remove it.</span></p><h4 data-dcnode-id="519"><span data-dcnode-id="520" id="Treatments_To_Lower_Red_Blood_Cell_Levels"><span data-dcnode-id="521" instrument_node="">Treatments To Lower Red Blood Cell Levels</span></span></h4><p data-dcnode-id="516"><strong data-dcnode-id="517"><span data-dcnode-id="518" instrument_node="">Phlebotomy</span></strong></p><p data-dcnode-id="514"><span data-dcnode-id="515" instrument_node="">Phlebotomy is a procedure that removes some blood from your body. For this procedure, a needle is inserted into one of your veins. Blood from the vein flows through an airtight tube into a sterile container or bag. The process is similar to the process of donating blood.</span></p><p data-dcnode-id="512"><span data-dcnode-id="513" instrument_node="">Phlebotomy reduces your red blood cell count and starts to bring your blood thickness closer to normal.</span></p><p data-dcnode-id="510"><span data-dcnode-id="511" instrument_node="">Typically, a pint (1 unit) of blood is removed each week until your hematocrit level approaches normal. Hematocrit is the measure of how much space red blood cells take up in your blood.</span></p><p data-dcnode-id="508"><span data-dcnode-id="509" instrument_node="">You may need to have phlebotomy done every few months.</span></p><p data-dcnode-id="505"><strong data-dcnode-id="506"><span data-dcnode-id="507" instrument_node="">Medicines</span></strong></p><p data-dcnode-id="503"><span data-dcnode-id="504" instrument_node="">Your doctor may prescribe medicines to keep your bone marrow from making too many red blood cells. Examples of these medicines include hydroxyurea and interferon-alpha.</span></p><p data-dcnode-id="501"><span data-dcnode-id="502" instrument_node="">Hydroxyurea is a medicine generally used to treat cancer. This medicine can reduce the number of red blood cells and platelets in your blood. As a result, this medicine helps improve your blood flow and bring the thickness of your blood closer to normal.</span></p><p data-dcnode-id="499"><span data-dcnode-id="500" instrument_node="">Interferon-alpha is a substance that your body normally makes. It also can be used to treat polycythemia vera. Interferon-alpha can prompt your immune system to fight overactive bone marrow cells. This helps lower your red blood cell count and keep your blood flow and blood thickness closer to normal.</span></p><p data-dcnode-id="496"><strong data-dcnode-id="497"><span data-dcnode-id="498" instrument_node="">Radiation Treatment</span></strong></p><p data-dcnode-id="494"><span data-dcnode-id="495" instrument_node="">Radiation treatment can help suppress overactive bone marrow cells. This helps lower your red blood cell count and keep your blood flow and blood thickness closer to normal.</span></p><p data-dcnode-id="492"><span data-dcnode-id="493" instrument_node="">However, radiation treatment can raise your risk of leukemia (blood cancer) and other blood diseases.</span></p><p data-dcnode-id="489"><strong data-dcnode-id="490"><span data-dcnode-id="491" instrument_node="">Treatments for Symptoms</span></strong></p><p data-dcnode-id="487"><span data-dcnode-id="488" instrument_node="">Aspirin can relieve bone pain and burning feelings in your hands or feet that you may have as a result of polycythemia vera. Aspirin also thins your blood, so it reduces the risk of blood clots.</span></p><p data-dcnode-id="485"><span data-dcnode-id="486" instrument_node="">Aspirin can have side effects, including bleeding in the stomach and intestines. For this reason, take aspirin only as your doctor recommends.</span></p><p data-dcnode-id="483"><span data-dcnode-id="484" instrument_node="">If your polycythemia vera causes itching, your doctor may prescribe medicines to ease the discomfort. Your doctor also may prescribe ultraviolet light treatment to help relieve your itching.</span></p><p data-dcnode-id="480"><strong data-dcnode-id="481"><span data-dcnode-id="482" instrument_node="">Other ways to reduce itching include:</span></strong></p><ul data-dcnode-id="473"><li data-dcnode-id="478"><span data-dcnode-id="479" instrument_node="">Avoiding hot baths. Cooler water can limit irritation to your skin.</span></li><li data-dcnode-id="476"><span data-dcnode-id="477" instrument_node="">Gently patting yourself dry after bathing. Vigorous rubbing with a towel can irritate your skin.</span></li><li data-dcnode-id="474"><span data-dcnode-id="475" instrument_node="">Taking starch baths. Add half a box of starch to a tub of lukewarm water. This can help soothe your skin.</span></li></ul><p data-dcnode-id="470"><strong data-dcnode-id="471"><span data-dcnode-id="472" instrument_node="">Experimental Treatments</span></strong></p><p data-dcnode-id="468"><span data-dcnode-id="469" instrument_node="">Researchers are studying other treatments for polycythemia vera. An experimental treatment for itching involves taking low doses of selective serotonin reuptake inhibitors (SSRIs). This type of medicine is used to treat depression. In clinical trials, SSRIs reduced itching in people who had polycythemia vera.</span></p><p data-dcnode-id="466"><span data-dcnode-id="467" instrument_node="">Imatinib mesylate is a medicine that’s approved for treating leukemia. In clinical trials, this medicine helped reduce the need for phlebotomy in people who had polycythemia vera. This medicine also helped reduce the size of enlarged spleens.</span></p><p data-dcnode-id="464"><span data-dcnode-id="465" instrument_node="">Researchers also are trying to find a treatment that can block or limit the effects of an abnormal JAK2 gene. A mutation, or change, in the JAK2 gene is the major cause of polycythemia vera.</span></p><h4 data-dcnode-id="461"><span data-dcnode-id="462" id="Living_With_Polycythemia_Vera"><span data-dcnode-id="463" instrument_node="">Living With Polycythemia Vera</span></span></h4><p data-dcnode-id="459"><span data-dcnode-id="460" instrument_node="">Polycythemia vera develops very slowly. It may not cause signs or symptoms for years. If you have polycythemia vera, the sooner it’s diagnosed, the sooner your doctor can begin treating you. With proper treatment, you can prevent or delay complications.</span></p><p data-dcnode-id="456"><strong data-dcnode-id="457"><span data-dcnode-id="458" instrument_node="">Preventing Complications</span></strong></p><p data-dcnode-id="454"><span data-dcnode-id="455" instrument_node="">Moderate physical activities, such as walking, can safely increase your heart rate and improve blood flow to your body. Improving blood flow lowers your risk of blood clots. Leg and ankle stretching exercises also can help improve your blood flow.</span></p><p data-dcnode-id="452"><span data-dcnode-id="453" instrument_node="">Polycythemia vera may cause itching all over your body. It’s important not to scratch and damage your skin. If bathing or showering causes you to have severe itching, try using cooler water and gentler soap. Carefully and gently dry your skin after baths, and use moisturizing lotion on your skin. Starch baths also may help ease itchy skin.</span></p><p data-dcnode-id="450"><span data-dcnode-id="451" instrument_node="">Polycythemia vera causes poor blood flow in your hands and feet. As a result, you may be more prone to injuries from cold, heat, and pressure. If you have Polycythemia vera, avoid long-term exposure to extremes in temperature or pressure. For example:</span></p><ul data-dcnode-id="441"><li data-dcnode-id="448"><span data-dcnode-id="449" instrument_node="">Take extra care of your hands and feet in cold weather. Wear warm gloves, socks, and shoes.</span></li><li data-dcnode-id="446"><span data-dcnode-id="447" instrument_node="">Avoid extreme heat, and protect yourself from the sun. Drink plenty of liquids. Avoid hot tubs, heated whirlpools, or hot baths of any type. Also, tanning beds, sun lamps, and heat lamps can damage your skin if you have Polycythemia vera.</span></li><li data-dcnode-id="444"><span data-dcnode-id="445" instrument_node="">Guard against trauma or situations where you may be at high risk of injury, such as during sports or strenuous activities. If you’re injured, seek treatment right away. Tell the person treating you that you have Polycythemia vera.</span></li><li data-dcnode-id="442"><span data-dcnode-id="443" instrument_node="">Check your feet regularly and report any sores to your doctor.</span></li></ul><p data-dcnode-id="438"><strong data-dcnode-id="439"><span data-dcnode-id="440" instrument_node="">Getting Ongoing Care</span></strong></p><p data-dcnode-id="436"><span data-dcnode-id="437" instrument_node="">If you have polycythemia vera, you’ll need lifelong medical care for the disease. Ask your doctor how often you should schedule followup visits.</span></p><p data-dcnode-id="434"><span data-dcnode-id="435" instrument_node="">Routine care will allow your doctor to detect any changes with your Polycythemia vera and treat them early, if needed. You may need periodic blood tests to show whether the disease is getting worse.</span></p><p data-dcnode-id="432"><span data-dcnode-id="433" instrument_node="">Follow your treatment plan and take all of your medicines exactly as your doctor prescribes.</span></p><div class="at-below-post addthis_tool" data-dcnode-id="431" data-url="https://healthjade.net/hematocrit/"></div><div class="footnote_container_prepare" data-dcnode-id="422"><p data-dcnode-id="423"><span data-dcnode-id="429" onclick="footnote_expand_reference_container();"><span data-dcnode-id="430" instrument_node="">References</span></span><span data-dcnode-id="424" style=""><span data-dcnode-id="428" instrument_node="">&nbsp;&nbsp;&nbsp;[ </span><a data-dcnode-id="426" id="footnote_reference_container_collapse_button" onclick="footnote_expand_collapse_reference_container();" style="cursor:pointer;"><span data-dcnode-id="427" instrument_node="">+</span></a><span data-dcnode-id="425" instrument_node=""> ]</span></span></p></div><div data-dcnode-id="356" id="footnote_references_container" style="display: none;"><table class="footnote-reference-container" data-dcnode-id="357"><tbody data-dcnode-id="358"><tr data-dcnode-id="413"><td class="footnote_plugin_index" data-dcnode-id="419"><span data-dcnode-id="420" id="footnote_plugin_reference_1"><span data-dcnode-id="421" instrument_node="">1, 2, 3.</span></span></td><td class="footnote_plugin_link" data-dcnode-id="416"><span data-dcnode-id="417" onclick="footnote_moveToAnchor('footnote_plugin_tooltip_1');"><span data-dcnode-id="418" instrument_node="">↵</span></span></td><td class="footnote_plugin_text" data-dcnode-id="414"><span data-dcnode-id="415" instrument_node="">Anemia. National Heart, Lung and Blood Institute. http
