><span data-dcnode-id="3015" instrument_node="">Procedures</span></a></li></ul></li><li data-dcnode-id="2989"><a data-dcnode-id="3009" href="#What_Is_Iron-Deficiency_Anemia"><span data-dcnode-id="3010" instrument_node="">What Is Iron-Deficiency Anemia ?</span></a><ul data-dcnode-id="2990"><li data-dcnode-id="3006"><a data-dcnode-id="3007" href="#What_Causes_Iron-Deficiency_Anemia"><span data-dcnode-id="3008" instrument_node="">What Causes Iron-Deficiency Anemia ?</span></a></li><li data-dcnode-id="3003"><a data-dcnode-id="3004" href="#Who_Is_at_Risk_for_Iron-Deficiency_Anemia"><span data-dcnode-id="3005" instrument_node="">Who Is at Risk for Iron-Deficiency Anemia ?</span></a></li><li data-dcnode-id="3000"><a data-dcnode-id="3001" href="#What_Are_the_Signs_and_Symptoms_of_Iron-Deficiency_Anemia"><span data-dcnode-id="3002" instrument_node="">What Are the Signs and Symptoms of Iron-Deficiency Anemia ?</span></a></li><li data-dcnode-id="2997"><a data-dcnode-id="2998" href="#How_Is_Iron-Deficiency_Anemia_Diagnosed"><span data-dcnode-id="2999" instrument_node="">How Is Iron-Deficiency Anemia Diagnosed ?</span></a></li><li data-dcnode-id="2994"><a data-dcnode-id="2995" href="#How_Is_Iron-Deficiency_Anemia_Treated"><span data-dcnode-id="2996" instrument_node="">How Is Iron-Deficiency Anemia Treated ?</span></a></li><li data-dcnode-id="2991"><a data-dcnode-id="2992" href="#Treatments_for_Severe_Iron-Deficiency_Anemia"><span data-dcnode-id="2993" instrument_node="">Treatments for Severe Iron-Deficiency Anemia</span></a></li></ul></li><li data-dcnode-id="2960"><a data-dcnode-id="2987" href="#What_Is_Pernicious_Anemia"><span data-dcnode-id="2988" instrument_node="">What Is Pernicious Anemia ?</span></a><ul data-dcnode-id="2961"><li data-dcnode-id="2974"><a data-dcnode-id="2985" href="#What_Causes_Pernicious_Anemia"><span data-dcnode-id="2986" instrument_node="">What Causes Pernicious Anemia ?</span></a><ul data-dcnode-id="2975"><li data-dcnode-id="2982"><a data-dcnode-id="2983" href="#Lack_of_Intrinsic_Factor"><span data-dcnode-id="2984" instrument_node="">Lack of Intrinsic Factor</span></a></li><li data-dcnode-id="2979"><a data-dcnode-id="2980" href="#Malabsorption_in_the_Small_Intestine"><span data-dcnode-id="2981" instrument_node="">Malabsorption in the Small Intestine</span></a></li><li data-dcnode-id="2976"><a data-dcnode-id="2977" href="#Diet_Lacking_Vitamin_B12"><span data-dcnode-id="2978" instrument_node="">Diet Lacking Vitamin B12</span></a></li></ul></li><li data-dcnode-id="2971"><a data-dcnode-id="2972" href="#Who_Is_at_Risk_for_Pernicious_Anemia"><span data-dcnode-id="2973" instrument_node="">Who Is at Risk for Pernicious Anemia ?</span></a></li><li data-dcnode-id="2968"><a data-dcnode-id="2969" href="#What_Are_the_Signs_and_Symptoms_of_Pernicious_Anemia"><span data-dcnode-id="2970" instrument_node="">What Are the Signs and Symptoms of Pernicious Anemia ?</span></a></li><li data-dcnode-id="2965"><a data-dcnode-id="2966" href="#How_Is_Pernicious_Anemia_Diagnosed"><span data-dcnode-id="2967" instrument_node="">How Is Pernicious Anemia Diagnosed ?</span></a></li><li data-dcnode-id="2962"><a data-dcnode-id="2963" href="#How_Is_Pernicious_Anemia_Treated"><span data-dcnode-id="2964" instrument_node="">How Is Pernicious Anemia Treated ?</span></a></li></ul></li><li data-dcnode-id="2913"><a data-dcnode-id="2958" href="#Sickle_Cell_Disease"><span data-dcnode-id="2959" instrument_node="">Sickle Cell Disease</span></a><ul data-dcnode-id="2914"><li data-dcnode-id="2955"><a data-dcnode-id="2956" href="#Some_Forms_of_Sickle_Cell_Disease"><span data-dcnode-id="2957" instrument_node="">Some Forms of Sickle Cell Disease</span></a></li><li data-dcnode-id="2952"><a data-dcnode-id="2953" href="#What_Causes_Sickle_Cell_Disease"><span data-dcnode-id="2954" instrument_node="">What Causes Sickle Cell Disease ?</span></a></li><li data-dcnode-id="2949"><a data-dcnode-id="2950" href="#How_Is_Sickle_Cell_Disease_Inherited"><span data-dcnode-id="2951" instrument_node="">How Is Sickle Cell Disease Inherited ?</span></a></li><li data-dcnode-id="2946"><a data-dcnode-id="2947" href="#What_Are_the_Signs_and_Symptoms_of_Sickle_Cell_Disease"><span data-dcnode-id="2948" instrument_node="">What Are the Signs and Symptoms of Sickle Cell Disease ?</span></a></li><li data-dcnode-id="2943"><a data-dcnode-id="2944" href="#Major_Complications_of_Sickle_Cell_Disease"><span data-dcnode-id="2945" instrument_node="">Major Complications of Sickle Cell Disease</span></a></li><li data-dcnode-id="2940"><a data-dcnode-id="2941" href="#Acute_Chest_Syndrome"><span data-dcnode-id="2942" instrument_node="">Acute Chest Syndrome</span></a></li><li data-dcnode-id="2937"><a data-dcnode-id="2938" href="#Brain_Complications"><span data-dcnode-id="2939" instrument_node="">Brain Complications</span></a></li><li data-dcnode-id="2934"><a data-dcnode-id="2935" href="#How_Is_Sickle_Cell_Disease_Diagnosed"><span data-dcnode-id="2936" instrument_node="">How Is Sickle Cell Disease Diagnosed ?</span></a></li><li data-dcnode-id="2931"><a data-dcnode-id="2932" href="#How_Is_Sickle_Cell_Disease_Treated"><span data-dcnode-id="2933" instrument_node="">How Is Sickle Cell Disease Treated ?</span></a></li><li data-dcnode-id="2928"><a data-dcnode-id="2929" href="#Preventing_Infection"><span data-dcnode-id="2930" instrument_node="">Preventing Infection</span></a></li><li data-dcnode-id="2918"><a data-dcnode-id="2926" href="#Screening_Tests_and_Evaluations"><span data-dcnode-id="2927" instrument_node="">Screening Tests and Evaluations</span></a><ul data-dcnode-id="2919"><li data-dcnode-id="2923"><a data-dcnode-id="2924" href="#Managing_Some_Complications_of_sickle_cell_disease"><span data-dcnode-id="2925" instrument_node="">Managing Some Complications of sickle cell disease</span></a></li><li data-dcnode-id="2920"><a data-dcnode-id="2921" href="#Hydroxyurea"><span data-dcnode-id="2922" instrument_node="">Hydroxyurea</span></a></li></ul></li><li data-dcnode-id="2915"><a data-dcnode-id="2916" href="#Hematopoietic_Stem_Cell_Transplantation"><span data-dcnode-id="2917" instrument_node="">Hematopoietic Stem Cell Transplantation</span></a></li></ul></li><li data-dcnode-id="2888"><a data-dcnode-id="2911" href="#What_happens_when_you_have_too_many_red_blood_cells"><span data-dcnode-id="2912" instrument_node="">What happens when you have too many red blood cells</span></a><ul data-dcnode-id="2889"><li data-dcnode-id="2908"><a data-dcnode-id="2909" href="#What_Causes_Polycythemia_Vera"><span data-dcnode-id="2910" instrument_node="">What Causes Polycythemia Vera ?</span></a></li><li data-dcnode-id="2905"><a data-dcnode-id="2906" href="#What_Are_the_Signs_and_Symptoms_of_Polycythemia_Vera"><span data-dcnode-id="2907" instrument_node="">What Are the Signs and Symptoms of Polycythemia Vera ?</span></a></li><li data-dcnode-id="2902"><a data-dcnode-id="2903" href="#Polycythemia_Vera_Complications"><span data-dcnode-id="2904" instrument_node="">Polycythemia Vera Complications</span></a></li><li data-dcnode-id="2899"><a data-dcnode-id="2900" href="#How_Is_Polycythemia_Vera_Diagnosed"><span data-dcnode-id="2901" instrument_node="">How Is Polycythemia Vera Diagnosed ?</span></a></li><li data-dcnode-id="2896"><a data-dcnode-id="2897" href="#How_Is_Polycythemia_Vera_Treated"><span data-dcnode-id="2898" instrument_node="">How Is Polycythemia Vera Treated ?</span></a></li><li data-dcnode-id="2893"><a data-dcnode-id="2894" href="#Treatments_To_Lower_Red_Blood_Cell_Levels"><span data-dcnode-id="2895" instrument_node="">Treatments To Lower Red Blood Cell Levels</span></a></li><li data-dcnode-id="2890"><a data-dcnode-id="2891" href="#Living_With_Polycythemia_Vera"><span data-dcnode-id="2892" instrument_node="">Living With Polycythemia Vera</span></a></li></ul></li></ul></li></ul></li></ul></div><h1 data-dcnode-id="2879"><span data-dcnode-id="2880" id="What_is_hematocrit"><span data-dcnode-id="2881" instrument_node="">What is hematocrit</span></span></h1><p data-dcnode-id="2877"><span data-dcnode-id="2878" instrument_node="">Hematocrit is a blood test that measures the proportion of a person’s blood that is made up of red blood cells (RBCs) or the percentage of total blood volume occupied by red blood cells (RBCs). The hematocrit measures the volume of red blood cells (RBCs) compared to the total blood volume (red blood cells,&nbsp;white blood cells,&nbsp;platelets and plasma). Blood consists of red blood cells (RBCs), white blood cells (WBCs), and platelets (thrombocytes) suspended in a fluid portion called plasma (see Figure 1). The hematocrit is a ratio of the volume of red blood cells to the volume of all these components together, called whole blood. The value is expressed as a percentage or fraction. For example, a hematocrit value of 40% means that there are 40 milliliters of red blood cells in 100 milliliters of blood.</span></p><p data-dcnode-id="2875"><span data-dcnode-id="2876" instrument_node="">Red blood cells carry oxygen to all parts of your body. They also remove carbon dioxide (a waste product) from your body’s cells and carry it to the lungs to be exhaled.</span></p><p data-dcnode-id="2873"><span data-dcnode-id="2874" instrument_node="">Red blood cells are made in your bone marrow—a sponge-like tissue inside the bones. White blood cells (WBCs) and platelets (thrombocytes) also are made in your bone marrow. White blood cells help fight infection. Platelets stick together to seal small cuts or breaks on blood vessel walls and stop bleeding.</span></p><p data-dcnode-id="2871"><span data-dcnode-id="2872" instrument_node="">The normal hematocrit range for adult males is 40 to 54% (average = 47%); for adult females it is 38 to 46% (average = 42%). A hematocrit of 40 indicates that 40% of the volume of blood is composed of red blood cells (RBCs). The hormone testosterone, present in much higher concentration in males than in females, stimulates synthesis of erythropoietin (EPO), the hormone that in turn stimulates production of red blood cells (RBCs). Thus, testosterone contributes to higher hematocrits in males. Lower hematocrit values in women during their reproductive years also may be due to excessive loss of blood during menstruation.</span></p><p data-dcnode-id="2869"><span data-dcnode-id="2870" instrument_node="">The hematocrit is a fairly quick and simple way of evaluating a person’s red blood cells and checking for conditions such as anemia. It is often performed in conjunction with a hemoglobin&nbsp;(Hb) level and is also one component of the complete blood count (CBC), a test that is often used in the general evaluation of a person’s health. A sample is obtained by drawing blood through a needle placed in a vein in the arm or by a fingerstick (for children and adults) or a heelstick (for newborns).</span></p><p data-dcnode-id="2867"><span data-dcnode-id="2868" instrument_node="">The hematocrit reflects both the number of red blood cells and their volume (mean corpuscular volume or MCV). If the size of the red blood cells decreases (MCV decreases), so will the hematocrit and vice versa. In general, the hematocrit will rise when the number of red blood cells increases and the hematocrit will fall to less than normal when there is a drop in production of red blood cells by the bone marrow, an increase in the destruction of red blood cells, or if blood is lost due to bleeding. If the bone marrow is not able to produce new red blood cells fast enough, then the overall number of red blood cells and hematocrit will drop, resulting in anemia. A significant drop in hematocrit indicates anemia, a lower-than-normal number of red blood cells (RBCs). In anemia, the body does not have the capacity to deliver enough oxygen to tissues and organs, causing fatigue and weakness. In polycythemia (too many red blood cells) the percentage of red blood cells (RBCs) is abnormally high, and the hematocrit may be 65% or higher. This raises the viscosity of blood, the blood can becomes thickened which increases the resistance to flow and makes the blood more difficult for the heart to pump. Increased viscosity also contributes to high blood pressure,&nbsp;sluggish blood flow and increased risk of stroke. Causes of polycythemia include abnormal increases in red blood cell production (e.g., polycythemia vera or polycythemia rubra vera), tissue hypoxia, dehydration, blood doping, or the use of erythropoietin (EPO) by athletes.</span></p><p data-dcnode-id="2862"><span data-dcnode-id="2866" instrument_node="">The&nbsp;hematocrit value can be determined directly by microhematocrit centrifugation or calculated indirectly. Automated cell counters calculate the hematocrit by multiplying the red cell number (in millions/mm</span><sup data-dcnode-id="2864"><span data-dcnode-id="2865" instrument_node="">3</span></sup><span data-dcnode-id="2863" instrument_node="">) by the mean corpuscular volume (MCV, in femtoliters). When so assayed, it is subject to the vagaries inherent in obtaining an accurate measurement of the mean corpuscular volume (MCV).</span></p><h4 data-dcnode-id="2859"><span data-dcnode-id="2860" id="Red_Blood_Cell_Counts"><span data-dcnode-id="2861" instrument_node="">Red Blood Cell Counts</span></span></h4><p data-dcnode-id="2853"><span data-dcnode-id="2858" instrument_node="">The number of red blood cells in a microliter (μL or mcL or 1 mm</span><span class="_Tgc _s8w" data-dcnode-id="2855"><sup data-dcnode-id="2856"><span data-dcnode-id="2857" instrument_node="">3</span></sup></span><span data-dcnode-id="2854" instrument_node="">) of blood is called the red blood cell count (RBCC or RCC). This number varies from time to time even in healthy individuals. However, the typical range for adult males is 4,700,000 to 6,100,000 cells per microliter, and that for adult females is 4,200,000 to 5,400,000 cells per microliter.</span></p><p data-dcnode-id="2851"><span data-dcnode-id="2852" instrument_node="">The absolute numbers for red blood cell, white blood cell, and platelet counts can vary depending on how they are measured and the instruments used to measure them. For this reason, different sources may present different, but very similar, ranges of normal values.</span></p><p data-dcnode-id="2849"><span data-dcnode-id="2850" instrument_node="">An increase in the number of circulating red blood cells increases the blood’s oxygen-carrying capacity, much as a decrease in the number of circulating red blood cells decreases the blood’s oxygen-carrying capacity. Changes in this number may affect health. For this reason, red blood cell counts are routinely consulted to help diagnose and evaluate the courses of certain diseases.</span></p><h4 data-dcnode-id="2846"><span data-dcnode-id="2847" id="Can_my_hematocrit_be_tested_at_home"><span data-dcnode-id="2848" instrument_node="">Can my hematocrit be tested at home?</span></span></h4><p data-dcnode-id="2844"><span data-dcnode-id="2845" instrument_node="">No. This test requires instrumentation and trained laboratory personnel. A hematocrit is typically indirectly measured [i.e., calculated from red blood cell and mean corpuscular volume (MCV)] by automated hematology analyzers. It can also be directly measured by spinning a blood-filled capillary tube in a centrifuge (so-called spun hematocrit), but this manual method is less commonly used.</span></p><h4 data-dcnode-id="2841"><span data-dcnode-id="2842" id="How_to_measure_hematocrit_level"><span data-dcnode-id="2843" instrument_node="">How to measure hematocrit level?</span></span></h4><p data-dcnode-id="2839"><span data-dcnode-id="2840" instrument_node="">For hematocrits obtained by fingerstick, wipe the fingertip pad of the fourth finger of the nondominant hand with the alcohol prep pad. Make certain the area is allowed to dry. Prick the fingertip with the lancet. Place the hematocrit tube near the incision site and allow the blood to flow via capillary action into the hematocrit tube until it is two-thirds to three-fourths full or to a predesignated mark on the tube. Avoid “milking” the finger if possible; this causes the expression of tissue fluids and may result in a falsely low hematocrit. Always fill at least three tubes. For hematocrits obtained by venipuncture, draw a sample of blood into the tube containing anticoagulant and mix well. Dip the hematocrit tube into the blood and allow the blood to rise to the desired two-thirds to three-quarters level. Because blood cells naturally sediment, a prior thorough mixing of the blood in the tube is necessary to ensure accurate reading.</span></p><p data-dcnode-id="2837"><span data-dcnode-id="2838" instrument_node="">After cleaning the outside of the hematocrit tubes of excess blood, invert the tube slowly so that the blood migrates just short of the bottom end of the tube. Seal the bottom of the tube with sealant. Make certain that little or no air is interspersed in the column of blood. If the seal is incomplete, leakage will occur during centrifugation and false readings will be obtained.</span></p><p data-dcnode-id="2835"><span data-dcnode-id="2836" instrument_node="">Place the tubes in a microhematocrit centrifuge and spin for 3 to 5 minutes at high speed. A shorter spin will not allow for complete sedimentation.</span></p><p data-dcnode-id="2833"><span data-dcnode-id="2834" instrument_node="">Using either a hematocrit reader or any ruled apparatus, measure the length of the column of the packed red cells and divide it by the length of the whole column of blood (cells and plasma). To obtain the hematocrit, multiply this number by 100%. Average all readings obtained from the different microhematocrit tubes.</span></p><p data-dcnode-id="2830"><strong data-dcnode-id="2831"><span data-dcnode-id="2832" instrument_node="">Figure 1. Hematocrit level measurement – Note: Microhematocrit tube after sedimentation. The hematocrit is a ratio of the packed cells to total volume.</span></strong></p><div class="entry-image" data-dcnode-id="2827"><a class="external single-popup" data-dcnode-id="2828" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//healthjade.com/wp-content/uploads/2018/06/how-to-measure-hematocrit-level.jpg" rel="nofollow"><img alt="Hematocrit level measurement" class="aligncenter wp-image-21282 size-full" data-dcnode-id="2829" height="815" sizes="(max-width: 1500px) 100vw, 1500px" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//healthjade.com/wp-content/uploads/2018/06/how-to-measure-hematocrit-level.jpg&amp;raw" srcset="https://healthjade.net/wp-content/uploads/2018/06/how-to-measure-hematocrit-level.jpg 1500w, https://healthjade.net/wp-content/uploads/2018/06/how-to-measure-hematocrit-level-300x163.jpg 300w, https://healthjade.net/wp-content/uploads/2018/06/how-to-measure-hematocrit-level-768x417.jpg 768w, https://healthjade.net/wp-content/uploads/2018/06/how-to-measure-hematocrit-level-1024x556.jpg 1024w" width="1500"></a></div><div class="entry-image" data-dcnode-id="2824"><a class="external single-popup" data-dcnode-id="2825" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//healthjade.com/wp-content/uploads/2018/06/hematocrit.jpg" rel="nofollow"><img alt="hematocrit" class="aligncenter wp-image-21294 size-full" data-dcnode-id="2826" height="939" sizes="(max-width: 1500px) 100vw, 1500px" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//healthjade.com/wp-content/uploads/2018/06/hematocrit.jpg&amp;raw" srcset="https://healthjade.net/wp-content/uploads/2018/06/hematocrit.jpg 1500w, https://healthjade.net/wp-content/uploads/2018/06/hematocrit-300x188.jpg 300w, https://healthjade.net/wp-content/uploads/2018/06/hematocrit-768x481.jpg 768w, https://healthjade.net/wp-content/uploads/2018/06/hematocrit-1024x641.jpg 1024w" width="1500"></a></div><p data-dcnode-id="2820"><strong data-dcnode-id="2822"><span data-dcnode-id="2823" instrument_node="">Example:</span></strong><span data-dcnode-id="2821" instrument_node=""> If the column of packed red cells measures 20 mm and the whole blood column measures 50 mm, the hematocrit is 20/50 = 0.4 or (0.4 × 100%) = 40%.</span></p><h2 data-dcnode-id="2817"><span data-dcnode-id="2818" id="Normal_hematocrit_levels"><span data-dcnode-id="2819" instrument_node="">Normal hematocrit levels</span></span></h2><p data-dcnode-id="2815"><span data-dcnode-id="2816" instrument_node="">Red blood cells (RBCs) typically make up roughly 37% to 49% of the volume of blood.</span></p><p data-dcnode-id="2813"><span data-dcnode-id="2814" instrument_node="">Since a hematocrit is often performed as part of a complete blood count (CBC), results from other components, such as red blood cell count (RBCC or RCC), hemoglobin (Hb), reticulocyte count, and/or red blood cell indices, are taken into consideration. Age, sex, and race are other factors to be considered. In general, the hematocrit mirrors the results of the red blood cell count (RBCC or RCC) and hemoglobin (Hb).</span></p><h2 data-dcnode-id="2810"><span data-dcnode-id="2811" id="Hemoglobin_and_Hematocrit"><span data-dcnode-id="2812" instrument_node="">Hemoglobin and Hematocrit</span></span></h2><p data-dcnode-id="2808"><span data-dcnode-id="2809" instrument_node="">Hemoglobin (Hb) is the protein contained in red blood cells that is responsible for delivery of oxygen to the tissues. To ensure adequate tissue oxygenation, a sufficient hemoglobin level must be maintained. The amount of hemoglobin in whole blood is expressed in grams per deciliter (g/dl). The normal Hb level for males is 14 to 18 g/dl; that for females is 12 to 16 g/dl. When the hemoglobin level is low, the patient has anemia. An erythrocytosis (polycythemia) is the consequence of too many red cells; this results in hemoglobin levels above normal.</span></p><p data-dcnode-id="2806"><span data-dcnode-id="2807" instrument_node="">Hemoglobin determinations will usually be performed by an automated cell counter from a tube of well-mixed EDTA-anticoagulated blood filled to a predetermined level. In this assay, all forms of hemoglobins are converted to the colored protein cyanomethemoglobin and measured by a colorimeter. An inadequate sample, whether due to insufficient volume or inadequate anticoagulation, may give false readings. If it is necessary to determine the level of anemia quickly, the hematocrit is an easier, more convenient test.</span></p><p data-dcnode-id="2789"><span data-dcnode-id="2805" instrument_node="">Hemoglobin (Hb) is composed of two pairs of dissimilar chains, α and β, each defined by a specific amino acid sequence and incorporating an iron-containing heme group. Two α–β dimers combine to form a hemoglobin tetramer. This allows for the “heme–heme” interaction necessary for effective oxygen uptake (deoxyhemoglobin → oxyhemoglobin) and delivery (oxyhemoglobin → deoxyhemoglobin). The oxygen affinity of hemoglobin is a function of this heme–heme interaction and of pH (Bohr effect), and is a measure of how many hemoglobin molecules have oxygen bound to them for a given level of oxygen tension. In a normal individual the major hemoglobin is Hb A, constituting approximately 97% of the total hemoglobin. Variations and/or amino acid substitutions in these chains exist. Some are deleterious to the normal function of hemoglobin, whereas others may have relatively normal oxygen affinity and stability. Hemoglobins containing different types of chains make up the remainder of the hemoglobin content in red cells (α</span><sub data-dcnode-id="2803"><span data-dcnode-id="2804" instrument_node="">2</span></sub><span data-dcnode-id="2802" instrument_node="">δ</span><sub data-dcnode-id="2800"><span data-dcnode-id="2801" instrument_node="">2</span></sub><span data-dcnode-id="2799" instrument_node=""> = Hb A</span><sub data-dcnode-id="2797"><span data-dcnode-id="2798" instrument_node="">2</span></sub><span data-dcnode-id="2796" instrument_node=""> approximately 2%; α</span><sub data-dcnode-id="2794"><span data-dcnode-id="2795" instrument_node="">2</span></sub><span data-dcnode-id="2793" instrument_node="">γ</span><sub data-dcnode-id="2791"><span data-dcnode-id="2792" instrument_node="">2</span></sub><span data-dcnode-id="2790" instrument_node=""> = Hb F approximately 1%).</span></p><p data-dcnode-id="2786"><strong data-dcnode-id="2787"><span data-dcnode-id="2788" instrument_node="">Figure 2. Red blood cell hemoglobin</span></strong></p><div class="entry-image" data-dcnode-id="2783"><a class="external single-popup" data-dcnode-id="2784" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//healthjade.com/wp-content/uploads/2017/09/Hemoglobin.jpg" rel="nofollow"><img alt="Hemoglobin" class="aligncenter wp-image-7445 size-full" data-dcnode-id="2785" height="1007" sizes="(max-width: 1500px) 100vw, 1500px" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//healthjade.com/wp-content/uploads/2017/09/Hemoglobin.jpg&amp;raw" srcset="https://healthjade.net/wp-content/uploads/2017/09/Hemoglobin.jpg 1500w, https://healthjade.net/wp-content/uploads/2017/09/Hemoglobin-300x201.jpg 300w, https://healthjade.net/wp-content/uploads/2017/09/Hemoglobin-768x516.jpg 768w, https://healthjade.net/wp-content/uploads/2017/09/Hemoglobin-1024x687.jpg 1024w" width="1500"></a></div><p data-dcnode-id="2781"><span data-dcnode-id="2782" instrument_node="">Substitutions in the normal hemoglobin amino acid sequence may result in hemoglobins that have different sub-unit interactions and varying affinities for oxygen. For example, a substitution of the sixth amino acid on the beta chain causes Hb S, or sickle hemoglobin. Hb S has a lower oxygen affinity and surrenders its oxygen more readily. Hb F, a normal minor hemoglobin constituent, has a higher oxygen affinity.</span></p><p data-dcnode-id="2779"><span data-dcnode-id="2780" instrument_node="">If the oxygen dissociation curve is abnormal, the body will adjust the hemoglobin level to ensure adequate oxygen distribution to the tissues. Thus in a rare disease like hemoglobin Hotel Dieu, the difficulty in extracting oxygen from a variant hemoglobin with increased oxygen affinity could result in a lack of oxygen for the tissues (tissue hypoxia) and a compensatory erythrocytosis. The smaller fraction of oxygen released from the hemoglobin is thereby offset by the increased number of hemoglobin molecules. Similarly, in sickle cell anemia, the decreased oxygen affinity allows these patients more tissue oxygen at any given hemoglobin level.</span></p><h1 data-dcnode-id="2776"><span data-dcnode-id="2777" id="What_are_red_blood_cells"><span data-dcnode-id="2778" instrument_node="">What are red blood cells</span></span></h1><p data-dcnode-id="2774"><span data-dcnode-id="2775" instrument_node="">Blood transports a variety of materials between interior body cells and those that exchange substances with the external environment. In this way, blood helps maintain stable internal environmental conditions. Blood is composed of formed elements suspended in a fluid extracellular matrix called blood plasma. The “formed elements” include red blood cells, white blood cells, and cell fragments called platelets (Figure 4). Most blood cells form in red marrow within the hollow parts of certain long bones.</span></p><p data-dcnode-id="2772"><span data-dcnode-id="2773" instrument_node="">Most blood samples are roughly 37% to 49% red blood cells by volume – adult females is 38–46% (average = 42%) and for adult males, it is 40–54% (average = 47). This percentage is called the hematocrit. The white blood cells and platelets account for less than 1% of blood volume. The remaining blood sample, about 55%, is the plasma, a clear, straw-colored liquid. Blood plasma is a complex mixture of water, gases, amino acids, proteins, carbohydrates, lipids, vitamins, hormones, electrolytes, and cellular wastes (see Figure 3).</span></p><p data-dcnode-id="2770"><span data-dcnode-id="2771" instrument_node="">Blood volume varies with body size, percent adipose tissue, and changes in fluid and electrolyte concentrations. An average-size adult has a blood volume of about 5 liters (5.3 quarts), 4–5 liters in a female and 5–6 liters in a male.</span></p><p data-dcnode-id="2768"><span data-dcnode-id="2769" instrument_node="">Red blood cell (also called erythrocyte) is biconcave disc without a nucleus. This biconcave shape is an adaptation for transporting the gases oxygen and carbon dioxide. It increases the surface area through which oxygen and carbon dioxide can diffuse into and out of the cell. The characteristic shape of a red blood cell also places the cell membrane closer to oxygen-carrying hemoglobin molecules in the cell reducing the distance for diffusion.</span></p><p data-dcnode-id="2766"><span data-dcnode-id="2767" instrument_node="">Each red blood cell is about one-third hemoglobin by volume. This protein imparts the color of blood. When hemoglobin binds oxygen, the resulting oxyhemoglobin is bright red, and when oxygen is released, the resulting deoxyhemoglobin is darker.</span></p><p data-dcnode-id="2764"><span data-dcnode-id="2765" instrument_node="">Prolonged oxygen deficiency (hypoxia) causes cyanosis, in which the skin and mucous membranes appear bluish due to an abnormally high blood concentration of deoxyhemoglobin in the superficial blood vessels. Exposure to low temperature may also result in cyanosis by constricting superficial blood vessels. This response to environmental change slows skin blood flow. As a result, more oxygen than usual is removed from the blood flowing through the vessels, increasing the concentration of deoxyhemoglobin.</span></p><p data-dcnode-id="2760"><strong data-dcnode-id="2762"><span data-dcnode-id="2763" instrument_node="">Note:</span></strong><span data-dcnode-id="2761" instrument_node=""> Blood is a complex mixture of formed elements in a liquid extracellular matrix, called blood plasma. Note that water and proteins account for 99% of the blood plasma.</span></p><p data-dcnode-id="2757"><strong data-dcnode-id="2758"><span data-dcnode-id="2759" instrument_node="">Figure 3. Blood composition</span></strong></p><div class="entry-image" data-dcnode-id="2754"><a class="external single-popup" data-dcnode-id="2755" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//healthjade.com/wp-content/uploads/2017/09/blood-composition.jpg" rel="nofollow"><img alt="blood composition" class="aligncenter wp-image-7439 size-full" data-dcnode-id="2756" height="752" sizes="(max-width: 1500px) 100vw, 1500px" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//healthjade.com/wp-content/uploads/2017/09/blood-composition.jpg&amp;raw" srcset="https://healthjade.net/wp-content/uploads/2017/09/blood-composition.jpg 1500w, https://healthjade.net/wp-content/uploads/2017/09/blood-composition-300x150.jpg 300w, https://healthjade.net/wp-content/uploads/2017/09/blood-composition-768x385.jpg 768w, https://healthjade.net/wp-content/uploads/2017/09/blood-composition-1024x513.jpg 1024w" width="1500"></a></div><div class="entry-image" data-dcnode-id="2749"><a class="external single-popup" data-dcnode-id="2752" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//healthjade.com/wp-content/uploads/2017/09/blood-composition-1.jpg" rel="nofollow"><img alt="blood composition" class="aligncenter wp-image-7441 size-full" data-dcnode-id="2753" height="1223" sizes="(max-width: 1500px) 100vw, 1500px" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//healthjade.com/wp-content/uploads/2017/09/blood-composition-1.jpg&amp;raw" srcset="https://healthjade.net/wp-content/uploads/2017/09/blood-composition-1.jpg 1500w, https://healthjade.net/wp-content/uploads/2017/09/blood-composition-1-300x245.jpg 300w, https://healthjade.net/wp-content/uploads/2017/09/blood-composition-1-768x626.jpg 768w, https://healthjade.net/wp-content/uploads/2017/09/blood-composition-1-1024x835.jpg 1024w" width="1500"></a><a class="external single-popup" data-dcnode-id="2750" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//healthjade.com/wp-content/uploads/2018/06/blood-composition.jpg" rel="nofollow"><img alt="blood composition" class="aligncenter wp-image-21286 size-full" data-dcnode-id="2751" height="895" sizes="(max-width: 1500px) 100vw, 1500px" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//healthjade.com/wp-content/uploads/2018/06/blood-composition.jpg&amp;raw" srcset="https://healthjade.net/wp-content/uploads/2018/06/blood-composition.jpg 1500w, https://healthjade.net/wp-content/uploads/2018/06/blood-composition-300x179.jpg 300w, https://healthjade.net/wp-content/uploads/2018/06/blood-composition-768x458.jpg 768w, https://healthjade.net/wp-content/uploads/2018/06/blood-composition-1024x611.jpg 1024w, https://healthjade.net/wp-content/uploads/2018/06/blood-composition-840x500.jpg 840w" width="1500"></a></div><p data-dcnode-id="2745"><strong data-dcnode-id="2747"><span data-dcnode-id="2748" instrument_node="">Note:</span></strong><span data-dcnode-id="2746" instrument_node=""> Blood consists of a liquid portion called plasma and a solid portion (the formed elements) that includes red blood cells, white blood cells, and platelets. When blood components are separated by centrifugation, the white blood cells and platelets form a thin layer, called the “buffy coat,” between the plasma and the red blood cells, which accounts for about 1% of the total blood volume. Blood cells and platelets can be seen under a light microscope when a blood sample is smeared onto a glass slide.</span></p><p data-dcnode-id="2742"><strong data-dcnode-id="2743"><span data-dcnode-id="2744" instrument_node="">Figure 4. Blood cells</span></strong></p><div class="entry-image" data-dcnode-id="2739"><a class="external single-popup" data-dcnode-id="2740" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//healthjade.com/wp-content/uploads/2017/09/blood-cells.jpg" rel="nofollow"><img alt="blood cells" class="aligncenter wp-image-7433 size-full" data-dcnode-id="2741" height="605" sizes="(max-width: 1525px) 100vw, 1525px" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//healthjade.com/wp-content/uploads/2017/09/blood-cells.jpg&amp;raw" srcset="https://healthjade.net/wp-content/uploads/2017/09/blood-cells.jpg 1525w, https://healthjade.net/wp-content/uploads/2017/09/blood-cells-300x119.jpg 300w, https://healthjade.net/wp-content/uploads/2017/09/blood-cells-768x305.jpg 768w, https://healthjade.net/wp-content/uploads/2017/09/blood-cells-1024x406.jpg 1024w" width="1525"></a></div><p data-dcnode-id="2735"><strong data-dcnode-id="2737"><span data-dcnode-id="2738" instrument_node="">Note:</span></strong><span data-dcnode-id="2736" instrument_node=""> Blood tissue consists of red blood cells, white blood cells, and platelets suspended in plasma. (a) Idealized representation of a sample of blood. (b) Micrograph of a sample of blood (1,000x).</span></p><h2 data-dcnode-id="2732"><span data-dcnode-id="2733" id="Red_blood_cell_production"><span data-dcnode-id="2734" instrument_node="">Red blood cell production</span></span></h2><p data-dcnode-id="2730"><span data-dcnode-id="2731" instrument_node="">Red blood cells are produced in the bone marrow and are released into the bloodstream when they are, or nearly are, mature. They typically make up roughly 37% to 49% of the volume of blood. Red blood cells contain hemoglobin, a protein that binds to oxygen. The primary function of red blood cells is to carry oxygen from the lungs to the tissues and organs of the body. They also transport a small portion of carbon dioxide, a byproduct of cell metabolism, from tissues and organs back to the lungs, where it is expelled.</span></p><p data-dcnode-id="2728"><span data-dcnode-id="2729" instrument_node="">The typical lifespan of an red blood cell (RBC) is 120 days and the bone marrow must continually produce new red blood cells to replace those that age and degrade or are lost through bleeding. A number of conditions can affect either the production of new red blood cells by the bone marrow or the lifespan of those in circulation or that result in significant bleeding.</span></p><p data-dcnode-id="2725"><strong data-dcnode-id="2726"><span data-dcnode-id="2727" instrument_node="">Anatomy of the bone</span></strong></p><p data-dcnode-id="2723"><span data-dcnode-id="2724" instrument_node="">The bone is made up of compact bone, spongy bone, and bone marrow. Compact bone makes up the outer layer of the bone. Spongy bone is found mostly at the ends of bones and contains red marrow. Bone marrow is found in the center of most bones and has many blood vessels. There are two types of bone marrow: red and yellow. Red marrow contains blood stem cells that can become red blood cells, white blood cells, or platelets. Yellow marrow is made mostly of fat.</span></p><p data-dcnode-id="2721"><span data-dcnode-id="2722" instrument_node="">Bone marrow is a soft, netlike mass of connective tissue within the medullary cavities of long bones, in the irregular spaces of spongy bone, and in the larger central canals of compact bone tissue. It is of two kinds: red and yellow. Red bone marrow functions in the formation of red blood cells (erythrocytes), white blood cells (leukocytes), and blood platelets. The color comes from the oxygen-carrying pigment hemoglobin in the red blood cells.</span></p><p data-dcnode-id="2719"><span data-dcnode-id="2720" instrument_node="">In an infant, red marrow occupies the cavities of most bones. As a person ages, yellow bone marrow, which stores fat, replaces much of the red marrow. Yellow marrow is not active in blood cell production. In an adult, red marrow is primarily found in the spongy bone of the skull, ribs, breastbone (sternum), collarbones (clavicles), backbones (vertebrae), and hip bones. If the supply of blood cells is deficient, some yellow marrow may become red marrow, which then reverts to yellow marrow when the deficiency is corrected.</span></p><p data-dcnode-id="2716"><strong data-dcnode-id="2717"><span data-dcnode-id="2718" instrument_node="">Figure 5. Bone marrow anatomy</span></strong></p><div class="entry-image" data-dcnode-id="2713"><a class="external single-popup" data-dcnode-id="2714" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//healthjade.com/wp-content/uploads/2017/12/bone-marrow-anatomy.jpg" rel="nofollow"><img alt="bone marrow anatomy" class="aligncenter size-full wp-image-12928" data-dcnode-id="2715" height="1463" sizes="(max-width: 1500px) 100vw, 1500px" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//healthjade.com/wp-content/uploads/2017/12/bone-marrow-anatomy.jpg&amp;raw" srcset="https://healthjade.net/wp-content/uploads/2017/12/bone-marrow-anatomy.jpg 1500w, https://healthjade.net/wp-content/uploads/2017/12/bone-marrow-anatomy-300x293.jpg 300w, https://healthjade.net/wp-content/uploads/2017/12/bone-marrow-anatomy-768x749.jpg 768w, https://healthjade.net/wp-content/uploads/2017/12/bone-marrow-anatomy-1024x999.jpg 1024w" width="1500"></a></div><p data-dcnode-id="2708"><span data-dcnode-id="2712" instrument_node="">Figure 6 illustrates the stages in the formation of red blood cells from </span><strong data-dcnode-id="2710"><span data-dcnode-id="2711" instrument_node="">hematopoietic stem cells</span></strong><span data-dcnode-id="2709" instrument_node=""> (blood-forming cells), which are also called hemocytoblasts.</span></p><p data-dcnode-id="2706"><span data-dcnode-id="2707" instrument_node="">Red blood cells have nuclei during their early stages of development but lose their nuclei as the cells mature. Losing the nuclei provides more space for hemoglobin. Because mature red blood cells do not have nuclei, they cannot divide. They use none of the oxygen they carry because they do not have mitochondria. Mature red blood cells produce ATP through glycolysis only.</span></p><p data-dcnode-id="2704"><span data-dcnode-id="2705" instrument_node="">The average life span of a red blood cell is 120 days. Many of these cells are removed from the circulation each day, and yet the number of cells in the circulating blood remains relatively stable. This observation suggests a homeostatic control of the rate of red blood cell production.</span></p><p data-dcnode-id="2699"><span data-dcnode-id="2703" instrument_node="">The hormone </span><strong data-dcnode-id="2701"><span data-dcnode-id="2702" instrument_node="">erythropoietin</span></strong><span data-dcnode-id="2700" instrument_node=""> controls the rate of red blood cell formation through negative feedback. The kidneys, and to a lesser extent the liver, release erythropoietin in response to prolonged oxygen deficiency (Figure 7). At high altitudes, for example, where the amount of oxygen in the air is reduced, the blood oxygen level initially decreases. This drop in the blood oxygen level triggers the release of erythropoietin, which travels via the blood to the red bone marrow and stimulates red blood cell production.</span></p><p data-dcnode-id="2694"><span data-dcnode-id="2698" instrument_node="">After a few days of exposure to high altitudes, many newly formed red blood cells appear in the circulating blood. The increased rate of production continues until the number of erythrocytes in the circulation is sufficient to supply tissues with oxygen. When the availability of oxygen returns to normal, erythropoietin release decreases, and the rate of red blood cell production returns to normal as well. An excessive increase in red blood cells is called </span><strong data-dcnode-id="2696"><span data-dcnode-id="2697" instrument_node="">polycythemia</span></strong><span data-dcnode-id="2695" instrument_node="">. This condition increases blood viscosity, slowing blood flow and impairing circulation.</span></p><p data-dcnode-id="2691"><strong data-dcnode-id="2692"><span data-dcnode-id="2693" instrument_node="">Figure 6. Blood cell development. A blood stem cell goes through several steps to become a red blood cell, platelet, or white blood cell</span></strong></p><div class="entry-image" data-dcnode-id="2688"><a class="external single-popup" data-dcnode-id="2689" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//healthjade.com/wp-content/uploads/2017/09/blood-cell-development.jpg" rel="nofollow"><img alt="blood cell development" class="aligncenter wp-image-7291 size-full" data-dcnode-id="2690" height="1119" sizes="(max-width: 1500px) 100vw, 1500px" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//healthjade.com/wp-content/uploads/2017/09/blood-cell-development.jpg&amp;raw" srcset="https://healthjade.net/wp-content/uploads/2017/09/blood-cell-development.jpg 1500w, https://healthjade.net/wp-content/uploads/2017/09/blood-cell-development-300x224.jpg 300w, https://healthjade.net/wp-content/uploads/2017/09/blood-cell-development-768x573.jpg 768w, https://healthjade.net/wp-content/uploads/2017/09/blood-cell-development-1024x764.jpg 1024w" width="1500"></a></div><p data-dcnode-id="2685"><strong data-dcnode-id="2686"><span data-dcnode-id="2687" instrument_node="">Figure 7. Red blood cell formation</span></strong></p><div class="entry-image" data-dcnode-id="2682"><a class="external single-popup" data-dcnode-id="2683" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//healthjade.com/wp-content/uploads/2017/09/red-blood-cell-formation.jpg" rel="nofollow"><img alt="red blood cell formation" class="aligncenter wp-image-7447 size-full" data-dcnode-id="2684" height="1619" sizes="(max-width: 1500px) 100vw, 1500px" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//healthjade.com/wp-content/uploads/2017/09/red-blood-cell-formation.jpg&amp;raw" srcset="https://healthjade.net/wp-content/uploads/2017/09/red-blood-cell-formation.jpg 1500w, https://healthjade.net/wp-content/uploads/2017/09/red-blood-cell-formation-278x300.jpg 278w, https://healthjade.net/wp-content/uploads/2017/09/red-blood-cell-formation-768x829.jpg 768w, https://healthjade.net/wp-content/uploads/2017/09/red-blood-cell-formation-949x1024.jpg 949w" width="1500"></a></div><p data-dcnode-id="2678"><strong data-dcnode-id="2680"><span data-dcnode-id="2681" instrument_node="">Note:</span></strong><span data-dcnode-id="2679" instrument_node=""> Low blood oxygen causes the kidneys and to a lesser degree, the liver to release erythropoietin. Erythropoietin stimulates target cells in the red bone marrow to increase the production of red blood cells, which carry oxygen to tissues.</span></p><h4 data-dcnode-id="2675"><span data-dcnode-id="2676" id="Dietary_Factors_Affecting_Red_Blood_Cell_Production"><span data-dcnode-id="2677" instrument_node="">Dietary Factors Affecting Red Blood Cell Production</span></span></h4><p data-dcnode-id="2667"><span data-dcnode-id="2674" instrument_node="">Availability of B-complex vitamins—</span><strong data-dcnode-id="2672"><span data-dcnode-id="2673" instrument_node="">vitamin B12</span></strong><span data-dcnode-id="2671" instrument_node=""> and </span><strong data-dcnode-id="2669"><span data-dcnode-id="2670" instrument_node="">folic acid</span></strong><span data-dcnode-id="2668" instrument_node="">—significantly influences red blood cell production. Because these vitamins are required for DNA synthesis, they are necessary for the growth and division of cells. Cell division is frequent in blood-forming (hematopoietic) tissue, so this tissue is especially vulnerable to a deficiency of either of these vitamins.</span></p><p data-dcnode-id="2662"><span data-dcnode-id="2666" instrument_node="">Hemoglobin synthesis and normal red blood cell production also require </span><strong data-dcnode-id="2664"><span data-dcnode-id="2665" instrument_node="">iron</span></strong><span data-dcnode-id="2663" instrument_node="">. The small intestine absorbs iron slowly from food. The body reuses much of the iron released by the decomposition of hemoglobin from damaged red blood cells. Nonetheless, insufficient dietary iron can reduce hemoglobin synthesis.</span></p><p data-dcnode-id="2657"><span data-dcnode-id="2661" instrument_node="">A deficiency of red blood cells or a reduction in the amount of hemoglobin they contain results in a condition called </span><strong data-dcnode-id="2659"><span data-dcnode-id="2660" instrument_node="">anemia</span></strong><span data-dcnode-id="2658" instrument_node="">. This reduces the oxygen-carrying capacity of the blood, and the affected person may appear pale and lack energy. A pregnant woman may have a normal number of red blood cells, but she develops a relative anemia because her plasma volume increases due to fluid retention. This shows up as a decreased hematocrit.</span></p><p data-dcnode-id="2655"><span data-dcnode-id="2656" instrument_node="">In contrast to anemia, the inherited disorder called hemochromatosis results in the absorption of iron in the small intestine at ten times the normal rate. Iron builds up in organs, to toxic levels. Treatment is periodic blood removal, as often as every week.</span></p><h2 data-dcnode-id="2652"><span data-dcnode-id="2653" id="What_does_the_test_result_mean"><span data-dcnode-id="2654" instrument_node="">What does the test result mean?</span></span></h2><p data-dcnode-id="2650"><span data-dcnode-id="2651" instrument_node="">Red blood cells (RBCs) typically make up roughly 37% to 49% of the volume of blood.</span></p><p data-dcnode-id="2648"><span data-dcnode-id="2649" instrument_node="">A recent blood transfusion will affect hematocrit results.</span></p><p data-dcnode-id="2646"><span data-dcnode-id="2647" instrument_node="">Pregnancy usually causes slightly decreased hematocrit values due to extra fluid in the blood.</span></p><p data-dcnode-id="2644"><span data-dcnode-id="2645" instrument_node="">Since a hematocrit is often performed as part of a complete blood count (CBC), results from other components, such as red blood cell count (RBCC or RCC), hemoglobin, reticulocyte count, and/or red blood cell indices, are taken into consideration. Age, sex, and race are other factors to be considered. In general, the hematocrit mirrors the results of the red blood cell count (RBCC or RCC) and hemoglobin.</span></p><h3 data-dcnode-id="2641"><span data-dcnode-id="2642" id="Low_hematocrit_causes"><span data-dcnode-id="2643" instrument_node="">Low hematocrit causes</span></span></h3><p data-dcnode-id="2639"><span data-dcnode-id="2640" instrument_node="">A low hematocrit with low red blood cell count (RBCC or RCC) and low hemoglobin indicates anemia. Some causes include:</span></p><ul data-dcnode-id="2622"><li data-dcnode-id="2637"><span data-dcnode-id="2638" instrument_node="">Excessive loss of blood from, for example, severe trauma, or chronic bleeding from sites such as the digestive tract (e.g., ulcers, polyps, colon cancer), the bladder or uterus (in women, heavy menstrual bleeding, for example)</span></li><li data-dcnode-id="2635"><span data-dcnode-id="2636" instrument_node="">Nutritional deficiencies such as iron, folate or B12 deficiency</span></li><li data-dcnode-id="2633"><span data-dcnode-id="2634" instrument_node="">Damage to the bone marrow from, for example, a toxin, radiation or chemotherapy, infection or drugs</span></li><li data-dcnode-id="2631"><span data-dcnode-id="2632" instrument_node="">Bone marrow disorders such as aplastic anemia, myelodysplastic syndrome, or cancers such as leukemia, lymphoma, multiple myeloma, or other cancers that spread to the marrow</span></li><li data-dcnode-id="2629"><span data-dcnode-id="2630" instrument_node="">Kidney failure—severe and chronic kidney diseases lead to decreased production of erythropoietin, a hormone produced by the kidneys that stimulates RBC production by the bone marrow.</span></li><li data-dcnode-id="2627"><span data-dcnode-id="2628" instrument_node="">Chronic inflammatory diseases or conditions</span></li><li data-dcnode-id="2625"><span data-dcnode-id="2626" instrument_node="">Decreased production of hemoglobin (e.g., thalassemia)</span></li><li data-dcnode-id="2623"><span data-dcnode-id="2624" instrument_node="">Excessive destruction of red blood cells, for example, hemolytic anemia caused by autoimmunity or defects in the red blood cell itself; the defects could be hemoglobinopathy (e.g., sickle cell anemia), abnormalities in the RBC membrane (e.g., hereditary spherocytosis) or RBC enzyme (e.g., G6PD deficiency)</span></li></ul><h3 data-dcnode-id="2619"><span data-dcnode-id="2620" id="High_hematocrit_causes"><span data-dcnode-id="2621" instrument_node="">High hematocrit causes</span></span></h3><p data-dcnode-id="2617"><span data-dcnode-id="2618" instrument_node="">A high hematocrit with a high red blood cell count (RBCC or RCC) and high hemoglobin indicates polycythemia. Some causes of a high hematocrit include:</span></p><ul data-dcnode-id="2600"><li data-dcnode-id="2615"><span data-dcnode-id="2616" instrument_node="">Dehydration—this is the most common cause of a high hematocrit. As the volume of fluid in the blood drops, the RBCs per volume of fluid artificially rises; with adequate fluid intake, the hematocrit returns to normal.</span></li><li data-dcnode-id="2613"><span data-dcnode-id="2614" instrument_node="">Lung (pulmonary) disease—if someone is unable to breathe in and absorb sufficient oxygen, the body tries to compensate by producing more red blood cells.</span></li><li data-dcnode-id="2611"><span data-dcnode-id="2612" instrument_node="">Congenital heart disease—in some forms, there is an abnormal connection between the two sides of the heart, leading to reduced oxygen levels in the blood. The body tries to compensate by producing more red blood cells.</span></li><li data-dcnode-id="2609"><span data-dcnode-id="2610" instrument_node="">Kidney tumor that produces excess erythropoietin</span></li><li data-dcnode-id="2607"><span data-dcnode-id="2608" instrument_node="">Smoking</span></li><li data-dcnode-id="2605"><span data-dcnode-id="2606" instrument_node="">Living at high altitudes (a compensation for decreased oxygen in the air)</span></li><li data-dcnode-id="2603"><span data-dcnode-id="2604" instrument_node="">Genetic causes (altered oxygen sensing, abnormality in hemoglobin oxygen release)</span></li><li data-dcnode-id="2601"><span data-dcnode-id="2602" instrument_node="">Polycythemia vera (polycythemia rubra vera or Vaquez disease)—a rare disease in which the body produces excess RBCs inappropriately</span></li></ul><h2 data-dcnode-id="2597"><span data-dcnode-id="2598" id="What_happens_when_you_have_low_red_blood_cells_Anemia"><span data-dcnode-id="2599" instrument_node="">What happens when you have low red blood cells (Anemia)</span></span></h2><p data-dcnode-id="2591"><span data-dcnode-id="2596" instrument_node="">Anemia is a condition in which your blood has a lower than normal number of red blood cells </span><sup class="footnote_plugin_tooltip_text" data-dcnode-id="2594" id="footnote_plugin_tooltip_1" onclick="footnote_moveToAnchor('footnote_plugin_reference_1');"><span data-dcnode-id="2595" instrument_node="">1)</span></sup><span class="footnote_tooltip" data-dcnode-id="2593" id="footnote_plugin_tooltip_text_1"></span><span data-dcnode-id="2592" instrument_node="">.</span></p><p data-dcnode-id="2589"><span data-dcnode-id="2590" instrument_node="">Anemia also can occur if your red blood cells don’t contain enough hemoglobin. Hemoglobin is an iron-rich protein that gives blood its red color. This protein helps red blood cells carry oxygen from the lungs to the rest of the body.</span></p><p data-dcnode-id="2582"><strong data-dcnode-id="2583"><span data-dcnode-id="2588" instrument_node="">Anemia has three main causes </span><sup class="footnote_plugin_tooltip_text" data-dcnode-id="2586" id="footnote_plugin_tooltip_2" onclick="footnote_moveToAnchor('footnote_plugin_reference_2');"><span data-dcnode-id="2587" instrument_node="">2)</span></sup><span class="footnote_tooltip" data-dcnode-id="2585" id="footnote_plugin_tooltip_text_2"></span><span data-dcnode-id="2584" instrument_node="">:</span></strong></p><ol data-dcnode-id="2575"><li data-dcnode-id="2580"><span data-dcnode-id="2581" instrument_node="">Blood loss,</span></li><li data-dcnode-id="2578"><span data-dcnode-id="2579" instrument_node="">Lack of red blood cell production, or</span></li><li data-dcnode-id="2576"><span data-dcnode-id="2577" instrument_node="">High rates of red blood cell destruction.</span></li></ol><p data-dcnode-id="2573"><span data-dcnode-id="2574" instrument_node="">These causes might be the result of diseases, conditions, or other factors.</span></p><p data-dcnode-id="2571"><span data-dcnode-id="2572" instrument_node="">If you have anemia, your body doesn’t get enough oxygen-rich blood. As a result, you may&nbsp;appear pale, feel tired or weak. You also may have other symptoms, such as shortness of breath, dizziness, or headaches.</span></p><p data-dcnode-id="2565"><span data-dcnode-id="2570" instrument_node="">Severe or long-lasting anemia can damage your heart, brain, and other organs in your body. Very severe anemia may even cause death </span><sup class="footnote_plugin_tooltip_text" data-dcnode-id="2568" id="footnote_plugin_tooltip_3" onclick="footnote_moveToAnchor('footnote_plugin_reference_3');"><span data-dcnode-id="2569" instrument_node="">3)</span></sup><span class="footnote_tooltip" data-dcnode-id="2567" id="footnote_plugin_tooltip_text_3"></span><span data-dcnode-id="2566" instrument_node="">.</span></p><p data-dcnode-id="2563"><span data-dcnode-id="2564" instrument_node="">Many types of anemia can be mild, short term, and easily treated. You can even prevent some types with a healthy diet. Other types can be treated with dietary supplements.</span></p><p data-dcnode-id="2561"><span data-dcnode-id="2562" instrument_node="">However, certain types of anemia can be severe, long lasting, and even life threatening if not diagnosed and treated.</span></p><p data-dcnode-id="2559"><span data-dcnode-id="2560" instrument_node="">If you have signs or symptoms of anemia, see your doctor to find out whether you have the condition. Treatment will depend on the cause of the anemia and how severe it is.</span></p><h4 data-dcnode-id="2556"><span data-dcnode-id="2557" id="There_are_many_types_of_anemia_with_specific_causes_and_traits"><span data-dcnode-id="2558" instrument_node="">There are many types of anemia with specific causes and traits.</span></span></h4><p data-dcnode-id="2553"><strong data-dcnode-id="2554"><span data-dcnode-id="2555" instrument_node="">Some of these include:</span></strong></p><ul data-dcnode-id="2530"><li data-dcnode-id="2551"><span data-dcnode-id="2552" instrument_node="">Aplastic anemia</span></li><li data-dcnode-id="2549"><span data-dcnode-id="2550" instrument_node="">Blood loss anemia</span></li><li data-dcnode-id="2547"><span data-dcnode-id="2548" instrument_node="">Cooley’s anemia</span></li><li data-dcnode-id="2545"><span data-dcnode-id="2546" instrument_node="">Diamond-Blackfan anemia</span></li><li data-dcnode-id="2543"><span data-dcnode-id="2544" instrument_node="">Fanconi anemia</span></li><li data-dcnode-id="2541"><span data-dcnode-id="2542" instrument_node="">Folate- or folic acid-deficiency anemia</span></li><li data-dcnode-id="2539"><span data-dcnode-id="2540" instrument_node="">Hemolytic anemia</span></li><li data-dcnode-id="2537"><span data-dcnode-id="2538" instrument_node="">Iron-deficiency anemia</span></li><li data-dcnode-id="2535"><span data-dcnode-id="2536" instrument_node="">Pernicious anemia</span></li><li data-dcnode-id="2533"><span data-dcnode-id="2534" instrument_node="">Sickle cell anemia</span></li><li data-dcnode-id="2531"><span data-dcnode-id="2532" instrument_node="">Thalassemias; Cooley’s anemia is another name for beta thalassemia major</span></li></ul><h3 data-dcnode-id="2527"><span data-dcnode-id="2528" id="What_Causes_Anemia"><span data-dcnode-id="2529" instrument_node="">What Causes Anemia ?</span></span></h3><p data-dcnode-id="2525"><span data-dcnode-id="2526" instrument_node="">The three main causes of anemia are:</span></p><ol data-dcnode-id="2518"><li data-dcnode-id="2523"><span data-dcnode-id="2524" instrument_node="">Blood loss.</span></li><li data-dcnode-id="2521"><span data-dcnode-id="2522" instrument_node="">Lack of red blood cell production.</span></li><li data-dcnode-id="2519"><span data-dcnode-id="2520" instrument_node="">High rates of red blood cell destruction.</span></li></ol><p data-dcnode-id="2516"><span data-dcnode-id="2517" instrument_node="">For some people, the condition is caused by more than one of these factors.</span></p><h4 data-dcnode-id="2513"><span data-dcnode-id="2514" id="Blood_Loss"><span data-dcnode-id="2515" instrument_node="">Blood Loss</span></span></h4><p data-dcnode-id="2511"><span data-dcnode-id="2512" instrument_node="">Blood loss is the most common cause of anemia, especially iron-deficiency anemia. Blood loss can be short term or persist over time.</span></p><p data-dcnode-id="2509"><span data-dcnode-id="2510" instrument_node="">Heavy menstrual periods or bleeding in the digestive or urinary tract can cause blood loss. Surgery, trauma, or cancer also can cause blood loss.</span></p><p data-dcnode-id="2507"><span data-dcnode-id="2508" instrument_node="">If a lot of blood is lost, the body may lose enough red blood cells to cause anemia.</span></p><h4 data-dcnode-id="2504"><span data-dcnode-id="2505" id="Lack_of_Red_Blood_Cell_Production"><span data-dcnode-id="2506" instrument_node="">Lack of Red Blood Cell Production</span></span></h4><p data-dcnode-id="2502"><span data-dcnode-id="2503" instrument_node="">Both acquired and inherited conditions and factors can prevent your body from making enough red blood cells. “Acquired” means you aren’t born with the condition, but you develop it. “Inherited” means your parents passed the gene for the condition on to you.</span></p><p data-dcnode-id="2500"><span data-dcnode-id="2501" instrument_node="">Acquired conditions and factors that can lead to anemia include poor diet, abnormal hormone levels, some chronic (ongoing) diseases, and pregnancy.</span></p><p data-dcnode-id="2498"><span data-dcnode-id="2499" instrument_node="">Aplastic anemia also can prevent your body from making enough red blood cells. This condition can be acquired or inherited.</span></p><h4 data-dcnode-id="2495"><span data-dcnode-id="2496" id="Diet"><span data-dcnode-id="2497" instrument_node="">Diet</span></span></h4><p data-dcnode-id="2493"><span data-dcnode-id="2494" instrument_node="">A diet that lacks iron, folic acid (folate), or vitamin B12 can prevent your body from making enough red blood cells. Your body also needs small amounts of vitamin C, riboflavin, and copper to make red blood cells.</span></p><p data-dcnode-id="2491"><span data-dcnode-id="2492" instrument_node="">Conditions that make it hard for your body to absorb nutrients also can prevent your body from making enough red blood cells.</span></p><h4 data-dcnode-id="2488"><span data-dcnode-id="2489" id="Hormones"><span data-dcnode-id="2490" instrument_node="">Hormones</span></span></h4><p data-dcnode-id="2486"><span data-dcnode-id="2487" instrument_node="">Your body needs the hormone erythropoietin to make red blood cells. This hormone stimulates the bone marrow to make these cells. A low level of this hormone can lead to anemia.</span></p><h4 data-dcnode-id="2483"><span data-dcnode-id="2484" id="Diseases_and_Disease_Treatments"><span data-dcnode-id="2485" instrument_node="">Diseases and Disease Treatments</span></span></h4><p data-dcnode-id="2481"><span data-dcnode-id="2482" instrument_node="">Chronic diseases, like kidney disease and cancer, can make it hard for your body to make enough red blood cells.</span></p><p data-dcnode-id="2479"><span data-dcnode-id="2480" instrument_node="">Some cancer treatments may damage the bone marrow or damage the red blood cells’ ability to carry oxygen. If the bone marrow is damaged, it can’t make red blood cells fast enough to replace the ones that die or are destroyed.</span></p><p data-dcnode-id="2477"><span data-dcnode-id="2478" instrument_node="">People who have HIV/AIDS may develop anemia due to infections or medicines used to treat their diseases.</span></p><h4 data-dcnode-id="2474"><span data-dcnode-id="2475" id="Pregnancy"><span data-dcnode-id="2476" instrument_node="">Pregnancy</span></span></h4><p data-dcnode-id="2472"><span data-dcnode-id="2473" instrument_node="">Anemia can occur during pregnancy due to low levels of iron and folic acid and changes in the blood.</span></p><p data-dcnode-id="2470"><span data-dcnode-id="2471" instrument_node="">During the first 6 months of pregnancy, the fluid portion of a woman’s blood (the plasma) increases faster than the number of red blood cells. This dilutes the blood and can lead to anemia.</span></p><h4 data-dcnode-id="2467"><span data-dcnode-id="2468" id="Aplastic_Anemia"><span data-dcnode-id="2469" instrument_node="">Aplastic Anemia</span></span></h4><p data-dcnode-id="2465"><span data-dcnode-id="2466" instrument_node="">Some infants are born without the ability to make enough red blood cells. This condition is called aplastic anemia. Infants and children who have aplastic anemia often need blood transfusions to increase the number of red blood cells in their blood.</span></p><p data-dcnode-id="2463"><span data-dcnode-id="2464" instrument_node="">Acquired conditions or factors, such as certain medicines, toxins, and infectious diseases, also can cause aplastic anemia.</span></p><h4 data-dcnode-id="2460"><span data-dcnode-id="2461" id="High_Rates_of_Red_Blood_Cell_Destruction"><span data-dcnode-id="2462" instrument_node="">High Rates of Red Blood Cell Destruction</span></span></h4><p data-dcnode-id="2458"><span data-dcnode-id="2459" instrument_node="">Both acquired and inherited conditions and factors can cause your body to destroy too many red blood cells. One example of an acquired condition is an enlarged or diseased spleen.</span></p><p data-dcnode-id="2456"><span data-dcnode-id="2457" instrument_node="">The spleen is an organ that removes wornout red blood cells from the body. If the spleen is enlarged or diseased, it may remove more red blood cells than normal, causing anemia.</span></p><p data-dcnode-id="2454"><span data-dcnode-id="2455" instrument_node="">Examples of inherited conditions that can cause your body to destroy too many red blood cells include sickle cell anemia, thalassemias, and lack of certain enzymes. These conditions create defects in the red blood cells that cause them to die faster than healthy red blood cells.</span></p><p data-dcnode-id="2452"><span data-dcnode-id="2453" instrument_node="">Hemolytic anemia is another example of a condition in which your body destroys too many red blood cells. Inherited or acquired conditions or factors can cause hemolytic anemia. Examples include immune disorders, infections, certain medicines, or reactions to blood transfusions.</span></p><h3 data-dcnode-id="2449"><span data-dcnode-id="2450" id="Who_Is_at_Risk_for_Anemia"><span data-dcnode-id="2451" instrument_node="">Who Is at Risk for Anemia ?</span></span></h3><p data-dcnode-id="2447"><span data-dcnode-id="2448" instrument_node="">Anemia is a common condition. It occurs in all age, racial, and ethnic groups. Both men and women can have anemia. However, women of childbearing age are at higher risk for the condition because of blood loss from menstruation.</span></p><p data-dcnode-id="2445"><span data-dcnode-id="2446" instrument_node="">Anemia can develop during pregnancy due to low levels of iron and folic acid (folate) and changes in the blood. During the first 6 months of pregnancy, the fluid portion of a woman’s blood (the plasma) increases faster than the number of red blood cells. This dilutes the blood and can lead to anemia.</span></p><p data-dcnode-id="2443"><span data-dcnode-id="2444" instrument_node="">During the first year of life, some babies are at risk for anemia because of iron deficiency. At-risk infants include those who are born too early and infants who are fed breast milk only or formula that isn’t fortified with iron. These infants can develop iron deficiency by 6 months of age.</span></p><p data-dcnode-id="2441"><span data-dcnode-id="2442" instrument_node="">Infants between 1 and 2 years of age also are at risk for anemia. They may not get enough iron in their diets, especially if they drink a lot of cow’s milk. Cow’s milk is low in the iron needed for growth.</span></p><p data-dcnode-id="2439"><span data-dcnode-id="2440" instrument_node="">Drinking too much cow’s milk may keep an infant or toddler from eating enough iron-rich foods or absorbing enough iron from foods.</span></p><p data-dcnode-id="2437"><span data-dcnode-id="2438" instrument_node="">Older adults also are at increased risk for anemia. Researchers continue to study how the condition affects older adults. Many of these people have other medical conditions as well.</span></p><p data-dcnode-id="2434"><strong data-dcnode-id="2435"><span data-dcnode-id="2436" instrument_node="">Major Risk Factors</span></strong></p><p data-dcnode-id="2432"><span data-dcnode-id="2433" instrument_node="">Factors that raise your risk for anemia include:</span></p><ul data-dcnode-id="2421"><li data-dcnode-id="2430"><span data-dcnode-id="2431" instrument_node="">A diet that is low in iron, vitamins, or minerals</span></li><li data-dcnode-id="2428"><span data-dcnode-id="2429" instrument_node="">Blood loss from surgery or an injury</span></li><li data-dcnode-id="2426"><span data-dcnode-id="2427" instrument_node="">Long-term or serious illnesses, such as kidney disease, cancer, diabetes, rheumatoid arthritis, HIV/AIDS, inflammatory bowel disease (including Crohn’s disease), liver disease, heart failure, and thyroid disease</span></li><li data-dcnode-id="2424"><span data-dcnode-id="2425" instrument_node="">Long-term infections</span></li><li data-dcnode-id="2422"><span data-dcnode-id="2423" instrument_node="">A family history of inherited anemia, such as sickle cell anemia or thalassemia</span></li></ul><h3 data-dcnode-id="2418"><span data-dcnode-id="2419" id="What_Are_the_Signs_and_Symptoms_of_Anemia"><span data-dcnode-id="2420" instrument_node="">What Are the Signs and Symptoms of Anemia ?</span></span></h3><p data-dcnode-id="2416"><span data-dcnode-id="2417" instrument_node="">The most common symptom of anemia is fatigue (feeling tired or weak). If you have anemia, you may find it hard to find the energy to do normal activities.</span></p><p data-dcnode-id="2414"><span data-dcnode-id="2415" instrument_node="">Other signs and symptoms of anemia include:</span></p><ul data-dcnode-id="2401"><li data-dcnode-id="2412"><span data-dcnode-id="2413" instrument_node="">Shortness of breath</span></li><li data-dcnode-id="2410"><span data-dcnode-id="2411" instrument_node="">Dizziness</span></li><li data-dcnode-id="2408"><span data-dcnode-id="2409" instrument_node="">Headache</span></li><li data-dcnode-id="2406"><span data-dcnode-id="2407" instrument_node="">Coldness in the hands and feet</span></li><li data-dcnode-id="2404"><span data-dcnode-id="2405" instrument_node="">Pale skin</span></li><li data-dcnode-id="2402"><span data-dcnode-id="2403" instrument_node="">Chest pain</span></li></ul><p data-dcnode-id="2399"><span data-dcnode-id="2400" instrument_node="">These signs and symptoms can occur because your heart has to work harder to pump oxygen-rich blood through your body.</span></p><p data-dcnode-id="2397"><span data-dcnode-id="2398" instrument_node="">Mild to moderate anemia may cause very mild symptoms or none at all.</span></p><h3 data-dcnode-id="2394"><span data-dcnode-id="2395" id="Complications_of_Anemia"><span data-dcnode-id="2396" instrument_node="">Complications of Anemia</span></span></h3><p data-dcnode-id="2392"><span data-dcnode-id="2393" instrument_node="">Some people who have anemia may have arrhythmias. Arrhythmias are problems with the rate or rhythm of the heartbeat. Over time, arrhythmias can damage your heart and possibly lead to heart failure.</span></p><p data-dcnode-id="2390"><span data-dcnode-id="2391" instrument_node="">Anemia also can damage other organs in your body because your blood can’t get enough oxygen to them.</span></p><p data-dcnode-id="2388"><span data-dcnode-id="2389" instrument_node="">Anemia can weaken people who have cancer or HIV/AIDS. This can make their treatments not work as well.</span></p><p data-dcnode-id="2386"><span data-dcnode-id="2387" instrument_node="">Anemia also can cause many other health problems. People who have kidney disease and anemia are more likely to have heart problems. With some types of anemia, too little fluid intake or too much loss of fluid in the blood and body can occur. Severe loss of fluid can be life threatening.</span></p><h3 data-dcnode-id="2383"><span data-dcnode-id="2384" id="How_Is_Anemia_Diagnosed"><span data-dcnode-id="2385" instrument_node="">How Is Anemia Diagnosed ?</span></span></h3><p data-dcnode-id="2381"><span data-dcnode-id="2382" instrument_node="">Your doctor will diagnose anemia based on your medical and family histories, a physical exam, and results from tests and procedures.</span></p><p data-dcnode-id="2379"><span data-dcnode-id="2380" instrument_node="">Because anemia doesn’t always cause symptoms, your doctor may find out you have it while checking for another condition.</span></p><p data-dcnode-id="2376"><strong data-dcnode-id="2377"><span data-dcnode-id="2378" instrument_node="">Medical and Family Histories</span></strong></p><p data-dcnode-id="2374"><span data-dcnode-id="2375" instrument_node="">Your doctor may ask whether you have any of the common signs or symptoms of anemia. He or she also may ask whether you’ve had an illness or condition that could cause anemia.</span></p><p data-dcnode-id="2372"><span data-dcnode-id="2373" instrument_node="">Let your doctor know about any medicines you take, what you typically eat (your diet), and whether you have family members who have anemia or a history of it.</span></p><p data-dcnode-id="2369"><strong data-dcnode-id="2370"><span data-dcnode-id="2371" instrument_node="">Physical Exam</span></strong></p><p data-dcnode-id="2367"><span data-dcnode-id="2368" instrument_node="">Your doctor will do a physical exam to find out how severe your anemia is and to check for possible causes. He or she may:</span></p><ul data-dcnode-id="2360"><li data-dcnode-id="2365"><span data-dcnode-id="2366" instrument_node="">Listen to your heart for a rapid or irregular heartbeat</span></li><li data-dcnode-id="2363"><span data-dcnode-id="2364" instrument_node="">Listen to your lungs for rapid or uneven breathing</span></li><li data-dcnode-id="2361"><span data-dcnode-id="2362" instrument_node="">Feel your abdomen to check the size of your liver and spleen</span></li></ul><p data-dcnode-id="2358"><span data-dcnode-id="2359" instrument_node="">Your doctor also may do a pelvic or rectal exam to check for common sources of blood loss.</span></p><p data-dcnode-id="2355"><strong data-dcnode-id="2356"><span data-dcnode-id="2357" instrument_node="">Diagnostic Tests and Procedures</span></strong></p><p data-dcnode-id="2353"><span data-dcnode-id="2354" instrument_node="">You may have various blood tests and other tests or procedures to find out what type of anemia you have and how severe it is.</span></p><p data-dcnode-id="2350"><strong data-dcnode-id="2351"><span data-dcnode-id="2352" instrument_node="">Complete Blood Count</span></strong></p><p data-dcnode-id="2348"><span data-dcnode-id="2349" instrument_node="">Often, the first test used to diagnose anemia is a complete blood count (CBC). The CBC measures many parts of your blood.</span></p><p data-dcnode-id="2346"><span data-dcnode-id="2347" instrument_node="">The test checks your hemoglobin and hematocrit levels. Hemoglobin is the iron-rich protein in red blood cells that carries oxygen to the body. Hematocrit is a measure of how much space red blood cells take up in your blood. A low level of hemoglobin or hematocrit is a sign of anemia.</span></p><p data-dcnode-id="2344"><span data-dcnode-id="2345" instrument_node="">The normal range of these levels might be lower in certain racial and ethnic populations. Your doctor can explain your test results to you.</span></p><p data-dcnode-id="2342"><span data-dcnode-id="2343" instrument_node="">The CBC also checks the number of red blood cells, white blood cells, and platelets in your blood. Abnormal results might be a sign of anemia, another blood disorder, an infection, or another condition.</span></p><p data-dcnode-id="2340"><span data-dcnode-id="2341" instrument_node="">Finally, the CBC looks at mean corpuscular volume (MCV). MCV is a measure of the average size of your red blood cells and a clue as to the cause of your anemia. In iron-deficiency anemia, for example, red blood cells usually are smaller than normal.</span></p><p data-dcnode-id="2337"><strong data-dcnode-id="2338"><span data-dcnode-id="2339" instrument_node="">Other Tests and Procedures</span></strong></p><p data-dcnode-id="2335"><span data-dcnode-id="2336" instrument_node="">If the CBC results show that you have anemia, you may need other tests, such as:</span></p><ul data-dcnode-id="2328"><li data-dcnode-id="2333"><span data-dcnode-id="2334" instrument_node="">Hemoglobin electrophoresis. This test looks at the different types of hemoglobin in your blood. The test can help diagnose the type of anemia you have.</span></li><li data-dcnode-id="2331"><span data-dcnode-id="2332" instrument_node="">A reticulocyte count. This test measures the number of young red blood cells in your blood. The test shows whether your bone marrow is making red blood cells at the correct rate.</span></li><li data-dcnode-id="2329"><span data-dcnode-id="2330" instrument_node="">Tests for the level of iron in your blood and body. These tests include serum iron and serum ferritin tests. Transferrin level and total iron-binding capacity tests also measure iron levels.</span></li></ul><p data-dcnode-id="2326"><span data-dcnode-id="2327" instrument_node="">Because anemia has many causes, you also might be tested for conditions such as kidney failure, lead poisoning (in children), and vitamin deficiencies (lack of vitamins, such as B12 and folic acid).</span></p><p data-dcnode-id="2324"><span data-dcnode-id="2325" instrument_node="">If your doctor thinks that you have anemia due to internal bleeding, he or she may suggest several tests to look for the source of the bleeding. A test to check the stool for blood might be done in your doctor’s office or at home. Your doctor can give you a kit to help you get a sample at home. He or she will tell you to bring the sample back to the office or send it to a laboratory.</span></p><p data-dcnode-id="2322"><span data-dcnode-id="2323" instrument_node="">If blood is found in the stool, you may have other tests to find the source of the bleeding. One such test is endoscopy. For this test, a tube with a tiny camera is used to view the lining of the digestive tract.</span></p><p data-dcnode-id="2320"><span data-dcnode-id="2321" instrument_node="">Your doctor also may want to do bone marrow tests. These tests show whether your bone marrow is healthy and making enough blood cells.</span></p><h3 data-dcnode-id="2317"><span data-dcnode-id="2318" id="How_Is_Anemia_Treated"><span data-dcnode-id="2319" instrument_node="">How Is Anemia Treated ?</span></span></h3><p data-dcnode-id="2315"><span data-dcnode-id="2316" instrument_node="">Treatment for anemia depends on the type, cause, and severity of the condition. Treatments may include dietary changes or supplements, medicines, procedures, or surgery to treat blood loss.</span></p><p data-dcnode-id="2312"><strong data-dcnode-id="2313"><span data-dcnode-id="2314" instrument_node="">Goals of Treatment</span></strong></p><p data-dcnode-id="2310"><span data-dcnode-id="2311" instrument_node="">The goal of treatment is to increase the amount of oxygen that your blood can carry. This is done by raising the red blood cell count and/or hemoglobin level. (Hemoglobin is the iron-rich protein in red blood cells that carries oxygen to the body.)</span></p><p data-dcnode-id="2308"><span data-dcnode-id="2309" instrument_node="">Another goal is to treat the underlying cause of the anemia.</span></p><p data-dcnode-id="2305"><strong data-dcnode-id="2306"><span data-dcnode-id="2307" instrument_node="">Dietary Changes and Supplements</span></strong></p><p data-dcnode-id="2303"><span data-dcnode-id="2304" instrument_node="">Low levels of vitamins or iron in the body can cause some types of anemia. These low levels might be the result of a poor diet or certain diseases or conditions.</span></p><p data-dcnode-id="2301"><span data-dcnode-id="2302" instrument_node="">To raise your vitamin or iron level, your doctor may ask you to change your diet or take vitamin or iron supplements. Common vitamin supplements are vitamin B12 and folic acid (folate). Vitamin C sometimes is given to help the body absorb iron.</span></p><h4 data-dcnode-id="2298"><span data-dcnode-id="2299" id="Iron"><span data-dcnode-id="2300" instrument_node="">Iron</span></span></h4><p data-dcnode-id="2296"><span data-dcnode-id="2297" instrument_node="">Your body needs iron to make hemoglobin. Your body can more easily absorb iron from meats than from vegetables or other foods. To treat your anemia, your doctor may suggest eating more meat—especially red meat (such as beef or liver), as well as chicken, turkey, pork, fish, and shellfish.</span></p><p data-dcnode-id
