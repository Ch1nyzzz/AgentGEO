="2294"><span data-dcnode-id="2295" instrument_node="">Nonmeat foods that are good sources of iron include:</span></p><ul data-dcnode-id="2281"><li data-dcnode-id="2292"><span data-dcnode-id="2293" instrument_node="">Spinach and other dark green leafy vegetables</span></li><li data-dcnode-id="2290"><span data-dcnode-id="2291" instrument_node="">Tofu</span></li><li data-dcnode-id="2288"><span data-dcnode-id="2289" instrument_node="">Peas; lentils; white, red, and baked beans; soybeans; and chickpeas</span></li><li data-dcnode-id="2286"><span data-dcnode-id="2287" instrument_node="">Dried fruits, such as prunes, raisins, and apricots</span></li><li data-dcnode-id="2284"><span data-dcnode-id="2285" instrument_node="">Prune juice</span></li><li data-dcnode-id="2282"><span data-dcnode-id="2283" instrument_node="">Iron-fortified cereals and breads</span></li></ul><p data-dcnode-id="2279"><span data-dcnode-id="2280" instrument_node="">You can look at the Nutrition Facts label on packaged foods to find out how much iron the items contain. The amount is given as a percentage of the total amount of iron you need every day.</span></p><p data-dcnode-id="2277"><span data-dcnode-id="2278" instrument_node="">Iron also is available as a supplement. It’s usually combined with multivitamins and other minerals that help your body absorb iron.</span></p><p data-dcnode-id="2275"><span data-dcnode-id="2276" instrument_node="">Doctors may recommend iron supplements for premature infants, infants and young children who drink a lot of cow’s milk, and infants who are fed breast milk only or formula that isn’t fortified with iron.</span></p><p data-dcnode-id="2273"><span data-dcnode-id="2274" instrument_node="">Large amounts of iron can be harmful, so take iron supplements only as your doctor prescribes.</span></p><h4 data-dcnode-id="2270"><span data-dcnode-id="2271" id="Vitamin_B12"><span data-dcnode-id="2272" instrument_node="">Vitamin B12</span></span></h4><p data-dcnode-id="2268"><span data-dcnode-id="2269" instrument_node="">Low levels of vitamin B12 can lead to pernicious anemia. This type of anemia often is treated with vitamin B12 supplements.</span></p><p data-dcnode-id="2266"><span data-dcnode-id="2267" instrument_node="">Good food sources of vitamin B12 include:</span></p><ul data-dcnode-id="2257"><li data-dcnode-id="2264"><span data-dcnode-id="2265" instrument_node="">Breakfast cereals with added vitamin B12</span></li><li data-dcnode-id="2262"><span data-dcnode-id="2263" instrument_node="">Meats such as beef, liver, poultry, and fish</span></li><li data-dcnode-id="2260"><span data-dcnode-id="2261" instrument_node="">Eggs and dairy products (such as milk, yogurt, and cheese)</span></li><li data-dcnode-id="2258"><span data-dcnode-id="2259" instrument_node="">Foods fortified with vitamin B12, such as soy-based beverages and vegetarian burgers</span></li></ul><h4 data-dcnode-id="2254"><span data-dcnode-id="2255" id="Folic_Acid"><span data-dcnode-id="2256" instrument_node="">Folic Acid</span></span></h4><p data-dcnode-id="2252"><span data-dcnode-id="2253" instrument_node="">Folic acid (folate) is a form of vitamin B that’s found in foods. Your body needs folic acid to make and maintain new cells. Folic acid also is very important for pregnant women. It helps them avoid anemia and promotes healthy growth of the fetus.</span></p><p data-dcnode-id="2250"><span data-dcnode-id="2251" instrument_node="">Good sources of folic acid include:</span></p><ul data-dcnode-id="2237"><li data-dcnode-id="2248"><span data-dcnode-id="2249" instrument_node="">Bread, pasta, and rice with added folic acid</span></li><li data-dcnode-id="2246"><span data-dcnode-id="2247" instrument_node="">Spinach and other dark green leafy vegetables</span></li><li data-dcnode-id="2244"><span data-dcnode-id="2245" instrument_node="">Black-eyed peas and dried beans</span></li><li data-dcnode-id="2242"><span data-dcnode-id="2243" instrument_node="">Beef liver</span></li><li data-dcnode-id="2240"><span data-dcnode-id="2241" instrument_node="">Eggs</span></li><li data-dcnode-id="2238"><span data-dcnode-id="2239" instrument_node="">Bananas, oranges, orange juice, and some other fruits and juices</span></li></ul><h4 data-dcnode-id="2234"><span data-dcnode-id="2235" id="Vitamin_C"><span data-dcnode-id="2236" instrument_node="">Vitamin C</span></span></h4><p data-dcnode-id="2232"><span data-dcnode-id="2233" instrument_node="">Vitamin C helps the body absorb iron. Good sources of vitamin C are vegetables and fruits, especially citrus fruits. Citrus fruits include oranges, grapefruits, tangerines, and similar fruits. Fresh and frozen fruits, vegetables, and juices usually have more vitamin C than canned ones.</span></p><p data-dcnode-id="2230"><span data-dcnode-id="2231" instrument_node="">If you’re taking medicines, ask your doctor or pharmacist whether you can eat grapefruit or drink grapefruit juice. This fruit can affect the strength of a few medicines and how well they work.</span></p><p data-dcnode-id="2228"><span data-dcnode-id="2229" instrument_node="">Other fruits rich in vitamin C include kiwi fruit, strawberries, and cantaloupes.</span></p><p data-dcnode-id="2226"><span data-dcnode-id="2227" instrument_node="">Vegetables rich in vitamin C include broccoli, peppers, Brussels sprouts, tomatoes, cabbage, potatoes, and leafy green vegetables like turnip greens and spinach.</span></p><h4 data-dcnode-id="2223"><span data-dcnode-id="2224" id="Medicines"><span data-dcnode-id="2225" instrument_node="">Medicines</span></span></h4><p data-dcnode-id="2221"><span data-dcnode-id="2222" instrument_node="">Your doctor may prescribe medicines to help your body make more red blood cells or to treat an underlying cause of anemia. Some of these medicines include:</span></p><ul data-dcnode-id="2210"><li data-dcnode-id="2219"><span data-dcnode-id="2220" instrument_node="">Antibiotics to treat infections.</span></li><li data-dcnode-id="2217"><span data-dcnode-id="2218" instrument_node="">Hormones to treat heavy menstrual bleeding in teenaged and adult women.</span></li><li data-dcnode-id="2215"><span data-dcnode-id="2216" instrument_node="">A man-made version of erythropoietin to stimulate your body to make more red blood cells. This hormone has some risks. You and your doctor will decide whether the benefits of this treatment outweigh the risks.</span></li><li data-dcnode-id="2213"><span data-dcnode-id="2214" instrument_node="">Medicines to prevent the body’s immune system from destroying its own red blood cells.</span></li><li data-dcnode-id="2211"><span data-dcnode-id="2212" instrument_node="">Chelation therapy for lead poisoning. Chelation therapy is used mainly in children. This is because children who have iron-deficiency anemia are at increased risk of lead poisoning.</span></li></ul><h4 data-dcnode-id="2207"><span data-dcnode-id="2208" id="Procedures"><span data-dcnode-id="2209" instrument_node="">Procedures</span></span></h4><p data-dcnode-id="2205"><span data-dcnode-id="2206" instrument_node="">If your anemia is severe, your doctor may recommend a medical procedure. Procedures include blood transfusions and blood and marrow stem cell transplants.</span></p><p data-dcnode-id="2202"><strong data-dcnode-id="2203"><span data-dcnode-id="2204" instrument_node="">Blood Transfusion</span></strong></p><p data-dcnode-id="2200"><span data-dcnode-id="2201" instrument_node="">A blood transfusion is a safe, common procedure in which blood is given to you through an intravenous (IV) line in one of your blood vessels. Transfusions require careful matching of donated blood with the recipient’s blood.</span></p><p data-dcnode-id="2198"><span data-dcnode-id="2199" instrument_node="">For more information, see Blood Transfusion topic below.</span></p><p data-dcnode-id="2195"><strong data-dcnode-id="2196"><span data-dcnode-id="2197" instrument_node="">Blood and Marrow Stem Cell Transplant</span></strong></p><p data-dcnode-id="2193"><span data-dcnode-id="2194" instrument_node="">A blood and marrow stem cell transplant replaces your faulty stem cells with healthy ones from another person (a donor). Stem cells are made in the bone marrow. They develop into red and white blood cells and platelets.</span></p><p data-dcnode-id="2191"><span data-dcnode-id="2192" instrument_node="">During the transplant, which is like a blood transfusion, you get donated stem cells through a tube placed in a vein in your chest. Once the stem cells are in your body, they travel to your bone marrow and begin making new blood cells.</span></p><p data-dcnode-id="2188"><strong data-dcnode-id="2189"><span data-dcnode-id="2190" instrument_node="">Surgery</span></strong></p><p data-dcnode-id="2186"><span data-dcnode-id="2187" instrument_node="">If you have serious or life-threatening bleeding that’s causing anemia, you may need surgery. For example, you may need surgery to control ongoing bleeding due to a stomach ulcer or colon cancer.</span></p><p data-dcnode-id="2184"><span data-dcnode-id="2185" instrument_node="">If your body is destroying red blood cells at a high rate, you may need to have your spleen removed. The spleen is an organ that removes wornout red blood cells from the body. An enlarged or diseased spleen may remove more red blood cells than normal, causing anemia.</span></p><h3 data-dcnode-id="2181"><span data-dcnode-id="2182" id="What_Is_Iron-Deficiency_Anemia"><span data-dcnode-id="2183" instrument_node="">What Is Iron-Deficiency Anemia ?</span></span></h3><p data-dcnode-id="2175"><span data-dcnode-id="2180" instrument_node="">Iron-deficiency anemia is a common, easily treated condition that occurs if you don’t have enough iron in your body. Low iron levels usually are due to blood loss, poor diet, or an inability to absorb enough iron from food </span><sup class="footnote_plugin_tooltip_text" data-dcnode-id="2178" id="footnote_plugin_tooltip_4" onclick="footnote_moveToAnchor('footnote_plugin_reference_4');"><span data-dcnode-id="2179" instrument_node="">4)</span></sup><span class="footnote_tooltip" data-dcnode-id="2177" id="footnote_plugin_tooltip_text_4"></span><span data-dcnode-id="2176" instrument_node="">.</span></p><p data-dcnode-id="2173"><span data-dcnode-id="2174" instrument_node="">Iron-deficiency anemia usually develops over time if your body doesn’t have enough iron to build healthy red blood cells. Without enough iron, your body starts using the iron it has stored. Soon, the stored iron gets used up.</span></p><p data-dcnode-id="2171"><span data-dcnode-id="2172" instrument_node="">After the stored iron is gone, your body makes fewer red blood cells. The red blood cells it does make have less hemoglobin than normal.</span></p><p data-dcnode-id="2169"><span data-dcnode-id="2170" instrument_node="">Iron-deficiency anemia can cause fatigue (tiredness), shortness of breath, chest pain, and other symptoms. Severe iron-deficiency anemia can lead to heart problems, infections, problems with growth and development in children, and other complications.</span></p><p data-dcnode-id="2167"><span data-dcnode-id="2168" instrument_node="">Infants and young children and women are the two groups at highest risk for iron-deficiency anemia.</span></p><p data-dcnode-id="2165"><span data-dcnode-id="2166" instrument_node="">Doctors usually can successfully treat iron-deficiency anemia. Treatment will depend on the cause and severity of the condition. Treatments may include dietary changes, medicines, and surgery.</span></p><p data-dcnode-id="2163"><span data-dcnode-id="2164" instrument_node="">Severe iron-deficiency anemia may require treatment in a hospital, blood transfusions, iron injections, or intravenous iron therapy.</span></p><h4 data-dcnode-id="2160"><span data-dcnode-id="2161" id="What_Causes_Iron-Deficiency_Anemia"><span data-dcnode-id="2162" instrument_node="">What Causes Iron-Deficiency Anemia ?</span></span></h4><p data-dcnode-id="2158"><span data-dcnode-id="2159" instrument_node="">Not having enough iron in your body causes iron-deficiency anemia. Lack of iron usually is due to blood loss, poor diet, or an inability to absorb enough iron from food.</span></p><p data-dcnode-id="2155"><strong data-dcnode-id="2156"><span data-dcnode-id="2157" instrument_node="">Blood Loss</span></strong></p><p data-dcnode-id="2153"><span data-dcnode-id="2154" instrument_node="">When you lose blood, you lose iron. If you don’t have enough iron stored in your body to make up for the lost iron, you’ll develop iron-deficiency anemia.</span></p><p data-dcnode-id="2151"><span data-dcnode-id="2152" instrument_node="">In women, long or heavy menstrual periods or bleeding fibroids in the uterus may cause low iron levels. Blood loss that occurs during childbirth is another cause of low iron levels in women.</span></p><p data-dcnode-id="2149"><span data-dcnode-id="2150" instrument_node="">Internal bleeding (bleeding inside the body) also may lead to iron-deficiency anemia. This type of blood loss isn’t always obvious, and it may occur slowly. Some causes of internal bleeding are:</span></p><ul data-dcnode-id="2142"><li data-dcnode-id="2147"><span data-dcnode-id="2148" instrument_node="">A bleeding ulcer, colon polyp, or colon cancer</span></li><li data-dcnode-id="2145"><span data-dcnode-id="2146" instrument_node="">Regular use of aspirin or other pain medicines, such as nonsteroidal anti-inflammatory drugs (for example, ibuprofen and naproxen)</span></li><li data-dcnode-id="2143"><span data-dcnode-id="2144" instrument_node="">Urinary tract bleeding</span></li></ul><p data-dcnode-id="2140"><span data-dcnode-id="2141" instrument_node="">Blood loss from severe injuries, surgery, or frequent blood drawings also can cause iron-deficiency anemia.</span></p><p data-dcnode-id="2137"><strong data-dcnode-id="2138"><span data-dcnode-id="2139" instrument_node="">Poor Diet</span></strong></p><p data-dcnode-id="2135"><span data-dcnode-id="2136" instrument_node="">The best sources of iron are meat, poultry, fish, and iron-fortified foods (foods that have iron added). If you don’t eat these foods regularly, or if you don’t take an iron supplement, you’re more likely to develop iron-deficiency anemia.</span></p><p data-dcnode-id="2133"><span data-dcnode-id="2134" instrument_node="">Vegetarian diets can provide enough iron if you eat the right foods. For example, good nonmeat sources of iron include iron-fortified breads and cereals, beans, tofu, dried fruits, and spinach and other dark green leafy vegetables.</span></p><p data-dcnode-id="2131"><span data-dcnode-id="2132" instrument_node="">During some stages of life, such as pregnancy and childhood, it may be hard to get enough iron in your diet. This is because your need for iron increases during these times of growth and development.</span></p><p data-dcnode-id="2128"><strong data-dcnode-id="2129"><span data-dcnode-id="2130" instrument_node="">Inability To Absorb Enough Iron</span></strong></p><p data-dcnode-id="2126"><span data-dcnode-id="2127" instrument_node="">Even if you have enough iron in your diet, your body may not be able to absorb it. This can happen if you have intestinal surgery (such as gastric bypass) or a disease of the intestine (such as Crohn’s disease or celiac disease).</span></p><p data-dcnode-id="2124"><span data-dcnode-id="2125" instrument_node="">Prescription medicines that reduce acid in the stomach also can interfere with iron absorption.</span></p><h4 data-dcnode-id="2121"><span data-dcnode-id="2122" id="Who_Is_at_Risk_for_Iron-Deficiency_Anemia"><span data-dcnode-id="2123" instrument_node="">Who Is at Risk for Iron-Deficiency Anemia ?</span></span></h4><ul data-dcnode-id="2117"><li data-dcnode-id="2118"><strong data-dcnode-id="2119"><span data-dcnode-id="2120" instrument_node="">Infants and Young Children</span></strong></li></ul><p data-dcnode-id="2115"><span data-dcnode-id="2116" instrument_node="">Infants and young children need a lot of iron to grow and develop. The iron that full-term infants have stored in their bodies is used up in the first 4 to 6 months of life.</span></p><p data-dcnode-id="2113"><span data-dcnode-id="2114" instrument_node="">Premature and low-birth-weight babies (weighing less than 5.5 pounds) are at even greater risk for iron-deficiency anemia. These babies don’t have as much iron stored in their bodies as larger, full-term infants.</span></p><p data-dcnode-id="2111"><span data-dcnode-id="2112" instrument_node="">Iron-fortified baby food or iron supplements, when used properly, can help prevent iron-deficiency anemia in infants and young children. Talk with your child’s doctor about your child’s diet.</span></p><p data-dcnode-id="2109"><span data-dcnode-id="2110" instrument_node="">Young children who drink a lot of cow’s milk may be at risk for iron-deficiency anemia. Milk is low in iron, and too much milk may take the place of iron-rich foods in the diet. Too much milk also may prevent children’s bodies from absorbing iron from other foods.</span></p><p data-dcnode-id="2107"><span data-dcnode-id="2108" instrument_node="">Children who have lead in their blood also may be at risk for iron-deficiency anemia. Lead can interfere with the body’s ability to make hemoglobin. Lead may get into the body from breathing in lead dust, eating lead in paint or soil, or drinking water that contains lead.</span></p><ul data-dcnode-id="2103"><li data-dcnode-id="2104"><strong data-dcnode-id="2105"><span data-dcnode-id="2106" instrument_node="">Teens</span></strong></li></ul><p data-dcnode-id="2101"><span data-dcnode-id="2102" instrument_node="">Teens are at risk for iron-deficiency anemia if they’re underweight or have chronic (ongoing) illnesses. Teenage girls who have heavy periods also are at increased risk for the condition.</span></p><ul data-dcnode-id="2097"><li data-dcnode-id="2098"><strong data-dcnode-id="2099"><span data-dcnode-id="2100" instrument_node="">Women</span></strong></li></ul><p data-dcnode-id="2095"><span data-dcnode-id="2096" instrument_node="">Women of childbearing age are at higher risk for iron-deficiency anemia because of blood loss during their monthly periods. About 1 in 5 women of childbearing age has iron-deficiency anemia.</span></p><p data-dcnode-id="2093"><span data-dcnode-id="2094" instrument_node="">Pregnant women also are at higher risk for the condition because they need twice as much iron as usual. The extra iron is needed for increased blood volume and for the fetus’ growth.</span></p><p data-dcnode-id="2091"><span data-dcnode-id="2092" instrument_node="">About half of all pregnant women develop iron-deficiency anemia. The condition can increase a pregnant woman’s risk for a premature or low-birth-weight baby.</span></p><ul data-dcnode-id="2087"><li data-dcnode-id="2088"><strong data-dcnode-id="2089"><span data-dcnode-id="2090" instrument_node="">Adults Who Have Internal Bleeding</span></strong></li></ul><p data-dcnode-id="2085"><span data-dcnode-id="2086" instrument_node="">Adults who have internal bleeding, such as intestinal bleeding, can develop iron-deficiency anemia due to blood loss. Certain conditions, such as colon cancer and bleeding ulcers, can cause blood loss. Some medicines, such as aspirin, also can cause internal bleeding.</span></p><ul data-dcnode-id="2081"><li data-dcnode-id="2082"><strong data-dcnode-id="2083"><span data-dcnode-id="2084" instrument_node="">Other At-Risk Groups</span></strong></li></ul><p data-dcnode-id="2079"><span data-dcnode-id="2080" instrument_node="">People who get kidney dialysis treatment may develop iron-deficiency anemia. This is because blood is lost during dialysis. Also, the kidneys are no longer able to make enough of a hormone that the body needs to produce red blood cells.</span></p><p data-dcnode-id="2077"><span data-dcnode-id="2078" instrument_node="">People who have gastric bypass surgery also may develop iron-deficiency anemia. This type of surgery can prevent the body from absorbing enough iron.</span></p><p data-dcnode-id="2075"><span data-dcnode-id="2076" instrument_node="">Certain eating patterns or habits may put you at higher risk for iron-deficiency anemia. This can happen if you:</span></p><ul data-dcnode-id="2066"><li data-dcnode-id="2073"><span data-dcnode-id="2074" instrument_node="">Follow a diet that excludes meat and fish, which are the best sources of iron. However, vegetarian diets can provide enough iron if you eat the right foods. For example, good nonmeat sources of iron include iron-fortified breads and cereals, beans, tofu, dried fruits, and spinach and other dark green leafy vegetables.</span></li><li data-dcnode-id="2071"><span data-dcnode-id="2072" instrument_node="">Eat poorly because of money, social, health, or other problems.</span></li><li data-dcnode-id="2069"><span data-dcnode-id="2070" instrument_node="">Follow a very low-fat diet over a long time. Some higher fat foods, like meat, are the best sources of iron.</span></li><li data-dcnode-id="2067"><span data-dcnode-id="2068" instrument_node="">Follow a high-fiber diet. Large amounts of fiber can slow the absorption of iron.</span></li></ul><h4 data-dcnode-id="2063"><span data-dcnode-id="2064" id="What_Are_the_Signs_and_Symptoms_of_Iron-Deficiency_Anemia"><span data-dcnode-id="2065" instrument_node="">What Are the Signs and Symptoms of Iron-Deficiency Anemia ?</span></span></h4><p data-dcnode-id="2061"><span data-dcnode-id="2062" instrument_node="">The signs and symptoms of iron-deficiency anemia depend on its severity. Mild to moderate iron-deficiency anemia may have no signs or symptoms.</span></p><p data-dcnode-id="2059"><span data-dcnode-id="2060" instrument_node="">When signs and symptoms do occur, they can range from mild to severe. Many of the signs and symptoms of iron-deficiency anemia apply to all types of anemia.</span></p><ul data-dcnode-id="2055"><li data-dcnode-id="2056"><strong data-dcnode-id="2057"><span data-dcnode-id="2058" instrument_node="">Signs and Symptoms of Anemia</span></strong></li></ul><p data-dcnode-id="2053"><span data-dcnode-id="2054" instrument_node="">The most common symptom of all types of anemia is fatigue (tiredness). Fatigue occurs because your body doesn’t have enough red blood cells to carry oxygen to its many parts.</span></p><p data-dcnode-id="2051"><span data-dcnode-id="2052" instrument_node="">Also, the red blood cells your body makes have less hemoglobin than normal. Hemoglobin is an iron-rich protein in red blood cells. It helps red blood cells carry oxygen from the lungs to the rest of the body.</span></p><p data-dcnode-id="2049"><span data-dcnode-id="2050" instrument_node="">Anemia also can cause shortness of breath, dizziness, headache, coldness in your hands and feet, pale skin, chest pain, weakness, and fatigue (tiredness).</span></p><p data-dcnode-id="2047"><span data-dcnode-id="2048" instrument_node="">If you don’t have enough hemoglobin-carrying red blood cells, your heart has to work harder to move oxygen-rich blood through your body. This can lead to irregular heartbeats called arrhythmias, a heart murmur, an enlarged heart, or even heart failure.</span></p><p data-dcnode-id="2045"><span data-dcnode-id="2046" instrument_node="">In infants and young children, signs of anemia include poor appetite, slowed growth and development, and behavioral problems.</span></p><ul data-dcnode-id="2041"><li data-dcnode-id="2042"><strong data-dcnode-id="2043"><span data-dcnode-id="2044" instrument_node="">Signs and Symptoms of Iron Deficiency</span></strong></li></ul><p data-dcnode-id="2039"><span data-dcnode-id="2040" instrument_node="">Signs and symptoms of iron deficiency may include brittle nails, swelling or soreness of the tongue, cracks in the sides of the mouth, an enlarged spleen, and frequent infections.</span></p><p data-dcnode-id="2037"><span data-dcnode-id="2038" instrument_node="">People who have iron-deficiency anemia may have an unusual craving for nonfood items, such as ice, dirt, paint, or starch. This craving is called pica.</span></p><p data-dcnode-id="2035"><span data-dcnode-id="2036" instrument_node="">Some people who have iron-deficiency anemia develop restless legs syndrome. Restless legs syndrome is a disorder that causes a strong urge to move the legs. This urge to move often occurs with strange and unpleasant feelings in the legs. People who have restless legs syndrome often have a hard time sleeping.</span></p><p data-dcnode-id="2033"><span data-dcnode-id="2034" instrument_node="">Iron-deficiency anemia can put children at greater risk for lead poisoning and infections.</span></p><p data-dcnode-id="2031"><span data-dcnode-id="2032" instrument_node="">Some signs and symptoms of iron-deficiency anemia are related to the condition’s causes. For example, a sign of intestinal bleeding is bright red blood in the stools or black, tarry-looking stools.</span></p><p data-dcnode-id="2029"><span data-dcnode-id="2030" instrument_node="">Very heavy menstrual bleeding, long periods, or other vaginal bleeding may suggest that a woman is at risk for iron-deficiency anemia.</span></p><h4 data-dcnode-id="2026"><span data-dcnode-id="2027" id="How_Is_Iron-Deficiency_Anemia_Diagnosed"><span data-dcnode-id="2028" instrument_node="">How Is Iron-Deficiency Anemia Diagnosed ?</span></span></h4><p data-dcnode-id="2024"><span data-dcnode-id="2025" instrument_node="">Your doctor will diagnose iron-deficiency anemia based on your medical history, a physical exam, and the results from tests and procedures.</span></p><p data-dcnode-id="2022"><span data-dcnode-id="2023" instrument_node="">Once your doctor knows the cause and severity of the condition, he or she can create a treatment plan for you.</span></p><p data-dcnode-id="2020"><span data-dcnode-id="2021" instrument_node="">Mild to moderate iron-deficiency anemia may have no signs or symptoms. Thus, you may not know you have it unless your doctor discovers it from a screening test or while checking for other problems.</span></p><ul data-dcnode-id="2016"><li data-dcnode-id="2017"><strong data-dcnode-id="2018"><span data-dcnode-id="2019" instrument_node="">Specialists Involved</span></strong></li></ul><p data-dcnode-id="2014"><span data-dcnode-id="2015" instrument_node="">Primary care doctors often diagnose and treat iron-deficiency anemia. These doctors include pediatricians, family doctors, gynecologists/obstetricians, and internal medicine specialists.</span></p><p data-dcnode-id="2012"><span data-dcnode-id="2013" instrument_node="">A hematologist (a blood disease specialist), a gastroenterologist (a digestive system specialist), and other specialists also may help treat iron-deficiency anemia.</span></p><ul data-dcnode-id="2008"><li data-dcnode-id="2009"><strong data-dcnode-id="2010"><span data-dcnode-id="2011" instrument_node="">Medical History</span></strong></li></ul><p data-dcnode-id="2006"><span data-dcnode-id="2007" instrument_node="">Your doctor will ask about your signs and symptoms and any past problems you’ve had with anemia or low iron. He or she also may ask about your diet and whether you’re taking any medicines.</span></p><p data-dcnode-id="2004"><span data-dcnode-id="2005" instrument_node="">If you’re a woman, your doctor may ask whether you might be pregnant.</span></p><p data-dcnode-id="2001"><strong data-dcnode-id="2002"><span data-dcnode-id="2003" instrument_node="">Physical Exam</span></strong></p><p data-dcnode-id="1999"><span data-dcnode-id="2000" instrument_node="">Your doctor will do a physical exam to look for signs of iron-deficiency anemia. He or she may:</span></p><ul data-dcnode-id="1988"><li data-dcnode-id="1997"><span data-dcnode-id="1998" instrument_node="">Look at your skin, gums, and nail beds to see whether they’re pale</span></li><li data-dcnode-id="1995"><span data-dcnode-id="1996" instrument_node="">Listen to your heart for rapid or irregular heartbeats</span></li><li data-dcnode-id="1993"><span data-dcnode-id="1994" instrument_node="">Listen to your lungs for rapid or uneven breathing</span></li><li data-dcnode-id="1991"><span data-dcnode-id="1992" instrument_node="">Feel your abdomen to check the size of your liver and spleen</span></li><li data-dcnode-id="1989"><span data-dcnode-id="1990" instrument_node="">Do a pelvic and rectal exam to check for internal bleeding</span></li></ul><p data-dcnode-id="1985"><strong data-dcnode-id="1986"><span data-dcnode-id="1987" instrument_node="">Diagnostic Tests and Procedures</span></strong></p><p data-dcnode-id="1983"><span data-dcnode-id="1984" instrument_node="">Many tests and procedures are used to diagnose iron-deficiency anemia. They can help confirm a diagnosis, look for a cause, and find out how severe the condition is.</span></p><p data-dcnode-id="1980"><strong data-dcnode-id="1981"><span data-dcnode-id="1982" instrument_node="">Complete Blood Count</span></strong></p><p data-dcnode-id="1978"><span data-dcnode-id="1979" instrument_node="">Often, the first test used to diagnose anemia is a complete blood count (CBC). The CBC measures many parts of your blood.</span></p><p data-dcnode-id="1976"><span data-dcnode-id="1977" instrument_node="">This test checks your hemoglobin and hematocrit levels. Hemoglobin is an iron-rich protein in red blood cells that carries oxygen to the body. Hematocrit is a measure of how much space red blood cells take up in your blood. A low level of hemoglobin or hematocrit is a sign of anemia.</span></p><p data-dcnode-id="1974"><span data-dcnode-id="1975" instrument_node="">The normal range of these levels varies in certain racial and ethnic populations. Your doctor can explain your test results to you.</span></p><p data-dcnode-id="1972"><span data-dcnode-id="1973" instrument_node="">The CBC also checks the number of red blood cells, white blood cells, and platelets in your blood. Abnormal results may be a sign of infection, a blood disorder, or another condition.</span></p><p data-dcnode-id="1970"><span data-dcnode-id="1971" instrument_node="">Finally, the CBC looks at mean corpuscular volume (MCV). MCV is a measure of the average size of your red blood cells. The results may be a clue as to the cause of your anemia. In iron-deficiency anemia, for example, red blood cells usually are smaller than normal.</span></p><p data-dcnode-id="1967"><strong data-dcnode-id="1968"><span data-dcnode-id="1969" instrument_node="">Other Blood Tests</span></strong></p><p data-dcnode-id="1965"><span data-dcnode-id="1966" instrument_node="">If the CBC results confirm you have anemia, you may need other blood tests to find out what’s causing the condition, how severe it is, and the best way to treat it.</span></p><p data-dcnode-id="1961"><strong data-dcnode-id="1963"><span data-dcnode-id="1964" instrument_node="">Reticulocyte count</span></strong><span data-dcnode-id="1962" instrument_node="">. This test measures the number of reticulocytes in your blood. Reticulocytes are young, immature red blood cells. Over time, reticulocytes become mature red blood cells that carry oxygen throughout your body.</span></p><p data-dcnode-id="1959"><span data-dcnode-id="1960" instrument_node="">A reticulocyte count shows whether your bone marrow is making red blood cells at the correct rate.</span></p><p data-dcnode-id="1955"><strong data-dcnode-id="1957"><span data-dcnode-id="1958" instrument_node="">Peripheral smear</span></strong><span data-dcnode-id="1956" instrument_node="">. For this test, a sample of your blood is examined under a microscope. If you have iron-deficiency anemia, your red blood cells will look smaller and paler than normal.</span></p><p data-dcnode-id="1953"><span data-dcnode-id="1954" instrument_node="">Tests to measure iron levels. These tests can show how much iron has been used from your body’s stored iron. Tests to measure iron levels include:</span></p><ul data-dcnode-id="1940"><li data-dcnode-id="1949"><strong data-dcnode-id="1951"><span data-dcnode-id="1952" instrument_node="">Serum iron.</span></strong><span data-dcnode-id="1950" instrument_node=""> This test measures the amount of iron in your blood. The level of iron in your blood may be normal even if the total amount of iron in your body is low. For this reason, other iron tests also are done.</span></li><li data-dcnode-id="1945"><strong data-dcnode-id="1947"><span data-dcnode-id="1948" instrument_node="">Serum ferritin.</span></strong><span data-dcnode-id="1946" instrument_node=""> Ferritin is a protein that helps store iron in your body. A measure of this protein helps your doctor find out how much of your body’s stored iron has been used.</span></li><li data-dcnode-id="1941"><strong data-dcnode-id="1943"><span data-dcnode-id="1944" instrument_node="">Transferrin level</span></strong><span data-dcnode-id="1942" instrument_node="">, or total iron-binding capacity. Transferrin is a protein that carries iron in your blood. Total iron-binding capacity measures how much of the transferrin in your blood isn’t carrying iron. If you have iron-deficiency anemia, you’ll have a high level of transferrin that has no iron.</span></li></ul><p data-dcnode-id="1938"><span data-dcnode-id="1939" instrument_node="">Other tests. Your doctor also may recommend tests to check your hormone levels, especially your thyroid hormone. You also may have a blood test for a chemical called erythrocyte protoporphyrin. This chemical is a building block for hemoglobin.</span></p><p data-dcnode-id="1936"><span data-dcnode-id="1937" instrument_node="">Children also may be tested for the level of lead in their blood. Lead can make it hard for the body to produce hemoglobin.</span></p><p data-dcnode-id="1933"><strong data-dcnode-id="1934"><span data-dcnode-id="1935" instrument_node="">Tests and Procedures for Gastrointestinal Blood Loss</span></strong></p><p data-dcnode-id="1931"><span data-dcnode-id="1932" instrument_node="">To check whether internal bleeding is causing your iron-deficiency anemia, your doctor may suggest a fecal occult blood test. This test looks for blood in the stools and can detect bleeding in the intestines.</span></p><p data-dcnode-id="1929"><span data-dcnode-id="1930" instrument_node="">If the test finds blood, you may have other tests and procedures to find the exact spot of the bleeding. These tests and procedures may look for bleeding in the stomach, upper intestines, colon, or pelvic organs.</span></p><h4 data-dcnode-id="1926"><span data-dcnode-id="1927" id="How_Is_Iron-Deficiency_Anemia_Treated"><span data-dcnode-id="1928" instrument_node="">How Is Iron-Deficiency Anemia Treated ?</span></span></h4><p data-dcnode-id="1924"><span data-dcnode-id="1925" instrument_node="">Treatment for iron-deficiency anemia will depend on its cause and severity. Treatments may include dietary changes and supplements, medicines, and surgery.</span></p><p data-dcnode-id="1922"><span data-dcnode-id="1923" instrument_node="">Severe iron-deficiency anemia may require a blood transfusion, iron injections, or intravenous (IV) iron therapy. Treatment may need to be done in a hospital.</span></p><p data-dcnode-id="1920"><span data-dcnode-id="1921" instrument_node="">The goals of treating iron-deficiency anemia are to treat its underlying cause and restore normal levels of red blood cells, hemoglobin, and iron.</span></p><p data-dcnode-id="1917"><strong data-dcnode-id="1918"><span data-dcnode-id="1919" instrument_node="">Dietary Changes and Supplements</span></strong></p><ul data-dcnode-id="1913"><li data-dcnode-id="1914"><strong data-dcnode-id="1915"><span data-dcnode-id="1916" instrument_node="">Iron</span></strong></li></ul><p data-dcnode-id="1911"><span data-dcnode-id="1912" instrument_node="">You may need iron supplements to build up your iron levels as quickly as possible. Iron supplements can correct low iron levels within months. Supplements come in pill form or in drops for children.</span></p><p data-dcnode-id="1909"><span data-dcnode-id="1910" instrument_node="">Large amounts of iron can be harmful, so take iron supplements only as your doctor prescribes. Keep iron supplements out of reach from children. This will prevent them from taking an overdose of iron.</span></p><p data-dcnode-id="1907"><span data-dcnode-id="1908" instrument_node="">Iron supplements can cause side effects, such as dark stools, stomach irritation, and heartburn. Iron also can cause constipation, so your doctor may suggest that you use a stool softener.</span></p><p data-dcnode-id="1905"><span data-dcnode-id="1906" instrument_node="">Your doctor may advise you to eat more foods that are rich in iron. The best source of iron is red meat, especially beef and liver. Chicken, turkey, pork, fish, and shellfish also are good sources of iron.</span></p><p data-dcnode-id="1903"><span data-dcnode-id="1904" instrument_node="">The body tends to absorb iron from meat better than iron from nonmeat foods. However, some nonmeat foods also can help you raise your iron levels. Examples of nonmeat foods that are good sources of iron include:</span></p><ul data-dcnode-id="1890"><li data-dcnode-id="1901"><span data-dcnode-id="1902" instrument_node="">Iron-fortified breads and cereals</span></li><li data-dcnode-id="1899"><span data-dcnode-id="1900" instrument_node="">Peas; lentils; white, red, and baked beans; soybeans; and chickpeas</span></li><li data-dcnode-id="1897"><span data-dcnode-id="1898" instrument_node="">Tofu</span></li><li data-dcnode-id="1895"><span data-dcnode-id="1896" instrument_node="">Dried fruits, such as prunes, raisins, and apricots</span></li><li data-dcnode-id="1893"><span data-dcnode-id="1894" instrument_node="">Spinach and other dark green leafy vegetables</span></li><li data-dcnode-id="1891"><span data-dcnode-id="1892" instrument_node="">Prune juice</span></li></ul><p data-dcnode-id="1888"><span data-dcnode-id="1889" instrument_node="">The Nutrition Facts labels on packaged foods will show how much iron the items contain. The amount is given as a percentage of the total amount of iron you need every day.</span></p><ul data-dcnode-id="1884"><li data-dcnode-id="1885"><strong data-dcnode-id="1886"><span data-dcnode-id="1887" instrument_node="">Vitamin C</span></strong></li></ul><p data-dcnode-id="1882"><span data-dcnode-id="1883" instrument_node="">Vitamin C helps the body absorb iron. Good sources of vitamin C are vegetables and fruits, especially citrus fruits. Citrus fruits include oranges, grapefruits, tangerines, and similar fruits. Fresh and frozen fruits, vegetables, and juices usually have more vitamin C than canned ones.</span></p><p data-dcnode-id="1880"><span data-dcnode-id="1881" instrument_node="">If you’re taking medicines, ask your doctor or pharmacist whether you can eat grapefruit or drink grapefruit juice. Grapefruit can affect the strength of a few medicines and how well they work.</span></p><p data-dcnode-id="1878"><span data-dcnode-id="1879" instrument_node="">Other fruits rich in vitamin C include kiwi fruit, strawberries, and cantaloupes.</span></p><p data-dcnode-id="1874"><span data-dcnode-id="1877" instrument_node="">Vegetables rich in vitamin C include broccoli, peppers, Brussels sprouts, tomatoes, cabbage, potatoes, and leafy green vegetables like turnip greens and spinach.</span><br data-dcnode-id="1876"><span data-dcnode-id="1875" instrument_node=""> Treatment To Stop Bleeding</span></p><p data-dcnode-id="1872"><span data-dcnode-id="1873" instrument_node="">If blood loss is causing iron-deficiency anemia, treatment will depend on the cause of the bleeding. For example, if you have a bleeding ulcer, your doctor may prescribe antibiotics and other medicines to treat the ulcer.</span></p><p data-dcnode-id="1870"><span data-dcnode-id="1871" instrument_node="">If a polyp or cancerous tumor in your intestine is causing bleeding, you may need surgery to remove the growth.</span></p><p data-dcnode-id="1868"><span data-dcnode-id="1869" instrument_node="">If you have heavy menstrual flow, your doctor may prescribe birth control pills to help reduce your monthly blood flow. In some cases, surgery may be advised.</span></p><h4 data-dcnode-id="1865"><span data-dcnode-id="1866" id="Treatments_for_Severe_Iron-Deficiency_Anemia"><span data-dcnode-id="1867" instrument_node="">Treatments for Severe Iron-Deficiency Anemia</span></span></h4><ul data-dcnode-id="1861"><li data-dcnode-id="1862"><strong data-dcnode-id="1863"><span data-dcnode-id="1864" instrument_node="">Blood Transfusion</span></strong></li></ul><p data-dcnode-id="1859"><span data-dcnode-id="1860" instrument_node="">If your iron-deficiency anemia is severe, you may get a transfusion of red blood cells. A blood transfusion is a safe, common procedure in which blood is given to you through an IV line in one of your blood vessels. A transfusion requires careful matching of donated blood with the recipient’s blood.</span></p><p data-dcnode-id="1857"><span data-dcnode-id="1858" instrument_node="">A transfusion of red blood cells will treat your anemia right away. The red blood cells also give a source of iron that your body can reuse. However, a blood transfusion is only a short-term treatment. Your doctor will need to find and treat the cause of your anemia.</span></p><p data-dcnode-id="1855"><span data-dcnode-id="1856" instrument_node="">Blood transfusions are usually reserved for people whose anemia puts them at a higher risk for heart problems or other severe health issues.</span></p><ul data-dcnode-id="1851"><li data-dcnode-id="1852"><strong data-dcnode-id="1853"><span data-dcnode-id="1854" instrument_node="">Iron Therapy</span></strong></li></ul><p data-dcnode-id="1849"><span data-dcnode-id="1850" instrument_node="">If you have severe anemia, your doctor may recommend iron therapy. For this treatment, iron is injected into a muscle or an IV line in one of your blood vessels.</span></p><p data-dcnode-id="1847"><span data-dcnode-id="1848" instrument_node="">IV iron therapy presents some safety concerns. It must be done in a hospital or clinic by experienced staff. Iron therapy usually is given to people who need iron long-term but can’t take iron supplements by mouth. This therapy also is given to people who need immediate treatment for iron-deficiency anemia.</span></p><h3 data-dcnode-id="1844"><span data-dcnode-id="1845" id="What_Is_Pernicious_Anemia"><span data-dcnode-id="1846" instrument_node="">What Is Pernicious Anemia ?</span></span></h3><p data-dcnode-id="1838"><span data-dcnode-id="1843" instrument_node="">Pernicious anemia is a condition in which the body can’t make enough healthy red blood cells because it doesn’t have enough vitamin B12 </span><sup class="footnote_plugin_tooltip_text" data-dcnode-id="1841" id="footnote_plugin_tooltip_5" onclick="footnote_moveToAnchor('footnote_plugin_reference_5');"><span data-dcnode-id="1842" instrument_node="">5)</span></sup><span class="footnote_tooltip" data-dcnode-id="1840" id="footnote_plugin_tooltip_text_5"></span><span data-dcnode-id="1839" instrument_node="">. Without enough vitamin B12, your red blood cells don’t divide normally and are too large. They may have trouble getting out of the bone marrow—a sponge-like tissue inside the bones where blood cells are made.</span></p><p data-dcnode-id="1836"><span data-dcnode-id="1837" instrument_node="">Pernicious anemia is one of two major types of “macrocystic” or “megaloblastic” (large red blood cell) anemia. These terms refer to anemia in which the red blood cells are larger than normal. The other major type of macrocystic anemia is caused by folic acid deficiency.</span></p><p data-dcnode-id="1834"><span data-dcnode-id="1835" instrument_node="">Rarely, children are born with an inherited disorder that prevents their bodies from making intrinsic factor. This disorder is called congenital pernicious anemia.</span></p><p data-dcnode-id="1832"><span data-dcnode-id="1833" instrument_node="">Vitamin B12 deficiency also is called cobalamin deficiency and combined systems disease.</span></p><p data-dcnode-id="1830"><span data-dcnode-id="1831" instrument_node="">The term “pernicious” means “deadly.” The condition is called pernicious anemia because it often was fatal in the past, before vitamin B12 treatments were available. Now, pernicious anemia usually is easy to treat with vitamin B12 pills or shots.</span></p><p data-dcnode-id="1828"><span data-dcnode-id="1829" instrument_node="">Vitamin B12 is a nutrient found in some foods. The body needs this nutrient to make healthy red blood cells and to keep its nervous system working properly.</span></p><p data-dcnode-id="1822"><span data-dcnode-id="1827" instrument_node="">People who have pernicious anemia can’t absorb enough vitamin B12 from food. This is because they lack intrinsic factor, a protein made in the stomach </span><sup class="footnote_plugin_tooltip_text" data-dcnode-id="1825" id="footnote_plugin_tooltip_6" onclick="footnote_moveToAnchor('footnote_plugin_reference_6');"><span data-dcnode-id="1826" instrument_node="">6)</span></sup><span class="footnote_tooltip" data-dcnode-id="1824" id="footnote_plugin_tooltip_text_6"></span><span data-dcnode-id="1823" instrument_node="">. A lack of this protein leads to vitamin B12 deficiency.</span></p><p data-dcnode-id="1816"><span data-dcnode-id="1821" instrument_node="">Other conditions and factors also can cause vitamin B12 deficiency. Examples include infections, surgery, medicines, and diet. Technically, the term “pernicious anemia” refers to vitamin B12 deficiency due to a lack of intrinsic factor </span><sup class="footnote_plugin_tooltip_text" data-dcnode-id="1819" id="footnote_plugin_tooltip_7" onclick="footnote_moveToAnchor('footnote_plugin_reference_7');"><span data-dcnode-id="1820" instrument_node="">7)</span></sup><span class="footnote_tooltip" data-dcnode-id="1818" id="footnote_plugin_tooltip_text_7"></span><span data-dcnode-id="1817" instrument_node="">. Often though, vitamin B12 deficiency due to other causes also is called pernicious anemia.</span></p><p data-dcnode-id="1810"><span data-dcnode-id="1815" instrument_node="">Without enough red blood cells to carry oxygen to your body, you may feel tired and weak. Severe or long-lasting pernicious anemia can damage the heart, brain, and other organs in the body </span><sup class="footnote_plugin_tooltip_text" data-dcnode-id="1813" id="footnote_plugin_tooltip_8" onclick="footnote_moveToAnchor('footnote_plugin_reference_8');"><span data-dcnode-id="1814" instrument_node="">8)</span></sup><span class="footnote_tooltip" data-dcnode-id="1812" id="footnote_plugin_tooltip_text_8"></span><span data-dcnode-id="1811" instrument_node="">.</span></p><p data-dcnode-id="1804"><span data-dcnode-id="1809" instrument_node="">Pernicious anemia also can cause other problems, such as nerve damage, neurological problems (such as memory loss), and digestive tract problems. People who have pernicious anemia also may be at higher risk for weakened bone strength and stomach cancer </span><sup class="footnote_plugin_tooltip_text" data-dcnode-id="1807" id="footnote_plugin_tooltip_9" onclick="footnote_moveToAnchor('footnote_plugin_reference_9');"><span data-dcnode-id="1808" instrument_node="">9)</span></sup><span class="footnote_tooltip" data-dcnode-id="1806" id="footnote_plugin_tooltip_text_9"></span><span data-dcnode-id="1805" instrument_node="">.</span></p><p data-dcnode-id="1802"><span data-dcnode-id="1803" instrument_node="">With ongoing care and proper treatment, most people who have pernicious anemia can recover, feel well, and live normal lives.</span></p><p data-dcnode-id="1800"><span data-dcnode-id="1801" instrument_node="">Without treatment, pernicious anemia can lead to serious problems with the heart, nerves, and other parts of the body. Some of these problems may be permanent.</span></p><h4 data-dcnode-id="1797"><span data-dcnode-id="1798" id="What_Causes_Pernicious_Anemia"><span data-dcnode-id="1799" instrument_node="">What Causes Pernicious Anemia ?</span></span></h4><p data-dcnode-id="1795"><span data-dcnode-id="1796" instrument_node="">Pernicious anemia is caused by a lack of intrinsic factor or other causes, such as infections, surgery, medicines, or diet.</span></p><h5 data-dcnode-id="1792"><span data-dcnode-id="1793" id="Lack_of_Intrinsic_Factor"><span data-dcnode-id="1794" instrument_node="">Lack of Intrinsic Factor</span></span></h5><p data-dcnode-id="1790"><span data-dcnode-id="1791" instrument_node="">Intrinsic factor is a protein made in the stomach. It helps your body absorb vitamin B12. In some people, an autoimmune response causes a lack of intrinsic factor.</span></p><p data-dcnode-id="1788"><span data-dcnode-id="1789" instrument_node="">An autoimmune response occurs if the body’s immune system makes antibodies (proteins) that mistakenly attack and damage the body’s tissues or cells.</span></p><p data-dcnode-id="1786"><span data-dcnode-id="1787" instrument_node="">In pernicious anemia, the body makes antibodies that attack and destroy the parietal cells. These cells line the stomach and make intrinsic factor. Why this autoimmune response occurs isn’t known.</span></p><p data-dcnode-id="1784"><span data-dcnode-id="1785" instrument_node="">As a result of this attack, the stomach stops making intrinsic factor. Without intrinsic factor, your body can’t move vitamin B12 through the small intestine, where it’s absorbed. This leads to vitamin B12 deficiency.</span></p><p data-dcnode-id="1782"><span data-dcnode-id="1783" instrument_node="">A lack of intrinsic factor also can occur if you’ve had part or all of your stomach surgically removed. This type of surgery reduces the number of parietal cells available to make intrinsic factor.</span></p><p data-dcnode-id="1780"><span data-dcnode-id="1781" instrument_node="">Rarely, children are born with an inherited disorder that prevents their bodies from making intrinsic factor. This disorder is called congenital pernicious anemia.</span></p><p data-dcnode-id="1777"><strong data-dcnode-id="1778"><span data-dcnode-id="1779" instrument_node="">Other Causes</span></strong></p><p data-dcnode-id="1775"><span data-dcnode-id="1776" instrument_node="">Pernicious anemia also has other causes, besides a lack of intrinsic factor. Malabsorption in the small intestine and a diet lacking vitamin B12 both can lead to pernicious anemia.</span></p><h5 data-dcnode-id="1772"><span data-dcnode-id="1773" id="Malabsorption_in_the_Small_Intestine"><span data-dcnode-id="1774" instrument_node="">Malabsorption in the Small Intestine</span></span></h5><p data-dcnode-id="1770"><span data-dcnode-id="1771" instrument_node="">Sometimes pernicious anemia occurs because the body’s small intestine can’t properly absorb vitamin B12. This may be the result of:</span></p><ul data-dcnode-id="1759"><li data-dcnode-id="1768"><span data-dcnode-id="1769" instrument_node="">Too many of the wrong kind of bacteria in the small intestine. This is a common cause of pernicious anemia in older adults. The bacteria use up the available vitamin B12 before the small intestine can absorb it.</span></li><li data-dcnode-id="1766"><span data-dcnode-id="1767" instrument_node="">Diseases that interfere with vitamin B12 absorption. One example is celiac disease. This is a genetic disorder in which your body can’t tolerate a protein called gluten. Another example is Crohn’s disease, an inflammatory bowel disease. HIV also may interfere with vitamin B12 absorption.</span></li><li data-dcnode-id="1764"><span data-dcnode-id="1765" instrument_node="">Certain medicines that alter bacterial growth or prevent the small intestine from properly absorbing vitamin B12. Examples include antibiotics and certain diabetes and seizure medicines.</span></li><li data-dcnode-id="1762"><span data-dcnode-id="1763" instrument_node="">Surgical removal of part or all of the small intestine.</span></li><li data-dcnode-id="1760"><span data-dcnode-id="1761" instrument_node="">A tapeworm infection. The tapeworm feeds off of the vitamin B12. Eating undercooked, infected fish may cause this type of infection.</span></li></ul><h5 data-dcnode-id="1756"><span data-dcnode-id="1757" id="Diet_Lacking_Vitamin_B12"><span data-dcnode-id="1758" instrument_node="">Diet Lacking Vitamin B12</span></span></h5><p data-dcnode-id="1754"><span data-dcnode-id="1755" instrument_node="">Some people get pernicious anemia because they don’t have enough vitamin B12 in their diets. This cause of pernicious anemia is less common than other causes.</span></p><p data-dcnode-id="1752"><span data-dcnode-id="1753" instrument_node="">Good food sources of vitamin B12 include:</span></p><ul data-dcnode-id="1743"><li data-dcnode-id="1750"><span data-dcnode-id="1751" instrument_node="">Breakfast cereals with added vitamin B12</span></li><li data-dcnode-id="1748"><span data-dcnode-id="1749" instrument_node="">Meats such as beef, liver, poultry, and fish</span></li><li data-dcnode-id="1746"><span data-dcnode-id="1747" instrument_node="">Eggs and dairy products (such as milk, yogurt, and cheese)</span></li><li data-dcnode-id="1744"><span data-dcnode-id="1745" instrument_node="">Foods fortified with vitamin B12, such as soy-based beverages and vegetarian burgers</span></li></ul><p data-dcnode-id="1741"><span data-dcnode-id="1742" instrument_node="">Strict vegetarians who don’t eat any animal or dairy products and don’t take a vitamin B12 supplement are at risk for pernicious anemia.</span></p><p data-dcnode-id="1739"><span data-dcnode-id="1740" instrument_node="">Breastfed infants of strict vegetarian mothers also are at risk for pernicious anemia. These infants can develop anemia within months of being born. This is because they haven’t had enough time to store vitamin B12 in their bodies. Doctors treat these infants with vitamin B12 supplements.</span></p><p data-dcnode-id="1737"><span data-dcnode-id="1738" instrument_node="">Other groups, such as the elderly and people who suffer from alcoholism, also may be at risk for pernicious anemia. These people may not get the proper nutrients in their diets.</span></p><h4 data-dcnode-id="1734"><span data-dcnode-id="1735" id="Who_Is_at_Risk_for_Pernicious_Anemia"><span data-dcnode-id="1736" instrument_node="">Who Is at Risk for Pernicious Anemia ?</span></span></h4><p data-dcnode-id="1732"><span data-dcnode-id="1733" instrument_node="">Pernicious anemia is more common in people of Northern European and African descent than in other ethnic groups.</span></p><p data-dcnode-id="1730"><span data-dcnode-id="1731" instrument_node="">Older people also are at higher risk for the condition. This is mainly due to a lack of stomach acid and intrinsic factor, which prevents the small intestine from absorbing vitamin B12. As people grow older, they tend to make less stomach acid.</span></p><p data-dcnode-id="1728"><span data-dcnode-id="1729" instrument_node="">Pernicious anemia also can occur in younger people and other populations. You’re at higher risk for pernicious anemia if you:</span></p><ul data-dcnode-id="1713"><li data-dcnode-id="1726"><span data-dcnode-id="1727" instrument_node="">Have a family history of the condition.</span></li><li data-dcnode-id="1724"><span data-dcnode-id="1725" instrument_node="">Have had part or all of your stomach surgically removed. The stomach makes intrinsic factor. This protein helps your body absorb vitamin B12.</span></li><li data-dcnode-id="1722"><span data-dcnode-id="1723" instrument_node="">Have an autoimmune disorder that involves the endocrine glands, such as Addison’s disease, type 1 diabetes, Graves’ disease, or vitiligo. Research suggests a link may exist between these autoimmune disorders and pernicious anemia that’s caused by an autoimmune response.</span></li><li data-dcnode-id="1720"><span data-dcnode-id="1721" instrument_node="">Have had part or all of your small intestine surgically removed. The small intestine is where vitamin B12 is absorbed.</span></li><li data-dcnode-id="1718"><span data-dcnode-id="1719" instrument_node="">Have certain intestinal diseases or other disorders that may prevent your body from properly absorbing vitamin B12. Examples include Crohn’s disease, intestinal infections, and HIV.</span></li><li data-dcnode-id="1716"><span data-dcnode-id="1717" instrument_node="">Take medicines that prevent your body from properly absorbing vitamin B12. Examples of such medicines include antibiotics and certain seizure medicines.</span></li><li data-dcnode-id="1714"><span data-dcnode-id="1715" instrument_node="">Are a strict vegetarian who doesn’t eat any animal or dairy products and doesn’t take a vitamin B12 supplement, or if you eat poorly overall.</span></li></ul><h4 data-dcnode-id="1710"><span data-dcnode-id="1711" id="What_Are_the_Signs_and_Symptoms_of_Pernicious_Anemia"><span data-dcnode-id="1712" instrument_node="">What Are the Signs and Symptoms of Pernicious Anemia ?</span></span></h4><p data-dcnode-id="1708"><span data-dcnode-id="1709" instrument_node="">A lack of vitamin B12 (vitamin B12 deficiency) causes the signs and symptoms of pernicious anemia. Without enough vitamin B12, your body can’t make enough healthy red blood cells, which causes anemia.</span></p><p data-dcnode-id="1706"><span data-dcnode-id="1707" instrument_node="">Some of the signs and symptoms of pernicious anemia apply to all types of anemia. Other signs and symptoms are specific to a lack of vitamin B12.</span></p><ul data-dcnode-id="1702"><li data-dcnode-id="1703"><strong data-dcnode-id="1704"><span data-dcnode-id="1705" instrument_node="">Signs and Symptoms of Anemia</span></strong></li></ul><p data-dcnode-id="1700"><span data-dcnode-id="1701" instrument_node="">The most common symptom of all types of anemia is fatigue (tiredness). Fatigue occurs because your body doesn’t have enough red blood cells to carry oxygen to its various parts.</span></p><p data-dcnode-id="1698"><span data-dcnode-id="1699" instrument_node="">A low red blood cell count also can cause shortness of breath, dizziness, headache, coldness in your hands and feet, pale or yellowish skin, and chest pain.</span></p><p data-dcnode-id="1696"><span data-dcnode-id="1697" instrument_node="">A lack of red blood cells also means that your heart has to work harder to move oxygen-rich blood through your body. This can lead to irregular heartbeats called arrhythmias, heart murmur, an enlarged heart, or even heart failure.</span></p><ul data-dcnode-id="1692"><li data-dcnode-id="1693"><strong data-dcnode-id="1694"><span data-dcnode-id="1695" instrument_node="">Signs and Symptoms of Vitamin B12 Deficiency</span></strong></li></ul><p data-dcnode-id="1690"><span data-dcnode-id="1691" instrument_node="">Vitamin B12 deficiency may lead to nerve damage. This can cause tingling and numbness in your hands and feet, muscle weakness, and loss of reflexes. You also may feel unsteady, lose your balance, and have trouble walking. Vitamin B12 deficiency can cause weakened bones and may lead to hip fractures.</span></p><p data-dcnode-id="1688"><span data-dcnode-id="1689" instrument_node="">Severe vitamin B12 deficiency can cause neurological problems, such as confusion, dementia, depression, and memory loss.</span></p><p data-dcnode-id="1686"><span data-dcnode-id="1687" instrument_node="">Other symptoms of vitamin B12 deficiency involve the digestive tract. These symptoms include nausea (feeling sick to your stomach) and vomiting, heartburn, abdominal bloating and gas, constipation or diarrhea, loss of appetite, and weight loss. An enlarged liver is another symptom.</span></p><p data-dcnode-id="1684"><span data-dcnode-id="1685" instrument_node="">A smooth, thick, red tongue also is a sign of vitamin B12 deficiency and pernicious anemia.</span></p><p data-dcnode-id="1682"><span data-dcnode-id="1683" instrument_node="">Infants who have vitamin B12 deficiency may have poor reflexes or unusual movements, such as face tremors. They may have trouble feeding due to tongue and throat problems. They also may be irritable. If vitamin B12 deficiency isn’t treated, these infants may have permanent growth problems.</span></p><h4 data-dcnode-id="1679"><span data-dcnode-id="1680" id="How_Is_Pernicious_Anemia_Diagnosed"><span data-dcnode-id="1681" instrument_node="">How Is Pernicious Anemia Diagnosed ?</span></span></h4><p data-dcnode-id="1677"><span data-dcnode-id="1678" instrument_node="">Your doctor will diagnose pernicious anemia based on your medical and family histories, a physical exam, and test results.</span></p><p data-dcnode-id="1675"><span data-dcnode-id="1676" instrument_node="">Your doctor will want to find out whether the condition is due to a lack of intrinsic factor or another cause. He or she also will want to find out the severity of the condition, so it can be properly treated.</span></p><p data-dcnode-id="1672"><strong data-dcnode-id="1673"><span data-dcnode-id="1674" instrument_node="">Specialists Involved</span></strong></p><p data-dcnode-id="1670"><span data-dcnode-id="1671" instrument_node="">Primary care doctors—such as family doctors, internists, and pediatricians (doctors who treat children)—often diagnose and treat pernicious anemia. Other kinds of doctors also may be involved, including:</span></p><ul data-dcnode-id="1661"><li data-dcnode-id="1668"><span data-dcnode-id="1669" instrument_node="">A neurologist (nervous system specialist)</span></li><li data-dcnode-id="1666"><span data-dcnode-id="1667" instrument_node="">A cardiologist (heart specialist)</span></li><li data-dcnode-id="1664"><span data-dcnode-id="1665" instrument_node="">A hematologist (blood disease specialist)</span></li><li data-dcnode-id="1662"><span data-dcnode-id="1663" instrument_node="">A gastroenterologist (digestive tract specialist)</span></li></ul><p data-dcnode-id="1658"><strong data-dcnode-id="1659"><span data-dcnode-id="1660" instrument_node="">Medical and Family Histories</span></strong></p><p data-dcnode-id="1656"><span data-dcnode-id="1657" instrument_node="">Your doctor may ask about your signs and symptoms. He or she also may ask:</span></p><ul data-dcnode-id="1645"><li data-dcnode-id="1654"><span data-dcnode-id="1655" instrument_node="">Whether you’ve had any stomach or intestinal surgeries</span></li><li data-dcnode-id="1652"><span data-dcnode-id="1653" instrument_node="">Whether you have any digestive disorders, such as celiac disease or Crohn’s disease</span></li><li data-dcnode-id="1650"><span data-dcnode-id="1651" instrument_node="">About your diet and any medicines you take</span></li><li data-dcnode-id="1648"><span data-dcnode-id="1649" instrument_node="">Whether you have a family history of anemia or pernicious anemia</span></li><li data-dcnode-id="1646"><span data-dcnode-id="1647" instrument_node="">Whether you have a family history of autoimmune disorders (such as Addison’s disease, type 1 diabetes, Graves’ disease, or vitiligo). Research suggests a link may exist between these autoimmune disorders and pernicious anemia that’s caused by an autoimmune response.</span></li></ul><p data-dcnode-id="1642"><strong data-dcnode-id="1643"><span data-dcnode-id="1644" instrument_node="">Physical Exam</span></strong></p><p data-dcnode-id="1640"><span data-dcnode-id="1641" instrument_node="">During the physical exam, your doctor may check for pale or yellowish skin and an enlarged liver. He or she may listen to your heart for rapid or irregular heartbeats or a heart murmur.</span></p><p data-dcnode-id="1638"><span data-dcnode-id="1639" instrument_node="">Your doctor also may check for signs of nerve damage. He or she may want to see how well your muscles, eyes, senses, and reflexes work. Your doctor may ask questions or do tests to check your mental status, coordination, and ability to walk.</span></p><p data-dcnode-id="1635"><strong data-dcnode-id="1636"><span data-dcnode-id="1637" instrument_node="">Diagnostic Tests and Procedures</span></strong></p><p data-dcnode-id="1633"><span data-dcnode-id="1634" instrument_node="">Blood tests and procedures can help diagnose pernicious anemia and find out what’s causing it.</span></p><ul data-dcnode-id="1629"><li data-dcnode-id="1630"><strong data-dcnode-id="1631"><span data-dcnode-id="1632" instrument_node="">Complete Blood Count</span></strong></li></ul><p data-dcnode-id="1627"><span data-dcnode-id="1628" instrument_node="">Often, the first test used to diagnose many types of anemia is a complete blood count (CBC). This test measures many parts of your blood. For this test, a small amount of blood is drawn from a vein (usually in your arm) using a needle.</span></p><p data-dcnode-id="1625"><span data-dcnode-id="1626" instrument_node="">A CBC checks your hemoglobin and hematocrit levels. Hemoglobin is an iron-rich protein that helps red blood cells carry oxygen from the lungs to the rest of the body. Hematocrit is a measure of how much space red blood cells take up in your blood. A low level of hemoglobin or hematocrit is a sign of anemia.</span></p><p data-dcnode-id="1623"><span data-dcnode-id="1624" instrument_node="">The normal range of these levels may be lower in certain racial and ethnic populations. Your doctor can explain your test results to you.</span></p><p data-dcnode-id="1621"><span data-dcnode-id="1622" instrument_node="">The CBC also checks the number of red blood cells, white blood cells, and platelets in your blood. Abnormal results may be a sign of anemia, another blood disorder, an infection, or another condition.</span></p><p data-dcnode-id="1619"><span data-dcnode-id="1620" instrument_node="">Finally, the CBC looks at mean corpuscular volume (MCV). MCV is a measure of the average size of your red blood cells. MCV can be a clue as to what’s causing your anemia. In pernicious anemia, the red blood cells tend to be larger than normal.</span></p><ul data-dcnode-id="1615"><li data-dcnode-id="1616"><strong data-dcnode-id="1617"><span data-dcnode-id="1618" instrument_node="">Other Blood Tests</span></strong></li></ul><p data-dcnode-id="1613"><span data-dcnode-id="1614" instrument_node="">If the CBC results confirm that you have anemia, you may need other blood tests to find out what type of anemia you have.</span></p><p data-dcnode-id="1608"><span data-dcnode-id="1612" instrument_node="">A </span><strong data-dcnode-id="1610"><span data-dcnode-id="1611" instrument_node="">reticulocyte count</span></strong><span data-dcnode-id="1609" instrument_node=""> measures the number of young red blood cells in your blood. The test shows whether your bone marrow is making red blood cells at the correct rate. People who have pernicious anemia have low reticulocyte counts.</span></p><p data-dcnode-id="1604"><strong data-dcnode-id="1606"><span data-dcnode-id="1607" instrument_node="">Serum folate, iron, and iron-binding capacity tests</span></strong><span data-dcnode-id="1605" instrument_node=""> also can help show whether you have pernicious anemia or another type of anemia.</span></p><p data-dcnode-id="1602"><span data-dcnode-id="1603" instrument_node="">Another common test, called the Combined Binding Luminescence Test, sometimes gives false results. Scientists are working to develop a more reliable test.</span></p><p data-dcnode-id="1600"><span data-dcnode-id="1601" instrument_node="">Your doctor may recommend other blood tests to check:</span></p><ul data-dcnode-id="1593"><li data-dcnode-id="1598"><span data-dcnode-id="1599" instrument_node="">Your vitamin B12 level. A low level of vitamin B12 in the blood indicates pernicious anemia. However, a falsely normal or high value of vitamin B12 in the blood may occur if antibodies interfere with the test.</span></li><li data-dcnode-id="1596"><span data-dcnode-id="1597" instrument_node="">Your homocysteine and methylmalonic acid levels. High levels of these substances in your body are a sign of pernicious anemia.</span></li><li data-dcnode-id="1594"><span data-dcnode-id="1595" instrument_node="">For intrinsic factor antibodies and parietal cell antibodies. These antibodies also are a sign of pernicious anemia.</span></li></ul><p data-dcnode-id="1590"><strong data-dcnode-id="1591"><span data-dcnode-id="1592" instrument_node="">Bone Marrow Tests</span></strong></p><p data-dcnode-id="1588"><span data-dcnode-id="1589" instrument_node="">Bone marrow tests can show whether your bone marrow is healthy and making enough red blood cells. The two bone marrow tests are aspiration and biopsy.</span></p><p data-dcnode-id="1586"><span data-dcnode-id="1587" instrument_node="">For aspiration, your doctor removes a small amount of fluid bone marrow through a needle. For a biopsy, your doctor removes a small amount of bone marrow tissue through a larger needle. The samples are then examined under a microscope.</span></p><p data-dcnode-id="1584"><span data-dcnode-id="1585" instrument_node="">In pernicious anemia, the bone marrow cells that turn into blood cells are larger than normal.</span></p><h4 data-dcnode-id="1581"><span data-dcnode-id="1582" id="How_Is_Pernicious_Anemia_Treated"><span data-dcnode-id="1583" instrument_node="">How Is Pernicious Anemia Treated ?</span></span></h4><p data-dcnode-id="1579"><span data-dcnode-id="1580" instrument_node="">Doctors treat pernicious anemia by replacing the missing vitamin B12 in the body. People who have pernicious anemia may need lifelong treatment.</span></p><p data-dcnode-id="1577"><span data-dcnode-id="1578" instrument_node="">The goals of treating pernicious anemia include:</span></p><ul data-dcnode-id="1570"><li data-dcnode-id="1575"><span data-dcnode-id="1576" instrument_node="">Preventing or treating the anemia and its signs and symptoms</span></li><li data-dcnode-id="1573"><span data-dcnode-id="1574" instrument_node="">Preventing or managing complications, such as heart and nerve damage</span></li><li data-dcnode-id="1571"><span data-dcnode-id="1572" instrument_node="">Treating the cause of the pernicious anemia (if a cause can be found)</span></li></ul><p data-dcnode-id="1567"><strong data-dcnode-id="1568"><span data-dcnode-id="1569" instrument_node="">Specific Types of Treatment</span></strong></p><p data-dcnode-id="1565"><span data-dcnode-id="1566" instrument_node="">Pernicious anemia usually is easy to treat with vitamin B12 shots or pills.</span></p><p data-dcnode-id="1563"><span data-dcnode-id="1564" instrument_node="">If you have severe pernicious anemia, your doctor may recommend shots first. Shots usually are given in a muscle every day or every week until the level of vitamin B12 in your blood increases. After your vitamin B12 blood level returns to normal, you may get a shot only once a month.</span></p><p data-dcnode-id="1561"><span data-dcnode-id="1562" instrument_node="">For less severe pernicious anemia, your doctor may recommend large doses of vitamin B12 pills. A vitamin B12 nose gel and spray also are available. These products may be useful for people who have trouble swallowing pills, such as older people who have had strokes.</span></p><p data-dcnode-id="1559"><span data-dcnode-id="1560" instrument_node="">Your signs and symptoms may begin to improve within a few days after you start treatment. Your doctor may advise you to limit your physical activity until your condition improves.</span></p><p data-dcnode-id="1557"><span data-dcnode-id="1558" instrument_node="">If your pernicious anemia is caused by something other than a lack of intrinsic factor, you may get treatment for the cause (if a cause can be found). For example, your doctor may prescribe medicines to treat a condition that prevents your body from absorbing vitamin B12.</span></p><p data-dcnode-id="1555"><span data-dcnode-id="1556" instrument_node="">If medicines are the cause of your pernicious anemia, your doctor may change the type or dose of medicine you take. Infants of strict vegetarian mothers may be given vitamin B12 supplements from birth.</span></p><h3 data-dcnode-id="1552"><span data-dcnode-id="1553" id="Sickle_Cell_Disease"><span data-dcnode-id="1554" instrument_node="">Sickle Cell Disease</span></span></h3><p data-dcnode-id="1546"><span data-dcnode-id="1551" instrument_node="">The term sickle cell disease describes a group of inherited red blood cell disorders. People with sickle cell disease have abnormal hemoglobin, called hemoglobin S or sickle hemoglobin, in their red blood cells </span><sup class="footnote_plugin_tooltip_text" data-dcnode-id="1549" id="footnote_plugin_tooltip_10" onclick="footnote_moveToAnchor('footnote_plugin_reference_10');"><span data-dcnode-id="1550" instrument_node="">10)</span></sup><span class="footnote_tooltip" data-dcnode-id="1548" id="footnote_plugin_tooltip_text_10"></span><span data-dcnode-id="1547" instrument_node="">.</span></p><p data-dcnode-id="1544"><span data-dcnode-id="1545" instrument_node="">Hemoglobin is a protein in red blood cells that carries oxygen throughout the body.</span></p><p data-dcnode-id="1542"><span data-dcnode-id="1543" instrument_node="">“Inherited” means that the disease is passed by genes from parents to their children. Sickle Cell Disease is not contagious. A person cannot catch it, like a cold or infection, from someone else.</span></p><p data-dcnode-id="1540"><span data-dcnode-id="1541" instrument_node="">People who have sickle cell disease inherit two abnormal hemoglobin genes, one from each parent. In all forms of sickle cell disease, at least one of the two abnormal genes causes a person’s body to make hemoglobin S. When a person has two hemoglobin S genes, Hemoglobin SS, the disease is called sickle cell anemia. This is the most common and often most severe kind of sickle cell disease.</span></p><p data-dcnode-id="1534"><span data-dcnode-id="1539" instrument_node="">In the United States, most people with sickle cell disease are of African ancestry or identify themselves as black </span><sup class="footnote_plugin_tooltip_text" data-dcnode-id="1537" id="footnote_plugin_tooltip_11" onclick="footnote_moveToAnchor('footnote_plugin_reference_11');"><span data-dcnode-id="1538" instrument_node="">11)</span></sup><span class="footnote_tooltip" data-dcnode-id="1536" id="footnote_plugin_tooltip_text_11"></span><span data-dcnode-id="1535" instrument_node="">.</span></p><ul data-dcnode-id="1529"><li data-dcnode-id="1532"><span data-dcnode-id="1533" instrument_node="">About 1 in 13 African American babies is born with sickle cell trait.</span></li><li data-dcnode-id="1530"><span data-dcnode-id="1531" instrument_node="">About 1 in every 365 black children is born with sickle cell disease.</span></li></ul><p data-dcnode-id="1527"><span data-dcnode-id="1528" instrument_node="">There are also many people with this disease who come from Hispanic, southern European, Middle Eastern, or Asian Indian backgrounds.</span></p><p data-dcnode-id="1525"><span data-dcnode-id="1526" instrument_node="">Approximately 100,000 Americans have sickle cell disease.</span></p><p data-dcnode-id="1523"><span data-dcnode-id="1524" instrument_node="">Hemoglobin SC disease and hemoglobin Sβ thalassemia are two other common forms of sickle cell disease.</span></p><h4 data-dcnode-id="1520"><span data-dcnode-id="1521" id="Some_Forms_of_Sickle_Cell_Disease"><span data-dcnode-id="1522" instrument_node="">Some Forms of Sickle Cell Disease</span></span></h4><ul data-dcnode-id="1507"><li data-dcnode-id="1518"><span data-dcnode-id="1519" instrument_node="">Hemoglobin SS</span></li><li data-dcnode-id="1516"><span data-dcnode-id="1517" instrument_node="">Hemoglobin SC</span></li><li data-dcnode-id="1514"><span data-dcnode-id="1515" instrument_node="">Hemoglobin Sβ0 thalassemia</span></li><li data-dcnode-id="1512"><span data-dcnode-id="1513" instrument_node="">Hemoglobin Sβ+ thalassemia</span></li><li data-dcnode-id="1510"><span data-dcnode-id="1511" instrument_node="">Hemoglobin SD</span></li><li data-dcnode-id="1508"><span data-dcnode-id="1509" instrument_node="">Hemoglobin SE</span></li></ul><p data-dcnode-id="1505"><span data-dcnode-id="1506" instrument_node="">Cells in tissues need a steady supply of oxygen to work well. Normally, hemoglobin in red blood cells takes up oxygen in the lungs and carries it to all the tissues of the body.</span></p><p data-dcnode-id="1503"><span data-dcnode-id="1504" instrument_node="">Red blood cells that contain normal hemoglobin are disc shaped (like a doughnut without a hole). This shape allows the cells to be flexible so that they can move through large and small blood vessels to deliver oxygen.</span></p><p data-dcnode-id="1501"><span data-dcnode-id="1502" instrument_node="">Sickle hemoglobin is not like normal hemoglobin. It can form stiff rods within the red cell, changing it into a crescent, or sickle shape.</span></p><p data-dcnode-id="1499"><span data-dcnode-id="1500" instrument_node="">Sickle-shaped cells are not flexible and can stick to vessel walls, causing a blockage that slows or stops the flow of blood. When this happens, oxygen can’t reach nearby tissues.</span></p><p data-dcnode-id="1496"><strong data-dcnode-id="1497"><span data-dcnode-id="1498" instrument_node="">Figure 8. Sickle cell anemia</span></strong></p><div class="entry-image" data-dcnode-id="1493"><a class="external single-popup" data-dcnode-id="1494" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//healthjade.com/wp-content/uploads/2017/09/sickle-cell-anemia.jpg" rel="nofollow"><img alt="sickle cell anemia" class="aligncenter wp-image-7453 size-full" data-dcnode-id="1495" height="1142" sizes="(max-width: 1500px) 100vw, 1500px" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//healthjade.com/wp-content/uploads/2017/09/sickle-cell-anemia.jpg&amp;raw" srcset="https://healthjade.net/wp-content/uploads/2017/09/sickle-cell-anemia.jpg 1500w, https://healthjade.net/wp-content/uploads/2017/09/sickle-cell-anemia-300x228.jpg 300w, https://healthjade.net/wp-content/uploads/2017/09/sickle-cell-anemia-768x585.jpg 768w, https://healthjade.net/wp-content/uploads/2017/09/sickle-cell-anemia-1024x780.jpg 1024w" width="1500"></a></div><p data-dcnode-id="1491"><span data-dcnode-id="1492" instrument_node="">The lack of tissue oxygen can cause attacks of sudden, severe pain, called pain crises. These pain attacks can occur without warning, and a person often needs to go to the hospital for effective treatment.</span></p><p data-dcnode-id="1489"><span data-dcnode-id="1490" instrument_node="">Most children with sickle cell disease are pain free between painful crises, but adolescents and adults may also suffer with chronic ongoing pain.</span></p><p data-dcnode-id="1487"><span data-dcnode-id="1488" instrument_node="">The red cell sickling and poor oxygen delivery can also cause organ damage. Over a lifetime, sickle cell disease can harm a person’s spleen, brain, eyes, lungs, liver, heart, kidneys, penis, joints, bones, or skin.</span></p><p data-dcnode-id="1485"><span data-dcnode-id="1486" instrument_node="">Sickle cells can’t change shape easily, so they tend to burst apart or hemolyze. Normal red blood cells live about 90 to 120 days, but sickle cells last only 10 to 20 days.</span></p><p data-dcnode-id="1483"><span data-dcnode-id="1484" instrument_node="">The body is always making new red blood cells to replace the old cells; however, in sickle cell disease the body may have trouble keeping up with how fast the cells are being destroyed. Because of this, the number of red blood cells is usually lower than normal. This condition, called anemia, can make a person have less energy.</span></p><p data-dcnode-id="1481"><span data-dcnode-id="1482" instrument_node="">Sickle cell disease is a life-long illness. The severity of the disease varies widely from person to person.</span></p><p data-dcnode-id="1479"><span data-dcnode-id="1480" instrument_node="">In high-income countries like the United States, the life expectancy of a person with sickle cell disease is now about 40–60 years. In 1973, the average lifespan of
