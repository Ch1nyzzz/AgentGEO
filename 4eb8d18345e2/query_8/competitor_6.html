</span><div class="highwire-markup" data-dcnode-id="1876"><div class="content-block-markup" data-dcnode-id="1877" data-highwire-cite-ref-tooltip-instance="highwire_reflinks_tooltip" xmlns="http://www.w3.org/1999/xhtml" xmlns:xhtml="http://www.w3.org/1999/xhtml"><div class="article fulltext-view" data-dcnode-id="1879"><span class="highwire-journal-article-marker-start" data-dcnode-id="4782"></span><div class="section abstract" data-dcnode-id="4771" id="abstract-1"><h2 data-dcnode-id="4780"><span data-dcnode-id="4781" instrument_node="">Abstract</span></h2><span data-dcnode-id="4779" instrument_node="">

</span></p><span data-dcnode-id="4772" instrument_node="">
</span></div><ul class="kwd-group KWD" data-dcnode-id="4752"><li class="kwd" data-dcnode-id="4768"><a class="hw-term hw-article-keyword hw-article-keyword-helium" data-dcnode-id="4769" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//erj.ersjournals.com/keyword/helium" rel="nofollow"><span data-dcnode-id="4770" instrument_node="">Helium</span></a></li><li class="kwd" data-dcnode-id="4765"><a class="hw-term hw-article-keyword hw-article-keyword-lung-function" data-dcnode-id="4766" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//erj.ersjournals.com/keyword/lung-function" rel="nofollow"><span data-dcnode-id="4767" instrument_node="">lung function</span></a></li><li class="kwd" data-dcnode-id="4762"><a class="hw-term hw-article-keyword hw-article-keyword-lung-physiology" data-dcnode-id="4763" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//erj.ersjournals.com/search/%2520text_abstract_title%253Alung%252Bphysiology%2520text_abstract_title_flags%253Amatch-phrase%2520sort%253Apublication-date" rel="nofollow"><span data-dcnode-id="4764" instrument_node="">lung physiology</span></a></li><li class="kwd" data-dcnode-id="4759"><a class="hw-term hw-article-keyword hw-article-keyword-lung-volume-measurements" data-dcnode-id="4760" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//erj.ersjournals.com/search/%2520text_abstract_title%253Alung%252Bvolume%252Bmeasurements%2520text_abstract_title_flags%253Amatch-phrase%2520sort%253Apublication-date" rel="nofollow"><span data-dcnode-id="4761" instrument_node="">lung volume measurements</span></a></li><li class="kwd" data-dcnode-id="4756"><a class="hw-term hw-article-keyword hw-article-keyword-nitrogen" data-dcnode-id="4757" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//erj.ersjournals.com/search/%2520text_abstract_title%253Anitrogen%2520text_abstract_title_flags%253Amatch-phrase%2520sort%253Apublication-date" rel="nofollow"><span data-dcnode-id="4758" instrument_node="">nitrogen</span></a></li><li class="kwd" data-dcnode-id="4753"><a class="hw-term hw-article-keyword hw-article-keyword-radiology" data-dcnode-id="4754" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//erj.ersjournals.com/keyword/radiology" rel="nofollow"><span data-dcnode-id="4755" instrument_node="">radiology</span></a></li></ul><div class="section notes arthw-remark" data-dcnode-id="4731" id="notes-1"><div class="subsection" data-dcnode-id="4732" id="sec-1"><span data-dcnode-id="4751" instrument_node="">
</span><p data-dcnode-id="4746" id="p-2"><span data-dcnode-id="4750" instrument_node="">
</span><strong data-dcnode-id="4748"><span data-dcnode-id="4749" instrument_node="">SERIES “ATS/ERS TASK FORCE: STANDARDISATION OF LUNG FUNCTION TESTING”</span></strong><span data-dcnode-id="4747" instrument_node="">
</span></p><span data-dcnode-id="4745" instrument_node="">
</span><p data-dcnode-id="4740" id="p-3"><span data-dcnode-id="4744" instrument_node="">
</span><strong data-dcnode-id="4742"><span data-dcnode-id="4743" instrument_node="">Edited by V. Brusasco, R. Crapo and G. Viegi</span></strong><span data-dcnode-id="4741" instrument_node="">
</span></p><span data-dcnode-id="4739" instrument_node="">
</span><p data-dcnode-id="4734" id="p-4"><span data-dcnode-id="4738" instrument_node="">
</span><strong data-dcnode-id="4736"><span data-dcnode-id="4737" instrument_node="">Number 3 in this Series</span></strong><span data-dcnode-id="4735" instrument_node="">
</span></p><span data-dcnode-id="4733" instrument_node="">
</span></div></div><div class="section" data-dcnode-id="4699" id="sec-2"><span data-dcnode-id="4730" instrument_node="">
</span><h2 data-dcnode-id="4728"><span data-dcnode-id="4729" instrument_node="">BACKGROUND AND PURPOSE</span></h2><span data-dcnode-id="4727" instrument_node="">
</span><p data-dcnode-id="4725" id="p-5"><span data-dcnode-id="4726" instrument_node="">
</span></p><span data-dcnode-id="4724" instrument_node="">
</span><p data-dcnode-id="4719" id="p-7"><span data-dcnode-id="4723" instrument_node="">Inspired and expired lung volumes measured by spirometry are useful for detecting, characterising and quantifying the severity of lung disease. Measurements of absolute lung volumes, residual volume (RV), functional residual capacity (FRC) and total lung capacity (TLC) are technically more challenging, which limits their use in clinical practice. The role of lung volume measurements in the assessment of disease severity, functional disability, course of disease and response to treatment remains to be determined in infants, as well as in children and adults. Nevertheless, in particular circumstances, measurements of lung volume are strictly necessary for a correct physiological diagnosis </span><a class="xref-bibr" data-dcnode-id="4721" href="#ref-1" id="xref-ref-1-1"><span data-dcnode-id="4722" instrument_node="">1</span></a><span data-dcnode-id="4720" instrument_node="">.</span></p><span data-dcnode-id="4718" instrument_node="">
</span><p data-dcnode-id="4716" id="p-8"><span data-dcnode-id="4717" instrument_node="">In contrast to the relative simplicity of spirometric volumes, a variety of disparate techniques have been developed for the measurement of absolute lung volumes. These include the following: body plethysmography (using various methodologies), nitrogen washout, gas dilution, and radiographic imaging methods.</span></p><span data-dcnode-id="4715" instrument_node="">
</span><p data-dcnode-id="4701" id="p-9"><span data-dcnode-id="4714" instrument_node="">The present document integrates and consolidates the recommendations of the current American Thoracic Society (ATS)/European Respiratory Society Task Force on pulmonary function standards, and the recommendations from an earlier National Heart, Lung, and Blood Institute (NHLBI) workshop convened by the ATS. The NHLBI workshop participants, who were experts with considerable adult and paediatric experience, published their input in the form of background papers in the </span><em data-dcnode-id="4712"><span data-dcnode-id="4713" instrument_node="">European Respiratory Journal</span></em><span data-dcnode-id="4711" instrument_node=""> between 1995 and 1999 </span><a class="xref-bibr" data-dcnode-id="4709" href="#ref-2" id="xref-ref-2-1"><span data-dcnode-id="4710" instrument_node="">2</span></a><span data-dcnode-id="4708" instrument_node="">–</span><a class="xref-bibr" data-dcnode-id="4706" href="#ref-12" id="xref-ref-12-1"><span data-dcnode-id="4707" instrument_node="">12</span></a><span data-dcnode-id="4705" instrument_node="">. Later, a NHLBI workshop consensus document was written, which can be found on the ATS website </span><a class="xref-bibr" data-dcnode-id="4703" href="#ref-13" id="xref-ref-13-1"><span data-dcnode-id="4704" instrument_node="">13</span></a><span data-dcnode-id="4702" instrument_node="">, for those who require more in-depth descriptions, discussion and a fuller derivation of equations.</span></p><span data-dcnode-id="4700" instrument_node="">
</span></div><div class="section" data-dcnode-id="4602" id="sec-3"><span data-dcnode-id="4698" instrument_node="">
</span><h2 data-dcnode-id="4696"><span data-dcnode-id="4697" instrument_node="">DEFINITIONS AND SUBDIVISIONS OF LUNG VOLUME</span></h2><span data-dcnode-id="4695" instrument_node="">
</span><p data-dcnode-id="4683" id="p-10"><span data-dcnode-id="4694" instrument_node="">The term “lung volume” usually refers to the volume of gas within the lungs, as measured by body plethysmography, gas dilution or washout. In contrast, lung volumes derived from conventional chest radiographs are usually based on the volumes within the outlines of the thoracic cage, and include the volume of tissue (normal and abnormal), as well as the lung gas volume. Lung volumes derived from computed tomography (CT) scans can include estimates of abnormal lung tissue volumes, in addition to normal lung tissue volumes and the volume of gas within the lungs. In this statement, previously accepted definitions will be used (fig. 1</span><a class="xref-down-link" data-dcnode-id="4691" href="#F1" id="xref-fig-1-1"><span data-dcnode-id="4692"><span data-dcnode-id="4693" instrument_node="">⇓</span></span></a><span data-dcnode-id="4690" instrument_node="">) </span><a class="xref-bibr" data-dcnode-id="4688" href="#ref-14" id="xref-ref-14-1"><span data-dcnode-id="4689" instrument_node="">14</span></a><span data-dcnode-id="4687" instrument_node="">–</span><a class="xref-bibr" data-dcnode-id="4685" href="#ref-18" id="xref-ref-18-1"><span data-dcnode-id="4686" instrument_node="">18</span></a><span data-dcnode-id="4684" instrument_node="">.</span></p><div class="fig pos-float odd" data-dcnode-id="4652" id="F1"><div class="highwire-figure" data-dcnode-id="4665"><div class="fig-inline-img-wrapper" data-dcnode-id="4676"><div class="fig-inline-img" data-dcnode-id="4677"><a class="highwire-fragment fragment-images colorbox-load highwireFiguresMarkupProcessor-processed cboxElement" data-dcnode-id="4678" data-figure-caption="<div class=&quot;highwire-markup&quot;>Static lung volumes and capacities based on a volume–time spirogram of an inspiratory vital capacity (IVC). IRV: inspiratory reserve volume; VT: tidal volume (TV); ERV: expiratory reserve volume; RV: residual volume; IC: inspiratory capacity; FRC: functional residual capacity; TLC: total lung capacity.</div>" data-hide-link-title="0" data-icon-position="" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//erj.ersjournals.com/content/erj/26/3/511/F1.large.jpg%3Fwidth%3D800%26height%3D600%26carousel%3D1" rel="gallery-fragment-images-242121064" title="Static lung volumes and capacities based on a volume–time spirogram of an inspiratory vital capacity (IVC). IRV: inspiratory reserve volume; VT: tidal volume (TV); ERV: expiratory reserve volume; RV: residual volume; IC: inspiratory capacity; FRC: functional residual capacity; TLC: total lung capacity."><span class="hw-responsive-img" data-dcnode-id="4679"><img alt="Fig. 1—" class="highwire-fragment fragment-image lazyloaded" data-dcnode-id="4682" data-src="https://erj.ersjournals.com/content/erj/26/3/511/F1.medium.gif" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//erj.ersjournals.com/content/erj/26/3/511/F1.medium.gif&amp;raw"><noscript data-dcnode-id="4680"><span data-dcnode-id="4681" instrument_node="">&lt;img class="highwire-fragment fragment-image" alt="Fig. 1&amp;#x2014;" src="https://erj.ersjournals.com/content/erj/26/3/511/F1.medium.gif"/&gt;</span></noscript></span></a></div></div><ul class="highwire-figure-links inline" data-dcnode-id="4666"><li class="download-fig first" data-dcnode-id="4673"><a class="highwire-figure-link highwire-figure-link-download" data-dcnode-id="4674" data-hide-link-title="0" data-icon-position="" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//erj.ersjournals.com/content/erj/26/3/511/F1.large.jpg%3Fdownload%3Dtrue" title="Download Fig. 1—"><span data-dcnode-id="4675" instrument_node="">Download figure</span></a></li><li class="new-tab" data-dcnode-id="4670"><a class="highwire-figure-link highwire-figure-link-newtab" data-dcnode-id="4671" data-hide-link-title="0" data-icon-position="" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//erj.ersjournals.com/content/erj/26/3/511/F1.large.jpg" target="_blank"><span data-dcnode-id="4672" instrument_node="">Open in new tab</span></a></li><li class="download-ppt last" data-dcnode-id="4667"><a class="highwire-figure-link highwire-figure-link-ppt" data-dcnode-id="4668" data-hide-link-title="0" data-icon-position="" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//erj.ersjournals.com/highwire/powerpoint/87671"><span data-dcnode-id="4669" instrument_node="">Download powerpoint</span></a></li></ul></div><div class="fig-caption" data-dcnode-id="4653" xmlns:xhtml="http://www.w3.org/1999/xhtml"><span class="fig-label" data-dcnode-id="4663"><span data-dcnode-id="4664" instrument_node="">Fig. 1—</span></span><span data-dcnode-id="4662" instrument_node=""> </span><p class="first-child" data-dcnode-id="4655" id="p-79"><span data-dcnode-id="4661" instrument_node="">Static lung volumes and capacities based on a volume–time spirogram of an inspiratory vital capacity (IVC). IRV: inspiratory reserve volume; </span><em data-dcnode-id="4659"><span data-dcnode-id="4660" instrument_node="">V</span></em><sub data-dcnode-id="4657"><span data-dcnode-id="4658" instrument_node="">T</span></sub><span data-dcnode-id="4656" instrument_node="">: tidal volume (TV); ERV: expiratory reserve volume; RV: residual volume; IC: inspiratory capacity; FRC: functional residual capacity; TLC: total lung capacity.</span></p><div class="sb-div caption-clear" data-dcnode-id="4654"></div></div></div><span data-dcnode-id="4651" instrument_node="">
</span><p data-dcnode-id="4649" id="p-11"><span data-dcnode-id="4650" instrument_node="">The FRC is the volume of gas present in the lung at end-expiration during tidal breathing.</span></p><span data-dcnode-id="4648" instrument_node="">
</span><p data-dcnode-id="4643" id="p-12"><span data-dcnode-id="4647" instrument_node="">The expiratory reserve volume (ERV) is the volume of gas that can be maximally exhaled from the end-expiratory level during tidal breathing (</span><em data-dcnode-id="4645"><span data-dcnode-id="4646" instrument_node="">i.e.</span></em><span data-dcnode-id="4644" instrument_node=""> from the FRC).</span></p><span data-dcnode-id="4642" instrument_node="">
</span><p data-dcnode-id="4640" id="p-13"><span data-dcnode-id="4641" instrument_node="">The maximum volume of gas that can be inspired from FRC is referred to as the inspiratory capacity (IC).</span></p><span data-dcnode-id="4639" instrument_node="">
</span><p data-dcnode-id="4637" id="p-14"><span data-dcnode-id="4638" instrument_node="">The inspiratory reserve volume is the maximum volume of gas that can be inhaled from the end-inspiratory level during tidal breathing.</span></p><span data-dcnode-id="4636" instrument_node="">
</span><p data-dcnode-id="4634" id="p-15"><span data-dcnode-id="4635" instrument_node="">RV refers to the volume of gas remaining in the lung after maximal exhalation (regardless of the lung volume at which exhalation was started).</span></p><span data-dcnode-id="4633" instrument_node="">
</span><p data-dcnode-id="4626" id="p-16"><span data-dcnode-id="4632" instrument_node="">The volume of gas inhaled or exhaled during the respiratory cycle is called the tidal volume (TV or </span><em data-dcnode-id="4630"><span data-dcnode-id="4631" instrument_node="">V</span></em><sub data-dcnode-id="4628"><span data-dcnode-id="4629" instrument_node="">T</span></sub><span data-dcnode-id="4627" instrument_node="">).</span></p><span data-dcnode-id="4625" instrument_node="">
</span><p data-dcnode-id="4610" id="p-17"><span data-dcnode-id="4624" instrument_node="">The thoracic gas volume (TGV or </span><em data-dcnode-id="4622"><span data-dcnode-id="4623" instrument_node="">V</span></em><sub data-dcnode-id="4620"><span data-dcnode-id="4621" instrument_node="">TG</span></sub><span data-dcnode-id="4619" instrument_node="">) is the absolute volume of gas in the thorax at any point in time and any level of alveolar pressure. Since this term is too nonspecific, it is recommended that its use should be discontinued and replaced with more specific terminology, for example, plethysmographic lung volume (abbreviated at </span><em data-dcnode-id="4617"><span data-dcnode-id="4618" instrument_node="">V</span></em><sub data-dcnode-id="4615"><span data-dcnode-id="4616" instrument_node="">L,pleth</span></sub><span data-dcnode-id="4614" instrument_node="">), and FRC by body plethysmography or TGV at FRC (FRC</span><sub data-dcnode-id="4612"><span data-dcnode-id="4613" instrument_node="">pleth</span></sub><span data-dcnode-id="4611" instrument_node="">).</span></p><span data-dcnode-id="4609" instrument_node="">
</span><p data-dcnode-id="4607" id="p-18"><span data-dcnode-id="4608" instrument_node="">TLC refers to the volume of gas in the lungs after maximal inspiration, or the sum of all volume compartments.</span></p><span data-dcnode-id="4606" instrument_node="">
</span><p data-dcnode-id="4604" id="p-19"><span data-dcnode-id="4605" instrument_node="">The vital capacity (VC) is the volume change at the mouth between the positions of full inspiration and complete expiration. The measurement may be made in one of the following ways: 1) inspiratory vital capacity (IVC), where the measurement is performed in a relaxed manner, without undue haste or deliberately holding back, from a position of full expiration to full inspiration; 2) expiratory vital capacity (EVC), where the measurement is similarly performed from a position of full inspiration to full expiration; or 3) forced vital capacity, which is the volume of gas that is exhaled during a forced expiration, starting from a position of full inspiration and ending at complete expiration.</span></p><span data-dcnode-id="4603" instrument_node="">
</span></div><div class="section" data-dcnode-id="4591" id="sec-4"><span data-dcnode-id="4601" instrument_node="">
</span><h2 data-dcnode-id="4599"><span data-dcnode-id="4600" instrument_node="">PATIENT PREPARATION</span></h2><span data-dcnode-id="4598" instrument_node="">
</span><p data-dcnode-id="4593" id="p-20"><span data-dcnode-id="4597" instrument_node="">Guidelines for patient preparation are included in the statement on general considerations for lung function testing in this series of documents </span><a class="xref-bibr" data-dcnode-id="4595" href="#ref-19" id="xref-ref-19-1"><span data-dcnode-id="4596" instrument_node="">19</span></a><span data-dcnode-id="4594" instrument_node="">.</span></p><span data-dcnode-id="4592" instrument_node="">
</span></div><div class="section" data-dcnode-id="4508" id="sec-5"><span data-dcnode-id="4590" instrument_node="">
</span><h2 data-dcnode-id="4588"><span data-dcnode-id="4589" instrument_node="">DERIVATION OF LUNG SUBDIVISIONS</span></h2><span data-dcnode-id="4587" instrument_node="">
</span><p data-dcnode-id="4581" id="p-21"><span data-dcnode-id="4586" instrument_node="">No matter what technique is used to measure FRC (see sections entitled Measurement of FRC using body plethysmography, Measurement of FRC using nitrogen washout, and Measurement of FRC using helium dilution), two subdivisions of the VC (IC and ERV) will have to be measured in order to calculate the TLC and RV (fig. 1</span><a class="xref-up-link" data-dcnode-id="4583" href="#F1" id="xref-fig-1-2"><span data-dcnode-id="4584"><span data-dcnode-id="4585" instrument_node="">⇑</span></span></a><span data-dcnode-id="4582" instrument_node="">). It has proved difficult to reach a consensus on whether the RV should be the minimal value as would most probably be obtained by performing the ERV manoeuvre from FRC and then subtracting ERV from the measured value for FRC, or the approaches which would likely result in higher RVs in those with obstructive lung disease when RV was defined from either slow or forced expirations starting from the point of maximal inspiration. It was also difficult to identify a single method for measuring RV and TLC that was efficient for clinical use and performable by those with severe obstructive lung disease. While future studies are needed to provide better scientific rationale, two methods are recommended for computations of related lung volumes once FRC has been determined.</span></p><span data-dcnode-id="4580" instrument_node="">
</span><p data-dcnode-id="4571" id="p-22"><span data-dcnode-id="4579" instrument_node="">The first and preferred method is to measure ERV immediately after the acquisition of the FRC measurement(s), followed by slow IVC manoeuvres, all performed as “linked” manoeuvres (</span><em data-dcnode-id="4577"><span data-dcnode-id="4578" instrument_node="">i.e.</span></em><span data-dcnode-id="4576" instrument_node=""> without the patient coming off the mouthpiece prior to the completion of the manoeuvres; fig. 2</span><a class="xref-down-link" data-dcnode-id="4573" href="#F2" id="xref-fig-2-1"><span data-dcnode-id="4574"><span data-dcnode-id="4575" instrument_node="">⇓</span></span></a><span data-dcnode-id="4572" instrument_node="">). The reported value for the FRC is the mean of the technically satisfactory FRC measurements, linked to the technically satisfactory ERV and IVC manoeuvres used for calculating the RV and TLC. The reported value for RV is the reported value for FRC minus the mean of the technically acceptable ERV measurements, linked to technically acceptable FRC determinations. The reported value of TLC is the reported value for RV plus the largest of the technically acceptable IVCs.</span></p><div class="fig pos-float odd" data-dcnode-id="4540" id="F2"><div class="highwire-figure" data-dcnode-id="4553"><div class="fig-inline-img-wrapper" data-dcnode-id="4564"><div class="fig-inline-img" data-dcnode-id="4565"><a class="highwire-fragment fragment-images colorbox-load highwireFiguresMarkupProcessor-processed cboxElement" data-dcnode-id="4566" data-figure-caption="<div class=&quot;highwire-markup&quot;>Volume–time display showing the sequence of quiet breathing and after stable end-expiratory level is achieved, a short period when the shutter is closed for determination of the thoracic gas volume, followed by an open-shutter period during which the patient stays on the mouthpiece and performs an expiratory reserve volume (ERV) manoeuvre followed by a slow inspiratory vital capacity manoeuvre. All volumes are determined without the patient coming off the mouthpiece, in a “linked” manoeuvre. IC: inspiratory capacity; FRC: functional residual capacity; IRV: inspiratory reserve volume; VT: tidal volume (TV); RV: residual volume.</div>" data-hide-link-title="0" data-icon-position="" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//erj.ersjournals.com/content/erj/26/3/511/F2.large.jpg%3Fwidth%3D800%26height%3D600%26carousel%3D1" rel="gallery-fragment-images-242121064" title="Volume–time display showing the sequence of quiet breathing and after stable end-expiratory level is achieved, a short period when the shutter is closed for determination of the thoracic gas volume, followed by an open-shutter period during which the patient stays on the mouthpiece and performs an expiratory reserve volume (ERV) manoeuvre followed by a slow inspiratory vital capacity manoeuvre. All volumes are determined without the patient coming off the mouthpiece, in a “linked” manoeuvre. IC: inspiratory capacity; FRC: functional residual capacity; IRV: inspiratory reserve volume; VT: tidal volume (TV); RV: residual volume."><span class="hw-responsive-img" data-dcnode-id="4567"><img alt="Fig. 2—" class="highwire-fragment fragment-image lazyloaded" data-dcnode-id="4570" data-src="https://erj.ersjournals.com/content/erj/26/3/511/F2.medium.gif" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//erj.ersjournals.com/content/erj/26/3/511/F2.medium.gif&amp;raw"><noscript data-dcnode-id="4568"><span data-dcnode-id="4569" instrument_node="">&lt;img class="highwire-fragment fragment-image" alt="Fig. 2&amp;#x2014;" src="https://erj.ersjournals.com/content/erj/26/3/511/F2.medium.gif"/&gt;</span></noscript></span></a></div></div><ul class="highwire-figure-links inline" data-dcnode-id="4554"><li class="download-fig first" data-dcnode-id="4561"><a class="highwire-figure-link highwire-figure-link-download" data-dcnode-id="4562" data-hide-link-title="0" data-icon-position="" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//erj.ersjournals.com/content/erj/26/3/511/F2.large.jpg%3Fdownload%3Dtrue" title="Download Fig. 2—"><span data-dcnode-id="4563" instrument_node="">Download figure</span></a></li><li class="new-tab" data-dcnode-id="4558"><a class="highwire-figure-link highwire-figure-link-newtab" data-dcnode-id="4559" data-hide-link-title="0" data-icon-position="" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//erj.ersjournals.com/content/erj/26/3/511/F2.large.jpg" target="_blank"><span data-dcnode-id="4560" instrument_node="">Open in new tab</span></a></li><li class="download-ppt last" data-dcnode-id="4555"><a class="highwire-figure-link highwire-figure-link-ppt" data-dcnode-id="4556" data-hide-link-title="0" data-icon-position="" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//erj.ersjournals.com/highwire/powerpoint/87677"><span data-dcnode-id="4557" instrument_node="">Download powerpoint</span></a></li></ul></div><div class="fig-caption" data-dcnode-id="4541"><span class="fig-label" data-dcnode-id="4551"><span data-dcnode-id="4552" instrument_node="">Fig. 2—</span></span><span data-dcnode-id="4550" instrument_node=""> </span><p class="first-child" data-dcnode-id="4543" id="p-80"><span data-dcnode-id="4549" instrument_node="">Volume–time display showing the sequence of quiet breathing and after stable end-expiratory level is achieved, a short period when the shutter is closed for determination of the thoracic gas volume, followed by an open-shutter period during which the patient stays on the mouthpiece and performs an expiratory reserve volume (ERV) manoeuvre followed by a slow inspiratory vital capacity manoeuvre. All volumes are determined without the patient coming off the mouthpiece, in a “linked” manoeuvre. IC: inspiratory capacity; FRC: functional residual capacity; IRV: inspiratory reserve volume; </span><em data-dcnode-id="4547"><span data-dcnode-id="4548" instrument_node="">V</span></em><sub data-dcnode-id="4545"><span data-dcnode-id="4546" instrument_node="">T</span></sub><span data-dcnode-id="4544" instrument_node="">: tidal volume (TV); RV: residual volume.</span></p><div class="sb-div caption-clear" data-dcnode-id="4542"></div></div></div><span data-dcnode-id="4539" instrument_node="">
</span><p data-dcnode-id="4537" id="p-23"><span data-dcnode-id="4538" instrument_node="">The second recommended method utilises the performance of IC manoeuvres immediately after the acquisition of the FRC measurement(s) to measure the TLC. This method may be necessary in those with severe obstructive dysfunction or severe dyspnoea who are unable to follow the FRC measurements with a linked ERV manoeuvre as a result of dyspnoea. The patients may come off the mouthpiece between successive linked FRC and IC determinations, and also between the separate VC manoeuvres that are required to calculate RV as the mean TLC minus the largest VC measured. The VC measurement can be derived from either the IVC manoeuvre that follows an ERV manoeuvre (as used in the first method), or from a slow EVC that follows an IC manoeuvre after the FRC determination. The slow EVC can be linked with the FRC/IC measurements if patient discomfort does not preclude optimal performance. The reported value for the FRC is the mean of technically acceptable FRC measurements used for the calculation of TLC. The TLC is the mean of the three largest sums of technically acceptable FRC values and linked IC manoeuvres.</span></p><span data-dcnode-id="4536" instrument_node="">
</span><p data-dcnode-id="4531" id="p-24"><span data-dcnode-id="4535" instrument_node="">Recommendations for the measurement of VC are presented in the document on the standardisation of spirometry in this series </span><a class="xref-bibr" data-dcnode-id="4533" href="#ref-20" id="xref-ref-20-1"><span data-dcnode-id="4534" instrument_node="">20</span></a><span data-dcnode-id="4532" instrument_node="">. There is insufficient evidence regarding optimal recommendations for the reproducibility criteria of the ERV and IC, which are used in computing TLC and RV.</span></p><span data-dcnode-id="4530" instrument_node="">
</span><p data-dcnode-id="4510" id="p-25"><span data-dcnode-id="4529" instrument_node="">The determination of FRC is the key component in the measurement of lung volumes, and can be assessed by body plethysmography, gas washout or gas dilution methods, or using radiography. The FRC</span><sub data-dcnode-id="4527"><span data-dcnode-id="4528" instrument_node="">pleth</span></sub><span data-dcnode-id="4526" instrument_node=""> includes nonventilated, as well as ventilated, lung compartments, and, thus, yields higher results than the gas dilution or washout methods </span><a class="xref-bibr" data-dcnode-id="4524" href="#ref-3" id="xref-ref-3-1"><span data-dcnode-id="4525" instrument_node="">3</span></a><span data-dcnode-id="4523" instrument_node="">, </span><a class="xref-bibr" data-dcnode-id="4521" href="#ref-11" id="xref-ref-11-1"><span data-dcnode-id="4522" instrument_node="">11</span></a><span data-dcnode-id="4520" instrument_node="">. The FRC</span><sub data-dcnode-id="4518"><span data-dcnode-id="4519" instrument_node="">pleth</span></sub><span data-dcnode-id="4517" instrument_node=""> may be further increased by gas that is present in the abdomen. In cases of severe airflow obstruction, FRC</span><sub data-dcnode-id="4515"><span data-dcnode-id="4516" instrument_node="">pleth</span></sub><span data-dcnode-id="4514" instrument_node=""> may be overestimated when panting rates are &gt;1 Hz </span><a class="xref-bibr" data-dcnode-id="4512" href="#ref-21" id="xref-ref-21-1"><span data-dcnode-id="4513" instrument_node="">21</span></a><span data-dcnode-id="4511" instrument_node="">. In patients with severe airflow obstruction or emphysema, the true value of the FRC is underestimated by the gas dilution or washout methods. Despite this fact, the gas dilution/washout methods are widely used because they are simple to perform and the instrumentation is relatively inexpensive.</span></p><span data-dcnode-id="4509" instrument_node="">
</span></div><div class="section" data-dcnode-id="4196" id="sec-6"><span data-dcnode-id="4507" instrument_node="">
</span><h2 data-dcnode-id="4505"><span data-dcnode-id="4506" instrument_node="">MEASUREMENT OF FRC USING BODY PLETHYSMOGRAPHY</span></h2><span data-dcnode-id="4504" instrument_node="">
</span><div class="subsection" data-dcnode-id="4461" id="sec-7"><span data-dcnode-id="4503" instrument_node="">
</span><h3 data-dcnode-id="4501"><span data-dcnode-id="4502" instrument_node="">Introduction and theory</span></h3><span data-dcnode-id="4500" instrument_node="">
</span><p data-dcnode-id="4490" id="p-26"><span data-dcnode-id="4499" instrument_node="">The term TGV (or </span><em data-dcnode-id="4497"><span data-dcnode-id="4498" instrument_node="">V</span></em><sub data-dcnode-id="4495"><span data-dcnode-id="4496" instrument_node="">TG</span></sub><span data-dcnode-id="4494" instrument_node="">) refers to the plethysmographic measurement of intrathoracic gas at the time of airflow occlusion. The volume is the compressible gas within the thorax. The term FRC</span><sub data-dcnode-id="4492"><span data-dcnode-id="4493" instrument_node="">pleth</span></sub><span data-dcnode-id="4491" instrument_node=""> refers to the volume of intrathoracic gas measured when airflow occlusion occurs at FRC.</span></p><span data-dcnode-id="4489" instrument_node="">
</span><p data-dcnode-id="4478" id="p-27"><span data-dcnode-id="4488" instrument_node="">In healthy individuals, there are usually minimal differences in FRC measured by gas dilution/washout techniques and plethysmography. However, in patients with lung disease associated with gas trapping, most, but not all, studies indicate that FRC</span><sub data-dcnode-id="4486"><span data-dcnode-id="4487" instrument_node="">pleth</span></sub><span data-dcnode-id="4485" instrument_node=""> often exceeds the FRC measured by gas dilution </span><a class="xref-bibr" data-dcnode-id="4483" href="#ref-3" id="xref-ref-3-2"><span data-dcnode-id="4484" instrument_node="">3</span></a><span data-dcnode-id="4482" instrument_node="">, </span><a class="xref-bibr" data-dcnode-id="4480" href="#ref-11" id="xref-ref-11-2"><span data-dcnode-id="4481" instrument_node="">11</span></a><span data-dcnode-id="4479" instrument_node="">.</span></p><span data-dcnode-id="4477" instrument_node="">
</span><p data-dcnode-id="4463" id="p-28"><span data-dcnode-id="4476" instrument_node="">Plethysmographic measurements are based on Boyle's Law, which states that, under isothermal conditions, when a constant mass of gas is compressed or decompressed, the gas volume decreases or increases and gas pressure changes such that the product of volume and pressure at any given moment is constant </span><a class="xref-bibr" data-dcnode-id="4474" href="#ref-11" id="xref-ref-11-3"><span data-dcnode-id="4475" instrument_node="">11</span></a><span data-dcnode-id="4473" instrument_node="">, </span><a class="xref-bibr" data-dcnode-id="4471" href="#ref-22" id="xref-ref-22-1"><span data-dcnode-id="4472" instrument_node="">22</span></a><span data-dcnode-id="4470" instrument_node="">. More detailed reviews of the theory are available </span><a class="xref-bibr" data-dcnode-id="4468" href="#ref-11" id="xref-ref-11-4"><span data-dcnode-id="4469" instrument_node="">11</span></a><span data-dcnode-id="4467" instrument_node="">, </span><a class="xref-bibr" data-dcnode-id="4465" href="#ref-13" id="xref-ref-13-2"><span data-dcnode-id="4466" instrument_node="">13</span></a><span data-dcnode-id="4464" instrument_node="">.</span></p><span data-dcnode-id="4462" instrument_node="">
</span></div><span data-dcnode-id="4460" instrument_node="">
</span><div class="subsection" data-dcnode-id="4416" id="sec-8"><span data-dcnode-id="4459" instrument_node="">
</span><h3 data-dcnode-id="4457"><span data-dcnode-id="4458" instrument_node="">Equipment</span></h3><span data-dcnode-id="4456" instrument_node="">
</span><p data-dcnode-id="4454" id="p-29"><span data-dcnode-id="4455" instrument_node="">The changes in thoracic volume that accompany a compression or decompression of the gas in the lungs during respiratory manoeuvres can be obtained using a body plethysmograph by measuring the changes in the following: 1) pressure within a constant-volume chamber (variable-pressure plethysmograph); 2) volume within a constant-pressure chamber (volume-displacement plethysmograph); or 3) airflow in and out of a constant-pressure chamber (flow plethysmograph). A flow plethysmograph can be converted into a variable-pressure plethysmograph by simply occluding the pneumotachograph orifice, making it adaptable to the respiratory manoeuvre of interest.</span></p><span data-dcnode-id="4453" instrument_node="">
</span><p data-dcnode-id="4433" id="p-30"><span data-dcnode-id="4452" instrument_node="">Regardless of the plethysmograph type, a transducer capable of measuring mouth pressure ≥±5 kPa (≥±50 cmH</span><sub data-dcnode-id="4450"><span data-dcnode-id="4451" instrument_node="">2</span></sub><span data-dcnode-id="4449" instrument_node="">O), with a flat frequency response in excess of 8 Hz, is essential. Spirometers or pneumotachographs that are used for the measurement of lung volumes and forced inspiratory and expiratory volumes should meet published standards for the accuracy and frequency response of spirometric devices </span><a class="xref-bibr" data-dcnode-id="4447" href="#ref-16" id="xref-ref-16-1"><span data-dcnode-id="4448" instrument_node="">16</span></a><span data-dcnode-id="4446" instrument_node="">, </span><a class="xref-bibr" data-dcnode-id="4444" href="#ref-23" id="xref-ref-23-1"><span data-dcnode-id="4445" instrument_node="">23</span></a><span data-dcnode-id="4443" instrument_node="">. The transducer measuring changes in the chamber pressure must be capable of accurately measuring a range of ±0.02 kPa (±0.2 cmH</span><sub data-dcnode-id="4441"><span data-dcnode-id="4442" instrument_node="">2</span></sub><span data-dcnode-id="4440" instrument_node="">0) </span><a class="xref-bibr" data-dcnode-id="4438" href="#ref-16" id="xref-ref-16-2"><span data-dcnode-id="4439" instrument_node="">16</span></a><span data-dcnode-id="4437" instrument_node="">. Thermal drift may give rise to a pressure change of as much as 1.0 kPa (10 cmH</span><sub data-dcnode-id="4435"><span data-dcnode-id="4436" instrument_node="">2</span></sub><span data-dcnode-id="4434" instrument_node="">0), which may necessitate a larger working range of the transducer. A time constant of 10 s for a controlled leak (which minimises slowly occurring pressure changes) is ideal.</span></p><span data-dcnode-id="4432" instrument_node="">
</span><p data-dcnode-id="4424" id="p-31"><span data-dcnode-id="4431" instrument_node="">Thermal drift due to temperature changes in the interior of the plethysmograph is common to all types of equipment, and can be detected and compensated for from the volume–pressure plot during an occlusion showing a systematic difference in slope between compression and expansion </span><a class="xref-bibr" data-dcnode-id="4429" href="#ref-11" id="xref-ref-11-5"><span data-dcnode-id="4430" instrument_node="">11</span></a><span data-dcnode-id="4428" instrument_node="">. A second approach for compensation is to use an iterative method </span><a class="xref-bibr" data-dcnode-id="4426" href="#ref-24" id="xref-ref-24-1"><span data-dcnode-id="4427" instrument_node="">24</span></a><span data-dcnode-id="4425" instrument_node="">.</span></p><span data-dcnode-id="4423" instrument_node="">
</span><p data-dcnode-id="4418" id="p-32"><span data-dcnode-id="4422" instrument_node="">Manufacturers should state the frequency response of their plethysmographic systems and provide instructions for the user on how to verify it. The verification of frequency response is most commonly accomplished by the application of a sinusoidal volume signal, where the frequency can be varied </span><a class="xref-bibr" data-dcnode-id="4420" href="#ref-11" id="xref-ref-11-6"><span data-dcnode-id="4421" instrument_node="">11</span></a><span data-dcnode-id="4419" instrument_node="">. It is generally recommended that the minimum adequate frequency response should be five times the frequency of the signal being measured. For a pant at 1 Hz, this means fidelity of the signal at 5 Hz. To ensure that panting frequencies slightly above 1 Hz will not lead to problems, the minimum acceptable frequency response should result in accuracy at 8 Hz.</span></p><span data-dcnode-id="4417" instrument_node="">
</span></div><span data-dcnode-id="4415" instrument_node="">
</span><div class="subsection" data-dcnode-id="4346" id="sec-9"><span data-dcnode-id="4414" instrument_node="">
</span><h3 data-dcnode-id="4412"><span data-dcnode-id="4413" instrument_node="">Measurement technique</span></h3><span data-dcnode-id="4411" instrument_node="">
</span><p data-dcnode-id="4374" id="p-33"><span data-dcnode-id="4410" instrument_node="">The measurement technique should adhere to the following steps. 1) The equipment should be turned on and allowed an adequate warm-up time. 2) The equipment is set up for testing, including calibration, according to manufacturer's instructions. 3) The equipment is adjusted so that the patient can sit comfortably in the chamber and reach the mouthpiece without having to flex or extend the neck. 4) The patient is seated comfortably, with no need to remove dentures. The procedure is explained in detail, including that the door will be closed, the patient's cheeks are to be supported by both hands, and a nose clip is to be used. 5) The plethysmograph door is closed, and time is allowed for the thermal transients to stabilise and the patient to relax. 6) The patient is instructed to attach to the mouthpiece and breathe quietly until a stable end-expiratory level is achieved (usually 3–10 tidal breaths). 7) When the patient is at or near FRC, the shutter is closed at end-expiration for ∼2–3 s, and the patient is instructed to perform a series of gentle pants (∼±1 kPa (∼±10 cmH</span><sub data-dcnode-id="4408"><span data-dcnode-id="4409" instrument_node="">2</span></sub><span data-dcnode-id="4407" instrument_node="">O)) at a frequency between 0.5 and 1.0 Hz </span><a class="xref-bibr" data-dcnode-id="4405" href="#ref-21" id="xref-ref-21-2"><span data-dcnode-id="4406" instrument_node="">21</span></a><span data-dcnode-id="4404" instrument_node="">, </span><a class="xref-bibr" data-dcnode-id="4402" href="#ref-25" id="xref-ref-25-1"><span data-dcnode-id="4403" instrument_node="">25</span></a><span data-dcnode-id="4401" instrument_node="">. Panting frequencies of &gt;1.5 Hz may lead to errors, and those &lt;0.5 Hz may cause problems with the controlled leak of the body plethysmograph system. A metronome can be used to assist patients with this manoeuvre. 8) A series of 3–5 technically satisfactory panting manoeuvres should be recorded (</span><em data-dcnode-id="4399"><span data-dcnode-id="4400" instrument_node="">i.e.</span></em><span data-dcnode-id="4398" instrument_node=""> a series of almost superimposed straight lines separated by only a small thermal drift on the pressure–volume plot; fig. 3</span><a class="xref-down-link" data-dcnode-id="4395" href="#F3" id="xref-fig-3-1"><span data-dcnode-id="4396"><span data-dcnode-id="4397" instrument_node="">⇓</span></span></a><span data-dcnode-id="4394" instrument_node="">), after which the shutter is opened and the patient performs an ERV manoeuvre, followed by a slow IVC manoeuvre (or, as a second priority, an IC manoeuvre followed by a slow EVC manoeuvre). If needed, the patient can come off the mouthpiece and rest between TGV/VC manoeuvres. Patients with severe dyspnoea may have difficulty performing the preferred VC method (</span><em data-dcnode-id="4392"><span data-dcnode-id="4393" instrument_node="">i.e.</span></em><span data-dcnode-id="4391" instrument_node=""> ERV immediately after TGV, followed by a slow IVC; fig. 2</span><a class="xref-up-link" data-dcnode-id="4388" href="#F2" id="xref-fig-2-2"><span data-dcnode-id="4389"><span data-dcnode-id="4390" instrument_node="">⇑</span></span></a><span data-dcnode-id="4387" instrument_node="">). To overcome this, the patient can be instructed to take two or three tidal breaths after the panting manoeuvre, prior to performing the linked ERV and IVC manoeuvres. 9) For those unable to perform appropriate panting manoeuvres (</span><em data-dcnode-id="4385"><span data-dcnode-id="4386" instrument_node="">e.g.</span></em><span data-dcnode-id="4384" instrument_node=""> young children), an alternative is to perform a rapid inspiratory manoeuvre against the closed shutter. In this situation, it is essential that the complete rather than the simplified version of the TGV computation equation </span><a class="xref-bibr" data-dcnode-id="4382" href="#ref-11" id="xref-ref-11-7"><span data-dcnode-id="4383" instrument_node="">11</span></a><span data-dcnode-id="4381" instrument_node=""> is used in the calculation of TGV. The user should confirm that the complete equation is used by the computer during such measurements. 10) With regards to repeatability, at least three FRC</span><sub data-dcnode-id="4379"><span data-dcnode-id="4380" instrument_node="">pleth</span></sub><span data-dcnode-id="4378" instrument_node=""> values that agree within 5% (</span><em data-dcnode-id="4376"><span data-dcnode-id="4377" instrument_node="">i.e.</span></em><span data-dcnode-id="4375" instrument_node=""> difference between the highest and lowest value divided by the mean is ≤0.05) should be obtained and the mean value reported. If there is a larger deviation, additional values should be obtained until three values agree within 5% of their mean, and the mean value should be reported.</span></p><div class="fig pos-float odd" data-dcnode-id="4348" id="F3"><div class="highwire-figure" data-dcnode-id="4356"><div class="fig-inline-img-wrapper" data-dcnode-id="4367"><div class="fig-inline-img" data-dcnode-id="4368"><a class="highwire-fragment fragment-images colorbox-load highwireFiguresMarkupProcessor-processed cboxElement" data-dcnode-id="4369" data-figure-caption="<div class=&quot;highwire-markup&quot;>Display of a properly performed panting manoeuvre as a series of almost superimposed straight lines separated by only a small thermal drift.</div>" data-hide-link-title="0" data-icon-position="" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//erj.ersjournals.com/content/erj/26/3/511/F3.large.jpg%3Fwidth%3D800%26height%3D600%26carousel%3D1" rel="gallery-fragment-images-242121064" title="Display of a properly performed panting manoeuvre as a series of almost superimposed straight lines separated by only a small thermal drift."><span class="hw-responsive-img" data-dcnode-id="4370"><img alt="Fig. 3—" class="highwire-fragment fragment-image lazyload" data-dcnode-id="4373" data-src="https://erj.ersjournals.com/content/erj/26/3/511/F3.medium.gif" src="data:image/gif;base64,R0lGODlhAQABAIAAAAAAAP///yH5BAEAAAAALAAAAAABAAEAAAIBRAA7"><noscript data-dcnode-id="4371"><span data-dcnode-id="4372" instrument_node="">&lt;img class="highwire-fragment fragment-image" alt="Fig. 3&amp;#x2014;" src="https://erj.ersjournals.com/content/erj/26/3/511/F3.medium.gif"/&gt;</span></noscript></span></a></div></div><ul class="highwire-figure-links inline" data-dcnode-id="4357"><li class="download-fig first" data-dcnode-id="4364"><a class="highwire-figure-link highwire-figure-link-download" data-dcnode-id="4365" data-hide-link-title="0" data-icon-position="" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//erj.ersjournals.com/content/erj/26/3/511/F3.large.jpg%3Fdownload%3Dtrue" title="Download Fig. 3—"><span data-dcnode-id="4366" instrument_node="">Download figure</span></a></li><li class="new-tab" data-dcnode-id="4361"><a class="highwire-figure-link highwire-figure-link-newtab" data-dcnode-id="4362" data-hide-link-title="0" data-icon-position="" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//erj.ersjournals.com/content/erj/26/3/511/F3.large.jpg" target="_blank"><span data-dcnode-id="4363" instrument_node="">Open in new tab</span></a></li><li class="download-ppt last" data-dcnode-id="4358"><a class="highwire-figure-link highwire-figure-link-ppt" data-dcnode-id="4359" data-hide-link-title="0" data-icon-position="" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//erj.ersjournals.com/highwire/powerpoint/87686"><span data-dcnode-id="4360" instrument_node="">Download powerpoint</span></a></li></ul></div><div class="fig-caption" data-dcnode-id="4349"><span class="fig-label" data-dcnode-id="4354"><span data-dcnode-id="4355" instrument_node="">Fig. 3—</span></span><span data-dcnode-id="4353" instrument_node=""> </span><p class="first-child" data-dcnode-id="4351" id="p-81"><span data-dcnode-id="4352" instrument_node="">Display of a properly performed panting manoeuvre as a series of almost superimposed straight lines separated by only a small thermal drift.</span></p><div class="sb-div caption-clear" data-dcnode-id="4350"></div></div></div><span data-dcnode-id="4347" instrument_node="">
</span></div><span data-dcnode-id="4345" instrument_node="">
</span><div class="subsection" data-dcnode-id="4310" id="sec-10"><span data-dcnode-id="4344" instrument_node="">
</span><h3 data-dcnode-id="4342"><span data-dcnode-id="4343" instrument_node="">Quality control</span></h3><span data-dcnode-id="4341" instrument_node="">
</span><p data-dcnode-id="4336" id="p-34"><span data-dcnode-id="4340" instrument_node="">The accuracy of the flow and volume output of the mouth flow-measuring device should comply with the recommendations made in the spirometry document in this series </span><a class="xref-bibr" data-dcnode-id="4338" href="#ref-20" id="xref-ref-20-2"><span data-dcnode-id="4339" instrument_node="">20</span></a><span data-dcnode-id="4337" instrument_node="">. The mouth pressure transducer should be physically calibrated daily. The plethysmograph signal should also be calibrated daily, using a volume signal of similar magnitude and frequency as the respiratory manoeuvres during testing.</span></p><span data-dcnode-id="4335" instrument_node="">
</span><p data-dcnode-id="4321" id="p-35"><span data-dcnode-id="4334" instrument_node="">A validation of accuracy using a known volume should be performed periodically. This can be carried out using a “model” lung or container of known volume </span><a class="xref-bibr" data-dcnode-id="4332" href="#ref-11" id="xref-ref-11-8"><span data-dcnode-id="4333" instrument_node="">11</span></a><span data-dcnode-id="4331" instrument_node="">, </span><a class="xref-bibr" data-dcnode-id="4329" href="#ref-26" id="xref-ref-26-1"><span data-dcnode-id="4330" instrument_node="">26</span></a><span data-dcnode-id="4328" instrument_node="">. Filling a flask with thermal mass (</span><em data-dcnode-id="4326"><span data-dcnode-id="4327" instrument_node="">e.g.</span></em><span data-dcnode-id="4325" instrument_node=""> copper wool) is essential in order to simulate the isothermal conditions within the lung; care should be taken to adjust the calculated volumes to ambient (or model) temperature and saturated conditions, rather than to body temperature and ambient pressure, saturated with water vapour (BTPS) conditions, during the calculations. The accuracy of adult plethysmographs in measuring the gas volume of the container should be ±50 mL or 3%, whichever is greater, based on a mean of five determinations </span><a class="xref-bibr" data-dcnode-id="4323" href="#ref-11" id="xref-ref-11-9"><span data-dcnode-id="4324" instrument_node="">11</span></a><span data-dcnode-id="4322" instrument_node="">.</span></p><span data-dcnode-id="4320" instrument_node="">
</span><p data-dcnode-id="4312" id="p-36"><span data-dcnode-id="4319" instrument_node="">At least monthly, or whenever plethysmographic errors are suspected, two reference subjects (biological controls) should have their FRC</span><sub data-dcnode-id="4317"><span data-dcnode-id="4318" instrument_node="">pleth</span></sub><span data-dcnode-id="4316" instrument_node=""> and related RV and TLC measured. Values that differ significantly (</span><em data-dcnode-id="4314"><span data-dcnode-id="4315" instrument_node="">e.g.</span></em><span data-dcnode-id="4313" instrument_node=""> &gt;10% for FRC and TLC, or &gt;20% for RV) from the previously established means for measurements on the same subject suggest errors of measurement. These criteria are approximately twice the reported coefficients of variation for repeat measurements of these parameters; hence, tighter standards can be adopted at the cost of more frequent “false alarms” that suggest equipment malfunction.</span></p><span data-dcnode-id="4311" instrument_node="">
</span></div><span data-dcnode-id="4309" instrument_node="">
</span><div class="subsection" data-dcnode-id="4198" id="sec-11"><span data-dcnode-id="4308" instrument_node="">
</span><h3 data-dcnode-id="4306"><span data-dcnode-id="4307" instrument_node="">Calculations</span></h3><span data-dcnode-id="4305" instrument_node="">
</span><p data-dcnode-id="4293" id="p-37"><span data-dcnode-id="4304" instrument_node="">The calculation of </span><em data-dcnode-id="4302"><span data-dcnode-id="4303" instrument_node="">V</span></em><sub data-dcnode-id="4300"><span data-dcnode-id="4301" instrument_node="">TG</span></sub><span data-dcnode-id="4299" instrument_node=""> is based on Boyle's Law, which states:</span><span class="disp-formula" data-dcnode-id="4294" id="disp-formula-1"><span class="highwire-responsive-lazyload" data-dcnode-id="4295"><img alt="Embedded Image" class="highwire-embed lazyload" data-dcnode-id="4298" data-src="https://erj.ersjournals.com/sites/default/files/highwire/erj/26/3/511/embed/graphic-1.gif" src="data:image/gif;base64,R0lGODlhAQABAIAAAAAAAP///yH5BAEAAAAALAAAAAABAAEAAAIBRAA7"><noscript data-dcnode-id="4296"><span data-dcnode-id="4297" instrument_node="">&lt;img class="highwire-embed" alt="Embedded Image" src="https://erj.ersjournals.com/sites/default/files/highwire/erj/26/3/511/embed/graphic-1.gif"/&gt;</span></noscript></span></span></p><span data-dcnode-id="4292" instrument_node="">
</span><p data-dcnode-id="4255" id="p-38"><em data-dcnode-id="4290"><span data-dcnode-id="4291" instrument_node="">P</span></em><sub data-dcnode-id="4288"><span data-dcnode-id="4289" instrument_node="">alv1</span></sub><span data-dcnode-id="4287" instrument_node=""> and </span><em data-dcnode-id="4285"><span data-dcnode-id="4286" instrument_node="">V</span></em><sub data-dcnode-id="4283"><span data-dcnode-id="4284" instrument_node="">TG1</span></sub><span data-dcnode-id="4282" instrument_node=""> are the absolute pressure and lung volumes before the compression/rarefaction manoeuvre, and </span><em data-dcnode-id="4280"><span data-dcnode-id="4281" instrument_node="">P</span></em><sub data-dcnode-id="4278"><span data-dcnode-id="4279" instrument_node="">alv2</span></sub><span data-dcnode-id="4277" instrument_node=""> and </span><em data-dcnode-id="4275"><span data-dcnode-id="4276" instrument_node="">V</span></em><sub data-dcnode-id="4273"><span data-dcnode-id="4274" instrument_node="">TG2</span></sub><span data-dcnode-id="4272" instrument_node=""> are the absolute pressure and lung volumes after the manoeuvre. Water vapour pressure needs to be subtracted from all pressures, but this is not shown for the sake of simplicity. Expressed as a change from the baseline, the equation becomes:</span><span class="disp-formula" data-dcnode-id="4267" id="disp-formula-2"><span class="highwire-responsive-lazyload" data-dcnode-id="4268"><img alt="Embedded Image" class="highwire-embed lazyload" data-dcnode-id="4271" data-src="https://erj.ersjournals.com/sites/default/files/highwire/erj/26/3/511/embed/graphic-2.gif" src="data:image/gif;base64,R0lGODlhAQABAIAAAAAAAP///yH5BAEAAAAALAAAAAABAAEAAAIBRAA7"><noscript data-dcnode-id="4269"><span data-dcnode-id="4270" instrument_node="">&lt;img class="highwire-embed" alt="Embedded Image" src="https://erj.ersjournals.com/sites/default/files/highwire/erj/26/3/511/embed/graphic-2.gif"/&gt;</span></noscript></span></span><span data-dcnode-id="4266" instrument_node="">Since the panting manoeuvre is intended to occur with small changes in pressure around barometric pressure (</span><em data-dcnode-id="4264"><span data-dcnode-id="4265" instrument_node="">P</span></em><sub data-dcnode-id="4262"><span data-dcnode-id="4263" instrument_node="">B</span></sub><span data-dcnode-id="4261" instrument_node="">), the simplified and widely used version is:</span><span class="disp-formula" data-dcnode-id="4256" id="disp-formula-3"><span class="highwire-responsive-lazyload" data-dcnode-id="4257"><img alt="Embedded Image" class="highwire-embed lazyload" data-dcnode-id="4260" data-src="https://erj.ersjournals.com/sites/default/files/highwire/erj/26/3/511/embed/graphic-3.gif" src="data:image/gif;base64,R0lGODlhAQABAIAAAAAAAP///yH5BAEAAAAALAAAAAABAAEAAAIBRAA7"><noscript data-dcnode-id="4258"><span data-dcnode-id="4259" instrument_node="">&lt;img class="highwire-embed" alt="Embedded Image" src="https://erj.ersjournals.com/sites/default/files/highwire/erj/26/3/511/embed/graphic-3.gif"/&gt;</span></noscript></span></span></p><span data-dcnode-id="4254" instrument_node="">
</span><p data-dcnode-id="4238" id="p-39"><span data-dcnode-id="4253" instrument_node="">Δ</span><em data-dcnode-id="4251"><span data-dcnode-id="4252" instrument_node="">V</span></em><span data-dcnode-id="4250" instrument_node="">/Δ</span><em data-dcnode-id="4248"><span data-dcnode-id="4249" instrument_node="">P</span></em><span data-dcnode-id="4247" instrument_node=""> represents the slope of the simultaneous changes in body volume, which, in a pressure plethysmograph, are the tiny changes in pressure within the box, calibrated to reflect changes in the volume of the subject </span><em data-dcnode-id="4245"><span data-dcnode-id="4246" instrument_node="">versus</span></em><span data-dcnode-id="4244" instrument_node=""> the change in pressure at the mouth. When a rapid inspiratory manoeuvre is performed, the complete version must be used, as follows:</span><span class="disp-formula" data-dcnode-id="4239" id="disp-formula-4"><span class="highwire-responsive-lazyload" data-dcnode-id="4240"><img alt="Embedded Image" class="highwire-embed lazyload" data-dcnode-id="4243" data-src="https://erj.ersjournals.com/sites/default/files/highwire/erj/26/3/511/embed/graphic-4.gif" src="data:image/gif;base64,R0lGODlhAQABAIAAAAAAAP///yH5BAEAAAAALAAAAAABAAEAAAIBRAA7"><noscript data-dcnode-id="4241"><span data-dcnode-id="4242" instrument_node="">&lt;img class="highwire-embed" alt="Embedded Image" src="https://erj.ersjournals.com/sites/default/files/highwire/erj/26/3/511/embed/graphic-4.gif"/&gt;</span></noscript></span></span></p><span data-dcnode-id="4237" instrument_node="">
</span><p data-dcnode-id="4209" id="p-40"><span data-dcnode-id="4236" instrument_node="">If the panting manoeuvre begins with a </span><em data-dcnode-id="4234"><span data-dcnode-id="4235" instrument_node="">P</span></em><sub data-dcnode-id="4232"><span data-dcnode-id="4233" instrument_node="">alv1</span></sub><span data-dcnode-id="4231" instrument_node=""> that is different from </span><em data-dcnode-id="4229"><span data-dcnode-id="4230" instrument_node="">P</span></em><sub data-dcnode-id="4227"><span data-dcnode-id="4228" instrument_node="">B</span></sub><span data-dcnode-id="4226" instrument_node="">, as occurs if the occlusion takes place at a volume other than FRC, the volume will need to be corrected to FRC, but </span><em data-dcnode-id="4224"><span data-dcnode-id="4225" instrument_node="">P</span></em><sub data-dcnode-id="4222"><span data-dcnode-id="4223" instrument_node="">alv1</span></sub><span data-dcnode-id="4221" instrument_node=""> will also need to be corrected for </span><em data-dcnode-id="4219"><span data-dcnode-id="4220" instrument_node="">P</span></em><sub data-dcnode-id="4217"><span data-dcnode-id="4218" instrument_node="">B</span></sub><span data-dcnode-id="4216" instrument_node="">. Details of the complete derivation of the equations are given in both a web-based document and background paper </span><a class="xref-bibr" data-dcnode-id="4214" href="#ref-11" id="xref-ref-11-10"><span data-dcnode-id="4215" instrument_node="">11</span></a><span data-dcnode-id="4213" instrument_node="">, </span><a class="xref-bibr" data-dcnode-id="4211" href="#ref-13" id="xref-ref-13-3"><span data-dcnode-id="4212" instrument_node="">13</span></a><span data-dcnode-id="4210" instrument_node="">.</span></p><span data-dcnode-id="4208" instrument_node="">
</span><p data-dcnode-id="4203" id="p-41"><span data-dcnode-id="4207" instrument_node="">The underlying assumption of the technique is that the pressure–volume changes in the body are isothermal, and any heat generated by compression is instantaneously lost to the surrounding tissue. However, changes in pressure and volume within the plethysmograph are assumed to be adiabatic (</span><em data-dcnode-id="4205"><span data-dcnode-id="4206" instrument_node="">i.e.</span></em><span data-dcnode-id="4204" instrument_node=""> there is insufficient time for heat exchange to occur between the air within the plethysmograph and either the walls or the subject during the rarefaction and compression manoeuvre). For panting frequencies in the order of 1 Hz, this assumption is valid. However, slow rarefaction manoeuvres where the subject is occluded at end-expiration and the pressure–volume changes occur with the normal respiratory effort are to be discouraged, since the time course may allow for heat exchange within the plethysmograph. This would alter the pressure–plethysmograph volume calibration. This would not be a problem if the subject made a rapid inspiratory effort, but, as mentioned previously, the use of the simplified version of Boyle's Law would be inappropriate.</span></p><span data-dcnode-id="4202" instrument_node="">
</span><p data-dcnode-id="4200" id="p-42"><span data-dcnode-id="4201" instrument_node="">Along the same line, it is customary to subtract the volume of the apparatus between the mouth and the occluding valve from the TGV. However, rarefaction and compression of this volume are not isothermal, and if the volume is large in relation to TGV due to an excessively large filter, for example, errors will be introduced. In other words, efforts should be made to minimise the volume between the occluding valve and the patient.</span></p><span data-dcnode-id="4199" instrument_node="">
</span></div><span data-dcnode-id="4197" instrument_node="">
</span></div><div class="section" data-dcnode-id="3768" id="sec-12"><span data-dcnode-id="4195" instrument_node="">
</span><h2 data-dcnode-id="4193"><span data-dcnode-id="4194" instrument_node="">MEASUREMENT OF FRC USING NITROGEN WASHOUT</span></h2><span data-dcnode-id="4192" instrument_node="">
</span><div class="subsection" data-dcnode-id="4134" id="sec-13"><span data-dcnode-id="4191" instrument_node="">
</span><h3 data-dcnode-id="4189"><span data-dcnode-id="4190" instrument_node="">Introduction and theory</span></h3><span data-dcnode-id="4188" instrument_node="">
</span><p data-dcnode-id="4159" id="p-43"><span data-dcnode-id="4187" instrument_node="">This technique is based on washing out the N</span><sub data-dcnode-id="4185"><span data-dcnode-id="4186" instrument_node="">2</span></sub><span data-dcnode-id="4184" instrument_node=""> from the lungs, while the patient breathes 100% O</span><sub data-dcnode-id="4182"><span data-dcnode-id="4183" instrument_node="">2</span></sub><span data-dcnode-id="4181" instrument_node="">. The initial alveolar N</span><sub data-dcnode-id="4179"><span data-dcnode-id="4180" instrument_node="">2</span></sub><span data-dcnode-id="4178" instrument_node=""> concentration and the amount of N</span><sub data-dcnode-id="4176"><span data-dcnode-id="4177" instrument_node="">2</span></sub><span data-dcnode-id="4175" instrument_node=""> washed out can then be used to calculate the lung volume at the start of washout. The technique originally utilised gas collections for a 7-min period, a period deemed adequate for washout of N</span><sub data-dcnode-id="4173"><span data-dcnode-id="4174" instrument_node="">2</span></sub><span data-dcnode-id="4172" instrument_node=""> from the lungs of healthy subjects. The technique has the disadvantage that an inaccuracy in the measurement of the expired volume or the final N</span><sub data-dcnode-id="4170"><span data-dcnode-id="4171" instrument_node="">2</span></sub><span data-dcnode-id="4169" instrument_node=""> concentration will cause a significant error. The availability of rapidly responding N</span><sub data-dcnode-id="4167"><span data-dcnode-id="4168" instrument_node="">2</span></sub><span data-dcnode-id="4166" instrument_node=""> analysers and computers has further refined the technique. Additional details and literature citations regarding various N</span><sub data-dcnode-id="4164"><span data-dcnode-id="4165" instrument_node="">2</span></sub><span data-dcnode-id="4163" instrument_node=""> washout techniques and washout measurements using other gases are available in a background paper </span><a class="xref-bibr" data-dcnode-id="4161" href="#ref-12" id="xref-ref-12-2"><span data-dcnode-id="4162" instrument_node="">12</span></a><span data-dcnode-id="4160" instrument_node="">.</span></p><span data-dcnode-id="4158" instrument_node="">
</span><p data-dcnode-id="4136" id="p-44"><span data-dcnode-id="4157" instrument_node="">A modification of the 7-min N</span><sub data-dcnode-id="4155"><span data-dcnode-id="4156" instrument_node="">2</span></sub><span data-dcnode-id="4154" instrument_node=""> washout method, which monitors N</span><sub data-dcnode-id="4152"><span data-dcnode-id="4153" instrument_node="">2</span></sub><span data-dcnode-id="4151" instrument_node=""> excretion over 5 min and then extrapolates the late exponential component of the continuous N</span><sub data-dcnode-id="4149"><span data-dcnode-id="4150" instrument_node="">2</span></sub><span data-dcnode-id="4148" instrument_node=""> excretion curve, has been proposed </span><a class="xref-bibr" data-dcnode-id="4146" href="#ref-27" id="xref-ref-27-1"><span data-dcnode-id="4147" instrument_node="">27</span></a><span data-dcnode-id="4145" instrument_node="">, which avoids underestimating the true alveolar N</span><sub data-dcnode-id="4143"><span data-dcnode-id="4144" instrument_node="">2</span></sub><span data-dcnode-id="4142" instrument_node=""> concentration in patients with obstructive lung disease and eliminates the need for longer washout times. The current authors are unaware of any commercial pulmonary function testing system that uses this approach; therefore, manufacturers are encouraged to offer it as an option in the future. Due to existing variations in currently available commercial systems and the absence of studies comparing accuracy, reproducibility and efficiency, no single method for the measurement of FRC using nitrogen washout (FRC</span><sub data-dcnode-id="4138"><span data-dcnode-id="4141" instrument_node="">N</span><sub data-dcnode-id="4139"><span data-dcnode-id="4140" instrument_node="">2</span></sub></sub><span data-dcnode-id="4137" instrument_node="">) can be recommended at this time. The following recommendations are for methods used most commonly in clinical pulmonary function laboratories.</span></p><span data-dcnode-id="4135" instrument_node="">
</span></div><span data-dcnode-id="4133" instrument_node="">
</span><div class="subsection" data-dcnode-id="4025" id="sec-14"><span data-dcnode-id="4132" instrument_node="">
</span><h3 data-dcnode-id="4130"><span data-dcnode-id="4131" instrument_node="">Equipment</span></h3><span data-dcnode-id="4129" instrument_node="">
</span><p data-dcnode-id="4118" id="p-45"><span data-dcnode-id="4128" instrument_node="">N</span><sub data-dcnode-id="4126"><span data-dcnode-id="4127" instrument_node="">2</span></sub><span data-dcnode-id="4125" instrument_node=""> analysers should be linear with an inaccuracy ≤0.2% of full range throughout the measuring range (0–80%), have a resolution of ≤0.01%, and a 95% analyser response time of &lt;60 ms to a 10% step change in N</span><sub data-dcnode-id="4123"><span data-dcnode-id="4124" instrument_node="">2</span></sub><span data-dcnode-id="4122" instrument_node=""> concentration (after correction for phase shift). Compliance with these performance specifications should be confirmed by the manufacturers, since few clinical laboratories have the resources required for such evaluations </span><a class="xref-bibr" data-dcnode-id="4120" href="#ref-13" id="xref-ref-13-4"><span data-dcnode-id="4121" instrument_node="">13</span></a><span data-dcnode-id="4119" instrument_node="">.</span></p><span data-dcnode-id="4117" instrument_node="">
</span><p data-dcnode-id="4094" id="p-46"><span data-dcnode-id="4116" instrument_node="">If measurements of N</span><sub data-dcnode-id="4114"><span data-dcnode-id="4115" instrument_node="">2</span></sub><span data-dcnode-id="4113" instrument_node=""> concentration are made indirectly by subtracting measurements of O</span><sub data-dcnode-id="4111"><span data-dcnode-id="4112" instrument_node="">2</span></sub><span data-dcnode-id="4110" instrument_node=""> and CO</span><sub data-dcnode-id="4108"><span data-dcnode-id="4109" instrument_node="">2</span></sub><span data-dcnode-id="4107" instrument_node="">, the accuracy, drift and linearity characteristics of the O</span><sub data-dcnode-id="4105"><span data-dcnode-id="4106" instrument_node="">2</span></sub><span data-dcnode-id="4104" instrument_node=""> and CO</span><sub data-dcnode-id="4102"><span data-dcnode-id="4103" instrument_node="">2</span></sub><span data-dcnode-id="4101" instrument_node=""> analysers should result in indirect calculations of N</span><sub data-dcnode-id="4099"><span data-dcnode-id="4100" instrument_node="">2</span></sub><span data-dcnode-id="4098" instrument_node="">, with comparable performance characteristics to the direct measurements of N</span><sub data-dcnode-id="4096"><span data-dcnode-id="4097" instrument_node="">2</span></sub><span data-dcnode-id="4095" instrument_node=""> specified previously. Mass spectrometers should meet the previously outlined specifications for all three gases, have a molecular weight resolution of &lt;1.0, and have &lt;1% drift over 24 h, or at least be stable for the measurement period after calibration (which should be carried out immediately before use).</span></p><span data-dcnode-id="4093" instrument_node="">
</span><p data-dcnode-id="4073" id="p-47"><span data-dcnode-id="4092" instrument_node="">Pneumotachographs or other flow-measuring devices (</span><em data-dcnode-id="4090"><span data-dcnode-id="4091" instrument_node="">e.g.</span></em><span data-dcnode-id="4089" instrument_node=""> ultrasonic flow meters, turbines, </span><em data-dcnode-id="4087"><span data-dcnode-id="4088" instrument_node="">etc.</span></em><span data-dcnode-id="4086" instrument_node="">) incorporated into the breathing circuits to measure gas flows should comply with the recommendations from the standardisation of spirometry document in the present series </span><a class="xref-bibr" data-dcnode-id="4084" href="#ref-20" id="xref-ref-20-3"><span data-dcnode-id="4085" instrument_node="">20</span></a><span data-dcnode-id="4083" instrument_node="">, but they only require a flow range of 0–6 L·s</span><sup data-dcnode-id="4081"><span data-dcnode-id="4082" instrument_node="">−1</span></sup><span data-dcnode-id="4080" instrument_node="">. Factors that must be considered and controlled to ensure that the previously highlighted performance specifications are met include: the performance characteristics of specific flow-measuring devices; potential inaccuracies from the condensation of water from expired gases; changes in gas temperature; and changes in gas viscosity or density over the range of O</span><sub data-dcnode-id="4078"><span data-dcnode-id="4079" instrument_node="">2</span></sub><span data-dcnode-id="4077" instrument_node="">/N</span><sub data-dcnode-id="4075"><span data-dcnode-id="4076" instrument_node="">2</span></sub><span data-dcnode-id="4074" instrument_node=""> mixtures.</span></p><span data-dcnode-id="4072" instrument_node="">
</span><p data-dcnode-id="4055" id="p-48"><span data-dcnode-id="4071" instrument_node="">The system should have a sampling rate of ≥40 samples·s</span><sup data-dcnode-id="4069"><span data-dcnode-id="4070" instrument_node="">−1</span></sup><span data-dcnode-id="4068" instrument_node=""> per channel for flow and N</span><sub data-dcnode-id="4066"><span data-dcnode-id="4067" instrument_node="">2</span></sub><span data-dcnode-id="4065" instrument_node=""> signals. Amounts of exhaled N</span><sub data-dcnode-id="4063"><span data-dcnode-id="4064" instrument_node="">2</span></sub><span data-dcnode-id="4062" instrument_node=""> should be calculated every 25 ms (or less), with appropriate corrections for phase differences between flow and N</span><sub data-dcnode-id="4060"><span data-dcnode-id="4061" instrument_node="">2</span></sub><span data-dcnode-id="4059" instrument_node=""> measurements </span><a class="xref-bibr" data-dcnode-id="4057" href="#ref-28" id="xref-ref-28-1"><span data-dcnode-id="4058" instrument_node="">28</span></a><span data-dcnode-id="4056" instrument_node="">.</span></p><span data-dcnode-id="4054" instrument_node="">
</span><p data-dcnode-id="4027" id="p-49"><span data-dcnode-id="4053" instrument_node="">The breathing valve for switching the patient from breathing room air to 100% O</span><sub data-dcnode-id="4051"><span data-dcnode-id="4052" instrument_node="">2</span></sub><span data-dcnode-id="4050" instrument_node=""> should have a dead space &lt;100 mL for adults and &lt;2 mL·kg</span><sup data-dcnode-id="4048"><span data-dcnode-id="4049" instrument_node="">−1</span></sup><span data-dcnode-id="4047" instrument_node=""> in smaller children. Oxygen can be provided either from a gas-impermeable bag filled with dry 100% O</span><sub data-dcnode-id="4045"><span data-dcnode-id="4046" instrument_node="">2</span></sub><span data-dcnode-id="4044" instrument_node="">, or a source of O</span><sub data-dcnode-id="4042"><span data-dcnode-id="4043" instrument_node="">2</span></sub><span data-dcnode-id="4041" instrument_node=""> connected to a demand valve. As a result of the effects of inspiratory resistance on FRC, triggering pressures from demand valves during tidal breathing should ideally be smaller than those pressures that are acceptable in IVC manoeuvres occurring during single-breath carbon monoxide diffusing capacity (</span><em data-dcnode-id="4039"><span data-dcnode-id="4040" instrument_node="">D</span></em><sub data-dcnode-id="4037"><span data-dcnode-id="4038" instrument_node="">L,CO</span></sub><span data-dcnode-id="4036" instrument_node="">) measurements. This is especially important in patients with neuromuscular weakness. However, until data that define the magnitude of errors with lower demand-valve pressures are available, the same maximal demand-valve pressures that are required for </span><em data-dcnode-id="4034"><span data-dcnode-id="4035" instrument_node="">D</span></em><sub data-dcnode-id="4032"><span data-dcnode-id="4033" instrument_node="">L,CO</span></sub><span data-dcnode-id="4031" instrument_node=""> measurements (&lt;1 kPa (&lt;10 cmH</span><sub data-dcnode-id="4029"><span data-dcnode-id="4030" instrument_node="">2</span></sub><span data-dcnode-id="4028" instrument_node="">0)) are acceptable.</span></p><span data-dcnode-id="4026" instrument_node="">
</span></div><span data-dcnode-id="4024" instrument_node="">
</span><div class="subsection" data-dcnode-id="3941" id="sec-15"><span data-dcnode-id="4023" instrument_node="">
</span><h3 data-dcnode-id="4021"><span data-dcnode-id="4022" instrument_node="">Measurement technique</span></h3><span data-dcnode-id="4020" instrument_node="">
</span><p data-dcnode-id="3981" id="p-50"><span data-dcnode-id="4019" instrument_node="">The measurement technique should adhere to the following steps. 1) The equipment should be turned on and allowed an adequate warm-up time, with calibration as instructed by the manufacturer. 2) The patient should be asked if he/she has a perforated eardrum (if so, an earplug should be used). 3) The patient is seated comfortably, with no need to remove dentures. The procedure is explained, emphasising the need to avoid leaks around the mouthpiece during the washout and using a nose clip. 4) The patient breathes on the mouthpiece for ∼30–60 s to become accustomed to the apparatus, and to assure a stable end-tidal expiratory level. 5) When breathing is stable and consistent with the end-tidal volume being at FRC, the patient is switched into the circuit so that 100% O</span><sub data-dcnode-id="4017"><span data-dcnode-id="4018" instrument_node="">2</span></sub><span data-dcnode-id="4016" instrument_node=""> is inspired instead of room air. 6) The N</span><sub data-dcnode-id="4014"><span data-dcnode-id="4015" instrument_node="">2</span></sub><span data-dcnode-id="4013" instrument_node=""> concentration is monitored during the washout. A change in inspired N</span><sub data-dcnode-id="4011"><span data-dcnode-id="4012" instrument_node="">2</span></sub><span data-dcnode-id="4010" instrument_node=""> of &gt;1% or sudden large increases in expiratory N</span><sub data-dcnode-id="4008"><span data-dcnode-id="4009" instrument_node="">2</span></sub><span data-dcnode-id="4007" instrument_node=""> concentrations indicate a leak; hence, the test should be stopped and repeated after a 15-min period of breathing room air. A typical profile is shown in figure 4</span><a class="xref-down-link" data-dcnode-id="4004" href="#F4" id="xref-fig-4-1"><span data-dcnode-id="4005"><span data-dcnode-id="4006" instrument_node="">⇓</span></span></a><span data-dcnode-id="4003" instrument_node="">. 7) The washout is considered to be complete when the N</span><sub data-dcnode-id="4001"><span data-dcnode-id="4002" instrument_node="">2</span></sub><span data-dcnode-id="4000" instrument_node=""> concentration is &lt;1.5% for at least three successive breaths. 8) At least one technically satisfactory measurement should be obtained. If additional washouts are performed, a waiting period of ≥15 min is recommended between trials. In patients with severe obstructive or bullous disease, the time between trials should be ≥1 h </span><a class="xref-bibr" data-dcnode-id="3998" href="#ref-27" id="xref-ref-27-2"><span data-dcnode-id="3999" instrument_node="">27</span></a><span data-dcnode-id="3997" instrument_node="">. If more than one measurement of FRC</span><sub data-dcnode-id="3993"><span data-dcnode-id="3996" instrument_node="">N</span><sub data-dcnode-id="3994"><span data-dcnode-id="3995" instrument_node="">2</span></sub></sub><span data-dcnode-id="3992" instrument_node=""> is made, the value reported for FRC</span><sub data-dcnode-id="3988"><span data-dcnode-id="3991" instrument_node="">N</span><sub data-dcnode-id="3989"><span data-dcnode-id="3990" instrument_node="">2</span></sub></sub><span data-dcnode-id="3987" instrument_node=""> should be the mean of technically acceptable results that agree within 10%. If only one measurement of FRC</span><sub data-dcnode-id="3983"><span data-dcnode-id="3986" instrument_node="">N</span><sub data-dcnode-id="3984"><span data-dcnode-id="3985" instrument_node="">2</span></sub></sub><span data-dcnode-id="3982" instrument_node=""> is made, caution should be used in the interpretation.</span></p><div class="fig pos-float odd" data-dcnode-id="3943" id="F4"><div class="highwire-figure" data-dcnode-id="3963"><div class="fig-inline-img-wrapper" data-dcnode-id="3974"><div class="fig-inline-img" data-dcnode-id="3975"><a class="highwire-fragment fragment-images colorbox-load highwireFiguresMarkupProcessor-processed cboxElement" data-dcnode-id="3976" data-f
