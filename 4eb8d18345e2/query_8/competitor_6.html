igure-caption="<div class=&quot;highwire-markup&quot;>Display of a normal profile of a multiple-breath N2 washout with the patient breathing 100% O2. The area under the curve is the N2 volume washed out, which, divided by the total volume washed out, gives the fractional concentration of N2 in the volume of gas washed out at the end of the test or in the end-tidal gas of the last breath at the end of the test.</div>" data-hide-link-title="0" data-icon-position="" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//erj.ersjournals.com/content/erj/26/3/511/F4.large.jpg%3Fwidth%3D800%26height%3D600%26carousel%3D1" rel="gallery-fragment-images-242121064" title="Display of a normal profile of a multiple-breath N2 washout with the patient breathing 100% O2. The area under the curve is the N2 volume washed out, which, divided by the total volume washed out, gives the fractional concentration of N2 in the volume of gas washed out at the end of the test or in the end-tidal gas of the last breath at the end of the test."><span class="hw-responsive-img" data-dcnode-id="3977"><img alt="Fig. 4—" class="highwire-fragment fragment-image lazyload" data-dcnode-id="3980" data-src="https://erj.ersjournals.com/content/erj/26/3/511/F4.medium.gif" src="data:image/gif;base64,R0lGODlhAQABAIAAAAAAAP///yH5BAEAAAAALAAAAAABAAEAAAIBRAA7"><noscript data-dcnode-id="3978"><span data-dcnode-id="3979" instrument_node="">&lt;img class="highwire-fragment fragment-image" alt="Fig. 4&amp;#x2014;" src="https://erj.ersjournals.com/content/erj/26/3/511/F4.medium.gif"/&gt;</span></noscript></span></a></div></div><ul class="highwire-figure-links inline" data-dcnode-id="3964"><li class="download-fig first" data-dcnode-id="3971"><a class="highwire-figure-link highwire-figure-link-download" data-dcnode-id="3972" data-hide-link-title="0" data-icon-position="" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//erj.ersjournals.com/content/erj/26/3/511/F4.large.jpg%3Fdownload%3Dtrue" title="Download Fig. 4—"><span data-dcnode-id="3973" instrument_node="">Download figure</span></a></li><li class="new-tab" data-dcnode-id="3968"><a class="highwire-figure-link highwire-figure-link-newtab" data-dcnode-id="3969" data-hide-link-title="0" data-icon-position="" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//erj.ersjournals.com/content/erj/26/3/511/F4.large.jpg" target="_blank"><span data-dcnode-id="3970" instrument_node="">Open in new tab</span></a></li><li class="download-ppt last" data-dcnode-id="3965"><a class="highwire-figure-link highwire-figure-link-ppt" data-dcnode-id="3966" data-hide-link-title="0" data-icon-position="" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//erj.ersjournals.com/highwire/powerpoint/87696"><span data-dcnode-id="3967" instrument_node="">Download powerpoint</span></a></li></ul></div><div class="fig-caption" data-dcnode-id="3944"><span class="fig-label" data-dcnode-id="3961"><span data-dcnode-id="3962" instrument_node="">Fig. 4—</span></span><span data-dcnode-id="3960" instrument_node=""> </span><p class="first-child" data-dcnode-id="3946" id="p-82"><span data-dcnode-id="3959" instrument_node="">Display of a normal profile of a multiple-breath N</span><sub data-dcnode-id="3957"><span data-dcnode-id="3958" instrument_node="">2</span></sub><span data-dcnode-id="3956" instrument_node=""> washout with the patient breathing 100% O</span><sub data-dcnode-id="3954"><span data-dcnode-id="3955" instrument_node="">2</span></sub><span data-dcnode-id="3953" instrument_node="">. The area under the curve is the N</span><sub data-dcnode-id="3951"><span data-dcnode-id="3952" instrument_node="">2</span></sub><span data-dcnode-id="3950" instrument_node=""> volume washed out, which, divided by the total volume washed out, gives the fractional concentration of N</span><sub data-dcnode-id="3948"><span data-dcnode-id="3949" instrument_node="">2</span></sub><span data-dcnode-id="3947" instrument_node=""> in the volume of gas washed out at the end of the test or in the end-tidal gas of the last breath at the end of the test.</span></p><div class="sb-div caption-clear" data-dcnode-id="3945"></div></div></div><span data-dcnode-id="3942" instrument_node="">
</span></div><span data-dcnode-id="3940" instrument_node="">
</span><div class="subsection" data-dcnode-id="3896" id="sec-16"><span data-dcnode-id="3939" instrument_node="">
</span><h3 data-dcnode-id="3937"><span data-dcnode-id="3938" instrument_node="">Quality control</span></h3><span data-dcnode-id="3936" instrument_node="">
</span><p data-dcnode-id="3910" id="p-51"><span data-dcnode-id="3935" instrument_node="">Before each patient is tested, the N</span><sub data-dcnode-id="3933"><span data-dcnode-id="3934" instrument_node="">2</span></sub><span data-dcnode-id="3932" instrument_node=""> analyser should be set to zero using 100% O</span><sub data-dcnode-id="3930"><span data-dcnode-id="3931" instrument_node="">2</span></sub><span data-dcnode-id="3929" instrument_node="">, and then exposed to room air to confirm calibration. The percentage of N</span><sub data-dcnode-id="3927"><span data-dcnode-id="3928" instrument_node="">2</span></sub><span data-dcnode-id="3926" instrument_node=""> for room air should be within 0.5% of the expected reading for room air (</span><em data-dcnode-id="3924"><span data-dcnode-id="3925" instrument_node="">i.e.</span></em><span data-dcnode-id="3923" instrument_node=""> 78.08%). If a needle valve is used to create a sufficient vacuum to measure N</span><sub data-dcnode-id="3921"><span data-dcnode-id="3922" instrument_node="">2</span></sub><span data-dcnode-id="3920" instrument_node=""> by emission spectroscopy, it should be regularly inspected and cleaned. Before the initial use and once every 6 months thereafter, the linearity of the N</span><sub data-dcnode-id="3918"><span data-dcnode-id="3919" instrument_node="">2</span></sub><span data-dcnode-id="3917" instrument_node=""> analyser should also be confirmed by measuring the N</span><sub data-dcnode-id="3915"><span data-dcnode-id="3916" instrument_node="">2</span></sub><span data-dcnode-id="3914" instrument_node=""> percentage of a calibration gas mixture, where the expected N</span><sub data-dcnode-id="3912"><span data-dcnode-id="3913" instrument_node="">2</span></sub><span data-dcnode-id="3911" instrument_node=""> concentration is ∼40%, either from a certified calibration tank or created using precision dilution techniques. Observed values should be within 0.5% of expected, and readings must be corrected for nonlinearity greater than this.</span></p><span data-dcnode-id="3909" instrument_node="">
</span><p data-dcnode-id="3898" id="p-52"><span data-dcnode-id="3908" instrument_node="">The accuracy of the flow and volume output of the flow-measuring device should be confirmed at least daily with a calibrating syringe, using pumping frequencies that will result in flows of the same range as tidal flows, and should comply with the recommendations made in a previous document in this series </span><a class="xref-bibr" data-dcnode-id="3906" href="#ref-20" id="xref-ref-20-4"><span data-dcnode-id="3907" instrument_node="">20</span></a><span data-dcnode-id="3905" instrument_node="">. Initially and monthly, exhalation volumes should be checked with the syringe filled with room air, and inhalation volumes with the syringe filled with 100% O</span><sub data-dcnode-id="3903"><span data-dcnode-id="3904" instrument_node="">2</span></sub><span data-dcnode-id="3902" instrument_node="">. The temperature should be validated as described previously </span><a class="xref-bibr" data-dcnode-id="3900" href="#ref-19" id="xref-ref-19-2"><span data-dcnode-id="3901" instrument_node="">19</span></a><span data-dcnode-id="3899" instrument_node="">. Testing of biological controls should be performed at least monthly.</span></p><span data-dcnode-id="3897" instrument_node="">
</span></div><span data-dcnode-id="3895" instrument_node="">
</span><div class="subsection" data-dcnode-id="3770" id="sec-17"><span data-dcnode-id="3894" instrument_node="">
</span><h3 data-dcnode-id="3892"><span data-dcnode-id="3893" instrument_node="">Calculations</span></h3><span data-dcnode-id="3891" instrument_node="">
</span><p data-dcnode-id="3879" id="p-53"><span data-dcnode-id="3890" instrument_node="">FRC</span><sub data-dcnode-id="3886"><span data-dcnode-id="3889" instrument_node="">N</span><sub data-dcnode-id="3887"><span data-dcnode-id="3888" instrument_node="">2</span></sub></sub><span data-dcnode-id="3885" instrument_node=""> is computed from the following equation:</span><span class="disp-formula" data-dcnode-id="3880" id="disp-formula-5"><span class="highwire-responsive-lazyload" data-dcnode-id="3881"><img alt="Embedded Image" class="highwire-embed lazyload" data-dcnode-id="3884" data-src="https://erj.ersjournals.com/sites/default/files/highwire/erj/26/3/511/embed/graphic-5.gif" src="data:image/gif;base64,R0lGODlhAQABAIAAAAAAAP///yH5BAEAAAAALAAAAAABAAEAAAIBRAA7"><noscript data-dcnode-id="3882"><span data-dcnode-id="3883" instrument_node="">&lt;img class="highwire-embed" alt="Embedded Image" src="https://erj.ersjournals.com/sites/default/files/highwire/erj/26/3/511/embed/graphic-5.gif"/&gt;</span></noscript></span></span></p><span data-dcnode-id="3878" instrument_node="">
</span><p data-dcnode-id="3804" id="p-54"><span data-dcnode-id="3877" instrument_node="">Solving for FRC</span><sub data-dcnode-id="3873"><span data-dcnode-id="3876" instrument_node="">N</span><sub data-dcnode-id="3874"><span data-dcnode-id="3875" instrument_node="">2</span></sub></sub><span data-dcnode-id="3872" instrument_node="">, this becomes:</span><span class="disp-formula" data-dcnode-id="3867" id="disp-formula-6"><span class="highwire-responsive-lazyload" data-dcnode-id="3868"><img alt="Embedded Image" class="highwire-embed lazyload" data-dcnode-id="3871" data-src="https://erj.ersjournals.com/sites/default/files/highwire/erj/26/3/511/embed/graphic-6.gif" src="data:image/gif;base64,R0lGODlhAQABAIAAAAAAAP///yH5BAEAAAAALAAAAAABAAEAAAIBRAA7"><noscript data-dcnode-id="3869"><span data-dcnode-id="3870" instrument_node="">&lt;img class="highwire-embed" alt="Embedded Image" src="https://erj.ersjournals.com/sites/default/files/highwire/erj/26/3/511/embed/graphic-6.gif"/&gt;</span></noscript></span></span><span data-dcnode-id="3866" instrument_node="">where </span><em data-dcnode-id="3864"><span data-dcnode-id="3865" instrument_node="">F</span></em><sub data-dcnode-id="3859"><span data-dcnode-id="3863" instrument_node="">N</span><sub data-dcnode-id="3861"><span data-dcnode-id="3862" instrument_node="">2</span></sub><span data-dcnode-id="3860" instrument_node="">1</span></sub><span data-dcnode-id="3858" instrument_node=""> and </span><em data-dcnode-id="3856"><span data-dcnode-id="3857" instrument_node="">F</span></em><sub data-dcnode-id="3851"><span data-dcnode-id="3855" instrument_node="">N</span><sub data-dcnode-id="3853"><span data-dcnode-id="3854" instrument_node="">2</span></sub><span data-dcnode-id="3852" instrument_node="">2</span></sub><span data-dcnode-id="3850" instrument_node=""> are the fractions of N</span><sub data-dcnode-id="3848"><span data-dcnode-id="3849" instrument_node="">2</span></sub><span data-dcnode-id="3847" instrument_node=""> in the end-tidal gas before the washout, and in the end-tidal gas of the last breath at the end of the test, respectively. The N</span><sub data-dcnode-id="3845"><span data-dcnode-id="3846" instrument_node="">2</span></sub><span data-dcnode-id="3844" instrument_node=""> volume washed out is the volume in the bag multiplied by the N</span><sub data-dcnode-id="3842"><span data-dcnode-id="3843" instrument_node="">2</span></sub><span data-dcnode-id="3841" instrument_node=""> fraction of the mixed gas in the bag, or it is calculated on-line as the sum of </span><em data-dcnode-id="3839"><span data-dcnode-id="3840" instrument_node="">F</span></em><sub data-dcnode-id="3835"><span data-dcnode-id="3838" instrument_node="">N</span><sub data-dcnode-id="3836"><span data-dcnode-id="3837" instrument_node="">2</span></sub></sub><span data-dcnode-id="3834" instrument_node="">×</span><em data-dcnode-id="3832"><span data-dcnode-id="3833" instrument_node="">V</span></em><sub data-dcnode-id="3830"><span data-dcnode-id="3831" instrument_node="">T</span></sub><span data-dcnode-id="3829" instrument_node=""> for all the breaths, with </span><em data-dcnode-id="3827"><span data-dcnode-id="3828" instrument_node="">F</span></em><sub data-dcnode-id="3823"><span data-dcnode-id="3826" instrument_node="">N</span><sub data-dcnode-id="3824"><span data-dcnode-id="3825" instrument_node="">2</span></sub></sub><span data-dcnode-id="3822" instrument_node=""> being the mixed expired fraction of N</span><sub data-dcnode-id="3820"><span data-dcnode-id="3821" instrument_node="">2</span></sub><span data-dcnode-id="3819" instrument_node=""> in the individual breath and </span><em data-dcnode-id="3817"><span data-dcnode-id="3818" instrument_node="">V</span></em><sub data-dcnode-id="3815"><span data-dcnode-id="3816" instrument_node="">T</span></sub><span data-dcnode-id="3814" instrument_node=""> the volume of that breath. This sum equals the area under the curve in figure 4</span><a class="xref-up-link" data-dcnode-id="3811" href="#F4" id="xref-fig-4-2"><span data-dcnode-id="3812"><span data-dcnode-id="3813" instrument_node="">⇑</span></span></a><span data-dcnode-id="3810" instrument_node="">. This value of FRC</span><sub data-dcnode-id="3806"><span data-dcnode-id="3809" instrument_node="">N</span><sub data-dcnode-id="3807"><span data-dcnode-id="3808" instrument_node="">2</span></sub></sub><span data-dcnode-id="3805" instrument_node=""> should be corrected to BTPS conditions, and the volume of the equipment dead space must be subtracted.</span></p><span data-dcnode-id="3803" instrument_node="">
</span><p data-dcnode-id="3772" id="p-55"><span data-dcnode-id="3802" instrument_node="">N</span><sub data-dcnode-id="3800"><span data-dcnode-id="3801" instrument_node="">2</span></sub><span data-dcnode-id="3799" instrument_node=""> excreted from the tissues can be estimated from tables or complex exponential equations. Since the difference in the correction when these different sources are used is small, it is recommended that the following relatively simple equation for estimating tissue excretion, adjusted for body size as a result of N</span><sub data-dcnode-id="3797"><span data-dcnode-id="3798" instrument_node="">2</span></sub><span data-dcnode-id="3796" instrument_node=""> eliminated after a 7-min washout period, is used </span><a class="xref-bibr" data-dcnode-id="3794" href="#ref-29" id="xref-ref-29-1"><span data-dcnode-id="3795" instrument_node="">29</span></a><span data-dcnode-id="3793" instrument_node="">. As the largest fraction of the N</span><sub data-dcnode-id="3791"><span data-dcnode-id="3792" instrument_node="">2</span></sub><span data-dcnode-id="3790" instrument_node=""> is excreted in the first phase of the washout, this equation can be assumed to be appropriate for washout times of &lt;7 min:</span><span class="disp-formula" data-dcnode-id="3785" id="disp-formula-7"><span class="highwire-responsive-lazyload" data-dcnode-id="3786"><img alt="Embedded Image" class="highwire-embed lazyload" data-dcnode-id="3789" data-src="https://erj.ersjournals.com/sites/default/files/highwire/erj/26/3/511/embed/graphic-7.gif" src="data:image/gif;base64,R0lGODlhAQABAIAAAAAAAP///yH5BAEAAAAALAAAAAABAAEAAAIBRAA7"><noscript data-dcnode-id="3787"><span data-dcnode-id="3788" instrument_node="">&lt;img class="highwire-embed" alt="Embedded Image" src="https://erj.ersjournals.com/sites/default/files/highwire/erj/26/3/511/embed/graphic-7.gif"/&gt;</span></noscript></span></span><span data-dcnode-id="3784" instrument_node="">where BSA is the body surface area in m</span><sup data-dcnode-id="3782"><span data-dcnode-id="3783" instrument_node="">2</span></sup><span data-dcnode-id="3781" instrument_node="">, and is determined by using weight in kg and height in cm in the following equation </span><a class="xref-bibr" data-dcnode-id="3779" href="#ref-30" id="xref-ref-30-1"><span data-dcnode-id="3780" instrument_node="">30</span></a><span data-dcnode-id="3778" instrument_node="">:</span><span class="disp-formula" data-dcnode-id="3773" id="disp-formula-8"><span class="highwire-responsive-lazyload" data-dcnode-id="3774"><img alt="Embedded Image" class="highwire-embed lazyload" data-dcnode-id="3777" data-src="https://erj.ersjournals.com/sites/default/files/highwire/erj/26/3/511/embed/graphic-8.gif" src="data:image/gif;base64,R0lGODlhAQABAIAAAAAAAP///yH5BAEAAAAALAAAAAABAAEAAAIBRAA7"><noscript data-dcnode-id="3775"><span data-dcnode-id="3776" instrument_node="">&lt;img class="highwire-embed" alt="Embedded Image" src="https://erj.ersjournals.com/sites/default/files/highwire/erj/26/3/511/embed/graphic-8.gif"/&gt;</span></noscript></span></span></p><span data-dcnode-id="3771" instrument_node="">
</span></div><span data-dcnode-id="3769" instrument_node="">
</span></div><div class="section" data-dcnode-id="3387" id="sec-18"><span data-dcnode-id="3767" instrument_node="">
</span><h2 data-dcnode-id="3765"><span data-dcnode-id="3766" instrument_node="">MEASUREMENT OF FRC USING HELIUM DILUTION</span></h2><span data-dcnode-id="3764" instrument_node="">
</span><div class="subsection" data-dcnode-id="3715" id="sec-19"><span data-dcnode-id="3763" instrument_node="">
</span><h3 data-dcnode-id="3761"><span data-dcnode-id="3762" instrument_node="">Introduction and theory</span></h3><span data-dcnode-id="3760" instrument_node="">
</span><p data-dcnode-id="3717" id="p-56"><span data-dcnode-id="3759" instrument_node="">The method for measuring lung volumes is based on the equilibration of gas in the lung with a known volume of gas containing helium </span><a class="xref-bibr" data-dcnode-id="3757" href="#ref-31" id="xref-ref-31-1"><span data-dcnode-id="3758" instrument_node="">31</span></a><span data-dcnode-id="3756" instrument_node="">, </span><a class="xref-bibr" data-dcnode-id="3754" href="#ref-32" id="xref-ref-32-1"><span data-dcnode-id="3755" instrument_node="">32</span></a><span data-dcnode-id="3753" instrument_node="">. The test gas consists of air with added oxygen of 25–30%, but higher concentrations are acceptable. Helium is added to a concentration of ∼10% (full scale) </span><a class="xref-bibr" data-dcnode-id="3751" href="#ref-9" id="xref-ref-9-1"><span data-dcnode-id="3752" instrument_node="">9</span></a><span data-dcnode-id="3750" instrument_node="">. The lung volume (FRC</span><sub data-dcnode-id="3748"><span data-dcnode-id="3749" instrument_node="">He</span></sub><span data-dcnode-id="3747" instrument_node="">) at the time the subject is connected to the spirometry apparatus of a known volume (</span><em data-dcnode-id="3745"><span data-dcnode-id="3746" instrument_node="">V</span></em><sub data-dcnode-id="3743"><span data-dcnode-id="3744" instrument_node="">app</span></sub><span data-dcnode-id="3742" instrument_node="">) and helium fraction (</span><em data-dcnode-id="3740"><span data-dcnode-id="3741" instrument_node="">F</span></em><sub data-dcnode-id="3738"><span data-dcnode-id="3739" instrument_node="">He1</span></sub><span data-dcnode-id="3737" instrument_node="">) is calculated from the helium fraction at the time of equilibration (</span><em data-dcnode-id="3735"><span data-dcnode-id="3736" instrument_node="">F</span></em><sub data-dcnode-id="3733"><span data-dcnode-id="3734" instrument_node="">He2</span></sub><span data-dcnode-id="3732" instrument_node="">) as follows:</span><span class="disp-formula" data-dcnode-id="3727" id="disp-formula-9"><span class="highwire-responsive-lazyload" data-dcnode-id="3728"><img alt="Embedded Image" class="highwire-embed lazyload" data-dcnode-id="3731" data-src="https://erj.ersjournals.com/sites/default/files/highwire/erj/26/3/511/embed/graphic-9.gif" src="data:image/gif;base64,R0lGODlhAQABAIAAAAAAAP///yH5BAEAAAAALAAAAAABAAEAAAIBRAA7"><noscript data-dcnode-id="3729"><span data-dcnode-id="3730" instrument_node="">&lt;img class="highwire-embed" alt="Embedded Image" src="https://erj.ersjournals.com/sites/default/files/highwire/erj/26/3/511/embed/graphic-9.gif"/&gt;</span></noscript></span></span><span class="disp-formula" data-dcnode-id="3722" id="disp-formula-10"><span class="highwire-responsive-lazyload" data-dcnode-id="3723"><img alt="Embedded Image" class="highwire-embed lazyload" data-dcnode-id="3726" data-src="https://erj.ersjournals.com/sites/default/files/highwire/erj/26/3/511/embed/graphic-10.gif" src="data:image/gif;base64,R0lGODlhAQABAIAAAAAAAP///yH5BAEAAAAALAAAAAABAAEAAAIBRAA7"><noscript data-dcnode-id="3724"><span data-dcnode-id="3725" instrument_node="">&lt;img class="highwire-embed" alt="Embedded Image" src="https://erj.ersjournals.com/sites/default/files/highwire/erj/26/3/511/embed/graphic-10.gif"/&gt;</span></noscript></span></span><span data-dcnode-id="3721" instrument_node="">where lung volume includes the dead space of the valve and mouthpiece, which must be subtracted, and FRC</span><sub data-dcnode-id="3719"><span data-dcnode-id="3720" instrument_node="">He</span></sub><span data-dcnode-id="3718" instrument_node=""> should be corrected to BTPS conditions.</span></p><span data-dcnode-id="3716" instrument_node="">
</span></div><span data-dcnode-id="3714" instrument_node="">
</span><div class="subsection" data-dcnode-id="3603" id="sec-20"><span data-dcnode-id="3713" instrument_node="">
</span><h3 data-dcnode-id="3711"><span data-dcnode-id="3712" instrument_node="">Equipment</span></h3><span data-dcnode-id="3710" instrument_node="">
</span><p data-dcnode-id="3695" id="p-57"><span data-dcnode-id="3709" instrument_node="">For systems that utilise a volume-displacement spirometer, the capacity of the spirometer should be ≥7 L. It should be noted, however, that the larger the spirometer is, the higher is the required resolution of the helium measurements. The specifications for the volume measurements should comply with the recommendations in a previous document in this series </span><a class="xref-bibr" data-dcnode-id="3707" href="#ref-20" id="xref-ref-20-5"><span data-dcnode-id="3708" instrument_node="">20</span></a><span data-dcnode-id="3706" instrument_node="">. Furthermore, the </span><em data-dcnode-id="3704"><span data-dcnode-id="3705" instrument_node="">V</span></em><sub data-dcnode-id="3702"><span data-dcnode-id="3703" instrument_node="">app</span></sub><span data-dcnode-id="3701" instrument_node=""> with the bell at zero volume, including the circuit tubing to the mouthpiece valve, should not exceed 4.5 L, since the smaller the </span><em data-dcnode-id="3699"><span data-dcnode-id="3700" instrument_node="">V</span></em><sub data-dcnode-id="3697"><span data-dcnode-id="3698" instrument_node="">app</span></sub><span data-dcnode-id="3696" instrument_node=""> is at the time that the patient is switched into the circuit, the larger (and more accurate) the measured changes in helium concentration during the FRC measurement will be.</span></p><span data-dcnode-id="3694" instrument_node="">
</span><p data-dcnode-id="3674" id="p-58"><span data-dcnode-id="3693" instrument_node="">The spirometer should be equipped with a mixing fan, CO</span><sub data-dcnode-id="3691"><span data-dcnode-id="3692" instrument_node="">2</span></sub><span data-dcnode-id="3690" instrument_node=""> absorber, O</span><sub data-dcnode-id="3688"><span data-dcnode-id="3689" instrument_node="">2</span></sub><span data-dcnode-id="3687" instrument_node=""> and helium supply, a gas inlet and outlet, and a water vapour absorber in the line to the helium analyser. Before the measurements, enough 100% helium should be added to the system to give a helium reading of ∼10%. The remainder of the gas added to the system can be room air or a mixture of room air and O</span><sub data-dcnode-id="3685"><span data-dcnode-id="3686" instrument_node="">2</span></sub><span data-dcnode-id="3684" instrument_node="">. If room air is used, it is important to ensure adequate O</span><sub data-dcnode-id="3682"><span data-dcnode-id="3683" instrument_node="">2</span></sub><span data-dcnode-id="3681" instrument_node=""> replacement during the test. The mixing fan should mix the gas throughout the circuit within 8 s after the end of exhalation into the circuit. Typically, breathing-circuit flows of ∼50 L·min</span><sup data-dcnode-id="3679"><span data-dcnode-id="3680" instrument_node="">−1</span></sup><span data-dcnode-id="3678" instrument_node=""> are utilised to ensure adequate mixing of helium concentration measurements, which are reported every 15 s. If pneumotachometers or other flow devices are used instead of volume-displacement spirometers, and if they are not isolated from variations in gas properties (</span><em data-dcnode-id="3676"><span data-dcnode-id="3677" instrument_node="">e.g.</span></em><span data-dcnode-id="3675" instrument_node=""> by bag-in-box systems), then appropriate calibrations and corrections may be necessary to accommodate the changes in gas properties.</span></p><span data-dcnode-id="3673" instrument_node="">
</span><p data-dcnode-id="3659" id="p-59"><span data-dcnode-id="3672" instrument_node="">A thermal-conductivity helium analyser is the type utilised most commonly, but other types of helium analysers may be used </span><a class="xref-bibr" data-dcnode-id="3670" href="#ref-33" id="xref-ref-33-1"><span data-dcnode-id="3671" instrument_node="">33</span></a><span data-dcnode-id="3669" instrument_node="">. The helium analyser should have a range of ∼0–10% helium, a resolution of ≤0.01% helium over the entire range, and a 95% response time of &lt;15 s to a 2% step change in helium concentration in the breathing circuit. The meter should be stable with a drift of ≤0.02% for measurement periods of up to 10 min. For systems in which O</span><sub data-dcnode-id="3667"><span data-dcnode-id="3668" instrument_node="">2</span></sub><span data-dcnode-id="3666" instrument_node=""> concentration changes substantially because of O</span><sub data-dcnode-id="3664"><span data-dcnode-id="3665" instrument_node="">2</span></sub><span data-dcnode-id="3663" instrument_node=""> consumption during the measurement of FRC, the helium analyser must be calibrated over the range of O</span><sub data-dcnode-id="3661"><span data-dcnode-id="3662" instrument_node="">2</span></sub><span data-dcnode-id="3660" instrument_node=""> concentrations encountered. Since thermal-conductivity helium analysers are sensitive to temperature changes, it should be ensured that the temperature of the gases entering the helium analyser is the same as that during calibration.</span></p><span data-dcnode-id="3658" instrument_node="">
</span><p data-dcnode-id="3626" id="p-60"><span data-dcnode-id="3657" instrument_node="">A small pump samples gas from the breathing circuit just beyond the CO</span><sub data-dcnode-id="3655"><span data-dcnode-id="3656" instrument_node="">2</span></sub><span data-dcnode-id="3654" instrument_node=""> absorber, and pushes it through a desiccant chamber, through the helium analyser and back into the main circuit; for most analysers, a flow of ≥200 mL·min</span><sup data-dcnode-id="3652"><span data-dcnode-id="3653" instrument_node="">−1</span></sup><span data-dcnode-id="3651" instrument_node=""> is necessary. Since changes in the flow of gas through the analyser or in the pressure of gas in the analyser circuit will affect response time or accuracy, variations in flow and pressure should be minimised. Similarly, since thermal-conductivity analysers also respond to changes in concentration of CO</span><sub data-dcnode-id="3649"><span data-dcnode-id="3650" instrument_node="">2</span></sub><span data-dcnode-id="3648" instrument_node="">, O</span><sub data-dcnode-id="3646"><span data-dcnode-id="3647" instrument_node="">2</span></sub><span data-dcnode-id="3645" instrument_node="">, N</span><sub data-dcnode-id="3643"><span data-dcnode-id="3644" instrument_node="">2</span></sub><span data-dcnode-id="3642" instrument_node=""> and water vapour pressure, CO</span><sub data-dcnode-id="3640"><span data-dcnode-id="3641" instrument_node="">2</span></sub><span data-dcnode-id="3639" instrument_node=""> and water are removed before the sample is introduced into the helium analyser, and the O</span><sub data-dcnode-id="3637"><span data-dcnode-id="3638" instrument_node="">2</span></sub><span data-dcnode-id="3636" instrument_node=""> concentration is maintained relatively constant by adding O</span><sub data-dcnode-id="3634"><span data-dcnode-id="3635" instrument_node="">2</span></sub><span data-dcnode-id="3633" instrument_node=""> to the circuit as necessary. The activity of the CO</span><sub data-dcnode-id="3631"><span data-dcnode-id="3632" instrument_node="">2</span></sub><span data-dcnode-id="3630" instrument_node=""> and water absorbers should be ensured before each test (either from visual or photocell detection of indicator colour changes, or by replacing the absorbent after a specified number of tests (or accumulated minutes of equilibration time)). The breathing-circuit CO</span><sub data-dcnode-id="3628"><span data-dcnode-id="3629" instrument_node="">2</span></sub><span data-dcnode-id="3627" instrument_node=""> level during testing should be kept below 0.5% to avoid patient discomfort and hyperventilation.</span></p><span data-dcnode-id="3625" instrument_node="">
</span><p data-dcnode-id="3620" id="p-61"><span data-dcnode-id="3624" instrument_node="">Lung volumes are reported at BTPS conditions. When TLC and subdivisions thereof are measured, the temperature of gas inside the system differs from both BTPS and the ambient temperature and pressure, saturated with water vapour (ATPS) conditions computed using room temperature, since the conditions are variably affected by exhaled warm gas, room temperature, and heat generated by absorption of CO</span><sub data-dcnode-id="3622"><span data-dcnode-id="3623" instrument_node="">2</span></sub><span data-dcnode-id="3621" instrument_node=""> in the soda lime canister. Therefore, the temperature of the gas in the breathing circuit should be measured so that these lung volumes can be corrected to BTPS conditions. The temperature sensor should have an accuracy of better than 0.5°C over the range of 12–30°C, and should have a 90% response time of &lt;30 s to a 5°C step change of temperature of the gas inside the breathing circuit.</span></p><span data-dcnode-id="3619" instrument_node="">
</span><p data-dcnode-id="3617" id="p-62"><span data-dcnode-id="3618" instrument_node="">The breathing valve and mouthpiece should have a combined dead space of &lt;100 mL, and should be easy to disassemble for sterilisation. The size of this dead space should be available from the manufacturer or measured by water displacement.</span></p><span data-dcnode-id="3616" instrument_node="">
</span><p data-dcnode-id="3605" id="p-63"><span data-dcnode-id="3615" instrument_node="">Continuous measurement of the O</span><sub data-dcnode-id="3613"><span data-dcnode-id="3614" instrument_node="">2</span></sub><span data-dcnode-id="3612" instrument_node=""> concentration ensures a satisfactory O</span><sub data-dcnode-id="3610"><span data-dcnode-id="3611" instrument_node="">2</span></sub><span data-dcnode-id="3609" instrument_node=""> supply and also provides a means to adjust the output of thermal-conductivity helium analysers for the effect of different O</span><sub data-dcnode-id="3607"><span data-dcnode-id="3608" instrument_node="">2</span></sub><span data-dcnode-id="3606" instrument_node=""> concentrations.</span></p><span data-dcnode-id="3604" instrument_node="">
</span></div><span data-dcnode-id="3602" instrument_node="">
</span><div class="subsection" data-dcnode-id="3507" id="sec-21"><span data-dcnode-id="3601" instrument_node="">
</span><h3 data-dcnode-id="3599"><span data-dcnode-id="3600" instrument_node="">Measurement technique</span></h3><span data-dcnode-id="3598" instrument_node="">
</span><p data-dcnode-id="3556" id="p-64"><span data-dcnode-id="3597" instrument_node="">Specific details of procedures will vary with different types of equipment and degrees of automation </span><a class="xref-bibr" data-dcnode-id="3595" href="#ref-9" id="xref-ref-9-2"><span data-dcnode-id="3596" instrument_node="">9</span></a><span data-dcnode-id="3594" instrument_node="">, but the basic procedure is as follows. 1) The equipment should be turned on and allowed an adequate warm-up time. 2) The equipment should be set up for testing, including calibration, according to manufacturer's instructions. 3) The patient should be asked if he/she has a perforated eardrum (if so, an earplug should be used). 4) The patient is seated comfortably, with no need to remove dentures. The procedure is explained, emphasising the need to avoid leaks around the mouthpiece during the test and to use a nose clip. 5) The patient breathes for ∼30–60 s on the mouthpiece to become accustomed to the apparatus, and to ensure a stable end-tidal expiratory level. 6) The patient is turned “in” (</span><em data-dcnode-id="3592"><span data-dcnode-id="3593" instrument_node="">i.e.</span></em><span data-dcnode-id="3591" instrument_node=""> connected to the test gas) at the end of a normal tidal expiration. 7) The patient is instructed to breathe regular tidal breaths. 8) The O</span><sub data-dcnode-id="3589"><span data-dcnode-id="3590" instrument_node="">2</span></sub><span data-dcnode-id="3588" instrument_node=""> flow is adjusted to compensate for O</span><sub data-dcnode-id="3586"><span data-dcnode-id="3587" instrument_node="">2</span></sub><span data-dcnode-id="3585" instrument_node=""> consumption (significant errors in the calculation of FRC can result if O</span><sub data-dcnode-id="3583"><span data-dcnode-id="3584" instrument_node="">2</span></sub><span data-dcnode-id="3582" instrument_node=""> consumption is not adequately accounted for). 9) The helium concentration is noted every 15 s. 10) Helium equilibration is considered to be complete when the change in helium concentration is &lt;0.02% for 30 s. The test rarely exceeds 10 min, even in patients with severe gas-exchange abnormalities </span><a class="xref-bibr" data-dcnode-id="3580" href="#ref-9" id="xref-ref-9-3"><span data-dcnode-id="3581" instrument_node="">9</span></a><span data-dcnode-id="3579" instrument_node="">. 11) Once the helium equilibration is complete, the patient is turned “out” (</span><em data-dcnode-id="3577"><span data-dcnode-id="3578" instrument_node="">i.e.</span></em><span data-dcnode-id="3576" instrument_node=""> disconnected from the test gas) of the system. If the measurements of ERV and IC are to be linked to the FRC measured, it should be ensured that the spirometer has an adequate volume for the full ERV and IVC manoeuvres (fig. 5</span><a class="xref-down-link" data-dcnode-id="3573" href="#F5" id="xref-fig-5-1"><span data-dcnode-id="3574"><span data-dcnode-id="3575" instrument_node="">⇓</span></span></a><span data-dcnode-id="3572" instrument_node="">). 12) At least one technically satisfactory measurement should be obtained. Due to the extra costs and time in making multiple measurements, and the relatively good inter-day variability in adults, two or more measurements of FRC</span><sub data-dcnode-id="3570"><span data-dcnode-id="3571" instrument_node="">He</span></sub><span data-dcnode-id="3569" instrument_node=""> need to be made only when necessitated by clinical or research need </span><a class="xref-bibr" data-dcnode-id="3567" href="#ref-9" id="xref-ref-9-4"><span data-dcnode-id="3568" instrument_node="">9</span></a><span data-dcnode-id="3566" instrument_node="">. If only one measurement of FRC</span><sub data-dcnode-id="3564"><span data-dcnode-id="3565" instrument_node="">He</span></sub><span data-dcnode-id="3563" instrument_node=""> is made, caution should be used in the interpretation. For younger children, however, it is recommended that at least two technically satisfactory measurements be performed. If more than one measurement of FRC</span><sub data-dcnode-id="3561"><span data-dcnode-id="3562" instrument_node="">He</span></sub><span data-dcnode-id="3560" instrument_node=""> is carried out, the value reported for FRC</span><sub data-dcnode-id="3558"><span data-dcnode-id="3559" instrument_node="">He</span></sub><span data-dcnode-id="3557" instrument_node=""> should be the mean of technically acceptable results that agree within 10%.</span></p><div class="fig pos-float odd" data-dcnode-id="3509" id="F5"><div class="highwire-figure" data-dcnode-id="3538"><div class="fig-inline-img-wrapper" data-dcnode-id="3549"><div class="fig-inline-img" data-dcnode-id="3550"><a class="highwire-fragment fragment-images colorbox-load highwireFiguresMarkupProcessor-processed cboxElement" data-dcnode-id="3551" data-figure-caption="<div class=&quot;highwire-markup&quot;>Display of an acceptable profile for a helium dilution test to determine functional residual capacity (FRC), in which O2 is continually added to compensate for O2 consumption. As the helium concentration falls (a), it corresponds to the time course of the volume change (b). To obtain “linked” expiratory reserve volume (ERV) and inspiratory vital capacity manoeuvres, the patient should not be switched out of the system as shown. FHe1: helium fraction at the time that the subject is connected to the apparatus; FHe2: helium fraction at the time of equilibration; IC: inspiratory capacity; IRV: inspiratory reserve volume; VT: tidal volume (TV); RV: residual volume.</div>" data-hide-link-title="0" data-icon-position="" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//erj.ersjournals.com/content/erj/26/3/511/F5.large.jpg%3Fwidth%3D800%26height%3D600%26carousel%3D1" rel="gallery-fragment-images-242121064" title="Display of an acceptable profile for a helium dilution test to determine functional residual capacity (FRC), in which O2 is continually added to compensate for O2 consumption. As the helium concentration falls (a), it corresponds to the time course of the volume change (b). To obtain “linked” expiratory reserve volume (ERV) and inspiratory vital capacity manoeuvres, the patient should not be switched out of the system as shown. FHe1: helium fraction at the time that the subject is connected to the apparatus; FHe2: helium fraction at the time of equilibration; IC: inspiratory capacity; IRV: inspiratory reserve volume; VT: tidal volume (TV); RV: residual volume."><span class="hw-responsive-img" data-dcnode-id="3552"><img alt="Fig. 5—" class="highwire-fragment fragment-image lazyload" data-dcnode-id="3555" data-src="https://erj.ersjournals.com/content/erj/26/3/511/F5.medium.gif" src="data:image/gif;base64,R0lGODlhAQABAIAAAAAAAP///yH5BAEAAAAALAAAAAABAAEAAAIBRAA7"><noscript data-dcnode-id="3553"><span data-dcnode-id="3554" instrument_node="">&lt;img class="highwire-fragment fragment-image" alt="Fig. 5&amp;#x2014;" src="https://erj.ersjournals.com/content/erj/26/3/511/F5.medium.gif"/&gt;</span></noscript></span></a></div></div><ul class="highwire-figure-links inline" data-dcnode-id="3539"><li class="download-fig first" data-dcnode-id="3546"><a class="highwire-figure-link highwire-figure-link-download" data-dcnode-id="3547" data-hide-link-title="0" data-icon-position="" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//erj.ersjournals.com/content/erj/26/3/511/F5.large.jpg%3Fdownload%3Dtrue" title="Download Fig. 5—"><span data-dcnode-id="3548" instrument_node="">Download figure</span></a></li><li class="new-tab" data-dcnode-id="3543"><a class="highwire-figure-link highwire-figure-link-newtab" data-dcnode-id="3544" data-hide-link-title="0" data-icon-position="" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//erj.ersjournals.com/content/erj/26/3/511/F5.large.jpg" target="_blank"><span data-dcnode-id="3545" instrument_node="">Open in new tab</span></a></li><li class="download-ppt last" data-dcnode-id="3540"><a class="highwire-figure-link highwire-figure-link-ppt" data-dcnode-id="3541" data-hide-link-title="0" data-icon-position="" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//erj.ersjournals.com/highwire/powerpoint/87701"><span data-dcnode-id="3542" instrument_node="">Download powerpoint</span></a></li></ul></div><div class="fig-caption" data-dcnode-id="3510"><span class="fig-label" data-dcnode-id="3536"><span data-dcnode-id="3537" instrument_node="">Fig. 5—</span></span><span data-dcnode-id="3535" instrument_node=""> </span><p class="first-child" data-dcnode-id="3512" id="p-83"><span data-dcnode-id="3534" instrument_node="">Display of an acceptable profile for a helium dilution test to determine functional residual capacity (FRC), in which O</span><sub data-dcnode-id="3532"><span data-dcnode-id="3533" instrument_node="">2</span></sub><span data-dcnode-id="3531" instrument_node=""> is continually added to compensate for O</span><sub data-dcnode-id="3529"><span data-dcnode-id="3530" instrument_node="">2</span></sub><span data-dcnode-id="3528" instrument_node=""> consumption. As the helium concentration falls (a), it corresponds to the time course of the volume change (b). To obtain “linked” expiratory reserve volume (ERV) and inspiratory vital capacity manoeuvres, the patient should not be switched out of the system as shown. </span><em data-dcnode-id="3526"><span data-dcnode-id="3527" instrument_node="">F</span></em><sub data-dcnode-id="3524"><span data-dcnode-id="3525" instrument_node="">He1</span></sub><span data-dcnode-id="3523" instrument_node="">: helium fraction at the time that the subject is connected to the apparatus; </span><em data-dcnode-id="3521"><span data-dcnode-id="3522" instrument_node="">F</span></em><sub data-dcnode-id="3519"><span data-dcnode-id="3520" instrument_node="">He2</span></sub><span data-dcnode-id="3518" instrument_node="">: helium fraction at the time of equilibration; IC: inspiratory capacity; IRV: inspiratory reserve volume; </span><em data-dcnode-id="3516"><span data-dcnode-id="3517" instrument_node="">V</span></em><sub data-dcnode-id="3514"><span data-dcnode-id="3515" instrument_node="">T</span></sub><span data-dcnode-id="3513" instrument_node="">: tidal volume (TV); RV: residual volume.</span></p><div class="sb-div caption-clear" data-dcnode-id="3511"></div></div></div><span data-dcnode-id="3508" instrument_node="">
</span></div><span data-dcnode-id="3506" instrument_node="">
</span><div class="subsection" data-dcnode-id="3480" id="sec-22"><span data-dcnode-id="3505" instrument_node="">
</span><h3 data-dcnode-id="3503"><span data-dcnode-id="3504" instrument_node="">Quality control</span></h3><span data-dcnode-id="3502" instrument_node="">
</span><p data-dcnode-id="3494" id="p-65"><span data-dcnode-id="3501" instrument_node="">Before each patient is tested, the following items should be checked: water level of water-sealed spirometers (if applicable); status of all CO</span><sub data-dcnode-id="3499"><span data-dcnode-id="3500" instrument_node="">2</span></sub><span data-dcnode-id="3498" instrument_node=""> and water absorbers; operation of the circuit fan (assessed by listening); and the baseline stability of helium and volume signals. Systems that can be pressurised conveniently (</span><em data-dcnode-id="3496"><span data-dcnode-id="3497" instrument_node="">e.g.</span></em><span data-dcnode-id="3495" instrument_node=""> by placing a weight on top of an upright water-sealed spirometer) should be checked for leaks at least once during the 24 h prior to patient testing, and after tubing or canister changes.</span></p><span data-dcnode-id="3493" instrument_node="">
</span><p data-dcnode-id="3488" id="p-66"><span data-dcnode-id="3492" instrument_node="">The stability of the helium meter should be confirmed weekly (it should not drift &gt;0.02% in 10 min). The temperature should be validated as described previously </span><a class="xref-bibr" data-dcnode-id="3490" href="#ref-19" id="xref-ref-19-3"><span data-dcnode-id="3491" instrument_node="">19</span></a><span data-dcnode-id="3489" instrument_node="">.</span></p><span data-dcnode-id="3487" instrument_node="">
</span><p data-dcnode-id="3482" id="p-67"><span data-dcnode-id="3486" instrument_node="">It is necessary to check the linearity of the helium meter periodically or when erroneous results are suspected. This is accomplished by diluting a measured helium concentration with known volumes of air (maximum error of 0.5% of full scale, which would be 0.05% for 10% helium). However, contemporary helium meters have very stable linearity. If the stability of the helium meter linearity has been demonstrated (</span><em data-dcnode-id="3484"><span data-dcnode-id="3485" instrument_node="">e.g.</span></em><span data-dcnode-id="3483" instrument_node=""> by weekly checks over a few months), then quarterly or semi-annual checks seem sufficient, as there are no available data to support more frequent linearity checks for all instruments. Monthly testing of biological controls is recommended and useful, in that it tests not only the equipment, but also the procedures used by the technicians.</span></p><span data-dcnode-id="3481" instrument_node="">
</span></div><span data-dcnode-id="3479" instrument_node="">
</span><div class="subsection" data-dcnode-id="3389" id="sec-23"><span data-dcnode-id="3478" instrument_node="">
</span><h3 data-dcnode-id="3476"><span data-dcnode-id="3477" instrument_node="">Calculations</span></h3><span data-dcnode-id="3475" instrument_node="">
</span><p data-dcnode-id="3470" id="p-68"><span data-dcnode-id="3474" instrument_node="">Providing the subject is connected to the spirometer at FRC, FRC</span><sub data-dcnode-id="3472"><span data-dcnode-id="3473" instrument_node="">He</span></sub><span data-dcnode-id="3471" instrument_node=""> can be calculated from the previously stated equations (included in the introduction and theory of the measurement of FRC using helium dilution).</span></p><span data-dcnode-id="3469" instrument_node="">
</span><p data-dcnode-id="3448" id="p-69"><span data-dcnode-id="3468" instrument_node="">With regards to corrections in calculating FRC</span><sub data-dcnode-id="3466"><span data-dcnode-id="3467" instrument_node="">He</span></sub><span data-dcnode-id="3465" instrument_node="">, the following points should be considered. 1) FRC</span><sub data-dcnode-id="3463"><span data-dcnode-id="3464" instrument_node="">He</span></sub><span data-dcnode-id="3462" instrument_node=""> is determined at a condition between ATPS and BTPS, and should be corrected to BTPS. 2) It is recommended that no corrections for helium absorption be made. 3) Correction factors for N</span><sub data-dcnode-id="3460"><span data-dcnode-id="3461" instrument_node="">2</span></sub><span data-dcnode-id="3459" instrument_node=""> excretion during the helium equilibration, and corrections for helium concentration when the respiratory quotient differs from 1.0 can be ignored </span><a class="xref-bibr" data-dcnode-id="3457" href="#ref-9" id="xref-ref-9-5"><span data-dcnode-id="3458" instrument_node="">9</span></a><span data-dcnode-id="3456" instrument_node="">. 4) With regards to switching errors, in practice, patients are not always at FRC when they are switched into the spirometer circuit. Corrections for this should be made from the spirometer trace when reporting FRC</span><sub data-dcnode-id="3454"><span data-dcnode-id="3455" instrument_node="">He</span></sub><span data-dcnode-id="3453" instrument_node=""> (fig. 6</span><a class="xref-down-link" data-dcnode-id="3450" href="#F6" id="xref-fig-6-1"><span data-dcnode-id="3451"><span data-dcnode-id="3452" instrument_node="">⇓</span></span></a><span data-dcnode-id="3449" instrument_node="">). Some computerised systems report and account for the switch-in error automatically, but it is still preferable for continuous recordings of spirometry to be available so the computer-derived adjustments for switch-in errors can be confirmed by the technologist.</span></p><div class="fig pos-float odd" data-dcnode-id="3410" id="F6"><div class="highwire-figure" data-dcnode-id="3430"><div class="fig-inline-img-wrapper" data-dcnode-id="3441"><div class="fig-inline-img" data-dcnode-id="3442"><a class="highwire-fragment fragment-images colorbox-load highwireFiguresMarkupProcessor-processed cboxElement" data-dcnode-id="3443" data-figure-caption="<div class=&quot;highwire-markup&quot;>Display of volume–time spirograms, showing examples when the patient is not switched into the spirometer circuit. a) The patient was turned into the circuit at a lung volume higher than the functional residual capacity (FRC), and the volume difference (ΔV) would be subtracted. b) The patient is turned into the circuit at a lung volume below FRC, and the ΔV would be added. c) The patient was turned into the circuit above the true FRC, and the ΔV would be subtracted. Modified from 16.</div>" data-hide-link-title="0" data-icon-position="" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//erj.ersjournals.com/content/erj/26/3/511/F6.large.jpg%3Fwidth%3D800%26height%3D600%26carousel%3D1" rel="gallery-fragment-images-242121064" title="Display of volume–time spirograms, showing examples when the patient is not switched into the spirometer circuit. a) The patient was turned into the circuit at a lung volume higher than the functional residual capacity (FRC), and the volume difference (ΔV) would be subtracted. b) The patient is turned into the circuit at a lung volume below FRC, and the ΔV would be added. c) The patient was turned into the circuit above the true FRC, and the ΔV would be subtracted. Modified from 16."><span class="hw-responsive-img" data-dcnode-id="3444"><img alt="Fig. 6—" class="highwire-fragment fragment-image lazyload" data-dcnode-id="3447" data-src="https://erj.ersjournals.com/content/erj/26/3/511/F6.medium.gif" src="data:image/gif;base64,R0lGODlhAQABAIAAAAAAAP///yH5BAEAAAAALAAAAAABAAEAAAIBRAA7"><noscript data-dcnode-id="3445"><span data-dcnode-id="3446" instrument_node="">&lt;img class="highwire-fragment fragment-image" alt="Fig. 6&amp;#x2014;" src="https://erj.ersjournals.com/content/erj/26/3/511/F6.medium.gif"/&gt;</span></noscript></span></a></div></div><ul class="highwire-figure-links inline" data-dcnode-id="3431"><li class="download-fig first" data-dcnode-id="3438"><a class="highwire-figure-link highwire-figure-link-download" data-dcnode-id="3439" data-hide-link-title="0" data-icon-position="" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//erj.ersjournals.com/content/erj/26/3/511/F6.large.jpg%3Fdownload%3Dtrue" title="Download Fig. 6—"><span data-dcnode-id="3440" instrument_node="">Download figure</span></a></li><li class="new-tab" data-dcnode-id="3435"><a class="highwire-figure-link highwire-figure-link-newtab" data-dcnode-id="3436" data-hide-link-title="0" data-icon-position="" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//erj.ersjournals.com/content/erj/26/3/511/F6.large.jpg" target="_blank"><span data-dcnode-id="3437" instrument_node="">Open in new tab</span></a></li><li class="download-ppt last" data-dcnode-id="3432"><a class="highwire-figure-link highwire-figure-link-ppt" data-dcnode-id="3433" data-hide-link-title="0" data-icon-position="" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//erj.ersjournals.com/highwire/powerpoint/87707"><span data-dcnode-id="3434" instrument_node="">Download powerpoint</span></a></li></ul></div><div class="fig-caption" data-dcnode-id="3411"><span class="fig-label" data-dcnode-id="3428"><span data-dcnode-id="3429" instrument_node="">Fig. 6—</span></span><span data-dcnode-id="3427" instrument_node=""> </span><p class="first-child" data-dcnode-id="3413" id="p-84"><span data-dcnode-id="3426" instrument_node="">Display of volume–time spirograms, showing examples when the patient is not switched into the spirometer circuit. a) The patient was turned into the circuit at a lung volume higher than the functional residual capacity (FRC), and the volume difference (Δ</span><em data-dcnode-id="3424"><span data-dcnode-id="3425" instrument_node="">V</span></em><span data-dcnode-id="3423" instrument_node="">) would be subtracted. b) The patient is turned into the circuit at a lung volume below FRC, and the Δ</span><em data-dcnode-id="3421"><span data-dcnode-id="3422" instrument_node="">V</span></em><span data-dcnode-id="3420" instrument_node=""> would be added. c) The patient was turned into the circuit above the true FRC, and the Δ</span><em data-dcnode-id="3418"><span data-dcnode-id="3419" instrument_node="">V</span></em><span data-dcnode-id="3417" instrument_node=""> would be subtracted. Modified from </span><a class="xref-bibr" data-dcnode-id="3415" href="#ref-16" id="xref-ref-16-3"><span data-dcnode-id="3416" instrument_node="">16</span></a><span data-dcnode-id="3414" instrument_node="">.</span></p><div class="sb-div caption-clear" data-dcnode-id="3412"></div></div></div><div class="fig pos-float odd" data-dcnode-id="3391" id="F7"><div class="highwire-figure" data-dcnode-id="3392"><div class="fig-inline-img-wrapper" data-dcnode-id="3403"><div class="fig-inline-img" data-dcnode-id="3404"><a class="highwire-fragment fragment-images colorbox-load highwireFiguresMarkupProcessor-processed cboxElement" data-dcnode-id="3405" data-figure-caption="<div class=&quot;highwire-markup&quot;></div>" data-hide-link-title="0" data-icon-position="" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//erj.ersjournals.com/content/erj/26/3/511/F7.large.jpg%3Fwidth%3D800%26height%3D600%26carousel%3D1" rel="gallery-fragment-images-242121064" title=""><span class="hw-responsive-img" data-dcnode-id="3406"><img alt="Figure" class="highwire-fragment fragment-image lazyload" data-dcnode-id="3409" data-src="https://erj.ersjournals.com/content/erj/26/3/511/F7.medium.gif" src="data:image/gif;base64,R0lGODlhAQABAIAAAAAAAP///yH5BAEAAAAALAAAAAABAAEAAAIBRAA7"><noscript data-dcnode-id="3407"><span data-dcnode-id="3408" instrument_node="">&lt;img class="highwire-fragment fragment-image" alt="Figure" src="https://erj.ersjournals.com/content/erj/26/3/511/F7.medium.gif"/&gt;</span></noscript></span></a></div></div><ul class="highwire-figure-links inline" data-dcnode-id="3393"><li class="download-fig first" data-dcnode-id="3400"><a class="highwire-figure-link highwire-figure-link-download" data-dcnode-id="3401" data-hide-link-title="0" data-icon-position="" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//erj.ersjournals.com/content/erj/26/3/511/F7.large.jpg%3Fdownload%3Dtrue" title="Download Figure7"><span data-dcnode-id="3402" instrument_node="">Download figure</span></a></li><li class="new-tab" data-dcnode-id="3397"><a class="highwire-figure-link highwire-figure-link-newtab" data-dcnode-id="3398" data-hide-link-title="0" data-icon-position="" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//erj.ersjournals.com/content/erj/26/3/511/F7.large.jpg" target="_blank"><span data-dcnode-id="3399" instrument_node="">Open in new tab</span></a></li><li class="download-ppt last" data-dcnode-id="3394"><a class="highwire-figure-link highwire-figure-link-ppt" data-dcnode-id="3395" data-hide-link-title="0" data-icon-position="" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//erj.ersjournals.com/highwire/powerpoint/87714"><span data-dcnode-id="3396" instrument_node="">Download powerpoint</span></a></li></ul></div></div><span data-dcnode-id="3390" instrument_node="">
</span></div><span data-dcnode-id="3388" instrument_node="">
</span></div><div class="section" data-dcnode-id="3316" id="sec-24"><span data-dcnode-id="3386" instrument_node="">
</span><h2 data-dcnode-id="3384"><span data-dcnode-id="3385" instrument_node="">MEASUREMENT OF LUNG VOLUMES USING IMAGING TECHNIQUES</span></h2><span data-dcnode-id="3383" instrument_node="">
</span><p data-dcnode-id="3378" id="p-70"><span data-dcnode-id="3382" instrument_node="">In subjects with a limited ability to cooperate, radiographic lung volumes may be more feasible than physiological measurements. The definition of the position of lung inflation at the time of image acquisition is clearly essential. Volumes measured this way carry their own assumptions and limitations, and cannot be directly compared with volumes measured by the techniques mentioned previously. Imaging techniques for use in children and adults have been reviewed in a previous report </span><a class="xref-bibr" data-dcnode-id="3380" href="#ref-4" id="xref-ref-4-1"><span data-dcnode-id="3381" instrument_node="">4</span></a><span data-dcnode-id="3379" instrument_node="">, from where the following information is derived.</span></p><span data-dcnode-id="3377" instrument_node="">
</span><div class="subsection" data-dcnode-id="3363" id="sec-25"><span data-dcnode-id="3376" instrument_node="">
</span><h3 data-dcnode-id="3374"><span data-dcnode-id="3375" instrument_node="">Conventional radiographs</span></h3><span data-dcnode-id="3373" instrument_node="">
</span><p data-dcnode-id="3365" id="p-71"><span data-dcnode-id="3372" instrument_node="">The principle is to outline the lungs in both anteroposterior and lateral chest radiographs, and determine the outlined areas either by assuming a given geometry or by using planimeters in order to derive the confined volume. Adjustments are made for magnification factors, volumes of the heart, the intrathoracic tissue and blood, and infradiaphragmatic spaces. In the determination of TLC, 6–25% of subjects differed by &gt;10% from plethysmographic measurements in adult subjects </span><a class="xref-bibr" data-dcnode-id="3370" href="#ref-34" id="xref-ref-34-1"><span data-dcnode-id="3371" instrument_node="">34</span></a><span data-dcnode-id="3369" instrument_node="">. For paediatric applications, studies are more problematic </span><a class="xref-bibr" data-dcnode-id="3367" href="#ref-35" id="xref-ref-35-1"><span data-dcnode-id="3368" instrument_node="">35</span></a><span data-dcnode-id="3366" instrument_node="">.</span></p><span data-dcnode-id="3364" instrument_node="">
</span></div><span data-dcnode-id="3362" instrument_node="">
</span><div class="subsection" data-dcnode-id="3342" id="sec-26"><span data-dcnode-id="3361" instrument_node="">
</span><h3 data-dcnode-id="3359"><span data-dcnode-id="3360" instrument_node="">Computed tomography</span></h3><span data-dcnode-id="3358" instrument_node="">
</span><p data-dcnode-id="3344" id="p-72"><span data-dcnode-id="3357" instrument_node="">In addition to thoracic cage volumes, CTs can provide estimates of lung tissue and air volumes, and can also estimate the volume of lung occupied by increased density (</span><em data-dcnode-id="3355"><span data-dcnode-id="3356" instrument_node="">e.g.</span></em><span data-dcnode-id="3354" instrument_node=""> in patchy infiltrates) or decreased density (</span><em data-dcnode-id="3352"><span data-dcnode-id="3353" instrument_node="">e.g.</span></em><span data-dcnode-id="3351" instrument_node=""> in emphysema or bullae). In a study of children, comparable correlations were observed for CT and radiographic measurements as compared with plethysmographic TLC </span><a class="xref-bibr" data-dcnode-id="3349" href="#ref-36" id="xref-ref-36-1"><span data-dcnode-id="3350" instrument_node="">36</span></a><span data-dcnode-id="3348" instrument_node="">–</span><a class="xref-bibr" data-dcnode-id="3346" href="#ref-38" id="xref-ref-38-1"><span data-dcnode-id="3347" instrument_node="">38</span></a><span data-dcnode-id="3345" instrument_node="">. A disadvantage of using CT is the high radiation dose. This dose can probably be considerably diminished by modifying the technique.</span></p><span data-dcnode-id="3343" instrument_node="">
</span></div><span data-dcnode-id="3341" instrument_node="">
</span><div class="subsection" data-dcnode-id="3333" id="sec-27"><span data-dcnode-id="3340" instrument_node="">
</span><h3 data-dcnode-id="3338"><span data-dcnode-id="3339" instrument_node="">Magnetic resonance imaging</span></h3><span data-dcnode-id="3337" instrument_node="">
</span><p data-dcnode-id="3335" id="p-73"><span data-dcnode-id="3336" instrument_node="">Magnetic resonance imaging (MRI) offers the advantage of a large number of images within a short period of time, so that volumes can be measured within a single breath. As with CT, MRI offers the potential for scanning specific regions of the lung, as well as the ability to adjust for lung water and tissue. However, despite the advantages of an absence of radiation exposure, the use of MRI for measuring thoracic gas volume will be limited by its considerable cost.</span></p><span data-dcnode-id="3334" instrument_node="">
</span></div><span data-dcnode-id="3332" instrument_node="">
</span><div class="subsection" data-dcnode-id="3318" id="sec-28"><span data-dcnode-id="3331" instrument_node="">
</span><h3 data-dcnode-id="3329"><span data-dcnode-id="3330" instrument_node="">Controversies and critical questions</span></h3><span data-dcnode-id="3328" instrument_node="">
</span><p data-dcnode-id="3320" id="p-74"><span data-dcnode-id="3327" instrument_node="">There are inadequate data in the literature to support recommending one specific technique over the other, or to standardise imaging techniques for measurement of thoracic gas volumes. It is a question of whether TLC values obtained during routine chest radiographs are sufficiently close to those achieved in pulmonary function laboratories. A few studies indicate that radiographic TLC is slightly smaller than the latter </span><a class="xref-bibr" data-dcnode-id="3325" href="#ref-39" id="xref-ref-39-1"><span data-dcnode-id="3326" instrument_node="">39</span></a><span data-dcnode-id="3324" instrument_node="">, </span><a class="xref-bibr" data-dcnode-id="3322" href="#ref-40" id="xref-ref-40-1"><span data-dcnode-id="3323" instrument_node="">40</span></a><span data-dcnode-id="3321" instrument_node="">, but this may relate to a lack of proper coaching in enabling the patient to reach TLC during the radiographic procedure. The larger standard deviations of radiographic measurements may limit their clinical usefulness. In patients with lung disease, the difference between radiographic measurements and lung function measurements may be due to differences in the ability to include airspace-occupying tissue, leading to a tendency for the radiographic method to give higher values. CT and MRI techniques offer the potential for measuring intrathoracic volumes and estimating lung gas volumes after subtraction of estimates of fluid and tissue volumes derived from measurements of image density.</span></p><span data-dcnode-id="3319" instrument_node="">
</span></div><span data-dcnode-id="3317" instrument_node="">
</span></div><div class="section" data-dcnode-id="3296" id="sec-29"><span data-dcnode-id="3315" instrument_node="">
</span><h2 data-dcnode-id="3313"><span data-dcnode-id="3314" instrument_node="">REFERENCE VALUES</span></h2><span data-dcnode-id="3312" instrument_node="">
</span><p data-dcnode-id="3304" id="p-75"><span data-dcnode-id="3311" instrument_node="">Lung volumes are related to body size, with standing height being the most important factor. In children and adolescents, lung growth appears to lag behind the increase in standing height during the growth spurt, and there is a shift in relationship between the lung volume and height during adolescence </span><a class="xref-bibr" data-dcnode-id="3309" href="#ref-41" id="xref-ref-41-1"><span data-dcnode-id="3310" instrument_node="">41</span></a><span data-dcnode-id="3308" instrument_node="">, </span><a class="xref-bibr" data-dcnode-id="3306" href="#ref-42" id="xref-ref-42-1"><span data-dcnode-id="3307" instrument_node="">42</span></a><span data-dcnode-id="3305" instrument_node="">.</span></p><span data-dcnode-id="3303" instrument_node="">
</span><p data-dcnode-id="3298" id="p-76"><span data-dcnode-id="3302" instrument_node="">A number of factors must be considered when selecting predictive values for absolute lung volumes including: matching of the reference and patient populations; appropriate extrapolation of regression equations, when considering the size and age range of subjects actually studied; and differences in testing methodology between clinical laboratories and studies from which predicted reference values are derived. Additional information is provided elsewhere </span><a class="xref-bibr" data-dcnode-id="3300" href="#ref-1" id="xref-ref-1-2"><span data-dcnode-id="3301" instrument_node="">1</span></a><span data-dcnode-id="3299" instrument_node="">.</span></p><span data-dcnode-id="3297" instrument_node="">
</span></div><div class="section" data-dcnode-id="3285" id="sec-30"><span data-dcnode-id="3295" instrument_node="">
</span><h2 data-dcnode-id="3293"><span data-dcnode-id="3294" instrument_node="">INFECTION CONTROL</span></h2><span data-dcnode-id="3292" instrument_node="">
</span><p data-dcnode-id="3287" id="p-77"><span data-dcnode-id="3291" instrument_node="">This subject is discussed in more detail in a previous document from this series </span><a class="xref-bibr" data-dcnode-id="3289" href="#ref-19" id="xref-ref-19-4"><span data-dcnode-id="3290" instrument_node="">19</span></a><span data-dcnode-id="3288" instrument_node="">.</span></p><span data-dcnode-id="3286" instrument_node="">
</span></div><div class="section" data-dcnode-id="3273" id="sec-31"><span data-dcnode-id="3284" instrument_node="">
</span><h2 data-dcnode-id="3282"><span data-dcnode-id="3283" instrument_node="">ABBREVIATIONS</span></h2><span data-dcnode-id="3281" instrument_node="">
</span><p data-dcnode-id="3275" id="p-78"><span data-dcnode-id="3280" instrument_node="">Table 1</span><a class="xref-down-link" data-dcnode-id="3277" href="#T1" id="xref-table-wrap-1-1"><span data-dcnode-id="3278"><span data-dcnode-id="3279" instrument_node="">⇓</span></span></a><span data-dcnode-id="3276" instrument_node=""> contains a list of abbreviations and their meanings, which will be used in this series of Task Force reports.</span></p><span data-dcnode-id="3274" instrument_node="">
