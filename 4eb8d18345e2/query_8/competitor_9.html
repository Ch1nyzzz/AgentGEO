</span><meta content="Dyspnea has been reported to be a main contributor to exercise avoidance in asthma. While traditional markers of ventilation do not explain the heightened dyspnea during exercise in patients with asthma, this study proposed that exertional dyspnea in asthma was due to high-operating lung volumes, which may be improved with a short-acting β2-agonist. On two separate days, 16 patients with asthma and 16 controls completed a lung function test and incremental exercise tests to exhaustion. On one of the days (order randomized), 400 µg salbutamol was administered before exercise. Inspiratory capacity (IC), inspiratory reserve volume (IRV), and dyspnea (modified Borg scale) were evaluated throughout exercise. Compared with controls, patients with asthma reported greater dyspnea at the same absolute submaximal workloads. Furthermore, patients with asthma demonstrated altered breathing responses to exercise, characterized by reduced IC and IRV throughout exercise compared with controls. The reduced IRV was associated with increased dyspnea in patients with asthma. Salbutamol did not affect dyspnea or operating lung volumes in either group. The increased perception of dyspnea during incremental exercise in patients with asthma appears to be secondary to a reduction in IRV, which is unaffected by an inhaled β2-agonist. NEW &amp; NOTEWORTHY Increased exertional dyspnea in asthma appears to be due to high operating lung volumes and is not affected by salbutamol." data-dcnode-id="5528" property="og:description"><span data-dcnode-id="5527" instrument_node="">

k="true" href="#" role="link" target="_blank" title="Email"><i aria-hidden="true" class="at-icon-wrapper icon-Email" data-dcnode-id="4141"></i><span data-dcnode-id="4140" instrument_node="">Email</span></a></li><div class="atclear" data-dcnode-id="4137"></div></ul></div><span data-dcnode-id="4134" instrument_node="">
</span></li><span data-dcnode-id="4132" instrument_node="">
</span></ul></div></nav></div><div data-dcnode-id="2291"><div class="article__body" data-dcnode-id="2292"><div class="col-md-12" data-dcnode-id="2293"><p class="fulltext" data-dcnode-id="4127"></p><div class="hlFld-Abstract" data-dcnode-id="4115"><p class="fulltext" data-dcnode-id="4125"></p><h2 class="article-section__title section__title" data-dcnode-id="4123" id="d16896377e1"><span data-dcnode-id="4124" instrument_node="">Abstract</span></h2><div class="abstractSection abstractInFull" data-dcnode-id="4116"><p data-dcnode-id="4121"><span data-dcnode-id="4122" instrument_node="">Dyspnea has been reported to be a main contributor to exercise avoidance in asthma. While traditional markers of ventilation do not explain the heightened dyspnea during exercise in patients with asthma, this study proposed that exertional dyspnea in asthma was due to high-operating lung volumes, which may be improved with a short-acting β2-agonist. On two separate days, 16 patients with asthma and 16 controls completed a lung function test and incremental exercise tests to exhaustion. On one of the days (order randomized), 400 µg salbutamol was administered before exercise. Inspiratory capacity (IC), inspiratory reserve volume (IRV), and dyspnea (modified Borg scale) were evaluated throughout exercise. Compared with controls, patients with asthma reported greater dyspnea at the same absolute submaximal workloads. Furthermore, patients with asthma demonstrated altered breathing responses to exercise, characterized by reduced IC and IRV throughout exercise compared with controls. The reduced IRV was associated with increased dyspnea in patients with asthma. Salbutamol did not affect dyspnea or operating lung volumes in either group. The increased perception of dyspnea during incremental exercise in patients with asthma appears to be secondary to a reduction in IRV, which is unaffected by an inhaled β2-agonist.</span></p><p data-dcnode-id="4117"><b data-dcnode-id="4119"><span data-dcnode-id="4120" instrument_node="">NEW &amp; NOTEWORTHY</span></b><span data-dcnode-id="4118" instrument_node=""> Increased exertional dyspnea in asthma appears to be due to high operating lung volumes and is not affected by salbutamol.</span></p></div></div><div class="hlFld-Fulltext" data-dcnode-id="2312"><div data-dcnode-id="4024" id="sec1"><h1 class="article-section__title section__title" data-dcnode-id="4111" id="_i1"><span data-dcnode-id="4112" instrument_node="">INTRODUCTION</span></h1><p data-dcnode-id="4070"><span data-dcnode-id="4110" instrument_node="">Asthma, a chronic airway disease characterized by recurrent airway narrowing, is associated with reduced physical activity levels (</span><a class="primary-blue-color tab-link" data-dcnode-id="4108" data-feathr-click-track="true" data-tab="pane-pcw-references" href="#B7" id="B7R"><span data-dcnode-id="4109" instrument_node="">7</span></a><span data-dcnode-id="4107" instrument_node="">, </span><a class="primary-blue-color tab-link" data-dcnode-id="4105" data-feathr-click-track="true" data-tab="pane-pcw-references" href="#B32" id="B32R"><span data-dcnode-id="4106" instrument_node="">32</span></a><span data-dcnode-id="4104" instrument_node="">). Physical activity/exercise training is important for disease management in asthma as it reduces airway inflammation (</span><a class="primary-blue-color tab-link" data-dcnode-id="4102" data-feathr-click-track="true" data-tab="pane-pcw-references" href="#B22" id="B22R"><span data-dcnode-id="4103" instrument_node="">22</span></a><span data-dcnode-id="4101" instrument_node="">) and improves asthma symptoms (</span><a class="primary-blue-color tab-link" data-dcnode-id="4099" data-feathr-click-track="true" data-tab="pane-pcw-references" href="#B22" id="B22R"><span data-dcnode-id="4100" instrument_node="">22</span></a><span data-dcnode-id="4098" instrument_node="">). Physical activity avoidance in asthma is suggested to be due to intensified perceived breathlessness (i.e., dyspnea) during exertion (</span><a class="primary-blue-color tab-link" data-dcnode-id="4096" data-feathr-click-track="true" data-tab="pane-pcw-references" href="#B21" id="B21R"><span data-dcnode-id="4097" instrument_node="">21</span></a><span data-dcnode-id="4095" instrument_node="">). However, traditional markers of ventilation during exercise, such as peak minute ventilation (V̇</span><sub data-dcnode-id="4093"><span data-dcnode-id="4094" instrument_node="">E</span></sub><span data-dcnode-id="4092" instrument_node="">), breathing reserve (V̇</span><sub data-dcnode-id="4090"><span data-dcnode-id="4091" instrument_node="">E</span></sub><span data-dcnode-id="4089" instrument_node="">/maximal voluntary ventilation), and ventilatory equivalents for oxygen (V̇</span><sub data-dcnode-id="4087"><span data-dcnode-id="4088" instrument_node="">E</span></sub><span data-dcnode-id="4086" instrument_node="">/V̇O</span><sub data-dcnode-id="4084"><span data-dcnode-id="4085" instrument_node="">2</span></sub><span data-dcnode-id="4083" instrument_node="">) and carbon dioxide (V̇</span><sub data-dcnode-id="4081"><span data-dcnode-id="4082" instrument_node="">E</span></sub><span data-dcnode-id="4080" instrument_node="">/V̇CO</span><sub data-dcnode-id="4078"><span data-dcnode-id="4079" instrument_node="">2</span></sub><span data-dcnode-id="4077" instrument_node="">), do not differ between controlled patients with asthma and healthy individuals (</span><a class="primary-blue-color tab-link" data-dcnode-id="4075" data-feathr-click-track="true" data-tab="pane-pcw-references" href="#B4" id="B4R"><span data-dcnode-id="4076" instrument_node="">4</span></a><span data-dcnode-id="4074" instrument_node="">, </span><a class="primary-blue-color tab-link" data-dcnode-id="4072" data-feathr-click-track="true" data-tab="pane-pcw-references" href="#B30" id="B30R"><span data-dcnode-id="4073" instrument_node="">30</span></a><span data-dcnode-id="4071" instrument_node="">) and do not explain the increased perceived dyspnea in asthma.</span></p><p data-dcnode-id="4044"><span data-dcnode-id="4069" instrument_node="">Expiratory flow limitation (EFL) occurs when the tidal breath increases to the extent where it becomes limited by the maximal expiratory flow of the lungs and can be seen during exercise as the tidal breath overlapping with the outer boarder of the maximal flow volume loop (</span><a class="primary-blue-color tab-link" data-dcnode-id="4067" data-feathr-click-track="true" data-tab="pane-pcw-references" href="#B11" id="B11R"><span data-dcnode-id="4068" instrument_node="">11</span></a><span data-dcnode-id="4066" instrument_node="">). EFL is believed to result in an upward shift toward higher operating lung volumes [i.e., reduced inspiratory capacity (IC) and inspiratory reserve volume (IRV)] and the development of dynamic lung hyperinflation (</span><a class="primary-blue-color tab-link" data-dcnode-id="4064" data-feathr-click-track="true" data-tab="pane-pcw-references" href="#B11" id="B11R"><span data-dcnode-id="4065" instrument_node="">11</span></a><span data-dcnode-id="4063" instrument_node="">). The occurrence of high operating lung volumes has been linked to intensified dyspnea during bronchoconstriction at rest in asthma (</span><a class="primary-blue-color tab-link" data-dcnode-id="4061" data-feathr-click-track="true" data-tab="pane-pcw-references" href="#B17" id="B17R"><span data-dcnode-id="4062" instrument_node="">17</span></a><span data-dcnode-id="4060" instrument_node="">, </span><a class="primary-blue-color tab-link" data-dcnode-id="4058" data-feathr-click-track="true" data-tab="pane-pcw-references" href="#B18" id="B18R"><span data-dcnode-id="4059" instrument_node="">18</span></a><span data-dcnode-id="4057" instrument_node="">) and been shown to be a powerful determinant of dyspnea in chronic obstructive pulmonary disease (</span><a class="primary-blue-color tab-link" data-dcnode-id="4055" data-feathr-click-track="true" data-tab="pane-pcw-references" href="#B16" id="B16R"><span data-dcnode-id="4056" instrument_node="">16</span></a><span data-dcnode-id="4054" instrument_node="">, </span><a class="primary-blue-color tab-link" data-dcnode-id="4052" data-feathr-click-track="true" data-tab="pane-pcw-references" href="#B25" id="B25R"><span data-dcnode-id="4053" instrument_node="">25</span></a><span data-dcnode-id="4051" instrument_node="">, </span><a class="primary-blue-color tab-link" data-dcnode-id="4049" data-feathr-click-track="true" data-tab="pane-pcw-references" href="#B27" id="B27R"><span data-dcnode-id="4050" instrument_node="">27</span></a><span data-dcnode-id="4048" instrument_node="">). Importantly, during constant workload exercise, patients with asthma with a critically low IRV report greater dyspnea than patients with asthma with larger IRV (</span><a class="primary-blue-color tab-link" data-dcnode-id="4046" data-feathr-click-track="true" data-tab="pane-pcw-references" href="#B15" id="B15R"><span data-dcnode-id="4047" instrument_node="">15</span></a><span data-dcnode-id="4045" instrument_node="">), but it is unknown if the reduction in exertional IRV during exercise explains the increased sensation of dyspnea in asthma as compared with healthy controls.</span></p><p data-dcnode-id="4030"><span data-dcnode-id="4043" instrument_node="">Short-acting β</span><sub data-dcnode-id="4041"><span data-dcnode-id="4042" instrument_node="">2</span></sub><span data-dcnode-id="4040" instrument_node="">-agonists are currently used as the mainstream treatment for acute asthma symptoms, and their usage has been implemented in asthma guidelines worldwide as part of standard asthma management (</span><a class="primary-blue-color tab-link" data-dcnode-id="4038" data-feathr-click-track="true" data-tab="pane-pcw-references" href="#B1" id="B1R"><span data-dcnode-id="4039" instrument_node="">1</span></a><span data-dcnode-id="4037" instrument_node="">). Many patients with asthma have mild airflow obstruction at baseline which is reversed with a β</span><sub data-dcnode-id="4035"><span data-dcnode-id="4036" instrument_node="">2</span></sub><span data-dcnode-id="4034" instrument_node="">-agonists, and while most patients with asthma do not experience symptoms of dyspnea at rest, dyspnea typically develops during higher intensity physical activity. Although prescribed liberally, it is not well known how short-acting β</span><sub data-dcnode-id="4032"><span data-dcnode-id="4033" instrument_node="">2</span></sub><span data-dcnode-id="4031" instrument_node="">-agonists affect operating lung volumes, and thus sensory responses, to exercise in asthma.</span></p><p data-dcnode-id="4025"><span data-dcnode-id="4029" instrument_node="">The purpose of this study was to better our understanding of the mechanisms of dyspnea in patients with asthma. It was hypothesized that patients with asthma would breathe at higher operating lung volumes compared with healthy controls, as demonstrated by a reduced IC and IRV during exercise, and that this would be associated with the increased sensation of dyspnea in patients with asthma. Further, it was proposed that the administration of the β</span><sub data-dcnode-id="4027"><span data-dcnode-id="4028" instrument_node="">2</span></sub><span data-dcnode-id="4026" instrument_node="">-agonists salbutamol would prevent exercise-induced reductions in IC or IRV and, as a result, reduce exertional dyspnea in asthma.</span></p></div><div data-dcnode-id="3903" id="sec2"><h1 class="article-section__title section__title" data-dcnode-id="4022" id="_i2"><span data-dcnode-id="4023" instrument_node="">MATERIALS AND METHODS</span></h1><div data-dcnode-id="3904" id="sec2-1"><div data-dcnode-id="3981" id="sec2-1-1"><h3 class="article-section__title" data-dcnode-id="4020" id="_i4"><span data-dcnode-id="4021" instrument_node="">Study subjects.</span></h3><p data-dcnode-id="3982"><span data-dcnode-id="4019" instrument_node="">This study was approved by the University of Alberta Ethics Board, and all subjects were required to sign informed consent before participating. Asthma (</span><i data-dcnode-id="4017"><span data-dcnode-id="4018" instrument_node="">n</span></i><span data-dcnode-id="4016" instrument_node=""> = 16) was confirmed if the participant had a clinical history of asthma and met at least one of the following criteria: </span><i data-dcnode-id="4014"><span data-dcnode-id="4015" instrument_node="">1</span></i><span data-dcnode-id="4013" instrument_node="">) ≥200 ml and 12% improvement in forced expiratory volume in one second (FEV</span><sub data-dcnode-id="4011"><span data-dcnode-id="4012" instrument_node="">1</span></sub><span data-dcnode-id="4010" instrument_node="">) following β</span><sub data-dcnode-id="4008"><span data-dcnode-id="4009" instrument_node="">2</span></sub><span data-dcnode-id="4007" instrument_node="">-agonist administration, </span><i data-dcnode-id="4005"><span data-dcnode-id="4006" instrument_node="">2</span></i><span data-dcnode-id="4004" instrument_node="">) ≥10% reduction in FEV</span><sub data-dcnode-id="4002"><span data-dcnode-id="4003" instrument_node="">1</span></sub><span data-dcnode-id="4001" instrument_node=""> following exercise, or </span><i data-dcnode-id="3999"><span data-dcnode-id="4000" instrument_node="">3</span></i><span data-dcnode-id="3998" instrument_node="">) a positive bronchial challenge test (</span><a class="primary-blue-color tab-link" data-dcnode-id="3996" data-feathr-click-track="true" data-tab="pane-pcw-references" href="#B1" id="B1R"><span data-dcnode-id="3997" instrument_node="">1</span></a><span data-dcnode-id="3995" instrument_node="">, </span><a class="primary-blue-color tab-link" data-dcnode-id="3993" data-feathr-click-track="true" data-tab="pane-pcw-references" href="#B19" id="B19R"><span data-dcnode-id="3994" instrument_node="">19</span></a><span data-dcnode-id="3992" instrument_node="">) at the time of the study or within the previous year. Control subjects (</span><i data-dcnode-id="3990"><span data-dcnode-id="3991" instrument_node="">n</span></i><span data-dcnode-id="3989" instrument_node=""> = 16) all had no clinical history of asthma, normal lung function, no reversibility with β</span><sub data-dcnode-id="3987"><span data-dcnode-id="3988" instrument_node="">2</span></sub><span data-dcnode-id="3986" instrument_node="">-agonists, and no significant reduction in FEV</span><sub data-dcnode-id="3984"><span data-dcnode-id="3985" instrument_node="">1</span></sub><span data-dcnode-id="3983" instrument_node=""> following exercise. All participants were free from known cardiovascular disease or lung disease, other than asthma. Patients with asthma were requested to withhold long-acting controller medication for a minimum of 48 h and short-acting reliever medication for 8 h before each study visit. All participants were asked to withhold caffeine, heavy exercise, and alcohol on the days of the study.</span></p></div><div data-dcnode-id="3961" id="sec2-1-2"><h3 class="article-section__title" data-dcnode-id="3979" id="_i5"><span data-dcnode-id="3980" instrument_node="">Study design.</span></h3><p data-dcnode-id="3962"><span data-dcnode-id="3978" instrument_node="">Each participant reported to the laboratory on 2 different days, at least 48 h apart, for this randomized case-control crossover study. Asthma control was evaluated according to the asthma control questionnaire (</span><a class="primary-blue-color tab-link" data-dcnode-id="3976" data-feathr-click-track="true" data-tab="pane-pcw-references" href="#B12" id="B12R"><span data-dcnode-id="3977" instrument_node="">12</span></a><span data-dcnode-id="3975" instrument_node="">, </span><a class="primary-blue-color tab-link" data-dcnode-id="3973" data-feathr-click-track="true" data-tab="pane-pcw-references" href="#B13" id="B13R"><span data-dcnode-id="3974" instrument_node="">13</span></a><span data-dcnode-id="3972" instrument_node="">), and a physical activity readiness questionnaire was used to screen for known contraindications to exercise. In addition, medical history and demographics were obtained from all participants before any physiological testing. On one of the testing days, a complete pulmonary function test (</span><a class="primary-blue-color tab-link" data-dcnode-id="3970" data-feathr-click-track="true" data-tab="pane-pcw-references" href="#B20" id="B20R"><span data-dcnode-id="3971" instrument_node="">20</span></a><span data-dcnode-id="3969" instrument_node="">, </span><a class="primary-blue-color tab-link" data-dcnode-id="3967" data-feathr-click-track="true" data-tab="pane-pcw-references" href="#B24" id="B24R"><span data-dcnode-id="3968" instrument_node="">24</span></a><span data-dcnode-id="3966" instrument_node="">, </span><a class="primary-blue-color tab-link" data-dcnode-id="3964" data-feathr-click-track="true" data-tab="pane-pcw-references" href="#B33" id="B33R"><span data-dcnode-id="3965" instrument_node="">33</span></a><span data-dcnode-id="3963" instrument_node="">) followed by an incremental exercise test to exhaustion was completed. On the second day, the participants completed only spirometry and airway resistance testing at baseline, followed by a second incremental exercise test to exhaustion. In random order on one of the days, airway reversibility was assessed during the spirometry testing following 400 µg of salbutamol (Ventolin, Glaxo-SmithKline, Mississauga, Canada) administered 20 min before the start of exercise. Data from this day were also used to evaluate the potential impact of salbutamol on operating lung volumes and dyspnea during exercise. The subjects were not blinded to salbutamol administration.</span></p></div><div data-dcnode-id="3944" id="sec2-1-3"><h3 class="article-section__title" data-dcnode-id="3959" id="_i6"><span data-dcnode-id="3960" instrument_node="">Pulmonary function testing.</span></h3><p data-dcnode-id="3945"><span data-dcnode-id="3958" instrument_node="">Baseline spirometry, lung volume, and diffusion capacity were measured as per current guidelines (</span><a class="primary-blue-color tab-link" data-dcnode-id="3956" data-feathr-click-track="true" data-tab="pane-pcw-references" href="#B20" id="B20R"><span data-dcnode-id="3957" instrument_node="">20</span></a><span data-dcnode-id="3955" instrument_node="">, </span><a class="primary-blue-color tab-link" data-dcnode-id="3953" data-feathr-click-track="true" data-tab="pane-pcw-references" href="#B24" id="B24R"><span data-dcnode-id="3954" instrument_node="">24</span></a><span data-dcnode-id="3952" instrument_node="">, </span><a class="primary-blue-color tab-link" data-dcnode-id="3950" data-feathr-click-track="true" data-tab="pane-pcw-references" href="#B33" id="B33R"><span data-dcnode-id="3951" instrument_node="">33</span></a><span data-dcnode-id="3949" instrument_node="">) on the Vmax Spectra V29System (SensorMedics, Yorba Linda, CA). Additionally, airway resistance was measured using the forced oscillation technique, impulse oscillometry (CareFusion, Yorba Linda, CA) (</span><a class="primary-blue-color tab-link" data-dcnode-id="3947" data-feathr-click-track="true" data-tab="pane-pcw-references" href="#B29" id="B29R"><span data-dcnode-id="3948" instrument_node="">29</span></a><span data-dcnode-id="3946" instrument_node="">).</span></p></div><div data-dcnode-id="3919" id="sec2-1-4"><h3 class="article-section__title" data-dcnode-id="3942" id="_i7"><span data-dcnode-id="3943" instrument_node="">Incremental exercise test.</span></h3><p data-dcnode-id="3940"><span data-dcnode-id="3941" instrument_node="">A cardiopulmonary exercise test was performed on a stationary cycle ergometer (Ergoselect 200, Ergoline, Bitz, Germany) starting at steady-state rest, followed by 25-W step-wise increases in workload every 2 min until volitional exhaustion. Metabolic breath-by-breath data were recorded (Vmax Spectra V29System; SensorMedics) continuously throughout the test.</span></p><p data-dcnode-id="3920"><span data-dcnode-id="3939" instrument_node="">IC measurements were completed during the last 30 s of each stage to calculate operating lung volumes, and the IRV was calculated as IC − tidal volume (V</span><sub data-dcnode-id="3937"><span data-dcnode-id="3938" instrument_node="">T</span></sub><span data-dcnode-id="3936" instrument_node="">)</span><sub data-dcnode-id="3934"><span data-dcnode-id="3935" instrument_node="">,</span></sub><span data-dcnode-id="3933" instrument_node=""> expressed as a percentage of total lung capacity. EFL was evaluated at each workload using the IC and spirometry data by determining the percentage at which the V</span><sub data-dcnode-id="3931"><span data-dcnode-id="3932" instrument_node="">T</span></sub><span data-dcnode-id="3930" instrument_node=""> curve overlapped with the maximal flow-volume curve obtained at baseline of the same testing day (</span><a class="primary-blue-color tab-link" data-dcnode-id="3928" data-feathr-click-track="true" data-tab="pane-pcw-references" href="#B11" id="B11R"><span data-dcnode-id="3929" instrument_node="">11</span></a><span data-dcnode-id="3927" instrument_node="">). Dyspnea was assessed according to the modified Borg scale (0–10) for perceived intensity of breathlessness (</span><a class="primary-blue-color tab-link" data-dcnode-id="3925" data-feathr-click-track="true" data-tab="pane-pcw-references" href="#B2" id="B2R"><span data-dcnode-id="3926" instrument_node="">2</span></a><span data-dcnode-id="3924" instrument_node="">) during the last 20 s of each exercise workload and at peak exercise. An average of the ventilatory and metabolic data obtained over 30 s at the start of the second minute of each stage was used for analysis (</span><a class="primary-blue-color tab-link" data-dcnode-id="3922" data-feathr-click-track="true" data-tab="pane-pcw-references" href="#B10" id="B10R"><span data-dcnode-id="3923" instrument_node="">10</span></a><span data-dcnode-id="3921" instrument_node="">).</span></p></div><div data-dcnode-id="3905" id="sec2-1-5"><h3 class="article-section__title" data-dcnode-id="3917" id="_i8"><span data-dcnode-id="3918" instrument_node="">Statistical analysis.</span></h3><p data-dcnode-id="3906"><span data-dcnode-id="3916" instrument_node="">Baseline demographics and lung function were compared between patients with asthma and controls using unpaired Student’s </span><i data-dcnode-id="3914"><span data-dcnode-id="3915" instrument_node="">t</span></i><span data-dcnode-id="3913" instrument_node="">-tests for continuous variables and the chi-square test for discontinuous variables. Spirometry values were compared between disease conditions (factor 1) and before and after the use of bronchodilator (factor 2, repeated factor) with 2-way repeated measures ANOVA. Remaining pulmonary function parameters were evaluated between groups using Student’s unpaired </span><i data-dcnode-id="3911"><span data-dcnode-id="3912" instrument_node="">t</span></i><span data-dcnode-id="3910" instrument_node="">-test. Three-way complex mixed design ANOVAs were used to assess the interactions between disease condition (between-group factor), bronchodilator usage (repeated factor 1) and sensory (dyspnea and leg discomfort), ventilatory, and metabolic parameters at baseline, 50 W, 75 W, 100 W, 125 W, and individual peak workload (repeated factor 2). Significant interactions were further evaluated with multiple comparisons (group averages compared at each workload and peak exercise) corrected with Bonferroni’s post hoc test. Further comparisons were made between disease conditions (bronchodilator usage not taken into consideration because of lack of effect) and dyspnea in relation to operating lung volumes at the same workloads as above with a two-way repeated measures ANOVA, followed by Bonferroni-corrected multiple comparisons (group averages compared at each workload and peak exercise). Graphs were plotted using Sigma plot (version 13.0, Systat Software Inc., San Jose, CA), and statistical tests were performed using SPSS Statistical software v. 24.0.0.0 (IBM Corp, Armonk, NY). Statistical significance was set to </span><i data-dcnode-id="3908"><span data-dcnode-id="3909" instrument_node="">P</span></i><span data-dcnode-id="3907" instrument_node=""> &lt; 0.05 a priori.</span></p></div></div></div><div data-dcnode-id="2506" id="sec3"><h1 class="article-section__title section__title" data-dcnode-id="3901" id="_i9"><span data-dcnode-id="3902" instrument_node="">RESULTS</span></h1><div data-dcnode-id="2507" id="sec3-1"><div data-dcnode-id="3754" id="sec3-1-1"><h3 class="article-section__title" data-dcnode-id="3899" id="_i11"><span data-dcnode-id="3900" instrument_node="">Subjects.</span></h3><p data-dcnode-id="3883"><span data-dcnode-id="3898" instrument_node="">Sixteen patients with asthma and sixteen patients without asthma (controls) participated in the study and were group-matched for age, sex, and fitness [% rate of peak oxygen volume uptake (V̇</span><span class="smallcaps smallerCapital" data-dcnode-id="3896"><span data-dcnode-id="3897" instrument_node="">o</span></span><sub data-dcnode-id="3894"><span data-dcnode-id="3895" instrument_node="">2peak</span></sub><span data-dcnode-id="3893" instrument_node="">) predicted] (</span><a class="primary-blue-color ref showTableEvent" data-dcnode-id="3891" data-feathr-click-track="true" data-id="T1" href="#T1" id="T1R"><span data-dcnode-id="3892" instrument_node="">Table 1</span></a><span data-dcnode-id="3890" instrument_node="">). All participants were nonsmokers, and the patients with asthma were classified as controlled (68.8%) or partly controlled (31.3%) as per the asthma control questionnaire (</span><a class="primary-blue-color tab-link" data-dcnode-id="3888" data-feathr-click-track="true" data-tab="pane-pcw-references" href="#B12" id="B12R"><span data-dcnode-id="3889" instrument_node="">12</span></a><span data-dcnode-id="3887" instrument_node="">, </span><a class="primary-blue-color tab-link" data-dcnode-id="3885" data-feathr-click-track="true" data-tab="pane-pcw-references" href="#B13" id="B13R"><span data-dcnode-id="3886" instrument_node="">13</span></a><span data-dcnode-id="3884" instrument_node="">).</span></p><div class="tableToggle" data-dcnode-id="3755"><div class="article-table-content" data-dcnode-id="3766"><div class="tableToggle__table" data-dcnode-id="3768"><table class="table article-section__table" data-dcnode-id="3783"><caption data-dcnode-id="3875"><strong data-dcnode-id="3878"><p data-dcnode-id="3879"><span class="captionLabel" data-dcnode-id="3881"><span data-dcnode-id="3882" instrument_node="">Table 1.</span></span><span data-dcnode-id="3880" instrument_node=""> Subject characteristics</span></p></strong><a class="table__viewer__closer" data-dcnode-id="3876" data-feathr-click-track="true" href="#"><i class="icon-close_thin" data-dcnode-id="3877"></i></a></caption><colgroup data-dcnode-id="3871"><col align="left" class="align_left" data-dcnode-id="3874" span="1"><col align="center" class="align_center" data-dcnode-id="3873" span="1"><col align="center" class="align_center" data-dcnode-id="3872" span="1"></colgroup><thead data-dcnode-id="3864"><tr data-dcnode-id="3865"><th align="center" class="align_center" colspan="1" data-dcnode-id="3870" rowspan="1"></th><th align="center" class="align_center" colspan="1" data-dcnode-id="3868" rowspan="1"><span data-dcnode-id="3869" instrument_node="">Control</span></th><th align="center" class="align_center last" colspan="1" data-dcnode-id="3866" rowspan="1"><span data-dcnode-id="3867" instrument_node="">Asthma</span></th></tr></thead><tbody data-dcnode-id="3784"><tr data-dcnode-id="3857"><td colspan="1" data-dcnode-id="3862" rowspan="1"><span data-dcnode-id="3863" instrument_node="">Number of participants (% women)</span></td><td colspan="1" data-dcnode-id="3860" rowspan="1"><span data-dcnode-id="3861" instrument_node="">16 (50)</span></td><td class="last" colspan="1" data-dcnode-id="3858" rowspan="1"><span data-dcnode-id="3859" instrument_node="">16 (50)</span></td></tr><tr data-dcnode-id="3850"><td colspan="1" data-dcnode-id="3855" rowspan="1"><span data-dcnode-id="3856" instrument_node="">Age, years</span></td><td colspan="1" data-dcnode-id="3853" rowspan="1"><span data-dcnode-id="3854" instrument_node="">24 ± 3</span></td><td class="last" colspan="1" data-dcnode-id="3851" rowspan="1"><span data-dcnode-id="3852" instrument_node="">25 ± 4</span></td></tr><tr data-dcnode-id="3843"><td colspan="1" data-dcnode-id="3848" rowspan="1"><span data-dcnode-id="3849" instrument_node="">Height, m</span></td><td colspan="1" data-dcnode-id="3846" rowspan="1"><span data-dcnode-id="3847" instrument_node="">1.7 ± 0.1</span></td><td class="last" colspan="1" data-dcnode-id="3844" rowspan="1"><span data-dcnode-id="3845" instrument_node="">1.7 ± 0.1</span></td></tr><tr data-dcnode-id="3836"><td colspan="1" data-dcnode-id="3841" rowspan="1"><span data-dcnode-id="3842" instrument_node="">Weight, kg</span></td><td colspan="1" data-dcnode-id="3839" rowspan="1"><span data-dcnode-id="3840" instrument_node="">75.7 ± 17.3</span></td><td class="last" colspan="1" data-dcnode-id="3837" rowspan="1"><span data-dcnode-id="3838" instrument_node="">67.7 ± 12.6</span></td></tr><tr data-dcnode-id="3829"><td colspan="1" data-dcnode-id="3834" rowspan="1"><span data-dcnode-id="3835" instrument_node="">Body mass index, kg/m</span></td><td colspan="1" data-dcnode-id="3832" rowspan="1"><span data-dcnode-id="3833" instrument_node="">25.4 ± 24.1</span></td><td class="last" colspan="1" data-dcnode-id="3830" rowspan="1"><span data-dcnode-id="3831" instrument_node="">23.6 ± 3.0</span></td></tr><tr data-dcnode-id="3822"><td colspan="1" data-dcnode-id="3827" rowspan="1"><span data-dcnode-id="3828" instrument_node="">Smoking history, pack years</span></td><td colspan="1" data-dcnode-id="3825" rowspan="1"><span data-dcnode-id="3826" instrument_node="">0.0 ± 0.0</span></td><td class="last" colspan="1" data-dcnode-id="3823" rowspan="1"><span data-dcnode-id="3824" instrument_node="">0.5 ± 2.0</span></td></tr><tr data-dcnode-id="3815"><td colspan="1" data-dcnode-id="3820" rowspan="1"><span data-dcnode-id="3821" instrument_node="">Allergies, %</span></td><td colspan="1" data-dcnode-id="3818" rowspan="1"><span data-dcnode-id="3819" instrument_node="">44</span></td><td class="last" colspan="1" data-dcnode-id="3816" rowspan="1"><span data-dcnode-id="3817" instrument_node="">94</span></td></tr><tr data-dcnode-id="3808"><td colspan="1" data-dcnode-id="3813" rowspan="1"><span data-dcnode-id="3814" instrument_node="">ACQ score</span></td><td colspan="1" data-dcnode-id="3811" rowspan="1"><span data-dcnode-id="3812" instrument_node="">0.0 ± 0.0</span></td><td class="last" colspan="1" data-dcnode-id="3809" rowspan="1"><span data-dcnode-id="3810" instrument_node="">0.7 ± 0.5*</span></td></tr><tr data-dcnode-id="3803"><td colspan="1" data-dcnode-id="3806" rowspan="1"><span data-dcnode-id="3807" instrument_node="">Medications</span></td><td colspan="1" data-dcnode-id="3805" rowspan="1"></td><td class="last" colspan="1" data-dcnode-id="3804" rowspan="1"></td></tr><tr data-dcnode-id="3797"><td colspan="1" data-dcnode-id="3801" rowspan="1"><span data-dcnode-id="3802" instrument_node="">SABA, %</span></td><td colspan="1" data-dcnode-id="3800" rowspan="1"></td><td class="last" colspan="1" data-dcnode-id="3798" rowspan="1"><span data-dcnode-id="3799" instrument_node="">75</span></td></tr><tr data-dcnode-id="3791"><td colspan="1" data-dcnode-id="3795" rowspan="1"><span data-dcnode-id="3796" instrument_node="">ICS, %</span></td><td colspan="1" data-dcnode-id="3794" rowspan="1"></td><td class="last" colspan="1" data-dcnode-id="3792" rowspan="1"><span data-dcnode-id="3793" instrument_node="">19</span></td></tr><tr class="last" data-dcnode-id="3785"><td colspan="1" data-dcnode-id="3789" rowspan="1"><span data-dcnode-id="3790" instrument_node="">Combination medication (LABA + ICS), %</span></td><td colspan="1" data-dcnode-id b data-dcnode-id="3096"><span data-dcnode-id="3097" instrument_node="">E</span></sub><span data-dcnode-id="3095" instrument_node="">, minute ventilation; V̇O</span><sub data-dcnode-id="3093"><span data-dcnode-id="3094" instrument_node="">2</span></sub><span data-dcnode-id="3092" instrument_node="">, rate of volume of oxygen uptake; V</span><sub data-dcnode-id="3090"><span data-dcnode-id="3091" instrument_node="">T</span></sub><span data-dcnode-id="3089" instrument_node="">, tidal volume.</span></p></div><div class="footnote" data-dcnode-id="3080" id="T3F1"><p data-dcnode-id="3081"><sup data-dcnode-id="3085"><span data-dcnode-id="3086" instrument_node="">*</span></sup><i data-dcnode-id="3083"><span data-dcnode-id="3084" instrument_node="">P</span></i><span data-dcnode-id="3082" instrument_node=""> &lt; 0.05 between disease conditions.</span></p></div></div></div><div class="tableToggle__image imageTable" data-dcnode-id="3077"></div></div><div class="table__viewer__opener" data-dcnode-id="3066" id="T3"><a data-dcnode-id="3074" data-feathr-click-track="true" href="#"><i aria-hidden="true" class="icon-table" data-dcnode-id="3075"></i></a><div data-dcnode-id="3067"><p data-dcnode-id="3070"><span class="captionLabel" data-dcnode-id="3072"><span data-dcnode-id="3073" instrument_node="">Table 3.</span></span><span data-dcnode-id="3071" instrument_node=""> Peak exercise data with and without bronchodilator</span></p><a data-dcnode-id="3068" data-feathr-click-track="true" href="#"><span data-dcnode-id="3069" instrument_node="">Enlarge table</span></a></div></div></div></div><div data-dcnode-id="3001" id="sec3-1-3"><h3 class="article-section__title" data-dcnode-id="3062" id="_i15"><span data-dcnode-id="3063" instrument_node="">Ventilatory and metabolic responses to exercise.</span></h3><p data-dcnode-id="3026"><span data-dcnode-id="3061" instrument_node="">Patients with asthma and controls showed similar responses in V̇</span><span class="smallcaps smallerCapital" data-dcnode-id="3059"><span data-dcnode-id="3060" instrument_node="">o</span></span><sub data-dcnode-id="3057"><span data-dcnode-id="3058" instrument_node="">2</span></sub><span data-dcnode-id="3056" instrument_node=""> and V̇</span><span class="smallcaps smallerCapital" data-dcnode-id="3054"><span data-dcnode-id="3055" instrument_node="">e</span></span><span data-dcnode-id="3053" instrument_node="">/V̇</span><span class="smallcaps smallerCapital" data-dcnode-id="3051"><span data-dcnode-id="3052" instrument_node="">co</span></span><sub data-dcnode-id="3049"><span data-dcnode-id="3050" instrument_node="">2</span></sub><span data-dcnode-id="3048" instrument_node=""> at both submaximal and peak workloads (</span><a class="primary-blue-color" data-dcnode-id="3046" data-feathr-click-track="true" data-tab="pane-pcw-Figures" href="#F0001" id="F0001R"><span data-dcnode-id="3047" instrument_node="">Fig. 1</span></a><span data-dcnode-id="3045" instrument_node=""> and </span><a class="primary-blue-color ref showTableEvent" data-dcnode-id="3043" data-feathr-click-track="true" data-id="T3" href="#T3" id="T3R"><span data-dcnode-id="3044" instrument_node="">Table 3</span></a><span data-dcnode-id="3042" instrument_node="">). Ventilation was similar between groups throughout exercise; however, patients with asthma adopted a more rapid and shallow breathing pattern at peak exercise, as demonstrated by a lower V</span><sub data-dcnode-id="3040"><span data-dcnode-id="3041" instrument_node="">T</span></sub><span data-dcnode-id="3039" instrument_node=""> and greater breathing frequency (f</span><sub data-dcnode-id="3037"><span data-dcnode-id="3038" instrument_node="">R</span></sub><span data-dcnode-id="3036" instrument_node="">) (</span><a class="primary-blue-color" data-dcnode-id="3034" data-feathr-click-track="true" data-tab="pane-pcw-Figures" href="#F0001" id="F0001R"><span data-dcnode-id="3035" instrument_node="">Fig. 1</span></a><span data-dcnode-id="3033" instrument_node="">). As seen in </span><a class="primary-blue-color" data-dcnode-id="3031" data-feathr-click-track="true" data-tab="pane-pcw-Figures" href="#F0003" id="F0003R"><span data-dcnode-id="3032" instrument_node="">Fig. 3</span></a><span data-dcnode-id="3030" instrument_node="">, both IC and IRV were lower in patients with asthma than controls at all exercise workloads. Only three of the controls and four of the patients with asthma developed dynamic hyperinflation, defined as a reduction of 150 ml compared with rest (</span><a class="primary-blue-color tab-link" data-dcnode-id="3028" data-feathr-click-track="true" data-tab="pane-pcw-references" href="#B26" id="B26R"><span data-dcnode-id="3029" instrument_node="">26</span></a><span data-dcnode-id="3027" instrument_node="">), and the occurrence of dynamic hyperinflation with exercise was the same on both the salbutamol and the nonbronchodilator day.</span></p><figure class="figure article__inlineFigure" data-dcnode-id="3008" data-figure-id="F0003" id="F0003"><img alt="Fig. 3." class="figure__image" data-dcnode-id="3025" data-lg-src="/cms/10.1152/japplphysiol.00216.2018/asset/images/large/zdg0091827070003.jpeg" data-src="/cms/10.1152/japplphysiol.00216.2018/asset/images/medium/zdg0091827070003.gif" loading="lazy" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//journals.physiology.org/cms/10.1152/japplphysiol.00216.2018/asset/images/medium/zdg0091827070003.gif&amp;raw" title=""><figcaption data-dcnode-id="3009"><strong data-dcnode-id="3024"></strong><span class="figure__caption hlFld-FigureCaption" data-dcnode-id="3010"><p data-dcnode-id="3011"><strong class="figure__title" data-dcnode-id="3022"><span data-dcnode-id="3023" instrument_node="">Fig. 3.</span></strong><span data-dcnode-id="3021" instrument_node="">Inspiratory capacity (</span><i data-dcnode-id="3019"><span data-dcnode-id="3020" instrument_node="">A</span></i><span data-dcnode-id="3018" instrument_node="">) and inspiratory reserve volume (</span><i data-dcnode-id="3016"><span data-dcnode-id="3017" instrument_node="">B</span></i><span data-dcnode-id="3015" instrument_node="">) during incremental exercise in asthma and controls. Graphs display means ± standard error of mean. *</span><i data-dcnode-id="3013"><span data-dcnode-id="3014" instrument_node="">P</span></i><span data-dcnode-id="3012" instrument_node=""> &lt; 0.05 overall main effect between asthma and controls throughout all workloads. IC, inspiratory capacity; IRV, inspiratory reserve volume; TLC, total lung capacity.</span></p></span></figcaption></figure><div class="figure-extra" data-dcnode-id="3003"><a alt="figure" data-dcnode-id="3006" data-feathr-click-track="true" download="" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//journals.physiology.org/na101/home/literatum/publisher/physio/journals/content/jappl/2018/jappl.2018.125.issue-3/japplphysiol.00216.2018/20180919/images/large/zdg0091827070003.jpeg"><span data-dcnode-id="3007" instrument_node="">Download figure</span></a><a class="ppt-figure-link" data-dcnode-id="3004" data-feathr-click-track="true" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//journals.physiology.org/action/downloadFigures%3Fid%3DF0003%26doi%3D10.1152/japplphysiol.00216.2018"><span data-dcnode-id="3005" instrument_node="">Download PowerPoint</span></a></div><br data-dcnode-id="3002"></div><div data-dcnode-id="2508" id="sec3-1-4"><h3 class="article-section__title" data-dcnode-id="2999" id="_i17"><span data-dcnode-id="3000" instrument_node="">Dyspnea and ventilatory responses during exercise.</span></h3><p data-dcnode-id="2967"><span data-dcnode-id="2998" instrument_node="">Patients with asthma reported greater dyspnea at submaximal workloads as compared with controls; however, peak dyspnea was not different between patients with asthma and controls (</span><a class="primary-blue-color" data-dcnode-id="2996" data-feathr-click-track="true" data-tab="pane-pcw-Figures" href="#F0001" id="F0001R"><span data-dcnode-id="2997" instrument_node="">Fig. 1</span></a><span data-dcnode-id="2995" instrument_node="">). EFL did not occur in either group until peak exercise, where no differences were seen between groups (</span><a class="primary-blue-color ref showTableEvent" data-dcnode-id="2993" data-feathr-click-track="true" data-id="T3" href="#T3" id="T3R"><span data-dcnode-id="2994" instrument_node="">Tables 3</span></a><span data-dcnode-id="2992" instrument_node=""> and </span><a class="primary-blue-color ref showTableEvent" data-dcnode-id="2990" data-feathr-click-track="true" data-id="T4" href="#T4" id="T4R"><span data-dcnode-id="2991" instrument_node="">4</span></a><span data-dcnode-id="2989" instrument_node="">). To examine the mechanism for the elevated exertional dyspnea in asthma, dyspnea was graphed relative to V̇</span><span class="smallcaps smallerCapital" data-dcnode-id="2987"><span data-dcnode-id="2988" instrument_node="">e</span></span><span data-dcnode-id="2986" instrument_node="">, V</span><span class="smallcaps smallerCapital" data-dcnode-id="2984"><span data-dcnode-id="2985" instrument_node="">t</span></span><span data-dcnode-id="2983" instrument_node="">, f</span><sub data-dcnode-id="2981"><span data-dcnode-id="2982" instrument_node="">R</span></sub><span data-dcnode-id="2980" instrument_node="">, and IRV (</span><a class="primary-blue-color" data-dcnode-id="2978" data-feathr-click-track="true" data-tab="pane-pcw-Figures" href="#F0004" id="F0004R"><span data-dcnode-id="2979" instrument_node="">Fig. 4</span></a><span data-dcnode-id="2977" instrument_node="">). While the submaximal between-group differences in dyspnea are evident when plotted against V̇</span><span class="smallcaps smallerCapital" data-dcnode-id="2975"><span data-dcnode-id="2976" instrument_node="">e</span></span><span data-dcnode-id="2974" instrument_node="">, V</span><span class="smallcaps smallerCapital" data-dcnode-id="2972"><span data-dcnode-id="2973" instrument_node d="2605" instrument_node="">EELV, end-expiratory lung volume; EFL, expiratory flow limitation; EILV, end-inspiratory lung volume; f</span><sub data-dcnode-id="2603"><span data-dcnode-id="2604" instrument_node="">R</span></sub><span data-dcnode-id="2602" instrument_node="">, breathing frequency; IC, inspiratory capacity; IRV, inspiratory reserve volume; RQ, respiratory quotient; TLC, total lung volume; VCO</span><sub data-dcnode-id="2600"><span data-dcnode-id="2601" instrument_node="">2</span></sub><span data-dcnode-id="2599" instrument_node="">, rate of carbon dioxide production; V̇</span><sub data-dcnode-id="2597"><span data-dcnode-id="2598" instrument_node="">E</span></sub><span data-dcnode-id="2596" instrument_node="">, minute ventilation; V̇O</span><sub data-dcnode-id="2594"><span data-dcnode-id="2595" instrument_node="">2</span></sub><span data-dcnode-id="2593" instrument_node="">, rate of oxygen volume uptake; V</span><sub data-dcnode-id="2591"><span data-dcnode-id="2592" instrument_node="">T</span></sub><span data-dcnode-id="2590" instrument_node="">, tidal volume.</span></p></div><div class="footnote" data-dcnode-id="2581" id="T4F1"><p data-dcnode-id="2582"><sup data-dcnode-id="2586"><span data-dcnode-id="2587" instrument_node="">*</span></sup><i data-dcnode-id="2584"><span data-dcnode-id="2585" instrument_node="">P</span></i><span data-dcnode-id="2583" instrument_node=""> &lt; 0.05 between control and asthma at corresponding intensity.</span></p></div></div></div><div class="tableToggle__image imageTable" data-dcnode-id="2578"></div></div><div class="table__viewer__opener" data-dcnode-id="2567" id="T4"><a data-dcnode-id="2575" data-feathr-click-track="true" href="#"><i aria-hidden="true" class="icon-table" data-dcnode-id="2576"></i></a><div data-dcnode-id="2568"><p data-dcnode-id="2571"><span class="captionLabel" data-dcnode-id="2573"><span data-dcnode-id="2574" instrument_node="">Table 4.</span></span><span data-dcnode-id="2572" instrument_node=""> Metabolic and ventilatory responses at rest, 125W (highest achieved iso-time), and peak exercise without bronchodilator</span></p><a data-dcnode-id="2569" data-feathr-click-track="true" href="#"><span data-dcnode-id="2570" instrument_node="">Enlarge table</span></a></div></div></div><figure class="figure article__inlineFigure" data-dcnode-id="2515" data-figure-id="F0004" id="F0004"><img alt="Fig. 4." class="figure__image" data-dcnode-id="2565" data-lg-src="/cms/10.1152/japplphysiol.00216.2018/asset/images/large/zdg0091827070004.jpeg" data-src="/cms/10.1152/japplphysiol.00216.2018/asset/images/medium/zdg0091827070004.gif" loading="lazy" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//journals.physiology.org/cms/10.1152/japplphysiol.00216.2018/asset/images/medium/zdg0091827070004.gif&amp;raw" title=""><figcaption data-dcnode-id="2516"><strong data-dcnode-id="2564"></strong><span class="figure__caption hlFld-FigureCaption" data-dcnode-id="2517"><p data-dcnode-id="2518"><strong class="figure__title" data-dcnode-id="2562"><span data-dcnode-id="2563" instrument_node="">Fig. 4.</span></strong><span data-dcnode-id="2561" instrument_node="">Dyspnea response to exercise in asthma and controls in relation to V̇</span><sub data-dcnode-id="2559"><span data-dcnode-id="2560" instrument_node="">E</span></sub><span data-dcnode-id="2558" instrument_node=""> (</span><i data-dcnode-id="2556"><span data-dcnode-id="2557" instrument_node="">A</span></i><span data-dcnode-id="2555" instrument_node="">), V</span><sub data-dcnode-id="2553"><span data-dcnode-id="2554" instrument_node="">T</span></sub><span data-dcnode-id="2552" instrument_node=""> (</span><i data-dcnode-id="2550"><span data-dcnode-id="2551" instrument_node="">B</span></i><span data-dcnode-id="2549" instrument_node="">), f</span><sub data-dcnode-id="2547"><span data-dcnode-id="2548" instrument_node="">R</span></sub><span data-dcnode-id="2546" instrument_node=""> (</span><i data-dcnode-id="2544"><span data-dcnode-id="2545" instrument_node="">C</span></i><span data-dcnode-id="2543" instrument_node="">), and IRV (</span><i data-dcnode-id="2541"><span data-dcnode-id="2542" instrument_node="">D</span></i><span data-dcnode-id="2540" instrument_node="">). Graphs display means ± standard error of mean. *</span><i data-dcnode-id="2538"><span data-dcnode-id="2539" instrument_node="">P</span></i><span data-dcnode-id="2537" instrument_node=""> &lt; 0.05 for dyspnea scores between control and asthma, **</span><i data-dcnode-id="2535"><span data-dcnode-id="2536" instrument_node="">P</span></i><span data-dcnode-id="2534" instrument_node=""> &lt; 0.05 for peak parameter between control and asthma for variable displayed on </span><i data-dcnode-id="2532"><span data-dcnode-id="2533" instrument_node="">x</span></i><span data-dcnode-id="2531" instrument_node="">-axis, and ***</span><i data-dcnode-id="2529"><span data-dcnode-id="2530" instrument_node="">P</span></i><span data-dcnode-id="2528" instrument_node=""> &lt; 0.05 for overall main group affect for IRV %TLC between control and asthma. f</span><sub data-dcnode-id="2526"><span data-dcnode-id="2527" instrument_node="">R</span></sub><span data-dcnode-id="2525" instrument_node="">, respiratory frequency; IRV, inspiratory reserve volume; TLC, total lung capacity; V̇</span><sub data-dcnode-id="2523"><span data-dcnode-id="2524" instrument_node="">E</span></sub><span data-dcnode-id="2522" instrument_node="">, minute ventilation; V</span><sub data-dcnode-id="2520"><span data-dcnode-id="2521" instrument_node="">T</span></sub><span data-dcnode-id="2519" instrument_node="">, tidal volume.</span></p></span></figcaption></figure><div class="figure-extra" data-dcnode-id="2510"><a alt="figure" data-dcnode-id="2513" data-feathr-click-track="true" download="" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//journals.physiology.org/na101/home/literatum/publisher/physio/journals/content/jappl/2018/jappl.2018.125.issue-3/japplphysiol.00216.2018/20180919/images/large/zdg0091827070004.jpeg"><span data-dcnode-id="2514" instrument_node="">Download figure</span></a><a class="ppt-figure-link" data-dcnode-id="2511" data-feathr-click-track="true" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//journals.physiology.org/action/downloadFigures%3Fid%3DF0004%26doi%3D10.1152/japplphysiol.00216.2018"><span data-dcnode-id="2512" instrument_node="">Download PowerPoint</span></a></div><br data-dcnode-id="2509"></div></div></div><div data-dcnode-id="2328" id="sec4"><h1 class="article-section__title section__title" data-dcnode-id="2504" id="_i19"><span data-dcnode-id="2505" instrument_node="">DISCUSSION</span></h1><p data-dcnode-id="2499"><span data-dcnode-id="2503" instrument_node="">This study evaluated the ventilatory and sensory responses to incremental exercise in patients with asthma and controls. As a secondary purpose, the impact of salbutamol on dyspnea during exercise was evaluated. The main findings of this study are twofold. First, exertional dyspnea was higher in patients with asthma as compared with controls, secondarily to a lower IRV. The increased dyspnea and higher operating lung volumes in patients with asthma were not due to greater occurrence or magnitude of EFL. These data suggest that higher operating lung volumes, seen as reduced IC and IRV relative to controls, are key contributors to exertional dyspnea in asthma. Second, while improving airflow limitation in patients with asthma, an acute β</span><sub data-dcnode-id="2501"><span data-dcnode-id="2502" instrument_node="">2</span></sub><span data-dcnode-id="2500" instrument_node="">-agonist did not change breathing pattern, EFL, IC, IRV, or dyspnea responses to incremental exercise in either patients with asthma or controls.</span></p><p data-dcnode-id="2438"><span data-dcnode-id="2498" instrument_node="">Similar to previous research (</span><a class="primary-blue-color tab-link" data-dcnode-id="2496" data-feathr-click-track="true" data-tab="pane-pcw-references" href="#B4" id="B4R"><span data-dcnode-id="2497" instrument_node="">4</span></a><span data-dcnode-id="2495" instrument_node="">, </span><a class="primary-blue-color tab-link" data-dcnode-id="2493" data-feathr-click-track="true" data-tab="pane-pcw-references" href="#B30" id="B30R"><span data-dcnode-id="2494" instrument_node="">30</span></a><span data-dcnode-id="2492" instrument_node="">), we did not find group differences in traditional markers of ventilatory efficiency (elevated V̇</span><span class="smallcaps smallerCapital" data-dcnode-id="2490"><span data-dcnode-id="2491" instrument_node="">e</span></span><span data-dcnode-id="2489" instrument_node="">/V̇</span><span class="smallcaps smallerCapital" data-dcnode-id="2487"><span data-dcnode-id="2488" instrument_node="">co</span></span><sub data-dcnode-id="2485"><span data-dcnode-id="2486" instrument_node="">2</span></sub><span data-dcnode-id="2484" instrument_node="">) or peak ventilation during exercise. Despite this, and in contrast to previous studies (</span><a class="primary-blue-color tab-link" data-dcnode-id="2482" data-feathr-click-track="true" data-tab="pane-pcw-references" href="#B4" id="B4R"><span data-dcnode-id="2483" instrument_node="">4</span></a><span data-dcnode-id="2481" instrument_node="">), the patients with asthma in the current study reported significantly higher degrees of dyspnea at submaximal work rates compared with controls (</span><a class="primary-blue-color" data-dcnode-id="2479" data-feathr-click-track="true" data-tab="pane-pcw-Figures" href="#F0001" id="F0001R"><span data-dcnode-id="2480" instrument_node="">Fig. 1</span></a><span data-dcnode-id="2478" instrument_node="">). IRV has previously been reported to be a main determinant of dyspnea in chronic obstructive pulmonary disease (</span><a class="primary-blue-color tab-link" data-dcnode-id="2476" data-feathr-click-track="true" data-tab="pane-pcw-references" href="#B16" id="B16R"><span data-dcnode-id="2477" instrument_node="">16</span></a><span data-dcnode-id="2475" instrument_node="">, </span><a class="primary-blue-color tab-link" data-dcnode-id="2473" data-feathr-click-track="true" data-tab="pane-pcw-references" href="#B25" id="B25R"><span data-dcnode-id="2474" instrument_node="">25</span></a><span data-dcnode-id="2472" instrument_node="">, </span><a class="primary-blue-color tab-link" data-dcnode-id="2470" data-feathr-click-track="true" data-tab="pane-pcw-references" href="#B27" id="B27R"><span data-dcnode-id="2471" instrument_node="">27</span></a><span data-dcnode-id="2469" instrument_node="">), but the relationship between operating lung volumes and exertional dyspnea in asthma has thus far been unknown. Previous studies suggest that inspiratory effort is a main contributor to breathlessness during the onset of asthma-associated bronchoconstriction at rest (</span><a class="primary-blue-color tab-link" data-dcnode-id="2467" data-feathr-click-track="true" data-tab="pane-pcw-references" href="#B17" id="B17R"><span data-dcnode-id="2468" instrument_node="">17</span></a><span data-dcnode-id="2466" instrument_node="">, </span><a class="primary-blue-color tab-link" data-dcnode-id="2464" data-feathr-click-track="true" data-tab="pane-pcw-references" href="#B18" id="B18R"><span data-dcnode-id="2465" instrument_node="">18</span></a><span data-dcnode-id="2463" instrument_node="">), and the sensation of breathlessness and increased inspiratory effort link well with low resting IC measures (</span><a class="primary-blue-color tab-link" data-dcnode-id="2461" data-feathr-click-track="true" data-tab="pane-pcw-references" href="#B18" id="B18R"><span data-dcnode-id="2462" instrument_node="">18</span></a><span data-dcnode-id="2460" instrument_node="">). However, these conclusions are limited to resting conditions, and it is unknown how applicable the results are to exercise. This study expanded on results from the resting studies by evaluating breathing patterns, operating lung volumes, and dyspnea during exercise in asthma. While patients with asthma did not show evidence of dynamic hyperinflation with exercise, the elevated operating lung volumes at rest and throughout exercise likely resulted in a mechanical constraint on V</span><sub data-dcnode-id="2458"><span data-dcnode-id="2459" instrument_node="">T</span></sub><span data-dcnode-id="2457" instrument_node=""> expansion with increasing exercise intensity, which resulted in patients with asthma adopting a more rapid and shallow breathing pattern (</span><a class="primary-blue-color" data-dcnode-id="2455" data-feathr-click-track="true" data-tab="pane-pcw-Figures" href="#F0001" id="F0001R"><span data-dcnode-id="2456" instrument_node="">Fig. 1</span></a><span data-dcnode-id="2454" instrument_node="">). The reduced IRV positioned V</span><sub data-dcnode-id="2452"><span data-dcnode-id="2453" instrument_node="">T</span></sub><span data-dcnode-id="2451" instrument_node=""> closer to total lung capacity, which increases the elastic loading of the functionally weakened inspiratory muscles (</span><a class="primary-blue-color tab-link" data-dcnode-id="2449" data-feathr-click-track="true" data-tab="pane-pcw-references" href="#B9" id="B9R"><span data-dcnode-id="2450" instrument_node="">9</span></a><span data-dcnode-id="2448" instrument_node="">, </span><a class="primary-blue-color tab-link" data-dcnode-id="2446" data-feathr-click-track="true" data-tab="pane-pcw-references" href="#B28" id="B28R"><span data-dcnode-id="2447" instrument_node="">28</span></a><span data-dcnode-id="2445" instrument_node="">). Combined with the accompanying tachypnea, it is logical to suggest that the mechanical abnormalities present in patients with asthma may have led to a disparity between respiratory effort and simultaneous lung volume expansion (i.e., neuromechanical uncoupling) and may help to explain the mechanism behind the increased perceived dyspnea in patients with asthma (</span><a class="primary-blue-color tab-link" data-dcnode-id="2443" data-feathr-click-track="true" data-tab="pane-pcw-references" href="#B9" id="B9R"><span data-dcnode-id="2444" instrument_node="">9</span></a><span data-dcnode-id="2442" instrument_node="">). When dyspnea was plotted against IRV, there was a complete superimposition of the graphs in patients with asthma and controls, suggesting that the increased perceived dyspnea is secondary to reduced IRV during incremental exercise. Critically low IRV values during constant workload exercise have also previously been linked to increased dyspnea in asthma (</span><a class="primary-blue-color tab-link" data-dcnode-id="2440" data-feathr-click-track="true" data-tab="pane-pcw-references" href="#B15" id="B15R"><span data-dcnode-id="2441" instrument_node="">15</span></a><span data-dcnode-id="2439" instrument_node="">), and our findings provide additional support demonstrating a link between IRV and dyspnea in patients with asthma.</span></p><p data-dcnode-id="2398"><span data-dcnode-id="2437" instrument_node="">Lower physical activity levels in asthma are in part due to a fear of increased symptoms sensations, such as dyspnea, following exercise (</span><a class="primary-blue-color tab-link" data-dcnode-id="2435" data-feathr-click-track="true" data-tab="pane-pcw-references" href="#B21" id="B21R"><span data-dcnode-id="2436" instrument_node="">21</span></a><span data-dcnode-id="2434" instrument_node="">). Previous work has shown that when matched for physical activity levels, mild sedentary patients with asthma and sedentary controls do not differ in their sensation of dyspnea during incremental exercise (</span><a class="primary-blue-color tab-link" data-dcnode-id="2432" data-feathr-click-track="true" data-tab="pane-pcw-references" href="#B4" id="B4R"><span data-dcnode-id="2433" instrument_node="">4</span></a><span data-dcnode-id="2431" instrument_node="">). While physical activity levels were not measured in the current study, aerobic fitness and physical activity are closely related (</span><a class="primary-blue-color tab-link" data-dcnode-id="2429" data-feathr-click-track="true" data-tab="pane-pcw-references" href="#B3" id="B3R"><span data-dcnode-id="2430" instrument_node="">3</span></a><span data-dcnode-id="2428" instrument_node="">), and our groups were well matched for aerobic fitness (control: 47.4 ± 8.4 vs. asthma: 48.4 ± 6.9 ml·kg</span><sup data-dcnode-id="2426"><span data-dcnode-id="2427" instrument_node="">−1</span></sup><span data-dcnode-id="2425" instrument_node="">·min</span><sup data-dcnode-id="2423"><span data-dcnode-id="2424" instrument_node="">−1</span></sup><span data-dcnode-id="2422" instrument_node="">; </span><a class="primary-blue-color ref showTableEvent" data-dcnode-id="2420" data-feathr-click-track="true" data-id="T3" href="#T3" id="T3R"><span data-dcnode-id="2421" instrument_node="">Table 3</span></a><span data-dcnode-id="2419" instrument_node="">). Despite being fitness-matched, patients with asthma in the current study reported significantly greater dyspnea during exercise as compared with controls, with a maximal difference of 1.6 Borg units observed at 125 W. Our subjects achieved on average a 50% higher relative V̇</span><span class="smallcaps smallerCapital" data-dcnode-id="2417"><span data-dcnode-id="2418" instrument_node="">o</span></span><sub data-dcnode-id="2415"><span data-dcnode-id="2416" instrument_node="">2peak</span></sub><span data-dcnode-id="2414" instrument_node=""> (i.e., 17 ml·kg</span><sup data-dcnode-id="2412"><span data-dcnode-id="2413" instrument_node="">−1</span></sup><span data-dcnode-id="2411" instrument_node="">·min</span><sup data-dcnode-id="2409"><span data-dcnode-id="2410" instrument_node="">−1</span></sup><span data-dcnode-id="2408" instrument_node="">) than what was reported in the previous study (</span><a class="primary-blue-color tab-link" data-dcnode-id="2406" data-feathr-click-track="true" data-tab="pane-pcw-references" href="#B4" id="B4R"><span data-dcnode-id="2407" instrument_node="">4</span></a><span data-dcnode-id="2405" instrument_node="">), and the peak ventilation among the patients with asthma in the current study was 59% (45 l/min) higher than previously reported, suggesting that the difference seen in dyspnea may appear at higher ventilatory rates. However, the V̇</span><span class="smallcaps smallerCapital" data-dcnode-id="2403"><span data-dcnode-id="2404" instrument_node="">e</span></span><span data-dcnode-id="2402" instrument_node=""> at the corresponding workloads where the discrepancy in dyspnea between patients with asthma and controls becomes apparent (75, 100, and 125 W) are well within the range of the obtained V̇</span><span class="smallcaps smallerCapital" data-dcnode-id="2400"><span data-dcnode-id="2401" instrument_node="">e</span></span><span data-dcnode-id="2399" instrument_node=""> of the patients with asthma in the previous study (~76 l/min). It is thus reasonable to argue that differences in dyspnea between the two studies are not due to aerobic fitness, and further research on other factors, such as asthma severity and control, is warranted to assess why some groups of patients with asthma, but not others, experience increased exertional dyspnea.</span></p><p data-dcnode-id="2378"><span data-dcnode-id="2397" instrument_node="">Salbutamol is a commonly prescribed short-acting bronchodilator that acts on the β</span><sub data-dcnode-id="2395"><span data-dcnode-id="2396" instrument_node="">2</span></sub><span data-dcnode-id="2394" instrument_node="">-adrenoceptors on the bronchial smooth muscles and thereby causes relaxation and opens constricted airways. While salbutamol is thought to prevent exercise-induced bronchoconstriction (EIB) among susceptible individuals or relieve asthma symptoms brought on by physical activity (</span><a class="primary-blue-color tab-link" data-dcnode-id="2392" data-feathr-click-track="true" data-tab="pane-pcw-references" href="#B1" id="B1R"><span data-dcnode-id="2393" instrument_node="">1</span></a><span data-dcnode-id="2391" instrument_node="">, </span><a class="primary-blue-color tab-link" data-dcnode-id="2389" data-feathr-click-track="true" data-tab="pane-pcw-references" href="#B19" id="B19R"><span data-dcnode-id="2390" instrument_node="">19</span></a><span data-dcnode-id="2388" instrument_node="">), this study evaluated the direct impact of using salbutamol on exertional dyspnea in asthma. As seen in </span><a class="primary-blue-color ref showTableEvent" data-dcnode-id="2386" data-feathr-click-track="true" data-id="T3" href="#T3" id="T3R"><span data-dcnode-id="2387" instrument_node="">Table 3</span></a><span data-dcnode-id="2385" instrument_node="">, salbutamol did not significantly reduce the degree of EFL in patients with asthma, and likewise, there were no differences in operating lung volumes following salbutamol (data not shown). It can be speculated that the higher operating lung volumes in asthma may be a response to the higher baseline airway resistance and a compensatory response to limit the increased resistive work of breathing. The lack of effect of salbutamol on operating lung volumes during higher intensity exercise in asthma likely explains why dyspnea in patients with asthma does not improve with salbutamol, which is consistent with previous studies (</span><a class="primary-blue-color tab-link" data-dcnode-id="2383" data-feathr-click-track="true" data-tab="pane-pcw-references" href="#B8" id="B8R"><span data-dcnode-id="2384" instrument_node="">8</span></a><span data-dcnode-id="2382" instrument_node="">, </span><a class="primary-blue-color tab-link" data-dcnode-id="2380" data-feathr-click-track="true" data-tab="pane-pcw-references" href="#B14" id="B14R"><span data-dcnode-id="2381" instrument_node="">14</span></a><span data-dcnode-id="2379" instrument_node="">).</span></p><div data-dcnode-id="2329" id="sec4-1"><div data-dcnode-id="2335" id="sec4-1-1"><h3 class="article-section__title" data-dcnode-id="2376" id="_i21"><span data-dcnode-id="2377" instrument_node="">Limitations.</span></h3><p data-dcnode-id="2362"><span data-dcnode-id="2375" instrument_node="">While other studies have further characterized breathlessness associated with obstructive lung disease to be attributed to inspiratory effort (</span><a class="primary-blue-color tab-link" data-dcnode-id="2373" data-feathr-click-track="true" data-tab="pane-pcw-references" href="#B17" id="B17R"><span data-dcnode-id="2374" instrument_node="">17</span></a><span data-dcnode-id="2372" instrument_node="">, </span><a class="primary-blue-color tab-link" data-dcnode-id="2370" data-feathr-click-track="true" data-tab="pane-pcw-references" href="#B18" id="B18R"><span data-dcnode-id="2371" instrument_node="">18</span></a><span data-dcnode-id="2369" instrument_node="">), increased diaphragmatic muscle effort (</span><a class="primary-blue-color tab-link" data-dcnode-id="2367" data-feathr-click-track="true" data-tab="pane-pcw-references" href="#B6" id="B6R"><span data-dcnode-id="2368" instrument_node="">6</span></a><span data-dcnode-id="2366" instrument_node="">), and increased ventilatory neural drive (</span><a class="primary-blue-color tab-link" data-dcnode-id="2364" data-feathr-click-track="true" data-tab="pane-pcw-references" href="#B6" id="B6R"><span data-dcnode-id="2365" instrument_node="">6</span></a><span data-dcnode-id="2363" instrument_node="">), this study did not evaluate physiological measures of work of breathing, and further work is needed in this area.</span></p><p data-dcnode-id="2360"><span data-dcnode-id="2361" instrument_node="">Asthma is a heterogenous disease with various triggers, inflammatory phenotypes, and severity levels, and a larger scale study would be needed to address further differences in lung volumes and dyspnea responses to exercise between distinct phenotypes of asthma. The sensation of dyspnea is likely associated with asthma severity, and an even larger difference in dyspnea may be present in severe or uncontrolled asthma. The current study only included participants with controlled and partly controlled asthma, and to our knowledge, no data on exertional dyspnea and lung volume in uncontrolled asthma is currently available addressing this knowledge gap. Additionally, 7 of the 16 patients with asthma showed signs of EIB post cardiopulmonary exercise test; however, subanalyses did not reveal differences in dyspnea or measured lung volumes during exercise between those who did and did not experience EIB.</span></p><p data-dcnode-id="2352"><span data-dcnode-id="2359" instrument_node="">Recent work has documented sex differences in the ventilatory and sensory responses to exercise (</span><a class="primary-blue-color tab-link" data-dcnode-id="2357" data-feathr-click-track="true" data-tab="pane-pcw-references" href="#B5" id="B5R"><span data-dcnode-id="2358" instrument_node="">5</span></a><span data-dcnode-id="2356" instrument_node="">, </span><a class="primary-blue-color tab-link" data-dcnode-id="2354" data-feathr-click-track="true" data-tab="pane-pcw-references" href="#B31" id="B31R"><span data-dcnode-id="2355" instrument_node="">31</span></a><span data-dcnode-id="2353" instrument_node="">). Our study purposely included an equal number of men and women in both groups to account for any potential differences between men and women. Future work examining sex differences in breathing mechanics is needed to better understand the pathophysiology of exertional dyspnea in asthma.</span></p><p data-dcnode-id="2341"><span data-dcnode-id="2351" instrument_node="">Neither the research participants nor the research staff were blinded to the administration of salbutamol in this study. As salbutamol is used to reverse bronchoconstriction, and thus reduce the sensations of breathlessness and chest tightness in asthma (</span><a class="primary-blue-color tab-link" data-dcnode-id="2349" data-feathr-click-track="true" data-tab="pane-pcw-references" href="#B1" id="B1R"><span data-dcnode-id="2350" instrument_node="">1</span></a><span data-dcnode-id="2348" instrument_node="">), the lack of blinding to the drug condition introduces a potential bias toward lower dyspnea and better exercise tolerance following β</span><sub data-dcnode-id="2346"><span data-dcnode-id="2347" instrument_node="">2</span></sub><span data-dcnode-id="2345" instrument_node="">-agonist. However, as the administration of salbutamol did not affect operating lung volumes or dyspnea during incremental exercise, it is unlikely that the lack of change with β</span><sub data-dcnode-id="2343"><span data-dcnode-id="2344" instrument_node="">2</span></sub><span data-dcnode-id="2342" instrument_node="">-agonist is explained by an absence of blinding.</span></p><p data-dcnode-id="2336"><span data-dcnode-id="2340" instrument_node="">In the current study, the occurrence of EFL was evaluated as the percent overlap of the tidal breath over the maximal flow volume loop achieved before exercise. This method of assessing EFL has inherent variability stemming from the occurrence of thoracic gas compression during the forced expiratory effort, EIB, or bronchodilation with exercise and potential human error during evaluation (</span><a class="primary-blue-color tab-link" data-dcnode-id="2338" data-feathr-click-track="true" data-tab="pane-pcw-references" href="#B23" id="B23R"><span data-dcnode-id="2339" instrument_node="">23</span></a><span data-dcnode-id="2337" instrument_node="">).</span></p></div><div data-dcnode-id="2330" id="sec4-1-2"><h3 class="article-section__title" data-dcnode-id="2333" id="_i22"><span data-dcnode-id="2334" instrument_node="">Conclusion.</span></h3><p data-dcnode-id="2331"><span data-dcnode-id="2332" instrument_node="">Patients with asthma exhibit higher operating lung volumes (seen as low IC and IRV) than controls during exercise. The high operating lung volumes explain why patients with asthma experience increased exertional dyspnea and appear to be unaffected by salbutamol usage before exercise. To reduce physical activity avoidance in asthma, future research should examine approaches to normalize dynamic lung volumes and thus improve exertional dyspnea in asthma.</span></p></div></div></div><div data-dcnode-id="2323" id="sec5"><h1 class="article-section__title section__title" data-dcnode-id="2326" id="_i23"><span data-dcnode-id="2327" instrument_node="">GRANTS</span></h1><p data-dcnode-id="2324"><span data-dcnode-id="2325" instrument_node="">Funding for this work was received from the Lung Association of Alberta and the University of Alberta Hospital Foundation.</span></p></div><div data-dcnode-id="2318" id="sec6"><h1 class="article-section__title section__title" data-dcnode-id="2321" id="_i24"><span data-dcnode-id="2322" instrument_node="">DISCLOSURES</span></h1><p data-dcnode-id="2319"><span data-dcnode-id="2320" instrument_node="">No conflicts of interest, financial or otherwise, are declared by the authors.</span></p></div><div data-dcnode-id="2313" id="sec7"><h1 class="article-section__title section__title" data-dcnode-id="2316" id="_i25"><span data-dcnode-id="2317" instrument_node="">AUTHOR CONTRIBUTIONS</span></h1><p data-dcnode-id="2314"><span data-dcnode-id="2315" instrument_node="">L.E.M., A.R.B., D.B.P., M.B., and M.K.S. conceived and designed research; L.E.M., A.R.B., and D.B.P. performed experiments; L.E.M., A.R.B., D.B.P., and M.K.S. analyzed data; L.E.M., A.R.B., D.B.P., M.B., and M.K.S. interpreted results of experiments; L.E.M., A.R.B., and D.B.P. prepared figures; L.E.M. drafted manuscript; L.E.M., A.R.B., D.B.P., M.B., and M.K.S. edited and revised manuscript; L.E.M., A.R.B., D.B.P., M.B., and M.K.S. approved final version of manuscript.</span></p></div></div><h2 class="article-section__title section__title" data-dcnode-id="2307" id="d16896377e123"><span data-dcnode-id="2308" instrument_node="">AUTHOR NOTES</span></h2><ul class="author-notes" data-dcnode-id="2296"><li data- spnea%252520has%252520been%252520reported%252520to%252520be%252520a%252520main%252520contributor%252520to%252520exercise%252520avoidance%252520in%252520asthma.%252520While%252520traditional%252520markers%252520of%252520ventilation%252520do%252520not%252520explain%252520the%252520heightened%252520dyspnea%252520during%252520exercise%252520in%252520patients%252520with%252520asthma%25252C%252520this%252520study%252520proposed%252520that%252520exertional%252520dyspnea%252520in%252520asthma%252520was%252520due%252520to%252520high-operating%252520lung%252520volumes%25252C%252520which%252520may%252520be%252520improved%252520with%252520a%252520short-acting%252520%2525CE%2525B22-agonist.%252520On%252520two%252520separate%252520days%25252C%25252016%252520patients%252520with%252520asthma%252520and%25252016%252520controls%252520completed%252520a%252520lung%252520function%252520test%252520and%252520incremental%252520exercise%252520tests%252520to%252520exhaustion.%252520On%252520one%252520of%252520the%252520days%252520%28order%252520randomized%29%25252C%252520400%252520%2525C2%2525B5g%252520salbutamol%252520was%252520administered%252520before%252520exercise.%252520Inspiratory%252520capacity%252520%28IC%29%25252C%252520inspiratory%252520reserve%252520volume%252520%28IRV%29%25252C%252520and%252520dyspnea%252520%28modified%252520Borg%252520scale%29%252520were%252520evaluated%252520throughout%252520exercise.%252520Compared%252520with%252520controls%25252C%252520patients%252520with%252520asthma%252520reported%252520greater%252520dyspnea%252520at%252520the%252520same%252520absolute%252520submaximal%252520workloads.%252520Furthermore%25252C%252520patients%252520with%252520asthma%252520demonstrated%252520altered%252520breathing%252520responses%252520to%252520exercise%25252C%252520characterized%252520by%252520reduced%252520IC%252520and%252520IRV%252520throughout%252520exercise%252520compared%252520with%252520controls.%252520The%252520reduced%252520IRV%252520was%252520associated%252520with%252520increased%252520dyspnea%252520in%252520patients%252520with%252520asthma.%252520Salbutamol%252520did%252520not%252520affect%252520dyspnea%252520or%252520operating%252520lung%252520volumes%252520in%252520either%252520group.%252520The%252520increased%252520perception%252520of%252520dyspnea%252520during%252520incremental%252520exercise%252520in%252520patients%252520with%252520asthma%252520appears%252520to%252520be%252520secondary%252520to%252520a%252520reduction%252520in%252520IRV%25252C%252520which%252520is%252520unaffected%252520by%252520an%252520inhaled%252520%2525CE%2525B22-agonist.%252520NEW%252520%252526%252520NOTEWORTHY%252520Increased%252520exertional%252520dyspnea%252520in%252520asthma%252520appears%252520to%252520be%252520due%252520to%252520high%252520operating%252520lung%252520volumes%252520and%252520is%252520not%252520affected%252520by%252520salbutamol.%26csi%3Dundefined%26rev%3Dv8.28.8-wp%26ct%3D1%26xld%3D1%26xd%3D1&amp;raw" style="height: 1px; width: 1px; position: absolute; top: 0px; z-index: 100000; border: 0px; left: 0px;" title="AddThis utility frame"><html data-dcnode-id="47"><head data-dcnode-id="51"><meta charset="utf-8"><meta content="text/html; charset=utf-8" data-dcnode-id="55" http-equiv="Content-type"/><meta content="noindex,nofollow" data-dcnode-id="54" name="robots"/><title data-dcnode-id="52">AddThis Utility Frame</title></meta></head><body data-dcnode-id="48"></body></html></iframe></div><span data-dcnode-id="42" instrument_node="">
