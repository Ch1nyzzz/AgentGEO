</span><meta content="Lung cancer remains the leading cause of cancer-related mortality worldwide. To formulate effective treatment strategies and optimize patient outcomes, accurate staging is essential. Lung cancer staging has traditionally relied on a TNM staging system, for which the International Association for the Study of Lung Cancer (IASLC) has recently proposed changes. The revised classification for this eighth edition of the TNM staging system (TNM-8) is based on detailed analysis of a new large international database of lung cancer cases assembled by the IASLC for the purposes of this project. Fundamental changes incorporated into TNM-8 include (a) modifications to the T classification on the basis of 1-cm increments in tumor size; (b) grouping of lung cancers that result in partial or complete lung atelectasis or pneumonitis; (c) grouping of tumors with involvement of a main bronchus irrespective of distance from the carina; (d) reassignment of diaphragmatic invasion in terms of T classification; (e) elimination of mediastinal pleural invasion from the T classification; and (f) subdivision of the M classification into different descriptors on the basis of the number and site of extrathoracic metastases. In response to these revisions, established stage groups have been modified, and others have been created. In addition, recommendations for classifying patterns of disease that result in multiple sites of pulmonary involvement, including multiple primary lung cancers, lung cancers with separate tumor nodules, multiple ground-glass/lepidic lesions, and consolidation, as well as recommendations for lesion measurement, are addressed. Understanding the key revisions introduced in TNM-8 allows radiologists to accurately stage patients with lung cancer and optimize therapy. ©RSNA, 2018" data-dcnode-id="5614" property="og:description"><span data-dcnode-id="5613" instrument_node="">

lass="w-slide__hide" data-dcnode-id="4423" href="#_i44"><span data-dcnode-id="4424"><span data-dcnode-id="4425" instrument_node="">Staging of SCLC</span></span></a></li><li data-dcnode-id="4418" role="menuitem"><a class="w-slide__hide" data-dcnode-id="4419" href="#_i47"><span data-dcnode-id="4420"><span data-dcnode-id="4421" instrument_node="">Tumor Measurement</span></span></a></li><li data-dcnode-id="4414" role="menuitem"><a class="w-slide__hide" data-dcnode-id="4415" href="#_i50"><span data-dcnode-id="4416"><span data-dcnode-id="4417" instrument_node="">Limitations</span></span></a></li><li data-dcnode-id="4410" role="menuitem"><a class="w-slide__hide" data-dcnode-id="4411" href="#_i51"><span data-dcnode-id="4412"><span data-dcnode-id="4413" instrument_node="">Conclusion</span></span></a></li><li data-dcnode-id="4406" role="menuitem"><a class="w-slide__hide" data-dcnode-id="4407" href="#d1051977e1history"><span data-dcnode-id="4408"><span data-dcnode-id="4409" instrument_node="">Article History</span></span></a></li></ul></div></li><li class="coolBar__section" data-dcnode-id="4398"><a class="coolBar__ctrl coolBar--pdf cloned hidden-xs hidden-sm" data-dcnode-id="4399" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//pubs.rsna.org/doi/epdf/10.1148/rg.2018170081"><i aria-hidden="true" class="icon-pdf" data-dcnode-id="4402"></i><span data-dcnode-id="4400"><span data-dcnode-id="4401" instrument_node="">PDF</span></span></a></li></ul><ul class="coolBar__second rlist" data-dcnode-id="4315"><span data-dcnode-id="4396" instrument_node="">

Text" role="menuitem" target="_blank"><i aria-hidden="true" class="icon-reprints" data-dcnode-id="4365"></i><span data-dcnode-id="4363"><span data-dcnode-id="4364" instrument_node="">Reprints</span></span></a></li></ul></div><span data-dcnode-id="4358" instrument_node="">

</span><span data-dcnode-id="4316" instrument_node="">
</span></ul></div></nav></div><div class="article__body" data-dcnode-id="2733"><p class="fulltext" data-dcnode-id="4311"></p><div class="hlFld-Abstract" data-dcnode-id="4281"><p class="fulltext" data-dcnode-id="4309"></p><h2 class="article-section__title section__title" data-dcnode-id="4307" id="d1051977e1"><span data-dcnode-id="4308" instrument_node="">Abstract</span></h2><div class="abstractSection abstractInFull" data-dcnode-id="4282"><p data-dcnode-id="4287"><span data-dcnode-id="4306" instrument_node="">Lung cancer remains the leading cause of cancer-related mortality worldwide. To formulate effective treatment strategies and optimize patient outcomes, accurate staging is essential. Lung cancer staging has traditionally relied on a TNM staging system, for which the International Association for the Study of Lung Cancer (IASLC) has recently proposed changes. The revised classification for this eighth edition of the TNM staging system (TNM-8) is based on detailed analysis of a new large international database of lung cancer cases assembled by the IASLC for the purposes of this project. Fundamental changes incorporated into TNM-8 include </span><i data-dcnode-id="4304"><span data-dcnode-id="4305" instrument_node="">(a)</span></i><span data-dcnode-id="4303" instrument_node=""> modifications to the T classification on the basis of 1-cm increments in tumor size; </span><i data-dcnode-id="4301"><span data-dcnode-id="4302" instrument_node="">(b)</span></i><span data-dcnode-id="4300" instrument_node=""> grouping of lung cancers that result in partial or complete lung atelectasis or pneumonitis; </span><i data-dcnode-id="4298"><span data-dcnode-id="4299" instrument_node="">(c)</span></i><span data-dcnode-id="4297" instrument_node=""> grouping of tumors with involvement of a main bronchus irrespective of distance from the carina; </span><i data-dcnode-id="4295"><span data-dcnode-id="4296" instrument_node="">(d)</span></i><span data-dcnode-id="4294" instrument_node=""> reassignment of diaphragmatic invasion in terms of T classification; </span><i data-dcnode-id="4292"><span data-dcnode-id="4293" instrument_node="">(e)</span></i><span data-dcnode-id="4291" instrument_node=""> elimination of mediastinal pleural invasion from the T classification; and </span><i data-dcnode-id="4289"><span data-dcnode-id="4290" instrument_node="">(f)</span></i><span data-dcnode-id="4288" instrument_node=""> subdivision of the M classification into different descriptors on the basis of the number and site of extrathoracic metastases. In response to these revisions, established stage groups have been modified, and others have been created. In addition, recommendations for classifying patterns of disease that result in multiple sites of pulmonary involvement, including multiple primary lung cancers, lung cancers with separate tumor nodules, multiple ground-glass/lepidic lesions, and consolidation, as well as recommendations for lesion measurement, are addressed. Understanding the key revisions introduced in TNM-8 allows radiologists to accurately stage patients with lung cancer and optimize therapy.</span></p><p data-dcnode-id="4283"><sup data-dcnode-id="4285"><span data-dcnode-id="4286" instrument_node="">©</span></sup><span data-dcnode-id="4284" instrument_node="">RSNA, 2018</span></p></div></div><div class="hlFld-Fulltext" data-dcnode-id="2751"><div class="anchor-spacer" data-dcnode-id="4278" id="ac_i1"></div><h2 class="article-section__title section__title" data-dcnode-id="4276" id="_i1"><span data-dcnode-id="4277" instrument_node="">SA-CME LEARNING OBJECTIVES</span></h2><p data-dcnode-id="4273"><i data-dcnode-id="4274"><span data-dcnode-id="4275" instrument_node="">After completing this journal-based SA-CME activity, participants will be able to:</span></i></p><ul class="NLM_list-list_type-simple" data-dcnode-id="4263" style="list-style-type:none"><li data-dcnode-id="4270"><p class="inline" data-dcnode-id="4271"><span data-dcnode-id="4272" instrument_node="">■ Describe the rationale and methodology for the development of TNM-8 for lung cancer.</span></p></li><li data-dcnode-id="4267"><p class="inline" data-dcnode-id="4268"><span data-dcnode-id="4269" instrument_node="">■ Describe the T, N, and M descriptors and stage groups in TNM-8.</span></p></li><li data-dcnode-id="4264"><p class="inline" data-dcnode-id="4265"><span data-dcnode-id="4266" instrument_node="">■ Discuss how to use the classification and staging systems to properly characterize and stage lung cancers with multiple pulmonary sites of involvement.</span></p></li></ul><p data-dcnode-id="4262"></p><div class="anchor-spacer" data-dcnode-id="4261" id="ac_i2"></div><h2 class="article-section__title section__title" data-dcnode-id="4259" id="_i2"><span data-dcnode-id="4260" instrument_node="">Introduction</span></h2><p data-dcnode-id="4248"><span data-dcnode-id="4258" instrument_node="">Lung cancer remains the leading cause of cancer-related mortality worldwide, with an estimated 222 500 new cases diagnosed and 155 870 deaths expected from the disease in 2017 (</span><a class="tab-link" data-dcnode-id="4256" data-tab="pane-pcw-references" href="#r1" id="r1R"><span data-dcnode-id="4257" instrument_node="">1</span></a><span data-dcnode-id="4255" instrument_node="">). Staging plays an important role in the management of patients and is based on groupings of patients with similar clinical outcomes. The TNM staging system is the established, uniform method of staging lung cancer and depends primarily on the anatomic extent of disease. The seventh edition of the TNM staging system (TNM-7) has been used in clinical practice since its publication in 2009. TNM-7 introduced key revisions that were based on the analysis of an international database organized by the International Association for the Study of Lung Cancer (IASLC) as part of the IASLC Lung Cancer Staging Project (</span><a class="tab-link" data-dcnode-id="4253" data-tab="pane-pcw-references" href="#r2" id="r2R"><span data-dcnode-id="4254" instrument_node="">2</span></a><span data-dcnode-id="4252" instrument_node="">,</span><a class="tab-link" data-dcnode-id="4250" data-tab="pane-pcw-references" href="#r3" id="r3R"><span data-dcnode-id="4251" instrument_node="">3</span></a><span data-dcnode-id="4249" instrument_node="">). Important changes included the addition of small cell lung carcinoma (SCLC) and bronchopulmonary carcinoid to the TNM staging system, revisions to the T and M descriptors on the basis of significant differences in 5-year survival between patients with different disease features, and revisions to several stage groups.</span></p><p data-dcnode-id="4234"><span data-dcnode-id="4247" instrument_node="">One of the most important limitations of the original IASLC Lung Cancer Staging Project was the retrospective nature of the database. To inform the eighth edition of the TNM staging system (TNM-8), an international consortium led by the IASLC resulted in the collection of new lung cancer cases and the creation of a large database (</span><a class="tab-link" data-dcnode-id="4245" data-tab="pane-pcw-references" href="#r4" id="r4R"><span data-dcnode-id="4246" instrument_node="">4</span></a><span data-dcnode-id="4244" instrument_node="">). Analysis of this new database by the IASLC Staging and Prognostic Factors Committee showed significant differences in survival between patients with different T and M classifications, and recommendations for further modification of individual descriptors and overall stage groups have been published (</span><a class="tab-link" data-dcnode-id="4242" data-tab="pane-pcw-references" href="#r5" id="r5R"><span data-dcnode-id="4243" instrument_node="">5</span></a><span data-dcnode-id="4241" instrument_node="">–</span><a class="tab-link" data-dcnode-id="4239" data-tab="pane-pcw-references" href="#r7" id="r7R"><span data-dcnode-id="4240" instrument_node="">7</span></a><span data-dcnode-id="4238" instrument_node="">). In addition, a subcommittee of the IASLC Staging and Prognostic Factors Committee investigated patterns of disease that result in multiple sites of pulmonary involvement, including multiple primary lung cancers, lung cancers with separate tumor nodules, multiple ground-glass/lepidic lesions, and consolidation, and has issued recommendations regarding the staging of cancer in patients with such features (</span><a class="tab-link" data-dcnode-id="4236" data-tab="pane-pcw-references" href="#r8" id="r8R"><span data-dcnode-id="4237" instrument_node="">8</span></a><span data-dcnode-id="4235" instrument_node="">). As the role of imaging in the clinical evaluation and staging of lung cancer continues to evolve, radiologists must understand the foundation and potential implications of TNM-8.</span></p><p data-dcnode-id="4232"><span data-dcnode-id="4233" instrument_node="">In this article, we present the rationale and methodology of the IASLC in producing TNM-8, specific revisions to the T and M classifications and stage groups, and new recommendations regarding the staging of disease with multiple sites of pulmonary involvement and the measurement of tumors. The recommendation that non–small cell lung carcinoma (NSCLC), SCLC, and bronchopulmonary carcinoid be staged with the TNM system is maintained in TNM-8.</span></p><div class="anchor-spacer" data-dcnode-id="4231" id="ac_i3"></div><h2 class="article-section__title section__title" data-dcnode-id="4229" id="_i3"><span data-dcnode-id="4230" instrument_node="">Development and Methodology of TNM-8</span></h2><div class="anchor-spacer" data-dcnode-id="4228" id="ac_i4"></div><h3 class="article-section__title" data-dcnode-id="4226" id="_i4"><span data-dcnode-id="4227" instrument_node="">General Considerations</span></h3><p data-dcnode-id="4224"><span data-dcnode-id="4225" instrument_node="">TNM-7 incorporated several key changes to individual descriptors and overall stage groups on the basis of the analysis of a large lung cancer database as part of the IASLC Lung Cancer Staging Project. Despite these advances, several descriptors could not be validated.</span></p><p data-dcnode-id="4216"><span data-dcnode-id="4223" instrument_node="">For the creation of TNM-8 and to potentially overcome some of the limitations of the original retrospective database, the IASLC assembled a new database with retrospective and prospective clinical information. This database included data on 94 708 new cases of lung cancer diagnosed between 1999 and 2010 collected from 35 sources in 16 countries, 4667 of which were submitted through an online electronic data capture system stored at Cancer Research and Biostatistics in Seattle, Wash (</span><a class="tab-link" data-dcnode-id="4221" data-tab="pane-pcw-references" href="#r4" id="r4R"><span data-dcnode-id="4222" instrument_node="">4</span></a><span data-dcnode-id="4220" instrument_node="">). Of these cases, 17 552 with an unknown or different histologic type and incomplete stage information were excluded, leaving 77 156 patients (70 967 with NSCLC and 6189 with SCLC) with clinical and pathologic staging information for analysis. Clinical staging involves the utilization of tools such as the findings from physical examination, laboratory tests, and imaging to determine the stage before surgery, whereas pathologic staging involves information informed by surgical findings and histopathologic evaluation of resected specimens. Various subsets of this database were investigated to determine appropriate T, N, and M descriptors and stage groups. Detailed information regarding the methodology is provided in </span><a class="ref showTableEvent" data-dcnode-id="4218" data-id="tbl1" href="#tbl1"><span data-dcnode-id="4219" instrument_node="">Table 1</span></a><span data-dcnode-id="4217" instrument_node="">.</span></p><div class="anchor-spacer" data-dcnode-id="4215" id="tbl1"></div><div class="tableToggle" data-dcnode-id="4199"><div class="article-table-content" data-dcnode-id="4200" id="tbl1"><div class="tableToggle__table" data-dcnode-id="4202"><table class="table article-section__table" data-dcnode-id="4203"><caption data-dcnode-id="4209"><strong data-dcnode-id="4210"><p data-dcnode-id="4211"><span class="captionLabel" data-dcnode-id="4213"><span data-dcnode-id="4214" instrument_node="">Table 1:</span></span><span data-dcnode-id="4212" instrument_node=""> Development and Methodology of TNM-8</span></p></strong></caption><tbody data-dcnode-id="4204"><tr data-dcnode-id="4205"><td data-dcnode-id="4206"><div class="imageTable figure" data-dcnode-id="4207"><img alt="Table 1:" class="figure__image" data-dcnode-id="4208" data-lg-src="/cms/10.1148/rg.2018170081/asset/images/large/rg.2018170081.tbl1.jpeg" loading="lazy" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//pubs.rsna.org/cms/10.1148/rg.2018170081/asset/images/medium/rg.2018170081.tbl1.gif&amp;raw" title=""></div></td></tr></tbody></table></div><div class="tableToggle__image imageTable" data-dcnode-id="4201"></div></div></div><div class="anchor-spacer" data-dcnode-id="4198" id="ac_i6"></div><h3 class="article-section__title" data-dcnode-id="4196" id="_i6"><span data-dcnode-id="4197" instrument_node="">Special Considerations</span></h3><p data-dcnode-id="4179"><span data-dcnode-id="4195" instrument_node="">One of the most important limitations of the previous editions of the TNM staging system for lung cancer has been the lack of guidance regarding cancers with multiple sites of pulmonary involvement, including multiple primary lung cancers, lung cancers with separate tumor nodules, multiple ground-glass/lepidic lesions, and consolidation. It has been well documented that there is marked variability in the classification of these different patterns of disease by experts in the field and that these groups demonstrate significant differences in biologic behavior in terms of survival and recurrence patterns (</span><a class="tab-link" data-dcnode-id="4193" data-tab="pane-pcw-references" href="#r8" id="r8R"><span data-dcnode-id="4194" instrument_node="">8</span></a><span data-dcnode-id="4192" instrument_node="">–</span><a class="tab-link" data-dcnode-id="4190" data-tab="pane-pcw-references" href="#r10" id="r10R"><span data-dcnode-id="4191" instrument_node="">10</span></a><span data-dcnode-id="4189" instrument_node="">). For instance, although separate primary lung cancers have long been recognized by the TNM staging system, no clear guideline has been provided regarding how this diagnosis should be established (</span><a class="tab-link" data-dcnode-id="4187" data-tab="pane-pcw-references" href="#r8" id="r8R"><span data-dcnode-id="4188" instrument_node="">8</span></a><span data-dcnode-id="4186" instrument_node="">). Although specific terminology with regard to what constitutes a separate tumor nodule was included in TNM-7, there is considerable variability in how this information has been interpreted (</span><a class="tab-link" data-dcnode-id="4184" data-tab="pane-pcw-references" href="#r9" id="r9R"><span data-dcnode-id="4185" instrument_node="">9</span></a><span data-dcnode-id="4183" instrument_node="">,</span><a class="tab-link" data-dcnode-id="4181" data-tab="pane-pcw-references" href="#r10" id="r10R"><span data-dcnode-id="4182" instrument_node="">10</span></a><span data-dcnode-id="4180" instrument_node="">).</span></p><p data-dcnode-id="4177"><span data-dcnode-id="4178" instrument_node="">A subcommittee of the IASLC Staging and Prognostic Factors Committee evaluated the relevant literature of 1995–2015 and included their expert opinion to describe distinct patterns of disease, formulate criteria to categorize lung cancer with multiple pulmonary sites of involvement, and indicate how the TNM classification system can be applied to each disease pattern. A cohort of cases with information regarding separate tumor nodules was available in the new database; however, the numbers of cases representing the other disease patterns (such as multiple ground-glass/lepidic lesions and pneumonic-type adenocarcinoma) were insufficient for formal analysis. Nevertheless, recommendations were made on the basis of the available data.</span></p><div class="anchor-spacer" data-dcnode-id="4176" id="ac_i7"></div><h3 class="article-section__title" data-dcnode-id="4174" id="_i7"><span data-dcnode-id="4175" instrument_node="">Staging of SCLC</span></h3><p data-dcnode-id="4166"><span data-dcnode-id="4173" instrument_node="">It was first recommended that SCLC be staged with the TNM system with the release of TNM-7, and the results of subsequent studies have demonstrated the efficacy of this staging application (</span><a class="tab-link" data-dcnode-id="4171" data-tab="pane-pcw-references" href="#r11" id="r11R"><span data-dcnode-id="4172" instrument_node="">11</span></a><span data-dcnode-id="4170" instrument_node="">,</span><a class="tab-link" data-dcnode-id="4168" data-tab="pane-pcw-references" href="#r12" id="r12R"><span data-dcnode-id="4169" instrument_node="">12</span></a><span data-dcnode-id="4167" instrument_node="">). Survival analyses were performed for SCLC cases obtained from 1999 through 2010 with clinical and pathologic staging information. Patient prognosis was compared with TNM-7 as validation and was evaluated in relation to the proposed changes to the T and M classifications in TNM-8. A total of 5002 retrospective cases were available for evaluation, of which 4848 were clinically staged, 582 were pathologically staged, and 428 were both clinically and pathologically staged. Of the 4848 patients with clinical staging information, 577 (12%) were treated surgically. Most nonsurgical patients were treated with chemotherapy, with or without radiation therapy, and 1% of patients received supportive care.</span></p><div class="anchor-spacer" data-dcnode-id="4165" id="ac_i8"></div><h2 class="article-section__title section__title" data-dcnode-id="4163" id="_i8"><span data-dcnode-id="4164" instrument_node="">Changes in TNM-8</span></h2><p data-dcnode-id="4149"><span data-dcnode-id="4162" instrument_node="">On the basis of the analyses described in the previous sections, revisions to the T and M classifications were constructed, and candidate proposals for TNM stage groups were developed. For TNM-8, the TNM descriptors are listed in </span><a class="ref showTableEvent" data-dcnode-id="4160" data-id="tbl2" href="#tbl2"><span data-dcnode-id="4161" instrument_node="">Table 2</span></a><span data-dcnode-id="4159" instrument_node=""> (</span><a class="tab-link" data-dcnode-id="4157" data-tab="pane-pcw-references" href="#r7" id="r7R"><span data-dcnode-id="4158" instrument_node="">7</span></a><span data-dcnode-id="4156" instrument_node="">), and the stage groups are listed in </span><a class="ref showTableEvent" data-dcnode-id="4154" data-id="tbl3" href="#tbl3"><span data-dcnode-id="4155" instrument_node="">Table 3</span></a><span data-dcnode-id="4153" instrument_node=""> (</span><a class="tab-link" data-dcnode-id="4151" data-tab="pane-pcw-references" href="#r7" id="r7R"><span data-dcnode-id="4152" instrument_node="">7</span></a><span data-dcnode-id="4150" instrument_node="">).</span></p><div class="anchor-spacer" data-dcnode-id="4148" id="tbl2"></div><div class="tableToggle" data-dcnode-id="4125"><div class="article-table-content" data-dcnode-id="4126" id="tbl2"><div class="tableToggle__table" data-dcnode-id="4128"><table class="table article-section__table" data-dcnode-id="4136"><caption data-dcnode-id="4142"><strong data-dcnode-id="4143"><p data-dcnode-id="4144"><span class="captionLabel" data-dcnode-id="4146"><span data-dcnode-id="4147" instrument_node="">Table 2:</span></span><span data-dcnode-id="4145" instrument_node=""> TNM Descriptors for TNM-8</span></p></strong></caption><tbody data-dcnode-id="4137"><tr data-dcnode-id="4138"><td data-dcnode-id="4139"><div class="imageTable figure" data-dcnode-id="4140"><img alt="Table 2:" class="figure__image" data-dcnode-id="4141" data-lg-src="/cms/10.1148/rg.2018170081/asset/images/large/rg.2018170081.tbl2.jpeg" loading="lazy" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//pubs.rsna.org/cms/10.1148/rg.2018170081/asset/images/medium/rg.2018170081.tbl2.gif&amp;raw" title=""></div></td></tr></tbody></table><div class="tableFooter" data-dcnode-id="4129"><div class="footnote" data-dcnode-id="4130"><p data-dcnode-id="4131"><span data-dcnode-id="4135" instrument_node="">Source.—Reference </span><a class="tab-link" data-dcnode-id="4133" data-tab="pane-pcw-references" href="#r7" id="r7R"><span data-dcnode-id="4134" instrument_node="">7</span></a><span data-dcnode-id="4132" instrument_node="">.</span></p></div></div></div><div class="tableToggle__image imageTable" data-dcnode-id="4127"></div></div></div><div class="anchor-spacer" data-dcnode-id="4124" id="tbl3"></div><div class="tableToggle" data-dcnode-id="4098"><div class="article-table-content" data-dcnode-id="4099" id="tbl3"><div class="tableToggle__table" data-dcnode-id="4101"><table class="table article-section__table" data-dcnode-id="4112"><caption data-dcnode-id="4118"><strong data-dcnode-id="4119"><p data-dcnode-id="4120"><span class="captionLabel" data-dcnode-id="4122"><span data-dcnode-id="4123" instrument_node="">Table 3:</span></span><span data-dcnode-id="4121" instrument_node=""> Stage Groups for TNM-8</span></p></strong></caption><tbody data-dcnode-id="4113"><tr data-dcnode-id="4114"><td data-dcnode-id="4115"><div class="imageTable figure" data-dcnode-id="4116"><img alt="Table 3:" class="figure__image" data-dcnode-id="4117" data-lg-src="/cms/10.1148/rg.2018170081/asset/images/large/rg.2018170081.tbl3.jpeg" loading="lazy" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//pubs.rsna.org/cms/10.1148/rg.2018170081/asset/images/medium/rg.2018170081.tbl3.gif&amp;raw" title=""></div></td></tr></tbody></table><div class="tableFooter" data-dcnode-id="4102"><div class="footnote" data-dcnode-id="4106"><p data-dcnode-id="4107"><span data-dcnode-id="4111" instrument_node="">Source.—Reference </span><a class="tab-link" data-dcnode-id="4109" data-tab="pane-pcw-references" href="#r7" id="r7R"><span data-dcnode-id="4110" instrument_node="">7</span></a><span data-dcnode-id="4108" instrument_node="">.</span></p></div><div class="footnote" data-dcnode-id="4103"><p data-dcnode-id="4104"><span data-dcnode-id="4105" instrument_node="">*mi = minimally invasive.</span></p></div></div></div><div class="tableToggle__image imageTable" data-dcnode-id="4100"></div></div></div><div class="anchor-spacer" data-dcnode-id="4097" id="ac_i11"></div><h3 class="article-section__title" data-dcnode-id="4095" id="_i11"><span data-dcnode-id="4096" instrument_node="">T Classification</span></h3><p data-dcnode-id="4093"><span data-dcnode-id="4094" instrument_node="">The T classification indicates specific characteristics of the primary neoplasm and includes features such as size, the presence and extent of local tumor invasion, and the presence and location of separate tumor nodules. Analysis of the new database by using these established characteristics demonstrated significant differences in the 5-year survival of patients with various features.</span></p><p data-dcnode-id="4082"><b data-dcnode-id="4090"><i data-dcnode-id="4091"><span data-dcnode-id="4092" instrument_node="">Tumor Size.—</span></i></b><span data-dcnode-id="4089" instrument_node="">Information regarding tumor size was available for a large number of cases in the new database, and survival statistics were calculated for those patients with completely resected tumors of various sizes (</span><a class="ref showTableEvent" data-dcnode-id="4087" data-id="tbl4" href="#tbl4"><span data-dcnode-id="4088" instrument_node="">Table 4</span></a><span data-dcnode-id="4086" instrument_node="">) (</span><a class="tab-link" data-dcnode-id="4084" data-tab="pane-pcw-references" href="#r5" id="r5R"><span data-dcnode-id="4085" instrument_node="">5</span></a><span data-dcnode-id="4083" instrument_node="">). </span></p><div class="teachingPoint" data-dcnode-id="4079"><img data-dcnode-id="4081" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//pubs.rsna.org/templates/jsp/_style2/_rsna/images/teaching_point.gif&amp;raw"><span data-dcnode-id="4080" instrument_node=""> The analysis demonstrated significant separation of T1 lesions from T2 lesions on the basis of a size threshold of 3 cm, as well as a progressive reduction in patient survival for each 1-cm cut point (≤1 cm; &gt;1 cm to 2 cm; &gt;2 cm to 3 cm; &gt;3 cm to 4 cm; &gt;4 cm to 5 cm; &gt;5 cm to 6 cm; &gt;6 cm to 7 cm; and &gt;7 cm). Statistical analyses evaluating the significance of pathologic tumor size controlled for age, gender, cell type, and geographic region demonstrated that the difference in survival was significant for all tumor size cut points.</span></div><span data-dcnode-id="4078" instrument_node=""> Therefore, T1 tumors are subdivided into three groups at 1-cm thresholds: T1a nodules measuring 1 cm or less, T1b tumors measuring more than 1 cm and less than or equal to 2 cm, and T1c lesions measuring more than 2 cm and less than or equal to 3 cm (</span><a class="" data-dcnode-id="4076" data-tab="pane-pcw-Figures" href="#fig1a" id="fig1aR"><span data-dcnode-id="4077" instrument_node="">Fig 1</span></a><span data-dcnode-id="4075" instrument_node="">). Similarly, T2 tumors have been subdivided into two groups: T2a tumors measuring more than 3 cm and less than or equal to 4 cm, and T2b lesions measuring more than 4 cm and less than or equal to 5 cm (</span><a class="" data-dcnode-id="4073" data-tab="pane-pcw-Figures" href="#fig2a" id="fig2aR"><span data-dcnode-id="4074" instrument_node="">Fig 2</span></a><span data-dcnode-id="4072" instrument_node="">). In TNM-8, tumors measuring more than 5 cm and less than or equal to 7 cm have been reclassified as T3 lesions (</span><a class="" data-dcnode-id="4070" data-tab="pane-pcw-Figures" href="#fig3" id="fig3R"><span data-dcnode-id="4071" instrument_node="">Fig 3</span></a><span data-dcnode-id="4069" instrument_node="">), and tumors measuring more than 7 cm have been reclassified as T4 tumors (</span><a class="" data-dcnode-id="4067" data-tab="pane-pcw-Figures" href="#fig4" id="fig4R"><span data-dcnode-id="4068" instrument_node="">Fig 4</span></a><span data-dcnode-id="4066" instrument_node="">). The new size thresholds introduced in TNM-8 can be easily applied in clinical practice and maintain compatibility with the size descriptors established in TNM-7.</span><p data-dcnode-id="4065"></p><div class="anchor-spacer" data-dcnode-id="4064" id="tbl4"></div><div class="tableToggle" data-dcnode-id="4041"><div class="article-table-content" data-dcnode-id="4042" id="tbl4"><div class="tableToggle__table" data-dcnode-id="4044"><table class="table article-section__table" data-dcnode-id="4052"><caption data-dcnode-id="4058"><strong data-dcnode-id="4059"><p data-dcnode-id="4060"><span class="captionLabel" data-dcnode-id="4062"><span data-dcnode-id="4063" instrument_node="">Table 4:</span></span><span data-dcnode-id="4061" instrument_node=""> Five-year Survival of Patients according to the T Classification for Pathologically and Clinically Staged Tumors in TNM-8</span></p></strong></caption><tbody data-dcnode-id="4053"><tr data-dcnode-id="4054"><td data-dcnode-id="4055"><div class="imageTable figure" data-dcnode-id="4056"><img alt="Table 4:" class="figure__image" data-dcnode-id="4057" data-lg-src="/cms/10.1148/rg.2018170081/asset/images/large/rg.2018170081.tbl4.jpeg" loading="lazy" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//pubs.rsna.org/cms/10.1148/rg.2018170081/asset/images/medium/rg.2018170081.tbl4.gif&amp;raw" title=""></div></td></tr></tbody></table><div class="tableFooter" data-dcnode-id="4045"><div class="footnote" data-dcnode-id="4046"><p data-dcnode-id="4047"><span data-dcnode-id="4051" instrument_node="">Source.—Reference </span><a class="tab-link" data-dcnode-id="4049" data-tab="pane-pcw-references" href="#r5" id="r5R"><span data-dcnode-id="4050" instrument_node="">5</span></a><span data-dcnode-id="4048" instrument_node="">.</span></p></div></div></div><div class="tableToggle__image imageTable" data-dcnode-id="4043"></div></div></div><figure class="article__inlineFigure figure" data-dcnode-id="4013" id="fig1a"><img alt="Figure 1a." class="figure__image" data-dcnode-id="4040" data-lg-src="/cms/10.1148/rg.2018170081/asset/images/large/rg.2018170081.fig1a.jpeg" loading="lazy" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//pubs.rsna.org/cms/10.1148/rg.2018170081/asset/images/medium/rg.2018170081.fig1a.gif&amp;raw" title=""><figcaption data-dcnode-id="4021"><strong data-dcnode-id="4039"></strong><span class="figure__caption hlFld-FigureCaption" data-dcnode-id="4022"><p data-dcnode-id="4023"><span class="captionLabel" data-dcnode-id="4037"><span data-dcnode-id="4038" instrument_node="">Figure 1a.</span></span><span data-dcnode-id="4036" instrument_node=""> T1 tumor size. Axial contrast material–enhanced multidetector CT images of three different patients with NSCLC show the subdivisions of T1 lung cancers on the basis of 1-cm thresholds. </span><b data-dcnode-id="4034"><span data-dcnode-id="4035" instrument_node="">(a)</span></b><span data-dcnode-id="4033" instrument_node="">  Image of a 69-year-old woman shows a T1a lesion (arrow); T1a lesions measure 1 cm or less. </span><b data-dcnode-id="4031"><span data-dcnode-id="4032" instrument_node="">(b)</span></b><span data-dcnode-id="4030" instrument_node="">  Image of a 78-year-old man shows a T1b nodule (arrow); T1b nodules measure more than 1 cm and less than or equal to 2 cm. </span><b data-dcnode-id="4028"><span data-dcnode-id="4029" instrument_node="">(c)</span></b><span data-dcnode-id="4027" instrument_node="">  Image of a 54-year-old woman shows a T1c tumor (arrow); T1c tumors measure more than 2 cm                 </span></a></div></figure><figure class="article__inlineFigure figure" data-dcnode-id="3907" id="fig2b"><img alt="Figure 2b." class="figure__image" data-dcnode-id="3931" data-lg-src="/cms/10.1148/rg.2018170081/asset/images/large/rg.2018170081.fig2b.jpeg" loading="lazy" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//pubs.rsna.org/cms/10.1148/rg.2018170081/asset/images/medium/rg.2018170081.fig2b.gif&amp;raw" title=""><figcaption data-dcnode-id="3915"><strong data-dcnode-id="3930"></strong><span class="figure__caption hlFld-FigureCaption" data-dcnode-id="3916"><p data-dcnode-id="3917"><span class="captionLabel" data-dcnode-id="3928"><span data-dcnode-id="3929" instrument_node="">Figure 2b.</span></span><span data-dcnode-id="3927" instrument_node=""> T2 tumor size. Axial contrast-enhanced multidetector CT images of two different patients with NSCLC show the subdivisions of T2 tumors on the basis of 1-cm cut points. </span><b data-dcnode-id="3925"><span data-dcnode-id="3926" instrument_node="">(a)</span></b><span data-dcnode-id="3924" instrument_node="">  Image of a 70-year-old man shows a T2a tumor (arrow); T2a tumors measure more than 3 cm and less than or equal to 4 cm. </span><b data-dcnode-id="3922"><span data-dcnode-id="3923" instrument_node="">(b)</span></b><span data-dcnode-id="3921" instrument_node="">  Image of a 68-year-old woman shows a T2b mass </span><i data-dcnode-id="3919"><span data-dcnode-id="3920" instrument_node="">(M)</span></i><span data-dcnode-id="3918" instrument_node="">; T2b lesions measure more than 4 cm and less than or equal to 5 cm.</span></p></span></figcaption><strong class="hidden-lg hidden-md hidden-sm visible-xs" data-dcnode-id="3913"><span data-dcnode-id="3914" instrument_node="">Figure 2b.</span></strong><div class="figure-extra" data-dcnode-id="3908"><a class="ppt-figure-link" data-dcnode-id="3911" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//pubs.rsna.org/action/downloadFigures%3Fid%3Dfig2b%26doi%3D10.1148%252Frg.2018170081"><span data-dcnode-id="3912" instrument_node="">Download as PowerPoint</span></a><a data-dcnode-id="3909" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//images.rsna.org/index.html%3Fdoi%3D10.1148/rg.2018170081%26fig%3Dfig2b" target="_blank"><span data-dcnode-id="3910" instrument_node="">Open in Image

                </span></a></div></figure><figure class="article__inlineFigure figure" data-dcnode-id="3888" id="fig3"><img alt="Figure 3." class="figure__image" data-dcnode-id="3906" data-lg-src="/cms/10.1148/rg.2018170081/asset/images/large/rg.2018170081.fig3.jpeg" loading="lazy" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//pubs.rsna.org/cms/10.1148/rg.2018170081/asset/images/medium/rg.2018170081.fig3.gif&amp;raw" title=""><figcaption data-dcnode-id="3896"><strong data-dcnode-id="3905"></strong><span class="figure__caption hlFld-FigureCaption" data-dcnode-id="3897"><p data-dcnode-id="3898"><span class="captionLabel" data-dcnode-id="3903"><span data-dcnode-id="3904" instrument_node="">Figure 3.</span></span><span data-dcnode-id="3902" instrument_node=""> T3 tumor size. Axial contrast-enhanced multidetector CT image of a 68-year-old woman with NSCLC at the level of the ventricles shows a 6.6-cm mass </span><i data-dcnode-id="3900"><span data-dcnode-id="3901" instrument_node="">(M)</span></i><span data-dcnode-id="3899" instrument_node=""> in the left lower lobe, a finding compatible with a T3 lesion in TNM-8. Analysis of the new database demonstrated that tumors measuring more than 5 cm and less than or equal to 7 cm are well aligned with other T3 descriptors in TNM-8.</span></p></span></figcaption><strong class="hidden-lg hidden-md hidden-sm visible-xs" data-dcnode-id="3894"><span data-dcnode-id="3895" instrument_node="">Figure 3.</span></strong><div class="figure-extra" data-dcnode-id="3889"><a class="ppt-figure-link" data-dcnode-id="3892" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//pubs.rsna.org/action/downloadFigures%3Fid%3Dfig3%26doi%3D10.1148%252Frg.2018170081"><span data-dcnode-id="3893" instrument_node="">Download as PowerPoint</span></a><a data-dcnode-id="3890" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//images.rsna.org/index.html%3Fdoi%3D10.1148/rg.2018170081%26fig%3Dfig3" target="_blank"><span data-dcnode-id="3891" instrument_node="">Open in Image
                    Viewer
                </span></a></div></figure><figure class="article__inlineFigure figure" data-dcnode-id="3866" id="fig4"><img alt="Figure 4." class="figure__image" data-dcnode-id="3887" data-lg-src="/cms/10.1148/rg.2018170081/asset/images/large/rg.2018170081.fig4.jpeg" loading="lazy" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//pubs.rsna.org/cms/10.1148/rg.2018170081/asset/images/medium/rg.2018170081.fig4.gif&amp;raw" title=""><figcaption data-dcnode-id="3874"><strong data-dcnode-id="3886"></strong><span class="figure__caption hlFld-FigureCaption" data-dcnode-id="3875"><p data-dcnode-id="3876"><span class="captionLabel" data-dcnode-id="3884"><span data-dcnode-id="3885" instrument_node="">Figure 4.</span></span><span data-dcnode-id="3883" instrument_node=""> T4 tumor size. Axial contrast-enhanced multidetector CT image of a 71-year-old woman with NSCLC at the level of the aortic arch </span><i data-dcnode-id="3881"><span data-dcnode-id="3882" instrument_node="">(AoA)</span></i><span data-dcnode-id="3880" instrument_node=""> shows a large mass </span><i data-dcnode-id="3878"><span data-dcnode-id="3879" instrument_node="">(M)</span></i><span data-dcnode-id="3877" instrument_node=""> in the left upper lobe, a finding compatible with a T4 lesion in TNM-8. Analysis of the new database demonstrated that tumors measuring more than 7 cm are well aligned with other T4 descriptors in TNM-8.</span></p></span></figcaption><strong class="hidden-lg hidden-md hidden-sm visible-xs" data-dcnode-id="3872"><span data-dcnode-id="3873" instrument_node="">Figure 4.</span></strong><div class="figure-extra" data-dcnode-id="3867"><a class="ppt-figure-link" data-dcnode-id="3870" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//pubs.rsna.org/action/downloadFigures%3Fid%3Dfig4%26doi%3D10.1148%252Frg.2018170081"><span data-dcnode-id="3871" instrument_node="">Download as PowerPoint</span></a><a data-dcnode-id="3868" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//images.rsna.org/index.html%3Fdoi%3D10.1148/rg.2018170081%26fig%3Dfig4" target="_blank"><span data-dcnode-id="3869" instrument_node="">Open in Image
                    Viewer
                </span></a></div></figure><p data-dcnode-id="3858"><b data-dcnode-id="3863"><i data-dcnode-id="3864"><span data-dcnode-id="3865" instrument_node="">Involvement of Main Bronchi.—</span></i></b><span data-dcnode-id="3862" instrument_node="">In TNM-7, involvement by lung cancer of a main bronchus 2 cm or more from the carina was classified as T2 disease, and more proximal involvement was classified as T3 disease. Analysis of the new database demonstrated that involvement of a main bronchus 2 cm or more from the carina is appropriate as a T2 descriptor in that the survival of patients with this feature is similar to that of patients with other T2 descriptors. However, involvement of a main bronchus less than 2 cm from the carina, but without direct invasion of the carina, is associated with better survival than that for patients with other T3 descriptors and therefore should be downstaged to T2. Multivariate analysis revealed that involvement of a main bronchus, regardless of the distance from the carina, does not increase risk after adjusting for tumor size. Therefore, lesions involving a main bronchus, regardless of the distance from the carina, have been grouped together as T2 lesions (</span><a class="" data-dcnode-id="3860" data-tab="pane-pcw-Figures" href="#fig5" id="fig5R"><span data-dcnode-id="3861" instrument_node="">Fig 5</span></a><span data-dcnode-id="3859" instrument_node="">).</span></p><figure class="article__inlineFigure figure" data-dcnode-id="3839" id="fig5"><img alt="Figure 5." class="figure__image" data-dcnode-id="3857" data-lg-src="/cms/10.1148/rg.2018170081/asset/images/large/rg.2018170081.fig5.jpeg" data-src="/cms/10.1148/rg.2018170081/asset/images/medium/rg.2018170081.fig5.gif" loading="lazy" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//pubs.rsna.org/cms/10.1148/rg.2018170081/asset/images/medium/rg.2018170081.fig5.gif&amp;raw" title=""><figcaption data-dcnode-id="3847"><strong data-dcnode-id="3856"></strong><span class="figure__caption hlFld-FigureCaption" data-dcnode-id="3848"><p data-dcnode-id="3849"><span class="captionLabel" data-dcnode-id="3854"><span data-dcnode-id="3855" instrument_node="">Figure 5.</span></span><span data-dcnode-id="3853" instrument_node=""> Tumor involvement of main bronchi. Axial contrast-enhanced multidetector CT image of a 73-year-old man with NSCLC at the level of the right main bronchus shows a right upper lobe mass </span><i data-dcnode-id="3851"><span data-dcnode-id="3852" instrument_node="">(M)</span></i><span data-dcnode-id="3850" instrument_node=""> invading the proximal right main bronchus (arrow). Analysis of the database revealed that involvement of a main bronchus, regardless of the distance from the carina, does not increase risk after adjusting for tumor size, and these lesions are grouped together as a T2 descriptor in TNM-8. It is important to note that in this case, the size of the primary tumor would upstage the T classification to T4.</span></p></span></figcaption><strong class="hidden-lg hidden-md hidden-sm visible-xs" data-dcnode-id="3845"><span data-dcnode-id="3846" instrument_node="">Figure 5.</span></strong><div class="figure-extra" data-dcnode-id="3840"><a class="ppt-figure-link" data-dcnode-id="3843" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//pubs.rsna.org/action/downloadFigures%3Fid%3Dfig5%26doi%3D10.1148%252Frg.2018170081"><span data-dcnode-id="3844" instrument_node="">Download as PowerPoint</span></a><a data-dcnode-id="3841" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//images.rsna.org/index.html%3Fdoi%3D10.1148/rg.2018170081%26fig%3Dfig5" target="_blank"><span data-dcnode-id="3842" instrument_node="">Open in Image
                    Viewer
                </span></a></div></figure><p data-dcnode-id="3834"><b data-dcnode-id="3836"><i data-dcnode-id="3837"><span data-dcnode-id="3838" instrument_node="">Atelectasis or Pneumonitis of the Lung.—</span></i></b><span data-dcnode-id="3835" instrument_node="">In TNM-7, partial atelectasis or pneumonitis (of a lung lobe) was classified as T2 disease, and atelectasis or pneumonitis of an entire lung was classified as T3 disease. </span></p><div class="teachingPoint" data-dcnode-id="3831"><img data-dcnode-id="3833" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//pubs.rsna.org/templates/jsp/_style2/_rsna/images/teaching_point.gif&amp;raw"><span data-dcnode-id="3832" instrument_node=""> Analysis of the new database demonstrated that partial atelectasis or pneumonitis aligns with other T2 descriptors in terms of 5-year survival; however, patients with complete atelectasis or pneumonitis demonstrated better survival than those with other T3 descriptors. Therefore, in TNM-8, partial and complete forms of lung atelectasis and pneumonitis are grouped together as T2 lesions</span></div><span data-dcnode-id="3830" instrument_node=""> (</span><a class="" data-dcnode-id="3828" data-tab="pane-pcw-Figures" href="#fig6a" id="fig6aR"><span data-dcnode-id="3829" instrument_node="">Fig 6</span></a><span data-dcnode-id="3827" instrument_node="">).</span><p data-dcnode-id="3826"></p><figure class="article__inlineFigure figure" data-dcnode-id="3792" id="fig6a"><img alt="Figure 6a." class="figure__image" data-dcnode-id="3825" data-lg-src="/cms/10.1148/rg.2018170081/asset/images/large/rg.2018170081.fig6a.jpeg" data-src="/cms/10.1148/rg.2018170081/asset/images/medium/rg.2018170081.fig6a.gif" loading="lazy" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//pubs.rsna.org/cms/10.1148/rg.2018170081/asset/images/medium/rg.2018170081.fig6a.gif&amp;raw" title=""><figcaption data-dcnode-id="3800"><strong data-dcnode-id="3824"></strong><span class="figure__caption hlFld-FigureCaption" data-dcnode-id="3801"><p data-dcnode-id="3802"><span class="captionLabel" data-dcnode-id="3822"><span data-dcnode-id="3823" instrument_node="">Figure 6a.</span></span><span data-dcnode-id="3821" instrument_node=""> Atelectasis or pneumonitis in two different patients. </span><b data-dcnode-id="3819"><span data-dcnode-id="3820" instrument_node="">(a)</span></b><span data-dcnode-id="3818" instrument_node=""> Axial contrast-enhanced multidetector CT image of a 59-year-old woman with NSCLC below the level of the carina shows a right perihilar obstructing mass </span><i data-dcnode-id="3816"><span data-dcnode-id="3817" instrument_node="">(M)</span></i><span data-dcnode-id="3815" instrument_node=""> extending into the proximal right main bronchus (arrow), resulting in atelectasis </span><i data-dcnode-id="3813"><span data-dcnode-id="3814" instrument_node="">(A)</span></i><span data-dcnode-id="3812" instrument_node=""> of the right upper lobe. </span><b data-dcnode-id="3810"><span data-dcnode-id="3811" instrument_node="">(b)</span></b><span data-dcnode-id="3809" instrument_node=""> Axial contrast-enhanced multidetector CT image of a 42-year-old man with NSCLC at the level of the left pulmonary artery shows a mass (arrow) obstructing the left main bronchus and resulting in complete atelectasis </span><i data-dcnode-id="3807"><span data-dcnode-id="3808" instrument_node="">(A)</span></i><span data-dcnode-id="3806" instrument_node=""> of the left lung. A left pleural effusion </span><i data-dcnode-id="3804"><span data-dcnode-id="3805" instrument_node="">(Pl)</span></i><span data-dcnode-id="3803" instrument_node=""> is also depicted. Analysis of the new database demonstrated better survival of patients with complete atelectasis or pneumonitis than those with other T3 descriptors; and in TNM-8, partial and complete lung atelectasis or pneumonitis are grouped together as a T2 descriptor.</span></p></span></figcaption><strong class="hidden-lg hidden-md hidden-sm visible-xs" data-dcnode-id="3798"><span data-dcnode-id="3799" instrument_node="">Figure 6a.</span></strong><div class="figure-extra" data-dcnode-id="3793"><a class="ppt-figure-link" data-dcnode-id="3796" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//pubs.rsna.org/action/downloadFigures%3Fid%3Dfig6a%26doi%3D10.1148%252Frg.2018170081"><span data-dcnode-id="3797" instrument_node="">Download as PowerPoint</span></a><a data-dcnode-id="3794" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//images.rsna.org/index.html%3Fdoi%3D10.1148/rg.2018170081%26fig%3Dfig6a" target="_blank"><span data-dcnode-id="3795" instrument_node="">Open in Image
                    Viewer
                </span></a></div></figure><figure class="article__inlineFigure figure" data-dcnode-id="3758" id="fig6b"><img alt="Figure 6b." class="figure__image" data-dcnode-id="3791" data-lg-src="/cms/10.1148/rg.2018170081/asset/images/large/rg.2018170081.fig6b.jpeg" data-src="/cms/10.1148/rg.2018170081/asset/images/medium/rg.2018170081.fig6b.gif" loading="lazy" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//pubs.rsna.org/cms/10.1148/rg.2018170081/asset/images/medium/rg.2018170081.fig6b.gif&amp;raw" title=""><figcaption data-dcnode-id="3766"><strong data-dcnode-id="3790"></strong><span class="figure__caption hlFld-FigureCaption" data-dcnode-id="3767"><p data-dcnode-id="3768"><span class="captionLabel" data-dcnode-id="3788"><span data-dcnode-id="3789" instrument_node="">Figure 6b.</span></span><span data-dcnode-id="3787" instrument_node=""> Atelectasis or pneumonitis in two different patients. </span><b data-dcnode-id="3785"><span data-dcnode-id="3786" instrument_node="">(a)</span></b><span data-dcnode-id="3784" instrument_node=""> Axial contrast-enhanced multidetector CT image of a 59-year-old woman with NSCLC below the level of the carina shows a right perihilar obstructing mass </span><i data-dcnode-id="3782"><span data-dcnode-id="3783" instrument_node="">(M)</span></i><span data-dcnode-id="3781" instrument_node=""> extending into the proximal right main bronchus (arrow), resulting in atelectasis </span><i data-dcnode-id="3779"><span data-dcnode-id="3780" instrument_node="">(A)</span></i><span data-dcnode-id="3778" instrument_node=""> of the right upper lobe. </span><b data-dcnode-id="3776"><span data-dcnode-id="3777" instrument_node="">(b)</span></b><span data-dcnode-id="3775" instrument_node=""> Axial contrast-enhanced multidetector CT image of a 42-year-old man with NSCLC at the level of the left pulmonary artery shows a mass (arrow) obstructing the left main bronchus and resulting in complete atelectasis </span><i data-dcnode-id="3773"><span data-dcnode-id="3774" instrument_node="">(A)</span></i><span data-dcnode-id="3772" instrument_node=""> of the left lung. A left pleural effusion </span><i data-dcnode-id="3770"><span data-dcnode-id="3771" instrument_node="">(Pl)</span></i><span data-dcnode-id="3769" instrument_node=""> is also depicted. Analysis of the new database demonstrated better survival of patients with complete atelectasis or pneumonitis than those with other T3 descriptors; and in TNM-8, partial and complete lung atelectasis or pneumonitis are grouped together as a T2 descriptor.</span></p></span></figcaption><strong class="hidden-lg hidden-md hidden-sm visible-xs" data-dcnode-id="3764"><span data-dcnode-id="3765" instrument_node="">Figure 6b.</span></strong><div class="figure-extra" data-dcnode-id="3759"><a class="ppt-figure-link" data-dcnode-id="3762" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//pubs.rsna.org/action/downloadFigures%3Fid%3Dfig6b%26doi%3D10.1148%252Frg.2018170081"><span data-dcnode-id="3763" instrument_node="">Download as PowerPoint</span></a><a data-dcnode-id="3760" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//images.rsna.org/index.html%3Fdoi%3D10.1148/rg.2018170081%26fig%3Dfig6b" target="_blank"><span data-dcnode-id="3761" instrument_node="">Open in Image
                    Viewer
                </span></a></div></figure><p data-dcnode-id="3750"><b data-dcnode-id="3755"><i data-dcnode-id="3756"><span data-dcnode-id="3757" instrument_node="">Diaphragmatic Invasion.—</span></i></b><span data-dcnode-id="3754" instrument_node="">In TNM-7, invasion of the diaphragm by lung cancer was classified as T3 disease. Analysis of the new database demonstrated worse 5-year survival of patients with this feature than that of patients with other T3 tumors but similar to the 5-year survival of patients with T4 lesions. Therefore, diaphragmatic invasion is reclassified as T4 disease in TNM-8 (</span><a class="" data-dcnode-id="3752" data-tab="pane-pcw-Figures" href="#fig7a" id="fig7aR"><span data-dcnode-id="3753" instrument_node="">Fig 7</span></a><span data-dcnode-id="3751" instrument_node="">).</span></p><figure class="article__inlineFigure figure" data-dcnode-id="3722" id="fig7a"><img alt="Figure 7a." class="figure__image" data-dcnode-id="3749" data-lg-src="/cms/10.1148/rg.2018170081/asset/images/large/rg.2018170081.fig7a.jpeg" data-src="/cms/10.1148/rg.2018170081/asset/images/medium/rg.2018170081.fig7a.gif" loading="lazy" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//pubs.rsna.org/cms/10.1148/rg.2018170081/asset/images/medium/rg.2018170081.fig7a.gif&amp;raw" title=""><figcaption data-dcnode-id="3730"><strong data-dcnode-id="3748"></strong><span class="figure__caption hlFld-FigureCaption" data-dcnode-id="3731"><p data-dcnode-id="3732"><span class="captionLabel" data-dcnode-id="3746"><span data-dcnode-id="3747" instrument_node="">Figure 7a.</span></span><span data-dcnode-id="3745" instrument_node=""> Diaphragmatic invasion. Axial contrast-enhanced multidetector CT images (</span><b data-dcnode-id="3743"><span data-dcnode-id="3744" instrument_node="">a</span></b><span data-dcnode-id="3742" instrument_node="">, lung window; </span><b data-dcnode-id="3740"><span data-dcnode-id="3741" instrument_node="">b</span></b><span data-dcnode-id="3739" instrument_node="">, soft-tissue window) of a 67-year-old man with NSCLC show a mass (white arrow) in the right lower lobe invading the right hemidiaphragm (black arrow on </span><b data-dcnode-id="3737"><span data-dcnode-id="3738" instrument_node="">b</span></b><span data-dcnode-id="3736" instrument_node="">). A separate pulmonary lesion (</span><b data-dcnode-id="3734"><span data-dcnode-id="3735" instrument_node="">*</span></b><span data-dcnode-id="3733" instrument_node="">) is depicted more cephalad in the right lung. Analysis of the new database demonstrated that the 5-year survival of patients with diaphragmatic invasion was worse than that of patients with other T3 lesions defined by other descriptors but was similar to that of patients with T4 tumors. Therefore, diaphragmatic invasion has been reclassified as T4 disease in TNM-8.</span></p></span></figcaption><strong class="hidden-lg hidden-md hidden-sm visible-xs" data-dcnode-id="3728"><span data-dcnode-id="3729" instrument_node="">Figure 7a.</span></strong><div class="figure-extra" data-dcnode-id="3723"><a class="ppt-figure-link" data-dcnode-id="3726" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//pubs.rsna.org/action/downloadFigures%3Fid%3Dfig7a%26doi%3D10.1148%252Frg.2018170081"><span data-dcnode-id="3727" instrument_node="">Download as PowerPoint</span></a><a data-dcnode-id="3724" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//images.rsna.org/index.html%3Fdoi%3D10.1148/rg.2018170081%26fig%3Dfig7a" target="_blank"><span data-dcnode-id="3725" instrument_node="">Open in Image
                    Viewer
                </span></a></div></figure><figure class="article__inlineFigure figure" data-dcnode-id="3694" id="fig7b"><img alt="Figure 7b." class="figure__image" data-dcnode-id="3721" data-lg-src="/cms/10.1148/rg.2018170081/asset/images/large/rg.2018170081.fig7b.jpeg" data-src="/cms/10.1148/rg.2018170081/asset/images/medium/rg.2018170081.fig7b.gif" loading="lazy" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//pubs.rsna.org/cms/10.1148/rg.2018170081/asset/images/medium/rg.2018170081.fig7b.gif&amp;raw" title=""><figcaption data-dcnode-id="3702"><strong data-dcnode-id="3720"></strong><span class="figure__caption hlFld-FigureCaption" data-dcnode-id="3703"><p data-dcnode-id="3704"><span class="captionLabel" data-dcnode-id="3718"><span data-dcnode-id="3719" instrument_node="">Figure 7b.</span></span><span data-dcnode-id="3717" instrument_node=""> Diaphragmatic invasion. Axial contrast-enhanced multidetector CT images (</span><b data-dcnode-id="3715"><span data-dcnode-id="3716" instrument_node="">a</span></b><span data-dcnode-id="3714" instrument_node="">, lung window; </span><b data-dcnode-id="3712"><span data-dcnode-id="3713" instrument_node="">b</span></b><span data-dcnode-id="3711" instrument_node="">, soft-tissue window) of a 67-year-old man with NSCLC show a mass (white arrow) in the right lower lobe invading the right hemidiaphragm (black arrow on </span><b data-dcnode-id="3709"><span data-dcnode-id="3710" instrument_node="">b</span></b><span data-dcnode-id="3708" instrument_node="">). A separate pulmonary lesion (</span><b data-dcnode-id="3706"><span data-dcnode-id="3707" instrument_node="">*</span></b><span data-dcnode-id="3705" instrument_node="">) is depicted more cephalad in the right lung. Analysis of the new database demonstrated that the 5-year survival of patients with diaphragmatic invasion was worse than that of patients with other T3 lesions defined by other descriptors but was similar to that of patients with T4 tumors. Therefore, diaphragmatic invasion has been reclassified as T4 disease in TNM-8.</span></p></span></figcaption><strong class="hidden-lg hidden-md hidden-sm visible-xs" data-dcnode-id="3700"><span data-dcnode-id="3701" instrument_node="">Figure 7b.</span></strong><div class="figure-extra" data-dcnode-id="3695"><a class="ppt-figure-link" data-dcnode-id="3698" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//pubs.rsna.org/action/downloadFigures%3Fid%3Dfig7b%26doi%3D10.1148%252Frg.2018170081"><span data-dcnode-id="3699" instrument_node="">Download as PowerPoint</span></a><a data-dcnode-id="3696" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//images.rsna.org/index.html%3Fdoi%3D10.1148/rg.2018170081%26fig%3Dfig7b" target="_blank"><span data-dcnode-id="3697" instrument_node="">Open in Image
                    Viewer
                </span></a></div></figure><p data-dcnode-id="3689"><b data-dcnode-id="3691"><i data-dcnode-id="3692"><span data-dcnode-id="3693" instrument_node="">Involvement of the Mediastinal Pleura.—</span></i></b><span data-dcnode-id="3690" instrument_node="">In TNM-7, involvement of the mediastinal pleura was classified as T3 disease. Analysis of the new database demonstrated that patients with lung cancers that show this feature have a better prognosis than patients with other T3 lesions, although this characteristic was represented by a relatively small number of cases. The committee also noted that the designation of mediastinal pleura invasion was rarely used as a descriptor in clinical staging, because it can be difficult to determine. In clinical practice, mediastinal pleura invasion can be considered if the lesion directly contacts the mediastinum. However, when other findings suggestive of invasion are present, the tumor has typically already extended beyond the mediastinal pleura and invaded the mediastinum, a finding that remains classified as T4 disease. At pathologic staging, the discovery of isolated mediastinal pleura invasion in the absence of invasion of additional mediastinal structures is rare. Therefore, mediastinal pleural invasion has been eliminated from the T classification in TNM-8.</span></p><div class="anchor-spacer" data-dcnode-id="3688" id="ac_i25"></div><h3 class="article-section__title" data-dcnode-id="3686" id="_i25"><span data-dcnode-id="3687" instrument_node="">N Classification</span></h3><p data-dcnode-id="3681"><span data-dcnode-id="3685" instrument_node="">The lymph node (N) classification is determined by the presence or absence of intrathoracic lymph node involvement. In contrast to primary lung cancer, the short-axis diameter is typically used for lymph node measurement. Several lymph node maps have been developed and used by health care providers for staging lung cancer, including the Naruke lymph node map, the Mountain-Dressler modification of the American Thoracic Society lymph node map, and, more recently, the IASLC lymph node map. The IASLC map assigns lymph nodes to seven specific zones: supraclavicular, upper, aorticopulmonary, subcarinal, lower, hilar/interlobar, and peripheral zones (</span><a class="tab-link" data-dcnode-id="3683" data-tab="pane-pcw-references" href="#r13" id="r13R"><span data-dcnode-id="3684" instrument_node="">13</span></a><span data-dcnode-id="3682" instrument_node="">). However, a detailed description of the IASLC lymph node map is beyond the scope of this article.</span></p><p data-dcnode-id="3680"></p><div class="teachingPoint" data-dcnode-id="3674"><img data-dcnode-id="3679" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//pubs.rsna.org/templates/jsp/_style2/_rsna/images/teaching_point.gif&amp;raw"><span data-dcnode-id="3678" instrument_node=""> Analysis of the new database demonstrated that the current nomenclature for the N classification results in consistent separation of prognostically distinct groups, and no changes were made to this category (</span><a class="tab-link" data-dcnode-id="3676" data-tab="pane-pcw-references" href="#r14" id="r14R"><span data-dcnode-id="3677" instrument_node="">14</span></a><span data-dcnode-id="3675" instrument_node="">). Thus, N0 is defined as the absence of regional lymph node involvement; N1 includes metastasis in ipsilateral peribronchial and/or ipsilateral hilar lymph nodes and intrapulmonary lymph nodes, including involvement by direct extension; N2 includes metastasis in ipsilateral mediastinal and/or subcarinal lymph nodes; and N3 includes metastasis in contralateral mediastinal, contralateral hilar, ipsilateral or contralateral scalene, or supraclavicular lymph nodes</span></div><span data-dcnode-id="3673" instrument_node=""> (</span><a class="ref showTableEvent" data-dcnode-id="3671" data-id="tbl2" href="#tbl2"><span data-dcnode-id="3672" instrument_node="">Table 2</span></a><span data-dcnode-id="3670" instrument_node="">).</span><p data-dcnode-id="3669"></p><p data-dcnode-id="3661"><span data-dcnode-id="3668" instrument_node="">The prognostic effect of the number of lymph node stations involved and the potential effect of skip metastases were also investigated. To evaluate the effect of lymph node stations, pN staging was subdivided into several groups, where the letter </span><i data-dcnode-id="3666"><span data-dcnode-id="3667" instrument_node="">a</span></i><span data-dcnode-id="3665" instrument_node=""> denoted single lymph node station involvement and the letter </span><i data-dcnode-id="3663"><span data-dcnode-id="3664" instrument_node="">b</span></i><span data-dcnode-id="3662" instrument_node=""> denoted multiple lymph node station involvement within an N category: single pN1 station (pN1a) and multiple pN1 stations (pN1b); and single pN2 station (pN2a) and multiple pN2 stations (pN2b). The survival curves of the pN1b and pN2a groups showed overlap and no difference in survival, whereas the survival differences between the pN1a and pN1b groups and between the pN2a and pN2b groups were significant. Nevertheless, this information was derived from pathologic staging only, and validation in the clinical dataset could not be performed.</span></p><p data-dcnode-id="3653"><span data-dcnode-id="3660" instrument_node="">To investigate the potential effect of skip metastases, pN2a was divided into the following components, in which a designation ending in the numeral </span><i data-dcnode-id="3658"><span data-dcnode-id="3659" instrument_node="">1</span></i><span data-dcnode-id="3657" instrument_node=""> indicated the presence of skip metastases and a designation ending in the numeral </span><i data-dcnode-id="3655"><span data-dcnode-id="3656" instrument_node="">2</span></i><span data-dcnode-id="3654" instrument_node=""> indicated the absence of skip metastases (eg, involvement of contiguous lymph node stations): single pN2 with skip (no pN1 involvement, pN2a1); and single pN2 without skip (pN1 and pN2 involvement, pN2a2).</span></p><p data-dcnode-id="3639"><span data-dcnode-id="3652" instrument_node="">Patients with pN2a1 disease showed better survival than those with pN1b disease; however, this difference was not significant. The differences in survival were significant between the pN2a1 and pN2a2 groups (</span><i data-dcnode-id="3650"><span data-dcnode-id="3651" instrument_node="">P</span></i><span data-dcnode-id="3649" instrument_node=""> = .0007 for R0, and </span><i data-dcnode-id="3647"><span data-dcnode-id="3648" instrument_node="">P</span></i><span data-dcnode-id="3646" instrument_node=""> = .0002 for any R) and between the pN2a2 and pN2b groups (</span><i data-dcnode-id="3644"><span data-dcnode-id="3645" instrument_node="">P</span></i><span data-dcnode-id="3643" instrument_node=""> = .0028 for R0, and </span><i data-dcnode-id="3641"><span data-dcnode-id="3642" instrument_node="">P</span></i><span data-dcnode-id="3640" instrument_node=""> = .0117 for any R); however, there was no significant difference between pN1b and pN2a1. Thus, the prognosis for patients with pN2a1 disease without lymph node involvement in the N1 region (skip metastasis) was close to the prognosis for patients with pN1b disease without lymph node involvement in the N2 region.</span></p><p data-dcnode-id="3628"><span data-dcnode-id="3638" instrument_node="">The IASLC recommends that the IASLC lymph node map should be used to describe regional lymph node involvement and that the following information should be recorded: </span><i data-dcnode-id="3636"><span data-dcnode-id="3637" instrument_node="">(a)</span></i><span data-dcnode-id="3635" instrument_node=""> lymph node station and/or location (N1, N2, or N3), </span><i data-dcnode-id="3633"><span data-dcnode-id="3634" instrument_node="">(b)</span></i><span data-dcnode-id="3632" instrument_node=""> the number of lymph node stations involved (pN1a, pN2a, pN1b, or pN2b), and </span><i data-dcnode-id="3630"><span data-dcnode-id="3631" instrument_node="">(c)</span></i><span data-dcnode-id="3629" instrument_node=""> the presence or absence of skip metastasis (pN2a1 or pN2a2).</span></p><div class="anchor-spacer" data-dcnode-id="3627" id="ac_i26"></div><h3 class="article-section__title" data-dcnode-id="3625" id="_i26"><span data-dcnode-id="3626" instrument_node="">M Classification</span></h3><p data-dcnode-id="3623"><span data-dcnode-id="3624" instrument_node="">In TNM-7, the division of metastatic disease into M1a and M1b components for intrathoracic and extrathoracic metastases, respectively, represented one of the most important changes introduced. In the analysis of the new lung cancer database, the survival of patients with a single metastatic lesion in one extrathoracic organ (median survival, 6.3 months) was similar to that of patients with M1a disease (median survival, 11.5 months) but better than the survival of those with multiple metastatic lesions or metastases in multiple extrathoracic organs (median survival, 6.3 months). </span></p><div class="teachingPoint" data-dcnode-id="3617"><img data-dcnode-id="3622" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//pubs.rsna.org/templates/jsp/_style2/_rsna/images/teaching_point.gif&amp;raw"><span data-dcnode-id="3621" instrument_node=""> In TNM-8, intrathoracic metastasis retains the M1a designation (</span><a class="" data-dcnode-id="3619" data-tab="pane-pcw-Figures" href="#fig8a" id="fig8aR"><span data-dcnode-id="3620" instrument_node="">Fig 8</span></a><span data-dcnode-id="3618" instrument_node="">), but the extrathoracic metastasis group has been split into M1b (single extrathoracic metastasis in a single distant organ) and M1c (multiple extrathoracic metastases in one or more distant organs) on the basis of differences in patient survival</span></div><span data-dcnode-id="3616" instrument_node=""> (</span><a class="tab-link" data-dcnode-id="3614" data-tab="pane-pcw-references" href="#r6" id="r6R"><span data-dcnode-id="3615" instrument_node="">6</span></a><span data-dcnode-id="3613" instrument_node="">) (</span><a class="" data-dcnode-id="3611" data-tab="pane-pcw-Figures" href="#fig9a" id="fig9aR"><span data-dcnode-id="3612" instrument_node="">Fig 9</span></a><span data-dcnode-id="3610" instrument_node="">).</span><p data-dcnode-id="3609"></p><figure class="article__inlineFigure figure" data-dcnode-id="3581" id="fig8a"><img alt="Figure 8a." class="figure__image" data-dcnode-id="3608" data-lg-src="/cms/10.1148/rg.2018170081/asset/images/large/rg.2018170081.fig8a.jpeg" data-src="/cms/10.1148/rg.2018170081/asset/images/medium/rg.2018170081.fig8a.gif" loading="lazy" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//pubs.rsna.org/cms/10.1148/rg.2018170081/asset/images/medium/rg.2018170081.fig8a.gif&amp;raw" title=""><figcaption data-dcnode-id="3589"><strong data-dcnode-id="3607"></strong><span class="figure__caption hlFld-FigureCaption" data-dcnode-id="3590"><p data-dcnode-id="3591"><span class="captionLabel" data-dcnode-id="3605"><span data-dcnode-id="3606" instrument_node="">Figure 8a.</span></span><span data-dcnode-id="3604" instrument_node=""> Intrathoracic metastases in two different patients. </span><b data-dcnode-id="3602"><span data-dcnode-id="3603" instrument_node="">(a)</span></b><span data-dcnode-id="3601" instrument_node=""> Axial contrast-enhanced multidetector CT image of the right hemithorax of a 59-year-old woman with NSCLC (NSCLC not shown) shows extensive pleural thickening and numerous pleural masses </span><i data-dcnode-id="3599"><span data-dcnode-id="3600" instrument_node="">(M)</span></i><span data-dcnode-id="3598" instrument_node="">, findings consistent with M1a disease. </span><b data-dcnode-id="3596"><span data-dcnode-id="3597" instrument_node="">(b)</span></b><span data-dcnode-id="3595" instrument_node=""> Axial contrast-enhanced multidetector CT image of the heart of a 62-year-old man with NSCLC (NSCLC not shown) shows a heterogeneous mass </span><i data-dcnode-id="3593"><span data-dcnode-id="3594" instrument_node="">(M)</span></i><span data-dcnode-id="3592" instrument_node=""> that involves the right ventricle and interventricular septum and is compatible with cardiac metastasis.</span></p></span></figcaption><strong class="hidden-lg hidden-md hidden-sm visible-xs" data-dcnode-id="3587"><span data-dcnode-id="3588" instrument_node="">Figure 8a.</span></strong><div class="figure-extra" data-dcnode-id="3582"><a class="ppt-figure-link" data-dcnode-id="3585" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//pubs.rsna.org/action/downloadFigures%3Fid%3Dfig8a%26doi%3D10.1148%252Frg.2018170081"><span data-dcnode-id="3586" instrument_node="">Download as PowerPoint</span></a><a data-dcnode-id="3583" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//images.rsna.org/index.html%3Fdoi%3D10.1148/rg.2018170081%26fig%3Dfig8a" target="_blank"><span data-dcnode-id="3584" instrument_node="">Open in Image
                    Viewer
                </span></a></div></figure><figure class="article__inlineFigure figure" data-dcnode-id="3553" id="fig8b"><img alt="Figure 8b." class="figure__image" data-dcnode-id="3580" data-lg-src="/cms/10.1148/rg.2018170081/asset/images/large/rg.2018170081.fig8b.jpeg" data-src="/cms/10.1148/rg.2018170081/asset/images/medium/rg.2018170081.fig8b.gif" loading="lazy" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//pubs.rsna.org/cms/10.1148/rg.2018170081/asset/images/medium/rg.2018170081.fig8b.gif&amp;raw" title=""><figcaption data-dcnode-id="3561"><strong data-dcnode-id="3579"></strong><span class="figure__caption hlFld-FigureCaption" data-dcnode-id="3562"><p data-dcnode-id="3563"><span class="captionLabel" data-dcnode-id="3577"><span data-dcnode-id="3578" instrument_node="">Figure 8b.</span></span><span data-dcnode-id="3576" instrument_node=""> Intrathoracic metastases in two different patients. </span><b data-dcnode-id="3574"><span data-dcnode-id="3575" instrument_node="">(a)</span></b><span data-dcnode-id="3573" instrument_node=""> Axial contrast-enhanced multidetector CT image of the right hemithorax of a 59-year-old woman with NSCLC (NSCLC not shown) shows extensive pleural thickening and numerous pleural masses </span><i data-dcnode-id="3571"><span data-dcnode-id="3572" instrument_node="">(M)</span></i><span data-dcnode-id="3570" instrument_node="">, findings consistent with M1a disease. </span><b data-dcnode-id="3568"><span data-dcnode-id="3569" instrument_node="">(b)</span></b><span data-dcnode-id="3567" instrument_node=""> Axial contrast-enhanced multidetector CT image of the heart of a 62-year-old man with NSCLC (NSCLC not shown) shows a heterogeneous mass </span><i data-dcnode-id="3565"><span data-dcnode-id="3566" instrument_node="">(M)</span></i><span data-dcnode-id="3564" instrument_node=""> that involves the right ventricle and interventricular septum and is compatible with cardiac metastasis.</span></p></span></figcaption><str
