T image of a 42-year-old woman with NSCLC (NSCLC not shown) shows hepatic (white arrow) and right adrenal (black arrow) metastases. TNM-8 recognizes differences in survival on the basis of both the location and the number of metastases. Therefore, distant metastatic disease (formerly M1b) has been split into M1b (solitary metastasis in a single organ) and M1c (multiple metastases in a single organ or multiple organs).</span></p></span></figcaption><strong class="hidden-lg hidden-md hidden-sm visible-xs" data-dcnode-id="3484"><span data-dcnode-id="3485" instrument_node="">Figure 9c.</span></strong><div class="figure-extra" data-dcnode-id="3479"><a class="ppt-figure-link" data-dcnode-id="3482" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//pubs.rsna.org/action/downloadFigures%3Fid%3Dfig9c%26doi%3D10.1148%252Frg.2018170081"><span data-dcnode-id="3483" instrument_node="">Download as PowerPoint</span></a><a data-dcnode-id="3480" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//images.rsna.org/index.html%3Fdoi%3D10.1148/rg.2018170081%26fig%3Dfig9c" target="_blank"><span data-dcnode-id="3481" instrument_node="">Open in Image
                    Viewer
                </span></a></div></figure><p data-dcnode-id="3461"><span data-dcnode-id="3477" instrument_node="">In the results of prior work, investigators have suggested that there are important prognostic differences between patients with a single metastasis and those with multiple metastases or multiple sites of involvement, such as the brain, adrenal glands, or bone (</span><a class="tab-link" data-dcnode-id="3475" data-tab="pane-pcw-references" href="#r15" id="r15R"><span data-dcnode-id="3476" instrument_node="">15</span></a><span data-dcnode-id="3474" instrument_node="">–</span><a class="tab-link" data-dcnode-id="3472" data-tab="pane-pcw-references" href="#r21" id="r21R"><span data-dcnode-id="3473" instrument_node="">21</span></a><span data-dcnode-id="3471" instrument_node="">). However, a clear consensus on this topic has not been achieved owing to several limitations, including the retrospective nature of much of this work, the differences in the individual definitions of oligometastatic disease, and variations in local treatment plans. The IASLC recommends that radiologists should document the following features at staging examinations: </span><i data-dcnode-id="3469"><span data-dcnode-id="3470" instrument_node="">(a)</span></i><span data-dcnode-id="3468" instrument_node=""> the number of metastatic lesions, </span><i data-dcnode-id="3466"><span data-dcnode-id="3467" instrument_node="">(b)</span></i><span data-dcnode-id="3465" instrument_node=""> the diameter of individual metastatic lesions, and </span><i data-dcnode-id="3463"><span data-dcnode-id="3464" instrument_node="">(c)</span></i><span data-dcnode-id="3462" instrument_node=""> the number of involved organs.</span></p><div class="anchor-spacer" data-dcnode-id="3460" id="ac_i32"></div><h3 class="article-section__title" data-dcnode-id="3458" id="_i32"><span data-dcnode-id="3459" instrument_node="">Revisions to the Stage Classification</span></h3><p data-dcnode-id="3450"><span data-dcnode-id="3457" instrument_node="">Numerous changes to individual T and M descriptors in TNM-8 have resulted in important modifications to the stage classification, including the editing of existing stage groups and the creation of several new stage groups (</span><a class="tab-link" data-dcnode-id="3455" data-tab="pane-pcw-references" href="#r7" id="r7R"><span data-dcnode-id="3456" instrument_node="">7</span></a><span data-dcnode-id="3454" instrument_node="">) (</span><a class="ref showTableEvent" data-dcnode-id="3452" data-id="tbl3" href="#tbl3"><span data-dcnode-id="3453" instrument_node="">Table 3</span></a><span data-dcnode-id="3451" instrument_node="">). For example, the separation of T1 lung cancers into T1a, T1b, and T1c components on the basis of 1-cm and 2-cm thresholds has resulted in the creation of three new stages—IA1, IA2, and IA3, respectively—to describe these tumors in the absence of lymph node involvement and metastatic disease. In addition, a new stage group, stage IIIC, has been created to include locally advanced T3 and T4 lung cancers associated with N3 disease but without metastasis, which reflects their relatively worse prognosis compared with that for stage IIIB. Changes have been made to stage IV on the basis of the location and extent of metastatic disease. For instance, intrathoracic metastatic disease, including contralateral tumor nodules, pleural or pericardial spread, and myocardial or cardiac metastasis, remains classified as stage IVA; however, a single metastasis to a single organ (M1b disease) is now considered stage IVA, and multiple distant metastases in a single organ or multiple organs (M1c disease) are now considered stage IVB.</span></p><p data-dcnode-id="3448"><span data-dcnode-id="3449" instrument_node="">In addition to the creation of new stage groups, further modifications have been made to established stages. These changes are the result of one or more modifications to specific descriptors. For instance, all T1 subdivisions associated with N1 disease have shifted from stage IIA to IIB. Reassignment of diaphragmatic invasion to T4 is associated with various changes. For example, when present with N0 disease, diaphragmatic invasion shifts from stage IIB to IIIA. In some instances, changes to the T and M classifications may affect the stage group assigned to a specific case. For example, the reclassification of tumors measuring more than 5 cm from T2b to T3 means that these lesions are assigned to a higher stage group regardless of the N classification. When present with N0 and N1 disease, such lung cancers shift from stage IIA to IIB and from stage IIB to IIIA, respectively, because of the change in the T classification; when these tumors are associated with N2 or N3 disease, the stage group changes from stage IIIA to IIIB and from stage IIIB to IIIC, respectively.</span></p><div class="anchor-spacer" data-dcnode-id="3447" id="ac_i33"></div><h2 class="article-section__title section__title" data-dcnode-id="3445" id="_i33"><span data-dcnode-id="3446" instrument_node="">Special Considerations</span></h2><div class="anchor-spacer" data-dcnode-id="3444" id="ac_i34"></div><h3 class="article-section__title" data-dcnode-id="3442" id="_i34"><span data-dcnode-id="3443" instrument_node="">Lung Cancer with Multiple Sites of Pulmonary Involvement</span></h3><p data-dcnode-id="3419"><span data-dcnode-id="3441" instrument_node="">The subcommittee of the IASLC Staging and Prognostic Factors Committee identified four distinct patterns of disease in cases of lung cancer characterized by multiple sites of pulmonary involvement: </span><i data-dcnode-id="3439"><span data-dcnode-id="3440" instrument_node="">(a)</span></i><span data-dcnode-id="3438" instrument_node=""> multiple primary lung cancers, </span><i data-dcnode-id="3436"><span data-dcnode-id="3437" instrument_node="">(b) </span></i><span data-dcnode-id="3435" instrument_node="">lung cancers with separate tumor nodules, </span><i data-dcnode-id="3433"><span data-dcnode-id="3434" instrument_node="">(c)</span></i><span data-dcnode-id="3432" instrument_node=""> multiple ground-glass/lepidic lesions, and </span><i data-dcnode-id="3430"><span data-dcnode-id="3431" instrument_node="">(d)</span></i><span data-dcnode-id="3429" instrument_node=""> consolidation (</span><a class="tab-link" data-dcnode-id="3427" data-tab="pane-pcw-references" href="#r8" id="r8R"><span data-dcnode-id="3428" instrument_node="">8</span></a><span data-dcnode-id="3426" instrument_node="">). Discussed herein are the criteria to categorize lung cancer with multiple pulmonary sites of involvement and the application of the staging system to each pattern (</span><a class="ref showTableEvent" data-dcnode-id="3424" data-id="tbl5" href="#tbl5"><span data-dcnode-id="3425" instrument_node="">Table 5</span></a><span data-dcnode-id="3423" instrument_node="">) (</span><a class="tab-link" data-dcnode-id="3421" data-tab="pane-pcw-references" href="#r8" id="r8R"><span data-dcnode-id="3422" instrument_node="">8</span></a><span data-dcnode-id="3420" instrument_node="">).</span></p><div class="anchor-spacer" data-dcnode-id="3418" id="tbl5"></div><div class="tableToggle" data-dcnode-id="3392"><div class="article-table-content" data-dcnode-id="3393" id="tbl5"><div class="tableToggle__table" data-dcnode-id="3395"><table class="table article-section__table" data-dcnode-id="3406"><caption data-dcnode-id="3412"><strong data-dcnode-id="3413"><p data-dcnode-id="3414"><span class="captionLabel" data-dcnode-id="3416"><span data-dcnode-id="3417" instrument_node="">Table 5:</span></span><span data-dcnode-id="3415" instrument_node=""> Lung Cancer with Multiple Pulmonary Sites of Involvement: Patterns of Disease and TNM Classification</span></p></strong></caption><tbody data-dcnode-id="3407"><tr data-dcnode-id="3408"><td data-dcnode-id="3409"><div class="imageTable figure" data-dcnode-id="3410"><img alt="Table 5:" class="figure__image" data-dcnode-id="3411" data-lg-src="/cms/10.1148/rg.2018170081/asset/images/large/rg.2018170081.tbl5.jpeg" data-src="/cms/10.1148/rg.2018170081/asset/images/medium/rg.2018170081.tbl5.gif" loading="lazy" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//pubs.rsna.org/cms/10.1148/rg.2018170081/asset/images/medium/rg.2018170081.tbl5.gif&amp;raw" title=""></div></td></tr></tbody></table><div class="tableFooter" data-dcnode-id="3396"><div class="footnote" data-dcnode-id="3400"><p data-dcnode-id="3401"><span data-dcnode-id="3405" instrument_node="">Source.—Reference </span><a class="tab-link" data-dcnode-id="3403" data-tab="pane-pcw-references" href="#r8" id="r8R"><span data-dcnode-id="3404" instrument_node="">8</span></a><span data-dcnode-id="3402" instrument_node="">.</span></p></div><div class="footnote" data-dcnode-id="3397"><p data-dcnode-id="3398"><span data-dcnode-id="3399" instrument_node="">*Multifocal adenocarcinoma should be classified by the T category of the lesion with the highest-level T descriptor and by the number of lesions (#)—or simply “(m)” for multiple—indicated in parentheses.</span></p></div></div></div><div class="tableToggle__image imageTable" data-dcnode-id="3394"></div></div></div><p data-dcnode-id="3375"><b data-dcnode-id="3389"><i data-dcnode-id="3390"><span data-dcnode-id="3391" instrument_node="">Multiple Primary Lung Cancers.—</span></i></b><span data-dcnode-id="3388" instrument_node="">Investigators have demonstrated that the demographics, clinical outcomes, and recurrence patterns of patients with multiple primary lung cancers are similar to those of patients with single lung cancers when stratified on the basis of histologic subtype and overall clinical stage (</span><a class="tab-link" data-dcnode-id="3386" data-tab="pane-pcw-references" href="#r8" id="r8R"><span data-dcnode-id="3387" instrument_node="">8</span></a><span data-dcnode-id="3385" instrument_node="">). The criteria developed to distinguish separate primary lung cancers from related tumor foci when two lesions are identified include both clinical and pathologic findings. Some cases may be identified on the basis of a few features, whereas others may incorporate several features. Factors for the radiologist to consider include the presence and completeness of prior imaging, current imaging, and histopathologic findings obtained at biopsy or surgical resection. The subcommittee recommends that the decision to classify two (or more) lung lesions as synchronous primary cancers or two foci of a single lung cancer should be based on multidisciplinary opinion that incorporates clinical, imaging, and histopathologic findings (</span><a class="tab-link" data-dcnode-id="3383" data-tab="pane-pcw-references" href="#r8" id="r8R"><span data-dcnode-id="3384" instrument_node="">8</span></a><span data-dcnode-id="3382" instrument_node="">,</span><a class="tab-link" data-dcnode-id="3380" data-tab="pane-pcw-references" href="#r22" id="r22R"><span data-dcnode-id="3381" instrument_node="">22</span></a><span data-dcnode-id="3379" instrument_node="">) (</span><a class="" data-dcnode-id="3377" data-tab="pane-pcw-Figures" href="#fig10" id="fig10R"><span data-dcnode-id="3378" instrument_node="">Fig 10</span></a><span data-dcnode-id="3376" instrument_node="">).</span></p><figure class="article__inlineFigure figure" data-dcnode-id="3359" id="fig10"><img alt="Figure 10." class="figure__image" data-dcnode-id="3374" data-lg-src="/cms/10.1148/rg.2018170081/asset/images/large/rg.2018170081.fig10.jpeg" data-src="/cms/10.1148/rg.2018170081/asset/images/medium/rg.2018170081.fig10.gif" loading="lazy" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//pubs.rsna.org/cms/10.1148/rg.2018170081/asset/images/medium/rg.2018170081.fig10.gif&amp;raw" title=""><figcaption data-dcnode-id="3367"><strong data-dcnode-id="3373"></strong><span class="figure__caption hlFld-FigureCaption" data-dcnode-id="3368"><p data-dcnode-id="3369"><span class="captionLabel" data-dcnode-id="3371"><span data-dcnode-id="3372" instrument_node="">Figure 10.</span></span><span data-dcnode-id="3370" instrument_node=""> Multiple primary lung cancers. Coronal nonenhanced multidetector CT image of a 48-year-old woman with multiple primary lung cancers shows multiple lesions, including a part-solid nodule (white arrow) in the right lower lobe and a solid nodule (black arrow) and a nonsolid nodule (arrowhead) in the left upper lobe, all of which represent primary lung cancers with different histologic subtypes. In many cases, differentiation between different primary lung cancers and lung cancers with metastases can be difficult, and the IASLC recommends that patients with multiple lung lesions should be assessed by a multidisciplinary tumor board.</span></p></span></figcaption><strong class="hidden-lg hidden-md hidden-sm visible-xs" data-dcnode-id="3365"><span data-dcnode-id="3366" instrument_node="">Figure 10.</span></strong><div class="figure-extra" data-dcnode-id="3360"><a class="ppt-figure-link" data-dcnode-id="3363" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//pubs.rsna.org/action/downloadFigures%3Fid%3Dfig10%26doi%3D10.1148%252Frg.2018170081"><span data-dcnode-id="3364" instrument_node="">Download as PowerPoint</span></a><a data-dcnode-id="3361" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//images.rsna.org/index.html%3Fdoi%3D10.1148/rg.2018170081%26fig%3Dfig10" target="_blank"><span data-dcnode-id="3362" instrument_node="">Open in Image
                    Viewer
                </span></a></div></figure><p data-dcnode-id="3357"><span data-dcnode-id="3358" instrument_node="">The IASLC recommends that in the setting of two (or more) separate primary lung cancers, each malignancy should be staged separately within the TNM staging system, each being assigned distinct descriptors and a distinct overall stage group. This recommendation extends to both synchronous and metachronous lung cancers regardless of location, as well as synchronous primary lung cancers that are recognized clinically or those recognized only at histopathologic examination.</span></p><p data-dcnode-id="3346"><b data-dcnode-id="3354"><i data-dcnode-id="3355"><span data-dcnode-id="3356" instrument_node="">Tumor Nodules.—</span></i></b><span data-dcnode-id="3353" instrument_node="">Patients may present with a primary lung cancer and one or more separate tumor nodules, all of which correspond to the same histologic subtype of cancer. These separate nodules tend to behave similarly to solitary lung cancers, although the clinical outcomes are slightly worse and can be affected by the specific treatment plan (</span><a class="tab-link" data-dcnode-id="3351" data-tab="pane-pcw-references" href="#r8" id="r8R"><span data-dcnode-id="3352" instrument_node="">8</span></a><span data-dcnode-id="3350" instrument_node="">,</span><a class="tab-link" data-dcnode-id="3348" data-tab="pane-pcw-references" href="#r23" id="r23R"><span data-dcnode-id="3349" instrument_node="">23</span></a><span data-dcnode-id="3347" instrument_node="">). The criteria developed to categorize two lung lesions as a primary lung cancer and a separate tumor nodule include both clinical and histopathologic findings. In general, the presence of a lung cancer with a separate tumor nodule should be suspected when there is a lesion demonstrating the “classic” appearance of lung cancer (ie, a solid spiculated lesion) and when one (or more) solid separate lung nodules are identified. The lesions may be presumed to be separate (metastatic) tumor nodules through clinical staging or proved through pathologic staging after comprehensive histopathologic assessment.</span></p><p data-dcnode-id="3332"><span data-dcnode-id="3345" instrument_node="">The new lung cancer database included a cohort of patients (3.5%) with primary lung cancers and separate tumor nodules, most of which were single nodules of the same histologic subtype as the primary malignancy (</span><a class="tab-link" data-dcnode-id="3343" data-tab="pane-pcw-references" href="#r7" id="r7R"><span data-dcnode-id="3344" instrument_node="">7</span></a><span data-dcnode-id="3342" instrument_node="">). Analysis of these cases demonstrated a progressive decrease in survival on the basis of increasing distance from the primary lung cancer (</span><a class="" data-dcnode-id="3340" data-tab="pane-pcw-Figures" href="#fig11a" id="fig11aR"><span data-dcnode-id="3341" instrument_node="">Fig 11</span></a><span data-dcnode-id="3339" instrument_node="">). For instance, survival was better for patients with tumor nodules in the same lobe as the primary lung cancer, compared with those with nodules in a different ipsilateral lobe or the contralateral lung. Among patients with pathologic staging, survival of patients with tumor nodules in the same lobe as the primary tumor (classified as T3 in TNM-7) was similar to that of patients with other T3 tumors. In addition, survival of patients with tumor nodules in the same lung as the primary tumor but in a different lobe (classified as T4 in TNM-7) was similar to survival of patients with other T4 tumors. Among patients with clinical staging, survival of patients with tumor nodules in the contralateral lung relative to the primary lung cancer was similar to that of patients with other M1a descriptors. However, it should be noted that the analysis suggested that survival was primarily affected by treatment, and there was no significant difference in overall survival by separate tumor nodule location among patients managed only surgically or among those managed nonsurgically (</span><a class="tab-link" data-dcnode-id="3337" data-tab="pane-pcw-references" href="#r8" id="r8R"><span data-dcnode-id="3338" instrument_node="">8</span></a><span data-dcnode-id="3336" instrument_node="">,</span><a class="tab-link" data-dcnode-id="3334" data-tab="pane-pcw-references" href="#r23" id="r23R"><span data-dcnode-id="3335" instrument_node="">23</span></a><span data-dcnode-id="3333" instrument_node="">). Patients who were treated surgically experienced better overall survival. Other factors such as tumor nodule size could not be assessed because of the small number of cases in the database. Thus, the classification scheme introduced in TNM-7 is maintained in TNM-8 and should be applied regardless of whether lymph node or extrathoracic metastases are present.</span></p><figure class="article__inlineFigure figure" data-dcnode-id="3295" id="fig11a"><img alt="Figure 11a." class="figure__image" data-dcnode-id="3331" data-lg-src="/cms/10.1148/rg.2018170081/asset/images/large/rg.2018170081.fig11a.jpeg" data-src="/cms/10.1148/rg.2018170081/asset/images/medium/rg.2018170081.fig11a.gif" loading="lazy" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//pubs.rsna.org/cms/10.1148/rg.2018170081/asset/images/medium/rg.2018170081.fig11a.gif&amp;raw" title=""><figcaption data-dcnode-id="3303"><strong data-dcnode-id="3330"></strong><span class="figure__caption hlFld-FigureCaption" data-dcnode-id="3304"><p data-dcnode-id="3305"><span class="captionLabel" data-dcnode-id="3328"><span data-dcnode-id="3329" instrument_node="">Figure 11a.</span></span><span data-dcnode-id="3327" instrument_node=""> Lung cancers with separate tumor nodules in three different patients. </span><b data-dcnode-id="3325"><span data-dcnode-id="3326" instrument_node="">(a)</span></b><span data-dcnode-id="3324" instrument_node=""> Axial contrast-enhanced multidetector CT image of a 73-year-old man with NSCLC shows a solid nodule with irregular margins (arrow) in the right upper lobe, which represents the primary lung cancer, as well as a separate tumor nodule (</span><b data-dcnode-id="3322"><span data-dcnode-id="3323" instrument_node="">*</span></b><span data-dcnode-id="3321" instrument_node="">) in the same lobe. These findings represent T3 disease. </span><b data-dcnode-id="3319"><span data-dcnode-id="3320" instrument_node="">(b)</span></b><span data-dcnode-id="3318" instrument_node=""> Coronal contrast-enhanced multidetector CT image of the right hemithorax of a 66-year-old man with NSCLC shows a right lower lobe mass </span><i data-dcnode-id="3316"><span data-dcnode-id="3317" instrument_node="">(M)</span></i><span data-dcnode-id="3315" instrument_node=""> and an adjacent tumor nodule (</span><b data-dcnode-id="3313"><span data-dcnode-id="3314" instrument_node="">*</span></b><span data-dcnode-id="3312" instrument_node="">), as well as a smaller tumor nodule (arrow) in the right upper lobe. These findings represent T4 disease. </span><b data-dcnode-id="3310"><span data-dcnode-id="3311" instrument_node="">(c)</span></b><span data-dcnode-id="3309" instrument_node=""> Axial contrast-enhanced multidetector CT image of a 65-year-old woman with NSCLC shows an irregular nodule (</span><b data-dcnode-id="3307"><span data-dcnode-id="3308" instrument_node="">*</span></b><span data-dcnode-id="3306" instrument_node="">) in the right upper lobe representing the primary lung cancer, as well as a separate tumor nodule (arrow) in the left upper lobe. These findings represent M1a disease, and the findings at histopathologic examination of the specimen from biopsy of the left upper lobe nodule helped confirm metastatic disease.</span></p></span></figcaption><strong class="hidden-lg hidden-md hidden-sm visible-xs" data-dcnode-id="3301"><span data-dcnode-id="3302" instrument_node="">Figure 11a.</span></strong><div class="figure-extra" data-dcnode-id="3296"><a class="ppt-figure-link" data-dcnode-id="3299" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//pubs.rsna.org/action/downloadFigures%3Fid%3Dfig11a%26doi%3D10.1148%252Frg.2018170081"><span data-dcnode-id="3300" instrument_node="">Download as PowerPoint</span></a><a data-dcnode-id="3297" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//images.rsna.org/index.html%3Fdoi%3D10.1148/rg.2018170081%26fig%3Dfig11a" target="_blank"><span data-dcnode-id="3298" instrument_node="">Open in Image
                    Viewer
                </span></a></div></figure><figure class="article__inlineFigure figure" data-dcnode-id="3258" id="fig11b"><img alt="Figure 11b." class="figure__image" data-dcnode-id="3294" data-lg-src="/cms/10.1148/rg.2018170081/asset/images/large/rg.2018170081.fig11b.jpeg" data-src="/cms/10.1148/rg.2018170081/asset/images/medium/rg.2018170081.fig11b.gif" loading="lazy" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//pubs.rsna.org/cms/10.1148/rg.2018170081/asset/images/medium/rg.2018170081.fig11b.gif&amp;raw" title=""><figcaption data-dcnode-id="3266"><strong data-dcnode-id="3293"></strong><span class="figure__caption hlFld-FigureCaption" data-dcnode-id="3267"><p data-dcnode-id="3268"><span class="captionLabel" data-dcnode-id="3291"><span data-dcnode-id="3292" instrument_node="">Figure 11b.</span></span><span data-dcnode-id="3290" instrument_node=""> Lung cancers with separate tumor nodules in three different patients. </span><b data-dcnode-id="3288"><span data-dcnode-id="3289" instrument_node="">(a)</span></b><span data-dcnode-id="3287" instrument_node=""> Axial contrast-enhanced multidetector CT image of a 73-year-old man with NSCLC shows a solid nodule with irregular margins (arrow) in the right upper lobe, which represents the primary lung cancer, as well as a separate tumor nodule (</span><b data-dcnode-id="3285"><span data-dcnode-id="3286" instrument_node="">*</span></b><span data-dcnode-id="3284" instrument_node="">) in the same lobe. These findings represent T3 disease. </span><b data-dcnode-id="3282"><span data-dcnode-id="3283" instrument_node="">(b)</span></b><span data-dcnode-id="3281" instrument_node=""> Coronal contrast-enhanced multidetector CT image of the right hemithorax of a 66-year-old man with NSCLC shows a right lower lobe mass </span><i data-dcnode-id="3279"><span data-dcnode-id="3280" instrument_node="">(M)</span></i><span data-dcnode-id="3278" instrument_node=""> and an adjacent tumor nodule (</span><b data-dcnode-id="3276"><span data-dcnode-id="3277" instrument_node="">*</span></b><span data-dcnode-id="3275" instrument_node="">), as well as a smaller tumor nodule (arrow) in the right upper lobe. These findings represent T4 disease. </span><b data-dcnode-id="3273"><span data-dcnode-id="3274" instrument_node="">(c)</span></b><span data-dcnode-id="3272" instrument_node=""> Axial contrast-enhanced multidetector CT image of a 65-year-old woman with NSCLC shows an irregular nodule (</span><b data-dcnode-id="3270"><span data-dcnode-id="3271" instrument_node="">*</span></b><span data-dcnode-id="3269" instrument_node="">) in the right upper lobe representing the primary lung cancer, as well as a separate tumor nodule (arrow) in the left upper lobe. These findings represent M1a disease, and the findings at histopathologic examination of the specimen from biopsy of the left upper lobe nodule helped confirm metastatic disease.</span></p></span></figcaption><strong class="hidden-lg hidden-md hidden-sm visible-xs" data-dcnode-id="3264"><span data-dcnode-id="3265" instrument_node="">Figure 11b.</span></strong><div class="figure-extra" data-dcnode-id="3259"><a class="ppt-figure-link" data-dcnode-id="3262" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//pubs.rsna.org/action/downloadFigures%3Fid%3Dfig11b%26doi%3D10.1148%252Frg.2018170081"><span data-dcnode-id="3263" instrument_node="">Download as PowerPoint</span></a><a data-dcnode-id="3260" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//images.rsna.org/index.html%3Fdoi%3D10.1148/rg.2018170081%26fig%3Dfig11b" target="_blank"><span data-dcnode-id="3261" instrument_node="">Open in Image
                    Viewer
                </span></a></div></figure><figure class="article__inlineFigure figure" data-dcnode-id="3221" id="fig11c"><img alt="Figure 11c." class="figure__image" data-dcnode-id="3257" data-lg-src="/cms/10.1148/rg.2018170081/asset/images/large/rg.2018170081.fig11c.jpeg" data-src="/cms/10.1148/rg.2018170081/asset/images/medium/rg.2018170081.fig11c.gif" loading="lazy" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//pubs.rsna.org/cms/10.1148/rg.2018170081/asset/images/medium/rg.2018170081.fig11c.gif&amp;raw" title=""><figcaption data-dcnode-id="3229"><strong data-dcnode-id="3256"></strong><span class="figure__caption hlFld-FigureCaption" data-dcnode-id="3230"><p data-dcnode-id="3231"><span class="captionLabel" data-dcnode-id="3254"><span data-dcnode-id="3255" instrument_node="">Figure 11c.</span></span><span data-dcnode-id="3253" instrument_node=""> Lung cancers with separate tumor nodules in three different patients. </span><b data-dcnode-id="3251"><span data-dcnode-id="3252" instrument_node="">(a)</span></b><span data-dcnode-id="3250" instrument_node=""> Axial contrast-enhanced multidetector CT image of a 73-year-old man with NSCLC shows a solid nodule with irregular margins (arrow) in the right upper lobe, which represents the primary lung cancer, as well as a separate tumor nodule (</span><b data-dcnode-id="3248"><span data-dcnode-id="3249" instrument_node="">*</span></b><span data-dcnode-id="3247" instrument_node="">) in the same lobe. These findings represent T3 disease. </span><b data-dcnode-id="3245"><span data-dcnode-id="3246" instrument_node="">(b)</span></b><span data-dcnode-id="3244" instrument_node=""> Coronal contrast-enhanced multidetector CT image of the right hemithorax of a 66-year-old man with NSCLC shows a right lower lobe mass </span><i data-dcnode-id="3242"><span data-dcnode-id="3243" instrument_node="">(M)</span></i><span data-dcnode-id="3241" instrument_node=""> and an adjacent tumor nodule (</span><b data-dcnode-id="3239"><span data-dcnode-id="3240" instrument_node="">*</span></b><span data-dcnode-id="3238" instrument_node="">), as well as a smaller tumor nodule (arrow) in the right upper lobe. These findings represent T4 disease. </span><b data-dcnode-id="3236"><span data-dcnode-id="3237" instrument_node="">(c)</span></b><span data-dcnode-id="3235" instrument_node=""> Axial contrast-enhanced multidetector CT image of a 65-year-old woman with NSCLC shows an irregular nodule (</span><b data-dcnode-id="3233"><span data-dcnode-id="3234" instrument_node="">*</span></b><span data-dcnode-id="3232" instrument_node="">) in the right upper lobe representing the primary lung cancer, as well as a separate tumor nodule (arrow) in the left upper lobe. These findings represent M1a disease, and the findings at histopathologic examination of the specimen from biopsy of the left upper lobe nodule helped confirm metastatic disease.</span></p></span></figcaption><strong class="hidden-lg hidden-md hidden-sm visible-xs" data-dcnode-id="3227"><span data-dcnode-id="3228" instrument_node="">Figure 11c.</span></strong><div class="figure-extra" data-dcnode-id="3222"><a class="ppt-figure-link" data-dcnode-id="3225" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//pubs.rsna.org/action/downloadFigures%3Fid%3Dfig11c%26doi%3D10.1148%252Frg.2018170081"><span data-dcnode-id="3226" instrument_node="">Download as PowerPoint</span></a><a data-dcnode-id="3223" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//images.rsna.org/index.html%3Fdoi%3D10.1148/rg.2018170081%26fig%3Dfig11c" target="_blank"><span data-dcnode-id="3224" instrument_node="">Open in Image
                    Viewer
                </span></a></div></figure><p data-dcnode-id="3201"><b data-dcnode-id="3218"><i data-dcnode-id="3219"><span data-dcnode-id="3220" instrument_node="">Multiple Ground-glass/Lepidic Lesions.—</span></i></b><span data-dcnode-id="3217" instrument_node="">Lung cancers manifesting as multiple pulmonary lesions with ground-glass or lepidic features are associated with various demographics, excellent patient outcomes, and infrequent recurrences (</span><a class="tab-link" data-dcnode-id="3215" data-tab="pane-pcw-references" href="#r8" id="r8R"><span data-dcnode-id="3216" instrument_node="">8</span></a><span data-dcnode-id="3214" instrument_node="">,</span><a class="tab-link" data-dcnode-id="3212" data-tab="pane-pcw-references" href="#r24" id="r24R"><span data-dcnode-id="3213" instrument_node="">24</span></a><span data-dcnode-id="3211" instrument_node="">). At multidetector CT, these tumors appear as subsolid lesions, either nonsolid lesions (pure ground-glass lesions) or part-solid lesions (ground-glass and solid components). Pathologically, these lesions represent lepidic-predominant adenocarcinoma, minimally invasive adenocarcinoma, or adenocarcinoma in situ, with or without other subtypes of adenocarcinoma as lesser components (</span><a class="tab-link" data-dcnode-id="3209" data-tab="pane-pcw-references" href="#r25" id="r25R"><span data-dcnode-id="3210" instrument_node="">25</span></a><span data-dcnode-id="3208" instrument_node="">). The solid and ground-glass components identified at multidetector CT correspond to invasive and lepidic patterns, respectively (</span><a class="tab-link" data-dcnode-id="3206" data-tab="pane-pcw-references" href="#r8" id="r8R"><span data-dcnode-id="3207" instrument_node="">8</span></a><span data-dcnode-id="3205" instrument_node="">,</span><a class="tab-link" data-dcnode-id="3203" data-tab="pane-pcw-references" href="#r26" id="r26R"><span data-dcnode-id="3204" instrument_node="">26</span></a><span data-dcnode-id="3202" instrument_node="">). Although these lesions are typically considered separate tumors with an in situ or invasive component that has arisen from a predominant noninvasive component, the findings from clonality studies in which these neoplasms are compared have produced conflicting results.</span></p><p data-dcnode-id="3190"><span data-dcnode-id="3200" instrument_node="">Compared with other patterns of lung cancer, adenocarcinomas manifesting as subsolid lesions tend to have a lower propensity for lymph node involvement or metastatic spread, have a greater propensity for developing additional subsolid lung cancers, and are more likely to behave in an indolent manner (</span><a class="tab-link" data-dcnode-id="3198" data-tab="pane-pcw-references" href="#r25" id="r25R"><span data-dcnode-id="3199" instrument_node="">25</span></a><span data-dcnode-id="3197" instrument_node="">). Although the demographics are variable, affected patients are often women and nonsmokers (</span><a class="tab-link" data-dcnode-id="3195" data-tab="pane-pcw-references" href="#r8" id="r8R"><span data-dcnode-id="3196" instrument_node="">8</span></a><span data-dcnode-id="3194" instrument_node="">,</span><a class="tab-link" data-dcnode-id="3192" data-tab="pane-pcw-references" href="#r25" id="r25R"><span data-dcnode-id="3193" instrument_node="">25</span></a><span data-dcnode-id="3191" instrument_node="">). It should be noted that almost all cases of multifocal lung cancer represent adenocarcinoma.</span></p><p data-dcnode-id="3185"><span data-dcnode-id="3189" instrument_node="">The criteria developed to categorize lesions as multiple ground-glass/lepidic lesions (multifocal adenocarcinoma) include both clinical and pathologic findings. The IASLC recommends that tumors should be classified as multifocal adenocarcinoma if a malignant subsolid nodule is present (regardless of whether it is suspected at clinical staging or histopathologically proven) and if other nodules with ground-glass features are identified (regardless of whether tissue sampling has been performed to evaluate the other nodules; if sampling has been performed, lesions may be classified as lepidic-predominant adenocarcinoma, minimally invasive adenocarcinoma, or adenocarcinoma in situ) (</span><a class="tab-link" data-dcnode-id="3187" data-tab="pane-pcw-references" href="#r25" id="r25R"><span data-dcnode-id="3188" instrument_node="">25</span></a><span data-dcnode-id="3186" instrument_node="">). This definition also includes cases in which a subsolid lesion with a 50% or greater solid (invasive) component appears to have arisen from a ground-glass nodule (or a lepidic background) and other ground-glass nodules are present. The designation of multifocal lung adenocarcinoma should not be applied to patients with multiple ground-glass nodules likely representing benign or preneoplastic lesions such as atypical adenomatous hyperplasia.</span></p><p data-dcnode-id="3177"><span data-dcnode-id="3184" instrument_node="">Multifocal adenocarcinoma should be classified by the T category of the lesion with the highest-level T descriptor and by the number of lesions (#)—or simply “(m)” for multiple—indicated in parentheses (</span><a class="" data-dcnode-id="3182" data-tab="pane-pcw-Figures" href="#fig12" id="fig12R"><span data-dcnode-id="3183" instrument_node="">Fig 12</span></a><span data-dcnode-id="3181" instrument_node="">). The lesion size is determined by the largest diameter of the solid component measured on multidetector CT images or the largest diameter of the invasive component at histologic examination. Adenocarcinoma in situ and minimally invasive adenocarcinoma should be designated as Tis and T1a(mi), respectively (</span><a class="tab-link" data-dcnode-id="3179" data-tab="pane-pcw-references" href="#r26" id="r26R"><span data-dcnode-id="3180" instrument_node="">26</span></a><span data-dcnode-id="3178" instrument_node="">). The T(#/m) multifocal classification should be used regardless of whether these lesions are suspected solely on the basis of imaging or are pathologically proven and regardless of whether the lesions are in the same lobe or in different ipsilateral or contralateral lobes. The N and M categories that apply to all of the tumor foci collectively should be used.</span></p><figure class="article__inlineFigure figure" data-dcnode-id="3161" id="fig12"><img alt="Figure 12." class="figure__image" data-dcnode-id="3176" data-lg-src="/cms/10.1148/rg.2018170081/asset/images/large/rg.2018170081.fig12.jpeg" data-src="/cms/10.1148/rg.2018170081/asset/images/medium/rg.2018170081.fig12.gif" loading="lazy" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//pubs.rsna.org/cms/10.1148/rg.2018170081/asset/images/medium/rg.2018170081.fig12.gif&amp;raw" title=""><figcaption data-dcnode-id="3169"><strong data-dcnode-id="3175"></strong><span class="figure__caption hlFld-FigureCaption" data-dcnode-id="3170"><p data-dcnode-id="3171"><span class="captionLabel" data-dcnode-id="3173"><span data-dcnode-id="3174" instrument_node="">Figure 12.</span></span><span data-dcnode-id="3172" instrument_node=""> Multiple ground-glass/lepidic lesions (multifocal adenocarcinoma). Axial nonenhanced multidetector CT image of a 52-year-old woman with multifocal lung adenocarcinoma shows approximately 16 ground-glass nodules bilaterally, the largest of which is in the right upper lobe and measures approximately 2.2 cm in focal diameter. In the setting of multiple ground-glass lesions or lepidic tumors, the IASLC recommends use of the dominant lesion for T staging purposes. In this case, 2.2 cm corresponds to a T1c lesion, and the overall descriptor can be listed as either T1c(16) or T1c(m).</span></p></span></figcaption><strong class="hidden-lg hidden-md hidden-sm visible-xs" data-dcnode-id="3167"><span data-dcnode-id="3168" instrument_node="">Figure 12.</span></strong><div class="figure-extra" data-dcnode-id="3162"><a class="ppt-figure-link" data-dcnode-id="3165" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//pubs.rsna.org/action/downloadFigures%3Fid%3Dfig12%26doi%3D10.1148%252Frg.2018170081"><span data-dcnode-id="3166" instrument_node="">Download as PowerPoint</span></a><a data-dcnode-id="3163" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//images.rsna.org/index.html%3Fdoi%3D10.1148/rg.2018170081%26fig%3Dfig12" target="_blank"><span data-dcnode-id="3164" instrument_node="">Open in Image
                    Viewer
                </span></a></div></figure><p data-dcnode-id="3138"><b data-dcnode-id="3158"><i data-dcnode-id="3159"><span data-dcnode-id="3160" instrument_node="">Consolidation.—</span></i></b><span data-dcnode-id="3157" instrument_node="">Another pattern of disease includes lung cancer manifesting as diffuse consolidation or a “pneumonic type” of lung adenocarcinoma that occurs without proximal bronchial obstruction (</span><a class="tab-link" data-dcnode-id="3155" data-tab="pane-pcw-references" href="#r27" id="r27R"><span data-dcnode-id="3156" instrument_node="">27</span></a><span data-dcnode-id="3154" instrument_node="">–</span><a class="tab-link" data-dcnode-id="3152" data-tab="pane-pcw-references" href="#r29" id="r29R"><span data-dcnode-id="3153" instrument_node="">29</span></a><span data-dcnode-id="3151" instrument_node="">). On multidetector CT images, these lesions appear as areas of consolidation and ground-glass opacities. The criteria developed to categorize lesions as pneumonic-type lung adenocarcinoma include both clinical and pathologic findings. These lesions manifest as a consolidative pattern on multidetector CT images, in the absence of an obstructed bronchus; that consolidative pattern may be confined to a particular region (segment or lobe), may affect multiple regions (appearing confluent or separate), or may involve the lung in a diffuse manner. These tumors manifest as a combination of areas of consolidation and ground-glass opacities with ill-defined margins owing to the infiltrative nature. Air bronchograms are frequently identified. Most pneumonic-type lung cancers are invasive mucinous adenocarcinomas; the rest are mixed or nonmucinous adenocarcinomas (</span><a class="tab-link" data-dcnode-id="3149" data-tab="pane-pcw-references" href="#r8" id="r8R"><span data-dcnode-id="3150" instrument_node="">8</span></a><span data-dcnode-id="3148" instrument_node="">,</span><a class="tab-link" data-dcnode-id="3146" data-tab="pane-pcw-references" href="#r25" id="r25R"><span data-dcnode-id="3147" instrument_node="">25</span></a><span data-dcnode-id="3145" instrument_node="">). Although these patients may have extensive pulmonary involvement, lymph node involvement and metastatic disease are uncommon at presentation (</span><a class="tab-link" data-dcnode-id="3143" data-tab="pane-pcw-references" href="#r30" id="r30R"><span data-dcnode-id="3144" instrument_node="">30</span></a><span data-dcnode-id="3142" instrument_node="">–</span><a class="tab-link" data-dcnode-id="3140" data-tab="pane-pcw-references" href="#r32" id="r32R"><span data-dcnode-id="3141" instrument_node="">32</span></a><span data-dcnode-id="3139" instrument_node="">). Progression is typically slow, but the overall survival is worse compared with that of patients with multifocal ground-glass/lepidic lesions.</span></p><p data-dcnode-id="3127"><span data-dcnode-id="3137" instrument_node="">The T classification depends on factors such as lesion size and the number of lobes involved. When a single area of tumor involvement is identified, the T classification is determined by the size of the lesion, with N and M classifications determined by lymph node involvement and metastatic disease (</span><a class="tab-link" data-dcnode-id="3135" data-tab="pane-pcw-references" href="#r5" id="r5R"><span data-dcnode-id="3136" instrument_node="">5</span></a><span data-dcnode-id="3134" instrument_node="">,</span><a class="tab-link" data-dcnode-id="3132" data-tab="pane-pcw-references" href="#r7" id="r7R"><span data-dcnode-id="3133" instrument_node="">7</span></a><span data-dcnode-id="3131" instrument_node="">). In TNM-8, multiple sites of lung tumor involvement are designated as T3 if they are confined to one lobe, T4 if they affect different lobes in the same lung, and M1a if they involve both lungs (</span><a class="" data-dcnode-id="3129" data-tab="pane-pcw-Figures" href="#fig13a" id="fig13aR"><span data-dcnode-id="3130" instrument_node="">Fig 13</span></a><span data-dcnode-id="3128" instrument_node="">). When tumor is present within both lungs, the T classification is based on the appropriate T category for the lung with the greatest extent of tumor involvement. For tumor that is confined to a single lobe but is difficult to measure, the T3 descriptor should be assigned. The T4 descriptor should be assigned to disease in which there is extension of tumor into an adjacent lobe or there is a discrete separate area of involvement of an adjacent lobe. The N and M categories that apply to all of the tumor foci collectively should be used. This classification scheme should be used regardless of whether these lesions are suspected at imaging or pathologically proven, and a detailed histologic assessment is not required for pneumonic-type lung cancer.</span></p><figure class="article__inlineFigure figure" data-dcnode-id="3090" id="fig13a"><img alt="Figure 13a." class="figure__image" data-dcnode-id="3126" data-lg-src="/cms/10.1148/rg.2018170081/asset/images/large/rg.2018170081.fig13a.jpeg" data-src="/cms/10.1148/rg.2018170081/asset/images/medium/rg.2018170081.fig13a.gif" loading="lazy" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//pubs.rsna.org/cms/10.1148/rg.2018170081/asset/images/medium/rg.2018170081.fig13a.gif&amp;raw" title=""><figcaption data-dcnode-id="3098"><strong data-dcnode-id="3125"></strong><span class="figure__caption hlFld-FigureCaption" data-dcnode-id="3099"><p data-dcnode-id="3100"><span class="captionLabel" data-dcnode-id="3123"><span data-dcnode-id="3124" instrument_node="">Figure 13a.</span></span><span data-dcnode-id="3122" instrument_node=""> Lung cancer manifesting as consolidation in three different patients. </span><b data-dcnode-id="3120"><span data-dcnode-id="3121" instrument_node="">(a)</span></b><span data-dcnode-id="3119" instrument_node=""> Axial contrast-enhanced multidetector CT image of the left hemithorax of a 76-year-old woman undergoing evaluation of nonresolving pneumonia shows consolidation </span><i data-dcnode-id="3117"><span data-dcnode-id="3118" instrument_node="">(C)</span></i><span data-dcnode-id="3116" instrument_node=""> in the left lower lobe. The findings at histopathologic examination of the specimen from biopsy disclosed adenocarcinoma. Because this lesion is limited to the left lower lobe, it is designated as T3 disease. </span><b data-dcnode-id="3114"><span data-dcnode-id="3115" instrument_node="">(b)</span></b><span data-dcnode-id="3113" instrument_node=""> Axial contrast-enhanced multidetector CT image of the left hemithorax of a 49-year-old woman with multifocal adenocarcinoma shows multiple areas of consolidation </span><i data-dcnode-id="3111"><span data-dcnode-id="3112" instrument_node="">(C)</span></i><span data-dcnode-id="3110" instrument_node=""> in the left lung. Because these lesions are depicted in both lobes of the left lung, they are classified as T4 disease. </span><b data-dcnode-id="3108"><span data-dcnode-id="3109" instrument_node="">(c)</span></b><span data-dcnode-id="3107" instrument_node=""> Axial contrast-enhanced multidetector CT image of a 53-year-old woman with multifocal adenocarcinoma shows consolidation </span><i data-dcnode-id="3105"><span data-dcnode-id="3106" instrument_node="">(C)</span></i><span data-dcnode-id="3104" instrument_node=""> of the entire right lung and focal consolidation (</span><b data-dcnode-id="3102"><span data-dcnode-id="3103" instrument_node="">*</span></b><span data-dcnode-id="3101" instrument_node="">) in the left upper lobe. Because these areas of consolidation are depicted in both lungs, they are classified as M1a disease.</span></p></span></figcaption><strong class="hidden-lg hidden-md hidden-sm visible-xs" data-dcnode-id="3096"><span data-dcnode-id="3097" instrument_node="">Figure 13a.</span></strong><div class="figure-extra" data-dcnode-id="3091"><a class="ppt-figure-link" data-dcnode-id="3094" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=h                 </span></a></div></figure><figure class="article__inlineFigure figure" data-dcnode-id="3053" id="fig13b"><img alt="Figure 13b." class="figure__image" data-dcnode-id="3089" data-lg-src="/cms/10.1148/rg.2018170081/asset/images/large/rg.2018170081.fig13b.jpeg" data-src="/cms/10.1148/rg.2018170081/asset/images/medium/rg.2018170081.fig13b.gif" loading="lazy" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//pubs.rsna.org/cms/10.1148/rg.2018170081/asset/images/medium/rg.2018170081.fig13b.gif&amp;raw" title=""><figcaption data-dcnode-id="3061"><strong data-dcnode-id="3088"></strong><span class="figure__caption hlFld-FigureCaption" data-dcnode-id="3062"><p data-dcnode-id="3063"><span class="captionLabel" data-dcnode-id="3086"><span data-dcnode-id="3087" instrument_node="">Figure 13b.</span></span><span data-dcnode-id="3085" instrument_node=""> Lung cancer manifesting as consolidation in three different patients. </span><b data-dcnode-id="3083"><span data-dcnode-id="3084" instrument_node="">(a)</span></b><span data-dcnode-id="3082" instrument_node=""> Axial contrast-enhanced multidetector CT image of the left hemithorax of a 76-year-old woman undergoing evaluation of nonresolving pneumonia shows consolidation </span><i data-dcnode-id="3080"><span data-dcnode-id="3081" instrument_node="">(C)</span></i><span data-dcnode-id="3079" instrument_node=""> in the left lower lobe. The findings at histopathologic examination of the specimen from biopsy disclosed adenocarcinoma. Because this lesion is limited to the left lower lobe, it is designated as T3 disease. </span><b data-dcnode-id="3077"><span data-dcnode-id="3078" instrument_node="">(b)</span></b><span data-dcnode-id="3076" instrument_node=""> Axial contrast-enhanced multidetector CT image of the left hemithorax of a 49-year-old woman with multifocal adenocarcinoma shows multiple areas of consolidation </span><i data-dcnode-id="3074"><span data-dcnode-id="3075" instrument_node="">(C)</span></i><span data-dcnode-id="3073" instrument_node=""> in the left lung. Because these lesions are depicted in both lobes of the left lung, they are classified as T4 disease. </span><b data-dcnode-id="3071"><span data-dcnode-id="3072" instrument_node="">(c)</span></b><span data-dcnode-id="3070" instrument_node=""> Axial contrast-enhanced multidetector CT image of a 53-year-old woman with multifocal adenocarcinoma shows consolidation </span><i data-dcnode-id="3068"><span data-dcnode-id="3069" instrument_node="">(C)</span></i><span data-dcnode-id="3067" instrument_node=""> of the entire right lung and focal consolidation (</span><b data-dcnode-id="3065"><span data-dcnode-id="3066" instrument_node="">*</span></b><span data-dcnode-id="3064" instrument_node="">) in the left upper lobe. Because these areas of consolidation are depicted in both lungs, they are classified as M1a disease.</span></p></span></figcaption><strong class="hidden-lg hidden-md hidden-sm visible-xs" data-dcnode-id="3059"><span data-dcnode-id="3060" instrument_node="">Figure 13b.</span></strong><div class="figure-extra" data-dcnode-id="3054"><a class="ppt-figure-link" data-dcnode-id="3057" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//pubs.rsna.org/action/downloadFigures%3Fid%3Dfig13b%26doi%3D10.1148%252Frg.2018170081"><span data-dcnode-id="3058" instrument_node="">Download as PowerPoint</span></a><a data-dcnode-id="3055" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//images.rsna.org/index.html%3Fdoi%3D10.1148/rg.2018170081%26fig%3Dfig13b" target="_blank"><span data-dcnode-id="3056" instrument_node="">Open in Image
