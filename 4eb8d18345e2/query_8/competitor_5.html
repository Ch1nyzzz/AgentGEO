                </span></a></div></figure><figure class="article__inlineFigure figure" data-dcnode-id="3016" id="fig13c"><img alt="Figure 13c." class="figure__image" data-dcnode-id="3052" data-lg-src="/cms/10.1148/rg.2018170081/asset/images/large/rg.2018170081.fig13c.jpeg" data-src="/cms/10.1148/rg.2018170081/asset/images/medium/rg.2018170081.fig13c.gif" loading="lazy" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//pubs.rsna.org/cms/10.1148/rg.2018170081/asset/images/medium/rg.2018170081.fig13c.gif&amp;raw" title=""><figcaption data-dcnode-id="3024"><strong data-dcnode-id="3051"></strong><span class="figure__caption hlFld-FigureCaption" data-dcnode-id="3025"><p data-dcnode-id="3026"><span class="captionLabel" data-dcnode-id="3049"><span data-dcnode-id="3050" instrument_node="">Figure 13c.</span></span><span data-dcnode-id="3048" instrument_node=""> Lung cancer manifesting as consolidation in three different patients. </span><b data-dcnode-id="3046"><span data-dcnode-id="3047" instrument_node="">(a)</span></b><span data-dcnode-id="3045" instrument_node=""> Axial contrast-enhanced multidetector CT image of the left hemithorax of a 76-year-old woman undergoing evaluation of nonresolving pneumonia shows consolidation </span><i data-dcnode-id="3043"><span data-dcnode-id="3044" instrument_node="">(C)</span></i><span data-dcnode-id="3042" instrument_node=""> in the left lower lobe. The findings at histopathologic examination of the specimen from biopsy disclosed adenocarcinoma. Because this lesion is limited to the left lower lobe, it is designated as T3 disease. </span><b data-dcnode-id="3040"><span data-dcnode-id="3041" instrument_node="">(b)</span></b><span data-dcnode-id="3039" instrument_node=""> Axial contrast-enhanced multidetector CT image of the left hemithorax of a 49-year-old woman with multifocal adenocarcinoma shows multiple areas of consolidation </span><i data-dcnode-id="3037"><span data-dcnode-id="3038" instrument_node="">(C)</span></i><span data-dcnode-id="3036" instrument_node=""> in the left lung. Because these lesions are depicted in both lobes of the left lung, they are classified as T4 disease. </span><b data-dcnode-id="3034"><span data-dcnode-id="3035" instrument_node="">(c)</span></b><span data-dcnode-id="3033" instrument_node=""> Axial contrast-enhanced multidetector CT image of a 53-year-old woman with multifocal adenocarcinoma shows consolidation </span><i data-dcnode-id="3031"><span data-dcnode-id="3032" instrument_node="">(C)</span></i><span data-dcnode-id="3030" instrument_node=""> of the entire right lung and focal consolidation (</span><b data-dcnode-id="3028"><span data-dcnode-id="3029" instrument_node="">*</span></b><span data-dcnode-id="3027" instrument_node="">) in the left upper lobe. Because these areas of consolidation are depicted in both lungs, they are classified as M1a disease.</span></p></span></figcaption><strong class="hidden-lg hidden-md hidden-sm visible-xs" data-dcnode-id="3022"><span data-dcnode-id="3023" instrument_node="">Figure 13c.</span></strong><div class="figure-extra" data-dcnode-id="3017"><a class="ppt-figure-link" data-dcnode-id="3020" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//pubs.rsna.org/action/downloadFigures%3Fid%3Dfig13c%26doi%3D10.1148%252Frg.2018170081"><span data-dcnode-id="3021" instrument_node="">Download as PowerPoint</span></a><a data-dcnode-id="3018" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//images.rsna.org/index.html%3Fdoi%3D10.1148/rg.2018170081%26fig%3Dfig13c" target="_blank"><span data-dcnode-id="3019" instrument_node="">Open in Image
                    Viewer
                </span></a></div></figure><p data-dcnode-id="3014"><span data-dcnode-id="3015" instrument_node="">The IASLC also recommends that this scheme should be used for the staging of miliary forms of adenocarcinoma, a pattern of lung disease characterized by numerous small pulmonary nodules scattered throughout the lung. In contrast to the diffuse form, which could potentially be measured, miliary disease is inherently difficult to measure, and a single lobe should be classified as T3 without regard to size.</span></p><div class="anchor-spacer" data-dcnode-id="3013" id="ac_i44"></div><h2 class="article-section__title section__title" data-dcnode-id="3011" id="_i44"><span data-dcnode-id="3012" instrument_node="">Staging of SCLC</span></h2><p data-dcnode-id="3000"><span data-dcnode-id="3010" instrument_node="">The IASLC first recommended that the TNM staging system should be used to stage SCLC in 2009 with the publication of TNM-7. Before that time, early staging systems developed by the Veterans Administration Lung Study Group were used to divide SCLCs into two subgroups, limited-stage SCLC and extensive-stage SCLC, on the basis of the extent of disease and the feasibility of treatment with a single radiation portal. For example, limited-stage SCLC represents disease confined to one hemithorax, which may include local extension and ipsilateral or supraclavicular lymphadenopathy if disease can be included in a single radiation portal. Extensive-stage SCLC includes all other cases. In TNM-7, stages I to III correspond to limited-stage SCLC, and stage IV corresponds to extensive-stage SCLC (</span><a class="tab-link" data-dcnode-id="3008" data-tab="pane-pcw-references" href="#r33" id="r33R"><span data-dcnode-id="3009" instrument_node="">33</span></a><span data-dcnode-id="3007" instrument_node="">). The TNM staging system has been shown to better differentiate stage-specific survival compared with the Veterans Administration Lung Study Group system, and the primary benefit of the TNM system is the identification of patients who may benefit from surgical resection (</span><a class="tab-link" data-dcnode-id="3005" data-tab="pane-pcw-references" href="#r11" id="r11R"><span data-dcnode-id="3006" instrument_node="">11</span></a><span data-dcnode-id="3004" instrument_node="">,</span><a class="tab-link" data-dcnode-id="3002" data-tab="pane-pcw-references" href="#r12" id="r12R"><span data-dcnode-id="3003" instrument_node="">12</span></a><span data-dcnode-id="3001" instrument_node="">).</span></p><p data-dcnode-id="2974"><span data-dcnode-id="2999" instrument_node="">The prognostic value of clinical and pathologic TNM staging in patients with SCLC was confirmed in the analysis of the new database, and the IASLC recommends its use for staging of these patients (</span><a class="" data-dcnode-id="2997" data-tab="pane-pcw-Figures" href="#fig14a" id="fig14aR"><span data-dcnode-id="2998" instrument_node="">Fig 14</span></a><span data-dcnode-id="2996" instrument_node="">). Evaluation of patients with clinically staged M1b disease showed no significant survival difference between patients with either a single site or multiple sites of metastatic disease. However, a difference in survival between patients with single-site metastasis involving the brain and those with other sites of single or multiple-site metastases was identified at 12 months (36% vs 23% and 20%, respectively) (</span><a class="tab-link" data-dcnode-id="2994" data-tab="pane-pcw-references" href="#r34" id="r34R"><span data-dcnode-id="2995" instrument_node="">34</span></a><span data-dcnode-id="2993" instrument_node="">). In addition, improved survival was seen in patients with a single site of metastasis and no pleural effusion, compared with patients who had either pleural effusions or multiple metastatic sites or both. The IASLC recommends that the subdivision of M descriptors into M1a, M1b, and M1c for NSCLC should also be used for SCLC. In addition, to inform future revisions of the TNM staging system, it is recommended that radiologists should record the following information regarding SCLC: </span><i data-dcnode-id="2991"><span data-dcnode-id="2992" instrument_node="">(a)</span></i><span data-dcnode-id="2990" instrument_node=""> the number of extrathoracic metastatic sites, </span><i data-dcnode-id="2988"><span data-dcnode-id="2989" instrument_node="">(b)</span></i><span data-dcnode-id="2987" instrument_node=""> the number of organs involved, </span><i data-dcnode-id="2985"><span data-dcnode-id="2986" instrument_node="">(c)</span></i><span data-dcnode-id="2984" instrument_node=""> the diameter of individual metastatic sites, </span><i data-dcnode-id="2982"><span data-dcnode-id="2983" instrument_node="">(d)</span></i><span data-dcnode-id="2981" instrument_node=""> the types of examinations and studies used for staging, and </span><i data-dcnode-id="2979"><span data-dcnode-id="2980" instrument_node="">(e)</span></i><span data-dcnode-id="2978" instrument_node=""> whether patients with brain metastases are symptomatic or asymptomatic (</span><a class="tab-link" data-dcnode-id="2976" data-tab="pane-pcw-references" href="#r34" id="r34R"><span data-dcnode-id="2977" instrument_node="">34</span></a><span data-dcnode-id="2975" instrument_node="">).</span></p><figure class="article__inlineFigure figure" data-dcnode-id="2943" id="fig14a"><img alt="Figure 14a." class="figure__image" data-dcnode-id="2973" data-lg-src="/cms/10.1148/rg.2018170081/asset/images/large/rg.2018170081.fig14a.jpeg" data-src="/cms/10.1148/rg.2018170081/asset/images/medium/rg.2018170081.fig14a.gif" loading="lazy" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//pubs.rsna.org/cms/10.1148/rg.2018170081/asset/images/medium/rg.2018170081.fig14a.gif&amp;raw" title=""><figcaption data-dcnode-id="2951"><strong data-dcnode-id="2972"></strong><span class="figure__caption hlFld-FigureCaption" data-dcnode-id="2952"><p data-dcnode-id="2953"><span class="captionLabel" data-dcnode-id="2970"><span data-dcnode-id="2971" instrument_node="">Figure 14a.</span></span><span data-dcnode-id="2969" instrument_node=""> SCLC in two different patients. </span><b data-dcnode-id="2967"><span data-dcnode-id="2968" instrument_node="">(a)</span></b><span data-dcnode-id="2966" instrument_node=""> Axial contrast-enhanced multidetector CT image of the left hemithorax of a 67-year-old woman with SCLC shows a solid nodule in the left upper lobe (arrow) along the left interlobar fissure. The findings from histopathologic examination of the specimen from CT-guided core needle biopsy disclosed SCLC. </span><b data-dcnode-id="2964"><span data-dcnode-id="2965" instrument_node="">(b)</span></b><span data-dcnode-id="2963" instrument_node=""> Axial contrast-enhanced multidetector CT image of a 61-year-old woman with SCLC shows a right infrahilar mass </span><i data-dcnode-id="2961"><span data-dcnode-id="2962" instrument_node="">(M)</span></i><span data-dcnode-id="2960" instrument_node=""> resulting in complete atelectasis </span><i data-dcnode-id="2958"><span data-dcnode-id="2959" instrument_node="">(A)</span></i><span data-dcnode-id="2957" instrument_node=""> of the right lower lobe, as well as ipsilateral mediastinal lymphadenopathy (arrow) and contralateral hilar lymphadenopathy (</span><b data-dcnode-id="2955"><span data-dcnode-id="2956" instrument_node="">*</span></b><span data-dcnode-id="2954" instrument_node="">). Staging of SCLC with the TNM system was introduced in TNM-7, and this recommendation is carried over into TNM-8. The TNM descriptors and overall stage for this patient were T2bN3M0 and stage IIIB, respectively.</span></p></span></figcaption><strong class="hidden-lg hidden-md hidden-sm visible-xs" data-dcnode-id="2949"><span data-dcnode-id="2950" instrument_node="">Figure 14a.</span></strong><div class="figure-extra" data-dcnode-id="2944"><a class="ppt-figure-link" data-dcnode-id="2947" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//pubs.rsna.org/action/downloadFigures%3Fid%3Dfig14a%26doi%3D10.1148%252Frg.2018170081"><span data-dcnode-id="2948" instrument_node="">Download as PowerPoint</span></a><a data-dcnode-id="2945" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//images.rsna.org/index.html%3Fdoi%3D10.1148/rg.2018170081%26fig%3Dfig14a" target="_blank"><span data-dcnode-id="2946" instrument_node="">Open in Image
                    Viewer
                </span></a></div></figure><figure class="article__inlineFigure figure" data-dcnode-id="2912" id="fig14b"><img alt="Figure 14b." class="figure__image" data-dcnode-id="2942" data-lg-src="/cms/10.1148/rg.2018170081/asset/images/large/rg.2018170081.fig14b.jpeg" data-src="/cms/10.1148/rg.2018170081/asset/images/medium/rg.2018170081.fig14b.gif" loading="lazy" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//pubs.rsna.org/cms/10.1148/rg.2018170081/asset/images/medium/rg.2018170081.fig14b.gif&amp;raw" title=""><figcaption data-dcnode-id="2920"><strong data-dcnode-id="2941"></strong><span class="figure__caption hlFld-FigureCaption" data-dcnode-id="2921"><p data-dcnode-id="2922"><span class="captionLabel" data-dcnode-id="2939"><span data-dcnode-id="2940" instrument_node="">Figure 14b.</span></span><span data-dcnode-id="2938" instrument_node=""> SCLC in two different patients. </span><b data-dcnode-id="2936"><span data-dcnode-id="2937" instrument_node="">(a)</span></b><span data-dcnode-id="2935" instrument_node=""> Axial contrast-enhanced multidetector CT image of the left hemithorax of a 67-year-old woman with SCLC shows a solid nodule in the left upper lobe (arrow) along the left interlobar fissure. The findings from histopathologic examination of the specimen from CT-guided core needle biopsy disclosed SCLC. </span><b data-dcnode-id="2933"><span data-dcnode-id="2934" instrument_node="">(b)</span></b><span data-dcnode-id="2932" instrument_node=""> Axial contrast-enhanced multidetector CT image of a 61-year-old woman with SCLC shows a right infrahilar mass </span><i data-dcnode-id="2930"><span data-dcnode-id="2931" instrument_node="">(M)</span></i><span data-dcnode-id="2929" instrument_node=""> resulting in complete atelectasis </span><i data-dcnode-id="2927"><span data-dcnode-id="2928" instrument_node="">(A)</span></i><span data-dcnode-id="2926" instrument_node=""> of the right lower lobe, as well as ipsilateral mediastinal lymphadenopathy (arrow) and contralateral hilar lymphadenopathy (</span><b data-dcnode-id="2924"><span data-dcnode-id="2925" instrument_node="">*</span></b><span data-dcnode-id="2923" instrument_node="">). Staging of SCLC with the TNM system was introduced in TNM-7, and this recommendation is carried over into TNM-8. The TNM descriptors and overall stage for this patient were T2bN3M0 and stage IIIB, respectively.</span></p></span></figcaption><strong class="hidden-lg hidden-md hidden-sm visible-xs" data-dcnode-id="2918"><span data-dcnode-id="2919" instrument_node="">Figure 14b.</span></strong><div class="figure-extra" data-dcnode-id="2913"><a class="ppt-figure-link" data-dcnode-id="2916" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//pubs.rsna.org/action/downloadFigures%3Fid%3Dfig14b%26doi%3D10.1148%252Frg.2018170081"><span data-dcnode-id="2917" instrument_node="">Download as PowerPoint</span></a><a data-dcnode-id="2914" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//images.rsna.org/index.html%3Fdoi%3D10.1148/rg.2018170081%26fig%3Dfig14b" target="_blank"><span data-dcnode-id="2915" instrument_node="">Open in Image
                    Viewer
                </span></a></div></figure><div class="anchor-spacer" data-dcnode-id="2911" id="ac_i47"></div><h2 class="article-section__title section__title" data-dcnode-id="2909" id="_i47"><span data-dcnode-id="2910" instrument_node="">Tumor Measurement</span></h2><p data-dcnode-id="2908"></p><div class="teachingPoint" data-dcnode-id="2905"><img data-dcnode-id="2907" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//pubs.rsna.org/templates/jsp/_style2/_rsna/images/teaching_point.gif&amp;raw"><span data-dcnode-id="2906" instrument_node=""> The IASLC recommends that all tumors should be measured and the measurement reported in centimeters with millimeter increments. At multidetector CT, solid and nonsolid lesions should be measured on the image demonstrating the greatest average tumor dimension, regardless of the plane (axial, sagittal, or coronal). Part-solid lesions should be measured on the image or images demonstrating the largest average tumor diameter and the largest diameter of the solid component. Although long-axis and short-axis measurements may be recorded for all lesions, only the longest diameter for solid and nonsolid lesions and the longest diameter of the solid component for part-solid lesions should be used for staging purposes</span></div><span data-dcnode-id="2904" instrument_node=""> (</span><a class="tab-link" data-dcnode-id="2902" data-tab="pane-pcw-references" href="#r5" id="r5R"><span data-dcnode-id="2903" instrument_node="">5</span></a><span data-dcnode-id="2901" instrument_node="">,</span><a class="tab-link" data-dcnode-id="2899" data-tab="pane-pcw-references" href="#r8" id="r8R"><span data-dcnode-id="2900" instrument_node="">8</span></a><span data-dcnode-id="2898" instrument_node="">,</span><a class="tab-link" data-dcnode-id="2896" data-tab="pane-pcw-references" href="#r26" id="r26R"><span data-dcnode-id="2897" instrument_node="">26</span></a><span data-dcnode-id="2895" instrument_node="">,</span><a class="tab-link" data-dcnode-id="2893" data-tab="pane-pcw-references" href="#r35" id="r35R"><span data-dcnode-id="2894" instrument_node="">35</span></a><span data-dcnode-id="2892" instrument_node="">).</span><p data-dcnode-id="2891"></p><p data-dcnode-id="2880"><span data-dcnode-id="2890" instrument_node="">In the findings of several studies investigating the accuracy of lesion measurement with CT section thickness, investigators have demonstrated that lower section thickness resulted in less variability in measurement (</span><a class="tab-link" data-dcnode-id="2888" data-tab="pane-pcw-references" href="#r36" id="r36R"><span data-dcnode-id="2889" instrument_node="">36</span></a><span data-dcnode-id="2887" instrument_node="">–</span><a class="tab-link" data-dcnode-id="2885" data-tab="pane-pcw-references" href="#r39" id="r39R"><span data-dcnode-id="2886" instrument_node="">39</span></a><span data-dcnode-id="2884" instrument_node="">). Specifically, 1-mm sections result in the least amount of measurement variability, especially for lesions smaller than 10 mm and for those that demonstrate spiculation rather than smooth margins (</span><a class="tab-link" data-dcnode-id="2882" data-tab="pane-pcw-references" href="#r36" id="r36R"><span data-dcnode-id="2883" instrument_node="">36</span></a><span data-dcnode-id="2881" instrument_node="">). In addition to minimizing partial volume averaging, thin sections allow optimal evaluation of morphologic features such as density, shape, and margin because of the enhanced spatial resolution.</span></p><p data-dcnode-id="2860"><span data-dcnode-id="2879" instrument_node="">The findings from studies evaluating the accuracy of lung nodule measurements obtained with different window settings have shown conflicting results. Some investigators suggest that mediastinal settings are more accurate, and others have shown greater accuracy with the use of lung window settings (</span><a class="tab-link" data-dcnode-id="2877" data-tab="pane-pcw-references" href="#r26" id="r26R"><span data-dcnode-id="2878" instrument_node="">26</span></a><span data-dcnode-id="2876" instrument_node="">,</span><a class="tab-link" data-dcnode-id="2874" data-tab="pane-pcw-references" href="#r40" id="r40R"><span data-dcnode-id="2875" instrument_node="">40</span></a><span data-dcnode-id="2873" instrument_node="">,</span><a class="tab-link" data-dcnode-id="2871" data-tab="pane-pcw-references" href="#r41" id="r41R"><span data-dcnode-id="2872" instrument_node="">41</span></a><span data-dcnode-id="2870" instrument_node="">). In the results of several recent studies evaluating minimally invasive adenocarcinoma and small lung adenocarcinomas, investigators have suggested that measurements obtained by using lung windows are more similar to pathologic measurements and that the use of mediastinal windows may underestimate the size of the invasive component (</span><a class="tab-link" data-dcnode-id="2868" data-tab="pane-pcw-references" href="#r42" id="r42R"><span data-dcnode-id="2869" instrument_node="">42</span></a><span data-dcnode-id="2867" instrument_node="">–</span><a class="tab-link" data-dcnode-id="2865" data-tab="pane-pcw-references" href="#r44" id="r44R"><span data-dcnode-id="2866" instrument_node="">44</span></a><span data-dcnode-id="2864" instrument_node="">). Therefore, the IASLC recommends that lung or intermediate window settings should be used to detect and measure the solid components of subsolid nodules (</span><a class="" data-dcnode-id="2862" data-tab="pane-pcw-Figures" href="#fig15a" id="fig15aR"><span data-dcnode-id="2863" instrument_node="">Fig 15</span></a><span data-dcnode-id="2861" instrument_node="">).</span></p><figure class="article__inlineFigure figure" data-dcnode-id="2832" id="fig15a"><img alt="Figure 15a." class="figure__image" data-dcnode-id="2859" data-lg-src="/cms/10.1148/rg.2018170081/asset/images/large/rg.2018170081.fig15a.jpeg" data-src="/cms/10.1148/rg.2018170081/asset/images/medium/rg.2018170081.fig15a.gif" loading="lazy" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//pubs.rsna.org/cms/10.1148/rg.2018170081/asset/images/medium/rg.2018170081.fig15a.gif&amp;raw" title=""><figcaption data-dcnode-id="2840"><strong data-dcnode-id="2858"></strong><span class="figure__caption hlFld-FigureCaption" data-dcnode-id="2841"><p data-dcnode-id="2842"><span class="captionLabel" data-dcnode-id="2856"><span data-dcnode-id="2857" instrument_node="">Figure 15a.</span></span><span data-dcnode-id="2855" instrument_node=""> Measurement of part-solid lesions. Axial contrast-enhanced multidetector CT images of the right hemithorax of a 78-year-old woman show a part-solid nodule in the right upper lobe compatible with biopsy-proven invasive adenocarcinoma. </span><b data-dcnode-id="2853"><span data-dcnode-id="2854" instrument_node="">(a)</span></b><span data-dcnode-id="2852" instrument_node=""> Image shows measurement of the entire lesion; the focal diameter </span><i data-dcnode-id="2850"><span data-dcnode-id="2851" instrument_node="">(F)</span></i><span data-dcnode-id="2849" instrument_node=""> is 34.1 mm (dashed line). </span><b data-dcnode-id="2847"><span data-dcnode-id="2848" instrument_node="">(b)</span></b><span data-dcnode-id="2846" instrument_node=""> Image shows measurement of the diameter of the solid component (</span><i data-dcnode-id="2844"><span data-dcnode-id="2845" instrument_node="">C</span></i><span data-dcnode-id="2843" instrument_node=""> = 12.0 mm; dashed line). The IASLC recommends that the measurement of the solid component of part-solid lesions, representing the invasive component of the tumor, should be used to define its T classification. Investigators have demonstrated that this measurement better predicts prognosis than the overall tumor size in lepidic-predominant adenocarcinomas.</span></p></span></figcaption><strong class="hidden-lg hidden-md hidden-sm visible-xs" data-dcnode-id="2838"><span data-dcnode-id="2839" instrument_node="">Figure 15a.</span></strong><div class="figure-extra" data-dcnode-id="2833"><a class="ppt-figure-link" data-dcnode-id="2836" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//pubs.rsna.org/action/downloadFigures%3Fid%3Dfig15a%26doi%3D10.1148%252Frg.2018170081"><span data-dcnode-id="2837" instrument_node="">Download as PowerPoint</span></a><a data-dcnode-id="2834" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//images.rsna.org/index.html%3Fdoi%3D10.1148/rg.2018170081%26fig%3Dfig15a" target="_blank"><span data-dcnode-id="2835" instrument_node="">Open in Image
                    Viewer
                </span></a></div></figure><figure class="article__inlineFigure figure" data-dcnode-id="2804" id="fig15b"><img alt="Figure 15b." class="figure__image" data-dcnode-id="2831" data-lg-src="/cms/10.1148/rg.2018170081/asset/images/large/rg.2018170081.fig15b.jpeg" data-src="/cms/10.1148/rg.2018170081/asset/images/medium/rg.2018170081.fig15b.gif" loading="lazy" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//pubs.rsna.org/cms/10.1148/rg.2018170081/asset/images/medium/rg.2018170081.fig15b.gif&amp;raw" title=""><figcaption data-dcnode-id="2812"><strong data-dcnode-id="2830"></strong><span class="figure__caption hlFld-FigureCaption" data-dcnode-id="2813"><p data-dcnode-id="2814"><span class="captionLabel" data-dcnode-id="2828"><span data-dcnode-id="2829" instrument_node="">Figure 15b.</span></span><span data-dcnode-id="2827" instrument_node=""> Measurement of part-solid lesions. Axial contrast-enhanced multidetector CT images of the right hemithorax of a 78-year-old woman show a part-solid nodule in the right upper lobe compatible with biopsy-proven invasive adenocarcinoma. </span><b data-dcnode-id="2825"><span data-dcnode-id="2826" instrument_node="">(a)</span></b><span data-dcnode-id="2824" instrument_node=""> Image shows measurement of the entire lesion; the focal diameter </span><i data-dcnode-id="2822"><span data-dcnode-id="2823" instrument_node="">(F)</span></i><span data-dcnode-id="2821" instrument_node=""> is 34.1 mm (dashed line). </span><b data-dcnode-id="2819"><span data-dcnode-id="2820" instrument_node="">(b)</span></b><span data-dcnode-id="2818" instrument_node=""> Image shows measurement of the diameter of the solid component (</span><i data-dcnode-id="2816"><span data-dcnode-id="2817" instrument_node="">C</span></i><span data-dcnode-id="2815" instrument_node=""> = 12.0 mm; dashed line). The IASLC recommends that the measurement of the solid component of part-solid lesions, representing the invasive component of the tumor, should be used to define its T classification. Investigators have demonstrated that this measurement better predicts prognosis than the overall tumor size in lepidic-predominant adenocarcinomas.</span></p></span></figcaption><strong class="hidden-lg hidden-md hidden-sm visible-xs" data-dcnode-id="2810"><span data-dcnode-id="2811" instrument_node="">Figure 15b.</span></strong><div class="figure-extra" data-dcnode-id="2805"><a class="ppt-figure-link" data-dcnode-id="2808" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//pubs.rsna.org/action/downloadFigures%3Fid%3Dfig15b%26doi%3D10.1148%252Frg.2018170081"><span data-dcnode-id="2809" instrument_node="">Download as PowerPoint</span></a><a data-dcnode-id="2806" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//images.rsna.org/index.html%3Fdoi%3D10.1148/rg.2018170081%26fig%3Dfig15b" target="_blank"><span data-dcnode-id="2807" instrument_node="">Open in Image
                    Viewer
                </span></a></div></figure><p data-dcnode-id="2796"><span data-dcnode-id="2803" instrument_node="">Several approaches have been proposed for the evaluation of part-solid lesions with several solid components. One proposal is similar to that for microinvasive breast cancer, in which the single largest focus of invasion is measured, and the other solid components are cataloged but not measured (</span><a class="tab-link" data-dcnode-id="2801" data-tab="pane-pcw-references" href="#r45" id="r45R"><span data-dcnode-id="2802" instrument_node="">45</span></a><span data-dcnode-id="2800" instrument_node="">). Kadota et al (</span><a class="tab-link" data-dcnode-id="2798" data-tab="pane-pcw-references" href="#r46" id="r46R"><span data-dcnode-id="2799" instrument_node="">46</span></a><span data-dcnode-id="2797" instrument_node="">) proposed a different approach for characterizing the invasive component of part-solid adenocarcinomas on histopathologic slides, in which all invasive components were measured and the sum expressed as a percentage of the overall tumor size. However, this approach has not been evaluated in the context of multidetector CT. Therefore, the IASLC recommends that the long-axis measurement of the largest solid component should be identified. If this measurement exceeds 5 mm, then invasion is likely.</span></p><div class="anchor-spacer" data-dcnode-id="2795" id="ac_i50"></div><h2 class="article-section__title section__title" data-dcnode-id="2793" id="_i50"><span data-dcnode-id="2794" instrument_node="">Limitations</span></h2><p data-dcnode-id="2785"><span data-dcnode-id="2792" instrument_node="">Although TNM-8 represents continued advancement from prior staging systems, several limitations persist. Although the database used for the updated staging project is large and includes lung cancer cases from around the world, it can be considered a convenience sample of available data (</span><a class="tab-link" data-dcnode-id="2790" data-tab="pane-pcw-references" href="#r47" id="r47R"><span data-dcnode-id="2791" instrument_node="">47</span></a><span data-dcnode-id="2789" instrument_node="">). Specifically, geographic regions other than Europe and Asia and nonsurgically managed patients are underrepresented in the database (</span><a class="tab-link" data-dcnode-id="2787" data-tab="pane-pcw-references" href="#r47" id="r47R"><span data-dcnode-id="2788" instrument_node="">47</span></a><span data-dcnode-id="2786" instrument_node="">). However, the results of both internal and external validation demonstrated the transportability of the data. For instance, TNM-8 has been externally validated against the National Cancer Database in the United States, a database that principally includes nonsurgically managed patients.</span></p><p data-dcnode-id="2777"><span data-dcnode-id="2784" instrument_node="">Finally, although differences in survival have been demonstrated across the updated descriptors and stage groups, it is important to remember that many other elements are ultimately involved with prognosis, including patient-related factors (performance status, age, comorbidities), tumor-related factors (histologic subtype, grade), environment-related factors (access to care, quality of care), and treatment-related factors (treatment regimen, response to therapy) (</span><a class="tab-link" data-dcnode-id="2782" data-tab="pane-pcw-references" href="#r47" id="r47R"><span data-dcnode-id="2783" instrument_node="">47</span></a><span data-dcnode-id="2781" instrument_node="">,</span><a class="tab-link" data-dcnode-id="2779" data-tab="pane-pcw-references" href="#r48" id="r48R"><span data-dcnode-id="2780" instrument_node="">48</span></a><span data-dcnode-id="2778" instrument_node="">).</span></p><div class="anchor-spacer" data-dcnode-id="2776" id="ac_i51"></div><h2 class="article-section__title section__title" data-dcnode-id="2774" id="_i51"><span data-dcnode-id="2775" instrument_node="">Conclusion</span></h2><p data-dcnode-id="2772"><span data-dcnode-id="2773" instrument_node="">Revisions to the TNM staging system have been made on the basis of important differences in patient survival resulting from detailed analyses of a new large lung cancer database. Key changes include further modifications to the T and M classifications on the basis of 1-cm thresholds for the primary tumor; grouping of tumors resulting in atelectasis or pneumonitis of a lobe or an entire lung; grouping of tumors involving a main bronchus; reassignment of diaphragmatic invasion; elimination of mediastinal pleural invasion; and further subdivision of metastatic disease into descriptors that are based on the number and sites of metastases. These changes have resulted in modifications to stage groups, with new groups created and others modified. In addition, TNM-8 introduces new recommendations regarding the staging of lung cancers with multiple pulmonary sites of involvement and new guidelines for tumor measurement. Understanding the key revisions introduced in TNM-8 will allow radiologists to accurately stage lung cancer and optimize patient management.</span></p><strong data-dcnode-id="2770"><span data-dcnode-id="2771" instrument_node="">Disclosures of Conflicts of Interest.—</span></strong><strong data-dcnode-id="2768"><span data-dcnode-id="2769" instrument_node="">J.P.L.</span></strong><i data-dcnode-id="2766"><span data-dcnode-id="2767" instrument_node="">Activities related to the present article:</span></i><span data-dcnode-id="2765" instrument_node=""> disclosed no relevant relationships. </span><i data-dcnode-id="2763"><span data-dcnode-id="2764" instrument_node="">Activities not related to the present article:</span></i><span data-dcnode-id="2762" instrument_node=""> royalties from Elsevier and Amirsys. </span><i data-dcnode-id="2760"><span data-dcnode-id="2761" instrument_node="">Other activities:</span></i><span data-dcnode-id="2759" instrument_node=""> disclosed no relevant relationships.</span><div class="fn-group" data-dcnode-id="2752"><span class="NLM_fn" data-dcnode-id="2756"><p data-dcnode-id="2757"><span data-dcnode-id="2758" instrument_node="">Recipient of a Certificate of Merit award for an education exhibit at the 2016 RSNA Annual Meeting.</span></p></span><span class="NLM_fn" data-dcnode-id="2753"><p data-dcnode-id="2754"><span data-dcnode-id="2755" instrument_node="">For this journal-based SA-CME activity, the author J.P.L. has provided disclosures (see “Disclosures of Conflicts of Interest”); all other authors, the editor, and the reviewers have disclosed no relevant relationships.</span></p></span></div></div><h2 class="article-section__title section__title" data-dcnode-id="2748" id="d1051977e1history"><span data-dcnode-id="2749" instrument_node="">Article History</span></h2><span data-dcnode-id="2747" instrument_node="">Received: Apr 7 2017</span><br data-dcnode-id="2746"><span data-dcnode-id="2745" instrument_node="">Revision requested: Sept 8 2017</span><br data-dcnode-id="2744"><span data-dcnode-id="2743" instrument_node="">Revision received: Oct 31 2017</span><br data-dcnode-id="2742"><span data-dcnode-id="2741" instrument_node="">Accepted: Nov 14 2017</span><br data-dcnode-id="2740"><span data-dcnode-id="2739" instrument_node="">Published online: Mar 12 2018</span><br data-dcnode-id="2738"><span data-dcnode-id="2737" instrument_node="">Published in print: Mar  2018</span><br data-dcnode-id="2736"></div><div class="article__body-dropzone" data-dcnode-id="2511"><span data-dcnode-id="2732" instrument_node="">

0detailed%252520analysis%252520of%252520a%252520new%252520large%252520international%252520database%252520of%252520lung%252520cancer%252520cases%252520assembled%252520by%252520the%252520IASLC%252520for%252520the%252520purposes%252520of%252520this%252520project.%252520Fundamental%252520changes%252520incorporated%252520into%252520TNM-8%252520include%252520%28a%29%252520modifications%252520to%252520the%252520T%252520classification%252520on%252520the%252520basis%252520of%2525201-cm%252520increments%252520in%252520tumor%252520size%25253B%252520%28b%29%252520grouping%252520of%252520lung%252520cancers%252520that%252520result%252520in%252520partial%252520or%252520complete%252520lung%252520atelectasis%252520or%252520pneumonitis%25253B%252520%28c%29%252520grouping%252520of%252520tumors%252520with%252520involvement%252520of%252520a%252520main%252520bronchus%252520irrespective%252520of%252520distance%252520from%252520the%252520carina%25253B%252520%28d%29%252520reassignment%252520of%252520diaphragmatic%252520invasion%252520in%252520terms%252520of%252520T%252520classification%25253B%252520%28e%29%252520elimination%252520of%252520mediastinal%252520pleural%252520invasion%252520from%252520the%252520T%252520classification%25253B%252520and%252520%28f%29%252520subdivision%252520of%252520the%252520M%252520classification%252520into%252520different%252520descriptors%252520on%252520the%252520basis%252520of%252520the%252520number%252520and%252520site%252520of%252520extrathoracic%252520metastases.%252520In%252520response%252520to%252520these%252520revisions%25252C%252520established%252520stage%252520groups%252520have%252520been%252520modified%25252C%252520and%252520others%252520have%252520been%252520created.%252520In%252520addition%25252C%252520recommendations%252520for%252520classifying%252520patterns%252520of%252520disease%252520that%252520result%252520in%252520multiple%252520sites%252520of%252520pulmonary%252520involvement%25252C%252520including%252520multiple%252520primary%252520lung%2525
