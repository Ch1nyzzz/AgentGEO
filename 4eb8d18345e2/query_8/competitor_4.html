chopen"><span data-dcnode-id="3014" instrument_node="">About</span></a></li><li data-dcnode-id="3007" data-v-b33947ae=""><a class="nav-item" data-dcnode-id="3009" data-v-b33947ae="" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.intechopen.com/news"><span data-dcnode-id="3010" instrument_node="">News</span></a></li></ul></nav><aside class="aside" data-dcnode-id="2996" data-v-b33947ae=""><ul data-dcnode-id="3001" data-v-b33947ae=""><li data-dcnode-id="3002" data-v-b33947ae=""><a class="nav-item" data-dcnode-id="3003" data-v-b33947ae="" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//mts.intechopen.com/account/login" target="_blank"><span data-dcnode-id="3004" instrument_node="">Author Panel Sign in</span></a></li></ul><form class="search-term" data-dcnode-id="2997" data-v-36b4823c="" data-v-b33947ae=""><input data-dcnode-id="3000" data-v-36b4823c="" placeholder="Search" required="required"><button class="icr iconSearch" data-dcnode-id="2998" data-v-36b4823c="" type="submit"><span data-dcnode-id="2999" instrument_node="">Submit</span></button></form></aside><div class="nav-dropdown collapsed" data-dcnode-id="2964" data-v-b33947ae=""><div class="inner" data-dcnode-id="2965" data-v-b33947ae=""><div class="drop-box" data-dcnode-id="2991" data-v-b33947ae=""><a class="drop-item" data-dcnode-id="2994" data-v-b33947ae="" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.intechopen.com/how-open-access-publishing-with-intechopen-works"><span data-dcnode-id="2995" instrument_node="">What is Open Access?</span></a><p data-dcnode-id="2992" data-v-b33947ae=""><span data-dcnode-id="2993" instrument_node="">Open Access is an initiative that aims to make scientific research freely available to all. To date our community has made over 100 million downloads. It’s based on principles of collaboration, unobstructed discovery, and, most importantly, scientific progression. As PhD students, we found it difficult to access the research we needed, so we decided to create a new Open Access publisher that levels the playing field for scientists across the world. How? By making research easy to access, and puts the academic needs of the researchers before the business interests of publishers.</span></p></div><div class="drop-box" data-dcnode-id="2986" data-v-b33947ae=""><a class="drop-item" data-dcnode-id="2989" data-v-b33947ae="" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.intechopen.com/authors-and-editors"><span data-dcnode-id="2990" instrument_node="">Our authors and editors</span></a><p data-dcnode-id="2987" data-v-b33947ae=""><span data-dcnode-id="2988" instrument_node="">We are a community of more than 103,000 authors and editors from 3,291 institutions spanning 160 countries, including Nobel Prize winners and some of the world’s most-cited researchers. Publishing on IntechOpen allows authors to earn citations and find new collaborators, meaning more people see your work not only from your own field of study, but from other related fields too.</span></p></div><div class="drop-box" data-dcnode-id="2977" data-v-b33947ae=""><a class="drop-item" data-dcnode-id="2984" data-v-b33947ae="" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.intechopen.com/page/content-alerts"><span data-dcnode-id="2985" instrument_node="">Content Alerts</span></a><p data-dcnode-id="2982" data-v-b33947ae=""><span data-dcnode-id="2983" instrument_node="">Brief introduction to this section that descibes Open Access especially from an IntechOpen perspective</span></p><a class="nav-item" data-dcnode-id="2980" data-v-b33947ae="" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.intechopen.com/how-open-access-publishing-with-intechopen-works"><span data-dcnode-id="2981" instrument_node="">How it works</span></a><a class="nav-item" data-dcnode-id="2978" data-v-b33947ae="" href="#"><span data-dcnode- ""><span data-dcnode-id="2524" instrument_node="">*Address all correspondence to: Johnson.bruce@mayo.edu</span></p></div></div><div class="reader-body reader-body" data-dcnode-id="1582" data-v-2206b564="" data-v-e85dd3ce=""><span data-dcnode-id="2519" instrument_node="">
</span><div class="section" data-dcnode-id="2487" data-lvl="1" id="sec_1"><span data-dcnode-id="2518" instrument_node="">
</span><h2 class="heading main-title" data-dcnode-id="2516"><span data-dcnode-id="2517" instrument_node="">1. Introduction</span></h2><span data-dcnode-id="2515" instrument_node="">
</span><p data-dcnode-id="2513" id="P1"><span data-dcnode-id="2514" instrument_node="">While often overlooked by traditional echocardiography, the lungs and evaluation of extravascular lung water (EVLW) can be assessed by direct visualization with relatively simple ultrasonographic techniques. The results can help guide clinicians towards the cause of a patient’s dyspnea and in the case of pulmonary edema even semi-quantitatively asses EVLW. Additionally the exam can be repeated as often as necessary to monitor response to treatment without fear of subjecting the patient to ionizing radiation associated with conventional chest radiography.</span></p><span data-dcnode-id="2512" instrument_node="">
</span><p data-dcnode-id="2495" id="P2"><span data-dcnode-id="2511" instrument_node="">Advancing technology has allowed for increasingly miniaturized and portable ultrasound systems to the point where exams can be performed quickly at the bedside, often by the rounding physician. The more common standard of care for quantifying pulmonary edema has been a chest radiograph which, depending on the institution, may require more time to perform and a more formal interpretation than a portable ultrasound [</span><a class="ref-link" data-dcnode-id="2509" data-ref-style="bibr" href="#B1"><span data-dcnode-id="2510" instrument_node="">1</span></a><span data-dcnode-id="2508" instrument_node="">]. Even when it is obtained, chest radiograph can have a low sensitivity for common causes of dyspnea such as pulmonary edema [</span><a class="ref-link" data-dcnode-id="2506" data-ref-style="bibr" href="#B2"><span data-dcnode-id="2507" instrument_node="">2</span></a><span data-dcnode-id="2505" instrument_node="">, </span><a class="ref-link" data-dcnode-id="2503" data-ref-style="bibr" href="#B3"><span data-dcnode-id="2504" instrument_node="">3</span></a><span data-dcnode-id="2502" instrument_node="">]. This may be due in part to poor radiographic windows of the patient or the intraobserver variability and skills of those interpreting the x-ray [</span><a class="ref-link" data-dcnode-id="2500" data-ref-style="bibr" href="#B4"><span data-dcnode-id="2501" instrument_node="">4</span></a><span data-dcnode-id="2499" instrument_node="">, </span><a class="ref-link" data-dcnode-id="2497" data-ref-style="bibr" href="#B5"><span data-dcnode-id="2498" instrument_node="">5</span></a><span data-dcnode-id="2496" instrument_node="">]. In the case of acute pulmonary edema, the practitioner using techniques of lung ultrasound, can actually visualize the edema, classify it semi-quantitatively, and prescribe interventions before other traditional diagnostic techniques such as chest radiograph can even occur.</span></p><span data-dcnode-id="2494" instrument_node="">
</span><p data-dcnode-id="2489" id="P3"><span data-dcnode-id="2493" instrument_node="">The lung ultrasound finding of “Comet Tails” has been well studied in how it relates to alveolar-interstitial syndromes. These syndromes include conditions with diffuse involvement of the pulmonary interstitium which lead to respiratory distress through impairment of alveolar-capillary exchange. Chronic conditions include pulmonary fibrosis, whereas acute entities are acute respiratory distress syndrome (ARDS), interstitial pneumonia, and acute pulmonary edema [</span><a class="ref-link" data-dcnode-id="2491" data-ref-style="bibr" href="#B5"><span data-dcnode-id="2492" instrument_node="">5</span></a><span data-dcnode-id="2490" instrument_node="">]. With careful attention paid by the examiner at the bedside to the patient’s history and monitoring the response to treatment, the ultrasonographic finding of comet tails can be extremely useful in narrowing the differential diagnosis. </span></p><span data-dcnode-id="2488" instrument_node="">
</span></div><span data-dcnode-id="2486" instrument_node="">

.3-2.4,1.4-4.4L172.1,82.1z" data-dcnode-id="2221"></path></svg><svg class="jw-svg-icon jw-svg-icon-fullscreen-on" data-dcnode-id="2218" focusable="false" viewBox="0 0 240 240" xmlns="http://www.w3.org/2000/svg"><path d="M96.3,186.1c1.9,1.9,1.3,4-1.4,4.4l-50.6,8.4c-1.8,0.5-3.7-0.6-4.2-2.4c-0.2-0.6-0.2-1.2,0-1.7l8.4-50.6c0.4-2.7,2.4-3.4,4.4-1.4l14.5,14.5l28.2-28.2l14.3,14.3l-28.2,28.2L96.3,186.1z M195.8,39.1l-50.6,8.4c-2.7,0.4-3.4,2.4-1.4,4.4l14.5,14.5l-28.2,28.2l14.3,14.3l28.2-28.2l14.5,14.5c1.9,1.9,4,1.3,4.4-1.4l8.4-50.6c0.5-1.8-0.6-3.6-2.4-4.2C197,39,196.4,39,195.8,39.1L195.8,39.1z" data-dcnode-id="2219"></path></svg><div class="jw-reset-text jw-tooltip jw-tooltip-fullscreen" data-dcnode-id="2216" dir="auto"><div class="jw-text" data-dcnode-id="2217"></div></div></div></div></div></div></div><div class="afs_ads ad-placement" data-dcnode-id="2209" style="width: 1px; height: 1px; position: absolute; background: transparent;"><span data-dcnode-id="2210" instrument_node="">&nbsp;</span></div></div><h2 class="heading main-title" data-dcnode-id="2206"><span data-dcnode-id="2207" instrument_node="">2. Definitions</span></h2><span data-dcnode-id="2205" instrument_node="">
</span><p data-dcnode-id="2200" id="preF1"><span data-dcnode-id="2204" instrument_node="">“A-lines and B-lines” are two separate and distinct ultrasonographic images which may be seen during examination of the lungs by ultrasound (See </span><a class="ref-link" data-dcnode-id="2202" data-ref-style="fig" href="#F1"><span data-dcnode-id="2203" instrument_node="">Figures 1</span></a><span data-dcnode-id="2201" instrument_node=""> &amp;2). Their presence is not mutually exclusive, but the formation of each arises from a different underlying structure. </span></p><span data-dcnode-id="2199" instrument_node="">
</span><figure class="media-panel" data-dcnode-id="2189" id="F1"><div class="media" data-dcnode-id="2197"><img alt="" class="figure-link" data-dcnode-id="2198" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.intechopen.com/media/chapter/44070/media/image1_w.jpg&amp;raw"></div><figcaption class="caption" data-dcnode-id="2190"><h4 data-dcnode-id="2195"><span data-dcnode-id="2196" instrument_node="">Figure 1.</span></h4><p data-dcnode-id="2194"></p><p data-dcnode-id="2192" xmlns:mml="http://www.w3.org/1998/Math/MathML" xmlns:sym="http://www.w3.org/2012/symbol" xmlns:xlink="http://www.w3.org/1999/xlink" xmlns:xsi="http://www.w3.org/2001/XMLSchema-instance"><span data-dcnode-id="2193" instrument_node="">Image of comet tail “B-lines”</span></p><p data-dcnode-id="2191"></p></figcaption></figure><span data-dcnode-id="2188" instrument_node="">
</span><figure class="media-panel" data-dcnode-id="2178" id="F2"><div class="media" data-dcnode-id="2186"><img alt="" class="figure-link" data-dcnode-id="2187" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.intechopen.com/media/chapter/44070/media/image2_w.jpg&amp;raw"></div><figcaption class="caption" data-dcnode-id="2179"><h4 data-dcnode-id="2184"><span data-dcnode-id="2185" instrument_node="">Figure 2.</span></h4><p data-dcnode-id="2183"></p><p data-dcnode-id="2181" xmlns:mml="http://www.w3.org/1998/Math/MathML" xmlns:sym="http://www.w3.org/2012/symbol" xmlns:xlink="http://www.w3.org/1999/xlink" xmlns:xsi="http://www.w3.org/2001/XMLSchema-instance"><span data-dcnode-id="2182" instrument_node="">Image of pleural “A-lines.”</span></p><p data-dcnode-id="2180"></p></figcaption></figure><span data-dcnode-id="2177" instrument_node="">
</span><p data-dcnode-id="2154" id="P5"><span data-dcnode-id="2176" instrument_node="">Comet-tails or “B-lines” are defined as hyperechoic reflections which originate only from and travel roughly perpendicular to the pleural line of the lung. They have a narrow base and form a ray spreading away from the transducer towards the bottom of the screen and synchronously move with lung respiration. All ultrasound images are formed when a reflection occurs at the interface of two regions with differing acoustic impedance [</span><a class="ref-link" data-dcnode-id="2174" data-ref-style="bibr" href="#B6"><span data-dcnode-id="2175" instrument_node="">6</span></a><span data-dcnode-id="2173" instrument_node="">]. In the case of comet tails this impedance occurs between fluid filled interlobular septa, with the acoustic impedance of water being 1.48x10</span><sup data-dcnode-id="2171"><span data-dcnode-id="2172" instrument_node="">5</span></sup><span data-dcnode-id="2170" instrument_node="">gp/cm</span><sup data-dcnode-id="2168"><span data-dcnode-id="2169" instrument_node="">2</span></sup><span data-dcnode-id="2167" instrument_node=""> and that of an air filled lung with the acoustic impedance of air being of 0.0004x10</span><sup data-dcnode-id="2165"><span data-dcnode-id="2166" instrument_node="">5</span></sup><span data-dcnode-id="2164" instrument_node="">gp/cm</span><sup data-dcnode-id="2162"><span data-dcnode-id="2163" instrument_node="">2</span></sup><span data-dcnode-id="2161" instrument_node="">. Interlobular septa are structures within the lung containing lymphatic vessels. These septa are below the resolution of the ultrasound beam, which can only detect objects larger than 1 mm. Instead of showing up as a distinct structure, in the right circumstances the areas of highly different acoustic impedance show up as a comet tail [</span><a class="ref-link" data-dcnode-id="2159" data-ref-style="bibr" href="#B7"><span data-dcnode-id="2160" instrument_node="">7</span></a><span data-dcnode-id="2158" instrument_node="">,</span><a class="ref-link" data-dcnode-id="2156" data-ref-style="bibr" href="#B8"><span data-dcnode-id="2157" instrument_node="">8</span></a><span data-dcnode-id="2155" instrument_node="">]. </span></p><span data-dcnode-id="2153" instrument_node="">
</span><p data-dcnode-id="2148" id="P6"><span data-dcnode-id="2152" instrument_node="">Under normal (non-edematous or fibrotic) conditions comet tails are absent because no acoustic mismatch occurs as the beam passes through the subpleural space. However, in conditions known as alveolar-interstitial syndromes an area of high acoustic mismatch occurs at the subpleural space were interlobular septa are in contact with the pleural lining. In the case of pulmonary edema this mismatch occurs between the differing impedances of air and water, however it can also occur anytime there is an area of differing impedances at the surface of the lungs such as pleuritis, fibrosis, or even chronic obstructive pulmonary disease [</span><a class="ref-link" data-dcnode-id="2150" data-ref-style="bibr" href="#B9"><span data-dcnode-id="2151" instrument_node="">9</span></a><span data-dcnode-id="2149" instrument_node="">]. </span></p><span data-dcnode-id="2147" instrument_node="">
</span><p data-dcnode-id="2136" id="preF3"><span data-dcnode-id="2146" instrument_node="">Even though these structures are smaller than the resolution of the ultrasound beam, the reflections cans still be generated and sent back to the ultrasound probe. Continued reflections set up the phenomenon of reverberation which acts as a continued source of reflections back to the piezoelectric crystal. Since the ultrasound interprets time as distance, and each successive echo or return to the transducer occurs over a more distant time than the original signal, the ultrasound interprets these signals as reflections from a structure more distal from the ultrasound probe [</span><a class="ref-link" data-dcnode-id="2144" data-ref-style="bibr" href="#B6"><span data-dcnode-id="2145" instrument_node="">6</span></a><span data-dcnode-id="2143" instrument_node="">]. In this way a “beam” or comet tail image is created on the echo screen. (See </span><a class="ref-link" data-dcnode-id="2141" data-ref-style="fig" href="#F3"><span data-dcnode-id="2142" instrument_node="">Figure 3)</span></a><span data-dcnode-id="2140" instrument_node=""> Histologically the interlobular septa are 7 mm apart when they reach the sub pleural space and this is roughly the distance between the origins of individual comet tails at the pleural line [</span><a class="ref-link" data-dcnode-id="2138" data-ref-style="bibr" href="#B7"><span data-dcnode-id="2139" instrument_node="">7</span></a><span data-dcnode-id="2137" instrument_node="">].</span></p><span data-dcnode-id="2135" instrument_node="">
</span><figure class="media-panel" data-dcnode-id="2125" id="F3"><div class="media" data-dcnode-id="2133"><img alt="" class="figure-link" data-dcnode-id="2134" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.intechopen.com/media/chapter/44070/media/image3.jpeg&amp;raw"></div><figcaption class="caption" data-dcnode-id="2126"><h4 data-dcnode-id="2131"><span data-dcnode-id="2132" instrument_node="">Figure 3.</span></h4><p data-dcnode-id="2130"></p><p data-dcnode-id="2128" xmlns:mml="http://www.w3.org/1998/Math/MathML" xmlns:sym="http://www.w3.org/2012/symbol" xmlns:xlink="http://www.w3.org/1999/xlink" xmlns:xsi="http://www.w3.org/2001/XMLSchema-instance"><span data-dcnode-id="2129" instrument_node="">The hypothesized physical and anatomic basis of echocardiographic lung comet tails. Reflections of the ultrasound beam between thickened interlobular septa and the pleura generate a resonance signal over a prolonged time. The increased return over time is interpreted by the ultrasound machine as a hyperechoic structure originating deeper in the tissue and is displayed as a comet-tail on the ultrasound screen. (Illustrations and images from Jambrik et al. Usefulness of ultrasound lung comets as a nonradiologic sign of extravascular lung water. Am J Cardiol 2004;93:1265-1270, with permission from Excerpta Medica, Inc.)</span></p><p data-dcnode-id="2127"></p></figcaption></figure><span data-dcnode-id="2124" instrument_node="">
</span><figure class="media-panel" data-dcnode-id="2114" id="F4"><div class="media" data-dcnode-id="2122"><img alt="" class="figure-link" data-dcnode-id="2123" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.intechopen.com/media/chapter/44070/media/image4.jpeg&amp;raw"></div><figcaption class="caption" data-dcnode-id="2115"><h4 data-dcnode-id="2120"><span data-dcnode-id="2121" instrument_node="">Figure 4.</span></h4><p data-dcnode-id="2119"></p><p data-dcnode-id="2117" xmlns:mml="http://www.w3.org/1998/Math/MathML" xmlns:sym="http://www.w3.org/2012/symbol" xmlns:xlink="http://www.w3.org/1999/xlink" xmlns:xsi="http://www.w3.org/2001/XMLSchema-instance"><span data-dcnode-id="2118" instrument_node="">Proposed algorithm for use of lung comet tails in the evaluation of patients with acute dyspnea. In the case of pulmonary edema, serial ultrasonographic exams performed after therapeutic intervention(s) will reveal a diminishing number of comet tails. This algorithm is suggested as a possible supplement for typical clinical assessment in the decision making process.</span></p><p data-dcnode-id="2116"></p></figcaption></figure><span data-dcnode-id="2113" instrument_node="">
</span><p data-dcnode-id="2102" id="P8"><span data-dcnode-id="2112" instrument_node="">For the comet tail image to form, these thickened intralobular septa must be in contact with the sub pleural space as any air between them and the transducer has such a low acoustic impedance that the echo return takes too long and is simply “cancelled out” by the machine. (This is the reason lung comets are not seen in pneumothorax and can aid in the diagnosis of that condition.) [</span><a class="ref-link" data-dcnode-id="2110" data-ref-style="bibr" href="#B6"><span data-dcnode-id="2111" instrument_node="">6</span></a><span data-dcnode-id="2109" instrument_node="">] In a traditional chest radiograph these septa thickened by pulmonary edema are termed “Kerley B-lines” [</span><a class="ref-link" data-dcnode-id="2107" data-ref-style="bibr" href="#B10"><span data-dcnode-id="2108" instrument_node="">10</span></a><span data-dcnode-id="2106" instrument_node="">, </span><a class="ref-link" data-dcnode-id="2104" data-ref-style="bibr" href="#B11"><span data-dcnode-id="2105" instrument_node="">11</span></a><span data-dcnode-id="2103" instrument_node="">].</span></p><span data-dcnode-id="2101" instrument_node="">
</span><p data-dcnode-id="2096" id="P9"><span data-dcnode-id="2100" instrument_node="">A-Lines are another distinct ultrasonographic entity separate from the “B-line” comet tails. A-lines are hyperechoic lines which run roughly horizontal across the ultrasound screen and are parallel to the pleural line. These lines are equidistant to each other and are the same distance from each other as the pleural line is from the skin because they are reverberations of the pleural line. Again the ultrasound machine interprets the signals it receives temporally from the reverberations as depth. Hence the reflections are seen as lines deeper on the screen. The presence of A-lines, and absence of B-lines indicates the presence of “dry” intralobular septa and is a strong predictor of a normal capillary wedge pressure [</span><a class="ref-link" data-dcnode-id="2098" data-ref-style="bibr" href="#B12"><span data-dcnode-id="2099" instrument_node="">12</span></a><span data-dcnode-id="2097" instrument_node="">].</span></p><span data-dcnode-id="2095" instrument_node="">
</span></div><span data-dcnode-id="2093" instrument_node="">
</span><div class="section" data-dcnode-id="2024" data-lvl="1" id="sec_3"><span data-dcnode-id="2092" instrument_node="">
</span><a class="ads-link" data-dcnode-id="2090" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//ehealthcaresolutions.com/contact-us/" target="_blank"><span data-dcnode-id="2091" instrument_node="">Advertisement</span></a><span data-dcnode-id="2089" instrument_node="">
</span><div class="ads" data-dcnode-id="2088" id="intechopen-intechopen-3"></div><h2 class="heading main-title" data-dcnode-id="2086"><span data-dcnode-id="2087" instrument_node="">3. History and origins</span></h2><span data-dcnode-id="2085" instrument_node="">
</span><p data-dcnode-id="2074" id="P10"><span data-dcnode-id="2084" instrument_node="">The “comet-tail” ultrasonographic sign was first described by Ziskin and colleagues in 1982 when an intrahepatic shotgun pellet was observed to create an artifact similar to what is seen in lung comets [</span><a class="ref-link" data-dcnode-id="2082" data-ref-style="bibr" href="#B8"><span data-dcnode-id="2083" instrument_node="">8</span></a><span data-dcnode-id="2081" instrument_node="">]. Other conditions affecting the pleura of the lung were later noted to create a similar pattern [</span><a class="ref-link" data-dcnode-id="2079" data-ref-style="bibr" href="#B9"><span data-dcnode-id="2080" instrument_node="">9</span></a><span data-dcnode-id="2078" instrument_node="">]. However it was not until 1997 when Daniel Lichtenstein, a French critical care physician, described lung comet tails as an ultrasonographic sign of alveolar-interstitial syndrome. In his paper he examined 250 patients, 121 with evidence of either wide-spread (N=92) or localized (N=29) evidence of alveolar-interstitial syndrome on chest x-ray and 129 patients with a normal chest radiograph. He found the sensitivity of ultrasound in detecting this pattern was 93.4% with a specificity of 93.0% in patients who did not have evidence for this on chest x-ray [</span><a class="ref-link" data-dcnode-id="2076" data-ref-style="bibr" href="#B7"><span data-dcnode-id="2077" instrument_node="">7</span></a><span data-dcnode-id="2075" instrument_node="">].</span></p><span data-dcnode-id="2073" instrument_node="">
</span><p data-dcnode-id="2068" id="P11"><span data-dcnode-id="2072" instrument_node="">When Lichtenstein compared chest computerized tomography (CT) to the ultrasound findings on 29 of his 250 patients, he found comet tails were generated diffusely across the lungs from two distinct sources. Both of these sources were lesions associated with acute pulmonary edema, thickened sub-pleural interlobular septa and ground-glass regions. Occasionally even “normal” subjects registered the rare comet tail in the diaphragmatic regions of the lung, and this was detected in both x-ray and CT scan [</span><a class="ref-link" data-dcnode-id="2070" data-ref-style="bibr" href="#B7"><span data-dcnode-id="2071" instrument_node="">7</span></a><span data-dcnode-id="2069" instrument_node="">]. </span></p><span data-dcnode-id="2067" instrument_node="">
</span><p data-dcnode-id="2062" id="P12"><span data-dcnode-id="2066" instrument_node="">Clinical applications of comet tails began after Jambrik and colleagues evaluated 121 hospitalized patients with lung ultrasound (see technique below) and compared the findings to chest x-ray. They found a significant linear correlation between a comet tail score (CTS) and x-ray (r=0.78, p&lt;.01). When patients were examined multiple times, an even higher intrapatient correlation was seen (r=0.89; p&lt;0.01). [</span><a class="ref-link" data-dcnode-id="2064" data-ref-style="bibr" href="#B13"><span data-dcnode-id="2065" instrument_node="">13</span></a><span data-dcnode-id="2063" instrument_node="">] </span></p><span data-dcnode-id="2061" instrument_node="">
</span><p data-dcnode-id="2050" id="P13"><span data-dcnode-id="2060" instrument_node="">Lichtenstein and Jambrik’s observations were expanded to the medical in-patient setting by Tsereva who validated the technique in patients with diastolic heart failure [</span><a class="ref-link" data-dcnode-id="2058" data-ref-style="bibr" href="#B14"><span data-dcnode-id="2059" instrument_node="">14</span></a><span data-dcnode-id="2057" instrument_node="">] and by Volpicelli, who validated the use of ultrasound in diagnosis alveolar interstitial syndrome with a 85.7% sensitivity and 97.7% specificity. The lower sensitivity in the later study can be explained by the timing of the x-ray and the ultrasounds. The chest radiographs which the ultrasounds were compared to were taken at admission and guided the treatment given, whereas the lung ultrasounds were done after the initiation of therapy. Thus for some patients the lack of comet tails was merely the resolution of pulmonary edema, but in the analysis resulted in a lower sensitivity of the ultrasound technique [</span><a class="ref-link" data-dcnode-id="2055" data-ref-style="bibr" href="#B5"><span data-dcnode-id="2056" instrument_node="">5</span></a><span data-dcnode-id="2054" instrument_node="">]. Other researchers further validated lung ultrasound and have suggested that it is superior to chest x-ray with sensitivities similar to Nt-proBNP levels [</span><a class="ref-link" data-dcnode-id="2052" data-ref-style="bibr" href="#B15"><span data-dcnode-id="2053" instrument_node="">15</span></a><span data-dcnode-id="2051" instrument_node="">]. Nt-proBNP (N-terminal probrain type natriuretic peptide) has become a common biomarker for fluid overload and tracking health status in heart failure patients. However, fluid overload may not always correlate with interstitial pulmonary edema and thus may be a marker primarily of vascular fluid overload.</span></p><span data-dcnode-id="2049" instrument_node="">
</span><p data-dcnode-id="2038" id="P14"><span data-dcnode-id="2048" instrument_node="">In an effort to help quantify the number of comet tails seen on exam, Agricola et al. evaluated post-cardiac surgery patients. They devised a relatively simple definition for a positive or negative comet tail exam. A positive comet tail test was simply multiple bilateral comet tails seen over the whole lung surface. A negative test was with the rare occasional comet tail, the absence of comet tails, or comet tails confined to the last intercostals space. They then compared the patient’s comet tail test to the amount of extravascular lung water (EVLW) determined by Pulse Contour Cardiac Output (PiCCO - is an invasive technique requiring catheters and uses principals of transpulmonary thermodilution and arterial pulse contour analysis in order to estimate extravascular lung water), to the patient’s wedge pressure, and to their radiologic score as determined by chest x-ray. Again good correlation was seen between the radiologic assessment of EVLW and comet tails (r=0.60, p&lt;0.0001) and also when compared to wedge pressure (r=0.48, p&lt;0.0001). Most useful was the comparison to EVLW. Normal EVLW is &lt;500 mL with alveolar flooding occurring when EVLW reaches more than 75% above its normal limit [</span><a class="ref-link" data-dcnode-id="2046" data-ref-style="bibr" href="#B16"><span data-dcnode-id="2047" instrument_node="">16</span></a><span data-dcnode-id="2045" instrument_node="">, </span><a class="ref-link" data-dcnode-id="2043" data-ref-style="bibr" href="#B17"><span data-dcnode-id="2044" instrument_node="">17</span></a><span data-dcnode-id="2042" instrument_node="">]. With this in mind, the negative test had a 90% sensitivity and 89% specificity of accurately detecting an EVLW volume &lt;500 mL. Likewise a positive test had a 90% and 86% sensitivity and specificity of detecting EVLW &gt;500 mL. When comparing the comet tail test to chest radiographs and PiCCO, they found they were even able to detect excess EVLW below the threshold which would cause alveolar edema (sub clinical or early stages of pulmonary edema) with 87% and 89% sensitivity and specificity [</span><a class="ref-link" data-dcnode-id="2040" data-ref-style="bibr" href="#B11"><span data-dcnode-id="2041" instrument_node="">11</span></a><span data-dcnode-id="2039" instrument_node="">]. </span></p><span data-dcnode-id="2037" instrument_node="">
</span><p data-dcnode-id="2026" id="P15"><span data-dcnode-id="2036" instrument_node="">Monitoring EVLW through the formation of lung comet tails was shown to be even more important than knowing a patients overall volume status. Using bioelectric impedance Mallamaci demonstrated that in dialysis patients, overall volume status was not linked to pulmonary congestion and the formation of comet tails. Rather Comet tails, and pulmonary congestion, had more to do with a patient’s left ventricular function. They also demonstrated the ability of comet tails to detect patient who were asymptomatic as 57% of patients had moderate to severe pulmonary congestion but did not have symptoms suggesting such [</span><a class="ref-link" data-dcnode-id="2034" data-ref-style="bibr" href="#B18"><span data-dcnode-id="2035" instrument_node="">18</span></a><span data-dcnode-id="2033" instrument_node="">]. This is in keeping with Lichtenstein’s original paper which discussed a patient with a fat embolism who had the sonographic sign of comet tails three days before symptoms occurred [</span><a class="ref-link" data-dcnode-id="2031" data-ref-style="bibr" href="#B7"><span data-dcnode-id="2032" instrument_node="">7</span></a><span data-dcnode-id="2030" instrument_node="">] and in older literature which argued that alveolar edema, which would lead to symptoms, is preceded by interstitial edema (which may or may not cause symptoms but can now be detected by ultrasound) [</span><a class="ref-link" data-dcnode-id="2028" data-ref-style="bibr" href="#B19"><span data-dcnode-id="2029" instrument_node="">19</span></a><span data-dcnode-id="2027" instrument_node="">].</span></p><span data-dcnode-id="2025" instrument_node="">
</span></div><span data-dcnode-id="2023" instrument_node="">
</span><div class="section" data-dcnode-id="1776" data-lvl="1" id="sec_4"><span data-dcnode-id="2022" instrument_node="">
</span><a class="ads-link" data-dcnode-id="2020" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//ehealthcaresolutions.com/contact-us/" target="_blank"><span data-dcnode-id="2021" instrument_node="">Advertisement</span></a><span data-dcnode-id="2019" instrument_node="">
</span><div class="ads" data-dcnode-id="2018" id="intechopen-intechopen-4"></div><h2 class="heading main-title" data-dcnode-id="2016"><span data-dcnode-id="2017" instrument_node="">4. Technique</span></h2><span data-dcnode-id="2015" instrument_node="">
</span><p data-dcnode-id="2001" id="P16"><span data-dcnode-id="2014" instrument_node="">The standard technique for quantification of comet tails has been reported in a number of studies and was pioneered by Picano and colleagues [</span><a class="ref-link" data-dcnode-id="2012" data-ref-style="bibr" href="#B9"><span data-dcnode-id="2013" instrument_node="">9</span></a><span data-dcnode-id="2011" instrument_node="">,</span><a class="ref-link" data-dcnode-id="2009" data-ref-style="bibr" href="#B13"><span data-dcnode-id="2010" instrument_node="">13</span></a><span data-dcnode-id="2008" instrument_node="">, </span><a class="ref-link" data-dcnode-id="2006" data-ref-style="bibr" href="#B11"><span data-dcnode-id="2007" instrument_node="">11</span></a><span data-dcnode-id="2005" instrument_node="">]. This technique has shown its utility clinically as used by the Himalayan Rescue Association to help diagnose and monitor the degree of pulmonary edema in high-altitude pulmonary edema (HAPE). [</span><a class="ref-link" data-dcnode-id="2003" data-ref-style="bibr" href="#B20"><span data-dcnode-id="2004" instrument_node="">20</span></a><span data-dcnode-id="2002" instrument_node="">]</span></p><span data-dcnode-id="2000" instrument_node="">
</span><p data-dcnode-id="1995" id="P17"><span data-dcnode-id="1999" instrument_node="">The exam is performed using any commercially available portable ultrasound device which has a 1-7 MHz phased array probe. We recommend the use of the 1-5 MHz cardiac probe as it is ideal for viewing between rib spaces and still allows deep enough penetration of the ultrasound beam to view distal structures. Other groups have also found adequate views with the high frequency linear probes as well as the abdominal probes as well [</span><a class="ref-link" data-dcnode-id="1997" data-ref-style="bibr" href="#B21"><span data-dcnode-id="1998" instrument_node="">21</span></a><span data-dcnode-id="1996" instrument_node="">]. </span></p><span data-dcnode-id="1994" instrument_node="">
</span><p data-dcnode-id="1989" id="preT1"><span data-dcnode-id="1993" instrument_node="">The patient is placed in a supine or near supine position with the anterior chest wall exposed. Each intercostals space from the second to the fifth on the right and the second to the fourth on the left is scanned in four different positions. These are para-sternal, midclavicular, anterior axillary, and mid-axillary. This gives the examiner a total of 28 different windows to examine, 16 on the right and 12 on the left (See graphic representation </span><a class="ref-link" data-dcnode-id="1991" data-ref-style="table" href="#T1"><span data-dcnode-id="1992" instrument_node="">Table 1)</span></a><span data-dcnode-id="1990" instrument_node="">. </span></p><span data-dcnode-id="1988" instrument_node="">

</span><p data-dcnode-id="1899" id="preT2"><span data-dcnode-id="1906" instrument_node="">Within each window, comet tails as defined above are counted. The sum of the comet tails seen can then be compiled for a comet tail score (CTS). The intra- and interobserver variability using this method has been reported as 5.1% and 7.4% respectively [</span><a class="ref-link" data-dcnode-id="1904" data-ref-style="bibr" href="#B13"><span data-dcnode-id="1905" instrument_node="">13</span></a><span data-dcnode-id="1903" instrument_node="">]. For clinical purposes Picano and colleges report the comet tail score in a semiquantitative manner for patients in pulmonary edema (</span><a class="ref-link" data-dcnode-id="1901" data-ref-style="table" href="#T2"><span data-dcnode-id="1902" instrument_node="">Table 2)</span></a><span data-dcnode-id="1900" instrument_node="">.</span></p><span data-dcnode-id="1898" instrument_node="">

data-dcnode-id="1827" rowspan="1"><span data-dcnode-id="1828" instrument_node="">3</span></td><td align="left" border-bottom="0.5" border-left="0" border-right="0" border-top="0.5" colspan="1" data-dcnode-id="1824" rowspan="1"><span data-dcnode-id="1825" instrument_node="">"/&gt;30</span></td><td align="left" border-bottom="0.5" border-left="0" border-right="0" border-top="0.5" colspan="1" data-dcnode-id="1821" rowspan="1"><span data-dcnode-id="1822" instrument_node="">Severe</span></td></tr></tbody></table></div><div class="table-caption" data-dcnode-id="1808"><h3 class="heading" data-dcnode-id="1813"><span data-dcnode-id="1814" instrument_node="">Table 2.</span></h3><div class="text" data-dcnode-id="1810"><p data-dcnode-id="1811"><span data-dcnode-id="1812" instrument_node="">Semiquantitive classification of the Comet Tail Score (CTS)as proposed by Picano and colleagues.</span></p></div><div class="text" data-dcnode-id="1809"></div></div></div><span data-dcnode-id="1806" instrument_node="">
</span><div class="section" data-dcnode-id="1778" data-lvl="2" id="sec_4_2"><span data-dcnode-id="1805" instrument_node="">
</span><h3 class="heading section-title" data-dcnode-id="1803"><span data-dcnode-id="1804" instrument_node="">4.1. Other techniques</span></h3><span data-dcnode-id="1802" instrument_node="">
</span><p data-dcnode-id="1797" id="P20"><span data-dcnode-id="1801" instrument_node="">Simpler less quantitative techniques have also been described with good prediction of pulmonary edema. Volpicelli and colleagues described a technique where each hemithorax is divided into four quadrants (8 total), upper and lower anterior and upper and lower lateral divided longitudinally by the anterior axillary line and transversely by the 2</span><sup data-dcnode-id="1799"><span data-dcnode-id="1800" instrument_node="">nd</span></sup><span data-dcnode-id="1798" instrument_node=""> intercostal space. An exam was considered abnormal (positive for edema) if it had all of the following features: </span></p><span data-dcnode-id="1796" instrument_node="">
</span><ol data-dcnode-id="1786" style="list-style-type: order;"><li data-dcnode-id="1793"><p data-dcnode-id="1794" id="L1"><span data-dcnode-id="1795" instrument_node="">At least three comet tails per scan. </span></p></li><li data-dcnode-id="1790"><p data-dcnode-id="1791" id="L2"><span data-dcnode-id="1792" instrument_node="">Diffusely positive with more than one scan per side containing comet tails. </span></p></li><li data-dcnode-id="1787"><p data-dcnode-id="1788" id="L3"><span data-dcnode-id="1789" instrument_node="">Bilateral presence of comet tails. </span></p></li></ol><span data-dcnode-id="1785" instrument_node="">
</span><p data-dcnode-id="1780" id="P21"><span data-dcnode-id="1784" instrument_node="">By using these criteria this group found a 85.7% sensitivity and 97.7% specificity when compared to chest x-ray for detecting the presence of pulmonary edema [</span><a class="ref-link" data-dcnode-id="1782" data-ref-style="bibr" href="#B5"><span data-dcnode-id="1783" instrument_node="">5</span></a><span data-dcnode-id="1781" instrument_node="">].</span></p><span data-dcnode-id="1779" instrument_node="">
</span></div><span data-dcnode-id="1777" instrument_node="">
</span></div><span data-dcnode-id="1775" instrument_node="">
</span><div class="section" data-dcnode-id="1670" data-lvl="1" id="sec_6"><span data-dcnode-id="1774" instrument_node="">
</span><a class="ads-link" data-dcnode-id="1772" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//ehealthcaresolutions.com/contact-us/" target="_blank"><span data-dcnode-id="1773" instrument_node="">Advertisement</span></a><span data-dcnode-id="1771" instrument_node="">
</span><div class="ads" data-dcnode-id="1770" id="intechopen-intechopen-6"></div><h2 class="heading main-title" data-dcnode-id="1768"><span data-dcnode-id="1769" instrument_node="">5. Application and differential diagnosis</span></h2><span data-dcnode-id="1767" instrument_node="">
</span><p data-dcnode-id="1753" id="P22"><span data-dcnode-id="1766" instrument_node="">The presence of occasional sporadic comet tails can be a normal finding. Typically these are limited to the last lateral intercostals space above the diaphragm with a hot spot often seen on the right most caudal anterior axillary window [</span><a class="ref-link" data-dcnode-id="1764" data-ref-style="bibr" href="#B22"><span data-dcnode-id="1765" instrument_node="">22</span></a><span data-dcnode-id="1763" instrument_node="">, </span><a class="ref-link" data-dcnode-id="1761" data-ref-style="bibr" href="#B9"><span data-dcnode-id="1762" instrument_node="">9</span></a><span data-dcnode-id="1760" instrument_node="">]. Care must be taken, however, in attributing a hot spot in the lower lateral windows to a benign finding, as local lung consolidation from diseases such as ARDS, atelectasis, or pneumonia can exhibit this pattern. [</span><a class="ref-link" data-dcnode-id="1758" data-ref-style="bibr" href="#B22"><span data-dcnode-id="1759" instrument_node="">22</span></a><span data-dcnode-id="1757" instrument_node="">, </span><a class="ref-link" data-dcnode-id="1755" data-ref-style="bibr" href="#B11"><span data-dcnode-id="1756" instrument_node="">11</span></a><span data-dcnode-id="1754" instrument_node="">]. In those cases, the clinical presentation of dyspnea with other physical signs and symptoms such as low oxygen saturations and fever should be used to help differentiate “normal” from diseased state. With the case of patients presenting with dyspnea, the pathologic state should be considered present until “ruled out” with other diagnostic modalities. However in the research arena where “healthy” subjects may be tested, the pre-test probability that comet tails localized to the last lateral intercostals spaces are normal, is high. </span></p><span data-dcnode-id="1752" instrument_node="">
</span><p data-dcnode-id="1744" id="P23"><span data-dcnode-id="1751" instrument_node="">A diffuse bilateral comet tail pattern is not considered normal and is indicative of alveolar-interstitial syndromes (AIS). These can be brought about by a number of disease entities including chronic conditions such as pulmonary fibrosis, and acute entities such as acute respiratory distress syndrome (ARDS), interstitial pneumonia, and acute pulmonary edema [</span><a class="ref-link" data-dcnode-id="1749" data-ref-style="bibr" href="#B5"><span data-dcnode-id="1750" instrument_node="">5</span></a><span data-dcnode-id="1748" instrument_node="">]. Different clinical presentations can help elucidate the etiology of these different diseases which have the same comet tail pattern. The time course of the illness can differentiate chronic causes such as pulmonary fibrosis and acute causes such as pulmonary edema. Additionally slight variations in the pattern of comet tails are noted. In the case of a fibrotic lung, the comet tails are equal in both hemi thoraces, whereas in cardiac pulmonary edema they are bilateral but with a predilection for the right hemi-thorax. Also in the fibrotic lung comet tails are more patchy than in pulmonary edema, and are stable with diuretic therapy [</span><a class="ref-link" data-dcnode-id="1746" data-ref-style="bibr" href="#B9"><span data-dcnode-id="1747" instrument_node="">9</span></a><span data-dcnode-id="1745" instrument_node="">]. </span></p><span data-dcnode-id="1743" instrument_node="">
</span><p data-dcnode-id="1729" id="P24"><span data-dcnode-id="1742" instrument_node="">Highly dense entities such as ARDS typically give rise to comet tails only in regions where the diseased lung is in contact with the sub-pleural space. These highly dense areas give rise to multiple comet tails less than 3 mm apart, whereas comet tails arising from thickened interlobular septa are 7 mm apart [</span><a class="ref-link" data-dcnode-id="1740" data-ref-style="bibr" href="#B23"><span data-dcnode-id="1741" instrument_node="">23</span></a><span data-dcnode-id="1739" instrument_node="">]. Additionally an ARDS pattern also gives rise to comet tails in focal areas which coalesce together and form comet tails of differing lengths and multiple irregular comet tails [</span><a class="ref-link" data-dcnode-id="1737" data-ref-style="bibr" href="#B7"><span data-dcnode-id="1738" instrument_node="">7</span></a><span data-dcnode-id="1736" instrument_node="">, </span><a class="ref-link" data-dcnode-id="1734" data-ref-style="bibr" href="#B23"><span data-dcnode-id="1735" instrument_node="">23</span></a><span data-dcnode-id="1733" instrument_node="">, </span><a class="ref-link" data-dcnode-id="1731" data-ref-style="bibr" href="#B1"><span data-dcnode-id="1732" instrument_node="">1</span></a><span data-dcnode-id="1730" instrument_node="">]. </span></p><span data-dcnode-id="1728" instrument_node="">
</span><p data-dcnode-id="1723" id="P25"><span data-dcnode-id="1727" instrument_node="">Importantly comet tails which arise from pulmonary edema should respond to treatment and disappear as interventions are made [</span><a class="ref-link" data-dcnode-id="1725" data-ref-style="bibr" href="#B18"><span data-dcnode-id="1726" instrument_node="">18</span></a><span data-dcnode-id="1724" instrument_node="">]. If they do not, then an alternate diagnosis should be sought. This reenforces the need for serial exams many authors encourage repeat exams to monitor response to therapy.</span></p><span data-dcnode-id="1722" instrument_node="">
</span><p data-dcnode-id="1708" id="P26"><span data-dcnode-id="1721" instrument_node="">Since the presence of the occasional comet tail is considered normal, the lack of comet tails can be diagnostic as well. Comet tail formation requires an area of differing acoustic impedances, when this is not present no comet tails are created. Such is the case of a pneumothorax. In examining for this potential emergent condition, an additional ultrasonographic sign must be viewed, that of the “sliding lung sign.” This is the hyperechoic line which is the interface between the visceral and parietal pleura. This line will slide back and forth with respiration. When there is no sliding of this line, and an absence of comet tails, a pneumothorax should be suspected [</span><a class="ref-link" data-dcnode-id="1719" data-ref-style="bibr" href="#B24"><span data-dcnode-id="1720" instrument_node="">24</span></a><span data-dcnode-id="1718" instrument_node="">]. The is particularly helpful when some studies show that standard chest x-ray, in addition to taking longer, misses 30% of cases [</span><a class="ref-link" data-dcnode-id="1716" data-ref-style="bibr" href="#B25"><span data-dcnode-id="1717" instrument_node="">25</span></a><span data-dcnode-id="1715" instrument_node="">-</span><a class="ref-link" data-dcnode-id="1713" data-ref-style="bibr" href="#B27"><span data-dcnode-id="1714" instrument_node="">27</span></a><span data-dcnode-id="1712" instrument_node="">]. This is contrasted to the lung ultrasound which in a large meta-analysis and systematic review looked at 8 studies representing 1,048 patients. When using both the absence of lung comet tails and sliding lung sign ultrasound was 90.9% sensitive and 98.2% specific in making the diagnosis of pneumothorax. In the same analysis chest radiograph was only 50.2% sensitive, but with a similar specificity of 99.4% [</span><a class="ref-link" data-dcnode-id="1710" data-ref-style="bibr" href="#B28"><span data-dcnode-id="1711" instrument_node="">28</span></a><span data-dcnode-id="1709" instrument_node="">].</span></p><span data-dcnode-id="1707" instrument_node="">
</span><p data-dcnode-id="1687" id="P27"><span data-dcnode-id="1706" instrument_node="">In patients with minimal comet tails confined to the intercostal space above the diaphragm, or no comet tails present on lung ultrasound, but who otherwise present with dyspnea, other common diagnoses should be considered. These include COPD, acute bronchitis, and pulmonary embolism [</span><a class="ref-link" data-dcnode-id="1704" data-ref-style="bibr" href="#B1"><span data-dcnode-id="1705" instrument_node="">1</span></a><span data-dcnode-id="1703" instrument_node="">]. The issue of COPD is a special consideration which has been studied by at least three groups. In the initial comet tail paper, Lichtenstein observed that COPD could give rise to a fibrotic pattern, bilateral comet tails [</span><a class="ref-link" data-dcnode-id="1701" data-ref-style="bibr" href="#B7"><span data-dcnode-id="1702" instrument_node="">7</span></a><span data-dcnode-id="1700" instrument_node="">]. However later work performed by the same author comparing ultrasound to x-ray diagnosis suggested that the presence of diffuse bilateral comet tails was absent in 92% of patient with COPD (N=26) and absent or confined only to the laster intercostal space in 98.75% of patients without respiratory disorder (N=80). The two patients in the COPD group who had a positive test (the false positives) had pneumonia in the regions viewed as positive on ultrasound. In the patients without respiratory symptoms, one patient demonstrated a positive test. Interestingly even though he did not have any symptoms, that one patient was admitted for acute renal failure requiring urgent dialysis, again supporting the idea that ultrasound findings occur before symptoms [</span><a class="ref-link" data-dcnode-id="1698" data-ref-style="bibr" href="#B22"><span data-dcnode-id="1699" instrument_node="">22</span></a><span data-dcnode-id="1697" instrument_node="">]. Additional studies also support the lack of findings of comet tails in COPD exacerbations. In fact in one study looking at the presence of comet tails in patients with acute shortness of breath, the most common discharge diagnosis of patients who did not exhibit bilateral diffuse comet tails was COPD [</span><a class="ref-link" data-dcnode-id="1695" data-ref-style="bibr" href="#B1"><span data-dcnode-id="1696" instrument_node="">1</span></a><span data-dcnode-id="1694" instrument_node="">, </span><a class="ref-link" data-dcnode-id="1692" data-ref-style="bibr" href="#B18"><span data-dcnode-id="1693" instrument_node="">18</span></a><span data-dcnode-id="1691" instrument_node="">, </span><a class="ref-link" data-dcnode-id="1689" data-ref-style="bibr" href="#B21"><span data-dcnode-id="1690" instrument_node="">21</span></a><span data-dcnode-id="1688" instrument_node="">].</span></p><span data-dcnode-id="1686" instrument_node="">
</span><p data-dcnode-id="1672" id="P28"><span data-dcnode-id="1685" instrument_node="">Overall this technique allows for the rapid assessment of patients in respiratory distress and can take less than three minutes [</span><a class="ref-link" data-dcnode-id="1683" data-ref-style="bibr" href="#B9"><span data-dcnode-id="1684" instrument_node="">9</span></a><span data-dcnode-id="1682" instrument_node="">, </span><a class="ref-link" data-dcnode-id="1680" data-ref-style="bibr" href="#B15"><span data-dcnode-id="1681" instrument_node="">15</span></a><span data-dcnode-id="1679" instrument_node="">]. When used for detecting pulmonary edema, it has nearly a 95% concordance with chest radiographs [</span><a class="ref-link" data-dcnode-id="1677" data-ref-style="bibr" href="#B1"><span data-dcnode-id="1678" instrument_node="">1</span></a><span data-dcnode-id="1676" instrument_node="">] and, as discussed above, may be more sensitive than chest radiograph for this diagnosis [</span><a class="ref-link" data-dcnode-id="1674" data-ref-style="bibr" href="#B15"><span data-dcnode-id="1675" instrument_node="">15</span></a><span data-dcnode-id="1673" instrument_node="">]. A gross recognition of the comet tail pattern present, as well as the patient’s history and response to treatment can guide the clinician to the correct diagnosis. In terms of application, bedside ultrasound in many emergency departments and intensive care units is readily available. </span></p><span data-dcnode-id="1671" instrument_node="">
</span></div><span data-dcnode-id="1669" instrument_node="">
</span><div class="section" data-dcnode-id="1628" data-lvl="1" id="sec_7"><span data-dcnode-id="1668" instrument_node="">
</span><a class="ads-link" data-dcnode-id="1666" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//ehealthcaresolutions.com/contact-us/" target="_blank"><span data-dcnode-id="1667" instrument_node="">Advertisement</span></a><span data-dcnode-id="1665" instrument_node="">
</span><div class="ads" data-dcnode-id="1664" id="intechopen-intechopen-7"></div><h2 class="heading main-title" data-dcnode-id="1662"><span data-dcnode-id="1663" instrument_node="">6. Special situations</span></h2><span data-dcnode-id="1661" instrument_node="">
</span><p data-dcnode-id="1659" id="P29"><span data-dcnode-id="1660" instrument_node="">Due to its ease of use, portability and relative low cost, this technology is ideally suited for remote research and clinical applications. In fact a bedside ultrasound is the only diagnostic imaging currently used on the International Space Station. </span></p><span data-dcnode-id="1658" instrument_node="">
</span><p data-dcnode-id="1641" id="preF5"><span data-dcnode-id="1657" instrument_node="">Research applications have used the ultrasonographic finding of comet tails to monitor pulmonary edema in healthy volunteers subjected to extreme environments. These include ironman athletes, breath-hold deep divers, and mountain climbers [</span><a class="ref-link" data-dcnode-id="1655" data-ref-style="bibr" href="#B29"><span data-dcnode-id="1656" instrument_node="">29</span></a><span data-dcnode-id="1654" instrument_node="">]. Due to the remote nature of the conditions, ultrasound is especially useful in mountaineering where up to 10% of climbers above 4,000 M develop the life-threatening condition known as High Altitude Pulmonary Edema [</span><a class="ref-link" data-dcnode-id="1652" data-ref-style="bibr" href="#B30"><span data-dcnode-id="1653" instrument_node="">30</span></a><span data-dcnode-id="1651" instrument_node="">]. (See </span><a class="ref-link" data-dcnode-id="1649" data-ref-style="fig" href="#F5"><span data-dcnode-id="1650" instrument_node="">Figure 5)</span></a><span data-dcnode-id="1648" instrument_node=""> At an altitude of 4,240 M Fagenholz, using the CTS technique described in this chapter, showed that a CTS score of 35 +/- 11 corresponded to patients suffering from HAPE which differed from those who were short of breath from other causes who had a CTS of 12 +/-6.8 [</span><a class="ref-link" data-dcnode-id="1646" data-ref-style="bibr" href="#B20"><span data-dcnode-id="1647" instrument_node="">20</span></a><span data-dcnode-id="1645" instrument_node="">]. Others have shown that in the presence of normal left ventricular function and normal pulmonary artery pressures, sojourners above 4790 m can develop pulmonary edema with a corresponding decrease in oxygen saturation. The comet tails describe in these studies had right lung predominance [</span><a class="ref-link" data-dcnode-id="1643" data-ref-style="bibr" href="#B31"><span data-dcnode-id="1644" instrument_node="">31</span></a><span data-dcnode-id="1642" instrument_node="">]. When used in the high altitude environment, care should be taken to ensure that the device employed uses solid state storage. This is found on most modern portable ultrasounds. Non-solid state devices cool using fans which will over heat at extreme altitudes. </span></p><span data-dcnode-id="1640" instrument_node="">
</span><figure class="media-panel" data-dcnode-id="1630" id="F5"><div class="media" data-dcnode-id="1638"><img alt="" class="figure-link" data-dcnode-id="1639" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.intechopen.com/media/chapter/44070/media/image5.jpg&amp;raw"></div><figcaption class="caption" data-dcnode-id="1631"><h4 data-dcnode-id="1636"><span data-dcnode-id="1637" instrument_node="">Figure 5.</span></h4><p data-dcnode-id="1635"></p><p data-dcnode-id="1633" xmlns:mml="http://www.w3.org/1998/Math/MathML" xmlns:sym="http://www.w3.org/2012/symbol" xmlns:xlink="http://www.w3.org/1999/xlink" xmlns:xsi="http://www.w3.org/2001/XMLSchema-instance"><span data-dcnode-id="1634" instrument_node="">Author (DS) demonstrating the ease of use and portability of modern ultrasound systems by performing an assessment of EVLW at the base camp of Mt Everest, ele 5,364 M, on an elite climber.</span></p><p data-dcnode-id="1632"></p></figcaption></figure><span data-dcnode-id="1629" instrument_node="">
</span></div><span data-dcnode-id="1627" instrument_node="">
</span><div class="section" data-dcnode-id="1597" data-lvl="1" id="sec_8"><span data-dcnode-id="1626" instrument_node="">
</span><a class="ads-link" data-dcnode-id="1624" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//ehealthcaresolutions.com/contact-us/" target="_blank"><span data-dcnode-id="1625" instrument_node="">Advertisement</span></a><span data-dcnode-id="1623" instrument_node="">
</span><div class="ads" data-dcnode-id="1622" id="intechopen-intechopen-8"></div><h2 class="heading main-title" data-dcnode-id="1620"><span data-dcnode-id="1621" instrument_node="">7. Conclusion</span></h2><span data-dcnode-id="1619" instrument_node="">
</span><p data-dcnode-id="1605" id="P31"><span data-dcnode-id="1618" instrument_node="">Although dyspnea is a leading cause of hospital admission, determining its etiology and subsequent treatment remains one of the greatest diagnostic challenges a clinicians faces. While many have lamented the perceived loss of physical exam skills amongst practitioners, the traditional lung exam and classic findings heard on auscultation are often difficult to hear in a noisy intensive care unit or emergency department [</span><a class="ref-link" data-dcnode-id="1616" data-ref-style="bibr" href="#B32"><span data-dcnode-id="1617" instrument_node="">32</span></a><span data-dcnode-id="1615" instrument_node="">, </span><a class="ref-link" data-dcnode-id="1613" data-ref-style="bibr" href="#B33"><span data-dcnode-id="1614" instrument_node="">33</span></a><span data-dcnode-id="1612" instrument_node="">]. Even in ideal circumstances, there is abundant literature to suggest that the physical exam may be inaccurate [</span><a class="ref-link" data-dcnode-id="1610" data-ref-style="bibr" href="#B14"><span data-dcnode-id="1611" instrument_node="">14</span></a><span data-dcnode-id="1609" instrument_node="">, </span><a class="ref-link" data-dcnode-id="1607" data-ref-style="bibr" href="#B15"><span data-dcnode-id="1608" instrument_node="">15</span></a><span data-dcnode-id="1606" instrument_node="">]. This leads the clinician to rely on adjuncts to aid in diagnosis. </span></p><span data-dcnode-id="1604" instrument_node="">
</span><p data-dcnode-id="1602" id="P32"><span data-dcnode-id="1603" instrument_node="">In the case of dyspnea, chest radiograph are typically employed to help narrow the differential diagnosis. However even these can be fraught with difficulties including time to obtain, and read the x-ray. Fortunately the field of ultrasound and echocardiography has greatly expanded in the past 20 years. The lung ultrasound finding of comet tails can help guide therapeutic interventions, and unlike chest radiograph, the exam can be repeated without fear of increased radiation exposure. </span></p><span data-dcnode-id="1601" instrument_node="">
</span><p data-dcnode-id="1599" id="P33"><span data-dcnode-id="1600" instrument_node="">With the advent of small bedside machines, lung ultrasound techniques can become an extension of the physical exam. These exams can be repeated as often as necessary in response to changing clinical conditions. In this way ultrasonographers can guide real-time decision making for patient care. </span></p><span data-dcnode-id="1598" instrument_node="">
</span></div><span data-dcnode-id="1596" instrument_node="">
</span><div class="section" data-dcnode-id="1584" data-lvl="1" id="sec_9"><span data-dcnode-id="1595" instrument_node="">
