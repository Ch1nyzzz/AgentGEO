ed with diseases in the lab simulation, they had normal lung volumes but obstructive flow volume loops, indicating COPD. Lung volume loops are also important for diagnosing patients, but flow volume loops are more important because if a patient is sick, they will (almost) always have abnormal flow volume loops, whereas a patient could be sick and still have normal lung volume.</span></span></a></div></div></div></div></div></div></div><div class="SetPageTerms-term" data-dcnode-id="1048"><div class="SetPageTerm" data-dcnode-id="1049"><div class="SetPageTerm-inner" data-dcnode-id="1050"><div class="SetPageTerm-contentWrapper" data-dcnode-id="1051"><div class="SetPageTerm-content" data-dcnode-id="1052"><div class="SetPageTerm-side" data-dcnode-id="1058"><div class="SetPageTerm-sideContent" data-dcnode-id="1059"><a class="SetPageTerm-wordText" data-dcnode-id="1060"><span class="TermText notranslate lang-en" data-dcnode-id="1061"><span data-dcnode-id="1062" instrument_node="">Which of the statements correctly describes the vital capacity?</span></span></a></div></div><div class="SetPageTerm-side SetPageTerm-largeSide" data-dcnode-id="1053"><div class="SetPageTerm-sideContent" data-dcnode-id="1054"><a class="SetPageTerm-definitionText" data-dcnode-id="1055"><span class="TermText notranslate lang-en" data-dcnode-id="1056"><span data-dcnode-id="1057" instrument_node="">All the air that can be exhaled after a full inhalation</span></span></a></div></div></div></div></div></div></div><div class="SetPageTerms-term" data-dcnode-id="1033"><div class="SetPageTerm" data-dcnode-id="1034"><div class="SetPageTerm-inner" data-dcnode-id="1035"><div class="SetPageTerm-contentWrapper" data-dcnode-id="1036"><div class="SetPageTerm-content" data-dcnode-id="1037"><div class="SetPageTerm-side" data-dcnode-id="1043"><div class="SetPageTerm-sideContent" data-dcnode-id="1044"><a class="SetPageTerm-wordText" data-dcnode-id="1045"><span class="TermText notranslate lang-en" data-dcnode-id="1046">< " data-dcnode-id="738"><span data-dcnode-id="739" instrument_node="">How is Minute Volume (L/min) calculated?</span></span></a></div></div><div class="SetPageTerm-side SetPageTerm-largeSide" data-dcnode-id="730"><div class="SetPageTerm-sideContent" data-dcnode-id="731"><a class="SetPageTerm-definitionText" data-dcnode-id="732"><span class="TermText notranslate lang-en" data-dcnode-id="733"><span data-dcnode-id="734" instrument_node="">tidal volume (L) x respiratory rate (breaths/min)</span></span></a></div></div></div></div></div></div></div><div class="SetPageTerms-term" data-dcnode-id="710"><div class="SetPageTerm" data-dcnode-id="711"><div class="SetPageTerm-inner" data-dcnode-id="712"><div class="SetPageTerm-contentWrapper" data-dcnode-id="713"><div class="SetPageTerm-content" data-dcnode-id="714"><div class="SetPageTerm-side" data-dcnode-id="720"><div class="SetPageTerm-sideContent" data-dcnode-id="721"><a class="SetPageTerm-wordText" data-dcnode-id="722"><span class="TermText notranslate lang-en" data-dcnode-id="723"><span data-dcnode-id="724" instrument_node="">How is respiratory rate (breaths/min) calculated, given minute volume and tidal volume?</span></span></a></div></div><div class="SetPageTerm-side SetPageTerm-largeSide" data-dcnode-id="715"><div class="SetPageTerm-sideContent" data-dcnode-id="716"><a class="SetPageTerm-definitionText" data-dcnode-id="717"><span class="TermText notranslate lang-en" data-dcnode-id="718"><span data-dcnode-id="719" instrument_node="">minute volume (L/min) / tidal volume (L)</span></span></a></div></div></div></div></div></div></div><div class="SetPageTerms-term" data-dcnode-id="695"><div class="SetPageTerm" data-dcnode-id="696"><div class="SetPageTerm-inner" data-dcnode-id="697"><div class="SetPageTerm-contentWrapper" data-dcnode-id="698"><div class="SetPageTerm-content" data-dcnode-id="699"><div class="SetPageTerm-side" data-dcnode-id="705"><div class="SetPageTerm-sideContent" data-dcnode-id="706"><a class="SetPageTerm-wo
