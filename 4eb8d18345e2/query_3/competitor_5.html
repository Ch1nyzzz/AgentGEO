</span><meta content="PURPOSE Approximately 10%-40% of patients with lung cancer report no history of tobacco smoking (never-smokers). We analyzed whole-exome and RNA-sequencing data of 160 tumor and normal lung adenocarcinoma (LUAD) samples from never-smokers to identify clinically actionable alterations and gain insight into the environmental and hereditary risk factors for LUAD among never-smokers. METHODS We performed whole-exome and RNA-sequencing of 88 and 69 never-smoker LUADs. We analyzed these data in conjunction with data from 76 never-smoker and 299 smoker LUAD samples sequenced by The Cancer Genome Atlas and Clinical Proteomic Tumor Analysis Consortium. RESULTS We observed a high prevalence of clinically actionable driver alterations in never-smoker LUADs compared with smoker LUADs (78%-92% v 49.5%; P < .0001). Although a subset of never-smoker samples demonstrated germline alterations in DNA repair genes, the frequency of samples showing germline variants in cancer predisposing genes was comparable between smokers and never-smokers (6.4% v 6.9%; P = .82). A subset of never-smoker samples (5.9%) showed mutation signatures that were suggestive of passive exposure to cigarette smoke. Finally, analysis of RNA-sequencing data showed distinct immune transcriptional subtypes of never-smoker LUADs that varied in their expression of clinically relevant immune checkpoint molecules and immune cell composition. CONCLUSION In this comprehensive genomic and transcriptome analysis of never-smoker LUADs, we observed a potential role for germline variants in DNA repair genes and passive exposure to cigarette smoke in the pathogenesis of a subset of never-smoker LUADs. Our findings also show that clinically actionable driver alterations are highly prevalent in never-smoker LUADs, highlighting the need for obtaining biopsies with adequate cellularity for clinical genomic testing in these patients." data-dcnode-id="3302" property="og:description"><span data-dcnode-id="3301" instrument_node="">

</span><article class="article" data-dcnode-id="1176"><span data-dcnode-id="1489" instrument_node="">
</span><div class="hlFld-Abstract" data-dcnode-id="1438"><a data-dcnode-id="1488" name="abstract"></a><div class="sectionInfo abstractSectionHeading" data-dcnode-id="1485"><h4 class="sectionHeading" data-dcnode-id="1486"><span data-dcnode-id="1487" instrument_node="">Abstract</span></h4></div><div class="abstractSection abstractInFull" data-dcnode-id="1440"><div class="NLM_sec NLM_sec_level_1" data-dcnode-id="1477"><a class="scroll-offset" data-dcnode-id="1483" name="_i1"></a><div class="sectionInfo" data-dcnode-id="1480"><div class="sectionHeading" data-dcnode-id="1481"><span data-dcnode-id="1482" instrument_node="">PURPOSE</span></div></div><p data-dcnode-id="1478"><span data-dcnode-id="1479" instrument_node="">Approximately 10%-40% of patients with lung cancer report no history of tobacco smoking (never-smokers). We analyzed whole-exome and RNA-sequencing data of 160 tumor and normal lung adenocarcinoma (LUAD) samples from never-smokers to identify clinically actionable alterations and gain insight into the environmental and hereditary risk factors for LUAD among never-smokers.</span></p></div><div class="NLM_sec NLM_sec_level_1" data-dcnode-id="1469"><a class="scroll-offset" data-dcnode-id="1475" name="_i2"></a><div class="sectionInfo" data-dcnode-id="1472"><div class="sectionHeading" data-dcnode-id="1473"><span data-dcnode-id="1474" instrument_node="">METHODS</span></div></div><p data-dcnode-id="1470"><span data-dcnode-id="1471" instrument_node="">We performed whole-exome and RNA-sequencing of 88 and 69 never-smoker LUADs. We analyzed these data in conjunction with data from 76 never-smoker and 299 smoker LUAD samples sequenced by The Cancer Genome Atlas and Clinical Proteomic Tumor Analysis Consortium.</span></p></div><div class="NLM_sec NLM_sec_level_1" data-dcnode-id="1449"><a class="scroll-offset" data-dcnode-id="1467" name="_i3"></a><div class="sectionInfo" data-dcnode-id="1464"><div class="sectionHeading" data-dcnode-id="1465"><span data-dcnode-id="1466" instrument_node="">RESULTS</span></div></div><p data-dcnode-id="1450"><span data-dcnode-id="1463" instrument_node="">We observed a high prevalence of clinically actionable driver alterations in never-smoker LUADs compared with smoker LUADs (78%-92% </span><i data-dcnode-id="1461"><span data-dcnode-id="1462" instrument_node="">v</span></i><span data-dcnode-id="1460" instrument_node=""> 49.5%; </span><i data-dcnode-id="1458"><span data-dcnode-id="1459" instrument_node="">P</span></i><span data-dcnode-id="1457" instrument_node=""> &lt; .0001). Although a subset of never-smoker samples demonstrated germline alterations in DNA repair genes, the frequency of samples showing germline variants in cancer predisposing genes was comparable between smokers and never-smokers (6.4% </span><i data-dcnode-id="1455"><span data-dcnode-id="1456" instrument_node="">v</span></i><span data-dcnode-id="1454" instrument_node=""> 6.9%; </span><i data-dcnode-id="1452"><span data-dcnode-id="1453" instrument_node="">P</span></i><span data-dcnode-id="1451" instrument_node=""> = .82). A subset of never-smoker samples (5.9%) showed mutation signatures that were suggestive of passive exposure to cigarette smoke. Finally, analysis of RNA-sequencing data showed distinct immune transcriptional subtypes of never-smoker LUADs that varied in their expression of clinically relevant immune checkpoint molecules and immune cell composition.</span></p></div><div class="NLM_sec NLM_sec_level_1" data-dcnode-id="1441"><a class="scroll-offset" data-dcnode-id="1447" name="_i4"></a><div class="sectionInfo" data-dcnode-id="1444"><div class="sectionHeading" data-dcnode-id="1445"><span data-dcnode-id="1446" instrument_node="">CONCLUSION</span></div></div><p data-dcnode-id="1442"><span data-dcnode-id="1443" instrument_node="">In this comprehensive genomic and transcriptome analysis of never-smoker LUADs, we observed a potential role for germline variants in DNA repair genes and passive exposure to cigarette smoke in the pathogenesis of a subset of never-smoker LUADs. Our findings also show that clinically actionable driver alterations are highly prevalent in never-smoker LUADs, highlighting the need for obtaining biopsies with adequate cellularity for clinical genomic testing in these patients.</span></p></div></div><span data-dcnode-id="1439" instrument_node="">© 2021 by American Society of Clinical Oncology</span></div><div class="NLM_sec NLM_sec-type_context-box NLM_sec_level_2" data-dcnode-id="1411"><div class="head-b" data-dcnode-id="1436"><span data-dcnode-id="1437" instrument_node="">CONTEXT</span></div><p data-dcnode-id="1435"></p><ul class="NLM_list-list_type-simple" data-dcnode-id="1413" style="list-style-type:none"><li data-dcnode-id="1431"><p data-dcnode-id="1432"><b data-dcnode-id="1433"><span data-dcnode-id="1434" instrument_node="">Key Objective</span></b></p></li><li data-dcnode-id="1428"><p data-dcnode-id="1429"><span data-dcnode-id="1430" instrument_node="">To gain a better understanding of the risk factors that might be related to lung cancer in never-smokers, whole-exome and transcriptome data from 160 never-smoker lung cancer samples were examined, in conjunction with whole-exome sequencing data from corresponding normal tissue samples.</span></p></li><li data-dcnode-id="1424"><p data-dcnode-id="1425"><b data-dcnode-id="1426"><span data-dcnode-id="1427" instrument_node="">Knowledge Generated</span></b></p></li><li data-dcnode-id="1421"><p data-dcnode-id="1422"><span data-dcnode-id="1423" instrument_node="">Results from this analysis show that a small subset of never-smoker lung cancer samples contain pathogenic and likely pathogenic germline alterations in DNA repair genes. Additionally, in some instances, tumor cells exhibited mutational signatures characteristic of exposure to cigarette smoke (possibly passive). Never-smoker lung cancers also showed a high prevalence of oncogenic driver alterations and heterogeneity in the expression of immune checkpoint molecules and tumor immune composition.</span></p></li><li data-dcnode-id="1417"><p data-dcnode-id="1418"><b data-dcnode-id="1419"><span data-dcnode-id="1420" instrument_node="">Relevance</span></b></p></li><li data-dcnode-id="1414"><p data-dcnode-id="1415"><span data-dcnode-id="1416" instrument_node="">These results provide an insight into germline alterations associated with never-smoker lung cancers. Furthermore, these results emphasize the need for comprehensive molecular analyses of never-smoker lung cancers in the clinic, given the high prevalence of targetable alterations in these samples.</span></p></li></ul><p data-dcnode-id="1412"></p></div><div data-dcnode-id="1406" id="accessDenialWidget"><div class="pb-dropzone" data-dcnode-id="1409" data-pb-dropzone="accessOptionsDropzone"></div><div class="pb-dropzone" data-dcnode-id="1407" data-pb-dropzone="accessDenialDropzone"></div></div><section class="fn-group section" data-dcnode-id="1401"><strong class="section__title" data-dcnode-id="1404"><span data-dcnode-id="1405" instrument_node="">SUPPORT</span></strong><p data-dcnode-id="1402"><span data-dcnode-id="1403" instrument_node="">Supported by NIH-NHGRI (RKW, 2U54HG00307910). C.G. and H.P. are supported by funding from NCI-EDRN (U01CA214195) The Mesothelioma Biomarker Discovery Laboratory.</span></p></section><div class="NLM_sec NLM_sec-type_data-availability NLM_sec_level_1" data-dcnode-id="1393"><a class="scroll-offset" data-dcnode-id="1399" name="_i25"></a><div class="sectionInfo" data-dcnode-id="1396"><div class="sectionHeading" data-dcnode-id="1397"><span data-dcnode-id="1398" instrument_node="">DATA SHARING STATEMENT</span></div></div><p data-dcnode-id="1394"><span data-dcnode-id="1395" instrument_node="">Deidentified data are provided in the Data Supplement. Sequencing data for external cohort samples, ie, TCGA and CPTAC, are available through previous publications (Campbell JD, Alexandrov A, Kim J, et al: Distinct patterns of somatic genome alterations in lung adenocarcinomas and squamous cell carcinomas. Nat Genet 48:607-616, 2016; and Gillette MA, Satpathy S, Cao S, et al: Proteogenomic characterization reveals therapeutic vulnerabilities in lung adenocarcinoma. Cell 182:200-225.e35, 2020). Sequencing data for institutional cohort samples will be uploaded to dbGaP.</span></p></div><div class="NLM_sec NLM_sec-type_contributed NLM_sec_level_1" data-dcnode-id="1351"><a class="scroll-offset" data-dcnode-id="1391" name="_i26"></a><div class="sectionInfo" data-dcnode-id="1388"><div class="sectionHeading" data-dcnode-id="1389"><span data-dcnode-id="1390" instrument_node="">AUTHOR CONTRIBUTIONS</span></div></div><p data-dcnode-id="1384"><b data-dcnode-id="1386"><span data-dcnode-id="1387" instrument_node="">Conception and design:</span></b><span data-dcnode-id="1385" instrument_node=""> Siddhartha Devarakonda, Yize Li, Robert Fulton, Harvey Pass, Richard K. Wilson, Li Ding, Ramaswamy Govindan</span></p><p data-dcnode-id="1380"><b data-dcnode-id="1382"><span data-dcnode-id="1383" instrument_node="">Financial support:</span></b><span data-dcnode-id="1381" instrument_node=""> Richard K. Wilson, Li Ding</span></p><p data-dcnode-id="1376"><b data-dcnode-id="1378"><span data-dcnode-id="1379" instrument_node="">Administrative support:</span></b><span data-dcnode-id="1377" instrument_node=""> Richard K. Wilson, Ramaswamy Govindan</span></p><p data-dcnode-id="1372"><b data-dcnode-id="1374"><span data-dcnode-id="1375" instrument_node="">Provision of study materials or patients:</span></b><span data-dcnode-id="1373" instrument_node=""> Siddhartha Devarakonda, Saiama N. Waqar, Daniel Morgensztern, Jeffrey Ward, Ignacio Wistuba, Harvey Pass, Ramaswamy Govindan</span></p><p data-dcnode-id="1368"><b data-dcnode-id="1370"><span data-dcnode-id="1371" instrument_node="">Collection and assembly of data:</span></b><span data-dcnode-id="1369" instrument_node=""> Siddhartha Devarakonda, Yize Li, Fernanda Martins Rodrigues, Humam Kadara, Kymber DJournal%252520of%252520Clinical%252520Oncology%2526description%253DPURPOSE%252520Approximately%25252010%252525-40%252525%252520of%252520patients%252520with%252520lung%252520cancer%252520report%252520no%252520history%252520of%252520tobacco%252520smoking%252520%28never-smokers%29.%252520We%252520analyzed%252520whole-exome%252520and%252520RNA-sequencing%252520data%252520of%252520160%252520tumor%252520and%252520normal%252520lung%252520adenocarcinoma%252520%28LUAD%29%252520samples%252520from%252520never-smokers%252520to%252520identify%252520clinically%252520actionable%252520alterations%252520and%252520gain%252520insight%252520into%252520the%252520environmental%252520and%252520hereditary%252520risk%252520factors%252520for%252520LUAD%252520among%252520never-smokers.%252520METHODS%252520We%252520performed%252520whole-exome%252520and%252520RNA-sequencing%252520of%25252088%252520and%25252069%252520never-smoker%252520LUADs.%252520We%252520analyzed%252520these%252520data%252520in%252520conjunction%252520with%252520data%252520from%25252076%252520never-smoker%252520and%252520299%252520smoker%252520LUAD%252520samples%252520sequenced%252520by%252520The%252520Cancer%252520Genome%252520Atlas%252520and%252520Clinical%252520Proteomic%252520Tumor%252520Analysis%252520Consortium.%252520RESULTS%252520We%252520observed%252520a%252520high%252520prevalence%252520of%252520clinically%252520actionable%252520driver%252520alterations%252520in%252520never-smoker%252520LUADs%252520compared%252520with%252520smoker%252520LUADs%252520%2878%252525-92%252525%252520v%25252049.5%252525%25253B%252520P%252520%25253C%252520.0001%29.%252520Although%252520a%252520subset%252520of%252520never-smoker%252520samples%252520demonstrated%252520germline%252520alterations%252520in%252520DNA%252520repair%252520genes%25252C%252520the%252520frequency%252520of%252520samples%252520showing%252520germline%252520variants%252520in%252520cancer%252520predisposing%252520genes%252520was%252520comparable%252520between%252520smokers%252520and%252520never-smokers%252520%286.4%252525%252520v%2525206.9%252525%25253B%252520P%252520%25253D%252520.82%29.%252520A%252520subset%252520of%252520never-smoker%252520samples%252520%285.9%252525%29%252520showed%252520mutation%252520signatures%252520that%252520were%252520suggestive%252520of%252520passive%252520exposure%252520to%252520cigarette%252520smoke.%252520Finally%25252C%252520analysis%252520of%252520RNA-sequencing%252520data%252520showed%252520distinct%252520immune%252520transcriptional%252520subtypes%252520of%252520never-smoker%252520LUADs%252520that%252520varied%252520in%252520their%252520expression%252520of%252520clinically%252520relevant%252520immune%252520checkpoint%252520molecules%252520and%252520immune%252520cell%252520composition.%252520CONCLUSION%252520In%252520this%252520comprehensive%252520genomic%252520and%252520transcriptome%252520analysis%252520of%252520never-smoker%252520LUADs%25252C%252520we%252520observed%252520a%252520potential%252520role%252520for%252520germline%252520variants%252520in%252520DNA%252520repair%252520genes%252520and%252520passive%252520exposure%252520to%252520cigarette%252520smoke%252520in%252520the%252520pathogenesis%252520of%252520a%252520subset%252520of%252520never-smoker%252520LUADs.%252520Our%252520findings%252520also%252520show%252520that%252520clinically%252520actionable%252520driver%252520alterations%252520are%252520highly%252520prevalent%252520in%252520never-smoker%252520LUADs%25252C%252520highlighting%252520the%252520need%252520for%252520obtaining%252520biopsies%252520with%252520adequate%252520cellularity%252520for%252520clinical%252520genomic%252520testing%252520in%252520these%252520patients.%26csi%3Dundefined%26rev%3Dv8.28.8-wp%26ct%3D1%26xld%3D1%26xd%3D1&amp;raw" style="height: 1px; width: 1px; position: absolute; top: 0px; z-index: 100000; border: 0px; left: 0px;" title="AddThis utility frame"><html data-dcnode-id="122"><head data-dcnode-id="126"><meta charset="utf-8"><meta content="text/html; charset=utf-8
