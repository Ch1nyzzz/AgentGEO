Forced vital capacity is the amount of air that can be forcibly exhaled from your lungs after inhaling as deeply as possible. It is an important measurement to know for health concerns, and is&nbsp;also useful&nbsp;if you want to improve your physical performance.&nbsp;
Read further to understand why forced vital capacity is an important measurement to be aware of, to understand how it is tested, and to see why breathing training is a tool to help you improve your forced vital capacity.
What is Forced Vital Capacity?
Forced vital capacity is a measurement of lung size (in liters) and represents the volume of air in the lungs that can be exhaled following a deep inhalation. 
People who live with chronic lung diseases will often have their pulmonary function tested in order to diagnose, monitor, and treat different lung diseases. 
A diagnostic test, Spirometry, is performed by deeply inhaling and forcefully exhaling into a spirometer (a device that records the various measurements of lung function).
One of the benefits of spirometry testing is that it can detect abnormalities in lung function even when no signs or symptoms of disease are evident. 
Spirometry can also be used to assess the effectiveness of medical treatment. If a medication is given to open narrowed airways, it should be monitored by spirometry to ensure that normal airflow is restored. 
If the FVC is within 80% of the reference value the results are considered normal.&nbsp;
Parameters of Vital Capacity to assess&nbsp;
The three key spirometry measurements (FVC, FEV1 and FEV1/FVC ratio) for a given individual are compared to reference values. 
The reference value is based on healthy individuals with normal lung function and it tells the doctor the values that would be expected for someone of the same sex, age, and height.&nbsp;
Vital capacity (VC) refers to the maximal volume of air that can be expired following maximum inhalation. It is the total of tidal volume, inspiratory reserve volume, and expiratory reserve volume:
(VC = V + IRV + ERV)
Vital capacity may be measured as inspiratory vital capacity (IVC), slow vital capacity (SVC), or forced vital capacity (FVC). The FVC is similar to VC, but it is measured as the patient exhales with maximum speed and effort. 
Forced Vital Capacity (FVC)
Forced vital capacity is the total amount of air that can be exhaled following a deep inhalation in an FVC test.&nbsp;The normal FVC range for an adult is between 3 liters and 5 liters.
Forced expiratory volume (FEV1)
Forced expiratory volume is the amount of air forcefully exhaled in one second following a deep inhalation (FEV1).
FEV1/ FVC ratio&nbsp;
This number represents the percent of the lung size (FVC) that can be exhaled in one second (FEV1). 
The normal value for the FEV1/FVC ratio is 70%.&nbsp;Abnormalities of the FEV1 and FEV1/FVC are the result of a decrease in the airflow through the lungs, which may be caused by obstructive lung diseases.
 Examples of obstructive diseases include emphysema and asthma. It is also possible to have situations where both restrictive and obstructive diseases are present.
Understanding Forced Vital Capacity and your lung function&nbsp;
First, it is important to point out that your body will automatically adjust to your need for oxygen. 
For example, when you are physically active and need greater amounts of oxygen for your muscles, your respiratory breathing rate will speed up to provide oxygen to your body and muscles faster.&nbsp;That happens automatically in a process where sensors in your brain, blood vessels, muscles, and lungs detect your level of oxygen and carbon dioxide.&nbsp;
The amount that you exhale and breathe from your lungs, which is measured in the forced vital capacity tests, also indicates&nbsp;the residual volume, which is another important measurement of your lung function. 
Residual volume is the volume of air that remains in the lungs after maximum forceful expiration. In other words, it is the volume of air that cannot be expelled from the lungs. 
The residual volume helps the lung tissues from sticking together and prevents large fluctuation of O2 and CO2. However, too much of what is left in your lungs is unhealthy, and that is why you want to limit the residual volume.&nbsp;
Taking deeper breath decreases the residual volume, and at the same time, increases the capacity of your lungs, thus providing&nbsp;you with greater volumes of air inhaled and exhaled through each breath.&nbsp;
When you take deeper breaths you are actually training and exercising; you strengthen the whole respiratory system. That is the diaphragm, intercostals, and abdominals that contract and relax as your breath.
The different parameters of lung volume
As seen in the graph below, the volume of air that we inhale and exhale differs.
As depicted, the total lung capacity is about 5½ liters of air; however, most of this capacity is not used during normal breathing. 
Tidal volume is defined as the volume of air moved into and out of the lungs during each ventilation cycle. At rest, an adult’s tidal volume is about a ½ liter (or only about 10% of total lung volume). 
The&nbsp;inspiratory reserve volume is the amount of air that can be taken into the lungs (above the tidal volume) upon forced inspiration. 
The&nbsp;expiratory reserve volume is the amount of air that can be pushed out of the lungs (beyond the tidal volume) upon forced expiration. 
Vital capacity is the total volume of air that can be moved into and out of the lungs.
Besides the factors that set a natural limit to our lungs, we are able to train and extend these different volumes and capacities.&nbsp;As much of the breathing process happens automatically, you train to optimize your lung function and breathing pattern.

The figure shows the lung volumes and capacities of normal adults.

Train your deep breathing and experience the difference in performance&nbsp;
Deep breathing can help people who suffer from chronic lung diseases to train and work with their breathing, and it can also&nbsp;improve general physical performance.&nbsp;
When your body needs more oxygen through intense and physical activity, you start to pant to get more air, which affects endurance.&nbsp;By learning to take deeper breaths, you are automatically training yourself to take in more oxygen per breath.
This happens because during the process your respiratory muscles are strengthened, therefore, becoming more empowered to take a deeper breath. 
Your diaphragm, also known as belly breathing, is increasingly activated. 
As a result, you utilize greater amounts of your lung’s capacity and increase your vital capacity. By increasing your vital capacity, oxygen is more sufficiently sent to your muscles.&nbsp;That means that you are able to train longer and with a lower sense of effort.&nbsp;
Airofit breathing trainer provides you with daily breathing exercises which strengthens&nbsp;vital capacity. 
It makes you proactive and helps you to improve your breathing muscles, which increasingly will strengthen your ability to take deeper breaths during high-intensity activity. 
Deeper breathing uses a bit more energy but also allows increased amounts of oxygen to enter the bloodstream with each breath.&nbsp;Oxygen in your bloodstreams increases your ability to perform longer and preserve more energy." data-dcnode-id="3343" property="og:description"><span data-dcnode-id="3342" instrument_node="">

    //cdn.shopify.com/s/files/1/0287/0552/1738/articles/PIC02063_245e012d-40e5-4317-a4da-93d4217acae1_600x.jpg?v=1588688512 600w,
    //cdn.shopify.com/s/files/1/0287/0552/1738/articles/PIC02063_245e012d-40e5-4317-a4da-93d4217acae1_400x.jpg?v=1588688512 400w,
    //cdn.shopify.com/s/files/1/0287/0552/1738/articles/PIC02063_245e012d-40e5-4317-a4da-93d4217acae1_200x.jpg?v=1588688512 200w," height="1120" sizes="953px" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//cdn.shopify.com/s/files/1/0287/0552/1738/articles/PIC02063_245e012d-40e5-4317-a4da-93d4217acae1_1600x.jpg%3Fv%3D1588688512&amp;raw" srcset="//cdn.shopify.com/s/files/1/0287/0552/1738/articles/PIC02063_245e012d-40e5-4317-a4da-93d4217acae1_5000x.jpg?v=1588688512 5000w,

    //cdn.shopify.com/s/files/1/0287/0552/1738/articles/PIC02063_245e012d-40e5-4317-a4da-93d4217acae1_2500x.jpg?v=1588688512 2500w,
    //cdn.shopify.com/s/files/1/0287/0552/1738/articles/PIC02063_245e012d-40e5-4317-a4da-93d4217acae1_2000x.jpg?v=1588688512 2000w,
    //cdn.shopify.com/s/files/1/0287/0552/1738/articles/PIC02063_245e012d-40e5-4317-a4da-93d4217acae1_1800x.jpg?v=1588688512 1800w,
    //cdn.shopify.com/s/files/1/0287/0552/1738/articles/PIC02063_245e012d-40e5-4317-a4da-93d4217acae1_1600x.jpg?v=1588688512 1600w,
    //cdn.shopify.com/s/files/1/0287/0552/1738/articles/PIC02063_245e012d-40e5-4317-a4da-93d4217acae1_1400x.jpg?v=1588688512 1400w,
    //cdn.shopify.com/s/files/1/0287/0552/1738/articles/PIC02063_245e012d-40e5-4317-a4da-93d4217acae1_1200x.jpg?v=1588688512 1200w,
    //cdn.shopify.com/s/files/1/0287/0552/1738/articles/PIC02063_245e012d-40e5-4317-a4da-93d4217acae1_1000x.jpg?v=1588688512 1000w,

    //cdn.shopify.com/s/files/1/0287/0552/1738/articles/PIC02063_245e012d-40e5-4317-a4da-93d4217acae1_600x.jpg?v=1588688512 600w,
    //cdn.shopify.com/s/files/1/0287/0552/1738/articles/PIC02063_245e012d-40e5-4317-a4da-93d4217acae1_400x.jpg?v=1588688512 400w,
    //cdn.shopify.com/s/files/1/0287/0552/1738/articles/PIC02063_245e012d-40e5-4317-a4da-93d4217acae1_200x.jpg?v=1588688512 200w," style=";" width="1600"><span data-dcnode-id="2534" instrument_node="">
</span></div><span data-dcnode-id="2532" instrument_node="">
</span><noscript class="noscript" data-dcnode-id="2530"><span data-dcnode-id="2531" instrument_node=""> &lt;img class="" src="//cdn.shopify.com/s/files/1/0287/0552/1738/articles/PIC02063_245e012d-40e5-4317-a4da-93d4217acae1_2000x.jpg?v=1588688512" alt="Understand the importance of forced vital capacity"&gt;
</span></noscript><p data-dcnode-id="2529"></p><span data-dcnode-id="2528" instrument_node=""> </span><p data-dcnode-id="2525"><strong data-dcnode-id="2526"><span data-dcnode-id="2527" instrument_node="">Measuring forced vital capacity (FVC) is part of a spirometry or pulmonary function test that is conducted to assess lung health, airflow, and help in disease diagnosis and effectiveness of medical treatment.</span></strong></p><span data-dcnode-id="2524" instrument_node="">
</span><p data-dcnode-id="2521"><strong data-dcnode-id="2522"><span data-dcnode-id="2523" instrument_node="">Forced vital capacity is the amount of air that can be forcibly exhaled from your lungs after inhaling as deeply as possible. It is an important measurement to know for health concerns, and is&nbsp;also useful&nbsp;if you want to improve your physical performance.&nbsp;</span></strong></p><span data-dcnode-id="2520" instrument_node="">
</span><p data-dcnode-id="2517"><strong data-dcnode-id="2518"><span data-dcnode-id="2519" instrument_node="">Read further to understand why forced vital capacity is an important measurement to be aware of, to understand how it is tested, and to see why breathing training is a tool to help you improve your forced vital capacity.</span></strong></p><span data-dcnode-id="2516" instrument_node="">
</span><h2 data-dcnode-id="2513"><strong data-dcnode-id="2514"><span data-dcnode-id="2515" instrument_node="">What is Forced Vital Capacity?</span></strong></h2><span data-dcnode-id="2512" instrument_node="">
</span><p data-dcnode-id="2508"><b data-dcnode-id="2509"><span data-dcnode-id="2510" style="font-weight: 400;"><span data-dcnode-id="2511" instrument_node="">Forced vital capacity is a measurement of lung size (in liters) and represents the volume of air in the lungs that can be exhaled following a deep inhalation.</span></span></b></p><span data-dcnode-id="2507" instrument_node="">
</span><p data-dcnode-id="2503"><b data-dcnode-id="2504"><span data-dcnode-id="2505" style="font-weight: 400;"><span data-dcnode-id="2506" instrument_node="">People who live with chronic lung diseases will often have their pulmonary function tested in order to diagnose, monitor, and treat different lung diseases.</span></span></b></p><span data-dcnode-id="2502" instrument_node="">
</span><p data-dcnode-id="2495"><b data-dcnode-id="2496"><span data-dcnode-id="2500" style="font-weight: 400;"><span data-dcnode-id="2501" instrument_node="">A diagnostic test,</span></span><span data-dcnode-id="2499" instrument_node="">Spirometry</span><span data-dcnode-id="2497" style="font-weight: 400;"><span data-dcnode-id="2498" instrument_node="">, is performed by deeply inhaling and forcefully exhaling into a spirometer (a device that records the various measurements of lung function).</span></span></b></p><span data-dcnode-id="2494" instrument_node="">
</span><p data-dcnode-id="2490"><b data-dcnode-id="2491"><span data-dcnode-id="2492" style="font-weight: 400;"><span data-dcnode-id="2493" instrument_node="">One of the benefits of spirometry testing is that it can detect abnormalities in lung function even when no signs or symptoms of disease are evident.</span></span></b></p><span data-dcnode-id="2489" instrument_node="">
</span><p data-dcnode-id="2485"><b data-dcnode-id="2486"><span data-dcnode-id="2487" style="font-weight: 400;"><span data-dcnode-id="2488" instrument_node="">Spirometry can also be used to assess the effectiveness of medical treatment. If a medication is given to open narrowed airways, it should be monitored by spirometry to ensure that normal airflow is restored.</span></span></b></p><span data-dcnode-id="2484" instrument_node="">
</span><p data-dcnode-id="2480"><b data-dcnode-id="2481"><span data-dcnode-id="2482" style="font-weight: 400;"><span data-dcnode-id="2483" instrument_node="">If the FVC is within 80% of the reference value the results are considered normal.&nbsp;</span></span></b></p><span data-dcnode-id="2479" instrument_node="">
</span><h2 data-dcnode-id="2476"><strong data-dcnode-id="2477"><span data-dcnode-id="2478" instrument_node="">Parameters of Vital Capacity to assess&nbsp;</span></strong></h2><span data-dcnode-id="2475" instrument_node="">
</span><p data-dcnode-id="2472"><span data-dcnode-id="2473" style="font-weight: 400;"><span data-dcnode-id="2474" instrument_node="">The three key spirometry measurements (FVC, FEV1 and FEV1/FVC ratio) for a given individual are compared to reference values.</span></span></p><span data-dcnode-id="2471" instrument_node="">
</span><p data-dcnode-id="2468"><span data-dcnode-id="2469" style="font-weight: 400;"><span data-dcnode-id="2470" instrument_node="">The reference value is based on healthy individuals with normal lung function and it tells the doctor the values that would be expected for someone of the same sex, age, and height.&nbsp;</span></span></p><span data-dcnode-id="2467" instrument_node="">
</span><p data-dcnode-id="2464"><span data-dcnode-id="2465" style="font-weight: 400;"><span data-dcnode-id="2466" instrument_node="">Vital capacity (VC) refers to the maximal volume of air that can be expired following maximum inhalation. It is the total of tidal volume, inspiratory reserve volume, and expiratory reserve volume:</span></span></p><span data-dcnode-id="2463" instrument_node="">
</span><p data-dcnode-id="2459" style="text-align: center;"><strong data-dcnode-id="2460"><span data-dcnode-id="2461" style="color: #ff0000;"><span data-dcnode-id="2462" instrument_node="">(VC = V + IRV + ERV)</span></span></strong></p><span data-dcnode-id="2458" instrument_node="">
</span><p data-dcnode-id="2455"><span data-dcnode-id="2456" style="font-weight: 400;"><span data-dcnode-id="2457" instrument_node="">Vital capacity may be measured as inspiratory vital capacity (IVC), slow vital capacity (SVC), or forced vital capacity (FVC). The FVC is similar to VC, but it is measured as the patient exhales with maximum speed and effort.</span></span></p><span data-dcnode-id="2454" instrument_node="">
</span><h3 data-dcnode-id="2451"><strong data-dcnode-id="2452"><span data-dcnode-id="2453" instrument_node="">Forced Vital Capacity (FVC)</span></strong></h3><span data-dcnode-id="2450" instrument_node="">
</span><p data-dcnode-id="2433"><span data-dcnode-id="2448" style="font-weight: 400;"><span data-dcnode-id="2449" instrument_node="">Forced vital capacity is the total amount of air that can be exhaled following a deep inhalation in an FVC test.&nbsp;</span></span><span data-dcnode-id="2446" style="font-weight: 400;"><span data-dcnode-id="2447" instrument_node="">The</span></span><span data-dcnode-id="2444" style="font-weight: 400;"><span data-dcnode-id="2445" instrument_node="">normal FVC range</span></span><span data-dcnode-id="2442" style="font-weight: 400;"><span data-dcnode-id="2443" instrument_node=""> for an adult is between 3</span></span><span data-dcnode-id="2440" style="font-weight: 400;"><span data-dcnode-id="2441" instrument_node="">liters</span></span><span data-dcnode-id="2438" style="font-weight: 400;"><span data-dcnode-id="2439" instrument_node=""> and 5</span></span><span data-dcnode-id="2436" style="font-weight: 400;"><span data-dcnode-id="2437" instrument_node="">liters</span></span><span data-dcnode-id="2434" style="font-weight: 400;"><span data-dcnode-id="2435" instrument_node="">.</span></span></p><span data-dcnode-id="2432" instrument_node="">
</span><h3 data-dcnode-id="2429"><strong data-dcnode-id="2430"><span data-dcnode-id="2431" instrument_node="">Forced expiratory volume (FEV1)</span></strong></h3><span data-dcnode-id="2428" instrument_node="">
</span><p data-dcnode-id="2425"><span data-dcnode-id="2426" style="font-weight: 400;"><span data-dcnode-id="2427" instrument_node="">Forced expiratory volume is the amount of air forcefully exhaled in one second following a deep inhalation (FEV1).</span></span></p><span data-dcnode-id="2424" instrument_node="">
</span><h3 data-dcnode-id="2421"><strong data-dcnode-id="2422"><span data-dcnode-id="2423" instrument_node="">FEV1/ FVC ratio&nbsp;</span></strong></h3><span data-dcnode-id="2420" instrument_node="">
</span><p data-dcnode-id="2417"><span data-dcnode-id="2418" style="font-weight: 400;"><span data-dcnode-id="2419" instrument_node="">This number represents the percent of the lung size (FVC) that can be exhaled in one second (FEV1).</span></span></p><span data-dcnode-id="2416" instrument_node="">
</span><p data-dcnode-id="2412"><span data-dcnode-id="2414" style="font-weight: 400;"><span data-dcnode-id="2415" instrument_node="">The normal value for the FEV1/FVC ratio is 70%.&nbsp;</span></span><span data-dcnode-id="2413" instrument_node="">Abnormalities of the FEV1 and FEV1/FVC are the result of a decrease in the airflow through the lungs, which may be caused by obstructive lung diseases.</span></p><span data-dcnode-id="2411" instrument_node="">
</span><p data-dcnode-id="2408"><span data-dcnode-id="2409" style="font-weight: 400;"><span data-dcnode-id="2410" instrument_node=""> Examples of obstructive diseases include emphysema and asthma. It is also possible to have situations where both restrictive and obstructive diseases are present.</span></span></p><span data-dcnode-id="2407" instrument_node="">
</span><h2 data-dcnode-id="2404"><strong data-dcnode-id="2405"><span data-dcnode-id="2406" instrument_node="">Understanding Forced Vital Capacity and your lung function&nbsp;</span></strong></h2><span data-dcnode-id="2403" instrument_node="">
</span><p data-dcnode-id="2400"><span data-dcnode-id="2401" style="font-weight: 400;"><span data-dcnode-id="2402" instrument_node="">First, it is important to point out that your body will automatically adjust to your need for oxygen.</span></span></p><span data-dcnode-id="2399" instrument_node="">
</span><p data-dcnode-id="2395"><span data-dcnode-id="2397" style="font-weight: 400;"><span data-dcnode-id="2398" instrument_node="">For example, when you are physically active and need greater amounts of oxygen for your muscles, your respiratory breathing rate will speed up to provide oxygen to your body and muscles faster.&nbsp;</span></span><span data-dcnode-id="2396" instrument_node="">That happens automatically in a process where sensors in your brain, blood vessels, muscles, and lungs detect your level of oxygen and carbon dioxide.&nbsp;</span></p><span data-dcnode-id="2394" instrument_node="">
</span><p data-dcnode-id="2386"><span data-dcnode-id="2392" style="font-weight: 400;"><span data-dcnode-id="2393" instrument_node="">The amount that you exhale and breathe from your lungs, which is measured in the forced vital capacity tests, also indicates&nbsp;</span></span><a data-dcnode-id="2389" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//biologydictionary.net/residual-volume/"><span data-dcnode-id="2390" style="font-weight: 400;"><span data-dcnode-id="2391" instrument_node="">the residual volume</span></span></a><span data-dcnode-id="2387" style="font-weight: 400;"><span data-dcnode-id="2388" instrument_node="">, which is another important measurement of your lung function.</span></span></p><span data-dcnode-id="2385" instrument_node="">
</span><p data-dcnode-id="2380"><span data-dcnode-id="2383" style="font-weight: 400;"><span data-dcnode-id="2384" instrument_node="">Residual volume is the volume of air that remains in the lungs after maximum forceful expiration. In other words, it is the volume of air that cannot be expelled from the lungs</span></span><span data-dcnode-id="2381" style="font-weight: 400;"><span data-dcnode-id="2382" instrument_node="">.</span></span></p><span data-dcnode-id="2379" instrument_node="">
</span><p data-dcnode-id="2376"><span data-dcnode-id="2377" style="font-weight: 400;"><span data-dcnode-id="2378" instrument_node="">The residual volume helps the lung tissues from sticking together and prevents large fluctuation of O2 and CO2. However, too much of what is left in your lungs is unhealthy, and that is why you want to limit the residual volume.&nbsp;</span></span></p><span data-dcnode-id="2375" instrument_node="">
</span><p data-dcnode-id="2372"><span data-dcnode-id="2373" style="font-weight: 400;"><span data-dcnode-id="2374" instrument_node="">Taking deeper breath decreases the residual volume, and at the same time, increases the capacity of your lungs, thus providing&nbsp;you with greater volumes of air inhaled and exhaled through each breath.&nbsp;</span></span></p><span data-dcnode-id="2371" instrument_node="">
</span><p data-dcnode-id="2368"><span data-dcnode-id="2369" style="font-weight: 400;"><span data-dcnode-id="2370" instrument_node="">When you take deeper breaths you are actually training and exercising; you strengthen the whole respiratory system. That is the diaphragm, intercostals, and abdominals that contract and relax as your breath.</span></span></p><span data-dcnode-id="2367" instrument_node="">
</span><h2 data-dcnode-id="2364"><strong data-dcnode-id="2365"><span data-dcnode-id="2366" instrument_node="">The different parameters of lung volume</span></strong></h2><span data-dcnode-id="2363" instrument_node="">
</span><p data-dcnode-id="2360"><span data-dcnode-id="2361" style="font-weight: 400;"><span data-dcnode-id="2362" instrument_node="">As seen in the graph below, the volume of air that we inhale and exhale differs.</span></span></p><span data-dcnode-id="2359" instrument_node="">
</span><p data-dcnode-id="2351"><span data-dcnode-id="2357" style="font-weight: 400;"><span data-dcnode-id="2358" instrument_node="">As depicted, the</span></span><i data-dcnode-id="2354"><span data-dcnode-id="2355" style="font-weight: 400;"><span data-dcnode-id="2356" instrument_node="">total lung capacity</span></span></i><span data-dcnode-id="2352" style="font-weight: 400;"><span data-dcnode-id="2353" instrument_node=""> is about 5½ liters of air; however, most of this capacity is not used during normal breathing.</span></span></p><span data-dcnode-id="2350" instrument_node="">
</span><p data-dcnode-id="2344"><i data-dcnode-id="2347"><span data-dcnode-id="2348" style="font-weight: 400;"><span data-dcnode-id="2349" instrument_node="">Tidal volume</span></span></i><span data-dcnode-id="2345" style="font-weight: 400;"><span data-dcnode-id="2346" instrument_node=""> is defined as the volume of air moved into and out of the lungs during each ventilation cycle. At rest, an adult’s tidal volume is about a ½ liter (or only about 10% of total lung volume).</span></span></p><span data-dcnode-id="2343" instrument_node="">
</span><p data-dcnode-id="2334"><span data-dcnode-id="2341" style="font-weight: 400;"><span data-dcnode-id="2342" instrument_node="">The&nbsp;</span></span><i data-dcnode-id="2338"><span data-dcnode-id="2339" style="font-weight: 400;"><span data-dcnode-id="2340" instrument_node="">inspiratory reserve volume</span></span></i><span data-dcnode-id="2337" instrument_node=""> </span><span data-dcnode-id="2335" style="font-weight: 400;"><span data-dcnode-id="2336" instrument_node="">is the amount of air that can be taken into the lungs (above the tidal volume) upon forced inspiration.</span></span></p><span data-dcnode-id="2333" instrument_node="">
</span><p data-dcnode-id="2325"><span data-dcnode-id="2331" style="font-weight: 400;"><span data-dcnode-id="2332" instrument_node="">The&nbsp;</span></span><i data-dcnode-id="2328"><span data-dcnode-id="2329" style="font-weight: 400;"><span data-dcnode-id="2330" instrument_node="">expiratory reserve volume</span></span></i><span data-dcnode-id="2326" style="font-weight: 400;"><span data-dcnode-id="2327" instrument_node=""> is the amount of air that can be pushed out of the lungs (beyond the tidal volume) upon forced expiration.</span></span></p><span data-dcnode-id="2324" instrument_node="">
</span><p data-dcnode-id="2316"><i data-dcnode-id="2321"><span data-dcnode-id="2322" style="font-weight: 400;"><span data-dcnode-id="2323" instrument_node="">Vital capacity</span></span></i><span data-dcnode-id="2319" style="font-weight: 400;"><span data-dcnode-id="2320" instrument_node=""> is the total volume of air that can be moved into and out of the lungs</span></span><span data-dcnode-id="2317" style="font-weight: 400;"><span data-dcnode-id="2318" instrument_node="">.</span></span></p><span data-dcnode-id="2315" instrument_node="">
</span><p data-dcnode-id="2311"><span data-dcnode-id="2313" style="font-weight: 400;"><span data-dcnode-id="2314" instrument_node="">Besides the factors that set a natural limit to our lungs, we are able to train and extend these different volumes and capacities.&nbsp;</span></span><span data-dcnode-id="2312" instrument_node="">As much of the breathing process happens automatically, you train to optimize your lung function and breathing pattern.</span></p><span data-dcnode-id="2310" instrument_node="">
</span><meta charset="utf-8" data-dcnode-id="2309"><span data-dcnode-id="2308" instrument_node="">
</span><p data-dcnode-id="2305"><span data-dcnode-id="2306" style="font-weight: 400;"><span data-dcnode-id="2307" instrument_node="">The figure shows the lung volumes and capacities of normal adults.</span></span></p><span data-dcnode-id="2304" instrument_node="">
</span><p data-dcnode-id="2302"><img alt="forced vital capacity measuring lung capacity" data-dcnode-id="2303" height="751" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//cdn.shopify.com/s/files/1/0082/8309/5117/files/Image3.png%3Fv%3D1576092195&amp;raw" width="1252"></p><span data-dcnode-id="2301" instrument_node="">
</span><h2 data-dcnode-id="2298"><strong data-dcnode-id="2299"><span data-dcnode-id="2300" instrument_node="">Train your deep breathing and experience the difference in performance&nbsp;</span></strong></h2><span data-dcnode-id="2297" instrument_node="">
</span><p data-dcnode-id="2294"><span data-dcnode-id="2295" style="font-weight: 400;"><span data-dcnode-id="2296" instrument_node="">Deep breathing can help people who suffer from chronic lung diseases to train and work with their breathing, and it can also&nbsp;improve general physical performance.&nbsp;</span></span></p><span data-dcnode-id="2293" instrument_node="">
</span><p data-dcnode-id="2289"><span data-dcnode-id="2291" style="font-weight: 400;"><span data-dcnode-id="2292" instrument_node="">When your body needs more oxygen through intense and physical activity, you start to pant to get more air, which affects endurance.&nbsp;</span></span><span data-dcnode-id="2290" instrument_node="">By learning to take deeper breaths, you are automatically training yourself to take in more oxygen per breath.</span></p><span data-dcnode-id="2288" instrument_node="">
</span><p data-dcnode-id="2285"><span data-dcnode-id="2286" style="font-weight: 400;"><span data-dcnode-id="2287" instrument_node="">This happens because during the process your respiratory muscles are strengthened, therefore, becoming more empowered to take a deeper breath.</span></span></p><span data-dcnode-id="2284" instrument_node="">
</span><p data-dcnode-id="2281"><span data-dcnode-id="2282" style="font-weight: 400;"><span data-dcnode-id="2283" instrument_node="">Your diaphragm, also known as belly breathing, is increasingly activated.</span></span></p><span data-dcnode-id="2280" instrument_node="">
</span><p data-dcnode-id="2276"><span data-dcnode-id="2278" style="font-weight: 400;"><span data-dcnode-id="2279" instrument_node="">As a result, you utilize greater amounts of your lung’s capacity and increase your vital capacity. By increasing your vital capacity, oxygen is more sufficiently sent to your muscles.&nbsp;</span></span><span data-dcnode-id="2277" instrument_node="">That means that you are able to train longer and with a lower sense of effort.&nbsp;</span></p><span data-dcnode-id="2275" instrument_node="">
</span><p data-dcnode-id="2263"><a data-dcnode-id="2272" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.airofit.com/"><b data-dcnode-id="2273"><span data-dcnode-id="2274" instrument_node="">Airofit breathing trainer</span></b></a><span data-dcnode-id="2271" instrument_node=""> </span><span data-dcnode-id="2269" style="font-weight: 400;"><span data-dcnode-id="2270" instrument_node="">provides you with daily breathing exercises which strengthens&nbsp;</span></span><a data-dcnode-id="2266" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.airofit.com/pages/vital-capacity"><span data-dcnode-id="2267" style="font-weight: 400;"><span data-dcnode-id="2268" instrument_node="">vital capacity</span></span></a><span data-dcnode-id="2264" style="font-weight: 400;"><span data-dcnode-id="2265" instrument_node="">.</span></span></p><span data-dcnode-id="2262" instrument_node="">
</span><p data-dcnode-id="2259"><span data-dcnode-id="2260" style="font-weight: 400;"><span data-dcnode-id="2261" instrument_node="">It makes you proactive and helps you to improve your breathing muscles, which increasingly will strengthen your ability to take deeper breaths during high-intensity activity.</span></span></p><span data-dcnode-id="2258" instrument_node="">
</span><p data-dcnode-id="2254"><span data-dcnode-id="2256" style="font-weight: 400;"><span data-dcnode-id="2257" instrument_node="">Deeper breathing uses a bit more energy but also allows increased amounts of oxygen to enter the bloodstream with each breath.&nbsp;</span></span><span data-dcnode-id="2255" instrument_node="">Oxygen in your bloodstreams increases your ability to perform longer and preserve more energy.</span></p></div></div><span data-dcnode-id="2251" instrument_node=""> </span><div class="container related-blogs has-padding-bottom" data-dcnode-id="2066"><span data-dcnode-id="2250" instrument_node=""> </span><div class="one-whole column related-blogs--title has-margin-bottom has-margin-top" data-dcnode-id="2246"><span data-dcnode-id="2249" instrument_node=""> </span><h4 class="title" data-dcnode-id="2247"><span data-dcnode-id="2248" instrument_node="">Related Blog Posts</span></h4></div><span data-dcnode-id="2245" instrument_node=""> </span><div class="one-whole column related-blogs--content equal-columns--outside-trim field is-grouped is-flex-wrap" data-dcnode-id="2067"><span data-dcnode-id="2244" instrument_node=""> </span><div class="one-third columns article blog-card card show-border-false medium-down--one-whole" data-dcnode-id="2186"><span data-dcnode-id="2243" instrument_node=""> </span><div class="card-image blog-card__image" data-dcnode-id="2230"><span data-dcnode-id="2242" instrument_node=""> </span><figure class="image" data-dcnode-id="2231"><span data-dcnode-id="2241" instrument_node=""> </span><a data-dcnode-id="2232" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//us.airofit.com/blogs/all-blog-posts/airofit-training-the-pro-cyclists-secret-weapon" title="Airofit training – the Pro cyclist’s secret weapon?"><span data-dcnode-id="2240" instrument_node="">
