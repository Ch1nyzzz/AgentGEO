</span><meta content="Associations between adolescent smoking habits and exercise, particularly participation in sports and lung function were studied.

All students aged 13–19 yrs in Nord-Trøndelag County, Norway, 1995–1997, were invited to join a cross-sectional study. Information on smoking habits and exercise was obtained by self-administered questionnaire. Spirometry was performed in accordance with American Thoracic Society standards.

Of the 6,811 students (aged 13–18 yrs, without asthma), 2,993 (44%) reported never-smoking, and 1,342 (20%) reported current smoking (10% daily). Frequency of physical exercise was inversely associated with smoking, but participants in individual sports with lesser endurance, especially body-building and fighting sports, were more likely to be daily smokers than nonparticipants. Both daily (53%) and occasional smokers (43%) were more likely to have quit sports than never-smokers (26%). Never-smokers showed a positive dose-response between physical exercise and lung function (forced vital capacity and forced expiratory volume in one second, adjusted for age and height). No similar significant association was observed in daily smokers.

These data suggest that smoking habits in different sports should be considered when promoting physical activity as smoking prevention, and sports organizations should include smoking prevention programmes. Adolescents with better lung function may self-select into sports; this possibility needs to be studied in a longitudinal design.

This study was supported by the Norwegian Research Council, the Norwegian State Dept of Social and Health Affairs, the County of Nord-Trøndelag, Norway and ASTRA ZENECA AS." data-dcnode-id="4615" name="DC.Description"><span data-dcnode-id="4614" instrument_node="">

</span><meta content="Associations between adolescent smoking habits and exercise, particularly participation in sports and lung function were studied.

All students aged 13–19 yrs in Nord-Trøndelag County, Norway, 1995–1997, were invited to join a cross-sectional study. Information on smoking habits and exercise was obtained by self-administered questionnaire. Spirometry was performed in accordance with American Thoracic Society standards.

Of the 6,811 students (aged 13–18 yrs, without asthma), 2,993 (44%) reported never-smoking, and 1,342 (20%) reported current smoking (10% daily). Frequency of physical exercise was inversely associated with smoking, but participants in individual sports with lesser endurance, especially body-building and fighting sports, were more likely to be daily smokers than nonparticipants. Both daily (53%) and occasional smokers (43%) were more likely to have quit sports than never-smokers (26%). Never-smokers showed a positive dose-response between physical exercise and lung function (forced vital capacity and forced expiratory volume in one second, adjusted for age and height). No similar significant association was observed in daily smokers.

These data suggest that smoking habits in different sports should be considered when promoting physical activity as smoking prevention, and sports organizations should include smoking prevention programmes. Adolescents with better lung function may self-select into sports; this possibility needs to be studied in a longitudinal design.

This study was supported by the Norwegian Research Council, the Norwegian State Dept of Social and Health Affairs, the County of Nord-Trøndelag, Norway and ASTRA ZENECA AS." data-dcnode-id="4475" name="twitter:description"><span data-dcnode-id="4474" instrument_node="">

</span><div class="messages highwire-corrections highwire-correction-type-correction" data-dcnode-id="3492"><h3 class="highwire-corrections-title" data-dcnode-id="3497"><span data-dcnode-id="3498" instrument_node="">This article has a correction. Please see:</span></h3><ul class="highwire-corrections-list" data-dcnode-id="3493"><li class="relation-11129 first last" data-dcnode-id="3494"><a class="" data-dcnode-id="3495" data-hide-link-title="0" data-icon-position="" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//erj.ersjournals.com/content/19/3/585"><span data-dcnode-id="3496" instrument_node="">"Physical exercise, sports, and lung function in smoking versus nonsmoking adolescents”. T.L. Holmen, E. Barrett-Connor, J. Clausen, J. Holmen, L. Bjermer. Eur Respir J 2002; 19: 8–15. - March 01, 2002</span></a></li></ul></div><span data-dcnode-id="3491" instrument_node=""> </span></div><span data-dcnode-id="3489" instrument_node="">

</span><div class="pane-content" data-dcnode-id="1685"><span data-dcnode-id="3484" instrument_node="">
</span><div class="highwire-markup" data-dcnode-id="1687"><div class="content-block-markup" data-dcnode-id="1688" data-highwire-cite-ref-tooltip-instance="highwire_reflinks_tooltip" xmlns="http://www.w3.org/1999/xhtml" xmlns:xhtml="http://www.w3.org/1999/xhtml"><div class="article fulltext-view" data-dcnode-id="1690"><span class="highwire-journal-article-marker-start" data-dcnode-id="3483"></span><div class="section abstract" data-dcnode-id="3467" id="abstract-1"><h2 data-dcnode-id="3481"><span data-dcnode-id="3482" instrument_node="">Abstract</span></h2><span data-dcnode-id="3480" instrument_node="">
</span><p data-dcnode-id="3478" id="p-1"><span data-dcnode-id="3479" instrument_node="">Associations between adolescent smoking habits and exercise, particularly participation in sports and lung function were studied.</span></p><span data-dcnode-id="3477" instrument_node="">
</span><p data-dcnode-id="3475" id="p-2"><span data-dcnode-id="3476" instrument_node="">All students aged 13–19 yrs in Nord-Trøndelag County, Norway, 1995–1997, were invited to join a cross-sectional study. Information on smoking habits and exercise was obtained by self-administered questionnaire. Spirometry was performed in accordance with American Thoracic Society standards.</span></p><span data-dcnode-id="3474" instrument_node="">
</span><p data-dcnode-id="3472" id="p-3"><span data-dcnode-id="3473" instrument_node="">Of the 6,811 students (aged 13–18 yrs, without asthma), 2,993 (44%) reported never-smoking, and 1,342 (20%) reported current smoking (10% daily). Frequency of physical exercise was inversely associated with smoking, but participants in individual sports with lesser endurance, especially body-building and fighting sports, were more likely to be daily smokers than nonparticipants. Both daily (53%) and occasional smokers (43%) were more likely to have quit sports than never-smokers (26%). Never-smokers showed a positive dose-response between physical exercise and lung function (forced vital capacity and forced expiratory volume in one second, adjusted for age and height). No similar significant association was observed in daily smokers.</span></p><span data-dcnode-id="3471" instrument_node="">
</span><p data-dcnode-id="3469" id="p-4"><span data-dcnode-id="3470" instrument_node="">These data suggest that smoking habits in different sports should be considered when promoting physical activity as smoking prevention, and sports organizations should include smoking prevention programmes. Adolescents with better lung function may self-select into sports; this possibility needs to be studied in a longitudinal design.</span></p><span data-dcnode-id="3468" instrument_node="">
</span></div><ul class="kwd-group KWD" data-dcnode-id="3451"><li class="kwd" data-dcnode-id="3464"><a class="hw-term hw-article-keyword hw-article-keyword-adolescents" data-dcnode-id="3465" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//erj.ersjournals.com/keyword/adolescents" rel="nofollow"><span data-dcnode-id="3466" instrument_node="">adolescents</span></a></li><li class="kwd" data-dcnode-id="3461"><a class="hw-term hw-article-keyword hw-article-keyword-lung-function" data-dcnode-id="3462" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//erj.ersjournals.com/keyword/lung-function" rel="nofollow"><span data-dcnode-id="3463" instrument_node="">lung function</span></a></li><li class="kwd" data-dcnode-id="3458"><a class="hw-term hw-article-keyword hw-article-keyword-physical-exercise" data-dcnode-id="3459" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//erj.ersjournals.com/search/%2520text_abstract_title%253Aphysical%252Bexercise%2520text_abstract_title_flags%253Amatch-phrase%2520sort%253Apublication-date" rel="nofollow"><span data-dcnode-id="3460" instrument_node="">physical exercise</span></a></li><li class="kwd" data-dcnode-id="3455"><a class="hw-term hw-article-keyword hw-article-keyword-smoking" data-dcnode-id="3456" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//erj.ersjournals.com/keyword/smoking" rel="nofollow"><span data-dcnode-id="3457" instrument_node="">smoking</span></a></li><li class="kwd" data-dcnode-id="3452"><a class="hw-term hw-article-keyword hw-article-keyword-sports" data-dcnode-id="3453" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//erj.ersjournals.com/search/%2520text_abstract_title%253Asports%2520text_abstract_title_flags%253Amatch-phrase%2520sort%253Apublication-date" rel="nofollow"><span data-dcnode-id="3454" instrument_node="">sports</span></a></li></ul><div class="section notes" data-dcnode-id="3448" id="notes-1"><p data-dcnode-id="3449" id="p-5"><span data-dcnode-id="3450" instrument_node="">This study was supported by the Norwegian Research Council, the Norwegian State Dept of Social and Health Affairs, the County of Nord-Trøndelag, Norway and ASTRA ZENECA AS.</span></p></div><div class="section" data-dcnode-id="3365" id="sec-1"><span data-dcnode-id="3447" instrument_node="">
</span><p data-dcnode-id="3436" id="p-6"><span data-dcnode-id="3446" instrument_node="">Low physical activity is associated with increased morbidity and mortality in adulthood </span><a class="xref-bibr" data-dcnode-id="3444" href="#ref-1" id="xref-ref-1-1"><span data-dcnode-id="3445" instrument_node="">1</span></a><span data-dcnode-id="3443" instrument_node="">, </span><a class="xref-bibr" data-dcnode-id="3441" href="#ref-2" id="xref-ref-2-1"><span data-dcnode-id="3442" instrument_node="">2</span></a><span data-dcnode-id="3440" instrument_node="">. An underlying premise for promotion of physical activity in youth is that it may persist through adulthood and may also reduce the risk for initiating unhealthy habits such as smoking </span><a class="xref-bibr" data-dcnode-id="3438" href="#ref-3" id="xref-ref-3-1"><span data-dcnode-id="3439" instrument_node="">3</span></a><span data-dcnode-id="3437" instrument_node="">.</span></p><span data-dcnode-id="3435" instrument_node="">
</span><p data-dcnode-id="3412" id="p-7"><span data-dcnode-id="3434" instrument_node="">Several cross-sectional studies have reported that physically active adolescents and those who participate in sports are less likely to be regular smokers </span><a class="xref-bibr" data-dcnode-id="3432" href="#ref-4" id="xref-ref-4-1"><span data-dcnode-id="3433" instrument_node="">4</span></a><span data-dcnode-id="3431" instrument_node="">–</span><a class="xref-bibr" data-dcnode-id="3429" href="#ref-7" id="xref-ref-7-1"><span data-dcnode-id="3430" instrument_node="">7</span></a><span data-dcnode-id="3428" instrument_node=""> compared to sedentary youths. Encouraging participation in sports has been widely recommended for smoking cessation programmes </span><a class="xref-bibr" data-dcnode-id="3426" href="#ref-4" id="xref-ref-4-2"><span data-dcnode-id="3427" instrument_node="">4</span></a><span data-dcnode-id="3425" instrument_node="">, </span><a class="xref-bibr" data-dcnode-id="3423" href="#ref-8" id="xref-ref-8-1"><span data-dcnode-id="3424" instrument_node="">8</span></a><span data-dcnode-id="3422" instrument_node="">, </span><a class="xref-bibr" data-dcnode-id="3420" href="#ref-9" id="xref-ref-9-1"><span data-dcnode-id="3421" instrument_node="">9</span></a><span data-dcnode-id="3419" instrument_node="">. Aaron </span><em data-dcnode-id="3417"><span data-dcnode-id="3418" instrument_node="">et al.</span></em><span data-dcnode-id="3416" instrument_node=""> </span><a class="xref-bibr" data-dcnode-id="3414" href="#ref-8" id="xref-ref-8-2"><span data-dcnode-id="3415" instrument_node="">8</span></a><span data-dcnode-id="3413" instrument_node=""> found female adolescents less likely to initiate smoking if they were more physically active or fit, but male adolescents showed a trend (not significant) towards being more active individuals and more likely to initiate cigarette use. Smoking habits, by different types of sports have received little attention.</span></p><span data-dcnode-id="3411" instrument_node="">
</span><p data-dcnode-id="3370" id="p-8"><span data-dcnode-id="3410" instrument_node="">Some studies report a positive association between physical activity and physical fitness and lung capacity </span><a class="xref-bibr" data-dcnode-id="3408" href="#ref-10" id="xref-ref-10-1"><span data-dcnode-id="3409" instrument_node="">10</span></a><span data-dcnode-id="3407" instrument_node="">–</span><a class="xref-bibr" data-dcnode-id="3405" href="#ref-13" id="xref-ref-13-1"><span data-dcnode-id="3406" instrument_node="">13</span></a><span data-dcnode-id="3404" instrument_node="">, while others do not </span><a class="xref-bibr" data-dcnode-id="3402" href="#ref-14" id="xref-ref-14-1"><span data-dcnode-id="3403" instrument_node="">14</span></a><span data-dcnode-id="3401" instrument_node="">. Whether physical activity increases lung function remains uncertain. Adult-smoking sportsmen exhibit some degree of lung-function impairment compared to nonsmoking sportsmen, but still have better lung function than smokers who are not sportsmen </span><a class="xref-bibr" data-dcnode-id="3399" href="#ref-15" id="xref-ref-15-1"><span data-dcnode-id="3400" instrument_node="">15</span></a><span data-dcnode-id="3398" instrument_node="">. Young swimmers have been found to have better lung function than sedentary youths, as have participants of other sport activities </span><a class="xref-bibr" data-dcnode-id="3396" href="#ref-10" id="xref-ref-10-2"><span data-dcnode-id="3397" instrument_node="">10</span></a><span data-dcnode-id="3395" instrument_node="">, </span><a class="xref-bibr" data-dcnode-id="3393" href="#ref-16" id="xref-ref-16-1"><span data-dcnode-id="3394" instrument_node="">16</span></a><span data-dcnode-id="3392" instrument_node="">, </span><a class="xref-bibr" data-dcnode-id="3390" href="#ref-17" id="xref-ref-17-1"><span data-dcnode-id="3391" instrument_node="">17</span></a><span data-dcnode-id="3389" instrument_node="">. An impact of training on lung growth in young swimmers has been suggested </span><a class="xref-bibr" data-dcnode-id="3387" href="#ref-17" id="xref-ref-17-2"><span data-dcnode-id="3388" instrument_node="">17</span></a><span data-dcnode-id="3386" instrument_node="">, but others have found no effect of physical activity on lung growth </span><a class="xref-bibr" data-dcnode-id="3384" href="#ref-18" id="xref-ref-18-1"><span data-dcnode-id="3385" instrument_node="">18</span></a><span data-dcnode-id="3383" instrument_node="">, </span><a class="xref-bibr" data-dcnode-id="3381" href="#ref-19" id="xref-ref-19-1"><span data-dcnode-id="3382" instrument_node="">19</span></a><span data-dcnode-id="3380" instrument_node="">. Smoking in youth has been found to increase respiratory symptoms and decrease growth </span><a class="xref-bibr" data-dcnode-id="3378" href="#ref-4" id="xref-ref-4-3"><span data-dcnode-id="3379" instrument_node="">4</span></a><span data-dcnode-id="3377" instrument_node="">, </span><a class="xref-bibr" data-dcnode-id="3375" href="#ref-20" id="xref-ref-20-1"><span data-dcnode-id="3376" instrument_node="">20</span></a><span data-dcnode-id="3374" instrument_node="">, </span><a class="xref-bibr" data-dcnode-id="3372" href="#ref-21" id="xref-ref-21-1"><span data-dcnode-id="3373" instrument_node="">21</span></a><span data-dcnode-id="3371" instrument_node="">.</span></p><span data-dcnode-id="3369" instrument_node="">
</span><p data-dcnode-id="3367" id="p-9"><span data-dcnode-id="3368" instrument_node="">In this paper the cross-sectional association between smoking habit and physical exercise, participation in different types of sports, and lung function in adolescents is reported.</span></p><span data-dcnode-id="3366" instrument_node="">
</span></div><div class="section" data-dcnode-id="3294" id="sec-2"><span data-dcnode-id="3364" instrument_node="">
</span><h2 data-dcnode-id="3362"><span data-dcnode-id="3363" instrument_node="">Material and methods</span></h2><span data-dcnode-id="3361" instrument_node="">
</span><p data-dcnode-id="3359" id="p-10"><span data-dcnode-id="3360" instrument_node="">The population is from the YOUNG-HUNT study, the youth part of the large Nord-Trøndelag Health Study (HUNT), conducted from 1995–1997 in Nord-Trøndelag County, Norway. All students, aged 13–19 yrs, in the county were invited to join the study. A self-administered questionnaire was completed during one school hour, in a setting with no opportunity to look at other's papers. The questionnaire did not include participants' names. Subjects were linked to the questionnaire by a bar code of the 11-digit personal number with which all Norwegians are registered at birth. Each student put their completed questionnaire in a blank envelope and sealed it. Project nurses collected the envelopes.</span></p><span data-dcnode-id="3358" instrument_node="">
</span><p data-dcnode-id="3353" id="p-11"><span data-dcnode-id="3357" instrument_node="">Questions used in this paper are shown in the Appendix. Exercise of higher intensity, defined as being short of breath and/or sweaty, was assessed by using questions from the World Health Organization cross-national survey of health behaviour in schoolchildren </span><a class="xref-bibr" data-dcnode-id="3355" href="#ref-22" id="xref-ref-22-1"><span data-dcnode-id="3356" instrument_node="">22</span></a><span data-dcnode-id="3354" instrument_node=""> and was divided into three groups: “exercising 4 days a week or more”, “exercising 2 to 3 days a week” and “exercising 1 day a week or less”. Sports were classified as individual sports or team sports. Because sports questions do not capture individual level of effort, sports were classified based on expected average intensity as follows: “Individual sports with higher endurance ” including cross country skiing, cycling and running; “Individual sports with lesser endurance” including slalom skiing, horseback riding and gymnastics; “Swimming”; “Body-building and fight sports” including body-building, weightlifting, boxing, wrestling, Judo, Taekwondo and similar sports; and “Team sports” including football/soccer, handball, basketball and volleyball. In the text, physical exercise includes both organized and nonorganized activities unless otherwise specified. Specific sports questions refer to organized sport.</span></p><span data-dcnode-id="3352" instrument_node="">
</span><p data-dcnode-id="3350" id="p-12"><span data-dcnode-id="3351" instrument_node="">Current smokers were defined as those who answered “yes” to ever having tried smoking (at least one cigarette) and in addition answered “yes, I smoke daily” (daily smokers) or “yes, I smoke occasionally, but not daily” (occasional smokers) to the question: “Do you smoke now?” Smokers were compared to those who answered “no” to ever having tried smoking one cigarette (never-smokers). Passive smoking was defined as exposure to smoking at home by mothers, fathers or siblings.</span></p><span data-dcnode-id="3349" instrument_node="">
</span><p data-dcnode-id="3344" id="p-13"><span data-dcnode-id="3348" instrument_node="">Within a month after completing the questionnaire, the students underwent a clinical examination, performed in schools, including spirometry and measurement of height and weight. Spirometry was performed by specially trained nurses, in accordance with American Thoracic Society (ATS) standards </span><a class="xref-bibr" data-dcnode-id="3346" href="#ref-23" id="xref-ref-23-1"><span data-dcnode-id="3347" instrument_node="">23</span></a><span data-dcnode-id="3345" instrument_node="">, using computerized pneumotachograph (Jaeger Masterscope, software version 4.15, Jaeger Inc., Wurtzberg, Germany). The acceptability of the spirometry results was assessed both during testing and data analysis, and included review of the computerized ATS error codes reported from the Masterscopes, and visual inspection of volume/time and flow/volume graphics. Achieving end-of-test acceptability was confirmed either from the computerized error code regarding flow plateaus or visual inspection of spirometry displays during testing.</span></p><span data-dcnode-id="3343" instrument_node="">
</span><p data-dcnode-id="3329" id="p-14"><span data-dcnode-id="3342" instrument_node="">Forced vital capacity (FVC), forced expiratory volume in one second (FEV</span><sub data-dcnode-id="3340"><span data-dcnode-id="3341" instrument_node="">1</span></sub><span data-dcnode-id="3339" instrument_node="">), forced mid-expiratory flow (FEF</span><sub data-dcnode-id="3337"><span data-dcnode-id="3338" instrument_node="">50</span></sub><span data-dcnode-id="3336" instrument_node="">) and FEV</span><sub data-dcnode-id="3334"><span data-dcnode-id="3335" instrument_node="">1</span></sub><span data-dcnode-id="3333" instrument_node=""> per cent in relation to the maximal FVC (FEV</span><sub data-dcnode-id="3331"><span data-dcnode-id="3332" instrument_node="">1</span></sub><span data-dcnode-id="3330" instrument_node="">%FVC) were registered. FVC was defined as whichever was largest of either forced expiratory or forced inspiratory vital capacity from technically acceptable curves. Standing height was registered without shoes with standardized metre measures.</span></p><span data-dcnode-id="3328" instrument_node="">
</span><p data-dcnode-id="3326" id="p-15"><span data-dcnode-id="3327" instrument_node="">All 1,005 students reporting a history of asthma were excluded from these analyses.</span></p><span data-dcnode-id="3325" instrument_node="">
</span><div class="subsection" data-dcnode-id="3317" id="sec-3"><span data-dcnode-id="3324" instrument_node="">
</span><h3 data-dcnode-id="3322"><span data-dcnode-id="3323" instrument_node="">Ethics</span></h3><span data-dcnode-id="3321" instrument_node="">
</span><p data-dcnode-id="3319" id="p-16"><span data-dcnode-id="3320" instrument_node="">Each student signed a written consent to participate in the study. Parents of students aged &lt;16 yrs also gave written consent. The study was approved by the Regional Medicine Ethical Research Committee and the Norwegian Data Inspectorate Board.</span></p><span data-dcnode-id="3318" instrument_node="">
</span></div><span data-dcnode-id="3316" instrument_node="">
</span><div class="subsection" data-dcnode-id="3296" id="sec-4"><span data-dcnode-id="3315" instrument_node="">
</span><h3 data-dcnode-id="3313"><span data-dcnode-id="3314" instrument_node="">Statistics</span></h3><span data-dcnode-id="3312" instrument_node="">
</span><p data-dcnode-id="3310" id="p-17"><span data-dcnode-id="3311" instrument_node="">Comparisons of age at onset of smoking and leaving active sports were made by unpaired t-tests, and comparisons of categorical variables by Chi-squared analysis. Comparisons between daily smokers and those who had never tried smoking were performed using logistic regression with age, exposure to passive smoking and physical exercise in the model. Amount of exercise was adjusted for when comparing different types of sports activities. Separate models were used for both females and males and for the different types of sports.</span></p><span data-dcnode-id="3309" instrument_node="">
</span><p data-dcnode-id="3298" id="p-18"><span data-dcnode-id="3308" instrument_node="">Analyses of lung function were performed by linear regression models with FVC, FEV</span><sub data-dcnode-id="3306"><span data-dcnode-id="3307" instrument_node="">1</span></sub><span data-dcnode-id="3305" instrument_node="">, FEV</span><sub data-dcnode-id="3303"><span data-dcnode-id="3304" instrument_node="">1</span></sub><span data-dcnode-id="3302" instrument_node="">%FVC and FEF</span><sub data-dcnode-id="3300"><span data-dcnode-id="3301" instrument_node="">50</span></sub><span data-dcnode-id="3299" instrument_node=""> as dependent variables. Because of heteroscedasticity, logarithmic (ln) transformation of lung function (Y) was used to fit model assumptions. Separate models were made for daily smokers and for those who had never tried smoking, adjusted for age, standing height, weight, passive smoking, physical activity, rhinitis and acute bronchitis with cough in both males and females. Analyses of variance were used for comparisons between mean values of lung-function measures by different levels of exercise with the same variables, described earlier, as covariates. Estimates and confidence intervals (CI) are expressed as per cent differences from the logarithmic scale, with those who reported lowest level of exercise (⩽1 day a week) as reference. Comparisons of height within each level of physical exercise were carried out at all ages (13–18 yrs) using one way analysis of variance. Females and males were analysed separately, 95% CI are shown.</span></p><span data-dcnode-id="3297" instrument_node="">
</span></div><span data-dcnode-id="3295" instrument_node="">
</span></div><div class="section" data-dcnode-id="3139" id="sec-5"><span data-dcnode-id="3293" instrument_node="">
</span><h2 data-dcnode-id="3291"><span data-dcnode-id="3292" instrument_node="">Results</span></h2><span data-dcnode-id="3290" instrument_node="">
</span><p data-dcnode-id="3288" id="p-19"><span data-dcnode-id="3289" instrument_node="">Eighty-three per cent (8,305) completed both the questionnaire and spirometry. Included in these analyses were 6,811 students without asthma, aged 13–18 yrs, (50% males).</span></p><span data-dcnode-id="3287" instrument_node="">
</span><div class="subsection" data-dcnode-id="3275" id="sec-6"><span data-dcnode-id="3286" instrument_node="">
</span><h3 data-dcnode-id="3284"><span data-dcnode-id="3285" instrument_node="">Smoking</span></h3><span data-dcnode-id="3283" instrument_node="">
</span><p data-dcnode-id="3277" id="p-20"><span data-dcnode-id="3282" instrument_node="">As shown in table 1, 2,993 students (45% of males and 43% of females) had never tried smoking and 1,342 students (18% of males and 22% of females) reported current smoking (10% daily) (table 1</span><a class="xref-down-link" data-dcnode-id="3279" href="#T1" id="xref-table-wrap-1-1"><span data-dcnode-id="3280"><span data-dcnode-id="3281" instrument_node="">⇓</span></span></a><span data-dcnode-id="3278" instrument_node="">). Daily smoking increased with age (p&lt;0.001), and was marginally more common in girls (p=0.09). In daily smokers, mean age when smoking began was 13.9 yrs in both males and females. Overall, 52% males and 53% females reported being exposed to passive smoking at home.</span></p><span data-dcnode-id="3276" instrument_node="">
</span></div><span data-dcnode-id="3274" instrument_node="">
</span><div class="subsection" data-dcnode-id="3258" id="sec-7"><span data-dcnode-id="3273" instrument_node="">
</span><h3 data-dcnode-id="3271"><span data-dcnode-id="3272" instrument_node="">Physical exercise and sports participation</span></h3><span data-dcnode-id="3270" instrument_node="">
</span><p data-dcnode-id="3260" id="p-21"><span data-dcnode-id="3269" instrument_node="">Most students (68%) exercised at least 2 days a week outside school hours (table 2</span><a class="xref-down-link" data-dcnode-id="3266" href="#T2" id="xref-table-wrap-2-1"><span data-dcnode-id="3267"><span data-dcnode-id="3268" instrument_node="">⇓</span></span></a><span data-dcnode-id="3265" instrument_node="">). Males exercised more than females (p&lt;0.001), and participated more in sports competitions (p&lt;0.001). Compared to the younger age group (13–15 yrs), both males and females in the older age group (16–18 yrs) exercised less (p&lt;0.001) and joined in less sports competitions (p&lt;0.001). Compared to females, more males participated or had participated in “individual sports of higher endurance” (p&lt;0.001) and “body-building and fight sports” (p&lt;0.001), while females participated more in “individual sports with lesser endurance” (p&lt;0.001) (table 2</span><a class="xref-down-link" data-dcnode-id="3262" href="#T2" id="xref-table-wrap-2-2"><span data-dcnode-id="3263"><span data-dcnode-id="3264" instrument_node="">⇓</span></span></a><span data-dcnode-id="3261" instrument_node="">). Overall, 31% males and 34% females reported having previously participated in sports but not currently.</span></p><span data-dcnode-id="3259" instrument_node="">
</span></div><span data-dcnode-id="3257" instrument_node="">
</span><div class="subsection" data-dcnode-id="3230" id="sec-8"><span data-dcnode-id="3256" instrument_node="">
</span><h3 data-dcnode-id="3254"><span data-dcnode-id="3255" instrument_node="">Physical exercise and smoking</span></h3><span data-dcnode-id="3253" instrument_node="">
</span><p data-dcnode-id="3243" id="p-22"><span data-dcnode-id="3252" instrument_node="">Current smoking was more prevalent in students with lower levels of physical exercise (fig. 1</span><a class="xref-down-link" data-dcnode-id="3249" href="#F1" id="xref-fig-1-1"><span data-dcnode-id="3250"><span data-dcnode-id="3251" instrument_node="">⇓</span></span></a><span data-dcnode-id="3248" instrument_node="">). It was more common in “body-building and fighting sports”, “swimming”, and “individual sports of lesser endurance” compared to “team sports” and “individual sports of higher endurance”, especially in females (table 3</span><a class="xref-down-link" data-dcnode-id="3245" href="#T3" id="xref-table-wrap-3-1"><span data-dcnode-id="3246"><span data-dcnode-id="3247" instrument_node="">⇓</span></span></a><span data-dcnode-id="3244" instrument_node="">). More daily smokers (52% of males, 61% of females) and occasional smokers (43% of males, 39% of females) had dropped out of active sports compared to never-smokers (26% males, 27% females), p&lt;0.001. Mean age for quitting sports was similar in daily smokers 15 yrs for both males and females and never-smokers (males 15 yrs, females 14 yrs). About 35% had started smoking before they quit sports; another 30% started smoking and quit sports in the same year.</span></p><span data-dcnode-id="3242" instrument_node="">
</span><p data-dcnode-id="3232" id="p-23"><span data-dcnode-id="3241" instrument_node="">Daily smokers reported less physical exercise and less participation in sports competitions than never-smokers (table 4</span><a class="xref-down-link" data-dcnode-id="3238" href="#T4" id="xref-table-wrap-4-1"><span data-dcnode-id="3239"><span data-dcnode-id="3240" instrument_node="">⇓</span></span></a><span data-dcnode-id="3237" instrument_node="">). Both males and females currently participating in team sports and sports competitions (regardless of what type of sport) were less likely to be daily smokers than those who did not. In males, daily smoking was positively associated with both current and previous participation in body-building and fight sports and with present participation in swimming. Females who had previously participated in these types of sports and lesser endurance sports were more often daily smokers than those who had not participated. Few daily-smoking females however, were participating in body-building/fight sports and swimming, (table 3</span><a class="xref-down-link" data-dcnode-id="3234" href="#T3" id="xref-table-wrap-3-2"><span data-dcnode-id="3235"><span data-dcnode-id="3236" instrument_node="">⇓</span></span></a><span data-dcnode-id="3233" instrument_node="">).</span></p><span data-dcnode-id="3231" instrument_node="">
</span></div><span data-dcnode-id="3229" instrument_node="">
</span><div class="subsection" data-dcnode-id="3174" id="sec-9"><span data-dcnode-id="3228" instrument_node="">
</span><h3 data-dcnode-id="3226"><span data-dcnode-id="3227" instrument_node="">Lung function and physical exercise</span></h3><span data-dcnode-id="3225" instrument_node="">
</span><p data-dcnode-id="3223" id="p-24"><span data-dcnode-id="3224" instrument_node="">A significant difference in mean height by exercise status was seen only between the highest and lowest level of exercise at age 13 yrs (mean difference 2.2 cm, p=0.01). Lung function was adjusted for age and height.</span></p><span data-dcnode-id="3222" instrument_node="">
</span><p data-dcnode-id="3197" id="p-25"><span data-dcnode-id="3221" instrument_node="">In never-smoking males and females there was a stepwise increase in levels of FVC and FEV</span><sub data-dcnode-id="3219"><span data-dcnode-id="3220" instrument_node="">1</span></sub><span data-dcnode-id="3218" instrument_node=""> with increasing level of exercise (fig. 2</span><a class="xref-down-link" data-dcnode-id="3215" href="#F2" id="xref-fig-2-1"><span data-dcnode-id="3216"><span data-dcnode-id="3217" instrument_node="">⇓</span></span></a><span data-dcnode-id="3214" instrument_node="">), with a statistically significant and clinical relevant mean difference between the highest and lowest level of exercise. Mean differences were for FVC: males 195 mL, p&lt;0.001, females 122 mL, p&lt;0.001; and for FEV</span><sub data-dcnode-id="3212"><span data-dcnode-id="3213" instrument_node="">1</span></sub><span data-dcnode-id="3211" instrument_node="">: males 154 mL, p&lt;0.001, females 119 mL, p&lt;0.001. The same dose-response relationship was observed in daily smokers, but this trend was not statistically significant (fig. 2</span><a class="xref-down-link" data-dcnode-id="3208" href="#F2" id="xref-fig-2-2"><span data-dcnode-id="3209"><span data-dcnode-id="3210" instrument_node="">⇓</span></span></a><span data-dcnode-id="3207" instrument_node="">). Daily-smoking males with medium level of exercise had significantly larger FEV</span><sub data-dcnode-id="3205"><span data-dcnode-id="3206" instrument_node="">1</span></sub><span data-dcnode-id="3204" instrument_node=""> compared to the lowest level of exercise. No significant associations were found between FEF</span><sub data-dcnode-id="3202"><span data-dcnode-id="3203" instrument_node="">50</span></sub><span data-dcnode-id="3201" instrument_node=""> and FEV</span><sub data-dcnode-id="3199"><span data-dcnode-id="3200" instrument_node="">1</span></sub><span data-dcnode-id="3198" instrument_node="">%FVC and frequency of exercise in never-smokers or daily smokers.</span></p><span data-dcnode-id="3196" instrument_node="">
</span><p data-dcnode-id="3176" id="p-26"><span data-dcnode-id="3195" instrument_node="">Both never-smoking males and females who participated in sports competitions (regardless of type of sport) had larger FVC, FEV</span><sub data-dcnode-id="3193"><span data-dcnode-id="3194" instrument_node="">1</span></sub><span data-dcnode-id="3192" instrument_node=""> and FEF</span><sub data-dcnode-id="3190"><span data-dcnode-id="3191" instrument_node="">50</span></sub><span data-dcnode-id="3189" instrument_node=""> compared to those who did not participate (adjusted for frequency of exercise). Mean differences in males: FVC 95 mL, p=0.01, FEV</span><sub data-dcnode-id="3187"><span data-dcnode-id="3188" instrument_node="">1</span></sub><span data-dcnode-id="3186" instrument_node=""> 113 mL, p&lt;0.001, FEF</span><sub data-dcnode-id="3184"><span data-dcnode-id="3185" instrument_node="">50</span></sub><span data-dcnode-id="3183" instrument_node=""> 155 mL, p=0.03; and in females: FVC 65 mL, p=0.04, FEV</span><sub data-dcnode-id="3181"><span data-dcnode-id="3182" instrument_node="">1</span></sub><span data-dcnode-id="3180" instrument_node=""> 70 mL, p=0.01, FEF</span><sub data-dcnode-id="3178"><span data-dcnode-id="3179" instrument_node="">50</span></sub><span data-dcnode-id="3177" instrument_node=""> 156 mL, p=0.02. No such differences were found in daily smokers.</span></p><span data-dcnode-id="3175" instrument_node="">
</span></div><span data-dcnode-id="3173" instrument_node="">
</span><div class="subsection" data-dcnode-id="3141" id="sec-10"><span data-dcnode-id="3172" instrument_node="">
</span><h3 data-dcnode-id="3170"><span data-dcnode-id="3171" instrument_node="">Lung function and different sports</span></h3><span data-dcnode-id="3169" instrument_node="">
</span><p data-dcnode-id="3155" id="p-27"><span data-dcnode-id="3168" instrument_node="">Never-smoking males and females who presently participated in team sports had marginally higher FEF</span><sub data-dcnode-id="3166"><span data-dcnode-id="3167" instrument_node="">50</span></sub><span data-dcnode-id="3165" instrument_node=""> (mean difference: males 174 mL, p=0.05, females 15 mL, p=0.06) than those who did not. Females participating in team sports also had larger FEV</span><sub data-dcnode-id="3163"><span data-dcnode-id="3164" instrument_node="">1</span></sub><span data-dcnode-id="3162" instrument_node=""> (mean difference 80 mL, p=0.03) compared to nonparticipants. Daily-smoking males who presently participated in low-endurance sports had significantly lower FEV</span><sub data-dcnode-id="3160"><span data-dcnode-id="3161" instrument_node="">1</span></sub><span data-dcnode-id="3159" instrument_node=""> (p=0.05) and FEF</span><sub data-dcnode-id="3157"><span data-dcnode-id="3158" instrument_node="">50</span></sub><span data-dcnode-id="3156" instrument_node=""> (p=0.04) than nonparticipants. No other differences were found for other types of sports in never-smokers or daily smokers.</span></p><span data-dcnode-id="3154" instrument_node="">
</span><p data-dcnode-id="3146" id="p-28"><span data-dcnode-id="3153" instrument_node="">Never-smoking males and females who remained active in sports had better lung capacity compared to those who were no longer active. Mean difference in males: FVC: 135 mL, p&lt;0.001, FEV</span><sub data-dcnode-id="3151"><span data-dcnode-id="3152" instrument_node="">1</span></sub><span data-dcnode-id="3150" instrument_node="">: 125 mL, p&lt;0.001, and in females FVC: 69 mL, p=0.01, FEV</span><sub data-dcnode-id="3148"><span data-dcnode-id="3149" instrument_node="">1</span></sub><span data-dcnode-id="3147" instrument_node="">: 63 mL, p=0.01. No such difference was seen in daily smokers.</span></p><span data-dcnode-id="3145" instrument_node="">
</span><p data-dcnode-id="3143" id="p-29"><span data-dcnode-id="3144" instrument_node="">There were no important differences in the results when these analyses were repeated separately for the age groups 13–15 yrs and 16–18 yrs (data not shown).</span></p><span data-dcnode-id="3142" instrument_node="">
</span></div><span data-dcnode-id="3140" instrument_node="">
</span></div><div class="section" data-dcnode-id="3032" id="sec-11"><span data-dcnode-id="3138" instrument_node="">
</span><h2 data-dcnode-id="3136"><span data-dcnode-id="3137" instrument_node="">Discussion</span></h2><span data-dcnode-id="3135" instrument_node="">
</span><p data-dcnode-id="3124" id="p-30"><span data-dcnode-id="3134" instrument_node="">In this study of a large general population of adolescents, with a high participation rate and carefully supervised spirometry testing, higher levels of physical exercise were associated with less daily smoking overall. But daily smoking was more freciated with less frequent participation in competitions. It is not clear whether these differences by type of sport are because smoking is perceived as less likely to impair performance or reflects peer influence, which plays an important part in adolescent smoking </span><a class="xref-bibr" data-dcnode-id="3132" href="#ref-4" id="xref-ref-4-4"><span data-dcnode-id="3133" instrument_node="">4</span></a><span data-dcnode-id="3131" instrument_node="">, </span><a class="xref-bibr" data-dcnode-id="3129" href="#ref-24" id="xref-ref-24-1"><span data-dcnode-id="3130" instrument_node="">24</span></a><span data-dcnode-id="3128" instrument_node="">, </span><a class="xref-bibr" data-dcnode-id="3126" href="#ref-25" id="xref-ref-25-1"><span data-dcnode-id="3127" instrument_node="">25</span></a><span data-dcnode-id="3125" instrument_node="">.</span></p><span data-dcnode-id="3123" instrument_node="">
</span><p data-dcnode-id="3118" id="p-31"><span data-dcnode-id="3122" instrument_node="">Difference in smoking habits among different types of sports has previously received little attention. If confirmed elsewhere, it suggests that type of sport should be considered when sports are recommended for smoking prevention or cessation. The importance of focusing on smoking prevention within sports organizations </span><a class="xref-bibr" data-dcnode-id="3120" href="#ref-26" id="xref-ref-26-1"><span data-dcnode-id="3121" instrument_node="">26</span></a><span data-dcnode-id="3119" instrument_node=""> is further supported by the observation that the age of smoking initiation either preceded or coincided with the age of quitting sports.</span></p><span data-dcnode-id="3117" instrument_node="">
</span><p data-dcnode-id="3106" id="p-32"><span data-dcnode-id="3116" instrument_node="">Whether physical exercise actually leads to better lung capacity cannot be determined in a cross-sectional study. In a prospective study, very young female competitive swimmers were found to increase their vital capacity and total lung capacity during a year of training </span><a class="xref-bibr" data-dcnode-id="3114" href="#ref-17" id="xref-ref-17-3"><span data-dcnode-id="3115" instrument_node="">17</span></a><span data-dcnode-id="3113" instrument_node="">, suggesting that the larger lung volumes in swimmers may be due to impact of training on lung growth. No impact of training on lung growth has been found in older swimmers or other youth </span><a class="xref-bibr" data-dcnode-id="3111" href="#ref-18" id="xref-ref-18-2"><span data-dcnode-id="3112" instrument_node="">18</span></a><span data-dcnode-id="3110" instrument_node="">, </span><a class="xref-bibr" data-dcnode-id="3108" href="#ref-19" id="xref-ref-19-2"><span data-dcnode-id="3109" instrument_node="">19</span></a><span data-dcnode-id="3107" instrument_node="">. Being good in sports may depend on a better lung capacity, representing self-selection of adolescents who both join and continue with sports. Self-selection is a plausible explanation why never-smoking students who had discontinued sports had a lower lung capacity compared to never-smokers who were still active.</span></p><span data-dcnode-id="3105" instrument_node="">
</span><p data-dcnode-id="3094" id="p-33"><span data-dcnode-id="3104" instrument_node="">In this (data not shown) and other studies </span><a class="xref-bibr" data-dcnode-id="3102" href="#ref-20" id="xref-ref-20-2"><span data-dcnode-id="3103" instrument_node="">20</span></a><span data-dcnode-id="3101" instrument_node="">, </span><a class="xref-bibr" data-dcnode-id="3099" href="#ref-21" id="xref-ref-21-2"><span data-dcnode-id="3100" instrument_node="">21</span></a><span data-dcnode-id="3098" instrument_node="">, </span><a class="xref-bibr" data-dcnode-id="3096" href="#ref-27" id="xref-ref-27-1"><span data-dcnode-id="3097" instrument_node="">27</span></a><span data-dcnode-id="3095" instrument_node="">, daily smokers with a light smoke burden were found to have a larger lung capacity (FVC) than nonsmokers. If daily smokers with good lung function self-select into physical activity, this would tend to diminish the observed “effects” of exercise. This possibility is supported by the finding that, among less active students, daily smokers had a larger FVC than never-smokers, while no significant difference in lung capacity was found between daily and never-smokers who were more physically active. Few daily smokers exercised at high levels, however, and the fact that the absent significant association reflects the small number of daily-smoking athletes, cannot be excluded.</span></p><span data-dcnode-id="3093" instrument_node="">
</span><p data-dcnode-id="3079" id="p-34"><span data-dcnode-id="3092" instrument_node="">In this student population frequency of physical exercise, not type of sport, was associated with better lung capacity; this has been reported in some studies of athletes, particularly in swimmers </span><a class="xref-bibr" data-dcnode-id="3090" href="#ref-10" id="xref-ref-10-3"><span data-dcnode-id="3091" instrument_node="">10</span></a><span data-dcnode-id="3089" instrument_node="">, </span><a class="xref-bibr" data-dcnode-id="3087" href="#ref-12" id="xref-ref-12-1"><span data-dcnode-id="3088" instrument_node="">12</span></a><span data-dcnode-id="3086" instrument_node="">, </span><a class="xref-bibr" data-dcnode-id="3084" href="#ref-16" id="xref-ref-16-2"><span data-dcnode-id="3085" instrument_node="">16</span></a><span data-dcnode-id="3083" instrument_node="">, </span><a class="xref-bibr" data-dcnode-id="3081" href="#ref-17" id="xref-ref-17-4"><span data-dcnode-id="3082" instrument_node="">17</span></a><span data-dcnode-id="3080" instrument_node="">. In the present study, swimmers did not have better lung capacity than nonswimmers, but there were few swimmers and none competed at a high level. The independent association between participation in sports competitions and larger lung function suggests that intensity of physical activity may be associated with larger lung function.</span></p><span data-dcnode-id="3078" instrument_node="">
</span><p data-dcnode-id="3070" id="p-35"><span data-dcnode-id="3077" instrument_node="">In spite of the computerized ATS error code warnings during testing, and careful assessment of the quality of the flow/volume curves by the nurses, a number of students did not meet the 1987 ATS criteria as judged by the ATS error-code messages from the Jaeger Masterscope. Because the ATS criteria in adolescents has been reported to be difficult </span><a class="xref-bibr" data-dcnode-id="3075" href="#ref-23" id="xref-ref-23-2"><span data-dcnode-id="3076" instrument_node="">23</span></a><span data-dcnode-id="3074" instrument_node="">–</span><a class="xref-bibr" data-dcnode-id="3072" href="#ref-31" id="xref-ref-31-1"><span data-dcnode-id="3073" instrument_node="">31</span></a><span data-dcnode-id="3071" instrument_node="">, and excluding those not achieving ATS recommendations might exclude smokers, all students were included in the analysis. However, analyses were repeated excluding students not meeting the different Jaeger Masterscope ATS error codes with no significant differences in associations.</span></p><span data-dcnode-id="3069" instrument_node="">
</span><p data-dcnode-id="3061" id="p-36"><span data-dcnode-id="3068" instrument_node="">Rhinitis or bronchitis with cough was adjusted for in the regression analyses, as this might have had an impact on lung function, and all students who reported ever having asthma were excluded. The inclusion of adolescents reporting asthma in the analysis did not change the results (data not shown). Larger FEF</span><sub data-dcnode-id="3066"><span data-dcnode-id="3067" instrument_node="">50</span></sub><span data-dcnode-id="3065" instrument_node=""> and FEV</span><sub data-dcnode-id="3063"><span data-dcnode-id="3064" instrument_node="">1</span></sub><span data-dcnode-id="3062" instrument_node=""> values in never-smoking participants in team sports may reflect less airway dysfunction (not diagnosed as asthma) in students participating in these sports.</span></p><span data-dcnode-id="3060" instrument_node="">
</span><p data-dcnode-id="3052" id="p-37"><span data-dcnode-id="3059" instrument_node="">In self-reported physical exercise there is always a question of validity. The exercise questions used were chosen because they have been extensively used to describe and compare large groups in previously published population studies in many countries, including Norway </span><a class="xref-bibr" data-dcnode-id="3057" href="#ref-32" id="xref-ref-32-1"><span data-dcnode-id="3058" instrument_node="">32</span></a><span data-dcnode-id="3056" instrument_node="">, </span><a class="xref-bibr" data-dcnode-id="3054" href="#ref-33" id="xref-ref-33-1"><span data-dcnode-id="3055" instrument_node="">33</span></a><span data-dcnode-id="3053" instrument_node="">. The questions did not ask about seasonal exercise, but the majority of the adolescents who reported physical exercise were engaged in both winter and summer activities (data not shown). Substituting days per week with hours per week of exercise or using a combination of the two did not change the results (data not shown).</span></p><span data-dcnode-id="3051" instrument_node="">
</span><p data-dcnode-id="3043" id="p-38"><span data-dcnode-id="3050" instrument_node="">Smoking habits are also potentially subject to biased reporting. Confidentiality and consistency with other studies of adolescent smoking habits support the validity and generalizability of the results </span><a class="xref-bibr" data-dcnode-id="3048" href="#ref-4" id="xref-ref-4-5"><span data-dcnode-id="3049" instrument_node="">4</span></a><span data-dcnode-id="3047" instrument_node="">, </span><a class="xref-bibr" data-dcnode-id="3045" href="#ref-32" id="xref-ref-32-2"><span data-dcnode-id="3046" instrument_node="">32</span></a><span data-dcnode-id="3044" instrument_node="">. The long dark winters of northern Norway may impact exercise preferences in youths, but do not appear to have impacted smoking patterns.</span></p><span data-dcnode-id="3042" instrument_node="">
</span><p data-dcnode-id="3037" id="p-39"><span data-dcnode-id="3041" instrument_node="">More frequent physical exercise was associated with less daily smoking, but daily smoking was more common in youths performing some individual sports. Smokers quit sports more often than never-smokers. A significant dose/response relationship between lung capacity (FVC and FEV</span><sub data-dcnode-id="3039"><span data-dcnode-id="3040" instrument_node="">1</span></sub><span data-dcnode-id="3038" instrument_node="">) and levels of physical exercise was observed in never-smokers, but not in daily smokers.</span></p><span data-dcnode-id="3036" instrument_node="">
</span><p data-dcnode-id="3034" id="p-40"><span data-dcnode-id="3035" instrument_node="">These data provide indirect support for the promotion of physical activity as a smoking prevention strategy, and suggest that sports organizations should include smoking-prevention programmes. Initiation of sports programmes before the average age of smoking initiation (13 yrs in this study) could potentially yield long-term benefits in pulmonary function. Self-selection of adolescents with better lung function into sports is also suggested by these data, but causality will need to be studied prospectively.</span></p><span data-dcnode-id="3033" instrument_node="">
