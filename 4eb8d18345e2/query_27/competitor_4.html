;"><span data-dcnode-id="5524" style="font-weight: normal; font-style: normal; background: none;"><span data-dcnode-id="5525" instrument_node="">Digestion takes a lot of energy to accomplish effectively. At altitude your body is making many changes to the composition of your blood to increase oxygen carrying capacity. Until that occurs your stomach and small intestine are arbsorbing fewer nutrients due to the lack of oxygen to provide the full amount of energy needed for digestion, leaving more sugars and other fermentables for the bacteria in your lower gut. Those little beasts experience a bloom, and release lots of gas as they digest the food you didn't. As your digestion returns to full capacity the bloom will cease and you will return to your normal gassy condition.</span></span></p><span data-dcnode-id="5522" instrument_node=""> </span><p class="q-text qu-display--block qu-wordBreak--break-word qu-textAlign--start" data-dcnode-id="5519" style="box-sizing: border-box; margin-bottom: 1em; overflow-wrap: anywhere; direction: ltr;"><span data-dcnode-id="5520" style="font-weight: normal; font-style: normal; background: none;"><span data-dcnode-id="5521" instrument_node="">I have often wondered if the lower atmospheric pressure at altitude can also cause the gas in your gut to be released at a greater relative volume than at sea level. Think of the bag of chips you bought at sea level and brought with you to the top of the mountain. As atmospheric pressure outside the bag decreases, the air inside the bag expands in volume. Perhaps those farts are doing the same, and so there is more to release.</span></span></p><span data-dcnode-id="5518" instrument_node=""> </span><p class="q-text qu-display--block qu-wordBreak--break-word qu-textAlign--start" data-dcnode-id="5515" style="box-sizing: border-box; margin-bottom: 1em; overflow-wrap: anywhere; direction: ltr;"><span data-dcnode-id="5516" style="font-weight: normal; font-style: normal; background: none;"><span data-dcn ; background: none;"><span data-dcnode-id="4743" instrument_node="">The percentage of oxygen in a parcel of air does not change with increased altitude. What does change is the air pressure experienced by the person. For oxygen to move from the air in the lungs into the blood stream, a certain level of air pressure is required. Less air pressure, less O2 transfer. At about 17,000 feet altitude, one half of the total atmosphere by weight of the entire earth is below that altitude and one half is above 17,000 feet. Therefore air pressure decreases rapidly with increased altitude. Time of useful conciousness at 24,000 feet altitude is about 3 to 5 minutes in the </span></span></p><div class="q-absolute qu-textAlign--center qu-zIndex--base" data-dcnode-id="4729" style="box-sizing: border-box; position: absolute; width: 100%; height: 100px; bottom: 0px; background: linear-gradient(rgba(255, 255, 255, 0) 0%, rgb(255, 255, 255) 100%);" width="100%"><div class="q-inlineFlex" data-dcnode-id="4730" style="box-sizing: border-box; display: inline-flex;"><div class="q-relative" data-dcnode-id="4731" style="box-sizing: border-box; position: relative; bottom: -60px;"><button class="q-click-wrapper qu-active--textDecoration--none qu-focus--textDecoration--none ClickWrapper___StyledClickWrapperBox-zoqi4f-0 bIwtPb base___StyledClickWrapper-lx6eke-1 fURggN puppeteer_test_read_more_button qu-borderRadius--pill qu-alignItems--center qu-justifyContent--center qu-whiteSpace--nowrap qu-userSelect--none qu-display--inline-flex qu-bg--gray_ultralight qu-tapHighlight--white qu-textAlign--center qu-cursor--pointer qu-hover--textDecoration--none" data-dcnode-id="4732" role="button" style="box-sizing: border-box; font: inherit; padding: 0px 15px; transition-property: box-shadow, background-color; transition-duration: 60ms; transition-timing-function: ease-out; height: 30px; min-width: 30px; position: relative; box-shadow: rgba(99, 100, 102, 0.2) 0px 0px 0px 1px inset; border-width: 0px; outline: ow-wrap: anywhere; direction: ltr;"><span data-dcnode-id="4722" style="font-weight: normal; font-style: normal; background: none;"><span data-dcnode-id="4723" instrument_node="">The percentage of oxygen in a parcel of air does not change with increased altitude. What does change is the air pressure experienced by the person. For oxygen to move from the air in the lungs into the blood stream, a certain level of air pressure is required. Less air pressure, less O2 transfer. At about 17,000 feet altitude, one half of the total atmosphere by weight of the entire earth is below that altitude and one half is above 17,000 feet. Therefore air pressure decreases rapidly with increased altitude. Time of useful conciousness at 24,000 feet altitude is about 3 to 5 minutes in the average person. A person experiencing this feels quite normal. There is no gasping for air and very little discomfort. They just go to sleep. Its exactly the same sensation that you feel when you doze off in a boring lecture. Without cabin pressurization, airliners would have to stay below 10,000 feet, go slower and burn far more fuel.</span></span></p></span></span></div></div></div></div></div></div></div><div class="q-box qu-zIndex--action_bar" data-dcnode-id="4649" style="box-sizing: border-box;"><div class="q-box ActionBar___StyledBox-sc-1tz1b8b-1 jxrrvA" data-dcnode-id="4650" style="box-sizing: border-box; transition-property: box-shadow; transition-duration: 250ms; transition-timing-function: ease-out;"><div class="q-flex qu-justifyContent--space-between qu-alignItems--center qu-flexWrap--nowrap qu-py--tiny" data-dcnode-id="4651" style="box-sizing: border-box; display: flex;"><div class="q-flex qu-alignItems--center" data-dcnode-id="4665" style="box-sizing: border-box; display: flex;"><div class="q-inlineFlex qu-mr--small" data-dcnode-id="4687" style="box-sizing: border-box; display: inline-flex;"><div class="q-inlineFlex qu-borderRadius--pill qu-alignItems--center" data-dcnode-id="4688" style="b  allow the watermelon to pass through your system.</span><br data-dcnode-id="3959"><span data-dcnode-id="3958" instrument_node="">Then what happens is the watermelon which contains quite a bit of natural sugar will start to ferment in your system, creating discomfort and gas. If this type of thing happens to you often, I suggest you find out about Food Combining principles. As well, people who suffer from heartburn, or GERD -the reason is often poor food combining as in the example I gave above. There are books on the subject of food combining and there is probably a lot of information about it online.</span></span></p></span></span></div></div></div></div></div></div></div><div class="q-box qu-zIndex--action_bar" data-dcnode-id="3884" style="box-sizing: border-box;"><div class="q-box ActionBar___StyledBox-sc-1tz1b8b-1 jxrrvA" data-dcnode-id="3885" style="box-sizing: border-box; transition-property: box-shadow; transition-duration: 250ms; transition-timing-function: ease-out;"><div class="q-flex qu-justifyContent--space-between qu-alignItems--center qu-flexWrap--nowrap qu-py--tiny" data-dcnode-id="3886" style="box-sizing: border-box; display: flex;"><div class="q-flex qu-alignItems--center" data-dcnode-id="3900" style="box-sizing: border-box; display: flex;"><div class="q-inlineFlex qu-mr--small" data-dcnode-id="3922" style="box-sizing: border-box; display: inline-flex;"><div class="q-inlineFlex qu-borderRadius--pill qu-alignItems--center" data-dcnode-id="3923" style="box-sizing: border-box; display: inline-flex; background-color: rgba(0, 0, 1, 0.03);"><div class="q-box qu-display--inline-block" data-dcnode-id="3933" style="box-sizing: border-box; pointer-events: all;"><div class="q-relative puppeteer_popper_reference" data-dcnode-id="3934" style="box-sizing: border-box; position: relative;"><button aria-label="1 upvote" class="q-click-wrapper ClickWrapper___StyledClickWrapperBox-zoqi4f-0 bIwtPb base___StyledClickWrapper-lx6eke-1 eqENAR undefined qu-borderTopLeftRad ground: none;"><span data-dcnode-id="3023" instrument_node="">Living healthier at higher elevations</span></span></li></ul><div class="q-box qu-mx--n_medium" data-dcnode-id="3017" style="box-sizing: border-box;"><div class="q-box" data-dcnode-id="3018" style="box-sizing: border-box; position: relative; margin-bottom: 1em; transition-property: undefined; transition-duration: 1s; transition-timing-function: ease-out; filter: blur(0px);"><img class="q-image qu-cursor--default qu-display--block" data-dcnode-id="3019" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//qph.fs.quoracdn.net/main-qimg-9fa6a2ba42270a4b03f54fcfb59fb68a-lq&amp;raw" style="box-sizing: border-box; max-width: 100%; margin-left: auto; margin-right: auto;"></div></div><p class="q-text qu-display--block qu-wordBreak--break-word qu-textAlign--start" data-dcnode-id="3014" style="box-sizing: border-box; margin-bottom: 1em; overflow-wrap: anywhere; direction: ltr;"><span data-dcnode-id="3015" style="font-weight: normal; font-style: normal; background: none;"><span data-dcnode-id="3016" instrument_node="">Living healthier at higher elevations</span></span></p><span data-dcnode-id="3013" instrument_node=""> </span><p class="q-text qu-display--block qu-wordBreak--break-word qu-textAlign--start" data-dcnode-id="3010" style="box-sizing: border-box; margin-bottom: 1em; overflow-wrap: anywhere; direction: ltr;"><span data-dcnode-id="3011" style="font-weight: normal; font-style: normal; background: none;"><span data-dcnode-id="3012" instrument_node="">magine a place where you can be thinner, where your risk of heart and lung disease is less, where you'd be just all-around healthier. There is such a place.</span></span></p><span data-dcnode-id="3009" instrument_node=""> </span><p class="q-text qu-display--block qu-wordBreak--break-word qu-textAlign--start" data-dcnode-id="3006" style="box-sizing: border-box; margin-bottom: 1em; overflow-wrap: anywhere; direction: ltr;"><span data-dcnode-id="3007" style="font-weight: normal; font-style: normal; background: none;"><span data-dcnode-id="3008" instrument_node="">Let's call it Colorado. Or Nepal. Or Peru. Anyplace with mountains.</span></span></p><span data-dcnode-id="3005" instrument_node=""> </span><p class="q-text qu-display--block qu-wordBreak--break-word qu-textAlign--start" data-dcnode-id="3002" style="box-sizing: border-box; margin-bottom: 1em; overflow-wrap: anywhere; direction: ltr;"><span data-dcnode-id="3003" style="font-weight: normal; font-style: normal; background: none;"><span data-dcnode-id="3004" instrument_node="">Recent studies have indicated that there are definite health benefits to living at altitude.</span></span></p><span data-dcnode-id="3001" instrument_node=""> </span><p class="q-text qu-display--block qu-wordBreak--break-word qu-textAlign--start" data-dcnode-id="2998" style="box-sizing: border-box; margin-bottom: 1em; overflow-wrap: anywhere; direction: ltr;"><span data-dcnode-id="2999" style="font-weight: normal; font-style: normal; background: none;"><span data-dcnode-id="3000" instrument_node="">Start with obesity.</span></span></p><span data-dcnode-id="2997" instrument_node=""> </span><p class="q-text qu-display--block qu-wordBreak--break-word qu-textAlign--start" data-dcnode-id="2994" style="box-sizing: border-box; margin-bottom: 1em; overflow-wrap: anywhere; direction: ltr;"><span data-dcnode-id="2995" style="font-weight: normal; font-style: normal; background: none;"><span data-dcnode-id="2996" instrument_node="">"We've known since the 1920s (that) if you go to really high altitudes you will lose weight," says Robert Roach, director of the Altitude Research Center in Aurora, Colo., which studies how hypoxia, a lack of oxygen, affects health and performance. "It was one of the major concerns when the British were trying to figure out how to climb Mount Everest, how to get enough calories to survive. There's been no exception to this finding. Every expedition that's gone to high altitude, people have lost weight."</span></span></p><span data-dcnode-id="2993" instrument_node=""> </span><p class="q-text qu-display--block qu-wordBreak--break-word qu-textAlign--start" data-dcnode-id="2990" style="box-sizing: border-box; margin-bottom: 1em; overflow-wrap: anywhere; direction: ltr;"><span data-dcnode-id="2991" style="font-weight: normal; font-style: normal; background: none;"><span data-dcnode-id="2992" instrument_node="">Even when test subjects were placed in an altitude chamber for 40 days and allowed to eat whatever they wanted, they lost significant weight.</span></span></p><span data-dcnode-id="2989" instrument_node=""> </span><p class="q-text qu-display--block qu-wordBreak--break-word qu-textAlign--start" data-dcnode-id="2986" style="box-sizing: border-box; margin-bottom: 1em; overflow-wrap: anywhere; direction: ltr;"><span data-dcnode-id="2987" style="font-weight: normal; font-style: normal; background: none;"><span data-dcnode-id="2988" instrument_node="">Because obesity can lead to a host of other problems — diabetes, heart and lung issues — keeping the weight off can only help.</span></span></p><span data-dcnode-id="2985" instrument_node=""> </span><p class="q-text qu-display--block qu-wordBreak--break-word qu-textAlign--start" data-dcnode-id="2982" style="box-sizing: border-box; margin-bottom: 1em; overflow-wrap: anywhere; direction: ltr;"><span data-dcnode-id="2983" style="font-weight: normal; font-style: normal; background: none;"><span data-dcnode-id="2984" instrument_node="">Colorado is a good example.</span></span></p><span data-dcnode-id="2981" instrument_node=""> </span><p class="q-text qu-display--block qu-wordBreak--break-word qu-textAlign--start" data-dcnode-id="2978" style="box-sizing: border-box; margin-bottom: 1em; overflow-wrap: anywhere; direction: ltr;"><span data-dcnode-id="2979" style="font-weight: normal; font-style: normal; background: none;"><span data-dcnode-id="2980" instrument_node="">A report released in July by the Robert Wood Johnson Foundation, a nonprofit group that focuses on health issues, found that Colorado had the lowest obesity rate (19.8 percent) in the U.S. It was the only state under 20 percent. It's also a healthy state, with lower rates of heart disease, diabetes and some cancers.</span></span></p><span data-dcnode-id="2977" instrument_node=""> </span><p class="q-text qu-display--block qu-wordBreak--break-word qu-textAlign--start" data-dcnode-id="2974" style="box-sizing: border-box; margin-bottom: 1em; overflow-wrap: anywhere; direction: ltr;"><span data-dcnode-id="2975" style="font-weight: normal; font-style: normal; background: none;"><span data-dcnode-id="2976" instrument_node="">Roach says there are two schools of thought. Perhaps, purely by chance, a lot of active, healthy people have settled in Colorado. But there are several other states — California, Oregon, Washington — where an outdoors lifestyle is prevalent and where people are active, and those states are losing ground in the battle of the bulge.</span></span></p><span data-dcnode-id="2973" instrument_node=""> </span><p class="q-text qu-display--block qu-wordBreak--break-word qu-textAlign--start" data-dcnode-id="2970" style="box-sizing: border-box; margin-bottom: 1em; overflow-wrap: anywhere; direction: ltr;"><span data-dcnode-id="2971" style="font-weight: normal; font-style: normal; background: none;"><span data-dcnode-id="2972" instrument_node="">What Colorado has that those other states don't is altitude. With an average altitude of 6,800 feet above sea level, it's the highest state in the U.S.</span></span></p><span data-dcnode-id="2969" instrument_node=""> </span><p class="q-text qu-display--block qu-wordBreak--break-word qu-textAlign--start" data-dcnode-id="2966" style="box-sizing: border-box; margin-bottom: 1em; overflow-wrap: anywhere; direction: ltr;"><span data-dcnode-id="2967" style="font-weight: normal; font-style: normal; background: none;"><span data-dcnode-id="2968" instrument_node="">A study published this year in the Journal of Epidemiology and Community Health found that living at higher altitude may have a protective effect on ischemic heart disease. Researchers note that Colorado has the nation's lowest death rate from heart disease and has lower rates of lung and colon cancer.</span></span></p><span data-dcnode-id="2965" instrument_node=""> </span><p class="q-text qu-display--block qu-wordBreak--break-word qu-textAlign--start" data-dcnode-id="2962" style="box-sizing: border-box; margin-bottom: 1em; overflow-wrap: anywhere; direction: ltr;"><span data-dcnode-id="2963" style="font-weight: normal; font-style: normal; background: none;"><span data-dcnode-id="2964" instrument_node="">The findings echoed a study published in the journal in 2004. Researchers studied villages in Greece and found total and coronary mortality were lower for residents of a mountainous village in comparison with residents of two lowland villages.</span></span></p><span data-dcnode-id="2961" instrument_node=""> </span><p class="q-text qu-display--block qu-wordBreak--break-word qu-textAlign--start" data-dcnode-id="2958" style="box-sizing: border-box; margin-bottom: 1em; overflow-wrap: anywhere; direction: ltr;"><span data-dcnode-id="2959" style="font-weight: normal; font-style: normal; background: none;"><span data-dcnode-id="2960" instrument_node="">"If you look at people who live at high altitude around the world, incidents of most types of heart disease and stroke are much less," Roach says.</span></span></p><span data-dcnode-id="2957" instrument_node=""> </span><p class="q-text qu-display--block qu-wordBreak--break-word qu-textAlign--start" data-dcnode-id="2954" style="box-sizing: border-box; margin-bottom: 1em; overflow-wrap: anywhere; direction: ltr;"><span data-dcnode-id="2955" style="font-weight: normal; font-style: normal; background: none;"><span data-dcnode-id="2956" instrument_node="">Altitude is not a panacea, of course. The risk of skin cancer is higher because ultraviolet intensity is greater at higher elevations. And the lung disease statistics may be skewed by the fact that people with lung issues may leave the state because of the thin air, which makes breathing more difficult.</span></span></p><span data-dcnode-id="2953" instrument_node=""> </span><p class="q-text qu-display--block qu-wordBreak--break-word qu-textAlign--start" data-dcnode-id="2950" style="box-sizing: border-box; margin-bottom: 1em; overflow-wrap: anywhere; direction: ltr;"><span data-dcnode-id="2951" style="font-weight: normal; font-style: normal; background: none;"><span data-dcnode-id="2952" instrument_node="">But there's something there, and ongoing research could benefit those even at sea level.</span></span></p><span data-dcnode-id="2949" instrument_node=""> </span><p class="q-text qu-display--block qu-wordBreak--break-word qu-textAlign--start" data-dcnode-id="2946" style="box-sizing: border-box; margin-bottom: 1em; overflow-wrap: anywhere; direction: ltr;"><span data-dcnode-id="2947" style="font-weight: normal; font-style: normal; background: none;"><span data-dcnode-id="2948" instrument_node="">"By studying healthy people and how they adjust (to asphyxia), we might be able to come up with drugs that will help (people with heart, lung and blood diseases) use oxygen more efficiently, to use less of it," Roach says. "We learn about how people at high altitude live, but we may learn things that will help others in the future. It's very exciting."</span></span></p><div class="q-box qu-mx--n_medium" data-dcnode-id="2942" style="box-sizing: border-box;"><div class="q-relative qu-cursor--pointer" data-dcnode-id="2943" data-embed-type="youtube" style="box-sizing: border-box; position: relative; margin-bottom: 1em;" type="youtube"><div class="q-box qu-bg--gray_ultralight" data-dcnode-id="2945" style="box-sizing: border-box; background-image: url(&quot;https://img.youtube.com/vi/hER6W4lMKd0/0.jpg&quot;); width: 100%; box-shadow: rgba(0, 0, 0, 0.05) 0px 0px 0px 1px inset; transition-property: background-image; transition-duration: 180ms; transition-timing-function: ease-in-out; background-position: center center; background-size: cover; background-repeat: no-repeat; padding-top: 56.25%;" width="100%"></div><div class="q-absolute qu-full qu-zIndex--qtext_overlay" data-dcnode-id="2944" style="box-sizing: border-box; position: absolute; pointer-events: none; background: url(&quot;/static/ans_frontend_assets/images/play3.png&quot;) center center no-repeat transparent;"></div></div></div></span></span></div></div></div></div></div></div></div><div class="q-box qu-zIndex--action_bar" data-dcnode-id="2870" style="box-sizing: border-box;"><div class="q-box ActionBar___StyledBox-sc-1tz1b8b-1 jxrrvA" data-dcnode-id="2871" style="box-sizing: border-box; transition-property: box-shadow; transition-duration: 250ms; transition-timing-function: ease-out;"><div class="q-flex qu-justifyContent--space-between qu-alignItems--center qu-flexWrap--nowrap qu-py--tiny" data-dcnode-id="2872" style="box-sizing: border-box; display: flex;"><div class="q-flex qu-alignItems--center" data-dcnode-id="2886" style="box-sizing: border-box; display: flex;"><div class="q-inlineFlex qu-mr--small" data-dcnode-id="2908" style="box-sizing: border-box; display: inline-flex;"><div class="q-inlineFlex qu-borderRadius--pill qu-alignItems--center" data-dcnode-id="2909" style="box-sizing: border-box; display: inline-flex; background-color: rgba(0, 0, 1, 0.03);"><div class="q-box qu-display--inline-block" data-dcnode-id="2919" style="box-sizing: border-box; pointer-events: all;"><div class="q-relative puppeteer_popper_reference" data-dcnode-id="2920" style="box-sizing: border-box; position: relative;"><button aria-label="3 upvotes" class="q-click-wrapper ClickWrapper___StyledClickWrapperBox-zoqi4f-0 bIwtPb base___StyledClickWrapper-lx6eke-1 eqENAR undefined qu-borderTopLeftRadius--pill qu-borderBottomLeftRadius--pill qu-alignItems--center qu-just e-id="2408" instrument_node="">If I got severe altitude sickness once where I failed to acclimate, is it silly to try to go to a high spot again and acclimate for 3 days?</span></span></span></div></div></div></div></a></span></span></div></div></div></div><div class="q-click-wrapper qu-display--block qu-tapHighlight--white qu-cursor--pointer ClickWrapper___StyledClickWrapperBox-zoqi4f-0 bIwtPb" data-dcnode-id="2339" style="box-sizing: border-box; font: inherit; padding: 0px; width: 100%; position: relative; color: inherit; text-align: inherit;" tabindex="0" width="100%"><div class="q-box spacing_log_answer_content puppeteer_test_answer_content" data-dcnode-id="2340" style="box-sizing: border-box;"><div class="q-relative" data-dcnode-id="2341" style="box-sizing: border-box; position: relative;"><div class="q-absolute qu-full qu-zIndex--base" data-dcnode-id="2394" style="box-sizing: border-box; position: absolute;"></div><div class="q-box" data-dcnode-id="2342" style="box-sizing: border-box; max-width: 100%;"><div class="q-box qu-cursor--pointer QTextTruncated___StyledBox-sc-1pev100-0 ejgusd" data-dcnode-id="2366" style="box-sizing: border-box;"><div class="q-relative" data-dcnode-id="2367" style="box-sizing: border-box; position: relative;"><div class="q-box qu-overflow--hidden" data-dcnode-id="2368" style="box-sizing: border-box; max-height: 300px;"><div class="q-text qu-wordBreak--break-word" data-dcnode-id="2369" style="box-sizing: border-box;"><span class="q-box qu-userSelect--text" data-dcnode-id="2370" style="box-sizing: border-box;"><p class="q-text qu-display--block qu-wordBreak--break-word qu-textAlign--start" data-dcnode-id="2391" style="box-sizing: border-box; margin-bottom: 1em; overflow-wrap: anywhere; direction: ltr;"><span data-dcnode-id="2392" style="font-weight: normal; font-style: normal; background: none;"><span data-dcnode-id="2393" instrument_node="">My understanding is that even if you've never had altitude sickness if can hit you especially if you don't acclimate.</span></span></p><span data-dcnode-id="2390" instrument_node=""> </span><p class="q-text qu-display--block qu-wordBreak--break-word qu-textAlign--start" data-dcnode-id="2387" style="box-sizing: border-box; margin-bottom: 1em; overflow-wrap: anywhere; direction: ltr;"><span data-dcnode-id="2388" style="font-weight: normal; font-style: normal; background: none;"><span data-dcnode-id="2389" instrument_node="">If you go to Cuzco, relax and take it easy for at least a few days. Cuzco is actually higher in altitude than the surrounding areas (Machu Picchu, Valle Sagrada).  So relax in Cuzco...Take the city tour, DON'T DRINK (too much) ALCOHOL and let your body adapt.  The Valle Sagrada and the Machu Picchu ruins will then be doable without constant nausea (although you may still feel a little shortness of breath after climbing some of the stairs).</span></span></p><span data-dcnode-id="2386" instrument_node=""> </span><p class="q-text qu-display--block qu-wordBreak--break-word qu-textAlign--start" data-dcnode-id="2383" style="box-sizing: border-box; margin-bottom: 0px; overflow-wrap: anywhere; direction: ltr;"><span data-dcnode-id="2384" style="font-weight: normal; font-style: normal; background: none;"><span data-dcnode-id="2385" instrument_node="">Drink lots of coca tea (mate de coca).  </span></span></p><div class="q-absolute qu-textAlign--center qu-zIndex--base" data-dcnode-id="2371" style="box-sizing: border-box; position: absolute; width: 100%; height: 100px; bottom: 0px; background: linear-gradient(rgba(255, 255, 255, 0) 0%, rgb(255, 255, 255) 100%);" width="100%"><div class="q-inlineFlex" data-dcnode-id="2372" style="box-sizing: border-box; display: inline-flex;"><div class="q-relative" data-dcnode-id="2373" style="box-sizing: border-box; position: relative; bottom: -60px;"><button class="q-click-wrapper qu-active--textDecoration--none qu-focus--textDecoration--none ClickWrapper___StyledClickWrapperBox-zoqi4f-0 bIwtPb base___StyledClickWrappe he gut will expand as the ambient pressure drops. For example, if the individual has 1 L of methane in their colon at sea level, and they travel to 18,000 feet, assuming their temperature is the same, and no more gas has been produced, absorbed, or expelled, that person will now have 2 L of methane in their colon, occupying twice the volume of space.</span></span></p><span data-dcnode-id="2159" instrument_node=""> </span><p class="q-text qu-display--block qu-wordBreak--break-word qu-textAlign--start" data-dcnode-id="2156" style="box-sizing: border-box; margin-bottom: 1em; overflow-wrap: anywhere; direction: ltr;"><span data-dcnode-id="2157" style="font-weight: normal; font-style: normal; background: none;"><span data-dcnode-id="2158" instrument_node="">If that person goes to that altitude using a means that produces fear in them, the fear will alter the sympathetic and parasympathetic tone in their body which will alter gut motility; the fear may increase their insensible loss of water; may cause restricted fluid intake in the form of water and increased fluid intake in the form of ethyl alcohol, also known as ethanol, an organic solvent and flammable liquid, which interferes with all types of bodily homeostatic mechanisms, which may produce bloating as well.</span></span></p><span data-dcnode-id="2155" instrument_node=""> </span><p class="q-text qu-display--block qu-wordBreak--break-word qu-textAlign--start" data-dcnode-id="2152" style="box-sizing: border-box; margin-bottom: 1em; overflow-wrap: anywhere; direction: ltr;"><span data-dcnode-id="2153" style="font-weight: normal; font-style: normal; background: none;"><span data-dcnode-id="2154" instrument_node="">Bloating may also be produced by the accumulation of solids in the gut, not just gaseous and liquid materials. This may be due to increased consumption of comfort foods, increasing the amount of solid material in the gut and abdomen, which may also be experienced as bloating.</span></span></p><span data-dcnode-id="2151" instrument_node=""> </span><p class="q-text qu-display--block qu-wordBreak--break-word qu-textAlign--start" data-dcnode-id="2148" style="box-sizing: border-box; margin-bottom: 0px; overflow-wrap: anywhere; direction: ltr;"><span data-dcnode-id="2149" style="font-weight: normal; font-style: normal; background: none;"><span data-dcnode-id="2150" instrument_node="">Final Answer.</span></span></p></span></span></div></div></div></div></div></div></div><div class="q-box qu-zIndex--action_bar" data-dcnode-id="2071" style="box-sizing: border-box;"><div class="q-box ActionBar___StyledBox-sc-1tz1b8b-1 jxrrvA" data-dcnode-id="2072" style="box-sizing: border-box; transition-property: box-shadow; transition-duration: 250ms; transition-timing-function: ease-out;"><div class="q-flex qu-justifyContent--space-between qu-alignItems--center qu-flexWrap--nowrap qu-py--tiny" data-dcnode-id="2073" style="box-sizing: border-box; display: flex;"><div class="q-flex qu-alignItems--center" data-dcnode-id="2087" style="box-sizing: border-box; display: flex;"><div class="q-inlineFlex qu-mr--small" data-dcnode-id="2114" style="box-sizing: border-box; display: inline-flex;"><div class="q-inlineFlex qu-borderRadius--pill qu-alignItems--center" data-dcnode-id="2115" style="box-sizing: border-box; display: inline-flex; background-color: rgba(0, 0, 1, 0.03);"><div class="q-box qu-display--inline-block" data-dcnode-id="2125" style="box-sizing: border-box; pointer-events: all;"><div class="q-relative puppeteer_popper_reference" data-dcnode-id="2126" style="box-sizing: border-box; position: relative;"><button aria-label="9 upvotes" class="q-click-wrapper ClickWrapper___StyledClickWrapperBox-zoqi4f-0 bIwtPb base___StyledClickWrapper-lx6eke-1 eqENAR undefined qu-borderTopLeftRadius--pill qu-borderBottomLeftRadius--pill qu-alignItems--center qu-justifyContent--center qu-whiteSpace--nowrap qu-userSelect--none qu-display--inline-flex qu-tapHighlight--white qu-textAlign--center qu-cursor--pointer an></span></span><span data-dcnode-id="1505" style="font-weight: normal; font-style: normal; background: none;"><span data-dcnode-id="1506" instrument_node="">, and they all seem to think it's some genius work that definitively negated any and all relation between altitude and alcohol. Riiiight. This is why I like to read the stuff reporters cite, because reporters generally suck at science:</span></span></p><span data-dcnode-id="1503" instrument_node=""> </span><p class="q-text qu-display--block qu-wordBreak--break-word qu-textAlign--start" data-dcnode-id="1500" style="box-sizing: border-box; margin-bottom: 1em; overflow-wrap: anywhere; direction: ltr;"><span data-dcnode-id="1501" style="font-weight: normal; font-style: normal; background: none;"><span data-dcnode-id="1502" instrument_node=""></span></span></p><blockquote class="q-relative qu-color--gray qu-borderWidth--retinaOverride" data-dcnode-id="1495" style="box-sizing: border-box; position: relative; border-width: 0px; border-color: transparent; padding-left: 1em;"><p class="q-text qu-display--block qu-wordBreak--break-word qu-textAlign--start" data-dcnode-id="1497" style="box-sizing: border-box; margin-bottom: 0px; overflow-wrap: anywhere; direction: ltr;"><span data-dcnode-id="1498" style="font-weight: normal; font-style: normal; background: none;"><span data-dcnode-id="1499" instrument_node="">By Analysis of Variance </span></span></p><div class="q-absolute qu-borderRadius--pill QTextBlockQuote___StyledAbsolute-an1wlz-0 dHUDep" data-dcnode-id="1496" style="box-sizing: border-box; position: absolute; top: 0px; bottom: 0px; width: 3px; background-color: currentcolor; opacity: 0.3;" width="3"></div></blockquote><div class="q-absolute qu-textAlign--center qu-zIndex--base" data-dcnode-id="1483" style="box-sizing: border-box; position: absolute; width: 100%; height: 100px; bottom: 0px; background: linear-gradient(rgba(255, 255, 255, 0) 0%, rgb(255, 255, 255) 100%);" width="100%"><div class="q-inlineFlex" data-dcnode-id="1484" style="box-sizing: border-box; display: inline-flex;"><div class="q-relative" data-dcnode-id="1485" style="box-sizing: border-box; position: relative; bottom: -60px;"><button class="q-click-wrapper qu-active--textDecoration--none qu-focus--textDecoration--none ClickWrapper___StyledClickWrapperBox-zoqi4f-0 bIwtPb base___StyledClickWrapper-lx6eke-1 fURggN puppeteer_test_read_more_button qu-borderRadius--pill qu-alignItems--center qu-justifyContent--center qu-whiteSpace--nowrap qu-userSelect--none qu-display--inline-flex qu-bg--gray_ultralight qu-tapHighlight--white qu-textAlign--center qu-cursor--pointer qu-hover--textDecoration--none" data-dcnode-id="1486" role="button" style="box-sizing: border-box; font: inherit; padding: 0px 15px; transition-property: box-shadow, background-color; transition-duration: 60ms; transition-timing-function: ease-out; height: 30px; min-width: 30px; position: relative; box-shadow: rgba(99, 100, 102, 0.2) 0px 0px 0px 1px inset; border-width: 0px; outline: none; color: inherit;" tabindex="0" type="button"><div class="q-flex qu-alignItems--center qu-justifyContent--center" data-dcnode-id="1487" style="box-sizing: border-box; display: flex; max-width: 100%; transition-property: opacity; transition-duration: 60ms; transition-timing-function: ease-in-out;"><div class="q-text qu-display--inline-flex qu-alignItems--center qu-overflow--hidden puppeteer_test_button_text qu-medium qu-color--gray" data-dcnode-id="1492" style="box-sizing: border-box; font-size: 13px;"><div class="q-text qu-ellipsis qu-whiteSpace--nowrap" data-dcnode-id="1493" style="box-sizing: border-box; line-height: normal;"><span data-dcnode-id="1494" instrument_node="">Continue Reading</span></div></div><span class="q-inlineBlock qu-ml--tiny qu-mr--n_tiny" data-dcnode-id="1488" name="ChevronDown" style="box-sizing: border-box; display: inline-block; width: 16px; height: 16px; flex-shrink: 0; line-height: 16px;" width="16px"><span class="CssComponent__CssInlineComponent-sc-1oskqb9-1 Icon___StyledCssInlineComponent-sc-11tmcw7-0 fNkmIo" data-dcnode-id="1489"><svg data-dcnode-id="1490" height="24" viewBox="0 0 24 24" width="24" xmlns="http://www.w3.org/2000/svg"><path class="icon_svg-stroke" d="m5 8.5 7 7 7.005-7" data-dcnode-id="1491" fill="none" stroke="#666" stroke-linecap="round" stroke-width="1.5"></path></svg></span></span></div></button></div></div></div></span></div></div></div></div><div class="q-box qu-display--none" data-dcnode-id="1258" style="box-sizing: border-box;"><div class="q-text" data-dcnode-id="1259" style="box-sizing: border-box; max-width: 100%;"><span class="CssComponent__CssInlineComponent-sc-1oskqb9-1 UserSelectableText___StyledCssInlineComponent-lsmoq4-0 kghFzc" data-dcnode-id="1260"><span class="q-box qu-userSelect--text" data-dcnode-id="1261" style="box-sizing: border-box;"><p class="q-text qu-display--block qu-wordBreak--break-word qu-textAlign--start" data-dcnode-id="1475" style="box-sizing: border-box; margin-bottom: 1em; overflow-wrap: anywhere; direction: ltr;"><span data-dcnode-id="1476" style="font-weight: bold; font-style: normal; background: none;"><span data-dcnode-id="1477" instrument_node="">TL;DR: You should exercise caution if mixing altitude and alcohol.</span></span></p><span data-dcnode-id="1474" instrument_node=""> </span><p class="q-text qu-display--block qu-wordBreak--break-word qu-textAlign--start" data-dcnode-id="1462" style="box-sizing: border-box; margin-bottom: 1em; overflow-wrap: anywhere; direction: ltr;"><span data-dcnode-id="1472" style="font-weight: normal; font-style: normal; background: none;"><span data-dcnode-id="1473" instrument_node="">So, here's the deal: the studies on altitude and alcohol are not exactly...brilliant, if I'm honest. Everyone from the NY Times to Slate likes to cite this one paper by the FAA, </span></span><span class="q-inline" data-dcnode-id="1465" style="box-sizing: border-box; display: inline;"><a class="q-box qu-cursor--pointer qu-hover--textDecoration--underline Link___StyledBox-t2xg9c-0 KlcoI" data-dcnode-id="1470" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//libraryonline.erau.edu/online-full-text/faa-aviation-medicine-reports/AM70-05.pdf" rel="noopener nofollow" style="box-sizing: border-box; position: relative; border-radius: inherit; font-weight: normal; font-style: normal; background: none;" target="_blank" title="libraryonline.erau.edu"><span data-dcnode-id="1471" instrument_node="">Blood alcohol concentration as affected by combinations of alcoholic beverage doses and altitudes</span></a><span class="q-inlineBlock" data-dcnode-id="1466" name="ExternalLink" style="box-sizing: border-box; display: inline-block; width: 16px; height: 16px; flex-shrink: 0; line-height: 16px; margin-left: 2px;" width="16px"><span class="CssComponent__CssInlineComponent-sc-1oskqb9-1 Icon___StyledCssInlineComponent-sc-11tmcw7-0 ckJQOs" data-dcnode-id="1467"><svg data-dcnode-id="1468" height="24" viewBox="0 0 24 24" width="24" xmlns="http://www.w3.org/2000/svg"><path class="icon_svg-stroke" d="M17 13.5v6H5v-12h6m3-3h6v6m0-6-9 9" data-dcnode-id="1469" fill="none" fill-rule="evenodd" stroke="#666" stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5"></path></svg></span></span></span><span data-dcnode-id="1463" style="font-weight: normal; font-style: normal; background: none;"><span data-dcnode-id="1464" instrument_node="">, and they all seem to think it's some genius work that definitively negated any and all relation between altitude and alcohol. Riiiight. This is why I like to read the stuff reporters cite, because reporters generally suck at science:</span></span></p><span data-dcnode-id="1461" instrument_node=""> </span><p class="q-text qu-display--block qu-wordBreak--break-word qu-textAlign--start" data-dcnode-id="1458" style="box-sizing: border-box; margin-bottom: 1em; overflow-wrap: anywhere; direction: ltr;"><span data-dcnode-id="1459" style="font-weight: normal; font-style: normal; background: none;"><span data-dcnode-id="1460" instrument_node=""></span></span></p><blockquote class="q-relative qu-color--gray qu-borderWidth--retinaOverride" data-dcnode-id="1453" style="box-sizing: border-box; position: relative; margin-bottom: 1em; border-width: 0px; border-color: transparent; padding-left: 1em;"><p class="q-text qu-display--block qu-wordBreak--break-word qu-textAlign--start" data-dcnode-id="1455" style="box-sizing: border-box; margin-bottom: 1em; overflow-wrap: anywhere; direction: ltr;"><span data-dcnode-id="1456" style="font-weight: normal; font-style: normal; background: none;"><span data-dcnode-id="1457" instrument_node="">By Analysis of Variance the data revealed that a significant difference existed when considering the effect of cabin condition on blood alcohol concentration for the high alcohol dose (P≤0.05). Using the Student Multiple Range test, this study did verify the finding of the previous study, that blood alcohol concentrations were significantly higher for subjects at 20,000 ft. than for those at 12,000 ft. without supplemental oxygen (P≤0.05).</span></span></p><div class="q-absolute qu-borderRadius--pill QTextBlockQuote___StyledAbsolute-an1wlz-0 dHUDep" data-dcnode-id="1454" style="box-sizing: border-box; position: absolute; top: 0px; bottom: 0px; width: 3px; background-color: currentcolor; opacity: 0.3;" width="3"></div></blockquote><p class="q-text qu-display--block qu-wordBreak--break-word qu-textAlign--start" data-dcnode-id="1446" style="box-sizing: border-box; margin-bottom: 1em; overflow-wrap: anywhere; direction: ltr;"><span data-dcnode-id="1449" style="font-weight: normal; font-style: normal; background: none;"><span data-dcnode-id="1452" instrument_node=""></span><br data-dcnode-id="1451"><span data-dcnode-id="1450" instrument_node="">This significant effect of altitude was found with ~180 ml of 100-proof bourbon, which is about 4 shots. They did not find a significant effect with half that dosage, or about 2 shots. </span></span><span data-dcnode-id="1447" style="font-weight: normal; font-style: italic; background: none;"><span data-dcnode-id="1448" instrument_node="">In other words, adding more alcohol suddenly made altitude significant, which means the existence of an effect of altitude on alcohol is likely to be on a sliding scale, not some idiotic binary yes-or-no. Keep this notion in mind as you read the rest of this answer.</span></span></p><span data-dcnode-id="1445" instrument_node=""> </span><p class="q-text qu-display--block qu-wordBreak--break-word qu-textAlign--start" data-dcnode-id="1442" style="box-sizing: border-box; margin-bottom: 1em; overflow-wrap: anywhere; direction: ltr;"><span data-dcnode-id="1443" style="font-weight: normal; font-style: normal; background: none;"><span data-dcnode-id="1444" instrument_node=""></span></span></p><hr class="q-box qu-bg--gray" data-dcnode-id="1441" style="box-sizing: border-box; position: relative; margin: 2em auto; padding: 0px; width: 148px; height: 2px; border: 0px;" width="148px"><p class="q-text qu-display--block qu-wordBreak--break-word qu-textAlign--start" data-dcnode-id="1436" style="box-sizing: border-box; margin-bottom: 1em; overflow-wrap: anywhere; direction: ltr;"><span data-dcnode-id="1437" style="font-weight: normal; font-style: normal; background: none;"><span data-dcnode-id="1440" instrument_node=""></span><br data-dcnode-id="1439"><span data-dcnode-id="1438" instrument_node="">Here is a brief review of some other studies:</span></span></p><span data-dcnode-id="1435" instrument_node=""> </span><p class="q-text qu-display--block qu-wordBreak--break-word qu-textAlign--start" data-dcnode-id="1432" style="box-sizing: border-box; margin-bottom: 1em; overflow-wrap: anywhere; direction: ltr;"><span data-dcnode-id="1433" style="font-weight: normal; font-style: normal; background: none;"><span data-dcnode-id="1434" instrument_node=""></span></span></p><ul class="q-box" data-dcnode-id="1399" style="box-siz -webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//europepmc.org/abstract/MED/3202783" rel="noopener nofollow" style="box-sizing: border-box; position: relative; border-radius: inherit; font-weight: normal; font-style: normal; background: none;" target="_blank" title="europepmc.org"><span data-dcnode-id="1423" instrument_node="">Age, alcohol, and simulated altitude: effects on performance and breathalyzer scores.</span></a><span class="q-inlineBlock" data-dcnode-id="1418" name="ExternalLink" style="box-sizing: border-box; display: inline-block; width: 16px; height: 16px; flex-shrink: 0; line-height: 16px; margin-left: 2px;" width="16px"><span class="CssComponent__CssInlineComponent-sc-1oskqb9-1 Icon___StyledCssInlineComponent-sc-11tmcw7-0 ckJQOs" data-dcnode-id="1419"><svg data-dcnode-id="1420" height="24" viewBox="0 0 24 24" width="24" xmlns="http://www.w3.org/2000/svg"><path class="icon_svg-stroke" d="M17 13.5v6H5v-12h6m3-3h6v6m0-6-9 9" data-dcnode-id="1421" fill="none" fill-rule="evenodd" stroke="#666" stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5"></path></svg></span></span></span></li><li class="q-relative" data-dcnode-id="1408" style="box-sizing: border-box; position: relative; margin-left: 2em; padding-bottom: 0.7em;"><span class="q-inline" data-dcnode-id="1409" style="box-sizing: border-box; display: inline;"><a class="q-box qu-cursor--pointer qu-hover--textDecoration--underline Link___StyledBox-t2xg9c-0 KlcoI" data-dcnode-id="1414" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.ncbi.nlm.nih.gov/pubmed/4091895" rel="noopener nofollow" style="box-sizing: border-box; position: relative; border-radius: inherit; font-weight: normal; font-style: normal; background: none;" target="_blank" title="www.ncbi.nlm.nih.gov"><span data-dcnode-id="1415" instrument_node="">Electrophysiological effects of low do... [Alcohol Drug Res. 1985-1986]</span></a><span class="q-inlineBlock" data-dcnode-id="1410" name="ExternalLink" style="box-sizing: border-box; display: inline-block; width: 16px; height: 16px; flex-shrink: 0; line-height: 16px; margin-left: 2px;" width="16px"><span class="CssComponent__CssInlineComponent-sc-1oskqb9-1 Icon___StyledCssInlineComponent-sc-11tmcw7-0 ckJQOs" data-dcnode-id="1411"><svg data-dcnode-id="1412" height="24" viewBox="0 0 24 24" width="24" xmlns="http://www.w3.org/2000/svg"><path class="icon_svg-stroke" d="M17 13.5v6H5v-12h6m3-3h6v6m0-6-9 9" data-dcnode-id="1413" fill="none" fill-rule="evenodd" stroke="#666" stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5"></path></svg></span></span></span></li><li class="q-relative" data-dcnode-id="1400" style="box-sizing: border-box; position: relative; margin-left: 2em; padding-bottom: 0px;"><span class="q-inline" data-dcnode-id="1401" style="box-sizing: border-box; display: inline;"><a class="q-box qu-cursor--pointer qu-hover--textDecoration--underline Link___StyledBox-t2xg9c-0 KlcoI" data-dcnode-id="1406" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//annals.org/article.aspx%3Farticleid%3D708754" rel="noopener nofollow" style="box-sizing: border-box; position: relative; border-radius: inherit; font-weight: normal; font-style: normal; background: none;" target="_blank" title="annals.org"><span data-dcnode-id="1407" instrument_node="">Effect of Alcohol on Acute Ventilatory Adaptation to Mild Hypoxia at Moderate Altitude</span></a><span class="q-inlineBlock" data-dcnode-id="1402" name="ExternalLink" style="box-sizing: border-box; display: inline-block; width: 16px; height: 16px; flex-shrink: 0; line-height: 16px; margin-left: 2px;" width="16px"><span class="CssComponent__CssInlineComponent-sc-1oskqb9-1 Icon___StyledCssInlineComponent-sc-11tmcw7-0 ckJQOs" data-dcnode-id="1403"><svg data-dcnode-id="1404" height="24" viewBox="0 0 24 24" width="24" xmlns="http://www.w3.org/2000/svg"><path class="icon_svg-stroke" d="M17 13.5v6H5v-12h6m3-3h6v6m0-6-9 9" data-dcnode-id="1405" fill="none" fill-rule="evenodd" stroke="#666" stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5"></path></svg></span></span></span></li></ul><p class="q-text qu-display--block qu-wordBreak--break-word qu-textAlign--start" data-dcnode-id="1394" style="box-sizing: border-box; margin-bottom: 1em; overflow-wrap: anywhere; direction: ltr;"><span data-dcnode-id="1395" style="font-weight: normal; font-style: normal; background: none;"><span data-dcnode-id="1398" instrument_node=""></span><br data-dcnode-id="1397"><span data-dcnode-id="1396" instrument_node="">Problems with these papers: small sample size (e.g. results on 17 people do not extrapolate to the human race), oxygen masks given at high altitudes, simulated altitude not true altitude, altitudes tested not particularly high, etc, etc, etc.</span></span></p><span data-dcnode-id="1393" instrument_node=""> </span><p class="q-text qu-display--block qu-wordBreak--break-word qu-textAlign--start" data-dcnode-id="1390" style="box-sizing: border-box; margin-bottom: 1em; overflow-wrap: anywhere; direction: ltr;"><span data-dcnode-id="1391" style="font-weight: normal; font-style: normal; background: none;"><span data-dcnode-id="1392" instrument_node="">All in all, after parsing through the above and a few other papers on high altitude conditions eliciting undesired physiologic consequences, I've come up with a slightly doodle-heavy explanation.</span></span></p><span data-dcnode-id="1389" instrument_node=""> </span><p class="q-text qu-display--block qu-wordBreak--break-word qu-textAlign--start" data-dcnode-id="1384" style="box-sizing: border-box; margin-bottom: 1em; overflow-wrap: anywhere; direction: ltr;"><span data-dcnode-id="1385" style="font-weight: normal; font-style: normal; background: none;"><span data-dcnode-id="1388" instrument_node="">You can think of each person's ability to tolerate unfavorable physical conditions as a sort of "physiologic reserve" that "tanks" adverse conditions and prevents the body from tipping too far out of homeostasis too quickly and risking injury:</span><br data-dcnode-id="1387"><span data-dcnode-id="1386" instrument_node=""></span></span></p><div class="q-box qu-mx--n_medium" data-dcnode-id="1381" style="box-sizing: border-box;"><div class="q-box" data-dcnode-id="1382" style="box-sizing: border-box; position: relative; margin-bottom: 1em; transition-property: undefined; transition-duration: 1s; transition-timing-function: ease-out; filter: blur(0px);"><img class="q-image qu-cursor--default qu-display--block" data-dcnode-id="1383" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//qph.fs.quoracdn.net/main-qimg-038b5714252eed6d7c8a0c589711c2c6-lq&amp;raw" style="box-sizing: border-box; max-width: 100%; margin-left: auto; margin-right: auto;"></div></div><p class="q-text qu-display--block qu-wordBreak--break-word qu-textAlign--start" data-dcnode-id="1376" style="box-sizing: border-box; margin-bottom: 1em; overflow-wrap: anywhere; direction: ltr;"><span data-dcnode-id="1377" style="font-weight: normal; font-style: normal; background: none;"><span data-dcnode-id="1380" instrument_node="">Alcohol requires some physiologic reserve to tolerate:</span><br data-dcnode-id="1379"><span data-dcnode-id="1378" instrument_node=""></span></span></p><div class="q-box qu-mx--n_medium" data-dcnode-id="1373" style="box-sizing: border-box;"><div class="q-box" data-dcnode-id="1374" style="box-sizing: border-box; position: relative; margin-bottom: 1em; transition-property: undefined; transition-duration: 1s; transition-timing-function: ease-out; filter: blur(0px);"><img class="q-image qu-cursor--default qu-display--block" data-dcnode-id="1375" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//qph.fs.quoracdn.net/main-qimg-37e7a164ba37bb1475c8745523dbe179-lq&amp;raw" style="box-sizing: border-box; max-width: 100%; margin-left: auto; margin-right: auto;"></div></div><p class="q-text qu-display--block qu-wordBreak--break-word qu-textAlign--start" data-dcnode-id="1368" style="box-sizing: border-box; margin-bottom: 1em; overflow-wrap: anywhere; direction: ltr;"><span data-dcnode-id="1369" style="font-weight: normal; font-style: normal; background: none;"><span data-dcnode-id="1372" instrument_node="">It's a poison. A socially accepted and popular poison, yes, but a poison. If you drink too much or too fast, you'll use up more and more of your reserve...</span><br data-dcnode-id="1371"><span data-dcnode-id="1370" instrument_node=""></span></span></p><div class="q-box qu-mx--n_medium" data-dcnode-id="1365" style="box-sizing: border-box;"><div class="q-box" data-dcnode-id="1366" style="box-sizing: border-box; position: relative; margin-bottom: 1em; transition-property: undefined; transition-duration: 1s; transition-timing-function: ease-out; filter: blur(0px);"><img class="q-image qu-cursor--default qu-display--block" data-dcnode-id="1367" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//qph.fs.quoracdn.net/main-qimg-a6732b7d1849d4da6848abaadb8d6d4e-lq&amp;raw" style="box-sizing: border-box; max-width: 100%; margin-left: auto; margin-right: auto;"></div></div><p class="q-text qu-display--block qu-wordBreak--break-word qu-textAlign--start" data-dcnode-id="1362" style="box-sizing: border-box; margin-bottom: 1em; overflow-wrap: anywhere; direction: ltr;"><span data-dcnode-id="1363" style="font-weight: normal; font-style: normal; background: none;"><span data-dcnode-id="1364" instrument_node="">...and next thing you know you might find yourself waking up the following morning in the ER. Or a stranger's room with a broken nose wearing a gorilla suit and wondering why you have a tattoo of a hairy tortoise on your forehead.</span></span></p><span data-dcnode-id="1361" instrument_node=""> </span><p class="q-text qu-display--block qu-wordBreak--break-word qu-textAlign--start" data-dcnode-id="1347" style="box-sizing: border-box; margin-bottom: 1em; overflow-wrap: anywhere; direction: ltr;"><span data-dcnode-id="1359" style="font-weight: normal; font-style: normal; background: none;"><span data-dcnode-id="1360" instrument_node="">The thing is, altitude that you're not accustomed to also requires some physiologic reserve too, as seen in </span></span><span class="q-inline" data-dcnode-id="1352" style="box-sizing: border-box; display: inline;"><a class="q-box qu-cursor--pointer qu-hover--textDecoration--underline Link___StyledBox-t2xg9c-0 KlcoI" data-dcnode-id="1357" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.ncbi.nlm.nih.gov/pubmed/8452324" rel="noopener nofollow" style="box-sizing: border-box; position: relative; border-radius: inherit; font-weight: normal; font-style: normal; background: none;" target="_blank" title="www.ncbi.nlm.nih.gov"><span data-dcnode-id="1358" instrument_node="">Acute mountain sickness in a general tourist ... [Ann Intern Med. 1993]</span></a><span class="q-inlineBlock" data-dcnode-id="1353" name="ExternalLink" style="box-sizing: border-box; display: inline-block; width: 16px; height: 16px; flex-shrink: 0; line-height: 16px; margin-left: 2px;" width="16px"><span class="CssComponent__CssInlineComponent-sc-1oskqb9-1 Icon___StyledCssInlineComponent-sc-11tmcw7-0 ckJQOs" data-dcnode-id="1354"><svg data-dcnode-id="1355" height="24" viewBox="0 0 24 24" width="24" xmlns="http://www.w3.org/2000/svg"><path class="icon_svg-stroke" d="M17 13.5v6H5v-12h6m3-3h6v6m0-6-9 9" data-dcnode-id="1356" fill="none" fill-rule="evenodd" stroke="#666" stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5"></path></svg></span></span></span><span data-dcnode-id="1348" style="font-weight: normal; font-style: normal; background: none;"><span data-dcnode-id="1351" instrument_node="">:</span><br data-dcnode-id="1350"><span data-dcnode-id="1349" instrument_node=""></span></span></p><div class="q-box qu-mx--n_medium" data-dcnode-id="1344" style="box-sizing: border-box;"><div class="q-box" data-dcnode-id="1345" style="box-sizing: border-box; position: relative; margin-bottom: 1em; transition-property: undefined; transition-duration: 1s; transition-timing-function: ease-out; filter: blur(0px);"><img class="q-image qu-cursor--default qu-display--block" data-dcnode-id="1346" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//qph.fs.quoracdn.net/main-qimg-33ab4d44549e84ddf12cebb7a023fd86-lq&amp;raw" style="box-sizing: border-box; max-width: 100%; margin-left: auto; margin-right: auto;"></div></div><p class="q-text qu-display--block qu-wordBreak--break-word qu-textAlign--start" data-dcnode-id="1337" style="box-sizing: border-box; margin-bottom: 1em; overflow-wrap: anywhere; direction: ltr;"><span data-dcnode-id="1338" style="font-weight: normal; font-style: normal; background: none;"><span data-dcnode-id="1343" instrument_node=""></span><br data-dcnode-id="1342"><span data-dcnode-id="1341" instrument_node="">Altitude is pretty challenging stuff, if you're not used to it. Your body as a whole is compensating for oxygen changes and undergoing physiologic responses to its acid-base chemistry to keep you alive and functioning. The higher you go, the more reserve you need:</span><br data-dcnode-id="1340"><span data-dcnode-id="1339" instrument_node=""></span></span></p><div class="q-box qu-mx--n_medium" data-dcnode-id="1334" style="box-sizing: border-box;"><div class="q-box" data-dcnode-id="1335" style="box-sizing: border-box; position: relative; margin-bottom: 1em; transition-property: undefined; transition-duration: 1s; transition-timing-function: ease-out; filter: blur(0px);"><img class="q-image qu-cursor--default qu-display--block" data-dcnode-id="1336" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//qph.fs.quoracdn.net/main-qimg-f8c4752dc876d3d9006ac49a0a8da82b-lq&amp;raw" style="box-sizing: border-box; max-width: 100%; margin-left: auto; margin-right: auto;"></div></div><p class="q-text qu-display--block qu-wordBreak--break-word qu-textAlign--start" data-dcnode-id="1327" style="box-sizing: border-box; margin-bottom: 1em; overflow-wrap: anywhere; direction: ltr;"><span data-dcnode-id="1328" style="font-weight: normal; font-style: normal; background: none;"><span data-dcnode-id="1333" instrument_node=""></span><br data-dcnode-id="1332"><span data-dcnode-id="1331" instrument_node="">So...imagine then, if you mix the two, what might occur. You have two forces competing for space in your physiologic reserve. It's obviously going to be THAT much easier to hit the max and become hammered. It's not just altitude's fault, and it's not just alcohol's fault, but they definitely don't make things easy for each other. If you balance carefully, you might well be just fine, with maybe even some room to spare...</span><br data-dcnode-id="1330"><span data-dcnode-id="1329" instrument_node=""></span></span></p><div class="q-box qu-mx--n_medium" data-dcnode-id="1324" style="box-sizing: border-box;"><div class="q-box" data-dcnode-id="1325" style="box-sizing: border-box; position: relative; margin-bottom: 1em; transition-property: undefined; transition-duration: 1s; transition-timing-function: ease-out; filter: blur(0px);"><img class="q-image qu-cursor--default qu-display--block" data-dcnode-id="1326" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//qph.fs.quoracdn.net/main-qimg-f2d1281d87abe01484475c30d27a9d3b-lq&amp;raw" style="box-sizing: border-box; max-width: 100%; margin-left: auto; margin-right: auto;"></div></div><p class="q-text qu-display--block qu-wordBreak--break-word qu-textAlign--start" data-dcnode-id="1319" style="box-sizing: border-box; margin-bottom: 1em; overflow-wrap: anywhere; direction: ltr;"><span data-dcnode-id="1320" style="font-weight: normal; font-style: normal; background: none;"><span data-dcnode-id="1323" instrument_node="">...but at higher altitudes or alcohol consumption levels, it's just so much easier to do one of the following:</span><br data-dcnode-id="1322"><span data-dcnode-id="1321" instrument_node=""></span></span></p><div class="q-box qu-mx--n_medium" data-dcnode-id="1316" style="box-sizing: border-box;"><div class="q-box" data-dcnode-id="1317" style="box-sizing: border-box; position: relative; margin-bottom: 1em; transition-property: undefined; transition-duration: 1s; transition-timing-function: ease-out; filter: blur(0px);"><img class="q-image qu-cursor--default qu-display--block" data-dcnode-id="1318" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//qph.fs.quoracdn.net/main-qimg-ffadb4a10b36a670077e379238a8206d-lq&amp;raw" style="box-sizing: border-box; max-width: 100%; margin-left: auto; margin-right: auto;"></div></div><span data-dcnode-id="1315" instrument_node=""> </span><div class="q-box qu-mx--n_medium" data-dcnode-id="1312" style="box-sizing: border-box;"><div class="q-box" data-dcnode-id="1313" style="box-sizing: border-box; position: relative; margin-bottom: 1em; transition-property: undefined; transition-duration: 1s; transition-timing-function: ease-out; filter: blur(0px);"><img class="q-image qu-cursor--default qu-display--block" data-dcnode-id="1314" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//qph.fs.quoracdn.net/main-qimg-d4e92c0c7a8b1f890be5ed0c2b6ef26a-lq&amp;raw" style="box-sizing: border-box; max-width: 100%; margin-left: auto; margin-right: auto;"></div></div><p class="q-text qu-display--block qu-wordBreak--break-word qu-textAlign--start" data-dcnode-id="1305" style="box-sizing: border-box; margin-bottom: 1em; overflow-wrap: anywhere; direction: ltr;"><span data-dcnode-id="1306" style="font-weight: normal; font-style: normal; background: none;"><span data-dcnode-id="1311" instrument_node=""></span><br data-dcnode-id="1310"><span data-dcnode-id="1309" instrument_node="">The key is this: note that altitude is always going to be using some physiologic reserve until you go back to sea level, meaning that you may well be drunk for a little while longer before you're back within your physiologic reserve's usual limits. In other words, while this...</span><br data-dcnode-id="1308"><span data-dcnode-id="1307" instrument_node=""></span></span></p><div class="q-box qu-mx--n_medium" data-dcnode-id="1302" style="box-sizing: border-box;"><div class="q-box" data-dcnode-id="1303" style="box-sizing: border-box; position: relative; margin-bottom: 1em; transition-property: undefined; transition-duration: 1s; transition-timing-function: ease-out; filter: blur(0px);"><img class="q-image qu-cursor--default qu-display--block" data-dcnode-id="1304" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//qph.fs.quoracdn.net/main-qimg-4760038e8ed3be1740b6bf638e4b9a02-lq&amp;raw" style="box-sizing: border-box; max-width: 100%; margin-left: auto; margin-right: auto;"></div></div><p class="q-text qu-display--block qu-wordBreak--break-word qu-textAlign--start" data-dcnode-id="1297" style="box-sizing: border-box; margin-bottom: 1em; overflow-wrap: anywhere; direction: ltr;"><span data-dcnode-id="1298" style="font-weight: normal; font-style: normal; background: none;"><span data-dcnode-id="1301" instrument_node="">...may normally take you 3 hours to process at sea level, you're still reasonably functional, because you're within your physiologic reserve. The same amount of alcohol at high altitude may look like this...</span><br data-dcnode-id="1300"><span data-dcnode-id="1299" instrument_node=""></span></span></p><div class="q-box qu-mx--n_medium" data-dcnode-id="1294" style="box-sizing: border-box;"><div class="q-box" data-dcnode-id="1295" style="box-sizing: border-box; position: relative; margin-bottom: 1em; transition-property: undefined; transition-duration: 1s; transition-timing-function: ease-out; filter: blur(0px);"><img class="q-image qu-cursor--default qu-display--block" data-dcnode-id="1296" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//qph.fs.quoracdn.net/main-qimg-d4e92c0c7a8b1f890be5ed0c2b6ef26a-lq&amp;raw" style="box-sizing: border-box; max-width: 100%; margin-left: auto; margin-right: auto;"></div></div><p class="q-text qu-display--block qu-wordBreak--break-word qu-textAlign--start" data-dcnode-id="1291" style="box-sizing: border-box; margin-bottom: 1em; overflow-wrap: anywhere; direction: ltr;"><span data-dcnode-id="1292" style="font-weight: normal; font-style: normal; background: none;"><span data-dcnode-id="1293" instrument_node="">...which may translate to you being out of commission for at least an hour while you recover back within your physiologic reserve, even with the same quantity of alcohol.</span></span></p><span data-dcnode-id="1290" instrument_node=""> </span><p class="q-text qu-display--block qu-wordBreak--break-word qu-textAlign--start" data-dcnode-id="1285" style="box-sizing: border-box; margin-bottom: 1em; overflow-wrap: anywhere; direction: ltr;"><span data-dcnode-id="1286" style="font-weight: normal; font-style: normal; background: none;"><span data-dcnode-id="1289" instrument_node="">Hence the notion of a sliding scale, as mentioned above. The extent to which alcohol will affect you at altitude depends on the following variables:</span><br data-dcnode-id="1288"><span data-dcnode-id="1287" instrument_node=""></span></span></p><ul class="q-box" data-dcnode-id="1269" style="box-sizing: border-box; direction: ltr; overflow-wrap: break-word; list-style: disc; margin-bottom: 1em; margin-right: 2em;"><li class="q-relative" data-dcnode-id="1280" style="box-sizing: border-box; position: relative; margin-left: 2em; padding-bottom: 0.7em;"><span data-dcnode-id="1283" style="font-weight: bold; font-style: normal; background: none;"><span data-dcnode-id="1284" instrument_node="">The size of your physiologic reserve</span></span><span data-dcnode-id="1281" style="font-weight: normal; font-style: normal; background: none;"><span data-dcnode-id="1282" instrument_node="">: as you get older, the reserve available for discretionary use gets smaller, as it is increasingly used just to keep you alive despite aging.</span></span></li><li class="q-relative" data-dcnode-id="1275" style="box-sizing: border-box; position: relative; margin-left: 2em; padding-bottom: 0.7em;"><span data-dcnode-id="1278" style="font-weight: bold; font-style: normal; background: none;"><span data-dcnode-id="1279" instrument_node="">The level of altitude</span></span><span data-dcnode-id="1276" style="font-weight: normal; font-style: normal; background: none;"><span data-dcnode-id="1277" instrument_node="">: 5000 feet is not going to be the same as 30,000 feet.</span></span></li><li class="q-relative" data-dcnode-id="1270" style="box-sizing: border-box; position: relative; margin-left: 2em; padding-bottom: 0px;"><span data-dcnode-id="1273" style="font-weight: bold; font-style: normal; background: none;"><span data-dcnode-id="1274" instrument_node="">Alcohol consumption</span></span><span data-dcnode-id="1271" style="font-weight: normal; font-style: normal; background: none;"><span data-dcnode-id="1272" instrument_node="">: quantity matters.</span></span></li></ul><p class="q-text qu-display--block qu-wordBreak--break-word qu-textAlign--start" data-dcnode-id="1262" style="box-sizing: border-box; margin-bottom: 0px; overflow-wrap: anywhere; direction: ltr;"><span data-dcnode-id="1265" style="font-weight: normal; font-style: normal; background: none;"><span data-dcnode-id="1268" instrument_node=""></span><br data-dcnode-id="1267"><span data-dcnode-id="1266" instrument_node="">Hope that helps. I go more into detail about the homeostasis idea here, if you're interested: </span></span><a class="q-box qu-cursor--pointer qu-hover--textDecoration--underline Link___StyledBox-t2xg9c-0 KlcoI" data-dcnode-id="1263" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//ymojsjishtywkric.quora.com/How-the-body-works" style="box-sizing: border-box; position: relative; border-radius: i  the ear which is stopped up. This can also be done by plugging a finger in your other ear and then swallowing. The lump is probably a swollen lymph node. To know for sure a doctor will have to check you and can prescribe medication if needed. relax and try not to obsess, do something meaningful instead of worrying.</span></span></p></span></span></div><div data-dcnode-id="507"></div></div></div></div><div class="q-text qu-dynamicFontSize--small qu-mt--small qu-color--gray_light qu-passColorToLinks" data-dcnode-id="484" style="box-sizing: border-box;"><span data-dcnode-id="485"><span class="q-box qu-display--none" data-dcnode-id="503" style="box-sizing: border-box;"></span><span class="CssComponent-sc-1oskqb9-0 AbstractSeparatedItems___StyledCssComponent-sc-46kfvf-0 bxBZxD" data-dcnode-id="500"><span data-dcnode-id="502" instrument_node="">10K</span><span data-dcnode-id="501" instrument_node=""> views</span></span><span class="q-box qu-display--none" data-dcnode-id="498" style="box-sizing: border-box;"><span data-dcnode-id="499" instrument_node=""> · </span></span><span class="CssComponent-sc-1oskqb9-0 AbstractSeparatedItems___StyledCssComponent-sc-46kfvf-0 diCWLm" data-dcnode-id="486"><span data-dcnode-id="497" instrument_node="">Answer requested by </span><div class="q-inlineFlex qu-alignItems--center" data-dcnode-id="487" style="box-sizing: border-box; display: inline-flex;"><div class="q-box qu-display--inline" data-dcnode-id="488" style="box-sizing: border-box; z-index: 0;"><div class="q-box qu-display--inline" data-dcnode-id="489" style="box-sizing: border-box;"><div class="q-relative qu-display--inline puppeteer_popper_reference" data-dcnode-id="490" style="box-sizing: border-box; position: relative;"><div aria-expanded="false" aria-haspopup="dialog" class="q-click-wrapper qu-display--inline qu-tapHighlight--white qu-cursor--pointer ClickWrapper___StyledClickWrapperBox-zoqi4f-0 bIwtPb" data-dcnode-id="491" style="box-sizing: border-box; font: inherit; padding
