</span><span data-dcnode-id="254" instrument_node="">
</span></div></div><div class="_1Q9if" data-dcnode-id="97" data-testid="richTextElement" id="comp-jyq5trq4"><p class="font_7" data-dcnode-id="247" style="font-size:14px;"><span data-dcnode-id="248" style="font-style:italic;"><span class="color_15" data-dcnode-id="249"><span data-dcnode-id="250" style="font-size:14px;"><span data-dcnode-id="251" instrument_node="">The jet engines of the Iberia Airlines DC-8 thundered in ear-splitting crescendo as the big plane taxied toward where we huddled in the tall grass just off the end of the runway at Havana’s Jose Marti Airport. For months my friend Jorge Perez Blanco and I had been planning to stow away in a wheel-well on this flight, No. 904 — Iberia’s once weekly, nonstop run from Havana to Madrid! Now, in the late afternoon of last June 3, 1970, our moment had come.</span></span></span></span></p><span data-dcnode-id="246" instrument_node="">
</span><p class="font_7" data-dcnode-id="240" style="font-size:14px;"><span data-dcnode-id="241" style="font-style:italic;"><span class="color_15" data-dcnode-id="242"><span data-dcnode-id="243" style="font-size:14px;"><span class="wixGuard" data-dcnode-id="244"><span data-dcnode-id="245" instrument_node="">​</span></span></span></span></span></p><span data-dcnode-id="239" instrument_node="">
</span><p class="font_7" data-dcnode-id="234" style="font-size:14px;"><span data-dcnode-id="235" style="font-style:italic;"><span class="color_15" data-dcnode-id="236"><span data-dcnode-id="237" style="font-size:14px;"><span data-dcnode-id="238" instrument_node="">We realized that we were pretty young to be taking such a big gamble; I was seventeen, Jorge sixteen. But we were both determined to escape from Cuba, and our plans had been carefully made. We knew that departing airliners taxied to the end of the 11,500-foot runway, stopped momentarily after turning around, then roared at full throttle down the runway to take off. We wore rubber-soled shoes to aid us in crawling up the wheels and carried ropes to secure ourselves inside the wheel well. We had also stuffed cotton in our ears as protection against the shriek of the four jet engines. Now we lay sweating with fear as the massive craft swung into its about-face, the jet blast flattening the grass all around us. Let’s run! I shouted to Jorge.</span></span></span></span></p><span data-dcnode-id="233" instrument_node="">
</span><p class="font_7" data-dcnode-id="227" style="font-size:14px;"><span data-dcnode-id="228" style="font-style:italic;"><span class="color_15" data-dcnode-id="229"><span data-dcnode-id="230" style="font-size:14px;"><span class="wixGuard" data-dcnode-id="231"><span data-dcnode-id="232" instrument_node="">​</span></span></span></span></span></p><span data-dcnode-id="226" instrument_node="">
</span><p class="font_7" data-dcnode-id="221" style="font-size:14px;"><span data-dcnode-id="222" style="font-style:italic;"><span class="color_15" data-dcnode-id="223"><span data-dcnode-id="224" style="font-size:14px;"><span data-dcnode-id="225" instrument_node="">We dashed onto the runway and sprinted toward the left-hand wheels of the momentarily stationary plane. As Jorge began to scramble up the 42-inchhigh tires, I saw there was not room for us both in the single well. I’ll try the other side! I shouted. Quickly I climbed onto the right wheels, grabbed a strut, and, twisting and wriggling, pulled myself into the semidark well. The plane began rolling immediately, and I grabbed some machinery to keep from falling out. The roar of the engines nearly deafened me. As we became airborne, the huge double wheels, scorching hot from takeoff, began folding into the compartment. I tried to flatten myself against the overhead as they came closer and closer; then, in desperation, I pushed at them with my feet. But they pressed powerfully upward, squeezing me, terrifyingly, against the roof of the well.</span></span></span></span></p><span data-dcnode-id="220" instrument_node="">
</span><p class="font_7" data-dcnode-id="214" style="font-size:14px;"><span data-dcnode-id="215" style="font-style:italic;"><span class="color_15" data-dcnode-id="216"><span data-dcnode-id="217" style="font-size:14px;"><span class="wixGuard" data-dcnode-id="218"><span data-dcnode-id="219" instrument_node="">​</span></span></span></span></span></p><span data-dcnode-id="213" instrument_node="">
</span><p class="font_7" data-dcnode-id="208" style="font-size:14px;"><span data-dcnode-id="209" style="font-style:italic;"><span class="color_15" data-dcnode-id="210"><span data-dcnode-id="211" style="font-size:14px;"><span data-dcnode-id="212" instrument_node="">Just when I felt that I would be crushed, the wheels locked in place and the bay doors beneath them closed, plunging me into darkness. So there I was, my 5 foot 4 inch, 140 pound frame literally wedged in amid a spaghettilike maze of conduits and machinery. I could not move enough to tie myself to anything, so I stuck my rope behind a pipe.</span></span></span></span></p><span data-dcnode-id="207" instrument_node="">
</span><p class="font_7" data-dcnode-id="201" style="font-size:14px;"><span data-dcnode-id="202" style="font-style:italic;"><span class="color_15" data-dcnode-id="203"><span data-dcnode-id="204" style="font-size:14px;"><span class="wixGuard" data-dcnode-id="205"><span data-dcnode-id="206" instrument_node="">​</span></span></span></span></span></p><span data-dcnode-id="200" instrument_node="">
</span><p class="font_7" data-dcnode-id="195" style="font-size:14px;"><span data-dcnode-id="196" style="font-style:italic;"><span class="color_15" data-dcnode-id="197"><span data-dcnode-id="198" style="font-size:14px;"><span data-dcnode-id="199" instrument_node="">Then, before I had time to catch my breath, the bay doors suddenly dropped open again and the wheels stretched out into their landing position. I held on for dear life, swinging over the abyss, wondering if I had been spotted, if even now the plane was turning back to hand me over to Castro’s police. By the time the wheels began retracting in, I had seen a bit of extra space among the machinery where I could safely squeeze. Now I knew there was room for me even though I could scarcely breathe. After a few minutes, I touched one of the wheels and found that it had cooled off. I swallowed some aspirin tablets against the headsplitting noise and began to wish that I had worn something warmer than my light sport shirt and green fatigues. Up in the cockpit of flight 904, Captain Valentin Vara del Rey, 44, had settled into the routine of the overnight flight, which would last 8 hours and 20 minutes. Takeoff had been normal, with the aircraft and its 147 passengers, plus a crew of 10, lifting off at 170 mph. But, right after lift-off, something unusual had happened. One of three red lights on the instrument panel had remained lighted, indicating improper retraction of the landing gear.</span></span></span></span></p><span data-dcnode-id="194" instrument_node="">
</span><p class="font_7" data-dcnode-id="188" style="font-size:14px;"><span data-dcnode-id="189" style="font-style:italic;"><span class="color_15" data-dcnode-id="190"><span data-dcnode-id="191" style="font-size:14px;"><span class="wixGuard" data-dcnode-id="192"><span data-dcnode-id="193" instrument_node="">​</span></span></span></span></span></p><span data-dcnode-id="187" instrument_node="">
</span><p class="font_7" data-dcnode-id="182" style="font-size:14px;"><span data-dcnode-id="183" style="font-style:italic;"><span class="color_15" data-dcnode-id="184"><span data-dcnode-id="185" style="font-size:14px;"><span data-dcnode-id="186" instrument_node="">Are you having difficulty? the control tower asked.</span></span></span></span></p><span data-dcnode-id="181" instrument_node="">
</span><p class="font_7" data-dcnode-id="175" style="font-size:14px;"><span data-dcnode-id="176" style="font-style:italic;"><span class="color_15" data-dcnode-id="177"><span data-dcnode-id="178" style="font-size:14px;"><span class="wixGuard" data-dcnode-id="179"><span data-dcnode-id="180" instrument_node="">​</span></span></span></span></span></p><span data-dcnode-id="174" instrument_node="">
</span><p class="font_7" data-dcnode-id="169" style="font-size:14px;"><span data-dcnode-id="170" style="font-style:italic;"><span class="color_15" data-dcnode-id="171"><span data-dcnode-id="172" style="font-size:14px;"><span data-dcnode-id="173" instrument_node="">Yes replied Vara del Rey. There is an indication that the right wheel hasn’t closed properly. I’ll repeat the procedure. The captain relowered the landing gear, then raised it again. This time the red light blinked out.</span></span></span></span></p><span data-dcnode-id="168" instrument_node="">
</span><p class="font_7" data-dcnode-id="163" style="font-size:14px;"><span data-dcnode-id="164" style="font-style:italic;"><span class="color_15" data-dcnode-id="165"><span data-dcnode-id="166" style="font-size:14px;"><span data-dcnode-id="167" instrument_node="">Dismissing the incident as a minor malfunction, the captain turned his attention to climbing to the designated cruising altitude. On leveling out, he observed that the temperature outside was 241°F. Inside, the pretty stewardesses began serving dinner to the passengers.</span></span></span></span></p><span data-dcnode-id="162" instrument_node="">
</span><p class="font_7" data-dcnode-id="156" style="font-size:14px;"><span data-dcnode-id="157" style="font-style:italic;"><span class="color_15" data-dcnode-id="158"><span data-dcnode-id="159" style="font-size:14px;"><span class="wixGuard" data-dcnode-id="160"><span data-dcnode-id="161" instrument_node="">​</span></span></span></span></span></p><span data-dcnode-id="155" instrument_node="">
</span><p class="font_7" data-dcnode-id="150" style="font-size:14px;"><span data-dcnode-id="151" style="font-style:italic;"><span class="color_15" data-dcnode-id="152"><span data-dcnode-id="153" style="font-size:14px;"><span data-dcnode-id="154" instrument_node="">Shivering uncontrollably from the bitter cold, I wondered if Jorge had made it into the other wheel well and began thinking about what had brought me to this desperate situation...</span></span></span></span></p><span data-dcnode-id="149" instrument_node="">
</span><p class="font_7" data-dcnode-id="143" style="font-size:14px;"><span data-dcnode-id="144" style="font-style:italic;"><span class="color_15" data-dcnode-id="145"><span data-dcnode-id="146" style="font-size:14px;"><span class="wixGuard" data-dcnode-id="147"><span data-dcnode-id="148" instrument_node="">​</span></span></span></span></span></p><span data-dcnode-id="142" instrument_node="">
</span><p class="font_7" data-dcnode-id="137" style="font-size:14px;"><span data-dcnode-id="138" style="font-style:italic;"><span class="color_15" data-dcnode-id="139"><span data-dcnode-id="140" style="font-size:14px;"><span data-dcnode-id="141" instrument_node="">The sun rose over the Atlantic like a great golden globe, its rays glinting off the silver and gold fuselage of Iberia’s DC-8 as it crossed the European coast high over Portugal. With the end of the 4636-mile flight in sight, Captain Vara del Rey began his descent toward Madrid’s Bara Airport. Arrival would be at 8 A.M. local, the captain told his passengers over the intercom, and the weather in Madrid was sunny and pleasant. Shortly after passing over Toledo, Vara del Rey let down his landing gear. As always, the maneuver was accompanied by a buffeting as the wheels hit the slipstream and a 200mph turbulence swirled through the wheel wells. Now the plane went into its final approach; a spurt of flame and smoke from the tires as the DC-8 touched down at about 140 mph.</span></span></span></span></p><span data-dcnode-id="136" instrument_node="">
</span><p class="font_7" data-dcnode-id="130" style="font-size:14px;"><span data-dcnode-id="131" style="font-style:italic;"><span class="color_15" data-dcnode-id="132"><span data-dcnode-id="133" style="font-size:14px;"><span class="wixGuard" data-dcnode-id="134"><span data-dcnode-id="135" instrument_node="">​</span></span></span></span></span></p><span data-dcnode-id="129" instrument_node="">
</span><p class="font_7" data-dcnode-id="124" style="font-size:14px;"><span data-dcnode-id="125" style="font-style:italic;"><span class="color_15" data-dcnode-id="126"><span data-dcnode-id="127" style="font-size:14px;"><span data-dcnode-id="128" instrument_node="">It was a perfect landing—no bumps. After a brief postflight check, Vara del Rey walked down the ramp steps and stood by the nose of the plane waiting for a car to pick him up, along with his copilot. Nearby, there was a sudden, soft plop as the frozen body of Armando Socarras fell to the concrete apron beneath the plane. Jose Rocha Lorenzana, a security guard, was the first to reach the crumpled figure. When I touched his clothes, they were frozen as stiff as wood Rocha said. All he did was make a strange sound, kind of moan.</span></span></span></span></p><span data-dcnode-id="123" instrument_node="">
</span><p class="font_7" data-dcnode-id="117" style="font-size:14px;"><span data-dcnode-id="118" style="font-style:italic;"><span class="color_15" data-dcnode-id="119"><span data-dcnode-id="120" style="font-size:14px;"><span class="wixGuard" data-dcnode-id="121"><span data-dcnode-id="122" instrument_node="">​</span></span></span></span></span></p><span data-dcnode-id="116" instrument_node="">
</span><p class="font_7" data-dcnode-id="111" style="font-size:14px;"><span data-dcnode-id="112" style="font-style:italic;"><span class="color_15" data-dcnode-id="113"><span data-dcnode-id="114" style="font-size:14px;"><span data-dcnode-id="115" instrument_node="">I couldn’t believe it at first Vara del Rey said when told of Armando. But then I went over to him. He had ice over his nose and mouth. And his color... As he watched the unconscious boy being bundled into a truck, the captain kept exclaiming to himself, Impossible! Impossible! The first thing I remember after losing consciousness was hitting the ground at the Madrid airport. Then I blacked out again and woke up later at the Gran Hospital de la Beneficencia in downtown Madrid, more dead than alive. When they took my temperature, it was so low that it did not even register on the thermometer. Am I in Spain? was my first question. And then, Where’s Jorge? (Jorge is believed to have been knocked down by the jet blast while trying to climb into the other wheel well and to be in prison in Cuba.)</span></span></span></span></p><span data-dcnode-id="110" instrument_node="">
</span><p class="font_7" data-dcnode-id="104" style="font-size:14px;"><span data-dcnode-id="105" style="font-style:italic;"><span class="color_15" data-dcnode-id="106"><span data-dcnode-id="107" style="font-size:14px;"><span class="wixGuard" data-dcnode-id="108"><span data-dcnode-id="109" instrument_node="">​</span></span></span></span></span></p><span data-dcnode-id="103" instrument_node="">
</span><p class="font_7" data-dcnode-id="98" style="font-size:14px;"><span data-dcnode-id="99" style="font-style:italic;"><span class="color_15" data-dcnode-id="100"><span data-dcnode-id="101" style="font-size:14px;"><span data-dcnode-id="102" instrument_node="">Doctors said later that my condition was comparable to that of a patient undergoing 'deep-freeze' surgery, a delicate process performed only under carefully controlled conditions. Dr. Jose Maria Pajares, who cared for me, called my survival a 'medical miracle,' and, in truth, I feel lucky to be alive. A few days after my escape, I was up and around the hospital, playing cards with my police guard and reading stacks of letters from all over the world. I especially liked one from a girl in California. You are a hero, she wrote, but not very wise. My uncle, Elo Fernandez, who lives in New Jersey, telephoned and invited me to come to the United States to live with him. The International Rescue Committee arranged my passage and has continued to help me. I am fine now. I live with my uncle and go to school to learn English. I still hope to study to be an artist. I want to be a good citizen and contribute something to this country, for I love it here...</span></span></span></span></p></div><div class="_1Q9if" data-dcnode-id="92" data-testid="richTextElement" id="comp-jyq5trw8"><h5 class="font_5" data-dcnode-id="93" style="font-size:14px; text-align:right;"><span class="color_15" data-dcnode-id="94"><span data-dcnode-id="95" style="font-size:14px;"><span data-dcnode-id="96" instrument_node="">Armando Socarras Ramirez</span></span></span></h5></div></div></div></div></div></section><div aria-label="Survivial at extreme altitude" class="qhwIj ignore-focus" data-dcnode-id="85" id="comp-jyq5uj1b" role="region" tabindex="-1"><span data-dcnode-id="86" instrument_node="">&nbsp;</span></div><div data-dcnode-id="84" data-mesh-id="Containerq0adkinlineContent-wedge-4"></div><div data-dcnode-id="83" data-mesh-id="Containerq0adkinlineContent-wedge-8"></div></div></div></div></div></div></div></div></main><footer data-dcnode-id="36" id="SITE_FOOTER_WRAPPER" tabindex="-1"><div class="ZW5SX" data-dcnode-id="37" id="SITE_FOOTER"><div class="_2o25M" data-dcnode-id="73"><div class="_1nRb9" data-dcnode-id="74"></div></div><div class="_38XI2" data-dcnode-id="38"><div class="_2P6JN" data-dcnode-id="71"><div class="_1dlfY" data-dcnode-id="72"></div></div><div class="_1_UPn" data-dcnode-id="39"><div class="" data-dcnode-id="40" data-mesh-id="SITE_FOOTERinlineContent" data-testid="inline-content"><div data-dcnode-id="41" data-mesh-id="SITE_FOOTERinlineContent-gridContainer" data-testid="mesh-container-content"><div class="_2O-Ry" data-dcnode-id="57" id="comp-k09ynrd4"><ul aria-label="Social Bar" class="xb9fU" data-dcnode-id="58"><li class="_3lu8e" data-dcnode-id="67" id="dataItem-k09ynrhf-comp-k09ynrd4"><a class="_26AQd" data-dcnode-id="68" data-testid="linkElement" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.facebook.com/AltitudeApex" target="_blank"><wix-image class="_1-6YJ uWpzU" data-bg-effect-name="" data-dcnode-id="69" data-has-bg-scroll-effect="" data-has-ssr-src="" data-image-info="{&quot;containerId&quot;:&quot;dataItem-k09ynrhf-comp-k09ynrd4&quot;,&quot;displayMode&quot;:&quot;fill&quot;,&quot;imageData&quot;:{&quot;width&quot;:200,&quot;height&quot;:200,&quot;uri&quot;:&quot;e316f544f9094143b9eac01f1f19e697.png&quot;,&quot;displayMode&quot;:&quot;fill&quot;}}" data-image-zoomed="" data-src="https://static.wixstatic.com/media/e316f544f9094143b9eac01f1f19e697.png/v1/fill/w_39,h_39,al_c,usm_0.66_1.00_0.01,enc_auto/e316f544f9094143b9eac01f1f19e697.png" id="img_0_comp-k09ynrd4"><img alt="Facebook" data-dcnode-id="70" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//static.wixstatic.com/media/e316f544f9094143b9eac01f1f19e697.png/v1/fill/w_39%2Ch_39%2Cal_c%2Cq_85%2Cusm_0.66_1.00_0.01%2Cenc_auto/e316f544f9094143b9eac01f1f19e697.png&amp;r d2404cd5a05ed6115f3a0dc8.png&quot;,&quot;displayMode&quot;:&quot;fill&quot;}}" data-image-zoomed="" data-src="https://static.wixstatic.com/media/9c4b521dd2404cd5a05ed6115f3a0dc8.png/v1/fill/w_39,h_39,al_c,usm_0.66_1.00_0.01,enc_auto/9c4b521dd2404cd5a05ed6115f3a0dc8.png" id="img_2_comp-k09ynrd4"><img alt="Twitter" data-dcnode-id="62" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//static.wixstatic.com/media/9c4b521dd2404cd5a05ed6115f3a0dc8.png/v1/fill/w_39%2Ch_39%2Cal_c%2Cq_85%2Cusm_0.66_1.00_0.01%2Cenc_auto/9c4b521dd2404cd5a05ed6115f3a0dc8.png&amp;raw" style="width:39px;height:39px;object-fit:cover;object-position:50% 50%"></wix-image></a></li></ul></div><div class="_1KV2M" data-dcnode-id="42" id="comp-jyn11ne9"><div class="" data-dcnode-id="43" data-mesh-id="comp-jyn11ne9inlineContent" data-testid="inline-content"><div data-dcnode-id="44" data-mesh-id="comp-jyn11ne9inlineContent-gridContainer" data-testid="mesh-container-content"><div aria-disabled="false" class="_2UgQw" data-dcnode-id="53" id="comp-jyn0i7lo"><a aria-disabled="false" class="_1fbEI" data-dcnode-id="54" data-testid="linkElement" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.altitude.org/site-information" target="_self"><span class="_1Qjd7" data-dcnode-id="55"><span data-dcnode-id="56" instrument_node="">Site Information </span></span></a></div><div aria-disabled="false" class="_2UgQw" data-dcnode-id="49" id="comp-jyn0isz1"><a aria-disabled="false" class="_1fbEI" data-dcnode-id="50" data-testid="linkElement" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.altitude.org/authors" target="_self"><span class="_1Qjd7" data-dcnode-id="51"><span data-dcnode-id="52" instrument_node="">Authors </span></span></a></div><div aria-disabled="false" class="_2UgQw" data-dcnode-id="45" id="comp-jyn0jj9p"><a aria-disabled="false" class="_1fbEI" data-dcnode-id="46" data-testid="linkElement" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.altitude.org/contact-us" target="_self"><span class="_1Qjd7" data-dcnode-id="47"><span data-dcnode-id="48" instrument_node="">Contact </span></span></a></div></div></div></div></div></div></div></div></div></footer></div></div><div aria-label="bottom of page" class="qhwIj ignore-focus" data-dcnode-id="32" id="SCROLL_TO_BOTTOM" role="region" tabindex="-1"><span data-dcnode-id="33" instrument_node="">&nbsp;</span></div></div></div><span data-dcnode-id="29" instrument_node="">
