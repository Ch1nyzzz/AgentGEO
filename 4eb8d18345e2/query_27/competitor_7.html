</span><p class="font_7" data-dcnode-id="1005" style="font-size:14px; text-align:right;"><span class="color_14" data-dcnode-id="1006"><span data-dcnode-id="1007" style="font-size:14px;"><span data-dcnode-id="1011" instrument_node="">by&nbsp;</span><span data-dcnode-id="1008" style="text-decoration:underline;"><a data-anchor="dataItem-jyll0p09" data-dcnode-id="1009" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.altitude.org/authors" target="_self"><span data-dcnode-id="1010" instrument_node="">Peter Buzzacott</span></a></span></span></span></p></div></div></div></div></div></section><section class="_3d64y" data-dcnode-id="422" id="comp-jyep0g6c"><div class="_3wnIc" data-dcnode-id="996" data-hook="bgLayers" id="bgLayers_comp-jyep0g6c"><div class="_3KzuS _3SQN-" data-dcnode-id="998" data-testid="colorUnderlay"></div><div class="_2GUhU" data-dcnode-id="997" id="bgMedia_comp-jyep0g6c"></div></div><div class="_1uldx" data-dcnode-id="423" data-testid="columns"><div class="_1vNJf" data-dcnode-id="424" id="comp-jyep0g9v"><div class="_3wnIc" data-dcnode-id="993" data-hook="bgLayers" id="bgLayers_comp-jyep0g9v"><div class="_3KzuS _3SQN-" data-dcnode-id="995" data-testid="colorUnderlay"></div><div class="_2GUhU" data-dcnode-id="994" id="bgMedia_comp-jyep0g9v"></div></div><div class="" data-dcnode-id="425" data-mesh-id="comp-jyep0g9vinlineContent" data-testid="inline-content"><div data-dcnode-id="426" data-mesh-id="comp-jyep0g9vinlineContent-gridContainer" data-testid="mesh-container-content"><div class="_1Q9if" data-dcnode-id="988" data-testid="richTextElement" id="comp-jyep1sr1"><h1 class="font_0" data-dcnode-id="989" style="text-align:center; font-size:22px;"><span class="color_15" data-dcnode-id="990"><span data-dcnode-id="991" style="font-size:37px;"><span data-dcnode-id="992" instrument_node="">HYPOTHERMIA&nbsp;</span></span></span></h1></div><div class="_2UdPt" data-dcnode-id="987" id="comp-jyep1st8"></div><div class="_1Q9if" data-dcnode-id="981" data-testid="richTextElement" id="comp-jyep1svc"><p class="font_7" data-dcnode-id="982" style="font-size:16px; text-align:center;"><span data-dcnode-id="983" style="font-size:16px;"><span data-dcnode-id="984" style="font-style:italic;"><span class="color_15" data-dcnode-id="985"><span data-dcnode-id="986" instrument_node="">Hypothermia is one of the biggest risks to your life at high altitude</span></span></span></span></p></div><div class="_1Q9if" data-dcnode-id="479" data-testid="richTextElement" id="comp-jyep4xy4"><p class="font_7" data-dcnode-id="977" style="font-size:14px;"><span class="color_14" data-dcnode-id="978"><span data-dcnode-id="979" style="font-size:14px;"><span data-dcnode-id="980" instrument_node="">Hypothermia is defined as a core temperature below 35 degrees. It is broadly categorised into:</span></span></span></p><span data-dcnode-id="976" instrument_node="">
</span><ul class="font_7 color_14" data-dcnode-id="948" style="font-size:14px;"><span data-dcnode-id="975" instrument_node="">
</span><li data-dcnode-id="968"><span data-dcnode-id="974" instrument_node="">
</span><p class="font_7" data-dcnode-id="970" style="font-size:14px;"><span class="color_14" data-dcnode-id="971"><span data-dcnode-id="972" style="font-size:14px;"><span data-dcnode-id="973" instrument_node="">Mild hypothermia (32-35 degrees C)</span></span></span></p><span data-dcnode-id="969" instrument_node="">
</span></li><span data-dcnode-id="967" instrument_node="">
</span><li data-dcnode-id="960"><span data-dcnode-id="966" instrument_node="">
</span><p class="font_7" data-dcnode-id="962" style="font-size:14px;"><span class="color_14" data-dcnode-id="963"><span data-dcnode-id="964" style="font-size:14px;"><span data-dcnode-id="965" instrument_node="">Moderate hypothermia (30-32 degrees C)</span></span></span></p><span data-dcnode-id="961" instrument_node="">
</span></li><span data-dcnode-id="959" instrument_node="">
</span><li data-dcnode-id="950"><span data-dcnode-id="958" instrument_node="">
</span><p class="font_7" data-dcnode-id="952" style="font-size:14px;"><span class="color_14" data-dcnode-id="955"><span data-dcnode-id="956" style="font-size:14px;"><span data-dcnode-id="957" instrument_node="">Severe hypothermia (&lt;30 degrees C)</span></span></span><br data-dcnode-id="954"><span data-dcnode-id="953" instrument_node="">
&nbsp;</span></p><span data-dcnode-id="951" instrument_node="">
</span></li><span data-dcnode-id="949" instrument_node="">
</span></ul><span data-dcnode-id="947" instrument_node="">
</span><p class="font_7" data-dcnode-id="943" style="font-size:14px;"><span class="color_14" data-dcnode-id="944"><span data-dcnode-id="945" style="font-size:14px;"><span data-dcnode-id="946" instrument_node="">It is estimated that up to 25% of people brought off the hill by Mountain Rescue in the UK may have some form of hypothermia. Onset of hypothermia in an individual depends on multiple factors both individual and environmental. Individual factors include fitness, food intake, clothing, injury and illness. It is important to remember it can occur at modest temperatures when there is prolonged exposure to water, driving rain or wind chill. (1)The two most common causes of hypothermia on the hill are exhaustion and injury (2).</span></span></span></p><span data-dcnode-id="942" instrument_node="">
</span><p class="font_7" data-dcnode-id="937" style="font-size:14px;"><span class="color_14" data-dcnode-id="938"><span data-dcnode-id="939" style="font-size:14px;"><span class="wixGuard" data-dcnode-id="940"><span data-dcnode-id="941" instrument_node="">​</span></span></span></span></p><span data-dcnode-id="936" instrument_node="">
</span><p class="font_7" data-dcnode-id="928" style="font-size:14px;"><span class="color_14" data-dcnode-id="929"><span data-dcnode-id="930" style="font-size:14px;"><span data-dcnode-id="935" instrument_node="">Hypothermia, dehydration, low blood sugar and&nbsp;</span><span data-dcnode-id="932" style="text-decoration:underline;"><a data-dcnode-id="933" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.altitude.org/altitude-sickness" target="_self"><span data-dcnode-id="934" instrument_node="">altitude sickness</span></a></span><span data-dcnode-id="931" instrument_node="">&nbsp;share common symptoms and signs. If an individual develops one condition the others should be sought and if one member of a group develops hypothermia the whole group should be checked.</span></span></span></p><span data-dcnode-id="927" instrument_node="">
</span><p class="font_7" data-dcnode-id="925" style="font-size:14px;"><span data-dcnode-id="926" instrument_node="">&nbsp;</span></p><span data-dcnode-id="924" instrument_node="">
</span><h5 class="font_5" data-dcnode-id="920" style="font-size:22px;"><span class="color_15" data-dcnode-id="921"><span data-dcnode-id="922" style="font-size:22px;"><span data-dcnode-id="923" instrument_node="">Thermoregulation</span></span></span></h5><span data-dcnode-id="919" instrument_node="">
</span><p class="font_7" data-dcnode-id="915" style="font-size:14px;"><span class="color_14" data-dcnode-id="916"><span data-dcnode-id="917" style="font-size:14px;"><span data-dcnode-id="918" instrument_node="">Normally thermoregulation within the body balances heat loss into the environment with heat production by the body organs and muscles. This is important as the body's enzyme systems only function within a narrow range of temperature around 37degrees C. In mild hypothermia this process is still active producing voluntary and involuntary responses. Involuntary responses include skin vasoconstriction and shivering. Unfortunately shivering is an extremely inefficient way of producing heat, significantly increasing utilisation of energy stores. Voluntary responses include seeking shelter, putting on clothes, exercise and eating. These are much more effective, especially eating and exercise, which increases heat production by a factor of 10-15 and eating.</span></span></span></p><span data-dcnode-id="914" instrument_node="">
</span><p class="font_7" data-dcnode-id="909" style="font-size:14px;"><span class="color_14" data-dcnode-id="910"><span data-dcnode-id="911" style="font-size:14px;"><span class="wixGuard" data-dcnode-id="912"><span data-dcnode-id="913" instrument_node="">​</span></span></span></span></p><span data-dcnode-id="908" instrument_node="">
</span><p class="font_7" data-dcnode-id="904" style="font-size:14px;"><span class="color_14" data-dcnode-id="905"><span data-dcnode-id="906" style="font-size:14px;"><span data-dcnode-id="907" instrument_node="">Once the core temperature goes below 32, shivering stops as thermoregulation fails. The body then gets stuck in a vicious cycle as dropping core temperature itself reduces body metabolism which in turn reduces the body temperature more. The victim's body systems, particularly the heart and brain function, gradually slow down.</span></span></span></p><span data-dcnode-id="903" instrument_node="">
</span><p class="font_7" data-dcnode-id="901" style="font-size:14px;"><span data-dcnode-id="902" instrument_node="">&nbsp;</span></p><span data-dcnode-id="900" instrument_node="">
</span><h5 class="font_5" data-dcnode-id="896" style="font-size:22px;"><span class="color_15" data-dcnode-id="897"><span data-dcnode-id="898" style="font-size:22px;"><span data-dcnode-id="899" instrument_node="">Classification</span></span></span></h5><span data-dcnode-id="895" instrument_node="">
</span><p class="font_7" data-dcnode-id="891" style="font-size:14px;"><span class="color_14" data-dcnode-id="892"><span data-dcnode-id="893" style="font-size:14px;"><span data-dcnode-id="894" instrument_node="">The temperature at which any individual displays the various signs and symptoms of hypothermia varies as it depends on the factors mentioned above. It is also unusual to be able to accurately measure core body temperature in the pre-hospital environment. Oral, rectal or tympanic/inner ear temperatures are all inaccurate. Therefore diagnosis must be made on clinical signs and symptoms alone.</span></span></span></p><span data-dcnode-id="890" instrument_node="">
</span><p class="font_7" data-dcnode-id="885" style="font-size:14px;"><span class="color_14" data-dcnode-id="886"><span data-dcnode-id="887" style="font-size:14px;"><span class="wixGuard" data-dcnode-id="888"><span data-dcnode-id="889" instrument_node="">​</span></span></span></span></p><span data-dcnode-id="884" instrument_node="">
</span><p class="font_7" data-dcnode-id="880" style="font-size:14px;"><span class="color_14" data-dcnode-id="881"><span data-dcnode-id="882" style="font-size:14px;"><span data-dcnode-id="883" instrument_node="">There are a number of different classifications of hypothermia. These have been developed in seperate areas of the world in response to their differing geography, rescue services and medical back-up. The Swiss Society of Mountain Medicine grade hypothermia from one to five whereas the UK Lake District Search and Mountain Rescue Association simply classify hypothermia as mild (alert and shivering) or severe (no longer shivering and/or reduced level of consciousness) which is safe and adequate for rescuers without additional equipment. For the purposes of this article severe hypothermia is subdivided into moderate hypothermia, where the victim has stopped shivering but is not completely unconscious and severe hypothermia, where the victim is unconscious and signs of life are difficult to detect.</span></span></span></p><span data-dcnode-id="879" instrument_node="">
</span><p class="font_7" data-dcnode-id="874" style="font-size:14px;"><span class="color_14" data-dcnode-id="875"><span data-dcnode-id="876" style="font-size:14px;"><span class="wixGuard" data-dcnode-id="877"><span data-dcnode-id="878" instrument_node="">​</span></span></span></span></p><span data-dcnode-id="873" instrument_node="">
</span><p class="font_7" data-dcnode-id="869" style="font-size:14px;"><span class="color_14" data-dcnode-id="870"><span data-dcnode-id="871" style="font-size:14px;"><span data-dcnode-id="872" instrument_node="">Ability to estimate which stage of hypothermia the victim has reached is important as this then allows treatment and possible evacuation to be planned.</span></span></span></p><span data-dcnode-id="868" instrument_node="">
</span><p class="font_7" data-dcnode-id="863" style="font-size:14px;"><span class="color_14" data-dcnode-id="864"><span data-dcnode-id="865" style="font-size:14px;"><span class="wixGuard" data-dcnode-id="866"><span data-dcnode-id="867" instrument_node="">​</span></span></span></span></p><span data-dcnode-id="862" instrument_node="">
</span><h5 class="font_5" data-dcnode-id="858" style="font-size:22px;"><span class="color_15" data-dcnode-id="859"><span data-dcnode-id="860" style="font-size:22px;"><span data-dcnode-id="861" instrument_node="">Symptoms</span></span></span></h5><span data-dcnode-id="857" instrument_node="">
</span><p class="font_7" data-dcnode-id="822" style="font-size:14px;"><span class="color_14" data-dcnode-id="853"><span data-dcnode-id="854" style="font-size:14px;"><span class="wixGuard" data-dcnode-id="855"><span data-dcnode-id="856" instrument_node="">​</span></span></span></span><br data-dcnode-id="852"><span data-dcnode-id="851" instrument_node="">
</span><br data-dcnode-id="850"><span data-dcnode-id="849" instrument_node="">
</span><br data-dcnode-id="848"><span data-dcnode-id="847" instrument_node="">
</span><br data-dcnode-id="846"><span data-dcnode-id="845" instrument_node="">
</span><br data-dcnode-id="844"><span data-dcnode-id="843" instrument_node="">
</span><br data-dcnode-id="842"><span data-dcnode-id="841" instrument_node="">
</span><br data-dcnode-id="840"><span data-dcnode-id="839" instrument_node="">
</span><br data-dcnode-id="838"><span data-dcnode-id="837" instrument_node="">
</span><br data-dcnode-id="836"><span data-dcnode-id="835" instrument_node="">
</span><br data-dcnode-id="834"><span data-dcnode-id="833" instrument_node="">
</span><br data-dcnode-id="832"><span data-dcnode-id="831" instrument_node="">
</span><br data-dcnode-id="830"><span data-dcnode-id="829" instrument_node="">
</span><br data-dcnode-id="828"><span data-dcnode-id="827" instrument_node="">
</span><br data-dcnode-id="826"><span data-dcnode-id="825" instrument_node="">
</span><br data-dcnode-id="824"><span data-dcnode-id="823" instrument_node="">
&nbsp;</span></p><span data-dcnode-id="821" instrument_node="">
</span><p class="font_7" data-dcnode-id="816" style="font-size:14px;"><br data-dcnode-id="820"><span data-dcnode-id="819" instrument_node="">
</span><br data-dcnode-id="818"><span data-dcnode-id="817" instrument_node="">
Death from hypothermia&nbsp;</span></p><span data-dcnode-id="815" instrument_node="">
</span><p class="font_7" data-dcnode-id="811" style="font-size:14px;"><span class="color_14" data-dcnode-id="812"><span data-dcnode-id="813" style="font-size:14px;"><span data-dcnode-id="814" instrument_node="">This is a very difficult situation in the wilderness. Technically only trained health care staff can actually pronounce death however in some circumstances it is recognised that attempts at resuscitation are futile. According to the Alaskan Guidelines these include obvious fatal injury, a core temperature of less than 10degrees C, an airway blocked by snow or ice, incompressible chest or eyeballs (on gentle pressure - compare with live persons eyeball) or finally not coming back to life once re-warmed.</span></span></span></p><span data-dcnode-id="810" instrument_node="">
</span><p class="font_7" data-dcnode-id="805" style="font-size:14px;"><span class="color_14" data-dcnode-id="806"><span data-dcnode-id="807" style="font-size:14px;"><span class="wixGuard" data-dcnode-id="808"><span data-dcnode-id="809" instrument_node="">​</span></span></span></span></p><span data-dcnode-id="804" instrument_node="">
</span><h5 class="font_5" data-dcnode-id="800" style="font-size:22px;"><span class="color_15" data-dcnode-id="801"><span data-dcnode-id="802" style="font-size:22px;"><span data-dcnode-id="803" instrument_node="">Treatment</span></span></span></h5><span data-dcnode-id="799" instrument_node="">
</span><p class="font_7" data-dcnode-id="795" style="font-size:14px;"><span class="color_14" data-dcnode-id="796"><span data-dcnode-id="797" style="font-size:14px;"><span data-dcnode-id="798" instrument_node="">Below simple and effective treatments that can be given by non healthcare personnel in a wilderness environment are described.</span></span></span></p><span data-dcnode-id="794" instrument_node="">
</span><p class="font_7" data-dcnode-id="790" style="font-size:14px;"><span class="color_14" data-dcnode-id="791"><span data-dcnode-id="792" style="font-size:14px;"><span data-dcnode-id="793" instrument_node="">Mild hypothermia can be reversed relatively easily. The key is to recognise it early and act swiftly. Shelter, warm clothes and warm food and drink will raise core temperature. Remember to insulate them from the ground. A thick plastic survival bag helps them retain any heat they are producing (these have been shown to be more efficient than 'space blankets'). To add heat, body warmth can be used, for example putting the victim in a sleeping bag with someone else or using manoeuvres like a penguin huddle. Once re-warmed victims can generally then get themselves to a place of safety but should be watched carefully.</span></span></span></p><span data-dcnode-id="789" instrument_node="">
</span><p class="font_7" data-dcnode-id="784" style="font-size:14px;"><span class="color_14" data-dcnode-id="785"><span data-dcnode-id="786" style="font-size:14px;"><span class="wixGuard" data-dcnode-id="787"><span data-dcnode-id="788" instrument_node="">​</span></span></span></span></p><span data-dcnode-id="783" instrument_node="">
</span><p class="font_7" data-dcnode-id="779" style="font-size:14px;"><span class="color_14" data-dcnode-id="780"><span data-dcnode-id="781" style="font-size:14px;"><span data-dcnode-id="782" instrument_node="">Moderate hypothermia: The patient will no longer be shivering and may have reduced level of consciousness. This is a life-threatening situation. Their heart will already be at risk of arrhythmias. Good shelter needs to be found rapidly and the group should be prepared for a prolonged stop.</span></span></span></p><span data-dcnode-id="778" instrument_node="">
</span><p class="font_7" data-dcnode-id="773" style="font-size:14px;"><span class="color_14" data-dcnode-id="774"><span data-dcnode-id="775" style="font-size:14px;"><span class="wixGuard" data-dcnode-id="776"><span data-dcnode-id="777" instrument_node="">​</span></span></span></span></p><span data-dcnode-id="772" instrument_node="">
</span><p class="font_7" data-dcnode-id="768" style="font-size:14px;"><span class="color_14" data-dcnode-id="769"><span data-dcnode-id="770" style="font-size:14px;"><span data-dcnode-id="771" instrument_node="">The victim should be nursed lying down and insulated from the ground. If the conscious level is significantly reduced they should be placed in the recovery position to protect their airway. Any movement should be slow and gentle - a good policy is to treat them as if they have a spinal injury. Start re-warming as soon as possible:</span></span></span></p><span data-dcnode-id="767" instrument_node="">
</span><p class="font_7" data-dcnode-id="762" style="font-size:14px;"><span class="color_14" data-dcnode-id="763"><span data-dcnode-id="764" style="font-size:14px;"><span class="wixGuard" data-dcnode-id="765"><span data-dcnode-id="766" instrument_node="">​</span></span></span></span></p><span data-dcnode-id="761" instrument_node="">
</span><ul class="color_14 font_7" data-dcnode-id="719" style="font-size:14px;"><span data-dcnode-id="760" instrument_node="">
</span><li data-dcnode-id="753"><span data-dcnode-id="759" instrument_node="">
</span><p class="font_7" data-dcnode-id="755" style="font-size:14px;"><span class="color_14" data-dcnode-id="756"><span data-dcnode-id="757" style="font-size:14px;"><span data-dcnode-id="758" instrument_node="">Removing wet clothing and gently patting dry.</span></span></span></p><span data-dcnode-id="754" instrument_node="">
</span></li><span data-dcnode-id="752" instrument_node="">
</span><li data-dcnode-id="745"><span data-dcnode-id="751" instrument_node="">
</span><p class="font_7" data-dcnode-id="747" style="font-size:14px;"><span class="color_14" data-dcnode-id="748"><span data-dcnode-id="749" style="font-size:14px;"><span data-dcnode-id="750" instrument_node="">Place them in a pre-warmed sleeping bag (another person or hot water bottles can be used for this).</span></span></span></p><span data-dcnode-id="746" instrument_node="">
</span></li><span data-dcnode-id="744" instrument_node="">
</span><li data-dcnode-id="737"><span data-dcnode-id="743" instrument_node="">
</span><p class="font_7" data-dcnode-id="739" style="font-size:14px;"><span class="color_14" data-dcnode-id="740"><span data-dcnode-id="741" style="font-size:14px;"><span data-dcnode-id="742" instrument_node="">Add heat by using chemical heat packs or hot water bottles (wrapped in cloth to prevent burns) placed against armpits, upper abdomen, neck and groin. Heat sources should not be placed on limbs, the person should not be immersed in hot water and limbs should not be massaged as all these produce peripheral blood vessel dilatation which can cause paradoxical core cooling.</span></span></span></p><span data-dcnode-id="738" instrument_node="">
</span></li><span data-dcnode-id="736" instrument_node="">
</span><li data-dcnode-id="729"><span data-dcnode-id="735" instrument_node="">
</span><p class="font_7" data-dcnode-id="731" style="font-size:14px;"><span class="color_14" data-dcnode-id="732"><span data-dcnode-id="733" style="font-size:14px;"><span data-dcnode-id="734" instrument_node="">Warm the tent/bivvy (taking care not to cause Carbon Monoxide poisoning).</span></span></span></p><span data-dcnode-id="730" instrument_node="">
</span></li><span data-dcnode-id="728" instrument_node="">
</span><li data-dcnode-id="721"><span data-dcnode-id="727" instrument_node="">
</span><p class="font_7" data-dcnode-id="723" style="font-size:14px;"><span class="color_14" data-dcnode-id="724"><span data-dcnode-id="725" style="font-size:14px;"><span data-dcnode-id="726" instrument_node="">If/once awake enough to swallow give hot sweet drinks and energy foods.</span></span></span></p><span data-dcnode-id="722" instrument_node="">
</span></li><span data-dcnode-id="720" instrument_node="">
</span></ul><span data-dcnode-id="718" instrument_node="">
</span><p class="font_7" data-dcnode-id="713" style="font-size:14px;"><span class="color_14" data-dcnode-id="714"><span data-dcnode-id="715" style="font-size:14px;"><span class="wixGuard" data-dcnode-id="716"><span data-dcnode-id="717" instrument_node="">​</span></span></span></span></p><span data-dcnode-id="712" instrument_node="">
</span><p class="font_7" data-dcnode-id="708" style="font-size:14px;"><span class="color_14" data-dcnode-id="709"><span data-dcnode-id="710" style="font-size:14px;"><span data-dcnode-id="711" instrument_node="">Generally these patients should be evacuated as they can need ongoing medical care following an episode of hypothermia. Only evacuate by stretcher if the victim is re-warmed, stable and you are sure they won't get cold again during evacuation</span></span></span></p><span data-dcnode-id="707" instrument_node="">
</span><p class="font_7" data-dcnode-id="702" style="font-size:14px;"><span class="color_14" data-dcnode-id="703"><span data-dcnode-id="704" style="font-size:14px;"><span class="wixGuard" data-dcnode-id="705"><span data-dcnode-id="706" instrument_node="">​</span></span></span></span></p><span data-dcnode-id="701" instrument_node="">
</span><h5 class="font_5" data-dcnode-id="697" style="font-size:22px;"><span class="color_15" data-dcnode-id="698"><span data-dcnode-id="699" style="font-size:22px;"><span data-dcnode-id="700" instrument_node="">Severe hypothermia.</span></span></span></h5><span data-dcnode-id="696" instrument_node="">
</span><p class="font_7" data-dcnode-id="692" style="font-size:14px;"><span class="color_14" data-dcnode-id="693"><span data-dcnode-id="694" style="font-size:14px;"><span data-dcnode-id="695" instrument_node="">The victim will be unconscious. Concerns are:&nbsp;</span></span></span></p><span data-dcnode-id="691" instrument_node="">
</span><ol class="font_7" data-dcnode-id="665" style="font-size:14px;"><span data-dcnode-id="690" instrument_node="">
</span><li data-dcnode-id="685"><span data-dcnode-id="689" instrument_node="">
</span><p class="font_7" data-dcnode-id="687" style="font-size:14px;"><span data-dcnode-id="688" instrument_node="">Their airway is at risk of compromise.&nbsp;</span></p><span data-dcnode-id="686" instrument_node="">
</span></li><span data-dcnode-id="684" instrument_node="">
</span><li data-dcnode-id="677"><span data-dcnode-id="683" instrument_node="">
</span><p class="font_7" data-dcnode-id="679" style="font-size:14px;"><span class="color_14" data-dcnode-id="680"><span data-dcnode-id="681" style="font-size:14px;"><span data-dcnode-id="682" instrument_node="">They may also be on the cusp of a fatal cardiac dsyrythmia.</span></span></span></p><span data-dcnode-id="678" instrument_node="">
</span></li><span data-dcnode-id="676" instrument_node="">
</span><li data-dcnode-id="667"><span data-dcnode-id="675" instrument_node="">
</span><p class="font_7" data-dcnode-id="669" style="font-size:14px;"><span class="color_14" data-dcnode-id="672"><span data-dcnode-id="673" style="font-size:14px;"><span data-dcnode-id="674" instrument_node="">The pulse and breathing may be so slow that the rescuer has to look, listen and feel for at least a minute to detect them.</span></span></span><br data-dcnode-id="671"><span data-dcnode-id="670" instrument_node="">
&nbsp;</span></p><span data-dcnode-id="668" instrument_node="">
</span></li><span data-dcnode-id="666" instrument_node="">
</span></ol><span data-dcnode-id="664" instrument_node="">
</span><p class="font_7" data-dcnode-id="660" style="font-size:14px;"><span class="color_14" data-dcnode-id="661"><span data-dcnode-id="662" style="font-size:14px;"><span data-dcnode-id="663" instrument_node="">If there are no detectable signs of life then key decisions need to be made. The following recommendations are based on the State of Alaska cold Injuries Guidelines. (3)</span></span></span></p><span data-dcnode-id="659" instrument_node="">
</span><ol class="color_14 font_7" data-dcnode-id="631" style="font-size:14px;"><span data-dcnode-id="658" instrument_node="">
</span><li data-dcnode-id="651"><span data-dcnode-id="657" instrument_node="">
</span><p class="font_7" data-dcnode-id="653" style="font-size:14px;"><span class="color_14" data-dcnode-id="654"><span data-dcnode-id="655" style="font-size:14px;"><span data-dcnode-id="656" instrument_node="">Are they salvageable? I.e. should re-warming be attempted - this being both an energy and time consuming process in the wilderness. If the signs discussed above in the death from hypothermia section are present then the only thing to do is organise appropriate evacuation . Other factors that should be taken into account are if the rescuers are exhausted or the rescue will put more people in danger.</span></span></span></p><span data-dcnode-id="652" instrument_node="">
</span></li><span data-dcnode-id="650" instrument_node="">
</span><li data-dcnode-id="643"><span data-dcnode-id="649" instrument_node="">
</span><p class="font_7" data-dcnode-id="645" style="font-size:14px;"><span class="color_14" data-dcnode-id="646"><span data-dcnode-id="647" style="font-size:14px;"><span data-dcnode-id="648" instrument_node="">If there are no signs of life then rescue breaths (as per basic life support) should be given for 3 minutes and then cardiac activity reassessed, as this simple manoeuvre can improve previously undetectable cardiac activity.</span></span></span></p><span data-dcnode-id="644" instrument_node="">
</span></li><span data-dcnode-id="642" instrument_node="">
</span><li data-dcnode-id="633"><span data-dcnode-id="641" instrument_node="">
</span><p class="font_7" data-dcnode-id="635" style="font-size:14px;"><span class="color_14" data-dcnode-id="638"><span data-dcnode-id="639" style="font-size:14px;"><span data-dcnode-id="640" instrument_node="">If the victim still has no signs of life then continued treatment depends on whether it is possible to evacuate to an appropriate medical facility which has a cardiac monitor and can give definitive care, within three hours.</span></span></span><br data-dcnode-id="637"><span data-dcnode-id="636" instrument_node="">
&nbsp;</span></p><span data-dcnode-id="634" instrument_node="">
</span></li><span data-dcnode-id="632" instrument_node="">
</span></ol><span data-dcnode-id="630" instrument_node="">
</span><p class="font_7" data-dcnode-id="626" style="font-size:14px;"><span class="color_14" data-dcnode-id="627"><span data-dcnode-id="628" style="font-size:14px;"><span data-dcnode-id="629" instrument_node="">If evacuation to a medical facility is possible within three hours then the victim should be protected from further cooling (by drying and insulation) whilst rescue ventilation should be continued throughout the evacuation. Chest compressions should NOT be started. The reason for this is that the patient may be in a very slow, undetectable heart rhythm which is maintaining their life and commencing chest compressions could actually tip the irritable heart into VF/cardiac arrest as discussed above. For this reason CPR is only recommended if swift evacuation to a medical facility is possible as once it is commenced it must be continued until the patient's heart can be monitored with an ECG.</span></span></span></p><span data-dcnode-id="625" instrument_node="">
</span><p class="font_7" data-dcnode-id="620" style="font-size:14px;"><span class="color_14" data-dcnode-id="621"><span data-dcnode-id="622" style="font-size:14px;"><span class="wixGuard" data-dcnode-id="623"><span data-dcnode-id="624" instrument_node="">​</span></span></span></span></p><span data-dcnode-id="619" instrument_node="">
</span><p class="font_7" data-dcnode-id="615" style="font-size:14px;"><span class="color_14" data-dcnode-id="616"><span data-dcnode-id="617" style="font-size:14px;"><span data-dcnode-id="618" instrument_node="">If evacuation cannot happen within three hours then rescue breaths should be continued and chest compressions should be commenced. Oxygen should be given if available. This basic life support should be continued for 60 minutes (30 minutes for medical staff using ALS protocols ) whilst all the above active warming measures are instituted. If after 60 minutes the patient has been warmed up but there is still no pulse or breathing effort to be seen then life support should be stopped and the victim evacuated as appropriate. If possible this decision should be made in conjunction with the expedition/base camp health care professional.</span></span></span></p><span data-dcnode-id="614" instrument_node="">
</span><p class="font_7" data-dcnode-id="609" style="font-size:14px;"><span class="color_14" data-dcnode-id="610"><span data-dcnode-id="611" style="font-size:14px;"><span class="wixGuard" data-dcnode-id="612"><span data-dcnode-id="613" instrument_node="">​</span></span></span></span></p><span data-dcnode-id="608" instrument_node="">
</span><h5 class="font_5" data-dcnode-id="604" style="font-size:22px;"><span class="color_15" data-dcnode-id="605"><span data-dcnode-id="606" style="font-size:22px;"><span data-dcnode-id="607" instrument_node="">Other problems</span></span></span></h5><span data-dcnode-id="603" instrument_node="">
</span><p class="font_7" data-dcnode-id="599" style="font-size:14px;"><span class="color_14" data-dcnode-id="600"><span data-dcnode-id="601" style="font-size:14px;"><span data-dcnode-id="602" instrument_node="">Two physiological phenomena that are useful to know about in severe hypothermia are:</span></span></span></p><span data-dcnode-id="598" instrument_node="">
</span><ol class="color_14 font_7" data-dcnode-id="580" style="font-size:14px;"><span data-dcnode-id="597" instrument_node="">
</span><li data-dcnode-id="590"><span data-dcnode-id="596" instrument_node="">
</span><p class="font_7" data-dcnode-id="592" style="font-size:14px;"><span class="color_14" data-dcnode-id="593"><span data-dcnode-id="594" style="font-size:14px;"><span data-dcnode-id="595" instrument_node="">Afterdrop: this is defined as a continued fall in the core temperature, after removal from the cold stress, which may even occur during rewarming. It is due to heat redistribution within the body. The importance of this is that even when re-warming has started the patient may be at risk of cardiac arrest.</span></span></span></p><span data-dcnode-id="591" instrument_node="">
</span></li><span data-dcnode-id="589" instrument_node="">
</span><li data-dcnode-id="582"><span data-dcnode-id="588" instrument_node="">
</span><p class="font_7" data-dcnode-id="584" style="font-size:14px;"><span class="color_14" data-dcnode-id="585"><span data-dcnode-id="586" style="font-size:14px;"><span data-dcnode-id="587" instrument_node="">Circum-rescue collapse: this is when a hypothermic victim is found with stable vital signs but then collapses during or soon after rescue. It is thought to be caused by a massive drop in blood pressure or precipitation of VF (as above) on handling of the victim. This phenomenon was initially described in maritime rescue but it has also been seen with rescue of hypothermic victims in the mountain environment.</span></span></span></p><span data-dcnode-id="583" instrument_node="">
</span></li><span data-dcnode-id="581" instrument_node="">
</span></ol><span data-dcnode-id="579" instrument_node="">
</span><p class="font_7" data-dcnode-id="577" style="font-size:14px;"><span data-dcnode-id="578" instrument_node="">&nbsp;</span></p><span data-dcnode-id="576" instrument_node="">
</span><h5 class="font_5" data-dcnode-id="572" style="font-size:22px;"><span class="color_15" data-dcnode-id="573"><span data-dcnode-id="574" style="font-size:22px;"><span data-dcnode-id="575" instrument_node="">Prevention is better than cure</span></span></span></h5><span data-dcnode-id="571" instrument_node="">
</span><p class="font_7" data-dcnode-id="567" style="font-size:14px;"><span class="color_14" data-dcnode-id="568"><span data-dcnode-id="569" style="font-size:14px;"><span data-dcnode-id="570" instrument_node="">The old adage that prevention is better than cure counts for double when dealing with illness in the wilderness. Although it is important to know the steps of treatment the take home message should be that anyone in the mountains should be able to recognise the symptoms of hypothermia in themselves and those around them and act upon the diagnosis.</span></span></span></p><span data-dcnode-id="566" instrument_node="">
</span><ul class="font_7 color_14" data-dcnode-id="524" style="font-size:14px;"><span data-dcnode-id="565" instrument_node="">
</span><li data-dcnode-id="558"><span data-dcnode-id="564" instrument_node="">
</span><p class="font_7" data-dcnode-id="560" style="font-size:14px;"><span class="color_14" data-dcnode-id="561"><span data-dcnode-id="562" style="font-size:14px;"><span data-dcnode-id="563" instrument_node="">Remember high altitude makes hypothermia (and frostbite) more likely.</span></span></span></p><span data-dcnode-id="559" instrument_node="">
</span></li><span data-dcnode-id="557" instrument_node="">
</span><li data-dcnode-id="550"><span data-dcnode-id="556" instrument_node="">
</span><p class="font_7" data-dcnode-id="552" style="font-size:14px;"><span class="color_14" data-dcnode-id="553"><span data-dcnode-id="554" style="font-size:14px;"><span data-dcnode-id="555" instrument_node="">Avoid sweating and/or exchange damp clothes for dry ones.</span></span></span></p><span data-dcnode-id="551" instrument_node="">
</span></li><span data-dcnode-id="549" instrument_node="">
</span><li data-dcnode-id="542"><span data-dcnode-id="548" instrument_node="">
</span><p class="font_7" data-dcnode-id="544" style="font-size:14px;"><span class="color_14" data-dcnode-id="545"><span data-dcnode-id="546" style="font-size:14px;"><span data-dcnode-id="547" instrument_node="">Adequate food and drink gives your body fuel to sustain exercise.</span></span></span></p><span data-dcnode-id="543" instrument_node="">
</span></li><span data-dcnode-id="541" instrument_node="">
</span><li data-dcnode-id="534"><span data-dcnode-id="540" instrument_node="">
</span><p class="font_7" data-dcnode-id="536" style="font-size:14px;"><span class="color_14" data-dcnode-id="537"><span data-dcnode-id="538" style="font-size:14px;"><span data-dcnode-id="539" instrument_node="">Always be prepared to stop and shelter. Multi-person both/bivvy bags are available that are light and compact enough to be carried in a personal pack. These are very efficient at maintaining heat and allow you to gain shelter from the wind anywhere.</span></span></span></p><span data-dcnode-id="535" instrument_node="">
</span></li><span data-dcnode-id="533" instrument_node="">
</span><li data-dcnode-id="526"><span data-dcnode-id="532" instrument_node="">
</span><p class="font_7" data-dcnode-id="528" style="font-size:14px;"><span class="color_14" data-dcnode-id="529"><span data-dcnode-id="530" style="font-size:14px;"><span data-dcnode-id="531" instrument_node="">Keep an eye on other members of your party to watch for the early signs of hypothermia and be prepared to change your route, or go back, if necessary. A buddy system for this works well.</span></span></span></p><span data-dcnode-id="527" instrument_node="">
</span></li><span data-dcnode-id="525" instrument_node="">
</span></ul><span data-dcnode-id="523" instrument_node="">
</span><p class="font_7" data-dcnode-id="521" style="font-size:14px;"><span data-dcnode-id="522" instrument_node="">&nbsp;</span></p><span data-dcnode-id="520" instrument_node="">
</span><p class="font_7" data-dcnode-id="518" style="font-size:14px;"><span data-dcnode-id="519" instrument_node="">&nbsp;</span></p><span data-dcnode-id="517" instrument_node="">
</span><p class="font_7" data-dcnode-id="513" style="font-size:14px;"><span class="color_14" data-dcnode-id="514"><span data-dcnode-id="515" style="font-size:14px;"><span data-dcnode-id="516" instrument_node="">References</span></span></span></p><span data-dcnode-id="512" instrument_node="">
</span><p class="font_7" data-dcnode-id="508" style="font-size:14px;"><span class="color_14" data-dcnode-id="509"><span data-dcnode-id="510" style="font-size:14px;"><span data-dcnode-id="511" instrument_node="">1.Casualty Care in Mountain Rescue. Ellerton J. 2nd. Edition 2006.</span></span></span></p><span data-dcnode-id="507" instrument_node="">
</span><p class="font_7" data-dcnode-id="503" style="font-size:14px;"><span class="color_14" data-dcnode-id="504"><span data-dcnode-id="505" style="font-size:14px;"><span data-dcnode-id="506" instrument_node="">2.Mountaineering Council of Scotland Information Leaflet 'Freezing to Death'. 1997.</span></span></span></p><span data-dcnode-id="502" instrument_node="">
</span><p class="font_7" data-dcnode-id="498" style="font-size:14px;"><span class="color_14" data-dcnode-id="499"><span data-dcnode-id="500" style="font-size:14px;"><span data-dcnode-id="501" instrument_node="">3.State of Alaska Cold Injuries Guidelines: Alaska Multi-level 2003 (Rev. 2005) Prepared by: Department of Health and Social Services, Division of Public Health, Section of Community Health and EMS.</span></span></span></p><span data-dcnode-id="497" instrument_node="">
</span><p class="font_7" data-dcnode-id="492" style="font-size:14px;"><span class="color_14" data-dcnode-id="493"><span data-dcnode-id="494" style="font-size:14px;"><span class="wixGuard" data-dcnode-id="495"><span data-dcnode-id="496" instrument_node="">​</span></span></span></span></p><span data-dcnode-id="491" instrument_node="">
</span><p class="font_7" data-dcnode-id="484" style="font-size:14px; text-align:right;"><span class="color_14" data-dcnode-id="485"><span data-dcnode-id="486" style="font-size:14px;"><span data-dcnode-id="490" instrument_node="">by</span><span data-dcnode-id="487" style="text-decoration:underline;"><a data-anchor="dataItem-jylkzwej" data-dcnode-id="488" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.altitude.org/authors" target="_self"><span data-dcnode-id="489" instrument_node="">&nbsp;Kitty Duncan</span></a></span></span></span></p><span data-dcnode-id="483" instrument_node="">
</span><p class="font_7" data-dcnode-id="480" style="font-size:14px; text-align:right;"><span class="wixGuard" data-dcnode-id="481"><span data-dcnode-id="482" instrument_node="">​</span></span></p></div><div class="_2bjge" data-dcnode-id="462" id="comp-jyepsppj"><div class="qDqoW" data-dcnode-id="478" data-testid="container-bg"></div><div class="" data-dcnode-id="463" data-mesh-id="comp-jyepsppjinlineContent" data-testid="inline-content"><div data-dcnode-id="464" data-mesh-id="comp-jyepsppjinlineContent-gridContainer" data-testid="mesh-container-content"><div class="_1Q9if" data-dcnode-id="465" data-testid="richTextElement" id="comp-jyepxdsr"><h1 class="font_0" data-dcnode-id="475" style="text-align:center; font-size:22px;"><span class="color_15" data-dcnode-id="476"><span data-dcnode-id="477" instrument_node="">MODERATE</span></span></h1><span data-dcnode-id="474" instrument_node="">
</span><p class="font_7" data-dcnode-id="471" style="font-size:16px;"><span class="wixGuard" data-dcnode-id="472"><span data-dcnode-id="473" instrument_node="">​</span></span></p><span data-dcnode-id="470" instrument_node="">
</span><p class="font_7" data-dcnode-id="466" style="font-size:16px;"><span class="color_14" data-dcnode-id="467"><span data-dcnode-id="468" style="font-size:14px;"><span data-dcnode-id="469" instrument_node="">The moderately hypothermic victim has slurred speech, is apathetic, confused, irrational, and clumsy. Lips may turn blue and consciousness may be reduced. The pulse first slows down and then the heart becomes more irritable as temperature reduces further, often leading to an irregular pulse (atrial fibrillation) at core temperatures below 32 degrees C.</span></span></span></p></div></div></div></div><div class="_2bjge" data-dcnode-id="445" id="comp-jyept6ag"><div class="qDqoW" data-dcnode-id="461" data-testid="container-bg"></div><div class="" data-dcnode-id="446" data-mesh-id="comp-jyept6aginlineContent" data-testid="inline-content"><div data-dcnode-id="447" data-mesh-id="comp-jyept6aginlineContent-gridContainer" data-testid="mesh-container-content"><div class="_1Q9if" data-dcnode-id="448" data-testid="richTextElement" id="comp-jyepygac"><h1 class="font_0" data-dcnode-id="458" style="text-align:center; font-size:22px;"><span class="color_15" data-dcnode-id="459"><span data-dcnode-id="460" instrument_node="">SEVERE</span></span></h1><span data-dcnode-id="457" instrument_node="">
</span><p class="font_7" data-dcnode-id="454" style="font-size:14px;"><span class="wixGuard" data-dcnode-id="455"><span data-dcnode-id="456" instrument_node="">​</span></span></p><span data-dcnode-id="453" instrument_node="">
</span><p class="font_7" data-dcnode-id="449" style="font-size:14px;"><span class="color_14" data-dcnode-id="450"><span data-dcnode-id="451" style="font-size:14px;"><span data-dcnode-id="452" instrument_node="">As temperature drops below 30degrees C the victim will become unresponsive. The breathing and pulse will be faint or even undetectable and they may look dead. Below 30 there is a high risk of the heart going into Ventricular Fibrillation (VF - a form of cardiac arrest) with any kind of rough handling. This includes large limb movements or rapid changes in body position i.e. sitting them up from horizontal position.</span></span></span></p></div></div></div></div><div class="_2bjge" data-dcnode-id="427" id="comp-jyept6m3"><div class="qDqoW" data-dcnode-id="444" data-testid="container-bg"></div><div class="" data-dcnode-id="428" data-mesh-id="comp-jyept6m3inlineContent" data-testid="inline-content"><div data-dcnode-id="429" data-mesh-id="comp-jyept6m3inlineContent-gridContainer" data-testid="mesh-container-content"><div class="_1Q9if" data-dcnode-id="430" data-testid="richTextElement" id="comp-jyepu9qo"><h1 class="font_0" data-dcnode-id="441" style="text-align:center; font-size:22px;"><span class="color_15" data-dcnode-id="442"><span data-dcnode-id="443" instrument_node="">MILD</span></span></h1><span data-dcnode-id="440" instrument_node="">
</span><h3 class="font_3" data-dcnode-id="436" style="font-size:16px;"><span data-dcnode-id="437" style="font-size:16px;"><span class="wixGuard" data-dcnode-id="438"><span data-dcnode-id="439" instrument_node="">​</span></span></span></h3><span data-dcnode-id="435" instrument_node="">
</span><p class="font_7" data-dcnode-id="431" style="font-size:14px;"><span class="color_14" data-dcnode-id="432"><span data-dcnode-id="433" style="font-size:14px;"><span data-dcnode-id="434" instrument_node="">As described above, in mild hypothermia the victim will be shivering with cold white peripheries. There is loss of manual dexterity. They may become quiet and feel cold to touch, be mildly confused or be disorientated and irritable. They may also lose insight - denying having any problem - and reject help, which can make it quite difficult to treat them.</span></span></span></p></div></div></div></div></div></div></div></div></section><div aria-label="Hypothermia" class="qhwIj ignore-focus" data-dcnode-id="420" id="comp-jyeq9ift" role="region" tabindex="-1"><span data-dcnode-id="421" instrument_node="">&nbsp;</span></div><section class="_3d64y" data-dcnode-id="319" id="comp-jyeqjlc3"><div class="_3wnIc" data-dcnode-id="417" data-hook="bgLayers" id="bgLayers_comp-jyeqjlc3"><div class="_3KzuS _3SQN-" data-dcnode-id="419" data-testid="colorUnderlay"></div><div class="_2GUhU" data-dcnode-id="418" id="bgMedia_comp-jyeqjlc3"></div></div><div class="_1uldx" data-dcnode-id="320" data-testid="columns"><div class="_1vNJf" data-dcnode-id="321" id="comp-jyeqjlhs"><div class="_3wnIc" data-dcnode-id="414" data-hook="bgLayers" id="bgLayers_comp-jyeqjlhs"><div class="_3KzuS _3SQN-" data-dcnode-id="416" data-testid="colorUnderlay"></div><div class="_2GUhU" data-dcnode-id="415" id="bgMedia_comp-jyeqjlhs"></div></div><div class="" data-dcnode-id="322" data-mesh-id="comp-jyeqjlhsinlineContent" data-testid="inline-content"><div data-dcnode-id="323" data-mesh-id="comp-jyeqjlhsinlineContent-gridContainer" data-testid="mesh-container-content"><div class="_1Q9if" data-dcnode-id="409" data-testid="richTextElement" id="comp-jyeqk5ne"><h1 class="font_0" data-dcnode-id="410" style="text-align:center; font-size:22px;"><span class="color_15" data-dcnode-id="411"><span data-dcnode-id="412" style="font-size:37px;"><span data-dcnode-id="413" instrument_node="">KILIMANJARO</span></span></span></h1></div><div class="_2UdPt" data-dcnode-id="408" id="comp-jyeqk5pt"></div><div class="_1Q9if" data-dcnode-id="402" data-testid="richTextElement" id="comp-jyeqk5sb"><p class="font_7" data-dcnode-id="403" style="font-size:16px; text-align:center;"><span data-dcnode-id="404" style="font-size:16px;"><span data-dcnode-id="405" style="font-style:italic;"><span class="color_15" data-dcnode-id="406"><span data-dcnode-id="407" instrument_node="">A safe and successful ascent of Mount Kilimanjaro: don't die of acute mountain sickness</span></span></span></span></p></div><div class="_1Q9if" data-dcnode-id="324" data-testid="richTextElement" id="comp-jyeqsqqd"><p class="font_7" data-dcnode-id="395" style="font-size:14px;"><span class="color_14" data-dcnode-id="396"><span data-dcnode-id="397" style="font-size:14px;"><span data-dcnode-id="399" style="text-decoration:underline;"><a data-anchor="dataItem-jy259zh3" data-dcnode-id="400" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.altitude.org/altitude-sickness" target="_self"><span data-dcnode-id="401" instrument_node="">Acute mountain sickness (AMS)</span></a></span><span data-dcnode-id="398" instrument_node="">&nbsp;is a common illness that affects a significant proportion of people that ascend to high altitude. The symptoms are headache and fatigue, sleep disturbance, problems with the digestive system and dizziness.</span></span></span></p><span data-dcnode-id="394" instrument_node="">
</span><p class="font_7" data-dcnode-id="389" style="font-size:14px;"><span class="color_14" data-dcnode-id="390"><span data-dcnode-id="391" style="font-size:14px;"><span class="wixGuard" data-dcnode-id="392"><span data-dcnode-id="393" instrument_node="">​</span></span></span></span></p><span data-dcnode-id="388" instrument_node="">
</span><p class="font_7" data-dcnode-id="376" style="font-size:14px;"><span class="color_14" data-dcnode-id="377"><span data-dcnode-id="378" style="font-size:14px;"><span data-dcnode-id="387" instrument_node="">For the majority of sufferers AMS remains no more than an inconvenience. However, for a significant minority AMS can develop into one of two potentially fatal conditions:&nbsp;</span><span data-dcnode-id="384" style="text-decoration:underline;"><a data-dcnode-id="385" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.altitude.org/altitude_sickness.php%23HAPE" target="_blank"><span data-dcnode-id="386" instrument_node="">High Altitude Pulmonary Edema (HAPE)</span></a></span><span data-dcnode-id="383" instrument_node="">&nbsp;or&nbsp;</span><span data-dcnode-id="380" style="text-decoration:underline;"><a data-anchor="dataItem-jy25iyhc" data-dcnode-id="381" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.altitude.org/altitude-sickness" target="_self"><span data-dcnode-id="382" instrument_node="">High Altitude Cerebral Edema (HACE)</span></a></span><span data-dcnode-id="379" instrument_node="">. These conditions both require immediate attention.</span></span></span></p><span data-dcnode-id="375" instrument_node="">
</span><p class="font_7" data-dcnode-id="370" style="font-size:14px;"><span class="color_14" data-dcnode-id="371"><span data-dcnode-id="372" style="font-size:14px;"><span class="wixGuard" data-dcnode-id="373"><span data-dcnode-id="374" instrument_node="">​</span></span></span></span></p><span data-dcnode-id="369" instrument_node="">
</span><p class="font_7" data-dcnode-id="361" style="font-size:14px;"><span class="color_14" data-dcnode-id="362"><span data-dcnode-id="363" style="font-size:14px;"><span data-dcnode-id="368" instrument_node="">Sufferers of HAPE develop breathlessness at rest and may develop blue lips and a raised body temperature. HACE often presents initially with severe headache, vomiting and lethargy. These potentially fatal conditions can be prevented if a pragmatic&nbsp;</span><span data-dcnode-id="365" style="text-decoration:underline;"><a data-anchor="dataItem-jy25gp1y" data-dcnode-id="366" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.altitude.org/altitude-sickness" target="_self"><span data-dcnode-id="367" instrument_node="">golden rules</span></a></span><span data-dcnode-id="364" instrument_node="">&nbsp;approach is taken.</span></span></span></p><span data-dcnode-id="360" instrument_node="">
</span><p class="font_7" data-dcnode-id="355" style="font-size:14px;"><span class="color_14" data-dcnode-id="356"><span data-dcnode-id="357" style="font-size:14px;"><span class="wixGuard" data-dcnode-id="358"><span data-dcnode-id="359" instrument_node="">​</span></span></span></span></p><span data-dcnode-id="354" instrument_node="">
</span><p class="font_7" data-dcnode-id="345" style="font-size:14px;"><span class="color_14" data-dcnode-id="346"><span data-dcnode-id="347" style="font-size:14px;"><span data-dcnode-id="353" instrument_node="">Mount Kilimanjaro is an extremely popular climb amongst inexperienced climbers. As a result of expensive park fees and the abundance of alternative tourist attractions nearby, the rushed round trip to the 5895m summit is often attempted in as little as 5 days. It is therefore perhaps not surprising that&nbsp;</span><span data-dcnode-id="349" style="text-decoration:underline;"><a data-dcnode-id="351" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.liebertonline.com/doi/abs/10.1089/ham.2010.1003" target="_blank"><span data-dcnode-id="352" instrument_node="">many of the climbers attempting the summit suffer altitude sickness</span></a><span data-dcnode-id="350" instrument_node="">.</span></span><span data-dcnode-id="348" instrument_node=""> Only one formal investigation into the incidence of HACE has been performed on the mountain, in which 18% of climbers were found to be suffering from HACE. Although no studies into the incidence of HAPE have been performed on the mountain it would not be surprising if the incidence of HAPE mirrored the high incidence of AMS and HACE.</span></span></span></p><span data-dcnode-id="344" instrument_node="">
</span><p class="font_7" data-dcnode-id="339" style="font-size:14px;"><span class="color_14" data-dcnode-id="340"><span data-dcnode-id="341" style="font-size:14px;"><span class="wixGuard" data-dcnode-id="342"><span data-dcnode-id="343" instrument_node="">​</span></span></span></span></p><span data-dcnode-id="338" instrument_node="">
</span><p class="font_7" data-dcnode-id="334" style="font-size:14px;"><span class="color_14" data-dcnode-id="335"><span data-dcnode-id="336" style="font-size:14px;"><span data-dcnode-id="337" instrument_node="">Acclimatisation treks are the only thing that has been proven to protect against AMS on Kilimanjaro. Climbers looking for the best chance of avoiding altitude sickness can acclimatise on the conveniently located Mount Meru (4566m). This approach also gives you the best chance of success on the summit attempt of Mount Kilimanjaro. Climbers are often reassured by locals that the slower ascent rates offered by several of the ascent routes provides protection from AMS development. However, there is no evidence that any of these routes are slow enough to confer protection. In addition, the ascent of Mount Kilimanjaro is so rapid that climbers should not assume that acetazolamide (Diamox) can protect them from developing Acute Mountain Sickness.</span></span></span></p><span data-dcnode-id="333" instrument_node="">
</span><p class="font_8" data-dcnode-id="325" style="text-align:right; font-size:14px;"><span class="color_14" data-dcnode-id="326"><span data-dcnode-id="332" instrument_node="">by&nbsp;</span><span data-dcnode-id="327" style="text-decoration:underline;"><a data-anchor="dataItem-jyll7v69" data-dcnode-id="330" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.altitude.org/authors" target="_self"><span data-dcnode-id="331" instrument_node="">Stewart Jackson,&nbsp;</span></a><a data-anchor="dataItem-jylktavc" data-dcnode-id="328" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.altitude.org/authors" target="_self"><span data-dcnode-id="329" instrument_node="">Kenneth Baillie</span></a></span></span></p></div></div></div></div></div></section><div aria-label="Kilimanjaro advice" class="qhwIj ignore-focus" data-dcnode-id="317" id="comp-jyer8pjv" role="region" tabindex="-1"><span data-dcnode-id="318" instrument_node="">&nbsp;</span></div><section class="_3d64y" data-dcnode-id="278" id="comp-jyq5p3i1"><div class="_3wnIc" data-dcnode-id="314" data-hook="bgLayers" id="bgLayers_comp-jyq5p3i1"><div class="_3KzuS _3SQN-" data-dcnode-id="316" data-testid="colorUnderlay"></div><div class="_2GUhU" data-dcnode-id="315" id="bgMedia_comp-jyq5p3i1"></div></div><div class="_1uldx" data-dcnode-id="279" data-testid="columns"><div class="_1vNJf" data-dcnode-id="280" id="comp-jyq5p3sw"><div class="_3wnIc" data-dcnode-id="311" data-hook="bgLayers" id="bgLayers_comp-jyq5p3sw"><div class="_3KzuS _3SQN-" data-dcnode-id="313" data-testid="colorUnderlay"></div><div class="_2GUhU" data-dcnode-id="312" id="bgMedia_comp-jyq5p3sw"></div></div><div class="" data-dcnode-id="281" data-mesh-id="comp-jyq5p3swinlineContent" data-testid="inline-content"><div data-dcnode-id="282" data-mesh-id="comp-jyq5p3swinlineContent-gridContainer" data-testid="mesh-container-content"><div class="_1Q9if" data-dcnode-id="306" data-testid="richTextElement" id="comp-jyq5p3uh"><h1 class="font_0" data-dcnode-id="307" style="font-size:37px; text-align:center;"><span class="color_15" data-dcnode-id="308"><span data-dcnode-id="309" style="font-size:37px;"><span data-dcnode-id="310" instrument_node="">SURVIVAL AT EXTREME ALTITUDE</span></span></span></h1></div><div class="_2UdPt" data-dcnode-id="305" id="comp-jyq5p414"></div><div class="_1Q9if" data-dcnode-id="299" data-testid="richTextElement" id="comp-jyq5p46v"><p class="font_7" data-dcnode-id="300" style="font-size:16px; text-align:center;"><span data-dcnode-id="301" style="font-size:16px;"><span data-dcnode-id="302" style="font-style:italic;"><span class="color_15" data-dcnode-id="303"><span data-dcnode-id="304" instrument_node="">There have been several reports of people surviving at altitudes greater than 9000m</span></span></span></span></p></div><div class="_1Q9if" data-dcnode-id="283" data-testid="richTextElement" id="comp-jyq5p4c5"><p class="font_7" data-dcnode-id="295" style="font-size:14px;"><span class="color_14" data-dcnode-id="296"><span data-dcnode-id="297" style="font-size:14px;"><span data-dcnode-id="298" instrument_node="">Is it possible to survive above the summit of Everest? Although it would almost certainly not be possible to climb any higher than an altitude of about 9000m (Everest is 8848m), there are several reports of people surviving unpressurised flights at higher altitudes. At least ten people have stowed away in the wheel bays of long-haul aircraft, which generally fly at altitudes well over 9000m.</span></span></span></p><span data-dcnode-id="294" instrument_node="">
</span><p class="font_7" data-dcnode-id="289" style="font-size:14px;"><span class="color_14" data-dcnode-id="290"><span data-dcnode-id="291" style="font-size:14px;"><span class="wixGuard" data-dcnode-id="292"><span data-dcnode-id="293" instrument_node="">​</span></span></span></span></p><span data-dcnode-id="288" instrument_node="">
</span><p class="font_7" data-dcnode-id="284" style="font-size:14px;"><span class="color_14" data-dcnode-id="285"><span data-dcnode-id="286" style="font-size:14px;"><span data-dcnode-id="287" instrument_node="">This is almost certainly only possible because of the combined effects of extreme cold and unconsciousness, both of which greatly reduces the body's demand for oxygen. The condition could be described as being analogous to hibernation. Sadly, estimates suggest that between 50% and 80% of wheel-bay stowaways do not survive. Perhaps the most compelling account of such a journey is given by Armando Socarras Ramirez, who escaped from Fidel Castro's Cuba in 1969:</span></span></span></p></div></div></div></div></div></section><section class="_3d64y" data-dcnode-id="87" id="comp-jyq5tr84"><div class="_3wnIc" data-dcnode-id="275" data-hook="bgLayers" id="bgLayers_comp-jyq5tr84"><div class="_3KzuS _3SQN-" data-dcnode-id="277" data-testid="colorUnderlay"></div><div class="_2GUhU" data-dcnode-id="276" id="bgMedia_comp-jyq5tr84"></div></div><div class="_1uldx" data-dcnode-id="88" data-testid="columns"><div class="_1vNJf" data-dcnode-id="269" id="comp-jyq5trg3"><div class="_3wnIc" data-dcnode-id="272" data-hook="bgLayers" id="bgLayers_comp-jyq5trg3"><div class="_3KzuS _3SQN-" data-dcnode-id="274" data-testid="colorUnderlay"></div><div class="_2GUhU" data-dcnode-id="273" id="bgMedia_comp-jyq5trg3"></div></div><div class="" data-dcnode-id="270" data-mesh-id="comp-jyq5trg3inlineContent" data-testid="inline-content"><div data-dcnode-id="271" data-mesh-id="comp-jyq5trg3inlineContent-gridContainer" data-testid="mesh-container-content"></div></div></div><div class="_1vNJf" data-dcnode-id="89" id="comp-jyq5trka"><div class="_3wnIc" data-dcnode-id="264" data-hook="bgLayers" id="bgLayers_comp-jyq5trka"><div class="_3KzuS _3SQN-" data-dcnode-id="268" data-testid="colorUnderlay"></div><div class="_2GUhU" data-dcnode-id="265" id="bgMedia_comp-jyq5trka"><wix-image class="_1-6YJ _3SQN- </span><path d="M189.4 19.8c3.5 5.8 6.9 11.6 10.6 17.8-1.7 1-3.4 2.1-5.1 3-13.4 7.8-26.3 16.1-36.8 27.9-10.7 12-15.9 26-17.4 42.3 1.4 0 2.8-.1 4.2 0 8.3.6 16.8.2 24.8 2.1 18.9 4.4 26.1 18.9 24.8 36.6-1.3 16.9-15.3 30.5-31.9 31.3-12.2.6-23.9-1.1-33.5-9.5-8.7-7.6-12.6-17.9-15.1-28.8-7.2-32.2 2.1-59.7 23.9-83.6 11-12 23.8-21.8 37.6-30.3 4.5-2.8 8.8-5.8 13.3-8.8h.6z" data-dcnode-id="259"></path><span data-dcnode-id="258" instrument_node="">
