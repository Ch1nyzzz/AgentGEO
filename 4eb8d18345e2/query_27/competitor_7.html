</span><p class="font_7" data-dcnode-id="1462" style="font-size:14px;"><span class="color_14" data-dcnode-id="1463"><span data-dcnode-id="1464" style="font-size:14px;"><span class="wixGuard" data-dcnode-id="1465"><span data-dcnode-id="1466" instrument_node="">​</span></span></span></span></p><span data-dcnode-id="1461" instrument_node="">
</span><p class="font_7" data-dcnode-id="1453" style="font-size:14px;"><span class="color_14" data-dcnode-id="1454"><span data-dcnode-id="1455" style="font-size:14px;"><span data-dcnode-id="1460" instrument_node="">When you ascend to high altitude, the curve initially shifts to the right at moderate altitudes, under the influence of 2,3 DPG. At extreme altitude, it shifts to the left because there is much less CO2 in the blood (see </span><span data-dcnode-id="1457" style="text-decoration:underline;"><a data-anchor="dataItem-jybrcmh8" data-anchor-comp-id="comp-jybrcmf1" data-dcnode-id="1458" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.altitude.org/high-altitude" target="_self"><span data-dcnode-id="1459" instrument_node="">acclimatisation </span></a></span><span data-dcnode-id="1456" instrument_node="">to find out why).&nbsp;</span></span></span></p><span data-dcnode-id="1452" instrument_node="">
</span><p class="font_7" data-dcnode-id="1445" style="font-size:14px; text-align:right;"><span class="color_14" data-dcnode-id="1446"><span data-dcnode-id="1447" style="font-size:14px;"><span data-dcnode-id="1451" instrument_node="">by&nbsp;</span><span data-dcnode-id="1448" style="text-decoration:underline;"><a data-anchor="dataItem-jylktavc" data-dcnode-id="1449" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.altitude.org/authors" target="_self"><span data-dcnode-id="1450" instrument_node="">Kenneth Baillie</span></a></span></span></span></p></div></div></div></div></div></section><section class="_3d64y" data-dcnode-id="1253" id="comp-jyc05vhc"><div class="_3wnIc" data-dcnode-id="1436" data-hook="bgLayers" id="bgLayers_comp-jyc05vhc"><div class="_3KzuS _3SQN-" data-dcnode-id="1438" data-testid="colorUnderlay"></div><div class="_2GUhU" data-dcnode-id="1437" id="bgMedia_comp-jyc05vhc"></div></div><div class="_1uldx" data-dcnode-id="1254" data-testid="columns"><div class="_1vNJf" data-dcnode-id="1255" id="comp-jyc05vsg"><div class="_3wnIc" data-dcnode-id="1433" data-hook="bgLayers" id="bgLayers_comp-jyc05vsg"><div class="_3KzuS _3SQN-" data-dcnode-id="1435" data-testid="colorUnderlay"></div><div class="_2GUhU" data-dcnode-id="1434" id="bgMedia_comp-jyc05vsg"></div></div><div class="" data-dcnode-id="1256" data-mesh-id="comp-jyc05vsginlineContent" data-testid="inline-content"><div data-dcnode-id="1257" data-mesh-id="comp-jyc05vsginlineContent-gridContainer" data-testid="mesh-container-content"><div class="_1Q9if" data-dcnode-id="1428" data-testid="richTextElement" id="comp-jyc0daqc"><h1 class="font_0" data-dcnode-id="1429" style="text-align:center; font-size:22px;"><span class="color_15" data-dcnode-id="1430"><span data-dcnode-id="1431" style="font-size:37px;"><span data-dcnode-id="1432" instrument_node="">ALTITUDE TRAINING&nbsp;</span></span></span></h1></div><div class="_2UdPt" data-dcnode-id="1427" id="comp-jyc0daw0"></div><div class="_1Q9if" data-dcnode-id="1421" data-testid="richTextElement" id="comp-jyc0dayo"><p class="font_7" data-dcnode-id="1422" style="font-size:16px; text-align:center;"><span data-dcnode-id="1423" style="font-size:16px;"><span data-dcnode-id="1424" style="font-style:italic;"><span class="color_15" data-dcnode-id="1425"><span data-dcnode-id="1426" instrument_node="">Training at altitude may help athletes gain a competitive edge at sea level; altitude exposure also presents problems to athletes, and these could possibly cancel out benefit.</span></span></span></span></p></div><div class="_2bjge" data-dcnode-id="1408" id="comp-jyc15gtp"><div class="qDqoW" data-dcnode-id="1420" data-testid="container-bg"></div><div class="" data-dcnode-id="1409" data-mesh-id="comp-jyc15gtpinlineContent" data-testid="inline-content"><div data-dcnode-id="1410" data-mesh-id="comp-jyc15gtpinlineContent-gridContainer" data-testid="mesh-container-content"><div class="_1Q9if" data-dcnode-id="1415" data-testid="richTextElement" id="comp-jyc0itif"><p class="font_7" data-dcnode-id="1416" style="font-size:14px;"><span class="color_15" data-dcnode-id="1417"><span data-dcnode-id="1418" style="font-size:14px;"><span data-dcnode-id="1419" instrument_node="">All athletes seek a competitive advantage. Although the benefits of some interventions (like training, for example) are clear, most strategies are less well proven. Altitude is no exception to this. Training at high altitude has been used by competitive athletes as a means of improving their potential. However, despite a good deal of research into the topic, its true effects and a recommended approach are still not well established. Additionally, altitude training is usually expensive and fraught with logistical problems.</span></span></span></p></div><div class="XUUsC" data-dcnode-id="1411" id="comp-jyc0m0wc" title="andy schleck tour de france"><div class="xQ_iF" data-dcnode-id="1412" data-testid="linkElement"><wix-image class="_1-6YJ _1Fe8-" data-bg-effect-name="" data-dcnode-id="1413" data-has-ssr-src="" data-image-info="{&quot;containerId&quot;:&quot;comp-jyc0m0wc&quot;,&quot;displayMode&quot;:&quot;fill&quot;,&quot;imageData&quot;:{&quot;width&quot;:280,&quot;height&quot;:242,&quot;uri&quot;:&quot;5d01b5_51d011394306404b9432287a46af4f75~mv2.jpg&quot;,&quot;displayMode&quot;:&quot;fill&quot;,&quot;crop&quot;:{&quot;x&quot;:0,&quot;y&quot;:18,&quot;width&quot;:280,&quot;height&quot;:199,&quot;svgId&quot;:&quot;909695c1e003409ba70b5561666c7c4d.svg&quot;}}}" data-image-zoomed="" data-src="https://static.wixstatic.com/media/5d01b5_51d011394306404b9432287a46af4f75~mv2.jpg/v1/crop/x_0,y_18,w_280,h_199/fill/w_246,h_175,al_c,q_80,usm_0.66_1.00_0.01,enc_auto/5d01b5_51d011394306404b9432287a46af4f75~mv2.jpg" id="img_comp-jyc0m0wc"><img alt="altiude training " data-dcnode-id="1414" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//static.wixstatic.com/media/5d01b5_51d011394306404b9432287a46af4f75~mv2.jpg/v1/crop/x_0%2Cy_18%2Cw_280%2Ch_199/fill/w_246%2Ch_175%2Cal_c%2Cq_80%2Cusm_0.66_1.00_0.01%2Cenc_auto/5d01b5_51d011394306404b9432287a46af4f75~mv2.jpg&amp;raw" style="width:246px;height:175px;object-fit:cover;object-position:50% 50%"></wix-image></div></div></div></div></div><div class="_1Q9if" data-dcnode-id="1325" data-testid="richTextElement" id="comp-jyc0qzl3"><h5 class="font_5" data-dcnode-id="1404" style="font-size:22px;"><span data-dcnode-id="1405" style="font-size:22px;"><span class="color_15" data-dcnode-id="1406"><span data-dcnode-id="1407" instrument_node="">Benefits of Altitude Exposure</span></span></span></h5><span data-dcnode-id="1403" instrument_node="">
</span><p class="font_7" data-dcnode-id="1395" style="font-size:14px;"><span data-dcnode-id="1396" style="font-size:14px;"><span class="color_14" data-dcnode-id="1397"><span data-dcnode-id="1402" instrument_node="">Exposure to high altitude could theoretically improve an athlete’s capacity to exercise. Exposing the body to high altitude causes it to&nbsp;</span><span data-dcnode-id="1399" style="text-decoration:underline;"><a data-anchor="dataItem-jybrcmh8" data-anchor-comp-id="comp-jybrcmf1" data-dcnode-id="1400" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.altitude.org/high-altitude" target="_self"><span data-dcnode-id="1401" instrument_node="">acclimatise&nbsp;</span></a></span><span data-dcnode-id="1398" instrument_node="">to the lower level of oxygen available in the atmosphere. Many of the changes that occur with acclimatisation improve the delivery of oxygen to the muscles -the theory being that more oxygen will lead to better performance.</span></span></span></p><span data-dcnode-id="1394" instrument_node="">
</span><p class="font_7" data-dcnode-id="1390" style="font-size:14px;"><span data-dcnode-id="1391" style="font-size:14px;"><span class="wixGuard" data-dcnode-id="1392"><span data-dcnode-id="1393" instrument_node="">​</span></span></span></p><span data-dcnode-id="1389" instrument_node="">
</span><p class="font_7" data-dcnode-id="1385" style="font-size:14px;"><span data-dcnode-id="1386" style="font-size:14px;"><span class="color_14" data-dcnode-id="1387"><span data-dcnode-id="1388" instrument_node="">For any type of exercise lasting longer than a few minutes, the body must use oxygen to generate energy. Without it, muscles simply seize up and can become damaged. This type of exercise is called aerobic exercise, meaning with oxygen.</span></span></span></p><span data-dcnode-id="1384" instrument_node="">
</span><p class="font_7" data-dcnode-id="1380" style="font-size:14px;"><span data-dcnode-id="1381" style="font-size:14px;"><span class="wixGuard" data-dcnode-id="1382"><span data-dcnode-id="1383" instrument_node="">​</span></span></span></p><span data-dcnode-id="1379" instrument_node="">
</span><p class="font_7" data-dcnode-id="1375" style="font-size:14px;"><span data-dcnode-id="1376" style="font-size:14px;"><span class="color_14" data-dcnode-id="1377"><span data-dcnode-id="1378" instrument_node="">The body naturally produces a hormone called erythropoetin (EPO) which stimulates the production of red blood cells which carry oxygen to the muscles. Up to a point, the more blood cells you have, the more oxygen you can deliver to your muscles. There are also a number of other changes that happen during acclimatisation which may help athletic performance, including an increase in the number of small blood vessels, an increase in buffering capacity (ability to manage the build up of waste acid) and changes in the microscopic structure and function of the muscles themselves.</span></span></span></p><span data-dcnode-id="1374" instrument_node="">
</span><p class="font_7" data-dcnode-id="1370" style="font-size:14px;"><span data-dcnode-id="1371" style="font-size:14px;"><span class="wixGuard" data-dcnode-id="1372"><span data-dcnode-id="1373" instrument_node="">​</span></span></span></p><span data-dcnode-id="1369" instrument_node="">
</span><h5 class="font_5" data-dcnode-id="1365" style="font-size:22px;"><span class="color_15" data-dcnode-id="1366"><span data-dcnode-id="1367" style="font-size:22px;"><span data-dcnode-id="1368" instrument_node="">Problems of Altitude Exposure</span></span></span></h5><span data-dcnode-id="1364" instrument_node="">
</span><p class="font_7" data-dcnode-id="1360" style="font-size:14px;"><span data-dcnode-id="1361" style="font-size:14px;"><span class="color_14" data-dcnode-id="1362"><span data-dcnode-id="1363" instrument_node="">However, acclimatisation to high altitude is not simple, and there are a number of other effects that could cancel out the above benefits. For example the increase in red blood cells comes at a cost - having too many blood cells makes the blood thicker and can make blood flow sluggish. This makes it harder for your heart to pump round the body, and can actually decrease the amount of oxygen getting to where it is needed.</span></span></span></p><span data-dcnode-id="1359" instrument_node="">
</span><p class="font_7" data-dcnode-id="1355" style="font-size:14px;"><span data-dcnode-id="1356" style="font-size:14px;"><span class="color_14" data-dcnode-id="1357"><span data-dcnode-id="1358" instrument_node="">At very high altitudes (&gt;5000m), weight loss is unavoidable because your body actually consumes your muscles in order to provide energy. There is even a risk that the body’s immune system will become weakened, leading to an increased risk of infections, and there may be adverse changes in the chemical make-up of the muscles. Additionally, the body cannot exercise as intensely at altitude. This results in reduced training intensity, which can reduce performance in some sports. At very high altitudes, further problems are encountered: loss of appetite, inhibition of muscle repair processes and excessive work of breathing. On top of this, there is the problem of altitude illnesses, which can dramatically reduce the capacity to be active at altitude, or foreshorten the exposure to high altitude altogether.</span></span></span></p><span data-dcnode-id="1354" instrument_node="">
</span><p class="font_7" data-dcnode-id="1350" style="font-size:14px;"><span data-dcnode-id="1351" style="font-size:14px;"><span class="wixGuard" data-dcnode-id="1352"><span data-dcnode-id="1353" instrument_node="">​</span></span></span></p><span data-dcnode-id="1349" instrument_node="">
</span><h5 class="font_5" data-dcnode-id="1345" style="font-size:22px;"><span class="color_15" data-dcnode-id="1346"><span data-dcnode-id="1347" style="font-size:22px;"><span data-dcnode-id="1348" instrument_node="">Altitude Exposure Techniques</span></span></span></h5><span data-dcnode-id="1344" instrument_node="">
</span><p class="font_7" data-dcnode-id="1336" style="font-size:14px;"><span data-dcnode-id="1337" style="font-size:14px;"><span class="color_14" data-dcnode-id="1338"><span data-dcnode-id="1343" instrument_node="">Taking some of the information about altitude training into consideration, various techniques have been devised in order to expose the athlete to the beneficial effects of high altitude whilst not reducing their ability to train effectively. These have been labelled ‘Live High – Train High, ‘Live Low – Train High’ and ‘Live High – Train Low’. The typical altitudes used are around 2000-2500m, which in itself reduces the risk of some of the unhelpful effects of altitude exposure. The ‘low’ altitudes may not actually be at sea level, but could be 1250m, for example. However, the difference between the two altitudes is significant enough to have an effect on training [see the difference in oxygen and pressure at these altitudes with our </span><span data-dcnode-id="1340" style="text-decoration:underline;"><a data-dcnode-id="1341" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//baillielab.net/critical_care/physiology/" target="_blank"><span data-dcnode-id="1342" instrument_node="">high altitude calculator</span></a></span><span data-dcnode-id="1339" instrument_node="">].</span></span></span></p><span data-dcnode-id="1335" instrument_node="">
</span><p class="font_7" data-dcnode-id="1331" style="font-size:14px;"><span data-dcnode-id="1332" style="font-size:14px;"><span class="wixGuard" data-dcnode-id="1333"><span data-dcnode-id="1334" instrument_node="">​</span></span></span></p><span data-dcnode-id="1330" instrument_node="">
</span><p class="font_7" data-dcnode-id="1326" style="font-size:14px; text-align:right;"><span data-dcnode-id="1327" style="font-size:14px;"><span class="wixGuard" data-dcnode-id="1328"><span data-dcnode-id="1329" instrument_node="">​</span></span></span></p></div><div class="_2bjge" data-dcnode-id="1305" id="comp-jycowog8"><div class="qDqoW" data-dcnode-id="1324" data-testid="container-bg"></div><div class="" data-dcnode-id="1306" data-mesh-id="comp-jycowog8inlineContent" data-testid="inline-content"><div data-dcnode-id="1307" data-mesh-id="comp-jycowog8inlineContent-gridContainer" data-testid="mesh-container-content"><div class="_1Q9if" data-dcnode-id="1308" data-testid="richTextElement" id="comp-jycoxpzz"><h5 class="font_5" data-dcnode-id="1320" style="font-size:22px; text-align:center;"><span class="color_15" data-dcnode-id="1321"><span data-dcnode-id="1322" style="font-size:22px;"><span data-dcnode-id="1323" instrument_node="">Live High – Train High</span></span></span></h5><span data-dcnode-id="1319" instrument_node="">
</span><h5 class="font_5" data-dcnode-id="1314" style="font-size:22px; text-align:center;"><span class="color_15" data-dcnode-id="1315"><span data-dcnode-id="1316" style="font-size:22px;"><span class="wixGuard" data-dcnode-id="1317"><span data-dcnode-id="1318" instrument_node="">​</span></span></span></span></h5><span data-dcnode-id="1313" instrument_node="">
</span><p class="font_7" data-dcnode-id="1309" style="font-size:14px;"><span data-dcnode-id="1310" style="font-size:14px;"><span class="color_14" data-dcnode-id="1311"><span data-dcnode-id="1312" instrument_node="">Maximum exposure to altitude. Evidence of a positive effect at sea level is controversial, and there is less support for this method amongst experts.</span></span></span></p></div></div></div></div><div class="_2bjge" data-dcnode-id="1285" id="comp-jycownkl"><div class="qDqoW" data-dcnode-id="1304" data-testid="container-bg"></div><div class="" data-dcnode-id="1286" data-mesh-id="comp-jycownklinlineContent" data-testid="inline-content"><div data-dcnode-id="1287" data-mesh-id="comp-jycownklinlineContent-gridContainer" data-testid="mesh-container-content"><div class="_1Q9if" data-dcnode-id="1288" data-testid="richTextElement" id="comp-jycozswg"><h5 class="font_5" data-dcnode-id="1300" style="font-size:22px; text-align:center;"><span class="color_15" data-dcnode-id="1301"><span data-dcnode-id="1302" style="font-size:22px;"><span data-dcnode-id="1303" instrument_node="">Live Low – Train High</span></span></span></h5><span data-dcnode-id="1299" instrument_node="">
</span><h5 class="font_5" data-dcnode-id="1294" style="font-size:22px; text-align:center;"><span class="color_15" data-dcnode-id="1295"><span data-dcnode-id="1296" style="font-size:22px;"><span class="wixGuard" data-dcnode-id="1297"><span data-dcnode-id="1298" instrument_node="">​</span></span></span></span></h5><span data-dcnode-id="1293" instrument_node="">
</span><p class="font_7" data-dcnode-id="1289" style="font-size:14px;"><span data-dcnode-id="1290" style="font-size:14px;"><span class="color_14" data-dcnode-id="1291"><span data-dcnode-id="1292" instrument_node="">The idea behind this regime is that the athlete is exercising in a low oxygen environment, whilst resting in a normal oxygen environment. There have been some interesting findings suggesting that this technique might work, but there are no good studies showing that the technique makes any difference to the ultimate competitive performance of the athlete at sea-level. Additionally, training intensity is reduced so some athletes may find that they actually lose fitness using this regime.</span></span></span></p></div></div></div></div><div class="_2bjge" data-dcnode-id="1265" id="comp-jycovta9"><div class="qDqoW" data-dcnode-id="1284" data-testid="container-bg"></div><div class="" data-dcnode-id="1266" data-mesh-id="comp-jycovta9inlineContent" data-testid="inline-content"><div data-dcnode-id="1267" data-mesh-id="comp-jycovta9inlineContent-gridContainer" data-testid="mesh-container-content"><div class="_1Q9if" data-dcnode-id="1268" data-testid="richTextElement" id="comp-jycp0yqg"><h5 class="font_5" data-dcnode-id="1280" style="font-size:22px; text-align:center;"><span class="color_15" data-dcnode-id="1281"><span data-dcnode-id="1282" style="font-size:22px;"><span data-dcnode-id="1283" instrument_node="">Live High – Train Low</span></span></span></h5><span data-dcnode-id="1279" instrument_node="">
</span><h5 class="font_5" data-dcnode-id="1274" style="font-size:22px; text-align:center;"><span class="color_15" data-dcnode-id="1275"><span data-dcnode-id="1276" style="font-size:22px;"><span class="wixGuard" data-dcnode-id="1277"><span data-dcnode-id="1278" instrument_node="">​</span></span></span></span></h5><span data-dcnode-id="1273" instrument_node="">
</span><p class="font_7" data-dcnode-id="1269" style="font-size:14px;"><span data-dcnode-id="1270" style="font-size:14px;"><span class="color_14" data-dcnode-id="1271"><span data-dcnode-id="1272" instrument_node="">The theory behind this regime is that the body will acclimatise to altitude by living there, whilst training intensity can be maintained by training at (or near) sea level. Hence, the beneficial effects of altitude exposure are harnessed whilst some of the negative ones are avoided. However, residence at altitude must be for more than 12 hours per day and for at least 3 weeks. With this technique, improvements in sea-level performance have been shown in events lasting between 8 and 20 minutes. And interestingly, athletes of all abilities are thought to benefit.</span></span></span></p></div></div></div></div><div class="_1Q9if" data-dcnode-id="1258" data-testid="richTextElement" id="comp-jyeqc3by"><p class="font_7" data-dcnode-id="1259" style="font-size:14px; text-align:right;"><span data-dcnode-id="1260" style="font-size:14px;"><span data-dcnode-id="1264" instrument_node="">by&nbsp;</span><span data-dcnode-id="1261" style="text-decoration:underline;"><a data-anchor="dataItem-jylkwvis" data-dcnode-id="1262" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.altitude.org/authors" target="_self"><span data-dcnode-id="1263" instrument_node="">Alistair Simpson</span></a></span></span></p></div></div></div></div></div></section><div aria-label="Altitude training " class="qhwIj ignore-focus" data-dcnode-id="1251" id="comp-jyc0g2rb" role="region" tabindex="-1"><span data-dcnode-id="1252" instrument_node="">&nbsp;</span></div><div aria-label="Diving at altitude" class="qhwIj ignore-focus" data-dcnode-id="1249" id="comp-jycotnub" role="region" tabindex="-1"><span data-dcnode-id="1250" instrument_node="">&nbsp;</span></div><section class="_3d64y" data-dcnode-id="999" id="comp-jyc1n5vk"><div class="_3wnIc" data-dcnode-id="1246" data-hook="bgLayers" id="bgLayers_comp-jyc1n5vk"><div class="_3KzuS _3SQN-" data-dcnode-id="1248" data-testid="colorUnderlay"></div><div class="_2GUhU" data-dcnode-id="1247" id="bgMedia_comp-jyc1n5vk"></div></div><div class="_1uldx" data-dcnode-id="1000" data-testid="columns"><div class="_1vNJf" data-dcnode-id="1001" id="comp-jyc1n6bs"><div class="_3wnIc" data-dcnode-id="1243" data-hook="bgLayers" id="bgLayers_comp-jyc1n6bs"><div class="_3KzuS _3SQN-" data-dcnode-id="1245" data-testid="colorUnderlay"></div><div class="_2GUhU" data-dcnode-id="1244" id="bgMedia_comp-jyc1n6bs"></div></div><div class="" data-dcnode-id="1002" data-mesh-id="comp-jyc1n6bsinlineContent" data-testid="inline-content"><div data-dcnode-id="1003" data-mesh-id="comp-jyc1n6bsinlineContent-gridContainer" data-testid="mesh-container-content"><div class="_1Q9if" data-dcnode-id="1238" data-testid="richTextElement" id="comp-jycohuep"><h1 class="font_0" data-dcnode-id="1239" style="text-align:center; font-size:22px;"><span class="color_15" data-dcnode-id="1240"><span data-dcnode-id="1241" style="font-size:37px;"><span data-dcnode-id="1242" instrument_node="">DIVING AT ALTITUDE&nbsp;</span></span></span></h1></div><div class="_2UdPt" data-dcnode-id="1237" id="comp-jycohuam"></div><div class="_1Q9if" data-dcnode-id="1004" data-testid="richTextElement" id="comp-jycohuch"><p class="font_7" data-dcnode-id="1232" style="font-size:14px;"><span class="color_14" data-dcnode-id="1233"><span data-dcnode-id="1234" style="font-size:14px;"><span class="wixGuard" data-dcnode-id="1235"><span data-dcnode-id="1236" instrument_node="">​</span></span></span></span></p><span data-dcnode-id="1231" instrument_node="">
</span><p class="font_7" data-dcnode-id="1227" style="font-size:14px;"><span class="color_14" data-dcnode-id="1228"><span data-dcnode-id="1229" style="font-size:14px;"><span data-dcnode-id="1230" instrument_node="">Elevated altitudes produce unique challenges for the diver. The &nbsp;reduced atmospheric pressure at the surface of any mountain lake affects the divers’ depth gauges, as does the fresh water which is less dense than in the sea (Wienke, 1993). Then, when the diver ascends from depth, the rate of change as the ambient pressure drops is far greater than when ascending from a dive in the sea (Smith, 1976). These factors need to be compensated for, otherwise dives considered relatively safe in the sea might generate copious bubbles of inert gas within a diver’s bodily tissues, causing a disease called Decompression Sickness (DCS), popularly known as “the bends”. The bends may range from a mild skin rash, through increasing severity to paralysis and death. According to Gribble (1960), the first mention of a possible altitude bend was by von Schrotter in 1906, though the quotation attributed to Boycott and Haldane regarding this has not been found by this author (Boycott, Damant, &amp; Haldane, 1908; Gribble, 1960; Schrotter, 1906). Regardless, it appears that “altitude bends” are a modern disease, meaning we probably have much more to learn yet before we fully understand the mechanisms involved.</span></span></span></p><span data-dcnode-id="1226" instrument_node="">
</span><p class="font_7" data-dcnode-id="1221" style="font-size:14px;"><span class="color_14" data-dcnode-id="1222"><span data-dcnode-id="1223" style="font-size:14px;"><span class="wixGuard" data-dcnode-id="1224"><span data-dcnode-id="1225" instrument_node="">​</span></span></span></span></p><span data-dcnode-id="1220" instrument_node="">
</span><h5 class="font_5" data-dcnode-id="1216" style="font-size:22px;"><span class="color_15" data-dcnode-id="1217"><span data-dcnode-id="1218" style="font-size:22px;"><span data-dcnode-id="1219" instrument_node="">Fizzyology</span></span></span></h5><span data-dcnode-id="1215" instrument_node="">
</span><p class="font_7" data-dcnode-id="1211" style="font-size:14px;"><span class="color_14" data-dcnode-id="1212"><span data-dcnode-id="1213" style="font-size:14px;"><span data-dcnode-id="1214" instrument_node="">As a diver descends the pressure surrounding the diver increases. This increase does not affect divers wearing rigid “atmospheric” suits but, for the majority of us who wear flexible diving dress, we compensate for the increased pressure by increasing the pressure of the gas we breath. Ignoring minor variations due to the weather, at sea-level the ambient air pressure approximates one atmosphere of pressure, at a depth of ten metres in the sea the pressure should be two atmospheres, and another atmosphere of pressure is added for each additional ten metres of depth. Thanks to the development of the SCUBA regulator by Emile Gagnan and Jacques Cousteau, when a diver breathes compressed gas at depth then the gas is delivered at a pressure equivalent to the surrounding pressure. In this way the diver does not have to “suck” his gas from a much lower pressure down to a higher pressure, (and this is why we cannot simply use a long snorkel). The pressure is “regulated” by the SCUBA unit, which senses what the ambient pressure is.</span></span></span></p><span data-dcnode-id="1210" instrument_node="">
</span><p class="font_7" data-dcnode-id="1205" style="font-size:14px;"><span class="color_14" data-dcnode-id="1206"><span data-dcnode-id="1207" style="font-size:14px;"><span class="wixGuard" data-dcnode-id="1208"><span data-dcnode-id="1209" instrument_node="">​</span></span></span></span></p><span data-dcnode-id="1204" instrument_node="">
</span><p class="font_7" data-dcnode-id="1200" style="font-size:14px;"><span class="color_14" data-dcnode-id="1201"><span data-dcnode-id="1202" style="font-size:14px;"><span data-dcnode-id="1203" instrument_node="">Inhaling gas at increased pressure solves one problem (of delivering gas to the lungs), but as the blood transports this gas around the body the diver’s tissues naturally move towards equilibrium with the new ambient pressure by absorbing the gas. When the diver later ascends to a much lower pressure, such as at the surface, these tissues now have a greater pressure of gas dissolved within them than the surrounding air pressure, and this gas moves towards equilibrium once again, this time by leaving the tissues (Lenihan &amp; Morgan, 1975). It is generally accepted that the rate of this move towards equilibrium, that is, the size of the difference between the tissue pressure and the ambient pressure, is largely responsible for the generation of bubbles within a diver’s tissues. The principle is akin to opening a can of soda: if you open the can suddenly then the soda will fizz, due to the sudden difference between the dissolved pressure and the ambient pressure. If you open the can slowly then the soda will not fizz as much, because the change is more gradual. If you have flown in a commercial jet, which usually has a much lower ambient air pressure in the cabin than on the ground, then did you notice that your soda was unusually fizzy? That would have probably been due to the even greater difference between the dissolved gas pressure in the soda (usually around 1.5 atmospheres) and the ambient pressure in the cabin. This is equivalent to one of the main concerns of a diver at high altitude: the increased difference between the pressure of the gas dissolved within his tissues after a dive and the (much lower) ambient pressure at the surface of the mountain lake. These increased differences first become a cause for concern at altitudes of just 300m or higher (NOAA, 2001).</span></span></span></p><span data-dcnode-id="1199" instrument_node="">
</span><p class="font_7" data-dcnode-id="1194" style="font-size:14px;"><span class="color_14" data-dcnode-id="1195"><span data-dcnode-id="1196" style="font-size:14px;"><span class="wixGuard" data-dcnode-id="1197"><span data-dcnode-id="1198" instrument_node="">​</span></span></span></span></p><span data-dcnode-id="1193" instrument_node="">
</span><h5 class="font_5" data-dcnode-id="1189" style="font-size:22px;"><span class="color_15" data-dcnode-id="1190"><span data-dcnode-id="1191" style="font-size:22px;"><span data-dcnode-id="1192" instrument_node="">Popularity of diving at altitude.</span></span></span></h5><span data-dcnode-id="1188" instrument_node="">
</span><p class="font_7" data-dcnode-id="1184" style="font-size:14px;"><span class="color_14" data-dcnode-id="1185"><span data-dcnode-id="1186" style="font-size:14px;"><span data-dcnode-id="1187" instrument_node="">There are many reasons people dive at high altitude: searching for particular objects such as WWII aircraft, training when the sea is inhospitable or too distant to be practical, for scientific research, even just for the plain fun of it. At last count, in 2008 there were 30 dive businesses above 1,500m advertising in the Johannesburg business telephone directories, and 53 above 1,500m advertising in Colorado telephone directories (Buzzacott &amp; Ruehle, 2009). The University of California conduct scientific diver training in Lake Tahoe, at an altitude of 6,200ft (1,890m)(Bell &amp; Borgwardt, 1976), and the Bolivian Navy maintain a school of diving on the shores of Tiquina, at 12,500ft (3,810m).</span></span></span></p><span data-dcnode-id="1183" instrument_node="">
</span><p class="font_7" data-dcnode-id="1178" style="font-size:14px;"><span class="color_14" data-dcnode-id="1179"><span data-dcnode-id="1180" style="font-size:14px;"><span class="wixGuard" data-dcnode-id="1181"><span data-dcnode-id="1182" instrument_node="">​</span></span></span></span></p><span data-dcnode-id="1177" instrument_node="">
</span><p class="font_7" data-dcnode-id="1173" style="font-size:14px;"><span class="color_14" data-dcnode-id="1174"><span data-dcnode-id="1175" style="font-size:14px;"><span data-dcnode-id="1176" instrument_node="">For some, the challenge of diving at altitude is the purpose. In 1968 a team led by Jacques Cousteau established the record for altitude diving in Lake Titicaca, at an altitude of 12,500ft (3,810m). In the 1980’s an American team made a series of dives in the South American Andes, at 19, 450ft (5,928m) (Leach, 1986). In 1988 a team from the Indian Navy Diving Training School in Cochin, Southern India, made many training dives in Pykara Dam in the Nilgiri Hills at 7,000ft (2134m) before making 22 dives at Lake Manasbal (7,000ft, 2134m), 16 dives at Leh (11,000ft, 3,353m) and finally diving at 14,200ft (4,328m), in Lake Pangong Tso in the north of Ladakh state in the Himalayas (Sahni, John, Dhall, &amp; Chatterjee, 1991). In true expedition fashion, some of the troop suffered hypothermia, headaches or unconsciousness. No such troubles for the British expedition to the Khumbu Glacier in the Everest region of the Himalayas in 1989, when they made 18 ice-dives in Gokyo Tsho at 15,700ft (4,785m) and eight ice-dives in Donag Tscho at 16,000ft (4,877m), cutting through 1.2m thick ice to reach almost 30m depth (Leach, McLean, &amp; Mee, 1994). The record at Lago Lincancabur has been equalled a number of times since the 1980’s (Morris, Berthold, &amp; Cabrol, 2007) but currently stands, and these days the Bolivian Navy dive there every few years (H. Crespo, personal communication, 2010). The school at Tequina have recently taken delivery of a new hyperbaric chamber, have goals to substantially increase their mixed-gas diving capabilities and, in this authors opinion, they are poised to reach new depths in Lake Titicaca, to map uncharted caves, to recover artefacts from pre-Inca civilisations that will revise our understanding of pre-Columbian history, to monitor human physiology in environments not previously endured and to record fauna that is currently unknown to science.</span></span></span></p><span data-dcnode-id="1172" instrument_node="">
</span><p class="font_7" data-dcnode-id="1167" style="font-size:14px;"><span class="color_14" data-dcnode-id="1168"><span data-dcnode-id="1169" style="font-size:14px;"><span class="wixGuard" data-dcnode-id="1170"><span data-dcnode-id="1171" instrument_node="">​</span></span></span></span></p><span data-dcnode-id="1166" instrument_node="">
</span><h5 class="font_5" data-dcnode-id="1162" style="font-size:22px;"><span class="color_15" data-dcnode-id="1163"><span data-dcnode-id="1164" style="font-size:22px;"><span data-dcnode-id="1165" instrument_node="">Methods of compensation</span></span></span></h5><span data-dcnode-id="1161" instrument_node="">
</span><p class="font_7" data-dcnode-id="1157" style="font-size:14px;"><span class="color_14" data-dcnode-id="1158"><span data-dcnode-id="1159" style="font-size:14px;"><span data-dcnode-id="1160" instrument_node="">Dive tables are a tabular matrix of depths and times that relate to post-dive estimates of the resulting pressures within a range of theoretical tissues. If a diver stays too deep for too long then his tissues will have so much pressure within them that he will not be able to safely ascend to the surface. He will need to “decompress” on the way up or, else, too many bubbles will form. Of course, remembering the can of soda analogy: it is not just the amount of gas in the tissues that needs to be limited, it is the rate of change when the ambient pressure drops that is the second key factor to account for. The faster the rate of change then the lower the limits (shorter times and/or shallower depths). Therefore, each table is designed with a maximum rate of ascent in mind and this rate of ascent is dependent upon altitude. Modern divers rely on personal dive computers to generate real-time limits and these computers utilise a governing algorithm to estimate how many minutes might be allowably left at whatever depth the diver is at. These algorithms, as with the algorithms used to generate dive tables, vary between dive computer manufacturers. Not only do the algorithms differ, (and they are often proprietary information which hinders comparison), dive computers differ in other ways too, such as in the frequency a diver’s time limits are computed. One model may estimate the remaining allowable time once every second whereas another model may estimate the remaining allowable time every ten seconds. Other safety mechanisms differ between models too, such as ascent-rate alarms, which emit a regular beep if the maximum ascent rate, (allowed by the individual dive computer’s algorithm), is exceeded. Many dive computers utilise a variable ascent rate too, allowing faster ascents at deeper depths, then requiring the diver to slow his ascent nearer the surface, as the rate of change increases exponentially. The debate between proponents of the constant ascent rate, originally recommended by a scientist called Hill, and the variable ascent rate, originally recommended by Haldane, is known as the “Hill vs. Haldane controversy” (Marroni, 2002).</span></span></span></p><span data-dcnode-id="1156" instrument_node="">
</span><p class="font_7" data-dcnode-id="1151" style="font-size:14px;"><span class="color_14" data-dcnode-id="1152"><span data-dcnode-id="1153" style="font-size:14px;"><span class="wixGuard" data-dcnode-id="1154"><span data-dcnode-id="1155" instrument_node="">​</span></span></span></span></p><span data-dcnode-id="1150" instrument_node="">
</span><p class="font_7" data-dcnode-id="1146" style="font-size:14px;"><span class="color_14" data-dcnode-id="1147"><span data-dcnode-id="1148" style="font-size:14px;"><span data-dcnode-id="1149" instrument_node="">Of course, remember that the underlying causes of decompression sickness are still unproven. The evidence is convincingly supportive but the scientifically proven link remains elusive. We think we understand the mechanisms of bubble generation and the causes of decompression sickness but many of the assumptions used to predict our limits are based on empirical trial-and-error, where limits have been predicted and then revised downwards after in-water use. Accordingly, there are a variety of algorithms in use today that rely on different physiological and physical assumptions about human tissues, bubbles and gas kinetic theory. For recreational dives in the sea these various algorithms usually result in similar predictions of time limits for each depth, give or take a small proportion of the total allowable time. For example, most dive computers and tables allow a diver to make his first dive of the day to 30m for between 16-25 minutes, (most allow around 20 minutes). Some then assume the inert gas is washed out more quickly during a surface interval between dives, and others impose higher time penalties for dives made when divers already have residual gas left over from previous dives. The upshot of all this is that algorithms vary in many ways, and the ways they compensate for dives at high altitude also vary (Egi &amp; Brubank, 1995).</span></span></span></p><span data-dcnode-id="1145" instrument_node="">
</span><p class="font_7" data-dcnode-id="1140" style="font-size:14px;"><span class="color_14" data-dcnode-id="1141"><span data-dcnode-id="1142" style="font-size:14px;"><span class="wixGuard" data-dcnode-id="1143"><span data-dcnode-id="1144" instrument_node="">​</span></span></span></span></p><span data-dcnode-id="1139" instrument_node="">
</span><h5 class="font_5" data-dcnode-id="1135" style="font-size:22px;"><span class="color_15" data-dcnode-id="1136"><span data-dcnode-id="1137" style="font-size:22px;"><span data-dcnode-id="1138" instrument_node="">Compensation mechanisms</span></span></span></h5><span data-dcnode-id="1134" instrument_node="">
</span><p class="font_7" data-dcnode-id="1130" style="font-size:14px;"><span class="color_14" data-dcnode-id="1131"><span data-dcnode-id="1132" style="font-size:14px;"><span data-dcnode-id="1133" instrument_node="">Possibly the most common method of adapting tables for use at high altitude is to convert the maximum depth a diver is planning to reach into an “equivalent sea dive” depth (Paulev &amp; Zubieta-Calleja Jr, 2007), which is a way of reducing the time allowed by using the time limit from a deeper depth. This method is known as the “Haldane method” (Hennessy, 1977), later referred to by the US Navy as the “Cross Correction”, after E.R. Cross promoted the method in 1967 and again in 1970 (Egi &amp; Brubank, 1995). The higher the altitude, the more a diver adds to his planned actual depth when searching for his limit. For example, a diver may be planning to go to 18m depth. To find his limit he will look at the 18m time limit at sea level, the 21m limit at 5000ft and the 27m limit at 10,000ft altitude (Bell &amp; Borgwardt, 1976). But, there are a number of other theoretical ways to adapt sea-level dive tables for use at altitude, and even more ways being utilised by personal dive computers. In one recent study (Buzzacott &amp; Ruehle, 2009) the order of a series of dive computers when ranked according to how conservative they were at sea-level was reversed at 10,000 feet, so that the most conservative at sea-level became the most generous at altitude, and the most generous at sea-level became the most conservative at altitude.</span></span></span></p><span data-dcnode-id="1129" instrument_node="">
</span><p class="font_7" data-dcnode-id="1127" style="font-size:14px;"><span data-dcnode-id="1128" instrument_node="">&nbsp;</span></p><span data-dcnode-id="1126" instrument_node="">
</span><h5 class="font_5" data-dcnode-id="1122" style="font-size:22px;"><span class="color_15" data-dcnode-id="1123"><span data-dcnode-id="1124" style="font-size:22px;"><span data-dcnode-id="1125" instrument_node="">Conclusion</span></span></span></h5><span data-dcnode-id="1121" instrument_node="">
</span><p class="font_7" data-dcnode-id="1117" style="font-size:14px;"><span class="color_14" data-dcnode-id="1118"><span data-dcnode-id="1119" style="font-size:14px;"><span data-dcnode-id="1120" instrument_node="">Recreational diving at altitude carries risks that are additional to diving at sea-level and additional training is required by recreational divers. For decompression diving the jury is still out concerning which method is best for adapting existing decompression schedules for use at altitude. Accordingly, any team planning significant exposure to decompression stress at altitude are well advised to consult a diving physiologist with experience in altitude diving. Furthermore, all divers should accept that whatever dive schedule is adopted, the assumptions underpinning that model may be untested or unproven and that many decompression dives at high altitude could even be considered experimental in nature. Some tables, for example, have been tested in water up to a certain altitude and remain unproven beyond that height (Boni, Schibli, Nussberger, &amp; Buhlmann, 1976). To minimise risk of the bends additional prophylactic measures should be taken when possible, such as engaging in a suitable pre-dive exercise regime, the introduction of additional oxygen into the breathing mix, removal of inert gas from the breathing mix, warmth during decompression to promote peripheral circulation, an ascent-rate rate reference such as a weighted line or suspended trapeze, a horizontal pose to have the natural buoyancy of the lungs promote maximal surface area for gas exchange, and immediate post-dive assistance to reduce diver workload.</span></span></span></p><span data-dcnode-id="1116" instrument_node="">
</span><p class="font_7" data-dcnode-id="1112" style="font-size:14px;"><span class="color_14" data-dcnode-id="1113"><span data-dcnode-id="1114" style="font-size:14px;"><span data-dcnode-id="1115" instrument_node="">Diving at altitude can be a lot of fun, a challenge, and there are many worthy reasons to dive in mountain lakes. Take care though – diving at altitude is a lot less forgiving if you get it wrong. A simple matter like a stuck buoyancy jacket inflator button might bring you up quickly and you’d be more likely to get away with it in the sea than you will in the mountains. Add complications like having to cross a mountain pass to get to the hospital and a relatively minor bend could turn really nasty very quickly, and no-one wants to end-up paralysed from the neck down.</span></span></span></p><span data-dcnode-id="1111" instrument_node="">
</span><p class="font_7" data-dcnode-id="1106" style="font-size:14px;"><span class="color_14" data-dcnode-id="1107"><span data-dcnode-id="1108" style="font-size:14px;"><span class="wixGuard" data-dcnode-id="1109"><span data-dcnode-id="1110" instrument_node="">​</span></span></span></span></p><span data-dcnode-id="1105" instrument_node="">
