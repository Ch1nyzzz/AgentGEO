</span><h2 data-dcnode-id="2191"><span data-dcnode-id="2195" instrument_node="">What changes at </span><b data-dcnode-id="2193"><span data-dcnode-id="2194" instrument_node="">high altitude</span></b><span data-dcnode-id="2192" instrument_node="">?</span></h2><span data-dcnode-id="2190" instrument_node="">
</span><p data-dcnode-id="2185"><span data-dcnode-id="2189" instrument_node="">
				The environment is completely different at high altitude compared to that at sea level - the air is thinner and temperatures are usually much colder.  In order to survive at high altitude, it is necessary to </span><a data-dcnode-id="2187" href="http://altitude.org/acclimatisation.php"><span data-dcnode-id="2188" instrument_node="">acclimatise</span></a><span data-dcnode-id="2186" instrument_node="">(acclimate). This means that changes occur in the body so that it can cope with the shortage of oxygen.
			</span></p><span data-dcnode-id="2184" instrument_node="">
</span><div data-dcnode-id="2165" id="factsform"><span data-dcnode-id="2183" instrument_node="">
</span><span data-dcnode-id="2182" style="color:blue"></span><span data-dcnode-id="2181" instrument_node=""> </span><img data-dcnode-id="2180" height="12px" src="https://baillielab.net/altitude/high_altitude/transpar.gif" width="0"/><span data-dcnode-id="2179" instrument_node="">
</span><p data-dcnode-id="2169"><span data-dcnode-id="2178" instrument_node="">
</span><b data-dcnode-id="2176"><span data-dcnode-id="2177" instrument_node="">Fact about this altitude</span></b><span data-dcnode-id="2175" instrument_node="">
</span><br data-dcnode-id="2174"/><span data-dcnode-id="2173" instrument_node="">
</span><span data-dcnode-id="2171" id="fact_holder"><span data-dcnode-id="2172" instrument_node="">We all live underneath a huge ocean of air that is several miles deep: the atmosphere. The pressure on our bodies is about the same as ten metres of sea water pressing down on us all the time.   </span></span><span data-dcnode-id="2170" instrument_node="">

</span><p class="font_7" data-dcnode-id="2081" style="font-size:14px;"><span class="color_14" data-dcnode-id="2082"><span data-dcnode-id="2083" style="font-size:14px;"><span data-dcnode-id="2084" instrument_node="">We all live underneath a huge ocean of air that is several miles deep: the atmosphere. The pressure on our bodies is about the same as ten metres of sea water pressing down on us all the time. At sea level, because air is compressible, the weight of all that air above us compresses the air around us, making it denser. As you go up a mountain, the air becomes less compressed and is therefore thinner.</span></span></span></p><span data-dcnode-id="2080" instrument_node="">
</span><p class="font_7" data-dcnode-id="2075" style="font-size:14px;"><span class="color_14" data-dcnode-id="2076"><span data-dcnode-id="2077" style="font-size:14px;"><span class="wixGuard" data-dcnode-id="2078"><span data-dcnode-id="2079" instrument_node="">​</span></span></span></span></p><span data-dcnode-id="2074" instrument_node="">
</span><p class="font_7" data-dcnode-id="2070" style="font-size:14px;"><span class="color_14" data-dcnode-id="2071"><span data-dcnode-id="2072" style="font-size:14px;"><span data-dcnode-id="2073" instrument_node="">The important effect of this decrease in pressure is this: in a given volume of air, there are fewer molecules present. This is really just another way of saying that the pressure is lower (this is called Boyle's law). The percentage of those molecules that are oxygen is exactly the same: 21%. The problem is that there are fewer molecules of everything present, including oxygen.</span></span></span></p><span data-dcnode-id="2069" instrument_node="">
</span><p class="font_7" data-dcnode-id="2064" style="font-size:14px;"><span class="color_14" data-dcnode-id="2065"><span data-dcnode-id="2066" style="font-size:14px;"><span class="wixGuard" data-dcnode-id="2067"><span data-dcnode-id="2068" instrument_node="">​</span></span></span></span></p><span data-dcnode-id="2063" instrument_node="">
</span><p class="font_7" data-dcnode-id="2059" style="font-size:14px;"><span class="color_14" data-dcnode-id="2060"><span data-dcnode-id="2061" style="font-size:14px;"><span data-dcnode-id="2062" instrument_node="">So although the percentage of oxygen in the atmosphere is the same, the thinner air means there is less oxygen to breathe.</span></span></span></p><span data-dcnode-id="2058" instrument_node="">
</span><p class="font_7" data-dcnode-id="2046" style="font-size:14px;"><span class="color_14" data-dcnode-id="2047"><span data-dcnode-id="2048" style="font-size:14px;"><span data-dcnode-id="2057" instrument_node="">Try using our</span><a data-dcnode-id="2055" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//baillielab.net/critical_care/air_pressure/" target="_blank"><span data-dcnode-id="2056" instrument_node=""> </span></a><span data-dcnode-id="2052" style="text-decoration:underline;"><a data-dcnode-id="2053" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//baillielab.net/critical_care/air_pressure/" target="_blank"><span data-dcnode-id="2054" instrument_node="">barometric pressure calculator</span></a></span><a data-dcnode-id="2050" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//baillielab.net/critical_care/air_pressure/" target="_blank"><span data-dcnode-id="2051" instrument_node=""> </span></a><span data-dcnode-id="2049" instrument_node="">to see how air pressure changes at high altitudes. Or use the altitude oxygen graph to see how much less oxygen is available at any altitude.</span></span></span></p><span data-dcnode-id="2045" instrument_node="">
</span><p class="font_7" data-dcnode-id="2040" style="font-size:14px;"><span class="color_14" data-dcnode-id="2041"><span data-dcnode-id="2042" style="font-size:14px;"><span class="wixGuard" data-dcnode-id="2043"><span data-dcnode-id="2044" instrument_node="">​</span></span></span></span></p><span data-dcnode-id="2039" instrument_node="">
</span><p class="font_7" data-dcnode-id="2035" style="font-size:14px;"><span class="color_14" data-dcnode-id="2036"><span data-dcnode-id="2037" style="font-size:14px;"><span data-dcnode-id="2038" instrument_node="">The pictures above demonstrate the effect of altitude on barometric pressure. I sealed a plastic bottle like this one in La Paz, Bolivia, at an altitude of 3600m (about 12000ft). I then brought it home with me to Edinburgh (which is pretty much at sea level). As you can see, the pressure of the atmosphere pushing down on the bottle has caused it to collapse.</span></span></span></p><span data-dcnode-id="2034" instrument_node="">
</span><p class="font_7" data-dcnode-id="2029" style="font-size:14px;"><span class="color_14" data-dcnode-id="2030"><span data-dcnode-id="2031" style="font-size:14px;"><span class="wixGuard" data-dcnode-id="2032"><span data-dcnode-id="2033" instrument_node="">​</span></span></span></span></p><span data-dcnode-id="2028" instrument_node="">
</span><p class="font_7" data-dcnode-id="2024" style="font-size:14px;"><span class="color_14" data-dcnode-id="2025"><span data-dcnode-id="2026" style="font-size:14px;"><span data-dcnode-id="2027" instrument_node="">The same thing happens in reverse to sealed objects when you take them up to high altitudes. Above is a photograph of a roll-on deodourant that I sealed in London, then opened in La Paz. It exploded across my hotel room.</span></span></span></p><span data-dcnode-id="2023" instrument_node="">
</span><p class="font_7" data-dcnode-id="2018" style="font-size:14px;"><span class="color_14" data-dcnode-id="2019"><span data-dcnode-id="2020" style="font-size:14px;"><span class="wixGuard" data-dcnode-id="2021"><span data-dcnode-id="2022" instrument_node="">​</span></span></span></span></p><span data-dcnode-id="2017" instrument_node="">
</span><p class="font_7" data-dcnode-id="2001" style="font-size:14px;"><span class="color_14" data-dcnode-id="2002"><span data-dcnode-id="2003" style="font-size:14px;"><span data-dcnode-id="2016" instrument_node="">The body makes a wide range of changes in order to cope better with the lack of oxygen at high altitude. This process is called acclimatisation. If you don’t acclimatise properly, you greatly increase your chance of developing&nbsp;</span><span data-dcnode-id="2013" style="text-decoration:underline;"><a data-dcnode-id="2014" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.altitude.org/altitude-sickness" target="_self"><span data-dcnode-id="2015" instrument_node="">altitude sickness</span></a></span><span data-dcnode-id="2012" instrument_node="">, or even worse,&nbsp;</span><span data-dcnode-id="2009" style="text-decoration:underline;"><a data-anchor="dataItem-jy25k62u" data-dcnode-id="2010" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.altitude.org/altitude-sickness" target="_self"><span data-dcnode-id="2011" instrument_node="">HAPE (high altitude pulmonary oedema)</span></a></span><span data-dcnode-id="2008" instrument_node="">or&nbsp;</span><span data-dcnode-id="2005" style="text-decoration:underline;"><a data-anchor="dataItem-jy25iyhc" data-dcnode-id="2006" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.altitude.org/altitude-sickness" target="_self"><span data-dcnode-id="2007" instrument_node="">HACE (high altitude cerebral oedema)</span></a></span><span data-dcnode-id="2004" instrument_node="">.</span></span></span></p><span data-dcnode-id="2000" instrument_node="">
</span><p class="font_7" data-dcnode-id="1993" style="font-size:14px; text-align:right;"><span class="color_14" data-dcnode-id="1994"><span data-dcnode-id="1995" style="font-size:14px;"><span data-dcnode-id="1999" instrument_node="">by </span><span data-dcnode-id="1996" style="text-decoration:underline;"><a data-anchor="dataItem-jylktavc" data-dcnode-id="1997" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.altitude.org/authors" target="_self"><span data-dcnode-id="1998" instrument_node="">Kenneth Baillie</span></a></span></span></span></p></div><div class="XUUsC" data-dcnode-id="1988" id="comp-jybgrz5e" title="This bottle was photographed at 3600m (left) then again at sea level (right)"><div class="xQ_iF" data-dcnode-id="1989" data-testid="linkElement"><wix-image class="_1-6YJ _1Fe8-" data-bg-effect-name="" data-dcnode-id="1990" data-has-ssr-src="" data-image-info="{&quot;containerId&quot;:&quot;comp-jybgrz5e&quot;,&quot;displayMode&quot;:&quot;fill&quot;,&quot;imageData&quot;:{&quot;width&quot;:250,&quot;height&quot;:168,&quot;uri&quot;:&quot;5d01b5_142de24756364684af1811f960a93270~mv2.gif&quot;,&quot;name&quot;:&quot;water bottle at altitude.gif&quot;,&quot;displayMode&quot;:&quot;fill&quot;}}" data-image-zoomed="" data-src="https://static.wixstatic.com/media/5d01b5_142de24756364684af1811f960a93270~mv2.gif" id="img_comp-jybgrz5e"><img alt="The effect of altitude on barometric pessure" data-dcnode-id="1991" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//static.wixstatic.com/media/5d01b5_142de24756364684af1811f960a93270~mv2.gif&amp;raw" style="width:250px;height:170px;object-fit:cover;object-position:50% 50%"></wix-image></div></div><div class="XUUsC" data-dcnode-id="1984" id="comp-jybgth3m" title="A roll-on deodourant that I sealed in London, then opened in La Paz; it exploded across my hotel roo"><div class="xQ_iF" data-dcnode-id="1985" data-testid="linkElement"><wix-image class="_1-6YJ _1Fe8-" data-bg-effect-name="" data-dcnode-id="1986" data-has-ssr-src="" data-image-info="{&quot;containerId&quot;:&quot;comp-jybgth3m&quot;,&quot;displayMode&quot;:&quot;fill&quot;,&quot;imageData&quot;:{&quot;width&quot;:250,&quot;height&quot;:193,&quot;uri&quot;:&quot;5d01b5_abc24c89ddfc4ae2b0e48e413188e7db~mv2.jpg&quot;,&quot;name&quot;:&quot;deoderant.jpg&quot;,&quot;displayMode&quot;:&quot;fill&quot;}}" data-image-zoomed="" data-src="https://static.wixstatic.com/media/5d01b5_abc24c89ddfc4ae2b0e48e413188e7db~mv2.jpg/v1/fill/w_250,h_193,al_c,q_80,enc_auto/deoderant.jpg" id="img_comp-jybgth3m"><img alt="The effect of altitude on barometric pessure" data-dcnode-id="1987" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//static.wixstatic.com/media/5d01b5_abc24c89ddfc4ae2b0e48e413188e7db~mv2.jpg/v1/fill/w_250%2Ch_193%2Cal_c%2Cq_80%2Cenc_auto/deoderant.jpg&amp;raw" style="width:250px;height:193px;object-fit:cover;object-position:50% 50%"></wix-image></div></div><div data-dcnode-id="1983" data-mesh-id="comp-jybgcpbminlineContent-wedge-6"></div></div></div></div></div></section><div aria-label="Living in thin air" class="qhwIj ignore-focus" data-dcnode-id="1976" id="comp-jybr6rbf" role="region" tabindex="-1"><span data-dcnode-id="1977" instrument_node="">&nbsp;</span></div><section class="_3d64y" data-dcnode-id="1953" id="comp-jybgz80h"><div class="_3wnIc" data-dcnode-id="1973" data-hook="bgLayers" id="bgLayers_comp-jybgz80h"><div class="_3KzuS _3SQN-" data-dcnode-id="1975" data-testid="colorUnderlay"></div><div class="_2GUhU" data-dcnode-id="1974" id="bgMedia_comp-jybgz80h"></div></div><div class="_1uldx" data-dcnode-id="1954" data-testid="columns"><div class="_1vNJf" data-dcnode-id="1955" id="comp-jybgz83f"><div class="_3wnIc" data-dcnode-id="1970" data-hook="bgLayers" id="bgLayers_comp-jybgz83f"><div class="_3KzuS _3SQN-" data-dcnode-id="1972" data-testid="colorUnderlay"></div><div class="_2GUhU" data-dcnode-id="1971" id="bgMedia_comp-jybgz83f"></div></div><div class="" data-dcnode-id="1956" data-mesh-id="comp-jybgz83finlineContent" data-testid="inline-content"><div data-dcnode-id="1957" data-mesh-id="comp-jybgz83finlineContent-gridContainer" data-testid="mesh-container-content"><div class="_1Q9if" data-dcnode-id="1965" data-testid="richTextElement" id="comp-jybh0pm7"><h1 class="font_0" data-dcnode-id="1966" style="font-size:37px; text-align:center;"><span class="color_15" data-dcnode-id="1967"><span data-dcnode-id="1968" style="font-size:37px;"><span data-dcnode-id="1969" instrument_node="">ACCLIMATISATION</span></span></span></h1></div><div class="_2UdPt" data-dcnode-id="1964" id="comp-jybh0ppo"></div><div class="_1Q9if" data-dcnode-id="1958" data-testid="richTextElement" id="comp-jybh5gok"><p class="font_7" data-dcnode-id="1959" style="font-size:16px; text-align:center;"><span data-dcnode-id="1960" style="font-size:16px;"><span data-dcnode-id="1961" style="font-style:italic;"><span class="color_15" data-dcnode-id="1962"><span data-dcnode-id="1963" instrument_node="">Acclimatisation to altitude involves breathing faster &amp; more deeply, and the heart pumping more blood to the brain &amp; muscles</span></span></span></span></p></div></div></div></div></div></section><section class="_3d64y" data-dcnode-id="1888" id="comp-jybh6isd"><div class="_3wnIc" data-dcnode-id="1950" data-hook="bgLayers" id="bgLayers_comp-jybh6isd"><div class="_3KzuS _3SQN-" data-dcnode-id="1952" data-testid="colorUnderlay"></div><div class="_2GUhU" data-dcnode-id="1951" id="bgMedia_comp-jybh6isd"></div></div><div class="_1uldx" data-dcnode-id="1889" data-testid="columns"><div class="_1vNJf" data-dcnode-id="1940" id="comp-jybh6j14"><div class="_3wnIc" data-dcnode-id="1947" data-hook="bgLayers" id="bgLayers_comp-jybh6j14"><div class="_3KzuS _3SQN-" data-dcnode-id="1949" data-testid="colorUnderlay"></div><div class="_2GUhU" data-dcnode-id="1948" id="bgMedia_comp-jybh6j14"></div></div><div class="" data-dcnode-id="1941" data-mesh-id="comp-jybh6j14inlineContent" data-testid="inline-content"><div data-dcnode-id="1942" data-mesh-id="comp-jybh6j14inlineContent-gridContainer" data-testid="mesh-container-content"><div class="XUUsC _2S73V" data-dcnode-id="1943" id="comp-jybi7s8h" title="Huayna Pototsi (6088m), Bolivia "><a class="xQ_iF" data-dcnode-id="1944" data-testid="linkElement" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.altitude.org/" target="_self"><wix-image class="_1-6YJ _1Fe8-" data-bg-effect-name="" data-dcnode-id="1945" data-has-ssr-src="" data-image-info="{&quot;containerId&quot;:&quot;comp-jybi7s8h&quot;,&quot;displayMode&quot;:&quot;fill&quot;,&quot;imageData&quot;:{&quot;width&quot;:240,&quot;height&quot;:312,&quot;uri&quot;:&quot;5d01b5_42c0922d272845a6bbd5163ed3025244~mv2.jpg&quot;,&quot;name&quot;:&quot;huayna_potosi 6088m bolivia.jpg&quot;,&quot;displayMode&quot;:&quot;fill&quot;}}" data-image-zoomed="" data-src="https://static.wixstatic.com/media/5d01b5_42c0922d272845a6bbd5163ed3025244~mv2.jpg/v1/fill/w_275,h_359,al_c,lg_1,q_80,enc_auto/huayna_potosi%206088m%20bolivia.jpg" id="img_comp-jybi7s8h"><img alt="Altitude acclimatistion " data-dcnode-id="1946" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//static.wixstatic.com/media/5d01b5_42c0922d272845a6bbd5163ed3025244~mv2.jpg/v1/fill/w_275%2Ch_358%2Cal_c%2Clg_1%2Cq_80%2Cenc_auto/huayna_potosi%25206088m%2520bolivia.jpg&amp;raw" style="width:275px;height:359px;object-fit:cover;object-position:50% 50%"></wix-image></a></div></div></div></div><div class="_1vNJf" data-dcnode-id="1890" id="comp-jybh6j7o"><div class="_3wnIc" data-dcnode-id="1937" data-hook="bgLayers" id="bgLayers_comp-jybh6j7o"><div class="_3KzuS _3SQN-" data-dcnode-id="1939" data-testid="colorUnderlay"></div><div class="_2GUhU" data-dcnode-id="1938" id="bgMedia_comp-jybh6j7o"></div></div><div class="" data-dcnode-id="1891" data-mesh-id="comp-jybh6j7oinlineContent" data-testid="inline-content"><div data-dcnode-id="1892" data-mesh-id="comp-jybh6j7oinlineContent-gridContainer" data-testid="mesh-container-content"><div class="_1Q9if" data-dcnode-id="1893" data-testid="richTextElement" id="comp-jybh6j3a"><p class="font_8" data-dcnode-id="1934" style="font-size:14px;"><span class="color_15" data-dcnode-id="1935"><span data-dcnode-id="1936" instrument_node="">If you go to high altitude quickly, your body has to adapt to the thinner air and the lack of oxygen. Two important things happen almost immediately:</span></span></p><span data-dcnode-id="1933" instrument_node="">
</span><p class="font_8" data-dcnode-id="1930" style="font-size:14px;"><span class="color_15" data-dcnode-id="1931"><span data-dcnode-id="1932" instrument_node="">you breathe faster and more deeply to maximise the amount of oxygen that can get into the blood from the lungs, and your heart pumps more blood to increase the supply of oxygen to your brain and muscles.</span></span></p><span data-dcnode-id="1929" instrument_node="">
</span><p class="font_8" data-dcnode-id="1926" style="font-size:14px;"><span class="wixGuard" data-dcnode-id="1927"><span data-dcnode-id="1928" instrument_node="">​</span></span></p><span data-dcnode-id="1925" instrument_node="">
</span><p class="font_8" data-dcnode-id="1918" style="font-size:14px;"><span class="color_15" data-dcnode-id="1919"><span data-dcnode-id="1924" instrument_node="">You can demonstrate how important breathing harder is by using our </span><span data-dcnode-id="1921" style="text-decoration:underline;"><a data-dcnode-id="1922" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//baillielab.net/critical_care/physiology/" target="_blank"><span data-dcnode-id="1923" instrument_node="">high altitude oxygen calculator</span></a></span><span data-dcnode-id="1920" instrument_node="">. Some people include breathlessness during exercise as a component of altitude sickness, but this is misleading. Breathing harder is a normal response to the shortage of oxygen, but it does have other effects on the body: click to learn more about breathing at altitude.</span></span></p><span data-dcnode-id="1917" instrument_node="">
</span><p class="font_8" data-dcnode-id="1914" style="font-size:14px;"><span class="wixGuard" data-dcnode-id="1915"><span data-dcnode-id="1916" instrument_node="">​</span></span></p><span data-dcnode-id="1913" instrument_node="">
</span><p class="font_8" data-dcnode-id="1903" style="font-size:14px;"><span class="color_15" data-dcnode-id="1904"><span data-dcnode-id="1912" instrument_node="">The sensation of breathlessness usually indicates that the lungs are having difficulty in supplying the body’s demand for oxygen. Therefore, if a climber is walking too fast for his lungs to keep up, he feels breathless and slows down. However, breathlessness at rest indicates that the lungs are having difficulty in supplying even the small amount of oxygen that the body needs when it is resting. This is an ominous sign at high altitude and may indicate the development of&nbsp;</span><span data-dcnode-id="1909" style="text-decoration:underline;"><a data-anchor="dataItem-jy25k62u" data-dcnode-id="1910" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.altitude.org/altitude-sickness" target="_self"><span data-dcnode-id="1911" instrument_node="">high altitude pulmonary oedema (HAPE)</span></a></span><span data-dcnode-id="1908" instrument_node="">. Any climber who is breathless at rest at high altitude should descend to a safer altitude as soon as possible. If you have had HAPE, please register with the online&nbsp;</span><span data-dcnode-id="1905" style="text-decoration:underline;"><a data-dcnode-id="1906" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.altitude.org/hape-database" target="_self"><span data-dcnode-id="1907" instrument_node="">HAPE database.</span></a></span></span></p><span data-dcnode-id="1902" instrument_node="">
</span><p class="font_8" data-dcnode-id="1900" style="text-align:right; font-size:14px;"><span data-dcnode-id="1901" instrument_node="">&nbsp;</span></p><span data-dcnode-id="1899" instrument_node="">
</span><p class="font_8" data-dcnode-id="1894" style="text-align:right; font-size:14px;"><a data-anchor="dataItem-jylktavc" data-dcnode-id="1895" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.altitude.org/authors" target="_self"><span class="color_15" data-dcnode-id="1896"><span data-dcnode-id="1897" style="text-decoration:underline;"><span data-dcnode-id="1898" instrument_node="">by&nbsp;Kenneth Baillie</span></span></span></a></p></div></div></div></div></div></section><div aria-label="Acclimatisation" class="qhwIj ignore-focus" data-dcnode-id="1886" id="comp-jybrcmf1" role="region" tabindex="-1"><span data-dcnode-id="1887" instrument_node="">&nbsp;</span></div><section class="_3d64y" data-dcnode-id="1699" id="comp-jybhqpee"><div class="_3wnIc" data-dcnode-id="1883" data-hook="bgLayers" id="bgLayers_comp-jybhqpee"><div class="_3KzuS _3SQN-" data-dcnode-id="1885" data-testid="colorUnderlay"></div><div class="_2GUhU" data-dcnode-id="1884" id="bgMedia_comp-jybhqpee"></div></div><div class="_1uldx" data-dcnode-id="1700" data-testid="columns"><div class="_1vNJf" data-dcnode-id="1701" id="comp-jybhqpm3"><div class="_3wnIc" data-dcnode-id="1880" data-hook="bgLayers" id="bgLayers_comp-jybhqpm3"><div class="_3KzuS _3SQN-" data-dcnode-id="1882" data-testid="colorUnderlay"></div><div class="_2GUhU" data-dcnode-id="1881" id="bgMedia_comp-jybhqpm3"></div></div><div class="" data-dcnode-id="1702" data-mesh-id="comp-jybhqpm3inlineContent" data-testid="inline-content"><div data-dcnode-id="1703" data-mesh-id="comp-jybhqpm3inlineContent-gridContainer" data-testid="mesh-container-content"><div class="_1Q9if" data-dcnode-id="1875" data-testid="richTextElement" id="comp-jybhuja3"><h1 class="font_0" data-dcnode-id="1876" style="font-size:37px; text-align:center;"><span class="color_15" data-dcnode-id="1877"><span data-dcnode-id="1878" style="font-size:37px;"><span data-dcnode-id="1879" instrument_node="">BREATHING&nbsp;AT&nbsp;HIGH&nbsp;ALTITUDE</span></span></span></h1></div><div class="_2UdPt" data-dcnode-id="1874" id="comp-jybhujdr"></div><div class="_1Q9if" data-dcnode-id="1826" data-testid="richTextElement" id="comp-jybhx8ol"><p class="font_8" data-dcnode-id="1867" style="font-size:14px;"><span class="color_14" data-dcnode-id="1868"><span data-dcnode-id="1873" instrument_node="">Everyone breathes faster and deeper (hyperventilates) at high altitude – it is necessary to do this in order to survive. The function of the lungs is to expose blood to fresh air, and breathing faster essentially increases the flow of fresh air past the blood. This means that whenever an oxygen molecule is taken away by the blood, it is quickly replaced by a fresh one. This means that there is always more oxygen available to be taken up into the blood. (</span><span data-dcnode-id="1870" style="text-decoration:underline;"><a data-anchor="dataItem-jybzgblp" data-anchor-comp-id="comp-jybzgbhv" data-dcnode-id="1871" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.altitude.org/high-altitude" target="_self"><span data-dcnode-id="1872" instrument_node="">Click to read more about the carriage of oxygen in the blood</span></a></span><span data-dcnode-id="1869" instrument_node="">.)</span></span></p><span data-dcnode-id="1866" instrument_node="">
</span><p class="font_8" data-dcnode-id="1863" style="font-size:14px;"><span class="wixGuard" data-dcnode-id="1864"><span data-dcnode-id="1865" instrument_node="">​</span></span></p><span data-dcnode-id="1862" instrument_node="">
</span><p class="font_8" data-dcnode-id="1855" style="font-size:14px;"><span class="color_14" data-dcnode-id="1856"><span data-dcnode-id="1861" instrument_node="">Carbon dioxide (CO2) is constantly produced by the body and the lungs remove it by allowing it to diffuse into the fresh air in the lungs. Increasing the flow of fresh air through the lungs, by hyperventilating, increases the rate at which CO2 is lost. This happens for the same reason that wet laundry dries faster in a strong wind: the wind blows away the water vapour, so there is space for more water to evaporate. You can see how hyperventilating changes the level of carbon dioxide in the blood using the </span><span data-dcnode-id="1858" style="text-decoration:underline;"><a data-dcnode-id="1859" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//baillielab.net/critical_care/physiology/" target="_blank"><span data-dcnode-id="1860" instrument_node="">altitude oxygen calculator</span></a></span><span data-dcnode-id="1857" instrument_node="">. Simply increase the number of breaths taken per minute, and watch what happens to the CO2.</span></span></p><span data-dcnode-id="1854" instrument_node="">
</span><p class="font_8" data-dcnode-id="1851" style="font-size:14px;"><span class="wixGuard" data-dcnode-id="1852"><span data-dcnode-id="1853" instrument_node="">​</span></span></p><span data-dcnode-id="1850" instrument_node="">
</span><p class="font_8" data-dcnode-id="1840" style="font-size:14px;"><span class="color_14" data-dcnode-id="1841"><span data-dcnode-id="1849" instrument_node="">Because CO2 is an acid gas, losing more of it from the blood leaves the blood relatively alkaline. At altitudes up to about 6000m, the kidneys correct the alkalinity of the blood over a few days by removing alkali (in the form of&nbsp;</span><a data-dcnode-id="1847" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.altitude.org/glossary.php%23hco3" target="_blank"><span data-dcnode-id="1848" instrument_node="">bicarbonate ions, HCO3-</span></a><span data-dcnode-id="1846" instrument_node="">) from the blood. Our&nbsp;</span><span data-dcnode-id="1843" style="text-decoration:underline;"><a data-dcnode-id="1844" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//baillielab.net/critical_care/hb/" target="_blank"><span data-dcnode-id="1845" instrument_node="">oxygen calculator</span></a></span><span data-dcnode-id="1842" instrument_node="">&nbsp;will allow you to remove bicarbonate ions; watch the effect on the alkalinity of the blood.</span></span></p><span data-dcnode-id="1839" instrument_node="">
</span><p class="font_8" data-dcnode-id="1836" style="font-size:14px;"><span class="wixGuard" data-dcnode-id="1837"><span data-dcnode-id="1838" instrument_node="">​</span></span></p><span data-dcnode-id="1835" instrument_node="">
</span><p class="font_7" data-dcnode-id="1827" style="font-size:14px;"><span class="color_14" data-dcnode-id="1828"><span data-dcnode-id="1829" style="font-size:14px;"><span data-dcnode-id="1834" instrument_node="">These processes have important effects on the binding of oxygen to haemoglobin in the blood. You can read more about this in our&nbsp;</span><span data-dcnode-id="1830" style="text-decoration:underline;"><a data-anchor="dataItem-jybzgblp" data-anchor-comp-id="comp-jybzgbhv" data-dcnode-id="1832" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.altitude.org/high-altitude" target="_self"><span data-dcnode-id="1833" instrument_node="">tutorial on oxygen transport</span></a><span data-dcnode-id="1831" instrument_node="">.</span></span></span></span></p></div><div class="XUUsC" data-dcnode-id="1822" id="comp-jybioaf2" title="Breathing at high altitude"><div class="xQ_iF" data-dcnode-id="1823" data-testid="linkElement"><wix-image class="_1-6YJ _1Fe8-" data-bg-effect-name="" data-dcnode-id="1824" data-has-ssr-src="" data-image-info="{&quot;containerId&quot;:&quot;comp-jybioaf2&quot;,&quot;displayMode&quot;:&quot;fill&quot;,&quot;imageData&quot;:{&quot;width&quot;:200,&quot;height&quot;:300,&quot;uri&quot;:&quot;5d01b5_5a40c6624e364f94bcf6bc515882eaf2~mv2.gif&quot;,&quot;displayMode&quot;:&quot;fill&quot;}}" data-image-zoomed="" data-src="https://static.wixstatic.com/media/5d01b5_5a40c6624e364f94bcf6bc515882eaf2~mv2.gif" id="img_comp-jybioaf2"><img alt="Acclimatsation to altitude" data-dcnode-id="1825" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//static.wixstatic.com/media/5d01b5_5a40c6624e364f94bcf6bc515882eaf2~mv2.gif&amp;raw" style="width:200px;height:300px;object-fit:cover;object-position:50% 50%"></wix-image></div></div><div class="XUUsC" data-dcnode-id="1818" id="comp-jybiyflp" title="Breathing at altitude.gif"><div class="xQ_iF" data-dcnode-id="1819" data-testid="linkElement"><wix-image class="_1-6YJ _1Fe8-" data-bg-effect-name="" data-dcnode-id="1820" data-has-ssr-src="" data-image-info="{&quot;containerId&quot;:&quot;comp-jybiyflp&quot;,&quot;displayMode&quot;:&quot;fill&quot;,&quot;imageData&quot;:{&quot;width&quot;:546,&quot;height&quot;:377,&quot;uri&quot;:&quot;5d01b5_132cd0e0ab9c489ca58ebb16c8919867~mv2.gif&quot;,&quot;displayMode&quot;:&quot;fill&quot;}}" data-image-zoomed="" data-src="https://static.wixstatic.com/media/5d01b5_132cd0e0ab9c489ca58ebb16c8919867~mv2.gif" id="img_comp-jybiyflp"><img alt="" data-dcnode-id="1821" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//static.wixstatic.com/media/5d01b5_132cd0e0ab9c489ca58ebb16c8919867~mv2.gif&amp;raw" style="width:498px;height:341px;object-fit:cover;object-position:50% 50%"></wix-image></div></div><div class="_1Q9if" data-dcnode-id="1704" data-testid="richTextElement" id="comp-jybisuw6"><h5 class="font_5" data-dcnode-id="1814" style="font-size:22px;"><span data-dcnode-id="1815" style="font-size:22px;"><span class="color_15" data-dcnode-id="1816"><span data-dcnode-id="1817" instrument_node="">Shunt</span></span></span></h5><span data-dcnode-id="1813" instrument_node="">
</span><p class="font_7" data-dcnode-id="1806" style="font-size:14px;"><span data-dcnode-id="1807" style="font-size:14px;"><span class="color_14" data-dcnode-id="1808"><span data-dcnode-id="1812" instrument_node="">The diagrams on this page show what happens if there is a blockage to an air space in the lungs. The simplest example is a peanut stuck in one of the air passages in the lungs, but the same process happens in pneumonia, or&nbsp;</span><a data-dcnode-id="1810" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.altitude.org/altitude_sickness.php%23HAPE" target="_blank"><span data-dcnode-id="1811" instrument_node="">pulmonary edema</span></a><span data-dcnode-id="1809" instrument_node="">. Blood still flows past the air spaces, but because there is no fresh air getting to the blood, it can’t take up any more oxygen. That means that a lot of de-oxygenated blood makes its way straight past the lungs. When it mixes with the blood from all the other parts of the lungs, the total amount of oxygen is less. This causes hypoxia – a shortage of oxygen getting to where it is needed.</span></span></span></p><span data-dcnode-id="1805" instrument_node="">
</span><p class="font_7" data-dcnode-id="1801" style="font-size:14px;"><span data-dcnode-id="1802" style="font-size:14px;"><span class="wixGuard" data-dcnode-id="1803"><span data-dcnode-id="1804" instrument_node="">​</span></span></span></p><span data-dcnode-id="1800" instrument_node="">
</span><h5 class="font_5" data-dcnode-id="1796" style="font-size:22px;"><span data-dcnode-id="1797" style="font-size:22px;"><span class="color_15" data-dcnode-id="1798"><span data-dcnode-id="1799" instrument_node="">Physiological Shunt</span></span></span></h5><span data-dcnode-id="1795" instrument_node="">
</span><p class="font_7" data-dcnode-id="1792" style="font-size:14px;"><span data-dcnode-id="1793" style="font-size:14px;"><span data-dcnode-id="1794" instrument_node="">Even in completely healthy people, there is always some blood that makes its way past the lungs without encountering any fresh air. This blood passes through the bronchial circulation, and the thebesian veins in the heart. This is called physiological shunt. You can calculate the effect of different amounts of shunt by downloading our oxygen delivery model in microsoft excel (but beware – this is a very large file).</span></span></p><span data-dcnode-id="1791" instrument_node="">
</span><p class="font_7" data-dcnode-id="1787" style="font-size:14px;"><span data-dcnode-id="1788" style="font-size:14px;"><span class="wixGuard" data-dcnode-id="1789"><span data-dcnode-id="1790" instrument_node="">​</span></span></span></p><span data-dcnode-id="1786" instrument_node="">
</span><h5 class="font_5" data-dcnode-id="1782" style="font-size:22px;"><span class="color_15" data-dcnode-id="1783"><span data-dcnode-id="1784" style="font-size:22px;"><span data-dcnode-id="1785" instrument_node="">How do the lungs cope with shunt?</span></span></span></h5><span data-dcnode-id="1781" instrument_node="">
</span><p class="font_8" data-dcnode-id="1778" style="font-size:14px;"><span class="color_14" data-dcnode-id="1779"><span data-dcnode-id="1780" instrument_node="">We have evolved a clever mechanism to reduce the effect of shunt. When the blood passing through an area of lung isn’t picking up enough oxygen, the blood vessels carrying that blood tighten, so that less deoxygenated blood can get through the lungs. This is called hypoxic pulmonary vasoconstriction. The diagram to the right shows how this means that less deoxygenated blood gets through, so there is more oxygen in the mixture of blood leaving the lungs.</span></span></p><span data-dcnode-id="1777" instrument_node="">
</span><p class="font_8" data-dcnode-id="1774" style="font-size:14px;"><span class="wixGuard" data-dcnode-id="1775"><span data-dcnode-id="1776" instrument_node="">​</span></span></p><span data-dcnode-id="1773" instrument_node="">
</span><p class="font_8" data-dcnode-id="1765" style="font-size:14px;"><span class="color_14" data-dcnode-id="1767"><span data-dcnode-id="1772" instrument_node="">At high altitude, there is less oxygen in the air that you breathe. (</span><span data-dcnode-id="1769" style="text-decoration:underline;"><a data-anchor="dataItem-jybr6rdn" data-anchor-comp-id="comp-jybr6rbf" data-dcnode-id="1770" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.altitude.org/high-altitude" target="_self"><span data-dcnode-id="1771" instrument_node="">Click for an explanation of why there is less oxygen at high altitude.</span></a></span><span data-dcnode-id="1768" instrument_node="">) This means that all of the blood from all areas of the lungs, is relatively short on oxygen or hypoxic</span></span><span data-dcnode-id="1766" instrument_node="">.</span></p><span data-dcnode-id="1764" instrument_node="">
</span><p class="font_8" data-dcnode-id="1761" style="font-size:14px;"><span class="wixGuard" data-dcnode-id="1762"><span data-dcnode-id="1763" instrument_node="">​</span></span></p><span data-dcnode-id="1760" instrument_node="">
</span><h5 class="font_5" data-dcnode-id="1756" style="font-size:22px;"><span class="color_15" data-dcnode-id="1757"><span data-dcnode-id="1758" style="font-size:22px;"><span data-dcnode-id="1759" instrument_node="">Physiological Shunt</span></span></span></h5><span data-dcnode-id="1755" instrument_node="">
</span><p class="font_8" data-dcnode-id="1752" style="font-size:14px;"><span class="color_14" data-dcnode-id="1753"><span data-dcnode-id="1754" instrument_node="">Even in completely healthy people, there is always some blood that makes its way past the lungs without encountering any fresh air. This blood passes through the bronchial circulation, and the thebesian veins in the heart. This is called physiological shunt.&nbsp;</span></span></p><span data-dcnode-id="1751" instrument_node="">
</span><p class="font_8" data-dcnode-id="1748" style="font-size:14px;"><span class="wixGuard" data-dcnode-id="1749"><span data-dcnode-id="1750" instrument_node="">​</span></span></p><span data-dcnode-id="1747" instrument_node="">
</span><h5 class="font_5" data-dcnode-id="1743" style="font-size:22px;"><span class="color_15" data-dcnode-id="1744"><span data-dcnode-id="1745" style="font-size:22px;"><span data-dcnode-id="1746" instrument_node="">How do the lungs cope with shunt?</span></span></span></h5><span data-dcnode-id="1742" instrument_node="">
</span><p class="font_8" data-dcnode-id="1739" style="font-size:14px;"><span class="color_14" data-dcnode-id="1740"><span data-dcnode-id="1741" instrument_node="">We have evolved a clever mechanism to reduce the effect of shunt. When the blood passing through an area of lung isn’t picking up enough oxygen, the blood vessels carrying that blood tighten, so that less deoxygenated blood can get through the lungs. This is called hypoxic pulmonary vasoconstriction. The diagram to the right shows how this means that less deoxygenated blood gets through, so there is more oxygen in the mixture of blood leaving the lungs.</span></span></p><span data-dcnode-id="1738" instrument_node="">
</span><p class="font_8" data-dcnode-id="1736" style="font-size:14px;"><span data-dcnode-id="1737" instrument_node="">&nbsp;</span></p><span data-dcnode-id="1735" instrument_node="">
</span><p class="font_8" data-dcnode-id="1732" style="font-size:14px;"><span class="color_14" data-dcnode-id="1733"><span data-dcnode-id="1734" instrument_node="">At high altitude, there is less oxygen in the air that you breathe. This means that all of the blood from all areas of the lungs, is relatively short on oxygen or hypoxic.</span></span></p><span data-dcnode-id="1731" instrument_node="">
</span><p class="font_8" data-dcnode-id="1728" style="font-size:14px;"><span class="wixGuard" data-dcnode-id="1729"><span data-dcnode-id="1730" instrument_node="">​</span></span></p><span data-dcnode-id="1727" instrument_node="">
</span><p class="font_8" data-dcnode-id="1724" style="font-size:14px;"><span class="color_14" data-dcnode-id="1725"><span data-dcnode-id="1726" instrument_node="">Unfortunately, the lungs still respond to the shortage of oxygen in the same way: by tightening the blood vessels. But because all areas of the lung are lacking in oxygen, all of the blood vessels in the lungs constrict.</span></span></p><span data-dcnode-id="1723" instrument_node="">
</span><p class="font_8" data-dcnode-id="1720" style="font-size:14px;"><span class="wixGuard" data-dcnode-id="1721"><span data-dcnode-id="1722" instrument_node="">​</span></span></p><span data-dcnode-id="1719" instrument_node="">
</span><p class="font_8" data-dcnode-id="1712" style="font-size:14px;"><span class="color_14" data-dcnode-id="1713"><span data-dcnode-id="1718" instrument_node="">The heart still pumps the same amount of blood through the lungs, but because all of the blood vessels are tightly constricted, the pressure needed to force blood through them is much greater. In fact the pressures get so high that some of the tiniest blood vessels break open, and this is thought to be part of the cause of&nbsp;</span><span data-dcnode-id="1715" style="text-decoration:underline;"><a data-anchor="dataItem-jy25k62u" data-dcnode-id="1716" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.altitude.org/altitude-sickness" target="_self"><span data-dcnode-id="1717" instrument_node="">HAPE (high altitude pulmonary edema)</span></a></span><span data-dcnode-id="1714" instrument_node="">.</span></span></p><span data-dcnode-id="1711" instrument_node="">
</span><p class="font_8" data-dcnode-id="1705" style="text-align:right; font-size:14px;"><span class="color_14" data-dcnode-id="1706"><span data-dcnode-id="1710" instrument_node="">by&nbsp;</span><span data-dcnode-id="1707" style="text-decoration:underline;"><a data-anchor="dataItem-jylktavc" data-dcnode-id="1708" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.altitude.org/authors" target="_self"><span data-dcnode-id="1709" instrument_node="">Kenneth Baillie</span></a></span></span></p></div></div></div></div></div></section><div aria-label="Breathing at high altitude" class="qhwIj ignore-focus" data-dcnode-id="1697" id="comp-jybrcjw1" role="region" tabindex="-1"><span data-dcnode-id="1698" instrument_node="">&nbsp;</span></div><section class="_3d64y" data-dcnode-id="1643" id="comp-jybiqmub"><div class="_3wnIc" data-dcnode-id="1694" data-hook="bgLayers" id="bgLayers_comp-jybiqmub"><div class="_3KzuS _3SQN-" data-dcnode-id="1696" data-testid="colorUnderlay"></div><div class="_2GUhU" data-dcnode-id="1695" id="bgMedia_comp-jybiqmub"></div></div><div class="_1uldx" data-dcnode-id="1644" data-testid="columns"><div class="_1vNJf" data-dcnode-id="1645" id="comp-jybiqmzz"><div class="_3wnIc" data-dcnode-id="1691" data-hook="bgLayers" id="bgLayers_comp-jybiqmzz"><div class="_3KzuS _3SQN-" data-dcnode-id="1693" data-testid="colorUnderlay"></div><div class="_2GUhU" data-dcnode-id="1692" id="bgMedia_comp-jybiqmzz"></div></div><div class="" data-dcnode-id="1646" data-mesh-id="comp-jybiqmzzinlineContent" data-testid="inline-content"><div data-dcnode-id="1647" data-mesh-id="comp-jybiqmzzinlineContent-gridContainer" data-testid="mesh-container-content"><div class="_1Q9if" data-dcnode-id="1686" data-testid="richTextElement" id="comp-jybir89m"><h1 class="font_0" data-dcnode-id="1687" style="font-size:37px; text-align:center;"><span class="color_15" data-dcnode-id="1688"><span data-dcnode-id="1689" style="font-size:37px;"><span data-dcnode-id="1690" instrument_node="">PARTIAL PRESSURE&nbsp;</span></span></span></h1></div><div class="_2UdPt" data-dcnode-id="1685" id="comp-jybir8em"></div><div class="_1Q9if" data-dcnode-id="1648" data-testid="richTextElement" id="comp-jybj1kjx"><p class="font_8" data-dcnode-id="1683" style="font-size:14px;"><span data-dcnode-id="1684" instrument_node="">Partial pressure is a way of describing how much of a gas is present. All gases exert pressure on the walls of their container. This is because the molecules of gas constantly bounce off the walls. Partial pressure is used to describe a mixture of gases. It is defined as the pressure that any one gas would exert on the walls of the container if it were the only gas present.</span></p><span data-dcnode-id="1682" instrument_node="">
</span><p class="font_8" data-dcnode-id="1679" style="font-size:14px;"><span class="wixGuard" data-dcnode-id="1680"><span data-dcnode-id="1681" instrument_node="">​</span></span></p><span data-dcnode-id="1678" instrument_node="">
</span><p class="font_8" data-dcnode-id="1676" style="font-size:14px;"><span data-dcnode-id="1677" instrument_node="">This is defined more formally under Dalton’s law, which states that the sum of the partial pressures of all of the gases in a mixture will be equal to the total pressure of that mixture.</span></p><span data-dcnode-id="1675" instrument_node="">
</span><p class="font_8" data-dcnode-id="1672" style="font-size:14px;"><span class="wixGuard" data-dcnode-id="1673"><span data-dcnode-id="1674" instrument_node="">​</span></span></p><span data-dcnode-id="1671" instrument_node="">
</span><p class="font_8" data-dcnode-id="1661" style="font-size:14px;"><span data-dcnode-id="1670" instrument_node="">Confusingly, partial pressure is also used to describe dissolved gases, particularly in blood. In this case, the partial pressure of a gas dissolved in blood is the partial pressure that the gas would have, if the blood were allowed to equilibrate with a volume of gas. Why do we use this counter-intuitive system? The main reason is that when blood is exposed to fresh air in the lungs, it equilibrates completely so that the partial pressure of oxygen in the air spaces in the lungs is equal to the partial pressure of oxygen in the blood. This is demonstrated by the&nbsp;</span><span data-dcnode-id="1667" style="text-decoration:underline;"><a data-dcnode-id="1668" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//baillielab.net/critical_care/physiology/" target="_blank"><span data-dcnode-id="1669" instrument_node="">altitude oxygen calculator</span></a></span><span data-dcnode-id="1666" instrument_node="">. You will notice that the partial pressure of oxygen in arterial blood is slightly less than the partial pressure of oxygen in the lungs: this is because there is always a little bit of blood that passes through the lungs without encountering an air space. This is called&nbsp;</span><span data-dcnode-id="1663" style="text-decoration:underline;"><a data-anchor="dataItem-jylm5hft" data-anchor-comp-id="comp-jylm5hao" data-dcnode-id="1664" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.altitude.org/high-altitude" target="_self"><span data-dcnode-id="1665" instrument_node="">physiological shunt</span></a></span><span data-dcnode-id="1662" instrument_node="">.</span></p><span data-dcnode-id="1660" instrument_node="">
</span><p class="font_8" data-dcnode-id="1655" style="text-align:right; font-size:14px;"><span data-dcnode-id="1659" instrument_node="">by&nbsp;</span><span data-dcnode-id="1656" style="text-decoration:underline;"><a data-anchor="dataItem-jylktavc" data-dcnode-id="1657" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.altitude.org/authors" target="_self"><span data-dcnode-id="1658" instrument_node="">Kenneth Baillie</span></a></span></p><span data-dcnode-id="1654" instrument_node="">
</span><p class="font_8" data-dcnode-id="1649" style="font-size:14px;"><span data-dcnode-id="1650" style="text-decoration:underline;"><a data-dcnode-id="1651" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.altitude.org/authors.php" target="_blank"><span class="wixGuard" data-dcnode-id="1652"><span data-dcnode-id="1653" instrument_node="">​</span></span></a></span></p></div></div></div></div></div></section><div aria-label="Partial pressure" class="qhwIj ignore-focus" data-dcnode-id="1641" id="comp-jybrfn5j" role="region" tabindex="-1"><span data-dcnode-id="1642" instrument_node="">&nbsp;</span></div><div aria-label="Shunt" class="qhwIj ignore-focus" data-dcnode-id="1639" id="comp-jylm5hao" role="region" tabindex="-1"><span data-dcnode-id="1640" instrument_node="">&nbsp;</span></div><section class="_3d64y" data-dcnode-id="1541" id="comp-jybywdfn"><div class="_3wnIc" data-dcnode-id="1636" data-hook="bgLayers" id="bgLayers_comp-jybywdfn"><div class="_3KzuS _3SQN-" data-dcnode-id="1638" data-testid="colorUnderlay"></div><div class="_2GUhU" data-dcnode-id="1637" id="bgMedia_comp-jybywdfn"></div></div><div class="_1uldx" data-dcnode-id="1542" data-testid="columns"><div class="_1vNJf" data-dcnode-id="1543" id="comp-jybywdog"><div class="_3wnIc" data-dcnode-id="1633" data-hook="bgLayers" id="bgLayers_comp-jybywdog"><div class="_3KzuS _3SQN-" data-dcnode-id="1635" data-testid="colorUnderlay"></div><div class="_2GUhU" data-dcnode-id="1634" id="bgMedia_comp-jybywdog"></div></div><div class="" data-dcnode-id="1544" data-mesh-id="comp-jybywdoginlineContent" data-testid="inline-content"><div data-dcnode-id="1545" data-mesh-id="comp-jybywdoginlineContent-gridContainer" data-testid="mesh-container-content"><div class="_1Q9if" data-dcnode-id="1625" data-testid="richTextElement" id="comp-jybz7vsi"><h1 class="font_0" data-dcnode-id="1626" style="text-align:center; font-size:22px;"><span class="color_15" data-dcnode-id="1630"><span data-dcnode-id="1631" style="font-size:37px;"><span data-dcnode-id="1632" instrument_node="">OXYGEN CARRIAGE&nbsp;</span></span></span><span class="color_15" data-dcnode-id="1627"><span data-dcnode-id="1628" style="font-size:37px;"><span data-dcnode-id="1629" instrument_node="">IN THE BLOOD&nbsp;</span></span></span></h1></div><div class="_2UdPt" data-dcnode-id="1624" id="comp-jybz7vu1"></div><div class="_1Q9if" data-dcnode-id="1618" data-testid="richTextElement" id="comp-jybzjgs4"><p class="font_7" data-dcnode-id="1619" style="font-size:16px; text-align:center;"><span data-dcnode-id="1620" style="font-size:16px;"><span data-dcnode-id="1621" style="font-style:italic;"><span class="color_15" data-dcnode-id="1622"><span data-dcnode-id="1623" instrument_node="">Haemoglobin carries oxygen in the blood.</span></span></span></span></p></div><div class="_1Q9if" data-dcnode-id="1602" data-testid="richTextElement" id="comp-jybzpkxg"><p class="font_7" data-dcnode-id="1614" style="font-size:14px;"><span class="color_14" data-dcnode-id="1615"><span data-dcnode-id="1616" style="font-size:14px;"><span data-dcnode-id="1617" instrument_node="">Oxygen in inhaled air diffuses into the blood in the lungs. Blood has a massive capacity to dissolve oxygen – much more oxygen can dissolve in blood than could dissolve in the same amount of water. This is because blood contains haemoglobin – a specialised protein that binds to oxygen in the lungs so that the oxygen can be transported to the rest of the body.</span></span></span></p><span data-dcnode-id="1613" instrument_node="">
</span><p class="font_7" data-dcnode-id="1608" style="font-size:14px;"><span class="color_14" data-dcnode-id="1609"><span data-dcnode-id="1610" style="font-size:14px;"><span class="wixGuard" data-dcnode-id="1611"><span data-dcnode-id="1612" instrument_node="">​</span></span></span></span></p><span data-dcnode-id="1607" instrument_node="">
</span><p class="font_7" data-dcnode-id="1603" style="font-size:14px;"><span class="color_14" data-dcnode-id="1604"><span data-dcnode-id="1605" style="font-size:14px;"><span data-dcnode-id="1606" instrument_node="">The amount of haemoglobin in blood increases at high altitude. This is one of the best-known features of acclimatisation (acclimation) to high altitude. Increasing the amount of haemoglobin in the blood increases the amount of oxygen that can be carried. However, there is a downside: when there is too much haemoglobin, blood becomes sticky and viscous and it is harder for the heart to pump the blood around the body. This happens in chronic mountain sickness.</span></span></span></p></div><div class="XUUsC" data-dcnode-id="1598" id="comp-jybzo3au" title="Red blood cell.jpg"><div class="xQ_iF" data-dcnode-id="1599" data-testid="linkElement"><wix-image class="_1-6YJ _1Fe8-" data-bg-effect-name="" data-dcnode-id="1600" data-has-ssr-src="" data-image-info="{&quot;containerId&quot;:&quot;comp-jybzo3au&quot;,&quot;displayMode&quot;:&quot;fill&quot;,&quot;imageData&quot;:{&quot;width&quot;:240,&quot;height&quot;:261,&quot;uri&quot;:&quot;5d01b5_c2a696eded7e41508317d6a083020f4f~mv2.jpg&quot;,&quot;displayMode&quot;:&quot;fill&quot;}}" data-image-zoomed="" data-src="https://static.wixstatic.com/media/5d01b5_c2a696eded7e41508317d6a083020f4f~mv2.jpg/v1/fill/w_149,h_158,al_c,q_80,usm_0.66_1.00_0.01,enc_auto/5d01b5_c2a696eded7e41508317d6a083020f4f~mv2.jpg" id="img_comp-jybzo3au"><img alt="A red blood cell, carrier of haemoglobin in the blood" data-dcnode-id="1601" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//static.wixstatic.com/media/5d01b5_c2a696eded7e41508317d6a083020f4f~mv2.jpg/v1/fill/w_145%2Ch_158%2Cal_c%2Cq_80%2Cusm_0.66_1.00_0.01%2Cenc_auto/5d01b5_c2a696eded7e41508317d6a083020f4f~mv2.jpg&amp;raw" style="width:149px;height:158px;object-fit:cover;object-position:50% 50%"></wix-image></div></div><div class="XUUsC" data-dcnode-id="1594" id="comp-jybzz8n2" title="patial pressure.jpg"><div class="xQ_iF" data-dcnode-id="1595" data-testid="linkElement"><wix-image class="_1-6YJ _1Fe8-" data-bg-effect-name="" data-dcnode-id="1596" data-has-ssr-src="" data-image-info="{&quot;containerId&quot;:&quot;comp-jybzz8n2&quot;,&quot;displayMode&quot;:&quot;fill&quot;,&quot;imageData&quot;:{&quot;width&quot;:280,&quot;height&quot;:401,&quot;uri&quot;:&quot;5d01b5_650b383ef1c04a119964c0d9f37f280e~mv2.jpg&quot;,&quot;displayMode&quot;:&quot;fill&quot;}}" data-image-zoomed="" data-src="https://static.wixstatic.com/media/5d01b5_650b383ef1c04a119964c0d9f37f280e~mv2.jpg/v1/fill/w_260,h_370,al_c,q_80,usm_0.66_1.00_0.01,enc_auto/5d01b5_650b383ef1c04a119964c0d9f37f280e~mv2.jpg" id="img_comp-jybzz8n2"><img alt="" data-dcnode-id="1597" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//static.wixstatic.com/media/5d01b5_650b383ef1c04a119964c0d9f37f280e~mv2.jpg/v1/fill/w_258%2Ch_370%2Cal_c%2Cq_80%2Cusm_0.66_1.00_0.01%2Cenc_auto/5d01b5_650b383ef1c04a119964c0d9f37f280e~mv2.jpg&amp;raw" style="width:260px;height:370px;object-fit:cover;object-position:50% 50%"></wix-image></div></div><div class="_1Q9if" data-dcnode-id="1546" data-testid="richTextElement" id="comp-jybzt9ws"><p class="font_7" data-dcnode-id="1590" style="font-size:14px;"><span class="color_14" data-dcnode-id="1591"><span data-dcnode-id="1592" style="font-size:14px;"><span data-dcnode-id="1593" instrument_node="">Haemoglobin consists of four subunits joined together. When an oxygen molecule binds to one subunit, the other subunits become more likely to bind oxygen. This feature of haemoglobin gives the haemoglobin saturation curve (the graph opposite) its characteristic S shape. Interestingly, the curve shifts a little in some conditions, such as on ascent to high altitude. This is important because a shift to the right indicates that oxygen is bound less tightly, so that less is taken up in the lungs, but it is more easily released in the tissues.</span></span></span></p><span data-dcnode-id="1589" instrument_node="">
</span><p class="font_7" data-dcnode-id="1584" style="font-size:14px;"><span class="color_14" data-dcnode-id="1585"><span data-dcnode-id="1586" style="font-size:14px;"><span class="wixGuard" data-dcnode-id="1587"><span data-dcnode-id="1588" instrument_node="">​</span></span></span></span></p><span data-dcnode-id="1583" instrument_node="">
</span><p class="font_7" data-dcnode-id="1579" style="font-size:14px;"><span class="color_14" data-dcnode-id="1580"><span data-dcnode-id="1581" style="font-size:14px;"><span data-dcnode-id="1582" instrument_node="">The following physiological variables decrease the affinity of haemoglobin for oxygen, so they cause the curve to shift to the right: H+, temperature, CO2, and a substance called 2,3 DPG. A decrease in any of these variables has the opposite effect - the curve shifts to the left.</span></span></span></p><span data-dcnode-id="1578" instrument_node="">
</span><p class="font_7" data-dcnode-id="1573" style="font-size:14px;"><span class="color_14" data-dcnode-id="1574"><span data-dcnode-id="1575" style="font-size:14px;"><span class="wixGuard" data-dcnode-id="1576"><span data-dcnode-id="1577" instrument_node="">​</span></span></span></span></p><span data-dcnode-id="1572" instrument_node="">
</span><p class="font_7" data-dcnode-id="1568" style="font-size:14px;"><span class="color_14" data-dcnode-id="1569"><span data-dcnode-id="1570" style="font-size:14px;"><span data-dcnode-id="1571" instrument_node="">For example, in the graph opposite, the green line shows a normal curve. The blue line shows the curve for a patient with very acidic blood (H+=80nM, pH 7.1). In contrast, the red line shows a patient who is hypothermic, with a body temperature of only 30ºC.</span></span></span></p><span data-dcnode-id="1567" instrument_node="">
</span><p class="font_7" data-dcnode-id="1562" style="font-size:14px;"><span class="color_14" data-dcnode-id="1563"><span data-dcnode-id="1564" style="font-size:14px;"><span class="wixGuard" data-dcnode-id="1565"><span data-dcnode-id="1566" instrument_node="">​</span></span></span></span></p><span data-dcnode-id="1561" instrument_node="">
</span><p class="font_7" data-dcnode-id="1554" style="font-size:14px;"><span class="color_14" data-dcnode-id="1555"><span data-dcnode-id="1556" style="font-size:14px;"><span data-dcnode-id="1560" instrument_node="">When you ascend to high altitude, the curve initially shifts to the right at moderate altitudes, under the influence of 2,3 DPG. At extreme altitude, it shifts to the left because there is much less CO2 in the blood (see acclimatisation to find out why). You can explore these changes in any combination using the&nbsp;</span><a data-dcnode-id="1558" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.altitude.org/hemoglobin_saturation.php" target="_blank"><span data-dcnode-id="1559" instrument_node="">interactive oxygen saturation graph</span></a><span data-dcnode-id="1557" instrument_node="">.</span></span></span></p><span data-dcnode-id="1553" instrument_node="">
