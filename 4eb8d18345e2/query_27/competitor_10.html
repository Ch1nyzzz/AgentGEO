d="4153" data-tab="pane-pcw-references" href="#B9" id="B9R"><span data-dcnode-id="4154" instrument_node="">9</span></a><span data-dcnode-id="4152" instrument_node="">, </span><a class="primary-blue-color tab-link" data-dcnode-id="4150" data-tab="pane-pcw-references" href="#B31" id="B31R"><span data-dcnode-id="4151" instrument_node="">31</span></a><span data-dcnode-id="4149" instrument_node="">, </span><a class="primary-blue-color tab-link" data-dcnode-id="4147" data-tab="pane-pcw-references" href="#B44" id="B44R"><span data-dcnode-id="4148" instrument_node="">44</span></a><span data-dcnode-id="4146" instrument_node="">, </span><a class="primary-blue-color tab-link" data-dcnode-id="4144" data-tab="pane-pcw-references" href="#B51" id="B51R"><span data-dcnode-id="4145" instrument_node="">51</span></a><span data-dcnode-id="4143" instrument_node="">, </span><a class="primary-blue-color tab-link" data-dcnode-id="4141" data-tab="pane-pcw-references" href="#B71" id="B71R"><span data-dcnode-id="4142" instrument_node="">71</span></a><span data-dcnode-id="4140" instrument_node="">).</span></p><p data-dcnode-id="4106"><span data-dcnode-id="4138" instrument_node="">Both high-altitude resident Andean geese and crested ducks displayed a fundamentally different means of maintaining oxygen supply during hypoxia exposure at rest than transiently high-altitude migrating bar-headed geese. All birds maintained metabolic rate throughout hypoxic exposure. Whereas bar-headed geese robustly increased total ventilation, Andean geese and crested ducks did not. Instead, they progressively increased lung oxygen extraction (the percent difference of oxygen between inspired and expired air), achieving maximum levels reaching 90% (</span><a class="primary-blue-color tab-link" data-dcnode-id="4136" data-tab="pane-pcw-references" href="#B33" id="B33R"><span data-dcnode-id="4137" instrument_node="">33</span></a><span data-dcnode-id="4135" instrument_node="">). By contrast, the lung oxygen extraction of bar-headed geese remained ~40% (</span><a class="primary-blue-color tab-link" data-dcnode-id="4133" data-tab="pane-pcw-references" href="#B33" id="B33R"><span data-dcnode-id="4134" instrument_node="">33</span></a><span data-dcnode-id="4132" instrument_node="">). A doubling of cardiac output was a response shared among the groups, but bar-headed geese achieved this increase primarily through increases in heart rate, whereas Andean geese achieved it predominantly through enhanced stroke volume at the most severe levels of hypoxia (&lt;0.07 </span><span class="equationTd inline-formula NLM_disp-formula" data-dcnode-id="4112"><img alt="" data-dcnode-id="4131" data-formula-source="{&quot;type&quot; : &quot;mathjax&quot;}" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//%3A0/doi/full/10.1152&amp;raw"><img alt="" data-dcnode-id="4130" data-formula-source="{&quot;type&quot; : &quot;mathjax&quot;}" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//%3A0/doi/full/10.1152&amp;raw"><math altimg="eq-00009.gif" data-dcnode-id="4113" display="inline" id="m9" overflow="scroll"><mstyle data-dcnode-id="4114" mathvariant="normal"><mrow data-dcnode-id="4115"><mi data-dcnode-id="4128"><span data-dcnode-id="4129" instrument_node="">F</span></mi><msub data-dcnode-id="4116"><mrow data-dcnode-id="4125"><mi data-dcnode-id="4126" mathsize="small"><span data-dcnode-id="4127" instrument_node="">I</span></mi></mrow><mrow data-dcnode-id="4117"><msub data-dcnode-id="4118"><mrow data-dcnode-id="4122"><mi data-dcnode-id="4123" mathsize="small"><span data-dcnode-id="4124" instrument_node="">O</span></mi></mrow><mrow data-dcnode-id="4119"><mn data-dcnode-id="4120"><span data-dcnode-id="4121" instrument_node="">2</span></mn></mrow></msub></mrow></msub></mrow></mstyle></math></span><span class="formulaLabel" data-dcnode-id="4111"></span><span data-dcnode-id="4110" instrument_node="">) (</span><a class="primary-blue-color tab-link" data-dcnode-id="4108" data-tab="pane-pcw-references" href="#B33" id="B33R"><span data-dcnode-id="4109" instrument_node="">33</span></a><span data-dcnode-id="4107" instrument_node="">). Thus bar-headed geese and Andean geese have evolved two considerably different hypoxic ventilatory and cardiovascular responses for maintaining oxygen supply during hypoxia, managing different short-term and long-term physiological trade-offs.</span></p></div><div data-dcnode-id="4074" id="sec1-5"><h2 class="article-section__title section__title" data-dcnode-id="4103" id="_i8"><span data-dcnode-id="4104" instrument_node="">Trade-offs of Different Hypoxic Ventilatory Responses in Birds</span></h2><p data-dcnode-id="4089"><span data-dcnode-id="4102" instrument_node="">The predominant use of either an increase in total ventilation or an enhanced lung oxygen extraction to maintain oxygen supply during hypoxia involves potential physiological benefits and detriments. Increases in breathing frequency or tidal volume offer rapid recruitment and fine-tuning to support metabolic rate, which are beneficial when the environmental conditions change rapidly. Of the two convective components, increasing tidal volume is hypothesized to be the more efficient strategy because it decreases dead space ventilation as a percentage of total ventilation (</span><a class="primary-blue-color tab-link" data-dcnode-id="4100" data-tab="pane-pcw-references" href="#B61" id="B61R"><span data-dcnode-id="4101" instrument_node="">61</span></a><span data-dcnode-id="4099" instrument_node="">). This would be especially beneficial in a hypoxic environment because it would ensure maximal ventilation of oxygen exchange surfaces and increase the proportion of each breath available for gas exchange, thereby potentially enhancing the amount of oxygen that could be exchanged per breath during conditions of decreased oxygen availability. However, depending on pulmonary mechanics, slow deep breathing has been found to be mechanically expensive (</span><a class="primary-blue-color tab-link" data-dcnode-id="4097" data-tab="pane-pcw-references" href="#B79" id="B79R"><span data-dcnode-id="4098" instrument_node="">79</span></a><span data-dcnode-id="4096" instrument_node="">). High-altitude geese may have more compliant respiratory systems to compensate and reduce the elastic work associated with large tidal volumes, but this possibility remains to be investigated. Regardless, the act of breathing incurs mechanical costs (</span><a class="primary-blue-color tab-link" data-dcnode-id="4094" data-tab="pane-pcw-references" href="#B53" id="B53R"><span data-dcnode-id="4095" instrument_node="">53</span></a><span data-dcnode-id="4093" instrument_node="">, </span><a class="primary-blue-color tab-link" data-dcnode-id="4091" data-tab="pane-pcw-references" href="#B79" id="B79R"><span data-dcnode-id="4092" instrument_node="">79</span></a><span data-dcnode-id="4090" instrument_node="">) and the act of increasing total ventilation represents an acute energetic cost independent of the mechanism used to achieve it. However, the strategy of increased lung oxygen extraction employed in Andean geese and crested ducks does not require an increased energetic cost with each breath.</span></p><p data-dcnode-id="4075"><span data-dcnode-id="4088" instrument_node="">The potential factors underlying the increased lung oxygen extraction in these species are many; however, some have been confirmed. Possible contributing factors include any combination of functional (decreased Hb-P</span><sub data-dcnode-id="4086"><span data-dcnode-id="4087" instrument_node="">50</span></sub><span data-dcnode-id="4085" instrument_node="">, increased perfusion of the blood-gas surface, and increased capillary recruitment) and morphological (increased lung capillarity, increased lung surface area, and decreased barrier thickness) enhancements. Maina et al. (</span><a class="primary-blue-color tab-link" data-dcnode-id="4083" data-tab="pane-pcw-references" href="#B39" id="B39R"><span data-dcnode-id="4084" instrument_node="">39</span></a><span data-dcnode-id="4082" instrument_node="">) found that Andean goose lungs are both morphologically (i.e., increased vascularization) and morphometrically (i.e., increased mass-specific respiratory surface area) exceptionally specialized for gas exchange. Andean geese have a mass-specific pulmonary morphometric diffusing capacity that is among the largest recorded for birds. Their infundibulae, structures that are normally avascular in birds, are also well-vascularized (</span><a class="primary-blue-color tab-link" data-dcnode-id="4080" data-tab="pane-pcw-references" href="#B39" id="B39R"><span data-dcnode-id="4081" instrument_node="">39</span></a><span data-dcnode-id="4079" instrument_node="">). The intense vascularization of the Andean goose lungs may increase the pulmonary blood volume, as well as the surface area available for gas exchange (</span><a class="primary-blue-color tab-link" data-dcnode-id="4077" data-tab="pane-pcw-references" href="#B39" id="B39R"><span data-dcnode-id="4078" instrument_node="">39</span></a><span data-dcnode-id="4076" instrument_node="">), potentially permitting increased oxygen extraction under diffusion-limiting conditions. Morphological enhancements are beneficial in that they can last a lifetime, allowing convective ventilation to be kept in reserve and recruited in the short-term during more metabolically demanding activities, such as flight. All the same, the morphological changes incur energetic costs during development and require lifelong maintenance. Such morphological and functional changes would also impact all other exchange processes that occur at the lungs (e.g., evaporative water floss). Thus there are a range of benefits and detriments that are associated with a predominant reliance on either increases in total ventilation or lung oxygen extraction to maintain oxygen supply in hypoxia.</span></p></div><div data-dcnode-id="4013" id="sec1-6"><h2 class="article-section__title section__title" data-dcnode-id="4072" id="_i9"><span data-dcnode-id="4073" instrument_node="">Trade-offs of Different Hypoxic Cardiovascular Responses in Birds</span></h2><p data-dcnode-id="4046"><span data-dcnode-id="4071" instrument_node="">There are potential trade-offs with the predominant use of increases in either heart rate or stroke volume in the maintenance of oxygen delivery during hypoxia. One benefit of relying on heart rate as a primary modulator of cardiac output is its capacity to be rapidly changed by altering sinoatrial node depolarization (chronotropy) (</span><a class="primary-blue-color tab-link" data-dcnode-id="4069" data-tab="pane-pcw-references" href="#B32" id="B32R"><span data-dcnode-id="4070" instrument_node="">32</span></a><span data-dcnode-id="4068" instrument_node="">). However, increases in heart rate also result in proportional increases in myocardial oxygen demand because the myocytes must generate proportional increases in the number of contraction cycles per minute (e.g., 3-fold increases in heart rate result in ~3-fold increases in myocardial oxygen demand because the myocytes must generate triple the amount of contraction cycles per minute) (</span><a class="primary-blue-color tab-link" data-dcnode-id="4066" data-tab="pane-pcw-references" href="#B32" id="B32R"><span data-dcnode-id="4067" instrument_node="">32</span></a><span data-dcnode-id="4065" instrument_node="">). Conversely, increases in ventricular volume (e.g., increases in end-diastolic volume and thus increases in stroke volume) have a relatively small effect on myocardial oxygen consumption due to the small role that volume plays in determining wall stress, which is the primary determiner of myocardial oxygen consumption (</span><a class="primary-blue-color tab-link" data-dcnode-id="4063" data-tab="pane-pcw-references" href="#B32" id="B32R"><span data-dcnode-id="4064" instrument_node="">32</span></a><span data-dcnode-id="4062" instrument_node="">). In addition, increasing heart rate beyond certain frequencies will decrease cardiac filling time (</span><a class="primary-blue-color tab-link" data-dcnode-id="4060" data-tab="pane-pcw-references" href="#B20" id="B20R"><span data-dcnode-id="4061" instrument_node="">20</span></a><span data-dcnode-id="4059" instrument_node="">, </span><a class="primary-blue-color tab-link" data-dcnode-id="4057" data-tab="pane-pcw-references" href="#B32" id="B32R"><span data-dcnode-id="4058" instrument_node="">32</span></a><span data-dcnode-id="4056" instrument_node="">, </span><a class="primary-blue-color tab-link" data-dcnode-id="4054" data-tab="pane-pcw-references" href="#B52" id="B52R"><span data-dcnode-id="4055" instrument_node="">52</span></a><span data-dcnode-id="4053" instrument_node="">). Furthermore, coronary blood flow in mammals occurs primarily during diastole (</span><a class="primary-blue-color tab-link" data-dcnode-id="4051" data-tab="pane-pcw-references" href="#B32" id="B32R"><span data-dcnode-id="4052" instrument_node="">32</span></a><span data-dcnode-id="4050" instrument_node="">). Assuming that this is true in part for birds (</span><a class="primary-blue-color tab-link" data-dcnode-id="4048" data-tab="pane-pcw-references" href="#B66" id="B66R"><span data-dcnode-id="4049" instrument_node="">66</span></a><span data-dcnode-id="4047" instrument_node="">), large increases in heart rate could compromise coronary flow and thus myocardial oxygenation.</span></p><p data-dcnode-id="4014"><span data-dcnode-id="4045" instrument_node="">Alternatively, modulating cardiac output primarily by increasing stroke volume would allow for delivery of more blood (and thus more oxygen) per heartbeat. It would be more energetically efficient and require less myocardial oxygen demand primarily because of the decreased number of contractions required to produce the same cardiac output (</span><a class="primary-blue-color tab-link" data-dcnode-id="4043" data-tab="pane-pcw-references" href="#B32" id="B32R"><span data-dcnode-id="4044" instrument_node="">32</span></a><span data-dcnode-id="4042" instrument_node="">). Moreover, assuming that most coronary blood flow occurs during diastole as it does in mammals (</span><a class="primary-blue-color tab-link" data-dcnode-id="4040" data-tab="pane-pcw-references" href="#B32" id="B32R"><span data-dcnode-id="4041" instrument_node="">32</span></a><span data-dcnode-id="4039" instrument_node="">), relying on increases in stroke volume rather than heart rate to achieve a given cardiac output would theoretically allow greater time for coronary blood flow and myocardial oxygenation to occur (</span><a class="primary-blue-color tab-link" data-dcnode-id="4037" data-tab="pane-pcw-references" href="#B32" id="B32R"><span data-dcnode-id="4038" instrument_node="">32</span></a><span data-dcnode-id="4036" instrument_node="">). This may present a critical advantage when </span><span class="equationTd inline-formula NLM_disp-formula" data-dcnode-id="4017"><img alt="" data-dcnode-id="4035" data-formula-source="{&quot;type&quot; : &quot;mathjax&quot;}" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//%3A0/doi/full/10.1152&amp;raw"><img alt="" data-dcnode-id="4034" data-formula-source="{&quot;type&quot; : &quot;mathjax&quot;}" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//%3A0/doi/full/10.1152&amp;raw"><math altimg="eq-00010.gif" data-dcnode-id="4018" id="m10" overflow="scroll"><mrow data-dcnode-id="4019"><mi data-dcnode-id="4032" mathvariant="normal"><span data-dcnode-id="4033" instrument_node="">P</span></mi><msub data-dcnode-id="4027"><mi data-dcnode-id="4030" mathvariant="normal"><span data-dcnode-id="4031" instrument_node="">a</span></mi><mi data-dcnode-id="4028" mathvariant="normal"><span data-dcnode-id="4029" instrument_node="">O</span></mi></msub><msub data-dcnode-id="4020"><mrow data-dcnode-id="4026"></mrow><mrow data-dcnode-id="4021"><msub data-dcnode-id="4022"><mrow data-dcnode-id="4025"></mrow><mn data-dcnode-id="4023"><span data-dcnode-id="4024" instrument_node="">2</span></mn></msub></mrow></msub></mrow></math></span><span class="formulaLabel" data-dcnode-id="4016"></span><span data-dcnode-id="4015" instrument_node=""> is decreased, such as at high altitude. One major detriment of stroke volume-modulated increases in oxygen supply is that, whereas stroke volume can be altered in some systems by venous return, the ability to increase stroke volume (and the magnitude to which a heart can actually achieve this) is ultimately determined and constrained by ventricular morphology: factors such as ventricular lumen volume, level of trabecularity, and cardiac muscle fiber contractility and compliance. Ultimately, however, achieving levels of cardiac output sufficient to sustain high oxygen-demanding activities in hypoxia such as flight would be most efficiently achieved by a combination of an increase in heart rate and stroke volume, thus providing blood circulation that is both high in frequency and volume.</span></p></div><div data-dcnode-id="3943" id="sec1-7"><h2 class="article-section__title section__title" data-dcnode-id="4011" id="_i10"><span data-dcnode-id="4012" instrument_node="">A Perspective on the Nature of Hypoxia Exposure</span></h2><p data-dcnode-id="4009"><span data-dcnode-id="4010" instrument_node="">Bar-headed geese and Andean geese use two markedly different ventilatory and cardiovascular strategies to maintain oxygen supply during hypoxic exposure. Bar-headed geese rely upon robust increases in convective flow (e.g., increases in total ventilation and increases in cardiac output facilitated by increases in heart rate) that can be rapidly recruited and adjusted to maintain oxygen supply during a transient high metabolic activity, such as high-altitude migration. In contrast, Andean geese make use of an arguably more sustainable strategy long term that is predominantly supported by enhancements to cardiac and lung morphology (e.g., increases in cardiac stroke volume and lung oxygen extraction) to maintain oxygen supply during sustained lifelong high-altitude exposure.</span></p><p data-dcnode-id="4007"><span data-dcnode-id="4008" instrument_node="">Emerging from this area of research is a crucial question: Why have two groups of waterfowl, animals with already incredibly enhanced avian oxygen transport cascades, evolved decidedly different ventilatory and cardiovascular responses to maintain oxygen supply in hypoxia? Two plausible ideas are explored below, but I recognize that others are possible and close this minireview with a section on the parallels with the high-altitude human populations that live in these two remote and physiologically challenging areas.</span></p><p data-dcnode-id="3975"><span data-dcnode-id="4006" instrument_node="">The first potential explanation for the differences observed between the waterfowl species is the result of genetic differences developing over evolutionary time in response to the duration and severity of hypoxia exposure they experience, coupled with differences in metabolic demand. Although both bar-headed geese and Andean geese are born at relatively high altitude, Andean geese remain lifelong at high-altitude (4,000–5,500 m) (</span><a class="primary-blue-color tab-link" data-dcnode-id="4004" data-tab="pane-pcw-references" href="#B23" id="B23R"><span data-dcnode-id="4005" instrument_node="">23</span></a><span data-dcnode-id="4003" instrument_node="">, </span><a class="primary-blue-color tab-link" data-dcnode-id="4001" data-tab="pane-pcw-references" href="#B44" id="B44R"><span data-dcnode-id="4002" instrument_node="">44</span></a><span data-dcnode-id="4000" instrument_node="">), whereas bar-headed geese spend only half of the year at moderate elevations (2,500–4,500 m) straddled by a strenuous but brief high-altitude migration (&gt;4,500 m) (</span><a class="primary-blue-color tab-link" data-dcnode-id="3998" data-tab="pane-pcw-references" href="#B7" id="B7R"><span data-dcnode-id="3999" instrument_node="">7</span></a><span data-dcnode-id="3997" instrument_node="">, </span><a class="primary-blue-color tab-link" data-dcnode-id="3995" data-tab="pane-pcw-references" href="#B27" id="B27R"><span data-dcnode-id="3996" instrument_node="">27</span></a><span data-dcnode-id="3994" instrument_node="">). It is well accepted that the effect of hypoxia exposure on an animal is dependent on the duration of exposure and when it occurs during development (for review, see </span><a class="primary-blue-color tab-link" data-dcnode-id="3992" data-tab="pane-pcw-references" href="#B30" id="B30R"><span data-dcnode-id="3993" instrument_node="">30</span></a><span data-dcnode-id="3991" instrument_node="">, </span><a class="primary-blue-color tab-link" data-dcnode-id="3989" data-tab="pane-pcw-references" href="#B49" id="B49R"><span data-dcnode-id="3990" instrument_node="">49</span></a><span data-dcnode-id="3988" instrument_node="">, </span><a class="primary-blue-color tab-link" data-dcnode-id="3986" data-tab="pane-pcw-references" href="#B54" id="B54R"><span data-dcnode-id="3987" instrument_node="">54</span></a><span data-dcnode-id="3985" instrument_node="">). In addition, although Andean geese routinely fly at similar altitudes at which some bar-headed geese migrate, they are not known to undergo any long-distance migration (</span><a class="primary-blue-color tab-link" data-dcnode-id="3983" data-tab="pane-pcw-references" href="#B23" id="B23R"><span data-dcnode-id="3984" instrument_node="">23</span></a><span data-dcnode-id="3982" instrument_node="">, </span><a class="primary-blue-color tab-link" data-dcnode-id="3980" data-tab="pane-pcw-references" href="#B44" id="B44R"><span data-dcnode-id="3981" instrument_node="">44</span></a><span data-dcnode-id="3979" instrument_node="">). Because of the decreased air density present at high altitudes, generating lift during flight becomes increasingly more difficult (</span><a class="primary-blue-color tab-link" data-dcnode-id="3977" data-tab="pane-pcw-references" href="#B2" id="B2R"><span data-dcnode-id="3978" instrument_node="">2</span></a><span data-dcnode-id="3976" instrument_node="">). Thus the acute metabolic demands of undergoing a biannual high-altitude migration vs. the metabolic demand of mitigating lifelong exposure to altitude may have directed their evolution to yield the different hypoxia responses.</span></p><p data-dcnode-id="3946"><span data-dcnode-id="3974" instrument_node="">A second potential explanation of the differences present between these groups is that high-altitude exposure differs fundamentally in the Himalayas and in the Andes. This is because the Himalayas extend west to east over a similar latitudinal range, which tends to stabilize and intensify the general climatic conditions present. In contrast, the Andes span north to south across a wide latitudinal range, allowing for a greater variety of climatic conditions (</span><a class="primary-blue-color tab-link" data-dcnode-id="3972" data-tab="pane-pcw-references" href="#B11" id="B11R"><span data-dcnode-id="3973" instrument_node="">11</span></a><span data-dcnode-id="3971" instrument_node="">). These geographic differences could include barometric pressure, temperature, evaporative water floss, food availability, and evolutionary geography. Although PO</span><sub data-dcnode-id="3969"><span data-dcnode-id="3970" instrument_node="">2</span></sub><span data-dcnode-id="3968" instrument_node=""> will decrease with decreasing barometric pressure (</span><a class="primary-blue-color" data-dcnode-id="3966" data-tab="pane-pcw-Figures" href="#F0001" id="F0001R"><span data-dcnode-id="3967" instrument_node="">Fig. 1</span></a><span data-dcnode-id="3965" instrument_node="">), barometric pressure also varies with season, latitude, and weather pattern (</span><a class="primary-blue-color tab-link" data-dcnode-id="3963" data-tab="pane-pcw-references" href="#B11" id="B11R"><span data-dcnode-id="3964" instrument_node="">11</span></a><span data-dcnode-id="3962" instrument_node="">). Temperature drops ~0.6°C for every 100 m increase in elevation, but the actual value decrease depends on the latitude and is influenced by cloud cover, wind velocity, and solar radiation (</span><a class="primary-blue-color tab-link" data-dcnode-id="3960" data-tab="pane-pcw-references" href="#B11" id="B11R"><span data-dcnode-id="3961" instrument_node="">11</span></a><span data-dcnode-id="3959" instrument_node="">). Evaporative water loss can also differ at altitude for two reasons: </span><i data-dcnode-id="3957"><span data-dcnode-id="3958" instrument_node="">1</span></i><span data-dcnode-id="3956" instrument_node="">) the partial pressure of water vapor decreases with decreasing temperature and relative humidity (e.g., when inspired air has a higher humidity less water vapor lost in humidifying the air), and </span><i data-dcnode-id="3954"><span data-dcnode-id="3955" instrument_node="">2</span></i><span data-dcnode-id="3953" instrument_node="">) the diffusion coefficient of water vapor is also inversely proportional to barometric pressure (</span><a class="primary-blue-color tab-link" data-dcnode-id="3951" data-tab="pane-pcw-references" href="#B11" id="B11R"><span data-dcnode-id="3952" instrument_node="">11</span></a><span data-dcnode-id="3950" instrument_node="">). As a result, susceptibility to increased evaporative water loss during physiological activities such as ventilation may differ depending on the humidity, temperature, and barometric pressure of the high-altitude region. As such, animals that respond to hypoxia with robust ventilation increases (e.g., bar-headed geese) may be at a greater risk of dehydration than those with alternative ventilatory strategies (e.g., Andean geese). Food availability will vary depending on slope steepness, water availability, temperature, and soil quality (</span><a class="primary-blue-color tab-link" data-dcnode-id="3948" data-tab="pane-pcw-references" href="#B11" id="B11R"><span data-dcnode-id="3949" instrument_node="">11</span></a><span data-dcnode-id="3947" instrument_node="">). Geological history of mountain ascension during bird habitation could be an added factor in this regard.</span></p><p data-dcnode-id="3944"><span data-dcnode-id="3945" instrument_node="">Thus these are two among many postulations as to why these two avian groups may have evolved different ventilatory and cardiovascular responses to hypoxia. However, birds are not the only taxon known to use different strategies to cope with high-altitude hypoxia.</span></p></div><div data-dcnode-id="3847" id="sec1-8"><h2 class="article-section__title section__title" data-dcnode-id="3941" id="_i11"><span data-dcnode-id="3942" instrument_node="">Human Parallels and Applications</span></h2><p data-dcnode-id="3900"><span data-dcnode-id="3940" instrument_node="">Of the animals living at high altitude, perhaps the best understood through study are humans. Tibetan and Andean humans exhibit different responses to hypoxia. Tibetans have high resting levels of ventilation and a robust ventilatory response to hypoxia (</span><a class="primary-blue-color tab-link" data-dcnode-id="3938" data-tab="pane-pcw-references" href="#B4" id="B4R"><span data-dcnode-id="3939" instrument_node="">4</span></a><span data-dcnode-id="3937" instrument_node="">), yet a normal Hb concentration and hematocrit (</span><a class="primary-blue-color tab-link" data-dcnode-id="3935" data-tab="pane-pcw-references" href="#B5" id="B5R"><span data-dcnode-id="3936" instrument_node="">5</span></a><span data-dcnode-id="3934" instrument_node="">). Andeans have a substantially lower hypoxic ventilatory response than Tibetans and lowlanders exposed to high altitude (</span><a class="primary-blue-color tab-link" data-dcnode-id="3932" data-tab="pane-pcw-references" href="#B3" id="B3R"><span data-dcnode-id="3933" instrument_node="">3</span></a><span data-dcnode-id="3931" instrument_node="">). Instead, Andeans exhibit a higher Hb concentration and higher arterial oxygen content (</span><a class="primary-blue-color tab-link" data-dcnode-id="3929" data-tab="pane-pcw-references" href="#B5" id="B5R"><span data-dcnode-id="3930" instrument_node="">5</span></a><span data-dcnode-id="3928" instrument_node="">), as well as greater lung volumes and pulmonary diffusion capacities than lowlanders (</span><a class="primary-blue-color tab-link" data-dcnode-id="3926" data-tab="pane-pcw-references" href="#B12" id="B12R"><span data-dcnode-id="3927" instrument_node="">12</span></a><span data-dcnode-id="3925" instrument_node="">). Andeans also tend to suffer much more than Tibetans from high-altitude diseases such as chronic mountain sickness, which has led aspects of their response to chronic hypoxia (e.g., polycythemia) to be discussed as being maladaptive (</span><a class="primary-blue-color tab-link" data-dcnode-id="3923" data-tab="pane-pcw-references" href="#B5" id="B5R"><span data-dcnode-id="3924" instrument_node="">5</span></a><span data-dcnode-id="3922" instrument_node="">, </span><a class="primary-blue-color tab-link" data-dcnode-id="3920" data-tab="pane-pcw-references" href="#B6" id="B6R"><span data-dcnode-id="3921" instrument_node="">6</span></a><span data-dcnode-id="3919" instrument_node="">, </span><a class="primary-blue-color tab-link" data-dcnode-id="3917" data-tab="pane-pcw-references" href="#B15" id="B15R"><span data-dcnode-id="3918" instrument_node="">15</span></a><span data-dcnode-id="3916" instrument_node="">, </span><a class="primary-blue-color tab-link" data-dcnode-id="3914" data-tab="pane-pcw-references" href="#B48" id="B48R"><span data-dcnode-id="3915" instrument_node="">48</span></a><span data-dcnode-id="3913" instrument_node="">, </span><a class="primary-blue-color tab-link" data-dcnode-id="3911" data-tab="pane-pcw-references" href="#B65" id="B65R"><span data-dcnode-id="3912" instrument_node="">65</span></a><span data-dcnode-id="3910" instrument_node="">). The differences in hypoxia response between these two human populations has been primarily attributed to the length of evolutionary time that they have been living at high altitude (for review, see </span><a class="primary-blue-color tab-link" data-dcnode-id="3908" data-tab="pane-pcw-references" href="#B5" id="B5R"><span data-dcnode-id="3909" instrument_node="">5</span></a><span data-dcnode-id="3907" instrument_node="">, </span><a class="primary-blue-color tab-link" data-dcnode-id="3905" data-tab="pane-pcw-references" href="#B15" id="B15R"><span data-dcnode-id="3906" instrument_node="">15</span></a><span data-dcnode-id="3904" instrument_node="">), with Tibetans having colonized high-altitude areas longer (~25,000 yr ago) than the Andeans (~11,000 yr ago) (</span><a class="primary-blue-color tab-link" data-dcnode-id="3902" data-tab="pane-pcw-references" href="#B1" id="B1R"><span data-dcnode-id="3903" instrument_node="">1</span></a><span data-dcnode-id="3901" instrument_node="">).</span></p><p data-dcnode-id="3856"><span data-dcnode-id="3899" instrument_node="">When comparing the hypoxic ventilatory and cardiovascular responses of high-altitude humans to those of waterfowl endemic to the same region, there are some intriguing similarities. Similar to the Tibetans, bar-headed geese exhibit a robust hypoxic ventilatory response (</span><a class="primary-blue-color tab-link" data-dcnode-id="3897" data-tab="pane-pcw-references" href="#B9" id="B9R"><span data-dcnode-id="3898" instrument_node="">9</span></a><span data-dcnode-id="3896" instrument_node="">, </span><a class="primary-blue-color tab-link" data-dcnode-id="3894" data-tab="pane-pcw-references" href="#B21" id="B21R"><span data-dcnode-id="3895" instrument_node="">21</span></a><span data-dcnode-id="3893" instrument_node="">, </span><a class="primary-blue-color tab-link" data-dcnode-id="3891" data-tab="pane-pcw-references" href="#B33" id="B33R"><span data-dcnode-id="3892" instrument_node="">33</span></a><span data-dcnode-id="3890" instrument_node="">, </span><a class="primary-blue-color tab-link" data-dcnode-id="3888" data-tab="pane-pcw-references" href="#B34" id="B34R"><span data-dcnode-id="3889" instrument_node="">34</span></a><span data-dcnode-id="3887" instrument_node="">, </span><a class="primary-blue-color tab-link" data-dcnode-id="3885" data-tab="pane-pcw-references" href="#B61" id="B61R"><span data-dcnode-id="3886" instrument_node="">61</span></a><span data-dcnode-id="3884" instrument_node="">), whereas in comparison the hypoxic ventilatory response of Andean geese is blunted (</span><a class="primary-blue-color tab-link" data-dcnode-id="3882" data-tab="pane-pcw-references" href="#B33" id="B33R"><span data-dcnode-id="3883" instrument_node="">33</span></a><span data-dcnode-id="3881" instrument_node="">), similar to that of Andeans (</span><a class="primary-blue-color tab-link" data-dcnode-id="3879" data-tab="pane-pcw-references" href="#B3" id="B3R"><span data-dcnode-id="3880" instrument_node="">3</span></a><span data-dcnode-id="3878" instrument_node="">). Andean geese, similar to Andeans (</span><a class="primary-blue-color tab-link" data-dcnode-id="3876" data-tab="pane-pcw-references" href="#B12" id="B12R"><span data-dcnode-id="3877" instrument_node="">12</span></a><span data-dcnode-id="3875" instrument_node="">), also exhibit increased pulmonary diffusion capacity (</span><a class="primary-blue-color tab-link" data-dcnode-id="3873" data-tab="pane-pcw-references" href="#B33" id="B33R"><span data-dcnode-id="3874" instrument_node="">33</span></a><span data-dcnode-id="3872" instrument_node="">). However, unlike Andeans, because of their high-oxygen-affinity Hb (</span><a class="primary-blue-color tab-link" data-dcnode-id="3870" data-tab="pane-pcw-references" href="#B9" id="B9R"><span data-dcnode-id="3871" instrument_node="">9</span></a><span data-dcnode-id="3869" instrument_node="">, </span><a class="primary-blue-color tab-link" data-dcnode-id="3867" data-tab="pane-pcw-references" href="#B31" id="B31R"><span data-dcnode-id="3868" instrument_node="">31</span></a><span data-dcnode-id="3866" instrument_node="">, </span><a class="primary-blue-color tab-link" data-dcnode-id="3864" data-tab="pane-pcw-references" href="#B44" id="B44R"><span data-dcnode-id="3865" instrument_node="">44</span></a><span data-dcnode-id="3863" instrument_node="">, </span><a class="primary-blue-color tab-link" data-dcnode-id="3861" data-tab="pane-pcw-references" href="#B51" id="B51R"><span data-dcnode-id="3862" instrument_node="">51</span></a><span data-dcnode-id="3860" instrument_node="">, </span><a class="primary-blue-color tab-link" data-dcnode-id="3858" data-tab="pane-pcw-references" href="#B71" id="B71R"><span data-dcnode-id="3859" instrument_node="">71</span></a><span data-dcnode-id="3857" instrument_node="">), Andean geese are not reliant upon increases in hematocrit or Hb concentration to bolster blood oxygen-carrying capacity. Although it is unknown whether these similarities are coincidental or a product of similarities in nature or duration of hypoxia exposure, both humans and birds endemic to the Himalayas and the Andes have evolved markedly different strategies for coping with hypoxia.</span></p><p data-dcnode-id="3848"><span data-dcnode-id="3855" instrument_node="">The field of comparative physiology, particularly in birds, has great potential for application to human research. Studies investigating the physiology of high-altitude birds can offer insight into physiological adaptations to lifelong exposure to and high aerobic activity in hypoxic environments. Studying these factors under varying duration and severity of hypoxia exposure could also lend insight into high-altitude training, providing understanding into the effect of these parameters on animals with different physiological characteristics. In addition, the mechanisms underlying some birds’ abilities to potentially avoid pulmonary and cerebral edema (</span><a class="primary-blue-color tab-link" data-dcnode-id="3853" data-tab="pane-pcw-references" href="#B16" id="B16R"><span data-dcnode-id="3854" instrument_node="">16</span></a><span data-dcnode-id="3852" instrument_node="">; for review, see </span><a class="primary-blue-color tab-link" data-dcnode-id="3850" data-tab="pane-pcw-references" href="#B18" id="B18R"><span data-dcnode-id="3851" instrument_node="">18</span></a><span data-dcnode-id="3849" instrument_node="">) at high altitude is an understudied area with intriguing potential clinical and physiological application inviting further research.</span></p></div><div data-dcnode-id="3804" id="sec1-9"><h2 class="article-section__title section__title" data-dcnode-id="3845" id="_i12"><span data-dcnode-id="3846" instrument_node="">Future Directions</span></h2><p data-dcnode-id="3843"><span data-dcnode-id="3844" instrument_node="">Avenues inviting future research are plentiful in the area of high-altitude avian physiology.</span></p><p data-dcnode-id="3820"><span data-dcnode-id="3842" instrument_node="">Further studies are required to determine the underlying mechanisms of the metabolic and ventilatory differences reported in Laguë et al. (</span><a class="primary-blue-color tab-link" data-dcnode-id="3840" data-tab="pane-pcw-references" href="#B34" id="B34R"><span data-dcnode-id="3841" instrument_node="">34</span></a><span data-dcnode-id="3839" instrument_node="">) between bar-headed geese reared at high altitude and low altitude, and the extent to which these differences may also facilitate high-altitude flight. Common garden experiments should be conducted that incubate goose eggs and rear geese derived from the same population under controlled conditions at different altitudes and investigate their hypoxic responses. These experiments should also vary the severity of hypoxia exposure (i.e., level of altitude) and examine how hypoxic responses change throughout development. Due to logistical constraints (especially in the field) all data in these aforementioned foundational hypoxic ventilatory and cardiovascular responses were collected at rest and not during flight (</span><a class="primary-blue-color tab-link" data-dcnode-id="3837" data-tab="pane-pcw-references" href="#B9" id="B9R"><span data-dcnode-id="3838" instrument_node="">9</span></a><span data-dcnode-id="3836" instrument_node="">, </span><a class="primary-blue-color tab-link" data-dcnode-id="3834" data-tab="pane-pcw-references" href="#B21" id="B21R"><span data-dcnode-id="3835" instrument_node="">21</span></a><span data-dcnode-id="3833" instrument_node="">, </span><a class="primary-blue-color tab-link" data-dcnode-id="3831" data-tab="pane-pcw-references" href="#B28" id="B28R"><span data-dcnode-id="3832" instrument_node="">28</span></a><span data-dcnode-id="3830" instrument_node="">, </span><a class="primary-blue-color tab-link" data-dcnode-id="3828" data-tab="pane-pcw-references" href="#B33" id="B33R"><span data-dcnode-id="3829" instrument_node="">33</span></a><span data-dcnode-id="3827" instrument_node="">, </span><a class="primary-blue-color tab-link" data-dcnode-id="3825" data-tab="pane-pcw-references" href="#B34" id="B34R"><span data-dcnode-id="3826" instrument_node="">34</span></a><span data-dcnode-id="3824" instrument_node="">, </span><a class="primary-blue-color tab-link" data-dcnode-id="3822" data-tab="pane-pcw-references" href="#B61" id="B61R"><span data-dcnode-id="3823" instrument_node="">61</span></a><span data-dcnode-id="3821" instrument_node="">). As such, it would be logical to conduct experiments that investigate similar cardiovascular and ventilatory responses during flight in wild acclimatized birds to see whether the different hypoxic ventilatory cardiovascular response strategies are maintained during and serve to enhance high altitude performance.</span></p><p data-dcnode-id="3809"><span data-dcnode-id="3819" instrument_node="">The identification of increases in stroke volume as a major component of the cardiovascular response of waterfowl to hypoxia lends itself to a myriad of questions, the most natural of these being: What are the mechanisms underlying such large increases in stroke volume? Experiments could be conducted to target potential contributing external factors such as circulating hormones or neurotransmitters, as well as intrinsic cardiac factors, such as ventricular lumen volume, level of ventricular trabecularity, pericardium compliance, cardiac muscle fiber contractility and compliance, and cardiac muscle fiber contractile properties associated with the Frank-Starling response. Limited information is available on the avian cardiomyocyte Frank-Starling response (</span><a class="primary-blue-color tab-link" data-dcnode-id="3817" data-tab="pane-pcw-references" href="#B64" id="B64R"><span data-dcnode-id="3818" instrument_node="">64</span></a><span data-dcnode-id="3816" instrument_node="">), a phenomenon known to facilitate substantial stroke volume increases in fish exposed to hypoxia (</span><a class="primary-blue-color tab-link" data-dcnode-id="3814" data-tab="pane-pcw-references" href="#B19" id="B19R"><span data-dcnode-id="3815" instrument_node="">19</span></a><span data-dcnode-id="3813" instrument_node="">, </span><a class="primary-blue-color tab-link" data-dcnode-id="3811" data-tab="pane-pcw-references" href="#B64" id="B64R"><span data-dcnode-id="3812" instrument_node="">64</span></a><span data-dcnode-id="3810" instrument_node="">). Future studies of the underlying mechanisms that allow force development over such large ventricular volume changes and under conditions of oxygen limitation would also be of value. In addition, it would be useful to compare the values of stroke volume obtained in these studies to those obtained through direct stroke volume measurement using a flow probe on the pulmonary artery or aorta or to those obtained through noninvasive indirect measurement using ultrasound. Validation of a portable, noninvasive technique such as ultrasound would greatly reduce many logistical elements associated with measuring avian stroke volume in the field. Future in vivo cardiovascular waterfowl studies should have a capacity to either directly measure or calculate stroke volume, and any studies intending to rely solely upon heart rate for estimating parameters such as metabolic rate or cardiac output should address the potentially substantial contributing role of stroke volume.</span></p><p data-dcnode-id="3807"><span data-dcnode-id="3808" instrument_node="">A third major area of further research is that of investigating the morphological (increased surface area or decreased diffusion barrier thickness) and physiological mechanisms underlying how Andean geese and crested ducks are able to achieve such large increases in lung oxygen extraction. It would be prudent to compare the results from Andean geese to bar-headed geese (two species that use entirely different hypoxic ventilatory response strategies).</span></p><p data-dcnode-id="3805"><span data-dcnode-id="3806" instrument_node="">A final major area of further research involves investigating why bar-headed geese and Andean geese have evolved such different hypoxic ventilatory and cardiovascular strategies to cope with hypoxia: is it due to the duration and severity of their high-altitude exposure (transient high-altitude migration vs. lifelong high-altitude exposure) or is it due to intrinsic differences in high-altitude exposure in the Himalayas vs. in the Andes? This question is mammoth. It will require a strategic, multidisciplinary approach, incorporating additional disciplines such as genomics and phylogenetics, as well as extending the study beyond birds to other animals inhibiting these regions to address this complex, multifaceted question.</span></p></div><div data-dcnode-id="3799" id="sec1-10"><h2 class="article-section__title section__title" data-dcnode-id="3802" id="_i13"><span data-dcnode-id="3803" instrument_node="">Conclusions</span></h2><p data-dcnode-id="3800"><span data-dcnode-id="3801" instrument_node="">In summary, high-altitude life presents a physiological challenge that many birds champion. In addition to several enhancements intrinsic to the avian oxygen transport cascade, some species of high-altitude waterfowl have evolved even more specialized and varied means of maintaining oxygen supply in hypoxia. In particular, bar-headed geese (transient migrators through the high-altitude Himalayas) and Andean geese (lifelong residents of the high Andes) have evolved two considerably different ventilatory and cardiovascular responses to hypoxia, with bar-headed geese relying upon robust recruitment of heart rate and ventilation and Andean geese substantially increasing stroke volume and lung oxygen extraction. Although the origins of these contrasting responses remain unknown, it is undeniable that the field of high-altitude avian physiology is deeply fascinating both from the basic science and clinical perspective, with many caveats that remain to be explored.</span></p></div></div><div data-dcnode-id="3787" id="sec2"><h1 class="article-section__title section__title" data-dcnode-id="3796" id="_i14"><span data-dcnode-id="3797" instrument_node="">GRANTS</span></h1><p data-dcnode-id="3788"><span data-dcnode-id="3795" instrument_node="">I thank NSERC Vanier Canada and Killam Laureates for personal funding, as well as NSERC for funding the research of (</span><a class="primary-blue-color tab-link" data-dcnode-id="3793" data-tab="pane-pcw-references" href="#B33" id="B33R"><span data-dcnode-id="3794" instrument_node="">33</span></a><span data-dcnode-id="3792" instrument_node="">, </span><a class="primary-blue-color tab-link" data-dcnode-id="3790" data-tab="pane-pcw-references" href="#B34" id="B34R"><span data-dcnode-id="3791" instrument_node="">34</span></a><span data-dcnode-id="3789" instrument_node="">).</span></p></div><div data-dcnode-id="3782" id="sec3"><h1 class="article-section__title section__title" data-dcnode-id="3785" id="_i15"><span data-dcnode-id="3786" instrument_node="">DISCLOSURES</span></h1><p data-dcnode-id="3783"><span data-dcnode-id="3784" instrument_node="">No conflicts of interest, financial or otherwise, are declared by the author.</span></p></div><div data-dcnode-id="3777" id="sec4"><h1 class="article-section__title section__title" data-dcnode-id="3780" id="_i16"><span data-dcnode-id="3781" instrument_node="">AUTHOR CONTRIBUTIONS</span></h1><p data-dcnode-id="3778"><span data-dcnode-id="3779" instrument_node="">S.L.L. conceived and designed research, performed experiments, analyzed data, interpreted results of experiments, prepared figures, drafted manuscript, edited and revised manuscript, and approved final version of manuscript.</span></p></div><div class="ack" data-dcnode-id="3769"><h2 class="article-section__title section__title" data-dcnode-id="3775" id="_i17"><span data-dcnode-id="3776" instrument_node="">ACKNOWLEDGMENTS</span></h2><p data-dcnode-id="3770"><span data-dcnode-id="3774" instrument_node="">Many of the concepts and ideas discussed in this mini-review are explored in greater detail in my PhD thesis (</span><a class="primary-blue-color tab-link" data-dcnode-id="3772" data-tab="pane-pcw-references" href="#B35" id="B35R"><span data-dcnode-id="3773" instrument_node="">35</span></a><span data-dcnode-id="3771" instrument_node="">). As a result I am grateful to my PhD supervisors, Drs. Bill Milsom and Tony Farrell, and to my supervisory committee members, Drs. Graham Scott and Bill Sheel, for guidance and insight. Specifically I also thank Dr. Tony Farrell for comments on this manuscript. Finally, I thank the International Hypoxia Symposia Organizing Committee 2017 for the opportunity to share with others about this exciting and largely understudied topic.</span></p></div></div><h2 class="article-section__title section__title" data-dcnode-id="3763" id="d9116200e64"><span data-dcnode-id="3764" instrument_node="">AUTHOR NOTES</sp 20Applied%252520Physiology%2526description%253DHigh%252520altitude%252520is%252520physiologically%252520challenging%252520for%252520vertebrate%252520life%252520for%252520many%252520reasons%25252C%252520including%252520hypoxia%252520%28low%252520environmental%252520oxygen%29%25253B%252520yet%25252C%252520many%252520birds%252520thrive%252520at%252520altitude.%252520Compared%252520with%252520mammals%25252C%252520birds%252520have%252520additional%252520enhancements%252520to%252520their%252520oxygen%252520transport%252520cascade%25252C%252520the%252520conceptual%252520series%252520of%252520steps%252520responsible%252520for%252520acquiring%252520oxygen%252520from%252520the%252520environment%252520and%252520transporting%252520it%252520to%252520the%252520mitochondria.%252520These%252520adaptations%252520have%252520allowed%252520them%252520to%252520inhabit%252520a%252520number%252520of%252520high-altitude%252520regions.%252520Waterfowl%252520are%252520a%252520taxon%252520prolific%252520at%252520altitude.%252520This%252520minireview%252520explores%252520the%252520physiological%252520responses%252520of%252520high-altitude%252520waterfowl%252520%28geese%252520and%252520ducks%29%25252C%252520comparing%252520the%252520strategies%252520of%252520lifelong%252520high-altitude%252520residents%252520to%252520those%252520of%252520transient%252520high-altitude%252520performers%25252C%252520providing%252520insight%252520into%252520how%252520birds%252520champion%252520high-altitude%252520life.%252520In%252520particular%25252C%252520this%252520review%252520highlights%252520and%252520contrasts%252520the%252520physiological%252520hypoxia%252520responses%252520of%252520bar-headed%252520geese%252520%28Anser%252520indicus%29%25252C%252520birds%252520that%252520migrate%252520biannually%252520through%252520the%252520Himalayas%252520%284%25252C500%2525E2%252580%2525936%25252C500%252520m%29%25252C%252520and%252520Andean%252520geese%252520%28Chloephaga%252520melanoptera%29%25252C%252520lifelong%252520residents%252520of%252520the%252520Andes%252520%284%25252C000%2525E2%252580%2525935%25252C500%252520m%29.%252520These%252520two%252520species%252520exhibit%252520markedly%252520different%252520ventilatory%252520and%252520cardiovascular%252520strategies%252520for%252520coping%252520with%252520hypoxia%25253A%252520bar-headed%252520geese%252520robustly%252520increase%252520convective%252520oxygen%252520transport%252520elements%252520%28i.e.%25252C%252520heart%252520rate%252520and%252520total%252520ventilation%29%252520whereas%252520Andean%252520geese%252520rely%252520predominantly%252520on%252520enhancements%252520that%252520are%252520likely%252520morphological%252520in%252520origin%252520%28i.e.%25252C%252520increases%252520in%252520lung%252520oxygen%252520diffusion%252520and%252520cardiac%252520stroke%252520volume%29.%252520The%252520minireview%252520compares%252520the%252520short-%252520and%252520long-term%252520cardiovascular%252520and%252520ventilatory%252520trade-offs%252520of%252520these%252520different%252520physiological%252520strategies%252520and%252520offers%252520hypotheses%252520surrounding%252520their%252520origins.%252520It%252520also%252520draws%252520parallels%252520to%252520high-altitude%252520human%252520physiology%252520and%252520research%25252C%252520and%252520identifies%252520a%252520number%252520of%252520areas%252520of%252520further%252520research.%252520The%252520field%252520of%252520high-altitude%252520avian%252520physiology%252520offers%252520a%252520unique%252520and%252520broadly%252520applicable%252520insight%252520into%252520physiological%252520enhancements%252520in%252520hypoxia.%26csi%3Dundefined%26rev%3Dv8.28.8-wp%26ct%3D1%26xld%3D1%26xd%3D1&amp;raw" style="height: 1px; width: 1px; position: absolute; top: 0px; z-index: 100000; border: 0px; left: 0px;" title="AddThis utility frame"><html data-dcnode-id="49"><head data-dcnode-id="53"><meta charset="utf-8"><meta content="text/html; charset=utf-8" data-dcnode-id="57" http-equiv="Content-ty
