</span><meta content="High altitude is physiologically challenging for vertebrate life for many reasons, including hypoxia (low environmental oxygen); yet, many birds thrive at altitude. Compared with mammals, birds have additional enhancements to their oxygen transport cascade, the conceptual series of steps responsible for acquiring oxygen from the environment and transporting it to the mitochondria. These adaptations have allowed them to inhabit a number of high-altitude regions. Waterfowl are a taxon prolific at altitude. This minireview explores the physiological responses of high-altitude waterfowl (geese and ducks), comparing the strategies of lifelong high-altitude residents to those of transient high-altitude performers, providing insight into how birds champion high-altitude life. In particular, this review highlights and contrasts the physiological hypoxia responses of bar-headed geese (Anser indicus), birds that migrate biannually through the Himalayas (4,500–6,500 m), and Andean geese (Chloephaga melanoptera), lifelong residents of the Andes (4,000–5,500 m). These two species exhibit markedly different ventilatory and cardiovascular strategies for coping with hypoxia: bar-headed geese robustly increase convective oxygen transport elements (i.e., heart rate and total ventilation) whereas Andean geese rely predominantly on enhancements that are likely morphological in origin (i.e., increases in lung oxygen diffusion and cardiac stroke volume). The minireview compares the short- and long-term cardiovascular and ventilatory trade-offs of these different physiological strategies and offers hypotheses surrounding their origins. It also draws parallels to high-altitude human physiology and research, and identifies a number of areas of further research. The field of high-altitude avian physiology offers a unique and broadly applicable insight into physiological enhancements in hypoxia." data-dcnode-id="6392" property="og:description"><span data-dcnode-id="6391" </span></li><span data-dcnode-id="5036" instrument_node="">
</span></ul></div></nav></div><div data-dcnode-id="3747"><div class="article__body" data-dcnode-id="3748"><div class="col-md-12" data-dcnode-id="3749"><p class="fulltext" data-dcnode-id="5031"></p><div class="hlFld-Abstract" data-dcnode-id="5017"><p class="fulltext" data-dcnode-id="5029"></p><h2 class="article-section__title section__title" data-dcnode-id="5027" id="d9116200e1"><span data-dcnode-id="5028" instrument_node="">Abstract</span></h2><div class="abstractSection abstractInFull" data-dcnode-id="5018"><p data-dcnode-id="5019"><span data-dcnode-id="5026" instrument_node="">High altitude is physiologically challenging for vertebrate life for many reasons, including hypoxia (low environmental oxygen); yet, many birds thrive at altitude. Compared with mammals, birds have additional enhancements to their oxygen transport cascade, the conceptual series of steps responsible for acquiring oxygen from the environment and transporting it to the mitochondria. These adaptations have allowed them to inhabit a number of high-altitude regions. Waterfowl are a taxon prolific at altitude. This minireview explores the physiological responses of high-altitude waterfowl (geese and ducks), comparing the strategies of lifelong high-altitude residents to those of transient high-altitude performers, providing insight into how birds champion high-altitude life. In particular, this review highlights and contrasts the physiological hypoxia responses of bar-headed geese (</span><i data-dcnode-id="5024"><span data-dcnode-id="5025" instrument_node="">Anser indicus</span></i><span data-dcnode-id="5023" instrument_node="">), birds that migrate biannually through the Himalayas (4,500–6,500 m), and Andean geese (</span><i data-dcnode-id="5021"><span data-dcnode-id="5022" instrument_node="">Chloephaga melanoptera</span></i><span data-dcnode-id="5020" instrument_node="">), lifelong residents of the Andes (4,000–5,500 m). These two species exhibit markedly different ventilatory and cardiovascular strategies for coping with hypoxia: bar-headed geese robustly increase convective oxygen transport elements (i.e., heart rate and total ventilation) whereas Andean geese rely predominantly on enhancements that are likely morphological in origin (i.e., increases in lung oxygen diffusion and cardiac stroke volume). The minireview compares the short- and long-term cardiovascular and ventilatory trade-offs of these different physiological strategies and offers hypotheses surrounding their origins. It also draws parallels to high-altitude human physiology and research, and identifies a number of areas of further research. The field of high-altitude avian physiology offers a unique and broadly applicable insight into physiological enhancements in hypoxia.</span></p></div></div><div class="hlFld-Fulltext" data-dcnode-id="3768"><p data-dcnode-id="5011"><span class="smallcaps smallerCapital" data-dcnode-id="5013"><span data-dcnode-id="5014" instrument_node="">how humans</span></span><span data-dcnode-id="5012" instrument_node=""> climb the world’s highest peaks without supplemental oxygen has perplexed scientists for decades. Yet some birds reside lifelong at or migrate through these very altitudes. This minireview will compare the avian physiological strategies used by lifelong high-altitude residents and transient high-altitude performers, providing insight into how birds champion life at high altitude.</span></p><div data-dcnode-id="3798" id="sec1"><div data-dcnode-id="4632" id="sec1-1"><h2 class="article-section__title section__title" data-dcnode-id="5009" id="_i2"><span data-dcnode-id="5010" instrument_node="">Oxygen: The Reduced Lifeblood of High-Altitude Regions</span></h2><p data-dcnode-id="5001"><span data-dcnode-id="5008" instrument_node="">Life at high altitude is physiologically challenging for all animals. There are three major high-altitude regions in the world: the Himalayas (average altitude: 4,500 m), the Andes (average altitude: 4,000 m), and the East African Plateau (average altitude: 2,400–3,700 m) (</span><a class="primary-blue-color tab-link" data-dcnode-id="5006" data-tab="pane-pcw-references" href="#B11" id="B11R"><span data-dcnode-id="5007" instrument_node="">11</span></a><span data-dcnode-id="5005" instrument_node="">). In each region, cold, limited food availability, dehydration, and especially the decreased availability of environmental oxygen (hypoxia) are among the many challenges faced by the wide variety of vertebrates that live in these regions (</span><a class="primary-blue-color tab-link" data-dcnode-id="5003" data-tab="pane-pcw-references" href="#B11" id="B11R"><span data-dcnode-id="5004" instrument_node="">11</span></a><span data-dcnode-id="5002" instrument_node="">). Despite these challenges, a wide variety of vertebrates live in these regions, and among the most prolific are birds.</span></p><p data-dcnode-id="4985"><span data-dcnode-id="5000" instrument_node="">Despite their wide geographic separation, perhaps the single most important physiological characteristic that high-altitude regions share is the environmental pressure of hypoxia, due to its ubiquitous presence (</span><a class="primary-blue-color tab-link" data-dcnode-id="4998" data-tab="pane-pcw-references" href="#B47" id="B47R"><span data-dcnode-id="4999" instrument_node="">47</span></a><span data-dcnode-id="4997" instrument_node="">). With increasing altitude the barometric pressure decreases, reducing the partial pressure of oxygen (P</span><span class="smallcaps smallerCapital" data-dcnode-id="4995"><span data-dcnode-id="4996" instrument_node="">o</span></span><sub data-dcnode-id="4993"><span data-dcnode-id="4994" instrument_node="">2</span></sub><span data-dcnode-id="4992" instrument_node="">), and resulting in hypobaric hypoxia (</span><a class="primary-blue-color" data-dcnode-id="4990" data-tab="pane-pcw-Figures" href="#F0001" id="F0001R"><span data-dcnode-id="4991" instrument_node="">Fig. 1</span></a><span data-dcnode-id="4989" instrument_node="">) (</span><a class="primary-blue-color tab-link" data-dcnode-id="4987" data-tab="pane-pcw-references" href="#B11" id="B11R"><span data-dcnode-id="4988" instrument_node="">11</span></a><span data-dcnode-id="4986" instrument_node="">). As such, to maintain an adequate supply of oxygen to the mitochondria, high-altitude life requires physiological adjustments to compensate for the reduced availability (molar concentration) of oxygen.</span></p><figure class="figure article__inlineFigure" data-dcnode-id="4826" data-figure-id="F0001" id="F0001"><img alt="Fig. 1." class="figure__image" data-dcnode-id="4984" data-lg-src="/cms/10.1152/japplphysiol.00110.2017/asset/images/large/zdg0101723920001.jpeg" loading="lazy" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//journals.physiology.org/cms/10.1152/japplphysiol.00110.2017/asset/images/medium/zdg0101723920001.gif&amp;raw" title=""><figcaption data-dcnode-id="4827"><strong data-dcnode-id="4983"></strong><span class="figure__caption hlFld-FigureCaption" data-dcnode-id="4828"><p data-dcnode-id="4829"><strong class="figure__title" data-dcnode-id="4981"><span data-dcnode-id="4982" instrument_node="">Fig. 1.</span></strong><span data-dcnode-id="4980" instrument_node="">Decreases in barometric pressure (P</span><sub data-dcnode-id="4978"><span data-dcnode-id="4979" instrument_node="">B</span></sub><span data-dcnode-id="4977" instrument_node="">), inspired partial pressure of oxygen (</span><span class="equationTd inline-formula NLM_disp-formula" data-dcnode-id="4930" id="8e89e961-cec9-8984-7123-609251f35274"><span class="MathJax_Preview" data-dcnode-id="4976" style="color: inherit;"></span><span class="MathJax" data-dcnode-id="4933" data-mathml="<math xmlns=&quot;http://www.w3.org/1998/Math/MathML&quot; id=&quot;m1&quot; overflow=&quot;scroll&quot; altimg=&quot;eq-00001.gif&quot;><mstyle mathvariant=&quot;normal&quot;><mi>P</mi><msub><mi mathsize=&quot;small&quot;>I</mi><msub><mi mathsiz lar/168/004F.png%3FV%3D2.7.5&amp;raw" style="width: 6px; height: 6px; vertical-align: 0px; margin-right: 0.053em;"></span></span><span data-dcnode-id="4916" style="display: inline-block; width: 0px; height: 3.988em;"></span></span><span data-dcnode-id="4910" style="position: absolute; top: -3.882em; left: 0.37em;"><span class="mrow" data-dcnode-id="4912" id="MathJax-Span-24"><span class="mn" data-dcnode-id="4913" id="MathJax-Span-25" style="font-size: 50%;"><img data-dcnode-id="4914" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//cdnjs.cloudflare.com/ajax/libs/mathjax/2.7.5/fonts/HTML-CSS/TeX/png/Main/Regular/168/0032.png%3FV%3D2.7.5&amp;raw" style="width: 4px; height: 6px; margin-right: 0.049em;"></span></span><span data-dcnode-id="4911" style="display: inline-block; width: 0px; height: 3.988em;"></span></span></span></span></span><span data-dcnode-id="4906" style="display: inline-block; width: 0px; height: 3.988em;"></span></span></span></span></span></span></span></span><span data-dcnode-id="4898" style="display: inline-block; width: 0px; height: 2.202em;"></span></span></span><span data-dcnode-id="4895" style="display: inline-block; overflow: hidden; vertical-align: -0.379em; border-left: 0px solid; width: 0px; height: 1.211em;"></span></span></nobr><span class="MJX_Assistive_MathML" data-dcnode-id="4875" role="presentation"><math altimg="eq-00002.gif" data-dcnode-id="4876" display="inline" id="m2" overflow="scroll" xmlns="http://www.w3.org/1998/Math/MathML"><mstyle data-dcnode-id="4877" mathvariant="normal"><mrow data-dcnode-id="4878"><mi data-dcnode-id="4891"><span data-dcnode-id="4892" instrument_node="">F</span></mi><msub data-dcnode-id="4879"><mrow data-dcnode-id="4888"><mi data-dcnode-id="4889" mathsize="small"><span data-dcnode-id="4890" instrument_node="">I</span></mi></mrow><mrow data-dcnode-id="4880"><msub data-dcnode-id="4881"><mrow data-dcnode-id="4885"><mi data-dcnode-id="4886" mathsize="small"><span data-dcnode-id="4887" instrument_node="">O</span></mi></mrow><mrow data-dcnode-id="4882"><mn data-dcnode-id="4883"><span data-dcnode-id="4884" instrument_node="">2</span></mn></mrow></msub></mrow></msub></mrow></mstyle></math></span></span></span><span class="formulaLabel" data-dcnode-id="4870"></span><span data-dcnode-id="4869" instrument_node="">) equivalent to sea level with increases in altitude. Relationship between </span><i data-dcnode-id="4867"><span data-dcnode-id="4868" instrument_node="">x</span></i><span data-dcnode-id="4866" instrument_node=""> and </span><i data-dcnode-id="4864"><span data-dcnode-id="4865" instrument_node="">y</span></i><span data-dcnode-id="4863" instrument_node=""> variables is from Bouverot (</span><a class="primary-blue-color tab-link" data-dcnode-id="4861" data-tab="pane-pcw-references" href="#B11" id="B11R"><span data-dcnode-id="4862" instrument_node="">11</span></a><span data-dcnode-id="4860" instrument_node="">). The tagged bar-headed goose migration data refer to actual telemetry studies conducted on bar-headed geese (</span><a class="primary-blue-color tab-link" data-dcnode-id="4858" data-tab="pane-pcw-references" href="#B7" id="B7R"><span data-dcnode-id="4859" instrument_node="">7</span></a><span data-dcnode-id="4857" instrument_node="">, </span><a class="primary-blue-color tab-link" data-dcnode-id="4855" data-tab="pane-pcw-references" href="#B27" id="B27R"><span data-dcnode-id="4856" instrument_node="">27</span></a><span data-dcnode-id="4854" instrument_node="">), whereas altitude denoted by the anecdotal evidence for the bar-headed goose migration refers to a one-time sighting described by Swan (</span><a class="primary-blue-color tab-link" data-dcnode-id="4852" data-tab="pane-pcw-references" href="#B69" id="B69R"><span data-dcnode-id="4853" instrument_node="">69</span></a><span data-dcnode-id="4851" instrument_node="">). Altitude information for Andean geese, Andean ducks, and low-altitude ducks is derived from literature (</span><a class="primary-blue-color tab-link" data-dcnode-id="4849" data-tab="pane-pcw-references" href="#B23" id="B23R"><span data-dcnode-id="4850" instrument_node="">23</span></a><span data-dcnode-id="4848" instrument_node="">, </span><a class="primary-blue-color tab-link" data-dcnode-id="4846" data-tab="pane-pcw-references" href="#B29" id="B29R"><span data-dcnode-id="4847" instrument_node="">29</span></a><span data-dcnode-id="4845" instrument_node="">, </span><a class="primary-blue-color tab-link" data-dcnode-id="4843" data-tab="pane-pcw-references" href="#B37" id="B37R"><span data-dcnode-id="4844" instrument_node="">37</span></a><span data-dcnode-id="4842" instrument_node="">, </span><a class="primary-blue-color tab-link" data-dcnode-id="4840" data-tab="pane-pcw-references" href="#B42" id="B42R"><span data-dcnode-id="4841" instrument_node="">42</span></a><span data-dcnode-id="4839" instrument_node="">, </span><a class="primary-blue-color tab-link" data-dcnode-id="4837" data-tab="pane-pcw-references" href="#B43" id="B43R"><span data-dcnode-id="4838" instrument_node="">43</span></a><span data-dcnode-id="4836" instrument_node="">, </span><a class="primary-blue-color tab-link" data-dcnode-id="4834" data-tab="pane-pcw-references" href="#B50" id="B50R"><span data-dcnode-id="4835" instrument_node="">50</span></a><span data-dcnode-id="4833" instrument_node="">). [Adapted from Bouverot (</span><a class="primary-blue-color tab-link" data-dcnode-id="4831" data-tab="pane-pcw-references" href="#B11" id="B11R"><span data-dcnode-id="4832" instrument_node="">11</span></a><span data-dcnode-id="4830" instrument_node="">) with permission from Springer. Copyright © Springer-Verlag Berlin Heidelberg 1985.]</span></p></span></figcaption></figure><div class="figure-extra" data-dcnode-id="4821"><a alt="figure" data-dcnode-id="4824" download="" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//journals.physiology.org/na101/home/literatum/publisher/physio/journals/content/jappl/2017/jappl.2017.123.issue-4/japplphysiol.00110.2017/production/images/large/zdg0101723920001.jpeg"><span data-dcnode-id="4825" instrument_node="">Download figure</span></a><a class="ppt-figure-link" data-dcnode-id="4822" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//journals.physiology.org/action/downloadFigures%3Fid%3DF0001%26doi%3D10.1152/japplphysiol.00110.2017"><span data-dcnode-id="4823" instrument_node="">Download PowerPoint</span></a></div><br data-dcnode-id="4820"><p data-dcnode-id="4757"><span data-dcnode-id="4819" instrument_node="">Oxygen is central to vertebrate life and the flow of oxygen from the environment to the mitochondria can be conceptualized by an oxygen transport cascade that has five key steps: </span><i data-dcnode-id="4817"><span data-dcnode-id="4818" instrument_node="">1</span></i><span data-dcnode-id="4816" instrument_node="">) ventilation, </span><i data-dcnode-id="4814"><span data-dcnode-id="4815" instrument_node="">2</span></i><span data-dcnode-id="4813" instrument_node="">) pulmonary oxygen diffusion, </span><i data-dcnode-id="4811"><span data-dcnode-id="4812" instrument_node="">3</span></i><span data-dcnode-id="4810" instrument_node="">) circulation, </span><i data-dcnode-id="4808"><span data-dcnode-id="4809" instrument_node="">4</span></i><span data-dcnode-id="4807" instrument_node="">) tissue oxygen diffusion, and </span><i data-dcnode-id="4805"><span data-dcnode-id="4806" instrument_node="">5</span></i><span data-dcnode-id="4804" instrument_node="">) mitochondrial oxygen utilization (</span><a class="primary-blue-color" data-dcnode-id="4800" data-tab="pane-pcw-Figures" href="#F0002" id="F0002R"><span data-dcnode-id="4803" instrument_node="">Fig. 2</span><i data-dcnode-id="4801"><span data-dcnode-id="4802" instrument_node="">A</span></i></a><span data-dcnode-id="4799" instrument_node="">) (</span><a class="primary-blue-color tab-link" data-dcnode-id="4797" data-tab="pane-pcw-references" href="#B63" id="B63R"><span data-dcnode-id="4798" instrument_node="">63</span></a><span data-dcnode-id="4796" instrument_node="">, </span><a class="primary-blue-color tab-link" data-dcnode-id="4794" data-tab="pane-pcw-references" href="#B72" id="B72R"><span data-dcnode-id="4795" instrument_node="">72</span></a><span data-dcnode-id="4793" instrument_node="">). Oxygen flows through this cascade in a manner that is either convective (ventilation and circulation) or diffusive (pulmonary and tissue oxygen diffusion). The rate of diffusion is heavily contingent on lung and tissue morphology (gas exchange surface area, barrier thickness), as well as the P</span><span class="smallcaps smallerCapital" data-dcnode-id="4791"><span data-dcnode-id="4792" instrument_node="">o</span></span><sub data-dcnode-id="4789"><span data-dcnode-id="4790" instrument_node="">2</span></sub><span data-dcnode-id="4788" instrument_node=""> gradient, and the diffusion and solubility coefficients (</span><a class="primary-blue-color tab-link" data-dcnode-id="4786" data-tab="pane-pcw-references" href="#B73" id="B73R"><span data-dcnode-id="4787" instrument_node="">73</span></a><span data-dcnode-id="4785" instrument_node="">). Conversely, oxygen convection in the lungs and circulation of the blood are determined by total ventilation and cardiac output, which depend on the frequency and volume of oxygen flow, as well as the P</span><span class="smallcaps smallerCapital" data-dcnode-id="4783"><span data-dcnode-id="4784" instrument_node="">o</span></span><sub data-dcnode-id="4781"><span data-dcnode-id="4782" instrument_node="">2</span></sub><span data-dcnode-id="4780" instrument_node=""> and the blood-oxygen carrying capacity (β</span><span class="smallcaps smallerCapital" data-dcnode-id="4778"><span data-dcnode-id="4779" instrument_node="">o</span></span><sub data-dcnode-id="4776"><span data-dcnode-id="4777" instrument_node="">2</span></sub><span data-dcnode-id="4775" instrument_node="">). β</span><span class="smallcaps smallerCapital" data-dcnode-id="4773"><span data-dcnode-id="4774" instrument_node="">o</span></span><sub data-dcnode-id="4771"><span data-dcnode-id="4772" instrument_node="">2</span></sub><span data-dcnode-id="4770" instrument_node=""> can be influenced be several factors, including hematocrit, hemoglobin (Hb) concentration (</span><a class="primary-blue-color tab-link" data-dcnode-id="4768" data-tab="pane-pcw-references" href="#B10" id="B10R"><span data-dcnode-id="4769" instrument_node="">10</span></a><span data-dcnode-id="4767" instrument_node="">), and allosteric modulators of Hb-oxygen binding (</span><a class="primary-blue-color tab-link" data-dcnode-id="4765" data-tab="pane-pcw-references" href="#B40" id="B40R"><span data-dcnode-id="4766" instrument_node="">40</span></a><span data-dcnode-id="4764" instrument_node="">, </span><a class="primary-blue-color tab-link" data-dcnode-id="4762" data-tab="pane-pcw-references" href="#B68" id="B68R"><span data-dcnode-id="4763" instrument_node="">68</span></a><span data-dcnode-id="4761" instrument_node="">, </span><a class="primary-blue-color tab-link" data-dcnode-id="4759" data-tab="pane-pcw-references" href="#B77" id="B77R"><span data-dcnode-id="4760" instrument_node="">77</span></a><span data-dcnode-id="4758" instrument_node="">). Each factor can affect the rate of oxygen movement from the environment to the tissues to satisfy oxygen needs.</span></p><figure class="figure article__inlineFigure" data-dcnode-id="4682" data-figure-id="F0002" id="F0002"><img alt="Fig. 2." class="figure__image" data-dcnode-id="4756" data-lg-src="/cms/10.1152/japplphysiol.00110.2017/asset/images/large/zdg0101723920002.jpeg" loading="lazy" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//journals.physiology.org/cms/10.1152/japplphysiol.00110.2017/asset/images/medium/zdg0101723920002.gif&amp;raw" title=""><figcaption data-dcnode-id="4683"><strong data-dcnode-id="4755"></strong><span class="figure__caption hlFld-FigureCaption" data-dcnode-id="4684"><p data-dcnode-id="4685"><strong class="figure__title" data-dcnode-id="4753"><span data-dcnode-id="4754" instrument_node="">Fig. 2.</span></strong><span data-dcnode-id="4752" instrument_node="">The driving partial pressure of oxygen (P</span><span class="smallcaps smallerCapital" data-dcnode-id="4750"><span data-dcnode-id="4751" instrument_node="">o</span></span><sub data-dcnode-id="4748"><span data-dcnode-id="4749" instrument_node="">2</span></sub><span data-dcnode-id="4747" instrument_node="">) through the vertebrate oxygen transport cascade decreases with increasing altitude. </span><i data-dcnode-id="4745"><span data-dcnode-id="4746" instrument_node="">A</span></i><span data-dcnode-id="4744" instrument_node="">: a generalized schematic of the main diffusive and convective portions of the vertebrate oxygen transport cascade, with the four chambers of the heart abbreviated (RA, right atrium; RV, right ventricle; LA, left atrium; LV, left ventricle). </span><i data-dcnode-id="4742"><span data-dcnode-id="4743" instrument_node="">B</span></i><span data-dcnode-id="4741" instrument_node="">: decreases in the P</span><span class="smallcaps smallerCapital" data-dcnode-id="4739"><span data-dcnode-id="4740" instrument_node="">o</span></span><sub data-dcnode-id="4737"><span data-dcnode-id="4738" instrument_node="">2</span></sub><span data-dcnode-id="4736" instrument_node=""> through the oxygen transport cascade at sea level (0 m) and at high altitude (e.g., Mt. Everest Summit: 8,848 m). The solid lines are based on data collected in Ref. </span><a class="primary-blue-color tab-link" data-dcnode-id="4734" data-tab="pane-pcw-references" href="#B34" id="B34R"><span data-dcnode-id="4735" instrument_node="">34</span></a><span data-dcnode-id="4733" instrument_node="">, and the dotted lines are hypothetical. “a”, Arterial P</span><span class="smallcaps smallerCapital" data-dcnode-id="4731"><span data-dcnode-id="4732" instrument_node="">o</span></span><sub data-dcnode-id="4729"><span data-dcnode-id="4730" instrument_node="">2</span></sub><span data-dcnode-id="4728" instrument_node=""> values; </span><span class="equationTd inline-formula NLM_disp-formula" data-dcnode-id="4696" id="522e58b9-da41-691e-3170-dbfbf8065197"><span class="MathJax_Preview" data-dcnode-id="4727" style="color: inherit;"></span><span class="MathJax" data-dcnode-id="4699" data-mathml="<math xmlns=&quot;http://www.w3.org/1998/Math/MathML&quot; display=&quot;inline&quot; id=&quot;m3&quot; overflow=&quot;scroll&quot; altimg=&quot;eq-00003.gif&quot;><mrow><mover accent=&quot;true&quot;><mi>v</mi><mo stretchy=&quot;true&quot;>&amp;#xAF;</mo></mover></mrow></math>" id="MathJax-Element-3-Frame" role="presentation" style="position: relative;" tabindex="0"><nobr aria-hidden="true" data-dcnode-id="4708"><span class="math" data-dcnode-id="4709" id="m3" overflow="scroll" style="width: 0.598em; display: inline-block;"><span data-dcnode-id="4711" style="display: inline-block; position: relative; width: 0.476em; height: 0px; font-size: 120%;"><span data-dcnode-id="4712" style="position: absolute; clip: rect(1.402em, 1000.42em, 2.391em, -1000em); top: -2.202em; left: 0em;"><span class="mrow" data-dcnode-id="4714" id="MathJax-Span-27"><span class="mrow" data-dcnode-id="4715" id="MathJax-Span-28"><span class="mover" data-dcnode-id="4716" id="MathJax-Span-29"><span data-dcnode-id="4717" style="display: inline-block; position: relative; width: 0.494em; height: 0px;"><span data-dcnode-id="4723" style="position: absolute; clip: rect(3.379em, 1000.43em, 4.177em, -1000em); top: -3.988em; left: 0.007em;"><span class="mi" data-dcnode-id="4725" id="MathJax-Span-30"><img data-dcnode-id="4726" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//cdnjs.cloudflare.com/ajax/libs/mathjax/2.7.5/fonts/HTML-CSS/TeX/png/Math/Italic/336/0076.png%3FV%3D2.7.5&amp;raw" style="width: 7px; height: 7px; vertical-align: 0px; margin-right: 0.017em;"></span><span data-dcnode-id="4724" style="display: inline-block; width: 0px; height: 3.988em;"></span></span><span data-dcnode-id="4718" style="position: absolute; clip: rect(3.259em, 1000.4em, 3.659em, -1000em); top: -4.06em; left: 0.028em;"><span class="mo" data-dcnode-id="4720" id="MathJax-Span-31" style=""><span data-dcnode-id="4721"><img data-dcnode-id="4722" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//cdnjs.cloudflare.com/ajax/libs/mathjax/2.7.5/fonts/HTML-CSS/TeX/png/Main/Regular/336/00AF.png%3FV%3D2.7.5&amp;raw" style="width: 7px; height: 1px; vertical-align: 9px; margin-right: 0.065em;"></span></span><span data-dcnode-id="4719" style="display: inline-block; width: 0px; height: 3.988em;"></span></span></span></span></span></span><span data-dcnode-id="4713" style="display: inline-block; width: 0px; height: 2.202em;"></span></span></span><span data-dcnode-id="4710" style="display: inline-block; overflow: hidden; vertical-align: -0.084em; border-left: 0px solid; width: 0px; height: 0.902em;"></span></span></nobr><span class="MJX_Assistive_MathML" data-dcnode-id="4700" role="presentation"><math altimg="eq-00003.gif" data-dcnode-id="4701" display="inline" id="m3" overflow="scroll" xmlns="http://www.w3.org/1998/Math/MathML"><mrow data-dcnode-id="4702"><mover accent="true" data-dcnode-id="4703"><mi data-dcnode-id="4706"><span data-dcnode-id="4707" instrument_node="">v</span></mi><mo data-dcnode-id="4704" stretchy="true"><span data-dcnode-id="4705" instrument_node="">¯</span></mo></mover></mrow></math></span></span></span><span class="formulaLabel" data-dcnode-id="4695"></span><span data-dcnode-id="4694" instrument_node="">, venous P</span><span class="smallcaps smallerCapital" data-dcnode-id="4692"><span data-dcnode-id="4693" instrument_node="">o</span></span><sub data-dcnode-id="4690"><span data-dcnode-id="4691" instrument_node="">2</span></sub><span data-dcnode-id="4689" instrument_node=""> values. [Adapted from Bouverot (</span><a class="primary-blue-color tab-link" data-dcnode-id="4687" data-tab="pane-pcw-references" href="#B10" id="B10R"><span data-dcnode-id="4688" instrument_node="">10</span></a><span data-dcnode-id="4686" instrument_node="">) with permission from Springer. Copyright © Springer-Verlag Berlin Heidelberg 1985.]</span></p></span></figcaption></figure><div class="figure-extra" data-dcnode-id="4677"><a alt="figure" data-dcnode-id="4680" download="" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//journals.physiology.org/na101/home/literatum/publisher/physio/journals/content/jappl/2017/jappl.2017.123.issue-4/japplphysiol.00110.2017/production/images/large/zdg0101723920002.jpeg"><span data-dcnode-id="4681" instrument_node="">Download figure</span></a><a class="ppt-figure-link" data-dcnode-id="4678" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//journals.physiology.org/action/downloadFigures%3Fid%3DF0002%26doi%3D10.1152/japplphysiol.00110.2017"><span data-dcnode-id="4679" instrument_node="">Download PowerPoint</span></a></div><br data-dcnode-id="4676"><p data-dcnode-id="4656"><span data-dcnode-id="4675" instrument_node="">Environmental hypoxia decreases the P</span><span class="smallcaps smallerCapital" data-dcnode-id="4673"><span data-dcnode-id="4674" instrument_node="">o</span></span><sub data-dcnode-id="4671"><span data-dcnode-id="4672" instrument_node="">2</span></sub><span data-dcnode-id="4670" instrument_node=""> at all levels of the oxygen transport cascade, regardless of whether the step is diffusive or convective (</span><a class="primary-blue-color" data-dcnode-id="4666" data-tab="pane-pcw-Figures" href="#F0002" id="F0002R"><span data-dcnode-id="4669" instrument_node="">Fig. 2</span><i data-dcnode-id="4667"><span data-dcnode-id="4668" instrument_node="">B</span></i></a><span data-dcnode-id="4665" instrument_node="">). However, the diffusive and convective steps differ in their scope, means, and immediacy in adjusting to the reduced P</span><span class="smallcaps smallerCapital" data-dcnode-id="4663"><span data-dcnode-id="4664" instrument_node="">o</span></span><sub data-dcnode-id="4661"><span data-dcnode-id="4662" instrument_node="">2</span></sub><span data-dcnode-id="4660" instrument_node=""> associated with high altitude. Because of their frequency and volume components, the ventilation and circulation can respond rapidly (i.e., seconds to minutes). In contrast, although there is capacity for plasticity within morphology, such as that evidenced in muscle by athletic endurance training, these changes generally occur over months to years (</span><a class="primary-blue-color tab-link" data-dcnode-id="4658" data-tab="pane-pcw-references" href="#B74" id="B74R"><span data-dcnode-id="4659" instrument_node="">74</span></a><span data-dcnode-id="4657" instrument_node="">).</span></p><p data-dcnode-id="4633"><span data-dcnode-id="4655" instrument_node="">Regardless of their success at colonizing high altitudes and functioning in hypoxia, birds are a taxon with intrinsic specializations in their oxygen transport cascade that can be considered “preadaptations” to maintaining oxygen supply in hypoxia (</span><a class="primary-blue-color tab-link" data-dcnode-id="4653" data-tab="pane-pcw-references" href="#B63" id="B63R"><span data-dcnode-id="4654" instrument_node="">63</span></a><span data-dcnode-id="4652" instrument_node="">). Indeed, these specializations appear to have permitted birds to inhabit some of the most extreme and varied environments on earth. They are dispersed over a stunning range of temperatures [life in the Arabian desert sustained by hoopoe larks (</span><a class="primary-blue-color tab-link" data-dcnode-id="4650" data-tab="pane-pcw-references" href="#B78" id="B78R"><span data-dcnode-id="4651" instrument_node="">78</span></a><span data-dcnode-id="4649" instrument_node="">) to Antarctic winters endured by emperor penguins (</span><a class="primary-blue-color tab-link" data-dcnode-id="4647" data-tab="pane-pcw-references" href="#B25" id="B25R"><span data-dcnode-id="4648" instrument_node="">25</span></a><span data-dcnode-id="4646" instrument_node="">)], athletic demands [11,000 km non-stop migrations by the bar-tailed godwit (</span><a class="primary-blue-color tab-link" data-dcnode-id="4644" data-tab="pane-pcw-references" href="#B24" id="B24R"><span data-dcnode-id="4645" instrument_node="">24</span></a><span data-dcnode-id="4643" instrument_node="">) to rapid bipedal sprints by the ostrich (</span><a class="primary-blue-color tab-link" data-dcnode-id="4641" data-tab="pane-pcw-references" href="#B56" id="B56R"><span data-dcnode-id="4642" instrument_node="">56</span></a><span data-dcnode-id="4640" instrument_node="">)], and hypoxic challenges [deep-diving emperor penguins (</span><a class="primary-blue-color tab-link" data-dcnode-id="4638" data-tab="pane-pcw-references" href="#B46" id="B46R"><span data-dcnode-id="4639" instrument_node="">46</span></a><span data-dcnode-id="4637" instrument_node="">) to high-flying bar-headed geese (</span><a class="primary-blue-color tab-link" data-dcnode-id="4635" data-tab="pane-pcw-references" href="#B27" id="B27R"><span data-dcnode-id="4636" instrument_node="">27</span></a><span data-dcnode-id="4634" instrument_node="">)]. Their hypoxia tolerance is made all the more remarkable when considering their elevated resting metabolic rates, and the high metabolic rates required to power high-altitude flight in thin air.</span></p></div><div data-dcnode-id="4559" id="sec1-2"><h2 class="article-section__title section__title" data-dcnode-id="4630" id="_i5"><span data-dcnode-id="4631" instrument_node="">The Avian Advantage</span></h2><p data-dcnode-id="4565"><span data-dcnode-id="4629" instrument_node="">Among vertebrates, the avian oxygen transport cascade is characterized by its efficiency, with enhancements at every level of the cascade that are well documented and reviewed in literature (</span><a class="primary-blue-color tab-link" data-dcnode-id="4627" data-tab="pane-pcw-references" href="#B47" id="B47R"><span data-dcnode-id="4628" instrument_node="">47</span></a><span data-dcnode-id="4626" instrument_node="">, </span><a class="primary-blue-color tab-link" data-dcnode-id="4624" data-tab="pane-pcw-references" href="#B55" id="B55R"><span data-dcnode-id="4625" instrument_node="">55</span></a><span data-dcnode-id="4623" instrument_node="">, </span><a class="primary-blue-color tab-link" data-dcnode-id="4621" data-tab="pane-pcw-references" href="#B63" id="B63R"><span data-dcnode-id="4622" instrument_node="">63</span></a><span data-dcnode-id="4620" instrument_node="">, </span><a class="primary-blue-color tab-link" data-dcnode-id="4618" data-tab="pane-pcw-references" href="#B66" id="B66R"><span data-dcnode-id="4619" instrument_node="">66</span></a><span data-dcnode-id="4617" instrument_node="">, </span><a class="primary-blue-color tab-link" data-dcnode-id="4615" data-tab="pane-pcw-references" href="#B76" id="B76R"><span data-dcnode-id="4616" instrument_node="">76</span></a><span data-dcnode-id="4614" instrument_node="">). Birds are considered to be more tolerant of hypocapnia than mammals because they are able to continue increasing total ventilation despite developing a respiratory alkalosis, enabling them to enhance oxygen uptake and transfer without negative chemoreceptor feedback (</span><a class="primary-blue-color tab-link" data-dcnode-id="4612" data-tab="pane-pcw-references" href="#B57" id="B57R"><span data-dcnode-id="4613" instrument_node="">57</span></a><span data-dcnode-id="4611" instrument_node="">, </span><a class="primary-blue-color tab-link" data-dcnode-id="4609" data-tab="pane-pcw-references" href="#B63" id="B63R"><span data-dcnode-id="4610" instrument_node="">63</span></a><span data-dcnode-id="4608" instrument_node="">). The avian respiratory system is composed of air sacs that act as bellows to unidirectionally ventilate a pair of relatively immobile lungs in the caudal to cranial direction. The avian unidirectional cross-current gas exchange system is considered more efficient than mammalian tidal ventilation under hypoxic conditions (</span><a class="primary-blue-color tab-link" data-dcnode-id="4606" data-tab="pane-pcw-references" href="#B55" id="B55R"><span data-dcnode-id="4607" instrument_node="">55</span></a><span data-dcnode-id="4605" instrument_node="">, </span><a class="primary-blue-color tab-link" data-dcnode-id="4603" data-tab="pane-pcw-references" href="#B57" id="B57R"><span data-dcnode-id="4604" instrument_node="">57</span></a><span data-dcnode-id="4602" instrument_node="">). As well, their pulmonary blood-gas exchange surface area is larger with a thinner diffusion barrier (2.5-fold thinner than that of mammals), yet still mechanically robust (</span><a class="primary-blue-color tab-link" data-dcnode-id="4600" data-tab="pane-pcw-references" href="#B57" id="B57R"><span data-dcnode-id="4601" instrument_node="">57</span></a><span data-dcnode-id="4599" instrument_node="">, </span><a class="primary-blue-color tab-link" data-dcnode-id="4597" data-tab="pane-pcw-references" href="#B75" id="B75R"><span data-dcnode-id="4598" instrument_node="">75</span></a><span data-dcnode-id="4596" instrument_node="">) (for review, see </span><a class="primary-blue-color tab-link" data-dcnode-id="4594" data-tab="pane-pcw-references" href="#B38" id="B38R"><span data-dcnode-id="4595" instrument_node="">38</span></a><span data-dcnode-id="4593" instrument_node="">, </span><a class="primary-blue-color tab-link" data-dcnode-id="4591" data-tab="pane-pcw-references" href="#B55" id="B55R"><span data-dcnode-id="4592" instrument_node="">55</span></a><span data-dcnode-id="4590" instrument_node="">). Tracheal volume is the primary source of anatomical dead space in birds and is ~4.5-fold larger in birds than in similarly sized mammals. Birds compensate for this by breathing with a deeper, slower breathing pattern (for review, see </span><a class="primary-blue-color tab-link" data-dcnode-id="4588" data-tab="pane-pcw-references" href="#B55" id="B55R"><span data-dcnode-id="4589" instrument_node="">55</span></a><span data-dcnode-id="4587" instrument_node="">). Compared with similarly-sized mammals, birds have larger hearts that enhance cardiac output (</span><a class="primary-blue-color tab-link" data-dcnode-id="4585" data-tab="pane-pcw-references" href="#B13" id="B13R"><span data-dcnode-id="4586" instrument_node="">13</span></a><span data-dcnode-id="4584" instrument_node="">, </span><a class="primary-blue-color tab-link" data-dcnode-id="4582" data-tab="pane-pcw-references" href="#B26" id="B26R"><span data-dcnode-id="4583" instrument_node="">26</span></a><span data-dcnode-id="4581" instrument_node="">; for review, see </span><a class="primary-blue-color tab-link" data-dcnode-id="4579" data-tab="pane-pcw-references" href="#B66" id="B66R"><span data-dcnode-id="4580" instrument_node="">66</span></a><span data-dcnode-id="4578" instrument_node="">). In addition, birds also have enhanced capacity for tissue oxygen diffusion compared with mammals due to higher capillary to muscle fiber ratio in the flight muscle, brain, and heart (</span><a class="primary-blue-color tab-link" data-dcnode-id="4576" data-tab="pane-pcw-references" href="#B18" id="B18R"><span data-dcnode-id="4577" instrument_node="">18</span></a><span data-dcnode-id="4575" instrument_node="">, </span><a class="primary-blue-color tab-link" data-dcnode-id="4573" data-tab="pane-pcw-references" href="#B41" id="B41R"><span data-dcnode-id="4574" instrument_node="">41</span></a><span data-dcnode-id="4572" instrument_node="">, </span><a class="primary-blue-color tab-link" data-dcnode-id="4570" data-tab="pane-pcw-references" href="#B63" id="B63R"><span data-dcnode-id="4571" instrument_node="">63</span></a><span data-dcnode-id="4569" instrument_node="">). Thus, with taxon-specific enhancements to both their convective and diffusive oxygen transport cascade steps, birds are better equipped than most mammals to handle hypoxia (for Point-Counterpoint on this topic, see </span><a class="primary-blue-color tab-link" data-dcnode-id="4567" data-tab="pane-pcw-references" href="#B60" id="B60R"><span data-dcnode-id="4568" instrument_node="">60</span></a><span data-dcnode-id="4566" instrument_node="">).</span></p><p data-dcnode-id="4560"><span data-dcnode-id="4564" instrument_node="">Of the many species of birds that thrive at altitude, including passerines and hummingbirds, waterfowl (Anseriformes: geese, swans, and ducks) are very geographically widespread. Indeed, both the Himalayas and the Andes are home to a wide variety of endemic waterfowl. One Himalayan waterfowl species that has received a tremendous amount of interest from the scientific community is the high-altitude migrating bar-headed goose (</span><i data-dcnode-id="4562"><span data-dcnode-id="4563" instrument_node="">Anser indicus</span></i><span data-dcnode-id="4561" instrument_node="">).</span></p></div><div data-dcnode-id="4202" id="sec1-3"><h2 class="article-section__title section__title" data-dcnode-id="4557" id="_i6"><span data-dcnode-id="4558" instrument_node="">Transient High-Altitude Athletes: Bar-Headed Geese</span></h2><p data-dcnode-id="4532"><span data-dcnode-id="4556" instrument_node="">Bar-headed geese perform one of the most impressive athletic feats on this planet, migrating biannually from their moderately high-altitude nesting grounds in the Mongolian and Qinghai-Tibetan plateaus (2,000–4,500 m) through the Himalayan mountains to overwinter at sea level in India (</span><a class="primary-blue-color tab-link" data-dcnode-id="4554" data-tab="pane-pcw-references" href="#B7" id="B7R"><span data-dcnode-id="4555" instrument_node="">7</span></a><span data-dcnode-id="4553" instrument_node="">, </span><a class="primary-blue-color tab-link" data-dcnode-id="4551" data-tab="pane-pcw-references" href="#B27" id="B27R"><span data-dcnode-id="4552" instrument_node="">27</span></a><span data-dcnode-id="4550" instrument_node="">). These transient high-altitude athletes migrate through the mountain passes, routinely flying at altitudes of 4,500–6,000 m (</span><a class="primary-blue-color tab-link" data-dcnode-id="4548" data-tab="pane-pcw-references" href="#B27" id="B27R"><span data-dcnode-id="4549" instrument_node="">27</span></a><span data-dcnode-id="4547" instrument_node="">), where the corresponding P</span><span class="smallcaps smallerCapital" data-dcnode-id="4545"><span data-dcnode-id="4546" instrument_node="">o</span></span><sub data-dcnode-id="4543"><span data-dcnode-id="4544" instrument_node="">2</span></sub><span data-dcnode-id="4542" instrument_node=""> is less than half that inspired at sea level (</span><a class="primary-blue-color" data-dcnode-id="4540" data-tab="pane-pcw-Figures" href="#F0001" id="F0001R"><span data-dcnode-id="4541" instrument_node="">Fig. 1</span></a><span data-dcnode-id="4539" instrument_node="">). During their return migration their initial ascent from sea level to this altitude takes only ~8 h, leaving room only for the most rapid physiological adjustments. What is truly exceptional is that the geese maintain continuous flight during hypoxia without relying on updrafts and likely while encountering headwinds. Although bar-headed geese are unarguably high-altitude performers, they live only seasonally, however, in moderate hypoxia and encounter severe hypoxia transiently (~1 day) during their migratory flight (</span><a class="primary-blue-color" data-dcnode-id="4537" data-tab="pane-pcw-Figures" href="#F0001" id="F0001R"><span data-dcnode-id="4538" instrument_node="">Fig. 1</span></a><span data-dcnode-id="4536" instrument_node="">) (</span><a class="primary-blue-color tab-link" data-dcnode-id="4534" data-tab="pane-pcw-references" href="#B27" id="B27R"><span data-dcnode-id="4535" instrument_node="">27</span></a><span data-dcnode-id="4533" instrument_node="">).</span></p><p data-dcnode-id="4458"><span data-dcnode-id="4531" instrument_node="">Relative to low-altitude relatives [e.g., greylag geese (</span><i data-dcnode-id="4529"><span data-dcnode-id="4530" instrument_node="">Anser anser</span></i><span data-dcnode-id="4528" instrument_node="">) and barnacle geese (</span><i data-dcnode-id="4526"><span data-dcnode-id="4527" instrument_node="">Branta leucopsis</span></i><span data-dcnode-id="4525" instrument_node="">)], bar-headed geese facilitate their remarkable physiological performance through recognized enhancements to each level of their oxygen transport cascade (</span><a class="primary-blue-color tab-link" data-dcnode-id="4523" data-tab="pane-pcw-references" href="#B9" id="B9R"><span data-dcnode-id="4524" instrument_node="">9</span></a><span data-dcnode-id="4522" instrument_node="">, </span><a class="primary-blue-color tab-link" data-dcnode-id="4520" data-tab="pane-pcw-references" href="#B21" id="B21R"><span data-dcnode-id="4521" instrument_node="">21</span></a><span data-dcnode-id="4519" instrument_node="">, </span><a class="primary-blue-color tab-link" data-dcnode-id="4517" data-tab="pane-pcw-references" href="#B28" id="B28R"><span data-dcnode-id="4518" instrument_node="">28</span></a><span data-dcnode-id="4516" instrument_node="">, </span><a class="primary-blue-color tab-link" data-dcnode-id="4514" data-tab="pane-pcw-references" href="#B33" id="B33R"><span data-dcnode-id="4515" instrument_node="">33</span></a><span data-dcnode-id="4513" instrument_node="">, </span><a class="primary-blue-color tab-link" data-dcnode-id="4511" data-tab="pane-pcw-references" href="#B34" id="B34R"><span data-dcnode-id="4512" instrument_node="">34</span></a><span data-dcnode-id="4510" instrument_node="">, </span><a class="primary-blue-color tab-link" data-dcnode-id="4508" data-tab="pane-pcw-references" href="#B61" id="B61R"><span data-dcnode-id="4509" instrument_node="">61</span></a><span data-dcnode-id="4507" instrument_node="">; for review, see </span><a class="primary-blue-color tab-link" data-dcnode-id="4505" data-tab="pane-pcw-references" href="#B59" id="B59R"><span data-dcnode-id="4506" instrument_node="">59</span></a><span data-dcnode-id="4504" instrument_node="">). Bar-headed geese have larger lungs with a greater surface area, increasing the capacity for pulmonary oxygen diffusion (</span><a class="primary-blue-color tab-link" data-dcnode-id="4502" data-tab="pane-pcw-references" href="#B62" id="B62R"><span data-dcnode-id="4503" instrument_node="">62</span></a><span data-dcnode-id="4501" instrument_node="">). Bar-headed geese also have a greatly diminished or absent pulmonary vasoconstrictor response to hypoxia (</span><a class="primary-blue-color tab-link" data-dcnode-id="4499" data-tab="pane-pcw-references" href="#B16" id="B16R"><span data-dcnode-id="4500" instrument_node="">16</span></a><span data-dcnode-id="4498" instrument_node="">; for review, see </span><a class="primary-blue-color tab-link" data-dcnode-id="4496" data-tab="pane-pcw-references" href="#B59" id="B59R"><span data-dcnode-id="4497" instrument_node="">59</span></a><span data-dcnode-id="4495" instrument_node="">), allowing them to maintain gas exchange and avoid right heart strain. Bar-headed geese also have a Hb mutation (Pro-α119 to Ala-α119 in bar-headed geese) that increases the intrinsic oxygen-affinity of Hb (</span><a class="primary-blue-color tab-link" data-dcnode-id="4493" data-tab="pane-pcw-references" href="#B44" id="B44R"><span data-dcnode-id="4494" instrument_node="">44</span></a><span data-dcnode-id="4492" instrument_node="">, </span><a class="primary-blue-color tab-link" data-dcnode-id="4490" data-tab="pane-pcw-references" href="#B71" id="B71R"><span data-dcnode-id="4491" instrument_node="">71</span></a><span data-dcnode-id="4489" instrument_node="">), enabling bar-headed geese to load oxygen in the blood more effectively while in hypoxic environments. In addition, decreased temperature also left-shifts the oxygen equilibrium curve. If the pulmonary blood cools when the geese fly in cold hypoxic conditions, this could serve as an additional advantage favoring blood-oxygen loading. Compared with other birds, bar-headed goose blood is even more thermally sensitive, enhancing this advantage and their ability to load oxygen. Thus the cool inspired air and the warm working acidotic muscles can act on blood-oxygen affinity in such a way as to theoretically increase oxygen delivery twofold during flapping flight (</span><a class="primary-blue-color tab-link" data-dcnode-id="4487" data-tab="pane-pcw-references" href="#B45" id="B45R"><span data-dcnode-id="4488" instrument_node="">45</span></a><span data-dcnode-id="4486" instrument_node="">). Their left cardiac ventricle has increased capillary density, decreasing oxygen diffusion distances, and thereby enhancing cardiac muscle oxygenation during hypoxemia (</span><a class="primary-blue-color tab-link" data-dcnode-id="4484" data-tab="pane-pcw-references" href="#B62" id="B62R"><span data-dcnode-id="4485" instrument_node="">62</span></a><span data-dcnode-id="4483" instrument_node="">). Finally, the tissue mitochondria in bar-headed goose flight muscle are positioned closer to the capillaries, minimizing intracellular diffusion distances (</span><a class="primary-blue-color tab-link" data-dcnode-id="4481" data-tab="pane-pcw-references" href="#B58" id="B58R"><span data-dcnode-id="4482" instrument_node="">58</span></a><span data-dcnode-id="4480" instrument_node="">). Among the most comprehensively described hypoxic ventilatory and cardiovascular responses of waterfowl are those of bar-headed geese (</span><a class="primary-blue-color tab-link" data-dcnode-id="4478" data-tab="pane-pcw-references" href="#B8" id="B8R"><span data-dcnode-id="4479" instrument_node="">8</span></a><span data-dcnode-id="4477" instrument_node="">, </span><a class="primary-blue-color tab-link" data-dcnode-id="4475" data-tab="pane-pcw-references" href="#B9" id="B9R"><span data-dcnode-id="4476" instrument_node="">9</span></a><span data-dcnode-id="4474" instrument_node="">, </span><a class="primary-blue-color tab-link" data-dcnode-id="4472" data-tab="pane-pcw-references" href="#B21" id="B21R"><span data-dcnode-id="4473" instrument_node="">21</span></a><span data-dcnode-id="4471" instrument_node="">, </span><a class="primary-blue-color tab-link" data-dcnode-id="4469" data-tab="pane-pcw-references" href="#B28" id="B28R"><span data-dcnode-id="4470" instrument_node="">28</span></a><span data-dcnode-id="4468" instrument_node="">, </span><a class="primary-blue-color tab-link" data-dcnode-id="4466" data-tab="pane-pcw-references" href="#B33" id="B33R"><span data-dcnode-id="4467" instrument_node="">33</span></a><span data-dcnode-id="4465" instrument_node="">, </span><a class="primary-blue-color tab-link" data-dcnode-id="4463" data-tab="pane-pcw-references" href="#B34" id="B34R"><span data-dcnode-id="4464" instrument_node="">34</span></a><span data-dcnode-id="4462" instrument_node="">, </span><a class="primary-blue-color tab-link" data-dcnode-id="4460" data-tab="pane-pcw-references" href="#B61" id="B61R"><span data-dcnode-id="4461" instrument_node="">61</span></a><span data-dcnode-id="4459" instrument_node="">).</span></p><p data-dcnode-id="4408"><span data-dcnode-id="4457" instrument_node="">The bar-headed goose hypoxic ventilatory response is characterized by a different breathing pattern than most lowland waterfowl species. Bar-headed geese respond to hypoxia at rest by initially increasing tidal volume rather than breathing frequency (</span><a class="primary-blue-color tab-link" data-dcnode-id="4455" data-tab="pane-pcw-references" href="#B33" id="B33R"><span data-dcnode-id="4456" instrument_node="">33</span></a><span data-dcnode-id="4454" instrument_node="">, </span><a class="primary-blue-color tab-link" data-dcnode-id="4452" data-tab="pane-pcw-references" href="#B34" id="B34R"><span data-dcnode-id="4453" instrument_node="">34</span></a><span data-dcnode-id="4451" instrument_node="">, </span><a class="primary-blue-color tab-link" data-dcnode-id="4449" data-tab="pane-pcw-references" href="#B61" id="B61R"><span data-dcnode-id="4450" instrument_node="">61</span></a><span data-dcnode-id="4448" instrument_node="">). This reduces the proportion of ventilation attributed to ventilating dead space (</span><a class="primary-blue-color tab-link" data-dcnode-id="4446" data-tab="pane-pcw-references" href="#B33" id="B33R"><span data-dcnode-id="4447" instrument_node="">33</span></a><span data-dcnode-id="4445" instrument_node="">, </span><a class="primary-blue-color tab-link" data-dcnode-id="4443" data-tab="pane-pcw-references" href="#B34" id="B34R"><span data-dcnode-id="4444" instrument_node="">34</span></a><span data-dcnode-id="4442" instrument_node="">, </span><a class="primary-blue-color tab-link" data-dcnode-id="4440" data-tab="pane-pcw-references" href="#B61" id="B61R"><span data-dcnode-id="4441" instrument_node="">61</span></a><span data-dcnode-id="4439" instrument_node="">). In contrast, greylag geese are primarily reliant upon increases in breathing frequency to increase ventilation when exposed to hypoxia (</span><a class="primary-blue-color tab-link" data-dcnode-id="4437" data-tab="pane-pcw-references" href="#B61" id="B61R"><span data-dcnode-id="4438" instrument_node="">61</span></a><span data-dcnode-id="4436" instrument_node="">), and low-altitude migrating barnacle geese (</span><a class="primary-blue-color tab-link" data-dcnode-id="4434" data-tab="pane-pcw-references" href="#B34" id="B34R"><span data-dcnode-id="4435" instrument_node="">34</span></a><span data-dcnode-id="4433" instrument_node="">) and Pekin duck (</span><i data-dcnode-id="4431"><span data-dcnode-id="4432" instrument_node="">Anas platyrhynchos</span></i><span data-dcnode-id="4430" instrument_node="">) (</span><a class="primary-blue-color tab-link" data-dcnode-id="4428" data-tab="pane-pcw-references" href="#B61" id="B61R"><span data-dcnode-id="4429" instrument_node="">61</span></a><span data-dcnode-id="4427" instrument_node="">) use a combination of increases in breathing frequency and tidal volume to increase total ventilation in hypoxia. The cerebral vasculature of bar-headed geese also exhibits a reduced sensitivity to the hypocapnic alkalosis that accompanies increased ventilation in hypoxia, permitting these birds to achieve a large increase in total ventilation (</span><a class="primary-blue-color tab-link" data-dcnode-id="4425" data-tab="pane-pcw-references" href="#B9" id="B9R"><span data-dcnode-id="4426" instrument_node="">9</span></a><span data-dcnode-id="4424" instrument_node="">, </span><a class="primary-blue-color tab-link" data-dcnode-id="4422" data-tab="pane-pcw-references" href="#B33" id="B33R"><span data-dcnode-id="4423" instrument_node="">33</span></a><span data-dcnode-id="4421" instrument_node="">, </span><a class="primary-blue-color tab-link" data-dcnode-id="4419" data-tab="pane-pcw-references" href="#B34" id="B34R"><span data-dcnode-id="4420" instrument_node="">34</span></a><span data-dcnode-id="4418" instrument_node="">, </span><a class="primary-blue-color tab-link" data-dcnode-id="4416" data-tab="pane-pcw-references" href="#B57" id="B57R"><span data-dcnode-id="4417" instrument_node="">57</span></a><span data-dcnode-id="4415" instrument_node="">, </span><a class="primary-blue-color tab-link" data-dcnode-id="4413" data-tab="pane-pcw-references" href="#B61" id="B61R"><span data-dcnode-id="4414" instrument_node="">61</span></a><span data-dcnode-id="4412" instrument_node="">; for review, see </span><a class="primary-blue-color tab-link" data-dcnode-id="4410" data-tab="pane-pcw-references" href="#B18" id="B18R"><span data-dcnode-id="4411" instrument_node="">18</span></a><span data-dcnode-id="4409" instrument_node="">) while maintaining cerebral blood flow. Studies investigating the bar-headed goose hypoxic cardiovascular response are fewer in number.</span></p><p data-dcnode-id="4290"><span data-dcnode-id="4407" instrument_node="">The bar-headed goose hypoxic cardiovascular response is characterized by large increases in total perfusion (cardiac output). The amount that bar-headed geese change cardiac output during hypoxia exposure is considerably variable in the literature (</span><a class="primary-blue-color tab-link" data-dcnode-id="4405" data-tab="pane-pcw-references" href="#B9" id="B9R"><span data-dcnode-id="4406" instrument_node="">9</span></a><span data-dcnode-id="4404" instrument_node="">, </span><a class="primary-blue-color tab-link" data-dcnode-id="4402" data-tab="pane-pcw-references" href="#B21" id="B21R"><span data-dcnode-id="4403" instrument_node="">21</span></a><span data-dcnode-id="4401" instrument_node="">, </span><a class="primary-blue-color tab-link" data-dcnode-id="4399" data-tab="pane-pcw-references" href="#B28" id="B28R"><span data-dcnode-id="4400" instrument_node="">28</span></a><span data-dcnode-id="4398" instrument_node="">, </span><a class="primary-blue-color tab-link" data-dcnode-id="4396" data-tab="pane-pcw-references" href="#B33" id="B33R"><span data-dcnode-id="4397" instrument_node="">33</span></a><span data-dcnode-id="4395" instrument_node="">, </span><a class="primary-blue-color tab-link" data-dcnode-id="4393" data-tab="pane-pcw-references" href="#B34" id="B34R"><span data-dcnode-id="4394" instrument_node="">34</span></a><span data-dcnode-id="4392" instrument_node="">). However, this range in cardiac output increase [2.5-fold (</span><a class="primary-blue-color tab-link" data-dcnode-id="4390" data-tab="pane-pcw-references" href="#B34" id="B34R"><span data-dcnode-id="4391" instrument_node="">34</span></a><span data-dcnode-id="4389" instrument_node="">) to 7-fold (</span><a class="primary-blue-color tab-link" data-dcnode-id="4387" data-tab="pane-pcw-references" href="#B9" id="B9R"><span data-dcnode-id="4388" instrument_node="">9</span></a><span data-dcnode-id="4386" instrument_node="">) when exposed to hypoxia &lt; 0.07 fractional inspired composition of oxygen (</span><span class="equationTd inline-formula NLM_disp-formula" data-dcnode-id="4366"><img alt="" data-dcnode-id="4385" data-formula-source="{&quot;type&quot; : &quot;mathjax&quot;}" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//%3A0/doi/full/10.1152&amp;raw"><img alt="" data-dcnode-id="4384" data-formula-source="{&quot;type&quot; : &quot;mathjax&quot;}" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//%3A0/doi/full/10.1152&amp;raw"><math altimg="eq-00004.gif" data-dcnode-id="4367" display="inline" id="m4" overflow="scroll"><mstyle data-dcnode-id="4368" mathvariant="normal"><mrow data-dcnode-id="4369"><mi data-dcnode-id="4382"><span data-dcnode-id="4383" instrument_node="">F</span></mi><msub data-dcnode-id="4370"><mrow data-dcnode-id="4379"><mi data-dcnode-id="4380" mathsize="small"><span data-dcnode-id="4381" instrument_node="">I</span></mi></mrow><mrow data-dcnode-id="4371"><msub data-dcnode-id="4372"><mrow data-dcnode-id="4376"><mi data-dcnode-id="4377" mathsize="small"><span data-dcnode-id="4378" instrument_node="">O</span></mi></mrow><mrow data-dcnode-id="4373"><mn data-dcnode-id="4374"><span data-dcnode-id="4375" instrument_node="">2</span></mn></mrow></msub></mrow></msub></mrow></mstyle></math></span><span class="formulaLabel" data-dcnode-id="4365"></span><span data-dcnode-id="4364" instrument_node="">)] at rest is likely reflective of the small differences in arterial partial pressure of oxygen (</span><span class="equationTd inline-formula NLM_disp-formula" data-dcnode-id="4345"><img alt="" data-dcnode-id="4363" data-formula-source="{&quot;type&quot; : &quot;mathjax&quot;}" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//%3A0/doi/full/10.1152&amp;raw"><img alt="" data-dcnode-id="4362" data-formula-source="{&quot;type&quot; : &quot;mathjax&quot;}" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//%3A0/doi/full/10.1152&amp;raw"><math altimg="eq-00005.gif" data-dcnode-id="4346" id="m5" overflow="scroll"><mrow data-dcnode-id="4347"><mi data-dcnode-id="4360" mathvariant="normal"><span data-dcnode-id="4361" instrument_node="">P</span></mi><msub data-dcnode-id="4355"><mi data-dcnode-id="4358" mathvariant="normal"><span data-dcnode-id="4359" instrument_node="">a</span></mi><mi data-dcnode-id="4356" mathvariant="normal"><span data-dcnode-id="4357" instrument_node="">O</span></mi></msub><msub data-dcnode-id="4348"><mrow data-dcnode-id="4354"></mrow><mrow data-dcnode-id="4349"><msub data-dcnode-id="4350"><mrow data-dcnode-id="4353"></mrow><mn data-dcnode-id="4351"><span data-dcnode-id="4352" instrument_node="">2</span></mn></msub></mrow></msub></mrow></math></span><span class="formulaLabel" data-dcnode-id="4344"></span><span data-dcnode-id="4343" instrument_node="">) of the cardiovascular response curve that is exponential in nature beyond the inflection point (</span><a class="primary-blue-color tab-link" data-dcnode-id="4341" data-tab="pane-pcw-references" href="#B34" id="B34R"><span data-dcnode-id="4342" instrument_node="">34</span></a><span data-dcnode-id="4340" instrument_node="">). Whereas previous studies and reviews report heart rate as the primary contributor to cardiac output changes in waterfowl (</span><a class="primary-blue-color tab-link" data-dcnode-id="4338" data-tab="pane-pcw-references" href="#B17" id="B17R"><span data-dcnode-id="4339" instrument_node="">17</span></a><span data-dcnode-id="4337" instrument_node="">, </span><a class="primary-blue-color tab-link" data-dcnode-id="4335" data-tab="pane-pcw-references" href="#B21" id="B21R"><span data-dcnode-id="4336" instrument_node="">21</span></a><span data-dcnode-id="4334" instrument_node="">, </span><a class="primary-blue-color tab-link" data-dcnode-id="4332" data-tab="pane-pcw-references" href="#B66" id="B66R"><span data-dcnode-id="4333" instrument_node="">66</span></a><span data-dcnode-id="4331" instrument_node="">), bar-headed geese unexpectedly increase both stroke volume and heart rate to amplify cardiac output during hypoxia (</span><a class="primary-blue-color tab-link" data-dcnode-id="4329" data-tab="pane-pcw-references" href="#B33" id="B33R"><span data-dcnode-id="4330" instrument_node="">33</span></a><span data-dcnode-id="4328" instrument_node="">, </span><a class="primary-blue-color tab-link" data-dcnode-id="4326" data-tab="pane-pcw-references" href="#B34" id="B34R"><span data-dcnode-id="4327" instrument_node="">34</span></a><span data-dcnode-id="4325" instrument_node="">). Stroke volume increases by ~2-fold, with heart rate being predominantly favored in the most severe levels of hypoxia when </span><span class="equationTd inline-formula NLM_disp-formula" data-dcnode-id="4302"><img alt="" data-dcnode-id="4324" data-formula-source="{&quot;type&quot; : &quot;mathjax&quot;}" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//%3A0/doi/full/10.1152&amp;raw"><img alt="" data-dcnode-id="4323" data-formula-source="{&quot;type&quot; : &quot;mathjax&quot;}" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//%3A0/doi/full/10.1152&amp;raw"><math altimg="eq-00006.gif" data-dcnode-id="4303" id="m6" overflow="scroll"><mstyle data-dcnode-id="4304" mathvariant="normal"><mrow data-dcnode-id="4305"><mi data-dcnode-id="4321"><span data-dcnode-id="4322" instrument_node="">P</span></mi><msub data-dcnode-id="4314"><mrow data-dcnode-id="4318"><mi data-dcnode-id="4319"><span data-dcnode-id="4320" instrument_node="">a</span></mi></mrow><mrow data-dcnode-id="4315"><mi data-dcnode-id="4316"><span data-dcnode-id="4317" instrument_node="">O</span></mi></mrow></msub><msub data-dcnode-id="4306"><mrow data-dcnode-id="4313"></mrow><mrow data-dcnode-id="4307"><msub data-dcnode-id="4308"><mrow data-dcnode-id="4312"></mrow><mrow data-dcnode-id="4309"><mn data-dcnode-id="4310"><span data-dcnode-id="4311" instrument_node="">2</span></mn></mrow></msub></mrow></msub></mrow></mstyle></math></span><span class="formulaLabel" data-dcnode-id="4301"></span><span data-dcnode-id="4300" instrument_node=""> falls below 6 kPa (</span><a class="primary-blue-color tab-link" data-dcnode-id="4298" data-tab="pane-pcw-references" href="#B33" id="B33R"><span data-dcnode-id="4299" instrument_node="">33</span></a><span data-dcnode-id="4297" instrument_node="">, </span><a class="primary-blue-color tab-link" data-dcnode-id="4295" data-tab="pane-pcw-references" href="#B34" id="B34R"><span data-dcnode-id="4296" instrument_node="">34</span></a><span data-dcnode-id="4294" instrument_node="">). Barnacle geese achieved a similar enhancement of cardiac output during severe hypoxia by increasing stroke volume ~2-fold and modestly increasing heart rate (</span><a class="primary-blue-color tab-link" data-dcnode-id="4292" data-tab="pane-pcw-references" href="#B34" id="B34R"><span data-dcnode-id="4293" instrument_node="">34</span></a><span data-dcnode-id="4291" instrument_node="">).</span></p><p data-dcnode-id="4203"><span data-dcnode-id="4289" instrument_node="">Although a strong knowledge base for bar-headed goose physiology and their hypoxic responses exists, these studies were conducted on animals born and raised at sea level. Hypoxia exposure during an animal’s development and adult life, depending on when it occurs, is acknowledged to markedly affect physiology (</span><a class="primary-blue-color tab-link" data-dcnode-id="4287" data-tab="pane-pcw-references" href="#B22" id="B22R"><span data-dcnode-id="4288" instrument_node="">22</span></a><span data-dcnode-id="4286" instrument_node="">, </span><a class="primary-blue-color tab-link" data-dcnode-id="4284" data-tab="pane-pcw-references" href="#B67" id="B67R"><span data-dcnode-id="4285" instrument_node="">67</span></a><span data-dcnode-id="4283" instrument_node="">, </span><a class="primary-blue-color tab-link" data-dcnode-id="4281" data-tab="pane-pcw-references" href="#B70" id="B70R"><span data-dcnode-id="4282" instrument_node="">70</span></a><span data-dcnode-id="4280" instrument_node="">; for review, see </span><a class="primary-blue-color tab-link" data-dcnode-id="4278" data-tab="pane-pcw-references" href="#B30" id="B30R"><span data-dcnode-id="4279" instrument_node="">30</span></a><span data-dcnode-id="4277" instrument_node="">, </span><a class="primary-blue-color tab-link" data-dcnode-id="4275" data-tab="pane-pcw-references" href="#B49" id="B49R"><span data-dcnode-id="4276" instrument_node="">49</span></a><span data-dcnode-id="4274" instrument_node="">, </span><a class="primary-blue-color tab-link" data-dcnode-id="4272" data-tab="pane-pcw-references" href="#B54" id="B54R"><span data-dcnode-id="4273" instrument_node="">54</span></a><span data-dcnode-id="4271" instrument_node="">). Nevertheless, the fact remains that many bird species including bar-headed geese hatch successfully and achieve normal growth and metabolic rates at altitudes of 4,000–6,500 m (</span><a class="primary-blue-color tab-link" data-dcnode-id="4269" data-tab="pane-pcw-references" href="#B14" id="B14R"><span data-dcnode-id="4270" instrument_node="">14</span></a><span data-dcnode-id="4268" instrument_node="">, </span><a class="primary-blue-color tab-link" data-dcnode-id="4266" data-tab="pane-pcw-references" href="#B36" id="B36R"><span data-dcnode-id="4267" instrument_node="">36</span></a><span data-dcnode-id="4265" instrument_node="">). Thus there is great interest in the effect of high-altitude rearing and acclimatization on bar-headed geese. Black and Tenney (</span><a class="primary-blue-color tab-link" data-dcnode-id="4263" data-tab="pane-pcw-references" href="#B9" id="B9R"><span data-dcnode-id="4264" instrument_node="">9</span></a><span data-dcnode-id="4262" instrument_node="">) measured changes in total ventilation and cardiac output of bar-headed geese before and following 4 wk of acclimation to simulated altitude (5,640 m). They noted that, among other things, bar-headed geese exhibited higher total ventilation and cardiac output during hypoxic exposure, indicating that the hypoxic ventilatory and cardiovascular responses of bar-headed geese can be influenced by a short-term (4-wk) simulated high-altitude acclimation. Laguë et al. (</span><a class="primary-blue-color tab-link" data-dcnode-id="4260" data-tab="pane-pcw-references" href="#B34" id="B34R"><span data-dcnode-id="4261" instrument_node="">34</span></a><span data-dcnode-id="4259" instrument_node="">) investigated longer term effects of hypoxia exposure by comparing the hypoxic responses of adult bar-headed geese reared at sea level to those of adult bar-headed geese reared at high altitude (3,200 m). They noted that those reared at high altitude exhibited lower metabolic rates and modestly increased hypoxic ventilatory responses compared with their low-altitude counterparts (</span><a class="primary-blue-color tab-link" data-dcnode-id="4257" data-tab="pane-pcw-references" href="#B34" id="B34R"><span data-dcnode-id="4258" instrument_node="">34</span></a><span data-dcnode-id="4256" instrument_node="">). These geese also initiated cardiac responses (increases in stroke volume and heart rate) at a higher </span><span class="equationTd inline-formula NLM_disp-formula" data-dcnode-id="4236"><img alt="" data-dcnode-id="4255" data-formula-source="{&quot;type&quot; : &quot;mathjax&quot;}" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//%3A0/doi/full/10.1152&amp;raw"><img alt="" data-dcnode-id="4254" data-formula-source="{&quot;type&quot; : &quot;mathjax&quot;}" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//%3A0/doi/full/10.1152&amp;raw"><math altimg="eq-00007.gif" data-dcnode-id="4237" display="inline" id="m7" overflow="scroll"><mstyle data-dcnode-id="4238" mathvariant="normal"><mrow data-dcnode-id="4239"><mi data-dcnode-id="4252"><span data-dcnode-id="4253" instrument_node="">F</span></mi><msub data-dcnode-id="4240"><mrow data-dcnode-id="4249"><mi data-dcnode-id="4250" mathsize="small"><span data-dcnode-id="4251" instrument_node="">I</span></mi></mrow><mrow data-dcnode-id="4241"><msub data-dcnode-id="4242"><mrow data-dcnode-id="4246"><mi data-dcnode-id="4247" mathsize="small"><span data-dcnode-id="4248" instrument_node="">O</span></mi></mrow><mrow data-dcnode-id="4243"><mn data-dcnode-id="4244"><span data-dcnode-id="4245" instrument_node="">2</span></mn></mrow></msub></mrow></msub></mrow></mstyle></math></span><span class="formulaLabel" data-dcnode-id="4235"></span><span data-dcnode-id="4234" instrument_node=""> (although comparable level of </span><span class="equationTd inline-formula NLM_disp-formula" data-dcnode-id="4215"><img alt="" data-dcnode-id="4233" data-formula-source="{&quot;type&quot; : &quot;mathjax&quot;}" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//%3A0/doi/full/10.1152&amp;raw"><img alt="" data-dcnode-id="4232" data-formula-source="{&quot;type&quot; : &quot;mathjax&quot;}" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//%3A0/doi/full/10.1152&amp;raw"><math altimg="eq-00008.gif" data-dcnode-id="4216" id="m8" overflow="scroll"><mrow data-dcnode-id="4217"><mi data-dcnode-id="4230" mathvariant="normal"><span data-dcnode-id="4231" instrument_node="">P</span></mi><msub data-dcnode-id="4225"><mi data-dcnode-id="4228" mathvariant="normal"><span data-dcnode-id="4229" instrument_node="">a</span></mi><mi data-dcnode-id="4226" mathvariant="normal"><span data-dcnode-id="4227" instrument_node="">O</span></mi></msub><msub data-dcnode-id="4218"><mrow data-dcnode-id="4224"></mrow><mrow data-dcnode-id="4219"><msub data-dcnode-id="4220"><mrow data-dcnode-id="4223"></mrow><mn data-dcnode-id="4221"><span data-dcnode-id="4222" instrument_node="">2</span></mn></msub></mrow></msub></mrow></math></span><span class="formulaLabel" data-dcnode-id="4214"></span><span data-dcnode-id="4213" instrument_node="">) than their low-altitude counterparts. Total cardiac output achieved, however, was independent of rearing altitude (</span><a class="primary-blue-color tab-link" data-dcnode-id="4211" data-tab="pane-pcw-references" href="#B34" id="B34R"><span data-dcnode-id="4212" instrument_node="">34</span></a><span data-dcnode-id="4210" instrument_node="">), unlike the findings of Black and Tenney (</span><a class="primary-blue-color tab-link" data-dcnode-id="4208" data-tab="pane-pcw-references" href="#B9" id="B9R"><span data-dcnode-id="4209" instrument_node="">9</span></a><span data-dcnode-id="4207" instrument_node="">), suggesting the presence of both hypoxic acclimatization and desensitization in the former study (</span><a class="primary-blue-color tab-link" data-dcnode-id="4205" data-tab="pane-pcw-references" href="#B34" id="B34R"><span data-dcnode-id="4206" instrument_node="">34</span></a><span data-dcnode-id="4204" instrument_node="">). Thus high-altitude exposure during a bird’s lifetime impacts the hypoxic ventilatory and cardiovascular responses of even some of the most well equipped hypoxia champions.</span></p></div><div data-dcnode-id="4105" id="sec1-4"><h2 class="article-section__title section__title" data-dcnode-id="4200" id="_i7"><span data-dcnode-id="4201" instrument_node="">Lifelong High-Altitude Residents: Andean Geese</span></h2><p data-dcnode-id="4165"><span data-dcnode-id="4199" instrument_node="">Whereas bar-headed geese mount a robust physiological response to severe hypoxia twice annually, many Andean waterfowl are exposed lifelong to severe hypoxia. The Andean waterfowl community encompasses several species of ducks, as well as goose-like ducks called sheldgeese, which are not true geese (</span><a class="primary-blue-color tab-link" data-dcnode-id="4197" data-tab="pane-pcw-references" href="#B37" id="B37R"><span data-dcnode-id="4198" instrument_node="">37</span></a><span data-dcnode-id="4196" instrument_node="">, </span><a class="primary-blue-color tab-link" data-dcnode-id="4194" data-tab="pane-pcw-references" href="#B43" id="B43R"><span data-dcnode-id="4195" instrument_node="">43</span></a><span data-dcnode-id="4193" instrument_node="">). Most Andean high-altitude waterfowl inhabit areas between 2,000 and 5,500 m (</span><a class="primary-blue-color" data-dcnode-id="4191" data-tab="pane-pcw-Figures" href="#F0001" id="F0001R"><span data-dcnode-id="4192" instrument_node="">Fig. 1</span></a><span data-dcnode-id="4190" instrument_node="">), and are uncommon at intermediate altitudes due to the lack of wetland habitat on midelevational slopes (</span><a class="primary-blue-color tab-link" data-dcnode-id="4188" data-tab="pane-pcw-references" href="#B43" id="B43R"><span data-dcnode-id="4189" instrument_node="">43</span></a><span data-dcnode-id="4187" instrument_node="">). Andean geese (</span><i data-dcnode-id="4185"><span data-dcnode-id="4186" instrument_node="">Chloephaga melanoptera</span></i><span data-dcnode-id="4184" instrument_node="">) are sheldgeese that live all year at altitudes of 3,000–5,500 m (</span><a class="primary-blue-color tab-link" data-dcnode-id="4182" data-tab="pane-pcw-references" href="#B23" id="B23R"><span data-dcnode-id="4183" instrument_node="">23</span></a><span data-dcnode-id="4181" instrument_node="">, </span><a class="primary-blue-color tab-link" data-dcnode-id="4179" data-tab="pane-pcw-references" href="#B44" id="B44R"><span data-dcnode-id="4180" instrument_node="">44</span></a><span data-dcnode-id="4178" instrument_node="">), altitudes at least comparable to bar-headed goose breeding grounds and some bar-headed goose migration elevations (</span><a class="primary-blue-color tab-link" data-dcnode-id="4176" data-tab="pane-pcw-references" href="#B27" id="B27R"><span data-dcnode-id="4177" instrument_node="">27</span></a><span data-dcnode-id="4175" instrument_node="">) (</span><a class="primary-blue-color" data-dcnode-id="4173" data-tab="pane-pcw-Figures" href="#F0001" id="F0001R"><span data-dcnode-id="4174" instrument_node="">Fig. 1</span></a><span data-dcnode-id="4172" instrument_node="">). Although Andean geese routinely fly, they do not migrate large distances (</span><a class="primary-blue-color tab-link" data-dcnode-id="4170" data-tab="pane-pcw-references" href="#B23" id="B23R"><span data-dcnode-id="4171" instrument_node="">23</span></a><span data-dcnode-id="4169" instrument_node="">, </span><a class="primary-blue-color tab-link" data-dcnode-id="4167" data-tab="pane-pcw-references" href="#B44" id="B44R"><span data-dcnode-id="4168" instrument_node="">44</span></a><span data-dcnode-id="4166" instrument_node="">).</span></p><p data-dcnode-id="4139"><span data-dcnode-id="4164" instrument_node="">Thus, to provide insight into whether or not lifelong high-altitude resident waterfowl had evolved similar enhancements for improving oxygen transport in hypoxia as the transient high-altitude bar-headed geese, Laguë et al. (</span><a class="primary-blue-color tab-link" data-dcnode-id="4162" data-tab="pane-pcw-references" href="#B33" id="B33R"><span data-dcnode-id="4163" instrument_node="">33</span></a><span data-dcnode-id="4161" instrument_node="">) compared the hypoxic respiratory and cardiovascular responses of bar-headed geese to two high-altitude resident Andean species, Andean geese and crested ducks (</span><i data-dcnode-id="4159"><span data-dcnode-id="4160" instrument_node="">Lophonetta specularioides</span></i><span data-dcnode-id="4158" instrument_node="">). Prior to the study little was known about Andean goose physiology other than that Andean geese had evolved a Hb of even greater oxygen affinity than that of bar-headed geese (P</span><sub data-dcnode-id="4156"><span data-dcnode-id="4157" instrument_node="">50</span></sub><span data-dcnode-id="4155" instrument_node=""> of stripped HbA values, pH 7.4, and 37°C are 0.38 kPa and 0.82 kPa, respectively) by a different mutation (Leu-β55 to Ser-β55 in Andean geese compared with Pro-α119 to Ala-α119 in bar-headed geese) (</span><a class="primary-blue-color tab-link" data-dcnode-i
