airliner, gases start to expand due to the lower atmospheric pressure. This is what causes your ears to have that popping sensation.</span></span></p><span data-dcnode-id="4036" instrument_node=""> </span><p class="q-text qu-display--block qu-wordBreak--break-word qu-textAlign--start" data-dcnode-id="4033" style="box-sizing: border-box; margin-bottom: 1em; overflow-wrap: anywhere; direction: ltr;"><span data-dcnode-id="4034" style="font-weight: normal; font-style: normal; background: none;"><span data-dcnode-id="4035" instrument_node="">At altitudes higher than 10,000 feet people unaccustomed to the reduced atmospheric pressure may become short of breath or experience dizziness.</span></span></p><span data-dcnode-id="4032" instrument_node=""> </span><p class="q-text qu-display--block qu-wordBreak--break-word qu-textAlign--start" data-dcnode-id="4029" style="box-sizing: border-box; margin-bottom: 1em; overflow-wrap: anywhere; direction: ltr;"><span data-dcnode-id="4030" style="font-weight: normal; font-style: normal; background: none;"><span data-dcnode-id="4031" instrument_node="">At altitudes above 20,000 feet supplemental oxygen is required to support life. At 34,000 feet, 100% oxygen is necessary to equal the partial pressure of oxygen in sea level air. Above 40,000 feet, 100% oxygen must be under positive pressure to maintain the equivalent altitude of 10,000 feet.</span></span></p><span data-dcnode-id="4028" instrument_node=""> </span><p class="q-text qu-display--block qu-wordBreak--break-word qu-textAlign--start" data-dcnode-id="4025" style="box-sizing: border-box; margin-bottom: 1em; overflow-wrap: anywhere; direction: ltr;"><span data-dcnode-id="4026" style="font-weight: normal; font-style: normal; background: none;"><span data-dcnode-id="4027" instrument_node="">At altitudes above 50,000 man requires a pressurized suit to be safe in this near space environment.</span></span></p><span data-dcnode-id="4024" instrument_node=""> </span><p class="q-text qu-display--block qu-wordBreak--break-word qu-textAlign--start" data-dcnode-id="4021" style="box-sizing: border-box; margin-bottom: 1em; overflow-wrap: anywhere; direction: ltr;"><span data-dcnode-id="4022" style="font-weight: normal; font-style: normal; background: none;"><span data-dcnode-id="4023" instrument_node="">At 55,000 feet, atmospheric pressure is so low that water vapor in the body appears to boil causing the skin to inflate like a balloon.</span></span></p><span data-dcnode-id="4020" instrument_node=""> </span><p class="q-text qu-display--block qu-wordBreak--break-word qu-textAlign--start" data-dcnode-id="4017" style="box-sizing: border-box; margin-bottom: 1em; overflow-wrap: anywhere; direction: ltr;"><span data-dcnode-id="4018" style="font-weight: normal; font-style: normal; background: none;"><span data-dcnode-id="4019" instrument_node="">At 63,000 feet blood at normal body temperature (98 F) appears to boil. Just as your ears pop while traveling through the mountains or flying on an airplane, reduced atmospheric pressure at these high altitudes allow the gases in your body to expand to the point where they appear to boil off.</span></span></p><span data-dcnode-id="4016" instrument_node=""> </span><p class="q-text qu-display--block qu-wordBreak--break-word qu-textAlign--start" data-dcnode-id="4013" style="box-sizing: border-box; margin-bottom: 1em; overflow-wrap: anywhere; direction: ltr;"><span data-dcnode-id="4014" style="font-weight: normal; font-style: normal; background: none;"><span data-dcnode-id="4015" instrument_node="">At altitudes above 65,000 feet atmospheric pressure approaches that of space, that is the pressurization factors for protective equipment to be used at 65,000 feet are essentially the same as would be required for survival in a vacuum.</span></span></p><span data-dcnode-id="4012" instrument_node=""> </span><p class="q-text qu-display--block qu-wordBreak--break-word qu-textAlign--start" data-dcnode-id="4009" style="box-sizing: border- -id="3747" style="box-sizing: border-box; margin-bottom: 1em; overflow-wrap: anywhere; direction: ltr;"><span data-dcnode-id="3748" style="font-weight: normal; font-style: normal; background: none;"><span data-dcnode-id="3749" instrument_node="">Dee,</span></span></p><span data-dcnode-id="3746" instrument_node=""> </span><p class="q-text qu-display--block qu-wordBreak--break-word qu-textAlign--start" data-dcnode-id="3743" style="box-sizing: border-box; margin-bottom: 1em; overflow-wrap: anywhere; direction: ltr;"><span data-dcnode-id="3744" style="font-weight: normal; font-style: normal; background: none;"><span data-dcnode-id="3745" instrument_node="">By high altitude do you mean 5280 feet (Denver), do you mean over 6000 ft? about 9000 ft. or more? I live at 6200 ft and need to make adjustments to baking. For some people living at this altitude means challenges breathing — I have no problems. At first, exercise is “harder” because first your body needs to make more red blood cells to deliver oxygen. When I ski and stay in the mountains at 9000 ft. I sometimes have trouble sleeping and get more headaches. Not everyone does. Many people live at 9000 ft quite comfortably. More issues with baking, though. Then there is living at 16,500 ft (5000 meters). That was rough for me. I had little energy, yet not everyone on the “crew” felt the same. One person was very active and ran up slopes. Others walked “normally”. I felt the lack of oxygen and moved more slowly. If you could make your question more specific people who’ve had experiences could answer better. I have camped above 10,000 ft and hiked to the top of 14,000 ft peaks. That’s short term and not likely to be helpful. I also have a Bemer that I plan to take to my condo at 9,000 ft to see if I sleep better when I use that. Feel free to respond to me privately if you want more information.</span></span></p><span data-dcnode-id="3742" instrument_node=""> </span><p class="q-text qu-display--block qu-wordBreak--break-wo e="button"><div class="q-flex qu-alignItems--center qu-justifyContent--center" data-dcnode-id="3540" style="box-sizing: border-box; display: flex; max-width: 100%; transition-property: opacity; transition-duration: 60ms; transition-timing-function: ease-in-out;"><div class="q-text qu-display--inline-flex qu-alignItems--center qu-overflow--hidden puppeteer_test_button_text qu-medium qu-color--gray" data-dcnode-id="3545" style="box-sizing: border-box; font-size: 13px;"><div class="q-text qu-ellipsis qu-whiteSpace--nowrap" data-dcnode-id="3546" style="box-sizing: border-box; line-height: normal;"><span data-dcnode-id="3547" instrument_node="">Continue Reading</span></div></div><span class="q-inlineBlock qu-ml--tiny qu-mr--n_tiny" data-dcnode-id="3541" name="ChevronDown" style="box-sizing: border-box; display: inline-block; width: 16px; height: 16px; flex-shrink: 0; line-height: 16px;" width="16px"><span class="CssComponent__CssInlineComponent-sc-1oskqb9-1 Icon___StyledCssInlineComponent-sc-11tmcw7-0 fNkmIo" data-dcnode-id="3542"><svg data-dcnode-id="3543" height="24" viewBox="0 0 24 24" width="24" xmlns="http://www.w3.org/2000/svg"><path class="icon_svg-stroke" d="m5 8.5 7 7 7.005-7" data-dcnode-id="3544" fill="none" stroke="#666" stroke-linecap="round" stroke-width="1.5"></path></svg></span></span></div></button></div></div></div></span></div></div></div></div><div class="q-box qu-display--none" data-dcnode-id="3484" style="box-sizing: border-box;"><div class="q-text" data-dcnode-id="3485" style="box-sizing: border-box; max-width: 100%;"><span class="CssComponent__CssInlineComponent-sc-1oskqb9-1 UserSelectableText___StyledCssInlineComponent-lsmoq4-0 kghFzc" data-dcnode-id="3486"><span class="q-box qu-userSelect--text" data-dcnode-id="3487" style="box-sizing: border-box;"><p class="q-text qu-display--block qu-wordBreak--break-word qu-textAlign--start" data-dcnode-id="3528" style="box-sizing: border-box; margin-bottom: 1em; overflow-wrap: anywhere; direction: ltr;"><span data-dcnode-id="3529" style="font-weight: bold; font-style: normal; background: none;"><span data-dcnode-id="3530" instrument_node="">Are they able to run longer without running out of breathe, etc.?</span></span></p><span data-dcnode-id="3527" instrument_node=""> </span><p class="q-text qu-display--block qu-wordBreak--break-word qu-textAlign--start" data-dcnode-id="3524" style="box-sizing: border-box; margin-bottom: 1em; overflow-wrap: anywhere; direction: ltr;"><span data-dcnode-id="3525" style="font-weight: normal; font-style: normal; background: none;"><span data-dcnode-id="3526" instrument_node="">For a number of weeks, even months, yes. That also goes for someone who has spent weeks acclimating to high altitude, then comes down to a low altitude.</span></span></p><span data-dcnode-id="3523" instrument_node=""> </span><p class="q-text qu-display--block qu-wordBreak--break-word qu-textAlign--start" data-dcnode-id="3520" style="box-sizing: border-box; margin-bottom: 1em; overflow-wrap: anywhere; direction: ltr;"><span data-dcnode-id="3521" style="font-weight: normal; font-style: normal; background: none;"><span data-dcnode-id="3522" instrument_node="">Your aerobic capacity is significantly increased. Some of the changes which occur as you acclimate are:</span></span></p><ol class="q-box" data-dcnode-id="3507" style="box-sizing: border-box; direction: ltr; overflow-wrap: break-word; list-style: decimal; margin-bottom: 1em; margin-right: 2em;"><li class="q-relative" data-dcnode-id="3517" style="box-sizing: border-box; position: relative; margin-left: 2em; padding-bottom: 0.7em;"><span data-dcnode-id="3518" style="font-weight: normal; font-style: normal; background: none;"><span data-dcnode-id="3519" instrument_node="">Your blood volume increases.</span></span></li><li class="q-relative" data-dcnode-id="3514" style="box-sizing: border-box; position: relative; margin-left: 2em; padding-bottom: 0.7em;"><span data-dcnode-id="3515" style="font-weight: normal; font-style: normal; background: none;"><span data-dcnode-id="3516" instrument_node="">The number of red blood cells increases.</span></span></li><li class="q-relative" data-dcnode-id="3511" style="box-sizing: border-box; position: relative; margin-left: 2em; padding-bottom: 0.7em;"><span data-dcnode-id="3512" style="font-weight: normal; font-style: normal; background: none;"><span data-dcnode-id="3513" instrument_node="">The new red blood cells your body produces are more efficient at capturing oxygen in the lungs and releasing oxygen to the rest of the body.</span></span></li><li class="q-relative" data-dcnode-id="3508" style="box-sizing: border-box; position: relative; margin-left: 2em; padding-bottom: 0px;"><span data-dcnode-id="3509" style="font-weight: normal; font-style: normal; background: none;"><span data-dcnode-id="3510" instrument_node="">There are multiple other changes which occur — your breathing rate increases, your body protects you from acidosis from breathing fast, etc. etc.</span></span></li></ol><p class="q-text qu-display--block qu-wordBreak--break-word qu-textAlign--start" data-dcnode-id="3504" style="box-sizing: border-box; margin-bottom: 1em; overflow-wrap: anywhere; direction: ltr;"><span data-dcnode-id="3505" style="font-weight: normal; font-style: normal; background: none;"><span data-dcnode-id="3506" instrument_node="">Red blood cells last for about 120 days, and so does their increased efficiency.</span></span></p><hr class="q-box qu-bg--gray" data-dcnode-id="3503" style="box-sizing: border-box; position: relative; margin: 2em auto; padding: 0px; width: 148px; height: 2px; border: 0px;" width="148px"><p class="q-text qu-display--block qu-wordBreak--break-word qu-textAlign--start" data-dcnode-id="3500" style="box-sizing: border-box; margin-bottom: 1em; overflow-wrap: anywhere; direction: ltr;"><span data-dcnode-id="3501" style="font-weight: normal; font-style: normal; background: none;"><span data-dcnode-id="3502" instrument_node="">Eventually, you lose all accilmatization to altitude, if you stay at low altitude, even people who are born and have lived their lives at high altitude.</span></span></p><span data-dcnode-id="3499" instrument_node=""> </span><p class="q-text qu-display--block qu-wordBreak--break-word qu-textAlign--start" data-dcnode-id="3496" style="box-sizing: border-box; margin-bottom: 1em; overflow-wrap: anywhere; direction: ltr;"><span data-dcnode-id="3497" style="font-weight: normal; font-style: normal; background: none;"><span data-dcnode-id="3498" instrument_node="">When you go back to high altitude, there is some evidence that your body ‘remembers’ the changes and makes them faster.</span></span></p><span data-dcnode-id="3495" instrument_node=""> </span><p class="q-text qu-display--block qu-wordBreak--break-word qu-textAlign--start" data-dcnode-id="3492" style="box-sizing: border-box; margin-bottom: 1em; overflow-wrap: anywhere; direction: ltr;"><span data-dcnode-id="3493" style="font-weight: normal; font-style: normal; background: none;"><span data-dcnode-id="3494" instrument_node="">There is also some strange evidence that people who are raised at high altitude who return to altitude after a number of months at low altitude have a higher incidence of altitude sickness than people who are going to altitude for the first time.</span></span></p><span data-dcnode-id="3491" instrument_node=""> </span><p class="q-text qu-display--block qu-wordBreak--break-word qu-textAlign--start" data-dcnode-id="3488" style="box-sizing: border-box; margin-bottom: 0px; overflow-wrap: anywhere; direction: ltr;"><span data-dcnode-id="3489" style="font-weight: normal; font-style: normal; background: none;"><span data-dcnode-id="3490" instrument_node="">This fits in with one of my own pet theories of acclimatization: people who first go to altitude feel weak and take it easy. People who were raised there and return are impatient with their weakness and push themselves too hard.</span></span></p></span></span></d node-id="2233" style="font-weight: normal; font-style: normal; background: none;"><span data-dcnode-id="2234" instrument_node="">Not really fitter. What happens is this, at a high altitude the air is thinner, it is not easy to get all oxygen you body needs, so your blood gets adapted to the environment increasing its ability to transport oxygen to your cells. Once your body is adapted to the high altitude, if you travel to a sea level place, your enhanced ability to absorb oxygen will make you able to perform physical activities longer without getting tired than those who live at the sea level. You could call it a ‘natural doping’.</span></span></p></span></span></div><div data-dcnode-id="2228"></div></div></div></div><div class="q-text qu-dynamicFontSize--small qu-mt--small qu-color--gray_light qu-passColorToLinks" data-dcnode-id="2211" style="box-sizing: border-box;"><span data-dcnode-id="2212"><span class="q-box qu-display--none" data-dcnode-id="2224" style="box-sizing: border-box;"></span><span class="CssComponent-sc-1oskqb9-0 AbstractSeparatedItems___StyledCssComponent-sc-46kfvf-0 bxBZxD" data-dcnode-id="2221"><span data-dcnode-id="2223" instrument_node="">158</span><span data-dcnode-id="2222" instrument_node=""> views</span></span><span class="q-box qu-display--none" data-dcnode-id="2219" style="box-sizing: border-box;"><span data-dcnode-id="2220" instrument_node=""> · </span></span><span class="CssComponent-sc-1oskqb9-0 AbstractSeparatedItems___StyledCssComponent-sc-46kfvf-0 diCWLm" data-dcnode-id="2216"><div class="q-click-wrapper qu-display--inline-block qu-tapHighlight--white qu-cursor--pointer qu-hover--textDecoration--underline ClickWrapper___StyledClickWrapperBox-zoqi4f-0 bIwtPb" data-dcnode-id="2217" style="box-sizing: border-box; font: inherit; padding: 0px; color: inherit; text-align: inherit;" tabindex="0"><span data-dcnode-id="2218" instrument_node="">View upvotes</span></div></span><span class="q-box qu-display--none" data-dcnode-id="2214" style=" tyledCssInlineComponent-lsmoq4-0 kghFzc" data-dcnode-id="1837"><span class="q-box qu-userSelect--text" data-dcnode-id="1838" style="box-sizing: border-box;"><p class="q-text qu-display--block qu-wordBreak--break-word qu-textAlign--start" data-dcnode-id="2019" style="box-sizing: border-box; margin-bottom: 1em; overflow-wrap: anywhere; direction: ltr;"><span data-dcnode-id="2020" style="font-weight: normal; font-style: normal; background: none;"><span data-dcnode-id="2021" instrument_node="">According to Akhand Sutra, the static core component of every perfect and most beautiful object of the universe and Nature is equal to 38.1966%. The dynamic component is equal to 61.8034%. This Law of Nature is called Divyank Ratio or the Divine Golden Ratio.</span></span></p><span data-dcnode-id="2018" instrument_node=""> </span><p class="q-text qu-display--block qu-wordBreak--break-word qu-textAlign--start" data-dcnode-id="2015" style="box-sizing: border-box; margin-bottom: 1em; overflow-wrap: anywhere; direction: ltr;"><span data-dcnode-id="2016" style="font-weight: normal; font-style: normal; background: none;"><span data-dcnode-id="2017" instrument_node="">No wonder, the residual space or capacity of the perfect adult human lungs is 38.1966% of the total lung capacity. Divyank Ratio is calculated with the help of Divyank, the Divine Constant.</span></span></p><span data-dcnode-id="2014" instrument_node=""> </span><p class="q-text qu-display--block qu-wordBreak--break-word qu-textAlign--start" data-dcnode-id="2011" style="box-sizing: border-box; margin-bottom: 1em; overflow-wrap: anywhere; direction: ltr;"><span data-dcnode-id="2012" style="font-weight: normal; font-style: normal; background: none;"><span data-dcnode-id="2013" instrument_node="">Divyank is represented as ((22/21)10.34419)=1.618034.</span></span></p><span data-dcnode-id="2010" instrument_node=""> </span><p class="q-text qu-display--block qu-wordBreak--break-word qu-textAlign--start" data-dcnode-id="2007" style="box-sizing: border-box; margin-bottom: 1em; overflow-wrap: anywhere; direction: ltr;"><span data-dcnode-id="2008" style="font-weight: normal; font-style: normal; background: none;"><span data-dcnode-id="2009" instrument_node="">1. The first part, 22/21, represents the first stage of the creation of the perfect objects.</span></span></p><span data-dcnode-id="2006" instrument_node=""> </span><p class="q-text qu-display--block qu-wordBreak--break-word qu-textAlign--start" data-dcnode-id="2003" style="box-sizing: border-box; margin-bottom: 1em; overflow-wrap: anywhere; direction: ltr;"><span data-dcnode-id="2004" style="font-weight: normal; font-style: normal; background: none;"><span data-dcnode-id="2005" instrument_node="">2. The second part, 10, represents the ten stages of development.</span></span></p><span data-dcnode-id="2002" instrument_node=""> </span><p class="q-text qu-display--block qu-wordBreak--break-word qu-textAlign--start" data-dcnode-id="1999" style="box-sizing: border-box; margin-bottom: 1em; overflow-wrap: anywhere; direction: ltr;"><span data-dcnode-id="2000" style="font-weight: normal; font-style: normal; background: none;"><span data-dcnode-id="2001" instrument_node="">3. The five digits, 0.34419, represent the last stage of maturation.</span></span></p><span data-dcnode-id="1998" instrument_node=""> </span><p class="q-text qu-display--block qu-wordBreak--break-word qu-textAlign--start" data-dcnode-id="1995" style="box-sizing: border-box; margin-bottom: 1em; overflow-wrap: anywhere; direction: ltr;"><span data-dcnode-id="1996" style="font-weight: normal; font-style: normal; background: none;"><span data-dcnode-id="1997" instrument_node="">4. The sum, 1.618034, represents the most economical algorithm of Nature.</span></span></p><span data-dcnode-id="1994" instrument_node=""> </span><p class="q-text qu-display--block qu-wordBreak--break-word qu-textAlign--start" data-dcnode-id="1991" style="box-sizing: border-box; margin-bottom: 1em; overflow-wrap: anywhere; direction: ltr;"><span data-dcnode-id="1992" style="font-weight: normal; font-style: normal; background: none;"><span data-dcnode-id="1993" instrument_node="">5. 1.618034 is also represented as 38.1966% and 61.8934%.</span></span></p><span data-dcnode-id="1990" instrument_node=""> </span><p class="q-text qu-display--block qu-wordBreak--break-word qu-textAlign--start" data-dcnode-id="1987" style="box-sizing: border-box; margin-bottom: 1em; overflow-wrap: anywhere; direction: ltr;"><span data-dcnode-id="1988" style="font-weight: normal; font-style: normal; background: none;"><span data-dcnode-id="1989" instrument_node="">Now, let us explore, enumerate, and explain the application of the Divyank Ratio.</span></span></p><span data-dcnode-id="1986" instrument_node=""> </span><p class="q-text qu-display--block qu-wordBreak--break-word qu-textAlign--start" data-dcnode-id="1983" style="box-sizing: border-box; margin-bottom: 1em; overflow-wrap: anywhere; direction: ltr;"><span data-dcnode-id="1984" style="font-weight: bold; font-style: normal; background: none;"><span data-dcnode-id="1985" instrument_node="">1. The Human Respiratory System: Objective.</span></span></p><span data-dcnode-id="1982" instrument_node=""> </span><p class="q-text qu-display--block qu-wordBreak--break-word qu-textAlign--start" data-dcnode-id="1979" style="box-sizing: border-box; margin-bottom: 1em; overflow-wrap: anywhere; direction: ltr;"><span data-dcnode-id="1980" style="font-weight: normal; font-style: normal; background: none;"><span data-dcnode-id="1981" instrument_node="">The first objective of the human respiratory system is to absorb vital oxygen gas from the atmosphere for the vital metabolic functions of the hundred trillion cells of the human body.</span></span></p><span data-dcnode-id="1978" instrument_node=""> </span><p class="q-text qu-display--block qu-wordBreak--break-word qu-textAlign--start" data-dcnode-id="1975" style="box-sizing: border-box; margin-bottom: 1em; overflow-wrap: anywhere; direction: ltr;"><span data-dcnode-id="1976" style="font-weight: normal; font-style: normal; background: none;"><span data-dcnode-id="1977" instrument_node="">The second objective of the human respiratory system is to expel 61.8034% of the harmful carbon dioxide from the body.</span></span></p><span data-dcnode-id="1974" instrument_node=""> </span><p class="q-text qu-display--block qu-wordBreak--break-word qu-textAlign--start" data-dcnode-id="1971" style="box-sizing: border-box; margin-bottom: 1em; overflow-wrap: anywhere; direction: ltr;"><span data-dcnode-id="1972" style="font-weight: normal; font-style: normal; background: none;"><span data-dcnode-id="1973" instrument_node="">The remaining 38.1966% of the carbon dioxide is required for many vital metabolic functions of the body, like, the formation of hydrochloric acid in the stomach and kidneys.</span></span></p><span data-dcnode-id="1970" instrument_node=""> </span><p class="q-text qu-display--block qu-wordBreak--break-word qu-textAlign--start" data-dcnode-id="1967" style="box-sizing: border-box; margin-bottom: 1em; overflow-wrap: anywhere; direction: ltr;"><span data-dcnode-id="1968" style="font-weight: bold; font-style: normal; background: none;"><span data-dcnode-id="1969" instrument_node="">2. The Respiration Process:</span></span></p><span data-dcnode-id="1966" instrument_node=""> </span><p class="q-text qu-display--block qu-wordBreak--break-word qu-textAlign--start" data-dcnode-id="1963" style="box-sizing: border-box; margin-bottom: 1em; overflow-wrap: anywhere; direction: ltr;"><span data-dcnode-id="1964" style="font-weight: normal; font-style: normal; background: none;"><span data-dcnode-id="1965" instrument_node="">The integrated act of respiration consists of the following two processes,</span></span></p><span data-dcnode-id="1962" instrument_node=""> </span><p class="q-text qu-display--block qu-wordBreak--break-word qu-textAlign--start" data-dcnode-id="1959" style="box-sizing: border-box; margin-bottom: 1em; overflow-wrap: anywhere; direction: ltr;"><span data-dcnode-id="1960" style="font-weight: bold; font-style: normal; background: none;"><span data-dcnode-id="1961" instrument_node="">1. The Inspiration:</span></span></p><span data-dcnode-id="1958" instrument_node=""> </span><p class="q-text qu-display--block qu-wordBreak--break-word qu-textAlign--start" data-dcnode-id="1955" style="box-sizing: border-box; margin-bottom: 1em; overflow-wrap: anywhere; direction: ltr;"><span data-dcnode-id="1956" style="font-weight: normal; font-style: normal; background: none;"><span data-dcnode-id="1957" instrument_node="">It is an active process and lasts for 38.1966% of the respiration time.</span></span></p><span data-dcnode-id="1954" instrument_node=""> </span><p class="q-text qu-display--block qu-wordBreak--break-word qu-textAlign--start" data-dcnode-id="1951" style="box-sizing: border-box; margin-bottom: 1em; overflow-wrap: anywhere; direction: ltr;"><span data-dcnode-id="1952" style="font-weight: bold; font-style: normal; background: none;"><span data-dcnode-id="1953" instrument_node="">2. The Expiration:</span></span></p><span data-dcnode-id="1950" instrument_node=""> </span><p class="q-text qu-display--block qu-wordBreak--break-word qu-textAlign--start" data-dcnode-id="1947" style="box-sizing: border-box; margin-bottom: 1em; overflow-wrap: anywhere; direction: ltr;"><span data-dcnode-id="1948" style="font-weight: normal; font-style: normal; background: none;"><span data-dcnode-id="1949" instrument_node="">It is a passive process and lasts for 61.8034% of the respiration time.</span></span></p><span data-dcnode-id="1946" instrument_node=""> </span><p class="q-text qu-display--block qu-wordBreak--break-word qu-textAlign--start" data-dcnode-id="1943" style="box-sizing: border-box; margin-bottom: 1em; overflow-wrap: anywhere; direction: ltr;"><span data-dcnode-id="1944" style="font-weight: bold; font-style: normal; background: none;"><span data-dcnode-id="1945" instrument_node="">The Calculation:</span></span></p><span data-dcnode-id="1942" instrument_node=""> </span><p class="q-text qu-display--block qu-wordBreak--break-word qu-textAlign--start" data-dcnode-id="1939" style="box-sizing: border-box; margin-bottom: 1em; overflow-wrap: anywhere; direction: ltr;"><span data-dcnode-id="1940" style="font-weight: normal; font-style: normal; background: none;"><span data-dcnode-id="1941" instrument_node="">When we breathe for twelve times in a minute, the inspiration lasts for approximately 2 seconds and the expiration lasts for approximately 3 seconds.</span></span></p><span data-dcnode-id="1938" instrument_node=""> </span><p class="q-text qu-display--block qu-wordBreak--break-word qu-textAlign--start" data-dcnode-id="1935" style="box-sizing: border-box; margin-bottom: 1em; overflow-wrap: anywhere; direction: ltr;"><span data-dcnode-id="1936" style="font-weight: normal; font-style: normal; background: none;"><span data-dcnode-id="1937" instrument_node="">The ratio of 2:3 is called Divyank Ratio.</span></span></p><span data-dcnode-id="1934" instrument_node=""> </span><p class="q-text qu-display--block qu-wordBreak--break-word qu-textAlign--start" data-dcnode-id="1931" style="box-sizing: border-box; margin-bottom: 1em; overflow-wrap: anywhere; direction: ltr;"><span data-dcnode-id="1932" style="font-weight: bold; font-style: normal; background: none;"><span data-dcnode-id="1933" instrument_node="">3. The Nervous System Control: Brainstem.</span></span></p><span data-dcnode-id="1930" instrument_node=""> </span><p class="q-text qu-display--block qu-wordBreak--break-word qu-textAlign--start" data-dcnode-id="1927" style="box-sizing: border-box; margin-bottom: 1em; overflow-wrap: anywhere; direction: ltr;"><span data-dcnode-id="1928" style="font-weight: normal; font-style: normal; background: none;"><span data-dcnode-id="1929" instrument_node="">1. The dorsal respiratory group of neuron cells in Medulla Oblongata:</span></span></p><span data-dcnode-id="1926" instrument_node=""> </span><p class="q-text qu-display--block qu-wordBreak--break-word qu-textAlign--start" data-dcnode-id="1923" style="box-sizing: border-box; margin-bottom: 1em; overflow-wrap: anywhere; direction: ltr;"><span data-dcnode-id="1924" style="font-weight: normal; font-style: normal; background: none;"><span data-dcnode-id="1925" instrument_node="">These control and regulate the diaphragm and the external intercostal muscles.</span></span></p><span data-dcnode-id="1922" instrument_node=""> </span><p class="q-text qu-display--block qu-wordBreak--break-word qu-textAlign--start" data-dcnode-id="1919" style="box-sizing: border-box; margin-bottom: 1em; overflow-wrap: anywhere; direction: ltr;"><span data-dcnode-id="1920" style="font-weight: normal; font-style: normal; background: none;"><span data-dcnode-id="1921" instrument_node="">2. The ventral respiratory group of neuron cells in Medulla Oblongata.</span></span></p><span data-dcnode-id="1918" instrument_node=""> </span><p class="q-text qu-display--block qu-wordBreak--break-word qu-textAlign--start" data-dcnode-id="1915" style="box-sizing: border-box; margin-bottom: 1em; overflow-wrap: anywhere; direction: ltr;"><span data-dcnode-id="1916" style="font-weight: normal; font-style: normal; background: none;"><span data-dcnode-id="1917" instrument_node="">These control and regulate the internal intercostals muscles and the accessory respiratory muscles.</span></span></p><span data-dcnode-id="1914" instrument_node=""> </span><p class="q-text qu-display--block qu-wordBreak--break-word qu-textAlign--start" data-dcnode-id="1911" style="box-sizing: border-box; margin-bottom: 1em; overflow-wrap: anywhere; direction: ltr;"><span data-dcnode-id="1912" style="font-weight: normal; font-style: normal; background: none;"><span data-dcnode-id="1913" instrument_node="">3. Pneomotaxic center in Pons.</span></span></p><span data-dcnode-id="1910" instrument_node=""> </span><p class="q-text qu-display--block qu-wordBreak--break-word qu-textAlign--start" data-dcnode-id="1907" style="box-sizing: border-box; margin-bottom: 1em; overflow-wrap: anywhere; direction: ltr;"><span data-dcnode-id="1908" style="font-weight: normal; font-style: normal; background: none;"><span data-dcnode-id="1909" instrument_node="">It activates the respiratory muscles and lasts for 38.1966% of the respiration time.</span></span></p><span data-dcnode-id="1906" instrument_node=""> </span><p class="q-text qu-display--block qu-wordBreak--break-word qu-textAlign--start" data-dcnode-id="1903" style="box-sizing: border-box; margin-bottom: 1em; overflow-wrap: anywhere; direction: ltr;"><span data-dcnode-id="1904" style="font-weight: normal; font-style: normal; background: none;"><span data-dcnode-id="1905" instrument_node="">4. Apneomotaxis center in Pons.</span></span></p><span data-dcnode-id="1902" instrument_node=""> </span><p class="q-text qu-display--block qu-wordBreak--break-word qu-textAlign--start" data-dcnode-id="1899" style="box-sizing: border-box; margin-bottom: 1em; overflow-wrap: anywhere; direction: ltr;"><span data-dcnode-id="1900" style="font-weight: normal; font-style: normal; background: none;"><span data-dcnode-id="1901" instrument_node="">It inhibits the respiratory muscles during expiration. It lasts for 61.8034% of the respiration time.</span></span></p><span data-dcnode-id="1898" instrument_node=""> </span><p class="q-text qu-display--block qu-wordBreak--break-word qu-textAlign--start" data-dcnode-id="1895" style="box-sizing: border-box; margin-bottom: 1em; overflow-wrap: anywhere; direction: ltr;"><span data-dcnode-id="1896" style="font-weight: bold; font-style: normal; background: none;"><span data-dcnode-id="1897" instrument_node="">4. The Lung Volumes and Capacities:</span></span></p><span data-dcnode-id="1894" instrument_node=""> </span><p class="q-text qu-display--block qu-wordBreak--break-word qu-textAlign--start" data-dcnode-id="1891" style="box-sizing: border-box; margin-bottom: 1em; overflow-wrap: anywhere; direction: ltr;"><span data-dcnode-id="1892" style="font-weight: normal; font-style: normal; background: none;"><span data-dcnode-id="1893" instrument_node="">The pulmonary function test is done with the help of spirometry.</span></span></p><span data-dcnode-id="1890" instrument_node=""> </span><p class="q-text qu-display--block qu-wordBreak--break-word qu-textAlign--start" data-dcnode-id="1887" style="box-sizing: border-box; margin-bottom: 1em; overflow-wrap: anywhere; direction: ltr;"><span data-dcnode-id="1888" style="font-weight: normal; font-style: normal; background: none;"><span data-dcnode-id="1889" instrument_node="">The graph is presented as,</span></span></p><span data-dcnode-id="1886" instrument_node=""> </span><p class="q-text qu-display--block qu-wordBreak--break-word qu-textAlign--start" data-dcnode-id="1883" style="box-sizing: border-box; margin-bottom: 1em; overflow-wrap: anywhere; direction: ltr;"><span data-dcnode-id="1884" style="font-weight: normal; font-style: normal; background: none;"><span data-dcnode-id="1885" instrument_node="">1. Tidal Volume: The amount of air breathed in without any effort. It is equal to 500ml.</span></span></p><span data-dcnode-id="1882" instrument_node=""> </span><p class="q-text qu-display--block qu-wordBreak--break-word qu-textAlign--start" data-dcnode-id="1879" style="box-sizing: border-box; margin-bottom: 1em; overflow-wrap: anywhere; direction: ltr;"><span data-dcnode-id="1880" style="font-weight: normal; font-style: normal; background: none;"><span data-dcnode-id="1881" instrument_node="">2. Inspiratory Reserve Volume: The maximum amount of air we can inspire during each breath. It is almost equal to 2500ml.</span></span></p><span data-dcnode-id="1878" instrument_node=""> </span><p class="q-text qu-display--block qu-wordBreak--break-word qu-textAlign--start" data-dcnode-id="1875" style="box-sizing: border-box; margin-bottom: 1em; overflow-wrap: anywhere; direction: ltr;"><span data-dcnode-id="1876" style="font-weight: normal; font-style: normal; background: none;"><span data-dcnode-id="1877" instrument_node="">3. Expiratory Reserve Volume: The maximum amount of air we can expel during each breath. It is almost equal to 800ml.</span></span></p><span data-dcnode-id="1874" instrument_node=""> </span><p class="q-text qu-display--block qu-wordBreak--break-word qu-textAlign--start" data-dcnode-id="1871" style="box-sizing: border-box; margin-bottom: 1em; overflow-wrap: anywhere; direction: ltr;"><span data-dcnode-id="1872" style="font-weight: normal; font-style: normal; background: none;"><span data-dcnode-id="1873" instrument_node="">4. Vital Capacity: The above three vital values are called vital capacity.</span></span></p><span data-dcnode-id="1870" instrument_node=""> </span><p class="q-text qu-display--block qu-wordBreak--break-word qu-textAlign--start" data-dcnode-id="1867" style="box-sizing: border-box; margin-bottom: 1em; overflow-wrap: anywhere; direction: ltr;"><span data-dcnode-id="1868" style="font-weight: normal; font-style: normal; background: none;"><span data-dcnode-id="1869" instrument_node="">5. The Residual Volume: The amount of the untouched lung capacity is called the residual volume. It is equal to 1200ml.</span></span></p><span data-dcnode-id="1866" instrument_node=""> </span><p class="q-text qu-display--block qu-wordBreak--break-word qu-textAlign--start" data-dcnode-id="1863" style="box-sizing: border-box; margin-bottom: 1em; overflow-wrap: anywhere; direction: ltr;"><span data-dcnode-id="1864" style="font-weight: normal; font-style: normal; background: none;"><span data-dcnode-id="1865" instrument_node="">6. The Functional Residual Volume: The expiratory reserve volume and the residual volume put together are called the functional residual capacity. This is equivalent to 38.1966% of the total lung capacity.</span></span></p><span data-dcnode-id="1862" instrument_node=""> </span><p class="q-text qu-display--block qu-wordBreak--break-word qu-textAlign--start" data-dcnode-id="1859" style="box-sizing: border-box; margin-bottom: 1em; overflow-wrap: anywhere; direction: ltr;"><span data-dcnode-id="1860" style="font-weight: normal; font-style: normal; background: none;"><span data-dcnode-id="1861" instrument_node="">These values are derived from the available sources of scientific evaluation of normal pulmonary functions.</span></span></p><span data-dcnode-id="1858" instrument_node=""> </span><p class="q-text qu-display--block qu-wordBreak--break-word qu-textAlign--start" data-dcnode-id="1855" style="box-sizing: border-box; margin-bottom: 1em; overflow-wrap: anywhere; direction: ltr;"><span data-dcnode-id="1856" style="font-weight: bold; font-style: normal; background: none;"><span data-dcnode-id="1857" instrument_node="">The Conclusion:</span></span></p><span data-dcnode-id="1854" instrument_node=""> </span><p class="q-text qu-display--block qu-wordBreak--break-word qu-textAlign--start" data-dcnode-id="1851" style="box-sizing: border-box; margin-bottom: 1em; overflow-wrap: anywhere; direction: ltr;"><span data-dcnode-id="1852" style="font-weight: normal; font-style: normal; background: none;"><span data-dcnode-id="1853" instrument_node="">During inspiration, the neuron cells in the brainstem fire gradually in step ladder manner for a period of 38.1966% of the total respiration time.</span></span></p><span data-dcnode-id="1850" instrument_node=""> </span><p class="q-text qu-display--block qu-wordBreak--break-word qu-textAlign--start" data-dcnode-id="1847" style="box-sizing: border-box; margin-bottom: 1em; overflow-wrap: anywhere; direction: ltr;"><span data-dcnode-id="1848" style="font-weight: normal; font-style: normal; background: none;"><span data-dcnode-id="1849" instrument_node="">During expiration, the neuron cells in the brain are inhibited fully for a period of 61.8034% of the total respiration time.</span></span></p><span data-dcnode-id="1846" instrument_node=""> </span><p class="q-text qu-display--block qu-wordBreak--break-word qu-textAlign--start" data-dcnode-id="1843" style="box-sizing: border-box; margin-bottom: 1em; overflow-wrap: anywhere; direction: ltr;"><span data-dcnode-id="1844" style="font-weight: normal; font-style: normal; background: none;"><span data-dcnode-id="1845" instrument_node="">For detailed knowledge, please download and read Akhand Sutra from Akhand Vidyashram.</span></span></p><span data-dcnode-id="1842" instrument_node=""> </span><p class="q-text qu-display--block qu-wordBreak--break-word qu-textAlign--start" data-dcnode-id="1839" style="box-sizing: border-box; margin-bottom: 0px; overflow-wrap: anywhere; direction: ltr;"><span data-dcnode-id="1840" style="font-weight: normal; font-style: normal; background: none;"><span data-dcnode-id="1841" instrument_node="">The eBook is free.</span></span></p></span></span></div></div></div></div></div></div></div><div class="q-box qu-zIndex--action_bar" data-dcnode-id="1767" style="box-sizing: border-box;"><div class="q-box ActionBar___StyledBox-sc-1tz1b8b-1 jxrrvA" data-dcnode-id="1768" style="box-sizing: border-box; transition-property: box-shadow; transition-duration: 250ms; transition-timing-function: ease-out;"><div class="q-flex qu-justifyContent--space-between qu-alignItems--center qu-flexWrap--nowrap qu-py--tiny" data-dcnode-id="1769" style="box-sizing: border-box; display: flex;"><div class="q-flex qu-alignItems--center" data-dcnode-id="1783" style="box-sizing: border-box; display: flex;"><div class="q-inlineFlex qu-mr--small" data-dcnode-id="1805" style="box-sizing: border-box; display: inline-flex;"><div class="q-inlineFlex qu-borderRadius--pill qu-alignItems--center" data-dcnode-id="1806" style="box-sizing: border-box; display: inline-flex; background-color: rgba(0, 0, 1, 0.03);"><div class="q-box qu-display--inline-block" data-dcnode-id="1816" style="box-sizing: border-box; pointer-events: all;"><div class="q-relative puppeteer_popper_reference ="font-weight: normal; font-style: normal; background: none;"><span data-dcnode-id="1588" instrument_node=""> at the molecular level for oxygen. My recollection is that normally 3 atoms (or molecules) are carried and 1 is used leaving the 2 extra.</span></span></p><span data-dcnode-id="1585" instrument_node=""> </span><p class="q-text qu-display--block qu-wordBreak--break-word qu-textAlign--start" data-dcnode-id="1582" style="box-sizing: border-box; margin-bottom: 1em; overflow-wrap: anywhere; direction: ltr;"><span data-dcnode-id="1583" style="font-weight: normal; font-style: normal; background: none;"><span data-dcnode-id="1584" instrument_node="">The people who live at higher elevations are generally shorter than those who live at sea-level. And physicians are warned about women giving birth at altitude so sometimes expectant mothers are moved to lower elevations. Human bone density is slightly higher.</span></span></p><span data-dcnode-id="1581" instrument_node=""> </span><p class="q-text qu-display--block qu-wordBreak--break-word qu-textAlign--start" data-dcnode-id="1570" style="box-sizing: border-box; margin-bottom: 1em; overflow-wrap: anywhere; direction: ltr;"><span data-dcnode-id="1579" style="font-weight: normal; font-style: normal; background: none;"><span data-dcnode-id="1580" instrument_node="">Some altitude isn't bad for making extra blood cells. The </span></span><a class="q-box qu-cursor--pointer qu-hover--textDecoration--underline Link___StyledBox-t2xg9c-0 KlcoI" data-dcnode-id="1577" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.quora.com/topic/1968-Summer-Olympics-in-Mexico-City" style="box-sizing: border-box; position: relative; border-radius: inherit; font-weight: normal; font-style: normal; background: none;" target="_top" title="www.quora.com"><span data-dcnode-id="1578" instrument_node="">1968 Summer Olympics in Mexico City</span></a><span data-dcnode-id="1575" style="font-weight: normal; font-style: normal; background: none;"><span data-dcnode-id="1576" instrument_node=""> was the first held at a high altitude (generally defined as starting about 8,000 feet (about 75% sea-level O2). This was when the performance of </span></span><a class="q-box qu-cursor--pointer qu-hover--textDecoration--underline Link___StyledBox-t2xg9c-0 KlcoI" data-dcnode-id="1573" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.quora.com/topic/Kenyan-Runners" style="box-sizing: border-box; position: relative; border-radius: inherit; font-weight: normal; font-style: normal; background: none;" target="_top" title="www.quora.com"><span data-dcnode-id="1574" instrument_node="">Kenyan Runners</span></a><span data-dcnode-id="1571" style="font-weight: normal; font-style: normal; background: none;"><span data-dcnode-id="1572" instrument_node=""> came to light. Since that time a number of locations of US athletes Olympic training started at 5,000 to 7,000 foot elevation (independent of skiing which is generally higher anyway).</span></span></p><span data-dcnode-id="1569" instrument_node=""> </span><p class="q-text qu-display--block qu-wordBreak--break-word qu-textAlign--start" data-dcnode-id="1562" style="box-sizing: border-box; margin-bottom: 1em; overflow-wrap: anywhere; direction: ltr;"><span data-dcnode-id="1567" style="font-weight: normal; font-style: normal; background: none;"><span data-dcnode-id="1568" instrument_node="">Charlie Houston was the grand old man studying altitude in the USA. And I was once a test subject for Herb Hultgren (a cardiologist) in one study. Herb's </span></span><a class="q-box qu-cursor--pointer qu-hover--textDecoration--underline Link___StyledBox-t2xg9c-0 KlcoI" data-dcnode-id="1565" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.quora.com/topic/Isuzu-Trooper" style="box-sizing: border-box; position: relative; border-radius: inherit; font-weight: normal; font-style: normal; background: none;" target="_top" title="www.quora.com"><span data-dcnode-id="1566" instrument_node="">Isuzu Trooper</span></a><span data-dcnode-id="1563" style="font-weight: normal; font-style: normal; background: none;"><span data-dcnode-id="1564" instrument_node=""> so impressed me, that 2 years later when I needed a new car, I bought one.</span></span></p><span data-dcnode-id="1561" instrument_node=""> </span><p class="q-text qu-display--block qu-wordBreak--break-word qu-textAlign--start" data-dcnode-id="1558" style="box-sizing: border-box; margin-bottom: 1em; overflow-wrap: anywhere; direction: ltr;"><span data-dcnode-id="1559" style="font-weight: normal; font-style: normal; background: none;"><span data-dcnode-id="1560" instrument_node="">I'm leaving a lot off like portable demand diluter oxgyen systems for temporary use; experiences by astronomer friends (you might not want to hear some of these). The above is all from memory, but more work needs to be done because there isn't a lot of money funding this kind of work since most people live closer to sea-level. (Herb had some unique reasons for getting funding.)</span></span></p><span data-dcnode-id="1557" instrument_node=""> </span><p class="q-text qu-display--block qu-wordBreak--break-word qu-textAlign--start" data-dcnode-id="1552" style="box-sizing: border-box; margin-bottom: 0px; overflow-wrap: anywhere; direction: ltr;"><a class="q-box qu-cursor--pointer qu-hover--textDecoration--underline Link___StyledBox-t2xg9c-0 KlcoI" data-dcnode-id="1555" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.quora.com/topic/Sir-Edmund-Hillary" style="box-sizing: border-box; position: relative; border-radius: inherit; font-weight: normal; font-style: normal; background: none;" target="_top" title="www.quora.com"><span data-dcnode-id="1556" instrument_node="">Sir Edmund Hillary</span></a><span data-dcnode-id="1553" style="font-weight: normal; font-style: normal; background: none;"><span data-dcnode-id="1554" instrument_node="">, in the decade following his Everest ascent, ran expeditions which over-wintered South of Everest around Barutse, and even made the first winter Makalu attempt, with the expressed purpose to study human high altitude physiology. This was late 1950s, early 1960s. Much of what was studied about altitude, elevation, and winter, came from these expeditions. But West's book is more current.</span></span></p></span></span></div></div></div></div></div></div></div><div class="q-box qu-zIndex--action_bar" data-dcnode-id="1475" style="box-sizing: border-box;"><div class="q-box ActionBar___StyledBox-sc-1tz1b8b-1 jxrrvA" data-dcnode-id="1476" style="box-sizing: border-box; transition-property: box-shadow; transition-duration: 250ms; transition-timing-function: ease-out;"><div class="q-flex qu-justifyContent--space-between qu-alignItems--center qu-flexWrap--nowrap qu-py--tiny" data-dcnode-id="1477" style="box-sizing: border-box; display: flex;"><div class="q-flex qu-alignItems--center" data-dcnode-id="1491" style="box-sizing: border-box; display: flex;"><div class="q-inlineFlex qu-mr--small" data-dcnode-id="1518" style="box-sizing: border-box; display: inline-flex;"><div class="q-inlineFlex qu-borderRadius--pill qu-alignItems--center" data-dcnode-id="1519" style="box-sizing: border-box; display: inline-flex; background-color: rgba(0, 0, 1, 0.03);"><div class="q-box qu-display--inline-block" data-dcnode-id="1529" style="box-sizing: border-box; pointer-events: all;"><div class="q-relative puppeteer_popper_reference" data-dcnode-id="1530" style="box-sizing: border-box; position: relative;"><button aria-label="7 upvotes" class="q-click-wrapper ClickWrapper___StyledClickWrapperBox-zoqi4f-0 bIwtPb base___StyledClickWrapper-lx6eke-1 eqENAR undefined qu-borderTopLeftRadius--pill qu-borderBottomLeftRadius--pill qu-alignItems--center qu-justifyContent--center qu-whiteSpace--nowrap qu-userSelect--none qu-display--inline-flex qu-tapHighlight--white qu-textAlign--center qu-cursor--pointer q cnode-id="667" style="box-sizing: border-box;"><div class="q-text" data-dcnode-id="668" style="box-sizing: border-box; max-width: 100%;"><span class="CssComponent__CssInlineComponent-sc-1oskqb9-1 UserSelectableText___StyledCssInlineComponent-lsmoq4-0 kghFzc" data-dcnode-id="669"><span class="q-box qu-userSelect--text" data-dcnode-id="670" style="box-sizing: border-box;"><ul class="q-box" data-dcnode-id="749" style="box-sizing: border-box; direction: ltr; overflow-wrap: break-word; list-style: disc; margin-bottom: 1em; margin-right: 2em;"><li class="q-relative" data-dcnode-id="750" style="box-sizing: border-box; position: relative; margin-left: 2em; padding-bottom: 0px;"><span data-dcnode-id="751" style="font-weight: bold; font-style: normal; background: none;"><span data-dcnode-id="752" instrument_node="">Living healthier at higher elevations</span></span></li></ul><div class="q-box qu-mx--n_medium" data-dcnode-id="746" style="box-sizing: border-box;"><div class="q-box" data-dcnode-id="747" style="box-sizing: border-box; position: relative; margin-bottom: 1em; transition-property: undefined; transition-duration: 1s; transition-timing-function: ease-out; filter: blur(0px);"><img class="q-image qu-cursor--default qu-display--block" data-dcnode-id="748" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//qph.fs.quoracdn.net/main-qimg-9fa6a2ba42270a4b03f54fcfb59fb68a-lq&amp;raw" style="box-sizing: border-box; max-width: 100%; margin-left: auto; margin-right: auto;"></div></div><p class="q-text qu-display--block qu-wordBreak--break-word qu-textAlign--start" data-dcnode-id="743" style="box-sizing: border-box; margin-bottom: 1em; overflow-wrap: anywhere; direction: ltr;"><span data-dcnode-id="744" style="font-weight: normal; font-style: normal; background: none;"><span data-dcnode-id="745" instrument_node="">Living healthier at higher elevations</span></span></p><span data-dcnode-id="742" instrument_node=""> </span><p class="q-text qu-display--block qu-wordBreak--break-word qu-textAlign--start" data-dcnode-id="739" style="box-sizing: border-box; margin-bottom: 1em; overflow-wrap: anywhere; direction: ltr;"><span data-dcnode-id="740" style="font-weight: normal; font-style: normal; background: none;"><span data-dcnode-id="741" instrument_node="">magine a place where you can be thinner, where your risk of heart and lung disease is less, where you'd be just all-around healthier. There is such a place.</span></span></p><span data-dcnode-id="738" instrument_node=""> </span><p class="q-text qu-display--block qu-wordBreak--break-word qu-textAlign--start" data-dcnode-id="735" style="box-sizing: border-box; margin-bottom: 1em; overflow-wrap: anywhere; direction: ltr;"><span data-dcnode-id="736" style="font-weight: normal; font-style: normal; background: none;"><span data-dcnode-id="737" instrument_node="">Let's call it Colorado. Or Nepal. Or Peru. Anyplace with mountains.</span></span></p><span data-dcnode-id="734" instrument_node=""> </span><p class="q-text qu-display--block qu-wordBreak--break-word qu-textAlign--start" data-dcnode-id="731" style="box-sizing: border-box; margin-bottom: 1em; overflow-wrap: anywhere; direction: ltr;"><span data-dcnode-id="732" style="font-weight: normal; font-style: normal; background: none;"><span data-dcnode-id="733" instrument_node="">Recent studies have indicated that there are definite health benefits to living at altitude.</span></span></p><span data-dcnode-id="730" instrument_node=""> </span><p class="q-text qu-display--block qu-wordBreak--break-word qu-textAlign--start" data-dcnode-id="727" style="box-sizing: border-box; margin-bottom: 1em; overflow-wrap: anywhere; direction: ltr;"><span data-dcnode-id="728" style="font-weight: normal; font-style: normal; background: none;"><span data-dcnode-id="729" instrument_node="">Start with obesity.</span></span></p><span data-dcnode-id="726" instrument_node=""> </span><p class="q-text qu-display--block qu-wordBreak--break-word qu-textAlign--start" data-dcnode-id="723" style="box-sizing: border-box; margin-bottom: 1em; overflow-wrap: anywhere; direction: ltr;"><span data-dcnode-id="724" style="font-weight: normal; font-style: normal; background: none;"><span data-dcnode-id="725" instrument_node="">"We've known since the 1920s (that) if you go to really high altitudes you will lose weight," says Robert Roach, director of the Altitude Research Center in Aurora, Colo., which studies how hypoxia, a lack of oxygen, affects health and performance. "It was one of the major concerns when the British were trying to figure out how to climb Mount Everest, how to get enough calories to survive. There's been no exception to this finding. Every expedition that's gone to high altitude, people have lost weight."</span></span></p><span data-dcnode-id="722" instrument_node=""> </span><p class="q-text qu-display--block qu-wordBreak--break-word qu-textAlign--start" data-dcnode-id="719" style="box-sizing: border-box; margin-bottom: 1em; overflow-wrap: anywhere; direction: ltr;"><span data-dcnode-id="720" style="font-weight: normal; font-style: normal; background: none;"><span data-dcnode-id="721" instrument_node="">Even when test subjects were placed in an altitude chamber for 40 days and allowed to eat whatever they wanted, they lost significant weight.</span></span></p><span data-dcnode-id="718" instrument_node=""> </span><p class="q-text qu-display--block qu-wordBreak--break-word qu-textAlign--start" data-dcnode-id="715" style="box-sizing: border-box; margin-bottom: 1em; overflow-wrap: anywhere; direction: ltr;"><span data-dcnode-id="716" style="font-weight: normal; font-style: normal; background: none;"><span data-dcnode-id="717" instrument_node="">Because obesity can lead to a host of other problems — diabetes, heart and lung issues — keeping the weight off can only help.</span></span></p><span data-dcnode-id="714" instrument_node=""> </span><p class="q-text qu-display--block qu-wordBreak--break-word qu-textAlign--start" data-dcnode-id="711" style="box-sizing: border-box; margin-bottom: 1em; overflow-wrap: anywhere; direction: ltr;"><span data-dcnode-id="712" style="font-weight: normal; font-style: normal; background: none;"><span data-dcnode-id="713" instrument_node="">Colorado is a good example.</span></span></p><span data-dcnode-id="710" instrument_node=""> </span><p class="q-text qu-display--block qu-wordBreak--break-word qu-textAlign--start" data-dcnode-id="707" style="box-sizing: border-box; margin-bottom: 1em; overflow-wrap: anywhere; direction: ltr;"><span data-dcnode-id="708" style="font-weight: normal; font-style: normal; background: none;"><span data-dcnode-id="709" instrument_node="">A report released in July by the Robert Wood Johnson Foundation, a nonprofit group that focuses on health issues, found that Colorado had the lowest obesity rate (19.8 percent) in the U.S. It was the only state under 20 percent. It's also a healthy state, with lower rates of heart disease, diabetes and some cancers.</span></span></p><span data-dcnode-id="706" instrument_node=""> </span><p class="q-text qu-display--block qu-wordBreak--break-word qu-textAlign--start" data-dcnode-id="703" style="box-sizing: border-box; margin-bottom: 1em; overflow-wrap: anywhere; direction: ltr;"><span data-dcnode-id="704" style="font-weight: normal; font-style: normal; background: none;"><span data-dcnode-id="705" instrument_node="">Roach says there are two schools of thought. Perhaps, purely by chance, a lot of active, healthy people have settled in Colorado. But there are several other states — California, Oregon, Washington — where an outdoors lifestyle is prevalent and where people are active, and those states are losing ground in the battle of the bulge.</span></span></p><span data-dcnode-id="702" instrument_node=""> </span><p class="q-text qu-display--block qu-wordBreak--break-word qu-textAlign--start" data-dcnode-id="699" style="box-sizing: border-box; margin-bottom: 1em; overflow-wrap: anywhere; direction: ltr;"><span data-dcnode-id="700" style="font-weight: normal; font-style: normal; background: none;"><span data-dcnode-id="701" instrument_node="">What Colorado has that those other states don't is altitude. With an average altitude of 6,800 feet above sea level, it's the highest state in the U.S.</span></span></p><span data-dcnode-id="698" instrument_node=""> </span><p class="q-text qu-display--block qu-wordBreak--break-word qu-textAlign--start" data-dcnode-id="695" style="box-sizing: border-box; margin-bottom: 1em; overflow-wrap: anywhere; direction: ltr;"><span data-dcnode-id="696" style="font-weight: normal; font-style: normal; background: none;"><span data-dcnode-id="697" instrument_node="">A study published this year in the Journal of Epidemiology and Community Health found that living at higher altitude may have a protective effect on ischemic heart disease. Researchers note that Colorado has the nation's lowest death rate from heart disease and has lower rates of lung and colon cancer.</span></span></p><span data-dcnode-id="694" instrument_node=""> </span><p class="q-text qu-display--block qu-wordBreak--break-word qu-textAlign--start" data-dcnode-id="691" style="box-sizing: border-box; margin-bottom: 1em; overflow-wrap: anywhere; direction: ltr;"><span data-dcnode-id="692" style="font-weight: normal; font-style: normal; background: none;"><span data-dcnode-id="693" instrument_node="">The findings echoed a study published in the journal in 2004. Researchers studied villages in Greece and found total and coronary mortality were lower for residents of a mountainous village in comparison with residents of two lowland villages.</span></span></p><span data-dcnode-id="690" instrument_node=""> </span><p class="q-text qu-display--block qu-wordBreak--break-word qu-textAlign--start" data-dcnode-id="687" style="box-sizing: border-box; margin-bottom: 1em; overflow-wrap: anywhere; direction: ltr;"><span data-dcnode-id="688" style="font-weight: normal; font-style: normal; background: none;"><span data-dcnode-id="689" instrument_node="">"If you look at people who live at high altitude around the world, incidents of most types of heart disease and stroke are much less," Roach says.</span></span></p><span data-dcnode-id="686" instrument_node=""> </span><p class="q-text qu-display--block qu-wordBreak--break-word qu-textAlign--start" data-dcnode-id="683" style="box-sizing: border-box; margin-bottom: 1em; overflow-wrap: anywhere; direction: ltr;"><span data-dcnode-id="684" style="font-weight: normal; font-style: normal; background: none;"><span data-dcnode-id="685" instrument_node="">Altitude is not a panacea, of course. The risk of skin cancer is higher because ultraviolet intensity is greater at higher elevations. And the lung disease statistics may be skewed by the fact that people with lung issues may leave the state because of the thin air, which makes breathing more difficult.</span></span></p><span data-dcnode-id="682" instrument_node=""> </span><p class="q-text qu-display--block qu-wordBreak--break-word qu-textAlign--start" data-dcnode-id="679" style="box-sizing: border-box; margin-bottom: 1em; overflow-wrap: anywhere; direction: ltr;"><span data-dcnode-id="680" style="font-weight: normal; font-style: normal; background: none;"><span data-dcnode-id="681" instrument_node="">But there's something there, and ongoing research could benefit those even at sea level.</span></span></p><span data-dcnode-id="678" instrument_node=""> </span><p class="q-text qu-display--block qu-wordBreak--break-word qu-textAlign--start" data-dcnode-id="675" style="box-sizing: border-box; margin-bottom: 1em; overflow-wrap: anywhere; direction: ltr;"><span data-dcnode-id="676" style="font-weight: normal; font-style: normal; background: none;"><span data-dcnode-id="677" instrument_node="">"By studying healthy people and how they adjust (to asphyxia), we might be able to come up with drugs that will help (people with heart, lung and blood diseases) use oxygen more efficiently, to use less of it," Roach says. "We learn about how people at high altitude live, but we may learn things that will help others in the future. It's very exciting."</span></span></p><div class="q-box qu-mx--n_medium" data-dcnode-id="671" style="box-sizing: border-box;"><div class="q-relative qu-cursor--pointer" data-dcnode-id="672" data-embed-type="youtube" style="box-sizing: border-box; position: relative; margin-bottom: 1em;" type="youtube"><div class="q-box qu-bg--gray_ultralight" data-dcnode-id="674" style="box-sizing: border-box; background-image: url(&quot;https://img.youtube.com/vi/hER6W4lMKd0/0.jpg&quot;); width: 100%; box-shadow: rgba(0, 0, 0, 0.05) 0px 0px 0px 1px inset; transition-property: background-image; transition-duration: 180ms; transition-timing-function: ease-in-out; background-position: center center; background-size: cover; background-repeat: no-repeat; padding-top: 56.25%;" width="100%"></div><div class="q-absolute qu-full qu-zIndex--qtext_overlay" data-dcnode-id="673" style="box-sizing: border-box; position: absolute; pointer-events: none; background: url(&quot;/static/ans_frontend_assets/images/play3.png&quot;) center center no-repeat transparent;"></div></div></div></span></span></div></div></div></div></div></div></div><div class="q-box qu-zIndex--action_bar" data-dcnode-id="599" style="box-sizing: border-box;"><div class="q-box ActionBar___StyledBox-sc-1tz1b8b-1 jxrrvA" data-dcnode-id="600" style="box-sizing: border-box; transition-property: box-shadow; transition-duration: 250ms; transition-timing-function: ease-out;"><div class="q-flex qu-justifyContent--space-between qu-alignItems--center qu-flexWrap--nowrap qu-py--tiny" data-dcnode-id="601" style="box-sizing: border-box; display: flex;"><div class="q-flex qu-alignItems--center" data-dcnode-id="615" style="box-sizing: border-box; display: flex;"><div class="q-inlineFlex qu-mr--small" data-dcnode-id="637" style="box-sizing: border-box; display: inline-flex;"><div c
