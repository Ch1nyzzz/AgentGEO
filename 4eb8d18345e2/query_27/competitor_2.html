</span><div data-dcnode-id="1125"><span data-dcnode-id="1126"><span data-dcnode-id="1127"><b data-dcnode-id="1138"><span data-dcnode-id="1139" instrument_node="">Increasing</span></b><span data-dcnode-id="1137" instrument_node=""> the amount of haemoglobin in the blood </span><b data-dcnode-id="1135"><span data-dcnode-id="1136" instrument_node="">increases</span></b><span data-dcnode-id="1134" instrument_node=""> the amount of oxygen that </span><b data-dcnode-id="1132"><span data-dcnode-id="1133" instrument_node="">can</span></b><span data-dcnode-id="1131" instrument_node=""> be carried. The following physiological variables decrease the affinity of haemoglobin for oxygen, so they cause the curve to shift to the right: H+, temperature, CO2, and a substance called </span><b data-dcnode-id="1129"><span data-dcnode-id="1130" instrument_node="">2,3 DPG</span></b><span data-dcnode-id="1128" instrument_node="">.</span></span></span></div><br data-dcnode-id="1124"><p data-dcnode-id="1117"><a class="lc" data-dcnode-id="1122" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//findanyanswer.com/goto/27061" rel="nofollow" target="_blank"><span data-dcnode-id="1123" instrument_node="">Click to see full answer </span></a><span data-dcnode-id="1121" instrument_node=""> </span><br data-dcnode-id="1120"><br data-dcnode-id="1119"><span data-dcnode-id="1118" instrument_node=""> Consequently,  what is the role of DPG in high altitude adaptation?</span></p><p data-dcnode-id="1098"><span data-dcnode-id="1099"><span data-dcnode-id="1100"><span data-dcnode-id="1116" instrument_node="">Accordingly, the main </span><b data-dcnode-id="1114"><span data-dcnode-id="1115" instrument_node="">role</span></b><span data-dcnode-id="1113" instrument_node=""> of the 2,3-</span><b data-dcnode-id="1111"><span data-dcnode-id="1112" instrument_node="">DPG</span></b><span data-dcnode-id="1110" instrument_node=""> change </span><b data-dcnode-id="1108"><span data-dcnode-id="1109" instrument_node="">at high altitude</span></b><span data-dcnode-id="1107" instrument_node=""> (and also in acid-base disorders) is to maintain the oxygen dissociation curve of human blood </span><b data-dcnode-id="1105"><span data-dcnode-id="1106" instrument_node="">at</span></b><span data-dcnode-id="1104" instrument_node=""> (or near) its original position. This conclusion seems to be valid for man resting </span><b data-dcnode-id="1102"><span data-dcnode-id="1103" instrument_node="">at altitudes</span></b><span data-dcnode-id="1101" instrument_node=""> up to 7000 m.</span></span></span></p><p data-dcnode-id="1078"><span data-dcnode-id="1097" instrument_node="">Beside above,  what is the function of 2/3 DPG? </span><span data-dcnode-id="1079"><span data-dcnode-id="1080"><span data-dcnode-id="1096" instrument_node="">…the blood), carbon dioxide, and </span><b data-dcnode-id="1094"><span data-dcnode-id="1095" instrument_node="">2,3</span></b><span data-dcnode-id="1093" instrument_node="">-</span><b data-dcnode-id="1091"><span data-dcnode-id="1092" instrument_node="">diphosphoglycerate</span></b><span data-dcnode-id="1090" instrument_node=""> (</span><b data-dcnode-id="1088"><span data-dcnode-id="1089" instrument_node="">2,3</span></b><span data-dcnode-id="1087" instrument_node="">-</span><b data-dcnode-id="1085"><span data-dcnode-id="1086" instrument_node="">DPG</span></b><span data-dcnode-id="1084" instrument_node="">; a salt in red blood cells that plays a </span><b data-dcnode-id="1082"><span data-dcnode-id="1083" instrument_node="">role</span></b><span data-dcnode-id="1081" instrument_node=""> in liberating oxygen from hemoglobin in the peripheral circulation). These substances do not bind to hemoglobin at the oxygen-binding sites.</span></span></span></p><p data-dcnode-id="1076"><span data-dcnode-id="1077" instrument_node=""> Correspondingly,  why does Bpg increase at high altitudes?</span></p><p data-dcnode-id="1056"><span data-dcnode-id="1075" instrument_node=""> </span><span data-dcnode-id="1057"><span data-dcnode-id="1058"><span data-dcnode-id="1074" instrument_node="">2,3 Bisphosphoglycerate (2,3-</span><b data-dcnode-id="1072"><span data-dcnode-id="1073" instrument_node="">BPG</span></b><span data-dcnode-id="1071" instrument_node="">) stabilizes the T- (taut; oxygen unbound) form of haemoglobin thereby reducing its affinity to bind to oxygen. 2,3-</span><b data-dcnode-id="1069"><span data-dcnode-id="1070" instrument_node="">BPG</span></b><span data-dcnode-id="1068" instrument_node=""> is found to be elevated in people living at </span><b data-dcnode-id="1066"><span data-dcnode-id="1067" instrument_node="">high altitudes</span></b><span data-dcnode-id="1065" instrument_node="">. However, haemoglobin content also </span><b data-dcnode-id="1063"><span data-dcnode-id="1064" instrument_node="">increases</span></b><span data-dcnode-id="1062" instrument_node=""> so that </span><b data-dcnode-id="1060"><span data-dcnode-id="1061" instrument_node="">higher</span></b><span data-dcnode-id="1059" instrument_node=""> amounts of oxygen can be captured.</span></span></span></p><p data-dcnode-id="1054"><span data-dcnode-id="1055" instrument_node="">How does altitude affect your body?</span></p><p data-dcnode-id="1040"><span data-dcnode-id="1053" instrument_node="">Within the first few hours of </span><b data-dcnode-id="1051"><span data-dcnode-id="1052" instrument_node="">altitude</span></b><span data-dcnode-id="1050" instrument_node=""> exposure, water loss also increases, which can result in dehydration. </span><b data-dcnode-id="1048"><span data-dcnode-id="1049" instrument_node="">Altitude</span></b><span data-dcnode-id="1047" instrument_node=""> can also increase </span><b data-dcnode-id="1045"><span data-dcnode-id="1046" instrument_node="">your</span></b><span data-dcnode-id="1044" instrument_node=""> metabolism while suppressing </span><b data-dcnode-id="1042"><span data-dcnode-id="1043" instrument_node="">your</span></b><span data-dcnode-id="1041" instrument_node=""> appetite, meaning you'll have to eat more than you feel like to maintain a neutral energy balance.</span></p><span data-dcnode-id="1039" instrument_node=""> </span></div><span data-dcnode-id="1037" instrument_node="">

</span><p data-dcnode-id="1012" style="display:inline;"></p><div data-dcnode-id="996"><span data-dcnode-id="997"><span data-dcnode-id="998"><span data-dcnode-id="1011" instrument_node="">The medication acetazolamide can reduce symptoms of </span><b data-dcnode-id="1009"><span data-dcnode-id="1010" instrument_node="">altitude</span></b><span data-dcnode-id="1008" instrument_node=""> sickness and </span><b data-dcnode-id="1006"><span data-dcnode-id="1007" instrument_node="">help</span></b><span data-dcnode-id="1005" instrument_node=""> improve labored </span><b data-dcnode-id="1003"><span data-dcnode-id="1004" instrument_node="">breathing</span></b><span data-dcnode-id="1002" instrument_node="">. You may also be given the steroid dexamethasone. Other treatments include a lung inhaler, </span><b data-dcnode-id="1000"><span data-dcnode-id="1001" instrument_node="">high</span></b><span data-dcnode-id="999" instrument_node=""> blood pressure medication (nifedipine), and a phosphodiesterase inhibitor medication.</span></span></span></div><p data-dcnode-id="995"></p><span data-dcnode-id="994" instrument_node="">

</span><p data-dcnode-id="976" style="display:inline;"></p><div data-dcnode-id="960"><span data-dcnode-id="961"><span data-dcnode-id="962"><span data-dcnode-id="975" instrument_node="">The effects of high </span><b data-dcnode-id="973"><span data-dcnode-id="974" instrument_node="">altitude</span></b><span data-dcnode-id="972" instrument_node=""> on humans are considerable. The percentage </span><b data-dcnode-id="970"><span data-dcnode-id="971" instrument_node="">oxygen</span></b><span data-dcnode-id="969" instrument_node=""> saturation of hemoglobin determines the content of </span><b data-dcnode-id="967"><span data-dcnode-id="968" instrument_node="">oxygen</span></b><span data-dcnode-id="966" instrument_node=""> in blood. After the human body reaches around 2,100 m (7,000 feet) above sea level, the saturation of oxyhemoglobin begins to </span><b data-dcnode-id="964"><span data-dcnode-id="965" instrument_node="">decrease</span></b><span data-dcnode-id="963" instrument_node=""> rapidly.</span></span></span></div><p data-dcnode-id="959"></p><span data-dcnode-id="958" instrument_node="">

</span><p data-dcnode-id="865" style="display:inline;"></p><div data-dcnode-id="840"><span data-dcnode-id="841"><span data-dcnode-id="842"><span data-dcnode-id="864" instrument_node="">The accumulation of </span><b data-dcnode-id="862"><span data-dcnode-id="863" instrument_node="">2</span></b><span data-dcnode-id="861" instrument_node="">,</span><b data-dcnode-id="859"><span data-dcnode-id="860" instrument_node="">3</span></b><span data-dcnode-id="858" instrument_node="">-</span><b data-dcnode-id="856"><span data-dcnode-id="857" instrument_node="">BPG</span></b><span data-dcnode-id="855" instrument_node=""> decreases the affinity of </span><b data-dcnode-id="853"><span data-dcnode-id="854" instrument_node="">hemoglobin</span></b><span data-dcnode-id="852" instrument_node=""> for oxygen. In tissues with high energetic demands, oxygen is rapidly consumed, which increases the concentration of H</span><sup data-dcnode-id="850"><span data-dcnode-id="851" instrument_node="">+</span></sup><span data-dcnode-id="849" instrument_node=""> and carbon dioxide. Through the Bohr </span><b data-dcnode-id="847"><span data-dcnode-id="848" instrument_node="">effect</span></b><span data-dcnode-id="846" instrument_node="">, </span><b data-dcnode-id="844"><span data-dcnode-id="845" instrument_node="">hemoglobin</span></b><span data-dcnode-id="843" instrument_node=""> is induced to release more oxygen to supply cells that need it.</span></span></span></div><p data-dcnode-id="839"></p><span data-dcnode-id="838" instrument_node="">
