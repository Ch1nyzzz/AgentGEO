</span><article class="post-12761 post type-post status-publish format-standard has-post-thumbnail hentry category-healthy-living category-heart-and-vascular category-lifestyle tag-ccmh tag-comanche-county-memorial-hospital tag-health-care tag-heart-and-vascular tag-lawton tag-lifestyle tag-lungs tag-oklahoma tag-smoking tag-tobacco tag-world-no-tobacco-day" data-dcnode-id="1553" id="post-12761"><span data-dcnode-id="1887" instrument_node="">
</span><div class="entry-header" data-dcnode-id="1864"><span data-dcnode-id="1886" instrument_node="">
</span><h1 class="entry-title" data-dcnode-id="1884"><span data-dcnode-id="1885" instrument_node="">How Smoking Affects the Lungs</span></h1><span data-dcnode-id="1883" instrument_node="">
</span><div class="post-meta" data-dcnode-id="1866"><span data-dcnode-id="1882" instrument_node="">
</span><div class="post-date" data-dcnode-id="1880"><span data-dcnode-id="1881" instrument_node="">
			May 24, 2019</span></div><span data-dcnode-id="1879" instrument_node="">
</span><div class="post-categories" data-dcnode-id="1868"><span data-dcnode-id="1878" instrument_node="">
</span><a data-dcnode-id="1876" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.ccmhhealth.com/category/healthy-living/" rel="category tag"><span data-dcnode-id="1877" instrument_node="">Healthy Living</span></a><span data-dcnode-id="1875" instrument_node="">, </span><a data-dcnode-id="1873" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.ccmhhealth.com/category/heart-and-vascular/" rel="category tag"><span data-dcnode-id="1874" instrument_node="">Heart and Vascular</span></a><span data-dcnode-id="1872" instrument_node="">, </span><a data-dcnode-id="1870" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.ccmhhealth.com/category/lifestyle/" rel="category tag"><span data-dcnode-id="1871" instrument_node="">Lifestyle</span></a><span data-dcnode-id="1869" instrument_node=""> </span></div><span data-dcnode-id="1867" instrument_node="">
</span></div><span data-dcnode-id="1865" instrument_node="">
</span></div><span data-dcnode-id="1863" instrument_node="">
</span><div class="post-feature post-thumbnail" data-dcnode-id="1859"><span data-dcnode-id="1862" instrument_node="">
</span><img alt="How Smoking Affects the Lungs" data-dcnode-id="1861" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.ccmhhealth.com/wp-content/uploads/2019/05/andrew-leu-1147899-unsplash-770x510.png&amp;raw"><span data-dcnode-id="1860" instrument_node=""> </span></div><span data-dcnode-id="1858" instrument_node="">
</span><div class="entry-content" data-dcnode-id="1643"><span data-dcnode-id="1857" instrument_node="">
</span><p data-dcnode-id="1854"><span data-dcnode-id="1855" style="font-weight: 400;"><span data-dcnode-id="1856" instrument_node="">Each organ in your body plays an important role in keeping your body healthy. If you have healthy lungs, you probably don’t think much about them. Damage to your lungs, however; can quickly cause a noticeable difference in your ability to breathe easily. </span></span></p><span data-dcnode-id="1853" instrument_node="">
</span><p data-dcnode-id="1851"><span data-dcnode-id="1852" instrument_node="">&nbsp;</span></p><span data-dcnode-id="1850" instrument_node="">
</span><p data-dcnode-id="1847"><span data-dcnode-id="1848" style="font-weight: 400;"><span data-dcnode-id="1849" instrument_node="">The primary role of the lungs is delivering oxygen-rich blood throughout the body. You breathe in air and breathe out carbon dioxide as waste exhaling. &nbsp;No tobacco product is safe. However, combustible products—those that you burn to smoke—are exceptionally harmful to the lungs.</span></span></p><span data-dcnode-id="1846" instrument_node="">
</span><p data-dcnode-id="1844"><span data-dcnode-id="1845" instrument_node="">&nbsp;</span></p><span data-dcnode-id="1843" instrument_node="">
</span><h4 data-dcnode-id="1840"><b data-dcnode-id="1841"><span data-dcnode-id="1842" instrument_node="">How does smoking hurt your lungs? </span></b></h4><span data-dcnode-id="1839" instrument_node="">
</span><p data-dcnode-id="1837"><span data-dcnode-id="1838" instrument_node="">&nbsp;</span></p><span data-dcnode-id="1836" instrument_node="">
</span><p data-dcnode-id="1833"><span data-dcnode-id="1834" style="font-weight: 400;"><span data-dcnode-id="1835" instrument_node="">When you smoke, the tissue of the lungs receive damage, impeding them from functioning properly. Smoking also increases your risk of serious health issues. Some examples include: lung cancer, chronic obstructive pulmonary disease (COPD) and emphysema.</span></span></p><span data-dcnode-id="1832" instrument_node="">
</span><p data-dcnode-id="1830"><span data-dcnode-id="1831" instrument_node="">&nbsp;</span></p><span data-dcnode-id="1829" instrument_node="">
</span><p data-dcnode-id="1822"><span data-dcnode-id="1827" style="font-weight: 400;"><span data-dcnode-id="1828" instrument_node="">Upon your very first puff, immediate damage to the lungs begins. Every puff of cigarette smoke contains over 7,000 chemicals.</span></span><b data-dcnode-id="1825"><span data-dcnode-id="1826" instrument_node="">1</span></b><span data-dcnode-id="1823" style="font-weight: 400;"><span data-dcnode-id="1824" instrument_node=""> When you inhale, the smoke hits your lungs almost instantly. The blood then carries these toxic chemicals throughout the body. Tobacco smoke contains carbon monoxide, a deadly gas that then displaces the oxygen in your blood. This deprives all your organs of needed oxygen.</span></span></p><span data-dcnode-id="1821" instrument_node="">
</span><p data-dcnode-id="1819"><span data-dcnode-id="1820" instrument_node="">&nbsp;</span></p><span data-dcnode-id="1818" instrument_node="">
</span><h4 data-dcnode-id="1815"><b data-dcnode-id="1816"><span data-dcnode-id="1817" instrument_node="">What chemicals are found in cigarettes? </span></b></h4><span data-dcnode-id="1814" instrument_node="">
</span><p data-dcnode-id="1812"><span data-dcnode-id="1813" instrument_node="">&nbsp;</span></p><span data-dcnode-id="1811" instrument_node="">
</span><p data-dcnode-id="1808"><span data-dcnode-id="1809" style="font-weight: 400;"><span data-dcnode-id="1810" instrument_node="">Cigarettes also include acrolein. This chemical causes lung damage and a sore throat. Cigarettes may also contain bronchodilators. These chemicals are meant to open up the airways of the lungs. They also can increase the amount of dangerous chemicals absorbed by the lungs.</span></span></p><span data-dcnode-id="1807" instrument_node="">
</span><p data-dcnode-id="1805"><span data-dcnode-id="1806" instrument_node="">&nbsp;</span></p><span data-dcnode-id="1804" instrument_node="">
</span><h4 data-dcnode-id="1801"><b data-dcnode-id="1802"><span data-dcnode-id="1803" instrument_node="">What are the consequences of smoking? </span></b></h4><span data-dcnode-id="1800" instrument_node="">
</span><p data-dcnode-id="1798"><span data-dcnode-id="1799" instrument_node="">&nbsp;</span></p><span data-dcnode-id="1797" instrument_node="">
</span><p data-dcnode-id="1794"><span data-dcnode-id="1795" style="font-weight: 400;"><span data-dcnode-id="1796" instrument_node="">Cigarette smoke has negative consequences for individuals of all ages. Babies born to mothers that smoked during pregnancy may have abnormal lung development. Teens who smoke may develop weaker lungs which never operate at full capacity or develop to their full, adult size. </span></span></p><span data-dcnode-id="1793" instrument_node="">
</span><p data-dcnode-id="1791"><span data-dcnode-id="1792" instrument_node="">&nbsp;</span></p><span data-dcnode-id="1790" instrument_node="">
</span><p data-dcnode-id="1787"><span data-dcnode-id="1788" style="font-weight: 400;"><span data-dcnode-id="1789" instrument_node="">Additionally, smoking can destroy the cilia. These tiny hairs in the airway keep dirt and mucus out of your lungs. This may then lead to the development of “smoker’s cough,” a chronic cough common for long-term smokers. </span></span></p><span data-dcnode-id="1786" instrument_node="">
</span><p data-dcnode-id="1784"><span data-dcnode-id="1785" instrument_node="">&nbsp;</span></p><span data-dcnode-id="1783" instrument_node="">
</span><p data-dcnode-id="1776"><span data-dcnode-id="1781" style="font-weight: 400;"><span data-dcnode-id="1782" instrument_node="">Smokers are also at risk for chronic obstructive pulmonary disease (or COPD). 80% of cases of COPD are due to smoking. </span></span><b data-dcnode-id="1779"><span data-dcnode-id="1780" instrument_node="">2 </span></b><span data-dcnode-id="1777" style="font-weight: 400;"><span data-dcnode-id="1778" instrument_node="">&nbsp;People with COPD have difficulty breathing and eventually die because of the lack of oxygen. </span></span></p><span data-dcnode-id="1775" instrument_node="">
</span><p data-dcnode-id="1773"><span data-dcnode-id="1774" instrument_node="">&nbsp;</span></p><span data-dcnode-id="1772" instrument_node="">
</span><p data-dcnode-id="1765"><span data-dcnode-id="1770" style="font-weight: 400;"><span data-dcnode-id="1771" instrument_node="">COPD has no cure. Moreover, nearly all lung cancer—the top cause of cancer death— is due to smoking. Smokers are 20 times more likely to develop lung cancer than nonsmokers. </span></span><b data-dcnode-id="1768"><span data-dcnode-id="1769" instrument_node="">3</span></b><span data-dcnode-id="1766" style="font-weight: 400;"><span data-dcnode-id="1767" instrument_node=""> &nbsp;Lung cancer may also lead to other respiratory cancers. </span></span></p><span data-dcnode-id="1764" instrument_node="">
</span><p data-dcnode-id="1762"><span data-dcnode-id="1763" instrument_node="">&nbsp;</span></p><span data-dcnode-id="1761" instrument_node="">
</span><h4 data-dcnode-id="1758"><b data-dcnode-id="1759"><span data-dcnode-id="1760" instrument_node="">Are e-cigarettes also harmful? </span></b></h4><span data-dcnode-id="1757" instrument_node="">
</span><p data-dcnode-id="1755"><span data-dcnode-id="1756" instrument_node="">&nbsp;</span></p><span data-dcnode-id="1754" instrument_node="">
</span><p data-dcnode-id="1746"><span data-dcnode-id="1752" style="font-weight: 400;"><span data-dcnode-id="1753" instrument_node="">Because e-cigarettes are still relatively new tobacco products, many do not realize the harm they cause. We discussed this in a recent article “</span></span><a data-dcnode-id="1749" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.ccmhhealth.com/juuling-dangerous-for-teens/"><span data-dcnode-id="1750" style="font-weight: 400;"><span data-dcnode-id="1751" instrument_node="">Juuling Much More Dangerous than Teens Realize</span></span></a><span data-dcnode-id="1747" style="font-weight: 400;"><span data-dcnode-id="1748" instrument_node="">”. </span></span></p><span data-dcnode-id="1745" instrument_node="">
</span><p data-dcnode-id="1743"><span data-dcnode-id="1744" instrument_node="">&nbsp;</span></p><span data-dcnode-id="1742" instrument_node="">
</span><p data-dcnode-id="1739"><span data-dcnode-id="1740" style="font-weight: 400;"><span data-dcnode-id="1741" instrument_node="">Some e-cigarette aerosols contain some of the same chemicals as cigarettes. This includes the lung irritant acrolein, and formaldehyde. Some chemicals that create flavor could be harmful when inhaled too. &nbsp;Furthermore, fruit flavored e-cigarettes often large amounts of acrylonitrile, a known respiratory irritant. </span></span></p><span data-dcnode-id="1738" instrument_node="">
</span><p data-dcnode-id="1736"><span data-dcnode-id="1737" instrument_node="">&nbsp;</span></p><span data-dcnode-id="1735" instrument_node="">
</span><h4 data-dcnode-id="1732"><b data-dcnode-id="1733"><span data-dcnode-id="1734" instrument_node="">Can I reverse the damage of smoking to my lungs?</span></b></h4><span data-dcnode-id="1731" instrument_node="">
</span><p data-dcnode-id="1729"><span data-dcnode-id="1730" instrument_node="">&nbsp;</span></p><span data-dcnode-id="1728" instrument_node="">
</span><p data-dcnode-id="1725"><span data-dcnode-id="1726" style="font-weight: 400;"><span data-dcnode-id="1727" instrument_node="">When you stop smoking, you have overall better health. Lung cancer risk drops drastically in the years after quitting. Furthermore, only 12 hours after quitting, the carbon monoxide level in your blood drops to normal. This, of course, allows more oxygen to circulate to your organs.</span></span></p><span data-dcnode-id="1724" instrument_node="">
</span><p data-dcnode-id="1722"><span data-dcnode-id="1723" instrument_node="">&nbsp;</span></p><span data-dcnode-id="1721" instrument_node="">
</span><p data-dcnode-id="1715"><span data-dcnode-id="1716" style="font-weight: 400;"><span data-dcnode-id="1720" instrument_node="">If you’re struggling to stop smoking, reach out to a CCMH Provider by visiting </span><a data-dcnode-id="1718" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//ccmhhealth.com/directory"><span data-dcnode-id="1719" instrument_node="">CCMHHealth.com/Directory</span></a><span data-dcnode-id="1717" instrument_node="">. We would love to help!</span></span></p><span data-dcnode-id="1714" instrument_node="">
</span><p data-dcnode-id="1712"><span data-dcnode-id="1713" instrument_node="">&nbsp;</span></p><span data-dcnode-id="1711" instrument_node="">
