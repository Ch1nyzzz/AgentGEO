</span><p data-dcnode-id="1044"><span data-dcnode-id="1045" instrument_node="">Smoking is one of the top causes of various diseases, such as lung cancer, chronic obstructive pulmonary disease (COPD), heart disease, and stroke, which can eventually lead to death.</span></p><div class="aligncenters jpibfi_container" data-dcnode-id="1041"><input class="jpibfi" data-dcnode-id="1043" type="hidden"><img alt="smoking is harmful for lungs" class="attachment-post-single size-post-single wp-post-image" data-dcnode-id="1042" data-jpibfi-post-excerpt="" data-jpibfi-post-title="How Smoking Affects Lung Health" data-jpibfi-post-url="https://www.emedihealth.com/respiratory-health/smoking-effects-lung-health" data-jpibfi-src="https://img.emedihealth.com/wp-content/uploads/2020/10/smoking-affects-lung-health-feat.jpg" data-pin-no-hover="true" height="811" loading="lazy" sizes="(max-width: 1200px) 100vw, 1200px" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//img.emedihealth.com/wp-content/uploads/2020/10/smoking-affects-lung-health-feat.jpg&amp;raw" srcset="https://img.emedihealth.com/wp-content/uploads/2020/10/smoking-affects-lung-health-feat.jpg 1200w, https://img.emedihealth.com/wp-content/uploads/2020/10/smoking-affects-lung-health-feat-450x304.jpg 450w, https://img.emedihealth.com/wp-content/uploads/2020/10/smoking-affects-lung-health-feat-600x406.jpg 600w, https://img.emedihealth.com/wp-content/uploads/2020/10/smoking-affects-lung-health-feat-768x519.jpg 768w, https://img.emedihealth.com/wp-content/uploads/2020/10/smoking-affects-lung-health-feat-750x507.jpg 750w, https://img.emedihealth.com/wp-content/uploads/2020/10/smoking-affects-lung-health-feat-1140x770.jpg 1140w" width="1200"></div><span data-dcnode-id="1040" instrument_node="">
</span><p data-dcnode-id="1038"><span data-dcnode-id="1039" instrument_node="">Smoking can affect almost all organs in the body. This article talks about the different ways in which smoking affects your general health and lifestyle.</span></p><span data-dcnode-id="1037" instrument_node="">
</span><h2 data-dcnode-id="1033"><span class="ez-toc-section" data-dcnode-id="1036" id="how_does_smoking_affect_lung_health"></span><span data-dcnode-id="1035" instrument_node="">How Does Smoking Affect Lung Health?</span><span class="ez-toc-section-end" data-dcnode-id="1034"></span></h2><span data-dcnode-id="1032" instrument_node="">
</span><figure class="wp-block-image size-large" data-dcnode-id="1030"><img alt="how smoking can prove detrimental for lung health?" class="wp-image-20822" data-dcnode-id="1031" data-jpibfi-post-excerpt="" data-jpibfi-post-title="How Smoking Affects Lung Health" data-jpibfi-post-url="https://www.emedihealth.com/respiratory-health/smoking-effects-lung-health" data-jpibfi-src="https://img.emedihealth.com/wp-content/uploads/2020/10/smoking-affect-lung-health.jpg" data-pin-no-hover="true" height="400" loading="lazy" sizes="(max-width: 600px) 100vw, 600px" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//img.emedihealth.com/wp-content/uploads/2020/10/smoking-affect-lung-health.jpg&amp;raw" srcset="https://img.emedihealth.com/wp-content/uploads/2020/10/smoking-affect-lung-health.jpg 600w, https://img.emedihealth.com/wp-content/uploads/2020/10/smoking-affect-lung-health-450x300.jpg 450w" width="600"></figure><span data-dcnode-id="1029" instrument_node="">
</span><p data-dcnode-id="1025"><span data-dcnode-id="1028" instrument_node="">Cigarette smoke is composed of particulate matter, toxins, and oxidative chemicals. Burning tobacco produces more than 4,000 chemicals, including nicotine, carbon monoxide, and tars. </span><a data-dcnode-id="1026" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.ncbi.nlm.nih.gov/pmc/articles/PMC4538886/" onclick="javascript:window.open('https://www.ncbi.nlm.nih.gov/pmc/articles/PMC4538886/'); return false;"><span data-dcnode-id="1027" instrument_node="">(1)</span></a></p><span data-dcnode-id="1024" instrument_node="">
</span><p data-dcnode-id="1016"><span data-dcnode-id="1023" instrument_node="">Each puff of cigarette smoke contains &gt;1,014 oxidant molecules and &gt;1,000 xenobiotics. </span><a data-dcnode-id="1021" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.researchgate.net/publication/262726133" onclick="javascript:window.open('https://www.researchgate.net/publication/262726133'); return false;"><span data-dcnode-id="1022" instrument_node="">(2)</span></a><span data-dcnode-id="1020" instrument_node=""> Exposure to cigarette smoke evokes significant biologic changes in the airway epithelium, </span><a data-dcnode-id="1018" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.ncbi.nlm.nih.gov/pmc/articles/PMC3261116/" onclick="javascript:window.open('https://www.ncbi.nlm.nih.gov/pmc/articles/PMC3261116/'); return false;"><span data-dcnode-id="1019" instrument_node="">(3)</span></a><span data-dcnode-id="1017" instrument_node=""> even though many smokers are phenotypically normal.</span></p><span data-dcnode-id="1015" instrument_node="">
</span><span data-dcnode-id="1013" instrument_node="">
</span><div class="quads-location quads-ad2" data-dcnode-id="1001" id="quads-ad2" style="float:none;margin:10px 0px 10px 0px;text-align:center;"><span data-dcnode-id="1012" instrument_node="">
</span><div class="quads-ad-label" data-dcnode-id="1010"><span data-dcnode-id="1011" instrument_node="">Advertisements</span></div><span data-dcnode-id="1008" instrument_node="">
</span><div data-dcnode-id="1003" id="div-gpt-ad-1582735877778-0"><span data-dcnode-id="1007" instrument_node="">
</span><span data-dcnode-id="1004" instrument_node="">
</span></div><span data-dcnode-id="1002" instrument_node="">
</span></div><span data-dcnode-id="1000" instrument_node="">
</span><p data-dcnode-id="995"><span data-dcnode-id="999" instrument_node="">Smoking, or exposure to secondhand smoke, </span><a data-dcnode-id="997" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.ncbi.nlm.nih.gov/pmc/articles/PMC4538886/" onclick="javascript:window.open('https://www.ncbi.nlm.nih.gov/pmc/articles/PMC4538886/'); return false;"><span data-dcnode-id="998" instrument_node="">(1)</span></a><span data-dcnode-id="996" instrument_node=""> affects the respiratory system at microscopic levels:</span></p><span data-dcnode-id="994" instrument_node="">
</span><div class="su-list" data-dcnode-id="969" style="margin-left:0px"><span data-dcnode-id="993" instrument_node="">
</span><ul data-dcnode-id="971"><span data-dcnode-id="992" instrument_node="">
</span><li data-dcnode-id="989"><i class="sui sui-angle-double-right" data-dcnode-id="991" style="color:#D3D3D3"></i><span data-dcnode-id="990" instrument_node=""> Narrows the air passages</span></li><span data-dcnode-id="988" instrument_node="">
</span><li data-dcnode-id="985"><i class="sui sui-angle-double-right" data-dcnode-id="987" style="color:#D3D3D3"></i><span data-dcnode-id="986" instrument_node=""> Causes chronic inflammation</span></li><span data-dcnode-id="984" instrument_node="">
</span><li data-dcnode-id="981"><i class="sui sui-angle-double-right" data-dcnode-id="983" style="color:#D3D3D3"></i><span data-dcnode-id="982" instrument_node=""> Destroys lung tissue</span></li><span data-dcnode-id="980" instrument_node="">
</span><li data-dcnode-id="973"><i class="sui sui-angle-double-right" data-dcnode-id="979" style="color:#D3D3D3"></i><span data-dcnode-id="978" instrument_node=""> Triggers changes leading to cancer over time </span><a data-dcnode-id="976" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.ncbi.nlm.nih.gov/pmc/articles/PMC3749017/" onclick="javascript:window.open('https://www.ncbi.nlm.nih.gov/pmc/articles/PMC3749017/'); return false;"><span data-dcnode-id="977" instrument_node="">(4)</span></a><a data-dcnode-id="974" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.ncbi.nlm.nih.gov/pmc/articles/PMC2896024/" onclick="javascript:window.open('https://www.ncbi.nlm.nih.gov/pmc/articles/PMC2896024/'); return false;"><span data-dcnode-id="975" instrument_node="">(5)</span></a></li><span data-dcnode-id="972" instrument_node="">
</span></ul><span data-dcnode-id="970" instrument_node="">
</span></div><span data-dcnode-id="968" instrument_node="">
</span><p data-dcnode-id="963"><span data-dcnode-id="967" instrument_node="">Cigarette smoking is also associated with an increased risk of several types of infection, </span><a data-dcnode-id="965" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.ncbi.nlm.nih.gov/pmc/articles/PMC7398598/" onclick="javascript:window.open('https://www.ncbi.nlm.nih.gov/pmc/articles/PMC7398598/'); return false;"><span data-dcnode-id="966" instrument_node="">(6)</span></a><span data-dcnode-id="964" instrument_node=""> including tuberculosis, pneumococcal pneumonia, meningococcal disease, influenza, and the common cold.</span></p><span data-dcnode-id="962" instrument_node="">
</span><p data-dcnode-id="949"><span data-dcnode-id="961" instrument_node="">In asthmatics, tobacco smoke can trigger an episode. </span><a data-dcnode-id="959" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.ncbi.nlm.nih.gov/pmc/articles/PMC6157154/" onclick="javascript:window.open('https://www.ncbi.nlm.nih.gov/pmc/articles/PMC6157154/'); return false;"><span data-dcnode-id="960" instrument_node="">(7)</span></a><span data-dcnode-id="958" instrument_node=""> Also, smokers are 12–13 times more likely to die from COPD than non-smokers. </span><a data-dcnode-id="956" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.cdc.gov/tobacco/data_statistics/fact_sheets/health_effects/effects_cig_smoking/index.htm" onclick="javascript:window.open('https://www.cdc.gov/tobacco/data_statistics/fact_sheets/health_effects/effects_cig_smoking/index.htm'); return false;"><span data-dcnode-id="957" instrument_node="">(8)</span></a><span data-dcnode-id="955" instrument_node=""> However, </span><a data-dcnode-id="953" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.emedihealth.com/respiratory-health/reasons-to-quit-smoking"><span data-dcnode-id="954" instrument_node="">quitting smoking has an immediate benefit to the lungs</span></a><span data-dcnode-id="952" instrument_node="">. </span><a data-dcnode-id="950" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.ncbi.nlm.nih.gov/pmc/articles/PMC3144846/" onclick="javascript:window.open('https://www.ncbi.nlm.nih.gov/pmc/articles/PMC3144846/'); return false;"><span data-dcnode-id="951" instrument_node="">(9)</span></a></p><span data-dcnode-id="948" instrument_node="">
</span><h2 data-dcnode-id="944"><span class="ez-toc-section" data-dcnode-id="947" id="effects_of_smoking_on_the_different_parts_of_the_lungs"></span><span data-dcnode-id="946" instrument_node="">Effects of Smoking on the Different Parts of the Lungs</span><span class="ez-toc-section-end" data-dcnode-id="945"></span></h2><span data-dcnode-id="943" instrument_node="">
</span><p data-dcnode-id="941"><span data-dcnode-id="942" instrument_node="">The chemicals present in cigarette smoke pose changes in different parts of the organ of breathing.</span></p><span data-dcnode-id="940" instrument_node="">
</span><h3 data-dcnode-id="938"><span data-dcnode-id="939" instrument_node="">1. Cilia</span></h3><span data-dcnode-id="937" instrument_node="">
</span><p data-dcnode-id="933"><span data-dcnode-id="936" instrument_node="">One of the consequences of smoking is the associated reduction in mucociliary clearance. </span><a data-dcnode-id="934" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.ncbi.nlm.nih.gov/pmc/articles/PMC2790614/" onclick="javascript:window.open('https://www.ncbi.nlm.nih.gov/pmc/articles/PMC2790614/'); return false;"><span data-dcnode-id="935" instrument_node="">(10)</span></a></p><span data-dcnode-id="932" instrument_node="">
</span><p data-dcnode-id="930"><span data-dcnode-id="931" instrument_node="">Mucociliary clearance is a vital defense mechanism against inhaled pathogens and particulates. It works by cleansing the airway surface through the coordinated action of the cilia.</span></p><span data-dcnode-id="929" instrument_node="">
</span><span data-dcnode-id="927" instrument_node="">
</span><div class="quads-location quads-ad3" data-dcnode-id="915" id="quads-ad3" style="float:none;margin:10px 0px 10px 0px;text-align:center;"><span data-dcnode-id="926" instrument_node="">
</span><div class="quads-ad-label" data-dcnode-id="924"><span data-dcnode-id="925" instrument_node="">Advertisements</span></div><span data-dcnode-id="922" instrument_node="">
</span><div data-dcnode-id="917" id="div-gpt-ad-1607514343973-0"><span data-dcnode-id="921" instrument_node="">
</span><span data-dcnode-id="918" instrument_node="">
</span></div><span data-dcnode-id="916" instrument_node="">
</span></div><span data-dcnode-id="914" instrument_node="">
</span><p data-dcnode-id="910"><span data-dcnode-id="913" instrument_node="">Smoking may cause damage to the cilia, reduce cilia beat frequency, and also affect cilia length, all of which result in reduced mucociliary clearance. </span><a data-dcnode-id="911" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.ncbi.nlm.nih.gov/pmc/articles/PMC2790614/" onclick="javascript:window.open('https://www.ncbi.nlm.nih.gov/pmc/articles/PMC2790614/'); return false;"><span data-dcnode-id="912" instrument_node="">(10)</span></a></p><span data-dcnode-id="909" instrument_node="">
</span><p data-dcnode-id="905"><span data-dcnode-id="908" instrument_node="">A reduction in mucociliary clearance contributes to the increased susceptibility to respiratory tract infection, chronic obstructive lung disease, and bronchogenic carcinoma. </span><a data-dcnode-id="906" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.ncbi.nlm.nih.gov/pmc/articles/PMC4465242/" onclick="javascript:window.open('https://www.ncbi.nlm.nih.gov/pmc/articles/PMC4465242/'); return false;"><span data-dcnode-id="907" instrument_node="">(11)</span></a></p><span data-dcnode-id="904" instrument_node="">
</span><h3 data-dcnode-id="902"><span data-dcnode-id="903" instrument_node="">2. Mucus-producing cells</span></h3><span data-dcnode-id="901" instrument_node="">
</span><figure class="wp-block-image size-large" data-dcnode-id="899"><img alt="smoking can prove harmful for mucus-producing cells" class="wp-image-20820" data-dcnode-id="900" data-jpibfi-post-excerpt="" data-jpibfi-post-title="How Smoking Affects Lung Health" data-jpibfi-post-url="https://www.emedihealth.com/respiratory-health/smoking-effects-lung-health" data-jpibfi-src="https://img.emedihealth.com/wp-content/uploads/2020/10/mucus-producing-cells.jpg" data-pin-no-hover="true" height="400" loading="lazy" sizes="(max-width: 600px) 100vw, 600px" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//img.emedihealth.com/wp-content/uploads/2020/10/mucus-producing-cells.jpg&amp;raw" srcset="https://img.emedihealth.com/wp-content/uploads/2020/10/mucus-producing-cells.jpg 600w, https://img.emedihealth.com/wp-content/uploads/2020/10/mucus-producing-cells-450x300.jpg 450w" width="600"></figure><span data-dcnode-id="898" instrument_node="">
</span><p data-dcnode-id="896"><span data-dcnode-id="897" instrument_node="">Mucus is composed of water, ions, lipids, proteins, and complex macromolecular glycoproteins called mucins, which render viscoelastic and gel-forming properties to mucus.</span></p><span data-dcnode-id="895" instrument_node="">
</span><p data-dcnode-id="893"><span data-dcnode-id="894" instrument_node="">Airway mucus plays an important role in host defense mechanisms as a physicochemical barrier to inhaled particles and gases, bacteria, and viruses.</span></p><span data-dcnode-id="892" instrument_node="">
</span><p data-dcnode-id="888"><span data-dcnode-id="891" instrument_node="">However, the overproduction of mucus is harmful, which is a distinguishing feature of chronic inflammatory airway diseases. </span><a data-dcnode-id="889" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.ncbi.nlm.nih.gov/pmc/articles/PMC5796802/" onclick="javascript:window.open('https://www.ncbi.nlm.nih.gov/pmc/articles/PMC5796802/'); return false;"><span data-dcnode-id="890" instrument_node="">(12)</span></a></p><span data-dcnode-id="887" instrument_node="">
</span><p data-dcnode-id="880"><span data-dcnode-id="886" instrument_node="">Cigarette smoking is the leading cause of COPD. Oxidative stress plays a key role in smoking-induced abnormal airway mucus production, which can lead to the formation of mucus plugs. </span><a data-dcnode-id="884" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.ncbi.nlm.nih.gov/pmc/articles/PMC4738959/" onclick="javascript:window.open('https://www.ncbi.nlm.nih.gov/pmc/articles/PMC4738959/'); return false;"><span data-dcnode-id="885" instrument_node="">(13)</span></a><span data-dcnode-id="883" instrument_node=""> Smoking also causes goblet cell hyperplasia. </span><a data-dcnode-id="881" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.ncbi.nlm.nih.gov/pmc/articles/PMC4315442/" onclick="javascript:window.open('https://www.ncbi.nlm.nih.gov/pmc/articles/PMC4315442/'); return false;"><span data-dcnode-id="882" instrument_node="">(14)</span></a></p><span data-dcnode-id="879" instrument_node="">
</span><span data-dcnode-id="877" instrument_node="">
</span><div class="quads-location quads-ad4" data-dcnode-id="865" id="quads-ad4" style="float:none;margin:10px 0px 10px 0px;text-align:center;"><span data-dcnode-id="876" instrument_node="">
</span><div class="quads-ad-label" data-dcnode-id="874"><span data-dcnode-id="875" instrument_node="">Advertisements</span></div><span data-dcnode-id="872" instrument_node="">
</span><div data-dcnode-id="867" id="div-gpt-ad-1595955311642-0"><span data-dcnode-id="871" instrument_node="">
</span><span data-dcnode-id="868" instrument_node="">
</span></div><span data-dcnode-id="866" instrument_node="">
</span></div><span data-dcnode-id="864" instrument_node="">
</span><h3 data-dcnode-id="862"><span data-dcnode-id="863" instrument_node="">3. Airways</span></h3><span data-dcnode-id="861" instrument_node="">
</span><p data-dcnode-id="859"><span data-dcnode-id="860" instrument_node="">Cigarette smoke contributes to or exacerbates airway diseases, such as asthma and COPD, where airway hyperresponsiveness and airway smooth muscle proliferation are key features.</span></p><span data-dcnode-id="858" instrument_node="">
</span><p data-dcnode-id="854"><span data-dcnode-id="857" instrument_node="">While factors such as inflammation contribute to asthma, airway smooth muscle proliferation is one of the key pathological changes in asthma. </span><a data-dcnode-id="855" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.ncbi.nlm.nih.gov/pmc/articles/PMC3633438/" onclick="javascript:window.open('https://www.ncbi.nlm.nih.gov/pmc/articles/PMC3633438/'); return false;"><span data-dcnode-id="856" instrument_node="">(15)</span></a></p><span data-dcnode-id="853" instrument_node="">
</span><p data-dcnode-id="848"><span data-dcnode-id="852" instrument_node="">The mechanisms by which cigarette smoke affects airway smooth muscle are still being investigated. </span><a data-dcnode-id="850" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.ncbi.nlm.nih.gov/pmc/articles/PMC4468194/" onclick="javascript:window.open('https://www.ncbi.nlm.nih.gov/pmc/articles/PMC4468194/'); return false;"><span data-dcnode-id="851" instrument_node="">(16)</span></a><span data-dcnode-id="849" instrument_node=""> However, oxygen radicals generated as a result of cigarette smoke exposure might be causative of increased lung cell proliferation.</span></p><span data-dcnode-id="847" instrument_node="">
</span><p data-dcnode-id="845"><span data-dcnode-id="846" instrument_node="">Chronic tobacco smoking leads to a definite tendency to narrowing of both the large and the small airways.</span></p><span data-dcnode-id="844" instrument_node="">
</span><h3 data-dcnode-id="842"><span data-dcnode-id="843" instrument_node="">4. Alveoli</span></h3><span data-dcnode-id="841" instrument_node="">
</span><p data-dcnode-id="837"><span data-dcnode-id="840" instrument_node="">Emphysema, characterized by the enlargement of alveolar spaces, together with the destruction of alveolar walls, is classically believed to develop when mediators of tissue injury exceed the protective mechanisms within the lung. </span><a data-dcnode-id="838" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.ncbi.nlm.nih.gov/pmc/articles/PMC2647656/" onclick="javascript:window.open('https://www.ncbi.nlm.nih.gov/pmc/articles/PMC2647656/'); return false;"><span data-dcnode-id="839" instrument_node="">(17)</span></a></p><span data-dcnode-id="836" instrument_node="">
</span><p data-dcnode-id="834"><span data-dcnode-id="835" instrument_node="">A variety of repair functions are affected by toxins present in cigarette smoke. Cigarette smoke can impair the repair functions of fibroblasts, epithelial cells, and mesenchymal cells.</span></p><span data-dcnode-id="833" instrument_node="">
</span><span data-dcnode-id="831" instrument_node="">
</span><div class="quads-location quads-ad5" data-dcnode-id="819" id="quads-ad5" style="float:none;margin:10px 0px 10px 0px;text-align:center;"><span data-dcnode-id="830" instrument_node="">
</span><div class="quads-ad-label" data-dcnode-id="828"><span data-dcnode-id="829" instrument_node="">Advertisements</span></div><span data-dcnode-id="826" instrument_node="">
</span><div data-dcnode-id="821" id="div-gpt-ad-1607682754535-0"><span data-dcnode-id="825" instrument_node="">
</span><span data-dcnode-id="822" instrument_node="">
</span></div><span data-dcnode-id="820" instrument_node="">
</span></div><span data-dcnode-id="818" instrument_node="">
</span><p data-dcnode-id="813"><span data-dcnode-id="817" instrument_node="">Far and away, the most common cause of pulmonary emphysema is cigarette smoking. </span><a data-dcnode-id="815" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.cdc.gov/tobacco/campaign/tips/diseases/copd.html" onclick="javascript:window.open('https://www.cdc.gov/tobacco/campaign/tips/diseases/copd.html'); return false;"><span data-dcnode-id="816" instrument_node="">(18)</span></a><span data-dcnode-id="814" instrument_node=""> Cigarette smoke causes an inflammatory response in the lower respiratory tract that can damage lung structures.</span></p><span data-dcnode-id="812" instrument_node="">
</span><p data-dcnode-id="804"><span data-dcnode-id="811" instrument_node="">Volatile components of cigarette smoke can also inhibit the function of mesenchymal cells. </span><a data-dcnode-id="809" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.ncbi.nlm.nih.gov/pmc/articles/PMC2647656/" onclick="javascript:window.open('https://www.ncbi.nlm.nih.gov/pmc/articles/PMC2647656/'); return false;"><span data-dcnode-id="810" instrument_node="">(17)</span></a><span data-dcnode-id="808" instrument_node=""> Thus, cigarette smoking not only damages the lungs but also inhibits </span><a data-dcnode-id="806" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.emedihealth.com/respiratory-health/tips-healthy-lungs"><span data-dcnode-id="807" instrument_node="">repair of the lungs</span></a><span data-dcnode-id="805" instrument_node="">.</span></p><span data-dcnode-id="803" instrument_node="">
</span><h3 data-dcnode-id="801"><span data-dcnode-id="802" instrument_node="">5.&nbsp;Epithelial and endothelial cells</span></h3><span data-dcnode-id="800" instrument_node="">
</span><figure class="wp-block-image size-large" data-dcnode-id="798"><img alt="smoking can prove toxic for epithelial and endothelial cells" class="wp-image-20821" data-dcnode-id="799" data-jpibfi-post-excerpt="" data-jpibfi-post-title="How Smoking Affects Lung Health" data-jpibfi-post-url="https://www.emedihealth.com/respiratory-health/smoking-effects-lung-health" data-jpibfi-src="https://img.emedihealth.com/wp-content/uploads/2020/10/epithelial-and-endothelial-cells.jpg" data-pin-no-hover="true" height="400" loading="lazy" sizes="(max-width: 600px) 100vw, 600px" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//img.emedihealth.com/wp-content/uploads/2020/10/epithelial-and-endothelial-cells.jpg&amp;raw" srcset="https://img.emedihealth.com/wp-content/uploads/2020/10/epithelial-and-endothelial-cells.jpg 600w, https://img.emedihealth.com/wp-content/uploads/2020/10/epithelial-and-endothelial-cells-450x300.jpg 450w" width="600"></figure><span data-dcnode-id="797" instrument_node="">
</span><p data-dcnode-id="793"><span data-dcnode-id="796" instrument_node="">The epithelial and endothelial cells in the lungs participate in repair responses. Cigarette smoke is toxic to both endothelial cells and their circulating precursors. Smokers have reduced circulating vascular endothelial cell precursors. </span><a data-dcnode-id="794" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.ncbi.nlm.nih.gov/pmc/articles/PMC4709789/" onclick="javascript:window.open('https://www.ncbi.nlm.nih.gov/pmc/articles/PMC4709789/'); return false;"><span data-dcnode-id="795" instrument_node="">(19)</span></a></p><span data-dcnode-id="792" instrument_node="">
</span><span data-dcnode-id="790" instrument_node="">
</span><div class="quads-location quads-ad6" data-dcnode-id="778" id="quads-ad6" style="float:none;margin:10px 0px 10px 0px;text-align:center;"><span data-dcnode-id="789" instrument_node="">
</span><div class="quads-ad-label" data-dcnode-id="787"><span data-dcnode-id="788" instrument_node="">Advertisements</span></div><span data-dcnode-id="785" instrument_node="">
</span><div data-dcnode-id="780" id="div-gpt-ad-1607682511565-0"><span data-dcnode-id="784" instrument_node="">
</span><span data-dcnode-id="781" instrument_node="">
</span></div><span data-dcnode-id="779" instrument_node="">
</span></div><span data-dcnode-id="777" instrument_node="">
</span><p data-dcnode-id="775"><span data-dcnode-id="776" instrument_node="">Smoke-mediated endothelial damage or impairment of endothelial cell maintenance could lead to emphysema, as the death of endothelial cells can cause emphysema. Similarly, smoke inhibits airway epithelial cell chemotaxis and proliferation.</span></p><span data-dcnode-id="774" instrument_node="">
</span><h2 data-dcnode-id="770"><span class="ez-toc-section" data-dcnode-id="773" id="final_word"></span><span data-dcnode-id="772" instrument_node="">Final Word</span><span class="ez-toc-section-end" data-dcnode-id="771"></span></h2><span data-dcnode-id="769" instrument_node="">
</span><p data-dcnode-id="767"><span data-dcnode-id="768" instrument_node="">Smoking is the number one cause of COPD deaths and lung cancer. Exposure to cigarette smoke has various detrimental effects on the lungs, ranging from reduced mucociliary clearance to altered DNA modification. Therefore, to prevent such complications, it is best to quit smoking altogether.</span></p><span data-dcnode-id="766" instrument_node="">
</span><a class="su-button su-button-style-default su-button-wide" data-dcnode-id="760" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.emedihealth.com/respiratory-health/exercises-to-increase-lung-capacity" style="color:#203898;background-color:#f2f2f2;border-color:#c2c2c2;border-radius:12px;-moz-border-radius:12px;-webkit-border-radius:12px" target="_self"><span data-dcnode-id="761" style="color:#203898;padding:9px 30px;font-size:22px;line-height:33px;border-color:#f6f6f6;border-radius:12px;-moz-border-radius:12px;-webkit-border-radius:12px;text-shadow:0px 0px 0px ;-moz-text-shadow:0px 0px 0px ;-webkit-text-shadow:0px 0px 0px "><img alt="Continue Reading" data-dcnode-id="765" data-pin-no-hover="true" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//img.emedihealth.com/wp-content/uploads/2020/06/double-arrow.png&amp;raw" style="width:33px;height:33px"><span data-dcnode-id="764" instrument_node=""> Continue Reading</span><small data-dcnode-id="762" style="padding-bottom:9px;color:#203898"><span data-dcnode-id="763" instrument_node="">Best Exercises That Increase Lung Capacity</span></small></span></a><span data-dcnode-id="759" instrument_node="">
