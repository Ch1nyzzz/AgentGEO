ly reviewed by </span><a class="css-zocu4s" data-dcnode-id="750" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.healthline.com/medical-team"><span data-dcnode-id="751" instrument_node="">Gerhard Whitworth, R.N.</span></a></span><span data-dcnode-id="748" instrument_node=""> — </span><span data-dcnode-id="744"><span data-dcnode-id="747" instrument_node="">Written by </span><span data-dcnode-id="745"><span data-dcnode-id="746" instrument_node="">Ana Gotter</span></span></span><span data-dcnode-id="743" instrument_node=""> — </span><span data-dcnode-id="741"><span data-dcnode-id="742" instrument_node=""> Updated on December 3, 2018</span></span></div></section><div data-dcnode-id="546"><nav class="css-7u7i0a" data-dcnode-id="728" id="tab-bar-0"><ul class="css-17ztj4b" data-dcnode-id="729"><li class="css-t753mo" data-dcnode-id="736"><a class="css-1ggiqr2" data-dcnode-id="737" href="#diaphragmatic-breathing"><span data-dcnode-id="738" instrument_node="">Diaphragmatic breathing</span></a></li><li class="css-t753mo" data-dcnode-id="733"><a class="css-1ggiqr2" data-dcnode-id="734" href="#pursedlips-breathing"><span data-dcnode-id="735" instrument_node="">Pursed-lips breathing</span></a></li><li class="css-t753mo" data-dcnode-id="730"><a class="css-1ggiqr2" data-dcnode-id="731" href="#tips"><span data-dcnode-id="732" instrument_node="">Tips</span></a></li></ul></nav><article class="article-body css-d2znx6 undefined" data-dcnode-id="551"><div class="css-1u22pos" data-dcnode-id="670"><span data-dcnode-id="727" style="font-size:0;line-height:0"></span><p class="h2" data-dcnode-id="725"><span data-dcnode-id="726" instrument_node=""> Overview</span></p><p data-dcnode-id="723"><span data-dcnode-id="724" instrument_node="">Your lung capacity is the total amount of air that your lungs can hold. Over time, our lung capacity and lung function typically decrease slowly as we age after our mid-20s. </span></p><p data-dcnode-id="721"><span data-dcnode-id="722" instrument_node="">Some conditions like chronic obstructive pulmonary disease (COPD) can significantly speed up these reductions in lung capacity and functioning. This leads to difficulty in breathing and shortness of breath.</span></p><p data-dcnode-id="719"><span data-dcnode-id="720" instrument_node="">Fortunately, there are exercises that can help maintain and increase lung capacity, making it easier to keep your lungs healthy and get your body the oxygen it needs.</span></p><div data-dcnode-id="677" id="m66335fec-5fee-49a6-a6b6-057d696beacc"><div data-dcnode-id="678"><form data-dcnode-id="679" novalidate=""><div data-dcnode-id="680"><section class="css-11k39sg" data-dcnode-id="681"><div class="css-1x6oboy" data-dcnode-id="718"></div><div class="css-1rx43lg" data-dcnode-id="683"><div class="css-7nn8wn" data-dcnode-id="714"><div class="css-k008qs" data-dcnode-id="715"><a class="css-yvmi2y" data-dcnode-id="716" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.healthline.com/health/inline%3FcorrelationId%3Da620ba30-d2e3-4af3-9ce2-453113152b03" rel="noopener noreferrer sponsored" target="_blank"><lazy-image alt="SIGN UP NOW" classname="css-5enzam" data-dcnode-id="717" src="//i0.wp.com/images-prod.healthline.com/hlcmsresource/images/hl-newsletter-new/img/COPD.png?w=1155" srcset="//i0.wp.com/images-prod.healthline.com/hlcmsresource/images/hl-newsletter-new/img/COPD.png?w=483 230w"></lazy-image></a></div></div><div class="css-1rr4qq7" data-dcnode-id="684"><div class="css-rp3d6" data-dcnode-id="685"><div class="css-8rcmo0" data-dcnode-id="712"><span data-dcnode-id="713" instrument_node="">HEALTHLINE NEWSLETTER</span></div><div class="css-kp58b2" data-dcnode-id="707"><div class="css-1dxn28w" data-dcnode-id="710"><span data-dcnode-id="711" instrument_node="">Get our weekly COPD newsletter</span></div><p class="css-1cr3nkl" data-dcnode-id="708"><span data-dcnode-id="709" instrument_node="">To help meet the challenges of living with COPD, we'll send  support and advice for both patients and caregivers.</span></p></div><div class="css-8nu43k" data-dcnode-id="686"><div data-dcnode-id="687"><div class="css-12wslxx" data-dcnode-id="697"><div class="css-11eiosp" data-dcnode-id="702"><div class="css-1rr4qq7" data-dcnode-id="703"><div class="css-qddt1o" data-dcnode-id="705"><span data-dcnode-id="706" instrument_node="">Enter your email</span></div><input aria-label="Enter your email" class="css-kljuul" data-dcnode-id="704" name="email" placeholder="Enter your email" type="email" value=""></div></div><button class="css-1hitip5" data-dcnode-id="698" type="submit"><span class="css-14ktbsh" data-dcnode-id="699"><span class="css-1huyk6v" data-dcnode-id="700"><span data-dcnode-id="701" instrument_node="">SIGN UP NOW</span></span></span></button></div><div class="css-6jxmuv" data-dcnode-id="693"><label class="css-i6imnh" data-dcnode-id="694"><input class="css-1law5zt" data-dcnode-id="696" name="withNewsletter" type="checkbox" value="1"><span data-dcnode-id="695" instrument_node="">Also sign up for our popular Heart Health newsletter</span></label></div><p class="css-nz9v2z" data-dcnode-id="688"><span data-dcnode-id="692" instrument_node="">Your </span><a class="css-1pule1j" data-dcnode-id="690" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.healthline.com/privacy-policy" rel="noopener noreferrer" target="_blank"><span data-dcnode-id="691" instrument_node="">privacy</span></a><span data-dcnode-id="689" instrument_node=""> is important to us</span></p></div></div></div></div></div><div class="css-1tuviqo" data-dcnode-id="682"></div></section></div></form></div></div><div class="css-umsscj" data-dcnode-id="671"><aside class="css-0 css-0" data-dcnode-id="672"><div data-dcnode-id="673"><div class="css-10gx9pb" data-dcnode-id="674" data-empty="true"><div class="css-1hjaa0k" data-dcnode-id="676"></div><div class="css-1l7cd95" data-ad="true" data-adbridg-ad-class="inline2" data-dcnode-id="675" id="inline2__slot"></div></div></div></aside></div></div><div class="css-0" data-dcnode-id="633"><span data-dcnode-id="669" style="font-size:0;line-height:0"></span><h2 data-dcnode-id="665"><div data-dcnode-id="666"><a class="chartbeat-section" data-dcnode-id="667" name="diaphragmatic-breathing"><span data-dcnode-id="668" instrument_node=""> 1. Diaphragmatic breathing</span></a></div></h2><p data-dcnode-id="663"><span data-dcnode-id="664" instrument_node="">Diaphragmatic breathing, or “belly breathing,” engages the diaphragm, which is supposed to do most of the heavy lifting when it comes to breathing. </span></p><p data-dcnode-id="658"><span data-dcnode-id="662" instrument_node="">This technique is particularly helpful in people with </span><a class="content-link css-5r4717" data-dcnode-id="660" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.healthline.com/health/copd"><span data-dcnode-id="661" instrument_node="">COPD</span></a><span data-dcnode-id="659" instrument_node="">, as the diaphragm isn’t as effective in these individuals and could be strengthened. The technique best used when feeling rested. </span></p><p data-dcnode-id="656"><span data-dcnode-id="657" instrument_node="">If you have COPD, ask your doctor or respiratory therapist to show you how to use this exercise for best results.</span></p><p data-dcnode-id="651"><span data-dcnode-id="655" instrument_node="">According to the </span><a class="content-link css-5r4717" data-dcnode-id="653" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.copdfoundation.org/What-is-COPD/Living-with-COPD/Breathing-Techniques.aspx" rel="noopener noreferrer" target="_blank"><span data-dcnode-id="654" instrument_node="">COPD Foundation</span></a><span data-dcnode-id="652" instrument_node="">, you should do the following to practice diaphragmatic breathing:</span></p><ol data-dcnode-id="640"><li data-dcnode-id="649"><span data-dcnode-id="650" instrument_node="">Relax your shoulders and sit back or lie down.</span></li><li data-dcnode-id="647"><span data-dcnode-id="648" instrument_node="">Place one hand on your belly and one on your chest.</span></li><li data-dcnode-id="645"><span data-dcnode-id="646" instrument_node="">Inhale through your nose for two seconds, feeling the air move into your abdomen and feeling your stomach move out. Your stomach should move more than your chest does.</span></li><li data-dcnode-id="643"><span data-dcnode-id="644" instrument_node="">Breathe out for two seconds through pursed lips while pressing on your abdomen.</span></li><li data-dcnode-id="641"><span data-dcnode-id="642" instrument_node="">Repeat.</span></li></ol><div class="css-1cg0byz" data-dcnode-id="634"><aside class="css-0 css-0" data-dcnode-id="635"><div data-dcnode-id="636"><div class="css-az6x7v" data-dcnode-id="637" data-empty="true"><div class="css-1hjaa0k" data-dcnode-id="639"></div><div class="css-itezwm" data-ad="true" data-adbridg-ad-class="inline5" data-dcnode-id="638" id="inline5__slot"></div></div></div></aside></div></div><div class="css-0" data-dcnode-id="580"><span data-dcnode-id="632" style="font-size:0;line-height:0"></span><h2 data-dcnode-id="628"><div data-dcnode-id="629"><a class="chartbeat-section" data-dcnode-id="630" name="pursedlips-breathing"><span data-dcnode-id="631" instrument_node=""> 2. Pursed-lips breathing</span></a></div></h2><p data-dcnode-id="626"><span data-dcnode-id="627" instrument_node="">Pursed-lips breathing can slow down your breathing, reducing the work of breathing by keeping your airways open longer. This makes it easier for the lungs to function and improves the exchange of oxygen and carbon dioxide. </span></p><p data-dcnode-id="624"><span data-dcnode-id="625" instrument_node="">This breathing exercise is often easier for beginners than diaphragmatic breathing, and you can do it at home even if no one has showed you how. It can be practiced at any time.</span></p><p data-dcnode-id="622"><span data-dcnode-id="623" instrument_node="">To practice the pursed-lips breathing technique:</span></p><ol data-dcnode-id="613"><li data-dcnode-id="620"><span data-dcnode-id="621" instrument_node="">Inhale slowly through your nostrils.</span></li><li data-dcnode-id="618"><span data-dcnode-id="619" instrument_node="">Purse your lips, as if pouting or about to blow on something.</span></li><li data-dcnode-id="616"><span data-dcnode-id="617" instrument_node="">Breathe out as slowly as possible through pursed lips. This should take at least twice as long as it did to breathe in.</span></li><li data-dcnode-id="614"><span data-dcnode-id="615" instrument_node="">Repeat.</span></li></ol><div data-dcnode-id="587" id="m47a9134a-237b-434b-a447-bde738c9b0bf"><div data-dcnode-id="588"><div data-dcnode-id="589"><div class="css-get1og" data-dcnode-id="590"><div class="css-lhqo36" data-dcnode-id="597"><h2 class="css-ijren8" data-dcnode-id="611"><span data-dcnode-id="612" instrument_node="">FEATURED</span></h2><h3 class="css-6j1tng" data-dcnode-id="608"><a class="css-yvmi2y" data-dcnode-id="609" data-event="Driver Content Promo_Single Article Take Action|Driver Click_/health/how-to-increase-lung-capacity_middle_contentmerchandising_copd_middle_hl_trelegy20_37391|slot1_/health/copd/breathing-exercises" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.healthline.com/health/copd/breathing-exercises%3Fsource%3Dnative%26medium%3Dntd%26subid%3Dcontentmerchandising_copd_middle_hl_trelegy20_37391%26correlationId%3Dc92501e6-e2ab-46d1-8d83-0d22e10d35ce"><span data-dcnode-id="610" instrument_node="">5 Breathing Exercises with COPD</span></a></h3><picture class="css-u71ja5" data-dcnode-id="604"><source data-dcnode-id="607" media="(min-width: 990px)" srcset="https://post.healthline.com/wp-content/uploads/2020/03/12256-Breathing_Exercises_with_COPD-732x549-Thumbnail.jpg"><source data-dcnode-id="606" media="(min-width: 768px)" srcset="https://post.healthline.com/wp-content/uploads/2020/03/12256-Breathing_Exercises_with_COPD-732x549-Thumbnail.jpg"><img alt="" data-dcnode-id="605" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//post.healthline.com/wp-content/uploads/2020/03/12256-Breathing_Exercises_with_COPD-732x549-Thumbnail.jpg&amp;raw"></picture><p class="css-1nubf86" data-dcnode-id="602"><span data-dcnode-id="603" instrument_node="">People with COPD who use breathing exercises report improvements in exercise capacity, reduced shortness of breath and improved quality of life.</span></p><a class="css-1813szp" data-dcnode-id="598" data-event="Driver Content Promo_Single Article Take Action|Driver Click_/health/how-to-increase-lung-capacity_middle_contentmerchandising_copd_middle_hl_trelegy20_37391|slot1_/health/copd/breathing-exercises" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.healthline.com/health/copd/breathing-exercises%3Fsource%3Dnative%26medium%3Dntd%26subid%3Dcontentmerchandising_copd_middle_hl_trelegy20_37391%26correlationId%3Dc92501e6-e2ab-46d1-8d83-0d22e10d35ce"><span class="css-14ktbsh" data-dcnode-id="599"><span class="css-1huyk6v" data-dcnode-id="600"><span data-dcnode-id="601" instrument_node="">LEARN MORE</span></span></span></a></div><div class="css-1537uod" data-dcnode-id="596"></div><div class="css-x1qz84" data-dcnode-id="591"><picture class="css-9z7k4b" data-dcnode-id="592"><source data-dcnode-id="595" media="(min-width: 990px)" srcset="https://post.healthline.com/wp-content/uploads/2020/03/12256-Breathing_Exercises_with_COPD-732x549-Thumbnail.jpg"><source data-dcnode-id="594" media="(min-width: 768px)" srcset="https://post.healthline.com/wp-content/uploads/2020/03/12256-Breathing_Exercises_with_COPD-732x549-Thumbnail.jpg"><img alt="" data-dcnode-id="593" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//post.healthline.com/wp-content/uploads/2020/03/12256-Breathing_Exercises_with_COPD-732x549-Thumbnail.jpg&amp;raw"></picture></div></div></div></div></div><div class="css-umsscj" data-dcnode-id="581"><aside class="css-0 css-0" data-dcnode-id="582"><div data-dcnode-id="583"><div class="css-10gx9pb" data-dcnode-id="584" data-empty="true"><div class="css-1hjaa0k" data-dcnode-id="586"></div><div class="css-1l7cd95" data-ad="true" data-adbridg-ad-class="inline8" data-dcnode-id="585" id="inline8__slot"></div></div></div></aside></div></div><div class="css-0" data-dcnode-id="552"><span data-dcnode-id="579" style="font-size:0;line-height:0"></span><h2 data-dcnode-id="575"><div data-dcnode-id="576"><a class="chartbeat-section" data-dcnode-id="577" name="tips"><span data-dcnode-id="578" instrument_node=""> Tips for keeping your lungs healthy</span></a></div></h2><p data-dcnode-id="573"><span data-dcnode-id="574" instrument_node="">Prevention is the best medicine, and working to keep your lungs healthy is much more efficient than trying to repair them after something goes wrong. To keep your lungs healthy, do the following:</span></p><ul data-dcnode-id="556"><li data-dcnode-id="568"><span data-dcnode-id="572" instrument_node="">Stop </span><a class="content-link css-5r4717" data-dcnode-id="570" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.healthline.com/health/smoking/effects-on-body"><span data-dcnode-id="571" instrument_node="">smoking</span></a><span data-dcnode-id="569" instrument_node="">, and avoid secondhand smoke or environmental irritants.</span></li><li data-dcnode-id="563"><span data-dcnode-id="567" instrument_node="">Eat foods rich in </span><a class="content-link css-5r4717" data-dcnode-id="565" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.healthline.com/nutrition/foods-high-in-antioxidants"><span data-dcnode-id="566" instrument_node="">antioxidants</span></a><span data-dcnode-id="564" instrument_node="">.</span></li><li data-dcnode-id="561"><span data-dcnode-id="562" instrument_node="">Get vaccinations like the flu vaccine and the pneumonia vaccine. This can help prevent lung infections and promote lung health.</span></li><li data-dcnode-id="559"><span data-dcnode-id="560" instrument_node="">Exercise more frequently, which can help your lungs function properly.</span></li><li data-dcnode-id="557"><span data-dcnode-id="558" instrument_node="">Improve indoor air quality. Use tools like indoor air filters and reduce pollutants like artificial fragrances, mold, and dust.</span></li></ul><p data-dcnode-id="553"><a class="content-link css-5r4717" data-dcnode-id="554" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.healthline.com/health/es/como-aumentar-la-capacidad-pulmonar/"><span data-dcnode-id="555" instrument_node="">Read this article in Spanish.</span></a></p></div></article><div data-dcnode-id="547" id="m02a3c48f-d0d4-4b03-b237-b5b1b66ee554"><div data-dcnode-id="548"><div class="myFinance-widget myFinance-ad-unit" data-campaign="hl-driver-amazon-prime-day" data-dcnode-id="549" data-sub-id="amazon_primeday_hl_bot_day2_38449" data-widget-id="ab09d729-2b71-4000-992b-aec9157c8bc8&nbsp;"><iframe class="myFinance-iframe" data-dcnode-id="550" data-loaded="1" data-src="https://inline.healthline.com/r/ssr/ab09d729-2b71-4000-992b-aec9157c8bc8%C2%A0?utm_campaign=hl-driver-amazon-prime-day&amp;utm_medium=embed&amp;selector=%23m02a3c48f-d0d4-4b03-b237-b5b1b66ee554+%3E+div+%3E+div&amp;csid=afbfc47a-4fce-4af3-b93b-05e9eb30cf08&amp;caid=d6662cae-6a96-4280-a239-c370a9f56329&amp;ciid=d42e2185-075c-4364-82d8-575bafc209de&amp;tenant=wk_1Tqf7EYzOKyxm4Gvq042rU0Uky0&amp;srckey=src_1Tqf7BF96WTbG5QbUndHWIgKoFo&amp;cxsid=82affa96-cd21-45e4-a465-5fcbd3ea8ccf&amp;imre=aHR0cHM6Ly93d3cuaGVhbHRobGluZS5jb20vaGVhbHRoL2hvdy10by1pbmNyZWFzZS1sdW5nLWNhcGFjaXR5&amp;_mfuuid_=1af4ab0d-cc3f-41dc-a0b6-c7c236248b50&amp;width=584&amp;subId=amazon_primeday_hl_bot_day2_38449" id="MyFiAd" loading="lazy" scrolling="no" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url
