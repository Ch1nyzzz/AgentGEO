</span><h1 data-dcnode-id="741"><span data-dcnode-id="742" instrument_node="">
Does A Lobectomy Affect Your Breathing?
</span></h1><span data-dcnode-id="740" instrument_node="">
</span><div class="post_info" data-dcnode-id="729"><span data-dcnode-id="739" instrument_node="">
Posted on </span><span class="blog-date-posted" data-dcnode-id="737"><span data-dcnode-id="738" instrument_node="">November 12, 2021</span></span><span data-dcnode-id="736" instrument_node="">
</span><span class="blog-author-list" data-dcnode-id="731"><span data-dcnode-id="735" instrument_node="">
by </span><b data-dcnode-id="733"><span data-dcnode-id="734" instrument_node=""> Henry Ford Health Staff </span></b><span data-dcnode-id="732" instrument_node="">
</span></span><span data-dcnode-id="730" instrument_node="">
</span></div><span data-dcnode-id="728" instrument_node="">
</span><div class="view_info" data-dcnode-id="726"><span data-dcnode-id="727" instrument_node="">
11137
</span></div><span data-dcnode-id="725" instrument_node="">
</span><div class="share" data-dcnode-id="717"><span data-dcnode-id="724" instrument_node="">
</span><div class="share blue" data-dcnode-id="719"><span data-dcnode-id="723" instrument_node="">
</span><a class="addthis_button share icon-share" data-dcnode-id="721" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.henryford.com/layouts/HenryFord/modules/Blog/Sublayouts/NewsletterSignUps/mobile-newsletter-signup.html" tabindex="-1"><span data-dcnode-id="722" instrument_node="">Share</span></a><span data-dcnode-id="720" instrument_node="">
</span></div><span data-dcnode-id="718" instrument_node="">
</span></div><span data-dcnode-id="716" instrument_node="">
</span></div><span data-dcnode-id="714" instrument_node="">
</span></div><span data-dcnode-id="712" instrument_node="">
</span><div class="blog-post__copy" data-dcnode-id="591"><span data-dcnode-id="711" instrument_node="">
</span><p data-dcnode-id="706"><span data-dcnode-id="710" instrument_node="">For some </span><a data-dcnode-id="708" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.henryford.com/blog/2020/07/lung-cancer-101"><span data-dcnode-id="709" instrument_node="">lung cancer </span></a><span data-dcnode-id="707" instrument_node="">patients, having a lobectomy—or a procedure where part of your lung is removed—is necessary to get rid of a tumor and improve chances of a cure. Surprisingly enough, having lessened lung capacity may not make much of a difference in your breathing.&nbsp; </span></p><span data-dcnode-id="705" instrument_node="">
</span><p data-dcnode-id="700"><span data-dcnode-id="704" instrument_node="">
“We have three lobes in our right lung—upper, middle and lower—and two lobes in our left lung—upper and lower,” says </span><a data-dcnode-id="702" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.henryford.com/physician-directory/o/okereke-ikenna"><span data-dcnode-id="703" instrument_node="">Ikenna Okereke, M.D.</span></a><span data-dcnode-id="701" instrument_node="">, a thoracic surgeon with Henry Ford Health. “Some patients with lung cancer will benefit from taking the entire lobe out, where the cancer is. In many cases, there is a survival benefit.” </span></p><span data-dcnode-id="699" instrument_node="">
</span><p data-dcnode-id="697"><span data-dcnode-id="698" instrument_node=""> One reason why your breathing may not be affected after a lobectomy? The lobe that’s taken out may not be contributing as much to pulmonary function. “Smoke rises in the air and it rises in the lungs as well," says Dr. Okereke. "So if we’re performing a lobectomy on someone who smoked, the upper lungs tend to be most damaged from smoking, and the upper lungs are also the most likely site to have cancer. If an upper lobe is already damaged, you might not notice a big difference in your breathing after it’s taken out because it wasn’t helping as much, anyway.”&nbsp;&nbsp;&nbsp; </span></p><span data-dcnode-id="696" instrument_node="">
</span><p data-dcnode-id="694"><span data-dcnode-id="695" instrument_node=""> Here, Dr. Okereke answers common questions about lobectomies. </span></p><span data-dcnode-id="693" instrument_node="">
</span><h2 data-dcnode-id="691"><span data-dcnode-id="692" instrument_node="">Q: How much lung can you remove and still have enough lung capacity?&nbsp;&nbsp;</span></h2><span data-dcnode-id="690" instrument_node="">
</span><p data-dcnode-id="688"><span data-dcnode-id="689" instrument_node="">A: The maximum amount of lung we can take out is based upon someone’s weight, age and how much lung function they have to start with. In general, the absolute maximum amount of lung you can take out is the amount that will leave someone with 35% to 40% lung function. You can’t safely take out more than that. </span></p><span data-dcnode-id="687" instrument_node="">
</span><h2 data-dcnode-id="685"><span data-dcnode-id="686" instrument_node="">Q: Who can benefit from a lobectomy?</span></h2><span data-dcnode-id="684" instrument_node="">
</span><p data-dcnode-id="676"><span data-dcnode-id="683" instrument_node="">A; People with certain </span><a data-dcnode-id="681" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.henryford.com/blog/2021/06/stigma-lung-cancer"><span data-dcnode-id="682" instrument_node="">lung cancers</span></a><span data-dcnode-id="680" instrument_node="">, infections (such as tuberculosis), chronic obstructive pulmonary disease </span><a data-dcnode-id="678" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.henryford.com/blog/2019/10/copd-questions-answered"><span data-dcnode-id="679" instrument_node="">(COPD)</span></a><span data-dcnode-id="677" instrument_node="">&nbsp;and benign tumors may benefit from a lobectomy.&nbsp; </span></p><span data-dcnode-id="675" instrument_node="">
</span><h2 data-dcnode-id="673"><span data-dcnode-id="674" instrument_node="">Q: Is there anyone who shouldn’t have a lobectomy? </span></h2><span data-dcnode-id="672" instrument_node="">
</span><p data-dcnode-id="670"><span data-dcnode-id="671" instrument_node="">A: Patients who are elderly, or who are heavy smokers, may not be candidates for a lobectomy because they don’t have enough physiological reserve. (This means they may not be healthy enough to undergo surgery or recovery.)&nbsp;&nbsp; </span></p><span data-dcnode-id="669" instrument_node="">
</span><h2 data-dcnode-id="667"><span data-dcnode-id="668" instrument_node="">Q: After a lobectomy, can the lungs regenerate? </span></h2><span data-dcnode-id="666" instrument_node="">
</span><p data-dcnode-id="664"><span data-dcnode-id="665" instrument_node="">A: No, the lungs can’t regenerate. You can take out 75% to 80% of the liver and it will regenerate, but not the lungs. After a lobectomy, your mediastinum (a space in the thorax in the middle of the chest) and diaphragm will shift a little, so there won’t be a space left where the lobe was taken out.&nbsp; </span></p><span data-dcnode-id="663" instrument_node="">
</span><h2 data-dcnode-id="661"><span data-dcnode-id="662" instrument_node="">Q: What can I expect with lobectomy surgery? </span></h2><span data-dcnode-id="660" instrument_node="">
</span><p data-dcnode-id="655"><span data-dcnode-id="659" instrument_node="">A: You'll have to go into surgery on an empty stomach. That means you shouldn’t eat for about eight hours beforehand. For the surgery itself, at Henry Ford, we perform </span><a data-dcnode-id="657" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.henryford.com/blog/2019/04/minimally-invasive-surgery-how-it-works"><span data-dcnode-id="658" instrument_node="">minimally invasive surgery</span></a><span data-dcnode-id="656" instrument_node="">, meaning we use very small incisions, leading to less pain and a faster recovery time. As opposed to staying in the hospital for five days afterward, minimally invasive surgery keeps patients in the hospital for around three days.&nbsp; </span></p><span data-dcnode-id="654" instrument_node="">
</span><h2 data-dcnode-id="652"><span data-dcnode-id="653" instrument_node="">Q: What does recovery consist of?&nbsp;</span></h2><span data-dcnode-id="651" instrument_node="">
</span><p data-dcnode-id="649"><span data-dcnode-id="650" instrument_node="">A: How someone recovers depends upon their pulmonary function. Some patients have shortness of breath that goes away a week after surgery; others might have shortness of breath that goes away a few weeks after surgery. And there isn’t really significant internal pain after the procedure.&nbsp; </span></p><span data-dcnode-id="648" instrument_node="">
</span><p data-dcnode-id="646"><span data-dcnode-id="647" instrument_node=""> As for limitations after surgery, patients shouldn’t participate in strenuous activity for the first few weeks, but depending upon the amount of lung we take out, they can gradually get back to almost any activity.&nbsp;&nbsp;</span></p><span data-dcnode-id="645" instrument_node="">
</span><div class="phone-cta" data-dcnode-id="631"><span data-dcnode-id="644" instrument_node="">
</span><div data-dcnode-id="633"><strong data-dcnode-id="634"><span data-dcnode-id="643" instrument_node="">Want more advice from our experts?</span><br data-dcnode-id="642"><span data-dcnode-id="641" instrument_node="">
</span><a class="js-open-newsletter-modal" data-dcnode-id="639" style="cursor:pointer;"><span data-dcnode-id="640" instrument_node="">Subscribe</span></a><span data-dcnode-id="638" instrument_node=""> to receive a weekly email of our latest articles, including more on coping with&nbsp;</span><a data-dcnode-id="636" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.henryford.com/blog/tags/cancer"><span data-dcnode-id="637" instrument_node="">cancer</span></a><span data-dcnode-id="635" instrument_node="">.</span></strong></div><span data-dcnode-id="632" instrument_node="">
</span></div><span data-dcnode-id="630" instrument_node="">
</span><hr data-dcnode-id="629"><span data-dcnode-id="628" instrument_node="">
</span><p data-dcnode-id="620"><span data-dcnode-id="627" instrument_node=""> </span><em data-dcnode-id="621"><strong data-dcnode-id="622"><span data-dcnode-id="626" instrument_node="">Whether you are going through cancer treatment or serve a loved one as a caregiver, there are resources to help you.&nbsp;</span><a data-dcnode-id="624" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.henryford.com/services/lung-thoracic-cancer"><span data-dcnode-id="625" instrument_node="">Learn more about lung cancer treatment </span></a><span data-dcnode-id="623" instrument_node="">at the Henry Ford Cancer Institute.&nbsp;
</span></strong></em></p><span data-dcnode-id="619" instrument_node="">
</span><p data-dcnode-id="614"><em data-dcnode-id="615"><a data-dcnode-id="617" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.henryford.com/physician-directory/o/okereke-ikenna"><span data-dcnode-id="618" instrument_node="">Ikenna Okereke, M.D.,</span></a><span data-dcnode-id="616" instrument_node=""> is the system director of thoracic surgery at Henry Ford Health. He specializes in minimally invasive surgeries for lung and esophageal disease. He sees patients at the Henry Ford Cancer Institute and most of the campuses across Henry Ford Health.</span></em></p><span data-dcnode-id="613" instrument_node="">
