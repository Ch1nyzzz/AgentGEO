0x86.jpeg 150w, https://www.knowyourasthma.com/wp-content/uploads/chronic-and-persistent-asthma-julielewin-com.jpeg 1000w" title="chronic-and-persistent-asthma-julielewin-com.jpeg" width="696"><span data-dcnode-id="1226" instrument_node=""> </span></a></div></div><div class="td_block_wrap tdb_single_content tdi_75 td-pb-border-top td_block_template_1 td-post-content tagdiv-type" data-dcnode-id="825" data-td-block-uid="tdi_75"><span data-dcnode-id="1222" instrument_node=""> </span><div class="tdb-block-inner td-fix-index" data-dcnode-id="826"><p data-dcnode-id="1219"></p><h2 data-dcnode-id="1217"><span data-dcnode-id="1218" instrument_node="">Who Is At Risk For Asthma</span></h2><div class="youtube-player" data-dcnode-id="1209" data-id="PzfLDi-sL3w"><span data-dcnode-id="1216" instrument_node=""> How does asthma work? – Christopher E. Gaw</span><div data-dcnode-id="1213" data-id="PzfLDi-sL3w"><img class="td-animation-stack-type0-2" data-dcnode-id="1215" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//i.ytimg.com/vi/PzfLDi-sL3w/hqdefault.jpg&amp;raw"><div class="play" data-dcnode-id="1214"></div></div><div data-dcnode-id="1210" data-id="PzfLDi-sL3w"><img class="td-animation-stack-type0-2" data-dcnode-id="1212" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//i.ytimg.com/vi/PzfLDi-sL3w/hqdefault.jpg&amp;raw"><div class="play" data-dcnode-id="1211"></div></div></div><p data-dcnode-id="1207"><span data-dcnode-id="1208" instrument_node="">Asthma affects people of all ages, but it often starts during childhood. Certain factors can raise your risk of having asthma:</span></p><ul data-dcnode-id="1173"><li data-dcnode-id="1203"><strong data-dcnode-id="1205"><span data-dcnode-id="1206" instrument_node="">Being exposed to secondhand smoke</span></strong><span data-dcnode-id="1204" instrument_node=""> when your mother is pregnant with you or when you are a small child</span></li><li data-dcnode-id="1199"><strong data-dcnode-id="1201"><span data-dcnode-id="1202" instrument_node="">Being exposed to certain substances at work</span></strong><span data-dcnode-id="1200" instrument_node="">, such as chemical irritants or industrial dusts</span></li><li data-dcnode-id="1195"><strong data-dcnode-id="1197"><span data-dcnode-id="1198" instrument_node="">Genetics and family history.</span></strong><span data-dcnode-id="1196" instrument_node=""> You are more likely to have asthma if one of your parents has it, especially if it’s your mother.</span></li><li data-dcnode-id="1191"><strong data-dcnode-id="1193"><span data-dcnode-id="1194" instrument_node="">Race or ethnicity.</span></strong><span data-dcnode-id="1192" instrument_node=""> Black and African Americans and Puerto Ricans are at higher risk of asthma than people of other races or ethnicities.</span></li><li data-dcnode-id="1182"><strong data-dcnode-id="1189"><span data-dcnode-id="1190" instrument_node="">Having other medical conditions</span></strong><span data-dcnode-id="1188" instrument_node=""> such as </span><a data-dcnode-id="1186" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.knowyourasthma.com/how-many-kids-in-the-us-have-asthma/"><span data-dcnode-id="1187" instrument_node="">allergies</span></a><span data-dcnode-id="1185" instrument_node=""> and </span><a data-dcnode-id="1183" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.knowyourasthma.com/how-do-you-know-when-you-have-an-asthma-attack/"><span data-dcnode-id="1184" instrument_node="">obesity</span></a></li><li data-dcnode-id="1178"><strong data-dcnode-id="1180"><span data-dcnode-id="1181" instrument_node="">Often having viral respiratory infections</span></strong><span data-dcnode-id="1179" instrument_node=""> as a young child</span></li><li data-dcnode-id="1174"><strong data-dcnode-id="1176"><span data-dcnode-id="1177" instrument_node="">Sex.</span></strong><span data-dcnode-id="1175" instrument_node=""> In children, asthma is more common in boys. In teens and adults, it is more common in women.</span></li></ul><h2 data-dcnode-id="1171"><span data-dcnode-id="1172" instrument_node="">Identifying Asthma Triggers With Allergy Testing</span></h2><p data-dcnode-id="1169"><span data-dcnode-id="1170" instrument_node="">Determining what triggers a persons asthma is often difficult.</span></p><p data-dcnode-id="1164"><span data-dcnode-id="1168" instrument_node="">Allergy testing is appropriate when there is a suspicion that some avoidable substance is provoking attacks. </span><a data-dcnode-id="1166" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.knowyourasthma.com/is-asthma-dangerous-during-pregnancy/"><span data-dcnode-id="1167" instrument_node="">Skin testing</span></a><span data-dcnode-id="1165" instrument_node=""> can help identify allergens that may trigger asthma symptoms. However, an allergic response to a skin test does not necessarily mean that the allergen being tested is causing the asthma. The person still has to note whether attacks occur after exposure to this allergen. If doctors suspect a particular allergen, a blood test that measures the level of antibody produced in response to the allergen can be done to determine the degree of the person’s sensitivity to the allergen.</span></p><h2 data-dcnode-id="1162"><span data-dcnode-id="1163" instrument_node="">What Can Be Done About It</span></h2><p data-dcnode-id="1160"><span data-dcnode-id="1161" instrument_node="">Asthma can be controlled. Moreover, it can be controlled by those who have asthma. The role of the physician is to provide the means for the patient to control asthma and to teach the patient to use provided measures .</span></p><p data-dcnode-id="1158"><span data-dcnode-id="1159" instrument_node="">Since asthma varies greatly in pattern of symptoms and severity, the treatment plan needs to be individualized. This should be done in a systematic manner. Goals of therapy must be realistically attainable and explicitly defined for you. The plan for attaining the treatment goals must be understood. Once the measures needed for control of asthma are identified, they can be placed in the hands of the patient with appropriate instructions for usage. Parental supervision is needed for young children, but progressive responsibility for self-management is given with advancing maturity.</span></p><p data-dcnode-id="1156"><span data-dcnode-id="1157" instrument_node="">Treatment may consist of medication, environmental changes, and life-style changes. The more the patient understands the disease and its treatment, the better the outcome is likely to be. The patient should therefore be an active partner in making decisions about treatment. Be wary, however, of superstitions and misinformation regarding asthma. More than almost any other medical problem, asthma is associated with a wide diversity of medical and nonmedical opinion. Both the physician and the patient therefore need to exercise judgment. Four common sense measures to remember are:</span></p><p data-dcnode-id="1150"><strong data-dcnode-id="1151"><span data-dcnode-id="1155" instrument_node="">Don’t Miss: </span><a data-dcnode-id="1153" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.knowyourasthma.com/does-ibuprofen-make-asthma-worse/"><span data-dcnode-id="1154" instrument_node="">Ibuprofen And Asthmatics</span></a><span data-dcnode-id="1152" instrument_node=""> </span></strong></p><h2 data-dcnode-id="1148"><span data-dcnode-id="1149" instrument_node="">How Serious Is Asthma</span></h2><p data-dcnode-id="1146"><span data-dcnode-id="1147" instrument_node="">Tragically, three people die every day because of asthma attacks and research shows that two thirds of asthma deaths are preventable.;</span></p><p data-dcnode-id="1144"><span data-dcnode-id="1145" instrument_node="">The reassuring fact is that most people with asthma who get the right treatment -;and take it correctly -;can manage their symptoms and get on with what they want to do in life.</span></p><h2 data-dcnode-id="1142"><span data-dcnode-id="1143" instrument_node="">Will I Always Have Asthma</span></h2><div data-dcnode-id="1137"><span data-dcnode-id="1141" instrument_node=""> </span><img alt="Stress and Asthma" class="lazyloaded td-animation-stack-type0-2" data-dcnode-id="1140" data-src="https://www.knowyourasthma.com/wp-content/uploads/stress-and-asthma-introduction-to-psychology.jpeg" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.knowyourasthma.com/wp-content/uploads/stress-and-asthma-introduction-to-psychology.jpeg&amp;raw" title="Stress and Asthma"><noscript data-dcnode-id="1138"><span data-dcnode-id="1139" instrument_node="">&lt;img class="lazyload" src="https://www.knowyourasthma.com/wp-content/uploads/stress-and-asthma-introduction-to-psychology.jpeg" title="Stress and Asthma" alt="Stress and Asthma"&gt;</span></noscript></div><p data-dcnode-id="1135"><span data-dcnode-id="1136" instrument_node="">Asthma is a lifelong condition; most people who have asthma will always have asthma.</span></p><p data-dcnode-id="1133"><span data-dcnode-id="1134" instrument_node="">But if youve been diagnosed with asthma as a child, your asthma might improve or disappear completely as you get older, particularly if the asthma was mild. ;</span></p><p data-dcnode-id="1125"><span data-dcnode-id="1132" instrument_node="">Even if asthma goes away it can come back later in life, perhaps because youve come into contact with new triggers in your job, or youve moved to an area with more </span><a data-dcnode-id="1130" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.qualityhealth.com/asthma-articles/how-asthma-impacts-lung-function" rel="noopener" target="_blank"><span data-dcnode-id="1131" instrument_node="">air pollution </span></a><span data-dcnode-id="1129" instrument_node="">for example. </span><a data-dcnode-id="1127" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.knowyourasthma.com/how-to-help-someone-with-asthma/"><span data-dcnode-id="1128" instrument_node="">Hormonal changes such as pregnancy and menopause</span></a><span data-dcnode-id="1126" instrument_node=""> can also bring it on again.</span></p><p data-dcnode-id="1120"><span data-dcnode-id="1124" instrument_node="">But the good news is that even though asthma doesnt go away there are lots of safe and effective;</span><a data-dcnode-id="1122" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.knowyourasthma.com/do-chihuahuas-help-cure-asthma/"><span data-dcnode-id="1123" instrument_node="">treatments</span></a><span data-dcnode-id="1121" instrument_node="">;available to help you stay symptom-free.</span></p><p data-dcnode-id="1115"><span data-dcnode-id="1119" instrument_node="">If youve tried taking all the usual treatments in the right way, but youre still having symptoms, your GP can refer you to a specialist to see if you have severe asthma. This kind of asthma only affects around 4% of all people with asthma. An asthma specialist can help you find the right treatments for you, for example </span><a data-dcnode-id="1117" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.knowyourasthma.com/are-asthma-and-copd-the-same-thing/"><span data-dcnode-id="1118" instrument_node="">monoclonal antibodies</span></a><span data-dcnode-id="1116" instrument_node="">.</span></p><p data-dcnode-id="1109"><strong data-dcnode-id="1110"><span data-dcnode-id="1114" instrument_node="">You May Like: </span><a data-dcnode-id="1112" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.knowyourasthma.com/what-to-do-when-having-an-asthma-attack/"><span data-dcnode-id="1113" instrument_node="">How To Help Asthma Attack</span></a><span data-dcnode-id="1111" instrument_node=""> </span></strong></p><h2 data-dcnode-id="1107"><span data-dcnode-id="1108" instrument_node="">The Connection Between Lungs And Heart</span></h2><p data-dcnode-id="1105"><span data-dcnode-id="1106" instrument_node="">The lungs and the heart work very closely and are heavily dependent on each other. One of the primary functions of the heart is to supply oxygen to other parts of the body. And oxygen enters the body through lungs. So if theres any issue with the health of your lungs, the heart has to work harder to circulate oxygen throughout the body. All of this means that healthy lungs play a critical role in heart health.</span></p><h2 data-dcnode-id="1103"><span data-dcnode-id="1104" instrument_node="">Signs You Actually Have Severe Asthma</span></h2><ul data-dcnode-id="1102"></ul><p data-dcnode-id="1097"><span data-dcnode-id="1101" instrument_node="">Breathing is just one of those things you take for granted until it feels like every inhale or exhale is a struggle. Unfortunately, people with severe </span><a data-dcnode-id="1099" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.knowyourasthma.com/how-do-you-treat-childhood-asthma-naturally/"><span data-dcnode-id="1100" instrument_node="">asthma</span></a><span data-dcnode-id="1098" instrument_node=""> have to deal with breathing issues way more often than anyone should, and it can be completely terrifying.</span></p><p data-dcnode-id="1080"><span data-dcnode-id="1096" instrument_node="">Asthma is a respiratory condition that affects the airways that extend from your </span><a data-dcnode-id="1094" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.knowyourasthma.com/does-heat-and-humidity-affect-asthma/"><span data-dcnode-id="1095" instrument_node="">nose</span></a><span data-dcnode-id="1093" instrument_node=""> and mouth to your lungs, according to the </span><a data-dcnode-id="1091" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.nhlbi.nih.gov/health-topics/asthma" rel="nofollow noopener" target="_blank"><span data-dcnode-id="1092" instrument_node="">National Heart, Lung, and Blood Institute</span></a><span data-dcnode-id="1090" instrument_node=""> . When youre exposed to triggers like animal fur, pollen, mold, </span><a data-dcnode-id="1088" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.knowyourasthma.com/what-to-avoid-during-asthma/"><span data-dcnode-id="1089" instrument_node="">exercise</span></a><span data-dcnode-id="1087" instrument_node="">, and respiratory infections, these airways can narrow, restricting your airflow. This can then make the muscles surrounding your airways constrict, making it even harder to breathe, and cause your airways to produce more mucus than normal, further compounding the problem. All together, this can lead to asthma symptoms like </span><a data-dcnode-id="1085" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.knowyourasthma.com/what-causes-asthma-in-infants/"><span data-dcnode-id="1086" instrument_node="">shortness of breath</span></a><span data-dcnode-id="1084" instrument_node="">, coughing, wheezing , and chest tightness or pain, according to the </span><a data-dcnode-id="1082" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.nhlbi.nih.gov/health-topics/asthma" rel="nofollow noopener" target="_blank"><span data-dcnode-id="1083" instrument_node="">NHLBI</span></a><span data-dcnode-id="1081" instrument_node="">.</span></p><p data-dcnode-id="1075"><span data-dcnode-id="1079" instrument_node="">Like most </span><a data-dcnode-id="1077" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.knowyourasthma.com/are-there-different-types-of-asthma/"><span data-dcnode-id="1078" instrument_node="">health conditions</span></a><span data-dcnode-id="1076" instrument_node="">, asthma severity runs along a spectrum, Emily Pennington, M.D., a pulmonologist at the Cleveland Clinic, tells SELF. Some people have cases where they experience minor symptoms here and there . Others can have asthma that is basically an ever-present problem and might result in scary asthma attacks, which is when symptoms ramp up in severity and can even become life-threatening.</span></p><p data-dcnode-id="1072"><strong data-dcnode-id="1073"><span data-dcnode-id="1074" instrument_node="">Related:</span></strong></p><p data-dcnode-id="1066"><strong data-dcnode-id="1067"><span data-dcnode-id="1071" instrument_node="">Also Check: </span><a data-dcnode-id="1069" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.knowyourasthma.com/what-kind-of-specialist-treats-asthma/"><span data-dcnode-id="1070" instrument_node="">What Kind Of Specialist Treats Asthma</span></a><span data-dcnode-id="1068" instrument_node=""> </span></strong></p><h2 data-dcnode-id="1064"><span data-dcnode-id="1065" instrument_node="">Effect Of Obesity On Lung Volumes And Expiratory Flows</span></h2><p data-dcnode-id="1062"><span data-dcnode-id="1063" instrument_node="">Although obesity significantly reduces functional residual capacity and expiratory reserve volume , it has very little effect on residual volume and total lung capacity . Several studies have demonstrated small reductions in TLC with increasing BMI, but TLC is usually well-preserved even in patients with severe obesity . RV is typically within the normal range in people with obesity , and the RV-to-TLC ratio, an indicator of gas trapping, is also normal or slightly increased .</span></p><p data-dcnode-id="1060"><span data-dcnode-id="1061" instrument_node="">Measurements of static pulmonary volumes combined with measurements of transpulmonary and transdiaphragmatic pressures have provided deeper insights into the effects of obesity on lung mechanics and subsequent lung volumes. A landmark study on the effect of obesity on lung volumes measured in the seated position demonstrated that esophageal and gastric pressure at FRC were significantly elevated in obese subjects as compared to their healthy counterparts who were matched for age, gender and height . Similar results were recorded in the supine position, and BMI correlated with gastric and esophageal pressures.</span></p><h2 data-dcnode-id="1058"><span data-dcnode-id="1059" instrument_node="">Alcohol Effects On Lungs</span></h2><div class="youtube-player" data-dcnode-id="1050" data-id="fjoFqQ80II8"><span data-dcnode-id="1057" instrument_node=""> How Asthma Affects Your Lungs and Your Life</span><div data-dcnode-id="1054" data-id="fjoFqQ80II8"><img class="td-animation-stack-type0-2" data-dcnode-id="1056" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//i.ytimg.com/vi/fjoFqQ80II8/hqdefault.jpg&amp;raw"><div class="play" data-dcnode-id="1055"></div></div><div data-dcnode-id="1051" data-id="fjoFqQ80II8"><img class="td-animation-stack-type0-2" data-dcnode-id="1053" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//i.ytimg.com/vi/fjoFqQ80II8/hqdefault.jpg&amp;raw"><div class="play" data-dcnode-id="1052"></div></div></div><p data-dcnode-id="1048"><span data-dcnode-id="1049" instrument_node="">Heavy alcohol use can cause damage to the lungs in a few different ways. It can interfere with the immune system that keeps the lungs healthy and able to fight off infections. It can also harm the surface cells that line the insides of the lungs.</span></p><p data-dcnode-id="1046"><span data-dcnode-id="1047" instrument_node="">Every day, a person inhales things in the air from which the lungs and immune system try to protect them. Parts of the lungs are even lined with moving, hair-like cells called cilia whose job it is to sweep things inhaled out of the lungs. Heavy alcohol&gt; use harms this whole process.</span></p><p data-dcnode-id="1041"><span data-dcnode-id="1045" instrument_node="">Alcohols damage to lung cells and the immune system is so well known that it is a syndrome termed alcoholic lung. </span><a data-dcnode-id="1043" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.ncbi.nlm.nih.gov/pmc/articles/PMC5513688/" rel="nofollow noopener" target="_blank"><span data-dcnode-id="1044" instrument_node="">One study showed </span></a><span data-dcnode-id="1042" instrument_node="">that chronic alcohol use can start to harm the lungs in as little as six weeks.</span></p><p data-dcnode-id="1037"><a data-dcnode-id="1039" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.knowyourasthma.com/can-you-join-the-reserves-with-asthma/"><span data-dcnode-id="1040" instrument_node="">Alcohol abuse</span></a><span data-dcnode-id="1038" instrument_node=""> can also cause inflammation and harm cells in both the upper and lower parts of the airway. Its not the alcohol in its liquid form that does this, it is actually the vapor. Alcohol, after all, is an irritating chemical.</span></p><p data-dcnode-id="1035"><span data-dcnode-id="1036" instrument_node="">After a person drinks alcohol, besides going into the bloodstream, some of it will diffuse out into the lungs and end up in the breath. Breathalyzer tests work because the alcohol is partly breathed out in vapor form. But when it is in vapor form, then it is free to cause damage to the airway. This damage happens not only in the lungs but also in the nasal passages and sinuses, causing inflammation and making them less able to fight off infection.</span></p><p data-dcnode-id="1030"><strong data-dcnode-id="1031"><span data-dcnode-id="1034" instrument_node="">You May Like: </span><a data-dcnode-id="1032" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.knowyourasthma.com/is-asthma-an-airborne-disease/"><span data-dcnode-id="1033" instrument_node="">Are Allergies And Asthma Related</span></a></strong></p><p data-dcnode-id="1024"><strong data-dcnode-id="1025"><span data-dcnode-id="1029" instrument_node="">Also Check: </span><a data-dcnode-id="1027" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.knowyourasthma.com/can-you-enter-the-military-with-asthma/"><span data-dcnode-id="1028" instrument_node="">Can You Enter The Military With Asthma</span></a><span data-dcnode-id="1026" instrument_node=""> </span></strong></p><h2 data-dcnode-id="1022"><span data-dcnode-id="1023" instrument_node="">Global Alliance Against Chronic Respiratory Diseases</span></h2><p data-dcnode-id="1020"><span data-dcnode-id="1021" instrument_node="">The Global Alliance against Chronic Respiratory Diseases contributes to WHOs work to prevent and control chronic respiratory diseases. GARD is a voluntary alliance of national and international organizations and agencies from many countries committed to the vision of a world where all people breathe freely.</span></p><h2 data-dcnode-id="1018"><span data-dcnode-id="1019" instrument_node="">Asthma Symptoms Childhood Vs Adult</span></h2><p data-dcnode-id="1016"><span data-dcnode-id="1017" instrument_node="">Childhood asthma symptoms are generally similar to adult asthma symptoms. However, determining asthma symptoms in children can be a bit more difficult. Adult asthma symptoms are easier to determine since an adult can tell you how they are feeling plus they know their body better. Although you can see and hear the coughing and shortness of breath in younger children, they may not be able to let you know how they are feeling. Plus young children are not able to do a breathing test called spirometry.</span></p><ul data-dcnode-id="1001"><li data-dcnode-id="1014"><span data-dcnode-id="1015" instrument_node="">Not being able to keep up with other children while running around</span></li><li data-dcnode-id="1012"><span data-dcnode-id="1013" instrument_node="">Having a hard time catching their breath or breathing faster than other children who are doing the same thing</span></li><li data-dcnode-id="1010"><span data-dcnode-id="1011" instrument_node="">Looks like they have a cold, which could actually be asthma</span></li><li data-dcnode-id="1008"><span data-dcnode-id="1009" instrument_node="">Coughing, especially at night</span></li><li data-dcnode-id="1006"><span data-dcnode-id="1007" instrument_node="">Coughing so hard that they vomit</span></li><li data-dcnode-id="1004"><span data-dcnode-id="1005" instrument_node="">You may hear wheezing</span></li><li data-dcnode-id="1002"><span data-dcnode-id="1003" instrument_node="">If you notice any of these typical childhood asthma symptoms, see your doctor to find out if it is due to asthma.</span></li></ul><p data-dcnode-id="995"><strong data-dcnode-id="996"><span data-dcnode-id="1000" instrument_node="">You May Like: </span><a data-dcnode-id="998" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.knowyourasthma.com/why-are-asthma-and-eczema-related/"><span data-dcnode-id="999" instrument_node="">Why Are Asthma And Eczema Related</span></a><span data-dcnode-id="997" instrument_node=""> </span></strong></p><h2 data-dcnode-id="993"><span data-dcnode-id="994" instrument_node="">What Are Some Alternatives</span></h2><p data-dcnode-id="991"><span data-dcnode-id="992" instrument_node="">The rise of niche cocktails has lead to the creation of the mocktail. A mocktail can be just as refreshing and festive as a cocktail, and it comes without potential side effects.</span></p><p data-dcnode-id="989"><span data-dcnode-id="990" instrument_node="">Sulfites are preservatives that can often be found in mixers. When ordering a mocktail, be sure to look for one that has fresh ingredients.</span></p><p data-dcnode-id="987"><span data-dcnode-id="988" instrument_node="">You can also search the kids menu, or modify the drinks you used to order on special childhood occasions. How about a grown-up version of a Shirley Temple? Pair fresh cherry and lime juice paired with sparkling soda to create one.</span></p><p data-dcnode-id="985"><span data-dcnode-id="986" instrument_node="">Do you want to make a mocktail at home? Thats easy, too. Combine sparkling water with some fresh-squeezed juice, or muddled fruits and herbs.</span></p><p data-dcnode-id="980"><strong data-dcnode-id="981"><span data-dcnode-id="984" instrument_node="">You May Like: </span><a data-dcnode-id="982" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.knowyourasthma.com/can-you-get-disability-for-asthma/"><span data-dcnode-id="983" instrument_node="">What Is Viral Induced Asthma</span></a></strong></p><h2 data-dcnode-id="978"><span data-dcnode-id="979" instrument_node="">What Should I Do If I Have A Severe Asthma Attack</span></h2><div data-dcnode-id="973"><span data-dcnode-id="977" instrument_node=""> </span><img alt="Hypnotherapy for Asthma" class="lazyload td-animation-stack-type0-1" data-dcnode-id="976" data-src="https://www.knowyourasthma.com/wp-content/uploads/hypnotherapy-for-asthma-advice-on-hypnothrapy-as.jpeg" src="data:image/gif;base64,R0lGODlhAQABAIAAAAAAAP///yH5BAEAAAAALAAAAAABAAEAAAIBRAA7" title="Hypnotherapy for Asthma"><noscript data-dcnode-id="974"><span data-dcnode-id="975" instrument_node="">&lt;img class="lazyload" src="https://www.knowyourasthma.com/wp-content/uploads/hypnotherapy-for-asthma-advice-on-hypnothrapy-as.jpeg" title="Hypnotherapy for Asthma" alt="Hypnotherapy for Asthma"&gt;</span></noscript></div><p data-dcnode-id="971"><span data-dcnode-id="972" instrument_node="">A severe asthma attack needs immediate medical care. The first step is your rescue inhaler. A rescue inhaler uses fast-acting medicines to open up your airways. Its different than your normal maintenance inhaler, which you use every day. You should only use the rescue inhaler in an emergency.</span></p><p data-dcnode-id="969"><span data-dcnode-id="970" instrument_node="">If your rescue inhaler doesnt help or you dont have it with you, go to the emergency department if you have:</span></p><ul data-dcnode-id="962"><li data-dcnode-id="967"><span data-dcnode-id="968" instrument_node="">Anxiety or panic.</span></li><li data-dcnode-id="965"><span data-dcnode-id="966" instrument_node="">Bluish fingernails, bluish lips or gray or whitish lips or gums .</span></li><li data-dcnode-id="963"><span data-dcnode-id="964" instrument_node="">Chest pain or pressure.</span></li></ul><p data-dcnode-id="956"><strong data-dcnode-id="957"><span data-dcnode-id="961" instrument_node="">Read Also: </span><a data-dcnode-id="959" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.knowyourasthma.com/do-oxygen-levels-drop-during-asthma-attack/"><span data-dcnode-id="960" instrument_node="">Do Oxygen Levels Drop During Asthma Attack</span></a><span data-dcnode-id="958" instrument_node=""> </span></strong></p><h2 data-dcnode-id="954"><span data-dcnode-id="955" instrument_node="">Having An Asthma Action Plan</span></h2><p data-dcnode-id="952"><span data-dcnode-id="953" instrument_node="">You and your doctor will also put together an asthma action plan. This is a personalised set of instructions that includes a list of your usual asthma medications and doses, guidance on what to do in different situations , and your doctors contact details.</span></p><h2 data-dcnode-id="950"><span data-dcnode-id="951" instrument_node="">Physical Symptoms Of Asthma</span></h2><p data-dcnode-id="948"><span data-dcnode-id="949" instrument_node="">Asthma symptoms and severity vary substantially from person to person. Most people with asthma do not have symptoms constantly. Bothersome asthma symptoms can mean that asthma is not controlled sufficiently or that an acute asthma episode may be starting. Common asthma symptoms include:</span></p><ul data-dcnode-id="941"><li data-dcnode-id="946"><span data-dcnode-id="947" instrument_node="">Coughing</span></li><li data-dcnode-id="944"><span data-dcnode-id="945" instrument_node="">Shortness of breath</span></li><li data-dcnode-id="942"><span data-dcnode-id="943" instrument_node="">Awakening in the night from coughing or wheezing</span></li></ul><p data-dcnode-id="939"><span data-dcnode-id="940" instrument_node="">If you do not have asthma, you can help yourself imagine what it feels like to have an asthma episode:</span></p><li data-dcnode-id="937"><span data-dcnode-id="938" instrument_node="">Run in place for a minute or two, until you can feel your heart start to beat fast. Take a plastic drinking straw and put it in your mouth. Hold your nose closed and continue to breathe through the straw. OR</span></li><li data-dcnode-id="935"><span data-dcnode-id="936" instrument_node="">Take a deep breath in and hold it a moment. Now let out about a tenth of the air in your lungs. Breathe back in. Breathe out that same small amount of air. Breathe back in. Repeat until you can’t stand it anymore.</span></li><p data-dcnode-id="929"><strong data-dcnode-id="930"><span data-dcnode-id="934" instrument_node="">Also Check: </span><a data-dcnode-id="932" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.knowyourasthma.com/what-cough-medicine-can-you-take-if-you-have-asthma/"><span data-dcnode-id="933" instrument_node="">What Cough Medicine Can You Take If You Have Asthma</span></a><span data-dcnode-id="931" instrument_node=""> </span></strong></p><h2 data-dcnode-id="927"><span data-dcnode-id="928" instrument_node="">How Is Asthma Diagnosed</span></h2><p data-dcnode-id="925"><span data-dcnode-id="926" instrument_node="">To diagnose asthma, a doctor will do a physical exam and ask about the person’s medical history, including whether anyone else;in the family has asthma.</span></p><p data-dcnode-id="917"><span data-dcnode-id="924" instrument_node="">The doctor might do tests like </span><a data-dcnode-id="922" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.knowyourasthma.com/how-do-you-know-if-a-child-has-asthma/"><span data-dcnode-id="923" instrument_node="">spirometry</span></a><span data-dcnode-id="921" instrument_node=""> or peak flow meter tests. These involve blowing into devices that can measure how well the lungs are working. </span><a data-dcnode-id="919" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.lung.org/lung-health-diseases/lung-disease-lookup/asthma/learn-about-asthma/impact-of-asthma" rel="noopener" target="_blank"><span data-dcnode-id="920" instrument_node="">Allergy tests</span></a><span data-dcnode-id="918" instrument_node=""> or exercise tests can tell doctors if asthma is brought on by allergens or physical activity. Doctors may use X-rays to rule out other problems.</span></p><h2 data-dcnode-id="915"><span data-dcnode-id="916" instrument_node="">Adipokines And Systemic Inflammation In Obesity</span></h2><div class="youtube-player" data-dcnode-id="907" data-id="pY8Z6iJw74k"><span data-dcnode-id="914" instrument_node=""> How does cold weather affect asthma?</span><div data-dcnode-id="911" data-id="pY8Z6iJw74k"><img class="td-animation-stack-type0-1" data-dcnode-id="913" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//i.ytimg.com/vi/pY8Z6iJw74k/hqdefault.jpg&amp;raw"><div class="play" data-dcnode-id="912"></div></div><div data-dcnode-id="908" data-id="pY8Z6iJw74k"><img class="td-animation-stack-type0-1" data-dcnode-id="910" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//i.ytimg.com/vi/pY8Z6iJw74k/hqdefault.jpg&amp;raw"><div class="play" data-dcnode-id="909"></div></div></div><p data-dcnode-id="905"><span data-dcnode-id="906" instrument_node="">Adipose tissue is an important endocrine organ that secretes adipocyte-derived factors known as adipokines, which might affect airway function. Adipokines are energy-regulating proteins synthesized and secreted by adipose tissue. Adipokines are differentially expressed in the adipose tissue of obese subjects compared with lean subjects, and in obese patients with asthma compared to those without asthma. Expression of adiponectinthe most abundant anti-inflammatory adipokine in the adipose tissueis markedly reduced; expression of leptina pro-inflammatory adipokine  is increased, in obese patients with asthma .</span></p><p data-dcnode-id="903"><span data-dcnode-id="904" instrument_node="">Other inflammatory mediators that are increased in obesity include tumor necrosis factor alpha , interleukin 8 and IL-6 , high-sensitivity C-reactive protein and monocyte chemoattractant protein-1 . In addition, the level of circulating leukocytes in the blood of obese subjects is increased compared to lean individuals . The role of these other cytokines in obese asthma is not well-understood.</span></p><p data-dcnode-id="897"><strong data-dcnode-id="898"><span data-dcnode-id="902" instrument_node="">Read Also: </span><a data-dcnode-id="900" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.knowyourasthma.com/how-to-help-a-child-having-an-asthma-attack/"><span data-dcnode-id="901" instrument_node="">How To Help A Child Having An Asthma Attack</span></a><span data-dcnode-id="899" instrument_node=""> </span></strong></p><h2 data-dcnode-id="895"><span data-dcnode-id="896" instrument_node="">Reducing The Burden Of Asthma</span></h2><p data-dcnode-id="893"><span data-dcnode-id="894" instrument_node="">Asthma cannot be cured, but good management with inhaled medications can control the disease and enable people with asthma to enjoy a normal, active life.</span></p><p data-dcnode-id="891"><span data-dcnode-id="892" instrument_node="">There are two main types of inhaler:</span></p><ul data-dcnode-id="886"><li data-dcnode-id="889"><span data-dcnode-id="890" instrument_node="">bronchodilators , that open the air passages and relieve symptoms; and</span></li><li data-dcnode-id="887"><span data-dcnode-id="888" instrument_node="">steroids , that reduce inflammation in the air passages. This improves asthma symptoms and reduces the risk of severe asthma attacks and death.</span></li></ul><p data-dcnode-id="884"><span data-dcnode-id="885" instrument_node="">People with asthma may need to use their inhaler every day. Their treatment will depend on the frequency of symptoms and the different types of inhalers available.</span></p><p data-dcnode-id="882"><span data-dcnode-id="883" instrument_node="">It can be difficult to coordinate breathing using an inhaler  especially for children and during emergency situations. Using a spacer device makes it easier to use an aerosol inhaler and helps the medicine to reach the lungs more effectively. A spacer is a plastic container with a mouthpiece or mask at one end, and a hole for the inhaler in the other. A homemade spacer, made from a 500-ml plastic bottle, can be as effective as a commercially-manufactured inhaler.;</span></p><p data-dcnode-id="880"><span data-dcnode-id="881" instrument_node="">Access to inhalers is a problem in many countries. In 2019, only half of people with asthma had access to a bronchodilator and less than one in five had access to a steroid inhaler in public primary health-care facilities in low-income countries .</span></p><h2 data-dcnode-id="878"><span data-dcnode-id="879" instrument_node="">What Is An Asthma Action Plan</span></h2><p data-dcnode-id="876"><span data-dcnode-id="877" instrument_node="">Your healthcare provider will work with you to develop an asthma action plan. This plan tells you how and when to use your medicines. It also tells you what to do if your asthma gets worse and when to seek emergency care. Understand the plan and ask your healthcare provider about anything you dont understand.</span></p><p data-dcnode-id="870"><strong data-dcnode-id="871"><span data-dcnode-id="875" instrument_node="">Also Check: </span><a data-dcnode-id="873" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.knowyourasthma.com/what-is-exercise-induced-asthma/"><span data-dcnode-id="874" instrument_node="">What Is Exercise Induced Asthma</span></a><span data-dcnode-id="872" instrument_node=""> </span></strong></p><h2 data-dcnode-id="868"><span data-dcnode-id="869" instrument_node="">Is All Asthma The Same</span></h2><p data-dcnode-id="866"><span data-dcnode-id="867" instrument_node="">Asthma is quite variable. Symptoms can range from trivial and infrequent in some to severe, unrelenting, and dangerous in others. Even when severe, however, the airway obstruction is usually fully reversible, either spontaneously or as a result of treatment. This means that symptoms can be relieved, airway obstruction can be reversed, and pulmonary function can be made normal.</span></p><p data-dcnode-id="861"><span data-dcnode-id="865" instrument_node="">There are different patterns of asthma. Some people have only an intermittent pattern of disease. They have self-limited episodes of varying severity followed by extended symptom-free periods. The individual episodes are frequently triggered by viral respiratory infections . This is particularly common in young children in whom viral respiratory infections are frequent . Others have these intermittent symptomatic periods brought on by vigorous exertion, cold air, or specific environmental exposures. This pattern is </span><strong data-dcnode-id="863"><span data-dcnode-id="864" instrument_node="">intermittent asthma</span></strong><span data-dcnode-id="862" instrument_node="">.</span></p><p data-dcnode-id="856"><span data-dcnode-id="860" instrument_node="">More prolonged periods of symptoms occur in people who have asthma from seasonal outdoor inhalant allergens. This may be from grass pollen on the West Coast or mold spores from molds that grow on decaying vegetation in the Midwest. Through a knowledge of the aerobiology in your area and allergy skin testing, your physician can attempt to identify whether the symptoms fit into this pattern of disease. This pattern is </span><strong data-dcnode-id="858"><span data-dcnode-id="859" instrument_node="">seasonal allergic asthma</span></strong><span data-dcnode-id="857" instrument_node="">.</span></p><h2 data-dcnode-id="854"><span data-dcnode-id="855" instrument_node="">How Is Asthma Linked To Heart Disease</span></h2><div data-dcnode-id="849"><span data-dcnode-id="853" instrument_node=""> </span><img alt="Asthma" class="lazyload td-animation-stack-type0-1" data-dcnode-id="852" data-src="https://www.knowyourasthma.com/wp-content/uploads/asthma-pathology-britannica.jpeg" src="data:image/gif;base64,R0lGODlhAQABAIAAAAAAAP///yH5BAEAAAAALAAAAAABAAEAAAIBRAA7" title="Asthma"><noscript data-dcnode-id="850"><span data-dcnode-id="851" instrument_node="">&lt;img class="lazyload" src="https://www.knowyourasthma.com/wp-content/uploads/asthma-pathology-britannica.jpeg" title="Asthma" alt="Asthma"&gt;</span></noscript></div><ul data-dcnode-id="836"><li data-dcnode-id="847"><span data-dcnode-id="848" instrument_node="">The symptoms of both asthma and heart failure include shortness of breath, severe chest pains and coughing. It is difficult to distinguish between the two at first glance.</span></li><li data-dcnode-id="845"><span data-dcnode-id="846" instrument_node="">Both asthma and heart disease are caused by inflammation in the body.</span></li><li data-dcnode-id="843"><span data-dcnode-id="844" instrument_node="">In the event of an asthma attack, the patient is also bound to show symptoms of severe chest pains because the flow of blood is compromised when the body is inflamed.</span></li><li data-dcnode-id="841"><span data-dcnode-id="842" instrument_node="">Patients with active asthma are more likely to get a heart failure than those who have not had an asthma attack recently.</span></li><li data-dcnode-id="839"><span data-dcnode-id="840" instrument_node="">Most cases of asthma linked to heart diseases were found in patients who had developed asthma as adults.</span></li><li data-dcnode-id="837"><span data-dcnode-id="838" instrument_node="">Researchers found that patients with asthma had about a 70 percent higher risk of heart diseases than those without asthma.</span></li></ul><p data-dcnode-id="830"><strong data-dcnode-id="831"><span data-dcnode-id="835" instrument_node="">Recommended Reading: </span><a data-dcnode-id="833" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.knowyourasthma.com/how-to-control-your-asthma-naturally/"><span data-dcnode-id="834" instrument_node="">How To Control Your Asthma Naturally</span></a><span data-dcnode-id="832" instrument_node=""> </span></strong></p><p data-dcnode-id="827"><span data-dcnode-id="829" instrument_node=""> </span></p></div></div><div class="wpb_wrapper td_block_separator td_block_wrap vc_separator tdi_77 td_separator_solid td_separator_center" data-dcnode-id="820"><span data-dcnode-id="824" style="border-color:#EBEBEB;border-width:1px;width:100%;"></span><span data-dcnode-id="823" instrument_node=""> </span></div><div class="td_block_wrap tdb_single_post_share tdi_78 td-pb-border-top td_block_template_1" data-dcnode-id="782" data-td-block-uid="tdi_78"><div class="td-post-sharing tdb-block td-ps-bg td-ps-notext td-post-sharing-style1" data-dcnode-id="783" id="tdi_78"><div class="td-post-sharing-visible" data-dcnode-id="790"><div class="td-social-sharing-button td-social-sharing-button-js td-social-handler td-social-share-text" data-dcnode-id="815" style="transition: opacity 0.2s ease 0s; opacity: 1;"><div class="td-social-but-icon" data-dcnode-id="818"><i class="td-icon-share" data-dcnode-id="819"></i></div><div class="td-social-but-text" data-dcnode-id="816"><span data-dcnode-id="817" instrument_node="">Share</span></div></div><a class="td-social-sharing-button td-social-sharing-button-js td-social-network td-social-facebook" data-dcnode-id="809" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.facebook.com/sharer.php%3Fu%3Dhttps%253A%252F%252Fwww.knowyourasthma.com%252Fhow-does-asthma-affect-the-lungs%252F" style="transition: opacity 0.2s ease 0s; opacity: 1;" ti
