</span><div data-dcnode-id="1021"><span data-dcnode-id="1022"><span data-dcnode-id="1023"><span data-dcnode-id="1036" instrument_node="">Patients with </span><b data-dcnode-id="1034"><span data-dcnode-id="1035" instrument_node="">emphysema</span></b><span data-dcnode-id="1033" instrument_node=""> have a very high </span><b data-dcnode-id="1031"><span data-dcnode-id="1032" instrument_node="">lung compliance</span></b><span data-dcnode-id="1030" instrument_node=""> due to the poor elastic recoil. They have extreme difficulty exhaling air. This is due to the fact that a highly </span><b data-dcnode-id="1028"><span data-dcnode-id="1029" instrument_node="">compliant lung</span></b><span data-dcnode-id="1027" instrument_node=""> results in many collapsed alveoli which makes inflation difficult. </span><b data-dcnode-id="1025"><span data-dcnode-id="1026" instrument_node="">Compliance</span></b><span data-dcnode-id="1024" instrument_node=""> also increases with increasing age.</span></span></span></div><a class="lc" data-dcnode-id="1019" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//treehozz.com/goto/339439" rel="nofollow" target="_blank"><span data-dcnode-id="1020" instrument_node="">Click here</span></a><span data-dcnode-id="1018" instrument_node=""> to know more about it.</span><br data-dcnode-id="1017"><span data-dcnode-id="1016" instrument_node=""> Keeping this in view,  how does emphysema affect total lung capacity?</span><p data-dcnode-id="1000"><span data-dcnode-id="1001"><span data-dcnode-id="1002"><span data-dcnode-id="1015" instrument_node="">In patients with </span><b data-dcnode-id="1013"><span data-dcnode-id="1014" instrument_node="">pulmonary emphysema</span></b><span data-dcnode-id="1012" instrument_node="">, </span><b data-dcnode-id="1010"><span data-dcnode-id="1011" instrument_node="">lung</span></b><span data-dcnode-id="1009" instrument_node=""> tissue loss induces a decrease in elastic recoil that is associated with an increase in </span><b data-dcnode-id="1007"><span data-dcnode-id="1008" instrument_node="">total lung capacity</span></b><span data-dcnode-id="1006" instrument_node=""> (TLC), the </span><b data-dcnode-id="1004"><span data-dcnode-id="1005" instrument_node="">lung volume</span></b><span data-dcnode-id="1003" instrument_node=""> at which CT images are obtained after maximal inspiration.</span></span></span></p><p data-dcnode-id="974"><span data-dcnode-id="999" instrument_node="">Additionally,  what causes decreased lung compliance? </span><span data-dcnode-id="975"><span data-dcnode-id="976"><span data-dcnode-id="998" instrument_node="">Common </span><b data-dcnode-id="996"><span data-dcnode-id="997" instrument_node="">causes</span></b><span data-dcnode-id="995" instrument_node=""> of </span><b data-dcnode-id="993"><span data-dcnode-id="994" instrument_node="">decreased lung compliance</span></b><span data-dcnode-id="992" instrument_node=""> are </span><b data-dcnode-id="990"><span data-dcnode-id="991" instrument_node="">pulmonary</span></b><span data-dcnode-id="989" instrument_node=""> fibrosis, pneumonia and </span><b data-dcnode-id="987"><span data-dcnode-id="988" instrument_node="">pulmonary</span></b><span data-dcnode-id="986" instrument_node=""> edema. In an obstructive </span><b data-dcnode-id="984"><span data-dcnode-id="985" instrument_node="">lung</span></b><span data-dcnode-id="983" instrument_node=""> disease, airway obstruction </span><b data-dcnode-id="981"><span data-dcnode-id="982" instrument_node="">causes</span></b><span data-dcnode-id="980" instrument_node=""> an increase in resistance. Common obstructive </span><b data-dcnode-id="978"><span data-dcnode-id="979" instrument_node="">diseases</span></b><span data-dcnode-id="977" instrument_node=""> include asthma, bronchitis, and emphysema.</span></span></span></p><p data-dcnode-id="972"><span data-dcnode-id="973" instrument_node=""> Herein,  how does surface tension affect lung compliance?</span></p><p data-dcnode-id="947"><span data-dcnode-id="971" instrument_node=""> </span><span data-dcnode-id="948"><span data-dcnode-id="949"><b data-dcnode-id="969"><span data-dcnode-id="970" instrument_node="">Compliance</span></b><span data-dcnode-id="968" instrument_node=""> depends on the elasticity and </span><b data-dcnode-id="966"><span data-dcnode-id="967" instrument_node="">surface tension</span></b><span data-dcnode-id="965" instrument_node=""> of the </span><b data-dcnode-id="963"><span data-dcnode-id="964" instrument_node="">lungs</span></b><span data-dcnode-id="962" instrument_node="">. Therefore, surfactant secreted by type II epithelial cells increases </span><b data-dcnode-id="960"><span data-dcnode-id="961" instrument_node="">lung compliance</span></b><span data-dcnode-id="959" instrument_node=""> by reducing the force of </span><b data-dcnode-id="957"><span data-dcnode-id="958" instrument_node="">surface tension</span></b><span data-dcnode-id="956" instrument_node="">. A low </span><b data-dcnode-id="954"><span data-dcnode-id="955" instrument_node="">lung compliance</span></b><span data-dcnode-id="953" instrument_node=""> means that the </span><b data-dcnode-id="951"><span data-dcnode-id="952" instrument_node="">lungs</span></b><span data-dcnode-id="950" instrument_node=""> are “stiff” and have a higher than normal level of elastic recoil.</span></span></span></p><p data-dcnode-id="945"><span data-dcnode-id="946" instrument_node="">What happens to compliance in emphysema?</span></p><p data-dcnode-id="932"><span data-dcnode-id="933"><span data-dcnode-id="934"><span data-dcnode-id="944" instrument_node="">Patients with </span><b data-dcnode-id="942"><span data-dcnode-id="943" instrument_node="">emphysema</span></b><span data-dcnode-id="941" instrument_node=""> have a very high lung </span><b data-dcnode-id="939"><span data-dcnode-id="940" instrument_node="">compliance</span></b><span data-dcnode-id="938" instrument_node=""> due to the poor elastic recoil. They have extreme difficulty exhaling air. In this condition extra work is required to get air out of the lungs. This is due to the fact that a high </span><b data-dcnode-id="936"><span data-dcnode-id="937" instrument_node="">compliant</span></b><span data-dcnode-id="935" instrument_node=""> lung results in many collapsed alveoli which makes inflation difficult.</span></span></span></p><span data-dcnode-id="931" instrument_node=""> </span><div class="pg-lazy" data-dcnode-id="930" data-gpt-parent="th_flex_desk"></div><span data-dcnode-id="929" instrument_node="">

</span><p data-dcnode-id="908"></p><div data-dcnode-id="881"><span data-dcnode-id="907" instrument_node=""> </span><div data-dcnode-id="904"><b data-dcnode-id="905"><span data-dcnode-id="906" instrument_node="">To keep your lungs healthy, do the following:</span></b></div><span data-dcnode-id="903" instrument_node=""> </span><div data-dcnode-id="883"><span data-dcnode-id="902" instrument_node=""> </span><ol data-dcnode-id="885"><span data-dcnode-id="901" instrument_node=""> </span><li data-dcnode-id="899"><span data-dcnode-id="900" instrument_node="">Stop smoking, and avoid secondhand smoke or environmental irritants.</span></li><span data-dcnode-id="898" instrument_node=""> </span><li data-dcnode-id="896"><span data-dcnode-id="897" instrument_node="">Eat foods rich in antioxidants.</span></li><span data-dcnode-id="895" instrument_node=""> </span><li data-dcnode-id="893"><span data-dcnode-id="894" instrument_node="">Get vaccinations like the flu vaccine and the pneumonia vaccine.</span></li><span data-dcnode-id="892" instrument_node=""> </span><li data-dcnode-id="890"><span data-dcnode-id="891" instrument_node="">Exercise more frequently, which can help your lungs function properly.</span></li><span data-dcnode-id="889" instrument_node=""> </span><li data-dcnode-id="887"><span data-dcnode-id="888" instrument_node="">Improve indoor air quality.</span></li><span data-dcnode-id="886" instrument_node=""> </span></ol><span data-dcnode-id="884" instrument_node=""> </span></div><span data-dcnode-id="882" instrument_node=""> </span></div><p data-dcnode-id="880"></p><span data-dcnode-id="879" instrument_node="">

</span><p data-dcnode-id="807"></p><div data-dcnode-id="791"><span data-dcnode-id="792"><span data-dcnode-id="793"><span data-dcnode-id="806" instrument_node="">Did you know that the maximum amount of air your </span><b data-dcnode-id="804"><span data-dcnode-id="805" instrument_node="">lungs</span></b><span data-dcnode-id="803" instrument_node=""> can hold—your total </span><b data-dcnode-id="801"><span data-dcnode-id="802" instrument_node="">lung capacity</span></b><span data-dcnode-id="800" instrument_node="">—is about 6 liters? That is about three large soda bottles. Your </span><b data-dcnode-id="798"><span data-dcnode-id="799" instrument_node="">lungs</span></b><span data-dcnode-id="797" instrument_node=""> mature by the time you are about 20-25 years old. After about the age of 35, it is normal for your </span><b data-dcnode-id="795"><span data-dcnode-id="796" instrument_node="">lung</span></b><span data-dcnode-id="794" instrument_node=""> function to decline gradually as you age.</span></span></span></div><p data-dcnode-id="790"></p><span data-dcnode-id="789" instrument_node="">

</span></h3><span data-dcnode-id="774" instrument_node="">
</span><p data-dcnode-id="773"></p><div data-dcnode-id="751"><span data-dcnode-id="752"><span data-dcnode-id="753"><span data-dcnode-id="772" instrument_node="">Bullectomy is </span><b data-dcnode-id="770"><span data-dcnode-id="771" instrument_node="">a procedure</span></b><span data-dcnode-id="769" instrument_node=""> where doctors remove one or more of the very large bullae or blebs from the lungs. Lung Volume Reduction </span><b data-dcnode-id="767"><span data-dcnode-id="768" instrument_node="">Surgery</span></b><span data-dcnode-id="766" instrument_node=""> (LVRS) is </span><b data-dcnode-id="764"><span data-dcnode-id="765" instrument_node="">a procedure</span></b><span data-dcnode-id="763" instrument_node=""> to help people with severe </span><b data-dcnode-id="761"><span data-dcnode-id="762" instrument_node="">emphysema</span></b><span data-dcnode-id="760" instrument_node=""> affecting the upper lung lobes. LVRS is not </span><b data-dcnode-id="758"><span data-dcnode-id="759" instrument_node="">a</span></b><span data-dcnode-id="757" instrument_node=""> cure for </span><b data-dcnode-id="755"><span data-dcnode-id="756" instrument_node="">COPD</span></b><span data-dcnode-id="754" instrument_node=""> but can improve one's exercise capacity and quality of life.</span></span></span></div><p data-dcnode-id="750"></p><span data-dcnode-id="749" instrument_node="">

</span></h3><span data-dcnode-id="701" instrument_node="">
</span><p data-dcnode-id="700"></p><div data-dcnode-id="688"><span data-dcnode-id="689"><span data-dcnode-id="690"><b data-dcnode-id="698"><span data-dcnode-id="699" instrument_node="">Emphysema</span></b><span data-dcnode-id="697" instrument_node=""> is a long-term, progressive </span><b data-dcnode-id="695"><span data-dcnode-id="696" instrument_node="">disease</span></b><span data-dcnode-id="694" instrument_node=""> of the lungs that primarily causes shortness of breath due to over-inflation of the alveoli (air sacs in the lung). In people with </span><b data-dcnode-id="692"><span data-dcnode-id="693" instrument_node="">emphysema</span></b><span data-dcnode-id="691" instrument_node="">, the lung tissue involved in exchange of gases (oxygen and carbon dioxide) is impaired or destroyed.</span></span></span></div><p data-dcnode-id="687"></p><span data-dcnode-id="686" instrument_node="">

</span></h3><span data-dcnode-id="671" instrument_node="">
</span><p data-dcnode-id="670"></p><div data-dcnode-id="651"><span data-dcnode-id="652"><span data-dcnode-id="653"><span data-dcnode-id="669" instrument_node="">Physiology. Since atmospheric </span><b data-dcnode-id="667"><span data-dcnode-id="668" instrument_node="">pressure</span></b><span data-dcnode-id="666" instrument_node=""> is relatively constant, </span><b data-dcnode-id="664"><span data-dcnode-id="665" instrument_node="">pressure</span></b><span data-dcnode-id="663" instrument_node=""> in the lungs must be higher or lower than atmospheric </span><b data-dcnode-id="661"><span data-dcnode-id="662" instrument_node="">pressure</span></b><span data-dcnode-id="660" instrument_node=""> for air to flow between the atmosphere and the alveoli. For a given lung volume, the </span><b data-dcnode-id="658"><span data-dcnode-id="659" instrument_node="">transpulmonary pressure</span></b><span data-dcnode-id="657" instrument_node=""> is equal and opposite to the elastic recoil </span><b data-dcnode-id="655"><span data-dcnode-id="656" instrument_node="">pressure</span></b><span data-dcnode-id="654" instrument_node=""> of the lung.</span></span></span></div><p data-dcnode-id="650"></p><span data-dcnode-id="649" instrument_node="">

</span><p data-dcnode-id="599"></p><div data-dcnode-id="574"><span data-dcnode-id="575"><span data-dcnode-id="576"><span data-dcnode-id="598" instrument_node="">Due to its role in surface tension modification, it indirectly affects the </span><b data-dcnode-id="596"><span data-dcnode-id="597" instrument_node="">compliance</span></b><span data-dcnode-id="595" instrument_node=""> of the </span><b data-dcnode-id="593"><span data-dcnode-id="594" instrument_node="">lung</span></b><span data-dcnode-id="592" instrument_node="">. </span><b data-dcnode-id="590"><span data-dcnode-id="591" instrument_node="">Lung</span></b><span data-dcnode-id="589" instrument_node=""> Volume: </span><b data-dcnode-id="587"><span data-dcnode-id="588" instrument_node="">Compliance</span></b><span data-dcnode-id="586" instrument_node=""> is related to the </span><b data-dcnode-id="584"><span data-dcnode-id="585" instrument_node="">lung</span></b><span data-dcnode-id="583" instrument_node=""> volume, considering the formula relating volume and pressure. </span><b data-dcnode-id="581"><span data-dcnode-id="582" instrument_node="">Pulmonary compliance increases with age are</span></b><span data-dcnode-id="580" instrument_node=""> owing to the structural changes in the </span><b data-dcnode-id="578"><span data-dcnode-id="579" instrument_node="">lung</span></b><span data-dcnode-id="577" instrument_node=""> elastin fibers [11].</span></span></span></div><p data-dcnode-id="573"></p><span data-dcnode-id="572" instrument_node="">

</span><p data-dcnode-id="550"></p><div data-dcnode-id="522"><span data-dcnode-id="523"><span data-dcnode-id="524"><span data-dcnode-id="549" instrument_node="">Chest wall </span><b data-dcnode-id="547"><span data-dcnode-id="548" instrument_node="">compliance</span></b><span data-dcnode-id="546" instrument_node=""> decreased significantly with </span><b data-dcnode-id="544"><span data-dcnode-id="545" instrument_node="">age</span></b><span data-dcnode-id="543" instrument_node="">. As </span><b data-dcnode-id="541"><span data-dcnode-id="542" instrument_node="">lung</span></b><span data-dcnode-id="540" instrument_node=""> volume </span><b data-dcnode-id="538"><span data-dcnode-id="539" instrument_node="">increased pulmonary compliance</span></b><span data-dcnode-id="537" instrument_node=""> decreased more in the young than in the old. The latter </span><b data-dcnode-id="535"><span data-dcnode-id="536" instrument_node="">age</span></b><span data-dcnode-id="534" instrument_node=""> difference may result from a loss of </span><b data-dcnode-id="532"><span data-dcnode-id="533" instrument_node="">lung</span></b><span data-dcnode-id="531" instrument_node=""> elastic recoil in the elderly or may be due totally to the </span><b data-dcnode-id="529"><span data-dcnode-id="530" instrument_node="">age</span></b><span data-dcnode-id="528" instrument_node=""> difference in chest wall </span><b data-dcnode-id="526"><span data-dcnode-id="527" instrument_node="">compliance</span></b><span data-dcnode-id="525" instrument_node="">.</span></span></span></div><p data-dcnode-id="521"></p><span data-dcnode-id="520" instrument_node="">

</span><p data-dcnode-id="474"></p><div data-dcnode-id="462"><span data-dcnode-id="463"><span data-dcnode-id="464"><b data-dcnode-id="472"><span data-dcnode-id="473" instrument_node="">Pulmonary surfactant</span></b><span data-dcnode-id="471" instrument_node=""> reduces the surface tension at the air-liquid interface throughout the </span><b data-dcnode-id="469"><span data-dcnode-id="470" instrument_node="">lung</span></b><span data-dcnode-id="468" instrument_node=""> by forming a lining layer between the aqueous airway liquid and the inspired air. The major component of </span><b data-dcnode-id="466"><span data-dcnode-id="467" instrument_node="">surfactant</span></b><span data-dcnode-id="465" instrument_node="">, dipalmitoyl-phosphatidylcholine (DPPC), is an amphiphatic phospholipid.</span></span></span></div><p data-dcnode-id="461"></p><span data-dcnode-id="460" instrument_node="">

</span></h3><span data-dcnode-id="445" instrument_node="">
</span><p data-dcnode-id="444"></p><div data-dcnode-id="419"><span data-dcnode-id="420"><span data-dcnode-id="421"><span data-dcnode-id="443" instrument_node="">One of the remarkable phenomena in the process of respiration is the role of the </span><b data-dcnode-id="441"><span data-dcnode-id="442" instrument_node="">fluid</span></b><span data-dcnode-id="440" instrument_node=""> coating the walls of the </span><b data-dcnode-id="438"><span data-dcnode-id="439" instrument_node="">alveoli</span></b><span data-dcnode-id="437" instrument_node=""> of the </span><b data-dcnode-id="435"><span data-dcnode-id="436" instrument_node="">lungs</span></b><span data-dcnode-id="434" instrument_node="">. This </span><b data-dcnode-id="432"><span data-dcnode-id="433" instrument_node="">fluid</span></b><span data-dcnode-id="431" instrument_node="">, called a surfactant, </span><b data-dcnode-id="429"><span data-dcnode-id="430" instrument_node="">lowers the surface tension</span></b><span data-dcnode-id="428" instrument_node=""> of the balloon-like </span><b data-dcnode-id="426"><span data-dcnode-id="427" instrument_node="">alveoli</span></b><span data-dcnode-id="425" instrument_node=""> by about a factor of 15 compared to the normal mucous tissue </span><b data-dcnode-id="423"><span data-dcnode-id="424" instrument_node="">fluid</span></b><span data-dcnode-id="422" instrument_node=""> in which they are immersed.</span></span></span></div><p data-dcnode-id="418"></p><span data-dcnode-id="417" instrument_node="">

</span></h3><span data-dcnode-id="402" instrument_node="">
</span><p data-dcnode-id="401"></p><div data-dcnode-id="385"><span data-dcnode-id="386"><span data-dcnode-id="387"><span data-dcnode-id="400" instrument_node="">Pulmonary </span><b data-dcnode-id="398"><span data-dcnode-id="399" instrument_node="">surfactant</span></b><span data-dcnode-id="397" instrument_node=""> is a mixture of lipids and proteins which is secreted by the epithelial type II cells into the alveolar space. Its main </span><b data-dcnode-id="395"><span data-dcnode-id="396" instrument_node="">function</span></b><span data-dcnode-id="394" instrument_node=""> is to reduce the surface tension at the air/liquid interface in the lung. </span><b data-dcnode-id="392"><span data-dcnode-id="393" instrument_node="">Surfactant</span></b><span data-dcnode-id="391" instrument_node=""> protein A (SP-A) appears to promote most of SP-B's </span><b data-dcnode-id="389"><span data-dcnode-id="390" instrument_node="">functions</span></b><span data-dcnode-id="388" instrument_node="">.</span></span></span></div><p data-dcnode-id="384"></p><span data-dcnode-id="383" instrument_node="">

</span></h3><span data-dcnode-id="362" instrument_node="">
</span><p data-dcnode-id="361"></p><div data-dcnode-id="334"><span data-dcnode-id="335"><span data-dcnode-id="336"><b data-dcnode-id="359"><span data-dcnode-id="360" instrument_node="">Compliance</span></b><span data-dcnode-id="358" instrument_node="">. </span><b data-dcnode-id="356"><span data-dcnode-id="357" instrument_node="">Compliance</span></b><span data-dcnode-id="355" instrument_node=""> is the ability of </span><b data-dcnode-id="353"><span data-dcnode-id="354" instrument_node="">lungs</span></b><span data-dcnode-id="352" instrument_node=""> and thorax to </span><b data-dcnode-id="350"><span data-dcnode-id="351" instrument_node="">expand</span></b><span data-dcnode-id="349" instrument_node="">. </span><b data-dcnode-id="347"><span data-dcnode-id="348" instrument_node="">Pulmonary surfactant</span></b><span data-dcnode-id="346" instrument_node=""> thus greatly reduces surface tension, </span><b data-dcnode-id="344"><span data-dcnode-id="345" instrument_node="">increasing compliance</span></b><span data-dcnode-id="343" instrument_node=""> allowing the </span><b data-dcnode-id="341"><span data-dcnode-id="342" instrument_node="">lung</span></b><span data-dcnode-id="340" instrument_node=""> to inflate much more easily, thereby reducing the work of breathing. It reduces the pressure difference needed to allow the </span><b data-dcnode-id="338"><span data-dcnode-id="339" instrument_node="">lung</span></b><span data-dcnode-id="337" instrument_node=""> to inflate.</span></span></span></div><p data-dcnode-id="333"></p><span data-dcnode-id="332" instrument_node="">
