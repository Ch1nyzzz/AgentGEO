</span><br data-dcnode-id="1053"><span data-dcnode-id="1052" instrument_node=""> In this manner,  is low lung volume bad?</span><p data-dcnode-id="1034"><span data-dcnode-id="1051" instrument_node=""> </span><span data-dcnode-id="1048"><b data-dcnode-id="1049"><span data-dcnode-id="1050" instrument_node="">Low lung volume</span></b></span><span data-dcnode-id="1047" instrument_node=""> </span><span data-dcnode-id="1035"><span data-dcnode-id="1036"><span data-dcnode-id="1046" instrument_node="">If your </span><b data-dcnode-id="1044"><span data-dcnode-id="1045" instrument_node="">lung volume is lower</span></b><span data-dcnode-id="1043" instrument_node=""> than normal, this may be a sign of a restrictive </span><b data-dcnode-id="1041"><span data-dcnode-id="1042" instrument_node="">lung</span></b><span data-dcnode-id="1040" instrument_node=""> condition such as </span><b data-dcnode-id="1038"><span data-dcnode-id="1039" instrument_node="">pulmonary</span></b><span data-dcnode-id="1037" instrument_node=""> fibrosis or sarcoidosis.</span></span></span></p><p data-dcnode-id="1015"><span data-dcnode-id="1033" instrument_node="">Subsequently, question is,  what does a low residual volume mean? </span><span data-dcnode-id="1016"><span data-dcnode-id="1017"><b data-dcnode-id="1031"><span data-dcnode-id="1032" instrument_node="">Residual volume</span></b><span data-dcnode-id="1030" instrument_node="">. </span><b data-dcnode-id="1028"><span data-dcnode-id="1029" instrument_node="">Residual volume is the</span></b><span data-dcnode-id="1027" instrument_node=""> only lung </span><b data-dcnode-id="1025"><span data-dcnode-id="1026" instrument_node="">volume</span></b><span data-dcnode-id="1024" instrument_node=""> that is not </span><b data-dcnode-id="1022"><span data-dcnode-id="1023" instrument_node="">decreased</span></b><span data-dcnode-id="1021" instrument_node=""> with respiratory muscle weakness. </span><b data-dcnode-id="1019"><span data-dcnode-id="1020" instrument_node="">Residual volume is the</span></b><span data-dcnode-id="1018" instrument_node=""> amount of air left in the lungs at the end of a maximal expiration and is typically increased due to the inability to forcibly expire and remove air from the lungs.</span></span></span></p><p data-dcnode-id="1013"><span data-dcnode-id="1014" instrument_node=""> Simply so,  what is normal lung volume?</span></p><p data-dcnode-id="985"><span data-dcnode-id="1012" instrument_node=""> </span><span data-dcnode-id="1008"><b data-dcnode-id="1010"><span data-dcnode-id="1011" instrument_node="">Lung</span></b><span data-dcnode-id="1009" instrument_node=""> capacities</span></span><span data-dcnode-id="1007" instrument_node=""> </span><span data-dcnode-id="986"><span data-dcnode-id="987"><span data-dcnode-id="1006" instrument_node="">It is the maximum </span><b data-dcnode-id="1004"><span data-dcnode-id="1005" instrument_node="">volume</span></b><span data-dcnode-id="1003" instrument_node=""> of air the </span><b data-dcnode-id="1001"><span data-dcnode-id="1002" instrument_node="">lungs</span></b><span data-dcnode-id="1000" instrument_node=""> can accommodate or sum of all </span><b data-dcnode-id="998"><span data-dcnode-id="999" instrument_node="">volume</span></b><span data-dcnode-id="997" instrument_node=""> compartments or </span><b data-dcnode-id="995"><span data-dcnode-id="996" instrument_node="">volume</span></b><span data-dcnode-id="994" instrument_node=""> of air in </span><b data-dcnode-id="992"><span data-dcnode-id="993" instrument_node="">lungs</span></b><span data-dcnode-id="991" instrument_node=""> after maximum inspiration. The </span><b data-dcnode-id="989"><span data-dcnode-id="990" instrument_node="">normal</span></b><span data-dcnode-id="988" instrument_node=""> value is about 6,000mL(4-6 L).</span></span></span></p><p data-dcnode-id="983"><span data-dcnode-id="984" instrument_node="">How can I improve my lung capacity?</span></p><p data-dcnode-id="978"><span data-dcnode-id="982" instrument_node=""> </span><b data-dcnode-id="980"><span data-dcnode-id="981" instrument_node="">To keep your lungs healthy, do the following:</span></b><span data-dcnode-id="979" instrument_node=""> </span></p><ol data-dcnode-id="961"><span data-dcnode-id="977" instrument_node=""> </span><li data-dcnode-id="975"><span data-dcnode-id="976" instrument_node="">Stop smoking, and avoid secondhand smoke or environmental irritants.</span></li><span data-dcnode-id="974" instrument_node=""> </span><li data-dcnode-id="972"><span data-dcnode-id="973" instrument_node="">Eat foods rich in antioxidants.</span></li><span data-dcnode-id="971" instrument_node=""> </span><li data-dcnode-id="969"><span data-dcnode-id="970" instrument_node="">Get vaccinations like the flu vaccine and the pneumonia vaccine.</span></li><span data-dcnode-id="968" instrument_node=""> </span><li data-dcnode-id="966"><span data-dcnode-id="967" instrument_node="">Exercise more frequently, which can help your lungs function properly.</span></li><span data-dcnode-id="965" instrument_node=""> </span><li data-dcnode-id="963"><span data-dcnode-id="964" instrument_node="">Improve indoor air quality.</span></li><span data-dcnode-id="962" instrument_node=""> </span></ol><span data-dcnode-id="960" instrument_node=""> </span><p data-dcnode-id="959"></p><span data-dcnode-id="958" instrument_node=""> </span><div class="pg-lazy" data-dcnode-id="957" data-gpt-parent="th_flex_desk"></div><span data-dcnode-id="956" instrument_node="">
