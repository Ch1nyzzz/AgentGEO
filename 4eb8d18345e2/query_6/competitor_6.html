</span><p data-dcnode-id="1362"><a data-dcnode-id="1366" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//shop.bodyecology.com/products/cocobiotic-750ml"><img alt="" class="alignnone wp-image-17689 size-full" data-dcnode-id="1367" height="457" sizes="(max-width: 300px) 100vw, 300px" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//bodyecology.com/wp-content/uploads/2014/11/cocobiotic_7-e1541794636599.jpg&amp;raw" srcset="https://bodyecology.com/wp-content/uploads/2014/11/cocobiotic_7-e1541794636599.jpg 300w, https://bodyecology.com/wp-content/uploads/2014/11/cocobiotic_7-e1541794636599-197x300.jpg 197w" width="300"></a></p><center data-dcnode-id="1363"><a class="button" data-dcnode-id="1364" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//shop.bodyecology.com/collections/all"><span data-dcnode-id="1365" instrument_node="">SHOP PRODUCTS</span></a></center><p></p><span data-dcnode-id="1361" instrument_node="">
</span><p data-dcnode-id="1356"><span data-dcnode-id="1360" instrument_node="">A recent study links fermented vegetable consumption to low Covid-19 mortality. Our fermented probiotic drink </span><a data-dcnode-id="1358" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//shop.bodyecology.com/products/cocobiotic-750ml"><span data-dcnode-id="1359" instrument_node="">CocoBiotic</span></a><span data-dcnode-id="1357" instrument_node=""> has the wonderful diversity found in cultured vegetables too! It’s easy to take with you on the go – only 1-2 ounces are needed per day to work toward optimal gut health.</span></p><span data-dcnode-id="1355" instrument_node="">
</span></div><span data-dcnode-id="1353" instrument_node="">
</span><p data-dcnode-id="1351"><span data-dcnode-id="1352" instrument_node="">Concerned about increasing your immunity to airborne toxins, bacteria, and viruses? Then this article is a must-read. Your lungs are at the forefront of immunity. While healthy lungs are a key part of optimal health, we rarely talk about ‘feeding our lungs’. The truth is that our lungs need certain nutrients to perform at their best, and with respiratory diseases, airborne allergies, and air pollution on the rise, it’s never been more important to ensure an optimal intake of key nutrients for healthy lungs.</span></p><span data-dcnode-id="1350" instrument_node="">
</span><p data-dcnode-id="1348"><span data-dcnode-id="1349" instrument_node="">Let’s dig into some of the most important vitamins, minerals, and other nutrients for lung health. We will start with vitamin D, then take a quick look at vitamins A and C, and finish with a look at two nutrients that may surprise you: nitric oxide, and glutathione.</span></p><span data-dcnode-id="1347" instrument_node="">
</span><h2 data-dcnode-id="1345"><span data-dcnode-id="1346" instrument_node="">Vitamin D and lung health</span></h2><span data-dcnode-id="1344" instrument_node="">
</span><p data-dcnode-id="1342"><span data-dcnode-id="1343" instrument_node="">The human body is pretty adept at making its own vitamin D when skin is exposed to the sun’s rays or other source of ultraviolet B radiation. This form of vitamin D is inactive though and has to be activated in the kidneys by the enzyme 1-alpha-hydroxylase. Once that’s done, the active vitamin D can perform all its important functions including supporting calcium absorption and bone health as well as promoting various aspects of immune function.</span></p><span data-dcnode-id="1341" instrument_node="">
</span><p data-dcnode-id="1337"><span data-dcnode-id="1340" instrument_node="">Did you know, though, that the kidneys aren’t the only place in the body that can convert vitamin D into its active form? The lungs can do it to! That’s right, researchers recently discovered that the 1α-hydroxylase enzyme is not only expressed in the kidneys, but also in the airway epithelium, alveolar macrophages, dendritic cells and lymphocytes.</span><a data-dcnode-id="1338" href="#_edn1" name="_ednref1"><span data-dcnode-id="1339" instrument_node="">[i]</span></a></p><span data-dcnode-id="1336" instrument_node="">
</span><p data-dcnode-id="1333"><strong data-dcnode-id="1334"><span data-dcnode-id="1335" instrument_node="">So, why would the lungs need a way to activate vitamin D on-site?</span></strong></p><span data-dcnode-id="1332" instrument_node="">
</span><p data-dcnode-id="1322"><span data-dcnode-id="1331" instrument_node="">One reason seems to be that vitamin D is important for immune function in the lung. Indeed, serum (blood) levels of 25-hydroxyvitamin D (25OHD) above 20 ng/mL appear to lower the risk of infections, including tuberculosis.</span><a data-dcnode-id="1329" href="#_edn2" name="_ednref2"><span data-dcnode-id="1330" instrument_node="">[ii]</span></a><span data-dcnode-id="1328" instrument_node=""> </span><a data-dcnode-id="1326" href="#_edn3" name="_ednref3"><span data-dcnode-id="1327" instrument_node="">[iii]</span></a><span data-dcnode-id="1325" instrument_node=""> In one meta-analysis of 25 randomized, double blind, placebo-controlled trials, people who took vitamin D supplements had a far lower incidence of acute respiratory tract infection compared to those who didn’t supplement with the nutrient.</span><a data-dcnode-id="1323" href="#_edn4" name="_ednref4"><span data-dcnode-id="1324" instrument_node="">[iv]</span></a></p><span data-dcnode-id="1321" instrument_node="">
</span><p data-dcnode-id="1311"><span data-dcnode-id="1320" instrument_node="">Low levels of vitamin D have also been linked with obstructive lung diseases like asthma and COPD.</span><a data-dcnode-id="1318" href="#_edn5" name="_ednref5"><span data-dcnode-id="1319" instrument_node="">[v]</span></a><span data-dcnode-id="1317" instrument_node=""> </span><a data-dcnode-id="1315" href="#_edn6" name="_ednref6"><span data-dcnode-id="1316" instrument_node="">[vi]</span></a><span data-dcnode-id="1314" instrument_node=""> This might be because vitamin D supports healthy lungs by helping to prevent the undesirable increase in smooth muscle cells in the airway seen in people with asthma. Vitamin D appears to inhibit levels of MMP-9, the most relevant gene or enzyme in airway remodeling. It also inhibits the expression of the ADAM 33 , ‘a disintegrin and metalloproteinase-33’ gene linked to increased susceptibility to asthma.</span><a data-dcnode-id="1312" href="#_edn7" name="_ednref7"><span data-dcnode-id="1313" instrument_node="">[vii]</span></a></p><span data-dcnode-id="1310" instrument_node="">
</span><h2 data-dcnode-id="1308"><span data-dcnode-id="1309" instrument_node="">Vitamin D and CoVID-19</span></h2><span data-dcnode-id="1307" instrument_node="">
</span><p data-dcnode-id="1305"><span data-dcnode-id="1306" instrument_node="">Vitamin D deficiency is now widely seen as an important factor in a variety of health conditions, and an editorial published online in the April in the journal of Alimentary Pharmacology &amp; Therapeutics linked low vitamin D to increased mortality from COVID-19.</span></p><span data-dcnode-id="1304" instrument_node="">
</span><p data-dcnode-id="1299"><span data-dcnode-id="1303" instrument_node="">Jonathan Rhodes and colleagues looked at the mortality per million plotted against latitude and found that “all countries that lie below 35 degrees North have relatively low mortality. Thirty‐five degrees North also happens to be the latitude above which people do not receive sufficient sunlight to retain adequate vitamin D levels during winter.</span><a data-dcnode-id="1300" href="#_edn8" name="_ednref8"><sup data-dcnode-id="1301"><span data-dcnode-id="1302" instrument_node="">[viii]</span></sup></a></p><span data-dcnode-id="1298" instrument_node="">
</span><p data-dcnode-id="1293"><span data-dcnode-id="1297" instrument_node="">Why the connection? Well, while vitamin D might not directly protect against infection with SARS-coronavirus-2, in the words of the Rhodes </span><em data-dcnode-id="1295"><span data-dcnode-id="1296" instrument_node="">et al, </span></em><span data-dcnode-id="1294" instrument_node="">vitamin D, “could be very important in preventing the cytokine storm and subsequent acute respiratory distress syndrome that is commonly the cause of mortality.”</span></p><span data-dcnode-id="1292" instrument_node="">
</span><p data-dcnode-id="1284"><span data-dcnode-id="1291" instrument_node="">And this is where it gets super interesting and relevant for our current coronavirus plight: vitamin D has been seen to decrease the inflammatory response to viral infections in the airway </span><em data-dcnode-id="1289"><span data-dcnode-id="1290" instrument_node="">without</span></em><span data-dcnode-id="1288" instrument_node=""> jeopardizing the eradication of a virus.</span><a data-dcnode-id="1286" href="#_edn9" name="_ednref9"><span data-dcnode-id="1287" instrument_node="">[ix]</span></a><span data-dcnode-id="1285" instrument_node=""> This means that ensuring optimal vitamin D status could help reduce excessive inflammation in the lungs, i.e. the cytokine storms everyone’s talking about, which can help reduce severe disease while still supporting the body’s ability to fight viral infection.</span></p><span data-dcnode-id="1283" instrument_node="">
</span><h2 data-dcnode-id="1281"><span data-dcnode-id="1282" instrument_node="">What you can do to boost your vitamin D levels and lung health right now</span></h2><span data-dcnode-id="1280" instrument_node="">
</span><p data-dcnode-id="1278"><span data-dcnode-id="1279" instrument_node="">Given that sunlight is an important source of vitamin D and many of us get little daily exposure to sunlight, especially right now, a good dietary or supplemental source of this nutrient is essential to support your ability to conquer infection (one of the 4 actions to healing).</span></p><span data-dcnode-id="1277" instrument_node="">
</span><p data-dcnode-id="1275"><span data-dcnode-id="1276" instrument_node="">Bearing in mind that vitamin D is a fat-soluble nutrient, it’s best to take vitamin D with a source of fat. And, of course, correcting digestion is going to be key to ensuring your gut can absorb that fat and maintain a healthy balance of bacteria, which itself helps support good immune function and lung health.</span></p><span data-dcnode-id="1274" instrument_node="">
</span><p data-dcnode-id="1272"><span data-dcnode-id="1273" instrument_node="">The Institute of Medicine suggest an average daily intake of 400-800 IU vitamin D is sufficient for the majority of adults, but some functional medicine doctors recommend a far higher dose for anyone without regular sun exposure or who may have other risk factors for deficiency.</span></p><span data-dcnode-id="1271" instrument_node="">
</span><p data-dcnode-id="1260"><span data-dcnode-id="1270" instrument_node="">In one study, healthy adults required an average daily intake of 1120-1680 IU to maintain sufficient blood levels of vitamin D.</span><a data-dcnode-id="1268" href="#_edn10" name="_ednref10"><span data-dcnode-id="1269" instrument_node="">[x]</span></a><span data-dcnode-id="1267" instrument_node=""> Some participants in this study needed up to 5000 IU daily to correct vitamin D deficiency. In other studies looking specifically at women who were post-menopause, an intake of 800-2000 IU was required to raise blood levels of vitamin D to 20 ng/mL, which many health professionals consider the minimum adequate level.</span><a data-dcnode-id="1265" href="#_edn11" name="_ednref11"><span data-dcnode-id="1266" instrument_node="">[xi]</span></a><span data-dcnode-id="1264" instrument_node=""> </span><a data-dcnode-id="1262" href="#_edn12" name="_ednref12"><span data-dcnode-id="1263" instrument_node="">[xii]</span></a><span data-dcnode-id="1261" instrument_node="">Higher doses were needed to reach 30 ng/mL in these studies.</span></p><span data-dcnode-id="1259" instrument_node="">
</span><p data-dcnode-id="1257"><span data-dcnode-id="1258" instrument_node="">So, depending on individual circumstances, a daily intake of 1000-4000 IU of vitamin D may be a good option for some people to achieve and maintain a healthy level of vitamin D in the blood. The Institute of Medicine set a safe upper limit of 4000 IU for daily intake for adults, so anyone considering taking a higher amount should consult a health care practitioner first.</span></p><span data-dcnode-id="1256" instrument_node="">
</span><h2 data-dcnode-id="1254"><span data-dcnode-id="1255" instrument_node="">Vitamin A and lung health</span></h2><span data-dcnode-id="1253" instrument_node="">
</span><p data-dcnode-id="1243"><span data-dcnode-id="1252" instrument_node="">Vitamin A is a fat-soluble vitamin that plays a role in the expression of more than 500 genes.</span><a data-dcnode-id="1250" href="#_edn13" name="_ednref13"><span data-dcnode-id="1251" instrument_node="">[xiii]</span></a><span data-dcnode-id="1249" instrument_node=""> It is essential for healthy vision, cellular growth, wound healing and tissue repair, and has free radical scavenging potential. It also plays a role in immune system activity and is important for the health of mucosal passages and epithelial surfaces.</span><a data-dcnode-id="1247" href="#_edn14" name="_ednref14"><span data-dcnode-id="1248" instrument_node="">[xiv]</span></a><span data-dcnode-id="1246" instrument_node=""> Vitamin A plays a key role in the development and differentiation of white blood cells, including lymphocytes that fight infection, and it also has an effect on the levels of other immune system cells such as natural killer cells and cytokines such as interleukin 1.</span><a data-dcnode-id="1244" href="#_edn15" name="_ednref15"><span data-dcnode-id="1245" instrument_node="">[xv]</span></a></p><span data-dcnode-id="1242" instrument_node="">
</span><p data-dcnode-id="1240"><span data-dcnode-id="1241" instrument_node="">Most of the vitamin A we store in our bodies is stored in the liver, but we also store some in the retina, kidneys, adrenal glands, fat, and… in the lungs (Kowalski et al., 1994). Low levels of vitamin A, then, may not only affect eye health but also the health of the lungs and how well prepared we are to handle respiratory infection.</span></p><span data-dcnode-id="1239" instrument_node="">
</span><p data-dcnode-id="1235"><span data-dcnode-id="1238" instrument_node="">There’s even some indication that vitamin A deficiency can lead to an excessive reaction to oxidative stress in the lungs, with greater production of pro-inflammatory cytokines. This has been linked to bronchial spasm and more severe asthma symptoms.xiii In some health conditions, including infection, low levels of vitamin A seem to prevent proper tissue repair and may lead to the formation of scar tissue in the lungs, affecting lung health for far longer than the initial infection.</span><a data-dcnode-id="1236" href="#_edn16" name="_ednref16"><span data-dcnode-id="1237" instrument_node="">[xiii]</span></a></p><span data-dcnode-id="1234" instrument_node="">
</span><p data-dcnode-id="1232"><span data-dcnode-id="1233" instrument_node="">Before you rush to stock up on vitamin A supplements, though, be aware that you can take too much of this nutrient, leading to vitamin A toxicity. Your best bet to keep your vitamin A levels happy is to eat a diet rich in vitamin A and avoid smoking (which depletes vitamin A).</span></p><span data-dcnode-id="1231" instrument_node="">
</span><p data-dcnode-id="1229"><span data-dcnode-id="1230" instrument_node="">Vitamin A is present “preformed” in some animal-derived foods such as liver, kidney, eggs, and dairy. Most of us can also make our own vitamin A from the “precursor form” called beta-carotene, which is a pigment present in a variety of plant foods such as dark leafy greens and brightly colored vegetables like kale, carrots, and sweet potatoes.</span></p><span data-dcnode-id="1228" instrument_node="">
</span><p data-dcnode-id="1226"><span data-dcnode-id="1227" instrument_node="">However, if you have variants in the BCO (also known as the BCMO1) gene your ability to convert beta carotene into vitamin A can be significantly reduced (by as much as 60% for some people!). If you’re struggling to maintain a good level of vitamin A, it can help to consume food source of preformed vitamin A, such as beef, lamb or goose liver and salmon. Vitamin A supplements and even capsules of freeze-dried, grass-fed liver (from companies like Ancestral Supplements) are also a convenient way to ensure a good intake of this essential nutrient.</span></p><span data-dcnode-id="1225" instrument_node="">
</span><p data-dcnode-id="1223"><span data-dcnode-id="1224" instrument_node="">Even if you have a genetic polymorphism that affects your ability to convert beta-carotene to vitamin A, it’s still a good idea to eat those brightly colored vegetables. Why? Because these foods are also a great source of vitamin C, another key nutrient for lung health.</span></p><span data-dcnode-id="1222" instrument_node="">
</span><h2 data-dcnode-id="1220"><span data-dcnode-id="1221" instrument_node="">Vitamin C and lung health</span></h2><span data-dcnode-id="1219" instrument_node="">
</span><p data-dcnode-id="1212"><span data-dcnode-id="1218" instrument_node="">Vitamin C is a water-soluble antioxidant, meaning it can go where vitamin A can’t (and vice versa) and can help fight off free radicals. Vitamin C is also essential for immune function, with levels of vitamin C up to 100 times higher in key immune system cells such as phagocytes and lymphocytes than in plasma.</span><a data-dcnode-id="1216" href="#_edn16" name="_ednref16"><span data-dcnode-id="1217" instrument_node="">[xvi]</span></a><span data-dcnode-id="1215" instrument_node=""> It may also protect healthy lung tissue against reactive oxygen species produced by phagocytes during a viral infection.</span><a data-dcnode-id="1213" href="#_edn17" name="_ednref17"><span data-dcnode-id="1214" instrument_node="">[xvii]</span></a></p><span data-dcnode-id="1211" instrument_node="">
</span><p data-dcnode-id="1204"><span data-dcnode-id="1210" instrument_node="">Vitamin C can also reduce the activity of bacteria during an infection and increase levels of interferon, a protein that can stop viruses from entering healthy cells.</span><a data-dcnode-id="1208" href="#_edn18" name="_ednref18"><span data-dcnode-id="1209" instrument_node="">[xviii]</span></a><span data-dcnode-id="1207" instrument_node=""> Vitamin C also helps increase the activity of T-lymphocytes, the mobility of leukocytes, and the production of antibodies.</span><a data-dcnode-id="1205" href="#_edn19" name="_ednref19"><span data-dcnode-id="1206" instrument_node="">[xix]</span></a></p><span data-dcnode-id="1203" instrument_node="">
</span><p data-dcnode-id="1201"><span data-dcnode-id="1202" instrument_node="">This vitamin is also essential for the healthy production of collagen, the connective tissue that makes up a lot of lung tissue. In cases of lung infection, you’re going to need sufficient vitamin C to help support healthy collagen production and minimize the formation of scar tissue (fibrosis) in the lungs, which has a long-term detrimental effect on lung health.</span></p><span data-dcnode-id="1200" instrument_node="">
</span><h2 data-dcnode-id="1198"><span data-dcnode-id="1199" instrument_node="">Glutathione, nitric oxide and lung health</span></h2><span data-dcnode-id="1197" instrument_node="">
</span><p data-dcnode-id="1195"><span data-dcnode-id="1196" instrument_node="">In addition to vitamins A, C, and D, nitric oxide (NO) and glutathione are also important for lung health. These nutrients are often overlooked in discussions about respiratory function, but they are no less important for keeping your lungs healthy!</span></p><span data-dcnode-id="1194" instrument_node="">
</span><p data-dcnode-id="1192"><span data-dcnode-id="1193" instrument_node="">NO helps blood vessels to relax, supporting better blood flow and tissue oxygenation. It also supports wound healing, detoxification, immune function, and hormone production, including the synthesis of insulin and growth hormone. Low levels of NO are associated with a range of health concerns, including diabetes, heart disease, high cholesterol, high blood pressure, obesity, and aging, as well as erectile dysfunction.</span></p><span data-dcnode-id="1191" instrument_node="">
</span><p data-dcnode-id="1187"><span data-dcnode-id="1190" instrument_node="">NO can also inhibit platelet aggregation and smooth muscle proliferation. This has ramifications for lung health as it means NO could help reduce bronchial spasm and asthma symptoms as well as the formation of blood clots in the lungs.</span><a data-dcnode-id="1188" href="#_edn20" name="_ednref20"><span data-dcnode-id="1189" instrument_node="">[xx]</span></a></p><span data-dcnode-id="1186" instrument_node="">
</span><p data-dcnode-id="1178"><span data-dcnode-id="1185" instrument_node="">As for glutathione, this compound is one of the body’s main antioxidants and can help detoxify chemical pollutants, drugs, and those toxins we produce as a normal part of metabolism.</span><a data-dcnode-id="1183" href="#_edn21" name="_ednref21"><span data-dcnode-id="1184" instrument_node="">[xxi]</span></a><span data-dcnode-id="1182" instrument_node=""> Glutathione can help keep inflammation in check and support immune function, with benefits for lung health.</span><a data-dcnode-id="1180" href="#_edn22" name="_ednref22"><span data-dcnode-id="1181" instrument_node="">[xxii]</span></a><span data-dcnode-id="1179" instrument_node=""> Instead of having inflammation narrow the airways in the case of infection or asthma, glutathione is like the body’s natural bronchodilator, combining with NO to form nitrosoglutathione.</span></p><span data-dcnode-id="1177" instrument_node="">
</span><p data-dcnode-id="1170"><span data-dcnode-id="1176" instrument_node="">If you have asthma, you might be interested to know that there’s a strong chance you have very low levels of glutathione in your lungs compared to folks without asthma. And during an asthma attack, glutathione can become completely depleted in the lungs.</span><a data-dcnode-id="1174" href="#_edn23" name="_ednref23"><span data-dcnode-id="1175" instrument_node="">[xxiii]</span></a><span data-dcnode-id="1173" instrument_node=""> This is why glutathione supplementation, especially in combination with an increase in NO, has been seen to help with asthma.</span><a data-dcnode-id="1171" href="#_edn24" name="_ednref24"><span data-dcnode-id="1172" instrument_node="">[xxiv]</span></a></p><span data-dcnode-id="1169" instrument_node="">
</span><p data-dcnode-id="1158"><span data-dcnode-id="1168" instrument_node="">Interestingly, simply taking a few good deep breaths can increase circulating levels of nitric oxide.</span><a data-dcnode-id="1166" href="#_edn25" name="_ednref25"><span data-dcnode-id="1167" instrument_node="">[xxv]</span></a><span data-dcnode-id="1165" instrument_node=""> </span><a data-dcnode-id="1163" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//bodyecology.com/articles/easy-immune-boosting-foods-to-make-while-at-home-incl-supplements-list-recipes/"><span data-dcnode-id="1164" instrument_node="">Eating fermented foods</span></a><span data-dcnode-id="1162" instrument_node=""> can also help increase levels of NO, especially if you eat fermented beets which are naturally high in nitrates that the body converts into NO. Other foods rich in nitrates include arugula, cabbage, and garlic. </span><a data-dcnode-id="1160" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//bodyecology.com/articles/fermented-beets-recipe"><span data-dcnode-id="1161" instrument_node="">One of our favorite recipes is made with red cabbage and beets</span></a><span data-dcnode-id="1159" instrument_node="">. We also include fennel and onion.</span></p><span data-dcnode-id="1157" instrument_node="">
</span><p data-dcnode-id="1155"><span data-dcnode-id="1156" instrument_node="">Two amino acids, L-arginine and L-citrulline can also boost NO levels. This helps explain, in part, why L-arginine and L-citrulline both have a reputation for supporting healthy heart function and circulation, immune activity, and healing, and are popular supplements for erectile dysfunction.</span></p><span data-dcnode-id="1154" instrument_node="">
</span><p data-dcnode-id="1146"><span data-dcnode-id="1153" instrument_node="">L-</span><strong data-dcnode-id="1151"><span data-dcnode-id="1152" instrument_node="">citrulline</span></strong><span data-dcnode-id="1150" instrument_node="">&nbsp;is a naturally occurring amino acid. It is found in some foods like watermelons and is also produced naturally by the body. L-</span><strong data-dcnode-id="1148"><span data-dcnode-id="1149" instrument_node="">citrulline</span></strong><span data-dcnode-id="1147" instrument_node="">&nbsp;is used for Alzheimer’s disease, dementia, fatigue, muscle weakness, sickle cell disease, erectile dysfunction, high blood pressure, and diabetes.</span></p><span data-dcnode-id="1145" instrument_node="">
</span><h2 data-dcnode-id="1143"><span data-dcnode-id="1144" instrument_node="">The takeaway</span></h2><span data-dcnode-id="1142" instrument_node="">
</span><p data-dcnode-id="1140"><span data-dcnode-id="1141" instrument_node="">Whew, we covered a lot in this article!</span></p><span data-dcnode-id="1139" instrument_node="">
</span><p data-dcnode-id="1137"><span data-dcnode-id="1138" instrument_node="">In short, if you’re looking to support healthy lungs, you’ll want to ensure you have a good intake of:</span></p><span data-dcnode-id="1136" instrument_node="">
</span><ul data-dcnode-id="1098"><span data-dcnode-id="1135" instrument_node="">
</span><li data-dcnode-id="1133"><span data-dcnode-id="1134" instrument_node="">Vitamins A, C, and D</span></li><span data-dcnode-id="1132" instrument_node="">
</span><li data-dcnode-id="1130"><span data-dcnode-id="1131" instrument_node="">Nitrates (from fermented beets, cabbage, garlic, and apples)</span></li><span data-dcnode-id="1129" instrument_node="">
</span><li data-dcnode-id="1120"><span data-dcnode-id="1128" instrument_node="">Glutathione (from asparagus, avocado, cabbage, Brussels sprouts, garlic, </span><em data-dcnode-id="1125"><i data-dcnode-id="1126"><span data-dcnode-id="1127" instrument_node="">almonds,</span></i></em><span data-dcnode-id="1124" instrument_node=""> and </span><em data-dcnode-id="1122"><span data-dcnode-id="1123" instrument_node="">walnuts</span></em><span data-dcnode-id="1121" instrument_node="">)</span></li><span data-dcnode-id="1119" instrument_node="">
</span><li data-dcnode-id="1103"><span data-dcnode-id="1118" instrument_node="">L-arginine (from </span><em data-dcnode-id="1115"><i data-dcnode-id="1116"><span data-dcnode-id="1117" instrument_node="">walnuts</span></i></em><span data-dcnode-id="1114" instrument_node="">, </span><em data-dcnode-id="1112"><span data-dcnode-id="1113" instrument_node="">hazelnuts,</span></em><span data-dcnode-id="1111" instrument_node=""> and most </span><em data-dcnode-id="1109"><span data-dcnode-id="1110" instrument_node="">other nuts</span></em><span data-dcnode-id="1108" instrument_node="">, oats, brown rice, animal products, and </span><em data-dcnode-id="1105"><i data-dcnode-id="1106"><span data-dcnode-id="1107" instrument_node="">chocolate</span></i></em><span data-dcnode-id="1104" instrument_node="">!)</span></li><span data-dcnode-id="1102" instrument_node="">
</span><li data-dcnode-id="1100"><span data-dcnode-id="1101" instrument_node="">L-citrulline&nbsp;(from watermelons, pumpkin, cucumbers, bitter melon, and gourds).</span></li><span data-dcnode-id="1099" instrument_node="">
</span></ul><span data-dcnode-id="1097" instrument_node="">
</span><p data-dcnode-id="1092"><span data-dcnode-id="1096" instrument_node="">The </span><a data-dcnode-id="1094" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//bodyecology.com/articles/what-do-oxalates-in-food-do-to-the-body/"><span data-dcnode-id="1095" instrument_node="">foods that are in italics are high in oxalates</span></a><span data-dcnode-id="1093" instrument_node=""> and nuts, oats and brown rice are high in phytates, which can inhibit the absorption of a whole host of nutrients including calcium and iron. Fortunately, fermentation helps to reduce both oxalic acid and phytic acid in foods, making them easier to digest. Fermentation also increases levels of certain nutrients, including nitric oxide and improves the availability of important antioxidants such as vitamin C as well as amino acids. (Nuts, seeds, oats, brown rice and chocolate are not fermented.) Together, these nutrients can help your lungs fight off infection faster and stay healthier!</span></p><span data-dcnode-id="1091" instrument_node="">
</span><p data-dcnode-id="1082"><em data-dcnode-id="1083"><span data-dcnode-id="1090" instrument_node="">PS: </span><strong data-dcnode-id="1088"><span data-dcnode-id="1089" instrument_node="">If you’re a practitioner</span></strong><span data-dcnode-id="1087" instrument_node="">, you might be interested to learn a bit more about how vitamin D affects cytokine storms. Vitamin D increases secretion of the antimicrobial peptide cathelicidin LL-37, decreases chemokine production, inhibits the activation of dendritic cells, and can alter T cell activation.</span><a data-dcnode-id="1085" href="#_edn26" name="_ednref26"><span data-dcnode-id="1086" instrument_node="">[xxvi]</span></a><span data-dcnode-id="1084" instrument_node=""> All of these effects are key to our ability to fight infection and to control allergic lung diseases such as asthma. Vitamin D influences key innate immune processes in the lungs, playing a vital role in how the lungs recognize and respond to invading pathogens like viruses and bacteria.</span></em></p><span data-dcnode-id="1081" instrument_node="">
</span><p data-dcnode-id="1071"><em data-dcnode-id="1072"><span data-dcnode-id="1080" instrument_node="">Cathelicidin LL-37 is known as an antimicrobial peptide, levels of which are increased by vitamin D through increased expression</span><u data-dcnode-id="1074"><span data-dcnode-id="1079" instrument_node=""> of the gene that controls cathelicidin production. Interestingly, vitamin D-mediated increases in LL-37 help to kill Mycobaterium tuberculosis</span><a data-dcnode-id="1076" href="#_edn27" name="_ednref27"><strong data-dcnode-id="1077"><span data-dcnode-id="1078" instrument_node="">[xxvii]</span></strong></a><span data-dcnode-id="1075" instrument_node="">, and viral infection increases activation of vitamin D and increases cathelicidin production accordingly</span></u><span data-dcnode-id="1073" instrument_node="">.viii</span></em></p><span data-dcnode-id="1070" instrument_node="">
