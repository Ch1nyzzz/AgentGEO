</span><table class="infobox" data-dcnode-id="2237"><tbody data-dcnode-id="2238"><tr data-dcnode-id="2388"><td class="infobox-image" colspan="2" data-dcnode-id="2389"><a class="image" data-dcnode-id="2390" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/File%3ALungvolumes_Updated.png"><img alt="Lungvolumes Updated.png" data-dcnode-id="2391" data-file-height="865" data-file-width="1395" decoding="async" height="136" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//upload.wikimedia.org/wikipedia/commons/thumb/1/16/Lungvolumes_Updated.png/220px-Lungvolumes_Updated.png&amp;raw" srcset="//upload.wikimedia.org/wikipedia/commons/thumb/1/16/Lungvolumes_Updated.png/330px-Lungvolumes_Updated.png 1.5x, //upload.wikimedia.org/wikipedia/commons/thumb/1/16/Lungvolumes_Updated.png/440px-Lungvolumes_Updated.png 2x" width="220"></a></td></tr><tr data-dcnode-id="2383"><th class="infobox-label" data-dcnode-id="2386" scope="row"><span data-dcnode-id="2387" instrument_node="">TLC</span></th><td class="infobox-data" data-dcnode-id="2384"><span data-dcnode-id="2385" instrument_node="">Total lung capacity: the volume in the lungs at maximal inflation, the sum of VC and RV.</span></td></tr><tr data-dcnode-id="2375"><th class="infobox-label" data-dcnode-id="2381" scope="row"><span data-dcnode-id="2382" instrument_node="">TV</span></th><td class="infobox-data" data-dcnode-id="2376"><span data-dcnode-id="2380" instrument_node="">Tidal volume:  that volume of air moved into or out of the lungs during quiet breathing (TV indicates a subdivision of the lung; when tidal volume is precisely measured, as in gas exchange calculation, the symbol TV or V</span><sub data-dcnode-id="2378"><span data-dcnode-id="2379" instrument_node="">T</span></sub><span data-dcnode-id="2377" instrument_node=""> is used.)</span></td></tr><tr data-dcnode-id="2370"><th class="infobox-label" data-dcnode-id="2373" scope="row"><span data-dcnode-id="2374" instrument_node="">RV</span></th><td class="infobox-data" data-dcnode-id="2371"><span data-dcnode-id="2372" instrument_node="">Residual volume: the volume of air remaining in the lungs after a maximal exhalation</span></td></tr><tr data-dcnode-id="2365"><th class="infobox-label" data-dcnode-id="2368" scope="row"><span data-dcnode-id="2369" instrument_node="">ERV</span></th><td class="infobox-data" data-dcnode-id="2366"><span data-dcnode-id="2367" instrument_node="">Expiratory reserve volume: the maximal volume of air that can be exhaled from the end-expiratory position</span></td></tr><tr data-dcnode-id="2360"><th class="infobox-label" data-dcnode-id="2363" scope="row"><span data-dcnode-id="2364" instrument_node="">IRV</span></th><td class="infobox-data" data-dcnode-id="2361"><span data-dcnode-id="2362" instrument_node="">Inspiratory reserve volume: the maximal volume that can be inhaled from the end-inspiratory level</span></td></tr><tr data-dcnode-id="2355"><th class="infobox-label" data-dcnode-id="2358" scope="row"><span data-dcnode-id="2359" instrument_node="">IC</span></th><td class="infobox-data" data-dcnode-id="2356"><span data-dcnode-id="2357" instrument_node="">Inspiratory capacity: the sum of IRV and TV</span></td></tr><tr data-dcnode-id="2350"><th class="infobox-label" data-dcnode-id="2353" scope="row"><span data-dcnode-id="2354" instrument_node="">IVC</span></th><td class="infobox-data" data-dcnode-id="2351"><span data-dcnode-id="2352" instrument_node="">Inspiratory vital capacity: the maximum volume of air inhaled from the point of maximum expiration</span></td></tr><tr data-dcnode-id="2345"><th class="infobox-label" data-dcnode-id="2348" scope="row"><span data-dcnode-id="2349" instrument_node="">VC</span></th><td class="infobox-data" data-dcnode-id="2346"><span data-dcnode-id="2347" instrument_node="">Vital capacity: the volume of air breathed out after the deepest inhalation.</span></td></tr><tr data-dcnode-id="2335"><th class="infobox-label" data-dcnode-id="2341" scope="row"><span data-dcnode-id="2344" instrument_node="">V</span><sub data-dcnode-id="2342"><span data-dcnode-id="2343" instrument_node="">T</span></sub></th><td class="infobox-data" data-dcnode-id="2336"><span data-dcnode-id="2340" instrument_node="">Tidal volume: that volume of air moved into or out of the lungs during quiet breathing (VT indicates a subdivision of the lung; when tidal volume is precisely measured, as in gas exchange calculation, the symbol TV or V</span><sub data-dcnode-id="2338"><span data-dcnode-id="2339" instrument_node="">T</span></sub><span data-dcnode-id="2337" instrument_node=""> is used.)</span></td></tr><tr data-dcnode-id="2330"><th class="infobox-label" data-dcnode-id="2333" scope="row"><span data-dcnode-id="2334" instrument_node="">FRC</span></th><td class="infobox-data" data-dcnode-id="2331"><span data-dcnode-id="2332" instrument_node="">Functional residual capacity: the volume in the lungs at the end-expiratory position</span></td></tr><tr data-dcnode-id="2325"><th class="infobox-label" data-dcnode-id="2328" scope="row"><span data-dcnode-id="2329" instrument_node="">RV/TLC%</span></th><td class="infobox-data" data-dcnode-id="2326"><span data-dcnode-id="2327" instrument_node="">Residual volume expressed as percent of TLC</span></td></tr><tr data-dcnode-id="2318"><th class="infobox-label" data-dcnode-id="2321" scope="row"><span data-dcnode-id="2324" instrument_node="">V</span><sub data-dcnode-id="2322"><span data-dcnode-id="2323" instrument_node="">A</span></sub></th><td class="infobox-data" data-dcnode-id="2319"><span data-dcnode-id="2320" instrument_node="">Alveolar gas volume</span></td></tr><tr data-dcnode-id="2311"><th class="infobox-label" data-dcnode-id="2314" scope="row"><span data-dcnode-id="2317" instrument_node="">V</span><sub data-dcnode-id="2315"><span data-dcnode-id="2316" instrument_node="">L</span></sub></th><td class="infobox-data" data-dcnode-id="2312"><span data-dcnode-id="2313" instrument_node="">Actual volume of the lung including the volume of the conducting airway.</span></td></tr><tr data-dcnode-id="2306"><th class="infobox-label" data-dcnode-id="2309" scope="row"><span data-dcnode-id="2310" instrument_node="">FVC</span></th><td class="infobox-data" data-dcnode-id="2307"><span data-dcnode-id="2308" instrument_node="">Forced vital capacity: the determination of the vital capacity from a maximally forced expiratory effort</span></td></tr><tr data-dcnode-id="2296"><th class="infobox-label" data-dcnode-id="2302" scope="row"><span data-dcnode-id="2305" instrument_node="">FEV</span><sub data-dcnode-id="2303"><span data-dcnode-id="2304" instrument_node="">t</span></sub></th><td class="infobox-data" data-dcnode-id="2297"><span data-dcnode-id="2301" instrument_node="">Forced expiratory volume (time): a generic term indicating the volume of air exhaled under forced conditions in the first </span><i data-dcnode-id="2299"><span data-dcnode-id="2300" instrument_node="">t</span></i><span data-dcnode-id="2298" instrument_node=""> seconds</span></td></tr><tr data-dcnode-id="2289"><th class="infobox-label" data-dcnode-id="2292" scope="row"><span data-dcnode-id="2295" instrument_node="">FEV</span><sub data-dcnode-id="2293"><span data-dcnode-id="2294" instrument_node="">1</span></sub></th><td class="infobox-data" data-dcnode-id="2290"><span data-dcnode-id="2291" instrument_node="">Volume that has been exhaled at the end of the first second of forced expiration</span></td></tr><tr data-dcnode-id="2282"><th class="infobox-label" data-dcnode-id="2285" scope="row"><span data-dcnode-id="2288" instrument_node="">FEF</span><sub data-dcnode-id="2286"><span data-dcnode-id="2287" instrument_node="">x</span></sub></th><td class="infobox-data" data-dcnode-id="2283"><span data-dcnode-id="2284" instrument_node="">Forced expiratory flow related to some portion of the FVC curve; modifiers refer to amount of FVC already exhaled</span></td></tr><tr data-dcnode-id="2275"><th class="infobox-label" data-dcnode-id="2278" scope="row"><span data-dcnode-id="2281" instrument_node="">FEF</span><sub data-dcnode-id="2279"><span data-dcnode-id="2280" instrument_node="">max</span></sub></th><td class="infobox-data" data-dcnode-id="2276"><span data-dcnode-id="2277" instrument_node="">The maximum instantaneous flow achieved during a FVC maneuver</span></td></tr><tr data-dcnode-id="2267"><th class="infobox-label" data-dcnode-id="2273" scope="row"><span data-dcnode-id="2274" instrument_node="">FIF</span></th><td class="infobox-data" data-dcnode-id="2268"><span data-dcnode-id="2272" instrument_node="">Forced inspiratory flow: (Specific measurement of the forced inspiratory curve is denoted by nomenclature analogous to that for the forced expiratory curve. For example, maximum inspiratory flow is denoted FIF</span><sub data-dcnode-id="2270"><span data-dcnode-id="2271" instrument_node="">max</span></sub><span data-dcnode-id="2269" instrument_node="">. Unless otherwise specified, volume qualifiers indicate the volume inspired from RV at the point of measurement.)</span></td></tr><tr data-dcnode-id="2262"><th class="infobox-label" data-dcnode-id="2265" scope="row"><span data-dcnode-id="2266" instrument_node="">PEF</span></th><td class="infobox-data" data-dcnode-id="2263"><span data-dcnode-id="2264" instrument_node="">Peak expiratory flow: The highest forced expiratory flow measured with a peak flow meter</span></td></tr><tr data-dcnode-id="2257"><th class="infobox-label" data-dcnode-id="2260" scope="row"><span data-dcnode-id="2261" instrument_node="">MVV</span></th><td class="infobox-data" data-dcnode-id="2258"><span data-dcnode-id="2259" instrument_node="">Maximal voluntary ventilation: volume of air expired in a specified period during repetitive maximal effort</span></td></tr><tr data-dcnode-id="2239"><td class="infobox-navbar" colspan="2" data-dcnode-id="2240"><div class="navbar plainlinks hlist navbar-mini" data-dcnode-id="2241"><ul data-dcnode-id="2242"><li class="nv-view" data-dcnode-id="2251"><a data-dcnode-id="2252" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Template%3APulmonary_function" title="Template:Pulmonary function"><abbr data-dcnode-id="2253" title="View this template"><span data-dcnode-id="2254" instrument_node="">v</span></abbr></a></li><li class="nv-talk" data-dcnode-id="2247"><a data-dcnode-id="2248" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Template_talk%3APulmonary_function" title="Template talk:Pulmonary function"><abbr data-dcnode-id="2249" title="Discuss this template"><span data-dcnode-id="2250" instrument_node="">t</span></abbr></a></li><li class="nv-edit" data-dcnode-id="2243"><a class="external text" data-dcnode-id="2244" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/w/index.php%3Ftitle%3DTemplate%3APulmonary_function%26action%3Dedit"><abbr data-dcnode-id="2245" title="Edit this template"><span data-dcnode-id="2246" instrument_node="">e</span></abbr></a></li></ul></div></td></tr></tbody></table><span data-dcnode-id="2236" instrument_node="">
</span><p data-dcnode-id="2217"><b data-dcnode-id="2234"><span data-dcnode-id="2235" instrument_node="">Lung volumes</span></b><span data-dcnode-id="2233" instrument_node=""> and </span><b data-dcnode-id="2231"><span data-dcnode-id="2232" instrument_node="">lung capacities</span></b><span data-dcnode-id="2230" instrument_node=""> refer to the </span><a data-dcnode-id="2228" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Volume" title="Volume"><span data-dcnode-id="2229" instrument_node="">volume</span></a><span data-dcnode-id="2227" instrument_node=""> of </span><a class="mw-redirect" data-dcnode-id="2225" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Air" title="Air"><span data-dcnode-id="2226" instrument_node="">air</span></a><span data-dcnode-id="2224" instrument_node=""> in the </span><a data-dcnode-id="2222" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Lung" title="Lung"><span data-dcnode-id="2223" instrument_node="">lungs</span></a><span data-dcnode-id="2221" instrument_node=""> at different phases of the </span><a data-dcnode-id="2219" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Breathing" title="Breathing"><span data-dcnode-id="2220" instrument_node="">respiratory cycle</span></a><span data-dcnode-id="2218" instrument_node="">.
</span></p><p data-dcnode-id="2212"><span data-dcnode-id="2216" instrument_node="">The average total lung capacity of an adult human male is about 6 </span><a class="mw-redirect" data-dcnode-id="2214" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Litres" title="Litres"><span data-dcnode-id="2215" instrument_node="">litres</span></a><span data-dcnode-id="2213" instrument_node=""> of air.
</span></p><p data-dcnode-id="2207"><span data-dcnode-id="2211" instrument_node="">Tidal breathing is normal, resting breathing; the </span><a data-dcnode-id="2209" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Tidal_volume" title="Tidal volume"><span data-dcnode-id="2210" instrument_node="">tidal volume</span></a><span data-dcnode-id="2208" instrument_node=""> is the volume of air that is inhaled or exhaled in only a single such breath.
</span></p><p data-dcnode-id="2194"><span data-dcnode-id="2206" instrument_node="">The average human </span><a data-dcnode-id="2204" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Respiratory_rate" title="Respiratory rate"><span data-dcnode-id="2205" instrument_node="">respiratory rate</span></a><span data-dcnode-id="2203" instrument_node=""> is 30–60 breaths per minute at birth,</span><sup class="reference" data-dcnode-id="2200" id="cite_ref-DeBoer2004_1-0"><a data-dcnode-id="2201" href="#cite_note-DeBoer2004-1"><span data-dcnode-id="2202" instrument_node="">[1]</span></a></sup><span data-dcnode-id="2199" instrument_node=""> decreasing to 12–20 breaths per minute in adults.</span><sup class="reference" data-dcnode-id="2196" id="cite_ref-LindhPooler2009_2-0"><a data-dcnode-id="2197" href="#cite_note-LindhPooler2009-2"><span data-dcnode-id="2198" instrument_node="">[2]</span></a></sup><span data-dcnode-id="2195" instrument_node="">
</span></p><span data-dcnode-id="2193" instrument_node="">

</span><p data-dcnode-id="2108"><span data-dcnode-id="2109" instrument_node="">Several factors affect lung volumes; some can be controlled, and some cannot be controlled. Lung volumes vary with different people as follows:
</span></p><span data-dcnode-id="2107" instrument_node="">
</span><span data-dcnode-id="2106" instrument_node="">
</span><span data-dcnode-id="2105" instrument_node="">
</span><span data-dcnode-id="2102" instrument_node="">
</span><span data-dcnode-id="2098" instrument_node="">
</span><span data-dcnode-id="2097" instrument_node="">
</span><span data-dcnode-id="2094" instrument_node="">
</span><span data-dcnode-id="2090" instrument_node="">
</span><span data-dcnode-id="2089" instrument_node="">
</span><span data-dcnode-id="2086" instrument_node="">
</span><span data-dcnode-id="2082" instrument_node="">
</span><span data-dcnode-id="2081" instrument_node="">
</span><span data-dcnode-id="2078" instrument_node="">
</span><table class="wikitable" data-dcnode-id="2069" style="text-align:center; width:60%;"><tbody data-dcnode-id="2070"><tr data-dcnode-id="2099"><th data-dcnode-id="2103" scope="col" width="300"><span data-dcnode-id="2104" instrument_node="">Larger volume
</span></th><th data-dcnode-id="2100" scope="col" width="300"><span data-dcnode-id="2101" instrument_node="">Smaller volumes
</span></th></tr><tr data-dcnode-id="2091"><td data-dcnode-id="2095"><span data-dcnode-id="2096" instrument_node="">taller people</span></td><td data-dcnode-id="2092"><span data-dcnode-id="2093" instrument_node="">shorter people
</span></td></tr><tr data-dcnode-id="2083"><td data-dcnode-id="2087"><span data-dcnode-id="2088" instrument_node="">people who live at higher altitudes</span></td><td data-dcnode-id="2084"><span data-dcnode-id="2085" instrument_node="">people who live at lower altitudes
</span></td></tr><tr data-dcnode-id="2071"><td data-dcnode-id="2079"><span data-dcnode-id="2080" instrument_node="">fit</span></td><td data-dcnode-id="2072"><span data-dcnode-id="2077" instrument_node="">obese</span><sup class="reference" data-dcnode-id="2074" id="cite_ref-3"><a data-dcnode-id="2075" href="#cite_note-3"><span data-dcnode-id="2076" instrument_node="">[3]</span></a></sup><span data-dcnode-id="2073" instrument_node="">
</span></td></tr></tbody></table><span data-dcnode-id="2068" instrument_node="">
</span><p data-dcnode-id="2060"><span data-dcnode-id="2067" instrument_node="">A person who is born and lives at </span><a data-dcnode-id="2065" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Sea_level" title="Sea level"><span data-dcnode-id="2066" instrument_node="">sea level</span></a><span data-dcnode-id="2064" instrument_node=""> will develop a slightly smaller lung capacity than a person who spends their life at a high </span><a data-dcnode-id="2062" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Altitude" title="Altitude"><span data-dcnode-id="2063" instrument_node="">altitude</span></a><span data-dcnode-id="2061" instrument_node="">. This is because the partial pressure of oxygen is lower at higher altitude which, as a result means that oxygen less readily diffuses into the bloodstream. In response to higher altitude, the body's diffusing capacity increases in order to process more air. Also, due to the lower environmental air pressure at higher altitudes, the air pressure within the breathing system must be lower in order to inhale; in order to meet this requirement, the thoracic diaphragm has a tendency to lower to a greater extent during inhalation, which in turn causes an increase in lung volume.
</span></p><p data-dcnode-id="2043"><span data-dcnode-id="2059" instrument_node="">When someone living at or near sea level travels to locations at high altitudes (e.g. the </span><a data-dcnode-id="2057" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Andes" title="Andes"><span data-dcnode-id="2058" instrument_node="">Andes</span></a><span data-dcnode-id="2056" instrument_node="">; </span><a class="mw-redirect" data-dcnode-id="2054" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Denver%2C_Colorado" title="Denver, Colorado"><span data-dcnode-id="2055" instrument_node="">Denver, Colorado</span></a><span data-dcnode-id="2053" instrument_node="">; </span><a data-dcnode-id="2051" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Tibet" title="Tibet"><span data-dcnode-id="2052" instrument_node="">Tibet</span></a><span data-dcnode-id="2050" instrument_node="">; the </span><a data-dcnode-id="2048" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Himalayas" title="Himalayas"><span data-dcnode-id="2049" instrument_node="">Himalayas</span></a><span data-dcnode-id="2047" instrument_node="">) that person can develop a condition called </span><a data-dcnode-id="2045" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Altitude_sickness" title="Altitude sickness"><span data-dcnode-id="2046" instrument_node="">altitude sickness</span></a><span data-dcnode-id="2044" instrument_node=""> because their lungs remove adequate amounts of carbon dioxide but they do not take in enough oxygen. (In normal individuals, carbon dioxide is the primary determinant of respiratory drive.)
</span></p><p data-dcnode-id="2020"><span data-dcnode-id="2042" instrument_node="">Lung function development is reduced in children who grow up near motorways</span><sup class="reference" data-dcnode-id="2039" id="cite_ref-4"><a data-dcnode-id="2040" href="#cite_note-4"><span data-dcnode-id="2041" instrument_node="">[4]</span></a></sup><sup class="reference" data-dcnode-id="2036" id="cite_ref-Gauderman_5-0"><a data-dcnode-id="2037" href="#cite_note-Gauderman-5"><span data-dcnode-id="2038" instrument_node="">[5]</span></a></sup><span data-dcnode-id="2035" instrument_node=""> although this seems at least in part reversible.</span><sup class="reference" data-dcnode-id="2032" id="cite_ref-6"><a data-dcnode-id="2033" href="#cite_note-6"><span data-dcnode-id="2034" instrument_node="">[6]</span></a></sup><span data-dcnode-id="2031" instrument_node=""> Air pollution exposure affects FEV</span><sub data-dcnode-id="2029"><span data-dcnode-id="2030" instrument_node="">1</span></sub><span data-dcnode-id="2028" instrument_node=""> in asthmatics, but also affects FVC and FEV</span><sub data-dcnode-id="2026"><span data-dcnode-id="2027" instrument_node="">1</span></sub><span data-dcnode-id="2025" instrument_node=""> in healthy adults even at low concentrations.</span><sup class="reference" data-dcnode-id="2022" id="cite_ref-IntPanis_7-0"><a data-dcnode-id="2023" href="#cite_note-IntPanis-7"><span data-dcnode-id="2024" instrument_node="">[7]</span></a></sup><span data-dcnode-id="2021" instrument_node="">
</span></p><p data-dcnode-id="1955"><a data-dcnode-id="2018" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Maternal_physiological_changes_in_pregnancy%23Respiratory" title="Maternal physiological changes in pregnancy"><span data-dcnode-id="2019" instrument_node="">Specific changes</span></a><span data-dcnode-id="2017" instrument_node=""> in lung volumes also occur during pregnancy. </span><a data-dcnode-id="2015" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Functional_residual_capacity" title="Functional residual capacity"><span data-dcnode-id="2016" instrument_node="">Functional residual capacity</span></a><span data-dcnode-id="2014" instrument_node=""> drops 18–20%,</span><sup class="reference" data-dcnode-id="2011" id="cite_ref-simpson_breathing_8-0"><a data-dcnode-id="2012" href="#cite_note-simpson_breathing-8"><span data-dcnode-id="2013" instrument_node="">[8]</span></a></sup><span data-dcnode-id="2010" instrument_node=""> typically falling from 1.7 to 1.35 litres,</span><sup class="noprint Inline-Template Template-Fact" data-dcnode-id="2003" style="white-space:nowrap;"><span data-dcnode-id="2009" instrument_node="">[</span><i data-dcnode-id="2005"><a data-dcnode-id="2006" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Wikipedia%3ACitation_needed" title="Wikipedia:Citation needed"><span data-dcnode-id="2007" title="This claim needs references to reliable sources. (January 2010)"><span data-dcnode-id="2008" instrument_node="">citation needed</span></span></a></i><span data-dcnode-id="2004" instrument_node="">]</span></sup><span data-dcnode-id="2002" instrument_node=""> due to the compression of the </span><a data-dcnode-id="2000" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Thoracic_diaphragm" title="Thoracic diaphragm"><span data-dcnode-id="2001" instrument_node="">diaphragm</span></a><span data-dcnode-id="1999" instrument_node=""> by the uterus.</span><sup class="noprint Inline-Template Template-Fact" data-dcnode-id="1992" style="white-space:nowrap;"><span data-dcnode-id="1998" instrument_node="">[</span><i data-dcnode-id="1994"><a data-dcnode-id="1995" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Wikipedia%3ACitation_needed" title="Wikipedia:Citation needed"><span data-dcnode-id="1996" title="This claim needs references to reliable sources. (October 2013)"><span data-dcnode-id="1997" instrument_node="">citation needed</span></span></a></i><span data-dcnode-id="1993" instrument_node="">]</span></sup><span data-dcnode-id="1991" instrument_node=""> The compression also causes a decreased </span><a class="mw-redirect" data-dcnode-id="1989" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Total_lung_capacity" title="Total lung capacity"><span data-dcnode-id="1990" instrument_node="">total lung capacity</span></a><span data-dcnode-id="1988" instrument_node=""> (TLC) by 5%</span><sup class="reference" data-dcnode-id="1985" id="cite_ref-simpson_breathing_8-1"><a data-dcnode-id="1986" href="#cite_note-simpson_breathing-8"><span data-dcnode-id="1987" instrument_node="">[8]</span></a></sup><span data-dcnode-id="1984" instrument_node=""> and decreased </span><a class="mw-redirect" data-dcnode-id="1982" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Expiratory_reserve_volume" title="Expiratory reserve volume"><span data-dcnode-id="1983" instrument_node="">expiratory reserve volume</span></a><span data-dcnode-id="1981" instrument_node=""> by 20%.</span><sup class="reference" data-dcnode-id="1978" id="cite_ref-simpson_breathing_8-2"><a data-dcnode-id="1979" href="#cite_note-simpson_breathing-8"><span data-dcnode-id="1980" instrument_node="">[8]</span></a></sup><span data-dcnode-id="1977" instrument_node=""> </span><a data-dcnode-id="1975" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Tidal_volume" title="Tidal volume"><span data-dcnode-id="1976" instrument_node="">Tidal volume</span></a><span data-dcnode-id="1974" instrument_node=""> increases by 30–40%, from 0.5 to 0.7 litres,</span><sup class="reference" data-dcnode-id="1971" id="cite_ref-simpson_breathing_8-3"><a data-dcnode-id="1972" href="#cite_note-simpson_breathing-8"><span data-dcnode-id="1973" instrument_node="">[8]</span></a></sup><span data-dcnode-id="1970" instrument_node=""> and </span><a data-dcnode-id="1968" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Minute_ventilation" title="Minute ventilation"><span data-dcnode-id="1969" instrument_node="">minute ventilation</span></a><span data-dcnode-id="1967" instrument_node=""> by 30–40%</span><sup class="reference" data-dcnode-id="1964" id="cite_ref-simpson_breathing_8-4"><a data-dcnode-id="1965" href="#cite_note-simpson_breathing-8"><span data-dcnode-id="1966" instrument_node="">[8]</span></a></sup><sup class="reference" data-dcnode-id="1961" id="cite_ref-isbn81-8147-920-3_9-0"><a data-dcnode-id="1962" href="#cite_note-isbn81-8147-920-3-9"><span data-dcnode-id="1963" instrument_node="">[9]</span></a></sup><span data-dcnode-id="1960" instrument_node=""> giving an increase in pulmonary ventilation. This is necessary to meet the increased oxygen requirement of the body, which reaches 50&nbsp;ml/min, 20 ml of which goes to reproductive tissues. Overall, the net change in maximum breathing capacity is zero.</span><sup class="reference" data-dcnode-id="1957" id="cite_ref-simpson_breathing_8-5"><a data-dcnode-id="1958" href="#cite_note-simpson_breathing-8"><span data-dcnode-id="1959" instrument_node="">[8]</span></a></sup><span data-dcnode-id="1956" instrument_node="">
</span></p><span data-dcnode-id="1954" instrument_node="">

</span><p data-dcnode-id="1763"><span data-dcnode-id="1783" instrument_node="">The </span><i data-dcnode-id="1781"><span data-dcnode-id="1782" instrument_node="">tidal volume</span></i><span data-dcnode-id="1780" instrument_node="">, </span><i data-dcnode-id="1778"><span data-dcnode-id="1779" instrument_node="">vital capacity</span></i><span data-dcnode-id="1777" instrument_node="">, </span><i data-dcnode-id="1775"><span data-dcnode-id="1776" instrument_node="">inspiratory capacity</span></i><span data-dcnode-id="1774" instrument_node=""> and </span><i data-dcnode-id="1772"><span data-dcnode-id="1773" instrument_node="">expiratory reserve volume</span></i><span data-dcnode-id="1771" instrument_node=""> can be measured directly with a </span><a data-dcnode-id="1769" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Spirometer" title="Spirometer"><span data-dcnode-id="1770" instrument_node="">spirometer</span></a><span data-dcnode-id="1768" instrument_node="">. These are the basic elements of a ventilatory </span><i data-dcnode-id="1765"><a class="mw-redirect" data-dcnode-id="1766" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Pulmonary_function_test" title="Pulmonary function test"><span data-dcnode-id="1767" instrument_node="">pulmonary function test</span></a></i><span data-dcnode-id="1764" instrument_node="">.
</span></p><p data-dcnode-id="1749"><span data-dcnode-id="1762" instrument_node="">Determination of the </span><i data-dcnode-id="1760"><span data-dcnode-id="1761" instrument_node="">residual volume</span></i><span data-dcnode-id="1759" instrument_node=""> is more difficult as it is impossible to "completely" breathe out. Therefore, measurement of the residual volume has to be done via indirect methods such as radiographic planimetry, </span><a class="mw-redirect" data-dcnode-id="1757" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Body_plethysmography" title="Body plethysmography"><span data-dcnode-id="1758" instrument_node="">body plethysmography</span></a><span data-dcnode-id="1756" instrument_node="">, closed circuit dilution (including the </span><a data-dcnode-id="1754" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Helium_dilution_technique" title="Helium dilution technique"><span data-dcnode-id="1755" instrument_node="">helium dilution technique</span></a><span data-dcnode-id="1753" instrument_node="">) and </span><a data-dcnode-id="1751" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Nitrogen_washout" title="Nitrogen washout"><span data-dcnode-id="1752" instrument_node="">nitrogen washout</span></a><span data-dcnode-id="1750" instrument_node="">.
</span></p><p data-dcnode-id="1725"><span data-dcnode-id="1748" instrument_node="">In absence of such, estimates of </span><i data-dcnode-id="1746"><span data-dcnode-id="1747" instrument_node="">residual volume</span></i><span data-dcnode-id="1745" instrument_node=""> have been prepared as a proportion of body mass for infants (18.1 ml/kg),</span><sup class="reference" data-dcnode-id="1742" id="cite_ref-11"><a data-dcnode-id="1743" href="#cite_note-11"><span data-dcnode-id="1744" instrument_node="">[11]</span></a></sup><span data-dcnode-id="1741" instrument_node=""> or as a proportion of </span><i data-dcnode-id="1739"><span data-dcnode-id="1740" instrument_node="">vital capacity</span></i><span data-dcnode-id="1738" instrument_node=""> (0.24 for men and 0.28 for women)</span><sup class="reference" data-dcnode-id="1735" id="cite_ref-12"><a data-dcnode-id="1736" href="#cite_note-12"><span data-dcnode-id="1737" instrument_node="">[12]</span></a></sup><span data-dcnode-id="1734" instrument_node=""> or in relation to height and age ((0.0275* Age [Years]+0.0189*Height [cm]−2.6139) litres for normal-mass individuals and (0.0277*Age [Years]+0.0138*Height [cm]−2.3967) litres for overweight individuals).</span><sup class="reference" data-dcnode-id="1731" id="cite_ref-13"><a data-dcnode-id="1732" href="#cite_note-13"><span data-dcnode-id="1733" instrument_node="">[13]</span></a></sup><span data-dcnode-id="1730" instrument_node="">  Standard errors in prediction equations for residual volume have been measured at 579 ml for men and 355 ml for women, while the use of 0.24*FVC gave a standard error of 318 ml.</span><sup class="reference" data-dcnode-id="1727" id="cite_ref-14"><a data-dcnode-id="1728" href="#cite_note-14"><span data-dcnode-id="1729" instrument_node="">[14]</span></a></sup><span data-dcnode-id="1726" instrument_node="">
</span></p><p data-dcnode-id="1721"><a class="external text" data-dcnode-id="1723" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//dynamicmt.com/dataform3.html" rel="nofollow"><span data-dcnode-id="1724" instrument_node="">Online calculators are available</span></a><span data-dcnode-id="1722" instrument_node=""> that can compute predicted lung volumes, and other spirometric parameters based on a patient's age, height, weight, and ethnic origin for many reference sources.
</span></p><p data-dcnode-id="1696"><span data-dcnode-id="1720" instrument_node="">British rower and three-time Olympic gold medalist, </span><a data-dcnode-id="1718" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Pete_Reed" title="Pete Reed"><span data-dcnode-id="1719" instrument_node="">Pete Reed</span></a><span data-dcnode-id="1717" instrument_node="">, is reported to hold the largest recorded lung capacity of 11.68 litres;</span><sup class="reference" data-dcnode-id="1714" id="cite_ref-15"><a data-dcnode-id="1715" href="#cite_note-15"><span data-dcnode-id="1716" instrument_node="">[15]</span></a></sup><sup class="reference" data-dcnode-id="1711" id="cite_ref-:1_16-0"><a data-dcnode-id="1712" href="#cite_note-:1-16"><span data-dcnode-id="1713" instrument_node="">[16]</span></a></sup><sup class="reference" data-dcnode-id="1708" id="cite_ref-17"><a data-dcnode-id="1709" href="#cite_note-17"><span data-dcnode-id="1710" instrument_node="">[17]</span></a></sup><span data-dcnode-id="1707" instrument_node=""> US swimmer, </span><a data-dcnode-id="1705" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Michael_Phelps" title="Michael Phelps"><span data-dcnode-id="1706" instrument_node="">Michael Phelps</span></a><span data-dcnode-id="1704" instrument_node=""> is also said to have a lung capacity of around 12 litres.</span><sup class="reference" data-dcnode-id="1701" id="cite_ref-:1_16-1"><a data-dcnode-id="1702" href="#cite_note-:1-16"><span data-dcnode-id="1703" instrument_node="">[16]</span></a></sup><sup class="reference" data-dcnode-id="1698" id="cite_ref-18"><a data-dcnode-id="1699" href="#cite_note-18"><span data-dcnode-id="1700" instrument_node="">[18]</span></a></sup><span data-dcnode-id="1697" instrument_node="">
</span></p><span data-dcnode-id="1695" instrument_node="">
</span><h3 data-dcnode-id="1685"><span class="mw-headline" data-dcnode-id="1693" id="Weight_of_breath"><span data-dcnode-id="1694" instrument_node="">Weight of breath</span></span><span class="mw-editsection" data-dcnode-id="1686"><span class="mw-editsection-bracket" data-dcnode-id="1691"><span data-dcnode-id="1692" instrument_node="">[</span></span><a data-dcnode-id="1689" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/w/index.php%3Ftitle%3DLung_volumes%26action%3Dedit%26section%3D3" title="Edit section: Weight of breath"><span data-dcnode-id="1690" instrument_node="">edit</span></a><span class="mw-editsection-bracket" data-dcnode-id="1687"><span data-dcnode-id="1688" instrument_node="">]</span></span></span></h3><span data-dcnode-id="1684" instrument_node="">
</span><p data-dcnode-id="1665"><span data-dcnode-id="1683" instrument_node="">The mass of one breath is approximately a gram (0.5-5 g). A litre of air weighs about 1.2 g (1.2&nbsp;kg/m</span><sup data-dcnode-id="1681"><span data-dcnode-id="1682" instrument_node="">3</span></sup><span data-dcnode-id="1680" instrument_node="">).</span><sup class="reference" data-dcnode-id="1677" id="cite_ref-19"><a data-dcnode-id="1678" href="#cite_note-19"><span data-dcnode-id="1679" instrument_node="">[19]</span></a></sup><span data-dcnode-id="1676" instrument_node=""> A half litre ordinary tidal breath</span><b data-dcnode-id="1672"><sup class="reference" data-dcnode-id="1673" id="cite_ref-:0_10-2"><a data-dcnode-id="1674" href="#cite_note-:0-10"><span data-dcnode-id="1675" instrument_node="">[10]</span></a></sup></b><span data-dcnode-id="1671" instrument_node=""> weighs 0.6 g; a maximal 4.8 litre breath (average vital capacity for males)</span><b data-dcnode-id="1667"><sup class="reference" data-dcnode-id="1668" id="cite_ref-:0_10-3"><a data-dcnode-id="1669" href="#cite_note-:0-10"><span data-dcnode-id="1670" instrument_node="">[10]</span></a></sup></b><span data-dcnode-id="1666" instrument_node=""> weighs approximately 5.8 g.
