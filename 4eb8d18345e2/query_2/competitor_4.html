</span><p data-dcnode-id="1236"><span data-dcnode-id="1243" instrument_node="">Flume PA, Mogayzel PJ Jr, Robinson KA, Goss CH, Rosenblatt RL, Kuhn RJ, Marshall BC, Clinical Practice Guidelines for Pulmonary Therapies Committee. </span><a data-dcnode-id="1241" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.atsjournals.org/doi/full/10.1164/rccm.200812-1845PP"><span data-dcnode-id="1242" instrument_node="">Cystic fibrosis pulmonary guidelines: treatment of pulmonary exacerbations</span></a><span data-dcnode-id="1240" instrument_node="">. </span><em data-dcnode-id="1238"><span data-dcnode-id="1239" instrument_node="">Am J Respir Crit Care Med</span></em><span data-dcnode-id="1237" instrument_node="">. 2009 Nov 1;180(9):802-8. doi: 10.1164/rccm.200812-1845PP. Epub 2009 Sep 3.</span></p><span data-dcnode-id="1235" instrument_node="">
</span><p data-dcnode-id="1201"><span data-dcnode-id="1234" instrument_node="">Cystic fibrosis is characterized by </span><span data-dcnode-id="1227"><cff-tooltip aria-label="A disease or condition that is continuous. CF is a chronic disease." class="hydrated" data-dcnode-id="1228" lang="" tooltip="A disease or condition that is continuous. CF is a chronic disease." xml:lang=""><span class="abbr" data-dcnode-id="1229"><slot data-dcnode-id="1232"><span data-dcnode-id="1233" instrument_node="">chronic</span></slot><span class="tooltip" data-dcnode-id="1230"><span data-dcnode-id="1231" instrument_node="">A disease or condition that is continuous. CF is a chronic disease.</span></span></span></cff-tooltip></span><span data-dcnode-id="1226" instrument_node=""> respiratory infections resulting in progressive loss of </span><span data-dcnode-id="1219"><cff-tooltip aria-label="How the lungs work. Lung function includes how well air moves in and out, and how well the lungs bring in oxygen and blow out carbon dioxide. Lung function can be measured by pulmonary function tests. " class="hydrated" data-dcnode-id="1220" lang="" tooltip="How the lungs work. Lung function includes how well air moves in and out, and how well the lungs bring in oxygen and blow out carbon dioxide. Lung function can be measured by pulmonary function tests. " xml:lang=""><span class="abbr" data-dcnode-id="1221"><slot data-dcnode-id="1224"><span data-dcnode-id="1225" instrument_node="">lung function</span></slot><span class="tooltip" data-dcnode-id="1222"><span data-dcnode-id="1223" instrument_node="">How the lungs work. Lung function includes how well air moves in and out, and how well the lungs bring in oxygen and blow out carbon dioxide. Lung function can be measured by pulmonary function tests. </span></span></span></cff-tooltip></span><span data-dcnode-id="1218" instrument_node=""> and decreased survival, and is marked by acute worsening of symptoms, called </span><span data-dcnode-id="1211"><cff-tooltip aria-label="Relating to the lungs." class="hydrated" data-dcnode-id="1212" lang="" tooltip="Relating to the lungs." xml:lang=""><span class="abbr" data-dcnode-id="1213"><slot data-dcnode-id="1216"><span data-dcnode-id="1217" instrument_node="">pulmonary</span></slot><span class="tooltip" data-dcnode-id="1214"><span data-dcnode-id="1215" instrument_node="">Relating to the lungs.</span></span></span></cff-tooltip></span><span data-dcnode-id="1210" instrument_node=""> exacerbations (PEx). Although there is no widely accepted definition of PEx, they generally entail an increase in respiratory symptoms (e.g., increased cough, </span><span data-dcnode-id="1203"><cff-tooltip aria-label="Mucus or phlegm coughed up from the lungs." class="hydrated" data-dcnode-id="1204" lang="" tooltip="Mucus or phlegm coughed up from the lungs." xml:lang=""><span class="abbr" data-dcnode-id="1205"><slot data-dcnode-id="1208"><span data-dcnode-id="1209" instrument_node="">sputum</span></slot><span class="tooltip" data-dcnode-id="1206"><span data-dcnode-id="1207" instrument_node="">Mucus or phlegm coughed up from the lungs.</span></span></span></cff-tooltip></span><span data-dcnode-id="1202" instrument_node=""> production, shortness of breath) accompanied by an acute decrease in lung function.</span></p><span data-dcnode-id="1200" instrument_node="">
</span><p data-dcnode-id="1198"><span data-dcnode-id="1199" instrument_node="">PEx occur commonly in the life of an individual with CF, with more than 17,000 events treated with intravenous (IV) antibiotics recorded in the Cystic Fibrosis Foundation Patient Registry in 2015. There are currently no guidelines about best practices for duration of antibiotics, route and dosing of antibiotics, location of treatment (i.e., home or hospital), and other possible therapies, such as steroids. The CF Pulmonary Guidelines: Treatment of Pulmonary Exacerbations was published in 2009. To create those guidelines, a systematic review was performed to establish best treatment practices.</span></p><span data-dcnode-id="1197" instrument_node="">
</span><p data-dcnode-id="1195"><span data-dcnode-id="1196" instrument_node="">However, the committee found that there was a lack of evidence to support specific treatment recommendations for most questions. Where appropriate, a consensus-based recommendation was made linking to other chronic therapy guidelines. Additionally, the need for dedicated research was recognized to establish specific treatment guidelines. The establishment of evidence-based guidelines is a priority to the CF Foundation, and the first interventional study evaluating pulmonary exacerbations is currently underway.</span></p><span data-dcnode-id="1194" instrument_node="">
</span><h2 data-dcnode-id="1192" id="methodology"><span data-dcnode-id="1193" instrument_node="">Methodology</span></h2><span data-dcnode-id="1191" instrument_node="">
</span><p data-dcnode-id="1186"><span data-dcnode-id="1190" instrument_node="">A multidisciplinary committee of experts developed specific questions related to the treatment of pulmonary exacerbations. A systematic literature review was conducted and reviewed by the committee. The committee then drafted and voted on recommendations. The final recommendations were graded using the U.S. Preventative Task Force (USPSTF) Scheme. Find additional information about the </span><a data-dcnode-id="1188" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.uspreventiveservicestaskforce.org/uspstf/about-uspstf/methods-and-processes/grade-definitions"><span data-dcnode-id="1189" instrument_node="">USPSTF grading definitions</span></a><span data-dcnode-id="1187" instrument_node="">.</span></p><span data-dcnode-id="1185" instrument_node="">

			The CF Foundation recommends against the delivery of IV antibiotics in a nonhospital setting, unless resources and support equivalent to the hospital setting can be assured for the treatment of an acute </span><span data-dcnode-id="1162"><cff-tooltip aria-label="A sudden worsening of signs and symptoms that show a need for treatment." class="hydrated" data-dcnode-id="1163" lang="" tooltip="A sudden worsening of signs and symptoms that show a need for treatment." xml:lang=""><span class="abbr" data-dcnode-id="1164"><slot data-dcnode-id="1167"><span data-dcnode-id="1168" instrument_node="">exacerbation</span></slot><span class="tooltip" data-dcnode-id="1165"><span data-dcnode-id="1166" instrument_node="">A sudden worsening of signs and symptoms that show a need for treatment.</span></span></span></cff-tooltip></span><span data-dcnode-id="1161" instrument_node=""> of pulmonary disease.</span></td><td data-dcnode-id="1157"><span data-dcnode-id="1158" instrument_node="">Recommendation: I</span></td></tr><tr data-dcnode-id="1142"><td data-dcnode-id="1147"><span data-dcnode-id="1154" instrument_node="">2.&nbsp;Continuing </span><a data-dcnode-id="1152" data-entity-substitution="canonical" data-entity-type="node" data-entity-uuid="50015174-b2bb-42da-ada7-8353eab0a4a0" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.cff.org/node/14046"><span data-dcnode-id="1153" instrument_node="">chronic medications for maintenance of lung health</span></a><span data-dcnode-id="1151" instrument_node="">:</span><br data-dcnode-id="1150"><br data-dcnode-id="1149"><span data-dcnode-id="1148" instrument_node="">
			The CF Foundation recommends continuing chronic therapies for maintenance of lung health during treatment of an acute exacerbation of pulmonary disease.</span></td><td data-dcnode-id="1144"><span data-dcnode-id="1145" instrument_node="">Recommendation: B</span></td></tr><tr data-dcnode-id="1132"><td data-dcnode-id="1137"><span data-dcnode-id="1141" instrument_node="">3.&nbsp;Continuing inhaled antibiotics used as a chronic therapy:</span><br data-dcnode-id="1140"><br data-dcnode-id="1139"><span data-dcnode-id="1138" instrument_node="">
			The CF Foundation concludes that there is insufficient evidence to recommend for or against continued use of inhaled antibiotics in patients treated with the same antibiotics intravenously for the treatment of an acute exacerbation of pulmonary disease.</span></td><td data-dcnode-id="1134"><span data-dcnode-id="1135" instrument_node="">Recommendation: I</span></td></tr><tr data-dcnode-id="1119"><td data-dcnode-id="1124"><span data-dcnode-id="1131" instrument_node="">4.&nbsp;Continuing </span><a data-dcnode-id="1129" data-entity-substitution="canonical" data-entity-type="node" data-entity-uuid="432441c5-9bbf-41e0-b0b6-1677729c5fc4" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.cff.org/node/6481"><span data-dcnode-id="1130" instrument_node="">airway clearance therapies</span></a><span data-dcnode-id="1128" instrument_node=""> for maintenance of lung health:</span><br data-dcnode-id="1127"><br data-dcnode-id="1126"><span data-dcnode-id="1125" instrument_node="">
			The CF Foundation recommends that airway clearance therapy be increased as part of the treatment of an acute exacerbation of pulmonary disease.</span></td><td data-dcnode-id="1121"><span data-dcnode-id="1122" instrument_node="">Recommendation: B</span></td></tr><tr data-dcnode-id="1091"><td data-dcnode-id="1096"><span data-dcnode-id="1118" instrument_node="">5.&nbsp;Number of antibiotics to treat </span><em data-dcnode-id="1109"><span data-dcnode-id="1111"><cff-tooltip aria-label="Pseudomonas Aeruginosa is a type of bacteria that often lives in the lungs of people with CF and causes lung infections." class="hydrated" data-dcnode-id="1112" lang="" tooltip="Pseudomonas Aeruginosa is a type of bacteria that often lives in the lungs of people with CF and causes lung infections." xml:lang=""><span class="abbr" data-dcnode-id="1113"><slot data-dcnode-id="1116"><span data-dcnode-id="1117" instrument_node="">Pseudomonas</span></slot><span class="tooltip" data-dcnode-id="1114"><span data-dcnode-id="1115" instrument_node="">Pseudomonas Aeruginosa is a type of bacteria that often lives in the lungs of people with CF and causes lung infections.</span></span></span></cff-tooltip></span><span data-dcnode-id="1110" instrument_node=""> aeruginosa</span></em><span data-dcnode-id="1108" instrument_node="">:</span><br data-dcnode-id="1107"><br data-dcnode-id="1106"><span data-dcnode-id="1105" instrument_node="">
			The CF Foundation concludes that there is insufficient evidence to recommend the use of a single </span><span data-dcnode-id="1098"><cff-tooltip aria-label="A drug that kills bacteria or slows bacterial growth. Antibiotics are often used to treat lung infections." class="hydrated" data-dcnode-id="1099" lang="" tooltip="A drug that kills bacteria or slows bacterial growth. Antibiotics are often used to treat lung infections." xml:lang=""><span class="abbr" data-dcnode-id="1100"><slot data-dcnode-id="1103"><span data-dcnode-id="1104" instrument_node="">antibiotic</span></slot><span class="tooltip" data-dcnode-id="1101"><span data-dcnode-id="1102" instrument_node="">A drug that kills bacteria or slows bacterial growth. Antibiotics are often used to treat lung infections.</span></span></span></cff-tooltip></span><span data-dcnode-id="1097" instrument_node=""> as being equivalent to the use of more than one antibiotic class for treatment of a Pseudomonas infection during an acute exacerbation of pulmonary disease.</span></td><td data-dcnode-id="1093"><span data-dcnode-id="1094" instrument_node="">Recommendation: I</span></td></tr><tr data-dcnode-id="1073"><td data-dcnode-id="1078"><span data-dcnode-id="1090" instrument_node="">6.&nbsp;Dosing of antibiotics:</span><br data-dcnode-id="1089"><br data-dcnode-id="1088"><span data-dcnode-id="1087" instrument_node="">
			Aminoglycoside dosing: The CF Foundation recommends that once-daily dosing of </span><span data-dcnode-id="1080"><cff-tooltip aria-label="A group of antibiotics used to treat bacterial infections. Tobramycin and gentamicin are examples of aminoglycosides used in CF treatment." class="hydrated" data-dcnode-id="1081" lang="" tooltip="A group of antibiotics used to treat bacterial infections. Tobramycin and gentamicin are examples of aminoglycosides used in CF treatment." xml:lang=""><span class="abbr" data-dcnode-id="1082"><slot data-dcnode-id="1085"><span data-dcnode-id="1086" instrument_node="">aminoglycosides</span></slot><span class="tooltip" data-dcnode-id="1083"><span data-dcnode-id="1084" instrument_node="">A group of antibiotics used to treat bacterial infections. Tobramycin and gentamicin are examples of aminoglycosides used in CF treatment.</span></span></span></cff-tooltip></span><span data-dcnode-id="1079" instrument_node=""> is preferable to three-times daily dosing for treatment of an acute exacerbation of pulmonary disease.</span></td><td data-dcnode-id="1075"><span data-dcnode-id="1076" instrument_node="">Recommendation: C</span></td></tr><tr data-dcnode-id="1063"><td data-dcnode-id="1068"><span data-dcnode-id="1072" instrument_node="">7.&nbsp;Dosing of antibiotics:</span><br data-dcnode-id="1071"><br data-dcnode-id="1070"><span data-dcnode-id="1069" instrument_node="">
			Beta-lactam (b-lactam) dosing: The CF Foundation concludes that there is insufficient evidence to recommend the continuous infusion of b-lactam antibiotics for treatment of an acute exacerbation of pulmonary disease.</span></td><td data-dcnode-id="1065"><span data-dcnode-id="1066" instrument_node="">Recommendation: I</span></td></tr><tr data-dcnode-id="1053"><td data-dcnode-id="1058"><span data-dcnode-id="1062" instrument_node="">8.&nbsp;Duration of antibiotic treatment:</span><br data-dcnode-id="1061"><br data-dcnode-id="1060"><span data-dcnode-id="1059" instrument_node="">
			The CF Foundation concludes that there is insufficient evidence to recommend an optimal duration of antibiotic treatment of an acute exacerbation of pulmonary disease.</span></td><td data-dcnode-id="1055"><span data-dcnode-id="1056" instrument_node="">Recommendation: I</span></td></tr><tr data-dcnode-id="1035"><td data-dcnode-id="1040"><span data-dcnode-id="1052" instrument_node="">9.&nbsp;Synergy testing:</span><br data-dcnode-id="1051"><br data-dcnode-id="1050"><span data-dcnode-id="1049" instrument_node="">
			The CF Foundation recommends against the use of synergy testing as part of the routine evaluation of the patient with an acute exacerbation of pulmonary disease and multidrug-resistant </span><span data-dcnode-id="1042"><cff-tooltip aria-label="Tiny one-celled creatures that are often the cause of infections. People with CF are prone to bacterial lung infections (often caused by the bacteria Staphylococcus aureus and Pseudomonas aeruginosa). Some bacteria found in the body are helpful. For example, Escherichia coli live in the intestines…" class="hydrated" data-dcnode-id="1043" lang="" tooltip="Tiny one-celled creatures that are often the cause of infections. People with CF are prone to bacterial lung infections (often caused by the bacteria Staphylococcus aureus and Pseudomonas aeruginosa). Some bacteria found in the body are helpful. For example, Escherichia coli live in the intestines…" xml:lang=""><span class="abbr" data-dcnode-id="1044"><slot data-dcnode-id="1047"><span data-dcnode-id="1048" instrument_node="">bacteria</span></slot><span class="tooltip" data-dcnode-id="1045"><span data-dcnode-id="1046" instrument_node="">Tiny one-celled creatures that are often the cause of infections. People with CF are prone to bacterial lung infections (often caused by the bacteria Staphylococcus aureus and Pseudomonas aeruginosa). Some bacteria found in the body are helpful. For example, Escherichia coli live in the intestines…</span></span></span></cff-tooltip></span><span data-dcnode-id="1041" instrument_node="">.</span></td><td data-dcnode-id="1037"><span data-dcnode-id="1038" instrument_node="">Recommendation: D</span></td></tr><tr data-dcnode-id="1025"><td data-dcnode-id="1030"><span data-dcnode-id="1034" instrument_node="">10.&nbsp;Corticosteroids:</span><br data-dcnode-id="1033"><br data-dcnode-id="1032"><span data-dcnode-id="1031" instrument_node="">
			The CF Foundation concludes that there is insufficient evidence to recommend the routine use of corticosteroids in the treatment of an acute exacerbation of pulmonary disease.</span></td><td data-dcnode-id="1027"><span data-dcnode-id="1028" instrument_node="">Recommendation: I</span></td></tr></tbody></table><h2 data-dcnode-id="1021" id="unanswered-questions"><span data-dcnode-id="1022" instrument_node="">Unanswered Questions</span></h2><span data-dcnode-id="1020" instrument_node="">
</span><p data-dcnode-id="1018"><span data-dcnode-id="1019" instrument_node="">The committee identified important questions relevant to pulmonary exacerbation treatment decisions. The systematic review found a lack of high-quality data to address most of these questions, for which additional studies are needed.</span></p><span data-dcnode-id="1017" instrument_node="">
</span><p data-dcnode-id="1015"><span data-dcnode-id="1016" instrument_node="">Since the publication of the 2009 guidelines, there has been some progress in addressing these questions. However, they still do not provide sufficient guidance upon which to suggest a change in the recommendations. For example:</span></p><span data-dcnode-id="1014" instrument_node="">
</span><ul data-dcnode-id="980"><li data-dcnode-id="988"><span data-dcnode-id="1013" instrument_node="">A study of inhaled tobramycin given in conjunction with IV tobramycin found that the timing of the inhaled dose may influence the assessment of </span><span data-dcnode-id="1006"><cff-tooltip aria-label="The way the body absorbs and metabolizes drug." class="hydrated" data-dcnode-id="1007" lang="" tooltip="The way the body absorbs and metabolizes drug." xml:lang=""><span class="abbr" data-dcnode-id="1008"><slot data-dcnode-id="1011"><span data-dcnode-id="1012" instrument_node="">pharmacokinetic</span></slot><span class="tooltip" data-dcnode-id="1009"><span data-dcnode-id="1010" instrument_node="">The way the body absorbs and metabolizes drug.</span></span></span></cff-tooltip></span><span data-dcnode-id="1005" instrument_node=""> parameters, but it did not determine if there was any difference in </span><span data-dcnode-id="998"><cff-tooltip aria-label="The ability of a drug to produce a desired effect." class="hydrated" data-dcnode-id="999" lang="" tooltip="The ability of a drug to produce a desired effect." xml:lang=""><span class="abbr" data-dcnode-id="1000"><slot data-dcnode-id="1003"><span data-dcnode-id="1004" instrument_node="">efficacy</span></slot><span class="tooltip" data-dcnode-id="1001"><span data-dcnode-id="1002" instrument_node="">The ability of a drug to produce a desired effect.</span></span></span></cff-tooltip></span><span data-dcnode-id="997" instrument_node=""> or </span><span data-dcnode-id="990"><cff-tooltip aria-label="In clinical trials, this refers to an absence of harmful side effects resulting from use of the product. Safety may be assessed by special tests and procedures, psychiatric evaluation and/or physical examination of participants." class="hydrated" data-dcnode-id="991" lang="" tooltip="In clinical trials, this refers to an absence of harmful side effects resulting from use of the product. Safety may be assessed by special tests and procedures, psychiatric evaluation and/or physical examination of participants." xml:lang=""><span class="abbr" data-dcnode-id="992"><slot data-dcnode-id="995"><span data-dcnode-id="996" instrument_node="">safety</span></slot><span class="tooltip" data-dcnode-id="993"><span data-dcnode-id="994" instrument_node="">In clinical trials, this refers to an absence of harmful side effects resulting from use of the product. Safety may be assessed by special tests and procedures, psychiatric evaluation and/or physical examination of participants.</span></span></span></cff-tooltip></span><span data-dcnode-id="989" instrument_node="">.</span></li><span data-dcnode-id="987" instrument_node="">
</span><li data-dcnode-id="985"><span data-dcnode-id="986" instrument_node="">An analysis of the CF Foundation Patient Registry revealed that receiving IV antibiotic treatments for less than nine days and receiving IV antibiotics without hospitalization were significant risk factors for IV retreatment within 30 days of completion of an exacerbation treatment. Although this does not answer the question of optimal duration nor best site for treatment, it does suggest that treatment decisions can impact outcomes for pulmonary exacerbations.</span></li><span data-dcnode-id="984" instrument_node="">
</span><li data-dcnode-id="982"><span data-dcnode-id="983" instrument_node="">An analysis of IV antibiotics administered in the hospital versus at home was found to be equivalent in terms of long-term lung function decline and time between PEx. The question of best site of treatment has yet to be answered.</span></li><span data-dcnode-id="981" instrument_node="">
</span></ul><h2 data-dcnode-id="978" id="future-directions"><span data-dcnode-id="979" instrument_node="">Future Directions</span></h2><span data-dcnode-id="977" instrument_node="">
</span><p data-dcnode-id="975"><span data-dcnode-id="976" instrument_node="">The CF Foundation has determined that identifying best practices for the treatment of pulmonary exacerbations is a high priority. They have already supported an observational study, the Standardized Treatment of Pulmonary Exacerbations (STOP) study (clinicaltrials.gov NCT02109822), with the aims of establishing key information needed for the design of interventional trials and clinical equipoise among treating clinicians. The manuscripts reporting the results of this observational study are noted below.</span></p><span data-dcnode-id="974" instrument_node="">
</span><ul data-dcnode-id="964"><li data-dcnode-id="972"><span data-dcnode-id="973" instrument_node="">The first manuscript (Sanders et al. 2017) describes PEx and how patients present (duration of symptoms and mean lung function drop), physician goals for treatment of PEx, and clinical equipoise for future interventional studies of PEx.</span></li><span data-dcnode-id="971" instrument_node="">
</span><li data-dcnode-id="969"><span data-dcnode-id="970" instrument_node="">The second manuscript (West et al. 2017) describes the end of treatment for a PEx, evaluates physician treatment practices, and describes patient outcomes after treatment for the PEx.</span></li><span data-dcnode-id="968" instrument_node="">
</span><li data-dcnode-id="966"><span data-dcnode-id="967" instrument_node="">The third manuscript (VanDevanter et al. 2017) describes the rationalization of clinical endpoints for interventional trials in PEx in CF.</span></li><span data-dcnode-id="965" instrument_node="">
</span></ul><p data-dcnode-id="951"><span data-dcnode-id="963" instrument_node="">These findings helped design the first interventional study, Standardized Treatment of Pulmonary Exacerbations II (</span><a data-dcnode-id="961" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.cff.org/Trials/finder/details/455/STOP-2-Treatment-of-pulmonary-exacerbations-in-people-with-CF"><span data-dcnode-id="962" instrument_node="">STOP 2</span></a><span data-dcnode-id="960" instrument_node="">) study (clinicaltrials.gov NCT02781610), looking at durations of intravenous antibiotic therapy, which is currently underway. There are additional questions that could be addressed once this study is completed. Examples include: timing of initiation of antibiotics, antibiotic selection and dosing to maximize efficacy and reduce </span><span data-dcnode-id="953"><cff-tooltip aria-label="The degree to which a drug is harmful or poisonous. A drug's toxicity will vary depending on amount and use." class="hydrated" data-dcnode-id="954" lang="" tooltip="The degree to which a drug is harmful or poisonous. A drug's toxicity will vary depending on amount and use." xml:lang=""><span class="abbr" data-dcnode-id="955"><slot data-dcnode-id="958"><span data-dcnode-id="959" instrument_node="">toxicity</span></slot><span class="tooltip" data-dcnode-id="956"><span data-dcnode-id="957" instrument_node="">The degree to which a drug is harmful or poisonous. A drug's toxicity will vary depending on amount and use.</span></span></span></cff-tooltip></span><span data-dcnode-id="952" instrument_node="">, and the site of antibiotic delivery (home versus hospital).</span></p><span data-dcnode-id="950" instrument_node="">
</span><ol data-dcnode-id="918"><li data-dcnode-id="948"><span data-dcnode-id="949" instrument_node="">How should we choose initial antibiotic regimens (e.g., selection of antibiotics, doses, delivery method, and duration of infusion)?</span></li><span data-dcnode-id="947" instrument_node="">
</span><li data-dcnode-id="937"><span data-dcnode-id="946" instrument_node="">What is the best method of delivering antibiotics (e.g., topical, </span><span data-dcnode-id="939"><cff-tooltip aria-label="Affecting the body as a whole." class="hydrated" data-dcnode-id="940" lang="" tooltip="Affecting the body as a whole." xml:lang=""><span class="abbr" data-dcnode-id="941"><slot data-dcnode-id="944"><span data-dcnode-id="945" instrument_node="">systemic</span></slot><span class="tooltip" data-dcnode-id="942"><span data-dcnode-id="943" instrument_node="">Affecting the body as a whole.</span></span></span></cff-tooltip></span><span data-dcnode-id="938" instrument_node="">, or both)?</span></li><span data-dcnode-id="936" instrument_node="">
</span><li data-dcnode-id="934"><span data-dcnode-id="935" instrument_node="">Is there a benefit to the use of corticosteroids?</span></li><span data-dcnode-id="933" instrument_node="">
</span><li data-dcnode-id="931"><span data-dcnode-id="932" instrument_node="">Are hospital and home treatment truly equivalent, or does one site result in better outcomes?</span></li><span data-dcnode-id="930" instrument_node="">
</span><li data-dcnode-id="920"><span data-dcnode-id="929" instrument_node="">Are there </span><span data-dcnode-id="922"><cff-tooltip aria-label="A biochemical or a substance in the body that can be used to measure disease activity or effects of treatment." class="hydrated" data-dcnode-id="923" lang="" tooltip="A biochemical or a substance in the body that can be used to measure disease activity or effects of treatment." xml:lang=""><span class="abbr" data-dcnode-id="924"><slot data-dcnode-id="927"><span data-dcnode-id="928" instrument_node="">biomarkers</span></slot><span class="tooltip" data-dcnode-id="925"><span data-dcnode-id="926" instrument_node="">A biochemical or a substance in the body that can be used to measure disease activity or effects of treatment.</span></span></span></cff-tooltip></span><span data-dcnode-id="921" instrument_node=""> that offer prognostic value that would impact treatment decisions?</span></li><span data-dcnode-id="919" instrument_node="">
</span></ol><h2 data-dcnode-id="916" id="further-reading"><span data-dcnode-id="917" instrument_node="">Further Reading</span></h2><span data-dcnode-id="915" instrument_node="">
