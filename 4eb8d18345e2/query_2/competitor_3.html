span data-dcnode-id="7563" instrument_node="">, </span><a aria-expanded="false" class="read-more" data-dcnode-id="7557" href="javascript:void(0)"><span data-dcnode-id="7562" instrument_node=""> </span><span class="ellipsis" data-dcnode-id="7560"><span data-dcnode-id="7561" instrument_node="">…</span></span><span data-dcnode-id="7559" instrument_node=""> See all authors </span><i class="icon-section_arrow_d" data-dcnode-id="7558"></i></a></div><span data-dcnode-id="7555" instrument_node=""> </span></div><span data-dcnode-id="7553" instrument_node=""> </span></div><span data-dcnode-id="7551" instrument_node=""> </span><div class="epub-section" data-dcnode-id="7540"><span class="epub-section__item" data-dcnode-id="7546"><span class="epub-section__state" data-dcnode-id="7549"><span data-dcnode-id="7550" instrument_node="">Originally published</span></span><span class="epub-section__date" data-dcnode-id="7547"><span data-dcnode-id="7548" instrument_node="">8 Apr 2015</span></span></span><span class="epub-section__item" data-dcnode-id="7543"><a class="epub-section__doi__text" data-dcnode-id="7544" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//doi.org/10.1161/CIRCIMAGING.114.002546"><span data-dcnode-id="7545" instrument_node="">https://doi.org/10.1161/CIRCIMAGING.114.002546</span></a></span><span class="epub-section__item" data-dcnode-id="7541"><span data-dcnode-id="7542" instrument_node="">Circulation: Cardiovascular Imaging. 2015;8:e002546</span></span></div><ul class="rlist--inline article__corrections corrections-articles" data-dcnode-id="7539"></ul></div><div class="article__body show-references" data-dcnode-id="5116"><p class="fulltext" data-dcnode-id="7537"></p><div class="hlFld-Abstract" data-dcnode-id="7502"><p class="fulltext" data-dcnode-id="7535"></p><h2 class="article-section__title section__title to-section" data-dcnode-id="7533" id="d10967988e1"><span data-dcnode-id="7534" instrument_node="">Abstract</span></h2><div class="abstractSection abstractInFull" data-dcnode-id="7503"><div class="anchor-spacer" data-dcnode-id="7532" id="acd3e314"></div><h3 class="article-section__title" data-dcnode-id="7530" id="d3e314"><span data-dcnode-id="7531" instrument_node="">Background—</span></h3><p data-dcnode-id="7528"><span data-dcnode-id="7529" instrument_node="">Chronic obstructive pulmonary disease causes significant morbidity and concomitant pulmonary vascular disease and cardiac dysfunction are associated with poor prognosis. Computed tomography–detected relative pulmonary artery (PA) enlargement defined as a PA to ascending aorta diameter ratio &gt;1 (PA:A&gt;1) is a marker for pulmonary hypertension and predicts chronic obstructive pulmonary disease exacerbations. However, little is known about the relationship between the PA:A ratio, pulmonary blood volume, and cardiac function.</span></p><div class="anchor-spacer" data-dcnode-id="7527" id="acd3e320"></div><h3 class="article-section__title" data-dcnode-id="7525" id="d3e320"><span data-dcnode-id="7526" instrument_node="">Methods and Results—</span></h3><p data-dcnode-id="7517"><span data-dcnode-id="7524" instrument_node="">A single-center prospective cohort study of patients with chronic obstructive pulmonary disease was conducted. Clinical characteristics and computed tomography metrics, including the PA:A and pulmonary blood vessel volume, were measured. Ventricular functions, volumes, and dimensions were measured by cine cardiac MRI with 3-dimensional analysis. Linear regression examined the relationships between clinical characteristics, computed tomography and cardiac MRI metrics, and 6-minute walk distance. Twenty-four patients were evaluated and those with PA:A&gt;1 had higher right ventricular (RV) end-diastolic and end-systolic volume indices accompanied by lower RV ejection fraction (52±7% versus 60±9%; </span><i data-dcnode-id="7522"><span data-dcnode-id="7523" instrument_node="">P</span></i><span data-dcnode-id="7521" instrument_node="">=0.04). The PA:A correlated inversely with total intraparenchymal pulmonary blood vessel volume and the volume of distal vessels with a cross-sectional area of &lt;5 mm</span><sup data-dcnode-id="7519"><span data-dcnode-id="7520" instrument_node="">2</span></sup><span data-dcnode-id="7518" instrument_node="">. Lower forced expiratory volume, PA:A&gt;1, and hyperinflation correlated with reduced RV ejection fraction. Both PA diameter and reduced RV ejection fraction were independently associated with reduced 6-minute walk distance.</span></p><div class="anchor-spacer" data-dcnode-id="7516" id="acd3e332"></div><h3 class="article-section__title" data-dcnode-id="7514" id="d3e332"><span data-dcnode-id="7515" instrument_node="">Conclusions—</span></h3><p data-dcnode-id="7512"><span data-dcnode-id="7513" instrument_node="">The loss of blood volume in distal pulmonary vessels is associated with PA enlargement on computed tomography. Cardiac MRI detects early RV dysfunction and remodeling in nonsevere chronic obstructive pulmonary disease patients with a PA:A&gt;1. Both RV dysfunction and PA enlargement are independently associated with reduced walk distance.</span></p><div class="anchor-spacer" data-dcnode-id="7511" id="acd3e338"></div><h3 class="article-section__title" data-dcnode-id="7509" id="d3e338"><span data-dcnode-id="7510" instrument_node="">Clinical Trial Registration—</span></h3><p data-dcnode-id="7504"><span data-dcnode-id="7508" instrument_node="">URL: </span><a class="references__uri" data-dcnode-id="7506" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.clinicaltrials.gov/"><span data-dcnode-id="7507" instrument_node="">http://www.clinicaltrials.gov</span></a><span data-dcnode-id="7505" instrument_node="">. Unique identifier: NCT00608764.</span></p></div></div><div class="hlFld-Fulltext" data-dcnode-id="5132"><div class="anchor-spacer" data-dcnode-id="7499" id="acd3e379"></div><h3 class="article-section__title to-section" data-dcnode-id="7497" id="d3e379"><span data-dcnode-id="7498" instrument_node="">Introduction</span></h3><p data-dcnode-id="7461"><span data-dcnode-id="7496" instrument_node="">Chronic obstructive pulmonary disease (COPD) causes significant morbidity and is a complex disease characterized by airflow limitation, inflammation, and vascular changes.</span><sup data-dcnode-id="7489"><a class="tab-link" data-dcnode-id="7494" data-tab="pane-pcw-references" href="#R1" id="R1R"><span data-dcnode-id="7495" instrument_node="">1</span></a><a class="tab-link" data-dcnode-id="7492" data-tab="pane-pcw-references" href="#R2%20R3" id="R2 R3R"><span data-dcnode-id="7493" instrument_node="">–</span></a><a class="tab-link" data-dcnode-id="7490" data-tab="pane-pcw-references" href="#R4" id="R4R"><span data-dcnode-id="7491" instrument_node="">4</span></a></sup><span data-dcnode-id="7488" instrument_node=""> Functional decline is often associated with concomitant pulmonary hypertension (PH) and right ventricular (RV) dysfunction.</span><sup data-dcnode-id="7478"><a class="tab-link" data-dcnode-id="7486" data-tab="pane-pcw-references" href="#R2" id="R2R"><span data-dcnode-id="7487" instrument_node="">2</span></a><span data-dcnode-id="7485" instrument_node="">,</span><a class="tab-link" data-dcnode-id="7483" data-tab="pane-pcw-references" href="#R5" id="R5R"><span data-dcnode-id="7484" instrument_node="">5</span></a><a class="tab-link" data-dcnode-id="7481" data-tab="pane-pcw-references" href="#R6%20R7%20R8%20R9" id="R6 R7 R8 R9R"><span data-dcnode-id="7482" instrument_node="">–</span></a><a class="tab-link" data-dcnode-id="7479" data-tab="pane-pcw-references" href="#R10" id="R10R"><span data-dcnode-id="7480" instrument_node="">10</span></a></sup><span data-dcnode-id="7477" instrument_node=""> Cardiac MRI (cMRI) is the gold standard for the assessment of both the morphological and functional characteristics of the RV particularly in patients with COPD in whom echocardiographic assessment is often not possible.</span><sup data-dcnode-id="7470"><a class="tab-link" data-dcnode-id="7475" data-tab="pane-pcw-references" href="#R11" id="R11R"><span data-dcnode-id="7476" instrument_node="">11</span></a><a class="tab-link" data-dcnode-id="7473" data-tab="pane-pcw-references" href="#R12%20R13" id="R12 R13R"><span data-dcnode-id="7474" instrument_node="">–</span></a><a class="tab-link" data-dcnode-id="7471" data-tab="pane-pcw-references" href="#R14" id="R14R"><span data-dcnode-id="7472" instrument_node="">14</span></a></sup><span data-dcnode-id="7469" instrument_node=""> Furthermore, cMRI has been used to demonstrate a relationship between progressive airflow obstruction and computed tomography (CT)–detected emphysema and impaired left ventricular (LV) filling, stroke volume (SV), and RV hypertrophy.</span><sup data-dcnode-id="7462"><a class="tab-link" data-dcnode-id="7467" data-tab="pane-pcw-references" href="#R15" id="R15R"><span data-dcnode-id="7468" instrument_node="">15</span></a><a class="tab-link" data-dcnode-id="7465" data-tab="pane-pcw-references" href="#R16%20R17%20R18%20R19" id="R16 R17 R18 R19R"><span data-dcnode-id="7466" instrument_node="">–</span></a><a class="tab-link" data-dcnode-id="7463" data-tab="pane-pcw-references" href="#R20" id="R20R"><span data-dcnode-id="7464" instrument_node="">20</span></a></sup></p><p data-dcnode-id="7456"><strong data-dcnode-id="7457"><span data-dcnode-id="7460" instrument_node="">See </span><a class="ref sec" data-dcnode-id="7458" href="javascript:popRef('s1')" id="s1"><span data-dcnode-id="7459" instrument_node="">Clinical Perspective</span></a></strong></p><p data-dcnode-id="7436"><span data-dcnode-id="7455" instrument_node="">CT-measured relative pulmonary artery (PA) enlargement defined by a PA to ascending aorta (A) diameter ratio &gt;1 (PA:A&gt;1) aids in predicting COPD exacerbations in moderate-to-severe COPD and is a strong predictor of PH in those with severe disease.</span><sup data-dcnode-id="7449"><a class="tab-link" data-dcnode-id="7453" data-tab="pane-pcw-references" href="#R1" id="R1R"><span data-dcnode-id="7454" instrument_node="">1</span></a><span data-dcnode-id="7452" instrument_node="">,</span><a class="tab-link" data-dcnode-id="7450" data-tab="pane-pcw-references" href="#R2" id="R2R"><span data-dcnode-id="7451" instrument_node="">2</span></a></sup><span data-dcnode-id="7448" instrument_node=""> However, even in severe COPD, relative PA enlargement is only partially explained by overt PH</span><sup data-dcnode-id="7445"><a class="tab-link" data-dcnode-id="7446" data-tab="pane-pcw-references" href="#R2" id="R2R"><span data-dcnode-id="7447" instrument_node="">2</span></a></sup><span data-dcnode-id="7444" instrument_node=""> and other factors may play a role including hyperinflation because of emphysema, reduced cross-sectional area of small pulmonary blood vessels, and cardiac dysfunction.</span><sup data-dcnode-id="7438"><a class="tab-link" data-dcnode-id="7442" data-tab="pane-pcw-references" href="#R2" id="R2R"><span data-dcnode-id="7443" instrument_node="">2</span></a><span data-dcnode-id="7441" instrument_node="">,</span><a class="tab-link" data-dcnode-id="7439" data-tab="pane-pcw-references" href="#R3" id="R3R"><span data-dcnode-id="7440" instrument_node="">3</span></a></sup><span data-dcnode-id="7437" instrument_node=""> In addition, little is known about the relationship between the PA:A ratio and cardiac structure and function in mild-to-moderate COPD. We hypothesized that PA enlargement (PA:A&gt;1) is associated with distal pruning of small pulmonary blood vessels and that these vascular derangements would have direct impact on RV structure and function as detected by cMRI as well as with reduced exercise tolerance.</span></p><div class="anchor-spacer" data-dcnode-id="7435" id="acd3e444"></div><h3 class="article-section__title to-section" data-dcnode-id="7433" id="d3e444"><span data-dcnode-id="7434" instrument_node="">Methods</span></h3><p data-dcnode-id="7413"><span data-dcnode-id="7432" instrument_node="">The University of Alabama at Birmingham is one of the 21 participating clinical centers for the COPDGene trial,</span><sup data-dcnode-id="7429"><a class="tab-link" data-dcnode-id="7430" data-tab="pane-pcw-references" href="#R21" id="R21R"><span data-dcnode-id="7431" instrument_node="">21</span></a></sup><span data-dcnode-id="7428" instrument_node=""> a multi-center, longitudinal cohort designed to evaluate the underlying genetic factors, clinical information, and radiological data for patients with COPD. The University of Alabama at Birmingham recruited 405 of the 10 500 subjects enrolled in the parent trial. From these subjects, 129 met inclusion criteria. Forty-four participants were contacted for enrollment in the current prospective cohort to evaluate the relationship between pulmonary vascular disease, cardiac MRI, and COPD in subjects without known cardiac or pulmonary vascular disease. Subjects with a forced expiratory volume in 1 second (FEV</span><sub data-dcnode-id="7426"><span data-dcnode-id="7427" instrument_node="">1</span></sub><span data-dcnode-id="7425" instrument_node="">)/forced vital capacity ratio &gt;0.7, known ischemic heart disease, congestive heart failure, structural heart disease (including intracardiac shunts), PH, prior thromboembolic disease, cerebrovascular disease, peripheral arterial disease, known malignancy, or inability to undergo MRI were excluded (Figure in the Data Supplement). Baseline demographic information, pulmonary function testing,</span><sup data-dcnode-id="7419"><a class="tab-link" data-dcnode-id="7423" data-tab="pane-pcw-references" href="#R22" id="R22R"><span data-dcnode-id="7424" instrument_node="">22</span></a><span data-dcnode-id="7422" instrument_node="">,</span><a class="tab-link" data-dcnode-id="7420" data-tab="pane-pcw-references" href="#R23" id="R23R"><span data-dcnode-id="7421" instrument_node="">23</span></a></sup><span data-dcnode-id="7418" instrument_node=""> and 6-minute walk distance (6MWD) were collected.</span><sup data-dcnode-id="7415"><a class="tab-link" data-dcnode-id="7416" data-tab="pane-pcw-references" href="#R24" id="R24R"><span data-dcnode-id="7417" instrument_node="">24</span></a></sup><span data-dcnode-id="7414" instrument_node=""> All subjects underwent CT and cMRI at our institution. The study was approved by the University of Alabama at Birmingham Institutional Review Board at University of Alabama at Birmingham (X110809004) and all subjects gave informed consent. The parent study, COPDGene (ClinicalTrials.gov identifier # NCT00608764) was approved by the institutional review board at all institutions.</span></p><div class="anchor-spacer" data-dcnode-id="7412" id="acd3e467"></div><h4 class="article-section__title" data-dcnode-id="7410" id="d3e467"><span data-dcnode-id="7411" instrument_node="">CT Measurement of the PA:A Ratio, Cross-Sectional Area of the Pulmonary Vessels, Percent Emphysema, and Percent Gas Trapping</span></h4><p data-dcnode-id="7358"><span data-dcnode-id="7409" instrument_node="">One reviewer blinded to cMRI and baseline data measured the PA and A ratios at the bifurcation of the PA using Philips iSite Enterprise Software (Koninklijke Philips N.V.) as previously detailed (</span><a class="" data-dcnode-id="7407" data-tab="pane-pcw-Figures" href="#F1" id="F1R"><span data-dcnode-id="7408" instrument_node="">Figure 1A</span></a><span data-dcnode-id="7406" instrument_node=""> and </span><a class="" data-dcnode-id="7404" data-tab="pane-pcw-Figures" href="#F1" id="F1R"><span data-dcnode-id="7405" instrument_node="">1B</span></a><span data-dcnode-id="7403" instrument_node="">).</span><sup data-dcnode-id="7397"><a class="tab-link" data-dcnode-id="7401" data-tab="pane-pcw-references" href="#R1" id="R1R"><span data-dcnode-id="7402" instrument_node="">1</span></a><span data-dcnode-id="7400" instrument_node="">,</span><a class="tab-link" data-dcnode-id="7398" data-tab="pane-pcw-references" href="#R2" id="R2R"><span data-dcnode-id="7399" instrument_node="">2</span></a></sup><span data-dcnode-id="7396" instrument_node=""> Separate blinded investigators measured cross-sectional area of the pulmonary vessels using volumetric chest CT scans performed at maximal inflation.</span><sup data-dcnode-id="7393"><a class="tab-link" data-dcnode-id="7394" data-tab="pane-pcw-references" href="#R3" id="R3R"><span data-dcnode-id="7395" instrument_node="">3</span></a></sup><span data-dcnode-id="7392" instrument_node=""> Briefly, Airway Inspector (</span><a class="references__uri" data-dcnode-id="7390" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.ahajournals.org/doi/10.1161/www.AirwayInspector.org"><span data-dcnode-id="7391" instrument_node="">www.AirwayInspector.org</span></a><span data-dcnode-id="7389" instrument_node="">) was used to measure emphysema and perform lung lobe segmentation.</span><sup data-dcnode-id="7383"><a class="tab-link" data-dcnode-id="7387" data-tab="pane-pcw-references" href="#R25" id="R25R"><span data-dcnode-id="7388" instrument_node="">25</span></a><span data-dcnode-id="7386" instrument_node="">,</span><a class="tab-link" data-dcnode-id="7384" data-tab="pane-pcw-references" href="#R26" id="R26R"><span data-dcnode-id="7385" instrument_node="">26</span></a></sup><span data-dcnode-id="7382" instrument_node=""> With in-house software we segmented the pulmonary vasculature from the parenchyma and assessed total intraparenchymal blood vessel volume (TBV) in the combined intraparenchymal pulmonary arteries and veins and aggregate blood vessel volume in vessels &lt;5 mm</span><sup data-dcnode-id="7380"><span data-dcnode-id="7381" instrument_node="">2</span></sup><span data-dcnode-id="7379" instrument_node=""> in cross-section (BV5) for the whole lung using previously reported derivation equations.</span><sup data-dcnode-id="7376"><a class="tab-link" data-dcnode-id="7377" data-tab="pane-pcw-references" href="#R27" id="R27R"><span data-dcnode-id="7378" instrument_node="">27</span></a></sup><span data-dcnode-id="7375" instrument_node=""> Full methods of this technique are included in the Data Supplement. Vessels that have a cross-sectional area of &lt;100 mm (≈5 mm radius) are used in calculating TBV. These vessels are measured after the first or second branch point of the pulmonary arteries/veins and most of their length are intraparenchymal. Most of the volume comes from vessels distal to these, and they do not contribute significantly to the measurement of TBV. We calculated the ratio of BV5 to TBV to account for inherent anatomic variability in blood vessel volumes with height as previously described (</span><a class="" data-dcnode-id="7373" data-tab="pane-pcw-Figures" href="#F1" id="F1R"><span data-dcnode-id="7374" instrument_node="">Figure 1C</span></a><span data-dcnode-id="7372" instrument_node=""> and </span><a class="" data-dcnode-id="7370" data-tab="pane-pcw-Figures" href="#F1" id="F1R"><span data-dcnode-id="7371" instrument_node="">1D</span></a><span data-dcnode-id="7369" instrument_node="">).</span><sup data-dcnode-id="7366"><a class="tab-link" data-dcnode-id="7367" data-tab="pane-pcw-references" href="#R3" id="R3R"><span data-dcnode-id="7368" instrument_node="">3</span></a></sup><span data-dcnode-id="7365" instrument_node=""> The loss of blood vessel volume represents both vascular destruction as well as vasoconstriction. Analysis of the lung parenchyma and airways was performed on volumetric CT scans of the chest obtained without the administration of contrast material. Parenchymal analysis was performed with the use of the Slicer software package (</span><a class="references__uri" data-dcnode-id="7363" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.ahajournals.org/doi/10.1161/www.Slicer.org"><span data-dcnode-id="7364" instrument_node="">www.Slicer.org</span></a><span data-dcnode-id="7362" instrument_node="">), and airway analysis was performed with the use of Volumetric Information Display and Analysis Pulmonary Workstation 2 software (</span><a class="references__uri" data-dcnode-id="7360" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.ahajournals.org/doi/10.1161/www.vidadiagnostics.com"><span data-dcnode-id="7361" instrument_node="">www.vidadiagnostics.com</span></a><span data-dcnode-id="7359" instrument_node="">). Emphysema was defined by a CT attenuation value of less than −950 Hounsfield units on inspiratory scans obtained at maximal inspiration (total lung capacity) and gas trapping was defined by a CT attenuation of less than −856 Hounsfield units on expiratory scans obtained at end-tidal expiration (functional residual capacity). Inspiratory capacity was defined as the difference between total lung capacity and functional residual capacity.</span></p><figure class="article__inlineFigure" data-dcnode-id="7314" id="F1"><img alt="Figure 1." class="figure__image" data-dcnode-id="7357" data-lg-src="/cms/asset/e7f32def-4de0-4165-8443-40a861b05480/e002546fig01.jpg" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.ahajournals.org/cms/asset/f94c3794-bf82-4d82-a743-929f2eaf87bf/e002546fig01.jpg&amp;raw"><div class="figure-links" data-dcnode-id="7349"><ul class="rlist--inline" data-dcnode-id="7350"><li data-dcnode-id="7354"><a data-dcnode-id="7355" download="" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.ahajournals.org/cms/asset/6cb637a1-b95f-4b4a-b1fa-6b222f4a5179/e002546fig01.jpeg"><span data-dcnode-id="7356" instrument_node="">Download figure</span></a></li><li data-dcnode-id="7351"><a class="ppt-figure-link" data-dcnode-id="7352" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.ahajournals.org/action/downloadFigures%3Fid%3DF1%26doi%3D10.1161%252FCIRCIMAGING.114.002546"><span data-dcnode-id="7353" instrument_node="">Download PowerPoint</span></a></li></ul></div><figcaption data-dcnode-id="7315"><strong data-dcnode-id="7348"></strong><span class="figure__caption" data-dcnode-id="7316"><p data-dcnode-id="7317"><strong class="captionLabel" data-dcnode-id="7346"><span data-dcnode-id="7347" instrument_node="">Figure 1.</span></strong><span data-dcnode-id="7345" instrument_node=""> Pulmonary artery (PA) enlargement is related to loss of blood volume in small intraparenchymal vessels. </span><strong data-dcnode-id="7343"><span data-dcnode-id="7344" instrument_node="">A</span></strong><span data-dcnode-id="7342" instrument_node=""> and </span><strong data-dcnode-id="7340"><span data-dcnode-id="7341" instrument_node="">C</span></strong><span data-dcnode-id="7339" instrument_node="">, Representative images from a patient with a PA:aorta (A) ratio &lt;1 and minimal loss of blood volume in small intraparenchymal blood vessels. </span><strong data-dcnode-id="7337"><span data-dcnode-id="7338" instrument_node="">B</span></strong><span data-dcnode-id="7336" instrument_node=""> and </span><strong data-dcnode-id="7334"><span data-dcnode-id="7335" instrument_node="">D</span></strong><span data-dcnode-id="7333" instrument_node="">, Images taken from a patient with a PA:A ratio &gt;1 and extensive pruning of the small intraparenchymal vasculature. </span><strong data-dcnode-id="7331"><span data-dcnode-id="7332" instrument_node="">A</span></strong><span data-dcnode-id="7330" instrument_node=""> and </span><strong data-dcnode-id="7328"><span data-dcnode-id="7329" instrument_node="">B</span></strong><span data-dcnode-id="7327" instrument_node="">, Axial images of the PA and ascending A taken at the level of the PA bifurcation. </span><strong data-dcnode-id="7325"><span data-dcnode-id="7326" instrument_node="">C</span></strong><span data-dcnode-id="7324" instrument_node=""> and </span><strong data-dcnode-id="7322"><span data-dcnode-id="7323" instrument_node="">D</span></strong><span data-dcnode-id="7321" instrument_node="">, Image reconstructions of the intrapulmonary blood volume (pulmonary blood vessel volume in vessels &lt;5 mm</span><sup data-dcnode-id="7319"><span data-dcnode-id="7320" instrument_node="">2</span></sup><span data-dcnode-id="7318" instrument_node="">/total intraparenchymal blood vessel volume).</span></p></span></figcaption></figure><div class="anchor-spacer" data-dcnode-id="7313" id="acd3e562"></div><h4 class="article-section__title" data-dcnode-id="7311" id="d3e562"><span data-dcnode-id="7312" instrument_node="">Measurement of Cardiac Function and Dimensions by cMRI</span></h4><p data-dcnode-id="7306"><span data-dcnode-id="7310" instrument_node="">All subjects underwent a 1.5 T scanner (Signa CV/i, GE Healthcare, Milwaukee, WI) using a phased array cardiac coil. Prospective electrocardiographic triggering with retrospective gating was used. Steady-state–free precession technique that provides maximal contrast between the myocardium and the blood pool was used in all cases. Typical imaging parameters were field of view 36 to 44 cm, flip angle of 35 to 45 degrees, matrix size 256 in frequency domain and 128 to 256 in the phase domain, relaxation time of 3.7 to 4.1 ms, and echo time 1.5 to 1.7 ms. All studies had horizontal long-axis cine views that were obtained in the usual manner. The end-diastolic (ED) horizontal long-axis image provided the reference from which a stack of contiguous short-axis slices of 8-mm thickness and 0-mm gap was obtained. LV and RV ejection fraction (EF), ED and end-systolic (ES) volume indices (VI), ED and ES mass indices (MI), SV, and remodeling indices were measured as previously reported.</span><sup data-dcnode-id="7307"><a class="tab-link" data-dcnode-id="7308" data-tab="pane-pcw-references" href="#R28" id="R28R"><span data-dcnode-id="7309" instrument_node="">28</span></a></sup></p><div class="anchor-spacer" data-dcnode-id="7305" id="acd3e570"></div><h4 class="article-section__title" data-dcnode-id="7303" id="d3e570"><span data-dcnode-id="7304" instrument_node="">Statistical Analysis</span></h4><p data-dcnode-id="7288"><span data-dcnode-id="7302" instrument_node="">We expressed baseline data as mean values with SD for normally distributed values or median with interquartile range for non-normally distributed values and compared continuous variables using 2-sided Student </span><i data-dcnode-id="7300"><span data-dcnode-id="7301" instrument_node="">t</span></i><span data-dcnode-id="7299" instrument_node=""> tests or Mann–Whitney </span><i data-dcnode-id="7297"><span data-dcnode-id="7298" instrument_node="">U</span></i><span data-dcnode-id="7296" instrument_node=""> tests as appropriate. We used the Shapiro–Wilk test to determine normality for continuous variables. We examined categorical variables by Fisher exact test. Subjects were grouped based on the presence or absence of a PA:A ratio &gt;1 given the clinical importance of PA enlargement and severe COPD exacerbations.</span><sup data-dcnode-id="7293"><a class="tab-link" data-dcnode-id="7294" data-tab="pane-pcw-references" href="#R1" id="R1R"><span data-dcnode-id="7295" instrument_node="">1</span></a></sup><span data-dcnode-id="7292" instrument_node=""> Pearson correlation coefficients were calculated to determine the associations between CT metrics, measurements of cardiac function by cMRI, and 6MWD. We used SPSS for Windows Version 20 for all analyses. Statistical tests were 2-sided, and significance was assigned to tests with </span><i data-dcnode-id="7290"><span data-dcnode-id="7291" instrument_node="">P</span></i><span data-dcnode-id="7289" instrument_node=""> values of &lt;0.05.</span></p><div class="anchor-spacer" data-dcnode-id="7287" id="acd3e589"></div><h3 class="article-section__title to-section" data-dcnode-id="7285" id="d3e589"><span data-dcnode-id="7286" instrument_node="">Results</span></h3><div class="anchor-spacer" data-dcnode-id="7284" id="acd3e592"></div><h4 class="article-section__title" data-dcnode-id="7282" id="d3e592"><span data-dcnode-id="7283" instrument_node="">Baseline Characteristics</span></h4><p data-dcnode-id="7252"><span data-dcnode-id="7281" instrument_node="">Twenty-four patients underwent cMRI and CT scans and their mean age was 60±8 years with 14 (58%) non-Hispanic white and 16 (67%) male participants (</span><a class="ref showTableEvent" data-dcnode-id="7279" data-id="T1" href="#T1"><span data-dcnode-id="7280" instrument_node="">Table 1</span></a><span data-dcnode-id="7278" instrument_node="">). The subjects studied did not differ significantly from those who were not contacted with respect to demographic characteristics and lung function. The average postbronchodilator FEV</span><sub data-dcnode-id="7276"><span data-dcnode-id="7277" instrument_node="">1</span></sub><span data-dcnode-id="7275" instrument_node=""> was 57±27% predicted. Patients were separated into cohorts based on the presence or absence of a PA:A ratio &gt;1 on CT scan, with 17 patients having a PA:A≤1 and 7 a PA:A&gt;1. The PA:A&gt;1 group had higher body mass index (33±6 versus 27±6 kg/m</span><sup data-dcnode-id="7273"><span data-dcnode-id="7274" instrument_node="">2</span></sup><span data-dcnode-id="7272" instrument_node="">; </span><i data-dcnode-id="7270"><span data-dcnode-id="7271" instrument_node="">P</span></i><span data-dcnode-id="7269" instrument_node="">=0.03) and body surface area (2.15±0.20 versus 1.93±0.19 m</span><sup data-dcnode-id="7267"><span data-dcnode-id="7268" instrument_node="">2</span></sup><span data-dcnode-id="7266" instrument_node="">; </span><i data-dcnode-id="7264"><span data-dcnode-id="7265" instrument_node="">P</span></i><span data-dcnode-id="7263" instrument_node="">=0.02) as we previously reported in the parent study.</span><sup data-dcnode-id="7260"><a class="tab-link" data-dcnode-id="7261" data-tab="pane-pcw-references" href="#R1" id="R1R"><span data-dcnode-id="7262" instrument_node="">1</span></a></sup><span data-dcnode-id="7259" instrument_node=""> Those with a PA:A&gt;1 had higher resting heart rate (93±12 versus 77±12; </span><i data-dcnode-id="7257"><span data-dcnode-id="7258" instrument_node="">P</span></i><span data-dcnode-id="7256" instrument_node="">=0.02) without any differences in blood pressure. Subjects in the PA:A&gt;1 group had lower forced vital capacity (72±14% versus 89±18% predicted; </span><i data-dcnode-id="7254"><span data-dcnode-id="7255" instrument_node="">P</span></i><span data-dcnode-id="7253" instrument_node="">=0.04), but otherwise had no statistical differences on pulmonary function testing. Both the PA:A≤1 and PA:A&gt;1 groups had comparable gas trapping and emphysema by CT.</span></p><div class="anchor-spacer" data-dcnode-id="7251" id="T1"></div><div class="article-table-content" data-dcnode-id="6988" id="T1"><table class="table article-section__table" data-dcnode-id="6999"><caption data-dcnode-id="7245"><strong data-dcnode-id="7246"><p data-dcnode-id="7247"><strong class="captionLabel" data-dcnode-id="7249"><span data-dcnode-id="7250" instrument_node="">Table 1.</span></strong><span data-dcnode-id="7248" instrument_node=""> Baseline Characteristics</span></p></strong></caption><thead data-dcnode-id="7231"><tr data-dcnode-id="7232"><th align="left" colspan="1" data-dcnode-id="7243" rowspan="1"><span data-dcnode-id="7244" instrument_node="">Variable</span></th><th align="center" colspan="1" data-dcnode-id="7241" rowspan="1"><span data-dcnode-id="7242" instrument_node="">Entire Cohort (n=24)</span></th><th align="center" colspan="1" data-dcnode-id="7239" rowspan="1"><span data-dcnode-id="7240" instrument_node="">PA:A&lt;1 (n=17)</span></th><th align="center" colspan="1" data-dcnode-id="7237" rowspan="1"><span data-dcnode-id="7238" instrument_node="">PA:A&gt;1 (n=7)</span></th><th align="center" colspan="1" data-dcnode-id="7233" rowspan="1"><i data-dcnode-id="7235"><span data-dcnode-id="7236" instrument_node="">P</span></i><span data-dcnode-id="7234" instrument_node=""> Value</span></th></tr></thead><tbody data-dcnode-id="7000"><tr data-dcnode-id="7220"><td align="left" colspan="1" data-dcnode-id="7229" rowspan="1"><span data-dcnode-id="7230" instrument_node="">Age, years</span></td><td align="center" colspan="1" data-dcnode-id="7227" rowspan="1"><span data-dcnode-id="7228" instrument_node="">59±9</span></td><td align="center" colspan="1" data-dcnode-id="7225" rowspan="1"><span data-dcnode-id="7226" instrument_node="">61±10</span></td><td align="center" colspan="1" data-dcnode-id="7223" rowspan="1"><span data-dcnode-id="7224" instrument_node="">60±6</span></td><td align="center" colspan="1" data-dcnode-id="7221" rowspan="1"><span data-dcnode-id="7222" instrument_node="">0.84</span></td></tr><tr data-dcnode-id="7209"><td align="left" colspan="1" data-dcnode-id="7218" rowspan="1"><span data-dcnode-id="7219" instrument_node="">White race</span></td><td align="center" colspan="1" data-dcnode-id="7216" rowspan="1"><span data-dcnode-id="7217" instrument_node="">14 (58%)</span></td><td align="center" colspan="1" data-dcnode-id="7214" rowspan="1"><span data-dcnode-id="7215" instrument_node="">11 (65%)</span></td><td align="center" colspan="1" data-dcnode-id="7212" rowspan="1"><span data-dcnode-id="7213" instrument_node="">3 (43%)</span></td><td align="center" colspan="1" data-dcnode-id="7210" rowspan="1"><span data-dcnode-id="7211" instrument_node="">0.35</span></td></tr><tr data-dcnode-id="7198"><td align="left" colspan="1" data-dcnode-id="7207" rowspan="1"><span data-dcnode-id="7208" instrument_node="">Male sex</span></td><td align="center" colspan="1" data-dcnode-id="7205" rowspan="1"><span data-dcnode-id="7206" instrument_node="">16 (67%)</span></td><td align="center" colspan="1" data-dcnode-id="7203" rowspan="1"><span data-dcnode-id="7204" instrument_node="">12 (71%)</span></td><td align="center" colspan="1" data-dcnode-id="7201" rowspan="1"><span data-dcnode-id="7202" instrument_node="">4 (57%)</span></td><td align="center" colspan="1" data-dcnode-id="7199" rowspan="1"><span data-dcnode-id="7200" instrument_node="">0.55</span></td></tr><tr data-dcnode-id="7185"><td align="left" colspan="1" data-dcnode-id="7194" rowspan="1"><span data-dcnode-id="7197" instrument_node="">BMI, kg/m</span><sup data-dcnode-id="7195"><span data-dcnode-id="7196" instrument_node="">2</span></sup></td><td align="center" colspan="1" data-dcnode-id="7192" rowspan="1"><span data-dcnode-id="7193" instrument_node="">29±8</span></td><td align="center" colspan="1" data-dcnode-id="7190" rowspan="1"><span data-dcnode-id="7191" instrument_node="">27±8</span></td><td align="center" colspan="1" data-dcnode-id="7188" rowspan="1"><span data-dcnode-id="7189" instrument_node="">33±6</span></td><td align="center" colspan="1" data-dcnode-id="7186" rowspan="1"><span data-dcnode-id="7187" instrument_node="">0.03</span></td></tr><tr data-dcnode-id="7172"><td align="left" colspan="1" data-dcnode-id="7181" rowspan="1"><span data-dcnode-id="7184" instrument_node="">BSA, m</span><sup data-dcnode-id="7182"><span data-dcnode-id="7183" instrument_node="">2</span></sup></td><td align="center" colspan="1" data-dcnode-id="7179" rowspan="1"><span data-dcnode-id="7180" instrument_node="">1.99±0.22</span></td><td align="center" colspan="1" data-dcnode-id="7177" rowspan="1"><span data-dcnode-id="7178" instrument_node="">1.93±0.19</span></td><td align="center" colspan="1" data-dcnode-id="7175" rowspan="1"><span data-dcnode-id="7176" instrument_node="">2.15±0.20</span></td><td align="center" colspan="1" data-dcnode-id="7173" rowspan="1"><span data-dcnode-id="7174" instrument_node="">0.02</span></td></tr><tr data-dcnode-id="7161"><td align="left" colspan="1" data-dcnode-id="7170" rowspan="1"><span data-dcnode-id="7171" instrument_node="">Systolic BP, mm Hg</span></td><td align="center" colspan="1" data-dcnode-id="7168" rowspan="1"><span data-dcnode-id="7169" instrument_node="">126 [31]</span></td><td align="center" colspan="1" data-dcnode-id="7166" rowspan="1"><span data-dcnode-id="7167" instrument_node="">130 strument_node="">3.25±0.54</span></td><td align="center" colspan="1" data-dcnode-id="7035" rowspan="1"><span data-dcnode-id="7036" instrument_node="">0.75</span></td></tr><tr data-dcnode-id="7023"><td align="left" colspan="1" data-dcnode-id="7032" rowspan="1"><span data-dcnode-id="7033" instrument_node="">TBV, mL</span></td><td align="center" colspan="1" data-dcnode-id="7030" rowspan="1"><span data-dcnode-id="7031" instrument_node="">268.0±54.6</span></td><td align="center" colspan="1" data-dcnode-id="7028" rowspan="1"><span data-dcnode-id="7029" instrument_node="">273.8±54.7</span></td><td align="center" colspan="1" data-dcnode-id="7026" rowspan="1"><span data-dcnode-id="7027" instrument_node="">253.7±55.8</span></td><td align="center" colspan="1" data-dcnode-id="7024" rowspan="1"><span data-dcnode-id="7025" instrument_node="">0.43</span></td></tr><tr data-dcnode-id="7012"><td align="left" colspan="1" data-dcnode-id="7021" rowspan="1"><span data-dcnode-id="7022" instrument_node="">BV5, mL</span></td><td align="center" colspan="1" data-dcnode-id="7019" rowspan="1"><span data-dcnode-id="7020" instrument_node="">144.7±25.6</span></td><td align="center" colspan="1" data-dcnode-id="7017" rowspan="1"><span data-dcnode-id="7018" instrument_node="">150.7±25.1</span></td><td align="center" colspan="1" data-dcnode-id="7015" rowspan="1"><span data-dcnode-id="7016" instrument_node="">130.3±21.9</span></td><td align="center" colspan="1" data-dcnode-id="7013" rowspan="1"><span data-dcnode-id="7014" instrument_node="">0.07</span></td></tr><tr data-dcnode-id="7001"><td align="left" colspan="1" data-dcnode-id="7010" rowspan="1"><span data-dcnode-id="7011" instrument_node="">BV5/TBV ratio</span></td><td align="center" colspan="1" data-dcnode-id="7008" rowspan="1"><span data-dcnode-id="7009" instrument_node="">0.57±0.06</span></td><td align="center" colspan="1" data-dcnode-id="7006" rowspan="1"><span data-dcnode-id="7007" instrument_node="">0.56±0.06</span></td><td align="center" colspan="1" data-dcnode-id="7004" rowspan="1"><span data-dcnode-id="7005" instrument_node="">0.52±0.06</span></td><td align="center" colspan="1" data-dcnode-id="7002" rowspan="1"><span data-dcnode-id="7003" instrument_node="">0.18</span></td></tr></tbody></table><div class="tableFooter" data-dcnode-id="6989"><div class="footnote" data-dcnode-id="6990"><p data-dcnode-id="6991"><span data-dcnode-id="6998" instrument_node="">Data are presented as n (%), mean (±SD), or median [interquartile range]. A indicates aorta; BMI, body mass index; BP, blood pressure; BSA, body surface area; BV5, pulmonary blood vessel volume in vessels &lt;5 mm</span><sup data-dcnode-id="6996"><span data-dcnode-id="6997" instrument_node="">2</span></sup><span data-dcnode-id="6995" instrument_node="">; FEV</span><sub data-dcnode-id="6993"><span data-dcnode-id="6994" instrument_node="">1</span></sub><span data-dcnode-id="6992" instrument_node="">, forced expiratory volume in 1 second; FVC, forced vital capacity; IC, inspiratory capacity; PA, pulmonary artery; TBV, total intraparenchymal blood vessel volume; and TLC, total lung capacity.</span></p></div></div></div><div class="anchor-spacer" data-dcnode-id="6987" id="acd3e1048"></div><h4 class="article-section__title" data-dcnode-id="6985" id="d3e1048"><span data-dcnode-id="6986" instrument_node="">Loss of Blood Volume in Small Intraparenchymal Vessels</span></h4><p data-dcnode-id="6926"><span data-dcnode-id="6984" instrument_node="">The PA:A&gt;1 group had lower BV5 (130.3±21.9 versus 150.7±25.1 mL; </span><i data-dcnode-id="6982"><span data-dcnode-id="6983" instrument_node="">P</span></i><span data-dcnode-id="6981" instrument_node="">=0.07) and TBV (253.7±55.9 versus 273.8±54.7 mL; </span><i data-dcnode-id="6979"><span data-dcnode-id="6980" instrument_node="">P</span></i><span data-dcnode-id="6978" instrument_node="">=0.43) compared with those with PA:A≤1, although these differences did not reach statistical significance. Furthermore, as seen in </span><a class="" data-dcnode-id="6976" data-tab="pane-pcw-Figures" href="#F2" id="F2R"><span data-dcnode-id="6977" instrument_node="">Figure 2</span></a><span data-dcnode-id="6975" instrument_node="">, the PA:A ratio correlated inversely with BV5 (</span><i data-dcnode-id="6973"><span data-dcnode-id="6974" instrument_node="">r</span></i><span data-dcnode-id="6972" instrument_node="">=−0.48; </span><i data-dcnode-id="6970"><span data-dcnode-id="6971" instrument_node="">P</span></i><span data-dcnode-id="6969" instrument_node="">=0.017) and TBV (</span><i data-dcnode-id="6967"><span data-dcnode-id="6968" instrument_node="">r</span></i><span data-dcnode-id="6966" instrument_node="">=−0.37; </span><i data-dcnode-id="6964"><span data-dcnode-id="6965" instrument_node="">P</span></i><span data-dcnode-id="6963" instrument_node="">=0.07) and, but not BV5/TBV (</span><i data-dcnode-id="6961"><span data-dcnode-id="6962" instrument_node="">r</span></i><span data-dcnode-id="6960" instrument_node="">=−0.13; </span><i data-dcnode-id="6958"><span data-dcnode-id="6959" instrument_node="">P</span></i><span data-dcnode-id="6957" instrument_node="">=0.54). The BV5/TBV was also inversely correlated with RVESVI (</span><i data-dcnode-id="6955"><span data-dcnode-id="6956" instrument_node="">r</span></i><span data-dcnode-id="6954" instrument_node="">=−0.45; </span><i data-dcnode-id="6952"><span data-dcnode-id="6953" instrument_node="">P</span></i><span data-dcnode-id="6951" instrument_node="">=0.03) and RVMI (</span><i data-dcnode-id="6949"><span data-dcnode-id="6950" instrument_node="">r</span></i><span data-dcnode-id="6948" instrument_node="">=−0.39; </span><i data-dcnode-id="6946"><span data-dcnode-id="6947" instrument_node="">P</span></i><span data-dcnode-id="6945" instrument_node="">=0.05) and trended toward correlation with RVEF (</span><i data-dcnode-id="6943"><span data-dcnode-id="6944" instrument_node="">r</span></i><span data-dcnode-id="6942" instrument_node="">=0.34; </span><i data-dcnode-id="6940"><span data-dcnode-id="6941" instrument_node="">P</span></i><span data-dcnode-id="6939" instrument_node="">=0.10) without associations with SV index or cardiac index. The BV5/total lung capacity was correlated with the RVEF (</span><i data-dcnode-id="6937"><span data-dcnode-id="6938" instrument_node="">r</span></i><span data-dcnode-id="6936" instrument_node="">=0.59; </span><i data-dcnode-id="6934"><span data-dcnode-id="6935" instrument_node="">P</span></i><span data-dcnode-id="6933" instrument_node="">=0.006) and trended toward significance with LVEF (</span><i data-dcnode-id="6931"><span data-dcnode-id="6932" instrument_node="">r</span></i><span data-dcnode-id="6930" instrument_node="">=0.39; </span><i data-dcnode-id="6928"><span data-dcnode-id="6929" instrument_node="">P</span></i><span data-dcnode-id="6927" instrument_node="">=0.09) suggesting both the volume of blood in these small vessels and lung hyperinflation impact ventricular function. The BV5/TBV was not associated with LV VI or function. Neither the BV5 nor the TBV was individually associated with cardiac changes on cMRI.</span></p><figure class="article__inlineFigure" data-dcnode-id="6900" id="F2"><img alt="Figure 2." class="figure__image" data-dcnode-id="6925" data-lg-src="/cms/asset/195b4725-434b-4829-9733-c8ba4bf7288a/e002546fig02.jpg" data-src="/cms/asset/c9039b96-83a9-43e4-be26-8cee5a9c537b/e002546fig02.jpg" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.ahajournals.org/specs/ux3/releasedAssets/images/loader.gif&amp;raw"><div class="figure-links" data-dcnode-id="6917"><ul class="rlist--inline" data-dcnode-id="6918"><li data-dcnode-id="6922"><a data-dcnode-id="6923" download="" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.ahajournals.org/cms/asset/79ea13f1-9232-4b83-a67f-9403f9cd411a/e002546fig02.jpeg"><span data-dcnode-id="6924" instrument_node="">Download figure</span></a></li><li data-dcnode-id="6919"><a class="ppt-figure-link" data-dcnode-id="6920" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.ahajournals.org/action/downloadFigures%3Fid%3DF2%26doi%3D10.1161%252FCIRCIMAGING.114.002546"><span data-dcnode-id="6921" instrument_node="">Download PowerPoint</span></a></li></ul></div><figcaption data-dcnode-id="6901"><strong data-dcnode-id="6916"></strong><span class="figure__caption" data-dcnode-id="6902"><p data-dcnode-id="6903"><strong class="captionLabel" data-dcnode-id="6914"><span data-dcnode-id="6915" instrument_node="">Figure 2.</span></strong><span data-dcnode-id="6913" instrument_node=""> </span><strong data-dcnode-id="6911"><span data-dcnode-id="6912" instrument_node="">A</span></strong><span data-dcnode-id="6910" instrument_node=""> to </span><strong data-dcnode-id="6908"><span data-dcnode-id="6909" instrument_node="">C</span></strong><span data-dcnode-id="6907" instrument_node="">, Correlation between pulmonary artery diameter to aortic diameter ratio (PA:A) and pulmonary blood vessel volume in vessels &lt;5 mm</span><sup data-dcnode-id="6905"><span data-dcnode-id="6906" instrument_node="">2</span></sup><span data-dcnode-id="6904" instrument_node=""> (BV5), total intraparenchymal blood vessel volume (TBV) and BV5/TBV.</span></p></span></figcaption></figure><div class="anchor-spacer" data-dcnode-id="6899" id="acd3e1131"></div><h4 class="article-section__title" data-dcnode-id="6897" id="d3e1131"><span data-dcnode-id="6898" instrument_node="">Ventricular Dimensions on cMRI</span></h4><p data-dcnode-id="6838"><span data-dcnode-id="6896" instrument_node="">As seen in </span><a class="ref showTableEvent" data-dcnode-id="6894" data-id="T2" href="#T2"><span data-dcnode-id="6895" instrument_node="">Table 2</span></a><span data-dcnode-id="6893" instrument_node="">, LVEDVI (59±11 versus 54±11 mL/m</span><sup data-dcnode-id="6891"><span data-dcnode-id="6892" instrument_node="">2</span></sup><span data-dcnode-id="6890" instrument_node="">; </span><i data-dcnode-id="6888"><span data-dcnode-id="6889" instrument_node="">P</span></i><span data-dcnode-id="6887" instrument_node="">=0.39), LVESVI (22±7 versus 20±7 g/m</span><sup data-dcnode-id="6885"><span data-dcnode-id="6886" instrument_node="">2</span></sup><span data-dcnode-id="6884" instrument_node="">; </span><i data-dcnode-id="6882"><span data-dcnode-id="6883" instrument_node="">P</span></i><span data-dcnode-id="6881" instrument_node="">=0.42), LVMI (45±11 versus 41±10 g/m</span><sup data-dcnode-id="6879"><span data-dcnode-id="6880" instrument_node="">2</span></sup><span data-dcnode-id="6878" instrument_node="">; </span><i data-dcnode-id="6876"><span data-dcnode-id="6877" instrument_node="">P</span></i><span data-dcnode-id="6875" instrument_node="">=0.40), LVSVI (37±6 versus 35±8 mL/m</span><sup data-dcnode-id="6873"><span data-dcnode-id="6874" instrument_node="">2</span></sup><span data-dcnode-id="6872" instrument_node="">; </span><i data-dcnode-id="6870"><span data-dcnode-id="6871" instrument_node="">P</span></i><span data-dcnode-id="6869" instrument_node="">=0.50), and LVEF (63±6 versus 64±8%; </span><i data-dcnode-id="6867"><span data-dcnode-id="6868" instrument_node="">P</span></i><span data-dcnode-id="6866" instrument_node="">=0.71) were not statistically different between subjects with a PA:A&gt;1 or a PA:A≤1. However, several significant differences in RV physiology were found. The PA:A&gt;1 group had higher volume indices (RVEDVI [65±17 versus 54±11 mL/m</span><sup data-dcnode-id="6864"><span data-dcnode-id="6865" instrument_node="">2</span></sup><span data-dcnode-id="6863" instrument_node="">; </span><i data-dcnode-id="6861"><span data-dcnode-id="6862" instrument_node="">P</span></i><span data-dcnode-id="6860" instrument_node="">=0.05] and RVESVI [32±12 versus 21±5 mL/m</span><sup data-dcnode-id="6858"><span data-dcnode-id="6859" instrument_node="">2</span></sup><span data-dcnode-id="6857" instrument_node="">; </span><i data-dcnode-id="6855"><span data-dcnode-id="6856" instrument_node="">P</span></i><span data-dcnode-id="6854" instrument_node="">=0.003]) without differences in RVSVI (33±7 versus 33±7 mL/m</span><sup data-dcnode-id="6852"><span data-dcnode-id="6853" instrument_node="">2</span></sup><span data-dcnode-id="6851" instrument_node="">; </span><i data-dcnode-id="6849"><span data-dcnode-id="6850" instrument_node="">P</span></i><span data-dcnode-id="6848" instrument_node="">=0.95). In addition, in contrast to findings about LV function, subjects with a PA:A&gt;1 had lower RVEF (52±7 versus 60%±9%; </span><i data-dcnode-id="6846"><span data-dcnode-id="6847" instrument_node="">P</span></i><span data-dcnode-id="6845" instrument_node="">=0.03). There were no differences in RV remodeling indices between groups. There was a trend toward higher RVMI in the PA:A&gt;1 group (15.2±6 versus 12.7±2.4 g/m</span><sup data-dcnode-id="6843"><span data-dcnode-id="6844" instrument_node="">2</span></sup><span data-dcnode-id="6842" instrument_node="">; </span><i data-dcnode-id="6840"><span data-dcnode-id="6841" instrument_node="">P</span></i><span data-dcnode-id="6839" instrument_node="">=0.17). Standardization for body mass index does not change these overall associations (Table in the Data Supplement).</span></p><div class="anchor-spacer" data-dcnode-id="6837" id="T2"></div><div class="article-table-content" data-dcnode-id="6683" id="T2"><table class="table article-section__table" data-dcnode-id="6688"><caption data-dcnode-id="6831"><strong data-dcnode-id="6832"><p data-dcnode-id="6833"><strong class="captionLabel" data-dcnode-id="6835"><span data-dcnode-id="6836" instrument_node="">Table 2.</span></strong><span data-dcnode-id="6834" instrument_node=""> Comparison of Right and Left Ventricular Measurements by Cardiac MRI</span></p></strong></caption><thead data-dcnode-id="6820"><tr data-dcnode-id="6821"><th align="left" colspan="1" data-dcnode-id="6830" rowspan="1"></th><th align="center" colspan="1" data-dcnode-id="68 d><td align="center" colspan="1" data-dcnode-id="6724" rowspan="1"><span data-dcnode-id="6725" instrument_node="">12.7±2.4</span></td><td align="center" colspan="1" data-dcnode-id="6722" rowspan="1"><span data-dcnode-id="6723" instrument_node="">15.2±6.0</span></td><td align="center" colspan="1" data-dcnode-id="6720" rowspan="1"><span data-dcnode-id="6721" instrument_node="">0.17</span></td></tr><tr data-dcnode-id="6708"><td align="left" colspan="1" data-dcnode-id="6715" rowspan="1"><span data-dcnode-id="6718" instrument_node=""> RVSVI, mL/m</span><sup data-dcnode-id="6716"><span data-dcnode-id="6717" instrument_node="">2</span></sup></td><td align="center" colspan="1" data-dcnode-id="6713" rowspan="1"><span data-dcnode-id="6714" instrument_node="">33±10</span></td><td align="center" colspan="1" data-dcnode-id="6711" rowspan="1"><span data-dcnode-id="6712" instrument_node="">33±7</span></td><td align="center" colspan="1" data-dcnode-id="6709" rowspan="1"><span data-dcnode-id="6710" instrument_node="">0.95</span></td></tr><tr data-dcnode-id="6699"><td align="left" colspan="1" data-dcnode-id="6706" rowspan="1"><span data-dcnode-id="6707" instrument_node=""> RVRI, g/mL</span></td><td align="center" colspan="1" data-dcnode-id="6704" rowspan="1"><span data-dcnode-id="6705" instrument_node="">0.24±0.05</span></td><td align="center" colspan="1" data-dcnode-id="6702" rowspan="1"><span data-dcnode-id="6703" instrument_node="">0.23±0.04</span></td><td align="center" colspan="1" data-dcnode-id="6700" rowspan="1"><span data-dcnode-id="6701" instrument_node="">0.55</span></td></tr><tr data-dcnode-id="6690"><td align="left" colspan="1" data-dcnode-id="6697" rowspan="1"><span data-dcnode-id="6698" instrument_node=""> RVEF, %</span></td><td align="center" colspan="1" data-dcnode-id="6695" rowspan="1"><span data-dcnode-id="6696" instrument_node="">60±9</span></td><td align="center" colspan="1" data-dcnode-id="6693" rowspan="1"><span data-dcnode-id="6694" instrument_node="">52±7</span></td><td align="center" colspan="1" data-dcnode-id="6691" rowspan="1"><span data-dcnode-id="6692" instrument_node="">0.03</span></td></tr></tbody></table><div class="tableFooter" data-dcnode-id="6684"><div class="footnote" data-dcnode-id="6685"><p data-dcnode-id="6686"><span data-dcnode-id="6687" instrument_node="">Data expressed as mean (±SD). A indicates aorta; LV, left ventricle; LVEDVI, left ventricular end-diastolic volume index; LVEF, left ventricular ejection fraction; LVESVI, left ventricular end-systolic volume index; LVMI, left ventricular myocardial infarction; LVRI, left ventricular remodeling index; LVSVI, left ventricular stroke volume index; PA, pulmonary artery; RV, right ventricle; RVEDVI, right ventricular end-diastolic volume index; RVEF, right ventricular ejection fraction; RVESVI, right ventricular end-systolic volume index; RVMI, right ventricular myocardial infarction; RVRI, right ventricular remodeling index; and RVSVI, right ventricular stroke volume index.</span></p></div></div></div><div class="anchor-spacer" data-dcnode-id="6682" id="acd3e1445"></div><h4 class="article-section__title" data-dcnode-id="6680" id="d3e1445"><span data-dcnode-id="6681" instrument_node="">Correlations Between cMRI Findings and Traditional Markers of COPD Severity</span></h4><p data-dcnode-id="6606"><span data-dcnode-id="6679" instrument_node="">Gas trapping was inversely related to LVEDVI (</span><i data-dcnode-id="6677"><span data-dcnode-id="6678" instrument_node="">r</span></i><span data-dcnode-id="6676" instrument_node="">=−0.60; </span><i data-dcnode-id="6674"><span data-dcnode-id="6675" instrument_node="">P</span></i><span data-dcnode-id="6673" instrument_node="">=0.008), LVSV (</span><i data-dcnode-id="6671"><span data-dcnode-id="6672" instrument_node="">r</span></i><span data-dcnode-id="6670" instrument_node="">=−0.66; </span><i data-dcnode-id="6668"><span data-dcnode-id="6669" instrument_node="">P</span></i><span data-dcnode-id="6667" instrument_node="">=0.003), and RVSV (</span><i data-dcnode-id="6665"><span data-dcnode-id="6666" instrument_node="">r</span></i><span data-dcnode-id="6664" instrument_node="">=−0.64; </span><i data-dcnode-id="6662"><span data-dcnode-id="6663" instrument_node="">P</span></i><span data-dcnode-id="6661" instrument_node="">=0.005; </span><a class="ref showTableEvent" data-dcnode-id="6659" data-id="T3" href="#T3"><span data-dcnode-id="6660" instrument_node="">Table 3</span></a><span data-dcnode-id="6658" instrument_node="">). Similarly, hyperinflation, defined by inspiratory capacity/total lung capacity ratio, was associated with reduced LVEDVI (</span><i data-dcnode-id="6656"><span data-dcnode-id="6657" instrument_node="">r</span></i><span data-dcnode-id="6655" instrument_node="">=0.57; </span><i data-dcnode-id="6653"><span data-dcnode-id="6654" instrument_node="">P</span></i><span data-dcnode-id="6652" instrument_node="">=0.02), LVSV (0.47; </span><i data-dcnode-id="6650"><span data-dcnode-id="6651" instrument_node="">P</span></i><span data-dcnode-id="6649" instrument_node="">=0.05), and RVEDVI (</span><i data-dcnode-id="6647"><span data-dcnode-id="6648" instrument_node="">r</span></i><span data-dcnode-id="6646" instrument_node="">=0.52; </span><i data-dcnode-id="6644"><span data-dcnode-id="6645" instrument_node="">P</span></i><span data-dcnode-id="6643" instrument_node="">=0.03). Percent emphysema was associated with reduced LVSV (</span><i data-dcnode-id="6641"><span data-dcnode-id="6642" instrument_node="">r</span></i><span data-dcnode-id="6640" instrument_node="">=−0.49; </span><i data-dcnode-id="6638"><span data-dcnode-id="6639" instrument_node="">P</span></i><span data-dcnode-id="6637" instrument_node="">=0.02) and showed a trend toward reduced LVEDVI (</span><i data-dcnode-id="6635"><span data-dcnode-id="6636" instrument_node="">r</span></i><span data-dcnode-id="6634" instrument_node="">=−0.42; </span><i data-dcnode-id="6632"><span data-dcnode-id="6633" instrument_node="">P</span></i><span data-dcnode-id="6631" instrument_node="">=0.06) without effect on RV parameters. FEV</span><sub data-dcnode-id="6629"><span data-dcnode-id="6630" instrument_node="">1</span></sub><span data-dcnode-id="6628" instrument_node="">, percent emphysema, percent gas trapping, and hyperinflation were not associated with changes in LVEF. However, FEV</span><sub data-dcnode-id="6626"><span data-dcnode-id="6627" instrument_node="">1</span></sub><span data-dcnode-id="6625" instrument_node=""> (</span><i data-dcnode-id="6623"><span data-dcnode-id="6624" instrument_node="">r</span></i><span data-dcnode-id="6622" instrument_node="">=0.47; </span><i data-dcnode-id="6620"><span data-dcnode-id="6621" instrument_node="">P</span></i><span data-dcnode-id="6619" instrument_node="">=0.02), percent gas trapping (</span><i data-dcnode-id="6617"><span data-dcnode-id="6618" instrument_node="">r</span></i><span data-dcnode-id="6616" instrument_node="">=−0.48; </span><i data-dcnode-id="6614"><span data-dcnode-id="6615" instrument_node="">P</span></i><span data-dcnode-id="6613" instrument_node="">=0.045), and hyperinflation (</span><i data-dcnode-id="6611"><span data-dcnode-id="6612" instrument_node="">r</span></i><span data-dcnode-id="6610" instrument_node="">=0.56; </span><i data-dcnode-id="6608"><span data-dcnode-id="6609" instrument_node="">P</span></i><span data-dcnode-id="6607" instrument_node="">=0.02) were associated with RVEF.</span></p><div class="anchor-spacer" data-dcnode-id="6605" id="T3"></div><div class="article-table-content" data-dcnode-id="6464" id="T3"><table class="table article-section__table" data-dcnode-id="6483"><caption data-dcnode-id="6599"><strong data-dcnode-id="6600"><p data-dcnode-id="6601"><strong class="captionLabel" data-dcnode-id="6603"><span data-dcnode-id="6604" instrument_node="">Table 3.</span></strong><span data-dcnode-id="6602" instrument_node=""> Univariate Correlations Between Cardiac MRI Measurements and Chronic Obstructive Pulmonary Disease
