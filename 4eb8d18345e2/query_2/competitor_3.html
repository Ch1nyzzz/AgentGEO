ata-dcnode-id="6538" instrument_node="">−0.05 (0.83)</span></td><td align="center" colspan="1" data-dcnode-id="6535" rowspan="1"><span data-dcnode-id="6536" instrument_node="">0.01 (0.99)</span></td></tr><tr data-dcnode-id="6521"><td align="left" colspan="1" data-dcnode-id="6530" rowspan="1"><span data-dcnode-id="6533" instrument_node="">RVEDVI, mL/m</span><sup data-dcnode-id="6531"><span data-dcnode-id="6532" instrument_node="">2</span></sup></td><td align="center" colspan="1" data-dcnode-id="6528" rowspan="1"><span data-dcnode-id="6529" instrument_node="">0.17 (0.43)</span></td><td align="center" colspan="1" data-dcnode-id="6526" rowspan="1"><span data-dcnode-id="6527" instrument_node="">−0.24 (0.30)</span></td><td align="center" colspan="1" data-dcnode-id="6524" rowspan="1"><span data-dcnode-id="6525" instrument_node="">−0.39 (0.11)</span></td><td align="center" colspan="1" data-dcnode-id="6522" rowspan="1"><span data-dcnode-id="6523" instrument_node="">0.23 (0.37)</span></td></tr><tr data-dcnode-id="6502"><td align="left" colspan="1" data-dcnode-id="6517" rowspan="1"><span data-dcnode-id="6520" instrument_node="">RVSVI, mL/m</span><sup data-dcnode-id="6518"><span data-dcnode-id="6519" instrument_node="">2</span></sup></td><td align="center" colspan="1" data-dcnode-id="6513" rowspan="1"><span data-dcnode-id="6516" instrument_node="">0.44 (0.03)</span><a class="ref showTableEvent" data-dcnode-id="6514" data-id="tab3fn2" href="#tab3fn2"><span data-dcnode-id="6515" instrument_node="">*</span></a></td><td align="center" colspan="1" data-dcnode-id="6511" rowspan="1"><span data-dcnode-id="6512" instrument_node="">−0.37 (0.10)</span></td><td align="center" colspan="1" data-dcnode-id="6507" rowspan="1"><span data-dcnode-id="6510" instrument_node="">0.58 (0.01)</span><a class="ref showTableEvent" data-dcnode-id="6508" data-id="tab3fn2" href="#tab3fn2"><span data-dcnode-id="6509" instrument_node="">*</span></a></td><td align="center" colspan="1" data-dcnode-id="6503" rowspan="1"><span data-dcnode-id="6506" instrument_node="">0.57 (0.02)</span><a class="ref showTableEvent" data-dcnode-id="6504" data-id="tab3fn2" href="#tab3fn2"><span data-dcnode-id="6505" instrument_node="">*</span></a></td></tr><tr data-dcnode-id="6485"><td align="left" colspan="1" data-dcnode-id="6500" rowspan="1"><span data-dcnode-id="6501" instrument_node="">RVEF, %</span></td><td align="center" colspan="1" data-dcnode-id="6496" rowspan="1"><span data-dcnode-id="6499" instrument_node="">0.47 (0.02)</span><a class="ref showTableEvent" data-dcnode-id="6497" data-id="tab3fn2" href="#tab3fn2"><span data-dcnode-id="6498" instrument_node="">*</span></a></td><td align="center" colspan="1" data-dcnode-id="6494" rowspan="1"><span data-dcnode-id="6495" instrument_node="">−0.36 (0.11)</span></td><td align="center" colspan="1" data-dcnode-id="6490" rowspan="1"><span data-dcnode-id="6493" instrument_node="">−0.48 (0.05)</span><a class="ref showTableEvent" data-dcnode-id="6491" data-id="tab3fn2" href="#tab3fn2"><span data-dcnode-id="6492" instrument_node="">*</span></a></td><td align="center" colspan="1" data-dcnode-id="6486" rowspan="1"><span data-dcnode-id="6489" instrument_node="">0.56 (0.02)</span><a class="ref showTableEvent" data-dcnode-id="6487" data-id="tab3fn2" href="#tab3fn2"><span data-dcnode-id="6488" instrument_node="">*</span></a></td></tr></tbody></table><div class="tableFooter" data-dcnode-id="6465"><div class="footnote" data-dcnode-id="6471"><p data-dcnode-id="6472"><span data-dcnode-id="6482" instrument_node="">Data expressed as Pearson </span><i data-dcnode-id="6480"><span data-dcnode-id="6481" instrument_node="">r</span></i><span data-dcnode-id="6479" instrument_node=""> (</span><i data-dcnode-id="6477"><span data-dcnode-id="6478" instrument_node="">P</span></i><span data-dcnode-id="6476" instrument_node=""> value). FEV</span><sub data-dcnode-id="6474"><span data-dcnode-id="6475" instrument_node="">1</span></sub><span data-dcnode-id="6473" instrument_node=""> indicates forced expiratory volume in 1 second; IC, inspiratory capacity; LVEF, left ventricular ejection fraction; LVSVI, left ventricular stroke volume index; RVEDVI, right ventricular end-diastolic volume index; RVEF, right ventricular ejection fraction; RVSVI, right ventricular stroke volume index; and TLC, total lung capacity.</span></p></div><div class="footnote" data-dcnode-id="6466" id="tab3fn2"><p data-dcnode-id="6467"><sup data-dcnode-id="6469"><span data-dcnode-id="6470" instrument_node="">*</span></sup><span data-dcnode-id="6468" instrument_node="">P&lt;0.05.</span></p></div></div></div><div class="anchor-spacer" data-dcnode-id="6463" id="acd3e1728"></div><h4 class="article-section__title" data-dcnode-id="6461" id="d3e1728"><span data-dcnode-id="6462" instrument_node="">Associations Between Cardiac Function, the PA:A Ratio, and Exercise Capacity</span></h4><p data-dcnode-id="6432"><span data-dcnode-id="6460" instrument_node="">Pearson correlation analysis was used to identify factors linearly correlated to 6MWD (</span><a class="ref showTableEvent" data-dcnode-id="6458" data-id="T4" href="#T4"><span data-dcnode-id="6459" instrument_node="">Table 4</span></a><span data-dcnode-id="6457" instrument_node="">). The PA:A ratio was inversely related to 6MWD (</span><i data-dcnode-id="6455"><span data-dcnode-id="6456" instrument_node="">r</span></i><span data-dcnode-id="6454" instrument_node="">=−0.49; </span><i data-dcnode-id="6452"><span data-dcnode-id="6453" instrument_node="">P</span></i><span data-dcnode-id="6451" instrument_node="">=0.02). This was driven primarily by increases in PA diameter (</span><i data-dcnode-id="6449"><span data-dcnode-id="6450" instrument_node="">r</span></i><span data-dcnode-id="6448" instrument_node="">=−0.58; </span><i data-dcnode-id="6446"><span data-dcnode-id="6447" instrument_node="">P</span></i><span data-dcnode-id="6445" instrument_node="">=0.003), as the aorta diameter was not associated with 6MWD (</span><i data-dcnode-id="6443"><span data-dcnode-id="6444" instrument_node="">r</span></i><span data-dcnode-id="6442" instrument_node="">=−0.22; </span><i data-dcnode-id="6440"><span data-dcnode-id="6441" instrument_node="">P</span></i><span data-dcnode-id="6439" instrument_node="">=0.31). RVEF, unlike LVEF, was associated with 6MWD (</span><i data-dcnode-id="6437"><span data-dcnode-id="6438" instrument_node="">r</span></i><span data-dcnode-id="6436" instrument_node="">=0.47; </span><i data-dcnode-id="6434"><span data-dcnode-id="6435" instrument_node="">P</span></i><span data-dcnode-id="6433" instrument_node="">=0.02).</span></p><div class="anchor-spacer" data-dcnode-id="6431" id="T4"></div><div class="article-table-content" data-dcnode-id="6322" id="T4"><table class="table article-section__table" data-dcnode-id="6344"><caption data-dcnode-id="6425"><strong data-dcnode-id="6426"><p data-dcnode-id="6427"><strong class="captionLabel" data-dcnode-id="6429"><span data-dcnode-id="6430" instrument_node="">Table 4.</span></strong><span data-dcnode-id="6428" instrument_node=""> Linear Correlations Between Baseline Characteristics and 6MWD</span></p></strong></caption><thead data-dcnode-id="6419"><tr data-dcnode-id="6420"><th align="left" colspan="1" data-dcnode-id="6423" rowspan="1"><span data-dcnode-id="6424" instrument_node="">Variable</span></th><th align="center" colspan="1" data-dcnode-id="6421" rowspan="1"><span data-dcnode-id="6422" instrument_node="">6MWD, ft</span></th></tr></thead><tbody data-dcnode-id="6345"><tr data-dcnode-id="6414"><td align="left" colspan="1" data-dcnode-id="6417" rowspan="1"><span data-dcnode-id="6418" instrument_node="">Heart rate, bpm</span></td><td align="center" colspan="1" data-dcnode-id="6415" rowspan="1"><span data-dcnode-id="6416" instrument_node="">−0.41 (0.12)</span></td></tr><tr data-dcnode-id="6409"><td align="left" colspan="1" data-dcnode-id="6412" rowspan="1"><span data-dcnode-id="6413" instrument_node="">A diameter by CT scan, cm</span></td><td align="center" colspan="1" data-dcnode-id="6410" rowspan="1"><span data-dcnode-id="6411" instrument_node="">−0.22 (0.31)</span></td></tr><tr data-dcnode-id="6402"><td align="left" colspan="1" data-dcnode-id="6407" rowspan="1"><span data-dcnode-id="6408" instrument_node="">PA diameter by CT scan, cm</span></td><td align="center" colspan="1" data-dcnode-id="6403" rowspan="1"><span data-dcnode-id="6406" instrument_node="">−0.58 (0.003)</span><a class="ref showTableEvent" data-dcnode-id="6404" data-id="tab4fn2" href="#tab4fn2"><span data-dcnode-id="6405" instrument_node="">*</span></a></td></tr><tr data-dcnode-id="6395"><td align="left" colspan="1" data-dcnode-id="6400" rowspan="1"><span data-dcnode-id="6401" instrument_node="">PA:A ratio</span></td><td align="center" colspan="1" data-dcnode-id="6396" rowspan="1"><span data-dcnode-id="6399" instrument_node="">−0.49 (0.02)</span><a class="ref showTableEvent" data-dcnode-id="6397" data-id="tab4fn2" href="#tab4fn2"><span data-dcnode-id="6398" instrument_node="">*</span></a></td></tr><tr data-dcnode-id="6390"><td align="left" colspan="1" data-dcnode-id="6393" rowspan="1"><span data-dcnode-id="6394" instrument_node="">LVEF</span></td><td align="center" colspan="1" data-dcnode-id="6391" rowspan="1"><span data-dcnode-id="6392" instrument_node="">0.12 (0.59)</span></td></tr><tr data-dcnode-id="6383"><td align="left" colspan="1" data-dcnode-id="6388" rowspan="1"><span data-dcnode-id="6389" instrument_node="">RVEF</span></td><td align="center" colspan="1" data-dcnode-id="6384" rowspan="1"><span data-dcnode-id="6387" instrument_node="">0.47 (0.02)</span><a class="ref showTableEvent" data-dcnode-id="6385" data-id="tab4fn2" href="#tab4fn2"><span data-dcnode-id="6386" instrument_node="">*</span></a></td></tr><tr data-dcnode-id="6378"><td align="left" colspan="1" data-dcnode-id="6381" rowspan="1"><span data-dcnode-id="6382" instrument_node="">BV5</span></td><td align="center" colspan="1" data-dcnode-id="6379" rowspan="1"><span data-dcnode-id="6380" instrument_node="">−0.02 (0.91)</span></td></tr><tr data-dcnode-id="6373"><td align="left" colspan="1" data-dcnode-id="6376" rowspan="1"><span data-dcnode-id="6377" instrument_node="">TBV</span></td><td align="center" colspan="1" data-dcnode-id="6374" rowspan="1"><span data-dcnode-id="6375" instrument_node="">0.02 (0.91)</span></td></tr><tr data-dcnode-id="6368"><td align="left" colspan="1" data-dcnode-id="6371" rowspan="1"><span data-dcnode-id="6372" instrument_node="">BV5/TBV</span></td><td align="center" colspan="1" data-dcnode-id="6369" rowspan="1"><span data-dcnode-id="6370" instrument_node="">0.24 (0.27)</span></td></tr><tr data-dcnode-id="6358"><td align="left" colspan="1" data-dcnode-id="6363" rowspan="1"><span data-dcnode-id="6367" instrument_node="">FEV</span><sub data-dcnode-id="6365"><span data-dcnode-id="6366" instrument_node="">1</span></sub><span data-dcnode-id="6364" instrument_node=""> (%)</span></td><td align="center" colspan="1" data-dcnode-id="6359" rowspan="1"><span data-dcnode-id="6362" instrument_node="">0.57 (0.004)</span><a class="ref showTableEvent" data-dcnode-id="6360" data-id="tab4fn2" href="#tab4fn2"><span data-dcnode-id="6361" instrument_node="">*</span></a></td></tr><tr data-dcnode-id="6351"><td align="left" colspan="1" data-dcnode-id="6356" rowspan="1"><span data-dcnode-id="6357" instrument_node="">IC/TLC</span></td><td align="center" colspan="1" data-dcnode-id="6352" rowspan="1"><span data-dcnode-id="6355" instrument_node="">0.52 (0.03)</span><a class="ref showTableEvent" data-dcnode-id="6353" data-id="tab4fn2" href="#tab4fn2"><span data-dcnode-id="6354" instrument_node="">*</span></a></td></tr><tr data-dcnode-id="6346"><td align="left" colspan="1" data-dcnode-id="6349" rowspan="1"><span data-dcnode-id="6350" instrument_node="">Emphysema, %</span></td><td align="center" colspan="1" data-dcnode-id="6347" rowspan="1"><span data-dcnode-id="6348" instrument_node="">−0.21 (0.37)</span></td></tr></tbody></table><div class="tableFooter" data-dcnode-id="6323"><div class="footnote" data-dcnode-id="6329"><p data-dcnode-id="6330"><span data-dcnode-id="6343" instrument_node="">Data expressed as </span><i data-dcnode-id="6341"><span data-dcnode-id="6342" instrument_node="">r</span></i><span data-dcnode-id="6340" instrument_node=""> (</span><i data-dcnode-id="6338"><span data-dcnode-id="6339" instrument_node="">P</span></i><span data-dcnode-id="6337" instrument_node=""> value). 6MWD indicates 6-minute walk distance; A, aorta; BV5, pulmonary blood vessel volume in vessels &lt;5 mm</span><sup data-dcnode-id="6335"><span data-dcnode-id="6336" instrument_node="">2</span></sup><span data-dcnode-id="6334" instrument_node="">; CT, computed tomography; FEV</span><sub data-dcnode-id="6332"><span data-dcnode-id="6333" instrument_node="">1</span></sub><span data-dcnode-id="6331" instrument_node="">, forced expiratory volume in 1 second; IC, inspiratory capacity; LVEF, left ventricular ejection fraction; PA, pulmonary artery; RVEF, right ventricular ejection fraction; TBV, total intraparenchymal blood vessel volume; and TLC, total lung capacity.</span></p></div><div class="footnote" data-dcnode-id="6324" id="tab4fn2"><p data-dcnode-id="6325"><sup data-dcnode-id="6327"><span data-dcnode-id="6328" instrument_node="">*</span></sup><span data-dcnode-id="6326" instrument_node="">P&lt;0.05.</span></p></div></div></div><div class="anchor-spacer" data-dcnode-id="6321" id="acd3e1936"></div><h3 class="article-section__title to-section" data-dcnode-id="6319" id="d3e1936"><span data-dcnode-id="6320" instrument_node="">Discussion</span></h3><p data-dcnode-id="6314"><span data-dcnode-id="6318" instrument_node="">This study combines state-of-the-art CT imaging techniques with cardiac MRI to identify early pulmonary vascular disease and RV dysfunction in patients with COPD with only moderate airflow obstruction. We found that in this population without known underlying cardiovascular or pulmonary vascular disease, an elevated PA:A ratio occurs often and directly correlates with increases in RV volume indices and early RV dysfunction. Further, this relative PA enlargement is associated with the loss of blood volume in small pulmonary vessels on CT likely because of a redistribution and centralization of pulmonary blood flow. This early evidence of vascular remodeling and RV dysfunction precedes the development of overt PH and cor pulmonale but both changes are independently predictive of poor exercise capacity. Our results also provide a pathophysiologic basis to explain the inability of patients with PA enlargement to compensate for the metabolic demands that occur during an acute exacerbation, resulting in greater risk of hospitalization.</span><sup data-dcnode-id="6315"><a class="tab-link" data-dcnode-id="6316" data-tab="pane-pcw-references" href="#R1" id="R1R"><span data-dcnode-id="6317" instrument_node="">1</span></a></sup></p><p data-dcnode-id="6305"><span data-dcnode-id="6313" instrument_node="">Our study focuses on well-characterized COPD patients and shows correlations between the PA:A&gt;1 on CT with distal small pulmonary vessel pruning and impaired RV function by cMRI, which have been linked with poor outcomes</span><sup data-dcnode-id="6307"><a class="tab-link" data-dcnode-id="6311" data-tab="pane-pcw-references" href="#R29" id="R29R"><span data-dcnode-id="6312" instrument_node="">29</span></a><span data-dcnode-id="6310" instrument_node="">,</span><a class="tab-link" data-dcnode-id="6308" data-tab="pane-pcw-references" href="#R30" id="R30R"><span data-dcnode-id="6309" instrument_node="">30</span></a></sup><span data-dcnode-id="6306" instrument_node=""> Both BV5 and TBV were lower in the PA:A&gt;1 group, and both were inversely associated with the absolute PA:A ratio. The BV5/TBV ratio was not significantly associated with the PA:A ratio, which may be because of the relatively small sample size or from mathematical coupling between the 2 measures. The BV5/TBV ratio was inversely correlated with RVMI and RVESVI, suggesting that loss of blood volume in vessels with a cross-sectional area of &lt;5 mm2 has a direct impact on RV mass and volumes. These novel findings are the first to implicate the loss of blood volume in intraparenchymal vasculature with cardiac function.</span></p><p data-dcnode-id="6278"><span data-dcnode-id="6304" instrument_node="">As we have previously showed, patients with PA:A&gt;1 had higher body mass index and BSA, which could explain higher RV and LV filling volumes through a compensatory mechanism in response to increased blood volume from obesity.</span><sup data-dcnode-id="6298"><a class="tab-link" data-dcnode-id="6302" data-tab="pane-pcw-references" href="#R1" id="R1R"><span data-dcnode-id="6303" instrument_node="">1</span></a><span data-dcnode-id="6301" instrument_node="">,</span><a class="tab-link" data-dcnode-id="6299" data-tab="pane-pcw-references" href="#R31" id="R31R"><span data-dcnode-id="6300" instrument_node="">31</span></a></sup><span data-dcnode-id="6297" instrument_node=""> We excluded those with baseline congestive heart failure thus limiting the likelihood that intrinsic LV or RV dysfunction confounds our results. Furthermore, we found no significant differences in LVEF or LV dimensions between subjects with PA enlargement which is in contrast to changes seen in the RV. Increases in RVEDV have been implicated in patients with COPD and cor pulmonale</span><sup data-dcnode-id="6294"><a class="tab-link" data-dcnode-id="6295" data-tab="pane-pcw-references" href="#R32" id="R32R"><span data-dcnode-id="6296" instrument_node="">32</span></a></sup><span data-dcnode-id="6293" instrument_node=""> and likely result from increases in pulmonary vascular resistance. Recently, Grau et al</span><sup data-dcnode-id="6290"><a class="tab-link" data-dcnode-id="6291" data-tab="pane-pcw-references" href="#R19" id="R19R"><span data-dcnode-id="6292" instrument_node="">19</span></a></sup><span data-dcnode-id="6289" instrument_node=""> described an inverse relationship between percent emphysema and RV size on cMRI. Although we did not make the same observations, there were considerable differences between populations and our sample size was insufficient to draw similar conclusions. Our findings represent an important association between subjects with COPD and the RV given the more severe airflow obstruction and extensive smoking history in our cohort. Although SV remodeling index values were not statistically different between the PA:A &lt;1 and PA:A &gt;1 groups, this is in fact an early indication of a failing ventricle, as evidenced by the reduced RVEF, and the increase in RVMI, while not statistically significant, suggests that RV hypertrophy is occurring. Our findings support the existing literature suggesting that LV systolic function is usually preserved in patients with COPD, whereas RV dysfunction is more common.</span><sup data-dcnode-id="6283"><a class="tab-link" data-dcnode-id="6287" data-tab="pane-pcw-references" href="#R7" id="R7R"><span data-dcnode-id="6288" instrument_node="">7</span></a><span data-dcnode-id="6286" instrument_node="">,</span><a class="tab-link" data-dcnode-id="6284" data-tab="pane-pcw-references" href="#R33" id="R33R"><span data-dcnode-id="6285" instrument_node="">33</span></a></sup><span data-dcnode-id="6282" instrument_node=""> The relatively normal LV function in patients with COPD may be partly explained by flattening of the intraventricular septum allowing compensation for RV hypertrophy.</span><sup data-dcnode-id="6279"><a class="tab-link" data-dcnode-id="6280" data-tab="pane-pcw-references" href="#R20" id="R20R"><span data-dcnode-id="6281" instrument_node="">20</span></a></sup></p><p data-dcnode-id="6266"><span data-dcnode-id="6277" instrument_node="">Subjects with relative PA enlargement had more hyperinflation and reduced cross-sectional area of the small pulmonary blood vessels, despite no difference in airflow obstruction or percent emphysema. However, we did find percent emphysema correlated with lower LVEDVI and LVSVI as Barr et al</span><sup data-dcnode-id="6274"><a class="tab-link" data-dcnode-id="6275" data-tab="pane-pcw-references" href="#R34" id="R34R"><span data-dcnode-id="6276" instrument_node="">34</span></a></sup><span data-dcnode-id="6273" instrument_node=""> previously reported. The effects of emphysema seem to predominantly affect the LV in contrast to airflow obstruction and hyperinflation, which both affect the LV and the RV.</span><sup data-dcnode-id="6267"><a class="tab-link" data-dcnode-id="6271" data-tab="pane-pcw-references" href="#R19" id="R19R"><span data-dcnode-id="6272" instrument_node="">19</span></a><span data-dcnode-id="6270" instrument_node="">,</span><a class="tab-link" data-dcnode-id="6268" data-tab="pane-pcw-references" href="#R35" id="R35R"><span data-dcnode-id="6269" instrument_node="">35</span></a></sup></p><p data-dcnode-id="6254"><span data-dcnode-id="6265" instrument_node="">These novel findings suggest that the relatively weaker RV may lack the compensatory mechanisms to adequately respond to increased RV filling and places the RV at risk for changes induced by gas trapping and hyperinflation. This is important as hyperinflation is a strong predictor of mortality in this population.</span><sup data-dcnode-id="6262"><a class="tab-link" data-dcnode-id="6263" data-tab="pane-pcw-references" href="#R36" id="R36R"><span data-dcnode-id="6264" instrument_node="">36</span></a></sup><span data-dcnode-id="6261" instrument_node=""> The connection between hyperinflation and RV dysfunction could be through changes in pulmonary vasculature and subsequent relative PA enlargement and reduced RVEF as we showed. As Estepar et al</span><sup data-dcnode-id="6259"><a class="tab-link" data-dcnode-id="6260" data-tab="pane-pcw-references" href="#R27" id="R27R"></a></sup><span data-dcnode-id="6258" instrument_node=""> posit, hyperinflation and emphysematous destruction of lung tissue cause pathological changes in pulmonary vasculature including vessel elongation, vasoconstriction, and vascular loss, and this distal pruning of small pulmonary blood vessels correlated with reduced 6MWD.</span><sup data-dcnode-id="6255"><a class="tab-link" data-dcnode-id="6256" data-tab="pane-pcw-references" href="#R3" id="R3R"><span data-dcnode-id="6257" instrument_node="">3,27</span></a></sup></p><p data-dcnode-id="6234"><span data-dcnode-id="6253" instrument_node="">The most important factors implicated in RV dysfunction were a reduced FEV</span><sub data-dcnode-id="6251"><span data-dcnode-id="6252" instrument_node="">1</span></sub><span data-dcnode-id="6250" instrument_node="">, hyperinflation, and PA enlargement. In turn, both RV dysfunction and PA enlargement are associated with reduced exercise tolerance. Therapies directed at improving hyperinflation have been shown to have direct impact on 6MWD.</span><sup data-dcnode-id="6244"><a class="tab-link" data-dcnode-id="6248" data-tab="pane-pcw-references" href="#R37" id="R37R"><span data-dcnode-id="6249" instrument_node="">37</span></a><span data-dcnode-id="6247" instrument_node="">,</span><a class="tab-link" data-dcnode-id="6245" data-tab="pane-pcw-references" href="#R38" id="R38R"><span data-dcnode-id="6246" instrument_node="">38</span></a></sup><span data-dcnode-id="6243" instrument_node=""> In contrast, therapies specifically targeting COPD-related PH have not been beneficial and in some cases have worsened outcomes.</span><sup data-dcnode-id="6236"><a class="tab-link" data-dcnode-id="6241" data-tab="pane-pcw-references" href="#R39" id="R39R"><span data-dcnode-id="6242" instrument_node="">39</span></a><a class="tab-link" data-dcnode-id="6239" data-tab="pane-pcw-references" href="#R40" id="R40R"><span data-dcnode-id="6240" instrument_node="">–</span></a><a class="tab-link" data-dcnode-id="6237" data-tab="pane-pcw-references" href="#R41" id="R41R"><span data-dcnode-id="6238" instrument_node="">41</span></a></sup><span data-dcnode-id="6235" instrument_node=""> This highlights the pathophysiologic impact of PH and RV dysfunction in COPD and the need to discover new therapeutic pathways to target this process.</span></p><p data-dcnode-id="6232"><span data-dcnode-id="6233" instrument_node="">Our study is limited by its small sample size and single center experience, although we did demonstrate strong correlations between clinical outcomes, CT metrics, and cMRI-measured ventricular dimensions and function. Our CT measures cannot precisely define the extent of plexiform arteriopathy, smooth muscle proliferation, and vasoconstriction, all pathological features that contribute to the development of PH. Correlations between these findings and BV5 would require lung biopsy; however, the loss of blood volume captured this BV5 metric represents an attractive imaging biomarker for the detection of pulmonary vascular disease. It is also possible that BV5 would be affected by changes in preload although this would require additional studies in patients with cardiac dysfunction who we specifically excluded from the present analysis. Additional studies with larger sample sizes are needed to more definitively define the complex relationships between emphysema, pulmonary vascular disease, and cardiac dysfunction in patients with COPD. This is made more challenging by the cost of cMRI and by the time required for a cMRI session which can be difficult for patients with severe lung disease who may struggle with breath holding. Finally, we did not observe correlations between BV5 and TBV with 6MWD. This may be in part because of the small sample size of the population or that the signal was obscured by the contribution from PA size.</span></p><p data-dcnode-id="6230"><span data-dcnode-id="6231" instrument_node="">In conclusion, pulmonary vascular disease in the setting of COPD is a complex process. The BV5 and the PA:A ratio are promising imaging biomarkers that can aid in differentiating different disease phenotypes rather than supplanting histopathologic observations. The novel CT metrics and use of cMRI have use in relating small and large vessel remodeling to cardiac dysfunction and functional outcomes in patients with moderate-to-severe COPD.</span></p><div class="anchor-spacer" data-dcnode-id="6229" id="acd3e2032"></div><h3 class="article-section__title to-section" data-dcnode-id="6227" id="d3e2032"><span data-dcnode-id="6228" instrument_node="">Acknowledgments</span></h3><p data-dcnode-id="6225"><span data-dcnode-id="6226" instrument_node="">We thank the COPDGene study and the ancillary proposal process for the parent study. We thank the patients who volunteered for this study and the coordinators and technicians who made this possible.</span></p><div class="articleInformation" data-dcnode-id="6219"><div class="anchor-spacer" data-dcnode-id="6224" id="acd3e2038"></div><h3 class="article-section__title to-section" data-dcnode-id="6222" id="d3e2038"><span data-dcnode-id="6223" instrument_node="">Sources of Funding</span></h3><p data-dcnode-id="6220"><span data-dcnode-id="6221" instrument_node="">Walter B. Frommeyer Jr Fellowship in Investigational Medicine, University of Alabama at Birmingham and National Institutes of Health (NIH) National Heart, Lung, and Blood Institute (NHLBI) K08HL1123940 (to Dr Wells); American Heart Association 13CRP16750005 (to Dr Bhatt); NIH NHLBI R01-HL104018 (to Dr Gupta); K25 HL104085-04 and 1R01HL116931-02 and R01HL116473-02 (to Dr Estepar); R01HL116473 (to Dr Washko); The COPDGene project is supported by grants from the NHLBI (U01HL089897 and U01HL089856)</span></p></div><div class="articleInformation" data-dcnode-id="6213"><div class="anchor-spacer" data-dcnode-id="6218" id="acd3e2044"></div><h3 class="article-section__title to-section" data-dcnode-id="6216" id="d3e2044"><span data-dcnode-id="6217" instrument_node="">Disclosures</span></h3><p data-dcnode-id="6214"><span data-dcnode-id="6215" instrument_node="">Dr Wells oir.eu/?index=cw22&amp;url=http%3A//scholar.google.com/scholar_lookup%3Fhl%3Den%26volume%3D7%26publication_year%3D2012%26pages%3De52248%26journal%3DPLoS%2BOne%26author%3DL%2BBoeck%26author%3DM%2BTamm%26author%3DP%2BGrendelmeier%26author%3DD.%2BStolz%26title%3DAcute%2Beffects%2Bof%2Baerosolized%2Biloprost%2Bin%2BCOPD%2Brelated%2Bpulmonary%2Bhypertension%2B-%2Ba%2Brandomized%2Bcontrolled%2Bcrossover%2Btrial." target="_blank"><span data-dcnode-id="5139" instrument_node="">Google Scholar</span></a></span></span></li></ul></div></div><front-stub data-dcnode-id="5126"><title-group data-dcnode-id="5127"><div class="anchor-spacer" data-dcnode-id="5130" id="acd10967988e3498"></div><h1 class="article-section__title to-section" data-dcnode-id="5128" id="d10967988e3498"><span data-dcnode-id="5129" instrument_node="">CLINICAL PERSPECTIVE</span></h1></title-group></front-stub><div class="anchor-spacer" data-dcnode-id="5125" id="acd3e5374"></div><h3 class="article-section__title to-section" data-dcnode-id="5124" id="d3e5374"></h3><p data-dcnode-id="5119"><span data-dcnode-id="5123" instrument_node="">Pulmonary hypertension occurs in 25% to 70% of subjects with chronic obstructive pulmonary disease. Although not all chronic obstructive pulmonary disease–related pulmonary hypertension is severe, its presence has important prognostic implications and predicts acute exacerbations, lung function decline, and mortality. A pulmonary artery to aorta ratio &gt;1 correlates well with the presence of pulmonary hypertension and has also been established as a risk factor for chronic obstructive pulmonary disease exacerbations, hospitalizations, and death. Despite these observations, the relationships between an elevated pulmonary artery to aorta ratio and both intrapulmonary blood volume and cardiac function have not been established. In this study, we examined the associations between the pulmonary artery to aorta ratio, novel computed tomographic metrics of small intrapulmonary blood vessel caliber (&lt;5 mm</span><sup data-dcnode-id="5121"><span data-dcnode-id="5122" instrument_node="">2</span></sup><span data-dcnode-id="5120" instrument_node="">) and cardiac function as assessed by cardiac MRI. We found that increases in the pulmonary artery to aorta ratio are related to loss of small caliber intrapulmonary vessels and that these changes are associated with subtle impairments in right ventricular function as well as reduced exercise tolerance. Our results provide a link between the loss of small pulmonary vessels, the development of relative pulmonary enlargement, and early cardiac dysfunction in patients with chronic obstructive pulmonary disease.</span></p><div class="response" data-dcnode-id="5117"><div class="sub-article-title" data-dcnode-id="5118"></div></div></div><div class="purchaseArea" data-dcnode-id="5093"><span data-dcnode-id="5115" instrument_node="">
