f water. </span></p><p data-dcnode-id="2019"><span data-dcnode-id="2020" instrument_node="">2. Next, fill the graduated cylinder with 50 milliliters (mL) of water. Pour this into the bottle and mark it off with masking tape, labeling it '50mL'. Repeat this step until the bottle is filled, labeling the amount of water in the bottle each time. </span></p><p data-dcnode-id="2017"><span data-dcnode-id="2018" instrument_node="">3. Now, carefully invert the bottle into the tub or bowl so no water escapes. </span></p><p data-dcnode-id="2015"><span data-dcnode-id="2016" instrument_node="">4. Slip the tubing into the bottle through the opening. </span></p><p data-dcnode-id="2013"><span data-dcnode-id="2014" instrument_node="">5. Note how much water is in the bottle to start. </span></p><p data-dcnode-id="2012"></p><span data-dcnode-id="2011" instrument_node="">

t_node="">

</span><div class="hidden" data-dcnode-id="1923" ng-non-bindable=""><h2 data-dcnode-id="1942" id="section---Troubleshooting"><span data-dcnode-id="1943" instrument_node="">Troubleshooting</span></h2><p data-dcnode-id="1940"><span data-dcnode-id="1941" instrument_node="">During the water displacement method, there should no air to start with in your bottle as this will alter your results. If your volunteers are struggling to blow up the balloon in one breath, have them blow up the balloon before the experiment to stretch it out. This should allow them to expand it easily on the first breath. </span></p><h2 data-dcnode-id="1938" id="section---DiscussionQuestions"><span data-dcnode-id="1939" instrument_node="">Discussion Questions</span></h2><p data-dcnode-id="1936"><span data-dcnode-id="1937" instrument_node="">Was your hypothesis correct? </span></p><p data-dcnode-id="1934"><span data-dcnode-id="1935" instrument_node="">Were the results the same for both methods? Why or why not? </span></p><p data-dcnode-id="1932"><span data-dcnode-id="1933" instrument_node="">Why is it important to try multiple types of tests in science? </span></p><h2 data-dcnode-id="1930" id="section---HowItWorks"><span data-dcnode-id="1931" instrument_node="">How It Works</span></h2><p data-dcnode-id="1926"><b data-dcnode-id="1928"><span data-dcnode-id="1929" instrument_node="">Vital lung capacity</span></b><span data-dcnode-id="1927" instrument_node=""> is the total amount of air a person can exhale after inhalation. It depends on the age of the person, with young people having a greater lung capacity, as well as the amount of cardiovascular exercise they get, lung health and height. People who do more cardiovascular exercise, like running, work their lungs more, building up muscles that are responsible for breathing, thus having a greater lung capacity. People who are taller tend to have larger chest cavities, so they also have bigger lungs, increasing their vital lung capacity. </span></p><p data-dcnode-id="1924"><span data-dcnode-id="1925" instrument_node="">So why measure this in two ways? In science, multiple tests, as well as many subjects, are needed to conclusively prove or disprove a hypothesis. Doing this makes the data more reliable. Think about if you were a detective interviewing suspects about a crime. If one person explained what happened, but another person explained it a different way, you might think one of them is not telling the truth. But, if both people have the same story, it's more likely that's what really happened. More people confirming the same story make it more reliable, just like multiple tests make the data more reliable.</span></p></div><span data-dcnode-id="1922" instrument_node="">
