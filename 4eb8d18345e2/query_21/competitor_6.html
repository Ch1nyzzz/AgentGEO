52Fhow-to-increase-lung-capacity%252F%26via%3Dhabitsguy" rel="nofollow noreferrer noopener" target="_blank"><span class="swp_count swp_hide" data-dcnode-id="864"><span class="iconFiller" data-dcnode-id="865"><span class="spaceManWilly" data-dcnode-id="866"><i class="sw swp_twitter_icon" data-dcnode-id="869"></i><span class="swp_share" data-dcnode-id="867"><span data-dcnode-id="868" instrument_node="">Tweet</span></span></span></span></span></a></div></div><p data-dcnode-id="858"><em data-dcnode-id="859"><span data-dcnode-id="860" instrument_node="">There might be affiliate links on this page, which means we get a small commission of anything you buy. As an Amazon Associate we earn from qualifying purchases. Please do your own research before making any online purchase.</span></em></p><span data-dcnode-id="857" instrument_node="">
</span><p data-dcnode-id="855"><span data-dcnode-id="856" instrument_node="">Do you ever feel like you get short of breath in situations when other people may not?</span></p><span data-dcnode-id="854" instrument_node="">
</span><p data-dcnode-id="852"><span data-dcnode-id="853" instrument_node="">If so, there are several factors that could contribute to this, including the negative effects of smoking, asthma, and COPD.</span></p><span data-dcnode-id="851" instrument_node="">
</span><p data-dcnode-id="849"><span data-dcnode-id="850" instrument_node="">Or maybe you are a runner, swimmer, yoga enthusiast or singer, and have what would be considered “normal” lung capacity. But you want to increase your lung capacity so you can improve in your craft.</span></p><span data-dcnode-id="848" instrument_node="">
</span><p data-dcnode-id="846"><span data-dcnode-id="847" instrument_node="">If either of these is true, one thing you can do is learn how to increase your lung capacity (which refers to the amount of air that your lungs can hold at a time).</span></p><span data-dcnode-id="845" instrument_node="">
</span><p data-dcnode-id="843"><span data-dcnode-id="844" instrument_node="">Your lungs mature in your mid-20s, and as you age, your lung capacity slowly decreases. In this article, I will address ways that you can increase your lung capacity. I include four specific daily lung exercises that you can do even if your schedule is already packed full.</span></p><span data-dcnode-id="842" instrument_node="">
</span><div class="no_bullets contracted" data-dcnode-id="772" id="toc_container" style="width: auto; display: table;"><p class="toc_title" data-dcnode-id="834"><span data-dcnode-id="841" instrument_node="">What You Will Learn</span><span data-dcnode-id="840" instrument_node=""> </span><span class="toc_toggle" data-dcnode-id="835"><span data-dcnode-id="839" instrument_node="">[</span><a data-dcnode-id="837" href="#"><span data-dcnode-id="838" instrument_node="">show</span></a><span data-dcnode-id="836" instrument_node="">]</span></span></p><ul class="toc_list" data-dcnode-id="773" style="display: none;"><li data-dcnode-id="831"><a data-dcnode-id="832" href="#What_Is_Lung_Capacity"><span data-dcnode-id="833" instrument_node="">What Is Lung Capacity?</span></a></li><li data-dcnode-id="828"><a data-dcnode-id="829" href="#Why_Would_You_Want_to_Increase_Your_Lung_Capacity"><span data-dcnode-id="830" instrument_node="">Why Would You Want to Increase Your Lung Capacity?</span></a></li><li data-dcnode-id="812"><a data-dcnode-id="826" href="#Breathing_Exercises_That_Increase_Lung_Capacity"><span data-dcnode-id="827" instrument_node="">Breathing Exercises That Increase Lung Capacity</span></a><ul data-dcnode-id="813"><li data-dcnode-id="823"><a data-dcnode-id="824" href="#1_Diaphragmatic_breathing"><span data-dcnode-id="825" instrument_node="">1. Diaphragmatic breathing</span></a></li><li data-dcnode-id="820"><a data-dcnode-id="821" href="#2_Pursed-lip_breathing"><span data-dcnode-id="822" instrument_node="">2. Pursed-lip breathing</span></a></li><li data-dcnode-id="817"><a data-dcnode-id="818" href="#3_Rib-stretch_exercise"><span data-dcnode-id="819" instrument_node="">3. Rib-stretch exercise</span></a></li><li data-dcnode-id="814"><a data-dcnode-id="815" href="#4_Alternative_nostril_breathing"><span data-dcnode-id="816" instrument_node="">4. Alternative nostril breathing</span></a></li></ul></li><li data-dcnode-id="793"><a data-dcnode-id="810" href="#Five_Additional_Exercises_to_Help_Increase_Your_Lung_Capacity"><span data-dcnode-id="811" instrument_node="">Five Additional Exercises to Help Increase Your Lung Capacity</span></a><ul data-dcnode-id="794"><li data-dcnode-id="807"><a data-dcnode-id="808" href="#1_Standing_toe-touch_stretch"><span data-dcnode-id="809" instrument_node="">1. Standing toe-touch stretch</span></a></li><li data-dcnode-id="804"><a data-dcnode-id="805" href="#2_Aerobics"><span data-dcnode-id="806" instrument_node="">2. Aerobics</span></a></li><li data-dcnode-id="801"><a data-dcnode-id="802" href="#3_Water-based_exercises"><span data-dcnode-id="803" instrument_node="">3. Water-based exercises</span></a></li><li data-dcnode-id="798"><a data-dcnode-id="799" href="#4_Cardio_workouts"><span data-dcnode-id="800" instrument_node="">4. Cardio workouts</span></a></li><li data-dcnode-id="795"><a data-dcnode-id="796" href="#5_Exercising_at_highly_elevated_places"><span data-dcnode-id="797" instrument_node="">5. Exercising at highly elevated places</span></a></li></ul></li><li data-dcnode-id="777"><a data-dcnode-id="791" href="#How_to_increase_lung_capacity_Four_Tools_to_Measure_Your_Breath"><span data-dcnode-id="792" instrument_node="">How to increase lung capacity. Four Tools to Measure Your Breath</span></a><ul data-dcnode-id="778"><li data-dcnode-id="788"><a data-dcnode-id="789" href="#1_Pulse_oximeter"><span data-dcnode-id="790" instrument_node="">1. Pulse oximeter</span></a></li><li data-dcnode-id="785"><a data-dcnode-id="786" href="#2_Urine_pH_strips"><span data-dcnode-id="787" instrument_node="">2. Urine pH strips</span></a></li><li data-dcnode-id="782"><a data-dcnode-id="783" href="#3_Spirometer"><span data-dcnode-id="784" instrument_node="">3. Spirometer</span></a></li><li data-dcnode-id="779"><a data-dcnode-id="780" href="#4_PowerLung_Trainer"><span data-dcnode-id="781" instrument_node="">4. PowerLung Trainer</span></a></li></ul></li><li data-dcnode-id="774"><a data-dcnode-id="775" href="#Start_Increasing_Your_Lung_Capacity"><span data-dcnode-id="776" instrument_node="">Start Increasing Your Lung Capacity</span></a></li></ul></div><span data-dcnode-id="771" instrument_node="">
</span><h2 data-dcnode-id="768"><span data-dcnode-id="769" id="What_Is_Lung_Capacity"><span data-dcnode-id="770" instrument_node="">What Is Lung Capacity?</span></span></h2><span data-dcnode-id="767" instrument_node="">
</span><p data-dcnode-id="765"><span data-dcnode-id="766" instrument_node="">Your total lung capacity refers to the total amount of air that you can hold in your lungs at one time. There are different volumes of air that are normal for different stages of the respiratory cycle, so a normal lung capacity is constantly changing.</span></p><span data-dcnode-id="764" instrument_node="">
</span><p data-dcnode-id="762"><span data-dcnode-id="763" instrument_node="">On average, men have a greater total lung capacity than women do. But most people don't use their entire lung capacity. While at rest, a man’s lungs are able to hold about 1.5 pints of air. A women’s lungs at rest can hold about 0.8 pints.</span></p><span data-dcnode-id="761" instrument_node="">
</span><p data-dcnode-id="759"><span data-dcnode-id="760" instrument_node="">Because people don't typically use their entire lung capacity, this suggests that the lungs are over-qualified to accomplish their everyday job.</span></p><span data-dcnode-id="758" instrument_node="">
</span><p data-dcnode-id="756"><span data-dcnode-id="757" instrument_node="">In fact, people who do not suffer from a chronic lung disease only use about 70% of their total lung capacity when they are doing intense exercise.</span></p><span data-dcnode-id="755" instrument_node="">
</span><p data-dcnode-id="753"><span data-dcnode-id="754" instrument_node="">Tidal breathing refers to inhaling and exhaling during normal and restful breathing. The range of one tidal breath is determined by the depth of a resting breath, and by the end point of exhalation.</span></p><span data-dcnode-id="752" instrument_node="">
</span><p data-dcnode-id="750"><span data-dcnode-id="751" instrument_node="">On average, a newborn's breathing rate is 30-60 breaths each minute. An adult's breathing rate tends to be between 12 and 20 breaths per minute.</span></p><span data-dcnode-id="749" instrument_node="">
</span><h2 data-dcnode-id="746"><span data-dcnode-id="747" id="Why_Would_You_Want_to_Increase_Your_Lung_Capacity"><span data-dcnode-id="748" instrument_node="">Why Would You Want to Increase Your Lung Capacity?</span></span></h2><span data-dcnode-id="745" instrument_node="">
</span><p data-dcnode-id="743"><span data-dcnode-id="744" instrument_node="">There are several reasons why someone may want to increase their lung capacity. Here are a few reasons you might find it useful to build this as a daily habit:</span></p><span data-dcnode-id="742" instrument_node="">
</span><p data-dcnode-id="739" style="font-size:24px"><strong data-dcnode-id="740"><span data-dcnode-id="741" instrument_node="">Improves stamina to help you perform better in whatever sports you engage in, especially swimming and running.</span></strong></p><span data-dcnode-id="738" instrument_node="">
</span><p data-dcnode-id="736"><span data-dcnode-id="737" instrument_node="">This is especially true if you are involved in competitions, but some people just want to create and achieve personal athletic goals.</span></p><span data-dcnode-id="735" instrument_node="">
</span><figure class="wp-block-image" data-dcnode-id="730"><a data-dcnode-id="731" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.developgoodhabits.com/morning-routine-offer" rel="noreferrer noopener" target="_blank"><img alt="" class="wp-image-16168 entered lazyloaded" data-dcnode-id="734" data-lazy-sizes="(max-width: 700px) 100vw, 700px" data-lazy-src="https://www.developgoodhabits.com/wp-content/uploads/2019/09/Morning-Routine-Funnel-Image-Smaller.jpg" data-lazy-srcset="https://www.developgoodhabits.com/wp-content/uploads/2019/09/Morning-Routine-Funnel-Image-Smaller.jpg 700w, https://www.developgoodhabits.com/wp-content/uploads/2019/09/Morning-Routine-Funnel-Image-Smaller-150x77.jpg 150w, https://www.developgoodhabits.com/wp-content/uploads/2019/09/Morning-Routine-Funnel-Image-Smaller-300x154.jpg 300w, https://www.developgoodhabits.com/wp-content/uploads/2019/09/Morning-Routine-Funnel-Image-Smaller-65x33.jpg 65w, https://www.developgoodhabits.com/wp-content/uploads/2019/09/Morning-Routine-Funnel-Image-Smaller-220x113.jpg 220w, https://www.developgoodhabits.com/wp-content/uploads/2019/09/Morning-Routine-Funnel-Image-Smaller-194x100.jpg 194w, https://www.developgoodhabits.com/wp-content/uploads/2019/09/Morning-Routine-Funnel-Image-Smaller-358x184.jpg 358w" data-ll-status="loaded" height="360" sizes="(max-width: 700px) 100vw, 700px" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.developgoodhabits.com/wp-content/uploads/2019/09/Morning-Routine-Funnel-Image-Smaller.jpg&amp;raw" srcset="https://www.developgoodhabits.com/wp-content/uploads/2019/09/Morning-Routine-Funnel-Image-Smaller.jpg 700w, https://www.developgoodhabits.com/wp-content/uploads/2019/09/Morning-Routine-Funnel-Image-Smaller-150x77.jpg 150w, https://www.developgoodhabits.com/wp-content/uploads/2019/09/Morning-Routine-Funnel-Image-Smaller-300x154.jpg 300w, https://www.developgoodhabits.com/wp-content/uploads/2019/09/Morning-Routine-Funnel-Image-Smaller-65x33.jpg 65w, https://www.developgoodhabits.com/wp-content/uploads/2019/09/Morning-Routine-Funnel-Image-Smaller-220x113.jpg 220w, https://www.developgoodhabits.com/wp-content/uploads/2019/09/Morning-Routine-Funnel-Image-Smaller-194x100.jpg 194w, https://www.developgoodhabits.com/wp-content/uploads/2019/09/Morning-Routine-Funnel-Image-Smaller-358x184.jpg 358w" width="700"><noscript data-dcnode-id="732"><span data-dcnode-id="733" instrument_node="">&lt;img width="700" height="360" src="https://www.developgoodhabits.com/wp-content/uploads/2019/09/Morning-Routine-Funnel-Image-Smaller.jpg" alt="" class="wp-image-16168" srcset="https://www.developgoodhabits.com/wp-content/uploads/2019/09/Morning-Routine-Funnel-Image-Smaller.jpg 700w, https://www.developgoodhabits.com/wp-content/uploads/2019/09/Morning-Routine-Funnel-Image-Smaller-150x77.jpg 150w, https://www.developgoodhabits.com/wp-content/uploads/2019/09/Morning-Routine-Funnel-Image-Smaller-300x154.jpg 300w, https://www.developgoodhabits.com/wp-content/uploads/2019/09/Morning-Routine-Funnel-Image-Smaller-65x33.jpg 65w, https://www.developgoodhabits.com/wp-content/uploads/2019/09/Morning-Routine-Funnel-Image-Smaller-220x113.jpg 220w, https://www.developgoodhabits.com/wp-content/uploads/2019/09/Morning-Routine-Funnel-Image-Smaller-194x100.jpg 194w, https://www.developgoodhabits.com/wp-content/uploads/2019/09/Morning-Routine-Funnel-Image-Smaller-358x184.jpg 358w" sizes="(max-width: 700px) 100vw, 700px"&gt;</span></noscript></a></figure><span data-dcnode-id="729" instrument_node="">
</span><p data-dcnode-id="727"><span data-dcnode-id="728" instrument_node="">Either way, athletes are often looking for ways to improve their performance. Increasing lung capacity can certainly help them do that.</span></p><span data-dcnode-id="726" instrument_node="">
</span><p data-dcnode-id="723" style="font-size:24px"><strong data-dcnode-id="724"><span data-dcnode-id="725" instrument_node="">Overcome negative health impacts of smoking, asthma, or chronic obstructive pulmonary disease (COPD).</span></strong></p><span data-dcnode-id="722" instrument_node="">
</span><p data-dcnode-id="720"><span data-dcnode-id="721" instrument_node="">People suffering from pulmonary diseases are limited in what they can do because of their decreased lung capacity.</span></p><span data-dcnode-id="719" instrument_node="">
</span><p data-dcnode-id="717"><span data-dcnode-id="718" instrument_node="">Overcoming this obstacle could help people live life a bit more freely and not be restricted in their activities.</span></p><span data-dcnode-id="716" instrument_node="">
</span><p data-dcnode-id="713" style="font-size:24px"><strong data-dcnode-id="714"><span data-dcnode-id="715" instrument_node="">It helps you with certain skills, like singing or playing an instrument.</span></strong></p><span data-dcnode-id="712" instrument_node="">
</span><p data-dcnode-id="710"><span data-dcnode-id="711" instrument_node="">Singers and people who play wind instruments often want to achieve desensitization of breathlessness by developing better breathing coordination. This helps them get over anxiety about running out of breath while they are performing.</span></p><span data-dcnode-id="709" instrument_node="">
</span><p data-dcnode-id="706" style="font-size:24px"><strong data-dcnode-id="707"><span data-dcnode-id="708" instrument_node="">Prevents various breathing disorders.</span></strong></p><span data-dcnode-id="705" instrument_node="">
</span><p data-dcnode-id="703"><span data-dcnode-id="704" instrument_node="">There are many forms of COPD that can be prevented by having a higher lung capacity. One common disorder is bronchitis. It can be better controlled by those who have a high lung capacity because they are able to perform a more productive cough.</span></p><span data-dcnode-id="702" instrument_node="">
</span><p data-dcnode-id="699" style="font-size:24px"><strong data-dcnode-id="700"><span data-dcnode-id="701" instrument_node="">Ensure every part of your body gets adequate oxygen.</span></strong></p><span data-dcnode-id="698" instrument_node="">
</span><p data-dcnode-id="696"><span data-dcnode-id="697" instrument_node="">The lungs bring oxygen into the body, which provides energy and gets rid of carbon dioxide. When your lungs are healthy and you have a high lung capacity, you keep a larger breathing reserve. This helps your body distribute oxygen appropriately.</span></p><span data-dcnode-id="695" instrument_node="">
</span><p data-dcnode-id="692" style="font-size:24px"><strong data-dcnode-id="693"><span data-dcnode-id="694" instrument_node="">Helps you get restful sleep.</span></strong></p><span data-dcnode-id="691" instrument_node="">
</span><p data-dcnode-id="689"><span data-dcnode-id="690" instrument_node="">Studies have shown that changes in lung capacity influence one's upper airway size and resistance. This has an effect on whether or not someone experiences sleep apnea.</span></p><span data-dcnode-id="688" instrument_node="">
</span><div class="wp-block-image" data-dcnode-id="681"><figure class="aligncenter is-resized" data-dcnode-id="682"><img alt="Learn how to increase lung capacity for exercise with this how to increase lung capacity guide." class="entered lazyloaded" data-dcnode-id="687" data-lazy-src="//www.developgoodhabits.com/wp-content/uploads/2018/03/increase-lung-capacity-sleep-relaxation.jpg" data-ll-status="loaded" height="267" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.developgoodhabits.com/wp-content/uploads/2018/03/increase-lung-capacity-sleep-relaxation.jpg&amp;raw" width="356"><noscript data-dcnode-id="685"><span data-dcnode-id="686" instrument_node="">&lt;img src="//www.developgoodhabits.com/wp-content/uploads/2018/03/increase-lung-capacity-sleep-relaxation.jpg" alt="Learn how to increase lung capacity for exercise with this how to increase lung capacity guide." width="356" height="267"&gt;</span></noscript><figcaption data-dcnode-id="683"><span data-dcnode-id="684" instrument_node=""> Increasing your lung capacity helps you sleep better. </span></figcaption></figure></div><span data-dcnode-id="680" instrument_node="">
</span><p data-dcnode-id="678"><span data-dcnode-id="679" instrument_node="">Continuous positive airway pressure requirements actually decrease when the lung capacity increases.</span></p><span data-dcnode-id="677" instrument_node="">
</span><p data-dcnode-id="674" style="font-size:24px"><strong data-dcnode-id="675"><span data-dcnode-id="676" instrument_node="">Meditation.</span></strong></p><span data-dcnode-id="673" instrument_node="">
</span><p data-dcnode-id="671"><span data-dcnode-id="672" instrument_node="">Breathing is a big part of meditation because you are focusing your attention on your breath. If you can take deeper breaths, this will allow your meditation sessions to become less interrupted.</span></p><span data-dcnode-id="670" instrument_node="">
</span><p data-dcnode-id="667" style="font-size:24px"><strong data-dcnode-id="668"><span data-dcnode-id="669" instrument_node="">Larger lung capacity leads to a longer life.</span></strong></p><span data-dcnode-id="666" instrument_node="">
</span><p data-dcnode-id="664"><span data-dcnode-id="665" instrument_node="">Your lung health may actually be the number one predictor of your lifespan. A reduced amount of oxygen reserves in your lungs can increase your risk of suffering a heart attack and stroke.</span></p><span data-dcnode-id="663" instrument_node="">
</span><h2 data-dcnode-id="660"><span data-dcnode-id="661" id="Breathing_Exercises_That_Increase_Lung_Capacity"><span data-dcnode-id="662" instrument_node="">Breathing Exercises That Increase Lung Capacity</span></span></h2><span data-dcnode-id="659" instrument_node="">
</span><h3 data-dcnode-id="656"><span data-dcnode-id="657" id="1_Diaphragmatic_breathing"><span data-dcnode-id="658" instrument_node="">1. Diaphragmatic breathing</span></span></h3><span data-dcnode-id="655" instrument_node="">
</span><p data-dcnode-id="650"><span data-dcnode-id="654" instrument_node="">Diaphragmatic breathing, which is also known as </span><a aria-label="abdominal breathin (opens in a new tab)" data-dcnode-id="652" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.health.harvard.edu/mind-and-mood/relaxation-techniques-breath-control-helps-quell-errant-stress-response" rel="noreferrer noopener" target="_blank"><span data-dcnode-id="653" instrument_node="">abdominal breathin</span></a><span data-dcnode-id="651" instrument_node="">g, involves contracting the diaphragm muscle in order to make it stronger.</span></p><span data-dcnode-id="649" instrument_node="">
</span><p data-dcnode-id="647"><span data-dcnode-id="648" instrument_node="">To do this type of breathing, begin by lying down on your back and placing one hand on your stomach and one on your chest. If it makes you more comfortable, you can put a pillow or another type of support under your knees.</span></p><span data-dcnode-id="646" instrument_node="">
</span><p data-dcnode-id="644"><span data-dcnode-id="645" instrument_node="">While in this position, breathe in deeply through your nose. Hold your breath for a few seconds before exhaling out of your mouth. As you are exhaling, squeeze your stomach muscles to help get rid of any excess air that is left in your lungs.</span></p><span data-dcnode-id="643" instrument_node="">
</span><p data-dcnode-id="641"><span data-dcnode-id="642" instrument_node="">Repeat this exercise 10 times before sitting up. Once you are sitting up, let your shoulders relax, and straighten your spine while you do some abdominal breathing.</span></p><span data-dcnode-id="640" instrument_node="">
</span><h3 data-dcnode-id="637"><span data-dcnode-id="638" id="2_Pursed-lip_breathing"><span data-dcnode-id="639" instrument_node="">2. Pursed-lip breathing</span></span></h3><span data-dcnode-id="636" instrument_node="">
</span><p data-dcnode-id="631"><span data-dcnode-id="635" instrument_node="">This type of breathing is also known as numbered breathing, and is typically </span><a data-dcnode-id="633" data-lasso-id="22117" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.ncbi.nlm.nih.gov/pmc/articles/PMC4258938/" rel="nofollow noopener noreferrer" target="_blank"><span data-dcnode-id="634" instrument_node="">recommended for people who have COPD</span></a><span data-dcnode-id="632" instrument_node="">. Pursed-lip breathing is one of the easiest ways to control shortness of breath.</span></p><span data-dcnode-id="630" instrument_node="">
</span><p data-dcnode-id="628"><span data-dcnode-id="629" instrument_node="">Doing this exercise provides a quick way to slow down the pace of your breath. Making each breath more effective.</span></p><span data-dcnode-id="627" instrument_node="">
</span><p data-dcnode-id="625"><span data-dcnode-id="626" instrument_node="">To do this, relax your neck and shoulder muscles, and close your mouth. Inhale slowly through your nose for two counts. Then exhale slowly through your mouth with your lips pursed while you count to four. This will help improve ventilation, release any air that is trapped in your lungs, keep your airways open, and slow your breathing rate.</span></p><span data-dcnode-id="624" instrument_node="">
</span><p data-dcnode-id="622"><span data-dcnode-id="623" instrument_node="">You can add some variation to this exercise by putting your hands together and lifting your arms in front of your chest. When you breathe out through your mouth, twist your body to one side and then the other for as long as you are exhaling. Remember to make sure that your exhale lasts twice as long as your inhale.</span></p><span data-dcnode-id="621" instrument_node="">
</span><p data-dcnode-id="619"><span data-dcnode-id="620" instrument_node="">You can also try flexing your elbows and putting your fingers on your shoulders while you inhale. Then, when you are exhaling, do a set of arm circles.</span></p><span data-dcnode-id="618" instrument_node="">
</span><p data-dcnode-id="616"><span data-dcnode-id="617" instrument_node="">Finish this exercise with abdominal breathing for one minute, and complete it with forceful breathing.</span></p><span data-dcnode-id="615" instrument_node="">
</span><h3 data-dcnode-id="612"><span data-dcnode-id="613" id="3_Rib-stretch_exercise"><span data-dcnode-id="614" instrument_node="">3. Rib-stretch exercise</span></span></h3><span data-dcnode-id="611" instrument_node="">
</span><p data-dcnode-id="609"><span data-dcnode-id="610" instrument_node="">The rib-stretch exercise is also referred to as a rib cage stretching exercise. Basically, this is an exercise that improves rib cage flexibility so that your internal intercostal muscles can expand better.</span></p><span data-dcnode-id="608" instrument_node="">
</span><p data-dcnode-id="606"><span data-dcnode-id="607" instrument_node="">This muscle group includes several groups of muscles between the ribs that facilitate the chest's movement. These muscles help promote one's involuntary movement of breath.</span></p><span data-dcnode-id="605" instrument_node="">
</span><p data-dcnode-id="603"><span data-dcnode-id="604" instrument_node="">To do this exercise, stand up straight and exhale all of the air from your lungs. Inhale slowly and fill your lungs with as much air as possible. Hold the air in for about 15 seconds before slowly letting it out. Repeat this three times each day to help increase your lung capacity.</span></p><span data-dcnode-id="602" instrument_node="">
</span><p data-dcnode-id="600"><span data-dcnode-id="601" instrument_node="">To add to this, put your hands on your hips and bend toward one side and then the other. Lift your hands over your head, and put your left hand on the left side of your waist and lean to the left. This will help you stretch out your right side. Repeat this on the other side. Do this a few times before finishing up with some rib-stretch breaths.</span></p><span data-dcnode-id="599" instrument_node="">
</span><h3 data-dcnode-id="596"><span data-dcnode-id="597" id="4_Alternative_nostril_breathing"><span data-dcnode-id="598" instrument_node="">4. Alternative nostril breathing</span></span></h3><span data-dcnode-id="595" instrument_node="">
</span><p data-dcnode-id="593"><span data-dcnode-id="594" instrument_node="">This exercise is also known as lung strengthening pranayama, anuloma viloma, or nadhi sodhana. This type of breathing is relaxed and is used to help relieve nervous system tension and help induce sleep.</span></p><span data-dcnode-id="592" instrument_node="">
</span><p data-dcnode-id="590"><span data-dcnode-id="591" instrument_node="">This type of breathing may also help detoxify the blood, relax the mind, reduce stress, and increase concentration. This is a great breathing practice because it can be done both seated and while lying down.</span></p><span data-dcnode-id="589" instrument_node="">
</span><p data-dcnode-id="587"><span data-dcnode-id="588" instrument_node="">To do this, start by releasing all of the air out of your lungs. Use a finger to block one nostril, and inhale through the other. Inhale into your stomach until you are full of breath. Then, seal your open nostril with another finger and hold the air in your lungs for a moment.</span></p><span data-dcnode-id="586" instrument_node="">
</span><p data-dcnode-id="584"><span data-dcnode-id="585" instrument_node="">Release the finger that is on one nostril, and exhale all of the breath out that you can. Then take a pause and inhale again through the same nostril. Seal both nostrils again.</span></p><span data-dcnode-id="583" instrument_node="">
</span><p data-dcnode-id="581"><span data-dcnode-id="582" instrument_node="">If this is the first time you are trying this exercise, breathe in for four counts, hold your breath for up to eight counts, then exhale for four counts. Do this up to 10 times, and pay attention to how your body begins to relax.</span></p><span data-dcnode-id="580" instrument_node="">
</span><p data-dcnode-id="578"><span data-dcnode-id="579" instrument_node="">This is a type of yoga exercise that can help increase your lung capacity. It may be difficult to do it correctly at first, but practice will definitely make you better.</span></p><span data-dcnode-id="577" instrument_node="">
</span><h2 data-dcnode-id="574"><span data-dcnode-id="575" id="Five_Additional_Exercises_to_Help_Increase_Your_Lung_Capacity"><span data-dcnode-id="576" instrument_node="">Five Additional Exercises to Help Increase Your Lung Capacity</span></span></h2><span data-dcnode-id="573" instrument_node="">
</span><p data-dcnode-id="571"><span data-dcnode-id="572" instrument_node="">Once you get the first four exercises down, you can add in some variety with some additional general exercises that will also help your lung capacity.</span></p><span data-dcnode-id="570" instrument_node="">
</span><h3 data-dcnode-id="567"><span data-dcnode-id="568" id="1_Standing_toe-touch_stretch"><span data-dcnode-id="569" instrument_node="">1. Standing toe-touch stretch</span></span></h3><span data-dcnode-id="566" instrument_node="">
</span><p data-dcnode-id="564"><span data-dcnode-id="565" instrument_node="">The standing toe touch stretch is a powerful breathing exercise that increases your lung capacity and helps you absorb more oxygen.</span></p><span data-dcnode-id="563" instrument_node="">
</span><p data-dcnode-id="561"><span data-dcnode-id="562" instrument_node="">Take a look at the video above to see how to do this exercise, and practice it four times each day.</span></p><span data-dcnode-id="560" instrument_node="">
</span><p data-dcnode-id="559" style="text-align: center;"></p><div class="rll-youtube-player" data-dcnode-id="553" data-id="Xvr5N_Xf6QM" data-query="" data-src="https://www.youtube.com/embed/Xvr5N_Xf6QM"><div data-dcnode-id="554" data-id="Xvr5N_Xf6QM" data-query="" data-src="https://www.youtube.com/embed/Xvr5N_Xf6QM"><img alt="" data-dcnode-id="558" data-lazy-src="https://i.ytimg.com/vi/Xvr5N_Xf6QM/hqdefault.jpg" height="360" width="480"><noscript data-dcnode-id="556"><span data-dcnode-id="557" instrument_node="">&lt;img src="https://i.ytimg.com/vi/ID/hqdefault.jpg" alt="" width="480" height="360"&gt;</span></noscript><button aria-label="play Youtube video" class="play" data-dcnode-id="555"></button></div></div><noscript data-dcnode-id="551"><span data-dcnode-id="552" instrument_node="">&lt;iframe src="https://www.youtube.com/embed/Xvr5N_Xf6QM" allowfullscreen="allowfullscreen" width="560" height="315" frameborder="0"&gt;&lt;/iframe&gt;</span></noscript><p data-dcnode-id="550"></p><span data-dcnode-id="549" instrument_node="">
</span><h3 data-dcnode-id="546"><span data-dcnode-id="547" id="2_Aerobics"><span data-dcnode-id="548" instrument_node="">2. Aerobics</span></span></h3><span data-dcnode-id="545" instrument_node="">
</span><p data-dcnode-id="543"><span data-dcnode-id="544" instrument_node="">Aerobic exercises can greatly help increase lung capacity by helping large groups of muscles move at a rhythmic speed. Aerobics focuses on your heart, lungs, and the endurance of your body.</span></p><span data-dcnode-id="542" instrument_node="">
</span><p data-dcnode-id="540"><span data-dcnode-id="541" instrument_node="">This will help your body use oxygen more efficiently, while also enhancing your breathing. You can get some aerobic exercise in by taking long, fast walks or using a stationary bike.</span></p><span data-dcnode-id="539" instrument_node="">
</span><h3 data-dcnode-id="536"><span data-dcnode-id="537" id="3_Water-based_exercises"><span data-dcnode-id="538" instrument_node="">3. Water-based exercises</span></span></h3><span data-dcnode-id="535" instrument_node="">
</span><p data-dcnode-id="530"><span data-dcnode-id="534" instrument_node="">Exercising in the water </span><a data-dcnode-id="532" data-lasso-id="22118" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.cdc.gov/healthywater/swimming/swimmers/health_benefits_water_exercise.html" rel="nofollow noopener noreferrer" target="_blank"><span data-dcnode-id="533" instrument_node="">makes your body work harder</span></a><span data-dcnode-id="531" instrument_node=""> because it adds resistance, which helps to strengthen your lungs. You can do a lot of different exercises in the water, from simply stretching to lifting weights.</span></p><span data-dcnode-id="529" instrument_node="">
</span><p data-dcnode-id="527"><span data-dcnode-id="528" instrument_node="">It may take a while to get used to exercising in the water, and it is important that the water comes all the way up to your neck so you can get the full benefits. Be sure to take quick breaths to get the most out of this exercise.</span></p><span data-dcnode-id="526" instrument_node="">
</span><div class="wp-block-image" data-dcnode-id="519"><figure class="aligncenter is-resized" data-dcnode-id="520"><img alt="How does running increase lung capacity and other water-based exercises with this how to increase lung capacity guide." data-dcnode-id="525" data-lazy-src="//www.developgoodhabits.com/wp-content/uploads/2018/03/increase-lung-capacity-water-exercise.jpg" height="267" src="data:image/svg+xml,%3Csvg%20xmlns='http://www.w3.org/2000/svg'%20viewBox='0%200%20356%20267'%3E%3C/svg%3E" width="356"><noscript data-dcnode-id="523"><span data-dcnode-id="524" instrument_node="">&lt;img src="//www.developgoodhabits.com/wp-content/uploads/2018/03/increase-lung-capacity-water-exercise.jpg" alt="How does running increase lung capacity and other water-based exercises with this how to increase lung capacity guide." width="356" height="267"&gt;</span></noscript><figcaption data-dcnode-id="521"><span data-dcnode-id="522" instrument_node=""> Exercising in the water helps to strengthen your lungs. </span></figcaption></figure></div><span data-dcnode-id="518" instrument_node="">
</span><h3 data-dcnode-id="515"><span data-dcnode-id="516" id="4_Cardio_workouts"><span data-dcnode-id="517" instrument_node="">4. Cardio workouts</span></span></h3><span data-dcnode-id="514" instrument_node="">
</span><p data-dcnode-id="512"><span data-dcnode-id="513" instrument_node="">Your lung capacity increases a lot with cardio exercises if you do 30 minutes of exercise each day. This is because, when you get tired from doing a fast workout, your lungs have to work harder, which enhances their capacity.</span></p><span data-dcnode-id="511" instrument_node="">
</span><p data-dcnode-id="509"><span data-dcnode-id="510" instrument_node="">There are a lot of options for cardiovascular exercises, including running, biking, and swimming. Just be sure to warm up and cool down before and after you exercise.</span></p><span data-dcnode-id="508" instrument_node="">
</span><h3 data-dcnode-id="505"><span data-dcnode-id="506" id="5_Exercising_at_highly_elevated_places"><span data-dcnode-id="507" instrument_node="">5. Exercising at highly elevated places</span></span></h3><span data-dcnode-id="504" instrument_node="">
</span><p data-dcnode-id="502"><span data-dcnode-id="503" instrument_node="">There is less oxygen available at high altitudes, which makes your lung capacity increase if you exercise. It is important to start slowly because it is difficult to exercise at higher elevations. Allow your body at least two weeks to get used to the altitude.</span></p><span data-dcnode-id="501" instrument_node="">
</span><h2 data-dcnode-id="498"><span data-dcnode-id="499" id="How_to_increase_lung_capacity_Four_Tools_to_Measure_Your_Breath"><span data-dcnode-id="500" instrument_node="">How to increase lung capacity. Four Tools to Measure Your Breath</span></span></h2><span data-dcnode-id="497" instrument_node="">
</span><p data-dcnode-id="495"><span data-dcnode-id="496" instrument_node="">If you want to start working on increasing your lung capacity every day, it may be necessary to purchase a few items to help you during the process. Doing this can help you keep track of your progress.</span></p><span data-dcnode-id="494" instrument_node="">
</span><p data-dcnode-id="492"><span data-dcnode-id="493" instrument_node="">These four items can help you in the process of increasing your lung capacity by allowing you to track how you are doing and which exercises are making the most difference for you.</span></p><span data-dcnode-id="491" instrument_node="">
</span><h3 data-dcnode-id="488"><span data-dcnode-id="489" id="1_Pulse_oximeter"><span data-dcnode-id="490" instrument_node="">1. Pulse oximeter</span></span></h3><span data-dcnode-id="487" instrument_node="">

</span><p data-dcnode-id="312"><span data-dcnode-id="313" instrument_node="">Increasing your lung capacity is beneficial to your health in many ways. It can reduce the side effects of several medical issues, and help improve your performance in aerobic sports such as swimming and running.</span></p><span data-dcnode-id="311" instrument_node="">
</span><p data-dcnode-id="309"><span data-dcnode-id="310" instrument_node="">If you want to try to increase your lung capacity, I recommend trying one or two of these exercises each day and eventually finding a few that you would be able to fit into your daily routine.</span></p><span data-dcnode-id="308" instrument_node="">

</span><p data-dcnode-id="297"><span data-dcnode-id="301" instrument_node="">In fact, as you are looking at your daily routine, consider doing a </span><a data-dcnode-id="299" data-lasso-id="22128" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.developgoodhabits.com/building-habit-stacking-routine/"><span data-dcnode-id="300" instrument_node="">daily habit stack</span></a><span data-dcnode-id="298" instrument_node=""> either in the morning or at night to help improve your overall health and well-being.</span></p><span data-dcnode-id="296" instrument_node="">
