245" id="post-4046" itemscope="" itemtype="https://schema.org/Article"><div class="td-post-header" data-dcnode-id="2826"><header class="td-post-title" data-dcnode-id="2827"><h1 class="entry-title" data-dcnode-id="2829"><span data-dcnode-id="2830" instrument_node="">8 Ways to Increase Lung Capacity For Running</span></h1><div class="td-module-meta-info" data-dcnode-id="2828"></div></header></div><div class="td-post-content" data-dcnode-id="281"><div class="td-post-featured-image" data-dcnode-id="2821"><a class="td-modal-image" data-caption="" data-dcnode-id="2822" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//david-p5bifyxb.netdna-ssl.com/wp-content/uploads/2017/11/Fotolia_176162089_Subscription_Monthly_M.jpg"><img alt="runner tyring to improve Lung Capacity" class="entry-thumb td-animation-stack-type0-1 lazyloaded" data-dcnode-id="2825" data-ll-status="loaded" height="464" sizes="(max-width: 696px) 100vw, 696px" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//david-p5bifyxb.netdna-ssl.com/wp-content/uploads/2017/11/Fotolia_176162089_Subscription_Monthly_M.jpg&amp;raw" srcset="https://david-p5bifyxb.netdna-ssl.com/wp-content/uploads/2017/11/Fotolia_176162089_Subscription_Monthly_M.jpg 1688w, https://david-p5bifyxb.netdna-ssl.com/wp-content/uploads/2017/11/Fotolia_176162089_Subscription_Monthly_M-300x200.jpg 300w, https://david-p5bifyxb.netdna-ssl.com/wp-content/uploads/2017/11/Fotolia_176162089_Subscription_Monthly_M-768x512.jpg 768w, https://david-p5bifyxb.netdna-ssl.com/wp-content/uploads/2017/11/Fotolia_176162089_Subscription_Monthly_M-1024x682.jpg 1024w, https://david-p5bifyxb.netdna-ssl.com/wp-content/uploads/2017/11/Fotolia_176162089_Subscription_Monthly_M-675x450.jpg 675w, https://david-p5bifyxb.netdna-ssl.com/wp-content/uploads/2017/11/Fotolia_176162089_Subscription_Monthly_M-325x217.jpg 325w, https://david-p5bifyxb.netdna-ssl.com/wp-content/uploads/2017/11/Fotolia_176162089_Subscription_Monthly_M-150x100.jpg 150w" title="Run." width="696"><noscript data-dcnode-id="2823"><span data-dcnode-id="2824" instrument_node="">&lt;img width="696" height="464" class="entry-thumb td-modal-image" src="https://david-p5bifyxb.netdna-ssl.com/wp-content/uploads/2017/11/Fotolia_176162089_Subscription_Monthly_M.jpg" srcset="https://david-p5bifyxb.netdna-ssl.com/wp-content/uploads/2017/11/Fotolia_176162089_Subscription_Monthly_M.jpg 1688w, https://david-p5bifyxb.netdna-ssl.com/wp-content/uploads/2017/11/Fotolia_176162089_Subscription_Monthly_M-300x200.jpg 300w, https://david-p5bifyxb.netdna-ssl.com/wp-content/uploads/2017/11/Fotolia_176162089_Subscription_Monthly_M-768x512.jpg 768w, https://david-p5bifyxb.netdna-ssl.com/wp-content/uploads/2017/11/Fotolia_176162089_Subscription_Monthly_M-1024x682.jpg 1024w, https://david-p5bifyxb.netdna-ssl.com/wp-content/uploads/2017/11/Fotolia_176162089_Subscription_Monthly_M-675x450.jpg 675w, https://david-p5bifyxb.netdna-ssl.com/wp-content/uploads/2017/11/Fotolia_176162089_Subscription_Monthly_M-325x217.jpg 325w, https://david-p5bifyxb.netdna-ssl.com/wp-content/uploads/2017/11/Fotolia_176162089_Subscription_Monthly_M-150x100.jpg 150w" sizes="(max-width: 696px) 100vw, 696px" alt="runner tyring to improve Lung Capacity" title="Run."/&gt;</span></noscript></a></div><p data-dcnode-id="2819"><span data-dcnode-id="2820" instrument_node="">Lung capacity is important.</span></p><p data-dcnode-id="2817"><span data-dcnode-id="2818" instrument_node="">It helps determine how well you perform, especially when it comes to cardiovascular exercise like running.</span></p><p data-dcnode-id="2815"><span data-dcnode-id="2816" instrument_node="">Would you like to learn more about how to improve your lung capacity?</span></p><p data-dcnode-id="2813"><span data-dcnode-id="2814" instrument_node="">Then you’ve come to the right place.</span></p><p data-dcnode-id="2811"><span data-dcnode-id="2812" instrument_node="">In today’s post, I’ll get you up to speed on the many measures you can take to increase your lung capacity so you can run farther, faster, and with less fatigue.</span></p><p data-dcnode-id="2809"><span data-dcnode-id="2810" instrument_node="">But first things first, let’s explain what lung capacity is all about.</span></p><h2 data-dcnode-id="2805" style="text-align: center;"><span data-dcnode-id="2806" style="background-color: #ffcc00;"><strong data-dcnode-id="2807"><span data-dcnode-id="2808" instrument_node="">What is Lung Capacity?</span></strong></span></h2><p data-dcnode-id="2803"><span data-dcnode-id="2804" instrument_node="">Lung capacity is basically the total amount of air that the lungs can hold.</span></p><p data-dcnode-id="2801"><span data-dcnode-id="2802" instrument_node="">The greater your lung capacity, the more oxygen that can get into your bloodstream.</span></p><p data-dcnode-id="2799"><span data-dcnode-id="2800" instrument_node="">By improving your lung capacity, you’ll build more stamina, deliver more oxygen to your muscles, and generally feel more powerful and stronger.</span></p><p data-dcnode-id="2797"><span data-dcnode-id="2798" instrument_node="">Just like any other organs, lung function declines with age, your lung capacity typically drops slowly after reaching our 30s.</span></p><p data-dcnode-id="2795"><span data-dcnode-id="2796" instrument_node="">There’s no easy way unless you work on it starts now.</span></p><p data-dcnode-id="2274"><iframe allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture" allowfullscreen="" class="lazyloaded" data-dcnode-id="2277" data-ll-status="loaded" data-rocket-lazyload="fitvidscompatible" frameborder="0" height="281" loading="lazy" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.youtube.com/embed/9VdHhD1vcDU%3Ffeature%3Doembed&amp;raw" title="Lung Function - Lung Volumes and Capacities" width="500"><html data-cast-api-enabled="true" data-dcnode-id="2279" dir="ltr" lang="en"><head data-dcno ackground-color: #ffcc00;"><strong data-dcnode-id="2262"><span data-dcnode-id="2263" instrument_node="">Start Slow</span></strong></span></h3><p data-dcnode-id="2258"><span data-dcnode-id="2259" instrument_node="">Gasping for air while running doesn’t always mean that something’s wrong with your technique.</span></p><p data-dcnode-id="2256"><span data-dcnode-id="2257" instrument_node="">In fact, lack of conditioning is often the cause, especially if you’re a beginner runner.</span></p><p data-dcnode-id="2254"><span data-dcnode-id="2255" instrument_node="">Running deprives your muscles of oxygen.</span></p><p data-dcnode-id="2252"><span data-dcnode-id="2253" instrument_node="">The more you push your body, the more oxygen you’ll need.</span></p><p data-dcnode-id="2250"><span data-dcnode-id="2251" instrument_node="">Keep this going and you’ll get exhausted earlier than you wish.</span></p><p data-dcnode-id="2248"><span data-dcnode-id="2249" instrument_node="">So, how do you take things slow?</span></p><p data-dcnode-id="2246"><span data-dcnode-id="2247" instrument_node="">Keep it to a conversational pace.</span></p><p data-dcnode-id="2244"><span data-dcnode-id="2245" instrument_node="">As a rule, you should be able to speak in full sentences without gasping.</span></p><p data-dcnode-id="2242"><span data-dcnode-id="2243" instrument_node="">Once you can do this for 30-minute straight, work your way up to more challenging sessions.</span></p><p data-dcnode-id="2240"><span data-dcnode-id="2241" instrument_node="">Here are a few options:</span></p><ul data-dcnode-id="2221"><li data-dcnode-id="2236"><strong data-dcnode-id="2238"><span data-dcnode-id="2239" instrument_node="">Run a longer distance at a slower pace</span></strong><span data-dcnode-id="2237" instrument_node="">. This helps increase your red blood cell count, grow more capillaries, and strengthen your heart—it’s a muscle, after all.</span></li><li data-dcnode-id="2232"><strong data-dcnode-id="2234"><span data-dcnode-id="2235" instrument_node="">Run more frequently each week</span></strong><span data-dcnode-id="2233" instrument_node="">. This helps provide your body with enough stimulus to build more cell mitochondria and capillaries. This, in turn, allows more oxygen to course through your bloodstream.</span></li><li data-dcnode-id="2222"><strong data-dcnode-id="2230"><span data-dcnode-id="2231" instrument_node="">Consider cross-training</span></strong><span data-dcnode-id="2229" instrument_node="">. Choose cardiovascular activities such as </span><a data-dcnode-id="2227" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.runnersblueprint.com/cycling-workouts-for-runners/"><span data-dcnode-id="2228" instrument_node="">cycling</span></a><span data-dcnode-id="2226" instrument_node="">, swimming, and skiing that push your </span><a data-dcnode-id="2224" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.runnersblueprint.com/increase-running-endurance/"><span data-dcnode-id="2225" instrument_node="">endurance</span></a><span data-dcnode-id="2223" instrument_node=""> without putting too much stress on your body.</span></li></ul><h3 data-dcnode-id="2218"><strong data-dcnode-id="2219"><span data-dcnode-id="2220" instrument_node="">New to Running? Start Here…</span></strong></h3><p data-dcnode-id="2213"><span data-dcnode-id="2217" instrument_node="">If you’re serious about running, getting fit, and staying injury free, then make sure to download my</span><strong data-dcnode-id="2214"><a data-dcnode-id="2215" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.runnersblueprint.com/EBook/"><span data-dcnode-id="2216" instrument_node="">&nbsp;Runners Blueprint Guide!</span></a></strong></p><p data-dcnode-id="2208"><span data-dcnode-id="2212" instrument_node="">Inside this guide, you’ll learn how to start running and </span><a data-dcnode-id="2210" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.runnersblueprint.com/ways_lose_25_pounds_weight/"><span data-dcnode-id="2211" instrument_node="">lose weight</span></a><span data-dcnode-id="2209" instrument_node=""> weight the easy and painless way. This is, in fact, your ultimate manifesto to becoming a faster and a stronger runner. And you want that, don’t you?</span></p><p data-dcnode-id="2201"><strong data-dcnode-id="2206"><span data-dcnode-id="2207" instrument_node="">&nbsp;</span></strong><strong data-dcnode-id="2203"><a data-dcnode-id="2204" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.runnersblueprint.com/EBook/"><span data-dcnode-id="2205" instrument_node="">Click HERE</span></a></strong><span data-dcnode-id="2202" instrument_node=""> to check out my Runners Blueprint System today!</span></p><p data-dcnode-id="2196"><span data-dcnode-id="2200" instrument_node="">Don’t miss out! My awesome </span><a data-dcnode-id="2198" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.runnersblueprint.com/running-program/"><span data-dcnode-id="2199" instrument_node="">running plan</span></a><span data-dcnode-id="2197" instrument_node=""> is just one click away.</span></p><h3 data-dcnode-id="2192"><span data-dcnode-id="2193" style="background-color: #ffcc00;"><strong data-dcnode-id="2194"><span data-dcnode-id="2195" instrument_node="">Learn Deep Breathing</span></strong></span></h3><p data-dcnode-id="2190"><span data-dcnode-id="2191" instrument_node="">Deep breathing involves using the entire lung capacity by activating all of the muscles in charge of respiration, especially the diaphragm—a muscle group shaped like a jellyfish or a parachute.</span></p><p data-dcnode-id="2188"><span data-dcnode-id="2189" instrument_node="">As you can see in the image, the diaphragm sits below the lungs and divides the torso into the abdominal and thoracic cavities.</span></p><p data-dcnode-id="2186"><span data-dcnode-id="2187" instrument_node="">It’s a soft tissue, so it’s quite flexible.</span></p><p data-dcnode-id="2181"><span data-dcnode-id="2185" instrument_node="">When you </span><a data-dcnode-id="2183" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.runnersblueprint.com/how-to-breathe-while-running/"><span data-dcnode-id="2184" instrument_node="">breathe</span></a><span data-dcnode-id="2182" instrument_node=""> deep, your diaphragm pulls down on the abdominal cavity to completely inflate the lungs, drawing in maximum air.</span></p><p data-dcnode-id="2179"><span data-dcnode-id="2180" instrument_node="">Then, on the exhale, it deflates, squeezing the air out.</span></p><p data-dcnode-id="2174"><a data-dcnode-id="2175" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//david-p5bifyxb.netdna-ssl.com/wp-content/uploads/2019/12/Fotolia_271319095_Subscription_Monthly_M.jpg"><img alt="runner tyring to improve Lung Capacity" class="alignleft wp-image-7575 size-full td-animation-stack-type0-1 lazyloaded" data-dcnode-id="2178" data-ll-status="loaded" height="1125" sizes="(max-width: 1688px) 100vw, 1688px" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//david-p5bifyxb.netdna-ssl.com/wp-content/uploads/2019/12/Fotolia_271319095_Subscription_Monthly_M.jpg&amp;raw" srcset="https://david-p5bifyxb.netdna-ssl.com/wp-content/uploads/2019/12/Fotolia_271319095_Subscription_Monthly_M.jpg 1688w, https://david-p5bifyxb.netdna-ssl.com/wp-content/uploads/2019/12/Fotolia_271319095_Subscription_Monthly_M-300x200.jpg 300w, https://david-p5bifyxb.netdna-ssl.com/wp-content/uploads/2019/12/Fotolia_271319095_Subscription_Monthly_M-1024x682.jpg 1024w, https://david-p5bifyxb.netdna-ssl.com/wp-content/uploads/2019/12/Fotolia_271319095_Subscription_Monthly_M-768x512.jpg 768w, https://david-p5bifyxb.netdna-ssl.com/wp-content/uploads/2019/12/Fotolia_271319095_Subscription_Monthly_M-1536x1024.jpg 1536w, https://david-p5bifyxb.netdna-ssl.com/wp-content/uploads/2019/12/Fotolia_271319095_Subscription_Monthly_M-696x464.jpg 696w, https://david-p5bifyxb.netdna-ssl.com/wp-content/uploads/2019/12/Fotolia_271319095_Subscription_Monthly_M-1068x712.jpg 1068w, https://david-p5bifyxb.netdna-ssl.com/wp-content/uploads/2019/12/Fotolia_271319095_Subscription_Monthly_M-630x420.jpg 630w" width="1688"><noscript data-dcnode-id="2176"><span data-dcnode-id="2177" instrument_node="">&lt;img class="alignleft wp-image-7575 size-full" src="https://david-p5bifyxb.netdna-ssl.com/wp-content/uploads/2019/12/Fotolia_271319095_Subscription_Monthly_M.jpg" alt="runner tyring to improve Lung Capacity" width="1688" height="1125" srcset="https://david-p5bifyxb.netdna-ssl.com/wp-content/uploads/2019/12/Fotolia_271319095_Subscription_Monthly_M.jpg 1688w, https://david-p5bifyxb.netdna-ssl.com/wp-content/uploads/2019/12/Fotolia_271319095_Subscription_Monthly_M-300x200.jpg 300w, https://david-p5bifyxb.netdna-ssl.com/wp-content/uploads/2019/12/Fotolia_271319095_Subscription_Monthly_M-1024x682.jpg 1024w, https://david-p5bifyxb.netdna-ssl.com/wp-content/uploads/2019/12/Fotolia_271319095_Subscription_Monthly_M-768x512.jpg 768w, https://david-p5bifyxb.netdna-ssl.com/wp-content/uploads/2019/12/Fotolia_271319095_Subscription_Monthly_M-1536x1024.jpg 1536w, https://david-p5bifyxb.netdna-ssl.com/wp-content/uploads/2019/12/Fotolia_271319095_Subscription_Monthly_M-696x464.jpg 696w, https://david-p5bifyxb.netdna-ssl.com/wp-content/uploads/2019/12/Fotolia_271319095_Subscription_Monthly_M-1068x712.jpg 1068w, https://david-p5bifyxb.netdna-ssl.com/wp-content/uploads/2019/12/Fotolia_271319095_Subscription_Monthly_M-630x420.jpg 630w" sizes="(max-width: 1688px) 100vw, 1688px" /&gt;</span></noscript></a></p><h3 data-dcnode-id="2170"><span data-dcnode-id="2171" style="background-color: #ffcc00;"><strong data-dcnode-id="2172"><span data-dcnode-id="2173" instrument_node="">Belly Vs. Chest Breathing</span></strong></span></h3><p data-dcnode-id="2168"><span data-dcnode-id="2169" instrument_node="">Most runners tend to breathe from their chest instead of the belly.</span></p><p data-dcnode-id="2166"><span data-dcnode-id="2167" instrument_node="">You don’t believe me? Go run a mile at a challenging pace then place your hand on your belly and the other one your chest then watch.</span></p><p data-dcnode-id="2164"><span data-dcnode-id="2165" instrument_node="">You’re breathing right if the upper hand stays relatively still while the lower hand is moving on each breath, which is more than often not the case.</span></p><p data-dcnode-id="2162"><span data-dcnode-id="2163" instrument_node="">Also known as shallow or thoracic breathing, chest breathing occurs when the act of respiration originates from the top lobes of the lungs.</span></p><p data-dcnode-id="2160"><span data-dcnode-id="2161" instrument_node="">When breathing this way, you expand and contract the chest but without engaging the diaphragm, which in turn, draws in minimal air into the lungs.</span></p><p data-dcnode-id="2158"><span data-dcnode-id="2159" instrument_node="">Here’s how to practice deep breathing in the comfort of your own home.</span></p><p data-dcnode-id="2156"><span data-dcnode-id="2157" instrument_node="">1 –&nbsp; Start out lying flat on your back, chest open and shoulders relaxed.</span></p><p data-dcnode-id="2154"><span data-dcnode-id="2155" instrument_node="">Keep one hand resting on your chest and the other on your belly.</span></p><p data-dcnode-id="2152"><span data-dcnode-id="2153" instrument_node="">2 – Breathe in slowly, spending about ten seconds on your inhale.</span></p><p data-dcnode-id="2150"><span data-dcnode-id="2151" instrument_node="">Visualize your lungs filling up with air.</span></p><p data-dcnode-id="2148"><span data-dcnode-id="2149" instrument_node="">Feel the air moving into your chest, stomach, and abdomen.</span></p><p data-dcnode-id="2146"><span data-dcnode-id="2147" instrument_node="">3 – Once your lungs are full of air (you might feel mild discomfort in the solar plexus middle of your torso), hold your breath for a count of ten, then exhale slowly for ten seconds through pursed lips while pulling your belly button to your spine.</span></p><p data-dcnode-id="2144"><span data-dcnode-id="2145" instrument_node="">And that’s it! By repeating the exercise over and over again, you’ll teach your body how to rely more on the diaphragm for the act of respiration.</span></p><h3 data-dcnode-id="2140"><span data-dcnode-id="2141" style="background-color: #ffcc00;"><strong data-dcnode-id="2142"><span data-dcnode-id="2143" instrument_node="">Breathing Exercises</span></strong></span></h3><p data-dcnode-id="2138"><span data-dcnode-id="2139" instrument_node="">Looking for more breathing exercises? I’ve got you covered.</span></p><p data-dcnode-id="2136"><span data-dcnode-id="2137" instrument_node="">The breathing exercises described below can increase strength in your respiratory muscles and help build endurance.</span></p><p data-dcnode-id="2134"><span data-dcnode-id="2135" instrument_node="">That, in turn, will improve lung function.</span></p><p data-dcnode-id="2132"><span data-dcnode-id="2133" instrument_node="">Long term result?</span></p><p data-dcnode-id="2130"><span data-dcnode-id="2131" instrument_node="">improved running performance.</span></p><p data-dcnode-id="2128"><span data-dcnode-id="2129" instrument_node="">Winner winner, chicken dinner!</span></p><p data-dcnode-id="2126"><span data-dcnode-id="2127" instrument_node="">These breathing exercises are simple and can be done anywhere.</span></p><p data-dcnode-id="2121"><span data-dcnode-id="2125" instrument_node="">Feel free to do them at home, at work, during your commute, or, preferably as a part of your </span><a data-dcnode-id="2123" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//runnersblueprint.com/quick-dynamic-warm-up-exercises-runners/" target="_blank"><span data-dcnode-id="2124" instrument_node="">warm-up</span></a><span d d="m 20,10 0,2 4,0 0,4 2,0 L 26,10 l -6,0 0,0 z" data-dcnode-id="578" id="ytp-id-7"></path></use><path class="ytp-svg-fill" d="m 20,10 0,2 4,0 0,4 2,0 L 26,10 l -6,0 0,0 z" data-dcnode-id="576" id="ytp-id-7"></path></g><g class="ytp-fullscreen-button-corner-2" data-dcnode-id="571"><use class="ytp-svg-shadow" data-dcnode-id="573" href="#ytp-id-8"><path class="ytp-svg-fill" d="m 24,24 -4,0 0,2 L 26,26 l 0,-6 -2,0 0,4 0,0 z" data-dcnode-id="574" id="ytp-id-8"></path></use><path class="ytp-svg-fill" d="m 24,24 -4,0 0,2 L 26,26 l 0,-6 -2,0 0,4 0,0 z" data-dcnode-id="572" id="ytp-id-8"></path></g><g class="ytp-fullscreen-button-corner-3" data-dcnode-id="567"><use class="ytp-svg-shadow" data-dcnode-id="569" href="#ytp-id-9"><path class="ytp-svg-fill" d="M 12,20 10,20 10,26 l 6,0 0,-2 -4,0 0,-4 0,0 z" data-dcnode-id="570" id="ytp-id-9"></path></use><path class="ytp-svg-fill" d="M 12,20 10,20 10,26 l 6,0 0,-2 -4,0 0,-4 0,0 z" data-dcnode-id="568" id="ytp-id-9"></path></g></svg></button></div></div></div></div></div><noscript data-dcnode-id="554"><span data-dcnode-id="555" instrument_node="">&lt;div class="player-unavailable"&gt;&lt;h1 class="message"&gt;An error occurred.&lt;/h1&gt;&lt;div class="submessage"&gt;&lt;a href="https://www.youtube.com/watch?v=vMjTJf4-xz0" target="_blank"&gt;Try watching this video on www.youtube.com&lt;/a&gt;, or enable JavaScript if it is disabled in your browser.&lt;/div&gt;&lt;/div&gt;</span></noscript></body></html></iframe><noscript data-dcnode-id="548"><span data-dcnode-id="549" instrument_node="">&lt;iframe title="How to do belly (diaphragmatic) breathing" width="500" height="281" src="https://www.youtube.com/embed/vMjTJf4-xz0?feature=oembed" frameborder="0" allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture" allowfullscreen&gt;&lt;/iframe&gt;</span></noscript></p><p data-dcnode-id="544"><strong data-dcnode-id="545"><span data-dcnode-id="546" instrument_node="">The 4/7/8 Technique</span></strong></p><p data-dcnode-id="540"><iframe allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture" allowfullscreen="" data-dcnode-id="543" data-lazy-src="https://www.youtube.com/embed/YRPh_GaiL8s?feature=oembed" data-rocket-lazyload="fitvidscompatible" frameborder="0" height="281" loading="lazy" src="about:blank" title="How To Perform the 4-7-8 Breathing Exercise | Andrew Weil, M.D." width="500"></iframe><noscript data-dcnode-id="541"><span data-dcnode-id="542" instrument_node="">&lt;iframe title="How To Perform the 4-7-8 Breathing Exercise | Andrew Weil, M.D." width="500" height="281" src="https://www.youtube.com/embed/YRPh_GaiL8s?feature=oembed" frameborder="0" allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture" allowfullscreen&gt;&lt;/iframe&gt;</span></noscript></p><p data-dcnode-id="537"><strong data-dcnode-id="538"><span data-dcnode-id="539" instrument_node="">Kapalbhati Pranayama (Breath of Fire)</span></strong></p><p data-dcnode-id="533"><iframe allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture" allowfullscreen="" data-dcnode-id="536" data-lazy-src="https://www.youtube.com/embed/bY00OwIjPj8?feature=oembed" data-rocket-lazyload="fitvidscompatible" frameborder="0" height="281" loading="lazy" src="about:blank" title="How To Do Kapalbhati | Pranayama| Breathing | Breath Control" width="500"></iframe><noscript data-dcnode-id="534"><span data-dcnode-id="535" instrument_node="">&lt;iframe title="How To Do Kapalbhati | Pranayama| Breathing | Breath Control" width="500" height="281" src="https://www.youtube.com/embed/bY00OwIjPj8?feature=oembed" frameborder="0" allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture" allowfullscreen&gt;&lt;/iframe&gt;</span></noscript></p><h3 data-dcnode-id="529"><span data-dcnode-id="530" style="background-color: #ffcc00;"><strong data-dcnode-id="531"><span data-dcnode-id="532" instrument_node="">Pilates Exercises</span></strong></span></h3><p data-dcnode-id="527"><span data-dcnode-id="528" instrument_node="">Breaking away from chest breathing is easier said than done, especially when you’re busy running trying to keep the pace.</span></p><p data-dcnode-id="522"><span data-dcnode-id="526" instrument_node="">But it’s not all doom and </span><span data-dcnode-id="524" style="background-color: #ffffff;"><span data-dcnode-id="525" instrument_node="">gloom</span></span><span data-dcnode-id="523" instrument_node="">.</span></p><p data-dcnode-id="517"><span data-dcnode-id="521" instrument_node="">One thing you can to help you practice deep breathing while exercising is doing </span><a data-dcnode-id="519" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//kayahealthclubs.com.au/pilates-classes/" target="_blank"><span data-dcnode-id="520" instrument_node="">reformer pilates</span></a><span data-dcnode-id="518" instrument_node="">.</span></p><p data-dcnode-id="515"><span data-dcnode-id="516" instrument_node="">One thing you can to help you practice deep breathing while exercising is doing Pilates.</span></p><p data-dcnode-id="513"><span data-dcnode-id="514" instrument_node="">Pilates exercises are a form of cross-training that improves endurance without putting too much stress on your body.</span></p><p data-dcnode-id="511"><span data-dcnode-id="512" instrument_node="">They also ideal for improving lung capacity.</span></p><p data-dcnode-id="506"><span data-dcnode-id="510" instrument_node="">Pilate exercises focus on </span><a data-dcnode-id="508" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.runnersblueprint.com/isometric-exercises-runners/"><span data-dcnode-id="509" instrument_node="">isometric</span></a><span data-dcnode-id="507" instrument_node=""> exercise.</span></p><p data-dcnode-id="504"><span data-dcnode-id="505" instrument_node="">It deliberate breathing patterns to increase muscle strength, build mobility, and improve posture.</span></p><p data-dcnode-id="499"><span data-dcnode-id="503" instrument_node="">More specifically, Pilates exercises strengthen all the muscles of the </span><a data-dcnode-id="501" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.runnersblueprint.com/core-exercises-every-runner-should-do/"><span data-dcnode-id="502" instrument_node="">core</span></a><span data-dcnode-id="500" instrument_node="">—including the diaphragm and the intercostal muscles, which are super useful for your breathing.</span></p><p data-dcnode-id="494"><span data-dcnode-id="498" instrument_node="">Practice the exercises below two to three times a week either as a part of your </span><a data-dcnode-id="496" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.runnersblueprint.com/how-to-cool-down-properly-after-a-run/"><span data-dcnode-id="497" instrument_node="">cool down</span></a><span data-dcnode-id="495" instrument_node=""> or as a stand-alone routine.</span></p><p data-dcnode-id="492"><span data-dcnode-id="493" instrument_node="">You might find some similar positions in yoga but with different names.</span></p><p data-dcnode-id="489"><strong data-dcnode-id="490"><span data-dcnode-id="491" instrument_node="">The Swan</span></strong></p><div class="Video" data-dcnode-id="485"><iframe allowfullscreen="allowfullscreen" data-dcnode-id="488" data-lazy-src="https://www.youtube.com/embed/Ab4eTe2R8z4" data-rocket-lazyload="fitvidscompatible" frameborder="0" height="315" loading="lazy" src="about:blank" width="560"></iframe><noscript data-dcnode-id="486"><span data-dcnode-id="487" instrument_node="">&lt;iframe src="https://www.youtube.com/embed/Ab4eTe2R8z4" width="560" height="315" frameborder="0" allowfullscreen="allowfullscreen"&gt;&lt;/iframe&gt;</span></noscript></div><p data-dcnode-id="482"><strong data-dcnode-id="483"><span data-dcnode-id="484" instrument_node="">The Standing Chest Expansion</span></strong></p><div class="Video" data-dcnode-id="478"><iframe allowfullscreen="allowfullscreen" data-dcnode-id="481" data-lazy-src="https://www.youtube.com/embed/C-6y0zXnRjQ" data-rocket-lazyload="fitvidscompatible" frameborder="0" height="315" loading="lazy" src="about:blank" width="560"></iframe><noscript data-dcnode-id="479"><span data-dcnode-id="480" instrument_node="">&lt;iframe src="https://www.youtube.com/embed/C-6y0zXnRjQ" width="560" height="315" frameborder="0" allowfullscreen="allowfullscreen"&gt;&lt;/iframe&gt;</span></noscript></div><p data-dcnode-id="475"><strong data-dcnode-id="476"><span data-dcnode-id="477" instrument_node="">Spine Twist</span></strong></p><div class="Video" data-dcnode-id="471"><iframe allowfullscreen="allowfullscreen" data-dcnode-id="474" data-lazy-src="https://www.youtube.com/embed/XbQzj8rjBbw" data-rocket-lazyload="fitvidscompatible" frameborder="0" height="315" loading="lazy" src="about:blank" width="560"></iframe><noscript data-dcnode-id="472"><span data-dcnode-id="473" instrument_node="">&lt;iframe src="https://www.youtube.com/embed/XbQzj8rjBbw" width="560" height="315" frameborder="0" allowfullscreen="allowfullscreen"&gt;&lt;/iframe&gt;</span></noscript></div><p data-dcnode-id="468"><strong data-dcnode-id="469"><span data-dcnode-id="470" instrument_node="">Breathing While Running</span></strong></p><p data-dcnode-id="466"><span data-dcnode-id="467" instrument_node="">“Should I breathe through my nose, my mouth, or both?” This is a common question in the running world.</span></p><p data-dcnode-id="461"><span data-dcnode-id="465" instrument_node="">My answer makes everybody happy</span><strong data-dcnode-id="463"><span data-dcnode-id="464" instrument_node="">: </span></strong><span data-dcnode-id="462" instrument_node="">use both pathways.</span></p><p data-dcnode-id="459"><span data-dcnode-id="460" instrument_node="">When you’re running, you should focus on getting as much air as possible into your lungs so that the oxygenated blood can meet your muscle’s needs.</span></p><p data-dcnode-id="457"><span data-dcnode-id="458" instrument_node="">Don’t know how to make that happen? Try the following:</span></p><p data-dcnode-id="455"><span data-dcnode-id="456" instrument_node="">Open your mouth—preferably in a “dead fish” position.</span></p><p data-dcnode-id="453"><span data-dcnode-id="454" instrument_node="">The mouth is larger than the nostrils, so, it’s more effective at drawing in oxygen and expelling carbon dioxide.</span></p><h3 data-dcnode-id="449"><span data-dcnode-id="450" style="background-color: #ffcc00;"><strong data-dcnode-id="451"><span data-dcnode-id="452" instrument_node="">Rhythmic Breathing</span></strong></span></h3><p data-dcnode-id="444"><span data-dcnode-id="448" instrument_node="">If you want to </span><a data-dcnode-id="446" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.runnersblueprint.com/secrets-to-running-like-a-pro/"><span data-dcnode-id="447" instrument_node="">run like a pro</span></a><span data-dcnode-id="445" instrument_node="">, try rhythmic breathing, which is the practice of coordinating your inhales and exhales to your foot strikes.</span></p><p data-dcnode-id="442"><span data-dcnode-id="443" instrument_node="">It’s not as complicated as pranayama.</span></p><p data-dcnode-id="440"><span data-dcnode-id="441" instrument_node="">For example, a 2:1 breathing ratio means taking two steps on the inhale, and one step while breathing out.</span></p><p data-dcnode-id="438"><span data-dcnode-id="439" instrument_node="">The exact ratio to follow depends largely on your training intensity, fitness level, speed, and personal preference.</span></p><p data-dcnode-id="436"><span data-dcnode-id="437" instrument_node="">The rhythmic patterns I recommend for beginners are 2:2 and 2:3.</span></p><p data-dcnode-id="434"><span data-dcnode-id="435" instrument_node="">These work well for training at slow to moderate intensity.</span></p><p data-dcnode-id="432"><span data-dcnode-id="433" instrument_node="">To take you breathing power to the next level, I’d recommend taking up yoga.</span></p><p data-dcnode-id="430"><span data-dcnode-id="431" instrument_node="">To get started on the right foot, try a paid subscription service that can cost you up $10 to $15 a month (but worth it).</span></p><p data-dcnode-id="421"><span data-dcnode-id="429" instrument_node="">My favorite is </span><a data-dcnode-id="426" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//%3Ca%20href%3D%22https%3A//shareasale.com/r.cfm%3Fb%3D1627703%26u%3D1168140%26m%3D30960%26urllink%3D%26afftrack%3D%22%3EJoin%20YogaDownload.com%3C/a%3E" rel="noopener noreferrer" target="_blank"><strong data-dcnode-id="427"><span data-dcnode-id="428" instrument_node="">Yoga Download</span></strong></a><span data-dcnode-id="425" instrument_node="">. This subscription service is a treasure trove of online yoga courses for people of all ages and backgrounds. They also provide a specific</span><a data-dcnode-id="423" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//%3Ca%20href%3D%22https%3A//shareasale.com/r.cfm%3Fb%3D398637%26u%3D1168140%26m%3D30960%26urllink%3D%26afftrack%3D%22%3EDownload%20Yoga%20Classes%20For%20Runners%3C/a%3E" rel="noopener noreferrer" target="_blank"><span data-dcnode-id="424" instrument_node=""> yoga program just for runners</span></a><span data-dcnode-id="422" instrument_node="">.</span></p><p data-dcnode-id="416"><a data-dcnode-id="417" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//shareasale.com/r.cfm%3Fb%3D754316%26u%3D1168140%26m%3D30960%26urllink%3D%26afftrack%3D" rel="noopener noreferrer" target="_blank"><img border="0" class="aligncenter td-animation-stack-type0-1" data-dcnode-id="420" data-lazy-src="https://static.shareasale.com/image/30960/200x2001_Summer2015.jpg" src="data:image/svg+xml,%3Csvg%20xmlns='http://www.w3.org/2000/svg'%20viewBox='0%200%200%200'%3E%3C/svg%3E"><noscript data-dcnode-id="418"><span data-dcnode-id="419" instrument_node="">&lt;img class="aligncenter" src="https://static.shareasale.com/image/30960/200x2001_Summer2015.jpg" border="0" /&gt;</span></noscript></a></p><p data-dcnode-id="411"><a data-dcnode-id="412" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//david-p5bifyxb.netdna-ssl.com/wp-content/uploads/2019/12/Fotolia_194999927_Subscription_Monthly_M.jpg"><img alt="runner tyring to improve Lung Capacity" class="alignleft wp-image-7517 size-full td-animation-stack-type0-1" data-dcnode-id="415" data-lazy-sizes="(max-width: 1688px) 100vw, 1688px" data-lazy-src="https://david-p5bifyxb.netdna-ssl.com/wp-content/uploads/2019/12/Fotolia_194999927_Subscription_Monthly_M.jpg" data-lazy-srcset="https://david-p5bifyxb.netdna-ssl.com/wp-content/uploads/2019/12/Fotolia_194999927_Subscription_Monthly_M.jpg 1688w, https://david-p5bifyxb.netdna-ssl.com/wp-content/uploads/2019/12/Fotolia_194999927_Subscription_Monthly_M-300x200.jpg 300w, https://david-p5bifyxb.netdna-ssl.com/wp-content/uploads/2019/12/Fotolia_194999927_Subscription_Monthly_M-1024x682.jpg 1024w, https://david-p5bifyxb.netdna-ssl.com/wp-content/uploads/2019/12/Fotolia_194999927_Subscription_Monthly_M-768x512.jpg 768w, https://david-p5bifyxb.netdna-ssl.com/wp-content/uploads/2019/12/Fotolia_194999927_Subscription_Monthly_M-1536x1024.jpg 1536w, https://david-p5bifyxb.netdna-ssl.com/wp-content/uploads/2019/12/Fotolia_194999927_Subscription_Monthly_M-696x464.jpg 696w, https://david-p5bifyxb.netdna-ssl.com/wp-content/uploads/2019/12/Fotolia_194999927_Subscription_Monthly_M-1068x712.jpg 1068w, https://david-p5bifyxb.netdna-ssl.com/wp-content/uploads/2019/12/Fotolia_194999927_Subscription_Monthly_M-630x420.jpg 630w" height="1125" src="data:image/svg+xml,%3Csvg%20xmlns='http://www.w3.org/2000/svg'%20viewBox='0%200%201688%201125'%3E%3C/svg%3E" width="1688"><noscript data-dcnode-id="413"><span data-dcnode-id="414" instrument_node="">&lt;img class="alignleft wp-image-7517 size-full" src="https://david-p5bifyxb.netdna-ssl.com/wp-content/uploads/2019/12/Fotolia_194999927_Subscription_Monthly_M.jpg" alt="runner tyring to improve Lung Capacity" width="1688" height="1125" srcset="https://david-p5bifyxb.netdna-ssl.com/wp-content/uploads/2019/12/Fotolia_194999927_Subscription_Monthly_M.jpg 1688w, https://david-p5bifyxb.netdna-ssl.com/wp-content/uploads/2019/12/Fotolia_194999927_Subscription_Monthly_M-300x200.jpg 300w, https://david-p5bifyxb.netdna-ssl.com/wp-content/uploads/2019/12/Fotolia_194999927_Subscription_Monthly_M-1024x682.jpg 1024w, https://david-p5bifyxb.netdna-ssl.com/wp-content/uploads/2019/12/Fotolia_194999927_Subscription_Monthly_M-768x512.jpg 768w, https://david-p5bifyxb.netdna-ssl.com/wp-content/uploads/2019/12/Fotolia_194999927_Subscription_Monthly_M-1536x1024.jpg 1536w, https://david-p5bifyxb.netdna-ssl.com/wp-content/uploads/2019/12/Fotolia_194999927_Subscription_Monthly_M-696x464.jpg 696w, https://david-p5bifyxb.netdna-ssl.com/wp-content/uploads/2019/12/Fotolia_194999927_Subscription_Monthly_M-1068x712.jpg 1068w, https://david-p5bifyxb.netdna-ssl.com/wp-content/uploads/2019/12/Fotolia_194999927_Subscription_Monthly_M-630x420.jpg 630w" sizes="(max-width: 1688px) 100vw, 1688px" /&gt;</span></noscript></a></p><h2 data-dcnode-id="407" style="text-align: center;"><span data-dcnode-id="408" style="background-color: #ffcc00;"><strong data-dcnode-id="409"><span data-dcnode-id="410" instrument_node="">Advanced Tactics For Improving Lung Capacity In Runners</span></strong></span></h2><p data-dcnode-id="405"><span data-dcnode-id="406" instrument_node="">By now, you have all the tools you need to improve your lung power while running.</span></p><p data-dcnode-id="403"><span data-dcnode-id="404" instrument_node="">But if you still want more, check out the following.</span></p><h3 data-dcnode-id="399"><span data-dcnode-id="400" style="background-color: #ffcc00;"><strong data-dcnode-id="401"><span data-dcnode-id="402" instrument_node="">Altitude Training</span></strong></span></h3><p data-dcnode-id="397"><span data-dcnode-id="398" instrument_node="">There’s a reason elite athletes from different sports do altitude training—It freaking works.</span></p><p data-dcnode-id="395"><span data-dcnode-id="396" instrument_node="">Here’s why: At higher elevation, the air contains less oxygen.</span></p><p data-dcnode-id="393"><span data-dcnode-id="394" instrument_node="">This forces the body to compensate by triggering red blood cells and hemoglobin production.</span></p><p data-dcnode-id="391"><span data-dcnode-id="392" instrument_node="">The higher count of these substances increases your blood oxygen-carrying capacity, as well as your body’s ability to use oxygen and convert it into energy.</span></p><p data-dcnode-id="389"><span data-dcnode-id="390" instrument_node="">Once you’re back to low elevation, your body maintains its increased level of red blood cells and hemoglobin for up to two weeks.</span></p><h3 data-dcnode-id="385"><span data-dcnode-id="386" style="background-color: #ffcc00;"><strong data-dcnode-id="387"><span data-dcnode-id="388" instrument_node="">Be Careful</span></strong></span></h3><p data-dcnode-id="383"><span data-dcnode-id="384" instrument_node="">The moment you start altitude training, you’ll experience symptoms of altitude sickness, including gasping, fatigue, and dizziness.</span></p><p data-dcnode-id="381"><span data-dcnode-id="382" instrument_node="">As a general rule, give your body at least a couple of weeks to get used to the thinner mixture of oxygen in the air.</span></p><p data-dcnode-id="379"><span data-dcnode-id="380" instrument_node="">If you feel you can’t go on, stop, don’t force it.</span></p><p data-dcnode-id="377"><span data-dcnode-id="378" instrument_node="">Altitude training is not a show-off exercise because it can damage your respiratory tract if you do too much too soon.</span></p><h3 data-dcnode-id="373"><span data-dcnode-id="374" style="background-color: #ffcc00;"><strong data-dcnode-id="375"><span data-dcnode-id="376" instrument_node="">Respiratory Training Equipment</span></strong></span></h3><p data-dcnode-id="371"><span data-dcnode-id="372" instrument_node="">Also known as hypoxia or restricted breathing, this is an endurance building strategy that elite athletes use to challenge their lung power without braving elevation.</span></p><p data-dcnode-id="367"><span data-dcnode-id="370" instrument_node="">Hypoxia training works by partially blocking airways</span><strong data-dcnode-id="368"><span data-dcnode-id="369" instrument_node="">. </span></strong></p><p data-dcnode-id="365"><span data-dcnode-id="366" instrument_node="">This makes your normal breathing restrictive, which simulates high altitude training.</span></p><p data-dcnode-id="359"><br data-dcnode-id="362"><span data-dcnode-id="361" instrument_node=""> </span></p><p data-dcnode-id="357"><span data-dcnode-id="358" instrument_node="">Some tools include:</span></p><ul data-dcnode-id="346"><li data-dcnode-id="355"><span data-dcnode-id="356" instrument_node="">Hyperbaric sleeping chambers</span></li><li data-dcnode-id="353"><span data-dcnode-id="354" instrument_node="">Low-oxygen tents</span></li><li data-dcnode-id="351"><span data-dcnode-id="352" instrument_node="">Swimming while using a snorkel with restricted airflow</span></li><li data-dcnode-id="349"><span data-dcnode-id="350" instrument_node="">Working out with a hypoxic air generator</span></li><li data-dcnode-id="347"><span data-dcnode-id="348" instrument_node="">Portable hypoxic machines</span></li></ul><p data-dcnode-id="344"><span data-dcnode-id="345" instrument_node="">There’s one important caveat.</span></p><p data-dcnode-id="342"><span data-dcnode-id="343" instrument_node="">It’s neither easy nor cheap to get access to some of these tools.</span></p><p data-dcnode-id="340"><span data-dcnode-id="341" instrument_node="">A good hypoxic mask may be within your budget—they retail for under $100.</span></p><p data-dcnode-id="338"><span data-dcnode-id="339" instrument_node="">You also risk overtraining when you overuse them.</span></p><p data-dcnode-id="336"><span data-dcnode-id="337" instrument_node="">That’s why, unless you’re pro athlete making a living out of running, I don’t see any reason to turn to hypoxia training.</span></p><h3 data-dcnode-id="332"><span data-dcnode-id="333" style="background-color: #ffcc00;"><strong data-dcnode-id="334"><span data-dcnode-id="335" instrument_node="">Keep Your Lungs Healthy</span></strong></span></h3><p data-dcnode-id="330"><span data-dcnode-id="331" instrument_node="">All of the above tips will be of no use if you neglect your lung health.</span></p><p data-dcnode-id="328"><span data-dcnode-id="329" instrument_node="">In the end, the best thing you can do to improve your lung function is to simply take good care of your lungs.</span></p><p data-dcnode-id="326"><span data-dcnode-id="327" instrument_node="">The following tips will help keep your lungs as healthy as possible.</span></p><ul data-dcnode-id="306"><li data-dcnode-id="322"><strong data-dcnode-id="324"><span data-dcnode-id="325" instrument_node="">Stop smoking.</span></strong><span data-dcnode-id="323" instrument_node=""> Unless you’ve been living under a rock for the last 40 years, you already know that smoking is bad for your health.&nbsp; research has shown that smoking is a major cause of lung cancer, lung diseases, and chronic obstructive pulmonary diseases (COPD).</span></li><li data-dcnode-id="315"><strong data-dcnode-id="320"><span data-dcnode-id="321" instrument_node="">Eat healthily. </span></strong><span data-dcnode-id="319" instrument_node="">Choose </span><a data-dcnode-id="317" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.runnersblueprint.com/foods-for-runners/"><span data-dcnode-id="318" instrument_node="">foods</span></a><span data-dcnode-id="316" instrument_node=""> rich in antioxidants such as leafy green and cruciferous vegetables. They contain many healthy compounds that can help rid your body of harmful toxins. Broccoli, cabbage, and cauliflower are good examples.</span></li><li data-dcnode-id="311"><strong data-dcnode-id="313"><span data-dcnode-id="314" instrument_node="">Get vaccinated.</span></strong><span data-dcnode-id="312" instrument_node=""> I’m not gonna argue about vaccines’ pros and cons but we didn’t get rid of polio by accident. Shots like the pneumonia vaccine and the flu vaccine can go a long way in preventing lung-related issues and promoting overall health. Make sure to contact your GP before deciding.</span></li><li data-dcnode-id="307"><strong data-dcnode-id="309"><span data-dcnode-id="310" instrument_node="">Improve air quality.</span></strong><span data-dcnode-id="308" instrument_node=""> By keeping your home well-ventilated, reducing pollutants like artificial fragrances, use a humidifier, and getting rid of mold.</span></li></ul><h4 data-dcnode-id="303"><strong data-dcnode-id="304"><span data-dcnode-id="305" instrument_node="">Conclusion</span></strong></h4><p data-dcnode-id="301"><span data-dcnode-id="302" instrument_node="">The tips shared here can definitely improve your lung capacity and help you run more efficiently.</span></p><p data-dcnode-id="296"><strong data-dcnode-id="299"><span data-dcnode-id="300" instrument_node="">Don’t Hesitate to </span></strong><strong data-dcnode-id="297"><span data-dcnode-id="298" instrument_node="">Seek Medical Help</span></strong></p><p data-dcnode-id="294"><span data-dcnode-id="295" instrument_node="">If you’re dealing with symptoms of poor lung health, such as pain when breathing, shortness of breath during daily activity, or persistent coughs, contact your doctor.</span></p><p data-dcnode-id="292"><span data-dcnode-id="293" instrument_node="">The earlier you received treatment to your lung problems, the sooner you’ll heal, and the better the outcomes is likely to be.</span></p><p data-dcnode-id="290"><span data-dcnode-id="291" instrument_node="">Remember that your lung consists of pocketed air sacs, so be careful.</span></p><p data-dcnode-id="288"><span data-dcnode-id="289" instrument_node="">Don’t dismiss everything as simple as a common cold.</span></p><p data-dcnode-id="286"><span data-dcnode-id="287" instrument_node="">What’s more?</span></p><p data-dcnode-id="284"><span data-dcnode-id="285" instrument_node="">It’s always a good idea to consult your doctor before trying any new exercise, especially running.</span></p><p data-dcnode-id="282"><span data-dcnode-id="283" instrument_node="">This is especially the case for beginner runners with underlying health conditions, such as COPD or other obstruction diseases.</span></p></div><footer data-dcnode-id="246"><div class="td-post-source-tags" data-dcnode-id="280"></div><div class="td-block-row td-post-next-prev" data-dcnode-id="266"><div class="td-block-span6 td-post-prev-post" data-dcnode-id="274"><div class="td-post-next-prev-content" data-dcnode-id="275"><span data-dcnode-id="278"><span data-dcnode-id="279" instrument_node="">Previous article</span></span><a data-dcnode-id="276" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.runnersblueprint.com/running-cadence/"><span data-dcnode-id="277" instrument_node="">Running Cadence – What’s The Ideal Stride Turnover</span></a></div></div><div class="td-next-prev-separator" data-dcnode-id="273"></div><div class="td-block-span6 td-post-next-post" data-dcnode-id="267"><div class="td-post-next-prev-content" data-dcnode-id="268"><span data-dcnode-id="271"><span data-dcnode-id="272" instrument_node="">Next article</span></span><a data-dcnode-id="269" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.runnersblueprint.com/get-rid-of-shin-splints/"><span data-dcnode-id="270" instrument_node="">How to Get Rid of Shin Splints – 9 Simple Ways</span>
