</span><p data-dcnode-id="1201"><span data-dcnode-id="1205" instrument_node="">Knowing how to increase lung capacity for running  – </span><em data-dcnode-id="1203"><span data-dcnode-id="1204" instrument_node="">or rather, aerobic capacity, as we’ll discuss</span></em><span data-dcnode-id="1202" instrument_node=""> – can help you make some quick gains when you’re starting out on your running journey.   </span></p><span data-dcnode-id="1200" instrument_node="">
</span><p data-dcnode-id="1198"><span data-dcnode-id="1199" instrument_node="">It plays a crucial role in our ability to run continuously, and without decent aerobic capacity you’d never get that far without having to stop to walk.</span></p><span data-dcnode-id="1197" instrument_node="">
</span><p data-dcnode-id="1195"><span data-dcnode-id="1196" instrument_node="">In a perfect world, we would all have the lungs of Olympic athletes. You just picture yourself gliding over the finish line with ease, right?</span></p><span data-dcnode-id="1194" instrument_node="">
</span><p data-dcnode-id="1186"><span data-dcnode-id="1193" instrument_node="">But if you clicked on this article, chances are you might be more in the “</span><em data-dcnode-id="1191"><span data-dcnode-id="1192" instrument_node="">huffing and puffing</span></em><span data-dcnode-id="1190" instrument_node="">” stage than the “</span><em data-dcnode-id="1188"><span data-dcnode-id="1189" instrument_node="">never break a sweat</span></em><span data-dcnode-id="1187" instrument_node="">” stage.&nbsp;</span></p><span data-dcnode-id="1185" instrument_node="">
</span><p data-dcnode-id="1183"><span data-dcnode-id="1184" instrument_node="">Don’t worry. We’ve got you.</span></p><span data-dcnode-id="1182" instrument_node="">
</span><p data-dcnode-id="1180"><span data-dcnode-id="1181" instrument_node="">In this article, we’re going to look at:</span></p><span data-dcnode-id="1179" instrument_node="">
</span><ul data-dcnode-id="1176"><li data-dcnode-id="1177"><span data-dcnode-id="1178" instrument_node="">How much lung capacity actually matters for runners (whether newbies or marathon runners),</span></li></ul><span data-dcnode-id="1175" instrument_node="">
</span><ul data-dcnode-id="1172"><li data-dcnode-id="1173"><span data-dcnode-id="1174" instrument_node="">Whether or not lung capacity is really a limiting factor in your running performance, </span></li></ul><span data-dcnode-id="1171" instrument_node="">
</span><ul data-dcnode-id="1165"><li data-dcnode-id="1166"><span data-dcnode-id="1170" instrument_node="">Why </span><strong data-dcnode-id="1168"><span data-dcnode-id="1169" instrument_node="">aerobic capacity</span></strong><span data-dcnode-id="1167" instrument_node=""> is the metric you really want to think about,</span></li></ul><span data-dcnode-id="1164" instrument_node="">
</span><ul data-dcnode-id="1161"><li data-dcnode-id="1162"><span data-dcnode-id="1163" instrument_node="">The breathing exercises you can do now to help your lungs and aerobic capacity.</span></li></ul><span data-dcnode-id="1160" instrument_node="">
</span><p data-dcnode-id="1158"><span data-dcnode-id="1159" instrument_node="">Ready?</span></p><span data-dcnode-id="1157" instrument_node="">
</span><p data-dcnode-id="1155"><span data-dcnode-id="1156" instrument_node="">Let’s jump in!</span></p><span data-dcnode-id="1154" instrument_node="">
</span><div class="wp-block-image" data-dcnode-id="1146"><figure class="aligncenter size-large is-resized" data-dcnode-id="1147"><picture class="wp-image-26085 sp-no-webp" data-dcnode-id="1148" title="How To Increase Lung Capacity for Running 1"><source data-dcnode-id="1153" data-sizes="(max-width: 512px) 100vw, 512px" data-srcset="https://marathonhandbook.com/wp-content/uploads/2021/01/How-To-Increase-Lung-Capacity-for-Running-Pin-683x1024.webp 683w,https://marathonhandbook.com/wp-content/uploads/2021/01/How-To-Increase-Lung-Capacity-for-Running-Pin-200x300.webp 200w,https://marathonhandbook.com/wp-content/uploads/2021/01/How-To-Increase-Lung-Capacity-for-Running-Pin-300x450.webp 300w,https://marathonhandbook.com/wp-content/uploads/2021/01/How-To-Increase-Lung-Capacity-for-Running-Pin-600x900.webp 600w,https://marathonhandbook.com/wp-content/uploads/2021/01/How-To-Increase-Lung-Capacity-for-Running-Pin.webp 1000w" sizes="(max-width: 512px) 100vw, 512px" srcset="https://marathonhandbook.com/wp-content/uploads/2021/01/How-To-Increase-Lung-Capacity-for-Running-Pin-683x1024.webp 683w,https://marathonhandbook.com/wp-content/uploads/2021/01/How-To-Increase-Lung-Capacity-for-Running-Pin-200x300.webp 200w,https://marathonhandbook.com/wp-content/uploads/2021/01/How-To-Increase-Lung-Capacity-for-Running-Pin-300x450.webp 300w,https://marathonhandbook.com/wp-content/uploads/2021/01/How-To-Increase-Lung-Capacity-for-Running-Pin-600x900.webp 600w,https://marathonhandbook.com/wp-content/uploads/2021/01/How-To-Increase-Lung-Capacity-for-Running-Pin.webp 1000w" type="image/webp"><source data-dcnode-id="1152" data-sizes="(max-width: 512px) 100vw, 512px" data-srcset="https://marathonhandbook.com/wp-content/uploads/2021/01/How-To-Increase-Lung-Capacity-for-Running-Pin-683x1024.jpg 683w, https://marathonhandbook.com/wp-content/uploads/2021/01/How-To-Increase-Lung-Capacity-for-Running-Pin-200x300.jpg 200w, https://marathonhandbook.com/wp-content/uploads/2021/01/How-To-Increase-Lung-Capa athonhandbook.com/wp-content/uploads/2021/01/How-To-Increase-Lung-Capacity-for-Running-Pin-683x1024.jpg&amp;raw" srcset="https://marathonhandbook.com/wp-content/uploads/2021/01/How-To-Increase-Lung-Capacity-for-Running-Pin-683x1024.jpg 683w, https://marathonhandbook.com/wp-content/uploads/2021/01/How-To-Increase-Lung-Capacity-for-Running-Pin-200x300.jpg 200w, https://marathonhandbook.com/wp-content/uploads/2021/01/How-To-Increase-Lung-Capacity-for-Running-Pin-300x450.jpg 300w, https://marathonhandbook.com/wp-content/uploads/2021/01/How-To-Increase-Lung-Capacity-for-Running-Pin-600x900.jpg 600w, https://marathonhandbook.com/wp-content/uploads/2021/01/How-To-Increase-Lung-Capacity-for-Running-Pin.jpg 1000w" title="How To Increase Lung Capacity for Running 1" width="512"><noscript data-dcnode-id="1149"><span data-dcnode-id="1150" instrument_node="">&lt;img src="https://marathonhandbook.com/wp-content/uploads/2021/01/How-To-Increase-Lung-Capacity-for-Running-Pin-683x1024.jpg" class="wp-image-26085 sp-no-webp" title="How To Increase Lung Capacity for Running 1" alt="how to increase lung capacity for running" height="768" width="512" srcset="https://marathonhandbook.com/wp-content/uploads/2021/01/How-To-Increase-Lung-Capacity-for-Running-Pin-683x1024.jpg 683w, https://marathonhandbook.com/wp-content/uploads/2021/01/How-To-Increase-Lung-Capacity-for-Running-Pin-200x300.jpg 200w, https://marathonhandbook.com/wp-content/uploads/2021/01/How-To-Increase-Lung-Capacity-for-Running-Pin-300x450.jpg 300w, https://marathonhandbook.com/wp-content/uploads/2021/01/How-To-Increase-Lung-Capacity-for-Running-Pin-600x900.jpg 600w, https://marathonhandbook.com/wp-content/uploads/2021/01/How-To-Increase-Lung-Capacity-for-Running-Pin.jpg 1000w" sizes="(max-width: 512px) 100vw, 512px"&gt;</span></noscript></picture></figure></div><span data-dcnode-id="1145" instrument_node="">
</span><div class="content_hint" data-dcnode-id="1144"></div><span data-dcnode-id="1143" instrument_node="">
</span><h2 data-dcnode-id="1141"><span data-dcnode-id="1142" instrument_node="">How Much Does Lung Capacity Matter For Running?</span></h2><span data-dcnode-id="1140" instrument_node="">
</span><p data-dcnode-id="1138"><span data-dcnode-id="1139" instrument_node="">What I’m about to say may surprise you.</span></p><span data-dcnode-id="1137" instrument_node="">
</span><p data-dcnode-id="1130"><em data-dcnode-id="1131"><strong data-dcnode-id="1132"><span data-dcnode-id="1136" instrument_node="">When it comes to distance running like </span><a class="rank-math-link" data-dcnode-id="1134" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//marathonhandbook.com/marathon/"><span data-dcnode-id="1135" instrument_node="">marathon running</span></a><span data-dcnode-id="1133" instrument_node="">, a high lung capacity is actually not as essential as you think.</span></strong></em></p><span data-dcnode-id="1129" instrument_node="">
</span><p data-dcnode-id="1127"><span data-dcnode-id="1128" instrument_node="">It’s easy to make this mistake. When you’re doubled over and fighting for breath, it feels like you need more air, right?</span></p><span data-dcnode-id="1126" instrument_node="">
</span><p data-dcnode-id="1123"><em data-dcnode-id="1124"><span data-dcnode-id="1125" instrument_node="">Not so fast.&nbsp;</span></em></p><span data-dcnode-id="1122" instrument_node="">
</span><p data-dcnode-id="1115"><span data-dcnode-id="1121" instrument_node="">Dr. Todd Buckingham, an </span><a data-dcnode-id="1119" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.maryfreebed.com/" onclick="javascript:window.open('https://www.maryfreebed.com/'); return false;" rel="noopener"><span data-dcnode-id="1120" instrument_node="">exercise physiologist</span></a><span data-dcnode-id="1118" instrument_node=""> and world champion triathlete, asserts that </span><strong data-dcnode-id="1116"><span data-dcnode-id="1117" instrument_node="">the lungs are actually overdeveloped for a runner’s needs.&nbsp;</span></strong></p><span data-dcnode-id="1114" instrument_node="">
</span><p data-dcnode-id="1099"><span data-dcnode-id="1113" instrument_node="">“</span><em data-dcnode-id="1111"><span data-dcnode-id="1112" instrument_node="">Unless you are one of the best runners in the world</span></em><span data-dcnode-id="1110" instrument_node="">,” he says, “</span><em data-dcnode-id="1106"><strong data-dcnode-id="1108"><span data-dcnode-id="1109" instrument_node="">Your lung capacity is not a limiting factor in your running performance</span></strong><span data-dcnode-id="1107" instrument_node="">. </span></em><strong data-dcnode-id="1101"><span class="tadv-background-color" data-dcnode-id="1102" style="background-color:#fff200"><em data-dcnode-id="1104"><span data-dcnode-id="1105" instrument_node="">Your ability to transport and utilize oxygen is your problem</span></em><span data-dcnode-id="1103" instrument_node="">.</span></span></strong><span data-dcnode-id="1100" instrument_node="">”</span></p><span data-dcnode-id="1098" instrument_node="">
</span><p data-dcnode-id="1093"><span data-dcnode-id="1097" instrument_node="">His math checks out, according to the </span><a class="rank-math-link" data-dcnode-id="1095" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.lung.org/lung-health-diseases/how-lungs-work/lung-capacity-and-aging" onclick="javascript:window.open('https://www.lung.org/lung-health-diseases/how-lungs-work/lung-capacity-and-aging'); return false;" rel="noopener"><span data-dcnode-id="1096" instrument_node="">American Lung Association</span></a><span data-dcnode-id="1094" instrument_node="">. They tell us the average adult lung capacity is 6 liters (a little over 1.5 gallons). </span></p><span data-dcnode-id="1092" instrument_node="">
</span><p data-dcnode-id="1090"><span data-dcnode-id="1091" instrument_node="">So at rest, a normal breath takes only half a liter. When exercising, a breath is 2.5-4 liters each.</span></p><span data-dcnode-id="1089" instrument_node="">
</span><div class="content_hint" data-dcnode-id="1088"></div><span data-dcnode-id="1087" instrument_node="">
</span><h3 data-dcnode-id="1085"><span data-dcnode-id="1086" instrument_node="">How This Affects a Runner’s Lung Capacity</span></h3><span data-dcnode-id="1084" instrument_node="">

" width="1024"><noscript data-dcnode-id="1079"><span data-dcnode-id="1080" instrument_node="">&lt;img src="https://marathonhandbook.com/wp-content/uploads/2021/01/How-To-Increase-Lung-Capacity-for-Running-2-1024x643.jpg" class="wp-image-26088 sp-no-webp" title="How To Increase Lung Capacity for Running 2" alt="How To Increase Lung Capacity for Running" height="643" width="1024" srcset="https://marathonhandbook.com/wp-content/uploads/2021/01/How-To-Increase-Lung-Capacity-for-Running-2-1024x643.jpg 1024w, https://marathonhandbook.com/wp-content/uploads/2021/01/How-To-Increase-Lung-Capacity-for-Running-2-300x189.jpg 300w, https://marathonhandbook.com/wp-content/uploads/2021/01/How-To-Increase-Lung-Capacity-for-Running-2-600x377.jpg 600w, https://marathonhandbook.com/wp-content/uploads/2021/01/How-To-Increase-Lung-Capacity-for-Running-2.jpg 1200w" sizes="(max-width: 1024px) 100vw, 1024px"&gt;</span></noscript></picture></figure></div><span data-dcnode-id="1075" instrument_node="">
</span><p data-dcnode-id="1072"><strong data-dcnode-id="1073"><span data-dcnode-id="1074" instrument_node="">Our lungs have the capacity to hold 1.5-2 liters more air than we use.&nbsp;</span></strong></p><span data-dcnode-id="1071" instrument_node="">
</span><p data-dcnode-id="1067"><em data-dcnode-id="1069"><span data-dcnode-id="1070" instrument_node="">You’re definitely getting enough air.</span></em><span data-dcnode-id="1068" instrument_node=""> So what’s really the issue?</span></p><span data-dcnode-id="1066" instrument_node="">
</span><p data-dcnode-id="1064"><span data-dcnode-id="1065" instrument_node="">There are a lot more processes going on behind the scenes.&nbsp;</span></p><span data-dcnode-id="1063" instrument_node="">
</span><p data-dcnode-id="1060"><strong data-dcnode-id="1061"><span data-dcnode-id="1062" instrument_node="">Here’s what happens each time you breathe:</span></strong></p><span data-dcnode-id="1059" instrument_node="">
</span><ol data-dcnode-id="1027"><li data-dcnode-id="1054"><span data-dcnode-id="1058" instrument_node="">You take in </span><strong data-dcnode-id="1056"><span data-dcnode-id="1057" instrument_node="">oxygen</span></strong><span data-dcnode-id="1055" instrument_node=""> (among other gases).</span></li><li data-dcnode-id="1046"><span data-dcnode-id="1053" instrument_node="">The oxygen </span><strong data-dcnode-id="1051"><span data-dcnode-id="1052" instrument_node="">diffuses from your lungs</span></strong><span data-dcnode-id="1050" instrument_node=""> to the </span><strong data-dcnode-id="1048"><span data-dcnode-id="1049" instrument_node="">lungs’ blood vessels</span></strong><span data-dcnode-id="1047" instrument_node="">.</span></li><li data-dcnode-id="1038"><span data-dcnode-id="1045" instrument_node="">The oxygen is </span><strong data-dcnode-id="1043"><span data-dcnode-id="1044" instrument_node="">moved to the leg muscles</span></strong><span data-dcnode-id="1042" instrument_node=""> by your </span><strong data-dcnode-id="1040"><span data-dcnode-id="1041" instrument_node="">red blood cells</span></strong><span data-dcnode-id="1039" instrument_node="">.</span></li><li data-dcnode-id="1033"><span data-dcnode-id="1037" instrument_node="">The oxygen</span><strong data-dcnode-id="1035"><span data-dcnode-id="1036" instrument_node=""> diffuses from the blood to the muscle</span></strong><span data-dcnode-id="1034" instrument_node="">.</span></li><li data-dcnode-id="1028"><span data-dcnode-id="1032" instrument_node="">Your body </span><strong data-dcnode-id="1030"><span data-dcnode-id="1031" instrument_node="">converts the oxygen to ATP</span></strong><span data-dcnode-id="1029" instrument_node=""> (energy) in your mitochondria.</span></li></ol><span data-dcnode-id="1026" instrument_node="">
</span><p data-dcnode-id="1024"><span data-dcnode-id="1025" instrument_node="">That’s a lot going on, right? As you can see, creating energy is so much more than just being able to take in a lot of air.</span></p><span data-dcnode-id="1023" instrument_node="">
</span><div class="content_hint" data-dcnode-id="1022"></div><span data-dcnode-id="1021" instrument_node="">

</span><p data-dcnode-id="1006"><strong data-dcnode-id="1008"><span data-dcnode-id="1009" instrument_node="">When people are thinking of how to increase lung capacity for running, they are actually looking to streamline that complicated process up there.</span></strong><span data-dcnode-id="1007" instrument_node=""> They want their bodies to better transport and use the oxygen that comes in with each breath.&nbsp;</span></p><span data-dcnode-id="1005" instrument_node="">

</span><p data-dcnode-id="998"><span data-dcnode-id="999" instrument_node="">This means the types of strategies you may have thought you’d need will be a little different. </span></p><span data-dcnode-id="997" instrument_node="">

</span><p data-dcnode-id="943"><span data-dcnode-id="947" instrument_node="">All right, so working off of the idea that </span><em data-dcnode-id="945"><span data-dcnode-id="946" instrument_node="">lung capacity equals aerobic capacity</span></em><span data-dcnode-id="944" instrument_node="">, there are several ways to improve this.&nbsp;</span></p><span data-dcnode-id="942" instrument_node="">
</span><p data-dcnode-id="940"><span data-dcnode-id="941" instrument_node="">The first is through a series of breathing exercises for running designed to warm up the lungs and make it easier to breathe in the first place. </span></p><span data-dcnode-id="939" instrument_node="">
</span><p data-dcnode-id="937"><span data-dcnode-id="938" instrument_node="">Runners often favor these 3:</span></p><span data-dcnode-id="936" instrument_node="">
</span><ul data-dcnode-id="933"><li data-dcnode-id="934"><span data-dcnode-id="935" instrument_node="">Diaphragmatic breathing</span></li></ul><span data-dcnode-id="932" instrument_node="">
</span><ul data-dcnode-id="929"><li data-dcnode-id="930"><span data-dcnode-id="931" instrument_node="">Pursed lips breathing</span></li></ul><span data-dcnode-id="928" instrument_node="">
</span><ul data-dcnode-id="925"><li data-dcnode-id="926"><span data-dcnode-id="927" instrument_node="">Rhythmic breathing</span></li></ul><span data-dcnode-id="924" instrument_node="">
</span><p data-dcnode-id="922"><span data-dcnode-id="923" instrument_node="">Let’s take a look at each one.</span></p><span data-dcnode-id="921" instrument_node="">
</span><p data-dcnode-id="916"><strong data-dcnode-id="917"><span data-dcnode-id="920" instrument_node="">Related: </span><a data-dcnode-id="918" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//marathonhandbook.com/whats-a-good-vo2-max/"><span data-dcnode-id="919" instrument_node="">What’s a Good VO2 Max? Average VO2 Max By Age And Sex</span></a></strong></p><span data-dcnode-id="915" instrument_node="">
</span><div class="content_hint" data-dcnode-id="914"></div><span data-dcnode-id="913" instrument_node="">
</span><h3 data-dcnode-id="911"><span data-dcnode-id="912" instrument_node="">Diaphragmatic Breathing</span></h3><span data-dcnode-id="910" instrument_node="">
</span><figure class="wp-block-image size-large" data-dcnode-id="903"><picture class="wp-image-26091 sp-no-webp" data-dcnode-id="904" title="How To Increase Lung Capacity for Running 5"><source data-dcnode-id="909" data-sizes="(max-width: 1024px) 100vw, 1024px" data-srcset="https://marathonhandbook.com/wp-content/uploads/2021/01/How-To-Increase-Lung-Capacity-for-Running-7-1024x643.webp 1024w,https://marathonhandbook.com/wp-content/uploads/2021/01/How-To-Increase-Lung-Capacity-for-Running-7-300x189.webp 300w,https://marathonhandbook.com/wp-content/uploads/2021/01/How-To-Increase-Lung-Capacity-for-Running-7-600x377.webp 600w,https://marathonhandbook.com/wp-content/uploads/2021/01/How-To-Increase-Lung-Capacity-for-Running-7.webp 1200w" type="image/webp"><source data-dcnode-id="908" data-sizes="(max-width: 1024px) 100vw, 1024px" data-srcset="https://marathonhandbook.com/wp-content/uploads/2021/01/How-To-Increase-Lung-Capacity-for-Running-7-1024x643.jpg 1024w, https://marathonhandbook.com/wp-content/uploads/2021/01/How-To-Increase-Lung-Capacity-for-Running-7-300x189.jpg 300w, https://marathonhandbook.com/wp-content/uploads/2021/01/How-To-Increase-Lung-Capacity-for-Running-7-600x377.jpg 600w, https://marathonhandbook.com/wp-content/uploads/2021/01/How-To-Increase-Lung-Capacity-for-Running-7.jpg 1200w" type="image/jpeg"><img alt="How To Increase Lung Capacity for Running 3" class="wp-image-26091 sp-no-webp perfmatters-lazy" data-dcnode-id="907" data-sizes="(max-width: 1024px) 100vw, 1024px" data-src="https://marathonhandbook.com/wp-content/uploads/2021/01/How-To-Increase-Lung-Capacity-for-Running-7-1024x643.jpg" data-srcset="https://marathonhandbook.com/wp-content/uploads/2021/01/How-To-Increase-Lung-Capacity-for-Running-7-1024x643.jpg 1024w, https://marathonhandbook.com/wp-content/uploads/2021/01/How-To-Increase-Lung-Capacity-for-Running-7-300x189.jpg 300w, https://marathonhandbook.com/wp-content/uploads/2021/01/How-To-Increase-Lung-Capacity-for-Running-7-600x377.jpg 600w, https://marathonhandbook.com/wp-content/uploads/2021/01/How-To-Increase-Lung-Capacity-for-Running-7.jpg 1200w" height="643" src="data:image/svg+xml,%3Csvg%20xmlns='http://www.w3.org/2000/svg'%20width='1024'%20height='643'%20viewBox='0%200%201024%20643'%3E%3C/svg%3E" title="How To Increase Lung Capacity for Running 5" width="1024"><noscript data-dcnode-id="905"><span data-dcnode-id="906" instrument_node="">&lt;img src="https://marathonhandbook.com/wp-content/uploads/2021/01/How-To-Increase-Lung-Capacity-for-Running-7-1024x643.jpg" class="wp-image-26091 sp-no-webp" title="How To Increase Lung Capacity for Running 5" alt="How To Increase Lung Capacity for Running 3" height="643" width="1024" srcset="https://marathonhandbook.com/wp-content/uploads/2021/01/How-To-Increase-Lung-Capacity-for-Running-7-1024x643.jpg 1024w, https://marathonhandbook.com/wp-content/uploads/2021/01/How-To-Increase-Lung-Capacity-for-Running-7-300x189.jpg 300w, https://marathonhandbook.com/wp-content/uploads/2021/01/How-To-Increase-Lung-Capacity-for-Running-7-600x377.jpg 600w, https://marathonhandbook.com/wp-content/uploads/2021/01/How-To-Increase-Lung-Capacity-for-Running-7.jpg 1200w" sizes="(max-width: 1024px) 100vw, 1024px"&gt;</span></noscript></picture></figure><span data-dcnode-id="902" instrument_node="">
</span><p data-dcnode-id="900"><span data-dcnode-id="901" instrument_node="">People with Chronic Obstructive Pulmonary Disease (COPD) often have long-term problems and poor airflow. </span></p><span data-dcnode-id="899" instrument_node="">
</span><p data-dcnode-id="897"><span data-dcnode-id="898" instrument_node="">To fight this, one thing they turn to is diaphragmatic breathing or “belly breathing.” Runners get huge benefits from this.&nbsp;</span></p><span data-dcnode-id="896" instrument_node="">
</span><p data-dcnode-id="894"><span data-dcnode-id="895" instrument_node="">Here’s how you do it:</span></p><span data-dcnode-id="893" instrument_node="">
</span><ol data-dcnode-id="882"><li data-dcnode-id="891"><span data-dcnode-id="892" instrument_node="">Sit against a wall or chair, or lie all the way down.</span></li><li data-dcnode-id="889"><span data-dcnode-id="890" instrument_node="">Place one hand on your upper chest, and the other below your ribcage.</span></li><li data-dcnode-id="887"><span data-dcnode-id="888" instrument_node="">Inhale through your nose for about two seconds, paying attention to your breath as it moves through your abdomen, making your stomach rise.</span></li><li data-dcnode-id="885"><span data-dcnode-id="886" instrument_node="">Tighten your stomach muscles as you breathe out, exhaling through pursed lips. Keep the hand on your upper chest still.&nbsp;</span></li><li data-dcnode-id="883"><span data-dcnode-id="884" instrument_node="">Repeat for 5-10 minutes, 3-4 times a day.&nbsp;</span></li></ol><span data-dcnode-id="881" instrument_node="">
</span><div class="content_hint" data-dcnode-id="880"></div><span data-dcnode-id="879" instrument_node="">
</span><h3 data-dcnode-id="877"><span data-dcnode-id="878" instrument_node="">Pursed Lips Breathing</span></h3><span data-dcnode-id="876" instrument_node="">
</span><figure class="wp-block-image size-large" data-dcnode-id="869"><picture class="wp-image-26092 sp-no-webp" data-dcnode-id="870" title="How To Increase Lung Capacity for Running 6"><source data-dcnode-id="875" data-sizes="(max-width: 1024px) 100vw, 1024px" data-srcset="https://marathonhandbook.com/wp-content/uploads/2021/01/How-To-Increase-Lung-Capacity-for-Running-8-1024x643.webp 1024w,https://marathonhandbook.com/wp-content/uploads/2021/01/How-To-Increase-Lung-Capacity-for-Running-8-300x189.webp 300w,https://marathonhandbook.com/wp-content/uploads/2021/01/How-To-Increase-Lung-Capacity-for-Running-8-600x377.webp 600w,https://marathonhandbook.com/wp-content/uploads/2021/01/How-To-Increase-Lung-Capacity-for-Running-8.webp 1200w" type="image/webp"><source data-dcnode-id="874" data-sizes="(max-width: 1024px) 100vw, 1024px" data-srcset="https://marathonhandbook.com/wp-content/uploads/2021/01/How-To-Increase-Lung-Capacity-for-Running-8-1024x643.jpg 1024w, https://marathonhandbook.com/wp-content/uploads/2021/01/How-To-Increase-Lung-Capacity-for-Running-8-300x189.jpg 300w, https://marathonhandbook.com/wp-content/uploads/2021/01/How-To-Increase-Lung-Capacity-for-Running-8-600x377.jpg 600w, https://marathonhandbook.com/wp-content/uploads/2021/01/How-To-Increase-Lung-Capacity-for-Running-8.jpg 1200w" type="image/jpeg"><img alt="How To Increase Lung Capacity for Running" class="wp-image-26092 sp-no-webp perfmatters-lazy" data-dcnode-id="873" data-sizes="(max-width: 1024px) 100vw, 1024px" data-src="https://marathonhandbook.com/wp-content/uploads/2021/01/How-To-Increase-Lung-Capacity-for-Running-8-1024x643.jpg" data-srcset="https://marathonhandbook.com/wp-content/uploads/2021/01/How-To-Increase-Lung-Capacity-for-Running-8-1024x643.jpg 1024w, https://marathonhandbook.com/wp-content/uploads/2021/01/How-To-Increase-Lung-Capacity-for-Running-8-300x189.jpg 300w, https://marathonhandbook.com/wp-content/uploads/2021/01/How-To-Increase-Lung-Capacity-for-Running-8-600x377.jpg 600w, https://marathonhandbook.com/wp-content/uploads/2021/01/How-To-Increase-Lung-Capacity-for-Running-8.jpg 1200w" height="643" src="data:image/svg+xml,%3Csvg%20xmlns='http://www.w3.org/2000/svg'%20width='1024'%20height='643'%20viewBox='0%200%201024%20643'%3E%3C/svg%3E" title="How To Increase Lung Capacity for Running 6" width="1024"><noscript data-dcnode-id="871"><span data-dcnode-id="872" instrument_node="">&lt;img src="https://marathonhandbook.com/wp-content/uploads/2021/01/How-To-Increase-Lung-Capacity-for-Running-8-1024x643.jpg" class="wp-image-26092 sp-no-webp" title="How To Increase Lung Capacity for Running 6" alt="How To Increase Lung Capacity for Running" height="643" width="1024" srcset="https://marathonhandbook.com/wp-content/uploads/2021/01/How-To-Increase-Lung-Capacity-for-Running-8-1024x643.jpg 1024w, https://marathonhandbook.com/wp-content/uploads/2021/01/How-To-Increase-Lung-Capacity-for-Running-8-300x189.jpg 300w, https://marathonhandbook.com/wp-content/uploads/2021/01/How-To-Increase-Lung-Capacity-for-Running-8-600x377.jpg 600w, https://marathonhandbook.com/wp-content/uploads/2021/01/How-To-Increase-Lung-Capacity-for-Running-8.jpg 1200w" sizes="(max-width: 1024px) 100vw, 1024px"&gt;</span></noscript></picture></figure><span data-dcnode-id="868" instrument_node="">
</span><p data-dcnode-id="866"><span data-dcnode-id="867" instrument_node="">If you find yourself short of breath, pursed lips breathing is a way to control it and get you back to normal. </span></p><span data-dcnode-id="865" instrument_node="">
</span><p data-dcnode-id="863"><span data-dcnode-id="864" instrument_node="">This involves breathing in a structured, purposeful way, keeping your airways open longer. </span></p><span data-dcnode-id="862" instrument_node="">
</span><p data-dcnode-id="858"><strong data-dcnode-id="860"><span data-dcnode-id="861" instrument_node="">You’ll gradually build lung strength if you practice this regularly. </span></strong><span data-dcnode-id="859" instrument_node="">&nbsp;</span></p><span data-dcnode-id="857" instrument_node="">
</span><ol data-dcnode-id="848"><li data-dcnode-id="855"><span data-dcnode-id="856" instrument_node="">Breathe in for two seconds through your nose.</span></li><li data-dcnode-id="853"><span data-dcnode-id="854" instrument_node="">Purse your lips like blowing out candles on a birthday cake.&nbsp;</span></li><li data-dcnode-id="851"><span data-dcnode-id="852" instrument_node="">Breathe out slowly, dragging it on for a full 4-6 seconds.&nbsp;</span></li><li data-dcnode-id="849"><span data-dcnode-id="850" instrument_node="">Repeat for 5-10 minutes.</span></li></ol><span data-dcnode-id="847" instrument_node="">
</span><div class="content_hint" data-dcnode-id="846"></div><span data-dcnode-id="845" instrument_node="">
</span><h3 data-dcnode-id="843"><span data-dcnode-id="844" instrument_node="">Rhythmic Breathing</span></h3><span data-dcnode-id="842" instrument_node="">
</span><figure class="wp-block-image size-large" data-dcnode-id="835"><picture class="wp-image-26094 sp-no-webp" data-dcnode-id="836" title="How To Increase Lung Capacity for Running 7"><source data-dcnode-id="841" data-sizes="(max-width: 1024px) 100vw, 1024px" data-srcset="https://marathonhandbook.com/wp-content/uploads/2021/01/How-To-Increase-Lung-Capacity-for-Running-6-1024x643.webp 1024w,https://marathonhandbook.com/wp-content/uploads/2021/01/How-To-Increase-Lung-Capacity-for-Running-6-300x189.webp 300w,https://marathonhandbook.com/wp-content/uploads/2021/01/How-To-Increase-Lung-Capacity-for-Running-6-600x377.webp 600w,https://marathonhandbook.com/wp-content/uploads/2021/01/How-To-Increase-Lung-Capacity-for-Running-6.webp 1200w" type="image/webp"><source data-dcnode-id="840" data-sizes="(max-width: 1024px) 100vw, 1024px" data-srcset="https://marathonhandbook.com/wp-content/uploads/2021/01/How-To-Increase-Lung-Capacity-for-Running-6-1024x643.jpg 1024w, https://marathonhandbook.com/wp-content/uploads/2021/01/How-To-Increase-Lung-Capacity-for-Running-6-300x189.jpg 300w, https://marathonhandbook.com/wp-content/uploads/2021/01/How-To-Increase-Lung-Capacity-for-Running-6-600x377.jpg 600w, https://marathonhandbook.com/wp-content/uploads/2021/01/How-To-Increase-Lung-Capacity-for-Running-6.jpg 1200w" type="image/jpeg"><img alt="How To Increase Lung Capacity for Running" class="wp-image-26094 sp-no-webp perfmatters-lazy" data-dcnode-id="839" data-sizes="(max-width: 1024px) 100vw, 1024px" data-src="https://marathonhandbook.com/wp-content/uploads/2021/01/How-To-Increase-Lung-Capacity-for-Running-6-1024x643.jpg" data-srcset="https://marathonhandbook.com/wp-content/uploads/2021/01/How-To-Increase-Lung-Capacity-for-Running-6-1024x643.jpg 1024w, https://marathonhandbook.com/wp-content/uploads/2021/01/How-To-Increase-Lung-Capacity-for-Running-6-300x189.jpg 300w, https://marathonhandbook.com/wp-content/uploads/2021/01/How-To-Increase-Lung-Capacity-for-Running-6-600x377.jpg 600w, https://marathonhandbook.com/wp-content/uploads/2021/01/How-To-Increase-Lung-Capacity-for-Running-6.jpg 1200w" height="643" src="data:image/svg+xml,%3Csvg%20xmlns='http://www.w3.org/2000/svg'%20width='1024'%20height='643'%20viewBox='0%200%201024%20643'%3E%3C/svg%3E" title="How To Increase Lung Capacity for Running 7" width="1024"><noscript data-dcnode-id="837"><span data-dcnode-id="838" instrument_node="">&lt;img src="https://marathonhandbook.com/wp-content/uploads/2021/01/How-To-Increase-Lung-Capacity-for-Running-6-1024x643.jpg" class="wp-image-26094 sp-no-webp" title="How To Increase Lung Capacity for Running 7" alt="How To Increase Lung Capacity for Running" height="643" width="1024" srcset="https://marathonhandbook.com/wp-content/uploads/2021/01/How-To-Increase-Lung-Capacity-for-Running-6-1024x643.jpg 1024w, https://marathonhandbook.com/wp-content/uploads/2021/01/How-To-Increase-Lung-Capacity-for-Running-6-300x189.jpg 300w, https://marathonhandbook.com/wp-content/uploads/2021/01/How-To-Increase-Lung-Capacity-for-Running-6-600x377.jpg 600w, https://marathonhandbook.com/wp-content/uploads/2021/01/How-To-Increase-Lung-Capacity-for-Running-6.jpg 1200w" sizes="(max-width: 1024px) 100vw, 1024px"&gt;</span></noscript></picture></figure><span data-dcnode-id="834" instrument_node="">
</span><p data-dcnode-id="832"><span data-dcnode-id="833" instrument_node="">The final breathing exercise for running can be done right in the middle of your run. </span></p><span data-dcnode-id="831" instrument_node="">
</span><p data-dcnode-id="829"><span data-dcnode-id="830" instrument_node="">Rhythmic breathing distributes that force evenly by timing your inhales and exhales. This way, the opposite foot hits the ground for each breath.&nbsp;</span></p><span data-dcnode-id="828" instrument_node="">
</span><p data-dcnode-id="820"><strong data-dcnode-id="826"><span data-dcnode-id="827" instrument_node="">With rhythmic breathing, you can save yourself from repetitive motion injury and </span></strong><a data-dcnode-id="823" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//marathonhandbook.com/marathon-training-recovery/"><strong data-dcnode-id="824"><span data-dcnode-id="825" instrument_node="">long recovery times</span></strong></a><strong data-dcnode-id="821"><span data-dcnode-id="822" instrument_node="">.</span></strong></p><span data-dcnode-id="819" instrument_node="">
</span><p data-dcnode-id="814"><span data-dcnode-id="818" instrument_node="">Rhythmic breathing isn’t just for running, either. </span><a data-dcnode-id="816" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//pubmed.ncbi.nlm.nih.gov/25607119/" onclick="javascript:window.open('https://pubmed.ncbi.nlm.nih.gov/25607119/'); return false;" rel="noopener"><span data-dcnode-id="817" instrument_node="">Studies show</span></a><span data-dcnode-id="815" instrument_node=""> that practicing this shows significant improvement both in cardiac health and coping with stress.</span></p><span data-dcnode-id="813" instrument_node="">
</span><p data-dcnode-id="811"><span data-dcnode-id="812" instrument_node="">Here’s how to do it properly:</span></p><span data-dcnode-id="810" instrument_node="">
</span><ol data-dcnode-id="795"><li data-dcnode-id="808"><span data-dcnode-id="809" instrument_node="">Inhale through your nose.&nbsp;</span></li><li data-dcnode-id="806"><span data-dcnode-id="807" instrument_node="">Use your stomach to breathe in, rather than your chest.&nbsp;</span></li><li data-dcnode-id="801"><span data-dcnode-id="805" instrument_node="">Though there are different options, a good rule of thumb is the </span><em data-dcnode-id="803"><span data-dcnode-id="804" instrument_node="">5-step pattern</span></em><span data-dcnode-id="802" instrument_node="">: 3 steps on inhale, and 2 steps on exhale. This will naturally place your feet in the right position.&nbsp;</span></li><li data-dcnode-id="796"><span data-dcnode-id="800" instrument_node="">When you need more oxygen, shift to a </span><em data-dcnode-id="798"><span data-dcnode-id="799" instrument_node="">3-step pattern</span></em><span data-dcnode-id="797" instrument_node="">: 2 steps on inhale, and 1 step on exhale.&nbsp;</span></li></ol><span data-dcnode-id="794" instrument_node="">
</span><p data-dcnode-id="790"><em data-dcnode-id="792"><span data-dcnode-id="793" instrument_node="">Feel like you’ve got the hang of the breathing and are ready to try something more taxing?</span></em><span data-dcnode-id="791" instrument_node=""> I’m on it.</span></p><span data-dcnode-id="789" instrument_node="">
</span><div class="content_hint" data-dcnode-id="788"></div><span data-dcnode-id="787" instrument_node="">
</span><h2 data-dcnode-id="785"><span data-dcnode-id="786" instrument_node="">Four Great Lung Exercises For Running Endurance</span></h2><span data-dcnode-id="784" instrument_node="">
</span><figure class="wp-block-image size-large" data-dcnode-id="777"><picture class="wp-image-26095 sp-no-webp" data-dcnode-id="778" title="How To Increase Lung Capacity for Running 8"><source data-dcnode-id="783" data-sizes="(max-width: 1024px) 100vw, 1024px" data-srcset="https://marathonhandbook.com/wp-content/uploads/2021/01/How-To-Increase-Lung-Capacity-for-Running-5-1024x643.webp 1024w,https://marathonhandbook.com/wp-content/uploads/2021/01/How-To-Increase-Lung-Capacity-for-Running-5-300x189.webp 300w,https://marathonhandbook.com/wp-content/uploads/2021/01/How-To-Increase-Lung-Capacity-for-Running-5-600x377.webp 600w,https://marathonhandbook.com/wp-content/uploads/2021/01/How-To-Increase-Lung-Capacity-for-Running-5.webp 1200w" type="image/webp"><source data-dcnode-id="782" data-sizes="(max-width: 1024px) 100vw, 1024px" data-srcset="https://marathonhandbook.com/wp-content/uploads/2021/01/How-To-Increase-Lung-Capacity-for-Running-5-1024x643.jpg 1024w, https://marathonhandbook.com/wp-content/uploads/2021/01/How-To-Increase-Lung-Capacity-for-Running-5-300x189.jpg 300w, https://marathonhandbook.com/wp-content/uploads/2021/01/How-To-Increase-Lung-Capacity-for-Running-5-600x377.jpg 600w, https://marathonhandbook.com/wp-content/uploads/2021/01/How-To-Increase-Lung-Capacity-for-Running-5.jpg 1200w" type="image/jpeg"><img alt="How To Increase Lung Capacity for Running" class="wp-image-26095 sp-no-webp perfmatters-lazy" data-dcnode-id="781" data-sizes="(max-width: 1024px) 100vw, 1024px" data-src="https://marathonhandbook.com/wp-content/uploads/2021/01/How-To-Increase-Lung-Capacity-for-Running-5-1024x643.jpg" data-srcset="https://marathonhandbook.com/wp-content/uploads/2021/01/How-To-Increase-Lung-Capacity-for-Running-5-1024x643.jpg 1024w, https://marathonhandbook.com/wp-content/uploads/2021/01/How-To-Increase-Lung-Capacity-for-Running-5-300x189.jpg 300w, https://marathonhandbook.com/wp-content/uploads/2021/01/How-To-Increase-Lung-Capacity-for-Running-5-600x377.jpg 600w, https://marathonhandbook.com/wp-content/uploads/2021/01/How-To-Increase-Lung-Capacity-for-Running-5.jpg 1200w" height="643" src="data:image/svg+xml,%3Csvg%20xmlns='http://www.w3.org/2000/svg'%20width='1024'%20height='643'%20viewBox='0%200%201024%20643'%3E%3C/svg%3E" title="How To Increase Lung Capacity for Running 8" width="1024"><noscript data-dcnode-id="779"><span data-dcnode-id="780" instrument_node="">&lt;img src="https://marathonhandbook.com/wp-content/uploads/2021/01/How-To-Increase-Lung-Capacity-for-Running-5-1024x643.jpg" class="wp-image-26095 sp-no-webp" title="How To Increase Lung Capacity for Running 8" alt="How To Increase Lung Capacity for Running" height="643" width="1024" srcset="https://marathonhandbook.com/wp-content/uploads/2021/01/How-To-Increase-Lung-Capacity-for-Running-5-1024x643.jpg 1024w, https://marathonhandbook.com/wp-content/uploads/2021/01/How-To-Increase-Lung-Capacity-for-Running-5-300x189.jpg 300w, https://marathonhandbook.com/wp-content/uploads/2021/01/How-To-Increase-Lung-Capacity-for-Running-5-600x377.jpg 600w, https://marathonhandbook.com/wp-content/uploads/2021/01/How-To-Increase-Lung-Capacity-for-Running-5.jpg 1200w" sizes="(max-width: 1024px) 100vw, 1024px"&gt;</span></noscript></picture></figure><span data-dcnode-id="776" instrument_node="">
</span><p data-dcnode-id="771"><span data-dcnode-id="775" instrument_node="">The second best way to increase lung capacity is by </span><em data-dcnode-id="773"><span data-dcnode-id="774" instrument_node="">pushing yourself</span></em><span data-dcnode-id="772" instrument_node="">. As you make more demands on your body, it will eventually rise up to meet you. Here’s how:</span></p><span data-dcnode-id="770" instrument_node="">
</span><p data-dcnode-id="763"><strong data-dcnode-id="768"><span data-dcnode-id="769" instrument_node="">1. Interval running. </span></strong><span data-dcnode-id="767" instrument_node="">One of the most effective ways to build lung capacity is by working your body hard in short bursts followed by rest. By </span><a data-dcnode-id="765" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//marathonhandbook.com/marathon-interval-training/"><span data-dcnode-id="766" instrument_node="">running intervals</span></a><span data-dcnode-id="764" instrument_node="">, your body gets used to more strenuous effort without taking it too far.&nbsp;</span></p><span data-dcnode-id="762" instrument_node="">
</span><p data-dcnode-id="755"><strong data-dcnode-id="760"><span data-dcnode-id="761" instrument_node="">2.</span></strong><span data-dcnode-id="759" instrument_node=""> </span><strong data-dcnode-id="757"><span data-dcnode-id="758" instrument_node="">HIIT training. </span></strong><span data-dcnode-id="756" instrument_node="">Have you ever heard of the term “muscle confusion?” Continuing the interval idea, HIIT (high intensity interval training) workouts keep you from hitting a lung capacity plateau by varying the types of exercises you perform. </span></p><span data-dcnode-id="754" instrument_node="">
</span><p data-dcnode-id="749"><em data-dcnode-id="750"><a class="rank-math-link" data-dcnode-id="752" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//marathonhandbook.com/hiit-running-workouts/"><span data-dcnode-id="753" instrument_node="">Here are our recommended HIIT Running Exercises.</span></a><span data-dcnode-id="751" instrument_node=""> </span></em></p><span data-dcnode-id="748" instrument_node="">
</span><p data-dcnode-id="746"><span data-dcnode-id="747" instrument_node="">Be sure to warm up and cool down before and after!</span></p><span data-dcnode-id="745" instrument_node="">
</span><div class="content_hint" data-dcnode-id="744"></div><span data-dcnode-id="743" instrument_node="">
</span><p data-dcnode-id="736"><strong data-dcnode-id="738"><span data-dcnode-id="742" instrument_node="">3. Build endurance with the </span><a class="rank-math-link" data-dcnode-id="740" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//marathonhandbook.com/marathon-long-run/"><span data-dcnode-id="741" instrument_node="">long, easy, slow run</span></a><span data-dcnode-id="739" instrument_node="">.</span></strong><span data-dcnode-id="737" instrument_node=""> This pushes you in a different way, combating fatigue by getting your muscles used to working longer. </span></p><span data-dcnode-id="735" instrument_node="">
</span><p data-dcnode-id="733"><span data-dcnode-id="734" instrument_node="">Keep your heart rate at a manageable level, but aim for longer than your usual running sessions. Shoot for 20-30% of your usual weekly mileage.&nbsp;</span></p><span data-dcnode-id="732" instrument_node="">
</span><p data-dcnode-id="725"><strong data-dcnode-id="730"><span data-dcnode-id="731" instrument_node="">4.</span></strong><span data-dcnode-id="729" instrument_node=""> </span><strong data-dcnode-id="727"><span data-dcnode-id="728" instrument_node="">Run at a high altitude. </span></strong><span data-dcnode-id="726" instrument_node="">Training at 8,000 feet or higher forces your body to work much harder by reducing your supply of oxygen. </span></p><span data-dcnode-id="724" instrument_node="">
</span><p data-dcnode-id="716"><span data-dcnode-id="723" instrument_node="">Over time with </span><a class="rank-math-link" data-dcnode-id="721" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//marathonhandbook.com/altitude-training-for-runners/"><span data-dcnode-id="722" instrument_node="">altitude training for runners</span></a><span data-dcnode-id="720" instrument_node="">, your body will adjust, increasing the number of red blood cells and moving oxygen more efficiently. If nearby mountains aren’t your landscape, look for a gym with a hypoxic chamber to simulate the </span><a class="rank-math-link" data-dcnode-id="718" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//marathonhandbook.com/running-at-altitude/"><span data-dcnode-id="719" instrument_node="">altitude</span></a><span data-dcnode-id="717" instrument_node="">. Or invest in an elevation mask to restrict airflow.</span></p><span data-dcnode-id="715" instrument_node="">
</span><div class="content_hint" data-dcnode-id="714"></div><span data-dcnode-id="713" instrument_node="">
</span><h2 data-dcnode-id="711"><span data-dcnode-id="712" instrument_node="">How to Keep Your Lungs Super Healthy</span></h2><span data-dcnode-id="710" instrument_node="">
</span><figure class="wp-block-image size-large" data-dcnode-id="703"><picture class="wp-image-26096 sp-no-webp" data-dcnode-id="704" title="How To Increase Lung Capacity for Running 9"><source data-dcnode-id="709" data-sizes="(max-width: 1024px) 100vw, 1024px" data-srcset="https://marathonhandbook.com/wp-content/uploads/2021/01/How-To-Increase-Lung-Capacity-for-Running-10-1024x643.webp 1024w,https://marathonhandbook.com/wp-content/uploads/2021/01/How-To-Increase-Lung-Capacity-for-Running-10-300x189.webp 300w,https://marathonhandbook.com/wp-content/uploads/2021/01/How-To-Increase-Lung-Capacity-for-Running-10-600x377.webp 600w,https://marathonhandbook.com/wp-content/uploads/2021/01/How-To-Increase-Lung-Capacity-for-Running-10.webp 1200w" type="image/webp"><source data-dcnode-id="708" data-sizes="(max-width: 1024px) 100vw, 1024px" data-srcset="https://marathonhandbook.com/wp-content/uploads/2021/01/How-To-Increase-Lung-Capacity-for-Running-10-1024x643.jpg 1024w, https://marathonhandbook.com/wp-content/uploads/2021/01/How-To-Increase-Lung-Capacity-for-Running-10-300x189.jpg 300w, https://marathonhandbook.com/wp-content/uploads/2021/01/How-To-Increase-Lung-Capacity-for-Running-10-600x377.jpg 600w, https://marathonhandbook.com/wp-content/uploads/2021/01/How-To-Increase-Lung-Capacity-for-Running-10.jpg 1200w" type="image/jpeg"><img alt="breathing exercises for running" class="wp-image-26096 sp-no-webp perfmatters-lazy" data-dcnode-id="707" data-sizes="(max-width: 1024px) 100vw, 1024px" data-src="https://marathonhandbook.com/wp-content/uploads/2021/01/How-To-Increase-Lung-Capacity-for-Running-10-1024x643.jpg" data-srcset="https://marathonhandbook.com/wp-content/uploads/2021/01/How-To-Increase-Lung-Capacity-for-Running-10-1024x643.jpg 1024w, https://marathonhandbook.com/wp-content/uploads/2021/01/How-To-Increase-Lung-Capacity-for-Running-10-300x189.jpg 300w, https://marathonhandbook.com/wp-content/uploads/2021/01/How-To-Increase-Lung-Capacity-for-Running-10-600x377.jpg 600w, https://marathonhandbook.com/wp-content/uploads/2021/01/How-To-Increase-Lung-Capacity-for-Running-10.jpg 1200w" height="643" src="data:image/svg+xml,%3Csvg%20xmlns='http://www.w3.org/2000/svg'%20width='1024'%20height='643'%20viewBox='0%200%201024%20643'%3E%3C/svg%3E" title="How To Increase Lung Capacity for Running 9" width="1024"><noscript data-dcnode-id="705"><span data-dcnode-id="706" instrument_node="">&lt;img src="https://marathonhandbook.com/wp-content/uploads/2021/01/How-To-Increase-Lung-Capacity-for-Running-10-1024x643.jpg" class="wp-image-26096 sp-no-webp" title="How To Increase Lung Capacity for Running 9" alt="breathing exercises for running" height="643" width="1024" srcset="https://marathonhandbook.com/wp-content/uploads/2021/01/How-To-Increase-Lung-Capacity-for-Running-10-1024x643.jpg 1024w, https://marathonhandbook.com/wp-content/uploads/2021/01/How-To-Increase-Lung-Capacity-for-Running-10-300x189.jpg 300w, https://marathonhandbook.com/wp-content/uploads/2021/01/How-To-Increase-Lung-Capacity-for-Running-10-600x377.jpg 600w, https://marathonhandbook.com/wp-content/uploads/2021/01/How-To-Increase-Lung-Capacity-for-Running-10.jpg 1200w" sizes="(max-width: 1024px) 100vw, 1024px"&gt;</span></noscript></picture></figure><span data-dcnode-id="702" instrument_node="">
</span><p data-dcnode-id="700"><span data-dcnode-id="701" instrument_node="">Of course, none of this matters if you don’t take care of your lungs in the first place. Make sure they’re in top shape by:</span></p><span data-dcnode-id="699" instrument_node="">
</span><ul data-dcnode-id="696"><li data-dcnode-id="697"><span data-dcnode-id="698" instrument_node="">Not smoking</span></li></ul><span data-dcnode-id="695" instrument_node="">
</span><ul data-dcnode-id="692"><li data-dcnode-id="693"><span data-dcnode-id="694" instrument_node="">Having an air filter and dusting often to keep irritants out&nbsp;</span></li></ul><span data-dcnode-id="691" instrument_node="">
</span><ul data-dcnode-id="688"><li data-dcnode-id="689"><span data-dcnode-id="690" instrument_node="">Keeping up with your vaccines to prevent problems like pneumonia</span></li></ul><span data-dcnode-id="687" instrument_node="">
</span><ul data-dcnode-id="684"><li data-dcnode-id="685"><span data-dcnode-id="686" instrument_node="">Eating antioxidant-rich foods such as kale and blueberries</span></li></ul><span data-dcnode-id="683" instrument_node="">
</span><ul data-dcnode-id="680"><li data-dcnode-id="681"><span data-dcnode-id="682" instrument_node="">Stay consistent with your workouts</span></li></ul><span data-dcnode-id="679" instrument_node="">
</span><p data-dcnode-id="677"><span data-dcnode-id="678" instrument_node="">After all, if you’re going to go through all this effort with breathing and exercise, that effort should be added to a solid base. Why build a house with a shaky foundation?</span></p><span data-dcnode-id="676" instrument_node="">
</span><p data-dcnode-id="673"><strong data-dcnode-id="674"><span data-dcnode-id="675" instrument_node="">If you want to get more in-depth measurements of your lung capacity, here’s how: VO2 max.</span></strong></p><span data-dcnode-id="672" instrument_node="">
</span><div class="content_hint" data-dcnode-id="671"></div><span data-dcnode-id="670" instrument_node="">
</span><h2 data-dcnode-id="668"><span data-dcnode-id="669" instrument_node="">What is VO2 Max?</span></h2><span data-dcnode-id="667" instrument_node="">
</span><figure class="wp-block-image size-large" data-dcnode-id="660"><picture class="wp-image-24407 sp-no-webp" data-dcnode-id="661" title="How To Increase Lung Capacity for Running 10"><source data-dcnode-id="666" data-sizes="(max-width: 1000px) 100vw, 1000px" data-srcset="https://marathonhandbook.com/wp-content/uploads/2020/09/How-To-Increase-VO2-Max.webp 1000w,https://marathonhandbook.com/wp-content/uploads/2020/09/How-To-Increase-VO2-Max-300x200.webp 300w,https://marathonhandbook.com/wp-content/uploads/2020/09/How-To-Increase-VO2-Max-600x400.webp 600w" type="image/webp"><source data-dcnode-id="665" data-sizes="(max-width: 1000px) 100vw, 1000px" data-srcset="https://marathonhandbook.com/wp-content/uploads/2020/09/How-To-Increase-VO2-Max.jpg 1000w, https://marathonhandbook.com/wp-content/uploads/2020/09/How-To-Increase-VO2-Max-300x200.jpg 300w, https://marathonhandbook.com/wp-content/uploads/2020/09/How-To-Increase-VO2-Max-600x400.jpg 600w" type="image/jpeg"><img alt="How To Increase VO2 Max" class="wp-image-24407 sp-no-webp perfmatters-lazy" data-dcnode-id="664" data-sizes="(max-width: 1000px) 100vw, 1000px" data-src="https://marathonhandbook.com/wp-content/uploads/2020/09/How-To-Increase-VO2-Max.jpg" data-srcset="https://marathonhandbook.com/wp-content/uploads/2020/09/How-To-Increase-VO2-Max.jpg 1000w, https://marathonhandbook.com/wp-content/uploads/2020/09/How-To-Increase-VO2-Max-300x200.jpg 300w, https://marathonhandbook.com/wp-content/uploads/2020/09/How-To-Increase-VO2-Max-600x400.jpg 600w" height="667" src="data:image/svg+xml,%3Csvg%20xmlns='http://www.w3.org/2000/svg'%20width='1000'%20height='667'%20viewBox='0%200%201000%20667'%3E%3C/svg%3E" title="How To Increase Lung Capacity for Running 10" width="1000"><noscript data-dcnode-id="662"><span data-dcnode-id="663" instrument_node="">&lt;img src="https://marathonhandbook.com/wp-content/uploads/2020/09/How-To-Increase-VO2-Max.jpg" class="wp-image-24407 sp-no-webp" title="How To Increase Lung Capacity for Running 10" alt="How To Increase VO2 Max" height="667" width="1000" srcset="https://marathonhandbook.com/wp-content/uploads/2020/09/How-To-Increase-VO2-Max.jpg 1000w, https://marathonhandbook.com/wp-content/uploads/2020/09/How-To-Increase-VO2-Max-300x200.jpg 300w, https://marathonhandbook.com/wp-content/uploads/2020/09/How-To-Increase-VO2-Max-600x400.jpg 600w" sizes="(max-width: 1000px) 100vw, 1000px"&gt;</span></noscript></picture></figure><span data-dcnode-id="659" instrument_node="">
</span><p data-dcnode-id="655"><span data-dcnode-id="658" instrument_node="">VO2 max, in short, is a measure of a person’s maximum rate of oxygen consumption during exercise. </span><strong data-dcnode-id="656"><span data-dcnode-id="657" instrument_node="">In other words, VO2 max gauges the athlete’s max capacity to use oxygen.&nbsp;</span></strong></p><span data-dcnode-id="654" instrument_node="">
</span><p data-dcnode-id="652"><span data-dcnode-id="653" instrument_node="">Sound familiar? That’s the same process that happens every time you take a breath – the one we just went over.&nbsp;</span></p><span data-dcnode-id="651" instrument_node="">
</span><p data-dcnode-id="646"><span data-dcnode-id="650" instrument_node="">VO2 max is considered the </span><a data-dcnode-id="648" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.sciencedirect.com/topics/medicine-and-dentistry/vo2-max" onclick="javascript:window.open('https://www.sciencedirect.com/topics/medicine-and-dentistry/vo2-max'); return false;" rel="noopener"><span data-dcnode-id="649" instrument_node="">gold standard</span></a><span data-dcnode-id="647" instrument_node=""> for measuring an athlete’s aerobic and cardiovascular fitness.</span></p><span data-dcnode-id="645" instrument_node="">
</span><p data-dcnode-id="643"><span data-dcnode-id="644" instrument_node="">You can get a higher measure by taking the difference between two people of the same age, fitness level, and body type, who finish a race at completely different times. One has more oxygen flowing, so their muscles can work harder.&nbsp;</span></p><span data-dcnode-id="642" instrument_node="">
</span><p data-dcnode-id="635"><span data-dcnode-id="641" instrument_node="">To calculate VO2 max and what to do with it, we’ve put together a </span><strong data-dcnode-id="636"><span data-dcnode-id="640" instrument_node="">guide with all the </span><a data-dcnode-id="638" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//marathonhandbook.com/what-is-vo2-max/"><span data-dcnode-id="639" instrument_node="">ins and outs of your VO2 max</span></a><span data-dcnode-id="637" instrument_node="">.&nbsp;</span></strong></p><span data-dcnode-id="634" instrument_node="">
</span><div class="wp-block-image" data-dcnode-id="626"><figure class="aligncenter size-large" data-dcnode-id="627"><picture class="wp-image-24409 sp-no-webp" data-dcnode-id="628" title="How To Increase Lung Capacity for Running 11"><source data-dcnode-id="633" data-sizes="(max-width: 724px) 100vw, 724px" data-srcset="https://marathonhandbook.com/wp-content/uploads/2020/09/VO2-Max-Chart.webp 724w,https://marathonhandbook.com/wp-content/uploads/2020/09/VO2-Max-Chart-300x189.webp 300w,https://marathonhandbook.com/wp-content/uploads/2020/09/VO2-Max-Chart-600x377.webp 600w" type="image/webp"><source data-dcnode-id="632" data-sizes="(max-width: 724px) 100vw, 724px" data-srcset="https://marathonhandbook.com/wp-content/uploads/2020/09/VO2-Max-Chart.jpg 724w, https://marathonhandbook.com/wp-content/uploads/2020/09/VO2-Max-Chart-300x189.jpg 300w, https://marathonhandbook.com/wp-content/uploads/2020/09/VO2-Max-Chart-600x377.jpg 600w" type="image/jpeg"><img alt="VO2-Max-Chart" class="wp-image-24409 sp-no-webp perfmatters-lazy" data-dcnode-id="631" data-sizes="(max-width: 724px) 100vw, 724px" data-src="https://marathonhandbook.com/wp-content/uploads/2020/09/VO2-Max-Chart.jpg" data-srcset="https://marathonhandbook.com/wp-content/uploads/2020/09/VO2-Max-Chart.jpg 724w, https://marathonhandbook.com/wp-content/uploads/2020/09/VO2-Max-Chart-300x189.jpg 300w, https://marathonhandbook.com/wp-content/uploads/2020/09/VO2-Max-Chart-600x377.jpg 600w" height="455" src="data:image/svg+xml,%3Csvg%20xmlns='http://www.w3.org/2000/svg'%20width='724'%20height='455'%20viewBox='0%200%20724%20455'%3E%3C/svg%3E" title="How To Increase Lung Capacity for Running 11" width="724"><noscript data-dcnode-id="629"><span data-dcnode-id="630" instrument_node="">&lt;img src="https://marathonhandbook.com/wp-content/uploads/2020/09/VO2-Max-Chart.jpg" class="wp-image-24409 sp-no-webp" title="How To Increase Lung Capacity for Running 11" alt="VO2-Max-Chart" height="455" width="724" srcset="https://marathonhandbook.com/wp-content/uploads/2020/09/VO2-Max-Chart.jpg 724w, https://marathonhandbook.com/wp-content/uploads/2020/09/VO2-Max-Chart-300x189.jpg 300w, https://marathonhandbook.com/wp-content/uploads/2020/09/VO2-Max-Chart-600x377.jpg 600w" sizes="(max-width: 724px) 100vw, 724px"&gt;</span></noscript></picture></figure></div><span data-dcnode-id="625" instrument_node="">
</span><p data-dcnode-id="621"><strong data-dcnode-id="623"><span data-dcnode-id="624" instrument_node="">If you feel like you’re trying all of these tips and you’re just as red-faced and exhausted as before, you might just be working too hard.</span></strong><span data-dcnode-id="622" instrument_node=""> Training for a marathon is intense and difficult. It’s easy to get burned out.&nbsp;</span></p><span data-dcnode-id="620" instrument_node="">
</span><p data-dcnode-id="615"><span data-dcnode-id="619" instrument_node="">Avoid that frustration by getting real help with your training. Download our </span><a data-dcnode-id="617" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//marathonhandbook.com/marathon-bootcamp/"><span data-dcnode-id="618" instrument_node="">free marathon bootcamp</span></a><span data-dcnode-id="616" instrument_node=""> to get you up to speed safely. When you step up to the starting line you’ll be ready to take on anything.&nbsp;</span></p><span data-dcnode-id="614" instrument_node="">
