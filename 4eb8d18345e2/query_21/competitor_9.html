</span><div class="a-section a-spacing-none aplus-module aplus-module-13 aplus-module-wrapper apm-fixed-width" data-dcnode-id="3603"><span data-dcnode-id="3654" instrument_node=""> </span><span data-dcnode-id="3652" instrument_node="">
</span><div class="a-section a-spacing-none aplus-13-heading" data-dcnode-id="3647"><span data-dcnode-id="3651" instrument_node=""> </span><h1 class="aplus-13-heading-text a-text-bold" data-dcnode-id="3649"><span data-dcnode-id="3650" instrument_node=""> How do I prepare my Peak Flow Meter for use? </span></h1><span data-dcnode-id="3648" instrument_node=""> </span></div><span data-dcnode-id="3646" instrument_node=""> </span><div class="a-section a-spacing-none aplus-module-section aplus-text-section" data-dcnode-id="3605"><span data-dcnode-id="3645" instrument_node=""> </span><p class="description" data-dcnode-id="3640"><span data-dcnode-id="3644" instrument_node=""> 1. Position your peak flow meter so that the mouthpiece faces towards you and the “hinged” handle faces downward. </span><span class="a-text-italic" data-dcnode-id="3642"><span data-dcnode-id="3643" instrument_node="">(See Image 1)</span></span><span data-dcnode-id="3641" instrument_node=""> </span></p><span data-dcnode-id="3639" instrument_node=""> </span><p class="description" data-dcnode-id="3637"><span data-dcnode-id="3638" instrument_node=""> 2. Pull down the handle until it stops, forming a “T” shape. (See Image 3) </span></p><span data-dcnode-id="3636" instrument_node=""> </span><p class="description" data-dcnode-id="3634"><span data-dcnode-id="3635" instrument_node=""> 3. Hold the device by the handle. (See Image 5) </span></p><span data-dcnode-id="3633" instrument_node=""> </span><p class="description" data-dcnode-id="3631"><span data-dcnode-id="3632" instrument_node=""> 4. Your peak flow meter has an indicator that moves away from you when you blow into the mouthpiece. This indicator, along with the corresponding number, indicates your peak expiratory ­flow (PEF). Before you start, set the indicator at its lowest setting: the number closest to the mouthpiece (60). (See Image 2) </span></p><span data-dcnode-id="3630" instrument_node=""> </span><p class="description" data-dcnode-id="3628"><span data-dcnode-id="3629" instrument_node=""> 5. A separate area with 2 slidable arrows (green/yellow and yellow/red) marks your respiratory peak ­flow zone. </span></p><span data-dcnode-id="3627" instrument_node=""> </span><p class="description" data-dcnode-id="3625"><span data-dcnode-id="3626" instrument_node=""> this green-yellow red monitoring system helps you determine when quick- relief medicine or emergency attention is needed. Your physician or other healthcare provider can help determine your individual readings. (See Image 4) It is important to know the zones: </span></p><span data-dcnode-id="3624" instrument_node=""> </span><p class="description" data-dcnode-id="3613"><span data-dcnode-id="3623" instrument_node=""> </span><span class="a-text-bold" data-dcnode-id="3621"><span data-dcnode-id="3622" instrument_node="">Green Zone:</span></span><span data-dcnode-id="3620" instrument_node=""> When your peak flow is 80% to 100%, you can do normal activities. </span><span class="a-text-bold" data-dcnode-id="3618"><span data-dcnode-id="3619" instrument_node="">Yellow Zone:</span></span><span data-dcnode-id="3617" instrument_node=""> When your peak flow is 50% to 80%, use caution in your activities. </span><span class="a-text-bold" data-dcnode-id="3615"><span data-dcnode-id="3616" instrument_node="">Red Zone:</span></span><span data-dcnode-id="3614" instrument_node=""> When your peak ­flow is less than 50%, seek immediate medical help. </span></p><span data-dcnode-id="3612" instrument_node=""> </span><p class="description" data-dcnode-id="3610"><span data-dcnode-id="3611" instrument_node=""> 6. Slide the green/yellow respiratory peak zone arrow to your individual best reading determined by your doctor. </span></p><span data-dcnode-id="3609" instrument_node=""> </span><p class="description" data-dcnode-id="3607"><span data-dcnode-id="3608" instrument_node=""> 7. Set the yellow/red respiratory peak zone arrow to 50% less than your individual best reading. </span></p><span data-dcnode-id="3606" instrument_node=""> </span></div><span data-dcnode-id="3604" instrument_node=""> </span></div><span data-dcnode-id="3602" instrument_node=""> </span></div><span data-dcnode-id="3600" instrument_node="">
</span><div cel_widget_id="aplus-basic-module-13-text" class="celwidget aplus-module basic-module-13-text aplus-standard" data-dcnode-id="3557"><span data-dcnode-id="3599" instrument_node="">
</span><div class="a-section a-spacing-none aplus-module aplus-module-13 aplus-module-wrapper apm-fixed-width" data-dcnode-id="3559"><span data-dcnode-id="3598" instrument_node=""> </span><span data-dcnode-id="3596" instrument_node="">
</span><div class="a-section a-spacing-none aplus-13-heading" data-dcnode-id="3591"><span data-dcnode-id="3595" instrument_node=""> </span><h1 class="aplus-13-heading-text a-text-bold" data-dcnode-id="3593"><span data-dcnode-id="3594" instrument_node=""> How do I use my Peak Flow Meter? </span></h1><span data-dcnode-id="3592" instrument_node=""> </span></div><span data-dcnode-id="3590" instrument_node=""> </span><div class="a-section a-spacing-none aplus-module-section aplus-text-section" data-dcnode-id="3561"><span data-dcnode-id="3589" instrument_node=""> </span><p class="description" data-dcnode-id="3587"><span data-dcnode-id="3588" instrument_node=""> 8. Before you start, stand or sit up straight. </span></p><span data-dcnode-id="3586" instrument_node=""> </span><p class="description" data-dcnode-id="3584"><span data-dcnode-id="3585" instrument_node=""> 9. Breathe in as deeply as you can, filling the lungs completely. </span></p><span data-dcnode-id="3583" instrument_node=""> </span><p class="description" data-dcnode-id="3581"><span data-dcnode-id="3582" instrument_node=""> 10. Open your mouth and place your mouthpiece into it, forming a tight seal with your lips. Do not block the mouthpiece with your tongue. (See Image 6) </span></p><span data-dcnode-id="3580" instrument_node=""> </span><p class="description" data-dcnode-id="3578"><span data-dcnode-id="3579" instrument_node=""> 11. As hard and as quickly as possible, blow the air out forcefully. Avoid spitting and coughing when you blow to help prevent false high readings. </span></p><span data-dcnode-id="3577" instrument_node=""> </span><p class="description" data-dcnode-id="3575"><span data-dcnode-id="3576" instrument_node=""> 12. When you are finished, take the meter out of your mouth and read the number where the indicator stops. This is your peak ­flow level, measured in Liters Per Minute (LPM). </span></p><span data-dcnode-id="3574" instrument_node=""> </span><p class="description" data-dcnode-id="3572"><span data-dcnode-id="3573" instrument_node=""> 13. Repeat steps 10-12 two more times (for a total of 3 readings). It may be necessary to rest between readings. </span></p><span data-dcnode-id="3571" instrument_node=""> </span><p class="description" data-dcnode-id="3569"><span data-dcnode-id="3570" instrument_node=""> 14. In the Daily Record Chart, record the highest of the readings– your peak expiratory ­flow (PEF)– in the column under the date and time of day (AM or PM). </span></p><span data-dcnode-id="3568" instrument_node=""> </span><p class="description" data-dcnode-id="3566"><span data-dcnode-id="3567" instrument_node=""> 15. Simply place an “o” (your reading before medication) and an “x” (your reading after medication) in the appropriate box corresponding to the LPM values you achieve, depending on when and how often your physician asks you to take a reading. You can begin to create a daily trend graph by connecting the o’s and the x’s with a line. </span></p><span data-dcnode-id="3565" instrument_node=""> </span><p class="description" data-dcnode-id="3563"><span data-dcnode-id="3564" instrument_node=""> 16. Record your respiratory symptoms, signs, triggers, and medication use in the Additional Notes section of the journal, and share this information with your doctor. </span></p><span data-dcnode-id="3562" instrument_node=""> </span></div><span data-dcnode-id="3560" instrument_node=""> </span></div><span data-dcnode-id="3558" instrument_node=""> </span></div><span data-dcnode-id="3556" instrument_node="">

</span><h3 class="a-spacing-mini" data-dcnode-id="3531"><span data-dcnode-id="3532" instrument_node=""> How to Sanitize your Peak Flow Meter </span></h3><span data-dcnode-id="3530" instrument_node=""> </span><p data-dcnode-id="3528"><span data-dcnode-id="3529" instrument_node=""> Clean at least once every two weeks by hand washing with warm water and mild liquid soap. Rinse thoroughly and air dry completely prior to use. Do not boil the Quest AsthmaMD Peak Flow Meter. Optimal Storage Conditions: store meter at room temperature. Relative Humidity: 30% - 70%. </span></p><span data-dcnode-id="3527" instrument_node=""> </span></div><span data-dcnode-id="3525" instrument_node="">

</span><p data-dcnode-id="3474"><span data-dcnode-id="3478" instrument_node=""> </span><span data-dcnode-id="3476"><span data-dcnode-id="3477" instrument_node="">About your Peak Flow Meter: A peak flow meter is a handheld device that measures how well air moves out of the lungs. It checks how fast air leaves the lungs when you blow forcefully and you fully inhale. Keeping track of peak expiratory flow helps you know if your respiratory symptoms are worsening or not. This meter was designed to make following your respiratory treatment plan easy. Your health care provider will se the color zone indicators to your personal zones based on your personal best peak flow rate value. (The best peak flow value you can achieve on a good day when your symptoms are under control). The AsthmaMD peak flow meter is a single patient use device to measure a patients's peak expiratory flow rate in liters/minutes. this measurement is helpful in managing respiratory conditions such as asthma. The device is intended for use by patients requiring the measurement of peak expiratory flow rates. We have provided a free downloadable tracking App for accurate monitoring of your asthma. However, if you're not able to access AsthmaMD app, we have provided a convenient paper log.</span></span><span data-dcnode-id="3475" instrument_node=""> </span></p><span data-dcnode-id="3473" instrument_node=""> </span></div><span data-dcnode-id="3471" instrument_node=""> </span><span data-dcnode-id="3468" instrument_node="">

</span><span data-dcnode-id="1774"><span data-dcnode-id="1796" instrument_node="">
  Ok, so I was trying to reach the 800 mark.  After repeated failures, I finally went online and found that for my personal stats, my expected peak flow is 368.70 L/min. Hey! I’m right there!  But my competitive spirit says, “You can do better than that!”.  Now my sides hurt.</span><br data-dcnode-id="1795"><br data-dcnode-id="1794"><span data-dcnode-id="1793" instrument_node="">People complain that it gets moldy. Three things you can do to prevent it:</span><br data-dcnode-id="1792"><span data-dcnode-id="1791" instrument_node="">(1) Brush teeth or rinse mouth with mouthwash before use. If you just ate a PB&amp;J and then blow in this device, you’re sending out party invitations to all strains of mold and bacteria to meet in your flow meter.</span><br data-dcnode-id="1790"><span data-dcnode-id="1789" instrument_node="">(2) After use, put mouthwash in a spray bottle and spray it down inside and out.  After a few minutes, rinse it if you hate that minty spring scent; but the germs are killed, so rinse away!</span><br data-dcnode-id="1788"><span data-dcnode-id="1787" instrument_node="">(3) Do not shut the “handle”. Closing it directly after use closes off those holes on the end, thus limiting air circulation (in the device...not your lungs), which promotes mold. Add that PB&amp;J, and you’ll want to leave a 1-star review, too. Now, is that really fair to the company, just because you couldn’t resist a sandwich, or be bothered with rinsing the device and airing it out for an hour?</span><br data-dcnode-id="1786"><br data-dcnode-id="1785"><span data-dcnode-id="1784" instrument_node="">If you google “Omni peak flow calculator”, you can enter your height, age, race (I know...don’t kill the messenger), and gender (men have bigger lungs) you can find your own ideal peak flow rate.  But keep in mind, if you have asthma or pulmonary issues, your doctor should help you determine your peak flow rate. My understanding is that this device helps you determine if you need medicine or if the medicine is doing it’s job. So please check with your doctor.</span><br data-dcnode-id="1783"><br data-dcnode-id="1782"><span data-dcnode-id="1781" instrument_node="">I also bought a lung exerciser. Sorry, guys!  No casual breathing for you any more! (I’m talking to my lungs).  I also bought a pulse oxometer (99!  Whoohoo!)</span><br data-dcnode-id="1780"><br data-dcnode-id="1779"><span data-dcnode-id="1778" instrument_node="">Oh!  What do I think of the peak flow meter?  It’s a pretty good device!  With these low prices, you can get one for everyone in the family. This isn’t something you’re going to want to share...especially if you still can’t resist that peanut butter and jelly sandwich.</span><br data-dcnode-id="1777"><br data-dcnode-id="1776"><span data-dcnode-id="1775" instrument_node="">Enjoy (the peak flow meter, I mean)

</span></a></div><span class="a-size-base a-color-secondary review-date" data-dcnode-id="1496" data-hook="review-date"><span data-dcnode-id="1497" instrument_node="">Reviewed in the United States on August 20, 2016</span></span><div class="a-row a-spacing-mini review-data review-format-strip" data-dcnode-id="1493"><span class="a-size-mini a-color-state a-text-bold" data-dcnode-id="1494" data-hook="avp-badge-linkless"><span data-dcnode-id="1495" instrument_node="">Verified Purchase</span></span></div><div class="a-row a-spacing-small review-data" data-dcnode-id="1479"><span class="a-size-base review-text" data-dcnode-id="1480" data-hook="review-body"><div class="a-expander-collapsed-height a-row a-expander-container a-expander-partial-collapse-container" data-a-expander-collapsed-height="300" data-a-expander-name="review_text_read_more" data-dcnode-id="1481" style="max-height:300px"><div aria-expanded="false" class="a-expander-content reviewText review-text-content a-expander-partial-collapse-content" data-dcnode-id="1488" data-hook="review-collapsed"><span data-dcnode-id="1492" instrument_node="">
</span><span data-dcnode-id="1490"><span data-dcnode-id="1491" instrument_node="">
  It's your standard peak flow meter. Not too big to handle and comfortable and easy to use. What really makes this a great product is the app AsthmaMD that you can download from Qcode on the box. You can store all your info about your meds, get medication reminders, track your peak flow over time and most importantly, the action plan. I had the makings of an asthma attack late one night. When I inputted that my peak flow had drop to 350 from 465, it prompted me to start my action plan and walked me through the steps to take to stop the attack. It prompted me to take my breathing treatment followed by my rescue inhaler and wait 30 mins. It even has a timer built in. After 30mins, it prompted me to do another peak flow and showed my vast improvement. I only had to go through half the action plan to get relief but it will go through everything with you until you feel better or have to call 911, in which there's a button in the app for that too. Luckily, I got to avoid the ER. This peak flow meter and accompanying app are definitely a keeper and way more useful than my doctor.
