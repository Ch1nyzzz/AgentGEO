</span><li class="slide-note" data-dcnode-id="847"><span data-dcnode-id="854" instrument_node="">After several minutes of breathing, the helium concentrations in the spirometer and lung become the same. From the law of conservation of matter, we know that the total amount of helium beforehand after is the same. Therefore we can set the fractional concentration times the volume before equal to the fractional concentration times the volume, because of the conservation law of matter.  </span><br data-dcnode-id="853"><span data-dcnode-id="852" instrument_node=""> We solve for the volume after (the volume of the lung and spirometer), subtract out the volume of the spirometer, and we get the volume of the lung. </span><br data-dcnode-id="851"><span data-dcnode-id="850" instrument_node=""> Helium poorly soluble in water and thus diffuses very poorly across the alveolar wall. Subjects breath a gas that cannot escape from the lungs </span><br data-dcnode-id="849"><span data-dcnode-id="848" instrument_node=""> </span></li><span data-dcnode-id="846" instrument_node="">
