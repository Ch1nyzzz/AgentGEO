</span><div class="namebox" data-dcnode-id="384"><span data-dcnode-id="385" instrument_node="">Name: ____________________________________</span></div><span data-dcnode-id="383" instrument_node="">
</span><h1 data-dcnode-id="381"><span data-dcnode-id="382" instrument_node="">Investigation: What Factors Affect Lung Capacity</span></h1><span data-dcnode-id="380" instrument_node="">
</span><p data-dcnode-id="371"><img align="right" alt="experiment set-up" data-dcnode-id="379" height="278" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.biologycorner.com/resources/balloon_measure.gif&amp;raw" width="300"><span data-dcnode-id="378" instrument_node="">The amount of air that you move in and out of your lungs while breathing normally is called </span><strong data-dcnode-id="376"><span data-dcnode-id="377" instrument_node="">TIDAL VOLUME</span></strong><span data-dcnode-id="375" instrument_node="">. This amount of air provides enough oxygen for a person who is resting. It is possible to inhale and exhale more forcefully - the maximum amount of air moved in and out of the lungs is called the </span><strong data-dcnode-id="373"><span data-dcnode-id="374" instrument_node="">VITAL CAPACITY, </span></strong><span data-dcnode-id="372" instrument_node="">which is the amount of air a person can expel from the lungs at maximum inhalation.</span></p><span data-dcnode-id="370" instrument_node="">
</span><p data-dcnode-id="368"><span data-dcnode-id="369" instrument_node="">Materials&nbsp; -- Balloons, metric ruler, meter stick (or rulers or tape measures)</span></p><span data-dcnode-id="367" instrument_node="">
</span><p data-dcnode-id="365"><span data-dcnode-id="366" instrument_node="">Prediction:&nbsp;&nbsp; Which factor(s) have the most affect a person’s vital capacity? Rank in order from MOST effect (1)&nbsp; to least effect (5)</span></p><span data-dcnode-id="364" instrument_node="">
</span><p data-dcnode-id="357"><img alt="" data-dcnode-id="363" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.biologycorner.com/resources/square.gif&amp;raw"><span data-dcnode-id="362" instrument_node=""> The weight of the person </span><img alt="" data-dcnode-id="361" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.biologycorner.com/resources/square.gif&amp;raw"><span data-dcnode-id="360" instrument_node=""> The height of the person</span><br data-dcnode-id="359"><span data-dcnode-id="358" instrument_node="">
</span></p><span data-dcnode-id="356" instrument_node="">
</span><p data-dcnode-id="347"><img alt="" data-dcnode-id="355" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.biologycorner.com/resources/square.gif&amp;raw"><span data-dcnode-id="354" instrument_node=""> The sex of the person </span><img alt="" data-dcnode-id="353" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.biologycorner.com/resources/square.gif&amp;raw"><span data-dcnode-id="352" instrument_node=""> The age of the person </span><img alt="" data-dcnode-id="351" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.biologycorner.com/resources/square.gif&amp;raw"><span data-dcnode-id="350" instrument_node=""> Activity level</span><br data-dcnode-id="349"><span data-dcnode-id="348" instrument_node="">
</span></p><span data-dcnode-id="346" instrument_node="">
</span><p data-dcnode-id="343"><strong data-dcnode-id="344"><span data-dcnode-id="345" instrument_node="">PROCEDURE</span></strong></p><span data-dcnode-id="342" instrument_node="">
</span><div class="image-right" data-dcnode-id="337"><span data-dcnode-id="341" instrument_node="">
</span><p data-dcnode-id="339"><img alt="graph" data-dcnode-id="340" height="337" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.biologycorner.com/resources/balloon_graph.gif&amp;raw" width="371"></p><span data-dcnode-id="338" instrument_node="">
</span></div><span data-dcnode-id="336" instrument_node="">
</span><p data-dcnode-id="334"><span data-dcnode-id="335" instrument_node="">In this activity, you will be measuring the vital capacity of members of the class.&nbsp;&nbsp; If you have any breathing difficulties (asthma or other condition), you should not participate.&nbsp; You will be using the diameter of a balloon and the graph shown to estimate your capacities.</span></p><span data-dcnode-id="333" instrument_node="">
</span><p data-dcnode-id="326"><span data-dcnode-id="332" instrument_node="">1. Choose 3 subjects from your group and </span><u data-dcnode-id="330"><span data-dcnode-id="331" instrument_node="">record data</span></u><span data-dcnode-id="329" instrument_node=""> on their height, age, sex, and activity level.&nbsp;&nbsp; </span><br data-dcnode-id="328"><span data-dcnode-id="327" instrument_node="">
</span></p><span data-dcnode-id="325" instrument_node="">
</span><p data-dcnode-id="320"><span data-dcnode-id="324" instrument_node="">2. </span><strong data-dcnode-id="322"><span data-dcnode-id="323" instrument_node="">Measuring Vital Capacity</span></strong><span data-dcnode-id="321" instrument_node=""> -- Stretch a round balloon several times to stretch it out. Take a deep breath and then exhale into the balloon. Pinch the end of the balloon and measure its diameter in cm.&nbsp; Record on data table. </span></p><span data-dcnode-id="319" instrument_node="">
</span><p data-dcnode-id="315"><span data-dcnode-id="318" instrument_node="">3. &nbsp;Convert the diameter</span><strong data-dcnode-id="316"><span data-dcnode-id="317" instrument_node=""> to volume using the graph and record this on your table.</span></strong></p><span data-dcnode-id="314" instrument_node="">
</span><p data-dcnode-id="310"><span data-dcnode-id="313" instrument_node="">4. </span><strong data-dcnode-id="311"><span data-dcnode-id="312" instrument_node="">Estimated Vital Capacity&nbsp;&nbsp;&nbsp;&nbsp;&nbsp; &nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;</span></strong></p><span data-dcnode-id="309" instrument_node="">
</span><p data-dcnode-id="305"><span data-dcnode-id="308" instrument_node="">Research has shown that the capacity of a person's lungs is proportional to the surface area of his body and his height.&nbsp;&nbsp; This online calculator will use your height and age to estimate your vital capacity.&nbsp; Have each of your subjects record their data.</span><br data-dcnode-id="307"><span data-dcnode-id="306" instrument_node="">
</span></p><span data-dcnode-id="304" instrument_node="">
</span><blockquote data-dcnode-id="296"><span data-dcnode-id="303" instrument_node="">
</span><p data-dcnode-id="298"><span data-dcnode-id="302" instrument_node="">Go to this site: </span><a data-dcnode-id="300" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//biol.co/vitcap1"><span data-dcnode-id="301" instrument_node="">http://biol.co/vitcap1</span></a><span data-dcnode-id="299" instrument_node="">&nbsp;&nbsp; and input information on test subjects.&nbsp; It will calculate the vital capacity.</span></p><span data-dcnode-id="297" instrument_node="">
