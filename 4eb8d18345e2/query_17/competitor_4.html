</span><a data-dcnode-id="2700" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.dharmawheel.net/viewtopic.php%3Fp%3D285042%23p285042"><span data-dcnode-id="2701" instrument_node="">Re: What is the meaning of Tsa, Lung and Tigle?</span></a><span data-dcnode-id="2699" instrument_node="">
</span></h3><span data-dcnode-id="2697" instrument_node="">
</span><p class="author" data-dcnode-id="2681"><span data-dcnode-id="2696" instrument_node="">
</span><span data-dcnode-id="2692"><i aria-hidden="true" class="icon fa-file fa-fw icon-lightgray icon-md" data-dcnode-id="2695"></i><span class="sr-only" data-dcnode-id="2693"><span data-dcnode-id="2694" instrument_node="">Post</span></span></span><span data-dcnode-id="2691" instrument_node="">
</span><span class="responsive-hide" data-dcnode-id="2685"><span data-dcnode-id="2690" instrument_node="">by </span><strong data-dcnode-id="2687"><span class="username" data-dcnode-id="2688"><span data-dcnode-id="2689" instrument_node="">kalden yungdrung</span></span></strong><span data-dcnode-id="2686" instrument_node=""> » </span></span><time data-dcnode-id="2683" datetime="2015-05-26T06:05:37+00:00"><span data-dcnode-id="2684" instrument_node="">Tue May 26, 2015 7:05 am</span></time><span data-dcnode-id="2682" instrument_node="">
</span></p><span data-dcnode-id="2680" instrument_node="">
</span><div class="content" data-dcnode-id="2624"><blockquote data-dcnode-id="2662"><div data-dcnode-id="2663"><cite data-dcnode-id="2678"><span data-dcnode-id="2679" instrument_node="">antiquebuddhas wrote:</span></cite><span data-dcnode-id="2677" instrument_node="">In Tibetan tradition, we often studied about tsa, lung and tigle. </span><br data-dcnode-id="2676"><span data-dcnode-id="2675" instrument_node="">
Tsa means channel, lung means wind or breath and tigle means essences.</span><br data-dcnode-id="2674"><span data-dcnode-id="2673" instrument_node="">
I would like to know more about tsa, lungs, and tigle. </span><br data-dcnode-id="2672"><span data-dcnode-id="2671" instrument_node="">
What does these term means and what's their importance in Tibetan or Vajrayana tradition?</span><br data-dcnode-id="2670"><span data-dcnode-id="2669" instrument_node="">
</span><img alt=":anjali:" class="smilies" data-dcnode-id="2668" height="35" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.dharmawheel.net/images/smilies/anjali.gif&amp;raw" title="Anjali" width="25"><span data-dcnode-id="2667" instrument_node=""> </span><br data-dcnode-id="2666"><span data-dcnode-id="2665" instrument_node="">
</span><img alt=":namaste:" class="smilies" data-dcnode-id="2664" height="32" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.dharmawheel.net/images/smilies/namaste.gif&amp;raw" title="Namaste" width="36"></div></blockquote><span data-dcnode-id="2661" instrument_node="">
</span><br data-dcnode-id="2660"><span data-dcnode-id="2659" instrument_node="">
Tashi delek A,</span><br data-dcnode-id="2658"><span data-dcnode-id="2657" instrument_node="">
</span><br data-dcnode-id="2656"><span data-dcnode-id="2655" instrument_node="">
Tsa = subtle channels in the body or also known as Nadis. We have 72000 of these chanels, from which the ida, pingala and sushumna are the main important channels used in some Yoga styles.</span><br data-dcnode-id="2654"><span data-dcnode-id="2653" instrument_node="">
</span><br data-dcnode-id="2652"><span data-dcnode-id="2651" instrument_node="">
The Tigle or Bindhu is used as a drop, and visualized. This drop is (can be) situated in the heart or at the navel chakra etc..</span><br data-dcnode-id="2650"><span data-dcnode-id="2649" instrument_node="">
</span><br data-dcnode-id="2648"><span data-dcnode-id="2647" instrument_node="">
The unclean winds of the sun and moon chanels (ida and pingala) are drawn into the central Sushumna chanel where these winds unites in the central chanel or Sushumna. </span><br data-dcnode-id="2646"><span data-dcnode-id="2645" instrument_node="">
</span><br data-dcnode-id="2644"><span data-dcnode-id="2643" instrument_node="">
Then these winds become pure and can serve as the energy to move the Thigle.</span><br data-dcnode-id="2642"><span data-dcnode-id="2641" instrument_node="">
For instance in Phowa the Thigle is then shoot upwards to the Brahma chakra to cause the preparation for the leaving of the mind through this chakra in the process of dying. If one has success with this practice (Phowa) there is a little whole on top of the head.</span><br data-dcnode-id="2640"><span data-dcnode-id="2639" instrument_node="">
</span><br data-dcnode-id="2638"><span data-dcnode-id="2637" instrument_node="">
But there are many more practices based on this principle.</span><br data-dcnode-id="2636"><span data-dcnode-id="2635" instrument_node="">
Tumo or heat yoga is similar to the above mentioned yoga. </span><br data-dcnode-id="2634"><span data-dcnode-id="2633" instrument_node="">
Here the navel chakra is mobilised with the red Tigle / Bindhu .</span><br data-dcnode-id="2632"><span data-dcnode-id="2631" instrument_node="">
This Red Bindhu is vitalized by visualization and can go to the heart, where it is dissolved into the 9 exits of the heart, through the whole body, which causes the heat.</span><br data-dcnode-id="2630"><span data-dcnode-id="2629" instrument_node="">
</span><br data-dcnode-id="2628"><span data-dcnode-id="2627" instrument_node="">
Mutsug Marro</span><br data-dcnode-id="2626"><span data-dcnode-id="2625" instrument_node="">
KY</span></div><span data-dcnode-id="2623" instrument_node="">

</span><h3 data-dcnode-id="2081"><span data-dcnode-id="2085" instrument_node="">
</span><a data-dcnode-id="2083" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.dharmawheel.net/viewtopic.php%3Fp%3D285181%23p285181"><span data-dcnode-id="2084" instrument_node="">Re: What is the meaning of Tsa, Lung and Tigle?</span></a><span data-dcnode-id="2082" instrument_node="">
</span></h3><span data-dcnode-id="2080" instrument_node="">
</span><p class="author" data-dcnode-id="2064"><span data-dcnode-id="2079" instrument_node="">
</span><span data-dcnode-id="2075"><i aria-hidden="true" class="icon fa-file fa-fw icon-lightgray icon-md" data-dcnode-id="2078"></i><span class="sr-only" data-dcnode-id="2076"><span data-dcnode-id="2077" instrument_node="">Post</span></span></span><span data-dcnode-id="2074" instrument_node="">
</span><span class="responsive-hide" data-dcnode-id="2068"><span data-dcnode-id="2073" instrument_node="">by </span><strong data-dcnode-id="2070"><span class="username" data-dcnode-id="2071"><span data-dcnode-id="2072" instrument_node="">antiquebuddhas</span></span></strong><span data-dcnode-id="2069" instrument_node=""> » </span></span><time data-dcnode-id="2066" datetime="2015-05-27T06:10:37+00:00"><span data-dcnode-id="2067" instrument_node="">Wed May 27, 2015 7:10 am</span></time><span data-dcnode-id="2065" instrument_node="">
</span></p><span data-dcnode-id="2063" instrument_node="">
</span><div class="content" data-dcnode-id="2009"><blockquote data-dcnode-id="2024"><div data-dcnode-id="2025"><cite data-dcnode-id="2061"><span data-dcnode-id="2062" instrument_node="">kalden yungdrung wrote:</span></cite><span data-dcnode-id="2060" instrument_node="">
Tashi delek A,</span><br data-dcnode-id="2059"><span data-dcnode-id="2058" instrument_node="">
</span><br data-dcnode-id="2057"><span data-dcnode-id="2056" instrument_node="">
Tsa = subtle channels in the body or also known as Nadis. We have 72000 of these chanels, from which the ida, pingala and sushumna are the main important channels used in some Yoga styles.</span><br data-dcnode-id="2055"><span data-dcnode-id="2054" instrument_node="">
</span><br data-dcnode-id="2053"><span data-dcnode-id="2052" instrument_node="">
The Tigle or Bindhu is used as a drop, and visualized. This drop is (can be) situated in the heart or at the navel chakra etc..</span><br data-dcnode-id="2051"><span data-dcnode-id="2050" instrument_node="">
</span><br data-dcnode-id="2049"><span data-dcnode-id="2048" instrument_node="">
The unclean winds of the sun and moon chanels (ida and pingala) are drawn into the central Sushumna chanel where these winds unites in the central chanel or Sushumna. </span><br data-dcnode-id="2047"><span data-dcnode-id="2046" instrument_node="">
</span><br data-dcnode-id="2045"><span data-dcnode-id="2044" instrument_node="">
Then these winds become pure and can serve as the energy to move the Thigle.</span><br data-dcnode-id="2043"><span data-dcnode-id="2042" instrument_node="">
For instance in Phowa the Thigle is then shoot upwards to the Brahma chakra to cause the preparation for the leaving of the mind through this chakra in the process of dying. If one has success with this practice (Phowa) there is a little whole on top of the head.</span><br data-dcnode-id="2041"><span data-dcnode-id="2040" instrument_node="">
</span><br data-dcnode-id="2039"><span data-dcnode-id="2038" instrument_node="">
But there are many more practices based on this principle.</span><br data-dcnode-id="2037"><span data-dcnode-id="2036" instrument_node="">
Tumo or heat yoga is similar to the above mentioned yoga. </span><br data-dcnode-id="2035"><span data-dcnode-id="2034" instrument_node="">
Here the navel chakra is mobilised with the red Tigle / Bindhu .</span><br data-dcnode-id="2033"><span data-dcnode-id="2032" instrument_node="">
This Red Bindhu is vitalized by visualization and can go to the heart, where it is dissolved into the 9 exits of the heart, through the whole body, which causes the heat.</span><br data-dcnode-id="2031"><span data-dcnode-id="2030" instrument_node="">
</span><br data-dcnode-id="2029"><span data-dcnode-id="2028" instrument_node="">

</span><h3 data-dcnode-id="1674"><span data-dcnode-id="1678" instrument_node="">
</span><a data-dcnode-id="1676" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.dharmawheel.net/viewtopic.php%3Fp%3D285526%23p285526"><span data-dcnode-id="1677" instrument_node="">Re: What is the meaning of Tsa, Lung and Tigle?</span></a><span data-dcnode-id="1675" instrument_node="">
</span></h3><span data-dcnode-id="1673" instrument_node="">
</span><p class="author" data-dcnode-id="1657"><span data-dcnode-id="1672" instrument_node="">
</span><span data-dcnode-id="1668"><i aria-hidden="true" class="icon fa-file fa-fw icon-lightgray icon-md" data-dcnode-id="1671"></i><span class="sr-only" data-dcnode-id="1669"><span data-dcnode-id="1670" instrument_node="">Post</span></span></span><span data-dcnode-id="1667" instrument_node="">
</span><span class="responsive-hide" data-dcnode-id="1661"><span data-dcnode-id="1666" instrument_node="">by </span><strong data-dcnode-id="1663"><span class="username" data-dcnode-id="1664"><span data-dcnode-id="1665" instrument_node="">kalden yungdrung</span></span></strong><span data-dcnode-id="1662" instrument_node=""> » </span></span><time data-dcnode-id="1659" datetime="2015-05-29T08:40:22+00:00"><span data-dcnode-id="1660" instrument_node="">Fri May 29, 2015 9:40 am</span></time><span data-dcnode-id="1658" instrument_node="">
</span></p><span data-dcnode-id="1656" instrument_node="">
</span><div class="content" data-dcnode-id="1584"><blockquote data-dcnode-id="1638"><div data-dcnode-id="1639"><cite data-dcnode-id="1654"><span data-dcnode-id="1655" instrument_node="">antiquebuddhas wrote:</span></cite><span data-dcnode-id="1653" instrument_node="">
Namaste Kalden,</span><br data-dcnode-id="1652"><span data-dcnode-id="1651" instrument_node="">
First of all, thank you.</span><br data-dcnode-id="1650"><span data-dcnode-id="1649" instrument_node="">
So as I have mentioned, all tsa, lungs,and tigle are all the parts of 72000 channels in our bodies. </span><br data-dcnode-id="1648"><span data-dcnode-id="1647" instrument_node="">
And tigle is located in the heart of our body, and tsa is located in most of our body. </span><br data-dcnode-id="1646"><span data-dcnode-id="1645" instrument_node="">
I was wondering if we focus on the Tsa channel, we can be able to feel and change the flow of the sensation that are created in our body. </span><br data-dcnode-id="1644"><span data-dcnode-id="1643" instrument_node="">
Let's say, while meditating  we try to feel the sensation, feelings that arises on some part of body (like toes and foot), that means we are able to focus on Tsa channels. </span><br data-dcnode-id="1642"><span data-dcnode-id="1641" instrument_node="">
</span><img alt=":anjali:" class="smilies" data-dcnode-id="1640" height="35" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.dharmawheel.net/images/smilies/anjali.gif&amp;raw" title="Anjali" width="25"></div></blockquote><span data-dcnode-id="1637" instrument_node="">
</span><em class="text-italics" data-dcnode-id="1593"><span data-dcnode-id="1636" instrument_node="">Tashi delek A,</span><br data-dcnode-id="1635"><span data-dcnode-id="1634" instrument_node="">
</span><br data-dcnode-id="1633"><span data-dcnode-id="1632" instrument_node="">
These yogas do i see as adds to get the Buddha in the heart enlightened , whereas in Dzogchen this inner entity called Bodhicitta in Tantra is already enlightened. So it is all yoga which go from gross to subtle, via a dualistic approach and called Tantra.</span><br data-dcnode-id="1631"><span data-dcnode-id="1630" instrument_node="">
</span><br data-dcnode-id="1629"><span data-dcnode-id="1628" instrument_node="">
If i see it in the Dzogchen way then in the heart this Bodhicitta will be the already complete dwelling Buddhahood.</span><br data-dcnode-id="1627"><span data-dcnode-id="1626" instrument_node="">
</span><br data-dcnode-id="1625"><span data-dcnode-id="1624" instrument_node="">
Indeed in Tantra we can see this as from gross to subtle development, from the Bodhicitta as: outer / inner and secret emancipation.</span><br data-dcnode-id="1623"><span data-dcnode-id="1622" instrument_node="">
</span><br data-dcnode-id="1621"><span data-dcnode-id="1620" instrument_node="">
This inner complete Buddhahood is not so secret in Dzogchen and does not need also that secrecy. It is secret and unknown if we cannot have the right vision and awareness about this inner already complete , clear and radiant entity our Buddhahood. </span><br data-dcnode-id="1619"><span data-dcnode-id="1618" instrument_node="">
Then, the experience of this Buddhahood which is residing in the heart, that is experienced by everybody sometimes but is not recognized as such, is remarkable. So to experience this entity which is already there complete, that is the way in Dzogchen and if we compare this to Tantra then one has to go up the 3 stairs of outer / inner and secret to reach the result or fruit. </span><br data-dcnode-id="1617"><span data-dcnode-id="1616" instrument_node="">
</span><br data-dcnode-id="1615"><span data-dcnode-id="1614" instrument_node="">
So all in all do we encounter in Tantra the slowly approach to this Buddhahood from outside to inside whereas in Dzogchen this is done right on without secrecy. </span><br data-dcnode-id="1613"><span data-dcnode-id="1612" instrument_node="">
</span><br data-dcnode-id="1611"><span data-dcnode-id="1610" instrument_node="">
Personal do i see Phowa and Tsalung Trulkor as not secret Yoga as well Tumo. Also working with the Thigle / bindhu do i see as Yoga and not secret. They are for me personal seen all dualistic methods and can cause bliss etc. all Mind based things.</span><br data-dcnode-id="1609"><span data-dcnode-id="1608" instrument_node="">
Ok some make out of this Mind secret things, that is understandable for me, in case we deal with some methods for some humans.</span><br data-dcnode-id="1607"><span data-dcnode-id="1606" instrument_node="">
</span><br data-dcnode-id="1605"><span data-dcnode-id="1604" instrument_node="">
Dzogchen bliss is self emanating and not caused by Yoga etc. if we can remain in our Natural State. </span><br data-dcnode-id="1603"><span data-dcnode-id="1602" instrument_node="">
</span><br data-dcnode-id="1601"><span data-dcnode-id="1600" instrument_node="">
My Dzogchen experience / awareness is unique but not secret at all, because everybody has so his/her own experience. But the most are not aware of this fact even if they do some Tantra. </span><br data-dcnode-id="1599"><span data-dcnode-id="1598" instrument_node="">
</span><br data-dcnode-id="1597"><span data-dcnode-id="1596" instrument_node="">
But that Yoga is made secret (Tantra) that has sure so its reason.  </span><img alt=":smile:" class="smilies" data-dcnode-id="1595" height="20" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.dharmawheel.net/images/smilies/smile.gif&amp;raw" title="Smiling" width="20"><span data-dcnode-id="1594" instrument_node=""> </span></em><br data-dcnode-id="1592"><span data-dcnode-id="1591" instrument_node="">
</span><br data-dcnode-id="1590"><span data-dcnode-id="1589" instrument_node="">
</span><br data-dcnode-id="1588"><span data-dcnode-id="1587" instrument_node="">
Mutsug Marro</span><br data-dcnode-id="1586"><span data-dcnode-id="1585" instrument_node="">
KY</span></div><span data-dcnode-id="1583" instrument_node="">

</span></p><span data-dcnode-id="1507" instrument_node="">
</span><div class="content" data-dcnode-id="1479"><span data-dcnode-id="1506" instrument_node="">You can derive benefit from working with the subtle channels,winds and drops, but it can also be a source of distraction and without proper guidance and understanding, can actually cause a lot of harm. </span><br data-dcnode-id="1505"><span data-dcnode-id="1504" instrument_node="">
</span><br data-dcnode-id="1503"><span data-dcnode-id="1502" instrument_node="">
Working with them properly can enhance experiences of the mind's nature and bring about temporary experiences of clarity,bliss and non-thought, but it can also lead to even more conceptualization and attachment to the same temporary and fleeting experiences. </span><br data-dcnode-id="1501"><span data-dcnode-id="1500" instrument_node="">
</span><br data-dcnode-id="1499"><span data-dcnode-id="1498" instrument_node="">
In Mahamudra and Dzogchen, practicing a path of method needs has to be accompanied by the path of liberation (recognition of minds nature ) for the practices to actually be of any benefit.</span><br data-dcnode-id="1497"><span data-dcnode-id="1496" instrument_node="">
</span><br data-dcnode-id="1495"><span data-dcnode-id="1494" instrument_node="">
From Sarahas 'Song for the king' doha. </span><br data-dcnode-id="1493"><span data-dcnode-id="1492" instrument_node="">
</span><br data-dcnode-id="1491"><span data-dcnode-id="1490" instrument_node="">
</span><em class="text-italics" data-dcnode-id="1480"><span data-dcnode-id="1489" instrument_node="">"For the sake of the winds, you meditate on your body as an empty house,</span><br data-dcnode-id="1488"><span data-dcnode-id="1487" instrument_node="">
Practicing artificial methods in great variety and number,</span><br data-dcnode-id="1486"><span data-dcnode-id="1485" instrument_node="">
From space it falls, along with faults,</span><br data-dcnode-id="1484"><span data-dcnode-id="1483" instrument_node="">
Overwhelmed, the yogi faints away."</span><br data-dcnode-id="1482"><span data-dcnode-id="1481" instrument_node="">
</span></em></div><span data-dcnode-id="1478" instrument_node="">

</span><p class="author" data-dcnode-id="1396"><span data-dcnode-id="1411" instrument_node="">
</span><span data-dcnode-id="1407"><i aria-hidden="true" class="icon fa-file fa-fw icon-lightgray icon-md" data-dcnode-id="1410"></i><span class="sr-only" data-dcnode-id="1408"><span data-dcnode-id="1409" instrument_node="">Post</span></span></span><span data-dcnode-id="1406" instrument_node="">

</span></p><span data-dcnode-id="1395" instrument_node="">
</span><div class="content" data-dcnode-id="1311"><blockquote class="uncited" data-dcnode-id="1312"><div data-dcnode-id="1313"><blockquote data-dcnode-id="1390"><div data-dcnode-id="1391"><cite data-dcnode-id="1393"><span data-dcnode-id="1394" instrument_node="">Vasana wrote:</span></cite><span data-dcnode-id="1392" instrument_node="">You can derive benefit from working with the subtle channels,winds and drops, but it can also be a source of distraction and without proper guidance and understanding, can actually cause a lot of harm. 
</span></div></blockquote><span data-dcnode-id="1389" instrument_node="">
</span><em class="text-italics" data-dcnode-id="1382"><em class="text-italics" data-dcnode-id="1383"><span data-dcnode-id="1388" instrument_node="">Yes it could be that if ones level of understanding is poor and bad karma, every teaching , practice is difficult and can cause harm.</span><br data-dcnode-id="1387"><span data-dcnode-id="1386" instrument_node="">
This because one is not able to listen to the inner Guru which is self emanating Wisdom. This is temporal ignorance.</span><br data-dcnode-id="1385"><span data-dcnode-id="1384" instrument_node="">
</span></em></em><br data-dcnode-id="1381"><span data-dcnode-id="1380" instrument_node="">
</span><br data-dcnode-id="1379"><span data-dcnode-id="1378" instrument_node="">
</span><blockquote class="uncited" data-dcnode-id="1373"><div data-dcnode-id="1374"><em class="text-italics" data-dcnode-id="1376"><span data-dcnode-id="1377" instrument_node="">Working with them properly can enhance experiences of the mind's nature and bring about temporary experiences of clarity,bliss and non-thought, but it can also lead to even more conceptualization and attachment to the same temporary and fleeting experiences.</span></em><span data-dcnode-id="1375" instrument_node=""> </span></div></blockquote><em class="text-italics" data-dcnode-id="1366"><br data-dcnode-id="1372"><span data-dcnode-id="1371" instrument_node="">
</span><br data-dcnode-id="1370"><span data-dcnode-id="1369" instrument_node="">
</span><em class="text-italics" data-dcnode-id="1367"><span data-dcnode-id="1368" instrument_node="">You mention here temporary results? Yes wrong understood some teachings will cause a wrong concept of emptiness. It is mostly due to a wrong understanding of the many emptiness philosophies, that persons go wrong. Therefore a first understanding of the many forms of emptiness is needed for NOT making a mistake in the practice, according my understanding and experience. So if one makes a choice about that understanding of that emptiness , that will result in THAT path. And that path can be of course temporal untill another form of emptiness is accepted.</span></em></em><span data-dcnode-id="1365" instrument_node=""> </span><br data-dcnode-id="1364"><span data-dcnode-id="1363" instrument_node="">
</span><blockquote class="uncited" data-dcnode-id="1359"><div data-dcnode-id="1360"><em class="text-italics" data-dcnode-id="1361"><span data-dcnode-id="1362" instrument_node="">In Mahamudra and Dzogchen, practicing a path of method needs has to be accompanied by the path of liberation (recognition of minds nature ) for the practices to actually be of any benefit.</span></em></div></blockquote><em class="text-italics" data-dcnode-id="1314"><br data-dcnode-id="1358"><span data-dcnode-id="1357" instrument_node="">
</span><br data-dcnode-id="1356"><span data-dcnode-id="1355" instrument_node="">
</span><em class="text-italics" data-dcnode-id="1333"><span data-dcnode-id="1354" instrument_node="">Yes here again the Mind is empty, but what does this emptiness mean in relation to the Dharma Dhatu and vice versa?</span><br data-dcnode-id="1353"><span data-dcnode-id="1352" instrument_node="">
</span><br data-dcnode-id="1351"><span data-dcnode-id="1350" instrument_node="">
Below in Sahara's song:</span><br data-dcnode-id="1349"><span data-dcnode-id="1348" instrument_node="">
</span><br data-dcnode-id="1347"><span data-dcnode-id="1346" instrument_node="">
- Is the body empty?</span><br data-dcnode-id="1345"><span data-dcnode-id="1344" instrument_node="">

</span><br data-dcnode-id="1341"><span data-dcnode-id="1340" instrument_node="">

</span><h3 data-dcnode-id="1252"><span data-dcnode-id="1256" instrument_node="">
</span><a data-dcnode-id="1254" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.dharmawheel.net/viewtopic.php%3Fp%3D285606%23p285606"><span data-dcnode-id="1255" instrument_node="">Re: What is the meaning of Tsa, Lung and Tigle?</span></a><span data-dcnode-id="1253" instrument_node="">
</span></h3><span data-dcnode-id="1251" instrument_node="">
</span><p class="author" data-dcnode-id="1235"><span data-dcnode-id="1250" instrument_node="">
</span><span data-dcnode-id="1246"><i aria-hidden="true" class="icon fa-file fa-fw icon-lightgray icon-md" data-dcnode-id="1249"></i><span class="sr-only" data-dcnode-id="1247"><span data-dcnode-id="1248" instrument_node="">Post</span></span></span><span data-dcnode-id="1245" instrument_node="">
</span><span class="responsive-hide" data-dcnode-id="1239"><span data-dcnode-id="1244" instrument_node="">by </span><strong data-dcnode-id="1241"><span class="username" data-dcnode-id="1242"><span data-dcnode-id="1243" instrument_node="">Vasana</span></span></strong><span data-dcnode-id="1240" instrument_node=""> » </span></span><time data-dcnode-id="1237" datetime="2015-05-29T18:07:49+00:00"><span data-dcnode-id="1238" instrument_node="">Fri May 29, 2015 7:07 pm</span></time><span data-dcnode-id="1236" instrument_node="">
</span></p><span data-dcnode-id="1234" instrument_node="">
</span><div class="content" data-dcnode-id="1196"><span data-dcnode-id="1233" instrument_node="">Kalden yungdrung  , the potential for harm mentioned is from practicing with prana/lung in certain pranayama practices without understanding the correct technique and understanding your own elemental condition and knowing which element is predominant.  </span><br data-dcnode-id="1232"><span data-dcnode-id="1231" instrument_node="">
</span><br data-dcnode-id="1230"><span data-dcnode-id="1229" instrument_node="">
I can't remember the old idiom , but it was something like "Pranayama; practiced correctly,  the cure for every illness , practiced incorrectly, the cause for every disturbance"</span><br data-dcnode-id="1228"><span data-dcnode-id="1227" instrument_node="">
</span><br data-dcnode-id="1226"><span data-dcnode-id="1225" instrument_node="">
I mentioned temporary </span><strong class="text-strong" data-dcnode-id="1223"><span data-dcnode-id="1224" instrument_node="">experiences</span></strong><span data-dcnode-id="1222" instrument_node="">, not results. Up until the point of realization , every meditative experience is just a nyam. (experience). Because we still have latent afflictions and conditioning,  experiences of the natural state are usually mixed with those 'three moods' (nyams gsum) that can arise as signs of progress in meditation.</span><br data-dcnode-id="1221"><span data-dcnode-id="1220" instrument_node="">
</span><br data-dcnode-id="1219"><span data-dcnode-id="1218" instrument_node="">
from the Rangjung Yeshe Wiki ;</span><br data-dcnode-id="1217"><span data-dcnode-id="1216" instrument_node="">
</span><blockquote class="uncited" data-dcnode-id="1209"><div data-dcnode-id="1210"><span data-dcnode-id="1215" instrument_node="">i]"Bliss, clarity and nonthought (bde gsal mi rtog pa). Three temporary meditation experiences. Fixation on these plants the seeds for rebirth in the three realms of samsara. Without fixation, they are adornments of the three kayas, thus</span><br data-dcnode-id="1214"><span data-dcnode-id="1213" instrument_node="">
</span><br data-dcnode-id="1212"><span data-dcnode-id="1211" instrument_node="">
"The three kayas are the Dharmakaya, the Sambhogakaya, and the Nirmanakaya. The three kayas as ground are essence, nature, and capacity; as path these are bliss, clarity and nonthought; and as fruition these are the three kayas of buddhahood."[/i]</span></div></blockquote><span data-dcnode-id="1208" instrument_node="">
</span><br data-dcnode-id="1207"><span data-dcnode-id="1206" instrument_node="">
Further elaboration from a teaching from Tsoknyi Rinpoche;</span><br data-dcnode-id="1205"><span data-dcnode-id="1204" instrument_node="">
</span><blockquote class="uncited" data-dcnode-id="1197"><div data-dcnode-id="1198"><span data-dcnode-id="1203" instrument_node="">"There are signs you can observe or to look [for] to see if you have progress in your practice. They are clarity, bliss and non-thought. For beginners there is only problems, not much bliss or non-thought. Sometimes when one recognizes nature of mind, one will feel more confident and get inspired to do more practice. Sometimes your completely lost and then you recognize again. Then joy arises and you get inspired to do more practice. When you sit and you are in the state of Rigpa, you will maybe say oh! This I have experienced before in life. So your whole body can feel bliss and everything you see is blissful. At this stage it is not realization, but experiences and after some time you will feel suffering, because you hold on to this experience. Sometimes you will feel extremely blissful, because your channels and winds are in balance. You should sit straight and best is the 7-point posture of Variochana. Of the “Tsa-Lung-Tikle”, there is “Gross” and “Pure” (experiences). </span><br data-dcnode-id="1202"><span data-dcnode-id="1201" instrument_node="">
</span><br data-dcnode-id="1200"><span data-dcnode-id="1199" instrument_node="">
The subtle energy-channels are connected with the mind. So when one becomes enlightened, the body and channels becomes “Vajra-body” and the speech becomes “Vajra-speech” and the mind “Vajra-mind”. You can perceive strong clarity (light); everything seems very clear and pure. So whatever happens, just keep on. Don’t give up, and look at everything as experiences and things will stabilize. Also the non-thought can last for long time, just don’t make a big thing out of it. "</span></div></blockquote></div><span data-dcnode-id="1195" instrument_node="">
</span><div class="signature" data-dcnode-id="1185" id="sig285606"><span data-dcnode-id="1193" style="font-size:85%;line-height:116%"><span data-dcnode-id="1194" instrument_node="">ཨོཾ ་ མ ་ ཎི ་ པ ་ དྨེ ་ ཧཱུྃ  ། འ ་ ཨ ་ ཧ ་ ཤ ་ ས ་ མ །  </span></span><span data-dcnode-id="1186" style="font-size:85%;line-height:116%"><br data-dcnode-id="1192"><span data-dcnode-id="1191" instrument_node="">
Om Mani Peme Hum  ། 'A Ah Ha Sha Sa Ma </span><br data-dcnode-id="1190"><span data-dcnode-id="1189" instrument_node="">
</span><span data-dcnode-id="1187" style="font-size:85%;line-height:116%"><span data-dcnode-id="1188" instrument_node="">'When alone, watch your mind,When with others, watch your speech' - Old Kadampa saying</span></span></span></div><span data-dcnode-id="1184" instrument_node="">

</span><a data-dcnode-id="1132" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.dharmawheel.net/viewtopic.php%3Fp%3D285716%23p285716"><span data-dcnode-id="1133" instrument_node="">Re: What is the meaning of Tsa, Lung and Tigle?</span></a><span data-dcnode-id="1131" instrument_node="">
</span></h3><span data-dcnode-id="1129" instrument_node="">
</span><p class="author" data-dcnode-id="1113"><span data-dcnode-id="1128" instrument_node="">
</span><span data-dcnode-id="1124"><i aria-hidden="true" class="icon fa-file fa-fw icon-lightgray icon-md" data-dcnode-id="1127"></i><span class="sr-only" data-dcnode-id="1125"><span data-dcnode-id="1126" instrument_node="">Post</span></span></span><span data-dcnode-id="1123" instrument_node="">
</span><span class="responsive-hide" data-dcnode-id="1117"><span data-dcnode-id="1122" instrument_node="">by </span><strong data-dcnode-id="1119"><span class="username" data-dcnode-id="1120"><span data-dcnode-id="1121" instrument_node="">kalden yungdrung</span></span></strong><span data-dcnode-id="1118" instrument_node=""> » </span></span><time data-dcnode-id="1115" datetime="2015-05-30T07:02:59+00:00"><span data-dcnode-id="1116" instrument_node="">Sat May 30, 2015 8:02 am</span></time><span data-dcnode-id="1114" instrument_node="">
</span></p><span data-dcnode-id="1112" instrument_node="">
</span><div class="content" data-dcnode-id="1053"><span data-dcnode-id="1111" instrument_node="">[quote="Vasana"]Kalden yungdrung  , the potential for harm mentioned is from practicing with prana/lung in certain pranayama practices without understanding the correct technique and understanding your own elemental condition and knowing which element is predominant.  </span><br data-dcnode-id="1110"><span data-dcnode-id="1109" instrument_node="">
</span><br data-dcnode-id="1108"><span data-dcnode-id="1107" instrument_node="">
</span><em class="text-italics" data-dcnode-id="1098"><span data-dcnode-id="1099" style="color:#0000FF"><span data-dcnode-id="1106" instrument_node="">Well that is with everything if we experience with something without the correct understanding. But there are persons who experience even after they have learned how to do the practice. Last mentioned experience is sure emancipation, whereas first mentioned experience would be not.</span><br data-dcnode-id="1105"><span data-dcnode-id="1104" instrument_node="">
</span><br data-dcnode-id="1103"><span data-dcnode-id="1102" instrument_node="">
Then we have the special persons who can learn by themselves because they can listen to their inner Guru. There are not much of them but they exist. They experience also but have success herewith. </span><br data-dcnode-id="1101"><span data-dcnode-id="1100" instrument_node="">
</span></span></em><br data-dcnode-id="1097"><span data-dcnode-id="1096" instrument_node="">
</span><br data-dcnode-id="1095"><span data-dcnode-id="1094" instrument_node="">
I can't remember the old idiom , but it was something like "Pranayama; practiced correctly,  the cure for every illness , practiced incorrectly, the cause for every disturbance"</span><br data-dcnode-id="1093"><span data-dcnode-id="1092" instrument_node="">
</span><br data-dcnode-id="1091"><span data-dcnode-id="1090" instrument_node="">
</span><em class="text-italics" data-dcnode-id="1081"><span data-dcnode-id="1082" style="color:#0000FF"><span data-dcnode-id="1089" instrument_node="">That disturbance can come from their Mind, even if the practice is ok done. Some practice propels emotions. But general seen a good practice results in a good health as well mental as well phisycal. </span><br data-dcnode-id="1088"><span data-dcnode-id="1087" instrument_node="">
All these yogic exercises can develop a good feeling and this can influence the body. As well the healthy body can influence the mind.</span><br data-dcnode-id="1086"><span data-dcnode-id="1085" instrument_node="">
But a healthy mind without Yoga can influence / cause a healthy body. So if the mind is not ok and if we do Yoga this can make the mind more bad than before. So it is difficult to say sometimes what is wrong or right in our practice.</span><br data-dcnode-id="1084"><span data-dcnode-id="1083" instrument_node="">
If a mad man does the right yoga exercises, he will be more mad than before......</span></span></em><span data-dcnode-id="1080" instrument_node=""> </span><br data-dcnode-id="1079"><span data-dcnode-id="1078" instrument_node="">
</span><br data-dcnode-id="1077"><span data-dcnode-id="1076" instrument_node="">
I mentioned temporary </span><strong class="text-strong" data-dcnode-id="1074"><span data-dcnode-id="1075" instrument_node="">experiences</span></strong><span data-dcnode-id="1073" instrument_node="">, not results. Up until the point of realization , every meditative experience is just a nyam. (experience). Because we still have latent afflictions and conditioning,  experiences of the natural state are usually mixed with those 'three moods' (nyams gsum) that can arise as signs of progress in meditation.</span><br data-dcnode-id="1072"><span data-dcnode-id="1071" instrument_node="">
</span><br data-dcnode-id="1070"><span data-dcnode-id="1069" instrument_node="">
</span><span data-dcnode-id="1054" style="color:#0000FF"><em class="text-italics" data-dcnode-id="1055"><span data-dcnode-id="1068" instrument_node="">If we are in the Natural State we don't have thoughts. Before we are in the Natural State we can have usefull Nyams. Some adhere to this position that Nyams are thoughts and are not a part of the Natural State and some say they are self emergent in the Natural State but are not Rigpa.</span><br data-dcnode-id="1067"><span data-dcnode-id="1066" instrument_node="">
</span><br data-dcnode-id="1065"><span data-dcnode-id="1064" instrument_node="">
See also the link below for further explanations:</span><br data-dcnode-id="1063"><span data-dcnode-id="1062" instrument_node="">
