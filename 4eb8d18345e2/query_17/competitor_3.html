</span><li data-dcnode-id="6495"><a class="google-scholar" data-dcnode-id="6496" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//scholar.google.com/scholar_lookup%3Fhl%3Den%26volume%3D1%26publication_year%3D1961%26pages%3D40-47%26journal%3DJ%25C2%25A0Surg%2BRes%26author%3DBlumenstock%2BD.A.%26author%3DKahan%2BD.R.%26title%3DReimplantation%2Band%2Btransplantation%2Bof%2Bthe%2Bcanine%2Blung"><span data-dcnode-id="6497" instrument_node="">Google Scholar</span></a></li></ul></div></div><a class="dropBlock__ctrl--close" data-dcnode-id="6490" href="#" title="Close info"><i aria-hidden="true" class="icon-close_thin" data-dcnode-id="6491"></i></a></div></div><span data-dcnode-id="6487" instrument_node="">] showed that methotrexate improved allograft survival in dogs.</span></div></section><section data-dcnode-id="6214" data-locator="sec2.2" id="sec2.2" tabindex="0"><h3 class="sectionTitle" data-dcnode-id="6480"><span class="top__sub" data-dcnode-id="6483"><span data-dcnode-id="6484" instrument_node="">&nbsp;</span></span><span class="top__text" data-dcnode-id="6481"><span data-dcnode-id="6482" instrument_node="">Clinical experience</span></span></h3><div class="section-paragraph" data-dcnode-id="6395"><span data-dcnode-id="6479" instrument_node="">In 1963, the first human lung transplant was performed by James D. Hardy, Chairman of Surgery, at the University of Mississippi Medical Center. Dr Hardy had performed many lung transplants in animal models and welcomed the day when it would be appropriate to attempt the procedure in a human. Based on agreed-on predetermined characteristics, the transplant would be performed in a patient who had a fatal disease, who had a reasonable chance of benefitting from the transplant, the removal of the lung would not result in the sacrifice of a significant amount of the patient’s own functioning lung parenchyma, and the left lung would be transplanted, because the belief was that a left-side lung transplant was technically easier [</span><div class="dropBlock reference-citations" data-dcnode-id="6443"><a aria-controls="bib12" aria-expanded="false" class="reference-citations__ctrl" data-db-target-for="bib12-d42924852e657" data-dcnode-id="6477" href="#bib12" id="back-bib12"><span data-dcnode-id="6478" instrument_node="">[12]</span></a><div class="dropBlock__holder" data-db-target-of="bib12-d42924852e657" data-dcnode-id="6444"><div class="dropBlock__body" data-dcnode-id="6447"><ul class="rlist reference-citations__loa inline-bullet-list" data-dcnode-id="6474" title="list of authors"><li class="loa__item" data-dcnode-id="6475"><span data-dcnode-id="6476" instrument_node="">Hardy J.D. </span></li></ul><div class="reference-citations__detials" data-dcnode-id="6457"><span data-dcnode-id="6473" instrument_node="">Cap 45: experimental background and early clinical experience.</span><div class="popup-ref" data-dcnode-id="6458"><span data-dcnode-id="6472" instrument_node="">in: </span><span class="editors" data-dcnode-id="6470"><span data-dcnode-id="6471" instrument_node="">Cooper D.K. Novitzky D. </span></span><span data-dcnode-id="6469" instrument_node="">The transplantation and replacement of thoracic organ.  </span><span class="refPublisherName" data-dcnode-id="6467"><span data-dcnode-id="6468" instrument_node="">Springer</span></span><span data-dcnode-id="6466" instrument_node="">,
        </span><span class="refPublisherLoc" data-dcnode-id="6464"><span data-dcnode-id="6465" instrument_node="">Dordrecht (the Netherlands)</span></span><span class="refDate" data-dcnode-id="6462"><span data-dcnode-id="6463" instrument_node="">1990</span></span><span data-dcnode-id="6461" instrument_node="">: </span><span class="ref__seriesPages" data-dcnode-id="6459"><span data-dcnode-id="6460" instrument_node="">357-361</span></span></div></div><div class="reference-citations__links" data-dcnode-id="6448"><ul class="rlist inline-bullet-list" data-dcnode-id="6449"><li data-dcnode-id="6454"><a data-dcnode-id="6455" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.advancessurgery.com/servlet/linkout%3Fsuffix%3De_1_5_1_2_12_2%26dbid%3D16%26doi%3D10.1016/j.yasu.2020.05.004%26key%3D10.1007%252F978-94-009-0711-9_45%26cf%3D" onclick="newWindow(this.href);return false"><span data-dcnode-id="6456" instrument_node="">Crossref</span></a></li><span data-dcnode-id="6453" instrument_node="">
</span><li data-dcnode-id="6450"><a class="google-scholar" data-dcnode-id="6451" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//scholar.google.com/scholar%3Fhl%3Den%26q%3DHardy%2BJ.D.%2BCap%2B45%253A%2Bexperimental%2Bbackground%2Band%2Bearly%2Bclinical%2Bexperience.in%253A%2BCooper%2BD.K.%2BNovitzky%2BD.%2BThe%2Btransplantation%2Band%2Breplacement%2Bof%2Bthoracic%2Borgan.%2BSpringer%252C%250A%2BDordrecht%2B%2528the%2BNetherlands%25291990%253A%2B357-361"><span data-dcnode-id="6452" instrument_node="">Google Scholar</span></a></li></ul></div></div><a class="dropBlock__ctrl--close" data-dcnode-id="6445" href="#" title="Close info"><i aria-hidden="true" class="icon-close_thin" data-dcnode-id="6446"></i></a></div></div><span data-dcnode-id="6442" instrument_node="">]. The patient who was chosen was a 58-year old prisoner with advanced emphysema and an obstructive left main-stem bronchial carcinoma. The patient also had borderline renal failure from chronic glomerulonephritis and an obstructive pneumonia secondary to occlusion of the left main-stem bronchus. The patient’s immunosuppression regimen consisted of azathioprine, prednisone, and mediastinal radiation. The left lung was successfully transplanted, but the patient died 18&nbsp;days later with a functioning allograft. He ultimately died of infection and renal failure. Autopsy revealed a well-ventilated lung without evidence of rejection, patent vascular anastomoses, and a small bronchial defect that was sealed by an inflammatory reaction [</span><div class="dropBlock reference-citations" data-dcnode-id="6397"><a aria-controls="bib13" aria-expanded="false" class="reference-citations__ctrl" data-db-target-for="bib13-d42924852e660" data-dcnode-id="6440" href="#bib13" id="back-bib13"><span data-dcnode-id="6441" instrument_node="">[13]</span></a><div class="dropBlock__holder" data-db-target-of="bib13-d42924852e660" data-dcnode-id="6398"><div class="dropBlock__body" data-dcnode-id="6401"><ul class="rlist reference-citations__loa inline-bullet-list" data-dcnode-id="6433" title="list of authors"><li class="loa__item" data-dcnode-id="6438"><span data-dcnode-id="6439" instrument_node="">Hardy J.D. </span></li><li class="loa__item" data-dcnode-id="6436"><span data-dcnode-id="6437" instrument_node="">Araslan S. </span></li><li class="loa__item" data-dcnode-id="6434"><span data-dcnode-id="6435" instrument_node="">Webb W.R. </span></li></ul><div class="reference-citations__detials" data-dcnode-id="6419"><span data-dcnode-id="6432" instrument_node="">Transplantation of the lung.</span><div class="popup-ref" data-dcnode-id="6420"><span class="ref__series" data-dcnode-id="6424"><i data-dcnode-id="6430"><span data-dcnode-id="6431" instrument_node="">Ann Surg.</span></i><span data-dcnode-id="6429" instrument_node=""> </span><span class="ref__seriesDate" data-dcnode-id="6427"><span data-dcnode-id="6428" instrument_node="">1964; </span></span><span class="ref__seriesVolume" data-dcnode-id="6425"><span data-dcnode-id="6426" instrument_node="">160</span></span></span><span data-dcnode-id="6423" instrument_node="">: </span><span class="ref__seriesPages" data-dcnode-id="6421"><span data-dcnode-id="6422" instrument_node="">440-448</span></span></div></div><div class="reference-citations__links" data-dcnode-id="6402"><ul class="rlist inline-bullet-list" data-dcnode-id="6403"><li data-dcnode-id="6416"><a data-dcnode-id="6417" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.advancessurgery.com/servlet/linkout%3Fsuffix%3De_1_5_1_2_13_2%26dbid%3D16%26doi%3D10.1016/j.yasu.2020.05.004%26key%3D10.1097%252F00000658-196409000-00008%26cf%3D" onclick="newWindow(this.href);return false"><span data-dcnode-id="6418" instrument_node="">Crossref</span></a></li><span data-dcnode-id="6415" instrument_node="">
</span><li data-dcnode-id="6412"><a data-dcnode-id="6413" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.advancessurgery.com/servlet/linkout%3Fsuffix%3De_1_5_1_2_13_2%26dbid%3D8%26doi%3D10.1016/j.yasu.2020.05.004%26key%3D14206849%26cf%3D" onclick="newWindow(this.href);return false"><span data-dcnode-id="6414" instrument_node="">PubMed</span></a></li><span data-dcnode-id="6411" instrument_node="">
</span><li data-dcnode-id="6408"><a data-dcnode-id="6409" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.advancessurgery.com/servlet/linkout%3Fsuffix%3De_1_5_1_2_13_2%26dbid%3D137438953472%26doi%3D10.1016/j.yasu.2020.05.004%26key%3D2-s2.0-8944239690%26cf%3D" onclick="newWindow(this.href);return false"><span data-dcnode-id="6410" instrument_node="">Scopus (24)</span></a></li><span data-dcnode-id="6407" instrument_node="">
</span><li data-dcnode-id="6404"><a class="google-scholar" data-dcnode-id="6405" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//scholar.google.com/scholar_lookup%3Fhl%3Den%26volume%3D160%26publication_year%3D1964%26pages%3D440-448%26journal%3DAnn%2BSurg%26author%3DHardy%2BJ.D.%26author%3DAraslan%2BS.%26author%3DWebb%2BW.R.%26title%3DTransplantation%2Bof%2Bthe%2Blung"><span data-dcnode-id="6406" instrument_node="">Google Scholar</span></a></li></ul></div></div><a class="dropBlock__ctrl--close" data-dcnode-id="6399" href="#" title="Close info"><i aria-hidden="true" class="icon-close_thin" data-dcnode-id="6400"></i></a></div></div><span data-dcnode-id="6396" instrument_node="">].</span></div><div class="section-paragraph" data-dcnode-id="6215"><span data-dcnode-id="6394" instrument_node="">Between 1963 and 1978, 38 lung, lobar, or heart-lung transplants were attempted, but none experienced any long-term success. Nine patients lived more than 2&nbsp;weeks, only 1 patient was discharged from the hospital, all but 1 died in less than a month of bronchial dehiscence, and there was only 1 midterm survivor, at 10.5&nbsp;months.[</span><div class="dropBlock reference-citations" data-dcnode-id="6351"><a aria-controls="bib1" aria-expanded="false" class="reference-citations__ctrl" data-db-target-for="bib1-d42924852e665" data-dcnode-id="6392" href="#bib1" id="back-bib1"><span data-dcnode-id="6393" instrument_node="">[1]</span></a><div class="dropBlock__holder" data-db-target-of="bib1-d42924852e665" data-dcnode-id="6352"><div class="dropBlock__body" data-dcnode-id="6355"><ul class="rlist reference-citations__loa inline-bullet-list" data-dcnode-id="6387" title="list of authors"><li class="loa__item" data-dcnode-id="6390"><span data-dcnode-id="6391" instrument_node="">Venuta F. </span></li><li class="loa__item" data-dcnode-id="6388"><span data-dcnode-id="6389" instrument_node="">Van Raemdonck D. </span></li></ul><div class="reference-citations__detials" data-dcnode-id="6373"><span data-dcnode-id="6386" instrument_node="">History of lung transplantation.</span><div class="popup-ref" data-dcnode-id="6374"><span class="ref__series" data-dcnode-id="6378"><i data-dcnode-id="6384"><span data-dcnode-id="6385" instrument_node="">J&nbsp;Thorac Dis.</span></i><span data-dcnode-id="6383" instrument_node=""> </span><span class="ref__seriesDate" data-dcnode-id="6381"><span data-dcnode-id="6382" instrument_node="">2017; </span></span><span class="ref__seriesVolume" data-dcnode-id="6379"><span data-dcnode-id="6380" instrument_node="">9</span></span></span><span data-dcnode-id="6377" instrument_node="">: </span><span class="ref__seriesPages" data-dcnode-id="6375"><span data-dcnode-id="6376" instrument_node="">5458-5471</span></span></div></div><div class="reference-citations__links" data-dcnode-id="6356"><ul class="rlist inline-bullet-list" data-dcnode-id="6357"><li data-dcnode-id="6370"><a data-dcnode-id="6371" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.advancessurgery.com/servlet/linkout%3Fsuffix%3De_1_5_1_2_1_2%26dbid%3D16%26doi%3D10.1016/j.yasu.2020.05.004%26key%3D10.21037%252Fjtd.2017.11.84%26cf%3D" onclick="newWindow(this.href);return false"><span data-dcnode-id="6372" instrument_node="">Crossref</span></a></li><span data-dcnode-id="6369" instrument_node="">
</span><li data-dcnode-id="6366"><a data-dcnode-id="6367" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.advancessurgery.com/servlet/linkout%3Fsuffix%3De_1_5_1_2_1_2%26dbid%3D8%26doi%3D10.1016/j.yasu.2020.05.004%26key%3D29312756%26cf%3D" onclick="newWindow(this.href);return false"><span data-dcnode-id="6368" instrument_node="">PubMed</span></a></li><span data-dcnode-id="6365" instrument_node="">
</span><li data-dcnode-id="6362"><a data-dcnode-id="6363" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.advancessurgery.com/servlet/linkout%3Fsuffix%3De_1_5_1_2_1_2%26dbid%3D137438953472%26doi%3D10.1016/j.yasu.2020.05.004%26key%3D2-s2.0-85039765082%26cf%3D" onclick="newWindow(this.href);return false"><span data-dcnode-id="6364" instrument_node="">Scopus (21)</span></a></li><span data-dcnode-id="6361" instrument_node="">
</span><li data-dcnode-id="6358"><a class="google-scholar" data-dcnode-id="6359" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//scholar.google.com/scholar_lookup%3Fhl%3Den%26volume%3D9%26publication_year%3D2017%26pages%3D5458-5471%26journal%3DJ%25C2%25A0Thorac%2BDis%26author%3DVenuta%2BF.%26author%3DVan%2BRaemdonck%2BD.%26title%3DHistory%2Bof%2Blung%2Btransplantation"><span data-dcnode-id="6360" instrument_node="">Google Scholar</span></a></li></ul></div></div><a class="dropBlock__ctrl--close" data-dcnode-id="6353" href="#" title="Close info"><i aria-hidden="true" class="icon-close_thin" data-dcnode-id="6354"></i></a></div></div><span data-dcnode-id="6350" instrument_node="">] This poor success resulted in decreased enthusiasm for lung transplant for most of the 1970s. In 1978, Joel Cooper and colleagues in Toronto performed a right lung transplant in a patient afflicted with respiratory burns secondary to a house fire. He required mechanical lung ventilation and a membrane oxygenator. After transplant, he was weaned off ventilatory support and became ambulatory. However, just as many prior patients, he died in the third postoperative week secondary to disruption of the bronchial anastomosis. At this point, it became apparent that the success of lung transplant was predicated on the prevention of anastomotic bronchial disruption. The Toronto group performed research to identify the causes of the bronchia disruption. Three hypotheses for the potential causes of the bronchial dehiscence were rejection, ischemia (because the bronchial arterial supply is usually interrupted during recovery and not recreated following transplant), and immunosuppression. An experiment was performed where autotransplant was performed in dogs. Half of the dogs received immunosuppression, whereas the other half did not. The group that did not receive the immunosuppression had healthy, intact anastomoses. The group that received prednisone and azathioprine experienced the same incidence of bronchial disruption as was observed in human transplants [</span><div class="dropBlock reference-citations" data-dcnode-id="6303"><a aria-controls="bib14" aria-expanded="false" class="reference-citations__ctrl" data-db-target-for="bib14-d42924852e668" data-dcnode-id="6348" href="#bib14" id="back-bib14"><span data-dcnode-id="6349" instrument_node="">[14]</span></a><div class="dropBlock__holder" data-db-target-of="bib14-d42924852e668" data-dcnode-id="6304"><div class="dropBlock__body" data-dcnode-id="6307"><ul class="rlist reference-citations__loa inline-bullet-list" data-dcnode-id="6339" title="list of authors"><li class="loa__item" data-dcnode-id="6346"><span data-dcnode-id="6347" instrument_node="">Saunders N.R. </span></li><li class="loa__item" data-dcnode-id="6344"><span data-dcnode-id="6345" instrument_node="">Egan T.M. </span></li><li class="loa__item" data-dcnode-id="6342"><span data-dcnode-id="6343" instrument_node="">Chamberlain D. </span></li><li data-dcnode-id="6340"><span data-dcnode-id="6341" instrument_node="">et al.</span></li></ul><div class="reference-citations__detials" data-dcnode-id="6325"><span data-dcnode-id="6338" instrument_node="">Cyclosporine and bronchial healing in the canine lung transplantation.</span><div class="popup-ref" data-dcnode-id="6326"><span class="ref__series" data-dcnode-id="6330"><i data-dcnode-id="6336"><span data-dcnode-id="6337" instrument_node="">J&nbsp;Thorac Cardiovasc Surg.</span></i><span data-dcnode-id="6335" instrument_node=""> </span><span class="ref__seriesDate" data-dcnode-id="6333"><span data-dcnode-id="6334" instrument_node="">1984; </span></span><span class="ref__seriesVolume" data-dcnode-id="6331"><span data-dcnode-id="6332" instrument_node="">88</span></span></span><span data-dcnode-id="6329" instrument_node="">: </span><span class="ref__seriesPages" data-dcnode-id="6327"><span data-dcnode-id="6328" instrument_node="">993-999</span></span></div></div><div class="reference-citation </span><li data-dcnode-id="6224"><a class="google-scholar" data-dcnode-id="6225" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//scholar.google.com/scholar_lookup%3Fhl%3Den%26volume%3D9%26publication_year%3D2017%26pages%3D5458-5471%26journal%3DJ%25C2%25A0Thorac%2BDis%26author%3DVenuta%2BF.%26author%3DVan%2BRaemdonck%2BD.%26title%3DHistory%2Bof%2Blung%2Btransplantation"><span data-dcnode-id="6226" instrument_node="">Google Scholar</span></a></li></ul></div></div><a class="dropBlock__ctrl--close" data-dcnode-id="6219" href="#" title="Close info"><i aria-hidden="true" class="icon-close_thin" data-dcnode-id="6220"></i></a></div></div><span data-dcnode-id="6216" instrument_node="">].</span></div></section></section><section data-dcnode-id="6054" data-locator="sec3" id="sec3" tabindex="0"><h2 class="top" data-dcnode-id="6209" data-left-hand-nav="Evolution in techniques" id="secsectitle0035" tabindex="0"><span class="top__sub" data-dcnode-id="6212"></span><span class="top__text" data-dcnode-id="6210"><span data-dcnode-id="6211" instrument_node="">Evolution in techniques</span></span></h2><div class="section-paragraph" data-dcnode-id="6055"><span data-dcnode-id="6208" instrument_node="">Initially, heart-lung transplant was the procedure of choice because of it being technically easier than isolated lung transplant and because airway vascularization was preserved after the tracheal anastomosis, because small branches of the coronary circulation via the pericardium supply the subcarinal bronchial vessels and maintain tracheal circulation. Animal models for isolated bilateral lung transplant were performed in the 1970s. In 1986, en bloc double lung transplant was performed in a 42-year old patient with end-stage emphysema. This procedure was performed via a median sternotomy, on cardiopulmonary bypass (CPB), with the tracheal anastomosis wrapped with omentum, with the donor atrial cuff being anastomosed to the recipient’s left atrium, and an anastomosis between the donor and recipient pulmonary arteries. Because this technique resulted in a significant incidence of airway complications, research on preserving bronchial blood flow took place. In the 1990s, Michel Moirclerc [</span><div class="dropBlock reference-citations" data-dcnode-id="6165"><a aria-controls="bib1" aria-expanded="false" class="reference-citations__ctrl" data-db-target-for="bib1-d42924852e682" data-dcnode-id="6206" href="#bib1" id="back-bib1"><span data-dcnode-id="6207" instrument_node="">[1]</span></a><div class="dropBlock__holder" data-db-target-of="bib1-d42924852e682" data-dcnode-id="6166"><div class="dropBlock__body" data-dcnode-id="6169"><ul class="rlist reference-citations__loa inline-bullet-list" data-dcnode-id="6201" title="list of authors"><li class="loa__item" data-dcnode-id="6204"><span data-dcnode-id="6205" instrument_node="">Venuta F. </span></li><li class="loa__item" data-dcnode-id="6202"><span data-dcnode-id="6203" instrument_node="">Van Raemdonck D. </span></li></ul><div class="reference-citations__detials" data-dcnode-id="6187"><span data-dcnode-id="6200" instrument_node="">History of lung transplantation.</span><div class="popup-ref" data-dcnode-id="6188"><span class="ref__series" data-dcnode-id="6192"><i data-dcnode-id="6198"><span data-dcnode-id="6199" instrument_node="">J&nbsp;Thorac Dis.</span></i><span data-dcnode-id="6197" instrument_node=""> </span><span class="ref__seriesDate" data-dcnode-id="6195"><span data-dcnode-id="6196" instrument_node="">2017; </span></span><span class="ref__seriesVolume" data-dcnode-id="6193"><span data-dcnode-id="6194" instrument_node="">9</span></span></span><span data-dcnode-id="6191" instrument_node="">: </span><span class="ref__seriesPages" data-dcnode-id="6189"><span data-dcnode-id="6190" instrument_node="">5458-5471</span></span></div></div><div class="reference-citations__links" data-dcnode-id="6170"><ul class="rlist inline-bullet-list" data-dcnode-id="6171"><li data-dcnode-id="6184">< 45" instrument_node="">The International Thoracic Organ Transplant (TTX) Registry of the International Society for Heart and Lung Transplantation: Thirty-Sixth Annual Report. Lung Transplantation: Adult Recipients.</span><div class="popup-ref" data-dcnode-id="5937"><div class="citation-host" data-dcnode-id="5938"><a data-dcnode-id="5943" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//ishltregistries.org/registries/slides.asp" target="_blank"><span data-dcnode-id="5944" instrument_node="">https://ishltregistries.org/registries/slides.asp</span></a><div data-dcnode-id="5939"><span data-dcnode-id="5941"><span data-dcnode-id="5942" instrument_node="">Date: </span></span><span data-dcnode-id="5940" instrument_node="">2019</span></div></div></div></div><div class="reference-citations__links" data-dcnode-id="5931"><ul class="rlist inline-bullet-list" data-dcnode-id="5932"><li data-dcnode-id="5933"><a class="google-scholar" data-dcnode-id="5934" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//scholar.google.com/scholar%3Fhl%3Den%26q%3DThe%2BInternational%2BThoracic%2BOrgan%2BTransplant%2B%2528TTX%2529%2BRegistry%2Bof%2Bthe%2BInternational%2BSociety%2Bfor%2BHeart%2Band%2BLung%2BTransplantation%253A%2BThirty-Sixth%2BAnnual%2BReport.%2BLung%2BTransplantation%253A%2BAdult%2BRecipients.%2B%2528Available%2Bat%253A%2529https%253A%252F%252Fishltregistries.org%252Fregistries%252Fslides.aspDate%253A%2B2019"><span data-dcnode-id="5935" instrument_node="">Google Scholar</span></a></li></ul></div></div><a class="dropBlock__ctrl--close" data-dcnode-id="5928" href="#" title="Close info"><i aria-hidden="true" class="icon-close_thin" data-dcnode-id="5929"></i></a></div></div><span data-dcnode-id="5925" instrument_node="">]. According to the United Network for Organ Sharing (UNOS) database, 2562 transplants were performed in the United States alone, the highest of any year. In 2018, the median number of transplants performed was 27 per program. There were 67 centers in the United States that performed transplants in adults. Three programs performed more than 100 transplants, accounting for approximately 20% of transplants in the United States. Forty-nine percent of programs performed 41 to 100 transplants per year, 30.5% performed 11 to 40 transplants per year, 18.9% performed more than 100, and 1.6% performed 1 to 10 transplants per year. More than 15,000 people were living with a lung transplant in 2018. Survival improved slightly at all time points: 89.4% of recipients survived to 1&nbsp;year, 73.5% to 3&nbsp;years, and 59.4% to 5&nbsp;years [</span><div class="dropBlock reference-citations" data-dcnode-id="5907"><a aria-controls="bib21" aria-expanded="false" class="reference-citations__ctrl" data-db-target-for="bib21-d42924852e708" data-dcnode-id="5923" href="#bib21" id="back-bib21"><span data-dcnode-id="5924" instrument_node="">[21]</span></a><div class="dropBlock__holder" data-db-target-of="bib21-d42924852e708" data-dcnode-id="5908"><div class="dropBlock__body" data-dcnode-id="5911"><div class="reference-citations__detials" data-dcnode-id="5917"><span data-dcnode-id="5922" instrument_node="">OPTN/SRTR 2017 Annual Data Report: Lung. United States Department of Health and Human Services.</span><div class="popup-ref" data-dcnode-id="5918"><div class="citation-host" data-dcnode-id="5919"><a data-dcnode-id="5920" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//srtr.transplant.hrsa.gov/annual_reports/2017/Lung.aspx" target="_blank"><span data-dcnode-id="5921" instrument_node="">https://srtr.transplant.hrsa.gov/annual_reports/2017/Lung.aspx</span></a></div></div></div><div class="reference-citations__links" data-dcnode-id="5912"><ul class="rlist inline-bullet-list" data-dcnode-id="5913"><li data-dcnode-id="5914"><a class="google-scholar" data-dcnode-id="5915" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//scholar.google.com/scholar%3Fhl%3Den%2 _links" data-dcnode-id="5827"><ul class="rlist inline-bullet-list" data-dcnode-id="5828"><li data-dcnode-id="5829"><a class="google-scholar" data-dcnode-id="5830" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//scholar.google.com/scholar%3Fhl%3Den%26q%3DNational%2BData.%2BOrgan%2BProcurement%2Band%2BTransplantation%2BNetwork.%2BAvailable%2Bat%253A%2Bhttps%253A%252F%252Foptn.transplant.hrsa.gov%252Fdata%252Fview-data-reports%252Fnational-data%252F.%2BAccessed%2BMarch%2B25%252C%2B2020."><span data-dcnode-id="5831" instrument_node="">Google Scholar</span></a></li></ul></div></div><a class="dropBlock__ctrl--close" data-dcnode-id="5824" href="#" title="Close info"><i aria-hidden="true" class="icon-close_thin" data-dcnode-id="5825"></i></a></div></div><span data-dcnode-id="5821" instrument_node="">]. Although the number of donors increased in 2018 by 31% over the prior 5&nbsp;years, there were still 365 patients who ultimately died or were too sick to undergo transplant [</span><div class="dropBlock reference-citations" data-dcnode-id="5803"><a aria-controls="bib21" aria-expanded="false" class="reference-citations__ctrl" data-db-target-for="bib21-d42924852e722" data-dcnode-id="5819" href="#bib21" id="back-bib21"><span data-dcnode-id="5820" instrument_node="">[21]</span></a><div class="dropBlock__holder" data-db-target-of="bib21-d42924852e722" data-dcnode-id="5804"><div class="dropBlock__body" data-dcnode-id="5807"><div class="reference-citations__detials" data-dcnode-id="5813"><span data-dcnode-id="5818" instrument_node="">OPTN/SRTR 2017 Annual Data Report: Lung. United States Department of Health and Human Services.</span><div class="popup-ref" data-dcnode-id="5814"><div class="citation-host" data-dcnode-id="5815"><a data-dcnode-id="5816" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//srtr.transplant.hrsa.gov/annual_reports/2017/Lung.aspx" target="_blank"><span data-dcnode-id="5817" instrument_node="">https://srtr.t ce-citations__loa inline-bullet-list" data-dcnode-id="5538" title="list of authors"><li class="loa__item" data-dcnode-id="5539"><span data-dcnode-id="5540" instrument_node="">The Department of Health and Human Services </span></li></ul><div class="reference-citations__detials" data-dcnode-id="5532"><span data-dcnode-id="5537" instrument_node="">Organ Procurement and Transplantation Network. Final Rule.</span><div class="popup-ref" data-dcnode-id="5533"><div class="citation-host" data-dcnode-id="5534"><a data-dcnode-id="5535" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//optn.transplant.hrsa.gov/governance/about-the-optn/final-rule/" target="_blank"><span data-dcnode-id="5536" instrument_node="">https://optn.transplant.hrsa.gov/governance/about-the-optn/final-rule/</span></a></div></div></div><div class="reference-citations__links" data-dcnode-id="5527"><ul class="rlist inline-bullet-list" data-dcnode-id="5528"><li data-dcnode-id="5529"><a class="google-scholar" data-dcnode-id="5530" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//scholar.google.com/scholar%3Fhl%3Den%26q%3DThe%2BDepartment%2Bof%2BHealth%2Band%2BHuman%2BServices%2BOrgan%2BProcurement%2Band%2BTransplantation%2BNetwork.%2BFinal%2BRule.%2B%2528Available%2Bat%253A%2529https%253A%252F%252Foptn.transplant.hrsa.gov%252Fgovernance%252Fabout-the-optn%252Ffinal-rule%252F"><span data-dcnode-id="5531" instrument_node="">Google Scholar</span></a></li></ul></div></div><a class="dropBlock__ctrl--close" data-dcnode-id="5524" href="#" title="Close info"><i aria-hidden="true" class="icon-close_thin" data-dcnode-id="5525"></i></a></div></div><span data-dcnode-id="5521" instrument_node="">]. There were multiple goals in the creation of the Final Rule: broader sharing of organs, reduced waiting times, and the creation of allocation systems that focused on the use of objective criteria as well as medical urgency for allocation [</span><div class="dropBlock reference-citations" data-dcnode-id="5474"><a aria-controls="bib24" aria-expanded="false" class="reference-citations__ctrl" data-db-target-for="bib24-d42924852e764" data-dcnode-id="5519" href="#bib24" id="back-bib24"><span data-dcnode-id="5520" instrument_node="">[24]</span></a><div class="dropBlock__holder" data-db-target-of="bib24-d42924852e764" data-dcnode-id="5475"><div class="dropBlock__body" data-dcnode-id="5478"><ul class="rlist reference-citations__loa inline-bullet-list" data-dcnode-id="5510" title="list of authors"><li class="loa__item" data-dcnode-id="5517"><span data-dcnode-id="5518" instrument_node="">Egan T.M. </span></li><li class="loa__item" data-dcnode-id="5515"><span data-dcnode-id="5516" instrument_node="">Murray S. </span></li><li class="loa__item" data-dcnode-id="5513"><span data-dcnode-id="5514" instrument_node="">Bustami R.T. </span></li><li data-dcnode-id="5511"><span data-dcnode-id="5512" instrument_node="">et al.</span></li></ul><div class="reference-citations__detials" data-dcnode-id="5496"><span data-dcnode-id="5509" instrument_node="">Development of the new lung allocation system in the United States.</span><div class="popup-ref" data-dcnode-id="5497"><span class="ref__series" data-dcnode-id="5501"><i data-dcnode-id="5507"><span data-dcnode-id="5508" instrument_node="">Am J Transplant.</span></i><span data-dcnode-id="5506" instrument_node=""> </span><span class="ref__seriesDate" data-dcnode-id="5504"><span data-dcnode-id="5505" instrument_node="">2006; </span></span><span class="ref__seriesVolume" data-dcnode-id="5502"><span data-dcnode-id="5503" instrument_node="">6</span></span></span><span data-dcnode-id="5500" instrument_node="">: </span><span class="ref__seriesPages" data-dcnode-id="5498"><span data-dcnode-id="5499" instrument_node="">1212-1227</span></span></div></div><div class="reference-citations__links" data-dcnode-id="5479"><ul class="rlist inline-bullet-list" data-dcnode-id="5480"><li data-dcnode-id="5493"><a data-dcnode-id="5494" href </span><li data-dcnode-id="5481"><a class="google-scholar" data-dcnode-id="5482" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//scholar.google.com/scholar_lookup%3Fhl%3Den%26volume%3D6%26publication_year%3D2006%26pages%3D1212-1227%26journal%3DAm%2BJ%2BTransplant%26author%3DEgan%2BT.M.%26author%3DMurray%2BS.%26author%3DBustami%2BR.T.%26title%3DDevelopment%2Bof%2Bthe%2Bnew%2Blung%2Ballocation%2Bsystem%2Bin%2Bthe%2BUnited%2BStates"><span data-dcnode-id="5483" instrument_node="">Google Scholar</span></a></li></ul></div></div><a class="dropBlock__ctrl--close" data-dcnode-id="5476" href="#" title="Close info"><i aria-hidden="true" class="icon-close_thin" data-dcnode-id="5477"></i></a></div></div><span data-dcnode-id="5473" instrument_node="">]. As a result of this, the Institute of Medicine published a report agreeing that organ allocation should be based on medical urgency, avoid futile transplants, minimize the effects of waiting time, and use broader geographic sharing in organ allocation [</span><div class="dropBlock reference-citations" data-dcnode-id="5452"><a aria-controls="bib25" aria-expanded="false" class="reference-citations__ctrl" data-db-target-for="bib25-d42924852e767" data-dcnode-id="5471" href="#bib25" id="back-bib25"><span data-dcnode-id="5472" instrument_node="">[25]</span></a><div class="dropBlock__holder" data-db-target-of="bib25-d42924852e767" data-dcnode-id="5453"><div class="dropBlock__body" data-dcnode-id="5456"><ul class="rlist reference-citations__loa inline-bullet-list" data-dcnode-id="5468" title="list of authors"><li class="loa__item" data-dcnode-id="5469"><span data-dcnode-id="5470" instrument_node="">The Department of Health and Human Services </span></li></ul><div class="reference-citations__detials" data-dcnode-id="5462"><span data-dcnode-id="5467" instrument_node="">Organ Procurement and Transplantation Network. Final Rule.</span><div class="popup-ref" data-dcnode-id="5463"><div class="citation-host" data-dcnode-id="5464"><a data-dcnode-id="5465" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//optn.transplant.hrsa.gov/governance/about-the-optn/final-rule/" target="_blank"><span data-dcnode-id="5466" instrument_node="">https://optn.transplant.hrsa.gov/governance/about-the-optn/final-rule/</span></a></div></div></div><div class="reference-citations__links" data-dcnode-id="5457"><ul class="rlist inline-bullet-list" data-dcnode-id="5458"><li data-dcnode-id="5459"><a class="google-scholar" data-dcnode-id="5460" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//scholar.google.com/scholar%3Fhl%3Den%26q%3DThe%2BDepartment%2Bof%2BHealth%2Band%2BHuman%2BServices%2BOrgan%2BProcurement%2Band%2BTransplantation%2BNetwork.%2BFinal%2BRule.%2B%2528Available%2Bat%253A%2529https%253A%252F%252Foptn.transplant.hrsa.gov%252Fgovernance%252Fabout-the-optn%252Ffinal-rule%252F"><span data-dcnode-id="5461" instrument_node="">Google Scholar</span></a></li></ul></div></div><a class="dropBlock__ctrl--close" data-dcnode-id="5454" href="#" title="Close info"><i aria-hidden="true" class="icon-close_thin" data-dcnode-id="5455"></i></a></div></div><span data-dcnode-id="5451" instrument_node="">].</span></div><div class="section-paragraph" data-dcnode-id="5352"><span data-dcnode-id="5449" instrument_node="">Between this time and 2005, The Thoracic Organ Allocation Modeling Subcommittee met and proposed variations of an allocation system that departed from the use of waiting time as a primary allocation factor. Their proposed system used methodology that would determine waiting-list survival based on data from transplant candidates at the time they were listed with the plan to update clinical variables for those candidates as their conditions changed. However, there was concern expressed by the transplant community that the candidates used in their prediction model were not current enough to reliably represent recent survival patterns among all diagnoses and that the diagnostic factors used to predict survival did not include all the factors that should be predictive of survival among patients with end-stage lung disease. There was additional concern that the use of separate survival models for major diagnoses created prejudicial distinctions among patients with different illnesses [</span><div class="dropBlock reference-citations" data-dcnode-id="5402"><a aria-controls="bib24" aria-expanded="false" class="reference-citations__ctrl" data-db-target-for="bib24-d42924852e772" data-dcnode-id="5447" href="#bib24" id="back-bib24"><span data-dcnode-id="5448" instrument_node="">[24]</span></a><div class="dropBlock__holder" data-db-target-of="bib24-d42924852e772" data-dcnode-id="5403"><div class="dropBlock__body" data-dcnode-id="5406"><ul class="rlist reference-citations__loa inline-bullet-list" data-dcnode-id="5438" title="list of authors"><li class="loa__item" data-dcnode-id="5445"><span data-dcnode-id="5446" instrument_node="">Egan T.M. </span></li><li class="loa__item" data-dcnode-id="5443"><span data-dcnode-id="5444" instrument_node="">Murray S. </span></li><li class="loa__item" data-dcnode-id="5441"><span data-dcnode-id="5442" instrument_node="">Bustami R.T. </span></li><li data-dcnode-id="5439"><span data-dcnode-id="5440" instrument_node="">et al.</span></li></ul><div class="reference-citations__detials" data-dcnode-id="5424"><span data-dcnode-id="5437" instrument_node="">Development of the new lung allocation system in the United States.</span><div class="popup-ref" data-dcnode-id="5425"><span class="ref__series" data-dcnode-id="5429"><i data-dcnode-id="5435"><span data-dcnode-id="5436" instrument_node="">Am J Transplant.</span></i><span data-dcnode-id="5434" instrument_node=""> </span><span class="ref__seriesDate" data-dcnode-id="5432"><span data-dcnode-id="5433" instrument_node="">2006; </span></span><span class="ref__seriesVolume" data-dcnode-id="5430"><span data-dcnode-id="5431" instrument_node="">6</span></span></span><span data-dcnode-id="5428" instrument_node="">: </span><span class="ref__seriesPages" data-dcnode-id="5426"><span data-dcnode-id="5427" instrument_node="">1212-1227</span></span></div></div><div class="reference-citations__links" data-dcnode-id="5407"><ul class="rlist inline-bullet-list" data-dcnode-id="5408"><li data-dcnode-id="5421"><a data-dcnode-id="5422" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.advancessurgery.com/servlet/linkout%3Fsuffix%3De_1_5_1_2_24_2%26dbid%3D16%26doi%3D10.1016/j.yasu.2020.05.004%26key%3D10.1111%252Fj.1600-6143.2006.01276.x%26cf%3D" onclick="newWindow(this.href);return false"><span data-dcnode-id="5423" instrument_node="">Crossref</span></a></li><span data-dcnode-id="5420" instrument_node="">

lant.hrsa.gov/annual_reports/2017/Lung.aspx" target="_blank"><span data-dcnode-id="5347" instrument_node="">https://srtr.transplant.hrsa.gov/annual_reports/2017/Lung.aspx</span></a></div></div></div><div class="reference-citations__links" data-dcnode-id="5338"><ul class="rlist inline-bullet-list" data-dcnode-id="5339"><li data-dcnode-id="5340"><a class="google-scholar" data-dcnode-id="5341" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//scholar.google.com/scholar%3Fhl%3Den%26q%3DOPTN%252FSRTR%2B2017%2BAnnual%2BData%2BReport%253A%2BLung.%2BUnited%2BStates%2BDepartment%2Bof%2BHealth%2Band%2BHuman%2BServices.%2B%2528Available%2Bat%253A%2529https%253A%252F%252Fsrtr.transplant.hrsa.gov%252Fannual_reports%252F2017%252FLung.aspx%2B%2528Accessed%2BMarch%2B27%252C%2B2020%2529"><span data-dcnode-id="5342" instrument_node="">Google Scholar</span></a></li></ul></div></div><a class="dropBlock__ctrl--close" data-dcnode-id="5335" href="#" title="Close info"><i aria-hidden="true" class="icon-close_thin" data-dcnode-id="5336"></i></a></div></div><span data-dcnode-id="5332" instrument_node="">,</span><div class="dropBlock reference-citations" data-dcnode-id="5285"><a aria-controls="bib24" aria-expanded="false" class="reference-citations__ctrl" data-db-target-for="bib24-d42924852e783" data-dcnode-id="5330" href="#bib24" id="back-bib24"><span data-dcnode-id="5331" instrument_node="">[24]</span></a><div class="dropBlock__holder" data-db-target-of="bib24-d42924852e783" data-dcnode-id="5286"><div class="dropBlock__body" data-dcnode-id="5289"><ul class="rlist reference-citations__loa inline-bullet-list" data-dcnode-id="5321" title="list of authors"><li class="loa__item" data-dcnode-id="5328"><span data-dcnode-id="5329" instrument_node="">Egan T.M. </span></li><li class="loa__item" data-dcnode-id="5326"><span data-dcnode-id="5327" instrument_node="">Murray S. </span></li><li class="loa__item" data-dcnode-id="5324"><span data-dcnode-id="5325" instrument_node="">Bustami R.T. </span></li><li data-dcnode-id="5322"><span data-dcnode-id="5323" instrument_node="">et al.</span></li></ul><div class="reference-citations__detials" data-dcnode-id="5307"><span data-dcnode-id="5320" instrument_node="">Development of the new lung allocation system in the United States.</span><div class="popup-ref" data-dcnode-id="5308"><span class="ref__series" data-dcnode-id="5312"><i data-dcnode-id="5318"><span data-dcnode-id="5319" instrument_node="">Am J Transplant.</span></i><span data-dcnode-id="5317" instrument_node=""> </span><span class="ref__seriesDate" data-dcnode-id="5315"><span data-dcnode-id="5316" instrument_node="">2006; </span></span><span class="ref__seriesVolume" data-dcnode-id="5313"><span data-dcnode-id="5314" instrument_node="">6</span></span></span><span data-dcnode-id="5311" instrument_node="">: </span><span class="ref__seriesPages" data-dcnode-id="5309"><span data-dcnode-id="5310" instrument_node="">1212-1227</span></span></div></div><div class="reference-citations__links" data-dcnode-id="5290"><ul class="rlist inline-bullet-list" data-dcnode-id="5291"><li data-dcnode-id="5304"><a data-dcnode-id="5305" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.advancessurgery.com/servlet/linkout%3Fsuffix%3De_1_5_1_2_24_2%26dbid%3D16%26doi%3D10.1016/j.yasu.2020.05.004%26key%3D10.1111%252Fj.1600-6143.2006.01276.x%26cf%3D" onclick="newWindow(this.href);return false"><span data-dcnode-id="5306" instrument_node="">Crossref</span></a></li><span data-dcnode-id="5303" instrument_node="">

</span><li data-dcnode-id="5292"><a class="google-scholar" data-dcnode-id="5293" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//scholar.google.com/scholar_lookup%3Fhl%3Den%26volume%3D6%26publication_year%3D2006%26pages%3D1212-1227%26journal%3DAm%2BJ%2BTransplant%26author%3DEgan%2BT.M.%26author%3DMurray%2BS.%26author%3DBustami%2BR.T.%26title%3DDevelopment%2Bof%2Bthe%2Bnew%2Blung%2Ballocation%2Bsystem%2Bin%2Bthe%2BUnited%2BStates"><span data-dcnode-id="5294" instrument_node="">Google Scholar</span></a></li></ul></div></div><a class="dropBlock__ctrl--close" data-dcnode-id="5287" href="#" title="Close info"><i aria-hidden="true" class="icon-close_thin" data-dcnode-id="5288"></i></a></div></div><span data-dcnode-id="5284" instrument_node="">]. Most worldwide lung transplant allocation is determined by the LAS. The LAS can be calculated online using a computed system. Variables include age, height/weight, disease diagnosis, functional status, diabetes mellitus, mechanical ventilation, oxygen use, forced vital capacity, systolic pulmonary arterial pressure, mean pulmonary arterial pressure, mean pulmonary capillary closing pressure, current carbon dioxide partial pressure, increase in carbon dioxide partial pressure (percentage) in relation to minimal carbon dioxide partial pressure, 6-minute walk test, and serum creatinine level. Calculation of the LAS is based on the categorization of pulmonary disease into 1 of 4 main groups based on similar probability of survival and disease pathophysiology. The groups are: group A, obstructive lung disease; group B, pulmonary vascular disease; group C, CF and immunodeficiency disorders; and group D, restrictive lung disease [</span><div class="dropBlock reference-citations" data-dcnode-id="5266"><a aria-controls="bib21" aria-expanded="false" class="reference-citations__ctrl" data-db-target-for="bib21-d42924852e786" data-dcnode-id="5282" href="#bib21" id="back-bib21"><span data-dcnode-id="5283" instrument_node="">[21]</span></a><div class="dropBlock__holder" data-db-target-of="bib21-d42924852e786" data-dcnode-id="5267"><div class="dropBlock__body" data-dcnode-id="5270"><div class="reference-citations__detials" data-dcnode-id="5276"><span data-dcnode-id="5281" instrument_node="">OPTN/SRTR 2017 Annual Data Report: Lung. United States Department of Health and Human Services.</span><div class="popup-ref" data-dcnode-id="5277"><div class="citation-host" data-dcnode-id="5278"><a data-dcnode-id="5279" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//srtr.transplant.hrsa.gov/annual_reports/2017/Lung.aspx" target="_blank"><span data-dcnode-id="5280" instrument_node="">https://srtr.transplant.hrsa.gov/annual_reports/2017/Lung.aspx</span></a></div></div></div><div class="reference-citations__links" data-dcnode-id="5271"><ul class="rlist inline-bullet-list" data-dcnode-id="5272"><li data-dcnode-id="5273"><a class="google-scholar" data-dcnode-id="5274" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//scholar.google.com/scholar%3Fhl%3Den%26q%3DOPTN%252FSRTR%2B2017%2BAnnual%2BData%2BReport%253A%2BLung.%2BUnited%2BStates%2BDepartment%2Bof%2BHealth%2Band%2BHuman%2BServices.%2B%2528Available%2Bat%253A%2529https%253A%252F%252Fsrtr.transplant.hrsa.gov%252Fannual_reports%252F2017%252FLung.aspx%2B%2528Accessed%2BMarch%2B27%252C%2B2020%2529"><span data-dcnode-id="5275" instrument_node="">Google Scholar</span></a></li></ul></div></div><a class="dropBlock__ctrl--close" data-dcnode-id="5268" href="#" title="Close info"><i aria-hidden="true" class="icon-close_thin" data-dcnode-id="5269"></i></a></div></div><span data-dcnode-id="5265" instrument_node="">]. The calculated LAS is primarily useful in patients aged 12&nbsp;years and older. LAS, patient age, geography, blood type compatibility, and (if necessary) waiting time are used to allocate lungs. For patients less than 12&nbsp;years of age, determining factors are slightly different and include illness-based priority status, age, geography, blood type (ABO compatibility), and waiting time. Note that the LAS does consider risk of waiting-list mortality and posttransplant survival in order to minimize allocating lungs to patients with low anticipated survival.</span></div><div class="section-paragraph" data-dcnode-id="5116"><span data-dcnode-id="5263" instrument_node="">According to the UNOS annual report, after the 2005 LAS system was implemented, the proportion of wait-listed candidates with LAS values in the lowest range predominated [</span><div class="dropBlock reference-citations" data-dcnode-id="5208"><a aria-controls="bib19" aria-expanded="false" class="reference-citations__ctrl" data-db-target-for="bib19-d42924852e791" data-dcnode-id="5261" href="#" id="back-bib19"><span data-dcnode-id="5262" instrument_node="">19</span></a><div class="dropBlock__holder" data-db-target-of="bib19-d42924852e791" data-dcnode-id="5209"><div class="dropBlock__body" data-dcnode-id="5212"><ul class="rlist reference-citations__loa inline-bullet-list" data-dcnode-id="5252" title="list of authors"><li class="loa__item" data-dcnode-id="5259"><span data-dcnode-id="5260" instrument_node="">Chambers D.C. </span></li><li class="loa__item" data-dcnode-id="5257"><span data-dcnode-id="5258" instrument_node="">Cherikh W.S. </span></li><li class="loa__item" data-dcnode-id="5255"><span data-dcnode-id="5256" instrument_node="">Harhay M.O. </span></li><li data-dcnode-id="5253"><span data-dcnode-id="5254" instrument_node="">et al.</span></li></ul><div class="reference-citations__detials" data-dcnode-id="5238"><span data-dcnode-id="5251" instrument_node="">The International Thoracic Organ Transplant Registry of the International Society for Heart and Lung Transplantation: thirty-sixth adult lung and heart-lung transplantation report-2019; focus theme: donor and recipient size match.</span><div class="popup-ref" data-dcnode-id="5239"><span class="ref__series" data-dcnode-id="5243"><i dat ref" data-dcnode-id="5177"><div class="citation-host" data-dcnode-id="5178"><a data-dcnode-id="5179" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//srtr.transplant.hrsa.gov/annual_reports/2017/Lung.aspx" target="_blank"><span data-dcnode-id="5180" instrument_node="">https://srtr.transplant.hrsa.gov/annual_reports/2017/Lung.aspx</span></a></div></div></div><div class="reference-citations__links" data-dcnode-id="5171"><ul class="rlist inline-bullet-list" data-dcnode-id="5172"><li data-dcnode-id="5173"><a class="google-scholar" data-dcnode-id="5174" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//scholar.google.com/scholar%3Fhl%3Den%26q%3DOPTN%252FSRTR%2B2017%2BAnnual%2BData%2BReport%253A%2BLung.%2BUnited%2BStates%2BDepartment%2Bof%2BHealth%2Band%2BHuman%2BServices.%2B%2528Available%2Bat%253A%2529https%253A%252F%252Fsrtr.transplant.hrsa.gov%252Fannual_reports%252F2017%252FLung.aspx%2B%2528Accessed%2BMarch%2B27%252C%2B2020%2529"><span data-dcnode-id="5175" instrument_node="">Google Scholar</span></a></li></ul></div></div><a class="dropBlock__ctrl--close" data-dcnode-id="5168" href="#" title="Close info"><i aria-hidden="true" class="icon-close_thin" data-dcnode-id="5169"></i></a></div></div><span data-dcnode-id="5165" instrument_node="">]. However, since 2006, this trend has been declining. The LAS was revised further in 2015 and again in 2017. The 2015 revision added new variables to better reflect disease severity for patients in group B (pulmonary vascular disease). Then, in 2017, the OPTN implemented policies to broaden organ sharing geographically for patients aged 1 to 17&nbsp;years. Through the LAS system, adolescent candidates (12–17&nbsp;years old) receive preferential allocation for adult donor lungs. Since this change was implemented, it has been noted that the waiting-list mortality for adolescents has decreased over 1&nbsp;year. In November of 2017, in response to a patient-initiated lawsuit alleging geographic disparities, the donation service area (DSA) was abruptly removed as the first unit of donor allocation and replaced by a 463-km (250-nautical-mile) circle from the donor hospital. The alleged geographic disparity was later scientifically investigated by Kosztowski and colleagues [</span><div class="dropBlock reference-citations" data-dcnode-id="5118"><a aria-controls="bib26" aria-expanded="false" class="reference-citations__ctrl" data-db-target-for="bib26-d42924852e794" data-dcnode-id="5163" href="#bib26" id="back-bib26"><span data-dcnode-id="5164" instrument_node="">[26]</span></a><div class="dropBlock__holder" data-db-target-of="bib26-d42924852e794" data-dcnode-id="5119"><div class="dropBlock__body" data-dcnode-id="5122"><ul class="rlist reference-citations__loa inline-bullet-list" data-dcnode-id="5154" title="list of authors"><li class="loa__item" data-dcnode-id="5161"><span data-dcnode-id="5162" instrument_node="">Kosztowski M. </span></li><li class="loa__item" data-dcnode-id="5159"><span data-dcnode-id="5160" instrument_node="">Zhou S. </span></li><li class="loa__item" data-dcnode-id="5157"><span data-dcnode-id="5158" instrument_node="">Bush E. </span></li><li data-dcnode-id="5155"><span data-dcnode-id="5156" instrument_node="">et al.</span></li></ul><div class="reference-citations__detials" data-dcnode-id="5140"><span data-dcnode-id="5153" instrument_node="">Geographic disparities in lung transplant rates.</span><div class="popup-ref" data-dcnode-id="5141"><span class="ref__series" data-dcnode-id="5145"><i data-dcnode-id="5151"><span data-dcnode-id="5152" instrument_node="">Am J Transplant.</span></i><span data-dcnode-id="5150" instrument_node=""> </span><span class="ref__seriesDate" data-dcnode-id="5148"><span data-dcnode-id="5149" instrument_node="">2019; </span></span><span class="ref__seriesVolume" data-dcnode-id="5146"><span data-dcnode-id="5147" instrument_node="">19</span></span></span><span data-dcnode-id="5144" instrument_node="">: </span><s </span><li data-dcnode-id="5023"><a class="google-scholar" data-dcnode-id="5024" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//scholar.google.com/scholar_lookup%3Fhl%3Den%26volume%3D34%26publication_year%3D2015%26pages%3D1-15%26journal%3DJ%25C2%25A0Heart%2BLung%2BTransplant%26author%3DWeill%2BD.%26author%3DBenden%2BC.%26author%3DCorris%2BP.%26title%3DA%25C2%25A0consensus%2Bdocument%2Bfor%2Bthe%2Bselection%2Bof%2Blung%2Btransplant%2Bcandidates%3A%2B2014--an%2Bupdate%2Bfrom%2Bthe%2BPulmonary%2BTransplantation%2BCouncil%2Bof%2Bthe%2BInternational%2BSociety%2Bfor%2BHeart%2Band%2BLung%2BTransplantation"><span data-dcnode-id="5025" instrument_node="">Google Scholar</span></a></li></ul></div></div><a class="dropBlock__ctrl--close" data-dcnode-id="5018" href="#" title="Close info"><i aria-hidden="true" class="icon-close_thin" data-dcnode-id="5019"></i></a></div></div><span data-dcnode-id="5015" instrument_node="">], and is generally considered by lung transplant programs in their selection criteria (</span><a class="scroll-into-link" data-dcnode-id="5013" href="#tbl1" id="back-tbl1"><span data-dcnode-id="5014" instrument_node="">Table&nbsp;1</span></a><span data-dcnode-id="5012" instrument_node="">). The statement recommends that, in general, lung transplant should be considered for adults with end-stage lung disease who have:</span><ul class="ce-list--remove-bullets" data-dcnode-id="4996" id="olist0010"><li class="ce-list--remove-bullets__list-item" data-dcnode-id="5007" id="o0010"><span class="label" data-dcnode-id="5010"><span data-dcnode-id="5011" instrument_node="">1.</span></span><div class="ce-list--remove-bullets__list-item__text" data-dcnode-id="5008"><span data-dcnode-id="5009" instrument_node="">High (&gt;50%) risk of death from lung disease within 2&nbsp;years if lung transplant is not performed.</span></div></li><li class="ce-list--remove-bullets__list-item" data-dcnode-id="5002" id="o0015"><span class="label" data-dcnode-id="5005"><span data-dcnode-id="5006" instrument_node="">2.</span></span><div class="ce-list--remove-bullets__list-item__text" data-dcnode-id="5003"><span data-dcnode-id="5004" instrument_node="">High (&gt;80%) likelihood of surviving at least 90&nbsp;days after lung transplant.</span></div></li><li class="ce-list--remove-bullets__list-item" data-dcnode-id="4997" id="o0020"><span class="label" data-dcnode-id="5000"><span data-dcnode-id="5001" instrument_node="">3.</span></span><div class="ce-list--remove-bullets__list-item__text" data-dcnode-id="4998"><span data-dcnode-id="4999" instrument_node="">High (&gt;80%) likelihood of 5-year posttransplant survival from a general medical perspective provided that there is adequate graft function.</span></div></li></ul><div class="floatDisplay" data-dcnode-id="4802"><div class="inline-table" data-dcnode-id="4803" id="tbl1" tabindex="0"><div class="inline-table__head" data-dcnode-id="4991"><span class="inline-table__label" data-dcnode-id="4994"><span data-dcnode-id="4995" instrument_node="">Table&nbsp;1</span></span><span class="inline-table__title" data-dcnode-id="4992"><span data-dcnode-id="4993" instrument_node="">Absolute and relative contraindications to lung transplant</span></span></div><div class="sourceRef" data-dcnode-id="4986" style="margin: 0 0 10px;"><span class="figure__source" data-dcnode-id="4987"><em data-dcnode-id="4989"><span data-dcnode-id="4990" instrument_node="">Adapted from</span></em><span data-dcnode-id="4988" instrument_node=""> ISHLT consensus statement.</span></span></div><div class="table-with-References" data-dcnode-id="4818"><span data-dcnode-id="4985" instrument_node=""> </span><table border="0" cellpadding="0" cellspacing="0" class="scrollable bordered" data-dcnode-id="4819" width="100%"><thead data-dcnode-id="4979"><tr data-dcnode-id="4980"><th class="rowsep" data-dcnode-id="4983"><span data-dcnode-id="4984" instrument_node="">Absolute contraindications</span></th><th class="rowsep" data-dcnode-id="4981"><span data-dcnode-id="4982" instrument_node="">Relative contraindications</span></th></tr></thead><tbody data-dcnode-id="4820"><tr data-dcnode-id="4821"><td data-dcnode-id="4906"><ul class="ce-list--remove-bullets" data-dcnode-id="4907" id="ulist0015"><li class="ce-list--remove-bullets__list-item" data-dcnode-id="4974" id="u0025"><span class="label" data-dcnode-id="4977"><span data-dcnode-id="4978" instrument_node="">•</span></span><div class="ce-list--remove-bullets__list-item__text" data-dcnode-id="4975"><span data-dcnode-id="4976" instrument_node="">Recent history of malignancy. A 2-y disease-free interval combined with a low predicted risk of recurrence after lung transplant may be reasonable, but a 5-y disease-free interval should be required in most cases, particularly for patients with a history of hematologic malignancy, sarcoma, melanoma, or cancers of the breast, bladder, or kidney</span></div></li><li class="ce-list--remove-bullets__list-item" data-dcnode-id="4969" id="u0030"><span class="label" data-dcnode-id="4972"><span data-dcnode-id="4973" instrument_node="">•</span></span><div class="ce-list--remove-bullets__list-item__text" data-dcnode-id="4970"><span data-dcnode-id="4971" instrument_node="">Poorly controlled significant dysfunction of another major organ system (eg, heart, liver, kidney, or brain) unless a multiorgan transplant is being considered</span></div></li><li class="ce-list--remove-bullets__list-item" data-dcnode-id="4964" id="u0035"><span class="label" data-dcnode-id="4967"><span data-dcnode-id="4968" instrument_node="">•</span></span><div class="ce-list--remove-bullets__list-item__text" data-dcnode-id="4965"><span data-dcnode-id="4966" instrument_node="">Uncorrected coronary artery disease with end-organ ischemia or dysfunction and/or coronary artery disease not amenable to revascularization</span></div></li><li class="ce-list--remove-bullets__list-item" data-dcnode-id="4959" id="u0040"><span class="label" data-dcnode-id="4962"><span data-dcnode-id="4963" instrument_node="">•</span></span><div class="ce-list--remove-bullets__list-item__text" data-dcnode-id="4960"><span data-dcnode-id="4961" instrument_node="">An unstable medical condition, including but not limited to acute sepsis, myocardial infarction, and liver failure</span></div></li><li class="ce-list--remove-bullets__list-item" data-dcnode-id="4954" id="u0045"><span class="label" data-dcnode-id="4957"><span data-dcnode-id="4958" instrument_node="">•</span></span><div class="ce-list--remove-bullets__list-item__text" data-dcnode-id="4955"><span data-dcnode-id="4956" instrument_node="">Uncorrectable coagulopathy</span></div></li><li class="ce-list--remove-bullets__list-item" data-dcnode-id="4949" id="u0050"><span class="label" data-dcnode-id="4952"><span data-dcnode-id="4953" instrument_node="">•</span></span><div class="ce-list--remove-bullets__list-item__text" data-dcnode-id="4950"><span data-dcnode-id="4951" instrument_node="">Poorly controlled infection with a virulent and/or resistant microbes</span></div></li><li class="ce-list--remove-bullets__list-item" data-dcnode-id="4941" id="u0055"><span class="label" data-dcnode-id="4947"><span data-dcnode-id="4948" instrument_node="">•</span></span><div class="ce-list--remove-bullets__list-item__text" data-dcnode-id="4942"><span data-dcnode-id="4946" instrument_node="">Active </span><em data-dcnode-id="4944"><span data-dcnode-id="4945" instrument_node="">Mycobacterium tuberculosis</span></em><span data-dcnode-id="4943" instrument_node=""> infection</span></div></li><li class="ce-list--remove-bullets__list-item" data-dcnode-id="4936" id="u0060"><span class="label" data-dcnode-id="4939"><span data-dcnode-id="4940" instrument_node="">•</span></span><div class="ce-list--remove-bullets__list-item__text" data-dcnode-id="4937"><span data-dcnode-id="4938" instrument_node="">A chest wall or spinal deformity expected to cause severe restriction after transplant</span></div></li><li class="ce-list--remove-bullets__list-item" data-dcnode-id="4928" id="u0065"><span class="label" data-dcnode-id="4934"><span data-dcnode-id="4935" instrument_node="">•</span></span><div class="ce-list--remove-bullets__list-item__text" data-dcnode-id="4929"><span data-dcnode-id="4933" instrument_node="">Class II or III obesity (BMI ≥ 35.0&nbsp;kg/m</span><sup data-dcnode-id="4931"><span data-dcnode-id="4932" instrument_node="">2</span></sup><span data-dcnode-id="4930" instrument_node="">)</span></div></li><li class="ce-list--remove-bullets__list-item" data-dcnode-id="4923" id="u0070"><span class="label" data-dcnode-id="4926"><span data-dcnode-id="4927" instrument_node="">•</span></span><div class="ce-list--remove-bullets__list-item__text" data-dcnode-id="4924"><span data-dcnode-id="4925" instrument_node="">Current nonadherence to medical therapy or a history of repeated or prolonged episodes of nonadherence to medical therapy</span></div></li><li class="ce-list--remove-bullets__list-item" data-dcnode-id="4918" id="u0075"><span class="label" data-dcnode-id="4921"><span data-dcnode-id="4922" instrument_node="">•</span></span><div class="ce-list--remove-bullets__list-item__text" data-dcnode-id="4919"><span data-dcnode-id="4920" instrument_node="">Psychiatric, psychological, or functional issues hindering patient’s ability to comply with a complicated medical regimen or rehabilitation program</span></div></li><li class="ce-list--remove-bullets__list-item" data-dcnode-id="4913" id="u0080"><span class="label" data-dcnode-id="4916"><span data-dcnode-id="4917" instrument_node="">•</span></span><div class="ce-list--remove-bullets__list-item__text" data-dcnode-id="4914"><span data-dcnode-id="4915" instrument_node="">Inadequate social support system</span></div></li><li class="ce-list--remove-bullets__list-item" data-dcnode-id="4908" id="u0085"><span class="label" data-dcnode-id="4911"><span data-dcnode-id="4912" instrument_node="">•</span></span><div class="ce-list--remove-bullets__list-item__text" data-dcnode-id="4909"><span data-dcnode-id="4910" instrument_node="">In patients with a history of illicit substance abuse or dependence, before surgery there should be convincing evidence of risk reduction behaviors; periodic blood and urine testing can be used to verify abstinence</span></div></li></ul></td><td data-dcnode-id="4822"><ul class="ce-list--remove-bullets" data-dcnode-id="4823" id="ulist0020"><li class="ce-list--remove-bullets__list-item" data-dcnode-id="4901" id="u0090"><span class="label" data-dcnode-id="4904"><span data-dcnode-id="4905" instrument_node="">•</span></span><div class="ce-list--remove-bullets__list-item__text" data-dcnode-id="4902"><span data-dcnode-id="4903" instrument_node="">Age&nbsp;&gt;65&nbsp;y in association with low physiologic reserve and/or other relative contraindications (although age alone should not exclude a patient from receiving a lung transplant, increasing age often is associated with comorbid conditions that are either absolute or relative contraindications)</span></div></li><li class="ce-list--remove-bullets__list-item" data-dcnode-id="4893" id="u0095"><span class="label" data-dcnode-id="4899"><span data-dcnode-id="4900" instrument_node="">•</span></span><div class="ce-list--remove-bullets__list-item__text" data-dcnode-id="4894"><span data-dcnode-id="4898" instrument_node="">Class I obesity (BMI 30.0–34.9&nbsp;kg/m</span><sup data-dcnode-id="4896"><span data-dcnode-id="4897" instrument_node="">2</span></sup><span data-dcnode-id="4895" instrument_node="">), particularly truncal (central) obesity</span></div></li><li class="ce-list--remove-bullets__list-item" data-dcnode-id="4888" id="u0100"><span class="label" data-dcnode-id="4891"><span data-dcnode-id="4892" instrument_node="">•</span></span><div class="ce-list--remove-bullets__list-item__text" data-dcnode-id="4889"><span data-dcnode-id="4890" instrument_node="">Significant malnutrition</span></div></li><li class="ce-list--remove-bullets__list-item" data-dcnode-id="4883" id="u0105"><span class="label" data-dcnode-id="4886"><span data-dcnode-id="4887" instrument_node="">•</span></span><div class="ce-list--remove-bullets__list-item__text" data-dcnode-id="4884"><span data-dcnode-id="4885" instrument_node="">Significant osteoporosis</span></div></li><li class="ce-list--remove-bullets__list-item" data-dcnode-id="4878" id="u0110"><span class="label" data-dcnode-id="4881"><span data-dcnode-id="4882" instrument_node="">•</span></span><div class="ce-list--remove-bullets__list-item__text" data-dcnode-id="4879"><span data-dcnode-id="4880" instrument_node="">Extensive prior chest surgery with lung resection</span></div></li><li class="ce-list--remove-bullets__list-item" data-dcnode-id="4873" id="u0115"><span class="label" data-dcnode-id="4876"><span data-dcnode-id="4877" instrument_node="">•</span></span><div class="ce-list--remove-bullets__list-item__text" data-dcnode-id="4874"><span data-dcnode-id="4875" instrument_node="">Mechanical ventilation and/or extracorporeal life support</span></div></li><li class="ce-list--remove-bullets__list-item" data-dcnode-id="4868" id="u0120"><span class="label" data-dcnode-id="4871"><span data-dcnode-id="4872" instrument_node="">•</span></span><div class="ce-list--remove-bullets__list-item__text" data-dcnode-id="4869"><span data-dcnode-id="4870" instrument_node="">Colonization with resistant or highly virulent pathogens</span></div></li><li class="ce-list--remove-bullets__list-item" data-dcnode-id="4853" id="u0125"><span class="label" data-dcnode-id="4866"><span data-dcnode-id="4867" instrument_node="">•</span></span><div class="ce-list--remove-bullets__list-item__text" data-dcnode-id="4854"><span data-dcnode-id="4865" instrument_node="">For candidates infected with hepatitis B and/or C, lung transplant can be considered in patients without significant clinical, radiological, or biochemical signs of cirrhosis or portal hypertension and who are stable on appropriate therapy</span><div class="dropBlock reference-citations" data-dcnode-id="4855"><a aria-controls="tbl1fna" aria-expanded="false" class="reference-citations__ctrl scroll-into-link" data-db-target-for="tbl1fna-d42924852e178" data-dcnode-id="4862" href="#" id="back-tbl1fna"><sup data-dcnode-id="4863"><span data-dcnode-id="4864" instrument_node="">a</span></sup></a><div class="dropBlock__holder" data-db-target-of="tbl1fna-d42924852e178" data-dcnode-id="4856"><div class="dropBlock__body" data-dcnode-id="4859"><div class="reference-citations__detials" data-dcnode-id="4860"><span data-dcnode-id="4861" instrument_node="">Lung transplant in HIV+, hepatitis B and/or C candidates should be performed in centers with experienced hepatology units and those with expertise in the care of HIV positive patients.</span></div></div><a class="dropBlock__ctrl--close" data-dcnode-id="4857" href="#" title="Close info"><i aria-hidden="true" class="icon-close_thin" data-dcnode-id="4858"></i></a></div></div></div></li><li class="ce-list--remove-bullets__list-item" data-dcnode-id="4838" id="u0130"><span class="label" data-dcnode-id="4851"><span data-dcnode-id="4852" instrument_node="">•</span></span><div class="ce-list--remove-bullets__list-item__text" data-dcnode-id="4839"><span data-dcnode-id="4850" instrument_node="">For patients infected with HIV, lung transplant can be considered in those with controlled disease with undetectable HIV RNA, and adherent with antiretroviral therapy (cART)</span><div class="dropBlock reference-citations" data-dcnode-id="4840"><a aria-controls="tbl1fna" aria-expanded="false" class="reference-citations__ctrl scroll-into-link" data-db-target-for="tbl1fna-d42924852e185" data-dcnode-id="4847" href="#" id="back-tbl1fna"><sup data-dcnode-id="4848"><span data-dcnode-id="4849" instrument_node="">a</span></sup></a><div class="dropBlock__holder" data-db-target-of="tbl1fna-d42924852e185" data-dcnode-id="4841"><div class="dropBlock__body" data-dcnode-id="4844"><div class="reference-citations__detials" data-dcnode-id="4845"><span data-dcnode-id="4846" instrument_node="">Lung transplant in HIV+, hepatitis B and/or C candidates should be performed in centers with experienced hepatology units and those with expertise in the care of HIV positive patients.</span></div></div><a class="dropBlock__ctrl--close" data-dcnode-id="4842" href="#" title="Close info"><i aria-hidden="true" class="icon-close_thin" data-dcnode-id="4843"></i></a></div></div></div></li><li class="ce-list--remove-bullets__list-item" data-dcnode-id="4824" id="u0135"><span class="label" data-dcnode-id="4836"><span data-dcnode-id="4837" instrument_node="">•</span></span><div class="ce-list--remove-bullets__list-item__text" data-dcnode-id="4825"><span data-dcnode-id="4835" instrument_node="">Infection with </span><em data-dcnode-id="4833"><span data-dcnode-id="4834" instrument_node="">Burkholderia cenocepacia</span></em><span data-dcnode-id="4832" instrument_node="">, </span><em data-dcnode-id="4830"><span data-dcnode-id="4831" instrument_node="">Burkholderia gladioli</span></em><span data-dcnode-id="4829" instrument_node="">, and multidrug resistant </span><em data-dcnode-id="4827"><span data-dcnode-id="4828" instrument_node="">Mycobacterium abscessus</span></em><span data-dcnode-id="4826" instrument_node=""> if the infection is sufficiently treated</span></div></li></ul></td></tr></tbody></table></div><div class="inline-table__tail" data-dcnode-id="4808"><div class="section-paragraph" data-dcnode-id="4814"><em data-dcnode-id="4816"><span data-dcnode-id="4817" instrument_node="">Abbreviations:</span></em><span data-dcnode-id="4815" instrument_node=""> BMI, body mass index; cART, chimeric antigen receptor T-cell therapy; HIV, human immunodeficiency virus.</span></div><div class="inline-table__footnote" data-dcnode-id="4809"><span data-dcnode-id="4812"><span data-dcnode-id="4813" instrument_node="">a </span></span><span data-dcnode-id="4810"><span data-dcnode-id="4811" instrument_node="">Lung transplant in HIV+, hepatitis B and/or C candidates should be performed in centers with experienced hepatology units and those with expertise in the care of HIV positive patients.</span></span></div></div><ul class="rlist--inline separator download-links" data-dcnode-id="4804"><li data-dcnode-id="4805"><a class="table__open__ctrl" data-dcnode-id="4806" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.advancessurgery.com/action/showFullTableHTML%3FisHtml%3Dtrue%26tableId%3Dtbl1%26pii%3DS0065-3411%252820%252930011-7" target="_blank" title="Open Full Table"><span data-dcnode-id="4807" instrument_node="">
                            Open table in a new tab
                        </span></a></li></ul></div></div></div></section><section data-dcnode-id="4695" data-locator="sec8" id="sec8" tabindex="0"><h2 class="top" data-dcnode-id="4796" data-left-hand-nav="Contraindications" id="secsectitle0060" tabindex="0"><span class="top__sub" data-dcnode-id="4799"></span><span class="top__text" data-dcnode-id="4797"><span data-dcnode-id="4798" instrument_node="">Contraindications</span></span></h2><div class="section-paragraph" data-dcnode-id="4696"><span data-dcnode-id="4795" instrument_node="">Selection criteria include absolute and relative contraindications developed by the ISHLT as part of a consensus of the expert guidelines developed over the years. Examples of absolute contraindications include recent malignancy, significant comorbidity or organ dysfunction that would limit the patient’s ability to undergo surgery and/or tolerate prolonged immunosuppression, significant psychiatric disturbance or other social factors, and previous noncompliance. Candidate selection depends on the local institution’s selection committee. Patients may be listed at multiple centers, therefore it is possible for a patient to be deemed not a transplant candidate at one center for a relative contraindication, then referred to a center with relevant expertise for a second opinion [</span><div class="dropBlock reference-citations" data-dcnode-id="4740"><a aria-controls="bib28" aria-expanded="false" class="reference-citations__ctrl" data-db-target-for="bib28-d42924852e830" data-dcnode-id="4793" href="#bib28" id="back-bib28"><span data-dcnode-id="4794" instrument_node="">[28]</span></a><div class="dropBlock__holder" data-db-target-of="bib28-d42924852e830" data-dcnode-id="4741"><div class="dropBlock__body" data-dcnode-id="4744"><ul class="rlist reference-citations__loa inline-bullet-list" data-dcnode-id="4784" title="list of authors"><li class="loa__item" data-dcnode-id="4791"><span data-dcnode-id="4792" instrument_node="">Weill D. </span></li><li
