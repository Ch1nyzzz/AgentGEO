</span><li data-dcnode-id="4705"><a class="google-scholar" data-dcnode-id="4706" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//scholar.google.com/scholar_lookup%3Fhl%3Den%26volume%3D10%26publication_year%3D2018%26pages%3D4574-4587%26journal%3DJ%25C2%25A0Thorac%2BDis%26author%3DWeill%2BD.%26title%3DLung%2Btransplantation%3A%2Bindications%2Band%2Bcontraindications"><span data-dcnode-id="4707" instrument_node="">Google Scholar</span></a></li></ul></div></div><a class="dropBlock__ctrl--close" data-dcnode-id="4700" href="#" title="Close info"><i aria-hidden="true" class="icon-close_thin" data-dcnode-id="4701"></i></a></div></div><span data-dcnode-id="4697" instrument_node="">].</span></div></section><section data-dcnode-id="4617" data-locator="sec9" id="sec9" tabindex="0"><h2 class="top" data-dcnode-id="4691" data-left-hand-nav="Surgical technique" id="secsectitle0065" tabindex="0"><span class="top__sub" data-dcnode-id="4694"></span><span class="top__text" data-dcnode-id="4692"><span data-dcnode-id="4693" instrument_node="">Surgical technique</span></span></h2><section data-dcnode-id="4618" data-locator="sec9.1" id="sec9.1" tabindex="0"><h3 class="sectionTitle" data-dcnode-id="4686"><span class="top__sub" data-dcnode-id="4689"><span data-dcnode-id="4690" instrument_node="">&nbsp;</span></span><span class="top__text" data-dcnode-id="4687"><span data-dcnode-id="4688" instrument_node="">Donor organ recovery</span></span></h3><div class="section-paragraph" data-dcnode-id="4657"><span data-dcnode-id="4685" instrument_node="">The recovery of donor lungs comprises multiple steps that should be standardized and completed in a sequential manner with minimal adjustments to optimize patient outcomes. Recovery begins with a review of the donor blood group, thorough review of the donor’s history, and imaging. When the recovery team has arrived at the donor’s location, the first procedure performed should be a bronchoscopy to visualize the anatomy, identify any anomalies, and identify secretions that should be evacuated. After the bronchoscopy is complete, the patient is ventilated at 100% fraction of inspired oxygen (Fi</span><span class="smallcaps" data-dcnode-id="4683"><span data-dcnode-id="4684" instrument_node="">o</span></span><sub data-dcnode-id="4681"><span data-dcnode-id="4682" instrument_node="">2</span></sub><span data-dcnode-id="4680" instrument_node="">) on positive end-expiratory pressure (PEEP) at 5&nbsp;cm H</span><sub data-dcnode-id="4678"><span data-dcnode-id="4679" instrument_node="">2</span></sub><span data-dcnode-id="4677" instrument_node="">O, and an arterial blood gas (ABG) test is sent after a period of donor acclimation. Along with this, the operation begins with the operative surgeon at the right chest and performance of a median sternotomy, often concomitant with the laparotomy by the abdominal team. Once adequate exposure has been obtained, there is direct inspection of the lungs and thoracic cavity with the goal of identifying any obvious masses, trauma, infarction, or atelectasis. The pericardium is left intact, if cardiac evaluation is not urgent, to decrease hemodynamic instability and optimize visualization during the lung visual evaluation. Compliance is checked by temporarily disconnecting the ventilator, which should result in an immediate collapse of the lungs. If there are areas of collapsed lung identified, recruitment maneuvers are performed in coordination with the anesthesia team. Recruitment maneuvers include positive pressure with peak pressures up to 20 to 30&nbsp;cm H</span><sub data-dcnode-id="4675"><span data-dcnode-id="4676" instrument_node="">2</span></sub><span data-dcnode-id="4674" instrument_node="">0. The lung’s response to recruitment maneuvers as well as the ABGs sent intraoperatively are ultimately used to decide on the lung’s suitability for transplant. The ideal Pa</span><span class="smallcaps" data-dcnode-id="4672"><span data-dcnode-id="4673" instrument_node="">o</span></span><sub data-dcnode-id="4670"><span data-dcnode-id="4671" instrument_node="">2</span></sub><span data-dcnode-id="4669" instrument_node="">/Fi</span><span class="smallcaps" data-dcnode-id="4667"><span data-dcnode-id="4668" instrument_node="">o</span></span><sub data-dcnode-id="4665"><span data-dcnode-id="4666" instrument_node="">2</span></sub><span data-dcnode-id="4664" instrument_node=""> ratio is greater than 300 on a PEEP of 5&nbsp;cm H</span><sub data-dcnode-id="4662"><span data-dcnode-id="4663" instrument_node="">2</span></sub><span data-dcnode-id="4661" instrument_node="">O and normal CO</span><sub data-dcnode-id="4659"><span data-dcnode-id="4660" instrument_node="">2</span></sub><span data-dcnode-id="4658" instrument_node=""> levels. If the ABG is unsatisfactory after recruitment, the surgeon can obtain individual pulmonary vein blood gases to better assess lobar contributions to overall pulmonary function.</span></div><div class="section-paragraph" data-dcnode-id="4655"><span data-dcnode-id="4656" instrument_node="">Once the decision is made to accept the lungs, the surgeon dissects the great vessels. At this time the pericardium is opened and stay sutures placed. The superior vena cava (SVC) is encircled caudal to the azygous vein. The right pulmonary artery is dissected free from the posterior aspect of the SVC and ascending aorta, which allows the trachea to be manually exposed circumferentially. When adequate exposure is obtained and the other organ recovery teams are at the appropriate point in their dissection, systemic heparin is administered usually at a dose of 250 to 300&nbsp;units/kg. A purse-string suture is placed along the mid–pulmonary artery and the main pulmonary artery is cannulated with the cannula pointed in a retrograde fashion to facilitate equal distribution of perfusate. Prostaglandin E1 (500&nbsp;μg) is injected directly into the main pulmonary artery less than 1&nbsp;minute before application of the cross-clamp. Depending on whether or not the heart is being procured simultaneously, the heart is decompressed by ligation of the SVC and division of the inferior vena cava (IVC). The aortic cross-clamp is then applied and the left atrial appendage is divided to allow for further decompression. From 3 to 4&nbsp;L of cold Perfadex flush is initiated under pressure by gravity and the lungs are cooled by direct application of iced saline. The lung should be ventilated throughout with infusion of the Perfadex solution to aid in even distribution.</span></div><div class="section-paragraph" data-dcnode-id="4653"><span data-dcnode-id="4654" instrument_node="">The final stage of the surgery is cardiectomy. The surgeon mobilizes the IVC to the level of the right inferior pulmonary vein. The heart is lifted and an incision is made in the left atrium in the midpoint of the left and right inferior pulmonary veins. Metzenbaum scissors are used to extend the incision superiorly while keeping the vein orifices visualized. The left atrium is incised next, followed by the great vessels: the SVC distal to the ligature, the ascending aorta proximal to the head vessels, and the main pulmonary artery at the level of cannulation.</span></div><div class="section-paragraph" data-dcnode-id="4651"><span data-dcnode-id="4652" instrument_node="">After cardiectomy is complete, retrograde lung flush is administered, and 500&nbsp;mL of Perfadex solution is given directly down each vein orifice using a Foley catheter or self-inflating retrograde perfusion catheter. Perfusion is given until the returning fluid is clear of residual blood clots. The final step is the removal of the lungs en bloc. Bilateral inferior pulmonary ligaments are divided. Each lung is herniated and rotated toward the opposite chest. Usually beginning with dissection in the left chest, the anterior paraesophageal plane is developed by the operating surgeon using blunt dissection followed by sharp dissection. The mediastinal pleura just anterior to the esophagus should be divided completely into the right chest while the lungs are gently retracted upward. The dissection is continued cephalad until only the remnant trachea remains connected. The endotracheal tube is withdrawn proximally. The patient is given a gentle Valsalva as a final recruitment maneuver and, as the proximal trachea is clamped with the stapler, the Valsalva is released. Three staple lines are fired, 2 of which remain on the extracted trachea and 1 on the remnant tracheal stump to minimize pleural cavity contamination. If the lungs will be split for 2 different recipients, the proximal left main bronchus is divided with a liner stapler to maintain inflation before dividing the left atrium and pulmonary artery at the midline. The lungs are then bagged in cold preservation solution and transported on ice.</span></div><section data-dcnode-id="4641" data-locator="sec9.1.1" id="sec9.1.1" tabindex="0"><h4 class="sectionTitle" data-dcnode-id="4646"><span class="top__sub" data-dcnode-id="4649"><span data-dcnode-id="4650" instrument_node="">&nbsp;</span></span><span class="top__text" data-dcnode-id="4647"><span data-dcnode-id="4648" instrument_node="">Recipient preparation</span></span></h4><div class="section-paragraph" data-dcnode-id="4644"><span data-dcnode-id="4645" instrument_node="">Patients typically have an epidural inserted to facilitate better pain control and recovery postoperatively. Our institutional preference is to place the epidural preoperatively once the lungs have been accepted; however, many centers prefer to place the catheter postoperatively. The patient is then placed supine on the operating table with both arms tucked and all extremities appropriately padded. If a single lung transplant is planned, the patient could also be placed in the lateral recumbent position to facilitate hilar exposure through a posterolateral thoracotomy. Cardiac anesthesia is requested for all lung transplants because there is often significant cardiac manipulation intraoperatively as well as the possible need to place the patient on ECMO or CPB intraoperatively. Anesthesia should place a double-lumen endotracheal tube to facilitate lung isolation as well as endobronchial suctioning as needed. Adequate central venous access should be attained as well as an arterial line placed for hemodynamic monitoring.</span></div><div class="section-paragraph" data-dcnode-id="4642"><span data-dcnode-id="4643" instrument_node="">When the donor lung has arrived, the lung is prepared on the back table. The left atrial cuff and the proximal pulmonary arteries are dissected free from surrounding tissue. Additional cold Perfadex is infused directly into the superior and inferior pulmonary veins while the lung is inflated. The main-stem bronchus is transected approximately 2 cartilaginous rings from the orifice of the upper lobe bronchus.</span></div></section><section data-dcnode-id="4629" data-locator="sec9.1.2" id="sec9.1.2" tabindex="0"><h4 class="sectionTitle" data-dcnode-id="4636"><span class="top__sub" data-dcnode-id="4639"><span data-dcnode-id="4640" instrument_node="">&nbsp;</span></span><span class="top__text" data-dcnode-id="4637"><span data-dcnode-id="4638" instrument_node="">Single lung transplant</span></span></h4><div class="section-paragraph" data-dcnode-id="4634"><span data-dcnode-id="4635" instrument_node="">The patient should be prepped widely, including groin exposure, in case there is a need for femoral cannulation. A posterolateral thoracotomy incision using the fifth intercostal space is made. Hilar dissection ensues with the main pulmonary artery and both superior and inferior pulmonary veins being isolated and then divided before division of the bronchus. Division should be at the level of the lung parenchyma within the pulmonary hilum. The goal is to create a longer recipient bronchovascular stump that will facilitate reconstruction. The pericardium is opened around the left atrial cuff, in order to facilitate the left atrium being later clamped more central to the superior and inferior venous bifurcation during the atrial anastomosis. Veins on the right side are elongated via mobilization of the Waterston groove. Bronchial exposure can be improved by using a 2-0 silk suture through the staple line to retract the artery and vein stumps. There are several structures that should be clearly identified and observed during dissection with the goal of avoiding injury. One such set of structures is the peribronchial lymphatic and areolar tissue (vascular supply of the main-stem bronchus proximal to the origin of the upper lobe bronchus). However, if any bronchial or lymphatic vessels are divided, they should be clipped. The other important structure is the phrenic nerve, which should be protected from stretch and/or transection injury.</span></div><div class="section-paragraph" data-dcnode-id="4632"><span data-dcnode-id="4633" instrument_node="">The order of anastomosis of the donor lung is from posterior to anterior, beginning with bronchus. Polydioxanone suture (4-0) is used to avoid the risk of suture granuloma associated with polypropylene suture. The anastomosis begins at the cartilaginomembranous junction and it is carried circumferentially. Pneumostasis is tested with a Valsalva maneuver while the anastomosis is submerged under saline. Once this is complete, the anastomosis of the vein is completed using a continuous 4-0 nonabsorbable polypropylene suture and a continuous 5-0 suture for the artery. It is important to trim the donor pulmonary artery to avoid kinking of the vessel after reconstruction is complete.</span></div><div class="section-paragraph" data-dcnode-id="4630"><span data-dcnode-id="4631" instrument_node="">On completion of the anastomoses, the patient is placed in Trendelenburg position to allow for deairing of the vessels with ventilation of the lungs. The left atrial clamp is removed followed by the pulmonary artery clamp and then the anastomotic sutures are tied down. Our local institution’s practice is to initiate inhaled nitric oxide before reperfusion to minimize the risks of primary graft dysfunction (PGD). In addition, 500&nbsp;mg of methylprednisolone is given before allograft reperfusion in order to minimize the anticipated systemic inflammatory response. Chest tubes are placed anteriorly and posteriorly, secured, and then the chest is closed.</span></div></section><section data-dcnode-id="4619" data-locator="sec9.1.3" id="sec9.1.3" tabindex="0"><h4 class="sectionTitle" data-dcnode-id="4624"><span class="top__sub" data-dcnode-id="4627"><span data-dcnode-id="4628" instrument_node="">&nbsp;</span></span><span class="top__text" data-dcnode-id="4625"><span data-dcnode-id="4626" instrument_node="">Bilateral lung transplant</span></span></h4><div class="section-paragraph" data-dcnode-id="4622"><span data-dcnode-id="4623" instrument_node="">With the patient in the supine position, thoracic cavity access can be obtained in several ways. Options include median sternotomy, bilateral thoracosternotomy (clamshell), bilateral anterior thoracotomies leaving the sternum intact, or bilateral muscle-sparing axillary thoracotomies. The practice at this institution is to use the clamshell incision with both arms tucked. The clamshell provides excellent exposure, which may be especially important if the patient needs to be put on CPB or if the patient has dense pleural adhesions that require extensive dissection. The preference is usually to replace the lung with the least function first (based on the quantitative ventilation-perfusion scan or the intraoperative pulmonary artery test clamping) in order to allow for oxygenation and ventilation to be maintained. The decision to initiate CPB depends on whether the patient has severe pulmonary hypertension, significantly limited gas exchange, or toleration of single lung ventilation because of worsening gas exchange or right ventricular dysfunction. Cardiopulmonary support can also be considered if retraction and exposure of the left atrial anastomosis results in significant hemodynamic impairment.</span></div><div class="section-paragraph" data-dcnode-id="4620"><span data-dcnode-id="4621" instrument_node="">Preparation of the donor lungs is performed and a cuff of left atrium is preserved around the pulmonary veins bilaterally. Implantation of the donor lung is performed sequentially, using single lung ventilation of the contralateral lung. The technique of implantation is the same as described for single lung transplant.</span></div></section></section></section><section data-dcnode-id="3911" data-locator="sec10" id="sec10" tabindex="0"><h2 class="top" data-dcnode-id="4613" data-left-hand-nav="Complications" id="secsectitle0090" tabindex="0"><span class="top__sub" data-dcnode-id="4616"></span><span class="top__text" data-dcnode-id="4614"><span data-dcnode-id="4615" instrument_node="">Complications</span></span></h2><section data-dcnode-id="4495" data-locator="sec10.1" id="sec10.1" tabindex="0"><h3 class="sectionTitle" data-dcnode-id="4608"><span class="top__sub" data-dcnode-id="4611"><span data-dcnode-id="4612" instrument_node="">&nbsp;</span></span><span class="top__text" data-dcnode-id="4609"><span data-dcnode-id="4610" instrument_node="">Primary graft dysfunction</span></span></h3><div class="section-paragraph" data-dcnode-id="4496"><span data-dcnode-id="4607" instrument_node="">PGD is a syndrome of acute lung injury that occurs secondary to ischemia reperfusion injury. It is the major cause of morbidity and mortality after transplant and, for patients that survive, is associated with poorer quality of life, increased allograft dysfunction, and increased risk of death over time. The definition of PGD has been standardized by the ISHLT [</span><div class="dropBlock reference-citations" data-dcnode-id="4552"><a aria-controls="bib30" aria-expanded="false" class="reference-citations__ctrl" data-db-target-for="bib30-d42924852e906" data-dcnode-id="4605" href="#bib30" id="back-bib30"><span data-dcnode-id="4606" instrument_node="">[30]</span></a><div class="dropBlock__holder" data-db-target-of="bib30-d42924852e906" data-dcnode-id="4553"><div class="dropBlock__body" data-dcnode-id="4556"><ul class="rlist reference-citations__loa inline-bullet-list" data-dcnode-id="4596" title="list of authors"><li class="loa__item" data-dcnode-id="4603"><span data-dcnode-id="4604" instrument_node="">Snell G.I. </span></li><li class="loa__item" data-dcnode-id="4601"><span data-dcnode-id="4602" instrument_node="">Yusen R. </span></li><li class="loa__item" data-dcnode-id="4599"><span data-dcnode-id="4600" instrument_node="">Weill D. </span></li><li data-dcnode-id="4597"><span data-dcnode-id="4598" instrument_node="">et al.</span></li></ul><div class="reference-citations__detials" data-dcnode-id="4582"><span data-dcnode-id="4595" instrument_node="">Report of the ISHLT Working Group on Primary Lung Graft Dysfunction, part I: Definition and grading-A 2016 Consensus Group statement of the International Society for Heart and Lung Transplantation.</span><div class="popup-ref" data-dcnode-id="4583"><span class="ref__series" data-dcnode-id="4587"><i data-dcnode-id="4593"><span data-dcnode-id="4594" instrument_node="">J&nbsp;Heart Lung Transplant.</span></i><span data-dcnode-id="4592" instrument_node=""> </span><span class="ref__seriesDate" data-dcnode-id="4590"><span data-dcnode-id="4591" instrument_node="">2017; </span></span><span class="ref__seriesVolume" data-dcnode-id="4588"><span data-dcnode-id="4589" instrument_node="">36</span></span></span><span data-dcnode-id="4586" instrument_node="">: </span><span class="ref__seriesPages" data-dcnode-id="4584"><span data-dcnode-id="4585" instrument_node="">1097-1103</span></span></div></div><div class="reference-citations__links" data-dcnode-id="4557"><ul class="rlist inline-bullet-list" data-dcnode-id="4558"><li data-dcnode-id="4579"><a data-dcnode-id="4580" href="https://chatnoi " data-db-target-of="bib20-d42924852e942" data-dcnode-id="4082"><div class="dropBlock__body" data-dcnode-id="4085"><div class="reference-citations__detials" data-dcnode-id="4091"><span data-dcnode-id="4100" instrument_node="">The International Thoracic Organ Transplant (TTX) Registry of the International Society for Heart and Lung Transplantation: Thirty-Sixth Annual Report. Lung Transplantation: Adult Recipients.</span><div class="popup-ref" data-dcnode-id="4092"><div class="citation-host" data-dcnode-id="4093"><a data-dcnode-id="4098" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//ishltregistries.org/registries/slides.asp" target="_blank"><span data-dcnode-id="4099" instrument_node="">https://ishltregistries.org/registries/slides.asp</span></a><div data-dcnode-id="4094"><span data-dcnode-id="4096"><span data-dcnode-id="4097" instrument_node="">Date: </span></span><span data-dcnode-id="4095" instrument_node="">2019</span></div></div></div></div><div class="reference-citations__links" data-dcnode-id="4086"><ul class="rlist inline-bullet-list" data-dcnode-id="4087"><li data-dcnode-id="4088"><a class="google-scholar" data-dcnode-id="4089" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//scholar.google.com/scholar%3Fhl%3Den%26q%3DThe%2BInternational%2BThoracic%2BOrgan%2BTransplant%2B%2528TTX%2529%2BRegistry%2Bof%2Bthe%2BInternational%2BSociety%2Bfor%2BHeart%2Band%2BLung%2BTransplantation%253A%2BThirty-Sixth%2BAnnual%2BReport.%2BLung%2BTransplantation%253A%2BAdult%2BRecipients.%2B%2528Available%2Bat%253A%2529https%253A%252F%252Fishltregistries.org%252Fregistries%252Fslides.aspDate%253A%2B2019"><span data-dcnode-id="4090" instrument_node="">Google Scholar</span></a></li></ul></div></div><a class="dropBlock__ctrl--close" data-dcnode-id="4083" href="#" title="Close info"><i aria-hidden="true" class="icon-close_thin" data-dcnode-id="4084"></i></a></div></div><span data-dcnode-id="4080" instrument_node="">]. At&nbsp;5&nbsp;years, less than 20% of patients had returned to work postoperatively [</span><div class="dropBlock reference-citations" data-dcnode-id="4058"><a aria-controls="bib20" aria-expanded="false" class="reference-citations__ctrl" data-db-target-for="bib20-d42924852e945" data-dcnode-id="4078" href="#bib20" id="back-bib20"><span data-dcnode-id="4079" instrument_node="">[20]</span></a><div class="dropBlock__holder" data-db-target-of="bib20-d42924852e945" data-dcnode-id="4059"><div class="dropBlock__body" data-dcnode-id="4062"><div class="reference-citations__detials" data-dcnode-id="4068"><span data-dcnode-id="4077" instrument_node="">The International Thoracic Organ Transplant (TTX) Registry of the International Society for Heart and Lung Transplantation: Thirty-Sixth Annual Report. Lung Transplantation: Adult Recipients.</span><div class="popup-ref" data-dcnode-id="4069"><div class="citation-host" data-dcnode-id="4070"><a data-dcnode-id="4075" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//ishltregistries.org/registries/slides.asp" target="_blank"><span data-dcnode-id="4076" instrument_node="">https://ishltregistries.org/registries/slides.asp</span></a><div data-dcnode-id="4071"><span data-dcnode-id="4073"><span data-dcnode-id="4074" instrument_node="">Date: </span></span><span data-dcnode-id="4072" instrument_node="">2019</span></div></div></div></div><div class="reference-citations__links" data-dcnode-id="4063"><ul class="rlist inline-bullet-list" data-dcnode-id="4064"><li data-dcnode-id="4065"><a class="google-scholar" data-dcnode-id="4066" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//scholar.google.com/scholar%3Fhl%3Den%26q%3DThe%2BInternational%2BThoracic%2BOrgan%2BTransplant%2B%2528TTX%2529%2BRegistry%2Bof%2Bthe%2BInternational%2BSociety%2Bfor%2BHeart%2Band%2BLung%2BTransplantation%253A%2BThirty-Sixth%2BAnnual%2BReport.%2BLung%2BTransplantation%253A%2BAdult%2BRecipients.%2B%2528Available%2Bat%253A%2529https%253A%252F%252Fishltregistries.org%252Fregistries%252Fslides.aspDate%253A%2B2019"><span data-dcnode-id="4067" instrument_node="">Google Scholar</span></a></li></ul></div></div><a class="dropBlock__ctrl--close" data-dcnode-id="4060" href="#" title="Close info"><i aria-hidden="true" class="icon-close_thin" data-dcnode-id="4061"></i></a></div></div><span data-dcnode-id="4057" instrument_node="">].</span></div><div class="section-paragraph" data-dcnode-id="3974"><span data-dcnode-id="4055" instrument_node="">Median survival for adult lung transplants is the worst of all solid organ transplants. Between January 1990 and June 2016, median survival was estimated as 4.7&nbsp;years for single lung and 7.6&nbsp;years for double lung [</span><div class="dropBlock reference-citations" data-dcnode-id="4033"><a aria-controls="bib20" aria-expanded="false" class="reference-citations__ctrl" data-db-target-for="bib20-d42924852e950" data-dcnode-id="4053" href="#bib20" id="back-bib20"><span data-dcnode-id="4054" instrument_node="">[20]</span></a><div class="dropBlock__holder" data-db-target-of="bib20-d42924852e950" data-dcnode-id="4034"><div class="dropBlock__body" data-dcnode-id="4037"><div class="reference-citations__detials" data-dcnode-id="4043"><span data-dcnode-id="4052" instrument_node="">The International Thoracic Organ Transplant (TTX) Registry of the International Society for Heart and Lung Transplantation: Thirty-Sixth Annual Report. Lung Transplantation: Adult Recipients.</span><div class="popup-ref" data-dcnode-id="4044"><div class="citation-host" data-dcnode-id="4045"><a data-dcnode-id="4050" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//ishltregistries.org/registries/slides.asp" target="_blank"><span data-dcnode-id="4051" instrument_node="">https://ishltregistries.org/registries/slides.asp</span></a><div data-dcnode-id="4046"><span data-dcnode-id="4048"><span data-dcnode-id="4049" instrument_node="">Date: </span></span><span data-dcnode-id="4047" instrument_node="">2019</span></div></div></div></div><div class="reference-citations__links" data-dcnode-id="4038"><ul class="rlist inline-bullet-list" data-dcnode-id="4039"><li data-dcnode-id="4040"><a class="google-scholar" data-dcnode-id="4041" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//scholar.google.com/scholar%3Fhl%3Den%26q%3DThe%2BInternational%2BThoracic%2BOrgan%2BTransplant%2B%2528TTX%2529%2BRegistry%2Bof%2Bthe%2BInternational%2BSociety%2Bfor%2BHeart%2Band%2BLung%2BTransplantation%253A%2BThirty-Sixth%2BAnnual%2BReport.%2BLung%2BTransplantation%253A%2BAdult%2BRecipients.%2B%2528Available%2Bat%253A%2529https%253A%252F%252Fishltregistries.org%252Fregistries%252Fslides.aspDate%253A%2B2019"><span data-dcnode-id="4042" instrument_node="">Google Scholar</span></a></li></ul></div></div><a class="dropBlock__ctrl--close" data-dcnode-id="4035" href="#" title="Close info"><i aria-hidden="true" class="icon-close_thin" data-dcnode-id="4036"></i></a></div></div><span data-dcnode-id="4032" instrument_node="">]. Survival for retransplant patients in this same time frame is worse compared with primary transplant patients (3.1&nbsp;years vs 6.2&nbsp;years). Survival is statistically significantly better for women at 6.4&nbsp;years than for men at 5.8&nbsp;years after primary transplant. Patients with CF have the longest median survival of 9.5&nbsp;years, compared with other disease causes (</span><a class="figure-link scroll-into-link" data-dcnode-id="4030" data-link="modal" data-locator="fig4" data-target="#image-S0065-3411(20)30011-7gr4" href="#gr4" id="back-gr4"><span data-dcnode-id="4031" instrument_node="">Fig.&nbsp;4</span></a><span data-dcnode-id="4029" instrument_node="">). Median survival is the worst for patients with IIP at 5.2&nbsp;years, followed closely by COPD at 5.9&nbsp;years [</span><div class="dropBlock reference-citations" data-dcnode-id="4007"><a aria-controls="bib20" aria-expanded="false" class="reference-citations__ctrl" data-db-target-for="bib20-d42924852e957" data-dcnode-id="4027" href="#bib20" id="back-bib20"><span data-dcnode-id="4028" instrument_node="">[20]</span></a><div class="dropBlock__holder" data-db-target-of="bib20-d42924852e957" data-dcnode-id="4008"><div class="dropBlock__body" data-dcnode-id="4011"><div class="reference-citations__detials" data-dcnode-id="4017"><span data-dcnode-id="4026" instrument_node="">The International Thoracic Organ Transplant (TTX) Registry of the International Society for Heart and Lung Transplantation: Thirty-Sixth Annual Report. Lung Transplantation: Adult Recipients.</span><div class="popup-ref" data-dcnode-id="4018"><div class="citation-host" data-dcnode-id="4019"><a data-dcnode-id="4024" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//ishltregistries.org/registries/slides.asp" target="_blank"><span data-dcnode-id="4025" instrument_node="">https://ishltregistries.org/registries/slides.asp</span></a><div data-dcnode-id="4020"><span data-dcnode-id="4022"><span data-dcnode-id="4023" instrument_node="">Date: </span></span><span data-dcnode-id="4021" instrument_node="">2019</span></div></div></div></div><div class="reference-citations__links" data-dcnode-id="4012"><ul class="rlist inline-bullet-list" data-dcnode-id="4013"><li data-dcnode-id="4014"><a class="google-scholar" data-dcnode-id="4015" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//scholar.google.com/scholar%3Fhl%3Den%26q%3DThe%2BInternational%2BThoracic%2BOrgan%2BTransplant%2B%2528TTX%2529%2BRegistry%2Bof%2Bthe%2BInternational%2BSociety%2Bfor%2BHeart%2Band%2BLung%2BTransplantation%253A%2BThirty-Sixth%2BAnnual%2BReport.%2BLung%2BTransplantation%253A%2BAdult%2BRecipients.%2B%2528Available%2Bat%253A%2529https%253A%252F%252Fishltregistries.org%252Fregistries%252Fslides.aspDate%253A%2B2019"><span data-dcnode-id="4016" instrument_node="">Google Scholar</span></a></li></ul></div></div><a class="dropBlock__ctrl--close" data-dcnode-id="4009" href="#" title="Close info"><i aria-hidden="true" class="icon-close_thin" data-dcnode-id="4010"></i></a></div></div><span data-dcnode-id="4006" instrument_node="">].</span><div class="floatDisplay" data-dcnode-id="3975"><figure class="" data-dcnode-id="3976" id="gr4"><img alt="Figure thumbnail gr4" class="b-lazy" data-dcnode-id="4005" data-high-res="//els-jbs-prod-cdn.jbs.elsevierhealth.com/cms/attachment/7fc81007-083a-421f-80ed-896b5e5e2242/gr4_lrg.jpg" data-large-image="//els-jbs-prod-cdn.jbs.elsevierhealth.com/cms/attachment/fb25ecac-b554-491f-8367-4b56478af0db/gr4.jpg" data-locator="fig4" data-src="//els-jbs-prod-cdn.jbs.elsevierhealth.com/cms/attachment/fb25ecac-b554-491f-8367-4b56478af0db/gr4.jpg" loading="lazy"><figcaption data-dcnode-id="3977"><div class="figure__caption__body" data-dcnode-id="3978"><div class="figure__title" data-dcnode-id="4000"><span class="label figure__label" data-dcnode-id="4003" data-fv-label="Fig. 4"><span data-dcnode-id="4004" instrument_node="">Fig.&nbsp;4</span></span><span class="figure__title__text" data-dcnode-id="4001"><span data-dcnode-id="4002" instrument_node="">Adult lung transplants from January 1990 to June 2016. Kaplan-Meier survival by major diagnosis.</span></span></div><span class="figure__source" data-dcnode-id="3992"><span data-dcnode-id="3999" instrument_node="">(</span><em data-dcnode-id="3997"><span data-dcnode-id="3998" instrument_node="">From</span></em><span data-dcnode-id="3996" instrument_node=""> The International Thoracic Organ Transplant (TTX) Registry of the International Society for Heart and Lung Transplantation: Thirty-Sixth Annual Report. Lung Transplantation: Adult Recipients. 2019; with permission. Available at: </span><a data-dcnode-id="3994" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//ishltregistries.org/registries/slides.asp" target="_blank"><span data-dcnode-id="3995" instrument_node="">https://ishltregistries.org/registries/slides.asp</span></a><span data-dcnode-id="3993" instrument_node="">.)</span></span><ul class="rlist--inline separator download-links" data-dcnode-id="3979"><li data-dcnode-id="3989"><a data-dcnode-id="3990" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//els-jbs-prod-cdn.jbs.elsevierhealth.com/cms/attachment/fb25ecac-b554-491f-8367-4b56478af0db/gr4.jpg" target="_blank" title="View Large Image in a new tab"><span data-dcnode-id="3991" instrument_node="">View Large
                                            Image
                                        </span></a></li><li class="download-links__figureViewer" data-dcnode-id="3986"><a class="figure__open__ctrl" data-dcnode-id="3987" href="#"><span data-dcnode-id="3988" instrument_node="">Figure Viewer</span></a></li><li data-dcnode-id="3983"><a class="download-links__download-Hi-res" data-dcnode-id="3984" download="" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//els-jbs-prod-cdn.jbs.elsevierhealth.com/cms/attachment/7fc81007-083a-421f-80ed-896b5e5e2242/gr4_lrg.jpg" target="_blank"><span data-dcnode-id="3985" instrument_node="">Download Hi-res
                                            image
                                        </span></a></li><li class="hidden-xs" data-dcnode-id="3980"><a class="download-links__download-This" data-dcnode-id="3981" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.advancessurgery.com/action/downloadFigures%3Fpii%3DS0065-3411%2820%2930011-7%26id%3Dgr4.jpg"><span data-dcnode-id="3982" instrument_node="">Download (PPT)</span></a></li></ul></div></figcaption></figure></div></div><div class="section-paragraph" data-dcnode-id="3913"><span data-dcnode-id="3973" instrument_node="">In adult patients undergoing lung transplant in the years 2010 to 2017, the 2018 UNOS annual report showed a median survival of 6.7&nbsp;years. Female recipients with CF as the main indication for transplant and those who received bilateral lung transplants experienced longer survival. The overall survival in the 2010 to 2017 time frame was greater than in the previous era (2002–2009). However, the survival curves between the 2 time frames were not significantly divergent. Using a 5-year multivariable model including variables concerning size matching between donor and recipient (height and weight differences), the review of the data suggested that, in the 2010 to 2017 transplant era, bilateral lung transplant and CF or lymphangioleiomyomatosis as indications for transplant were favorably associated with survival. Factors that were independently associated with lower survival included cytomegalovirus mismatch status, a history of hypertension or diabetes mellitus in the donor, retransplant, and poor pretransplant functional. Interestingly, a history of transplant from a donation after circulatory death (DCD) donor (or non–heart-beating donor) was independently associated with higher 10-year survival (</span><em data-dcnode-id="3971"><span data-dcnode-id="3972" instrument_node="">P</span></em><span data-dcnode-id="3970" instrument_node="">&nbsp;&lt;.01, n&nbsp;=&nbsp;110) [</span><div class="dropBlock reference-citation ecompensating despite aggressive medical management, ECMO can be considered as a bridge to transplant but should only be considered as an option in highly specialized centers and with adequate expertise to promote success in carefully selected patients [</span><div class="dropBlock reference-citations" data-dcnode-id="3847"><a aria-controls="bib38" aria-expanded="false" class="reference-citations__ctrl" data-db-target-for="bib38-d42924852e972" data-dcnode-id="3904" href="#bib38" id="back-bib38"><span data-dcnode-id="3905" instrument_node="">[38]</span></a><div class="dropBlock__holder" data-db-target-of="bib38-d42924852e972" data-dcnode-id="3848"><div class="dropBlock__body" data-dcnode-id="3851"><ul class="rlist reference-citations__loa inline-bullet-list" data-dcnode-id="3895" title="list of authors"><li class="loa__item" data-dcnode-id="3902"><span data-dcnode-id="3903" instrument_node="">Hoopes C.W. </span></li><li class="loa__item" data-dcnode-id="3900"><span data-dcnode-id="3901" instrument_node="">Kukreja J. </span></li><li class="loa__item" data-dcnode-id="3898"><span data-dcnode-id="3899" instrument_node="">Davenport D.L. </span></li><li data-dcnode-id="3896"><span data-dcnode-id="3897" instrument_node="">et al.</span></li></ul><div class="reference-citations__detials" data-dcnode-id="3877"><span data-dcnode-id="3894" instrument_node="">Extracorporeal membrane oxygenation as a bridge to pulmonary transplantation.</span><div class="popup-ref" data-dcnode-id="3878"><span class="ref__series" data-dcnode-id="3882"><i data-dcnode-id="3892"><span data-dcnode-id="3893" instrument_node="">J&nbsp;Thorac Cardiovasc Surg.</span></i><span data-dcnode-id="3891" instrument_node=""> </span><span class="ref__seriesDate" data-dcnode-id="3889"><span data-dcnode-id="3890" instrument_node="">2013; </span></span><span class="ref__seriesVolume" data-dcnode-id="3887"><span data-dcnode-id="3888" instrument_node="">145</span></span><span data-dcnode-id="3886" instrument_node=""> (< __content" data-dcnode-id="3747" style="display: none;"><b data-dcnode-id="3835"><span data-dcnode-id="3836" instrument_node="">Indications and contraindications for extracorporeal membrane oxygenation bridging</span></b><div class="section-paragraph" data-dcnode-id="3748"><ul class="ce-list--remove-bullets" data-dcnode-id="3749" id="olist0015"><li class="ce-list--remove-bullets__list-item" data-dcnode-id="3826" id="u0180"><div class="ce-list--remove-bullets__list-item__text" data-dcnode-id="3827"><span data-dcnode-id="3834" instrument_node="">Indications</span><ul class="ce-list--remove-bullets" data-dcnode-id="3828" id="ulist0065"><li class="ce-list--remove-bullets__list-item" data-dcnode-id="3829" id="u0185"><span class="label" data-dcnode-id="3832"><span data-dcnode-id="3833" instrument_node="">•</span></span><div class="ce-list--remove-bullets__list-item__text" data-dcnode-id="3830"><span data-dcnode-id="3831" instrument_node="">Refractory hypoxemia or hypercarbia or right heart failure despite optimal medical management in a patient who is a potential candidate for lung transplant</span></div></li></ul></div></li><li class="ce-list--remove-bullets__list-item" data-dcnode-id="3787" id="u0190"><div class="ce-list--remove-bullets__list-item__text" data-dcnode-id="3788"><span data-dcnode-id="3825" instrument_node="">Absolute contraindications</span><ul class="ce-list--remove-bullets" data-dcnode-id="3789" id="ulist0070"><li class="ce-list--remove-bullets__list-item" data-dcnode-id="3820" id="u0195"><span class="label" data-dcnode-id="3823"><span data-dcnode-id="3824" instrument_node="">•</span></span><div class="ce-list--remove-bullets__list-item__text" data-dcnode-id="3821"><span data-dcnode-id="3822" instrument_node="">Ineligibility for lung transplant according to standard criteria</span></div></li><li class="ce-list--remove-bullets__list-item" data-dcnode-id="3815" id="u0200"><span class="label" data-dcnode-id="3818"><span data-dcnode-id="3819" instrument_node="">•</span></span><div class="ce-list--remove-bullets__list-item__text" data-dcnode-id="3816"><span data-dcnode-id="3817" instrument_node="">Irreversible end-organ damage affecting multiple organs</span></div></li><li class="ce-list--remove-bullets__list-item" data-dcnode-id="3810" id="u0205"><span class="label" data-dcnode-id="3813"><span data-dcnode-id="3814" instrument_node="">•</span></span><div class="ce-list--remove-bullets__list-item__text" data-dcnode-id="3811"><span data-dcnode-id="3812" instrument_node="">Sepsis and bacteremia</span></div></li><li class="ce-list--remove-bullets__list-item" data-dcnode-id="3805" id="u0210"><span class="label" data-dcnode-id="3808"><span data-dcnode-id="3809" instrument_node="">•</span></span><div class="ce-list--remove-bullets__list-item__text" data-dcnode-id="3806"><span data-dcnode-id="3807" instrument_node="">Contraindications to systemic anticoagulation</span></div></li><li class="ce-list--remove-bullets__list-item" data-dcnode-id="3800" id="u0215"><span class="label" data-dcnode-id="3803"><span data-dcnode-id="3804" instrument_node="">•</span></span><div class="ce-list--remove-bullets__list-item__text" data-dcnode-id="3801"><span data-dcnode-id="3802" instrument_node="">Uncontrolled metastatic disease</span></div></li><li class="ce-list--remove-bullets__list-item" data-dcnode-id="3795" id="u0220"><span class="label" data-dcnode-id="3798"><span data-dcnode-id="3799" instrument_node="">•</span></span><div class="ce-list--remove-bullets__list-item__text" data-dcnode-id="3796"><span data-dcnode-id="3797" instrument_node="">Other terminal illness that is not otherwise treatable with a lung transplant</span></div></li><li class="ce-list--remove-bullets__list-item" data-dcnode-id="3790" id="u0225"><span class="label" data-dcnode-id="3793"><span data-dcnode-id="3794" instrument_node="">•</span></span><div class="ce-list--remove-bullets__list-item__text" data-dcnode-id="3791"><span data-dcnode-id="3792" instrument_node="">Acute intracerebral hemorrhage or stroke</span></div></li></ul></div></li><li class="ce-list--remove-bullets__list-item" data-dcnode-id="3750" id="u0230"><div class="ce-list--remove-bullets__list-item__text" data-dcnode-id="3751"><span data-dcnode-id="3786" instrument_node="">Relative contraindications</span><ul class="ce-list--remove-bullets" data-dcnode-id="3752" id="ulist0075"><li class="ce-list--remove-bullets__list-item" data-dcnode-id="3781" id="u0235"><span class="label" data-dcnode-id="3784"><span data-dcnode-id="3785" instrument_node="">•</span></span><div class="ce-list--remove-bullets__list-item__text" data-dcnode-id="3782"><span data-dcnode-id="3783" instrument_node="">Age greater than 65&nbsp;years</span></div></li><li class="ce-list--remove-bullets__list-item" data-dcnode-id="3776" id="u0240"><span class="label" data-dcnode-id="3779"><span data-dcnode-id="3780" instrument_node="">•</span></span><div class="ce-list--remove-bullets__list-item__text" data-dcnode-id="3777"><span data-dcnode-id="3778" instrument_node="">Limitations in vascular access</span></div></li><li class="ce-list--remove-bullets__list-item" data-dcnode-id="3768" id="u0245"><span class="label" data-dcnode-id="3774"><span data-dcnode-id="3775" instrument_node="">•</span></span><div class="ce-list--remove-bullets__list-item__text" data-dcnode-id="3769"><span data-dcnode-id="3773" instrument_node="">Obesity (body mass index&nbsp;&gt;30&nbsp;kg/m</span><sup data-dcnode-id="3771"><span data-dcnode-id="3772" instrument_node="">2</span></sup><span data-dcnode-id="3770" instrument_node="">)</span></div></li><li class="ce-list--remove-bullets__list-item" data-dcnode-id="3763" id="u0250"><span class="label" data-dcnode-id="3766"><span data-dcnode-id="3767" instrument_node="">•</span></span><div class="ce-list--remove-bullets__list-item__text" data-dcnode-id="3764"><span data-dcnode-id="3765" instrument_node="">Frailty</span></div></li><li class="ce-list--remove-bullets__list-item" data-dcnode-id="3758" id="u0255"><span class="label" data-dcnode-id="3761"><span data-dcnode-id="3762" instrument_node="">•</span></span><div class="ce-list--remove-bullets__list-item__text" data-dcnode-id="3759"><span data-dcnode-id="3760" instrument_node="">Allosensitization with prolonged waiting-list time</span></div></li><li class="ce-list--remove-bullets__list-item" data-dcnode-id="3753" id="u0260"><span class="label" data-dcnode-id="3756"><span data-dcnode-id="3757" instrument_node="">•</span></span><div class="ce-list--remove-bullets__list-item__text" data-dcnode-id="3754"><span data-dcnode-id="3755" instrument_node="">Prolonged ventilator support</span></div></li></ul></div></li></ul></div></div></div></div></div></div><div class="section-paragraph" data-dcnode-id="3741"><span data-dcnode-id="3742" instrument_node="">ECMO should not be instituted in patients who have an irreversible illness or process, such as end-organ damage. The patient’s rehabilitation potential should also be considered. Those who have decompensated to a point where rehabilitation after the institution of ECMO is unlikely should not be placed on ECMO. There are also instances that are not clear-cut, such as when a patient is a transplant candidate but has not been cleared for the procedure, or if they have incurred end-organ damage that may be reversible. In these instances, ECMO can be used as a bridge to decision. When deciding on the implementation of ECMO, a multidisciplinary discussion involving the transplant surgeons, transplant pulmonologists, critical care specialists, and palliative care providers should take place.</span></div></section><section data-dcnode-id="3684" data-locator="sec12" id="sec12" tabindex="0"><h2 class="top" data-dcnode-id="3736" data-left-hand-nav="Venovenous and venoarterial extracorporeal membrane oxygenation" id="secsectitle0115" tabindex="0"><span class="top__sub" data-dcnode-id="3739"></span><span class="top__text" data-dcnode-id="3737"><span data-dcnode-id="3738" instrument_node="">Venovenous and venoarterial extracorporeal membrane oxygenation</span></span></h2><div class="section-paragraph" data-dcnode-id="3685"><span data-dcnode-id="3735" instrument_node="">Either the venovenous (VV) or venoarterial (VA) ECMO configurations can be used, because both deliver blood from the patient to the ECMO oxygenator, and then from the oxygenator to the patient. VV ECMO is used in patients that have severe lung disease and cannot oxygenate or remove CO</span><sub data-dcnode-id="3733"><span data-dcnode-id="3734" instrument_node="">2</span></sub><span data-dcnode-id="3732" instrument_node=""> despite maximal ventilator support. Patients undergoing VV ECMO should have normal heart function that is confirmed by echocardiography and lack of significant resistance to pulmonary arterial flow. VV ECMO has been observed to be less successful in patients with pulmonary hypertension or pulmonary fibrosis [</span><div class="dropBlock reference-citations" data-dcnode-id="3687"><a aria-controls="bib39" aria-expanded="false" class="reference-citations__ctrl" data-db-target-for="bib39-d42924852e992" data-dcnode-id="3730" href="#bib39" id="back-bib39"><span data-dcnode-id="3731" instrument_node="">[39]</span></a><div class="dropBlock__holder" data-db-target-of="bib39-d42924852e992" data-dcnode-id="3688"><div class="dropBlock__body" data-dcnode-id="3691"><ul class="rlist reference-citations__loa inline-bullet-list" data-dcnode-id="3723" title="list of authors"><li class="loa__item" data-dcnode-id="3728"><span data-dcnode-id="3729" instrument_node="">Loor G. </span></li><li class="loa__item" data-dcnode-id="3726"><span data-dcnode-id="3727" instrument_node="">Simpson L. </span></li><li class="loa__item" data-dcnode-id="3724"><span data-dcnode-id="3725" instrument_node="">Parulekar A. </span></li></ul><div class="reference-citations__detials" data-dcnode-id="3709"><span data-dcnode-id="3722" instrument_node="">Bridging to lung transplantation with extracorporeal circulatory support: when or when not?.</span><div class="popup-ref" data-dcnode-id="3710"><span class="ref__series" data-dcnode-id="3714"><i data-dcnode-id="3720"><span data-dcnode-id="3721" instrument_node="">J&nbsp;Thorac Dis.</span></i><span data-dcnode-id="3719" instrument_node=""> </span><span class="ref__seriesDate" data-dcnode-id="3717"><span data-dcnode-id="3718" instrument_node="">2017; </span></span><span class="ref__seriesVolume" data-dcnode-id="3715"><span data-dcnode-id="3716" instrument_node="">9</span></span></span><span data-dcnode-id="3713" instrument_node="">: </span><span class="ref__seriesPages" data-dcnode-id="3711"><span data-dcnode-id="3712" instrument_node="">3352-3361</span></span></div></div><div class="reference-citations__links" data-dcnode-id="3692"><ul class="rlist inline-bullet-list" data-dcnode-id="3693"><li data-dcnode-id="3706"><a data-dcnode-id="3707" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.advancessurgery.com/servlet/linkout%3Fsuffix%3De_1_5_1_2_39_2%26dbid%3D16%26doi%3D10.1016/j.yasu.2020.05.004%26key%3D10.21037%252Fjtd.2017.08.117%26cf%3D" onclick="newWindow(this.href);return false"><span data-dcnode-id="3708" instrument_node="">Crossref</span></a></li><span data-dcnode-id="3705" instrument_node="">

ory support is necessary to safely perform lung transplant when the patient cannot safely tolerate single lung ventilation or becomes hemodynamically unstable during the procedure. Initially, CPB was the most commonly used modality. However, as institutions became more comfortable and adept at using and managing ECMO, it supplanted CPB as the primary mode of support during lung transplant because many single-institution and non–randomized controlled studies have shown the benefit of using ECMO rather than CPB. A study performed by Hardin and Kittle [</span><div class="dropBlock reference-citations" data-dcnode-id="3415"><a aria-controls="bib9" aria-expanded="false" class="reference-citations__ctrl" data-db-target-for="bib9-d42924852e1015" data-dcnode-id="3456" href="#bib9" id="back-bib9"><span data-dcnode-id="3457" instrument_node="">[9]</span></a><div class="dropBlock__holder" data-db-target-of="bib9-d42924852e1015" data-dcnode-id="3416"><div class="dropBlock__body" data-dcnode-id="3419"><ul class="rlist reference-citations__loa inline-bullet-list" data-dcnode-id="3451" title="list of authors"><li class="loa__item" data-dcnode-id="3454"><span data-dcnode-id="3455" instrument_node="">Hardin C.A. </span></li><li class="loa__item" data-dcnode-id="3452"><span data-dcnode-id="3453" instrument_node="">Kittle C.F. </span></li></ul><div class="reference-citations__detials" data-dcnode-id="3437"><span data-dcnode-id="3450" instrument_node="">Experience with transplantation of the lung.</span><div class="popup-ref" data-dcnode-id="3438"><span class="ref__series" data-dcnode-id="3442"><i data-dcnode-id="3448"><span data-dcnode-id="3449" instrument_node="">Science.</span></i><span data-dcnode-id="3447" instrument_node=""> </span><span class="ref__seriesDate" data-dcnode-id="3445"><span data-dcnode-id="3446" instrument_node="">1954; </span></span><span class="ref__seriesVolume" data-dcnode-id="3443"><span data-dcnode-id="3444" instrument_node="">119</span></span></span><span da ols="bib44" aria-expanded="false" class="reference-citations__ctrl" data-db-target-for="bib44-d42924852e1039" data-dcnode-id="3124" href="#bib44" id="back-bib44"><span data-dcnode-id="3125" instrument_node="">[44]</span></a><div class="dropBlock__holder" data-db-target-of="bib44-d42924852e1039" data-dcnode-id="3092"><div class="dropBlock__body" data-dcnode-id="3095"><ul class="rlist reference-citations__loa inline-bullet-list" data-dcnode-id="3119" title="list of authors"><li class="loa__item" data-dcnode-id="3122"><span data-dcnode-id="3123" instrument_node="">Toyoda Y. </span></li><li class="loa__item" data-dcnode-id="3120"><span data-dcnode-id="3121" instrument_node="">Toyoda Y. </span></li></ul><div class="reference-citations__detials" data-dcnode-id="3105"><span data-dcnode-id="3118" instrument_node="">Heart-lung transplantation: adult indications and outcomes.</span><div class="popup-ref" data-dcnode-id="3106"><span class="ref__series" data-dcnode-id="3110"><i data-dcnode-id="3116"><span data-dcnode-id="3117" instrument_node="">J&nbsp;Thorac Dis.</span></i><span data-dcnode-id="3115" instrument_node=""> </span><span class="ref__seriesDate" data-dcnode-id="3113"><span data-dcnode-id="3114" instrument_node="">2014; </span></span><span class="ref__seriesVolume" data-dcnode-id="3111"><span data-dcnode-id="3112" instrument_node="">6</span></span></span><span data-dcnode-id="3109" instrument_node="">: </span><span class="ref__seriesPages" data-dcnode-id="3107"><span data-dcnode-id="3108" instrument_node="">1138-1142</span></span></div></div><div class="reference-citations__links" data-dcnode-id="3096"><ul class="rlist inline-bullet-list" data-dcnode-id="3097"><li data-dcnode-id="3102"><a data-dcnode-id="3103" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.advancessurgery.com/servlet/linkout%3Fsuffix%3De_1_5_1_2_44_2%26dbid%3D8%26doi%3D10.1016/j.yasu.2020.05.004%26key%3D25132981%26cf%3D" onclick="newWindow(this.href);return false"><span data-dcnode-id="3104" instrument_node="">PubMed</span></a></li><span data-dcnode-id="3101" instrument_node="">
</span><li data-dcnode-id="3098"><a class="google-scholar" data-dcnode-id="3099" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//scholar.google.com/scholar_lookup%3Fhl%3Den%26volume%3D6%26publication_year%3D2014%26pages%3D1138-1142%26journal%3DJ%25C2%25A0Thorac%2BDis%26author%3DToyoda%2BY.%26author%3DToyoda%2BY.%26title%3DHeart-lung%2Btransplantation%3A%2Badult%2Bindications%2Band%2Boutcomes"><span data-dcnode-id="3100" instrument_node="">Google Scholar</span></a></li></ul></div></div><a class="dropBlock__ctrl--close" data-dcnode-id="3093" href="#" title="Close info"><i aria-hidden="true" class="icon-close_thin" data-dcnode-id="3094"></i></a></div></div><span data-dcnode-id="3090" instrument_node="">] in 2008, showed no difference in survival outcomes when IPH patients underwent combined heart-lung transplant versus double lung transplant. Isolated double lung transplant has become the preferred treatment modality for IPH, and the number of heart-lung transplants performed has expectedly decreased and remained consistently low. In 2018, there were only 42 heart-lung transplants (3% of total lung transplants) performed in the United States, which was similar to the 45 performed in 2015 [</span><div class="dropBlock reference-citations" data-dcnode-id="3043"><a aria-controls="bib23" aria-expanded="false" class="reference-citations__ctrl" data-db-target-for="bib23-d42924852e1042" data-dcnode-id="3088" href="#bib23" id="back-bib23"><span data-dcnode-id="3089" instrument_node="">[23]</span></a><div class="dropBlock__holder" data-db-target-of="bib23-d42924852e1042" data-dcnode-id="3044"><div class="dropBlock__body" data-dcnode-id="3047"><ul class="rlist reference-citations__loa inline-bullet-list" data-dcnode-id="3079" title="list of authors"><li class="loa__item" data-dcnode-id="3086"><span data-dcnode-id="3087" instrument_node="">Valapour M. </span></li><li class="loa__item" data-dcnode-id="3084"><span data-dcnode-id="3085" instrument_node="">  30% to 50% [</span><div class="dropBlock reference-citations" data-dcnode-id="2995"><a aria-controls="bib45" aria-expanded="false" class="reference-citations__ctrl" data-db-target-for="bib45-d42924852e1047" data-dcnode-id="3038" href="#bib45" id="back-bib45"><span data-dcnode-id="3039" instrument_node="">[45]</span></a><div class="dropBlock__holder" data-db-target-of="bib45-d42924852e1047" data-dcnode-id="2996"><div class="dropBlock__body" data-dcnode-id="2999"><ul class="rlist reference-citations__loa inline-bullet-list" data-dcnode-id="3031" title="list of authors"><li class="loa__item" data-dcnode-id="3036"><span data-dcnode-id="3037" instrument_node="">Le Pavec J. </span></li><li class="loa__item" data-dcnode-id="3034"><span data-dcnode-id="3035" instrument_node="">Hascoet S. </span></li><li class="loa__item" data-dcnode-id="3032"><span data-dcnode-id="3033" instrument_node="">Fadel E. </span></li></ul><div class="reference-citations__detials" data-dcnode-id="3017"><span data-dcnode-id="3030" instrument_node="">Heart-lung transplantation: current indications, prognosis and specific considerations.</span><div class="popup-ref" data-dcnode-id="3018"><span class="ref__series" data-dcnode-id="3022"><i data-dcnode-id="3028"><span data-dcnode-id="3029" instrument_node="">J&nbsp;Thorac Dis.</span></i><span data-dcnode-id="3027" instrument_node=""> </span><span class="ref__seriesDate" data-dcnode-id="3025"><span data-dcnode-id="3026" instrument_node="">2018; </span></span><span class="ref__seriesVolume" data-dcnode-id="3023"><span data-dcnode-id="3024" instrument_node="">10</span></span></span><span data-dcnode-id="3021" instrument_node="">: </span><span class="ref__seriesPages" data-dcnode-id="3019"><span data-dcnode-id="3020" instrument_node="">5946-5952</span></span></div></div><div class="reference-citations__links" data-dcnode-id="3000"><ul class="rlist inline-bullet-list" data-dcnode-id="3001"><li data-dcnode-id="3014"><a data-dcnode-id="3015" href="https://chatn tracted HCV from the donated organ. However, with the development of antiviral regimens that cured patients with HCV, investigations of transplanting HCV-positive donor lungs into HCV-negative recipients took place.</span></div><div class="section-paragraph" data-dcnode-id="2894"><span data-dcnode-id="2980" instrument_node="">The Donors of hepatitis c NAT [nucleic acid amplification test] Positive Thoracic Allografts for Transplantation Evaluation in Non-HCV Recipients (DONATE HCV) study published in 2019 evaluated HCV viremia–positive donor lungs, 36 patients, and hearts, 8 patients, implanted into HCV-negative recipients [</span><div class="dropBlock reference-citations" data-dcnode-id="2944"><a aria-controls="bib12" aria-expanded="false" class="reference-citations__ctrl" data-db-target-for="bib12-d42924852e1060" data-dcnode-id="2978" href="#bib12" id="back-bib12"><span data-dcnode-id="2979" instrument_node="">[12]</span></a><div class="dropBlock__holder" data-db-target-of="bib12-d42924852e1060" data-dcnode-id="2945"><div class="dropBlock__body" data-dcnode-id="2948"><ul class="rlist reference-citations__loa inline-bullet-list" data-dcnode-id="2975" title="list of authors"><li class="loa__item" data-dcnode-id="2976"><span data-dcnode-id="2977" instrument_node="">Hardy J.D. </span></li></ul><div class="reference-citations__detials" data-dcnode-id="2958"><span data-dcnode-id="2974" instrument_node="">Cap 45: experimental background and early clinical experience.</span><div class="popup-ref" data-dcnode-id="2959"><span data-dcnode-id="2973" instrument_node="">in: </span><span class="editors" data-dcnode-id="2971"><span data-dcnode-id="2972" instrument_node="">Cooper D.K. Novitzky D. </span></span><span data-dcnode-id="2970" instrument_node="">The transplantation and replacement of thoracic organ.  </span><span class="refPublisherName" data-dcnode-id="2968"><span data-dcnode-id="2969" instrument_node="">Springer</span></span><span data-dcnode-id="2967" instrument_node de-id="2868"><span data-dcnode-id="2881" instrument_node="">Short-course, direct-acting antivirals and ezetimibe to prevent hcv infection in recipients of organs from hcv-infected donors: a phase 3, single-centre, open-label study.</span><div class="popup-ref" data-dcnode-id="2869"><span class="ref__series" data-dcnode-id="2873"><i data-dcnode-id="2879"><span data-dcnode-id="2880" instrument_node="">Lancet Gastroenterol Hepatol.</span></i><span data-dcnode-id="2878" instrument_node=""> </span><span class="ref__seriesDate" data-dcnode-id="2876"><span data-dcnode-id="2877" instrument_node="">2020; </span></span><span class="ref__seriesVolume" data-dcnode-id="2874"><span data-dcnode-id="2875" instrument_node="">1253</span></span></span><span data-dcnode-id="2872" instrument_node="">: </span><span class="ref__seriesPages" data-dcnode-id="2870"><span data-dcnode-id="2871" instrument_node="">30081-30089</span></span></div></div><div class="reference-citations__links" data-dcnode-id="2863"><ul class="rlist inline-bullet-list" data-dcnode-id="2864"><li data-dcnode-id="2865"><a class="google-scholar" data-dcnode-id="2866" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//scholar.google.com/scholar_lookup%3Fhl%3Den%26volume%3D1253%26publication_year%3D2020%26pages%3D30081-30089%26journal%3DLancet%2BGastroenterol%2BHepatol%26author%3DFeld%2BJ.%26author%3DCypel%2BM.%26author%3DKumar%2BD.%26title%3DShort-course%252C%2Bdirect-acting%2Bantivirals%2Band%2Bezetimibe%2Bto%2Bprevent%2Bhcv%2Binfection%2Bin%2Brecipients%2Bof%2Borgans%2Bfrom%2Bhcv-infected%2Bdonors%253A%2Ba%2Bphase%2B3%252C%2Bsingle-centre%252C%2Bopen-label%2Bstudy"><span data-dcnode-id="2867" instrument_node="">Google Scholar</span></a></li></ul></div></div><a class="dropBlock__ctrl--close" data-dcnode-id="2860" href="#" title="Close info"><i aria-hidden="true" class="icon-close_thin" data-dcnode-id="2861"></i></a></div></div><span data-dcnode-id="2857" instrument_node="">], the University of Toronto has shown the ability to shorten antiviral therapy to 1&nbsp;week in lung transplants with the combination of Ezetimibe, a cholesterol level–lowering medication that also inhibits HCV hepatocellular infection/binding. Seventy percent of the patients did not even develop a viremia at any point postoperatively. If confirmed in a prospective, randomized clinical trial, this combination offers great hope and insight for the transplant community because viremic organs could be transplanted and the recipient cured of HCV for a fraction of the current costs and before they are even discharged home from the hospital.</span></div></section><section data-dcnode-id="2485" data-locator="sec16.2" id="sec16.2" tabindex="0"><h3 class="sectionTitle" data-dcnode-id="2850"><span class="top__sub" data-dcnode-id="2853"><span data-dcnode-id="2854" instrument_node="">&nbsp;</span></span><span class="top__text" data-dcnode-id="2851"><span data-dcnode-id="2852" instrument_node="">Ex&nbsp;vivo lung perfusion</span></span></h3><div class="section-paragraph" data-dcnode-id="2792"><span data-dcnode-id="2849" instrument_node="">Ex&nbsp;vivo lung perfusion (EVLP) is a proposed strategy to assess the quality of underused marginal lung and as a technique to preserve lungs during recoveries where the grafts are expected to endure long ischemic times, such as donors from long distances. In 2001, Steen and colleagues [</span><div class="dropBlock reference-citations" data-dcnode-id="2794"><a aria-controls="bib48" aria-expanded="false" class="reference-citations__ctrl" data-db-target-for="bib48-d42924852e1076" data-dcnode-id="2847" href="#bib48" id="back-bib48"><span data-dcnode-id="2848" instrument_node="">[48]</span></a><div class="dropBlock__holder" data-db-target-of="bib48-d42924852e1076" data-dcnode-id="2795"><div class="dropBlock__body" data-dcnode-id="2798"><ul class="rlist reference-citations__loa inline-bullet-list" data-dcnode-id="2838" title="list of authors"><li class="loa__item" data-dcnode-id="2845"><span data-dcnode-id="2846" instrument_node="">Steen S. </span></li><li class="loa__item" data-dcnode-id="2843"><span data-dcnode-id="2844" instrument_node="">Sjoberg T. </span></li><li class="loa__item" data-dcnode-id="2841"><span data-dcnode-id="2842" instrument_node="">Pierre L. </span></li><li data-dcnode-id="2839"><span data-dcnode-id="2840" instrument_node="">et al.</span></li></ul><div class="reference-citations__detials" data-dcnode-id="2824"><span data-dcnode-id="2837" instrument_node="">Transplantation of lungs from a non-heart-beating donor.</span><div class="popup-ref" data-dcnode-id="2825"><span class="ref__series" data-dcnode-id="2829"><i data-dcnode-id="2835"><span data-dcnode-id="2836" instrument_node="">Lancet.</span></i><span data-dcnode-id="2834" instrument_node=""> </span><span class="ref__seriesDate" data-dcnode-id="2832"><span data-dcnode-id="2833" instrument_node="">2001; </span></span><span class="ref__seriesVolume" data-dcnode-id="2830"><span data-dcnode-id="2831" instrument_node="">357</span></span></span><span data-dcnode-id="2828" instrument_node="">: </span><span class="ref__seriesPages" data-dcnode-id="2826"><span data-dcnode-id="2827" instrument_node="">825-829</span></span></div></div><div class="reference-citations__links" data-dcnode-id="2799"><ul class="rlist inline-bullet-list" data-dcnode-id="2800"><li data-dcnode-id="2821"><a data-dcnode-id="2822" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.advancessurgery.com/servlet/linkout%3Fsuffix%3De_1_5_1_2_48_2%26dbid%3D4%26doi%3D10.1016/j.yasu.2020.05.004%26key%3D10.1016%252FS0140-6736%252800%252904195-7%26cf%3Dabstract%26site%3Dlancet-site" onclick="newWindow(this.href);return false"><span data-dcnode-id="2823" instrument_node="">Abstract</span></a></li><span data-dcnode-id="2820" instrument_node="">
</span><li data-dcnode-id="2817"><a data-dcnode-id="2818" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.advancessurgery.com/servlet/linkout%3Fsuffix%3De_1_5_1_2_48_2%26dbid%3D4%26doi%3D10.1016/j.yasu.2020.05.004%26key%3D10.1016%252FS0140-6736%252800%252904195-7%26cf%3Dfulltext%26site%3Dlancet-site" onclick="newWindow(this.href);return false"><span data-dcnode-id="2819" instrument_node="">Full Text</span></a></li><span data-dcnode-id="2816" instrument_node="">

</span><li data-dcnode-id="2801"><a class="google-scholar" data-dcnode-id="2802" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//scholar.google.com/scholar_lookup%3Fhl%3Den%26volume%3D357%26publication_year%3D2001%26pages%3D825-829%26journal%3DLancet%26author%3DSteen%2BS.%26author%3DSjoberg%2BT.%26author%3DPierre%2BL.%26title%3DTransplantation%2Bof%2Blungs%2Bfrom%2Ba%2Bnon-heart-beating%2Bdonor"><span data-dcnode-id="2803" instrument_node="">Google Scholar</span></a></li></ul></div></div><a class="dropBlock__ctrl--close" data-dcnode-id="2796" href="#" title="Close info"><i aria-hidden="true" class="icon-close_thin" data-dcnode-id="2797"></i></a></div></div><span data-dcnode-id="2793" instrument_node="">] first investigated the use of EVLP in lungs coming from DCD patients before transplant. The importance of this study is that it showed that potential pulmonary grafts could be transplanted after warm ischemia followed by a period of perfusion and assessment on an ex&nbsp;vivo machine.</span></div><div class="section-paragraph" data-dcnode-id="2790"><span data-dcnode-id="2791" instrument_node="">EVLP allows pulmonary grafts to receive oxygen and nutrients extracorporeally. It allows the removal of toxins, such as blood clots, neutrophils, and inflammatory cytokines, and better ventilation/perfusion matching through recruitment of atelectatic areas. The ex&nbsp;vivo machine normally consists of a centrifugal pump, heater/cooler, tubing, hard shell reservoir, oxygenator, leukocyte filter, in-line gas analyzer, saturation probes, and pressure transducers. There are different techniques of performing EVLP, but the basic execution is the same:</span></div><div class="section-paragraph" data-dcnode-id="2788"><span data-dcnode-id="2789" instrument_node="">After the lungs are recovered from the donor, a perfusion cannula is inserted into the pulmonary artery and an endotracheal tube is inserted into the trachea above the bifurcation. They are placed into the ex&nbsp;vivo machine, where the pump pushes the perfusate through a leukocyte filter, oxygenator, and heater/cooler. The perfusate enters the lungs via the pulmonary artery cannula, circulates through the lungs, and is subsequently drained into a reservoir through either an open left atrial or closed left atrial cannula technique. The perfusate is subsequently recirculated through the system.</span></div><div class="section-paragraph" data-dcnode-id="2672"><span data-dcnode-id="2787" instrument_node="">During EVLP, lung performance can be assessed. Hemodynamics (such as pulmonary arterial pressure, left atrial pressure, flow, and pulmonary vascular resistance), ventilation (such as lung compliance and airway pressures), and oxygen capacity can be assessed. Three main EVLP protocols exist: Toronto protocol, Lund protocol, and organ care system protocol. The protocols vary based on the type of perfusate used, whether red blood cells are added to the perfusate, the target flow during EVLP, whether the left atrium is left open for drainage of pulmonary effluent or closed, and the gas mixtures and respiratory rates delivered during mechanical ventilation. The different protocols are listed </span><a class="scroll-into-link" data-dcnode-id="2785" href="#tbl2" id="back-tbl2"><span data-dcnode-id="2786" instrument_node="">Table&nbsp;2</span></a><span data-dcnode-id="2784" instrument_node="">.</span><div class="floatDisplay" data-dcnode-id="2673"><div class="inline-table" data-dcnode-id="2674" id="tbl2" tabindex="0"><div class="inline-table__head" data-dcnode-id="2779"><span class="inline-table__label" data-dcnode-id="2782"><span data-dcnode-id="2783" instrument_node="">Table&nbsp;2</span></span><span class="inline-table__title" data-dcnode-id="2780"><span data-dcnode-id="2781" instrument_node="">Acceptance and exclusion criteria after 4 to 6&nbsp;hours of ex&nbsp;vivo lung perfusion applied by the Toronto team</span></span></div><div class="sourceRef" data-dcnode-id="2774" style="margin: 0 0 10px;"><span class="figure__source" data-dcnode-id="2775"><em data-dcnode-id="2777"><span data-dcnode-id="2778" instrument_node="">Data from</span></em><span data-dcnode-id="2776" instrument_node=""> Steen, S., et&nbsp;al., Transplantation of lungs from a non-heart-beating donor. Lancet, 2001. 357(9259): p. 825-9.</span></span></div><table border="0" cellpadding="0" cellspacing="0" class="scrollable bordered" data-dcnode-id="2684" width="100%"><thead data-dcnode-id="2768"><tr data-dcnode-id="2769"><th class="rowsep" data-dcnode-id="2772"><span data-dcnode-id="2773" instrument_node="">Acceptance criteria</span></th><th class="rowsep" data-dcnode-id="2770"><span data-dcnode-id="2771" instrument_node="">Exclusion criteria</span></th></tr></thead><tbody data-dcnode-id="2685"><tr data-dcnode-id="2731"><td data-dcnode-id="2750"><ul class="ce-list--remove-bullets" data-dcnode-id="2751" id="ulist0025"><li class="ce-list--remove-bullets__list-item" data-dcnode-id="2752" id="u0140"><span class="label" data-dcnode-id="2766"><span data-dcnode-id="2767" instrument_node="">•</span></span><div class="ce-list--remove-bullets__list-item__text" data-dcnode-id="2753"><span data-dcnode-id="2765" instrument_node="">P</span><sub data-dcnode-id="2763"><span data-dcnode-id="2764" instrument_node="">LA</span></sub><span data-dcnode-id="2762" instrument_node=""> O</span><sub data-dcnode-id="2760"><span data-dcnode-id="2761" instrument_node="">2</span></sub><span data-dcnode-id="2759" instrument_node="">/Fi</span><span class="smallcaps" data-dcnode-id="2757"><span data-dcnode-id="2758" instrument_node="">o</span></span><sub data-dcnode-id="2755"><span data-dcnode-id="2756" instrument_node="">2</span></sub><span data-dcnode-id="2754" instrument_node=""> ≥ 400&nbsp;mm Hg</span></div></li></ul></td><td data-dcnode-id="2732"><ul class="ce-list--remove-bullets" data-dcnode-id="2733" id="ulist0030"><li class="ce-list--remove-bullets__list-item" data-dcnode-id="2734" id                             Open table in a new tab
                        </span></a></li></ul></div></div></div><section data-dcnode-id="2486" data-locator="sec16.2.1" id="sec16.2.1" tabindex="0"><h4 class="sectionTitle" data-dcnode-id="2667"><span class="top__sub" data-dcnode-id="2670"><span data-dcnode-id="2671" instrument_node="">&nbsp;</span></span><span class="top__text" data-dcnode-id="2668"><span data-dcnode-id="2669" instrument_node="">Clinical potential</span></span></h4><div class="section-paragraph" data-dcnode-id="2561"><span data-dcnode-id="2666" instrument_node="">EVLP was introduced by Steen and colleagues [</span><div class="dropBlock reference-citations" data-dcnode-id="2611"><a aria-controls="bib48" aria-expanded="false" class="reference-citations__ctrl" data-db-target-for="bib48-d42924852e1094" data-dcnode-id="2664" href="#bib48" id="back-bib48"><span data-dcnode-id="2665" instrument_node="">[48]</span></a><div class="dropBlock__holder" data-db-target-of="bib48-d42924852e1094" data-dcnode-id="2612"><div class="dropBlock__body" data-dcnode-id="2615"><ul class="rlist reference-citations__loa inline-bullet-list" data-dcnode-id="2655" title="list of authors"><li class="loa__item" data-dcnode-id="2662"><span data-dcnode-id="2663" instrument_node="">Steen S. </span></li><li class="loa__item" data-dcnode-id="2660"><span data-dcnode-id="2661" instrument_node="">Sjoberg T. </span></li><li class="loa__item" data-dcnode-id="2658"><span data-dcnode-id="2659" instrument_node="">Pierre L. </span></li><li data-dcnode-id="2656"><span data-dcnode-id="2657" instrument_node="">et al.</span></li></ul><div class="reference-citations__detials" data-dcnode-id="2641"><span data-dcnode-id="2654" instrument_node="">Transplantation of lungs from a non-heart-beating donor.</span><div class="popup-ref" data-dcnode-id="2642"><span class="ref__series" data-dcnode-id="2646"><i data-dcnode-id="2652"><span data-dcnode-id="2653" instrument_node="">Lancet.</span></i><span data-dcnode-id="2651" instrument_node=""> </span><span clas </span><li data-dcnode-id="2618"><a class="google-scholar" data-dcnode-id="2619" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//scholar.google.com/scholar_lookup%3Fhl%3Den%26volume%3D357%26publication_year%3D2001%26pages%3D825-829%26journal%3DLancet%26author%3DSteen%2BS.%26author%3DSjoberg%2BT.%26author%3DPierre%2BL.%26title%3DTransplantation%2Bof%2Blungs%2Bfrom%2Ba%2Bnon-heart-beating%2Bdonor"><span data-dcnode-id="2620" instrument_node="">Google Scholar</span></a></li></ul></div></div><a class="dropBlock__ctrl--close" data-dcnode-id="2613" href="#" title="Close info"><i aria-hidden="true" class="icon-close_thin" data-dcnode-id="2614"></i></a></div></div><span data-dcnode-id="2610" instrument_node="">] as a method for evaluating lungs from uncontrolled DCDs before transplant. The hope was to create more opportunities to expand the donor pool. Many prospective trials have been performed to evaluate the performance of DCD and marginal lungs. The INSPIRE trial is a prospective, multicenter, randomized controlled trial comparing normothermic preservation of standard donor lungs using the OCS Lung perfusion device to cold storage. Its primary end point was patient and graft survival at day 30 and the absence of PGD grade 3 within the first 72&nbsp;hours after transplant [</span><div class="dropBlock reference-citations" data-dcnode-id="2563"><a aria-controls="bib49" aria-expanded="false" class="reference-citations__ctrl" data-db-target-for="bib49-d42924852e1097" data-dcnode-id="2608" href="#bib49" id="back-bib49"><span data-dcnode-id="2609" instrument_node="">[49]</span></a><div class="dropBlock__holder" data-db-target-of="bib49-d42924852e1097" data-dcnode-id="2564"><div class="dropBlock__body" data-dcnode-id="2567"><ul class="rlist reference-citations__loa inline-bullet-list" data-dcnode-id="2599" title="list of authors"><li class="loa__item" data-dcnode-id="2606"><span data-dcnode-id="2607" instrument_node="">Van Raemdonck D. </span></li><li class="loa__item" data-dcnode-id="2604"><span data-dcnode-id="2605" instrument_node="">Neyrinck A. </span></li><li class="loa__item" data-dcnode-id="2602"><span data-dcnode-id="2603" instrument_node="">Cypel M. </span></li><li data-dcnode-id="2600"><span data-dcnode-id="2601" instrument_node="">et al.</span></li></ul><div class="reference-citations__detials" data-dcnode-id="2585"><span data-dcnode-id="2598" instrument_node="">Ex-vivo lung perfusion.</span><div class="popup-ref" data-dcnode-id="2586"><span class="ref__series" data-dcnode-id="2590"><i data-dcnode-id="2596"><span data-dcnode-id="2597" instrument_node="">Transpl Int.</span></i><span data-dcnode-id="2595" instrument_node=""> </span><span class="ref__seriesDate" data-dcnode-id="2593"><span data-dcnode-id="2594" instrument_node="">2015; </span></span><span class="ref__seriesVolume" data-dcnode-id="2591"><span data-dcnode-id="2592" instrument_node="">28</span></span></span><span data-dcnode-id="2589" instrument_node="">: </span><span class="ref__seriesPages" data-dcnode-id="2587"><span data-dcnode-id="2588" instrument_node="">643-656</span></span></div></div><div class="reference-citations__links" data-dcnode-id="2568"><ul class="rlist inline-bullet-list" data-dcnode-id="2569"><li data-dcnode-id="2582"><a data-dcnode-id="2583" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.advancessurgery.com/servlet/linkout%3Fsuffix%3De_1_5_1_2_49_2%26dbid%3D16%26doi%3D10.1016/j.yasu.2020.05.004%26key%3D10.1111%252Ftri.12317%26cf%3D" onclick="newWindow(this.href);return false"><span data-dcnode-id="2584" instrument_node="">Crossref</span></a></li><span data-dcnode-id="2581" instrument_node="">
