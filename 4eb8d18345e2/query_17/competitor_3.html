</span><li data-dcnode-id="2574"><a data-dcnode-id="2575" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.advancessurgery.com/servlet/linkout%3Fsuffix%3De_1_5_1_2_49_2%26dbid%3D137438953472%26doi%3D10.1016/j.yasu.2020.05.004%26key%3D2-s2.0-84929502063%26cf%3D" onclick="newWindow(this.href);return false"><span data-dcnode-id="2576" instrument_node="">Scopus (90)</span></a></li><span data-dcnode-id="2573" instrument_node="">
</span><li data-dcnode-id="2570"><a class="google-scholar" data-dcnode-id="2571" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//scholar.google.com/scholar_lookup%3Fhl%3Den%26volume%3D28%26publication_year%3D2015%26pages%3D643-656%26journal%3DTranspl%2BInt%26author%3DVan%2BRaemdonck%2BD.%26author%3DNeyrinck%2BA.%26author%3DCypel%2BM.%26title%3DEx-vivo%2Blung%2Bperfusion"><span data-dcnode-id="2572" instrument_node="">Google Scholar</span></a></li></ul></div></div><a class="dropBlock__ctrl--close" data-dcnode-id="2565" href="#" title="Close info"><i aria-hidden="true" class="icon-close_thin" data-dcnode-id="2566"></i></a></div></div><span data-dcnode-id="2562" instrument_node="">]. Although results showed a worse 30-day survival with the OCS device compared with cold storage, the study also showed a reduction in the incidence of grade 3 PGD at 72&nbsp;hours. The other prospective trials (HELP, NOVEL, DEVELOP, and EXPAND) showed noninferiority of EVLP compared with cold storage.</span></div><div class="section-paragraph" data-dcnode-id="2556"><span data-dcnode-id="2560" instrument_node="">EVLP also offers a way to assess marginal lungs for transplant suitability in a better environment as opposed to in situ at the time of the donor harvest. In addition to allowing the graft to be inspected bronchoscopically and radiographically, graft performance can also be assessed over several hours with the lungs on the perfusion circuit. The role for EVLP in assessing and reconditioning marginal lungs was investigated in the EXPAND trial. This study examined the safety and effectiveness of the OCS Lung perfusion device for recruiting, preserving, and assessing expanded-criteria donor lungs for transplant (</span><a class="scroll-into-link" data-dcnode-id="2558" href="#tbox3"><span data-dcnode-id="2559" instrument_node="">Box&nbsp;3</span></a><span data-dcnode-id="2557" instrument_node="">).</span></div><div class="floatDisplay" data-dcnode-id="2487"><div class="accordion--textbox" data-dcnode-id="2488"><div class="accordion" data-dcnode-id="2489" id="tbox3" tabindex="0"><a aria-controls="tbox3" aria-expanded="false" class="accordion__control" data-dcnode-id="2552" href="#" title="Expand"><span data-dcnode-id="2554"><span data-dcnode-id="2555" instrument_node="">Box&nbsp;3</span></span><i aria-hidden="true" class="icon-section_arrow_d" data-dcnode-id="2553"></i></a><div class="accordion__content" data-dcnode-id="2490" style="display: none;"><b data-dcnode-id="2550"><span data-dcnode-id="2551" instrument_node="">Extended lung donor criteria</span></b><div class="section-paragraph" data-dcnode-id="2491"><ul class="ce-list--remove-bullets" data-dcnode-id="2492" id="olist0025"><li class="ce-list--remove-bullets__list-item" data-dcnode-id="2493" id="u0350"><div class="ce-list--remove-bullets__list-item__text" data-dcnode-id="2494"><span data-dcnode-id="2549" instrument_node="">Acceptance criteria</span><ul class="ce-list--remove-bullets" data-dcnode-id="2495" id="ulist0090"><li class="ce-list--remove-bullets__list-item" data-dcnode-id="2544" id="u0355"><span class="label" data-dcnode-id="2547"><span data-dcnode-id="2548" instrument_node="">•</span></span><div class="ce-list--remove-bullets__list-item__text" data-dcnode-id="2545"><span data-dcnode-id="2546" instrument_node="">Age greater than 55&nbsp;years</span></div></li><li class="ce-list--remove-bullets__list-item" data-dcnode-id="2539" id="u0360"><span class="label" data-dcnode-id="2542"><span data-dcnode-id="2543" instrument_node="">•</span></span><div class="ce-list--remove-bullets__list-item__text" data-dcnode-id="2540"><span data-dcnode-id="2541" instrument_node="">Compatible, nonidentical blood</span></div></li><li class="ce-list--remove-bullets__list-item" data-dcnode-id="2534" id="u0365"><span class="label" data-dcnode-id="2537"><span data-dcnode-id="2538" instrument_node="">•</span></span><div class="ce-list--remove-bullets__list-item__text" data-dcnode-id="
