</span><meta content="<div class=&quot;Abstracts u-font-serif&quot; id=&quot;abstracts&quot;><div class=&quot;abstract author&quot; id=&quot;abs0005&quot;><h2 class=&quot;section-title u-h3 u-margin-l-top u-margin-xs-bottom&quot;>Abstract</h2><div id=&quot;abst0005&quot;><p id=&quot;spar0040&quot;>This article presents a partial bioarchaeology of care case study of a mummified adult female with chronic obstructive pulmonary disease (COPD) from late historic period United States. It examines likely clinical and functional impacts of disease and corresponding need for provision of care, stopping short of Stage 4 Interpretation/analysis. The case study illustrates and argues for the importance of an interdisciplinary research team for achieving a comprehensive understanding of disability and care. The article highlights the necessity of knowledge of pathophysiology for identifying the potential interventions (supports) dictated by the associated functional limitations. inter alia, this case is a powerful illustration of the way analysis of preserved soft tissue can provide insights into disease and likely care that are inaccessible using skeletal analysis alone. The article represents an interesting contribution to the theory and methodology of both the bioarchaeology of care approach <em>and</em> mummy studies.</p></div></div></div>" data-dcnode-id="3921" lang="en" name="citation_abstract"><span data-dcnode-id="3920" instrument_node="">

>https://doi.org/10.1016/j.ijpp.2018.06.006</span></a><a class="rights-and-content" data-dcnode-id="3478" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//s100.copyright.com/AppDispatchServlet%3FpublisherName%3DELS%26contentID%3DS1879981718300640%26orderBeanReset%3Dtrue" rel="noreferrer noopener" target="_blank"><span data-dcnode-id="3479" instrument_node="">Get rights and content</span></a></div><section class="ReferencedArticles" data-dcnode-id="3476"></section><section class="ReferencedArticles" data-dcnode-id="3475"></section><div class="PageDivider" data-dcnode-id="3474"></div><div class="Abstracts u-font-serif" data-dcnode-id="3456" id="abstracts"><div class="abstract author" data-dcnode-id="3457" id="abs0005"><h2 class="section-title u-h3 u-margin-l-top u-margin-xs-bottom" data-dcnode-id="3472"><span data-dcnode-id="3473" instrument_node="">Abstract</span></h2><div data-dcnode-id="3458" id="abst0005"><p data-dcnode-id="3459" id="spar0040"><span data-dcnode-id="3463"><span data-dcnode-id="3471" instrument_node="">This article presents a partial bioarchaeology of care case study of a mummified adult female with </span><a class="topic-link" data-dcnode-id="3469" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.sciencedirect.com/topics/medicine-and-dentistry/chronic-obstructive-pulmonary-disease" title="Learn more about chronic obstructive pulmonary disease from ScienceDirect's AI-generated Topic Pages"><span data-dcnode-id="3470" instrument_node="">chronic obstructive pulmonary disease</span></a><span data-dcnode-id="3464"><span data-dcnode-id="3468" instrument_node=""> (COPD) from late historic period United States. It examines likely clinical and functional impacts of disease and corresponding need for provision of care, stopping short of Stage 4 Interpretation/analysis. The case study illustrates and argues for the importance of an interdisciplinary research team for achieving a comprehensive understanding of disability and care. The article highlights the necessity of knowledge of </span><a class="topic-link" data-dcnode-id="3466" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.sciencedirect.com/topics/medicine-and-dentistry/pathophysiology" title="Learn more about pathophysiology from ScienceDirect's AI-generated Topic Pages"><span data-dcnode-id="3467" instrument_node="">pathophysiology</span></a><span data-dcnode-id="3465" instrument_node=""> for identifying the potential interventions (supports) dictated by the associated functional limitations. inter alia, this case is a powerful illustration of the way analysis of preserved soft tissue can provide insights into disease and likely care that are inaccessible using skeletal analysis alone. The article represents an interesting contribution to the theory and methodology of both the bioarchaeology of care approach </span></span></span><em data-dcnode-id="3461"><span data-dcnode-id="3462" instrument_node="">and</span></em><span data-dcnode-id="3460" instrument_node=""> mummy studies.</span></p></div></div></div><ul class="issue-navigation u-margin-s-bottom u-bg-grey1" data-dcnode-id="3433" id="issue-navigation"><li class="previous move-left u-padding-s-ver u-padding-s-left" data-dcnode-id="3445"><a class="button-alternative button-alternative-tertiary" data-dcnode-id="3446" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.sciencedirect.com/science/article/pii/S1879981718300883"><svg class="icon icon-navigate-left" data-dcnode-id="3454" focusable="false" height="32" viewBox="0 0 54 128" width="32"><path d="m1 61l45-45 7 7-38 38 38 38-7 7z" data-dcnode-id="3455"></path></svg><span class="button-alternative-text" data-dcnode-id="3447"><strong data-dcnode-id="3452"><span data-dcnode-id="3453" instrument_node="">Previous </span></strong><span class="extra-detail-1" data-dcnode-id="3450"><span data-dcnode-id="3451" instrument_node="">article</span></span><span class="extra-detail-2" data-dcnode-id="3448"><span data-dcnode-id="3449" instrument_node=""> in issue</span></span></span></a></li><li class="next move-right u-padding-s-ver u-padding-s-right" data-dcnode-id="3434"><a class="button-alternative button-alternative-tertiary" data-dcnode-id="3435" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.sciencedirect.com/science/article/pii/S1879981718301207"><span class="button-alternative-text" data-dcnode-id="3438"><strong data-dcnode-id="3443"><span data-dcnode-id="3444" instrument_node="">Next </span></strong><span class="extra-detail-1" data-dcnode-id="3441"><span data-dcnode-id="3442" instrument_node="">article</span></span><span class="extra-detail-2" data-dcnode-id="3439"><span data-dcnode-id="3440" instrument_node=""> in issue</span></span></span><svg class="icon icon-navigate-right" data-dcnode-id="3436" focusable="false" height="32" viewBox="0 0 54 128" width="32"><path d="m1 99l38-38-38-38 7-7 45 45-45 45z" data-dcnode-id="3437"></path></svg></a></li></ul><div class="Keywords u-font-serif" data-dcnode-id="3411"><div class="keywords-section" data-dcnode-id="3412" id="kwd0005"><h2 class="section-title u-h3 u-margin-l-top u-margin-xs-bottom" data-dcnode-id="3431"><span data-dcnode-id="3432" instrument_node="">Keywords</span></h2><div class="keyword" data-dcnode-id="3428" id="kw0005"><span data-dcnode-id="3429"><span data-dcnode-id="3430" instrument_node="">Bioarchaeology of care</span></span></div><div class="keyword" data-dcnode-id="3425" id="kw0010"><span data-dcnode-id="3426"><span data-dcnode-id="3427" instrument_node="">Mummies</span></span></div><div class="keyword" data-dcnode-id="3422" id="kw0015"><span data-dcnode-id="3423"><span data-dcnode-id="3424" instrument_node="">Pathophysiology</span></span></div><div class="keyword" data-dcnode-id="3419" id="kw0020"><span data-dcnode-id="3420"><span data-dcnode-id="3421" instrument_node="">Emphysema</span></span></div><div class="keyword" data-dcnode-id="3416" id="kw0025"><span data-dcnode-id="3417"><span data-dcnode-id="3418" instrument_node="">Chronic obstructive pulmonary disease</span></span></div><div class="keyword" data-dcnode-id="3413" id="kw0030"><span data-dcnode-id="3414"><span data-dcnode-id="3415" instrument_node="">Paleopathology</span></span></div></div></div><span data-dcnode-id="3410" instrument_node=""></span><div class="Body u-font-serif" data-dcnode-id="2435" id="body"><div data-dcnode-id="2447"><section data-dcnode-id="3346" id="sec0005"><h2 class="u-h3 u-margin-l-top u-margin-xs-bottom" data-dcnode-id="3406" id="sect0015"><span data-dcnode-id="3409" instrument_node="">1</span><span data-dcnode-id="3408" instrument_node="">. </span><span data-dcnode-id="3407" instrument_node="">Introduction</span></h2><p data-dcnode-id="3401" id="par0005"><span data-dcnode-id="3405" instrument_node="">The bioarchaeology of care (BOC) is a relatively new approach (</span><a class="workspace-trigger" data-dcnode-id="3403" href="#bib0165" name="bbib0165"><span data-dcnode-id="3404" instrument_node="">Tilley, 2015</span></a><span data-dcnode-id="3402" instrument_node="">) which attempts to reconstruct the lives of past people and cultures. It seeks to determine whether, in view of the likely impact of a particular pathology within the particular manner of living, or lifeways context, care was required for survival. It does not suggest that care of human beings among past peoples is something novel; rather, it provides a framework for assessing the plausibility of care provision in any given instance.</span></p><p data-dcnode-id="3396" id="par0010"><span data-dcnode-id="3400" instrument_node="">Assessment of the clinical presentation and functional impacts of a particular pathology is at the heart of a bioarchaeology of care case study, which is grounded in the understanding of </span><a class="topic-link" data-dcnode-id="3398" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.sciencedirect.com/topics/medicine-and-dentistry/pathophysiology" title="Learn more about pathophysiology from ScienceDirect's AI-generated Topic Pages"><span data-dcnode-id="3399" instrument_node="">pathophysiology</span></a><span data-dcnode-id="3397" instrument_node=""> as it relates to the paleopathological determination. Clearly, an in-depth understanding of the subject’s lifeways context, be it historic or prehistoric in nature, is key in attempting to determine what care may have been needed and what may have been given. Knowledge of the subject’s environmental surroundings allows the researcher to better understand what may have been needed in terms of addressing functional impacts of a given pathology; for example, a hilly or mountainous region would present different challenges to an individual with a pathology affecting mobility than to a subject with the same condition living in a more agrarian or flatland environment. Similarly, knowledge of the economic practices in the subject’s community – such as farming versus fishing – might inform the researcher of possible challenges faced by this same individual in work participation. Ideas regarding what may have been done to render care to that individual may also be drawn from the archaeological record by positioning proposals for likely care within the lifeways context of what was probable or possible.</span></p><p data-dcnode-id="3361" id="par0015"><span data-dcnode-id="3395" instrument_node="">While the first applications of the BOC methodology focused on physical anthropological aspects of skeletal analysis (</span><a class="workspace-trigger" data-dcnode-id="3393" href="#bib0170" name="bbib0170"><span data-dcnode-id="3394" instrument_node="">Tilley and Oxenham, 2011</span></a><span data-dcnode-id="3388"><span data-dcnode-id="3392" instrument_node="">), mummified human remains may provide even greater potential for BOC analysis and interpretation. Depending on the quality of the </span><a class="topic-link" data-dcnode-id="3390" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.sciencedirect.com/topics/social-sciences/mummification" title="Learn more about mummification from ScienceDirect's AI-generated Topic Pages"><span data-dcnode-id="3391" instrument_node="">mummification</span></a><span data-dcnode-id="3389" instrument_node=""> method and the resultant preservation, soft tissue remains often hold evidence of paleopathological conditions and other characteristics not apparent in the skeletal elements. In mummified remains, any soft tissue has the potential to increase the yield of paleopathological efforts. </span></span><a class="workspace-trigger" data-dcnode-id="3386" href="#bib0160" name="bbib0160"><span data-dcnode-id="3387" instrument_node="">Thompson et al. (2013)</span></a><span data-dcnode-id="3381"><span data-dcnode-id="3385" instrument_node=""> presented a critical series of studies demonstrating the potential for paleopathological diagnosis in their examination of mummified remains with vascular remnants still intact. These structures, not readily found in skeletonized subjects, allowed the researchers to make specific determinations regarding the presence of </span><a class="topic-link" data-dcnode-id="3383" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.sciencedirect.com/topics/medicine-and-dentistry/atherosclerosis" title="Learn more about atherosclerosis from ScienceDirect's AI-generated Topic Pages"><span data-dcnode-id="3384" instrument_node="">atherosclerosis</span></a><span data-dcnode-id="3382" instrument_node="">. Another example of the value of mummified soft tissue contributing to the paleopathological diagnostic yield is found in </span></span><a class="workspace-trigger" data-dcnode-id="3379" href="#bib0175" name="bbib0175"><span data-dcnode-id="3380" instrument_node="">Ventura et al. (2006)</span></a><span data-dcnode-id="3362"><span data-dcnode-id="3366"><span data-dcnode-id="3370"><span data-dcnode-id="3374"><span data-dcnode-id="3378" instrument_node="">, where the researchers’ examination of well mummified individuals from the 18th and early 19th centuries yielded a variety of diagnoses from preserved soft tissues, including goiter, </span><a class="topic-link" data-dcnode-id="3376" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.sciencedirect.com/topics/medicine-and-dentistry/prostate-hypertrophy" title="Learn more about prostatic hyperplasia from ScienceDirect's AI-generated Topic Pages"><span data-dcnode-id="3377" instrument_node="">prostatic hyperplasia</span></a><span data-dcnode-id="3375" instrument_node="">, </span></span><a class="topic-link" data-dcnode-id="3372" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.sciencedirect.com/topics/medicine-and-dentistry/arteriosclerosis" title="Learn more about arteriosclerosis from ScienceDirect's AI-generated Topic Pages"><span data-dcnode-id="3373" instrument_node="">arteriosclerosis</span></a><span data-dcnode-id="3371" instrument_node="">, pneumonia, pulmonary </span></span><a class="topic-link" data-dcnode-id="3368" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.sciencedirect.com/topics/medicine-and-dentistry/anthracosis" title="Learn more about silicoanthracosis from ScienceDirect's AI-generated Topic Pages"><span data-dcnode-id="3369" instrument_node="">silicoanthracosis</span></a><span data-dcnode-id="3367" instrument_node="">, neoplasms, </span></span><a class="topic-link" data-dcnode-id="3364" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.sciencedirect.com/topics/medicine-and-dentistry/kidney-stone" title="Learn more about renal stones from ScienceDirect's AI-generated Topic Pages"><span data-dcnode-id="3365" instrument_node="">renal stones</span></a><span data-dcnode-id="3363" instrument_node=""> and tumors. While the skeletal presentation among these mummies showed additional pathological lesions, including arthritic changes and old fractures, the soft tissue analyses clearly enhanced the diagnostic yield. Such data from soft tissue analysis in mummified remains, when available, allows BOC researchers to gain deeper insights into the case specific need for care.</span></span></p><p data-dcnode-id="3359" id="par0020"><span data-dcnode-id="3360" instrument_node="">In this paper we discuss the critical importance of understanding pathophysiology as it relates to the functional and clinical impacts considered in the BOC model. While the determination of a diagnosis is key to identification of likely disability and care, it is the detail of the pathophysiology, revealing how disease progressed and how it impacted the individual while alive, that fundamentally informs the BOC approach.</span></p><p data-dcnode-id="3347" id="par0025"><span data-dcnode-id="3354"><span data-dcnode-id="3358" instrument_node="">We begin with brief descriptions of diagnosis and soft tissue </span><a class="topic-link" data-dcnode-id="3356" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.sciencedirect.com/topics/medicine-and-dentistry/paleopathology" title="Learn more about paleopathology from ScienceDirect's AI-generated Topic Pages"><span data-dcnode-id="3357" instrument_node="">paleopathology</span></a><span data-dcnode-id="3355" instrument_node="">, pathophysiology and determination of functional limitations, and potential patterns of care. We then present a case study involving mummified remains and carry the case through the first two stages of the bioarchaeology of care analysis process as defined by </span></span><a class="workspace-trigger" data-dcnode-id="3352" href="#bib0165" name="bbib0165"><span data-dcnode-id="3353" instrument_node="">Tilley (2015)</span></a><span data-dcnode-id="3351" instrument_node=""> using diagnosis by consensus (</span><a class="workspace-trigger" data-dcnode-id="3349" href="#bib0015" name="bbib0015"><span data-dcnode-id="3350" instrument_node="">Beckett, 2017</span></a><span data-dcnode-id="3348" instrument_node="">) to identify the paleopathology, to describe the pathophysiological characteristics of the disease process, and ultimately to work up the clinical presentation and description of likely functional impact. We then extrapolate from what we know about modern care given in response to this particular pathology as the basis for considering the care practices that may have been available in the time and place in which the subject lived. We argue that BOC analysis is enhanced when we employ the expertise of those who today treat or rehabilitate those very conditions experienced in the past.</span></p></section><section data-dcnode-id="3220" id="sec0010"><h2 class="u-h3 u-margin-l-top u-margin-xs-bottom" data-dcnode-id="3342" id="sect0020"><span data-dcnode-id="3345" instrument_node="">2</span><span data-dcnode-id="3344" instrument_node="">. </span><span data-dcnode-id="3343" instrument_node="">Soft tissue paleopathology and implications for bioarchaeology of care analysis</span></h2><p data-dcnode-id="3329" id="par0030"><span data-dcnode-id="3341" instrument_node="">A key challenge for paleopathologists, compared to their modern counterparts, is that a patient history of the disease signs and symptoms is rarely available for their subjects, nor is there the ability to perform typical clinical tests (such as blood analysis, pulmonary functions, or cardiac catheterization) to support diagnoses. Another challenge for the paleopathologist is that nowadays, in developed countries at least, it is rare for disease to progress to the degree often encountered in the remains of ancient populations, meaning that advanced signs of disease may be foreign to the modern </span><a class="topic-link" data-dcnode-id="3339" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.sciencedirect.com/topics/medicine-and-dentistry/pathologist" title="Learn more about pathologist from ScienceDirect's AI-generated Topic Pages"><span data-dcnode-id="3340" instrument_node="">pathologist</span></a><span data-dcnode-id="3330"><span data-dcnode-id="3338" instrument_node="">. The soft tissue present in a mummified subject amplifies the challenge of pathologic determination. Preserved soft tissue remains offer greater opportunity for in depth analysis and greater diagnostic yield, but while diagnostic opportunities are enhanced, challenges to diagnosis are also increased. In the absence of autopsy, specialized </span><a class="topic-link" data-dcnode-id="3336" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.sciencedirect.com/topics/medicine-and-dentistry/imaging-technique" title="Learn more about imaging techniques from ScienceDirect's AI-generated Topic Pages"><span data-dcnode-id="3337" instrument_node="">imaging techniques</span></a><span data-dcnode-id="3331"><span data-dcnode-id="3335" instrument_node=""> are needed to visualize </span><a class="topic-link" data-dcnode-id="3333" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.sciencedirect.com/topics/medicine-and-dentistry/anatomical-concepts" title="Learn more about anatomical structures from ScienceDirect's AI-generated Topic Pages"><span data-dcnode-id="3334" instrument_node="">anatomical structures</span></a><span data-dcnode-id="3332" instrument_node=""> as well as lesions. The presence of soft tissue often requires input from varied specialists in the pathology community, not only those who specialize in the most likely condition, but also specialists in those conditions considered within a differential diagnosis. For example, a lesion within pulmonary tissue may suggest fungal origins or infectious processes, meaning that this lesion requires scrutiny from a broad base of specialists.</span></span></span></p><p data-dcnode-id="3304" id="par0035"><span data-dcnode-id="3320"><span data-dcnode-id="3328" instrument_node="">Paleopathology is necessarily an interdisciplinary science with many potential contributors beyond the bioarchaeological and medical experts who have made this area their own. Bioarchaeologists must look beyond the remains under study; collaborators from fields such as social archaeology, field archaeology, </span><a class="topic-link" data-dcnode-id="3326" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.sciencedirect.com/topics/social-sciences/medical-anthropology" title="Learn more about medical anthropology from ScienceDirect's AI-generated Topic Pages"><span data-dcnode-id="3327" instrument_node="">medical anthropology</span></a><span data-dcnode-id="3321"><span data-dcnode-id="3325" instrument_node=""> and paleoparasitology, to name only a few, will enable both a more accurate disease diagnosis and a better understanding of disease effects. Skills in application of a wide range of diagnostic methods - for example, </span><a class="topic-link" data-dcnode-id="3323" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.sciencedirect.com/topics/medicine-and-dentistry/isotope-analysis" title="Learn more about isotope analysis from ScienceDirect's AI-generated Topic Pages"><span data-dcnode-id="3324" instrument_node="">isotope analysis</span></a><span data-dcnode-id="3322" instrument_node=""> or paleoimaging - may be required to assist in identifying (or confirming) a particular pathology. The diagnosis by consensus concept as applied to paleopathological determinations described here is well supported in the literature. </span></span></span><a class="workspace-trigger" data-dcnode-id="3318" href="#bib0045" name="bbib0045"><span data-dcnode-id="3319" instrument_node="">Chhem and Brothwell (2008)</span></a><span data-dcnode-id="3317" instrument_node="">; </span><a class="workspace-trigger" data-dcnode-id="3315" href="#bib0110" name="bbib0110"><span data-dcnode-id="3316" instrument_node="">Lynnerup (2010)</span></a><span data-dcnode-id="3314" instrument_node="">; </span><a class="workspace-trigger" data-dcnode-id="3312" href="#bib0020" name="bbib0020"><span data-dcnode-id="3313" instrument_node="">Beckett and Conlogue (2010)</span></a><span data-dcnode-id="3311" instrument_node="">; </span><a class="workspace-trigger" data-dcnode-id="3309" href="#bib0180" name="bbib0180"><span data-dcnode-id="3310" instrument_node="">Wade et al. (2015)</span></a><span data-dcnode-id="3308" instrument_node="">, and </span><a class="workspace-trigger" data-dcnode-id="3306" href="#bib0015" name="bbib0015"><span data-dcnode-id="3307" instrument_node="">Beckett (2017)</span></a><span data-dcnode-id="3305" instrument_node="">, all endorse the concept that an interdisciplinary team be employed when determining paleopathological diagnoses.</span></p><p data-dcnode-id="3299" id="par0040"><span data-dcnode-id="3303" instrument_node="">Once a diagnosis and, where relevant, alternative potential diagnoses, have been determined, the BOC model moves forward to the consideration of the clinical characteristics and functional limitations associated with the disease(s). The more accurate the diagnosis is, the better able researchers are to perform this step. In order to conduct these analyses it is imperative that researchers possess an in-depth understanding of the underlying mechanisms associated with the disease(s) under consideration - the </span><a class="topic-link" data-dcnode-id="3301" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.sciencedirect.com/topics/medicine-and-dentistry/pathophysiology" title="Learn more about pathophysiology from ScienceDirect's AI-generated Topic Pages"><span data-dcnode-id="3302" instrument_node="">pathophysiology</span></a><span data-dcnode-id="3300" instrument_node=""> that dictates the clinical symptoms and limitations to physiologic capability and thus the impact on functionality experienced by the subject in the context of their life.</span></p><section data-dcnode-id="3281" id="sec0015"><h3 class="u-h4 u-margin-m-top u-margin-xs-bottom" data-dcnode-id="3295" id="sect0025"><span data-dcnode-id="3298" instrument_node="">2.1</span><span data-dcnode-id="3297" instrument_node="">. </span><span data-dcnode-id="3296" instrument_node="">Pathophysiology and determination of functional limitations</span></h3><p data-dcnode-id="3286" id="par0045"><span data-dcnode-id="3294" instrument_node="">Pathophysiology is defined as the study of the functional changes to organs and body systems associated with, or resulting from, disease or injury (</span><a class="workspace-trigger" data-dcnode-id="3292" href="#bib0115" name="bbib0115"><span data-dcnode-id="3293" instrument_node="">McCance et al., 2010</span></a><span data-dcnode-id="3287"><span data-dcnode-id="3291" instrument_node="">). Pathophysiology can be further understood as the deranged function in an individual or an organ due to a disease. To be clear, pathophysiology is an understanding of clinical characteristics and functional challenges that are the result of cellular processes. Disease begins as a cellular disruption of normal function that often leads to decreased ability of tissue groups to conduct their work. In turn, organ function and ultimately body systems function is challenged and, depending on the condition, impaired. As organs and body systems falter, the organism becomes less viable. The very cellular ultra-structure of organ systems, too, must be understood as the status of cells, both in structure and processes, are altered by various diseases. One must also consider the role of intrinsic defense mechanisms, examples of which include </span><a class="topic-link" data-dcnode-id="3289" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.sciencedirect.com/topics/medicine-and-dentistry/thermoregulation" title="Learn more about temperature regulation from ScienceDirect's AI-generated Topic Pages"><span data-dcnode-id="3290" instrument_node="">temperature regulation</span></a><span data-dcnode-id="3288" instrument_node="">, cardiac output, blood pressure, circulation and distribution of body fluids, acid-base balance, specific system function, and immune system response. Such defense mechanisms, along with the cellular responses to disease, collectively dictate the clinical characteristics and limitations to physiological function experienced by the organism.</span></span></p><p data-dcnode-id="3284" id="par0050"><span data-dcnode-id="3285" instrument_node="">When soft tissue is present, researchers can gain new insights into the progress of a given disease. Just as paleopathological determinations are enhanced by having soft tissue available for analysis, the pathophysiology is easier to discern. Analysis of mummified soft tissues may reveal the course of a given disease as well as the actual cause of death, thereby exposing the progressive pathophysiologic impact on physiological function during life. When only skeletal tissues remain, evidence of a specific affliction such as a pneumonic process, would likely not be seen. This enhanced potential for pathological diagnosis and subsequent pathophysiological determination is unique to the presence of soft tissue in mummified remains.</span></p><p data-dcnode-id="3282" id="par0055"><span data-dcnode-id="3283" instrument_node="">A full understanding of pathophysiology then is critical to our thorough assessment and description of the clinical characteristics and functional limitations in this step of the BOC model. It gives us the ‘why’ and sometimes the ‘when’ of altered physiologic function, rather than merely presenting the limitations alone. It strengthens researchers’ ability to estimate what clinical signs and symptoms may have challenged the individual while alive. Pathophysiologic assessment allows the researcher to focus on cellular capability, tissue and organ function, and body system potentials</span></p></section><section data-dcnode-id="3241" id="sec0020"><h3 class="u-h4 u-margin-m-top u-margin-xs-bottom" data-dcnode-id="3277" id="sect0030"><span data-dcnode-id="3280" instrument_node="">2.2</span><span data-dcnode-id="3279" instrument_node="">. </span><span data-dcnode-id="3278" instrument_node="">Functional/clinical impacts and limitations</span></h3><p data-dcnode-id="3262" id="par0060"><span data-dcnode-id="3272"><span data-dcnode-id="3276" instrument_node="">The </span><a class="topic-link" data-dcnode-id="3274" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.sciencedirect.com/topics/medicine-and-dentistry/stage-2" title="Learn more about second stage from ScienceDirect's AI-generated Topic Pages"><span data-dcnode-id="3275" instrument_node="">second stage</span></a><span data-dcnode-id="3273" instrument_node=""> of the BOC model is an assessment and consideration of the probable clinical impact and functional limitations associated with a disease and whether care would have been required (</span></span><a class="workspace-trigger" data-dcnode-id="3270" href="#bib0165" name="bbib0165"><span data-dcnode-id="3271" instrument_node="">Tilley, 2015</span></a><span data-dcnode-id="3269" instrument_node="">). While it is true that individuals experience disease and disability in unique ways (</span><a class="workspace-trigger" data-dcnode-id="3267" href="#bib0130" name="bbib0130"><span data-dcnode-id="3268" instrument_node="">Roberts, 2000</span></a><span data-dcnode-id="3266" instrument_node="">), as argued above, the application of pathophysiologic knowledge provides the foundation for considering the impact of disease on the individual’s ability to undertake normal activities in their daily life. Limitations on physical function, in the sense of what the individual </span><em data-dcnode-id="3264"><span data-dcnode-id="3265" instrument_node="">physically</span></em><span data-dcnode-id="3263" instrument_node=""> can or cannot do, are informed by what the organ or organ system can or cannot do. Understanding the pathophysiology of the disease and its process may allow inference of symptomology that is not observable in ancient remains, adding valuable information to the bioarchaeology of care analysis.</span></p><p data-dcnode-id="3242" id="par0065"><span data-dcnode-id="3261" instrument_node="">As with paleopathological determinations which are enhanced by using diagnosis by consensus concepts, researchers’ understanding of how certain clinical characteristics may lead to certain types of functional impairment also benefits from an interdisciplinary approach. While the diagnosis determination is generally made with bioarchaeologists in concert with medical physicians, consideration of the effects of a given disorder on an individual’s ability to function in their world can be enhanced by including interpretations by those who treat similar cases in modern health care and whose familiarity with modern assistive devices and interventional methods may suggest possible approaches adopted in the past. In a recently published BOC case involving a severely kyphoscoliotic individual from 18</span><sup data-dcnode-id="3259"><span data-dcnode-id="3260" instrument_node="">th</span></sup><span data-dcnode-id="3258" instrument_node=""> century London, England (</span><a class="workspace-trigger" data-dcnode-id="3256" href="#bib0060" name="bbib0060"><span data-dcnode-id="3257" instrument_node="">Conlogue et al., 2016</span></a><span data-dcnode-id="3243"><span data-dcnode-id="3247"><span data-dcnode-id="3251"><span data-dcnode-id="3255" instrument_node="">) the authors brought together a large interdisciplinary team to consider the functionality of the individual. The team included two paleoimagers, two radiologists, two bioarchaeologists, an </span><a class="topic-link" data-dcnode-id="3253" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.sciencedirect.com/topics/medicine-and-dentistry/orthopedist" title="Learn more about orthopaedist from ScienceDirect's AI-generated Topic Pages"><span data-dcnode-id="3254" instrument_node="">orthopaedist</span></a><span data-dcnode-id="3252" instrument_node="">, a respiratory therapist, a pathophysiologist, and an occupational therapist. Once the condition was determined by consensus, the functional impact was evaluated by an in-depth analysis of the pathophysiology associated with the </span></span><a class="topic-link" data-dcnode-id="3249" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.sciencedirect.com/topics/medicine-and-dentistry/kyphosis" title="Learn more about kyphosis from ScienceDirect's AI-generated Topic Pages"><span data-dcnode-id="3250" instrument_node="">kyphosis</span></a><span data-dcnode-id="3248" instrument_node=""> and its impact on other organ systems including the respiratory and </span></span><a class="topic-link" data-dcnode-id="3245" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.sciencedirect.com/topics/medicine-and-dentistry/cardiac-system" title="Learn more about cardiac systems from ScienceDirect's AI-generated Topic Pages"><span data-dcnode-id="3246" instrument_node="">cardiac systems</span></a><span data-dcnode-id="3244" instrument_node="">. This served to outline what absolute limitations existed. The entire team considered the basic and instrumental activities of daily living. Specialists added specific detail to the case and, as an example, were able to ascertain that the individual could reach their left foot but not their right and thus would require assistance with activities involving the care of that anatomical region.</span></span></p></section><section data-dcnode-id="3221" id="sec0025"><h3 class="u-h4 u-margin-m-top u-margin-xs-bottom" data-dcnode-id="3237" id="sect0035"><span data-dcnode-id="3240" instrument_node="">2.3</span><span data-dcnode-id="3239" instrument_node="">. </span><span data-dcnode-id="3238" instrument_node="">Potential patterns of care</span></h3><p data-dcnode-id="3232" id="par0070"><span data-dcnode-id="3236" instrument_node="">The determination of possible patterns of care is enhanced if researchers consider care required in modern cases with the same or similar conditions. In developed countries, early intervention means that the advanced stages of disease are rarely seen, but often examples from developing countries, where treatment has not been possible, provide bioarchaeologists with living presentations. When possible, the team should include practitioners who have seen these advanced stages of </span><a class="topic-link" data-dcnode-id="3234" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.sciencedirect.com/topics/medicine-and-dentistry/disease-exacerbation" title="Learn more about disease progression from ScienceDirect's AI-generated Topic Pages"><span data-dcnode-id="3235" instrument_node="">disease progression</span></a><span data-dcnode-id="3233" instrument_node="">.</span></p><p data-dcnode-id="3227" id="par0075"><span data-dcnode-id="3231" instrument_node="">After considering modern treatments for supporting an individual with a given disease, the team must consult cultural and historical experts who can inform the researchers about the care possibilities in the past, based on what is known about the specific culture. Archaeological evidence and historical knowledge allows the team to understand what was available and what was likely used to support an afflicted individual within their community. Researchers must be careful not to assume a pattern of care based on what may be done today or what has been seen in other cultures (</span><a class="workspace-trigger" data-dcnode-id="3229" href="#bib0135" name="bbib0135"><span data-dcnode-id="3230" instrument_node="">Roberts, 2017</span></a><span data-dcnode-id="3228" instrument_node="">).</span></p><p data-dcnode-id="3222" id="par0080"><span data-dcnode-id="3226" instrument_node="">To summarize, in some cases in antiquity the individual clearly survived long past the acute stage of a disease, reaching an age-at-death that suggests care and assistance was rendered (</span><a class="workspace-trigger" data-dcnode-id="3224" href="#bib0165" name="bbib0165"><span data-dcnode-id="3225" instrument_node="">Tilley, 2015</span></a><span data-dcnode-id="3223" instrument_node="">). Actual care practices in the past can be inferred from what would have been required to support the individual, based both on our understanding of pathophysiological impact and on our knowledge of the resources and/or interventions may have been available (according to the archaeological and/or historical record).</span></p></section></section><section data-dcnode-id="2610" id="sec0030"><h2 class="u-h3 u-margin-l-top u-margin-xs-bottom" data-dcnode-id="3216" id="sect0040"><span data-dcnode-id="3219" instrument_node="">3</span><span data-dcnode-id="3218" instrument_node="">. </span><span data-dcnode-id="3217" instrument_node="">Case presentation</span></h2><p data-dcnode-id="3211" id="par0085"><span data-dcnode-id="3215" instrument_node="">In order to illustrate the critical importance of understanding the underlying </span><a class="topic-link" data-dcnode-id="3213" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.sciencedirect.com/topics/medicine-and-dentistry/pathophysiology" title="Learn more about pathophysiology from ScienceDirect's AI-generated Topic Pages"><span data-dcnode-id="3214" instrument_node="">pathophysiology</span></a><span data-dcnode-id="3212" instrument_node=""> and the resulting functional implications, we present a brief case study and delve into the structural changes associated with a given disease. It is important to note that this study is focused on mummified remains with preserved internal organs. It is these preserved soft tissues that allow us greater insight into the life and lifeways of the individual under investigation.</span></p><section data-dcnode-id="3112" id="sec0035"><h3 class="u-h4 u-margin-m-top u-margin-xs-bottom" data-dcnode-id="3207" id="sect0045"><span data-dcnode-id="3210" instrument_node="">3.1</span><span data-dcnode-id="3209" instrument_node="">. </span><span data-dcnode-id="3208" instrument_node="">Context/background</span></h3><p data-dcnode-id="3194" id="par0090"><span data-dcnode-id="3202"><span data-dcnode-id="3206" instrument_node="">We present a case of an artificially produced mummy from the late 19th century in Philippi, Barbour County, West Virginia. In1888 Graham Hamrick developed a new method for </span><a class="topic-link" data-dcnode-id="3204" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.sciencedirect.com/topics/medicine-and-dentistry/embalming" title="Learn more about embalming from ScienceDirect's AI-generated Topic Pages"><span data-dcnode-id="3205" instrument_node="">embalming</span></a><span data-dcnode-id="3203" instrument_node=""> and experimented first by applying his method to the preservation of various samples of foods and mice. Hamrick then applied to the local courts for permission to perform his procedure on human corpses, and by court order the first two unclaimed bodies from the Trans-Allegheny Lunatic Asylum, now known as the Weston State Hospital, were given to him for this purpose. The bodies were treated with an arterial flush of a saltpeter solution, and were then exposed to sulfur fumes within a wooden box. In 1892, Hamrick received a patent for his procedure. The mummified remains are held in the Barbour County </span></span><a class="topic-link" data-dcnode-id="3200" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.sciencedirect.com/topics/social-sciences/historical-museums" title="Learn more about Historical Museum from ScienceDirect's AI-generated Topic Pages"><span data-dcnode-id="3201" instrument_node="">Historical Museum</span></a><span data-dcnode-id="3195"><span data-dcnode-id="3199" instrument_node="">, located in the former </span><a class="topic-link" data-dcnode-id="3197" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.sciencedirect.com/topics/social-sciences/railway-stations" title="Learn more about railway station from ScienceDirect's AI-generated Topic Pages"><span data-dcnode-id="3198" instrument_node="">railway station</span></a><span data-dcnode-id="3196" instrument_node="">, in Philippi, where they remain to this day.</span></span></p><p data-dcnode-id="3169" id="par0095"><span data-dcnode-id="3173"><span data-dcnode-id="3181"><span data-dcnode-id="3189"><span data-dcnode-id="3193" instrument_node="">Based on the observed external genitalia both mummies were female. In 2003 we examined both mummies using radiography, </span><a class="topic-link" data-dcnode-id="3191" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.sciencedirect.com/topics/medicine-and-dentistry/endoscopy" title="Learn more about endoscopy from ScienceDirect's AI-generated Topic Pages"><span data-dcnode-id="3192" instrument_node="">endoscopy</span></a><span data-dcnode-id="3190" instrument_node=""> and </span></span><a class="topic-link" data-dcnode-id="3187" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.sciencedirect.com/topics/medicine-and-dentistry/computer-assisted-tomography" title="Learn more about Computed Tomography from ScienceDirect's AI-generated Topic Pages"><span data-dcnode-id="3188" instrument_node="">Computed Tomography</span></a><span data-dcnode-id="3182"><span data-dcnode-id="3186" instrument_node=""> (CT) scanning. We differentiated the two mummies on the basis of their current stature determined by physical measurement. The ‘short mummy’ was approximately 62 in. (157.24 cms) in height and the ‘tall mummy’ was approximately 68 in. (172.72 cms). Based on dental condition, lack of arthritic changes, and bone fusing patterns it was determined that the taller mummy was approximately 30–40 years old, with the short mummy being in her mid-twenties to early 30 s at the time of death. CT scans revealed that the short mummy had more internal organ structures preserved when compared to the tall mummy. The short mummy also had a density in her left lung region that potentially represented pathology. Thus, the one known simply as ‘the short mummy’ was selected as the subject of this case study. The subject was well preserved with desiccated </span><a class="topic-link" data-dcnode-id="3184" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.sciencedirect.com/topics/medicine-and-dentistry/integument" title="Learn more about integument from ScienceDirect's AI-generated Topic Pages"><span data-dcnode-id="3185" instrument_node="">integument</span></a><span data-dcnode-id="3183" instrument_node=""> of a deep brown color. Neither mummy had hair, and it was reported to us that the mummies, after traveling with Barnum and Bailey and being on display at the Philippi Street Fair and the Barbour County Fair, were being stored in a local barn when a flood floated them down the street. The mummies were covered with mud and mold, and during cleaning their hair came off. Each had an anterior mid-abdominal cranial-caudal </span></span></span><a class="topic-link" data-dcnode-id="3179" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.sciencedirect.com/topics/medicine-and-dentistry/incision" title="Learn more about incision from ScienceDirect's AI-generated Topic Pages"><span data-dcnode-id="3180" instrument_node="">incision</span></a><span data-dcnode-id="3174"><span data-dcnode-id="3178" instrument_node=""> approximately 6 in. (15.24 cms) in length, which was a part of the </span><a class="topic-link" data-dcnode-id="3176" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.sciencedirect.com/topics/social-sciences/mummification" title="Learn more about mummification from ScienceDirect's AI-generated Topic Pages"><span data-dcnode-id="3177" instrument_node="">mummification</span></a><span data-dcnode-id="3175" instrument_node=""> procedure as documented in the Patent for the method (United States Patent Number 466,524 [US466524 A] January 5</span></span></span><sup data-dcnode-id="3171"><span data-dcnode-id="3172" instrument_node="">th</span></sup><span data-dcnode-id="3170" instrument_node="">, 1892).</span></p><p data-dcnode-id="3164" id="par0100"><span data-dcnode-id="3168" instrument_node="">The subject of this case was an inpatient at the Trans-Allegheny Lunatic Asylum. We do not know how long she was a patient there, but given that her body was allowed to be experimented on by Graham Hamrick it is apparent that she was a ward of the state. According to the National Register of Historic Places application (</span><a data-dcnode-id="3166" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//npgallery.nps.gov/NRHP/GetAsset/NHLS/78002805_text" rel="noreferrer noopener" target="_blank"><span data-dcnode-id="3167" instrument_node="">https://npgallery.nps.gov/NRHP/GetAsset/NHLS/78002805_text</span></a><span data-dcnode-id="3165" instrument_node="">) the asylum was constructed between 1858 and 1881, with the first patients being admitted in 1864. The structure is one of the largest hand-cut stone masonry structures in the world. The design adhered to the Kirkbride plan for asylum design, which proposes that the asylum building itself can have healing or therapeutic characteristics. Long windowed wings assured that each room was well lit by the natural therapeutic sunlight and that patients had access to fresh air. However, the hallways and stairwells were not as well-lit and remained cold in the winter and hot in the summer. After its construction, the asylum soon became overcrowded. The initial design was for 250 patients in single rooms, yet patient numbers grew to 717 by the year 1880. The population continued to grow, suggesting that during the time of stay relevant to this case overcrowding was rife. These overcrowded conditions, combined with the building layout, would have increased the incidence of ‘community acquired diseases’ that would easily spread through a given ward or through the entire population. Medical and mental care was rendered on site, with many bunking areas for nurses, orderly personnel, and physicians on the uppermost floor. The environment was at times dangerous, with several documented cases of murder and violence, including the murder of a nurse whose body was found in an isolated stairwell.</span></p><p data-dcnode-id="3152" id="par0105"><span data-dcnode-id="3159"><span data-dcnode-id="3163" instrument_node="">The Trans-Allegheny Lunatic Asylum was designed to be self-sustaining, with farming, a dairy, waterworks and a cemetery maintained by the patients. A nearby coal mine provided fuel for heat. The prevailing philosophy in </span><a class="topic-link" data-dcnode-id="3161" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.sciencedirect.com/topics/social-sciences/psychiatric-hospital" title="Learn more about psychiatric hospitals from ScienceDirect's AI-generated Topic Pages"><span data-dcnode-id="3162" instrument_node="">psychiatric hospitals</span></a><span data-dcnode-id="3160" instrument_node=""> during this period was that labor constituted therapy – what was considered ‘normal’ for the general population was approximated for the patients through their work in the asylum, and through this activity they had the potential to become ‘normal’ again. Examples of this work-philosophy include Jeremy Bentham (1748–1832), the champion of utilitarian philosophy, who believed inmates should do profitable work to cover the costs of commitment to a facility (</span></span><a class="workspace-trigger" data-dcnode-id="3157" href="#bib0030" name="bbib0030"><span data-dcnode-id="3158" instrument_node="">Bowring, 2018</span></a><span data-dcnode-id="3156" instrument_node="">). Further, according to Baugher and </span><a class="workspace-trigger" data-dcnode-id="3154" href="#bib0150" name="bbib0150"><span data-dcnode-id="3155" instrument_node="">Spencer-Wood and Baugher (2001)</span></a><span data-dcnode-id="3153" instrument_node="">, work was considered to be morally reforming, because the dominant Calvinist ideology of the time identified work and ‘habits of industry’ with morality.</span></p><p data-dcnode-id="3135" id="par0110"><span data-dcnode-id="3139"><span data-dcnode-id="3143"><span data-dcnode-id="3151" instrument_node="">During this period in history, individuals were admitted to an asylum for a variety of reasons. The patient population most certainly included those with </span><a class="topic-link" data-dcnode-id="3149" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.sciencedirect.com/topics/social-sciences/epilepsy" title="Learn more about epilepsy from ScienceDirect's AI-generated Topic Pages"><span data-dcnode-id="3150" instrument_node="">epilepsy</span></a><span data-dcnode-id="3144"><span data-dcnode-id="3148" instrument_node="">, alcoholism, drug addiction, chronic </span><a class="topic-link" data-dcnode-id="3146" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.sciencedirect.com/topics/medicine-and-dentistry/dementia" title="Learn more about dementia from ScienceDirect's AI-generated Topic Pages"><span data-dcnode-id="3147" instrument_node="">dementia</span></a><span data-dcnode-id="3145" instrument_node="">, acute mania, </span></span></span><a class="topic-link" data-dcnode-id="3141" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.sciencedirect.com/topics/medicine-and-dentistry/melancholia" title="Learn more about melancholia from ScienceDirect's AI-generated Topic Pages"><span data-dcnode-id="3142" instrument_node="">melancholia</span></a><span data-dcnode-id="3140" instrument_node="">, and non-educable mental deficiencies. Additional reasons for admission into the Trans-Allegheny Lunatic Asylum in West Virginia from 1864 to 1889 included laziness, egotism, disappointed love, female disease, mental excitement, cold, snuff, greediness, imaginary female trouble, “gathering in the head,” exposure and quackery, jealousy, religion, asthma, masturbation, and bad habits (in Appalachian History.net 2008) Spouses used lunacy laws to rid themselves of their partners to justify the abduction of their children (</span></span><a class="workspace-trigger" data-dcnode-id="3137" href="#bib0065" name="bbib0065"><span data-dcnode-id="3138" instrument_node="">Dabbagh, 2012</span></a><span data-dcnode-id="3136" instrument_node="">).</span></p><p data-dcnode-id="3118" id="par0115"><span data-dcnode-id="3134" instrument_node="">Another important feature of West Virginia in this time period that is relevant to patterns of health and disease, is that it was at the epicenter of coal production and coal use. During the late 19</span><sup data-dcnode-id="3132"><span data-dcnode-id="3133" instrument_node="">th</span></sup><span data-dcnode-id="3127"><span data-dcnode-id="3131" instrument_node=""> century, coal production was expanding in Barbour County. In 1883 mining safety laws were enacted by the West Virginia State legislature, which was making efforts to improve the safety of mining in Barbour County by calling for mine inspections and enhanced ventilation. The </span><a class="topic-link" data-dcnode-id="3129" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.sciencedirect.com/topics/social-sciences/coal-industry" title="Learn more about coal industry from ScienceDirect's AI-generated Topic Pages"><span data-dcnode-id="3130" instrument_node="">coal industry</span></a><span data-dcnode-id="3128" instrument_node=""> was the primary industry at this time and the surrounding air quality was very poor. Indoor air quality was also an issue. Consider this passage (</span></span><a class="workspace-trigger" data-dcnode-id="3125" href="#bib0080" name="bbib0080"><span data-dcnode-id="3126" instrument_node="">Helper, 1998</span></a><span data-dcnode-id="3124" instrument_node="">, pp 45–46) about the conditions in one-room schools in Barbour County, where coal stoves were used for heat.</span></p><blockquote data-dcnode-id="3119"><p data-dcnode-id="3120" id="spar0045"><em data-dcnode-id="3122"><span data-dcnode-id="3123" instrument_node="">Then we always had to wipe the ashes off of everything and someone had to empty the ashes. Most of the time they didn’t go far enough out the school door and the wind would blow the ashes back inside on us</span></em><span data-dcnode-id="3121" instrument_node="">.</span></p></blockquote><p></p><p data-dcnode-id="3113" id="par0120"><span data-dcnode-id="3117" instrument_node="">Clearly the inhalation of coal ash dust was prevalent for the population in Barbour County. Considering coal production and use for heating and cooking, and coupled with inhaled dust from dirt roads, farm animals and cold winters, Barbour County of the late 19</span><sup data-dcnode-id="3115"><span data-dcnode-id="3116" instrument_node="">th</span></sup><span data-dcnode-id="3114" instrument_node=""> century was likely an area where pulmonary infections and conditions were endemic.</span></p></section><section data-dcnode-id="2979" id="sec0040"><h3 class="u-h4 u-margin-m-top u-margin-xs-bottom" data-dcnode-id="3108" id="sect0050"><span data-dcnode-id="3111" instrument_node="">3.2</span><span data-dcnode-id="3110" instrument_node="">. </span><span data-dcnode-id="3109" instrument_node="">Diagnosis</span></h3><div data-dcnode-id="3032"><p data-dcnode-id="3084" id="par0125"><span data-dcnode-id="3107" instrument_node="">The pathological diagnosis in this case was first presented by </span><a class="workspace-trigger" data-dcnode-id="3105" href="#bib0185" name="bbib0185"><span data-dcnode-id="3106" instrument_node="">Woodard et al. (2010)</span></a><span data-dcnode-id="3100"><span data-dcnode-id="3104" instrument_node=""> at the </span><a class="topic-link" data-dcnode-id="3102" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.sciencedirect.com/topics/medicine-and-dentistry/paleopathology" title="Learn more about Paleopathology from ScienceDirect's AI-generated Topic Pages"><span data-dcnode-id="3103" instrument_node="">Paleopathology</span></a><span data-dcnode-id="3101" instrument_node=""> Association annual meeting in Albuquerque, New Mexico and revisited by </span></span><a class="workspace-trigger" data-dcnode-id="3098" href="#bib0190" name="bbib0190"><span data-dcnode-id="3099" instrument_node="">Woodard et al. (2011)</span></a><span data-dcnode-id="3097" instrument_node=""> at the 7</span><sup data-dcnode-id="3095"><span data-dcnode-id="3096" instrument_node="">th</span></sup><span data-dcnode-id="3094" instrument_node=""> World Congress on Mummy Studies in San Diego, California. At that time the case was not considered within the BOC framework, which was in its early stages of being elaborated (</span><a class="workspace-trigger" data-dcnode-id="3092" href="#bib0170" name="bbib0170"><span data-dcnode-id="3093" instrument_node="">Tilley and Oxenham, 2011</span></a><span data-dcnode-id="3091" instrument_node="">). Direct observation and radiography were employed in examining the mummies. A lesion was seen within the left lung on the posterior-anterior projection of the thorax (</span><a class="workspace-trigger" data-dcnode-id="3089" href="#fig0005" name="bfig0005"><span data-dcnode-id="3090" instrument_node="">Fig. 1</span></a><span data-dcnode-id="3088" instrument_node="">). A biopsy of the lesion was conducted using endoscopic guidance (</span><a class="workspace-trigger" data-dcnode-id="3086" href="#fig0010" name="bfig0010"><span data-dcnode-id="3087" instrument_node="">Fig. 2</span></a><span data-dcnode-id="3085" instrument_node="">). To access the lesion, a 0.5 cm ‘flap’ was created and resealed following biopsy. The collected sample was sent to the University of Colorado Denver School of Medicine for pathological analysis.</span></p><figure class="figure text-xs" data-dcnode-id="3057" id="fig0005"><span data-dcnode-id="3068"><img alt="Fig. 1" aria-describedby="cap0005" data-dcnode-id="3083" height="929" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//ars.els-cdn.com/content/image/1-s2.0-S1879981718300640-gr1.jpg&amp;raw"><span data-dcnode-id="3082" instrument_node=""></span><ol class="links-for-figure" data-dcnode-id="3069"><li data-dcnode-id="3076"><a class="anchor download-link u-font-sans" data-dcnode-id="3077" download="" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//ars.els-cdn.com/content/image/1-s2.0-S1879981718300640-gr1_lrg.jpg" target="_blank" title="Download high-res image (1MB)"><span class="anchor-text" data-dcnode-id="3078"><span data-dcnode-id="3081" instrument_node="">Download : </span><span class="download-link-title" data-dcnode-id="3079"><span data-dcnode-id="3080" instrument_node="">Download high-res image (1MB)</span></span></span></a></li><li data-dcnode-id="3070"><a class="anchor download-link u-font-sans" data-dcnode-id="3071" download="" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//ars.els-cdn.com/content/image/1-s2.0-S1879981718300640-gr1.jpg" target="_blank" title="Download full-size image"><span class="anchor-text" data-dcnode-id="3072"><span data-dcnode-id="3075" instrument_node="">Download : </span><span class="download-link-title" data-dcnode-id="3073"><span data-dcnode-id="3074" instrument_node="">Download full-size image</span></span></span></a></li></ol></span><span class="captions" data-dcnode-id="3058"><span data-dcnode-id="3059" id="cap0005"><p data-dcnode-id="3060" id="spar0005"><span class="label" data-dcnode-id="3066"><span data-dcnode-id="3067" instrument_node="">Fig. 1</span></span><span data-dcnode-id="3065" instrument_node="">. </span><span data-dcnode-id="3064" instrument_node="">Posterior-anterior radiograph showing lesion in the left lung (A). Spinal needles used for location and endoscopic guidance (B), and distal end of </span><a class="topic-link" data-dcnode-id="3062" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.sciencedirect.com/topics/medicine-and-dentistry/endoscope" title="Learn more about endoscope from ScienceDirect's AI-generated Topic Pages"><span data-dcnode-id="3063" instrument_node="">endoscope</span></a><span data-dcnode-id="3061" instrument_node=""> in place (C).</span></p></span></span></figure><figure class="figure text-xs" data-dcnode-id="3033" id="fig0010"><span data-dcnode-id="3041"><img alt="Fig. 2" aria-describedby="cap0010" data-dcnode-id="3056" height="929" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//ars.els-cdn.com/content/image/1-s2.0-S1879981718300640-gr2.jpg&amp;raw"><span data-dcnode-id="3055" instrument_node=""></span><ol class="links-for-figure" data-dcnode-id="3042"><li data-dcnode-id="3049"><a class="anchor download-link u-font-sans" data-dcnode-id="3050" download="" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//ars.els-cdn.com/content/image/1-s2.0-S1879981718300640-gr2_lrg.jpg" target="_blank" title="Download high-res image (941KB)"><span class="anchor-text" data-dcnode-id="3051"><span data-dcnode-id="3054" instrument_node="">Download : </span><span class="download-link-title" data-dcnode-id="3052"><span data-dcnode-id="3053" instrument_node="">Download high-res image (941KB)</span></span></span></a></li><li data-dcnode-id="3043"><a class="anchor download-link u-font-sans" data-dcnode-id="3044" download="" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//ars.els-cdn.com/content/image/1-s2.0-S1879981718300640-gr2.jpg" target="_blank" title="Download full-size image"><span class="anchor-text" data-dcnode-id="3045"><span data-dcnode-id="3048" instrument_node="">Download : </span><span class="download-link-title" data-dcnode-id="3046"><span data-dcnode-id="3047" instrument_node="">Download full-size image</span></span></span></a></li></ol></span><span class="captions" data-dcnode-id="3034"><span data-dcnode-id="3035" id="cap0010"><p data-dcnode-id="3036" id="spar0010"><span class="label" data-dcnode-id="3039"><span data-dcnode-id="3040" instrument_node="">Fig. 2</span></span><span data-dcnode-id="3038" instrument_node="">. </span><span data-dcnode-id="3037" instrument_node="">Posterior-anterior radiograph demonstrating successful biopsy of lesion (D).</span></p></span></span></figure></div><div data-dcnode-id="2980"><p data-dcnode-id="3012" id="par0130"><span data-dcnode-id="3023"><span data-dcnode-id="3031" instrument_node="">Diagnosis by consensus was used to make the pathological determination. The interpreting team included a </span><a class="topic-link" data-dcnode-id="3029" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.sciencedirect.com/topics/medicine-and-dentistry/radiographer" title="Learn more about radiographer from ScienceDirect's AI-generated Topic Pages"><span data-dcnode-id="3030" instrument_node="">radiographer</span></a><span data-dcnode-id="3024"><span data-dcnode-id="3028" instrument_node="">, an endoscopist, a radiologist skilled in interpreting images from mummified remains who offered opinion regarding the radiographic appearance, a bioanthropologist contributing the historical and regional context, and a paleopathologist who conducted the histological analysis at the University of Colorado Denver School of Medicine. Histology revealed enlarged terminal air spaces indicating a diagnosis of severe </span><a class="topic-link" data-dcnode-id="3026" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.sciencedirect.com/topics/medicine-and-dentistry/emphysema" title="Learn more about emphysema from ScienceDirect's AI-generated Topic Pages"><span data-dcnode-id="3027" instrument_node="">emphysema</span></a><span data-dcnode-id="3025" instrument_node=""> (</span></span></span><a class="workspace-trigger" data-dcnode-id="3021" href="#fig0015" name="bfig0015"><span data-dcnode-id="3022" instrument_node="">Fig. 3</span></a><span data-dcnode-id="3016"><span data-dcnode-id="3020" instrument_node="">A). Further, the presence of stained coal macules and their distribution indicated that moderate to marked </span><a class="topic-link" data-dcnode-id="3018" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.sciencedirect.com/topics/medicine-and-dentistry/anthracosis" title="Learn more about anthracosis from ScienceDirect's AI-generated Topic Pages"><span data-dcnode-id="3019" instrument_node="">anthracosis</span></a><span data-dcnode-id="3017" instrument_node=""> was also present (</span></span><a class="workspace-trigger" data-dcnode-id="3014" href="#fig0015" name="bfig0015"><span data-dcnode-id="3015" instrument_node="">Fig. 3</span></a><span data-dcnode-id="3013" instrument_node="">B) based on the morphologic presentation and staining characteristics. It is important to note that the ability to determine a diagnosis was made possible by having preserved soft tissue available rather than merely the skeleton alone.</span></p><figure class="figure text-xs" data-dcnode-id="2981" id="fig0015"><span data-dcnode-id="2996"><img alt="Fig. 3" aria-describedby="cap0015" data-dcnode-id="3011" height="781" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//ars.els-cdn.com/content/image/1-s2.0-S1879981718300640-gr3.jpg&amp;raw"><span data-dcnode-id="3010" instrument_node=""></span><ol class="links-for-figure" data-dcnode-id="2997"><li data-dcnode-id="3004"><a class="anchor download-link u-font-sans" data-dcnode-id="3005" download="" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//ars.els-cdn.com/content/image/1-s2.0-S1879981718300640-gr3_lrg.jpg" target="_blank" title="Download high-res image (606KB)"><span class="anchor-text" data-dcnode-id="3006"><span data-dcnode-id="3009" instrument_node="">Download : </span><span class="download-link-title" data-dcnode-id="3007"><span data-dcnode-id="3008" instrument_node="">Download high-res image (606KB)</span></span></span></a></li><li data-dcnode-id="2998"><a class="anchor download-link u-font-sans" data-dcnode-id="2999" download="" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//ars.els-cdn.com/content/image/1-s2.0-S1879981718300640-gr3.jpg" target="_blank" title="Download full-size image"><span class="anchor-text" data-dcnode-id="3000"><span data-dcnode-id="3003" instrument_node="">Download : </span><span class="download-link-title" data-dcnode-id="3001"><span data-dcnode-id="3002" instrument_node="">Download full-size image</span></span></span></a></li></ol></span><span class="captions" data-dcnode-id="2982"><span data-dcnode-id="2983" id="cap0015"><p data-dcnode-id="2984" id="spar0015"><span class="label" data-dcnode-id="2994"><span data-dcnode-id="2995" instrument_node="">Fig. 3</span></span><span data-dcnode-id="2993" instrument_node="">. </span><span data-dcnode-id="2988"><span data-dcnode-id="2992" instrument_node="">Histological analysis of tissue from the short mummy showing </span><a class="topic-link" data-dcnode-id="2990" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.sciencedirect.com/topics/medicine-and-dentistry/emphysema" title="Learn more about emphysema from ScienceDirect's AI-generated Topic Pages"><span data-dcnode-id="2991" instrument_node="">emphysema</span></a><span data-dcnode-id="2989" instrument_node=""> (A), </span></span><a class="topic-link" data-dcnode-id="2986" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.sciencedirect.com/topics/medicine-and-dentistry/anthracosis" title="Learn more about anthracosis from ScienceDirect's AI-generated Topic Pages"><span data-dcnode-id="2987" instrument_node="">anthracosis</span></a><span data-dcnode-id="2985" instrument_node=""> (B), and unidentified fungal matter (C).</span></p></span></span></figure></div></section><section data-dcnode-id="2696" id="sec0045"><h3 class="u-h4 u-margin-m-top u-margin-xs-bottom" data-dcnode-id="2975" id="sect0055"><span data-dcnode-id="2978" instrument_node="">3.3</span><span data-dcnode-id="2977" instrument_node="">. </span><span data-dcnode-id="2976" instrument_node="">Related pathophysiology</span></h3><p data-dcnode-id="2973" id="par0135"><span data-dcnode-id="2974" instrument_node="">To better understand the functional impact of a given disease the pathophysiological features must first be considered. In this case there are two clear diagnoses: emphysema and moderate to marked anthracosis, both of which contribute to compromised pulmonary system function.</span></p><div data-dcnode-id="2858"><p data-dcnode-id="2939" id="par0140"><span data-dcnode-id="2964"><span data-dcnode-id="2972" instrument_node="">Emphysema is a serious pulmonary condition that is characterized by a permanent enlargement of airspaces distal to the terminal </span><a class="topic-link" data-dcnode-id="2970" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.sciencedirect.com/topics/medicine-and-dentistry/bronchiole" title="Learn more about bronchioles from ScienceDirect's AI-generated Topic Pages"><span data-dcnode-id="2971" instrument_node="">bronchioles</span></a><span data-dcnode-id="2965"><span data-dcnode-id="2969" instrument_node="">. These cellular changes bring about a dramatic decline in the alveolar surface area available for gas exchange. At the organ level, loss of alveolar structure in the lungs leads to increased </span><a class="topic-link" data-dcnode-id="2967" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.sciencedirect.com/topics/medicine-and-dentistry/airway-resistance" title="Learn more about airway resistance from ScienceDirect's AI-generated Topic Pages"><span data-dcnode-id="2968" instrument_node="">airway resistance</span></a><span data-dcnode-id="2966" instrument_node=""> causing airflow limitation [decrease in the ability to move air in, about, and out of the lungs]. Thus, there is a dramatic impact on pulmonary function (</span></span></span><a class="workspace-trigger" data-dcnode-id="2962" href="#bib0140" name="bbib0140"><span data-dcnode-id="2963" instrument_node="">Rubin et al., 2011</span></a><span data-dcnode-id="2961" instrument_node="">; </span><a class="workspace-trigger" data-dcnode-id="2959" href="#bib0040" name="bbib0040"><span data-dcnode-id="2960" instrument_node="">Brusasco, 2015</span></a><span data-dcnode-id="2954"><span data-dcnode-id="2958" instrument_node="">). The loss of integrity of the alveolar walls results in a dramatic decrease in </span><a class="topic-link" data-dcnode-id="2956" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.sciencedirect.com/topics/medicine-and-dentistry/elastic-recoil" title="Learn more about elastic recoil from ScienceDirect's AI-generated Topic Pages"><span data-dcnode-id="2957" instrument_node="">elastic recoil</span></a><span data-dcnode-id="2955" instrument_node=""> making it difficult to exhale the air that is in the lungs. The loss of the alveolar supporting structure also leads to airway narrowing, which further increases airways resistance limiting airflow in and out of the lung and its distribution within the lung (</span></span><a class="workspace-trigger" data-dcnode-id="2952" href="#fig0020" name="bfig0020"><span data-dcnode-id="2953" instrument_node="">Fig. 4</span></a><span data-dcnode-id="2943"><span data-dcnode-id="2947"><span data-dcnode-id="2951" instrument_node="">). There is also an increase in </span><a class="topic-link" data-dcnode-id="2949" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.sciencedirect.com/topics/medicine-and-dentistry/residual-volume" title="Learn more about residual volume from ScienceDirect's AI-generated Topic Pages"><span data-dcnode-id="2950" instrument_node="">residual volume</span></a><span data-dcnode-id="2948" instrument_node=""> and </span></span><a class="topic-link" data-dcnode-id="2945" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.sciencedirect.com/topics/medicine-and-dentistry/total-lung-capacity" title="Learn more about total lung capacity from ScienceDirect's AI-generated Topic Pages"><span data-dcnode-id="2946" instrument_node="">total lung capacity</span></a><span data-dcnode-id="2944" instrument_node=""> (TLC) due to trapped air resulting from the loss of elastic recoil due to loss of alveolar architecture (</span></span><a class="workspace-trigger" data-dcnode-id="2941" href="#fig0025" name="bfig0025"><span data-dcnode-id="2942" instrument_node="">Fig. 5</span></a><span data-dcnode-id="2940" instrument_node="">).</span></p><figure class="figure text-xs" data-dcnode-id="2894" id="fig0020"><span data-dcnode-id="2923"><img alt="Fig. 4" aria-describedby="cap0020" data-dcnode-id="2938" height="409" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//ars.els-cdn.com/content/image/1-s2.0-S1879981718300640-gr4.jpg&amp;raw"><span data-dcnode-id="2937" instrument_node=""></span><ol class="links-for-figure" data-dcnode-id="2924"><li data-dcnode-id="2931"><a class="anchor download-link u-font-sans" data-dcnode-id="2932" download="" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//ars.els-cdn.com/content/image/1-s2.0-S1879981718300640-gr4_lrg.jpg" target="_blank" title="Download high-res image (260KB)"><span class="anchor-text" data-dcnode-id="2933"><span data-dcnode-id="2936" instrument_node="">Download : </span><span class="download-link-title" data-dcnode-id="2934"><span data-dcnode-id="2935" instrument_node="">Download high-res image (260KB)</span></span></span></a></li><li data-dcnode-id="2925"><a class="anchor download-link u-font-sans" data-dcnode-id="2926" download="" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//ars.els-cdn.com/content/image/1-s2.0-S1879981718300640-gr4.jpg" target="_blank" title="Download full-size image"><span class="anchor-text" data-dcnode-id="2927"><span data-dcnode-id="2930" instrument_node="">Download : </span><span class="download-link-title" data-dcnode-id="2928"><span data-dcnode-id="2929" instrument_node="">Download full-size image</span></span></span></a></li></ol></span><span class="captions" data-dcnode-id="2895"><span data-dcnode-id="2896" id="cap0020"><p data-dcnode-id="2897" id="spar0020"><span class="label" data-dcnode-id="2921"><span data-dcnode-id="2922" instrument_node="">Fig. 4</span></span><span data-dcnode-id="2920" instrument_node="">. </span><span data-dcnode-id="2915"><span data-dcnode-id="2919" instrument_node="">Graphic depiction of airflow limitation due to increased </span><a class="topic-link" data-dcnode-id="2917" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.sciencedirect.com/topics/medicine-and-dentistry/airway-resistance" title="Learn more about airway resistance from ScienceDirect's AI-generated Topic Pages"><span data-dcnode-id="2918" instrument_node="">airway resistance</span></a><span data-dcnode-id="2916" instrument_node=""> using the formula R = delta P/flowrate (pressure in cmH</span></span><sub data-dcnode-id="2913"><span data-dcnode-id="2914" instrument_node="">2</span></sub><span data-dcnode-id="2912" instrument_node="">0, flowrate in /liters/second). In this example (A) represents normal airway resistance of &lt;2 cmH</span><sub data-dcnode-id="2910"><span data-dcnode-id="2911" instrument_node="">2</span></sub><span data-dcnode-id="2901"><span data-dcnode-id="2909" instrument_node="">0/L/sec, while (B) depicts increased resistance resulting from narrowed airways seen in </span><a class="topic-link" data-dcnode-id="2907" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.sciencedirect.com/topics/medicine-and-dentistry/emphysema" title="Learn more about emphysema from ScienceDirect's AI-generated Topic Pages"><span data-dcnode-id="2908" instrument_node="">emphysema</span></a><span data-dcnode-id="2902"><span data-dcnode-id="2906" instrument_node=""> due to airway collapse, </span><a class="topic-link" data-dcnode-id="2904" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.sciencedirect.com/topics/medicine-and-dentistry/bronchospasm" title="Learn more about bronchospasm from ScienceDirect's AI-generated Topic Pages"><span data-dcnode-id="2905" instrument_node="">bronchospasm</span></a><span data-dcnode-id="2903" instrument_node="">, and excess mucous. (</span></span></span><a class="workspace-trigger" data-dcnode-id="2899" href="#bib0085" name="bbib0085"><span data-dcnode-id="2900" instrument_node="">Hess and Tabor, 1993</span></a><span data-dcnode-id="2898" instrument_node="">) (Graphic courtesy of author RGB).</span></p></span></span></figure><figure class="figure text-xs" data-dcnode-id="2859" id="fig0025"><span data-dcnode-id="2878"><img alt="Fig. 5" aria-describedby="cap0025" data-dcnode-id="2893" height="264" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//ars.els-cdn.com/content/image/1-s2.0-S1879981718300640-gr5.jpg&amp;raw"><span data-dcnode-id="2892" instrument_node=""></span><ol class="links-for-figure" data-dcnode-id="2879"><li data-dcnode-id="2886"><a class="anchor download-link u-font-sans" data-dcnode-id="2887" download="" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//ars.els-cdn.com/content/image/1-s2.0-S1879981718300640-gr5_lrg.jpg" target="_blank" title="Download high-res image (140KB)"><span class="anchor-text" data-dcnode-id="2888"><span data-dcnode-id="2891" instrument_node="">Download : </span><span class="download-link-title" data-dcnode-id="2889"><span data-dcnode-id="2890" instrument_node="">Download high-res image (140KB)</span></span></span></a></li><li data-dcnode-id="2880"><a class="anchor download-link u-font-sans" data-dcnode-id="2881" download="" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//ars.els-cdn.com/content/image/1-s2.0-S1879981718300640-gr5.jpg" target="_blank" title="Download full-size image"><span class="anchor-text" data-dcnode-id="2882"><span data-dcnode-id="2885" instrument_node="">Download : </span><span class="download-link-title" data-dcnode-id="2883"><span data-dcnode-id="2884" instrument_node="">Download full-size image</span></span></span></a></li></ol></span><span class="captions" data-dcnode-id="2860"><span data-dcnode-id="2861" id="cap0025"><p data-dcnode-id="2862" id="spar0025"><span class="label" data-dcnode-id="2876"><span data-dcnode-id="2877" instrument_node="">Fig. 5</span></span><span data-dcnode-id="2875" instrument_node="">. </span><span data-dcnode-id="2866"><span data-dcnode-id="2870"><span data-dcnode-id="2874" instrument_node="">Schematic of normal airflow, airway caliber, and alveolar surface area (A) and reduced airflow, airway caliber and alveolar surface area loss (B) seen in </span><a class="topic-link" data-dcnode-id="2872" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.sciencedirect.com/topics/medicine-and-dentistry/emphysema" title="Learn more about Emphysema from ScienceDirect's AI-generated Topic Pages"><span data-dcnode-id="2873" instrument_node="">Emphysema</span></a><span data-dcnode-id="2871" instrument_node="">. The loss of alveolar surface area results in reduced </span></span
