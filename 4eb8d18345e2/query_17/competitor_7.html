><a class="topic-link" data-dcnode-id="2868" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.sciencedirect.com/topics/medicine-and-dentistry/elastic-recoil" title="Learn more about elastic recoil from ScienceDirect's AI-generated Topic Pages"><span data-dcnode-id="2869" instrument_node="">elastic recoil</span></a><span data-dcnode-id="2867" instrument_node="">, poor gas exchange and air trapping in the lung. (</span></span><a class="workspace-trigger" data-dcnode-id="2864" href="#bib0100" name="bbib0100"><span data-dcnode-id="2865" instrument_node="">Kent et al., 2011</span></a><span data-dcnode-id="2863" instrument_node="">) (Graphic courtesy of author RGB).</span></p></span></span></figure></div><p data-dcnode-id="2810" id="par0145"><span data-dcnode-id="2857" instrument_node="">One of the clinical characteristics of emphysema is shortness of breath (SOB) resulting from gas exchange alterations seen in emphysema (</span><a class="workspace-trigger" data-dcnode-id="2855" href="#bib0100" name="bbib0100"><span data-dcnode-id="2856" instrument_node="">Kent et al., 2011</span></a><span data-dcnode-id="2854" instrument_node="">). The structural changes within the lung impedes carbon dioxide (CO</span><sub data-dcnode-id="2852"><span data-dcnode-id="2853" instrument_node="">2</span></sub><span data-dcnode-id="2851" instrument_node="">) removal and oxygen (O</span><sub data-dcnode-id="2849"><span data-dcnode-id="2850" instrument_node="">2</span></sub><span data-dcnode-id="2844"><span data-dcnode-id="2848" instrument_node="">) diffusion into the blood for delivery to all body tissues. This results in chronic </span><a class="topic-link" data-dcnode-id="2846" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.sciencedirect.com/topics/medicine-and-dentistry/hypercapnia" title="Learn more about hypercapnea from ScienceDirect's AI-generated Topic Pages"><span data-dcnode-id="2847" instrument_node="">hypercapnea</span></a><span data-dcnode-id="2845" instrument_node="">, or elevated CO</span></span><sub data-dcnode-id="2842"><span data-dcnode-id="2843" instrument_node="">2</span></sub><span data-dcnode-id="2841" instrument_node=""> levels, as the lungs cannot eliminate the CO</span><sub data-dcnode-id="2839"><span data-dcnode-id="2840" instrument_node="">2</span></sub><span data-dcnode-id="2838" instrument_node=""> produced by increases in the body’s workload or metabolism that produces the CO</span><sub data-dcnode-id="2836"><span data-dcnode-id="2837" instrument_node="">2</span></sub><span data-dcnode-id="2835" instrument_node=""> (</span><a class="workspace-trigger" data-dcnode-id="2833" href="#bib0035" name="bbib0035"><span data-dcnode-id="2834" instrument_node="">Brown and Wassermann, 1981</span></a><span data-dcnode-id="2828"><span data-dcnode-id="2832" instrument_node="">). Also, through a complex system of </span><a class="topic-link" data-dcnode-id="2830" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.sciencedirect.com/topics/medicine-and-dentistry/chemoreceptor" title="Learn more about chemoreceptors from ScienceDirect's AI-generated Topic Pages"><span data-dcnode-id="2831" instrument_node="">chemoreceptors</span></a><span data-dcnode-id="2829" instrument_node="">, the individual with emphysema becomes O</span></span><sub data-dcnode-id="2826"><span data-dcnode-id="2827" instrument_node="">2</span></sub><span data-dcnode-id="2821"><span data-dcnode-id="2825" instrument_node=""> sensitive, which may result in </span><a class="topic-link" data-dcnode-id="2823" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.sciencedirect.com/topics/medicine-and-dentistry/hypopnea" title="Learn more about hypopnea from ScienceDirect's AI-generated Topic Pages"><span data-dcnode-id="2824" instrument_node="">hypopnea</span></a><span data-dcnode-id="2822" instrument_node=""> worsening the CO</span></span><sub data-dcnode-id="2819"><span data-dcnode-id="2820" instrument_node="">2</span></sub><span data-dcnode-id="2814"><span data-dcnode-id="2818" instrument_node=""> retention and altering the body’s acid-base balance, disrupting </span><a class="topic-link" data-dcnode-id="2816" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.sciencedirect.com/topics/medicine-and-dentistry/homeostasis" title="Learn more about homeostasis from ScienceDirect's AI-generated Topic Pages"><span data-dcnode-id="2817" instrument_node="">homeostasis</span></a><span data-dcnode-id="2815" instrument_node="">. Further, there is a shift in the oxy-hemoglobin dissociation curve, which decreases the ability for the red blood cells to bind with the oxygen that it is carrying to the tissues (</span></span><a class="workspace-trigger" data-dcnode-id="2812" href="#bib0055" name="bbib0055"><span data-dcnode-id="2813" instrument_node="">Collins et al., 2015</span></a><span data-dcnode-id="2811" instrument_node="">).</span></p><div data-dcnode-id="2744"><p data-dcnode-id="2776" id="par0150"><span data-dcnode-id="2801"><span data-dcnode-id="2809" instrument_node="">Emphysema impacts a variety of other body systems as well. There are hemodynamic alterations with an increase in </span><a class="topic-link" data-dcnode-id="2807" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.sciencedirect.com/topics/medicine-and-dentistry/lung-artery-pressure" title="Learn more about pulmonary artery pressure from ScienceDirect's AI-generated Topic Pages"><span data-dcnode-id="2808" instrument_node="">pulmonary artery pressure</span></a><span data-dcnode-id="2802"><span data-dcnode-id="2806" instrument_node=""> which in turn leads to the development of Cor-Pulmonale, or right </span><a class="topic-link" data-dcnode-id="2804" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.sciencedirect.com/topics/medicine-and-dentistry/cardiomegaly" title="Learn more about heart enlargement from ScienceDirect's AI-generated Topic Pages"><span data-dcnode-id="2805" instrument_node="">heart enlargement</span></a><span data-dcnode-id="2803" instrument_node=""> (</span></span></span><a class="workspace-trigger" data-dcnode-id="2799" href="#bib0095" name="bbib0095"><span data-dcnode-id="2800" instrument_node="">Kawut et al., 2014</span></a><span data-dcnode-id="2798" instrument_node="">). The Cor-Pulmonale decreases the function of the right heart, which can cause increased resistance for the left heart resulting in potential overall heart failure. As mentioned above, O</span><sub data-dcnode-id="2796"><span data-dcnode-id="2797" instrument_node="">2</span></sub><span data-dcnode-id="2783"><span data-dcnode-id="2795" instrument_node=""> attainment and delivery is decreased, resulting in increased red blood cell production, which increases </span><a class="topic-link" data-dcnode-id="2793" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.sciencedirect.com/topics/biochemistry-genetics-and-molecular-biology/blood-viscosity" title="Learn more about blood viscosity from ScienceDirect's AI-generated Topic Pages"><span data-dcnode-id="2794" instrument_node="">blood viscosity</span></a><span data-dcnode-id="2784"><span data-dcnode-id="2792" instrument_node=""> resulting in increased cardiac work. There is also a loss of body proteins through associated mucous production, which alters the </span><a class="topic-link" data-dcnode-id="2790" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.sciencedirect.com/topics/biochemistry-genetics-and-molecular-biology/oncotic-pressure" title="Learn more about oncotic pressures from ScienceDirect's AI-generated Topic Pages"><span data-dcnode-id="2791" instrument_node="">oncotic pressures</span></a><span data-dcnode-id="2785"><span data-dcnode-id="2789" instrument_node=""> and capillary integrity. The pulmonary defenses are markedly reduced as the mucous blanket is difficult to clear and eliminate from the airways, increasing susceptibility to an acute disease, such as pneumonia, superimposed on </span><a class="topic-link" data-dcnode-id="2787" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.sciencedirect.com/topics/medicine-and-dentistry/chronic-lung-disease" title="Learn more about chronic pulmonary disease from ScienceDirect's AI-generated Topic Pages"><span data-dcnode-id="2788" instrument_node="">chronic pulmonary disease</span></a><span data-dcnode-id="2786" instrument_node=""> (</span></span></span></span><a class="workspace-trigger" data-dcnode-id="2781" href="#bib0115" name="bbib0115"><span data-dcnode-id="2782" instrument_node="">McCance et al., 2010</span></a><span data-dcnode-id="2780" instrument_node="">). Given all of the cellular and organ level changes (see </span><a class="workspace-trigger" data-dcnode-id="2778" href="#fig0030" name="bfig0030"><span data-dcnode-id="2779" instrument_node="">Fig. 6</span></a><span data-dcnode-id="2777" instrument_node="">), there is a decreased ability to meet metabolic demands of the body, thus, a reduced ability to do work and increased risk of infection.</span></p><figure class="figure text-xs" data-dcnode-id="2745" id="fig0030"><span data-dcnode-id="2760"><img alt="Fig. 6" aria-describedby="cap0030" data-dcnode-id="2775" height="381" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//ars.els-cdn.com/content/image/1-s2.0-S1879981718300640-gr6.jpg&amp;raw"><span data-dcnode-id="2774" instrument_node=""></span><ol class="links-for-figure" data-dcnode-id="2761"><li data-dcnode-id="2768"><a class="anchor download-link u-font-sans" data-dcnode-id="2769" download="" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//ars.els-cdn.com/content/image/1-s2.0-S1879981718300640-gr6_lrg.jpg" target="_blank" title="Download high-res image (348KB)"><span class="anchor-text" data-dcnode-id="2770"><span data-dcnode-id="2773" instrument_node="">Download : </span><span class="download-link-title" data-dcnode-id="2771"><span data-dcnode-id="2772" instrument_node="">Download high-res image (348KB)</span></span></span></a></li><li data-dcnode-id="2762"><a class="anchor download-link u-font-sans" data-dcnode-id="2763" download="" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//ars.els-cdn.com/content/image/1-s2.0-S1879981718300640-gr6.jpg" target="_blank" title="Download full-size image"><span class="anchor-text" data-dcnode-id="2764"><span data-dcnode-id="2767" instrument_node="">Download : </span><span class="download-link-title" data-dcnode-id="2765"><span data-dcnode-id="2766" instrument_node="">Download full-size image</span></span></span></a></li></ol></span><span class="captions" data-dcnode-id="2746"><span data-dcnode-id="2747" id="cap0030"><p data-dcnode-id="2748" id="spar0030"><span class="label" data-dcnode-id="2758"><span data-dcnode-id="2759" instrument_node="">Fig. 6</span></span><span data-dcnode-id="2757" instrument_node="">. </span><span data-dcnode-id="2752"><span data-dcnode-id="2756" instrument_node="">Summary of the pathophysiologic impacts of </span><a class="topic-link" data-dcnode-id="2754" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.sciencedirect.com/topics/medicine-and-dentistry/emphysema" title="Learn more about emphysema from ScienceDirect's AI-generated Topic Pages"><span data-dcnode-id="2755" instrument_node="">emphysema</span></a><span data-dcnode-id="2753" instrument_node=""> (</span></span><a class="workspace-trigger" data-dcnode-id="2750" href="#bib0070" name="bbib0070"><span data-dcnode-id="2751" instrument_node="">Goldklang and Stockley, 2016</span></a><span data-dcnode-id="2749" instrument_node="">). (Summary chart courtesy of author RGB).</span></p></span></span></figure></div><p data-dcnode-id="2716" id="par0155"><span data-dcnode-id="2727"><span data-dcnode-id="2739"><span data-dcnode-id="2743" instrument_node="">The second diagnosis is moderate to severe anthracosis, also known as coal workers </span><a class="topic-link" data-dcnode-id="2741" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.sciencedirect.com/topics/medicine-and-dentistry/pneumoconiosis" title="Learn more about pneumoconiosis from ScienceDirect's AI-generated Topic Pages"><span data-dcnode-id="2742" instrument_node="">pneumoconiosis</span></a><span data-dcnode-id="2740" instrument_node=""> (CWP), caused by inhalation of coal dust. Particles of coal dust are engulfed by macrophages which </span></span><a class="topic-link" data-dcnode-id="2737" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.sciencedirect.com/topics/medicine-and-dentistry/cytokine-release" title="Learn more about release cytokines from ScienceDirect's AI-generated Topic Pages"><span data-dcnode-id="2738" instrument_node="">release cytokines</span></a><span data-dcnode-id="2728"><span data-dcnode-id="2736" instrument_node=""> that stimulate inflammation. These dust-laden macrophages collect in the </span><a class="topic-link" data-dcnode-id="2734" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.sciencedirect.com/topics/medicine-and-dentistry/lung-interstitium" title="Learn more about lung interstitium from ScienceDirect's AI-generated Topic Pages"><span data-dcnode-id="2735" instrument_node="">lung interstitium</span></a><span data-dcnode-id="2729"><span data-dcnode-id="2733" instrument_node=""> around bronchioles and </span><a class="topic-link" data-dcnode-id="2731" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.sciencedirect.com/topics/medicine-and-dentistry/alveoli" title="Learn more about alveoli from ScienceDirect's AI-generated Topic Pages"><span data-dcnode-id="2732" instrument_node="">alveoli</span></a><span data-dcnode-id="2730" instrument_node="">, producing what are termed coal macules. Coal macules (1–2 mm in diameter) enlarge due to the accumulation of collagen to become coal nodules ((≥2 mm in diameter). These cellular changes cause focal bronchiolar emphysema as bronchiole walls weaken and dilate (</span></span></span></span><a class="workspace-trigger" data-dcnode-id="2725" href="#bib0120" name="bbib0120"><span data-dcnode-id="2726" instrument_node="">Micsadraee, 2014</span></a><span data-dcnode-id="2720"><span data-dcnode-id="2724" instrument_node="">). Fibrosis can occur in areas adjacent to coal macules and can develop into </span><a class="topic-link" data-dcnode-id="2722" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.sciencedirect.com/topics/medicine-and-dentistry/progressive-massive-fibrosis" title="Learn more about progressive massive fibrosis from ScienceDirect's AI-generated Topic Pages"><span data-dcnode-id="2723" instrument_node="">progressive massive fibrosis</span></a><span data-dcnode-id="2721" instrument_node=""> with impaired restrictive lung function at the organ/system level of organization (</span></span><a class="workspace-trigger" data-dcnode-id="2718" href="#bib0010" name="bbib0010"><span data-dcnode-id="2719" instrument_node="">Amoli, 2009</span></a><span data-dcnode-id="2717" instrument_node="">). The resulting distortion of lung architecture, airflow obstruction, and functional impairment can be highly destructive.</span></p><p data-dcnode-id="2699" id="par0160"><span data-dcnode-id="2707"><span data-dcnode-id="2715" instrument_node="">There is also an increased risk of developing active </span><a class="topic-link" data-dcnode-id="2713" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.sciencedirect.com/topics/social-sciences/tuberculosis" title="Learn more about tuberculosis from ScienceDirect's AI-generated Topic Pages"><span data-dcnode-id="2714" instrument_node="">tuberculosis</span></a><span data-dcnode-id="2708"><span data-dcnode-id="2712" instrument_node=""> and other </span><a class="topic-link" data-dcnode-id="2710" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.sciencedirect.com/topics/medicine-and-dentistry/mycobacterial-infection" title="Learn more about mycobacterial infections from ScienceDirect's AI-generated Topic Pages"><span data-dcnode-id="2711" instrument_node="">mycobacterial infections</span></a><span data-dcnode-id="2709" instrument_node=""> in individuals with CWP. If fibrosis has developed, pulmonary hypertension becomes apparent and </span></span></span><a class="topic-link" data-dcnode-id="2705" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.sciencedirect.com/topics/medicine-and-dentistry/heart-right-ventricle-failure" title="Learn more about right ventricular failure from ScienceDirect's AI-generated Topic Pages"><span data-dcnode-id="2706" instrument_node="">right ventricular failure</span></a><span data-dcnode-id="2700"><span data-dcnode-id="2704" instrument_node=""> is a possibility, along with respiratory failure. The inability for gas to exchange is exacerbated. The </span><a class="topic-link" data-dcnode-id="2702" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.sciencedirect.com/topics/medicine-and-dentistry/restrictive-lung-disease" title="Learn more about restrictive lung disease from ScienceDirect's AI-generated Topic Pages"><span data-dcnode-id="2703" instrument_node="">restrictive lung disease</span></a><span data-dcnode-id="2701" instrument_node=""> reduces all the lung volumes markedly, decreasing pulmonary reserves and the ability of the pulmonary system to meet the metabolic demands of the body.</span></span></p><p data-dcnode-id="2697" id="par0165"><span data-dcnode-id="2698" instrument_node="">Given the reliance on coal for heat and cooking, along with the overcrowded living conditions described above, it is not surprising that both CWP and emphysema developed in this case. Emphysema can develop from continued exposure to smoke and in rare cases be the result of a deficiency in alpha-1 antitrypsin. The anthracosis, when combined with emphysema as seen in this case, would have a synergistic negative impact on body system functions.</span></p></section><section data-dcnode-id="2611" id="sec0050"><h3 class="u-h4 u-margin-m-top u-margin-xs-bottom" data-dcnode-id="2692" id="sect0060"><span data-dcnode-id="2695" instrument_node="">3.4</span><span data-dcnode-id="2694" instrument_node="">. </span><span data-dcnode-id="2693" instrument_node="">Potential functional limitations and probable patterns of care</span></h3><p data-dcnode-id="2687" id="par0170"><span data-dcnode-id="2691" instrument_node="">The functional limitations associated with these diagnoses presented in this case are many and varied. Broadly speaking, the physiological impact of these diseases would result in a reduced ability to do work, exacerbated by progressive muscle weakness and </span><a class="topic-link" data-dcnode-id="2689" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.sciencedirect.com/topics/medicine-and-dentistry/muscle-atrophy" title="Learn more about muscle wasting from ScienceDirect's AI-generated Topic Pages"><span data-dcnode-id="2690" instrument_node="">muscle wasting</span></a><span data-dcnode-id="2688" instrument_node="">, which would contribute to the inability of the individual to do work defined as any activity that results in an increased metabolic demand.</span></p><p data-dcnode-id="2679" id="par0175"><span data-dcnode-id="2686" instrument_node="">When considering functional limitations and potential patterns of care it is useful to frame these limitations within the concept of the activities of daily living (ADLs). The concept of ADLs is used routinely in clinical and rehabilitative practice to determine which essential and routine tasks an individual can perform without assistance (</span><a class="workspace-trigger" data-dcnode-id="2684" href="#bib0155" name="bbib0155"><span data-dcnode-id="2685" instrument_node="">Stineman et al., 2014</span></a><span data-dcnode-id="2683" instrument_node="">). The ADL concept is an alternate expression of the Archaeology of the human experience (AHE) (</span><a class="workspace-trigger" data-dcnode-id="2681" href="#bib0075" name="bbib0075"><span data-dcnode-id="2682" instrument_node="">Hegman, 2016</span></a><span data-dcnode-id="2680" instrument_node="">). While the AHE considers broadly what it was like to live in the past using archaeological evidence, ADLs in contrast use our knowledge of the pathophysiological impact of disease on individuals within a population and considers what that person could or could not do. These activities of daily living can be further subdivided into basic activities of daily living (BADLs) and instrumental activities of daily living (IADLs). BADLs include such functions as bathing, dressing, and cooking. IADLs include activities requiring greater metabolic cost including the ability to walk, carry loads, and conduct activities indicative of a productive member of the social and cultural group.</span></p><p data-dcnode-id="2674" id="par0180"><span data-dcnode-id="2678" instrument_node="">Regarding the case at hand, the individual would likely have been able to conduct BADL activities with little difficulty and only minor adaptations. For example, grooming and cooking could be accomplished with the potential of conducting such activities in a seated position with necessary breaks to relieve shortness of breath that may have arisen from the pulmonary and cardiac limitations described. However, there would be poor physiologic reserves to call on as activities demanded greater metabolic work. It is important to note that these diseases often present with periodic or episodic exacerbations, during which the individual would require more direct assistance with BADLs (</span><a class="workspace-trigger" data-dcnode-id="2676" href="#bib0125" name="bbib0125"><span data-dcnode-id="2677" instrument_node="">Nakken, 2017</span></a><span data-dcnode-id="2675" instrument_node="">).</span></p><p data-dcnode-id="2662" id="par0185"><span data-dcnode-id="2669"><span data-dcnode-id="2673" instrument_node="">The greater functional impact associated with these diagnoses are related to the IADLs. Based on the limited lung capacity and function, this individual would have had a reduced ability to walk and carry even the lightest of loads. Considering the potential for muscle wasting, this individual would have had challenges associated with maintaining balance when moving about. The mechanical ability to lift objects would be markedly reduced. Walking would require frequent rest periods and the natural accommodation of using pursed lipped breathing (exhaling against pursed lips creates a back pressure on the airways helping to maintain </span><a class="topic-link" data-dcnode-id="2671" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.sciencedirect.com/topics/biochemistry-genetics-and-molecular-biology/patency" title="Learn more about patency from ScienceDirect's AI-generated Topic Pages"><span data-dcnode-id="2672" instrument_node="">patency</span></a><span data-dcnode-id="2670" instrument_node=""> and allowing for a more complete exhalation and CO</span></span><sub data-dcnode-id="2667"><span data-dcnode-id="2668" instrument_node="">2</span></sub><span data-dcnode-id="2666" instrument_node=""> removal) (</span><a class="workspace-trigger" data-dcnode-id="2664" href="#bib0195" name="bbib0195"><span data-dcnode-id="2665" instrument_node="">Ydentes et al., 2011</span></a><span data-dcnode-id="2663" instrument_node="">). Maneuvering in or around challenging environments would be difficult, and poor balance would predispose this individual to frequent falls, posing additional risks in, and obstacles to involvement in many social or cultural activities.</span></p><p data-dcnode-id="2657" id="par0190"><span data-dcnode-id="2661" instrument_node="">From a pathophysiological perspective, the disease medley presents itself as a progressive process that requires greater care as these diseases complete their pathogenesis. The impact on the individual, which in turn suggests the pattern of care required, must be considered from three perspectives. First, in the chronic state, the individual would have required little to no assistance with BADLs, yet considerable assistance with IADLs. Second, during the periods of acute exacerbations and possible opportunistic respiratory infections brought on by the reduction in </span><a class="topic-link" data-dcnode-id="2659" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.sciencedirect.com/topics/medicine-and-dentistry/lung-clearance" title="Learn more about pulmonary clearance from ScienceDirect's AI-generated Topic Pages"><span data-dcnode-id="2660" instrument_node="">pulmonary clearance</span></a><span data-dcnode-id="2658" instrument_node=""> ability, the individual would have required assistance with both BADLs and IADLs, with additional medical interventions being required. Third, as the disease progresses, assistance and care would have been required for all activities at all times.</span></p><p data-dcnode-id="2614" id="par0195"><span data-dcnode-id="2652"><span data-dcnode-id="2656" instrument_node="">The subject of this study was in a </span><a class="topic-link" data-dcnode-id="2654" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.sciencedirect.com/topics/social-sciences/psychiatric-care" title="Learn more about psychiatric care from ScienceDirect's AI-generated Topic Pages"><span data-dcnode-id="2655" instrument_node="">psychiatric care</span></a><span data-dcnode-id="2653" instrument_node=""> facility, thus it is safe to assume that her medical needs were attended to according the standards of practice at that time. If the subject had difficulty with ADLs the medical and assistive staff would likely have offered assistance where this was possible/practical; for example, photographs of the Trans-Allegheny Lunatic Asylum show that assistive devices such as wheelchairs were available. The pattern of care for this individual would have also included medicinal interventions aimed at relieving the symptomology associated with respiratory disease. According to Dr. Henry Hyde </span></span><a class="workspace-trigger" data-dcnode-id="2650" href="#bib0145" name="bbib0145"><span data-dcnode-id="2651" instrument_node="">Salter (1882)</span></a><span data-dcnode-id="2649" instrument_node=""> during the mid to late 19</span><sup data-dcnode-id="2647"><span data-dcnode-id="2648" instrument_node="">th</span></sup><span data-dcnode-id="2638"><span data-dcnode-id="2642"><span data-dcnode-id="2646" instrument_node=""> century, respiratory difficulty was treated with a variety of medications. </span><a class="topic-link" data-dcnode-id="2644" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.sciencedirect.com/topics/medicine-and-dentistry/ipecac" title="Learn more about Ipecac from ScienceDirect's AI-generated Topic Pages"><span data-dcnode-id="2645" instrument_node="">Ipecac</span></a><span data-dcnode-id="2643" instrument_node="">, an </span></span><a class="topic-link" data-dcnode-id="2640" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.sciencedirect.com/topics/medicine-and-dentistry/emetic-agent" title="Learn more about emetic from ScienceDirect's AI-generated Topic Pages"><span data-dcnode-id="2641" instrument_node="">emetic</span></a><span data-dcnode-id="2639" instrument_node="">, was administered to take pressure off the diaphragm, allowing this major muscle of ventilation more room to descend into the space vacated by the now empty stomach (</span></span><a class="workspace-trigger" data-dcnode-id="2636" href="#bib0145" name="bbib0145"><span data-dcnode-id="2637" instrument_node="">Salter, 1882</span></a><span data-dcnode-id="2615"><span data-dcnode-id="2619"><span data-dcnode-id="2623"><span data-dcnode-id="2631"><span data-dcnode-id="2635" instrument_node="">). Breathing difficulty was thought to be associated with fatigue, so several agents including tobacco, strong coffee, </span><a class="topic-link" data-dcnode-id="2633" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.sciencedirect.com/topics/biochemistry-genetics-and-molecular-biology/cannabis-sativa-subsp-indica" title="Learn more about Indian hemp from ScienceDirect's AI-generated Topic Pages"><span data-dcnode-id="2634" instrument_node="">Indian hemp</span></a><span data-dcnode-id="2632" instrument_node="">, and alcohol were used to stimulate the nervous system and enhance mental acuity. Coffee had the extra benefit of being a </span></span><a class="topic-link" data-dcnode-id="2629" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.sciencedirect.com/topics/medicine-and-dentistry/methylxanthine" title="Learn more about methylxanthine from ScienceDirect's AI-generated Topic Pages"><span data-dcnode-id="2630" instrument_node="">methylxanthine</span></a><span data-dcnode-id="2624"><span data-dcnode-id="2628" instrument_node="">, a class of medicines used in pulmonary medicine to dilate airways to this day. Observations suggested that sleep or rest may alleviate or reverse </span><a class="topic-link" data-dcnode-id="2626" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.sciencedirect.com/topics/medicine-and-dentistry/bronchospasm" title="Learn more about bronchospasm from ScienceDirect's AI-generated Topic Pages"><span data-dcnode-id="2627" instrument_node="">bronchospasm</span></a><span data-dcnode-id="2625" instrument_node=""> associated with respiratory disease. Agents such as smoked opium and stammonium, which is related to </span></span></span><a class="topic-link" data-dcnode-id="2621" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.sciencedirect.com/topics/medicine-and-dentistry/atropine" title="Learn more about atropine from ScienceDirect's AI-generated Topic Pages"><span data-dcnode-id="2622" instrument_node="">atropine</span></a><span data-dcnode-id="2620" instrument_node="">, were used for relaxing the patient, while chloroform and ether were used to induce sleep. A substance called </span></span><a class="topic-link" data-dcnode-id="2617" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.sciencedirect.com/topics/medicine-and-dentistry/lobelia" title="Learn more about Lobelia from ScienceDirect's AI-generated Topic Pages"><span data-dcnode-id="2618" instrument_node="">Lobelia</span></a><span data-dcnode-id="2616" instrument_node="">, also known as pukeweed, was a Native American remedy in the late 19th century which induced vomiting and appeared to enhance airway mucous clearance (ibid). While we cannot be sure which of these interventions were used in this case, the practice standards would imply that some or all would have been employed at the asylum.</span></span></p><p data-dcnode-id="2612" id="par0200"><span data-dcnode-id="2613" instrument_node="">The pattern of care in this case included assistance with ADLs and, as needed, medicinal interventions, can be surmised with some degree of confidence. Although we cannot be certain, because the subject was resident in a medical facility she likely received some or all of the medications considered appropriate for her condition. Given the overcrowded conditions at the asylum we cannot be certain of the level or consistency of interventions she received. Were the subject not an inpatient of the asylum, her access to such support could not be assumed without written records or other evidence this particular case study, therefore, illustrates the pivotal role of contextual information in hypothesizing likely care received.</span></p></section></section><section data-dcnode-id="2472" id="sec0055"><h2 class="u-h3 u-margin-l-top u-margin-xs-bottom" data-dcnode-id="2606" id="sect0065"><span data-dcnode-id="2609" instrument_node="">4</span><span data-dcnode-id="2608" instrument_node="">. </span><span data-dcnode-id="2607" instrument_node="">Discussion</span></h2><p data-dcnode-id="2601" id="par0205"><span data-dcnode-id="2605" instrument_node="">In bioarchaeology of care research, probable patterns of care in response to disease are based on an understanding of the </span><a class="topic-link" data-dcnode-id="2603" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.sciencedirect.com/topics/medicine-and-dentistry/pathophysiology" title="Learn more about pathophysiology from ScienceDirect's AI-generated Topic Pages"><span data-dcnode-id="2604" instrument_node="">pathophysiology</span></a><span data-dcnode-id="2602" instrument_node=""> of the given diagnosis and of the features (demands and opportunities) of the individual’s lifeways. There are additional intangibles that need be considered as well. The psychological status of the individual cannot be readily known and will almost inevitably affect their functional level. How an individual responds to challenges associated with pathophysiological change is highly variable. Individual motivation is also not readily accessible in the bioarchaeological record, nor is evidence for social or psychological support. With that said, the archaeological record associated with a given case or culture may well offer clues regarding potential for any care rendered.</span></p><p data-dcnode-id="2577" id="par0210"><span data-dcnode-id="2600" instrument_node="">While we must be cautious not to identify and interpret evidence of care in the archaeological record based on modern understandings and interactions, we can use some modern tools to assist us in achieving an understanding of the functional limitations associated with a given condition. As illustrated in the current case presentation, shortness of breath and the reduced ability to do work are associated with many pulmonary and cardiac disorders. In present day pulmonary medicine and in rehabilitation efforts of both pulmonary and cardiac diseases, practitioners use the Borg Scale, also known as the rating of perceived exertion (RPE), to determine the experience of the patient as it relates to their experience of physiological challenge (</span><a class="workspace-trigger" data-dcnode-id="2598" href="#bib0025" name="bbib0025"><span data-dcnode-id="2599" instrument_node="">Borg, 1998</span></a><span data-dcnode-id="2581"><span data-dcnode-id="2597" instrument_node="">). The scale is generally scored from 6 to 20; a rating of 6 is ‘no perceived exertion’, 7 is ‘extremely light’, 9 is ‘very light exertion’, 11 is ‘light’, 13 is ‘somewhat hard’, 15 is ‘hard’, 17 is ‘very hard’, 19 is ‘extremely hard’, and 20 is ‘maximal exertion’. The RPE correlates well with increased airflow obstruction measures such as </span><a class="topic-link" data-dcnode-id="2595" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.sciencedirect.com/topics/medicine-and-dentistry/forced-expiratory-volume" title="Learn more about Forced Expiratory Volume from ScienceDirect's AI-generated Topic Pages"><span data-dcnode-id="2596" instrument_node="">Forced Expiratory Volume</span></a><span data-dcnode-id="2582"><span data-dcnode-id="2594" instrument_node=""> in one second (FEV1) and the FEV1/Vital Capacity ratio found on </span><a class="topic-link" data-dcnode-id="2592" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.sciencedirect.com/topics/medicine-and-dentistry/pulmonary-function-testing" title="Learn more about pulmonary function testing from ScienceDirect's AI-generated Topic Pages"><span data-dcnode-id="2593" instrument_node="">pulmonary function testing</span></a><span data-dcnode-id="2583"><span data-dcnode-id="2591" instrument_node=""> of patients with </span><a class="topic-link" data-dcnode-id="2589" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.sciencedirect.com/topics/medicine-and-dentistry/chronic-obstructive-pulmonary-disease" title="Learn more about obstructive pulmonary disease from ScienceDirect's AI-generated Topic Pages"><span data-dcnode-id="2590" instrument_node="">obstructive pulmonary disease</span></a><span data-dcnode-id="2584"><span data-dcnode-id="2588" instrument_node=""> like </span><a class="topic-link" data-dcnode-id="2586" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.sciencedirect.com/topics/medicine-and-dentistry/emphysema" title="Learn more about emphysema from ScienceDirect's AI-generated Topic Pages"><span data-dcnode-id="2587" instrument_node="">emphysema</span></a><span data-dcnode-id="2585" instrument_node=""> (</span></span></span></span></span><a class="workspace-trigger" data-dcnode-id="2579" href="#bib0050" name="bbib0050"><span data-dcnode-id="2580" instrument_node="">Chida et al., 1991</span></a><span data-dcnode-id="2578" instrument_node="">). Simply stated, the greater the airway obstruction, the higher the RPE for any given activity.</span></p><p data-dcnode-id="2565" id="par0215"><span data-dcnode-id="2572"><span data-dcnode-id="2576" instrument_node="">In modern cases many activities of daily living are plotted against the Borg scale to determine the degree of felt exertion and thus the functional limits of the individual. For example, individuals with emphysema would rate vacuuming the carpet as </span><a class="topic-link" data-dcnode-id="2574" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.sciencedirect.com/topics/medicine-and-dentistry/n-bis-1-aziridinyl-phosphinyl-4-iodobenzamide" title="Learn more about a 19 from ScienceDirect's AI-generated Topic Pages"><span data-dcnode-id="2575" instrument_node="">a 19</span></a><span data-dcnode-id="2573" instrument_node=""> or 20 on the RPE, while a 6 would be scored for peeling potatoes (</span></span><a class="workspace-trigger" data-dcnode-id="2570" href="#bib0105" name="bbib0105"><span data-dcnode-id="2571" instrument_node="">Lahaije et al., 2010</span></a><span data-dcnode-id="2569" instrument_node="">). Midpoints on the RPE may relate to walking up one flight of stairs or loading a washing machine (</span><a class="workspace-trigger" data-dcnode-id="2567" href="#bib0105" name="bbib0105"><span data-dcnode-id="2568" instrument_node="">Lahaije et al., 2010</span></a><span data-dcnode-id="2566" instrument_node="">). Clearly modern-day tasks may have no direct correlation with the activities of a past culture. However, from the bioarchaeological information, corollaries may be proposed. For example, the activity of climbing stairs might be compared with activities undertaken by those living in hilly regions who are required to walk up and down between home and fields or water sources; for past and present individuals with emphysema these activities would likely score an equivalent rating on the Borg scale. Similarly, while there may not have been the specific activity of vacuuming in ancient cultures, this might be regarded as a rough proxy for the back and forth motion of using a tool in planting or hoeing activities in early agriculture – both activities would likely be scored near 20 on the RPE. From RPE data, activity score profiles associated with specific diseases (in modern times) have been developed. When studying individuals with the same disease from a past culture we can reasonably hypothesize that they, too, likely experienced similar levels of challenge when performing certain activities as part of their cultural practice. We can then infer, with very high probability, that this individual would not have been able to have performed this particular activity without accommodation - such as taking breaks, or receiving special assistance.</span></p><p data-dcnode-id="2536" id="par0220"><span data-dcnode-id="2564" instrument_node="">The RPE is based on our knowledge of the physiologic ‘cost’ in terms of oxygen consumption (VO</span><sub data-dcnode-id="2562"><span data-dcnode-id="2563" instrument_node="">2</span></sub><span data-dcnode-id="2553"><span data-dcnode-id="2561" instrument_node="">) of various physical activities. The amount of energy expended during exertion relative to </span><a class="topic-link" data-dcnode-id="2559" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.sciencedirect.com/topics/medicine-and-dentistry/resting-energy-expenditure" title="Learn more about resting energy expenditure from ScienceDirect's AI-generated Topic Pages"><span data-dcnode-id="2560" instrument_node="">resting energy expenditure</span></a><span data-dcnode-id="2554"><span data-dcnode-id="2558" instrument_node=""> (REE) is referred to as a </span><a class="topic-link" data-dcnode-id="2556" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.sciencedirect.com/topics/medicine-and-dentistry/metabolic-equivalent" title="Learn more about metabolic equivalent from ScienceDirect's AI-generated Topic Pages"><span data-dcnode-id="2557" instrument_node="">metabolic equivalent</span></a><span data-dcnode-id="2555" instrument_node="">, or MET (</span></span></span><a class="workspace-trigger" data-dcnode-id="2551" href="#bib0090" name="bbib0090"><span data-dcnode-id="2552" instrument_node="">Hills et al., 2014</span></a><span data-dcnode-id="2550" instrument_node="">). The normal REE for an individual without disease is 3.5–4.0 ml of O</span><sub data-dcnode-id="2548"><span data-dcnode-id="2549" instrument_node="">2</span></sub><span data-dcnode-id="2547" instrument_node=""> consumed/kg/min. METs have been measured for various physical exercises including walking, household activities, and leisure time/sports activities and have been grouped in to categories of energy expenditure with those activities requiring &lt; than 3 METs characterized as ‘light’, &lt; 3–6 &gt; METs as ‘moderate’, and activities requiring &gt;6 METs as ‘vigorous’. (</span><a class="workspace-trigger" data-dcnode-id="2545" href="#bib0005" name="bbib0005"><span data-dcnode-id="2546" instrument_node="">Ainsworth et al., 2000</span></a><span data-dcnode-id="2544" instrument_node="">) According to </span><a class="workspace-trigger" data-dcnode-id="2542" href="#bib0005" name="bbib0005"><span data-dcnode-id="2543" instrument_node="">Ainsworth et al. (2000)</span></a><span data-dcnode-id="2537"><span data-dcnode-id="2541" instrument_node=""> examples of light energy expenditure includes walking slowly, sitting, and standing while doing light work. Moderate energy expenditure includes walking around 3 mph, brisk walking around 4 mph, household chores like cleaning windows, sweeping floors, vacuuming, mopping, </span><a class="topic-link" data-dcnode-id="2539" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.sciencedirect.com/topics/social-sciences/carpentry" title="Learn more about carpentry from ScienceDirect's AI-generated Topic Pages"><span data-dcnode-id="2540" instrument_node="">carpentry</span></a><span data-dcnode-id="2538" instrument_node="">, carrying or stacking wood, and gardening activities like hoeing. Any leisure activity that may relate to cultural practices such as dancing or swimming should be considered as well and would represent moderate to vigorous energy expenditure. Vigorous energy expenditure would include walking up inclines, brisk walking, jogging, running, shoveling sand/coal, carrying heavy loads, heavier farming activities that involve lifting or digging. and activities such as irrigation ditch excavation and grave digging.</span></span></p><div data-dcnode-id="2478"><p data-dcnode-id="2522" id="par0225"><span data-dcnode-id="2535" instrument_node="">Thus, the RPE is dependent on the METs required by a given activity and the energy cost of those activities in terms of VO</span><sub data-dcnode-id="2533"><span data-dcnode-id="2534" instrument_node="">2</span></sub><span data-dcnode-id="2532" instrument_node="">. Individuals with a reduced physiologic capacity due to a pathophysiologic condition would expend greater energy for a given task when compared to those with normal capacity. Those suffering from the disease would therefore have a higher RPE for any given task and experience clear limitations in attempting work with higher METs requirements (</span><a class="workspace-trigger" data-dcnode-id="2530" href="#bib0050" name="bbib0050"><span data-dcnode-id="2531" instrument_node="">Chida et al., 1991</span></a><span data-dcnode-id="2529" instrument_node="">). </span><a class="workspace-trigger" data-dcnode-id="2527" href="#fig0035" name="bfig0035"><span data-dcnode-id="2528" instrument_node="">Fig. 7</span></a><span data-dcnode-id="2526" instrument_node=""> describes the relationship between workload energy requirements (METs), VO</span><sub data-dcnode-id="2524"><span data-dcnode-id="2525" instrument_node="">2</span></sub><span data-dcnode-id="2523" instrument_node="">, and RPE, and compares the likely energy demands made on a typical, healthy individual to those of someone with advancing pulmonary disease. This way of envisioning pulmonary disease impact allows a functional limitation profile in terms of their ability to perform light, moderate, or vigorous activities appropriate to the historical context, to be developed for an affected individual with some degree of accuracy.</span></p><figure class="figure text-xs" data-dcnode-id="2479" id="fig0035"><span data-dcnode-id="2506"><img alt="Fig. 7" aria-describedby="cap0035" data-dcnode-id="2521" height="328" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//ars.els-cdn.com/content/image/1-s2.0-S1879981718300640-gr7.jpg&amp;raw"><span data-dcnode-id="2520" instrument_node=""></span><ol class="links-for-figure" data-dcnode-id="2507"><li data-dcnode-id="2514"><a class="anchor download-link u-font-sans" data-dcnode-id="2515" download="" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//ars.els-cdn.com/content/image/1-s2.0-S1879981718300640-gr7_lrg.jpg" target="_blank" title="Download high-res image (203KB)"><span class="anchor-text" data-dcnode-id="2516"><span data-dcnode-id="2519" instrument_node="">Download : </span><span class="download-link-title" data-dcnode-id="2517"><span data-dcnode-id="2518" instrument_node="">Download high-res image (203KB)</span></span></span></a></li><li data-dcnode-id="2508"><a class="anchor download-link u-font-sans" data-dcnode-id="2509" download="" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//ars.els-cdn.com/content/image/1-s2.0-S1879981718300640-gr7.jpg" target="_blank" title="Download full-size image"><span class="anchor-text" data-dcnode-id="2510"><span data-dcnode-id="2513" instrument_node="">Download : </span><span class="download-link-title" data-dcnode-id="2511"><span data-dcnode-id="2512" instrument_node="">Download full-size image</span></span></span></a></li></ol></span><span class="captions" data-dcnode-id="2480"><span data-dcnode-id="2481" id="cap0035"><p data-dcnode-id="2482" id="spar0035"><span class="label" data-dcnode-id="2504"><span data-dcnode-id="2505" instrument_node="">Fig. 7</span></span><span data-dcnode-id="2503" instrument_node="">. </span><span data-dcnode-id="2502" instrument_node="">The relationship among oxygen consumption (VO</span><sub data-dcnode-id="2500"><span data-dcnode-id="2501" instrument_node="">2</span></sub><span data-dcnode-id="2495"><span data-dcnode-id="2499" instrument_node="">), workload energy requirements (METs), and rating of perceived exertion (RPE) [See text for a more complete explanation of these variables]. The solid line represents normal relationships while the broken line represents an individual with pulmonary limitations to work as seen in </span><a class="topic-link" data-dcnode-id="2497" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.sciencedirect.com/topics/medicine-and-dentistry/emphysema" title="Learn more about emphysema from ScienceDirect's AI-generated Topic Pages"><span data-dcnode-id="2498" instrument_node="">emphysema</span></a><span data-dcnode-id="2496" instrument_node="">. The VO</span></span><sub data-dcnode-id="2493"><span data-dcnode-id="2494" instrument_node="">2</span></sub><span data-dcnode-id="2492" instrument_node=""> rises in relation to the imposed workload (METs). The RPE rises as a result of the rising VO</span><sub data-dcnode-id="2490"><span data-dcnode-id="2491" instrument_node="">2</span></sub><span data-dcnode-id="2489" instrument_node="">. In the case of an individual with a pulmonary limitation to work (broken line), the VO</span><sub data-dcnode-id="2487"><span data-dcnode-id="2488" instrument_node="">2</span></sub><span data-dcnode-id="2486" instrument_node=""> rises at lower workloads (METs). Thus, the RPE rises sooner resulting in a decreased tolerance of increased work demands limiting activity (</span><a class="workspace-trigger" data-dcnode-id="2484" href="#bib0050" name="bbib0050"><span data-dcnode-id="2485" instrument_node="">Chida et al., 1991</span></a><span data-dcnode-id="2483" instrument_node="">). Note: In the archaeological context, the pulmonary limitation trajectory depicted here is extrapolated from modern clinical research. (Chart courtesy of author RGB).</span></p></span></span></figure></div><p data-dcnode-id="2473" id="par0230"><span data-dcnode-id="2477" instrument_node="">With regards to the subject of our case (an inmate of a ‘Mental Asylum’), we do not know if she had the mental capacity to undertake formal work routines. Given that both </span><a class="topic-link" data-dcnode-id="2475" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.sciencedirect.com/topics/medicine-and-dentistry/pneumoconiosis" title="Learn more about CWP from ScienceDirect's AI-generated Topic Pages"><span data-dcnode-id="2476" instrument_node="">CWP</span></a><span data-dcnode-id="2474" instrument_node=""> and emphysema are progressive in nature, she would have been increasingly challenged in the most basic activities – such as walking on flat surfaces, managing stairs and /or steps, bathing and grooming, eating, let alone the tasks involved in meeting farm, dairy, waterworks or cemetery work responsibilities. The profile of our subject would likely be that of an individual who could perform light context related activities (&lt;3 METS), trouble with context related moderate activities (&lt;3–6 &gt;METS), and would not be able to perform those context related vigorous activities (&gt;6 METS).</span></p></section><section data-dcnode-id="2453" id="sec0060"><h2 class="u-h3 u-margin-l-top u-margin-xs-bottom" data-dcnode-id="2468" id="sect0070"><span data-dcnode-id="2471" instrument_node="">5</span><span data-dcnode-id="2470" instrument_node="">. </span><span data-dcnode-id="2469" instrument_node="">Conclusion</span></h2><p data-dcnode-id="2459" id="par0235"><span data-dcnode-id="2463"><span data-dcnode-id="2467" instrument_node="">Where evidence in human remains suggests that an individual lived despite experiencing serious disease, the bioarchaeology of care approach seeks to approximate this individual’s need for care, ascertain the probability that care was given, and identify the pattern of care likely provided. In order to accomplish this an accurate diagnosis is important. Diagnostic potential is greatly enhanced when mummified soft tissues such as organs are preserved. Once the diagnosis is made and differentials established, the life experience and the need for care is determined by considering the functional impact on the individual in the context of their lifeways. Identifying the pathology alone is not sufficient to understand the experience of disease by the individual while alive. Detailed pathophysiological characteristics and their impact on the cells, organs, organ systems and the organism must be understood to fully appreciate functional limitations present in a given case. In both cases – in the diagnosis and in the understanding of functional limitations – </span><a class="topic-link" data-dcnode-id="2465" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.sciencedirect.com/topics/medicine-and-dentistry/teamwork" title="Learn more about teamwork from ScienceDirect's AI-generated Topic Pages"><span data-dcnode-id="2466" instrument_node="">teamwork</span></a><span data-dcnode-id="2464" instrument_node=""> is the critical factor. Deriving an </span></span><strong data-dcnode-id="2461"><span data-dcnode-id="2462" instrument_node="">inter</span></strong><span data-dcnode-id="2460" instrument_node="">disciplinary diagnosis by consensus is at the heart of this process.</span></p><p data-dcnode-id="2454" id="par0240"><span data-dcnode-id="2458" instrument_node="">While diagnosis of disease in mummified remains has made great advances, the bioarchaeology of care concept requires us to expand on current diagnostic models by including practitioners who can attest to the impact of the determined condition on functionality. Teaming with contextual experts is key to trying to work out what care might have been undertaken based on tools, aids, assistive devices or obvious medical interventions present in the contemporary archaeological record. Consideration of the social structure that allowed the individual to survive the initial onset of a disease is also critical. In our case study we believe it is safe to assume that, since this individual was an inpatient at a </span><a class="topic-link" data-dcnode-id="2456" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.sciencedirect.com/topics/social-sciences/psychiatric-hospital" title="Learn more about psychiatric hospital from ScienceDirect's AI-generated Topic Pages"><span data-dcnode-id="2457" instrument_node="">psychiatric hospital</span></a><span data-dcnode-id="2455" instrument_node="">, reasonable medical care was given. However, it is interesting that while the care received at the asylum allowed this person to continue living as the disease progressed, the overcrowded conditions and reliance on coal as a heating source may have, in turn, contributed to the progression of that disease.</span></p></section><section data-dcnode-id="2448" id="sec0065"><h2 class="u-h3 u-margin-l-top u-margin-xs-bottom" data-dcnode-id="2451" id="sect0075"><span data-dcnode-id="2452" instrument_node="">Funding</span></h2><p data-dcnode-id="2449" id="par0245"><span data-dcnode-id="2450" instrument_node="">This research did not receive any specific grant from funding agencies in the public, commercial, or not-for-profit sectors.</span></p></section></div><section data-dcnode-id="2436" id="ack0005"><h2 class="u-h3 u-margin-l-top u-margin-xs-bottom" data-dcnode-id="2445" id="sect0080"><span data-dcnode-id="2446" instrument_node="">Acknowledgements</span></h2><p data-dcnode-id="2437" id="par0250"><span data-dcnode-id="2444" instrument_node="">The authors would like to acknowledge the </span><span data-dcnode-id="2442" id="gs0005"><span data-dcnode-id="2443" instrument_node="">Bioanthropology Research Institute at Quinnipiac University</span></span><span data-dcnode-id="2441" instrument_node=""> and the </span><span data-dcnode-id="2439" id="gs0010"><span data-dcnode-id="2440" instrument_node="">Barbour County Historical Museum, Philippi, West Virginia</span></span><span data-dcnode-id="2438" instrument_node=""> for their support.</span></p></section></div><div class="related-content-links u-hide-from-md" data-dcnode-id="2428"><button class="button button-anchor vsi-button" data-dcnode-id="2432" type="button"><span class="button-text" data-dcnode-id="2433"><span data-dcnode-id="2434" instrument_node="">Special issue articles</span></span></button><button class="button button-anchor" data-dcnode-id="2429" type="button"><span class="button-text" data-dcnode-id="2430"><span data-dcnode-id="2431" instrument_node="">Recommended articles</span></span></button></div><div class="Tail" data-dcnode-id="2427"></div><section class="bibliography u-font-serif text-s" data-dcnode-id="319" id="bibl0005"><h2 class="section-title u-h3 u-margin-l-top u-margin-xs-bottom" data-dcnode-id="2425"><span data-dcnode-id="2426" instrument_node="">References</span></h2><section class="bibliography-sec" data-dcnode-id="320" id="bibs0005"><dl class="references" data-dcnode-id="321" id="reference-links-bibs0005"><dt class="label" data-dcnode-id="2422"><a data-aa-button="sd:product:journal:article:location=references:type=anchor:name=citation-name" data-dcnode-id="2423" href="#bbib0005" id="ref-id-bib0005"><span data-dcnode-id="2424" instrument_node="">Ainsworth et al., 2000</span></a></dt><dd class="reference" data-dcnode-id="2371" id="sbref0005"><div class="contribution" data-dcnode-id="2409"><span data-dcnode-id="2421" instrument_node="">B.E.</span><span data-dcnode-id="2419" instrument_node=""> </span><span data-dcnode-id="2417" instrument_node="">Ainsworth</span><span data-dcnode-id="2415" instrument_node="">, </span><em data-dcnode-id="2413"><span data-dcnode-id="2414" instrument_node=""> et al.</span></em><div data-dcnode-id="2410" id="ref-id-sbref0005"><strong class="title" data-dcnode-id="2411"><span data-dcnode-id="2412" instrument_node="">Compendium of physical activities: an update of activity codes and MET intensities</span></strong></div></div><div class="host" data-dcnode-id="2383"><span data-dcnode-id="2408" instrument_node="">Med. Sci. Sports Exerc.</span><span data-dcnode-id="2406" instrument_node="">, </span><span data-dcnode-id="2404" instrument_nod 011%26author%3DJ.M.%2520Ydentes" rel="noopener noreferrer" target="_blank"><span data-dcnode-id="325" instrument_node="">Google Scholar</span></a></div></dd></dl></section></section><div data-dcnode-id="259" id="section-cited-by"><section class="ListArticles preview" data-dcnode-id="260"><div class="PageDivider" data-dcnode-id="318"></div><header data-dcnode-id="315" id="citing-articles-header"><h2 class="u-h3 u-margin-l-ver u-font-serif" data-dcnode-id="316"><span data-dcnode-id="317" instrument_node="">Cited by (2)</span></h2></header><div aria-describedby="citing-articles-header" data-dcnode-id="261"><div class="citing-articles u-margin-l-bottom" data-dcnode-id="262"><ul data-dcnode-id="264"><li class="ListArticleItem" data-dcnode-id="297"><div class="sub-heading" data-dcnode-id="309"><a data-dcnode-id="312" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.sciencedirect.com/science/article/pii/S1040618222000726" target="_self"><h3 class="article-title ellipsis text-s" data-dcnode-id="313" id="citing-articles-article0-title"><span data-dcnode-id="314" instrument_node="">Beyond dirty teeth: Integrating dental calculus studies with osteoarchaeological parameters</span></h3></a><div class="article-source ellipsis" data-dcnode-id="310"><span data-dcnode-id="311" instrument_node="">2022, Quaternary International</span></div></div><div class="buttons" data-dcnode-id="303"><button aria-controls="citing-articles-article0" aria-describedby="citing-articles-article0-title" aria-expanded="false" class="button-link button-link-secondary list-item-details-toggle" data-aa-button="sd:product:journal:article:location=citing-articles:type=view-details" data-dcnode-id="304" type="button"><span class="button-link-text" data-dcnode-id="307"><span data-dcnode-id="308" instrument_node="">Show abstract</span></span><svg class="icon icon-navigate-down" data-dcnode-id="305" focusable="false" height="24" viewBox="0 0 92 128" width="17.25"><path d="m1 51l7-7 38 38 38-38 7 7-45 45z" data-dcnode-id="306"></path></svg></button></div><div aria-hidden="true" class="u-display-none" data-dcnode-id="298"><div class="abstract u-margin-m-ver u-margin-xs-right u-font-serif branded" data-dcnode-id="299" id="reference-abstract"><div class="u-margin-ver-m abstract-font" data-dcnode-id="300"><p data-dcnode-id="301" id="abspara0010"><span data-dcnode-id="302" instrument_node="">The study of ancient human dental calculus (mineralized dental plaque, also known as tartar) is becoming increasingly important in osteoarchaeology, human palaeoecology and environmental archaeology. Microremains of different origin (e.g. starch granules, pollen, phytoliths, feather barbules) as well as biomolecules and chemical compounds retrieved from its mineral matrix may represent an important link between past humans and their physical, biological and social environment, but they are rarely fully linked to the evidence from skeletal remains. This paper critically reviews the lines of evidence retrieved from dental calculus in relation to osteoarchaeological parameters, employing macroscopic, microscopic and biomolecular approaches, assessing synergy potential and limitations. The scope of this paper is also to contribute to the building of a much needed theoretical framework in this emerging subfield.</span></p></div></div></div></li><li class="ListArticleItem" data-dcnode-id="265"><div class="sub-heading" data-dcnode-id="291"><a data-dcnode-id="294" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.sciencedirect.com/science/article/pii/S187998172100019X" target="_self"><h3 class="article-title ellipsis text-s" data-dcnode-id="295" id="citing-articles-article1-title"><span data-dcnode-id="296" instrument_node="">Challenging definitions and diagnostic approaches for ancient rare diseases: The case of poliomyelitis</span></h3></a><div class="article-source ellipsis" data-dcnode-id="292"><span data-dcnode-id="293" instrument_node="">2021, International Journal of Paleopathology</span></div></div><div class="buttons" data-dcnode-id="285"><button aria-controls="citing-articles-article1" aria-describedby="citing-articles-article1-title" aria-expanded="false" class="button-link button-link-secondary list-item-details-toggle" data-aa-button="sd:product:journal:article:location=citing-articles:type=view-details" data-dcnode-id="286" type="button"><span class="button-link-text" data-dcnode-id="289"><span data-dcnode-id="290" instrument_node="">Show abstract</span></span><svg class="icon icon-navigate-down" data-dcnode-id="287" focusable="false" height="24" viewBox="0 0 92 128" width="17.25"><path d="m1 51l7-7 38 38 38-38 7 7-45 45z" data-dcnode-id="288"></path></svg></button></div><div aria-hidden="true" class="u-display-none" data-dcnode-id="266"><div class="abstract u-margin-m-ver u-margin-xs-right u-font-serif branded" data-dcnode-id="267" id="reference-abstract"><div class="u-margin-ver-m abstract-font" data-dcnode-id="268"><p data-dcnode-id="283" id="spar0075"><span data-dcnode-id="284" instrument_node="">This paper aims to contribute to the definition of ancient rare diseases in skeletons displaying pathologies associated with paralysis. It uses a new suite of methods, which can be applied to challenging cases of possible paralysis in archaeologically-derived human skeletal material, specifically applied to the identification of poliomyelitis.</span></p><p data-dcnode-id="281" id="spar0080"><span data-dcnode-id="282" instrument_node="">An adult male skeleton from Roman Halbturn, Austria.</span></p><p data-dcnode-id="279" id="spar0085"><span data-dcnode-id="280" instrument_node="">Morphological and entheseal change analyses, CT scans, X-rays, cross-section morphology, and histology, alongside modern clinical, as well as historic, literature were used to discuss paralyses.</span></p><p data-dcnode-id="277" id="spar0090"><span data-dcnode-id="278" instrument_node="">The results suggest a diagnosis of poliomyelitis; now considered a rare disease, but perhaps ubiquitous in antiquity, thus complicating the definition of ‘rare disease’.</span></p><p data-dcnode-id="275" id="spar0095"><span data-dcnode-id="276" instrument_node="">The integrated methodological procedures employed for this case constitutes a replicable and thorough approach to diagnosis, and explores the nature of ancient rare diseases. Due to the socio-environmental aspects of poliomyelitis transmission, it is likely that polio was likely not rare in the past. Therefore, the definition of ‘rare diseases in the past’ must include rarely occurring rarely diagnosed diseases due to biases and challenges within the archaeological and environmental record.</span></p><p data-dcnode-id="273" id="spar0100"><span data-dcnode-id="274" instrument_node="">The developed suite of methods has not been applied to establish a diagnosis of polio in the past.</span></p><p data-dcnode-id="271" id="spar0105"><span data-dcnode-id="272" instrument_node="">The individual considered in this study is fairly well-preserved; thus, this set of analyses may not be applicable to all remains where preservation is poor or highly fragmentary, and the discussion of rare diseases requires relatively secure diagnoses and context.</span></p><p data-dcnode-id="269" id="spar0110"><span data-dcnode-id="270" instrument_node="">Large collections and series of skeletal human remains are recommended to develop definitive conclusions.</span></p></div></div></div></li></ul><span data-dcnode-id="263" instrument_node=""></span></div></div></section></div><a class="anchor abstract-link" data-dcnode-id="256" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.sciencedirect.com/science/article/abs/pii/S1879981718300640"><span class="anchor-text" data-dcnode-id="257"><span data-dcnode-id="258" instrument_node="">View Abstract</span></span></a><div class="Copyright" data-dcnode-id="253"><span class="copyright-line" data-dcnode-id="254"><span data-dcnode-id="255" instrument_node="">© 2018 Elsevier Inc. All rights reserved.</span></span></div></article><div class="u-show-from-md col-lg-6 col-md-8 pad-right" data-dcnode-id="127"><aside aria-label="Related content" class="RelatedContent" data-dcnode-id="128"><section class="SpecialIssueArticles" data-dcnode-id="236" id="virtual-special-issue"><div class="part-of-issue u-padding-s-bottom" data-dcnode-id="237"><h2 class="part-of-issue-text u-h4" data-dcnode-id="250"><span data-dcnode-id="251" instrument_node="">Part of special issue:</span></h2><div data-dcnode-id="244"><a class="anchor part-of-issue-title" data-dcnode-id="247" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.sciencedirect.com/science/journal/18799817/vsi/10HPRG2SZ03"><span class="anchor-text" data-dcnode-id="248"><span data-dcnode-id="249" instrument_node="">SI: Special Issue: The Bioarchaeology of Care and Mummy Studies</span></span></a><span class="part-of-issue-editors" data-dcnode-id="245"><span data-dcnode-id="246" instrument_node="">Edited by Kenneth Nystrom, Lorna Tilley</span></span></div><div class="u-padding-s-bottom" data-dcnode-id="238"><a class="anchor download-virtual-special-issue anchor-has-inherit-color" data-dcnode-id="239" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.sciencedirect.com/science/journal/18799817/vsi/10HPRG2SZ03"><svg class="icon icon-navigate-right" data-dcnode-id="242" focusable="false" height="24" viewBox="0 0 54 128" width="10.125"><path d="m1 99l38-38-38-38 7-7 45 45-45 45z" data-dcnode-id="243"></path></svg><span class="anchor-text" data-dcnode-id="240"><span data-dcnode-id="241" instrument_node="">Download special issue</span></span></a></div></div></section><section class="SidePanel u-margin-s-bottom" data-dcnode-id="140"><header class="side-panel-header u-margin-s-bottom" data-dcnode-id="229" id="recommended-articles-header"><button aria-expanded="true" class="butto
