</span><h1 data-dcnode-id="321"><center data-dcnode-id="322"><span data-dcnode-id="323" instrument_node="">Lungs After Smoking</span></center></h1><span data-dcnode-id="320" instrument_node="">
</span><h4 data-dcnode-id="317"><center data-dcnode-id="318"><span data-dcnode-id="319" instrument_node="">Learn How Boosting Glutathione Will Enhance Your Health</span></center></h4><span data-dcnode-id="316" instrument_node="">
</span><blockquote data-dcnode-id="304"><p data-dcnode-id="314"><span data-dcnode-id="315" instrument_node="">New anecdotal evidence says no but many have found that it takes less effort to breathe.</span></p><span data-dcnode-id="313" instrument_node="">
</span><p data-dcnode-id="311"><span data-dcnode-id="312" instrument_node="">I come from a family of smokers. One of my two moms, a sister from time to time, a great aunt who outlived a smoking death prognosis by 15 years. She even outlived the doctor who gave it by several years. The thing is, please do not use this to beat up your loved ones. If and when they want to stop, they will.</span></p><span data-dcnode-id="310" instrument_node="">
</span><p data-dcnode-id="308"><span data-dcnode-id="309" instrument_node="">I am a firm believer that dill pickles cause lung cancer. Yet I do not go around trying to get my relatives to stop eating dill pickles.</span></p><span data-dcnode-id="307" instrument_node="">
</span><p data-dcnode-id="305"><span data-dcnode-id="306" instrument_node="">Think about it. Research shows that 98% of all lung cancer patients ate pickles. In Japan where they have the lowest lung cancer rates they have the lowest dill pickle consumption of the world. And Eskimos who never eat pickles never get lung cancer. Yes, pickles cause cancer.</span></p></blockquote><span data-dcnode-id="303" instrument_node="">
</span><h4 data-dcnode-id="301"><span data-dcnode-id="302" instrument_node="">Lungs After Smoking: Our Purpose</span></h4><span data-dcnode-id="300" instrument_node="">
</span><blockquote data-dcnode-id="285"><p data-dcnode-id="298"><span data-dcnode-id="299" instrument_node="">The purpose of this page is to explore the healing possibilities of boosting glutathione for those who have smoked and even those who continue to smoke.</span></p><span data-dcnode-id="297" instrument_node="">
</span><p data-dcnode-id="295"><span data-dcnode-id="296" instrument_node="">Yes, quitting smoking will allow your lungs to heal. In many cases you can return to near normal function depending on age and damage.</span></p><span data-dcnode-id="294" instrument_node="">
</span><p data-dcnode-id="292"><span data-dcnode-id="293" instrument_node="">The charts of what happens when in the progression of healing have been proved off. One chart cannot address all the confounding factors, ages and possibilities. Some studies actually show the healing time might be even longer than what the charts show.</span></p><span data-dcnode-id="291" instrument_node="">
</span><p data-dcnode-id="289"><span data-dcnode-id="290" instrument_node="">So if you are a smoker, we are not here to pass judgment on you. We are here to help you have the best quality of life you can have.</span></p><span data-dcnode-id="288" instrument_node="">
</span><p data-dcnode-id="286"><span data-dcnode-id="287" instrument_node="">If a loved one is still smoking and you want them to stop, this may provide an alternative to help prevent the disease processes associated with smoking. It may even help them kick the habit.</span></p></blockquote><span data-dcnode-id="284" instrument_node="">
</span><h4 data-dcnode-id="282"><span data-dcnode-id="283" instrument_node="">The Scientific Proof</span></h4><span data-dcnode-id="281" instrument_node="">
</span><blockquote data-dcnode-id="248"><p data-dcnode-id="279"><span data-dcnode-id="280" instrument_node="">As to the studies....</span></p><span data-dcnode-id="278" instrument_node="">
</span><p data-dcnode-id="273"><a data-dcnode-id="276" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.glutathionediseasecure.com/%25E2%2580%259Chttps%3A//www.uptodate.com/contents/chronic-obstructive-pulmonary-disease-definition-clinical-manifestations-diagnosis-and-staging%25E2%2580%259D" rel="nofollow"><span data-dcnode-id="277" instrument_node="">The COPD Risk:</span></a><a data-dcnode-id="274"><span data-dcnode-id="275" instrument_node=""> reduction is one of the benefits.</span></a></p><a data-dcnode-id="268"><span data-dcnode-id="272" instrument_node="">
</span><p data-dcnode-id="270"><span data-dcnode-id="271" instrument_node="">The conclusion: Stopping smoking results in a reduced risk of COPD exacerbation. It was dependent on how long the person had stopped smoking.</span></p><span data-dcnode-id="269" instrument_node="">
</span></a><p data-dcnode-id="261"><a data-dcnode-id="266"><span data-dcnode-id="267" instrument_node="">However, in the </span></a><a data-dcnode-id="264" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.ncbi.nlm.nih.gov/pubmed/17130377" rel="nofollow"><span data-dcnode-id="265" instrument_node="">Reduced Consumption</span></a><a data-dcnode-id="262"><span data-dcnode-id="263" instrument_node=""> study there was not real benefit in smoking less cigs a day.</span></a></p><a data-dcnode-id="256"><span data-dcnode-id="260" instrument_node="">
</span><p data-dcnode-id="258"><span data-dcnode-id="259" instrument_node="">The conclusion: There is no evidence that heavy smokers who reduce their daily cigarette consumption by half or more will reduce their risk of premature death significantly. To say otherwise will give false expectations.</span></p><span data-dcnode-id="257" instrument_node="">
</span></a><p data-dcnode-id="249"><a data-dcnode-id="254"><span data-dcnode-id="255" instrument_node="">The </span></a><a data-dcnode-id="252" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.ncbi.nlm.nih.gov/pubmed/19228666" rel="nofollow"><span data-dcnode-id="253" instrument_node="">Sustained Cessation</span></a><a data-dcnode-id="250"><span data-dcnode-id="251" instrument_node=""> study does have significant benefits for those who stop for good.</span></a></p></blockquote><a data-dcnode-id="230"><span data-dcnode-id="247" instrument_node="">
</span><h4 data-dcnode-id="245"><span data-dcnode-id="246" instrument_node="">The Cysteine / Glutathione Disease Prevention</span></h4><span data-dcnode-id="244" instrument_node="">
</span><blockquote data-dcnode-id="232"><p data-dcnode-id="242"><span data-dcnode-id="243" instrument_node="">In the scientific study circles there is a big word that means lung cancer prevention. The word is chemoprevention. Chemicals that have the potential to cause cancer are called carcinogenicity. One place to look for chemoprotective properties is foods.</span></p><span data-dcnode-id="241" instrument_node="">
</span><p data-dcnode-id="239"><span data-dcnode-id="240" instrument_node="">Bottom line, boost your glutathione with foods or supplements and save the life of your loved one. If you love yourself and you do not want to check out of this world through the lung cancer exit portal, boost your glutathione and die of something else.</span></p><span data-dcnode-id="238" instrument_node="">
</span><p data-dcnode-id="236"><span data-dcnode-id="237" instrument_node="">It should be noted that some supplements that claim to help prevent lung cancer may not provide any benefit and some may increase the risk. Become an educated consumer. Do not worry if it causes or prevents cancer in pet lab mice. Look for human studies.</span></p><span data-dcnode-id="235" instrument_node="">
</span><p data-dcnode-id="233"><span data-dcnode-id="234" instrument_node="">Of course, the best would be to boost your glutathione and quit smoking but I am sure you will when your ready. Everyone stops smoking sooner or later. Do it sooner and help heal your lungs after smoking.</span></p></blockquote><span data-dcnode-id="231" instrument_node="">
