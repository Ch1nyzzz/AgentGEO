</span><h3 class="heading" data-dcnode-id="3025"><span data-dcnode-id="3029" instrument_node="">
</span><slot data-dcnode-id="3027"><span data-dcnode-id="3028" instrument_node="">Tolstoy On War
        </span></slot><span data-dcnode-id="3026" instrument_node="">
</span></h3><span data-dcnode-id="3024" instrument_node="">
</span></book-view-pharos-heading><span data-dcnode-id="3021" instrument_node="">
</span><div data-dcnode-id="3004" data-qa="book-description"><strong data-dcnode-id="3019"><span data-dcnode-id="3020" instrument_node="">Book Description:</span></strong><span data-dcnode-id="3018" instrument_node=""> </span><p data-dcnode-id="3013"><span data-dcnode-id="3017" instrument_node="">In 1812, Napoleon launched his fateful invasion of Russia. Five
decades later, Leo Tolstoy published </span><em data-dcnode-id="3015"><span data-dcnode-id="3016" instrument_node="">War and Peace</span></em><span data-dcnode-id="3014" instrument_node="">, a
fictional representation of the era that is one of the most
celebrated novels in world literature. The novel contains a
coherent (though much disputed) philosophy of history and portrays
the history and military strategy of its time in a manner that
offers lessons for the soldiers of today. To mark the two hundredth
anniversary of the French invasion of Russia and acknowledge the
importance of Tolstoy's novel for our historical memory of its
central events, Rick McPeak and Donna Tussing Orwin have assembled
a distinguished group of scholars from diverse disciplinary
backgrounds-literary criticism, history, social science, and
philosophy-to provide fresh readings of the novel.</span></p><p data-dcnode-id="3005"><span data-dcnode-id="3012" instrument_node="">The essays in </span><em data-dcnode-id="3010"><span data-dcnode-id="3011" instrument_node="">Tolstoy On War</span></em><span data-dcnode-id="3009" instrument_node=""> focus primarily on the
novel's depictions of war and history, and the range of responses
suggests that these remain inexhaustible topics of debate. The
result is a volume that opens fruitful new avenues of understanding
</span><em data-dcnode-id="3007"><span data-dcnode-id="3008" instrument_node="">War and Peace</span></em><span data-dcnode-id="3006" instrument_node=""> while providing a range of perspectives and
interpretations without parallel in the vast literature on the
novel.</span></p></div><span data-dcnode-id="3003" instrument_node="">

</span><div class="ch-summary" data-dcnode-id="2258"><p data-dcnode-id="2259"><span data-dcnode-id="2266" instrument_node="">The year 2012 is the two hundredth anniversary of Napoleon’s fateful invasion of Russia and the Battle of Borodino. This book marks the occasion with essays on Leo Tolstoy’s epic novel </span><em data-dcnode-id="2264"><span data-dcnode-id="2265" instrument_node="">War and Peace</span></em><span data-dcnode-id="2263" instrument_node=""> (1865–1869), which is set in the period from 1805 to 1820 and describes the struggle between Russia and France through 1812. As a founding epic for modern Russia and a meditation on war and history, </span><em data-dcnode-id="2261"><span data-dcnode-id="2262" instrument_node="">War and Peace</span></em><span data-dcnode-id="2260" instrument_node=""> is one of the most read and most important novels ever written. Ernest Hemingway, Vasily Grossman, and Vikram Seth are just three of the many prose writers...</span></p></div><span data-dcnode-id="2257" instrument_node="">

</span><div class="ch-summary" data-dcnode-id="2154"><p data-dcnode-id="2155"><span data-dcnode-id="2162" instrument_node="">Tolstoy made it clear that for him </span><em data-dcnode-id="2160"><span data-dcnode-id="2161" instrument_node="">War and Peace</span></em><span data-dcnode-id="2159" instrument_node=""> was much more than a mere novel. In part through the mouth of Prince Andrei Bolkonsky and in part through his own direct voice as author, Tolstoy used </span><em data-dcnode-id="2157"><span data-dcnode-id="2158" instrument_node="">War and Peace</span></em><span data-dcnode-id="2156" instrument_node=""> to express his views on war, history, and Russia. Not surprisingly, military thinkers and historians turned their critical attention to the book, given its enormous popularity and the message it was attempting to convey about their profession. Of these military critics the most senior and also one of the most insightful was General Mikhail Dragomirov. In Dragomirov’s case—as...</span></p></div><span data-dcnode-id="2153" instrument_node="">

</span><div class="ch-summary" data-dcnode-id="2053"><p data-dcnode-id="2054"><span data-dcnode-id="2058" instrument_node="">As with any work involving documentary material, the problem of historical sources in </span><em data-dcnode-id="2056"><span data-dcnode-id="2057" instrument_node="">War and Peace</span></em><span data-dcnode-id="2055" instrument_node=""> can ultimately be reduced to two basic questions. First, how solid is the novel’s documentary base, or in other words, how knowledgeable is the author? Second, how responsible is the author in his use of the material—that is to say, is he guided by the primary sources, or, on the contrary, does he manipulate them in order to validate his own opinions? Acknowledging the inevitable naïveté of such formulations, let us take them as a point of departure, which is all the more...</span></p></div><span data-dcnode-id="2052" instrument_node="">

</span><div class="ch-summary" data-dcnode-id="1950"><p data-dcnode-id="1953"><span data-dcnode-id="1957" instrument_node="">When he first read </span><em data-dcnode-id="1955"><span data-dcnode-id="1956" instrument_node="">War and Peace,</span></em><span data-dcnode-id="1954" instrument_node=""> Prince Petr Viazemskii, doyen of Russian literary critics, was outraged. Having himself lived in Moscow in 1812 and participated in the war, he was appalled at the version of history he encountered in Tolstoy’s novel. In a harsh rebuttal, he accused Tolstoy of contributing to the “moral [and] literary materialism,” the “historical free thinking and unbelief,” that led current literati to deny historical truths and insult the nation’s most cherished memories.¹ In the bitter Russian culture wars of the 1860s, he implied, Tolstoy stood with the nihilists.</span></p><p data-dcnode-id="1951"><span data-dcnode-id="1952" instrument_node="">Viazemskii was right to call Tolstoy...</span></p></div><span data-dcnode-id="1949" instrument_node="">

</span><div class="ch-summary" data-dcnode-id="1849"><p data-dcnode-id="1850"><span data-dcnode-id="1854" instrument_node="">Tolstoy makes it clear throughout </span><em data-dcnode-id="1852"><span data-dcnode-id="1853" instrument_node="">War and Peace</span></em><span data-dcnode-id="1851" instrument_node=""> that he rejects the greatman theory of warfare and the notion that the war of 1812, or any other, could have been decided by generals, whether by the much-vaunted tactical genius of Napoleon or the dogged and stubborn resilience of Kutuzov. Individual will counted as nothing compared with the spirit of the nation and the desire felt by the army as a whole: hence his concern to discuss the actions of ordinary soldiers and to present the war as a collage of individual initiatives in a host of minor actions.¹ Napoleon’s victories...</span></p></div><span data-dcnode-id="1848" instrument_node="">

</span><div class="ch-summary" data-dcnode-id="1742"><p data-dcnode-id="1743"><span data-dcnode-id="1753" instrument_node="">When we think of literary genres, long forms come first to mind: epics, which demand length to tell the tale of the tribe; novels, which trace the gradual development of character; and perhaps sprawling satires, like the works of Rabelais, Burton’s </span><em data-dcnode-id="1751"><span data-dcnode-id="1752" instrument_node="">Anatomy of Melancholy,</span></em><span data-dcnode-id="1750" instrument_node=""> or Byron’s </span><em data-dcnode-id="1748"><span data-dcnode-id="1749" instrument_node="">Don Juan.</span></em><span data-dcnode-id="1747" instrument_node=""> Some long histories, like the narratives of Herodotus or Gibbon, and classic biographies, like Boswell’s </span><em data-dcnode-id="1745"><span data-dcnode-id="1746" instrument_node="">Life of Johnson,</span></em><span data-dcnode-id="1744" instrument_node=""> also belong to this literary family. We are likely to think next of shorter genres, like sonnets, elegies, and other kinds of lyric; short stories, extending from brief fables to novellas; and various nonfictional...</span></p></div><span data-dcnode-id="1741" instrument_node="">

</span><div class="ch-summary" data-dcnode-id="1641"><p data-dcnode-id="1642"><span data-dcnode-id="1646" instrument_node="">What is a great man? This central question in </span><em data-dcnode-id="1644"><span data-dcnode-id="1645" instrument_node="">War and Peace</span></em><span data-dcnode-id="1643" instrument_node=""> folds into a venerable Socratic one: How should I live?¹ The former is perhaps merely the foremost public manifestation of the latter. For Tolstoy it seems that this public manifestation becomes clearest in the event of war—that is to say, in the presence of the possibility of imminent, violent death. It is a cliché to assert that the possibility of imminent, violent death is clarifying, but, like many such clichés, this one points to an inconvenient reality. What I mean is that war, by placing us face...</span></p></div><span data-dcnode-id="1640" instrument_node="">

</span><div class="ch-summary" data-dcnode-id="1540"><p data-dcnode-id="1541"><span data-dcnode-id="1545" instrument_node="">Leo Tolstoy had firsthand experience of war and the military. He served almost five years in the army (January 1852 to November 1856), and during the Crimean War he even considered a military career. He chose literature over the army after the success of his first Sevastopol sketch, but his interest in the military and war did not disappear. When </span><em data-dcnode-id="1543"><span data-dcnode-id="1544" instrument_node="">War and Peace</span></em><span data-dcnode-id="1542" instrument_node=""> began to appear a decade later, he was especially eager to hear the responses of military readers. These readers had a special stake in the novel, of course. They reacted to it not only as experts but...</span></p></div><span data-dcnode-id="1539" instrument_node="">

</span><div class="ch-summary" data-dcnode-id="1026"><p data-dcnode-id="1027"><em data-dcnode-id="1032"><span data-dcnode-id="1033" instrument_node="">War and Peace</span></em><span data-dcnode-id="1031" instrument_node=""> is much more than a novel: it is also an essay on the forces of history. Tolstoy’s primary concern in </span><em data-dcnode-id="1029"><span data-dcnode-id="1030" instrument_node="">War and Peace,</span></em><span data-dcnode-id="1028" instrument_node=""> understandably, was Napoleon’s Russian campaign, but what he had to say about its causes and about the reasons it unfolded as it did he clearly intended to apply more generally. He said as much repeatedly. And why should it not be so? Tolstoy’s understanding of the forces of history would apply as well (or as ill) to any major event in world politics as to the specific events of 1812. This makes Tolstoy an...</span></p></div><span data-dcnode-id="1025" instrument_node="">

</span><div class="ch-summary" data-dcnode-id="928"><p data-dcnode-id="929"><span data-dcnode-id="936" instrument_node="">In April 2010, the United States Military Academy at West Point hosted a conference, “</span><em data-dcnode-id="934"><span data-dcnode-id="935" instrument_node="">War and Peace</span></em><span data-dcnode-id="933" instrument_node=""> at West Point,” for the contributors to this book and invited guests. The event attracted Academy faculty and students, including ten cadets from the Department of Foreign Languages who were studying </span><em data-dcnode-id="931"><span data-dcnode-id="932" instrument_node="">War and Peace</span></em><span data-dcnode-id="930" instrument_node=""> with me. Having graduated the likes of Eisenhower and MacArthur, who made the history books not just as warriors but also as scholars and statesmen, West Point is an ideal place to teach Tolstoy’s great war novel. During World War II, Douglas MacArthur commanded U.S. forces in the Pacific,...</span></p></div><span data-dcnode-id="927" instrument_node="">
