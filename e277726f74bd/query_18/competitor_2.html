</span><div class="field field-name-body field-type-text-with-summary field-label-hidden" data-dcnode-id="525"><div class="field-items" data-dcnode-id="526"><div class="field-item even" data-dcnode-id="527"><p data-dcnode-id="657" dir="ltr" id="docs-internal-guid-fc89b22f-7fff-08fe-349f-2f790e68b6de"><span data-dcnode-id="658" instrument_node="">The world is constantly evolving, and historians play an important role in synthesizing and recording the events of the past. Their efforts make it possible for individuals and societies to learn from history in order to chart a better course for the future. Those who are interested in contributing to this effort may choose to pursue a Master of Arts in History.</span></p><h2 data-dcnode-id="655" dir="ltr"><span data-dcnode-id="656" instrument_node="">What Is a Historian?</span></h2><p data-dcnode-id="653" dir="ltr"><span data-dcnode-id="654" instrument_node="">Historians devote their careers to studying notable past events, such as military conflicts, political milestones, and social movements. These professionals work in universities and other educational settings, as well as for the various public, private and nonprofit organizations.</span></p><p data-dcnode-id="651" dir="ltr"><span data-dcnode-id="652" instrument_node="">As an example, some government agencies hire staff historians to advise on the potential impact of proposed policies. Historians, and in particular, military historians, can advise on both domestic and foreign policy decisions by studying major conflicts and recording a range of important details. Their research may cover subjects such as military technology, strategy, communications, leadership, and wartime public health. Military officials and policymakers can use this information to develop more effective policies.</span></p><h2 data-dcnode-id="649" dir="ltr"><span data-dcnode-id="650" instrument_node="">What Do Historians Do?</span></h2><p data-dcnode-id="647" dir="ltr"><span data-dcnode-id="648" instrument_node="">A master’s degree in history can help prepare historians to conduct field research, evaluate historical records, and provide insights into past events. Historians typically have the following professional responsibilities:</span></p><h3 data-dcnode-id="645" dir="ltr"><span data-dcnode-id="646" instrument_node="">Research Recorded Histories</span></h3><p data-dcnode-id="643" dir="ltr"><span data-dcnode-id="644" instrument_node="">Historians collect and evaluate information from many primary sources to answer questions about historical events, a process known as the historical method. They may analyze written records, physical artifacts, and other types of evidence during the course of their investigations. Historians often prepare reports to explain the significance of their findings, connecting the relevance and value of new discoveries to modern society.</span></p><h3 data-dcnode-id="641" dir="ltr"><span data-dcnode-id="642" instrument_node="">Provide Historical Insight about Current Events</span></h3><p data-dcnode-id="639" dir="ltr"><span data-dcnode-id="640" instrument_node="">By comparing past and current events, historians can create a valuable commentary about current affairs, potentially allowing them to predict what events might transpire in the future. For example, by studying the economic history of a country that is facing a recession, economic historians can pinpoint the potential causes for that recession. By sharing their insights, they can help the country recover and help other societies around the world avoid making similar mistakes. The same line of thought applies to other fields of history; military historians can help identify the signs of war preemptively, allowing their country’s leadership to take the necessary precautions. Likewise, political historians can use their observations of past political events to predict how today’s political affairs are likely to play out. &nbsp;</span></p><h2 data-dcnode-id="637" dir="ltr"><span data-dcnode-id="638" instrument_node="">What Skills Must a Historian Have?</span></h2><p data-dcnode-id="635" dir="ltr"><span data-dcnode-id="636" instrument_node="">To be a historian is to develop and test hypotheses, gather applicable data, and publish subsequent research. People in this field may have to travel and work long hours when deadlines approach, and they must be avid readers and writers. In addition to these aptitudes, the following skills are vital to historians:</span></p><h3 data-dcnode-id="633" dir="ltr"><span data-dcnode-id="634" instrument_node="">Chronological Thinking</span></h3><p data-dcnode-id="631" dir="ltr"><span data-dcnode-id="632" instrument_node="">Mastering chronological thinking means understanding how individual societies measured time and recorded history. Since many sources may contain histories of a single event, historians must sift through individual accounts and place the events in order of occurrence. Historical sources often don’t come with a time and date stamp, so they must be traced to identify not just their historical relevance, but also who produced the information or artifact and from where it came.</span></p><p data-dcnode-id="629" dir="ltr"><span data-dcnode-id="630" instrument_node="">Creating a time sequence out of the materials and data that a historian collects can be a difficult task. Therefore, the American Historical Association lists chronological thinking as the skill at the heart of historical reasoning. What may seem simple on the surface is complicated not just by the number of historical accounts, but also by the many historical civilizations that followed their own interpretations of time. For example, societies founded in Christian beliefs may have coordinated their histories around critical events within the religion, while Chinese civilizations favored calendar systems centered upon the rise and fall of monarchical dynasties. Even if past civilizations diligently recorded events, the inconsistencies in their methods of chronology might make it more difficult to identify when events took place in our modern calendar. Since there is no uniform method of chronology, historians must know how to use cultural factors and context to infer the order of events over time.</span></p><h3 data-dcnode-id="627" dir="ltr"><span data-dcnode-id="628" instrument_node="">Historical Interpretation</span></h3><p data-dcnode-id="625" dir="ltr"><span data-dcnode-id="626" instrument_node="">What is a historian supposed to do when faced with different accounts of the same historical event? Historical interpretation and analysis is a skill that historians apply when they compare historical accounts of a single event. In order to correctly interpret complex histories, historians must take a nuanced approach to their research. Instead of looking strictly at the facts, they must make inferences based on the context of historical events. This means taking into consideration any valid historical accounts that speak to the causes, impact, and outcomes of the historical event being researched. By drawing from this variety of perspectives on the same events, a historian should be able to draw parallels between the events they are studying and synthesize a balanced, unbiased, and accurate representation of the time period in question.</span></p><h3 data-dcnode-id="623" dir="ltr"><span data-dcnode-id="624" instrument_node="">Historical Comprehension</span></h3><p data-dcnode-id="621" dir="ltr"><span data-dcnode-id="622" instrument_node="">Reference materials can be useful for understanding history, because photographs, artwork, and books provide concrete evidence of what life was like in different time periods. Mastering the art of historical comprehension relies on a historian’s ability to discover why historical events occurred, who was involved, why they happened, and what could have motivated them. For instance, someone who studies the early years of colonization in North America would benefit from studying that time from the viewpoint of both the Native Americans and the various groups of European colonizers. Cross-referencing conflicting viewpoints to reach the truth allows historians to produce a historical narrative that is as well-rounded and unbiased as possible. Additionally, historical comprehension also involves being able to seek out non-standard data that was presented in different forms during the period being studied. By studying non-standard sources, like maps, art, literature, and music, historians can draw in more actionable data that can be used to better contextualize the histories they are researching.</span></p><h2 data-dcnode-id="619" dir="ltr"><span data-dcnode-id="620" instrument_node="">Job Outlook and Opportunities</span></h2><p data-dcnode-id="617" dir="ltr"><span data-dcnode-id="618" instrument_node="">Many of the top professional disciplines for historians are projected to be in high demand over the next decade. Some of the most common career choices for individuals with an advanced degree in history include:</span></p><h3 data-dcnode-id="615" dir="ltr"><span data-dcnode-id="616" instrument_node="">History Teacher</span></h3><p data-dcnode-id="613" dir="ltr"><span data-dcnode-id="614" instrument_node="">Teachers educate students of all ages in various subjects, such as science and language, but what is a historian able to do in the classroom? At the grade-school level, history teachers often share general knowledge of historical events with their students. High school teachers, on the other hand, have more liberty with the subject matter, meaning they can dig deeper into historical events. After completing a class, high school students should be able to determine what caused an event, how the event played out, and what the consequences were. Beyond the classroom, history teachers may lead community-level history projects as an extension of their classroom work. These projects could be anything from coordinating extracurricular historical reenactments within the community or organizing school events to honor important historical figures.</span></p><p data-dcnode-id="611" dir="ltr"><span data-dcnode-id="612" instrument_node="">In order to become a teacher, the combination of a bachelor’s degree and teaching certification is often sufficient, but some states also require teachers to hold a master’s degree. Regardless of state requirements, a Master of Arts in History degree is an attractive credential for schools seeking history teachers. According to the Bureau of Labor Statistics (BLS), high school teachers earned a median salary of $59,170 in 2017.</span></p><h3 data-dcnode-id="609" dir="ltr"><span data-dcnode-id="610" instrument_node="">Museum Archivist or Curator</span></h3><p data-dcnode-id="607" dir="ltr"><span data-dcnode-id="608" instrument_node="">Museums aren’t just repositories for ancient artifacts; they are places where individuals can go to learn from the past and explore ideas to use in the future. Historians who work in museums are usually employed to promote, protect, appraise, and study historical objects and records. In some roles, they are also tasked with presenting these things to the museum’s patrons in interesting new ways, such as interactive exhibits that engage visitors and educate them in entertaining ways.</span></p><p data-dcnode-id="605" dir="ltr"><span data-dcnode-id="606" instrument_node="">There are two specialized occupations available for historians who wish to work in a museum: archivist and curator. Archivists determine the value or historical significance of a museum’s inventory and may also be responsible for helping preserve records related to historical objects or events. If the authenticity of a historical document or artifact is in doubt, archivists often have the expertise to verify whether the item is genuine or not. On the other hands, curators arrange a museum’s inventory in a way that is most likely to attract and engage visitors. They find historical objects that are a good fit for a museum’s theme and create exhibits that convey an item’s historical significance in the most compelling way possible.</span></p><p data-dcnode-id="603" dir="ltr"><span data-dcnode-id="604" instrument_node="">Qualifying for either of these positions typically requires at least a master’s degree in history or a related subject, such as archaeology. Earning a Master of Arts in History degree can give history professionals a competitive edge when they’re applying for jobs at museums. According to BLS, in 2017, the median salaries for curators and archivists were $53,770 and $51,760, respectively.</span></p><h3 data-dcnode-id="601" dir="ltr"><span data-dcnode-id="602" instrument_node="">Historical Advisor</span></h3><p data-dcnode-id="599" dir="ltr"><span data-dcnode-id="600" instrument_node="">A Master of Arts in History degree can qualify graduates for advisory careers in both the public and private sectors. For example, historians may use their degrees to qualify for consulting jobs in filmmaking and publishing. With their unique expertise, historians can ensure that media representations of historical events are accurately referenced and depicted. As another example, governments hire historians with graduate degrees to study the cause and effect of world events. Government officials can use this information to determine how to improve future policy strategies. Historians who work for the federal government are among the highest-paid professionals in the field: they earned a median salary of $94,800 in 2017, compared to a $59,120 median for all historians.</span></p><p data-dcnode-id="597" dir="ltr"><span data-dcnode-id="598" instrument_node="">Historians have a skill set that benefits modern cultures and nations by empowering societies to learn from past actions and avoid repeating missteps in the future. With a Master of Arts in History degree, historians can record and preserve oral histories, share their knowledge and findings with others, and, in some professions, provide actionable information that can help solve present and future problems.</span></p><h3 data-dcnode-id="595" dir="ltr"><span data-dcnode-id="596" instrument_node="">Learn More</span></h3><p data-dcnode-id="593" dir="ltr"><span data-dcnode-id="594" instrument_node="">Norwich University is an important part of American history. Established in 1819, Norwich is a nationally recognized institution of higher education, the birthplace of the Reserve Officers’ Training Corps (ROTC), and the first private military college in the United States.</span></p><p data-dcnode-id="588" dir="ltr"><span data-dcnode-id="592" instrument_node="">With Norwich University’s online </span><a data-dcnode-id="590" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//online.norwich.edu/history"><span data-dcnode-id="591" instrument_node="">Master of Arts in History</span></a><span data-dcnode-id="589" instrument_node=""> program, you can enhance your awareness of differing historical viewpoints while developing the skills needed to refine your research, writing, analysis and presentation skills. The program offers two tracks – American History and World History – allowing you to tailor your studies to your interests and goals.</span></p><p data-dcnode-id="585" dir="ltr"><strong data-dcnode-id="586"><span data-dcnode-id="587" instrument_node="">Recommended Reading</span></strong></p><p data-dcnode-id="582" dir="ltr"><a data-dcnode-id="583" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//online.norwich.edu/academic-programs/resources/5-ted-talks-for-aspiring-historians"><span data-dcnode-id="584" instrument_node="">5 TED Talks for Aspiring Historians</span></a></p><p data-dcnode-id="579" dir="ltr"><a data-dcnode-id="580" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//online.norwich.edu/academic-programs/resources/careers-with-a-masters-degree-in-history"><span data-dcnode-id="581" instrument_node="">Careers With a Master’s Degree in History</span></a></p><p data-dcnode-id="576" dir="ltr"><a data-dcnode-id="577" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//online.norwich.edu/academic-programs/resources/top-history-conferences-history-professionals"><span data-dcnode-id="578" instrument_node="">Top History Conferences For History Professionals</span></a></p><p data-dcnode-id="573" dir="ltr"><strong data-dcnode-id="574"><span data-dcnode-id="575" instrument_node="">Sources</span></strong></p><p data-dcnode-id="569" dir="ltr"><a data-dcnode-id="571" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.bls.gov/ooh/education-training-and-library/high-school-teachers.htm" title="external link"><span data-dcnode-id="572" instrument_node="">High School Teachers</span></a><span data-dcnode-id="570" instrument_node="">, Bureau of Labor Statistics</span></p><p data-dcnode-id="565" dir="ltr"><a data-dcnode-id="567" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.bls.gov/ooh/life-physical-and-social-science/historians.htm%23tab-2" title="external link"><span data-dcnode-id="568" instrument_node="">Historians</span></a><span data-dcnode-id="566" instrument_node="">, Bureau of Labor Statistics</span></p><p data-dcnode-id="561" dir="ltr"><a data-dcnode-id="563" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.bls.gov/ooh/education-training-and-library/curators-museum-technicians-and-conservators.htm" title="external link"><span data-dcnode-id="564" instrument_node="">Archivists, Curators and Museum Workers</span></a><span data-dcnode-id="562" instrument_node="">, Bureau of Labor Statistics</span></p><p data-dcnode-id="557" dir="ltr"><a data-dcnode-id="559" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.historians.org/publications-and-directories/perspectives-on-history/may-1999/what-do-federal-historians-do" title="external link"><span data-dcnode-id="560" instrument_node="">What Do Federal Historians Do</span></a><span data-dcnode-id="558" instrument_node="">, American Historical Association</span></p><p data-dcnode-id="553" dir="ltr"><a data-dcnode-id="555" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.historians.org/teaching-and-learning/teaching-resources-for-historians/teaching-and-learning-in-the-digital-age/the-history-of-the-americas/the-conquest-of-mexico/for-teachers/setting-up-the-project/historical-thinking-skills" title="external link"><span data-dcnode-id="556" instrument_node="">Historical Thinking Skills</span></a><span data-dcnode-id="554" instrument_node="">, American Historical Association</span></p><p data-dcnode-id="549" dir="ltr"><a data-dcnode-id="551" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.historians.org/jobs-and-professional-development/career-resources/why-become-a-historian" title="external link"><span data-dcnode-id="552" instrument_node="">Why Become a Historian</span></a><span data-dcnode-id="550" instrument_node="">, American Historical Association</span></p><p data-dcnode-id="545" dir="ltr"><a data-dcnode-id="547" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.aag.org/cs/salary_data_and_trends/public_administration/19-3093" title="external link"><span data-dcnode-id="548" instrument_node="">Occupation Title: Historians</span></a><span data-dcnode-id="546" instrument_node="">, American Association of Geographers</span></p><p data-dcnode-id="541" dir="ltr"><a data-dcnode-id="543" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//npshistory.com/publications/battlefield/cwsac/report.pdf" title="external link"><span data-dcnode-id="544" instrument_node="">Chancellorsville</span></a><span data-dcnode-id="542" instrument_node="">, Civil War Sites Advisory Commission Report, Battle Summaries</span></p><p data-dcnode-id="537" dir="ltr"><a data-dcnode-id="539" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.historians.org/publications-and-directories/perspectives-on-history/april-2001/us-army-command-historians-what-we-are-and-what-we-do" title="external link"><span data-dcnode-id="540" instrument_node="">U.S. Army Command Historians: What We Are and What We Do</span></a><span data-dcnode-id="538" instrument_node="">, American Historical Association</span></p><p data-dcnode-id="531"><a data-dcnode-id="535" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.nytimes.com/1984/09/18/science/the-mystery-of-hannibal-s-elephants.html" title="external link"><span data-dcnode-id="536" instrument_node="">The Mystery of Hannibal’s Elephants</span></a><span data-dcnode-id="534" instrument_node="">, </span><em data-dcnode-id="532"><span data-dcnode-id="533" instrument_node="">The New York Times</span></em></p><p data-dcnode-id="528"><a data-dcnode-id="529" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//unsplash.com/photos/sfL_QOnmy00" target="_blank" title="external link"><span data-dcnode-id="530" instrument_node="">Image</span></a></p></div></div></div><span data-dcnode-id="524" instrument_node=""> </span></div><span data-dcnode-id="522" instrument_node="">
