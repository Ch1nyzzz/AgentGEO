</span><span data-dcnode-id="3421" id="freeText1537031387011489514" style="display:none"><span data-dcnode-id="3443" instrument_node="">I have been reading history extensively for over three years. About a year and a half ago, I read Savoie Lottinville's The Rhetoric of History – an essential guide for everyone who writes or wants to write history. It was an eye-opening book, for before I read it, it had not occurred me what a painstaking, complex process the writing of history is. It is akin to an iceberg. What the reader sees on the pages of the final product, the published book, is just the tip. The bulk of the work – the research – is hidden below the water. The author's knowledge of the subject he writes about far exceeds the knowledge he shares with the reader. Only this way he can convey the information in a graspable and confident manner. Weak written histories, just like weak books in general, result from cases in which the author lacks clear understanding of the event, figure, period etc. he is writing about.&nbsp;</span><br data-dcnode-id="3442"><br data-dcnode-id="3441"><span data-dcnode-id="3440" instrument_node="">Yet, being a historian is so much more than narrating events in history well. The process of analyzing, understanding, and interpreting the past correctly is the base of historical scholarship – in other words, the development of a specific thinking, a logic of historical thought, as David Hackett Fischer calls it in his outstanding guide for historians. In HISTORIANS' FALLACIES, he brings attention to the many and varied mistakes of logic a historian can commit.</span><br data-dcnode-id="3439"><br data-dcnode-id="3438"><span data-dcnode-id="3437" instrument_node="">I have lost count of the times I have heard or read someone express his frustration with history for its universal relativity. History, according to many, is infallibly subjective and open to re-intepretation, which, allegedly, makes historical analysis pointless because it never yields definitive answers. To my delight, Fischer disagrees with this point of view. While history is indeed always open to re-intepretation, that is mostly so because the many objective truths that are to be told about the past are frequently wrongly understood and interpreted by historians – whether on purpose or by accident.</span><br data-dcnode-id="3436"><br data-dcnode-id="3435"><span data-dcnode-id="3434" instrument_node="">Just like any other person, a historian cannot be fully objective. The desire to prove one's point of view often beclouds objectivity and compels one to wrench historical facts to suit oneself instead of adapting one's theories to the unarguable facts. I have found many instances of historians' falling into this trap in the books I read. Recently, for instance, I read Frederik Logevall's EMBERS OF WAR, in which he is so determined to prove that South Vietnam's Prime Minister Ngo Dinh Diem was a dictator that he attempts to conform the facts to his thesis – with unconvincing results. Facts are, fortunately or not, very stubborn things.&nbsp;</span><br data-dcnode-id="3433"><br data-dcnode-id="3432"><span data-dcnode-id="3431" instrument_node="">That is why being a historian is difficult. I do not think that it is even possible to become so aware and so unbiased as to produce a perfect historical analysis. Nevertheless, there are important rules that can help any historian improve his reasoning and develop a sound logic of historical thinking that would help him free himself at least partially from the narrow-minded tendency to prove one's own point of view no matter what. David Fischer outlines those rules in the form of different kinds of fallacies that threaten historians on their quest for the truth.</span><br data-dcnode-id="3430"><br data-dcnode-id="3429"><span data-dcnode-id="3428" instrument_node="">These fallacies are organized in three main sections: fallacies of inquiry, of explanation, and of argument. The biggest category is, not surprisingly, the fallacies of explanation, for while most historians would not venture to falsify facts, they would conveniently interpret those facts wrongly. Fischer gives many on-point examples to illustrate his argument. One example that stuck with me discussed the taxes in Boston in the years before the American Revolution. A certain historian expresses his outrage at the allegedly egregious taxes Great Britain burdened Bostonians with – they had to pay thirteen pounds in taxes – and argues that it was because of such taxes that the Bostonians revolted. However, he never elaborates what exactly a tax of thirteen pounds meant at the time. How much money did the average citizen of Boston earn? How badly did a tax of thirteen pounds affect an average Bostonian's income? If the people of Boston paid a thirteen-pound tax, how much did the people of Great Britain pay? Those are important questions, and their answers can easily transform the picture of an oppressed Bostonian into a lucky colonial subject who paid tolerable taxes – especially if compared to his British counterpart.</span><br data-dcnode-id="3427"><br data-dcnode-id="3426"><span data-dcnode-id="3425" instrument_node="">It is impossible for me to enumerate all the different fallacies Fischer addresses, and there is no need. The main message I would like to convey is that to avoid or correct mistakes, one should first become aware of the mistakes he can make or has been making. I read this book carefully, highlighting almost every page, and tried to commit to memory as many of Fischer's warnings as possible. In the end, I understood that just like The Rhetoric of History did not do magic for my writing skills until I started persistently practicing my writing, </span><i data-dcnode-id="3423"><span data-dcnode-id="3424" instrument_node="">HISTORIANS' FALLACIES</span></i><span data-dcnode-id="3422" instrument_node=""> would not make a brilliant historian out of me overnight. It is a useful guide, but the road to becoming a good historian is long and bumpy. To understand Fischer's point is one thing, to master analyzing history like he advises historians to is another. It would require many years of practice and a greater life experience than mine. Nevertheless, this work is an essential start, and I recommend it to every historian – and to every reader of history as well.&nbsp;</span></span><span data-dcnode-id="3420" instrument_node="">

</span><span data-dcnode-id="3325" id="freeText4172222512083805817" style="display:none"><span data-dcnode-id="3328" instrument_node="">In the 50s and 60s of the twentieth century David Hackett Fischer was a renowned American historian who earned his spurs in the historiography of the United States. In 1970 he published this booklet in which he gives an almost exhaustive enumeration of the different types of errors his colleagues of then and of the centuries before him have committed. As you can imagine the work caused a huge wave of indignation in the historical Guild. Of course, in itself his deed has something quite arrogant and pedantic. But Fischer didn't care: this booklet is written with so much authority, flair, wit and humor that the outrage can be seen as just petty reactions. Still, there are quite a few comments to be made on Fischer's approach. Fischer is an absolute empirist: historiography (and by extension all social sciences) can only be taken seriously if it is practised according to strictly empirical procedures; and this can be done only by asking the right questions and answering them according to a strict methodology (called “historical logic”). Fischer doesn’t dare to admit it anywhere, but with this starting point he puts himself in the pure positivist tradition.</span><br data-dcnode-id="3327"><span data-dcnode-id="3326" instrument_node="">The booklet is full of outrage against all speculative historiography à la Spengler and Toynbee (rightly so), but he also wipes all meta-history and narrative history of the table. This pure empiricism may be a very sound basis for any scientific activity and evolution, but excluding all more theoretical or artistic points of view seems to me – philosophically - rather dubious and not a fruitful way of addressing science. However, I have read this book with a lot of pleasure: it is full of practical, methodical tips that indeed are very useful in the historical work. A big drawback however is that Fischer illustrates his propositions almost only with American examples.</span></span><span data-dcnode-id="3324" instrument_node="">

</span><span data-dcnode-id="3237" id="freeTextContainer5236784932202544654"><span data-dcnode-id="3241" instrument_node="">Great critical thinking when it comes to historiography. The logic chopping is a little pedantic at times but the overall affect is greater clarity on how to reach responsible historical conclusions.</span><br data-dcnode-id="3240"><br data-dcnode-id="3239"><span data-dcnode-id="3238" instrument_node="">The problem however is that Fischer thinks historians should spend all their time answering "what" and "how" questions and avoid trying to answer "why" questions. Now "why" would he say that? Well he tells us. He says that the "why" questions deal with metaphysical issues that yield no fruitful or de</span></span><span data-dcnode-id="3236" instrument_node="">
</span><span data-dcnode-id="3222" id="freeText5236784932202544654" style="display:none"><span data-dcnode-id="3235" instrument_node="">Great critical thinking when it comes to historiography. The logic chopping is a little pedantic at times but the overall affect is greater clarity on how to reach responsible historical conclusions.</span><br data-dcnode-id="3234"><br data-dcnode-id="3233"><span data-dcnode-id="3232" instrument_node="">The problem however is that Fischer thinks historians should spend all their time answering "what" and "how" questions and avoid trying to answer "why" questions. Now "why" would he say that? Well he tells us. He says that the "why" questions deal with metaphysical issues that yield no fruitful or definitive results. Even if that is true, and I don't believe it is, the metaphysical questions are still the most interesting to beings who can't be reduced to the physical realm. </span><br data-dcnode-id="3231"><br data-dcnode-id="3230"><span data-dcnode-id="3229" instrument_node="">I don't believe that Fishcer's scientific "what-and-how-only-approach" is much better at producing certainty either. For instance, "what" kind of document is the Constitution of the United States and "how" did it come to be? Well, some say that it is primarily influenced by British Capitalism ("the pursuit of happiness"), others that its primarily influenced by French ideas of equality ("all men are created equal") , others that the classical idea of a well informed, upstanding citizenry is the primary influence ("the consent of the governed"), others say Christianity and the Puritan moral vision is still calling the shots ("endowed by their Creator with certain inalienable rights"). To complicate matters there are those who argue that the Constitution is a betrayal of the Declaration of Independence and others that it is basically faithful to it and still others who believe that it is an almost pure extension of its values. </span><br data-dcnode-id="3228"><br data-dcnode-id="3227"><span data-dcnode-id="3226" instrument_node="">"How" did it come into its final form is tricky as well, since fifty-five delegates operated behind closed doors and were hopelessly divided between two factions of independently minded men like Madison and Hamilton on one side and Sam Adams and Patrick Henry on the other with guys like Washington caught in the middle. To make this even more confusing, some think that Madison caved to the anti-federalists by drawing up the Bill of Rights and others that he was tossing them some hushpuppies to shut their mouths so that the Constitution would pass. </span><br data-dcnode-id="3225"><br data-dcnode-id="3224"><span data-dcnode-id="3223" instrument_node="">I also hope that this makes it clear that you may distinguish the "why" from the "what" and "how" and even "who" questions, but you will never separate it from those topics. What God has joined together, let no man, even a respectable historian, put asunder. </span></span><span data-dcnode-id="3221" instrument_node="">

</span><span data-dcnode-id="3134" id="freeTextContainer10791936391512582323"><span data-dcnode-id="3138" instrument_node="">Fischer is not a man of diplomatic language: "</span><i data-dcnode-id="3136"><span data-dcnode-id="3137" instrument_node="">historians are inexact scientists, who go blundering about their business without a sufficient sense of purpose or procedure. They are failed scientists, who have projected their failures to science itself. Nothing could be more absurd, or more nearly antithetical to the progress of a potent discipline </span></i><span data-dcnode-id="3135" instrument_node="">". Naturally Fischer here refers to the indeed widespread dislike among historians against any theory of history and against the tendency to find laws</span></span><span data-dcnode-id="3133" instrument_node="">
</span><span data-dcnode-id="3107" id="freeText10791936391512582323" style="display:none"><span data-dcnode-id="3132" instrument_node="">Fischer is not a man of diplomatic language: "</span><i data-dcnode-id="3130"><span data-dcnode-id="3131" instrument_node="">historians are inexact scientists, who go blundering about their business without a sufficient sense of purpose or procedure. They are failed scientists, who have projected their failures to science itself. Nothing could be more absurd, or more nearly antithetical to the progress of a potent discipline </span></i><span data-dcnode-id="3129" instrument_node="">". Naturally Fischer here refers to the indeed widespread dislike among historians against any theory of history and against the tendency to find laws and structures in history. I understand that dislike, though, because often theory is associated with such generalizations that any sound relationship to the reality of the past is lost; and the obsession to discover patterns, laws and structures in history regularly has amounted to inapt tunnel visions. </span><br data-dcnode-id="3128"><br data-dcnode-id="3127"><span data-dcnode-id="3126" instrument_node="">Fischer shares that concern, because he turns out to be a thoroughbred empiricist who in his own history practice is very close to positivism. In this book the sarcastic comment on too speculative theory, syntheses and analyses is abundant, e.g. p 14: “</span><i data-dcnode-id="3124"><span data-dcnode-id="3125" instrument_node="">In my opinion — and I may be a minority of one — that favorite adverb of historians should be consigned to the semantical rubbish heap. A 'why' question tends to become a metaphysical question. It is also an imprecise question, for the adverb 'why' is slippery and difficult to define. Sometimes it seeks a cause, sometimes a motive, sometimes a reason, sometimes a description, sometimes a process, sometimes a purpose, sometimes a justification. A 'why' question lacks direction and clarity; it dissipates a historian's energies and interests.</span></i><span data-dcnode-id="3123" instrument_node="">”</span><br data-dcnode-id="3122"><br data-dcnode-id="3121"><span data-dcnode-id="3120" instrument_node="">But at the same time Fischer really believes in a sound science of history, a science that obviously must be founded empirically. “</span><i data-dcnode-id="3118"><span data-dcnode-id="3119" instrument_node="">There are many more practicable adverbs — who, when, where, what, how — which are more specific and more satisfactory. Questions of this sort can be resolved empirically, and from them a skilled historian can construct a project with much greater sophistication, relevance, accuracy, precision, and utility, instead of wasting his time with metaphysical dilemmas raised by his profound 'why' questions, which have often turned out to be about as deep as the River Platte”</span></i><span data-dcnode-id="3117" instrument_node="">.</span><br data-dcnode-id="3116"><br data-dcnode-id="3115"><span data-dcnode-id="3114" instrument_node="">In essence, Fischer is a very practical, pragmatic man: “</span><i data-dcnode-id="3112"><span data-dcnode-id="3113" instrument_node="">history is, in short, a problem-solving discipline. A historian is someone who asks an open-ended question about past events and answers it with selected facts which are arranged in the form of an explanatory paradigm. These questions and answers are fitted to each other by a complex process of mutual adjustment. The resultant explanatory paradigm may take many different forms: a statistical generalization, or a narrative, or a causal model, or a motivational model, or a collectivized group-composition model, or maybe an analogy (…) always, it is articulated in the form of a reasoned argument</span></i><span data-dcnode-id="3111" instrument_node="">” .</span><br data-dcnode-id="3110"><br data-dcnode-id="3109"><span data-dcnode-id="3108" instrument_node="">Fischer's logic of historical thought is essentially a methodology, a very strict, rigorously applied methodology, without much consideration about the larger framework and the philosophical implications of the historical work. In other words, his book is very useful in this limited domain (regularly also extremely funny, though), but don’t expect more of it!</span></span><span data-dcnode-id="3106" instrument_node="">

</span><span data-dcnode-id="3019" id="freeText15865331297361963453" style="display:none"><span data-dcnode-id="3020" instrument_node="">Originally written to help historians avoid dozens of fallacies, this book is wittier than it ought to be. Engaging to read for non-historians interested in history. Helps those of us who read history for enjoyment and enlightenment to recognize errors made by even the most prominent and respected historians. Fischer spares no one, high or low, though he criticizes respectfully. Fischer takes an empiricist and utilitarian approach that is refreshingly forthright. He is actively hostile to historians who claim to find "stages" in history or impose ideological interpretations on historical events or processes. The historian's task is to solve problems, to ask appropriate questions and seek answers by actually researching the data based on archival and other methods of research. Interpretation is inevitable, but the interpretation should conform to the evidence. Moreover, there is a practical element as well. Writing in 1970, Fischer seemed to be motivated by the nuclear dangers of the Cold War, and he assigns to historians the responsibility of publicly discussing what the mistakes of the past can teach us today, and how solutions that may have worked yesterday are inappropriate to the problems of today. Fischer manages to be funny while being both thoughtful and thought provoking. A gem.</span></span><span data-dcnode-id="3018" instrument_node="">

</span><span data-dcnode-id="2861" id="freeTextContainer15044685823167511147"><span data-dcnode-id="2865" instrument_node="">Excerpt from my report:</span><br data-dcnode-id="2864"><br data-dcnode-id="2863"><span data-dcnode-id="2862" instrument_node="">Every so often, a work surfaces which attempts to redefine the boundaries of an idea or discipline. Einstein’s theory of relativity opened doors to new ways that physics could be perceived; Emile Durkheim infused a new validity into the study of sociology. Likewise, David Hackett Fischer’s Historians’ Fallacies seeks to do nothing less than change the way that history is understood by academics. Though noble in its cause, the book misses its mark: rather than expanding the</span></span><span data-dcnode-id="2860" instrument_node="">
</span><span data-dcnode-id="2848" id="freeText15044685823167511147" style="display:none"><span data-dcnode-id="2859" instrument_node="">Excerpt from my report:</span><br data-dcnode-id="2858"><br data-dcnode-id="2857"><span data-dcnode-id="2856" instrument_node="">Every so often, a work surfaces which attempts to redefine the boundaries of an idea or discipline. Einstein’s theory of relativity opened doors to new ways that physics could be perceived; Emile Durkheim infused a new validity into the study of sociology. Likewise, David Hackett Fischer’s Historians’ Fallacies seeks to do nothing less than change the way that history is understood by academics. Though noble in its cause, the book misses its mark: rather than expanding the possibilities of historical theory, as other revolutionaries have done in their respective disciplines, Fischer strives to narrow the spectrum of permissibility for what qualifies as acceptable historical research. What follows are a series of analyses and criticisms wherein Fischer often defies the regulations he has established elsewhere in the book. While Fischer’s criticism can serve as a useful guideline for historians, his restrictions are too severe to be followed absolutely.</span><br data-dcnode-id="2855"><br data-dcnode-id="2854"><span data-dcnode-id="2853" instrument_node="">The greatest ongoing problem in Fischer’s analysis is that when providing examples to condemn a particular historical fallacy, he commits another fallacy he has already warned against. In his critique of misplaced literalism, he reprimands historians who would literally interpret John Marshall’s claim that he idolized democracy. To substantiate his complaint, Fischer reasons, “A glance at the contours of John Marshall’s career suggests that he did not idolize Jeffersonian democracy, or Jacksonian democracy, or indeed democracy in any accepted meaning.” Here, Fischer has made an authoritative claim about John Marshall’s true meaning. As the book continues, however, Fischer introduces the “fallacy of the one-dimensional man”, wherein the historian “reduces the complex psychic condition of men merely to their political roles.” It appears, here, that Fischer has broken his own law. By claiming to know decisively what John Marshall’s mindset was, even as Marshall uttered a statement to the contrary, Fischer depicts Marshall as a political entity incapable of having contrasting or complex opinions. Furthermore, Fischer’s mentioned “glance” at the contours of Marshall’s career does not offer any sufficient or concrete evidence to refute the claim that Marshall idolized democracy. It is discourteous for the author to discredit an argument without providing any explicit evidence for doing so, and it invalidates his example.</span><br data-dcnode-id="2852"><br data-dcnode-id="2851"><span data-dcnode-id="2850" instrument_node="">In Fischer’s review of the fallacies of factual significance, he renounces what he calls the “furtive fallacy,” the idea that “reality is reduced to a set of shadows, flickering behind a curtain of flimsy rhetoric.” This fallacy would include the far-fetched conclusions of conspiracy theorists as well as, one can presume, a great number of journalists. While the furtive fallacy was rightfully introduced, Fischer seems to confuse misleading factual pronunciations with genuine historical interpretations. It is verifiably the case that many common historical narratives are fraught with hidden side-stories and questionable intentions. The narrative storyline of U.S. history which is commonly taught in schools excludes a great number of insidious details which are less palatable to the American public: the economic advantages offered by the constitution to its property-owning authors, for instance. Though it may be difficult to prove a conspiracy out of such facts, they deserve to be noted and explored with an array of possibilities. Fischer ought not to condemn the furtive fallacy outright, but rather to condemn it on the condition that it is not supported by facts. Provided a historian does not falsify information or arrive at unfounded conclusions, he should be permitted to deviate from the accepted understanding of an event and offer alternative explanations.</span><br data-dcnode-id="2849"></span><span data-dcnode-id="2847" instrument_node="">

</span><span data-dcnode-id="2748" id="freeTextContainer17274253154040600034"><span data-dcnode-id="2755" instrument_node="">Originally published in 1970. </span><br data-dcnode-id="2754"><br data-dcnode-id="2753"><span data-dcnode-id="2752" instrument_node="">5/25/2019 2ND READING ATTEMPT - With my second attempt, I made it to chapter 6 of this book for my 52 Bookmark Reading Challenge prompt #24/52 - "Book you never finished"...Still never finished! </span><br data-dcnode-id="2751"><br data-dcnode-id="2750"><span data-dcnode-id="2749" instrument_node="">It was highly recommended by Dr. Shane Bernard, historian on Avery Island, Louisiana. He claimed it was the most valuable book he's ever read. Great! This was exactly THE kind of book I had been looking for to help me determine a good history book (the truth) verses a bad on</span></span><span data-dcnode-id="2747" instrument_node="">
</span><span data-dcnode-id="2708" id="freeText17274253154040600034" style="display:none"><span data-dcnode-id="2746" instrument_node="">Originally published in 1970. </span><br data-dcnode-id="2745"><br data-dcnode-id="2744"><span data-dcnode-id="2743" instrument_node="">5/25/2019 2ND READING ATTEMPT - With my second attempt, I made it to chapter 6 of this book for my 52 Bookmark Reading Challenge prompt #24/52 - "Book you never finished"...Still never finished! </span><br data-dcnode-id="2742"><br data-dcnode-id="2741"><span data-dcnode-id="2740" instrument_node="">It was highly recommended by Dr. Shane Bernard, historian on Avery Island, Louisiana. He claimed it was the most valuable book he's ever read. Great! This was exactly THE kind of book I had been looking for to help me determine a good history book (the truth) verses a bad one (propaganda), since we are having all these problems with the cancel culture and woke leftists trying to cancel out and change history. But, I need to search for another by a different author who writes in a language I can actually understand. On page 285, the author writes regarding a fallacy of many historians, a form of error is…”committed by scholars who never use a little word when a big one will do.” Well, this author could learn from his own writing. You need a dictionary handy just to decipher what it is he’s even talking about. But if you are a scholar, I'm sure you would actually rate this as top-notch. The 1-star is due to my own inadequacy for understanding, not for the quality of this book. </span><br data-dcnode-id="2739"><br data-dcnode-id="2738"><span data-dcnode-id="2737" instrument_node="">7/22/2018 - 1ST READING ATTEMPT - What the hell did I just read? You seriously need a doctorates degree to read and understand this book! I read through the first chapter a month ago and found it to be way over my head. So I put it down. I actually had it ready to go in the Goodwill box but just couldn't see it go just yet. </span><br data-dcnode-id="2736"><br data-dcnode-id="2735"><span data-dcnode-id="2734" instrument_node="">I did learn something substantial in that first chapter: That all historians write about history in their own biases and beliefs. Good or bad, right or wrong, their job is to present history to their readers, preferably backing up their writing with empirical proofs, and not their point of views. It is subjective and individual. Wow! I never even thought of it like that before. I've always just simply read and accepted every word in every history book as fact.</span><br data-dcnode-id="2733"><br data-dcnode-id="2732"><span data-dcnode-id="2731" instrument_node="">Because of this insight, I decided to go ahead slowly and painstakingly try to read through it again and try to gleen at least one important piece of information from each chapter in hopes of learning how to critically read history books, news reports or any other nonfiction piece of work, and to determine if what I'm reading can be a "trusted" source. I found that I'm not smart enough to determine a truth from a lie. But, I did at least learn a little bit about how historians write and the many fallacies that could make or break their reputation as great historians. I was only able to read through half of chapter 6 before totally giving it up for good because I literally couldn't understand one single word they were writing about. It's back in the Goodwill box for the next brilliant mind...😒</span><br data-dcnode-id="2730"><br data-dcnode-id="2729"><br data-dcnode-id="2728"><span data-dcnode-id="2727" instrument_node="">SEVEN RULES OF THUMBS FOR HISTORIANS</span><br data-dcnode-id="2726"><br data-dcnode-id="2725"><span data-dcnode-id="2724" instrument_node="">1. Historical evidence must be a direct answer to the question asked and not to some other question.</span><br data-dcnode-id="2723"><span data-dcnode-id="2722" instrument_node="">2. A historian should provide the best relevant evidence from sources closest to the actual event. </span><br data-dcnode-id="2721"><span data-dcnode-id="2720" instrument_node="">3. Negative evidence is actually no evidence at all. An historians' evidence must prove a fact!</span><br data-dcnode-id="2719"><span data-dcnode-id="2718" instrument_node="">4. The burden of proof rests solely on the historian author....rule of responsibility!</span><br data-dcnode-id="2717"><span data-dcnode-id="2716" instrument_node="">5. If a historian can't prove A to be true, nor disprove B to be false, then the historian sets about proving A is more "probable" than B....rule of probability.</span><br data-dcnode-id="2715"><span data-dcnode-id="2714" instrument_node="">6. [Did not understand]</span><br data-dcnode-id="2713"><span data-dcnode-id="2712" instrument_node="">7. [Did not understand]</span><br data-dcnode-id="2711"><br data-dcnode-id="2710"><span data-dcnode-id="2709" instrument_node="">Whelp! That's it folks! It's off to Goodwill.</span></span><span data-dcnode-id="2707" instrument_node="">

</span><span data-dcnode-id="2611" id="freeText5252889103092877179" style="display:none"><span data-dcnode-id="2615" instrument_node="">I had to read this in college, and I'll admit that it seemed terribly dry the first time around. After all, in those days I wanted to learn history - not pick apart someone's writing style. However, I found my copy recently while doing some cleaning and sorting, and sat down to read it again.</span><br data-dcnode-id="2614"><br data-dcnode-id="2613"><span data-dcnode-id="2612" instrument_node="">It really is a helpful book not just for reading and writing history, but for considering a whole host of subjects. The author does a good job of picking apart logical fallacies so that we can recognize them when we read a work more closely. It can make writing more intimidating, though, because I think it's impossible to read this book without worrying about how many of these issues might be infesting one's own work.</span></span><span data-dcnode-id="2610" instrument_node="">

</span><span data-dcnode-id="2277" id="freeText1485947532267091191" style="display:none"><span data-dcnode-id="2281" instrument_node="">It's a favorite lawyer trick to pick apart an opponent's argument and try to use small errors in reasoning to undermine the entire position, even when the mistakes of logic are small enough to leave the main line of argument unscathed. And I remember vividly how my father used to count grammatical errors in the speeches of politicians and then be unwilling to discuss the substance of what they had to say with me because he was so caught up in how the grammatical error count was proof that they were idiots so no substantive discussion was needed. These are the kind of behaviors that Mr. Fischer's approach encourages. I am certainly in favor of logically reasoned arguments that are free of fallacy where possible. But I couldn't help thinking that Mr. Fischer's obsession with rooting out the fallacies sometimes makes him miss the point.</span><br data-dcnode-id="2280"><br data-dcnode-id="2279"><span data-dcnode-id="2278" instrument_node="">Mr. Fischer is so caught up with the minutiae that he commits the "can't see the forest for the trees" fallacy. Perhaps we should call it the argument "ad silvam." Though he sometimes praises the overall value of a historian's work right before ripping into it for some minor error in reasoning, he is mostly quick to dismiss histories in which he finds the fallacies that he enumerates without end. Any book length work is likely to have some fallacies, but can still be hugely valuable. Unfortunately, they are all shot down by Mr. Fischer's fallacy gun long before they can safely take flight. So it becomes easy to miss some of the bigger points in quibbling over the small ones. Marx and Freud, as examples, both had many fallacies in their works. Some of their fundamental ideas were dead wrong. But they were also both influential geniuses, whose works left us much of value to ponder. We can't let nit-picking fallacy hunting bury our greatest thinkers.</span></span><span data-dcnode-id="2276" instrument_node="">

</span><span data-dcnode-id="2202" id="freeTextContainer6369841281001854388"><span data-dcnode-id="2206" instrument_node="">I'm not exactly the intended audience for this book, as I am not a professional historian or historiographer. The book is almost a reference book, painstakingly taxonomizing the many fallacies, large and small, that historians make. As a reader of history, but not a practitioner, I found the book interesting and entertaining, but not immediately useful.</span><br data-dcnode-id="2205"><br data-dcnode-id="2204"><span data-dcnode-id="2203" instrument_node="">Substantively, his points are clear and well-argued, if overly nitpicky. The main area in which I would disagree with his arguments is his rather</span></span><span data-dcnode-id="2201" instrument_node="">
</span><span data-dcnode-id="2193" id="freeText6369841281001854388" style="display:none"><span data-dcnode-id="2200" instrument_node="">I'm not exactly the intended audience for this book, as I am not a professional historian or historiographer. The book is almost a reference book, painstakingly taxonomizing the many fallacies, large and small, that historians make. As a reader of history, but not a practitioner, I found the book interesting and entertaining, but not immediately useful.</span><br data-dcnode-id="2199"><br data-dcnode-id="2198"><span data-dcnode-id="2197" instrument_node="">Substantively, his points are clear and well-argued, if overly nitpicky. The main area in which I would disagree with his arguments is his rather circumscribed view of the historian's role as an analyst. I don't know whether his views on this represent his own personal opinions or reflect the prevailing ideas of his time (the book was published in 1970). I'd be curious to know which, if any, of Fischer's thoughts on the discipline of historical writing have evolved over time.</span><br data-dcnode-id="2196"><br data-dcnode-id="2195"><span data-dcnode-id="2194" instrument_node="">The main impression the book left me with is a love for Fischer's caustic writing style. The book is written with a lot of wit and very little sugarcoating. In a way, it's just a 300+ page diss track toward historians. I found it very fun to read, but I imagine folks like E.H. Carr may have felt differently.</span></span><span data-dcnode-id="2192" instrument_node="">

</span><span data-dcnode-id="1737" id="freeTextContainer13147527874167684836"><span data-dcnode-id="1741" instrument_node="">"How intriguing are the fallacies that lead men's minds astray." - Tarquin.</span><br data-dcnode-id="1740"><br data-dcnode-id="1739"><span data-dcnode-id="1738" instrument_node="">I find myself drawn to lists and examples and studies of logical, rhetorical, historiographical, and other types of fallacies, again and again. The main reason may be that so many of such fallacies are encountered so often on the internet, on blogs and forums, even those claiming to be the most reasonable, fair, and "logical," and in newspapers and television news programs, where they seem to have undergo random evolution</span></span><span data-dcnode-id="1736" instrument_node="">
</span><span data-dcnode-id="1728" id="freeText13147527874167684836" style="display:none"><span data-dcnode-id="1735" instrument_node="">"How intriguing are the fallacies that lead men's minds astray." - Tarquin.</span><br data-dcnode-id="1734"><br data-dcnode-id="1733"><span data-dcnode-id="1732" instrument_node="">I find myself drawn to lists and examples and studies of logical, rhetorical, historiographical, and other types of fallacies, again and again. The main reason may be that so many of such fallacies are encountered so often on the internet, on blogs and forums, even those claiming to be the most reasonable, fair, and "logical," and in newspapers and television news programs, where they seem to have undergo random evolutionary mutation resulting in a tenfold multiplying of their birth-rate. Yes, news-heads, news-readers, and newspaper-writers are filled with fallacies and myths more than any other segment of society I know of. This is not to say that politicians are a distant second; the fact is that politicians' foot-in-mouth events are as likely to be caused by ignorance or even stupidity half the time, leaving logical fallacies to account for no more than half of their total self-exposures. So I want to be able to recognize those fallacies so I can understand how to identify the truths they distort, politically as well as academically.</span><br data-dcnode-id="1731"><br data-dcnode-id="1730"><span data-dcnode-id="1729" instrument_node="">A second reason, no less important than the first, maybe even more important, is so that I can avoid such fallacy-mongering myself, as much as possible. Does Fischer's book help me towards these two goals? I believe it does. While lists of fallacies abound on the internet, they are useful for discriminating individual statements. They work best when applied sentence by sentence, line by line. Fischer's book helps develop a way of thinking that allows one to undertake an extended reading, or a lengthy writing project, with a greater clarity, sharpness, and accuracy than has been demonstrated by many who do not have ventured into this arena of analysis and reasoning.</span></span><span data-dcnode-id="1727" instrument_node="">

</span><span data-dcnode-id="1641" id="freeText16585136271492950045" style="display:none"><span data-dcnode-id="1642" instrument_node="">A rather enjoyable and provocative look at the "fallacies" of historians--- including some major names. What Fischer seems to mean by "fallacy" varies chapter to chapter, from suspect metaphors to ideological blinders to embarrassing anachronisms. Moreover, his examples of bad historical writing often seem idiosyncratic. Fischer criticises a bio of Calvin Coolidge called "A Puritan in Babylon" for the mix of images, but...the title seems to me to be immediately evocative and immediately comprehensible, whether or not 17th-c. English religious dissenter or a city in Mesopotamia are actually involved. Nonetheless, this is a nicely-done guide to common errors in historical writing, and very much worth reading. </span></span><span data-dcnode-id="1640" instrument_node="">
