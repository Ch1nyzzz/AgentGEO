box-sizing: border-box; max-width: 100%;"><span class="CssComponent__CssInlineComponent-sc-1oskqb9-1 UserSelectableText___StyledCssInlineComponent-lsmoq4-0 kghFzc" data-dcnode-id="4294"><span class="q-box qu-userSelect--text" data-dcnode-id="4295" style="box-sizing: border-box;"><p class="q-text qu-display--block qu-wordBreak--break-word qu-textAlign--start" data-dcnode-id="4316" style="box-sizing: border-box; margin-bottom: 1em; overflow-wrap: anywhere; direction: ltr;"><span data-dcnode-id="4317" style="font-weight: normal; font-style: normal; background: none;"><span data-dcnode-id="4318" instrument_node="">I’m an academic historian, so I can speak to this directly. Being an academic historian means that you teach history, probably at the university level. That means you’re a professor.</span></span></p><span data-dcnode-id="4315" instrument_node=""> </span><p class="q-text qu-display--block qu-wordBreak--break-word qu-textAlign--start" data-dcnode-id="4312" style="box-sizing: border-box; margin-bottom: 1em; overflow-wrap: anywhere; direction: ltr;"><span data-dcnode-id="4313" style="font-weight: normal; font-style: normal; background: none;"><span data-dcnode-id="4314" instrument_node="">You also engage in research, which results in conference presentations, published papers, and books.</span></span></p><span data-dcnode-id="4311" instrument_node=""> </span><p class="q-text qu-display--block qu-wordBreak--break-word qu-textAlign--start" data-dcnode-id="4308" style="box-sizing: border-box; margin-bottom: 1em; overflow-wrap: anywhere; direction: ltr;"><span data-dcnode-id="4309" style="font-weight: normal; font-style: normal; background: none;"><span data-dcnode-id="4310" instrument_node="">If you are fortunate enough to teach at a research university, you also guide graduate students through advanced degrees such as the M.A. and the Ph.D., for which they must write theses. Graduate students also attend seminar courses led by professors, in which they read and discuss the key works in their field under your supervision.</span></span></p><span data-dcnode-id="4307" instrument_node=""> </span><p class="q-text qu-display--block qu-wordBreak--break-word qu-textAlign--start" data-dcnode-id="4304" style="box-sizing: border-box; margin-bottom: 1em; overflow-wrap: anywhere; direction: ltr;"><span data-dcnode-id="4305" style="font-weight: normal; font-style: normal; background: none;"><span data-dcnode-id="4306" instrument_node="">Anyone can “do” history, in the sense that they can discover, analyze, and publicize new historical knowledge, but it is much easier to do this as an academic historian. Historical archives are usually tightly controlled, and getting access to them without academic credentials (or their equivalent) isn’t easy.</span></span></p><span data-dcnode-id="4303" instrument_node=""> </span><p class="q-text qu-display--block qu-wordBreak--break-word qu-textAlign--start" data-dcnode-id="4300" style="box-sizing: border-box; margin-bottom: 1em; overflow-wrap: anywhere; direction: ltr;"><span data-dcnode-id="4301" style="font-weight: normal; font-style: normal; background: none;"><span data-dcnode-id="4302" instrument_node="">Academic historians are also “trained,” which means they command the contextual literature of a sub-field, different schools of thought, etc., which is invaluable when it comes to analysis. Academic historians also usually have specialized language and cultural knowledge and skills. So, for instance, an Africanist using the archives of medieval Mali, from the time of Mansa Musa and his successors, would not only know Arabic, French, and possibly other languages, but would also have travel and cultural experience of West Africa and the Niger River region.</span></span></p><span data-dcnode-id="4299" instrument_node=""> </span><p class="q-text qu-display--block qu-wordBreak--break-word qu-textAlign--start" data-dcnode-id="4296" style="box-sizing: border-box; margin-bottom: 0px; overflow-wrap: anywhere; direction: ltr;"><span data-dcnode-id="4297" style="font-weight: normal; font-style: normal; background: none;"><span data-dcnode-id="4298" instrument_node="">Personally, I’m a South Asia specialist, with knowledge of Indian languages, French, and extensive travel and cultural experience relevant to the region I study and teach about.</span></span></p></span></span></div></div></div></div></div></div></div><div class="q-box qu-zIndex--action_bar" data-dcnode-id="4224" style="box-sizing: border-box;"><div class="q-box ActionBar___StyledBox-sc-1tz1b8b-1 jxrrvA" data-dcnode-id="4225" style="box-sizing: border-box; transition-property: box-shadow; transition-duration: 250ms; transition-timing-function: ease-out;"><div class="q-flex qu-justifyContent--space-between qu-alignItems--center qu-flexWrap--nowrap qu-py--tiny" data-dcnode-id="4226" style="box-sizing: border-box; display: flex;"><div class="q-flex qu-alignItems--center" data-dcnode-id="4240" style="box-sizing: border-box; display: flex;"><div class="q-inlineFlex qu-mr--small" data-dcnode-id="4262" style="box-sizing: border-box; display: inline-flex;"><div class="q-inlineFlex qu-borderRadius--pill qu-alignItems--center" data-dcnode-id="4263" style="box-sizing: border-box; display: inline-flex; background-color: rgba(0, 0, 1, 0.03);"><div class="q-box qu-display--inline-block" data-dcnode-id="4273" style="box-sizing: border-box; pointer-events: all;"><div class="q-relative puppeteer_popper_reference" data-dcnode-id="4274" style="box-sizing: border-box; position: relative;"><button aria-label="9 upvotes" class="q-click-wrapper ClickWrapper___StyledClickWrapperBox-zoqi4f-0 bIwtPb base___StyledClickWrapper-lx6eke-1 eqENAR undefined qu-borderTopLeftRadius--pill qu-borderBottomLeftRadius--pill qu-alignItems--center qu-justifyContent--center qu-whiteSpace--nowrap qu-userSelect--none qu-display--inline-flex qu-tapHighlight--white qu-textAlign--center qu-cursor--pointer qu-hover--bg--darken qu-hover--textDecoration--none --block qu-wordBreak--break-word qu-textAlign--start" data-dcnode-id="3863" style="box-sizing: border-box; margin-bottom: 1em; overflow-wrap: anywhere; direction: ltr;"><span data-dcnode-id="3864" style="font-weight: normal; font-style: normal; background: none;"><span data-dcnode-id="3865" instrument_node="">He has at least four (I think it’s more than that, but we’ve never all been in the same room together) PhD candidates researching different things. So he needs to be across whatever it is that we’re doing to ensure that we’re all on track - the Australian system involves a number of “milestone presentations”, so there are points where I’ll have a document ready for one of mine, or someone else for one of theirs, and it’s a bit of a sprint to the line.</span></span></p><span data-dcnode-id="3862" instrument_node=""> </span><p class="q-text qu-display--block qu-wordBreak--break-word qu-textAlign--start" data-dcnode-id="3859" style="box-sizing: border-box; margin-bottom: 0px; overflow-wrap: anywhere; direction: ltr;"><span data-dcnode-id="3860" style="font-weight: normal; font-style: normal; background: none;"><span data-dcnode-id="3861" instrument_node="">He also tends to supervise a couple of Honours candidates (and perhaps even the o</span></span></p><div class="q-absolute qu-textAlign--center qu-zIndex--base" data-dcnode-id="3847" style="box-sizing: border-box; position: absolute; width: 100%; height: 100px; bottom: 0px; background: linear-gradient(rgba(255, 255, 255, 0) 0%, rgb(255, 255, 255) 100%);" width="100%"><div class="q-inlineFlex" data-dcnode-id="3848" style="box-sizing: border-box; display: inline-flex;"><div class="q-relative" data-dcnode-id="3849" style="box-sizing: border-box; position: relative; bottom: -60px;"><button class="q-click-wrapper qu-active--textDecoration--none qu-focus--textDecoration--none ClickWrapper___StyledClickWrapperBox-zoqi4f-0 bIwtPb base___StyledClickWrapper-lx6eke-1 fURggN puppeteer_test_read_more_button qu-borderRadius--pill qu-alignItems--center qu-justifyContent--center qu-whiteSpace--nowrap qu-userSelect--none qu-display--inline-flex qu-bg--gray_ultralight qu-tapHighlight--white qu-textAlign--center qu-cursor--pointer qu-hover--textDecoration--none" data-dcnode-id="3850" role="button" style="box-sizing: border-box; font: inherit; padding: 0px 15px; transition-property: box-shadow, background-color; transition-duration: 60ms; transition-timing-function: ease-out; height: 30px; min-width: 30px; position: relative; box-shadow: rgba(99, 100, 102, 0.2) 0px 0px 0px 1px inset; border-width: 0px; outline: none; color: inherit;" tabindex="0" type="button"><div class="q-flex qu-alignItems--center qu-justifyContent--center" data-dcnode-id="3851" style="box-sizing: border-box; display: flex; max-width: 100%; transition-property: opacity; transition-duration: 60ms; transition-timing-function: ease-in-out;"><div class="q-text qu-display--inline-flex qu-alignItems--center qu-overflow--hidden puppeteer_test_button_text qu-medium qu-color--gray" data-dcnode-id="3856" style="box-sizing: border-box; font-size: 13px;"><div class="q-text qu-ellipsis qu-whiteSpace--nowrap" data-dcnode-id="3857" style="box-sizing: border-box; line-height: normal;"><span data-dcnode-id="3858" instrument_node="">Continue Reading</span></div></div><span class="q-inlineBlock qu-ml--tiny qu-mr--n_tiny" data-dcnode-id="3852" name="ChevronDown" style="box-sizing: border-box; display: inline-block; width: 16px; height: 16px; flex-shrink: 0; line-height: 16px;" width="16px"><span class="CssComponent__CssInlineComponent-sc-1oskqb9-1 Icon___StyledCssInlineComponent-sc-11tmcw7-0 fNkmIo" data-dcnode-id="3853"><svg data-dcnode-id="3854" height="24" viewBox="0 0 24 24" width="24" xmlns="http://www.w3.org/2000/svg"><path class="icon_svg-stroke" d="m5 8.5 7 7 7.005-7" data-dcnode-id="3855" fill="none" stroke="#666" stroke-linecap="round" stroke-width="1.5"></path></svg></span></span></div></button></div></div></div></span></div></div></div></div><div class="q-box qu-display--none" data-dcnode-id="3807" style="box-sizing: border-box;"><div class="q-text" data-dcnode-id="3808" style="box-sizing: border-box; max-width: 100%;"><span class="CssComponent__CssInlineComponent-sc-1oskqb9-1 UserSelectableText___StyledCssInlineComponent-lsmoq4-0 kghFzc" data-dcnode-id="3809"><span class="q-box qu-userSelect--text" data-dcnode-id="3810" style="box-sizing: border-box;"><p class="q-text qu-display--block qu-wordBreak--break-word qu-textAlign--start" data-dcnode-id="3839" style="box-sizing: border-box; margin-bottom: 1em; overflow-wrap: anywhere; direction: ltr;"><span data-dcnode-id="3840" style="font-weight: normal; font-style: normal; background: none;"><span data-dcnode-id="3841" instrument_node="">I’m not one yet, but I can tell you what my PhD supervisor does.</span></span></p><span data-dcnode-id="3838" instrument_node=""> </span><p class="q-text qu-display--block qu-wordBreak--break-word qu-textAlign--start" data-dcnode-id="3835" style="box-sizing: border-box; margin-bottom: 1em; overflow-wrap: anywhere; direction: ltr;"><span data-dcnode-id="3836" style="font-weight: normal; font-style: normal; background: none;"><span data-dcnode-id="3837" instrument_node="">He has at least four (I think it’s more than that, but we’ve never all been in the same room together) PhD candidates researching different things. So he needs to be across whatever it is that we’re doing to ensure that we’re all on track - the Australian system involves a number of “milestone presentations”, so there are points where I’ll have a document ready for one of mine, or someone else for one of theirs, and it’s a bit of a sprint to the line.</span></span></p><span data-dcnode-id="3834" instrument_node=""> </span><p class="q-text qu-display--block qu-wordBreak--break-word qu-textAlign--start" data-dcnode-id="3831" style="box-sizing: border-box; margin-bottom: 1em; overflow-wrap: anywhere; direction: ltr;"><span data-dcnode-id="3832" style="font-weight: normal; font-style: normal; background: none;"><span data-dcnode-id="3833" instrument_node="">He also tends to supervise a couple of Honours candidates (and perhaps even the odd MPhil) in their research, which is similar.</span></span></p><span data-dcnode-id="3830" instrument_node=""> </span><p class="q-text qu-display--block qu-wordBreak--break-word qu-textAlign--start" data-dcnode-id="3827" style="box-sizing: border-box; margin-bottom: 1em; overflow-wrap: anywhere; direction: ltr;"><span data-dcnode-id="3828" style="font-weight: normal; font-style: normal; background: none;"><span data-dcnode-id="3829" instrument_node="">He also lectures on German history every year. Usually, this involves at least one of the “Bismarck to Hitler” or “Hitler to Today” courses, and often both. There’s also a seminar course that he runs on “Nationalism in History” at Honours level, and various other courses that he’ll guest-lecture in or run if the need occurs. In my undergrad years, I remember he turned up to do a guest lecture on intellectual history at the beginning of the Third Reich in a class I was in about German literature, so that was unexpected. Everything in that list that he personally teaches, he needs to arrange lectures for, set exam questions, mark assignments, and so on, although some of that is farmed out to willing postgrads.</span></span></p><span data-dcnode-id="3826" instrument_node=""> </span><p class="q-text qu-display--block qu-wordBreak--break-word qu-textAlign--start" data-dcnode-id="3823" style="box-sizing: border-box; margin-bottom: 1em; overflow-wrap: anywhere; direction: ltr;"><span data-dcnode-id="3824" style="font-weight: normal; font-style: normal; background: none;"><span data-dcnode-id="3825" instrument_node="">Then there’s his own research. I know he’s got a book on the boil at the moment, so there are times when he’s writing that rather than anything else. He was on a research trip just under a year ago to “hang out in the archives” for that.</span></span></p><span data-dcnode-id="3822" instrument_node=""> </span><p class="q-text qu-display--block qu-wordBreak--break-word qu-textAlign--start" data-dcnode-id="3819" style="box-sizing: border-box; margin-bottom: 1em; overflow-wrap: anywhere; direction: ltr;"><span data-dcnode-id="3820" style="font-weight: normal; font-style: normal; background: none;"><span data-dcnode-id="3821" instrument_node="">And then there are the various committees and panels which universities seem to grow more of every year. He’s relatively high up in the National Tertiary Education Union, too, so he often has to devote time to that.</span></span></p><hr class="q-box qu-bg--gray" data-dcnode-id="3818" style="box-sizing: border-box; position: relative; margin: 2em auto; padding: 0px; width: 148px; height: 2px; border: 0px;" width="148px"><p class="q-text qu-display--block qu-wordBreak--break-word qu-textAlign--start" data-dcnode-id="3811" style="box-sizing: border-box; margin-bottom: 0px; overflow-wrap: anywhere; direction: ltr;"><span data-dcnode-id="3816" style="font-weight: normal; font-style: normal; background: none;"><span data-dcnode-id="3817" instrument_node="">If the question is more “What does doing history look like?”, the answer is that we all look at the past and try to answer the question of </span></span><span data-dcnode-id="3814" style="font-weight: normal; font-style: italic; background: none;"><span data-dcnode-id="3815" instrument_node="">WHY?</span></span><span data-dcnode-id="3812" style="font-weight: normal; font-style: normal; background: none;"><span data-dcnode-id="3813" instrument_node=""> This could be a “why” to almost any historical event or process you can imagine. Having asked ourselves that question, we then research, think, and write in order to argue in support of our answer to the question.</span></span></p></span></span></div></div></div></div></div></div></div><div class="q-box qu-zIndex--action_bar" data-dcnode-id="3739" style="box  to — but distinct from — what I do.”</span></span></p><span data-dcnode-id="3631" instrument_node=""> </span><p class="q-text qu-display--block qu-wordBreak--break-word qu-textAlign--start" data-dcnode-id="3624" style="box-sizing: border-box; margin-bottom: 0px; overflow-wrap: anywhere; direction: ltr;"><span data-dcnode-id="3629" style="font-weight: normal; font-style: normal; background: none;"><span data-dcnode-id="3630" instrument_node="">Philbrick, McCullough, and Foote write (or wrote in Foote’s case) for people who read history for entertainment and personal enlightenment. They’re not trying to boldly go where no historian has gone before, or advance an argument that causes their </span></span><span data-dcnode-id="3627" style="font-weight: normal; font-style: italic; background: none;"><span data-dcnode-id="3628" instrument_node="">fellow historians </span></span><span data-dcnode-id="3625" style="font-weight: normal; font-style: normal; background: none;"><span data-dcnode-id="3626" instrument_node="">to consider a particular person, institution, or chain of events from a n</span></span></p><div class="q-absolute qu-textAlign--center qu-zIndex--base" data-dcnode-id="3612" style="box-sizing: border-box; position: absolute; width: 100%; height: 100px; bottom: 0px; background: linear-gradient(rgba(255, 255, 255, 0) 0%, rgb(255, 255, 255) 100%);" width="100%"><div class="q-inlineFlex" data-dcnode-id="3613" style="box-sizing: border-box; display: inline-flex;"><div class="q-relative" data-dcnode-id="3614" style="box-sizing: border-box; position: relative; bottom: -60px;"><button class="q-click-wrapper qu-active--textDecoration--none qu-focus--textDecoration--none ClickWrapper___StyledClickWrapperBox-zoqi4f-0 bIwtPb base___StyledClickWrapper-lx6eke-1 fURggN puppeteer_test_read_more_button qu-borderRadius--pill qu-alignItems--center qu-justifyContent--center qu-whiteSpace--nowrap qu-userSelect--none qu-display--inline-flex qu-bg--gray_ultralight qu-tapHighlight--white qu-textAlign--center qu-cursor--pointer qu-hover--textDecoration--none" data-dcnode-id="3615" role="button" style="box-sizing: border-box; font: inherit; padding: 0px 15px; transition-property: box-shadow, background-color; transition-duration: 60ms; transition-timing-function: ease-out; height: 30px; min-width: 30px; position: relative; box-shadow: rgba(99, 100, 102, 0.2) 0px 0px 0px 1px inset; border-width: 0px; outline: none; color: inherit;" tabindex="0" type="button"><div class="q-flex qu-alignItems--center qu-justifyContent--center" data-dcnode-id="3616" style="box-sizing: border-box; display: flex; max-width: 100%; transition-property: opacity; transition-duration: 60ms; transition-timing-function: ease-in-out;"><div class="q-text qu-display--inline-flex qu-alignItems--center qu-overflow--hidden puppeteer_test_button_text qu-medium qu-color--gray" data-dcnode-id="3621" style="box-sizing: border-box; font-size: 13px;"><div class="q-text qu-ellipsis qu-whiteSpace--nowrap" data-dcnode-id="3622" style="box-sizing: border-box; line-height: normal;"><span data-dcnode-id="3623" instrument_node="">Continue Reading</span></div></div><span class="q-inlineBlock qu-ml--tiny qu-mr--n_tiny" data-dcnode-id="3617" name="ChevronDown" style="box-sizing: border-box; display: inline-block; width: 16px; height: 16px; flex-shrink: 0; line-height: 16px;" width="16px"><span class="CssComponent__CssInlineComponent-sc-1oskqb9-1 Icon___StyledCssInlineComponent-sc-11tmcw7-0 fNkmIo" data-dcnode-id="3618"><svg data-dcnode-id="3619" height="24" viewBox="0 0 24 24" width="24" xmlns="http://www.w3.org/2000/svg"><path class="icon_svg-stroke" d="m5 8.5 7 7 7.005-7" data-dcnode-id="3620" fill="none" stroke="#666" stroke-linecap="round" stroke-width="1.5"></path></svg></span></span></div></button></div></div></div></span></div></div></div></div><div class="q-box qu-display--none" data-dcnode-id="3532" style="box-sizing: border-box;"><div class="q-text" data-dcnode-id="3533" style="box-sizing: border-box; max-width: 100%;"><span class="CssComponent__CssInlineComponent-sc-1oskqb9-1 UserSelectableText___StyledCssInlineComponent-lsmoq4-0 kghFzc" data-dcnode-id="3534"><span class="q-box qu-userSelect--text" data-dcnode-id="3535" style="box-sizing: border-box;"><p class="q-text qu-display--block qu-wordBreak--break-word qu-textAlign--start" data-dcnode-id="3596" style="box-sizing: border-box; margin-bottom: 1em; overflow-wrap: anywhere; direction: ltr;"><span data-dcnode-id="3605" style="font-weight: normal; font-style: normal; background: none;"><span data-dcnode-id="3606" instrument_node="">I can’t speak for </span></span><span data-dcnode-id="3603" style="font-weight: normal; font-style: italic; background: none;"><span data-dcnode-id="3604" instrument_node="">all </span></span><span data-dcnode-id="3601" style="font-weight: normal; font-style: normal; background: none;"><span data-dcnode-id="3602" instrument_node="">academic historians, but </span></span><span data-dcnode-id="3599" style="font-weight: normal; font-style: italic; background: none;"><span data-dcnode-id="3600" instrument_node="">I</span></span><span data-dcnode-id="3597" style="font-weight: normal; font-style: normal; background: none;"><span data-dcnode-id="3598" instrument_node=""> view popular historians the way a championship cross-country skier might view a championship downhill skier: “They’re very good at what they do, which is similar in many ways to — but distinct from — what I do.”</span></span></p><span data-dcnode-id="3595" instrument_node=""> </span><p class="q-text qu-display--block qu-wordBreak--break-word qu-textAlign--start" data-dcnode-id="3588" style="box-sizing: border-box; margin-bottom: 1em; overflow-wrap: anywhere; direction: ltr;"><span data-dcnode-id="3593" style="font-weight: normal; font-style: normal; background: none;"><span data-dcnode-id="3594" instrument_node="">Philbrick, McCullough, and Foote write (or wrote in Foote’s case) for people who read history for entertainment and personal enlightenment. They’re not trying to boldly go where no historian has gone before, or advance an argument that causes their </span></span><span data-dcnode-id="3591" style="font-weight: normal; font-style: italic; background: none;"><span data-dcnode-id="3592" instrument_node="">fellow historians </span></span><span data-dcnode-id="3589" style="font-weight: normal; font-style: normal; background: none;"><span data-dcnode-id="3590" instrument_node="">to consider a particular person, institution, or chain of events from a new angle. They’re trying to turn big, complex historical narratives into engaging stories that people will pay to read . . . and they’re very, very good at it.</span></span></p><span data-dcnode-id="3587" instrument_node=""> </span><p class="q-text qu-display--block qu-wordBreak--break-word qu-textAlign--start" data-dcnode-id="3564" style="box-sizing: border-box; margin-bottom: 1em; overflow-wrap: anywhere; direction: ltr;"><span data-dcnode-id="3585" style="font-weight: normal; font-style: normal; background: none;"><span data-dcnode-id="3586" instrument_node="">Academic historians, when they’re writing in “academic historian” mod</span></span><span data-dcnode-id="3583" style="font-weight: normal; font-style: italic; background: none;"><span data-dcnode-id="3584" instrument_node="">e,</span></span><span data-dcnode-id="3581" style="font-weight: normal; font-style: normal; background: none;"><span data-dcnode-id="3582" instrument_node=""> </span></span><span data-dcnode-id="3579" style="font-weight: normal; font-style: italic; background: none;"><span data-dcnode-id="3580" instrument_node="">are</span></span><span data-dcnode-id="3577" style="font-weight: normal; font-style: normal; background: none;"><span data-dcnode-id="3578" instrument_node=""> trying to go someplace new: to add to the sum total of historical knowledge. If their ambitions are modest, they’re trying to offer an explanation of a question or problem that nobody’s really tackled before (my first book, </span></span><span data-dcnode-id="3575" style="font-weight: normal; font-style: italic; background: none;"><span data-dcnode-id="3576" instrument_node="">Men Among the Mammoths, </span></span><span data-dcnode-id="3573" style="font-weight: normal; font-style: normal; background: none;"><span data-dcnode-id="3574" instrument_node="">was very much like that). If they’re swinging for the fences, they’re taking a well-studied problem, and offering a new interpretation (see, for example, A. J. P. Taylor’s </span></span><span data-dcnode-id="3571" style="font-weight: normal; font-style: italic; background: none;"><span data-dcnode-id="3572" instrument_node="">Origins of the Second World War, </span></span><span data-dcnode-id="3569" style="font-weight: normal; font-style: normal; background: none;"><span data-dcnode-id="3570" instrument_node="">or Gordon Wood’s </span></span><span data-dcnode-id="3567" style="font-weight: normal; font-style: italic; background: none;"><span data-dcnode-id="3568" instrument_node="">The Radicalism of the American Revolution</span></span><span data-dcnode-id="3565" style="font-weight: normal; font-style: normal; background: none;"><span data-dcnode-id="3566" instrument_node="">).</span></span></p><span data-dcnode-id="3563" instrument_node=""> </span><p class="q-text qu-display--block qu-wordBreak--break-word qu-textAlign--start" data-dcnode-id="3544" style="box-sizing: border-box; margin-bottom: 1em; overflow-wrap: anywhere; direction: ltr;"><span data-dcnode-id="3561" style="font-weight: normal; font-style: normal; background: none;"><span data-dcnode-id="3562" instrument_node="">They’re both challenging, but the challenges come in different places and overcoming them requires different skill sets. Popular historians have to be </span></span><span data-dcnode-id="3559" style="font-weight: normal; font-style: italic; background: none;"><span data-dcnode-id="3560" instrument_node="">consistently </span></span><span data-dcnode-id="3557" style="font-weight: normal; font-style: normal; background: none;"><span data-dcnode-id="3558" instrument_node="">clear, vivid, and engaging; the reader who puts down your current book after one too many dull chapters is highly unlikely to pick up your next one. Academic historians have to </span></span><span data-dcnode-id="3555" style="font-weight: normal; font-style: italic; background: none;"><span data-dcnode-id="3556" instrument_node="">consistently </span></span><span data-dcnode-id="3553" style="font-weight: normal; font-style: normal; background: none;"><span data-dcnode-id="3554" instrument_node="">build</span></span><span data-dcnode-id="3551" style="font-weight: normal; font-style: italic; background: none;"><span data-dcnode-id="3552" instrument_node=""> </span></span><span data-dcnode-id="3549" style="font-weight: normal; font-style: normal; background: none;"><span data-dcnode-id="3550" instrument_node="">solid, meticulously-documented arguments; hand-waving the details or not attending to the existing literature is like diving into a shark tank with a bleeding cut on your leg. Academic readers, however, will put up with a </span></span><span data-dcnode-id="3547" style="font-weight: normal; font-style: italic; background: none;"><span data-dcnode-id="3548" instrument_node="">lot </span></span><span data-dcnode-id="3545" style="font-weight: normal; font-style: normal; background: none;"><span data-dcnode-id="3546" instrument_node="">of slack prose, and popular audiences will forgive you hand-waves and simplifications that academic readers would roast you for.</span></span></p><span data-dcnode-id="3543" instrument_node=""> </span><p class="q-text qu-display--block qu-wordBreak--break-word qu-textAlign--start" data-dcnode-id="3536" style="box-sizing: border-box; margin-bottom: 0px; overflow-wrap: anywhere; direction: ltr;"><span data-dcnode-id="3541" style="font-weight: normal; font-style: normal; background: none;"><span data-dcnode-id="3542" instrument_node="">So . . . back to the skiers. The cross-country person might wish that </span></span><span data-dcnode-id="3539" style="font-weight: normal; font-style: italic; background: none;"><span data-dcnode-id="3540" instrument_node="">they </span></span><span data-dcnode-id="3537" style="font-weight: normal; font-style: normal; background: none;"><span data-dcnode-id="3538" instrument_node="">got the kind of prime-time TV coverage that the downhillers do when the Winter Olympics roll around every four years, but you’d never see them saying that the downhillers aren’t damned good at what they do. They’re playing a different game, but playing it at a very high level.</span></span></p></span></span></div></div></div></div></div></div></div><div class="q-box qu-zIndex--action_bar" data-dcnode-id="3464" style="box-sizing: border-box;"><div class="q-box ActionBar___StyledBox-sc-1tz1b8b-1 jxrrvA" data-dcnode-id="3465" style="box-sizing: border-box; transition-property: box-shadow; transition-duration: 250ms; transition-timing-function: ease-out;"><div class="q-flex qu-justifyContent--space-between qu-alignItems--center qu-flexWrap--nowrap qu-py--tiny" data-dcnode-id="3466" style="box-sizing: border-box; display: flex;"><div class="q-flex qu-alignItems--center" data-dcnode-id="3480" style="box-sizing: border-box; display: flex;"><div class="q-inlineFlex qu-mr--small" data-dcnode-id="3502" style="box-sizing: border-box; display: inline-flex;"><div class="q-inlineFlex qu-borderRadius--pill qu-alignItems--center" data-dcnode-id="3503" style="box-sizing: border-box; display: inline-flex; background-color: rgba(0, 0, 1, 0.03);"><div class="q-box qu-display--inline-block" data-dcnode-id="3513" style="box-sizing: border-box; pointer-events: all;"><div class="q-relative puppeteer_popper_reference" data-dcnode-id="3514" style="box-sizing: border-box; position: relative;"><button aria-label="6 upvotes" class="q-click-wrapper ClickWra tle" data-dcnode-id="2828" style="box-sizing: border-box;"><span class="q-box qu-userSelect--text" data-dcnode-id="2829" style="box-sizing: border-box;"><span data-dcnode-id="2830" style="background: none;"><span data-dcnode-id="2831" instrument_node="">Which are some of the most sought after positions by historians for a job?</span></span></span></div></div></div></div></a></span></span></div></div></div></div><div class="q-click-wrapper qu-display--block qu-tapHighlight--white qu-cursor--pointer ClickWrapper___StyledClickWrapperBox-zoqi4f-0 bIwtPb" data-dcnode-id="2754" style="box-sizing: border-box; font: inherit; padding: 0px; width: 100%; position: relative; color: inherit; text-align: inherit;" tabindex="0" width="100%"><div class="q-box spacing_log_answer_content puppeteer_test_answer_content" data-dcnode-id="2755" style="box-sizing: border-box;"><div class="q-relative" data-dcnode-id="2756" style="box-sizing: border-box; position: relative;"><div class="q-absolute qu-full qu-zIndex--base" data-dcnode-id="2817" style="box-sizing: border-box; position: absolute;"></div><div class="q-box" data-dcnode-id="2757" style="box-sizing: border-box; max-width: 100%;"><div class="q-box qu-cursor--pointer QTextTruncated___StyledBox-sc-1pev100-0 ejgusd" data-dcnode-id="2793" style="box-sizing: border-box;"><div class="q-relative" data-dcnode-id="2794" style="box-sizing: border-box; position: relative;"><div class="q-box qu-overflow--hidden" data-dcnode-id="2795" style="box-sizing: border-box; max-height: 300px;"><div class="q-text qu-wordBreak--break-word" data-dcnode-id="2796" style="box-sizing: border-box;"><span class="q-box qu-userSelect--text" data-dcnode-id="2797" style="box-sizing: border-box;"><p class="q-text qu-display--block qu-wordBreak--break-word qu-textAlign--start" data-dcnode-id="2814" style="box-sizing: border-box; margin-bottom: 1em; overflow-wrap: anywhere; direction: ltr;"><span data-dcnode-id="2815" style="font-weight: normal; font-style: normal; background: none;"><span data-dcnode-id="2816" instrument_node="">Most historians probably still prize a research-oriented job the most, either as a professor at a research university or as an archivist working in a museum or archive that specializes in what we study. However, those jobs are rare, so most of us settle for something else in the academic line - usually a teaching position with some research at a Tier-II university or a community college.</span></span></p><span data-dcnode-id="2813" instrument_node=""> </span><p class="q-text qu-display--block qu-wordBreak--break-word qu-textAlign--start" data-dcnode-id="2810" style="box-sizing: border-box; margin-bottom: 0px; overflow-wrap: anywhere; direction: ltr;"><span data-dcnode-id="2811" style="font-weight: normal; font-style: normal; background: none;"><span data-dcnode-id="2812" instrument_node="">If you’re asking about the jobs history majors mostly gravitate to, that’s not really a question that can be answered. A degree in history does not train a person for a specific job, and in a rapidly-changing, </span></span></p><div class="q-absolute qu-textAlign--center qu-zIndex--base" data-dcnode-id="2798" style="box-sizing: border-box; position: absolute; width: 100%; height: 100px; bottom: 0px; background: linear-gradient(rgba(255, 255, 255, 0) 0%, rgb(255, 255, 255) 100%);" width="100%"><div class="q-inlineFlex" data-dcnode-id="2799" style="box-sizing: border-box; display: inline-flex;"><div class="q-relative" data-dcnode-id="2800" style="box-sizing: border-box; position: relative; bottom: -60px;"><button class="q-click-wrapper qu-active--textDecoration--none qu-focus--textDecoration--none ClickWrapper___StyledClickWrapperBox-zoqi4f-0 bIwtPb base___StyledClickWrapper-lx6eke-1 fURggN puppeteer_test_read_more_button qu-borderRadius--pill qu-alignItems--center qu-justifyContent--center qu-whiteSpace--nowrap qu-userSelect--none qu-display--inline-flex qu-bg--gray_ultralight qu-tapHighlight--white qu-textAlign--center qu-cursor--pointer qu-hover--textDecoration--none" data-dcnode-id="2801" role="button" style="box-sizing: border-box; font: inherit; padding: 0px 15px; transition-property: box-shadow, background-color; transition-duration: 60ms; transition-timing-function: ease-out; height: 30px; min-width: 30px; position: relative; box-shadow: rgba(99, 100, 102, 0.2) 0px 0px 0px 1px inset; border-width: 0px; outline: none; color: inherit;" tabindex="0" type="button"><div class="q-flex qu-alignItems--center qu-justifyContent--center" data-dcnode-id="2802" style="box-sizing: border-box; display: flex; max-width: 100%; transition-property: opacity; transition-duration: 60ms; transition-timing-function: ease-in-out;"><div class="q-text qu-display--inline-flex qu-alignItems--center qu-overflow--hidden puppeteer_test_button_text qu-medium qu-color--gray" data-dcnode-id="2807" style="box-sizing: border-box; font-size: 13px;"><div class="q-text qu-ellipsis qu-whiteSpace--nowrap" data-dcnode-id="2808" style="box-sizing: border-box; line-height: normal;"><span data-dcnode-id="2809" instrument_node="">Continue Reading</span></div></div><span class="q-inlineBlock qu-ml--tiny qu-mr--n_tiny" data-dcnode-id="2803" name="ChevronDown" style="box-sizing: border-box; display: inline-block; width: 16px; height: 16px; flex-shrink: 0; line-height: 16px;" width="16px"><span class="CssComponent__CssInlineComponent-sc-1oskqb9-1 Icon___StyledCssInlineComponent-sc-11tmcw7-0 fNkmIo" data-dcnode-id="2804"><svg data-dcnode-id="2805" height="24" viewBox="0 0 24 24" width="24" xmlns="http://www.w3.org/2000/svg"><path class="icon_svg-stroke" d="m5 8.5 7 7 7.005-7" data-dcnode-id="2806" fill="none" stroke="#666" stroke-linecap="round" stroke-width="1.5"></path></svg></span></span></div></button></div></div></div></span></div></div></div></div><div class="q-box qu-display--none" data-dcnode-id="2758" style="box-sizing: border-box;"><div class="q-text" data-dcnode-id="2759" style="box-sizing: border-box; max-width: 100%;"><span class="CssComponent__CssInlineComponent-sc-1oskqb9-1 UserSelectableText___StyledCssInlineComponent-lsmoq4-0 kghFzc" data-dcnode-id="2760"><span class="q-box qu-userSelect--text" data-dcnode-id="2761" style="box-sizing: border-box;"><p class="q-text qu-display--block qu-wordBreak--break-word qu-textAlign--start" data-dcnode-id="2790" style="box-sizing: border-box; margin-bottom: 1em; overflow-wrap: anywhere; direction: ltr;"><span data-dcnode-id="2791" style="font-weight: normal; font-style: normal; background: none;"><span data-dcnode-id="2792" instrument_node="">Most historians probably still prize a research-oriented job the most, either as a professor at a research university or as an archivist working in a museum or archive that specializes in what we study. However, those jobs are rare, so most of us settle for something else in the academic line - usually a teaching position with some research at a Tier-II university or a community college.</span></span></p><span data-dcnode-id="2789" instrument_node=""> </span><p class="q-text qu-display--block qu-wordBreak--break-word qu-textAlign--start" data-dcnode-id="2786" style="box-sizing: border-box; margin-bottom: 1em; overflow-wrap: anywhere; direction: ltr;"><span data-dcnode-id="2787" style="font-weight: normal; font-style: normal; background: none;"><span data-dcnode-id="2788" instrument_node="">If you’re asking about the jobs history majors mostly gravitate to, that’s not really a question that can be answered. A degree in history does not train a person for a specific job, and in a rapidly-changing, constantly disrupted economy that can be a good thing. The history degree teaches you how to read, think, analyze, and write. It gives you a flexible set of vital skills, and what you do with it is sort of up to you. This is why, when advising my History majors, I always ask them about careers. I want them to start thinking, early, about how they might apply what they’re learning in the so-called “real world,” which is a very silly way of referring to the economy.</span></span></p><span data-dcnode-id="2785" instrument_node=""> </span><p class="q-text qu-display--block qu-wordBreak--break-word qu-textAlign--start" data-dcnode-id="2782" style="box-sizing: border-box; margin-bottom: 1em; overflow-wrap: anywhere; direction: ltr;"><span data-dcnode-id="2783" style="font-weight: normal; font-style: normal; background: none;"><span data-dcnode-id="2784" instrument_node="">Students take history majors and do all sorts of things with them. They go into business, finance, law, government, the diplomatic service, NGO work, insurance, the military, policing, detective work, and many, many other pursuits, far too numerous to name. I’ve had students become doctors, nurses, school teachers, and - yes - even professors, on occasion. Now, sometimes conservatives, who hate the study of history, will tell you that “you can’t get a job with a history degree.” They want to shut down the social sciences and humanities. That’s nonsense, of course. They also usually present bogus statistics. Most social science and humanities degrees don’t lead directly to professional jobs right out of undergraduate; they require an additional masters-level degree, at least - you know, just like an MBA - and your masters can be in anything you like. History prepares you to literally go in any direction you want, with a solid set of skills, once you’re ready to set your course. This makes it an excellent major if you’re undecided, because it doesn’t lock you into anything.</span></span></p><span data-dcnode-id="2781" instrument_node=""> </span><p class="q-text qu-display--block qu-wordBreak--break-word qu-textAlign--start" data-dcnode-id="2778" style="box-sizing: border-box; margin-bottom: 1em; overflow-wrap: anywhere; direction: ltr;"><span data-dcnode-id="2779" style="font-weight: normal; font-style: normal; background: none;"><span data-dcnode-id="2780" instrument_node="">To determine the employability of history majors, you don’t look at someone right after they get their BA - or, these days, more likely their BS, since too many students opt not to study foreign languages. You look at what they’re doing 4–8 years out. That’s today’s reality. We don’t live in the 1950s, and it would be good, for framing public policies, if hyper-conservatives would catch up. It’s 2021. Their understanding of education and the job market is only 71 years out of date.</span></span></p><span data-dcnode-id="2777" instrument_node=""> </span><p class="q-text qu-display--block qu-wordBreak--break-word qu-textAlign--start" data-dcnode-id="2774" style="box-sizing: border-box; margin-bottom: 1em; overflow-wrap: anywhere; direction: ltr;"><span data-dcnode-id="2775" style="font-weight: normal; font-style: normal; background: none;"><span data-dcnode-id="2776" instrument_node="">So, what do history majors do? Just about everything. In fact, they spread themselves out so widely that you can’t really point to specific jobs they go into, only to certain “clumps” like law, politics, policing, and teaching. A fellow graduate student once captured this unique aspect of the history major by saying, after graduation, “It’s a history degree! Go coach basketball.” By this, he meant you’ve got your hunting license, now go hunt a job - anything you want… within reason, of course. You’re not going to be a nuclear physicist or a brain surgeon.</span></span></p><span data-dcnode-id="2773" instrument_node=""> </span><p class="q-text qu-display--block qu-wordBreak--break-word qu-textAlign--start" data-dcnode-id="2770" style="box-sizing: border-box; margin-bottom: 1em; overflow-wrap: anywhere; direction: ltr;"><span data-dcnode-id="2771" style="font-weight: normal; font-style: normal; background: none;"><span data-dcnode-id="2772" instrument_node="">Let’s talk about George Bush, Jr., who got a BA in History from Yale. He paired that with an MBA, did a controversial stint in the National Guard as a pilot, then started an oil exploration firm and, later, invested in a sports franchise before entering politics, eventually becoming Governor of Texas and then President of the U.S. So, there’s one career route for you. Of course, it helps if your daddy is rich and has political connections, but that’s true no matter who you are. I don’t discourage my students from exploiting their connections if they have any, but most of them don’t. That’s why the skills they learn really matter.</span></span></p><span data-dcnode-id="2769" instrument_node=""> </span><p class="q-text qu-display--block qu-wordBreak--break-word qu-textAlign--start" data-dcnode-id="2766" style="box-sizing: border-box; margin-bottom: 1em; overflow-wrap: anywhere; direction: ltr;"><span data-dcnode-id="2767" style="font-weight: normal; font-style: normal; background: none;"><span data-dcnode-id="2768" instrument_node="">Some people are very happy with lots of money. Who wouldn’t be? However, I’ve known quite a few miserable rich people. Consider all the rich couples you’ve seen start ugly, drunken arguments in restaurants. Or all the messy millionaire divorces you hear about. Clearly, money alone can’t buy a happy life. Perhaps one of the great, hidden values of the history degree is the perspective that it brings, as well as the understanding of life and human foibles. History also helps one experience and appreciate the world in a much richer, more nuanced way. I can’t tell you how many obviously rich tourists I’ve seen, all over the world, gaping at monuments, struggling to comprehend what they’re seeing. With a background in history, travel - if you get to do it - is a mind-blowing, incredible experience. Sadly, I’ve seen friends and students chase after some particular job simply because it paid well. They did so due to peer and family pressure, and they ended up wealthy, cynical, and deeply unhappy.</span></span></p><span data-dcnode-id="2765" instrument_node=""> </span><p class="q-text qu-display--block qu-wordBreak--break-word qu-textAlign--start" data-dcnode-id="2762" style="box-sizing: border-box; margin-bottom: 0px; overflow-wrap: anywhere; direction: ltr;"><span data-dcnode-id="2763" style="font-weight: normal; font-style: normal; background: none;"><span data-dcnode-id="2764" instrument_node="">So, my career advice is to think about what might make you happy 20 years from now, and how you want to live. Think holistically, not just in terms of money and material gain. Then figure out a strategy for getting there, one that’s flexible enough to enable you to take advantage of short-term opportunities along the way. Build solid, basic skills - a BA or BS in History is a great way to do that - and then go pursue your goal.</span></span></p></span></span></div></div></div></div></div></div></div><div class="q-box qu-zIndex--action_bar" data-dcnode-id="2685" style="box-sizing: border-box;"><div class="q-box ActionBar___StyledBox-sc-1tz1b8b-1 jxrrvA" data-dcnode-id="2686" style="box-sizing: border-box; transition-property: box-shadow; transition-duration: 250ms; transition-timing-function: ease-out;"><div class="q-flex qu-justifyContent--space-between qu-alignItems--center qu-flexWrap--nowrap qu-py--tiny" data-dcnode-id="2687" style="box-sizing: border-box; display: flex;"><div class="q-flex qu-alignItems--center" data-dcnode-id="2701" style="box-sizing: border-box; display: flex;"><div class="q-inlineFlex qu-mr--small" data-dcnode-id="2728" style="box-sizing: border-box; display: inline-flex;"><div class="q-inlineFlex qu-borderRadius--pill qu-alignItems--center" data-dcnode-id="2729" style="box-sizing: border-box; display: inline-flex; background-color: rgba(0, 0, 1, 0.03);"><div class="q-box qu-display--inline-block" data-dcnode-id="2739" style="box-sizing: border-box; pointer-events: all;"><div class="q-relative puppeteer_popper_reference" data-dcnode-id="2740" style="box-sizing: border-box; position: relative;"><button aria-label="2 upvotes" class="q-click-wrapp ata-dcnode-id="2173" style="box-sizing: border-box; margin-bottom: 1em; overflow-wrap: anywhere; direction: ltr;"><span data-dcnode-id="2174" style="font-weight: normal; font-style: normal; background: none;"><span data-dcnode-id="2175" instrument_node="">The great historian had only dealt with a handful of documents, but he had written just as many notes as the younger historian. The younger historian read the notes, and realized how to a great historian, every document was a mine of information, because the great historian was able to make connections, to see how a simple document could convey a deeper insight into a particular historical era.</span></span></p><span data-dcnode-id="2172" instrument_node=""> </span><p class="q-text qu-display--block qu-wordBreak--break-word qu-textAlign--start" data-dcnode-id="2165" style="box-sizing: border-box; margin-bottom: 1em; overflow-wrap: anywhere; direction: ltr;"><span data-dcnode-id="2170" style="font-weight: normal; font-style: normal; background: none;"><span data-dcnode-id="2171" instrument_node="">This might give a false impression - as though the great historian is like Sherlock Holmes (“See Watson, he clearly wrote this with his </span></span><span data-dcnode-id="2168" style="font-weight: normal; font-style: italic; background: none;"><span data-dcnode-id="2169" instrument_node="">left </span></span><span data-dcnode-id="2166" style="font-weight: normal; font-style: normal; background: none;"><span data-dcnode-id="2167" instrument_node="">hand.”) It is more a question of having a sufficient understanding of a certain historical era to recognize that it is noteworthy that Person A addresses Person B as if they were equal, when one might have expected Person A to think of Person B as inferior, and to immediately see that this means that Prof. J’s theory about social relationships must be modified.</span></span></p><span data-dcnode-id="2164" instrument_node=""> </span><p class="q-text qu-display--block qu-wordBreak--break-word qu-textAlign--start" data-dcnode-id="2161" style="box-sizing: border-box; margin-bottom: 0px; overflow-wrap: anywhere; direction: ltr;"><span data-dcnode-id="2162" style="font-weight: normal; font-style: normal; background: none;"><span data-dcnode-id="2163" instrument_node="">I apologize for the fact that I can’t remember the name of the great historian in question - that’s one indication that I will never be a great historian myself.</span></span></p></span></span></div></div></div></div></div></div></div><div class="q-box qu-zIndex--action_bar" data-dcnode-id="2079" style="box-sizing: border-box;"><div class="q-box ActionBar___StyledBox-sc-1tz1b8b-1 jxrrvA" data-dcnode-id="2080" style="box-sizing: border-box; transition-property: box-shadow; transition-duration: 250ms; transition-timing-function: ease-out;"><div class="q-flex qu-justifyContent--space-between qu-alignItems--center qu-flexWrap--nowrap qu-py--tiny" data-dcnode-id="2081" style="box-sizing: border-box; display: flex;"><div class="q-flex qu-alignItems--center" data-dcnode-id="2095" style="box-sizing: border-box; display: flex;"><div class="q-inlineFlex qu-mr--small" data-dcnode-id="2127" style="box-sizing: border-box; display: inline-flex;"><div class="q-inlineFlex qu-borderRadius--pill qu-alignItems--center" data-dcnode-id="2128" style="box-sizing: border-box; display: inline-flex; background-color: rgba(0, 0, 1, 0.03);"><div class="q-box qu-display--inline-block" data-dcnode-id="2138" style="box-sizing: border-box; pointer-events: all;"><div class="q-relative puppeteer_popper_reference" data-dcnode-id="2139" style="box-sizing: border-box; position: relative;"><button aria-label="7 upvotes" class="q-click-wrapper ClickWrapper___StyledClickWrapperBox-zoqi4f-0 bIwtPb base___StyledClickWrapper-lx6eke-1 eqENAR undefined qu-borderTopLeftRadius--pill qu-borderBottomLeftRadius--pill qu-alignItems--center qu-justifyContent--center qu-whiteSpace--nowrap qu-userSelect--none qu-display--inline-flex "1791" style="box-sizing: border-box;"><span class="q-box qu-userSelect--text" data-dcnode-id="1792" style="box-sizing: border-box;"><p class="q-text qu-display--block qu-wordBreak--break-word qu-textAlign--start" data-dcnode-id="1809" style="box-sizing: border-box; margin-bottom: 1em; overflow-wrap: anywhere; direction: ltr;"><span data-dcnode-id="1810" style="font-weight: normal; font-style: normal; background: none;"><span data-dcnode-id="1811" instrument_node="">Well, Samir, to a variety of ends, an art historian studies the visual arts and architecture of the past. And a little bit of the present. Art history is a relatively new discipline, having evolved from the efforts by the 18th century German Johann Winklemann to describe and categorize the art of the classical past. During the 19th century a number of scholars and connoisseurs built a structure that, at least for western art, elucidates the evolution of styles and the influences that shaped them. Art history as university department is largely a product of the 20th century.</span></span></p><span data-dcnode-id="1808" instrument_node=""> </span><p class="q-text qu-display--block qu-wordBreak--break-word qu-textAlign--start" data-dcnode-id="1805" style="box-sizing: border-box; margin-bottom: 0px; overflow-wrap: anywhere; direction: ltr;"><span data-dcnode-id="1806" style="font-weight: normal; font-style: normal; background: none;"><span data-dcnode-id="1807" instrument_node="">Most art historians </span></span></p><div class="q-absolute qu-textAlign--center qu-zIndex--base" data-dcnode-id="1793" style="box-sizing: border-box; position: absolute; width: 100%; height: 100px; bottom: 0px; background: linear-gradient(rgba(255, 255, 255, 0) 0%, rgb(255, 255, 255) 100%);" width="100%"><div class="q-inlineFlex" data-dcnode-id="1794" style="box-sizing: border-box; display: inline-flex;"><div class="q-relative" data-dcnode-id="1795" style="box-sizing: border-box; position: relative; bottom: -60px;"><button class=" ><path class="icon_svg-stroke" d="m5 8.5 7 7 7.005-7" data-dcnode-id="1801" fill="none" stroke="#666" stroke-linecap="round" stroke-width="1.5"></path></svg></span></span></div></button></div></div></div></span></div></div></div></div><div class="q-box qu-display--none" data-dcnode-id="1769" style="box-sizing: border-box;"><div class="q-text" data-dcnode-id="1770" style="box-sizing: border-box; max-width: 100%;"><span class="CssComponent__CssInlineComponent-sc-1oskqb9-1 UserSelectableText___StyledCssInlineComponent-lsmoq4-0 kghFzc" data-dcnode-id="1771"><span class="q-box qu-userSelect--text" data-dcnode-id="1772" style="box-sizing: border-box;"><p class="q-text qu-display--block qu-wordBreak--break-word qu-textAlign--start" data-dcnode-id="1785" style="box-sizing: border-box; margin-bottom: 1em; overflow-wrap: anywhere; direction: ltr;"><span data-dcnode-id="1786" style="font-weight: normal; font-style: normal; background: none;"><span data-dcnode-id="1787" instrument_node="">Well, Samir, to a variety of ends, an art historian studies the visual arts and architecture of the past. And a little bit of the present. Art history is a relatively new discipline, having evolved from the efforts by the 18th century German Johann Winklemann to describe and categorize the art of the classical past. During the 19th century a number of scholars and connoisseurs built a structure that, at least for western art, elucidates the evolution of styles and the influences that shaped them. Art history as university department is largely a product of the 20th century.</span></span></p><span data-dcnode-id="1784" instrument_node=""> </span><p class="q-text qu-display--block qu-wordBreak--break-word qu-textAlign--start" data-dcnode-id="1781" style="box-sizing: border-box; margin-bottom: 1em; overflow-wrap: anywhere; direction: ltr;"><span data-dcnode-id="1782" style="font-weight: normal; font-style: normal; background: none;"><span data-dcnode-id="1783" instrument_node="">Most art historians specialize in a time period, medium, or subject matter. I, for instance, am a generalist: I can teach the history of western art from the cave paintings up to the present, but my specialty is modernism, mainly 19th and 20th century art, and the history of photography.</span></span></p><span data-dcnode-id="1780" instrument_node=""> </span><p class="q-text qu-display--block qu-wordBreak--break-word qu-textAlign--start" data-dcnode-id="1777" style="box-sizing: border-box; margin-bottom: 1em; overflow-wrap: anywhere; direction: ltr;"><span data-dcnode-id="1778" style="font-weight: normal; font-style: normal; background: none;"><span data-dcnode-id="1779" instrument_node="">The question really is what one does with training in art history, and the answer to that is pretty much whatever you want. You can do research, conservation, education, museum curating, and commercial pursuits. You can become a writer and freelance lecturer. You can invent a career. You can tuck your training in your pocket, get wealthy in business, law, technology or something else, and then become active on your museum’s Board of Trustees.</span></span></p><span data-dcnode-id="1776" instrument_node=""> </span><p class="q-text qu-display--block qu-wordBreak--break-word qu-textAlign--start" data-dcnode-id="1773" style="box-sizing: border-box; margin-bottom: 0px; overflow-wrap: anywhere; direction: ltr;"><span data-dcnode-id="1774" style="font-weight: normal; font-style: normal; background: none;"><span data-dcnode-id="1775" instrument_node="">Art historians, in my experience, do a little bit of everything. And most of us love that.</span></span></p></span></span></div></div></div></div></div></div></div><div class="q-box qu-zIndex--action_bar" data-dcnode-id="1701" style="box-sizing: border-box;"><div class="q-box ActionBar___StyledBox-sc-1tz1b8b-1 jxrrvA" data-dcnode-id="1702" style="box-sizing: border-box; transition-property: box-shadow; transition-duration: 250ms; transition-timing-function: ck qu-wordBreak--break-word qu-textAlign--start" data-dcnode-id="1572" style="box-sizing: border-box; margin-bottom: 1em; overflow-wrap: anywhere; direction: ltr;"><span data-dcnode-id="1573" style="font-weight: normal; font-style: normal; background: none;"><span data-dcnode-id="1574" instrument_node="">There is no such thing as an objective historian. Such a person does not exist. It is like a unicorn. People claim they exist but no one has ever seen one. Why? Because no matter how hard a person tries, their personal prejudices or beliefs will creep in.</span></span></p><span data-dcnode-id="1571" instrument_node=""> </span><p class="q-text qu-display--block qu-wordBreak--break-word qu-textAlign--start" data-dcnode-id="1568" style="box-sizing: border-box; margin-bottom: 1em; overflow-wrap: anywhere; direction: ltr;"><span data-dcnode-id="1569" style="font-weight: normal; font-style: normal; background: none;"><span data-dcnode-id="1570" instrument_node="">More often than not, their prejudices are contained not in what is placed in the account but what is left out. The choice of adjectives also is a reflection of the prejudice of the historian.</span></span></p><span data-dcnode-id="1567" instrument_node=""> </span><p class="q-text qu-display--block qu-wordBreak--break-word qu-textAlign--start" data-dcnode-id="1564" style="box-sizing: border-box; margin-bottom: 1em; overflow-wrap: anywhere; direction: ltr;"><span data-dcnode-id="1565" style="font-weight: normal; font-style: normal; background: none;"><span data-dcnode-id="1566" instrument_node="">As readers and students of history we must approach a book or work with the view that the writer was a person like us with beliefs and prejudices and take that into account as we read the work.</span></span></p><span data-dcnode-id="1563" instrument_node=""> </span><p class="q-text qu-display--block qu-wordBreak--break-word qu-textAlign--start" data-dcnode-id="1560" style="box-sizing: border-box; margin-bottom: 1em; overflow-wrap: anywhere; direction: ltr;"><span data-dcnode-id="1561" style="font-weight: normal; font-style: normal; background: none;"><span data-dcnode-id="1562" instrument_node="">I am not saying this is bad or undesired. It is one way we get different viewpoints on a person or an event. Different viewpoints are not only useful, but critical. But, when reading an account of an election or the Civil War, know the person writing it is consciously or unconsciously trying to influence your viewpoint.</span></span></p><blockquote class="q-relative qu-color--gray qu-borderWidth--retinaOverride" data-dcnode-id="1555" style="box-sizing: border-box; position: relative; margin-bottom: 1em; border-width: 0px; border-color: transparent; padding-left: 1em;"><p class="q-text qu-display--block qu-wordBreak--break-word qu-textAlign--start" data-dcnode-id="1557" style="box-sizing: border-box; margin-bottom: 1em; overflow-wrap: anywhere; direction: ltr;"><span data-dcnode-id="1558" style="font-weight: normal; font-style: normal; background: none;"><span data-dcnode-id="1559" instrument_node="">All historical writing, even the most honest, is unconsciously subjective, since every age is bound, in spite of itself, to make the dead perform whatever tricks it finds necessary for its own peace of mind.</span></span></p><div class="q-absolute qu-borderRadius--pill QTextBlockQuote___StyledAbsolute-an1wlz-0 dHUDep" data-dcnode-id="1556" style="box-sizing: border-box; position: absolute; top: 0px; bottom: 0px; width: 3px; background-color: currentcolor; opacity: 0.3;" width="3"></div></blockquote><p class="q-text qu-display--block qu-wordBreak--break-word qu-textAlign--start" data-dcnode-id="1545" style="box-sizing: border-box; margin-bottom: 1em; overflow-wrap: anywhere; direction: ltr;"><span data-dcnode-id="1553" style="font-weight: normal; font-style: normal; background: none;"><span data-dcnode-id="1554" instrument_node="">Carl Lotus Becker, </span></span><span class="q-inline" data-dcnode -relative" data-dcnode-id="1341" style="box-sizing: border-box; position: relative;"><div class="q-box qu-overflow--hidden" data-dcnode-id="1342" style="box-sizing: border-box; max-height: 300px;"><div class="q-text qu-wordBreak--break-word" data-dcnode-id="1343" style="box-sizing: border-box;"><span class="q-box qu-userSelect--text" data-dcnode-id="1344" style="box-sizing: border-box;"><p class="q-text qu-display--block qu-wordBreak--break-word qu-textAlign--start" data-dcnode-id="1365" style="box-sizing: border-box; margin-bottom: 1em; overflow-wrap: anywhere; direction: ltr;"><span data-dcnode-id="1366" style="font-weight: normal; font-style: normal; background: none;"><span data-dcnode-id="1367" instrument_node="">Hopefully this is not going to sound pedantic, but here goes:</span></span></p><span data-dcnode-id="1364" instrument_node=""> </span><p class="q-text qu-display--block qu-wordBreak--break-word qu-textAlign--start" data-dcnode-id="1361" style="box-sizing: border-box; margin-bottom: 1em; overflow-wrap: anywhere; direction: ltr;"><span data-dcnode-id="1362" style="font-weight: normal; font-style: normal; background: none;"><span data-dcnode-id="1363" instrument_node="">A history buff is someone with an ongoing fascination for all things historical, who visits castles and stately homes for pleasure, watches historical documentaries on TV and reads books about history for pleasure. Having just read what I’ve typed I realise that I’ve described my late father who infected me with the history virus by taking me to visit the Roman sites in South Wales and the many castles of Monmouthshire.</span></span></p><span data-dcnode-id="1360" instrument_node=""> </span><p class="q-text qu-display--block qu-wordBreak--break-word qu-textAlign--start" data-dcnode-id="1357" style="box-sizing: border-box; margin-bottom: 0px; overflow-wrap: anywhere; direction: ltr;"><span data-dcnode-id="1358" style="font-weight: normal; font-style: normal; background: none;"><span data-dcnode-id="1359" instrument_node="">A student of history is someone who has an endless fascination for history to the extent that he signs up to study i</span></span></p><div class="q-absolute qu-textAlign--center qu-zIndex--base" data-dcnode-id="1345" style="box-sizing: border-box; position: absolute; width: 100%; height: 100px; bottom: 0px; background: linear-gradient(rgba(255, 255, 255, 0) 0%, rgb(255, 255, 255) 100%);" width="100%"><div class="q-inlineFlex" data-dcnode-id="1346" style="box-sizing: border-box; display: inline-flex;"><div class="q-relative" data-dcnode-id="1347" style="box-sizing: border-box; position: relative; bottom: -60px;"><button class="q-click-wrapper qu-active--textDecoration--none qu-focus--textDecoration--none ClickWrapper___StyledClickWrapperBox-zoqi4f-0 bIwtPb base___StyledClickWrapper-lx6eke-1 fURggN puppeteer_test_read_more_button qu-borderRadius--pill qu-alignItems--center qu-justifyContent--center qu-whiteSpace--nowrap qu-userSelect--none qu-display--inline-flex qu-bg--gray_ultralight qu-tapHighlight--white qu-textAlign--center qu-cursor--pointer qu-hover--textDecoration--none" data-dcnode-id="1348" role="button" style="box-sizing: border-box; font: inherit; padding: 0px 15px; transition-property: box-shadow, background-color; transition-duration: 60ms; transition-timing-function: ease-out; height: 30px; min-width: 30px; position: relative; box-shadow: rgba(99, 100, 102, 0.2) 0px 0px 0px 1px inset; border-width: 0px; outline: none; color: inherit;" tabindex="0" type="button"><div class="q-flex qu-alignItems--center qu-justifyContent--center" data-dcnode-id="1349" style="box-sizing: border-box; display: flex; max-width: 100%; transition-property: opacity; transition-duration: 60ms; transition-timing-function: ease-in-out;"><div class="q-text qu-display--inline-flex qu-alignItems--center qu-overflow--hidden puppeteer_test_button_text qu-medium qu-color--gray" data-dcnode-id="1354" style="box-sizing: border-box; font-size: 13px;"><div class="q-text qu-ellipsis qu-whiteSpace--nowrap" data-dcnode-id="1355" style="box-sizing: border-box; line-height: normal;"><span data-dcnode-id="1356" instrument_node="">Continue Reading</span></div></div><span class="q-inlineBlock qu-ml--tiny qu-mr--n_tiny" data-dcnode-id="1350" name="ChevronDown" style="box-sizing: border-box; display: inline-block; width: 16px; height: 16px; flex-shrink: 0; line-height: 16px;" width="16px"><span class="CssComponent__CssInlineComponent-sc-1oskqb9-1 Icon___StyledCssInlineComponent-sc-11tmcw7-0 fNkmIo" data-dcnode-id="1351"><svg data-dcnode-id="1352" height="24" viewBox="0 0 24 24" width="24" xmlns="http://www.w3.org/2000/svg"><path class="icon_svg-stroke" d="m5 8.5 7 7 7.005-7" data-dcnode-id="1353" fill="none" stroke="#666" stroke-linecap="round" stroke-width="1.5"></path></svg></span></span></div></button></div></div></div></span></div></div></div></div><div class="q-box qu-display--none" data-dcnode-id="1321" style="box-sizing: border-box;"><div class="q-text" data-dcnode-id="1322" style="box-sizing: border-box; max-width: 100%;"><span class="CssComponent__CssInlineComponent-sc-1oskqb9-1 UserSelectableText___StyledCssInlineComponent-lsmoq4-0 kghFzc" data-dcnode-id="1323"><span class="q-box qu-userSelect--text" data-dcnode-id="1324" style="box-sizing: border-box;"><p class="q-text qu-display--block qu-wordBreak--break-word qu-textAlign--start" data-dcnode-id="1337" style="box-sizing: border-box; margin-bottom: 1em; overflow-wrap: anywhere; direction: ltr;"><span data-dcnode-id="1338" style="font-weight: normal; font-style: normal; background: none;"><span data-dcnode-id="1339" instrument_node="">Hopefully this is not going to sound pedantic, but here goes:</span></span></p><span data-dcnode-id="1336" instrument_node=""> </span><p class="q-text qu-display--block qu-wordBreak--break-word qu-textAlign--start" data-dcnode-id="1333" style="box-sizing: border-box; margin-bottom: 1em; overflow-wrap: anywhere; direction: ltr;"><span data-dcnode-id="1334" style="font-weight: normal; font-style: normal; background: none;"><span data-dcnode-id="1335" instrument_node="">A history buff is someone with an ongoing fascination for all things historical, who visits castles and stately homes for pleasure, watches historical documentaries on TV and reads books about history for pleasure. Having just read what I’ve typed I realise that I’ve described my late father who infected me with the history virus by taking me to visit the Roman sites in South Wales and the many castles of Monmouthshire.</span></span></p><span data-dcnode-id="1332" instrument_node=""> </span><p class="q-text qu-display--block qu-wordBreak--break-word qu-textAlign--start" data-dcnode-id="1329" style="box-sizing: border-box; margin-bottom: 1em; overflow-wrap: anywhere; direction: ltr;"><span data-dcnode-id="1330" style="font-weight: normal; font-style: normal; background: none;"><span data-dcnode-id="1331" instrument_node="">A student of history is someone who has an endless fascination for history to the extent that he signs up to study it for three years at university. By this time the infection is beyond cure and despite a career in the corporate world he is never more than an hour away from a history book, even on a transatlantic flight. NB: this is a bit autobiographical.</span></span></p><span data-dcnode-id="1328" instrument_node=""> </span><p class="q-text qu-display--block qu-wordBreak--break-word qu-textAlign--start" data-dcnode-id="1325" style="box-sizing: border-box; margin-bottom: 0px; overflow-wrap: anywhere; direction: ltr;"><span data-dcnode-id="1326" style="font-weight: normal; font-style: normal; background: none;"><span data-dcnode-id="1327" instrument_node="">A historian is a more difficult beast to define. Several years ago I attended a seminar about the origins of the First World War: there were four speakers scheduled to take part, and each had a book to promote. However one had to pull out at the last minute, but despite a long list of books on military history he had to his name one of the other speakers described him as being a journalist who wrote about history rather than a historian. Thus a historian, according to this view, has to be someone who makes his or her living from teaching and writes about history.</span></span></p></span></span></div></div></div></div></div></div></div><div class="q-box qu-zIndex--action_bar" data-dcnode-id="1248" style="box-sizing: border-box;"><div class="q-box ActionBar___StyledBox-sc-1tz1b8b-1 jxrrvA" data-dcnode-id="1249" style="box-sizing: border-box; transition-property: box-shadow; transition-duration: 250ms; transition-timing-function: ease-out;"><div class="q-flex qu-justifyContent--space-between qu-alignItems--center qu-flexWrap--nowrap qu-py--tiny" data-dcnode-id="1250" style="box-sizing: border-box; display: flex;"><div class="q-flex qu-alignItems--center" data-dcnode-id="1264" style="box-sizing: border-box; display: flex;"><div class="q-inlineFlex qu-mr--small" data-dcnode-id="1291" style="box-sizing: border-box; display: inline-flex;"><div class="q-inlineFlex qu-borderRadius--pill qu-alignItems--center" data-dcnode-id="1292" style="box-sizing: border-box; display: inline-flex; background-color: rgba(0, 0, 1, 0.03);"><div class="q-box qu-display--inline-block" data-dcnode-id="1302" style="box-sizing: border-box; pointer-events: all;"><div class="q-relative puppeteer_popper_reference" data-dcnode-id="1303" style="box-sizing: border-box; position: relative;"><button aria-label="23 upvotes" class="q-click-wrapper ClickWrapper___StyledClickWrapperBox-zoqi4f-0 bIwtPb base___StyledClickWrapper-lx6eke-1 eqENAR undefined qu-borderTopLeftRadius--pill qu-borderBottomLeftRadius--pill qu-alignItems--center qu-justifyContent--center qu-whiteSpace--nowrap qu-userSelect--none qu-display--inline-flex qu-tapHighlight--white qu-textAlign--center qu-cursor--pointer qu-hover--bg--darken qu-hover--textDecoration--none" data-dcnode-id="1304" role="but
