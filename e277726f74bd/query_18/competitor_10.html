 anywhere; direction: ltr;"><span data-dcnode-id="961" style="font-weight: normal; font-style: normal; background: none;"><span data-dcnode-id="962" instrument_node="">Every field of human endeavor has a history (how it developed over time, what tools its practitioners used and how they organized themselves, what ideas and practices shaped what they did, how it interacted with other human activities) . . . and historians interested in better understanding those things and sharing their understanding with others.</span></span></p><span data-dcnode-id="959" instrument_node=""> </span><p class="q-text qu-display--block qu-wordBreak--break-word qu-textAlign--start" data-dcnode-id="956" style="box-sizing: border-box; margin-bottom: 0px; overflow-wrap: anywhere; direction: ltr;"><span data-dcnode-id="957" style="font-weight: normal; font-style: normal; background: none;"><span data-dcnode-id="958" instrument_node="">“Military historians” do that for armed forces . . . “maritime historians” do it for seafaring . . . “historians of science” do it for humans’ organized attempts to make sense of the natural world. “Media historians” do it for mass communications: ind</span></span></p><div class="q-absolute qu-textAlign--center qu-zIndex--base" data-dcnode-id="944" style="box-sizing: border-box; position: absolute; width: 100%; height: 100px; bottom: 0px; background: linear-gradient(rgba(255, 255, 255, 0) 0%, rgb(255, 255, 255) 100%);" width="100%"><div class="q-inlineFlex" data-dcnode-id="945" style="box-sizing: border-box; display: inline-flex;"><div class="q-relative" data-dcnode-id="946" style="box-sizing: border-box; position: relative; bottom: -60px;"><button class="q-click-wrapper qu-active--textDecoration--none qu-focus--textDecoration--none ClickWrapper___StyledClickWrapperBox-zoqi4f-0 bIwtPb base___StyledClickWrapper-lx6eke-1 fURggN puppeteer_test_read_more_button qu-borderRadius--pill qu-alignItems--center qu-justifyContent--center qu-whiteSpace--nowrap qu-userSelect--none qu-display--inline-flex qu-bg--gray_ultralight qu-tapHighlight--white qu-textAlign--center qu-cursor--pointer qu-hover--textDecoration--none" data-dcnode-id="947" role="button" style="box-sizing: border-box; font: inherit; padding: 0px 15px; transition-property: box-shadow, background-color; transition-duration: 60ms; transition-timing-function: ease-out; height: 30px; min-width: 30px; position: relative; box-shadow: rgba(99, 100, 102, 0.2) 0px 0px 0px 1px inset; border-width: 0px; outline: none; color: inherit;" tabindex="0" type="button"><div class="q-flex qu-alignItems--center qu-justifyContent--center" data-dcnode-id="948" style="box-sizing: border-box; display: flex; max-width: 100%; transition-property: opacity; transition-duration: 60ms; transition-timing-function: ease-in-out;"><div class="q-text qu-display--inline-flex qu-alignItems--center qu-overflow--hidden puppeteer_test_button_text qu-medium qu-color--gray" data-dcnode-id="953" style="box-sizing: border-box; font-size: 13px;"><div class="q-text qu-ellipsis qu-whiteSpace--nowrap" data-dcnode-id="954" style="box-sizing: border-box; line-height: normal;"><span data-dcnode-id="955" instrument_node="">Continue Reading</span></div></div><span class="q-inlineBlock qu-ml--tiny qu-mr--n_tiny" data-dcnode-id="949" name="ChevronDown" style="box-sizing: border-box; display: inline-block; width: 16px; height: 16px; flex-shrink: 0; line-height: 16px;" width="16px"><span class="CssComponent__CssInlineComponent-sc-1oskqb9-1 Icon___StyledCssInlineComponent-sc-11tmcw7-0 fNkmIo" data-dcnode-id="950"><svg data-dcnode-id="951" height="24" viewBox="0 0 24 24" width="24" xmlns="http://www.w3.org/2000/svg"><path class="icon_svg-stroke" d="m5 8.5 7 7 7.005-7" data-dcnode-id="952" fill="none" stroke="#666" stroke-linecap="round" stroke-width="1.5"></path></svg></span></span></div></button></div></div></div></span></div></div></div></div><div class="q-box qu-display--none" data-dcnode-id="830" style="box-sizing: border-box;"><div class="q-text" data-dcnode-id="831" style="box-sizing: border-box; max-width: 100%;"><span class="CssComponent__CssInlineComponent-sc-1oskqb9-1 UserSelectableText___StyledCssInlineComponent-lsmoq4-0 kghFzc" data-dcnode-id="832"><span class="q-box qu-userSelect--text" data-dcnode-id="833" style="box-sizing: border-box;"><p class="q-text qu-display--block qu-wordBreak--break-word qu-textAlign--start" data-dcnode-id="936" style="box-sizing: border-box; margin-bottom: 1em; overflow-wrap: anywhere; direction: ltr;"><span data-dcnode-id="937" style="font-weight: normal; font-style: normal; background: none;"><span data-dcnode-id="938" instrument_node="">Every field of human endeavor has a history (how it developed over time, what tools its practitioners used and how they organized themselves, what ideas and practices shaped what they did, how it interacted with other human activities) . . . and historians interested in better understanding those things and sharing their understanding with others.</span></span></p><span data-dcnode-id="935" instrument_node=""> </span><p class="q-text qu-display--block qu-wordBreak--break-word qu-textAlign--start" data-dcnode-id="932" style="box-sizing: border-box; margin-bottom: 1em; overflow-wrap: anywhere; direction: ltr;"><span data-dcnode-id="933" style="font-weight: normal; font-style: normal; background: none;"><span data-dcnode-id="934" instrument_node="">“Military historians” do that for armed forces . . . “maritime historians” do it for seafaring . . . “historians of science” do it for humans’ organized attempts to make sense of the natural world. “Media historians” do it for mass communications: industrial-age publishing, radio and television broadcasting, sound recording, cinema in all its forms (dramatic, documentary, instructional, persuasive), and — in recent years — digital media.</span></span></p><span data-dcnode-id="931" instrument_node=""> </span><p class="q-text qu-display--block qu-wordBreak--break-word qu-textAlign--start" data-dcnode-id="924" style="box-sizing: border-box; margin-bottom: 1em; overflow-wrap: anywhere; direction: ltr;"><span data-dcnode-id="929" style="font-weight: normal; font-style: normal; background: none;"><span data-dcnode-id="930" instrument_node="">A “media historian” in the broad sense is </span></span><span data-dcnode-id="927" style="font-weight: normal; font-style: italic; background: none;"><span data-dcnode-id="928" instrument_node="">anyone </span></span><span data-dcnode-id="925" style="font-weight: normal; font-style: normal; background: none;"><span data-dcnode-id="926" instrument_node="">who seriously studies the history of mass media. It includes, for example, film collectors who focus on a particular type of film (educational films produced by Walt Disney Studios, say) have developed an encyclopedic knowledge of them . . . just as “military historian.” in the broad sense, includes people with an encyclopedic knowledge of a particular regiment or the technological and tactical evolution of a particular type of weapon. [In UK English you hear “_________ enthusiast” used for a person with such a relationship to a particular subject . . . a tremendously handy nuance that, alas, has never caught on in US English]</span></span></p><span data-dcnode-id="923" instrument_node=""> </span><p class="q-text qu-display--block qu-wordBreak--break-word qu-textAlign--start" data-dcnode-id="912" style="box-sizing: border-box; margin-bottom: 1em; overflow-wrap: anywhere; direction: ltr;"><span data-dcnode-id="921" style="font-weight: normal; font-style: normal; background: none;"><span data-dcnode-id="922" instrument_node="">A “media historian” in the narrow sense is someone who—even if they don’t have an advanced degree or a paid position in history or a related field—</span></span><span data-dcnode-id="919" style="font-weight: normal; font-style: italic; background: none;"><span data-dcnode-id="920" instrument_node="">uses the methods</span></span><span data-dcnode-id="917" style="font-weight: normal; font-style: normal; background: none;"><span data-dcnode-id="918" instrument_node=""> </span></span><span data-dcnode-id="915" style="font-weight: normal; font-style: italic; background: none;"><span data-dcnode-id="916" instrument_node="">of professional historians </span></span><span data-dcnode-id="913" style="font-weight: normal; font-style: normal; background: none;"><span data-dcnode-id="914" instrument_node="">to study and write about whatever aspect(s) of the history of mass media interest them. They use archives, oral histories, published corporate records, and other primary sources as well as secondary ones . . . they rigorously interrogate and cross-check the information they collect . . . they’re scrupulous about the distinction between what they can document, and what they can merely infer . . . and they “show their work” through meticulous notes (foot- or end-) that let fellow scholars answer the question that’s always on their lips: “And you know this . . . how?”</span></span></p><span data-dcnode-id="911" instrument_node=""> </span><p class="q-text qu-display--block qu-wordBreak--break-word qu-textAlign--start" data-dcnode-id="900" style="box-sizing: border-box; margin-bottom: 1em; overflow-wrap: anywhere; direction: ltr;"><span data-dcnode-id="909" style="font-weight: normal; font-style: normal; background: none;"><span data-dcnode-id="910" instrument_node="">The thing that binds all media historians together is that they’re </span></span><span data-dcnode-id="907" style="font-weight: normal; font-style: italic; background: none;"><span data-dcnode-id="908" instrument_node="">historians</span></span><span data-dcnode-id="905" style="font-weight: normal; font-style: normal; background: none;"><span data-dcnode-id="906" instrument_node=""> whose subject happens to be mass media. Their work is adjacent to, but distinct from, that of popular-culture scholars who write about the products of mass media </span></span><span data-dcnode-id="903" style="font-weight: normal; font-style: italic; background: none;"><span data-dcnode-id="904" instrument_node="">as creative works</span></span><span data-dcnode-id="901" style="font-weight: normal; font-style: normal; background: none;"><span data-dcnode-id="902" instrument_node="">. You can see the difference in practice by comparing the websites of the International Association for Media and History </span></span></p><a class="q-box qu-cursor--pointer qu-hover--textDecoration--none Link___StyledBox-t2xg9c-0 KlcoI" data-dcnode-id="879" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//iamhist.net/" rel="noopener nofollow" style="box-sizing: border-box; margin-bottom: 1em; border-radius: inherit;" target="_blank" title="iamhist.net"><div class="q-relative qu-borderAll qu-borderWidth--retinaOverride qu-borderWidth--regular qu-borderRadius--medium qu-overflow--hidden" data-dcnode-id="880" style="box-sizing: border-box; position: relative; margin-bottom: 1em;"><div class="q-flex qu-justifyContent--space-between" data-dcnode-id="882" style="box-sizing: border-box; display: flex; min-height: 100px;"><div class="q-relative qu-overflow--hidden" data-dcnode-id="897" style="box-sizing: border-box; position: relative; flex: 0 0 100px;"><div class="q-box qu-bg--darken" data-dcnode-id="899" style="box-sizing: border-box; background-image: url(&quot;http://iamhist.net/wp-content/uploads/2014/05/logo+tire4.jpg&quot;); height: 100%; transition-property: background-image; transition-duration: 180ms; transition-timing-function: ease-in-out; background-position: center center; background-size: cover; background-repeat: no-repeat;"></div><div class="q-absolute qu-fullY qu-borderLeft" data-dcnode-id="898" style="box-sizing: border-box; position: absolute; right: 0px; border-color: rgba(0, 0, 0, 0.1); z-index: 1;"></div></div><div class="q-box qu-p--medium qu-hover--bg--darken qu-overflow--hidden" data-dcnode-id="883" style="box-sizing: border-box; width: 100%;" width="100%"><div class="q-flex qu-verticalAlign--middle qu-alignItems--center" data-dcnode-id="884" style="box-sizing: border-box; display: flex; height: 100%;"><div class="q-box qu-overflow--hidden" data-dcnode-id="885" style="box-sizing: border-box;"><div class="q-text qu-truncateLines--3 qu-bold qu-color--gray_dark_dim qu-wordBreak--break-word" data-dcnode-id="895" style="box-sizing: border-box;"><span data-dcnode-id="896" instrument_node="">|</span></div><div class="q-text qu-dynamicFontSize--small qu-truncateLines--1 qu-color--gray qu-mt--tiny" data-dcnode-id="893" style="box-sizing: border-box;"><span data-dcnode-id="894" instrument_node="">The International Association for Media and History is an organization of scholars, filmmakers, broadcasters and archivists dedicated to historical inquiry into film, radio, television, and other related media. We encourage scholarly research into the relations between history and the media as well as the production of historically informed documentaries, television series, and other media texts. We organise an international conference every two years focusing on an aspect of media and history and organise awards in the field of media and history, including since 2016 the IAMHIST challenge for early career researchers and professionals. Every year, a masterclass is scheduled in January to support postgraduate students and postdoctoral fellows in the field. I IAMHIST has its own peer reviewed journal, the Historical Journal of Film, Radio and Television and offers a blog for the publication of shorter reflections on media and history. The aims of the association are: to encourage and facilitate research in the use of audio-visual media, digital archives and materials as sources for the study of history and the social sciences, including research into the development and impact of audio-visual media in mass communication, to further research into the use of audio-visual media and materials at all levels of historical education; to improve the preservation of audio-visual materials as documents and to improve access to archival institutions and collections housing audio-visual materials, to promote the international exchange of information and the development of international projects within its field of interest. Join us on Facebook: https://www.facebook.com/groups/iamhist/ and/or Twitter: @iamhist or become a real member: http://iamhist.net/membership/.</span></div><div class="q-flex qu-mt--small qu-justifyContent--space-between qu-verticalAlign--middle qu-alignItems--center" data-dcnode-id="886" style="box-sizing: border-box; display: flex;"><span class="q-inlineBlock" data-dcnode-id="889" name="EditorLink" style="box-sizing: border-box; display: inline-block; width: 16px; height: 16px; flex-shrink: 0; line-height: 16px; margin-right: 2px;" width="16px"><span class="CssComponent__CssInlineComponent-sc-1oskqb9-1 Icon___StyledCssInlineComponent-sc-11tmcw7-0 ckJQOs" data-dcnode-id="890"><svg data-dcnode-id="891" height="24" viewBox="0 0 24 24" width="24" xmlns="http://www.w3.org/2000/svg"><path class="icon_svg-fill_as_stroke" d="M16.316 10.241c-.006-.016.017-.042.041-.066l1.103-1.098c1.351-1.363.93-3.652-.816-4.443a2.767 2.767 0 0 0-3.098.545l-3.293 3.282c-.769.784-1 1.733-.662 2.775s1.087 1.658 2.165 1.874c.15.03.304.034.461.051v1.378l-.477-.032A4.07 4.07 0 0 1 9.073 13.1c-.771-.891-1.103-1.932-.994-3.103.093-1.002.513-1.853 1.229-2.563l3.25-3.23c.859-.847 1.906-1.246 3.11-1.199a4.01 4.01 0 0 1 2.678 1.128 4.01 4.01 0 0 1 1.302 3.112 3.996 3.996 0 0 1-1.161 2.77l-1.421 1.418a.256.256 0 0 1-.032.027l-.719-1.217zm-8.784 3.697-.973.969a2.744 2.744 0 0 0-.028 3.881 2.77 2.77 0 0 0 3.909.044l3.31-3.301c.764-.782.987-1.732.651-2.769s-1.083-1.651-2.155-1.871l-.137-.021V9.508c.383.031.511.031.774.111 1.639.502 2.648 1.578 2.973 3.237.274 1.395-.124 2.637-1.123 3.658l-3.311 3.301c-.725.715-1.607 1.101-2.625 1.175-2.082.152-3.982-1.284-4.365-3.323-.264 lass="q-box qu-bg--darken" data-dcnode-id="875" style="box-sizing: border-box; background-image: url(&quot;https://pcaaca.org/sites/default/files/styles/avatar_small/public/image/untitleddesign3_0.png?itok=7RdPfyMU&quot;); height: 100%; transition-property: background-image; transition-duration: 180ms; transition-timing-function: ease-in-out; background-position: center center; background-size: cover; background-repeat: no-repeat;"></div><div class="q-absolute qu-fullY qu-borderLeft" data-dcnode-id="874" style="box-sizing: border-box; position: absolute; right: 0px; border-color: rgba(0, 0, 0, 0.1); z-index: 1;"></div></div><div class="q-box qu-p--medium qu-hover--bg--darken qu-overflow--hidden" data-dcnode-id="861" style="box-sizing: border-box; width: 100%;" width="100%"><div class="q-flex qu-verticalAlign--middle qu-alignItems--center" data-dcnode-id="862" style="box-sizing: border-box; display: flex; height: 100%;"><div class="q-box qu-overflow--hidden" data-dcnode-id="863" style="box-sizing: border-box;"><div class="q-text qu-truncateLines--3 qu-bold qu-color--gray_dark_dim qu-wordBreak--break-word" data-dcnode-id="871" style="box-sizing: border-box;"><span data-dcnode-id="872" instrument_node="">Popular Culture Association · American Culture Association</span></div><div class="q-flex qu-mt--small qu-justifyContent--space-between qu-verticalAlign--middle qu-alignItems--center" data-dcnode-id="864" style="box-sizing: border-box; display: flex;"><span class="q-inlineBlock" data-dcnode-id="867" name="EditorLink" style="box-sizing: border-box; display: inline-block; width: 16px; height: 16px; flex-shrink: 0; line-height: 16px; margin-right: 2px;" width="16px"><span class="CssComponent__CssInlineComponent-sc-1oskqb9-1 Icon___StyledCssInlineComponent-sc-11tmcw7-0 ckJQOs" data-dcnode-id="868"><svg data-dcnode-id="869" height="24" viewBox="0 0 24 24" width="24" xmlns="http://www.w3.org/2000/svg"><path class="icon_svg-fill_as_stroke" d="M16.316 10.241c-.006-.016.017-.04 node=""> </span><p class="q-text qu-display--block qu-wordBreak--break-word qu-textAlign--start" data-dcnode-id="838" style="box-sizing: border-box; margin-bottom: 1em; overflow-wrap: anywhere; direction: ltr;"><span data-dcnode-id="851" style="font-weight: normal; font-style: normal; background: none;"><span data-dcnode-id="852" instrument_node="">There’s also—I’d argue—</span></span><span data-dcnode-id="849" style="font-weight: normal; font-style: italic; background: none;"><span data-dcnode-id="850" instrument_node="">another </span></span><span data-dcnode-id="847" style="font-weight: normal; font-style: normal; background: none;"><span data-dcnode-id="848" instrument_node="">group of scholars allied with, but distinct from, both: Historians who are interested in what the products of mass media can tell us about the times and places in which they were made. They’re interested in the products of mass media </span></span><span data-dcnode-id="845" style="font-weight: normal; font-style: italic; background: none;"><span data-dcnode-id="846" instrument_node="">as creative works</span></span><span data-dcnode-id="843" style="font-weight: normal; font-style: normal; background: none;"><span data-dcnode-id="844" instrument_node=""> (like pop-culture scholars), but they’re simultaneously interested in them as windows on larger historical topics (like media historians, but the topic they’re interested in isn’t the evolution of mass media </span></span><span data-dcnode-id="841" style="font-weight: normal; font-style: italic; background: none;"><span data-dcnode-id="842" instrument_node="">itself</span></span><span data-dcnode-id="839" style="font-weight: normal; font-style: normal; background: none;"><span data-dcnode-id="840" instrument_node="">).</span></span></p><span data-dcnode-id="837" instrument_node=""> </span><p class="q-text qu-display--block qu-wordBreak--break-word qu-textAlign--start" data-dcnode-id="834" style="box-sizing: border-box; margin-bottom: 0px; o
