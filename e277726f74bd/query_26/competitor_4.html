</span><div class="code-block code-block-4" data-dcnode-id="838" style="margin: 8px auto 8px 0; text-align: left; display: block; clear: both;"><span data-dcnode-id="850" instrument_node="">
</span><noindex data-dcnode-id="843"><div class="banlink" data-dcnode-id="844" data-link="https://bank.gov.ua/en/news/all/natsionalniy-bank-vidkriv-spetsrahunok-dlya-zboru-koshtiv-na-potrebi-armiyi"><a data-dcnode-id="845" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//bank.gov.ua/en/news/all/natsionalniy-bank-vidkriv-spetsrahunok-dlya-zboru-koshtiv-na-potrebi-armiyi"><img border="0" data-dcnode-id="849" height="250" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//janetpanic.com/wp-content/uploads/2022/02/help1.gif&amp;raw" width="300"><span data-dcnode-id="848" instrument_node="">
</span></a></div></noindex><span data-dcnode-id="842" instrument_node="">
</span><div data-dcnode-id="839" id="82749-1"></div></div><span data-dcnode-id="837" instrument_node="">
</span><p data-dcnode-id="835"><span data-dcnode-id="836" instrument_node="">Origins of the war</span></p><span data-dcnode-id="834" instrument_node="">
</span><ul data-dcnode-id="826"><span data-dcnode-id="833" instrument_node="">
</span><li data-dcnode-id="831"><span data-dcnode-id="832" instrument_node="">The Spanish-American War was a conflict between the United States and Spain that effectively ended Spain’s role as a colonial power in the New World. </span></li><span data-dcnode-id="830" instrument_node="">
</span><li data-dcnode-id="828"><span data-dcnode-id="829" instrument_node="">The immediate cause of the Spanish-American War was Cuba’s struggle for independence from Spain.</span></li><span data-dcnode-id="827" instrument_node="">
</span></ul><span data-dcnode-id="825" instrument_node="">
</span><h2 data-dcnode-id="821"><span class="ez-toc-section" data-dcnode-id="824" id="What_are_the_causes_and_effects_of_the_Spanish-American_War"></span><span data-dcnode-id="823" instrument_node="">What are the causes and effects of the Spanish-American War?</span><span class="ez-toc-section-end" data-dcnode-id="822"></span></h2><span data-dcnode-id="820" instrument_node="">
</span><p data-dcnode-id="818"><span data-dcnode-id="819" instrument_node="">The major effects that stemmed from the war were that Cuba gained their independence from Spain, the United States gained Guam, Puerto Rico, and the Philippines, and the Spanish Empire collapsed. Cuba had been fighting for its independence from Spain for many years before the start of the Spanish-American War.</span></p><span data-dcnode-id="817" instrument_node="">
</span><h2 data-dcnode-id="813"><span class="ez-toc-section" data-dcnode-id="816" id="Did_America_steal_Texas_from_Mexico"></span><span data-dcnode-id="815" instrument_node="">Did America steal Texas from Mexico?</span><span class="ez-toc-section-end" data-dcnode-id="814"></span></h2><span data-dcnode-id="812" instrument_node="">
</span><p data-dcnode-id="810"><span data-dcnode-id="811" instrument_node="">Mexico received a little more than $18 million in compensation from the United States as part of the treaty. The pact set a border between Texas and Mexico and ceded California, Nevada, Utah, New Mexico, most of Arizona and Colorado, and parts of Oklahoma, Kansas, and Wyoming to the United States.</span></p><span data-dcnode-id="809" instrument_node="">
</span><h2 data-dcnode-id="805"><span class="ez-toc-section" data-dcnode-id="808" id="Who_first_owned_California"></span><span data-dcnode-id="807" instrument_node="">Who first owned California?</span><span class="ez-toc-section-end" data-dcnode-id="806"></span></h2><span data-dcnode-id="804" instrument_node="">
</span><p data-dcnode-id="802"><span data-dcnode-id="803" instrument_node="">Coastal exploration by the Spanish began in the 16th century, with further European settlement along the coast and in the inland valleys following in the 18th century. California was part of New Spain until that kingdom dissolved in 1821, becoming part of Mexico until the Mexican–American War (1846–1848), when it was …</span></p><div class="code-block code-block-5" data-dcnode-id="796" style="margin: 8px auto; text-align: center; display: block; clear: both;"><span data-dcnode-id="801" instrument_node="">
</span><div data-dcnode-id="800" data-endpoint="//trends.revcontent.com" data-rc-widget="" data-widget-host="habitat" data-widget-id="259623" id="rc-widget-136f1a"></div><span data-dcnode-id="799" instrument_node="">
</span><span data-dcnode-id="797" instrument_node="">
</span></div><span data-dcnode-id="795" instrument_node="">
</span><h2 data-dcnode-id="791"><span class="ez-toc-section" data-dcnode-id="794" id="What_did_Mexico_lose_in_the_Mexican-American_War"></span><span data-dcnode-id="793" instrument_node="">What did Mexico lose in the Mexican-American War?</span><span class="ez-toc-section-end" data-dcnode-id="792"></span></h2><span data-dcnode-id="790" instrument_node="">
</span><p data-dcnode-id="788"><span data-dcnode-id="789" instrument_node="">By its terms, Mexico ceded 55 percent of its territory, including parts of present-day Arizona, California, New Mexico, Texas, Colorado, Nevada, and Utah, to the United States. Mexico relinquished all claims to Texas, and recognized the Rio Grande as the southern boundary with the United States.</span></p><span data-dcnode-id="787" instrument_node="">
</span><h2 data-dcnode-id="783"><span class="ez-toc-section" data-dcnode-id="786" id="Who_won_the_Mexican-American_War"></span><span data-dcnode-id="785" instrument_node="">Who won the Mexican-American War?</span><span class="ez-toc-section-end" data-dcnode-id="784"></span></h2><span data-dcnode-id="782" instrument_node="">
</span><p data-dcnode-id="780"><span data-dcnode-id="781" instrument_node="">The Mexican-American War was formally concluded by the Treaty of Guadalupe-Hidalgo. The United States received the disputed Texan territory, as well as New Mexico territory and California. The Mexican government was paid $15 million — the same sum issued to France for the Louisiana Territory.</span></p><div class="code-block code-block-6" data-dcnode-id="775" style="margin: 8px auto; text-align: center; display: block; clear: both;"><span data-dcnode-id="779" instrument_node="">
</span><div data-dcnode-id="776" id="82749-19"></div></div><span data-dcnode-id="774" instrument_node="">
</span><h2 data-dcnode-id="770"><span class="ez-toc-section" data-dcnode-id="773" id="How_much_did_America_pay_for_California"></span><span data-dcnode-id="772" instrument_node="">How much did America pay for California?</span><span class="ez-toc-section-end" data-dcnode-id="771"></span></h2><span data-dcnode-id="769" instrument_node="">
</span><p data-dcnode-id="767"><span data-dcnode-id="768" instrument_node="">Trist ignored the recall order and negotiated terms that allowed the United States to buy California (north of the Baja Peninsula), as well as what amounted to half of Mexico’s territory for $15 million. On February 2, 1848, the Treaty of Guadalupe Hidalgo was signed in Mexico without President Polk’s knowledge.</span></p><span data-dcnode-id="766" instrument_node="">
