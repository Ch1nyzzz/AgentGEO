A//historylists.org/events/index.html"><span data-dcnode-id="136" instrument_node="">Events</span></a><span data-dcnode-id="134" instrument_node=""> · </span><span data-dcnode-id="132"><span data-dcnode-id="133" instrument_node="">6 Key Events of the Space Race</span></span></div><div data-dcnode-id="127" style="line-height:110%;"><span data-dcnode-id="130" instrument_node="">

</span><h1 data-dcnode-id="114"><span data-dcnode-id="115" instrument_node="">6 Key Events of the Space Race</span></h1><span data-dcnode-id="113" instrument_node="">
</span><div class="intro" data-dcnode-id="111"><span data-dcnode-id="112" instrument_node="">
In the mid-1950s, the rivalry between the Cold War superpowers - the United States and the Soviet Union - was taken into space, giving rise to a period known as the Space Race that lasted until the early 1970s. Marked by bitter competition between the U.S. and the USSR, however, the period of the Space Race was also marked by increased investments in research and development which led to significant advances in our understanding of the outer space.
</span></div><span data-dcnode-id="110" instrument_node="">
</span><h2 data-dcnode-id="108"><span data-dcnode-id="109" instrument_node="">Launch of Sputnik 1</span></h2><span data-dcnode-id="107" instrument_node="">
</span><p data-dcnode-id="105"><img alt="Sputnik 1" data-dcnode-id="106" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//historylists.org/images/sputnik-1.jpg&amp;raw"></p><span data-dcnode-id="104" instrument_node="">
</span><p data-dcnode-id="102"><span data-dcnode-id="103" instrument_node="">On October 4, 1957, the Soviet Union successfully launched Sputnik 1, the world’s first artificial satellite. A huge milestone concerning spacecraft technology, the event shocked the United States which was working on launching its artificial satellite. But it also encouraged the United States to create NASA and take a more serious approach to the space program to catch up with the Soviet Union. The event thus effectively triggered what came to be known as the Space Race. Besides striking a massive blow to the Soviet rival, Sputnik 1 also provided the scientists on Earth with valuable information regarding the Earth’s atmospheric density and ionosphere. It orbited the Earth for three months before burning up while falling from the orbit into the Earth’s atmosphere on January 4, 1958.</span></p><span data-dcnode-id="101" instrument_node="">
</span><h2 data-dcnode-id="99"><span data-dcnode-id="100" instrument_node="">Launch of Sputnik 2</span></h2><span data-dcnode-id="98" instrument_node="">
</span><p data-dcnode-id="96"><img alt="Sputnik 2" data-dcnode-id="97" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//historylists.org/images/sputnik-2.jpg&amp;raw"></p><span data-dcnode-id="95" instrument_node="">
</span><p data-dcnode-id="93"><span data-dcnode-id="94" instrument_node="">Less than a month after the successful launch of Sputnik 1, the Soviet space program achieved another major ‘victory’ in the Space Race. On November 3, 1957, the USSR successfully launched the second spacecraft into the Earth’s orbit - Sputnik 2. This time, however, the spacecraft was carrying a living animal, a dog called Laika which became the first living being to orbit the Earth and provide critical biological data for the later manned spaceflights. Laika, the stray female dog that was selected for the mission, died a few hours after the launch of Sputnik 2, while the spacecraft itself continued to orbit the Earth for 162 days.</span></p><span data-dcnode-id="92" instrument_node="">
</span><h2 data-dcnode-id="90"><span data-dcnode-id="91" instrument_node="">Launch of Explorer 1</span></h2><span data-dcnode-id="89" instrument_node="">
</span><p data-dcnode-id="87"><img alt="Explorer 1" data-dcnode-id="88" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//historylists.org/images/explorer-1.jpg&amp;raw"></p><span data-dcnode-id="86" instrument_node="">
</span><p data-dcnode-id="84"><span data-dcnode-id="85" instrument_node="">After the launch of Sputnik 1 and 2, the United States stepped up in its efforts to launch its artificial satellite, and on January 31, 1958, the Army Ballistic Missile Agency (ABMA) successfully launched Explorer 1. Besides establishing a balance in the Space Race, the first U.S. satellite also provided invaluable information which, among other things, also proved to be of crucial importance for the discovery of the so-called Van Allen radiation belt. Explorer 1 collected data for almost four months before exhausting its batteries, but it continued to orbit the Earth until 1970. In addition to being the first U.S. artificial satellite, Explorer 1 was also the first in the series of over 90 Explorers, the last of which - TESS - was launched on April 18, 2018.</span></p><span data-dcnode-id="83" instrument_node="">
</span><div class="ad" data-dcnode-id="74"><span data-dcnode-id="82" instrument_node="">
</span><span data-dcnode-id="80" instrument_node="">
</span><ins class="adsbygoogle" data-ad-client="ca-pub-9982589095057069" data-ad-format="fluid" data-ad-layout="in-article" data-ad-slot="5895348412" data-dcnode-id="79" style="display:block; text-align:center;"></ins><span data-dcnode-id="78" instrument_node="">
</span><span data-dcnode-id="75" instrument_node="">
</span></div><span data-dcnode-id="73" instrument_node="">
</span><h2 data-dcnode-id="71"><span data-dcnode-id="72" instrument_node="">Launch of Vostok 1</span></h2><span data-dcnode-id="70" instrument_node="">
</span><p data-dcnode-id="68"><img alt="Vostok 1" data-dcnode-id="69" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//historylists.org/images/vostok-1.jpg&amp;raw"></p><span data-dcnode-id="67" instrument_node="">
</span><p data-dcnode-id="65"><span data-dcnode-id="66" instrument_node="">Vostok 1 was the greatest Soviet triumph in the Space Race. On April 12, 1961, the Vostok spacecraft took off from the Baikonur Cosmodrome; it was carrying Yuri Gagarin (1934-1968) who became the first human in history to travel into space. Gagarin orbited the Earth for nearly two hours. Although the Soviets initially stated that he landed with the Vostok, the famous cosmonaut parachuted from his capsule when reaching a safe altitude. After the success of Vostok 1, the USSR again took the lead in the Space Race. But the triumph didn’t last for long this time either.</span></p><span data-dcnode-id="64" instrument_node="">
</span><h2 data-dcnode-id="62"><span data-dcnode-id="63" instrument_node="">Launch of Mercury-Redstone 3</span></h2><span data-dcnode-id="61" instrument_node="">
</span><p data-dcnode-id="59"><img alt="Mercury-Redstone 3" data-dcnode-id="60" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//historylists.org/images/mercury-redstone-3.jpg&amp;raw"></p><span data-dcnode-id="58" instrument_node="">
</span><p data-dcnode-id="56"><span data-dcnode-id="57" instrument_node="">The Soviets beat the United States with the first successful human spaceflight, but just a few weeks after Vostok 1, NASA launched its own “Vostok program” - known as Project Mercury.  On May 5, 1961, the Mercury-Redstone 3 (also known as Freedom 7) took off from Cape Canaveral in Florida with astronaut Alan Shepard (1923-1998) on board. In contrary to Gagarin, Shepard didn’t enter the Earth’s orbit. Instead, he conducted a 15-minute long suborbital flight. Despite that, he became the first American and the second person in the world to make a successful human spaceflight. In addition to paving the way to the future U.S. manned orbital spaceflights, the Freedom 7 mission also somehow eased the blow to the American space program that was inflicted by the success of Vostok 1.</span></p><span data-dcnode-id="55" instrument_node="">
</span><h2 data-dcnode-id="53"><span data-dcnode-id="54" instrument_node="">Apollo 11 Moon Landing</span></h2><span data-dcnode-id="52" instrument_node="">
</span><p data-dcnode-id="50"><img alt="Apollo 11" data-dcnode-id="51" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//historylists.org/images/apollo-11.jpg&amp;raw"></p><span data-dcnode-id="49" instrument_node="">
</span><p data-dcnode-id="47"><span data-dcnode-id="48" instrument_node="">Soon after the launch of Project Mercury, NASA laid down plans for the first manned Moon landing. The Soviets also had plans for a manned mission to the Moon, but by 1969, their Cold War rival had a spacecraft and a crew that would claim the ultimate victory in the Space Race: Neil Armstrong, Michael Collins and Buzz Aldrin. The Apollo 11 spacecraft took off from the Kennedy Space Center on July 16, 1969. Four days later, the Lunar Module separated from the Command Module and took Armstrong and Aldrin to the Moon to make the first Moon walk in history, collect lunar material, take photos and place the U.S. flag on the Moon’s surface. Realizing that the race to the Moon was lost, the Soviet Union canceled their lunar program and instead, focused on building a space station. On April 19, 1971, the Soviets successfully launched the world’s first space station called Salyut 1.</span></p><span data-dcnode-id="46" instrument_node="">
</span><p data-dcnode-id="44"><br data-dcnode-id="45"></p><span data-dcnode-id="43" instrument_node="">
