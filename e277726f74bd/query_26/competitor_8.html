/ol></aside><p data-dcnode-id="1347"><span data-dcnode-id="1348" instrument_node="">From the inauguration of Donald Trump to the first total solar eclipse to traverse the Lower 48 in nearly a century, 2017 was a year for the history books. Here we review the biggest news in politics, culture and science this year.</span></p><h2 data-dcnode-id="1345" id="section_1"><span data-dcnode-id="1346" instrument_node="">Politics     </span></h2><p data-dcnode-id="1335"><strong data-dcnode-id="1343"><span data-dcnode-id="1344" instrument_node="">Trump’s inauguration</span></strong><span data-dcnode-id="1342" instrument_node="">: After a divisive election season, </span><a data-dcnode-id="1340" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.history.com/topics/us-presidents/donald-trump"><span data-dcnode-id="1341" instrument_node="">Donald Trump</span></a><span data-dcnode-id="1339" instrument_node=""> officially became the 45th President of the United States on January 20, 2017. In a 16-minute inaugural address (the shortest since </span><a data-dcnode-id="1337" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.history.com/topics/us-presidents/jimmy-carter"><span data-dcnode-id="1338" instrument_node="">Jimmy Carter</span></a><span data-dcnode-id="1336" instrument_node="">‘s in 1977), Trump repeated his “America First” campaign slogan in which he delivered a dark-toned nationalist, populist message.</span></p><aside class="m-in-content-ad-row l-inline not-size-b not-size-c not-size-d" data-ad-group="in_content-0" data-dcnode-id="1332"><div class="m-in-content-ad not-size-b not-size-c not-size-d" data-ad-group="in_content-0" data-dcnode-id="1333" data-zone-count="8"><phoenix-ad class="m-ad not-size-b not-size-c not-size-d m-in-content-ad--slot" config="{&quot;adHtml&quot;:&quot;&quot;,&quot;adReloaderDelay&quot;:0,&quot;maxAdReloads&quot;:5,&quot;adReloaderSizeCodes&quot;:null,&quot;adCloseButton&quot;:false,&quot;bonusConfig&quot;:null,&quot;classRules&quot;:[{&quot;dimensions&quot;:[&quot;0x0&quot;],&quot;classes&quot;:[&quot;m-advertisement--fluid-card&quot;,&quot;m-advertisement--fluid-list-card&quot;],&quot;sizes&quot;:[&quot;0x0&quot;]}],&quot;localizedPhrases&quot;:{&quot;advertisement_legend&quot;:&quot;ADVERTISEMENT&quot;,&quot;outstream_clickout&quot;:&quot;Visit Website&quot;,&quot;outstream_thanks&quot;:&quot;Thanks for watching!&quot;},&quot;overrideOutstreamScript&quot;:false,&quot;moduleClass&quot;:&quot;m-in-content-ad&quot;,&quot;slotId&quot;:&quot;ad-33ba8fa69ef748d3875aa69727d3351f&quot;,&quot;visClasses&quot;:[&quot;not-size-b&quot;,&quot;not-size-c&quot;,&quot;not-size-d&quot;],&quot;extraClasses&quot;:null,&quot;zone&quot;:&quot;in_content&quot;,&quot;outstream&quot;:false,&quot;adGroup&quot;:&quot;in_content-0&quot;,&quot;slotConfig&quot;:{&quot;config&quot;:{&quot;sizes&quot;:[[300,250],[320,50],&quot;fluid&quot;,[1,2]]},&quot;model&quot;:{&quot;zone&quot;:&quot;in_content&quot;,&quot;index&quot;:&quot;0&quot;,&quot;isOutstream&quot;:false,&quot;deferLoad&quot;:false,&quot;nativeCardType&quot;:&quot;standard&quot;},&quot;sizes&quot;:[{&quot;width&quot;:300,&quot;height&quot;:250},{&quot;width&quot;:320,&quot;height&quot;:50},{&quot;name&quot;:&quot;fluid&quot;},{&quot;width&quot;:1,&quot;height&quot;:2}],&quot;screenSizes&quot;:[&quot;A&quot;],&quot;slotModel&quot;:{&quot;zone&quot;:&quot;in_content&quot;,&quot;index&quot;:&quot;0&quot;,&quot;isOutstream&quot;:false,&quot;deferLoad&quot;:false,&quot;nativeCardType&quot;:&quot;standard&quot;},&quot;id&quot;:&quot;ad-33ba8fa69ef748d3875aa69727d3351f&quot;,&quot;adUnitPath&quot;:&quot;/88059007,5936/www.history.com/topics/21st-century&quot;},&quot;showBlockthrough&quot;:true}" data-class-rules="[{&quot;dimensions&quot;:[&quot;0x0&quot;],&quot;classes&quot;:[&quot;m-advertisement--fluid-card&quot;,&quot;m-advertisement--fluid-list-card&quot;],&quot;sizes&quot;:[&quot;0x0&quot;]}]" data-dcnode-id="1334"></phoenix-ad></div></aside><p data-dcnode-id="1327"><span data-dcnode-id="1331" instrument_node="">The slogan “America First” has its origins in the America First Committee, a group founded in 1940 to oppose U.S. involvement in </span><a data-dcnode-id="1329" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.history.com/topics/world-war-ii"><span data-dcnode-id="1330" instrument_node="">World War II</span></a><span data-dcnode-id="1328" instrument_node=""> that was often characterized by its anti-Semitic, pro-fascist rhetoric.</span></p><p data-dcnode-id="1322"><span data-dcnode-id="1326" instrument_node="">In his address, Trump embraced the legacy of </span><a data-dcnode-id="1324" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.history.com/topics/us-presidents/andrew-jackson"><span data-dcnode-id="1325" instrument_node="">Andrew Jackson</span></a><span data-dcnode-id="1323" instrument_node="">, America’s seventh president, and the first to win on an “anti-establishment” populist platform.</span></p><p data-dcnode-id="1318"><strong data-dcnode-id="1320"><span data-dcnode-id="1321" instrument_node="">Tough talk on immigration</span></strong><span data-dcnode-id="1319" instrument_node="">: Shortly after taking office in January, President Trump sought to make good on his “America First” campaign promise by imposing a series of contentious travel bans on citizens from several Muslim-majority nations.</span></p><aside class="m-in-content-ad-row l-inline not-size-a not-size-b not-size-c" data-ad-group="in_content-0" data-dcnode-id="1315"><div class="m-in-content-ad not-size-a not-size-b not-size-c" data-ad-group="in_content-0" data-dcnode-id="1316" data-zone-count="5"><phoenix-ad class="m-ad not-size-a not-size-b not-size-c m-in-content-ad--slot" config="{&quot;adHtml&quot;:&quot;&quot;,&quot;adReloaderDelay&quot;:0,&quot;maxAdReloads&quot;:5,&quot;adReloaderSizeCodes&quot;:null,&quot;adCloseButton&quot;:false,&qu </span></phoenix-icon-fallback></button></div></div></phoenix-picture><figcaption data-dcnode-id="1245"><p class="tml-image--caption" data-dcnode-id="1246" itemprop="caption"><span data-dcnode-id="1247" instrument_node="">Fired FBI director James Comey being sworn into a crucial Senate hearing, repeating explosive allegations that President Donald Trump badgered him over the highly sensitive investigation Russia's meddling in the 2016 election. (Credit: Brendan Smialowski/AFP/Getty Images)</span></p></figcaption></figure></div><p data-dcnode-id="1236"><strong data-dcnode-id="1241"><span data-dcnode-id="1242" instrument_node="">Russia’s election meddling</span></strong><span data-dcnode-id="1240" instrument_node="">: The </span><a data-dcnode-id="1238" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.dni.gov/index.php" onclick="return phoenixTrackClickEvent(this, event);" rel="noopener" target="_blank"><span data-dcnode-id="1239" instrument_node="">Office of the Director of National Intelligence</span></a><span data-dcnode-id="1237" instrument_node=""> reported in January 2017 that the Russian government had ordered an influence campaign aimed at the 2016 U.S. presidential election.</span></p><p data-dcnode-id="1225"><span data-dcnode-id="1235" instrument_node="">In March, </span><a data-dcnode-id="1233" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.history.com/topics/fbi"><span data-dcnode-id="1234" instrument_node="">FBI</span></a><span data-dcnode-id="1232" instrument_node=""> director </span><a data-dcnode-id="1230" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.biography.com/people/james-comey-051217" onclick="return phoenixTrackClickEvent(this, event);" rel="noopener" target="_blank"><span data-dcnode-id="1231" instrument_node="">James Comey</span></a><span data-dcnode-id="1229" instrument_node=""> announced that the FBI was investigating election hacks and links between the Trump campaign and Russia. Attorney General Jeff Sessions, the head of the United States </span><a data-dcnode-id="1227" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.justice.gov/" onclick="return phoenixTrackClickEvent(this, event);" rel="noopener" target="_blank"><span data-dcnode-id="1228" instrument_node="">Department of Justice</span></a><span data-dcnode-id="1226" instrument_node="">, recused himself from any investigation into the President’s campaign amid questions over his contact with the Russian ambassador in 2016.</span></p><p data-dcnode-id="1220"><span data-dcnode-id="1224" instrument_node="">President Trump fired Comey in May, making Comey just the second FBI director ever to be dismissed by the President. (The first was William S. Sessions, who was fired by President </span><a data-dcnode-id="1222" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.history.com/topics/us-presidents/bill-clinton"><span data-dcnode-id="1223" instrument_node="">Bill Clinton</span></a><span data-dcnode-id="1221" instrument_node=""> in 1993 after being accused of tax evasion.)</span></p><aside class="m-in-content-ad-row l-inline not-size-a not-size-b not-size-c" data-ad-group="in_content-1" data-dcnode-id="1217"><div class="m-in-content-ad not-size-a not-size-b not-size-c" data-ad-group="in_content-1" data-dcnode-id="1218" data-zone-count="5"><phoenix-ad class="m-ad not-size-a not-size-b not-size-c m-in-content-ad--slot" config="{&quot;adHtml&quot;:&quot;&quot;,&quot;adReloaderDelay&quot;:0,&quot;maxAdReloads&quot;:5,&quot;adReloaderSizeCodes&quot;:null,&quot;adCloseButton&quot;:false,&quot;bonusConfig&quot;:null,&quot;classRules&quot;:[{&quot;sizes&quot;:[&quot;728x90&quot;],&quot;classes&quot;:[&quot;is-728x90&quot;]},{&quot;dimensions&quot;:[&quot;0x0&quot;],&quot;classes&quot;:[&quot;m-advertisement--fluid-card&quot;,&quot;m-advertisement--fluid-list-card&quot;],&quot;sizes&quot;:[&quot;0x0&quot; true}" data-class-rules="[{&quot;dimensions&quot;:[&quot;0x0&quot;],&quot;classes&quot;:[&quot;m-advertisement--fluid-card&quot;,&quot;m-advertisement--fluid-list-card&quot;],&quot;sizes&quot;:[&quot;0x0&quot;]}]" data-dcnode-id="1210"></phoenix-ad></div></aside><p data-dcnode-id="1203"><span data-dcnode-id="1207" instrument_node="">Later in May, the FBI announced a special counsel, led by former FBI director </span><a data-dcnode-id="1205" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.biography.com/people/robert-mueller-241110" onclick="return phoenixTrackClickEvent(this, event);" rel="noopener" target="_blank"><span data-dcnode-id="1206" instrument_node="">Robert Mueller</span></a><span data-dcnode-id="1204" instrument_node="">, to investigate any coordination between the Russian government and the Trump campaign.</span></p><p data-dcnode-id="1190"><strong data-dcnode-id="1201"><span data-dcnode-id="1202" instrument_node="">Fights over Obamacare</span></strong><span data-dcnode-id="1200" instrument_node="">: Republicans and Democrats in the </span><a data-dcnode-id="1198" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.history.com/topics/history-of-the-house-of-representatives"><span data-dcnode-id="1199" instrument_node="">House of Representatives</span></a><span data-dcnode-id="1197" instrument_node=""> and </span><a data-dcnode-id="1195" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.history.com/topics/history-of-the-us-senate"><span data-dcnode-id="1196" instrument_node="">Senate</span></a><span data-dcnode-id="1194" instrument_node=""> sparred over whether to repeal President Obama’s signature </span><a data-dcnode-id="1192" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.history.com/the-obama-years/healthcare.html"><span data-dcnode-id="1193" instrument_node="">Affordable Care Act</span></a><span data-dcnode-id="1191" instrument_node="">.</span></p><p data-dcnode-id="1188"><span data-dcnode-id="1189" instrument_node="">The GOP, in control of both the House and Senate for the first time since 2006, made it a legislative priority to dismantle the healthcare bill, yet a series of Republican plans to repeal and replace the legislation ultimately failed.</span></p><p data-dcnode-id="1184"><strong data-dcnode-id="1186"><span data-dcnode-id="1187" instrument_node="">Rohingya refugee crisis:</span></strong><span data-dcnode-id="1185" instrument_node=""> In late August, Myanmar stepped up attacks against the Rohingya, a mostly Muslim ethnic minority in Buddhist-majority Myanmar, in what a United Nations commissioner called a “textbook example of ethnic cleansing.” As a result, more than 600,000 Rohingya refugees fled across the border into neighboring Bangladesh, leading to a humanitarian crisis in that country.</span></p><div class="m-detail--body-item m-detail--body-item-inline" data-dcnode-id="1131"><figure class="l-inline tml-image m-detail--tml-image--inline" data-dcnode-id="1132" itemscope="" itemtype="http://schema.org/ImageObject"><phoenix-picture data-dcnode-id="1140"><a data-dcnode-id="1179"><picture class="is-loaded" data-dcnode-id="1180"><source data-dcnode-id="1183" sizes="(min-width: 1240px) 700px, (min-width: 675px) 620px, calc(100vw - 40px)" srcset="https://www.history.com/.image/c_limit%2Ccs_srgb%2Cq_auto:good%2Cw_380/MTU3ODc5MDg3MjQxMTc2Mzkz/image-placeholder-title.webp 380w, https://www.history.com/.image/c_limit%2Ccs_srgb%2Cq_auto:good%2Cw_620/MTU3ODc5MDg3MjQxMTc2Mzkz/image-placeholder-title.webp 620w, https://www.history.com/.image/c_limit%2Ccs_srgb%2Cq_auto:good%2Cw_1240/MTU3ODc5MDg3MjQxMTc2Mzkz/image-placeholder-title.webp 1240w, https://www.history.com/.image/c_limit%2Ccs_srgb%2Cq_auto:good%2Cw_700/MTU3ODc5MDg3MjQxMTc2Mzkz/image-placeholder-title.webp 700w, https://www.history.com/.image/c_limit%2Ccs_srgb%2Cq_auto:good%2Cw_1400/MTU3ODc5MDg3MjQxMTc2Mzkz/image-placeholder-title.we </span></phoenix-icon-fallback></button></div></div></phoenix-picture><figcaption data-dcnode-id="1133"><p class="tml-image--caption" data-dcnode-id="1134" itemprop="caption"><span data-dcnode-id="1135" instrument_node="">An undated picture released from North Korea's official Korean Central News Agency on September 16, 2017 shows North Korean leader Kim Jong-Un inspecting a launching drill of the medium-and-long range strategic ballistic rocket Hwasong-12 at an undisclosed location. (Credit: STR/AFP/Getty Images)</span></p></figcaption></figure></div><p data-dcnode-id="1122"><strong data-dcnode-id="1129"><span data-dcnode-id="1130" instrument_node="">North Korean missile launch: </span></strong><a data-dcnode-id="1127" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.history.com/topics/north-korea-history"><span data-dcnode-id="1128" instrument_node="">North Korea</span></a><span data-dcnode-id="1126" instrument_node=""> launched a ballistic missile over Japan in August, stepping up tensions between Pyongyang and </span><a data-dcnode-id="1124" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.history.com/topics/us-states/washington"><span data-dcnode-id="1125" instrument_node="">Washington</span></a><span data-dcnode-id="1123" instrument_node="">. North Korean state media said the launch was a prelude to more military actions aimed at the U.S. territory of Guam, a small island in the Western Pacific home to two U.S. military bases.</span></p><aside class="m-in-content-ad-row l-inline not-size-b not-size-c not-size-d" data-ad-group="in_content-3" data-dcnode-id="1119"><div class="m-in-content-ad not-size-b not-size-c not-size-d" data-ad-group="in_content-3" data-dcnode-id="1120" data-zone-count="8"><phoenix-ad class="m-ad not-size-b not-size-c not-size-d m-in-content-ad--slot" config="{&quot;adHtml&quot;:&quot;&quot;,&quot;adReloaderDelay&quot;:0,&quot;maxAdReloads&quot;:5,&quot;adReloaderSizeCodes&quot;:null,&quot;adCloseButton&quot;:false,&quot;bonusConfig&quot;:null,&quot;classRules&quot;:[{&quot;dimensions&quot;:[&quot;0x0&quot;],&quot;classes&quot;:[&quot;m-advertisement--fluid-card&quot;,&quot;m-advertisement--fluid-list-card&quot;],&quot;sizes&quot;:[&quot;0x0&quot;]}],&quot;localizedPhrases&quot;:{&quot;advertisement_legend&quot;:&quot;ADVERTISEMENT&quot;,&quot;outstream_clickout&quot;:&quot;Visit Website&quot;,&quot;outstream_thanks&quot;:&quot;Thanks for watching!&quot;},&quot;overrideOutstreamScript&quot;:false,&quot;moduleClass&quot;:&quot;m-in-content-ad&quot;,&quot;slotId&quot;:&quot;ad-154e26374f6349f0bd6600907cbd4e11&quot;,&quot;visClasses&quot;:[&quot;not-size-b&quot;,&quot;not-size-c&quot;,&quot;not-size-d&quot;],&quot;extraClasses&quot;:null,&quot;zone&quot;:&quot;in_content&quot;,&quot;outstream&quot;:false,&quot;adGroup&quot;:&quot;in_content-3&quot;,&quot;slotConfig&quot;:{&quot;config&quot;:{&quot;sizes&quot;:[[300,250],[320,50],&quot;fluid&quot;,[1,2]]},&quot;model&quot;:{&quot;zone&quot;:&quot;in_content&quot;,&quot;index&quot;:&quot;3&quot;,&quot;isOutstream&quot;:false,&quot;deferLoad&quot;:false,&quot;nativeCardType&quot;:&quot;standard&quot;},&quot;sizes&quot;:[{&quot;width&quot;:300,&quot;height&quot;:250},{&quot;width&quot;:320,&quot;height&quot;:50},{&quot;name&quot;:&quot;fluid&quot;},{&quot;width&quot;:1,&quot;height&quot;:2}],&quot;screenSizes&quot;:[&quot;A&quot;],&quot;slotModel&quot;:{&quot;zone&quot;:&quot;in_content&quot;,&quot;index&quot;:&quot;3&quot;,&quot;isOutstream&quot;:false,&quot;deferLoad&quot;:false,&quot;nativeCardType&quot;:&quot;standard&quot;},&quot;id&quot;:&quot;ad-154e26374f6349f0bd6600907cbd4e11&quot;,&quot;adUnitPath&quot;:&quot;/88059007,5936/www.history.com/topics/21st-century&quot;},&quot;showBlockthrough&quot;:true}" data-class-rules="[{&quot;dimensions&quot;:[&quot;0x0&quot;],&quot;classes&quot;:[&quot;m-advertisement--fluid-card&quot;,&quot;m-advertisement--fluid-list-card&quot;],&quot;sizes&quot;:[&quot;0x0&quot;]}]" data-dcnode-id="1121"></phoenix-ad></div></aside><p data-dcnode-id="1112"><strong data-dcnode-id="1117"><span data-dcnode-id="1118" instrument_node="">U.S.-backed forces take Raqqa</span></strong><span data-dcnode-id="1116" instrument_node="">: After a four-month fight, the </span><a data-dcnode-id="1114" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.history.com/topics/isis"><span data-dcnode-id="1115" instrument_node="">ISIS</span></a><span data-dcnode-id="1113" instrument_node=""> “capital” of Raqqa fell to a U.S.-backed coalition of Syrian forces, ending three years of ISIS control in the Syrian city. The defeat carried symbolic weight as the second major loss of territory for the Islamic State in three months. In July, ISIS troops were pushed out of the Iraqi city of Mosul.</span></p><h2 data-dcnode-id="1110" id="section_2"><span data-dcnode-id="1111" instrument_node="">Culture     </span></h2><p data-dcnode-id="1103"><strong data-dcnode-id="1108"><span data-dcnode-id="1109" instrument_node="">Women’s rights</span></strong><span data-dcnode-id="1107" instrument_node="">: In January, the Women’s </span><a data-dcnode-id="1105" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.history.com/topics/black-history/march-on-washington"><span data-dcnode-id="1106" instrument_node="">March on Washington</span></a><span data-dcnode-id="1104" instrument_node="">, which advocated for policies regarding women’s rights and other issues, became one of the largest single-day demonstrations in U.S. history.</span></p><p data-dcnode-id="1095"><span data-dcnode-id="1102" instrument_node="">The </span><em data-dcnode-id="1100"><span data-dcnode-id="1101" instrument_node="">Washington Post</span></em><span data-dcnode-id="1099" instrument_node=""> estimated that more than 5 million people may have attended 653 marches in U.S. cities, rivaling participation in the </span><a data-dcnode-id="1097" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.history.com/topics/vietnam-war"><span data-dcnode-id="1098" instrument_node="">Vietnam War</span></a><span data-dcnode-id="1096" instrument_node=""> Moratorium Days of 1969 and 1970.</span></p><p data-dcnode-id="1090"><span data-dcnode-id="1094" instrument_node="">Later, women of the #MeToo movement, a social media campaign to raise awareness about sexual harassment and assault, would be named </span><em data-dcnode-id="1092"><span data-dcnode-id="1093" instrument_node="">Time </span></em><span data-dcnode-id="1091" instrument_node="">magazine’s Person of the Year, after helping take down a number of pop culture’s most powerful men.</span></p><aside class="m-in-content-ad-row l-inline not-size-a not-size-b not-size-c" data-ad-group="in_content-2" data-dcnode-id="1087"><div class="m-in-content-ad not-size-a not-size-b not-size-c" data-ad-group="in_content-2" data-dcnode-id="1088" data-zone-count="5"><phoenix-ad class="m-ad not-size-a not-size-b not-size-c m-in-content-ad--slot" config="{&quot;adHtml&quot;:&quot;&quot;,&quot;adReloaderDelay&quot;:0,&quot;maxAdReloads&quot;:5,&quot;adReloaderSizeCodes&quot;:null,&quot;adCloseButton&quot;:false,&quot;bonusConfig&quot;:null,&quot;classRules&quot;:[{&quot;sizes&quot;:[&quot;728x90&quot;],&quot;classes&quot;:[&quot;is-728x90&quot;]},{&quot;dimensions&quot;:[&quot;0x0&quot;],&quot;classes&quot;:[&quot;m-advertisement--fluid-card&quot;,&quot;m-advertisement--fluid-list-card&quot;],&quot;sizes&quot;:[&quot;0x0&quot;]},{&quot;sizes&quot;:[&quot;970x90&quot;],&quot;classes&quot;:[&quot;is-970x90&quot;]},{&quot;sizes&quot;:[&quot;970x250&quot;],&quot;classes&quot;:[&quot;is-970x250&quot;]},{&quot;sizes&quot;:[&quot;970x90&quot;],&quot;classes&quot;:[&quot;is-970x90&quot;]},{&quot;sizes&quot;:[&quot;970x250&quot;],&quot;classes&quot;:[&quot;is-970x250&quot;]},{&quot;sizes&quot;:[&quot;970x90&quot;],&quot;classes&quot;:[&quot;is-970x90&quot;]},{&quot;sizes&quo </span></phoenix-icon-fallback></button></div></div></phoenix-picture><figcaption data-dcnode-id="939"><p class="tml-image--caption" data-dcnode-id="940" itemprop="caption"><span data-dcnode-id="941" instrument_node="">The statue of Confederate General Robert E. Lee in the center of Emancipation Park the day after the Unite the Right rally devolved into violence August 13, 2017 in Charlottesville, Virginia. The Charlottesville City Council voted to remove the statue and change the name of the space from Lee Park to Emancipation Park, sparking protests from white nationalists, neo-Nazis, the Ku Klux Klan and members of the 'alt-right.'  (Credit: Chip Somodevilla/Getty Images)</span></p></figcaption></figure></div><p data-dcnode-id="927"><strong data-dcnode-id="935"><span data-dcnode-id="936" instrument_node="">Confederate monuments fall</span></strong><span data-dcnode-id="934" instrument_node="">: White supremacists marched in Charlottesville, </span><a data-dcnode-id="932" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.history.com/topics/us-states/virginia"><span data-dcnode-id="933" instrument_node="">Virginia</span></a><span data-dcnode-id="931" instrument_node="">, in August to protest the city’s plan to remove a statue of Confederate Army commander </span><a data-dcnode-id="929" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.history.com/topics/american-civil-war/robert-e-lee"><span data-dcnode-id="930" instrument_node="">Robert E. Lee</span></a><span data-dcnode-id="928" instrument_node="">. One woman was killed and many more injured while protesting the white nationalist rally.</span></p><p data-dcnode-id="922"><span data-dcnode-id="926" instrument_node="">In the wake of Charlottesville, monuments of Lee, </span><a data-dcnode-id="924" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.history.com/topics/american-civil-war/stonewall-jackson"><span data-dcnode-id="925" instrument_node="">“Stonewall” Jackson</span></a><span data-dcnode-id="923" instrument_node=""> and other confederate figures were removed from public spaces around the country.</span></p><p data-dcnode-id="915"><strong data-dcnode-id="920"><span data-dcnode-id="921" instrument_node="">Las Vegas shooting</span></strong><span data-dcnode-id="919" instrument_node="">: On October 1, gunman Stephen Paddock opened fire on a crowd of concertgoers at the Route 91 Harvest Music Festival on the </span><a data-dcnode-id="917" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.history.com/topics/las-vegas"><span data-dcnode-id="918" instrument_node="">Las Vegas</span></a><span data-dcnode-id="916" instrument_node=""> Strip from the 32nd floor of the nearby Mandalay Bay Hotel.</span></p><aside class="m-in-content-ad-row l-inline not-size-b not-size-c not-size-d" data-ad-group="in_content-5" data-dcnode-id="912"><div class="m-in-content-ad not-size-b not-size-c not-size-d" data-ad-group="in_content-5" data-dcnode-id="913" data-zone-count="8"><phoenix-ad class="m-ad not-size-b not-size-c not-size-d m-in-content-ad--slot" config="{&quot;adHtml&quot;:&quot;&quot;,&quot;adReloaderDelay&quot;:0,&quot;maxAdReloads&quot;:5,&quot;adReloaderSizeCodes&quot;:null,&quot;adCloseButton&quot;:false,&quot;bonusConfig&quot;:null,&quot;classRules&quot;:[{&quot;dimensions&quot;:[&quot;0x0&quot;],&quot;classes&quot;:[&quot;m-advertisement--fluid-card&quot;,&quot;m-advertisement--fluid-list-card&quot;],&quot;sizes&quot;:[&quot;0x0&quot;]}],&quot;localizedPhrases&quot;:{&quot;advertisement_legend&quot;:&quot;ADVERTISEMENT&quot;,&quot;outstream_clickout&quot;:&quot;Visit Website&quot;,&quot;outstream_thanks&quot;:&quot;Thanks for watching!&quot;},&quot;overrideOutstreamScript&quot;:false,&quot;moduleClass&quot;:&quot;m-in-content-ad&quot;,&quot;slotId&quot;:&quot;ad-42717e24256d43069baca0c7be5c3d71&quot;,&quot;visClasses&quot;:[&quot;not-size-b&quot;,&quot;not-size-c&quot;,&quot;not-size-d&quot;],&quot;extraClasses&quot;:null,&quot;zone&quot;:&quot;in_content&quot;,&quot;outstream&quot;:false,&quot;adGroup&quot;:&quot;in_content-5&quot;,&quot;slotConfig&quot;:{&quot;config&quot;:{&quot;sizes&quot;:[[300,250],[320,50],&quot;fluid&quot;,[1,2]]},&quot;model&quot;:{&quot;zone&quot;:&quot;in_content&quot;,&quot;index&quot;:&quot;5&quot;,&quot;isOutstream&quot;:false,&quot;deferLoad&quot;:false,&quot;nativeCardType&quot;:&quot;standard&quot;},&quot;sizes&quot;:[{&quot;width&quot;:300,&quot;height&quot;:250},{&quot;width&quot;:320,&quot;height&quot;:50},{&quot;name&quot;:&quot;fluid&quot;},{&quot;width&quot;:1,&quot;height&quot;:2}],&quot;screenSizes&quot;:[&quot;A&quot;],&quot;slotModel&quot;:{&quot;zone&quot;:&quot;in_content&quot;,&quot;index&quot;:&quot;5&quot;,&quot;isOutstream&quot;:false,&quot;deferLoad&quot;:false,&quot;nativeCardType&quot;:&quot;standard&quot;},&quot;id&quot;:&quot;ad-42717e24256d43069baca0c7be5c3d71&quot;,&quot;adUnitPath&quot;:&quot;/88059007,5936/www.history.com/topics/21st-century&quot;},&quot;showBlockthrough&quot;:true}" data-class-rules="[{&quot;dimensions&quot;:[&quot;0x0&quot;],&quot;classes&quot;:[&quot;m-advertisement--fluid-card&quot;,&quot;m-advertisement--fluid-list-card&quot;],&quot;sizes&quot;:[&quot;0x0&quot;]}]" data-dcnode-id="914"></phoenix-ad></div></aside><p data-dcnode-id="907"><span data-dcnode-id="911" instrument_node="">Paddock killed 58 people and wounded more than 500. News outlets called it the deadliest mass shooting in recent American history. The shooting reignited debate about gun control and </span><a data-dcnode-id="909" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.history.com/topics/2nd-amendment"><span data-dcnode-id="910" instrument_node="">Second Amendment</span></a><span data-dcnode-id="908" instrument_node=""> rights.</span></p><h2 data-dcnode-id="905" id="section_3"><span data-dcnode-id="906" instrument_node="">Health, Science and Environment     </span></h2><p data-dcnode-id="898"><strong data-dcnode-id="903"><span data-dcnode-id="904" instrument_node="">Opioid epidemic</span></strong><span data-dcnode-id="902" instrument_node="">: Public health officials announced that drug overdoses have become the leading cause of death for Americans under age 50, with more than two-thirds of those deaths coming from </span><a data-dcnode-id="900" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.history.com/topics/history-of-heroin-morphine-and-opiates"><span data-dcnode-id="901" instrument_node="">opioid painkillers</span></a><span data-dcnode-id="899" instrument_node="">. President Trump declared the opioid crisis a “public health emergency” in October.</span></p><aside class="m-in-content-ad-row l-inline not-size-a not-size-b not-size-c" data-ad-group="in_content-3" data-dcnode-id="895"><div class="m-in-content-ad not-size-a not-size-b not-size-c" data-ad-group="in_content-3" data-dcnode-id="896" data-zone-count="5"><phoenix-ad class="m-ad not-size-a not-size-b not-size-c m-in-content-ad--slot" config="{&quot;adHtml&quot;:&quot;&quot;,&quot;adReloaderDelay&quot;:0,&quot;maxAdReloads&quot;:5,&quot;adReloaderSizeCodes&quot;:null,&quot;adCloseButton&quot;:false,&quot;bonusConfig&quot;:null,&quot;classRules&quot;:[{&quot;sizes&quot;:[&quot;728x90&quot;],&quot;classes&quot;:[&quot;is-728x90&quot;]},{&quot;dimensions&quot;:[&quot;0x0&quot;],&quot;classes&quot;:[&quot;m-advertisement--fluid-card&quot;,&quot;m-advertisement--fluid-list-card&quot;],&quot;sizes&quot;:[&quot;0x0&quot;]},{&quot;sizes&quot;:[&quot;970x90&quot;],&quot;classes&quot;:[&quot;is-970x90&quot;]},{&quot;sizes&quot;:[&quot;970x250&quot;],&quot;classes&quot;:[&quot;is-970x250&quot;]},{&quot;sizes&quot;:[&quot;970x90&quot;],&quot;classes&quot;:[&quot;is-970x90&quot;]},{&quot;sizes&quot;:[&quot;970x250&quot;],&quot;classes&quot;:[&quot;is-970x250&quot;]},{&quot;sizes&quot;:[&quot;970x90&quot;],&quot;classes&quot;:[&quot;i </span></phoenix-icon-fallback></button></div></div></phoenix-picture><figcaption data-dcnode-id="828"><p class="tml-image--caption" data-dcnode-id="829" itemprop="caption"><span data-dcnode-id="830" instrument_node="">Defiant Dakota Access Pipeline water protectors faced-off with various law enforcement agencies on the day the camp was slated to be raided. Many protesters and independent journalist, who were all threatened with multiple felony charges if they didn't leave were met with militarized police on the road abutting the camp. (Credit: Michael Nigro/Pacific Press/LightRocket via Getty Images)</span></p></figcaption></figure></div><p data-dcnode-id="822"><strong data-dcnode-id="824"><span data-dcnode-id="825" instrument_node="">Pipeline protests squelched</span></strong><span data-dcnode-id="823" instrument_node="">: Shortly after taking office, Donald Trump signed orders clearing the way for the controversial Keystone XL and Dakota Access Pipelines. The move was an effort to expand U.S. energy infrastructure and rollback Obama-era environmental regulations.</span></p><aside class="m-in-content-ad-row l-inline not-size-b not-size-c not-size-d" data-ad-group="in_content-6" data-dcnode-id="819"><div class="m-in-content-ad not-size-b not-size-c not-size-d" data-ad-group="in_content-6" data-dcnode-id="820" data-zone-count="8"><phoenix-ad class="m-ad not-size-b not-size-c not-size-d m-in-content-ad--slot" config="{&quot;adHtml&quot;:&quot;&quot;,&quot;adReloaderDelay&quot;:0,&quot;maxAdReloads&quot;:5,&quot;adReloaderSizeCodes&quot;:null,&quot;adCloseButton&quot;:false,&quot;bonusConfig&quot;:null,&quot;classRules&quot;:[{&quot;dimensions&quot;:[&quot;0x0&quot;],&quot;classes&quot;:[&quot;m-advertisement--fluid-card&quot;,&quot;m-advertisement--fluid-list-card&quot;],&quot;sizes&quot;:[&quot;0x0&quot;]}],&quot;localizedPhrases&quot;:{&quot;advertisement_legend&quot;:&quot;ADVERTISEMENT&quot;,&quot;outstream_clickout&quot;:&quot;Visit Website&quot;,&quot;outstream_thanks&quot;:&quot;Thanks for watching!&quot;},&quot;overrideOutstreamScript&quot;:false,&quot;moduleClass&quot;:&quot;m-in-content-ad&quot;,&quot;slotId&quot;:&quot;ad-7db663c06cf24a7089697980481cf909&quot;,&quot;visClasses&quot;:[&quot;not-size-b&quot;,&quot;not-size-c&quot;,&quot;not-size-d&quot;],&quot;extraClasses&quot;:null,&quot;zone&quot;:&quot;in_content&quot;,&quot;outstream&quot;:false,&quot;adGroup&quot;:&quot;in_content-6&quot;,&quot;slotConfig&quot;:{&quot;config&quot;:{&quot;sizes&quot;:[[300,250],[320,50],&quot;fluid&quot;,[1,2]]},&quot;model&quot;:{&quot;zone&quot;:&quot;in_content&quot;,&quot;index&quot;:&quot;6&quot;,&quot;isOutstream&quot;:false,&quot;deferLoad&quot;:false,&quot;nativeCardType&quot;:&quot;standard&quot;},&quot;sizes&quot;:[{&quot;width&quot;:300,&quot;height&quot;:250},{&quot;width&quot;:320,&quot;height&quot;:50},{&quot;name&quot;:&quot;fluid&quot;},{&quot;width&quot;:1,&quot;height&quot;:2}],&quot;screenSizes&quot;:[&quot;A&quot;],&quot;slotModel&quot;:{&quot;zone&quot;:&quot;in_content&quot;,&quot;index&quot;:&quot;6&quot;,&quot;isOutstream&quot;:false,&quot;deferLoad&quot;:false,&quot;nativeCardType&quot;:&quot;standard&quot;},&quot;id&quot;:&quot;ad-7db663c06cf24a7089697980481cf909&quot;,&quot;adUnitPath&quot;:&quot;/88059007,5936/www.history.com/topics/21st-century&quot;},&quot;showBlockthrough&quot;:true}" data-class-rules="[{&quot;dimensions&quot;:[&quot;0x0&quot;],&quot;classes&quot;:[&quot;m-advertisement--fluid-card&quot;,&quot;m-advertisement--fluid-list-card&quot;],&quot;sizes&quot;:[&quot;0x0&quot;]}]" data-dcnode-id="821"></phoenix-ad></div></aside><p data-dcnode-id="815"><strong data-dcnode-id="817"><span data-dcnode-id="818" instrument_node="">Paris climate agreement</span></strong><span data-dcnode-id="816" instrument_node="">: The Trump administration delivered official notice in August that the United States would stop participating in the Paris Agreement on climate change.</span></p><p data-dcnode-id="810"><span data-dcnode-id="814" instrument_node="">The Paris Agreement, which was negotiated by 196 countries in 2015, details the steps each country will take to respond to the threat of global </span><a data-dcnode-id="812" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.history.com/topics/history-of-climate-change"><span data-dcnode-id="813" instrument_node="">climate change</span></a><span data-dcnode-id="811" instrument_node="">.</span></p><p data-dcnode-id="806"><a data-dcnode-id="808" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.history.com/topics/the-history-of-syria"><span data-dcnode-id="809" instrument_node="">Syria</span></a><span data-dcnode-id="807" instrument_node=""> announced in November that it would join the landmark pact, leaving the United States the planet’s lone holdout.</span></p><p data-dcnode-id="802"><strong data-dcnode-id="804"><span data-dcnode-id="805" instrument_node="">Record-setting hurricane season</span></strong><span data-dcnode-id="803" instrument_node="">: The 2017 Atlantic hurricane season, which included 17 named storms and 10 hurricanes, may go down as the costliest hurricane season ever. In the United States alone, hurricanes caused more than $2 billion in 2017.</span></p><p data-dcnode-id="791"><span data-dcnode-id="801" instrument_node="">In August, Hurricane Harvey slammed the Gulf Coast of </span><a data-dcnode-id="799" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.history.com/topics/us-states/texas"><span data-dcnode-id="800" instrument_node="">Texas</span></a><span data-dcnode-id="798" instrument_node="">, dropping more than 50 inches of rain on Houston. A few weeks later, Hurricane Irma, which destroyed more than 95 percent of the buildings on the tiny Caribbean island of Barbuda before steamrolling the </span><a data-dcnode-id="796" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.history.com/topics/us-states/florida"><span data-dcnode-id="797" instrument_node="">Florida</span></a><span data-dcnode-id="795" instrument_node=""> Keys, became the most intense hurricane to make U.S. landfall since </span><a data-dcnode-id="793" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.history.com/topics/hurricane-katrina"><span data-dcnode-id="794" instrument_node="">Hurricane Katrina</span></a><span data-dcnode-id="792" instrument_node=""> in 2005.</span></p><p data-dcnode-id="786"><span data-dcnode-id="790" instrument_node="">Hurricane Maria struck </span><a data-dcnode-id="788" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.history.com/topics/puerto-rico-history"><span data-dcnode-id="789" instrument_node="">Puerto Rico</span></a><span data-dcnode-id="787" instrument_node=""> in late September, leaving large swaths of the U.S. commonwealth without electricity for months.</span></p><p data-dcnode-id="779"><strong data-dcnode-id="784"><span data-dcnode-id="785" instrument_node="">Wildfires across the globe</span></strong><span data-dcnode-id="783" instrument_node="">: In the western United States, Canada and </span><a data-dcnode-id="781" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.history.com/topics/us-states/alaska"><span data-dcnode-id="782" instrument_node="">Alaska</span></a><span data-dcnode-id="780" instrument_node="">, wildfires scorched millions of acres in a devastating wildfire season (only 2015 had worse wildfires). Fires also raged across Chile, South Africa, Portugal, Australia, New Zealand and—somewhat ironically—Greenland, where peat and permafrost are drying out because of climate change.</span></p><aside class="m-in-content-ad-row l-inline not-size-b not-size-c not-size-d" data-ad-group="in_content-7" data-dcnode-id="776"><div class="m-in-content-ad not-size-b not-size-c not-size-d" data-ad-group="in_content-7" data-dcnode-id="777" data-zone-count="8">
