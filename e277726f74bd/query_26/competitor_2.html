</span><h1 class="txt-large" data-dcnode-id="750"><span data-dcnode-id="751" instrument_node="">What are the Key Events of Sioux History?</span></h1><span data-dcnode-id="749" instrument_node="">
</span></header><span data-dcnode-id="747" instrument_node="">
</span><section class="about desktop" data-dcnode-id="736"><span data-dcnode-id="746" instrument_node="">
</span><div class="author-info tk-ff-meta-web-pro txt-grey" data-dcnode-id="738"><span data-dcnode-id="745" instrument_node="">
</span><address class="txt-strong" data-dcnode-id="743"><span data-dcnode-id="744" instrument_node="">James Doehring</span></address><span data-dcnode-id="742" instrument_node="">
</span><time class="txt-small txt-light" data-dcnode-id="740" datetime="2022-06-10T03:02:54-07:00"><span data-dcnode-id="741" instrument_node="">
                                    Last Modified Date: June 10, 2022                                </span></time><span data-dcnode-id="739" instrument_node="">
</span></div><span data-dcnode-id="737" instrument_node="">
</span></section><span data-dcnode-id="735" instrument_node="">
</span><section class="about mobile" data-dcnode-id="724"><span data-dcnode-id="734" instrument_node="">
</span><a class="author-info tk-ff-meta-web-pro popup-open-but" data-dcnode-id="726" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.unitedstatesnow.org/what-are-the-key-events-of-sioux-history.htm%23authorBox"><span data-dcnode-id="733" instrument_node="">
</span><address class="txt-strong txt-grey" data-dcnode-id="731"><span data-dcnode-id="732" instrument_node="">James Doehring</span></address><span data-dcnode-id="730" instrument_node="">
</span><time class="txt-small txt-light" data-dcnode-id="728" datetime="2022-06-10T03:02:54-07:00"><span data-dcnode-id="729" instrument_node="">
                                    Date: June 10, 2022                                </span></time><span data-dcnode-id="727" instrument_node="">
</span></a><span data-dcnode-id="725" instrument_node="">
</span></section><span data-dcnode-id="723" instrument_node="">
</span><section class="social" data-dcnode-id="717"><span data-dcnode-id="722" instrument_node="">
</span><span data-dcnode-id="720" instrument_node=""> </span><div class="addthis_inline_share_toolbox" data-dcnode-id="719"></div><span data-dcnode-id="718" instrument_node="">
</span></section><span data-dcnode-id="716" instrument_node="">
</span><section class="content floating" data-dcnode-id="601"><span data-dcnode-id="715" instrument_node="">
</span><figure class="fright txt-center" data-dcnode-id="705"><span data-dcnode-id="714" instrument_node="">
</span><a class="popup-open-but" data-dcnode-id="707" data-popup="#slider-image-1" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.unitedstatesnow.org/what-are-the-key-events-of-sioux-history.htm%23imagePopup"><span data-dcnode-id="713" instrument_node="">
</span><img alt="Wounded Knee, South Dakota, was an important location for Sioux civil rights protests." data-dcnode-id="712" sizes="calc(50vw - 30px)" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//images.unitedstatesnow.org/slideshow-mobile-small/south-dakota-map.jpg&amp;raw" srcset="//images.unitedstatesnow.org/small/south-dakota-map.jpg 232w, //images.unitedstatesnow.org/slideshow-mobile-small/south-dakota-map.jpg 520w"><span data-dcnode-id="711" instrument_node="">
</span><figcaption class="tk-ff-meta-web-pro txt-small txt-light desktop" data-dcnode-id="709"><span data-dcnode-id="710" instrument_node="">
                                        Wounded Knee, South Dakota, was an important location for Sioux civil rights protests.                                    </span></figcaption><span data-dcnode-id="708" instrument_node="">
</span></a><span data-dcnode-id="706" instrument_node="">
</span></figure><span data-dcnode-id="704" instrument_node="">
</span><p data-dcnode-id="699"><span data-dcnode-id="703" instrument_node="">Most known events in Sioux history follow contact with European settlers in the Americas.  The Sioux, a Native American tribe that originally settled in what are now the American states of Minnesota, </span><a data-dcnode-id="701" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.unitedstatesnow.org/what-is-iowa-known-for.htm"><span data-dcnode-id="702" instrument_node="">Iowa</span></a><span data-dcnode-id="700" instrument_node=""> and Wisconsin, engaged in trade with settlers and acquired new technologies that changed their way of life.  A string of hostilities erupted between the Sioux and the Americans, however.  The last major battle in Sioux history was in 1890 in South Dakota, where a large number of Sioux are located. </span></p><span data-dcnode-id="698" instrument_node="">
</span><div class="ad-block center" data-dcnode-id="690"><span data-dcnode-id="696" instrument_node="">
</span><span data-dcnode-id="694" instrument_node="">
</span><ins class="adsbygoogle" data-ad-client="ca-pub-8290526608142878" data-ad-format="auto" data-ad-slot="5480447840" data-dcnode-id="693" data-full-width-responsive="true" style="display:block"></ins><span data-dcnode-id="692" instrument_node="">
</span><span data-dcnode-id="691" instrument_node="">
</span></div><span data-dcnode-id="689" instrument_node="">
</span><figure class="fright txt-center" data-dcnode-id="679"><span data-dcnode-id="688" instrument_node="">
</span><a class="popup-open-but" data-dcnode-id="681" data-popup="#slider-image-2" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.unitedstatesnow.org/what-are-the-key-events-of-sioux-history.htm%23imagePopup"><span data-dcnode-id="687" instrument_node="">
</span><img alt="General Custer and his army were killed by the Sioux at the Battle of Little Bighorn." data-dcnode-id="686" sizes="calc(50vw - 30px)" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//images.unitedstatesnow.org/slideshow-mobile-small/custer-on-horse-with-men-behind-him.jpg&amp;raw" srcset="//images.unitedstatesnow.org/small/custer-on-horse-with-men-behind-him.jpg 232w, //images.unitedstatesnow.org/slideshow-mobile-small/custer-on-horse-with-men-behind-him.jpg 520w"><span data-dcnode-id="685" instrument_node="">
</span><figcaption class="tk-ff-meta-web-pro txt-small txt-light desktop" data-dcnode-id="683"><span data-dcnode-id="684" instrument_node="">
                                        General Custer and his army were killed by the Sioux at the Battle of Little Bighorn.                                    </span></figcaption><span data-dcnode-id="682" instrument_node="">
</span></a><span data-dcnode-id="680" instrument_node="">
</span></figure><span data-dcnode-id="678" instrument_node="">
</span><p data-dcnode-id="676"><span data-dcnode-id="677" instrument_node="">The Sioux are thought to have settled in a vast area around the source of the Mississippi River at the time of European contact.  They both hunted and farmed for sustenance.  French merchants engaged the Sioux in the fur trade by the 17th century.  It is likely, though, that the Sioux came under indirect European influence before this time.  European horses and metal tools, along with detrimental microbes, made their way through many Native American societies through trade.</span></p><span data-dcnode-id="675" instrument_node="">
</span><div class="ad-block center" data-dcnode-id="667"><span data-dcnode-id="673" instrument_node="">
</span><span data-dcnode-id="671" instrument_node="">
</span><ins class="adsbygoogle" data-ad-client="ca-pub-8290526608142878" data-ad-format="auto" data-ad-slot="9332062945" data-dcnode-id="670" data-full-width-responsive="true" style="display:block"></ins><span data-dcnode-id="669" instrument_node="">
</span><span data-dcnode-id="668" instrument_node="">
</span></div><span data-dcnode-id="666" instrument_node="">
</span><p data-dcnode-id="664"><span data-dcnode-id="665" instrument_node="">Intermittent war with the French escalated during the 1700s, and many Sioux were pushed south.  Large-scale movements of the Sioux often resulted in conflict with other Native American groups that were occupying the lands in question.  During the War of 1812, the Sioux allied themselves with Great Britain.  The end of the war, however, signaled an end to major relations between the Sioux and European powers.  </span></p><span data-dcnode-id="663" instrument_node="">
</span><div class="ad-block center" data-dcnode-id="655"><span data-dcnode-id="661" instrument_node="">
</span><span data-dcnode-id="659" instrument_node="">
</span><ins class="adsbygoogle" data-ad-client="ca-pub-8290526608142878" data-ad-format="auto" data-ad-slot="9592110917" data-dcnode-id="658" data-full-width-responsive="true" style="display:block"></ins><span data-dcnode-id="657" instrument_node="">
</span><span data-dcnode-id="656" instrument_node="">
</span></div><span data-dcnode-id="654" instrument_node=""> </span><div class="ad-block center" data-dcnode-id="648"><span data-dcnode-id="652" instrument_node="">
</span><a class="txt-strong" data-dcnode-id="650" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//capitaloneshopping.sjv.io/meRVZ%3Fsubid%3Darticle-text-link" onclick="fbq('track','Lead');"><span data-dcnode-id="651" instrument_node="">Is Amazon actually giving you the best price? This little known plugin reveals the answer.</span></a><span data-dcnode-id="649" instrument_node="">
</span></div><span data-dcnode-id="647" instrument_node="">
</span><p data-dcnode-id="645"><span data-dcnode-id="646" instrument_node="">A series of conflicts with the US characterizes Sioux history during the 1800s.  Treaty violations by the US government and late payments by Sioux financial agents resulted in violence between American settlers and the Sioux.  These armed conflicts are collectively known as the Dakota War of 1862.  Hundreds of American settlers were killed and 39 captured Sioux were publicly hanged.   Remaining Sioux near US settlements were pushed further west.  </span></p><span data-dcnode-id="644" instrument_node="">
</span><div class="ad-block center" data-dcnode-id="636"><span data-dcnode-id="642" instrument_node="">
</span><span data-dcnode-id="640" instrument_node="">
</span><ins class="adsbygoogle" data-ad-client="ca-pub-8290526608142878" data-ad-format="auto" data-ad-slot="6965947570" data-dcnode-id="639" data-full-width-responsive="true" style="display:block"></ins><span data-dcnode-id="638" instrument_node="">
</span><span data-dcnode-id="637" instrument_node="">
</span></div><span data-dcnode-id="635" instrument_node="">
</span><p data-dcnode-id="633"><span data-dcnode-id="634" instrument_node="">The Battle of Little Bighorn was one of the few tactical Sioux victories against US troops.  Lt. Colonel George Custer attacked a much larger Sioux force in southern Montana.  Sioux warriors, who were mounted on horseback and possessed modern guns, retaliated and killed Custer along with 267 of his men.  News of a Sioux victory shocked Americans, who had historically experienced military superiority over native groups.  </span></p><span data-dcnode-id="632" instrument_node="">
</span><div class="ad-block center" data-dcnode-id="624"><span data-dcnode-id="630" instrument_node="">
</span><span data-dcnode-id="628" instrument_node="">
</span><ins class="adsbygoogle" data-ad-client="ca-pub-8290526608142878" data-ad-format="auto" data-ad-slot="5652865908" data-dcnode-id="627" data-full-width-responsive="true" style="display:block"></ins><span data-dcnode-id="626" instrument_node="">
</span><span data-dcnode-id="625" instrument_node="">
</span></div><span data-dcnode-id="623" instrument_node="">
</span><p data-dcnode-id="621"><span data-dcnode-id="622" instrument_node="">The last major battle with US forces in Sioux history is known as the Wounded Knee Massacre.  A US cavalry unit assigned to escort a group of Sioux away from their homes for forced relocation ended up in a firefight with the Natives.  Twenty-five soldiers and 150 Sioux were killed during this engagement on 29 December 1890.  </span></p><span data-dcnode-id="620" instrument_node="">
</span><p data-dcnode-id="612"><span data-dcnode-id="619" instrument_node="">Another episode of Sioux history involves the Sioux </span><a data-dcnode-id="617" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.mylawquestions.com/what-are-civil-rights.htm"><span data-dcnode-id="618" instrument_node="">civil rights</span></a><span data-dcnode-id="616" instrument_node=""> protests during the 1960s and 1970s.  The town of Wounded Knee, South Dakota was occupied by activists of the </span><a data-dcnode-id="614" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.unitedstatesnow.org/what-is-an-american-indian.htm"><span data-dcnode-id="615" instrument_node="">American Indian</span></a><span data-dcnode-id="613" instrument_node=""> Movement for 71 days during 1973.  The standoff ended peacefully, though US authorities surrounded the town.  </span></p><span data-dcnode-id="611" instrument_node="">
</span><div class="ad-block center" data-dcnode-id="603"><span data-dcnode-id="609" instrument_node="">
</span><span data-dcnode-id="607" instrument_node="">
</span><ins class="adsbygoogle" data-ad-client="ca-pub-8290526608142878" data-ad-format="auto" data-ad-slot="7092912411" data-dcnode-id="606" data-full-width-responsive="true" style="display:block"></ins><span data-dcnode-id="605" instrument_node="">
</span><span data-dcnode-id="604" instrument_node="">
</span></div><span data-dcnode-id="602" instrument_node="">
</span></section><span data-dcnode-id="600" instrument_node="">
</span><span data-dcnode-id="599" instrument_node="">
</span><span data-dcnode-id="598" instrument_node="">

</span><a data-dcnode-id="582" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.unitedstatesnow.org/what-are-the-different-types-of-native-american-tribes.htm"><span data-dcnode-id="583" instrument_node="">What Are the Different Types of Native American Tribes?</span></a><span data-dcnode-id="581" instrument_node="">

</span><h2 class="txt-large" data-dcnode-id="566"><span data-dcnode-id="567" instrument_node="">
                            Discussion Comments                        </span></h2><span data-dcnode-id="565" instrument_node="">
</span><div class="ad-block center" data-dcnode-id="560"><span data-dcnode-id="563" instrument_node="">
</span><ins class="adsbygoogle" data-ad-client="ca-pub-8290526608142878" data-ad-format="fluid" data-ad-layout="in-article" data-ad-slot="1350224705" data-dcnode-id="562" style="display:block; text-align:center;"></ins><span data-dcnode-id="561" instrument_node="">
</span></div><span data-dcnode-id="559" instrument_node="">
</span><article class="tk-ff-meta-web-pro txt-grey" data-dcnode-id="545"><span data-dcnode-id="558" instrument_node="">
</span><address class="txt-small txt-strong txt-ups fleft" data-dcnode-id="556"><span data-dcnode-id="557" instrument_node="">
            Drentel        </span></address><span data-dcnode-id="555" instrument_node="">
</span><time class="txt-small txt-strong txt-ups fleft" data-dcnode-id="553" datetime="2014-03-18T07:50:47-07:00"><span data-dcnode-id="554" instrument_node="">
            March 18, 2014        </span></time><span data-dcnode-id="552" instrument_node="">
</span><p data-dcnode-id="550"><span data-dcnode-id="551" instrument_node="">It's ironic that the Sioux''s greatest victory, The Battle of Little Bighorn, was ultimately the reason they were so thoroughly demolished by the American troops. Settlers and people who dealt directly with the Sioux knew they were fighters and could be dangerous, but the United States government saw them as more of a nuisance until what happened to General Custer and his troops.
</span></p><p data-dcnode-id="548"><span data-dcnode-id="549" instrument_node="">
</span></p><p data-dcnode-id="546"><span data-dcnode-id="547" instrument_node="">After Custer's defeat, the U.S. government knew the Sioux had to be defeated once and for all in order to instill confidence in settlers and others helping to establish new territory for the U.S.    </span></p></article><span data-dcnode-id="544" instrument_node="">
</span><article class="tk-ff-meta-web-pro txt-grey" data-dcnode-id="530"><span data-dcnode-id="543" instrument_node="">
</span><address class="txt-small txt-strong txt-ups fleft" data-dcnode-id="541"><span data-dcnode-id="542" instrument_node="">
            Sporkasia        </span></address><span data-dcnode-id="540" instrument_node="">
</span><time class="txt-small txt-strong txt-ups fleft" data-dcnode-id="538" datetime="2014-03-17T14:50:47-07:00"><span data-dcnode-id="539" instrument_node="">
            March 17, 2014        </span></time><span data-dcnode-id="537" instrument_node="">
</span><p data-dcnode-id="535"><span data-dcnode-id="536" instrument_node="">The important thing to remember is that Sioux history did not begin with the arrival of the French, English and Spanish. One of the most remarkable aspects of the Sioux people is that they made the long journey from Asia to North America.
</span></p><p data-dcnode-id="533"><span data-dcnode-id="534" instrument_node="">
</span></p><p data-dcnode-id="531"><span data-dcnode-id="532" instrument_node="">After leaving Asia some 30,000 years ago, the Sioux continued their nomadic lifestyle and eventually reached what would later become the United States.    </span></p></article><span data-dcnode-id="529" instrument_node="">
</span><article class="tk-ff-meta-web-pro txt-grey" data-dcnode-id="519"><span data-dcnode-id="528" instrument_node="">
</span><address class="txt-small txt-strong txt-ups fleft" data-dcnode-id="526"><span data-dcnode-id="527" instrument_node="">
            Laotionne        </span></address><span data-dcnode-id="525" instrument_node="">
</span><time class="txt-small txt-strong txt-ups fleft" data-dcnode-id="523" datetime="2014-03-17T08:50:47-07:00"><span data-dcnode-id="524" instrument_node="">
            March 17, 2014        </span></time><span data-dcnode-id="522" instrument_node="">
</span><p data-dcnode-id="520"><span data-dcnode-id="521" instrument_node="">How sad is it that so seldom is American history told from the perspective of the Sioux and other peoples who were in North American before the Europeans arrived? The history of the Sioux people is a template for what most of the other tribes went through as they came into contact with European settlers and then the armies that followed.     </span></p></article><span data-dcnode-id="518" instrument_node="">
