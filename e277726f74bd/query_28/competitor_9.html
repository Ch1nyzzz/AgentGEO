</span><h1 data-dcnode-id="2857"><span data-dcnode-id="2858" instrument_node="">
      Italian americans
    </span></h1><span data-dcnode-id="2856" instrument_node="">
</span><div class="adwords_in_content bordered" data-dcnode-id="2834"><span data-dcnode-id="2855" instrument_node="">
</span><span data-dcnode-id="2853" instrument_node="">
</span><span data-dcnode-id="2850" instrument_node="">
</span><div class="fb-like" data-action="like" data-dcnode-id="2849" data-href="https://www.everyculture.com/multi/Ha-La/Italian-Americans.html" data-layout="standard" data-share="true" data-show-faces="false"></div><span data-dcnode-id="2848" instrument_node="">
</span><hr data-dcnode-id="2847"><span data-dcnode-id="2846" instrument_node="">
</span><span data-dcnode-id="2844" instrument_node="">
</span><span data-dcnode-id="2842" instrument_node="">
</span><ins class="adsbygoogle" data-ad-client="ca-pub-5788426211617053" data-ad-format="auto" data-ad-slot="9485049352" data-dcnode-id="2841" style="display:block"></ins><span data-dcnode-id="2840" instrument_node="">
</span><span data-dcnode-id="2837" instrument_node="">
</span><hr data-dcnode-id="2836"><span data-dcnode-id="2835" instrument_node="">

</span><div class="article_container" data-dcnode-id="2823"><span data-dcnode-id="2830" instrument_node="">
</span><p data-dcnode-id="2825"><span data-dcnode-id="2829" instrument_node="">
</span><b data-dcnode-id="2827"><span data-dcnode-id="2828" instrument_node="">
        by George Pozzetta
      </span></b><span data-dcnode-id="2826" instrument_node="">
</span></p><span data-dcnode-id="2824" instrument_node="">
</span></div><span data-dcnode-id="2822" instrument_node="">
</span><div class="article_container" data-dcnode-id="2799"><span data-dcnode-id="2821" instrument_node="">
</span><h2 data-dcnode-id="2819"><span data-dcnode-id="2820" instrument_node="">
      Overview
    </span></h2><span data-dcnode-id="2818" instrument_node="">
</span><div class="ads_float_left_ad" data-dcnode-id="2804"><span data-dcnode-id="2817" instrument_node="">
</span><div class="leftad" data-dcnode-id="2806"><span data-dcnode-id="2816" instrument_node="">
</span><span data-dcnode-id="2814" instrument_node="">
</span><span data-dcnode-id="2812" instrument_node="">
</span><ins class="adsbygoogle" data-ad-client="ca-pub-5788426211617053" data-ad-format="auto" data-ad-slot="3438515751" data-dcnode-id="2811" style="display:block"></ins><span data-dcnode-id="2810" instrument_node="">
</span><span data-dcnode-id="2807" instrument_node="">
</span></div><span data-dcnode-id="2805" instrument_node="">
</span></div><span data-dcnode-id="2803" instrument_node="">
</span><p data-dcnode-id="2801"><span data-dcnode-id="2802" instrument_node="">
      Moored by Alpine mountains in the north, the boot-shaped Italian peninsula
      juts into the central Mediterranean Sea. Along its European frontier,
      Italy shares borders with France, Switzerland, Austria, and Slovenia. The
      nation's land mass, which includes the two major islands of Sicily
      and Sardinia and numerous smaller ones, measures 116,324 square miles
      (301,200 square kilometers)—almost exactly double the size of the
      state of Florida. Italy's population in 1991 stood at 57.6 million.
      With the exception of the broad north Italian Plain at the foot of the
      Alps, the peninsula is crosscut through much of its length by the Apennine
      mountain chain. The obstacles created by the highlands, valleys, and
      gorges found in the mountain regions fostered strong cultural and
      linguistic differences.
    </span></p><span data-dcnode-id="2800" instrument_node="">
</span></div><span data-dcnode-id="2798" instrument_node="">
</span><div class="article_container" data-dcnode-id="2733"><span data-dcnode-id="2797" instrument_node="">
</span><h3 data-dcnode-id="2795"><span data-dcnode-id="2796" instrument_node="">
      HISTORY
    </span></h3><span data-dcnode-id="2794" instrument_node="">
</span><p data-dcnode-id="2792"><span data-dcnode-id="2793" instrument_node="">
      Italy's modern state traces its mythological roots to the founding
      of the city of Rome in 753 B.C. More historically verified is the fact
      that the Romans engaged in territorial expansion and conquest of
      neighboring lands, devising effective colonization policies that
      ultimately sustained a widespread realm. By 172 B.C., Rome controlled all
      of the Italian peninsula and began moving outward into the Mediterranean
      basin. At its peak, the Roman empire extended from the British Isles to
      the 
      </span></p><div class="gale_imggroup" data-dcnode-id="2782"><span data-dcnode-id="2791" instrument_node="">
</span><img alt="Italian American immigrant laborers pose with the &quot;first train&quot; over the Trolley Road during the construction of the New Troy, Rensselaer &amp; Pittsfield Electric Railway, through Lebanon Valley, New York." data-dcnode-id="2790" height="262" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.everyculture.com/multi/images/gema_02_img0136.jpg&amp;raw" width="422"><span data-dcnode-id="2789" instrument_node="">
</span><div class="caption" data-dcnode-id="2784"><span data-dcnode-id="2788" instrument_node="">
</span><b data-dcnode-id="2786"><span data-dcnode-id="2787" instrument_node="">
            Italian American immigrant laborers pose with the "first
            train" over the Trolley Road during the construction of the
            New Troy, Rensselaer &amp; Pittsfield Electric Railway, through
            Lebanon Valley, New York.
          </span></b><span data-dcnode-id="2785" instrument_node="">
</span></div><span data-dcnode-id="2783" instrument_node="">
</span></div><span data-dcnode-id="2781" instrument_node="">
       Euphrates River. The 
      </span><i data-dcnode-id="2779"><span data-dcnode-id="2780" instrument_node="">
        Pax Romana
      </span></i><span data-dcnode-id="2778" instrument_node="">
       began to crumble, however, by the end of the first century A.D. The sack
      of Rome by the Visigoths in 410 A.D. presaged the more complete
      disintegration of the empire in the later fifth and sixth centuries. With
      its political integration shattered, the country remained fragmented until
      the late nineteenth century. Italy was, in the view of many Europeans, a
      "mere geographic expression."
    </span><p data-dcnode-id="2777"></p><span data-dcnode-id="2776" instrument_node="">
</span><p data-dcnode-id="2771"><span data-dcnode-id="2775" instrument_node="">
      Italy is a relatively young nation state, achieving full unification only
      during the 
      </span><i data-dcnode-id="2773"><span data-dcnode-id="2774" instrument_node="">
        Risorgimento
      </span></i><span data-dcnode-id="2772" instrument_node="">
       of 1860-1870. Prior to this, the peninsula consisted of often mutually
      antagonistic kingdoms, duchies, city-states, and principalities. Some of
      these regions had a history of autonomous rule, while others came under
      the periodic control of foreign powers as a result of recurrent wars and
      shifting political alliances. Over the centuries, therefore, powerful
      regional loyalties emerged, and persisted well after unification. Although
      local cultural variations remained notable, the most significant internal
      distinctions have been those stemming from the contrast between a
      relatively prosperous, cosmopolitan, urban North and a socially backward,
      economically depressed, agricultural South.
    </span></p><span data-dcnode-id="2770" instrument_node="">
</span><p data-dcnode-id="2753"><span data-dcnode-id="2769" instrument_node="">
      Southern Italy (
      </span><i data-dcnode-id="2767"><span data-dcnode-id="2768" instrument_node="">
        Mezzogiorno
      </span></i><span data-dcnode-id="2766" instrument_node="">
      ), the source of more than 75 percent of immigration to the United States,
      was an impoverished region possessing a highly stratified, virtually
      feudal society. The bulk of the population consisted of artisans (
      </span><i data-dcnode-id="2764"><span data-dcnode-id="2765" instrument_node="">
        artigiani
      </span></i><span data-dcnode-id="2763" instrument_node="">
      ), petty landowners or sharecroppers (
      </span><i data-dcnode-id="2761"><span data-dcnode-id="2762" instrument_node="">
        contadini
      </span></i><span data-dcnode-id="2760" instrument_node="">
      ), and farm laborers (
      </span><i data-dcnode-id="2758"><span data-dcnode-id="2759" instrument_node="">
        giornalieri
      </span></i><span data-dcnode-id="2757" instrument_node="">
      ), all of whom eked out meager existences. For reasons of security and
      health, residents typically clustered in hill towns situated away from
      farm land. Each day required long walks to family plots, adding to the
      toil that framed daily lives. Families typically worked as collective
      units to ensure survival. Angelo Pellegrini, who became a successful
      immigrant, remembered his sharecropping family: "The central,
      dominating fact of our existence was continuous, inadequately rewarded
      labor.... Education beyond the third grade was out of the question.... At
      eight or nine years of age, if not sooner, the peasant child is old enough
      to bend his neck to the yoke and fix his eyes upon the soil in which he
      must grub for bread. I did not know it then, but I know it now, that is a
      cruel, man-made destiny from which there is yet no immediate hope of
      escape." (Angelo Pellegrini, 
      </span><i data-dcnode-id="2755"><span data-dcnode-id="2756" instrument_node="">
         Immigrant's Return. 
      </span></i><span data-dcnode-id="2754" instrument_node="">
      New York: Macmillan, 1952; pp. 11, 21.)
    </span></p><span data-dcnode-id="2752" instrument_node="">
</span><p data-dcnode-id="2750"><span data-dcnode-id="2751" instrument_node="">
      The impact of unification on the South was disastrous. The new
      constitution heavily favored the North, especially in its tax policies,
      industrial subsidies, and land programs. The hard-pressed peasantry
      shouldered an increased share of national expenses, while attempting to
      compete in markets dominated more and more by outside capitalist
      intrusions. These burdens only exacerbated existing problems of poor soil,
      absentee landlords, inadequate investment, disease, and high rates of
      illiteracy. With cruel irony, as livelihoods became increasingly
      precarious, population totals soared. Italy jumped from 25 million
      residents in 1861 to 33 million in 1901 to more than 35 million in 1911,
      despite the massive migration already underway.
    </span></p><span data-dcnode-id="2749" instrument_node="">
</span><p data-dcnode-id="2747"><span data-dcnode-id="2748" instrument_node="">
</span></p><div class="gale_imggroup" data-dcnode-id="2737"><span data-dcnode-id="2746" instrument_node="">
</span><img alt="An Italian immigrant family arrives at Ellis Island, New York." data-dcnode-id="2745" height="377" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.everyculture.com/multi/images/gema_02_img0137.jpg&amp;raw" width="426"><span data-dcnode-id="2744" instrument_node="">
</span><div class="caption" data-dcnode-id="2739"><span data-dcnode-id="2743" instrument_node="">
</span><b data-dcnode-id="2741"><span data-dcnode-id="2742" instrument_node="">
            An Italian immigrant family arrives at Ellis Island, New York.
          </span></b><span data-dcnode-id="2740" instrument_node="">
</span></div><span data-dcnode-id="2738" instrument_node="">
</span></div><span data-dcnode-id="2736" instrument_node="">
</span><p data-dcnode-id="2735"></p><span data-dcnode-id="2734" instrument_node="">
</span></div><span data-dcnode-id="2732" instrument_node="">
</span><div class="article_container" data-dcnode-id="2688"><span data-dcnode-id="2731" instrument_node="">
</span><h3 data-dcnode-id="2729"><span data-dcnode-id="2730" instrument_node="">
      EARLY IMMIGRATION
    </span></h3><span data-dcnode-id="2728" instrument_node="">
</span><p data-dcnode-id="2726"><span data-dcnode-id="2727" instrument_node="">
      An exodus of southerners from the peninsula began in the 1880s. Commencing
      in the regions of Calabria, Campania, Apulia, and Basilicata, and
      spreading after 1900 to Sicily, Italian emigration became a torrent of
      humanity. From 1876-1924, more than 4.5 million Italians arrived in the
      United States, and over two million came in the years 1901-1910 alone.
      Despite these massive numbers, it should be noted that roughly two-thirds
      of Italian migration went elsewhere, especially to Europe and South
      America. Immigration to the United States before and after this period
      accounted for approximately one million additional arrivals—a
      considerable movement in its own right—but the era of mass
      migration remains central to the Italian immigrant experience.
    </span></p><span data-dcnode-id="2725" instrument_node="">
</span><p data-dcnode-id="2723"><span data-dcnode-id="2724" instrument_node="">
      Yet, there were important precursors. Italian explorers and sailors
      venturing outward in the employ of other nations touched America in its
      earliest beginnings. The most famous was, of course, Christopher Columbus,
      a Genoese mariner sailing for Spain. Other seafarers such as John Cabot
      (Giovanni Caboto), Giovanni da Verrazzano, and Amerigo Vespucci, and
      important missionaries such as Eusebio Chino and Fra Marco da Nizza, also
      played roles in early exploration and settlement.
    </span></p><span data-dcnode-id="2722" instrument_node="">
</span><p data-dcnode-id="2717"><span data-dcnode-id="2721" instrument_node="">
      After the American Revolution, a small flow of largely northern-Italian
      skilled artisans, painters, sculptors, musicians, and dancers came to the
      new nation, filling economic niches. With the failure of the early
      nineteenth-century liberal revolutions, these immigrants were joined by a
      trickle of political refugees, the most famous of whom was Giuseppe
      Garibaldi. By the second half of the century, American cities also
      typically included Italian street entertainers, tradesmen, statuette
      makers, and stone workers, who often established the first beachheads of
      settlement for the migrations to come. Many of these pioneers were merely
      extending generationsold migratory patterns that had earlier brought them
      through Europe. An old Italian proverb instructed: 
      </span><i data-dcnode-id="2719"><span data-dcnode-id="2720" instrument_node="">
        Chi esce riesce
      </span></i><span data-dcnode-id="2718" instrument_node="">
       (He who leaves succeeds).
    </span></p><span data-dcnode-id="2716" instrument_node="">
</span><p data-dcnode-id="2714"><span data-dcnode-id="2715" instrument_node="">
      This initial Italian movement dispersed widely throughout America, but its
      numbers were too small to constitute a significant presence. By 1850, the
      heaviest concentration was in Louisiana (only 915 people), the result of
      Sicilian migration to New 
       Orleans and its environs. Within a decade, California contained the
      highest total of any state—a mere 2,805—and New York, soon
      to become home to millions of Italian immigrants, counted 1,862.
    </span></p><span data-dcnode-id="2713" instrument_node="">
</span><p data-dcnode-id="2708"><span data-dcnode-id="2712" instrument_node="">
      Everything changed with mass migration, the first phase of which consisted
      primarily of temporary
      migrants—"sojourners"—who desired immediate
      employment, maximum savings, and quick repatriation. The movement was
      predominately composed of young, single men of prime working age (15-35)
      who clustered in America's urban centers. Multiple trips were
      commonplace and ties to American society, such as learning English,
      securing citizenship, and acquiring property, were minimal. With eyes
      focused on the old-world 
      </span><i data-dcnode-id="2710"><span data-dcnode-id="2711" instrument_node="">
        paese
      </span></i><span data-dcnode-id="2709" instrument_node="">
       (village), a total of at least half of the sojourners returned to Italy,
      although in some years rates were much higher. Such mobility earned
      Italians the sobriquet "birds of passage," a label that
      persisted until women and families began to migrate and settlement became
      increasingly permanent in the years following 1910.
    </span></p><span data-dcnode-id="2707" instrument_node="">
</span><p data-dcnode-id="2690"><span data-dcnode-id="2706" instrument_node="">
      Migrants brought with them their family-centered peasant cultures and
      their fiercely local identifications, or 
      </span><i data-dcnode-id="2704"><span data-dcnode-id="2705" instrument_node="">
         campanilismo.
      </span></i><span data-dcnode-id="2703" instrument_node="">
       They typically viewed themselves as residents of particular villages or
      regions, not as "Italians." The organizational and
      residential life of early communities reflected these facts, as people
      limited their associations largely to kin and 
      </span><i data-dcnode-id="2701"><span data-dcnode-id="2702" instrument_node="">
        paesani
      </span></i><span data-dcnode-id="2700" instrument_node="">
       fellow villagers. The proliferation of narrowly based mutual aid
      societies and 
      </span><i data-dcnode-id="2698"><span data-dcnode-id="2699" instrument_node="">
        festas
      </span></i><span data-dcnode-id="2697" instrument_node="">
       (
      </span><i data-dcnode-id="2695"><span data-dcnode-id="2696" instrument_node="">
        feste, 
      </span></i><span data-dcnode-id="2694" instrument_node="">
      or feast days) honoring local patron saints were manifestations of these
      tendencies. Gradually, as immigrants acclimated to the American milieu, in
      which others regarded them simply as Italians, and as they increasingly
      interacted with fellow immigrants, 
      </span><i data-dcnode-id="2692"><span data-dcnode-id="2693" instrument_node="">
         campanilismo
      </span></i><span data-dcnode-id="2691" instrument_node="">
       gave way to a more national identity. Group-wide organization and
      identity, nonetheless, have always been difficult to achieve.
    </span></p><span data-dcnode-id="2689" instrument_node="">
</span></div><span data-dcnode-id="2687" instrument_node="">
</span><div class="article_container" data-dcnode-id="2592"><span data-dcnode-id="2686" instrument_node="">
</span><h3 data-dcnode-id="2684"><span data-dcnode-id="2685" instrument_node="">
      THE EMERGENCE OF "LITTLE ITALIES"
    </span></h3><span data-dcnode-id="2683" instrument_node="">
</span><p data-dcnode-id="2681"><span data-dcnode-id="2682" instrument_node="">
      In terms of settlement, immigrants were (and are) highly concentrated.
      Using kin and village-based chain migration networks to form
      "Little Italies," they clustered heavily in cities in the
      Northeast region (the Mid-Atlantic and New England states) and the
      Midwest, with outposts in California and Louisiana. More than 90 percent
      settled in only 11 states—New York, New Jersey, Pennsylvania,
      Massachusetts, California, Connecticut, Illinois, Ohio, Michigan,
      Missouri, and Louisiana—and approximately 90 percent congregated in
      urban areas. These patterns largely hold true today, although immigrants
      have branched out to locations such as Arizona and Florida. In every
      settlement area, there has been, over time, a slow but steady shift from
      central cities to suburbs.
    </span></p><span data-dcnode-id="2680" instrument_node="">
</span><p data-dcnode-id="2678"><span data-dcnode-id="2679" instrument_node="">
      Immigrants often sought out Little Italies as a result of the hostility
      they encountered in American society. As a despised minority rooted in the
      working class and seemingly resistant to assimilation, Italians suffered
      widespread discrimination in housing and employment. American responses to
      the immigrants occasionally took uglier forms as Italians became the
      victims of intimidation and violence, the most notorious incident being
      the 1890 lynching of 11 Italians in New Orleans. Italian mass migration
      coincided with the growth of a nativism that identified southern and
      eastern Europeans as undesirable elements. Inspired by the
      pseudo-scientific findings of eugenics and social Darwinism,
      turn-of-the-century nativists often branded southern Italians as
      especially inferior. Powerful stereo-types centering on poverty,
      clannishness, illiteracy, high disease rates, and an alleged proclivity
      toward criminal activities underscored the view that southern Italians
      were a degenerate "race" that should be denied entry to
      America. Criticism of Italians became integral to the successful
      legislative drives to enact the nativist Literacy Test in 1917 and
      National Origins Acts in 1921 and 1924.
    </span></p><span data-dcnode-id="2677" instrument_node="">
</span><p data-dcnode-id="2669"><span data-dcnode-id="2676" instrument_node="">
      Within Little Italies, immigrants created New World societies. A network
      of Italian language institutions—newspapers, theaters, churches,
      mutual aid societies, recreational clubs, and debating societies—
      helped fuel an emerging Italian-American ethnic culture. Aspects of the
      folk, popular, and high culture intermixed in this milieu yielding an
      array of entertainment options. Saloons or club buildings in larger urban
      centers often featured traditional puppet and marionette shows while
      immigrant men sipped wines and played card games of 
      </span><i data-dcnode-id="2674"><span data-dcnode-id="2675" instrument_node="">
        mora, briscola,
      </span></i><span data-dcnode-id="2673" instrument_node="">
       and 
      </span><i data-dcnode-id="2671"><span data-dcnode-id="2672" instrument_node="">
        tresette. 
      </span></i><span data-dcnode-id="2670" instrument_node="">
      By the early 1900s, a lively Italian language theater brought
      entertainment to thousands and sustained the careers of professional
      acting troupes and noted performers such as the comedic genius Eduardo
      Migliacco, known as "Farfariello." On a more informal level,
      Italian coffee houses often presented light comedies, heroic tragedies,
      and dialect plays sponsored by drama clubs. Italian opera was a staple in
      most American urban centers, and working-class Italian music halls
      attracted customers by offering renditions of Neapolitan or Sicilian songs
      and dances. Band performances and choral recitals were regularly staged on
      the streets of Italian settlements. Although illiteracy rates among
      immigrants often ran well above 50 percent, newcomers in larger cities had
      access to Italian language bookstores stocked with poetry, short stories,
      novels, and nonfiction. In 1906 one New York bookseller published a
      catalogue of 176 pages to advertise his merchandise.
    </span></p><span data-dcnode-id="2668" instrument_node="">
</span><p data-dcnode-id="2663"><span data-dcnode-id="2667" instrument_node="">
      The cultural patterns of Little Italies were constantly evolving,
      providing for a dynamic interplay between older forms brought from Italy
      and new inventions forged in the United States. Many immigrants attempted
      to recreate old-world celebrations and rituals upon arrival in the United
      States, but those that directly competed with American forms soon fell
      away. The celebration of Epiphany (January 6), for example, was the
      principal Christmas time festivity in Italy, featuring the visit of 
      </span><i data-dcnode-id="2665"><span data-dcnode-id="2666" instrument_node="">
        La Befana,
      </span></i><span data-dcnode-id="2664" instrument_node="">
       a kindly old witch who brought presents for children. In the United
      States the more popular Christmas Eve and Santa Claus displaced this
      tradition.
    </span></p><span data-dcnode-id="2662" instrument_node="">
</span><p data-dcnode-id="2660"><span data-dcnode-id="2661" instrument_node="">
      Even those cultural forms more sheltered from American society were
      contested. Immigrant settlements were not homogenous entities. Various
      members of the community fought for the right to define the group, and the
      ongoing struggle for dominance invariably employed cultural symbols and
      events.
    </span></p><span data-dcnode-id="2659" instrument_node="">
</span><blockquote data-dcnode-id="2648"><span data-dcnode-id="2658" instrument_node="">
</span><p data-dcnode-id="2650"><span data-dcnode-id="2657" instrument_node="">
</span><b data-dcnode-id="2655"><span data-dcnode-id="2656" instrument_node="">
          "M
        </span></b><span data-dcnode-id="2654" instrument_node="">
</span><b data-dcnode-id="2652"><span data-dcnode-id="2653" instrument_node="">
          y first impression when I got there, I tell you the God's
          truth, you're in a dream. It's like in heaven. You
          don't know what it is. You're so happy there in
          America."
        </span></b><span data-dcnode-id="2651" instrument_node="">
</span></p><span data-dcnode-id="2649" instrument_node="">
</span></blockquote><span data-dcnode-id="2647" instrument_node="">
</span><cite data-dcnode-id="2645"><span data-dcnode-id="2646" instrument_node="">
      Felice Taldone in 1924, cited in Ellis Island: An Illustrated History of
      the Immigrant Experience, edited by Ivan Chermayeff et al. (New York:
      Macmillan, 1991).
    </span></cite><span data-dcnode-id="2644" instrument_node="">
</span><p data-dcnode-id="2636"><span data-dcnode-id="2643" instrument_node="">
      The commercial and political elites (
      </span><i data-dcnode-id="2641"><span data-dcnode-id="2642" instrument_node="">
        prominenti
      </span></i><span data-dcnode-id="2640" instrument_node="">
      )— usually aided by the Italian Catholic clergy—sought to
      promote Italian nationalism as a means of self-advancement. These forces
      invested great energy in celebrations of Italian national holidays (such
      as 
      </span><i data-dcnode-id="2638"><span data-dcnode-id="2639" instrument_node="">
        venti di settembre,
      </span></i><span data-dcnode-id="2637" instrument_node="">
       which commemorated Italian unification), and in the erection of statues
      of such Italian heroes as Columbus, the poet Dante, and military leader
      Giuseppe Garibaldi.
    </span></p><span data-dcnode-id="2635" instrument_node="">
</span><p data-dcnode-id="2624"><span data-dcnode-id="2634" instrument_node="">
      These activities were challenged by a variety of leftist radicals (
      </span><i data-dcnode-id="2632"><span data-dcnode-id="2633" instrument_node="">
        sovversivi
      </span></i><span data-dcnode-id="2631" instrument_node="">
      ), who sought very different cultural and political goals. Anarchists,
      socialists, and syndicalists such as Carlo Tresca and Arturo Giovannitti
      considered Italian Americans as part of the world proletariat and
      celebrated holidays (
      </span><i data-dcnode-id="2629"><span data-dcnode-id="2630" instrument_node="">
        Primo Maggio
      </span></i><span data-dcnode-id="2628" instrument_node="">
      —May Day) and heroes (Gaetano Bresci, the assassin of Italian King
      Umberto) reflecting this image. These symbols also played roles in mass
      strikes and worker demonstrations led by the radicals. Meanwhile, the
      majority of Italian Americans continued to draw much of their identity
      from the peasant cultures of the old-world 
      </span><i data-dcnode-id="2626"><span data-dcnode-id="2627" instrument_node="">
        paese.
      </span></i><span data-dcnode-id="2625" instrument_node="">
       Columbus Day, the preeminent Italian American ethnic celebration,
      typically blended elements of all these components, with multiple parades
      and competing banquets, balls, and public presentations.
    </span></p><span data-dcnode-id="2623" instrument_node="">
</span><p data-dcnode-id="2621"><span data-dcnode-id="2622" instrument_node="">
      World War I proved an ambiguous interlude for Italian immigrants.
      Italy's alliance with the United States and the service of many
      immigrants in the U.S. military precipitated some level of American
      acceptance. The war also produced, however, countervailing pressures that
      generated more intense nationalism among Italians and powerful drives
      toward assimilation—"100 percent
      Americanism"—in the wider society. Immigration restrictions
      after 1924 halted Italian immigration, although the foreign-born presence
      remained strong (the 1930 census recorded 1,623,000 Italian-born
      residents— the group's historic high). As new arrivals
      slowed and the second generation matured during the 1920s and 1930s, the
      group changed.
    </span></p><span data-dcnode-id="2620" instrument_node="">
</span><p data-dcnode-id="2618"><span data-dcnode-id="2619" instrument_node="">
      Several critical developments shaped the character of Italian America
      during the interwar years. National prohibition provided lucrative illegal
      markets, which some Italian Americans successfully exploited through
      bootlegging operations. During the 1920s, the "gangster"
      image of Italians (exemplified by Al Capone) was perpetuated through films
      and popular literature. The celebrated case of Nicola Sacco and Bartolomeo
      Vanzetti further molded the group's national image, underwriting
      the conception of Italians as dangerous radicals.
    </span></p><span data-dcnode-id="2617" instrument_node="">
</span><p data-dcnode-id="2612"><span data-dcnode-id="2616" instrument_node="">
      The Great Depression overshadowed earlier economic gains, often forcing
      Italian Americans back into their family-centered ethnic communities.
      Here, the emerging second generation found itself in frequent conflict
      with the first. Heavily influenced by the traditional 
      </span><i data-dcnode-id="2614"><span data-dcnode-id="2615" instrument_node="">
         contadino
      </span></i><span data-dcnode-id="2613" instrument_node="">
       culture passed on from their parents, the second generation uneasily
      straddled two worlds. Traditional notions of proper behavior, stressing
      collective responsibilities toward the family, strict chastity and
      domestic roles for females, rigid chaperonage and courting codes, and male
      dominance, clashed with the more individualist, consumer-driven American
      values children learned in schools, stores, and on the streets. Problems
      of marginality, lack of self-esteem, rebellion, and delinquency were the
      outcomes.
    </span></p><span data-dcnode-id="2611" instrument_node="">
</span><p data-dcnode-id="2600"><span data-dcnode-id="2610" instrument_node="">
      Partly because of these dynamics, the community structures of Little
      Italies began to change. The more Americanized second generation began to
      turn away from older, Italian-language institutions founded by immigrants,
      many of which collapsed during the depression. Italian theaters and music
      halls, for example, largely gave way to vaudeville, nickelodeons,
      organized sports, and radio programming. During the 1920s and 1930s, these
      transformations were also influenced by Benito Mussolini's 
       fascist regime, which sponsored propaganda campaigns designed to attract
      the support of Italian Americans. The 
      </span><i data-dcnode-id="2608"><span data-dcnode-id="2609" instrument_node="">
         prominenti
      </span></i><span data-dcnode-id="2607" instrument_node="">
       generally supported these initiatives, often inserting fascist symbols
      (the black shirt), songs ("Giovinezza"—the fascist
      anthem), and holidays (the anniversary of the March on Rome) into the
      ichnography and pageantry of America's Little Italies. A small, but
      vocal, anti-fascist element existed in opposition, and it substituted
      counter values and emblems. Memorials to Giacomo Matteotti, a socialist
      deputy murdered by fascists, and renditions of 
      </span><i data-dcnode-id="2605"><span data-dcnode-id="2606" instrument_node="">
         Bandiera Rossa
      </span></i><span data-dcnode-id="2604" instrument_node="">
       and 
      </span><i data-dcnode-id="2602"><span data-dcnode-id="2603" instrument_node="">
        Inno di Garibaldi
      </span></i><span data-dcnode-id="2601" instrument_node="">
       became fixtures of anti-fascist festivities. Thus, the cultural world of
      Italian America remained divided.
    </span></p><span data-dcnode-id="2599" instrument_node="">
</span><p data-dcnode-id="2597"><span data-dcnode-id="2598" instrument_node="">
      Any questions concerning loyalties to the United States were firmly
      answered when Italy declared war on the United States in 1941, and Italian
      Americans rushed to aid the American struggle against the Axis powers.
      More than 500,000 Italian Americans joined the U.S. military, serving in
      all theaters, including the Italian campaign. The war effort and ensuing
      anti-communist crusade stressed conformity, loyalty, and patriotism, and
      in the 1940s and 1950s it appeared that Italian Americans had comfortably
      settled into the melting pot. The second generation especially benefited
      from its war service and the postwar economic expansion as it yielded new
      levels of acceptance and integration. In the 1950s, they experienced
      substantial social mobility and embraced mass consumerism and middle-class
      values.
    </span></p><span data-dcnode-id="2596" instrument_node="">
</span><p data-dcnode-id="2594"><span data-dcnode-id="2595" instrument_node="">
      Since the end of World War II, more than 600,000 Italian immigrants have
      arrived in the United States. A large percentage came shortly after
      passage of the Immigration Act of 1965, at which time yearly totals of
      Italian immigrants averaged about 23,000. Beginning in 1974, the numbers
      steadily declined as a result of improved economic conditions in Italy and
      changing policies in other immigrant-receiving nations. In 1990 only 3,300
      Italian immigrants were admitted to the United States, but 831,922
      Italian-born residents remained in the country, guaranteeing that Italian
      language and culture are still part of the American cultural mosaic.
    </span></p><span data-dcnode-id="2593" instrument_node="">
</span></div><span data-dcnode-id="2591" instrument_node="">
</span><div class="article_container" data-dcnode-id="2541"><span data-dcnode-id="2590" instrument_node="">
</span><h2 data-dcnode-id="2588"><span data-dcnode-id="2589" instrument_node="">
      Acculturation and Assimilation
    </span></h2><span data-dcnode-id="2587" instrument_node="">
</span><p data-dcnode-id="2576"><span data-dcnode-id="2586" instrument_node="">
      Assimilation takes place at many different levels, but for the individual,
      it is likely that few captured the essence of the experience better than
      Rosa Cavalleri. Cavalleri came from the Italian town of Cuggiono in 1884
      as a frightened young woman, joining her husband in a mining camp in
      remote Missouri. After undergoing numerous tribulations, Cavalleri settled
      in Chicago, where she cleaned floors and bathrooms, while remarrying and
      successfully raising a family. As Cavalleri neared death in 1943, she
      mused: "Only one wish more I have: I'd love to go in 
      </span><i data-dcnode-id="2584"><span data-dcnode-id="2585" instrument_node="">
        Italia
      </span></i><span data-dcnode-id="2583" instrument_node="">
       again before I die. Now I speak English good like an American I could go
      anywhere—where millionaires go and high people. I would look the
      high people in the face and ask them questions I'd like to know. I
      wouldn't be afraid now—not of anybody. I'd be proud I
      come from America and speak English. I would go to Bugiarno [Cuggiono] and
      see the people and talk to the bosses in the silk factory.... I could talk
      to the 
      </span><i data-dcnode-id="2581"><span data-dcnode-id="2582" instrument_node="">
        Superiora
      </span></i><span data-dcnode-id="2580" instrument_node="">
       now. I'd tell her, `Why you were so mean—you threw me out
      that poor girl whose heart was so kind toward you? You think you'll
      go to heaven like that?' I'd scold them like that now. I
      wouldn't be afraid. They wouldn't hurt me now I come from
      America. Me, that's why I love America. That's what I
      learned in America: not to be afraid." (Marie Hall Ets, 
      </span><i data-dcnode-id="2578"><span data-dcnode-id="2579" instrument_node="">
        Rosa: The Life of an Italian Immigrant.
      </span></i><span data-dcnode-id="2577" instrument_node="">
       Minneapolis: University of Minnesota Press, 1970; p. 254.)
    </span></p><span data-dcnode-id="2575" instrument_node="">
</span><p data-dcnode-id="2573"><span data-dcnode-id="2574" instrument_node="">
      The integration of Italians like Cavalleri into American life was a result
      of changes in both the group and the larger society. Italians were
      beginning to make a commitment to permanent settlement. This process was
      substantially underway by 1910, cresting in the 1920s when new immigration
      fell off. After this, perpetuation of the old-world public culture became
      increasingly difficult, although the family-based value structure was more
      resilient. During the 1920s and 1930s, the second generation continued to
      display many of its hallmarks: children of immigrants still held largely
      blue-collar occupations and were underrepresented in schools, tied to
      Little Italy residences, and attracted to in-group
      marriages—choices that demonstrated the continuing power of
      parental mores.
    </span></p><span data-dcnode-id="2572" instrument_node="">
</span><p data-dcnode-id="2570"><span data-dcnode-id="2571" instrument_node="">
      Changing contexts, however, diminished the "social distance"
      separating Italians from other Americans. In the 1930s, second-generation
      Italian Americans joined forces with others in labor unions and lobbied
      for benefits. They also began to make political gains as part of the
      Democratic Party's New Deal coalition. Also for the first time, the
      national popular culture began to include Italian Americans among its
      heroes. In music, sports, politics, and cinema the careers of Frank
      Sinatra, Joe DiMaggio, Fiorello LaGuardia, Frank Capra, and Don Ameche
      suggested that national attitudes toward Italians were in transition.
    </span></p><span data-dcnode-id="2569" instrument_node="">
</span><p data-dcnode-id="2564"><span data-dcnode-id="2568" instrument_node="">
      World War II was a critical benchmark in the acceptance of Italian
      Americans. Their wholehearted 
       support of America's cause and their disproportionately high ratio
      of service in the military legitimized them in American eyes. The war also
      transformed many Little Italies, as men and women left for military
      service or to work in war industries. Upon their return, many newly
      affluent Italian Americans left for suburban locations and fresh
      opportunities, further eroding the institutions and 
      </span><i data-dcnode-id="2566"><span data-dcnode-id="2567" instrument_node="">
        contadino
      </span></i><span data-dcnode-id="2565" instrument_node="">
       culture that once thrived in ethnic settlements.
    </span></p><span data-dcnode-id="2563" instrument_node="">
</span><p data-dcnode-id="2561"><span data-dcnode-id="2562" instrument_node="">
      The Cold War pushed the group further into the mainstream as Italian
      Americans joined in the anti-communist fervor gripping the nation.
      Simultaneously, structural changes in the economy vastly expanded the
      availability of white collar, managerial positions, and Italian Americans
      jumped to take advantage. Beginning in the 1950s, they pursued higher
      education in greater numbers than ever before, many receiving aid as a
      result of the G.I. Bill. Such developments put them into more immediate
      and positive contact with other Americans, who exhibited greater
      acceptance in the postwar years.
    </span></p><span data-dcnode-id="2560" instrument_node="">
</span><p data-dcnode-id="2555"><span data-dcnode-id="2559" instrument_node="">
      Ironically, a resurgent Italian American ethnicity emerged at the same
      time, as the group experienced increasing integration into the larger
      society. Italian Americans were active participants in the ethnic revival
      of the 1960s and 1970s. As American core values came under assault in the
      midst of Vietnam, Watergate, and the rising counterculture, and the
      nation's urban centers became torn by riots and civil protest,
      Italian Americans felt especially vulnerable and besieged. Unlike other
      ethnic groups, they had remained in urban enclaves, manifesting high rates
      of home owner-ship, where they now found themselves in contact and
      conflict with African Americans. Many interpreted the ensuing clashes in
      cultural terms, seeing themselves as an embattled minority defending
      traditional values in the face of new compensatory government programs. In
      response, ethnic traditions surrounding family, neighborhood, and homes
      gained heightened visibility and strength. New Italian American
      organizations and publications fostering ethnic identity came into being,
      and many old rituals experienced a resurgence, most notably the
      celebration of the 
      </span><i data-dcnode-id="2557"><span data-dcnode-id="2558" instrument_node="">
        feste.
      </span></i><span data-dcnode-id="2556" instrument_node="">
</span></p><span data-dcnode-id="2554" instrument_node="">
</span><p data-dcnode-id="2552"><span data-dcnode-id="2553" instrument_node="">
      Intermarriage rates increased after the 1950s, especially among the third
      and fourth generations who were now coming of age. By 1991, the
      group's overall in-marriage rate was just under 33 percent, above
      the average of 26 percent for other ethnic groups. But among those born
      after 1940—by now a majority—the rate was only 20 percent,
      and these marriages crossed both ethnic and religious lines. Once a
      marginalized, despised minority, Italian Americans are now among the most
      highly accepted groups according to national surveys measuring
      "social distance" indicators (Italians ranked fourteenth in
      1926, but fifth in 1977). All of the statistical data point to a high
      level of structural assimilation in American society, although Italian
      American ethnicity has not disappeared.
    </span></p><span data-dcnode-id="2551" instrument_node="">
</span><p data-dcnode-id="2549"><span data-dcnode-id="2550" instrument_node="">
      That Italian American identity has lost much of its former negative weight
      is suggested further by recent census figures for ancestry group claiming.
      The 1980 census recorded 12.1 million individuals who claimed Italian
      ancestry (5.4 percent of national population). By 1990 this figure had
      risen to 14.7 million (5.9 percent), indicating that ethnicity remains an
      important and acceptable component of self-identification for substantial
      numbers of Italian Americans.
    </span></p><span data-dcnode-id="2548" instrument_node="">
</span><p data-dcnode-id="2546"><span data-dcnode-id="2547" instrument_node="">
      Despite strong evidence of integration, Italian Americans retain
      distinguishing characteristics. They are still geographically concentrated
      in the old settlement areas, and they display a pronounced attachment to
      the values of domesticity and family loyalty. Italian Americans still rely
      heavily on personal and kin networks in residential choices, visiting
      patterns, and general social interaction. Perhaps most distinctive, the
      group continues to suffer from stereotypes associating it with criminal
      behavior, especially in the form of organized crime and the mafia. These
      images have persisted despite research documenting that Italian Americans
      possess crime rates no higher than other segments of American society and
      that organized crime is a multi-ethnic enterprise. Television and film
      images of Italian Americans continue to emphasize criminals,
      "lovable or laughable dimwits" who engage in dead-end jobs,
      and heavy-accented, obese "Mamas" with their pasta pots.
    </span></p><span data-dcnode-id="2545" instrument_node="">
</span><p data-dcnode-id="2543"><span data-dcnode-id="2544" instrument_node="">
      These representations have influenced the movement of Italian Americans
      into the highest levels of corporate and political life. The innuendos of
      criminal ties advanced during Geraldine Ferraro's candidacy for
      vice-president in 1984 and during Mario Cuomo's aborted
      presidential bids illustrate the political repercussions of these
      stereotypes, and many Italian Americans believe that bias has kept them
      underrepresented in the top echelons of the business world. Since the
      1970s, such organizations as the Americans of Italian Descent, the Sons of
      Italy in America, and the National Italian American Foundation have
      mounted broad-based anti-defamation campaigns protesting such negative
      imagery.
    </span></p><span data-dcnode-id="2542" instrument_node="">
</span></div><span data-dcnode-id="2540" instrument_node="">
</span><div class="article_container" data-dcnode-id="2496"><span data-dcnode-id="2539" instrument_node="">
</span><h3 data-dcnode-id="2537"><span data-dcnode-id="2538" instrument_node="">
      HOLIDAYS
    </span></h3><span data-dcnode-id="2536" instrument_node="">
</span><p data-dcnode-id="2519"><span data-dcnode-id="2535" instrument_node="">
      The major national holidays of Italy—
      </span><i data-dcnode-id="2533"><span data-dcnode-id="2534" instrument_node="">
        Festa della Republica
      </span></i><span data-dcnode-id="2532" instrument_node="">
       (June 5), 
      </span><i data-dcnode-id="2530"><span data-dcnode-id="2531" instrument_node="">
         Festa dell'Unità Nazionale 
      </span></i><span data-dcnode-id="2529" instrument_node="">
      (November 6), and 
      </span><i data-dcnode-id="2527"><span data-dcnode-id="2528" instrument_node="">
        Festa del Lavoro
      </span></i><span data-dcnode-id="2526" instrument_node="">
       (May 1)—are 
       no longer occasions of public celebration among Italian Americans. Some
      religious holidays, such as 
      </span><i data-dcnode-id="2524"><span data-dcnode-id="2525" instrument_node="">
        Epifania di Gesù
      </span></i><span data-dcnode-id="2523" instrument_node="">
       (January 6), receive only passing notice. Most Italian Americans
      celebrate Christmas Day, New Year's Day, and Easter Day, but
      usually without any particular ethnic character. The principal occasions
      of public celebration typically revolve around Columbus Day, the
      quintessential Italian American national holiday, and the 
      </span><i data-dcnode-id="2521"><span data-dcnode-id="2522" instrument_node="">
        feste
      </span></i><span data-dcnode-id="2520" instrument_node="">
       honoring patron saints. In both cases, these events have, in general,
      become multi-day celebrations virtually devoid of any religious or Italian
      national connotation, involving numerous non-Italians.
    </span></p><span data-dcnode-id="2518" instrument_node="">
</span><p data-dcnode-id="2513"><span data-dcnode-id="2517" instrument_node="">
      In New Orleans, Louisiana, St. Joseph's Day (March 19) is
      celebrated by some members of the Italian-American community. The
      tradition began in Sicily, the origin of much of New Orleans'
      Italian-American population. The day was commemorated by the building of
      temporary three-tiered alters, loaded with food offerings for the saint.
      The alters were found in private homes, churches, some restaurants, and
      public places associated with Italians, with the general public invited.
      Visitors to the alters are often given 
      </span><i data-dcnode-id="2515"><span data-dcnode-id="2516" instrument_node="">
         lagniappe
      </span></i><span data-dcnode-id="2514" instrument_node="">
       (a sack of cookies and fava beans, a good luck charm) to take home.
    </span></p><span data-dcnode-id="2512" instrument_node="">
</span><p data-dcnode-id="2504"><span data-dcnode-id="2511" instrument_node="">
      Preparations for St. Joseph's Day began several weeks in advance
      with baking of cookies, breads and cakes. Cookies, such as twice-baked
      biscotti and sesame-seed varieties, could be shaped into forms with
      religious significance. Bread, cannoli, seafood and vegetable dishes are
      also found on the alter. Such dishes include 
      </span><i data-dcnode-id="2509"><span data-dcnode-id="2510" instrument_node="">
         forschias
      </span></i><span data-dcnode-id="2508" instrument_node="">
       and pasta Milanese covered with 
      </span><i data-dcnode-id="2506"><span data-dcnode-id="2507" instrument_node="">
         mudriga.
      </span></i><span data-dcnode-id="2505" instrument_node="">
       Mudriga was also called St. Joseph's sawdust, made of bread crumbs
      and sugar. No meat was found because the holiday almost always falls
      during Lent. In addition to food, the alter often had an image of St.
      Joseph, home grown flowers, candles and palm branches.
    </span></p><span data-dcnode-id="2503" instrument_node="">
</span><p data-dcnode-id="2498"><span data-dcnode-id="2502" instrument_node="">
      Italian immigrants utilized traditional costumes, folk songs, folklore,
      and dances for special events, but like many aspects of Italian life, they
      were so regionally specific that they defy easy characterization. Perhaps
      the most commonly recognized folk dance, the 
      </span><i data-dcnode-id="2500"><span data-dcnode-id="2501" instrument_node="">
         tarantella,
      </span></i><span data-dcnode-id="2499" instrument_node="">
       for example, is Neapolitan, with little diffusion elsewhere in the
      peninsula.
    </span></p><span data-dcnode-id="2497" instrument_node="">
</span></div><span data-dcnode-id="2495" instrument_node="">
</span><div class="article_container" data-dcnode-id="2442"><span data-dcnode-id="2494" instrument_node="">
</span><h3 data-dcnode-id="2492"><span data-dcnode-id="2493" instrument_node="">
      CUISINE
    </span></h3><span data-dcnode-id="2491" instrument_node="">
</span><p data-dcnode-id="2477"><span data-dcnode-id="2490" instrument_node="">
      The difficult conditions of daily life in Italy dictated frugal eating
      habits. Most peasants consumed simple meals based on whatever vegetables
      or grains (lentils, peas, fava beans, corn, tomatoes, onions, and wild
      greens) were prevalent in each region. A staple for most common folk was
      coarse black bread. Pasta was a luxury, and peasants typically ate meat
      only two or three times a year on special holidays. Italian cuisine
      was—and still is—regionally distinctive, and even festive
      meals varied widely. The traditional Christmas dish in Piedmont was 
      </span><i data-dcnode-id="2488"><span data-dcnode-id="2489" instrument_node="">
         agnolotti 
      </span></i><span data-dcnode-id="2487" instrument_node="">
      (ravioli), while 
      </span><i data-dcnode-id="2485"><span data-dcnode-id="2486" instrument_node="">
        anguille
      </span></i><span data-dcnode-id="2484" instrument_node="">
       (eels) were served in Campania, 
      </span><i data-dcnode-id="2482"><span data-dcnode-id="2483" instrument_node="">
         sopa friulana
      </span></i><span data-dcnode-id="2481" instrument_node="">
       (celery soup) in Friuli, and 
      </span><i data-dcnode-id="2479"><span data-dcnode-id="2480" instrument_node="">
        bovoloni
      </span></i><span data-dcnode-id="2478" instrument_node="">
       (fat snails) in Vicenza.
    </span></p><span data-dcnode-id="2476" instrument_node="">
</span><p data-dcnode-id="2468"><span data-dcnode-id="2475" instrument_node="">
      In the United States, many immigrants planted small backyard garden plots
      to supplement the table and continued to raise cows, chickens, and goats
      whenever possible. Outdoor brick ovens were commonplace, serving as clear
      ethnic markers of Italian residences. With improved economic conditions,
      pastas, meats, sugar, and coffee were consumed more frequently. One New
      York City immigrant remembered asking, "Who could afford to eat
      spaghetti more than once a week [in Italy]? In America no one starved,
      though a family earned no more than five or six dollars a week....
      Don't you remember how our 
      </span><i data-dcnode-id="2473"><span data-dcnode-id="2474" instrument_node="">
        paesani
      </span></i><span data-dcnode-id="2472" instrument_node="">
       here in America ate to their hearts delight till they were belching like
      pigs, and how they dumped mountains of uneaten food out the window? We
      were not poor in America; we just had a little less than others."
      (Leonard Covello, 
      </span><i data-dcnode-id="2470"><span data-dcnode-id="2471" instrument_node="">
        The Social Background of the Italo-American School Child.
      </span></i><span data-dcnode-id="2469" instrument_node="">
       Totowa, New Jersey: Rowman and Littlefield, 1972; p. 295.)
    </span></p><span data-dcnode-id="2467" instrument_node="">
</span><p data-dcnode-id="2444"><span data-dcnode-id="2466" instrument_node="">
      "Italian cooking" in the United States has come to mean
      southern-Italian, especially Neapolitan, cuisine, which is rich in tomato
      sauces, heavily spiced, and pasta-based. Spaghetti and meatballs (not
      generally known in Italy) and pizza are perhaps the quintessential Italian
      dishes in the United States. More recently, northern Italian
      cooking— characterized by rice (
      </span><i data-dcnode-id="2464"><span data-dcnode-id="2465" instrument_node="">
        risotto
      </span></i><span data-dcnode-id="2463" instrument_node="">
      ) and corn (
      </span><i data-dcnode-id="2461"><span data-dcnode-id="2462" instrument_node="">
        polenta
      </span></i><span data-dcnode-id="2460" instrument_node="">
      ) dishes and butter-based recipes—has become increasingly common in
      homes and restaurants. Garlic (
      </span><i data-dcnode-id="2458"><span data-dcnode-id="2459" instrument_node="">
        aglio
      </span></i><span data-dcnode-id="2457" instrument_node="">
      ), olive oil (
      </span><i data-dcnode-id="2455"><span data-dcnode-id="2456" instrument_node="">
        olio d'oliva
      </span></i><span data-dcnode-id="2454" instrument_node="">
      ), mushrooms (
      </span><i data-dcnode-id="2452"><span data-dcnode-id="2453" instrument_node="">
        funghi
      </span></i><span data-dcnode-id="2451" instrument_node="">
      ), and nuts (
      </span><i data-dcnode-id="2449"><span data-dcnode-id="2450" instrument_node="">
        nochi
      </span></i><span data-dcnode-id="2448" instrument_node="">
      ) of various types are common ingredients found in Italian cooking. Wine (
      </span><i data-dcnode-id="2446"><span data-dcnode-id="2447" instrument_node="">
        vino
      </span></i><span data-dcnode-id="2445" instrument_node="">
      ), consumed in moderate amounts, is a staple. Overall, Italian dishes have
      become so popular that they have been accepted into the nation's
      dietary repertoire, but not in strictly old-world forms. Americanized
      dishes are generally milder in their spicing and more standardized than
      old-world fare.
    </span></p><span data-dcnode-id="2443" instrument_node="">
</span></div><span data-dcnode-id="2441" instrument_node="">
</span><div class="article_container" data-dcnode-id="2433"><span data-dcnode-id="2440" instrument_node="">
</span><h3 data-dcnode-id="2438"><span data-dcnode-id="2439" instrument_node="">
      HEALTH ISSUES
    </span></h3><span data-dcnode-id="2437" instrument_node="">
</span><p data-dcnode-id="2435"><span data-dcnode-id="2436" instrument_node="">
      A number of Italian American organizations have supported the
      Cooley's Anemia Foundation to fund research into Thalassemia, once
      thought to be a sickle cell anemia confined to persons of Mediterranean
      ancestry. Recent research has demonstrated 
       the fallacy of this belief, however, and contributions have largely
      ceased.
    </span></p><span data-dcnode-id="2434" instrument_node="">
</span></div><span data-dcnode-id="2432" instrument_node="">
</span><div class="article_container" data-dcnode-id="2340"><span data-dcnode-id="2431" instrument_node="">
</span><h2 data-dcnode-id="2429"><span data-dcnode-id="2430" instrument_node="">
      Language
    </span></h2><span data-dcnode-id="2428" instrument_node="">
</span><p data-dcnode-id="2426"><span data-dcnode-id="2427" instrument_node="">
      Italian is a Romance language derived directly from Latin; it utilizes the
      Latin alphabet, but the letters "j," "k,"
      "w," "x," and "y" are found only
      in words of foreign origin. "Standard" Italian—based
      on the Tuscan dialect—is a relatively recent invention, and was not
      used universally until well into the twentieth century. Numerous dialects
      were the dominant linguistic feature during the years of mass immigration.
    </span></p><span data-dcnode-id="2425" instrument_node="">
</span><p data-dcnode-id="2387"><span data-dcnode-id="2424" instrument_node="">
      Italian dialects did not simply possess different tonalities or
      inflections. Some were languages in their own right, with separate
      vocabularies and, for a few, fully developed literatures (e.g., Venetian,
      Piedmontese, and Sicilian). Italy's mountainous terrain produced
      conditions in which proximate areas often possessed mutually
      unintelligible languages. For example, the word for "today"
      in standard Italian is 
      </span><i data-dcnode-id="2422"><span data-dcnode-id="2423" instrument_node="">
        oggi,
      </span></i><span data-dcnode-id="2421" instrument_node="">
       but 
      </span><i data-dcnode-id="2419"><span data-dcnode-id="2420" instrument_node="">
        ancheuj
      </span></i><span data-dcnode-id="2418" instrument_node="">
       in Piedmontese, 
      </span><i data-dcnode-id="2416"><span data-dcnode-id="2417" instrument_node="">
        uncuó
      </span></i><span data-dcnode-id="2415" instrument_node="">
       in Venetian, 
      </span><i data-dcnode-id="2413"><span data-dcnode-id="2414" instrument_node="">
        ste iorne
      </span></i><span data-dcnode-id="2412" instrument_node="">
       in Sicilian, and 
      </span><i data-dcnode-id="2410"><span data-dcnode-id="2411" instrument_node="">
        oji
      </span></i><span data-dcnode-id="2409" instrument_node="">
       in Calabrian. Similarly, "children" in Italian is 
      </span><i data-dcnode-id="2407"><span data-dcnode-id="2408" instrument_node="">
        bambini,
      </span></i><span data-dcnode-id="2406" instrument_node="">
       but it becomes 
      </span><i data-dcnode-id="2404"><span data-dcnode-id="2405" instrument_node="">
        cit
      </span></i><span data-dcnode-id="2403" instrument_node="">
       in Piedomontese, 
      </span><i data-dcnode-id="2401"><span data-dcnode-id="2402" instrument_node="">
        fruz
      </span></i><span data-dcnode-id="2400" instrument_node="">
       in Friulian, 
      </span><i data-dcnode-id="2398"><span data-dcnode-id="2399" instrument_node="">
        guagliuni
      </span></i><span data-dcnode-id="2397" instrument_node="">
       in Neapolitan, 
      </span><i data-dcnode-id="2395"><span data-dcnode-id="2396" instrument_node="">
         zitedi
      </span></i><span data-dcnode-id="2394" instrument_node="">
       in Calabrian, and 
      </span><i data-dcnode-id="2392"><span data-dcnode-id="2393" instrument_node="">
         picciriddi
      </span></i><span data-dcnode-id="2391" instrument_node="">
       in Sicilian. Thus, language facilitated 
      </span><i data-dcnode-id="2389"><span data-dcnode-id="2390" instrument_node="">
        campanilismo,
      </span></i><span data-dcnode-id="2388" instrument_node="">
       further fragmenting the emerging Italian American world.
    </span></p><span data-dcnode-id="2386" instrument_node="">
</span><p data-dcnode-id="2345"><span data-dcnode-id="2385" instrument_node="">
      Very soon after the Italians' arrival, all dialects became infused
      with Americanisms, quickly creating a new form of communication often
      intelligible only to immigrants. The new patois was neither Italian nor
      English, and it included such words as 
      </span><i data-dcnode-id="2383"><span data-dcnode-id="2384" instrument_node="">
        giobba
      </span></i><span data-dcnode-id="2382" instrument_node="">
       for job, 
      </span><i data-dcnode-id="2380"><span data-dcnode-id="2381" instrument_node="">
         grossiera
      </span></i><span data-dcnode-id="2379" instrument_node="">
       for grocery, 
      </span><i data-dcnode-id="2377"><span data-dcnode-id="2378" instrument_node="">
         bosso
      </span></i><span data-dcnode-id="2376" instrument_node="">
       for boss, 
      </span><i data-dcnode-id="2374"><span data-dcnode-id="2375" instrument_node="">
        marachetta
      </span></i><span data-dcnode-id="2373" instrument_node="">
       for market, 
      </span><i data-dcnode-id="2371"><span data-dcnode-id="2372" instrument_node="">
        baccausa
      </span></i><span data-dcnode-id="2370" instrument_node="">
       for outhouse, 
      </span><i data-dcnode-id="2368"><span data-dcnode-id="2369" instrument_node="">
        ticchetto
      </span></i><span data-dcnode-id="2367" instrument_node="">
       for ticket, 
      </span><i data-dcnode-id="2365"><span data-dcnode-id="2366" instrument_node="">
         bisiniss
      </span></i><span data-dcnode-id="2364" instrument_node="">
       for business, 
      </span><i data-dcnode-id="2362"><span data-dcnode-id="2363" instrument_node="">
         trocco
      </span></i><span data-dcnode-id="2361" instrument_node="">
       for truck, 
      </span><i data-dcnode-id="2359"><span data-dcnode-id="2360" instrument_node="">
        sciabola
      </span></i><span data-dcnode-id="2358" instrument_node="">
       for shovel, 
      </span><i data-dcnode-id="2356"><span data-dcnode-id="2357" instrument_node="">
        loffare
      </span></i><span data-dcnode-id="2355" instrument_node="">
       for the verb to loaf, and 
      </span><i data-dcnode-id="2353"><span data-dcnode-id="2354" instrument_node="">
        carpetto
      </span></i><span data-dcnode-id="2352" instrument_node="">
       for carpet. Angelo Massari, who immigrated to Tampa, Florida, in 1902,
      described preparations in his Sicilian village prior to leaving it:
      "I used to interview people who had returned from America. I asked
      them thousands of questions, how America was, what they did in Tampa, what
      kind of work was to be had.... One of them told me the language was
      English, and I asked him how to say one word or another in that language.
      I got these wonderful samples of a Sicilian-American English from him: 
      </span><i data-dcnode-id="2350"><span data-dcnode-id="2351" instrument_node="">
        tu sei un boia, gud morni, olraiti, giachese, misti, sciusi, bred,
        iessi, bud
      </span></i><span data-dcnode-id="2349" instrument_node="">
       [you are a boy, good morning, alright, jacket, mister, excuse me, bread,
      yes, but]. He told me also that in order to ask for work, one had to say,
      `Se misti gari giobbi fo mi?' [Say, mister got a job for
      me?]." (Angelo Massari, 
      </span><i data-dcnode-id="2347"><span data-dcnode-id="2348" instrument_node="">
        The Wonderful Life of Angelo Massari,
      </span></i><span data-dcnode-id="2346" instrument_node="">
       translated by Arthur Massolo. New York: Exposition Press, 1965; pp.
      46-47.)
    </span></p><span data-dcnode-id="2344" instrument_node="">
</span><p data-dcnode-id="2342"><span data-dcnode-id="2343" instrument_node="">
      Italian proverbs tend to reflect the conditions of peasant and immigrant
      lives: Work hard, work always, and you will never know hunger; He who
      leaves the old way for the new knows what he loses but knows not what he
      will find; Buy oxen and marry women from your village only; The wolf
      changes his skin but not his vice; The village is all the world; Do not
      miss the Saint's day, he helps you and provides at all times; Tell
      me who your friends are and I will tell you what you are; He who respects
      others will be respected.
    </span></p><span data-dcnode-id="2341" instrument_node="">
</span></div><span data-dcnode-id="2339" instrument_node="">
</span><div class="article_container" data-dcnode-id="2319"><span data-dcnode-id="2338" instrument_node="">
</span><h2 data-dcnode-id="2336"><span data-dcnode-id="2337" instrument_node="">
      Family and Community Dynamics
    </span></h2><span data-dcnode-id="2335" instrument_node="">
</span><p data-dcnode-id="2330"><span data-dcnode-id="2334" instrument_node="">
      The family (
      </span><i data-dcnode-id="2332"><span data-dcnode-id="2333" instrument_node="">
        la famiglia
      </span></i><span data-dcnode-id="2331" instrument_node="">
      ) rested at the heart of Italian society. Family solidarity was the major
      bulwark from which the rural population confronted a harsh society, and
      the family unit (including blood relatives and relatives by marriage)
      became the center of allegiances. Economically and socially, the family
      functioned as a collective enterprise, an "all-inclusive social
      world" in which the individual was subordinated to the larger
      entity. Parents expected children to assist them at an early age by
      providing gainful labor, and family values stressed respect for the
      elderly, obedience to parents, hard work, and deference to authority.
    </span></p><span data-dcnode-id="2329" instrument_node="">
</span><p data-dcnode-id="2327"><span data-dcnode-id="2328" instrument_node="">
      The traditional Italian family was "father-headed, but
      mother-centered." In public, the father was the uncontested
      authority figure and wives were expected to defer to their husbands. At
      home, however, females exercised considerable authority as wives and
      mothers, and played central roles in sustaining familial networks. Still,
      male children occupied a favored position of superiority over females, and
      strong family mores governed female behavior. Women's activities
      were largely confined to the home, and strict rules limited their public
      behavior, including access to education and outside employment. Formal
      rituals of courting, chaperonage, and arranged marriages strictly governed
      relations between the sexes. Above all, protection of female chastity was
      critical to maintaining family honor.
    </span></p><span data-dcnode-id="2326" instrument_node="">
</span><p data-dcnode-id="2324"><span data-dcnode-id="2325" instrument_node="">
      Family and kin networks also guided migration patterns, directing precise
      village flows to specific destinations. During sojourner migrations, the
      work of women in home villages sustained the family well-being in Italy
      and allowed male workers to actively compete in the world labor market. In
      America, the extended family became an important network for relatives to
      seek and receive assistance. Thus, migration and settlement operated
      within a context of family considerations.
    </span></p><span data-dcnode-id="2323" instrument_node="">
</span><p data-dcnode-id="2321"><span data-dcnode-id="2322" instrument_node="">
      Attempts to transfer traditional family customs to America engendered
      considerable tension between generations. More educated and Americanized
      children ventured to bridge two worlds in which the individualist notions
      of American society often clashed with their parents'
      family-centered ethos. Still, strong patterns of in-marriage characterized
      the second generation, and many of their parents' cultural values
      were successfully inculcated. These carryovers resulted in a strong
      attachment to neighborhoods and families, consistent deference to
      authority, and blue-collar work choices. The second generation, however,
      began to adopt American practices in terms of family life (seen, for
      example, in smaller family size and English language usage), and the
      collective nature of the unit began to break down as the generations
      advanced.
    </span></p><span data-dcnode-id="2320" instrument_node="">
</span></div><span data-dcnode-id="2318" instrument_node="">
</span><div class="article_container" data-dcnode-id="2295"><span data-dcnode-id="2317" instrument_node="">
</span><h3 data-dcnode-id="2315"><span data-dcnode-id="2316" instrument_node="">
      EDUCATION
    </span></h3><span data-dcnode-id="2314" instrument_node="">
</span><p data-dcnode-id="2309"><span data-dcnode-id="2313" instrument_node="">
      The peasant culture placed little value on formal instruction, seeking
      instead to have children contribute as soon as possible to family
      earnings. From the peasant perspective, education consisted primarily of
      passing along moral and social values through parental instruction (the
      term 
      </span><i data-dcnode-id="2311"><span data-dcnode-id="2312" instrument_node="">
        buon educato 
      </span></i><span data-dcnode-id="2310" instrument_node="">
      means "well-raised or behaved"). In southern Italy, formal
      education was seldom a means of upward mobility since public schools were
      not institutions of the people. They were poorly organized and supported,
      administered by a distrusted northern bureaucracy, and perceived as alien
      to the goals of family solidarity. Proverbs such as "Do not let
      your children become better than you" spoke to these perceptions,
      and high rates of illiteracy testified to their power.
    </span></p><span data-dcnode-id="2308" instrument_node="">
</span><p data-dcnode-id="2306"><span data-dcnode-id="2307" instrument_node="">
      These attitudes remained strong among immigrants in America, many of whom
      planned a quick repatriation and saw little reason to lose
      children's wages. Parents also worried about the individualist
      values taught in American public schools. The saying "America took
      from us our children" was a common lament. Thus, truancy rates
      among Italians were high, especially among girls, for whom education had
      always been regarded as unnecessary since tradition dictated a path of
      marriage, motherhood, and homemaking.
    </span></p><span data-dcnode-id="2305" instrument_node="">
</span><p data-dcnode-id="2303"><span data-dcnode-id="2304" instrument_node="">
      Antagonism toward schools was derived not only from culture, but also from
      economic need and realistic judgments about mobility possibilities. Given
      the constricted employment options open to immigrants (largely confined to
      manual, unskilled labor), and the need for family members to contribute
      economically, extended schooling offered few rewards. From the parental
      viewpoint, anything threatening the family's collective strength
      was dangerous. Generations frequently clashed over demands to terminate
      formal education and find work, turn over earnings, and otherwise assist
      the family financially in other ways. Prior to World War I, less than one
      percent of Italian children were enrolled in high school.
    </span></p><span data-dcnode-id="2302" instrument_node="">
</span><p data-dcnode-id="2300"><span data-dcnode-id="2301" instrument_node="">
      As the second generation came of age in the 1920s and 1930s and America
      moved toward a service economy, however, education received greater
      acceptance. Although the children of immigrants generally remained
      entrenched in the working class (though frequently as skilled workers),
      they extended their education, often attending vocational schools, and
      could be found among the nation's clerks, bookkeepers, managers,
      and sales personnel. The economic downturn occasioned by the depression
      resulted in increased educational opportunities for some immigrants since
      job prospects were limited.
    </span></p><span data-dcnode-id="2299" instrument_node="">
</span><p data-dcnode-id="2297"><span data-dcnode-id="2298" instrument_node="">
      Italian Americans were well situated in post-World War II America to take
      advantage of the national expansion of secondary and higher education.
      They hastened to enroll in G.I. Bill programs and in the 1950s and 1960s
      began to send sons and daughters to colleges. By the 1970s, Italian
      Americans averaged about 12 years of formal education; in 1991 the group
      slightly surpassed the national mean of 12.7 years.
    </span></p><span data-dcnode-id="2296" instrument_node="">
</span></div><span data-dcnode-id="2294" instrument_node="">
</span><div class="article_container" data-dcnode-id="2223"><span data-dcnode-id="2293" instrument_node="">
</span><h2 data-dcnode-id="2291"><span data-dcnode-id="2292" instrument_node="">
      Religion
    </span></h2><span data-dcnode-id="2290" instrument_node="">
</span><p data-dcnode-id="2288"><span data-dcnode-id="2289" instrument_node="">
      Although Italian immigrants were overwhelmingly Roman Catholic, their
      faith was a personal, folk religion of feast days and peasant traditions
      that often had little to do with formal dogma or rituals. As such, its
      practices differed greatly from those encountered in America's
      Irish-dominated Catholic Church. Unlike Irish Americans, most Italians
      possessed no great reverence for priests (who had sometimes been among the
      oppressors in Italy) or the institutions of the official Church, and they
      disliked what they regarded as the impersonal, puritanical, and overly
      doctrinal Irish approach to religion. As in Italy, men continued to
      manifest anticlerical traditions and to attend church only on selected
      occasions, such as weddings and funerals.
    </span></p><span data-dcnode-id="2287" instrument_node="">
</span><p data-dcnode-id="2285"><span data-dcnode-id="2286" instrument_node="">
      For their part, the Irish clergy generally regarded Italians as
      indifferent Catholics—even pagans— and often relegated them
      to basement services. The Irish American hierarchy agonized over the
      "Italian Problem," and suspicion and mistrust initially
      characterized relations between the groups, leading to defections among
      the immigrant generation and demands for separate parishes. A
      disproportionately 
      </span></p><div class="gale_imggroup" data-dcnode-id="2275"><span data-dcnode-id="2284" instrument_node="">
</span><img alt="Italian Americans honor St. Amato in this Queens, New York, parade." data-dcnode-id="2283" height="260" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.everyculture.com/multi/images/gema_02_img0138.jpg&amp;raw" width="207"><span data-dcnode-id="2282" instrument_node="">
</span><div class="caption" data-dcnode-id="2277"><span data-dcnode-id="2281" instrument_node="">
</span><b data-dcnode-id="2279"><span data-dcnode-id="2280" instrument_node="">
            Italian Americans honor St. Amato in this Queens, New York, parade.
          </span></b><span data-dcnode-id="2278" instrument_node="">
</span></div><span data-dcnode-id="2276" instrument_node="">
</span></div><span data-dcnode-id="2274" instrument_node="">
       low presence of Italian Americans in the church leadership today is at
      least partially a legacy of this strained relationship. Protestant
      missionaries were not unaware of these developments. Many attempted to win
      converts, but met with very little success. With the establishment of
      "national parishes," however, the Catholic Church hit firmer
      ground, and Italian parishes proliferated after 1900. In many settlements,
      parish churches became focal points providing a sense of ethnic identity,
      a range of social services, and a source of community adhesion.
    </span><p data-dcnode-id="2273"></p><span data-dcnode-id="2272" instrument_node="">
</span><p data-dcnode-id="2246"><span data-dcnode-id="2271" instrument_node="">
      Italian immigrant Catholicism centered on the local patron saints and the
      beliefs, superstitions, and practices associated with the 
      </span><i data-dcnode-id="2269"><span data-dcnode-id="2270" instrument_node="">
        feste.
      </span></i><span data-dcnode-id="2268" instrument_node="">
       The 
      </span><i data-dcnode-id="2266"><span data-dcnode-id="2267" instrument_node="">
        feste
      </span></i><span data-dcnode-id="2265" instrument_node="">
       not only assisted in perpetuating local identities, but they also served
      as a means for public expression of immigrant faith. In the early years,
      feast days replicated those of the homeland. Festivals were occasions for
      great celebration, complete with music, parades, dancing, eating, and
      fireworks displays. At the high point, statues of local saints such as San
      Rocco, San Giuseppe, or San Gennaro, were carried through the streets of
      Little Italies in a procession. New Yorker Richard Gambino, in
