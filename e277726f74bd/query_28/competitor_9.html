      </span><i data-dcnode-id="2263"><span data-dcnode-id="2264" instrument_node="">
        Blood of My Blood,
      </span></i><span data-dcnode-id="2262" instrument_node="">
       recalled the feast days of his youth: "Not long ago there were
      many such street 
      </span><i data-dcnode-id="2260"><span data-dcnode-id="2261" instrument_node="">
        feste.
      </span></i><span data-dcnode-id="2259" instrument_node="">
       Their aromas of food, the sight of burly men swaying from side to side
      and lurching forward under the weight of enormous statues of exotic
      Madonnas and saints laden with money and gifts, the music of Italian bands
      in uniforms with dark-peaked caps, white shirts, and black ties and the
      bright arches of colored lights spanning the city streets.... True to the
      spirit of 
      </span><i data-dcnode-id="2257"><span data-dcnode-id="2258" instrument_node="">
        campanilismo,
      </span></i><span data-dcnode-id="2256" instrument_node="">
       each group of 
      </span><i data-dcnode-id="2254"><span data-dcnode-id="2255" instrument_node="">
        paesani
      </span></i><span data-dcnode-id="2253" instrument_node="">
       in New York had its 
      </span><i data-dcnode-id="2251"><span data-dcnode-id="2252" instrument_node="">
         festa.
      </span></i><span data-dcnode-id="2250" instrument_node="">
       Three 
      </span><i data-dcnode-id="2248"><span data-dcnode-id="2249" instrument_node="">
         feste
      </span></i><span data-dcnode-id="2247" instrument_node="">
       were larger than the others. Sicilians, especially from the region of
      Agrigento, went all out for the huge September festival of San Gandolfo.
      In July, thousands turned out to honor the Madonna del Carmine. And in the
      fall, Neapolitans paid their respect to the patron of their mother city,
      San Gennaro."
    </span></p><span data-dcnode-id="2245" instrument_node="">
</span><p data-dcnode-id="2231"><span data-dcnode-id="2244" instrument_node="">
      Worshippers lined the streets as processions moved toward the parish
      church, and they vied to pin money on the statue, place gifts on
      platforms, or make various penances (walking barefoot, crawling, licking
      the church floor [
      </span><i data-dcnode-id="2242"><span data-dcnode-id="2243" instrument_node="">
        lingua strascinuni
      </span></i><span data-dcnode-id="2241" instrument_node="">
      ], reciting certain prayers). Irish prelates frequently attempted to ban
      such events, viewing them as pagan rituals and public spectacles. A
      cluster of beliefs focusing on the folk world of magic, witches, ghosts,
      and demons further estranged Italians from the church hierarchy. Many
      immigrants were convinced, for example, of the existence of the evil eye (
      </span><i data-dcnode-id="2239"><span data-dcnode-id="2240" instrument_node="">
        malocchio
      </span></i><span data-dcnode-id="2238" instrument_node="">
       or 
      </span><i data-dcnode-id="2236"><span data-dcnode-id="2237" instrument_node="">
        jettatura
      </span></i><span data-dcnode-id="2235" instrument_node="">
      ), and believed that wearing certain symbols, the most potent of which
      were associated with horns (
      </span><i data-dcnode-id="2233"><span data-dcnode-id="2234" instrument_node="">
        corni
      </span></i><span data-dcnode-id="2232" instrument_node="">
      ) or garlic amulets, provided protection from its power.
    </span></p><span data-dcnode-id="2230" instrument_node="">
</span><p data-dcnode-id="2225"><span data-dcnode-id="2229" instrument_node="">
      As the second and subsequent generations grew to maturity, most strictly
      old-world forms of religious observance and belief were discarded, leading
      to what some have called the "hibernization" of Italian
      American Catholicism. Many feast day celebrations remain, although, in
      some cases, they have been transformed into mass cultural events which
      draw thousands of non-Italians. The San Gennaro 
      </span><i data-dcnode-id="2227"><span data-dcnode-id="2228" instrument_node="">
        feste
      </span></i><span data-dcnode-id="2226" instrument_node="">
       in Manhattan's Little Italy is a case in point: once celebrated
      only by Neapolitans, it now attracts heterogeneous crowds from hundreds of
      miles away.
    </span></p><span data-dcnode-id="2224" instrument_node="">
</span></div><span data-dcnode-id="2222" instrument_node="">
</span><div class="article_container" data-dcnode-id="2202"><span data-dcnode-id="2221" instrument_node="">
</span><h2 data-dcnode-id="2219"><span data-dcnode-id="2220" instrument_node="">
      Employment and Economic Traditions
    </span></h2><span data-dcnode-id="2218" instrument_node="">
</span><p data-dcnode-id="2213"><span data-dcnode-id="2217" instrument_node="">
      Throughout the years of mass migration, Italians clustered heavily in the
      ranks of unskilled, manual labor. In part, this seems to have resulted
      from cultural preference—men favored outdoor jobs dovetailing
      old-world skills—and immigrant strategies that sought readily
      available employment in order to return quickly to Italy with nest eggs.
      But American employers also imposed the choice of positions since many
      regarded Italians as unsuited for indoor work or heavy industry.
      Immigrants thus frequently engaged in seasonal work on construction sites
      and railroads and in mines and public works projects. Male employment
      often operated under the "boss system" in which countrymen (
      </span><i data-dcnode-id="2215"><span data-dcnode-id="2216" instrument_node="">
        padroni
      </span></i><span data-dcnode-id="2214" instrument_node="">
      ) served as middlemen between gangs of immigrant workers and American
      employers. Married women generally worked at home, either concentrating on
      family tasks or other home-based jobs such as keeping 
       boarders, attending to industrial homework, or assisting in family-run
      stores. In larger urban centers, unmarried women worked outside the home
      in garment, artificial flower, and costume jewelry factories, and in
      sweatshops and canneries, often laboring together in all-Italian groups.
    </span></p><span data-dcnode-id="2212" instrument_node="">
</span><p data-dcnode-id="2210"><span data-dcnode-id="2211" instrument_node="">
      Some Little Italies were large enough to support a full economic structure
      of their own. In these locations, small import stores, shops, restaurants,
      fish merchants, and flower traders proliferated, offering opportunities
      for upward mobility within the ethnic enclave. In many cities, Italians
      dominated certain urban trades such as fruit and vegetable peddling,
      confectioniering, rag picking, shoe-shining, ice-cream vending, and
      stevedoring. A portion of the immigrants were skilled artisans who
      typically replicated their old-world crafts of shoemaking and repairing,
      tailoring, carpentry, and barbering.
    </span></p><span data-dcnode-id="2209" instrument_node="">
</span><p data-dcnode-id="2207"><span data-dcnode-id="2208" instrument_node="">
      The dense concentration of Italian Americans in blue-collar occupations
      persisted into the second generation, deriving from deliberate career
      choices, attitudes toward formal education, and the economic dynamics of
      the nation. Italians had begun to make advances out of the unskilled ranks
      during the prosperous 1920s, but many gains were overshadowed during the
      Great Depression. Partially in response to these conditions,
      Italians—both men and women—moved heavily into organized
      labor during the 1930s, finding the CIO industrial unions especially
      attractive. Union memberships among Italian Americans rose significantly;
      by 1937, the AFL International Ladies Garment Workers Union (with vice
      president Luigi Antonini) counted nearly 100,000 Italian members in the
      New York City area alone. At the same time, women were becoming a presence
      in service and clerical positions.
    </span></p><span data-dcnode-id="2206" instrument_node="">
</span><p data-dcnode-id="2204"><span data-dcnode-id="2205" instrument_node="">
      The occupational choices of Italian Americans shifted radically after
      World War II, when structural changes in the American economy facilitated
      openings in more white collar occupations. Italian Americans were
      strategically situated to take advantage of these economic shifts, being
      clustered in the urban areas where economic expansion took place and ready
      to move into higher education. Since the 1960s, Italian Americans have
      become solidly grounded in the middle-class, managerial, and professional
      ranks. As a group, by 1991 they had equalled or surpassed national
      averages in income and occupational prestige.
    </span></p><span data-dcnode-id="2203" instrument_node="">
</span></div><span data-dcnode-id="2201" instrument_node="">
</span><div class="article_container" data-dcnode-id="2181"><span data-dcnode-id="2200" instrument_node="">
</span><h2 data-dcnode-id="2198"><span data-dcnode-id="2199" instrument_node="">
      Politics and Government
    </span></h2><span data-dcnode-id="2197" instrument_node="">
</span><p data-dcnode-id="2192"><span data-dcnode-id="2196" instrument_node="">
      Italians were slow to take part in the American political process. Due to
      the temporary nature of early migration, few took the time to achieve
      naturalization in order to vote. Anti-government attitudes, exemplified in
      the 
      </span><i data-dcnode-id="2194"><span data-dcnode-id="2195" instrument_node="">
         ladro governo
      </span></i><span data-dcnode-id="2193" instrument_node="">
       ("the government as thief") outlook, also limited
      participation. Hence, Italian voters did not initially translate into
      political clout. Early political activity took place at the urban machine
      level, where immigrants typically encountered Irish Democratic bosses
      offering favors in return for support, but often blocking out aspiring
      Italian politicians. In such cities, those Italians seeking office
      frequently drifted to the Republican Party.
    </span></p><span data-dcnode-id="2191" instrument_node="">
</span><p data-dcnode-id="2189"><span data-dcnode-id="2190" instrument_node="">
      Naturalization rates increased during the 1920s, but the next decade was
      marked by a political watershed. During the 1930s, Italian Americans
      joined the Democratic New Deal coalition, many becoming politically active
      for the first time in doing so. The careers of
      independent/sometime-Republican Fiorello LaGuardia and leftist Vito
      Marcantonio benefited from this expansion. As a concentrated urban group
      with strong union ties, Italians constituted an important component of
      President Franklin Roosevelt's national support. The Democratic
      hold on Italians was somewhat shaken by Roosevelt's "dagger
      in the back" speech condemning Italy's attack on France in
      1940, but, overall, the group maintained its strong commitment to the
      Party. In the early 1970s, only 17 percent of Italian Americans were
      registered Republicans (45 percent were registered Democrats), although
      many began to vote Republican in recent presidential elections. Both
      President Ronald Reagan and President George Bush were supported by strong
      Italian-American majorities. Overall, the group has moved from the left
      toward the political center. By 1991, Italian American voter registrations
      were 35 percent Republican and 32 percent Democratic.
    </span></p><span data-dcnode-id="2188" instrument_node="">
</span><p data-dcnode-id="2186"><span data-dcnode-id="2187" instrument_node="">
      The political ascent of Italian Americans came after World War II with the
      maturation of the second and third generations, the acquisition of
      increased education and greater wealth, and a higher level of acceptance
      by the wider society. Italian Americans were well-represented in city and
      state offices and had begun to penetrate the middle ranks of the federal
      government, especially the judicial system. By the 1970s and 1980s, there
      were Italian American cabinet members, governors, federal judges, and
      state legislators. Only four Italian Americans sat in Congress during the
      1930s, but more than 30 served in the 1980s; in 1987 there were three U.S.
      Senators. The candidacy of Geraldine Ferraro for the Democratic vice
      presidency in 1984, the high profile of New York governor Mario Cuomo in
      American political discourse, and the appointment of Antonin Scalia to the
      Supreme Court are indicative of the group's political importance.
    </span></p><span data-dcnode-id="2185" instrument_node="">
</span><p data-dcnode-id="2183"><span data-dcnode-id="2184" instrument_node="">
      Since World War II, most Italian Americans have remained largely
      uninvolved in—even ignorant of—the political affairs of
      Italy, no doubt a legacy of World War II and the earlier brush with
      fascism. They have been very responsive, however, to appeals for relief
      assistance during periodic natural disasters such as floods and
      earthquakes.
    </span></p><span data-dcnode-id="2182" instrument_node="">
</span></div><span data-dcnode-id="2180" instrument_node="">
</span><div class="article_container" data-dcnode-id="2172"><span data-dcnode-id="2179" instrument_node="">
</span><h2 data-dcnode-id="2177"><span data-dcnode-id="2178" instrument_node="">
      Individual and Group Contributions
    </span></h2><span data-dcnode-id="2176" instrument_node="">
</span><p data-dcnode-id="2174"><span data-dcnode-id="2175" instrument_node="">
      Italians constitute such a large and diverse group that notable
      individuals have appeared in virtually every aspect of American life.
    </span></p><span data-dcnode-id="2173" instrument_node="">
</span></div><span data-dcnode-id="2171" instrument_node="">
</span><div class="article_container" data-dcnode-id="2163"><span data-dcnode-id="2170" instrument_node="">
</span><h3 data-dcnode-id="2168"><span data-dcnode-id="2169" instrument_node="">
      ACADEMIA
    </span></h3><span data-dcnode-id="2167" instrument_node="">
</span><p data-dcnode-id="2165"><span data-dcnode-id="2166" instrument_node="">
      Lorenzo Da Ponte (1747-1838), taught courses on Italian literature at
      Columbia University and sponsored the first Italian opera house in
      Manhattan in the 1830s. Prior to becoming president of Yale University in
      1977, A. Bartlett Giamatti (1938-1989) was a distinguished scholar of
      English and comparative literature. He resigned his presidency to become
      the commissioner of the National Baseball League. Peter Sammartino
      (1904-1992) taught at the City College of New York and Columbia University
      before founding Fairleigh Dickinson University. He published 14 books on
      various aspects of education.
    </span></p><span data-dcnode-id="2164" instrument_node="">
</span></div><span data-dcnode-id="2162" instrument_node="">
</span><div class="article_container" data-dcnode-id="2154"><span data-dcnode-id="2161" instrument_node="">
</span><h3 data-dcnode-id="2159"><span data-dcnode-id="2160" instrument_node="">
      BUSINESS
    </span></h3><span data-dcnode-id="2158" instrument_node="">
</span><p data-dcnode-id="2156"><span data-dcnode-id="2157" instrument_node="">
      Amadeo P. Giannini (1870-1949) began a store-front bank in the Italian
      North Beach section of San Francisco in 1904. Immediately after the 1906
      earthquake he began granting loans to residents to rebuild. Later,
      Giannini pioneered in branch banking and in financing the early film
      industry. Giannini's Bank of America eventually became the largest
      bank in the United States. Lido Anthony "Lee" Iacocca
      (1924– ) became president of Ford Motor Company in 1970. Iacocca
      left Ford after eight years to take over the ailing Chrysler Corporation,
      which was near bankruptcy. He rescued the company, in part through his
      personal television ads which made his face instantly recognizable.
      Iacocca also spent four years as chairman of the Statue of Liberty/Ellis
      Island Foundation, which supported the refurbishment of these national
      monuments.
    </span></p><span data-dcnode-id="2155" instrument_node="">
</span></div><span data-dcnode-id="2153" instrument_node="">
</span><div class="article_container" data-dcnode-id="2079"><span data-dcnode-id="2152" instrument_node="">
</span><h3 data-dcnode-id="2150"><span data-dcnode-id="2151" instrument_node="">
      FILM, TELEVISION, AND THEATER
    </span></h3><span data-dcnode-id="2149" instrument_node="">
</span><p data-dcnode-id="2123"><span data-dcnode-id="2148" instrument_node="">
      Frank Capra (1897-1991) directed more than 20 feature films and won three
      Academy Awards for Best Director. His films, stamped with an upbeat
      optimism, became known as "Capra-corn." Capra won his Oscars
      for 
      </span><i data-dcnode-id="2146"><span data-dcnode-id="2147" instrument_node="">
         It Happened One Night
      </span></i><span data-dcnode-id="2145" instrument_node="">
       (1934), 
      </span><i data-dcnode-id="2143"><span data-dcnode-id="2144" instrument_node="">
        Mr. Deeds Goes to Town
      </span></i><span data-dcnode-id="2142" instrument_node="">
       (1936), and 
      </span><i data-dcnode-id="2140"><span data-dcnode-id="2141" instrument_node="">
        You Can't Take It With You
      </span></i><span data-dcnode-id="2139" instrument_node="">
       (1938), but he is also well known for 
      </span><i data-dcnode-id="2137"><span data-dcnode-id="2138" instrument_node="">
        Lost Horizon
      </span></i><span data-dcnode-id="2136" instrument_node="">
       (1937), 
      </span><i data-dcnode-id="2134"><span data-dcnode-id="2135" instrument_node="">
        Mr. Smith Goes to Washington 
      </span></i><span data-dcnode-id="2133" instrument_node="">
      (1939), and 
      </span><i data-dcnode-id="2131"><span data-dcnode-id="2132" instrument_node="">
        It's a Wonderful Life
      </span></i><span data-dcnode-id="2130" instrument_node="">
       (1947). In addition to directing, Capra served four terms as president of
      the Academy of Motion Picture Arts and Sciences and three terms as
      president of the Screen Directors Guild. Francis Ford Coppola
      (1939– ) earned international fame as director of 
      </span><i data-dcnode-id="2128"><span data-dcnode-id="2129" instrument_node="">
        The Godfather
      </span></i><span data-dcnode-id="2127" instrument_node="">
       (1972), an adaptation of Mario Puzo's best selling novel. The film
      won several Academy Awards, including Best Picture. Among numerous other
      films, Coppola has made two sequels to 
      </span><i data-dcnode-id="2125"><span data-dcnode-id="2126" instrument_node="">
        The Godfather
      </span></i><span data-dcnode-id="2124" instrument_node="">
      ; the second film of this trilogy, released in 1974, also won multiple
      awards, including an Academy Award for Best Picture.
    </span></p><span data-dcnode-id="2122" instrument_node="">
</span><p data-dcnode-id="2081"><span data-dcnode-id="2121" instrument_node="">
      Martin Scorcese (1942– ), film director and screenwriter, directed 
      </span><i data-dcnode-id="2119"><span data-dcnode-id="2120" instrument_node="">
        Mean Streets
      </span></i><span data-dcnode-id="2118" instrument_node="">
       (1973), 
      </span><i data-dcnode-id="2116"><span data-dcnode-id="2117" instrument_node="">
        Taxi Driver
      </span></i><span data-dcnode-id="2115" instrument_node="">
       (1976), 
      </span><i data-dcnode-id="2113"><span data-dcnode-id="2114" instrument_node="">
         Raging Bull
      </span></i><span data-dcnode-id="2112" instrument_node="">
       (1980), and 
      </span><i data-dcnode-id="2110"><span data-dcnode-id="2111" instrument_node="">
         Good Fellas 
      </span></i><span data-dcnode-id="2109" instrument_node="">
      (1990), among others, all of which draw from the urban, ethnic milieu of
      his youth. Sylvester Stallone (1946– ), actor, screenwriter, and
      director, has gained fame in each of these categories. He is perhaps best
      known as the title character in both 
      </span><i data-dcnode-id="2107"><span data-dcnode-id="2108" instrument_node="">
        Rocky 
      </span></i><span data-dcnode-id="2106" instrument_node="">
      (1976), which won an Academy Award for Best Picture (and spawned four
      sequels), and the 
      </span><i data-dcnode-id="2104"><span data-dcnode-id="2105" instrument_node="">
        Rambo 
      </span></i><span data-dcnode-id="2103" instrument_node="">
      series. Don Ameche (1908-1993), whose career spanned several decades,
      performed in vaudeville, appeared on radio serials ("The Chase and
      Sanborn Hour"), and starred in feature films. Ameche first achieved
      national acclaim in 
      </span><i data-dcnode-id="2101"><span data-dcnode-id="2102" instrument_node="">
        The Story of Alexander Graham Bell
      </span></i><span data-dcnode-id="2100" instrument_node="">
       (1941) and appeared in many films, earning an Academy Award for Best
      Supporting Actor for his performance in 
      </span><i data-dcnode-id="2098"><span data-dcnode-id="2099" instrument_node="">
        Cocoon
      </span></i><span data-dcnode-id="2097" instrument_node="">
       (1986). Ernest Borgnine (born Ermes Effron Borgnino, 1915– ) spent
      his early acting career portraying villains, such as the brutal prison
      guard in 
      </span><i data-dcnode-id="2095"><span data-dcnode-id="2096" instrument_node="">
        From Here to Eternity,
      </span></i><span data-dcnode-id="2094" instrument_node="">
       but captured the hearts of Americans with his sensitive portrayal of a
      Bronx butcher in 
      </span><i data-dcnode-id="2092"><span data-dcnode-id="2093" instrument_node="">
         Marty 
      </span></i><span data-dcnode-id="2091" instrument_node="">
      (1956), for which he won an Academy Award. Borgnine also appeared on
      network television as Lieutenant Commander Quintin McHale on
      "McHale's Navy," a comedy series that ran on ABC from
      1962 to 1965. Liza Minnelli (1946– ), stage, television, and motion
      picture actress and vocalist, won an Academy Award for 
      </span><i data-dcnode-id="2089"><span data-dcnode-id="2090" instrument_node="">
         Cabaret
      </span></i><span data-dcnode-id="2088" instrument_node="">
       (1972), an Emmy for 
      </span><i data-dcnode-id="2086"><span data-dcnode-id="2087" instrument_node="">
        Liza with a Z
      </span></i><span data-dcnode-id="2085" instrument_node="">
       (1972), and a Tony Award for 
      </span><i data-dcnode-id="2083"><span data-dcnode-id="2084" instrument_node="">
        The Act
      </span></i><span data-dcnode-id="2082" instrument_node="">
       (1977).
    </span></p><span data-dcnode-id="2080" instrument_node="">
</span></div><span data-dcnode-id="2078" instrument_node="">
</span><div class="article_container" data-dcnode-id="2013"><span data-dcnode-id="2077" instrument_node="">
</span><h3 data-dcnode-id="2075"><span data-dcnode-id="2076" instrument_node="">
      LITERATURE
    </span></h3><span data-dcnode-id="2074" instrument_node="">
</span><p data-dcnode-id="2015"><span data-dcnode-id="2073" instrument_node="">
      Pietro DiDonato (1911-1992) published the classic Italian immigrant novel,
      
      </span><i data-dcnode-id="2071"><span data-dcnode-id="2072" instrument_node="">
        Christ in Concrete,
      </span></i><span data-dcnode-id="2070" instrument_node="">
       in 1939 
       to critical acclaim. He also captured the immigrant experience in later
      works, including 
      </span><i data-dcnode-id="2068"><span data-dcnode-id="2069" instrument_node="">
        Three Circles of Light
      </span></i><span data-dcnode-id="2067" instrument_node="">
       (1960) and 
      </span><i data-dcnode-id="2065"><span data-dcnode-id="2066" instrument_node="">
        Life of Mother Cabrini
      </span></i><span data-dcnode-id="2064" instrument_node="">
       (1960). Novelist Jerre Mangione (1909– ) wrote 
      </span><i data-dcnode-id="2062"><span data-dcnode-id="2063" instrument_node="">
        Mount Allegro 
      </span></i><span data-dcnode-id="2061" instrument_node="">
      (1943), an autobiographical work describing his upbringing among Sicilian
      Americans in Rochester, New York. Mangione is also noted for his 
      </span><i data-dcnode-id="2059"><span data-dcnode-id="2060" instrument_node="">
        Reunion in Sicily
      </span></i><span data-dcnode-id="2058" instrument_node="">
       (1950), 
      </span><i data-dcnode-id="2056"><span data-dcnode-id="2057" instrument_node="">
        An Ethnic at Large
      </span></i><span data-dcnode-id="2055" instrument_node="">
       (1978), and 
      </span><i data-dcnode-id="2053"><span data-dcnode-id="2054" instrument_node="">
        La Storia: Five Centuries of the Italian American Experience 
      </span></i><span data-dcnode-id="2052" instrument_node="">
      (1992), with Ben Morreale. Gay Talese (1932– ), began his career as
      a reporter for the 
      </span><i data-dcnode-id="2050"><span data-dcnode-id="2051" instrument_node="">
         New York Times,
      </span></i><span data-dcnode-id="2049" instrument_node="">
       but later earned fame for his national bestsellers, including 
      </span><i data-dcnode-id="2047"><span data-dcnode-id="2048" instrument_node="">
        The Kingdom and the Power
      </span></i><span data-dcnode-id="2046" instrument_node="">
       (1969), 
      </span><i data-dcnode-id="2044"><span data-dcnode-id="2045" instrument_node="">
        Honor Thy Father
      </span></i><span data-dcnode-id="2043" instrument_node="">
       (1971), and 
      </span><i data-dcnode-id="2041"><span data-dcnode-id="2042" instrument_node="">
        Thy Neighbor's Wife 
      </span></i><span data-dcnode-id="2040" instrument_node="">
      (1980). Talese's 
      </span><i data-dcnode-id="2038"><span data-dcnode-id="2039" instrument_node="">
        Unto the Sons
      </span></i><span data-dcnode-id="2037" instrument_node="">
       (1992) dealt with his own family's immigrant experience. The
      poetry of Lawrence Ferlinghetti (1919– ) captured the essence of
      the Beat Generation during the 1950s and 1960s. His San Francisco
      bookstore, City Lights Books, became a gathering place for literary
      activists. John Ciardi (1916-1986), poet, translator, and literary critic,
      published over 40 books of poetry and criticism and profoundly impacted
      the literary world as the long-time poetry editor of the 
      </span><i data-dcnode-id="2035"><span data-dcnode-id="2036" instrument_node="">
        Saturday Review.
      </span></i><span data-dcnode-id="2034" instrument_node="">
       Ciardi's translation of Dante's 
      </span><i data-dcnode-id="2032"><span data-dcnode-id="2033" instrument_node="">
        Divine Comedy
      </span></i><span data-dcnode-id="2031" instrument_node="">
       is regarded as definitive. Novelist Mario Puzo (1920– ) published
      two critical successes, 
      </span><i data-dcnode-id="2029"><span data-dcnode-id="2030" instrument_node="">
        Dark Arena
      </span></i><span data-dcnode-id="2028" instrument_node="">
       (1955) and 
      </span><i data-dcnode-id="2026"><span data-dcnode-id="2027" instrument_node="">
         The Fortunate Pilgrim
      </span></i><span data-dcnode-id="2025" instrument_node="">
       (1965), prior to 
      </span><i data-dcnode-id="2023"><span data-dcnode-id="2024" instrument_node="">
        The Godfather
      </span></i><span data-dcnode-id="2022" instrument_node="">
       in 1969, which sold over ten million copies and reached vast audiences in
      its film adaptations. Helen Barolini (1925– ), poet, essayist, and
      novelist, explored the experiences of Italian-American women in her 
      </span><i data-dcnode-id="2020"><span data-dcnode-id="2021" instrument_node="">
        Umbertina
      </span></i><span data-dcnode-id="2019" instrument_node="">
       (1979) and 
      </span><i data-dcnode-id="2017"><span data-dcnode-id="2018" instrument_node="">
        The Dream Book
      </span></i><span data-dcnode-id="2016" instrument_node="">
       (1985).
    </span></p><span data-dcnode-id="2014" instrument_node="">
</span></div><span data-dcnode-id="2012" instrument_node="">
</span><div class="article_container" data-dcnode-id="1998"><span data-dcnode-id="2011" instrument_node="">
</span><h3 data-dcnode-id="2009"><span data-dcnode-id="2010" instrument_node="">
      MUSIC AND ENTERTAINMENT
    </span></h3><span data-dcnode-id="2008" instrument_node="">
</span><p data-dcnode-id="2003"><span data-dcnode-id="2007" instrument_node="">
      Francis Albert "Frank" Sinatra (1915-1998), began singing
      with the Harry James Band in the late 1930s, moved to the Tommy Dorsey
      Band, and then became America's first teenage idol in the early
      1940s, rising to stardom as a "crooner." Moving into film,
      Sinatra established a new career in acting that was launched in 1946. He
      won an Academy Award for his performance in 
      </span><i data-dcnode-id="2005"><span data-dcnode-id="2006" instrument_node="">
         From Here to Eternity
      </span></i><span data-dcnode-id="2004" instrument_node="">
       in 1953. Since 1954, Sinatra has made 31 films, released at least 800
      records, and participated in numerous charity affairs.
    </span></p><span data-dcnode-id="2002" instrument_node="">
</span><p data-dcnode-id="2000"><span data-dcnode-id="2001" instrument_node="">
      Mario Lanza (1921-1959) was a famous tenor who appeared on radio, in
      concert, on recordings, and in motion pictures. Vocalist and television
      star Perry Como (born Pierino Roland Como, 1913– ) hosted one of
      America's most popular television shows in the 1950s. Frank Zappa
      (1940-1993), musician, vocalist, and composer, founded the influential
      rock group Mothers of Invention in the 1960s. Noted for his social satire
      and musical inventiveness, Zappa was named Pop Musician of the Year for
      three years in a row in 1970-1972.
    </span></p><span data-dcnode-id="1999" instrument_node="">
</span></div><span data-dcnode-id="1997" instrument_node="">
</span><div class="article_container" data-dcnode-id="1983"><span data-dcnode-id="1996" instrument_node="">
</span><h3 data-dcnode-id="1994"><span data-dcnode-id="1995" instrument_node="">
      POLITICS
    </span></h3><span data-dcnode-id="1993" instrument_node="">
</span><p data-dcnode-id="1991"><span data-dcnode-id="1992" instrument_node="">
      Fiorello LaGuardia (1882-1947) gained national fame as an energetic mayor
      of New York City, in which capacity he served for three terms (1934-1945).
      Earlier, LaGuardia sat for six terms as a Republican representative in the
      U.S. Congress. Known as "The Little Flower," LaGuardia
      earned a reputation as an incorruptible, hard working, and humane
      administrator. John O. Pastore (1912– ) was the first Italian
      American to be elected a state governor (Rhode Island, 1945). In 1950, he
      represented that state in the U.S. Senate. Geraldine Ferraro (1935–
      ) was the first American woman nominated for vice president by a major
      political party in 1984 when she ran with Democratic presidential
      candidate Walter Mondale. Her earlier career included service as assistant
      district attorney in New York and two terms in the U.S. Congress. Mario
      Cuomo (1932– ) was elected governor of New York in 1982 and has
      been reelected twice since then. Prior to his election as governor, Cuomo
      served as lieutenant governor and New York's secretary of state.
    </span></p><span data-dcnode-id="1990" instrument_node="">
</span><p data-dcnode-id="1985"><span data-dcnode-id="1989" instrument_node="">
      John J. Sirica (1904-1992), chief federal judge, U.S. District Court for
      the District of Columbia, presided over the Watergate trials. He was named
      
      </span><i data-dcnode-id="1987"><span data-dcnode-id="1988" instrument_node="">
        Time
      </span></i><span data-dcnode-id="1986" instrument_node="">
       magazine's Man of the Year in 1973. Antonin Scalia (1936– )
      became the first Italian American to sit on the U.S. Supreme Court when he
      was appointed Associate Justice in 1986. Rudolph W. Giuliani (1944–
      ), served for many years as U.S. Attorney for the southern district of New
      York and waged war against organized crime and public corruption. In 1993,
      he was elected mayor of New York City.
    </span></p><span data-dcnode-id="1984" instrument_node="">
</span></div><span data-dcnode-id="1982" instrument_node="">
</span><div class="article_container" data-dcnode-id="1974"><span data-dcnode-id="1981" instrument_node="">
</span><h3 data-dcnode-id="1979"><span data-dcnode-id="1980" instrument_node="">
      RELIGION
    </span></h3><span data-dcnode-id="1978" instrument_node="">
</span><p data-dcnode-id="1976"><span data-dcnode-id="1977" instrument_node="">
      Father Eusebio Chino (Kino) (1645-1711) was a Jesuit priest who worked
      among the native people of Mexico and Arizona for three decades,
      establishing more than 20 mission churches, exploring wide areas, and
      introducing new methods of agriculture and animal-raising. Francesca
      Xavier Cabrini (1850-1917), the first American to be sainted by the Roman
      Catholic Church, worked with poor Italian immigrants throughout North and
      South America, opening schools, orphanages, hospitals, clinics, and
      novitiates for her Missionary Sisters of the Sacred Heart.
    </span></p><span data-dcnode-id="1975" instrument_node="">
</span></div><span data-dcnode-id="1973" instrument_node="">
</span><div class="article_container" data-dcnode-id="1965"><span data-dcnode-id="1972" instrument_node="">
</span><h3 data-dcnode-id="1970"><span data-dcnode-id="1971" instrument_node="">
      SCIENCE AND TECHNOLOGY
    </span></h3><span data-dcnode-id="1969" instrument_node="">
</span><p data-dcnode-id="1967"><span data-dcnode-id="1968" instrument_node="">
      Enrico Fermi (1901-1954), a refugee from Benito Mussolini's fascist
      regime, is regarded as the "father of atomic energy." Fermi
      was awarded the 1938 Nobel Prize in physics for his identification of new
      radioactive elements produced by neutron bombardment. He worked with the
      Manhattan Project during World War II to produce the first atomic bomb,
      achieving the world's first self-sustaining chain reaction on
      December 2, 1942. Salvador Luria (1912-1991) was a pioneer of molecular
      biology and genetic engineering. In 1969, while he was a faculty member at
      the Massachusetts Institute of Technology, Luria was awarded the Nobel
      Prize for his work on viruses. Rita Levi-Montalcini (1909– ) was
      awarded a Nobel Prize in 1986 for her work in cell biology and cancer
      research. Emilio Segre (1905-1989), a student of Fermi, received the 1959
      Nobel Prize in physics for his discovery of the antiproton.
    </span></p><span data-dcnode-id="1966" instrument_node="">
</span></div><span data-dcnode-id="1964" instrument_node="">
</span><div class="article_container" data-dcnode-id="1956"><span data-dcnode-id="1963" instrument_node="">
</span><h3 data-dcnode-id="1961"><span data-dcnode-id="1962" instrument_node="">
      SPORTS
    </span></h3><span data-dcnode-id="1960" instrument_node="">
</span><p data-dcnode-id="1958"><span data-dcnode-id="1959" instrument_node="">
      Joseph "Joe" DiMaggio (1914-1999), the "Yankee
      Clipper," was voted the Greatest Living Player in baseball.
      DiMaggio set his 56 consecutive game hitting streak in 1941. (The record
      still stands.) In a career spanning 1936 to 1951, DiMaggio led the New
      York Yankees to ten world championships and retired with a .325 lifetime
      batting average. At the time of his death, Vincent Lombardi (1913-1970)
      was the winningest coach in professional football, and the personification
      of tenacity and commitment in American sports. As head coach of the Green
      Bay Packers, Lombardi led the team to numerous conference, league, and
      world titles during the 1960s, including two Super Bowls in 1967 and 1968.
      Rocky Marciano (born Rocco Francis Marchegiano, 1924-1969) was the only
      undefeated heavyweight boxing champion, winning all his fights. Known as
      the "Brockton Bomber," Marciano won the heavyweight
      championship over Jersey Joe Walcott in 1952 and held it until his
      voluntary retirement in 1956. Rocky Graziano (born Rocco Barbella,
      1922– ), middleweight boxing champion, is best known for his
      classic bouts with Tony Zale. Lawrence "Yogi" Berra
      (1925– ), a Baseball Hall of Fame member who played for the New
      York Yankees as catcher for 17 years, enjoyed a career that lasted from
      1946 to 1963. He also coached and managed several professional baseball
      teams, including the New York Mets and the Houston Astros. Joseph
      Garagiaola (1926– ) played with the St. Louis Cardinals (1946-1951)
      and several other Major League clubs.
    </span></p><span data-dcnode-id="1957" instrument_node="">
</span></div><span data-dcnode-id="1955" instrument_node="">
</span><div class="article_container" data-dcnode-id="1947"><span data-dcnode-id="1954" instrument_node="">
</span><h3 data-dcnode-id="1952"><span data-dcnode-id="1953" instrument_node="">
      VISUAL ARTS
    </span></h3><span data-dcnode-id="1951" instrument_node="">
</span><p data-dcnode-id="1949"><span data-dcnode-id="1950" instrument_node="">
      Frank Stella (1936– ) pioneered the development of "minimal
      art," involving three-dimensional, "shaped" paintings
      and sculpture. His work has been exhibited in museums around the world.
      Constantino Brumidi (1805-1880), a political exile from the liberal
      revolutions of the 1840s, became known as "the Michelangelo of the
      United States Capitol." Brumidi painted the interior of the dome of
      the Capitol in Washington, D.C., from 1865 to 1866, as well as numerous
      other areas of the building. Ralph Fasanella (1914– ), a
      self-taught primitive painter whose work has been compared to that of
      Grandma Moses, is grounded in his immigrant backgrounds.
    </span></p><span data-dcnode-id="1948" instrument_node="">
</span></div><span data-dcnode-id="1946" instrument_node="">

oderate('/multi/Ha-La/Italian-Americans.html','17');return false;" title="Report this comment as inappropriate"><img alt="Report this comment as inappropriate" border="0" data-dcnode-id="609" height="11" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.everyculture.com/images/comment.moderate.gif&amp;raw" width="11"></a></div><div class="Comments_date" data-dcnode-id="605"><span data-dcnode-id="606" instrument_node="">Sep 29, 2011 @ 9:09 am</span></div></div><div class="Comments_text" data-dcnode-id="602"><span data-dcnode-id="603" instrument_node="">I loved reading the history and story of immigrant experience and how much courage it took to start over in a new land with different ways of life,language,etc. Both my parents people came from small towns in Campania.Napoliteans they say.They came during the mass migration 1880-1920 via New York to finally Connecticut. In Connecticut the biggest ethnic group is Italian-American.I live in Waterbury,Ct. in New Haven county and we are everywere theres a apizza joint on every corner. I wish i had half of the courage my grandparents did to move to a new land and start all over. Thank god for what they did, the values they instilled in me and for the beutifull culture they gave me.</span></div></div><div class="Comments_comment Comments_comment_alt" data-dcnode-id="570"><div class="Comments_info" data-dcnode-id="587"><div class="Comments_balloon" data-dcnode-id="596"><span data-dcnode-id="600" instrument_node=""> </span><a class="Comments_link" data-dcnode-id="598" href="#Comments_18" id="Comments_18" rel="nofollow"><span data-dcnode-id="599" instrument_node="">18</span></a><span data-dcnode-id="597" instrument_node=""> </span></div><div class="Comments_user" data-dcnode-id="593"><a data-dcnode-id="594" href="mailto:li34436 [at] gmail [dot] com"><span data-dcnode-id="595" instrument_node="">Lisamarie Partridge</span></a></div><div class="Comments_moderate" data-dcnode-id="590"><a data-dcnode-id= n:none;color:#006699;"><span data-dcnode-id="298" instrument_node="">Kendal</span></span></div><div class="Comments_moderate" data-dcnode-id="293"><a data-dcnode-id="294" href="javascript:void(0);" onclick="confirmModerate('/multi/Ha-La/Italian-Americans.html','31');return false;" title="Report this comment as inappropriate"><img alt="Report this comment as inappropriate" border="0" data-dcnode-id="295" height="11" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.everyculture.com/images/comment.moderate.gif&amp;raw" width="11"></a></div><div class="Comments_date" data-dcnode-id="291"><span data-dcnode-id="292" instrument_node="">Feb 13, 2014 @ 4:16 pm</span></div></div><div class="Comments_text" data-dcnode-id="288"><span data-dcnode-id="289" instrument_node="">Was the Italian Immigration successful or failure?</span></div></div><div class="Comments_comment Comments_comment_alt" data-dcnode-id="270"><div class="Comments_info" data-dcnode-id="273"><div class="Comments_balloon" data-dcnode-id="282"><span data-dcnode-id="286" instrument_node=""> </span><a class="Comments_link" data-dcnode-id="284" href="#Comments_32" id="Comments_32" rel="nofollow"><span data-dcnode-id="285" instrument_node="">32</span></a><span data-dcnode-id="283" instrument_node=""> </span></div><div class="Comments_user" data-dcnode-id="279"><span data-dcnode-id="280" style="font-weight:bold;text-decoration:none;color:#006699;"><span data-dcnode-id="281" instrument_node="">Loretta</span></span></div><div class="Comments_moderate" data-dcnode-id="276"><a data-dcnode-id="277" href="javascript:void(0);" onclick="confirmModerate('/multi/Ha-La/Italian-Americans.html','32');return false;" title="Report this comment as inappropriate"><img alt="Report this comment as inappropriate" border="0" data-dcnode-id="278" height="11" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.everyculture.com/images/comment.moderate.gif&amp;raw" width="11"></a></div><div class="Comments_date" data-dcnode-id="274"><span data-dcnode-id="275" instrument_node="">Jul 5, 2014 @ 11:11 am</span></div></div><div class="Comments_text" data-dcnode-id="271"><span data-dcnode-id="272" instrument_node="">I'm first generation Italian/American. My parents,Lorenzo DeCecco and Irma Maddalena arrived in Queens, N.Y. in 1954. To immigrate from Italy then you had to be sponsored by a family member. Meaning my Uncle, Richard Maddalena took 2 years filling out paperwork which included the fact that he would be responsible for us in every way. From finding my father work, housing etc. There was no government handouts, and you were expected to learn English. My family came from the Friuli-Venezia Giulia region of Italy aka The Friuli.  Unlike my cousins, I grew up speaking Italian &amp; English. My Father worked for Port Morris Tile&amp;Terrazzo laying terrazzo till he retired at 65. Unfortunately, my beloved Mother died of Colon Cancer when I was 12 but,she had already instilled in me that I was never to forget that I was the lucky one. "You are 100% American. Study hard, work hard and you can become whomever you wish!"  I took her words to heart. And, at age 60 I know my Mama looks down from Heaven proudly. I am fiercely proud of my Italian heritage. Although as a child it was difficult as everyone else was from Southern Italy where the traditions are quite different. Depending on where our ancestors came from they spoke their dialect from the region. My Mama made sure I only spoke Italian, and not our dialect. It was quite upsetting when at 7 years old my neighbor yelled at me, and told me I didn't speak Italian.  Upon hearing this, my Father took me back to her ( for he spoke various dialects) and he said to her in Sicilian, No Maria. You do not speak Italian. You speak Sicilian which my daughter doesn't understand.  Additionally, our region eats a lot of game, polenta, and risotto. I had no idea what spaghetti and meatballs were. In Italy itself there is no chicken parm, or double expresso's. Those are American creations.  Before you visit Italy Google where you're going.  You'll have a much better time.  I can just sum up my experience in this way. The first time I went to Italy at 22 I was able to visit one of my Father's sisters. I was on business and was able to stay in a lovely, rustic hotel that had the only TV in the village. It was a dream to meet some of my family, and to eat, breathe, and live the Italian life.  As I was staring at the Church up the hill ( where our wine, fresh goat milk, and meat came from I realized I had run out of cigarettes.  As I walked up to my room I excused myself as I passed about 25 towns people watching TV. On my return trip to the restaurant of the hotel I noticed they were all watching a John Wayne movie, and cheering.  Tears came to my eyes. I was the luckiest girl in the world.  My heart and body in the land that generations came from in my DNA, and my Land of the Free on TV.  Never take what we Americans have for granted.  And, as Italians we have our family, and the best of everything else! Ciao!</span></div></div><div class="Comments_comment" data-dcnode-id="253"><div class="Comments_info" data-dcnode-id="256"><div class="Comments_balloon" data-dcnode-id="265"><span data-dcnode-id="269" instrument_node=""> </span><a class="Comments_link" data-dcnode-id="267" href="#Comments_33" id="Comments_33" rel="nofollow"><span data-dcnode-id="268" instrument_node="">33</span></a><span data-dcnode-id="266" instrument_node=""> </span></div><div class="Comments_user" data-dcnode-id="262"><span data-dcnode-id="263" style="font-weight:bold;text-decoration:none;color:#006699;"><span data-dcnode-id="264" instrument_node="">ella</span></span></div><div class="Comments_moderate" data-dcnode-id="259"><a data-dcnode-id="260" href="javascript:void(0);" onclick="confirmModerate('/multi/Ha-La/Italian-Americans.html','33');return false;" title="Report this comment as inappropriate"><img alt="Report this comment as inappropriate" border="0" data-dcnode-id="261" height="11" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.everyculture.com/images/comment.moderate.gif&amp;raw" width="11"></a></div><div class="Comments_date" data-dcnode-id="257"><span data-dcnode-id="258" instrument_node="">Jul 30, 2014 @ 3:03 am</span></div></div><div class="Comments_text" data-dcnode-id="254"><span data-dcnode-id="255" instrument_node="">This website gave me a heap of info for a project thanks</span></div></div><div class="Comments_comment Comments_comment_alt" data-dcnode-id="236"><div class="Comments_info" data-dcnode-id="239"><div class="Comments_balloon" data-dcnode-id="248"><span data-dcnode-id="252" instrument_node=""> </span><a class="Comments_link" data-dcnode-id="250" href="#Comments_34" id="Comments_34" rel="nofollow"><span data-dcnode-id="251" instrument_node="">34</span></a><span data-dcnode-id="249" instrument_node=""> </span></div><div class="Comments_user" data-dcnode-id="245"><span data-dcnode-id="246" style="font-weight:bold;text-decoration:none;color:#006699;"><span data-dcnode-id="247" instrument_node="">Giambrone</span></span></div><div class="Comments_moderate" data-dcnode-id="242"><a data-dcnode-id="243" href="javascript:void(0);" onclick="confirmModerate('/multi/Ha-La/Italian-Americans.html','34');return false;" title="Report this comment as inappropriate"><img alt="Report this comment as inappropriate" border="0" data-dcnode-id="244" height="11" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.everyculture.com/images/comment.moderate.gif&amp;raw" width="11"></a></div><div class="Comments_date" data-dcnode-id="240"><span data-dcnode-id="241" instrument_node="">Aug 20, 2014 @ 9:21 pm</span></div></div><div class="Comments_text" data-dcnode-id="237"><span data-dcnode-id="238" instrument_node="">Trying to find my dads dads full name Giacomo J. Giambrone from Termini Sicily to Louisiana</span
