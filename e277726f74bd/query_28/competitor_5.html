      (where more Gypsies sell real estate and cars) has relatively few because
      of strict laws governing fortune-telling. Daughters of successful
      fortune-tellers traditionally become fortune-tellers whether or not they
      are interested. Their family business is part of their household.
    </span></p><span data-dcnode-id="1709" instrument_node="">
</span></div><span data-dcnode-id="1707" instrument_node="">
</span><div class="article_container" data-dcnode-id="1699"><span data-dcnode-id="1706" instrument_node="">
</span><h2 data-dcnode-id="1704"><span data-dcnode-id="1705" instrument_node="">
      Politics and Government
    </span></h2><span data-dcnode-id="1703" instrument_node="">
</span><p data-dcnode-id="1701"><span data-dcnode-id="1702" instrument_node="">
      Special attention from American government authorities has seldom
      benefitted Gypsies. Some states and districts maintain policies and
      statutes that prohibit fortune-tellers, require them to pay hundreds of
      dollars for annual licenses, or otherwise control activities in which
      Gypsies engage. Despite the unconstitutionality of such measures, some
      rules apply specifically to Gypsies by name. One excuse for this
      discrimination is the confusion between ethnic Gypsies and vagrants. Gypsy
      parents skeptical of non-Gypsy schooling have run afoul of truant
      officers. After a long history of avoidance of local authorities, Gypsies
      in the United States and elsewhere are becoming more politically active in
      defense of their civil and human rights; an international organization of
      Roma people has been recognized by the United Nations.
    </span></p><span data-dcnode-id="1700" instrument_node="">
</span></div><span data-dcnode-id="1698" instrument_node="">

</span><p data-dcnode-id="1671"><span data-dcnode-id="1675" instrument_node="">

      Romnichal (English Gypsies) who lived some in America, we can count
      Charlie Chaplin and Rita Hayworth. Ava Gardner, Michael Cain, and Sean
      Connery are reported to have Gypsy ancestry. Freddy Prinze (born Freddie
      Preutzel; 1954-1977), the late comedian and television star on 
      </span><i data-dcnode-id="1673"><span data-dcnode-id="1674" instrument_node="">

</span><div class="Comments_commentsbox" data-dcnode-id="138" style=""><div class="Comments_comment" data-dcnode-id="1326"><div class="Comments_info" data-dcnode-id="1333"><div class="Comments_balloon" data-dcnode-id="1342"><span data-dcnode-id="1346" instrument_node=""> </span><a class="Comments_link" data-dcnode-id="1344" href="#Comments_1" id="Comments_1" rel="nofollow"><span data-dcnode-id="1345" instrument_node="">1</span></a><span data-dcnode-id="1343" instrument_node=""> </span></div><div class="Comments_user" data-dcnode-id="1339"><span data-dcnode-id="1340" style="font-weight:bold;text-decoration:none;color:#006699;"><span data-dcnode-id="1341" instrument_node="">DLHooper</span></span></div><div class="Comments_moderate" data-dcnode-id="1336"><a data-dcnode-id="1337" href="javascript:void(0);" onclick="confirmModerate('/multi/Du-Ha/Gypsy-Americans.html','1');return false;" title="Report this comment as inappropriate"><img alt="Report this comment as inappropriate" border="0" data-dcnode-id="1338" height="11" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.everyculture.com/images/comment.moderate.gif&amp;raw" width="11"></a></div><div class="Comments_date" data-dcnode-id="1334"><span data-dcnode-id="1335" instrument_node="">Nov 15, 2006 @ 12:00 am</span></div></div><div class="Comments_text" data-dcnode-id="1327"><span data-dcnode-id="1332" instrument_node="">I find your article very informative.I am a Graduate Student in the Social Sciences, I've studied and researched many cultures with origins from Asia and Africa that reside in the US today.They all share something in common;and that is poverty,</span><br data-dcnode-id="1331"><span data-dcnode-id="1330" instrument_node="">
living secret lives,and facing racism everytime they walk out their doors.The US will never get to know the Hidden Americans.</span><br data-dcnode-id="1329"><span data-dcnode-id="1328" instrument_node="">
I believe they want to keep it that way too.</span></div></div><div class="Comments_comment Comments_comment_alt" data-dcnode-id="1303"><div class="Comments_info" data-dcnode-id="1312"><div class="Comments_balloon" data-dcnode-id="1321"><span data-dcnode-id="1325" instrument_node=""> </span><a class="Comments_link" data-dcnode-id="1323" href="#Comments_2" id="Comments_2" rel="nofollow"><span data-dcnode-id="1324" instrument_node="">2</span></a><span data-dcnode-id="1322" instrument_node=""> </span></div><div class="Comments_user" data-dcnode-id="1318"><span data-dcnode-id="1319" style="font-weight:bold;text-decoration:none;color:#006699;"><span data-dcnode-id="1320" instrument_node="">L. Wilson</span></span></div><div class="Comments_moderate" data-dcnode-id="1315"><a data-dcnode-id="1316" href="javascript:void(0);" onclick="confirmModerate('/multi/Du-Ha/Gypsy-Americans.html','2');return false;" title="Report this comment as inappropriate"><img alt="Report this comment as inappropriate" border="0" data-dcnode-id="1317" height="11" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.everyculture.com/images/comment.moderate.gif&amp;raw" width="11"></a></div><div class="Comments_date" data-dcnode-id="1313"><span data-dcnode-id="1314" instrument_node="">Nov 25, 2006 @ 1:13 pm</span></div></div><div class="Comments_text" data-dcnode-id="1304"><span data-dcnode-id="1311" instrument_node="">Very interesting article!  I actually have a Romanichal Gypsy background but it was kept from me and I only learned of it recently.  Again most likely in an effort to escape prejudice when my family came to Canada from the U.K.  I have since been reading and learning.  It does strike me as ironic that I have always had a love of several things that Gypsies are known for before I ever knew about my background (ex. flamenco, horses, etc.)  I so love the music. :)</span><br data-dcnode-id="1310"><span data-dcnode-id="1309" instrument_node="">
</span><br data-dcnode-id="1308"><span data-dcnode-id="1307" instrument_node="">
L. Wilson</span><br data-dcnode-id="1306"><span data-dcnode-id="1305" instrument_node="">
silken@cogeco.ca</span></div></div><div class="Comments_comment" data-dcnode-id="1286"><div class="Comments_info" data-dcnode-id="1289"><div class="Comments_balloon" data-dcnode-id="1298"><span data-dcnode-id="1302" instrument_node=""> </span><a class="Comments_link" data-dcnode-id="1300" href="#Comments_3" id="Comments_3" rel="nofollow"><span data-dcnode-id="1301" instrument_node="">3</span></a><span data-dcnode-id="1299" instrument_node=""> </span></div><div class="Comments_user" data-dcnode-id="1295"><span data-dcnode-id="1296" style="font-weight:bold;text-decoration:none;color:#006699;"><span data-dcnode-id="1297" instrument_node="">Dessie</span></span></div><div class="Comments_moderate" data-dcnode-id="1292"><a data-dcnode-id="1293" href="javascript:void(0);" onclick="confirmModerate('/multi/Du-Ha/Gypsy-Americans.html','3');return false;" title="Report this comment as inappropriate"><img alt="Report this comment as inappropriate" border="0" data-dcnode-id="1294" height="11" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.everyculture.com/images/comment.moderate.gif&amp;raw" width="11"></a></div><div class="Comments_date" data-dcnode-id="1290"><span data-dcnode-id="1291" instrument_node="">Mar 15, 2007 @ 9:21 pm</span></div></div><div class="Comments_text" data-dcnode-id="1287"><span data-dcnode-id="1288" instrument_node="">My fathers name was John Mullen, son of Elmer and Bertha Mullen.  Both my dads parents died when he was a teenager, I never knew my grandparents and there was little talk of them.  My uncles claimed to be gypsies.  The were jacks of all trades, as my dad was too.  My dad went to teh 6th grade in school, dropped out and started working.  He and his brothers either worked and owned paving comapnies, and trailer toter businesses.  My dad was a strikingly handsome man with dark black hair, hazel eyes and beautiful olive complexion.  I was always interested in the gypsy culture, and my dad and family and friends spoke a language they said was Romnichal.  We were never taught the language.  As reading this artical I have a lot in common with the gypsy culture, and do alot of things about cleanliness as they do, and some other key note things, that I was raised with, and thought that was just how your suppose to live, but obviously it came from my dads culture. In our family if one couldn't go or do something than none of us could, and we did everything as a family. I enjoyed the article. It was very informative.</span></div></div><div class="Comments_comment Comments_comment_alt" data-dcnode-id="1269"><div class="Comments_info" data-dcnode-id="1272"><div class="Comments_balloon" data-dcnode-id="1281"><span data-dcnode-id="1285" instrument_node=""> </span><a class="Comments_link" data-dcnode-id="1283" href="#Comments_4" id="Comments_4" rel="nofollow"><span data-dcnode-id="1284" instrument_node="">4</span></a><span data-dcnode-id="1282" instrument_node=""> </span></div><div class="Comments_user" data-dcnode-id="1278"><span data-dcnode-id="1279" style="font-weight:bold;text-decoration:none;color:#006699;"><span data-dcnode-id="1280" instrument_node="">nancy triggas</span></span></div><div class="Comments_moderate" data-dcnode-id="1275"><a data-dcnode-id="1276" href="javascript:void(0);" onclick="confirmModerate('/multi/Du-Ha/Gypsy-Americans.html','4');return false;" title="Report this comment as inappropriate"><img alt="Report this comment as inappropriate" border="0" data-dcnode-id="1277" height="11" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.everyculture.com/images/comment.moderate.gif&amp;raw" width="11"></a></div><div class="Comments_date" data-dcnode-id="1273"><span data-dcnode-id="1274" instrument_node="">Jul 11, 2007 @ 12:12 pm</span></div></div><div class="Comments_text" data-dcnode-id="1270"><span data-dcnode-id="1271" instrument_node="">I recently found out the family secret. My mothers side is Gypsy.My grandmother passed away with alot of secrets, I would hear my mother cry, asking for mor information, but unable to. My mother also keeps alot of secrets. But a picture was found of my g.greatgrandmother(gypsy). I started reading up, getting nowhere. But everything starts to make since- always feeling like i have to go home, when i was home. -my grndparents constantly moving-secrets in the family-mother wont give up recipies,she will show us ,but not the ingredients.My mother just found out that her father, isnt her real dad, it breaks her heart. My grndma took everything to grave. But all my relatives are europe, and there is a lot. I met them once, but to young to get names. Ineed help, i dont know where to start. I think we arminan gypsy.but ended up on the indonesa, the island of Java. anyinformation please nancy</span></div></div><div class="Comments_comment" data-dcnode-id="1252"><div class="Comments_info" data-dcnode-id="1255"><div class="Comments_balloon" data-dcnode-id="1264"><span data-dcnode-id="1268" instrument_node=""> </span><a class="Comments_link" data-dcnode-id="1266" href="#Comments_5" id="Comments_5" rel="nofollow"><span data-dcnode-id="1267" instrument_node="">5</span></a><span data-dcnode-id="1265" instrument_node=""> </span></div><div class="Comments_user" data-dcnode-id="1261"><span data-dcnode-id="1262" style="font-weight:bold;text-decoration:none;color:#006699;"><span data-dcnode-id="1263" instrument_node="">jack</span></span></div><div class="Comments_moderate" data-dcnode-id="1258"><a data-dcnode-id="1259" href="javascript:void(0);" onclick="confirmModerate('/multi/Du-Ha/Gypsy-Americans.html','5');return false;" title="Report this comment as inappropriate"><img alt="Report this comment as inappropriate" border="0" data-dcnode-id="1260" height="11" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.everyculture.com/images/comment.moderate.gif&amp;raw" width="11"></a></div><div class="Comments_date" data-dcnode-id="1256"><span data-dcnode-id="12 ulture.com/images/comment.moderate.gif&amp;raw" width="11"></a></div><div class="Comments_date" data-dcnode-id="1103"><span data-dcnode-id="1104" instrument_node="">Dec 31, 2009 @ 11:23 pm</span></div></div><div class="Comments_text" data-dcnode-id="1096"><span data-dcnode-id="1101" instrument_node="">This article is very interesting. Being non-Roma, or gadjo, I know I will never really know the Rom or Romanichal or Romany people. As a kid, I watched the highly romanticized old movies about stereotyped gypsies, and thought that was reality. This year, at 61, after accidentally discovering on the internet some news videos about the plight of the Rom in Italy, I developed an intense desire to learn about the reality of the Rom: their origins, history in Europe, Great Britain and the Americas, and especially their modern lives on those continents. I read everything I can find, especially the world news stories and Roma websites. I also watched several movies by Tony Gatif, who is part Roma, and viewed several videos on YouTube made and posted by Roma themselves, including all the viewers' comments. To my surprise, I even found many "Gypsy Weddings" on YouTube. All this, just trying to learn and get some insight into the Roma and their traditions and culture. Why? Don't really know why.  </span><br data-dcnode-id="1100"><span data-dcnode-id="1099" instrument_node="">

ng out about them, one being that I believe that I have gypsy blood. Like two other people that commented previously I am Puerto rican and was born in the US. I believe that I am descendant of Spanish gypsies because of my last name. I would love to know if I am if if I were it would be something that I would be proud of, and if not I would still love to find out more about this beautiful culture. :-)</span></div></div><div class="Comments_comment" data-dcnode-id="696"><div class="Comments_info" data-dcnode-id="699"><div class="Comments_balloon" data-dcnode-id="708"><span data-dcnode-id="712" instrument_node=""> </span><a class="Comments_link" data-dcnode-id="710" href="#Comments_37" id="Comments_37" rel="nofollow"><span data-dcnode-id="711" instrument_node="">37</span></a><span data-dcnode-id="709" instrument_node=""> </span></div><div class="Comments_user" data-dcnode-id="705"><span data-dcnode-id="706" style="font-weight:bold;text-decoration:none;color:#006699;"><span data-dcnode-id="707" instrument_node="">Louise</span></span></div><div class="Comments_moderate" data-dcnode-id="702"><a data-dcnode-id="703" href="javascript:void(0);" onclick="confirmModerate('/multi/Du-Ha/Gypsy-Americans.html','37');return false;" title="Report this comment as inappropriate"><img alt="Report this comment as inappropriate" border="0" data-dcnode-id="704" height="11" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.everyculture.com/images/comment.moderate.gif&amp;raw" width="11"></a></div><div class="Comments_date" data-dcnode-id="700"><span data-dcnode-id="701" instrument_node="">Aug 1, 2014 @ 3:03 am</span></div></div><div class="Comments_text" data-dcnode-id="697"><span data-dcnode-id="698" instrument_node="">I am very proud to be a  English Romnichel .  As we have settled here in the US and live as the country people, we keep our heritage alive by practicing only our Romni ways...</span></div></div><div class="Comments_comment Comments_comment_alt" data-dcnode-id="679"><div class="Comments_info" data-dcnode-id="682"><div class="Comments_balloon" data-dcnode-id="691"><span data-dcnode-id="695" instrument_node=""> </span><a class="Comments_link" data-dcnode-id="693" href="#Comments_38" id="Comments_38" rel="nofollow"><span data-dcnode-id="694" instrument_node="">38</span></a><span data-dcnode-id="692" instrument_node=""> </span></div><div class="Comments_user" data-dcnode-id="688"><span data-dcnode-id="689" style="font-weight:bold;text-decoration:none;color:#006699;"><span data-dcnode-id="690" instrument_node="">Charm</span></span></div><div class="Comments_moderate" data-dcnode-id="685"><a data-dcnode-id="686" href="javascript:void(0);" onclick="confirmModerate('/multi/Du-Ha/Gypsy-Americans.html','38');return false;" title="Report this comment as inappropriate"><img alt="Report this comment as inappropriate" border="0" data-dcnode-id="687" height="11" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.everyculture.com/images/comment.moderate.gif&amp;raw" width="11"></a></div><div class="Comments_date" data-dcnode-id="683"><span data-dcnode-id="684" instrument_node="">Sep 10, 2014 @ 9:21 pm</span></div></div><div class="Comments_text" data-dcnode-id="680"><span data-dcnode-id="681" instrument_node="">I'm so glad to have found this site. I thought I was the only person who's family took important things to their graves. I'm a German (Sinti) gypsy. My older family members wouldn't tell us about our heritage because they wanted us to blend with the other neighbors of German descent. We all knew we were different than others but we were never told exactly why. Our house was much cleaner than anyone else's, we weren't allowed to go out with friends, only family (cousins or siblings of similar ages mostly), the women were treated like 2nd class citizens, family was everything. You get the picture. When we were kids, the adults were very careful to not speak their "strange" language around us. If we overheard it, they'd tell us it was a mixture of German and Lithuanian and that the individual words meant things like "eggs, milkshakes, pickles, etc." So we never learned a single word! Now those older relatives are dead. Those same relatives spent a lot of time with a fortune-teller who lived in a trailer in the middle of nowhere. I'm not exactly sure, but she may have been a relative. Once again, no one would tell us. Enough rambling for me. So glad to see I'm not the only one who's real heritage was hidden from them.</span></div></div><div class="Comments_comment" data-dcnode-id="662"><div class="Comments_info" data-dcnode-id="665"><div class="Comments_balloon" data-dcnode-id="674"><span data-dcnode-id="678" instrument_node=""> </span><a class="Comments_link" data-dcnode-id="676" href="#Comments_39" id="Comments_39" rel="nofollow"><span data-dcnode-id="677" instrument_node="">39</span></a><span data-dcnode-id="675" instrument_node=""> </span></div><div class="Comments_user" data-dcnode-id="671"><span data-dcnode-id="672" style="font-weight:bold;text-decoration:none;color:#006699;"><span data-dcnode-id="673" instrument_node="">Andreea</span></span></div><div class="Comments_moderate" data-dcnode-id="668"><a data-dcnode-id="669" href="javascript:void(0);" onclick="confirmModerate('/multi/Du-Ha/Gypsy-Americans.html','39');return false;" title="Report this comment as inappropriate"><img alt="Report this comment as inappropriate" border="0" data-dcnode-id="670" height="11" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.everyculture.com/images/comment.moderate.gif&amp;raw" width="11"></a></div><div class="Comments_date" data-dcnode-id="666"><span data-dcnode-id="667" instrument_node="">Sep 23, 2014 @ 10:10 am</span></div></div><div class="Comments_text" data-dcnode-id="663"><span data-dcnode-id="664" instrument_node="">Hello, I am working on an international project and I need a list of US-based Roma organizations. Can anybod cnode-id="204"><a data-dcnode-id="205" href="javascript:void(0);" onclick="confirmModerate('/multi/Du-Ha/Gypsy-Americans.html','63');return false;" title="Report this comment as inappropriate"><img alt="Report this comment as inappropriate" border="0" data-dcnode-id="206" height="11" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.everyculture.com/images/comment.moderate.gif&amp;raw" width="11"></a></div><div class="Comments_date" data-dcnode-id="202"><span data-dcnode-id="203" instrument_node="">May 31, 2019 @ 1:01 am</span></div></div><div class="Comments_text" data-dcnode-id="199"><span data-dcnode-id="200" instrument_node="">There's a gypsy family living in my neighborhood and I've been trying to research American gypsy culture to better understand what influences their culture has upon their lifestyle and actions. I want to avoid making discriminatory conclusions about them... You see, the family is very violent. The house is quiet during the day but at night the children can be heard playing outside or being verbally abused up until 4 AM. There have been stolen cars and RV's they've been trafficking. I've heard the father speak to SUV's that roll up in their driveway in the middle of the night about a man he had murdered. I personally called the police when I witnessed their 10-year-old daughter fighting to get out of an SUV away from her father and another man. She was screaming and shouting, "get away from me," repeatable. Eventually, she escaped from the car, ran inside, and locked the door. Her father casually made goodbyes with the driver and proceeded to the front door pounding and yelling explicit things at her and when he got inside it only worsened. When Child Protective Services finally investigated them, they found that their youngest boy had been starved for several days. They had prevented him from eating anything as a punishment. My mother believes that their actions are typical for American Gypsies, but I'm skeptical to reach the same conclusion. I don't think it's fair to assume the bad image of this family represents the culture, but honestly, it's been so difficult to gather any research on the gypsy culture aside from how exclusive it is. I just wish I knew how to help those poor kids.</span></div></div><div class="Comments_comment Comments_comment_alt" data-dcnode-id="181"><div class="Comments_info" data-dcnode-id="184"><div class="Comments_balloon" data-dcnode-id="193"><span data-dcnode-id="197" instrument_node=""> </span><a class="Comments_link" data-dcnode-id="195" href="#Comments_64" id="Comments_64" rel="nofollow"><span data-dcnode-id="196" instrument_node="">64</span></a><span data-dcnode-id="194" instrument_node=""> </span></div><div class="Comments_user" data-dcnode-id="190"><span data-dcnode-id="191" style="font-weight:bold;text-decoration:none;color:#006699;"><span data-dcnode-id="192" instrument_node="">Pete Donnelly</span></span></div><div class="Comments_moderate" data-dcnode-id="187"><a data-dcnode-id="188" href="javascript:void(0);" onclick="confirmModerate('/multi/Du-Ha/Gypsy-Americans.html','64');return false;" title="Report this comment as inappropriate"><img alt="Report this comment as inappropriate" border="0" data-dcnode-id="189" height="11" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.everyculture.com/images/comment.moderate.gif&amp;raw" width="11"></a></div><div class="Comments_date" data-dcnode-id="185"><span data-dcnode-id="186" instrument_node="">Jun 12, 2019 @ 7:19 pm</span></div></div><div class="Comments_text" data-dcnode-id="182"><span data-dcnode-id="183" instrument_node="">Thanks for the article. My only comment is that, though it really doesn't matter, it seems to me that the term "American Gypsy" would be more accurate than "Gypsy American"</span></div></div><div class="Comments_comment" data-dcnode-id="156"><div class="Comments_info" data-dcnode-id="167"><div class="Comments_balloon" data-dcnode-id="176
