</span><h2 data-dcnode-id="5049"><span data-dcnode-id="5050" instrument_node="">Submissions are open for the 2022 Conference!</span></h2><span data-dcnode-id="5048" instrument_node="">
</span><p data-dcnode-id="5043"><span data-dcnode-id="5044" style="font-weight: 400"><span data-dcnode-id="5047" instrument_node="">Proposals for papers and panels are now being accepted for the 43rd annual SWPACA conference to take place February 23-26, 2022, in Albuquerque, New Mexico! One of the nation’s largest interdisciplinary academic conferences, SWPACA offers nearly 70 subject areas, each typically featuring multiple panels. New this year are areas in Italian American Cultures and Spy Culture!</span><br data-dcnode-id="5046"><span data-dcnode-id="5045" instrument_node="">
</span></span></p><span data-dcnode-id="5042" instrument_node="">
</span><p data-dcnode-id="5036"><span data-dcnode-id="5037" style="font-weight: 400"><span data-dcnode-id="5041" instrument_node="">SWPACA offers awards for the best graduate student papers in a variety of categories, as well as registration assistance to contingent faculty, graduate, and undergraduate students in the form of fellowships. For more information, visit the </span><a data-dcnode-id="5039" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//southwestpca.org/conference/graduate-student-awards/"><span data-dcnode-id="5040" instrument_node="">Graduate Student Award Page</span></a><span data-dcnode-id="5038" instrument_node="">.</span></span></p><span data-dcnode-id="5035" instrument_node="">
</span><p data-dcnode-id="5029"><span data-dcnode-id="5030" style="font-weight: 400"><span data-dcnode-id="5034" instrument_node="">Registration information for the conference is available at on the </span><a data-dcnode-id="5032" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//southwestpca.org/conference/registration/"><span data-dcnode-id="5033" instrument_node="">Registration Page</span></a><span data-dcnode-id="5031" instrument_node="">.</span></span></p><span data-dcnode-id="5028" instrument_node="">
</span><p data-dcnode-id="5023"><strong data-dcnode-id="5024"><span data-dcnode-id="5027" instrument_node="">Submission deadline is November 14, 2021!</span><br data-dcnode-id="5026"><span data-dcnode-id="5025" instrument_node="">
</span></strong></p><span data-dcnode-id="5022" instrument_node="">
</span><p data-dcnode-id="5011"><span data-dcnode-id="5017" style="font-weight: 400"><span data-dcnode-id="5021" instrument_node="">In addition, please check out the organization’s peer-reviewed, scholarly journal, </span><em data-dcnode-id="5019"><span data-dcnode-id="5020" instrument_node="">Dialogue: The Interdisciplinary Journal of Popular Culture and Pedagog</span></em><span data-dcnode-id="5018" instrument_node="">y, at </span></span><a data-dcnode-id="5014" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//journaldialogue.org/"><span data-dcnode-id="5015" style="font-weight: 400"><span data-dcnode-id="5016" instrument_node="">http://journaldialogue.org</span></span></a><span data-dcnode-id="5012" style="font-weight: 400"><span data-dcnode-id="5013" instrument_node="">.</span></span></p><span data-dcnode-id="5010" instrument_node="">
</span><p data-dcnode-id="5008"><span data-dcnode-id="5009" instrument_node="">We look forward to receiving your submissions!</span></p><span data-dcnode-id="5007" instrument_node="">

</span><p data-dcnode-id="4952"><span data-dcnode-id="4953" instrument_node="">The Adaptation: Literature, Film, and Culture area invites you to submit proposals for presentations that critically engage with the subject of adaptation. While the term “adaptation” most commonly refers to a film based upon or inspired by a novel (or the process of developing such a film), proposals for adaptations involving other media as source texts or final products are also welcome (for example, adaptations that involve art, theater, music, dance, television shows, video games, photographs, or comic books). &nbsp;Topics for paper proposals include, but are not limited to:</span></p><span data-dcnode-id="4951" instrument_node="">
</span><ul data-dcnode-id="4913"><span data-dcnode-id="4950" instrument_node="">
</span><li data-dcnode-id="4948"><span data-dcnode-id="4949" instrument_node="">adaptations of classic works.</span></li><span data-dcnode-id="4947" instrument_node="">
</span><li data-dcnode-id="4945"><span data-dcnode-id="4946" instrument_node="">contemporary adaptations.</span></li><span data-dcnode-id="4944" instrument_node="">
</span><li data-dcnode-id="4942"><span data-dcnode-id="4943" instrument_node="">theories of adaptation.</span></li><span data-dcnode-id="4941" instrument_node="">
</span><li data-dcnode-id="4939"><span data-dcnode-id="4940" instrument_node="">source texts with multiple adaptations.</span></li><span data-dcnode-id="4938" instrument_node="">
</span><li data-dcnode-id="4936"><span data-dcnode-id="4937" instrument_node="">representations of culture in adaptations.</span></li><span data-dcnode-id="4935" instrument_node="">
</span><li data-dcnode-id="4933"><span data-dcnode-id="4934" instrument_node="">cross-cultural adaptations.</span></li><span data-dcnode-id="4932" instrument_node="">
</span><li data-dcnode-id="4930"><span data-dcnode-id="4931" instrument_node="">the process of adaptation.</span></li><span data-dcnode-id="4929" instrument_node="">
</span><li data-dcnode-id="4927"><span data-dcnode-id="4928" instrument_node="">ethics of adaptation.</span></li><span data-dcnode-id="4926" instrument_node="">
</span><li data-dcnode-id="4924"><span data-dcnode-id="4925" instrument_node="">adaptation and audience engagement.</span></li><span data-dcnode-id="4923" instrument_node="">
</span><li data-dcnode-id="4921"><span data-dcnode-id="4922" instrument_node="">adaptation and aesthetics.</span></li><span data-dcnode-id="4920" instrument_node="">
</span><li data-dcnode-id="4918"><span data-dcnode-id="4919" instrument_node="">adaptations across generations.</span></li><span data-dcnode-id="4917" instrument_node="">
</span><li data-dcnode-id="4915"><span data-dcnode-id="4916" instrument_node="">adaptations and the film industry.</span></li><span data-dcnode-id="4914" instrument_node="">

</span><div class="toggle-content" data-dcnode-id="4697"><p data-dcnode-id="4762"></p><span data-dcnode-id="4761" instrument_node="">
</span><p data-dcnode-id="4759"><span data-dcnode-id="4760" instrument_node="">In addition to cartoons, animation involves experimental techniques that have secured for this medium a place among the most advanced artistic manifestations of the 20th and 21st centuries. Because, historically, animation has had a peripheral status, its examination blurs traditional disciplinary boundaries (cinema/animation; fine arts/moving arts) and problematizes well-established assumptions and categorizations (high/low arts, real/virtual, art/industry). Moreover, animation increasingly permeates today’s digitized visual culture.</span></p><span data-dcnode-id="4758" instrument_node="">
</span><p data-dcnode-id="4756"><span data-dcnode-id="4757" instrument_node="">This session will invite scholars to discuss the diversity of animation practice and theory. Possible topics for papers could include but not restricted to:</span></p><span data-dcnode-id="4755" instrument_node="">

</span><p data-dcnode-id="4658"><span data-dcnode-id="4665" instrument_node="">Over the course of five seasons and 62 episodes, </span><em data-dcnode-id="4663"><span data-dcnode-id="4664" instrument_node="">Breaking Bad </span></em><span data-dcnode-id="4662" instrument_node="">was been a hugely successful show on AMC. It concluded its run on September 29th, 2013 with a finale episode viewed by over 10 million people. It spawned numerous social media fan groups, engaged viewers by using the popular StorySync platform as a second screen option for those watching it on live television. It also resulted in the critically acclaimed prequel </span><em data-dcnode-id="4660"><span data-dcnode-id="4661" instrument_node="">Better Call Saul</span></em><span data-dcnode-id="4659" instrument_node="">, which began airing in 2015.</span></p><span data-dcnode-id="4657" instrument_node="">
</span><p data-dcnode-id="4649"><span data-dcnode-id="4656" instrument_node="">Proposal topics may include, but are not limited to, the following aspects of </span><em data-dcnode-id="4654"><span data-dcnode-id="4655" instrument_node="">BrBa</span></em><span data-dcnode-id="4653" instrument_node=""> and/or </span><em data-dcnode-id="4651"><span data-dcnode-id="4652" instrument_node="">BCS</span></em><span data-dcnode-id="4650" instrument_node="">:</span></p><span data-dcnode-id="4648" instrument_node="">

</span><p data-dcnode-id="4564"><b data-dcnode-id="4571"><span data-dcnode-id="4572" instrument_node="">Computer Culture</span></b><br data-dcnode-id="4570"><span data-dcnode-id="4569" instrument_node="">
Adam Crowley, PhD, Husson University, </span><a data-dcnode-id="4567" href="mailto:%20crowleya@husson.edu" rel="noopener" target="_blank"><span data-dcnode-id="4568" instrument_node="">crowleya@husson.edu</span></a><br data-dcnode-id="4566"><span data-dcnode-id="4565" instrument_node="">
</span></p><div class="shortcode-toggle toggle-open-description closed default border" data-dcnode-id="4408"><h4 class="toggle-trigger" data-dcnode-id="4561"><a data-dcnode-id="4562" href="#"><span data-dcnode-id="4563" instrument_node="">Open Description</span></a></h4><span data-dcnode-id="4560" instrument_node="">
</span><div class="toggle-content" data-dcnode-id="4411"><br data-dcnode-id="4559"><span data-dcnode-id="4558" instrument_node="">
Proposals for papers are now being accepted for the area of Computer Culture.</span><p data-dcnode-id="4557"></p><span data-dcnode-id="4556" instrument_node="">
</span><p data-dcnode-id="4554"><span data-dcnode-id="4555" instrument_node="">COMPUTER is broadly defined as any computational device, whether smartphone or abacus, and any form of information technology, including the origins of concepts of interactive text that may predate computational devices as traditionally conceived.</span></p><span data-dcnode-id="4553" instrument_node="">
</span><p data-dcnode-id="4551"><span data-dcnode-id="4552" instrument_node="">CULTURE is rooted in the concept of cultural meaning. We ask not just operational questions such as, “How do people communicate using computers?” but questions of meaning such as, “What does it mean when people communicate using computers instead of using pre-computer approaches to communication?” Along these lines, we are interested in communication as well as creative practices/applications and how computer technologies shape them.</span></p><span data-dcnode-id="4550" instrument_node="">
</span><p data-dcnode-id="4548"><span data-dcnode-id="4549" instrument_node="">“Computer Culture” can be understood in a variety of ways:</span></p><span data-dcnode-id="4547" instrument_node="">
</span><ol data-dcnode-id="4533"><span data-dcnode-id="4546" instrument_node="">
</span><li data-dcnode-id="4544"><span data-dcnode-id="4545" instrument_node="">the culture of the computer, that is, as computers interact with each other, what culture do they have of their own?</span></li><span data-dcnode-id="4543" instrument_node="">
</span><li data-dcnode-id="4541"><span data-dcnode-id="4542" instrument_node="">the culture around the computer, that is, (sub)cultures associated with the production, maintenance, use, and destruction of computers</span></li><span data-dcnode-id="4540" instrument_node="">
</span><li data-dcnode-id="4538"><span data-dcnode-id="4539" instrument_node="">the culture through the computer, that is, explicit treatment of how computer mediation influences cultural phenomena that exist or have existed in forms that did not involve computer mediation, and what these influences mean</span></li><span data-dcnode-id="4537" instrument_node="">
</span><li data-dcnode-id="4535"><span data-dcnode-id="4536" instrument_node="">the culture by the computer, that is, the ways in which new (sub)cultures or (sub)cultural phenomena have arisen because of computers and understandings of these given awareness of the nature and/or workings of computers</span></li><span data-dcnode-id="4534" instrument_node="">
</span></ol><span data-dcnode-id="4532" instrument_node="">
</span><p data-dcnode-id="4530"><span data-dcnode-id="4531" instrument_node="">Example questions associated with Computer Culture would include, but not be limited to:</span></p><span data-dcnode-id="4529" instrument_node="">
</span><ol data-dcnode-id="4518"><span data-dcnode-id="4528" instrument_node="">
</span><li data-dcnode-id="4526"><span data-dcnode-id="4527" instrument_node="">What implications are there because of the powerfulness of (computer/information) technology; and are these implications beneficial, detrimental, inevitable, or avoidable?</span></li><span data-dcnode-id="4525" instrument_node="">
</span><li data-dcnode-id="4523"><span data-dcnode-id="4524" instrument_node="">&nbsp;What are the cultural origins of computers, computer/information technologies, and practices associated with them? What is the descriptive and prescriptive outlook for the conditions of those cultural forces associated with those cultural origins?</span></li><span data-dcnode-id="4522" instrument_node="">
</span><li data-dcnode-id="4520"><span data-dcnode-id="4521" instrument_node="">&nbsp;How do cultural forces (such as changes from one generation to the next, trends in education or society, or other cultural phenomena) impact (and how are they impacted by) computer/information technologies/market-forces, and what do these impacts (in either direction or both) mean?</span></li><span data-dcnode-id="4519" instrument_node="">
</span></ol><span data-dcnode-id="4517" instrument_node="">
</span><p data-dcnode-id="4515"><span data-dcnode-id="4516" instrument_node="">Paper topics might include (but are not limited to) those that address:</span></p><span data-dcnode-id="4514" instrument_node="">
</span><ol data-dcnode-id="4473"><span data-dcnode-id="4513" instrument_node="">
</span><li data-dcnode-id="4511"><span data-dcnode-id="4512" instrument_node="">issues of (re)presentation through computers (website analysis and design);</span></li><span data-dcnode-id="4510" instrument_node="">
</span><li data-dcnode-id="4508"><span data-dcnode-id="4509" instrument_node="">methods of discourse involving computers (blogging, Twitter, social networks, YouTube, viral video, live feeds);</span></li><span data-dcnode-id="4507" instrument_node="">
</span><li data-dcnode-id="4505"><span data-dcnode-id="4506" instrument_node="">theories focused on the relationship between computers and culture, uses of computers in particular contexts and the impacts thereof (such as computers and pedagogy, online dating, virtual currencies, commerce, marketing, entertainment, etc.);</span></li><span data-dcnode-id="4504" instrument_node="">
</span><li data-dcnode-id="4502"><span data-dcnode-id="4503" instrument_node="">the relationship between computers and social forces (such as journalism, community engagement, social change, politics, social media alternatives, etc.);</span></li><span data-dcnode-id="4501" instrument_node="">
</span><li data-dcnode-id="4499"><span data-dcnode-id="4500" instrument_node="">security/privacy/fraud/surveillance and computers (such as security breaches, spam, scams, hoaxes, terrorism, etc.);</span></li><span data-dcnode-id="4498" instrument_node="">
</span><li data-dcnode-id="4496"><span data-dcnode-id="4497" instrument_node="">creative practice, web art, generative and digital art, virtual performance;</span></li><span data-dcnode-id="4495" instrument_node="">
</span><li data-dcnode-id="4493"><span data-dcnode-id="4494" instrument_node="">the self, the “second self,” identity formation/negotiation, anonymity;</span></li><span data-dcnode-id="4492" instrument_node="">
</span><li data-dcnode-id="4490"><span data-dcnode-id="4491" instrument_node="">“cyberkids,” internet youth cultures;</span></li><span data-dcnode-id="4489" instrument_node="">
</span><li data-dcnode-id="4487"><span data-dcnode-id="4488" instrument_node="">data visualization and digital geographies;</span></li><span data-dcnode-id="4486" instrument_node="">
</span><li data-dcnode-id="4484"><span data-dcnode-id="4485" instrument_node="">hashtag thinking, data organization and archives, search predictions/autocomplete functions;</span></li><span data-dcnode-id="4483" instrument_node="">
</span><li data-dcnode-id="4481"><span data-dcnode-id="4482" instrument_node="">cultural markers (such as social media trends, memes, internet fame);</span></li><span data-dcnode-id="4480" instrument_node="">
</span><li data-dcnode-id="4478"><span data-dcnode-id="4479" instrument_node="">digital divides (such as internet inclusion/exclusion, user diversity, interface/software architectures, etc.);</span></li><span data-dcnode-id="4477" instrument_node="">
</span><li data-dcnode-id="4475"><span data-dcnode-id="4476" instrument_node="">the general mediascape (such as issues of governance, mediation, ownership, the ‘public sphere’, crowdsourcing, etc.)</span></li><span data-dcnode-id="4474" instrument_node="">
</span></ol><span data-dcnode-id="4472" instrument_node="">
</span><p data-dcnode-id="4470"><span data-dcnode-id="4471" instrument_node="">While we will consider any relevant paper, we have a preference for those that involve transferable methodological approaches. This is an interdisciplinary conference, and other conference attendees would benefit from being able to adapt your research methods to their future research.</span></p><span data-dcnode-id="4469" instrument_node="">

</span><div class="toggle-content" data-dcnode-id="4276"><br data-dcnode-id="4325"><span data-dcnode-id="4324" instrument_node="">
Proposals for individual presentations and roundtable discussions are now being sought for review in the area of Film and History. Our area is concerned with the impact of motion pictures on our society and how films represent and interpret history. It is an exciting, vibrant area at the SWPACA conference, and we look forward to another outstanding round of presentations.&nbsp; Presentations can, for example, feature analyses of individual films and/or TV programs from historical perspectives, surveys of documents related to the production of films, or analyses of history and culture as explored through film. Genres could include historical films attempting to define history, propaganda films, documentaries, docudramas, newsreels and broadcast media, war films, music videos and concert films, reality shows, avant-garde, cinema vérité, actualités, and direct cinema. Proposals could consider some aspect of the intersections among film, history, society, and culture, exploring films as social and historical artifacts of the culture from which they arise as well as the role played by film in constructing, shaping, and re-imagining history. Papers may take a single film focus, make comparative considerations, or explore critical films focused on a given era, individual, or historical event.</span><p data-dcnode-id="4323"></p><span data-dcnode-id="4322" instrument_node="">
</span><p data-dcnode-id="4320"><span data-dcnode-id="4321" instrument_node="">Listed below are suggestions for possible presentations or panels, but topics not included here are also welcome.</span></p><span data-dcnode-id="4319" instrument_node="">

</span><p data-dcnode-id="3951"><span data-dcnode-id="3958" instrument_node="">The Area chair seeks papers/presentations on </span><i data-dcnode-id="3956"><span data-dcnode-id="3957" instrument_node="">Mystery Science Theater</span></i><span data-dcnode-id="3955" instrument_node=""> and the culture of riffing and Mash-up. In the fall of 1988 on a small public access channel, KTMA, in the St. Paul/Minneapolis area of Minnesota, a bizarre show appeared. It featured two hand-made, robot-appearing puppets and a man watching a movie and making comments to the screen. Little did its creator, Joel Hodgson, know that he had created a worldwide popular culture phenomenon known as </span><i data-dcnode-id="3953"><span data-dcnode-id="3954" instrument_node="">Mystery Science Theater 3000</span></i><span data-dcnode-id="3952" instrument_node=""> (MST). The show lasted 10 seasons and spawned a theatrical feature film.</span></p><span data-dcnode-id="3950" instrument_node="">
</span><p data-dcnode-id="3942"><span data-dcnode-id="3949" instrument_node="">Now riffing movies, television, cartoons, and the rise of the mash-up have become very popular modes of expression. In 2015, </span><i data-dcnode-id="3947"><span data-dcnode-id="3948" instrument_node="">Mystery Science Theater 3000</span></i><span data-dcnode-id="3946" instrument_node=""> was given new life due to the largest Kickstarter drive for a film related project. 2017 saw </span><i data-dcnode-id="3944"><span data-dcnode-id="3945" instrument_node="">Mystery Science Theater 3000: The Return</span></i><span data-dcnode-id="3943" instrument_node=""> as a hit series on Netflix.</span></p><span data-dcnode-id="3941" instrument_node="">
</span><p data-dcnode-id="3939"><span data-dcnode-id="3940" instrument_node="">Possible Topics</span></p><span data-dcnode-id="3938" instrument_node="">
</span><ul data-dcnode-id="3726"><span data-dcnode-id="3937" instrument_node="">
</span><li data-dcnode-id="3935"><span data-dcnode-id="3936" instrument_node="">The use of “name” actors in the reboot like Felicia Day, Patton Oswalt, Jonah Ray</span></li><span data-dcnode-id="3934" instrument_node="">
</span><li data-dcnode-id="3926"><span data-dcnode-id="3933" instrument_node="">Streaming services as a way to open up </span><i data-dcnode-id="3931"><span data-dcnode-id="3932" instrument_node="">Mystery Science Theater </span></i><span data-dcnode-id="3930" instrument_node="">and </span><i data-dcnode-id="3928"><span data-dcnode-id="3929" instrument_node="">Rifftrax </span></i><span data-dcnode-id="3927" instrument_node="">to newer audiences.</span></li><span data-dcnode-id="3925" instrument_node="">
</span><li data-dcnode-id="3923"><span data-dcnode-id="3924" instrument_node="">The higher production values on the reboot. Does this hinder or help the show?</span></li><span data-dcnode-id="3922" instrument_node="">

The Area Chair seeks paper and panel submissions to the Beats, Counterculture, and Hipsters area. &nbsp;Topics of interest might include Literature of the Beat Generation, Beat Culture and the Cold War, The Beats in Popular Culture, Women in the Beat Generation, African American Beats, Beat Appropriation of African American Culture, Moral Crisis of the Cold War and the Beat Generation, 1960s Counterculture (Hippies), Countercultural conflicts over race and gender, the Beat Movement and its influence on Popular Culture, Conservative Counterculture(s) of the postwar period, Literary Narratives of Counterculture and Utopianism, studies on Hipsters in the past and in their current incarnations, Beats in film and television, Beat influence on public performance spaces, the Beat Movement freedom of expression, and the influence of the Beats on stand-up comedy.</span><p data-dcnode-id="3309"></p><span data-dcnode-id="3308" instrument_node="">

Janet Brennan Croft, MLS, University of Northern Iowa, </span><a data-dcnode-id="3179" href="mailto:janet.croft@uni.edu"><span data-dcnode-id="3180" instrument_node="">janet.croft@uni.edu</span></a></p><span data-dcnode-id="3177" instrument_node="">
</span><div class="shortcode-toggle toggle-open-description closed default border" data-dcnode-id="3121"><h4 class="toggle-trigger" data-dcnode-id="3174"><a data-dcnode-id="3175" href="#"><span data-dcnode-id="3176" instrument_node="">Open Description</span></a></h4><span data-dcnode-id="3173" instrument_node="">
</span><div class="toggle-content" data-dcnode-id="3124"><a data-dcnode-id="3170" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//southwestpca.org/conference/call-for-papers/jbc134%40rulmail.rutgers.edu" rel="noopener" target="_blank"><br data-dcnode-id="3172"><span data-dcnode-id="3171" instrument_node="">
</span></a><span data-dcnode-id="3169" instrument_node="">The Crafting, Crafters, and Craft Culture area was launched at the 2018 conference to provide a home for considerations of the cultural labeling of craft in popular culture. Papers in this area might consider basic questions of art vs. craft as they intersect with gender, race, or profitability; cultural histories of specific crafts; special collections in libraries, archives, or museums related to crafts; depictions of craft and crafters in media; craft media stars and their effect on culture; historical surveys of craft supply stores and shopping. For 2022, we are particularly interested in the response of the craft community to both the pandemic and to protests for racial justice: mask making collectives, public art around either or both issues, archiving the art of the movement, and so on.</span><p data-dcnode-id="3168"></p><span data-dcnode-id="3167" instrument_node="">
</span><p data-dcnode-id="3165"><span data-dcnode-id="3166" instrument_node="">Some potential topics:</span></p><span data-dcnode-id="3164" instrument_node="">
</span><ul data-dcnode-id="3132"><span data-dcnode-id="3163" instrument_node="">
</span><li data-dcnode-id="3161"><span data-dcnode-id="3162" instrument_node="">Gender and craft (is it craft if a woman makes it? what makes a craft feminine or masculine?)</span></li><span data-dcnode-id="3160" instrument_node="">
</span><li data-dcnode-id="3158"><span data-dcnode-id="3159" instrument_node="">Copyright and knockoffs (what are copyright issues for crafts as opposed to other intellectual products? what effect do cheap foreign copies have on the market for and perception of craft?)</span></li><span data-dcnode-id="3157" instrument_node="">
</span><li data-dcnode-id="3155"><span data-dcnode-id="3156" instrument_node="">Craft research resources (hand-on museums, text and realia collections)</span></li><span data-dcnode-id="3154" instrument_node="">
</span><li data-dcnode-id="3152"><span data-dcnode-id="3153" instrument_node="">Crafting and anthropology (how is the history of craft treated as part of human development?)</span></li><span data-dcnode-id="3151" instrument_node="">
</span><li data-dcnode-id="3149"><span data-dcnode-id="3150" instrument_node="">Craftivism (pussy hats, yarnbombing, subversive X-stitch motifs, etc.)</span></li><span data-dcnode-id="3148" instrument_node="">
</span><li data-dcnode-id="3146"><span data-dcnode-id="3147" instrument_node="">Craft as business (professional vs amateur crafting, selling products vs instructions)</span></li><span data-dcnode-id="3145" instrument_node="">
</span><li data-dcnode-id="3143"><span data-dcnode-id="3144" instrument_node="">Martha Stewart and other craft stars and their effect on culture</span></li><span data-dcnode-id="3142" instrument_node="">
</span><li data-dcnode-id="3140"><span data-dcnode-id="3141" instrument_node="">The effect of the Internet on craft culture</span></li><span data-dcnode-id="3139" instrument_node="">
</span><li data-dcnode-id="3137"><span data-dcnode-id="3138" instrument_node="">Representation of crafters in media and literature: what they craft, why they craft, comparison to how artists are depicted</span></li><span data-dcnode-id="3136" instrument_node="">
</span><li data-dcnode-id="3134"><span data-dcnode-id="3135" instrument_node="">Cultural sensitivity: appropriation, appreciation, adaptation, assimilation</span></li><span data-dcnode-id="3133" instrument_node="">
</span></ul><span data-dcnode-id="3131" instrument_node="">
</span><p data-dcnode-id="3125"><a class="woo-sc-button custom small" data-dcnode-id="3128" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//register.southwestpca.org/southwestpca" style="background:;border-color:"><span class="woo-" data-dcnode-id="3129"><span data-dcnode-id="3130" instrument_node="">Submit Proposal</span></span></a><br data-dcnode-id="3127"><span data-dcnode-id="3126" instrument_node="">
</span></p></div><span data-dcnode-id="3122" instrument_node="">

</span><p data-dcnode-id="3110"><b data-dcnode-id="3117"><span data-dcnode-id="3118" instrument_node="">Crime and Culture</span></b><br data-dcnode-id="3116"><span data-dcnode-id="3115" instrument_node="">
Melissa Tackett-Gibson, PhD, University of Colorado Denver, </span><a data-dcnode-id="3113" href="mailto:melissa.tackettgibson@ucdenver.edu"><span data-dcnode-id="3114" instrument_node="">melissa.tackettgibson@ucdenver.edu</span></a><br data-dcnode-id="3112"><span data-dcnode-id="3111" instrument_node="">
</span></p><div class="shortcode-toggle toggle-open-description closed default border" data-dcnode-id="3092"><h4 class="toggle-trigger" data-dcnode-id="3107"><a data-dcnode-id="3108" href="#"><span data-dcnode-id="3109" instrument_node="">Open Description</span></a></h4><span data-dcnode-id="3106" instrument_node="">
</span><div class="toggle-content" data-dcnode-id="3095"><br data-dcnode-id="3105"><span data-dcnode-id="3104" instrument_node="">
Popular conceptions of law, justice, policing, criminal enterprise, the corrections system, and forensic investigations are broad topic areas that could be explored in the context of a variety of cultural landscapes. Traditional popular media, such as film, television, print or on-line text, graphic novels, comics and gaming platforms will fit well into this area, through both fiction and non-fiction genres. Interpretations related to cultural history, sociology, anthropology, art, and design are also appropriate and welcome in this area.</span><p data-dcnode-id="3103"></p><span data-dcnode-id="3102" instrument_node="">
</span><p data-dcnode-id="3096"><a class="woo-sc-button custom small" data-dcnode-id="3099" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//register.southwestpca.org/southwestpca" style="background:;border-color:"><span class="woo-" data-dcnode-id="3100"><span data-dcnode-id="3101" instrument_node="">Submit Proposal</span></span></a><br data-dcnode-id="3098"><span data-dcnode-id="3097" instrument_node="">
</span></p></div><span data-dcnode-id="3093" instrument_node="">

</span><p data-dcnode-id="3082"><strong data-dcnode-id="3087"><span data-dcnode-id="3088" instrument_node="">Esotericism, Occultism, and Magic</span></strong><br data-dcnode-id="3086"><span data-dcnode-id="3085" instrument_node="">
George Sieg, PhD, Southwestern Indian Polytechnic Institute, </span><a data-dcnode-id="3083" href="mailto:GeorgeJSieg@gmail.com"><span data-dcnode-id="3084" instrument_node="">GeorgeJSieg@gmail.com</span></a></p><span data-dcnode-id="3081" instrument_node="">
</span><div class="shortcode-toggle toggle-open-description closed default border" data-dcnode-id="2888"><h4 class="toggle-trigger" data-dcnode-id="3078"><a data-dcnode-id="3079" href="#"><span data-dcnode-id="3080" instrument_node="">Open Description</span></a></h4><span data-dcnode-id="3077" instrument_node="">
</span><div class="toggle-content" data-dcnode-id="2891"><p data-dcnode-id="3076"></p><span data-dcnode-id="3075" instrument_node="">
</span><p data-dcnode-id="3071"><strong data-dcnode-id="3073"><span data-dcnode-id="3074" instrument_node="">Esotericism, Occultism, and Magic </span></strong><span data-dcnode-id="3072" instrument_node="">invites proposals relating to magical worldviews, practices, and representations, as well as consciousness transformation, hidden meanings, the power of transmutation, and related phenomena. Characteristic beliefs and practices include: arcane symbolism, imagery, and aesthetics; unseen forces and spiritual intermediaries; synchronous patterns, non-ordinary causation, and anomalous processes. Examples of concepts and systems include Theosophy, Freemasonry, Rosicrucianism, Hermeticism, Gnosticism, Sufism, Satanism, Tantra, witchcraft, sorcery, demonology, astrology, alchemy, shamanism, yoga, parapsychology, and psychic and paranormal phenomena, along with beliefs and practices relating to altered states of consciousness, overlapping with the study of mysticism as well as New Age spirituality, channeling, positive thinking, manifest intention, guardian angels, and Ascended Masters. Esoteric, occult, and magical ideas, beliefs, and practices appear in every culture and civilization; contemporary media and popular culture have embraced them enthusiastically, yet at times have reacted against them. The impact of esotericism, occultism, and magic on genre formation/content and popular cultural perceptions has been profound.</span></p><span data-dcnode-id="3070" instrument_node="">
</span><p data-dcnode-id="3068"><span data-dcnode-id="3069" instrument_node="">Individual papers, organized panels, and roundtable discussions welcomed. Please contact the area chair with questions/suggestions.</span></p><span data-dcnode-id="3067" instrument_node="">
</span><p data-dcnode-id="3065"><span data-dcnode-id="3066" instrument_node="">Special themes discussed for 2022 may include the following, but all proposals suitable to the Area will be considered:</span></p><span data-dcnode-id="3064" instrument_node="">
</span><p data-dcnode-id="3062"><span data-dcnode-id="3063" instrument_node="">African-American, Afro-Caribbean, and African Traditional systems, the Black Esoteric Milieu, and Moorish Science; Islamic esotericism and magic in reception and representation; cross-cultural intersections and syncretisms; reconstructed/speculated historical practices in popular culture and fiction; nonlinearity and the weird; space/time and prophecy; scientistic representations in esotericism, occultism, and magic; the crossroads and the in-between; EOM and the mainstream; EOM and sectarianism, radicalism, deviance, reactionary movements, extremisms, “extremes” and “the extreme”; crime, violence, and transgression; initiation and ordeals; necromancy and representations of death; pain, suffering, asceticism and deprivation, indulgence and overload in practice and representation; quarantine, containment, and confinement; trauma, thought-reform, mind-control, and “brainwashing”, actual or projected/constructed; EOM and the abject; apotropeism and fear; archives, archaicism, and nostalgia; canonicity in representations and transmissions; music; fantasy and escapism in worldview, practice, and representation; scrying, divination, surveillance, the “seer” and conceptions/representations of the “watchers”; madness, insanity, mental illness, and behavioral disorder; conception and creation of archetypes and egregores; ontological pressure, self-similarity, meta-textuality, and fourth-wall-breaking as technique and representation in EOM</span></p><span data-dcnode-id="3061" instrument_node="">
</span><p data-dcnode-id="3059"><span data-dcnode-id="3060" instrument_node="">Sample Ideas for topics categorized by media:</span></p><span data-dcnode-id="3058" instrument_node="">
</span><p data-dcnode-id="3047"><span data-dcnode-id="3057" instrument_node="">Literature: Fiction by practitioners, such as Philip K. Dick, William S. Burroughs, C. S. Friedman. Books by practitioners (for example, Evola, Gurdjieff, Crowley, Anton LaVey, Gerald Gardner, Peter Carroll, Edgar Cayce). Influences and themes in magical realism, speculative fiction, gothic fiction, weird fiction, historical fiction. Fiction influential on practitioners, such as </span><em data-dcnode-id="3055"><span data-dcnode-id="3056" instrument_node="">Zanoni</span></em><span data-dcnode-id="3054" instrument_node="">, Goethe’s </span><em data-dcnode-id="3052"><span data-dcnode-id="3053" instrument_node="">Faust</span></em><span data-dcnode-id="3051" instrument_node="">, The </span><em data-dcnode-id="3049"><span data-dcnode-id="3050" instrument_node="">Illuminatus! </span></em><span data-dcnode-id="3048" instrument_node="">Trilogy. Historical representations of magicians, witches, and wizards, including stylized and mythic figures (Merlin, Morgan La Fey, Circe, Medea, Kostchie the Deathless, etc.), in genre fiction (contemporary Arthurian adaptations) or modernizations (Neil Gaiman). New Age and/or popular manifestation guides, such as The Secret. Conspiracist and/or extra-terrestrial cosmologies related to esoteric concepts (David Icke, the Seth transmissions to Jane Roberts, the Michael channelings, etc.).</span></p><span data-dcnode-id="3046" instrument_node="">
</span><p data-dcnode-id="3044"><span data-dcnode-id="3045" instrument_node="">Visual Art: Examples, Wassily Kandinsky, Austin Spare, Rosaleen Norton, Michael Bertiaux.</span></p><span data-dcnode-id="3043" instrument_node="">
</span><p data-dcnode-id="2973"><span data-dcnode-id="3042" instrument_node="">Film: Content as in </span><em data-dcnode-id="3040"><span data-dcnode-id="3041" instrument_node="">The Color Out of Space, </span></em><em data-dcnode-id="3038"><span data-dcnode-id="3039" instrument_node="">The VVitch</span></em><span data-dcnode-id="3037" instrument_node="">, </span><em data-dcnode-id="3035"><span data-dcnode-id="3036" instrument_node="">Hereditary</span></em><span data-dcnode-id="3034" instrument_node="">, </span><em data-dcnode-id="3032"><span data-dcnode-id="3033" instrument_node="">Midsommar</span></em><span data-dcnode-id="3031" instrument_node="">, </span><em data-dcnode-id="3029"><span data-dcnode-id="3030" instrument_node="">The Skeleton Key</span></em><span data-dcnode-id="3028" instrument_node="">, </span><em data-dcnode-id="3026"><span data-dcnode-id="3027" instrument_node="">The Serpent and the Rainbow</span></em><span data-dcnode-id="3025" instrument_node="">, </span><em data-dcnode-id="3023"><span data-dcnode-id="3024" instrument_node="">The Ninth Gate</span></em><span data-dcnode-id="3022" instrument_node="">, </span><em data-dcnode-id="3020"><span data-dcnode-id="3021" instrument_node="">The Conjuring </span></em><span data-dcnode-id="3019" instrument_node="">series, </span><em data-dcnode-id="3017"><span data-dcnode-id="3018" instrument_node="">The Wicker Man</span></em><span data-dcnode-id="3016" instrument_node="">; Gnostic allegories such as </span><em data-dcnode-id="3014"><span data-dcnode-id="3015" instrument_node="">The Matrix</span></em><span data-dcnode-id="3013" instrument_node="">, </span><em data-dcnode-id="3011"><span data-dcnode-id="3012" instrument_node="">Dark City</span></em><span data-dcnode-id="3010" instrument_node="">, </span><em data-dcnode-id="3008"><span data-dcnode-id="3009" instrument_node="">The Truman Show</span></em><span data-dcnode-id="3007" instrument_node="">; explorations of consciousness such as </span><em data-dcnode-id="3005"><span data-dcnode-id="3006" instrument_node="">eXistenZ</span></em><span data-dcnode-id="3004" instrument_node="">, </span><em data-dcnode-id="3002"><span data-dcnode-id="3003" instrument_node="">Altered States</span></em><span data-dcnode-id="3001" instrument_node="">, </span><em data-dcnode-id="2999"><span data-dcnode-id="3000" instrument_node="">2001 Space Odyssey</span></em><span data-dcnode-id="2998" instrument_node="">; representations of occult aesthetic, such as </span><em data-dcnode-id="2996"><span data-dcnode-id="2997" instrument_node="">Eyes Wide Shut</span></em><span data-dcnode-id="2995" instrument_node="">, or traumatic initiation, such as the </span><em data-dcnode-id="2993"><span data-dcnode-id="2994" instrument_node="">Saw</span></em><span data-dcnode-id="2992" instrument_node=""> series; stylized depictions of magicians, wizards, and witches (</span><em data-dcnode-id="2990"><span data-dcnode-id="2991" instrument_node="">Dr. Strange, Shazam, Maleficent, Oz, Warlock, Thulsa Doom </span></em><span data-dcnode-id="2989" instrument_node="">of</span><em data-dcnode-id="2987"><span data-dcnode-id="2988" instrument_node=""> Conan, Jafar</span></em><span data-dcnode-id="2986" instrument_node=""> of </span><em data-dcnode-id="2984"><span data-dcnode-id="2985" instrument_node="">Aladdin</span></em><span data-dcnode-id="2983" instrument_node="">) ; esoteric/occult films such those by Kenneth Anger and Alejandro Jodorowsky; pseudo- and crypto-history in fiction (</span><em data-dcnode-id="2981"><span data-dcnode-id="2982" instrument_node="">Tomb Raider, National Treasure</span></em><span data-dcnode-id="2980" instrument_node="">); New Age documentaries, such as </span><em data-dcnode-id="2978"><span data-dcnode-id="2979" instrument_node="">The Secret</span></em><span data-dcnode-id="2977" instrument_node="">; conspiracist receptions of esoteric and occult history, such as </span><em data-dcnode-id="2975"><span data-dcnode-id="2976" instrument_node="">Zeitgeist</span></em><span data-dcnode-id="2974" instrument_node="">.</span></p><span data-dcnode-id="2972" instrument_node="">
</span><p data-dcnode-id="2959"><span data-dcnode-id="2971" instrument_node="">Television: Theme and/or content examples </span><em data-dcnode-id="2969"><span data-dcnode-id="2970" instrument_node="">The Witcher, The Magicians, Stranger Things, </span></em><em data-dcnode-id="2967"><span data-dcnode-id="2968" instrument_node="">Shadowhunters, Game of Thrones, The Man in the High Castle, The Chilling Adventures of Sabrina, Twin Peaks, Westworld, Penny Dreadful, DaVinci’s Demons, American Horror Story, American Gods, Lucifer, True Detective</span></em><span data-dcnode-id="2966" instrument_node=""> (season one), </span><em data-dcnode-id="2964"><span data-dcnode-id="2965" instrument_node="">DaVinci’s Demons. Strange Angel</span></em><span data-dcnode-id="2963" instrument_node="">, fictionalized biography of occultist/magician Jack Parsons. Significant protagonists and anti-heroes; fourth-wall-breaking or uncanny figures, presented with esoteric, occult, or quasi-ritualistic aesthetics (Dr. Hannibal Lecter, Frank Underwood of </span><em data-dcnode-id="2961"><span data-dcnode-id="2962" instrument_node="">House of Cards</span></em><span data-dcnode-id="2960" instrument_node="">).</span></p><span data-dcnode-id="2958" instrument_node="">
</span><p data-dcnode-id="2950"><span data-dcnode-id="2957" instrument_node="">Comics / Graphic Novels: Contain esoteric, occult, and magical motifs and tropes. Some are actively esoteric; Grant Morrison claims </span><em data-dcnode-id="2955"><span data-dcnode-id="2956" instrument_node="">The Invisibles </span></em><span data-dcnode-id="2954" instrument_node="">and </span><em data-dcnode-id="2952"><span data-dcnode-id="2953" instrument_node="">Promethea </span></em><span data-dcnode-id="2951" instrument_node="">as personal magical workings; the graphic novels of Neil Gaiman embrace esoteric, occult, magical themes and characters.</span></p><span data-dcnode-id="2949" instrument_node="">
</span><p data-dcnode-id="2947"><span data-dcnode-id="2948" instrument_node="">Music: Specific artists (e.g.,Genesis P-Orridge, David Bowie, Coil, Marilyn Manson, Ghost, Watain, Dissection, Behemoth, Wardruna, Tori Amos, Loreena McKennitt, Gustav Holst), genres (black metal, viking/Nordic ambient, apocalyptic folk, witch house).</span></p><span data-dcnode-id="2946" instrument_node="">
</span><p data-dcnode-id="2932"><span data-dcnode-id="2945" instrument_node="">Video Games: Theme and content, e.g., </span><em data-dcnode-id="2943"><span data-dcnode-id="2944" instrument_node="">The Witcher, Silent Hill, Darkest Dungeon, Cultist Simulator, SOMA, Deus Ex, Dark Souls, Xenogears, Devil May Cry, Arx Fatalis</span></em><span data-dcnode-id="2942" instrument_node="">; pseudo-history </span><em data-dcnode-id="2940"><span data-dcnode-id="2941" instrument_node="">Assassin’s Creed, Tomb Raider</span></em><span data-dcnode-id="2939" instrument_node="">; historical worldviews, </span><em data-dcnode-id="2937"><span data-dcnode-id="2938" instrument_node="">Civilization VI </span></em><span data-dcnode-id="2936" instrument_node="">(secret societies), </span><em data-dcnode-id="2934"><span data-dcnode-id="2935" instrument_node="">Crusader Kings </span></em><span data-dcnode-id="2933" instrument_node="">(cults, witchcraft, demonolatry).</span></p><span data-dcnode-id="2931" instrument_node="">
</span><p data-dcnode-id="2917"><span data-dcnode-id="2930" instrument_node="">Tabletop Roleplaying Games: White Wolf’s </span><em data-dcnode-id="2928"><span data-dcnode-id="2929" instrument_node="">Mage</span></em><span data-dcnode-id="2927" instrument_node=""> (</span><em data-dcnode-id="2925"><span data-dcnode-id="2926" instrument_node="">World of Darkness </span></em><span data-dcnode-id="2924" instrument_node="">generally), Atlas Games </span><em data-dcnode-id="2922"><span data-dcnode-id="2923" instrument_node="">Unknown Armies</span></em><span data-dcnode-id="2921" instrument_node="">, Monte Cook’s </span><em data-dcnode-id="2919"><span data-dcnode-id="2920" instrument_node="">Invisible Sun</span></em><span data-dcnode-id="2918" instrument_node="">. RPGs have influenced the conception of magic in popular culture across media, and present extensive representation of magical figures.</span></p><span data-dcnode-id="2916" instrument_node="">
</span><p data-dcnode-id="2914"><span data-dcnode-id="2915" instrument_node="">Other possible topics:</span></p><span data-dcnode-id="2913" instrument_node="">
</span><p data-dcnode-id="2911"><span data-dcnode-id="2912" instrument_node="">Influence of esoteric/occult/magical/New Age beliefs, practices, symbols on popular culture and aesthetics (e.g., memes, clothing, tattoos, jewelry).</span></p><span data-dcnode-id="2910" instrument_node="">
</span><p data-dcnode-id="2905"><span data-dcnode-id="2909" instrument_node="">Influence of popular culture on esoteric/occult/magical beliefs, practices, and practitioners (e.g., Lovecraft mythos as actual magical practice, fictional gods of chaos in Chaos Magic, and real vampire communities using concepts from </span><em data-dcnode-id="2907"><span data-dcnode-id="2908" instrument_node="">Vampire:The Masquerade</span></em><span data-dcnode-id="2906" instrument_node="">).</span></p><span data-dcnode-id="2904" instrument_node="">
</span><p data-dcnode-id="2902"><span data-dcnode-id="2903" instrument_node="">Popular beliefs about esotericism/occultism/magic: fads, trends, moral panics, witch-hunts, witch-crazes, conspiracy theories (e.g., occult-conspiracism in QAnon; Illuminati paranoia, bloodline of the Holy Grail beliefs, Satanic Ritual Abuse scandals).</span></p><span data-dcnode-id="2901" instrument_node="">
</span><p data-dcnode-id="2899"><span data-dcnode-id="2900" instrument_node="">Reactions and polemics against esoteric/occult/magical beliefs and practices.</span></p><span data-dcnode-id="2898" instrument_node="">

</span></p><div class="shortcode-toggle toggle-open-description closed default border" data-dcnode-id="2832"><h4 class="toggle-trigger" data-dcnode-id="2874"><a data-dcnode-id="2875" href="#"><span data-dcnode-id="2876" instrument_node="">Open Description</span></a></h4><span data-dcnode-id="2873" instrument_node="">

Individual paper and panel proposals that explore topics connected to food, eating, and cooking in literature, film, and other popular and American culture are now being considered.&nbsp; Scholars, graduate students, teachers, foodies, and others interested in the intersection of culinary production/consumption and culture are encouraged to submit proposals.</span><p data-dcnode-id="2870"></p><span data-dcnode-id="2869" instrument_node="">
</span><p data-dcnode-id="2867"><span data-dcnode-id="2868" instrument_node="">Topics may address, but are not limited to:</span></p><span data-dcnode-id="2866" instrument_node="">

</span><li data-dcnode-id="2863"><span data-dcnode-id="2864" instrument_node="">Class/economics and food</span></li><span data-dcnode-id="2862" instrument_node="">

Annette Lynch, PhD, University of Northern Iowa, </span><a data-dcnode-id="2823" href="mailto:annette.lynch@uni.edu"><span data-dcnode-id="2824" instrument_node="">annette.lynch@uni.edu</span></a></p><span data-dcnode-id="2821" instrument_node="">
</span><div class="shortcode-toggle toggle-open-description closed default border" data-dcnode-id="2802"><h4 class="toggle-trigger" data-dcnode-id="2818"><a data-dcnode-id="2819" href="#"><span data-dcnode-id="2820" instrument_node="">Open Description</span></a></h4><span data-dcnode-id="2817" instrument_node="">
</span><div class="toggle-content" data-dcnode-id="2805"><p data-dcnode-id="2816"></p><span data-dcnode-id="2815" instrument_node="">
</span><p data-dcnode-id="2813"><span data-dcnode-id="2814" instrument_node="">Fashion, Style, Identity &amp; Popular Culture&nbsp;as a content area is specifically dedicated to the area of fashion scholarship as it interfaces with popular culture. This area of the conference offers an interdisciplinary environment for scholars from a range of disciplines including communication studies, fashion, textiles, photography, performance art, art history, sociology, human geography, anthropology, political science, environment studies, and business to present innovative scholarship in all aspects of fashion and popular culture relating to design, textiles, production, promotion, consumption and appearance-related products and services. Research and creative scholarship related to history, manufacturing, aesthetics, sustainability, sourcing, marketing, branding, merchandising, retailing, technology, psychological/sociological aspects of dress, style, body image, and cultural identities, as well as purchasing, shopping, and the ways and means consumers construct identity are encouraged. In particular scholars are encouraged to consider the role of fashion in both challenging as well as reinforcing cultural norms and in so doing its role in identity transformation and cultural change.</span></p><span data-dcnode-id="2812" instrument_node="">
</span><p data-dcnode-id="2806"><a class="woo-sc-button custom small" data-dcnode-id="2809" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//register.southwestpca.org/southwestpca" style="background:;border-color:"><span class="woo-" data-dcnode-id="2810"><span data-dcnode-id="2811" instrument_node="">Submit Proposal</span></span></a><br data-dcnode-id="2808"><span data-dcnode-id="2807" instrument_node="">
</span></p></div><span data-dcnode-id="2803" instrument_node="">

Suzanne M. Stauffer, PhD, Louisiana State University, </span><a data-dcnode-id="2794" href="mailto:stauffer@lsu.edu"><span data-dcnode-id="2795" instrument_node="">stauffer@lsu.edu</span></a><br data-dcnode-id="2793"><span data-dcnode-id="2792" instrument_node="">
</span></p><div class="shortcode-toggle toggle-open-description closed default border" data-dcnode-id="2730"><h4 class="toggle-trigger" data-dcnode-id="2788"><a data-dcnode-id="2789" href="#"><span data-dcnode-id="2790" instrument_node="">Open Description</span></a></h4><span data-dcnode-id="2787" instrument_node="">
</span><div class="toggle-content" data-dcnode-id="2733"><p data-dcnode-id="2786"></p><span data-dcnode-id="2785" instrument_node="">
</span><p data-dcnode-id="2783"><span data-dcnode-id="2784" instrument_node="">The Cultural Heritage Institutions in Popular Culture (formerly Libraries, Archives, Museums, and Digital Humanities in Popular Culture) area solicits proposals from librarians, archivists, curators, graduate students, faculty, collectors, writers, independent scholars, and other aficionados (yes! including people who use libraries, archives, and museums!) of popular culture and cultural heritage settings of all types. We also encourage proposals for slide shows, video presentations, panels, and roundtables organized around common themes.</span></p><span data-dcnode-id="2782" instrument_node="">
</span><p data-dcnode-id="2780"><span data-dcnode-id="2781" instrument_node="">Some suggested topics include:</span></p><span data-dcnode-id="2779" instrument_node="">
</span><ul data-dcnode-id="2744"><span data-dcnode-id="2778" instrument_node="">
</span><li data-dcnode-id="2746" style="list-style-type: none;"><span data-dcnode-id="2777" instrument_node="">
</span><ul data-dcnode-id="2748"><span data-dcnode-id="2776" instrument_node="">
</span><li data-dcnode-id="2774"><span data-dcnode-id="2775" instrument_node="">Histories and profiles of popular culture resources and collections in cultural heritage institutions; a chance to show off what you’ve got to scholars who might want to use it</span></li><span data-dcnode-id="2773" instrument_node="">
</span><li data-dcnode-id="2771"><span data-dcnode-id="2772" instrument_node="">Intellectual freedom or cultural sensitivity issues related to popular culture resources</span></li><span data-dcnode-id="2770" instrument_node="">
</span><li data-dcnode-id="2768"><span data-dcnode-id="2769" instrument_node="">Book clubs and reading groups, city- or campus-wide reading programs</span></li><span data-dcnode-id="2767" instrument_node="">
</span><li data-dcnode-id="2765"><span data-dcnode-id="2766" instrument_node="">Special exhibits of popular culture resources, outreach programs, etc. of cultural heritage institutions</span></li><span data-dcnode-id="2764" instrument_node="">
</span><li data-dcnode-id="2762"><span data-dcnode-id="2763" instrument_node="">Collection and organization of popular culture resources; marketing and ethical issues</span></li><span data-dcnode-id="2761" instrument_node="">
</span><li data-dcnode-id="2759"><span data-dcnode-id="2760" instrument_node="">Web 2.0, gaming, semantic web, etc.&nbsp;and their impact on libraries, archives, museums, and digital humanities collections</span></li><span data-dcnode-id="2758" instrument_node="">
</span><li data-dcnode-id="2756"><span data-dcnode-id="2757" instrument_node="">The role of public libraries, archives, museums, and other cultural heritage institutions in economic hard times and natural disasters</span></li><span data-dcnode-id="2755" instrument_node="">
</span><li data-dcnode-id="2753"><span data-dcnode-id="2754" instrument_node="">Oral history projects</span></li><span data-dcnode-id="2752" instrument_node="">
</span><li data-dcnode-id="2750"><span data-dcnode-id="2751" instrument_node="">Digital humanities and other digital/data-based projects on popular culture, the Southwest, and other relevant subjects, both those based in cultural heritage institutions&nbsp;and those in academia or other organizations.</span></li><span data-dcnode-id="2749" instrument_node="">
</span></ul><span data-dcnode-id="2747" instrument_node="">
</span></li><span data-dcnode-id="2745" instrument_node="">
</span></ul><span data-dcnode-id="2743" instrument_node="">
</span><p data-dcnode-id="2741"><span data-dcnode-id="2742" instrument_node="">We encourage proposals for panels and roundtables organized around common themes.</span></p><span data-dcnode-id="2740" instrument_node="">

</span><p data-dcnode-id="2718"><b data-dcnode-id="2725"><span data-dcnode-id="2726" instrument_node="">Lawyers and the Legal Profession in Popular Culture, LLC</span></b><br data-dcnode-id="2724"><span data-dcnode-id="2723" instrument_node="">
K. Dale Guffey, JD, Limestone University, </span><a data-dcnode-id="2721" href="mailto:kguffey@limestone.edu"><span data-dcnode-id="2722" instrument_node="">kguffey@limestone.edu</span></a><br data-dcnode-id="2720"><span data-dcnode-id="2719" instrument_node="">
</span></p><div class="shortcode-toggle toggle-open-description closed default border" data-dcnode-id="2628"><h4 class="toggle-trigger" data-dcnode-id="2715"><a data-dcnode-id="2716" href="#"><span data-dcnode-id="2717" instrument_node="">Open Description</span></a></h4><span data-dcnode-id="2714" instrument_node="">
</span><div class="toggle-content" data-dcnode-id="2631"><p data-dcnode-id="2713"></p><span data-dcnode-id="2712" instrument_node="">
</span><p data-dcnode-id="2710"><span data-dcnode-id="2711" instrument_node="">The area of Lawyers and the Legal System in Popular Culture is now accepting proposals for presentations for the upcoming Southwest Popular/American Culture Association conference.</span></p><span data-dcnode-id="2709" instrument_node="">
</span><p data-dcnode-id="2707"><span data-dcnode-id="2708" instrument_node="">The United States prides itself on being a country based on the rule of law, and often the courtroom is seen as the “great leveler” of socio-economic classes in America. Thus, Lady Justice is often depicted as being blindfolded while carrying both scales and a sword. In popular culture, lawyers run the spectrum, shown sometimes as high priests who adhere to the most rigid standards of truth seeking and ethical behavior (Atticus Finch, Jack McCoy) and sometimes shown as all-too-willing to be on the wrong side of the law (Tom Hagen, Saul Goodman).</span></p><span data-dcnode-id="2706" instrument_node="">
</span><p data-dcnode-id="2704"><span data-dcnode-id="2705" instrument_node="">Suggested topics may include, but are certainly not limited to:</span></p><span data-dcnode-id="2703" instrument_node="">
</span><ul data-dcnode-id="2639"><span data-dcnode-id="2702" instrument_node="">
</span><li data-dcnode-id="2697"><span data-dcnode-id="2701" instrument_node="">Actual people in the legal profession who have been fictionalized, such as Daniel Webster, Clarence Darrow (as Henry Drummond in </span><em data-dcnode-id="2699"><span data-dcnode-id="2700" instrument_node="">Inherit the Wind)</span></em><span data-dcnode-id="2698" instrument_node="">, or Erin Brockovich</span></li><span data-dcnode-id="2696" instrument_node="">
</span><li data-dcnode-id="2692"><span data-dcnode-id="2695" instrument_node="">Defending unpopular clients, such as the war criminals in </span><em data-dcnode-id="2693"><span data-dcnode-id="2694" instrument_node="">Judgment at Nuremberg</span></em></li><span data-dcnode-id="2691" instrument_node="">

</span><div class="toggle-content" data-dcnode-id="2593"><p data-dcnode-id="2611"></p><span data-dcnode-id="2610" instrument_node="">
</span><p data-dcnode-id="2601"><span data-dcnode-id="2609" instrument_node="">In her introduction to </span><i data-dcnode-id="2607"><span data-dcnode-id="2608" instrument_node="">21</span></i><i data-dcnode-id="2605"><span data-dcnode-id="2606" instrument_node="">st</span></i><i data-dcnode-id="2603"><span data-dcnode-id="2604" instrument_node=""> Century Motherhood: Experience, Identity, Policy, Agency</span></i><span data-dcnode-id="2602" instrument_node="">, Andrea O’Reilly identifies three categories of inquiry for scholars engaged in motherhood studies: “motherhood as institution, motherhood as experience, and motherhood as identity or subjectivity” (2). The panel area chairpersons seek papers that study one or more of O’Reilly’s motherhood categories by exploring how popular culture representations of mothers complicate notions of societal ideals of motherhood, mothering performance, or mothering identity. We invite papers that consider motherhood depictions in popular media such as television, movies, magazines, advertising, art, government policy, child-rearing manuals, photography, online media, and literature. We particularly encourage papers that also take up issues of intersectionality and mothering including gender, sexuality, race, ethnicity, age, ability, citizenship, nationality, and social class.</span></p><span data-dcnode-id="2600" instrument_node="">

</span><p data-dcnode-id="2571"><span data-dcnode-id="2572" instrument_node="">As popular genres, Steampunk and Neo-Victorian fiction reflect a complex set of changes in contemporary society. At the same time, they link with classic traditions in science fiction and Victorian history. Submissions are welcome that address Steampunk and Neo-Victorian fiction from a variety of potential perspectives.</span></p><span data-dcnode-id="2570" instrument_node="">
</span><p data-dcnode-id="2568"><span data-dcnode-id="2569" instrument_node="">Some possibilities:</span></p><span data-dcnode-id="2567" instrument_node="">

</span><li data-dcnode-id="2564"><span data-dcnode-id="2565" instrument_node="">Research addressing or applying theoretical or structural topics to the genre.</span></li><span data-dcnode-id="2563" instrument_node="">
</span><li data-dcnode-id="2561"><span data-dcnode-id="2562" instrument_node="">Work focusing on any aspects of Steampunk such as technology, fashion, history, popularity, or anything else you deem worthy of close examination.</span></li><span data-dcnode-id="2560" instrument_node="">
</span><li data-dcnode-id="2558"><span data-dcnode-id="2559" instrument_node="">Work applying theoretical perspectives to representations &nbsp;of characters in any particular Steampunk or Neo-Victorian book, or novel series. This might include a wide range of racial, ethnic, gender, and sexual identities.</span></li><span data-dcnode-id="2557" instrument_node="">
</span><li data-dcnode-id="2555"><span data-dcnode-id="2556" instrument_node="">Work on international writers of Steampunk and/or Neo-Victorian literature</span></li><span data-dcnode-id="2554" instrument_node="">

</span></p><div class="shortcode-toggle toggle-open-description closed default border" data-dcnode-id="773"><h4 class="toggle-trigger" data-dcnode-id="794"><a data-dcnode-id="795" href="#"><span data-dcnode-id="796" instrument_node="">Open Description</span></a></h4><span data-dcnode-id="793" instrument_node="">
</span><div class="toggle-content" data-dcnode-id="776"><br data-dcnode-id="792"><span data-dcnode-id="791" instrument_node="">
We invite proposals for individual or panel presentations that relate to the teaching, practice, and/or analysis of how rhetoric and technical communications/technical writing influence or are influenced by culture.</span><p data-dcnode-id="790"></p><span data-dcnode-id="789" instrument_node="">
</span><p data-dcnode-id="787"><span data-dcnode-id="788" instrument_node="">We look forward to a variety of ideas and emphases, though papers of similar orientations will be grouped together in sessions whenever possible. Papers may focus on ways in which popular and American culture inform the pedagogical, theoretical, and practical work of rhetoric and technical communication.</span></p><span data-dcnode-id="786" instrument_node="">
</span><p data-dcnode-id="784"><span data-dcnode-id="785" instrument_node="">Sample emphases (these are not limitations, just ideas): Rhetoric and Civic Humanism, Poetics and Rhetoric in Everyday Life, Technical Writing for Non-Techies, Rhetorical Analysis in Political Campaigns, Rhetorical Analyses across Cultures and Disciplines, Technical Writing and Real Life.</span></p><span data-dcnode-id="783" instrument_node="">
</span><p data-dcnode-id="777"><a class="woo-sc-button custom small" data-dcnode-id="780" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//register.southwestpca.org/southwestpca" style="background:;border-color:"><span class="woo-" data-dcnode-id="781"><span data-dcnode-id="782" instrument_node="">Submit Proposal</span></span></a><br data-dcnode-id="779"><span data-dcnode-id="778" instrument_node="">
</span></p></div><span data-dcnode-id="774" instrument_node="">

</span><h4 data-dcnode-id="765"><img alt="sci-fi" class="alignleft size-full wp-image-21712" data-dcnode-id="766" height="190" sizes="(max-width: 765px) 100vw, 765px" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//southwestpca.org/wp-content/uploads/2013/04/sci-fi1.png&amp;raw" srcset="https://southwestpca.org/wp-content/uploads/2013/04/sci-fi1.png 765w, https://southwestpca.org/wp-content/uploads/2013/04/sci-fi1-300x74.png 300w, https://southwestpca.org/wp-content/uploads/2013/04/sci-fi1-300x74@2x.png 600w" width="765"></h4><span data-dcnode-id="764" instrument_node="">

</span><p data-dcnode-id="752"><b data-dcnode-id="759"><span data-dcnode-id="760" instrument_node="">Apocalypse, Dystopia, and Disaster in Culture</span></b><br data-dcnode-id="758"><span data-dcnode-id="757" instrument_node="">
Shane Trayers, PhD, Middle Georgia State University </span><a data-dcnode-id="755" href="mailto:%20trayers.shane@gmail.com" rel="noopener" target="_blank"><span data-dcnode-id="756" instrument_node="">trayers.shane@gmail.com</span></a><br data-dcnode-id="754"><span data-dcnode-id="753" instrument_node="">
</span></p><div class="shortcode-toggle toggle-open-description closed default border" data-dcnode-id="654"><h4 class="toggle-trigger" data-dcnode-id="749"><a data-dcnode-id="750" href="#"><span data-dcnode-id="751" instrument_node="">Open Description</span></a></h4><span data-dcnode-id="748" instrument_node="">
</span><div class="toggle-content" data-dcnode-id="657"><p data-dcnode-id="747"></p><span data-dcnode-id="746" instrument_node="">
</span><p data-dcnode-id="744"><span data-dcnode-id="745" instrument_node="">The Apocalypse, Dystopia, and Disaster in Culture Area is calling for papers about anything apocalyptic, dystopian, or disaster-related.&nbsp; This can be in movies, television, literature, graphic novels, or any other cultural examples of disaster, dystopia, or the end of the world.</span></p><span data-dcnode-id="743" instrument_node="">
</span><p data-dcnode-id="727"><span data-dcnode-id="742" instrument_node="">This year did not disappoint in these topics, including </span><em data-dcnode-id="740"><span data-dcnode-id="741" instrument_node="">Good Omens, Stranger Things, </span></em><em data-dcnode-id="738"><span data-dcnode-id="739" instrument_node="">The</span></em><span data-dcnode-id="737" instrument_node=""> </span><em data-dcnode-id="735"><span data-dcnode-id="736" instrument_node="">Handmaid’s Tale</span></em><span data-dcnode-id="734" instrument_node="">, </span><em data-dcnode-id="732"><span data-dcnode-id="733" instrument_node="">Bird Box</span></em><span data-dcnode-id="731" instrument_node="">, </span><em data-dcnode-id="729"><span data-dcnode-id="730" instrument_node="">I Think We’re Alone Now, Jurassic Park, Westworld,</span></em><span data-dcnode-id="728" instrument_node=""> and many, many more. This area is interested in all types of theories, both real world and fictional.</span></p><span data-dcnode-id="726" instrument_node="">
</span><p data-dcnode-id="719"><span data-dcnode-id="725" instrument_node="">Please note that this area is specifically for those papers related to the apocalypse, dystopia, and/or disaster.&nbsp; For example, there is now a separate Zombie Culture area at the conference, so if the proposal is about the “zombie apocalypse” </span><em data-dcnode-id="723"><span data-dcnode-id="724" instrument_node="">it goes here</span></em><span data-dcnode-id="722" instrument_node="">, but if it is just about zombies, then it goes to that area. See the Zombie Culture CFP at </span><a data-dcnode-id="720" data-saferedirecturl="https://www.google.com/url?hl=en&amp;q=http://southwestpca.org/conference/call-for-papers/&amp;source=gmail&amp;ust=1533239951479000&amp;usg=AFQjCNFp7C_cXpGI4oBqWUbdHwzdB2WRHA" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//southwestpca.org/conference/call-for-papers/"><span data-dcnode-id="721" instrument_node="">http://southwestpca.org/conference/call-for-papers/</span></a></p><span data-dcnode-id="718" instrument_node="">
</span><p data-dcnode-id="716"><span data-dcnode-id="717" instrument_node="">Ideas for topics on Apocalypse, Dystopia, and Disaster (Not a Comprehensive List):</span></p><span data-dcnode-id="715" instrument_node="">
</span><p data-dcnode-id="706"><span data-dcnode-id="714" instrument_node="">Film and TV: </span><em data-dcnode-id="712"><span data-dcnode-id="713" instrument_node="">Good Omens, The Society, The Rim of the World, </span></em><em data-dcnode-id="708"><span data-dcnode-id="711" instrument_node="">Mortal Engines, Westworld, The Expanse, The Handmaid’s Tale, I Think We’re Alone Now, Ready Player One, Stranger Things, A Quiet Place, Bird Box, Salvation, Star Trek Discovery, Into the Badlands, OA, The Man in the High Castle, Resident Evil, Ghostbusters, Twelve Monkeys, The Scorch Trials, Jurassic World, Mad Max, Mad Max: Fury Road, The Killjoys, Dark Matter, Between, Edge of Tomorrow, The Giver, Godzilla, The 100, </span><i data-dcnode-id="709"><span data-dcnode-id="710" instrument_node="">Divergent, Sharknado, This is the End, After Earth, Adventure Time, Falling Skies, The Walking Dead, Resident Evil, Terminator, 2012, The Core, Daybreakers, Zombieland, Night of the Comet, The War of the Worlds, Last Night, The Road, Dark Angel, Jericho, Children of Men, The Matrix, Crimson Tide, Invasion, V, Contagion, Dante’s Peak, The Island, The Day the Earth Stood Still </span></i></em><span data-dcnode-id="707" instrument_node="">and many more.</span></p><span data-dcnode-id="705" instrument_node="">
</span><p data-dcnode-id="679"><span data-dcnode-id="704" instrument_node="">Literature</span><em data-dcnode-id="681"><span data-dcnode-id="703" instrument_node="">: </span><i data-dcnode-id="701"><span data-dcnode-id="702" instrument_node="">Life as We Knew It</span></i><span data-dcnode-id="700" instrument_node="">,&nbsp;</span><i data-dcnode-id="698"><span data-dcnode-id="699" instrument_node="">When She Woke</span></i><span data-dcnode-id="697" instrument_node="">,&nbsp;</span><i data-dcnode-id="695"><span data-dcnode-id="696" instrument_node="">Ready Player One</span></i><span data-dcnode-id="694" instrument_node="">,&nbsp;</span><i data-dcnode-id="692"><span data-dcnode-id="693" instrument_node="">Find Me</span></i><span data-dcnode-id="691" instrument_node="">,&nbsp;</span><i data-dcnode-id="689"><span data-dcnode-id="690" instrument_node="">The 5th Wave , Feed</span></i><span data-dcnode-id="688" instrument_node="">,&nbsp;</span><i data-dcnode-id="686"><span data-dcnode-id="687" instrument_node="">&nbsp;Uglies, J,Station Eleven</span></i><span data-dcnode-id="685" instrument_node="">,&nbsp;</span><i data-dcnode-id="683"><span data-dcnode-id="684" instrument_node="">Brave New World, The Bees, Rot and Ruin, Matched, Infinite Jest, Oryx and Crake, Breathe, World War Z, Pesthouse, The Road, Children of Men, Alas Babylon, The Stand</span></i><span data-dcnode-id="682" instrument_node=""> </span></em><span data-dcnode-id="680" instrument_node="">and others.</span></p><span data-dcnode-id="678" instrument_node="">
</span><p data-dcnode-id="674"><span data-dcnode-id="677" instrument_node="">Graphic Novels and video games: </span><em data-dcnode-id="675"><span data-dcnode-id="676" instrument_node="">Y: The Last Man, Left 4 Dead, Resident Evil, The Walking Dead</span></em></p><span data-dcnode-id="673" instrument_node="">
</span><p data-dcnode-id="671"><span data-dcnode-id="672" instrument_node="">Real examples: “Prepper” communities and publications, political rhetoric, natural disasters, Paris or Orlando shootings, or Atomic culture.</span></p><span data-dcnode-id="670" instrument_node="">
</span><p data-dcnode-id="668"><span data-dcnode-id="669" instrument_node="">Apocalyptic rhetoric in politics and other areas</span></p><span data-dcnode-id="667" instrument_node="">
</span><p data-dcnode-id="665"><span data-dcnode-id="666" instrument_node="">Or any other works/topics related to apocalypse, dystopia, or disaster!</span></p><span data-dcnode-id="664" instrument_node="">
</span><p data-dcnode-id="658"><a class="woo-sc-button custom small" data-dcnode-id="661" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//register.southwestpca.org/southwestpca" style="background:;border-color:"><span class="woo-" data-dcnode-id="662"><span data-dcnode-id="663" instrument_node="">Submit Proposal</span></span></a><br data-dcnode-id="660"><span data-dcnode-id="659" instrument_node="">
