Christopher Bell, PhD, University of Colorado – Colorado Springs, </span><a data-dcnode-id="645" href="mailto:%20cbell3@uccs.edu" rel="noopener" target="_blank"><span data-dcnode-id="646" instrument_node="">cbell3@uccs.edu</span></a><br data-dcnode-id="644"><span data-dcnode-id="643" instrument_node="">
</span></p><div class="shortcode-toggle toggle-open-description closed default border" data-dcnode-id="618"><h4 class="toggle-trigger" data-dcnode-id="639"><a data-dcnode-id="640" href="#"><span data-dcnode-id="641" instrument_node="">Open Description</span></a></h4><span data-dcnode-id="638" instrument_node="">
</span><div class="toggle-content" data-dcnode-id="621"><br data-dcnode-id="637"><span data-dcnode-id="636" instrument_node="">
SWPACA invites scholars to submit papers to the vibrant and diverse Harry Potter Studies area. The Harry Potter Studies area is an interdisciplinary/cross-disciplinary field that focuses on both the novel and filmic versions of J.K. Rowling’s work. Papers may address the work as a whole, specific characters, themes, relationships, social and/or cultural implications, individual texts within the series, etc.</span><p data-dcnode-id="635"></p><span data-dcnode-id="634" instrument_node="">
</span><p data-dcnode-id="632"><span data-dcnode-id="633" instrument_node="">Paper and/or panel proposals are welcomed. Any and all types of scholars, including independent scholars, graduate students, non-tenured, tenure-track, tenured and emeritus faculty are encouraged to submit. The Harry Potter Studies area aims to emphasize a diversity of scholarship opportunities and is open to innovation in approach to research about the Potterverse. Networking among Potter scholars with an eye toward post-conference collaboration and publication is a key goal of the Harry Potter Studies Area.</span></p><span data-dcnode-id="631" instrument_node="">
</span><p data-dcnode-id="629"><span data-dcnode-id="630" instrument_node="">Papers from the Harry Potter Studies area presented at conferences since 2012 have been gathered into four (4) published, edited volumes released in 2013, 2014, 2015, and 2016. We are an area committed to publication!</span></p><span data-dcnode-id="628" instrument_node="">
</span><p data-dcnode-id="622"><a class="woo-sc-button custom small" data-dcnode-id="625" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//register.southwestpca.org/southwestpca" style="background:;border-color:"><span class="woo-" data-dcnode-id="626"><span data-dcnode-id="627" instrument_node="">Submit Proposal</span></span></a><br data-dcnode-id="624"><span data-dcnode-id="623" instrument_node="">
</span></p></div><span data-dcnode-id="619" instrument_node="">
</span></div><p data-dcnode-id="616"></p><span data-dcnode-id="615" instrument_node="">
</span><p data-dcnode-id="599"><b data-dcnode-id="613"><span data-dcnode-id="614" instrument_node="">Science Fiction and Fantasy – General</span></b><br data-dcnode-id="612"><span data-dcnode-id="611" instrument_node="">
Janet Brennan Croft, MLS, University of Northern Iowa, </span><a data-dcnode-id="609" href="mailto:janet.croft@uni.edu"><span data-dcnode-id="610" instrument_node="">janet.croft@uni.edu</span></a><br data-dcnode-id="608"><span data-dcnode-id="607" instrument_node="">
Follow the Science Fiction and Fantasy area on Facebook at </span><a data-dcnode-id="605" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.facebook.com/swtxsff" rel="noopener" target="_blank"><span data-dcnode-id="606" instrument_node="">www.facebook.com/swtxsff</span></a><span data-dcnode-id="604" instrument_node=""> and on Twitter </span><a data-dcnode-id="602" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//twitter.com/swtxsffchairs" rel="noopener" target="_blank"><span data-dcnode-id="603" instrument_node="">@swtxsffchairs</span></a><br data-dcnode-id="601"><span data-dcnode-id="600" instrument_node="">
</span></p><div class="shortcode-toggle toggle-open-description closed default border" data-dcnode-id="578"><h4 class="toggle-trigger" data-dcnode-id="596"><a data-dcnode-id="597" href="#"><span data-dcnode-id="598" instrument_node="">Open Description</span></a></h4><span data-dcnode-id="595" instrument_node="">
</span><div class="toggle-content" data-dcnode-id="581"><br data-dcnode-id="594"><span data-dcnode-id="593" instrument_node="">
The Science Fiction and Fantasy (General) Area Chair invites paper or panel proposals on any aspect of science fiction in literature, film, or other media. Any and all topics will be considered. Past presentations have covered a variety of topics – including British SFF TV, fan studies, race, gender, sexuality, socio-economic class, pedagogy, adaptation, and a variety of texts. We are interested in thematically or textually linked panels of three or four papers as well as individual submissions. For 2022, we will be particularly interested in proposals about science fiction and fantasy that address pandemics, racial justice, or the intersection of these issues.</span><p data-dcnode-id="592"></p><span data-dcnode-id="591" instrument_node="">
</span><p data-dcnode-id="589"><span data-dcnode-id="590" instrument_node="">Please look through the list of other conference areas on the SWPACA website, since subjects such as apocalyptic studies, computer games, the works of Joss Whedon, and the television show Supernatural all have separate areas. You should direct your proposal accordingly.</span></p><span data-dcnode-id="588" instrument_node="">
</span><p data-dcnode-id="582"><a class="woo-sc-button custom small" data-dcnode-id="585" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//register.southwestpca.org/southwestpca" style="background:;border-color:"><span class="woo-" data-dcnode-id="586"><span data-dcnode-id="587" instrument_node="">Submit Proposal</span></span></a><br data-dcnode-id="584"><span data-dcnode-id="583" instrument_node="">
</span></p></div><span data-dcnode-id="579" instrument_node="">
</span></div><p data-dcnode-id="576"></p><span data-dcnode-id="575" instrument_node="">
</span><p data-dcnode-id="565"><b data-dcnode-id="571"><span data-dcnode-id="574" instrument_node="">Supernatural (TV series)</span><br data-dcnode-id="573"><span data-dcnode-id="572" instrument_node="">
</span></b><span data-dcnode-id="570" instrument_node="">Erin Giannini, PhD, Independent Scholar,&nbsp;</span><a data-dcnode-id="568" href="mailto:egiannini37@gmail.com"><span data-dcnode-id="569" instrument_node="">egiannini37@gmail.com</span></a><br data-dcnode-id="567"><span data-dcnode-id="566" instrument_node="">
</span></p><div class="shortcode-toggle toggle-open-description closed default border" data-dcnode-id="511"><h4 class="toggle-trigger" data-dcnode-id="562"><a data-dcnode-id="563" href="#"><span data-dcnode-id="564" instrument_node="">Open Description</span></a></h4><span data-dcnode-id="561" instrument_node="">
</span><div class="toggle-content" data-dcnode-id="514"><br data-dcnode-id="560"><span data-dcnode-id="559" instrument_node="">
The Area Chair invites proposals related to the CW television series </span><em data-dcnode-id="557"><span data-dcnode-id="558" instrument_node="">Supernatural</span></em><span data-dcnode-id="556" instrument_node="">.</span><p data-dcnode-id="555"></p><span data-dcnode-id="554" instrument_node="">
</span><p data-dcnode-id="552"><span data-dcnode-id="553" instrument_node="">Any and all topics will be considered, although we especially encourage proposals on:</span></p><span data-dcnode-id="551" instrument_node="">
</span><ul data-dcnode-id="522"><span data-dcnode-id="550" instrument_node="">
</span><li data-dcnode-id="548"><span data-dcnode-id="549" instrument_node="">Narrative structure</span></li><span data-dcnode-id="547" instrument_node="">
</span><li data-dcnode-id="545"><span data-dcnode-id="546" instrument_node="">Genre conventions</span></li><span data-dcnode-id="544" instrument_node="">
</span><li data-dcnode-id="542"><span data-dcnode-id="543" instrument_node="">Fandom/Fan culture</span></li><span data-dcnode-id="541" instrument_node="">
</span><li data-dcnode-id="539"><span data-dcnode-id="540" instrument_node="">Representations of socioeconomic class, gender &amp; sexuality, and race &amp; ethnicity</span></li><span data-dcnode-id="538" instrument_node="">
</span><li data-dcnode-id="536"><span data-dcnode-id="537" instrument_node="">Representations of myth, religion, and (urban) legend</span></li><span data-dcnode-id="535" instrument_node="">

</span><p data-dcnode-id="515"><a class="woo-sc-button custom small" data-dcnode-id="518" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//register.southwestpca.org/southwestpca" style="background:;border-color:"><span class="woo-" data-dcnode-id="519"><span data-dcnode-id="520" instrument_node="">Submit Proposal</span></span></a><br data-dcnode-id="517"><span data-dcnode-id="516" instrument_node="">

</span><div class="toggle-content" data-dcnode-id="442"><br data-dcnode-id="496"><span data-dcnode-id="495" instrument_node="">
The Area Chair invites paper or panel proposals on any topic related to the works of Joss Whedon. Any and all topics will be considered.&nbsp; Insights into </span><em data-dcnode-id="493"><span data-dcnode-id="494" instrument_node="">Buffy the Vampire Slayer</span></em><span data-dcnode-id="492" instrument_node="">, </span><em data-dcnode-id="490"><span data-dcnode-id="491" instrument_node="">Angel</span></em><span data-dcnode-id="489" instrument_node="">, and </span><em data-dcnode-id="487"><span data-dcnode-id="488" instrument_node="">Firefly</span></em><span data-dcnode-id="486" instrument_node=""> are always welcome, but Whedon’s body of work continues to expand, and we encourage proposals on:</span><p data-dcnode-id="485"></p><span data-dcnode-id="484" instrument_node="">
</span><ul data-dcnode-id="450"><span data-dcnode-id="483" instrument_node="">
</span><li data-dcnode-id="476"><span data-dcnode-id="482" instrument_node="">Whedon’s work in the Marvel ‘verse, including </span><em data-dcnode-id="480"><span data-dcnode-id="481" instrument_node="">Astonishing X-Men, The Avengers, </span></em><span data-dcnode-id="479" instrument_node="">and </span><em data-dcnode-id="477"><span data-dcnode-id="478" instrument_node="">Avengers: Age of Ultron</span></em></li><span data-dcnode-id="475" instrument_node="">
</span><li data-dcnode-id="470"><span data-dcnode-id="474" instrument_node="">The Whedonverse comics, from </span><em data-dcnode-id="472"><span data-dcnode-id="473" instrument_node="">Fray </span></em><span data-dcnode-id="471" instrument_node="">on</span></li><span data-dcnode-id="469" instrument_node="">
</span><li data-dcnode-id="466"><em data-dcnode-id="467"><span data-dcnode-id="468" instrument_node="">Much Ado about Nothing</span></em></li><span data-dcnode-id="465" instrument_node="">
</span><li data-dcnode-id="462"><em data-dcnode-id="463"><span data-dcnode-id="464" instrument_node="">The Cabin in the Woods</span></em></li><span data-dcnode-id="461" instrument_node="">
</span><li data-dcnode-id="458"><em data-dcnode-id="459"><span data-dcnode-id="460" instrument_node="">Dollhouse</span></em></li><span data-dcnode-id="457" instrument_node="">
</span><li data-dcnode-id="452"><span data-dcnode-id="456" instrument_node="">The 20th anniversary of </span><em data-dcnode-id="454"><span data-dcnode-id="455" instrument_node="">Angel</span></em><span data-dcnode-id="453" instrument_node="">‘s debut; the series’ legacy</span></li><span data-dcnode-id="451" instrument_node="">
</span></ul><span data-dcnode-id="449" instrument_node="">
</span><p data-dcnode-id="443"><a class="woo-sc-button custom small" data-dcnode-id="446" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//register.southwestpca.org/southwestpca" style="background:;border-color:"><span class="woo-" data-dcnode-id="447"><span data-dcnode-id="448" instrument_node="">Submit Proposal</span></span></a><br data-dcnode-id="445"><span data-dcnode-id="444" instrument_node="">
</span></p></div><span data-dcnode-id="440" instrument_node="">
</span></div><p data-dcnode-id="437"></p><span data-dcnode-id="436" instrument_node="">
</span><p data-dcnode-id="431"><b data-dcnode-id="432"><span data-dcnode-id="435" instrument_node="">Zombie and Pandemic Culture</span><br data-dcnode-id="434"><span data-dcnode-id="433" instrument_node="">
</span></b></p><span data-dcnode-id="430" instrument_node="">
</span><p data-dcnode-id="426"><span data-dcnode-id="429" instrument_node="">Brandon Kempner, PhD, New Mexico Highlands University, </span><a data-dcnode-id="427" href="mailto:bkempner@nmhu.edu"><span data-dcnode-id="428" instrument_node="">bkempner@nmhu.edu</span></a></p><span data-dcnode-id="425" instrument_node="">
</span><div class="shortcode-toggle toggle-open-description closed default border" data-dcnode-id="343"><h4 class="toggle-trigger" data-dcnode-id="422"><a data-dcnode-id="423" href="#"><span data-dcnode-id="424" instrument_node="">Open Description</span></a></h4><span data-dcnode-id="421" instrument_node="">
</span><div class="toggle-content" data-dcnode-id="346"><p data-dcnode-id="420"></p><span data-dcnode-id="419" instrument_node="">
</span><p data-dcnode-id="417"><span data-dcnode-id="418" instrument_node="">The area chair for Zombie and Pandemic Culture seeks paper or panel proposals on any aspect of the zombie and/or pandemics in popular culture and history. The zombie has always been pop culture’s premier allegory for infection and disease. 2020’s unprecedented events have put an even greater spotlight on the zombie’s ability to help us understand and process fears and hopes related to pandemics and uncontrollable societal events. Beyond zombies, however, pandemics and popular culture’s treatment of them—both past and emerging—are more critical than ever for processing cultural anxieties.</span></p><span data-dcnode-id="416" instrument_node="">
</span><p data-dcnode-id="414"><span data-dcnode-id="415" instrument_node="">This area is looking for papers that will analyze any way that popular culture has attempted to process disease, infection, pandemics, zombies, or any combination thereof. How do we view zombies differently in light of the past year’s events? Will zombies remain a core allegory for understanding disease? Does the current pandemic change the way we analyze classic zombie films, books, and televisions shows? How will new zombie texts—and other popular art forms—emerge to tackle coronavirus? The zombie has come to represent the chaotic world we live in, and as our world changes, so too will zombies.</span></p><span data-dcnode-id="413" instrument_node="">
</span><p data-dcnode-id="411"><span data-dcnode-id="412" instrument_node="">Some topics to consider:</span></p><span data-dcnode-id="410" instrument_node="">
</span><ul data-dcnode-id="357"><span data-dcnode-id="409" instrument_node="">
</span><li data-dcnode-id="407"><span data-dcnode-id="408" instrument_node="">New readings of older zombie texts in light of coronavirus.</span></li><span data-dcnode-id="406" instrument_node="">
</span><li data-dcnode-id="404"><span data-dcnode-id="405" instrument_node="">How popular culture is beginning to process the pandemic, whether in film, song, television, video games, etc.</span></li><span data-dcnode-id="403" instrument_node="">
</span><li data-dcnode-id="398"><span data-dcnode-id="402" instrument_node="">Specific zombie films: </span><em data-dcnode-id="400"><span data-dcnode-id="401" instrument_node="">White Zombie, King of the Zombies, Dawn of the Dead, Tombs of the Blind Dead, Dead Alive, Evil Dead, World War Z, Train to Busan</span></em><span data-dcnode-id="399" instrument_node="">…</span></li><span data-dcnode-id="397" instrument_node="">
</span><li data-dcnode-id="386"><span data-dcnode-id="396" instrument_node="">Specific books/zombie literature: </span><em data-dcnode-id="394"><span data-dcnode-id="395" instrument_node="">The Zombie Survival Guide, Zone One, The Girl with all the Gifts</span></em><span data-dcnode-id="393" instrument_node="">, the </span><em data-dcnode-id="391"><span data-dcnode-id="392" instrument_node="">Newsflesh</span></em><span data-dcnode-id="390" instrument_node=""> trilogy, </span><em data-dcnode-id="388"><span data-dcnode-id="389" instrument_node="">The Reapers are the Angels, Cell</span></em><span data-dcnode-id="387" instrument_node="">…</span></li><span data-dcnode-id="385" instrument_node="">
</span><li data-dcnode-id="383"><span data-dcnode-id="384" instrument_node="">Zombie writers’ fiction and non-fiction: Stephen Graham Jones, H.P. Lovecraft, Robert Kirkman, Steve Niles, Max Brooks, Matt Mogk, Jovanka Vuckovic, Stephen King…</span></li><span data-dcnode-id="382" instrument_node="">
</span><li data-dcnode-id="377"><span data-dcnode-id="381" instrument_node="">Zombie television: </span><em data-dcnode-id="379"><span data-dcnode-id="380" instrument_node="">The Walking Dead, Fear the Walking Dead, Z Nation, iZombie, The Santa Clarita Diet</span></em><span data-dcnode-id="378" instrument_node="">…</span></li><span data-dcnode-id="376" instrument_node="">
</span><li data-dcnode-id="371"><span data-dcnode-id="375" instrument_node="">Zombie video games: </span><em data-dcnode-id="373"><span data-dcnode-id="374" instrument_node="">Resident Evil, Call of Duty: Zombies, The Last of Us, Day Z, Dead Rising</span></em><span data-dcnode-id="372" instrument_node="">…</span></li><span data-dcnode-id="370" instrument_node="">
</span><li data-dcnode-id="368"><span data-dcnode-id="369" instrument_node="">Zombie comics (any aspect: history, cultural impact, storytelling, Marvel zombies…)</span></li><span data-dcnode-id="367" instrument_node="">
</span><li data-dcnode-id="365"><span data-dcnode-id="366" instrument_node="">Teaching the zombie or pandemics</span></li><span data-dcnode-id="364" instrument_node="">
</span><li data-dcnode-id="362"><span data-dcnode-id="363" instrument_node="">The voodoo zombie and the historical roots of the zombie</span></li><span data-dcnode-id="361" instrument_node="">
</span><li data-dcnode-id="359"><span data-dcnode-id="360" instrument_node="">What does the rise in the zombie’s popularity tell us about society?</span></li><span data-dcnode-id="358" instrument_node="">
</span></ul><span data-dcnode-id="356" instrument_node="">
</span><p data-dcnode-id="354"><span data-dcnode-id="355" instrument_node="">These are just a few of the topics that could be discussed.</span></p><span data-dcnode-id="353" instrument_node="">
</span><p data-dcnode-id="347"><a class="woo-sc-button custom small" data-dcnode-id="350" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//register.southwestpca.org/southwestpca" style="background:;border-color:"><span class="woo-" data-dcnode-id="351"><span data-dcnode-id="352" instrument_node="">Submit Proposal</span></span></a><br data-dcnode-id="349"><span data-dcnode-id="348" instrument_node="">
</span></p></div><span data-dcnode-id="344" instrument_node="">
</span></div><span data-dcnode-id="341" instrument_node="">
</span><p data-dcnode-id="339"><a data-dcnode-id="340" name="#teaching"></a></p><span data-dcnode-id="338" instrument_node="">
</span><h4 data-dcnode-id="336"><img alt="teaching" class="alignleft size-full wp-image-21711" data-dcnode-id="337" height="190" sizes="(max-width: 765px) 100vw, 765px" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//southwestpca.org/wp-content/uploads/2013/04/teaching1.png&amp;raw" srcset="https://southwestpca.org/wp-content/uploads/2013/04/teaching1.png 765w, https://southwestpca.org/wp-content/uploads/2013/04/teaching1-300x74.png 300w, https://southwestpca.org/wp-content/uploads/2013/04/teaching1-300x74@2x.png 600w" width="765"></h4><span data-dcnode-id="335" instrument_node="">

</span></p><div class="shortcode-toggle toggle-open-description closed default border" data-dcnode-id="243"><h4 class="toggle-trigger" data-dcnode-id="310"><a data-dcnode-id="311" href="#"><span data-dcnode-id="312" instrument_node="">Open Description</span></a></h4><span data-dcnode-id="309" instrument_node="">
</span><div class="toggle-content" data-dcnode-id="246"><br data-dcnode-id="308"><span data-dcnode-id="307" instrument_node="">
The Pedagogy and Popular Culture area requests proposals for paper presentations and panels on any topic involving successful or innovative approaches for teaching literature, media studies, film, cultural studies, history, television, rhetoric and composition, technical writing, technology, etc. We also welcome proposals that identify and discuss the existence or implication of specific pedagogical problems or issues, whether or not these advance any new methodologies.&nbsp; Proposals regarding using popular culture in the classroom are particularly encouraged.</span><p data-dcnode-id="306"></p><span data-dcnode-id="305" instrument_node="">
</span><p data-dcnode-id="303"><span data-dcnode-id="304" instrument_node="">Teachers from any type of school or curriculum are encouraged to submit proposals. Graduate students with teaching experience are particularly welcome.</span></p><span data-dcnode-id="302" instrument_node="">
</span><p data-dcnode-id="300"><span data-dcnode-id="301" instrument_node="">While we encourage and welcome all topics involving pedagogy and/or curriculum development, some suggestions for possible papers or panels are listed below:</span></p><span data-dcnode-id="299" instrument_node="">
</span><ul data-dcnode-id="254"><span data-dcnode-id="298" instrument_node="">
</span><li data-dcnode-id="296"><span data-dcnode-id="297" instrument_node="">Combining unusual disciplines in Writing Across the Curriculum courses</span></li><span data-dcnode-id="295" instrument_node="">
</span><li data-dcnode-id="293"><span data-dcnode-id="294" instrument_node="">Utilizing new media technologies or Web 2.0 tools</span></li><span data-dcnode-id="292" instrument_node="">
</span><li data-dcnode-id="290"><span data-dcnode-id="291" instrument_node="">Multimodal learning</span></li><span data-dcnode-id="289" instrument_node="">
</span><li data-dcnode-id="287"><span data-dcnode-id="288" instrument_node="">Discussing the benefits and challenges of online teaching; best practice presentations are gleefully welcome!</span></li><span data-dcnode-id="286" instrument_node="">
</span><li data-dcnode-id="284"><span data-dcnode-id="285" instrument_node="">Integrating popular television, films, novels, graphic novels, or music for meaningful classroom lesson planning</span></li><span data-dcnode-id="283" instrument_node="">
</span><li data-dcnode-id="281"><span data-dcnode-id="282" instrument_node="">Teaching games and game theory</span></li><span data-dcnode-id="280" instrument_node="">
</span><li data-dcnode-id="278"><span data-dcnode-id="279" instrument_node="">Utilizing social networking tools in the classroom</span></li><span data-dcnode-id="277" instrument_node="">
</span><li data-dcnode-id="274"><span data-dcnode-id="276" instrument_node="">Using Wikis or Blogs in the classroom</span><a data-dcnode-id="275" name="_GoBack"></a></li><span data-dcnode-id="273" instrument_node="">
</span><li data-dcnode-id="271"><span data-dcnode-id="272" instrument_node="">Teaching with podcasts and videocasts</span></li><span data-dcnode-id="270" instrument_node="">
</span><li data-dcnode-id="268"><span data-dcnode-id="269" instrument_node="">Editing family letters and/or journals in student projects</span></li><span data-dcnode-id="267" instrument_node="">
</span><li data-dcnode-id="265"><span data-dcnode-id="266" instrument_node="">Promoting active learning by co-opting structures typically associated with webpages</span></li><span data-dcnode-id="264" instrument_node="">
</span><li data-dcnode-id="262"><span data-dcnode-id="263" instrument_node="">Integrating service learning with traditional curricula</span></li><span data-dcnode-id="261" instrument_node="">
</span><li data-dcnode-id="259"><span data-dcnode-id="260" instrument_node="">Constructing student projects as museum exhibits</span></li><span data-dcnode-id="258" instrument_node="">
</span><li data-dcnode-id="256"><span data-dcnode-id="257" instrument_node="">Challenging standard pedagogical assumptions</span></li><span data-dcnode-id="255" instrument_node="">
</span></ul><span data-dcnode-id="253" instrument_node="">
</span><p data-dcnode-id="247"><a class="woo-sc-button custom small" data-dcnode-id="250" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//register.southwestpca.org/southwestpca" style="background:;border-color:"><span class="woo-" data-dcnode-id="251"><span data-dcnode-id="252" instrument_node="">Submit Proposal</span></span></a><br data-dcnode-id="249"><span data-dcnode-id="248" instrument_node="">
</span></p></div><span data-dcnode-id="244" instrument_node="">

</span><strong data-dcnode-id="234"><span data-dcnode-id="235" instrument_node="">Note:</span></strong><span data-dcnode-id="233" instrument_node=""> All individual presentations by undergrads must be submitted to this area in the submission database. Upon review, they will be transferred to the proper area above.</span><br data-dcnode-id="232"><span data-dcnode-id="231" instrument_node="">
</span></p><div class="shortcode-toggle toggle-open-description closed default border" data-dcnode-id="208"><h4 class="toggle-trigger" data-dcnode-id="227"><a data-dcnode-id="228" href="#"><span data-dcnode-id="229" instrument_node="">Open Description</span></a></h4><span data-dcnode-id="226" instrument_node="">

</span><p data-dcnode-id="222"><span data-dcnode-id="223" instrument_node="">We encourage and invite undergraduates to prepare a brief paper (15 minutes) on any topic that is covered by existing areas within the conference. This well-established conference has an area for all types of scholars, from horror aficionados to library archives fanatics.</span></p><span data-dcnode-id="221" instrument_node="">
</span><p data-dcnode-id="219"><span data-dcnode-id="220" instrument_node="">Submit a 250-word abstract to present a paper. Or, submit a panel proposal with a separate abstract/user account for each presenter/paper. Proposals will be accepted online only and must be submitted under the “Undergraduate” section of the conference database. After review by conference staff, they will be transferred to the proper area chair listed above.</span></p><span data-dcnode-id="218" instrument_node="">

</span><div class="widget widget_text" data-dcnode-id="99" id="text-2"><h3 data-dcnode-id="114"><span data-dcnode-id="115" instrument_node="">About Southwest Popular/American Culture Association</span></h3><span data-dcnode-id="113" instrument_node=""> </span><div class="textwidget" data-dcnode-id="101"><p data-dcnode-id="105"><span data-dcnode-id="112" instrument_node=""> The mission of the</span><strong data-dcnode-id="110"><span data-dcnode-id="111" instrument_node=""> Southwest Popular/American Culture Association (SWPACA)</span></strong><span data-dcnode-id="109" instrument_node=""> is to promote an innovative and nontraditional academic movement in the humanities and social sciences celebrating America’s cultural heritages, and to increase awareness and improve public perceptions of America’s cultural traditions and diverse populations. We work towards this mission by providing a professional network for scholars, writers, and others interested in popular/American culture via our annual academic conference and through our open-source, peer-reviewed academic journal, </span><em data-dcnode-id="107"><span data-dcnode-id="108" instrument_node="">Dialogue: The Interdisciplinary Journal of Popular Culture and Pedagogy</span></em><span data-dcnode-id="106" instrument_node="">. Additionally, the SWPACA has a long-standing commitment to supporting the development of new and young academic professionals in the fields of popular and/or American cultural studies through conference travel grants, paper awards, and professional development opportunities. </span></p><a class="woo-sc-button custom small" data-dcnode-id="102" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//southwestpca.org/about/" style="background:;border-color:"><span class="woo-" data-dcnode-id="103"><span data-dcnode-id="104" instrument_node="">Learn More</span></span></a></div><span data-dcnode-id="100" instrument_node="">
</span></div><span data-dcnode-id="98" instrument_node=""> </span></div><span data-dcnode-id="96" instrument_node="">
