</span><span class="readable" data-dcnode-id="3774" id="reviewTextContainer3361547766"><span data-dcnode-id="3797" instrument_node="">
</span><span data-dcnode-id="3795" id="freeTextContainer10338740716481400976"><span data-dcnode-id="3796" instrument_node="">Historically Inaccurate has themes of immigration, deportation, and family separation which are incredibly important topics. There is Latina representation as well as LGBTQ+ so I was excited for this diverse read. Unfortunately, I was left disappointed mostly because of the writing as well as with Sol. Sol, the main character, has a million internal extensive monologues after anything that happens so much that she will just go on and on about her laptop being broken or that she wants a muffin, j</span></span><span data-dcnode-id="3794" instrument_node="">
</span><span data-dcnode-id="3779" id="freeText10338740716481400976" style="display:none"><span data-dcnode-id="3793" instrument_node="">Historically Inaccurate has themes of immigration, deportation, and family separation which are incredibly important topics. There is Latina representation as well as LGBTQ+ so I was excited for this diverse read. Unfortunately, I was left disappointed mostly because of the writing as well as with Sol. Sol, the main character, has a million internal extensive monologues after anything that happens so much that she will just go on and on about her laptop being broken or that she wants a muffin, just to name some examples. It doesn’t really add to the story. The pacing is slow and quite repetitive so I found myself skimming A LOT. There are also a ton of typos so hopefully that will be fixed before publication. </span><br data-dcnode-id="3792"><br data-dcnode-id="3791"><span data-dcnode-id="3790" instrument_node="">I admire the fact that the author made diverse characters but they didn’t come off as well rounded because it wasn’t really blatant. For example, there is a transgender woman character and it’s never really mentioned, just in passing by misgendering. This misgendering scene really didn’t sit right with me. There are a couple of other scenes that I felt were forced including the romance which I found unnecessary. I did like that there was openness about gender and sexuality and that the characters were freely discussing it without judgement HOWEVER THE MISGENDERING HAPPENED MORE THAN ONCE WHETHER OR NOT IT WAS ON PURPOSE AND I HATED THAT.</span><br data-dcnode-id="3789"><br data-dcnode-id="3788"><span data-dcnode-id="3787" instrument_node="">Another random thing that bugged me was that the history club in no way resembles a history club even remotely. They just try to do crazy things without getting caught and they’re supposed to be in college, which I found hard to believe. On top of that, Ethan, a black character expressed concern with being caught by the police during these "history club excursions" and possibly killed because he is black but the main character waved it off completely, expressing nothing. Actually, that pissed me off a lot and rubbed me the wrong way. </span><br data-dcnode-id="3786"><span data-dcnode-id="3785" instrument_node=""> </span><br data-dcnode-id="3784"><span data-dcnode-id="3783" instrument_node="">With that being said, at least the cover is nice. </span><br data-dcnode-id="3782"><br data-dcnode-id="3781"><span data-dcnode-id="3780" instrument_node="">Thank you to Netgalley and to the publisher for sending me an arc.</span></span><span data-dcnode-id="3778" instrument_node="">

</span><span data-dcnode-id="3597" id="freeTextContainer2949492355327735299"><span data-dcnode-id="3604" instrument_node="">This was an alright coming of age story, but I did not enjoy it as much as I had thought I would.</span><br data-dcnode-id="3603"><br data-dcnode-id="3602"><span data-dcnode-id="3601" instrument_node="">The story was pretty strong, and I like how Sol had a good family. It was sad about her mother, and it must have been hard when her father needed her so much. But I just didn’t think it was as engaging as some other own voice Latinx books I have read. I know all experiences are unique, but this one seemed to be telling more about what was going on than conveying the emotions of the experience. </span><br data-dcnode-id="3600"><br data-dcnode-id="3599"><span data-dcnode-id="3598" instrument_node="">It jus</span></span><span data-dcnode-id="3596" instrument_node="">
</span><span data-dcnode-id="3585" id="freeText2949492355327735299" style="display:none"><span data-dcnode-id="3595" instrument_node="">This was an alright coming of age story, but I did not enjoy it as much as I had thought I would.</span><br data-dcnode-id="3594"><br data-dcnode-id="3593"><span data-dcnode-id="3592" instrument_node="">The story was pretty strong, and I like how Sol had a good family. It was sad about her mother, and it must have been hard when her father needed her so much. But I just didn’t think it was as engaging as some other own voice Latinx books I have read. I know all experiences are unique, but this one seemed to be telling more about what was going on than conveying the emotions of the experience. </span><br data-dcnode-id="3591"><br data-dcnode-id="3590"><span data-dcnode-id="3589" instrument_node="">It just seemed like a bland generic college experience, and it was not like what I went through. I just felt like it was hey college and just very vague. I don’t get what they were doing in the history club or why they chose to do that. I just wanted more than I was given from this story. There was a lot of potential but not a ton of follow through. </span><br data-dcnode-id="3588"><br data-dcnode-id="3587"><span data-dcnode-id="3586" instrument_node="">Thank you to NetGalley and the publisher for the advanced reader copy. All thoughts and opinions are my own.</span></span><span data-dcnode-id="3584" instrument_node="">

</span></i><br data-dcnode-id="3462"><br data-dcnode-id="3461"><b data-dcnode-id="3456"><span data-dcnode-id="3460" instrument_node="">It’s been actually a while since I enjoyed a really well written YA coming of age novel - and Historically Inaccurate provides a light and breezy way of writing some topics that are hard hitting and would end up being a lot more hard to read. </span><br data-dcnode-id="3459"><br data-dcnode-id="3458"><span data-dcnode-id="3457" instrument_node="">Sol is a college student whose mom was deported to Mexico when they had an accident - </span></b><span data-dcnode-id="3455" instrument_node="">so while she was dealing with a broken body, her mother was being treated as a criminal by ICE &amp; being sent back to a country where she hasn’t been to since she was a child; away from her family.</span><br data-dcnode-id="3454"><br data-dcnode-id="3453"><img class="gr-hostedUserImg" data-dcnode-id="3452" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//i.gr-assets.com/images/S/compressed.photo.goodreads.com/hostedimages/1603942975i/30303144._SX540_.jpg&amp;raw" width="350"><br data-dcnode-id="3451"><b data-dcnode-id="3446"><span data-dcnode-id="3450" instrument_node="">So all Sol wants to do is, make her parents proud, study hard and save enough money to appoint a lawyer to bring her mother back to the US when she turns 21. </span><br data-dcnode-id="3449"><br data-dcnode-id="3448"><span data-dcnode-id="3447" instrument_node="">What she definitely wasn’t expecting was to get caught breaking and entering into an old couple’s place </span></b><span data-dcnode-id="3445" instrument_node="">while trying to do an initiation ceremony for a History Club, of all thing; just to have a better resume for future applications. </span><br data-dcnode-id="3444"><br data-dcnode-id="3443"><b data-dcnode-id="3438"><span data-dcnode-id="3442" instrument_node="">Historically Inaccurate is a coming of age novel that gives its readers a young romance, with wonderfully diverse representation as well as issues that are handled with care, hope and faith! </span><br data-dcnode-id="3441"><br data-dcnode-id="3440"><span data-dcnode-id="3439" instrument_node="">Would definitely recommend it if you need something different and very well written!</span></b><br data-dcnode-id="3437"><br data-dcnode-id="3436"><img class="gr-hostedUserImg" data-dcnode-id="3435" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//i.gr-assets.com/images/S/compressed.photo.goodreads.com/hostedimages/1556208190i/27413149._SX540_.png&amp;raw" width="350"><br data-dcnode-id="3434"><img class="gr-hostedUserImg" data-dcnode-id="3433" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//i.gr-assets.com/images/S/compressed.photo.goodreads.com/hostedimages/1556208190i/27413150._SX540_.jpg&amp;raw" width="1050"><br data-dcnode-id="3432"><b data-dcnode-id="3419"><span data-dcnode-id="3431" instrument_node=""> </span><i data-dcnode-id="3420"><span data-dcnode-id="3430" instrument_node=""> For more reviews visit </span><a data-dcnode-id="3428" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.indianbookloveaffair.wordpress.com/" rel="nofollow noopener"><span data-dcnode-id="3429" instrument_node="">For The Love of Fictional Worlds</span></a><span data-dcnode-id="3427" instrument_node=""> :)</span><br data-dcnode-id="3426"><br data-dcnode-id="3425"><span data-dcnode-id="3424" instrument_node="">Do come join us at </span><a data-dcnode-id="3422" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.facebook.com/ForTheLoveofFictionalWorlds/" rel="nofollow noopener"><span data-dcnode-id="3423" instrument_node="">For The Fictional Worlds Facebook Page</span></a><span data-dcnode-id="3421" instrument_node=""> </span></i></b><span data-dcnode-id="3418" instrument_node="">  | </span><b data-dcnode-id="3402"><span data-dcnode-id="3417" instrument_node=""> <         </span><span class="staticStars notranslate" data-dcnode-id="3331" title="it was ok"><span class="staticStar p10" data-dcnode-id="3336" size="15x15"><span data-dcnode-id="3337" instrument_node="">it was ok</span></span><span class="staticStar p10" data-dcnode-id="3335" size="15x15"></span><span class="staticStar p0" data-dcnode-id="3334" size="15x15"></span><span class="staticStar p0" data-dcnode-id="3333" size="15x15"></span><span class="staticStar p0" data-dcnode-id="3332" size="15x15"></span></span><span data-dcnode-id="3330" instrument_node="">

</span><span data-dcnode-id="3318" id="freeTextContainer12810281625499492743"><span data-dcnode-id="3325" instrument_node="">Thanks to netgalley and the publisher for providing me with a copy of this book in exchange of an honest review.</span><br data-dcnode-id="3324"><br data-dcnode-id="3323"><span data-dcnode-id="3322" instrument_node="">I really wanted to like this book, specially because the main character is latina, but i was somewhat disappointed. I’ll start with the aspects I did like about this book:</span><br data-dcnode-id="3321"><br data-dcnode-id="3320"><span data-dcnode-id="3319" instrument_node="">It was very interesting and heartbreaking learning what it’s like having a family member deported. A lot of families in the USA have to go through this, and I feel the author really made the reader understand the situ</span></span><span data-dcnode-id="3317" instrument_node="">
</span><span data-dcnode-id="3273" id="freeText12810281625499492743" style="display:none"><span data-dcnode-id="3316" instrument_node="">Thanks to netgalley and the publisher for providing me with a copy of this book in exchange of an honest review.</span><br data-dcnode-id="3315"><br data-dcnode-id="3314"><span data-dcnode-id="3313" instrument_node="">I really wanted to like this book, specially because the main character is latina, but i was somewhat disappointed. I’ll start with the aspects I did like about this book:</span><br data-dcnode-id="3312"><br data-dcnode-id="3311"><span data-dcnode-id="3310" instrument_node="">It was very interesting and heartbreaking learning what it’s like having a family member deported. A lot of families in the USA have to go through this, and I feel the author really made the reader understand the situation Sol was going through.</span><br data-dcnode-id="3309"><br data-dcnode-id="3308"><span data-dcnode-id="3307" instrument_node="">I also loved Sol’s relationship with her parents. Even if her family was separated, they still made it work and it was very heartwarming. </span><br data-dcnode-id="3306"><br data-dcnode-id="3305"><span data-dcnode-id="3304" instrument_node="">Now I’m jumping into the aspects I didn’t like about this book. This part contains (minor) spoilers:</span><br data-dcnode-id="3303"><br data-dcnode-id="3302"><br data-dcnode-id="3301"><span data-dcnode-id="3300" instrument_node="">I didn’t like how dull the description of some characters was. I had a hard time picturing a lot of Sol’s friends and the people she met at the history club.</span><br data-dcnode-id="3299"><br data-dcnode-id="3298"><span data-dcnode-id="3297" instrument_node="">Speaking of the history club, Sol mentioned how the club was taking over her life when in reality she had only mentioned being to three meeting; taking into account that the first two were welcoming parties and the last one was to announce they would be having a group trip, I don’t really think this was an issue. I thought the book was going to be about the club, but it really didn’t have a clear theme so I found it boring in certain parts. </span><br data-dcnode-id="3296"><br data-dcnode-id="3295"><span data-dcnode-id="3294" instrument_node="">When a book has characters that speak in a language different than the one it is written in, I think the author should provide a translation for the readers. Sol constantly spoke Spanish with her best friend and her parents, but the author didn’t provide any form of translation for the readers. While I speak Spanish I do consider this is necessary. Sol spoke in Spanish with her father for about two pages, and those were two whole pages some readers couldn’t understand.</span><br data-dcnode-id="3293"><br data-dcnode-id="3292"><span data-dcnode-id="3291" instrument_node="">There were also a lot of grammar and spelling mistakes. I noticed other reviewers mentioned this too. </span><br data-dcnode-id="3290"><br data-dcnode-id="3289"><span data-dcnode-id="3288" instrument_node="">Now my biggest problems with this book:</span><br data-dcnode-id="3287"><br data-dcnode-id="3286"><span data-dcnode-id="3285" instrument_node=""> One of the black characters in the book mentioned how he doesn’t want to join the club because once people join, they have to do dares that often result in illegal activities. This characters mentions how he is more likely to be shot and killed if found doing something illegal, AND SOL JUST DISMISSES HIM. She says he won’t let anything happens to him and that they won’t give him an illegal dare and the leader of the club promises too. After saying this they still send him into a museum telling him he has to stay after closing time and avoid the guards. It honestly didn’t sit right with me.</span><br data-dcnode-id="3284"><br data-dcnode-id="3283"><span data-dcnode-id="3282" instrument_node=""> </span><br data-dcnode-id="3281"><span data-dcnode-id="3280" instrument_node="">While Sol was out with one of her friends who is a lesbian, she mentioned how she wondered if people thought they were dating when they went out together. It bothered me that the author mentioned this about a queer character, when Sol hung out even more with her boy best friend but didn’t once mentioned how people might’ve thought they were dating. Just because someone is attracted to the same sex as you it doesn’t mean they like you.</span><br data-dcnode-id="3279"><br data-dcnode-id="3278"><span data-dcnode-id="3277" instrument_node="">Ethan kept using the pronouns “he/him” when taking about Anna. I honestly didn’t understand why he was doing this and there wasn’t an explanation provided. If it was an attempt to hint that she is trans, it was done very poorly because misgendering someone is not acceptable. </span><br data-dcnode-id="3276"><br data-dcnode-id="3275"><span data-dcnode-id="3274" instrument_node="">And finally, the description mentions how Sol and Ethan will uncover why the club seems to get involved in several illegal activities when doing the dares and why they have a lot of money provided by the club’s founder. They don’t really uncover this themselves. Someone else files a police report and they are just there in the aftermath of the events.</span></span><span data-dcnode-id="3272" instrument_node="">

</span><span data-dcnode-id="3172" id="freeTextContainer6987687580340142199"><u data-dcnode-id="3182"><span data-dcnode-id="3183" instrument_node=""> 2.6/5 ☆ - 3-</span></u><br data-dcnode-id="3181"><br data-dcnode-id="3180"><span data-dcnode-id="3179" instrument_node="">DISCLAIMER: I recieved an DRC via Edelweiss+ from Wattpad Books in exchange for an honest review. All thoughts and opinions are my own.</span><br data-dcnode-id="3178"><br data-dcnode-id="3177"><span data-dcnode-id="3176" instrument_node="">I remember reading the first chapters of this book on Wattpad. Then I completely forgot it. Or the author decided to only leave a sample before publishing. Either way, I wanted to see how it all would unfold for real. I had higher expectations for this book than The Bro Code, but was left disappointed. </span><br data-dcnode-id="3175"><br data-dcnode-id="3174"><span data-dcnode-id="3173" instrument_node="">I admire the author for writing a fun story whic</span></span><span data-dcnode-id="3171" instrument_node="">
</span><span data-dcnode-id="3139" id="freeText6987687580340142199" style="display:none"><u data-dcnode-id="3169"><span data-dcnode-id="3170" instrument_node=""> 2.6/5 ☆ - 3-</span></u><br data-dcnode-id="3168"><br data-dcnode-id="3167"><span data-dcnode-id="3166" instrument_node="">DISCLAIMER: I recieved an DRC via Edelweiss+ from Wattpad Books in exchange for an honest review. All thoughts and opinions are my own.</span><br data-dcnode-id="3165"><br data-dcnode-id="3164"><span data-dcnode-id="3163" instrument_node="">I remember reading the first chapters of this book on Wattpad. Then I completely forgot it. Or the author decided to only leave a sample before publishing. Either way, I wanted to see how it all would unfold for real. I had higher expectations for this book than The Bro Code, but was left disappointed. </span><br data-dcnode-id="3162"><br data-dcnode-id="3161"><span data-dcnode-id="3160" instrument_node="">I admire the author for writing a fun story which followed a Mexican girl. The description of her culture and the family dynamic was wonderful. Unfortunately, this story did not hit off great for me.</span><br data-dcnode-id="3159"><br data-dcnode-id="3158"><span data-dcnode-id="3157" instrument_node="">The only characters I found interesting was Sol, her father and Anna. They actually had some personality and layers. The others just felt...like side characters whose life only revolved around the main character. Moreover, there were no clear character description, so I had a hard time figuring out how they looked like. For the majority of the book, I was wondering if Ethan was black or not. </span><br data-dcnode-id="3156"><br data-dcnode-id="3155"><span data-dcnode-id="3154" instrument_node="">The writing was a little bit off, as there were some parts where the plot just dragged. It started off pretty great, then there was no action, then BOOM it was the ending. The ending was incredibly rushed and I just felt everything ended too abruptly. It was a mess than I did not comprehend or understand at all. I really hated the ending, as it didn't make any sense to me.</span><br data-dcnode-id="3153"><br data-dcnode-id="3152"><span data-dcnode-id="3151" instrument_node="">The plotline was a bit weak, and I spent a lot time wondering what the history club really did. Like, what the hell? Obviously, these plot points works fine on Wattpad. If I'd actually read this book on Wattpad, I would have thought this was one of the good ones there. However on a published novel level, this was a bummer. Maybe I did have some high expectations? Either way, I believe book should have stayed in revising and editing instead of published in two months or so. Or maybe just stayed on Wattpad.</span><br data-dcnode-id="3150"><br data-dcnode-id="3149"><span data-dcnode-id="3148" instrument_node="">After all, I will say I liked the diversity and representation. However, I just don't feel it was executed as well as I hoped. In some ways, the inclusion of poc characters seemed pretty forced. It was fun reading from Sol's perspective, and I found it interesting following her experience with deportation. However, I sometimes found some things insensitive, like the misgendering of Anna. </span><br data-dcnode-id="3147"><br data-dcnode-id="3146"><span data-dcnode-id="3145" instrument_node="">In conclusion, this book had it's flaws. Yet I think it had a lot of potential. Stories like this can be important to someone, and I hope others will resonate with this book and like it more than I did. </span><br data-dcnode-id="3144"><br data-dcnode-id="3143"><span data-dcnode-id="3142" instrument_node="">Over and out. -Nora &lt;3</span><br data-dcnode-id="3141"><br data-dcnode-id="3140"></span><span data-dcnode-id="3138" instrument_node="">

</span><span data-dcnode-id="3060" id="freeTextContainer17731081042867130257"><span data-dcnode-id="3064" instrument_node="">This was a good and fast read, I was able to zoom through it! It was also pretty light despite the heavy topic that looms over it and some other shenanigans the characters get up to. The pacing was a little off, but I also think that contributes to the fact that it was (to me) considered a fast read. I honestly liked that it was a faster read, I feel like contemporaries now-a-days are getting to be as long as a fantasy!</span><br data-dcnode-id="3063"><br data-dcnode-id="3062"><span data-dcnode-id="3061" instrument_node="">I liked Sol as a character, she seemed pretty relatable and realistic, when i</span></span><span data-dcnode-id="3059" instrument_node="">
</span><span data-dcnode-id="3038" id="freeText17731081042867130257" style="display:none"><span data-dcnode-id="3058" instrument_node="">This was a good and fast read, I was able to zoom through it! It was also pretty light despite the heavy topic that looms over it and some other shenanigans the characters get up to. The pacing was a little off, but I also think that contributes to the fact that it was (to me) considered a fast read. I honestly liked that it was a faster read, I feel like contemporaries now-a-days are getting to be as long as a fantasy!</span><br data-dcnode-id="3057"><br data-dcnode-id="3056"><span data-dcnode-id="3055" instrument_node="">I liked Sol as a character, she seemed pretty relatable and realistic, when it came down to it. She was given insecurities that didn’t have to do with her body. I appreciated that she had anxieties over things like bills and even dating. It was honestly refreshing to see a character worry about something other than if she was too fat or not enough this. It also somewhat felt like I was just reading a text or email from a distant friend because it was all pretty summed up and not too much description. The world building was very minimum, which isn’t a bad thing because it doesn’t take away from the rest of the story. The other characters were also fun to read about, and pretty diverse. But again not a lot of description on how anyone looked, which leads back to me saying it felt like an email from a friend.</span><br data-dcnode-id="3054"><br data-dcnode-id="3053"><span data-dcnode-id="3052" instrument_node="">So the story, it covers a lot! From the deportation of her mother, the financial struggle with her father, trying not to get into trouble with the law because of her club, and of course sprinkled in some romance. The meet cute was so funny that I could honestly see it happening in a show. I couldn’t stop laughing. I liked Ethan as a character too.</span><br data-dcnode-id="3051"><br data-dcnode-id="3050"><span data-dcnode-id="3049" instrument_node="">There were some minor inconsistencies in the story, and hopefully by the time this is published they’ve edited those out. As well as the pacing was off ( I mentioned this before). Like I said it almost felt like we should be familiar with the characters and Sol. None of this is necessarily a bad thing, just stuff that I noticed.</span><br data-dcnode-id="3048"><br data-dcnode-id="3047"><span data-dcnode-id="3046" instrument_node="">This book has Latinx representation, BIPOC characters, and LGBTQ characters.</span><br data-dcnode-id="3045"><br data-dcnode-id="3044"><span data-dcnode-id="3043" instrument_node="">To see my full review with additional content follow the link below</span><br data-dcnode-id="3042"><br data-dcnode-id="3041"><a data-dcnode-id="3039" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//fallintoreading.wordpress.com/2020/09/24/historically-inaccurate-by-shay-bravo/" rel="noopener nofollow" target="_blank"><span data-dcnode-id="3040" instrument_node="">https://fallintoreading.wordpress.com...</span></a></span><span data-dcnode-id="3037" instrument_node="">

</span><span class="readable" data-dcnode-id="2829" id="reviewTextContainer3561332468"><span data-dcnode-id="2857" instrument_node="">
</span><span data-dcnode-id="2849" id="freeTextContainer10164228969767727888"><span data-dcnode-id="2856" instrument_node="">Historically Inaccurate by Shay Bravo</span><br data-dcnode-id="2855"><br data-dcnode-id="2854"><span data-dcnode-id="2853" instrument_node="">Despite having a protagonist in community college, Historically Inaccurate is written for a younger reader: probably in the 15-19 age range. The editing could have been tighter, characters were reduced to tropes, and the narrative drifted due to the first person POV. These structural issues could be easily forgiven by younger readers who want something fun and light-hearted, despite the themes of immigration, deportation, and transphobia.</span><br data-dcnode-id="2852"><br data-dcnode-id="2851"><span data-dcnode-id="2850" instrument_node="">The technical problem</span></span><span data-dcnode-id="2848" instrument_node="">
</span><span data-dcnode-id="2834" id="freeText10164228969767727888" style="display:none"><span data-dcnode-id="2847" instrument_node="">Historically Inaccurate by Shay Bravo</span><br data-dcnode-id="2846"><br data-dcnode-id="2845"><span data-dcnode-id="2844" instrument_node="">Despite having a protagonist in community college, Historically Inaccurate is written for a younger reader: probably in the 15-19 age range. The editing could have been tighter, characters were reduced to tropes, and the narrative drifted due to the first person POV. These structural issues could be easily forgiven by younger readers who want something fun and light-hearted, despite the themes of immigration, deportation, and transphobia.</span><br data-dcnode-id="2843"><br data-dcnode-id="2842"><span data-dcnode-id="2841" instrument_node="">The technical problems include light editing. The novel could have been tightened and more impactful without Sol’s heavy-handed over-explanation. For example, in one scene Sol bites her thumb because she’s forced to have an uncomfortable conversation. The intent behind the gesture is clear, but then Sol narrates: “It’s an old habit I’m trying to beat, but it’s hard under stress.” Overnarration like this is rampant in the text and weakens the actions in the novel. </span><br data-dcnode-id="2840"><br data-dcnode-id="2839"><span data-dcnode-id="2838" instrument_node="">Another problem was the characters. I used a level of deductive skills akin to translating Middle English to Modern English when trying to deduce if Ethan was Black. The only blaring clue was when Ethan said he was scared of the police being called because of how they treat people like him. This was mentioned 30% into the book when this character was introduced in the first scene. Then, Sol consistently brushing off his concerns about police violence rubbed me the wrong way, but I suppose it’s accurate to Brown folks waving off the concerns of the Black community. There’s also a cringy misgendering trope that occurred. Though these are concerns and problems that people in these marginalized groups deal with, these moments felt trope-ish and lacked emotional impact. Even though these scenes could have been well-intentioned, it comes off as stereotypical.</span><br data-dcnode-id="2837"><br data-dcnode-id="2836"><span data-dcnode-id="2835" instrument_node="">This book was not for me. That was clear in the first chapter, but I continued on hoping that I would enjoy it. Thank you NetGalley and Wattpad for an ecopy for an honest review.</span></span><span data-dcnode-id="2833" instrument_node="">

</span><span data-dcnode-id="2755" id="freeTextContainer1109404451187068588"><span data-dcnode-id="2759" instrument_node="">Historically Inaccurate // by Shay Bravo</span><br data-dcnode-id="2758"><br data-dcnode-id="2757"><span data-dcnode-id="2756" instrument_node="">I have some mixed feelings about this book. I looked forward to this title for a while and while I am still happy that I got to read it, there were a few things that fell short for me. I want to start off by saying that I loved the main character, despite her flaws. Or maybe even because of those because they very much reminded me of myself. The overthinking and worrying is a familiar feeling to me and I disagree with those saying that it was overdone. It </span></span><span data-dcnode-id="2754" instrument_node="">
</span><span data-dcnode-id="2746" id="freeText1109404451187068588" style="display:none"><span data-dcnode-id="2753" instrument_node="">Historically Inaccurate // by Shay Bravo</span><br data-dcnode-id="2752"><br data-dcnode-id="2751"><span data-dcnode-id="2750" instrument_node="">I have some mixed feelings about this book. I looked forward to this title for a while and while I am still happy that I got to read it, there were a few things that fell short for me. I want to start off by saying that I loved the main character, despite her flaws. Or maybe even because of those because they very much reminded me of myself. The overthinking and worrying is a familiar feeling to me and I disagree with those saying that it was overdone. It felt very realistic to me and even evoked some of the same feelings as I was reading. What I personally struggled with is that I felt like this book could not decide between being plot-driven or being character-driven. I very much enjoy both of those but throughout my reading of this book could not really decide which one it was. I did feel like there was a buildup to a climax that ended up not being dramatic enough to pull us through to the end, which ended up feeling rather flat. I did love all the themes that were discussed throughout the book, such as immigration and family separation, LGBTQIA+ and racism, though I was not a big fan of the misgendering because that just did not seem to fit Ethan's character very well at all. There are a lot of pros and cons for me but I do think there is a lot of potential for this new author and I am curious to see what she will show us in the future. </span><br data-dcnode-id="2749"><br data-dcnode-id="2748"><span data-dcnode-id="2747" instrument_node="">Thank you to the author, publisher, and NetGalley for providing me with a free copy in exchange for an honest review.</span></span><span data-dcnode-id="2745" instrument_node="">

</span><span data-dcnode-id="2664" id="freeTextContainer12514680866923372682"><span data-dcnode-id="2665" instrument_node="">Soledad Gutierrez &nbsp;is joining her community college's History Club, mostly to please her parents and get a social life after a car crash the previous year that resulted in her mother being deported back to Mexico. &nbsp;However, in order to join the Westray Community College History Club, Sol must go through a strange initiation; her task is to steal a fork from Westray's oldest house. The task doesn't go quite as planned when the grandson of the owners, Ethan, shows up. &nbsp;Sol escapes the house and su</span></span><span data-dcnode-id="2663" instrument_node="">
</span><span data-dcnode-id="2655" id="freeText12514680866923372682" style="display:none"><span data-dcnode-id="2662" instrument_node="">Soledad Gutierrez &nbsp;is joining her community college's History Club, mostly to please her parents and get a social life after a car crash the previous year that resulted in her mother being deported back to Mexico. &nbsp;However, in order to join the Westray Community College History Club, Sol must go through a strange initiation; her task is to steal a fork from Westray's oldest house. The task doesn't go quite as planned when the grandson of the owners, Ethan, shows up. &nbsp;Sol escapes the house and suddenly realizes just how tenuous her situation is and how easily she could have been arrested. &nbsp;Sol's incident follows her around however, as Ethan joins the History Club. &nbsp;This makes things way more complicated, but also opens Sol up to everything she can be. </span><br data-dcnode-id="2661"><br data-dcnode-id="2660"><span data-dcnode-id="2659" instrument_node="">Historically Inaccurate is a contemporary tale of overcoming adversity, family and friendship. &nbsp;Sol's character goes on a journey of self-acceptance throughout the story. &nbsp;At first Sol seems to just be going through the motions of life until she is old enough to start the process of getting her mother back into the USA. &nbsp;While the concept of how the history club functioned is a little far-fetched, I really enjoyed Sol's participation and the diverse range of members. &nbsp;I appreciated Sol's point of view as the daughter of Mexican immigrants; some of her hardships were expected, and some unexpected. &nbsp;Sol and Ethan's relationship was sweet and slower paced. &nbsp;Ethan's personality is a great match for Sol's needs, pushing her just a little bit, but not changing who she is. &nbsp;The pacing of the story was a bit bumpy at times, going on some unnecessary tangents; however the ending brought it all together with some great unexpected turns. </span><br data-dcnode-id="2658"><br data-dcnode-id="2657"><span data-dcnode-id="2656" instrument_node="">This book was received for free in return for an honest review. </span></span><span data-dcnode-id="2654" instrument_node="">

</span><span data-dcnode-id="2199" id="freeTextContainer8340783783299233265"><span data-dcnode-id="2206" instrument_node="">I give this book a 2.5/5 stars. Before I get into my review of this book, I want to preface this by saying that I have a lot of respect for the author for writing a fun, quirky story about college students centered around a diverse set of characters.</span><br data-dcnode-id="2205"><br data-dcnode-id="2204"><span data-dcnode-id="2203" instrument_node="">Personally, however, I did not love this book.</span><br data-dcnode-id="2202"><br data-dcnode-id="2201"><span data-dcnode-id="2200" instrument_node="">I felt that the writing of this novel could be improved. There were parts where I did like the writing (like the entire section when Ethan and Sol snuck into the historical archive) but it did not feel co</span></span><span data-dcnode-id="2198" instrument_node="">
</span><span data-dcnode-id="2150" id="freeText8340783783299233265" style="display:none"><span data-dcnode-id="2197" instrument_node="">I give this book a 2.5/5 stars. Before I get into my review of this book, I want to preface this by saying that I have a lot of respect for the author for writing a fun, quirky story about college students centered around a diverse set of characters.</span><br data-dcnode-id="2196"><br data-dcnode-id="2195"><span data-dcnode-id="2194" instrument_node="">Personally, however, I did not love this book.</span><br data-dcnode-id="2193"><br data-dcnode-id="2192"><span data-dcnode-id="2191" instrument_node="">I felt that the writing of this novel could be improved. There were parts where I did like the writing (like the entire section when Ethan and Sol snuck into the historical archive) but it did not feel cohesive throughout the novel. Almost as if the narrative voice was not fully fleshed out. I also think the dialogue could have been better. There were many points in the novel where there would be a complete tone shift during conversations and then back again that made the dialogue feel unnatural and not organic within the context of the scene. For example, when the characters would be having a light-hearted conversation and then one of them says something really deep out of nowhere.</span><br data-dcnode-id="2190"><br data-dcnode-id="2189"><span data-dcnode-id="2188" instrument_node="">However, I did like the humor imbued in the writing. The book made me laugh a few times.</span><br data-dcnode-id="2187"><br data-dcnode-id="2186"><span data-dcnode-id="2185" instrument_node="">I wasn’t particularly a fan of the romance between Ethan and Sol. It didn’t feel like they had any real chemistry between them, especially the first third of the book. The two of them felt very forced, probably because all the other characters were “shipping” them from the beginning for seemingly no reason. If all the characters were not immediately shipping them and if Ethan and Sol didn’t start forming feelings until after they spent more time together, it would have felt more natural.</span><br data-dcnode-id="2184"><br data-dcnode-id="2183"><span data-dcnode-id="2182" instrument_node="">As far as the other characters, I thought Sol’s interactions with her friends, Carlos and Diane, were sweet and felt much more natural than the ones she had with Ethan.</span><br data-dcnode-id="2181"><br data-dcnode-id="2180"><span data-dcnode-id="2179" instrument_node="">I also think that Sol and Ethan’s motivations for why they did certain things were very weak and that their actions were done only for the convenience of the plot.</span><br data-dcnode-id="2178"><br data-dcnode-id="2177"><span data-dcnode-id="2176" instrument_node="">I wasn’t really sure where the story was trying to go which is not necessarily a bad thing. However, when I finally reached the “plot twist” toward the end I was kind of annoyed. It felt like it was only done to spice up the plot a bit and add extra drama to Ethan and Sol’s romance.</span><br data-dcnode-id="2175"><br data-dcnode-id="2174"><span data-dcnode-id="2173" instrument_node="">I wish there wasn’t such an emphasis on the illegal club activities and the (forced) romance.</span><br data-dcnode-id="2172"><br data-dcnode-id="2171"><span data-dcnode-id="2170" instrument_node="">This could’ve just been a story about Soledad trying to get through her depression after her mother got deported and trying to figure who she is and what she wants to do with her life by joining a quirky club and making amazing new friendships. We could’ve gotten to learn so much more about the other characters, their backstories, etc and their friendships with each other.</span><br data-dcnode-id="2169"><br data-dcnode-id="2168"><span data-dcnode-id="2167" instrument_node="">All that being said, there were still things I really liked about this story.</span><br data-dcnode-id="2166"><br data-dcnode-id="2165"><span data-dcnode-id="2164" instrument_node="">I liked how the story focuses on Sol trying to adjust to her new reality. Her mother being deported, moving from her childhood home, and starting college is a lot of change for her to deal with. I think it makes a lot of sense that Sol is as flawed a character as she is because she is lost, depressed, and no longer knows how to navigate within her own reality. She spends so much time trying to act like a “normal” college student and ultimately it leads her to making many mistakes.</span><br data-dcnode-id="2163"><br data-dcnode-id="2162"><span data-dcnode-id="2161" instrument_node="">Another thing I liked is the very candid conversation of sexuality in this book. The book discusses the idea of not understanding one’s own sexuality and being okay with not forcing any one label. The message is basically that it is okay not to know or not to have one answer. I really appreciated that.</span><br data-dcnode-id="2160"><br data-dcnode-id="2159"><span data-dcnode-id="2158" instrument_node="">Overall, I think the concepts and ideas this book has are really good and that it’s mainly the execution of these ideas that can be improved upon. As far as my personal enjoyment of the novel, my feelings are very lukewarm. I did not love nor hate this book. This is still a decent debut novel and I would be interested in other things the author writes.</span><br data-dcnode-id="2157"><br data-dcnode-id="2156"><span data-dcnode-id="2155" instrument_node="">While I didn’t love it, I think a lot of other people would enjoy this novel.</span><br data-dcnode-id="2154"><br data-dcnode-id="2153"><span data-dcnode-id="2152" instrument_node="">Thank you to NetGalley for this eARC. </span><br data-dcnode-id="2151"></span><span data-dcnode-id="2149" instrument_node="">

</span><span data-dcnode-id="2062" id="freeTextContainer12287984245080981777"><span data-dcnode-id="2069" instrument_node="">Thank you to the publisher and Netgalley for the advanced copy. All opinions are my own.</span><br data-dcnode-id="2068"><br data-dcnode-id="2067"><span data-dcnode-id="2066" instrument_node="">I was really excited about this book, and I thought that it would be a concept that I would like. Unfortunately, pretty much all I enjoyed was the concept, as the execution fell flat.</span><br data-dcnode-id="2065"><br data-dcnode-id="2064"><span data-dcnode-id="2063" instrument_node="">The concept includes themes on immigration, deportation, the fallout of having a parent deported, and finding who you are. But the way the author chose to go about these themes was like I was staring at a puzzle, thinking I had a</span></span><span data-dcnode-id="2061" instrument_node="">
</span><span data-dcnode-id="2044" id="freeText12287984245080981777" style="display:none"><span data-dcnode-id="2060" instrument_node="">Thank you to the publisher and Netgalley for the advanced copy. All opinions are my own.</span><br data-dcnode-id="2059"><br data-dcnode-id="2058"><span data-dcnode-id="2057" instrument_node="">I was really excited about this book, and I thought that it would be a concept that I would like. Unfortunately, pretty much all I enjoyed was the concept, as the execution fell flat.</span><br data-dcnode-id="2056"><br data-dcnode-id="2055"><span data-dcnode-id="2054" instrument_node="">The concept includes themes on immigration, deportation, the fallout of having a parent deported, and finding who you are. But the way the author chose to go about these themes was like I was staring at a puzzle, thinking I had all the pieces, but as I tried to fit them together I realized they wouldn't connect. The characters all felt two dimensional until the second half of the book, and I think they only started to come together a little more since I had read so many pages about them already. This includes Sol, the main character. I think the author tried to give her wisdom through her internal monologues, but that didn't click with Sol's inability to figure out who she is or make important decisions. It became a tool to try to teach the reader instead. There also wasn't a goal or driving force behind a lot of what Sol was going through, so the story ended up being more about her moving through her life instead of being an active participant. The biggest goal that I feel Sol wanted was to change her mom's immigration situation, but it's stated multiple times that Sol has to wait until at least her twenty-first birthday to start along this path, so it hardly drove the story at all.</span><br data-dcnode-id="2053"><br data-dcnode-id="2052"><span data-dcnode-id="2051" instrument_node="">The other thing I really didn't like about the story was Sol's supposed college experience, especially with the history club. Sol is forced to do something shady to get into the club, which in my book crosses all the hazing lines. It also didn't make sense to me that a history club had meetings for the whole book and the single remotely nerdy thing they did was dress up as historical figures. If they were actually meeting to discuss their shared love of history, the least they could do would be open the club meetings with an interesting history fact someone learned that week. That would have kept my suspension of disbelief intact instead of questioning the whole operation for the duration of the book.</span><br data-dcnode-id="2050"><br data-dcnode-id="2049"><span data-dcnode-id="2048" instrument_node="">Pretty much the only redeeming quality I can list about this book is that it has representation for readers of the Latinx, immigrant, Black, and LGBTQ+ communities. However, that representation is not written well nor executed well, so I would certainly recommend a different story that includes representation over this one if that is what the reader is looking for.</span><br data-dcnode-id="2047"><br data-dcnode-id="2046"><span data-dcnode-id="2045" instrument_node="">Buy, Borrow, or Bypass: Bypass. You can safely not read this book and not miss adding anything crucial to your reading experience. Like I said at the beginning, I really wanted to like this book, but the writing just didn't make it worth it in the end. I guess the final thing I can thank the book for is giving me an exercise in how to critically analyze what works and what doesn't when you want to tell a story. This was an example of what doesn't work.</span></span><span data-dcnode-id="2043" instrument_node="">

</span><span data-dcnode-id="1965" id="freeTextContainer9170042899161535488"><span data-dcnode-id="1969" instrument_node="">I have been immersed in Latinx reads this week and this was another. I wasn’t sure what to expect because I’ve never read a book from a Wattpad author, but overall, it was okay. The synopsis sounded promising o I was ready to dive in. It was a pleasant coming of age read. We see Sol, the main character, go through so many small and big changes in a small period of time after her mom is deported.</span><br data-dcnode-id="1968"><br data-dcnode-id="1967"><span data-dcnode-id="1966" instrument_node="">I was surprised that this was set in college because I did get more of a private high school kind of f</span></span><span data-dcnode-id="1964" instrument_node="">
</span><span data-dcnode-id="1951" id="freeText9170042899161535488" style="display:none"><span data-dcnode-id="1963" instrument_node="">I have been immersed in Latinx reads this week and this was another. I wasn’t sure what to expect because I’ve never read a book from a Wattpad author, but overall, it was okay. The synopsis sounded promising o I was ready to dive in. It was a pleasant coming of age read. We see Sol, the main character, go through so many small and big changes in a small period of time after her mom is deported.</span><br data-dcnode-id="1962"><br data-dcnode-id="1961"><span data-dcnode-id="1960" instrument_node="">I was surprised that this was set in college because I did get more of a private high school kind of feel from it. Setting that aside I did enjoy seeing the character development of Sol. Her awkward, sarcastic nature reminded me a lot of who I was as a teenager. However, it was the only thing I could relate to. Sol is not perfect, and I appreciated that. She doesn’t always say the right things, may make some decisions and is willing to jump into a challenge. Although these are redeeming qualities, there were parts of the story where Sol seem a bit insensitive to some of her friends concerns. Hearing the story through Sol’s perspective was an interesting approach and I was intrigued to hear some of the shenanigans the history club got into.</span><br data-dcnode-id="1959"><br data-dcnode-id="1958"><span data-dcnode-id="1957" instrument_node="">Speaking of history club, this was vastly different than any club I have been a part of. Was I mad about this, no. It was a unique approach that gave ways to some daring, dangerous and odd adventures. It was a bit refreshing to have that different approach of a club in a story you were expecting it to be in. Now, in regard to the supportive characters, Sol’s father and Anna had the most layers to their stories. Through their dialogue we were able to see just how close the family was and how they were working together to deal with their life being turned upside down. We were able to get some bit of the other supporting characters, but I did want to see more development to them since they helped bring together Sol’s story. I also wanted more of the romance because I saw so much potential with that story line, but I settled for cute contemporary romance I received.</span><br data-dcnode-id="1956"><br data-dcnode-id="1955"><span data-dcnode-id="1954" instrument_node="">Overall, it was an okay read. The pacing was a bit off and the writing style took some adjusting too, but the author has potential to create a good story with some tweaking and fine tuning. Did I enjoy the read? Yes. It was quick and easy read with a simplistic feel. </span><br data-dcnode-id="1953"><br data-dcnode-id="1952"></span><span data-dcnode-id="1950" instrument_node="">

</span><span data-dcnode-id="1869" id="freeTextContainer8076178185034706513"><span data-dcnode-id="1876" instrument_node="">Content warning: misgender of a trans person, deportation, racism</span><br data-dcnode-id="1875"><br data-dcnode-id="1874"><span data-dcnode-id="1873" instrument_node="">Thank you to Netgalley and the publisher for providing me with an advanced copy of Historically Inaccurate in exchange for an honest review. </span><br data-dcnode-id="1872"><br data-dcnode-id="1871"><span data-dcnode-id="1870" instrument_node="">There were many aspects of this story that I really appreciated. I liked how Sol's Mexican culture was integrated into the story, how her parents spoke in Spanish to her and she would (sometimes) translate it for the reader, the depth behind Sol's character and the story overall, and I also re</span></span><span data-dcnode-id="1868" instrument_node="">
</span><span data-dcnode-id="1848" id="freeText8076178185034706513" style="display:none"><span data-dcnode-id="1867" instrument_node="">Content warning: misgender of a trans person, deportation, racism</span><br data-dcnode-id="1866"><br data-dcnode-id="1865"><span data-dcnode-id="1864" instrument_node="">Thank you to Netgalley and the publisher for providing me with an advanced copy of Historically Inaccurate in exchange for an honest review. </span><br data-dcnode-id="1863"><br data-dcnode-id="1862"><span data-dcnode-id="1861" instrument_node="">There were many aspects of this story that I really appreciated. I liked how Sol's Mexican culture was integrated into the story, how her parents spoke in Spanish to her and she would (sometimes) translate it for the reader, the depth behind Sol's character and the story overall, and I also really appreciated the community college setting. I just graduated from community college and I found the setting of the story to be very familiar for me, and perfectly representative of the diversity within community college students. Also, as a native English speaker, I very much appreciate books that have a different culture or language present throughout the story and that was a very prominent aspect of Historically Inaccurate. I also enjoyed Sol as a character. Her experience and perspective in the YA genre is one I haven't read enough of, and I also liked how her character used wit as a defense mechanism and was actually pretty funny. </span><br data-dcnode-id="1860"><br data-dcnode-id="1859"><span data-dcnode-id="1858" instrument_node="">However, this story wasn't entirely flawless for me. I do have some criticisms about the plot and the characters. For one, I feel that it is important to preface this by letting you know that I am a cisgender woman. There is one character named Anna who is a trans woman. I will admit that it's possible that the author subtlety hinted at Anna's trans identity before I became aware of it, but I find it problematic that I did not realize Anna was a trans woman until someone misgendered her. The person who misgendered Anna did so by mistake, however, intention does matter because the impact of being misgendered is still the same. I fear for trans and non-binary readers who will read these scenes where Anna is misgendered and feel the harm of being misgendered themselves. As a cis reader, I can only express my issues with the way Anna's identity is handled and urge the publisher to reach out to trans and sensitivity readers for their thoughts and concerns.</span><br data-dcnode-id="1857"><br data-dcnode-id="1856"><span data-dcnode-id="1855" instrument_node="">Moreover, I really enjoyed the chemistry between Sol and Ethan in the beginning of the story. It felt very summer-y and light, and I enjoyed their discussion on sexuality. Both Sol and Ethan are incredibly mature and responsible and that was evident in their relationship as well with their respect and care for the other. I would've liked to see more light and fluffy moments between them, because most of their interactions were very serious and deep. While I enjoyed the rep of having mature and deep relationships as a college student, as the reader I felt that it almost stunted their chemistry because they went from being flirty and cute to insanely communicative and deep all the time. I would've liked to see more balance and fun in their relationship. </span><br data-dcnode-id="1854"><br data-dcnode-id="1853"><span data-dcnode-id="1852" instrument_node="">Also, the history aspect of this story and the club is lost on me. The plot revolves around this history club, but at no point in the scenes with the history club do we see any history discussion or anything that relates to history. I have to wonder why none of the characters ever questioned this- for students who seeked out a history club and talked about having an interest in history, they weren't curious about the lack of history in their history club??? That part of the story never made sense to me. </span><br data-dcnode-id="1851"><br data-dcnode-id="1850"><span data-dcnode-id="1849" instrument_node="">All in all, I enjoyed this story. I think my favorite aspect is how naturally diversity was woven into the characters. I loved seeing characters of all identities and sexualities coming of age and getting in trouble and learning and growing with one another. However, I don’t think it was expressed well enough to the audience what identities were actually being represented by the characters. </span></span><span data-dcnode-id="1847" instrument_node="">

</span><span data-dcnode-id="1747" id="freeText9051133885900892446" style="display:none"><span data-dcnode-id="1770" instrument_node="">Historically Inaccurate is an own-voices, coming of age, LatinX novel with diverse group characters and strong themes on friendship, familial relationships, and discovering one's self and sexual identity. After an unfortunate accident, Soldad (Sol) loses her mother to the US Government to be deported back to Mexico which leaves her life astray. Dealing with the grief of losing her mother and her house in the course of a year, Sol wants nothing but getting her life back to normal and hence joins the Westray Community College where her best friend, Carlos, recruits her into its History Club, in an attempt to cheer her up. Little did she know that induction into the club entails to performing a pretty wacky initiation task which is to break into the oldest building of the neighborhood, grab a fork, click a selfie with the fork and steal the same fork! </span><br data-dcnode-id="1769"><br data-dcnode-id="1768"><span data-dcnode-id="1767" instrument_node="">Here's where the love interest, Ethan (house owner's grandson), comes into play and catches Sol amidst her whole "endeavor". The story takes off from there and revolves around Sol transforming from her self-deprecating and sarcastic self to eventually loving herself for what she truly is. </span><br data-dcnode-id="1766"><span data-dcnode-id="1765" instrument_node="">The novel also broadly explores systemic racism and how society is mold in a way to benefit certain groups over others. </span><br data-dcnode-id="1764"><br data-dcnode-id="1763"><span data-dcnode-id="1762" instrument_node="">Sol: </span><br data-dcnode-id="1761"><span data-dcnode-id="1760" instrument_node="">“𝓘’𝓵𝓵 𝓽𝓻𝔂 𝓽𝓸 𝓬𝓱𝓮𝓮𝓻 𝓾𝓹 𝓯𝓸𝓻 𝔂𝓸𝓾.”</span><br data-dcnode-id="1759"><span data-dcnode-id="1758" instrument_node="">Ethan: </span><br data-dcnode-id="1757"><span data-dcnode-id="1756" instrument_node="">“𝓕𝓸𝓻 𝓶𝓮?” </span><br data-dcnode-id="1755"><span data-dcnode-id="1754" instrument_node="">“𝓝𝓸, 𝓢𝓸𝓵, 𝔂𝓸𝓾 𝓷𝓮𝓮𝓭 𝓽𝓸 𝓫𝓮 𝓱𝓪𝓹𝓹𝔂 𝓯𝓸𝓻 𝔂𝓸𝓾, 𝓫𝓾𝓽 𝓲𝓯 𝓘’𝓶 𝓲𝓷𝓿𝓸𝓵𝓿𝓮𝓭 𝓲𝓷 𝓽𝓱𝓮 𝓹𝓻𝓸𝓬𝓮𝓼𝓼 𝓸𝓯 𝓶𝓪𝓴𝓲𝓷𝓰 𝔂𝓸𝓾 𝓵𝓸𝓸𝓴 𝓵𝓮𝓼𝓼 𝓼𝓮𝓻𝓲𝓸𝓾𝓼, 𝓘’𝓵𝓵 𝓫𝓮 𝓰𝓵𝓪𝓭 𝓽𝓸 𝓱𝓮𝓵𝓹 𝓪𝓵𝓸𝓷𝓰 𝓽𝓱𝓮 𝔀𝓪𝔂.”</span><br data-dcnode-id="1753"><br data-dcnode-id="1752"><span data-dcnode-id="1751" instrument_node="">Ethan and Carlos were undoubtedly my favorite characters! I loved how they were always there for Sol and making her life far more bearable and eventually helping her find herself. However, I feel like I would've enjoyed the book a bit more if I'd read it at a younger age. Nonetheless, I enjoyed my time reading it and it was a sweet and heartwarming read, and had me feeling giddy at times!</span><br data-dcnode-id="1750"><br data-dcnode-id="1749"><span data-dcnode-id="1748" instrument_node="">Thanks to Smith Publicity and Wattpad Books for sending me a copy of the book in exchange for an honest review.</span></span><span data-dcnode-id="1746" instrument_node="">

</span><span data-dcnode-id="1659" id="freeTextContainer2437835207760055464"><span data-dcnode-id="1660" instrument_node="">Historically Inaccurate is a young adult contemporary by Shay Bravo. I enjoyed Historically Inaccurate but I didn't love it as much as I was initially hoping. I picked it up because I am a big history nerd and I was super excited to see a book featuring a college history club, which we will get into later but it didn't end up being what I thought it was going to be. Overall, it was a cute read that has a diverse cast of characters, which I enjoyed and a nice romance that was sweet. I liked this </span></span><span data-dcnode-id="1658" instrument_node="">
</span><span data-dcnode-id="1650" id="freeText2437835207760055464" style="display:none"><span data-dcnode-id="1657" instrument_node="">Historically Inaccurate is a young adult contemporary by Shay Bravo. I enjoyed Historically Inaccurate but I didn't love it as much as I was initially hoping. I picked it up because I am a big history nerd and I was super excited to see a book featuring a college history club, which we will get into later but it didn't end up being what I thought it was going to be. Overall, it was a cute read that has a diverse cast of characters, which I enjoyed and a nice romance that was sweet. I liked this one, but it didn't blow my socks off.</span><br data-dcnode-id="1656"><br data-dcnode-id="1655"><span data-dcnode-id="1654" instrument_node="">In Historically Inaccurate we meet our main character Sol, who is still reeling from her mother being deported. When Sol gets to college she joins a history club that has some strange initiation tasks for its' members. Sol is tasked with breaking into this house and stealing a fork, and during that task she meets Ethan, who becomes her love interest in the book. I liked Ethan a lot and I liked Sol well enough. It's interesting because I really liked who she is as a person, but she rubbed me the wrong way sometimes with how much she seems to chatter about nothing in her thoughts. Her thoughts and thought process were a large part of the story, which I didn't mind, but they tended to wander off in directions that didn't seem to have anything to do with the plot, and that was a little confusing for me. I loved how close Sol was with her family, and I was really happy to see that depicted in the story even with her mom being deported, which was obviously tough on Sol and her Dad.</span><br data-dcnode-id="1653"><br data-dcnode-id="1652"><span data-dcnode-id="1651" instrument_node="">Sol and Ethan were the highlight of the story for me. I thought it would be the history club, but there was very little history to the club. Instead it seemed to just be a mischief making club, which was fun, but unexpected. If you are looking for a book that features a diverse cast with many different minority representations present, hijinks and serious issues interwoven, then I think you will want to check out Historically Inaccurate. This was a decent read for me.</span></span><span data-dcnode-id="1649" instrument_node="">

</span><span data-dcnode-id="1543" id="freeText15424842919098277552" style="display:none"><span data-dcnode-id="1561" instrument_node="">I received this book through NetGalley.</span><br data-dcnode-id="1560"><br data-dcnode-id="1559"><span data-dcnode-id="1558" instrument_node="">While I do like YA literary fiction/coming of age stories, this novel felt a little flat for me.</span><br data-dcnode-id="1557"><br data-dcnode-id="1556"><span data-dcnode-id="1555" instrument_node="">I liked the family dynamic and the experience that Sol is going through; a lot of young people are no doubt experiencing something similar and so in that way woulf probably find it quite relatable.</span><br data-dcnode-id="1554"><span data-dcnode-id="1553" instrument_node="">I also liked some of the more existential discussions between the characters and the general comments on life and the diversity of individual experience.</span><br data-dcnode-id="1552"><br data-dcnode-id="1551"><span data-dcnode-id="1550" instrument_node="">However, I didn't feel that the characters were very substantial. I know when people are young and in college they are still 'finding themselves' and working out who they are, but there was so much of the characters and plot that felt glossed over.</span><br data-dcnode-id="1549"><br data-dcnode-id="1548"><span data-dcnode-id="1547" instrument_node="">There didn't really seem to be any reason for the characters to join the history club or to participate in the activities. There wasn't anything that really substantiated why they might be happy in their lives and rebelling in some way.</span><br data-dcnode-id="1546"><br data-dcnode-id="1545"><span data-dcnode-id="1544" instrument_node="">I felt like Historically Inaccurate real potential, but just could have been a lot better.</span></span><span data-dcnode-id="1542" instrument_node="">

</span><span data-dcnode-id="1005" id="freeTextContainer1859291378973330198"><span data-dcnode-id="1008" instrument_node="">This a coming-of-age story about Sol, a latina girl, whose mother got deported back to Mexico, due to being illegal in the USA. She is in the community college where she lives with her dad, and decides to get into the History club. The catch: their initiation process is a bit out there.</span><br data-dcnode-id="1007"><span data-dcnode-id="1006" instrument_node="">As a brazilian girl, I always love seeing Latinx rep in literature, specially for youger readers who are in college. Even though the writing was pretty simple, there was something about Sol as a main character tha</span></span><span data-dcnode-id="1004" instrument_node="">
</span><span data-dcnode-id="996" id="freeText1859291378973330198" style="display:none"><span data-dcnode-id="1003" instrument_node="">This a coming-of-age story about Sol, a latina girl, whose mother got deported back to Mexico, due to being illegal in the USA. She is in the community college where she lives with her dad, and decides to get into the History club. The catch: their initiation process is a bit out there.</span><br data-dcnode-id="1002"><span data-dcnode-id="1001" instrument_node="">As a brazilian girl, I always love seeing Latinx rep in literature, specially for youger readers who are in college. Even though the writing was pretty simple, there was something about Sol as a main character that I could really relate to and admire about her. Her parents were well developed, but I wish her friend from the club were a bit more layered.</span><br data-dcnode-id="1000"><span data-dcnode-id="999" instrument_node="">The plot was interesting, but what made me like it more than most readers was that connection with the immigration discussion, and discovering who you are and your place in the world. Also, the romance was quite cute and sweet.</span><br data-dcnode-id="998"><span data-dcnode-id="997" instrument_node="">I'll be definitely trying more from Shay Bravo in the future!</span></span><span data-dcnode-id="995" instrument_node="">

        </span><span class="staticStars notranslate" data-dcnode-id="927" title="really liked it"><span class="staticStar p10" data-dcnode-id="932" size="15x15"><span data-dcnode-id="933" instrument_node="">really liked it</span></span><span class="staticStar p10" data-dcnode-id="931" size="15x15"></span><span class="staticStar p10" data-dcnode-id="930" size="15x15"></span><span class="staticStar p10" data-dcnode-id="929" size="15x15"></span><span class="staticStar p0" data-dcnode-id="928" size="15x15"></span></span><span data-dcnode-id="926" instrument_node="">

</span><span data-dcnode-id="914" id="freeTextContainer5623764205835018000"><span data-dcnode-id="921" instrument_node="">3.75 out of 5 stars</span><br data-dcnode-id="920"><br data-dcnode-id="919"><span data-dcnode-id="918" instrument_node="">HISTORICALLY INACCURATE follows college student Soledad Gutierrez, a year after her mother is deported to Mexico, following a car accident. </span><br data-dcnode-id="917"><br data-dcnode-id="916"><span data-dcnode-id="915" instrument_node="">As a first generation, Mexican-American with immigrant parents, Soledad's story really hit home for me. The way this book handled the realities of deportation and immigration issues in the United States was very raw and honest. Shay did an excellent job showing how the deportation impacted Soledad, and it felt very raw and real. And while </span></span><span data-dcnode-id="913" instrument_node="">
</span><span data-dcnode-id="884" id="freeText5623764205835018000" style="display:none"><span data-dcnode-id="912" instrument_node="">3.75 out of 5 stars</span><br data-dcnode-id="911"><br data-dcnode-id="910"><span data-dcnode-id="909" instrument_node="">HISTORICALLY INACCURATE follows college student Soledad Gutierrez, a year after her mother is deported to Mexico, following a car accident. </span><br data-dcnode-id="908"><br data-dcnode-id="907"><span data-dcnode-id="906" instrument_node="">As a first generation, Mexican-American with immigrant parents, Soledad's story really hit home for me. The way this book handled the realities of deportation and immigration issues in the United States was very raw and honest. Shay did an excellent job showing how the deportation impacted Soledad, and it felt very raw and real. And while the story handles such heavy topics like these, and racism, it still manages to be light-hearted enough, and many moments shared between Soledad and her parents felt realistic and in tone with what teenagers today may see in their own family dynamics. </span><br data-dcnode-id="905"><span data-dcnode-id="904" instrument_node="">I genuinely appreciated the Mexican representation in this book; from the food and music mentioned, and the Spanish spoken between Soledad, Carlos, and her parents, I felt right at home among Shay's written world.</span><br data-dcnode-id="903"><br data-dcnode-id="902"><span data-dcnode-id="901" instrument_node="">I also really enjoyed the history club sub-plot. I didn't think it would end up being such a big part of the story, but I thought Shay did a good job of tying it in with the other aspects and issues Soledad was facing in her life. Soledad herself is such a dynamic character, and is a great lead/hero in this story! She was such a great representation of your typical/not-so typical college student, and it made me remember my own years in college as a confused, insecure young adult! I also enjoyed the friendships she had with Carlos and Diane, and thoroughly appreciated how much she loved and cared for these characters, and demonstrated what healthy friendships as adults can look like. </span><br data-dcnode-id="900"><br data-dcnode-id="899"><span data-dcnode-id="898" instrument_node="">I also enjoyed seeing such a diverse cast of characters through the history club, and how they didn't feel forced or fell flat. However, I do believe the author could have done a better job at mentioning that the love interest (LI), Ethan, was black. It felt somewhat tokenized for that rather important piece of information to be mentioned almost halfway through the story. </span><br data-dcnode-id="897"><br data-dcnode-id="896"><span data-dcnode-id="895" instrument_node="">I would also like to mention, as a content warning, that Ethan (LI) does misgender a transgender character twice in the story. This is used to reveal that the character is trans to readers, but I do think it needs a warning for those it may be triggering to. </span><br data-dcnode-id="894"><br data-dcnode-id="893"><span data-dcnode-id="892" instrument_node="">And finally, Ethan as the love interest was wonderful. I thought he was a well rounded, genuine character! He and Soledad had such cute interactions and I truly enjoyed their friendship and budding relationship.</span><br data-dcnode-id="891"><br data-dcnode-id="890"><span data-dcnode-id="889" instrument_node="">Overall, I think this is a wonderful debut, and as an own voices reviewer, a book full of wonderful, and much appreciated representation and quality.</span><br data-dcnode-id="888"><br data-dcnode-id="887"><br data-dcnode-id="886"><span data-dcnode-id="885" instrument_node="">Thank you to NetGalley for the ARC in exchange for an honest review. This does not influence my opinions.</span></span><span data-dcnode-id="883" instrument_node="">
