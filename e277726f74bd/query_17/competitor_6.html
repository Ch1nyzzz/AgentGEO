</span><span data-dcnode-id="1420" id="freeTextContainer11327829713576502013"><span data-dcnode-id="1424" instrument_node="">Major disappointment, this book. First, the title and subtitle suggest that the rediscovery of the manuscript of Lucretius' </span><i data-dcnode-id="1422"><span data-dcnode-id="1423" instrument_node="">On the Nature of Things</span></i><span data-dcnode-id="1421" instrument_node=""> had a major influence on Renaissance thinking. Greenblatt does not make his case on this, in fact, offers only the palest of evidence: a sentence here or there from a handful of Renaissance types. It's as though he came up with an idea, started doing the research, found out the thesis didn't wash, but wrote the book anyway. The misguided ideas about </span></span><span data-dcnode-id="1419" instrument_node="">
</span><span data-dcnode-id="1399" id="freeText11327829713576502013" style="display:none"><span data-dcnode-id="1418" instrument_node="">Major disappointment, this book. First, the title and subtitle suggest that the rediscovery of the manuscript of Lucretius' </span><i data-dcnode-id="1416"><span data-dcnode-id="1417" instrument_node="">On the Nature of Things</span></i><span data-dcnode-id="1415" instrument_node=""> had a major influence on Renaissance thinking. Greenblatt does not make his case on this, in fact, offers only the palest of evidence: a sentence here or there from a handful of Renaissance types. It's as though he came up with an idea, started doing the research, found out the thesis didn't wash, but wrote the book anyway. The misguided ideas about epicureanism, and the Catholic Church's opposition to them, predated the rediscovery of the Lucretius manuscript. The valid -- in view of Church theology -- criticisms had been around for centuries. Epicureanism had little influence either way on the trends in Renaissance thinking. Neoplatonism was by far the more important development and had far-ranging influence.</span><br data-dcnode-id="1414"><br data-dcnode-id="1413"><span data-dcnode-id="1412" instrument_node="">Greenblatt seems to do a lot of padding. While the story of the discovery of a still-existing manuscript was intersting, it became almost juvenile in its execution. Many of the details, apparently meant to give some sense of the times, seemed irrelevant and interrupted the narrative of the discovery. A lot of words about very little.</span><br data-dcnode-id="1411"><br data-dcnode-id="1410"><span data-dcnode-id="1409" instrument_node="">If you haven't read Lucretius' work, he has a chapter which is basically an outline of the ideas found in </span><i data-dcnode-id="1407"><span data-dcnode-id="1408" instrument_node="">The Nature of Things</span></i><span data-dcnode-id="1406" instrument_node="">. However, it's far into the book, so if this is what you're looking for, you have to wade through a lot to get there. This chapter is the best thing in the book. His outline is accurate, and covers all the major ideas. Unfortunately, it does read a bit like a Cliff Notes version of Lucretius.</span><br data-dcnode-id="1405"><br data-dcnode-id="1404"><span data-dcnode-id="1403" instrument_node="">I gave this two stars rather than one only because I love to read anything about the Renaissance. And there are times when Greenblatt's writing is engaging. But overall, if you want to understand Lucretius, read him in an Oxford or Penguin translation. If you think Greenblatt is going to show you an influence of epicurean thinking you never knew about, don't bother with this book. You can't create an influence just because you want it to be there. If Greenblatt proved anything, it's that.</span><br data-dcnode-id="1402"><br data-dcnode-id="1401"><span data-dcnode-id="1400" instrument_node=""> </span></span><span data-dcnode-id="1398" instrument_node="">

</span><span data-dcnode-id="1278" id="freeText6976681445645284157" style="display:none"><span data-dcnode-id="1297" instrument_node="">This book is OK overall, no more, and IS deserving of the criticism Greenblatt has gotten, for overstating his case and more.</span><br data-dcnode-id="1296"><br data-dcnode-id="1295"><span data-dcnode-id="1294" instrument_node="">Greenblatt's good part is explaining how Poggio came across the book, his general hunting for books, what it was like to be an early Renaissance non-clerical humanist and similar things.</span><br data-dcnode-id="1293"><br data-dcnode-id="1292"><span data-dcnode-id="1291" instrument_node="">The not so good is overstating his case, and getting some things wrong, incomplete or unexplained.</span><br data-dcnode-id="1290"><br data-dcnode-id="1289"><span data-dcnode-id="1288" instrument_node="">First, the inventors of atomic theory, Democritus and Leucippus were pre-Epicurean and even pre-Socratic. Greenblatt never mentions this. Nor does he mention that Greek philosophers in general were anti-empirical, and therefore antiscientific, as we know science today. (Indeed, one could argue that Archimedes and Eratosthenes were the only two real scientists the Hellenistic world produced.)</span><br data-dcnode-id="1287"><br data-dcnode-id="1286"><span data-dcnode-id="1285" instrument_node="">Ergo, especially if we start "modernity" with the Enlightenment and not the Renaissance, Epicureanism was not "how the world became modern." Not even close.</span><br data-dcnode-id="1284"><br data-dcnode-id="1283"><span data-dcnode-id="1282" instrument_node="">Second, he cherry-picks who was influenced by Lucretius, and how much, and how much influence they had. The late Renaissance world didn't see a flowering of Giordano Brunos.</span><br data-dcnode-id="1281"><br data-dcnode-id="1280"><span data-dcnode-id="1279" instrument_node="">In this way, the book reminds me of a Ph.D. these written by either an English lit or a psychology grad student, trying to find something semi-outrageous to "break through."</span></span><span data-dcnode-id="1277" instrument_node="">

</span><span data-dcnode-id="1184" id="freeText17268785189477136953" style="display:none"><span data-dcnode-id="1185" instrument_node="">However beautifully told--and it is--I think the main thrust of Greenblatt's history, that the discovery in 1417 of Lucretius's long lost poem On the Nature of Things changed the course of history might be a little overstated. We were going to arrive at who we are without Lucretius and I have reservations about saying the rediscovery of him and his philosophically enlightened poem by Bracciolini on the cusp of the Renaissance speeded up the acquiring of knowledge or helped beat back the tides of superstition which had covered the medieval world. The understanding we have of the natural world would have come. We can still find superstition everywhere around us in modern societies. The book's magnificence lies in the portraits of the principals of the story Greenblatt tells, men like Poggio Bracciolini himself, Giordano Bruno, Galileo, and the various popes. And also in his portrait of the world they lived in. It's a good telling of unfamiliar history.</span></span><span data-dcnode-id="1183" instrument_node="">

</span><span data-dcnode-id="1099" id="freeTextContainer4253077326459908139"><span data-dcnode-id="1103" instrument_node="">Supposing you were fluent in ancient and modern Latin as well as French, Spanish, and Italian, and of course Greek; that you had trained yourself to be focused and swift at your work and to make a minimum of errors; and further that your handwriting was acknowledged to be particularly clear and elegant.</span><br data-dcnode-id="1102"><br data-dcnode-id="1101"><span data-dcnode-id="1100" instrument_node="">Nowadays you would have a lengthy career in valet parking to look forward to. But in the early 15th century you might find yourself as the equivalent of senior speechwriter for the pope. This was </span></span><span data-dcnode-id="1098" instrument_node="">
</span><span data-dcnode-id="1077" id="freeText4253077326459908139" style="display:none"><span data-dcnode-id="1097" instrument_node="">Supposing you were fluent in ancient and modern Latin as well as French, Spanish, and Italian, and of course Greek; that you had trained yourself to be focused and swift at your work and to make a minimum of errors; and further that your handwriting was acknowledged to be particularly clear and elegant.</span><br data-dcnode-id="1096"><br data-dcnode-id="1095"><span data-dcnode-id="1094" instrument_node="">Nowadays you would have a lengthy career in valet parking to look forward to. But in the early 15th century you might find yourself as the equivalent of senior speechwriter for the pope. This was the job of Poggio Bracciolini, until Pope John XXIII was unthroned and Poggio found himself an unemployment statistic. (Pope John XXIII is better known as Antipope John XXIII or, to some, John XXII. See Gibbon.)</span><br data-dcnode-id="1093"><br data-dcnode-id="1092"><span data-dcnode-id="1091" instrument_node="">Since Poggio was already in Germany for the Council of Constance, which deposed his man, he took to the road to look for old books. In those days there weren’t a lot of bookstores and public libraries, so he went to monasteries where he was able to find and rescue from oblivion numerous copies of ancient Greek and Latin works from their libraries before the monks palimpsested them, scraped the letters off the vellum and reused it for Bibles and prayer books. One of the ancient books he found was Lucretius’ On the Nature of Things. The Swerve is about Poggio’s discovery and the effect the revival of that book and others like it had on the late medieval world, leading to what we call the Renaissance.</span><br data-dcnode-id="1090"><br data-dcnode-id="1089"><span data-dcnode-id="1088" instrument_node="">There are a lot of reasons to read this lengthy essay by Stephen Goldblatt, his limpid prose style for one and his short history of the decline of the Roman Empire for another. But what I most enjoyed was the explanation of what is in De Rerum Natura, atomism and the Epicurian philosophy, and how these idea led to the Renaissance and eventually to the Age of Reason.</span><br data-dcnode-id="1087"><br data-dcnode-id="1086"><span data-dcnode-id="1085" instrument_node="">Poggio wasn’t the only book hunter. In the mid-14th century, Petrarch was a book lover: “Gold, silver, jewels, purple garments, houses built of marble, groomed estates, pious paintings, caparisoned steeds, and other things of this kind offer a mutable and superficial pleasure; books give delight to the very marrow of one’s bones. They speak to us, consult with us, and join with us in a living and intense intimacy.”</span><br data-dcnode-id="1084"><br data-dcnode-id="1083"><span data-dcnode-id="1082" instrument_node="">Poggio tells the sad story of the decline of western civilization into the dark ages. Says Goldblatt: “The other libraries of the ancient world fared no better than [the great library in, Alexandria.] A survey of Rome in the early fourth century listed twenty-eight public libraries, in addition to the unnumbered private collections in aristocratic mansions. Near the century’s end, the historian Ammianus Marcellinus complained that Romans had virtually abandoned serious reading. Ammianus was not lamenting barbarian raids or Christian fanaticism. No doubt these were at work, somewhere in the background of the phenomena that struck him. But what he observed, as the empire slowly crumbled, was a loss of cultural moorings, a descent into febrile triviality. ‘In place of the philosopher the singer is called in, and in place of the orator the teacher of stagecraft, and while the libraries are shut up forever like tombs, water-organs are manufactured and lyres as large as carriages.’ Moreover, he noted, sourly, people were driving their chariots at lunatic speed through the crowded streets.”</span><br data-dcnode-id="1081"><br data-dcnode-id="1080"><span data-dcnode-id="1079" instrument_node="">Mutatis mutandis.</span><br data-dcnode-id="1078"></span><span data-dcnode-id="1076" instrument_node="">

</span><span data-dcnode-id="425" id="freeTextContainer16308277466003307145"><strong data-dcnode-id="441"><span data-dcnode-id="442" instrument_node="">Stephen Greenblatt</span></strong><span data-dcnode-id="440" instrument_node=""> (Ph.D. Yale) is Cogan University Professor of English and American Literature and Language at Harvard University. Also General Editor of </span><em data-dcnode-id="438"><span data-dcnode-id="439" instrument_node="">The Norton Anthology of English Literature, Eighth Edition</span></em><span data-dcnode-id="437" instrument_node="">, he is the author of nine books, including </span><em data-dcnode-id="435"><span data-dcnode-id="436" instrument_node="">Will in the World: How Shakespeare Became Shakespeare</span></em><span data-dcnode-id="434" instrument_node="">; </span><em data-dcnode-id="432"><span data-dcnode-id="433" instrument_node="">Hamlet in Purgatory</span></em><span data-dcnode-id="431" instrument_node="">; </span><em data-dcnode-id="429"><span data-dcnode-id="430" instrument_node="">Practicing New Historicism</span></em><span data-dcnode-id="428" instrument_node="">; </span><em data-dcnode-id="426"><span data-dcnode-id="427" instrument_node="">Marvelous Possessions: The Wonder of t</span></em></span><span data-dcnode-id="424" instrument_node="">
</span><span data-dcnode-id="384" id="freeText16308277466003307145" style="display:none"><strong data-dcnode-id="422"><span data-dcnode-id="423" instrument_node="">Stephen Greenblatt</span></strong><span data-dcnode-id="421" instrument_node=""> (Ph.D. Yale) is Cogan University Professor of English and American Literature and Language at Harvard University. Also General Editor of </span><em data-dcnode-id="419"><span data-dcnode-id="420" instrument_node="">The Norton Anthology of English Literature, Eighth Edition</span></em><span data-dcnode-id="418" instrument_node="">, he is the author of nine books, including </span><em data-dcnode-id="416"><span data-dcnode-id="417" instrument_node="">Will in the World: How Shakespeare Became Shakespeare</span></em><span data-dcnode-id="415" instrument_node="">; </span><em data-dcnode-id="413"><span data-dcnode-id="414" instrument_node="">Hamlet in Purgatory</span></em><span data-dcnode-id="412" instrument_node="">; </span><em data-dcnode-id="410"><span data-dcnode-id="411" instrument_node="">Practicing New Historicism</span></em><span data-dcnode-id="409" instrument_node="">; </span><em data-dcnode-id="407"><span data-dcnode-id="408" instrument_node="">Marvelous Possessions: The Wonder of the New World</span></em><span data-dcnode-id="406" instrument_node="">; </span><em data-dcnode-id="404"><span data-dcnode-id="405" instrument_node="">Learning to Curse: Essays in Early Modern Culture</span></em><span data-dcnode-id="403" instrument_node="">; and </span><em data-dcnode-id="401"><span data-dcnode-id="402" instrument_node="">The Swerve: How the World Became Modern</span></em><span data-dcnode-id="400" instrument_node="">. He has edited six collections of criticism, is the co-author (with Charles Mee) of a play, </span><em data-dcnode-id="398"><span data-dcnode-id="399" instrument_node="">Cardenio</span></em><span data-dcnode-id="397" instrument_node="">, and is a founding coeditor of the journal </span><em data-dcnode-id="395"><span data-dcnode-id="396" instrument_node="">Representations</span></em><span data-dcnode-id="394" instrument_node="">. He honors include the MLA's James Russell Lowell Prize, for </span><em data-dcnode-id="392"><span data-dcnode-id="393" instrument_node="">Shakespearean Negotiations: The Circulation of Social Energy in Renaissance England</span></em><span data-dcnode-id="391" instrument_node="">, the Distinguished Humanist Award from the Mellon Foundation, the Distinguished Teaching Award from the University of California, Berkeley. He is a fellow of the American Academy of Arts and Sciences and the American Philosophical Society. He lives in Cambridge, Massachusetts, and in Vermont.</span><br data-dcnode-id="390"><br data-dcnode-id="389"><span data-dcnode-id="388" instrument_node="">Stephen Jay Greenblatt is a Pulitzer Prize winning American literary critic, theorist and scholar.</span><br data-dcnode-id="387"><br data-dcnode-id="386"><span data-dcnode-id="385" instrument_node="">Greenblatt is regarded by many as one of the founders of New Historicism, a set of critical practices that he often refers to as "cultural poetics"; his works have been influential since the early 1980s when he introduced the term. Greenblatt has written and edited numerous books and articles relevant to new historicism, the study of culture, Renaissance studies and Shakespeare studies and is considered to be an expert in these fields. He is also co-founder of the literary-cultural journal Representations, which often publishes articles by new historicists. His most popular work is Will in the World, a biography of Shakespeare that was on the New York Times Best Seller List for nine weeks.</span></span><span data-dcnode-id="383" instrument_node="">
