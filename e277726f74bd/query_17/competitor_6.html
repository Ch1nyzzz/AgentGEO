</span><span data-dcnode-id="5819" id="freeText615730514676307887" style="display:none"><span data-dcnode-id="5829" instrument_node="">One of the world's most celebrated scholars, Stephen Greenblatt has crafted both an innovative work of history and a thrilling story of discovery, in which one manuscript, plucked from a thousand years of neglect, changed the course of human thought and made possible the world as we know it.</span><br data-dcnode-id="5828"><br data-dcnode-id="5827"><span data-dcnode-id="5826" instrument_node="">Nearly six hundred years ago, a short, genial, cannily alert man in his late thirties took a very old manuscript off a library shelf, saw with excitement what he had discovered, and ordered that it be copied. That book was the last surviving manuscript of an ancient Roman philosophical epic, </span><em data-dcnode-id="5824"><span data-dcnode-id="5825" instrument_node="">On the Nature of Things</span></em><span data-dcnode-id="5823" instrument_node="">, by Lucretius—a beautiful poem of the most dangerous ideas: that the universe functioned without the aid of gods, that religious fear was damaging to human life, and that matter was made up of very small particles in eternal motion, colliding and swerving in new directions.</span><br data-dcnode-id="5822"><br data-dcnode-id="5821"><span data-dcnode-id="5820" instrument_node="">The copying and translation of this ancient book—the greatest discovery of the greatest book-hunter of his age—fueled the Renaissance, inspiring artists such as Botticelli and thinkers such as Giordano Bruno; shaped the thought of Galileo and Freud, Darwin and Einstein; and had a revolutionary influence on writers such as Montaigne and Shakespeare and even Thomas Jefferson.</span></span><span data-dcnode-id="5818" instrument_node="">

</span><span class="readable" data-dcnode-id="4939" id="reviewTextContainer323867067"><span data-dcnode-id="5097" instrument_node="">
</span><span data-dcnode-id="5094" id="freeTextContainer9166851103793415016"><b data-dcnode-id="5095"><span data-dcnode-id="5096" instrument_node="">"When we say...that pleasure is the end and aim of life, we do not mean the pleasures of the prodigal or the pleasures of sensuality, as we are understood to do by some through ignorance, prejudice, or willful misrepresentation. By pleasure we mean the absence of pain in the body and of trouble in the soul. It is not by an unbroken succession of drinking bouts and of revelry, not by sexual lust, nor the enjoyment of fish and other delicacies of a luxurious table, which produce a pleasant life; i</span></b></span><span data-dcnode-id="5093" instrument_node="">
</span><span data-dcnode-id="4944" id="freeText9166851103793415016" style="display:none"><b data-dcnode-id="5091"><span data-dcnode-id="5092" instrument_node="">"When we say...that pleasure is the end and aim of life, we do not mean the pleasures of the prodigal or the pleasures of sensuality, as we are understood to do by some through ignorance, prejudice, or willful misrepresentation. By pleasure we mean the absence of pain in the body and of trouble in the soul. It is not by an unbroken succession of drinking bouts and of revelry, not by sexual lust, nor the enjoyment of fish and other delicacies of a luxurious table, which produce a pleasant life; it is sober reasoning, searching out the grounds of every choice and avoidance, and banishing those beliefs through which the greatest tumults take possession of the soul." ---Epicurus</span></b><br data-dcnode-id="5090"><br data-dcnode-id="5089"><span data-dcnode-id="5088" instrument_node="">I haven't read a book in a long time that has introduced me to so many historical figures to admire. Some of that is born out of my own ignorance, but the wonderful thing about ignorance is I have the means to dismiss it. I have heard of Hypatia and last year even watched a movie based on her life called </span><i data-dcnode-id="5086"><span data-dcnode-id="5087" instrument_node="">Agora</span></i><span data-dcnode-id="5085" instrument_node=""> starring the lovely Rachel Weisz. I have brushed up against Epicurus and Lucretius, but they are mere footnotes on other files logged sporadically in the dim halls of my memories. </span><br data-dcnode-id="5084"><br data-dcnode-id="5083"><a data-dcnode-id="5079" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//s1183.photobucket.com/albums/x462/jkeeten/%3Faction%3Dview%26current%3DEpicurus.jpg" rel="nofollow noopener" target="_blank"><span data-dcnode-id="5082" instrument_node="">
</span><img alt="Photobucket" class="gr-hostedUserImg" data-dcnode-id="5081" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//i.gr-assets.com/images/S/compressed.photo.goodreads.com/hostedimages/1532095305i/26002653._SY540_.jpg&amp;raw"><span data-dcnode-id="5080" instrument_node="">
</span></a><br data-dcnode-id="5078"><b data-dcnode-id="5076"><span data-dcnode-id="5077" instrument_node="">Epicurus</span></b><br data-dcnode-id="5075"><br data-dcnode-id="5074"><span data-dcnode-id="5073" instrument_node=""> </span><a data-dcnode-id="5069" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//s1183.photobucket.com/user/jkeeten/media/Lucretius.jpg.html" rel="nofollow noopener" target="_blank"><span data-dcnode-id="5072" instrument_node="">
</span><img alt=" photo Lucretius.jpg" class="gr-hostedUserImg" data-dcnode-id="5071" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//i.gr-assets.com/images/S/compressed.photo.goodreads.com/hostedimages/1532095305i/26002651.jpg&amp;raw"><span data-dcnode-id="5070" instrument_node="">
</span></a><br data-dcnode-id="5068"><b data-dcnode-id="5066"><span data-dcnode-id="5067" instrument_node="">Lucretius</span></b><br data-dcnode-id="5065"><br data-dcnode-id="5064"><span data-dcnode-id="5063" instrument_node="">I had no reference to tell me what colossal figures they are, bearing brilliant ideas that give footing to my own paltry concepts of my own life philosophy. </span><br data-dcnode-id="5062"><br data-dcnode-id="5061"><span data-dcnode-id="5060" instrument_node="">If I were to dig out my time machine that I was tinkering with way back during a Stephen King review </span><a data-dcnode-id="5058" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.goodreads.com/review/show/286846119" rel="noopener nofollow" target="_blank"><span data-dcnode-id="5059" instrument_node="">http://www.goodreads.com/review/show/...</span></a><span data-dcnode-id="5057" instrument_node=""> and decide to take a trip back to 1417; invariably, as we know despite my best efforts something would go wrong and I would be stuck there. I could only hope I could find Poggio Bracciolini and tag along with him as he </span><i data-dcnode-id="5055"><span data-dcnode-id="5056" instrument_node="">"became a midwife to modernity".</span></i><span data-dcnode-id="5054" instrument_node=""> Poggio in 1417 finds himself unemployed. Most recently he had been Apostolic Scriptor for the pope. His boss had been defrocked and thrown in jail and given the circumstances had no more need of his services. </span><br data-dcnode-id="5053"><br data-dcnode-id="5052"><span data-dcnode-id="5051" instrument_node="">Poggio short on funds, but long on bibliophilic desire is searching for lost books. He is a charmer and he has to be to convince monks to allow him to poke among the dusty remains of ancient texts in their libraries. Luckily there was a time when Christians were curious about the world beyond the bible and had copied and preserved even those texts that they found to be contrary to their own beliefs. That time is past and in the 1400s those texts had not been recopied and were vulnerable to bugs, damp, and abuse. Poggio in one such monastery finds a book that was so dangerous that it had been nearly eradicated. </span><i data-dcnode-id="5049"><span data-dcnode-id="5050" instrument_node="">On the Nature of Things</span></i><span data-dcnode-id="5048" instrument_node=""> by Lucretius expounded the views of Epicurus in an epic poem so lovely that even St. Jerome despite it's views so counter to his struggling beliefs could not resist reading it. If the monastery had really know what it was and that they were the protectorate of such a book I'm sure they would have used it to light a hot fire under the next heretic. </span><br data-dcnode-id="5047"><br data-dcnode-id="5046"><span data-dcnode-id="5045" instrument_node="">To give you an example of where Christian thinking was at the time. Saint Benedict wandering along a path thinking pious thoughts one day suddenly had the image of a desirable woman intrude upon his heavenly internal discourse and found himself </span><b data-dcnode-id="5043"><span data-dcnode-id="5044" instrument_node="">aroused</span></b><span data-dcnode-id="5042" instrument_node="">. Oh my what to do what to do.</span><br data-dcnode-id="5041"><br data-dcnode-id="5040"><i data-dcnode-id="5038"><span data-dcnode-id="5039" instrument_node="">He then noticed a thick patch of nettles and briers next to him. Throwing his garment aside he flung himself into the sharp thorns and stinging nettles. There he rolled and tossed until his whole body was in pain and covered with blood. Yet, once he had conquered pleasure through suffering, his torn and bleeding skin served to drain the poison of temptation from his body. Before long, the pain that was burning his whole body had put out the fires of evil in his heart. It was by exchanging these two fires that he gained the victory over sin.</span></i><br data-dcnode-id="5037"><br data-dcnode-id="5036"><i data-dcnode-id="5034"><span data-dcnode-id="5035" instrument_node="">In one of the great cultural transformations in the history of the West, the pursuit of pain triumphed over the pursuit of pleasure.</span></i><br data-dcnode-id="5033"><br data-dcnode-id="5032"><span data-dcnode-id="5031" instrument_node="">It leaves little doubt why women get such a bad shake in Christian religion given that the natural desire that a man may feel for a woman is considered </span><b data-dcnode-id="5029"><span data-dcnode-id="5030" instrument_node="">EVIL</span></b><span data-dcnode-id="5028" instrument_node="">. Let's see the Epicurean table is right over there excuse me. I'm with those guys. </span><br data-dcnode-id="5027"><br data-dcnode-id="5026"><span data-dcnode-id="5025" instrument_node="">The Way Things Are. If you are like me and have not read Lucretius do not let that keep you from reading this book. Greenblatt provides a list of the principle components addressed in the book with further explanation than what I'm providing in this review.</span><br data-dcnode-id="5024"><br data-dcnode-id="5023"><b data-dcnode-id="4987"><span data-dcnode-id="5022" instrument_node="">*Everything is made of invisible particles.</span><br data-dcnode-id="5021"><span data-dcnode-id="5020" instrument_node="">*The elementary particles of matter-"the seeds of things"-are eternal.</span><br data-dcnode-id="5019"><span data-dcnode-id="5018" instrument_node="">*The elementary particles are infinite in number but limited in shape and size.</span><br data-dcnode-id="5017"><span data-dcnode-id="5016" instrument_node="">*All particles are in motion in an infinite void.</span><br data-dcnode-id="5015"><span data-dcnode-id="5014" instrument_node="">*Everything comes into being as a result of the swerve.</span><br data-dcnode-id="5013"><span data-dcnode-id="5012" instrument_node="">*Nature ceaselessly experiments.</span><br data-dcnode-id="5011"><span data-dcnode-id="5010" instrument_node="">*The universe was not created for or about humans.</span><br data-dcnode-id="5009"><span data-dcnode-id="5008" instrument_node="">*Humans are not unique.</span><br data-dcnode-id="5007"><span data-dcnode-id="5006" instrument_node="">*Human society began not in a Golden Age of tranquility and plenty, but in a primitive battle for survival.</span><br data-dcnode-id="5005"><span data-dcnode-id="5004" instrument_node="">*The soul dies...(ehh gads that will get you a quick trip to the flaming wood pile.)</span><br data-dcnode-id="5003"><span data-dcnode-id="5002" instrument_node="">*There is no afterlife...(they can only burn you once.)</span><br data-dcnode-id="5001"><span data-dcnode-id="5000" instrument_node="">*Death is nothing to us.</span><br data-dcnode-id="4999"><span data-dcnode-id="4998" instrument_node="">*All organized religions are superstitious delusions.</span><br data-dcnode-id="4997"><span data-dcnode-id="4996" instrument_node="">*Religions are invariably cruel.</span><br data-dcnode-id="4995"><span data-dcnode-id="4994" instrument_node="">*There are no angels, demons, or ghosts.</span><br data-dcnode-id="4993"><span data-dcnode-id="4992" instrument_node="">*The highest goal of human life is the enhancement of pleasure and the reduction of pain. (avoid nettles and briers for example.)</span><br data-dcnode-id="4991"><span data-dcnode-id="4990" instrument_node="">*The greatest obstacle to pleasure is not pain; it is delusion.</span><br data-dcnode-id="4989"><span data-dcnode-id="4988" instrument_node="">*Understanding the nature of things generates deep wonder.</span></b><br data-dcnode-id="4986"><br data-dcnode-id="4985"><span data-dcnode-id="4984" instrument_node="">Now after skimming this list either you are looking for the dislike button, which luckily for us poor reviewers is not available, or you are intrigued and want to read more. I would suggest that even if you do find some of the ideas on this list abhorrent still read this book. My brain was churning like a frozen Margarita mixer in a Mexican bar on a Friday night while reading this book. It is okay to read about things that you disagree with. It is okay to doubt your beliefs or reformat your thoughts or even change your mind. My father-in-law, Texas Baptist, refused to read </span><a data-dcnode-id="4982" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.goodreads.com/book/show/968.The_Da_Vinci_Code__Robert_Langdon___2_" rel="nofollow noopener" title="The Da Vinci Code (Robert Langdon, #2) by Dan Brown"><span data-dcnode-id="4983" instrument_node="">The Da Vinci Code</span></a><span data-dcnode-id="4981" instrument_node="">, but he called my wife to ask her what it was about. His beliefs are obviously so fragile he cannot take the chance that a fiction writer of dubious talent might create doubt.</span><br data-dcnode-id="4980"><br data-dcnode-id="4979"><span data-dcnode-id="4978" instrument_node="">I had sticky notes stuck to other sticky notes filled with sketchy bits of my handwriting (Poggio would be appalled at the state of my handwriting.) with wonderful quotes that I had fully intended to share with my goodreads friends, but the book is only 263 pages and I literally had notes for nearly every page that would have ballooned this review beyond anybody's patience level. Besides you are going to read this book right?</span><br data-dcnode-id="4977"><br data-dcnode-id="4976"><a data-dcnode-id="4972" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//s1183.photobucket.com/albums/x462/jkeeten/%3Faction%3Dview%26current%3DPoggio-1.jpg" rel="nofollow noopener" target="_blank"><span data-dcnode-id="4975" instrument_node="">
</span><img alt="Poggio" class="gr-hostedUserImg" data-dcnode-id="4974" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//i.gr-assets.com/images/S/compressed.photo.goodreads.com/hostedimages/1532095305i/26002652._SY540_.jpg&amp;raw"><span data-dcnode-id="4973" instrument_node="">
</span></a><br data-dcnode-id="4971"><b data-dcnode-id="4969"><span data-dcnode-id="4970" instrument_node="">Poggio Bracciolini</span></b><br data-dcnode-id="4968"><br data-dcnode-id="4967"><span data-dcnode-id="4966" instrument_node="">I'm going to end with a book curse that Greenblatt shared that I intend to tuck into every book I lend out to "friends" from now on.</span><br data-dcnode-id="4965"><br data-dcnode-id="4964"><i data-dcnode-id="4962"><span data-dcnode-id="4963" instrument_node="">For him that stealeth, or borroweth and returneth not, this book from its owner let it change into a serpent in his hand and rend him. Let him be struck with palsy, and all his members blasted. Let him languish in pain crying aloud for mercy, and let there be no surcease to his agony till he sing in dissolution. Let bookworms gnaw his entrails in token of the Worm that dieth not, and when at last he goeth to his final punishment, let the flames of Hell consume him forever.</span></i><br data-dcnode-id="4961"><br data-dcnode-id="4960"><b data-dcnode-id="4958"><span data-dcnode-id="4959" instrument_node="">That ought to get their attention.</span></b><span data-dcnode-id="4957" instrument_node=""> </span><br data-dcnode-id="4956"><br data-dcnode-id="4955"><span data-dcnode-id="4954" instrument_node="">I leave you fair friends to return to my ivory tower, the walls thick with books, a Royals baseball game playing in the background. My pursuit of pleasure has begun. </span><br data-dcnode-id="4953"><br data-dcnode-id="4952"><span data-dcnode-id="4951" instrument_node="">If you wish to see more of my most recent book and movie reviews, visit </span><a data-dcnode-id="4949" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.jeffreykeeten.com/" rel="noopener nofollow" target="_blank"><span data-dcnode-id="4950" instrument_node="">http://www.jeffreykeeten.com</span></a><br data-dcnode-id="4948"><span data-dcnode-id="4947" instrument_node="">I also have a Facebook blogger page at: </span><a data-dcnode-id="4945" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.facebook.com/JeffreyKeeten" rel="noopener nofollow" target="_blank"><span data-dcnode-id="4946" instrument_node="">https://www.facebook.com/JeffreyKeeten</span></a></span><span data-dcnode-id="4943" instrument_node="">

</span><span data-dcnode-id="4818" id="freeTextContainer12898581834875823452"><br data-dcnode-id="4839"><u data-dcnode-id="4834"><span data-dcnode-id="4838" instrument_node="">
</span><b data-dcnode-id="4836"><span data-dcnode-id="4837" instrument_node="">The Anti-Climactic Swerve</span></b><span data-dcnode-id="4835" instrument_node="">
</span></u><br data-dcnode-id="4833"><br data-dcnode-id="4832"><span data-dcnode-id="4831" instrument_node="">Greenblatt is a good story-teller and delivers good entertainment value here, but not much informative or educational value, except as an enticing short introductory to </span><a data-dcnode-id="4829" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//en.wikipedia.org/wiki/Lucretius" rel="nofollow noopener" target="_blank" title="Lucretius"><span data-dcnode-id="4830" instrument_node="">Lucretius</span></a><span data-dcnode-id="4828" instrument_node="">, Bruno and </span><a data-dcnode-id="4826" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//en.wikipedia.org/wiki/Michel_de_Montaigne" rel="nofollow noopener" target="_blank" title="Michel de Montaigne"><span data-dcnode-id="4827" instrument_node="">Montaigne</span></a><span data-dcnode-id="4825" instrument_node="">.</span><br data-dcnode-id="4824"><br data-dcnode-id="4823"><span data-dcnode-id="4822" instrument_node="">As Greenblatt acknowledges, there is no single explanation for the emergence of the Renaissance and the release of the forces that have shaped our own world. Despite this awareness, he has tried to trace out The Swerve - “</span><em data-dcnode-id="4820"><span data-dcnode-id="4821" instrument_node="">of how the world swerved in a new direction</span></em><span data-dcnode-id="4819" instrument_node="">” by t</span></span><span data-dcnode-id="4817" instrument_node="">
</span><span data-dcnode-id="4714" id="freeText12898581834875823452" style="display:none"><br data-dcnode-id="4816"><u data-dcnode-id="4811"><span data-dcnode-id="4815" instrument_node="">
</span><b data-dcnode-id="4813"><span data-dcnode-id="4814" instrument_node="">The Anti-Climactic Swerve</span></b><span data-dcnode-id="4812" instrument_node="">
</span></u><br data-dcnode-id="4810"><br data-dcnode-id="4809"><span data-dcnode-id="4808" instrument_node="">Greenblatt is a good story-teller and delivers good entertainment value here, but not much informative or educational value, except as an enticing short introductory to </span><a data-dcnode-id="4806" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//en.wikipedia.org/wiki/Lucretius" rel="nofollow noopener" target="_blank" title="Lucretius"><span data-dcnode-id="4807" instrument_node="">Lucretius</span></a><span data-dcnode-id="4805" instrument_node="">, Bruno and </span><a data-dcnode-id="4803" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//en.wikipedia.org/wiki/Michel_de_Montaigne" rel="nofollow noopener" target="_blank" title="Michel de Montaigne"><span data-dcnode-id="4804" instrument_node="">Montaigne</span></a><span data-dcnode-id="4802" instrument_node="">.</span><br data-dcnode-id="4801"><br data-dcnode-id="4800"><span data-dcnode-id="4799" instrument_node="">As Greenblatt acknowledges, there is no single explanation for the emergence of the Renaissance and the release of the forces that have shaped our own world. Despite this awareness, he has tried to trace out The Swerve - “</span><em data-dcnode-id="4797"><span data-dcnode-id="4798" instrument_node="">of how the world swerved in a new direction</span></em><span data-dcnode-id="4796" instrument_node="">” by telling a little known but exemplary Renaissance story - the story of </span><a data-dcnode-id="4794" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//en.wikipedia.org/wiki/Gian_Francesco_Poggio_Bracciolini" rel="nofollow noopener" target="_blank" title="Gian Francesco Poggio Bracciolini"><span data-dcnode-id="4795" instrument_node="">Poggio Bracciolini</span></a><span data-dcnode-id="4793" instrument_node="">’s recovery of Lucretius’s poem, ‘</span><i data-dcnode-id="4788"><span data-dcnode-id="4792" instrument_node="">
</span><a data-dcnode-id="4790" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//en.wikipedia.org/wiki/De_rerum_natura" rel="nofollow noopener" target="_blank" title="De rerum natura"><span data-dcnode-id="4791" instrument_node="">On the Nature of Things</span></a><span data-dcnode-id="4789" instrument_node="">
</span></i><span data-dcnode-id="4787" instrument_node="">’ (</span><i data-dcnode-id="4785"><span data-dcnode-id="4786" instrument_node="">De rerum natura</span></i><span data-dcnode-id="4784" instrument_node="">). This one poem by itself was certainly not responsible for an entire intellectual, moral, and social transformation—no single work was. But, Greenblatt tells us, this particular ancient book, suddenly returning to view, made a difference.</span><br data-dcnode-id="4783"><br data-dcnode-id="4782"><span data-dcnode-id="4781" instrument_node="">Majority of the book is given over to the ‘dramatic’ search for old documents, by a Poggio who suddenly found himself with a lot of free time. But, to me, that is not the ‘enlightenment’. The enlightenment is what followed afterwards. Of course, these book-hunters deserve to be lionized for their sacrifice and great service, but they were pursuing an obsession and most of them never played with the ball tossed by the ideas they uncovered.</span><br data-dcnode-id="4780"><br data-dcnode-id="4779"><span data-dcnode-id="4778" instrument_node="">To me the really exciting part of renaissance is what happened once these millennia old, forgotten, but radical ideas were injected into a culture that was held to the whip by militant power-hungry Christianity — liberating humanity from the crushing weight of being the center of the universe, the human mind from the chains of the fear of a future torment that is bound to follow any original thought (original = blasphemous).</span><br data-dcnode-id="4777"><br data-dcnode-id="4776"><span data-dcnode-id="4775" instrument_node="">That is when the real </span><i data-dcnode-id="4773"><span data-dcnode-id="4774" instrument_node="">alchemy</span></i><span data-dcnode-id="4772" instrument_node=""> happened - when different brilliant thinkers tried hard to reconcile their fervent theology to the irresistible intellectual and poetic force of the ancient arguments; when the few truly free thinkers found the best sort of patrons, the ancients, to support their cause; and when all these elements reacted against each other and created something new and wonderful - just like Lucretius’s reviled atoms.</span><br data-dcnode-id="4771"><br data-dcnode-id="4770"><span data-dcnode-id="4769" instrument_node="">That is the truly exciting story. That is only touched on by Greenblatt, after spending </span><i data-dcnode-id="4767"><span data-dcnode-id="4768" instrument_node="">4/5</span></i><span data-dcnode-id="4766" instrument_node="">th of the book on Poggio’s quest, then towards the end, we are given a sneak peak on how various thinkers reacted, of the spectacular beauty of a larger cultural movement that included Alberti, Michelangelo, and Raphael, Ariosto, Montaigne, and Cervantes, along with dozens of other artists and writers. Some of the ideas touched upon include (in loosely chronological fashion, listed here to redeem the book by highlighting the best parts):</span><br data-dcnode-id="4765"><br data-dcnode-id="4764"><span data-dcnode-id="4763" instrument_node="">- </span><a data-dcnode-id="4761" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//en.wikipedia.org/wiki/Lorenzo_Valla" rel="nofollow noopener" target="_blank" title="Lorenzo Valla"><span data-dcnode-id="4762" instrument_node="">Lorenzo Valla</span></a><span data-dcnode-id="4760" instrument_node="">’s early reaction through </span><i data-dcnode-id="4758"><span data-dcnode-id="4759" instrument_node="">On Pleasure</span></i><span data-dcnode-id="4757" instrument_node=""> (</span><i data-dcnode-id="4755"><span data-dcnode-id="4756" instrument_node="">De voluptate</span></i><span data-dcnode-id="4754" instrument_node="">), an early, highly noncommittal dialogue dealing with the Epicurean ideas.</span><br data-dcnode-id="4753"><br data-dcnode-id="4752"><span data-dcnode-id="4751" instrument_node="">- Thomas More’s Utopia - which tried very hard to integrate the Epicurean ideas into a society of equality and communism, even as Moore kept them grounded on firm Christian principles.</span><br data-dcnode-id="4750"><br data-dcnode-id="4749"><span data-dcnode-id="4748" instrument_node="">- The diminutive </span><a data-dcnode-id="4746" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//en.wikipedia.org/wiki/Dominican_Order" rel="nofollow noopener" target="_blank" title="Dominican Order"><span data-dcnode-id="4747" instrument_node="">Dominican monk</span></a><span data-dcnode-id="4745" instrument_node="">, </span><a data-dcnode-id="4743" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//en.wikipedia.org/wiki/Giordano_Bruno" rel="nofollow noopener" target="_blank" title="Giordano Bruno"><span data-dcnode-id="4744" instrument_node="">Giordano Bruno</span></a><span data-dcnode-id="4742" instrument_node="">, who was turned into one of the boldest thinkers on the touch of Lucretius’s poetry. Bruno was perhaps the first real intellectual successor to Epicurus and Lucretius, the one who truly took the ball and ran the full distance and dared to assert a new and dangerous world view (Bruno is only one example of much intellectual activity that erupted, out of which most kept silent, unlike Bruno).</span><br data-dcnode-id="4741"><br data-dcnode-id="4740"><span data-dcnode-id="4739" instrument_node="">- Machiavelli’s formulations, which could arguably be said to have touched the feared extremes of the philosophy.</span><br data-dcnode-id="4738"><br data-dcnode-id="4737"><span data-dcnode-id="4736" instrument_node="">- Copernicus, and others, who got support from all this intellectual ferment to explore new boundaries and push human understanding.</span><br data-dcnode-id="4735"><br data-dcnode-id="4734"><span data-dcnode-id="4733" instrument_node="">- Others like Galileo, who could then go further, even if timidly.</span><br data-dcnode-id="4732"><br data-dcnode-id="4731"><span data-dcnode-id="4730" instrument_node="">- To pave the way for Descartes, Newton… and so on and so forth, the illustrious list extends to our day.</span><br data-dcnode-id="4729"><br data-dcnode-id="4728"><span data-dcnode-id="4727" instrument_node="">And even in the arts, the explosion was evident, with Cosimo, Da Vinci, Botticelli, etc., to Montaigne and others, and soon through Bruno’s visit to England, Spencer, Donne, Bacon, and eventually Shakespeare (who was a friend of a friend of Bruno’s!) and Ben Johnson (who had a copy of Lucretius). Soon, the printing press made these irresistible ideas even more irrepressible, until they were everywhere, just like the original atoms. Until, through Jefferson, traces of </span><a data-dcnode-id="4725" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//en.wikipedia.org/wiki/Epicureanism" rel="nofollow noopener" target="_blank" title="Epicureanism"><span data-dcnode-id="4726" instrument_node="">Epicureanism</span></a><span data-dcnode-id="4724" instrument_node=""> was embedded in the very constitution of the next great democracy that emerged, in the Declaration of Independence - </span><i data-dcnode-id="4722"><span data-dcnode-id="4723" instrument_node="">The Pursuit of Happiness</span></i><span data-dcnode-id="4721" instrument_node="">.</span><br data-dcnode-id="4720"><br data-dcnode-id="4719"><span data-dcnode-id="4718" instrument_node="">How splendid would that intellectual history be, if presented in its full richness and anxiety, with all the various threads and many tensions given stage space!</span><br data-dcnode-id="4717"><br data-dcnode-id="4716"><span data-dcnode-id="4715" instrument_node="">I know there are other books that explore this explosion and the dance of magnificent ideas, but I really felt let down that the story closed just before the drama began. Bit of an anti-climax. This richly researched biography of probably the most important book-hunter in history is not a must-read or an indispensable book. The best result would be an increased curiosity for the great works that enliven its pages.</span></span><span data-dcnode-id="4713" instrument_node="">

</span><span data-dcnode-id="4605" id="freeTextContainer16884005424166334247"><span data-dcnode-id="4624" instrument_node="">This review has been revised and can now be seen at </span><a data-dcnode-id="4622" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//tinyurl.com/bpkkr3d" rel="nofollow noopener"><span data-dcnode-id="4623" instrument_node="">Shelf Inflicted</span></a><span data-dcnode-id="4621" instrument_node=""> (a Group Blog).</span><br data-dcnode-id="4620"><br data-dcnode-id="4619"><span data-dcnode-id="4618" instrument_node="">Changed my life forever, did this book.</span><br data-dcnode-id="4617"><br data-dcnode-id="4616"><span data-dcnode-id="4615" instrument_node="">Reposting the body of the review.</span><br data-dcnode-id="4614"><span data-dcnode-id="4613" instrument_node="">***</span><br data-dcnode-id="4612"><i data-dcnode-id="4610"><span data-dcnode-id="4611" instrument_node="">De rerum natura</span></i><span data-dcnode-id="4609" instrument_node=""> was a long narrative poem expounding Epicurean philosophy that was written in the first century before the common era. I am told by those possessed of sufficient Latin fluency to appreciate it that it is beautiful. I am not possessed of that level of fluency, and to me it seemed agonizingly impenetrable and obscurantist.</span><br data-dcnode-id="4608"><br data-dcnode-id="4607"><span data-dcnode-id="4606" instrument_node="">But </span></span><span data-dcnode-id="4604" instrument_node="">
</span><span data-dcnode-id="4508" id="freeText16884005424166334247" style="display:none"><span data-dcnode-id="4603" instrument_node="">This review has been revised and can now be seen at </span><a data-dcnode-id="4601" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//tinyurl.com/bpkkr3d" rel="nofollow noopener"><span data-dcnode-id="4602" instrument_node="">Shelf Inflicted</span></a><span data-dcnode-id="4600" instrument_node=""> (a Group Blog).</span><br data-dcnode-id="4599"><br data-dcnode-id="4598"><span data-dcnode-id="4597" instrument_node="">Changed my life forever, did this book.</span><br data-dcnode-id="4596"><br data-dcnode-id="4595"><span data-dcnode-id="4594" instrument_node="">Reposting the body of the review.</span><br data-dcnode-id="4593"><span data-dcnode-id="4592" instrument_node="">***</span><br data-dcnode-id="4591"><i data-dcnode-id="4589"><span data-dcnode-id="4590" instrument_node="">De rerum natura</span></i><span data-dcnode-id="4588" instrument_node=""> was a long narrative poem expounding Epicurean philosophy that was written in the first century before the common era. I am told by those possessed of sufficient Latin fluency to appreciate it that it is beautiful. I am not possessed of that level of fluency, and to me it seemed agonizingly impenetrable and obscurantist.</span><br data-dcnode-id="4587"><br data-dcnode-id="4586"><span data-dcnode-id="4585" instrument_node="">But Author Greenblatt, in this fascinating Pulitzer Prize-winning history and analysis of the poem and its influence on the world, focuses not on the merits of the poem but on the genesis, development, survival, and influence of </span><i data-dcnode-id="4583"><span data-dcnode-id="4584" instrument_node="">De rerum natura</span></i><span data-dcnode-id="4582" instrument_node="">, arguably the foundation text for the mental construct that you and I share, and that diverges widely from the mental construct of earlier times. (</span><b data-dcnode-id="4580"><span data-dcnode-id="4581" instrument_node="">2020 UPDATE</span></b><span data-dcnode-id="4579" instrument_node=""> Plenty, plenty disagreement with my position </span><a data-dcnode-id="4577" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/The_Swerve" rel="nofollow noopener"><span data-dcnode-id="4578" instrument_node="">exists</span></a><span data-dcnode-id="4576" instrument_node="">.)</span><br data-dcnode-id="4575"><br data-dcnode-id="4574"><span data-dcnode-id="4573" instrument_node="">Why is this so? Because we accept a material explanation of the existence of things as our prevailing orthodoxy, even in the face of religious challenges to the primacy of logic and evidence and just plain good sense. It's down to Lucretius's poem's astounding clarity of thought, persuasiveness of rhetoric, and miraculous survival and rebirth.</span><br data-dcnode-id="4572"><br data-dcnode-id="4571"><span data-dcnode-id="4570" instrument_node="">What Greenblatt did was to provide a brief history of Epicurus, his actual philosophy, and the cultural currents that distorted and misrepresented his philosophy, together with the whys and wherefores of that misrepresentation. Then Lucretius, a shadowy figure whose biography is unknown to modern readers except for a calumny heaped on his memory by a man who did not know him and in fact lived centuries after his death, wrote in poetry...a form of expression not to Epicurus's taste or, in his opinion, a good and useful tool of communication, he preferring plain and simple and direct prose...broke down the Epicurean vision of the world, and argued in support of it. Greenblatt then traces the survival of manuscripts from antiquity to the Middle Ages, the resurgent interest in their contents during the run-up to the Renaissance, and the incalculably valuable role of obsessive individuals in hunting down, copying, and disseminating the surviving antique texts to a world then, as now, hungry for more and better and different views and experiences and thoughts and ideas.</span><br data-dcnode-id="4569"><br data-dcnode-id="4568"><span data-dcnode-id="4567" instrument_node="">I give this book one of my rare five-star ratings because it has solved a problem of identity for me: I am, as Thomas Jefferson said before me, an Epicurean. Not the debased view held of that noble philosophy thanks to “Saint” Jerome, who in the course of ramming his ignorance-celebrating religion down the throats of humanity, hit on the perfect misstatement of Epicurus's actual materialist philosophy: Hedonism! Hedonism and vice and licentiousness and gluttony! The pursuit of pleasure can only mean these things, shouted Jerome, and the chorus of baying dogs was off after the fox.</span><br data-dcnode-id="4566"><br data-dcnode-id="4565"><span data-dcnode-id="4564" instrument_node="">We all know how that ends.</span><br data-dcnode-id="4563"><br data-dcnode-id="4562"><span data-dcnode-id="4561" instrument_node="">Chapter eight of The Swerve, “The Way Things Are,” breaks out the point-by-point reality of Epicureanism, and is the prime motivating factor for my five-star rating. (In fact, I dislike Poggio Bracciolini, the discoverer of </span><i data-dcnode-id="4559"><span data-dcnode-id="4560" instrument_node="">De rerum natura</span></i><span data-dcnode-id="4558" instrument_node="">, quite intensely, and suspect that had I met him in life, I would have been repulsed by him.) I list here the bullet points Greenblatt is at pains to provide with clear, concise, and satisfying explication:</span><br data-dcnode-id="4557"><br data-dcnode-id="4556"><span data-dcnode-id="4555" instrument_node="">--Everything is made of invisible particles. This is called “atomism.”</span><br data-dcnode-id="4554"><span data-dcnode-id="4553" instrument_node="">--The elementary particles of matter...are eternal.</span><br data-dcnode-id="4552"><span data-dcnode-id="4551" instrument_node="">--The elementary particles are infinite in number, but limited in shape and size.</span><br data-dcnode-id="4550"><span data-dcnode-id="4549" instrument_node="">--All particles are in motion in an infinite void.</span><br data-dcnode-id="4548"><span data-dcnode-id="4547" instrument_node="">--The universe has no creator or designer.</span><br data-dcnode-id="4546"><span data-dcnode-id="4545" instrument_node="">--Everything comes into being as a result of a swerve. (Another word for this is collision.)</span><br data-dcnode-id="4544"><span data-dcnode-id="4543" instrument_node="">--The swerve is the source of free will. If there is no preordained pattern, how can there be a preordained result?</span><br data-dcnode-id="4542"><span data-dcnode-id="4541" instrument_node="">--Nature ceaselessly experiments. Evolution by natural selection, anyone?</span><br data-dcnode-id="4540"><span data-dcnode-id="4539" instrument_node="">--The universe was not created for or about humans.</span><br data-dcnode-id="4538"><span data-dcnode-id="4537" instrument_node="">--Humans are not unique. We are animals, literally not figuratively, like all the others.</span><br data-dcnode-id="4536"><span data-dcnode-id="4535" instrument_node="">--Human society began, not in a Golden Age of tranquility and plenty, but in a primitive battle for survival.</span><br data-dcnode-id="4534"><span data-dcnode-id="4533" instrument_node="">--The soul dies. There is no afterlife.</span><br data-dcnode-id="4532"><span data-dcnode-id="4531" instrument_node="">--Death is nothing to us. It is merely a fact. There is no personal component to death.</span><br data-dcnode-id="4530"><span data-dcnode-id="4529" instrument_node="">--All organized religions are superstitious delusions. Religions are, invariably, cruel.</span><br data-dcnode-id="4528"><span data-dcnode-id="4527" instrument_node="">--There are no angels, demons, or ghosts.</span><br data-dcnode-id="4526"><span data-dcnode-id="4525" instrument_node="">--The highest goal of human life is the enhancement of pleasure and the reduction of pain.</span><br data-dcnode-id="4524"><span data-dcnode-id="4523" instrument_node="">--The greatest obstacle to pleasure is not pain, it is delusion.</span><br data-dcnode-id="4522"><span data-dcnode-id="4521" instrument_node="">--Understanding the true nature of things generates deep wonder.</span><br data-dcnode-id="4520"><br data-dcnode-id="4519"><span data-dcnode-id="4518" instrument_node="">I have never seen in print or heard with my ears a clearer, more concise, or more complete statement of my own personal worldview than this. It rang me like a bell. It sounds like Lucretius was sitting inside my head and copying down my responses to the world.</span><br data-dcnode-id="4517"><br data-dcnode-id="4516"><span data-dcnode-id="4515" instrument_node="">In the brief explications Greenblatt attaches to the bullet points, he makes it clear that these ideas, while they never wholly vanished from the world, were seen by the dominant world-view as a challenge to the idiotic legendary nonsense that had come to replace them, and were thus strongly condemned, to the point of burning people alive as a punishment and a warning to others inclined to think for themselves, to view the world as it is instead of through a warped fantasy construct that demonstrably causes harm and pain and facilitates much evil-doing.</span><br data-dcnode-id="4514"><br data-dcnode-id="4513"><span data-dcnode-id="4512" instrument_node="">So on that basis...five stars, and a ringing huzzah, to Gentile Signor Poggio Bracciolini; to Greenblatt for digging deeply enough in the humus of scholarly debate and historical records to make these connections for us, in a less scholarly age than the Renaissance, to find and use for ourselves as we see fit (ie, to exercise the free will we've got); and to WW Norton for publishing the resultant text as an under-$30 course in humanism. I am also grateful to the Pulitzer Prize board for awarding this book its non-fiction encomium, and to the Catholic News Agency for remaining consistently wrong by grousing about the book's anti-Catholicism and misinterpretation of the Church's anti-intellectualism. It's kind of hard to misinterpret burning people at the stake, guys. Own up: Your religion requires ignorance and prefers stupidity in its adherents.</span><br data-dcnode-id="4511"><br data-dcnode-id="4510"><span data-dcnode-id="4509" instrument_node="">Books such as this one do nothing to enhance religion's role in human affairs. It is best avoided by those of religious bent.</span></span><span data-dcnode-id="4507" instrument_node="">

</span><span data-dcnode-id="4399" id="freeTextContainer8561614399549116130"><span data-dcnode-id="4400" instrument_node="">Two thousand years ago a Roman named Lucretius wrote a poem that described a universe guided by physical laws rather than the whims of mystical deities and also advised that people should pursue happiness rather than spend their lives trying to appease gods who don’t exist . As I write this in 2012 certain parts of the world have been rioting and people are dying because some felt that a You Tube video insulted their religion. My own country has a constant political tug of war between the people</span></span><span data-dcnode-id="4398" instrument_node="">
</span><span data-dcnode-id="4381" id="freeText8561614399549116130" style="display:none"><span data-dcnode-id="4397" instrument_node="">Two thousand years ago a Roman named Lucretius wrote a poem that described a universe guided by physical laws rather than the whims of mystical deities and also advised that people should pursue happiness rather than spend their lives trying to appease gods who don’t exist . As I write this in 2012 certain parts of the world have been rioting and people are dying because some felt that a You Tube video insulted their religion. My own country has a constant political tug of war between the people who want to run things with that whole “Congress shall make no law respecting an establishment of religion.” part of the Constitution in mind while others think we should just throw that out and use the Bible as our rule book.</span><br data-dcnode-id="4396"><br data-dcnode-id="4395"><span data-dcnode-id="4394" instrument_node="">We are a race of slow learners.</span><br data-dcnode-id="4393"><br data-dcnode-id="4392"><span data-dcnode-id="4391" instrument_node="">Lucretius’s poem was apparently not only an extremely thorough explanation of Epicurean philosophy, it was also a well constructed and beautiful piece of writing that was almost lost to history. Greenblatt does an outstanding job of laying out the significance of Epicureanism, how it was almost stamped out by the rise of Christianity and why the poem rescued by chance by an Italian humanist and scholar was a spark that helped usher in the modern world.</span><br data-dcnode-id="4390"><br data-dcnode-id="4389"><span data-dcnode-id="4388" instrument_node="">I especially liked the section where Greenblatt describes how the Christian faith turned most of the public against one of the central principles of Epicureanism; seeking pleasure. ‘Seeking pleasure’ in the Epicurean sense doesn’t mean maxing out your credit cards in Vegas to hire a couple of hookers for a cocaine fueled weekend. It’s more in the ‘How about a nice cup of tea and a good book by a warm fire on a rainy day?’ kind of thing. </span><br data-dcnode-id="4387"><br data-dcnode-id="4386"><span data-dcnode-id="4385" instrument_node="">Yet the church managed to convince the faithful that it was more spiritual to seek punishment from an angry God, and they tagged Epicureans as a bunch of wild orgy types when in fact it’s not about hedonism, it’s about finding ways to avoid pain and making the most of your existence in this world because you’re gonna have a short shelf life and then you‘re done for good.</span><br data-dcnode-id="4384"><br data-dcnode-id="4383"><span data-dcnode-id="4382" instrument_node="">This is a fascinating history of how one piece of exceptional writing changed the world.</span></span><span data-dcnode-id="4380" instrument_node="">

</span><span data-dcnode-id="4281" id="freeTextContainer14209115581920980228"><br data-dcnode-id="4285"><span data-dcnode-id="4284" instrument_node=""> </span><br data-dcnode-id="4283"><span data-dcnode-id="4282" instrument_node=""> A dubious thesis propped up by selective evidence and punctuated by digressions that were often only tenuously connected to the book's argument. Greenblatt massively overstates Epicurean philosophy's significance in the ancient world and his bold claims for the influence of Lucretius' poem in the Renaissance are rarely supported by the evidence he presents to any sufficient degree. Worst of all is his bizarre caricatures of the Medieval period - he doesn't seem to know the Twelfth Century revi</span></span><span data-dcnode-id="4280" instrument_node="">
</span><span data-dcnode-id="4272" id="freeText14209115581920980228" style="display:none"><br data-dcnode-id="4279"><span data-dcnode-id="4278" instrument_node=""> </span><br data-dcnode-id="4277"><span data-dcnode-id="4276" instrument_node=""> A dubious thesis propped up by selective evidence and punctuated by digressions that were often only tenuously connected to the book's argument. Greenblatt massively overstates Epicurean philosophy's significance in the ancient world and his bold claims for the influence of Lucretius' poem in the Renaissance are rarely supported by the evidence he presents to any sufficient degree. Worst of all is his bizarre caricatures of the Medieval period - he doesn't seem to know the Twelfth Century revival ever happened and universities get one passing mention, though the worst aspects of monasticism get repeated emphasis and flagellation gets pages of loving detail. And his claims Christianity somehow suppressed Lucretius' poem are undermined by his underplayed references to various medieval manuscripts of the poem (though these are often tucked away in footnotes). For an institution trying to "destroy" this poem, the Medieval church sure went about it in a strange way.</span><br data-dcnode-id="4275"><br data-dcnode-id="4274"><span data-dcnode-id="4273" instrument_node="">Greenblatt is an expert in literature rather than history, and it shows. The fact this book won a Pulitzer says something about a triumph of style and marketing over substance and basic fact checking. A book that actively distorts history is not a good history book.</span></span><span data-dcnode-id="4271" instrument_node="">

</span><span data-dcnode-id="4152" id="freeTextContainer15565252587188105773"><i data-dcnode-id="4162"><span data-dcnode-id="4163" instrument_node="">But for the pagans... pain was understood not as a positive value, a stepping stone to salvation, as it was by pious Christians intent on whipping themselves, but as an evil, something visited upon rulebreakers, criminals, captives, unfortunate wretches, and - the only category with dignity - soldiers.</span></i><br data-dcnode-id="4161"><span data-dcnode-id="4160" instrument_node="">...</span><br data-dcnode-id="4159"><br data-dcnode-id="4158"><span data-dcnode-id="4157" instrument_node="">I went into this book convinced I was going to hate it. I mean, have you read the blurb!?!?! The back of my book says:</span><br data-dcnode-id="4156"><br data-dcnode-id="4155"><i data-dcnode-id="4153"><span data-dcnode-id="4154" instrument_node="">From the gardens of ancient Rome to the chambers of monastic scriptoria, ren</span></i></span><span data-dcnode-id="4151" instrument_node="">
</span><span data-dcnode-id="4102" id="freeText15565252587188105773" style="display:none"><i data-dcnode-id="4149"><span data-dcnode-id="4150" instrument_node="">But for the pagans... pain was understood not as a positive value, a stepping stone to salvation, as it was by pious Christians intent on whipping themselves, but as an evil, something visited upon rulebreakers, criminals, captives, unfortunate wretches, and - the only category with dignity - soldiers.</span></i><br data-dcnode-id="4148"><span data-dcnode-id="4147" instrument_node="">...</span><br data-dcnode-id="4146"><br data-dcnode-id="4145"><span data-dcnode-id="4144" instrument_node="">I went into this book convinced I was going to hate it. I mean, have you read the blurb!?!?! The back of my book says:</span><br data-dcnode-id="4143"><br data-dcnode-id="4142"><i data-dcnode-id="4140"><span data-dcnode-id="4141" instrument_node="">From the gardens of ancient Rome to the chambers of monastic scriptoria, renowned scholar Stephen Greenblatt brings the past to vivid life in this exploration of one of the most influential works of literature of all time. In the winter of 1417, an unemployed papal secretary turned book hunter named Poggio Bracciolini discovered a copy of Lucretius's On the Nature of Things in a remote monastery. The story of how this astonishing poem would cause the world to swerve in a new direction is at once a supreme work of scholarship, a literary page-turner, and a thrilling testament to the power of the written word.</span></i><br data-dcnode-id="4139"><br data-dcnode-id="4138"><span data-dcnode-id="4137" instrument_node="">What a mealy-mouthed bunch of bullshit. Can you make heads or tails out of what this book is about from reading this!?!? No, you can't. National Book Award Winner, Pulitzer Prize Winner, my foot!</span><br data-dcnode-id="4136"><br data-dcnode-id="4135"><span data-dcnode-id="4134" instrument_node="">*takes deep breath*</span><br data-dcnode-id="4133"><br data-dcnode-id="4132"><span data-dcnode-id="4131" instrument_node="">However, the book actually isn't as terrible as you'd gather from first glance. </span><br data-dcnode-id="4130"><br data-dcnode-id="4129"><span data-dcnode-id="4128" instrument_node="">What happened is this:</span><br data-dcnode-id="4127"><br data-dcnode-id="4126"><span data-dcnode-id="4125" instrument_node="">Greenblatt buys a book for 10 cents out of a bin. Instead of writing a rapturous GR review of it like any normal person would (LOL) he decides that a.) the book is responsible for changing the world and making the world modern and b.) he's going to write an entire 263-page book on the subject.</span><br data-dcnode-id="4124"><br data-dcnode-id="4123"><span data-dcnode-id="4122" instrument_node="">This book celebrates and promotes atheism and atheist ideas and portrays the Catholic Church as greedy, corrupt, and hypocritical. That part I rather enjoyed. </span><br data-dcnode-id="4121"><br data-dcnode-id="4120"><span data-dcnode-id="4119" instrument_node="">I think the best chapters are "The Teeth of Time" which discusses pagans vs. Christians and pagan ideals vs. Christian ideals; and "The Way Things Are" which is an excellent breakdown of Lucretius's atheist manifesto.</span><br data-dcnode-id="4118"><br data-dcnode-id="4117"><span data-dcnode-id="4116" instrument_node="">Unfortunately, these fascinating chapters filled with thoughts and ideas are interspersed with mind-numbingly boring chapters, which detail the intricacies of the lives of Poggio and Pope John XXIII. I didn't care. I didn't care one bit.</span><br data-dcnode-id="4115"><br data-dcnode-id="4114"><span data-dcnode-id="4113" instrument_node="">A tiny bit of interest came when Greenblatt discussed bookworms and how fragile books were, also how hard a person had to work to create a book back in the 13th century. Wow. I want to once again thank Bi Sheng and also Johannes Gutenberg for their marvelous inventions.</span><br data-dcnode-id="4112"><br data-dcnode-id="4111"><b data-dcnode-id="4109"><span data-dcnode-id="4110" instrument_node="">Overall, what am I going to get from this book?</span></b><br data-dcnode-id="4108"><br data-dcnode-id="4107"><span data-dcnode-id="4106" instrument_node="">A promotion and dissertation of atheist ideals and morals makes up the best chapter, "The Way Things Are." You are also going to learn some fascinating things about book creation and how the Catholic Church was a wretched hive of scum and villainy.</span><br data-dcnode-id="4105"><br data-dcnode-id="4104"><span data-dcnode-id="4103" instrument_node="">However, as a fair warning, a lot of this book might leave you bored and frustrated. Since my expectations were at zero, I was pleasantly surprised - I can't promise you the same experience.</span></span><span data-dcnode-id="4101" instrument_node="">

</span><span data-dcnode-id="3984" id="freeTextContainer12467678493152649081"><span data-dcnode-id="3991" instrument_node="">The subtitle of this book is “how the world became modern.” It imparts no such knowledge. It’s a story of the marginal liberalization of thought brought on by the rediscovery of Lucretius’s </span><a data-dcnode-id="3989" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.goodreads.com/book/show/32651094.Lucretius_on_the_Nature_of_Things" rel="nofollow noopener" title="Lucretius on the Nature of Things by John Mason Good"><span data-dcnode-id="3990" instrument_node="">On the Nature of Things</span></a><span data-dcnode-id="3988" instrument_node="">. All the business about atoms.</span><br data-dcnode-id="3987"><br data-dcnode-id="3986"><span data-dcnode-id="3985" instrument_node="">I didn’t learn much . Yet there’s stuff to like. Especially the story of how Epicurus and his followers were calumniated by early Christians as debauched sybarites, a smear which has no basis in fact. So vehement were early Christians against the idea of p</span></span><span data-dcnode-id="3983" instrument_node="">
</span><span data-dcnode-id="3939" id="freeText12467678493152649081" style="display:none"><span data-dcnode-id="3982" instrument_node="">The subtitle of this book is “how the world became modern.” It imparts no such knowledge. It’s a story of the marginal liberalization of thought brought on by the rediscovery of Lucretius’s </span><a data-dcnode-id="3980" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.goodreads.com/book/show/32651094.Lucretius_on_the_Nature_of_Things" rel="nofollow noopener" title="Lucretius on the Nature of Things by John Mason Good"><span data-dcnode-id="3981" instrument_node="">On the Nature of Things</span></a><span data-dcnode-id="3979" instrument_node="">. All the business about atoms.</span><br data-dcnode-id="3978"><br data-dcnode-id="3977"><span data-dcnode-id="3976" instrument_node="">I didn’t learn much . Yet there’s stuff to like. Especially the story of how Epicurus and his followers were calumniated by early Christians as debauched sybarites, a smear which has no basis in fact. So vehement were early Christians against the idea of pleasure, a key tenet of Epicureanism, that the salubrious effects of suffering were promoted. The imitation of Christ. Saint Benedict, for instance, upon seeing a beautiful woman, flung his garments aside and threw himself [genitals] onto sharp thorns and stinging nettles and thus “by exchanging these two fires . . . gained the victory over sin.” (p. 103) Yuck. </span><br data-dcnode-id="3975"><br data-dcnode-id="3974"><span data-dcnode-id="3973" instrument_node="">The fuse is a slow burning one. Halfway through I still don’t see the lineaments of the central argument. Why am I hearing so much about the life of this papal secretary, Poggio? OK, so he found the Lucretius’s manuscript in a German monastery in 1417. He wrote books and dreamed of recovering classics of antiquity. But really, he’s virtually a cipher. We learn little about his life yet I’ve been stuck with him for 150 pages. </span><br data-dcnode-id="3972"><br data-dcnode-id="3971"><span data-dcnode-id="3970" instrument_node="">Meh. The book doesn’t sing.</span><br data-dcnode-id="3969"><br data-dcnode-id="3968"><span data-dcnode-id="3967" instrument_node="">Though the author provides a new angle on the corruption of the medieval Church, that’s still a very old story. See Norman Cohn’s </span><a data-dcnode-id="3965" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.goodreads.com/book/show/191131.The_Pursuit_of_the_Millennium_Revolutionary_Millenarians_and_Mystical_Anarchists_of_the_Middle_Ages" rel="nofollow noopener" title="The Pursuit of the Millennium Revolutionary Millenarians and Mystical Anarchists of the Middle Ages by Norman Cohn"><span data-dcnode-id="3966" instrument_node=""> The Pursuit of the Millennium</span></a><span data-dcnode-id="3964" instrument_node="">, Barbara Tuchman’s </span><a data-dcnode-id="3962" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.goodreads.com/book/show/10302.The_March_of_Folly_From_Troy_to_Vietnam" rel="nofollow noopener" title="The March of Folly From Troy to Vietnam by Barbara W. Tuchman"><span data-dcnode-id="3963" instrument_node="">The March of Folly</span></a><span data-dcnode-id="3961" instrument_node="">, and Steven Runciman’s Crusade Trilogy et al. What is new to me is how open the curia was to trenchant critiques about its own corruption until well into the fifteenth century. Poggio was one of six apostolic secretaries to the pope despite writing searing appraisals like </span><i data-dcnode-id="3959"><span data-dcnode-id="3960" instrument_node="">Against the Hypocrites</span></i><span data-dcnode-id="3958" instrument_node="">.</span><br data-dcnode-id="3957"><blockquote data-dcnode-id="3955"><span data-dcnode-id="3956" instrument_node="">Virtually any priest or monk who is at the curia is a hypocrite . . . for it is impossible to fulfill the highest purposes of religion there. And if you happen at the curia to see someone who is particularly abject in his humility, beware: he is not merely a hypocrite but the worst hypocrite of all. In general, you should be wary of people who seem too perfect, and remember that it is actually quite difficult to be good: ‘Difficile est bonum esse.’ (p. 149)</span></blockquote><br data-dcnode-id="3954"><br data-dcnode-id="3953"><span data-dcnode-id="3952" instrument_node="">He should know. Poggio had 10 children by a mistress whom he abandoned when he married. He had another six children by his wife. </span><br data-dcnode-id="3951"><br data-dcnode-id="3950"><span data-dcnode-id="3949" instrument_node="">The use of a biographical thread to run through and connect the disparate elements of a narrative is a useful device. One example that springs to mind is Neil Sheehan’s </span><a data-dcnode-id="3947" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.goodreads.com/book/show/417640.A_Bright_Shining_Lie_John_Paul_Vann_and_America_in_Vietnam" rel="nofollow noopener" title="A Bright Shining Lie John Paul Vann and America in Vietnam by Neil Sheehan"><span data-dcnode-id="3948" instrument_node="">A Bright Shining Lie: John Paul Vann and America in Vietnam</span></a><span data-dcnode-id="3946" instrument_node="">. But Vann existed within living memory; there was documentation about his activities and people who remembered him. Poggio’s narrative, by contrast, is thin. The only thing that endears me to him is that when “the world around Poggio was falling to pieces . . . his response to chaos and fear was always to redouble his immersion in books.” (p. 177) It is in this one respect that I feel a kinship for him, after 200 pages.</span><br data-dcnode-id="3945"><br data-dcnode-id="3944"><span data-dcnode-id="3943" instrument_node="">Now on page 210 the author is still </span><i data-dcnode-id="3941"><span data-dcnode-id="3942" instrument_node="">hinting</span></i><span data-dcnode-id="3940" instrument_node=""> at how Lucretius‘s poem made the world modern. He goes on to discuss how Montaigne and Shakespeare and other notables were influenced by Lucretius; that’s interesting though it comes in the last few pages. Turns out the dogmatists in the church were thoroughly against atomism. Naturally, they saw it as a threat to Catholicism. OK. So why do I feel that smoke has been blown thoroughly up my ass?</span></span><span data-dcnode-id="3938" instrument_node="">

</span><span data-dcnode-id="3831" id="freeText12808892198071977707" style="display:none"><span data-dcnode-id="3837" instrument_node="">Interesting book about the history of Roman poet Lucretius’ text On The Nature of Things and its rediscovery by Poggio the Florentine in the 1400s. I certainly learned a lot and enjoyed the storytelling for the most part. My one issue is that despite teasing out the influence that Lucretius had on Botticelli’s most famous surviving painting Primavera (“Spring”) (he is likely to have destroyed the twin painting Estate (“Summer”) during the dark days of Savonarola’s reign of terror in Florence), Greenblatt never talks about this specifically. I did appreciate the insights into Montaigne (who I have attempted to read), Bruno and Newton. Another figure, the Greek poet Marullo was mentioned to have had a portrait made by Botticelli. Interestingly enough I found an article published just two days ago that this portrait can be yours for the low, low price of $30M (</span><a data-dcnode-id="3835" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.nytimes.com/2019/10/02/arts/botticelli-frieze-masters-london.html" rel="noopener nofollow" target="_blank"><span data-dcnode-id="3836" instrument_node="">https://www.nytimes.com/2019/10/02/ar...</span></a><span data-dcnode-id="3834" instrument_node="">)!!</span><br data-dcnode-id="3833"><span data-dcnode-id="3832" instrument_node="">A great book for those who wish to understand the origins of religious fanaticism in Christianity and several alternative narratives.</span></span><span data-dcnode-id="3830" instrument_node="">

</span><span data-dcnode-id="3716" id="freeTextContainer15443762117332683153"><span data-dcnode-id="3726" instrument_node="">Usually five stars is my rating for a classic I read that was everything I hoped it would be. Nonfiction only gets five stars if it's very special. Once or twice a year. This book is great.</span><br data-dcnode-id="3725"><br data-dcnode-id="3724"><span data-dcnode-id="3723" instrument_node="">It's a microhistory; that's a book that takes a little niche in history, and generally uses that niche to jump around and explore a bunch of different eras through a specific lens. </span><a data-dcnode-id="3721" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.goodreads.com/book/show/2715.Salt" rel="nofollow noopener"><span data-dcnode-id="3722" instrument_node="">Salt</span></a><span data-dcnode-id="3720" instrument_node=""> is a great example, although not a great book. This book uses Lucretius' 50 BCE </span><a data-dcnode-id="3718" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.goodreads.com/book/show/493005.The_Nature_of_Things" rel="nofollow noopener"><span data-dcnode-id="3719" instrument_node="">The Nature of Things</span></a><span data-dcnode-id="3717" instrument_node=""> as its lens, and it jump</span></span><span data-dcnode-id="3715" instrument_node="">
</span><span data-dcnode-id="3689" id="freeText15443762117332683153" style="display:none"><span data-dcnode-id="3714" instrument_node="">Usually five stars is my rating for a classic I read that was everything I hoped it would be. Nonfiction only gets five stars if it's very special. Once or twice a year. This book is great.</span><br data-dcnode-id="3713"><br data-dcnode-id="3712"><span data-dcnode-id="3711" instrument_node="">It's a microhistory; that's a book that takes a little niche in history, and generally uses that niche to jump around and explore a bunch of different eras through a specific lens. </span><a data-dcnode-id="3709" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.goodreads.com/book/show/2715.Salt" rel="nofollow noopener"><span data-dcnode-id="3710" instrument_node="">Salt</span></a><span data-dcnode-id="3708" instrument_node=""> is a great example, although not a great book. This book uses Lucretius' 50 BCE </span><a data-dcnode-id="3706" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.goodreads.com/book/show/493005.The_Nature_of_Things" rel="nofollow noopener"><span data-dcnode-id="3707" instrument_node="">The Nature of Things</span></a><span data-dcnode-id="3705" instrument_node=""> as its lens, and it jumps from Roman times to the Renaissance. </span><br data-dcnode-id="3704"><br data-dcnode-id="3703"><span data-dcnode-id="3702" instrument_node="">Microhistories can be dangerous; at their worst, they're pointless collections of trivia. But at their best, they tie history together in a nice way. I think they're better if you're got a fair handle on history already, so that the threads these books pick up on are ones you're familiar with. It helps you decide whether you think the author's trying too hard, and it's also just really fun to see the book reference something you already know something about. In Swerve, for example, Greenblatt briefly points out how Giordano Bruno was influenced by Lucretius. </span><a data-dcnode-id="3700" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.goodreads.com/review/show/117566474" rel="nofollow noopener"><span data-dcnode-id="3701" instrument_node="">I read a book</span></a><span data-dcnode-id="3699" instrument_node=""> about that dude once, so it's neat to just get the reference, plus I'm confident that the connection is valid. (Both had somehow come to the conclusion that if there's our world, there are probably others, and some of them probably also contain life. </span><a data-dcnode-id="3697" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.goodreads.com/review/show/124385524" rel="nofollow noopener"><span data-dcnode-id="3698" instrument_node="">Milton figured it out too.</span></a><span data-dcnode-id="3696" instrument_node="">)</span><br data-dcnode-id="3695"><br data-dcnode-id="3694"><span data-dcnode-id="3693" instrument_node="">Greenblatt manages to really bring out the excitement in what's a tremendously important and smart work, but also a difficult one to penetrate. Nature of Things is one of the weirdest epic poems I've ever read. It's a proto-atheist work, so it's important to me, and Greenblatt gave me a way into it; without his context, explanation and enthusiasm, it would have been much harder for me to understand what Lucretius was banging on about.</span><br data-dcnode-id="3692"><br data-dcnode-id="3691"><span data-dcnode-id="3690" instrument_node="">If one judges a book, particularly a nonfiction one, by the number of marks one's made in it, this is a five-star book. And I do, so it is. Swerve brings what it offers.</span></span><span data-dcnode-id="3688" instrument_node="">

</span><span data-dcnode-id="3573" id="freeTextContainer7479909105144704448"><span data-dcnode-id="3584" instrument_node="">I think Stephen Greenblatt is a tremendously intelligent man, and a gifted writer. I also think 'The Swerve: How the Renaissance began' is frightfully oversold by its title and blurb.</span><br data-dcnode-id="3583"><br data-dcnode-id="3582"><blockquote data-dcnode-id="3574"><span data-dcnode-id="3581" instrument_node="">One of the world's most celebrated scholars, Stephen Greenblatt has crafted an innovative work of history and a thrilling story of discovery, in which one manuscript, plucked from a thousand years of neglect, changed the course of human thought and made possible the world as we know it.</span><br data-dcnode-id="3580"><br data-dcnode-id="3579"><span data-dcnode-id="3578" instrument_node="">...</span><br data-dcnode-id="3577"><br data-dcnode-id="3576"><span data-dcnode-id="3575" instrument_node="">The copying and translation</span></blockquote></span><span data-dcnode-id="3572" instrument_node="">
</span><span data-dcnode-id="3534" id="freeText7479909105144704448" style="display:none"><span data-dcnode-id="3571" instrument_node="">I think Stephen Greenblatt is a tremendously intelligent man, and a gifted writer. I also think 'The Swerve: How the Renaissance began' is frightfully oversold by its title and blurb.</span><br data-dcnode-id="3570"><br data-dcnode-id="3569"><blockquote data-dcnode-id="3561"><span data-dcnode-id="3568" instrument_node="">One of the world's most celebrated scholars, Stephen Greenblatt has crafted an innovative work of history and a thrilling story of discovery, in which one manuscript, plucked from a thousand years of neglect, changed the course of human thought and made possible the world as we know it.</span><br data-dcnode-id="3567"><br data-dcnode-id="3566"><span data-dcnode-id="3565" instrument_node="">...</span><br data-dcnode-id="3564"><br data-dcnode-id="3563"><span data-dcnode-id="3562" instrument_node="">The copying and translation of this ancient book, the greatest discovery of the greatest book-hunter of his age, fuelled the Renaissance, inspiring artists such as Botticelli and thinkers such as Girodano Bruno; shaped the thought of Galileo and Freud, Darwin and Einstein; and had revolutionary influence on writers from Montaigne to Thomas Jefferson.</span></blockquote><br data-dcnode-id="3560"><br data-dcnode-id="3559"><span data-dcnode-id="3558" instrument_node="">I'm not arguing against the importance of the manuscript, Lucretius's poem On the Nature of Things, a discourse on Epicurean philosophy that includes some startling statements and insights. Everything is made of invisible, eternal particles, that are in motion in an infinite void. This particles don't travel in straight and predictable lines - instead, they 'swerve' (are miniscule but unpredictable deflection that sets up a random and significant chain of collisions, from which arise everything). The swerve is the source of free will. Humans are not unique, the centre of the universe, or endowed with an eternal soul. Death is nothing, and should be neither sought out nor feared. Religions are superstitious delusion. The highest goal of a life is to seek the enhancement of pleasure and reduction of pain: the greatest obstacle to pleasure is not pain - it delusion. And finally: 'understanding the nature of things generates deep wonder'.</span><br data-dcnode-id="3557"><br data-dcnode-id="3556"><span data-dcnode-id="3555" instrument_node="">My beef with this book is that I never achieved deep wonder. The points above are ticked of in less than 15 pages. In 266 pages (followed by 85 pages of end notes, bibliography and index, and prefaced by a less than endearing introduction where Greenblatt describes himself as being blown away as a teenager by Lucretius's (notoriously difficult) poem), Greenblatt gives us:</span><br data-dcnode-id="3554"><br data-dcnode-id="3553"><span data-dcnode-id="3552" instrument_node="">- a primer on the creation and survival of papyrus scrolls and illuminated manuscripts</span><br data-dcnode-id="3551"><span data-dcnode-id="3550" instrument_node="">- a speculation on the potential circumstances of Lucretious's writing (extremely little is known about the author)</span><br data-dcnode-id="3549"><span data-dcnode-id="3548" instrument_node="">- biography of apostolic secretary, bookhunter and humanist Poggio Braccolini</span><br data-dcnode-id="3547"><span data-dcnode-id="3546" instrument_node="">- a study of the rise of humanist thinking, and how it shaped the period we call the Renaissance</span><br data-dcnode-id="3545"><span data-dcnode-id="3544" instrument_node="">- a description of the political maneuvering inside the Catholic church in Poggio's lifetime (including the schism between three claimants to the papacy)</span><br data-dcnode-id="3543"><span data-dcnode-id="3542" instrument_node="">- a rundown of how 'pagan' texts were received, treated and intellectually managed by the Catholic church</span><br data-dcnode-id="3541"><span data-dcnode-id="3540" instrument_node="">- a quick recap of the contents and style of Lucretius's poem</span><br data-dcnode-id="3539"><span data-dcnode-id="3538" instrument_node="">- a gloss of how Lucretius's poem - specifically, its fine Latin, its Epicurean theory, and the ideas around atoms - influenced later thinkers, writers and artists. </span><br data-dcnode-id="3537"><br data-dcnode-id="3536"><span data-dcnode-id="3535" instrument_node="">It's just too much. Every time you get intrigued by something, you're carried off in another direction. I got particularly peevish over the opening chapters (in particular the spectacularly speculative recreation of a possible symposia in Pompeii) and took until the middle of the book to regain my equilibrium. Even with Greenblatt's fluid writing, I felt shortchanged. I would read a 260 page book on almost any of the points above, and I wouldn't have minded a 500 page book that gave more space to Greenblatt's interweaving of history and interpretation. But as it was, I know enough to know that there's more to know about almost every point that Greenblatt made, and that niggled away at me throughout.</span></span><span data-dcnode-id="3533" instrument_node="">
