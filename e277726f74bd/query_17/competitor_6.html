</span><span data-dcnode-id="3425" id="freeTextContainer18392315328255050369"><img class="gr-hostedUserImg" data-dcnode-id="3435" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//i.gr-assets.com/images/S/compressed.photo.goodreads.com/hostedimages/1608141533i/30539453._SY540_.jpg&amp;raw"><br data-dcnode-id="3434"><br data-dcnode-id="3433"><span data-dcnode-id="3432" instrument_node="">When we heard from his daughter that Ted had passed away, Tony invited Ted’s Friends here in GR to pick one book out of Ted’s TBR list and read it for him sometime during this year. </span><br data-dcnode-id="3431"><br data-dcnode-id="3430"><span data-dcnode-id="3429" instrument_node="">I chose The Swerve – it was already in my TBR too, it was a Pulitzer price and it dealt with one, well, two of my favorite periods in history: The Renaissance and the Classical times.</span><br data-dcnode-id="3428"><br data-dcnode-id="3427"><span data-dcnode-id="3426" instrument_node="">How I wish Ted were still with us because I would want to discuss it with him and contrast impressions. My guess is that he would have </span></span><span data-dcnode-id="3424" instrument_node="">
</span><span data-dcnode-id="3362" id="freeText18392315328255050369" style="display:none"><img class="gr-hostedUserImg" data-dcnode-id="3423" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//i.gr-assets.com/images/S/compressed.photo.goodreads.com/hostedimages/1608141533i/30539453._SY540_.jpg&amp;raw"><br data-dcnode-id="3422"><br data-dcnode-id="3421"><span data-dcnode-id="3420" instrument_node="">When we heard from his daughter that Ted had passed away, Tony invited Ted’s Friends here in GR to pick one book out of Ted’s TBR list and read it for him sometime during this year. </span><br data-dcnode-id="3419"><br data-dcnode-id="3418"><span data-dcnode-id="3417" instrument_node="">I chose The Swerve – it was already in my TBR too, it was a Pulitzer price and it dealt with one, well, two of my favorite periods in history: The Renaissance and the Classical times.</span><br data-dcnode-id="3416"><br data-dcnode-id="3415"><span data-dcnode-id="3414" instrument_node="">How I wish Ted were still with us because I would want to discuss it with him and contrast impressions. My guess is that he would have enjoyed it. I know he enjoyed reading about the Italian Renaissance and that doing so awoke in him happy memories from his visit to Tuscany and other places. </span><br data-dcnode-id="3413"><br data-dcnode-id="3412"><span data-dcnode-id="3411" instrument_node="">On my side, unfortunately, I have found this read a great disappointment, to the extent that it has made me angry at certain points.</span><br data-dcnode-id="3410"><br data-dcnode-id="3409"><span data-dcnode-id="3408" instrument_node="">Greenblatt allegedly narrates us how Poggio Braggiolini ‘discovered’ in 1417, possibly in the Benedictine monastery in Fulda, a manuscript (written in Carolingian script) of the book, De rerum Natura, written by the Roman poet Lucretius (99-55 BC). </span><br data-dcnode-id="3407"><br data-dcnode-id="3406"><span data-dcnode-id="3405" instrument_node="">I am certainly one for learning about the context in which any work was created; I am no formalist. And this Greenblatt offers. But to my mind, he has gone too far and about 40 % of the book could be cast out, and I am an addict to the Renaissance. I also felt somewhat affronted when I had to read a few platitudes, such as that during Roman times literacy rates were lower than ours </span><a class="jsShowSpoiler spoilerAction" data-dcnode-id="3403"><span data-dcnode-id="3404" instrument_node="">(view spoiler)</span></a><span class="spoilerContainer" data-dcnode-id="3398" style="display: none"><span data-dcnode-id="3402" instrument_node="">[ may be he thinks his readership is illiterate  </span><a class="jsHideSpoiler spoilerAction" data-dcnode-id="3400"><span data-dcnode-id="3401" instrument_node="">(hide spoiler)</span></a><span data-dcnode-id="3399" instrument_node="">]</span></span><span data-dcnode-id="3397" instrument_node="">, or that the word ‘scrolling’ that we use for texts in computers has a relation to the word ‘scroll’ – one of the book formats in older ages. He also loves to bring in too many irrelevant comments and references, such as Shakespeare and Ben Johnson, or Theodosius and Hypatia, or St Clare of Assissi and many other names dropped in his irrelevant prattling. It is not surprising therefore that his bibliography is about 30 % of the book; and yet this is no scholarly work that would grant that extended list of books. There is no advancement in knowledge. What we have is an accumulation of material that Greenblatt must have collected along a long time and stuffed it all in this account. At one point it made me wonder if he had also included </span><a data-dcnode-id="3395" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.goodreads.com/book/show/99107.Winnie_the_Pooh__Winnie_the_Pooh___1_" rel="nofollow noopener" title="Winnie-the-Pooh (Winnie-the-Pooh, #1) by A.A. Milne"><span data-dcnode-id="3396" instrument_node="">Winnie-the-Pooh</span></a><span data-dcnode-id="3394" instrument_node=""> and</span><a data-dcnode-id="3392" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.goodreads.com/book/show/24213.Alice_s_Adventures_in_Wonderland___Through_the_Looking_Glass" rel="nofollow noopener" title="Alice's Adventures in Wonderland / Through the Looking-Glass by Lewis Carroll"><span data-dcnode-id="3393" instrument_node="">Alice's Adventures in Wonderland / Through the Looking-Glass</span></a><span data-dcnode-id="3391" instrument_node=""> Alice in Wonderland (a philosophical work after all, so maybe there is a link to Lucretius’s thinking).</span><br data-dcnode-id="3390"><br data-dcnode-id="3389"><span data-dcnode-id="3388" instrument_node="">The wiki on De rerum natura article is more illuminating than this book. And much clearer. You can check this for yourself.</span><br data-dcnode-id="3387"><br data-dcnode-id="3386"><a data-dcnode-id="3384" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/De_rerum_natura" rel="noopener nofollow" target="_blank"><span data-dcnode-id="3385" instrument_node="">https://en.wikipedia.org/wiki/De_reru...</span></a><br data-dcnode-id="3383"><br data-dcnode-id="3382"><span data-dcnode-id="3381" instrument_node="">I miss not being able to discuss this with Ted, for swerving this account certainly is.</span></span><span data-dcnode-id="3361" instrument_node="">

</span><span data-dcnode-id="3250" id="freeText13830852739582366042" style="display:none"><span data-dcnode-id="3257" instrument_node="">I jogged along easily, enjoying the scenery, taking in the weather without letting it affect me, swinging the arms, breathing, pacing myself nicely thank you. But as in a marathon (I'm told, never had such ambitions myself) there was a man with a hammer waiting at around kilometre 30. Suddenly the legs turned to lead and the breathing became laboured and all I wanted to do was to finish. And soon. Please.</span><br data-dcnode-id="3256"><br data-dcnode-id="3255"><span data-dcnode-id="3254" instrument_node="">I haven't managed to work out whether the brick wall I hit at the end of chapter eight was lying in wait for me because of my own lack of stamina or whether it had something to do with outside circumstances, or possibly the expectations set up by the sub-title. How Poggio Found The Book was as exciting as a thriller, and the summary of Lucretius' </span><i data-dcnode-id="3252"><span data-dcnode-id="3253" instrument_node="">On The Nature of Things</span></i><span data-dcnode-id="3251" instrument_node=""> was fascinating, but How The World Became Modern was a weaker brew, I thought, with little aroma. However it has to be said that by that point in my reading I was also back home from hols, back to mundane daily life; work and various other commitments, distractions, and stuff to deal with, you know, not always pleasant. So my schizophrenic response might have more to do with me than with the book. But maybe we compounded and confounded each other. At least that's my excuse. I hope Mr. Greenblatt will forgive me.</span></span><span data-dcnode-id="3249" instrument_node="">

</span><span data-dcnode-id="3147" id="freeTextContainer12289634242955956824"><span data-dcnode-id="3154" instrument_node="">This is a book about the philosophical epic poem </span><u data-dcnode-id="3152"><span data-dcnode-id="3153" instrument_node="">De Rerum Natura</span></u><span data-dcnode-id="3151" instrument_node=""> ("On the Nature of Things") by Lucretius, written circa first century BC. It tells of its loss in Medieval times and later rediscovery during the Renaissance. </span><br data-dcnode-id="3150"><br data-dcnode-id="3149"><span data-dcnode-id="3148" instrument_node="">The title, The Swerve, is used (in translation) by Lucretius to describe the unpredictable movements by which particles collide and take on new forms. The rediscovery of Lucretius, it is suggested, was a kind of "swerve" which helped to create the new cultural forms of the Re</span></span><span data-dcnode-id="3146" instrument_node="">
</span><span data-dcnode-id="3103" id="freeText12289634242955956824" style="display:none"><span data-dcnode-id="3145" instrument_node="">This is a book about the philosophical epic poem </span><u data-dcnode-id="3143"><span data-dcnode-id="3144" instrument_node="">De Rerum Natura</span></u><span data-dcnode-id="3142" instrument_node=""> ("On the Nature of Things") by Lucretius, written circa first century BC. It tells of its loss in Medieval times and later rediscovery during the Renaissance. </span><br data-dcnode-id="3141"><br data-dcnode-id="3140"><span data-dcnode-id="3139" instrument_node="">The title, The Swerve, is used (in translation) by Lucretius to describe the unpredictable movements by which particles collide and take on new forms. The rediscovery of Lucretius, it is suggested, was a kind of "swerve" which helped to create the new cultural forms of the Renaissance. The subtitle of "how the World Became Modern" is a bit of an overstatement, but this book does illuminate an interesting moment of cultural significance and provide a summary review of the history of books. It's interesting to note that the British publication of this book had a different subtitle, "How the Renaissance Began" which is just as much an overstatement and raises the question, "Why do the Brits get a different title?"</span><br data-dcnode-id="3138"><br data-dcnode-id="3137"><span data-dcnode-id="3136" instrument_node="">I have my own interpretation of a second meaning for the title of this book. The title </span><u data-dcnode-id="3134"><span data-dcnode-id="3135" instrument_node="">The Swerve</span></u><span data-dcnode-id="3133" instrument_node=""> brings to my mind the shift in cultural prestige that took place with the coming of the Enlightenment era when the most respected intellectuals became those who questioned perceived wisdom instead of those who meditated on revealed wisdom. The leading thinkers of the first century BC (when Lucretius lived) valued asking questions in the spirit of Greek philosophy. After the rise of Christianity and fall of the western part of the Roman Empire the leading thinkers changed to those who elaborated on the meanings of revealed truth contained in scripture. The coming of the Renaissance and Enlightenment constituted a "swerve" back to the intellectual direction of Lucretius' time. </span><br data-dcnode-id="3132"><br data-dcnode-id="3131"><span data-dcnode-id="3130" instrument_node="">The story told by this book begins with Poggio Bracciolini visiting at a monastery in central Germany – almost certainly the Benedictine abbey of Fulda - searching for old manuscripts. What he found was a ninth-century manuscript copy containing the entire 7,400-line text of De Rerum Natura ("On the Nature of Things") by Lucretius. This extraordinary philosophical epic poem, composed in Rome around the middle of the first century BC, was in 1417 known only by references by other authors. Distant hints of its initial impact could be heard in a letter of Cicero's of 54 BC, which spoke of its "brilliant genius"; in Ovid's commendation of "the sublime Lucretius"; and in Virgil's lines from the Georgics, "Blessed is he who has succeeded in finding out the causes of things, and has trampled underfoot all fears." </span><br data-dcnode-id="3129"><br data-dcnode-id="3128"><span data-dcnode-id="3127" instrument_node="">At the time of its discovery and for many years later it was the only known copy of the epic poem. Over the years a few other copies (or fragments) have been discovered, so it wasn't the sole surviving copy as it turned out. The copy found in Germany by Poggio and the copy made for him by a German scribe no longer survived today. But the beautiful transcript made back in Italy by his friend Niccolò de' Niccoli survives today. It is probably no accident that so few copies of "On the Nature of Things" survived the Medieval era. The epic poem by Lucretius espoused ways of thinking that early Medieval church leaders found threatening to their cause. </span><br data-dcnode-id="3126"><br data-dcnode-id="3125"><span data-dcnode-id="3124" instrument_node="">The history covered by this book includes; (1) The contrast between Roman intellectual thinking and the relatively coarse Latin contained in Christian codexes, (2) The history and fate of ancient Greek and Roman public libraries including the famous library at Alexandria, Egypt, (3) The preoccupation of some of the famous early Christian leaders with suffering which contrasted with Epicurean philosophy, (4) The career of Poggio Bracciolini within the environment of endemic corruption of the Roman Catholic Church (it was the era of three Popes), (5) A summary description of the contents of De Rerum Natura ("On the Nature of Things") by Lucretius, and (6) the history of how later writers and thinkers of the Renaissance and Enlightenment responded to the long poem by Lucretius. </span><br data-dcnode-id="3123"><br data-dcnode-id="3122"><span data-dcnode-id="3121" instrument_node="">The quotations from "On the Nature of Things" contained in this book are surprising close to an accurate description of theories of atoms and natural selection. Of course Lucretius is speaking as a philosopher and not from observations of scientific discovery. Nevertheless, they sound surprisingly modern.</span><br data-dcnode-id="3120"><br data-dcnode-id="3119"><span data-dcnode-id="3118" instrument_node="">One little bit of trivia that I learned from this book was contained in the discussion of Thomas More's book, </span><u data-dcnode-id="3116"><span data-dcnode-id="3117" instrument_node="">Utopia</span></u><span data-dcnode-id="3115" instrument_node="">. More's description of Utopia included capital punishment for those who didn't believe in God and the afterlife. In other words, Moore couldn't imagine people living in peace without the fear of punishment after death for bad behavior. The fear of execution in this life was replaced by fear of hell in the afterlife. The word "utopia" will never be the same for me.</span><br data-dcnode-id="3114"><br data-dcnode-id="3113"><span data-dcnode-id="3112" instrument_node="">The following short review of this book is from the PageADay Book Lover's Calendar for December 3, 2014.</span><blockquote data-dcnode-id="3105"><span data-dcnode-id="3111" instrument_node="">Winner of the Pulitzer Prize and the National book Award for nonfiction, this is a distilled history of Western thought told through a few sharp eyes at critial junctures along the way. The most important to Greenblatt's telling is Poggio Bracciolini, a 15th century apostolic secretary who discovers a rare, 1,000-year-old text by Roman philosopher Lucretius. the two men, and the written histories that connect them, become the basis for this materful volume, which is liberally sprinkled with historical anecdotes that are always illuminating and often humorously entertaining.</span><br data-dcnode-id="3110"><i data-dcnode-id="3107"><b data-dcnode-id="3108"><span data-dcnode-id="3109" instrument_node="">The Swerve: How the World Became Modern,</span></b></i><span data-dcnode-id="3106" instrument_node=""> by Stephen Greenblatt (W.W. Norton, 2011)</span></blockquote><br data-dcnode-id="3104"></span><span data-dcnode-id="3102" instrument_node="">

</span><span data-dcnode-id="3009" id="freeTextContainer15475984367932654509"><span data-dcnode-id="3013" instrument_node="">First, the title is really dumb. And both sides of the colon. The Swerve? Even after reading the book and having it explained to me, I still find it off-putting. And I have a problem with titles which add, after the colon, some phrase of puffery. Usually it's how something or someone (_________) Changed the World or Saved Civilization, even if (_________)'s accomplishment was much more modest. This book would tell us </span><i data-dcnode-id="3011"><span data-dcnode-id="3012" instrument_node="">How the World Became Modern</span></i><span data-dcnode-id="3010" instrument_node="">. But the World is a very big place. And some of it </span></span><span data-dcnode-id="3008" instrument_node="">
</span><span data-dcnode-id="2965" id="freeText15475984367932654509" style="display:none"><span data-dcnode-id="3007" instrument_node="">First, the title is really dumb. And both sides of the colon. The Swerve? Even after reading the book and having it explained to me, I still find it off-putting. And I have a problem with titles which add, after the colon, some phrase of puffery. Usually it's how something or someone (_________) Changed the World or Saved Civilization, even if (_________)'s accomplishment was much more modest. This book would tell us </span><i data-dcnode-id="3005"><span data-dcnode-id="3006" instrument_node="">How the World Became Modern</span></i><span data-dcnode-id="3004" instrument_node="">. But the World is a very big place. And some of it -- and a lot of people in it -- are not very modern at all. I make this complaint even while admitting that I come from a long line of exaggerators.</span><br data-dcnode-id="3003"><br data-dcnode-id="3002"><span data-dcnode-id="3001" instrument_node="">With that little pet peeve of mine out of the way, let me say that this book is a marvel. It sang to my Epicurean spirit. I applaud it even as I refuse to sign on to the point of the thesis: that a long-hidden Greek poem, authored BC, accounts more or less for the scientific and philosophical world we now live in. That conclusion is convenient in hindsight but failed to convince me.</span><br data-dcnode-id="3000"><br data-dcnode-id="2999"><span data-dcnode-id="2998" instrument_node="">Rather, it was the story that I loved. Not the story of the discovery of Lucretius' poem, but the stories of the people who dared to think of how the world works, and the people who tried to stop them from thinking. Heroes and Villains.</span><br data-dcnode-id="2997"><br data-dcnode-id="2996"><span data-dcnode-id="2995" instrument_node="">The Villains are Baldassare Cossa, the original Pope John XXIII, and Thomas More, who is revered by Catholics to this day, yet tried unsuccessfully to get the Inquisition up and running in England and believed in a </span><i data-dcnode-id="2993"><span data-dcnode-id="2994" instrument_node="">Utopia</span></i><span data-dcnode-id="2992" instrument_node=""> where heretics were burned at the stake.</span><br data-dcnode-id="2991"><br data-dcnode-id="2990"><span data-dcnode-id="2989" instrument_node="">The Heroes, for me, were Giordano Bruno, who denied the right of his inquisitors to dictate what was heresy (they didn't take that well), and Michel Eyquem de Montaigne, whose heavily annotated personal copy of Lucretius' poem informed Shakespeare, and through him, Spenser, Donne and Bacon.</span><br data-dcnode-id="2988"><br data-dcnode-id="2987"><span data-dcnode-id="2986" instrument_node="">It is one thing, in reading a book, to be entertained (I was); even better is it to immediately have a new must read list as a result. And so I have already ordered </span><a data-dcnode-id="2984" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.goodreads.com/book/show/18209502.Shakespeare_s_Montaigne_The_Florio_Translation_of_the_Essays__A_Selection" rel="nofollow noopener" title="Shakespeare's Montaigne The Florio Translation of the Essays, A Selection by Michel de Montaigne"><span data-dcnode-id="2985" instrument_node="">Shakespeare's Montaigne The Florio Translation of the Essays A Selection</span></a><span data-dcnode-id="2983" instrument_node="">. Another NYRB-Classic, with an introduction by Stephen Greenblatt.</span><br data-dcnode-id="2982"><br data-dcnode-id="2981"><span data-dcnode-id="2980" instrument_node="">People are moved by what Lucretius wrote, what he imagined. I was. Stephen Greenblatt was. Montaigne surely was, as this included quote from his essays demonstrates:</span><br data-dcnode-id="2979"><br data-dcnode-id="2978"><i data-dcnode-id="2971"><span data-dcnode-id="2977" instrument_node="">Go out of this world as you entered it. The same passage that you made from death to life, without feeling or fright, make it again from life to death. Your death is part of the order of the universe; it is part of the life of the world. </span><br data-dcnode-id="2976"><br data-dcnode-id="2975"><span data-dcnode-id="2974" instrument_node="">Our lives we borrow from each other . . .</span><br data-dcnode-id="2973"><span data-dcnode-id="2972" instrument_node="">And men, like runners, pass along the torch of life.</span></i><br data-dcnode-id="2970"><br data-dcnode-id="2969"><br data-dcnode-id="2968"><br data-dcnode-id="2967"><br data-dcnode-id="2966"></span><span data-dcnode-id="2964" instrument_node="">

</span><span data-dcnode-id="2868" id="freeTextContainer4982525028050284893"><span data-dcnode-id="2869" instrument_node="">The Greek philosopher Epicurus (341-270 BCE) founded a school of thought that thrived for hundreds of years during the Hellenistic and Roman periods following Plato. Only a few fragments of his writings survive today. The most complete statement of Epicureanism that has survived is a poem, ON THE NATURE OF THINGS, written by the Roman poet Lucretius. THE SWERVE is Stephen Greenblatt's account of how ON THE NATURE OF THINGS was rescued from obscurity by Poggio Bracciolini, a Vatican bureaucrat wi</span></span><span data-dcnode-id="2867" instrument_node="">
</span><span data-dcnode-id="2844" id="freeText4982525028050284893" style="display:none"><span data-dcnode-id="2866" instrument_node="">The Greek philosopher Epicurus (341-270 BCE) founded a school of thought that thrived for hundreds of years during the Hellenistic and Roman periods following Plato. Only a few fragments of his writings survive today. The most complete statement of Epicureanism that has survived is a poem, ON THE NATURE OF THINGS, written by the Roman poet Lucretius. THE SWERVE is Stephen Greenblatt's account of how ON THE NATURE OF THINGS was rescued from obscurity by Poggio Bracciolini, a Vatican bureaucrat with humanistic interests. </span><br data-dcnode-id="2865"><br data-dcnode-id="2864"><span data-dcnode-id="2863" instrument_node="">Bracciolini was a manuscript hunter. He and other humanists of his generation searched for ancient manuscripts in monastery libraries throughout Christian Europe. He discovered ON THE NATURE OF THINGS, his greatest find, in a monastery in Germany in 1417. </span><br data-dcnode-id="2862"><br data-dcnode-id="2861"><span data-dcnode-id="2860" instrument_node="">ON THE NATURE OF THINGS had a profound influence on Renaissance thinkers. It's influence came from the beauty of Lucretius' poetry and the subversive nature of Epicurus' philosophy. Epicurus was a materialist. He believed that everything in nature is made of fundamental particles, called 'atoms'. Atoms exist in an infinite void. They are infinite in number, but limited in shapes and sizes. They are eternal. They neither were created. Nor will they have an end. Epicurus believed that atoms are in constant motion, colliding with one another to combine and re-combine to form everything in our universe, including human beings, who are not uniquely made. Sometimes atoms change direction slightly. This sets off a ceaseless chain of collisions resulting in new combinations of atoms. Lucretius called this 'the swerve' and it is the cause of all new things. It is also the source of free will. </span><br data-dcnode-id="2859"><br data-dcnode-id="2858"><span data-dcnode-id="2857" instrument_node="">Here, I will insert my only complaint about this excellent book. 'Swerve' seems like the sort of word about which translators might disagree. I think it would have been interesting for Greenblatt to discuss that a bit. Oh well. I loved the book otherwise.</span><br data-dcnode-id="2856"><br data-dcnode-id="2855"><span data-dcnode-id="2854" instrument_node="">In keeping with his materialism, Epicurus believed that there is no afterlife. When we die, our atoms are released to recombine with other atoms to form new things. He opposed all religions as delusions that interfere with our happiness. For humans to achieve happiness, Epicurus thought we must rid ourselves of these delusions. Only then can we eliminate disappointment and pursue pleasure, which is our highest goal. </span><br data-dcnode-id="2853"><br data-dcnode-id="2852"><span data-dcnode-id="2851" instrument_node="">Epicurus' materialism is the deepest heresy to Christians. For this, he has been attacked by Christian advocates. A common charge against him is that he taught unbounded hedonism. This charge is easily refuted. Epicurus believed that one should live modestly and pursue knowledge of nature and one's own mind. A modest, contemplative life can allow one to attain tranquility, freedom from fear and absence of bodily pain. For Epicurus, the combination of tranquility and freedom from fear and pain leads to happiness. (Absence of pain and disappointment may be what Epicurus truly meant by the pursuit of pleasure, later argued at least one important 20th century philosopher.)</span><br data-dcnode-id="2850"><br data-dcnode-id="2849"><span data-dcnode-id="2848" instrument_node="">When Bracciolini introduced ON THE NATURE OF THINGS into 15th Century European society, it would have been natural for Christian authorities to suppress it. Some limited efforts at suppression were made. But they were ineffective. This was due to the beauty of Lucretius' poetry. The poem was held in such high regard for its masterly imagery and language that even pious Christian scholars continued to share the poem with other scholars. Eventually, Epicurus' atomism made an impact too. It's influence can be seen in the works of Renaissance artists and philosophers, including Raphael, Machiavelli, Bacon and Gassendi, among many others. </span><br data-dcnode-id="2847"><br data-dcnode-id="2846"><span data-dcnode-id="2845" instrument_node="">Greenblatt is impressive. His WILL IN THE WORLD is a favorite. In THE SWERVE, he has written a sophisticated and enjoyable book treating Epicurus' philosophy, Lucretius' artistry and Bracciolini's triumphant discovery. THE SWERVE won the Pulitzer Prize and it is easy to see why. I encourage everyone to read it.</span></span><span data-dcnode-id="2843" instrument_node="">

        </span><span class="staticStars notranslate" data-dcnode-id="2766" title="did not like it"><span class="staticStar p10" data-dcnode-id="2771" size="15x15"><span data-dcnode-id="2772" instrument_node="">did not like it</span></span><span class="staticStar p0" data-dcnode-id="2770" size="15x15"></span><span class="staticStar p0" data-dcnode-id="2769" size="15x15"></span><span class="staticStar p0" data-dcnode-id="2768" size="15x15"></span><span class="staticStar p0" data-dcnode-id="2767" size="15x15"></span></span><span data-dcnode-id="2765" instrument_node="">
</span><div data-dcnode-id="2759"><span class="uitext greyText" data-dcnode-id="2763"><span data-dcnode-id="2764" instrument_node="">Recommends it for: </span></span><span data-dcnode-id="2762" instrument_node="">
</span><span class="uitext reviewText" data-dcnode-id="2760"><span data-dcnode-id="2761" instrument_node="">No one</span></span></div><span data-dcnode-id="2758" instrument_node="">
</span></div><span data-dcnode-id="2756" instrument_node="">
</span><div class="reviewText stacked" data-dcnode-id="2703"><span data-dcnode-id="2755" instrument_node="">
</span><span class="readable" data-dcnode-id="2705" id="reviewTextContainer675626551"><span data-dcnode-id="2754" instrument_node="">
</span><span data-dcnode-id="2749" id="freeTextContainer11794343204428903907"><span data-dcnode-id="2753" instrument_node="">Stephen Greenblatt is a literary scholar specializing in Shakespeare. He is also a cultured despiser of Christianity; indeed, it appears, of all religion. For him, the world become modern is the world discarding God; the means by which it became modern was the discovery and dissemination of Lucretius' </span><i data-dcnode-id="2751"><span data-dcnode-id="2752" instrument_node="">De rerum natura</span></i><span data-dcnode-id="2750" instrument_node=""> in the Renaissance. From it we learned, he says, that the world is made up of atoms colliding at random, forming and reforming objects, including whatever passes for the human soul,</span></span><span data-dcnode-id="2748" instrument_node="">
</span><span data-dcnode-id="2710" id="freeText11794343204428903907" style="display:none"><span data-dcnode-id="2747" instrument_node="">Stephen Greenblatt is a literary scholar specializing in Shakespeare. He is also a cultured despiser of Christianity; indeed, it appears, of all religion. For him, the world become modern is the world discarding God; the means by which it became modern was the discovery and dissemination of Lucretius' </span><i data-dcnode-id="2745"><span data-dcnode-id="2746" instrument_node="">De rerum natura</span></i><span data-dcnode-id="2744" instrument_node=""> in the Renaissance. From it we learned, he says, that the world is made up of atoms colliding at random, forming and reforming objects, including whatever passes for the human soul, without any meaning or higher purpose. The highest purpose in life is maximizing pleasure and minimizing pain, and after death there is nothing but dissolution. This last belief is said to be consoling. </span><br data-dcnode-id="2743"><br data-dcnode-id="2742"><span data-dcnode-id="2741" instrument_node="">It is generally not to the point to discuss an author's personal psychology in appraising his book, but Prof. Greenblatt invites us to do so in his introduction. His own discovery of Lucretius as a teenager, he tells us, freed him from the hold that his own mother's obsessive fear of imminent death (she lived to the age of 95) had had on his psyche. Lucretius' Epicureanism gave him the equanimity of heart to discount his mother's fears and face the world as it really was. Hence he has become an evangelist for Lucretius, a new atheist proclaiming an old atheism. </span><br data-dcnode-id="2740"><br data-dcnode-id="2739"><span data-dcnode-id="2738" instrument_node="">Prof. Greenblatt's hero is Poggio Bracciolini, the Renaissance humanist who, in the early 15th century, rediscovered </span><i data-dcnode-id="2736"><span data-dcnode-id="2737" instrument_node="">De rerum natura</span></i><span data-dcnode-id="2735" instrument_node=""> in a monastic library (Prof. Greenblatt believes it was Fulda) and put it in circulation once again. Poggio's life story occupies at least the first half of the book, providing the occasion, since he was a papal secretary at the time of the Western Schism and the Council of Constance, for Prof. Greenblatt to lick his chops over the corruption of the Church in that era, and to bewail the deaths of Jan Hus and Jerome of Prague. He is too honest to maintain that Poggio actually claimed to be an Epicurean, although if anyone ever echoed the ideas of Lucretius but discounted them in favor of Christianity, he generally claims they did so only to avoid persecution by the evil and all-powerful Church. </span><br data-dcnode-id="2734"><br data-dcnode-id="2733"><span data-dcnode-id="2732" instrument_node="">Once the Lucretian, Epicurean cat was out of the bag, Prof. Greenblatt argues, modernity was on its way. The ideas of Lucretius, he argues, are responsible for modern science, even though some who benefit from it deny them. By this I take him to mean that anyone who enjoys modern medicine, transportation, computer technology, or any other manifestation of scientific activity, or who accepts modern physics and chemistry, believes that the earth orbits the sun, or recognizes that the ancestors of present-day plants and animals looked considerably different from their descendants, and still believes in God, the immortality of the soul, and a future life, is a hypocrite and an ingrate. That is, in my humble opinion, a pretty big leap.</span><br data-dcnode-id="2731"><br data-dcnode-id="2730"><span data-dcnode-id="2729" instrument_node="">The Renaissance perfected modernity through the dissemination of Lucretian ideas by Botticelli (whose "Primavera" echoes some of </span><i data-dcnode-id="2727"><span data-dcnode-id="2728" instrument_node="">De rerum natura</span></i><span data-dcnode-id="2726" instrument_node="">--even though he died in the Dominican habit as a follower of Savonarola), Giordano Bruno, Galileo, Montaigne, and Ben Jonson. Of these, Bruno is Prof. Greenblatt's second hero, one more to the point because he actually was an Epicurean. Bruno's execution demonstrates conclusively for Prof. Greenblatt that the Catholic Church is, was, and always will be the greatest obstacle to progress. From the atomism of Lucretius, shared, he says, by these figures, we have a direct line through Isaac Newton to the theories of modern physics. </span><br data-dcnode-id="2725"><br data-dcnode-id="2724"><span data-dcnode-id="2723" instrument_node="">Like many of the new atheists, Prof. Greenblatt chooses to remain blithely ignorant of the faith he attacks. Like them, he appears to misunderstand what Christians (and Jews and Muslims) actually believe about God, failing to distinguish between necessary and contingent being, or between immanence and transcendence. He seems to believe that the Protestant Reformers were influenced by atomism in their denial of transubstantiation (which, by the way, was first defined as dogma at IV Lateran in 1215, not at the Council of Trent as Prof. Greenblatt thinks), which is demonstrably untrue. Neither Luther nor Calvin had any more use for Epicureanism than the Catholic Church--indeed probably much less. Bruno would have been anathema, and probably would have suffered the same fate, in Calvin's Geneva or Luther's Wittenberg. Indeed, Copernicanism, which Prof. Greenblatt associates with Lucretius, was better accepted in the Catholic Church than in Protestant states, at least initially. The case of Galileo (whom Prof. Greenblatt likewise claims for one of his own) was a great deal more complex than the confrontation between reason and superstition that he and his confreres would make of it. He is not a historian of science (nor am I, but I know enough about it to recognize the fatal oversimplification), but this does not prevent him from arguing that Galileo was persecuted for his atomism even while acknowledging (in a footnote) that he is differing from most historians of science.</span><br data-dcnode-id="2722"><br data-dcnode-id="2721"><span data-dcnode-id="2720" instrument_node="">No doubt there are specialists more informed than I who could better expose Prof. Greenblatt's distortions, so I will only mention one more: a fudge common to many atheists as big as Mackinac Island. He gets it from Lucretius and accepts it without comment or any attempt to explain the logic. This is his account of the origin of free will. If everything happens by physical causes, then everything must proceed either by necessity or chance. An honest atheist, like Denis Diderot in the 18th century, recognized that materialism excludes free will. Lucretius introduces a </span><i data-dcnode-id="2718"><span data-dcnode-id="2719" instrument_node="">clinamen</span></i><span data-dcnode-id="2717" instrument_node="">, or the "swerve" that gives the book its title, as the source of free will for both gods (for Lucretius is a practical, not a theoretical, atheist) and men. I haven't read Lucretius, so I can't judge how he explains this, but Prof. Greenblatt certainly does not explain it. He merely asserts that Lucretius' "swerve" preserves free will. </span><br data-dcnode-id="2716"><br data-dcnode-id="2715"><span data-dcnode-id="2714" instrument_node="">Professor Greenblatt has written interesting things about Shakespeare, especially his </span><i data-dcnode-id="2712"><span data-dcnode-id="2713" instrument_node="">Will in the World</span></i><span data-dcnode-id="2711" instrument_node="">. He is not a philosopher or a historian of religion or of science. This book will is less a work of history than yet another entry in the catalog of the New Atheism, a movement of far greater intellectual pretension than quality.</span></span><span data-dcnode-id="2709" instrument_node="">

</span><span data-dcnode-id="2616" id="freeText10524124313122062073" style="display:none"><span data-dcnode-id="2617" instrument_node="">On the Nature of Things by Lucretius was one of my favorite books I read when I was an undergraduate philosophy student. Perhaps it helped that my professor was a thin man, with a sprawling beard, and intense green eyes, who would shriek the lines of the poem like a Puritan preacher. Fortunately, Stephen Greenblatt cannot take away my experience of reading Lucretius. Much of his book is speculative (if he was here then he probably would have gone to this monastery, and while there, he probably would have done this...), and his thesis is overblown. The book is mostly a sprawling biography of Poggio Bracciolini, an early 15th century Italian humanist, who among his peers recovered classical texts rotting away in German monasteries; as well as descriptions of life and intrigue in the Vatican court and Renaissance Italy. Only a small portion is devoted to Lucretius himself (some of it unavoidably speculative because we have little concrete evidence of his life), and Greenblatt gives almost a bullet point summary of the poem (okay, a slight exaggeration). Finally, as to his legacy (subtitle is "How the World Became Modern"), Greenblatt does spend a lot of time about turmoil in the Christian Church and its prosecution of heretics, but too little, I think, in establishing the influence of Lucretius (and thus, Epicurus) on future thinkers (Perhaps the worst example: Shakespeare was a friend of a friend of the philosopher Bruno, and he also probably chatted with Ben Johnson, who owned a copy of On the Nature of Things.). This was a disappointing book.</span></span><span data-dcnode-id="2615" instrument_node="">

</span><span data-dcnode-id="2504" id="freeTextContainer2450223922202174225"><span data-dcnode-id="2508" instrument_node="">Fascinating. A manuscript copy of a poem by the ancient Roman author Lucretius is discovered in a 15th-century German monastery by the personal secretary of a disgraced and deposed pope. The man’s name is Poggio Basciolini and he is unusual for his time: driven by curiosity, when curiosity is not considered a virtue but a vice, fascinated with the ideas of ancient and pagan Greece and Rome, a dangerous hobby in Poggio’s time, heretical even. Lucretius’s poem, </span><i data-dcnode-id="2506"><span data-dcnode-id="2507" instrument_node="">On the Nature of Things</span></i><span data-dcnode-id="2505" instrument_node="">, is striking</span></span><span data-dcnode-id="2503" instrument_node="">
</span><span data-dcnode-id="2498" id="freeText2450223922202174225" style="display:none"><span data-dcnode-id="2502" instrument_node="">Fascinating. A manuscript copy of a poem by the ancient Roman author Lucretius is discovered in a 15th-century German monastery by the personal secretary of a disgraced and deposed pope. The man’s name is Poggio Basciolini and he is unusual for his time: driven by curiosity, when curiosity is not considered a virtue but a vice, fascinated with the ideas of ancient and pagan Greece and Rome, a dangerous hobby in Poggio’s time, heretical even. Lucretius’s poem, </span><i data-dcnode-id="2500"><span data-dcnode-id="2501" instrument_node="">On the Nature of Things</span></i><span data-dcnode-id="2499" instrument_node="">, is strikingly modern (that the universe is made up of atoms that are shared by the stars, oceans, animals, and us - a sort of early "unifying theory"; that there is no afterlife, but rather than being something to fear, we should be inspired by this to live life fully), considered radical even in its own time. Greenblatt weaves together the tale of the "book hunter" Poggio and his quest with the fall of Rome and the precarious survival of Greek and Roman texts in monasteries (where monk-scribes copied out the ancient manuscripts not necessarily as acts of intellectual engagement, as I had always assumed, but more often as acts of obedience, and a good thing too, since someone intellectually engaged, as Greenblatt points out, might have been more likely to change something in the process), their recovery by men like Poggio, and the blossoming of the Renaissance.</span></span><span data-dcnode-id="2497" instrument_node="">

</span><span data-dcnode-id="2395" id="freeText15713981168377244946" style="display:none"><span data-dcnode-id="2408" instrument_node="">I'm very ambivalent about this book. On the one hand, it was an intriguing glimpse into the 15th-century searches for classical manuscripts via the discovery of Lucretius' poem </span><i data-dcnode-id="2406"><span data-dcnode-id="2407" instrument_node="">De rerum natura</span></i><span data-dcnode-id="2405" instrument_node=""> by a relatively obscure papal secretary. It expanded my knowledge of antipopes, humanism, and - obviously - Epicureanism. </span><br data-dcnode-id="2404"><br data-dcnode-id="2403"><span data-dcnode-id="2402" instrument_node="">But on the other hand, I found the book to be deeply flawed in two significant ways. First, Greenblatt seems to hold bizarre prejudices against the Christian church. For example (and this is just one of many), his depiction of the Church during the Middle Ages is intensely ugly and critical. I'm not saying that the Dark Ages were a great time, but he focuses unrelentingly (and graphically) on the practice of corporal mortification to the exclusion of any other Church practices and doctrines. Second, Greenblatt strains to position the poem as </span><b data-dcnode-id="2400"><span data-dcnode-id="2401" instrument_node="">the</span></b><span data-dcnode-id="2399" instrument_node=""> central text of the post-Renaissance. Maybe it actually was the most influential work of all time, but unfortunately, Greenblatt does not fill me with confidence about this conclusion. He just cherry-picks great thinkers throughout the centuries and asserts (with minimal textual proofs) that they were influenced by the poem. Indeed, he manages to get from Machiavelli to Jefferson in less than fifty pages. </span><br data-dcnode-id="2398"><br data-dcnode-id="2397"><span data-dcnode-id="2396" instrument_node="">Ultimately, I was left with the impression that the book was trying to "convert" me to Epicureanism. Had it just been a straightforward book of popular history, even one that described the very real tensions between classical philosophies and the doctrines of the Catholic Church, I would have loved it. But I didn't appreciate the sinking feeling that the book was pushing me to conclude that smart, sophisticated people are atheists/Epicureans and that only the willfully ignorant or tragically backwards are still Christians. </span></span><span data-dcnode-id="2394" instrument_node="">

</span><span data-dcnode-id="2294" id="freeTextContainer16281223748756911047"><span data-dcnode-id="2299" instrument_node="">Stephen Greenblatt's mother was terrified of death.</span><br data-dcnode-id="2298"><br data-dcnode-id="2297"><i data-dcnode-id="2295"><span data-dcnode-id="2296" instrument_node="">"...as far back as I can remember, she brooded obsessively on the imminence of her end, invoking it again and again, especially at moments of parting. My life was full of extended, operatic scenes of farewell. When she went with my father from Boston to New York for the weekend, when I went off to summer camp, even - when things were especially hard for her - when I simply left the house for school, she clung tightly to me, speaking of her fragi</span></i></span><span data-dcnode-id="2293" instrument_node="">
</span><span data-dcnode-id="2267" id="freeText16281223748756911047" style="display:none"><span data-dcnode-id="2292" instrument_node="">Stephen Greenblatt's mother was terrified of death.</span><br data-dcnode-id="2291"><br data-dcnode-id="2290"><i data-dcnode-id="2288"><span data-dcnode-id="2289" instrument_node="">"...as far back as I can remember, she brooded obsessively on the imminence of her end, invoking it again and again, especially at moments of parting. My life was full of extended, operatic scenes of farewell. When she went with my father from Boston to New York for the weekend, when I went off to summer camp, even - when things were especially hard for her - when I simply left the house for school, she clung tightly to me, speaking of her fragility and of the distinct possibility that I would never see her again."</span></i><br data-dcnode-id="2287"><br data-dcnode-id="2286"><span data-dcnode-id="2285" instrument_node="">The dread of her ever-impending exit from this world haunted Stephen's youth - until, one day, sorting through a box of used books at Yale, he came across a prose translation of Lucretius' "On the Nature of Things." This work, addressing as it did the folly of superstitious fears and philosophically expounding on some pragmatic first principles, served to set many of his worries to rest. In fact, so powerful was its impact that it seeded a quest.</span><br data-dcnode-id="2284"><br data-dcnode-id="2283"><i data-dcnode-id="2281"><span data-dcnode-id="2282" instrument_node="">The Swerve</span></i><span data-dcnode-id="2280" instrument_node=""> is a marvelous journey back in time, to fourteenth-century Florence, to an era of dueling popes and religious persecution, monasteries and scribes. It is an account of book hunter Poggio Bracciolini and his dogged search for manuscripts from ancient days; Greek and Roman masterworks slipped out of circulation through the Dark Ages, whose crumbling bits might still be found in the libraries of religious orders that made a practice of copying things out. Poggio is the man who unearthed the text of Lucretius and, quite probably, the sole reason we are able to read this treatise today. For that, we must be grateful.</span><br data-dcnode-id="2279"><br data-dcnode-id="2278"><span data-dcnode-id="2277" instrument_node="">However...</span><br data-dcnode-id="2276"><br data-dcnode-id="2275"><span data-dcnode-id="2274" instrument_node="">Our author goes on to assert that this document, alone, is what launched civilization out of the darkness of ignorance and into the light of modernity. I think that's taking Poggio's accomplishment a little too far. Many works were recovered - not only literary pieces but other forms of art (and science) that certainly contributed to the resurrection of critical thought. Still, I can understand why my author clings to this theory so tenaciously. Lucretius, coming as he did into Stephen's life at just the right moment with just the right words, brought with him the sort of healing we all hope to find. And, afterward, to do a bit of justice.</span><br data-dcnode-id="2273"><br data-dcnode-id="2272"><span data-dcnode-id="2271" instrument_node="">Barring the one contention, this historical tale is really quite grand and recommended to anyone who enjoys books along the line of </span><i data-dcnode-id="2269"><span data-dcnode-id="2270" instrument_node="">The Name of the Rose.</span></i><br data-dcnode-id="2268"></span><span data-dcnode-id="2266" instrument_node="">

</span><span data-dcnode-id="2152" id="freeText11481623944864022355" style="display:none"><span data-dcnode-id="2162" instrument_node="">The Swerve is a romantic tale of a book lover, but it is so much more. True--it's a tale of passion and sacrifice, but also of fanaticism and philosophical determination. The war of beliefs that rages today is not new, but is merely a continuation of fear versus reason, and belief versus logic. The violence we see between ourselves stem from the same ignorance and hatred, fear and exercise of domination. Heretics who believed in atoms and the end of the soul were burned at the stake, after torture and mutilation, in the name of religion. Ideas had power then and a whisper of complaint could cost you your life. We war, still, at rallies, marches and over the internet. What is this desire to control the hearts and minds of our fellow human beings, I'll never understand. Reading The Swerve showed me that intolerance is not new, and we have not evolved. Funny that Thomas Jefferson considered himself an Epicurean. America was built along the linage of Democritus, which describes a civilization more appealing than fire and brimstone. Is fear truly the only way to advance our civilization? </span><br data-dcnode-id="2161"><br data-dcnode-id="2160"><span data-dcnode-id="2159" instrument_node="">Addendum: A belief system not addressed in The Swerve is a Republican/Conservative one that holds corporations at the same or higher regard as people. Workers and consumers are important only to further the profit of the corporation. Unfortunate side effects such as pollution, toxic products, and dangerous working conditions, and fraud are ignored, denied or tolerated for profit-driven growth. Like the church of old, anyone who disagrees with this will be shouted down, stomped upon, or ridiculed. This election is a battle between humanism and corporation-ists. Like the yin/yang symbol, both sides bear blemishes of the other. </span><br data-dcnode-id="2158"><br data-dcnode-id="2157"><span data-dcnode-id="2156" instrument_node="">So, new visions have entered the world stage, but the method by which they battle has not changed, it has become more psychological, perhaps, but just as manipulative. </span><br data-dcnode-id="2155"><br data-dcnode-id="2154"><span data-dcnode-id="2153" instrument_node="">Oh, by the way, I highly recommend this book. </span></span><span data-dcnode-id="2151" instrument_node="">

</span><span data-dcnode-id="2058" id="freeTextContainer7212817302781909737"><span data-dcnode-id="2062" instrument_node="">I came to this work, caution my armor, having heard that it was a bit speculative. I just finished reading Lucretius, and having seen that this book has been widely read, I decided it would be fun to read a modern perspective on the poet. But some speculative proposals were not the only problems with this book.</span><br data-dcnode-id="2061"><br data-dcnode-id="2060"><span data-dcnode-id="2059" instrument_node="">First, the title is completely misleading. "The Swerve" is a direct reference to the action Lucretius's ancient atoms commit in order to produce the physical world we see. Greenblatt spend</span></span><span data-dcnode-id="2057" instrument_node="">
</span><span data-dcnode-id="2043" id="freeText7212817302781909737" style="display:none"><span data-dcnode-id="2056" instrument_node="">I came to this work, caution my armor, having heard that it was a bit speculative. I just finished reading Lucretius, and having seen that this book has been widely read, I decided it would be fun to read a modern perspective on the poet. But some speculative proposals were not the only problems with this book.</span><br data-dcnode-id="2055"><br data-dcnode-id="2054"><span data-dcnode-id="2053" instrument_node="">First, the title is completely misleading. "The Swerve" is a direct reference to the action Lucretius's ancient atoms commit in order to produce the physical world we see. Greenblatt spends part of one chapter discussing different aspects of the poem of which the "swerve" has only a small part.</span><br data-dcnode-id="2052"><br data-dcnode-id="2051"><span data-dcnode-id="2050" instrument_node="">The subtitle, "How the World became Modern", is discussed in exactly the last 9% of the book (by Kindle measurements). The first 91% is semi-centered around Poggio, the Renaissance gentleman that put Lucretius back in circulation.</span><br data-dcnode-id="2049"><br data-dcnode-id="2048"><span data-dcnode-id="2047" instrument_node="">The most prominent problem with this 91%, was the way Greenblatt used historical events as a platform for increasing the appeal of materialism. Christian thought is presented in a one-dimensional, completely misunderstood light. All the sins of the church are exploited. Christian leaders who did not seek to suppress thought are skipped over to spotlight persecuted "pagans". The few Christians displayed sympathetically are the ones who were charged with heresy by the Church and burned. Did some of these things happen? Yes. The Church is still suffering from the affects of some of these events. But they are not the only things that occurred. This seemingly single-minded focus led me to believe that Greenblatt had a secondary agenda, and was not simply seeking to tell a good story about the "discovery" of Lucretius.</span><br data-dcnode-id="2046"><br data-dcnode-id="2045"><span data-dcnode-id="2044" instrument_node="">That said, Greenblatt has enjoyable writing skills. For that, I give the book 2 stars.</span></span><span data-dcnode-id="2042" instrument_node="">

</span><a class="lightGreyText" data-dcnode-id="1848" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.goodreads.com/book/show/10954979-the-swerve" title="Hardcover 9780393064476"><span data-dcnode-id="1849" instrument_node="">review of another edition</span></a><span data-dcnode-id="1847" instrument_node="">

</span><span class="readable" data-dcnode-id="1754" id="reviewTextContainer497496154"><span data-dcnode-id="1843" instrument_node="">
</span><span data-dcnode-id="1832" id="freeTextContainer15807233996635968495"><span data-dcnode-id="1842" instrument_node="">That this mediocre book won a Pulitzer Prize substantially diminishes for me the significance of Pulitzer Prizes. </span><br data-dcnode-id="1841"><br data-dcnode-id="1840"><span data-dcnode-id="1839" instrument_node="">There are two tangentially connected stories here, which Greenblatt tries to weave together. One is a popular, personalized history of the medieval Florentine humanist and bookhunter, Poggio Bracciolini, who is Greenblatt's subject by virtue of being the person rediscovered the book </span><i data-dcnode-id="1837"><span data-dcnode-id="1838" instrument_node="">De rerum natura</span></i><span data-dcnode-id="1836" instrument_node="">, known in English as </span><i data-dcnode-id="1834"><span data-dcnode-id="1835" instrument_node="">On the Nature of Things</span></i><span data-dcnode-id="1833" instrument_node="">, by the Epicurean Roman philosopher-poet </span></span><span data-dcnode-id="1831" instrument_node="">
</span><span data-dcnode-id="1759" id="freeText15807233996635968495" style="display:none"><span data-dcnode-id="1830" instrument_node="">That this mediocre book won a Pulitzer Prize substantially diminishes for me the significance of Pulitzer Prizes. </span><br data-dcnode-id="1829"><br data-dcnode-id="1828"><span data-dcnode-id="1827" instrument_node="">There are two tangentially connected stories here, which Greenblatt tries to weave together. One is a popular, personalized history of the medieval Florentine humanist and bookhunter, Poggio Bracciolini, who is Greenblatt's subject by virtue of being the person rediscovered the book </span><i data-dcnode-id="1825"><span data-dcnode-id="1826" instrument_node="">De rerum natura</span></i><span data-dcnode-id="1824" instrument_node="">, known in English as </span><i data-dcnode-id="1822"><span data-dcnode-id="1823" instrument_node="">On the Nature of Things</span></i><span data-dcnode-id="1821" instrument_node="">, by the Epicurean Roman philosopher-poet Lucretius, in a monastery and brought it into circulation among medieval humanists. This story is carried mainly by chapters two, five, six, seven, and nine; makes interesting reading and is generally well-written, though it suffers slightly from being over-written (see below), particularly in the early chapters. </span><br data-dcnode-id="1820"><br data-dcnode-id="1819"><span data-dcnode-id="1818" instrument_node="">The second "story" is the central conceit of the book that the rediscovery of </span><i data-dcnode-id="1816"><span data-dcnode-id="1817" instrument_node="">De rerum natura</span></i><span data-dcnode-id="1815" instrument_node="">, played a significant role in changing the world from medieval to modern, and closely tied to it Greenblatt's personal atheistic and anti-Christian theology presented in a very condescending way in which the author assumes that his theology is synonymous with "rationality", though to this observer that seems a rather absurd and ill-founded presumption by Greenblatt. This story is carried primarily in chapters three, four, eight, ten, and eleven. To this reader, there is little binding these two narratives together, despite Greenblatt's attempt to interweave them. </span><br data-dcnode-id="1814"><br data-dcnode-id="1813"><span data-dcnode-id="1812" instrument_node="">This is where the book fails. The claim at the heart of this story is not made sufficiently. In fact, I find it lacking credibility, not least because the story itself shows us the foundation of modernist thinking already in place prior to the rediscovery of Lucretius' poem! Greenblatt seems aware of how weak his claim is. In the preface he admits “One poem by itself was certainly not responsible for an entire, intellectual, moral, and social transformation…" but, he nevertheless he claims "this particular ancient book, suddenly returning to view, made a difference.” (p.11) and goes on to describe the effect of teh poem as “momentous”, “explosive”, and describe its discovery in terms of "unleashing” a revolutionary force. But looking around at our modern world, where do we see this? </span><br data-dcnode-id="1811"><br data-dcnode-id="1810"><span data-dcnode-id="1809" instrument_node="">Or looking in this book is the case made? In Chapter Eight Greenblatt provides an itemized summary of points made by Lucretius that he sees as relevant to modernity. Key among these is that Lucretius and the Epicurean's had a theory of atoms, and modern physics has a theory of atoms, but it is debatable how similar the Epicurean's theory of atoms and the modern theory of atoms really are, and the concept of atoms per se, i.e. that there must be some kind of indivisible building blocks of matter, is one logical solution to the potential problem of infinite regress in asking "if things are made of [X], what is X made of?" So the mere use of concept of atoms is not particularly revolutionary or noteworthy, IMO. </span><br data-dcnode-id="1808"><br data-dcnode-id="1807"><span data-dcnode-id="1806" instrument_node="">Many of the other points in this chapter are fundamentally theological or ontological: "Everything comes into being as a result of a swerve", that is, by randomness in the motion of atoms; this randomness is ultimately the source of "free will"; "The universe was not created for or about humans"; "Humans are not unique"; "The soul dies" with the body; "There is no afterlife"; "All organized religions are superstitious delusions"; "The highest goal of human life is the enhancement of pleasure and the reduction of pain". There is not anything close to consensus in modernity about these claims, nor can they be demonstrated to be true. The claim that all religions are superstitious delusions is highly ironic when one recognizes that the Lucretius' beliefs themselves constitute an organized religion, which incidentally also offers an alternate explanation to that offered by Greenblatt about why the medieval church took exception to them. </span><br data-dcnode-id="1805"><br data-dcnode-id="1804"><span data-dcnode-id="1803" instrument_node="">In Chapters nine and ten Greenblatt tries to show the influence of Lucretius on Thomas More, Giordano Bruno, and to the founding political ideals of the United States via Thomas Jefferson. Clearly </span><i data-dcnode-id="1801"><span data-dcnode-id="1802" instrument_node="">On the Nature of Things</span></i><span data-dcnode-id="1800" instrument_node=""> enjoyed a well-educated audience with whose views it resonated to greater or lesser degree, but that hardly makes the case for the claims that this work was a foundation of modernist thinking. </span><br data-dcnode-id="1799"><br data-dcnode-id="1798"><span data-dcnode-id="1797" instrument_node="">I note a number of excerpts from the book that strike me as either presumptious or peculiar: </span><br data-dcnode-id="1796"><br data-dcnode-id="1795"><span data-dcnode-id="1794" instrument_node="">“Ancient Greeks and Romans did not share our [sic] idealization of isolated geniuses, working alone through the knottiest problems. Such scenes… would eventually become our [sic] dominant emblem of the life of the mind…” (p. 68) This one actually made me laugh out loud at its absurdity and wonder that an author who would write this could win a Pulitzer Prize. </span><br data-dcnode-id="1793"><br data-dcnode-id="1792"><span data-dcnode-id="1791" instrument_node="">“Why should anyone with any sense credit the idea of Providence, a childish idea contradicted by any [sic] rational adult’s experience and observation? Christians are like a council of frogs in a pond, croaking at the top of their lungs, ‘For our sakes was the world created.’” (p. 98) The latter sentence seems to me based on a deeply flawed stereotype about Christian beliefs, though perhaps that stereotype had greater validity in medieval times. The first sentence is where, IMO, the real problem lies. Providence is, IMO, one of just a few possible explanations for things that I have experienced and observed in my lifetime, and which I assume many other people experience, and while there could certainly be other explanations for those experiences, I fail to see any basis for concluding that a belief in Providence is irrational. Indeed, it seems to me that there have been a great many generally rational people who have believed in Providence. But then again, the model of "Providence" that Greenblatt offers later in his book bears scant resemblance to what that concept means to me. It feels to me like a straw argument of an atheist who wishes to discount it. Unfortunately or fortunately, depending on which side of the debate one stands on, what would be needed to dispel the idea is beyond the possibility of empirical evidence. Which again makes me wonder how the Pulitzer Prize would be awarded to such obviously flawed logic. </span><br data-dcnode-id="1790"><br data-dcnode-id="1789"><span data-dcnode-id="1788" instrument_node="">Another example of logic flaws are the various teleologies that the author articulates e.g. “What had to be done was…” (p.101), “Centuries were required to accomplish this grand design [sic]…” </span><br data-dcnode-id="1787"><br data-dcnode-id="1786"><span data-dcnode-id="1785" instrument_node="">Greenblatt writes “Though early Christians… found certain features in Epicureanism admirable…" but then writes "Christians particularly found Epicureanism a noxious threat.” (p. 101) These seems almost self-contradictory. How noxious a threat could it have been if some portions of it were admirable? </span><br data-dcnode-id="1784"><br data-dcnode-id="1783"><span data-dcnode-id="1782" instrument_node="">Similarly Greenblatt writes "Lucretius was not in fact an atheist…" but then "It is possible to argue that… Lucretius was some sort of atheist…” (p.183) and then again “the set of convictions articulated… in Lucretius’ poem was virtually a textbook… definition of atheism” (p. 221). ?!?</span><br data-dcnode-id="1781"><br data-dcnode-id="1780"><span data-dcnode-id="1779" instrument_node="">“As every pious reader of Luke’s Gospel knew, Jesus wept, but there were no verses that described him laughing or smiling, let alone pursuing pleasure.” [p.105] There may be no versus that specifically mention Jesus laughing or smiling, but there are a number of scenes mention in the gospels that seem, to this observer, to defy the claim here that Jesus rejects pleasure altogether, including the wedding at Cana, Jesus eating with sinners, Martha annointing him, and especially the observation of some of his contemporaries that he did not affect the mourning/fasting countenance of John the Baptist, and his reply “Can you make the guests mourn while they are with the bridegroom? (Luke 5:34) </span><br data-dcnode-id="1778"><br data-dcnode-id="1777"><span data-dcnode-id="1776" instrument_node="">Throughout the book, and especially in Chapter four, Greenblatt portrays Christians, at least ardent medieval Christians, as superstitious, irrational, and enemies to mankind. In the context of medieval Christianity, some of that is warranted, but I think the effort to extend it to Christianity generally across time is to conflate the thinking of medieval religious institutions with Christian theology generally. </span><br data-dcnode-id="1775"><br data-dcnode-id="1774"><span data-dcnode-id="1773" instrument_node="">Greenblatt also has an elitist, derisive view toward less educated, common people, e.g. peasants, artisans, farmers, etc, which is evident at various points in his writing. </span><br data-dcnode-id="1772"><br data-dcnode-id="1771"><span data-dcnode-id="1770" instrument_node="">The book, especially the early chapters, suffers somewhat from over-writing, by which I mean: (1) some paragraphs are redundant of prior paragraphs, belaboring the point or assuming that the audience is deficient in attention span, as in the manner of a contemporary TV shows that, after each commercial break, give you a synopsis of what they have already covered; (2) the author sometimes wants to tell you what you should think about the things he has described rather than merely describing them and leaving the thinking to the reader, though mercifully that aspect of over-writtenness is minor in this book; (3) the author presents certain information, most notably Poggio's THOUGHTS, and certain presumed "truths" about the universe, which he cannot know, but can only speculate on or assume, aided in the former instance by analysis of Poggio's writings; and especially (4) that the author goes on at length and with various digressions to tell at length what could be said better more succinctly. Greenblatt will offer a half a chapter with unneeded digressions on a half dozen topics to tell you what a lesser writer might have narrated more effectively in a page or two. </span><br data-dcnode-id="1769"><br data-dcnode-id="1768"><span data-dcnode-id="1767" instrument_node="">“The link [to Poggio’s grandfather] is worth noting because…. [the grandfather] signed a notarial register with a strikingly beautiful signature. Penmanship would turn out to play an oddly important role in the grandson’s story.” (p.112) Really, a paragraph on the grandfather is important because the grandfather and his grandson both had beautiful handwriting?!</span><br data-dcnode-id="1766"><br data-dcnode-id="1765"><span data-dcnode-id="1764" instrument_node="">In summary, reading the biographical history of Poggio Bracciolini is interesting, as are some of the digressive narratives insofar as they contribute to that story, but the writing suffers from over-writing, flawed assumptions, and certain biases that I find repugnant. Most of all I don't find Lucretius' poem particularly relevant to the modern world and IMO the author fails to make a compelling, or even credible case that it was.</span><br data-dcnode-id="1763"><br data-dcnode-id="1762"><br data-dcnode-id="1761"><br data-dcnode-id="1760"></span><span data-dcnode-id="1758" instrument_node="">

</span><span data-dcnode-id="1656" id="freeTextContainer1653302636028861429"><span data-dcnode-id="1660" instrument_node="">This book doesn't sound very promising--263 pages on an old Roman poem that supposedly helped the world become modern? Ho followed by hum. And yet. And yet! Stephen Greenblatt pulls it off, mixing the intrigue of personalities, the melodrama of religious fanatics, and the tides of history, seaweeds and all.</span><br data-dcnode-id="1659"><br data-dcnode-id="1658"><span data-dcnode-id="1657" instrument_node="">The chief player in this drama is the Florentine Poggio Bracciolini, a humanist who used his intelligence, translator skills, and wiliness to climb all the way to the top of Rome's heap, secur</span></span><span data-dcnode-id="1655" instrument_node="">
</span><span data-dcnode-id="1629" id="freeText1653302636028861429" style="display:none"><span data-dcnode-id="1654" instrument_node="">This book doesn't sound very promising--263 pages on an old Roman poem that supposedly helped the world become modern? Ho followed by hum. And yet. And yet! Stephen Greenblatt pulls it off, mixing the intrigue of personalities, the melodrama of religious fanatics, and the tides of history, seaweeds and all.</span><br data-dcnode-id="1653"><br data-dcnode-id="1652"><span data-dcnode-id="1651" instrument_node="">The chief player in this drama is the Florentine Poggio Bracciolini, a humanist who used his intelligence, translator skills, and wiliness to climb all the way to the top of Rome's heap, securing the job of numero uno secretary for the pope. Never mind that it was Pope John XXIII, a man who would be disgraced, imprisoned, and defrocked (and whose name would daringly be adopted in the 1950s by a new and much more popular John XXIII).</span><br data-dcnode-id="1650"><br data-dcnode-id="1649"><span data-dcnode-id="1648" instrument_node="">Anyway, Poggio's true passion as a layman/humanist mixed up with all these RCC crazies is ancient texts. He hunts them in monasteries. And his big find? A book called </span><i data-dcnode-id="1646"><span data-dcnode-id="1647" instrument_node="">On the Nature of Things</span></i><span data-dcnode-id="1645" instrument_node=""> by Lucretius, an advocate of Epicureanism. Little did I know how much Epicureanism vexed the Catholic Church. Little did I know also how the RCC tried to smear the philosophy, depicting it as wanton excess in all vices concerned with self-satisfaction.</span><br data-dcnode-id="1644"><br data-dcnode-id="1643"><span data-dcnode-id="1642" instrument_node="">Not quite. Lucretius argues for a more measured enjoyment of life. And why not? It is his belief that there is no afterlife for the soul, that we are all atoms just as every other beast (and mineral) in the world. Not exactly the showcase the Bible gives us with man at the center of God's universe, eh?</span><br data-dcnode-id="1641"><br data-dcnode-id="1640"><span data-dcnode-id="1639" instrument_node="">Poggio manages to love the book while avoiding suspicion himself, but this book and his story touches on many others not as lucky, including Jan Hus, the Bohemian shish kebab who died for his beliefs after being betrayed (surprise!) by an RCC that promised him safe passage. Whoops.</span><br data-dcnode-id="1638"><br data-dcnode-id="1637"><span data-dcnode-id="1636" instrument_node="">And so it goes, mixing in some famous sorts from Florence's heyday. There are also cameos by fans Galileo and Montaigne and Thomas Jefferson. All read and loved </span><i data-dcnode-id="1634"><span data-dcnode-id="1635" instrument_node="">On the Nature of Things</span></i><span data-dcnode-id="1633" instrument_node="">, a book I had never heard of.</span><br data-dcnode-id="1632"><br data-dcnode-id="1631"><span data-dcnode-id="1630" instrument_node="">Until now. Loud and clear.</span></span><span data-dcnode-id="1628" instrument_node="">

</span><span data-dcnode-id="1541" id="freeTextContainer2286907457431448158"><span data-dcnode-id="1542" instrument_node="">Excellent account of Poggio Bracciolini's discovery of the Lucretius MS, but an inflation of Lucretius's "modernity." * I say this as a scholar of Giordano Bruno, who also wrote Lucretius-like long poems on natural philosophy (what we call "science"). And Bruno really did invent one main aspect of the modern; he was even burned at the stake for it. This is the idea that National Aeronautics and Space Agengy, NASA, spends $20 Billion per year to prove. Other habitable worlds. Bruno said, an "Infi</span></span><span data-dcnode-id="1540" instrument_node="">
</span><span data-dcnode-id="1514" id="freeText2286907457431448158" style="display:none"><span data-dcnode-id="1539" instrument_node="">Excellent account of Poggio Bracciolini's discovery of the Lucretius MS, but an inflation of Lucretius's "modernity." * I say this as a scholar of Giordano Bruno, who also wrote Lucretius-like long poems on natural philosophy (what we call "science"). And Bruno really did invent one main aspect of the modern; he was even burned at the stake for it. This is the idea that National Aeronautics and Space Agengy, NASA, spends $20 Billion per year to prove. Other habitable worlds. Bruno said, an "Infinite number" of them in his 400pp Latin poem, 1592: De Innumerabilibus, immenso &amp; infigurabilis; seu de universo et mundis. Bruno took the modern idea that stood Aristotle on his head, Copernicus's idea of the sun as center, not the Earth, and simply applied it to other stars. </span><br data-dcnode-id="1538"><br data-dcnode-id="1537"><span data-dcnode-id="1536" instrument_node=""> Bruno read Copernicus in the mid 1570s, and with his mathematical talent (wrote 5 books on math) he understood Copernicus's spherical geometry--something I have trouble doing, despite excellent HS math with Miss Parkman of Classical HS, Springfield MA (a course in which I beat the guys going to MIT--though not in calculus the next year). And I received a National Merit Scholarship on the basis of my Math and Verbal scores--but Copernicus's spherical geometry is very difficult for me. Not for Giordano Bruno.</span><br data-dcnode-id="1535"><span data-dcnode-id="1534" instrument_node=""> *Compare: Lucretius, "necesse confiteare/ esse alios aliis terrarum in partibus orbis/ et varias hominum gentis et saecla ferrarum" (II.1077-76) [since the seeds are thrown together in every place] one must confess other lands, worlds in other regions,/different kinds of men and centuries of beasts.</span><br data-dcnode-id="1533"><span data-dcnode-id="1532" instrument_node=""> And Bruno,"Eia age conscendas, statuam te in corpore Lunae,/ Aptato sensus, aptem rationis ut alas.."</span><br data-dcnode-id="1531"><span data-dcnode-id="1530" instrument_node="">Quick now, come up with me, I'll stand you on the Moon./Fly on reason, stand on your understanding..(IV.iii.1) "Iam tibi non Tellus sed vere Luna videtur," Already the Moon seems another Earth. (IV.iii.23-4)</span><br data-dcnode-id="1529"><span data-dcnode-id="1528" instrument_node=""> In sum, Bruno ends his intro to Book IV (on Copernicus),</span><br data-dcnode-id="1527"><span data-dcnode-id="1526" instrument_node=""> "The true heavens I uphold with vast strength...</span><br data-dcnode-id="1525"><span data-dcnode-id="1524" instrument_node=""> I uphold the Sun, and by such a star I am upheld,</span><br data-dcnode-id="1523"><span data-dcnode-id="1522" instrument_node=""> And I hold Heaven, as I am by Heaven held in turn:</span><br data-dcnode-id="1521"><span data-dcnode-id="1520" instrument_node=""> Thus I alone support the weight of an Atlas."</span><br data-dcnode-id="1519"><br data-dcnode-id="1518"><span data-dcnode-id="1517" instrument_node="">"Stellam ego substento, a stella substentor et idem,/ Et coelum teneo, a coelo tneorque vicissim:/ Ergo</span><br data-dcnode-id="1516"><span data-dcnode-id="1515" instrument_node="">se nostris submittant pondera Athlantis." (IV.i.41-43)</span></span><span data-dcnode-id="1513" instrument_node="">
