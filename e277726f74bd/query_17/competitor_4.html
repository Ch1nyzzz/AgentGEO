</span><h2 data-dcnode-id="2458"><span class="mw-headline" data-dcnode-id="2466" id="Biography"><span data-dcnode-id="2467" instrument_node="">Biography</span></span><span class="mw-editsection" data-dcnode-id="2459"><span class="mw-editsection-bracket" data-dcnode-id="2464"><span data-dcnode-id="2465" instrument_node="">[</span></span><a data-dcnode-id="2462" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/w/index.php%3Ftitle%3DBarry_Unsworth%26action%3Dedit%26section%3D1" title="Edit section: Biography"><span data-dcnode-id="2463" instrument_node="">edit</span></a><span class="mw-editsection-bracket" data-dcnode-id="2460"><span data-dcnode-id="2461" instrument_node="">]</span></span></span></h2><span data-dcnode-id="2457" instrument_node="">
</span><p data-dcnode-id="2427"><span data-dcnode-id="2456" instrument_node="">Unsworth was born on 10 August 1930</span><sup class="reference" data-dcnode-id="2453" id="cite_ref-1"><a data-dcnode-id="2454" href="#cite_note-1"><span data-dcnode-id="2455" instrument_node="">[1]</span></a></sup><span data-dcnode-id="2452" instrument_node=""> in </span><a data-dcnode-id="2450" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Wingate%2C_County_Durham" title="Wingate, County Durham"><span data-dcnode-id="2451" instrument_node="">Wingate</span></a><span data-dcnode-id="2449" instrument_node="">, a mining village in </span><a data-dcnode-id="2447" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/County_Durham" title="County Durham"><span data-dcnode-id="2448" instrument_node="">County Durham</span></a><span data-dcnode-id="2446" instrument_node="">, England, to a family of miners.</span><sup class="reference" data-dcnode-id="2443" id="cite_ref-flood_2-0"><a data-dcnode-id="2444" href="#cite_note-flood-2"><span data-dcnode-id="2445" instrument_node="">[2]</span></a></sup><sup class="reference" data-dcnode-id="2440" id="cite_ref-crossen_3-0"><a data-dcnode-id="2441" href="#cite_note-crossen-3"><span data-dcnode-id="2442" instrument_node="">[3]</span></a></sup><span data-dcnode-id="2439" instrument_node=""> His father first entered the mines at age 12 and ordinarily Unsworth would have followed him as a </span><a data-dcnode-id="2437" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Miner" title="Miner"><span data-dcnode-id="2438" instrument_node="">miner</span></a><span data-dcnode-id="2436" instrument_node="">. However, when his father was 19, he travelled to the United States for a few years and on returning to Britain entered the insurance business and thus began moving his family up the economic ladder and out of the mines.</span><sup class="reference" data-dcnode-id="2433" id="cite_ref-crossen_3-1"><a data-dcnode-id="2434" href="#cite_note-crossen-3"><span data-dcnode-id="2435" instrument_node="">[3]</span></a></sup><span data-dcnode-id="2432" instrument_node=""> "He rescued my brother and me from that long chain of continuity that happens in mining villages," Unsworth said.</span><sup class="reference" data-dcnode-id="2429" id="cite_ref-crossen_3-2"><a data-dcnode-id="2430" href="#cite_note-crossen-3"><span data-dcnode-id="2431" instrument_node="">[3]</span></a></sup><span data-dcnode-id="2428" instrument_node="">
</span></p><p data-dcnode-id="2389"><span data-dcnode-id="2426" instrument_node="">He graduated from the </span><a data-dcnode-id="2424" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/University_of_Manchester" title="University of Manchester"><span data-dcnode-id="2425" instrument_node="">University of Manchester</span></a><span data-dcnode-id="2423" instrument_node=""> in 1951, and lived in France for a year teaching English. He also travelled extensively in </span><a data-dcnode-id="2421" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Greece" title="Greece"><span data-dcnode-id="2422" instrument_node="">Greece</span></a><span data-dcnode-id="2420" instrument_node=""> and </span><a data-dcnode-id="2418" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Turkey" title="Turkey"><span data-dcnode-id="2419" instrument_node="">Turkey</span></a><span data-dcnode-id="2417" instrument_node=""> during the 1960s, lecturing at the </span><a class="mw-redirect" data-dcnode-id="2415" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/University_of_Athens" title="University of Athens"><span data-dcnode-id="2416" instrument_node="">University of Athens</span></a><span data-dcnode-id="2414" instrument_node=""> and the </span><a class="mw-redirect" data-dcnode-id="2412" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/University_of_Istanbul" title="University of Istanbul"><span data-dcnode-id="2413" instrument_node="">University of Istanbul</span></a><span data-dcnode-id="2411" instrument_node="">.</span><sup class="reference" data-dcnode-id="2408" id="cite_ref-flood_2-1"><a data-dcnode-id="2409" href="#cite_note-flood-2"><span data-dcnode-id="2410" instrument_node="">[2]</span></a></sup><span data-dcnode-id="2407" instrument_node=""> His novels about </span><a class="mw-redirect" data-dcnode-id="2405" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Fin-de-siecle" title="Fin-de-siecle"><span data-dcnode-id="2406" instrument_node="">fin-de-siecle</span></a><span data-dcnode-id="2404" instrument_node=""> </span><a data-dcnode-id="2402" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Ottoman_Empire" title="Ottoman Empire"><span data-dcnode-id="2403" instrument_node="">Ottoman Empire</span></a><span data-dcnode-id="2401" instrument_node="">, </span><i data-dcnode-id="2399"><span data-dcnode-id="2400" instrument_node="">The Rage of the Vulture</span></i><span data-dcnode-id="2398" instrument_node=""> and </span><i data-dcnode-id="2395"><a data-dcnode-id="2396" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Pascali%2527s_Island_%28novel%29" title="Pascali's Island (novel)"><span data-dcnode-id="2397" instrument_node="">Pascali's Island</span></a></i><span data-dcnode-id="2394" instrument_node="">, were inspired by these experiences. He published his first novel in 1966, his second novel, </span><i data-dcnode-id="2391"><a data-dcnode-id="2392" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/The_Greeks_Have_a_Word_For_It" title="The Greeks Have a Word For It"><span data-dcnode-id="2393" instrument_node="">The Greeks Have a Word For It</span></a></i><span data-dcnode-id="2390" instrument_node="">, was an outgrowth of his teaching experience in Athens.
</span></p><p data-dcnode-id="2375"><span data-dcnode-id="2388" instrument_node="">In 1999 he was a visiting professor at the </span><a data-dcnode-id="2386" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/University_of_Iowa" title="University of Iowa"><span data-dcnode-id="2387" instrument_node="">University of Iowa</span></a><span data-dcnode-id="2385" instrument_node="">'s </span><a data-dcnode-id="2383" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Iowa_Writers%2527_Workshop" title="Iowa Writers' Workshop"><span data-dcnode-id="2384" instrument_node="">Iowa Writers' Workshop</span></a><span data-dcnode-id="2382" instrument_node="">. In 2004 he taught literature and creative writing classes at </span><a data-dcnode-id="2380" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Kenyon_College" title="Kenyon College"><span data-dcnode-id="2381" instrument_node="">Kenyon College</span></a><span data-dcnode-id="2379" instrument_node=""> in </span><a data-dcnode-id="2377" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Ohio" title="Ohio"><span data-dcnode-id="2378" instrument_node="">Ohio</span></a><span data-dcnode-id="2376" instrument_node="">.
</span></p><p data-dcnode-id="2364"><span data-dcnode-id="2374" instrument_node="">In the last years of his life, he lived in </span><a data-dcnode-id="2372" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Perugia" title="Perugia"><span data-dcnode-id="2373" instrument_node="">Perugia</span></a><span data-dcnode-id="2371" instrument_node="">, a city in the </span><a data-dcnode-id="2369" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Umbria" title="Umbria"><span data-dcnode-id="2370" instrument_node="">Umbria</span></a><span data-dcnode-id="2368" instrument_node=""> region of Italy, with his second wife, a Finnish national. His novel </span><i data-dcnode-id="2366"><span data-dcnode-id="2367" instrument_node="">After Hannibal</span></i><span data-dcnode-id="2365" instrument_node=""> is a fictionalised description of his efforts at settlement in the Italian countryside.
</span></p><p data-dcnode-id="2339"><span data-dcnode-id="2363" instrument_node="">Unsworth died in Perugia, Italy in 2012, of lung cancer.</span><sup class="reference" data-dcnode-id="2360" id="cite_ref-flood_2-2"><a data-dcnode-id="2361" href="#cite_note-flood-2"><span data-dcnode-id="2362" instrument_node="">[2]</span></a></sup><sup class="reference" data-dcnode-id="2357" id="cite_ref-crossen_3-3"><a data-dcnode-id="2358" href="#cite_note-crossen-3"><span data-dcnode-id="2359" instrument_node="">[3]</span></a></sup><sup class="reference" data-dcnode-id="2354" id="cite_ref-4"><a data-dcnode-id="2355" href="#cite_note-4"><span data-dcnode-id="2356" instrument_node="">[4]</span></a></sup><span data-dcnode-id="2353" instrument_node=""> He was 81. Unsworth died the same day as </span><a data-dcnode-id="2351" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Ray_Bradbury" title="Ray Bradbury"><span data-dcnode-id="2352" instrument_node="">Ray Bradbury</span></a><span data-dcnode-id="2350" instrument_node="">; as </span><a data-dcnode-id="2348" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Cynthia_Crossen" title="Cynthia Crossen"><span data-dcnode-id="2349" instrument_node="">Cynthia Crossen</span></a><span data-dcnode-id="2347" instrument_node=""> said in the </span><i data-dcnode-id="2345"><span data-dcnode-id="2346" instrument_node="">Wall Street Journal</span></i><span data-dcnode-id="2344" instrument_node="">, "Mr. Bradbury invented the future; Mr. Unsworth invented the past."</span><sup class="reference" data-dcnode-id="2341" id="cite_ref-crossen_3-4"><a data-dcnode-id="2342" href="#cite_note-crossen-3"><span data-dcnode-id="2343" instrument_node="">[3]</span></a></sup><span data-dcnode-id="2340" instrument_node="">
</span></p><span data-dcnode-id="2338" instrument_node="">
</span><h2 data-dcnode-id="2328"><span class="mw-headline" data-dcnode-id="2336" id="Work"><span data-dcnode-id="2337" instrument_node="">Work</span></span><span class="mw-editsection" data-dcnode-id="2329"><span class="mw-editsection-bracket" data-dcnode-id="2334"><span data-dcnode-id="2335" instrument_node="">[</span></span><a data-dcnode-id="2332" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/w/index.php%3Ftitle%3DBarry_Unsworth%26action%3Dedit%26section%3D2" title="Edit section: Work"><span data-dcnode-id="2333" instrument_node="">edit</span></a><span class="mw-editsection-bracket" data-dcnode-id="2330"><span data-dcnode-id="2331" instrument_node="">]</span></span></span></h2><span data-dcnode-id="2327" instrument_node="">
</span><p data-dcnode-id="2291"><span data-dcnode-id="2326" instrument_node="">Unsworth's first novel, </span><i data-dcnode-id="2323"><a class="mw-redirect" data-dcnode-id="2324" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/The_Partnership_%28novel%29" title="The Partnership (novel)"><span data-dcnode-id="2325" instrument_node="">The Partnership</span></a></i><span data-dcnode-id="2322" instrument_node="">, was published in 1966 when he was 36. "...in my earlier novels, especially the two written in the early '70s, </span><i data-dcnode-id="2320"><span data-dcnode-id="2321" instrument_node="">The Hide</span></i><span data-dcnode-id="2319" instrument_node=""> and </span><i data-dcnode-id="2317"><span data-dcnode-id="2318" instrument_node="">Mooncranker's Gift</span></i><span data-dcnode-id="2316" instrument_node="">, there was a baroque quality in the style, a density. The mood was grim, but the language was more figurative and more high-spirited. There was more delight in it, more self-indulgence, too. Among my earliest influences as a writer were the American novelists of the deep south, especially Eudora Welty, and some of that elated, grotesque comedy stayed with me." </span><i data-dcnode-id="2313"><a class="new" data-dcnode-id="2314" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/w/index.php%3Ftitle%3DMooncranker%2527s_Gift%26action%3Dedit%26redlink%3D1" title="Mooncranker's Gift (page does not exist)"><span data-dcnode-id="2315" instrument_node="">Mooncranker's Gift</span></a></i><span data-dcnode-id="2312" instrument_node=""> (1973) won the </span><a data-dcnode-id="2310" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Heinemann_Award" title="Heinemann Award"><span data-dcnode-id="2311" instrument_node="">Heinemann Award</span></a><span data-dcnode-id="2309" instrument_node="">. Other novels included </span><i data-dcnode-id="2306"><a class="new" data-dcnode-id="2307" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/w/index.php%3Ftitle%3DStone_Virgin%26action%3Dedit%26redlink%3D1" title="Stone Virgin (page does not exist)"><span data-dcnode-id="2308" instrument_node="">Stone Virgin</span></a></i><span data-dcnode-id="2305" instrument_node=""> (1985) and </span><i data-dcnode-id="2302"><a data-dcnode-id="2303" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Losing_Nelson" title="Losing Nelson"><span data-dcnode-id="2304" instrument_node="">Losing Nelson</span></a></i><span data-dcnode-id="2301" instrument_node=""> (1999). In addition to </span><a data-dcnode-id="2299" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Eudora_Welty" title="Eudora Welty"><span data-dcnode-id="2300" instrument_node="">Eudora Welty</span></a><span data-dcnode-id="2298" instrument_node="">, he counted </span><a data-dcnode-id="2296" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/William_Faulkner" title="William Faulkner"><span data-dcnode-id="2297" instrument_node="">William Faulkner</span></a><span data-dcnode-id="2295" instrument_node=""> and </span><a data-dcnode-id="2293" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Carson_McCullers" title="Carson McCullers"><span data-dcnode-id="2294" instrument_node="">Carson McCullers</span></a><span data-dcnode-id="2292" instrument_node=""> as his major influences.
</span></p><p data-dcnode-id="2261"><span data-dcnode-id="2290" instrument_node="">Unsworth did not start to write historical fiction until his sixth novel, </span><i data-dcnode-id="2287"><a data-dcnode-id="2288" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Pascali%2527s_Island_%28novel%29" title="Pascali's Island (novel)"><span data-dcnode-id="2289" instrument_node="">Pascali's Island</span></a></i><span data-dcnode-id="2286" instrument_node=""> (1980), the first of his novels to be shortlisted for the </span><a data-dcnode-id="2284" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Booker_Prize" title="Booker Prize"><span data-dcnode-id="2285" instrument_node="">Booker Prize</span></a><span data-dcnode-id="2283" instrument_node="">. </span><i data-dcnode-id="2281"><span data-dcnode-id="2282" instrument_node="">Pascali's Island</span></i><span data-dcnode-id="2280" instrument_node=""> is set on an unnamed Aegean island during the last years of the </span><a data-dcnode-id="2278" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Ottoman_Empire" title="Ottoman Empire"><span data-dcnode-id="2279" instrument_node="">Ottoman Empire</span></a><span data-dcnode-id="2277" instrument_node="">. Reflecting on this shift, Unsworth explained: "Nowadays I go to Britain relatively rarely and for short periods; in effect, I have become an expatriate. The result has been a certain loss of interest in British life and society and a very definite loss of confidence in my ability to register the contemporary scene there – the kind of things people say, the styles of dress, the politics etc.– with sufficient subtlety and accuracy. So I have turned to the past. The great advantage of this, for a writer of my temperament at least, is that one is freed from a great deal of surface clutter. One is enabled to take a remote period and use it as a distant mirror (to borrow Barbara Tuchman’s phrase), and so try to say things about our human condition – then and now – which transcend the particular period and become timeless." A </span><a data-dcnode-id="2275" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Pascali%2527s_Island_%28film%29" title="Pascali's Island (film)"><span data-dcnode-id="2276" instrument_node="">film version</span></a><span data-dcnode-id="2274" instrument_node=""> directed by </span><a data-dcnode-id="2272" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/James_Dearden" title="James Dearden"><span data-dcnode-id="2273" instrument_node="">James Dearden</span></a><span data-dcnode-id="2271" instrument_node="">, starring </span><a data-dcnode-id="2269" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Charles_Dance" title="Charles Dance"><span data-dcnode-id="2270" instrument_node="">Charles Dance</span></a><span data-dcnode-id="2268" instrument_node="">, </span><a data-dcnode-id="2266" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Helen_Mirren" title="Helen Mirren"><span data-dcnode-id="2267" instrument_node="">Helen Mirren</span></a><span data-dcnode-id="2265" instrument_node=""> and </span><a data-dcnode-id="2263" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Ben_Kingsley" title="Ben Kingsley"><span data-dcnode-id="2264" instrument_node="">Ben Kingsley</span></a><span data-dcnode-id="2262" instrument_node="">, as the title character, was released in 1988.
</span></p><p data-dcnode-id="2242"><i data-dcnode-id="2258"><a data-dcnode-id="2259" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Morality_Play_%28novel%29" title="Morality Play (novel)"><span data-dcnode-id="2260" instrument_node="">Morality Play</span></a></i><span data-dcnode-id="2257" instrument_node="">, shortlisted for the Booker Prize in 1995, is a murder mystery set in 14th century England about a travelling troupe of players that put on Bible plays.</span><sup class="reference" data-dcnode-id="2254" id="cite_ref-crossen_3-5"><a data-dcnode-id="2255" href="#cite_note-crossen-3"><span data-dcnode-id="2256" instrument_node="">[3]</span></a></sup><span data-dcnode-id="2253" instrument_node=""> It was adapted as a film, </span><i data-dcnode-id="2250"><a data-dcnode-id="2251" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/The_Reckoning_%282003_film%29" title="The Reckoning (2003 film)"><span data-dcnode-id="2252" instrument_node="">The Reckoning</span></a></i><span data-dcnode-id="2249" instrument_node=""> (2003), starring </span><a data-dcnode-id="2247" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Paul_Bettany" title="Paul Bettany"><span data-dcnode-id="2248" instrument_node="">Paul Bettany</span></a><span data-dcnode-id="2246" instrument_node=""> and </span><a data-dcnode-id="2244" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Willem_Dafoe" title="Willem Dafoe"><span data-dcnode-id="2245" instrument_node="">Willem Dafoe</span></a><span data-dcnode-id="2243" instrument_node="">.
</span></p><p data-dcnode-id="2194"><i data-dcnode-id="2239"><a data-dcnode-id="2240" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Sacred_Hunger" title="Sacred Hunger"><span data-dcnode-id="2241" instrument_node="">Sacred Hunger</span></a></i><span data-dcnode-id="2238" instrument_node=""> (1992) centres on the Atlantic slave trade that moves from </span><a data-dcnode-id="2236" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Liverpool" title="Liverpool"><span data-dcnode-id="2237" instrument_node="">Liverpool</span></a><span data-dcnode-id="2235" instrument_node=""> to West Africa, Florida and the West Indies. It was joint winner of the Booker Prize for Fiction in 1992, along with </span><a data-dcnode-id="2233" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Michael_Ondaatje" title="Michael Ondaatje"><span data-dcnode-id="2234" instrument_node="">Michael Ondaatje</span></a><span data-dcnode-id="2232" instrument_node="">'s </span><i data-dcnode-id="2229"><a data-dcnode-id="2230" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/The_English_Patient" title="The English Patient"><span data-dcnode-id="2231" instrument_node="">The English Patient</span></a></i><span data-dcnode-id="2228" instrument_node="">. It is generally considered his masterpiece.</span><sup class="reference" data-dcnode-id="2225" id="cite_ref-crossen_3-6"><a data-dcnode-id="2226" href="#cite_note-crossen-3"><span data-dcnode-id="2227" instrument_node="">[3]</span></a></sup><span data-dcnode-id="2224" instrument_node=""> The story is set in the mid-18th century and centres around the </span><i data-dcnode-id="2222"><span data-dcnode-id="2223" instrument_node="">Liverpool Merchant</span></i><span data-dcnode-id="2221" instrument_node="">, a slave ship employed in the </span><a data-dcnode-id="2219" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Triangular_trade" title="Triangular trade"><span data-dcnode-id="2220" instrument_node="">triangular trade</span></a><span data-dcnode-id="2218" instrument_node="">, a central trade route in the </span><a data-dcnode-id="2216" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Atlantic_slave_trade" title="Atlantic slave trade"><span data-dcnode-id="2217" instrument_node="">Atlantic slave trade</span></a><span data-dcnode-id="2215" instrument_node="">. The two main characters are cousins Erasmus Kemp, son of a wealthy merchant from </span><a data-dcnode-id="2213" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Lancashire" title="Lancashire"><span data-dcnode-id="2214" instrument_node="">Lancashire</span></a><span data-dcnode-id="2212" instrument_node="">, and Matthew Paris, a physician and scientist who goes on the voyage. The novel's central theme is </span><a data-dcnode-id="2210" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Greed" title="Greed"><span data-dcnode-id="2211" instrument_node="">greed</span></a><span data-dcnode-id="2209" instrument_node="">, with the subject of </span><a data-dcnode-id="2207" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Slavery" title="Slavery"><span data-dcnode-id="2208" instrument_node="">slavery</span></a><span data-dcnode-id="2206" instrument_node=""> being a primary medium for exploring how selfish desire for profit can result in evil and barbarism.</span><sup class="reference" data-dcnode-id="2203" id="cite_ref-crossen_3-7"><a data-dcnode-id="2204" href="#cite_note-crossen-3"><span data-dcnode-id="2205" instrument_node="">[3]</span></a></sup><span data-dcnode-id="2202" instrument_node=""> The "sacred hunger" of the title refers to the </span><a data-dcnode-id="2200" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Profit_motive" title="Profit motive"><span data-dcnode-id="2201" instrument_node="">profit motive</span></a><span data-dcnode-id="2199" instrument_node="">. The story line has a very extensive cast of characters, some featuring in only one scene, others continually developed throughout the story, but most described in intricate detail. The narrative interweaves elements of appalling cruelty and horror with extended comedic interludes, and employs frequent period expressions. A sequel, </span><i data-dcnode-id="2196"><a data-dcnode-id="2197" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/The_Quality_of_Mercy_%28Unsworth_novel%29" title="The Quality of Mercy (Unsworth novel)"><span data-dcnode-id="2198" instrument_node="">The Quality of Mercy</span></a></i><span data-dcnode-id="2195" instrument_node="">, was published in 2011, it was his last book.
</span></p><p data-dcnode-id="2180"><i data-dcnode-id="2191"><a class="new" data-dcnode-id="2192" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/w/index.php%3Ftitle%3DSugar_and_Rum%26action%3Dedit%26redlink%3D1" title="Sugar and Rum (page does not exist)"><span data-dcnode-id="2193" instrument_node="">Sugar and Rum</span></a></i><span data-dcnode-id="2190" instrument_node=""> (1988) was a novel set in contemporary </span><a data-dcnode-id="2188" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Liverpool" title="Liverpool"><span data-dcnode-id="2189" instrument_node="">Liverpool</span></a><span data-dcnode-id="2187" instrument_node=""> about a writer who is trying to write a novel about the Liverpool slave trade, and who is suffering from </span><a data-dcnode-id="2185" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Writer%2527s_block" title="Writer's block"><span data-dcnode-id="2186" instrument_node="">writer's block</span></a><span data-dcnode-id="2184" instrument_node="">; Unsworth wrote this novel to try to get over his own block during the writing of </span><i data-dcnode-id="2182"><span data-dcnode-id="2183" instrument_node="">Sacred Hunger</span></i><span data-dcnode-id="2181" instrument_node="">.
</span></p><span data-dcnode-id="2179" instrument_node="">
</span><h2 data-dcnode-id="2169"><span class="mw-headline" data-dcnode-id="2177" id="Style"><span data-dcnode-id="2178" instrument_node="">Style</span></span><span class="mw-editsection" data-dcnode-id="2170"><span class="mw-editsection-bracket" data-dcnode-id="2175"><span data-dcnode-id="2176" instrument_node="">[</span></span><a data-dcnode-id="2173" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/w/index.php%3Ftitle%3DBarry_Unsworth%26action%3Dedit%26section%3D3" title="Edit section: Style"><span data-dcnode-id="2174" instrument_node="">edit</span></a><span class="mw-editsection-bracket" data-dcnode-id="2171"><span data-dcnode-id="2172" instrument_node="">]</span></span></span></h2><span data-dcnode-id="2168" instrument_node="">
</span><p data-dcnode-id="2162"><span data-dcnode-id="2167" instrument_node="">Unsworth's style is not heaped in historical minutiae, "I don't really care how many buttons someone had on his waistcoat. It would be good to get it right, but what really matters is trying to get hold of the spirit of the age, what it was like to be alive in that age, what it felt like to be…an ordinary person in the margins of history."</span><sup class="reference" data-dcnode-id="2164" id="cite_ref-crossen_3-8"><a data-dcnode-id="2165" href="#cite_note-crossen-3"><span data-dcnode-id="2166" instrument_node="">[3]</span></a></sup><span data-dcnode-id="2163" instrument_node="">
</span></p><p data-dcnode-id="2156"><span data-dcnode-id="2161" instrument_node="">On writing and growing old, Unsworth said, "With time I have grown more sparing with the words. I think less of fire-works and flourishes. I try to get warmth and colour through precision of language. This is more difficult, I think, which may be why I find writing novels so challenging and exacting."</span><sup class="reference" data-dcnode-id="2158" id="cite_ref-5"><a data-dcnode-id="2159" href="#cite_note-5"><span data-dcnode-id="2160" instrument_node="">[5]</span></a></sup><span data-dcnode-id="2157" instrument_node="">
</span></p><p data-dcnode-id="2137"><span data-dcnode-id="2155" instrument_node="">Some critics have attacked historical fiction as being un-literary, for example </span><a data-dcnode-id="2153" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/James_Wood_%28critic%29" title="James Wood (critic)"><span data-dcnode-id="2154" instrument_node="">James Wood</span></a><span data-dcnode-id="2152" instrument_node=""> writing in </span><i data-dcnode-id="2150"><span data-dcnode-id="2151" instrument_node="">The New Yorker</span></i><span data-dcnode-id="2149" instrument_node=""> called it a "somewhat gimcrack genre not exactly jammed with greatness."</span><sup class="reference" data-dcnode-id="2146" id="cite_ref-crossen_3-9"><a data-dcnode-id="2147" href="#cite_note-crossen-3"><span data-dcnode-id="2148" instrument_node="">[3]</span></a></sup><span data-dcnode-id="2145" instrument_node=""> However Unsworth defended the form, saying "The term historical fiction is a blunt instrument in literary criticism. When people ask, 'Is it a good historical novel?' they may as well ask, 'Is it a good Protestant novel?' or 'Is it a good transvestite novel?' I write stories that are set in the past. Fiction set in the past should be judged by the same criteria as any other fiction. Does the novel convey a sense of life, touch the reader's mind and heart? Does it belong to what </span><a class="mw-redirect" data-dcnode-id="2143" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/D.H._Lawrence" title="D.H. Lawrence"><span data-dcnode-id="2144" instrument_node="">D.H. Lawrence</span></a><span data-dcnode-id="2142" instrument_node=""> called the one bright book of life?"</span><sup class="reference" data-dcnode-id="2139" id="cite_ref-crossen_3-10"><a data-dcnode-id="2140" href="#cite_note-crossen-3"><span data-dcnode-id="2141" instrument_node="">[3]</span></a></sup><span data-dcnode-id="2138" instrument_node="">
</span></p><span data-dcnode-id="2136" instrument_node="">
</span><h2 data-dcnode-id="2126"><span class="mw-headline" data-dcnode-id="2134" id="Awards_and_honours"><span data-dcnode-id="2135" instrument_node="">Awards and honours</span></span><span class="mw-editsection" data-dcnode-id="2127"><span class="mw-editsection-bracket" data-dcnode-id="2132"><span data-dcnode-id="2133" instrument_node="">[</span></span><a data-dcnode-id="2130" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/w/index.php%3Ftitle%3DBarry_Unsworth%26action%3Dedit%26section%3D4" title="Edit section: Awards and honours"><span data-dcnode-id="2131" instrument_node="">edit</span></a><span class="mw-editsection-bracket" data-dcnode-id="2128"><span data-dcnode-id="2129" instrument_node="">]</span></span></span></h2><span data-dcnode-id="2125" instrument_node="">

</span><h2 data-dcnode-id="2042"><span class="mw-headline" data-dcnode-id="2050" id="List_of_works"><span data-dcnode-id="2051" instrument_node="">List of works</span></span><span class="mw-editsection" data-dcnode-id="2043"><span class="mw-editsection-bracket" data-dcnode-id="2048"><span data-dcnode-id="2049" instrument_node="">[</span></span><a data-dcnode-id="2046" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/w/index.php%3Ftitle%3DBarry_Unsworth%26action%3Dedit%26section%3D5" title="Edit section: List of works"><span data-dcnode-id="2047" instrument_node="">edit</span></a><span class="mw-editsection-bracket" data-dcnode-id="2044"><span data-dcnode-id="2045" instrument_node="">]</span></span></span></h2><span data-dcnode-id="2041" instrument_node="">
