</span><div class="reviewText stacked" data-dcnode-id="3105"><span data-dcnode-id="3271" instrument_node="">
</span><span class="readable" data-dcnode-id="3107" id="reviewTextContainer1881893249"><span data-dcnode-id="3270" instrument_node="">
</span><span data-dcnode-id="3265" id="freeTextContainer670411224009608182"><span data-dcnode-id="3269" instrument_node="">“The Russian Revolution launched a vast experiment in social engineering – perhaps the grandest in the history of mankind. It was arguably an experiment which the human race was bound to make at some point in its evolution, the logical conclusion of humanity’s historic striving for social justice and comradeship.”</span><br data-dcnode-id="3268"><br data-dcnode-id="3267"><span data-dcnode-id="3266" instrument_node="">Figes writes about the Russian Revolution as more of a coup in both February and October (the second time only Bolsheviks participated and it was even more haphazard) by ‘culturally iso</span></span><span data-dcnode-id="3264" instrument_node="">
</span><span data-dcnode-id="3112" id="freeText670411224009608182" style="display:none"><span data-dcnode-id="3263" instrument_node="">“The Russian Revolution launched a vast experiment in social engineering – perhaps the grandest in the history of mankind. It was arguably an experiment which the human race was bound to make at some point in its evolution, the logical conclusion of humanity’s historic striving for social justice and comradeship.”</span><br data-dcnode-id="3262"><br data-dcnode-id="3261"><span data-dcnode-id="3260" instrument_node="">Figes writes about the Russian Revolution as more of a coup in both February and October (the second time only Bolsheviks participated and it was even more haphazard) by ‘culturally isolated’ intelligentsia that really shouldn’t have worked out. It was ultimately “successful” due to the incompetent, backward-thinking tsarist regime and Whites. Reform was completely rejected yet essential to the future of the Romanovs. In the beginning the Bolsheviks had scant support but they did have discipline, ruthlessness and a cause. Plus, the peasants thought they could keep the land they took from the gentry under the Bolsheviks but would have to return it under the Whites. Not a successful strategy in a hugely peasant country. The Whites were all about revenge and turning back time. They also wanted to restore the empire and tamp down on nationalist and local language movements. The Bolsheviks paid lip service to these concerns and it ultimately worked for them. A middle class barely existed. Additionally, Figes points out that in newly industrialized Russia, the “workers” were really just peasants trying to make some money after harvest. And “soldiers” were mostly peasants conscripted against their will. So, to rule Russia after Nicholas abdicated, ya needed to improve, or at the least convincingly promise to improve, the lot of the peasants. In the end, we know how it worked out for the peasants. Lenin needed them so he told them what they wanted to hear. They were not at all political. More like locally communal anarchists trying to escape the state in any form. If you have time for only one book on the Russian Revolution, this is it.</span><br data-dcnode-id="3259"><br data-dcnode-id="3258"><span data-dcnode-id="3257" instrument_node="">Tsarist regime</span><br data-dcnode-id="3256"><span data-dcnode-id="3255" instrument_node="">“The tsarist regime’s downfall was not inevitable; but its own stupidity made it so.” “… the obstinate refusal of the tsarist regime to concede reforms turned what should have been a political problem into a revolutionary crisis….” </span><br data-dcnode-id="3254"><br data-dcnode-id="3253"><span data-dcnode-id="3252" instrument_node="">Alexander’s counter-reforms, his and Nicolas’s reactionary philosophy “To a large extent… the workers’ revolutionary movement was created by the tsarist regime.”</span><br data-dcnode-id="3251"><br data-dcnode-id="3250"><span data-dcnode-id="3249" instrument_node="">Alexander II did not prep Nicolas to rule, which reminded me of Peter and Catherine with their unfortunate heirs. Alexandra was not the ideal spouse. She pushed him to be even more recalcitrant. Combined with Rasputin, Nicolas had the worst nepotistic advisors until today’s White House. Nicolas had a astrong sense of duty. He was not passive. He just sucked at his job. Had a narrow perspective, focused on details. The provinces were under-governed. </span><br data-dcnode-id="3248"><br data-dcnode-id="3247"><span data-dcnode-id="3246" instrument_node="">“Romanovs became victim of their own propaganda”</span><br data-dcnode-id="3245"><br data-dcnode-id="3244"><span data-dcnode-id="3243" instrument_node="">“Romanov regime fell under the weight of its own internal contradictions.” In some ways, a revolution started at the top like the one under Gorbachev.</span><br data-dcnode-id="3242"><br data-dcnode-id="3241"><span data-dcnode-id="3240" instrument_node="">Tsarist state turned many into revolutionaries after overreacting to any call for greater freedoms.</span><br data-dcnode-id="3239"><br data-dcnode-id="3238"><span data-dcnode-id="3237" instrument_node=""> “In a way, he probably found it easier to abdicate than to turn himself into a constitutional king. That was Nicholas’s tragedy.”</span><br data-dcnode-id="3236"><br data-dcnode-id="3235"><span data-dcnode-id="3234" instrument_node="">Peasants</span><br data-dcnode-id="3233"><span data-dcnode-id="3232" instrument_node="">The peasants did not feel part of a nation. They did not abide by government rules unless forced.</span><br data-dcnode-id="3231"><br data-dcnode-id="3230"><span data-dcnode-id="3229" instrument_node="">“all started by the peasant revolution on the land” before 1917.</span><br data-dcnode-id="3228"><br data-dcnode-id="3227"><span data-dcnode-id="3226" instrument_node="">Emancipation of serfs, landed nobles not getting up to speed, freed serfs getting screwed.</span><br data-dcnode-id="3225"><br data-dcnode-id="3224"><span data-dcnode-id="3223" instrument_node="">“The emphatic rejection of the Whites by the peasantry and the non-Russians determined the outcome of the civil war.”</span><br data-dcnode-id="3222"><br data-dcnode-id="3221"><span data-dcnode-id="3220" instrument_node="">Military</span><br data-dcnode-id="3219"><span data-dcnode-id="3218" instrument_node="">Disastrous war with Japan in the midst of a domestic social revolution. Replay during WWI and the army got really fed up (no food, no uniforms, poor training and lousy leadership). As they began to realize they were cannon fodder, they were revolutionized. If the Tsar had signed a separate peace with Germany, who knows? The soldiers may have showed him a some form of allegiance. Once many in the army became revolutionized, the Tsar was for all intents and purposes, finished. </span><br data-dcnode-id="3217"><br data-dcnode-id="3216"><span data-dcnode-id="3215" instrument_node="">Famine 1890s</span><br data-dcnode-id="3214"><span data-dcnode-id="3213" instrument_node="">The famine further radicalized people. “(T)he conflict between the people and the regime had been set in motion.”</span><br data-dcnode-id="3212"><br data-dcnode-id="3211"><span data-dcnode-id="3210" instrument_node="">Urbanization</span><br data-dcnode-id="3209"><span data-dcnode-id="3208" instrument_node="">Was distabalizing in its rapidity in a “backward”, unprepared country. Poorly educated workers could not “progress beyond the simplest abstract ideas.” Theirs was a black-white world. OTOH, the literacy rate was growing rapidly which allowed people access to written propaganda.</span><br data-dcnode-id="3207"><br data-dcnode-id="3206"><span data-dcnode-id="3205" instrument_node="">The Bolsheviks</span><br data-dcnode-id="3204"><span data-dcnode-id="3203" instrument_node="">Mostly comprized of the urban intelligentsia who latched on to European ideas and dogmatized them, snuffing out debate. They had a “passion for big ideas” which gave us Tolstoy and Dostoevsky, and also Lenin and Trotsky. </span><br data-dcnode-id="3202"><br data-dcnode-id="3201"><span data-dcnode-id="3200" instrument_node="">“Guilt was the psychological inspiration of the revolution.” They witnessed huge, horrifying gaps in standards of living. They simultainiously mythologized the peasants and were disgusted by them. </span><br data-dcnode-id="3199"><br data-dcnode-id="3198"><span data-dcnode-id="3197" instrument_node="">Marxism (which was never really practiced in Russia) was treated as a “science” thus further enrapturing the areligious intelligentsia.</span><br data-dcnode-id="3196"><br data-dcnode-id="3195"><span data-dcnode-id="3194" instrument_node="">The inhumane viciousness of the Tsarist police led directly to the same in the Bolsheviks. The tortured, terrified and oppressed became the torturers, terrorists and oppressors. How novel is that? Waterboarding anyone?</span><br data-dcnode-id="3193"><br data-dcnode-id="3192"><span data-dcnode-id="3191" instrument_node="">“… it is surely true that the Bolsheviks were psychologically prepared for a civil war in a way that could not be said of its opponents. One might compare it to the Spanish Civil War: Franco’s side was ready – and eager – for a civil war; the same could hardly be said of the Republicans.”</span><br data-dcnode-id="3190"><br data-dcnode-id="3189"><span data-dcnode-id="3188" instrument_node="">“There were times when the Bolsheviks acted more like a local mafia than the ruling party of the largest country in the world.”</span><br data-dcnode-id="3187"><br data-dcnode-id="3186"><span data-dcnode-id="3185" instrument_node="">“The key to this Communist utopia was control of the food supply: without that the government had no means of controlling the economy and society. The Bolsheviks were painfully aware of the fact that their regime lay at the mercy of a largely hostile peasantry.”</span><br data-dcnode-id="3184"><br data-dcnode-id="3183"><span data-dcnode-id="3182" instrument_node="">“The (Bolshevik) fear of the peasant was the great unresolved tension of the 1920s – one that led inexorably towards the tragedy of collectivization.” The recruitment of peasants into communism was mostly aimed at the resentful sons of peasants who were unsatisfied with and embarrassed by the peasant life. Self-hating peasants then turned on their own. A big part of collectivization was the get rid of these apolitical peasant fathers.” See Turganev.</span><br data-dcnode-id="3181"><br data-dcnode-id="3180"><span data-dcnode-id="3179" instrument_node="">“Bolshevism was a very Russian thing. Its belief in militant action, its insistence, contrary to the tenets of Marx and Hegel, that a revolution could ‘jump over’ the contingencies of history, placed it firmly in the Russian messianic tradition.”</span><br data-dcnode-id="3178"><br data-dcnode-id="3177"><span data-dcnode-id="3176" instrument_node="">“One could argue that the command system was itself an inevitable outcome of the contradiction of October – a proletarian dictatorship in a peasant country….”</span><br data-dcnode-id="3175"><br data-dcnode-id="3174"><span data-dcnode-id="3173" instrument_node="">Imagining they could remake mankind, the Bolsheviks “believe(d) that human nature could be changed simply by altering the social environment in which people lived. Man cannot be transformed quite so easily: human nature moves more slowly than ruling ideologies or society. This is perhaps the one enduring moral lesson of the Russian Revolution – as it is indeed of the terrible history of this (21st) century.” Amen.</span><br data-dcnode-id="3172"><br data-dcnode-id="3171"><span data-dcnode-id="3170" instrument_node="">Intelligentsia</span><br data-dcnode-id="3169"><span data-dcnode-id="3168" instrument_node="">“”… the single greatest difference between Russia and the West… was that in Western Eusrope citizens were generally free to do as they pleased so long as their activities had not been specifically prohibited by the state, while the people of Russia were not free to do anything unless the state gave them specific permission to do it.”</span><br data-dcnode-id="3167"><br data-dcnode-id="3166"><span data-dcnode-id="3165" instrument_node="">The February Revolution was “more like a peasant riot” The men of February, intoxicated by their own self-image as the heirs of 1789, were deluded into believing that they could resolve problems of 1917 by importing Western constitutional practices and policies for which their were no real precedents, nor the necessary cultural base, in Russia.” …. “Apart from the state itself, there was nothing holding Russia together.”</span><br data-dcnode-id="3164"><br data-dcnode-id="3163"><span data-dcnode-id="3162" instrument_node="">“… the whole of the civilization of the gentry, … had never been more than a thin veneer laid over the top of the brutal exlpoitation of the peasants, from which the revolution had emerged.”</span><br data-dcnode-id="3161"><br data-dcnode-id="3160"><span data-dcnode-id="3159" instrument_node="">Lenin</span><br data-dcnode-id="3158"><span data-dcnode-id="3157" instrument_node="">“The October seizure of power…: few historical events in the modern era better illustrate the decisive effect of an individual on the course of history. Without Lenin’s intervention it would probably never have happened at all – and the history of the 20th century would have been very different.” Lenin usurped power for power’s sake. He held workers and peasants in contempt. It was mostly about his needs. He was ready to “ditch” the Soviets when he couldn’t use them. </span><br data-dcnode-id="3156"><br data-dcnode-id="3155"><span data-dcnode-id="3154" instrument_node="">The Masses</span><br data-dcnode-id="3153"><span data-dcnode-id="3152" instrument_node="">“The tragedy of the Russian Revolution was that the people were too weak politically to determine its outcome.”</span><br data-dcnode-id="3151"><br data-dcnode-id="3150"><span data-dcnode-id="3149" instrument_node="">During WWI, on the home front, no food, no provisions, no heat, etc.</span><br data-dcnode-id="3148"><br data-dcnode-id="3147"><span data-dcnode-id="3146" instrument_node="">“Historians have tended to neglect the connections between this plebian war on privilege and the origins of the Red Terror….. “it had a strange mass appeal.” “Loot the looters” "take from those who still have anything worthwhile.” … “… the whole of the social revolution had been largely driven by petty localism.”</span><br data-dcnode-id="3145"><br data-dcnode-id="3144"><span data-dcnode-id="3143" instrument_node="">Even if the revolution didn’t improve the lives of Russians at least it wrecked the aristocracy. Russians seem to thrive on schadenfreude. Zloradstvo?</span><br data-dcnode-id="3142"><br data-dcnode-id="3141"><span data-dcnode-id="3140" instrument_node="">“This low cultural level of the Soviet bureaucracy was to be a permanent legacy of October which wouldn later come to haunt Bolshevik leaders.” They destroyed the former leaders, got rid of skilled workers, massacred the aristocracy and drained what had been a tiny middle class. New bureaucrats, military officers, etc, were untrained and uineducated. You can still pick up on a crass rudeness in public Moscow today. </span><br data-dcnode-id="3139"><br data-dcnode-id="3138"><span data-dcnode-id="3137" instrument_node="">Today</span><br data-dcnode-id="3136"><span data-dcnode-id="3135" instrument_node="">I wonder if Putin knows about this reoccurring Russian oversight of not grooming an heir inevitably leading to disaster…. Or maybe there will be another revolution. Kids born since Yeltsin can more easily compare their lot to the those of their Western peers. Plus, it must suck living in a society where the rule of law is meaningless. Causes high anxiety and hatred.</span><br data-dcnode-id="3134"><br data-dcnode-id="3133"><span data-dcnode-id="3132" instrument_node="">Trump is certainly no Lenin (for starters, Lenin read books) but this antisocial-narcissistic-personality-disorder-tool-of-the-Kremlin is “running” my nation’s capitol like no one before him. Or after, God willing. And you just know Trump hates the unwashed masses who voted for him, just as Lenin hated the peasants (and didn’t care much for the workers either). Trump needed the white disaffected voters in the middle of this country so he told them what they wanted to hear. Let’s see how it works out for them.</span><br data-dcnode-id="3131"><br data-dcnode-id="3130"><span data-dcnode-id="3129" instrument_node="">In the passage above about the Bolsheviks operating as a mafia, substitute “Bolshevik” with Trumpistas” and “largest” with most “powerful” and then have a shot of whiskey.</span><br data-dcnode-id="3128"><br data-dcnode-id="3127"><span data-dcnode-id="3126" instrument_node="">Guilt is still a dangerous motivator (much less dangerous when used as a dissuader). Guilt is related to shame which has gotten the Middle East into a lot of trouble. To me, guilt implies belittlement. What began as privileged guilt in Russia before the Revolution resulted in disaster. White guilt is doing us no good. Westerners who feel guilty for the difficulties many predominantly Muslim countries are experiencing with modernity and how the people of those countries are reacting seem to be looking down upon them. Like they can’t be expected to play nice and improve their lot cuz they’re not white Christians. I call BS on all of it. It goes hand in hand with victimhood. Also not a good motivator! Sad! Our continued involvement making war and social engineering in countries who don't want us and whom we do not understand is a never-ending disaster. We have now very overtly taken sides with the Sunnis against the Shia. WHAT ARE WE THINKING??? What's the plan here?</span><br data-dcnode-id="3125"><br data-dcnode-id="3124"><span data-dcnode-id="3123" instrument_node="">In the Southern US, among former Confederacy states, we are slowly dealing with “The Cult of the Lost Cause” by removing monuments honoring those who fought for the breakup of my beloved country. This is the best speech of the year: </span><a data-dcnode-id="3121" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.youtube.com/watch%3Fv%3DWQ29Uwz5yPU%26sns%3Dem" rel="noopener nofollow" target="_blank"><span data-dcnode-id="3122" instrument_node="">https://www.youtube.com/watch?v=WQ29U...</span></a><span data-dcnode-id="3120" instrument_node=""> Hat off to Mr. Landrieu, Mayor of the great city of New Orleans. More speeches like this, please. </span><br data-dcnode-id="3119"><span data-dcnode-id="3118" instrument_node=""> </span><br data-dcnode-id="3117"><span data-dcnode-id="3116" instrument_node="">I think of this when I wonder if Russia can come to terms with its past. Would be a very healthy thing to do. “Their revolutionary tragedy lay in the legacies of their own cultural backwardness rather than the evil of some ‘alien’ Bolsheviks. They were not the victims of the revolution but protagonists in its tragedy.” Putin plays on this sickness of Russian victimhood today to help keep up his poll numbers. The West is out to get us! Poor, innocent Russia! “The ghosts of 1917 have not been laid to rest.”</span><br data-dcnode-id="3115"><br data-dcnode-id="3114"><span data-dcnode-id="3113" instrument_node="">The book was very long and sometimes repetitive. However, when dealing with the Russian Revolution, you're allowed to go on. It's just so complicated....</span></span><span data-dcnode-id="3111" instrument_node="">

              </span><a class="actionLinkLite" data-dcnode-id="2948" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.goodreads.com/review/list/29160274-czarny-pies%3Fshelf%3Deuropean-history"><span data-dcnode-id="2949" instrument_node="">european-history</span></a><span data-dcnode-id="2947" instrument_node="">

</span><span class="readable" data-dcnode-id="2915" id="reviewTextContainer1799052143"><span data-dcnode-id="2941" instrument_node="">
</span><span data-dcnode-id="2939" id="freeTextContainer11218167119281535453"><span data-dcnode-id="2940" instrument_node="">Orlando Figes' masterful "A People's Tragedy: The Russian Revolution: 1891-1924" provides a rich and complex portrait that of Russian society at the time of the fall of the Romanov dynasty and the birth of the Communist state. One does not read it for Figes' opinions but rather for the amount of detail that he is able to marshall and synthesize on the key social, cultural and political trends of the revolutionary era. The book is a great pleasure for anyone fascinated by the culture and history </span></span><span data-dcnode-id="2938" instrument_node="">
</span><span data-dcnode-id="2920" id="freeText11218167119281535453" style="display:none"><span data-dcnode-id="2937" instrument_node="">Orlando Figes' masterful "A People's Tragedy: The Russian Revolution: 1891-1924" provides a rich and complex portrait that of Russian society at the time of the fall of the Romanov dynasty and the birth of the Communist state. One does not read it for Figes' opinions but rather for the amount of detail that he is able to marshall and synthesize on the key social, cultural and political trends of the revolutionary era. The book is a great pleasure for anyone fascinated by the culture and history of Russia. Even those who disagree with Figes' conclusions, will agree that he has taught them a great deal about the era.</span><br data-dcnode-id="2936"><span data-dcnode-id="2935" instrument_node="">In terms of primary research, Figes' specialty is Russian peasant society. Not surprisingly then, the greatest strength of the book is the analysis of the role of the peasantry during the revolutionary era. Figes argues that very effectively that the overriding goal of the leaders of the peasant communes times was to acquire ownership of the land held by the nobility. When the Tsar's regime fell, the peasant communes spontaneously seized the noble lands. Subsequently they supported the Communists who promised them that they could keep the land against the Whites who said that they would restore it to the nobles. Once the Whites had been expelled from Russia, the Communists proceeded to collectivized the land by taking advantage of a generational cleavage in the countryside. The Communists recruited young peasants who had moved to the city to work in factories to act as bureaucrats in the agricultural communities and lead the fight against the oder communal leaders d. In this way the Communists used one generation of peasant leaders to fight the Whites and a second generation of peasants to imposed collectivization.</span><br data-dcnode-id="2934"><span data-dcnode-id="2933" instrument_node="">Relying on the writings of other historians, Figes makes the additonal points:</span><br data-dcnode-id="2932"><span data-dcnode-id="2931" instrument_node="">1. Tsar Nicholas was the author of his own downfall. He packed his government and his army with individuals who were loyal to his autocracy but totally lacking in ability. Consequently the Russian war effort was bungled in every aspect which brought down the Tsar's regime.</span><br data-dcnode-id="2930"><span data-dcnode-id="2929" instrument_node=""> 2. It was also the Tsar's fault that liberal democracy failed in Russia. For the previous 20 years, Nicholas had resisted every effort to create a constitutional monarchy in Russia which prevented the development of a strong class of liberal democratic politicians. Thus when the Romanov dynastry fell in February 1917, the provisional government lasted less than a year before a second revolution brought the Bolcheviks to power.</span><br data-dcnode-id="2928"><span data-dcnode-id="2927" instrument_node="">3. The Bolcheviks came to power not because they had the greatest support amongst the working class but because of Lenin's energy and uncommon sense of timing. In Figes' view, Lenin stole the revolution from the Soviets.</span><br data-dcnode-id="2926"><span data-dcnode-id="2925" instrument_node="">4. The notion that Stalin was the one who established terror and totalitarianism in communist Russia is a revisionist myth fabricated by Left wing historians. It was in fact Lenin in fact that who established the practices and institutions of the communist dictatorship. </span><br data-dcnode-id="2924"><span data-dcnode-id="2923" instrument_node="">Orlando Figes' "A People's Tragedy" is a very dense book but one that is richly rewarding. It will give a great deal of pleasure to anyone who has the energy required to read it through to the end.</span><br data-dcnode-id="2922"><br data-dcnode-id="2921"></span><span data-dcnode-id="2919" instrument_node="">

</span><span data-dcnode-id="2577" id="freeTextContainer6086843194616658655"><span data-dcnode-id="2581" instrument_node="">A Book of biblical proportions in terms of what it covers to what the implications were to Russia and the world. Over 800 pages of Russian history that covers about 30 years of turmoil. It gives a lot of food for thought and because of it's(the book and the topic) magnitude it's hard to digest all of it in just one read let alone trying to review it in just after the end.</span><br data-dcnode-id="2580"><br data-dcnode-id="2579"><span data-dcnode-id="2578" instrument_node="">Although the actors, political parties, locales etc. change fast and a lot, it was quite easy to keep up what he was talking a</span></span><span data-dcnode-id="2576" instrument_node="">
</span><span data-dcnode-id="2564" id="freeText6086843194616658655" style="display:none"><span data-dcnode-id="2575" instrument_node="">A Book of biblical proportions in terms of what it covers to what the implications were to Russia and the world. Over 800 pages of Russian history that covers about 30 years of turmoil. It gives a lot of food for thought and because of it's(the book and the topic) magnitude it's hard to digest all of it in just one read let alone trying to review it in just after the end.</span><br data-dcnode-id="2574"><br data-dcnode-id="2573"><span data-dcnode-id="2572" instrument_node="">Although the actors, political parties, locales etc. change fast and a lot, it was quite easy to keep up what he was talking about. The writing is good, yet I cannot really say about his arguments since I'm not that familiar with the topic and was a bit overwhelmed about the amount of information. This isn't just a recollection of events, but sort of an explanation to why things happened the way they happened. It's quite broad in it's focus, it's not just about few party people but a whole of nation, explaining a lot of the old Tsarist Russia before even entering WW1(around p. 250). Also a lot of focus is in the peasants and in agriculture instead of factories although after you read it, you understand why. The book increased my understanding of the Soviet union and the people especially since my main interests lie in the times after these events. </span><br data-dcnode-id="2571"><br data-dcnode-id="2570"><span data-dcnode-id="2569" instrument_node="">I'm sure to return to this book once I've devoured more Russian classics and when I'm more informed about the French Revolution. I'd say this is a cornerstone book to anyone interested in the history of 1900's Europe, World Wars, Cold War or communism. </span><br data-dcnode-id="2568"><br data-dcnode-id="2567"><span data-dcnode-id="2566" instrument_node="">One flaw worth mentioning is the writers habit of repeating himself, although in a book of this scope I felt it was somewhat useful to be reminded of things often. The other one is his random comments about Russians and Russia which occasionally come off as rude remarks of a nation/nationality.</span><br data-dcnode-id="2565"></span><span data-dcnode-id="2563" instrument_node="">

</span><span data-dcnode-id="2461" id="freeText5675517798402138959" style="display:none"><span data-dcnode-id="2465" instrument_node="">“The people’s tragedy,” to put it simply, is the definitive Blairite history of the Russian Revolution. He dilutes himself with humanitarian idealism and his insistence that only democratic reform could have saved the Czarist Regime. I am not convinced on this point entirely. Nor am I convinced that the Whites could have won if only they embraced land reform. But these are plausible ideas and are not the reasons why I am giving this book one star. I am giving it one star because on every page I can point to a snide comment that is designed to bias the readers opinion to his neoliberal point of view. For those who want an honest history, this is not it. </span><br data-dcnode-id="2464"><br data-dcnode-id="2463"><span data-dcnode-id="2462" instrument_node="">The authors Menshevik and Gorkyite leanings are made obvious at every turn. And yet he is blind to the contradictions in their humanitarian ideas. And, the false notion that under their leadership or “the people’s” leadership through a democracy that things would have been different. This is nonsense. All revolutions end in blood; or as Lenin put it “there has never been a revolution without firing squads.”</span></span><span data-dcnode-id="2460" instrument_node="">

</span><span data-dcnode-id="2273" id="freeText3259950411437774274" style="display:none"><span data-dcnode-id="2283" instrument_node="">Despite a few slip-ups by the editors on sentence structure, this is an extraordinarily researched and well-written book. Some people will be put off by its length but the information it offers is well worth the effort. The reader cannot help but be impressed by Figes' knowledge of the Russian Revolution. Perhaps no one has a better grasp of that period of Russian history. </span><br data-dcnode-id="2282"><br data-dcnode-id="2281"><span data-dcnode-id="2280" instrument_node="">Throughout the book, the reader is left wondering if Russia is an ungovernable country. Figes refers to a quote from Bertrand Russell in which he argued that "terrible though Bolshevik despotism was, it seemed the right sort of government for Russia." This is an extraordinary statement coming from someone like Russell and yet, it seems to be accurate. Lenin trying to jump over the parts of Marx's dialectic to reach socialism sooner was obviously a failure on his and his party's part. </span><br data-dcnode-id="2279"><br data-dcnode-id="2278"><span data-dcnode-id="2277" instrument_node="">The peasants of Russia, who made up most of the population supported Lenin's revolution in an effort to throw off the chains that had bound them for so long. During the Civil War, they continued to support the Bolsheviks in part because the Bolsheviks played on the peasants hatred of the tsar but once the war had ended, the Bolsheviks in the view of the peasants had merely replaced one form of tyranny for another. Moreover, the incompetence of the Bolsheviks guaranteed that staying in power would not be easy. The amount of deaths during that period is hard to grasp. Between WWI, the revolution, and the Civil War, not to mention all the famines and the bloody way that the Bolsheviks imposed their will led to the deaths of better than 10 million people. </span><br data-dcnode-id="2276"><br data-dcnode-id="2275"><span data-dcnode-id="2274" instrument_node="">I highly recommend this book to anyone interested in Russian history.</span></span><span data-dcnode-id="2272" instrument_node="">

              </span><a class="actionLinkLite" data-dcnode-id="2188" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.goodreads.com/review/list/72793544-tichana%3Fshelf%3Dnon-fiction"><span data-dcnode-id="2189" instrument_node="">non-fiction</span></a><span data-dcnode-id="2187" instrument_node="">

</span><span data-dcnode-id="2168" id="freeTextContainer10307532902301976535"><b data-dcnode-id="2179"><span data-dcnode-id="2180" instrument_node=""> **** 3.25 Stars **** </span></b><span data-dcnode-id="2178" instrument_node=""> </span><br data-dcnode-id="2177"><br data-dcnode-id="2176"><span data-dcnode-id="2175" instrument_node="">I have to start by saying that I think Orlando Figes is a brilliant historian. The amount of detailed information in </span><i data-dcnode-id="2173"><span data-dcnode-id="2174" instrument_node=""> People's Tragedy </span></i><span data-dcnode-id="2172" instrument_node=""> was ridiculous and I enjoyed it thoroughly. </span><b data-dcnode-id="2170"><span data-dcnode-id="2171" instrument_node=""> However, </span></b><span data-dcnode-id="2169" instrument_node=""> I have to admit that Figes's bias was evident in his writing. I do acknowledge that every topic researched is loaded with bias in general. There is no such thing as objective research. The fact that the researcher picks a topic they are interested in is by itself biased. There is nothi</span></span><span data-dcnode-id="2167" instrument_node="">
</span><span data-dcnode-id="2119" id="freeText10307532902301976535" style="display:none"><b data-dcnode-id="2165"><span data-dcnode-id="2166" instrument_node=""> **** 3.25 Stars **** </span></b><span data-dcnode-id="2164" instrument_node=""> </span><br data-dcnode-id="2163"><br data-dcnode-id="2162"><span data-dcnode-id="2161" instrument_node="">I have to start by saying that I think Orlando Figes is a brilliant historian. The amount of detailed information in </span><i data-dcnode-id="2159"><span data-dcnode-id="2160" instrument_node=""> People's Tragedy </span></i><span data-dcnode-id="2158" instrument_node=""> was ridiculous and I enjoyed it thoroughly. </span><b data-dcnode-id="2156"><span data-dcnode-id="2157" instrument_node=""> However, </span></b><span data-dcnode-id="2155" instrument_node=""> I have to admit that Figes's bias was evident in his writing. I do acknowledge that every topic researched is loaded with bias in general. There is no such thing as objective research. The fact that the researcher picks a topic they are interested in is by itself biased. There is nothing wrong with bias as long as the researcher is aware of it and does not twist the truth to fit their agenda. </span><br data-dcnode-id="2154"><br data-dcnode-id="2153"><span data-dcnode-id="2152" instrument_node="">I noticed from the start that Figes did not like Lenin or the Soviet Union and I mean I definitely do not blame him. However, I did have issues with him making it sound like the Russian mass was not in favour of the Bolshevik revolution of 1917. I think that is a bit misleading. For a revolution like that to occur and be able to rise above any other power and get rid of both landlordism and capitalism, the mass has to be in on it. It just does not make sense. Figes however makes it sound as if the revolution brought nothing but death, hunger, and disease to the Russian people. I think that is part of the truth but not entirely. </span><br data-dcnode-id="2151"><br data-dcnode-id="2150"><span data-dcnode-id="2149" instrument_node="">I think the issue of not being able to grasp the fact that a nation would want a revolution like that lies in the fact that a lot of Western historians view the world from a Western perspective that is embedded in favour of Capitalism. A socialist revolution simply does not fit in that agenda. There is this idea in the West that the East is always in need of saving and that saving can only be achieved by a Western intervention. The West often views the rest of the world as a place of chaos that needs saving by assimilating into the Western culture. </span><br data-dcnode-id="2148"><br data-dcnode-id="2147"><span data-dcnode-id="2146" instrument_node="">In addition, Figes makes it sound as if there was a lot of blood shed during the October revolution, but as I have read before from other historians that the October revolution was bloodless, but the civil war was where the bloodbath began. </span><br data-dcnode-id="2145"><span data-dcnode-id="2144" instrument_node="">The fact that Figes indirectly implies that both Bolshevism and Stalinism are the same thing and that one emerged from the other is also misleading and far-fetched. Because to be completely honest, if they were so similar, I don't see why people like Trotsky (who was a Bolshevik) would have any problem with Stanlinism and why would he choose to fight it till the end, or why Lenin would strongly oppose putting Stalin in power before his death.</span><br data-dcnode-id="2143"><span data-dcnode-id="2142" instrument_node="">Figes also seemed to imply that if the Czar had acted differently, maybe the revolution could have been avoided. But I think that is completely the opposite of what would have happened. Fascism would've stayed in Russia if Czarism continued to rule. </span><br data-dcnode-id="2141"><br data-dcnode-id="2140"><b data-dcnode-id="2138"><span data-dcnode-id="2139" instrument_node=""> But what did I like about this book? </span></b><span data-dcnode-id="2137" instrument_node=""> apart from the issues mentioned above, I liked everything else. I liked reading about Nicholas the 2nd. Nikolai Romanov was definitely not fit to be Czar. The whole idea of Czarism seemed wrong to me as a ruling system. The revolution could not be avoided, but I may be wrong. </span><br data-dcnode-id="2136"><span data-dcnode-id="2135" instrument_node="">I also liked reading about the Russian culture in general and the ongoing tension between the peasants and the bourgeois. Figes's knowledge of the Russian culture was displayed here the most in my opinion. </span><br data-dcnode-id="2134"><span data-dcnode-id="2133" instrument_node="">I quite enjoyed Figes' writing style as well. I found it organized and informative. There were no pages wasted on unimportant information. I found his writing to be professional and very detailed. I did not find the book to be long at all. For such a revolution to be completely written in details, it definitely needs beyond 1000 pages. </span><br data-dcnode-id="2132"><br data-dcnode-id="2131"><span data-dcnode-id="2130" instrument_node="">Would I recommend </span><i data-dcnode-id="2128"><span data-dcnode-id="2129" instrument_node=""> People's Tragedy? </span></i><span data-dcnode-id="2127" instrument_node=""> Absolutely but with the thought in mind that Figes has his own biases, and maybe other books from different perspectives need to be read as well. Perhaps one written by a Russian historian would be interesting. </span><br data-dcnode-id="2126"><b data-dcnode-id="2124"><span data-dcnode-id="2125" instrument_node=""> Overall, </span></b><span data-dcnode-id="2123" instrument_node=""> I quite enjoyed </span><i data-dcnode-id="2121"><span data-dcnode-id="2122" instrument_node=""> People's Tragedy </span></i><span data-dcnode-id="2120" instrument_node=""> and I definitely learned a lot from it about the revolution of 1917 and the Russian culture in general. I plan to read other works on the topic in the future.</span></span><span data-dcnode-id="2118" instrument_node="">

</span><span data-dcnode-id="2015" id="freeTextContainer3055319076589884298"><b data-dcnode-id="2019"><span data-dcnode-id="2020" instrument_node="">Exemplary mix of the political, the social and the personal...</span></b><br data-dcnode-id="2018"><br data-dcnode-id="2017"><span data-dcnode-id="2016" instrument_node="">In order to tell the story of the Russian Revolution, Figes begins three decades earlier, in 1891, with the famine that could be seen as starting the journey towards revolution; and continues up to 1924, the year that the first dictator, Lenin, died. This is a huge work, massive in scope, meticulously researched and delivered with a level of clarity that makes it surprisingly easy to read and absorb, even for someone coming to the sub</span></span><span data-dcnode-id="2014" instrument_node="">
</span><span data-dcnode-id="1977" id="freeText3055319076589884298" style="display:none"><b data-dcnode-id="2012"><span data-dcnode-id="2013" instrument_node="">Exemplary mix of the political, the social and the personal...</span></b><br data-dcnode-id="2011"><br data-dcnode-id="2010"><span data-dcnode-id="2009" instrument_node="">In order to tell the story of the Russian Revolution, Figes begins three decades earlier, in 1891, with the famine that could be seen as starting the journey towards revolution; and continues up to 1924, the year that the first dictator, Lenin, died. This is a huge work, massive in scope, meticulously researched and delivered with a level of clarity that makes it surprisingly easy to read and absorb, even for someone coming to the subject with no previous knowledge. It's divided into four sections that thoroughly cover each period, looking at all the different parts of society and how they were affected at each point. It's very well written, remains largely free of academic jargon and, to my joy, contains all the relevant information in the main body of the text, meaning no flicking backwards and forwards to notes. The notes at the back are mostly reserved simply to give information about the extensive sources Figes has used.</span><br data-dcnode-id="2008"><br data-dcnode-id="2007"><span data-dcnode-id="2006" instrument_node="">The first part describes society as it was at the point where revolutionary ideas were still in their infancy. Figes describes the Romanov dynasty in some depth – Nicholas II's autocratic style of rule, the influence on him of Alexandra and, through her, Rasputin, and the methods of government that were in force, with all power still concentrated in the hands of a relatively small class of nobles. He shows what life was like for the peasants, still nasty, brutish and short, but with some more liberal landowners making efforts to provide education for the young. He takes us into the new industrial centres, beginning to suck people in from the villages including those newly educated peasants – places which appalling working and living conditions made ripe for the revolutionary ideas beginning to circulate via the intelligentsia. The church, which Figes suggests never had a solid grip even on the peasant classes, was weakened further as people moved to the cities where there weren't enough churches to serve the rapidly expanding population. The army, meanwhile, was becoming increasingly out of date – Nicholas loved to parade his cavalry and to see his officers in smart uniforms, but wasn't terribly interested in the less romantic motor vehicles and new weapons being incorporated into the armies of the bordering nations, west and east.</span><br data-dcnode-id="2005"><br data-dcnode-id="2004"><span data-dcnode-id="2003" instrument_node="">Part 2 covers the period from 1891 to just before the revolution proper began. Again Figes ranges widely, often using the stories of individuals to add a human face to the political history. The famine of 1891, due largely to failures in policy, eventually forced the Tsar to appeal for voluntary groups to provide aid to the starving masses. The liberal intelligentsia dived enthusiastically into this, and thus began some of the organisations which would become political protest movements. But still Nicholas rejected reforms, leading to increasing radicalisation of the disaffected. The 1904 war against Japan, which Nicholas expected to win easily, highlighted the weakness of the army, while the eventual loss was a national humiliation which further undermined the monarchy. The 1905 revolution arose from all of these factors, further aggravated by the brutal force used to disperse protest marches. Although this revolution failed, Figes shows how it hardened attitudes and consolidated the various factions which would play major roles in the years to come. Figes explains these factions well, including their various policy aims, which is a great help in understanding the confusion of personalities and groups that feature in the events of 1917. And finally this section takes us up to the early years of WW1, showing the terrible losses and huge hardships suffered by soldiers and civilians.</span><br data-dcnode-id="2002"><br data-dcnode-id="2001"><span data-dcnode-id="2000" instrument_node="">The third section concentrates on the revolutionary year – from February 1917 to the signing of the peace of Brest-Litovsk in March 1918. This is basically the period covered in Trotsky's </span><i data-dcnode-id="1998"><span data-dcnode-id="1999" instrument_node="">History of the Russian Revolution</span></i><span data-dcnode-id="1997" instrument_node=""> which I recently read and reviewed, and while Trotsky's massive account is obviously more detailed, this one has the huge advantage for the reader that Figes has done the groundwork of explaining all the different groupings and factions. So where Trotsky lost me a little in the mid-section, Figes manages to keep a level of clarity throughout the confusion of this year. It seems to me that Trotsky's history must have been one of Figes' major sources for this section, and the two accounts complement each other well, I found. In retrospect, I suspect it would have been better to read them the other way round though – this one first, then Trotsky. Figes gives what feels like a less biased account, not unnaturally, dismissing the idea of the coup as 'bloodless' and showing some of the horrors that took place, along with an almost complete breakdown of any kind of social order. He also discusses the issues of Lenin's return on the 'sealed train' and German funding of the revolution, suggesting that the Germans did indeed provide gold but that Lenin and his comrades were not at any point acting as German agents. </span><br data-dcnode-id="1996"><br data-dcnode-id="1995"><span data-dcnode-id="1994" instrument_node="">Part 4 tells the complex tale of the Civil War that followed the revolution – the various factions within the Whites, all fighting for different aims, and thus never really consolidating as a unified force; the former Allies, primarily Britain, providing support for the Whites in an attempt to destroy the Bolsheviks; the growth of the Red Army under Trotsky's leadership to huge numbers of men, but without sufficient equipment to keep them supplied; the forced conscription, massive brutality and violent anti-Semitism inflicted by both sides. Figes then goes on to describe Lenin's regime after the war, including the huge rise in bureaucracy that allowed the major players in the regime to begin to form their own fiefdoms and power bases. He also shows the country in a state of ruin, the cities depopulated, the villages racked by famine and starvation, until eventually Lenin was forced to turn back towards a form of capitalism, prompting accusations of betrayal by those who were still fanatical about the ideals of the revolution.</span><br data-dcnode-id="1993"><br data-dcnode-id="1992"><span data-dcnode-id="1991" instrument_node="">Figes concludes that the people brought about their own tragedy. The country's social and economic backwardness and lack of real belief in democracy meant that they opened the door for what was essentially a return to tsarism in a different form. And he warns, prophetically when you remember this book was first published in 1996, that the fall of the USSR would not necessarily lead to an embracing of democracy in the former states, or in Russia itself.</span><br data-dcnode-id="1990"><br data-dcnode-id="1989"><span data-dcnode-id="1988" instrument_node="">The book is generously illustrated with over a hundred plates. Some are the usual portraits of the main players, but many show the ordinary people of the cities and villages and, often, the real horrors they endured. Some are indeed upsetting – the ones relating to torture or cannibalism for instance – and while I found those pictures, and Figes' vivid and unsparing descriptions of the events behind them, hard to take, I didn't feel either were gratuitous or sensationalised – they are an essential part of the historical record, and that's the way in which Figes presents them. </span><br data-dcnode-id="1987"><br data-dcnode-id="1986"><span data-dcnode-id="1985" instrument_node="">This is an exceptional book – one of the best broad scope histories I've read. It's brilliantly written and well laid out, making it easy to read and understand despite the immense complexity of the subject. It is an exemplary mix of the political, the social and the personal, so that I came away from it understanding not just the politics and timeline of events, but how it must have felt to have lived through them. Should you ever be struck with a sudden desire to read an 800-page history of the Russian Revolution, then without a doubt this is the one to read. My highest recommendation.</span><br data-dcnode-id="1984"><br data-dcnode-id="1983"><span data-dcnode-id="1982" instrument_node="">NB This beautifully produced, special centenary edition of the book was provided for review by the publisher, Bodley Head.</span><br data-dcnode-id="1981"><br data-dcnode-id="1980"><a data-dcnode-id="1978" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.fictionfanblog.wordpress.com/" rel="noopener nofollow" target="_blank"><span data-dcnode-id="1979" instrument_node="">www.fictionfanblog.wordpress.com</span></a></span><span data-dcnode-id="1976" instrument_node="">

</span><span data-dcnode-id="1886" id="freeTextContainer5285578834856232897"><span data-dcnode-id="1890" instrument_node="">A real brick of a book, heavy and difficult to hold for any kength of time without getting cramp. Dense text which in places I had to read twice and more.</span><br data-dcnode-id="1889"><br data-dcnode-id="1888"><span data-dcnode-id="1887" instrument_node="">I enjoyed reading this, it had a lot of detail and insight into a subject that fascinates me. It is good at getting over the sense of how close the Russian revolution was to failure, seemingly always on the brink of disaster yet held together somehow by the implacable will of Lenin and the discipline of his cadres. Being able to lie with ease a</span></span><span data-dcnode-id="1885" instrument_node="">
</span><span data-dcnode-id="1874" id="freeText5285578834856232897" style="display:none"><span data-dcnode-id="1884" instrument_node="">A real brick of a book, heavy and difficult to hold for any kength of time without getting cramp. Dense text which in places I had to read twice and more.</span><br data-dcnode-id="1883"><br data-dcnode-id="1882"><span data-dcnode-id="1881" instrument_node="">I enjoyed reading this, it had a lot of detail and insight into a subject that fascinates me. It is good at getting over the sense of how close the Russian revolution was to failure, seemingly always on the brink of disaster yet held together somehow by the implacable will of Lenin and the discipline of his cadres. Being able to lie with ease and take down opponents one at a time helped with this of course.</span><br data-dcnode-id="1880"><br data-dcnode-id="1879"><span data-dcnode-id="1878" instrument_node="">It also makes clear that the roots of Stalin's reign of terror and his countless murders lie with Lenin, and his callous indifference to the means as long as the objective is reached.</span><br data-dcnode-id="1877"><br data-dcnode-id="1876"><span data-dcnode-id="1875" instrument_node="">One thing I did not like was the teaser thrown in at the end, that Kirov was plotting against Stalin at the time of his assassination. It is clear that Stalin murdered Kirov, and this gives a reason - as if Stalin needed a reason to kill - but the plot idea is not explored.</span></span><span data-dcnode-id="1873" instrument_node="">

        </span><span class="staticStars notranslate" data-dcnode-id="1796" title="it was amazing"><span class="staticStar p10" data-dcnode-id="1801" size="15x15"><span data-dcnode-id="1802" instrument_node="">it was amazing</span></span><span class="staticStar p10" data-dcnode-id="1800" size="15x15"></span><span class="staticStar p10" data-dcnode-id="1799" size="15x15"></span><span class="staticStar p10" data-dcnode-id="1798" size="15x15"></span><span class="staticStar p10" data-dcnode-id="1797" size="15x15"></span></span><span data-dcnode-id="1795" instrument_node="">

</span><span data-dcnode-id="1789" id="freeTextContainer12533173211872927970"><span data-dcnode-id="1790" instrument_node="">This is probably the best single-volume work about the Russian Revolution ever printed in English. It was written after the Soviet archives were opened, making a vast mass of new material available to historians and significantly changing the story as it had been previously understood in the West. It is also the work of an author determined to present as full and true a picture as possible of what happened in Russia during those terrible years, a picture as free from bias and ideological distort</span></span><span data-dcnode-id="1788" instrument_node="">
</span><span data-dcnode-id="1761" id="freeText12533173211872927970" style="display:none"><span data-dcnode-id="1787" instrument_node="">This is probably the best single-volume work about the Russian Revolution ever printed in English. It was written after the Soviet archives were opened, making a vast mass of new material available to historians and significantly changing the story as it had been previously understood in the West. It is also the work of an author determined to present as full and true a picture as possible of what happened in Russia during those terrible years, a picture as free from bias and ideological distortion as he can draw.</span><br data-dcnode-id="1786"><br data-dcnode-id="1785"><span data-dcnode-id="1784" instrument_node="">Although the author has since covered himself with ignominy by committing certain unprofessional acts, the decline of his personal reputation should not affect our appreciation of his work. This is a great book, and I do mean great.</span><br data-dcnode-id="1783"><br data-dcnode-id="1782"><span data-dcnode-id="1781" instrument_node="">I did not find it an easy book to read. The real difficulty was neither its awkward size nor the great mass of facts and statistics it contains, but the distressing and depressing nature of the story it recounts. Every possible permutation of human injustice, callousness, venality, stupidity, viciousness, brutality and, to speak plainly, evil, occurs in it. Every atrocity you can think of was committed in Russia during those years, as well as every atrocity you could never think of. Each time we turn a page, thinking the depths of human depravity have been plumbed, another scene of the tragedy unfolds, and we find we have not touched bottom yet. To reach the end of this book – and to know that the period it covers was merely the prelude to a longer and even bloodier tragedy, the reign of Stalin – is to find oneself despairing of human nature.</span><br data-dcnode-id="1780"><br data-dcnode-id="1779"><span data-dcnode-id="1778" instrument_node="">Yet, hard as it is, everyone who possibly can – every adult who possibly can – should read this book. We need to know this, to remember this, to realize what we are capable of. Because the Russian Revolution was not made horrible only by its leaders, or only by the Bolsheviks, or </span><i data-dcnode-id="1776"><span data-dcnode-id="1777" instrument_node="">only</span></i><span data-dcnode-id="1775" instrument_node=""> by anybody: it was a collective effort, in which everyone from Lenin and the murdered Tsar to the humblest of the peasantry played their part. It was a plague of evil, of cruelty and oppression and despair and the thirst for blood, which infected almost everybody in Russia, and even spread beyond the borders of that country. </span><br data-dcnode-id="1774"><br data-dcnode-id="1773"><span data-dcnode-id="1772" instrument_node="">It could have happened to me. It could have happened to you. And it could happen again.</span><br data-dcnode-id="1771"><br data-dcnode-id="1770"><span data-dcnode-id="1769" instrument_node="">Even as I write, citizens of the world’s richest and most comfortable countries, feeling an expanding separation between – no longer the rich and the poor, for not many are really poor in these countries, certainly not as people in Tsarist or Bolshevik Russia were poor – but between the elite and the masses, are flirting again with ideologies and divisions some of us had thought discredited for ever by the horrors of the twentieth century. We were wrong, it seems. The Popular Isms, those insatiable old ghouls, are rising once again as people begin to forget that, as Orlando Figes says at the end of his book,</span><br data-dcnode-id="1768"><br data-dcnode-id="1767"><blockquote data-dcnode-id="1765"><span data-dcnode-id="1766" instrument_node="">The state, however big, cannot make people equal or better human beings. All it can do is to treat its citizens equally, and strive to ensure that their free activities are directed towards the general good. After a century dominated by the twin totalitarianisms of Communism and Fascism, one can only hope that this lesson has been learned.</span></blockquote><br data-dcnode-id="1764"><br data-dcnode-id="1763"><span data-dcnode-id="1762" instrument_node="">Read this book – it will not be easy, but read it anyway. You need to. We all need to.</span></span><span data-dcnode-id="1760" instrument_node="">

</span><span data-dcnode-id="1664" id="freeTextContainer10031014173486586682"><span data-dcnode-id="1671" instrument_node="">Orlando Figes is a British academic, historian and writer known for his works on Russian history. The </span><i data-dcnode-id="1669"><span data-dcnode-id="1670" instrument_node="">Financial Times</span></i><span data-dcnode-id="1668" instrument_node=""> has called Figes "the great storyteller of modern Russian historians." His first major book, </span><i data-dcnode-id="1666"><span data-dcnode-id="1667" instrument_node="">A People's Tragedy: The Russian Revolution: 1891-1924</span></i><span data-dcnode-id="1665" instrument_node="">, was published in 1996. The book garnered several literary and history awards, winning the Wolfson History Prize, the WH Smith Literary Award, the NCR Book Award, the Longman/History Today Book Prize, and the Los Angeles Times Book Pri</span></span><span data-dcnode-id="1663" instrument_node="">
</span><span data-dcnode-id="1606" id="freeText10031014173486586682" style="display:none"><span data-dcnode-id="1662" instrument_node="">Orlando Figes is a British academic, historian and writer known for his works on Russian history. The </span><i data-dcnode-id="1660"><span data-dcnode-id="1661" instrument_node="">Financial Times</span></i><span data-dcnode-id="1659" instrument_node=""> has called Figes "the great storyteller of modern Russian historians." His first major book, </span><i data-dcnode-id="1657"><span data-dcnode-id="1658" instrument_node="">A People's Tragedy: The Russian Revolution: 1891-1924</span></i><span data-dcnode-id="1656" instrument_node="">, was published in 1996. The book garnered several literary and history awards, winning the Wolfson History Prize, the WH Smith Literary Award, the NCR Book Award, the Longman/History Today Book Prize, and the Los Angeles Times Book Prize. Figes’ knowledge of Russia is impressive, and he has written a brilliant history of the Russian Revolution. Elaborately researched and logically argued, the book presents a comprehensive view of one of the most important and complicated of modern events.</span><br data-dcnode-id="1655"><br data-dcnode-id="1654"><span data-dcnode-id="1653" instrument_node="">In his book, Figes chronicles the history of the Russian Revolution from the devastating famine of 1891-1892 through to the death of Lenin in 1924, when "the basic elements of the Stalinist regime - the one-party state, the system of terror and the cult of the personality - were all in place". Figes begins with the great famine because it marked the beginning of both the peasant revolution and the awakening of the social conscience of the educated upper classes. It was the upper classes who then exerted pressure on the tsar to be more responsive to the people’s needs. A revolt of people in 1905 demanding an elected assembly forced the tsar to issue a manifesto on the establishment of a legislative Duma. This was followed, however, in 1906-07 by the failure of the dominant opposition party, the Constitutional Democrats—or Kadets—to compel the monarchy to accept a genuine constitution. The suicidal unwillingness of Tsar Nicholas to share power and his stubborn belief that his autocracy was divinely ordained is simply stunning. The failure of the Duma and the to benefit the peasants and workers through rule of law created a void that would eventually be occupied by the revolutionary parties. </span><br data-dcnode-id="1652"><br data-dcnode-id="1651"><i data-dcnode-id="1649"><span data-dcnode-id="1650" instrument_node="">“The Provisional Government was a government of persuasion. Not having been elected by the people, it depended largely on the power of the word to establish its authority. [The members of the Provisional Government] … believed that the primary duty of the February Revolution was to educate the people in their civic rights and duties.”</span></i><br data-dcnode-id="1648"><span data-dcnode-id="1647" instrument_node="">― Orlando Figes, A People's Tragedy: The Russian Revolution: 1891-1924</span><br data-dcnode-id="1646"><span data-dcnode-id="1645" instrument_node=""> </span><br data-dcnode-id="1644"><span data-dcnode-id="1643" instrument_node="">However, it was World War I that opened the door to the revolutionaries completely. Peasants were mobilized by the millions to fight (and die) in the war, only to have it tragically mismanaged. Russia appeared headed for defeat. Hunger, cold, war, along with the czar’s refusal to share power and the Duma’s paralysis led to the February Revolution of 1917, when long-standing discontent with the monarchy erupted into mass protests against food rationing in Petrograd (present-day Saint Petersburg), then the capital of Russia. This discontent unexpectedly brought the monarchy down and confronted the Duma, now organized as a provisional government.</span><br data-dcnode-id="1642"><br data-dcnode-id="1641"><i data-dcnode-id="1639"><span data-dcnode-id="1640" instrument_node="">“For the Romanov regime fell under the weight of its own internal contradictions. It was not overthrown.”</span></i><br data-dcnode-id="1638"><span data-dcnode-id="1637" instrument_node="">― Orlando Figes, A People's Tragedy: The Russian Revolution: 1891-1924</span><br data-dcnode-id="1636"><br data-dcnode-id="1635"><i data-dcnode-id="1633"><span data-dcnode-id="1634" instrument_node="">"With the Russian Empire teetering on the brink of collapse, the tsarist regime responded to the crises with its usual incompetence and obstinacy. The basic problem was that Nicholas himself remained totally oblivious to the extremity of the situation. While the country sank deeper into chaos he continued to fill his diary with terse and trivial notes on the weather, the company at tea and the number of birds he had shot that day. When Bulygin suggested that political concessions might be needed to calm the country, Nicholas was taken aback and told the Minister: 'One would think you are afraid a revolution will break out.' 'Your majesty,' came the reply, 'the revolution has already begun."</span></i><br data-dcnode-id="1632"><span data-dcnode-id="1631" instrument_node="">― Orlando Figes, A People's Tragedy: The Russian Revolution: 1891-1924</span><br data-dcnode-id="1630"><br data-dcnode-id="1629"><span data-dcnode-id="1628" instrument_node="">The Bolsheviks, a radical, far-left, and revolutionary Marxist faction founded by Vladimir Lenin, moved into this volatile situation. But the Bolshevik Party at the time was more of a restless mass movement than the monolithic organization, obedient to the leader’s commands, that it later became. The Bolsheviks seized power in October. Figes describes the Bolsheviks’ seizure of power in this way:</span><br data-dcnode-id="1627"><br data-dcnode-id="1626"><i data-dcnode-id="1624"><span data-dcnode-id="1625" instrument_node="">“There was of course no master plan to this—everything was improvised, as it had to be in a revolution—yet Lenin, at least, had an instinctive sense of the general direction, of what he himself called the ‘revolutionary dialectic,’ and in many ways that was the essence of his political genius. Local Soviet rule in the countryside, which was in effect the unfettered power of the village assembly to rule itself and divide the gentry’s land, would undermine the need for the [democratically elected] Constituent Assembly in the minds of the peasants and thus destroy the political base of the SRs [peasant-oriented socialists]. The exercise of ‘workers’ control’ through the factory committee would help to dismantle the old industrial infrastructure—what the Bolsheviks called the ‘capitalist system'—while shifting the blame for the industrial crises to the workers themselves [thus justifying party control]. The spread of soldiers’ power and of local peace initiatives at the front, which the Bolsheviks encouraged, would undermine the plans of the old army commanders to mobilize the troops against the new regime and restart the war. Eighty years earlier, the anarchist Michael Bakunin, drawing directly on Hegel, had put the same ‘revolutionary dialectic’ in an aphorism: ‘The desire to destroy is also a creative desire.’ ”</span></i><br data-dcnode-id="1623"><span data-dcnode-id="1622" instrument_node="">― Orlando Figes, A People's Tragedy: The Russian Revolution: 1891-1924</span><br data-dcnode-id="1621"><br data-dcnode-id="1620"><span data-dcnode-id="1619" instrument_node="">The Bolshevik seizure of power led to a civil war with the Whites between 1918 and 1920, and the Bolsheviks’ revolution gave way to the dictatorial centralization of the new Soviet state. Factory committees were replaced by single managers monitored by the party. Soon all industry and commerce were nationalized and placed under the control of the Supreme Economic Council. Determined to avoid the fate of the Paris Commune, the Bolsheviks created a military dictatorship to combat peasant anarchy through the planned control of the industrial and agricultural economy. Figes maintains that the Bolsheviks came to power only by revolution, but they retained power only by centralizing it and ruthlessly using terror to wipe out opposition parties.</span><br data-dcnode-id="1618"><br data-dcnode-id="1617"><span data-dcnode-id="1616" instrument_node="">Figes’ writing style seeks to balance important events with their impact on individuals—a style used to great effect by Max Hastings in his book </span><i data-dcnode-id="1614"><span data-dcnode-id="1615" instrument_node="">Inferno: The World at War, 1939-1945</span></i><span data-dcnode-id="1613" instrument_node="">. Figes balances the revolution's great personalities with the stories of a few individuals of average importance as a means of describing what real people did in the course of the revolution. Figes incorporates the diaries and letters of select individuals with the political narrative. This attention to the human aspect of the revolution allows us to see how the fabric of a society was ripped apart. Some examples include Prince George Lvov, leader of his zemstvo (elected local administration) who winds up with the Whites, only to die as an emigre in Paris. Also included is General Alexis Brusilov, who served the czar, then the provisional government and, finally, the Red Army. The proletarian writer and intellectual Maxim Gorky, who at one time closely associated himself with Vladimir Lenin, left Russia to escape the increasingly repressive atmosphere and eventually wound up a prisoner under Stalin. Figes also follows the peasant Semen Kanatchikov from the village to the factory, to Marxism and Bolshevism. </span><br data-dcnode-id="1612"><br data-dcnode-id="1611"><span data-dcnode-id="1610" instrument_node="">While Figes gets high marks for his research, he is not a good enough writer to bring these people fully to life. At times, the book becomes monotonous. Another weakness of the book is Figes’ arrogance. While his book is an enormous accomplishment, he is at times overbearing, petty and patronizing. He writes as though his book were definitive. He is at his most outlandish when he argues small points with American academic and author Richard Pipes.</span><br data-dcnode-id="1609"><br data-dcnode-id="1608"><span data-dcnode-id="1607" instrument_node="">The greatest contribution of Figes is to capture something of the sheer magnitude of the revolutionary force. He provides an extraordinary and comprehensive explanation not only of why the revolution occurred, but why it turned out the way it did. His insight into the Russian people is impressive. Another key contribution is his presentation of the revolution as destructive and debasing rather than as creative and liberating. Figes’ Russian Revolution thus turns out to be the tragedy of a people shaped by that people.</span></span><span data-dcnode-id="1605" instrument_node="">
</span><a data-dcnode-id="1603" data-text-id="10031014173486586682" href="#" onclick="swapContent($(this));; return false;"><span data-dcnode-id="1604" instrument_node="">...more</span></a><span data-dcnode-id="1602" instrument_node="">

</span><span data-dcnode-id="1530" id="freeTextContainer16672466524712091821"><span data-dcnode-id="1531" instrument_node="">Orlando Figes is a social historian nonpareil. He can summon up the world of pre-revolutionary Russia like no writer I've read. His descriptions of the peasant world of "Icons and Cockroaches," of the Tsarist army where soldiers were whipped and had to memorize intricate addresses for every possible superior, of the socialist underground where the new intelligentsia embraced the "cult of the bomb and the gun," where "murder and the scaffold took on a magnetic charm," as one of their own said, al</span></span><span data-dcnode-id="1529" instrument_node="">
</span><span data-dcnode-id="1518" id="freeText16672466524712091821" style="display:none"><span data-dcnode-id="1528" instrument_node="">Orlando Figes is a social historian nonpareil. He can summon up the world of pre-revolutionary Russia like no writer I've read. His descriptions of the peasant world of "Icons and Cockroaches," of the Tsarist army where soldiers were whipped and had to memorize intricate addresses for every possible superior, of the socialist underground where the new intelligentsia embraced the "cult of the bomb and the gun," where "murder and the scaffold took on a magnetic charm," as one of their own said, all provide the reader with a stark picture of a society on the edge of destruction. </span><br data-dcnode-id="1527"><br data-dcnode-id="1526"><span data-dcnode-id="1525" instrument_node="">The Russian revolution was a social revolution, so having such a historian trace the broad-based changes that happened in just a few years gives the reader an insight lacking in most histories of the event. Formerly quiescent peasant villages or "mirs" drove off the local squires, reappropriated their land, and formed little councils or "Soviets" managed by young, literate peasants, only to have these Soviets taken over by Bolshevik functionaries and turned into collective farms. The army itself became filled with soldier Soviets that voted on actions and leaders, only to have Trotsky and his Red Army re-establish the unquestioned dominance of the generals. The intelligentsia, such as the writer Maxim Gorky, that once celebrated the revolution watched their new overloads close down their presses and ban their books. Figes both shows how radical all types of Russians could be during the ferment, and how repressive and traditional the new Communist government was once it had attained power.</span><br data-dcnode-id="1524"><br data-dcnode-id="1523"><span data-dcnode-id="1522" instrument_node="">The Russian revolution, of course, was not just an amorphous social revolt, but was shaped by a handful of powerful leaders on both sides, such as Tsar Nicholas and Alexandra, General Brusilov on the European Front, Lenin, Trotsky, the intellectual Social Revolutionary Chernov,the Menshevik opposition leader Martov, and many others. Figes has more trouble with these characters and with the straightforward narrative of the revolution. He cannot simply explain a story in chronological order, but must always veer back and forth across so many people and places the tale becomes impossible to follow. </span><br data-dcnode-id="1521"><br data-dcnode-id="1520"><span data-dcnode-id="1519" instrument_node="">So parts of this book deserve all of the celebration it has received, while I wish others had a sharper editorial hand. I can say, however, there's nothing else out there like it, and that reading it is an amazing and worthwhile experience.</span></span><span data-dcnode-id="1517" instrument_node="">

</span><span data-dcnode-id="1415" id="freeText18375525044681297022" style="display:none"><span data-dcnode-id="1422" instrument_node="">This is a painful read for a number of reasons. </span><br data-dcnode-id="1421"><br data-dcnode-id="1420"><span data-dcnode-id="1419" instrument_node="">First and foremost, it does not spare you with detail of how badly people suffered during this period. Life became very, very cheap. It demonstrates that wholesale slaughter of Jewish communities was not invented by the Nazis. It also firmly places Bolshevism in the same life-denying, destructive category as fascism and National Socialism, linking it to a philosophy, born out of the blood of the first World War, that the next stage in evolution was to turn people into cogs in a vast state machine that would render terms such as individuality, happiness and creativity meaningless. It is a reminder of why, in 1948, the Universal Declaration of Human Rights had to be written following a period of history where human lives were squandered in their millions by totalitarian dreams of national and ideological supremacy. </span><br data-dcnode-id="1418"><br data-dcnode-id="1417"><span data-dcnode-id="1416" instrument_node="">Figes is very readable and despite it being a doorstep of a book, it is not hard to get through. Recommended.</span></span><span data-dcnode-id="1414" instrument_node="">
