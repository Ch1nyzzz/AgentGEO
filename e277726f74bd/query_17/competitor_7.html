</span><span data-dcnode-id="1336" id="freeTextContainer393260154204670801"><span data-dcnode-id="1340" instrument_node="">I found Orlando Figes' "A People's Tragedy" to be an excellent introduction on the topic of the Russian Revolution. Before proceeding, however, I would like to point out that this massive 800-page masterpiece can only be considered "introductory" by a professional historian or a history buff like myself. Therefore, this book is not really recommended for everyone.</span><br data-dcnode-id="1339"><br data-dcnode-id="1338"><span data-dcnode-id="1337" instrument_node="">I am ashamed to admit, but I had very little knowledge of the Russian Revolution prior to the reading of this book. What is undoubtedl</span></span><span data-dcnode-id="1335" instrument_node="">
</span><span data-dcnode-id="1300" id="freeText393260154204670801" style="display:none"><span data-dcnode-id="1334" instrument_node="">I found Orlando Figes' "A People's Tragedy" to be an excellent introduction on the topic of the Russian Revolution. Before proceeding, however, I would like to point out that this massive 800-page masterpiece can only be considered "introductory" by a professional historian or a history buff like myself. Therefore, this book is not really recommended for everyone.</span><br data-dcnode-id="1333"><br data-dcnode-id="1332"><span data-dcnode-id="1331" instrument_node="">I am ashamed to admit, but I had very little knowledge of the Russian Revolution prior to the reading of this book. What is undoubtedly one of the most important events of the 20th century is largely ignored in history books of Eastern European education systems such as the one I grew up under. While it was previously glorified and misrepresented, today it is shunned and unrepresented. The people prefer to cast this period aside and pretend it never happened. I am strongly against such forgetting of history (which, as Walter Benjamin reminds us, is always in danger) and I started reading this book because I wanted to know more about this crucial event.</span><br data-dcnode-id="1330"><br data-dcnode-id="1329"><span data-dcnode-id="1328" instrument_node="">What appealed to me the most about this book is certainly the quality of the narrative. It is emotional, colorful and very engaging. I could spend hours lost in the world of pre-revolutionary Russia that Figes has painted so masterfully. In fact, I had to read it in small doses over the course of a couple of months so as not to let it overwhelm me. If I had read it as much and as passionately as I originally intended, this would've certainly been detrimental for my grades this semester. </span><br data-dcnode-id="1327"><br data-dcnode-id="1326"><span data-dcnode-id="1325" instrument_node="">Figes covers a period from the Great Famine of 1891, which saw the first great social upheaval in Russia caused by the Tsarist government's incompetence. He ends with Lenin's death in 1924, a point at which, he argues, all the crucial elements of the Stalinist regime were already put into place. This does not mean that Figes sides with the dull and reductionist "totalitarian" narrative, which has been dominant in the West for the past 25 years (and is being put to good use politically by equalizing Fascism and Communism). Nevertheless, he does seem to fall into this trap in the concluding chapter, but in many respects, he is not really off the mark in the cases when he equates the two. The more accurate description is that he is standing on the edge, with one foot in the totalitarian narrative, and the other in a more down-to-earth observation. Fortunately, the latter foot seems to hold ground much stronger. Although he shows a significant degree of sympathy towards Lenin by the end of the book (especially his Testament, which was mean to stop Stalin's rise to power), he is nevertheless a vocal opponent of the early authoritarianism of the Bolsheviks. He does recognize the difference between Lenin and Stalin, but he also points out that it was in fact Lenin who abolished democracy, effectively dissolved the Soviets and founded the omnipotent and infamous Cheka (which was completely based on the Tsarist Okhrana and which formed a state within a state). If it hadn't been for these key policies, Stalin's rise to power would've been much less likely. This would mean merely preventing the tragedy of the Soviet gulag state in the 1930s; not the possibility of a true "people's democracy". As Figes demonstrates, the Soviet state would not have been more "democratic" if Trotsky or Bukharin had taken over; it would merely have been less authoritarian. It is a fact that many on the Left to this day would prefer to ignore or outright deny (as was demonstrated by Pravda-style Bolshevik pamphleteers who denounce him as a "liberal" on many of the Marxist websites I have visited).</span><br data-dcnode-id="1324"><br data-dcnode-id="1323"><span data-dcnode-id="1322" instrument_node="">Unlike other liberal authors from the West, he manages to avoid the typically patronizing attitude and stereotypes of the "Asiatic" or "backwards" nature of the Russians as the cause of Bolshevism. Although he does recognize that Russia's backwardness had much to do with the rise of Lenin's autocracy, he does not see it as inherent in the Russian people. His approach is much more Hegelian (although I have a feeling he would dislike the label), as he recognizes that Russia was at a particular stage in development. The country had no democratic culture whatsoever and was still effectively semi-feudal at the time of the Revolution. This of course had much to do with the sheer idiocy of the last two Tsars.</span><br data-dcnode-id="1321"><br data-dcnode-id="1320"><span data-dcnode-id="1319" instrument_node="">Here, Figes arrives at the most interesting and in my opinion most important point of the book: Russia was ripe for socialism. Even though it was feudal, Russia was in fact in a state of class struggle. Needless to say, it was the wealthy landowners waging the war and they were very good at winning for a while. Of course, this was not a conscious process. The social and psychological gap between the rich and the poor in Russia was immense. The behavior of Russian nobility before the Revolution makes Marie Antoinette's statement "Let them eat cake" (which she in fact never said) sound like a genuine expression of concern and social awareness compared to it. Figes is adamant to proclaim that the main cause of the Revolution is the incredible stupidity and incompetence of Tsar Nicholas II and the people surrounding him. "The Red Terror", while legitimized by the Bolsheviks, had already started without their proclamation. Mark Twain, reflecting on the French Revolution, spoke of "the two Reigns of Terror": the brief terror of the Jacobins and the long terror of the corrupt and reactionary monarchy. "What is the horror of swift death by the axe, compared with lifelong death from hunger, cold, insult, cruelty, and heart-break?" Nowhere is this statement more true than in pre-1917 Russia. The peasant's anger over their masters was overwhelming. As soon as they had the opportunity, they started "looting the looters". This violence would've been inevitable, considering the horror the Russian peasant went through. Bolsheviks were only there to put a state stamp on it with the Cheka. It was a true expression of Nietzschean "ressentiment". Every single institution - the Duma, the military, the Orthodox Church, the Tsar - has failed the majority population of peasants. At its best, like the Duma, it was inefficient and impotent. At its worst, like the Tsar, it was destructive and murderous.</span><br data-dcnode-id="1318"><br data-dcnode-id="1317"><span data-dcnode-id="1316" instrument_node="">The tragedy of the Revolution does lie in dogmatic Marxism. However, Figes suggests that it was not Bolsheviks who were the dogmatics. At least in the beginning, it was their pragmatism and the ability to respond to the needs of the greatest number of people that led to their rise to power. Their platform was 'bread and peace'. Although neither were in fact granted (Lenin actually anxiously anticipated the beginning of the civil war), this was all that the people really wanted. The democratic socialist forces - the Mensheviks and the SRs - did not provide this. It was THEIR dogmatic Marxism that was detrimental. They kept the Marxist Hegelian dogma of the need for Russia to go through capitalism and parliamentary democracy. What Marx did not anticipate is what Marxists frequently refer to as the "amelioration of the class conflict" in the West. The Western capitalists essentially realized that the people would turn Jacobin on them if they don't improve the working conditions. In fact, the 20th century social democracy and Keynesianism owe much of their success to the Russian Revolution. This is evident when we observe the post-1989 decline of social democracy and the welfare state in Europe (a process that was intensified by the 2008 Crisis). When the Tsarist censor foolishly approved the publication of Das Kapital in Russia in 1872, they claimed that "very few people in Russia will read it, and even fewer will understand it." Although this was certainly a bad decision, it is true that no one in Russia understood Das Kapital. The capitalists throughout Europe understood very well the message of Karl Marx's theory and potential practice. The Russian nobility and the sad minority which could actually be considered 'bourgeois' did not. Marxist theory only applies to societies where the social inequality is so great and society has deteriorated to such a degree that it truly seems as if an open war between classes was taking place. By 1918, this was not exactly the case in many European countries (or at least many did not see it in such a way), but it was definitely the case in Russia. The Tsar could not even rally the Russian peasants under the idea of nationality (which was very foreign to them, being a pre-modern society), let alone that of loyalty to himself. They really only wanted 'bread and peace'. In more scientific terms, they wanted the redistribution of land and an end to Russia's involvement in the Great War. Bolsheviks were the only ones willing to grant this. The Mensheviks and the SRs had multiple chances to grant all power to the Soviets (yet another slogan that was later hijacked by the Bolsheviks and subsequently betrayed) between February and October of 1917. Nevertheless, they stuck to the dogma of the need for capitalism and thus let down the people who supported them in the ousting of the Tsar. If they had decided to do otherwise, perhaps Russia would've had a much more democratic, self-managing, bottom-up version of socialism, and the history of the 20th century would have been a lot different. Figes goes as far as to suggest that the Civil War would have been much shorter and less bloody if a true Soviet Revolution had taken place. In fact, much of the fighting of the Civil War was between the Bolsheviks and the democratic Left. The Tsarist/proto-fascist White Army, whose ideology (if they had anything other than the longing for "the good old days") was outdated and completely unappealing to the vast majority of the population. The Whites were ousted from Crimea by fall of 1920. The Civil War went on until fall of 1922. This testifies more than anything about the purported "counter-revolutionary" character of the many forces that the Bolsheviks fought in the Civil War.</span><br data-dcnode-id="1315"><br data-dcnode-id="1314"><span data-dcnode-id="1313" instrument_node="">A lot of this had to do with Lenin's impulsiveness and authoritarianism. Gustav Flaubert said that "inside every revolutionary there is a policeman" (a point which will be elaborated and made more scientific by Jacques Lacan in the 1960s). Lenin was the epitome of this statement. Perhaps the only admirable thing about Lenin is the energy and power of a single man to change history. A boring and superficial individual, he dedicated his entire life to the Revolution. He showed little interest in art, other than works of Gorky. He had no career, no passions, no interests, other than being a professional revolutionary. He managed to sway an entire Party and take control of the largest country in the world. When he first suggested that Russia is ready for socialism, the Central Committee thought that he had gone mad. Nevertheless, he managed to persuade them and take power in a matter of weeks. If nothing else, one has to admire his dedication. He is probably one of the rare individuals who managed to have such a profound and comprehensive impact on human history. While most of the 20th century experiments were Marxist in name, they were Leninist in practice. Those that weren't, like Allende's Chile, Catalan anarchists and the Spartacists in Germany, were unfortunately too short-lived to make a real impact.</span><br data-dcnode-id="1312"><br data-dcnode-id="1311"><span data-dcnode-id="1310" instrument_node="">The foremost political lesson we can learn from the story of Lenin and the Bolsheviks is more of a call for caution than inspiration. It teaches us that in times of crisis, it is not those with best intentions that will come to power. Rather, it will be the most organized, and very often, most extreme. The case of Islamist takeovers in Arab countries after the Arab Spring serves as a more recent testimony of this.</span><br data-dcnode-id="1309"><br data-dcnode-id="1308"><span data-dcnode-id="1307" instrument_node="">All in all, as the title suggests, the Russian Revolution was a true people's tragedy. It was a disaster on a gargantuan scale and one of the first truly "modern" tragedies (although it shouldn't be forgotten that the first typically modern atrocities such as mass expulsions and genocide were perpetrated by "pre-modern" empires - the ones of the Romanovs and the Ottomans). 1917 Russia was in a complete state of anomie, frustration, fear and horror that could have only ended in a disaster. Although Russians today (especially those on the Right) like to see themselves as "victims" of Bolshevism, it is an undeniable fact that Bolshevism was an authentic product of the unique situation that Russia found itself in at the time. It was also the best answer to the needs of the majority of the population. </span><br data-dcnode-id="1306"><br data-dcnode-id="1305"><span data-dcnode-id="1304" instrument_node="">Every single aspect of the Russian Revolution is a tragedy. As such, Figes shows little compassion for either Bolsheviks or the Tsarists. Instead his compassion is focused on personal stories of everyday lives affected by the Revolution. He tells their stories with great care. The love he feels for every single one of these characters matches the love a novelist feels for his characters. These people range from ordinary peasants like the progressive socialist Sergey Semenov and his arch-nemesis, the conservative elder Maliutin, to well-known figures such as Maxim Gorky and Aleksei Brusilov. He gathers the people from the Left and the Right side of the spectrum alike, but he gives them an equal treatment. It is only through these personal stories that one can fully understand the Revolution. The constructed and dehumanizing communities of the Reds and the Whites do not suffice. There is no Red or White in humanity.</span><br data-dcnode-id="1303"><br data-dcnode-id="1302"><span data-dcnode-id="1301" instrument_node="">The extraordinary book of Orlando Figes challenges common prejudices regarding the Revolution from both the Left and the Right. I have found it eye-opening in many regards. I have very little objections to this book, and those that I have usually concern particularities rather than the more fundamental points of the book. It is a work of remarkable depth and insight. I suggest to anyone who has actually bothered to read this review all the way up to this point to go and read the book. There are certainly many layers to it that I have failed to cover in this review, and probably some that have escaped my attention altogether.</span></span><span data-dcnode-id="1299" instrument_node="">

</span><span data-dcnode-id="1182" id="freeTextContainer11332171520186413413"><span data-dcnode-id="1189" instrument_node="">Trigger warnings: literally anything you can possibly think of, it's about the Russian Revolution... </span><br data-dcnode-id="1188"><br data-dcnode-id="1187"><span data-dcnode-id="1186" instrument_node="">I have been meaning to read this book for NINETEEN YEARS NOW. My year 12 history teacher read us some rather graphic excerpts that have been lodged in my brain since, like, August of 2000. So I finally picked it up and read it cover to cover, and frankly? I was a little disappointed. </span><br data-dcnode-id="1185"><br data-dcnode-id="1184"><span data-dcnode-id="1183" instrument_node="">Yes, it's a very detailed discussion of the Revolution and it would have taken a truly staggering amount of resear</span></span><span data-dcnode-id="1181" instrument_node="">
</span><span data-dcnode-id="1167" id="freeText11332171520186413413" style="display:none"><span data-dcnode-id="1180" instrument_node="">Trigger warnings: literally anything you can possibly think of, it's about the Russian Revolution... </span><br data-dcnode-id="1179"><br data-dcnode-id="1178"><span data-dcnode-id="1177" instrument_node="">I have been meaning to read this book for NINETEEN YEARS NOW. My year 12 history teacher read us some rather graphic excerpts that have been lodged in my brain since, like, August of 2000. So I finally picked it up and read it cover to cover, and frankly? I was a little disappointed. </span><br data-dcnode-id="1176"><br data-dcnode-id="1175"><span data-dcnode-id="1174" instrument_node="">Yes, it's a very detailed discussion of the Revolution and it would have taken a truly staggering amount of research to create this. But there are elements of it that felt repetitive and others that assumed a prior level of knowledge that I just flat out didn't have. </span><br data-dcnode-id="1173"><br data-dcnode-id="1172"><span data-dcnode-id="1171" instrument_node="">Like I said, I've studied the Russian Revolution, so it's not like I was going in blind. But there's something about Figes' writing where he almost glosses over the roles of particular people and organisations as though the reader should either know who they are or remember who they are from 300 pages earlier. Nicholas II disappears from the story around page 350, and then pops up again on page 635. You'd think it would be pretty damned hard to forget who the Tsar was. And yet, when I finished a section about the Checka and the Left SRs and suddenly jumped to "After his abdication in March 1917, Nikolai Romanov (as he was now called)..."? I honestly went "Wait, who? Ohhhhhh." </span><br data-dcnode-id="1170"><br data-dcnode-id="1169"><span data-dcnode-id="1168" instrument_node="">And that definitely wasn't the only time that happened. Maybe it was because I seemed to consistently pick this up after midnight and endeavour to read a 50-75 page chapter before turning the light out. Maybe it was because I'd built it up so much in my head over the past 19 years. But I mostly just found this...dry. Those gory bits my history teacher read us? Those were basically the most interesting sections in the entire book. Sigh... </span></span><span data-dcnode-id="1166" instrument_node="">

        </span><span class="staticStars notranslate" data-dcnode-id="1098" title="it was amazing"><span class="staticStar p10" data-dcnode-id="1103" size="15x15"><span data-dcnode-id="1104" instrument_node="">it was amazing</span></span><span class="staticStar p10" data-dcnode-id="1102" size="15x15"></span><span class="staticStar p10" data-dcnode-id="1101" size="15x15"></span><span class="staticStar p10" data-dcnode-id="1100" size="15x15"></span><span class="staticStar p10" data-dcnode-id="1099" size="15x15"></span></span><span data-dcnode-id="1097" instrument_node="">

</span><span data-dcnode-id="1088" id="freeTextContainer14089597777321931579"><span data-dcnode-id="1092" instrument_node="">Simply fantastic, and especially because it continues past 1918 through Lenin's death and the start of Stalinism. And, as of the time I write this review, the 1918-20 period of the civil war is quite valuable in re the current Russia-Ukraine conflict.</span><br data-dcnode-id="1091"><br data-dcnode-id="1090"><span data-dcnode-id="1089" instrument_node="">I’ll confess to not reading all of this book, and I’ll explain why. Knowing the end date, I wanted something that looked hefty enough to cover the ground of the two revolutions, including their playout in Ukraine, plus the Civil War, plus the NEP af</span></span><span data-dcnode-id="1087" instrument_node="">
</span><span data-dcnode-id="1049" id="freeText14089597777321931579" style="display:none"><span data-dcnode-id="1086" instrument_node="">Simply fantastic, and especially because it continues past 1918 through Lenin's death and the start of Stalinism. And, as of the time I write this review, the 1918-20 period of the civil war is quite valuable in re the current Russia-Ukraine conflict.</span><br data-dcnode-id="1085"><br data-dcnode-id="1084"><span data-dcnode-id="1083" instrument_node="">I’ll confess to not reading all of this book, and I’ll explain why. Knowing the end date, I wanted something that looked hefty enough to cover the ground of the two revolutions, including their playout in Ukraine, plus the Civil War, plus the NEP after War Communism. And Figes delivers in spades.</span><br data-dcnode-id="1082"><br data-dcnode-id="1081"><span data-dcnode-id="1080" instrument_node="">The chapter that starts with Brusilov and the Summer Offensive, then moves to the Kornilov-Kerensky showdown is just about exactly at the midpoint. Figes shows how a V.N. Lvov, no relation to the prince, expanded on Kerensky’s message to Kornilov and basically set him up. So, Kornilov said, “if you’re going to declare me a rebel, I’ll be one.” </span><br data-dcnode-id="1079"><br data-dcnode-id="1078"><span data-dcnode-id="1077" instrument_node="">This is the best portrait I’ve read of Kerensky, including showing his Napoleonic complex in all its shabby detail. It probably shows why he had no interest in the proposed Stockholm Peace Conference and was fine with the Allies blocking their social democrat parties from attending — if they even wanted to.</span><br data-dcnode-id="1076"><br data-dcnode-id="1075"><span data-dcnode-id="1074" instrument_node="">One point about Prince Lvov, before he stepped down from heading the Provisional Governemnt, I’d not read before. He urged the government to make terms with the other nationalities, speciflcally the emerging first Ukrainian Republic. And it did not.</span><br data-dcnode-id="1073"><br data-dcnode-id="1072"><span data-dcnode-id="1071" instrument_node="">Figes is arguably at his best in showing the playout of the civil war in Ukraine, with Russian Whites and Don Cossacks making an uneasy alliance. Nestor Makhno (had never heard of him before, like the “other” Lvov) and his Blacks were in almost as uneasy an alliance with the Reds. Meanwhile, Greens, peasants who attempted their own degree of political organization if and when savvy enough, were also in the mix.</span><br data-dcnode-id="1070"><br data-dcnode-id="1069"><span data-dcnode-id="1068" instrument_node="">Figes also notes how, even before cancelling the Constituent Assembly because the Left Social Revolutionaries won a plurality, despised the Russian peasant for backwardness, superstition and alleged intractability. Early on, they were willing to crush them, as soon as they didn’t need them co-opted against the Whites. Class warfare was stoked to empower them, and to crush the rural gentry before the Bolsheviks crushed them.</span><br data-dcnode-id="1067"><br data-dcnode-id="1066"><span data-dcnode-id="1065" instrument_node="">Also, Figes reminds that the Soviets and the Bolsheviks were not the same. Essentially, Lenin decided he had to co-opt the Soviets and call the November revolution before the All-Russian Congress met. And, Lenin, and other Bolsheviks’ attitude toward factory workers wasn’t much better than toward peasants. By the end of 1918, already, they were replacing Soviet worker cooperative factory management with Bolshevik-imposed factory managers. In all of this, Stalin didn’t go that much beyond Lenin, Figues says. </span><br data-dcnode-id="1064"><br data-dcnode-id="1063"><span data-dcnode-id="1062" instrument_node="">Also, Lenin getting the Tenth Party Congress in 1921 to pass a ban on factions made the Central Committee the ruler of the party and thus of Russia. And, gave Stalin a tool.</span><br data-dcnode-id="1061"><br data-dcnode-id="1060"><span data-dcnode-id="1059" instrument_node="">Figes also takes the Left Socialist Revolutionaries to task. At times like the Kaplan assassination attempt on Lenin, they weren’t prepared to act, and weren’t ready to think outside the box of the Russian version of “rule of law,” and were in general idealists.</span><br data-dcnode-id="1058"><br data-dcnode-id="1057"><span data-dcnode-id="1056" instrument_node="">In his conclusion, Figes says that, given what Nicholas II did to pull the rug out from under the Duma in particular and democratic reform in general after the Revolution of 1905 had faded, the liberals of the first revolution in 1917 had no chance.</span><br data-dcnode-id="1055"><br data-dcnode-id="1054"><span data-dcnode-id="1053" instrument_node="">Figes does have a stumble or two, not huge, in the next to last chapter. Darwin, unlike Huxley, did not believe in “materialist determination” of human nature. It’s arguable that the eugenics half of Nazism DID have Enlightenment connections. After all, it DOES go back to Plato. And “Robot” entered English from Czech, not Russian. And, that one is well known.</span><br data-dcnode-id="1052"><br data-dcnode-id="1051"><span data-dcnode-id="1050" instrument_node="">(I intend to expand this review even further at my blog, along with some alternative history questions Figes provoked.)</span></span><span data-dcnode-id="1048" instrument_node="">

</span><span class="readable" data-dcnode-id="934" id="reviewTextContainer2692637949"><span data-dcnode-id="966" instrument_node="">
</span><span data-dcnode-id="961" id="freeTextContainer14550278944474673739"><span data-dcnode-id="965" instrument_node="">Well there goes my faith in humanity. </span><br data-dcnode-id="964"><br data-dcnode-id="963"><span data-dcnode-id="962" instrument_node="">I thought the length of this book would be daunting, but it was actually very well paced and highly readable - what I wasn't prepared for was the emotional weight of it. Near the end of this book the author notes that 7 years of war had cheapened human life in Russia to the point of people simply ignoring dead bodies in the streets. Besides all the political aspects of this history, the reality on the ground is an onslaught of violence and human suffering. A</span></span><span data-dcnode-id="960" instrument_node="">
</span><span data-dcnode-id="939" id="freeText14550278944474673739" style="display:none"><span data-dcnode-id="959" instrument_node="">Well there goes my faith in humanity. </span><br data-dcnode-id="958"><br data-dcnode-id="957"><span data-dcnode-id="956" instrument_node="">I thought the length of this book would be daunting, but it was actually very well paced and highly readable - what I wasn't prepared for was the emotional weight of it. Near the end of this book the author notes that 7 years of war had cheapened human life in Russia to the point of people simply ignoring dead bodies in the streets. Besides all the political aspects of this history, the reality on the ground is an onslaught of violence and human suffering. Approximately 10 million people die during this time, and a few of those are recounted in vivid detail. At that scope, it's horror beyond imagining.</span><br data-dcnode-id="955"><br data-dcnode-id="954"><span data-dcnode-id="953" instrument_node="">It doesn't help that the 30-odd years dealt with in this history are bookended by famine and Tsarist excesses on one side and more famine and Stalin's murderous regime on the other. No happy endings.</span><br data-dcnode-id="952"><br data-dcnode-id="951"><span data-dcnode-id="950" instrument_node="">Beyond the violence, this is a fascinating history to be sure, and many of the figures discussed (in good detail) here echo throughout history - the last Tsar Nicholas, the 'mad monk' Rasputin, the visionaries of Lenin, Trotsky, the idealists of Prince Lvov and Gorki, among many others are fascinating personalities and touch on so much of what makes not only Russia but humanity as a whole captivating. </span><br data-dcnode-id="949"><br data-dcnode-id="948"><span data-dcnode-id="947" instrument_node="">I've always wondered why communist icons and symbols are sold on the streets here in Berlin as tourist fodder, while Nazi symbols are banned outright. Both regimes are responsible for so much misery in the world that it seems odd to give the soviet symbols the green light. But then, at their core those Soviet symbols spawned from an ideology of hope and belief in something better, even if it was fated to morph into something terrible. Similarly, Lenin seems to get a free pass as "not that bad" despite being a dictator and his role in causing so much suffering - it seems that history can only smile on you when you are compared to the absolute worst tyrants to ever have lived.</span><br data-dcnode-id="946"><br data-dcnode-id="945"><span data-dcnode-id="944" instrument_node="">A people's tragedy was an excellent read and I feel it's also a very important one. As the passing of time entrenches foregone regimes deeper into the annals of history, we run the risk of isolating the ideal from the reality and forgetting just what regimes such as Soviet communism (and even fascism) really meant to live through. </span><br data-dcnode-id="943"><br data-dcnode-id="942"><span data-dcnode-id="941" instrument_node="">If we cannot collectively learn from the mistakes of the past, the suffering of so many people is rendered truly meaningless.</span><br data-dcnode-id="940"></span><span data-dcnode-id="938" instrument_node="">

</span><div class="stacked" data-dcnode-id="239" tyle="padding-bottom:15px"><span data-dcnode-id="251" instrument_node="">
</span><span class="readable" data-dcnode-id="249"><span data-dcnode-id="250" instrument_node="">“The link between literacy and revolutions is a well-known historical phenomenon. The three great revolutions of modern European history -- the English, the French and the Russian -- all took place in societies where the rate of literacy was approaching 50 per cent. Literacy had a profound effect on the peasant mind and community. It promotes abstract thought and enables the peasant to master new skills and technologies, Which in turn helps him to accept the concept of progress that fuels change in the modern world.”</span></span><span data-dcnode-id="248" instrument_node="">
</span><nobr data-dcnode-id="243"><span data-dcnode-id="247" instrument_node="">
