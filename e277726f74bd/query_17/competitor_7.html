</span><span data-dcnode-id="5610" id="freeText5992640625087284530" style="display:none"><div data-dcnode-id="5611"><span data-dcnode-id="5621" instrument_node="">
</span><p data-dcnode-id="5613"><span data-dcnode-id="5620" instrument_node="">It is history on an epic yet human scale. Vast in scope, exhaustive in original research, written with passion, narrative skill, and human sympathy, </span><b data-dcnode-id="5618"><span data-dcnode-id="5619" instrument_node="">A People's Tragedy</span></b><span data-dcnode-id="5617" instrument_node=""> is a profound account of the Russian Revolution for a new generation. Many consider the Russian Revolution to be the most significant event of the twentieth century. Distinguished scholar Orlando Figes presents a panorama of Russian society on the eve of that revolution, and then narrates the story of how these social forces were violently erased. Within the broad stokes of war and revolution are miniature histories of individuals, in which Figes follows the main players' fortunes as they saw their hopes die and their world crash into ruins. Unlike previous accounts that trace the origins of the revolution to overreaching political forces and ideals, Figes argues that the failure of democracy in 1917 was deeply rooted in Russian culture and social history and that what had started as a people's revolution contained the seeds of its degeneration into violence and dictatorship. </span><b data-dcnode-id="5615"><span data-dcnode-id="5616" instrument_node="">A People's Tragedy</span></b><span data-dcnode-id="5614" instrument_node=""> is a masterful and original synthesis by a mature scholar, presented in a compelling and accessibly human narrative.</span></p><span data-dcnode-id="5612" instrument_node="">

              </span><a class="actionLinkLite" data-dcnode-id="4784" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.goodreads.com/review/list/1232712-matt%3Fshelf%3Drussian-history"><span data-dcnode-id="4785" instrument_node="">russian-history</span></a><span data-dcnode-id="4783" instrument_node="">

</span><div class="reviewText stacked" data-dcnode-id="4697"><span data-dcnode-id="4778" instrument_node="">
</span><span class="readable" data-dcnode-id="4699" id="reviewTextContainer1277741483"><span data-dcnode-id="4777" instrument_node="">
</span><span data-dcnode-id="4774" id="freeTextContainer6019464333454427997"><b data-dcnode-id="4775"><span data-dcnode-id="4776" instrument_node="">“The Russian Revolution launched a vast experiment in social engineering – perhaps the grandest in the history of mankind. It was arguably an experiment which the human race was bound to make at some point in its evolution, the logical conclusion of humanity’s historic striving for social justice and comradeship. Yet born as it was of the First World War, when Europe had been brought to the brink of self-destruction, it was also one that many people believed was essential at the time…The experim</span></b></span><span data-dcnode-id="4773" instrument_node="">
</span><span data-dcnode-id="4704" id="freeText6019464333454427997" style="display:none"><b data-dcnode-id="4771"><span data-dcnode-id="4772" instrument_node="">“The Russian Revolution launched a vast experiment in social engineering – perhaps the grandest in the history of mankind. It was arguably an experiment which the human race was bound to make at some point in its evolution, the logical conclusion of humanity’s historic striving for social justice and comradeship. Yet born as it was of the First World War, when Europe had been brought to the brink of self-destruction, it was also one that many people believed was essential at the time…The experiment went horribly wrong, not so much because of the malice of its leaders, most of whom had started out with the highest ideals, but because their ideals were themselves impossible…”</span></b><br data-dcnode-id="4770"><span data-dcnode-id="4769" instrument_node="">-	Orlando Figes, </span><i data-dcnode-id="4767"><span data-dcnode-id="4768" instrument_node="">A People’s Tragedy: The Russian Revolution, 1891-1924</span></i><span data-dcnode-id="4766" instrument_node=""> </span><br data-dcnode-id="4765"><br data-dcnode-id="4764"><span data-dcnode-id="4763" instrument_node="">As one of the epochal moments in history, the story of the Russian Revolution has been told in many places, in many different ways. Like other great revolutions in history, it was messy, bloody, and complex, and its full meaning has been debated ever since. </span><br data-dcnode-id="4762"><br data-dcnode-id="4761"><span data-dcnode-id="4760" instrument_node="">The title of Orlando Figes’s </span><i data-dcnode-id="4758"><span data-dcnode-id="4759" instrument_node="">A People’s Tragedy</span></i><span data-dcnode-id="4757" instrument_node=""> gives you a pretty good indication of his angle of approach to this huge subject. You don’t pick up a book like this with the notion that it’s going to be filled with newborn puppies, ice cream-giveaways, and people finding rolled-up-and-forgotten twenty-dollar bills in their pockets. More specifically, you are not going to find any moral shrugging at the cost of the Russian Revolution, or any glib notions that you can’t effect massive societal change without a bit of slaughter. This is 824-pages of small font despair, as the Russian people move from ruthless and ordered autocracy to ruthless and unordered Revolution, before finally settling on a ruthless Soviet government as dictatorial and arbitrary as anything seen under the Tsars. </span><br data-dcnode-id="4756"><br data-dcnode-id="4755"><span data-dcnode-id="4754" instrument_node="">Contained between these two covers are all the things my wife tells me are not appropriate “small talk” for dinner parties: War as waged by balmy idealists, fools, and crypto-dictators; the attendant butchery of that war as waged by the same; revolution and upheaval and the attendant carnage, as idealism turns to fanaticism. There is famine, torture, capriciousness, shortsightedness, disloyalty, backstabbing and betrayal, execution and murder. This is the kind of book from which I had to take several breaks. I just couldn’t push all the way through. The tragedy is so big. The font is so tiny. </span><br data-dcnode-id="4753"><br data-dcnode-id="4752"><span data-dcnode-id="4751" instrument_node="">Helpfully, the book is broken into manageable parts, allowing me to dip in and out whenever I needed a dose of perspective. Figes opens his narrative beautifully, with a Barbara Tuchman-like set-piece that describes the 300-year anniversary of Romanov rule over all the Russias. He then circles back to give a brief overview of that spotted reign, before devoting approximately the next 150 pages to the workings of Russia under the Tsar Nicholas II (fondly and aptly described by historian Margaret MacMillan as the ideal village postmaster). From there, we follow the revolution that caused the fall of Nicholas; the rise of the Provisional Government; the revolution that toppled that interim authority; and finally the slide into civil war. </span><br data-dcnode-id="4750"><br data-dcnode-id="4749"><span data-dcnode-id="4748" instrument_node="">Of all the characters of this saga, I found Nicholas II to be among the most fascinating, simply because he was so manifestly unsuited to being an autocrat in charge of one of the hugest, most powerful empires on earth. Part of him never seemed to want the job, and to learn about Nicholas is to learn of a man who loved and doted on his family, filled his diary with the most insipid banalities imaginable, and probably could’ve lived a long and immeasurably happier life by retiring to a faraway dacha. Frankly, I wouldn’t trust him to manage my slow-pitch softball team. </span><br data-dcnode-id="4747"><br data-dcnode-id="4746"><span data-dcnode-id="4745" instrument_node="">Despite his equivocations, however, he fiercely guarded his powers. When his people wanted an inch, he gave them a centimeter. Eventually, his people took a mile. By the time he realized his destiny was to be an average man, a good father, a caring husband, and a somnolent diarist, it was far too late. </span><br data-dcnode-id="4744"><br data-dcnode-id="4743"><span data-dcnode-id="4742" instrument_node="">The second part of the book, covering the years from 1891-1917, is devoted to the Tsar’s gradual erosion in authority. A disastrous war against Japan, a social revolution, and many unforced errors served to weaken the monarchy. In 1914, Franz Ferdinand was assassinated, and Russia suddenly found itself the linchpin of history: their choice to mobilize or not, to support Serbia or not, is one of the biggest factors in the July Crisis tipping towards general European war. Nicholas’s choice to go to war kind of feels like a troubled couple deciding to have a child to save a bad marriage. </span><i data-dcnode-id="4740"><span data-dcnode-id="4741" instrument_node="">Hey, maybe if we go to war, all the people will love me again!</span></i><span data-dcnode-id="4739" instrument_node="">. </span><br data-dcnode-id="4738"><br data-dcnode-id="4737"><span data-dcnode-id="4736" instrument_node="">It didn't work that way. </span><br data-dcnode-id="4735"><br data-dcnode-id="4734"><span data-dcnode-id="4733" instrument_node="">The story of Tsar Nicholas’s abdication, his imprisonment in Ekaterinburg’s House of Special Purpose, and his (and his family’s) murder is a familiar story, and Figes does not spend much time on this death pageant. Instead, in the book’s third section, he takes a deep dive into the workings and failures of the Provisional Government, and the plotting and scheming of the Bolshevik takeover.</span><br data-dcnode-id="4732"><br data-dcnode-id="4731"><span data-dcnode-id="4730" instrument_node="">In telling this, Figes takes pains to present many points of view. There is the obvious focus on the big names – Lenin, Trotsky, Gorky – and rightfully so. But he also finds peasants and workingmen – and peasants who became workingmen – to demonstrate how the Revolution began from the bottom up, and where it got its support. He makes an admirable attempt to follow certain people throughout the entire process, tracing their personal fortunes along with the ebb and flow of the wider historical moments. (Unsurprisingly, many of these people’s stories end dismally). </span><br data-dcnode-id="4729"><br data-dcnode-id="4728"><span data-dcnode-id="4727" instrument_node="">Figes also does not neglect to mention Rasputin’s penis: </span><br data-dcnode-id="4726"><br data-dcnode-id="4725"><blockquote data-dcnode-id="4723"><span data-dcnode-id="4724" instrument_node="">Rasputin’s assassin and alleged homosexual lover, Felix Yusupov, claimed that his prowess was explained by a large wart strategically situated on his penis, which was of exceptional size. On the other hand, there is evidence to suggest that Rasputin was in fact impotent and that while he lay naked with many women, he had sex with very few of them. In short, he was a great lecher but not a great lover. When Rasputin was medically examined after being stabbed in a failed murder attempt in 1914, his genitals were found to be so small and shriveled that the doctor wondered whether he was capable of the sexual act at all. Rasputin himself had once boasted to the monk Iliodor that he could lie with women without feeling passion because “his penis did not function.”</span></blockquote><br data-dcnode-id="4722"><br data-dcnode-id="4721"><span data-dcnode-id="4720" instrument_node="">History: It’s in the details!</span><br data-dcnode-id="4719"><br data-dcnode-id="4718"><span data-dcnode-id="4717" instrument_node="">While the third part of </span><i data-dcnode-id="4715"><span data-dcnode-id="4716" instrument_node="">A People’s Tragedy</span></i><span data-dcnode-id="4714" instrument_node=""> is a rollercoaster, the fourth and final quarter is simply a downward plunge into brutal, unimaginably bloody civil war, followed by the initial formation of the Soviet system, which was to cause so much misery going forward. </span><br data-dcnode-id="4713"><br data-dcnode-id="4712"><span data-dcnode-id="4711" instrument_node="">When I first read this book, I did not know a ton about Russian history. Once Nicholas II was off the stage, I was in the wilderness, with many hundreds of pages left to go. Nevertheless, I never got lost, as Figes does a fantastic job of structuring this material. As I mentioned at the top, this is an extremely ambitious volume, striving for a certain level of comprehensiveness, and only ends in 1924, with Lenin dying, and the baton about to be passed to Georgian poet and former seminary student. </span><br data-dcnode-id="4710"><br data-dcnode-id="4709"><span data-dcnode-id="4708" instrument_node="">While this is eminently readable, it is still complex, and Figes is not dumbing anything down. He is more than talented enough as a writer to lead a relative novice through this thorny, convoluted, heavily-peopled period relatively unscathed. With that said, I don’t think this is an entry-level volume. It covers too much ground at too high a level to say that. What kept me glued to the page was Figes’s relentless focus on humanity. He doesn’t get lost in abstract political theorizing. Instead, he dwells on personalities and quirks and circumstances and tough choices and Rasputin’s penis, making this very human-oriented. One of the things that makes studying the Russian Revolution, Bolshevism, and Communism so difficult is the impenetrable Marxist terminology that serves the double purpose of providing a patina of intellectualism, while also obscuring the basic truths about what is happening. Figes strips that layer away. </span><br data-dcnode-id="4707"><br data-dcnode-id="4706"><span data-dcnode-id="4705" instrument_node="">This is a huge book befitting a huge subject, and Figes gives it the treatment it deserves. It is authored by that rare combination, an expert who can also write, making this both an academic and literary masterpiece. It took some patience – and Yellow Tail wine breaks – to complete, but it was well worth the effort.</span></span><span data-dcnode-id="4703" instrument_node="">

</span><span data-dcnode-id="4595" id="freeTextContainer5383585274425072097"><span data-dcnode-id="4596" instrument_node="">While I was halfway through this, an ‘inspirational quote’ from Lenin happened to come up on my reddit feed. Something from one of those early speeches, about equality for all. I left a comment to suggest – I thought quite mildly – that it was, perhaps, ethically questionable to be quoting with approbation someone responsible for the deaths of hundreds of thousands of people – only to be downvoted into oblivion by other users. ‘You're probably thinking about Stalin,’ said one. ‘Fuck off,’ clarif</span></span><span data-dcnode-id="4594" instrument_node="">
</span><span data-dcnode-id="4547" id="freeText5383585274425072097" style="display:none"><span data-dcnode-id="4593" instrument_node="">While I was halfway through this, an ‘inspirational quote’ from Lenin happened to come up on my reddit feed. Something from one of those early speeches, about equality for all. I left a comment to suggest – I thought quite mildly – that it was, perhaps, ethically questionable to be quoting with approbation someone responsible for the deaths of hundreds of thousands of people – only to be downvoted into oblivion by other users. ‘You're probably thinking about Stalin,’ said one. ‘Fuck off,’ clarified another. ‘Lenin was actually very socially liberal, and kept his word about democracy for the people.’</span><br data-dcnode-id="4592"><br data-dcnode-id="4591"><span data-dcnode-id="4590" instrument_node="">This would be the same Lenin who shut down Russia's constituent assembly, who sidelined trade unions and had striking workers shot for desertion, who turned the country into a police state, built a chain of concentration camps and institutionalised terrorism as a matter of deliberate policy. Painful to see him held up as a beacon of humanitarianism by people who apparently haven't even understood </span><i data-dcnode-id="4588"><span data-dcnode-id="4589" instrument_node="">Animal Farm</span></i><span data-dcnode-id="4587" instrument_node="">. It's interesting, though, because even when I was growing up the far left was always quite cool in a way that the far right never was; its unelectability made it harmless, and it gained a certain cachet from its opposition to a string of unpopular Tory governments and by association with various cult figures like Morrissey or Alexi Sayle. It was always kind of a joke. People referred to each other with smiles as ‘fellow travellers’, ‘old Trots’ – and still do.</span><br data-dcnode-id="4586"><br data-dcnode-id="4585"><span data-dcnode-id="4584" instrument_node="">There was a feeling I had when I was reading this book; an uncomfortable, itchy feeling which made me fidget while I was reading, shift in my seat and scratch my nose or my neck every few minutes as I turned the pages. Eventually I realised what this sensation was: hatred. I just loathed the people responsible for prosecuting this grotesque experiment. Now I realise this is, of course, a pathetically inadequate response, but partly it came from a kind of surprise. A feeling that they had somehow </span><i data-dcnode-id="4582"><span data-dcnode-id="4583" instrument_node="">got away with it</span></i><span data-dcnode-id="4581" instrument_node="">, that their reputations are nowhere near as dismal as they should be. At one point, Orlando Figes offers in passing a suggestion as to why this might be so:</span><br data-dcnode-id="4580"><br data-dcnode-id="4579"><blockquote data-dcnode-id="4577"><span data-dcnode-id="4578" instrument_node="">The Bolshevik programme was based on the ideals of the Enlightenment – it stemmed from Kant as much as from Marx – which makes Western liberals, even in this age of post-modernism, sympathise with it, or at least obliges us to try and understand it, even if we do not share its political goals; whereas the Nazi efforts to ‘improve mankind’, whether through eugenics or genocide, spat in the face of the Enlightenment and can only fill us with revulsion.</span></blockquote><br data-dcnode-id="4576"><br data-dcnode-id="4575"><span data-dcnode-id="4574" instrument_node="">And perhaps there's something in this: inasmuch as reality has (in Stephen Colbert's words) a liberal bias; inasmuch as we are living, historically speaking, in a leftist world, there is a sense in which the Communist experiment seems like something that </span><i data-dcnode-id="4572"><span data-dcnode-id="4573" instrument_node="">went wrong</span></i><span data-dcnode-id="4571" instrument_node="">, not something that was wrong inherently. But the enormities of Lenin's politics were built-in </span><i data-dcnode-id="4569"><span data-dcnode-id="4570" instrument_node="">ab initio</span></i><span data-dcnode-id="4568" instrument_node="">; terror, Figes writes, was ‘implicit in the regime from the start…the resort to rule by terror was bound to follow from Lenin's violent seizure of power and his rejection of democracy’. And despite all the slogans of equality and democracy, the turnaround was much faster than I had ever realised.</span><br data-dcnode-id="4567"><br data-dcnode-id="4566"><blockquote data-dcnode-id="4564"><span data-dcnode-id="4565" instrument_node="">None of the democratic organisations established before October 1917 survived more than a few years of Bolshevik rule, at least not in their democratic form. By 1921, if not earlier, the revolution had come full circle, and a new autocracy had been imposed on Russia which in many ways resembled the old one.</span></blockquote><br data-dcnode-id="4563"><br data-dcnode-id="4562"><span data-dcnode-id="4561" instrument_node="">The thousand pages of Figes's history give plenty of scope for examining in detail what this meant for Russian citizens. It isn't pretty but it is instructive. There was the Civil War, with widespread terror on both sides; famine, exacerbated by shitty agricultural policy; and eventually the tightening grip of a one-party state. There are moments of acute revulsion and misery, alongside a recurring sense of absurdity: at one point, currency depreciation becomes so severe that it costs more to print the rouble than the rouble is actually worth; the post and telegraph service have to be made free because the state is losing money by printing and charging rouble notes for them. ‘The situation was surreal – but then this was Russia,’ Figes remarks, showing a grasp of the irony which this story demands.</span><br data-dcnode-id="4560"><br data-dcnode-id="4559"><span data-dcnode-id="4558" instrument_node="">Whole books have been written, of course, about the failure of the left outside Russia to accept the reality of what was happening there under Communism, or to blame it on a perversion of noble principles. What's so rewarding, and upsetting, and moving about this book is that it illustrates how naturally the consequences followed from the initial conditions, and how unimportant the political debate is compared with its effects on real people. There, as the title of the book suggests, Figes's summary is blunt.</span><br data-dcnode-id="4557"><br data-dcnode-id="4556"><blockquote data-dcnode-id="4554"><span data-dcnode-id="4555" instrument_node="">Instead of being a constructive cultural force the revolution had virtually destroyed the whole of Russian civilisation; instead of human liberation it had merely brought human enslavement; and instead of the spiritual improvement of humanity it had led to degradation.</span></blockquote><br data-dcnode-id="4553"><br data-dcnode-id="4552"><span data-dcnode-id="4551" instrument_node="">What makes it worse is that this whole catalogue of misery is in some sense being positioned only as a prelude. Looming up over the narrative is the lengthening shadow of the Georgian, Ioseb Jughashvili, alias Stalin, and where this book ends his story is just beginning.</span><br data-dcnode-id="4550"><br data-dcnode-id="4549"><span data-dcnode-id="4548" instrument_node="">Although this was written twenty years ago, in some ways it's become more relevant than ever, and not just because next year marks the revolution's centenary. In an impassioned final chapter, Figes calls for urgent reevaluation of the political capitalism of the West, pointing out that extremist rhetoric of the sort that fuelled the Bolshevik party is periodically going to prove popular ‘as long as the mass of the ordinary people remain alienated from the political system and feel themselves excluded from the benefits of the emergent capitalism. Perhaps even more worrying,’ he adds, ‘authoritarian nationalism has begun to fill the void…’ Is this sounding familiar to anybody?</span></span><span data-dcnode-id="4546" instrument_node="">

</span><span data-dcnode-id="4495" id="freeText14396007678700442903" style="display:none"><span data-dcnode-id="4496" instrument_node="">I'm half way through this book, and I'm not reading it specifically as a critique of communism - it could have been a fascist dictatorship, or any other flavour of authoritarian dictatorship you can name. It's more a warning of what will happen if you have a brutalised and degraded population, leaders who are blindly intent on subjugating the masses and a normalisation of violence. The writing was on the wall in 1900, the attempt at democracy would always fail. How could you have a democracy where extreme violence was normal? It's important to not get hung up on the communism label because there is a danger it could happen again somewhere else, and it has happened in various countries, though not on the same scale.</span></span><span data-dcnode-id="4494" instrument_node="">

</span><span data-dcnode-id="4361" id="freeTextContainer2126652402986055610"><b data-dcnode-id="4373"><span data-dcnode-id="4374" instrument_node="">‭A People's Tragedy: The Russian Revolution 1891-1924, Orlando Figes</span></b><br data-dcnode-id="4372"><br data-dcnode-id="4371"><span data-dcnode-id="4370" instrument_node="">A People's Tragedy: The Russian Revolution: 1891–1924 is an award-winning book written by British historian Orlando Figes and published in 1996. </span><br data-dcnode-id="4369"><br data-dcnode-id="4368"><span data-dcnode-id="4367" instrument_node="">According to Figes </span><i data-dcnode-id="4365"><span data-dcnode-id="4366" instrument_node="">"... the whole of 1917 could be seen as a political battle between those who saw the revolution as a means of bringing the war to an end and those who saw the war as a means of bringing the revolution to an end."</span></i><br data-dcnode-id="4364"><br data-dcnode-id="4363"><span data-dcnode-id="4362" instrument_node="">تاریخ نخستین خوانش: روز بیست و نهم ماه آوریل سال 2011میل</span></span><span data-dcnode-id="4360" instrument_node="">
</span><span data-dcnode-id="4304" id="freeText2126652402986055610" style="display:none"><b data-dcnode-id="4358"><span data-dcnode-id="4359" instrument_node="">‭A People's Tragedy: The Russian Revolution 1891-1924, Orlando Figes</span></b><br data-dcnode-id="4357"><br data-dcnode-id="4356"><span data-dcnode-id="4355" instrument_node="">A People's Tragedy: The Russian Revolution: 1891–1924 is an award-winning book written by British historian Orlando Figes and published in 1996. </span><br data-dcnode-id="4354"><br data-dcnode-id="4353"><span data-dcnode-id="4352" instrument_node="">According to Figes </span><i data-dcnode-id="4350"><span data-dcnode-id="4351" instrument_node="">"... the whole of 1917 could be seen as a political battle between those who saw the revolution as a means of bringing the war to an end and those who saw the war as a means of bringing the revolution to an end."</span></i><br data-dcnode-id="4349"><br data-dcnode-id="4348"><span data-dcnode-id="4347" instrument_node="">تاریخ نخستین خوانش: روز بیست و نهم ماه آوریل سال 2011میلادی</span><br data-dcnode-id="4346"><br data-dcnode-id="4345"><span data-dcnode-id="4344" instrument_node="">عنوان: تراژدی مردم: انقلاب روسیه از سال 1891میلادی تا سال 1924میلادی؛ نویسنده: اورلاندو فایجس؛ مترجم: احد علیقلیان؛ تهران، نشر نی، سال1388؛ در دو مجلد؛ شابک دوره9789641850465؛ شابک جلد 1یک9789641850441؛ جلد 2دو9789641850458، موضوع تاریخ روسیه - نیکلای دوم - از سال 1891میلادی تا سال 1924میلادی از نویسندگان بریتانیا - سده 20م</span><br data-dcnode-id="4343"><br data-dcnode-id="4342"><span data-dcnode-id="4341" instrument_node="">داستان دو جلدی «تراژدی مردم»، روایت «اورلاندو فایجس»؛ استاد تاریخ دانشگاه «کمبریج»، از تحولات داخلی «روسیه»، در بین سالهای از سال1891میلادی تا سال1924میلادی است؛ </span><br data-dcnode-id="4340"><br data-dcnode-id="4339"><span data-dcnode-id="4338" instrument_node="">از دیدگاه «فایجس»، «انقلاب روسیه»، دستکم از نظر تاثیراتش بر دنیای پیرامونی، یکی از بزرگترین رخدادهای تاریخ جهان به شمار میآید؛ گستردگی و ژرفای این تاثیرگذاری، تا حدود دو دهه پیش نیز، مشاهده و احساس میشده است؛ نگارنده، برای نشان دادن دامنه ی انقلاب، به شیوه هایی اشاره میکند، که انقلاب با آنها جان انسانها را گرفت: دهها هزار نفر را، بمبها و گلوله های انقلابیون کشت، و دستکم همین تعداد پیش از سال1917میلادی، در سرکوب رژیم «تزاری»، جان باختند؛ </span><br data-dcnode-id="4337"><br data-dcnode-id="4336"><span data-dcnode-id="4335" instrument_node="">آن سالها هزاران نفر، در جنگهای خیابانی، جان خود را از دست دادند، صدها هزار نفر، در حکومت وحشت «سرخ»ها و طی سالهای پس از آن – اگر قربانیان قتل عام «یهودیان» را هم در نظر بگیریم – همین تعداد نیز، در حکومت وحشت «سفید»ها، به هلاکت رسیدند، بیش از یک میلیون تن، در جنگ داخلی کشته شدند، از جمله غیرنظامیان پشت جبهه، و با این همه، شمار مردمانیکه از گرسنگی، سرما و بیماری هلاک شدند نیز، از جمع اینها بیشتر بود؛ «فایجس»، روایت خود را از «انقلاب» از سال1891میلادی، که واکنش خیابانی مردم، به حکومت «تزار»، نسبت به بحران قحطی رخ داد، آغاز میکند، و در سال1924میلادی، که «لنین»، از دنیا میرود، به نگارگری پایان میدهد؛ یعنی زمانی که «انقلاب» به نقطه ی آغازین خود بازمیگردد، و نهادهای «استالینی» مستقر میشوند؛ </span><br data-dcnode-id="4334"><br data-dcnode-id="4333"><span data-dcnode-id="4332" instrument_node="">از دیدگاه نگارنده ی کتاب، لحظه هایی تعیین کننده پیش از انقلاب سال1917میلادی، و در طی آن، در تاریخ «روسیه» وجود داشت، که میتوانست سبب شود، «روسیه» راه دمکراتیکی را در پیش بگیرد، اما چنان نشد و هدف از نگارش «تراژدی مردم» نیز، تبیین همین موضوع است، که چرا انقلاب در هیچیک از لحظه های خود، آن مسیرها را طی نکرد؛ از دیدگاه استاد دانشگاه «کمبریج»؛ برهان شکست دمکراسی «روسیه» را، باید در فرهنگ سیاسی، و تاریخ اجتماعی آن جستجو نمود؛ </span><br data-dcnode-id="4331"><br data-dcnode-id="4330"><span data-dcnode-id="4329" instrument_node="">نبود نیروهای متعادل کننده ی دولت، در برابر استبداد «تزار»، شکنندگی جامعه ی مدنی «لیبرال»، عقب ماندگی مردمان در روستاهای «روسیه»، و خشک اندیشی روشنفکران تندرو «روسیه»، از جمله مولفه های این فرهنگ هستند؛ «فایجس»، در صدد بوده، تا نقش مردمان عادی را، به عنوان بازیگران اصلی نمایش انقلابی، برجسته سازد: «دهقانان»، «کارگران»، «سربازان»، و «اقلیتهای ملی، و قومی»، در این کتاب، به عنوان قربانیان انقلاب، معرفی نشده اند، بلکه خود جزو بازیگران اصلی نمایش بوده اند؛ نگارنده در تلاش برای تبیین تلویحی این نظریه، که مردمان، شایسته ی حاکمانی هستند، که بر آنان فرمان میرانند، نبوده و نیست، بلکه از: تایید نظریه های «کل به جزء»، که در آنها مردمان عادی، آلت دست بی اراده ی حکومتگران، شمرده میشوند هم گریزان است</span><br data-dcnode-id="4328"><br data-dcnode-id="4327"><span data-dcnode-id="4326" instrument_node="">ایشان با سود بردن از آثار نگارش شده ی غنی، و گسترده ای که در بایگانیهای دولتی، و شخصی موجود بوده، کوشیده، تا تصویری پیچیده تر، و باور پذیرتر از رابطه ی حزب با مردم، به خوانشگر خویش نشان دهند، و خیال «اصول کلی»، که «بلشویکها (اکثریتیها)» بر سرتاسر «روسیه»، تحمیل کرده اند را، بزداید؛ آنچه نام انقلابی مردمی به خود گرفت، سرانجامی جز سقوط، در بستر خشونت و دیکتاتوری، با خود به همراه نداشت؛ نگارنده ی کتاب، تنها به تحلیل عرصه ی عمومی نپرداخته اند، بلکه هر جا نیاز دیده اند، پای درد دل زندگی خصوصی آسیب دیدگان از جنگ، و انقلاب نیز، نشسته اند؛ دفترچه های خاطرات، نامه ها و دیگر نوشته های افراد نیز، جملگی به یاری نگارنده ی کتاب، برای سازماندهی روایتشان آمده اند؛ ایشان با دنبال کردن سرنوشت شخصیتها، خواسته اند، تا آشوبهای آن سالها را، به تصویر بکشند، آشوبهایی که با تراژدیهای ژرف انسانی همراه بودند، و رژه ی نیروهای نظامی، و ایدئولوژیهای اجتماعی- سیاسی، تنها نمایش لایه ی بیرونی آن بوده است</span><br data-dcnode-id="4325"><br data-dcnode-id="4324"><span data-dcnode-id="4323" instrument_node="">نگارش کتاب، شش سال به درازا انجامیده، و نخستین بار نگارنده آنرا در سال1995میلادی به پایان رسانیدند؛ کتاب در چهار بخش، و شانزده فصل، به سرانجام رسیده است؛</span><br data-dcnode-id="4322"><br data-dcnode-id="4321"><span data-dcnode-id="4320" instrument_node="">بخش نخست: در برگیرنده ی تاریخ روسیه، در دوره ی رژیم کهن است</span><br data-dcnode-id="4319"><br data-dcnode-id="4318"><span data-dcnode-id="4317" instrument_node="">بخش دوم: بحران قدرت در فاصله ی سالهای 1891م تا 1917میلادی را، مورد بررسی قرار میدهد</span><br data-dcnode-id="4316"><br data-dcnode-id="4315"><span data-dcnode-id="4314" instrument_node="">بخش سوم: روسیه در انقلاب، در فاصله ی ماه فوریه ی سال 1917میلادی تا ماه مارس سال 1918میلادی مبحث این بخش را تشکیل میدهد</span><br data-dcnode-id="4313"><br data-dcnode-id="4312"><span data-dcnode-id="4311" instrument_node="">بخش چهارم: جنگ داخلی و برپایی نظام شوروی، در فاصله ی سالهای 1918میلادی تا سال 1924میلادی در این بخش مورد بازنگری قرار گرفته است</span><br data-dcnode-id="4310"><br data-dcnode-id="4309"><span data-dcnode-id="4308" instrument_node="">کتاب با رخدادهای دوره ی «لنین» و ماجرای درگذشت ایشان به پایان راه خویش میرسد؛ نتیجه گیری، کتاب شناسی، نمایه و تصاویر تاریخی متعدد و دیدنی، ضمیمه ی مطالب اصلی کتاب است؛ «تراژدی مردم» مجموعه ای خواندنی برای علاقمندان به تحولات انقلاب «روسیه» به شمار میرود</span><br data-dcnode-id="4307"><br data-dcnode-id="4306"><span data-dcnode-id="4305" instrument_node="">تاریخ بهنگام رسانی 04/04/1400هجری خورشیدی؛ ا. شربیانی</span></span><span data-dcnode-id="4303" instrument_node="">

</span><span data-dcnode-id="4216" id="freeTextContainer18341938804786821978"><span data-dcnode-id="4220" instrument_node="">Recent memory, modern memory and then history - We are all living in recent memory. The oldest generation is the eye-witness to modern memory. When it passes on, we will begin to receive the history from the events and people of that generation without the influence of contemporary bias or dialectics.</span><br data-dcnode-id="4219"><br data-dcnode-id="4218"><span data-dcnode-id="4217" instrument_node="">It has been almost a hundred years since the Russian Revolution and Civil War. It is still too early for its pure history, but reliable narratives, unbound by predictable dialectics, are finally beg</span></span><span data-dcnode-id="4215" instrument_node="">
</span><span data-dcnode-id="4186" id="freeText18341938804786821978" style="display:none"><span data-dcnode-id="4214" instrument_node="">Recent memory, modern memory and then history - We are all living in recent memory. The oldest generation is the eye-witness to modern memory. When it passes on, we will begin to receive the history from the events and people of that generation without the influence of contemporary bias or dialectics.</span><br data-dcnode-id="4213"><br data-dcnode-id="4212"><span data-dcnode-id="4211" instrument_node="">It has been almost a hundred years since the Russian Revolution and Civil War. It is still too early for its pure history, but reliable narratives, unbound by predictable dialectics, are finally beginning to emerge.</span><br data-dcnode-id="4210"><br data-dcnode-id="4209"><span data-dcnode-id="4208" instrument_node="">Orlando Figes' version is not perfect, but it is one of best summaries available to get the average reader up to a moderate speed on a very complex subject. </span><br data-dcnode-id="4207"><br data-dcnode-id="4206"><span data-dcnode-id="4205" instrument_node="">After presenting an unsparing portrayal of the various layers of Russian society from 1891 up until Bloody Sunday 1905, Figes' Revolution of 1914 becomes but the inevitable, bloody result. What comes as a surprise to the reader is the deep depravity of the Russian soul. It is black, evil, and violent regardless of class or party affiliation. Sparing neither women nor children, it wantonly murders, tortures, rapes, pillages and executes without a drop of conscience.</span><br data-dcnode-id="4204"><br data-dcnode-id="4203"><span data-dcnode-id="4202" instrument_node="">This pitch black evil infected the souls of peasants and workers as well as generals, nobels, police and party apparatchiks. It consumed the Tsar and Tsarina as well as Lenin, Totsky and Stalin.</span><br data-dcnode-id="4201"><br data-dcnode-id="4200"><span data-dcnode-id="4199" instrument_node="">In the midst of these psychopaths, Figes follows a small handful of spectators such as Maxim Gorky and General Brusilov, the only WWI tsarist hero, who eventually supported the Reds because they were the peoples' choice. Those two somehow manage to maintain their balance, decency, objectivity and humanity while witnessing this terror unfold. </span><br data-dcnode-id="4198"><br data-dcnode-id="4197"><span data-dcnode-id="4196" instrument_node="">When Comrade Stalin's emissary Mercado paid a visit to Leon Trotsky at his Mexico City home to plunge an ice pick into his skull, one can only hope the Angel of Karma was singing a hymn in the exiled revolutionary's ear with Leon's very own words from the Revolution, "We must put an end, once and for all, to the papist-Quaker babble about the sanctity of human life." During the Revolution and Civil War, Trotsky, Lenin and Stalin did the very best that they could to abide by that dictum millions (literally) of heartless times with their cold-blooded signatures.</span><br data-dcnode-id="4195"><br data-dcnode-id="4194"><span data-dcnode-id="4193" instrument_node="">The Revolution and Civil War replaced a totalitarian monarchy with a totalitarian police state run by bureaucrats. The classes that were terrorized, oppressed and executed before are terrorized, oppressed and executed once again on an even larger scale. As one revolutionary bemoaned afterwards, "Lenin and the Bolsheviks did not establish a dictatorship to safeguard the revolution, they made a revolution to safeguard a dictatorship." Enter Comrade Stalin.</span><br data-dcnode-id="4192"><br data-dcnode-id="4191"><span data-dcnode-id="4190" instrument_node="">A basic understanding of the twentieth century requires a grasp of the Russian Revolution that left its immense footprints across World War II, the Cold War as well as the intellectual dialectics of labor and capital that have defined the many shades of politics we experience today.</span><br data-dcnode-id="4189"><br data-dcnode-id="4188"><span data-dcnode-id="4187" instrument_node="">"A People's Tragedy," is a very good start towards that understanding.</span></span><span data-dcnode-id="4185" instrument_node="">

</span><span data-dcnode-id="4095" id="freeTextContainer284604056698058784"><span data-dcnode-id="4096" instrument_node="">First, Figes briskly deals with all those things you thought you knew about the Russian Revolution, Lenin, Stalin, Trotsky, Kerensky - the liberals, the Bolsheviks, the Tsar. Again and again, I realized I had picked up myths either promoted by those who lost, or those who consolidated, the Revolution. The mythmaking machine was going full tilt from 1917 onwards (particularly during the Stalinist and Cold War Years) and this book would be irreplaceable if only for stripping away so much that you </span></span><span data-dcnode-id="4094" instrument_node="">
</span><span data-dcnode-id="4074" id="freeText284604056698058784" style="display:none"><span data-dcnode-id="4093" instrument_node="">First, Figes briskly deals with all those things you thought you knew about the Russian Revolution, Lenin, Stalin, Trotsky, Kerensky - the liberals, the Bolsheviks, the Tsar. Again and again, I realized I had picked up myths either promoted by those who lost, or those who consolidated, the Revolution. The mythmaking machine was going full tilt from 1917 onwards (particularly during the Stalinist and Cold War Years) and this book would be irreplaceable if only for stripping away so much that you thought you knew - which was wrong.</span><br data-dcnode-id="4092"><br data-dcnode-id="4091"><span data-dcnode-id="4090" instrument_node="">Second, by starting the book in 1891 (with a famine which revealed the incompetence of the Tsarist beaurocracy) and ending with the death of Lenin in 1924, Figes permits himself a sweep of events that makes what actually happened even more dramatic than it was. Again and again, you not only read about, but hear from the survivors of, mistakes, errors, misconceptions - indolence, arrogance, foolishness, well-meaning idiocy - in a way that, as a human being, is more than heartbreaking. Again and again, the Revolution might never have happened, a democracy might have developed, steps taken could have been taken back - but they weren't. Instead, one of the great mass tragedies of history occurred, and you feel like a helpless bystander, watching it happen.</span><br data-dcnode-id="4089"><br data-dcnode-id="4088"><span data-dcnode-id="4087" instrument_node="">This is remarkable history and it is an extraordinary achievement. It is bound to upset those with fixed ideologies on both the left and the right. If you ever read only one book on the Russian Revolution, make it this one.</span><br data-dcnode-id="4086"><br data-dcnode-id="4085"><span data-dcnode-id="4084" instrument_node="">The Communists are given heavy treatment in this text. Not only do we see how they came to power, we get huge doses of their philosophy. Figes gives a detailed examination of the intellectual currents that gave rise to the Communist movement, as well as their actions once they attained power. What emerges is a bleak picture. Communism is death to all it touches. The Bolsheviks sought to not only rule by dictatorship, but to change the very essence of man into an automaton subservient to the state. Figes shows the reader the Red Terror and some of the other methods the Bolsheviks used to try and bring about this subservience. It is a horrifying picture made worse, of course, under the rule of Stalin.</span><br data-dcnode-id="4083"><br data-dcnode-id="4082"><span data-dcnode-id="4081" instrument_node="">Figes maintains a fairly neutral perspective throughout the book, an apologist to neither the Tsar nor the Communists (though harboring a noticeable preference and remorse for the incompetent Provisional Government ). When he does show some bias, he is never overbearing, and the few opinions that he expresses do not detract in any way from the material.</span><br data-dcnode-id="4080"><br data-dcnode-id="4079"><span data-dcnode-id="4078" instrument_node="">The Tsar is portrayed as an incompetent and stubborn fool, which I have come away thinking is a fair assessment. Figes gives ample evidence for his conclusions, describing the failure of Nicholas to effectively rule over an inefficient and contradictory government.</span><br data-dcnode-id="4077"><br data-dcnode-id="4076"><span data-dcnode-id="4075" instrument_node="">I found the treatment of the Bolsheviks to be relatively sympathetic, and the book does not suffer because of it. They are depicted as a ruthless and especially fortunate revolutionary faction, a group ready to use any means necessary to obtain power but, in the end, given a gift with the success of their unlikely coup. Some readers may find this insufficiently damning but, while I would have liked a little more about how the nature of the revolution affected later developments, the abominable governance which followed is not Figes's topic.</span></span><span data-dcnode-id="4073" instrument_node="">

</span><span data-dcnode-id="3977" id="freeTextContainer2363267737799109141"><span data-dcnode-id="3981" instrument_node="">This is a remarkable book on the Russian Revolution. It’s coverage from 1891 thru 1924 is detailed, but very readable. We are presented with a wide panoply of characters; Tsar Nicholas II, Lenin, Prince Lvov, Kerensky, Gorky and many more. This gives a distinctive personal feeling where history is populated by real people and provides us with a ground view of the turbulent events of Russia. It’s a brutal history.</span><br data-dcnode-id="3980"><br data-dcnode-id="3979"><span data-dcnode-id="3978" instrument_node="">Sadly, there were periods during the Tsar’s rule and the first months after the 1917</span></span><span data-dcnode-id="3976" instrument_node="">
</span><span data-dcnode-id="3957" id="freeText2363267737799109141" style="display:none"><span data-dcnode-id="3975" instrument_node="">This is a remarkable book on the Russian Revolution. It’s coverage from 1891 thru 1924 is detailed, but very readable. We are presented with a wide panoply of characters; Tsar Nicholas II, Lenin, Prince Lvov, Kerensky, Gorky and many more. This gives a distinctive personal feeling where history is populated by real people and provides us with a ground view of the turbulent events of Russia. It’s a brutal history.</span><br data-dcnode-id="3974"><br data-dcnode-id="3973"><span data-dcnode-id="3972" instrument_node="">Sadly, there were periods during the Tsar’s rule and the first months after the 1917 revolution where the country seemed to be edging towards a democratic and liberal constitution – but this was thwarted time and again and fell back to authoritarianism, which to some extent seems ingrained in the Russian psyche. The author vividly portrays these figures for what they truly were – Nicholas was weak-kneed and never wanted anything to with democracy and liberalism – he hindered any attempts to proceed in that direction – falling back to a rigid domination was his rule-of thumb. Kerensky was the wrong man in the right place – in that small opening after the events of February 1917 there was a potential for parliamentarianism; but Kerensky was rudderless and a prima donna. Lenin knew what he wanted. Lenin was intolerant of any criticism and over time succeeded in establishing a strong centralist dictatorship. It was Lenin that made the Stalinist regime possible.</span><br data-dcnode-id="3971"><br data-dcnode-id="3970"><span data-dcnode-id="3969" instrument_node="">Throughout this period Russia was often in a state of virtual anarchy – particularly after the start of World War I where the country was not only combating external enemies, but at war with itself. After Lenin’s coup in October 1917, it was Lenin himself who precipitated these internal struggles against “enemies of the people” – war against the bourgeoisie, war against the peasants for allegedly hoarding foodstuffs, war against striking workers and of course the civil war (the Reds and the Whites –where often groups quickly switched allegiances).</span><br data-dcnode-id="3968"><br data-dcnode-id="3967"><span data-dcnode-id="3966" instrument_node="">The author gives us excellent depictions of the miserable and backward existence of the peasantry – and also how the urban cities were in a constant state of flux – revolution on the street, destitution and starvation.</span><br data-dcnode-id="3965"><br data-dcnode-id="3964"><span data-dcnode-id="3963" instrument_node="">One does come away with a view that Marxist-Leninist philosophy and dictums gave little credence to human rights and viewed the individual as subservient to the state. After all one of its principal slogans “Dictatorship of the Proletariat” has always emphasized “Dictatorship”. It hardly compares to the motto of the French revolution “Liberty, Equality, and Fraternity”.</span><br data-dcnode-id="3962"><br data-dcnode-id="3961"><span data-dcnode-id="3960" instrument_node="">The long authoritarianism of the Tsarist rulers gave way to an even more vicious dictatorship under Communism – where the rights of man were crushed under a Central government that stopped at nothing to implement state policies. If you wish to gain an insight into this key era of history this is definitely the book for you. One also comes away with an understanding of Russia and its vast land mass today. At over 800 pages it is lengthy but well worth it.</span><br data-dcnode-id="3959"><br data-dcnode-id="3958"></span><span data-dcnode-id="3956" instrument_node="">

</span><span data-dcnode-id="3863" id="freeTextContainer17702022852595441157"><span data-dcnode-id="3867" instrument_node="">What a Book!</span><br data-dcnode-id="3866"><br data-dcnode-id="3865"><span data-dcnode-id="3864" instrument_node="">A People’s Tragedy by Orlando Figes is a true masterpiece and despite its sheer size I will definitely be revisiting in the future. I have read other books by Figes and have always considered him to be a fantastic writer, he has a certain talent when it comes to placing ink on a page, which for me, places him on a parapet above most other authors or historians. However he is not without fault, he has been criticised for is mistakes with Russian, surely embarrassing for a specialist i</span></span><span data-dcnode-id="3862" instrument_node="">
</span><span data-dcnode-id="3845" id="freeText17702022852595441157" style="display:none"><span data-dcnode-id="3861" instrument_node="">What a Book!</span><br data-dcnode-id="3860"><br data-dcnode-id="3859"><span data-dcnode-id="3858" instrument_node="">A People’s Tragedy by Orlando Figes is a true masterpiece and despite its sheer size I will definitely be revisiting in the future. I have read other books by Figes and have always considered him to be a fantastic writer, he has a certain talent when it comes to placing ink on a page, which for me, places him on a parapet above most other authors or historians. However he is not without fault, he has been criticised for is mistakes with Russian, surely embarrassing for a specialist in Russian History. In addition to this, there is a scandal where he wrote negative reviews under a pseudonym on Amazon of books of other authors of Russian history. Putting this to one side, his talents are undeniable.</span><br data-dcnode-id="3857"><br data-dcnode-id="3856"><span data-dcnode-id="3855" instrument_node="">This book has been on my wish list for years and I don’t know I didn’t pick it up. This leaves a mixed emotion of regret and pleasure as I have now been able to experience it, much older, much wiser and with greater knowledge of Russian and world history. I feel it was due to the depressing nature of the content, after all it is not called ‘A People’s Tragedy’ without reason. The Russian Revolution is one of the great disasters of history and in reality the story does not have a happy ending.</span><br data-dcnode-id="3854"><br data-dcnode-id="3853"><span data-dcnode-id="3852" instrument_node="">Could all of this have been avoided? Figes explains that like all history it was not inevitable. The monarchy could have survived if it were not for the stubbornness and fear of reform of the courts of the last two Tsars. By 1917 it was politically dead, the irony being that Nicholas II would have been a great constitutional monarch. Great liberal statesmen such as Prince Levov and other Zemstvos could not hold back the rot once the cracks began to appear and unfortunately they were swept aside into historical oblivion.</span><br data-dcnode-id="3851"><br data-dcnode-id="3850"><span data-dcnode-id="3849" instrument_node="">The character of Lenin and the aims of the Bolsheviks are explained in great detail which show how this evil man with a lack of any love or interest in anything other than a political revolution was able to take control and bring about the deaths of thousands of people. It shows how they truly ‘stole’ a nation and through mistake after mistake of the Tsarist government, a disastrous world war and by their own good luck and chance they ended up being in the right place at the right time. However, such is history and this could be argued through many points in time. However, their regime, only brought incompetence, misery and death on scales never seen before.</span><br data-dcnode-id="3848"><br data-dcnode-id="3847"><span data-dcnode-id="3846" instrument_node="">I could write so much more on this subject and A People’s Tragedy itself, however I recommend you simply pick it and find out for yourself. The history of the Russian Revolution, a lesson we all must learn is delivered here in a perfect presentation for those on either side of the political spectrum from Monarchists to Stalinists alike. It is a balanced and fair view and even though a huge narrative (980 pages of text in my version of the book) leaves one hungry for more. Simply brilliant.</span></span><span data-dcnode-id="3844" instrument_node="">

</span><span data-dcnode-id="3757" id="freeTextContainer10187139434551469475"><span data-dcnode-id="3761" instrument_node="">This is a long and detailed book covering the Russian Revolution through 1924. This book is a really big investment if you are just learning about the topic. In retrospect, I would have been better off starting with reading something that gives a higher level picture. But the book was great. It is an impressive piece of work that methodically walks you through all the main characters and events in an engaging way.</span><br data-dcnode-id="3760"><br data-dcnode-id="3759"><span data-dcnode-id="3758" instrument_node="">I’m not sure what to say about it though. Right now I just feel overloaded with fac</span></span><span data-dcnode-id="3756" instrument_node="">
</span><span data-dcnode-id="3719" id="freeText10187139434551469475" style="display:none"><span data-dcnode-id="3755" instrument_node="">This is a long and detailed book covering the Russian Revolution through 1924. This book is a really big investment if you are just learning about the topic. In retrospect, I would have been better off starting with reading something that gives a higher level picture. But the book was great. It is an impressive piece of work that methodically walks you through all the main characters and events in an engaging way.</span><br data-dcnode-id="3754"><br data-dcnode-id="3753"><span data-dcnode-id="3752" instrument_node="">I’m not sure what to say about it though. Right now I just feel overloaded with facts I’m trying to absorb.</span><br data-dcnode-id="3751"><br data-dcnode-id="3750"><span data-dcnode-id="3749" instrument_node="">It’s so complicated and confusing. The downfall of the Tsars is easier to understand. There is a history of repression, failed promises, an inability to connect with ordinary peasants and workers, and ineffectual leaders. It’s not surprising that it didn’t last. It’s also not surprising that communism became popular, since it was a hot new idea emerging just next door in Germany that seemed to give some hope for people suffering under the repression of the Tsars.</span><br data-dcnode-id="3748"><br data-dcnode-id="3747"><span data-dcnode-id="3746" instrument_node="">Where it gets complicated is things like: the various left-wing factions that emerged, the infighting that happened within the same factions, how exactly the Bolsheviks ended up winning this battle, the relative perspectives and interactions of the peasants in the countryside and the workers in the city, the impact of the Russia-Japan War and WWI on the revolution, the aftermaths of each of the Revolutions in 1917 (the February and November revolutions), including the weird period in between when there was a power vacuum that no one really tried to take full advantage of, the messy Civil War that lasted until 1923, and the messy period at the end of Lenin’s life and the succeeding power struggle for leadership of the Party.</span><br data-dcnode-id="3745"><br data-dcnode-id="3744"><span data-dcnode-id="3743" instrument_node="">I don’t really understand much of this. One of the main characters that kept popping in and out of the story was Russian writer Maxim Gorky. His life seems like a symbol of how complicated, confusing, and tragic this period was. How the idealism of intellectuals was never realized, and instead barbarism followed. And how some individuals made choices that are very hard to understand through a modern-day lens.</span><br data-dcnode-id="3742"><br data-dcnode-id="3741"><span data-dcnode-id="3740" instrument_node="">Born in 1868, he grew up as an orphan living in the most destitute poverty you could imagine. As a young man he became a dreamy Marxist. He grew up in the squalor and meanness of the city and imagined the peasants as living in harmonious communes, and would be natural allies of the Communists. But after traveling to the countryside he learned that peasant life was really, really horrifying. Perhaps the most memorable part of the book is when Figes vividly describes the brutality of peasant life in Russia.</span><br data-dcnode-id="3739"><br data-dcnode-id="3738"><span data-dcnode-id="3737" instrument_node="">Gorky’s attitude towards the peasants soured, but he still felt sympathy for urban laborers, and kept believing that a Marxist revolution was the way forward to improve their lot. He wrote stories and became, as Figes describes, “A national celebrity. The first real writer of inequality to emerge from the urban underworld of migratory laborers, vagabonds, and thieves, which his stories represented with vividness and compassion.”</span><br data-dcnode-id="3736"><br data-dcnode-id="3735"><span data-dcnode-id="3734" instrument_node="">He became friends with Lenin and then became aligned to the Bolshevik movement. But, after the February Revolution in 1917, he feared the revolution would result in “savagery” and switched his support to the more moderate Alexander Kerensky. </span><br data-dcnode-id="3733"><br data-dcnode-id="3732"><span data-dcnode-id="3731" instrument_node="">But then months later he switched back again to support the hardline Bolsheviks. </span><br data-dcnode-id="3730"><br data-dcnode-id="3729"><span data-dcnode-id="3728" instrument_node="">But not long after, his fears of savagery were realized, and he again turned on the Bolsheviks, going as far as to call Lenin and Trotsky “tyrants” who “have become poisoned with the filthy venom of power”. He worked with other countries like the U.S. to obtain international aid for the 1921 famine, and then left the country, continuing to speak out against the Bolshevik’s terror programs.</span><br data-dcnode-id="3727"><span data-dcnode-id="3726" instrument_node=""> </span><br data-dcnode-id="3725"><span data-dcnode-id="3724" instrument_node="">But in 1928, Stalin somehow lured him back to the Soviet Union, and he served as a mouthpiece for his regime, even supporting Stalin’s terror programs. But then once again he turned, again feeling disillusioned. But this time, he wasn’t able to have any impact. He was sick and weak, and the control of the State was more complete over what people could hear and read. When he died, Stalin turned his life and works into propaganda symbols for the state.</span><br data-dcnode-id="3723"><br data-dcnode-id="3722"><span data-dcnode-id="3721" instrument_node="">What a confusing and sad life. What a painful tragedy the revolution and its aftermath was for the Russian people. </span><br data-dcnode-id="3720"></span><span data-dcnode-id="3718" instrument_node="">

</span><span data-dcnode-id="3622" id="freeTextContainer16376781017795973389"><span data-dcnode-id="3626" instrument_node="">This is at one and the same time a very long book and a fascinating one. As a exhaustive study of Russian history from the reign of Nicholas II to the death of Lenin, it is epic in its sweep. The only reasons I could not find it in me to give it five stars are the following:</span><br data-dcnode-id="3625"><br data-dcnode-id="3624"><span data-dcnode-id="3623" instrument_node="">[1] Orlando Figes has developed a reputation for controversy. First, he wrote reviews for Amazon.Com under an assumed name (Birkbeck) in which he excoriated competing writers on Russian history, blaming them at first on his w</span></span><span data-dcnode-id="3621" instrument_node="">
</span><span data-dcnode-id="3595" id="freeText16376781017795973389" style="display:none"><span data-dcnode-id="3620" instrument_node="">This is at one and the same time a very long book and a fascinating one. As a exhaustive study of Russian history from the reign of Nicholas II to the death of Lenin, it is epic in its sweep. The only reasons I could not find it in me to give it five stars are the following:</span><br data-dcnode-id="3619"><br data-dcnode-id="3618"><span data-dcnode-id="3617" instrument_node="">[1] Orlando Figes has developed a reputation for controversy. First, he wrote reviews for Amazon.Com under an assumed name (Birkbeck) in which he excoriated competing writers on Russian history, blaming them at first on his wife. Secondly, in his most recent work, he has been assailed for misrepresentations and gross inaccuracies. Both of these events came after the 1997 publication of </span><b data-dcnode-id="3615"><span data-dcnode-id="3616" instrument_node="">A People's Tragedy: A History of the Russian Revolution</span></b><span data-dcnode-id="3614" instrument_node="">, which seemed to this unsophisticated reader as a work displaying an admirable sense of balance.</span><br data-dcnode-id="3613"><br data-dcnode-id="3612"><span data-dcnode-id="3611" instrument_node="">[2] The last third of the book about the Civil War showed some exhaustion in its composition. There were so many parties over and above the Reds and the Whites, including the Komuch, the Don Cossacks, Makhno's Ukrainian partisans, Petliura's partisans -- to name just a few. Also, there were at least a dozen occasions when Figes would suddenly conclude that the main reason the Whites lost was A or B or C ... down to Z. All were convincing reasons, but they led to a loss of focus in this section.</span><br data-dcnode-id="3610"><br data-dcnode-id="3609"><span data-dcnode-id="3608" instrument_node="">[3] This is not something I usually complain about -- and it has nothing to do with Figes at all -- but Viking, the publisher. For some reason, the number one was shown as a capital "I." Hence, monstrosities such as the year I9I9. Also in the Italic font used, the letter "b" and the letter "h" were indistinguishable. Hence the word </span><i data-dcnode-id="3606"><span data-dcnode-id="3607" instrument_node="">burzhooi</span></i><span data-dcnode-id="3605" instrument_node="">, Russian for bourgeois, looks more like </span><i data-dcnode-id="3603"><span data-dcnode-id="3604" instrument_node="">burzbooi</span></i><span data-dcnode-id="3602" instrument_node=""> whenever it appears.</span><br data-dcnode-id="3601"><br data-dcnode-id="3600"><span data-dcnode-id="3599" instrument_node="">In the end, I think that Figes has done an admirable job compacting more than thirty years of turbulent history, broken into four epochs (Tsarism, the February Revolution, the October Revolution, and the Civil War), into merely 824 pages. Also, I think his conclusions are by and large on the mark:</span><blockquote data-dcnode-id="3597"><span data-dcnode-id="3598" instrument_node="">But Russia's prospects as a democratic nation depend to a large extent on how far the Russians are able to confront their own recent history; and this must entail the recognition that, however much the people were oppressed by it, the Soviet system grew up in Russian soil. It was the weakness of Russia's democatic culture which enabled Bolshevism to take root. This was the legacy of Russian history, of centuries of serfdom and autocratic rule, that had kept the common people powerless and passive. 'And the people remained silent' was a Russian proverb -- and it describes much of Russian history. To be sure, this was a people's tragedy but it was a tragedy which they helped to make. The Russian people were trapped by the tyranny of their own history.</span></blockquote><span data-dcnode-id="3596" instrument_node="">Ah, well, I guess the book deserves four and a half stars. It kept me on the edge of my toes for eleven long days of reading the book.</span></span><span data-dcnode-id="3594" instrument_node="">

</span><span data-dcnode-id="3389" id="freeTextContainer4054913107905629185"><span data-dcnode-id="3390" instrument_node="">Orlando Figes’ A People’s Tragedy is perhaps the greatest single-volume history (at least in English) of the 20th Century’s signature cataclysm, the Russian Revolution. Figes painstakingly recreates the stratification of late Tsarist Russia: the disconnect between the poverty and starvation of the peasantry and workers and the aristocratic elite remains jaw-dropping even in our day and age. Poverty and squalor crushed the country’s lower classes, enforced shockingly casual violence inflicted by </span></span><span data-dcnode-id="3388" instrument_node="">
</span><span data-dcnode-id="3380" id="freeText4054913107905629185" style="display:none"><span data-dcnode-id="3387" instrument_node="">Orlando Figes’ A People’s Tragedy is perhaps the greatest single-volume history (at least in English) of the 20th Century’s signature cataclysm, the Russian Revolution. Figes painstakingly recreates the stratification of late Tsarist Russia: the disconnect between the poverty and starvation of the peasantry and workers and the aristocratic elite remains jaw-dropping even in our day and age. Poverty and squalor crushed the country’s lower classes, enforced shockingly casual violence inflicted by the state, landowners or each other. Thus, Figes shows, the last half-century of Romanov rule hosted escalating atrocities: government repression led to bombings and assassinations; token reforms by tsars and their advisers only strengthened terrorists, whose misdeeds only triggered more oppression. After 1905′s abortive revolution, Imperial Russia saw its final chance to stem the cataclysm. But Nicholas II, a dimwitted autocrat who never questioned his monarchical privileges, granted the most meager of concessions: a Duma with no power, reforms that benefited workers little. This, in turn, emboldened extremists: reactionaries like the Tsar-funded Black Hundreds escalated violence against Jews, liberals and minorities, while the Left grew increasingly convinced that peaceful solutions were impossible. Thus the Bolsheviks, a fringe group of radical socialists led by Lenin and Trotsky, became increasingly powerful. Liberals and moderate socialists offered promises of democratic reform that, in this context, were entirely unrealistic. And when Russia embarked on the disastrous First World War, the collapse of the Romanov Dynasty became only a matter of time.</span><br data-dcnode-id="3386"><br data-dcnode-id="3385"><span data-dcnode-id="3384" instrument_node="">Figes renders this dense subject matter lucid and engaging; his prose is able and he laces the narrative with dry wit and colorful characterizations of Russian figures. The book alternates searching portraits of Nicholas, his family and their advisers; military leaders Brusilov, Kornilov and Kolchak; ill-fated liberals Stolypin and Kerensky; Bolsheviks Lenin, Trotsky and Stalin; along with ordinary peasants, farmers, soldiers, workers and bourgeoisie caught in the tumult. This book ably captures how the Revolution affected all levels of Russian society, from the high politics of Red October to the starvation and suffering in the countryside. The promise of the Provisional Government gave way to the brutality of Communism; pledges of peace turned into a savage civil war, with gut-wrenching atrocities perpetrated by all sides. Millions died during the war, whether from bombs and bullets or disease and famine, while postwar collectivization policies added thousands to the body count. By the time of Lenin’s death, the Soviet Union had became a dictatorship even more repressive, if that were possible, than the monarchy it replaced. </span><br data-dcnode-id="3383"><br data-dcnode-id="3382"><span data-dcnode-id="3381" instrument_node="">Figes isn’t kind to any of the players in this drama, aside from the ordinary Russians victimized by either side or some of the non-Russian nationalities whose hopes for independence were inflamed by the Revolution, only to be crushed (with the Finns and Poles being exceptions). He affords no sympathy to Nicholas; the nicest sentiment Figes offers is that the Tsar might have made a fair constitutional monarch, but as Supreme Autocrat his incompetence brought ruin. Nor does he have much use for the Bolsheviks, though he recognizes that their ruthlessness and clarity of purpose made their platform seem not only plausible but desirable. Figes is also quite harsh towards Kerensky, portrayed as a strutting wannabe Bonaparte devoured by his ego, the White Generals and other liberals like Prince Lvov who overestimated their ability to reconcile a hopelessly divided country. No amount of reform could work; radical surgery was needed. And in Communism, Russia received the most radical surgery of all. It’s all recounted in a book that’s breathtaking in its depth and detail, heart-rending in its contents and damning in its judgment; a masterpiece of historical writing.</span></span><span data-dcnode-id="3379" instrument_node="">

              </span><a class="actionLinkLite" data-dcnode-id="3280" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.goodreads.com/review/list/6120135-mary%3Fshelf%3Dpolitics"><span data-dcnode-id="3281" instrument_node="">politics</span></a><span data-dcnode-id="3279" instrument_node="">, 
              </span><a class="actionLinkLite" data-dcnode-id="3277" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.goodreads.com/review/list/6120135-mary%3Fshelf%3Drevolution"><span data-dcnode-id="3278" instrument_node="">revolution</span></a><span data-dcnode-id="3276" instrument_node="">
