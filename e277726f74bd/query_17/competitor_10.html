        </span><span class="staticStars notranslate" data-dcnode-id="4019" title="did not like it"><span class="staticStar p10" data-dcnode-id="4024" size="15x15"><span data-dcnode-id="4025" instrument_node="">did not like it</span></span><span class="staticStar p0" data-dcnode-id="4023" size="15x15"></span><span class="staticStar p0" data-dcnode-id="4022" size="15x15"></span><span class="staticStar p0" data-dcnode-id="4021" size="15x15"></span><span class="staticStar p0" data-dcnode-id="4020" size="15x15"></span></span><span data-dcnode-id="4018" instrument_node="">

</span><span data-dcnode-id="4009" id="freeTextContainer7094589863063500660"><span data-dcnode-id="4013" instrument_node="">I didn't finish this book. As I basically study the middle ages, all the information was not new or its credibility was highly questionable. Seriously, this guy HATES the middle ages and this book is a one sided rant on how completely dumb and primitive the people were before the Rennaissance saved everyone.</span><br data-dcnode-id="4012"><br data-dcnode-id="4011"><span data-dcnode-id="4010" instrument_node="">One such random fact that the author gets stuck on is that silverware wasn't introduced until the end of the 16th (maybe 15th...errr) century. Gasp! How can they be so uncivilized??? Using th</span></span><span data-dcnode-id="4008" instrument_node="">
</span><span data-dcnode-id="3997" id="freeText7094589863063500660" style="display:none"><span data-dcnode-id="4007" instrument_node="">I didn't finish this book. As I basically study the middle ages, all the information was not new or its credibility was highly questionable. Seriously, this guy HATES the middle ages and this book is a one sided rant on how completely dumb and primitive the people were before the Rennaissance saved everyone.</span><br data-dcnode-id="4006"><br data-dcnode-id="4005"><span data-dcnode-id="4004" instrument_node="">One such random fact that the author gets stuck on is that silverware wasn't introduced until the end of the 16th (maybe 15th...errr) century. Gasp! How can they be so uncivilized??? Using their hands to eat? There seem to be plenty of world cultures that get along fine today using their hands as utensils...</span><br data-dcnode-id="4003"><br data-dcnode-id="4002"><span data-dcnode-id="4001" instrument_node="">Basically, a civilization that doesn't strive for progress for the sake of progress is not worthy of existing. Granted, lots of external things lead up to the supposed stoppage in progress...plagues, famines, the collapse of rome. Yet, most of Europe, while part of the Roman empire, never had the technology that Rome was known for.</span><br data-dcnode-id="4000"><br data-dcnode-id="3999"><span data-dcnode-id="3998" instrument_node="">Most importantly, in his one sided attack, he gloriously praises people like Magellan for proving that the world was round (even though people had known this for centuries) while completely glossing over the nameless people of the middle ages who also strove for progress. Their namelessness, to him, makes them less worthy. Still, learning went on in monasteries if of a different kind than today. He even slights the great cathedrals built by these nameless workers despite the new discoveries in architecture that have kept them standing even today. Ok...I could go on...but I'm gonna stop.</span></span><span data-dcnode-id="3996" instrument_node="">

</span><span data-dcnode-id="3903" id="freeTextContainer3945889193901371958"><span data-dcnode-id="3904" instrument_node="">I haven’t read anything else by William Manchester, but he’s a good writer, and I’m sure he’s a smart guy. He’s written several biographies on Churchill, and one on JFK, and a memoir detailing his experiences during World War II in the Pacific. But Manchester is a reporter and a chronicler of modern history, and his rather sudden attempt to catalogue the medieval and early modern era in about three hundred pages is – at best – a very misguided effort that paints a terribly artificial and superfi</span></span><span data-dcnode-id="3902" instrument_node="">
</span><span data-dcnode-id="3891" id="freeText3945889193901371958" style="display:none"><span data-dcnode-id="3901" instrument_node="">I haven’t read anything else by William Manchester, but he’s a good writer, and I’m sure he’s a smart guy. He’s written several biographies on Churchill, and one on JFK, and a memoir detailing his experiences during World War II in the Pacific. But Manchester is a reporter and a chronicler of modern history, and his rather sudden attempt to catalogue the medieval and early modern era in about three hundred pages is – at best – a very misguided effort that paints a terribly artificial and superficial picture of the Middle Ages. At worst, it’s a willfully ignorant piece of polemic that, despite the title of his book’s first section, makes absolutely no attempt at truly understanding the medieval mind.</span><br data-dcnode-id="3900"><br data-dcnode-id="3899"><span data-dcnode-id="3898" instrument_node="">The problem boils down to the fact that there wasn’t nearly enough research done by the author to allow him to write a book like this. Apparently, Manchester literally wrote this book as he was researching it, and based it entirely on secondary literature. Instead of spending a few years researching and getting a feel for the era, the complexities and viewpoints and the historically fuzzy spots, he just sat down, picked up some (often outdated) secondary sources and wrote a book as he was reading them. </span><br data-dcnode-id="3897"><br data-dcnode-id="3896"><span data-dcnode-id="3895" instrument_node="">It would be one thing if Manchester had simply come to his conclusions through genuine scholarship. It’s certainly a conclusion you could make from looking at some medieval primary sources, though I’d argue it’s a superficial one. But Manchester doesn’t bother. And the idea of writing a history book that spans about 1200 years without picking up a primary source is, honestly, kind of reprehensible to me. It’s not that Manchester misinterpreted these people, it’s that he seemed to genuinely not particularly care how they viewed their own world, at least not enough to pick up a book and read a few of their own words. To write a general history book on an era that spanned a millennium and then to harshly condemn that era without reading a primary source written by the people who lived through it is genuinely irresponsible. </span><br data-dcnode-id="3894"><br data-dcnode-id="3893"><span data-dcnode-id="3892" instrument_node="">Early on, Manchester makes the kind of astounding statement that “in the medieval mind, there was no conception of time.” In microcosm, that represents everything that is wrong with this book. On a superficial level, sure, there’s some truth in the statement – people didn’t keep track of time in the same way that we do today. But the idea that a predominantly agricultural society had no conception of time doesn’t make any kind of logical sense, and from a theological or philosophical standpoint, it’s hugely wrong, and once again serves to show that Manchester seems entirely unaware of the underpinnings of the era. And when you’re writing a history book like this one, that’s exactly what you need to get right.</span></span><span data-dcnode-id="3890" instrument_node="">

</span><span data-dcnode-id="3707" id="freeTextContainer16319795407717916093"><span data-dcnode-id="3713" instrument_node="">William Manchester characterizes the Middle Ages as one of "obsession with strange myths and almost impenetrable mindlessness." In fact, this is a perfect description of the flaws of his book, which is among the worst works of history I have ever read. Full disclosure: I put it down in disgust after page 102 and did not pick it up again.</span><br data-dcnode-id="3712"><br data-dcnode-id="3711"><span data-dcnode-id="3710" instrument_node="">Still, the book did contain the following favorite howlers, which made it so bad that at times it was almost good:</span><br data-dcnode-id="3709"><span data-dcnode-id="3708" instrument_node="">• Medieval people had no sense of time: "Genera</span></span><span data-dcnode-id="3706" instrument_node="">
</span><span data-dcnode-id="3686" id="freeText16319795407717916093" style="display:none"><span data-dcnode-id="3705" instrument_node="">William Manchester characterizes the Middle Ages as one of "obsession with strange myths and almost impenetrable mindlessness." In fact, this is a perfect description of the flaws of his book, which is among the worst works of history I have ever read. Full disclosure: I put it down in disgust after page 102 and did not pick it up again.</span><br data-dcnode-id="3704"><br data-dcnode-id="3703"><span data-dcnode-id="3702" instrument_node="">Still, the book did contain the following favorite howlers, which made it so bad that at times it was almost good:</span><br data-dcnode-id="3701"><span data-dcnode-id="3700" instrument_node="">• Medieval people had no sense of time: "Generations succeeded one another in a meaningless timeless blur." (I wonder how they figured out when to plant their crops or how to show up for church on the right day of the week?)</span><br data-dcnode-id="3699"><span data-dcnode-id="3698" instrument_node="">• In summertime, peasants went about naked. (I don't remember seeing a lot of naked peasants in medieval art. Perhaps the author is thinking about cherubim and seraphim.)</span><br data-dcnode-id="3697"><span data-dcnode-id="3696" instrument_node="">• Prostitutes were the cleanest people in Europe during the Middle Ages, because they had to expose their entire bodies. (It's nice to hear something good about the Middle Ages for a change.)</span><br data-dcnode-id="3695"><span data-dcnode-id="3694" instrument_node="">• Teenage peasant girls were well-behaved on Sundays, but on weekdays "opened their blouses, hiked their skirts and romped the fields in search of phalli." (Apparently this was to avoid the dreaded fate of spinsterhood.)</span><br data-dcnode-id="3693"><span data-dcnode-id="3692" instrument_node="">• The English of both sexes were known even then for their insolence. Their women were so foul-mouthed that Joan of Arc called them the "goddamns". (He's probably thinking of New Yorkers).</span><br data-dcnode-id="3691"><span data-dcnode-id="3690" instrument_node="">• Adultery amongst the nobility was typical and usually took place with the agreement of both spouses. (Very civilized of them, no?)</span><br data-dcnode-id="3689"><span data-dcnode-id="3688" instrument_node="">• The basic cause of the moral loosening of Europe during the early years of the Renaissance was the growth of wealth. During the early sixteenth century, lust seethed throughout Europe. Rome, the capital of Christendom, was the capital of sin. (I believe the author was raised in a stern Protestant New England household in the early part of the last century, although the mindset seems more 19th century than anything else.)</span><br data-dcnode-id="3687"></span><span data-dcnode-id="3685" instrument_node="">

</span><span data-dcnode-id="3569" id="freeTextContainer5418191701448132185"><br data-dcnode-id="3578"><b data-dcnode-id="3576"><span data-dcnode-id="3577" instrument_node="">Magellan in Context</span></b><br data-dcnode-id="3575"><br data-dcnode-id="3574"><span data-dcnode-id="3573" instrument_node="">Manchester starts off writing a biography of Magellan, but in his attempt to put a context to his life, motivations and adventures, ends up expanding his scope until some six centuries of the medieval period are swallowed up by the story. Manchester then repackages the book as a book about the Renaissance and lets it fade into the Magellan biography.</span><br data-dcnode-id="3572"><br data-dcnode-id="3571"><span data-dcnode-id="3570" instrument_node="">It was interesting to see this process at work. I am not sure why all biographies don't become a record of an age, in fact of all</span></span><span data-dcnode-id="3568" instrument_node="">
</span><span data-dcnode-id="3549" id="freeText5418191701448132185" style="display:none"><br data-dcnode-id="3567"><b data-dcnode-id="3565"><span data-dcnode-id="3566" instrument_node="">Magellan in Context</span></b><br data-dcnode-id="3564"><br data-dcnode-id="3563"><span data-dcnode-id="3562" instrument_node="">Manchester starts off writing a biography of Magellan, but in his attempt to put a context to his life, motivations and adventures, ends up expanding his scope until some six centuries of the medieval period are swallowed up by the story. Manchester then repackages the book as a book about the Renaissance and lets it fade into the Magellan biography.</span><br data-dcnode-id="3561"><br data-dcnode-id="3560"><span data-dcnode-id="3559" instrument_node="">It was interesting to see this process at work. I am not sure why all biographies don't become a record of an age, in fact of all history. Can any life be examined independent of context? Take for example the Steve Jobs biography industry. Not one of them takes us back to the beginning of electronics and sketches the exciting journey to personal computing and then plops the Steve Jobs story into that context, showing us his role in shaping that context for the next guy who is to be plopped into it. Instead most such books almost manage to leave an impression that its subjects were </span><i data-dcnode-id="3557"><span data-dcnode-id="3558" instrument_node="">sui generis</span></i><span data-dcnode-id="3556" instrument_node=""> and not one among a teaming multitude with similar ambitions, aims, etc out of which he/she rose to the surface and shined for a while, due to an arresting set of circumstances, most of it do with plain dumb randomness -- otherwise known as luck.</span><br data-dcnode-id="3555"><br data-dcnode-id="3554"><span data-dcnode-id="3553" instrument_node="">That would be a true biography. </span><br data-dcnode-id="3552"><br data-dcnode-id="3551"><span data-dcnode-id="3550" instrument_node="">Manchester has stumbled on the outline for one here. But he probably did not see what he had and aims too low, giving us a mish-mash of movements, ideas and events, not coherently presented and not tying in well with the core Magellen biography. Still, it was exciting to think of the possibilities of such a history-biography.</span></span><span data-dcnode-id="3548" instrument_node="">

</span><span data-dcnode-id="3458" id="freeTextContainer10648120677761702409"><span data-dcnode-id="3465" instrument_node="">Inconsistencies and half truths make for an interesting narrative, but not a good history.</span><br data-dcnode-id="3464"><br data-dcnode-id="3463"><span data-dcnode-id="3462" instrument_node="">This book attempts to cover a lot of ground. However, several things in the book made me suspicious of the reliability of the information. For instance, Manchester references the events of the Pied Piper, depicting him as an actual historical character and the murderer of 130 children. </span><br data-dcnode-id="3461"><br data-dcnode-id="3460"><span data-dcnode-id="3459" instrument_node="">I found this intriguing and went online to learn more -- I found a "Straight Dope" column that refuted Manchester's specula</span></span><span data-dcnode-id="3457" instrument_node="">
</span><span data-dcnode-id="3439" id="freeText10648120677761702409" style="display:none"><span data-dcnode-id="3456" instrument_node="">Inconsistencies and half truths make for an interesting narrative, but not a good history.</span><br data-dcnode-id="3455"><br data-dcnode-id="3454"><span data-dcnode-id="3453" instrument_node="">This book attempts to cover a lot of ground. However, several things in the book made me suspicious of the reliability of the information. For instance, Manchester references the events of the Pied Piper, depicting him as an actual historical character and the murderer of 130 children. </span><br data-dcnode-id="3452"><br data-dcnode-id="3451"><span data-dcnode-id="3450" instrument_node="">I found this intriguing and went online to learn more -- I found a "Straight Dope" column that refuted Manchester's speculation. </span><br data-dcnode-id="3449"><br data-dcnode-id="3448"><a data-dcnode-id="3446" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.straightdope.com/mailbag/mpiedpiper.html" rel="noopener nofollow" target="_blank"><span data-dcnode-id="3447" instrument_node="">http://www.straightdope.com/mailbag/m...</span></a><br data-dcnode-id="3445"><br data-dcnode-id="3444"><span data-dcnode-id="3443" instrument_node="">In a portrait of an Italian clergyman, Girolamo Savonarola, who defied a decadent Pope (and was excommunicated and burned for his trouble), Manchester describes a man of the people, beloved by the common folk. He then describes how these followers turn against the priest (out of fear from the all-powerful pope) when the pope brought the hammer down. A little digging reveals that the priest was not as popular as Manchester asserts -- taking from them the equivalent of TV, movies, and video games.</span><br data-dcnode-id="3442"><br data-dcnode-id="3441"><span data-dcnode-id="3440" instrument_node="">I found I didn't want to read any more of the book, since I could no longer trust the veracity of the author.</span></span><span data-dcnode-id="3438" instrument_node="">

</span><span data-dcnode-id="3351" id="freeTextContainer3917993698687730245"><span data-dcnode-id="3355" instrument_node="">My daughter brought this book to my attention about 10 years ago. "WHAT?!? You haven't read this?!? Here!" with a forceful thrust, causing the book to thump into my chest rather painfully. (The bruises have since healed.) </span><br data-dcnode-id="3354"><br data-dcnode-id="3353"><span data-dcnode-id="3352" instrument_node="">Since that copy, I have given to others eleven more; I seem to be able to keep the book for about six months before someone just *has* to read it and *now*, so out it goes again. Weeks go by, and I fretfully search the used bookeries for another copy; always one shows up, usual</span></span><span data-dcnode-id="3350" instrument_node="">
</span><span data-dcnode-id="3330" id="freeText3917993698687730245" style="display:none"><span data-dcnode-id="3349" instrument_node="">My daughter brought this book to my attention about 10 years ago. "WHAT?!? You haven't read this?!? Here!" with a forceful thrust, causing the book to thump into my chest rather painfully. (The bruises have since healed.) </span><br data-dcnode-id="3348"><br data-dcnode-id="3347"><span data-dcnode-id="3346" instrument_node="">Since that copy, I have given to others eleven more; I seem to be able to keep the book for about six months before someone just *has* to read it and *now*, so out it goes again. Weeks go by, and I fretfully search the used bookeries for another copy; always one shows up, usually in very good to unread condition (philistines! Imagine having this book and not reading it!), and spend the buck or so to bring it home *for the last time* as I will keep *this* one forever.</span><br data-dcnode-id="3345"><br data-dcnode-id="3344"><span data-dcnode-id="3343" instrument_node="">Uh-huh. As we see, that resolve is doomed. I'm sending this one to that soldier who wanted history books. He'll like this one, I bet!</span><br data-dcnode-id="3342"><br data-dcnode-id="3341"><span data-dcnode-id="3340" instrument_node="">It's a leap of imagination that I feel 21st-century people have small success at making, but the time when the world was lit only by fire didn't end until late in the 19th century. No flipping switches for instant light. No reading lamp that just needs a little flick to provide bright, shadowless (unless you sited it in a funny place) light for as long as you like. No street illumination worth a damn.</span><br data-dcnode-id="3339"><br data-dcnode-id="3338"><span data-dcnode-id="3337" instrument_node="">A world of shadows. A world of unseen details. A world that gave us fabulous artistic achievements, amazing literary joys, and most of our modern ideas about religion, which I for one could do without.</span><br data-dcnode-id="3336"><br data-dcnode-id="3335"><span data-dcnode-id="3334" instrument_node="">Manchester makes this world shimmer into focus, bronze-gold candleflame coloring each and every idea, achievement, material object he describes. We really see what he's talking about through their eyes, if we possess even a hint of imagination.</span><br data-dcnode-id="3333"><br data-dcnode-id="3332"><span data-dcnode-id="3331" instrument_node="">I love this book, and I think everyone in the least bit interested in history should read it because it's beautifully written and conceived. It's a pleasure to pass it on to another initiate. I hope he falls in love the way I did. Please try it. It's worth your time to sink without a ripple into a world long vanished. </span></span><span data-dcnode-id="3329" instrument_node="">

</span><span data-dcnode-id="3251" id="freeTextContainer14230839857382340587"><span data-dcnode-id="3255" instrument_node="">If you are looking for a well researched and reasoned history of the Dark Ages and the Renaissance do not read this book. If you are looking for a starting point for the Intellectual History of Europe during the Dark Ages and Renaissance; this book might be a good way to go.</span><br data-dcnode-id="3254"><br data-dcnode-id="3253"><span data-dcnode-id="3252" instrument_node="">The historical accuracy of this book is to be strongly questioned and doubted. However, I still like this book. The reason I like this book is that it is about ideas. What the author does is take a very one sided argumentativ</span></span><span data-dcnode-id="3250" instrument_node="">
</span><span data-dcnode-id="3233" id="freeText14230839857382340587" style="display:none"><span data-dcnode-id="3249" instrument_node="">If you are looking for a well researched and reasoned history of the Dark Ages and the Renaissance do not read this book. If you are looking for a starting point for the Intellectual History of Europe during the Dark Ages and Renaissance; this book might be a good way to go.</span><br data-dcnode-id="3248"><br data-dcnode-id="3247"><span data-dcnode-id="3246" instrument_node="">The historical accuracy of this book is to be strongly questioned and doubted. However, I still like this book. The reason I like this book is that it is about ideas. What the author does is take a very one sided argumentative stance. His basic theses are. 1. The Medieval common man was an unthinking idiot. 2. Intellectual thought and innovation were non existent. 3. The Church is primarily responsible for the lack of innovation. 4. Rebellious free thinkers were able to throw open doors that could not be closed once opened. All of these premises are far too extreme to be true. </span><br data-dcnode-id="3245"><br data-dcnode-id="3244"><span data-dcnode-id="3243" instrument_node="">However, by taking these extreme view points, he sets the stage for the reader to research and learn about the Dark Ages and come up with his/her own arguments. One must start somewhere when learning about Intellectual History, and this book, precisely because of it's extremism, gives the reader ideas to challenge or agree with.</span><br data-dcnode-id="3242"><br data-dcnode-id="3241"><span data-dcnode-id="3240" instrument_node="">Also, I found his views to be entertaining. I think it's a good read. I also loved his depiction of Erasmus; made him quite heroic in my eyes.</span><br data-dcnode-id="3239"><br data-dcnode-id="3238"><span data-dcnode-id="3237" instrument_node="">In the end, I agree with him. The Medieval Age was a very stagnant time for Europe.Later triumphs for Europe are in spite of the Middle Ages, not because of them. The efforts of the Church were far more hurtful then helpful to people at large. In spite of the myriad of restrictions, Europe was able to overcome these circumstances and embark on a very fruitful epoch (which, of course ,brought it's on problems, but that is another story).</span><br data-dcnode-id="3236"><br data-dcnode-id="3235"><span data-dcnode-id="3234" instrument_node="">NOTE: I use the terms Dark Ages, Medieval and Middle Ages interchangeably in this review; my apologies to those who take issue with the use of these terms in this way.</span></span><span data-dcnode-id="3232" instrument_node="">

</span><span data-dcnode-id="2972" id="freeText16474590855537468088" style="display:none"><span data-dcnode-id="2976" instrument_node="">More propaganda for those who believe everything old is bad and everything new is good. You know what? I'd rather live in a world lit only by fire. Our technology is polluting the skies, polluting the earth, and destroying our landbase. There are more slaves on the planet than at any time in human history - but, but, the Crusades, right? Well, no, let's throw out all our achievements because of our own War on Terror. We have taken the worst from Europe during the Middle Ages, rearranged it, abandoned all the wonderful things, and are now prancing about like the Emperor With No Clothes. </span><br data-dcnode-id="2975"><br data-dcnode-id="2974"><span data-dcnode-id="2973" instrument_node="">If you want to use the term medieval as an insult, at least read something besides this nonsense. Someone who actually, you know, studied medieval history, read the source material. Not this second-hand, ill-informed tripe which may as well have been written by a hack paid to promote the enclosure movement and industrialization and deny climate change and write anything else which would turn readers into good little consumers without voices. </span></span><span data-dcnode-id="2971" instrument_node="">

</span><span data-dcnode-id="2811" id="freeTextContainer15586921500549120854"><span data-dcnode-id="2812" instrument_node="">I studied History of Art so spent many years looking at the Renaissance, not just the paintings themselves but the cultural context, the political and religious events at the time. That does not make me an expert but I know a fair bit. What I know less about is the Middle Ages before this rebirth. I thought this book would inform me of life and the political landscape of a time where, perspectival art, questioning the church, contemplating the earth as part of a cosmos all seemed to be so far aw</span></span><span data-dcnode-id="2810" instrument_node="">
</span><span data-dcnode-id="2798" id="freeText15586921500549120854" style="display:none"><span data-dcnode-id="2809" instrument_node="">I studied History of Art so spent many years looking at the Renaissance, not just the paintings themselves but the cultural context, the political and religious events at the time. That does not make me an expert but I know a fair bit. What I know less about is the Middle Ages before this rebirth. I thought this book would inform me of life and the political landscape of a time where, perspectival art, questioning the church, contemplating the earth as part of a cosmos all seemed to be so far away as to be impossible. How did a continent ravaged by the Black Death resurrect itself within 50 years to be the greatest period of change and artistic energy in history? I can’t answer and, possibly, neither can William Manchester as he makes no attempt to explain it. </span><br data-dcnode-id="2808"><span data-dcnode-id="2807" instrument_node="">Manchester has no time for the period before the rebirth. He devotes very little space in his 300 pages to it and the only thing I took away from it was that apparently peasants worked naked. I cannot decide if this is his attempt to show the middle ages as even more backward than Neanderthals who at least had the nous to cover up their most vulnerable parts with a bit of mammoth skin, or he is under a grave misconception as to the climate of most of Europe. As he is American I shall generously ascribe him the second explanation.</span><br data-dcnode-id="2806"><span data-dcnode-id="2805" instrument_node="">I did learn a lot about Martin Luther and Magellan – who has the hero status in the book – but was frequently disconcerted by the tone and authorial voice. I am not sure if the flippant asides to some quite shocking incidents was to show how unshockable he himself is or because he didn’t want the meat of the book to be lost amid the sprinkling of spice provided by the Borgias or Henry VIII’s worst sexual exploits. Whatever the reason I found it somewhat jarring and the whole style over conversational.</span><br data-dcnode-id="2804"><span data-dcnode-id="2803" instrument_node="">The book did succeed in giving me the biggest laugh I’ve had in a while. As a woman with feet larger than the average (I am also taller than average for context; I don’t shop for footwear in Circus world) among the descriptions of fantastical creatures that inhabited undiscovered lands this one was the best, </span><br data-dcnode-id="2802"><i data-dcnode-id="2800"><span data-dcnode-id="2801" instrument_node="">“…of people who created their own shade by lying down and blotting out the sun with an enormous single foot…”</span></i><br data-dcnode-id="2799"></span><span data-dcnode-id="2797" instrument_node="">

</span><span data-dcnode-id="2719" id="freeTextContainer11561670854563177706"><span data-dcnode-id="2723" instrument_node="">I would be lying to you if I didn't admit that I was bitter about this book before I read the first chapter. I made the mistake of reading the preface where Mr. Manchester explained that he wrote this book as a break from writing the final volume to my favorite Winston Churchill biography. He died before he could finish the final volume so his brilliant biography ends in 1945...that's right, at the height of World War II. Useless, but still brilliant.</span><br data-dcnode-id="2722"><br data-dcnode-id="2721"><span data-dcnode-id="2720" instrument_node="">I think this book lacks on several fronts: no</span></span><span data-dcnode-id="2718" instrument_node="">
</span><span data-dcnode-id="2710" id="freeText11561670854563177706" style="display:none"><span data-dcnode-id="2717" instrument_node="">I would be lying to you if I didn't admit that I was bitter about this book before I read the first chapter. I made the mistake of reading the preface where Mr. Manchester explained that he wrote this book as a break from writing the final volume to my favorite Winston Churchill biography. He died before he could finish the final volume so his brilliant biography ends in 1945...that's right, at the height of World War II. Useless, but still brilliant.</span><br data-dcnode-id="2716"><br data-dcnode-id="2715"><span data-dcnode-id="2714" instrument_node="">I think this book lacks on several fronts: not an engaging read, tries to cover too much with little explanation for how it all fits and let's be honest: I found it dull. Subjects discussed include Henry VIII (finally know where he got defender of the faith), Martin Luther (poor chap on the run), Magellan (Determined chap), Erasmus (coward), Tyndale (rebel with a cause) and several revolutionary thinkers who defied their time. I suggest this reading for those who need to write a research paper, suffer from insomnia or for some strange reason interested in the Middle Ages or the beginnings of the Catholic church. My favorite part: knowing that prostitutes were the cleanest people of their time, probably the only thing I will remember.</span><br data-dcnode-id="2713"><br data-dcnode-id="2712"><span data-dcnode-id="2711" instrument_node="">(my second star is me trying to forgive him for the Churchill fiasco)</span></span><span data-dcnode-id="2709" instrument_node="">

</span><span data-dcnode-id="2607" id="freeText10712387415337625480" style="display:none"><span data-dcnode-id="2614" instrument_node="">Manchester tells us the the early 16th century is not his specialty, that he had written up a short book on Magellan's voyage, then he wanted to put that in a background context of the times. It would have been nice if he had told us that up front instead of in the afterword. </span><br data-dcnode-id="2613"><br data-dcnode-id="2612"><span data-dcnode-id="2611" instrument_node="">What comes out has little to do with the title or subtitle. It jumps around quite a bit but spends most of its time hovering around the early 16th century reminding us over and over how corrupt the Papacy was, with lengthy sections on Cesare &amp; Lucretia Borgia, Martin Luther, finally Magellan's voyage. The reader is left wondering what context this should be read in and how it all ties together...until the afterword. </span><br data-dcnode-id="2610"><br data-dcnode-id="2609"><span data-dcnode-id="2608" instrument_node="">Perhaps Manchester's books on Churchill are enlightening, but this one is nothing special.</span></span><span data-dcnode-id="2606" instrument_node="">

</span><span data-dcnode-id="2397" id="freeText8025759962460412770" style="display:none"><span data-dcnode-id="2407" instrument_node="">I had been meaning to read this book for a long time. Every time I mentioned reading a book about the Middle Ages, this title seemed to come up, so off to the library I went. </span><br data-dcnode-id="2406"><br data-dcnode-id="2405"><span data-dcnode-id="2404" instrument_node="">I was very unimpressed. The organization of the book seemed poor almost from the very start. There are no chapter divisions and, seemingly because of this, the author felt free to roam around with little direction. The tone of the entire work is condescending, both to the reader (occasionally), and to the subject matter (always, with one or two exceptions). The middle of the book devolves into a sort of Renaissance gossip rag - not a difficult task, perhaps, but it seemed that the author was intent on peppering the book with salacious and maybe even spurious accounts of the sex lives of many of the people he discussed. He seems to revel in ripping away what he seems to perceive as Medieval rose-tinted glasses in doing so. Many of the most scandalous and juicy events he recounts are the subjects of books filled with scholarly debate, yet he pronounces sentence on nearly every prominent figure of the broad span he covers (c.500-1500). (Lucrezia Borgia's fabled sex life, The Pied Piper of Hamlin as a serial killer, the use of the Iron Maiden, to name only a few of his confidently asserted opinions.) </span><br data-dcnode-id="2403"><br data-dcnode-id="2402"><span data-dcnode-id="2401" instrument_node="">The book looks at all the eras discussed through modern eyes. It does not account for the thinking of the time, the progress of history, nor does it find anything positive to say about anyone save the emerging humanists and Ferdinand Magellan - clearly the idol of the author. At many points I was so angry, I almost didn't finish. The only balanced portrayals he manages are written about various characters in the Reformation, but even these are approached from a clearly anti-religious (not just anti-Catholic) perspective. Even here he rejoices in informing readers of Martin Luther of aspects of Luther's life that he feels are embarrassing to Luther: uses of crude language, changes in stance/inconsistencies, character weaknesses, etc. Magellan is the only person who escapes with almost no criticism, but the amount of praise heaped on him hardly seems justified. Not that I believe that Magellan's accomplishments are small, but hardly worth attributing the culmination of the Renaissance to him... the final dispelling of all the "damage" done by the Middle Ages. "Like [the Magellanic Clouds], his memory shines down upon the world his voyage opened, illuminating it from infinity to eternity." (p290) Really? </span><br data-dcnode-id="2400"><br data-dcnode-id="2399"><span data-dcnode-id="2398" instrument_node="">The book "illuminates" those of us who are Medieval historians to nothing. We know that people were dirty. We know that people were superstitious, and we know that the Church was corrupt. What then is there left to read about in this book. Not much. This is the most negative review I have ever written about a book and I'm not sorry. </span></span><span data-dcnode-id="2396" instrument_node="">

</span><span data-dcnode-id="2312" id="freeTextContainer5882400339202183236"><span data-dcnode-id="2313" instrument_node="">I feel guilty for enjoying this book. I'm no expert on the Middle Ages and the early Renaissance but I remember enough from college courses taken a millennia ago to know that this book has problems. Manchester interprets the "Dark" Ages (he prefers "Dark" to "Middle" and certainly doesn't subdivide it into Early, High, and Late) as a long stretch of paralyzed time during which dirty, violent, religious (read: superstitious) people did very little thinking and accomplished even less. Then lo! Ren</span></span><span data-dcnode-id="2311" instrument_node="">
</span><span data-dcnode-id="2297" id="freeText5882400339202183236" style="display:none"><span data-dcnode-id="2310" instrument_node="">I feel guilty for enjoying this book. I'm no expert on the Middle Ages and the early Renaissance but I remember enough from college courses taken a millennia ago to know that this book has problems. Manchester interprets the "Dark" Ages (he prefers "Dark" to "Middle" and certainly doesn't subdivide it into Early, High, and Late) as a long stretch of paralyzed time during which dirty, violent, religious (read: superstitious) people did very little thinking and accomplished even less. Then lo! Renaissance-y things started happening, and suddenly people started to think! Bam! They accomplished a variety of things that altered Western civilization better than it was ever altered before! Or since! (Although people were still dirty and violent; that didn't change much.) Time was un-paralyzed and </span><i data-dcnode-id="2308"><span data-dcnode-id="2309" instrument_node="">progress</span></i><span data-dcnode-id="2307" instrument_node=""> began. Now, if this interpretation seems awfully simple and suspect that's because it is. Manchester does better than a high school textbook by not suggesting that there is a clear demarcation in time between the Middle Ages and the Renaissance, but not by much. He drips scorn and derision on a period of time that is apparently only worth discussing in terms of what it was not (that is, Classical civilization and the Renaissance). This was the interpretation popular during the Victorian period but scholars have come a long way since then. A very odd line to be taken in a history first published in 1992. Hmmm.</span><br data-dcnode-id="2306"><br data-dcnode-id="2305"><span data-dcnode-id="2304" instrument_node="">So I should hate the thing, right? Should've stopped at the get-go. And to be honest I'm not all that interested in either the Middle Ages or the Renaissance. But...but...damnit, I couldn't put this stupid book down! Manchester is a great storyteller. It was engaging; kept me hanging and even a little bit in suspense; plenty scandalous and horrifying; and wonderfully descriptive. The last chapter, on Magellan's voyage (half-way) around the world, was excellent. I liked how the book ended. As a history geek it felt to me like a cheap thrill. I had fun reading about those "facts" based on hear-say (Lucrezia Borgia's incestuous relationships), or just plain made up (the famous Piped Piper bit), and outdated analysis even while I knew that for the most part it was a bunch of crap.</span><br data-dcnode-id="2303"><br data-dcnode-id="2302"><span data-dcnode-id="2301" instrument_node="">I feel ashamed giving it three stars. It really only deserves two. I would never recommend to anyone. But even though I don't really </span><i data-dcnode-id="2299"><span data-dcnode-id="2300" instrument_node="">like</span></i><span data-dcnode-id="2298" instrument_node=""> this book...*sigh* I cannot lie, I really enjoyed reading it. Hey, every once in a blue moon a book will do that to you. I'll make sure to hang my head in shame while I'm shelving it in my permanent library.</span></span><span data-dcnode-id="2296" instrument_node="">

</span><span class="readable" data-dcnode-id="2081" id="reviewTextContainer23447961"><span data-dcnode-id="2106" instrument_node="">
</span><span data-dcnode-id="2101" id="freeTextContainer1909817523745559235"><span data-dcnode-id="2105" instrument_node="">Manchester is highly opinionated, and seldom hesitates to state his opinions as fact. Occasionally those statements border on being flatly wrong. Take this passage on p.12: </span><br data-dcnode-id="2104"><br data-dcnode-id="2103"><span data-dcnode-id="2102" instrument_node="">"The early Christians, believing that their Lord's return was imminent, celebrated Easter every Sunday. After three hundred years their descendants became reconciled to a delay. In an attempt to link Easter with the Passion, it was scheduled on Passover, the Jewish feast observing the Exodus from Egypt in the thirteenth centu</span></span><span data-dcnode-id="2100" instrument_node="">
</span><span data-dcnode-id="2086" id="freeText1909817523745559235" style="display:none"><span data-dcnode-id="2099" instrument_node="">Manchester is highly opinionated, and seldom hesitates to state his opinions as fact. Occasionally those statements border on being flatly wrong. Take this passage on p.12: </span><br data-dcnode-id="2098"><br data-dcnode-id="2097"><span data-dcnode-id="2096" instrument_node="">"The early Christians, believing that their Lord's return was imminent, celebrated Easter every Sunday. After three hundred years their descendants became reconciled to a delay. In an attempt to link Easter with the Passion, it was scheduled on Passover, the Jewish feast observing the Exodus from Egypt in the thirteenth century B.C."</span><br data-dcnode-id="2095"><br data-dcnode-id="2094"><span data-dcnode-id="2093" instrument_node="">This is at best incoherent. Why would you need to "attempt to link Easter with the Passion?" Easter is the celebration of the resurrection, as Manchester points out just before this passage. The crucifixion is recounted in all four gospels, and Mark probably dates from around 60 or 70 CE. All four gospels link the Passion story with Passover, even if John puts the last supper on the day before instead of making it a seder. Clearly this association dates to well before 300 CE in any case.</span><br data-dcnode-id="2092"><br data-dcnode-id="2091"><span data-dcnode-id="2090" instrument_node="">His treatment of Giordano Bruno is superficial as well -- he says he was burned at the stake for being a pantheist. Bruno was probably a pantheist, but he also denied the authority of priests, which is most likely the thing that really got him toasted. He was, in fact, a pretty strange character all around, and Manchester has, as he does throughout, selected his facts to make the church look as bad as possible. </span><br data-dcnode-id="2089"><br data-dcnode-id="2088"><span data-dcnode-id="2087" instrument_node="">There are many more examples, but my point is that this is a very readable and interesting book, but I just found its polemic anti-clerical stance a bit overdone. </span></span><span data-dcnode-id="2085" instrument_node="">

              </span><a class="actionLinkLite" data-dcnode-id="1998" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.goodreads.com/review/list/841949-tracey%3Fshelf%3Dmedieval"><span data-dcnode-id="1999" instrument_node="">medieval</span></a><span data-dcnode-id="1997" instrument_node="">

</span><span data-dcnode-id="1986" id="freeTextContainer391008326992752018"><span data-dcnode-id="1990" instrument_node="">There was a book in the history section of Barnes and Noble when I worked there, which I admit to fondling a little&nbsp;every time I straightened that section, called </span><em data-dcnode-id="1988"><span data-dcnode-id="1989" instrument_node="">A World Lit Only by Fire</span></em><span data-dcnode-id="1987" instrument_node="">.&nbsp; It's a superb title&nbsp;- it put that sort of glazed light in my eyes as I thought about just what it meant, or what I took it to mean.&nbsp; It does an excellent job of encapsulating the huge gap between now and the Middle Ages in just a few words.&nbsp; And part of that gap is my misunderstanding of the meaning of the ti</span></span><span data-dcnode-id="1985" instrument_node="">
</span><span data-dcnode-id="1909" id="freeText391008326992752018" style="display:none"><span data-dcnode-id="1984" instrument_node="">There was a book in the history section of Barnes and Noble when I worked there, which I admit to fondling a little&nbsp;every time I straightened that section, called </span><em data-dcnode-id="1982"><span data-dcnode-id="1983" instrument_node="">A World Lit Only by Fire</span></em><span data-dcnode-id="1981" instrument_node="">.&nbsp; It's a superb title&nbsp;- it put that sort of glazed light in my eyes as I thought about just what it meant, or what I took it to mean.&nbsp; It does an excellent job of encapsulating the huge gap between now and the Middle Ages in just a few words.&nbsp; And part of that gap is my misunderstanding of the meaning of the title.&nbsp; My definition was always that apart from the sun, moon, and stars, the only illumination available to humanity was fire: the only man-made illumination was what could be scraped from flint and steel.&nbsp; Which ... is true, but not, apparently, what Mr. Manchester meant, given that the title phrase is used in reference to the flames of the pyres on which heretics were burned.&nbsp; Many, many fires, and many, many heretics.&nbsp; Which, pardon the pun, puts a different light on things.&nbsp;&nbsp;</span><br data-dcnode-id="1980"><br data-dcnode-id="1979"><span data-dcnode-id="1978" instrument_node="">We - being those addicted to fantasy novels and the Renaissance Faire, and especially the younger&nbsp;and more naive among us - tend to romanticize&nbsp;the Middle Ages and Renaissance.&nbsp; </span><br data-dcnode-id="1977"><a data-dcnode-id="1973" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//agoldoffish.files.wordpress.com/2011/03/robinhood.jpg" rel="nofollow noopener"><span data-dcnode-id="1976" instrument_node="">
</span><img alt="" class="gr-hostedUserImg" data-dcnode-id="1975" height="305" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//i.gr-assets.com/images/S/compressed.photo.goodreads.com/hostedimages/1445304125i/16627763.jpg&amp;raw" width="204"><span data-dcnode-id="1974" instrument_node="">
</span></a><br data-dcnode-id="1972"><span data-dcnode-id="1971" instrument_node="">It's easy to do, given that we're all of us brought up on Robin Hood (who, if you watch Errol Flynn and the like, had a fully functioning bath in the greenwood) and fairy tales (bowdlerized) and ... well, things like the&nbsp;New York Renaissance Faire&nbsp;(which actually has more validity to it than it might get credit for).&nbsp; Shiny happy peasants and the occasional despot and villain existing only to be vanquished by the noble hero.&nbsp; It didn't really take a book like Only by Fire to make me realize how Disneyfied&nbsp;this image is - no one with half an ounce of scholarship in history can resist pointing out how drafty castles are and how there was an almost complete lack of sanitation everywhere from the meanest hovel (and they were very mean) to the aforementioned castle, and how if you lived to the age of forty you were doing pretty well, though you probably would look about sixty... Knights in shining armor?&nbsp; To be called that was basically an insult, from what I've read, as if your armor is shiny and undented it means you haven't been in battle: you're all show.&nbsp; Or, I posit, you have a really good squire, but what do I know.&nbsp; There's just something about pretty bubbles that make people long to burst them (I've been guilty of wanting to do this myself, though I usually try to have mercy, having had so many of my own bubbles popped).&nbsp;</span><br data-dcnode-id="1970"><br data-dcnode-id="1969"><span data-dcnode-id="1968" instrument_node="">In case I had any illusions left, though, I'm reading AWLObF.&nbsp; That squishy popping sound?&nbsp; That was the last of those illusions, going very much away.&nbsp; The Middle Ages were hell.&nbsp; The Renaissance?&nbsp; Better - but not for everyone, and not in all ways.</span><br data-dcnode-id="1967"><br data-dcnode-id="1966"><span data-dcnode-id="1965" instrument_node="">One thing I have to say - this book certainly puts things into perspective.&nbsp; I started this over a weekend, reading for several hours on the Sunday ... And that sentence sums up a lot of the things I should be grateful for.&nbsp; Whatever else can be said about this society, the fact that I, a single woman of my age, had the leisure to curl up with a book for several hours - switching on a light by the bed I&nbsp;don't have to share&nbsp;(in a room I don't have to share) when the sun went down – on the Sabbath - is something that would have been a) impossible in so many ways and b) almost satanic a few hundred years ago.&nbsp; Sloth.&nbsp; And a woman who can read?&nbsp; A book?&nbsp; A book in English?&nbsp; With pictures, on high quality paper, and yet which did not cost an astronomical sum?&nbsp; Warm indoors with no fire in the middle of winter (as it was when I started)?&nbsp; I should realize more often: I'm in heaven.&nbsp; Comparatively.&nbsp;</span><br data-dcnode-id="1964"><br data-dcnode-id="1963"><span data-dcnode-id="1962" instrument_node="">Seriously, even if I didn't learn a single fact - and I have; for one thing I'm never going to be able to shake the memory of the connection between Martin Luther and excrement - this book would be amazing for one thing: perspective.&nbsp; There's the perspective that, while it's human nature&nbsp;to complain about one's lot, given where the human race has come from we should all walk through our luxurious lives with smiles on our faces.&nbsp; And there's the wider angle perspective that everything is moving faster and faster.&nbsp; I don't of course mean simply that cars and trains and planes are faster than horses or shank's mare, the sole means of locomotion until the last couple of centuries, though that's related.&nbsp; I mean that for a full millennium, the Dark Ages, there were according to Manchester two innovations of note.&nbsp; Two, in a thousand years.&nbsp; Life was fragile and all but meaningless; the mass of men - meaning men, women, and children old enough to walk and older - rose before dawn, went out to the fields, worked all day in a manner that very few 21st century denizens have ever had to work, ate terrible food and that sparingly, returned at darkfall&nbsp;to their hovels (which might be dignifying most of their shelters a little too much), and collapsed on vermin-ridden straw-strewn dirt floors with, if they were lucky, a vermin-ridden blanket to sleep until dawn got them out to work again.&nbsp; Repeat, ad nauseam.&nbsp;</span><br data-dcnode-id="1961"><br data-dcnode-id="1960"><span data-dcnode-id="1959" instrument_node="">Objectively, I know it can't have been so very bleak every minute of every day.&nbsp; Human nature won't stand for it.&nbsp; They knew nothing else, and found their joys when and where they could.&nbsp; (My one note as I read this - apart from a prayer of thanksgiving when I finished - was "I can't tell if I'm depressed because people never change or given hope because though people never change we hardly ever burn people to death anymore.") It just wasn't easy.&nbsp; And as for the complete&nbsp;lack of innovation ... it's a little hard to swallow.&nbsp; Two words: Notre Dame.&nbsp;</span><br data-dcnode-id="1958"><br data-dcnode-id="1957"><span data-dcnode-id="1956" instrument_node="">As things changed with the onset of the Renaissance, most men's lives didn't change very much, not for a while - but some aspects&nbsp;did: mandatory education for all children spread.&nbsp; Literacy rose.&nbsp; People began to get ideas.&nbsp; The philosophies and histories of ancient Greece and Rome were rediscovered, and this opened minds.&nbsp; Art began to rise - partly to lend patrons culture and prestige, but also for art's sake.&nbsp; Invention and innovation became the norm, and competitive.&nbsp; But still, one institution, or one man, could own a copy of every book there was (what a happy dream), and read every book there was (even happier), and make a claim to be familiar with all bodies of knowledge without anyone laughing in his face.&nbsp; It took something like a month to travel from Rome to Germany, two months to reach London, so news and innovation didn't exactly move at lightning speeds.&nbsp; The Renaissance was a time of change, to say the least - but even the most extreme news and innovation took time to spread.&nbsp;</span><br data-dcnode-id="1955"><br data-dcnode-id="1954"><span data-dcnode-id="1953" instrument_node="">Today ... illiteracy rates in the U.S. are probably not a great deal better now than in Europe in the Renaissance, sadly - when I did my literacy volunteers training, the percentage quoted for functional illiteracy was 30%, which I believe was national ... But a minimum of elementary education is compulsory, and free, for every child;&nbsp; the learning is available, but not every child (or adult) has the other resources apart from money to take advantage of it.&nbsp; The population has grown to a degree that would shock a citizen of the Renaissance ... it shocks me.&nbsp; (I just saw an article warning that in the next 40 years this planet will need to produce more food than it did in the past 8000 years.&nbsp; In other words, we're in trouble.&nbsp; Isaac Asimov scared me with much the same warning many years ago; I was apparently the only one so troubled by it, because things have only gotten worse since then.)&nbsp; But the population isn't the only thing that has grown exponentially; the speed of communication has dwindled to almost nothing.&nbsp; Telephone, internet, satellites - I heard about an earthquake in New Zealand first thing in the morning, checked&nbsp;The Board Which Shall Remain Nameless&nbsp;next thing to see if Kiwis I used to know had checked in, was reassured that they had, sent an email to someone I used to know, and heard back from her within a couple of hours.&nbsp; So small a time ago as twenty-five years ago I not only would not have been able to receive news before days if not weeks had passed unless I had telephone numbers (assuming telephones are working there), I wouldn't have had any reason to want news - I wouldn't have had the means to know anyone in New Zealand.&nbsp;</span><br data-dcnode-id="1952"><br data-dcnode-id="1951"><span data-dcnode-id="1950" instrument_node="">A simile struck me, and I think it's a good one, so bear with me a minute.&nbsp; Years ago, I used to play D&amp;D (go ahead, I know) with my cousin and a few of his friends. The one I had a crush on had a little brother who usually also played with us; he was probably about 13 when I met him.&nbsp; The games sort of petered out after a while, and months went by without my seeing the brothers, until one day they and my cousin, I believe, for some reason I don't remember, showed up at my work - and I slammed instantly and unprecedentedly into mother-hen mode over the younger brother.&nbsp; My cousin used to call him</span><a data-dcnode-id="1948" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.kencyclopedia.com/kender/general/" rel="nofollow noopener" target="_blank"><span data-dcnode-id="1949" instrument_node=""> "the kender"</span></a><span data-dcnode-id="1947" instrument_node=""> because he wasn't all that tall, he was curly-haired, and he had a mischievous streak.&nbsp; He wasn't a kender&nbsp;anymore. He had shot up dramatically - I want to say about a foot, but it probably wasn't, quite; the reason he worried me, and the reason I still remember it, is that while he had shot up, he hadn't expanded in any other direction - he looked like someone had grabbed him by the feet and someone else had grabbed him by the curly hair and had pulled, hard, in opposite directions - not grown so much as stretched.&nbsp; It did not look healthy - he scared me a little.&nbsp; A child learns with Legos or blocks that just putting one brick on top of another on top of another will only get you so high; sooner or later the inherent instability will topple the whole thing.&nbsp; Growing too tall too fast puts a strain on organs and bones.&nbsp; And that is, basically, what has happened with humanity.&nbsp; In the past couple of hundred years, we have shot up vertically without much growth at the base.&nbsp; We are basically the same people we were two hundred years ago - or five hundred - but we have freedoms and technologies and opportunities that weren't dreamt of then.&nbsp; In some ways we're medieval people trying to adapt to the bridge of the </span><em data-dcnode-id="1945"><span data-dcnode-id="1946" instrument_node="">Enterprise</span></em><span data-dcnode-id="1944" instrument_node="">.&nbsp;</span><br data-dcnode-id="1943"><br data-dcnode-id="1942"><span data-dcnode-id="1941" instrument_node="">Or try this: often when some of us are talking about computers or iPods or what-have-you, my 84-year-old mother will joke "Yes, just like we had when we were kids."&nbsp; She was born in 1927.&nbsp; When she actually was a kid she lived on a farm in Newfoundland without any form of central heating, without electricity, without indoor plumbing.&nbsp; In the years she has been alive technology has hit a growth spurt that makes the kender's look like nothing.&nbsp; Again, in the first millennium of the common era Manchester says there were exactly two innovations worth notice: the windmill and the water wheel.&nbsp; Apart from that, humanity was too busy just staying alive to get creative.&nbsp; It looks like after perhaps 1100, 1200? the number of inventions and innovations began to compound exponentially, and has continued to do so.</span><br data-dcnode-id="1940"><br data-dcnode-id="1939"><span data-dcnode-id="1938" instrument_node="">From the graph I found on Wiki it shows a tiny number of patents&nbsp;in the 1830's - 1850's.&nbsp; Maybe 25,000 in the 1880's.&nbsp; The 1910's look like in the 40,000 range.&nbsp; Around WWII it topped 50,000.&nbsp; Then in the late 60's it started to skyrocket.&nbsp; Hello, computer.&nbsp; More specific numbers:</span><br data-dcnode-id="1937"><br data-dcnode-id="1936"><span data-dcnode-id="1935" instrument_node="">US:</span><br data-dcnode-id="1934"><span data-dcnode-id="1933" instrument_node="">1963: 66,715</span><br data-dcnode-id="1932"><span data-dcnode-id="1931" instrument_node="">1973: 66,935</span><br data-dcnode-id="1930"><span data-dcnode-id="1929" instrument_node="">1983: 59,390</span><br data-dcnode-id="1928"><span data-dcnode-id="1927" instrument_node="">1993: 99,955</span><br data-dcnode-id="1926"><span data-dcnode-id="1925" instrument_node="">2003: 188,941</span><br data-dcnode-id="1924"><span data-dcnode-id="1923" instrument_node="">2009: 224,912</span><br data-dcnode-id="1922"><span data-dcnode-id="1921" instrument_node="">&nbsp;</span><br data-dcnode-id="1920"><span data-dcnode-id="1919" instrument_node="">Wow.&nbsp; In 46 years the number has more than tripled - 2009 saw 33.3 times more patents than 1963. (It's nice when the research bears out my theories so dramatically.) And that increase has been mostly steady.&nbsp; Obviously, the 80's saw a bit of a dip, but after that - skyrocket.&nbsp;</span><br data-dcnode-id="1918"><br data-dcnode-id="1917"><span data-dcnode-id="1916" instrument_node="">Back to the book.</span><br data-dcnode-id="1915"><br data-dcnode-id="1914"><span data-dcnode-id="1913" instrument_node="">The writing is very approachable and remarkably un-footnoted, but still not altogether easy.&nbsp; The prologue discusses how the book as a whole grew from the plan to write a paper on Magellan, and this becomes obvious as the book closes with its homage to the great explorer.&nbsp; In between, the book hops and skips and jumps from the Middle Ages to the Renaissance and back again, 1200's to 1500's to 1400's, England to Germany to Rome to Portugal, Magellan to Erasmus to all the popes of the age(s) to Calvin to Magellan again... The disjointed peripatetic style of the writing, with a deep concentration on one place and time here and a skimming over of a century or two there, was a bit difficult and disheartening at times, though in retrospect I understand the necessity of it.&nbsp; In the beginning and the end it was the story of Magellan, and the rest of it was just the background necessary to understand all that went into the first circumnavigation of the globe.&nbsp; That's the warp and weft of the book: the shrinking of the planet, in many ways - the growth of the population, making "civilized" areas more numerous and less inaccessible; the proliferation of the printed word, leading slowly but inevitably to the phenomenon known as "public opinion" as well as a wildly increased speed of the dissemination of news and information; exploration changing the way the world, and religion, were viewed.&nbsp; Still ... it feels like he took on a great deal too much, and could not do justice to all of it, and in the end seems to have filled in some of the gaps with generalization and myth.&nbsp;</span><br data-dcnode-id="1912"><br data-dcnode-id="1911"><span data-dcnode-id="1910" instrument_node="">A little research shows that some of what he presents with utmost certainty isn't at all certain.&nbsp; His brief discussion of the Pied Piper of Hamelin is only one of several explanations for the origins of the legend, and the most tabloid-worthy; apparently the tales of Francis I's sexual exploits are a bit shaky.&nbsp; A review on Amazon says it's "known among medievalists merely as 'that book'"; there's a wide divergence of opinion on it, with both five-star and one-star reviews rather passionately defended.&nbsp; I value what I learned from it - especially about Magellan, which was straight-forward and clear, and more than I remember ever learning before, thank you very much grades 1-10 history ... but overall I'm a little relieved to be finished with it at last.&nbsp; It's not a textbook on the Middle Ages or the Renaissance, but I believe it did what it set out to do: it made me think.</span></span><span data-dcnode-id="1908" instrument_node="">

</span><span data-dcnode-id="1833" id="freeTextContainer18149833587527296393"><span data-dcnode-id="1834" instrument_node="">A well written book on a fascinating subject, "A World Lit Only By Fire" is a history of the sixteenth century with a focus on Magellan. Unfortunately it ultimately skewers itself on its biases. The prose flows, the characters are interesting, and the paragraphs full of interesting details. But having just come off of Tuchman's opus "A Distant Mirror" and its profound look at the fourteenth century- ending 100 years or so before this book takes up the thread - Manchester's basic conceit that the</span></span><span data-dcnode-id="1832" instrument_node="">
</span><span data-dcnode-id="1826" id="freeText18149833587527296393" style="display:none"><span data-dcnode-id="1831" instrument_node="">A well written book on a fascinating subject, "A World Lit Only By Fire" is a history of the sixteenth century with a focus on Magellan. Unfortunately it ultimately skewers itself on its biases. The prose flows, the characters are interesting, and the paragraphs full of interesting details. But having just come off of Tuchman's opus "A Distant Mirror" and its profound look at the fourteenth century- ending 100 years or so before this book takes up the thread - Manchester's basic conceit that the medieval era was truly the Dark Ages and a low point in human (read "European") learning and culture is a matter of opinion, and counter to much research. That Manchester treats this opinion as fact makes this book dangerous. Too many impressionable minds will read only this easy volume and not explore further, thus writing off the rich cultural legacy of the era and the momentous forces that shaped it as well as our own era. This attitude is prevalent in many disciplines, most strikingly to me in music where classical music is generally regarded to have started with the Baroque era, discounting centuries of documented and orally preserved compositions of courtly and liturgical music that shaped subsequent eras as surely as Vivaldi and Bach. Only in the last few decades has the recreation of early music been taken up with academic rigor.</span><br data-dcnode-id="1830"><span data-dcnode-id="1829" instrument_node="">What this attitude really does is divorce Europe and by extension Western culture from its debt to other cultures by claiming that western civilization lay "dormant" between the fall of Rome and "rediscovery" of those old Greek and Roman texts by Europeans. Never mind that on the one hand, Europeans themselves advanced areas of classical learning such as architecture during the era, and on the other hand, different nearby cultures were preserving, translating and studying classical Greek texts and advancing their ideas. Much is owed to these efforts and their influence cannot be understated. It is a disservice to the presentation of an overview of the Middle Ages in Europe not to account for them.</span><br data-dcnode-id="1828"><span data-dcnode-id="1827" instrument_node="">The result here is a book that is easy to read and full of interesting facts, but that to me does not succeed in conveying a sense of context for the magnitude of the changes that took place in Europe during the sixteenth century. Perhaps this lack of context explains why Manchester's characterization of Magellan as a hero, in spite of his many flaws, comes across as forced. Magellan's feat was truly astonishing and the hardships faced unimaginable to most, and often his negative characteristics were what pushed him through very trying circumstances that would have broken others. But with context, it is hard to view him as a hero so much as an inevitability.</span></span><span data-dcnode-id="1825" instrument_node="">

</span><span data-dcnode-id="1738" id="freeTextContainer10960986998231892744"><span data-dcnode-id="1742" instrument_node="">William Manchester's book is really an ode to his hero, Magellan. He's not a bad hero to have, but I think Manchester gives him far too much credit. The real value however, is that Manchester is far more interested in establishing the world he lived in than examining the man. Considering how often it is difficult to get anyone willing to have the feel of a time period as their main subject, it raises the book a bit in my estimation.</span><br data-dcnode-id="1741"><br data-dcnode-id="1740"><span data-dcnode-id="1739" instrument_node="">However, 'The Medieval Mind' in the subtitle is an overstatement</span></span><span data-dcnode-id="1737" instrument_node="">
</span><span data-dcnode-id="1714" id="freeText10960986998231892744" style="display:none"><span data-dcnode-id="1736" instrument_node="">William Manchester's book is really an ode to his hero, Magellan. He's not a bad hero to have, but I think Manchester gives him far too much credit. The real value however, is that Manchester is far more interested in establishing the world he lived in than examining the man. Considering how often it is difficult to get anyone willing to have the feel of a time period as their main subject, it raises the book a bit in my estimation.</span><br data-dcnode-id="1735"><br data-dcnode-id="1734"><span data-dcnode-id="1733" instrument_node="">However, 'The Medieval Mind' in the subtitle is an overstatement. There's a brief establishment of his look at the medieval world at the start of the book, but most of it is really on the transition into the Renaissance. It's well written, and tackles the subject fairly well, but there are problems. Most of the contemporary authors he quotes were probably doing so for moralizing purposes in the first place, and a lot of what is cited has a </span><em data-dcnode-id="1731"><span data-dcnode-id="1732" instrument_node="">very</span></em><span data-dcnode-id="1730" instrument_node=""> distinct tone of 'kids these days!'. So, the book paints a picture of a static society that was breaking down into license and abuse of power that is unlikely to be very accurate in either direction.</span><br data-dcnode-id="1729"><br data-dcnode-id="1728"><span data-dcnode-id="1727" instrument_node="">Its worth noting that he covers the earliest parts of the Reformation, and within limits, covers it better than Diarmaid MacCulloch's large volume on the subject. He doesn't go into the threads of intellectual thought that is the primary focus of the latter, but he covers the more temporal aspects of the early power struggle in a more readable, and I think, more complete, format.</span><br data-dcnode-id="1726"><br data-dcnode-id="1725"><span data-dcnode-id="1724" instrument_node="">The final section is on Magellan's voyage, including a good grounding in what the original plan was, and where it went wrong: At the time, the Rio de Plata was known, and from its size, was assumed to be a passage to the Pacific, as it had been too large to explore thoroughly. It's a very good summary of one of the great sea voyages of history.</span><br data-dcnode-id="1723"><br data-dcnode-id="1722"><span data-dcnode-id="1721" instrument_node="">In general, </span><em data-dcnode-id="1719"><span data-dcnode-id="1720" instrument_node="">A World Lit Only by Fire</span></em><span data-dcnode-id="1718" instrument_node=""> is a good readable starting point for the history of the Renaissance, but a lot of nuance is decidedly not there. The general learned opinion is that his scholarship is too out date (I'll note that Durant's </span><em data-dcnode-id="1716"><span data-dcnode-id="1717" instrument_node="">Story of Civilization</span></em><span data-dcnode-id="1715" instrument_node=""> looks to be the primary starting point of his opinions, which while great, is well over half a century old), though I don't know of a more current 'alternative'.</span></span><span data-dcnode-id="1713" instrument_node="">

</span><span data-dcnode-id="1629" id="freeTextContainer8383554416494389593"><span data-dcnode-id="1633" instrument_node="">Manchester did an amazing job taking a very convoluted period of time from history and presenting it in an easy-to-read manner. Material rolled out smoothly and was peppered with amazingly specific details that really enhanced my ability to experience medieval times and the nature and plight of the human experience during that era. </span><br data-dcnode-id="1632"><br data-dcnode-id="1631"><span data-dcnode-id="1630" instrument_node="">For instance, during the times of Henry VII and Henry VII the per capita allowance was a gallon of beer a day - even for nuns and eight year old children. The English</span></span><span data-dcnode-id="1628" instrument_node="">
</span><span data-dcnode-id="1617" id="freeText8383554416494389593" style="display:none"><span data-dcnode-id="1627" instrument_node="">Manchester did an amazing job taking a very convoluted period of time from history and presenting it in an easy-to-read manner. Material rolled out smoothly and was peppered with amazingly specific details that really enhanced my ability to experience medieval times and the nature and plight of the human experience during that era. </span><br data-dcnode-id="1626"><br data-dcnode-id="1625"><span data-dcnode-id="1624" instrument_node="">For instance, during the times of Henry VII and Henry VII the per capita allowance was a gallon of beer a day - even for nuns and eight year old children. The English "drink no water, unless at certain times upon religious score, or by way of doing penance." Which means there must have been an exceptional degree of intoxication, for people then were small. The average man stood a few inches over five feet and weighted about 135 pounds. His wife was shorter and lighter.....A young girls life expectancy was twenty-four. On her wedding day, traditionally, her mother gaver her a piece of fine cloth which could be made into a frock. Six or seven years later it would become her shroud. (pgs 54-55)</span><br data-dcnode-id="1623"><br data-dcnode-id="1622"><span data-dcnode-id="1621" instrument_node="">Manchester does a fine job of weaving political, religious and scientific development in such a way that the text never becomes boring or dry. An astonishing feat considering the large span of time he covered in history.</span><br data-dcnode-id="1620"><br data-dcnode-id="1619"><span data-dcnode-id="1618" instrument_node="">Manchester pummels catholicism as he treads through its early development and expansion. I would be interested in hearing reaction from faithful catholic readers as to how they reconcile the widespread corruption of early church history with their current perspective.</span></span><span data-dcnode-id="1616" instrument_node="">

</span><span data-dcnode-id="1522" id="freeTextContainer10141832100049442323"><span data-dcnode-id="1529" instrument_node="">This is an excellent book on the rise of Christian Europe from the Dark Ages to Medieval times and the Renaissance. </span><br data-dcnode-id="1528"><br data-dcnode-id="1527"><span data-dcnode-id="1526" instrument_node="">Manchester pulls no punches and leaves no stone unturned when it comes to the corruption of the Papal church, its policies of granting indulgences for a price and how the common people of Europe were actually "Christianized."</span><br data-dcnode-id="1525"><br data-dcnode-id="1524"><span data-dcnode-id="1523" instrument_node="">He then delves into the Reformation and how it went from a simple religious protest for change back to piety to the fanatical revolution leading to the inquisi</span></span><span data-dcnode-id="1521" instrument_node="">
</span><span data-dcnode-id="1504" id="freeText10141832100049442323" style="display:none"><span data-dcnode-id="1520" instrument_node="">This is an excellent book on the rise of Christian Europe from the Dark Ages to Medieval times and the Renaissance. </span><br data-dcnode-id="1519"><br data-dcnode-id="1518"><span data-dcnode-id="1517" instrument_node="">Manchester pulls no punches and leaves no stone unturned when it comes to the corruption of the Papal church, its policies of granting indulgences for a price and how the common people of Europe were actually "Christianized."</span><br data-dcnode-id="1516"><br data-dcnode-id="1515"><span data-dcnode-id="1514" instrument_node="">He then delves into the Reformation and how it went from a simple religious protest for change back to piety to the fanatical revolution leading to the inquisition and interfaith bloodbaths. </span><br data-dcnode-id="1513"><br data-dcnode-id="1512"><span data-dcnode-id="1511" instrument_node="">I found it to be an honest look at the time, the royal leadership of Europe and their relationship with the church, the suppression of science and learning that wasn't in line with the churches dogma.</span><br data-dcnode-id="1510"><br data-dcnode-id="1509"><span data-dcnode-id="1508" instrument_node="">Never before have I had such a glimpse into the Medieval train of thought and what motivated those historical figures that have reached almost mythical proportions: The Borgia's, Martin Luther, Henry VII, et al.</span><br data-dcnode-id="1507"><br data-dcnode-id="1506"><span data-dcnode-id="1505" instrument_node="">A wonderful book for the history buff, the Renaissance Faire patron and the casual reader. </span></span><span data-dcnode-id="1503" instrument_node="">
