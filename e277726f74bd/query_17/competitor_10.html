</span><span data-dcnode-id="1382" id="freeTextContainer2152871961375273625"><span data-dcnode-id="1383" instrument_node="">Until the last year or so, I had not often chosen to read books about history. I think I was just too put off by memorizing dates and names in high school. But I've been impressed with the books I've read recently and my interest is piqued. And this book came highly recommended to me by my hubby's professor, so I figured I'd check it out. Full of intrigue, treachery, lust and greed, it was almost as unbelievable and filled with subplots as a soap opera. They do say that truth is stranger than fi</span></span><span data-dcnode-id="1381" instrument_node="">
</span><span data-dcnode-id="1364" id="freeText2152871961375273625" style="display:none"><span data-dcnode-id="1380" instrument_node="">Until the last year or so, I had not often chosen to read books about history. I think I was just too put off by memorizing dates and names in high school. But I've been impressed with the books I've read recently and my interest is piqued. And this book came highly recommended to me by my hubby's professor, so I figured I'd check it out. Full of intrigue, treachery, lust and greed, it was almost as unbelievable and filled with subplots as a soap opera. They do say that truth is stranger than fiction, right? I have read that abuses in the name of religion have been rampant throughout the ages, but from what I read in this book, no other age was nearly as corrupt and devoid of principles and morality as this time period. Scandals abound and this book illustrates the axiom that "power corrupts and absolute power corrupts absolutely." </span><br data-dcnode-id="1379"><br data-dcnode-id="1378"><span data-dcnode-id="1377" instrument_node="">I thoroughly enjoyed the descriptions of life during these times. Many fictional tales about this time period overly romanticize the chivalry and courtliness and gloss over the ugly realities. But life 600 years ago was short, violent and dirty. It was fascinating to read how different members of society lived, what they ate, and even how they were (or weren't) named or clothed. I especially liked the background on some of the more familiar literary figures and where truth and fiction separate (like the Pied Piper, Lancelot, Leonardo da Vinci and Lucretia Borgia.)</span><br data-dcnode-id="1376"><br data-dcnode-id="1375"><span data-dcnode-id="1374" instrument_node="">The section on Magellan and his adventure against all odds to attempt to circumnavigate the globe is very interesting, though a bit disjointed with the rest of the book. As an aviator and navigator, I am in awe of those who were able to travel so far and navigate so precisely without the tools, tables and computers we have available today. And they did it without an clock able to keep precise time at sea (they hadn't been invented yet,) which makes the task even more monumental! [For more information about that discovery, read [book:Longitude: The True Story of a Lone Genius Who Solved the Greatest Scientific Problem of his Time|4806] by Dava Sobel.] Prior to reading this book I knew that Magellan's epic journey had accomplished something no one else had before - circumnavigating the globe and proving conclusively that the world is round - but I knew very little about the details of his trip. </span><br data-dcnode-id="1373"><br data-dcnode-id="1372"><span data-dcnode-id="1371" instrument_node="">My only complaint would be that at times it was pretty dense reading and it took over a week to get through the book. It didn't help that the copy I was loaned was missing the last 14 pages, but luckily our local library had a copy so I was able to finish in a timely fashion. </span><br data-dcnode-id="1370"><br data-dcnode-id="1369"><span data-dcnode-id="1368" instrument_node="">Finally, when I first read the title, my thoughts ran to the idea of the lack of electricity and the need for fire and torches to light the night. I shudder now to think about the underlying meaning of this title, the sheer number of people who were burned at the stake for heresy in this very brutal age. I am so fortunate to live in these times!</span><br data-dcnode-id="1367"><br data-dcnode-id="1366"><span data-dcnode-id="1365" instrument_node="">new words: prurient, martinet, harquebus, meretricious,obloquy, exculpation</span></span><span data-dcnode-id="1363" instrument_node="">

</span><span class="uitext reviewText" data-dcnode-id="1280"><span data-dcnode-id="1281" instrument_node="">Anyone who likes history or historical fiction</span></span></div><span data-dcnode-id="1278" instrument_node="">

</span><span class="readable" data-dcnode-id="1234" id="reviewTextContainer33022530"><span data-dcnode-id="1262" instrument_node="">
</span><span data-dcnode-id="1257" id="freeTextContainer870548591576929523"><span data-dcnode-id="1261" instrument_node="">A good companion to medieval historical fiction, Robin Hood, fantasy lit, etc., as well as an aide to church and religious history. He gives a warts-and-all picture of peasant, artisan, clerical and noble life, mostly in the 15th and 16th centuries (little being known about life before then). Actually, make that a wart, pockmark, scrofula, arthritis, and dungheap-and-all picture. </span><br data-dcnode-id="1260"><br data-dcnode-id="1259"><span data-dcnode-id="1258" instrument_node="">For those loyal to (and innocent about) the Church, here's a bit of a caveat: You won't like the part about the behav</span></span><span data-dcnode-id="1256" instrument_node="">
</span><span data-dcnode-id="1239" id="freeText870548591576929523" style="display:none"><span data-dcnode-id="1255" instrument_node="">A good companion to medieval historical fiction, Robin Hood, fantasy lit, etc., as well as an aide to church and religious history. He gives a warts-and-all picture of peasant, artisan, clerical and noble life, mostly in the 15th and 16th centuries (little being known about life before then). Actually, make that a wart, pockmark, scrofula, arthritis, and dungheap-and-all picture. </span><br data-dcnode-id="1254"><br data-dcnode-id="1253"><span data-dcnode-id="1252" instrument_node="">For those loyal to (and innocent about) the Church, here's a bit of a caveat: You won't like the part about the behavior of popes and cardinals in the late Middle Ages, which makes the recent sex-abuse scandals look like Aunt Nellie hitching up her bra in the sanctuary. And as for Martin Luther--he had his great spiritual insights on the potty. Salvation by grace? The Spirit gave him that gift while he was doing Number Two. (READ IT YOURSELF!)</span><br data-dcnode-id="1251"><br data-dcnode-id="1250"><span data-dcnode-id="1249" instrument_node="">The Reformation started out with the humanists and the Lutherans standing up bravely to the Catholic loyalists. Then it seems to have deteriorated into a bloodbath. The Catholics burned the Lutherans. The Lutherans burned the Catholics. They tortured each other, cut off noses and hands, ears and genitals, hanged and drew and quartered. And they all killed the humanists, all over Europe. </span><br data-dcnode-id="1248"><br data-dcnode-id="1247"><span data-dcnode-id="1246" instrument_node="">Set against this, there was Capitan-General Ferdinand Magellan. Sailing out past Gibraltar while Luther was preparing to defend himself against Pope Leo's unenthusiastic questioning, in 5 refurbished ships, with 4 mutinous nobles to sail them, 5 mulitnational crews, inadequate maps, very little idea of where he was going, and the Portuguese navy ready to board him if they could. It took most of a year to discover the southern strait that led to the Pacific, by which time he had already survived a mutiny, and he lost two ships before he reached the Philippines. Manchester's portrait of Magellan--his heroism, his tragic flaws, his death, and his resurrected reputation--is a ray of sunlight in the dark squalor of the Middle Ages. </span><br data-dcnode-id="1245"><br data-dcnode-id="1244"><span data-dcnode-id="1243" instrument_node="">What was Europe like then? A vast, trackless forest, with here and there a tiny, nameless settlement, whose dialect might be incomprehensible to people 100 miles away. You didn't have a surname because you didn't need one--everyone knew who you were. The medievals were notable for their complete lack of ego. A cathedral took 200 years to build, yet how many of their builders are known? Today, if we spend 4 hours writing something we want our names on it. (I've spent ten minutes on this and I expect credit for it.) Peasants went naked in the summer and slept all together, whole families in one big bed, even if mom and dad were getting it on together. Famine was common, and so was cannibalism, and farming was unrecognizably primitive. All knowledge was known and nothing remained to be invented.</span><br data-dcnode-id="1242"><br data-dcnode-id="1241"><span data-dcnode-id="1240" instrument_node="">A thousand years from now, if there are people and they remember us, what will they think of us? What will stand out? How will they describe our civilization?</span></span><span data-dcnode-id="1238" instrument_node="">

</span><span data-dcnode-id="1163" id="freeTextContainer8960969354059330050"><span data-dcnode-id="1164" instrument_node="">A crime against history. Assigning this to a student is pedagogical malpractice. Anyone knowing almost nothing about the Middle Ages or the Renaissance should avoid this. Where to start? Factual errors abound, almost one per paragraph. Manchester asserts in the span of 2 pages that Robin Hood, the Pied Piper, and King Arthur existed, and that their existence is somehow evidence of the barbarity of the age and limitation of the medieval mind. He repeats that old bugbear about the age of explorati</span></span><span data-dcnode-id="1162" instrument_node="">
</span><span data-dcnode-id="1152" id="freeText8960969354059330050" style="display:none"><span data-dcnode-id="1161" instrument_node="">A crime against history. Assigning this to a student is pedagogical malpractice. Anyone knowing almost nothing about the Middle Ages or the Renaissance should avoid this. Where to start? Factual errors abound, almost one per paragraph. Manchester asserts in the span of 2 pages that Robin Hood, the Pied Piper, and King Arthur existed, and that their existence is somehow evidence of the barbarity of the age and limitation of the medieval mind. He repeats that old bugbear about the age of exploration dispelling the purported belief that the earth was flat—and while Manchester mentions that Bede, e.g., did not hold this view, he never unpacks it, this cavalier treatment of facts being typical and intensely frustrating. He conflates Renaissance with Reformation with Humanism. He intimates Luther was some enlightened challenger to medieval Catholic hegemony, as if Luther were the light from the dawn of rationalism. Manchester seethes with horniness, writing awfully detailed paragraphs about some libertine conception of medieval sexuality. This book is written off vibes, hence the frequency of factual errors beaten out of most undergrads and the brutally sloppy structure. A bizarre, prudish Protestant read a biography of Magellan like a child would read Horatio Hornblower books and slammed that together with a thesis that the medieval era was all that was ignorant and wrong and the Renaissance was a deliverance from... </span><i data-dcnode-id="1159"><span data-dcnode-id="1160" instrument_node="">something</span></i><span data-dcnode-id="1158" instrument_node="">, ignorance or indecency or unreason. He furnishes this with just enough detail from secondary sources (only secondary sources!) to supply dates and names but doesn't engage enough to challenge his thesis or fashion consistency or command of his own ideology, appearing credulous and buffoonish as he reads every detail in the most sensationalist way possible. Arrogant and condescending, sneering with contempt at the subject, like if Richard Dawkins wrote an Introduction to Religious Studies textbook. What a piece of shit.</span><br data-dcnode-id="1157"><br data-dcnode-id="1156"><span data-dcnode-id="1155" instrument_node="">Takeaway:</span><br data-dcnode-id="1154"><span data-dcnode-id="1153" instrument_node="">"Most young Frenchwomen are said to have been delighted when conscripted to receive the king in all his manly glory, and in their appearances at court they competed for his attention. Opening their bodices, they displayed swelling bosoms down to, and sometimes below, their nipples (unless the bosoms were inadequate, in which case padding had been inserted under the stays). Their backs had been cut down to the last vertebra, sleeves billowed, gowns were pinched at the waits and tightened under the breasts, hidden wires spread out the skirt, and high heels gave each hopeful candidate a prancing, sexy walk."</span></span><span data-dcnode-id="1151" instrument_node="">

</span><span data-dcnode-id="1070" id="freeTextContainer1015320481459810157"><span data-dcnode-id="1071" instrument_node="">In high school, college or university, most of us have run across the teacher/professor (typically an older white man) who could be prompted to go off on lengthy tangents on a favored topic despite little to no relation to the matter at hand. For example, in your Geology/Geography course on climate, in response to a question about frozen podzolic soil in the Ukraine, your professor launches into a lengthy monologue on the terrible conditions in a foxhole on the Russian Front during WW2. Fascinat</span></span><span data-dcnode-id="1069" instrument_node="">
</span><span data-dcnode-id="1061" id="freeText1015320481459810157" style="display:none"><span data-dcnode-id="1068" instrument_node="">In high school, college or university, most of us have run across the teacher/professor (typically an older white man) who could be prompted to go off on lengthy tangents on a favored topic despite little to no relation to the matter at hand. For example, in your Geology/Geography course on climate, in response to a question about frozen podzolic soil in the Ukraine, your professor launches into a lengthy monologue on the terrible conditions in a foxhole on the Russian Front during WW2. Fascinating, but not likely to be on the Final.</span><br data-dcnode-id="1067"><br data-dcnode-id="1066"><span data-dcnode-id="1065" instrument_node="">Anyway, “A World Lit Only by Fire” seems to me like a lecture that has gone wildly off the track. Fabulous and interesting stories (that may or may not be true) tied together only in the most tenuous manner. Let's face it; it's much more interesting to read about the Pied Piper of Hamelin or the sexcapades of Lucretia Borgia and her family than the building of the Kölner Dom. </span><br data-dcnode-id="1064"><br data-dcnode-id="1063"><span data-dcnode-id="1062" instrument_node="">But the thing that left me scratching my head the most was the final quarter of the book where we're suddenly treated to a much deeper study of Ferdinand Magellan. OK, I understand Magellan was a very important figure, but does he deserve being placed on such a lofty pedestal, and in the book as well? I think not. Manchester either pasted on the Magellan portion or more likely, he had been working a biography of Magellan and realized he had to flesh out some background. While there is space for the 'great man' studies in history, it should not be in a book such as this. One is far better off reading Barbara Tuchman's “A Distant Mirror” to learn about the Middle Ages. This is a dynamic lecture that unfortunately has some serious technical errors. OK as long as you keep that in mind. </span></span><span data-dcnode-id="1060" instrument_node="">

</span><span data-dcnode-id="973" id="freeText10437891404091986169" style="display:none"><span data-dcnode-id="980" instrument_node="">When the Roman empire fell in 5th century AD, Western Europe plunged into the Dark Ages. For a thousand years, barbarian invasions, despotic kings, mercenary knights, corrupt popes, unreasoning Church dogma, intolerance, brute force, superstition, greed, strife and violence ruled the land.</span><br data-dcnode-id="979"><br data-dcnode-id="978"><span data-dcnode-id="977" instrument_node="">It was from this millenium of darkness that humanism emerged, and against this backdrop of backwardness that the Renaissance shone. In the 15th century, Western Europe rediscovered the Greek classics. The use of reason, instead of only submission to Church dogma or monarchic authority, became a standard for discourse. Despite the threat of excommunication, or worse, decapitation or burning at the stake, free thinkers propounded liberating ideas. It was a century of exploration and discovery. Erasmus advocated religious tolerance. Copernicus proposed that it was the earth that revolved around the sun. Luther battled an immoral Church. And Magellan, betting his life on the belief that the earth was round, flung his fleet of leaking ships with insufficient provisions across 12,600 miles of uncharted ocean (the Pacific) towards uncertain landfall.</span><br data-dcnode-id="976"><br data-dcnode-id="975"><span data-dcnode-id="974" instrument_node="">Manchester holds you well in his storytelling of these times.</span></span><span data-dcnode-id="972" instrument_node="">
