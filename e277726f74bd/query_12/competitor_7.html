</span><h1 class="article-title" data-dcnode-id="2318"><span data-dcnode-id="2319" instrument_node="">Historians and “Memory”</span></h1><span data-dcnode-id="2317" instrument_node="">
</span><p class="article-author" data-dcnode-id="2315"><span data-dcnode-id="2316" instrument_node=""> David W. Blight </span></p><span data-dcnode-id="2314" instrument_node="">
</span></header><span data-dcnode-id="2311" instrument_node="">
</span><div class="entry-excerpt" data-dcnode-id="2303"><span data-dcnode-id="2310" instrument_node="">
</span><div class="well" data-dcnode-id="2305"><span data-dcnode-id="2309" instrument_node="">
</span><p data-dcnode-id="2307"><span data-dcnode-id="2308" instrument_node="">“Memory is often owned, history interpreted. Memory is passed down through generations; history is revised.”</span></p><span data-dcnode-id="2306" instrument_node="">
</span></div><span data-dcnode-id="2304" instrument_node="">
</span></div><span data-dcnode-id="2302" instrument_node="">
</span><div class="row" data-dcnode-id="2152"><span data-dcnode-id="2301" instrument_node="">
</span><div class="col-sm-12" data-dcnode-id="2154"><span data-dcnode-id="2300" instrument_node="">
</span><div class="entry-content" data-dcnode-id="2157"><span data-dcnode-id="2299" instrument_node="">
</span><figure class="wp-caption alignright" data-dcnode-id="2294" id="attachment_2763"><div class="fig-wrap" data-dcnode-id="2295"><img alt="2.3.Blight.1" class="img-responsive wp-image-2763 size-full" data-dcnode-id="2298" height="228" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//commonplacenew.wpengine.com/wp-content/uploads/2015/09/2.3.Blight.1.jpg&amp;raw" width="160"><figcaption class="wp-caption-text" data-dcnode-id="2296"><span data-dcnode-id="2297" instrument_node="">David W. Blight</span></figcaption></div></figure><span data-dcnode-id="2293" instrument_node="">
</span><p data-dcnode-id="2291"><span data-dcnode-id="2292" instrument_node="">For more than a decade, historians from many fields and nations have been studying the past through the lens of “memory.” Some say we have veered from our training and subject matter (“gone over to the enemy” of post-structuralism, as one questioner put it to me). But many others–and I include myself–have felt the pull to investigate how societies remember, to research the “myths” that define cultures, to cross over into the realm of public, collective historical consciousness in all its manifestations.</span></p><span data-dcnode-id="2290" instrument_node="">
</span><p data-dcnode-id="2285"><span data-dcnode-id="2289" instrument_node="">The concepts of history and memory can be conflated or discretely preserved in use and meaning; it is important to establish their differences. Historians are custodians of the past; we are preservers and discoverers of the facts and stories out of which people imagine their civic lives. But we need a sense of both humility and engagement in the face of&nbsp;</span><i data-dcnode-id="2287"><span data-dcnode-id="2288" instrument_node="">public&nbsp;</span></i><span data-dcnode-id="2286" instrument_node="">memory. “The remembered past,” warned John Lukacs in 1968, “is a much larger category than the recorded past.”</span></p><span data-dcnode-id="2284" instrument_node="">
</span><p data-dcnode-id="2282"><span data-dcnode-id="2283" instrument_node="">History is what trained historians do, a reasoned reconstruction of the past rooted in research; it tends to be critical and skeptical of human motive and action, and therefore more secular than what people commonly call memory. History can be read by or belong to everyone; it is more relative, and contingent on place, chronology, and scale.</span></p><span data-dcnode-id="2281" instrument_node="">
</span><p data-dcnode-id="2279"><span data-dcnode-id="2280" instrument_node="">If history is shared and secular, memory is often treated as a sacred set of absolute meanings and stories, possessed as the heritage or identity of a community. Memory is often owned, history interpreted. Memory is passed down through generations; history is revised. Memory often coalesces in objects, sites, and monuments; history seeks to understand contexts in all their complexity. History asserts the authority of academic training and canons of evidence; memory carries the often more immediate authority of community membership and experience. Bernard Bailyn has aptly stated memory’s appeal: “its relation to the past is an embrace . . . ultimately emotional, not intellectual.”</span></p><span data-dcnode-id="2278" instrument_node="">
</span><p data-dcnode-id="2276"><span data-dcnode-id="2277" instrument_node="">Scholars working on memory are no less devoted to traditional sources than those on any other subject. We assess all manner of individual memories (actual remembered experience) in letters, memoirs, speeches, debates, and autobiography. But our primary concern is with the illusive problem of collective memory–the ways in which groups, peoples, or nations construct versions of the past and employ them for self-understanding and to win power in an ever-changing present. The fierce debate over National History Standards during the early 1990s was not only a clinic about the stakes in America’s “culture wars,” but a culture-wide lesson in the politics of history’s relationship to collective memory.</span></p><span data-dcnode-id="2275" instrument_node="">
</span><p data-dcnode-id="2273"><span data-dcnode-id="2274" instrument_node="">In short, historians study memory because it has been such an important modern instrument of power. And what historians studying memory have come to understand is simply that the process by which societies or nations remember collectively itself has a history.</span></p><span data-dcnode-id="2272" instrument_node="">
</span><p data-dcnode-id="2264"><span data-dcnode-id="2271" instrument_node="">There are risks, of course, as historians shift their gaze to matters of social and public memory. We could become servants of the very culture wars that have given rise to so many struggles over memory in our own time. Memory is usually invoked in the name of nation, ethnicity, race, religion, or on behalf of a felt need for peoplehood or victimhood. It often thrives on grievance and its lifeblood is mythos and telos. Like our subjects, we can risk thinking&nbsp;</span><i data-dcnode-id="2269"><span data-dcnode-id="2270" instrument_node="">with</span></i><span data-dcnode-id="2268" instrument_node="">&nbsp;memory rather than&nbsp;</span><i data-dcnode-id="2266"><span data-dcnode-id="2267" instrument_node="">about</span></i><span data-dcnode-id="2265" instrument_node="">&nbsp;it. Indeed, the study of memory is fueled in part by the world’s post-Holocaust and post-Cold War need to assess the stories of survivors of genocide, trauma, or totalitarian control over historical consciousness. While I agree that the world is riven with too much memory, and that its obsessions can stifle democratizing and universalizing principles, it is precisely because of this dilemma that we must study historical memory. We should know its uses and perils, its values and dark tendencies.</span></p><span data-dcnode-id="2263" instrument_node="">
</span><p data-dcnode-id="2258"><span data-dcnode-id="2262" instrument_node="">People will develop a sense of the past by one means or another–from schooling, religion, family, popular culture, or demagoguery. Historical consciousness can result from indoctrination or a free market of a hundred blooming interpretations. But the greatest risk, writes Cynthia Ozick, is a tendency of people to derive their sense of the past only from the “fresh-hatched inspiration” of their “Delphic priests.” History is often weak in the face of the mythic power of memory and its oracles. But we run the greatest risk in ignoring that weakness, wishing the public would adopt a more critical, interpretive sense of the past. “Cut off from the uses of history, experience, and memory,” cautions Ozick, the “inspirations” alone of any culture’s Delphic priests “are helpless to make a future.” As historians, we are bound by our craft and by our humanity to study the problem of memory and thereby help make a future. We should respect the poets and priests; we should study the defining myths at play in any memory controversy. But then, standing at the confluence of the two streams of history and memory, we should write the history&nbsp;</span><i data-dcnode-id="2260"><span data-dcnode-id="2261" instrument_node="">of</span></i><span data-dcnode-id="2259" instrument_node="">&nbsp;memory, observing and explaining the turbulence we find.</span></p><span data-dcnode-id="2257" instrument_node="">
</span><p data-dcnode-id="2252"><span data-dcnode-id="2256" instrument_node="">The most turbulent problem in American historical memory has long been our Civil War. As I tried to show in my recent book</span><i data-dcnode-id="2254"><span data-dcnode-id="2255" instrument_node="">, Race and Reunion,&nbsp;</span></i><span data-dcnode-id="2253" instrument_node="">Americans have over the years drummed the deep divisiveness of 1861-65 into a national epic of unity, of mutual glory and sacrifice. But the politics of reconciliation came at tremendous costs in American race relations; they required a blurring and near erasure of the story of black emancipation at the heart of the war. During the first half century after Appomattox, and for most of the twentieth century as well, Americans preferred a story of reconciled conflict to the reality of unresolved racial and legal legacies.</span></p><span data-dcnode-id="2251" instrument_node="">
</span><p data-dcnode-id="2249"><span data-dcnode-id="2250" instrument_node="">The modern civil rights movement, occurring at the same time as the Civil War centennial, made new memories and narratives possible as never before. But any cursory look at the industry of Civil War publishing, nostalgia, and tourism will demonstrate that the story of the war as a sad but heroic episode on the journey to greater harmony and progress is alive and well in our popular memory. Widely divergent views of the war’s meaning have surfaced in recent years over Confederate symbols and over the National Park Service’s effort to broaden interpretations at battlefield sites. Moreover, the Sons of Confederate Veterans have become politicized as never before, portraying themselves and other advocates of Confederate tradition as victims of “cultural ethnic cleansing” and “wholesale persecution” by the “political correctness” of academic historians and their lackeys in government.</span></p><span data-dcnode-id="2248" instrument_node="">
</span><p data-dcnode-id="2243"><span data-dcnode-id="2247" instrument_node="">On the broadest level, most Americans love a good story of reunion, as evidenced in the popularity of Jay Winik’s recent book,&nbsp;</span><i data-dcnode-id="2245"><span data-dcnode-id="2246" instrument_node="">April 1865: The Month that Saved America</span></i><span data-dcnode-id="2244" instrument_node="">. According to Winik, America was “saved” in one packed month of reconciliationist drama and spirit, from the fall of Richmond to the burial of Lincoln. A long view, at least glimpsing the beginning days of Reconstruction, seems to vast numbers of enthusiastic readers unnecessary in order to understand the place of the war in American memory.</span></p><span data-dcnode-id="2242" instrument_node="">
</span><p data-dcnode-id="2237"><span data-dcnode-id="2241" instrument_node="">How touching the healing can seem when viewed only from the poignancy of the war’s immediate aftermath. What a rousing good story the Grant and Lee of April 1865 make as peacemakers rather than warmakers. Why take stock of lasting political and racial consequences of the war, or the bitterness of Reconstruction, or slavery’s legacies when what we really need today is a good story of national harmony and American problem solving? American tragedies, after all, demand happy endings. Americans may not have remembered the Civil War quite like the Serbs did the battle of Kosovo from the fourteenth century. But our “great war” of the nineteenth century haunts our collective memory to this day. History and memory are both about the&nbsp;</span><i data-dcnode-id="2239"><span data-dcnode-id="2240" instrument_node="">stories</span></i><span data-dcnode-id="2238" instrument_node="">&nbsp;we tell, but those stories carry a rich politics born of the streets, of our classrooms, our elections, and the process by which books make it to the front tables at Barnes and Noble.</span></p><span data-dcnode-id="2236" instrument_node="">
</span><p data-dcnode-id="2231"><span data-dcnode-id="2235" instrument_node="">Collective memory should be seen as a set of practices and ideas embedded in a culture, which people learn to decode and convert into their identities. Jay Winter warns that “nations do not remember, groups of people do.” Indeed, but nations are the evolving creations of high-stakes contests between groups contending to define the past, present, and future of national cultures. Is the United States the nation that preserved itself in the “War Between the States,” or the republic that reinvented itself in a&nbsp;</span><i data-dcnode-id="2233"><span data-dcnode-id="2234" instrument_node="">civil war</span></i><span data-dcnode-id="2232" instrument_node="">&nbsp;that destroyed racial slavery and expanded freedom? Was the war a bloodletting on the way to a better, more unified nation ready to play its appointed role in world affairs? Or, was the war a deep national tragedy, the meaning of which is embedded in many conflicted group memories–those of defeated white Southerners, victorious white Northerners, black former slaves, the descendents of free blacks, or European immigrant groups who made up significant percentages of the Union armies?</span></p><span data-dcnode-id="2230" instrument_node="">
</span><p data-dcnode-id="2225"><span data-dcnode-id="2229" instrument_node="">Indeed, who&nbsp;</span><i data-dcnode-id="2227"><span data-dcnode-id="2228" instrument_node="">owns</span></i><span data-dcnode-id="2226" instrument_node="">&nbsp;the memory of the Civil War? Is it those who wish to preserve the sacred ground of battlefield parks for the telling of an epic narrative of shared military glory? Or, is it professional historians with academic training, determined to broaden the public interpretation of Civil War sites to include slavery, social history, women, and home fronts? Should the master narrative of the Civil War be an essentially reconciliationist story of mutual sacrifice by noble men and women who believed in their equal versions of the right? Or, should that narrative be a complex, pluralistic story of sections and races deeply divided over the future of slavery, free labor, and the character and breadth of American liberty? If everyone fought for “liberty” in the Civil War, as is often said, then whose collective memory of the struggle should have a privileged place in textbooks, films, and on our memorial landscape? Indeed, whose claims to liberty prevailed?</span></p><span data-dcnode-id="2224" instrument_node="">
</span><p data-dcnode-id="2222"><span data-dcnode-id="2223" instrument_node="">Just by asking these questions we can see how contested Civil War memory can be. The war is not an event we have transformed entirely into the realm of pleasing myth, although it remains very difficult to penetrate its veneer of sentimentalism in the popular mind. Like all other modern nations, America’s historical memory can never be fixed in a static structure or a single master narrative. Our multicultural national identity will continue to evolve, and new history wars will break out among historians and school boards. Politicians will continue to claim a useable past for their ends, as will a hundred local Delphic priests. But nations still have histories colliding and forming in tandem and conflict with many group memories. As historians we have to keep contending to define the whole formed from all of our parts.</span></p><span data-dcnode-id="2221" instrument_node="">

</span><h2 data-dcnode-id="722"><span data-dcnode-id="723" instrument_node="">ABOUT</span></h2><span data-dcnode-id="721" instrument_node="">
</span><p data-dcnode-id="719"><span data-dcnode-id="720" instrument_node="">
</span></p><p data-dcnode-id="717"></p><span data-dcnode-id="716" instrument_node="">
</span><p data-dcnode-id="701" style="font-weight: 400;"><em data-dcnode-id="714"><span data-dcnode-id="715" instrument_node="">Welcome to&nbsp;Commonplace</span></em><span data-dcnode-id="713" instrument_node="">,</span><em data-dcnode-id="711"><span data-dcnode-id="712" instrument_node="">&nbsp;</span></em><span data-dcnode-id="710" instrument_node="">a destination for exploring and exchanging ideas about early American history and culture. A bit less formal than a scholarly journal, a bit more scholarly than a popular magazine,&nbsp;</span><em data-dcnode-id="708"><span data-dcnode-id="709" instrument_node="">Commonplace</span></em><em data-dcnode-id="706"><span data-dcnode-id="707" instrument_node="">&nbsp;</span></em><span data-dcnode-id="705" instrument_node="">speaks—and listens—to scholars, museum curators, teachers, hobbyists, and just about anyone interested in American history before 1900.&nbsp;</span><em data-dcnode-id="703"><span data-dcnode-id="704" instrument_node="">It is</span></em><span data-dcnode-id="702" instrument_node="">&nbsp;for all sorts of people to read about all sorts of things relating to early American life—from architecture to literature, from politics to parlor manners. It’s a place to find insightful analysis of early American history as it is discussed in scholarly literature, as it manifests on the evening news, as it is curated in museums, big and small; as it is performed in documentary and dramatic films and as it shows up in everyday life.</span></p><span data-dcnode-id="700" instrument_node="">
</span><p data-dcnode-id="672" style="font-weight: 400;"><span data-dcnode-id="699" instrument_node="">In addition to critical evaluations of books and websites (</span><a data-dcnode-id="696" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//commonplacenew.wpengine.com/reviews/"><u data-dcnode-id="697"><span data-dcnode-id="698" instrument_node="">Reviews</span></u></a><span data-dcnode-id="695" instrument_node="">) and poetic research and fiction (</span><a data-dcnode-id="692" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//commonplacenew.wpengine.com/creative-writing/"><u data-dcnode-id="693"><span data-dcnode-id="694" instrument_node="">Creative Writing</span></u></a><span data-dcnode-id="691" instrument_node="">),&nbsp;our articles explore&nbsp;material and visual culture (</span><u data-dcnode-id="688"><a data-dcnode-id="689" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//commonplacenew.wpengine.com/objects/"><span data-dcnode-id="690" instrument_node="">Objects</span></a></u><span data-dcnode-id="687" instrument_node="">);&nbsp;pedagogy, the writing of literary scholarship, and the historian’s craft (</span><a data-dcnode-id="684" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//commonplacenew.wpengine.com/teach/"><u data-dcnode-id="685"><span data-dcnode-id="686" instrument_node="">Teach</span></u></a><span data-dcnode-id="683" instrument_node="">); and diverse&nbsp;aspects of America’s past and its many peoples (</span><a data-dcnode-id="680" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//commonplacenew.wpengine.com/learn/"><u data-dcnode-id="681"><span data-dcnode-id="682" instrument_node="">Learn</span></u></a><span data-dcnode-id="679" instrument_node="">). For more great content, check out our other projects, (</span><a data-dcnode-id="677" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//jto.americanantiquarian.org/"><span data-dcnode-id="678" instrument_node="">Just Teach One</span></a><span data-dcnode-id="676" instrument_node="">) and (</span><a data-dcnode-id="674" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//jtoaa.americanantiquarian.org/"><span data-dcnode-id="675" instrument_node="">Just Teach One African American Print</span></a><span data-dcnode-id="673" instrument_node="">).</span></p><span data-dcnode-id="671" instrument_node="">
