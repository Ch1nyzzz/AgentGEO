</span><p data-dcnode-id="844"><span data-dcnode-id="856" instrument_node="">More than 65 years after his death, Albert Einstein continues to fascinate—to the extent that a 1946 letter he wrote containing the famous </span><em data-dcnode-id="854"><span data-dcnode-id="855" instrument_node="">E = mc</span></em><sup data-dcnode-id="852"><span data-dcnode-id="853" instrument_node="">2</span></sup><span data-dcnode-id="851" instrument_node=""> equation </span><a data-dcnode-id="849" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.rrauction.com/auctions/lot-detail/344295306094003-albert-einstein-october-26-1946-/%3Fcat%3D0" rel="noopener" tabindex="0" target="_blank"><span data-dcnode-id="850" instrument_node="">recently sold for nearly $1.25 million at auction</span></a><span data-dcnode-id="848" instrument_node=""> (see figure 1). Even Einstein’s handwriting has achieved pop culture status: A few years ago, after diligently poring over hundreds of Einstein manuscripts, typographer Harald Geisler transformed Einstein’s cursive into a </span><a data-dcnode-id="846" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//haraldgeisler.com/2015/04/14/albert-einstein-font-on-kickstarter/" rel="noopener" tabindex="0" target="_blank"><span data-dcnode-id="847" instrument_node="">computerized font</span></a><span data-dcnode-id="845" instrument_node="">.</span></p><span data-dcnode-id="843" instrument_node="">
</span><p data-dcnode-id="841"><span data-dcnode-id="842" instrument_node="">The Einstein font may seem like another piece of Einstein-related kitsch, analogous to dorm room posters of the famous physicist sticking out his tongue. Yet dismissing Einstein’s handwriting as just handwriting would be imprudent. Aside from being worth thousands or millions of dollars at auction, Einstein’s handwriting is a microcosm of his turbulent life.</span></p><span data-dcnode-id="840" instrument_node="">
</span><h4 data-dcnode-id="838"><span data-dcnode-id="839" instrument_node="">German cursive</span></h4><span data-dcnode-id="837" instrument_node="">
</span><p data-dcnode-id="835"><span data-dcnode-id="836" instrument_node="">Handwriting was far more important in Einstein’s day than it is now. Typewriters were only just becoming commonplace when Einstein came of age around 1900. Most communication remained handwritten, which meant that learning to write by hand cleanly and legibly was a crucial life skill. Einstein would have devoted much of his time as an elementary school student learning how to write in script. Repetitive handwriting exercises in copybooks were the name of the game.</span></p><span data-dcnode-id="834" instrument_node="">
</span><figure data-dcnode-id="820" style="margin: 0 auto 20px; width: 100%; max-width: 600px;"><img alt="This letter handwritten by Albert Einstein was recently sold for nearly $1.5 million at auction." data-dcnode-id="833" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//physicstoday.scitation.org/do/10.1063/PT.6.4.20210826a/full/media/sizes/full/figure1-2.jpg&amp;raw"><figcaption data-dcnode-id="821"><strong data-dcnode-id="831"><span data-dcnode-id="832" instrument_node="">Figure 1.</span></strong><span data-dcnode-id="830" instrument_node=""> Dated 26 October 1946, this letter from Albert Einstein to Polish American physicist Ludwik Silberstein is one of only four instances in which Einstein is known to have handwritten the famous </span><em data-dcnode-id="828"><span data-dcnode-id="829" instrument_node="">E</span></em><span data-dcnode-id="827" instrument_node=""> = </span><em data-dcnode-id="825"><span data-dcnode-id="826" instrument_node="">mc</span></em><sup data-dcnode-id="823"><span data-dcnode-id="824" instrument_node="">2</span></sup><span data-dcnode-id="822" instrument_node=""> equation. The letter sold at auction in May for $1 243 708. Credit: Photo courtesy of RR Auction</span></figcaption></figure><span data-dcnode-id="819" instrument_node="">
</span><p data-dcnode-id="814"><span data-dcnode-id="818" instrument_node="">Einstein spent most of his early childhood in Munich, but such an emphasis on handwriting was not particular to Germany. Where Einstein’s education differed was in the number of scripts that he learned. Along with print writing and a cursive like the one still sometimes taught today, Einstein would have also learned another cursive script particular to the German-speaking world: </span><em data-dcnode-id="816"><span data-dcnode-id="817" instrument_node="">Kurrentschrift</span></em><span data-dcnode-id="815" instrument_node="">, or Kurrent script, often referred to today as the “old German script.”</span></p><span data-dcnode-id="813" instrument_node="">
</span><p data-dcnode-id="811"><span data-dcnode-id="812" instrument_node="">As shown in figure 2, the letters of the Latin alphabet in Kurrent look quite different from the Latin cursive that some readers may recall learning in elementary school. The Kurrent alphabet is famously tricky to decipher; most native German speakers today cannot read it, and historians like myself love to complain about it.</span></p><span data-dcnode-id="810" instrument_node="">
</span><figure data-dcnode-id="782" style="margin: 0 auto 20px; width: 100%; max-width: 500px;"><img alt="The letters of Kurrent script." data-dcnode-id="809" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//physicstoday.scitation.org/do/10.1063/PT.6.4.20210826a/full/media/sizes/full/figure2-1.png&amp;raw"><figcaption data-dcnode-id="783"><strong data-dcnode-id="807"><span data-dcnode-id="808" instrument_node="">Figure </span></strong><strong data-dcnode-id="805"><span data-dcnode-id="806" instrument_node="">2</span></strong><strong data-dcnode-id="803"><span data-dcnode-id="804" instrument_node="">.</span></strong><span data-dcnode-id="802" instrument_node=""> The German alphabet in Kurrent script. Students at German schools were taught this alphabet or its derivatives until 1941. At bottom are letter combinations including </span><em data-dcnode-id="800"><span data-dcnode-id="801" instrument_node="">ch</span></em><span data-dcnode-id="799" instrument_node="">, </span><em data-dcnode-id="797"><span data-dcnode-id="798" instrument_node="">ck</span></em><span data-dcnode-id="796" instrument_node="">, </span><em data-dcnode-id="794"><span data-dcnode-id="795" instrument_node="">th</span></em><span data-dcnode-id="793" instrument_node="">, </span><em data-dcnode-id="791"><span data-dcnode-id="792" instrument_node="">sch</span></em><span data-dcnode-id="790" instrument_node="">, and </span><em data-dcnode-id="788"><span data-dcnode-id="789" instrument_node="">st</span></em><span data-dcnode-id="787" instrument_node="">, which are very common in German. Credit: Page from </span><em data-dcnode-id="785"><span data-dcnode-id="786" instrument_node="">Der Damen-Briefsteller</span></em><span data-dcnode-id="784" instrument_node="">, by Johann Thomas Loth, 1866, courtesy of Andreas Praefcke/Wikimedia Commons/Public Domain</span></figcaption></figure><span data-dcnode-id="781" instrument_node="">
</span><p data-dcnode-id="728"><span data-dcnode-id="780" instrument_node="">It is a beautifully florid, loopy script, which—frankly speaking—also makes it highly impractical. Many of the letters look similar. The lowercase </span><em data-dcnode-id="778"><span data-dcnode-id="779" instrument_node="">s</span></em><span data-dcnode-id="777" instrument_node=""> and </span><em data-dcnode-id="775"><span data-dcnode-id="776" instrument_node="">h</span></em><span data-dcnode-id="774" instrument_node=""> look very different than they do in Latin script—in Kurrent, the two letters extend both above and below the line on which they are written. Adding to the confusion, the </span><em data-dcnode-id="772"><span data-dcnode-id="773" instrument_node="">s </span></em><span data-dcnode-id="771" instrument_node="">and </span><em data-dcnode-id="769"><span data-dcnode-id="770" instrument_node="">h</span></em><span data-dcnode-id="768" instrument_node=""> also look alike. And if the handwriting was sloppy or rushed, lowercase </span><em data-dcnode-id="766"><span data-dcnode-id="767" instrument_node="">e</span></em><span data-dcnode-id="765" instrument_node="">, </span><em data-dcnode-id="763"><span data-dcnode-id="764" instrument_node="">r</span></em><span data-dcnode-id="762" instrument_node="">, </span><em data-dcnode-id="760"><span data-dcnode-id="761" instrument_node="">m</span></em><span data-dcnode-id="759" instrument_node="">, and </span><em data-dcnode-id="757"><span data-dcnode-id="758" instrument_node="">n </span></em><span data-dcnode-id="756" instrument_node="">can look almost identical. Because German’s system of grammatical cases often involves distinguishing among the articles </span><em data-dcnode-id="754"><span data-dcnode-id="755" instrument_node="">der</span></em><span data-dcnode-id="753" instrument_node="">, </span><em data-dcnode-id="751"><span data-dcnode-id="752" instrument_node="">den</span></em><span data-dcnode-id="750" instrument_node="">, and </span><em data-dcnode-id="748"><span data-dcnode-id="749" instrument_node="">dem</span></em><span data-dcnode-id="747" instrument_node="">, among others, the similarities among those letters in Kurrent often make it hard to parse the meaning of a sentence—especially for nonnative speakers. The uppercase letters are similarly frustrating: </span><em data-dcnode-id="745"><span data-dcnode-id="746" instrument_node="">L</span></em><span data-dcnode-id="744" instrument_node="">, </span><em data-dcnode-id="742"><span data-dcnode-id="743" instrument_node="">B</span></em><span data-dcnode-id="741" instrument_node="">, and </span><em data-dcnode-id="739"><span data-dcnode-id="740" instrument_node="">C</span></em><span data-dcnode-id="738" instrument_node=""> can look alike, as can </span><em data-dcnode-id="736"><span data-dcnode-id="737" instrument_node="">J</span></em><span data-dcnode-id="735" instrument_node=""> and </span><em data-dcnode-id="733"><span data-dcnode-id="734" instrument_node="">T</span></em><span data-dcnode-id="732" instrument_node="">. (Pro tip: If you ever come across an uppercase letter in Kurrent that you can’t decipher, it’s probably a </span><em data-dcnode-id="730"><span data-dcnode-id="731" instrument_node="">G</span></em><span data-dcnode-id="729" instrument_node="">.)</span></p><span data-dcnode-id="727" instrument_node="">
</span><p data-dcnode-id="725"><span data-dcnode-id="726" instrument_node="">Why did the German-speaking world have two different handwriting scripts? The answer goes back to the Middle Ages. Around 1150 a new script, blackletter (also called Gothic), emerged from various lowercase scripts. If you’ve ever seen a medieval manuscript, you’ve likely seen blackletter. When the printing press was invented, in the 1400s, the first printed books—including the Gutenberg Bible—were set in blackletter type (see figure 3).</span></p><span data-dcnode-id="724" instrument_node="">
</span><figure data-dcnode-id="714" style="float: right; margin-left: 10px; width: 45%; max-width: 500px;"><img alt="Gutenberg Bible, written in blackletter." data-dcnode-id="723" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//physicstoday.scitation.org/do/10.1063/PT.6.4.20210826a/full/media/sizes/full/figure3-1.jpg&amp;raw"><figcaption data-dcnode-id="715"><strong data-dcnode-id="721"><span data-dcnode-id="722" instrument_node="">Figure </span></strong><strong data-dcnode-id="719"><span data-dcnode-id="720" instrument_node="">3</span></strong><strong data-dcnode-id="717"><span data-dcnode-id="718" instrument_node="">.</span></strong><span data-dcnode-id="716" instrument_node=""> The first lines of the book of Genesis in the copy of the Gutenberg Bible held by the Berlin State Library. The Gutenberg Bible was printed in a blackletter font; the elaborate illuminations were added by hand after the pages were printed. Credit: Johannes Gutenberg, scan by Jossi, Wikimedia Commons/Public Domain</span></figcaption></figure><span data-dcnode-id="713" instrument_node="">
</span><p data-dcnode-id="708"><span data-dcnode-id="712" instrument_node="">Not until the Renaissance did the predecessor of modern handwriting emerge. At that time, humanists such as Petrarch (1304–74) became interested in the writings of the ancient Greeks and Romans. They combed through monasteries in search of the earliest known manuscripts of various ancient texts. Erroneously believing that those manuscripts, which had been written in the early Middle Ages, reflected the typeface of ancient Rome, they developed a new script known as Antiqua. By the late 1700s, derivatives of Antiqua had gradually replaced blackletter typefaces in Britain and the rest of Western Europe. You’re reading the present article in an Antiqua-based font. (Blackletter types do survive in special cases: Newspaper mastheads like those of the </span><em data-dcnode-id="710"><span data-dcnode-id="711" instrument_node="">New York Times</span></em><span data-dcnode-id="709" instrument_node="">, for example, use such fonts.)</span></p><span data-dcnode-id="707" instrument_node="">
</span><p data-dcnode-id="702"><span data-dcnode-id="706" instrument_node="">But in the German-speaking lands and in the Nordic countries and the Baltic states that were heavily influenced by German culture, the use of blackletter type—in a form known as </span><em data-dcnode-id="704"><span data-dcnode-id="705" instrument_node="">Fraktur</span></em><span data-dcnode-id="703" instrument_node="">—persisted through the 19th century. Most German-language newspapers, for example, were printed in Fraktur until after World War II. Kurrent persisted as the handwritten counterpart to Fraktur. Counting uppercase and lowercase letters as separate alphabets, Germanophone students had to learn how to read eight different alphabets: the Antiqua typefaces we use today, Latin handwritten cursive, Fraktur typefaces, and Kurrent script.</span></p><span data-dcnode-id="701" instrument_node="">
</span><h4 data-dcnode-id="699"><span data-dcnode-id="700" instrument_node="">Einstein and Kurrent</span></h4><span data-dcnode-id="698" instrument_node="">
</span><p data-dcnode-id="690"><span data-dcnode-id="697" instrument_node="">Most of Einstein’s writings were composed in Latin cursive, including the letter auctioned off recently. But his earliest correspondence was written in the old German script; he used it almost exclusively until he was in his mid 20s. Interestingly, Einstein abandoned his use of the old German script in the annus mirabilis year of 1905. That May, Einstein </span><a data-dcnode-id="695" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//ethz.ch/content/dam/ethz/associates/ethlibrary-dam/documents/Standorteundmedien/Plattformen/EinsteinOnline/Beamter-im-Patentamt/1905-05-18-Brief-Einstein-an-Habicht-Hs_1457_20.pdf" rel="noopener" tabindex="0" target="_blank"><span data-dcnode-id="696" instrument_node="">wrote a letter in Kurrent</span></a><span data-dcnode-id="694" instrument_node=""> to his friend Conrad Habicht </span><a data-dcnode-id="692" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//einsteinpapers.press.princeton.edu/vol5-doc/81" rel="noopener" tabindex="0" target="_blank"><span data-dcnode-id="693" instrument_node="">announcing the four annus mirabilis papers</span></a><span data-dcnode-id="691" instrument_node="">. By July 1905 he had switched to Latin script and would never again use the older one.</span></p><span data-dcnode-id="689" instrument_node="">
</span><p data-dcnode-id="687"><span data-dcnode-id="688" instrument_node="">Why did Einstein switch scripts? As far as is known, he never spoke publicly about that decision, but there were likely two reasons. The first was practical. Although all foreign scientists of note in that era were able to read German—which was one of the major languages of science of the day, along with English and French—they struggled to read letters written in Kurrent. Even scientists who used Kurrent with fellow German speakers, such as Max Planck and Erwin Schrödinger (see figure 4), would write to their foreign colleagues in Latin cursive (but still in German, of course). It was for this reason that most German scientific journals were printed in Antiqua, not Fraktur, having shifted to the former by the middle of the 19th century.</span></p><span data-dcnode-id="686" instrument_node="">
</span><p data-dcnode-id="684"><span data-dcnode-id="685" instrument_node="">But there was probably a second reason for Einstein’s handwriting change. Around 1900, the German Empire was roiled by a culture war. International avant-garde trends in art, literature, music, and architecture coexisted in an uneasy tension with Germany’s global imperialist ambitions.</span></p><span data-dcnode-id="683" instrument_node="">
</span><p data-dcnode-id="681"><span data-dcnode-id="682" instrument_node="">Handwriting and typefaces were drawn into the culture war. During the 19th century, Antiqua typefaces and Latin cursive gradually made inroads in educated German society. (Other countries that used Fraktur, like the Nordic countries, largely began shifting to Antiqua in the late 19th century as well.) The Grimm brothers, for example, were famous advocates of Antiqua fonts. The fonts gradually became associated with the liberal intelligentsia and were often seen as a signal that the writer was more international in outlook.</span></p><span data-dcnode-id="680" instrument_node="">
</span><figure data-dcnode-id="674" style="float: right; margin-left: 10px; width: 45%; max-width: 500px;"><img alt="Handwritten letter from Max Planck." data-dcnode-id="679" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//physicstoday.scitation.org/do/10.1063/PT.6.4.20210826a/full/media/sizes/full/figure4-1.jpg&amp;raw"><figcaption data-dcnode-id="675"><strong data-dcnode-id="677"><span data-dcnode-id="678" instrument_node="">Figure 4.</span></strong><span data-dcnode-id="676" instrument_node=""> A letter from Max Planck dated 11 January 1942. Planck’s Kurrent handwriting, which he used only when writing to other native German speakers, is famed among historians for its illegibility. Many scientists of Planck’s generation used Kurrent until their death. Credit: Max Planck, courtesy of Galerie Bassenge, Wikimedia Commons/Public Domain</span></figcaption></figure><span data-dcnode-id="673" instrument_node="">
</span><p data-dcnode-id="668"><span data-dcnode-id="672" instrument_node="">Predictably, that trend provoked a backlash from conservatives, particularly among the advocates of ethnonationalist theories that foreshadowed Nazism. The “Antiqua–Fraktur dispute,” as it became known, culminated in a heated debate in the imperial German Reichstag on 4 May 1911, during which a proposal to begin instruction of young children in Antiqua and Latin cursive received 85 votes in favor to 82 against. It nevertheless failed because the 397-member body failed to reach a quorum. In other words, </span><a data-dcnode-id="670" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.reichstagsprotokolle.de/Blatt_k12_bsb00003332_00466.html" rel="noopener" tabindex="0" target="_blank"><span data-dcnode-id="671" instrument_node="">a majority of the German Reichstag chose to dodge the question</span></a><span data-dcnode-id="669" instrument_node="">. (The Antiqua–Fraktur dispute was not a historical outlier; similar battles over potential reforms to handwriting or typography were occurring during this period in what are now Turkey, Russia, and China.)</span></p><span data-dcnode-id="667" instrument_node="">
</span><p data-dcnode-id="659"><span data-dcnode-id="666" instrument_node="">To be sure, there were exceptions to the general rule that conservatives preferred Fraktur and Kurrent and liberals preferred Antiqua and Latin script. Before 1933, most German-language newspapers of all political leanings were printed in Fraktur. Thus </span><a data-dcnode-id="664" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//einsteinpapers.press.princeton.edu/vol7-doc/393" rel="noopener" tabindex="0" target="_blank"><span data-dcnode-id="665" instrument_node="">many of Einstein’s pre-1933 popular writings</span></a><span data-dcnode-id="663" instrument_node=""> were </span><a data-dcnode-id="661" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//einsteinpapers.press.princeton.edu/vol15-doc/612" rel="noopener" tabindex="0" target="_blank"><span data-dcnode-id="662" instrument_node="">typeset in Fraktur</span></a><span data-dcnode-id="660" instrument_node="">. Older individuals who grew up with Kurrent—including prominent intellectuals like Planck and Sigmund Freud—often kept writing in it.</span></p><span data-dcnode-id="658" instrument_node="">
</span><p data-dcnode-id="656"><span data-dcnode-id="657" instrument_node="">In any event, choosing a handwriting script became an increasingly political act. Given Einstein’s pacifism and his abhorrence of German militarism and nationalism, it seems highly probable that Einstein switched to Latin cursive in 1905 for political reasons as well as practical ones. Despite living in Switzerland at that time, he likely wanted to signal to foreign colleagues that he was tolerant, open to international communication, and not a rabid German nationalist.</span></p><span data-dcnode-id="655" instrument_node="">
</span><h4 data-dcnode-id="653"><span data-dcnode-id="654" instrument_node="">Einstein’s handwriting</span></h4><span data-dcnode-id="652" instrument_node="">
</span><p data-dcnode-id="650"><span data-dcnode-id="651" instrument_node="">After the shift, Einstein’s handwriting remained remarkably consistent. It very much resembles the cursive still taught in some schools today.</span></p><span data-dcnode-id="649" instrument_node="">
</span><p data-dcnode-id="635"><span data-dcnode-id="648" instrument_node="">Some Germans in Einstein’s time who shifted to writing in Latin script incorporated Kurrent-style letters or flourishes into their Latin script—most commonly a little divot above the lowercase </span><em data-dcnode-id="646"><span data-dcnode-id="647" instrument_node="">u</span></em><span data-dcnode-id="645" instrument_node="">, which in Kurrent was meant to distinguish it from </span><em data-dcnode-id="643"><span data-dcnode-id="644" instrument_node="">n</span></em><span data-dcnode-id="642" instrument_node=""> and </span><em data-dcnode-id="640"><span data-dcnode-id="641" instrument_node="">m</span></em><span data-dcnode-id="639" instrument_node="">. But Einstein made a clean break from Kurrent; his Latin script lacks any traces of the old German script in it. He even stopped using the eszett (ß), the special German letter denoting the combination of a “long s” (ſ) and a “short s” (the lowercase s used today). (The “long s” is not unique to German; it was used in English until the early 19th century and is visible on older handwritten documents such as the Declaration of Independence.) Most Germans who switched from Kurrent to the Latin script retained the eszett in their handwriting, and it is still used today in printed and handwritten German. The funny extra loop on Einstein’s uppercase </span><em data-dcnode-id="637"><span data-dcnode-id="638" instrument_node="">E</span></em><span data-dcnode-id="636" instrument_node=""> isn’t from Kurrent; it’s just one of those handwriting quirks that make us all distinct.</span></p><span data-dcnode-id="634" instrument_node="">
</span><p data-dcnode-id="632"><span data-dcnode-id="633" instrument_node="">What happened to Kurrent and Fraktur? Ironically, it wasn’t the Allies’ victory in 1945 that led to their demise but a decree by the Nazis themselves. Although many Nazis despised Antiqua, Adolf Hitler did not. Fraktur and Kurrent were too provincial for his megalomaniacal visions. If the Germans were to be the master race, he argued, conquered peoples would need to be able to read their language—and how could they do so if German was printed and written in a script that was so hard to decipher? At the height of his power, in January 1941, Hitler issued a decree to phase out Kurrent and Fraktur. Absurdly, it claimed that the scripts had been invented by Jews. Attempts to bring back instruction in Kurrent in postwar West Germany went nowhere, and communist East Germany had no interest in resurrecting a script associated with conservative nationalists. Today most German speakers can’t read the script at all.</span></p><span data-dcnode-id="631" instrument_node="">
</span><p data-dcnode-id="622"><em data-dcnode-id="629"><span data-dcnode-id="630" instrument_node="">Ryan Dahn is the books editor at </span></em><span data-dcnode-id="628" instrument_node="">Physics Today</span><em data-dcnode-id="626"><span data-dcnode-id="627" instrument_node="">. A historian of science, he studies 19th- and 20th-century physics in the German-speaking lands. He is working on a biography of German physicist Pascual Jordan tentatively titled </span></em><span data-dcnode-id="625" instrument_node="">Nazi Entanglement</span><em data-dcnode-id="623"><span data-dcnode-id="624" instrument_node="">.</span></em></p><span data-dcnode-id="621" instrument_node="">
</span></div><span data-dcnode-id="619" instrument_node="">
</span></div><span data-dcnode-id="617" instrument_node="">

</span><div data-dcnode-id="501" id="postCompatContainer"><div class="comment__wrapper" data-dcnode-id="524"><div class="comment__name clearfix" data-dcnode-id="528"><img class="comment__avatar" data-dcnode-id="533" height="32" src="https://a.disquscdn.com/1647409581/images/noavatar92.png" width="32"/><strong data-dcnode-id="530"><a data-dcnode-id="531" href=""><span data-dcnode-id="532" instrument_node="">Ulrich Bill</span></a></strong><span data-dcnode-id="529" instrument_node=""> • 7 months ago
        </span></div><div class="comment__content" data-dcnode-id="525"><p data-dcnode-id="526"><span data-dcnode-id="527" instrument_node="">Born in 1948 in Bavaria, I still had to learn "Kurrent" in Grammar school and used it for denoting vectors even after 1970. The "eszett" is still an official letter in Germany with clear rules how to use it; not so in Switzerland."Eszett" is the fusion of the Kurrent letters "s" and "z" not the combination of a "long and short s".  I enjoyed Ryan Dahn´s article but wished he had more appreciated  the beauty of Einstein´s handwriting. There is no famous scientist or artist whose handwriting is clearer and more characteristic (except perhaps J.S.Bach).</span></p></div></div><div class="comment__wrapper" data-dcnode-id="514"><div class="comment__name clearfix" data-dcnode-id="518"><img class="comment__avatar" data-dcnode-id="523" height="32" src="https://a.disquscdn.com/1647409581/images/noavatar92.png" width="32"/><strong data-dcnode-id="520"><a data-dcnode-id="521" href=""><span data-dcnode-id="522" instrument_node="">Ulrich Mosel</span></a></strong><span data-dcnode-id="519" instrument_node=""> • 7 months ago
        </span></div><div class="comment__content" data-dcnode-id="515"><p data-dcnode-id="516"><span data-dcnode-id="517" instrument_node="">After the war Kurrent still played a role in physics in Germany. Up to the sixties it was quite common to denote vectors by their Kurrent characters in lectures and textbooks at Germany universities.</span></p></div></div><div class="comment__wrapper" data-dcnode-id="502"><div class="comment__name clearfix" data-dcnode-id="508"><img class="comment__avatar" data-dcnode-id="513" height="32" src="https://c.disquscdn.com/uploads/users/8683/5747/avatar92.jpg?1387390508" width="32"/><strong data-dcnode-id="510"><a data-dcnode-id="511" href=""><span data-dcnode-id="512" instrument_node="">worldbfree21</span></a></strong><span data-dcnode-id="509" instrument_node=""> • 7 months ago
        </span></div><div class="comment__content" data-dcnode-id="503"><p data-dcnode-id="506"><span data-dcnode-id="507" instrument_node="">Yes--I did not have room to include that! Kurrent and Fraktur were often used to denote vectors in books and papers as well.</span></p><p data-dcnode-id="504"><span data-dcnode-id="505" instrument_node="">It's also worth noting that Fraktur is still occasionally used in mathematics--and not just in German--to denote matrices and tensors.</span></p></div></div></div><span data-dcnode-id="500" instrument_node="">
