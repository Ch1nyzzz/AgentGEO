</span><div data-dcnode-id="3470"><p data-dcnode-id="3481"><span data-dcnode-id="3488" instrument_node="">Historian is a database software service for </span><strong data-dcnode-id="3486"><span data-dcnode-id="3487" instrument_node="">long-term and permanent&nbsp;monitoring</span></strong><span data-dcnode-id="3485" instrument_node="">. It provides storage into an </span><strong data-dcnode-id="3483"><span data-dcnode-id="3484" instrument_node="">InfluxDB time-series database</span></strong><span data-dcnode-id="3482" instrument_node=""> for long-term and permanent monitoring applications.</span></p><span data-dcnode-id="3480" instrument_node="">
</span><p data-dcnode-id="3472"><span data-dcnode-id="3479" instrument_node="">Monitor your vibration, temperature, inclination, strain, pressure, and other data with self-hosted or fully cloud-managed service. Standard </span><strong data-dcnode-id="3477"><span data-dcnode-id="3478" instrument_node="">OPC UA protocol</span></strong><span data-dcnode-id="3476" instrument_node=""> is supported for data access and integration into our </span><a data-dcnode-id="3474" data-menuid="1_meni" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//dewesoft.com/products/daq-software/dewesoft-x" title="DewesoftX Award-winning Data Acquisition Software | Dewesoft"><span data-dcnode-id="3475" instrument_node="">DewesoftX data acquisition software</span></a><span data-dcnode-id="3473" instrument_node=""> or SCADAs, ERPs, or any other OPC UA clients.</span></p><span data-dcnode-id="3471" instrument_node="">

</span></h2><span data-dcnode-id="3423" instrument_node="">

</span><section class="bl-section : bl-main-features" data-dcnode-id="3341"><span data-dcnode-id="3412" instrument_node="">
</span><div class="container : fullwidth" data-dcnode-id="3343"><span data-dcnode-id="3411" instrument_node="">
</span><div class="row" data-dcnode-id="3345"><span data-dcnode-id="3410" instrument_node="">
</span><div class="col-lg-12" data-dcnode-id="3356"><span data-dcnode-id="3409" instrument_node="">
</span><div class="text-editor" data-dcnode-id="3358"><span data-dcnode-id="3408" instrument_node="">
</span><ul data-dcnode-id="3360"><span data-dcnode-id="3407" instrument_node="">
</span><li data-dcnode-id="3400"><strong data-dcnode-id="3405"><span data-dcnode-id="3406" instrument_node="">TIME-SERIES DATABASE:</span></strong><span data-dcnode-id="3404" instrument_node=""> Data is stored in a state-of-the-art open-source </span><a data-dcnode-id="3402" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.influxdata.com/" target="_blank"><span data-dcnode-id="3403" instrument_node="">InfluxDB database</span></a><span data-dcnode-id="3401" instrument_node="">. InfluxDB is an open-source time-series database developed by InfluxData. It is written in Go and optimized for fast, high-availability storage and retrieval of time series data in fields such as operations monitoring, application metrics, Internet of Things sensor data, and real-time analytics.</span></li><span data-dcnode-id="3399" instrument_node="">
</span><li data-dcnode-id="3395"><strong data-dcnode-id="3397"><span data-dcnode-id="3398" instrument_node="">SELF-HOSTED OR FULLY MANAGED HOSTING:</span></strong><span data-dcnode-id="3396" instrument_node=""> Historian service can either be installed locally on the measurement unit, your local intranet, or we can provide a fully cloud-managed service. For fully hosted managed service monthly fee applies for data storage and maintenance.</span></li><span data-dcnode-id="3394" instrument_node="">
</span><li data-dcnode-id="3387"><strong data-dcnode-id="3392"><span data-dcnode-id="3393" instrument_node="">ACCESSIBLE FROM ANYWHERE AND ANYTIME:</span></strong><span data-dcnode-id="3391" instrument_node=""> Data stored in the Historian database can be accessed from anywhere in the world and at any time using an instance of </span><a data-dcnode-id="3389" data-menuid="1_meni" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//dewesoft.com/products/daq-software/dewesoft-x" title="DewesoftX Award-winning Data Acquisition Software | Dewesoft"><span data-dcnode-id="3390" instrument_node="">DewesoftX data acquisition software</span></a><span data-dcnode-id="3388" instrument_node=""> or any standard web browser on any device like computer, tablet, or smartphone.</span></li><span data-dcnode-id="3386" instrument_node="">
</span><li data-dcnode-id="3379"><strong data-dcnode-id="3384"><span data-dcnode-id="3385" instrument_node="">VISUALISATION IN GRAFANA:</span></strong><span data-dcnode-id="3383" instrument_node=""> Historian uses another great open-source project called </span><a data-dcnode-id="3381" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//grafana.com/" target="_blank"><span data-dcnode-id="3382" instrument_node="">Grafana</span></a><span data-dcnode-id="3380" instrument_node=""> for visualization of the stored data. Grafana is multi-platform open-source analytics and interactive visualization web application. It provides charts, graphs, and alerts for the web when connected to supported data sources. It is expandable through a plug-in system. End users can create complex monitoring dashboards using interactive query builders.</span></li><span data-dcnode-id="3378" instrument_node="">
</span><li data-dcnode-id="3374"><strong data-dcnode-id="3376"><span data-dcnode-id="3377" instrument_node="">DATA SAFETY AND RE-TRANSMIT:</span></strong><span data-dcnode-id="3375" instrument_node=""> In case of network failure or downtime, the measurement units will continue to store the data into the local buffer and will safely transfer the data to the Historian database when the network connection is re-established.</span></li><span data-dcnode-id="3373" instrument_node="">
</span><li data-dcnode-id="3369"><strong data-dcnode-id="3371"><span data-dcnode-id="3372" instrument_node="">RAW AND REDUCED DATA:</span></strong><span data-dcnode-id="3370" instrument_node=""> While raw data is always stored on the measurement unit for an in-depth analysis, Historian takes the role of long-term reduced data storage into the cloud database.</span></li><span data-dcnode-id="3368" instrument_node="">
</span><li data-dcnode-id="3362"><strong data-dcnode-id="3366"><span data-dcnode-id="3367" instrument_node="">TRENDING AND ANALYTICS:</span></strong><span data-dcnode-id="3365" instrument_node=""> Historical data can always be recalled and loaded from the Historian database and used for trend analysis as well as for in-depth analysis and root cause identification.</span><br data-dcnode-id="3364"><span data-dcnode-id="3363" instrument_node="">
&nbsp;</span></li><span data-dcnode-id="3361" instrument_node="">
</span></ul><span data-dcnode-id="3359" instrument_node="">

</span><section class="bl-section : bl-half-half" data-dcnode-id="2477"><span data-dcnode-id="3339" instrument_node="">
</span><div class="half-wrapper" data-dcnode-id="2479"><span data-dcnode-id="3338" instrument_node="">
</span><div class="single-feature" data-dcnode-id="3255" id="details-1"><span data-dcnode-id="3337" instrument_node="">
</span><div class="col-half : white-bg : equal-height" data-dcnode-id="3280" style="height: 761px;"><span data-dcnode-id="3336" instrument_node="">
</span><div class="slider : single-feature-slider-text slick-initialized slick-slider" data-dcnode-id="3282"><div class="slick-list draggable" data-dcnode-id="3283"><div class="slick-track" data-dcnode-id="3284" style="opacity: 1; width: 450px; transform: translate3d(0px, 0px, 0px);"><div aria-hidden="false" class="slick-slide slick-current slick-active" data-dcnode-id="3285" data-slick-index="0" style="width: 450px;"><div data-dcnode-id="3286"><div data-dcnode-id="3287" style="width: 100%; display: inline-block;"><span data-dcnode-id="3335" instrument_node="">
</span><div class="text-editor" data-dcnode-id="3289"><span data-dcnode-id="3334" instrument_node="">
</span><h2 data-dcnode-id="3332"><span data-dcnode-id="3333" instrument_node="">Historian Introduction</span></h2><span data-dcnode-id="3331" instrument_node="">
</span><p data-dcnode-id="3323"><span data-dcnode-id="3330" instrument_node="">The world is being flooded with sensors. We are measuring more parameters for longer periods than ever before, piling up huge amounts of data. Big data becomes difficult to store, access, and visualize. Especially when it comes to </span><strong data-dcnode-id="3328"><span data-dcnode-id="3329" instrument_node="">monitoring production facilities</span></strong><span data-dcnode-id="3327" instrument_node=""> or conducting </span><strong data-dcnode-id="3325"><span data-dcnode-id="3326" instrument_node="">long term tests</span></strong><span data-dcnode-id="3324" instrument_node="">, the challenge is how and where to store the data in order to be easily accessible from anywhere in the world at any time.&nbsp;</span></p><span data-dcnode-id="3322" instrument_node="">
</span><p data-dcnode-id="3291"><span data-dcnode-id="3321" instrument_node="">Historian enables reliable data transfer from multiple Measurement Units into a </span><strong data-dcnode-id="3319"><span data-dcnode-id="3320" instrument_node="">time-series database</span></strong><span data-dcnode-id="3318" instrument_node=""> that can be hosted on a </span><strong data-dcnode-id="3316"><span data-dcnode-id="3317" instrument_node="">server or in a cloud</span></strong><span data-dcnode-id="3315" instrument_node="">. On the other side, the database can be accessed through a </span><strong data-dcnode-id="3313"><span data-dcnode-id="3314" instrument_node="">web browser</span></strong><span data-dcnode-id="3312" instrument_node=""> or an instance of </span><a data-dcnode-id="3310" data-menuid="1_meni" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//dewesoft.com/products/daq-software/dewesoft-x" title="DewesoftX Award-winning Data Acquisition Software | Dewesoft"><span data-dcnode-id="3311" instrument_node="">Dewesoft X software</span></a><span data-dcnode-id="3309" instrument_node="">.</span><br data-dcnode-id="3308"><span data-dcnode-id="3307" instrument_node="">
&nbsp;</span><br data-dcnode-id="3306"><span data-dcnode-id="3305" instrument_node="">
The Measurement Unit runs an instance of </span><a data-dcnode-id="3303" data-menuid="1_meni" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//dewesoft.com/products/daq-software/dewesoft-x" title="DewesoftX Award-winning Data Acquisition Software | Dewesoft"><span data-dcnode-id="3304" instrument_node="">Dewesoft X</span></a><span data-dcnode-id="3302" instrument_node=""> or Dewesoft RT DAQ software. It communicates via the </span><a data-dcnode-id="3300" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/OPC_Unified_Architecture" target="_blank"><span data-dcnode-id="3301" instrument_node="">OPC UA protocol</span></a><span data-dcnode-id="3299" instrument_node=""> with the database. On the server-side, a Historian Service is handling the communication with the Measurement Units, writes the data into the database or reads the data from the database, and transfers it to the clients.</span><br data-dcnode-id="3298"><span data-dcnode-id="3297" instrument_node="">
&nbsp;</span><br data-dcnode-id="3296"><span data-dcnode-id="3295" instrument_node="">
Dewesoft Historian brings the data from the most capable </span><a data-dcnode-id="3293" data-menuid="1_meni" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//dewesoft.com/products" title="The Best Data Acquisition Products | Dewesoft"><span data-dcnode-id="3294" instrument_node="">DAQ hardware and software </span></a><span data-dcnode-id="3292" instrument_node="">on the market into the cloud for historical and worldwide access, keeping core Dewesoft features intact: reliability, usability, and expandability.</span></p><span data-dcnode-id="3290" instrument_node="">

</span><h2 data-dcnode-id="3248"><span data-dcnode-id="3249" instrument_node="">InfluxDB Time-series Database Storage</span></h2><span data-dcnode-id="3247" instrument_node="">
</span><p data-dcnode-id="3239"><span data-dcnode-id="3246" instrument_node="">At the core of Dewesoft Historian is a state-of-the-art time-series database based on the </span><a data-dcnode-id="3244" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.influxdata.com/" target="_blank"><span data-dcnode-id="3245" instrument_node="">InfluxDB open source project</span></a><span data-dcnode-id="3243" instrument_node="">. Time-series databases were developed specifically for </span><strong data-dcnode-id="3241"><span data-dcnode-id="3242" instrument_node="">long term monitoring projects</span></strong><span data-dcnode-id="3240" instrument_node=""> with large data rates.&nbsp;</span></p><span data-dcnode-id="3238" instrument_node="">
</span><p data-dcnode-id="3236"><span data-dcnode-id="3237" instrument_node="">Measurement devices store data into a state-of-the-art open-source InfluxDB database. InfluxDB is an open-source time-series database developed by InfluxData. It is written in Go and optimized for fast, high-availability storage and retrieval of time series data in fields such as operations monitoring, application metrics, Internet of Things sensor data, and real-time analytics.</span></p><span data-dcnode-id="3235" instrument_node="">
</span><p data-dcnode-id="3233"><span data-dcnode-id="3234" instrument_node="">The historian can save the following channel types for an unlimited time-span:</span></p><span data-dcnode-id="3232" instrument_node="">
</span><ul data-dcnode-id="3221"><span data-dcnode-id="3231" instrument_node="">
</span><li data-dcnode-id="3229"><span data-dcnode-id="3230" instrument_node="">Synchronous 1D channels</span></li><span data-dcnode-id="3228" instrument_node="">
</span><li data-dcnode-id="3226"><span data-dcnode-id="3227" instrument_node="">Asynchronous 1D channels</span></li><span data-dcnode-id="3225" instrument_node="">
</span><li data-dcnode-id="3223"><span data-dcnode-id="3224" instrument_node="">FFTs and Scope shots as asynchronous 2D channels</span></li><span data-dcnode-id="3222" instrument_node="">
</span></ul><span data-dcnode-id="3220" instrument_node="">
</span></div><span data-dcnode-id="3218" instrument_node="">

</span><h2 data-dcnode-id="3183"><span data-dcnode-id="3184" instrument_node="">Data Visualisation in Web Client</span></h2><span data-dcnode-id="3182" instrument_node="">
</span><p data-dcnode-id="3172"><strong data-dcnode-id="3180"><span data-dcnode-id="3181" instrument_node="">Web client</span></strong><span data-dcnode-id="3179" instrument_node=""> is based on another open-source product called </span><a data-dcnode-id="3177" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//grafana.com/" target="_blank"><span data-dcnode-id="3178" instrument_node="">Grafana</span></a><span data-dcnode-id="3176" instrument_node="">. It provides visualization of </span><strong data-dcnode-id="3174"><span data-dcnode-id="3175" instrument_node="">long term data</span></strong><span data-dcnode-id="3173" instrument_node=""> and is accessible on any platform - Windows, Linux, Mac OS, etc.&nbsp;on desktop or mobile devices such as tablets or smartphones. It is an ideal solution for a data dashboard.</span></p><span data-dcnode-id="3171" instrument_node="">
</span><p data-dcnode-id="3166"><span data-dcnode-id="3170" instrument_node="">Grafana provides comprehensive visualization capabilities for </span><strong data-dcnode-id="3168"><span data-dcnode-id="3169" instrument_node="">trend data and live values</span></strong><span data-dcnode-id="3167" instrument_node="">. Dewesoft developed 2D channel visualization extensions for Grafana to display FFTs and high-speed waveform scope shots.</span></p><span data-dcnode-id="3165" instrument_node="">
</span><p data-dcnode-id="3160"><span data-dcnode-id="3164" instrument_node="">Dewesoft also developed&nbsp;a Python-based Grafana Connector that optimizes data loading for long and short time intervals by dynamically adjusting the data density to be shown. This improvement can be clearly tested in </span><a data-dcnode-id="3162" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//historian.dewesoft.com/d/000000016/dewesoft-grafana-connector%3ForgId%3D2" target="_blank"><span data-dcnode-id="3163" instrument_node="">this demonstration</span></a><span data-dcnode-id="3161" instrument_node="">.</span></p><span data-dcnode-id="3159" instrument_node="">
</span><p data-dcnode-id="3154"><span data-dcnode-id="3158" instrument_node="">Basic math and threshold levels can be set on any display as well as </span><strong data-dcnode-id="3156"><span data-dcnode-id="3157" instrument_node="">email alerting</span></strong><span data-dcnode-id="3155" instrument_node=""> based on the displayed data.</span></p><span data-dcnode-id="3153" instrument_node="">
</span><p data-dcnode-id="3146"><span data-dcnode-id="3152" instrument_node="">Visual displays in Grafana can be </span><strong data-dcnode-id="3150"><span data-dcnode-id="3151" instrument_node="">customized</span></strong><span data-dcnode-id="3149" instrument_node=""> by the user or prepared as part of a turn-key solution by Dewesoft.</span><br data-dcnode-id="3148"><span data-dcnode-id="3147" instrument_node="">
&nbsp;</span></p><span data-dcnode-id="3145" instrument_node="">

</span><p data-dcnode-id="3099"><span data-dcnode-id="3103" instrument_node="">In parallel to web clients, the database can be also accessed by an instance of </span><a data-dcnode-id="3101" data-menuid="1_meni" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//dewesoft.com/products/daq-software/dewesoft-x" title="DewesoftX Award-winning Data Acquisition Software | Dewesoft"><span data-dcnode-id="3102" instrument_node="">Dewesoft X data acquisition software</span></a><span data-dcnode-id="3100" instrument_node="">. Using the Historian Importer plugin in DewesoftX Analysis mode the data from a chosen time frame is loaded into a Dewesoft data file.</span></p><span data-dcnode-id="3098" instrument_node="">
</span><p data-dcnode-id="3090"><span data-dcnode-id="3097" instrument_node="">Dewesoft Historian Importer is typically running on a Client PC in an engineering office where the database needs to be accessed for further in-depth </span><a data-dcnode-id="3095" data-menuid="1_meni" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//dewesoft.com/products/daq-software/dewesoft-x/analysis" title="Dewesoft X: Advanced Signal Processing Analysis DAQ Software"><span data-dcnode-id="3096" instrument_node="">analysis</span></a><span data-dcnode-id="3094" instrument_node=""> and </span><a data-dcnode-id="3092" data-menuid="1_meni" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//dewesoft.com/products/daq-software/dewesoft-x/publish" title="Dewesoft X: Create Reports and Export Measurement Data"><span data-dcnode-id="3093" instrument_node="">reporting</span></a><span data-dcnode-id="3091" instrument_node="">.</span></p><span data-dcnode-id="3089" instrument_node="">
</span><p data-dcnode-id="3084"><span data-dcnode-id="3088" instrument_node="">Once imported into a </span><strong data-dcnode-id="3086"><span data-dcnode-id="3087" instrument_node="">Dewesoft *.dxd data file</span></strong><span data-dcnode-id="3085" instrument_node="">, the wide range of Dewesoft’s mathematical operations can be applied to the data.</span></p><span data-dcnode-id="3083" instrument_node="">
</span><p data-dcnode-id="3081"><span data-dcnode-id="3082" instrument_node="">Daily, weekly, monthly, etc. reports can be easily generated by applying a predefined display setup and exporting data as PDF, Excel file, or any other Dewesoft’s export format.</span></p><span data-dcnode-id="3080" instrument_node="">

</span><h2 data-dcnode-id="3045"><span data-dcnode-id="3046" instrument_node="">Live data stream into Dewesoft X</span></h2><span data-dcnode-id="3044" instrument_node="">
</span><p data-dcnode-id="3039"><span data-dcnode-id="3043" instrument_node="">The data can also be </span><strong data-dcnode-id="3041"><span data-dcnode-id="3042" instrument_node="">streamed directly</span></strong><span data-dcnode-id="3040" instrument_node=""> from the measurement units to the Dewesoft X client using the Historian Client plugin, providing a detailed live view.</span></p><span data-dcnode-id="3038" instrument_node="">
</span><p data-dcnode-id="3030"><span data-dcnode-id="3037" instrument_node="">Live data stream is bypassing the database and can therefore display </span><strong data-dcnode-id="3035"><span data-dcnode-id="3036" instrument_node="">raw high-speed data</span></strong><span data-dcnode-id="3034" instrument_node=""> that is not necessarily saved to the database. This enables on-demand data visualization and recording, for example after receiving an </span><strong data-dcnode-id="3032"><span data-dcnode-id="3033" instrument_node="">email notification about an alarm state</span></strong><span data-dcnode-id="3031" instrument_node="">.</span></p><span data-dcnode-id="3029" instrument_node="">
</span><p data-dcnode-id="3025"><span data-dcnode-id="3028" instrument_node="">Mathematical and display setup can be applied to the streamed data channels like any other Dewesoft channels, enabling further analysis on the client side.</span><br data-dcnode-id="3027"><span data-dcnode-id="3026" instrument_node="">
&nbsp;</span></p><span data-dcnode-id="3024" instrument_node="">

</span><p data-dcnode-id="2978"><strong data-dcnode-id="2983"><span data-dcnode-id="2984" instrument_node="">SCADA, CMMS, or ERP systems</span></strong><span data-dcnode-id="2982" instrument_node=""> can be connected to Dewesoft Historian over </span><a data-dcnode-id="2980" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/OPC_Unified_Architecture" target="_blank"><span data-dcnode-id="2981" instrument_node="">OPC UA</span></a><span data-dcnode-id="2979" instrument_node=""> or directly to the InfluxDB database using its API.</span></p><span data-dcnode-id="2977" instrument_node="">
</span><p data-dcnode-id="2969"><span data-dcnode-id="2976" instrument_node="">The Historian Service acts as an </span><strong data-dcnode-id="2974"><span data-dcnode-id="2975" instrument_node="">OPC UA server</span></strong><span data-dcnode-id="2973" instrument_node="">, enabling data stream to a 3rd party </span><strong data-dcnode-id="2971"><span data-dcnode-id="2972" instrument_node="">OPC UA client</span></strong><span data-dcnode-id="2970" instrument_node="">.</span></p><span data-dcnode-id="2968" instrument_node="">
</span><p data-dcnode-id="2963"><span data-dcnode-id="2967" instrument_node="">InfluxDB database provides a </span><a data-dcnode-id="2965" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//docs.influxdata.com/influxdb/v1.8/tools/api/" target="_blank"><span data-dcnode-id="2966" instrument_node="">well-documented open API</span></a><span data-dcnode-id="2964" instrument_node=""> that is easy to implement and enables historical data access, typically for integration into machine learning software.</span></p><span data-dcnode-id="2962" instrument_node="">

</span><h2 data-dcnode-id="2925"><span data-dcnode-id="2926" instrument_node="">Data Safety and Re-transmit Functionality</span></h2><span data-dcnode-id="2924" instrument_node="">
</span><p data-dcnode-id="2919"><span data-dcnode-id="2923" instrument_node="">In case of network failure or downtime, the measurement units will continue to store the data into the local buffer and will </span><strong data-dcnode-id="2921"><span data-dcnode-id="2922" instrument_node="">safely transfer the data</span></strong><span data-dcnode-id="2920" instrument_node=""> to the Historian database when the network connection is re-established.</span></p><span data-dcnode-id="2918" instrument_node="">
</span><p data-dcnode-id="2913"><span data-dcnode-id="2917" instrument_node="">The local buffer size can be adjusted up to </span><strong data-dcnode-id="2915"><span data-dcnode-id="2916" instrument_node="">several hundred megabytes</span></strong><span data-dcnode-id="2914" instrument_node="">. Tolerated offline time depends on the buffer size, data rate, and available network bandwidth on reconnect.</span></p><span data-dcnode-id="2912" instrument_node="">
</span><p data-dcnode-id="2907"><span data-dcnode-id="2911" instrument_node="">OPC UA with retransmit function is so </span><strong data-dcnode-id="2909"><span data-dcnode-id="2910" instrument_node="">reliable</span></strong><span data-dcnode-id="2908" instrument_node=""> that we even use it to send the data from the airplane over 4G providing a live telemetry view to several base stations.</span></p><span data-dcnode-id="2906" instrument_node="">

</span><p data-dcnode-id="2862"><span data-dcnode-id="2866" instrument_node="">Historian service is </span><strong data-dcnode-id="2864"><span data-dcnode-id="2865" instrument_node="">platform-independent</span></strong><span data-dcnode-id="2863" instrument_node=""> and can run on any operating system. The Historian can be installed on the measurement unit itself, your local intranet, your server, or in the cloud.</span></p><span data-dcnode-id="2861" instrument_node="">
</span><p data-dcnode-id="2853"><span data-dcnode-id="2860" instrument_node="">We also offer a </span><strong data-dcnode-id="2858"><span data-dcnode-id="2859" instrument_node="">fully managed Historian service</span></strong><span data-dcnode-id="2857" instrument_node="">. The fully managed Historian service is based on a </span><strong data-dcnode-id="2855"><span data-dcnode-id="2856" instrument_node="">monthly subscription fee</span></strong><span data-dcnode-id="2854" instrument_node=""> for maintenance and storage. The subscription fee depends on the number of measured channels and the storage needed for the monitored data. We take care of everything else - updates, system scaling, and maintenance.</span></p><span data-dcnode-id="2852" instrument_node="">
</span><p data-dcnode-id="2845"><span data-dcnode-id="2851" instrument_node="">For estimating the monthly subscription fee for a fully managed Historian you can </span><a class="get-a-quote-scroll-button" data-dcnode-id="2849" href="#"><span data-dcnode-id="2850" instrument_node="">contact us</span></a><span data-dcnode-id="2848" instrument_node=""> and we can estimate the cost for you after discussion.</span><br data-dcnode-id="2847"><span data-dcnode-id="2846" instrument_node="">

</span><h2 data-dcnode-id="2678"><span data-dcnode-id="2679" instrument_node="">Distributed Architecture</span></h2><span data-dcnode-id="2677" instrument_node="">
</span><p data-dcnode-id="2675"><span data-dcnode-id="2676" instrument_node="">Historian is designed as a distributed software system. Each component can run on a different system:</span></p><span data-dcnode-id="2674" instrument_node="">
</span><ul data-dcnode-id="2652"><span data-dcnode-id="2673" instrument_node="">
</span><li data-dcnode-id="2668"><span data-dcnode-id="2672" instrument_node="">Measurement Units are instances of </span><a data-dcnode-id="2670" data-menuid="1_meni" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//dewesoft.com/products/daq-software/dewesoft-x" title="DewesoftX Award-winning Data Acquisition Software | Dewesoft"><span data-dcnode-id="2671" instrument_node="">DewesoftX (Windows)</span></a><span data-dcnode-id="2669" instrument_node=""> or DewesoftRT (Linux, cross-platform) software and require the Dewesoft OPC UA server plugin to communicate with Historian Service.</span></li><span data-dcnode-id="2667" instrument_node="">
</span><li data-dcnode-id="2665"><span data-dcnode-id="2666" instrument_node="">Historian Service is the core component of Dewesoft Historian. It handles data transfer between Measurement Units, Databases, and Clients. Historian Service and the database typically run on the same server, but this is not a requirement.</span></li><span data-dcnode-id="2664" instrument_node="">
</span><li data-dcnode-id="2662"><span data-dcnode-id="2663" instrument_node="">Grafana can also run on a different server if needed as it communicates with the database over https.</span></li><span data-dcnode-id="2661" instrument_node="">
</span><li data-dcnode-id="2659"><span data-dcnode-id="2660" instrument_node="">Historian Service supports connections of multiple Dewesoft clients at the same time from different systems over the internet or on a local network.</span></li><span data-dcnode-id="2658" instrument_node="">
</span><li data-dcnode-id="2654"><a data-dcnode-id="2656" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Network_Time_Protocol" target="_blank"><span data-dcnode-id="2657" instrument_node="">NTP synchronization</span></a><span data-dcnode-id="2655" instrument_node=""> on each component is sufficient for system operation.</span></li><span data-dcnode-id="2653" instrument_node="">
</span></ul><span data-dcnode-id="2651" instrument_node="">
