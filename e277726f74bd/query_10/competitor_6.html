</span></div><div class="field field-name-body field-type-text-with-summary field-label-hidden view-mode-teaser" data-dcnode-id="7607"><div class="field-items" data-dcnode-id="7608"><div class="field-item even" data-dcnode-id="7609" property="content:encoded"><p data-dcnode-id="7614" style="margin-bottom:0in; margin:0in 0in 10pt"><span data-dcnode-id="7615" style="font-size:11pt"><span data-dcnode-id="7616" style="line-height:normal"><span data-dcnode-id="7617" style="text-autospace:none"><span data-dcnode-id="7618" style="font-family:Calibri,sans-serif"><span data-dcnode-id="7619" style="font-size:10.0pt"><span data-dcnode-id="7620" style="font-family:&quot;Verdana&quot;,sans-serif"><span data-dcnode-id="7621" instrument_node="">This fascinating “sketchbook” of Florida history and culture focuses on the rural Red Hills of north Florida. Comprised of what is now Madison, Jefferson, and Leon counties, this region is home to a rich heritage that includes prehistoric people and megafauna, Native Americans, Spanish settlers, British soldiers, and Southern Plantations dependent upon the work of enslaved people. Celt and African traditions became incorporated into the Southern folklore of the area, including colorful traditions and ghost stories. </span></span></span></span></span></span></span></p><span data-dcnode-id="7613" instrument_node="">

</span></h1><span data-dcnode-id="7469" instrument_node="">
</span></header><span data-dcnode-id="7467" instrument_node="">
</span><div class="node-content" data-dcnode-id="7413"><span data-dcnode-id="7466" instrument_node="">

</span><div class="commerce-product-title-label" data-dcnode-id="7457"><span data-dcnode-id="7458" instrument_node="">
        Title:      </span></div><span data-dcnode-id="7456" instrument_node="">
        What We Have Endured: A Novel of the Seminole War  </span></div><span data-dcnode-id="7454" instrument_node="">
</span></div><div class="field field-name-body field-type-text-with-summary field-label-hidden view-mode-teaser" data-dcnode-id="7447"><div class="field-items" data-dcnode-id="7448"><div class="field-item even" data-dcnode-id="7449" property="content:encoded"><p data-dcnode-id="7451"><span data-dcnode-id="7452" instrument_node="">What We Have Endured tells the story of the Seminole Wars through the eyes of Aheedja, a Seminole woman who suffers through nearly a half-century of brutal warfare, forced displacement, and painful deprivation. Determined to remain in the land of their birth, she and her people struggle against the unforgiving Florida climate and the overwhelming military might of the United States government. Written by noted Seminole War historians and a senior tribal member, What We Have Endured faithfully follows the history of America's longest and costliest war against a Native American nation. Although Aheedja is a fictional character, the sufferings depicted are typical of what many Seminole people experienced at the hands of a nation determined to drive them from their homes and destroy their way of life.</span></p><span data-dcnode-id="7450" instrument_node="">
</span></div></div></div><section class="field field-name-field-author field-type-entityreference field-label-inline inline ProductAuthorTease view-mode-teaser" data-dcnode-id="7437"><h2 class="field-label" data-dcnode-id="7445"><span data-dcnode-id="7446" instrument_node="">Author:&nbsp;</span></h2><div class="field-items" data-dcnode-id="7438"><div class="field-item even" data-dcnode-id="7442" property=""><a data-dcnode-id="7443" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//myfloridahistory.org/authors/willie-johns"><span data-dcnode-id="7444" instrument_node="">Willie Johns</span></a></div><div class="field-item odd" data-dcnode-id="7439" property=""><a data-dcnode-id="7440" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//myfloridahistory.org/authors/john-and-mary-lou-missall"><span data-dcnode-id="7441" instrument_node="">John and Mary Lou Missall</span></a></div></div></section><div class="commerce-product-field commerce-product-field-commerce-price field-commerce-price node-3481-product-commerce-price" data-dcnode-id="7432"><div class="field field-name-commerce-price field-type-commerce-price field-label-hidden view-mode-node_teaser" data-dcnode-id="7433"><div class="field-items" data-dcnode-id="7434"><div class="field-item even" data-dcnode-id="7435"><span data-dcnode-id="7436" instrument_node="">$24.95</span></div></div></div></div><div class="field field-name-field-product field-type-commerce-product-reference field-label-hidden view-mode-teaser" data-dcnode-id="7416"><div class="field-items" data-dcnode-id="7417"><div class="field-item even" data-dcnode-id="7418" property=""><form accept-charset="UTF-8" action="/fhspress" autocomplete="off" class="commerce-add-to-cart commerce-cart-add-to-cart-form-85" data-dcnode-id="7419" id="commerce-cart-add-to-cart-form-85" method="post"><div data-dcnode-id="7420"><input data-dcnode-id="7431" name="product_id" type="hidden" value="85"><span data-dcnode-id="743 </span></div><div class="field field-name-body field-type-text-with-summary field-label-hidden view-mode-teaser" data-dcnode-id="7367"><div class="field-items" data-dcnode-id="7368"><div class="field-item even" data-dcnode-id="7369" property="content:encoded"><p data-dcnode-id="7371"><span data-dcnode-id="7372" instrument_node="">Popular beliefs about the Seminole Indians relegate them to a short one or two centuries in Florida, but the reality is much more complex - and much more fascinating. In research that has never before been accomplished - or even attempted, the author has traced nearly four centuries of the lives and adventures of one Indian leader, whom the English dubbed the "Emperor Brim," and his Panther Clan lineage, all the way to their present-day equity in Florida and the lower Southeast, as citizens of the Seminole Tribe of Florida. Dr. Patricia Riles Wickman has used her intimate knowledge of the people and their story, gained over two decades of living and working with them, to connect the stories and highlight their involvement with the land that the Europeans called "Florida."</span></p><span data-dcnode-id="7370" instrument_node="">

</span><p data-dcnode-id="7289"><span data-dcnode-id="7290" instrument_node="">Eleven-year-old Henry's life in Jacksonville, Florida is suddenly changed when his step mother convinces his father to send him and his sister Ruth to a boarding school in neighboring St. John's County. The siblings quickly learn that their circumstances, and their new home, are not at all what they imagined. Henry struggles to stay out of trouble and avoid the wicked headmistress, Miss Gertrude, and her heavy-handed punishments. Henry learns a lot about himself, and how to survive in difficult situations.</span></p><span data-dcnode-id="7288" instrument_node="">

</span></div><div class="field field-name-body field-type-text-with-summary field-label-hidden view-mode-teaser" data-dcnode-id="7208"><div class="field-items" data-dcnode-id="7209"><div class="field-item even" data-dcnode-id="7210" property="content:encoded"><p data-dcnode-id="7212"><span data-dcnode-id="7213" instrument_node="">With the publication of her novel Uncle Tom's Cabin in 1852, Harriet Beecher Stowe became the most famous writer in America. Often overlooked is the fact that Harriet Beecher Stowe was also one of the first and greatest proponents of Florida as a popular tourist destination. In 1873, some of Stowe's descriptive and colorful "tourist articles" were published in the book Palmetto-Leaves. The book contains fascinating vignettes of Florida life not included in Palmetto-L eaves, with insightful commentary by John Foster Jr. and Sarah Whitmer Foster. This new edition features Stowe's meeting with Mary Richards, a famous African American spy, and an introduction by the nationally known novelist Lois Leveen.</span></p><span data-dcnode-id="7211" instrument_node="">

</span></div><div class="field field-name-body field-type-text-with-summary field-label-hidden view-mode-teaser" data-dcnode-id="6894"><div class="field-items" data-dcnode-id="6895"><div class="field-item even" data-dcnode-id="6896" property="content:encoded"><p data-dcnode-id="6898"><span data-dcnode-id="6899" instrument_node="">Irishman George Fleming arrived in Spanish East Florida in 1783. He established Hibernia on an island in the St. Johns River that is known today as Fleming Island. Hibernia became home to George's children and grandchildren, and in the course of over two hundred years, seven generations of the Fleming family have called it home. Among his descendants are Southern planters, soldiers, and statesmen--most notably Francis Philip Fleming, the fifteenth governor of Florida. In the mid-nineteenth century, the Fleming family transformed Hibernia into a winter hotel that became a celebrated destination in the early days of Florida tourism and into the twentieth century. Today, Hibernia is a small residential enclave where a few remnants of the Fleming family's rich history still stand to remind us of days gone by.</span></p><span data-dcnode-id="6897" instrument_node="">
</span></div></div></div><section class="field field-name-field-author field-type-entityreference field-label-inline inline ProductAuthorTease view-mode-teaser" data-dcnode-id="6887"><h2 class="field-label" data-dcnode-id="6892"><span data-dcnode-id="6893" instrument_node="">Author:&nbsp;</span></h2><div class="field-items" data-dcnode-id="6888"><div class="field-item even" data-dcnode-id="6889" property=""><a data-dcnode-id="6890" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//myfloridahistory.org/authors/scott-ritchie"><span data-dcnode-id="6891" instrument_node="">Scott Ritchie</span></a></div></div></section><div class="commerce-product-field commerce-product-field-commerce-price field-commerce-price node-3370-product-commerce-price" data-dcnode-id="6882"><div class="field field-name-commerce-price field-type-commerce-price field-label-hidden view-mode-node_teaser" data-dcnode-id="6883"><div class="field-items" data-dcnode-id="6884"><div class="field-item even" data-dcnode-id="6885"><span data-dcnode-id="6886" instrument_node="">$19.95</span></div></div></div></div><div class="field field-name-field-product field-type-commerce-product-reference field-label-hidden view-mode-teaser" data-dcnode-id="6866"><div class="field-items" data-dcnode-id="6867"><div class="field-item even" data-dcnode-id="6868" property=""><form accept-charset="UTF-8" action="/fhspress" autocomplete="off" class="commerce-add-to-cart commerce-cart-add-to-cart-form-47" data-dcnode-id="6869" id="commerce-cart-add-to-cart-form-47" method="post"><div data-dcnode-id="6870"><input data-dcnode-id="6881" name="product_id" type="hidden" value="47"><span data-dcnode-id="6880" instrument_node="">

        Too Much Is Not Enough: The History In Harriett's Closet  </span></div><span data-dcnode-id="6667" instrument_node="">
</span></div><div class="field field-name-body field-type-text-with-summary field-label-hidden view-mode-teaser" data-dcnode-id="6652"><div class="field-items" data-dcnode-id="6653"><div class="field-item even" data-dcnode-id="6654" property="content:encoded"><p data-dcnode-id="6662"><strong data-dcnode-id="6663"><span data-dcnode-id="6664" style="color:#e74c3c;"><span data-dcnode-id="6665" instrument_node="">2019 David C. Brotemarkle Book Award Winner</span></span></strong></p><span data-dcnode-id="6661" instrument_node="">
</span><p data-dcnode-id="6659"><span data-dcnode-id="6660" instrument_node="">This book delves into the life and legendary closet of Orlando fashion icon and philanthropist Harriett Lake (1922-2018). Through personal and vintage photos, lush photography exemplifying Harriett's signature styles, and quotes from the brassy, big-hearted grand dame herself, you will be awed by the magnitude of her wardrobe and magnanimity of this exceptional woman. This unique fashion biography begins with Harriett's childhood during the Great Depression, follows her service as a Marine during World War II, her flight from heartbreak to Miami Beach, and subsequent marriage. Harriett and her husband acquired wealth (and a closet full of jaw-dropping fashion) in Central Florida, thanks to the Disney World triggered 1960s real estate boom.</span></p><span data-dcnode-id="6658" instrument_node="">
</span><p data-dcnode-id="6656"><span data-dcnode-id="6657" instrument_node="">Stunningly illustrated with more than 800 impeccable photographs illustrating her 96 year life and highlighting over 200 of her favorite and most popular looks, the authors explain the connections between Harriett's life experiences and her fashion choices. Harriett oversaw the photo shoots herself, and expertly styled every look.</span></p><span data-dcnode-id="6655" instrument_node="">
</span></div></div></div><section class="field field-name-field-author field-type-entityreference field-label-inline inline ProductAuthorTease view-mode-teaser" data-dcnode-id="6645"><h2 class="field-label" data-dcnode-id="6650"><span data-dcnode-id="6651" instrument_node="">Author:&nbsp;</span></h2><div class="field-items" data-dcnode-id="6646"><div class="field-item even" data-dcnode-id="6647" property=""><a data-dcnode-id="6648" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//myfloridahistory.org/authors/kristina-tollefson-mfa"><span data-dcnode-id="6649" instrument_node="">Kristina Tollefson, MFA</span></a></div></div></section><div class="commerce-product-field commerce-product-field-commerce-price field-commerce-price node-3400-product-commerce-price" data-dcnode-id="6640"><div class="field field-name-commerce-price field-type-commerce-price field-label-hidden view-mode-node_teaser" data-dcnode-id="6641"><div class="field-items" data-dcnode-id="6642"><div class="field-item even" data-dcnode-id="6643"><span data-dcnode-id="6644" instrument_node="">$95.00</span></div></div></div></div><div class="field field-name-field-product field-type-commerce-product-reference field-label-hidden view-mode-teaser" data-dcnode-id="6624"><div class="field-items" data-dcnode-id="6625"><div class="field-item even" data-dcnode-id="6626" property=""><form accept-charset="UTF-8" action="/fhspress" autocomplete="off" class="commerce-add-to-cart commerce-cart-add-to-cart-form-77" data-dcnode-id="6627" id="commerce-cart-add-to-cart-form-77" method="post"><div data-dcnode-id="6628"><input data-dcnode-id="6639" name="product_id" type="hidden" value="77"><span data-dcnode-id="6638" instrument_node="">

</span></div><div class="field field-name-body field-type-text-with-summary field-label-hidden view-mode-teaser" data-dcnode-id="6572"><div class="field-items" data-dcnode-id="6573"><div class="field-item even" data-dcnode-id="6574" property="content:encoded"><p data-dcnode-id="6579"><span data-dcnode-id="6580" instrument_node="">How did Florida, one of the country’s four smallest and least developed states in 1880, become within fifty years not only a tourist mecca but also a hub for technological innovation?</span></p><span data-dcnode-id="6578" instrument_node="">
</span><p data-dcnode-id="6576"><span data-dcnode-id="6577" instrument_node="">To explore this remarkable Golden Age, Rollins College brought together a wide variety of scholars and artists – historians and poets, biologists and environmental scientists, philosophers and literary critics – to help shine light on a period that, despite its challenges and failures, transformed the Sunshine State.&nbsp;&nbsp;This volume brings together their insights as we all continue reflecting on our post, our present, and our future.</span></p><span data-dcnode-id="6575" instrument_node="">

        Forcing Change  </span></div><span data-dcnode-id="6499" instrument_node="">
</span></div><div class="field field-name-body field-type-text-with-summary field-label-hidden view-mode-teaser" data-dcnode-id="6481"><div class="field-items" data-dcnode-id="6482"><div class="field-item even" data-dcnode-id="6483" property="content:encoded"><p data-dcnode-id="6494"><strong data-dcnode-id="6495"><span data-dcnode-id="6496" style="color:#e74c3c;"><span data-dcnode-id="6497" instrument_node="">2018 James J. Horgan&nbsp;Book Award Winner</span></span></strong></p><span data-dcnode-id="6493" instrument_node="">
</span><p data-dcnode-id="6491"><span data-dcnode-id="6492" instrument_node="">It is June 1963 and fifteen-year-old Margaret Jefferson is being arrested at a sit-in at a lunch counter in St. Augustine. The Civil Rights Movement has found its way into her hometown, and Maggie feels a deep need to be a part of it. She believes in the ideals of the movement and the ultimate goal of equality. She also finds the nonviolence that the protestors are committed to very comforting.</span></p><span data-dcnode-id="6490" instrument_node="">
</span><p data-dcnode-id="6488"><span data-dcnode-id="6489" instrument_node="">However, as the summer and fall of 1963 unfold in St. Augustine, their nonviolent protests are met with rising resistance, aggression, and intimidation from local government officials as well as the Ku Klux Klan. Cattle prods used on protestors, firebombs thrown into the homes of families trying to integrate the schools, teenagers held in jail indefinitely. No one is safe, it seems.</span></p><span data-dcnode-id="6487" instrument_node="">
</span><p data-dcnode-id="6485"><span data-dcnode-id="6486" instrument_node="">This story, told through Maggie's innocent and hopeful eyes, will help a new generation of young people to understand the strength and sacrifices of those who worked so hard for civil rights in this country. It will also help to shine the spotlight on the role that St. Augustine, and Florida, had in the movement.</span></p><span data-dcnode-id="6484" instrument_node="">

</span></h1><span data-dcnode-id="6426" instrument_node="">
</span></header><span data-dcnode-id="6424" instrument_node="">

        Before His Time: The Untold Story of Harry T. Moore America's First Civil Rights Martyr  </span></div><span data-dcnode-id="6411" instrument_node="">
</span></div><div class="field field-name-body field-type-text-with-summary field-label-hidden view-mode-teaser" data-dcnode-id="6395"><div class="field-items" data-dcnode-id="6396"><div class="field-item even" data-dcnode-id="6397" property="content:encoded"><p data-dcnode-id="6408"><span data-dcnode-id="6409" instrument_node="">On Christmas night, 1951, a bomb exploded in Mims, Florida, under the home of civil rights activist and educator Harry T. Moore.</span></p><span data-dcnode-id="6407" instrument_node="">
</span><p data-dcnode-id="6405"><span data-dcnode-id="6406" instrument_node="">Harry and his wife Harriette both died from injuries sustained in the blast, making them the first martyrs of the contemporary civil rights movement. They were killed twelve years before Medgar Evers, fourteen years before Malcolm X, and seventeen years before Martin Luther King, Jr.</span></p><span data-dcnode-id="6404" instrument_node="">
</span><p data-dcnode-id="6402"><span data-dcnode-id="6403" instrument_node="">The sound of the bomb could be heard three miles away in the neighboring town of Titusville, but what resonates today is the memory of the important civil rights work accomplished by Moore.</span></p><span data-dcnode-id="6401" instrument_node="">
</span><p data-dcnode-id="6399"><span data-dcnode-id="6400" instrument_node="">This new edition of Ben Green's comprehensive biography of Harry T. Moore includes updated material about the investigations into the bombing, and additional photographs commemorating Moore's legacy.</span></p><span data-dcnode-id="6398" instrument_node="">
</span></div></div></div><section class="field field-name-field-author field-type-entityreference field-label-inline inline ProductAuthorTease view-mode-teaser" data-dcnode-id="6388"><h2 class="field-label" data-dcnode-id="6393"><span data-dcnode-id="6394" instrument_node="">Author:&nbsp;</span></h2><div class="field-items" data-dcnode-id="6389"><div class="field-item even" data-dcnode-id="6390" property=""><a data-dcnode-id="6391" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//myfloridahistory.org/authors/ben-green"><span data-dcnode-id="6392" instrument_node="">Ben Green</span></a></div></div></section><div class="commerce-product-field commerce-product-field-commerce-price field-commerce-price node-3360-product-commerce-price" data-dcnode-id="6383"><div class="field field-name-commerce-price field-type-commerce-price field-label-hidden view-mode-node_teaser" data-dcnode-id="6384"><div class="field-items" data-dcnode-id="6385"><div class="field-item even" data-dcnode-id="6386"><span data-dcnode-id="6387" instrument_node="">$24.95</span></div></div></div></div><div class="field field-name-field-product field-type-commerce-product-reference field-label-hidden view-mode-teaser" data-dcnode-id="6367"><div class="field-items" data-dcnode-id="6368"><div class="field-item even" data-dcnode-id="6369" property=""><form accept-charset="UTF-8" action="/fhspress" autocomplete="off" class="commerce-add-to-cart commerce-cart-add-to-cart-form-35" data-dcnode-id="6370" id="commerce-cart-add-to-cart-form-35" method="post"><div data-dcnode-id="6371"><input data-dcnode-id="6382" name="product_id" type="hidden" value="35"><span data-dcnode-id="6381" instrument_node="">

</span></h1><span data-dcnode-id="6340" instrument_node="">
</span></header><span data-dcnode-id="6338" instrument_node="">
</span><div class="node-content" data-dcnode-id="6273"><span data-dcnode-id="6337" instrument_node="">
</span><div class="field field-name-field-representativeimagportrait field-type-image field-label-hidden view-mode-teaser" data-dcnode-id="6332"><div class="field-items" data-dcnode-id="6333"><figure class="clearfix field-item even" data-dcnode-id="6334" rel="" resource="https://myfloridahistory.org/sites/myfloridahistory.org/files/styles/slide-144h-portrait/public/representative/image/portrait/978-1886104-921_frank_thomas_songbook_cover_240x310.jpg?itok=pbbhxVY9"><a data-dcnode-id="6335" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//myfloridahistory.org/fhspress/publication/frank-thomas-florida-songbook"><img alt="" class="image-style-slide-144h-portrait" data-dcnode-id="6336" height="144" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//myfloridahistory.org/sites/myfloridahistory.org/files/styles/slide-144h-portrait/public/representative/image/portrait/978-1886104-921_frank_thomas_songbook_cover_240x310.jpg%3Fitok%3DpbbhxVY9&amp;raw" title="The Frank Thomas Florida Songbook" typeof="foaf:Image" width="96"></a></figure></div></div><div class="commerce-product-extra-field commerce-product-extra-field-title node-3351-product-title" data-dcnode-id="6324"><span data-dcnode-id="6331" instrument_node=""> </span><div class="commerce-product-title" data-dcnode-id="6326"><span data-dcnode-id="6330" instrument_node="">
</span><div class="commerce-product-title-label" data-dcnode-id="6328"><span data-dcnode-id="6329" instrument_node="">
        Title:      </span></div><span data-dcnode-id="6327" instrument_node="">
        The Frank Thomas Florida Songbook  </span></div><span data-dcnode-id="6325" instrument_node="">
</span></div><div class="field field-name-body field-type-text-with-summary field-label-hidden view-mode-teaser" data-dcnode-id="6304"><div class="field-items" data-dcnode-id="6305"><div class="field-item even" data-dcnode-id="6306" property="content:encoded"><p data-dcnode-id="6320"><strong data-dcnode-id="6321"><span data-dcnode-id="6322" style="color:#e74c3c;"><span data-dcnode-id="6323" instrument_node="">2018&nbsp;David C. Brotemarkle Book Award Winner</span></span></strong></p><span data-dcnode-id="6319" instrument_node="">
</span><p data-dcnode-id="6317"><span data-dcnode-id="6318" instrument_node="">Frank Thomas writes and performs songs about the history, people, and places of Florida. Songs such as Old Cracker Cowman, The Flatwoods of Home, Spanish Gold have earned him a loyal following. In 2013, Thomas was inducted into the Florida Artists Hall of Fame.</span></p><span data-dcnode-id="6316" instrument_node="">
</span><p data-dcnode-id="6314"><span data-dcnode-id="6315" instrument_node="">This songbook, which features lyrics and chords, is the only printed collection of songs by the legendary Frank Thomas. There are more than 80 songs in this collection, with introductions by Frank Thomas, Ann Thomas, and Lisa Thomas.</span></p><span data-dcnode-id="6313" instrument_node="">
</span><p data-dcnode-id="6311"><span data-dcnode-id="6312" instrument_node="">Thomas' Florida roots run deep. His family has lived here since the late 1700s, participating in the Seminole Indian Wars and the Civil War.&nbsp;When Frank Thomas returned to the Sunshine State in the 1970s, he met Florida Troubadour Will McLean, who encouraged him to write songs about Florida. Thomas joined other folk musicians such as Gamble Rogers, Paul Champion, and Bobby Drawdy in their efforts to preserve Florida stories in song.</span></p><span data-dcnode-id="6310" instrument_node="">
</span><p data-dcnode-id="6308"><span data-dcnode-id="6309" instrument_node="">Thomas has gained a reputation for strongly encouraging other performers to write songs about Florida history and culture. He performs regularly at the Florida Folk Festival each Memorial Day weekend, and at venues throughout the state.</span></p><span data-dcnode-id="6307" instrument_node="">
</span></div></div></div><section class="field field-name-field-author field-type-entityreference field-label-inline inline ProductAuthorTease view-mode-teaser" data-dcnode-id="6297"><h2 class="field-label" data-dcnode-id="6302"><span data-dcnode-id="6303" instrument_node="">Author:&nbsp;</span></h2><div class="field-items" data-dcnode-id="6298"><div class="field-item even" data-dcnode-id="6299" property=""><a data-dcnode-id="6300" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//myfloridahistory.org/authors/frank-thomas"><span data-dcnode-id="6301" instrument_node="">Frank Thomas</span></a></div></div></section><div class="commerce-product-field commerce-product-field-commerce-price field-commerce-price node-3351-product-commerce-price" data-dcnode-id="6292"><div class="field field-name-commerce-price field-type-commerce-price field-label-hidden view-mode-node_teaser" data-dcnode-id="6293"><div class="field-items" data-dcnode-id="6294"><div class="field-item even" data-dcnode-id="6295"><span data-dcnode-id="6296" instrument_node="">$34.95</span></div></div></div></div><div class="field field-name-field-product field-type-commerce-product-reference field-label-hidden view-mode-teaser" data-dcnode-id="6276"><div class="field-items" data-dcnode-id="6277"><div class="field-item even" data-dcnode-id="6278" property=""><form accept-charset="UTF-8" action="/fhspress" autocomplete="off" class="commerce-add-to-cart commerce-cart-add-to-cart-form-16" data-dcnode-id="6279" id="commerce-cart-add-to-cart-form-16" method="post"><div data-dcnode-id="6280"><input data-dcnode-id="6291" name="product_id" type="hidden" value="16"><span data-dcnode-id="6290" instrument_node="">

        The Army Is My Calling: The Life and Writings of Major John Rogers Vinton 1801-1847  </span></div><span data-dcnode-id="6234" instrument_node="">
</span></div><div class="field field-name-body field-type-text-with-summary field-label-hidden view-mode-teaser" data-dcnode-id="6221"><div class="field-items" data-dcnode-id="6222"><div class="field-item even" data-dcnode-id="6223" property="content:encoded"><p data-dcnode-id="6231"><span data-dcnode-id="6232" instrument_node="">The military career of John Rogers Vinton spanned three decades of American conflict and expansion, from the War of 1812 to the War with Mexico. Entering West Point at the age of twelve, he went on to serve in sensitive positions in the War Department, survived six years of service in Florida during the Second Seminole War, and gave his life in the siege of Veracruz.</span></p><span data-dcnode-id="6230" instrument_node="">
</span><p data-dcnode-id="6228"><span data-dcnode-id="6229" instrument_node="">Yet John Rogers Vinton was more than a career army officer. A committed Christian, he longed to enter the ministry, but circumstances prevented it. A member of one of Rhode Islandâ€™s leading families, he suffered through the agony of being an absent single parent while fighting the Indians of Florida. He is also remembered for his life-like and vivid artwork, much of it detailing the Florida frontier and his Seminole adversaries.</span></p><span data-dcnode-id="6227" instrument_node="">
</span><p data-dcnode-id="6225"><span data-dcnode-id="6226" instrument_node="">Working from an extensive collection of military journals and family correspondence, award-winning historians John and Mary Lou Missall open a fascinating window into the life of a dedicated soldier, gifted artist, and devoted family man</span></p><span data-dcnode-id="6224" instrument_node="">
</span></div></div></div><section class="field field-name-field-author field-type-entityreference field-label-inline inline ProductAuthorTease view-mode-teaser" data-dcnode-id="6214"><h2 class="field-label" data-dcnode-id="6219"><span data-dcnode-id="6220" instrument_node="">Author:&nbsp;</span></h2><div class="field-items" data-dcnode-id="6215"><div class="field-item even" data-dcnode-id="6216" property=""><a data-dcnode-id="6217" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//myfloridahistory.org/authors/john-and-mary-lou-missall"><span data-dcnode-id="6218" instrument_node="">John and Mary Lou Missall</span></a></div></div></section><div class="commerce-product-field commerce-product-field-commerce-price field-commerce-price node-3357-product-commerce-price" data-dcnode-id="6209"><div class="field field-name-commerce-price field-type-commerce-price field-label-hidden view-mode-node_teaser" data-dcnode-id="6210"><div class="field-items" data-dcnode-id="6211"><div class="field-item even" data-dcnode-id="6212"><span data-dcnode-id="6213" instrument_node="">$24.95</span></div></div></div></div><div class="field field-name-field-product field-type-commerce-product-reference field-label-hidden view-mode-teaser" data-dcnode-id="6193"><div class="field-items" data-dcnode-id="6194"><div class="field-item even" data-dcnode-id="6195" property=""><form accept-charset="UTF-8" action="/fhspress" autocomplete="off" class="commerce-add-to-cart commerce-cart-add-to-cart-form-31" data-dcnode-id="6196" id="commerce-cart-add-to-cart-form-31" method="post"><div data-dcnode-id="6197"><input data-dcnode-id="6208" name="product_id" type="hidden" value="31"><span data-dcnode-id="6207" instrument_node="">

        Bound to Die  </span></div><span data-dcnode-id="6151" instrument_node="">
</span></div><div class="field field-name-body field-type-text-with-summary field-label-hidden view-mode-teaser" data-dcnode-id="6142"><div class="field-items" data-dcnode-id="6143"><div class="field-item even" data-dcnode-id="6144" property="content:encoded"><p data-dcnode-id="6146"><em data-dcnode-id="6148"><span data-dcnode-id="6149" instrument_node="">Bound to Die</span></em><span data-dcnode-id="6147" instrument_node="">&nbsp;is the true crime story of Florida serial killer Bobby Joe Long. In 1984 Long was convicted of the heinous murders of nine women in Florida's Tampa Bay area. The first body of 19 year old disco dancer Lana Long was found in a field on Mother's Day. Six months later, the bloody rampage ended when the ninth victim was discovered. All had been tortured with rapes and savagely beaten and raped. The killer's confession of his crimes is haunting. The vividly rendered results of his historical trials and appeals are equally shocking.</span></p><span data-dcnode-id="6145" instrument_node="">
</span></div></div></div><section class="field field-name-field-author field-type-entityreference field-label-inline inline ProductAuthorTease view-mode-teaser" data-dcnode-id="6135"><h2 class="field-label" data-dcnode-id="6140"><span data-dcnode-id="6141" instrument_node="">Author:&nbsp;</span></h2><div class="field-items" data-dcnode-id="6136"><div class="field-item even" data-dcnode-id="6137" property=""><a data-dcnode-id="6138" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//myfloridahistory.org/authors/anna-flowers"><span data-dcnode-id="6139" instrument_node="">Anna Flowers</span></a></div></div></section><div class="commerce-product-field commerce-product-field-commerce-price field-commerce-price node-3361-product-commerce-price" data-dcnode-id="6130"><div class="field field-name-commerce-price field-type-commerce-price field-label-hidden view-mode-node_teaser" data-dcnode-id="6131"><div class="field-items" data-dcnode-id="6132"><div class="field-item even" data-dcnode-id="6133"><span data-dcnode-id="6134" instrument_node="">$14.95</span></div></div></div></div><div class="field field-name-field-product field-type-commerce-product-reference field-label-hidden view-mode-teaser" data-dcnode-id="6114"><div class="field-items" data-dcnode-id="6115"><div class="field-item even" data-dcnode-id="6116" property=""><form accept-charset="UTF-8" action="/fhspress" autocomplete="off" class="commerce-add-to-cart commerce-cart-add-to-cart-form-38" data-dcnode-id="6117" id="commerce-cart-add-to-cart-form-38" method="post"><div data-dcnode-id="6118"><input data-dcnode-id="6129" name="product_id" type="hidden" value="38"><span data-dcnode-id="6128" instrument_node="">

</span></h1><span data-dcnode-id="6087" instrument_node="">
</span></header><span data-dcnode-id="6085" instrument_node="">
</span><div class="node-content" data-dcnode-id="6031"><span data-dcnode-id="6084" instrument_node="">
</span><div class="field field-name-field-representativeimagportrait field-type-image field-label-hidden view-mode-teaser" data-dcnode-id="6079"><div class="field-items" data-dcnode-id="6080"><figure class="clearfix field-item even" data-dcnode-id="6081" rel="" resource="https://myfloridahistory.org/sites/myfloridahistory.org/files/styles/slide-144h-portrait/public/representative/image/portrait/978-1-886104-87-7_doris-leeper_repimage-portrait.jpg?itok=R2U_c7w4"><a data-dcnode-id="6082" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//myfloridahistory.org/fhspress/publication/doris-leeper-legacy-visionary"><img alt="" class="image-style-slide-144h-portrait" data-dcnode-id="6083" height="144" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//myfloridahistory.org/sites/myfloridahistory.org/files/styles/slide-144h-portrait/public/representative/image/portrait/978-1-886104-87-7_doris-leeper_repimage-portrait.jpg%3Fitok%3DR2U_c7w4&amp;raw" title="Doris Leeper: Legacy of a Visionary" typeof="foaf:Image" width="96"></a></figure></div></div><div class="commerce-product-extra-field commerce-product-extra-field-title node-2952-product-title" data-dcnode-id="6071"><span data-dcnode-id="6078" instrument_node=""> </span><div class="commerce-product-title" data-dcnode-id="6073"><span data-dcnode-id="6077" instrument_node="">
</span><div class="commerce-product-title-label" data-dcnode-id="6075"><span data-dcnode-id="6076" instrument_node="">
        Title:      </span></div><span data-dcnode-id="6074" instrument_node="">
        Doris Leeper: Legacy of a Visionary  </span></div><span data-dcnode-id="6072" instrument_node="">
</span></div><div class="field field-name-body field-type-text-with-summary field-label-hidden view-mode-teaser" data-dcnode-id="6062"><div class="field-items" data-dcnode-id="6063"><div class="field-item even" data-dcnode-id="6064" property="content:encoded"><p data-dcnode-id="6069"><span data-dcnode-id="6070" instrument_node="">Doris Leeper was a visionary artist and environmentalist. She was instrumental in the creation of the Canaveral National Seashore, established Atlantic Center for the Arts in New Smyrna, and was a celebrated sculptor and painter. Doris Leeper died in 2000, one year after being inducted into the Florida Artists Hall of Fame.</span></p><span data-dcnode-id="6068" instrument_node="">
</span><p data-dcnode-id="6066"><span data-dcnode-id="6067" instrument_node="">This book includes remembrances from people who knew her, worked with her to help realize her goals, and were inspired by her passion. Together, these essays, articles and anecdotes paint a fascinating portrait of Doris Leeper, and describe her outstanding contributions to Florida, and the world.</span></p><span data-dcnode-id="6065" instrument_node="">
</span></div></div></div><section class="field field-name-field-author field-type-entityreference field-label-inline inline ProductAuthorTease view-mode-teaser" data-dcnode-id="6055"><h2 class="field-label" data-dcnode-id="6060"><span data-dcnode-id="6061" instrument_node="">Author:&nbsp;</span></h2><div class="field-items" data-dcnode-id="6056"><div class="field-item even" data-dcnode-id="6057" property=""><a data-dcnode-id="6058" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//myfloridahistory.org/authors/nancy-lowden-norman"><span data-dcnode-id="6059" instrument_node="">Nancy Lowden Norman</span></a></div></div></section><div class="commerce-product-field commerce-product-field-commerce-price field-commerce-price node-2952-product-commerce-price" data-dcnode-id="6050"><div class="field field-name-commerce-price field-type-commerce-price field-label-hidden view-mode-node_teaser" data-dcnode-id="6051"><div class="field-items" data-dcnode-id="6052"><div class="field-item even" data-dcnode-id="6053"><span data-dcnode-id="6054" instrument_node="">$39.95</span></div></div></div></div><div class="field field-name-field-product field-type-commerce-product-reference field-label-hidden view-mode-teaser" data-dcnode-id="6034"><div class="field-items" data-dcnode-id="6035"><div class="field-item even" data-dcnode-id="6036" property=""><form accept-charset="UTF-8" action="/fhspress" autocomplete="off" class="commerce-add-to-cart commerce-cart-add-to-cart-form-14" data-dcnode-id="6037" id="commerce-cart-add-to-cart-form-14" method="post"><div data-dcnode-id="6038"><input data-dcnode-id="6049" name="product_id" type="hidden" value="14"><span data-dcnode-id="6048" instrument_node="">

        Title:      </span></div><span data-dcnode-id="5994" instrument_node="">
        Handfuls of History: Stories about Florida's Past  </span></div><span data-dcnode-id="5992" instrument_node="">
</span></div><div class="field field-name-body field-type-text-with-summary field-label-hidden view-mode-teaser" data-dcnode-id="5967"><div class="field-items" data-dcnode-id="5968"><div class="field-item even" data-dcnode-id="5969" property="content:encoded"><p data-dcnode-id="5989"><span data-dcnode-id="5990" instrument_node="">Dr. Jerald T. Milanich is Curator Emeritus of Archaeology at the Florida Museum of Natural History, Emeritus Professor of Anthropology at the University of Florida, and one of the most respected historical archaeologists in the state.</span></p><span data-dcnode-id="5988" instrument_node="">
</span><p data-dcnode-id="5980"><span data-dcnode-id="5987" instrument_node="">In this book,&nbsp;</span><em data-dcnode-id="5985"><span data-dcnode-id="5986" instrument_node="">Handfuls of History: Stories About Florida’s Past</span></em><span data-dcnode-id="5984" instrument_node="">, Dr. Milanich discusses pre-Columbian Florida, Colonial Period people and events, and the nineteenth century shipwreck of the steamship&nbsp;</span><em data-dcnode-id="5982"><span data-dcnode-id="5983" instrument_node="">City of Vera Cruz</span></em><span data-dcnode-id="5981" instrument_node="">.</span></p><span data-dcnode-id="5979" instrument_node="">
</span><p data-dcnode-id="5977"><span data-dcnode-id="5978" instrument_node="">Dr. Milanich explores the origins of archaeology in Florida with Clarence B. Moore, and offers advice to future archaeologists.&nbsp; He may even stir up some controversy as he questions the authenticity of the Miami Circle.</span></p><span data-dcnode-id="5976" instrument_node="">
</span><p data-dcnode-id="5971"><span data-dcnode-id="5975" instrument_node="">Written in an engaging and conversational style,&nbsp;</span><em data-dcnode-id="5973"><span data-dcnode-id="5974" instrument_node="">Handfuls of History: Stories about Florida’s Past&nbsp;</span></em><span data-dcnode-id="5972" instrument_node="">is accessible to the general public as well as professional historians and archaeologists.</span></p><span data-dcnode-id="5970" instrument_node="">
</span></div></div></div><section class="field field-name-field-author field-type-entityreference field-label-inline inline ProductAuthorTease view-mode-teaser" data-dcnode-id="5960"><h2 class="field-label" data-dcnode-id="5965"><span data-dcnode-id="5966" instrument_node="">Author:&nbsp;</span></h2><div class="field-items" data-dcnode-id="5961"><div class="field-item even" data-dcnode-id="5962" property=""><a data-dcnode-id="5963" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//myfloridahistory.org/authors/dr-jerald-t-milanich"><span data-dcnode-id="5964" instrument_node="">Dr. Jerald T. Milanich</span></a></div></div></section><div class="commerce-product-field commerce-product-field-commerce-price field-commerce-price node-3383-product-commerce-price" data-dcnode-id="5955"><div class="field field-name-commerce-price field-type-commerce-price field-label-hidden view-mode-node_teaser" data-dcnode-id="5956"><div class="field-items" data-dcnode-id="5957"><div class="field-item even" data-dcnode-id="5958"><span data-dcnode-id="5959" instrument_node="">$14.95</span></div></div></div></div><div class="field field-name-field-product field-type-commerce-product-reference field-label-hidden view-mode-teaser" data-dcnode-id="5939"><div class="field-items" data-dcnode-id="5940"><div class="field-item even" data-dcnode-id="5941" property=""><form accept-charset="UTF-8" action="/fhspress" autocomplete="off" class="commerce-add-to-cart commerce-cart-add-to-cart-form-60" data-dcnode-id="5942" id="commerce-cart-add-to-cart-form-60" method="post"><div data-dcnode-id="5943"><input data-dcnode-id="5954" name="product_id" type="hidden" value="60"><span data-dcnode-id="5953" instrument_node="">

</span></header><span data-dcnode-id="5910" instrument_node="">

</span><div class="commerce-product-title-label" data-dcnode-id="5900"><span data-dcnode-id="5901" instrument_node="">
        Title:      </span></div><span data-dcnode-id="5899" instrument_node="">
        Stetson Kennedy: Applied Folklore and Cultural Advocacy  </span></div><span data-dcnode-id="5897" instrument_node="">
</span></div><div class="field field-name-body field-type-text-with-summary field-label-hidden view-mode-teaser" data-dcnode-id="5890"><div class="field-items" data-dcnode-id="5891"><div class="field-item even" data-dcnode-id="5892" property="content:encoded"><p data-dcnode-id="5894"><span data-dcnode-id="5895" instrument_node="">Stetson Kennedy was born in Jacksonville on October 5, 1916. From 1937 to 1942, Kennedy traveled the cities, towns, and rural backwoods of Florida documenting the cultural heritage of the state's diverse populations for the WPA's Florida Writer's Project. Kennedy later infiltrated the Ku Klux Klan, exposing their secrets. He was an activist for positive social change, working to make life better for all Floridians until his death on August 27, 2011. This book is the first comprehensive look at the life and work of author, activist, folklorist, investigative journalist, and oral historian Stetson Kennedy.</span></p><span data-dcnode-id="5893" instrument_node="">
</span></div></div></div><section class="field field-name-field-author field-type-entityreference field-label-inline inline ProductAuthorTease view-mode-teaser" data-dcnode-id="5883"><h2 class="field-label" data-dcnode-id="5888"><span data-dcnode-id="5889" instrument_node="">Author:&nbsp;</span></h2><div class="field-items" data-dcnode-id="5884"><div class="field-item even" data-dcnode-id="5885" property=""><a data-dcnode-id="5886" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//myfloridahistory.org/authors/peggy-bulger"><span data-dcnode-id="5887" instrument_node="">Peggy A Bulger</span></a></div></div></section><div class="commerce-product-field commerce-product-field-commerce-price field-commerce-price node-2954-product-commerce-price" data-dcnode-id="5878"><div class="field field-name-commerce-price field-type-commerce-price field-label-hidden view-mode-node_teaser" data-dcnode-id="5879"><div class="field-items" data-dcnode-id="5880"><div class="field-item even" data-dcnode-id="5881"><span data-dcnode-id="5882" instrument_node="">$24.95</span></div></div></div></div><div class="field field-name-field-product field-type-commerce-product-reference field-label-hidden view-mode-teaser" data-dcnode-id="5862"><div class="field-items" data-dcnode-id="5863"><div class="field-item even" data-dcnode-id="5864" property=""><form accept-charset="UTF-8" action="/fhspress" autocomplete="off" class="commerce-add-to-cart commerce-cart-add-to-cart-form-15" data-dcnode-id="5865" id="commerce-cart-add-to-cart-form-15" method="post"><div data-dcnode-id="5866"><input data-dcnode-id="5877" name="product_id" type="hidden" value="15"><span data-dcnode-id="5876" instrument_node="">

</span><h1 class="node-title" data-dcnode-id="5836"><span data-dcnode-id="5840" instrument_node="">
</span><a data-dcnode-id="5838" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//myfloridahistory.org/fhspress/publication/andrew-jackson-florida" rel="bookmark"><span data-dcnode-id="5839" instrument_node="">Andrew Jackson in Florida</span></a><span data-dcnode-id="5837" instrument_node="">
</span></h1><span data-dcnode-id="5835" instrument_node="">
</span></header><span data-dcnode-id="5833" instrument_node="">
</span><div class="node-content" data-dcnode-id="5773"><span data-dcnode-id="5832" instrument_node="">
</span><div class="field field-name-field-representativeimagportrait field-type-image field-label-hidden view-mode-teaser" data-dcnode-id="5827"><div class="field-items" data-dcnode-id="5828"><figure class="clearfix field-item even" data-dcnode-id="5829" rel="" resource="https://myfloridahistory.org/sites/myfloridahistory.org/files/styles/slide-144h-portrait/public/representative/image/portrait/9781886104884.jpg?itok=ygei8hSz"><a data-dcnode-id="5830" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//myfloridahistory.org/fhspress/publication/andrew-jackson-florida"><img alt="" class="image-style-slide-144h-portrait" data-dcnode-id="5831" height="144" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//myfloridahistory.org/sites/myfloridahistory.org/files/styles/slide-144h-portrait/public/representative/image/portrait/9781886104884.jpg%3Fitok%3Dygei8hSz&amp;raw" title="Andrew Jackson In Florida" typeof="foaf:Image" width="96"></a></figure></div></div><div class="commerce-product-extra-field commerce-product-extra-field-title node-3358-product-title" data-dcnode-id="5819"><span data-dcnode-id="5826" instrument_node=""> </span><div class="commerce-product-title" data-dcnode-id="5821"><span data-dcnode-id="5825" instrument_node="">
</span><div class="commerce-product-title-label" data-dcnode-id="5823"><span data-dcnode-id="5824" instrument_node="">
        Title:      </span></div><span data-dcnode-id="5822" instrument_node="">
        Andrew Jackson in Florida  </span></div><span data-dcnode-id="5820" instrument_node="">
</span></div><div class="field field-name-body field-type-text-with-summary field-label-hidden view-mode-teaser" data-dcnode-id="5807"><div class="field-items" data-dcnode-id="5808"><div class="field-item even" data-dcnode-id="5809" property="content:encoded"><p data-dcnode-id="5817"><span data-dcnode-id="5818" instrument_node="">Andrew Jackson is one of the most controversial figures in Florida history. He invaded Pensacola, the capital of Spanish-controlled Florida, during the War of 1812. He was commander of military operations during the First Seminole War, and his Indian Removal policies sparked the Second Seminole War. He briefly served as the first territorial governor of Florida.</span></p><span data-dcnode-id="5816" instrument_node="">
</span><p data-dcnode-id="5814"><span data-dcnode-id="5815" instrument_node="">No other person is more closely associated with the "Americanization" of Florida and its transformation from Spanish borderland to Deep South frontier. Jackson's military expeditions ended both Spanish and Native American control over Florida's Big Bend and Panhandle areas. From his own time to the present, opinion is divided on whether he deserves praise or condemnation for his actions.</span></p><span data-dcnode-id="5813" instrument_node="">
</span><p data-dcnode-id="5811"><span data-dcnode-id="5812" instrument_node="">This book includes scholarly perspectives previously published in the, Florida Historical Quarterly important primary source documents from Jackson's time, and new original analysis from contemporary scholars reflecting upon Jackson's legacy.</span></p><span data-dcnode-id="5810" instrument_node="">
</span></div></div></div><section class="field field-name-field-author field-type-entityreference field-label-inline inline ProductAuthorTease view-mode-teaser" data-dcnode-id="5797"><h2 class="field-label" data-dcnode-id="5805"><span data-dcnode-id="5806" instrument_node="">Author:&nbsp;</span></h2><div class="field-items" data-dcnode-id="5798"><div class="field-item even" data-dcnode-id="5802" property=""><a data-dcnode-id="5803" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//myfloridahistory.org/authors/sherry-johnson"><span data-dcnode-id="5804" instrument_node="">Sherry Johnson</span></a></div><div class="field-item odd" data-dcnode-id="5799" property=""><a data-dcnode-id="5800" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//myfloridahistory.org/authors/james-g-cusick"><span data-dcnode-id="5801" instrument_node="">James G. Cusick</span></a></div></div></section><div class="commerce-product-field commerce-product-field-commerce-price field-commerce-price node-3358-product-commerce-price" data-dcnode-id="5792"><div class="field field-name-commerce-price field-type-commerce-price field-label-hidden view-mode-node_teaser" data-dcnode-id="5793"><div class="field-items" data-dcnode-id="5794"><div class="field-item even" data-dcnode-id="5795"><span data-dcnode-id="5796" instrument_node="">$19.95</span></div></div></div></div><div class="field field-name-field-product field-type-commerce-product-reference field-label-hidden view-mode-teaser" data-dcnode-id="5776"><div class="field-items" data-dcnode-id="5777"><div class="field-item even" data-dcnode-id="5778" property=""><form accept-charset="UTF-8" action="/fhspress" autocomplete="off" class="commerce-add-to-cart commerce-cart-add-to-cart-form-32" data-dcnode-id="5779" id="commerce-cart-add-to-cart-form-32" method="post"><div data-dcnode-id="5780"><input data-dcnode-id="5791" name="product_id" type="hidden" value="32"><span data-dcnode-id="5790" instrument_nod </span></h1><span data-dcnode-id="5749" instrument_node="">
</span></header><span data-dcnode-id="5747" instrument_node="">
</span><div class="node-content" data-dcnode-id="5693"><span data-dcnode-id="5746" instrument_node="">
</span><div class="field field-name-field-representativeimagportrait field-type-image field-label-hidden view-mode-teaser" data-dcnode-id="5741"><div class="field-items" data-dcnode-id="5742"><figure class="clearfix field-item even" data-dcnode-id="5743" rel="" resource="https://myfloridahistory.org/sites/myfloridahistory.org/files/styles/slide-144h-portrait/public/images/product/variation/9781886104853.jpg?itok=Hs4nkzcS"><a data-dcnode-id="5744" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//myfloridahistory.org/fhspress/publication/black-cloud-deadly-hurricane-1928"><img alt="" class="image-style-slide-144h-portrait" data-dcnode-id="5745" height="144" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//myfloridahistory.org/sites/myfloridahistory.org/files/styles/slide-144h-portrait/public/images/product/variation/9781886104853.jpg%3Fitok%3DHs4nkzcS&amp;raw" title="Black Cloud: The Deadly Hurricane of 1928" typeof="foaf:Image" width="96"></a></figure></div></div><div class="commerce-product-extra-field commerce-product-extra-field-title node-3516-product-title" data-dcnode-id="5733"><span data-dcnode-id="5740" instrument_node=""> </span><div class="commerce-product-title" data-dcnode-id="5735"><span data-dcnode-id="5739" instrument_node="">

        Title:      </span></div><span data-dcnode-id="5736" instrument_node="">
        Black Cloud: The Deadly Hurricane of 1928  </span></div><span data-dcnode-id="5734" instrument_node="">
</span></div><div class="field field-name-body field-type-text-with-summary field-label-hidden view-mode-teaser" data-dcnode-id="5724"><div class="field-items" data-dcnode-id="5725"><div class="field-item even" data-dcnode-id="5726" property="content:encoded"><p data-dcnode-id="5728"><span data-dcnode-id="5732" instrument_node="">The deadly hurricane of 1928 claimed 2,500 lives, and the long-forgotten story of the casualties, as told in&nbsp;</span><em data-dcnode-id="5730"><span data-dcnode-id="5731" instrument_node="">Black Cloud</span></em><span data-dcnode-id="5729" instrument_node="">, continues to stir passion. Among the dead were 700 black Floridians - men, women, and children who were buried in an unmarked West Palm Beach ditch during a racist recovery and rebuilding effort that conscripted the labor of blacks much like latter-day slaves. Palm Beach Post reporter Eliot Kleinberg has penned this gripping tale from dozens of interviews with survivors, diary entries, accounts from newspapers, government documents, and reports from the National Weather Service and the Red Cross. Immortalized in Zora Neale Hurston's classic Their Eyes Were Watching God, thousands of poor blacks had nowhere to run when the waters of Lake Okeechobee rose. No one spoke for them, no one stood up for them, and no one could save them. With heroic tales of survival and loss, this book finally gives the dead the dignity they deserve. The new, updated edition of this important book is published by the Florida Historical Society Press.</span></p><span data-dcnode-id="5727" instrument_node="">
</span></div></div></div><section class="field field-name-field-author field-type-entityreference field-label-inline inline ProductAuthorTease view-mode-teaser" data-dcnode-id="5717"><h2 class="field-label" data-dcnode-id="5722"><span data-dcnode-id="5723" instrument_node="">Author:&nbsp;</span></h2><div class="field-items" data-dcnode-id="5718"><div class="field-item even" data-dcnode-id="5719" property=""><a data-dcnode-id="5720" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//myfloridahistory.org/authors/eliot-kleinberg"><span data-dcnode-id="5721" instrument_node="">Eliot Kleinberg</span></a></div></div></section><div class="commerce-product-field commerce-product-field-commerce-price field-commerce-price node-3516-product-commerce-price" data-dcnode-id="5712"><div class="field field-name-commerce-price field-type-commerce-price field-label-hidden view-mode-node_teaser" data-dcnode-id="5713"><div class="field-items" data-dcnode-id="5714"><div class="field-item even" data-dcnode-id="5715"><span data-dcnode-id="5716" instrument_node="">$19.95</span></div></div></div></div><div class="field field-name-field-product field-type-commerce-product-reference field-label-hidden view-mode-teaser" data-dcnode-id="5696"><div class="field-items" data-dcnode-id="5697"><div class="field-item even" data-dcnode-id="5698" property=""><form accept-charset="UTF-8" action="/fhspress" autocomplete="off" class="commerce-add-to-cart commerce-cart-add-to-cart-form-36" data-dcnode-id="5699" id="commerce-cart-add-to-cart-form-36" method="post"><div data-dcnode-id="5700"><input data-dcnode-id="5711" name="product_id" type="hidden" value="36"><span data-dcnode-id="5710" instrument_node="">

</span></div><div class="field field-name-body field-type-text-with-summary field-label-hidden view-mode-teaser" data-dcnode-id="5647"><div class="field-items" data-dcnode-id="5648"><div class="field-item even" data-dcnode-id="5649" property="content:encoded"><p data-dcnode-id="5651"><span data-dcnode-id="5652" instrument_node="">The historic photographs published in this book are part of the permanent collection and display at the Hannibal Square Heritage Center, located in Winter Park, Florida, USA. The center is a program of Crealde School of Art and is operated in partnership with the City of Winter Park. The Heritage Center was established in 2007 as a tribute to the past, present and future of Winter Park's African American community. It is a unique cultural facility that celebrates community heritage through documentary photography and public art. Crealde School of Art is a forty year old, widely recognized visual arts school, offering an educational curriculum of over 100 courses for students of all ages and backgrounds, three galleries, and an award winning outreach program that brings arts and humanities to many underserved communities throughout Central Florida. Its mission is based on the belief that the arts are for everyone; every individual has a story worth telling and something creative to contribute, making a positive impact on family and community life.</span></p><span data-dcnode-id="5650" instrument_node="">

</span></div><div class="field field-name-body field-type-text-with-summary field-label-hidden view-mode-teaser" data-dcnode-id="5564"><div class="field-items" data-dcnode-id="5565"><div class="field-item even" data-dcnode-id="5566" property="content:encoded"><p data-dcnode-id="5574"><span data-dcnode-id="5575" instrument_node="">Beginning in 1873, the mysterious adventurer "Ziska" wrote newspaper articles about the exciting frontier wilderness of Florida for his readers in New York City. Florida was largely untamed region with many colorful characters, while New York City was on the cutting edge of innovation with a subway, telephone service, and newspaper readers fascinated by Ziska's exploits in the wild "land of flowers."</span></p><span data-dcnode-id="5573" instrument_node="">
</span><p data-dcnode-id="5571"><span data-dcnode-id="5572" instrument_node="">For more than a century, Ziska's writings were forgotten and undisturbed in the New York Public Library. When eminent Florida archaeologist Jerald T. Milanich discovered the articles, he was determined to find out more about their mysterious author.</span></p><span data-dcnode-id="5570" instrument_node="">
</span><p data-dcnode-id="5568"><span data-dcnode-id="5569" instrument_node="">Ziska turns out to be the pen name of Civil War hero, journalist, Tammany boss, and U.S. Congressman Amos J. Cummings. In this book, Milanich reintroduces readers to the exciting stories of Cummings as he explores the young state of Florida.</span></p><span data-dcnode-id="5567" instrument_node="">
</span></div></div></div><section class="field field-name-field-author field-type-entityreference field-label-inline inline ProductAuthorTease view-mode-teaser" data-dcnode-id="5557"><h2 class="field-label" data-dcnode-id="5562"><span data-dcnode-id="5563" instrument_node="">Author:&nbsp;</span></h2><div class="field-items" data-dcnode-id="5558"><div class="field-item even" data-dcnode-id="5559" property=""><a data-dcnode-id="5560" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//myfloridahistory.org/authors/dr-jerald-t-milanich"><span data-dcnode-id="5561" instrument_node="">Dr. Jerald T. Milanich</span></a></div></div></section><div class="commerce-product-field commerce-product-field-commerce-price field-commerce-price node-3371-product-commerce-price" data-dcnode-id="5552"><div class="field field-name-commerce-price field-type-commerce-price field-label-hidden view-mode-node_teaser" data-dcnode-id="5553"><div class="field-items" data-dcnode-id="5554"><div class="field-item even" data-dcnode-id="5555"><span data-dcnode-id="5556" instrument_node="">$19.95</span></div></div></div></div><div class="field field-name-field-product field-type-commerce-product-reference field-label-hidden view-mode-teaser" data-dcnode-id="5536"><div class="field-items" data-dcnode-id="5537"><div class="field-item even" data-dcnode-id="5538" property=""><form accept-charset="UTF-8" action="/fhspress" autocomplete="off" class="commerce-add-to-cart commerce-cart-add-to-cart-form-48" data-dcnode-id="5539" id="commerce-cart-add-to-cart-form-48" method="post"><div data-dcnode-id="5540"><input data-dcnode-id="5551" name="product_id" type="hidden" value="48"><span data-dcnode-id="5550" instrument_node="">

</span></div><div class="field field-name-body field-type-text-with-summary field-label-hidden view-mode-teaser" data-dcnode-id="4774"><div class="field-items" data-dcnode-id="4775"><div class="field-item even" data-dcnode-id="4776" property="content:encoded"><p data-dcnode-id="4778"><span data-dcnode-id="4779" instrument_node="">Racial injustices of the past catch up to the present in this exciting and suspenseful novel set in rural North Florida. As innocent four-year-olds in the late 1940s, Katie, who is white, and Delia, an African American girl, become best friends despite societal pressures against them. In 1960, when the girls are sixteen, Katie abandons her childhood friend when she is needed most. In 2006, Katie is working to earn Delia.s forgiveness as danger surrounds the women's reunion.</span></p><span data-dcnode-id="4777" instrument_node="">

        Title:      </span></div><span data-dcnode-id="4706" instrument_node="">
        Florida &amp; Caribbean Native People Paintings  </span></div><span data-dcnode-id="4704" instrument_node="">
</span></div><div class="field field-name-body field-type-text-with-summary field-label-hidden view-mode-teaser" data-dcnode-id="4694"><div class="field-items" data-dcnode-id="4695"><div class="field-item even" data-dcnode-id="4696" property="content:encoded"><p data-dcnode-id="4701"><span data-dcnode-id="4702" instrument_node="">For more than ten thousand years before Christopher Columbus "discovered" the Americas and Juan Ponce de León gave La Florida its name, there were thriving, complex societies of indigenous people living here. The land that would become the state of Florida was home to powerful, innovative tribes including the Timucua, the Apalachee, the Tocobaga, the Calusa, the Ais, and later the Seminole. The fascinating Taíno people populated the Caribbean.</span></p><span data-dcnode-id="4700" instrument_node="">
</span><p data-dcnode-id="4698"><span data-dcnode-id="4699" instrument_node="">Theodore Morris is known as the preeminent painter of Florida's indigenous people, and he now adds Caribbean culture to his repertoire. His artwork graces the covers of academic books and fills the walls of historical museums and art galleries throughout the state. In this book, Florida &amp; Caribbean Native People: Paintings by Theodore Morris, the artist's own commentary on his work is augmented by the insights of some of Florida's leading archaeologists including Steven H. Koski, Keith Ashley, Bonnie G. McEwan, Brent R. Weisman, Ryan J. Wheeler, Robert S. Carr, Ann S. Cordell, and James P. Pepe.</span></p><span data-dcnode-id="4697" instrument_node="">
</span></div></div></div><section class="field field-name-field-author field-type-entityreference field-label-inline inline ProductAuthorTease view-mode-teaser" data-dcnode-id="4687"><h2 class="field-label" data-dcnode-id="4692"><span data-dcnode-id="4693" instrument_node="">Author:&nbsp;</span></h2><div class="field-items" data-dcnode-id="4688"><div class="field-item even" data-dcnode-id="4689" property=""><a data-dcnode-id="4690" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//myfloridahistory.org/authors/theodore-morris"><span data-dcnode-id="4691" instrument_node="">Theodore Morris</span></a></div></div></section><div class="commerce-product-field commerce-product-field-commerce-price field-commerce-price node-3372-product-commerce-price" data-dcnode-id="4682"><div class="field field-name-commerce-price field-type-commerce-price field-label-hidden view-mode-node_teaser" data-dcnode-id="4683"><div class="field-items" data-dcnode-id="4684"><div class="field-item even" data-dcnode-id="4685"><span data-dcnode-id="4686" instrument_node="">$39.35</span></div></div></div></div><div class="field field-name-field-product field-type-commerce-product-reference field-label-hidden view-mode-teaser" data-dcnode-id="4666"><div class="field-items" data-dcnode-id="4667"><div class="field-item even" data-dcnode-id="4668" property=""><form accept-charset="UTF-8" action="/fhspress" autocomplete="off" class="commerce-add-to-cart commerce-cart-add-to-cart-form-49" data-dcnode-id="4669" id="commerce-cart-add-to-cart-form-49" method="post"><div data-dcnode-id="4670"><input data-dcnode-id="4681" name="product_id" type="hidden" value="49"><span data-dcnode-id="4680" instrument_node="">

        The Voyages of Ponce de León: Scholarly Perspectives  </span></div><span data-dcnode-id="4624" instrument_node="">
</span></div><div class="field field-name-body field-type-text-with-summary field-label-hidden view-mode-teaser" data-dcnode-id="4614"><div class="field-items" data-dcnode-id="4615"><div class="field-item even" data-dcnode-id="4616" property="content:encoded"><p data-dcnode-id="4618"><span data-dcnode-id="4622" instrument_node="">The voyages of Juan Ponce de León and his expeditions in Florida have long held a romantic and mythic place in American history. Speculation about his first landing in Florida, about the legend of the Fountain of Youth, and about Ponce de León.s reasons for setting sail to Florida have engaged chroniclers, historians, and even sailing masters for five centuries. In this volume, the Florida Historical Society has assembled articles by leading scholars who offer their perspectives on the voyages and trace changing views on Ponce de León as historians discover new information and reevaluate older works. This collection includes both new work and articles previously published in the </span><em data-dcnode-id="4620"><span data-dcnode-id="4621" instrument_node="">FHS academic journal the Florida Historical Quarterl</span></em><span data-dcnode-id="4619" instrument_node="">y. The contributors include Eugene Lyon with Brandon Josef Szinável, J. Michael Francis, Jerald Milanich, Nara Milanich, T. Frederick Davis, Douglas T. Peck, and Amanda J. Snyder.</span></p><span data-dcnode-id="4617" instrument_node="">

        Chasing Bones: An Archaeologist's Pursuit of Skeletons  </span></div><span data-dcnode-id="4231" instrument_node="">
</span></div><div class="field field-name-body field-type-text-with-summary field-label-hidden view-mode-teaser" data-dcnode-id="4224"><div class="field-items" data-dcnode-id="4225"><div class="field-item even" data-dcnode-id="4226" property="content:encoded"><p data-dcnode-id="4228"><span data-dcnode-id="4229" instrument_node="">In January 2001, Rachel Wentz walked away from a career as a firefighter/paramedic in Orlando to pursue a PhD in anthropology, specializing in the analysis of human remains. Her studies at Florida State University focused on ancient skeletons from the Windover site, but took her into the darker world of forensics and beyond. Travel with Dr. Wentz to the famed museums of London, Paris, and Italy, the fragrant landscapes of Ukraine, the beautiful shores of the Caribbean, and back to Florida. This engaging and fast-paced memoir provides the reader a first-hand glimpse into the fascinating world of bioarchaeology, where skeletons hold the clues to past lives and the ancient civilizations from which they came.</span></p><span data-dcnode-id="4227" instrument_node="">

        Hollow Victory: A Novel of the Second Seminole War  </span></div><span data-dcnode-id="4077" instrument_node="">
</span></div><div class="field field-name-body field-type-text-with-summary field-label-hidden view-mode-teaser" data-dcnode-id="4068"><div class="field-items" data-dcnode-id="4069"><div class="field-item even" data-dcnode-id="4070" property="content:encoded"><p data-dcnode-id="4072"><span data-dcnode-id="4075" instrument_node="">The year is 1835 and the Florida Territory is on the verge of a major war. President Andrew Jackson has ordered the Seminole Indians to abandon their homes and move to a reservation west of the Mississippi. Called into action is Col. William Wooster, a career officer who understands that removing the Seminoles will be a long and arduous task. Standing against the colonel is Kachi-Hadjo, a determined Seminole leader who wages a desperate seven-year conflict to remain on his native soil and protect his people’s way of life. Both men fight the merciless climate, growing frustrations, and each other, both hoping the next battle will yield something more than a hollow victory.</span><br data-dcnode-id="4074"><span data-dcnode-id="4073" instrument_node="">
Written by Seminole War historians with a deep understanding of this little known conflict, Hollow Victory takes the reader through one of the darkest chapters in American history, through a long and brutal war that left a lasting mark on Florida and has surprising similarities to the conflicts we wage today.</span></p><span data-dcnode-id="4071" instrument_node="">

</span></div><div class="field field-name-body field-type-text-with-summary field-label-hidden view-mode-teaser" data-dcnode-id="3754"><div class="field-items" data-dcnode-id="3755"><div class="field-item even" data-dcnode-id="3756" property="content:encoded"><p data-dcnode-id="3761"><span data-dcnode-id="3762" instrument_node="">"The Way Hit Wuz" is a novel about Florida's history similiar to Patrick Smith's book "A Land Remembered". Recently reprinted 2010 with new cover.&nbsp;</span></p><span data-dcnode-id="3760" instrument_node="">
</span><p data-dcnode-id="3758"><span data-dcnode-id="3759" instrument_node="">As a Mizell family descendant who married and had children with a Barber, author Mary Ida Bass Barber Shearhart has a personal interest in the infamous Barber-Mizell Family Feud. Florida’s Frontier: The Way Hit Wuz is written as a compelling, action-filled novel set between 1841 and 1870, but is firmly based in historical fact. In addition to offering descriptions of pioneer life in Florida from running cattle, to making soap, to cane grinding, the author provides insight about the Spanish colonization of Florida, the Seminole Indian Wars, the Civil War, and other topics</span></p><span data-dcnode-id="3757" instrument_node="">

        The Trouble With Panthers  </span></div><span data-dcnode-id="3684" instrument_node="">
</span></div><div class="field field-name-body field-type-text-with-summary field-label-hidden view-mode-teaser" data-dcnode-id="3674"><div class="field-items" data-dcnode-id="3675"><div class="field-item even" data-dcnode-id="3676" property="content:encoded"><p data-dcnode-id="3681"><span data-dcnode-id="3682" instrument_node="">“The trouble with panthers is they can’t change. With the whole world changin round it, old panther got no choice but to go on bein a panther. It can’t reason like you and me -- can’t decide to earn its livin a little differently.”</span></p><span data-dcnode-id="3680" instrument_node="">
</span><p data-dcnode-id="3678"><span data-dcnode-id="3679" instrument_node="">Central Florida, November 2004. Upon hearing this admonition from his dying grandfather, young cowman, Bodie Rawlerson, doesn’t hesitate to promise the old man that he won’t be like the panther. Though he hates change, fears it more than anything else, he vows to do whatever necessary to carry on the family legacy of raising cattle on the land he so dearly loves. But unbeknownst to Bodie, forces are already in motion to render his promise impossible to keep. Within days of his grandfather’s passing, these forces of human (and inhuman) nature will convince him that nothing lasts forever, that change is life’s only certainty -- that time and chance do indeed rule us all.</span></p><span data-dcnode-id="3677" instrument_node="">

</span><br data-dcnode-id="3599"><span data-dcnode-id="3598" instrument_node="">
“I don't know of any book on my whole shelf that hits me any harder than Palmetto Country. It gives me a better trip and taste and look and feel for Florida than I got in the forty-seven states I've actually been in body and tramped in boot. If only, and if only, all our library books could say what [Kennedy does]—the jokes and songs and old ballads about voodoo and the hoodoo and the bigly winds down in your neck of the woodvine.”&nbsp; --Woody Guthrie Folk Musician and singer-songwriter, This Land is Your Land</span></p><span data-dcnode-id="3596" instrument_node="">

        Saving Home  </span></div><span data-dcnode-id="3362" instrument_node="">
</span></div><div class="field field-name-body field-type-text-with-summary field-label-hidden view-mode-teaser" data-dcnode-id="3355"><div class="field-items" data-dcnode-id="3356"><div class="field-item even" data-dcnode-id="3357" property="content:encoded"><p data-dcnode-id="3359"><span data-dcnode-id="3360" instrument_node="">Saving Home is an historical novel set during the English siege of St. Augustine in 1702. The story is told through the eyes of nine-year-old Luissa de Cueva and her friends, ten-year-old Diego de las Alas, and a Timucuan Indian girl named Junco. Based on meticulous research, Saving Home engages readers of all ages with descriptions of Spanish and Native American families seeking refuge for more than six weeks within the walls of the Castillo de San Marcos as St. Augustine goes up in flames and a battle rages around them. This exciting historical novel has messages about life, family, and what is important that will resonate with both the young and the young at heart.</span></p><span data-dcnode-id="3358" instrument_node="">
</span></div></div></div><section class="field field-name-field-author field-type-entityreference field-label-inline inline ProductAuthorTease view-mode-teaser" data-dcnode-id="3348"><h2 class="field-label" data-dcnode-id="3353"><span data-dcnode-id="3354" instrument_node="">Author:&nbsp;</span></h2><div class="field-items" data-dcnode-id="3349"><div class="field-item even" data-dcnode-id="3350" property=""><a data-dcnode-id="3351" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//myfloridahistory.org/authors/judy-linquist"><span data-dcnode-id="3352" instrument_node="">Judy Linquist</span></a></div></div></section><div class="commerce-product-field commerce-product-field-commerce-price field-commerce-price node-3396-product-commerce-price" data-dcnode-id="3343"><div class="field field-name-commerce-price field-type-commerce-price field-label-hidden view-mode-node_teaser" data-dcnode-id="3344"><div class="field-items" data-dcnode-id="3345"><div class="field-item even" data-dcnode-id="3346"><span data-dcnode-id="3347" instrument_node="">$14.95</span></div></div></div></div><div class="field field-name-field-product field-type-commerce-product-reference field-label-hidden view-mode-teaser" data-dcnode-id="3327"><div class="field-items" data-dcnode-id="3328"><div class="field-item even" data-dcnode-id="3329" property=""><form accept-charset="UTF-8" action="/fhspress" autocomplete="off" class="commerce-add-to-cart commerce-cart-add-to-cart-form-73" data-dcnode-id="3330" id="commerce-cart-add-to-cart-form-73" method="post"><div data-dcnode-id="3331"><input data-dcnode-id="3342" name="product_id" type="hidden" value="73"><span data-dcnode-id="3341" instrument_node="">

        Title:      </span></div><span data-dcnode-id="3287" instrument_node="">
        Overhead The Sun  </span></div><span data-dcnode-id="3285" instrument_node="">
</span></div><div class="field field-name-body field-type-text-with-summary field-label-hidden view-mode-teaser" data-dcnode-id="3278"><div class="field-items" data-dcnode-id="3279"><div class="field-item even" data-dcnode-id="3280" property="content:encoded"><p data-dcnode-id="3282"><span data-dcnode-id="3283" instrument_node="">Overhead The Sun, a gripping historical novel about race relations in Florida during the late Nineteenth Century. Written by the late John Ashworth, Overhead The Sun is based on the tragic story of Rosewood, a small Florida community of African-Americans that was destroyed by a mob of whites in 1923. The central character in Overhead The Sun is Julia Clayton, a young woman striving mightily to achieve emotional and intellectual independence. Her husband, Tom Clayton, works for Arthur Wilkins (who is based on the real life person of Henry Flagler) who seeks to extend his hotel and railroad empire across the Sunshine State. Neglected and verbally abused, Julia Clayton takes a heretical economics professor, Thorstein Brach, as her lover. The intrigues and conflicts of personality that mark these tortured relationships light up the pages of Overhead The Sun.</span></p><span data-dcnode-id="3281" instrument_node="">
</span></div></div></div><section class="field field-name-field-author field-type-entityreference field-label-inline inline ProductAuthorTease view-mode-teaser" data-dcnode-id="3271"><h2 class="field-label" data-dcnode-id="3276"><span data-dcnode-id="3277" instrument_node="">Author:&nbsp;</span></h2><div class="field-items" data-dcnode-id="3272"><div class="field-item even" data-dcnode-id="3273" property=""><a data-dcnode-id="3274" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//myfloridahistory.org/authors/john-ashworth"><span data-dcnode-id="3275" instrument_node="">John Ashworth</span></a></div></div></section><div class="commerce-product-field commerce-product-field-commerce-price field-commerce-price node-3391-product-commerce-price" data-dcnode-id="3266"><div class="field field-name-commerce-price field-type-commerce-price field-label-hidden view-mode-node_teaser" data-dcnode-id="3267"><div class="field-items" data-dcnode-id="3268"><div class="field-item even" data-dcnode-id="3269"><span data-dcnode-id="3270" instrument_node="">$10.00</span></div></div></div></div><div class="field field-name-field-product field-type-commerce-product-reference field-label-hidden view-mode-teaser" data-dcnode-id="3250"><div class="field-items" data-dcnode-id="3251"><div class="field-item even" data-dcnode-id="3252" property=""><form accept-charset="UTF-8" action="/fhspress" autocomplete="off" class="commerce-add-to-cart commerce-cart-add-to-cart-form-68" data-dcnode-id="3253" id="commerce-cart-add-to-cart-form-68" method="post"><div data-dcnode-id="3254"><input data-dcnode-id="3265" name="product_id" type="hidden" value="68"><span data-dcnode-id="3264" instrument_node="">
