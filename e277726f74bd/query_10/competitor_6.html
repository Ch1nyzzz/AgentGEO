</span></div><div class="field field-name-body field-type-text-with-summary field-label-hidden view-mode-teaser" data-dcnode-id="3124"><div class="field-items" data-dcnode-id="3125"><div class="field-item even" data-dcnode-id="3126" property="content:encoded"><p data-dcnode-id="3128"><span data-dcnode-id="3129" instrument_node="">This book is the story of people of vision and courage, of a small group of prominent Saint Augustine investors who conceived of the Florida waterway and began the first dredging work; of an obscure group of New England capitalists who provided significant financing and obtained a million acres of undeveloped Florida public land in pursuing what was, at best, a speculative enterprise; of innumerable citizen groups like the Florida east coast chamber associations and the larger Atlantic Deeper Waterways Association that demanded at the turn of the last century what they believed was the peoples right-a public waterway, free of the burden of tolls; and finally, of the U&gt;S&gt; Army Corps of Engineers, who conducted all of the Florida waterway's early surveys and assumed the project's control in 1929 to convert what was once a private toll way into Florida's modern-day, toll-free Atlantic Intracoastal Waterway.</span></p><span data-dcnode-id="3127" instrument_node="">

</span><div class="commerce-product-title-label" data-dcnode-id="2704"><span data-dcnode-id="2705" instrument_node="">
        Title:      </span></div><span data-dcnode-id="2703" instrument_node="">
        River Road Stories  </span></div><span data-dcnode-id="2701" instrument_node="">
</span></div><div class="field field-name-body field-type-text-with-summary field-label-hidden view-mode-teaser" data-dcnode-id="2690"><div class="field-items" data-dcnode-id="2691"><div class="field-item even" data-dcnode-id="2692" property="content:encoded"><p data-dcnode-id="2694"><span data-dcnode-id="2699" instrument_node="">River Road Stories is a little masterpiece of story telling. Mary Eschbach, a Rockledge resident, captures life along the Indian River as only a resident can. What a wonderful way to celebrate a way of life that has passed us all by! --Patrick Smith, author of A Land Remembered</span><br data-dcnode-id="2698"><span data-dcnode-id="2697" instrument_node="">
</span><br data-dcnode-id="2696"><span data-dcnode-id="2695" instrument_node="">
There are some authors and some books that you start to read with interest and finish with envy. River Road Stories is such a book. Packed in a few pages, Stories manages to describe in great detail the daily humdrum and occasional excitement of a young girl's life along the Indian River Lagoon. At the same time, River Road Stories is a song of praise for a lifestyle that is largely gone, but which exists forever in the mind of the author. Once you read River Road Stories, you'll become part of the past. --Nick Wynne, PhD, The Florida Historical Society</span></p><span data-dcnode-id="2693" instrument_node="">
</span></div></div></div><section class="field field-name-field-author field-type-entityreference field-label-inline inline ProductAuthorTease view-mode-teaser" data-dcnode-id="2683"><h2 class="field-label" data-dcnode-id="2688"><span data-dcnode-id="2689" instrument_node="">Author:&nbsp;</span></h2><div class="field-items" data-dcnode-id="2684"><div class="field-item even" data-dcnode-id="2685" property=""><a data-dcnode-id="2686" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//myfloridahistory.org/authors/mary-eschbach"><span data-dcnode-id="2687" instrument_node="">Mary Eschbach</span></a></div></div></section><div class="commerce-product-field commerce-product-field-commerce-price field-commerce-price node-3395-product-commerce-price" data-dcnode-id="2678"><div class="field field-name-commerce-price field-type-commerce-price field-label-hidden view-mode-node_teaser" data-dcnode-id="2679"><div class="field-items" data-dcnode-id="2680"><div class="field-item even" data-dcnode-id="2681"><span data-dcnode-id="2682" instrument_node="">$10.00</span></div></div></div></div><div class="field field-name-field-product field-type-commerce-product-reference field-label-hidden view-mode-teaser" data-dcnode-id="2662"><div class="field-items" data-dcnode-id="2663"><div class="field-item even" data-dcnode-id="2664" property=""><form accept-charset="UTF-8" action="/fhspress" autocomplete="off" class="commerce-add-to-cart commerce-cart-add-to-cart-form-72" data-dcnode-id="2665" id="commerce-cart-add-to-cart-form-72" method="post"><div data-dcnode-id="2666"><input data-dcnode-id="2677" name="product_id" type="hidden" value="72"><span data-dcnode-id="2676" instrument_node="">
