</span><h1 class="title" data-dcnode-id="2041" id="page-title"><span data-dcnode-id="2042" instrument_node="">Historical Narratives of the Akonting and Banjo</span></h1><span data-dcnode-id="2040" instrument_node="">

</span><div about="/content/akonting-history" class="node node-blog node-promoted view-mode-full clearfix" data-dcnode-id="592" id="node-763" typeof="sioc:Post sioct:BlogPost"><span data-dcnode-id="2036" instrument_node="">
</span><span class="rdf-meta element-hidden" content="Historical Narratives of the Akonting and Banjo" data-dcnode-id="2035" property="dc:title"></span><span data-dcnode-id="2034" instrument_node="">
</span><div class="submitted" data-dcnode-id="2026"><span data-dcnode-id="2033" instrument_node="">
</span><span content="2014-07-27T11:19:21-07:00" data-dcnode-id="2028" datatype="xsd:dateTime" property="dc:date dc:created" rel="sioc:has_creator"><span data-dcnode-id="2032" instrument_node="">Submitted by </span><a about="/users/scott-linford" class="username" data-dcnode-id="2030" datatype="" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//ethnomusicologyreview.ucla.edu/users/scott-linford" property="foaf:name" title="View user profile." typeof="sioc:UserAccount" xml:lang=""><span data-dcnode-id="2031" instrument_node="">Scott V. Linford</span></a><span data-dcnode-id="2029" instrument_node=""> on July 27, 2014 - 11:19am</span></span><span data-dcnode-id="2027" instrument_node=""> </span></div><span data-dcnode-id="2025" instrument_node="">
</span><div class="content" data-dcnode-id="600"><span data-dcnode-id="2024" instrument_node="">
</span><span class="print-link" data-dcnode-id="2023"></span><div class="field field-name-field-image field-type-image field-label-hidden" data-dcnode-id="2019"><div class="field-items" data-dcnode-id="2020"><div class="field-item even" data-dcnode-id="2021"><img alt="" data-dcnode-id="2022" height="220" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//ethnomusicologyreview.ucla.edu/sites/default/files/styles/medium/public/akontings2.jpg%3Fitok%3Dva4sRcnT&amp;raw" typeof="foaf:Image" width="174"></div></div></div><div class="field field-name-body field-type-text-with-summary field-label-hidden" data-dcnode-id="602"><div class="field-items" data-dcnode-id="603"><div class="field-item even" data-dcnode-id="604" property="content:encoded"><p data-dcnode-id="2014"><span data-dcnode-id="2018" instrument_node="">I travelled to The Gambia in the summer of 2012 to learn to play a stringed instrument called akonting, not knowing then that it would spark my current dissertation research. Played by musicians of the Jola ethnic group from the Senegambian region of West Africa, the akonting is recognized as the closest known African relative of the American banjo.</span><a data-dcnode-id="2016" href="#_ftn1" name="_ftnref1" title=""><span data-dcnode-id="2017" instrument_node="">[1]</span></a><span data-dcnode-id="2015" instrument_node=""> This essay considers the role of history in the relationship between the two instruments, including both the challenge of tracing historical documentation and the ways that historical narrative has been produced by cultural activity in Senegambia and the United States. The following brief documentary film, made during my 2012 visit, introduces the sound of the akonting as played by my teacher Musa Diatta and gives a sense of my experience of fieldwork in The Gambia.</span></p><p data-dcnode-id="1642"><iframe data-dcnode-id="1643" frameborder="0" height="407" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp </span></body></html></iframe></p><p data-dcnode-id="1639"><strong data-dcnode-id="1640"><span data-dcnode-id="1641" instrument_node="">Conflicting Histories</span></strong></p><p data-dcnode-id="1637"><span data-dcnode-id="1638" instrument_node="">Gambian musician and scholar Daniel Laemouahuma Jatta gave a presentation at the 2000 Banjo Collectors' Conference that would forever change the narrative of that instrument's history. Jatta first heard the banjo in the early 1970s while studying accounting in Atlanta, Georgia. When a bluegrass tune came on the local radio station, he was immediately struck by the banjo's sonic similarities to the akonting, an instrument he had played as a young man. A friend informed him that the banjo had roots in West Africa (a fact which had by then been deliberately obscured by a century of historical white-washing), launching Jatta on a path of research tracing this historical connection.</span></p><p data-dcnode-id="1635"><span data-dcnode-id="1636" instrument_node="">Nearly thirty years later, Jatta presented his findings at the Banjo Collectors' Conference in Massachusetts with his longtime Swedish collaborator Ulf Jägfors. The two men proposed that the akonting and banjo shared a close historical relationship, based on a nearly identical downstroke playing style and similar organological features such as a full-spike neck and an M-shaped bridge sitting atop the animal-skin soundplane. Their&nbsp;claims were apparently quite controversial:&nbsp;some members of&nbsp;banjo-centered online&nbsp;message boards accused&nbsp;Jatta of fabricating the instrument and its tradition for personal renown, while others allegedly even threatened physical violence against him. Why did this presentation arouse such outrage? What deeply embedded schema did their argument contest?</span></p><p data-dcnode-id="1631"><img alt="" data-dcnode-id="1634" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//player.vimeo.com/sites/default/files/u57/daniel_jatta.jpg&amp;raw" style="width: 300px; height: 270px;"><span data-dcnode-id="1633" instrument_node="">&nbsp; &nbsp; &nbsp; &nbsp;</span><img alt="" data-dcnode-id="1632" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//player.vimeo.com/sites/default/files/u57/plantation-banjo1.jpg&amp;raw" style="width: 300px; height: 277px;"></p><p data-dcnode-id="1621" style="text-align: center;"><em data-dcnode-id="1629"><span data-dcnode-id="1630" instrument_node="">Left</span></em><span data-dcnode-id="1628" instrument_node="">: Daniel Laemouahuma Jatta playing an akonting. </span><em data-dcnode-id="1626"><span data-dcnode-id="1627" instrument_node="">Right</span></em><span data-dcnode-id="1625" instrument_node="">: Detail from&nbsp;</span><em data-dcnode-id="1623"><span data-dcnode-id="1624" instrument_node="">The Old Plantation</span></em><span data-dcnode-id="1622" instrument_node="">, one of the earliest depictions of gourd banjos in the United States (circa 1790).</span></p><p data-dcnode-id="1616"><span data-dcnode-id="1620" instrument_node="">The akonting's uncanny resemblance to early American banjos challenged two central aspects of the banjo's existing historical narrative. First, it disrupted the previous consensus that American banjos descended from a group of West African archetypes played by griot musicians – plucked lutes such as the xalam, hoddu, and ngoni. While these instruments are similar to American gourd banjos in many respects, they differ in key organological details: they have wooden resonators instead of gourd resonators; they are tanged lutes rather than full-spike lutes; and their playing style involves a combination of up- and down-picking that is similar but distinct from what we know of early banjo technique. Although subtle, these differences leave room for the banjo to remain a uniquely American invention based on indeterminate African influences – and indeed the banjo's frequent sobriquet is "America's instrument." The existence of a single, specific relative containing nearly all the key features of American gourd banjos displaces the site of invention from the New World to West Africa.</span><a data-dcnode-id="1618" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//player.vimeo.com/video/101898263%23_ftn2" name="_ftnref2" title=""><span data-dcnode-id="1619" instrument_node="">[2]</span></a><span data-dcnode-id="1617" instrument_node=""> Secondly, the emergence of the akonting contradicts the narrative of Western scholarly omniscience. Initial skepticism about the akonting's authenticity likely stemmed from a belief that such an instrument could not have escaped notice by Western scholars in this information-rich day and age. While excellent scholarship by Charry (1996), Coolen (1984), Epstein, (1975) and others has catalogued a large number plucked lutes in West Africa, the vast human diversity of that region has clearly left gaps in the Western musical ethnologue, of which the akonting's recent "discovery" is but one example.</span></p><p data-dcnode-id="1614"><span data-dcnode-id="1615" instrument_node="">A third reason for incredulity about the akonting is the sheer extent of its similarity to early American gourd banjos. Several essays have detailed these similarities thoroughly and systematically, so I will not dwell on them here (cf. Adams and Pestcoe 2007; Adams and Sedgwick 2007a and 2007b; Adams and Levy forthcoming; Bamber n.d.; Jagfors 2003; Levy 2012; Pestcoe n.d.). Suffice it to say, however, that the retention of construction details and especially the characteristic downstroke playing style through centuries that saw the cultural genocide of slavery and the explosion of industrial banjo manufacturing is a remarkable testimony both to the durability of musical practices and their ability to adapt to new contexts. The following videos of my akonting teacher Musa Diatta performing some of his favorite songs in The Gambia briefly illustrate the distinctive playing technique and the repeating vocal stanzas of akonting songs.</span></p><p data-dcnode-id="1242"><iframe data-dcnode-id="1243" frameborder="0" height="407" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//player.vimeo.com/video/101894035&amp;raw" width="723"><html data-dcnode-id="1245" lang="en"><head data-dcnode-id="1588"><meta charset="utf-8"><span data-dcnode-id="1612" instrument_node=""> </span><meta charset="utf-8" data-dcnode-id="1611"/><span data-dcnode-id="1610" instrument_node=""> </span><meta content="width=device-width,initial-scale=1,user-scalable=yes" data-dcnode-id="1609" name="viewport"/><span data-dcnode-id="1608" instrument_node=""> </span><link data-dcnode-id="1607" href="https://vimeo.com/101894035" rel="canonical"/><span data-dcnode-id="1606" instrument_node=""> </span><title data-dcnode-id="1604">Mande Waruna from Scott Linford on Vimeo</title><span data-dcnode-id="1603" instrument_node=""> </span><span data-dcnode-id="1600" instrument_node=""> </span><span data-dcnode-id="1595" instrument_node=""> </span><span data-dcnode-id="1593" instrument_node=""> </span><link data-dcnode-id="1592" href="https://f.vimeocdn.com/p/4.0.3/css/player.css" rel="stylesheet"/></meta></head><span data-dcnode-id="1587" instrument_node=""> </span><body data-dcnode-id="1246"><span data-dcnode-id="1586" instrument_node=""> </span><span data-dcnode-id="1585" instrument_node=""> </span><div class="player player-d0760dda-6e42-4006-bccf-0da41e40123b js-player-fullscreen with-fullscreen with-sticky-custom-logo player-normal player-sm no-fullscreen-support player-cardsCorner" data-dcnode-id="1251" id="player"><div class="vp-video-wrapper transparent" data-dcnode-id="1570"><div class="vp-video" data-dcnode-id="1582"><div class="vp-telecine invisible" data-dcnode-id="1583"><video data-dcnode-id="1584" disablepictureinpicture="" preload="none" style="" tabindex="-1"></video></div></div><div class="vp-previ </span></body></html></iframe></p><p data-dcnode-id="866"><span data-dcnode-id="867" instrument_node="">Musa Diatta plays Corie Beju Dakaram</span></p><p data-dcnode-id="863"><strong data-dcnode-id="864"><span data-dcnode-id="865" instrument_node="">History of the Akonting</span></strong></p><p data-dcnode-id="849"><span data-dcnode-id="862" instrument_node="">In the fourteen years since Jatta and Jägfors' presentation, any lingering skepticism about the akonting among American folk musicians has been replaced by enthusiastic acceptance of the instrument as the "ancestor" or "grandfather" of the banjo. While the evidence linking the two contemporary instruments is strong, the specific nature of their relationship rests on a murky historical conjecture: namely, that akontings were commonly played 400 years ago, during the time when millions of Senegambians were enslaved and transported to what is now the United States. Oral histories of Jola people suggest that the akonting tradition dates back at least three generations, and it is considered a very old instrument. However, since the Jola culture does not have the well-defined role of musician and oral historian played by griots, Jola oral history tends to be less formalized than other Sahelian societies and therefore does not reach into the distant past. Documentary evidence of the akonting by Western scholars dates to at least 1959, when the French anthropologist Louis-Vincent Thomas noted that "the most common and also the most famous of the chordophones [played by Jola people] is the </span><em data-dcnode-id="860"><span data-dcnode-id="861" instrument_node="">kõtin</span></em><span data-dcnode-id="859" instrument_node=""> or </span><em data-dcnode-id="857"><span data-dcnode-id="858" instrument_node="">kõkin </span></em><span data-dcnode-id="856" instrument_node="">[i.e., akonting], which no sufficiently skilled young man misses playing" (Thomas 1959:382).</span><a data-dcnode-id="854" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//player.vimeo.com/video/101893668%23_ftn3" name="_ftnref3" title=""><span data-dcnode-id="855" instrument_node="">[3]</span></a><span data-dcnode-id="853" instrument_node=""> Neither Irvine and Sapir's 1976 article on musical style and social change among the Kujamaat Diola, nor Mark's 1994 analysis of a Jola music festival, nor Charry's 1996 survey of plucked lutes in West Africa mentions the akonting,</span><a data-dcnode-id="851" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//player.vimeo.com/video/101893668%23_ftn4" name="_ftnref4" title=""><span data-dcnode-id="852" instrument_node="">[4]</span></a><span data-dcnode-id="850" instrument_node=""> perhaps indicating the instrument had become less common or simply that those scholars did not visit areas where it remained in use. I will continue to conduct oral histories and scour university archives for further evidence of the akonting's history during my next visit to Senegambia, but for now the historical record remains rather limited.</span></p><p data-dcnode-id="847" style="text-align: center;"><img alt="" data-dcnode-id="848" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//player.vimeo.com/sites/default/files/u57/akontingthomas.jpg&amp;raw" style="width: 350px; height: 138px;"></p><p data-dcnode-id="845" style="text-align: center;"><span data-dcnode-id="846" instrument_node="">Earliest known sketch of an akonting, with details of string fixture and bridge shape. The neck appears to sit atop the soundplane with an uncertain method of securing it to the resonator, representing either a different construction method from contemporary akontings or a graphic error by Thomas. From Thomas 1959: Planche XXVL.</span></p><p data-dcnode-id="834"><span data-dcnode-id="844" instrument_node="">Tracing the akonting's history is further complicated by the historical complexities of the Senegambian region and the Jola ethnicity in particular. For centuries, everyday life in the Senegambian region has been profoundly influenced by far-reaching cultural networks, such as the intertwined spheres of Islam, colonialism, and capitalism. (Some of these influences are represented in the brief opening images of the film by the ubiquitous squawking radios and billboards advertising special rates for Hajj savings accounts and international cellphone providers offering a chance to win a free trip to Mecca.) Senegambian traditions that many consider quintessentially West African – such as drinking strongly concentrated </span><em data-dcnode-id="842"><span data-dcnode-id="843" instrument_node="">ataaya</span></em><span data-dcnode-id="841" instrument_node=""> green tea or dying brightly colored </span><em data-dcnode-id="839"><span data-dcnode-id="840" instrument_node="">batik</span></em><span data-dcnode-id="838" instrument_node=""> fabrics ­– are in fact legacies of colonial connections to East Asia via European powers. As Amselle (1998), Ranger (1983), and others have famously argued, the very nature of the distinct ethnic groups of contemporary Africa may also be intertwined with histories of colonialism. Indeed, Mark has argued that the sense of widespread Jola ethnic solidarity emerged in response to French colonialism and Mandinka expansion in the 1800s, and continues to sustain itself through shared customs and geography along with the fraught post-colonial political situation (Mark 1985; 1992).</span><a data-dcnode-id="836" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//player.vimeo.com/video/101893668%23_ftn5" name="_ftnref5" title=""><span data-dcnode-id="837" instrument_node="">[5]</span></a><span data-dcnode-id="835" instrument_node=""> While it is tempting to project contemporary African traditions into the distant past, as some Jola musicians do for the akonting, it is difficult to gauge the historical effects of multiple turbulent centuries on contemporary practices. As Senegambian historian Donald Wright concludes:</span></p><blockquote data-dcnode-id="831"><p data-dcnode-id="832"><span data-dcnode-id="833" instrument_node="">Anthropologists have done historians of Africa great service with their cultural studies, but often they have lent confusion to historical study by the reference to societies in the cultural present, treating them as if they never had different ways of doing things until fairly recent times [...]. In such studies, there is an implied sense that only the complex world of the twentieth century brought change to "traditional ways." Of course, this is not historical, not an appropriate way to consider cultures through time. As all people in all cultures, African societies changed. The difficulty is that for most of those societies there is not sufficient evidence of the way things used to be. (2004:45)</span></p></blockquote><p data-dcnode-id="828"><strong data-dcnode-id="829"><span data-dcnode-id="830" instrument_node="">Producing Historical Narrative</span></strong></p><p data-dcnode-id="817"><span data-dcnode-id="827" instrument_node="">Despite the difficulties in tracing the history of the akonting, it is undeniably a close relative of the American banjo – and this historical narrative has been mobilized through cultural activity on both sides of the Atlantic. Embraced by roots music enthusiasts in the United States, akontings are now available for purchase from well-known American banjo suppliers such as Elderly Instruments and from respected banjo builders such as Jeff Menzies and Bob Thornburg, and even from at least one </span><a data-dcnode-id="825" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.kaypacha.com.ar/en/instruments/instruments.htm"><span data-dcnode-id="826" instrument_node="">folk instrument store in Argentina</span></a><span data-dcnode-id="824" instrument_node="">. The Ships of the Sea museum in Savannah, Georgia held an </span><a data-dcnode-id="822" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//dining.savannahnow.com/attractions/2007-09-12/ships-sea-museum-tries-new-course%23.U9VPYCiSNj0"><span data-dcnode-id="823" instrument_node="">Akonting/Banjo Weekend in 2007</span></a><span data-dcnode-id="821" instrument_node="">, where attendees learned how to build an "a-can-ting" using a cookie tin or coffee can. Perhaps a dozen banjo players have visited The Gambia to learn from source musicians there, among them </span><a data-dcnode-id="819" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.indyweek.com/indyweek/history-on-a-string/Content%3Foid%3D1198762"><span data-dcnode-id="820" instrument_node="">Rhiannon Giddens</span></a><span data-dcnode-id="818" instrument_node=""> of the Grammy-winning Carolina Chocolate Drops and ethnomusicologist Greg Adams. Florida-based banjoist and researcher Chuck Levy designed and commissioned an instrument he calls the "banjonting," which combines elements of the banjo and akonting, and he also released an album of old time Appalachian fiddle tunes that includes four traditional Jola songs played on fiddle and akonting, sonically linking the two genres.</span></p><p data-dcnode-id="813"><img alt="" data-dcnode-id="816" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//player.vimeo.com/sites/default/files/u57/banjo_journeys.jpg&amp;raw" style="width: 300px; height: 274px;"><span data-dcnode-id="815" instrument_node="">&nbsp; &nbsp; &nbsp; &nbsp;</span><img alt="" data-dcnode-id="814" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//player.vimeo.com/sites/default/files/u57/elderly_akonting.jpg&amp;raw" style="border-width: 1px; border-style: solid; width: 300px; height: 215px;"></p><p data-dcnode-id="803"><em data-dcnode-id="811"><span data-dcnode-id="812" instrument_node="">Left</span></em><span data-dcnode-id="810" instrument_node="">: Cover art for&nbsp;</span><em data-dcnode-id="808"><span data-dcnode-id="809" instrument_node="">Banjo Journeys</span></em><span data-dcnode-id="807" instrument_node="">, album recorded by Florida-based banjoist and researcher Chuck Levy. Note that a smiling Senegambia is depicted dancing with several American states. </span><em data-dcnode-id="805"><span data-dcnode-id="806" instrument_node="">Right</span></em><span data-dcnode-id="804" instrument_node="">: An akonting for sale at Elderly.com, a major folk instrument retailer.</span></p><p data-dcnode-id="801"><span data-dcnode-id="802" instrument_node="">Meanwhile, in Senegambia, the akonting is experiencing a parallel revival. Since 2005, Daniel Jatta has been working to establish the Akonting Center for Senegambian Folk Music in his hometown of Mandinari. Having recently moved permanently back to The Gambia from his previous residence in Sweden, Jatta is currently working with his cousins Remi, Ekona, and Musa Jatta to develop a curriculum and DVD series that teaches students how to play akonting and includes introductory tutorials to the Jola language. Jatta has donated akontings to the national museum in Banjul, the capital city, and earlier this year spoke at a nationally sponsored event in The Gambia officially recognizing the akonting as the "grandfather" of the banjo.</span></p><p data-dcnode-id="796"><span data-dcnode-id="800" instrument_node="">Other Jola musicians have taken the akonting in different directions. Sana Ndiaye plays a custom-made akonting with the interethnic hip hop group Gokh-Bi System (meaning "The Neighborhood System"). He describes their sound as a fusion of "'Ancient' African traditional rhythms with contemporary 'urban' American beats in a style [...] dubbed, Ancient Meets Urban" (</span><a data-dcnode-id="798" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.gokhbisystem.com/"><span data-dcnode-id="799" instrument_node="">www.gokhbisystem.com/</span></a><span data-dcnode-id="797" instrument_node="">). Ndiaye describes the akonting as "an ancient and extremely rare three-stringed gourd instrument (which looks like a large banjo) that is virtually extinct in Senegal. It is a distinctive component of our authentic sound."</span></p><p data-dcnode-id="792"><img alt="" data-dcnode-id="795" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//player.vimeo.com/sites/default/files/u57/akonting_center2.jpg&amp;raw" style="width: 350px; height: 197px;"><span data-dcnode-id="794" instrument_node="">&nbsp; &nbsp; &nbsp; &nbsp;</span><img alt="" data-dcnode-id="793" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//player.vimeo.com/sites/default/files/u57/gokh-bi_system.jpg&amp;raw" style="width: 200px; height: 262px;"></p><p data-dcnode-id="785"><em data-dcnode-id="790"><span data-dcnode-id="791" instrument_node="">Left</span></em><span data-dcnode-id="789" instrument_node="">: The Akonting Center for Senegambia Folk Music in 2012. Musa Diatta and Daniel Jatta pose in front with local children. </span><em data-dcnode-id="787"><span data-dcnode-id="788" instrument_node="">Right</span></em><span data-dcnode-id="786" instrument_node="">: Sana Ndiaye (center) plays a custom-made akonting with the hip hop group Gokh-Bi System.</span></p><p data-dcnode-id="783" style="text-align: center;"><span data-dcnode-id="784" instrument_node="">---</span></p><p data-dcnode-id="781"><span data-dcnode-id="782" instrument_node="">Anthropologist Ferdinand de Jong describes the practice of secrecy in Jola initiation rituals as a means of negotiating both interpersonal power relations and the broader spheres of Senegalese politics and global modernity (2001). For de Jong, the incorporation of distinctly contemporary elements into such practices "are not modern inventions of tradition […], but historical ways of dealing with modernity" (2001:7). The mobilization of historical narrative connecting the akonting and banjo likewise cannot be considered an invented tradition. Rather, it is a contemporary continuation of Senegambia's centuries-long history of reciprocal exchange with the global world system, and a production of historical narrative in which, to paraphrase the philosopher V. Y. Mudimbe (1988), stories told about others are elements in the stories told about selves. Like the braids of palm-root that once served for their strings, the story of the banjo and the story of the akonting are inseparably entwined.</span></p><p data-dcnode-id="779" style="text-align: center;"><span data-dcnode-id="780" instrument_node="">&nbsp;</span></p><p data-dcnode-id="776" style="text-align: center;"><strong data-dcnode-id="777"><span data-dcnode-id="778" instrument_node="">Works Cited</span></strong></p><p data-dcnode-id="774" style="text-align: left;"><span data-dcnode-id="775" instrument_node="">Adams, Greg and Chuck Levy. Forthcoming. "The Downstroke Connection: Comparing the Jola Ekonting and the Banjo."</span></p><p data-dcnode-id="769" style="text-align: left;"><span data-dcnode-id="773" instrument_node="">Adams, Greg and Paul Sedgwick. 2007a. "Encountering the Akonting: A Cultural Exchange." </span><em data-dcnode-id="771"><span data-dcnode-id="772" instrument_node="">Old Time Herald</span></em><span data-dcnode-id="770" instrument_node=""> 10(9):36-41.</span></p><p data-dcnode-id="764" style="text-align: left;"><span data-dcnode-id="768" instrument_node="">______. 2007b. "'O'Teck!': An Introduction to the Akonting." </span><em data-dcnode-id="766"><span data-dcnode-id="767" instrument_node="">Banjo Newsletter</span></em><span data-dcnode-id="765" instrument_node=""> 34(5):12-18.</span></p><p data-dcnode-id="759" style="text-align: left;"><span data-dcnode-id="763" instrument_node="">Adams, Greg and Shlomo Pestcoe. 2007. "The Jola Akonting: Reconnecting the Banjo to its West African Roots." </span><em data-dcnode-id="761"><span data-dcnode-id="762" instrument_node="">Sing Out!</span></em><span data-dcnode-id="760" instrument_node=""> 51(1):43-51.</span></p><p data-dcnode-id="754"><span data-dcnode-id="758" instrument_node="">Amselle, Jean-Loup. 1998. </span><em data-dcnode-id="756"><span data-dcnode-id="757" instrument_node="">Mestizo Logics: Anthropology of Identity in Africa and Elsewhere</span></em><span data-dcnode-id="755" instrument_node="">. Trans. Claudia Royal. Stanford, CA: Stanford University Press.</span></p><p data-dcnode-id="752"><span data-dcnode-id="753" instrument_node="">Bamber, Nick. n.d. "Searching for Gourd Lutes in Guinea Bissau's Bijago Islands." &lt;http://www.myspace.com/akonting/blog/173189481?MyToken=b564ce3e-424b-407c-a8bd-883632985c46&gt;</span></p><p data-dcnode-id="750"><span data-dcnode-id="751" instrument_node="">______. n.d. "Two Gourd Lutes from the Bijago Islands of Guinea Bissau." &lt;http://www.shlomomusic.com/banjoancestors_ngopata.htm&gt;</span></p><p data-dcnode-id="745"><span data-dcnode-id="749" instrument_node="">Charry, Eric. 1996. "Plucked Lutes in West Africa: An Historical Overview." </span><em data-dcnode-id="747"><span data-dcnode-id="748" instrument_node="">The Galpin Society Journal</span></em><span data-dcnode-id="746" instrument_node=""> 49:3-37.</span></p><p data-dcnode-id="740"><span data-dcnode-id="744" instrument_node="">______. 2000. </span><em data-dcnode-id="742"><span data-dcnode-id="743" instrument_node="">Mande Music: Traditional and Modern Music of the Maninka and Mandinka of Western Africa</span></em><span data-dcnode-id="741" instrument_node="">. Chicago: University of Chicago Press. Companion CD: "Mande Music."</span></p><p data-dcnode-id="735"><span data-dcnode-id="739" instrument_node="">Coolen, Michael Theodore. 1984. "Senegambian Archetypes for the American Folk Banjo." </span><em data-dcnode-id="737"><span data-dcnode-id="738" instrument_node="">Western Folklore</span></em><span data-dcnode-id="736" instrument_node=""> 43(2):117-132.</span></p><p data-dcnode-id="730"><span data-dcnode-id="734" instrument_node="">Epstein, Dena. 1975.“The Folk Banjo: A Documentary History.” </span><em data-dcnode-id="732"><span data-dcnode-id="733" instrument_node="">Ethnomusicology </span></em><span data-dcnode-id="731" instrument_node="">19(3):347-371.</span></p><p data-dcnode-id="725"><span data-dcnode-id="729" instrument_node="">de Jong, Ferdinand. 2001. </span><em data-dcnode-id="727"><span data-dcnode-id="728" instrument_node="">Modern Secrets</span></em><span data-dcnode-id="726" instrument_node="">. Amsterdam: University of Amsterdam Press.</span></p><p data-dcnode-id="720"><span data-dcnode-id="724" instrument_node="">Irvine, Judith and J. David Sapir. 1976. "Musical Style and Social Change among the Kujamaat Diola." </span><em data-dcnode-id="722"><span data-dcnode-id="723" instrument_node="">Ethnomusicology</span></em><span data-dcnode-id="721" instrument_node=""> 20(1):67-86.</span></p><p data-dcnode-id="715"><span data-dcnode-id="719" instrument_node="">Jagfors, Ulf. 2003. "The African Akonting and the Origin of the Banjo." </span><em data-dcnode-id="717"><span data-dcnode-id="718" instrument_node="">The Old-Time Herald </span></em><span data-dcnode-id="716" instrument_node="">9(2):26-33.</span></p><p data-dcnode-id="710"><span data-dcnode-id="714" instrument_node="">Lambert, Michael. 1998. "Violence and the War of Words: Ethnicity v. Nationalism in the Casamance." </span><em data-dcnode-id="712"><span data-dcnode-id="713" instrument_node="">Africa</span></em><span data-dcnode-id="711" instrument_node=""> 68(4):585-602.</span></p><p data-dcnode-id="708"><span data-dcnode-id="709" instrument_node="">Levy, Chuck. 2012. "An Interview with Laemouahuma (Daniel) Jatta." &lt;http://www.banjourneys.com/jatta_interview_transcript/&gt;</span></p><p data-dcnode-id="703"><span data-dcnode-id="707" instrument_node="">Mark, Peter. 1985. </span><em data-dcnode-id="705"><span data-dcnode-id="706" instrument_node="">A Social, Economic and Religious History of the Basse Casamance since 1500</span></em><span data-dcnode-id="704" instrument_node="">. Wiesbaden, Germany: Steiner Verlag.</span></p><p data-dcnode-id="698"><span data-dcnode-id="702" instrument_node="">______. 1992. </span><em data-dcnode-id="700"><span data-dcnode-id="701" instrument_node="">The Wild Bull and the Sacred Forest: Form, Meaning, and Change in Senegambian Initiation Masks</span></em><span data-dcnode-id="699" instrument_node="">. Cambridge: Cambridge University Press.</span></p><p data-dcnode-id="693"><span data-dcnode-id="697" instrument_node="">______. 1994. "Art, Ritual, and Folklore: Dance and Cultural Identity among the Peoples of the Casamance." </span><em data-dcnode-id="695"><span data-dcnode-id="696" instrument_node="">Cahiers d'Études Africaines</span></em><span data-dcnode-id="694" instrument_node=""> 34(136):563-584.</span></p><p data-dcnode-id="688"><span data-dcnode-id="692" instrument_node="">Mudimbe, V. Y. 1988. </span><em data-dcnode-id="690"><span data-dcnode-id="691" instrument_node="">The Invention of Africa: Gnosis, Philosophy, and the Order of Knowledge</span></em><span data-dcnode-id="689" instrument_node="">. Bloomington: Indiana University Press.</span></p><p data-dcnode-id="686"><span data-dcnode-id="687" instrument_node="">Pestcoe, Schlomo. n.d. &lt;http://www.shlomomusic.com/&gt;</span></p><p data-dcnode-id="681"><span data-dcnode-id="685" instrument_node="">Ranger, Terence. 1983. "The Invention of Tradition in Colonial Africa." In </span><em data-dcnode-id="683"><span data-dcnode-id="684" instrument_node="">The Invention of Tradition</span></em><span data-dcnode-id="682" instrument_node="">, edited by Eric Hobsbawm and Terence Ranger, 211-262. Cambridge: Cambridge University Press.</span></p><p data-dcnode-id="676"><span data-dcnode-id="680" instrument_node="">Thomas, Louis-Vincent. 1959. </span><em data-dcnode-id="678"><span data-dcnode-id="679" instrument_node="">Les Diola: Essai d'Analyse Fonctionnelle Sur une Population de Basse-Casamance</span></em><span data-dcnode-id="677" instrument_node="">. 2 vols. Dakar: IFAN.</span></p><p data-dcnode-id="671"><span data-dcnode-id="675" instrument_node="">Wright, Donald R. 2004. </span><em data-dcnode-id="673"><span data-dcnode-id="674" instrument_node="">The World and a Very Small Place in Africa: A History of Globalization in Niumi, The Gambia</span></em><span data-dcnode-id="672" instrument_node="">. 2nd ed. Armonk, NY: M.E. Sharpe.</span></p><div data-dcnode-id="617"><hr align="left" data-dcnode-id="670" size="1" width="33%"><div data-dcnode-id="647" id="ftn1"><p data-dcnode-id="648"><a data-dcnode-id="668" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//player.vimeo.com/video/101893668%23_ftnref1" name="_ftn1" title=""><span data-dcnode-id="669" instrument_node="">[1]</span></a><span data-dcnode-id="667" instrument_node=""> There is some debate over the proper spelling of the term "akonting." Some prefer "ekonting," which may more accurately denote the most common pronunciation (IPA ekoʊtiŋ'), while Thomas (1959:382) provides list of alternate spellings that reflects the diversity of dialects spoken in southern Senegal: </span><em data-dcnode-id="665"><span data-dcnode-id="666" instrument_node="">kõtin</span></em><span data-dcnode-id="664" instrument_node=""> or </span><em data-dcnode-id="662"><span data-dcnode-id="663" instrument_node="">kõkin </span></em><span data-dcnode-id="661" instrument_node="">(Jola Fogny); </span><em data-dcnode-id="659"><span data-dcnode-id="660" instrument_node="">kõntiñ </span></em><span data-dcnode-id="658" instrument_node="">(Baïnunk); </span><em data-dcnode-id="656"><span data-dcnode-id="657" instrument_node="">ehotin</span></em><span data-dcnode-id="655" instrument_node=""> (Jola Séleky); </span><em data-dcnode-id="653"><span data-dcnode-id="654" instrument_node="">ekõndiñ</span></em><span data-dcnode-id="652" instrument_node=""> (Dyiwat); </span><em data-dcnode-id="650"><span data-dcnode-id="651" instrument_node="">otõleh</span></em><span data-dcnode-id="649" instrument_node=""> (Bayot). I use "akonting" because it is the most common English spelling and is preferred by Daniel Laemouahuma Jatta. Additionally, the term "Jola" is also commonly spelled "Diola," especially in French texts.</span></p></div><div data-dcnode-id="642" id="ftn2"><p data-dcnode-id="643"><a data-dcnode-id="645" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//player.vimeo.com/video/101893668%23_ftnref2" name="_ftn2" title=""><span data-dcnode-id="646" instrument_node="">[2]</span></a><span data-dcnode-id="644" instrument_node=""> Such displacement has a precedent in banjo history, albeit in the opposite direction. In a origin story popularized by banjo manufacturer S. S. Stewart, the white minstrel banjoist Joel Walker Sweeney became known as the inventor of the banjo's characteristic shortened drone string, a myth of white American innovation that helped make the banjo more palatable to white consumers in the nineteenth and twentieth centuries. In fact, the shortened drone string far predates blackface minstrelsy and is similar to varying string lengths on the akonting and other West African plucked lutes.</span></p></div><div data-dcnode-id="631" id="ftn3"><p data-dcnode-id="632"><a data-dcnode-id="640" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//player.vimeo.com/video/101893668%23_ftnref3" name="_ftn3" title=""><span data-dcnode-id="641" instrument_node="">[3]</span></a><span data-dcnode-id="639" instrument_node=""> "[L]e plus répandu et aussi le plus célèbre des cordophones est le </span><em data-dcnode-id="637"><span data-dcnode-id="638" instrument_node="">kõtin</span></em><span data-dcnode-id="636" instrument_node=""> ou </span><em data-dcnode-id="634"><span data-dcnode-id="635" instrument_node="">kõkin</span></em><span data-dcnode-id="633" instrument_node=""> [..] que ne manque pas de jouer tout jeune homme suffisamment habile" (Thomas 1959:382).</span></p></div><div data-dcnode-id="623" id="ftn4"><p data-dcnode-id="624"><a data-dcnode-id="629" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//player.vimeo.com/video/101893668%23_ftnref4" name="_ftn4" title=""><span data-dcnode-id="630" instrument_node="">[4]</span></a><span data-dcnode-id="628" instrument_node=""> Irvine and Sapir do make note of the esimben (or furaaka), "a guitar-like instrument&nbsp;of the general shape of the Manding </span><em data-dcnode-id="626"><span data-dcnode-id="627" instrument_node="">kora</span></em><span data-dcnode-id="625" instrument_node="">, but with only four strings" (1976:70), as does Charry in a later work (2000). A somewhat dilapidated instrument called "simbing" that I saw in the National Museum of The Gambia in Banjul looks remarkably similar to an akonting, though with considerably more numerous notches on the bridge indicating a relatively large number of strings.</span></p></div><div data-dcnode-id="618" id="ftn5"><p data-dcnode-id="619"><a data-dcnode-id="621" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//player.vimeo.com/video/101893668%23_ftnref5" name="_ftn5" title=""><span data-dcnode-id="622" instrument_node="">[5]</span></a><span data-dcnode-id="620" instrument_node=""> A cessession movement in the southern Casamance region of Senegal has led to sporadic outbreaks of violence for over thirty years. The extent of Jola involvement in the Casamance conflict depends on who is telling the story; see Lambert 1998 for an excellent analysis of competing narratives in this situation.</span></p></div></div><p data-dcnode-id="615"><span data-dcnode-id="616" instrument_node="">&nbsp;</span></p><hr data-dcnode-id="614"><p data-dcnode-id="608"><em data-dcnode-id="609"><span data-dcnode-id="610" style="line-height: 1.53em;"><strong data-dcnode-id="612"><span data-dcnode-id="613" instrument_node="">Scott V. Linford</span></strong><span data-dcnode-id="611" instrument_node=""> is a doctoral candidate in Ethnomusicology at UCLA. His research approaches music as key feature of experiential senses of community, through fieldwork in West Africa, Central America, and the United States. An award-winning filmmaker and banjoist, Scott formerly served as Editor-in-Chief of Ethnomusicology Review and Director of the UCLA Bluegrass and Old Time Ensemble.</span></span></em></p><p data-dcnode-id="606"><span data-dcnode-id="607" instrument_node="">&nbsp;</span></p><span data-dcnode-id="605" instrument_node="">
