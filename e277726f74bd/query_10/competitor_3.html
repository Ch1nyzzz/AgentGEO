</span><div class="paragraph" data-dcnode-id="643" style="display:block;"><strong data-dcnode-id="657"><font data-dcnode-id="658" size="4"><span data-dcnode-id="659" instrument_node="">Lafayette Trail Marker</span></font></strong><br data-dcnode-id="656"><span data-dcnode-id="655" instrument_node="">What an honor to have a new marker in town commemorating Lafayette's stop in Hopkinton Village in 1825 as part of his Farewell Tour! Special thanks to Julien Icher of&nbsp;</span><a data-dcnode-id="653" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//thelafayettetrail.org/"><span data-dcnode-id="654" instrument_node="">The Lafayette Trail</span></a><span data-dcnode-id="652" instrument_node="">&nbsp;and Hopkinton author Dorothea Jensen for organizing the event.</span><br data-dcnode-id="651"><span data-dcnode-id="650" instrument_node="">&nbsp;</span><br data-dcnode-id="649"><span data-dcnode-id="648" instrument_node="">If you'd like to learn more&nbsp;why and how the new Lafayette Trail marker was installed in Hopkinton Village,&nbsp;you can watch this&nbsp;</span><a data-dcnode-id="646" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//vimeo.com/552507227"><span data-dcnode-id="647" instrument_node="">program</span></a><span data-dcnode-id="645" instrument_node="">&nbsp;put together by Dorothea Jensen.</span><br data-dcnode-id="644"></div><span data-dcnode-id="642" instrument_node="">

</span><hr class="styled-hr" data-dcnode-id="637" style="width:70%;"><span data-dcnode-id="636" instrument_node="">
</span><div data-dcnode-id="635" style="height: 20px; overflow: hidden; width: 70%;"></div></div><span data-dcnode-id="633" instrument_node="">
</span><span class="imgPusher" data-dcnode-id="632" style="float:right;height:0px"></span><span data-dcnode-id="628" style="display: table;width:auto;position:relative;float:right;max-width:100%;;clear:right;margin-top:0px;*margin-top:0px"><a data-dcnode-id="630"><img alt="Picture" class="galleryImageBorder wsite-image" data-dcnode-id="631" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.hopkintonhistory.org/uploads/2/6/4/1/26419645/published/pandemic-title-0001.jpg%3F1600357179&amp;raw" style="margin-top: 5px; margin-bottom: 10px; margin-left: 0px; margin-right: 10px; border-width:1px;padding:3px; max-width:100%"></a><span class="wsite-caption" data-dcnode-id="629" style="display: table-caption; caption-side: bottom; font-size: 90%; margin-top: -10px; margin-bottom: 10px; text-align: center;"></span></span><span data-dcnode-id="627" instrument_node="">
</span><div class="paragraph" data-dcnode-id="543" style="display:block;"><strong data-dcnode-id="624"><font data-dcnode-id="625" size="4"><span data-dcnode-id="626" instrument_node="">Pandemic Stories</span></font></strong><br data-dcnode-id="623"><span data-dcnode-id="622" instrument_node="">One hundred years from now, what would you like people to know about the COVID-19 Pandemic of 2020? Hopkinton Historical Society would like to document people’s stories of what they are feeling, seeing, and/or doing during these unprecedented times. How has your daily scheduled changed? What are your fears? How long do you think we will have to physically distance ourselves from each other? How can we help others in our community? What acts of kindness have you seen? Email your pandemic story and photos to </span><a data-dcnode-id="620" href="mailto:director@hopkintonhistory.org"><span data-dcnode-id="621" instrument_node="">director@hopkintonhistory.org</span></a><span data-dcnode-id="619" instrument_node="">.&nbsp;&nbsp;&nbsp;Below is a submission from Lissa Jones.</span><br data-dcnode-id="618"><span data-dcnode-id="617" instrument_node="">&nbsp;</span><br data-dcnode-id="616"><strong data-dcnode-id="613"><font data-dcnode-id="614" size="3"><span data-dcnode-id="615" instrument_node="">Life During Covid-19</span></font></strong><br data-dcnode-id="612"><em data-dcnode-id="610"><span data-dcnode-id="611" instrument_node="">by Lissa Jones</span></em><br data-dcnode-id="609"><span data-dcnode-id="608" instrument_node="">I start my day watching 20 minutes of the news. Who knows what to believe any more, and how much slant there is when it is reported, but I do want to know if we're still supposed to be wearing masks or not, or if we're back to the fear of touching our groceries (and the mail and the bottoms of our shoes) or if we're supposed to be 6 feet apart or 10. Every time I hear, "as we learn more about this virus, we realize we should..." I get either more frightened or more relieved.&nbsp;&nbsp;And when I feel relief (that I don't have to wipe down my milk or take my shoes off or that I can go for a walk with a friend on a windy day), I feel worried that I'm feeling too relieved.&nbsp;&nbsp;Am I letting down my guard?&nbsp;&nbsp;Being irresponsible? Or am I letting fear run my life?</span><br data-dcnode-id="607"><span data-dcnode-id="606" instrument_node="">&nbsp;</span><br data-dcnode-id="605"><span data-dcnode-id="604" instrument_node="">Too. Much. Input.</span><br data-dcnode-id="603"><span data-dcnode-id="602" instrument_node="">&nbsp;</span><br data-dcnode-id="601"><span data-dcnode-id="600" instrument_node="">And then there's the guilt.&nbsp;&nbsp;Watching those poor patients on ventilators, I wonder why MY life circumstances are such that I can sit beside my pool, ride my horses, escape to the lake for a swim and a boat ride while others worry about their health and their finances. Who knew that living in rural New Hampshire was such a good choice?&nbsp;&nbsp;Who knew that all those years of criticism and mocking about my husband working for Comcast would stop when the internet was literally a digital lifeline to everything? Who knew that being unemployed meant less exposure to the virus and less time having to wear a mask?</span><br data-dcnode-id="599"><span data-dcnode-id="598" instrument_node="">&nbsp;</span><br data-dcnode-id="597"><span data-dcnode-id="596" instrument_node="">I judge everyone who doesn't wear a mask in public. I judge the media for creating a frenzy. Or not. There is so much reason for doubt that even educated, caring people just don't know what to believe any more.&nbsp;&nbsp;I judge myself for giving up on trying to see the ultra-conservative point of view. I no longer follow anyone on Facebook who says that wearing a mask is taking away our freedom.</span><br data-dcnode-id="595"><span data-dcnode-id="594" instrument_node="">&nbsp;</span><br data-dcnode-id="593"><span data-dcnode-id="592" instrument_node="">It is in my nature to be a volunteer, but my skills are not what are needed right now.&nbsp;&nbsp;I don't sew and I don't have a medical degree. The only thing I can do is be a good listener as friends, family and neighbors vent about how all this has affected them. And how we all feel similarly: uncertain, guilty, fearful, lucky, judgmental, imprisoned.</span><br data-dcnode-id="591"><span data-dcnode-id="590" instrument_node="">&nbsp;</span><br data-dcnode-id="589"><span data-dcnode-id="588" instrument_node="">Sure, there are plenty of places that want donations. And my family is financially stable... for now.&nbsp;&nbsp;But just like the hoarding of toilet paper over the last few months: This pandemic could hit my family, too. I wouldn't even know where to give which would make an impact.</span><br data-dcnode-id="587"><span data-dcnode-id="586" instrument_node="">&nbsp;</span><br data-dcnode-id="585"><span data-dcnode-id="584" instrument_node="">I have read a couple novels about the Holocaust. I visited Dachau last year. What the Jews endured was so much worse than this pandemic. So. Much. More. Indescribable atrocities that must've seemed interminable. I just short-circuit when I think about it. And here we are, a society that has the choice to stop this thing, simply by staying home, missing a graduation, a wedding, a game. Staying out of bars and gyms and restaurants. And wearing a mask.&nbsp;&nbsp;We must be patient, for sure, but there is almost definitely an end in sight within a year or two. The Jews had no idea what they were in for and for how long. They were not given a choice.&nbsp;&nbsp;We DO!</span><br data-dcnode-id="583"><span data-dcnode-id="582" instrument_node="">&nbsp;</span><br data-dcnode-id="581"><span data-dcnode-id="580" instrument_node="">And yet... I get it. If you own a restaurant, or work at a big arena or airline or tattoo parlor, you need to make money.&nbsp;&nbsp;You could lose everything.</span><br data-dcnode-id="579"><span data-dcnode-id="578" instrument_node="">&nbsp;</span><br data-dcnode-id="577"><span data-dcnode-id="576" instrument_node="">For me, I think it boils down to too much time to think.&nbsp;&nbsp;My kids (ages 22 and 24) are home until they can afford to move out.&nbsp;&nbsp;They both want to launch... soooooo badly! But meanwhile they feel stuck, stuck with US.&nbsp;&nbsp;And I feel THEIR anger and frustration and loneliness and boredom.</span><br data-dcnode-id="575"><span data-dcnode-id="574" instrument_node="">&nbsp;</span><br data-dcnode-id="573"><span data-dcnode-id="572" instrument_node="">On days when I am busy, I feel everything less.&nbsp;&nbsp;I'm distracted by errands and chatting with friends. Walking for a few miles dissipates the pent-up negative energy.&nbsp;&nbsp;But there are many, many hours when I just stew and fret.</span><br data-dcnode-id="571"><span data-dcnode-id="570" instrument_node="">&nbsp;</span><br data-dcnode-id="569"><span data-dcnode-id="568" instrument_node="">Finally, I worry about my own courage should this virus hit me or someone I love. I am positively phobic about breathing issues.&nbsp;&nbsp;I don't know how I'll be if a family member gets the terrible cough and can't catch their breath or has to go on a ventilator. It terrifies me, and yet as a mother I have to be strong and give my kids hope.</span><br data-dcnode-id="567"><span data-dcnode-id="566" instrument_node="">&nbsp;</span><br data-dcnode-id="565"><span data-dcnode-id="564" instrument_node="">I check the banner running across the bottom of our local news every day.&nbsp;&nbsp;I check the numbers of cases in Hopkinton. And Henniker. And Warner. And Concord.&nbsp;&nbsp;Places where I go grocery shopping and get my hair cut and get my car fixed. Our numbers are low, probably because we're a pretty rural part of the world. There are plenty of people who refuse to wear a mask, but I just do my best to wear mine and wash my hands.&nbsp;</span><br data-dcnode-id="563"><span data-dcnode-id="562" instrument_node="">&nbsp;</span><br data-dcnode-id="561"><span data-dcnode-id="560" instrument_node="">I haven't hugged my parents, who live down the road and have lived in Hopkinton for over 50 years.&nbsp;&nbsp;However, we see each other frequently because we've decided to be part of their "bubble". I know our choices influence them and vice versa, but this is hard on them and for either of us to be extreme in our perception of this virus or how we behave during it could hurt our relationship.&nbsp;</span><br data-dcnode-id="559"><span data-dcnode-id="558" instrument_node="">&nbsp;</span><br data-dcnode-id="557"><span data-dcnode-id="556" instrument_node="">So, as we endure this pandemic, I've chosen a "low risk" lifestyle rather than "no risk".&nbsp;&nbsp;I will get my hair cut, I will go out to dinner (occasionally. And sitting outside), I will ride in a car with certain friends. I will allow my kids to see their friends, after promising me to be careful.</span><br data-dcnode-id="555"><span data-dcnode-id="554" instrument_node="">&nbsp;</span><br data-dcnode-id="553"><span data-dcnode-id="552" instrument_node="">To me, this pandemic is mostly inconvenient and surreal.&nbsp;&nbsp;I'm not suffering.&nbsp;&nbsp;I live with people. I am outdoorsy, so I can exercise and entertain myself. We don't worry about money. I have faith in scientists, even if I have absolutely, positively no faith in politicians. Covid-19 is present, but not near me.</span><br data-dcnode-id="551"><span data-dcnode-id="550" instrument_node="">&nbsp;</span><br data-dcnode-id="549"><span data-dcnode-id="548" instrument_node="">That said, I can't wait for it to be over so that "maskers" won't judge "non-maskers".&nbsp;&nbsp;So that we can travel to far-away places again. So my kids can move out safely. So I don't have to take out my hand-sanitizer when I feel like splurging on a coffee and a donut.</span><br data-dcnode-id="547"><span data-dcnode-id="546" instrument_node="">&nbsp;</span><br data-dcnode-id="545"><span data-dcnode-id="544" instrument_node="">This, too, shall pass.&nbsp;&nbsp;Hopefully, sooner than later.</span></div><span data-dcnode-id="542" instrument_node="">
</span><hr data-dcnode-id="541" style="width:100%;clear:both;visibility:hidden;"><span data-dcnode-id="540" instrument_node="">

</span><div class="paragraph" data-dcnode-id="496"><font data-dcnode-id="516" size="4"><strong data-dcnode-id="520"><span data-dcnode-id="521" instrument_node="">Hopkinton Historical Society Releases “ALL…ABOARD!”</span></strong><br data-dcnode-id="519"><strong data-dcnode-id="517"><span data-dcnode-id="518" instrument_node="">Driving Tour of Railroad Points of Interest in Hopkinton, N.H.</span></strong></font><br data-dcnode-id="515"><span data-dcnode-id="514" instrument_node="">&nbsp;&nbsp; &nbsp; &nbsp;Looking for something to do from the comfort of your car or couch?&nbsp; Want to learn more about the impact the railroad had on the town of Hopkinton?&nbsp; If so, please take a look at Hopkinton Historical Society’s “ALL…ABOARD!”, a driving tour of railroad points of interest in Hopkinton, N.H.</span><br data-dcnode-id="513"><span data-dcnode-id="512" instrument_node="">&nbsp; &nbsp; &nbsp; In March 2020, Hopkinton Historical Society was in the middle of planning its summer exhibit, as part of a 16-member collaboration (MUseums Sharing Experiences, or MUSE) that had organized eight exhibits and more than 30 programs on the economic, social, and environmental impact of the railroad in New Hampshire.&nbsp; When the pandemic forced the closing of the Society, we knew we still wanted to move forward somehow with our summer exhibit.&nbsp; Given the continued uncertainty regarding opening dates and people’s comfort levels with gathering in groups indoors, we decided the best approach was to take our exhibit on the road!&nbsp; Specifically, to put together a driving tour that can be viewed or downloaded from our website,&nbsp;or followed on </span><a data-dcnode-id="510" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.theclio.com/tour/1386" target="_blank"><span data-dcnode-id="511" instrument_node="">Clio</span></a><span data-dcnode-id="509" instrument_node="">, a downloadable app that allows you to view driving tours of historical and cultural sites.&nbsp; Clio can be accessed via its website or on a mobile device.</span><br data-dcnode-id="508"><span data-dcnode-id="507" instrument_node="">&nbsp; &nbsp; &nbsp;&nbsp;The tour includes seven stops in Hopkinton and Contoocook.&nbsp; In addition to physical landmarks, the tour examines how the railroad expanded markets for farmers, increased tourism, expanded mobility for rural communities, and impacted mills and factories along the Contoocook River.&nbsp; However, not all of the changes brought about by the railroad were positive.&nbsp; Information about immigrant laborers, those displaced from their homes along the river, and the townspeople and other investors who purchased bonds that paid for the railroad is also included in the driving tour.</span><br data-dcnode-id="506"><span data-dcnode-id="505" instrument_node="">&nbsp; &nbsp; &nbsp; We&nbsp;hope you enjoy the driving tour.&nbsp; If you have images or stories you would like to share, please contact us at 603-746-3825, </span><a data-dcnode-id="503" href="mailto:nhas@tds.net"><span data-dcnode-id="504" instrument_node="">nhas@tds.net</span></a><span data-dcnode-id="502" instrument_node="">, or </span><a data-dcnode-id="500" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.hopkintonhistory.org/" target="_blank"><span data-dcnode-id="501" instrument_node="">www.HopkintonHistory.org</span></a><span data-dcnode-id="499" instrument_node="">.</span><br data-dcnode-id="498"><span data-dcnode-id="497" instrument_node="">&nbsp; &nbsp; &nbsp; This project was made possible with support from New Hampshire Humanities, in partnership with the National Endowment for the Humanities.</span></div><span data-dcnode-id="495" instrument_node="">

</span><span class="imgPusher" data-dcnode-id="487" style="float:right;height:0px"></span><span data-dcnode-id="483" style="display: table;width:auto;position:relative;float:right;max-width:100%;;clear:right;margin-top:0px;*margin-top:0px"><a data-dcnode-id="485"><img alt="Picture" class="galleryImageBorder wsite-image" data-dcnode-id="486" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.hopkintonhistory.org/uploads/2/6/4/1/26419645/published/flyer-for-fb.jpg%3F1590503892&amp;raw" style="margin-top: 5px; margin-bottom: 10px; margin-left: 0px; margin-right: 10px; border-width:1px;padding:3px; max-width:100%"></a><span class="wsite-caption" data-dcnode-id="484" style="display: table-caption; caption-side: bottom; font-size: 90%; margin-top: -10px; margin-bottom: 10px; text-align: center;"></span></span><span data-dcnode-id="482" instrument_node="">
</span><div class="paragraph" data-dcnode-id="453" style="display:block;"><font data-dcnode-id="467" size="4"><span data-dcnode-id="476" style="color:#111111"><span data-dcnode-id="477"><span data-dcnode-id="478"><span data-dcnode-id="479"><strong data-dcnode-id="480"><span data-dcnode-id="481" instrument_node="">Hopkinton Historical Society </span></strong></span></span></span></span><br data-dcnode-id="475"><span data-dcnode-id="468" style="color:#111111"><span data-dcnode-id="469"><span data-dcnode-id="470"><span data-dcnode-id="471"><strong data-dcnode-id="473"><span data-dcnode-id="474" instrument_node="">Receives National History Award</span></strong><span data-dcnode-id="472" instrument_node="">&nbsp;</span></span></span></span></span></font><br data-dcnode-id="466"><span data-dcnode-id="462" style="color:#111111"><span data-dcnode-id="463"><span data-dcnode-id="464"><span data-dcnode-id="465" instrument_node="">&nbsp; &nbsp;&nbsp; &nbsp; The American Association for State and Local History (AASLH) proudly announces that the Hopkinton Historical Society is the recipient of an Award of Excellence for the 2019 Putney Hill Cemetery Walk. The AASLH Leadership in History Awards, now in its 75th year, is the most prestigious recognition for achievement in the preservation and interpretation of state and local history.&nbsp;</span></span></span></span><br data-dcnode-id="461"><span data-dcnode-id="455" style="color:#111111"><span data-dcnode-id="456"><span data-dcnode-id="457"><span data-dcnode-id="460" instrument_node="">&nbsp;&nbsp; &nbsp; &nbsp; Performed in October 2019, the Putney Hill Cemetery Walk is a theatrical production designed to entertain and educate attendees about people buried in, or excluded from, the town’s earliest cemetery. Written by Lynn Clark, the script deconstructs the traditional narratives of conflict, racism and misogyny and instead constructs an inclusive, multi-vocal narrative of Hopkinton past and present. Volunteers carried out extensive research, and under the direction of Beth Spaulding, local actors vividly brought to life 26 of Hopkinton’s former residents. Audience members were appreciative of the historical context and multiple perspectives about issues that people are grappling with today, noting that issues from 250 years ago, such as religious freedom, voting rights, settler colonialism, racism and women’s rights, have their parallels today. The Putney Hill Cemetery Walk is the seventh Cemetery Walk produced by the Hopkinton Historical Society. DVD copies are available at the Society.&nbsp;</span><br data-dcnode-id="459"><span data-dcnode-id="458" instrument_node="">&nbsp; &nbsp;&nbsp; &nbsp; This year, AASLH is proud to confer fifty-seven national awards honoring people, projects, exhibits, and publications. The winners represent the best in the field and provide leadership for the future of state and local history. </span></span></span></span><br data-dcnode-id="454"></div><span data-dcnode-id="452" instrument_node="">

</span><div data-dcnode-id="445" style="height: 20px; overflow: hidden; width: 70%;"></div></div><span data-dcnode-id="443" instrument_node="">
</span><span class="imgPusher" data-dcnode-id="442" style="float:right;height:6px"></span><span data-dcnode-id="438" style="display: table;width:auto;position:relative;float:right;max-width:100%;;clear:right;margin-top:20px;*margin-top:40px"><a data-dcnode-id="440"><img alt="Picture" class="galleryImageBorder wsite-image" data-dcnode-id="441" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.hopkintonhistory.org/uploads/2/6/4/1/26419645/editor/hopkinton-high-graduation-2020-8x10-dji-0268-002.jpg%3F1593111598&amp;raw" style="margin-top: 5px; margin-bottom: 10px; margin-left: 0px; margin-right: 20px; border-width:1px;padding:3px; max-width:100%"></a><span class="wsite-caption" data-dcnode-id="439" style="display: table-caption; caption-side: bottom; font-size: 90%; margin-top: -10px; margin-bottom: 10px; text-align: center;"></span></span><span data-dcnode-id="437" instrument_node="">
</span><div class="paragraph" data-dcnode-id="418" style="display:block;"><font data-dcnode-id="434" size="4"><strong data-dcnode-id="435"><span data-dcnode-id="436" instrument_node="">Pandemic Stories</span></strong></font><br data-dcnode-id="433"><span data-dcnode-id="432" instrument_node="">One hundred years from now, what would you like people to know about the COVID-19 Pandemic of 2020? Hopkinton Historical Society would like to document people’s stories of what they are feeling, seeing, and/or doing during these unprecedented times. How has your daily scheduled changed? What are your fears? How long do you think we will have to physically distance ourselves from each other? How can we help others in our community? What acts of kindness have you seen?</span><br data-dcnode-id="431"><br data-dcnode-id="430"><span data-dcnode-id="429" instrument_node="">Please share your stories and photos by at </span><a data-dcnode-id="427" href="mailto:nhas@tds.net"><span data-dcnode-id="428" instrument_node="">nhas@tds.net</span></a><span data-dcnode-id="426" instrument_node="">.</span><br data-dcnode-id="425"><br data-dcnode-id="424"><em data-dcnode-id="419" style="color:rgb(204, 216, 223)"><span data-dcnode-id="420"><span data-dcnode-id="421"><span data-dcnode-id="422" style="color:rgb(17, 17, 17)"><span data-dcnode-id="423" instrument_node="">Image of Hopkinton High School graduation on June 13, 2020 taken by Bob LaPree.</span></span></span></span></em></div><span data-dcnode-id="417" instrument_node="">
</span><hr data-dcnode-id="416" style="width:100%;clear:both;visibility:hidden;"><span data-dcnode-id="415" instrument_node="">
</span><div data-dcnode-id="409"><div data-dcnode-id="414" style="height: 20px; overflow: hidden; width: 70%;"></div><span data-dcnode-id="413" instrument_node="">
</span><hr class="styled-hr" data-dcnode-id="412" style="width:70%;"><span data-dcnode-id="411" instrument_node="">
</span><div data-dcnode-id="410" style="height: 20px; overflow: hidden; width: 70%;"></div></div><span data-dcnode-id="408" instrument_node="">
</span><span class="imgPusher" data-dcnode-id="407" style="float:right;height:0px"></span><span data-dcnode-id="403" style="display: table;width:auto;position:relative;float:right;max-width:100%;;clear:right;margin-top:0px;*margin-top:0px"><a data-dcnode-id="405"><img alt="Picture" class="galleryImageBorder wsite-image" data-dcnode-id="406" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.hopkintonhistory.org/uploads/2/6/4/1/26419645/a-sign-from-niaux-cave-by-ruth-chevion_orig.jpg&amp;raw" style="margin-top: 5px; margin-bottom: 10px; margin-left: 0px; margin-right: 10px; border-width:1px;padding:3px; max-width:100%"></a><span class="wsite-caption" data-dcnode-id="404" style="display: table-caption; caption-side: bottom; font-size: 90%; margin-top: -10px; margin-bottom: 10px; text-align: center;"></span></span><span data-dcnode-id="402" instrument_node="">
</span><div class="paragraph" data-dcnode-id="338" style="display:block;"><font data-dcnode-id="396" size="3"><strong data-dcnode-id="397"><span data-dcnode-id="398" style="color:rgb(29, 33, 41)"><span data-dcnode-id="401" instrument_node="">Pandemic Story:</span><br data-dcnode-id="400"><span data-dcnode-id="399" instrument_node="">Covid-19 was for Me the Best of Times and the Worst of Times</span></span></strong></font><br data-dcnode-id="395"><em data-dcnode-id="387"><span data-dcnode-id="391" style="color:rgb(29, 33, 41)"><font data-dcnode-id="393" size="3"><span data-dcnode-id="394" instrument_node="">b</span></font><span data-dcnode-id="392" instrument_node="">y Ruth Chevion</span></span><br data-dcnode-id="390"><span data-dcnode-id="388" style="color:rgb(29, 33, 41)"><span data-dcnode-id="389" instrument_node="">Image: "A Sign from Niaux Cave," painted by Ruth Chevion</span></span></em><br data-dcnode-id="386"><br data-dcnode-id="385"><span data-dcnode-id="384" instrument_node="">I was deeply saddened that so many people got sick and died. I was horrified at the early anger against our local Chinese restaurant owners. I was pained that our country is so divided we could not unite against a common enemy, an epidemic. At first it seemed as though we would unite, but with poor leadership from the president, it broke down. I was horrified to learn that a majority of Americans live from hand to mouth, that they did not have $400 in the bank to tide them over, that they were going hungry. I was looking under the hood of a broken engine.</span><br data-dcnode-id="383"><br data-dcnode-id="382"><span data-dcnode-id="381" instrument_node="">By contrast, for me as an individual at home, it was in many ways a good time. Everything slowed down. I felt like I was having the first rest of my life. For whole days I didn’t do anything. I realized I didn’t have to wear a bra all the time. And I didn’t have to keep the house as tidy because nobody dropped in. I loved the quiet and the singing of the happy birds in my yard. I had long walks. I did a lot of yard work that yielded an exceptional crop of flowers.</span><br data-dcnode-id="380"><br data-dcnode-id="379"><span data-dcnode-id="378" instrument_node="">My only visitor was Alan Scribner, my long-time partner, and I didn’t visit anyone else’s house except his. Our relationship deepened as we looked more to each other for entertainment, and conversation, especially about Covid and what was going on. We went swimming almost every day. We watched movies.</span><br data-dcnode-id="377"><br data-dcnode-id="376"><span data-dcnode-id="375" instrument_node="">I was 74 years old when Covid hit. While being old made me more susceptible to the disease, there were financial benefits to being old. Unlike the young people being sent home from low paying jobs, I am retired. I have savings, and I collect social security. I’m saying this to emphasize that something has to be done for our young people. The current situation is unacceptable. Even education doesn’t always help them as they graduate with debt, and meaningful jobs are hard to find. This came to light as never before during Covid.</span><br data-dcnode-id="374"><br data-dcnode-id="373"><span data-dcnode-id="372" instrument_node="">Being old also brought generous friends to my aid. I did not go out at all in the beginning so getting food was a problem. I had beans in the pantry, but I craved fresh food. One dear friend shopped for me when she went to Market Basket, and another ordered stuff for me from a delivery service. My dear neighbor has chickens, and kept me supplied with fresh eggs. Then later, when I was less fearful, I availed myself of Market Basket’s elderly shopping hours from 6-7 in the morning. They did a great job of making it feel safe.</span><br data-dcnode-id="371"><br data-dcnode-id="370"><span data-dcnode-id="369" instrument_node="">Before Covid, I had been running an art gallery in the Bates building in Contoocook. When it started I had a beautiful show with Jeff Schapira’s photography and Lisa Sheiman’s fiber sculpture. Covid put an end to that, and I was home for the duration.</span><br data-dcnode-id="368"><br data-dcnode-id="367"><span data-dcnode-id="366" instrument_node="">At home, I cooked a lot. I’m not sure why I was cooking so much more than usual, but it turned out that the same was true for a lot of people. I cooked beans and lentils, and other stuff I could keep in the freezer in case this was a long haul. Also I needed to keep the shopping lists short. I started baking “Life Changing Crackers” for the friends who helped me, just to have a concrete way of expressing my gratitude.</span><br data-dcnode-id="365"><br data-dcnode-id="364"><span data-dcnode-id="363" instrument_node="">I loved being frugal again. I realized I could use a lot less toilet paper and also paper towels. I used cloth napkins, and re-used coffee filters. I ate less. I cut my coffee in half. I was able to donate toilet paper for others. It made me see how much I was influenced by TV to buy and use more than I needed.</span><br data-dcnode-id="362"><br data-dcnode-id="361"><span data-dcnode-id="360" instrument_node="">It was beautiful how many people reached out to me with calls and texts. And I did the same to others. People I had not had contact with in years called to find out if I was OK. There was a lot of warmth in the beginning of Covid, a lot of reconnecting and caring.</span><br data-dcnode-id="359"><br data-dcnode-id="358"><span data-dcnode-id="357" instrument_node="">After the initial do-nothing stage, I started researching cave paintings of the Dordogne region of France, and doing paintings inspired by the masterpieces of the Lascaux and Niaux caves. Covid made me need to understand homo sapiens, my species. I felt the need to know what is basic to us, to roll back my mind set from advertising and modern amenities. Who are we? What matters? Where did we come from?</span><br data-dcnode-id="356"><br data-dcnode-id="355"><span data-dcnode-id="354" instrument_node="">My biggest takeaway from this study is that everyone, every person living on the planet, is the same species. It made me think that the term race is overused. Black, white, red, yellow, pygmy, curly hair, straight hair, no hair, whatever, we all came out of Africa at the same time, about 40,000 years ago, migrated though the middle east, and conquered all the other human species we encountered. We are all the same. We are the only humans left. We are all one species.</span><br data-dcnode-id="353"><br data-dcnode-id="352"><span data-dcnode-id="351" instrument_node="">Then, on top of Covid, I shared with my fellow Americans, the horror of watching George Floyd, a big tall black man, be shamelessly, purposely and coldly murdered before my very eyes on TV by a white male uniformed representative of the government who forced him to the ground and pressed a knee into his neck until he was dead. Horror is too weak of a word. I began to think and talk with other people about blackness in America, and what we can do about it. I was thinking at least some of it could be solved with a $15/hour minimum wage, as race crosses issues of class. Plus, I still feel strongly that America should pay reparations to people with slavery in their family history. It’s the right thing to do.</span><br data-dcnode-id="350"><br data-dcnode-id="349"><span data-dcnode-id="348" instrument_node="">But of course later events, more killings shown on TV, proved to me that all black people live with some level of fear and injustice, that the murder of George Floyd was far from unique, and that the issues his murder brought to light cannot be solved with economics alone. Attitudes must change. The woman in Central Park who felt free to call the police because a black birdwatcher asked her to leash her dog was instructive to me.</span><br data-dcnode-id="347"><br data-dcnode-id="346"><span data-dcnode-id="345" instrument_node="">Lately, in the quiet isolation time of Covid I think a lot about my mother who died two years ago. I am feeling grief in a way I had avoided earlier just by being out and about and busy. My mother being a news hound, we would have had great conversations about all of it. Plus, she would have been on my short list of people I wouldn’t wear a mask with. I have started cooking her recipes, especially as she was an expert on beans. It has gotten to the point that I want to write down her recipes. So that is what I’m doing now. I’m writing about how my mother cooked. Perfect for Covid time.</span><br data-dcnode-id="344"><br data-dcnode-id="343"><span data-dcnode-id="342" instrument_node="">I would say we are in mid-covid at the time of this writing on July 13, 2020. How the rest will go will depend on many things. We’ll see.</span><br data-dcnode-id="341"><br data-dcnode-id="340"><span data-dcnode-id="339" instrument_node="">Thanks to the Hopkinton Historical Society for asking what we are doing, and for collecting information about this strange moment in our history.</span></div><span data-dcnode-id="337" instrument_node="">
</span><hr data-dcnode-id="336" style="width:100%;clear:both;visibility:hidden;"><span data-dcnode-id="335" instrument_node="">
</span><div data-dcnode-id="329"><div data-dcnode-id="334" style="height: 20px; overflow: hidden; width: 70%;"></div><span data-dcnode-id="333" instrument_node="">
</span><hr class="styled-hr" data-dcnode-id="332" style="width:70%;"><span data-dcnode-id="331" instrument_node="">
</span><div data-dcnode-id="330" style="height: 20px; overflow: hidden; width: 70%;"></div></div><span data-dcnode-id="328" instrument_node="">
</span><div class="paragraph" data-dcnode-id="321"><em data-dcnode-id="326"><span data-dcnode-id="327" instrument_node="">“Very seldom have we seen our village so quiet for many days and weeks. Little is being done but care for the sick and gather crops.”&nbsp; Kearsarge Independent &amp; Times, October 11, 1918</span></em><br data-dcnode-id="325"><font data-dcnode-id="322" size="5"><strong data-dcnode-id="323"><span data-dcnode-id="324" instrument_node="">1918 Influenza Pandemic in Hopkinton, NH</span></strong></font></div><span data-dcnode-id="320" instrument_node="">
</span><div data-dcnode-id="310"><div class="wsite-image wsite-image-border-none" data-dcnode-id="311" style="padding-top:10px;padding-bottom:10px;margin-left:0;margin-right:0;text-align:right"><span data-dcnode-id="319" instrument_node="">
</span><a data-dcnode-id="315"><span data-dcnode-id="318" instrument_node="">
</span><img alt="Picture" data-dcnode-id="317" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.hopkintonhistory.org/uploads/2/6/4/1/26419645/etta-0001_orig.jpg&amp;raw" style="width:auto;max-width:100%"><span data-dcnode-id="316" instrument_node="">
</span></a><span data-dcnode-id="314" instrument_node="">
</span><div data-dcnode-id="313" style="display:block;font-size:90%"></div><span data-dcnode-id="312" instrument_node="">
</span></div></div><span data-dcnode-id="309" instrument_node="">
</span><div class="paragraph" data-dcnode-id="198" style="text-align:left;"><em data-dcnode-id="305"><span data-dcnode-id="308" instrument_node="">Photograph of Etta Lucy Bohanan Nelson and her daughter Margery.&nbsp; Etta was one of 13 victims of the influenza pandemic in Hopkinton.&nbsp; She died&nbsp; October 18, 1918</span><em data-dcnode-id="306"><span data-dcnode-id="307" instrument_node="">.</span></em></em><br data-dcnode-id="304"><br data-dcnode-id="303"><span data-dcnode-id="302" instrument_node="">&nbsp;&nbsp;&nbsp;&nbsp;&nbsp; The 1918 influenza pandemic was unlike any other. Originally known as the Spanish flu, it is now thought to have originated in the United States. Starting as any other flu virus, it mutated into a highly virulent “super-virus” that targeted young adults in their prime and spread easily especially in crowded quarters such as military training camps, college dormitories, schools, and social gatherings. Once contracted, it progressed quickly and violently, causing extremely intense head and body aches, internal bleeding, changes in skin coloration, and rapid deterioration of the lungs; within four to seven days, the victim could be dead or on a slow path to recovery. Globally, it is estimated this pandemic caused 20 to 50 million deaths; a large percentage of these were young adults in their twenties and thirties. Present in 1917, the pandemic reached its peak of destruction in the United States from mid-September to early December, 1918.</span><br data-dcnode-id="301"><span data-dcnode-id="300" instrument_node="">&nbsp;&nbsp;&nbsp;&nbsp; Like many towns, Hopkinton folks did not immediately recognize the seriousness of the pandemic. The first death in town was George Conant, a bright and popular recent high school graduate. His body was returned to Contoocook for his funeral one week after departing for Dartmouth College, having died on September 22, 1918. In fact, even his family members assumed his illness occurred as the result of sleeping on a rain-soaked mattress, not the pandemic influenza. It took another week for people to take precautions; in the meantime, the Hopkinton Fair, with some 4,000 attendees, did not seem to be affected. By the end of the first week of October, the local newspaper reported “there are 70 cases of influenza in town, and many of them very severe, but at this writing, none have proved fatal. How thankful we are for our capable physicians.” In reality, four Hopkinton deaths had occurred by October 6th and five more would occur in October. The drug store advertised Sunday hours, 8-10 am and 12-1 pm, beginning after October 1st. Hopkinton schools were closed week by week for the month of October, with hope in each announcement that reopening would be possible the following week. Meetings of the Grange and Rebekahs were cancelled. As stated in the </span><em data-dcnode-id="298"><span data-dcnode-id="299" instrument_node="">Kearsarge Independent and Times</span></em><span data-dcnode-id="297" instrument_node=""> newspaper on October 11th, “Very seldom have we seen our village so quiet for many days and weeks. Little is being done but care for the sick and gather crops.”</span><br data-dcnode-id="296"><span data-dcnode-id="295" instrument_node="">&nbsp;&nbsp;&nbsp;&nbsp; By November 1st, schools had reopened and there was a sense of relief that the worst had passed. With the end of WWI, the spirits of all were high. A peace rally occurred in mid-November and the whole town enthusiastically participated, with bells and whistles early in the morning, celebrations all day long, and a huge parade and Kaiser effigy burning in the evening. Still there were more deaths from influenza, one in early November, one in December, and two at the beginning of January, including the death of the high school principal, Wesley Eastman.</span><br data-dcnode-id="294"><span data-dcnode-id="293" instrument_node="">&nbsp;&nbsp;&nbsp;&nbsp; The profile of the pandemic in Hopkinton mirrored that of the United States as a whole. The majority of deaths had occurred in late September through early November (10 of 13) and had taken adults ages 35 and under (10 of 13). The care of those who were ill, however, differed from that of many towns and cities. Even in Concord, hospitalization and congregate care were common, but in Hopkinton, doctors and local caregivers went to the patients’ homes. This likely may have prevented a larger number of deaths in Hopkinton.</span><br data-dcnode-id="292"><span data-dcnode-id="291" instrument_node="">&nbsp;&nbsp;&nbsp;&nbsp; As a result of the 1918 influenza pandemic and new requirements of the State Board of Education, Hopkinton schools made several changes to promote good health:</span><br data-dcnode-id="290"><br data-dcnode-id="289"><ul data-dcnode-id="276"><li data-dcnode-id="287"><span data-dcnode-id="288" instrument_node="">Soap, towels and washing facilities were provided; teachers were instructed to see that pupils kept clean. “Medical inspection” was recognized as a need.</span></li><li data-dcnode-id="285"><span data-dcnode-id="286" instrument_node="">Toilet facilities were improved. Chemical toilets were put in place at the Hopkinton village school and it was recommended by the Superintendent that one district school each year be equipped with “chemical closets.” Toilet facilities at the high school were eventually made more sanitary after severe criticism during state inspection. Yet the need of “more modern equipment and fixtures” was still noted in the Superintendent’s report of 1922.</span></li><li data-dcnode-id="283"><span data-dcnode-id="284" instrument_node="">School rooms were to be cleaned at least twice a year.</span></li><li data-dcnode-id="281"><span data-dcnode-id="282" instrument_node="">Improvement in ventilation (other than just opening the windows) was noted as a need in schools not yet equipped “with boxed stove and accompanying ventilation.”</span></li><li data-dcnode-id="279"><span data-dcnode-id="280" instrument_node="">Physical training and/or organized outdoor play was required.</span></li><li data-dcnode-id="277"><span data-dcnode-id="278" instrument_node="">A school nurse was recommended by the Superintendent in his 1920 report to the town. While this was not acted upon, a warrant article was put forth in the town budget, “To see what sum of money the town will vote to raise for the employment of a district nurse and appropriate the same.” The appropriation approved was $200 in 1920, $500 in 1921, and $1000 starting in 1922, to be paid to the Health Nurse Association.</span></li></ul><span data-dcnode-id="275" instrument_node=""> &nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp; Hopkinton town reports list the following residents to have died as a result of the 1918 influenza pandemic. More information about each person and his/her family is available at the Hopkinton Historical Society.</span><br data-dcnode-id="274"><span data-dcnode-id="273" instrument_node="">&nbsp;</span><br data-dcnode-id="272"><strong data-dcnode-id="270"><span data-dcnode-id="271" instrument_node="">George Elmer Conant</span></strong><span data-dcnode-id="269" instrument_node="">, age 17, September 22, 1918: “One of the most promising and popular young men in town” and having been accepted at Dartmouth College, he left home on Tuesday for Hanover, took sick Thursday, was hospitalized Friday, died Sunday, and was honored with a funeral of very large attendance on the following Tuesday.</span><br data-dcnode-id="268"><br data-dcnode-id="267"><strong data-dcnode-id="265"><span data-dcnode-id="266" instrument_node="">George William Marsh</span></strong><span data-dcnode-id="264" instrument_node="">, age 63, September 27, 1918: Having labored at many jobs throughout his life, George and his equally hard-working wife Ella had finally gained financial stability and home ownership with a mortgage which was lost upon his death; Ella at age 67 became a live-in servant to an older man.</span><br data-dcnode-id="263"><br data-dcnode-id="262"><strong data-dcnode-id="260"><span data-dcnode-id="261" instrument_node="">Clarence Lorenzo Tilton</span></strong><span data-dcnode-id="259" instrument_node="">, age 28, October 3, 1918: A recently divorced father with day-to-day responsibility for two young children, Clarence, a resident of Webster, was being cared for in Contoocook when he died.</span><br data-dcnode-id="258"><br data-dcnode-id="257"><strong data-dcnode-id="255"><span data-dcnode-id="256" instrument_node="">Birge Lester Fenton</span></strong><span data-dcnode-id="254" instrument_node="">, age 29, October 6, 1918: Unmarried and a fireman for the B &amp; M Railroad in Concord, Birge was active in the Order of United American Mechanics, the Brotherhood of Locomotive Firemen and Enginemen, and the Loyal Order of the Moose, each represented at his funeral.</span><br data-dcnode-id="253"><br data-dcnode-id="252"><strong data-dcnode-id="250"><span data-dcnode-id="251" instrument_node="">Mildred Lillian Jordan White</span></strong><span data-dcnode-id="249" instrument_node="">, age 20, October 8, 1918: Mildred died while trying to care for her three little children, ages 4, almost 3, and 10 months, her husband being out with a lumber crew in the Hatfield area. Mildred had been caring for another young woman with influenza who also died, as did Mildred’s two youngest.</span><br data-dcnode-id="248"><br data-dcnode-id="247"><strong data-dcnode-id="245"><span data-dcnode-id="246" instrument_node="">Howard Adams</span></strong><span data-dcnode-id="244" instrument_node="">, age 23, October 13, 1918: Howard lived with his mother and step-father, Laura and Frank Fifield, in Contoocook, worked in the local silk and saw mills, and was a member of the Free Baptist Church. He was a person of fragile health, exempted from the draft due to “ill health.” The Kearsarge Independent &amp; Times newspaper reported him to be very sick with influenza for over a week and being cared for by Mrs. J. A. Sherwan, evidently one of a number of caregivers who attended very ill townspeople in their homes.</span><br data-dcnode-id="243"><br data-dcnode-id="242"><strong data-dcnode-id="240"><span data-dcnode-id="241" instrument_node="">Jane Magnan</span></strong><span data-dcnode-id="239" instrument_node="">, age 86, October 15, 1918: The oldest pandemic victim in Hopkinton, Jane appears to have had a full life with a long first marriage and two more marriages later in life; her controversial will left her property to her third very young husband and to a very long-time boarder.</span><br data-dcnode-id="238"><br data-dcnode-id="237"><strong data-dcnode-id="235"><span data-dcnode-id="236" instrument_node="">Herman Scott Spoffard</span></strong><span data-dcnode-id="234" instrument_node="">, age 35, October 15, 1918: Born and raised on a farm in Hopkinton, Herman became a miller of grain, saved his money, and bought a milk route in Concord. In support of the Great War, he put many extra hours into crop production while continuing milk production and also purchased war bonds being quoted in his obituary, “Certainly, I can at least do that much.” He may have been only the second of these Hopkinton thirteen who died in a hospital.</span><br data-dcnode-id="233"><br data-dcnode-id="232"><strong data-dcnode-id="230"><span data-dcnode-id="231" instrument_node="">Etta Lucy Bohanan Nelson</span></strong><span data-dcnode-id="229" instrument_node="">, age 34, October 18, 1918: Married for fourteen years and with two children, Margery, 6, and Stanley, 1, both Etta and her husband Eddie, in the prime of life, became so severely ill with the influenza that neither was expected to survive. Eddie finally recovered and raised the two children with the help of his mother-in-law, Delia Bohanan.</span><br data-dcnode-id="228"><br data-dcnode-id="227"><strong data-dcnode-id="225"><span data-dcnode-id="226" instrument_node="">Eugene Andrew Tallant</span></strong><span data-dcnode-id="224" instrument_node="">, age 33, November 4, 1918: One of 15 children raised on a farm in Pelham, Eugene came to Hopkinton, working as a farmer and a lumberman. His obituary noted, “Gene was industrious, and on account of his unusually strong physique and jovial nature was well known about his town.” He had been married five years and was without children at the time of his death. His wife Emma never remarried and eventually became a nurse.</span><br data-dcnode-id="223"><br data-dcnode-id="222"><strong data-dcnode-id="220"><span data-dcnode-id="221" instrument_node="">Dwight Eugene Conant</span></strong><span data-dcnode-id="219" instrument_node="">, age 46, December 14, 1918: A hard-working, well-respected manager of the Conant Manufacturing Company in Contoocook, a silk mill which had been established by his father, Dwight and his wife Blanche were parents of George, the first local fatality of the pandemic. Though violent illness had spread rapidly through town, theirs was the only family to lose two of its members.</span><br data-dcnode-id="218"><br data-dcnode-id="217"><strong data-dcnode-id="215"><span data-dcnode-id="216" instrument_node="">Wesley E. Eastman</span></strong><span data-dcnode-id="214" instrument_node="">, age 29, January 2, 1919: Raised on a farm in Andover, NH, Wesley had earned his degree at the state college in Durham, gained an advanced degree in Michigan, and taught geology at Michigan Agricultural College before coming to Hopkinton in the fall of 1918 as the new principal of the high school. At the time of his death, he had a 3-year-old son and his wife Elaine was pregnant with a daughter born one month later.&nbsp;</span><br data-dcnode-id="213"><br data-dcnode-id="212"><strong data-dcnode-id="210"><span data-dcnode-id="211" instrument_node="">Mabel C. Martin</span></strong><span data-dcnode-id="209" instrument_node="">, age 19, January 3, 1919: Mabel died at the home of her friend, Jessie Gould, while both were on winter break from Keene Normal School. Mabel had graduated from Henniker High School with high honors and was demonstrating excellence as a student teacher. Her mother had died when Mabel was only 5 years old; her father had boarded her with a family living next door to him. Her loss was deeply felt by her community.</span><br data-dcnode-id="208"><span data-dcnode-id="207" instrument_node="">&nbsp;</span><br data-dcnode-id="206"><em data-dcnode-id="202"><span data-dcnode-id="205" instrument_node="">Allita Paine&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp; &nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp; 20 March 2020</span><br data-dcnode-id="204"><span data-dcnode-id="203" instrument_node="">&nbsp;update of original from 2017</span></em><br data-dcnode-id="201"><br data-dcnode-id="200"><br data-dcnode-id="199"></div><span data-dcnode-id="197" instrument_node="">

</span><span class="imgPusher" data-dcnode-id="189" style="float:right;height:213px"></span><span data-dcnode-id="185" style="display: table;width:auto;position:relative;float:right;max-width:100%;;clear:right;margin-top:20px;*margin-top:40px"><a data-dcnode-id="187"><img alt="Picture" class="galleryImageBorder wsite-image" data-dcnode-id="188" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.hopkintonhistory.org/uploads/2/6/4/1/26419645/published/sanborn2-0001.jpg%3F1581006106&amp;raw" style="margin-top: 5px; margin-bottom: 10px; margin-left: 0px; margin-right: 10px; border-width:1px;padding:3px; max-width:100%"></a><span class="wsite-caption" data-dcnode-id="186" style="display: table-caption; caption-side: bottom; font-size: 90%; margin-top: -10px; margin-bottom: 10px; text-align: center;"></span></span><span data-dcnode-id="184" instrument_node="">
</span><div class="paragraph" data-dcnode-id="123" style="display:block;"><font data-dcnode-id="175" size="4"><font data-dcnode-id="181" size="5"><strong data-dcnode-id="182"><span data-dcnode-id="183" instrument_node="">Notable Women of Hopkinton:</span></strong></font><br data-dcnode-id="180"><strong data-dcnode-id="176"><span data-dcnode-id="179" instrument_node="">Celebrating the 100th Anniversary</span><br data-dcnode-id="178"><span data-dcnode-id="177" instrument_node="">of the Ratification of the 19th Amendment</span></strong></font><br data-dcnode-id="174"><span data-dcnode-id="173" instrument_node="">&nbsp;</span><br data-dcnode-id="172"><span data-dcnode-id="171" instrument_node="">In honor of the 100th anniversary of the ratification of the 19th Amendment granting women the right to vote, Hopkinton Historical Society is recognizing some of the women of Hopkinton whose accomplishments – both large and small – deserve to be highlighted.&nbsp; Their bravery, ingenuity, intelligence, and tenacity is inspiring and we thank them for their contributions.</span><br data-dcnode-id="170"><span data-dcnode-id="169" instrument_node="">&nbsp;</span><br data-dcnode-id="168"><font data-dcnode-id="165" size="4"><strong data-dcnode-id="166"><span data-dcnode-id="167" instrument_node="">Laura Emily Sanborn</span></strong></font><br data-dcnode-id="164"><span data-dcnode-id="163" instrument_node="">World War One Army Nurse Corp.</span><br data-dcnode-id="162"><span data-dcnode-id="161" instrument_node="">Served June 28, 1917-April 27, 1919</span><br data-dcnode-id="160"><span data-dcnode-id="159" instrument_node="">&nbsp;</span><br data-dcnode-id="158"><span data-dcnode-id="157" instrument_node="">Born February 5, 1881 in Webster, Merrimack County, New Hampshire, Laura Sanborn was the eldest daughter of Charles F. Sanborn and Jennie E. (Colby) Sanborn. Charles F. Sanborn was a farmer and a descendant of Captain Peter Coffin, soldier of the American Revolution.&nbsp; Not much is known about Laura’s early life. She was raised on her father’s farm in Webster along with her siblings, John, Scott, and Annie.&nbsp; In the 1900 United States Federal Census, Laura was 19 years old and single.&nbsp; There is no notation as to her occupation.&nbsp; Between 1900 and 1910, Laura left the family farm in Webster and went to Boston to study nursing at Massachusetts General Hospital.&nbsp; In 1910, Laura was employed as a private nurse in the home of Anna Wright, a widow. Laura was one of seven employees living in Mrs. Wright’s home on Commonwealth Avenue in Boston.&nbsp;</span><br data-dcnode-id="156"><span data-dcnode-id="155" instrument_node="">&nbsp;</span><br data-dcnode-id="154"><span data-dcnode-id="153" instrument_node="">A small item in </span><em data-dcnode-id="151"><span data-dcnode-id="152" instrument_node="">The Kearsarge Times</span></em><span data-dcnode-id="150" instrument_node="">, dated 16 February 1917, noted, </span><em data-dcnode-id="148"><span data-dcnode-id="149" instrument_node="">“Miss Laura Sanborn, trained nurse of Boston has been spending some time here at the home of her father, Charles Sanborn.”</span></em><br data-dcnode-id="147"><span data-dcnode-id="146" instrument_node="">&nbsp;</span><br data-dcnode-id="145"><span data-dcnode-id="144" instrument_node="">The First World War, originating in Europe, began on July 28, 1914. The United States entered the war on 6 April 1917, joining its allies, Britain, France, and Russia. Two months later, on June 23, 1917, Laura signed a United States passport application to travel overseas to France as a nurse. She was enrolled as a Red Cross nurse, sworn into the army, and on July 10, 1917, Laura, along with 63 other nurses, departed New York City sailing on the </span><em data-dcnode-id="142"><span data-dcnode-id="143" instrument_node="">Aurania</span></em><span data-dcnode-id="141" instrument_node=""> to be stationed with Base Hospital No. 6, a medical surgical unit of Massachusetts General Hospital, in Bordeaux, France, where the nurses were known as the “Bordeaux Belles.” Base Hospital No. 6 was well equipped to handle wounded and sick soldiers, including the treatment of soldiers with infectious diseases. By the last months of the war, the hospital ran at capacity with casualties from the Meuse-Argonne offensive, a major part of the final Allied offensive of World War One that was fought for 47 days and is one of the deadliest battles in American history, resulting in over 350,000 casualties, including over 26,000 Americans.&nbsp; Between August of 1917 and September of 1918, the total number of patients treated, both surgically and medically, was 26,156, including 580 allied sick and wounded.</span><br data-dcnode-id="140"><span data-dcnode-id="139" instrument_node="">&nbsp;</span><br data-dcnode-id="138"><span data-dcnode-id="137" instrument_node="">It must have been a relief to Laura when the war ended on November 18, 1918. Laura departed from Bordeaux, France on 14 February 1919 on the ship </span><em data-dcnode-id="135"><span data-dcnode-id="136" instrument_node="">Abengarez </span></em><span data-dcnode-id="134" instrument_node="">to the port of Hoboken, New Jersey, arriving on March 2, 1919.&nbsp; Laura returned home to Contoocook, where her parents and her brother, John, were living on Pine Street.&nbsp; In 1920, Laura was employed as a private nurse and living with her family in Contoocook. In the 1930 United States Federal Census, Laura was living with her mother, Jennie, and her brother, John, on Pine Street. Her occupation was a private nurse however, it was noted on the census form that she was an “unpaid worker, member of the family.” This likely indicates that she was the caretaker for her mother.&nbsp; The 1940 United States Federal Census records that Laura was living alone on Pine Street as the head of household.&nbsp; Her occupation was left blank.&nbsp; Laura never married.&nbsp; She died January 10, 1969 and is buried alongside her family in Contoocook Village Cemetery.</span><br data-dcnode-id="133"><span data-dcnode-id="132" instrument_node="">&nbsp;</span><br data-dcnode-id="131"><span data-dcnode-id="130" instrument_node="">Laura’s 1917 passport application describes her as 36 years-old, 5’6” tall, with blue-gray eyes, and medium brown hair.&nbsp; The accompanying passport photo of Laura reflects a woman, half in shadow, staring directly into the camera.&nbsp; She has a kind face and a slight smile on her lips.&nbsp; She appears to be a woman who knows what she is about, where she is going, and what she has to do.&nbsp; One can only imagine the horrors she witnessed taking care of the young men on her watch at Base Hospital No. 6.&nbsp; One can also imagine that, perhaps, while tending to a dying solder, Laura Sanborn’s calm blue-gray eyes were the last vision a young man saw in the Great War.</span><br data-dcnode-id="129"><span data-dcnode-id="128" instrument_node="">&nbsp;</span><br data-dcnode-id="127"><span data-dcnode-id="126" instrument_node="">Nadine Ferrero</span><br data-dcnode-id="125"><span data-dcnode-id="124" instrument_node="">January 24, 2020</span></div><span data-dcnode-id="122" instrument_node="">
