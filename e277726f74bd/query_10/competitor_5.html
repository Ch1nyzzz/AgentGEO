</span><p data-dcnode-id="1708"><span data-dcnode-id="1709" instrument_node="">Revolution 250 is a collaborative effort aimed at commemorating the 250th anniversaries of events leading up to America’s independence from Great Britain. More than 40 Massachusetts non-profit organizations, businesses, and government agencies are working together to explore the history of the American Revolution and the ways that this story still resonates 250 years later.</span></p><span data-dcnode-id="1707" instrument_node="">

</span><p data-dcnode-id="1685"><span data-dcnode-id="1686" instrument_node="">Years from now historians will research the impact of the COVID-19 virus. In order to have first-person accounts of daily life during this extraordinary time, the MHS invites you to contribute your experience(s) to our collection.</span></p><span data-dcnode-id="1684" instrument_node="">
