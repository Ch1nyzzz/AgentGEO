</span><p data-dcnode-id="1352"><span data-dcnode-id="1362" instrument_node="">The first Japanese scholar who remarked on the relationship between Swift’s </span><i data-dcnode-id="1360"><span data-dcnode-id="1361" instrument_node="">Gulliver’s Travels</span></i><span data-dcnode-id="1359" instrument_node=""> and the three Japanese books is Baikei Takasu. See Takasu, </span><i data-dcnode-id="1357"><span data-dcnode-id="1358" instrument_node="">Kokkeishumi-no-kenkyu</span></i><span data-dcnode-id="1356" instrument_node=""> (</span><i data-dcnode-id="1354"><span data-dcnode-id="1355" instrument_node="">A Study of Humorous and Satirical Works in Japanese Literature</span></i><span data-dcnode-id="1353" instrument_node="">), (Tokyo: Jitsugyo-no-nihon sha, 1911), 100–53.</span></p><span data-dcnode-id="1351" instrument_node="">

</span><p data-dcnode-id="1340"><span data-dcnode-id="1344" instrument_node="">Eddy, </span><i data-dcnode-id="1342"><span data-dcnode-id="1343" instrument_node="">Gulliver’s Travels: A Critical Study</span></i><span data-dcnode-id="1341" instrument_node=""> (Princeton: Princeton University Press, 1923), 70–71. Chamberlain (1850–1935), a professor at the University of Tokyo, is one of the most famous British Japanologists who wrote many articles on Japan and translated many works of Japanese classical literature.</span></p><span data-dcnode-id="1339" instrument_node="">

</span><p data-dcnode-id="1307"><span data-dcnode-id="1332" instrument_node="">Some possible sources that are supposed to be transported from Japan to Europe and might give an inspiration for Swift are: Ryoan Terashima’s </span><i data-dcnode-id="1330"><span data-dcnode-id="1331" instrument_node="">Wakan-Sansai-zue</span></i><span data-dcnode-id="1329" instrument_node=""> (</span><i data-dcnode-id="1327"><span data-dcnode-id="1328" instrument_node="">Japanese-Chinese Encyclopedic Descriptions and Illustrations of Peoples, lands, and Celestial Spheres, 1712</span></i><span data-dcnode-id="1326" instrument_node="">) that includes the illustrations of many kinds of fanciful peoples and lands; </span><i data-dcnode-id="1324"><span data-dcnode-id="1325" instrument_node="">Bankoku-Jinbutsu-zu</span></i><span data-dcnode-id="1323" instrument_node=""> (</span><i data-dcnode-id="1321"><span data-dcnode-id="1322" instrument_node="">An Illustration of Peoples of the World</span></i><span data-dcnode-id="1320" instrument_node="">, 1645) which are illustrated with some clearly fanciful dwarves and giants; and </span><i data-dcnode-id="1318"><span data-dcnode-id="1319" instrument_node="">Bankoku-Sokai-zu</span></i><span data-dcnode-id="1317" instrument_node=""> (</span><i data-dcnode-id="1315"><span data-dcnode-id="1316" instrument_node="">An Illustrative Map of Lands of the World</span></i><span data-dcnode-id="1314" instrument_node="">, 1688), in which some similarly characteristic distortions of the real lands to the cartographical features of the maps attached to </span><i data-dcnode-id="1312"><span data-dcnode-id="1313" instrument_node="">Gulliver’s Travels</span></i><span data-dcnode-id="1311" instrument_node=""> are observed. As for the identification of specific items that Swift might have consulted when he wrote </span><i data-dcnode-id="1309"><span data-dcnode-id="1310" instrument_node="">Gulliver’s Travels</span></i><span data-dcnode-id="1308" instrument_node="">, the author of this article is now engaged in the researches supported by Grants-in Aid for Scientific Research (C) (26,370,296–00) of the Japan Society for the Promotion of Science.</span></p><span data-dcnode-id="1306" instrument_node="">

</span><p data-dcnode-id="1238"><span data-dcnode-id="1245" instrument_node="">As for Defoe’s interest in South America and his </span><i data-dcnode-id="1243"><span data-dcnode-id="1244" instrument_node="">A New Voyage round the World</span></i><span data-dcnode-id="1242" instrument_node=""> as its fictional representation, see Burton J. Fishman, “Defoe, Herman Moll, and the Geography of South America,” </span><i data-dcnode-id="1240"><span data-dcnode-id="1241" instrument_node="">Huntington Library Quarterly</span></i><span data-dcnode-id="1239" instrument_node=""> 36:3 (1973): 227–38. Alexander Selkirk, a possible model for Robinson Crusoe, lived as a castaway on an uninhabited island off the coast of Chile.</span></p><span data-dcnode-id="1237" instrument_node="">

</span><p data-dcnode-id="1220"><span data-dcnode-id="1230" instrument_node="">As for Brand’s </span><i data-dcnode-id="1228"><span data-dcnode-id="1229" instrument_node="">Journal</span></i><span data-dcnode-id="1227" instrument_node="">, Richard M. Bridges convincingly demonstrates Defoe’s reliance on it in “A Possible Source for Daniel Defoe’s </span><i data-dcnode-id="1225"><span data-dcnode-id="1226" instrument_node="">The Farther Adventures of Robinson Crusoe</span></i><span data-dcnode-id="1224" instrument_node="">,” </span><i data-dcnode-id="1222"><span data-dcnode-id="1223" instrument_node="">Journal for Eighteenth-Century Studies</span></i><span data-dcnode-id="1221" instrument_node=""> 2:3 (1979): 231–36.</span></p><span data-dcnode-id="1219" instrument_node="">

</span><p data-dcnode-id="1160"><span data-dcnode-id="1176" instrument_node="">Defoe, </span><i data-dcnode-id="1174"><span data-dcnode-id="1175" instrument_node="">Farther Adventures</span></i><span data-dcnode-id="1173" instrument_node="">, 171–72. The phrase “of the which, I shall take Notice in its Place” is somehow missing in some e-book editions. In the note, the editors of the Pickering and Chatto edition explain that “trade with European countries” in Japan “was protected by granting of special licenses to merchant ships,” but these&nbsp;were not issued in actuality. See n. 293 in, </span><i data-dcnode-id="1171"><span data-dcnode-id="1172" instrument_node="">Farther Adventures</span></i><span data-dcnode-id="1170" instrument_node="">, 238. Defoe also mentioned Japan and China in </span><i data-dcnode-id="1168"><span data-dcnode-id="1169" instrument_node="">Serious Reflections</span></i><span data-dcnode-id="1167" instrument_node="">: “their [Chinese and Japanese] Worship is the most brutish, and the Objects of their Worship, the coursest, the most unmanly, inconsistent with Reason or the Nature of Religion of any the World can shew.” See Defoe, </span><i data-dcnode-id="1165"><span data-dcnode-id="1166" instrument_node="">Serious Reflections during the Life and Surprizing Adventures of Robinson Crusoe</span></i><span data-dcnode-id="1164" instrument_node="">, ed. G. A. Starr, </span><i data-dcnode-id="1162"><span data-dcnode-id="1163" instrument_node="">The Novels of Daniel Defoe,</span></i><span data-dcnode-id="1161" instrument_node=""> 3 (London: Pickering &amp; Chatto, 2008), 139.</span></p><span data-dcnode-id="1159" instrument_node="">

</span><span class="u-custom-list-number" data-dcnode-id="1154"><span data-dcnode-id="1155" instrument_node="">26.</span></span><span data-dcnode-id="1153" instrument_node="">
</span><p data-dcnode-id="1145"><span data-dcnode-id="1152" instrument_node="">Helmut Heidenreich, </span><i data-dcnode-id="1150"><span data-dcnode-id="1151" instrument_node="">The Libraries of Daniel Defoe and Phillips Farewell: Olive Payne’s Sales Catalogue (1731)</span></i><span data-dcnode-id="1149" instrument_node=""> (Berlin: Heidenreich, </span><a aria-label="Reference 1970" data-dcnode-id="1147" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR12" id="ref-link-section-d12836934e2192" title="Heidenreich, Helmut. 1970. The Libraries of Daniel Defoe and Phillips Farewell: Olive Payne’s Sales Catalogue (1731). Berlin: Heidenreich."><span data-dcnode-id="1148" instrument_node="">1970</span></a><span data-dcnode-id="1146" instrument_node="">), 184.</span></p><span data-dcnode-id="1144" instrument_node="">

</span><p data-dcnode-id="1133"><span data-dcnode-id="1137" instrument_node="">Defoe’s description of Taiwan in </span><i data-dcnode-id="1135"><span data-dcnode-id="1136" instrument_node="">Farther Adventures</span></i><span data-dcnode-id="1134" instrument_node=""> is only one page long and any trace of Psalmanazar's description cannot be observed.</span></p><span data-dcnode-id="1132" instrument_node="">
</span></li><span data-dcnode-id="1130" instrument_node="">
</span><li data-dcnode-id="1116"><span data-dcnode-id="1129" instrument_node="">
</span><span class="u-custom-list-number" data-dcnode-id="1127"><span data-dcnode-id="1128" instrument_node="">28.</span></span><span data-dcnode-id="1126" instrument_node="">
</span><p data-dcnode-id="1118"><span data-dcnode-id="1125" instrument_node="">In </span><i data-dcnode-id="1123"><span data-dcnode-id="1124" instrument_node="">The Life, Adventures and Piracies of the Famous Captain Singleton</span></i><span data-dcnode-id="1122" instrument_node=""> (1720) and </span><i data-dcnode-id="1120"><span data-dcnode-id="1121" instrument_node="">A New Voyage round the World</span></i><span data-dcnode-id="1119" instrument_node=""> (1724), Defoe describes in rather fantastic ways the protagonists who visit more unfamiliar places like unknown Africa and the interior of South America. A shift of his scope and descriptive mode is observed here. However, as space is limited, we have concentrated on his reference to Japan in this chapter.</span></p><span data-dcnode-id="1117" instrument_node="">
