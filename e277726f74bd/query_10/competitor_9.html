</span><section aria-labelledby="Abs1" data-dcnode-id="2241" data-title="Abstract" lang="en"><div class="c-article-section" data-dcnode-id="2242" id="Abs1-section"><h2 class="c-article-section__title js-section-title js-c-reading-companion-sections-item" data-dcnode-id="2291" id="Abs1"><span data-dcnode-id="2292" instrument_node="">Abstract</span></h2><div class="c-article-section__content" data-dcnode-id="2243" id="Abs1-content"><p data-dcnode-id="2277"><span data-dcnode-id="2290" instrument_node="">Noriyuki Harada’s “Robinson Crusoe in the Context of Travel Narrative of the Early Modern England on Asia” sets out to discuss two interesting points about travel narratives of late seventeenth century and early eighteenth century that more or less relate to the geography and culture of Asian countries. One of them is that the possible relationships of stories, books, and maps between East and West. The other is the possibility that Asian contexts, whether fictitious or factual, vitalize English prose fiction and contribute to its development. Referring to some narratives and visual images of Japanese or Chinese origin, those two points will be considered mainly through these three important English texts: George Psalmanazar’s </span><i data-dcnode-id="2288"><span data-dcnode-id="2289" instrument_node="">An Historical and Geographical Description of Formosa</span></i><span data-dcnode-id="2287" instrument_node=""> (1703), Daniel Defoe’s </span><i data-dcnode-id="2285"><span data-dcnode-id="2286" instrument_node="">Robinson Crusoe</span></i><span data-dcnode-id="2284" instrument_node=""> and </span><i data-dcnode-id="2282"><span data-dcnode-id="2283" instrument_node="">The Farther Adventures of Robinson Crusoe</span></i><span data-dcnode-id="2281" instrument_node=""> (1719), and Jonathan Swift’s </span><i data-dcnode-id="2279"><span data-dcnode-id="2280" instrument_node="">Gulliver’s Travels</span></i><span data-dcnode-id="2278" instrument_node=""> (1726). Harada concludes that rather than Asia be seen as a late recipient of the novel as an import from Europe, it is already present as a latent but powerful gravitational force at the origin of modern prose fiction.</span></p><h3 class="c-article__sub-heading" data-dcnode-id="2275"><span data-dcnode-id="2276" instrument_node="">Keywords</span></h3><ul class="c-article-subject-list" data-dcnode-id="2244"><li class="c-article-subject-list__subject" data-dcnode-id="2272"><span data-dcnode-id="2273"><span data-dcnode-id="2274" instrument_node="">China</span></span></li><li class="c-article-subject-list__subject" data-dcnode-id="2269"><span data-dcnode-id="2270"><span data-dcnode-id="2271" instrument_node="">East India Company</span></span></li><li class="c-article-subject-list__subject" data-dcnode-id="2266"><span data-dcnode-id="2267"><span data-dcnode-id="2268" instrument_node="">Japan</span></span></li><li class="c-article-subject-list__subject" data-dcnode-id="2263"><span data-dcnode-id="2264"><span data-dcnode-id="2265" instrument_node="">Jesuit missionary</span></span></li><li class="c-article-subject-list__subject" data-dcnode-id="2260"><span data-dcnode-id="2261"><span data-dcnode-id="2262" instrument_node="">Engelbert Kaempfer (1651–1716)</span></span></li><li class="c-article-subject-list__subject" data-dcnode-id="2257"><span data-dcnode-id="2258"><span data-dcnode-id="2259" instrument_node="">Pacific Ocean</span></span></li><li class="c-article-subject-list__subject" data-dcnode-id="2254"><span data-dcnode-id="2255"><span data-dcnode-id="2256" instrument_node="">George Psalmanazar (1679–1763)</span></span></li><li class="c-article-subject-list__subject" data-dcnode-id="2251"><span data-dcnode-id="2252"><span data-dcnode-id="2253" instrument_node="">Jonathan Swift (1667–1745)</span></span></li><li class="c-article-subject-list__subject" data-dcnode-id="2248"><span data-dcnode-id="2249"><span data-dcnode-id="2250" instrument_node="">Travel narrative</span></span></li><li class="c-article-subject-list__subject" data-dcnode-id="2245"><span data-dcnode-id="2246"><span data-dcnode-id="2247" instrument_node="">Taiwan (Formosa)</span></span></li></ul></div></div></section><span data-dcnode-id="2240" instrument_node="">

</span><section data-dcnode-id="2164" data-title="Asia, Japan, and Robinson Crusoe’s Voyages"><div class="c-article-section" data-dcnode-id="2165" id="Sec1-section"><h2 class="c-article-section__title js-section-title js-c-reading-companion-sections-item" data-dcnode-id="2223" id="Sec1"><span data-dcnode-id="2224" instrument_node="">Asia, Japan, and Robinson Crusoe’s Voyages</span></h2><div class="c-article-section__content" data-dcnode-id="2166" id="Sec1-content"><p data-dcnode-id="2221"><span data-dcnode-id="2222" instrument_node="">In the sixteenth and early seventeenth centuries, Portugal, Spain, and some Asian countries began trade and diplomatic relationships across the South China Sea. Macao in China, Hanoi in Vietnam, Ayuthea in Thailand, Batavia (Jakarta) in Indonesia, Manila in Philippine, and Nagasaki in Japan were the main port towns flourishing at the time. Raw silk in China and silver in Japan were the most important items of the trade, but cultural interactions between the East and the West were also developed; missionary activities of Christian priests for Asian countries, too, started from this&nbsp;sphere.</span></p><p data-dcnode-id="2213"><span data-dcnode-id="2220" instrument_node="">In the middle part of </span><i data-dcnode-id="2218"><span data-dcnode-id="2219" instrument_node="">The Farther Adventures of Robinson Crusoe</span></i><span data-dcnode-id="2217" instrument_node=""> (1719), Daniel Defoe describes the journey of Crusoe’s party to this region such as Cambodia, Cochin China, and China. However, China and Korea began to put some restrictions on free trade and diplomatic exchanges with European countries; Japan, too, adopted a policy of national isolation (1639–1854) and finally closed the door to foreigners except for Chinese, Koreans, and the Dutch in the middle of the seventeenth century. Japanese people lost the opportunity of mingling with the peoples, cultures, and aspects of civilization of modern Europe until the reopening in the mid-nineteenth century. In </span><i data-dcnode-id="2215"><span data-dcnode-id="2216" instrument_node="">The Farther Adventures</span></i><span data-dcnode-id="2214" instrument_node="">, Crusoe in the end gives up on his plan of sailing to Japan.</span></p><p data-dcnode-id="2179"><span data-dcnode-id="2212" instrument_node="">However, some eighteenth-century English authors interestingly mentioned Japan.</span><a data-dcnode-id="2209" data-track="click" data-track-action="subsection anchor" data-track-label="link" href="#FPar1"><sup data-dcnode-id="2210"><span data-dcnode-id="2211" instrument_node="">1</span></sup></a><span data-dcnode-id="2208" instrument_node=""> The country was of course understood among the authors and readers in eighteenth-century England as a real country situated at the far eastern end of the Eurasian continent, but almost none of them visited the country; what they knew about Japan was only through reminiscences of the trade flourishing between England and Japan in early seventeenth century and some limited sources of journals written by such authors as François Caron (1600–73), Arnoldus Montanus (1625–83), and Engelbert Kaempfer (1651–1716), as well as the memoirs of William Adams (1564–1620), a navigator and the first Englishman to visit Japan, and of Christóvão Ferreira (c.1580–1650), a Jesuit missionary converted in Japan. In particular, the early decades of the century attract our special attention. More than two hundred books published in London in the period have references to Japan; we also know well that in an essay for </span><i data-dcnode-id="2206"><span data-dcnode-id="2207" instrument_node="">The Spectator</span></i><span data-dcnode-id="2205" instrument_node="">, Joseph Addison describes Mr. Spectator who enjoys hearing “Disputes adjusted between an Inhabitant of </span><i data-dcnode-id="2203"><span data-dcnode-id="2204" instrument_node="">Japan</span></i><span data-dcnode-id="2202" instrument_node=""> and an Alderman of </span><i data-dcnode-id="2200"><span data-dcnode-id="2201" instrument_node="">London</span></i><span data-dcnode-id="2199" instrument_node="">” at the Royal Exchange.</span><a data-dcnode-id="2196" data-track="click" data-track-action="subsection anchor" data-track-label="link" href="#FPar1"><sup data-dcnode-id="2197"><span data-dcnode-id="2198" instrument_node="">2</span></sup></a><span data-dcnode-id="2195" instrument_node=""> Moreover, in the following three famous works of fiction, the reference to Japan seems to get more importance; it plays a meaningful role in the development of each story and also these three works importantly contributed to the development of English prose fiction itself. They are George Psalmanazar’s </span><i data-dcnode-id="2193"><span data-dcnode-id="2194" instrument_node="">Formosa</span></i><span data-dcnode-id="2192" instrument_node=""> (</span><i data-dcnode-id="2190"><span data-dcnode-id="2191" instrument_node="">An Historical and Geographical Description of Formosa, an Island Subject to the Emperor of Japan</span></i><span data-dcnode-id="2189" instrument_node="">, 1704), Jonathan Swift’s </span><i data-dcnode-id="2187"><span data-dcnode-id="2188" instrument_node="">Gulliver’s Travels</span></i><span data-dcnode-id="2186" instrument_node=""> (</span><i data-dcnode-id="2184"><span data-dcnode-id="2185" instrument_node="">Travels into Several Remote Nations of the World</span></i><span data-dcnode-id="2183" instrument_node="">, 1726) and of course, Defoe’s </span><i data-dcnode-id="2181"><span data-dcnode-id="2182" instrument_node="">The Farther Adventures of Robinson Crusoe</span></i><span data-dcnode-id="2180" instrument_node="">.</span></p><p data-dcnode-id="2167"><span data-dcnode-id="2178" instrument_node="">The early eighteenth century was an opportune moment for the English authors who wanted to create a work of fiction, using the image of Japan. The Japanese government (Tokugawa Shogunate:1603–1868) had almost completely closed the country, but such Japanese diplomatic policy does not seem to have been understood fully among English merchants at least until the end of the seventeenth century; in fact, English merchants on the trade ship called “The Return” visited Nagasaki in 1673 and asked for resuming the trade, holding a copy of the charter that Ieyasu Tokugawa (1542–1616), the first Shogun, sent to King James I (1566–1625) half century before.</span><a data-dcnode-id="2175" data-track="click" data-track-action="subsection anchor" data-track-label="link" href="#FPar1"><sup data-dcnode-id="2176"><span data-dcnode-id="2177" instrument_node="">3</span></sup></a><span data-dcnode-id="2174" instrument_node=""> In 1690, Kaempfer, a German naturalist and physician, visited Japan by way of the Dutch East India Company and he met Tsunayoshi Tokugawa, the fifth Shogun, twice during his two-year stay in Japan. The abridged translation of Kaempfer’s report of Japan was posthumously published in 1727 in London as </span><i data-dcnode-id="2172"><span data-dcnode-id="2173" instrument_node="">The History of Japan</span></i><span data-dcnode-id="2171" instrument_node="">, just after the publication of Swift’s </span><i data-dcnode-id="2169"><span data-dcnode-id="2170" instrument_node="">Gulliver’s Travels</span></i><span data-dcnode-id="2168" instrument_node="">, and it became one of the chief sources of Western knowledge about Japan throughout the century. The figures of actual Japan and the images made by memories, rumors, and bookish knowledge were mixed in early eighteenth-century England and such circumstances helped literary authors to use references to Japan productively. In this chapter, we will first examine the descriptions of Japan by Psalmanazar, Swift, and Defoe, and argue that Defoe made his protagonist relinquish the plan of sailing to Japan because he was not well informed about the country enough to give detailed description to the journey.</span></p></div></div></section><section data-dcnode-id="1967" data-title="Japan in Psalmanazar’s Formosa"><div class="c-article-section" data-dcnode-id="1968" id="Sec2-section"><h2 class="c-article-section__title js-section-title js-c-reading-companion-sections-item" data-dcnode-id="2159" id="Sec2"><span data-dcnode-id="2163" instrument_node="">Japan in Psalmanazar’s </span><b data-dcnode-id="2160"><i data-dcnode-id="2161"><span data-dcnode-id="2162" instrument_node="">Formosa</span></i></b></h2><div class="c-article-section__content" data-dcnode-id="1969" id="Sec2-content"><p data-dcnode-id="2151"><i data-dcnode-id="2157"><span data-dcnode-id="2158" instrument_node="">Formosa</span></i><span data-dcnode-id="2156" instrument_node=""> was purported to be a detailed description of Formosan geography, history, and customs, but was in fact a complete fiction and the author has been often called an impostor. The work was, however, well received in England and other European countries and its influence is observed, for example, in the literary career of Jonathan Swift and Samuel Johnson.</span><a data-dcnode-id="2153" data-track="click" data-track-action="subsection anchor" data-track-label="link" href="#FPar1"><sup data-dcnode-id="2154"><span data-dcnode-id="2155" instrument_node="">4</span></sup></a><span data-dcnode-id="2152" instrument_node=""> Psalmanazar’s description that keeps the form of faithful reports of the history and geography of Taiwan gave a great impact, or shock, to readers in the age of exploration; he made up a seemingly faithful account of Taiwan out of scattered pieces of information, knowledge, and his own imagination on Japan and China. If he had pretended to be a Japanese or a Chinese, the fraud would have been discerned easily because even at the time, people had access to many pieces of information about those countries. However, as for Formosa, they obviously knew little, so his pretence of narrating its faithful history was largely successful. Of course, it is not true that such imposture was unanimously accepted; in fact, learned communities were highly sceptical about Psalmanazar’s veracity. However, the more scholars criticized contradictions, the more they were drawn into the depth of the mysteries of Formosa; accelerated by the popularity of the first edition, Psalmanazar published the second edition, adding a new intriguing preface in which he gave answers to twenty-five possible objections from the reader about his descriptions of Formosa. Why did the work get the favour of a wide readership in spite of critical comments about the dubiousness of the author’s life and description?</span></p><p data-dcnode-id="2137"><span data-dcnode-id="2150" instrument_node="">We can point out here at least three characteristics of the narrative of </span><i data-dcnode-id="2148"><span data-dcnode-id="2149" instrument_node="">Formosa</span></i><span data-dcnode-id="2147" instrument_node="">. First of all, the author obviously succeeds in writing a lively dialogue addressed to the reader, both vividly and enigmatically using the autobiographical first-person narrator. This method may be similarly observed in early English prose fictions like Aphra Behn’s </span><i data-dcnode-id="2145"><span data-dcnode-id="2146" instrument_node="">Oroonoko</span></i><span data-dcnode-id="2144" instrument_node="">, Defoe’s </span><i data-dcnode-id="2142"><span data-dcnode-id="2143" instrument_node="">Robinson Crusoe</span></i><span data-dcnode-id="2141" instrument_node=""> and its sequels, and Swift’s </span><i data-dcnode-id="2139"><span data-dcnode-id="2140" instrument_node="">Gulliver’s Travels</span></i><span data-dcnode-id="2138" instrument_node="">. But Psalmanazar’s use of the first-person narrator is more dexterous; he often uses different kinds of narrative personae, so that he makes effectively the reader feel that his testimony is real and faithful to his actual experience. In the first chapter, for example, he describes “the Situation, Magnitude, and Division of the Isle,” changing the narrative attitude skilfully:</span></p><blockquote class="c-blockquote" data-dcnode-id="2078"><div class="c-blockquote__body" data-dcnode-id="2079"><span data-dcnode-id="2136" instrument_node="">
</span><p data-dcnode-id="2081"><i data-dcnode-id="2134"><span data-dcnode-id="2135" instrument_node="">Formosa</span></i><span data-dcnode-id="2133" instrument_node=""> and </span><i data-dcnode-id="2131"><span data-dcnode-id="2132" instrument_node="">Japan</span></i><span data-dcnode-id="2130" instrument_node="">, are the remotest parts towards the </span><i data-dcnode-id="2128"><span data-dcnode-id="2129" instrument_node="">East</span></i><span data-dcnode-id="2127" instrument_node=""> [. . .] so they are the first Countries that are visited with the Rays of the Morning Sun. </span><i data-dcnode-id="2125"><span data-dcnode-id="2126" instrument_node="">Formosa</span></i><span data-dcnode-id="2124" instrument_node=""> has on the </span><i data-dcnode-id="2122"><span data-dcnode-id="2123" instrument_node="">North</span></i><span data-dcnode-id="2121" instrument_node=""> side </span><i data-dcnode-id="2119"><span data-dcnode-id="2120" instrument_node="">Japan</span></i><span data-dcnode-id="2118" instrument_node="">, distant about 200 Leagues; on the </span><i data-dcnode-id="2116"><span data-dcnode-id="2117" instrument_node="">North</span></i><span data-dcnode-id="2115" instrument_node=""> and </span><i data-dcnode-id="2113"><span data-dcnode-id="2114" instrument_node="">West</span></i><span data-dcnode-id="2112" instrument_node="">, </span><i data-dcnode-id="2110"><span data-dcnode-id="2111" instrument_node="">China</span></i><span data-dcnode-id="2109" instrument_node="">, from which it is distant about 60 Leagues [. . .]. This Isle </span><i data-dcnode-id="2107"><span data-dcnode-id="2108" instrument_node="">Formosa</span></i><span data-dcnode-id="2106" instrument_node=""> extends itself in length from </span><i data-dcnode-id="2104"><span data-dcnode-id="2105" instrument_node="">North</span></i><span data-dcnode-id="2103" instrument_node=""> to </span><i data-dcnode-id="2101"><span data-dcnode-id="2102" instrument_node="">South</span></i><span data-dcnode-id="2100" instrument_node=""> about 70 Leagues, and in breadth from </span><i data-dcnode-id="2098"><span data-dcnode-id="2099" instrument_node="">East</span></i><span data-dcnode-id="2097" instrument_node=""> to </span><i data-dcnode-id="2095"><span data-dcnode-id="2096" instrument_node="">West</span></i><span data-dcnode-id="2094" instrument_node=""> 15 Leagues, being above 130 Leagues in Circumference. [. . .] We have very little Rain till Winter, but then it rains two or three Months together [. . .]. I never learn’d the Mathematicks, therefore I will not pretend to tell you in what Latitude </span><i data-dcnode-id="2092"><span data-dcnode-id="2093" instrument_node="">Formosa</span></i><span data-dcnode-id="2091" instrument_node=""> lies, even the </span><i data-dcnode-id="2089"><span data-dcnode-id="2090" instrument_node="">European</span></i><span data-dcnode-id="2088" instrument_node=""> Geographers cannot agree where to place it, most of them indeed say it is under the Tropic of </span><i data-dcnode-id="2086"><span data-dcnode-id="2087" instrument_node="">Cancer</span></i><span data-dcnode-id="2085" instrument_node="">, and probably they may be in the right, for at Midsummer the Sun is exactly over our Heads [. . .].</span><a data-dcnode-id="2082" data-track="click" data-track-action="subsection anchor" data-track-label="link" href="#FPar1"><sup data-dcnode-id="2083"><span data-dcnode-id="2084" instrument_node="">5</span></sup></a></p><span data-dcnode-id="2080" instrument_node="">
</span></div></blockquote><span data-dcnode-id="2077" instrument_node="">
</span><p data-dcnode-id="2069"><span data-dcnode-id="2076" instrument_node="">Quick moves between descriptive narrative and its personal modification are obvious. The author first gives factual explanations of the situation of Formosa, referring to Japan, a real and better-known country. Then, he changes the description into a shared experience with his countrymen, using “we,” the first-person plural. After that, he brings in his personal observation, using the first-person singular like “I never learn’d the Mathematicks, therefore I will not pretend to tell you in what Latitude </span><i data-dcnode-id="2074"><span data-dcnode-id="2075" instrument_node="">Formosa</span></i><span data-dcnode-id="2073" instrument_node=""> lies.” However, the author does not continue the first-person narration; instead, he vindicates his position by stating that “even the </span><i data-dcnode-id="2071"><span data-dcnode-id="2072" instrument_node="">European</span></i><span data-dcnode-id="2070" instrument_node=""> Geographers cannot agree where to place it.” In the narrative, factual descriptions and personal observations are mixed, in such a way that it aroused the reader’s sympathy with the narrator’s personal experience. The reader now comes to feel like living in Formosa with the author and no longer tries to inquire after the veracity of historical or geographical facts.</span></p><p data-dcnode-id="2064"><span data-dcnode-id="2068" instrument_node="">The second characteristic of Psalmanazar’s narrative is that he often inserts critical comments on the reader’s conventional notions and effectively shocks his or her fixed idea. In the case of </span><i data-dcnode-id="2066"><span data-dcnode-id="2067" instrument_node="">Robinson Crusoe</span></i><span data-dcnode-id="2065" instrument_node=""> and its sequels, Defoe tactfully exploits the reader’s credulity and succeeds in changing the most unreal behaviour into a realistic one; however, Psalmanazar criticizes the reader’s fixed notion and by doing so, he forcibly draws the reader to his own context. In his preface to the second edition, Psalmanazar answers against the sixteenth possible objection from the reader:</span></p><blockquote class="c-blockquote" data-dcnode-id="2041"><div class="c-blockquote__body" data-dcnode-id="2042"><span data-dcnode-id="2063" instrument_node="">
</span><p data-dcnode-id="2055"><span data-dcnode-id="2062" instrument_node="">16 </span><i data-dcnode-id="2060"><span data-dcnode-id="2061" instrument_node="">Object</span></i><span data-dcnode-id="2059" instrument_node="">. But this tragical Story of </span><i data-dcnode-id="2057"><span data-dcnode-id="2058" instrument_node="">Meryaandanoo</span></i><span data-dcnode-id="2056" instrument_node=""> is so full of wonders, that it scarce can be credited.</span></p><span data-dcnode-id="2054" instrument_node="">
</span><p data-dcnode-id="2044"><i data-dcnode-id="2052"><span data-dcnode-id="2053" instrument_node="">Answer</span></i><span data-dcnode-id="2051" instrument_node="">. This is such a silly Objection, that I should not have taken notice of it, had it not given me a fair opportunity of putting the People of this Kingdom in mind of a far more wonderful Tragedy; I mean their falsely accusing, condemning, and at last contrary, directly contrary to their natural and sworn Allegiance, murthering King </span><i data-dcnode-id="2049"><span data-dcnode-id="2050" instrument_node="">Charles</span></i><span data-dcnode-id="2048" instrument_node=""> the First before his own Palace.</span><a data-dcnode-id="2045" data-track="click" data-track-action="subsection anchor" data-track-label="link" href="#FPar1"><sup data-dcnode-id="2046"><span data-dcnode-id="2047" instrument_node="">6</span></sup></a></p><span data-dcnode-id="2043" instrument_node="">
</span></div></blockquote><span data-dcnode-id="2040" instrument_node="">
</span><p data-dcnode-id="2038"><span data-dcnode-id="2039" instrument_node="">The story of Meryaandanoo’s murder of Chazadijn, a Japanese emperor, is full of grisly tricks and actions and therefore, the reader might think of it as a fiction far from daily occurrences in England. However, Psalmanazar, touching on the “murthering” of King Charles I (1600–49), easily generalizes such events of cruelty. By referring to the execution, Psalmanazar takes notice of the reader’s prejudice and skilfully makes the reader believe the strange and surprizing events in Formosa to be real.</span></p><p data-dcnode-id="2023"><span data-dcnode-id="2037" instrument_node="">The third characteristic of Psalmanazar’s narrative is the dexterity by which he intertwines the narrative thread of factual and imaginary matters. Different from Swift’s description of the scholars of the Academy of Projectors in </span><i data-dcnode-id="2035"><span data-dcnode-id="2036" instrument_node="">Gulliver’s Travels</span></i><span data-dcnode-id="2034" instrument_node=""> (Part III, Chapter </span><a data-dcnode-id="2032" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//doi.org/10.1007/978-981-16-4051-3_5"><span data-dcnode-id="2033" instrument_node="">5</span></a><span data-dcnode-id="2031" instrument_node="">), who try to invent new words and sentences, Psalmanazar’s explanation of the Formosan language is much more detailed and, as Keevak mentions, the reader naturally thinks that “Psalmanazar’s </span><i data-dcnode-id="2029"><span data-dcnode-id="2030" instrument_node="">alphabet</span></i><span data-dcnode-id="2028" instrument_node=""> might not be completely fictitious after all.”</span><a data-dcnode-id="2025" data-track="click" data-track-action="subsection anchor" data-track-label="link" href="#FPar1"><sup data-dcnode-id="2026"><span data-dcnode-id="2027" instrument_node="">7</span></sup></a><span data-dcnode-id="2024" instrument_node=""> Contrary to Swift, who satirically refers to an imaginary society where people do not have to use any words, Psalmanazar instead advances his explanation about the fictitious Formosan language, mixing it with reference to actual languages such&nbsp;as Japanese and Chinese:</span></p><blockquote class="c-blockquote" data-dcnode-id="1975"><div class="c-blockquote__body" data-dcnode-id="1976"><span data-dcnode-id="2022" instrument_node="">
</span><p data-dcnode-id="1978"><span data-dcnode-id="2021" instrument_node="">The reason why the </span><i data-dcnode-id="2019"><span data-dcnode-id="2020" instrument_node="">Japan</span></i><span data-dcnode-id="2018" instrument_node=""> Language differs from that of the </span><i data-dcnode-id="2016"><span data-dcnode-id="2017" instrument_node="">Chinese</span></i><span data-dcnode-id="2015" instrument_node=""> and </span><i data-dcnode-id="2013"><span data-dcnode-id="2014" instrument_node="">Formosans</span></i><span data-dcnode-id="2012" instrument_node="">, is this, because the </span><i data-dcnode-id="2010"><span data-dcnode-id="2011" instrument_node="">Japanese</span></i><span data-dcnode-id="2009" instrument_node=""> being for their Rebellion banish’d from </span><i data-dcnode-id="2007"><span data-dcnode-id="2008" instrument_node="">China</span></i><span data-dcnode-id="2006" instrument_node="">, settled in the Isles of </span><i data-dcnode-id="2004"><span data-dcnode-id="2005" instrument_node="">Japan</span></i><span data-dcnode-id="2003" instrument_node="">; upon which account they so much hate the </span><i data-dcnode-id="2001"><span data-dcnode-id="2002" instrument_node="">Chinese</span></i><span data-dcnode-id="2000" instrument_node="">, that they have chang’d all things they had in common with them, as to their Language, Laws, Religion, Habits, &amp;c. So that there is no affinity between the </span><i data-dcnode-id="1998"><span data-dcnode-id="1999" instrument_node="">Japan</span></i><span data-dcnode-id="1997" instrument_node=""> and </span><i data-dcnode-id="1995"><span data-dcnode-id="1996" instrument_node="">Chinese</span></i><span data-dcnode-id="1994" instrument_node=""> Language. But the </span><i data-dcnode-id="1992"><span data-dcnode-id="1993" instrument_node="">Japanese</span></i><span data-dcnode-id="1991" instrument_node=""> being the first Inhabitants of </span><i data-dcnode-id="1989"><span data-dcnode-id="1990" instrument_node="">Formosa</span></i><span data-dcnode-id="1988" instrument_node="">, brought their Language along with them into that Island, which is now much more perfect than it was at their first coming. Yet the </span><i data-dcnode-id="1986"><span data-dcnode-id="1987" instrument_node="">Formosans</span></i><span data-dcnode-id="1985" instrument_node=""> preserve still the purity of their Language without any considerable alteration, whereas the </span><i data-dcnode-id="1983"><span data-dcnode-id="1984" instrument_node="">Japanese</span></i><span data-dcnode-id="1982" instrument_node=""> are continually changing and improving it every Day.</span><a data-dcnode-id="1979" data-track="click" data-track-action="subsection anchor" data-track-label="link" href="#FPar1"><sup data-dcnode-id="1980"><span data-dcnode-id="1981" instrument_node="">8</span></sup></a></p><span data-dcnode-id="1977" instrument_node="">
</span></div></blockquote><span data-dcnode-id="1974" instrument_node="">
</span><p data-dcnode-id="1972"><span data-dcnode-id="1973" instrument_node="">We can see here again that Psalmanazar employs Japan and China in order to explain Formosa. Or, to be more precise, what he wants to say here is not the details of the language of Formosa. He simply states that the language of Formosa is different from Japanese and Chinese, and this description itself is not false.</span></p><p data-dcnode-id="1970"><span data-dcnode-id="1971" instrument_node="">Psalmanazar calls Formosa “An Island subject to the Emperor of Japan” and frequently refers to Japan. This tactic is essential because it makes the reader believe the fictitious story about Formosa as real and faithful. By frequent references to Japan, he succeeds in providing an important glimpse of reality to support his exquisite fraud or fiction.</span></p></div></div></section><section data-dcnode-id="1813" data-title="Japan in Swift’s Gulliver’s Travels"><div class="c-article-section" data-dcnode-id="1814" id="Sec3-section"><h2 class="c-article-section__title js-section-title js-c-reading-companion-sections-item" data-dcnode-id="1962" id="Sec3"><span data-dcnode-id="1966" instrument_node="">Japan in Swift’s </span><b data-dcnode-id="1963"><i data-dcnode-id="1964"><span data-dcnode-id="1965" instrument_node="">Gulliver’s Travels</span></i></b></h2><div class="c-article-section__content" data-dcnode-id="1815" id="Sec3-content"><p data-dcnode-id="1952"><span data-dcnode-id="1961" instrument_node="">Contrary to Defoe, Swift describes Japan as the only real country that the protagonist visits in </span><i data-dcnode-id="1959"><span data-dcnode-id="1960" instrument_node="">Gulliver’s Travels</span></i><span data-dcnode-id="1958" instrument_node="">. In and around 1709 when Gulliver is supposed to visit Japan, the country had already started its national seclusion and in actuality, it is not probable for an English man to land in the country. In fact, the last chapter of Part III of </span><i data-dcnode-id="1956"><span data-dcnode-id="1957" instrument_node="">Gulliver’s </span></i><i data-dcnode-id="1954"><span data-dcnode-id="1955" instrument_node="">Travels</span></i><span data-dcnode-id="1953" instrument_node=""> where Swift describes Gulliver’s stay in Japan is very short and the description seems to be perfunctory.</span></p><p data-dcnode-id="1895"><span data-dcnode-id="1951" instrument_node="">We should note, however, that Swift refers to Japan not only in the last chapter of Part III, but also in some other scenes throughout the work. For instance, the ship which rescues Gulliver at the end of Part I is that of “an </span><i data-dcnode-id="1949"><span data-dcnode-id="1950" instrument_node="">English</span></i><span data-dcnode-id="1948" instrument_node=""> Merchant-man, returning from </span><i data-dcnode-id="1946"><span data-dcnode-id="1947" instrument_node="">Japan</span></i><span data-dcnode-id="1945" instrument_node=""> by the </span><i data-dcnode-id="1943"><span data-dcnode-id="1944" instrument_node="">North</span></i><span data-dcnode-id="1942" instrument_node=""> and </span><i data-dcnode-id="1940"><span data-dcnode-id="1941" instrument_node="">South</span></i><span data-dcnode-id="1939" instrument_node=""> Seas.”</span><a data-dcnode-id="1936" data-track="click" data-track-action="subsection anchor" data-track-label="link" href="#FPar1"><sup data-dcnode-id="1937"><span data-dcnode-id="1938" instrument_node="">9</span></sup></a><span data-dcnode-id="1935" instrument_node=""> In Part II, Gulliver is proud of his discovery of the country of Brobdingnag and says: “I cannot but conclude, that our Geographers of </span><i data-dcnode-id="1933"><span data-dcnode-id="1934" instrument_node="">Europe</span></i><span data-dcnode-id="1932" instrument_node=""> are in a great Error, by supposing nothing but Sea between </span><i data-dcnode-id="1930"><span data-dcnode-id="1931" instrument_node="">Japan</span></i><span data-dcnode-id="1929" instrument_node=""> and </span><i data-dcnode-id="1927"><span data-dcnode-id="1928" instrument_node="">California</span></i><span data-dcnode-id="1926" instrument_node="">.”</span><a data-dcnode-id="1923" data-track="click" data-track-action="subsection anchor" data-track-label="link" href="#FPar1"><sup data-dcnode-id="1924"><span data-dcnode-id="1925" instrument_node="">10</span></sup></a><span data-dcnode-id="1922" instrument_node=""> And in Part III, “a </span><i data-dcnode-id="1920"><span data-dcnode-id="1921" instrument_node="">Japanese</span></i><span data-dcnode-id="1919" instrument_node=""> Captain” of “the largest of the two Pyrate Ships” that overtakes Gulliver’s vessel permits his release by setting him adrift in a small canoe; this is the trigger of his new voyages to Laputa and Balnibarbi.</span><a data-dcnode-id="1916" data-track="click" data-track-action="subsection anchor" data-track-label="link" href="#FPar1"><sup data-dcnode-id="1917"><span data-dcnode-id="1918" instrument_node="">11</span></sup></a><span data-dcnode-id="1915" instrument_node=""> More interestingly, Gulliver makes an enigmatic comment on Japan just after his visit to </span><i data-dcnode-id="1913"><span data-dcnode-id="1914" instrument_node="">Struldbruggs</span></i><span data-dcnode-id="1912" instrument_node="">, the society of people who never die: “I thought this Account of the </span><i data-dcnode-id="1910"><span data-dcnode-id="1911" instrument_node="">Struldbruggs</span></i><span data-dcnode-id="1909" instrument_node=""> might be some Entertainment to the Reader [...] There is indeed a perpetual Commerce between this Kingdom and the great Empire of </span><i data-dcnode-id="1907"><span data-dcnode-id="1908" instrument_node="">Japan</span></i><span data-dcnode-id="1906" instrument_node="">; and it is very probable that the </span><i data-dcnode-id="1904"><span data-dcnode-id="1905" instrument_node="">Japanese</span></i><span data-dcnode-id="1903" instrument_node=""> Authors may have given some Account of the </span><i data-dcnode-id="1901"><span data-dcnode-id="1902" instrument_node="">Struldbruggs</span></i><span data-dcnode-id="1900" instrument_node="">.”</span><a data-dcnode-id="1897" data-track="click" data-track-action="subsection anchor" data-track-label="link" href="#FPar1"><sup data-dcnode-id="1898"><span data-dcnode-id="1899" instrument_node="">12</span></sup></a><span data-dcnode-id="1896" instrument_node=""> Why does Swift often refer to Japan throughout the work?</span></p><p data-dcnode-id="1859"><span data-dcnode-id="1894" instrument_node="">There are some Japanese popular travel narratives published in late eighteenth and early nineteenth centuries that have resemblances to </span><i data-dcnode-id="1892"><span data-dcnode-id="1893" instrument_node="">Gulliver’s Travels</span></i><span data-dcnode-id="1891" instrument_node=""> such as </span><i data-dcnode-id="1889"><span data-dcnode-id="1890" instrument_node="">Furyu-Shidoken-den</span></i><span data-dcnode-id="1888" instrument_node=""> (</span><i data-dcnode-id="1886"><span data-dcnode-id="1887" instrument_node="">The Surprizing Life and Adventures of Shidoken, A Man of Taste</span></i><span data-dcnode-id="1885" instrument_node="">, 1763) by Gennai&nbsp;Hiraga (1728–80), a versatile man of letters who was proficient in the Dutch, </span><i data-dcnode-id="1883"><span data-dcnode-id="1884" instrument_node="">Wasobyoe</span></i><span data-dcnode-id="1882" instrument_node=""> (</span><i data-dcnode-id="1880"><span data-dcnode-id="1881" instrument_node="">The Surprizing Life and Adventures of Wasobyoe</span></i><span data-dcnode-id="1879" instrument_node="">, 1774) by Yukokushi (fl. 1770s), a writer whose life was unknown, and </span><i data-dcnode-id="1877"><span data-dcnode-id="1878" instrument_node="">Musobyoe</span></i><span data-dcnode-id="1876" instrument_node=""> (</span><i data-dcnode-id="1874"><span data-dcnode-id="1875" instrument_node="">Tales of the Life and Adventures of Musobyoe</span></i><span data-dcnode-id="1873" instrument_node="">, 1810) by Bakin Takizawa (1767–1848), a popular author of late Edo period.</span><a data-dcnode-id="1870" data-track="click" data-track-action="subsection anchor" data-track-label="link" href="#FPar1"><sup data-dcnode-id="1871"><span data-dcnode-id="1872" instrument_node="">13</span></sup></a><span data-dcnode-id="1869" instrument_node=""> Although these works of Swiftian fiction had been regarded as partial Japanese adaptations of the original through the Dutch translation, yet none of these authors seem to have taken trouble to consult a Dutch version of </span><i data-dcnode-id="1867"><span data-dcnode-id="1868" instrument_node="">Gulliver’s Travels</span></i><span data-dcnode-id="1866" instrument_node=""> that was rare and expensive at the time in Japan. Taking this situation into consideration, we cannot deny the possibility, as William A. Eddy once discussed, that Swift came to be familiar with some stories of Japanese or Chinese origin from a few sources in common with those Japanese fictional travel narratives. Reading B. H. Chamberlain’s translation of </span><i data-dcnode-id="1864"><span data-dcnode-id="1865" instrument_node="">Wasobyoe</span></i><span data-dcnode-id="1863" instrument_node=""> in which people who never die appear, Eddy notices the importance of the relationship between some stories of Japanese or Chinese origin and </span><i data-dcnode-id="1861"><span data-dcnode-id="1862" instrument_node="">Gulliver’s Travels</span></i><span data-dcnode-id="1860" instrument_node=""> and claims the possibility that the original of the former might be one of the sources of the latter, and not vice versa:</span></p><blockquote class="c-blockquote" data-dcnode-id="1844"><div class="c-blockquote__body" data-dcnode-id="1845"><span data-dcnode-id="1858" instrument_node="">
</span><p data-dcnode-id="1847"><span data-dcnode-id="1857" instrument_node="">To begin with, the date of the earliest known edition of </span><i data-dcnode-id="1855"><span data-dcnode-id="1856" instrument_node="">Wasobyoe</span></i><span data-dcnode-id="1854" instrument_node="">, 1774, means little or nothing. The story may have circulated long before, in forms now lost. [. . .] Then, also, the fact that Japan deliberately shut herself off from European influences for a long period of years, would make it more likely that the Dutch traders would bring back a Japanese tale to Europe, than that a Japanese author should copy the work of an Englishman. [. . .] It is certainly possible that Swift may have got hold somehow of the story of </span><i data-dcnode-id="1852"><span data-dcnode-id="1853" instrument_node="">Wasobyoe</span></i><span data-dcnode-id="1851" instrument_node="">, perhaps from the Dutch traders themselves, while he was secretary to Sir William Temple.</span><a data-dcnode-id="1848" data-track="click" data-track-action="subsection anchor" data-track-label="link" href="#FPar1"><sup data-dcnode-id="1849"><span data-dcnode-id="1850" instrument_node="">14</span></sup></a></p><span data-dcnode-id="1846" instrument_node="">
</span></div></blockquote><span data-dcnode-id="1843" instrument_node="">
</span><p data-dcnode-id="1838"><span data-dcnode-id="1842" instrument_node="">Here Eddy concisely remarks on the possibility that Swift already knew the stories of Japanese or Chinese origin like </span><i data-dcnode-id="1840"><span data-dcnode-id="1841" instrument_node="">Wasobyoe</span></i><span data-dcnode-id="1839" instrument_node=""> in his years at William Temple’s Moor Park house in Surrey.</span></p><p data-dcnode-id="1824"><span data-dcnode-id="1837" instrument_node="">There seems to be considerable validity to Eddy’s hypothesis, although it should not be pushed too far. Certainly, some Japanese or Chinese books and maps in which fanciful people and nations appear are supposed to have more or less circulated in England or in Europe in late seventeenth and early eighteenth centuries. Swift might see, for example, </span><i data-dcnode-id="1835"><span data-dcnode-id="1836" instrument_node="">Naaukeurige Versameling der Gedenk-Waardigste Zee en Land-Reysen</span></i><span data-dcnode-id="1834" instrument_node=""> (</span><i data-dcnode-id="1832"><span data-dcnode-id="1833" instrument_node="">A Series of Accounts of Famous Voyages</span></i><span data-dcnode-id="1831" instrument_node="">), published in Holland in 1707, in which a map of Japan with an illustration of the imaginary audience of William Adams with Tokugawa Shogun was included, and extend his creative imagination to rather mystic customs and cultures of Japan. However, for the present moment, we cannot identify some specific maps or stories with which Swift was actually familiar as the sources of </span><i data-dcnode-id="1829"><span data-dcnode-id="1830" instrument_node="">Gulliver’s Travels</span></i><span data-dcnode-id="1828" instrument_node=""> and we should leave the details to further consideration.</span><a data-dcnode-id="1825" data-track="click" data-track-action="subsection anchor" data-track-label="link" href="#FPar1"><sup data-dcnode-id="1826"><span data-dcnode-id="1827" instrument_node="">15</span></sup></a></p><p data-dcnode-id="1816"><span data-dcnode-id="1823" instrument_node="">A more promising discussion is now about the reason why Swift chose Japan in </span><i data-dcnode-id="1821"><span data-dcnode-id="1822" instrument_node="">Gulliver’s Travels</span></i><span data-dcnode-id="1820" instrument_node=""> as an object of frequent but rather minor references. Gulliver makes round-trips between England and fanciful worlds four times within fifteen years and, by making him do so, Swift succeeds in reflecting his satirical insight into human society onto unreal, fictional, but exquisite worlds. One of the reasons why the reader of </span><i data-dcnode-id="1818"><span data-dcnode-id="1819" instrument_node="">Gulliver’s Travels</span></i><span data-dcnode-id="1817" instrument_node=""> can feel a sense of reality for such unreal worlds is that the experience of round-trips between reality and unreality can be shared with Gulliver. In this context, Japan was nicely situated, as it were, on the way between England and several remote nations; for, it was not a simple fictional country, but a real one; nevertheless it was hazy for English people in many ways. Therefore, giving reference to Japan as a knot between fiction and reality, Swift succeeds in making the characteristic framework of the work stand out and in drawing the reader’s attention to the reality of satirical descriptions in the unreal worlds. Explanation should be reduced to a minimum in order to clarify a good contrast between satirical fiction and real societies; however, Japan was important for Swift in providing reality for unreal countries and vitalizing them.</span></p></div></div></section><section data-dcnode-id="1578" data-title="Why Does Crusoe Give up His Visit to Japan?―Defoe’s Strategy for Realistic Narrative"><div class="c-article-section" data-dcnode-id="1579" id="Sec4-section"><h2 class="c-article-section__title js-section-title js-c-reading-companion-sections-item" data-dcnode-id="1811" id="Sec4"><span data-dcnode-id="1812" instrument_node="">Why Does Crusoe Give up His Visit to Japan?―Defoe’s Strategy for Realistic Narrative</span></h2><div class="c-article-section__content" data-dcnode-id="1580" id="Sec4-content"><p data-dcnode-id="1787"><i data-dcnode-id="1809"><span data-dcnode-id="1810" instrument_node="">The Farther Adventures of Robinson Crusoe</span></i><span data-dcnode-id="1808" instrument_node=""> was published as&nbsp;the continuation of </span><i data-dcnode-id="1806"><span data-dcnode-id="1807" instrument_node="">Robinson Crusoe</span></i><span data-dcnode-id="1805" instrument_node=""> (</span><i data-dcnode-id="1803"><span data-dcnode-id="1804" instrument_node="">The Life and Strange Surprizing Adventures of Robinson Crusoe</span></i><span data-dcnode-id="1802" instrument_node="">, 1719). In </span><i data-dcnode-id="1800"><span data-dcnode-id="1801" instrument_node="">The Farther Adventures</span></i><span data-dcnode-id="1799" instrument_node="">, Crusoe starts his travels after going back to the island where once he lived, visits Madagascar and some Southeast Asian countries including China, and returns to England through Siberia. References to Japan appear in the scene just before his party reaches Peking; Crusoe relinquishes his plan of sailing across the sea to Japan and, instead of him, “my young Man,” one of Crusoe’s younger friends, goes to Japan.</span><a data-dcnode-id="1796" data-track="click" data-track-action="subsection anchor" data-track-label="link" href="#FPar1"><sup data-dcnode-id="1797"><span data-dcnode-id="1798" instrument_node="">16</span></sup></a><span data-dcnode-id="1795" instrument_node=""> He&nbsp;comes back to England as a wealthy merchant eight years after. Crusoe here inserts a meaningful sentence in his narrative: “I shall take Notice in its Place.”</span><a data-dcnode-id="1792" data-track="click" data-track-action="subsection anchor" data-track-label="link" href="#FPar1"><sup data-dcnode-id="1793"><span data-dcnode-id="1794" instrument_node="">17</span></sup></a><span data-dcnode-id="1791" instrument_node=""> In the end, Defoe finished Crusoe’s narration without mentioning the details of the young man’s conduct in Japan. Why did Defoe make the protagonist give up on sailing to Japan and postpone the narration about Japan? In this section, we will first examine some descriptions in </span><i data-dcnode-id="1789"><span data-dcnode-id="1790" instrument_node="">Robinson Crusoe</span></i><span data-dcnode-id="1788" instrument_node=""> to understand Defoe’s characteristic strategies for making realistic fiction and then consider the question above.</span></p><p data-dcnode-id="1785"><span data-dcnode-id="1786" instrument_node="">Defoe first started his career as a hosier, but soon changed it to a journalist. He was versatile and erudite; he liked reading and collecting books. Acute observations of people and societies through the eyes of a journalist as well as his wide range of knowledge about history and geography of many countries enabled him to make elaborate descriptions of protagonists’ lives and adventures. Different from Psalmanazar, Defoe did not intend an imposture; he created his fiction on the basis of his familiarity with its stage and circumstances.</span></p><p data-dcnode-id="1774"><span data-dcnode-id="1784" instrument_node="">In fact, the first-person narrative of the protagonist in </span><i data-dcnode-id="1782"><span data-dcnode-id="1783" instrument_node="">Robinson Crusoe</span></i><span data-dcnode-id="1781" instrument_node=""> and </span><i data-dcnode-id="1779"><span data-dcnode-id="1780" instrument_node="">The Farther Adventures</span></i><span data-dcnode-id="1778" instrument_node=""> is smoothly developed with Crusoe’s autobiographical narration. This characteristic technique appears from the outset of </span><i data-dcnode-id="1776"><span data-dcnode-id="1777" instrument_node="">Robinson Crusoe</span></i><span data-dcnode-id="1775" instrument_node="">:</span></p><blockquote class="c-blockquote" data-dcnode-id="1741"><div class="c-blockquote__body" data-dcnode-id="1742"><span data-dcnode-id="1773" instrument_node="">
</span><p data-dcnode-id="1744"><span data-dcnode-id="1772" instrument_node="">I Was born in the Year 1632, in the City of </span><i data-dcnode-id="1770"><span data-dcnode-id="1771" instrument_node="">York</span></i><span data-dcnode-id="1769" instrument_node=""> [. . .] my Father being a Foreigner of </span><i data-dcnode-id="1767"><span data-dcnode-id="1768" instrument_node="">Bremen</span></i><span data-dcnode-id="1766" instrument_node="">, who settled first at </span><i data-dcnode-id="1764"><span data-dcnode-id="1765" instrument_node="">Hull</span></i><span data-dcnode-id="1763" instrument_node="">: he got a good Estate by Merchandise, and leaving off his Trade, lived afterward at </span><i data-dcnode-id="1761"><span data-dcnode-id="1762" instrument_node="">York</span></i><span data-dcnode-id="1760" instrument_node="">, from whence he had married my Mother, whose Relations were named </span><i data-dcnode-id="1758"><span data-dcnode-id="1759" instrument_node="">Robinson</span></i><span data-dcnode-id="1757" instrument_node="">, a very good Family in that Country, and from whom I was called </span><i data-dcnode-id="1755"><span data-dcnode-id="1756" instrument_node="">Robinson Kreutznaer</span></i><span data-dcnode-id="1754" instrument_node="">; but by the usual Corruption of Words in </span><i data-dcnode-id="1752"><span data-dcnode-id="1753" instrument_node="">England</span></i><span data-dcnode-id="1751" instrument_node="">, we are now called, nay we call our selves, and write our Name </span><i data-dcnode-id="1749"><span data-dcnode-id="1750" instrument_node="">Crusoe</span></i><span data-dcnode-id="1748" instrument_node="">, and so my Companions always call’d me.</span><a data-dcnode-id="1745" data-track="click" data-track-action="subsection anchor" data-track-label="link" href="#FPar1"><sup data-dcnode-id="1746"><span data-dcnode-id="1747" instrument_node="">18</span></sup></a></p><span data-dcnode-id="1743" instrument_node="">
</span></div></blockquote><span data-dcnode-id="1740" instrument_node="">
</span><p data-dcnode-id="1735"><span data-dcnode-id="1739" instrument_node="">Beginning with his birth and family, Crusoe explains the transition of the way he is called, the way he calls himself, and the way he writes his name; through this self-designation, the protagonist makes sure of his social position and based on that identity, he narrates his travels. Different from the narrator’s tense unreliability as well as his misanthropy that the reader of </span><i data-dcnode-id="1737"><span data-dcnode-id="1738" instrument_node="">Gulliver’s Travels</span></i><span data-dcnode-id="1736" instrument_node=""> feels, Crusoe’s narrative provides comfortable reliability for the reader.</span></p><p data-dcnode-id="1733"><span data-dcnode-id="1734" instrument_node="">One of Defoe’s characteristic manoeuvres of realistic description may be well observed in the scene where Crusoe narrates his departure from Brazil and finally reaches to the deserted island. The description seems to be factual:</span></p><blockquote class="c-blockquote" data-dcnode-id="1721"><div class="c-blockquote__body" data-dcnode-id="1722"><span data-dcnode-id="1732" instrument_node="">
</span><p data-dcnode-id="1724"><span data-dcnode-id="1731" instrument_node="">The same Day I went on board we set sail, standing away to the Northward upon our own Coast, with Design to stretch over for the </span><i data-dcnode-id="1729"><span data-dcnode-id="1730" instrument_node="">Affrican</span></i><span data-dcnode-id="1728" instrument_node=""> Coast when they came about 10 or 12 Degrees of Northern Latitude, which, it seems was the manner of Course in those days. [. . .] in this Course we past the Line in about 12 Days time, and were by our last Observation in 7 Degrees 22 Min. Northern Latitude, when a violent Tournado or Hurricane took us quite out of our Knowledge; it began from the South-East, came about to the North-West, and then settled into the North-East, from whence it blew in such a terrible manner, that for twelve Days together we could do nothing but drive, and scudding away before it, let it carry us whither ever Fate and the Fury of the Winds directed; and during these twelve Days, I need not say, that I expected every Day to be swallowed up, nor indeed did any in the Ship expect to save their Lives.</span><a data-dcnode-id="1725" data-track="click" data-track-action="subsection anchor" data-track-label="link" href="#FPar1"><sup data-dcnode-id="1726"><span data-dcnode-id="1727" instrument_node="">19</span></sup></a></p><span data-dcnode-id="1723" instrument_node="">
</span></div></blockquote><span data-dcnode-id="1720" instrument_node="">
</span><p data-dcnode-id="1718"><span data-dcnode-id="1719" instrument_node="">Some readers might be skeptical about the details of the course of the ship, its position, or the direction that the tornado comes, but they are not doubtful of the veracity of the description about the fear and the sense of helplessness that the crew feel. However, if we take manuals of contemporary seamanship as well as the narratives of real voyages into consideration, we can find out that it is impossible for all members of the crew “for twelve Days together” to “do nothing but drive” after being hit by “a Tournado or Hurricane…whither ever Fate and Fury of the Winds directed.” For, sailing ships would go down immediately in such violent weather if any seaman did nothing; all the crew must be engaged in steering many sails, corresponding to minute changes of winds, and the master needs to give detailed directions to every seaman moment by moment.</span></p><p data-dcnode-id="1716"><span data-dcnode-id="1717" instrument_node="">In a sense, it is ironic that one of the most vivid descriptions is illusory and the reader does not feel any scepticism about its reality; the apparently realistic description is most deceitful and not real. Defoe’s most dexterous narrative device is observed here. His narrative is always easily understandable and credible, even if it tells fictitious events, and because of this, he succeeds in establishing his own form of prose fiction.</span></p><p data-dcnode-id="1705"><span data-dcnode-id="1715" instrument_node="">Defoe’s narrative is clearly different from Swift’s. Defoe does not like writing extraordinary adventures like Gulliver’s; instead, he usually sets the main stage at a place where he and the reader are familiar to some degree. Even on the deserted island, each event the protagonist encounters and his actions are natural. We can even say that Defoe’s chosen settings for Crusoe’s adventures do not seem to be artificial; the voyages are located in the main stage of the triangular trade flourishing at the time, and those for his second travels in Eurasia are situated in a second promising direction for contemporary English merchants. Although Defoe harboured a trading scheme for South America as observed in his </span><i data-dcnode-id="1713"><span data-dcnode-id="1714" instrument_node="">A New Voyage round the World</span></i><span data-dcnode-id="1712" instrument_node=""> (1724), such places like Australia, the west coast of North America, and the islands of the Pacific Ocean as Swift dealt with in his </span><i data-dcnode-id="1710"><span data-dcnode-id="1711" instrument_node="">Gulliver’s Travels</span></i><span data-dcnode-id="1709" instrument_node=""> were not attractive for Defoe, because many of those places were unfamiliar for most of the readers at the time. Swift felt magnetism for making his fiction in those places; on the other hand, they were not suitable for Defoe’s creativity.</span><a data-dcnode-id="1706" data-track="click" data-track-action="subsection anchor" data-track-label="link" href="#FPar1"><sup data-dcnode-id="1707"><span data-dcnode-id="1708" instrument_node="">20</span></sup></a></p><p data-dcnode-id="1690"><span data-dcnode-id="1704" instrument_node="">Defoe’s inclination to contriving realistic details can also be observed in his use of sources and factual materials. One of the important sources he used for writing </span><i data-dcnode-id="1702"><span data-dcnode-id="1703" instrument_node="">The Farther Adventures</span></i><span data-dcnode-id="1701" instrument_node=""> is supposed to be Adam Brand’s </span><i data-dcnode-id="1699"><span data-dcnode-id="1700" instrument_node="">A Journal of an Embassy from Their Majesties John and Peter Alexowits, Emperors of Muscovy, &amp;c. into China</span></i><span data-dcnode-id="1698" instrument_node="">, published in 1698.</span><a data-dcnode-id="1695" data-track="click" data-track-action="subsection anchor" data-track-label="link" href="#FPar1"><sup data-dcnode-id="1696"><span data-dcnode-id="1697" instrument_node="">21</span></sup></a><span data-dcnode-id="1694" instrument_node=""> Brand’s </span><i data-dcnode-id="1692"><span data-dcnode-id="1693" instrument_node="">Journal</span></i><span data-dcnode-id="1691" instrument_node=""> is a faithful travel narrative; exact dates of the travellers’ itinerary, geographical features of cities and countries, climate, weather, people’s behaviour, languages, and other remarkable cultural characteristics are reported therein. When the party enters the city of Peking, Brand begins his explanation with the origin of the name, the location, and other external features:</span></p><blockquote class="c-blockquote" data-dcnode-id="1657"><div class="c-blockquote__body" data-dcnode-id="1658"><span data-dcnode-id="1689" instrument_node="">
</span><p data-dcnode-id="1660"><span data-dcnode-id="1688" instrument_node="">The City of </span><i data-dcnode-id="1686"><span data-dcnode-id="1687" instrument_node="">Peking</span></i><span data-dcnode-id="1685" instrument_node="">, the Capital of the Empire, and Residence of its Kings, has borrowed its Name from the province of </span><i data-dcnode-id="1683"><span data-dcnode-id="1684" instrument_node="">Peking</span></i><span data-dcnode-id="1682" instrument_node="">, which on the East Borders on the great Gulph betwixt </span><i data-dcnode-id="1680"><span data-dcnode-id="1681" instrument_node="">Corea</span></i><span data-dcnode-id="1679" instrument_node=""> and </span><i data-dcnode-id="1677"><span data-dcnode-id="1678" instrument_node="">Japan</span></i><span data-dcnode-id="1676" instrument_node="">; on the North-East upon the Province of </span><i data-dcnode-id="1674"><span data-dcnode-id="1675" instrument_node="">Leaotung</span></i><span data-dcnode-id="1673" instrument_node="">, on the North upon the </span><i data-dcnode-id="1671"><span data-dcnode-id="1672" instrument_node="">Great Tartary</span></i><span data-dcnode-id="1670" instrument_node="">, and part of </span><i data-dcnode-id="1668"><span data-dcnode-id="1669" instrument_node="">Chinese</span></i><span data-dcnode-id="1667" instrument_node=""> Wall, and on the West the province of </span><i data-dcnode-id="1665"><span data-dcnode-id="1666" instrument_node="">Xansi</span></i><span data-dcnode-id="1664" instrument_node="">.</span><a data-dcnode-id="1661" data-track="click" data-track-action="subsection anchor" data-track-label="link" href="#FPar1"><sup data-dcnode-id="1662"><span data-dcnode-id="1663" instrument_node="">22</span></sup></a></p><span data-dcnode-id="1659" instrument_node="">
</span></div></blockquote><span data-dcnode-id="1656" instrument_node="">
</span><p data-dcnode-id="1650"><span data-dcnode-id="1655" instrument_node="">Then, some comments on the behaviour of the inhabitants follow: “All the Chinese women are of a very low Stature, those of Quality have very little Feet, in which they take a particular pride, for which reason they keep them extraordinary straightened, to such an excess, that many thereby quite lose the use of their Feet.”</span><a data-dcnode-id="1652" data-track="click" data-track-action="subsection anchor" data-track-label="link" href="#FPar1"><sup data-dcnode-id="1653"><span data-dcnode-id="1654" instrument_node="">23</span></sup></a><span data-dcnode-id="1651" instrument_node=""> On the other hand, assimilating Brand’s faithful description, Defoe transforms it to an easily imaginable and attractive fiction for the reader:</span></p><blockquote class="c-blockquote" data-dcnode-id="1638"><div class="c-blockquote__body" data-dcnode-id="1639"><span data-dcnode-id="1649" instrument_node="">
</span><p data-dcnode-id="1641"><span data-dcnode-id="1648" instrument_node="">We were five and twenty Days travelling to </span><i data-dcnode-id="1646"><span data-dcnode-id="1647" instrument_node="">Peking</span></i><span data-dcnode-id="1645" instrument_node="">, through a Country infinitely populous, but miserably cultivated; the Husbandry, the Oeconomy, and the Way of living, miserable; tho’ they boast so much of the Industry of the People; I say, miserable, and so it is, if we who understand how to live were to endure it, or to compare it with our own, but not so to these poor Wretches who know no other [. . .].</span><a data-dcnode-id="1642" data-track="click" data-track-action="subsection anchor" data-track-label="link" href="#FPar1"><sup data-dcnode-id="1643"><span data-dcnode-id="1644" instrument_node="">24</span></sup></a></p><span data-dcnode-id="1640" instrument_node="">
</span></div></blockquote><span data-dcnode-id="1637" instrument_node="">
</span><p data-dcnode-id="1635"><span data-dcnode-id="1636" instrument_node="">Here Crusoe does not explain in detail the history and the geography of China. Different from Brand, he simply discusses his idea of its “miserable” condition. Usually, Brand does not use the first-person narration, but Defoe’s explanation is straightforwardly narrated in this way; this immediacy of the narrator is favourable for the reader who comes to believe the narrative as reliable and factual.</span></p><p data-dcnode-id="1630"><span data-dcnode-id="1634" instrument_node="">It is when Crusoe’s party stays in Quinchang just before entering Peking&nbsp;that references to Japan appear in </span><i data-dcnode-id="1632"><span data-dcnode-id="1633" instrument_node="">The Farther Adventures</span></i><span data-dcnode-id="1631" instrument_node="">. At first, Crusoe is pleased to hear the idea of going to Japan to extend his trade, but in the end, he abandons the idea because of the danger accompanying it and instead he leaves the visit to Japan to the hands of his younger friend who offers to embark upon it:</span></p><blockquote class="c-blockquote" data-dcnode-id="1609"><div class="c-blockquote__body" data-dcnode-id="1610"><span data-dcnode-id="1629" instrument_node="">
</span><p data-dcnode-id="1612"><span data-dcnode-id="1628" instrument_node="">[. . .] my Partner, wiser than my self, persuaded me from it [going to Japan], representing the dangers as well as of the Seas, as of the </span><i data-dcnode-id="1626"><span data-dcnode-id="1627" instrument_node="">Japoness</span></i><span data-dcnode-id="1625" instrument_node="">, who are a false, cruel, and treacherous People [. . .]. But to bring this long Turn of our Affairs to a Conclusion; the first Thing we had to do, was to consult with the Captain of the Ship, and with his Men, and know if they were willing to go to </span><i data-dcnode-id="1623"><span data-dcnode-id="1624" instrument_node="">Japan</span></i><span data-dcnode-id="1622" instrument_node="">; and while I was doing this, the young Man [. . .] came to me, and told me, that he thought that Voyage promised very fair, and that there was a great Prospect of Advantage, and he would be very glad if I undertook it; but if I would not, and would give him leave, he would go as a Merchant, or how I pleas’d to order him; that if ever he came to </span><i data-dcnode-id="1620"><span data-dcnode-id="1621" instrument_node="">England</span></i><span data-dcnode-id="1619" instrument_node="">, and I was there and alive, he would render me a faithful Account of his Success, and it should be as much mine as I pleas’d. [. . .] about eight Years after, [he] came to </span><i data-dcnode-id="1617"><span data-dcnode-id="1618" instrument_node="">England</span></i><span data-dcnode-id="1616" instrument_node=""> exceedingly Rich; of the which, I shall take Notice in its Place [. . .].</span><a data-dcnode-id="1613" data-track="click" data-track-action="subsection anchor" data-track-label="link" href="#FPar1"><sup data-dcnode-id="1614"><span data-dcnode-id="1615" instrument_node="">25</span></sup></a></p><span data-dcnode-id="1611" instrument_node="">
</span></div></blockquote><span data-dcnode-id="1608" instrument_node="">
</span><p data-dcnode-id="1603"><span data-dcnode-id="1607" instrument_node="">Here Defoe might hurry up with Crusoe’s return to England, cutting off a detailed description of Japan, but it seems reasonable to suppose that Defoe originally brooded over a plan of describing the protagonist’s voyage to Japan. For, if he had had no idea about the voyage to Japan from the outset of writing </span><i data-dcnode-id="1605"><span data-dcnode-id="1606" instrument_node="">The Farther Adventures</span></i><span data-dcnode-id="1604" instrument_node="">, he would not have taken the trouble to refer to Japan in the scene of Quinchang and to allude to the future of the young man.</span></p><p data-dcnode-id="1581"><span data-dcnode-id="1602" instrument_node="">Why then didn’t Defoe make Crusoe visit Japan? One of the reasons that we can point out here is that, though Defoe had an idea of writing about Japan in mind, yet he gave it up due to the lack of enough materials to delineate meticulously the country. In fact, we can find no entry of travel narratives on Japan in Olive Payne’s </span><i data-dcnode-id="1600"><span data-dcnode-id="1601" instrument_node="">Sales Catalogue</span></i><span data-dcnode-id="1599" instrument_node=""> of Defoe’s library except for such a general description as that of Arnoldus Montanus, who in actuality never came to Japan.</span><a data-dcnode-id="1596" data-track="click" data-track-action="subsection anchor" data-track-label="link" href="#FPar1"><sup data-dcnode-id="1597"><span data-dcnode-id="1598" instrument_node="">26</span></sup></a><span data-dcnode-id="1595" instrument_node=""> He did not know the minute records of Japan in Kaempfer’s </span><i data-dcnode-id="1593"><span data-dcnode-id="1594" instrument_node="">The History of Japan</span></i><span data-dcnode-id="1592" instrument_node="">. Of course, he could borrow the description of Psalmanazar’s </span><i data-dcnode-id="1590"><span data-dcnode-id="1591" instrument_node="">Formosa</span></i><span data-dcnode-id="1589" instrument_node="">, for example, but he didn’t; or rather, he didn’t like to use such a hoax as the basis for his description.</span><a data-dcnode-id="1586" data-track="click" data-track-action="subsection anchor" data-track-label="link" href="#FPar1"><sup data-dcnode-id="1587"><span data-dcnode-id="1588" instrument_node="">27</span></sup></a><span data-dcnode-id="1585" instrument_node=""> Therefore, it is likely that, thinking of his own characteristic way of making fiction, Defoe chose to leave out a detailed description of Japan because of the paucity of knowledge about the country. His creative imagination fully worked only when he was convinced that he possessed enough knowledge about the objects.</span><a data-dcnode-id="1582" data-track="click" data-track-action="subsection anchor" data-track-label="link" href="#FPar1"><sup data-dcnode-id="1583"><span data-dcnode-id="1584" instrument_node="">28</span></sup></a></p></div></div></section><section data-dcnode-id="1098" data-title="Japan, East Asian Countries, and the Formation of English Prose Fiction"><div class="c-article-section" data-dcnode-id="1099" id="Sec5-section"><h2 class="c-article-section__title js-section-title js-c-reading-companion-sections-item" data-dcnode-id="1576" id="Sec5"><span data-dcnode-id="1577" instrument_node="">Japan, East Asian Countries, and the Formation of English Prose Fiction</span></h2><div class="c-article-section__content" data-dcnode-id="1100" id="Sec5-content"><p data-dcnode-id="1574"><span data-dcnode-id="1575" instrument_node="">It seems natural for us to find many fictional travel narratives were written at an early stage of modern prose fiction in English; travels into extraordinary circumstances well provide the trigger of observation of the familiar society from a new perspective. Such fictional travel narratives help to widen and enrich the topics and perspectives of prose fiction, arousing the reader’s interest and imagination. In this sense, Asian countries and, in particular, Japan in the early modern period were undoubtedly attractive for the authors of English prose fiction; their existence was certain, but the languages, cultures, characteristics of the peoples, and their indigenous customs still remained to be clarified and therefore, the countries could provide the English authors with effective stages for their creativity.</span></p><p data-dcnode-id="1566"><span data-dcnode-id="1573" instrument_node="">Psalmanazar referred to Japan and China in order to make the reader believe his hoax about Formosa as real and faithful and Swift used the country as a concise and important knot between reality and fiction to vitalize his satire on human society. The image of Japan as a distant Asian country was hazy and fantastic for the contemporary reader as well as for the authors, but because of this, the use of Japan functioned conveniently in </span><i data-dcnode-id="1571"><span data-dcnode-id="1572" instrument_node="">Formosa</span></i><span data-dcnode-id="1570" instrument_node=""> and </span><i data-dcnode-id="1568"><span data-dcnode-id="1569" instrument_node="">Gulliver’s Travels</span></i><span data-dcnode-id="1567" instrument_node="">.</span></p><p data-dcnode-id="1557"><span data-dcnode-id="1565" instrument_node="">Defoe was not, however, an author who made his fictions in uncertain territories. With enough assimilation of knowledge and satisfactory understanding about the objects, he made fiction and built up a new “network of personal relationships.”</span><a data-dcnode-id="1562" data-track="click" data-track-action="subsection anchor" data-track-label="link" href="#FPar1"><sup data-dcnode-id="1563"><span data-dcnode-id="1564" instrument_node="">29</span></sup></a><span data-dcnode-id="1561" instrument_node=""> His imagination worked elaborately in a matrix of fact and produced realistic fictions. In this sense, he clearly showed a path for the development of European novel that was different from hoax and unrealistic fantasy. From this point of view, Japan was not a suitable stage for his fiction. His hesitation and final relinquishment of describing Japan in </span><i data-dcnode-id="1559"><span data-dcnode-id="1560" instrument_node="">Farther Adventures</span></i><span data-dcnode-id="1558" instrument_node=""> well show an aspect of characteristic mode of composition in the origin of English prose fiction.</span></p><span data-dcnode-id="1556" instrument_node="">
</span><h3 class="c-article__sub-heading" data-dcnode-id="1554" id="FPar1"><span data-dcnode-id="1555" instrument_node="">Notes</span></h3><span data-dcnode-id="1553" instrument_node="">
</span><ol class="u-list-style-none" data-dcnode-id="1102"><span data-dcnode-id="1552" instrument_node="">
</span><li data-dcnode-id="1535"><span data-dcnode-id="1551" instrument_node="">
</span><span class="u-custom-list-number" data-dcnode-id="1549"><span data-dcnode-id="1550" instrument_node="">1.</span></span><span data-dcnode-id="1548" instrument_node="">
</span><p data-dcnode-id="1537"><span data-dcnode-id="1547" instrument_node="">For example, Tobias Smollett sets in Japan the stage of the story of </span><i data-dcnode-id="1545"><span data-dcnode-id="1546" instrument_node="">The History and Adventures of an Atom</span></i><span data-dcnode-id="1544" instrument_node=""> (1769), eds. O.M. Brack Jr and Robert Adams Day (Athens: University of Georgia Press, 2014), and refers to the country in </span><i data-dcnode-id="1542"><span data-dcnode-id="1543" instrument_node="">The Expedition of Humphrey Clinker</span></i><span data-dcnode-id="1541" instrument_node=""> (1772), ed. Lewis M. Knapp, rev. Paul-Gabriel Boucé (Oxford: Oxford University Press, 1984), 213–14. James Boswell also refers to Japan in his conversations with Samuel Johnson: see </span><i data-dcnode-id="1539"><span data-dcnode-id="1540" instrument_node="">The Life of Samuel Johnson, LL.D</span></i><span data-dcnode-id="1538" instrument_node="">., ed. George Birkbeck Hill, rev. L. F. Powell, 6 vols. (Oxford: Clarendon Press, 1934–50), 2. 149.</span></p><span data-dcnode-id="1536" instrument_node="">
</span></li><span data-dcnode-id="1534" instrument_node="">
</span><li data-dcnode-id="1509"><span data-dcnode-id="1533" instrument_node="">
</span><span class="u-custom-list-number" data-dcnode-id="1531"><span data-dcnode-id="1532" instrument_node="">2.</span></span><span data-dcnode-id="1530" instrument_node="">
</span><p data-dcnode-id="1511"><i data-dcnode-id="1528"><span data-dcnode-id="1529" instrument_node="">The Spectator</span></i><span data-dcnode-id="1527" instrument_node="">, ed. Donald F. Bond, 5 vols. (Oxford: Clarendon Press, 1965), 1: 293. As for references to Japan in the books published in early decades of the eighteenth-century England, see Takau Shimada, </span><i data-dcnode-id="1525"><span data-dcnode-id="1526" instrument_node="">Japan 1555–1800: A Comprehensive Bibliography of Printed Books in English</span></i><span data-dcnode-id="1524" instrument_node=""> (Tokyo: Edition Synapse, 2012), 29–52. The bibliography includes more than two hundred books in English published in early twenty years of the century in which Japan is mentioned. Urchin Chevreau’s </span><i data-dcnode-id="1522"><span data-dcnode-id="1523" instrument_node="">The History of the World</span></i><span data-dcnode-id="1521" instrument_node=""> (1703), Awnsham Churchill’s </span><i data-dcnode-id="1519"><span data-dcnode-id="1520" instrument_node="">A Collections of Voyages and Travels</span></i><span data-dcnode-id="1518" instrument_node=""> (1704), Peter Teixeria’s </span><i data-dcnode-id="1516"><span data-dcnode-id="1517" instrument_node="">A View of the Universe</span></i><span data-dcnode-id="1515" instrument_node=""> (1710), Charles Lockyer’s </span><i data-dcnode-id="1513"><span data-dcnode-id="1514" instrument_node="">An Account of the Trade in India</span></i><span data-dcnode-id="1512" instrument_node=""> (1711), and many versions of the translation of Samuel Pufendorf’s geographical descriptions are some of the examples.</span></p><span data-dcnode-id="1510" instrument_node="">
</span></li><span data-dcnode-id="1508" instrument_node="">
</span><li data-dcnode-id="1494"><span data-dcnode-id="1507" instrument_node="">
</span><span class="u-custom-list-number" data-dcnode-id="1505"><span data-dcnode-id="1506" instrument_node="">3.</span></span><span data-dcnode-id="1504" instrument_node="">
</span><p data-dcnode-id="1496"><span data-dcnode-id="1503" instrument_node="">As for details, see Derek Massarella, </span><i data-dcnode-id="1501"><span data-dcnode-id="1502" instrument_node="">A World Elsewhere: Europe’s Encounter with Japan in the Sixteenth and Seventeenth Centuries</span></i><span data-dcnode-id="1500" instrument_node=""> (New Haven: Yale University Press, 1990), 355–69, and Keizo Asaji, “English Manuscripts in the British Library on the Case of Return and Japan Diary, 1673,” </span><i data-dcnode-id="1498"><span data-dcnode-id="1499" instrument_node="">The Review of the Institute of Oriental and Occidental Studies</span></i><span data-dcnode-id="1497" instrument_node=""> (Kansai University) 40 (2007): 31–40.</span></p><span data-dcnode-id="1495" instrument_node="">
</span></li><span data-dcnode-id="1493" instrument_node="">

</span><span class="u-custom-list-number" data-dcnode-id="1490"><span data-dcnode-id="1491" instrument_node="">4.</span></span><span data-dcnode-id="1489" instrument_node="">
</span><p data-dcnode-id="1466"><span data-dcnode-id="1488" instrument_node="">Psalmanazar is believed to have been born in southern France to Catholic parents sometime between 1679 and 1684. He decided to impersonate a Japanese convert but around 1702, he shifted his supposed homeland from Japan to Formosa (Taiwan), a more remote island, in order to make his fraud more impregnable. Encountering Alexander Innes, a Scottish priest, he converted to Anglicanism and took the name of George Psalmanazar. In 1703, he left for London with Innes and soon became famous because of his strange habits as well as his travel narratives. See Psalmanazar’s autobiography, </span><i data-dcnode-id="1486"><span data-dcnode-id="1487" instrument_node="">Memoirs of ****. Commonly Known by the Name of George Psalmanazar</span></i><span data-dcnode-id="1485" instrument_node=""> (London: R. Davis, J. Newbery, L. Davis, and C. Reymers, 1764), 160–66; Justin Stagl, </span><i data-dcnode-id="1483"><span data-dcnode-id="1484" instrument_node="">A History of Curiosity:</span></i><span data-dcnode-id="1482" instrument_node=""> </span><i data-dcnode-id="1480"><span data-dcnode-id="1481" instrument_node="">The Theory of Travel, 1550–1800</span></i><span data-dcnode-id="1479" instrument_node=""> (London: Taylor &amp; Francis, 1995), 183–85; and Michael Keevak, </span><i data-dcnode-id="1477"><span data-dcnode-id="1478" instrument_node="">The Pretended Asian: George Psalmanazar’s Eighteenth-Century Formosan Hoax</span></i><span data-dcnode-id="1476" instrument_node=""> (Detroit: Wayne State University Press, 2004), 6, 37-38. For Swift’s satirical reference to Psalmanazar, see “A Modest Proposal,” </span><i data-dcnode-id="1474"><span data-dcnode-id="1475" instrument_node="">Irish Political Writings after 1725: A Modest Proposal and Other Works, The Cambridge Edition of the Works of Jonathan Swift</span></i><span data-dcnode-id="1473" instrument_node="">, ed. D. W. Hayton and Adam Rounce (Cambridge: Cambridge University Press, 2018), Vol. 14. 152; as to Johnson’s favorable opinion about Psalmanazar, see Boswell, </span><i data-dcnode-id="1471"><span data-dcnode-id="1472" instrument_node="">The Life of Samuel Johnson, LL.D</span></i><span data-dcnode-id="1470" instrument_node="">., 3: 314, 443–49. Psalmanazar also appears in Smollett’s </span><i data-dcnode-id="1468"><span data-dcnode-id="1469" instrument_node="">The Expedition of Humphrey Clinker</span></i><span data-dcnode-id="1467" instrument_node="">, 133.</span></p><span data-dcnode-id="1465" instrument_node="">
