</span><h1 class="txt-large" data-dcnode-id="837"><span data-dcnode-id="838" instrument_node="">What Is Literature Analysis?</span></h1><span data-dcnode-id="836" instrument_node="">
</span></header><span data-dcnode-id="834" instrument_node="">
</span><section class="about desktop" data-dcnode-id="823"><span data-dcnode-id="833" instrument_node="">
</span><div class="author-info tk-ff-meta-web-pro txt-grey" data-dcnode-id="825"><span data-dcnode-id="832" instrument_node="">
</span><address class="txt-strong" data-dcnode-id="830"><span data-dcnode-id="831" instrument_node="">Mark Wollacott</span></address><span data-dcnode-id="829" instrument_node="">
</span><time class="txt-small txt-light" data-dcnode-id="827" datetime="2022-06-07T02:48:49-07:00"><span data-dcnode-id="828" instrument_node="">
                                    Last Modified Date: June 07, 2022                                </span></time><span data-dcnode-id="826" instrument_node="">
</span></div><span data-dcnode-id="824" instrument_node="">
</span></section><span data-dcnode-id="822" instrument_node="">
</span><section class="about mobile" data-dcnode-id="811"><span data-dcnode-id="821" instrument_node="">
</span><a class="author-info tk-ff-meta-web-pro popup-open-but" data-dcnode-id="813" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.languagehumanities.org/what-is-literature-analysis.htm%23authorBox"><span data-dcnode-id="820" instrument_node="">
</span><address class="txt-strong txt-grey" data-dcnode-id="818"><span data-dcnode-id="819" instrument_node="">Mark Wollacott</span></address><span data-dcnode-id="817" instrument_node="">
</span><time class="txt-small txt-light" data-dcnode-id="815" datetime="2022-06-07T02:48:49-07:00"><span data-dcnode-id="816" instrument_node="">
                                    Date: June 07, 2022                                </span></time><span data-dcnode-id="814" instrument_node="">
</span></a><span data-dcnode-id="812" instrument_node="">
</span></section><span data-dcnode-id="810" instrument_node="">
</span><section class="social" data-dcnode-id="804"><span data-dcnode-id="809" instrument_node="">
</span><span data-dcnode-id="807" instrument_node=""> </span><div class="addthis_inline_share_toolbox" data-dcnode-id="806"></div><span data-dcnode-id="805" instrument_node="">
</span></section><span data-dcnode-id="803" instrument_node="">
</span><section class="content floating" data-dcnode-id="666"><span data-dcnode-id="802" instrument_node="">
</span><figure class="fright txt-center" data-dcnode-id="792"><span data-dcnode-id="801" instrument_node="">
</span><a class="popup-open-but" data-dcnode-id="794" data-popup="#slider-image-1" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.languagehumanities.org/what-is-literature-analysis.htm%23imagePopup"><span data-dcnode-id="800" instrument_node="">
</span><img alt="Studies in literature analysis can have both a narrow focus and a broad focus." data-dcnode-id="799" sizes="calc(50vw - 30px)" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//images.languagehumanities.org/slideshow-mobile-small/woman-in-white-flipping-through-book.jpg&amp;raw" srcset="//images.languagehumanities.org/small/woman-in-white-flipping-through-book.jpg 232w, //images.languagehumanities.org/slideshow-mobile-small/woman-in-white-flipping-through-book.jpg 520w"><span data-dcnode-id="798" instrument_node="">
</span><figcaption class="tk-ff-meta-web-pro txt-small txt-light desktop" data-dcnode-id="796"><span data-dcnode-id="797" instrument_node="">
                                        Studies in literature analysis can have both a narrow focus and a broad focus.                                    </span></figcaption><span data-dcnode-id="795" instrument_node="">
</span></a><span data-dcnode-id="793" instrument_node="">
</span></figure><span data-dcnode-id="791" instrument_node="">
</span><p data-dcnode-id="786"><span data-dcnode-id="790" instrument_node="">Literature analysis intends to deeply examine one piece of writing. The term is applied also to the study of a group of writings, the sum of one writer’s works, a mode of writing and a particular </span><a data-dcnode-id="788" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.languagehumanities.org/what-is-a-genre.htm"><span data-dcnode-id="789" instrument_node="">genre</span></a><span data-dcnode-id="787" instrument_node=""> of writing. Literature analysis attempts to study its subject’s themes, construction and style. The overall aim is to gain a better understanding of a piece of literature.</span></p><span data-dcnode-id="785" instrument_node="">
</span><div class="ad-block center" data-dcnode-id="777"><span data-dcnode-id="783" instrument_node="">
</span><span data-dcnode-id="781" instrument_node="">
</span><ins class="adsbygoogle" data-ad-client="ca-pub-8290526608142878" data-ad-format="auto" data-ad-slot="5480447840" data-dcnode-id="780" data-full-width-responsive="true" style="display:block"></ins><span data-dcnode-id="779" instrument_node="">
</span><span data-dcnode-id="778" instrument_node="">
</span></div><span data-dcnode-id="776" instrument_node="">
</span><figure class="fright txt-center" data-dcnode-id="766"><span data-dcnode-id="775" instrument_node="">
</span><a class="popup-open-but" data-dcnode-id="768" data-popup="#slider-image-2" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.languagehumanities.org/what-is-literature-analysis.htm%23imagePopup"><span data-dcnode-id="774" instrument_node="">
</span><img alt="The overall goal of literary analysis is to help the reader better understand a piece of literature." data-dcnode-id="773" sizes="calc(50vw - 30px)" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//images.languagehumanities.org/slideshow-mobile-small/asian-young-man-reading-text.jpg&amp;raw" srcset="//images.languagehumanities.org/small/asian-young-man-reading-text.jpg 232w, //images.languagehumanities.org/slideshow-mobile-small/asian-young-man-reading-text.jpg 520w"><span data-dcnode-id="772" instrument_node="">
</span><figcaption class="tk-ff-meta-web-pro txt-small txt-light desktop" data-dcnode-id="770"><span data-dcnode-id="771" instrument_node="">
                                        The overall goal of literary analysis is to help the reader better understand a piece of literature.                                    </span></figcaption><span data-dcnode-id="769" instrument_node="">
</span></a><span data-dcnode-id="767" instrument_node="">
</span></figure><span data-dcnode-id="765" instrument_node="">
</span><p data-dcnode-id="760"><span data-dcnode-id="764" instrument_node="">Any written work can be considered a form of literature. This includes personal letters and electronic messages online such as status updates. It is often associated with forms such as poetry and novels. Literature analysis, however, should not be confused with literary </span><a data-dcnode-id="762" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.allthescience.org/what-is-a-theory.htm"><span data-dcnode-id="763" instrument_node="">theory</span></a><span data-dcnode-id="761" instrument_node=""> or the theory of literature, which is more philosophical and aims to fully define what exactly literature is. Literary theory has, however, influenced how an analyst approaches a book.</span></p><span data-dcnode-id="759" instrument_node="">
</span><div class="ad-block center" data-dcnode-id="751"><span data-dcnode-id="757" instrument_node="">
</span><span data-dcnode-id="755" instrument_node="">
</span><ins class="adsbygoogle" data-ad-client="ca-pub-8290526608142878" data-ad-format="auto" data-ad-slot="9332062945" data-dcnode-id="754" data-full-width-responsive="true" style="display:block"></ins><span data-dcnode-id="753" instrument_node="">
</span><span data-dcnode-id="752" instrument_node="">
</span></div><span data-dcnode-id="750" instrument_node="">
</span><figure class="fright txt-center" data-dcnode-id="740"><span data-dcnode-id="749" instrument_node="">
</span><a class="popup-open-but" data-dcnode-id="742" data-popup="#slider-image-3" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.languagehumanities.org/what-is-literature-analysis.htm%23imagePopup"><span data-dcnode-id="748" instrument_node="">
</span><img alt="Literature analysis often involves comparing multiple texts." data-dcnode-id="747" sizes="calc(50vw - 30px)" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//images.languagehumanities.org/slideshow-mobile-small/bible-study.jpg&amp;raw" srcset="//images.languagehumanities.org/small/bible-study.jpg 232w, //images.languagehumanities.org/slideshow-mobile-small/bible-study.jpg 520w"><span data-dcnode-id="746" instrument_node="">
</span><figcaption class="tk-ff-meta-web-pro txt-small txt-light desktop" data-dcnode-id="744"><span data-dcnode-id="745" instrument_node="">
                                        Literature analysis often involves comparing multiple texts.                                    </span></figcaption><span data-dcnode-id="743" instrument_node="">
</span></a><span data-dcnode-id="741" instrument_node="">
</span></figure><span data-dcnode-id="739" instrument_node="">
</span><p data-dcnode-id="734"><span data-dcnode-id="738" instrument_node="">Studies in literature analysis can have both a narrow focus and a broad focus; they can also examine specific elements of a piece of literature. The study of a novel such as “Norwegian Wood” by </span><a data-dcnode-id="736" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.publicpeople.org/who-is-haruki-murakami.htm"><span data-dcnode-id="737" instrument_node="">Haruki Murakami</span></a><span data-dcnode-id="735" instrument_node="">, for example, can examine his use of style, his themes, his presentation of the context and his characters. A more general examination could study all of Murakami’s works as a whole, comparing “Wild Sheep Chase” with “Kafka on the Shore” or it could take on Japanese literature as a whole.</span></p><span data-dcnode-id="733" instrument_node="">
</span><div class="ad-block center" data-dcnode-id="725"><span data-dcnode-id="731" instrument_node="">
</span><span data-dcnode-id="729" instrument_node="">
</span><ins class="adsbygoogle" data-ad-client="ca-pub-8290526608142878" data-ad-format="auto" data-ad-slot="9592110917" data-dcnode-id="728" data-full-width-responsive="true" style="display:block"></ins><span data-dcnode-id="727" instrument_node="">
</span><span data-dcnode-id="726" instrument_node="">
</span></div><span data-dcnode-id="724" instrument_node=""> </span><div class="ad-block center" data-dcnode-id="718"><span data-dcnode-id="722" instrument_node="">
</span><a class="txt-strong" data-dcnode-id="720" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//capitaloneshopping.sjv.io/meRVZ%3Fsubid%3Darticle-text-link" onclick="fbq('track','Lead');"><span data-dcnode-id="721" instrument_node="">Is Amazon actually giving you the best price? This little known plugin reveals the answer.</span></a><span data-dcnode-id="719" instrument_node="">
</span></div><span data-dcnode-id="717" instrument_node="">
</span><figure class="fright txt-center" data-dcnode-id="707"><span data-dcnode-id="716" instrument_node="">
</span><a class="popup-open-but" data-dcnode-id="709" data-popup="#slider-image-4" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.languagehumanities.org/what-is-literature-analysis.htm%23imagePopup"><span data-dcnode-id="715" instrument_node="">
</span><img alt="Literature analysis might focus on the motivations of the characters in a novel." data-dcnode-id="714" sizes="calc(50vw - 30px)" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//images.languagehumanities.org/slideshow-mobile-small/woman-with-curly-hair-near-man-in-blue-shirt.jpg&amp;raw" srcset="//images.languagehumanities.org/small/woman-with-curly-hair-near-man-in-blue-shirt.jpg 232w, //images.languagehumanities.org/slideshow-mobile-small/woman-with-curly-hair-near-man-in-blue-shirt.jpg 520w"><span data-dcnode-id="713" instrument_node="">
</span><figcaption class="tk-ff-meta-web-pro txt-small txt-light desktop" data-dcnode-id="711"><span data-dcnode-id="712" instrument_node="">
                                        Literature analysis might focus on the motivations of the characters in a novel.                                    </span></figcaption><span data-dcnode-id="710" instrument_node="">
</span></a><span data-dcnode-id="708" instrument_node="">
</span></figure><span data-dcnode-id="706" instrument_node="">
</span><p data-dcnode-id="704"><span data-dcnode-id="705" instrument_node="">A literature analysis of “Norwegian Wood’s” characters will see that Murakami has used more character names than usual, especially in naming the lead character when he usually refers to him or her as ‘boku,’ meaning ‘I.’ Studying characters allows an analyst to see how characters are presented, whether they are presented in a realistic manner or are exaggerated caricatures. </span></p><span data-dcnode-id="703" instrument_node="">
</span><div class="ad-block center" data-dcnode-id="695"><span data-dcnode-id="701" instrument_node="">
</span><span data-dcnode-id="699" instrument_node="">
</span><ins class="adsbygoogle" data-ad-client="ca-pub-8290526608142878" data-ad-format="auto" data-ad-slot="6965947570" data-dcnode-id="698" data-full-width-responsive="true" style="display:block"></ins><span data-dcnode-id="697" instrument_node="">
</span><span data-dcnode-id="696" instrument_node="">
</span></div><span data-dcnode-id="694" instrument_node="">
</span><p data-dcnode-id="692"><span data-dcnode-id="693" instrument_node="">Context in a novel is a matter of realism versus perception. Literature analysis focusing on the context or milieu of “Norwegian Wood” would look at how Murakami presents 1960s Japan and whether his portrayal is accurate. Such analysis is often important for historical settings to determine a level of accuracy; when they are semi-biographical as with Murakami’s book, it becomes a matter of finding a personal opinion of those times.</span></p><span data-dcnode-id="691" instrument_node="">
</span><div class="ad-block center" data-dcnode-id="683"><span data-dcnode-id="689" instrument_node="">
</span><span data-dcnode-id="687" instrument_node="">
</span><ins class="adsbygoogle" data-ad-client="ca-pub-8290526608142878" data-ad-format="auto" data-ad-slot="5652865908" data-dcnode-id="686" data-full-width-responsive="true" style="display:block"></ins><span data-dcnode-id="685" instrument_node="">
</span><span data-dcnode-id="684" instrument_node="">
</span></div><span data-dcnode-id="682" instrument_node="">
</span><p data-dcnode-id="680"><span data-dcnode-id="681" instrument_node="">One book can portray a single theme. One writer can repeat the same theme in a number of books. Writers are also capable of using different themes in one book or across a series of books. Studying themes intends to find a larger message or idea being discussed. </span></p><span data-dcnode-id="679" instrument_node="">
</span><p data-dcnode-id="677"><span data-dcnode-id="678" instrument_node="">Style and influences are two different elements of literature analysis. Investigating the style examines how a writer presents the story. Is it in first person or third person? Is it written in the active tense or the past tense? Influences, meanwhile, come from other pieces of writing or the author’s own biography. In the context of “Norwegian Wood,” influences range from Murakami’s love of American literature to his own experiences as a kid in the 1960s.</span></p><span data-dcnode-id="676" instrument_node="">
</span><div class="ad-block center" data-dcnode-id="668"><span data-dcnode-id="674" instrument_node="">
</span><span data-dcnode-id="672" instrument_node="">
</span><ins class="adsbygoogle" data-ad-client="ca-pub-8290526608142878" data-ad-format="auto" data-ad-slot="7092912411" data-dcnode-id="671" data-full-width-responsive="true" style="display:block"></ins><span data-dcnode-id="670" instrument_node="">
</span><span data-dcnode-id="669" instrument_node="">
</span></div><span data-dcnode-id="667" instrument_node="">
</span></section><span data-dcnode-id="665" instrument_node="">
</span><span data-dcnode-id="664" instrument_node="">
</span><span data-dcnode-id="663" instrument_node="">

</span><h2 class="txt-large" data-dcnode-id="601"><span data-dcnode-id="602" instrument_node="">
                            Discussion Comments                        </span></h2><span data-dcnode-id="600" instrument_node="">
</span><div class="ad-block center" data-dcnode-id="595"><span data-dcnode-id="598" instrument_node="">
</span><ins class="adsbygoogle" data-ad-client="ca-pub-8290526608142878" data-ad-format="fluid" data-ad-layout="in-article" data-ad-slot="1350224705" data-dcnode-id="597" style="display:block; text-align:center;"></ins><span data-dcnode-id="596" instrument_node="">
</span></div><span data-dcnode-id="594" instrument_node="">
</span><article class="tk-ff-meta-web-pro txt-grey" data-dcnode-id="582"><span data-dcnode-id="593" instrument_node="">
</span><address class="txt-small txt-strong txt-ups fleft" data-dcnode-id="591"><span data-dcnode-id="592" instrument_node="">
            Ana1234        </span></address><span data-dcnode-id="590" instrument_node="">
</span><time class="txt-small txt-strong txt-ups fleft" data-dcnode-id="588" datetime="2013-11-29T20:44:44-08:00"><span data-dcnode-id="589" instrument_node="">
            November 29, 2013        </span></time><span data-dcnode-id="587" instrument_node="">
</span><p data-dcnode-id="585"><span data-dcnode-id="586" instrument_node="">@pastanaga - I can kin of sympathize with both sides of it. I've been studying writing for a while and after I started it was difficult to enjoy a book because I'd always be looking for the flaws and finding dozens of them. They were things I'd never notice if I hadn't tried to be a writer myself. 
</span></p><p data-dcnode-id="583"><span data-dcnode-id="584" instrument_node="">But then I realized that I was kind of doing it wrong. I should be looking for the good stuff, not just the mistakes. Now I feel like I appreciate books more than I ever did because I can see more depth in them than I did before.     </span></p></article><span data-dcnode-id="581" instrument_node="">
</span><article class="tk-ff-meta-web-pro txt-grey" data-dcnode-id="569"><span data-dcnode-id="580" instrument_node="">
</span><address class="txt-small txt-strong txt-ups fleft" data-dcnode-id="578"><span data-dcnode-id="579" instrument_node="">
            pastanaga        </span></address><span data-dcnode-id="577" instrument_node="">
</span><time class="txt-small txt-strong txt-ups fleft" data-dcnode-id="575" datetime="2013-11-28T21:44:44-08:00"><span data-dcnode-id="576" instrument_node="">
            November 28, 2013        </span></time><span data-dcnode-id="574" instrument_node="">
</span><p data-dcnode-id="572"><span data-dcnode-id="573" instrument_node="">@irontoenail - I think there is a right way and a wrong way to look at literature. A literary analysis essay should be making the text larger, not smaller. It should be revealing things and making connections that you might not have thought about, otherwise.
</span></p><p data-dcnode-id="570"><span data-dcnode-id="571" instrument_node="">It shouldn't be harping on trivial stuff. It's the same as a good book. If you can see the end coming well before the end, then it's too obvious. If the end comes and it makes no sense, then it's too obscure (or just plain bad). But if the dots connect and suddenly you can see something new, then that's a good thing.     </span></p></article><span data-dcnode-id="568" instrument_node="">
</span><article class="tk-ff-meta-web-pro txt-grey" data-dcnode-id="556"><span data-dcnode-id="567" instrument_node="">
</span><address class="txt-small txt-strong txt-ups fleft" data-dcnode-id="565"><span data-dcnode-id="566" instrument_node="">
            irontoenail        </span></address><span data-dcnode-id="564" instrument_node="">
</span><time class="txt-small txt-strong txt-ups fleft" data-dcnode-id="562" datetime="2013-11-28T12:44:44-08:00"><span data-dcnode-id="563" instrument_node="">
            November 28, 2013        </span></time><span data-dcnode-id="561" instrument_node="">
</span><p data-dcnode-id="559"><span data-dcnode-id="560" instrument_node="">I really don't like this kind of thing. Whenever they made us do any kind of analysis in school, it would completely ruin the book for me (not that the books were ever that riveting in the first place). The analysis of literature just seems to suck all of the joy out of something and make it formulaic. 
</span></p><p data-dcnode-id="557"><span data-dcnode-id="558" instrument_node="">Not to mention that I suspect the teachers were making up half the stuff they say the authors put in there with the intent of showing particular themes. Sometimes a sky is described as blue because the sky is actually blue, not because the author wants to show how sad the character is.     </span></p></article><span data-dcnode-id="555" instrument_node="">
