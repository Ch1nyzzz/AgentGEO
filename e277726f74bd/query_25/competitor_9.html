="1552"><span data-dcnode-id="1551" instrument_node="">I think I know enough of hate</span><br data-dcnode-id="1550"><span data-dcnode-id="1549" instrument_node="">To say that for destruction ice</span><br data-dcnode-id="1548"><span data-dcnode-id="1547" instrument_node="">Is also great</span><br data-dcnode-id="1546"><span data-dcnode-id="1545" instrument_node="">And would suffice.</span></p><aside class="m-in-content-ad-row l-inline not-size-b not-size-c not-size-d" data-ad-group="in_content-0" data-dcnode-id="1541"><div class="m-in-content-ad not-size-b not-size-c not-size-d" data-ad-group="in_content-0" data-dcnode-id="1542" data-zone-count="7"><phoenix-ad class="m-ad not-size-b not-size-c not-size-d m-in-content-ad--slot" config="{&quot;adHtml&quot;:&quot;&quot;,&quot;adReloaderDelay&quot;:0,&quot;maxAdReloads&quot;:5,&quot;adReloaderSizeCodes&quot;:null,&quot;adCloseButton&quot;:false,&quot;bonusConfig&quot;:null,&quot;classRules&quot;:[{&quot;dimensions&quot;:[&quot;0x0&quot;],&quot;classes&quot;:[&quot;m-advertisement--fluid-card&quot;,&quot;m-advertisement--fluid-list-card&quot;],&quot;sizes&quot;:[&quot;0x0&quot;]}],&quot;localizedPhrases&quot;:{&quot;advertisement_legend&quot;:&quot;ADVERTISEMENT&quot;,&quot;outstream_clickout&quot;:&quot;Visit Website&quot;,&quot;outstream_thanks&quot;:&quot;Thanks for watching!&quot;},&quot;overrideOutstreamScript&quot;:false,&quot;moduleClass&quot;:&quot;m-in-content-ad&quot;,&quot;slotId&quot;:&quot;ad-6066c3ff2fbe4aadac06e681c50bc15d&quot;,&quot;visClasses&quot;:[&quot;not-size-b&quot;,&quot;not-size-c&quot;,&quot;not-size-d&quot;],&quot;extraClasses&quot;:null,&quot;zone&quot;:&quot;in_content&quot;,&quot;outstream&quot;:false,&quot;adGroup&quot;:&quot;in_content-0&quot;,&quot;slotConfig&quot;:{&quot;config&quot;:{&quot;sizes&quot;:[[300,250],[320,50],&quot;fluid&quot;,[1,2]]},&quot;model&quot;:{&quot;zone&quot;:&quot;in_content&quot;,&quot;index&quot;:&quot;0&quot;,&quot;isOutstream&quot;:false,&quot;deferLoad&quo ts to completely break from tradition and reflect the mood of the times more accurately with different forms of expression.</span></p><p data-dcnode-id="1519"><span data-dcnode-id="1520" instrument_node="">Modernism in literature has its origins mainly in North America and Europe. The movement was a break away from traditional forms of poetry and verse and a move toward new forms of expression that more accurately reflected the mindset of the times. Writers, like artists, experimented with literary forms in order to fit into the new modernist point of view and regarded traditions as completely outdated.</span></p><p data-dcnode-id="1517"><span data-dcnode-id="1518" instrument_node="">Modernist literature often opposes or provides a differing opinion on a social concept. It is concerned with social norms, standard social ideas, traditional thoughts and expectations, religion, and anger following both World Wars. Writers of modernism in literature also usually reject history and social systems and emphasize a break from urbanized cities and industrial societies.</span></p><aside class="m-in-content-ad-row l-inline not-size-a not-size-b not-size-c" data-ad-group="in_content-1" data-dcnode-id="1514"><div class="m-in-content-ad not-size-a not-size-b not-size-c" data-ad-group="in_content-1" data-dcnode-id="1515" data-zone-count="5"><phoenix-ad class="m-ad not-size-a not-size-b not-size-c m-in-content-ad--slot" config="{&quot;adHtml&quot;:&quot;&quot;,&quot;adReloaderDelay&quot;:0,&quot;maxAdReloads&quot;:5,&quot;adReloaderSizeCodes&quot;:null,&quot;adCloseButton&quot;:false,&quot;bonusConfig&quot;:null,&quot;classRules&quot;:[{&quot;sizes&quot;:[&quot;728x90&quot;],&quot;classes&quot;:[&quot;is-728x90&quot;]},{&quot;dimensions&quot;:[&quot;0x0&quot;],&quot;classes&quot;:[&quot;m-advertisement--fluid-card&quot;,&quot;m-advertisement--fluid-list-card&quot;],&quot;sizes&quot;:[&quot;0x0&quot;]},{&quot;sizes&quot;:[&quot;970x90&quot;],&quot;classes&quot;:[&quot;is-970x90&quot odernism in literature. Satire, juxtaposition, and irony are just a few literary terms highly associated with this movement. Writers also tend to use discontinuous narratives and fragmented plots and almost always draw the reader's attention to the author's role as creator.</span></p><p data-dcnode-id="805"><span data-dcnode-id="806" instrument_node="">Modernism can be frustrating in literature because of its lack in concise language and broken plot lines that can be confusing and seem nonsensical. It is important to recognize that one basic characteristic of modernism in literature is that they steer away from completely linear plots and do not aim to please any particular audience.</span></p><aside class="m-in-content-ad-row l-inline not-size-b not-size-c not-size-d" data-ad-group="in_content-4" data-dcnode-id="802"><div class="m-in-content-ad not-size-b not-size-c not-size-d" data-ad-group="in_content-4" data-dcnode-id="803" data-zone-count="7"><phoenix-ad class="m-ad not-size-b not-size-c not-size-d m-in-content-ad--slot" config="{&quot;adHtml&quot;:&quot;&quot;,&quot;adReloaderDelay&quot;:0,&quot;maxAdReloads&quot;:5,&quot;adReloaderSizeCodes&quot;:null,&quot;adCloseButton&quot;:false,&quot;bonusConfig&quot;:null,&quot;classRules&quot;:[{&quot;dimensions&quot;:[&quot;0x0&quot;],&quot;classes&quot;:[&quot;m-advertisement--fluid-card&quot;,&quot;m-advertisement--fluid-list-card&quot;],&quot;sizes&quot;:[&quot;0x0&quot;]}],&quot;localizedPhrases&quot;:{&quot;advertisement_legend&quot;:&quot;ADVERTISEMENT&quot;,&quot;outstream_clickout&quot;:&quot;Visit Website&quot;,&quot;outstream_thanks&quot;:&quot;Thanks for watching!&quot;},&quot;overrideOutstreamScript&quot;:false,&quot;moduleClass&quot;:&quot;m-in-content-ad&quot;,&quot;slotId&quot;:&quot;ad-c53a746330ca4269af301a39d71dfd93&quot;,&quot;visClasses&quot;:[&quot;not-size-b&quot;,&quot;not-size-c&quot;,&quot;not-size-d&quot;],&quot;extraClasses&quot;:null,&quot;zone&quot;:&quot;in_content&quot;,&quot;outstream&q
