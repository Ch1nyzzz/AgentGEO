</span><div data-dcnode-id="903"><span data-dcnode-id="904"><span data-dcnode-id="905"><b data-dcnode-id="910"><span data-dcnode-id="911" instrument_node="">focalizer</span></b><span data-dcnode-id="909" instrument_node=""> (plural </span><b data-dcnode-id="907"><span data-dcnode-id="908" instrument_node="">focalizers</span></b><span data-dcnode-id="906" instrument_node="">) A character through which the story is told, and whose perspective the story is told from.</span></span></span></div><span data-dcnode-id="902" instrument_node="">Read rest </span><a class="lc" data-dcnode-id="900" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//treehozz.com/goto/5407" rel="nofollow" target="_blank"><span data-dcnode-id="901" instrument_node="">of the answer</span></a><span data-dcnode-id="899" instrument_node="">.</span><br data-dcnode-id="898"><br data-dcnode-id="897"><span data-dcnode-id="896" instrument_node="">

</span><div data-dcnode-id="893" id="th_lb_atf_content"></div><span data-dcnode-id="892" instrument_node="">
</span><br data-dcnode-id="891"><span data-dcnode-id="890" instrument_node=""> Also question is,  what is Focalization in literature?</span><p data-dcnode-id="872"><span data-dcnode-id="873"><span data-dcnode-id="874"><b data-dcnode-id="888"><span data-dcnode-id="889" instrument_node="">Focalization</span></b><span data-dcnode-id="887" instrument_node=""> is a term coined by the French </span><b data-dcnode-id="885"><span data-dcnode-id="886" instrument_node="">narrative</span></b><span data-dcnode-id="884" instrument_node=""> theorist Gerard Genette. It refers to the perspective through which a </span><b data-dcnode-id="882"><span data-dcnode-id="883" instrument_node="">narrative</span></b><span data-dcnode-id="881" instrument_node=""> is presented. For example, a </span><b data-dcnode-id="879"><span data-dcnode-id="880" instrument_node="">narrative</span></b><span data-dcnode-id="878" instrument_node=""> where all information presented reflects the subjective perception of that information by a certain character is said to be internally </span><b data-dcnode-id="876"><span data-dcnode-id="877" instrument_node="">focalized</span></b><span data-dcnode-id="875" instrument_node="">.</span></span></span></p><p data-dcnode-id="859"><span data-dcnode-id="871" instrument_node="">Similarly,  what is external Focalization? </span><span data-dcnode-id="860"><span data-dcnode-id="861"><b data-dcnode-id="869"><span data-dcnode-id="870" instrument_node="">External Focalization</span></b><span data-dcnode-id="868" instrument_node="">: Narrator &lt; Character. The narrator says less than the character knows, this provides for an “objective” or “behaviorist” narrative. </span><b data-dcnode-id="866"><span data-dcnode-id="867" instrument_node="">External focalization</span></b><span data-dcnode-id="865" instrument_node="">, “has the narrator focus on visible, </span><b data-dcnode-id="863"><span data-dcnode-id="864" instrument_node="">external</span></b><span data-dcnode-id="862" instrument_node=""> aspects of events and characters in the narrative.</span></span></span></p><p data-dcnode-id="857"><span data-dcnode-id="858" instrument_node=""> Similarly one may ask,  what does Focaliser mean?</span></p><p data-dcnode-id="840"><span data-dcnode-id="856" instrument_node=""> </span><span data-dcnode-id="841"><span data-dcnode-id="842"><span data-dcnode-id="855" instrument_node="">FOCALIZE (</span><b data-dcnode-id="853"><span data-dcnode-id="854" instrument_node="">focalizer</span></b><span data-dcnode-id="852" instrument_node="">, focalized object): The presentation of a scene through the subjective perception of a character. The term </span><b data-dcnode-id="850"><span data-dcnode-id="851" instrument_node="">can</span></b><span data-dcnode-id="849" instrument_node=""> refer to the person doing the focalizing (the </span><b data-dcnode-id="847"><span data-dcnode-id="848" instrument_node="">focalizer</span></b><span data-dcnode-id="846" instrument_node="">) or to the object that </span><b data-dcnode-id="844"><span data-dcnode-id="845" instrument_node="">is</span></b><span data-dcnode-id="843" instrument_node=""> being perceived (the focalized object).</span></span></span></p><p data-dcnode-id="838"><span data-dcnode-id="839" instrument_node="">What is the theory of narratology?</span></p><p data-dcnode-id="831"><span data-dcnode-id="832"><span data-dcnode-id="833"><span data-dcnode-id="837" instrument_node="">Narratology looks at what narratives have in common and what makes one different from another. Like </span><b data-dcnode-id="835"><span data-dcnode-id="836" instrument_node="">structuralism</span></b><span data-dcnode-id="834" instrument_node=""> and semiotics, from which it derived, narratology is based on the idea of a common literary language, or a universal pattern of codes that operates within the text of a work.</span></span></span></p><span data-dcnode-id="830" instrument_node=""> </span><div class="pg-lazy" data-dcnode-id="829" data-gpt-parent="th_flex_desk"></div><span data-dcnode-id="828" instrument_node="">

</span><p data-dcnode-id="807"></p><div data-dcnode-id="791"><span data-dcnode-id="792"><span data-dcnode-id="793"><span data-dcnode-id="806" instrument_node="">Frame </span><b data-dcnode-id="804"><span data-dcnode-id="805" instrument_node="">story</span></b><span data-dcnode-id="803" instrument_node=""> is a </span><b data-dcnode-id="801"><span data-dcnode-id="802" instrument_node="">story</span></b><span data-dcnode-id="800" instrument_node=""> set </span><b data-dcnode-id="798"><span data-dcnode-id="799" instrument_node="">within a story</span></b><span data-dcnode-id="797" instrument_node="">, narrative, or movie, told by the main or the supporting character. This technique is also </span><b data-dcnode-id="795"><span data-dcnode-id="796" instrument_node="">called</span></b><span data-dcnode-id="794" instrument_node=""> a “frame narrative,” and is a very popular form of literary technique employed in storytelling and narration.</span></span></span></div><p data-dcnode-id="790"></p><span data-dcnode-id="789" instrument_node="">

</span><p data-dcnode-id="773"></p><div data-dcnode-id="763"><span data-dcnode-id="764"><span data-dcnode-id="765"><span data-dcnode-id="772" instrument_node="">A </span><b data-dcnode-id="770"><span data-dcnode-id="771" instrument_node="">heterodiegetic narrator</span></b><span data-dcnode-id="769" instrument_node="">, in contrast, describes the experiences of the characters that appear in the story in which he or she does not participate. Most </span><b data-dcnode-id="767"><span data-dcnode-id="768" instrument_node="">narrators</span></b><span data-dcnode-id="766" instrument_node=""> present their story from one of the following perspectives (called narrative modes): first-person, or third-person limited or omniscient.</span></span></span></div><p data-dcnode-id="762"></p><span data-dcnode-id="761" instrument_node="">

</span><p data-dcnode-id="469"></p><div data-dcnode-id="456"><span data-dcnode-id="457"><span data-dcnode-id="458"><span data-dcnode-id="468" instrument_node="">Michael White and David Epston </span><b data-dcnode-id="466"><span data-dcnode-id="467" instrument_node="">developed narrative</span></b><span data-dcnode-id="465" instrument_node=""> therapy. They </span><b data-dcnode-id="463"><span data-dcnode-id="464" instrument_node="">created</span></b><span data-dcnode-id="462" instrument_node=""> it as a nonpathologizing, empowering, and collaborative approach. It recognizes that people have skills and expertise that can help guide change in their lives. </span><b data-dcnode-id="460"><span data-dcnode-id="461" instrument_node="">Narrative</span></b><span data-dcnode-id="459" instrument_node=""> therapy separates people from their problems.</span></span></span></div><p data-dcnode-id="455"></p><span data-dcnode-id="454" instrument_node="">

</span><p data-dcnode-id="438"></p><div data-dcnode-id="428"><span data-dcnode-id="429"><span data-dcnode-id="430"><span data-dcnode-id="437" instrument_node="">First developed by </span><b data-dcnode-id="435"><span data-dcnode-id="436" instrument_node="">David Epston</span></b><span data-dcnode-id="434" instrument_node=""> and </span><b data-dcnode-id="432"><span data-dcnode-id="433" instrument_node="">Michael White</span></b><span data-dcnode-id="431" instrument_node="">, this therapeutic theory is founded on the idea that people have many interacting narratives that go into making up their sense of who they are, and that the issues they bring to therapy are not restricted to (or located) within the clients themselves, but rather are</span></span></span></div><p data-dcnode-id="427"></p><span data-dcnode-id="426" instrument_node="">
