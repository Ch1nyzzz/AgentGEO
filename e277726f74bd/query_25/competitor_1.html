ocio-historical-approach-in-literature/answer/Sara-Chojnacki-2" rel="nofollow" style="box-sizing: border-box; border-radius: inherit;" target="_blank"><span data-dcnode-id="5612" instrument_node="">Answered </span><span data-dcnode-id="5611" instrument_node="">5</span><span data-dcnode-id="5610" instrument_node=""> years </span><span data-dcnode-id="5609" instrument_node="">ago</span></a><span class="q-box" data-dcnode-id="5607" style="box-sizing: border-box;"></span></div><div class="q-inline qu-verticalAlign--middle" data-dcnode-id="5605" style="box-sizing: border-box; display: inline;"></div></div></div><div class="q-inlineFlex qu-ml--small qu-alignItems--center" data-dcnode-id="5601" style="box-sizing: border-box; display: inline-flex;"><div class="q-flex" data-dcnode-id="5602" style="box-sizing: border-box; display: flex;"></div></div></div></div></div></div><div class="q-click-wrapper qu-display--block qu-tapHighlight--white ClickWrapper___StyledClickWrapperBox-zoqi4f-0 bIwtPb" data-dcnode-id="5572" style="box-sizing: border-box; font: inherit; padding: 0px; width: 100%; position: relative; color: inherit; text-align: inherit; cursor: initial;" tabindex="-1" width="100%"><div class="q-box spacing_log_answer_content puppeteer_test_answer_content" data-dcnode-id="5573" style="box-sizing: border-box;"><div class="q-text" data-dcnode-id="5575" style="box-sizing: border-box; max-width: 100%;"><span class="CssComponent__CssInlineComponent-sc-1oskqb9-1 UserSelectableText___StyledCssInlineComponent-lsmoq4-0 kghFzc" data-dcnode-id="5576"><span class="q-box qu-userSelect--text" data-dcnode-id="5577" style="box-sizing: border-box;"><p class="q-text qu-display--block qu-wordBreak--break-word qu-textAlign--start" data-dcnode-id="5594" style="box-sizing: border-box; margin-bottom: 1em; overflow-wrap: anywhere; direction: ltr;"><span data-dcnode-id="5595" style="font-weight: normal; font-style: normal; background: none;"><span data-dcnode-id="5596" instrument_node="">A social historical critical approach to literature seeks to understand the text based on the cultural and historical events taking place at the time it was written.</span></span></p><span data-dcnode-id="5593" instrument_node=""> </span><p class="q-text qu-display--block qu-wordBreak--break-word qu-textAlign--start" data-dcnode-id="5590" style="box-sizing: border-box; margin-bottom: 1em; overflow-wrap: anywhere; direction: ltr;"><span data-dcnode-id="5591" style="font-weight: normal; font-style: normal; background: none;"><span data-dcnode-id="5592" instrument_node="">If you’re reading a text that was written in a time period other than your own, then it can be very useful to understand the period in which it was written. Americans reading a book about war, even a fictional one, during WWII are going to relate it to the current events surrounding them at the time.</span></span></p><span data-dcnode-id="5589" instrument_node=""> </span><p class="q-text qu-display--block qu-wordBreak--break-word qu-textAlign--start" data-dcnode-id="5578" style="box-sizing: border-box; margin-bottom: 0px; overflow-wrap: anywhere; direction: ltr;"><span data-dcnode-id="5587" style="font-weight: normal; font-style: normal; background: none;"><span data-dcnode-id="5588" instrument_node="">For example, </span></span><span data-dcnode-id="5585" style="font-weight: normal; font-style: italic; background: none;"><span data-dcnode-id="5586" instrument_node="">Johnny Tremain</span></span><span data-dcnode-id="5583" style="font-weight: normal; font-style: normal; background: none;"><span data-dcnode-id="5584" instrument_node=""> by Esther Forbes is a work of historical fiction about the Revolutionary War. It’s important to understand the historical context of that book to understand the events that take place (the Boston Massacre, Lexington and Concord, etc). </span></span><span data-dcnode-id="5581" style="font-weight: bold; font-style: normal; background: none;"><span data-dcnode-id="5582" instrument_node="">Yet</span></span><span data-dcnode-id="5579" style="font-weight: normal; font-style: normal; background: none;"><span data-dcnode-id="5580" instrument_node="">, the book was written during WWII, so the people reading it when it was published would have related the events of the Revolutionary War (men going off to fight for a cause they believed in) to their current situation (fathers and brothers fighting Nazism in Europe).</span></span></p></span></span></div><div data-dcnode-id="5574"></div></div></div></div><div class="q-text qu-dynamicFontSize--small qu-mt--small qu-color--gray_light qu-passColorToLinks" data-dcnode-id="5557" style="box-sizing: border-box;"><span data-dcnode-id="5558"><span class="q-box qu-display--none" data-dcnode-id="5570" style="box-sizing: border-box;"></span><span class="CssComponent-sc-1oskqb9-0 AbstractSeparatedItems___StyledCssComponent-sc-46kfvf-0 bxBZxD" data-dcnode-id="5567"><span data-dcnode-id="5569" instrument_node="">7.8K</span><span data-dcnode-id="5568" instrument_node=""> views</span></span><span class="q-box qu-display--none" data-dcnode-id="5565" style="box-sizing: border-box;"><span data-dcnode-id="5566" instrument_node=""> · </span></span><span class="CssComponent-sc-1oskqb9-0 AbstractSeparatedItems___StyledCssComponent-sc-46kfvf-0 diCWLm" data-dcnode-id="5562"><div class="q-click-wrapper qu-display--inline-block qu-tapHighlight--white qu-cursor--pointer qu-hover--textDecoration--underline ClickWrapper___StyledClickWrapperBox-zoqi4f-0 bIwtPb" data-dcnode-id="5563" style="box-sizing: border-box; font: inherit; padding: 0px; color: inherit; text-align: inherit;" tabindex="0"><span data-dcnode-id="5564" instrument_node="">View upvotes</span></div></span><span class="q-box qu-display--none" data-dcnode-id="5560" style="box-sizing: border-box;"><span data-dcnode-id="5561" instrument_node=""> · </span></span><span class="CssComponent-sc-1oskqb9-0 AbstractSeparatedItems___StyledCssComponent-sc-46kfvf-0 diCWLm" data-dcno n reading literature?</span></span></span></div></div></div></div></a></span></span></div></div></div></div><div class="q-click-wrapper qu-display--block qu-tapHighlight--white qu-cursor--pointer ClickWrapper___StyledClickWrapperBox-zoqi4f-0 bIwtPb" data-dcnode-id="5278" style="box-sizing: border-box; font: inherit; padding: 0px; width: 100%; position: relative; color: inherit; text-align: inherit;" tabindex="0" width="100%"><div class="q-box spacing_log_answer_content puppeteer_test_answer_content" data-dcnode-id="5279" style="box-sizing: border-box;"><div class="q-relative" data-dcnode-id="5280" style="box-sizing: border-box; position: relative;"><div class="q-absolute qu-full qu-zIndex--base" data-dcnode-id="5393" style="box-sizing: border-box; position: absolute;"></div><div class="q-box" data-dcnode-id="5281" style="box-sizing: border-box; max-width: 100%;"><div class="q-box qu-cursor--pointer QTextTruncated___StyledBox-sc-1pev100-0 ejgusd" data-dcnode-id="5373" style="box-sizing: border-box;"><div class="q-relative" data-dcnode-id="5374" style="box-sizing: border-box; position: relative;"><div class="q-box qu-overflow--hidden" data-dcnode-id="5375" style="box-sizing: border-box; max-height: 300px;"><div class="q-text qu-wordBreak--break-word" data-dcnode-id="5376" style="box-sizing: border-box;"><span class="q-box qu-userSelect--text" data-dcnode-id="5377" style="box-sizing: border-box;"><p class="q-text qu-display--block qu-wordBreak--break-word qu-textAlign--start" data-dcnode-id="5390" style="box-sizing: border-box; margin-bottom: 0px; overflow-wrap: anywhere; direction: ltr;"><span data-dcnode-id="5391" style="font-weight: normal; font-style: normal; background: none;"><span data-dcnode-id="5392" instrument_node="">Think of a critical approach in reading literature as a prism which can be altered as with a kaleidoscope. You read a text. I read that text. A third party reads that same text. But we all wear a prism that twists how we see that text. You wear the prism of say Freud and you look for Oedipal issues as with Hamlet and his mother Gertrude. I wear the prism of Deconstruction so I look to subvert the surface meaning of this text and announce that the “real” meaning is its opposite. A third party may wear the prism of the New Criticism which forbids the use of Deconstruction and announce that the s</span></span></p><div class="q-absolute qu-textAlign--center qu-zIndex--base" data-dcnode-id="5378" style="box-sizing: border-box; position: absolute; width: 100%; height: 100px; bottom: 0px; background: linear-gradient(rgba(255, 255, 255, 0) 0%, rgb(255, 255, 255) 100%);" width="100%"><div class="q-inlineFlex" data-dcnode-id="5379" style="box-sizing: border-box; display: inline-flex;"><div class="q-relative" data-dcnode-id="5380" style="box-sizing: border-box; position: relative; bottom: -60px;"><button class="q-click-wrapper qu-active--textDecoration--none qu-focus--textDecoration--none ClickWrapper___StyledClickWrapperBox-zoqi4f-0 bIwtPb base___StyledClickWrapper-lx6eke-1 fURggN puppeteer_test_read_more_button qu-borderRadius--pill qu-alignItems--center qu-justifyContent--center qu-whiteSpace--nowrap qu-userSelect--none qu-display--inline-flex qu-bg--gray_ultralight qu-tapHighlight--white qu-textAlign--center qu-cursor--pointer qu-hover--textDecoration--none" data-dcnode-id="5381" role="button" style="box-sizing: border-box; font: inherit; padding: 0px 15px; transition-property: box-shadow, background-color; transition-duration: 60ms; transition-timing-function: ease-out; height: 30px; min-width: 30px; position: relative; box-shadow: rgba(99, 100, 102, 0.2) 0px 0px 0px 1px inset; border-width: 0px; outline: none; color: inherit;" tabindex="0" type="button"><div class="q-flex qu-alignItems--center qu-justifyContent--center" data-dcnode-id="5382" style="box-sizing: border-box; display: flex; max-width: 100%; transition-property: opacity; transition-duration: 60ms; transition-timing-function: ease-in-out;"><div class="q-text qu-display--inline-flex qu-alignItems--center qu-overflow--hidden puppeteer_test_button_text qu-medium qu-color--gray" data-dcnode-id="5387" style="box-sizing: border-box; font-size: 13px;"><div class="q-text qu-ellipsis qu-whiteSpace--nowrap" data-dcnode-id="5388" style="box-sizing: border-box; line-height: normal;"><span data-dcnode-id="5389" instrument_node="">Continue Reading</span></div></div><span class="q-inlineBlock qu-ml--tiny qu-mr--n_tiny" data-dcnode-id="5383" name="ChevronDown" style="box-sizing: border-box; display: inline-block; width: 16px; height: 16px; flex-shrink: 0; line-height: 16px;" width="16px"><span class="CssComponent__CssInlineComponent-sc-1oskqb9-1 Icon___StyledCssInlineComponent-sc-11tmcw7-0 fNkmIo" data-dcnode-id="5384"><svg data-dcnode-id="5385" height="24" viewBox="0 0 24 24" width="24" xmlns="http://www.w3.org/2000/svg"><path class="icon_svg-stroke" d="m5 8.5 7 7 7.005-7" data-dcnode-id="5386" fill="none" stroke="#666" stroke-linecap="round" stroke-width="1.5"></path></svg></span></span></div></button></div></div></div></span></div></div></div></div><div class="q-box qu-display--none" data-dcnode-id="5282" style="box-sizing: border-box;"><div class="q-text" data-dcnode-id="5283" style="box-sizing: border-box; max-width: 100%;"><span class="CssComponent__CssInlineComponent-sc-1oskqb9-1 UserSelectableText___StyledCssInlineComponent-lsmoq4-0 kghFzc" data-dcnode-id="5284"><span class="q-box qu-userSelect--text" data-dcnode-id="5285" style="box-sizing: border-box;"><p class="q-text qu-display--block qu-wordBreak--break-word qu-textAlign--start" data-dcnode-id="5370" style="box-sizing: border-box; margin-bottom: 1em; overflow-wrap: anywhere; direction: ltr;"><span data-dcnode-id="5371" style="font-weight: normal; font-style: normal; background: none;"><span data-dcnode-id="5372" instrument_node="">Think of a critical approach in reading literature as a prism which can be altered as with a kaleidoscope. You read a text. I read that text. A third party reads that same text. But we all wear a prism that twists how we see that text. You wear the prism of say Freud and you look for Oedipal issues as with Hamlet and his mother Gertrude. I wear the prism of Deconstruction so I look to subvert the surface meaning of this text and announce that the “real” meaning is its opposite. A third party may wear the prism of the New Criticism which forbids the use of Deconstruction and announce that the surface meaning is its “real” meaning.</span></span></p><span data-dcnode-id="5369" instrument_node=""> </span><p class="q-text qu-display--block qu-wordBreak--break-word qu-textAlign--start" data-dcnode-id="5366" style="box-sizing: border-box; margin-bottom: 1em; overflow-wrap: anywhere; direction: ltr;"><span data-dcnode-id="5367" style="font-weight: normal; font-style: normal; background: none;"><span data-dcnode-id="5368" instrument_node="">You can see that the word “critical” is used to designate how one “reads” a text. Here are the most popular approaches (vastly simplified) to do just that:</span></span></p><span data-dcnode-id="5365" instrument_node=""> </span><p class="q-text qu-display--block qu-wordBreak--break-word qu-textAlign--start" data-dcnode-id="5362" style="box-sizing: border-box; margin-bottom: 1em; overflow-wrap: anywhere; direction: ltr;"><span data-dcnode-id="5363" style="font-weight: normal; font-style: italic; background: none;"><span data-dcnode-id="5364" instrument_node="">Archetypal:</span></span></p><span data-dcnode-id="5361" instrument_node=""> </span><p class="q-text qu-display--block qu-wordBreak--break-word qu-textAlign--start" data-dcnode-id="5358" style="box-sizing: border-box; margin-bottom: 1em; overflow-wrap: anywhere; direction: ltr;"><span data-dcnode-id="5359" style="font-weight: normal; font-style: normal; background: none;"><span data-dcnode-id="5360" instrument_node="">Archetypal criticism shares a common root with psychological criticism in that both deal with the recesses of the human mind. But unlike Freudian theory which delves into the individual mind, archetypal theory relates to a collective aspect of the human psyche. Adherents of this mode envision literature as centered in a mythic unifying ethos that gives a common shape to otherwise differentiated cultures. This common shape is rooted in what adherents claim is a duo of unfolding culture and genetic DNA. Surprisingly, much of archetypal criticism has little to do with literature but much to do with the primordial history of a people that reflects their religion, rites, and rituals. The foremost theorist of archetypal criticism is Carl Jung, who developed its basic underpinning: the collective unconscious and the archetype proper. Unlike Freud, who argued for clear differences in individuals' psyches, Jung countered with the novel notion of an equally clear identification of psyches. He suggested that all minds in all eras in all locations drew upon a common source for contemplating phenomena. Thus, the collective unconscious of all human beings imprinted certain images and thoughts in individual minds. Clearly, the Jungian collective unconscious predates written human history as it wends its way back to the farthest reaches of human culture. One cannot tap into this collective unconscious at will; rather it enters and exits an individual's psyche in tantalizing bits and pieces. The archetype is a pattern like an inherited data bit that is truly universal. Regardless of whether one is a Roman legionnaire under Caesar or a rapper on MTV, the content of these imprinted data bits is uniform.</span></span></p><span data-dcnode-id="5357" instrument_node=""> </span><p class="q-text qu-display--block qu-wordBreak--break-word qu-textAlign--start" data-dcnode-id="5354" style="box-sizing: border-box; margin-bottom: 1em; overflow-wrap: anywhere; direction: ltr;"><span data-dcnode-id="5355" style="font-weight: normal; font-style: italic; background: none;"><span data-dcnode-id="5356" instrument_node="">Deconstruction:</span></span></p><span data-dcnode-id="5353" instrument_node=""> </span><p class="q-text qu-display--block qu-wordBreak--break-word qu-textAlign--start" data-dcnode-id="5346" style="box-sizing: border-box; margin-bottom: 1em; overflow-wrap: anywhere; direction: ltr;"><span data-dcnode-id="5351" style="font-weight: normal; font-style: normal; background: none;"><span data-dcnode-id="5352" instrument_node="">The avowed purpose of deconstruction is to locate hidden flaws, ambiguities, and paradoxes of which the author is probably unaware. The result of a deconstruction is always the reversal of the original or "privileged" meaning. This term focuses on the naïve, commonplace viewpoint on each particular issue in order to undermine it or to “put it in question” or to “problematize” it. It shifts the context away from the most sophisticated thought achieved elsewhere by others to unsophisticated simple notions. It assumes that all texts have a clear and stable meaning (which they do not) called a </span></span><span data-dcnode-id="5349" style="font-weight: normal; font-style: italic; background: none;"><span data-dcnode-id="5350" instrument_node="">privileged</span></span><span data-dcnode-id="5347" style="font-weight: normal; font-style: normal; background: none;"><span data-dcnode-id="5348" instrument_node=""> meaning and then tries to destabilize that meaning. It further assumes that the intent of the author determines meaning, even if the process will ultimately reverse that meaning. It will always supply a polar opposite using binary logic such that the twin sides of the slash become destabilized or even swap places. When polar binaries are used, the middle ground (hidden by the slash) produces only primitive ideas, resulting only in more primitive ideas following the destabilization. The language of deconstruction masks its primitive basis by the excessive use of dramatic and provocative words like “disruptive,” “disturbing,” subversive,” and “scandalizing.” Deconstructive thought allows the user to think that he is the heir to a clever and elite system of groundbreaking procedures. Ultimately, it is all smoke and mirrors, resulting only in a lack of true critical and insightful thought. Jacques Derrida saw structuralism as both authoritarian in manner and based on questionable philosophical premises. He saw structuralism as demanding that meaning be present in artifacts waiting to be recovered by an act of analysis while his own theory of deconstruction pictures meaning as far more transitory and certainly far less stable than that. Derrida argues that the standard conception of meaning in the West depends on an assumption, called logocentrism, of a 'metaphysics of presence', that is, the full meaning of a word is held to be 'present' to the speaker, or writer, in their mind, as they use it. Such transparent presence of meaning can never be achieved, according to Derrida, because of the action of 'différance.' He defines this as the process by which meaning 'slips' in the act of transmission. Words always contain within themselves traces of meanings other than their assumed primary one. It is probably better to talk of a field of meaning rather than a precise one-to-one correspondence between word and meaning. As the structuralists built up systems of words with signs, so does Derrida tear them down the same way. His major concern is to direct our attention to the many gaps in our system of discourse which, try as we may, we can never quite disguise. Thus his is a philosophy that very self-consciously sets out to deflate philosophical pretensions about our ability to order the world. Derrida urges that there is a tension between opposites, and there is no central meaning holding it all together. Therefore, any unit of language could, potentially, mean just about anything. Without meaning, then there can be no Truth and no Authority. Deconstruction revolves around taking a thing apart, not merely to see how it works, but rather to see how and why it was put together like that in the first place. Derrida added the interesting and novel idea that literature was overly dependent on these 'binary opposites.' (man/woman, heterosexual/homosexual, abnormal/normal, true/false etc) He notes that Western thought assumes that such binary opposites are inflexibly loaded into the universe, with one or the other as dominant. As a result, he used deconstruction as a means to destabilize such binary opposites.</span></span></p><span data-dcnode-id="5345" instrument_node=""> </span><p class="q-text qu-display--block qu-wordBreak--break-word qu-textAlign--start" data-dcnode-id="5340" style="box-sizing: border-box; margin-bottom: 1em; overflow-wrap: anywhere; direction: ltr;"><span data-dcnode-id="5343" style="font-weight: normal; font-style: italic; background: none;"><span data-dcnode-id="5344" instrument_node="">Feminism</span></span><span data-dcnode-id="5341" style="font-weight: normal; font-style: normal; background: none;"><span data-dcnode-id="5342" instrument_node="">:</span></span></p><span data-dcnode-id="5339" instrument_node=""> </span><p class="q-text qu-display--block qu-wordBreak--break-word qu-textAlign--start" data-dcnode-id="5336" style="box-sizing: border-box; margin-bottom: 1em; overflow-wrap: anywhere; direction: ltr;"><span data-dcnode-id="5337" style="font-weight: normal; font-style: normal; background: none;"><span data-dcnode-id="5338" instrument_node="">Feminism attempts to critique the established canon of Western civilization and to expose the standards on which it is based as patriarchal; to recover forgotten and neglected texts by women in order to reevaluate them; to establish 'gynocentrism' the study of women-centered writing; and to establish a women's canon. Feminism asserts that language does not belong to women but it is rather a male artifact, part of a male culture, and has been shaped to meet men's needs. Because of this, for a woman to have any kind of power, she had to become a man by writing under a man's name. Men's language includes, but is not limited to, the ultimately cold and patriarchal complex of logic and reasoning which has so dominated Western discourse. Clearly, then, men's language is the language of law, of authority, and deliberately ignores emotions. Women's language, consequently, is mostly limited to non-rational utterances and evocations like laughter, screaming, grunts, and moans. Feminists attempt to refute the patriarchal system and empower the feminine system by focusing on areas not often found in literary discourse like penises, vaginas, and orgasms. The underlying purpose of such a focus is to create a powerful experience that cannot be explained using traditional patriarchal language.</span></span></p><span data-dcnode-id="5335" instrument_node=""> </span><p class="q-text qu-display--block qu-wordBreak--break-word qu-textAlign--start" data-dcnode-id="5330" style="box-sizing: border-box; margin-bottom: 1em; overflow-wrap: anywhere; direction: ltr;"><span data-dcnode-id="5333" style="font-weight: normal; font-style: italic; background: none;"><span data-dcnode-id="5334" instrument_node="">Marxism</span></span><span data-dcnode-id="5331" style="font-weight: normal; font-style: normal; background: none;"><span data-dcnode-id="5332" instrument_node="">:</span></span></p><span data-dcnode-id="5329" instrument_node=""> </span><p class="q-text qu-display--block qu-wordBreak--break-word qu-textAlign--start" data-dcnode-id="5318" style="box-sizing: border-box; margin-bottom: 1em; overflow-wrap: anywhere; direction: ltr;"><span data-dcnode-id="5327" style="font-weight: normal; font-style: normal; background: none;"><span data-dcnode-id="5328" instrument_node="">Marxism is a system of thought first articulated by Karl Marx. Marx used it in an economic sense but future generations of adherent have widened its scope to include many other disciplines like literature, the arts, and politics. Marx used his philosophy as a club to bash capitalism. He was sure that sooner or later (probably sooner) the downtrodden underpaid assembly line workers toiling in the sweat shops of nineteenth century England would become so angry at their mis-treatment that they would revolt and seize the means of production and kick out the rascally capitalists to establish a dictatorship of the proletariat that would immediately precede the commencement of a communist workers' paradise with peace, justice, and prosperity for all. Marx outlined these ideas in </span></span><span data-dcnode-id="5325" style="font-weight: normal; font-style: italic; background: none;"><span data-dcnode-id="5326" instrument_node="">The Communist Manifesto</span></span><span data-dcnode-id="5323" style="font-weight: normal; font-style: normal; background: none;"><span data-dcnode-id="5324" instrument_node=""> (1848) and </span></span><span data-dcnode-id="5321" style="font-weight: normal; font-style: italic; background: none;"><span data-dcnode-id="5322" instrument_node="">Das Kapital</span></span><span data-dcnode-id="5319" style="font-weight: normal; font-style: normal; background: none;"><span data-dcnode-id="5320" instrument_node=""> (1867). Essentially, Marx envisioned a highly predictable tyranny of capitalists whom he called the bourgeoisie who would exploit the common workers called the proletariat until such time of the fall of the former and the rise of the latter. History has not been kind to adherents of Marxism. Everywhere and anywhere that Marxism has been installed as the central ideology of a state, it has either failed totally or is in the process of failing right now.</span></span></p><span data-dcnode-id="5317" instrument_node=""> </span><p class="q-text qu-display--block qu-wordBreak--break-word qu-textAlign--start" data-dcnode-id="5312" style="box-sizing: border-box; margin-bottom: 1em; overflow-wrap: anywhere; direction: ltr;"><span data-dcnode-id="5315" style="font-weight: normal; font-style: italic; background: none;"><span data-dcnode-id="5316" instrument_node="">Postmodernism</span></span><span data-dcnode-id="5313" style="font-weight: normal; font-style: normal; background: none;"><span data-dcnode-id="5314" instrument_node="">:</span></span></p><span data-dcnode-id="5311" instrument_node=""> </span><p class="q-text qu-display--block qu-wordBreak--break-word qu-textAlign--start" data-dcnode-id="5308" style="box-sizing: border-box; margin-bottom: 1em; overflow-wrap: anywhere; direction: ltr;"><span data-dcnode-id="5309" style="font-weight: normal; font-style: normal; background: none;"><span data-dcnode-id="5310" instrument_node="">Postmodernism is a catchall term that gained resonance in the 1960s whose adherents deny the unitary existence of concepts that had previously been deemed Eternal Truths. Reality is a myth a postmodern would say. All that we see, hear, and feel and think of as solidly grounded is provisional, temporary, and ephemeral. Reality is no more than an ideological human construct.</span></span></p><span data-dcnode-id="5307" instrument_node=""> </span><p class="q-text qu-display--block qu-wordBreak--break-word qu-textAlign--start" data-dcnode-id="5304" style="box-sizing: border-box; margin-bottom: 1em; overflow-wrap: anywhere; direction: ltr;"><span data-dcnode-id="5305" style="font-weight: normal; font-style: italic; background: none;"><span data-dcnode-id="5306" instrument_node="">Poststructuralism:</span></span></p><span data-dcnode-id="5303" instrument_node=""> </span><p class="q-text qu-display--block qu-wordBreak--break-word qu-textAlign--start" data-dcnode-id="5300" style="box-sizing: border-box; margin-bottom: 1em; overflow-wrap: anywhere; direction: ltr;"><span data-dcnode-id="5301" style="font-weight: normal; font-style: normal; background: none;"><span data-dcnode-id="5302" instrument_node="">Poststructuralism is often misidentified as synonymous with deconstruction. The latter is but one type of the former. After structuralism began to go out of fashion in the late 1960s, various new types of critical thought took center stage, none of which argued as did the structuralists that underlying all of society was a Grand Unifying Theory but all of which saw reality as a construct and insisted that there was no definite "meaning" in anything. Further, they argued that the idea of a traditional author writing a traditional text never existed. All authors blended into one other and all texts were seen as intertextual.</span></span></p><span data-dcnode-id="5299" instrument_node=""> </span><p class="q-text qu-display--block qu-wordBreak--break-word qu-textAlign--start" data-dcnode-id="5294" style="box-sizing: border-box; margin-bottom: 1em; overflow-wrap: anywhere; direction: ltr;"><span data-dcnode-id="5297" style="font-weight: normal; font-style: italic; background: none;"><span data-dcnode-id="5298" instrument_node="">Reader-Response</span></span><span data-dcnode-id="5295" style="font-weight: normal; font-style: normal; background: none;"><span data-dcnode-id="5296" instrument_node="">:</span></span></p><span data-dcnode-id="5293" instrument_node=""> </span><p class="q-text qu-display--block qu-wordBreak--break-word qu-textAlign--start" data-dcnode-id="5286" style="box-sizing: border-box; margin-bottom: 0px; overflow-wrap: anywhere; direction: ltr;"><span data-dcnode-id="5291" style="font-weight: normal; font-style: normal; background: none;"><span data-dcnode-id="5292" instrument_node="">In the 1970s arose a form of literary theory that placed the reader as far more than a passive recipient of the words of a text. This was reader-response theory which actively asserted that the reader </span></span><span data-dcnode-id="5289" style="font-weight: normal; font-style: italic; background: none;"><span data-dcnode-id="5290" instrument_node="">created</span></span><span data-dcnode-id="5287" style="font-weight: normal; font-style: normal; background: none;"><span data-dcnode-id="5288" instrument_node=""> a text by using his stored life-experiences as a means to elicit a continually changing and evolving response. This theory asked the reader to consider a variety of questions: Who is the reader? Does meaning reside in the text, the reader, or both? Finally, how does the reader read? In reader-response criticism, the focus is on the reader's responses to a literary text. This response is often misinterpreted to mean only: "What does this text mean to me? I can't be faulted if I give my personal reaction." It is more correct for the reader to combine personal response to the text with rigorous analysis of that text. This analysis assumes that the reader (his personal habits, psychology, education, personality, etc) cannot be omitted from his understanding of a text. Further, the reader is not passively reading the words on the page; the reader is actively seeking the meaning of a text. Each reader reads a text differently from another reader. Indeed, even the same reader can read a text twice, with each reading providing a new meaning since the reader may have a different mood, mindset, or purpose from the initial reading. A logical objection to reader-response criticism is that since there is such a wide range of subjectivity and variability in each reader and reading, can anyone find a common thread of meaning in a text? The answer lies in what reader-response advocate Louise Rosenblatt terms the "transactional" approach. Here the reader is encouraged to view all reading as a triangle of reader, text, and meaning. You are the reader replete with all the individuating traits that mark you as an individual. You might then legitimately inquire what the text means to you; the focus is now on you the reader rather than the text. You as the reader analyze the text using various standard tools of literary analysis to uncover the highly technical aspects of the text. The focus here shifts from reader to text. Finally the reader (you) combine what the text means to you with the various technical aspects of the text to produce a "meaning." This "meaning" of course is not the organic meaning of the New Critics but a meaning which oscillates from one reader to another.</span></span></p></span></span></div></div></div></div></div></div></div><div class="q-box qu-zIndex--action_bar" data-dcnode-id="5214" style="box-sizing: border-box;"><div class="q-box ActionBar___StyledBox-sc-1tz1b8b-1 jxrrvA" data-dcnode-id="5215" style="box-sizing: border-box; transition-property: box-shadow; transition-duration: 250ms; transition-timing-function: ease-out;"><div class="q-flex qu-justifyContent--space-between qu-alignItems--center qu-flexWrap--nowrap qu-py--tiny" data-dcnode-id="5216" style="box-sizing: border-box; display: flex;"><div class="q-flex qu-alignItems--center" data-dcnode-id="5230" style="box-sizing: border-box; display: flex;"><div class="q-inlineFlex qu-mr--small" data-dcnode-id="5252" style="box-sizing: border-box; display: inline-flex;"><div class="q-inlineFlex qu-borderRadius--pill qu-alignItems--center" data-dcnode-id="5253" style="box-sizing: border-box; display: inline-flex; background-color: rgba(0, 0, 1, 0.03);"><div class="q-box qu-display--inline-block" data-dcnode-id="5263" style="box-sizing: border-box; pointer-events: all;"><div class="q-relative puppeteer_popper_reference" data-dcnode-id="5264" style="box-sizing: border-box; position: relative;"><button aria-label="6 upvotes" class="q-click-wrapper ClickWrapper___StyledClickWrapperBox-zoqi4f-0 bIwtPb base___StyledClickWrapper-lx6eke-1 eqENAR undefined qu-borderTopLeftRadius--pill qu-borderBottomLeftRadius--pill qu-alignItems--center qu-justifyContent--center qu-whiteSpace--nowrap qu-userSelect--none qu-display--inline-flex qu-tapHighlight--white qu-textAlign--center qu-cursor--pointer qu-hover--bg--darken qu-hover--textDecoration--none" data-dcnode-id="5265" role="button" style="box-sizing: border-box; font: inherit; paddin div class="q-relative" data-dcnode-id="5064" style="box-sizing: border-box; position: relative;"><div class="q-box qu-overflow--hidden" data-dcnode-id="5065" style="box-sizing: border-box; max-height: 300px;"><div class="q-text qu-wordBreak--break-word" data-dcnode-id="5066" style="box-sizing: border-box;"><span class="q-box qu-userSelect--text" data-dcnode-id="5067" style="box-sizing: border-box;"><p class="q-text qu-display--block qu-wordBreak--break-word qu-textAlign--start" data-dcnode-id="5088" style="box-sizing: border-box; margin-bottom: 1em; overflow-wrap: anywhere; direction: ltr;"><span data-dcnode-id="5089" style="font-weight: normal; font-style: normal; background: none;"><span data-dcnode-id="5090" instrument_node="">Simply put, the historical approach to literary criticism (= author- centered approach) has been a traditional consideration that existed before the popularity of structuralism and so-called New Criticism, an approach that does not take into account the intentions of the author or the period in which the work was produced.</span></span></p><span data-dcnode-id="5087" instrument_node=""> </span><p class="q-text qu-display--block qu-wordBreak--break-word qu-textAlign--start" data-dcnode-id="5084" style="box-sizing: border-box; margin-bottom: 1em; overflow-wrap: anywhere; direction: ltr;"><span data-dcnode-id="5085" style="font-weight: normal; font-style: normal; background: none;"><span data-dcnode-id="5086" instrument_node="">In New criticism TEXT was considered a social product, not the product of “the author.”</span></span></p><span data-dcnode-id="5083" instrument_node=""> </span><p class="q-text qu-display--block qu-wordBreak--break-word qu-textAlign--start" data-dcnode-id="5080" style="box-sizing: border-box; margin-bottom: 0px; overflow-wrap: anywhere; direction: ltr;"><span data-dcnode-id="5081" style="font-weight: normal; font-style: normal; background: none;"><span data-dcnode-id="5082" instrument_node="">My answer here is applied to both literary and textual criticism; both are inseparable. You could not say literary criticism without textual criticism. See Fredson Bowers’s famous book: Tex</span></span></p><div class="q-absolute qu-textAlign--center qu-zIndex--base" data-dcnode-id="5068" style="box-sizing: border-box; position: absolute; width: 100%; height: 100px; bottom: 0px; background: linear-gradient(rgba(255, 255, 255, 0) 0%, rgb(255, 255, 255) 100%);" width="100%"><div class="q-inlineFlex" data-dcnode-id="5069" style="box-sizing: border-box; display: inline-flex;"><div class="q-relative" data-dcnode-id="5070" style="box-sizing: border-box; position: relative; bottom: -60px;"><button class="q-click-wrapper qu-active--textDecoration--none qu-focus--textDecoration--none ClickWrapper___StyledClickWrapperBox-zoqi4f-0 bIwtPb base___StyledClickWrapper-lx6eke-1 fURggN puppeteer_test_read_more_button qu-borderRadius--pill qu-alignItems--center qu-justifyContent--center qu-whiteSpace--nowrap qu-userSelect--none qu-display--inline-flex qu-bg--gray_ultralight qu-tapHighlight--white qu-textAlign--center qu-cursor--pointer qu-hover--textDecoration--none" data-dcnode-id="5071" role="button" style="box-sizing: border-box; font: inherit; padding: 0px 15px; transition-property: box-shadow, background-color; transition-duration: 60ms; transition-timing-function: ease-out; height: 30px; min-width: 30px; position: relative; box-shadow: rgba(99, 100, 102, 0.2) 0px 0px 0px 1px inset; border-width: 0px; outline: none; color: inherit;" tabindex="0" type="button"><div class="q-flex qu-alignItems--center qu-justifyContent--center" data-dcnode-id="5072" style="box-sizing: border-box; display: flex; max-width: 100%; transition-property: opacity; transition-duration: 60ms; transition-timing-function: ease-in-out;"><div class="q-text qu-display--inline-flex qu-alignItems--center qu-overflow--hidden puppeteer_test_button_text qu-medium qu-color--gray" data-dcnode-id="5077" style="box-sizing: border-box; font-size: 13px;"><div class="q-text qu-ellipsis qu-whiteSpace--nowrap" data-dcnode-id="5078" style="box-sizing: border-box; line-height: normal;"><span data-dcnode-id="5079" instrument_node="">Continue Reading</span></div></div><span class="q-inlineBlock qu-ml--tiny qu-mr--n_tiny" data-dcnode-id="5073" name="ChevronDown" style="box-sizing: border-box; display: inline-block; width: 16px; height: 16px; flex-shrink: 0; line-height: 16px;" width="16px"><span class="CssComponent__CssInlineComponent-sc-1oskqb9-1 Icon___StyledCssInlineComponent-sc-11tmcw7-0 fNkmIo" data-dcnode-id="5074"><svg data-dcnode-id="5075" height="24" viewBox="0 0 24 24" width="24" xmlns="http://www.w3.org/2000/svg"><path class="icon_svg-stroke" d="m5 8.5 7 7 7.005-7" data-dcnode-id="5076" fill="none" stroke="#666" stroke-linecap="round" stroke-width="1.5"></path></svg></span></span></div></button></div></div></div></span></div></div></div></div><div class="q-box qu-display--none" data-dcnode-id="4976" style="box-sizing: border-box;"><div class="q-text" data-dcnode-id="4977" style="box-sizing: border-box; max-width: 100%;"><span class="CssComponent__CssInlineComponent-sc-1oskqb9-1 UserSelectableText___StyledCssInlineComponent-lsmoq4-0 kghFzc" data-dcnode-id="4978"><span class="q-box qu-userSelect--text" data-dcnode-id="4979" style="box-sizing: border-box;"><p class="q-text qu-display--block qu-wordBreak--break-word qu-textAlign--start" data-dcnode-id="5060" style="box-sizing: border-box; margin-bottom: 1em; overflow-wrap: anywhere; direction: ltr;"><span data-dcnode-id="5061" style="font-weight: normal; font-style: normal; background: none;"><span data-dcnode-id="5062" instrument_node="">Simply put, the historical approach to literary criticism (= author- centered approach) has been a traditional consideration that existed before the popularity of structuralism and so-called New Criticism, an approach that does not take into account the intentions of the author or the period in which the work was produced.</span></span></p><span data-dcnode-id="5059" instrument_node=""> </span><p class="q-text qu-display--block qu-wordBreak--break-word qu-textAlign--start" data-dcnode-id="5056" style="box-sizing: border-box; margin-bottom: 1em; overflow-wrap: anywhere; direction: ltr;"><span data-dcnode-id="5057" style="font-weight: normal; font-style: normal; background: none;"><span data-dcnode-id="5058" instrument_node="">In New criticism TEXT was considered a social product, not the product of “the author.”</span></span></p><span data-dcnode-id="5055" instrument_node=""> </span><p class="q-text qu-display--block qu-wordBreak--break-word qu-textAlign--start" data-dcnode-id="5052" style="box-sizing: border-box; margin-bottom: 1em; overflow-wrap: anywhere; direction: ltr;"><span data-dcnode-id="5053" style="font-weight: normal; font-style: normal; background: none;"><span data-dcnode-id="5054" instrument_node="">My answer here is applied to both literary and textual criticism; both are inseparable. You could not say literary criticism without textual criticism. See Fredson Bowers’s famous book: Textual and Literary Criticism (1959).</span></span></p><span data-dcnode-id="5051" instrument_node=""> </span><p class="q-text qu-display--block qu-wordBreak--break-word qu-textAlign--start" data-dcnode-id="5048" style="box-sizing: border-box; margin-bottom: 1em; overflow-wrap: anywhere; direction: ltr;"><span data-dcnode-id="5049" style="font-weight: normal; font-style: normal; background: none;"><span data-dcnode-id="5050" instrument_node="">When I as textual editor edited and published Edmund Spenser’s The Faerie Queene, an old spelling edition, in 2001 for the “Longman Annotated English Poets” Series (Pearson Education, later Routledge in 2013), I wrote as follows:</span></span></p><span data-dcnode-id="5047" instrument_node=""> </span><p class="q-text qu-display--block qu-wordBreak--break-word qu-textAlign--start" data-dcnode-id="5044" style="box-sizing: border-box; margin-bottom: 1em; overflow-wrap: anywhere; direction: ltr;"><span data-dcnode-id="5045" style="font-weight: normal; font-style: normal; background: none;"><span data-dcnode-id="5046" instrument_node="">Recently some scholars emphasize that Shakespeare’s play-text is not more than a skeleton or a score for several lost voices and that even if we could remove the scribal and compositorial interference from the extant quarto and folio texts and arrive at a script whose spelling and punctuation were entirely Shakespeare’s, those authentic signals might tell us little about how the play was performed on the actual stage. Their arguments for modernized spellings of Shakespeare’s text have become particularly prominent. They consider alterations for the sake of readability more important than holding on to unmodernized texts and criticize those who do not accept modernization, saying that all editions, including unmodernized ones, are time-bound and reflect the concerns and attitudes of the age in which they were produced.</span></span></p><span data-dcnode-id="5043" instrument_node=""> </span><p class="q-text qu-display--block qu-wordBreak--break-word qu-textAlign--start" data-dcnode-id="5040" style="box-sizing: border-box; margin-bottom: 1em; overflow-wrap: anywhere; direction: ltr;"><span data-dcnode-id="5041" style="font-weight: normal; font-style: normal; background: none;"><span data-dcnode-id="5042" instrument_node="">To them I responded thus.</span></span></p><span data-dcnode-id="5039" instrument_node=""> </span><p class="q-text qu-display--block qu-wordBreak--break-word qu-textAlign--start" data-dcnode-id="5036" style="box-sizing: border-box; margin-bottom: 1em; overflow-wrap: anywhere; direction: ltr;"><span data-dcnode-id="5037" style="font-weight: normal; font-style: normal; background: none;"><span data-dcnode-id="5038" instrument_node="">First, even if the published writings which command our attention were products of collaborative efforts, is it not a legitimate pursuit to probe into the particular mind that initiated the work? We may want to know exactly what such an initiating mind contributed to the efforts. It is by no means unimportant to attempt to establish what Shakespeare actually thought and wrote by himself.</span></span></p><span data-dcnode-id="5035" instrument_node=""> </span><p class="q-text qu-display--block qu-wordBreak--break-word qu-textAlign--start" data-dcnode-id="5032" style="box-sizing: border-box; margin-bottom: 1em; overflow-wrap: anywhere; direction: ltr;"><span data-dcnode-id="5033" style="font-weight: normal; font-style: normal; background: none;"><span data-dcnode-id="5034" instrument_node="">Second, the knowledge of the fact that “all editions are time-bound” does not or should not prevent scholars from explorations of textual documents in the past. One who is engaged in historical scholarship can attempt, through an informed imaginative effort, to penetrate into the thinking of another time, even though he or she knows that the result can never be complete and that the endeavor will have to be reattempted by others in the future. Yet, it does not follow that such efforts at historical reconstruction of the lost original are a waste of time.</span></span></p><span data-dcnode-id="5031" instrument_node=""> </span><p class="q-text qu-display--block qu-wordBreak--break-word qu-textAlign--start" data-dcnode-id="5028" style="box-sizing: border-box; margin-bottom: 1em; overflow-wrap: anywhere; direction: ltr;"><span data-dcnode-id="5029" style="font-weight: normal; font-style: normal; background: none;"><span data-dcnode-id="5030" instrument_node="">On the other hand, it may be said that modernized texts, like some kinds of critical essays, are attempts at elucidation, which may be more or less helpful to the readers of a given time. However, those readers who are interested in a work as testimony from the past must be careful and use the best results available that historical scholarship has achieved in the imaginative reconstruction or recovery of particular texts and versions of that work.</span></span></p><span data-dcnode-id="5027" instrument_node=""> </span><p class="q-text qu-display--block qu-wordBreak--break-word qu-textAlign--start" data-dcnode-id="5024" style="box-sizing: border-box; margin-bottom: 1em; overflow-wrap: anywhere; direction: ltr;"><span data-dcnode-id="5025" style="font-weight: normal; font-style: normal; background: none;"><span data-dcnode-id="5026" instrument_node="">Edmund Spenser was not a playwright, nor were his works plays.His Faerie Queene and other poems were written and completed by himself to be read by his contemporaries. Is it not important, in this case, to strip away the interference of the compositors and the printing process and try to know what was actually written in his manuscript? Do the authentic signals which may appear as a result of such investigation not help us discover how Spenser wrote and thought, and is it not an essential activity for understanding Spenser and The Faerie Queene?</span></span></p><span data-dcnode-id="5023" instrument_node=""> </span><p class="q-text qu-display--block qu-wordBreak--break-word qu-textAlign--start" data-dcnode-id="5020" style="box-sizing: border-box; margin-bottom: 1em; overflow-wrap: anywhere; direction: ltr;"><span data-dcnode-id="5021" style="font-weight: normal; font-style: normal; background: none;"><span data-dcnode-id="5022" instrument_node="">I answered “Yes” to these questions and so edited the old spelling text.</span></span></p><span data-dcnode-id="5019" instrument_node=""> </span><p class="q-text qu-display--block qu-wordBreak--break-word qu-textAlign--start" data-dcnode-id="5016" style="box-sizing: border-box; margin-bottom: 1em; overflow-wrap: anywhere; direction: ltr;"><span data-dcnode-id="5017" style="font-weight: normal; font-style: normal; background: none;"><span data-dcnode-id="5018" instrument_node="">For details of my studies, see my home page:</span></span></p><a rt" data-dcnode-id="4779" style="box-sizing: border-box; margin-bottom: 1em; overflow-wrap: anywhere; direction: ltr;"><span data-dcnode-id="4780" style="font-weight: normal; font-style: normal; background: none;"><span data-dcnode-id="4781" instrument_node="">Because literature is stuff that’s written down, especially in narrative form.</span></span></p><span data-dcnode-id="4778" instrument_node=""> </span><p class="q-text qu-display--block qu-wordBreak--break-word qu-textAlign--start" data-dcnode-id="4775" style="box-sizing: border-box; margin-bottom: 1em; overflow-wrap: anywhere; direction: ltr;"><span data-dcnode-id="4776" style="font-weight: normal; font-style: normal; background: none;"><span data-dcnode-id="4777" instrument_node="">Historical writing is stuff that’s written down, especially in narrative form.</span></span></p><span data-dcnode-id="4774" instrument_node=""> </span><p class="q-text qu-display--block qu-wordBreak--break-word qu-textAlign--start" data-dcnode-id="4771" style="box-sizing: border-box; margin-bottom: 1em; overflow-wrap: anywhere; direction: ltr;"><span data-dcnode-id="4772" style="font-weight: normal; font-style: normal; background: none;"><span data-dcnode-id="4773" instrument_node="">I’m not sure it’s possible to make it much clearer than that…..</span></span></p><span data-dcnode-id="4770" instrument_node=""> </span><p class="q-text qu-display--block qu-wordBreak--break-word qu-textAlign--start" data-dcnode-id="4767" style="box-sizing: border-box; margin-bottom: 1em; overflow-wrap: anywhere; direction: ltr;"><span data-dcnode-id="4768" style="font-weight: normal; font-style: normal; background: none;"><span data-dcnode-id="4769" instrument_node="">Think of it as a big box. Literature is a very big box, and it contains inside it smaller boxes like “fiction” and “nonfiction” and “poetry” and “drama” and “prose.” Within those smaller boxes may be even smaller boxes like “haiku” and “Film as literature” and “Westerns” and “Romance novels” and so forth.</span></span></p><span data-dcnode-id="4766" instrument_node=""> </span><p class="q-text qu-display--block qu-wordBreak--break-word qu-textAlign--start" data-dcnode-id="4763" style="box-sizing: border-box; margin-bottom: 1em; overflow-wrap: anywhere; direction: ltr;"><span data-dcnode-id="4764" style="font-weight: normal; font-style: normal; background: none;"><span data-dcnode-id="4765" instrument_node="">Inside the nonfiction box that’s inside literature, you also find even smaller boxes like “memoir” and “travel writing” and “philosophical essay” and so forth. One of those even smaller boxes will also include history.</span></span></p><span data-dcnode-id="4762" instrument_node=""> </span><p class="q-text qu-display--block qu-wordBreak--break-word qu-textAlign--start" data-dcnode-id="4747" style="box-sizing: border-box; margin-bottom: 1em; overflow-wrap: anywhere; direction: ltr;"><span data-dcnode-id="4760" style="font-weight: normal; font-style: normal; background: none;"><span data-dcnode-id="4761" instrument_node="">Remember—the word </span></span><span data-dcnode-id="4758" style="font-weight: normal; font-style: italic; background: none;"><span data-dcnode-id="4759" instrument_node="">history</span></span><span data-dcnode-id="4756" style="font-weight: normal; font-style: normal; background: none;"><span data-dcnode-id="4757" instrument_node=""> comes from the same root as </span></span><span data-dcnode-id="4754" style="font-weight: normal; font-style: italic; background: none;"><span data-dcnode-id="4755" instrument_node="">story</span></span><span data-dcnode-id="4752" style="font-weight: normal; font-style: normal; background: none;"><span data-dcnode-id="4753" instrument_node="">—the Latin word </span></span><span data-dcnode-id="4750" style="font-weight: normal; font-style: italic; background: none;"><span data-dcnode-id="4751" instrument_node="">historia</span></span><span data-dcnode-id="4748" style="font-weight: normal; font-style: normal; background: none;"><span data-dcnode-id="4749" instrument_node="">. For us, history is specifically the story of human events, but for the Romans, it just meant story. Thus, it goes in literature.</span></span></p><span data-dcnode-id="4746" instrument_node=""> </span><p class="q-text qu-display--block qu-wordBreak--break-word qu-textAlign--start" data-dcnode-id="4743" style="box-sizing: border-box; margin-bottom: 0px; overflow-wrap: anywhere; direction: ltr;"><span data-dcnode-id="4744" style="font-weight: normal; font-style: normal; background: none;"><span data-dcnode-id="4745" instrument_node="">Don’t fall into the common trap of thinking “literature=fiction.” Literature is larger than that.</span></span></p></span></span></div></div></div></div></div></div></div><div class="q-box qu-zIndex--action_bar" data-dcnode-id="4666" style="box-sizing: border-box;"><div class="q-box ActionBar___StyledBox-sc-1tz1b8b-1 jxrrvA" data-dcnode-id="4667" style="box-sizing: border-box; transition-property: box-shadow; transition-duration: 250ms; transition-timing-function: ease-out;"><div class="q-flex qu-justifyContent--space-between qu-alignItems--center qu-flexWrap--nowrap qu-py--tiny" data-dcnode-id="4668" style="box-sizing: border-box; display: flex;"><div class="q-flex qu-alignItems--center" data-dcnode-id="4682" style="box-sizing: border-box; display: flex;"><div class="q-inlineFlex qu-mr--small" data-dcnode-id="4709" style="box-sizing: border-box; display: inline-flex;"><div class="q-inlineFlex qu-borderRadius--pill qu-alignItems--center" data-dcnode-id="4710" style="box-sizing: border-box; display: inline-flex; background-color: rgba(0, 0, 1, 0.03);"><div class="q-box qu-display--inline-block" data-dcnode-id="4720" style="box-sizing: border-box; pointer-events: all;"><div class="q-relative puppeteer_popper_reference" data-dcnode-id="4721" style="box-sizing: border-box; position: relative;"><button aria-label="12 upvotes" class="q-click-wrapper ClickWrapper___ -0 kghFzc" data-dcnode-id="4529"><span class="q-box qu-userSelect--text" data-dcnode-id="4530" style="box-sizing: border-box;"><p class="q-text qu-display--block qu-wordBreak--break-word qu-textAlign--start" data-dcnode-id="4531" style="box-sizing: border-box; margin-bottom: 0px; overflow-wrap: anywhere; direction: ltr;"><span data-dcnode-id="4532" style="font-weight: normal; font-style: normal; background: none;"><span data-dcnode-id="4533" instrument_node="">Feminism attempts to critique the established canon of Western civilization and to expose the standards on which it is based as patriarchal; to recover forgotten and neglected texts by women in order to reevaluate them; to establish 'gynocentrism' the study of women-centered writing; and to establish a women's canon. Feminism asserts that language does not belong to women but it is rather a male artifact, part of a male culture, and has been shaped to meet men's needs. Because of this, for a woman to have any kind of power, she had to become a man by writing under a man's name. Men's language includes, but is not limited to, the ultimately cold and patriarchal complex of logic and reasoning which has so dominated Western discourse. Clearly, then, men's language is the language of law, of authority, and deliberately ignores emotions. Women's language, consequently, is mostly limited to non-rational utterances and evocations like laughter, screaming, grunts, and moans. Feminists attempt to refute the patriarchal system and empower the feminine system by focusing on areas not often found in literary discourse like penises, vaginas, and orgasms. The underlying purpose of such a focus is to create a powerful experience that cannot be explained using traditional patriarchal language. Luce Irigaray has been a particular proponent of différance feminism. Women's identity is for her, unlike men's, very diffuse. She notes that Cixous' ecriture feminine is designed to capture this diffuseness and difference. Further, she adds that it is useless to trap women in the exact definition of what they mean, and the same goes for ecriture feminine. Her critics charge her that this emphasis on difference leaves Irigaray vulnerable to the charge of biological essentialism. She was a vocal champion of separatism from men, which is biological essentialism. Julie Kristeva is another feminist who had three primary concerns: (a) her attempt to bring back the body into literary discourse (b) her focus on the significance of the maternal and pre-Oedipal in the constitution of subjectivity and (c) her notion of abjection as an explanation for oppression and discrimination. Helene Cixous has had a life-long fascination with multiplicity, fluidity, and a repudiation of identities, texts, and social structures that sought male-dominant hierarchy and rigidity. She insists that female experience, hitherto repressed, is very different from that of men, and therefore requires a different mode of articulation. In New French feminism, her celebration of the female body and female desire represent an attempt to re-state in material terms the positive value of what, in masculine terms, is described negatively as the 'other.' French feminism is particularly concerned with the factor of 'différance,' which carries Derrida's hallmark. The concept of ecriture feminine offers a direct challenge to the assumptions of patriarchy. For Cixous, ecriture feminine constitutes a form of writing which enables women to present themselves as they want, rather than as men want them to be. She is doubtful that the differences between men and women can be overcome even to allow them to talk to one another politely.</span></span></p></span></span></div></div></div></div></div></div></div><div class="q-box qu-zIndex--action_bar" data-dcnode-id="4459" style="box-sizing: border-box;"><div class="q-box ActionBar___StyledBox-sc-1tz1b8b-1 jxrrvA" data-dcnode-id="4460" style="box-sizing: border-box; transition-property: box-shadow; tran strument_node=""> </span><p class="q-text qu-display--block qu-wordBreak--break-word qu-textAlign--start" data-dcnode-id="4335" style="box-sizing: border-box; margin-bottom: 0px; overflow-wrap: anywhere; direction: ltr;"><span data-dcnode-id="4336" style="font-weight: normal; font-style: normal; background: none;"><span data-dcnode-id="4337" instrument_node="">Naomi's answer covers a lot of ground when it comes to how a text should be written if it means to be feminist. So to be very brief: if a text aspires to be feminist it must treat its characters without gender bias. Please note that this doesn't mean that the characters in the text can't be conservative, or assholes, or patriarchal; it simply means that the arc</span></span></p><div class="q-absolute qu-textAlign--center qu-zIndex--base" data-dcnode-id="4323" style="box-sizing: border-box; position: absolute; width: 100%; height: 100px; bottom: 0px; background: linear-gradient(rgba(255, 255, 255, 0) 0%, rgb(255, 255, 255) 100%);" width="100%"><div class="q-inlineFlex" data-dcnode-id="4324" style="box-sizing: border-box; display: inline-flex;"><div class="q-relative" data-dcnode-id="4325" style="box-sizing: border-box; position: relative; bottom: -60px;"><button class="q-click-wrapper qu-active--textDecoration--none qu-focus--textDecoration--none ClickWrapper___StyledClickWrapperBox-zoqi4f-0 bIwtPb base___StyledClickWrapper-lx6eke-1 fURggN puppeteer_test_read_more_button qu-borderRadius--pill qu-alignItems--center qu-justifyContent--center qu-whiteSpace--nowrap qu-userSelect--none qu-display--inline-flex qu-bg--gray_ultralight qu-tapHighlight--white qu-textAlign--center qu-cursor--pointer qu-hover--textDecoration--none" data-dcnode-id="4326" role="button" style="box-sizing: border-box; font: inherit; padding: 0px 15px; transition-property: box-shadow, background-color; transition-duration: 60ms; transition-timing-function: ease-out; height: 30px; min-width: 30px; position: relative; box-shadow: rgba(99, 100, 102, 0.2) 0px 0px 0px 1px inset; border-width: 0px; outline: none; color: inherit;" tabindex="0" type="button"><div class="q-flex qu-alignItems--center qu-justifyContent--center" data-dcnode-id="4327" style="box-sizing: border-box; display: flex; max-width: 100%; transition-property: opacity; transition-duration: 60ms; transition-timing-function: ease-in-out;"><div class="q-text qu-display--inline-flex qu-alignItems--center qu-overflow--hidden puppeteer_test_button_text qu-medium qu-color--gray" data-dcnode-id="4332" style="box-sizing: border-box; font-size: 13px;"><div class="q-text qu-ellipsis qu-whiteSpace--nowrap" data-dcnode-id="4333" style="box-sizing: border-box; line-height: normal;"><span data-dcnode-id="4334" instrument_node="">Continue Reading</span></div></div><span class="q-inlineBlock qu-ml--tiny qu-mr--n_tiny" data-dcnode-id="4328" name="ChevronDown" style="box-sizing: border-box; display: inline-block; width: 16px; height: 16px; flex-shrink: 0; line-height: 16px;" width="16px"><span class="CssComponent__CssInlineComponent-sc-1oskqb9-1 Icon___StyledCssInlineComponent-sc-11tmcw7-0 fNkmIo" data-dcnode-id="4329"><svg data-dcnode-id="4330" height="24" viewBox="0 0 24 24" width="24" xmlns="http://www.w3.org/2000/svg"><path class="icon_svg-stroke" d="m5 8.5 7 7 7.005-7" data-dcnode-id="4331" fill="none" stroke="#666" stroke-linecap="round" stroke-width="1.5"></path></svg></span></span></div></button></div></div></div></span></div></div></div></div><div class="q-box qu-display--none" data-dcnode-id="4239" style="box-sizing: border-box;"><div class="q-text" data-dcnode-id="4240" style="box-sizing: border-box; max-width: 100%;"><span class="CssComponent__CssInlineComponent-sc-1oskqb9-1 UserSelectableText___StyledCssInlineComponent-lsmoq4-0 kghFzc" data-dcnode-id="4241"><span class="q-box qu-userSelect--text" data-dcnode-id="4242" style="box-sizing: border-box;"><p class="q-text qu-display--block qu-wordBreak--break-word qu-textAlign--start" data-dcnode-id="4311" style="box-sizing: border-box; margin-bottom: 1em; overflow-wrap: anywhere; direction: ltr;"><span data-dcnode-id="4316" style="font-weight: normal; font-style: normal; background: none;"><span data-dcnode-id="4317" instrument_node="">There can be two parts to the question, one that deals with feminist approach in the very act of creating literature i.e. the </span></span><span data-dcnode-id="4314" style="font-weight: normal; font-style: italic; background: none;"><span data-dcnode-id="4315" instrument_node="">writing, </span></span><span data-dcnode-id="4312" style="font-weight: normal; font-style: normal; background: none;"><span data-dcnode-id="4313" instrument_node="">and the other that deals with the literary analysis of the existent texts from a feminist perspective.</span></span></p><span data-dcnode-id="4310" instrument_node=""> </span><p class="q-text qu-display--block qu-wordBreak--break-word qu-textAlign--start" data-dcnode-id="4307" style="box-sizing: border-box; margin-bottom: 1em; overflow-wrap: anywhere; direction: ltr;"><span data-dcnode-id="4308" style="font-weight: normal; font-style: normal; background: none;"><span data-dcnode-id="4309" instrument_node="">Naomi's answer covers a lot of ground when it comes to how a text should be written if it means to be feminist. So to be very brief: if a text aspires to be feminist it must treat its characters without gender bias. Please note that this doesn't mean that the characters in the text can't be conservative, or assholes, or patriarchal; it simply means that the arc of a character is not influenced by the author's gender bias but rather emerges from out of their situation and how the story has progressed. </span></span></p><span data-dcnode-id="4306" instrument_node=""> </span><p class="q-text qu-display--block qu-wordBreak--break-word qu-textAlign--start" data-dcnode-id="4301" style="box-sizing: border-box; margin-bottom: 1em; overflow-wrap: anywhere; direction: ltr;"><span data-dcnode-id="4304" style="font-weight: normal; font-style: normal; background: none;"><span data-dcnode-id="4305" instrument_node="">Now to the more comprehensive part of the answer. A feminist approach to literature from the position of a reader, or a literary critic would entail reading a text in terms of how it treats its women/queer characters. </span></span><span data-dcnode-id="4302" style="font-weight: normal; font-style: normal; background: none;"><span data-dcnode-id="4303" instrument_node="">To give an example, if a character is just referred to as the wife of a character and appears in the plot only in relation to the needs of a male character, or if most women characters are one-dimensional even though the male characters are painted as complex human beings we can safely say that the author is limited and unimaginative when it comes to writing female characters. The issue is important because for most of history, women characters have always occupied the background while their male counterparts went on ambitious voyages, conquests and plunders and led colourful lives in words.</span></span></p><span data-dcnode-id="4300" instrument_node=""> </span><p class="q-text qu-display--block qu-wordBreak--break-word qu-textAlign--start" data-dcnode-id="4297" style="box-sizing: border-box; margin-bottom: 1em; overflow-wrap: anywhere; direction: ltr;"><span data-dcnode-id="4298" style="font-weight: normal; font-style: normal; background: none;"><span data-dcnode-id="4299" instrument_node="">Of course feminist literary studies doesn't stop there. In all good literature, the surface is only the beginning of the journey; it is often the case that a writer might do a lip service to feminism by giving five women in positions of seeming power (in wealth/career/family terms) but when one scratches the surface one encounters an entirely different story. A woman who is the head of a business conglomerate but who always does what the male characters ask her to do, is painted in a good light for those very reasons, subtly subscribes to patriarchal codes of conduct and exhibits no agency of her own is not a feminist character despite her apparent tremendous power. The next step would be to look at the gender roles, and if the book questions them in any way. If the the gender status-quo is taken for granted every step of the way, the book can't be called feminist.</span></span></p><span data-dcnode-id="4296" instrument_node=""> </span><p class="q-text qu-display--block qu-wordBreak--break-word qu-textAlign--start" data-dcnode-id="4293" style="box-sizing: border-box; margin-bottom: 1em; overflow-wrap: anywhere; direction: ltr;"><span data-dcnode-id="4294" style="font-weight: normal; font-style: normal; background: none;"><span data-dcnode-id="4295" instrument_node="">Another thing to keep in mind is that with time Feminism has become intersectional, and so have all the associated fields. So when we talk about feminist literature, we no longer talk about women as Everywoman, but rather in the context of their race, class, caste, sexuality and a host of other things that might contribute to their marginalization.</span></span></p><span data-dcnode-id="4292" instrument_node=""> </span><p class="q-text qu-display--block qu-wordBreak--break-word qu-textAlign--start" data-dcnode-id="4289" style="box-sizing: border-box; margin-bottom: 1em; overflow-wrap: anywhere; direction: ltr;"><span data-dcnode-id="4290" style="font-weight: normal; font-style: normal; background: none;"><span data-dcnode-id="4291" instrument_node="">And since a Quora answer can't be a substitute for actual reading, here are a few books that may help you understand feminist literary studies as a field of study:</span></span></p><span data-dcnode-id="4288" instrument_node=""> </span><p class="q-text qu-display--block qu-wordBreak--break-word qu-textAlign--start" data-dcnode-id="4281" style="box-sizing: border-box; margin-bottom: 1em; overflow-wrap: anywhere; direction: ltr;"><span data-dcnode-id="4286" style="font-weight: normal; font-style: normal; background: none;"><span data-dcnode-id="4287" instrument_node="">1. </span></span><span data-dcnode-id="4284" style="font-weight: normal; font-style: italic; background: none;"><span data-dcnode-id="4285" instrument_node="">Gender Trouble</span></span><span data-dcnode-id="4282" style="font-weight: normal; font-style: normal; background: none;"><span data-dcnode-id="4283" instrument_node=""> by Judith Butler</span></span></p><span data-dcnode-id="4280" instrument_node=""> </span><p class="q-text qu-display--block qu-wordBreak--break-word qu-textAlign--start" data-dcnode-id="4273" style="box-sizing: border-box; margin-bottom: 1em; overflow-wrap: anywhere; direction: ltr;"><span data-dcnode-id="4278" style="font-weight: normal; font-style: normal; background: none;"><span data-dcnode-id="4279" instrument_node="">2.</span></span><span data-dcnode-id="4276" style="font-weight: normal; font-style: italic; background: none;"><span data-dcnode-id="4277" instrument_node=""> Second Sex</span></span><span data-dcnode-id="4274" style="font-weight: normal; font-style: normal; background: none;"><span data-dcnode-id="4275" instrument_node=""> by Simone de Beauvoir</span></span></p><span data-dcnode-id="4272" instrument_node=""> </span><p class="q-text qu-display--block qu-wordBreak--break-word qu-textAlign--start" data-dcnode-id="4265" style="box-sizing: border-box; margin-bottom: 1em; overflow-wrap: anywhere; direction: ltr;"><span data-dcnode-id="4270" style="font-weight: normal; font-style: normal; background: none;"><span data-dcnode-id="4271" instrument_node="">3. </span></span><span data-dcnode-id="4268" style="font-weight: normal; font-style: italic; background: none;"><span data-dcnode-id="4269" instrument_node="">Ain't I a Woman</span></span><span data-dcnode-id="4266" style="font-weight: normal; font-style: normal; background: none;"><span data-dcnode-id="4267" instrument_node=""> by Bell Hooks</span></span></p><span data-dcnode-id="4264" instrument_node=""> </span><p class="q-text qu-display--block qu-wordBreak--break-word qu-textAlign--start" data-dcnode-id="4257" style="box-sizing: border-box; margin-bottom: 1em; overflow-wrap: anywhere; direction: ltr;"><span data-dcnode-id="4262" style="font-weight: normal; font-style: normal; background: none;"><span data-dcnode-id="4263" instrument_node="">4. </span></span><span data-dcnode-id="4260" style="font-weight: normal; font-style: italic; background: none;"><span data-dcnode-id="4261" instrument_node="">The Mad Woman in the Attic</span></span><span data-dcnode-id="4258" style="font-weight: normal; font-style: normal; background: none;"><span data-dcnode-id="4259" instrument_node=""> by Sandra Gilbert</span></span></p><span data-dcnode-id="4256" instrument_node=""> </span><p class="q-text qu-display--block qu-wordBreak--break-word qu-textAlign--start" data-dcnode-id="4253" style="box-sizing: border-box; margin-bottom: 1em; overflow-wrap: anywhere; direction: ltr;"><span data-dcnode-id="4254" style="font-weight: normal; font-style: normal; background: none;"><span data-dcnode-id="4255" instrument_node="">Other important feminist literary figures include Germaine Greer, Luce Irigaray, Gloria Steinman-though these are all dated now it's important to know the history of the movement and how it was shaped into an academic discipline. Contemporary Indian feminists whose works you can read include Nivedita Menon, Kavita Krishnan, Ruth Vanita, Uma Chakravarti and Urvashi Butalia.</span></span></p><span data-dcnode-id="4252" instrument_node=""> </span><p class="q-text qu-display--block qu-wordBreak--break-word qu-textAlign--start" data-dcnode-id="4243" style="box-sizing: border-box; margin-bottom: 0px; overflow-wrap: anywhere; direction: ltr;"><span data-dcnode-id="4250" style="font-weight: normal; font-style: normal; background: none;"><span data-dcnode-id="4251" instrument_node="">You may start with </span></span><span data-dcnode-id="4248" style="font-weight: normal; font-style: normal; background: none;"><span data-dcnode-id="4249" instrument_node="">Terry Eagleton's </span></span><span data-dcnode-id="4246" style="font-weight: normal; font-style: italic; background: none;"><span data-dcnode-id="4247" instrument_node="">Literary Theory: An Introduction </span></span><span data-dcnode-id="4244" style="font-weight: normal; font-style: normal; background: none;"><span data-dcnode-id="4245" instrument_node="">if you are new to the field.</span></span></p></span></span></div></div></div></div></div></div></div><div class="q-box qu-zIndex--action_bar" data-dcnode-id="4171" style="box-sizing: border-box;"><div class="q-box ActionBar___StyledBox-sc-1tz1b8b-1 jxrrvA" data-dcnode-id="4172" style="box-sizing: border-box; transition-property: box-shadow; transition-duration: 250ms; transition-timing-function: ease-out;"><div class="q-flex qu-justifyContent--space-between qu-alignItems--center qu-flexWrap--nowrap qu-py--tiny" data-dcnode-id="4173" style="box-sizing: border-box; display: flex;"><div class="q-flex qu-alignItems--center" data-dcnode-id="4187" style="box-sizing: border-box; display: flex;"><div class="q-inlineFlex qu-mr--small" data-dcnode-id="4209" style="box-sizing: border-box; display: inline-flex;"><div class="q-inlineFlex qu-borderRadius--pill qu-alignItems--center" data-dcnode-id="4210" style="box-sizing: border-box; display: inline-flex; background-color: rgba(0, 0, 1, 0.03);"><div class="q-box qu-display--inline-block" data-dcnode-id="4220" style="box-sizing: border-box; pointer-events: all;"><div class="q-relative puppeteer_popper_reference" data-dcnode-id="4221" style="box-sizing: border-box; position: relative;"><button aria-label="5 upvotes" class="q-click-wrapper ClickWrapper___StyledClickWrapperBox-zoqi4f-0 bIwtPb base___StyledClickWrapper-lx6eke-1 eqENAR undefined qu-borderTopLeftRadius--pill qu-borderBottomLeftRadius--pill qu-alignItems--center qu-justifyContent--center qu-white n with adult readers in mind.</span></span></p><span data-dcnode-id="4073" instrument_node=""> </span><p class="q-text qu-display--block qu-wordBreak--break-word qu-textAlign--start" data-dcnode-id="4070" style="box-sizing: border-box; margin-bottom: 1em; overflow-wrap: anywhere; direction: ltr;"><span data-dcnode-id="4071" style="font-weight: normal; font-style: normal; background: none;"><span data-dcnode-id="4072" instrument_node="">There is a kind of in-between category, called “young adult”, which is usually written with teenage readers in mind.</span></span></p><span data-dcnode-id="4069" instrument_node=""> </span><p class="q-text qu-display--block qu-wordBreak--break-word qu-textAlign--start" data-dcnode-id="4066" style="box-sizing: border-box; margin-bottom: 0px; overflow-wrap: anywhere; direction: ltr;"><span data-dcnode-id="4067" style="font-weight: normal; font-style: normal; background: none;"><span data-dcnode-id="4068" instrument_node="">This does not mean th</span></span></p><div class="q-absolute qu-textAlign--center qu-zIndex--base" data-dcnode-id="4054" style="box-sizing: border-box; position: absolute; width: 100%; height: 100px; bottom: 0px; background: linear-gradient(rgba(255, 255, 255, 0) 0%, rgb(255, 255, 255) 100%);" width="100%"><div class="q-inlineFlex" data-dcnode-id="4055" style="box-sizing: border-box; display: inline-flex;"><div class="q-relative" data-dcnode-id="4056" style="box-sizing: border-box; position: relative; bottom: -60px;"><button class="q-click-wrapper qu-active--textDecoration--none qu-focus--textDecoration--none ClickWrapper___StyledClickWrapperBox-zoqi4f-0 bIwtPb base___StyledClickWrapper-lx6eke-1 fURggN puppeteer_test_read_more_button qu-borderRadius--pill qu-alignItems--center qu-justifyContent--center qu-whiteSpace--nowrap qu-userSelect--none qu-display--inline-flex qu-bg--gray_ultralight qu-tapHighlight--white qu-textAlign--center qu-cursor--pointer qu-hover--textDecoration--none" data-dcnode-id="4057" role="button __StyledCssInlineComponent-lsmoq4-0 kghFzc" data-dcnode-id="4022"><span class="q-box qu-userSelect--text" data-dcnode-id="4023" style="box-sizing: border-box;"><p class="q-text qu-display--block qu-wordBreak--break-word qu-textAlign--start" data-dcnode-id="4046" style="box-sizing: border-box; margin-bottom: 1em; overflow-wrap: anywhere; direction: ltr;"><span data-dcnode-id="4047" style="font-weight: normal; font-style: normal; background: none;"><span data-dcnode-id="4048" instrument_node="">Children’s literature is written with child readers in mind. It is often written with children of a particular age group in mind, taking their reading ability into account. It is also written on topics that would most likely be of interest to children.</span></span></p><span data-dcnode-id="4045" instrument_node=""> </span><p class="q-text qu-display--block qu-wordBreak--break-word qu-textAlign--start" data-dcnode-id="4042" style="box-sizing: border-box; margin-bottom: 1em; overflow-wrap: anywhere; direction: ltr;"><span data-dcnode-id="4043" style="font-weight: normal; font-style: normal; background: none;"><span data-dcnode-id="4044" instrument_node="">Adult literature is not written with child readers in mind. The language does not make concessions to the reading ability of children, and the plots and characters are usually written with adult readers in mind.</span></span></p><span data-dcnode-id="4041" instrument_node=""> </span><p class="q-text qu-display--block qu-wordBreak--break-word qu-textAlign--start" data-dcnode-id="4038" style="box-sizing: border-box; margin-bottom: 1em; overflow-wrap: anywhere; direction: ltr;"><span data-dcnode-id="4039" style="font-weight: normal; font-style: normal; background: none;"><span data-dcnode-id="4040" instrument_node="">There is a kind of in-between category, called “young adult”, which is usually written with teenage readers in mind.</span></span></p><span data-dcnode-id="4037" instrument_node=""> </span><p class="q-text qu-display--block qu-wordBreak--break-word qu-textAlign--start" data-dcnode-id="4030" style="box-sizing: border-box; margin-bottom: 1em; overflow-wrap: anywhere; direction: ltr;"><span data-dcnode-id="4035" style="font-weight: normal; font-style: normal; background: none;"><span data-dcnode-id="4036" instrument_node="">This does not mean that no adults will read children’s books, or no children will read “adult” books. In fact many adult books are read by children, and many children’s books are read by adults. But the one category is </span></span><span data-dcnode-id="4033" style="font-weight: normal; font-style: italic; background: none;"><span data-dcnode-id="4034" instrument_node="">written</span></span><span data-dcnode-id="4031" style="font-weight: normal; font-style: normal; background: none;"><span data-dcnode-id="4032" instrument_node=""> for children and the other is not.</span></span></p><span data-dcnode-id="4029" instrument_node=""> </span><p class="q-text qu-display--block qu-wordBreak--break-word qu-textAlign--start" data-dcnode-id="4024" style="box-sizing: border-box; margin-bottom: 0px; overflow-wrap: anywhere; direction: ltr;"><span data-dcnode-id="4027" style="font-weight: normal; font-style: italic; background: none;"><span data-dcnode-id="4028" instrument_node="">Gulliver’s travels</span></span><span data-dcnode-id="4025" style="font-weight: normal; font-style: normal; background: none;"><span data-dcnode-id="4026" instrument_node=""> by Jonathan Swift has often been read by children, though it was written for adults. Children can enjoy the stories, but do not usually appreciate the political satire until they re-read the book as adults. The early Harry Potter books were written for children, but many adults have enjoyed reading them.</span></span></p></span></span></div></div></div></div></div></div></div><div class="q-box qu-zIndex--action_bar" data-dcnode-id="3952" style="box-sizing: border-box;"><div class="q-box ActionBar___StyledBox-sc-1tz1b8b-1 jxrr
