ound: linear-gradient(rgba(255, 255, 255, 0) 0%, rgb(255, 255, 255) 100%);" width="100%"><div class="q-inlineFlex" data-dcnode-id="3814" style="box-sizing: border-box; display: inline-flex;"><div class="q-relative" data-dcnode-id="3815" style="box-sizing: border-box; position: relative; bottom: -60px;"><button class="q-click-wrapper qu-active--textDecoration--none qu-focus--textDecoration--none ClickWrapper___StyledClickWrapperBox-zoqi4f-0 bIwtPb base___StyledClickWrapper-lx6eke-1 fURggN puppeteer_test_read_more_button qu-borderRadius--pill qu-alignItems--center qu-justifyContent--center qu-whiteSpace--nowrap qu-userSelect--none qu-display--inline-flex qu-bg--gray_ultralight qu-tapHighlight--white qu-textAlign--center qu-cursor--pointer qu-hover--textDecoration--none" data-dcnode-id="3816" role="button" style="box-sizing: border-box; font: inherit; padding: 0px 15px; transition-property: box-shadow, background-color; transition-duration: 60ms; transition-timing-function: ease-out; height: 30px; min-width: 30px; position: relative; box-shadow: rgba(99, 100, 102, 0.2) 0px 0px 0px 1px inset; border-width: 0px; outline: none; color: inherit;" tabindex="0" type="button"><div class="q-flex qu-alignItems--center qu-justifyContent--center" data-dcnode-id="3817" style="box-sizing: border-box; display: flex; max-width: 100%; transition-property: opacity; transition-duration: 60ms; transition-timing-function: ease-in-out;"><div class="q-text qu-display--inline-flex qu-alignItems--center qu-overflow--hidden puppeteer_test_button_text qu-medium qu-color--gray" data-dcnode-id="3822" style="box-sizing: border-box; font-size: 13px;"><div class="q-text qu-ellipsis qu-whiteSpace--nowrap" data-dcnode-id="3823" style="box-sizing: border-box; line-height: normal;"><span data-dcnode-id="3824" instrument_node="">Continue Reading</span></div></div><span class="q-inlineBlock qu-ml--tiny qu-mr--n_tiny" data-dcnode-id="3818" name="ChevronDown" style="box-sizing: border-box; display: inline-block; width: 16px; height: 16px; flex-shrink: 0; line-height: 16px;" width="16px"><span class="CssComponent__CssInlineComponent-sc-1oskqb9-1 Icon___StyledCssInlineComponent-sc-11tmcw7-0 fNkmIo" data-dcnode-id="3819"><svg data-dcnode-id="3820" height="24" viewBox="0 0 24 24" width="24" xmlns="http://www.w3.org/2000/svg"><path class="icon_svg-stroke" d="m5 8.5 7 7 7.005-7" data-dcnode-id="3821" fill="none" stroke="#666" stroke-linecap="round" stroke-width="1.5"></path></svg></span></span></div></button></div></div></div></span></div></div></div></div><div class="q-box qu-display--none" data-dcnode-id="3755" style="box-sizing: border-box;"><div class="q-text" data-dcnode-id="3756" style="box-sizing: border-box; max-width: 100%;"><span class="CssComponent__CssInlineComponent-sc-1oskqb9-1 UserSelectableText___StyledCssInlineComponent-lsmoq4-0 kghFzc" data-dcnode-id="3757"><span class="q-box qu-userSelect--text" data-dcnode-id="3758" style="box-sizing: border-box;"><p class="q-text qu-display--block qu-wordBreak--break-word qu-textAlign--start" data-dcnode-id="3805" style="box-sizing: border-box; margin-bottom: 1em; overflow-wrap: anywhere; direction: ltr;"><span data-dcnode-id="3806" style="font-weight: normal; font-style: normal; background: none;"><span data-dcnode-id="3807" instrument_node="">It's a good question, and I suspect you're asking it because you've been asked to write an essay on that question ;) But hey, it's still worth asking.</span></span></p><span data-dcnode-id="3804" instrument_node=""> </span><p class="q-text qu-display--block qu-wordBreak--break-word qu-textAlign--start" data-dcnode-id="3801" style="box-sizing: border-box; margin-bottom: 1em; overflow-wrap: anywhere; direction: ltr;"><span data-dcnode-id="3802" style="font-weight: normal; font-style: normal; background: none;"><span data-dcnode-id="3803" instrument_node="">I went down into town to see you, but when I got to your place, you had already left for work.</span></span></p><span data-dcnode-id="3800" instrument_node=""> </span><p class="q-text qu-display--block qu-wordBreak--break-word qu-textAlign--start" data-dcnode-id="3797" style="box-sizing: border-box; margin-bottom: 1em; overflow-wrap: anywhere; direction: ltr;"><span data-dcnode-id="3798" style="font-weight: normal; font-style: normal; background: none;"><span data-dcnode-id="3799" instrument_node="">Is that literature? You'd probably argue that it's not; it's just a fairly bland sentence. What if I do this though:</span></span></p><span data-dcnode-id="3796" instrument_node=""> </span><p class="q-text qu-display--block qu-wordBreak--break-word qu-textAlign--start" data-dcnode-id="3789" style="box-sizing: border-box; margin-bottom: 1em; overflow-wrap: anywhere; direction: ltr;"><span data-dcnode-id="3790" style="font-weight: normal; font-style: normal; background: none;"><span data-dcnode-id="3795" instrument_node="">I went down into town</span><br data-dcnode-id="3794"><span data-dcnode-id="3793" instrument_node="">To see you</span><br data-dcnode-id="3792"><span data-dcnode-id="3791" instrument_node="">but</span></span></p><span data-dcnode-id="3788" instrument_node=""> </span><p class="q-text qu-display--block qu-wordBreak--break-word qu-textAlign--start" data-dcnode-id="3779" style="box-sizing: border-box; margin-bottom: 1em; overflow-wrap: anywhere; direction: ltr;"><span data-dcnode-id="3780" style="font-weight: normal; font-style: normal; background: none;"><span data-dcnode-id="3787" instrument_node="">When I got to</span><br data-dcnode-id="3786"><span data-dcnode-id="3785" instrument_node="">Your place</span><br data-dcnode-id="3784"><span data-dcnode-id="3783" instrument_node="">You had already left</span><br data-dcnode-id="3782"><span data-dcnode-id="3781" instrument_node="">For work</span></span></p><span data-dcnode-id="3778" instrument_node=""> </span><p class="q-text qu-display--block qu-wordBreak--break-word qu-textAlign--start" data-dcnode-id="3775" style="box-sizing: border-box; margin-bottom: 1em; overflow-wrap: anywhere; direction: ltr;"><span data-dcnode-id="3776" style="font-weight: normal; font-style: normal; background: none;"><span data-dcnode-id="3777" instrument_node="">Now you could easily call it poetry, just because its form has changed. So perhaps literature is about form/presentation, and form/presentation is what forces us to perceive the difference between literature and 'non-literature' (i.e. a novel compared to a newspaper, a poem compared to a note left on the kitchen counter, etc).</span></span></p><span data-dcnode-id="3774" instrument_node=""> </span><p class="q-text qu-display--block qu-wordBreak--break-word qu-textAlign--start" data-dcnode-id="3771" style="box-sizing: border-box; margin-bottom: 1em; overflow-wrap: anywhere; direction: ltr;"><span data-dcnode-id="3772" style="font-weight: normal; font-style: normal; background: none;"><span data-dcnode-id="3773" instrument_node="">Or you could argue that presenting something as a poem, a story or an essay puts the reader in a frame of mind which prompts them to interpret it and search for non-liminal message and meaning. You could say that literature is writing which is 'doing something' with the actual words themselves, rather than simply being used to convey information. </span></span></p><span data-dcnode-id="3770" instrument_node=""> </span><p class="q-text qu-display--block qu-wordBreak--break-word qu-textAlign--start" data-dcnode-id="3767" style="box-sizing: border-box; margin-bottom: 1em; overflow-wrap: anywhere; direction: ltr;"><span data-dcnode-id="3768" style="font-weight: normal; font-style: normal; background: none;"><span data-dcnode-id="3769" instrument_node="">BUT who is to say that form is the only decider? If a newspaper article is an account of true facts, most people wouldn't call it literature; if it turned out that that newspaper article was entirely fictional, what would it be then? Would it count as a story? If it counts as a story, does that make it literature? And if that's our yard stick, does that make trashy novels or pornographic fanfic literature? Look at the journals of the 18th Century, the Tatler and the Spectator etc. Most of the writing in those journals was written to tell stories to the populace about how to navigate society; at the time, they were just magazines, but now they are treated as literature because of their social and writerly significance. And Robinson Crusoe was based on other true-life accounts of people lost at sea, most of which turned out to be fictional; does that make them literature in the same sense that RC is?</span></span></p><span data-dcnode-id="3766" instrument_node=""> </span><p class="q-text qu-display--block qu-wordBreak--break-word qu-textAlign--start" data-dcnode-id="3763" style="box-sizing: border-box; margin-bottom: 1em; overflow-wrap: anywhere; direction: ltr;"><span data-dcnode-id="3764" style="font-weight: normal; font-style: normal; background: none;"><span data-dcnode-id="3765" instrument_node="">Then you come to the question of whether there is a difference between 'literature' in the sense of any kind of text as according to the ideas above and 'literature' in the sense of texts which are canon, such as Shakespeare or Jonathan Swift. That's the kind of 'literature' which is studied as such in universities and colleges; generally not popular fiction or amateur poetry. So does that mean that what is perceived as 'literature' is to a degree dictated by the community which studies and curates it? </span></span></p><span data-dcnode-id="3762" instrument_node=""> </span><p class="q-text qu-display--block qu-wordBreak--break-word qu-textAlign--start" data-dcnode-id="3759" style="box-sizing: border-box; margin-bottom: 0px; overflow-wrap: anywhere; direction: ltr;"><span data-dcnode-id="3760" style="font-weight: normal; font-style: normal; background: none;"><span data-dcnode-id="3761" instrument_node="">Essentially your question is not a question with an answer. It's a question which raises a lot of other really interesting questions about the nature of writing and reading in general and in different contexts. If you are writing an essay about it, get yourself a couple of literary theory samplers and read the foundational writing on the subject (Derrida, Sonntag &amp; co); if you're just curious, why not read some of the texts which put the whole question at the forefront? Tristram Shandy, the old articles of The Spectator, The Wasteland, William Carlos Williams, et al. Enjoy!</span></span></p></span></span></div></div></div></div></div></div></div><div class="q-box qu-zIndex--action_bar" data-dcnode-id="3682" style="box-sizing: border-box;"><div class="q-box ActionBar___StyledBox-sc-1tz1b8b-1 jxrrvA" data-dcnode-id="3683" style="box-sizing: border-box; transition-property: box-shadow; transition-duration: 250ms; transition-timing-function: ease-out;"><div class="q-flex qu-justifyContent--space-between qu-alignItems--center qu-flexWrap--nowrap qu-py--tiny" data-dcnode-id="3684" style="box-sizing: border-box; display: flex;"><div class="q-flex qu-alignItems--center" data-dcnode-id="3698" style="box-sizing: border-box; display: flex;"><div class="q-inlineFlex qu-mr--small" data-dcnode-id="3725" style="box-sizing: border-box; display: inline-flex;"><div class="q-inlineFlex qu-borderRadius--pill qu-alignItems--center" data-dcnode-id="3726" style="box-sizing: border-box; display: inline-flex; background-color: rgba(0, 0, 1, 0.03);"><div class="q-box qu-display--inline-block" data-dcnode-id="3736" style="box-sizing: border-box; pointer-events: all;"><div class="q-relative puppeteer_popper_reference" data-dcnode-id="3737" style="box-sizing: border-box; position: relative;"><button aria-label="41 upvotes" class="q-click-wrapper ClickWrapper___StyledClickWrapperBox-zoqi4f-0 bIwtPb base___StyledClickWrapper-lx6eke-1 eqENAR undefined qu-borderTopLeftRadius--pill qu-borderBottomLeftRadius--pill qu-alignItems--center qu-justi : 1em;"><p class="q-text qu-display--block qu-wordBreak--break-word qu-textAlign--start" data-dcnode-id="3496" style="box-sizing: border-box; margin-bottom: 1em; overflow-wrap: anywhere; direction: ltr;"><span data-dcnode-id="3497" style="font-weight: bold; font-style: italic; background: none;"><span data-dcnode-id="3498" instrument_node="">“A man, to be greatly good, must imagine intensely and comprehensively; he must put himself in the place of another and of many others; the pains and pleasures of his species must become his own. The great instrument of moral good is the imagination.”</span></span></p><div class="q-absolute qu-borderRadius--pill QTextBlockQuote___StyledAbsolute-an1wlz-0 dHUDep" data-dcnode-id="3495" style="box-sizing: border-box; position: absolute; top: 0px; bottom: 0px; width: 3px; background-color: currentcolor; opacity: 0.3;" width="3"></div></blockquote><p class="q-text qu-display--block qu-wordBreak--break-word qu-textAlign--start" data-dcnode-id="3467" style="box-sizing: border-box; margin-bottom: 1em; overflow-wrap: anywhere; direction: ltr;"><span data-dcnode-id="3492" style="font-weight: normal; font-style: normal; background: none;"><span data-dcnode-id="3493" instrument_node="">Literature teaches us how to live. Literature makes the reader visit places, experience events, meet people, listen to them, feel their joys and sufferings. It takes years to acquire so much wisdom that a single book of literary merit instills in a reader. Literature mirrors the society and its mannerisms. Because of Charles Dickens you can experience the </span></span><span data-dcnode-id="3490" style="font-weight: bold; font-style: italic; background: none;"><span data-dcnode-id="3491" instrument_node="">Hard Times</span></span><span data-dcnode-id="3488" style="font-weight: normal; font-style: normal; background: none;"><span data-dcnode-id="3489" instrument_node=""> of the Victorian England without going through a detailed historical study. The fact-based education system, the fractured human relationships, the smokey polluted towns, the ill-effects of Industrial Revolution, the misery of labourers, the mercenary instincts of men and the flawed legal system of the land....this single book will give you an entire picture of the evils of Victorian English Society. Wordsworth's poetry makes you feel his aesthetic delight at the sight of </span></span><span data-dcnode-id="3486" style="font-weight: bold; font-style: italic; background: none;"><span data-dcnode-id="3487" instrument_node="">Daffodils </span></span><span data-dcnode-id="3484" style="font-weight: normal; font-style: normal; background: none;"><span data-dcnode-id="3485" instrument_node="">and the tranquility of the song sung by a </span></span><span data-dcnode-id="3482" style="font-weight: bold; font-style: italic; background: none;"><span data-dcnode-id="3483" instrument_node="">Solitary Reaper</span></span><span data-dcnode-id="3480" style="font-weight: normal; font-style: normal; background: none;"><span data-dcnode-id="3481" instrument_node="">. Similarly, Eliot makes you pity the spiritual barrenness of the world that has turned into </span></span><span data-dcnode-id="3478" style="font-weight: bold; font-style: italic; background: none;"><span data-dcnode-id="3479" instrument_node="">Wasteland. </span></span><span data-dcnode-id="3476" style="font-weight: normal; font-style: normal; background: none;"><span data-dcnode-id="3477" instrument_node="">Wilfred Owen forces you to think about the </span></span><span data-dcnode-id="3474" style="font-weight: bold; font-style: italic; background: none;"><span data-dcnode-id="3475" instrument_node="">Insensibility</span></span><span data-dcnode-id="3472" style="font-weight: normal; font-style: normal; background: none;"><span data-dcnode-id="3473" instrument_node=""> of the state and people who glorify wars. Literature is a storehouse of all knowledge and wisdom. History, Political Studies, Philosophy, Science and all other forms of learning are part of literature, as </span></span><span data-dcnode-id="3470" style="font-weight: bold; font-style: normal; background: none;"><span data-dcnode-id="3471" instrument_node="">Wordsworth</span></span><span data-dcnode-id="3468" style="font-weight: normal; font-style: normal; background: none;"><span data-dcnode-id="3469" instrument_node=""> puts it:</span></span></p><blockquote class="q-relative qu-color--gray qu-borderWidth--retinaOverride" data-dcnode-id="3458" style="box-sizing: border-box; position: relative; margin-bottom: 1em; border-width: 0px; border-color: transparent; padding-left: 1em;"><p class="q-text qu-display--block qu-wordBreak--break-word qu-textAlign--start" data-dcnode-id="3460" style="box-sizing: border-box; margin-bottom: 1em; overflow-wrap: anywhere; direction: ltr;"><span data-dcnode-id="3465" style="font-weight: bold; font-style: italic; background: none;"><span data-dcnode-id="3466" instrument_node="">Poetry </span></span><span data-dcnode-id="3463" style="font-weight: normal; font-style: italic; background: none;"><span data-dcnode-id="3464" instrument_node="">(and all literature by extension)</span></span><span data-dcnode-id="3461" style="font-weight: bold; font-style: italic; background: none;"><span data-dcnode-id="3462" instrument_node=""> is the breath and finer spirit of all knowledge…the poet binds together by passion and knowledge the vast empire of human society, as it is spread over the whole earth, and over all time.”</span></span></p><div class="q-absolute qu-borderRadius--pill QTextBlockQuote___StyledAbsolute-an1wlz-0 dHUDep" data-dcnode-id="3459" style="box-sizing: border-box; position: absolute; top: 0px; bottom: 0px; width: 3px; background-color: currentcolor; opacity: 0.3;" width="3"></div></blockquote><p class="q-text qu-display--block qu-wordBreak--break-word qu-textAlign--start" data-dcnode-id="3445" style="box-sizing: border-box; margin-bottom: 1em; overflow-wrap: anywhere; direction: ltr;"><span data-dcnode-id="3456" style="font-weight: bold; font-style: italic; background: none;"><span data-dcnode-id="3457" instrument_node="">What is Art</span></span><span data-dcnode-id="3454" style="font-weight: normal; font-style: normal; background: none;"><span data-dcnode-id="3455" instrument_node=""> by the great </span></span><span data-dcnode-id="3452" style="font-weight: bold; font-style: normal; background: none;"><span data-dcnode-id="3453" instrument_node="">Leo</span></span><span data-dcnode-id="3450" style="font-weight: normal; font-style: normal; background: none;"><span data-dcnode-id="3451" instrument_node=""> </span></span><span data-dcnode-id="3448" style="font-weight: bold; font-style: normal; background: none;"><span data-dcnode-id="3449" instrument_node="">Tolstoy</span></span><span data-dcnode-id="3446" style="font-weight: normal; font-style: normal; background: none;"><span data-dcnode-id="3447" instrument_node=""> explains the importance of all art to human society. Here is a critical excerpt:</span></span></p><blockquote class="q-relative qu-color--gray qu-borderWidth--retinaOverride" data-dcnode-id="3436" style="box-sizing: border-box; position: relative; margin-bottom: 1em; border-width: 0px; border-color: transparent; padding-left: 1em;"><p class="q-text qu-display--block qu-wordBreak--break-word qu-textAlign--start" data-dcnode-id="3442" style="box-sizing: border-box; margin-bottom: 1em; overflow-wrap: anywhere; direction: ltr;"><span data-dcnode-id="3443" style="font-weight: bold; font-style: italic; background: none;"><span data-dcnode-id="3444" instrument_node="">As, thanks to man's capacity to express thoughts by words, every man may know all that has been done for him in the realms of thought by all humanity before his day, and can in the present, thanks to this capacity to understand the thoughts of others, become a sharer in their activity and can himself hand on to his contemporaries and descendants the thoughts he has assimilated from others, as well as those which have arisen within himself; so, thanks to man's capacity to be infected with the feelings of others by means of art, all that is being lived through by his contemporaries is accessible to him, as well as the feelings experienced by men thousands of years ago, and he has also the possibility of transmitting his own feelings to others.</span></span></p><span data-dcnode-id="3441" instrument_node=""> </span><p class="q-text qu-display--block qu-wordBreak--break-word qu-textAlign--start" data-dcnode-id="3438" style="box-sizing: border-box; margin-bottom: 1em; overflow-wrap: anywhere; direction: ltr;"><span data-dcnode-id="3439" style="font-weight: bold; font-style: italic; background: none;"><span data-dcnode-id="3440" instrument_node="">If people lacked this capacity to receive the thoughts conceived by the men who preceded them and to pass on to others their own thoughts, men would be like wild beasts...</span></span></p><div class="q-absolute qu-borderRadius--pill QTextBlockQuote___StyledAbsolute-an1wlz-0 dHUDep" data-dcnode-id="3437" style="box-sizing: border-box; position: absolute; top: 0px; bottom: 0px; width: 3px; background-color: currentcolor; opacity: 0.3;" width="3"></div></blockquote><p class="q-text qu-display--block qu-wordBreak--break-word qu-textAlign--start" data-dcnode-id="3429" style="box-sizing: border-box; margin-bottom: 1em; overflow-wrap: anywhere; direction: ltr;"><span data-dcnode-id="3434" style="font-weight: normal; font-style: normal; background: none;"><span data-dcnode-id="3435" instrument_node="">Studying human condition is not enough. One has to feel that condition in order to gain wisdom. Literature provides for a richer life. No other form of learning brings the enrichment that reading brings. Literature is the torch-bearer that has helped civilizations to overcome the darkness of savagery. In the absence of the great Ramayana, Mahabharata and the Vedas India would not have been called the </span></span><span data-dcnode-id="3432" style="font-weight: bold; font-style: normal; background: none;"><span data-dcnode-id="3433" instrument_node="">Golden Bird</span></span><span data-dcnode-id="3430" style="font-weight: normal; font-style: normal; background: none;"><span data-dcnode-id="3431" instrument_node=""> (Sone ki chidiya). Similarly, what makes Greece the mother of European civilization is it's great literature.</span></span></p><span data-dcnode-id="3428" instrument_node=""> </span><p class="q-text qu-display--block qu-wordBreak--break-word qu-textAlign--start" data-dcnode-id="3421" style="box-sizing: border-box; margin-bottom: 0px; overflow-wrap: anywhere; direction: ltr;"><span data-dcnode-id="3426" style="font-weight: normal; font-style: normal; background: none;"><span data-dcnode-id="3427" instrument_node="">So, in the words of Tolstoy, without literature </span></span><span data-dcnode-id="3424" style="font-weight: bold; font-style: italic; background: none;"><span data-dcnode-id="3425" instrument_node="">men would be like wild beasts </span></span><span data-dcnode-id="3422" style="font-weight: normal; font-style: normal; background: none;"><span data-dcnode-id="3423" instrument_node="">because it endows an understanding, an empathy in the reader, even for someone who is much separated to him by time and distance. Literature unites mankind…</span></span></p></span></span></div></div></div></div></div></div></div><div class="q-box qu-zIndex--action_bar" data-dcnode-id="3339" style="box-sizing: border-box;"><div class="q-box ActionBar___StyledBox-sc-1tz1b8b-1 jxrrvA" data-dcnode-id="3340" style="box-sizing: border-box; transition-property: box-shadow; transition-duration: 250ms; transition-timing-function: ease-out;"><div class="q-flex qu-justifyContent--space-between qu-alignItems--center qu-flexWrap--nowrap qu-py--tiny" data-dcnode-id="3341" style="box-sizing: border-box; display: flex;"><div class="q-flex qu-alignItems--center" data-dcnod  none;"><span data-dcnode-id="2905" instrument_node="">A more secure way is to examine the primary evidence of the text itself. An analysis of the </span></span><span data-dcnode-id="2902" style="font-weight: normal; font-style: italic; background: none;"><span data-dcnode-id="2903" instrument_node="">fictional</span></span><span data-dcnode-id="2900" style="font-weight: normal; font-style: normal; background: none;"><span data-dcnode-id="2901" instrument_node=""> context Eliot created for Middlemarch will suggest those aspects of her </span></span><span data-dcnode-id="2898" style="font-weight: normal; font-style: italic; background: none;"><span data-dcnode-id="2899" instrument_node="">actual </span></span><span data-dcnode-id="2896" style="font-weight: normal; font-style: normal; background: none;"><span data-dcnode-id="2897" instrument_node="">context that affected her and which gave rise to her novel. Helpfully, ‘Middlemarch’ is</span></span></p><div class="q-absolute qu-textAlign--center qu-zIndex--base" data-dcnode-id="2883" style="box-sizing: border-box; position: absolute; width: 100%; height: 100px; bottom: 0px; background: linear-gradient(rgba(255, 255, 255, 0) 0%, rgb(255, 255, 255) 100%);" width="100%"><div class="q-inlineFlex" data-dcnode-id="2884" style="box-sizing: border-box; display: inline-flex;"><div class="q-relative" data-dcnode-id="2885" style="box-sizing: border-box; position: relative; bottom: -60px;"><button class="q-click-wrapper qu-active--textDecoration--none qu-focus--textDecoration--none ClickWrapper___StyledClickWrapperBox-zoqi4f-0 bIwtPb base___StyledClickWrapper-lx6eke-1 fURggN puppeteer_test_read_more_button qu-borderRadius--pill qu-alignItems--center qu-justifyContent--center qu-whiteSpace--nowrap qu-userSelect--none qu-display--inline-flex qu-bg--gray_ultralight qu-tapHighlight--white qu-textAlign--center qu-cursor--pointer qu-hover--textDecoration--none" data-dcnode-id="2886" role="button" style="box-sizing: border-box; font: in le="box-sizing: border-box; position: relative; margin-left: 2em; padding-bottom: 0.7em;"><span data-dcnode-id="2048" style="font-weight: normal; font-style: normal; background: none;"><span data-dcnode-id="2049" instrument_node="">Studying history helps you develop an appreciation for your roots and what came before you, along with what sacrifices were made to get there.</span></span></li><li class="q-relative" data-dcnode-id="2044" style="box-sizing: border-box; position: relative; margin-left: 2em; padding-bottom: 0.7em;"><span data-dcnode-id="2045" style="font-weight: normal; font-style: normal; background: none;"><span data-dcnode-id="2046" instrument_node="">Studying history helps you understand characters (ie human beings) over time and in contrast.  You can see how decisions played out over periods of time.</span></span></li><li class="q-relative" data-dcnode-id="2041" style="box-sizing: border-box; position: relative; margin-left: 2em; padding-bottom: 0px;"><span data-dcnode-id="2042" style="font-weight: normal; font-style: normal; background: none;"><span data-dcnode-id="2043" instrument_node="">Studying history helps you understand the history and evolution of ideas.  In this way it helps you understand the practical consequences for particular ideologies and worldviews and ways of thinking about life, politics, and the world.</span></span></li></ol><p class="q-text qu-display--block qu-wordBreak--break-word qu-textAlign--start" data-dcnode-id="2037" style="box-sizing: border-box; margin-bottom: 1em; overflow-wrap: anywhere; direction: ltr;"><span data-dcnode-id="2038" style="font-weight: normal; font-style: normal; background: none;"><span data-dcnode-id="2039" instrument_node=""></span></span></p><span data-dcnode-id="2036" instrument_node=""> </span><p class="q-text qu-display--block qu-wordBreak--break-word qu-textAlign--start" data-dcnode-id="2029" style="box-sizing: border-box; margin-bottom: 1em; overflow-wrap: anywhere; direction: ltr;"><span data-dcnode-id="2034" style="font-weight: bold; font-style: normal; background: none;"><span data-dcnode-id="2035" instrument_node="">Why Study Art/Design/Art History:</span></span><span data-dcnode-id="2030" style="font-weight: normal; font-style: normal; background: none;"><span data-dcnode-id="2033" instrument_node=""></span><br data-dcnode-id="2032"><span data-dcnode-id="2031" instrument_node=""></span></span></p><ol class="q-box" data-dcnode-id="2004" style="box-sizing: border-box; direction: ltr; overflow-wrap: break-word; list-style: decimal; margin-bottom: 1em; margin-right: 2em;"><li class="q-relative" data-dcnode-id="2026" style="box-sizing: border-box; position: relative; margin-left: 2em; padding-bottom: 0.7em;"><span data-dcnode-id="2027" style="font-weight: normal; font-style: normal; background: none;"><span data-dcnode-id="2028" instrument_node="">Studying art helps you understand the rules and principles of design.</span></span></li><li class="q-relative" data-dcnode-id="2023" style="box-sizing: border-box; position: relative; margin-left: 2em; padding-bottom: 0.7em;"><span data-dcnode-id="2024" style="font-weight: normal; font-style: normal; background: none;"><span data-dcnode-id="2025" instrument_node="">Studying art helps you understand the connection between art and ideology, politics, and cultural and social movements.</span></span></li><li class="q-relative" data-dcnode-id="2020" style="box-sizing: border-box; position: relative; margin-left: 2em; padding-bottom: 0.7em;"><span data-dcnode-id="2021" style="font-weight: normal; font-style: normal; background: none;"><span data-dcnode-id="2022" instrument_node="">Studying art helps develop your appreciation for the human condition and the human experience.</span></span></li><li class="q-relative" data-dcnode-id="2017" style="box-sizing: border-box; position: relative; margin-left: 2em; padding-bottom: 0.7em;"><span data-dcnode-id="2018" style="font-weight: normal; font-style: normal; background: none;"><span data-dcnode-id="2019" instrument_node="">Studying art helps you understand symbolic communication and attention to detail.  Studying art helps you understand your communication and the communication of others better.</span></span></li><li class="q-relative" data-dcnode-id="2014" style="box-sizing: border-box; position: relative; margin-left: 2em; padding-bottom: 0.7em;"><span data-dcnode-id="2015" style="font-weight: normal; font-style: normal; background: none;"><span data-dcnode-id="2016" instrument_node="">Studying art helps integrate meaning and particularly levels of meaning.</span></span></li><li class="q-relative" data-dcnode-id="2011" style="box-sizing: border-box; position: relative; margin-left: 2em; padding-bottom: 0.7em;"><span data-dcnode-id="2012" style="font-weight: normal; font-style: normal; background: none;"><span data-dcnode-id="2013" instrument_node="">Studying art helps you give peer criticism and accept peer criticism.</span></span></li><li class="q-relative" data-dcnode-id="2008" style="box-sizing: border-box; position: relative; margin-left: 2em; padding-bottom: 0.7em;"><span data-dcnode-id="2009" style="font-weight: normal; font-style: normal; background: none;"><span data-dcnode-id="2010" instrument_node="">Studying art potentially helps you design better objects for humans.</span></span></li><li class="q-relative" data-dcnode-id="2005" style="box-sizing: border-box; position: relative; margin-left: 2em; padding-bottom: 0px;"><span data-dcnode-id="2006" style="font-weight: normal; font-style: normal; background: none;"><span data-dcnode-id="2007" instrument_node="">Studying art helps develop critical thinking and creativity skills (albeit it a slightly different method or model of critical thinking than you would in another discipline)</span></span></li></ol><p class="q-text qu-display--block qu-wordBreak--break-word qu-textAlign--start" data-dcnode-id="2001" style="box-sizing: border-box; margin-bottom: 1em; overflow-wrap: anywh ="1985" style="font-weight: normal; font-style: normal; background: none;"><span data-dcnode-id="1986" instrument_node="">Studying literature helps you identify and understand social trends over time (influence in culture and etc..)</span></span></li><li class="q-relative" data-dcnode-id="1981" style="box-sizing: border-box; position: relative; margin-left: 2em; padding-bottom: 0.7em;"><span data-dcnode-id="1982" style="font-weight: normal; font-style: normal; background: none;"><span data-dcnode-id="1983" instrument_node="">Studying literature helps you understand story (and the importance in the human experience)</span></span></li><li class="q-relative" data-dcnode-id="1978" style="box-sizing: border-box; position: relative; margin-left: 2em; padding-bottom: 0.7em;"><span data-dcnode-id="1979" style="font-weight: normal; font-style: normal; background: none;"><span data-dcnode-id="1980" instrument_node="">Studying literature helps you give peer criticism and accept peer criticism.</span></span></li><li class="q-relative" data-dcnode-id="1975" style="box-sizing: border-box; position: relative; margin-left: 2em; padding-bottom: 0px;"><span data-dcnode-id="1976" style="font-weight: normal; font-style: normal; background: none;"><span data-dcnode-id="1977" instrument_node="">Studying literature helps build writing, critical thinking, and communication skills.</span></span></li></ol></span></span></div></div></div></div></div></div></div><div class="q-box qu-zIndex--action_bar" data-dcnode-id="1902" style="box-sizing: border-box;"><div class="q-box ActionBar___StyledBox-sc-1tz1b8b-1 jxrrvA" data-dcnode-id="1903" style="box-sizing: border-box; transition-property: box-shadow; transition-duration: 250ms; transition-timing-function: ease-out;"><div class="q-flex qu-justifyContent--space-between qu-alignItems--center qu-flexWrap--nowrap qu-py--tiny" data-dcnode-id="1904" style="box-sizing: border-box; display: flex;"><div class="q-flex qu-alignItems--center" data-dcnode-id ecap="round" stroke-width="1.5"></path></svg></span></span></div></button></div></div></div></span></div></div></div></div><div class="q-box qu-display--none" data-dcnode-id="1747" style="box-sizing: border-box;"><div class="q-text" data-dcnode-id="1748" style="box-sizing: border-box; max-width: 100%;"><span class="CssComponent__CssInlineComponent-sc-1oskqb9-1 UserSelectableText___StyledCssInlineComponent-lsmoq4-0 kghFzc" data-dcnode-id="1749"><span class="q-box qu-userSelect--text" data-dcnode-id="1750" style="box-sizing: border-box;"><p class="q-text qu-display--block qu-wordBreak--break-word qu-textAlign--start" data-dcnode-id="1751" style="box-sizing: border-box; margin-bottom: 0px; overflow-wrap: anywhere; direction: ltr;"><span data-dcnode-id="1764" style="font-weight: normal; font-style: normal; background: none;"><span data-dcnode-id="1765" instrument_node="">The human species, a member of the “great ape” or “hominid” family of primates, has been around in its anatomically modern form from anywhere between 350,000 to 260,000 years. If we go with the more conservative latter figure, we didn’t start using language for another 210,000 years after we started to be anatomically modern humans, meaning 50,000 years ago. Langauge was one of the tools we invented. We didn’t create writing for another 43,000 years after that, meaning just 7,000 years ago. Writing was another tool we invented. So, we were communicating with language for a really long time before writing was invented. Obviously, oral communication has practical applications in our daily lives, but it’s also useful when it comes to oral history and sharing things which are remembered or want to be remembered. It’s not too hard to imagine stories about ancestors being told to the younger generations, and, to help pass the time and to entertain the other adults as well as the children, the stories became a bit more “embellished” with each retelling. This type of “oral storytelling” is now called </span></span><span data-dcnode-id="1762" style="font-weight: normal; font-style: italic; background: none;"><span data-dcnode-id="1763" instrument_node="">oral literature</span></span><span data-dcnode-id="1760" style="font-weight: normal; font-style: normal; background: none;"><span data-dcnode-id="1761" instrument_node=""> or </span></span><span data-dcnode-id="1758" style="font-weight: normal; font-style: italic; background: none;"><span data-dcnode-id="1759" instrument_node="">folk literature</span></span><span data-dcnode-id="1756" style="font-weight: normal; font-style: normal; background: none;"><span data-dcnode-id="1757" instrument_node="">, as the term </span></span><span data-dcnode-id="1754" style="font-weight: normal; font-style: italic; background: none;"><span data-dcnode-id="1755" instrument_node="">literature,</span></span><span data-dcnode-id="1752" style="font-weight: normal; font-style: normal; background: none;"><span data-dcnode-id="1753" instrument_node=""> by itself, refers to the written word. Writing is really just a recording technology. So, literature began when writing was invented as a recording technology in order to help us remember what we were already speaking to each other but in a way that was more accurate than with our minds.</span></span></p></span></span></div></div></div></div></div></div></div><div class="q-box qu-zIndex--action_bar" data-dcnode-id="1674" style="box-sizing: border-box;"><div class="q-box ActionBar___StyledBox-sc-1tz1b8b-1 jxrrvA" data-dcnode-id="1675" style="box-sizing: border-box; transition-property: box-shadow; transition-duration: 250ms; transition-timing-function: ease-out;"><div class="q-flex qu-justifyContent--space-between qu-alignItems--center qu-flexWrap--nowrap qu-py--tiny" data-dcnode-id="1676" style="box-sizing: border-box; display: flex;"><div class="q-flex qu-alignItems--center" data-dcnode-id="1690" style="box-sizing: border-box; display: flex;"><div class="q-inlineFlex qu-mr--small" data-dcnode-id="1 xmlns="http://www.w3.org/2000/svg"><path class="icon_svg-stroke" d="m5 8.5 7 7 7.005-7" data-dcnode-id="1573" fill="none" stroke="#666" stroke-linecap="round" stroke-width="1.5"></path></svg></span></span></div></button></div></div></div></span></div></div></div></div><div class="q-box qu-display--none" data-dcnode-id="1537" style="box-sizing: border-box;"><div class="q-text" data-dcnode-id="1538" style="box-sizing: border-box; max-width: 100%;"><span class="CssComponent__CssInlineComponent-sc-1oskqb9-1 UserSelectableText___StyledCssInlineComponent-lsmoq4-0 kghFzc" data-dcnode-id="1539"><span class="q-box qu-userSelect--text" data-dcnode-id="1540" style="box-sizing: border-box;"><p class="q-text qu-display--block qu-wordBreak--break-word qu-textAlign--start" data-dcnode-id="1557" style="box-sizing: border-box; margin-bottom: 1em; overflow-wrap: anywhere; direction: ltr;"><span data-dcnode-id="1558" style="font-weight: normal; font-style: normal; background: none;"><span data-dcnode-id="1559" instrument_node="">First of all, sorry for my poor English!</span></span></p><span data-dcnode-id="1556" instrument_node=""> </span><p class="q-text qu-display--block qu-wordBreak--break-word qu-textAlign--start" data-dcnode-id="1553" style="box-sizing: border-box; margin-bottom: 1em; overflow-wrap: anywhere; direction: ltr;"><span data-dcnode-id="1554" style="font-weight: normal; font-style: normal; background: none;"><span data-dcnode-id="1555" instrument_node="">The question belongs to the aesteticians. There are different schools, which differently answer the question. Personally I think,the literature is a kind of mirror, which reflects the events of the history which history has different levels, circles. The different levels of history move by different speed. In the history there is evolution, and there are revolutions (political, economical, ideological, etc. Think on the age of Enlightening.) This refleciton is not direct, naturalistic or mechanistic. The reflexion produced by the literature is a creative/maybe destructive one, and the creativity depend on the author’s wordviews. An example: Thomas Mann and Franz Kaffka wrote in the same etap of the European history, but they reflected to the events and streams very different way. So we may say the history (even history of aestethic) leads to the pen (claviatura) of the writer, but the writers have their personality, their own intentions, interests, they eager to earn money, success, prestige etc.</span></span></p><span data-dcnode-id="1552" instrument_node=""> </span><p class="q-text qu-display--block qu-wordBreak--break-word qu-textAlign--start" data-dcnode-id="1549" style="box-sizing: border-box; margin-bottom: 1em; overflow-wrap: anywhere; direction: ltr;"><span data-dcnode-id="1550" style="font-weight: normal; font-style: normal; background: none;"><span data-dcnode-id="1551" instrument_node="">But one can understand your question another way. We may say that the history has its own history, and the literature has its own history. Here I mean: the past is uncertain, so as the time passes by we know more and more about the past, but our knowledge is never perfect. Just think it over: how the wiew of our human past changed when Watson had “invented” the DNS. So the history has it own history, and we revaluate the facts, which facts remain facts or become fact-like somethings. As regards literature, the literature (styles, streams, directions, modes) changes age by age, but it remains literature from Sappho till Schiller, Goethe, Ginsberg, from Homeros till Solochov or Solzenichin, Peter Esterhazy, Imre Kertész. Why: because in the centre of literatures the aestetical values are the most important elements. i.e. Beuty, Reflected Verity, Truth, Style. In the reality the most important values are the production and the reprodution of life, the theleology, the acceptance of death, etc. (The existence of literature is a necessisity, because we suppose that the good literature helps the reproduction of life. Not to mention that the reading/writing help the development of brain.) The history of history and the history of literature run in the same direction as we know. Sometimes the literature behaves like a saman or fortuneteller, like a doctor or teacher, a guerilla, or all of these together, sometimes the literature misleads the people, and behave like a stupid policeman, clergyman, brutal soldier, like an ignorant aristocrat. Sometimes the people understand what the writer would like to say, sometimes they do not. There are good readers, there are bad readers. Usually we don’t valuate the new, sometimes we forget the values of the past. Let me add, in our age, we do not know exatly where the borders of literature can be found. i.e. wether dadaist poems are poems really, wether the lyrics of a pop-song is literature or not. (It is depends on… or not at all?) Whether the slam-poetry has any value or not, etc.</span></span></p><span data-dcnode-id="1548" instrument_node=""> </span><p class="q-text qu-display--block qu-wordBreak--break-word qu-textAlign--start" data-dcnode-id="1545" style="box-sizing: border-box; margin-bottom: 1em; overflow-wrap: anywhere; direction: ltr;"><span data-dcnode-id="1546" style="font-weight: normal; font-style: normal; background: none;"><span data-dcnode-id="1547" instrument_node="">Here is the end of the similarities. I would like to stress, it is very-very dangerous to mix the reality and the literature (art). Thousends of people died, because they mixed the world of words (literature) and the world of facts. Just a strange example, in the 40ties of the XIX. century, in the age of romanticism, in Europe hundreds of people comitted suicide because Kotzebue, a today forgotten German writer depicted it in a roman as good final solution for heavy love- and moral problems. Of course you may ask, why Kotzebue depicted the suicide this way? Was he a bad man? Wether the thing, the feeling was in the air, and he had only catched it and used it as a methaphor of something?</span></span></p><span data-dcnode-id="1544" instrument_node=""> </span><p class="q-text qu-display--block qu-wordBreak--break-word qu-textAlign--start" data-dcnode-id="1541" style="box-sizing: border-box; margin-bottom: 0px; overflow-wrap: anywhere; direction: ltr;"><span data-dcnode-id="1542" style="font-weight: normal; font-style: normal; background: none;"><span data-dcnode-id="1543" instrument_node="">P.S. You can/may write whatever you want on a piece of paper, but you can not do in the everyday life, economy, traffic, etc. whatever you want.</span></span></p></span></span></div></div></div></div></div></div></div><div class="q-box qu-zIndex--action_bar" data-dcnode-id="1469" style="box-sizing: border-box;"><div class="q-box ActionBar___StyledBox-sc-1tz1b8b-1 jxrrvA" data-dcnode-id="1470" style="box-sizing: border-box; transition-property: box-shadow; transition-duration: 250ms; transition-timing-function: ease-out;"><div class="q-flex qu-justifyContent--space-between qu-alignItems--center qu-flexWrap--nowrap qu-py--tiny" data-dcnode-id="1471" style="box-sizing: border-box; display: flex;"><div class="q-flex qu-alignItems--center" data-dcnode-id="1485" style="box-sizing: border-box; display: flex;"><div class="q-inlineFlex qu-mr--small" data-dcnode-id="1507" style="box-sizing: border-box; display: inline-flex;"><div class="q-inlineFlex qu-borderRadius--pill qu-alignItems--center" data-dcnode-id="1508" style="box-sizing: border-box; display: inline-flex; background-color: rgba(0, 0, 1, 0.03);"><div class="q-box qu-display--inline-block" data-dcnode-id="1518" style="box-sizing: border-box; pointer-events: all;"><div class="q-relative puppeteer_popper_reference" data-dcnode-id="1519" style="box-sizing: border-box; position: relative;"><button aria-label="7 upvotes" class="q-click-wrapper ClickWrapper___StyledClickWrapperBox-zoqi4f-0 bIwtPb base___StyledClickWrapper-lx6eke-1 eqENAR undefined qu-borderTopLeftRadi der-box;"><div class="q-relative" data-dcnode-id="466" style="box-sizing: border-box; position: relative;"><div class="q-absolute qu-full qu-zIndex--base" data-dcnode-id="519" style="box-sizing: border-box; position: absolute;"></div><div class="q-box" data-dcnode-id="467" style="box-sizing: border-box; max-width: 100%;"><div class="q-box qu-cursor--pointer QTextTruncated___StyledBox-sc-1pev100-0 ejgusd" data-dcnode-id="495" style="box-sizing: border-box;"><div class="q-relative" data-dcnode-id="496" style="box-sizing: border-box; position: relative;"><div class="q-box qu-overflow--hidden" data-dcnode-id="497" style="box-sizing: border-box; max-height: 300px;"><div class="q-text qu-wordBreak--break-word" data-dcnode-id="498" style="box-sizing: border-box;"><span class="q-box qu-userSelect--text" data-dcnode-id="499" style="box-sizing: border-box;"><p class="q-text qu-display--block qu-wordBreak--break-word qu-textAlign--start" data-dcnode-id="516" style="box-sizing: border-box; margin-bottom: 1em; overflow-wrap: anywhere; direction: ltr;"><span data-dcnode-id="517" style="font-weight: normal; font-style: normal; background: none;"><span data-dcnode-id="518" instrument_node="">The longer I study literature, the more skeptical I become about most so-called literary theory. So much of it either imposes an ideological bias on a text, or assumes that the author’s intent is irrelevant, or imposes the will of the reader on the text, as does New Criticism.</span></span></p><span data-dcnode-id="515" instrument_node=""> </span><p class="q-text qu-display--block qu-wordBreak--break-word qu-textAlign--start" data-dcnode-id="512" style="box-sizing: border-box; margin-bottom: 0px; overflow-wrap: anywhere; direction: ltr;"><span data-dcnode-id="513" style="font-weight: normal; font-style: normal; background: none;"><span data-dcnode-id="514" instrument_node="">The historical approach is really the only consistently sensible way of looking at literature. Any text is the product of its time, and reflects in many ways the common ideas and concepts of its time. That should be self-evident. One must exercise judgment in applying intellectual commonplaces, of course. Is, for instance</span></span></p><div class="q-absolute qu-textAlign--center qu-zIndex--base" data-dcnode-id="500" style="box-sizing: border-box; position: absolute; width: 100%; height: 100px; bottom: 0px; background: linear-gradient(rgba(255, 255, 255, 0) 0%, rgb(255, 255, 255) 100%);" width="100%"><div class="q-inlineFlex" data-dcnode-id="501" style="box-sizing: border-box; display: inline-flex;"><div class="q-relative" data-dcnode-id="502" style="box-sizing: border-box; position: relative; bottom: -60px;"><button class="q-click-wrapper qu-active--textDecoration--none qu-focus--textDecoration--none ClickWrapper___StyledClickWrapperBox-zoqi4f-0 bIwtPb base___StyledClickWrapper-lx6eke-1 fURggN puppeteer_test_read_more_button qu-borderRadius--pill qu-alignItems--center qu-justifyContent--center qu-whiteSpace--nowrap qu-userSelect--none qu-display--inline-flex qu-bg--gray_ultralight qu-tapHighlight--white qu-textAlign--center qu-cursor--pointer qu-hover--textDecoration--none" data-dcnode-id="503" role="button" style="box-sizing: border-box; font: inherit; padding: 0px 15px; transition-property: box-shadow, background-color; transition-duration: 60ms; transition-timing-function: ease-out; height: 30px; min-width: 30px; position: relative; box-shadow: rgba(99, 100, 102, 0.2) 0px 0px 0px 1px inset; border-width: 0px; outline: none; color: inherit;" tabindex="0" type="button"><div class="q-flex qu-alignItems--center qu-justifyContent--center" data-dcnode-id="504" style="box-sizing: border-box; display: flex; max-width: 100%; transition-property: opacity; transition-duration: 60ms; transition-timing-function: ease-in-out;"><div class="q-text qu-display--inline-flex qu-alignItems--center qu-overflow--hidden puppeteer_test_button_text qu-medium qu-color--gray" data-dcnode-id="509" style="box-sizing: border-box; font-size: 13px;"><div class="q-text qu-ellipsis qu-whiteSpace--nowrap" data-dcnode-id="510" style="box-sizing: border-box; line-height: normal;"><span data-dcnode-id="511" instrument_node="">Continue Reading</span></div></div><span class="q-inlineBlock qu-ml--tiny qu-mr--n_tiny" data-dcnode-id="505" name="ChevronDown" style="box-sizing: border-box; display: inline-block; width: 16px; height: 16px; flex-shrink: 0; line-height: 16px;" width="16px"><span class="CssComponent__CssInlineComponent-sc-1oskqb9-1 Icon___StyledCssInlineComponent-sc-11tmcw7-0 fNkmIo" data-dcnode-id="506"><svg data-dcnode-id="507" height="24" viewBox="0 0 24 24" width="24" xmlns="http://www.w3.org/2000/svg"><path class="icon_svg-stroke" d="m5 8.5 7 7 7.005-7" data-dcnode-id="508" fill="none" stroke="#666" stroke-linecap="round" stroke-width="1.5"></path></svg></span></span></div></button></div></div></div></span></div></div></div></div><div class="q-box qu-display--none" data-dcnode-id="468" style="box-sizing: border-box;"><div class="q-text" data-dcnode-id="469" style="box-sizing: border-box; max-width: 100%;"><span class="CssComponent__CssInlineComponent-sc-1oskqb9-1 UserSelectableText___StyledCssInlineComponent-lsmoq4-0 kghFzc" data-dcnode-id="470"><span class="q-box qu-userSelect--text" data-dcnode-id="471" style="box-sizing: border-box;"><p class="q-text qu-display--block qu-wordBreak--break-word qu-textAlign--start" data-dcnode-id="492" style="box-sizing: border-box; margin-bottom: 1em; overflow-wrap: anywhere; direction: ltr;"><span data-dcnode-id="493" style="font-weight: normal; font-style: normal; background: none;"><span data-dcnode-id="494" instrument_node="">The longer I study literature, the more skeptical I become about most so-called literary theory. So much of it either imposes an ideological bias on a text, or assumes that the author’s intent is irrelevant, or imposes the will of the reader on the text, as does New Criticism.</span></span></p><span data-dcnode-id="491" instrument_node=""> </span><p class="q-text qu-display--block qu-wordBreak--break-word qu-textAlign--start" data-dcnode-id="476" style="box-sizing: border-box; margin-bottom: 1em; overflow-wrap: anywhere; direction: ltr;"><span data-dcnode-id="489" style="font-weight: normal; font-style: normal; background: none;"><span data-dcnode-id="490" instrument_node="">The historical approach is really the only consistently sensible way of looking at literature. Any text is the product of its time, and reflects in many ways the common ideas and concepts of its time. That should be self-evident. One must exercise judgment in applying intellectual commonplaces, of course. Is, for instance, Ulysses’s speech on degree in </span></span><span data-dcnode-id="487" style="font-weight: normal; font-style: italic; background: none;"><span data-dcnode-id="488" instrument_node="">Troilus And Cressida </span></span><span data-dcnode-id="485" style="font-weight: normal; font-style: normal; background: none;"><span data-dcnode-id="486" instrument_node="">ironic? I think not, so do I see the evocation of cosmic harmony in the last act of </span></span><span data-dcnode-id="483" style="font-weight: normal; font-style: italic; background: none;"><span data-dcnode-id="484" instrument_node="">The Merchant Of Venice </span></span><span data-dcnode-id="481" style="font-weight: normal; font-style: normal; background: none;"><span data-dcnode-id="482" instrument_node="">ironic. One must also never devalue the possibility of originality. I think that E. D. Hirsch’s </span></span><span data-dcnode-id="479" style="font-weight: normal; font-style: italic; background: none;"><span data-dcnode-id="480" instrument_node="">Validity In Interpretation, </span></span><span data-dcnode-id="477" style="font-weight: normal; font-style: normal; background: none;"><span data-dcnode-id="478" instrument_node="">with its distinction between meaning (objective, defined by the author) and significant (subjective, defined by the reader) is immensely useful as well.</span></span></p><span data-dcnode-id="475" instrument_node=""> </span><p class="q-text qu-display--block qu-wordBreak--break-word qu-textAlign--start" data-dcnode-id="472" style="box-sizing: border-box; margin-bottom: 0px; overflow-wrap: anywhere; direction: ltr;"><span data-dcnode-id="473" style="font-weight: normal; font-style: normal; background: none;"><span data-dcnode-id="474" instrument_node="">Literary study is not a excuse for wallowing in subjectivity; the reactions of most readers are far less interesting than those of the thoughts of the author, and, even when we have one great writer commenting on another, as T. S. Eliot on Shakespeare, it generally tells us more about the commentator than the subject.</span></span></p></span></span></div></div></div></div></div></div></div><div class="q-box qu-zIndex--action_bar" data-dcnode-id="405" style="box-sizing: border-box;"><div class="q-box ActionBar___StyledBox-sc-1tz1b8b-1 jxrrvA" data-dcnode-id="406" style="box-sizing: border-box; transition-property: box-shadow; transition-duration: 250ms; transition-timing-function: ease-out;"><div class="q-flex qu-justifyContent--space-between qu-alignItems--center qu-flexWrap--nowrap qu-py--tiny" data-dcnode-id="407" style="box-sizing: border-box; display: flex;"><div class="q-flex qu-alignItems--center" data-dcnode-id="421" style="box-sizing: border-box; display: flex;"><div class="q-inlineFlex qu-mr--small" data-dcnode-id="443" style="box-sizing: border-box; display: inline-flex;"><div class="q-inlineFlex qu-borderRadius--pill qu-alignItems--center" data-dcnode-id="444" style="box-sizing: border-box; display: inline-flex; background-color: rgba(0, 0, 1, 0.03);"><div class="q-box qu-display--inline-block" data-dcnode-id="454" style="box-sizing: border-box; pointer-events: all;"><div class="q-relative puppeteer_popper_reference" data-dcnode-id="455" style="box-sizing: border-box; position: relative;"><button
