</span><li class="menu-item menu-item-type-post_type menu-item-object-page menu-item-23856" data-dcnode-id="1720" id="menu-item-23856"><a data-dcnode-id="1723" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.liberty.edu/online/scholarship-opportunities/"><span data-dcnode-id="1726" instrument_node="">Scholarship Opportunities</span><strong class="nav-desc" data-dcnode-id="1724"><span data-dcnode-id="1725" instrument_node=""> </span></strong></a><div class="mega-menu" data-dcnode-id="1721"><div class="container" data-dcnode-id="1722"></div></div></li></ul></div></div></aside><div class="nine columns" data-dcnode-id="1588" id="content_body" tabindex="-1"><div class="course_guide_content" data-dcnode-id="1589"><section data-dcnode-id="1702"><div class="row" data-dcnode-id="1703"><div class="columns eight" data-dcnode-id="1711"><h3 data-dcnode-id="1714"><span data-dcnode-id="1715" instrument_node="">Historical Methodology – HIST 300</span></h3><p data-dcnode-id="1712"><span data-dcnode-id="1713" instrument_node="">CG • Section 8WK • 11/08/2019 to 04/16/2020 • Modified 04/08/2022</span></p></div><div class="columns four" data-dcnode-id="1704"><p data-dcnode-id="1708" style="text-align: center;"><a class="btn green applyLink" data-dcnode-id="1709" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//apply.liberty.edu/%3Fc%3D1%26page_placement%3Dcontent"><span data-dcnode-id="1710" instrument_node="">Apply Now</span></a></p><p data-dcnode-id="1705" style="text-align: center;"><a class="btn ghost" data-dcnode-id="1706" data-href="https://www.liberty.edu/online/request-information/" data-pageplacement="content" data-placementbound="true" tabindex="0"><span data-dcnode-id="1707" instrument_node="">Request Info</span></a></p></div></div></section><section data-dcnode-id="1691"><h3 data-dcnode-id="1700"><span data-dcnode-id="1701" instrument_node="">Course Description</span></h3><div data-dcnode-id="1697"><p data-dcnode-id="1698"><span data-dcnode-id="1699" instrument_node="">An invitation to explore the historical discipline. Students will be grounded in the meaning and interpretation of history, methodology, research techniques and career opportunities. Should be taken no later than the first semester of the junior year.</span></p></div><p data-dcnode-id="1692"><span data-dcnode-id="1696" instrument_node="">For information regarding prerequisites for this course, please refer to the&nbsp;</span><a data-dcnode-id="1694" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//catalog.liberty.edu/" rel="noreferrer noopener" target="_blank"><span data-dcnode-id="1695" instrument_node="">Academic Course Catalog</span></a><span data-dcnode-id="1693" instrument_node="">.</span></p></section><section data-dcnode-id="1686"><h3 data-dcnode-id="1689"><span data-dcnode-id="1690" instrument_node="">Rationale</span></h3><p data-dcnode-id="1687"><span data-dcnode-id="1688" instrument_node="">This course will introduce students to what it means to be an historian. The student will not only learn the specifics of how to write a research paper but also the process of studying history. The student will also be introduced to the biblical foundation for the study of history, career opportunities in history, and the value of the studying history.</span></p></section><section data-dcnode-id="1666"><h3 data-dcnode-id="1684"><span data-dcnode-id="1685" instrument_node="">Measurable Learning Outcomes</span></h3><p data-dcnode-id="1682"><span data-dcnode-id="1683" instrument_node="">Upon successful completion of this course, the student will be able to:</span></p><ol data-dcnode-id="1667" start="1" type="A"><li data-dcnode-id="1680"><span data-dcnode-id="1681" instrument_node="">Examine different philosophies of history.</span></li><span data-dcnode-id="1679" instrument_node="">
</span><li data-dcnode-id="1677"><span data-dcnode-id="1678" instrument_node="">Relate historiography to the study of an historical topic.</span></li><span data-dcnode-id="1676" instrument_node="">
</span><li data-dcnode-id="1674"><span data-dcnode-id="1675" instrument_node="">Differentiate between primary and secondary sources.</span></li><span data-dcnode-id="1673" instrument_node="">
</span><li data-dcnode-id="1671"><span data-dcnode-id="1672" instrument_node="">Demonstrate college level competencies in reading comprehension, documentary analysis, research, and historical writing.</span></li><span data-dcnode-id="1670" instrument_node="">
</span><li data-dcnode-id="1668"><span data-dcnode-id="1669" instrument_node="">Apply a Christian worldview to the problems and issues relevant to the study of history.</span></li></ol></section><section data-dcnode-id="1590"><h3 data-dcnode-id="1664"><span data-dcnode-id="1665" instrument_node="">Course Assignment</span></h3><p data-dcnode-id="1662"><strong data-dcnode-id="1663"></strong></p><p data-dcnode-id="1660"><strong data-dcnode-id="1661"></strong></p><div data-dcnode-id="1651"><div data-dcnode-id="1652"><div data-dcnode-id="1653"><div data-dcnode-id="1654"><p data-dcnode-id="1655"><span data-dcnode-id="1659" instrument_node="">After reading the Course Syllabus and&nbsp;</span><a data-dcnode-id="1657" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.liberty.edu/institutional-effectiveness/student-expectations/" rel="noreferrer noopener" target="_blank"><span data-dcnode-id="1658" instrument_node="">Student Expectations</span></a><span data-dcnode-id="1656" instrument_node="">, the student will complete the related checklist found in the Course Overview.</span></p></div></div></div></div><p data-dcnode-id="1649"><strong data-dcnode-id="1650"></strong></p><div data-dcnode-id="1643"><div data-dcnode-id="1644"><div data-dcnode-id="1645"><div data-dcnode-id="1646"><p data-dcnode-id="1647"><span data-dcnode-id="1648" instrument_node="">Discussions are collaborative learning experiences. Therefore, the student is required to provide a thread in response to the provided prompt for each discussion. Each thread must demonstrate course-related knowledge. In addition to the thread, the student is required to reply to 2 other classmates’ threads. For Discussion: Christian Worldview, the student is required to submit video posts for both the original thread and replies. The thread must be 60–120 seconds of student audio and 30–60 seconds for replies. For Discussion: Preparing a Career, the thread must be at least 300 words, and each reply must be at least 150 words.</span></p></div></div></div></div><p data-dcnode-id="1641"><strong data-dcnode-id="1642"></strong></p><p data-dcnode-id="1639"><span data-dcnode-id="1640" instrument_node="">The student will write research proposal (up to 2 pages) in current Turabian format that focuses on a topic he/she may wish to research in a future course. The student is not required to write a research paper; rather, this assignment is meant to equip him or her with the skills to write research papers in later courses. The proposal should identify the topic, provide a summary of the key historiographical works, explain the significance of the argument, and provide a brief overview of the research process. The bibliography needs to include five primary and five secondary sources in the proper format.&nbsp;&nbsp;While scholarly internet sources are encouraged, please use internet sources with discretion, avoiding general, non-peer reviewed sites.&nbsp;&nbsp;After each source, the student must provide a brief description (20-30 words) of the source and its importance to the paper.</span></p><p data-dcnode-id="1637"><strong data-dcnode-id="1638"></strong></p><div data-dcnode-id="1631"><div data-dcnode-id="1632"><div data-dcnode-id="1633"><div data-dcnode-id="1634"><p data-dcnode-id="1635"><span data-dcnode-id="1636" instrument_node="">The student will conduct an oral history interview with a parent, grandparent, aunt, or uncle about his or her family. The student will create a set of at least 10 questions based on a group of topics provided in the course and will write a 300-word summary of the interview in current Turabian format. The student will also video record the interview and submit the recording with the written part of the assignment.</span></p></div></div></div></div><p data-dcnode-id="1629"><strong data-dcnode-id="1630"></strong></p><p data-dcnode-id="1627"><span data-dcnode-id="1628" instrument_node="">Using Ancestry.com, the student will complete his or her family tree as far back as possible but at least back to a generation living in 1880. The student will also submit a 400-word summary in current Turabian format about his or her genealogical research. The summary must focus on what sources were used (minimum of 3), research issues that arose due to poor or absent sources, and what new things he/she learned about his or her family.&nbsp; Students should be able to use the free trial of Ancestry.com that company provides, but might need to acquire a subscription.</span></p><p data-dcnode-id="1625"><strong data-dcnode-id="1626"></strong></p><p data-dcnode-id="1623"><span data-dcnode-id="1624" instrument_node="">Using a provided website and evidence gleaned from the Family Tree Assignment, the student will examine the events in the state (or adjacent state) during the week 1 of his or her ancestors was born, prior to 1922. Once located, the student will write a 150–175-word description of the local events and their significance for the area in which his or her ancestor was born.</span></p><p data-dcnode-id="1621"><strong data-dcnode-id="1622"></strong></p><div data-dcnode-id="1615"><div data-dcnode-id="1616"><div data-dcnode-id="1617"><div data-dcnode-id="1618"><p data-dcnode-id="1619"><span data-dcnode-id="1620" instrument_node="">The student will select a book of based on some aspect of his/her family history. The student will write a 600-700 word analysis of this selection. This is NOT a book report. This paper should NOT simply summarize the book. Rather, a book review should assess the argument of the book, its strenghts and weaknesses, its sources, and it contribution to the literature in the field.</span></p></div></div></div></div><p data-dcnode-id="1613"><strong data-dcnode-id="1614"></strong></p><div data-dcnode-id="1607"><div data-dcnode-id="1608"><div data-dcnode-id="1609"><div data-dcnode-id="1610"><p data-dcnode-id="1611"><span data-dcnode-id="1612" instrument_node="">To integrate biblical worldview and history, the student will use a key event in the history of his or her family to highlight an important biblical passage of his or her choosing. The student will submit the Bible passage (a maximum of 4 verses) as a 250-word devotional connecting the passage’s meaning to his or her family history event. The assignment must be in current Turabian format.</span></p></div></div></div></div><p data-dcnode-id="1605"><strong data-dcnode-id="1606"></strong></p><div data-dcnode-id="1599"><div data-dcnode-id="1600"><div data-dcnode-id="1601"><div data-dcnode-id="1602"><p data-dcnode-id="1603"><span data-dcnode-id="1604" instrument_node="">The student will submit a bibliography of 5 primary sources (diaries, newspapers, letters, political debates, speeches, etc.), 5 secondary sources (books), and 5 secondary sources (articles) using current Turabian format citation methods. The sources must directly relate to a subject important to the student’s family history.</span></p></div></div></div></div><p data-dcnode-id="1597"><strong data-dcnode-id="1598"></strong></p><p data-dcnode-id="1595"><span data-dcnode-id="1596" instrument_node="">The Digital Presentation constitutes the culmination of the student’s genealogical research. The student must create a narrated presentation using Adobe Creative Cloud Express that focuses on important historical events directly related to his/her family history. The presentation must have at least 15 minutes of student-spoken audio. The presentation must also include a video introduction stating a thesis, an analysis of primary source evidence, references to secondary sources, and a concluding slide listing a complete bibliography of at least 10 sources.</span></p><p data-dcnode-id="1593"><strong data-dcnode-id="1594"></strong></p><p data-dcnode-id="1591"><span data-dcnode-id="1592" instrument_node="">Each quiz will cover the Learn material for the Modules: Weeks in which it is assigned. Each quiz will be open-book/open-notes, contain 10 multiple-choice and true/false questions, and have a 20-minute time limit.</span></p></section></div></div></div></main></div></article><footer data-dcnode-id="1300" data-swiftype-index="false" itemscope="" itemtype="http://schema.org/WPFooter"><div alt="" class="container" data-dcnode-id="1301"><div class="footerContainer" data-dcnode-id="1302"><div class="footerNav" data-dcnode-id="1438"><div class="menu-footer-navigation-container" data-dcnode-id="1439"><ul class="menu row" data-dcnode-id="1440" id="menu-footer-navigation"><li class="three columns menu-item menu-item-type-custom menu-item-object-custom menu-item-has-children menu-item-26471" data-dcnode-id="1549" id="menu-item-26471"><strong data-dcnode-id="1582"><span data-dcnode-id="1583" instrument_node="">Admissions</span></strong><div class="mega-menu" data-dcnode-id="1580"><div class="container" data-dcnode-id="1581"></div></div><ul class="sub-menu" data-dcnode-id="1551"><span data-dcnode-id="1579" instrument_node="">
