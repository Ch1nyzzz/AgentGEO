			Nexus Analysis		</span></h1><span data-dcnode-id="516" instrument_node="">
</span><p data-dcnode-id="514" data-type="author"><span data-dcnode-id="515" instrument_node="">Casey Pennington and Jill Scott</span></p><span data-dcnode-id="513" instrument_node="">

</span><h1 class="section-header" data-collapsed="true" data-dcnode-id="496" id="chapter-433-section-1"><span data-dcnode-id="510" instrument_node="">
</span><button aria-expanded="false" class="button--text" data-dcnode-id="497"><span data-dcnode-id="509" instrument_node="">
</span><span data-dcnode-id="506"><span data-dcnode-id="507" style="text-decoration: underline"><span data-dcnode-id="508" instrument_node="">Description</span></span></span><span data-dcnode-id="505" instrument_node="">
</span><svg aria-hidden="true" data-dcnode-id="499" focusable="false" viewBox="0 0 10 10"></svg><span data-dcnode-id="504" instrument_node="">
</span><rect class="vert" data-dcnode-id="503" height="8" width="2" x="4" y="1"></rect><span data-dcnode-id="502" instrument_node="">
</span><rect data-dcnode-id="501" height="2" width="8" x="1" y="4"></rect><span data-dcnode-id="500" instrument_node="">

</span></button></h1><span data-dcnode-id="495" instrument_node="">
</span><span data-dcnode-id="494" instrument_node="">
</span><span data-dcnode-id="493" instrument_node="">
</span><span data-dcnode-id="492" instrument_node="">
</span><span data-dcnode-id="491" instrument_node="">
</span><div data-dcnode-id="448" hidden=""><p data-dcnode-id="486"><span data-dcnode-id="490" instrument_node="">Nexus analysis is a methodological approach within Mediated Discourse Analysis. Nexus analysis, developed by Scollon &amp; Scollon (2004), places action, versus language and culture, as the primary unit of study (Scollon &amp; Scollon, 2007). Nexus analysis methodology is situated within three components: engaging the nexus, navigating the nexus, and changing the nexus (Scollon &amp; Scollon, 2004, p. 152). </span><span class="pullquote-left" data-dcnode-id="488"><span data-dcnode-id="489" instrument_node="">This methodological approach is one wherein the researcher cannot be a passive observer since their presence within the moment is entangled in the nexus.&nbsp;</span></span><span data-dcnode-id="487" instrument_node=""> When researchers engage with the nexus, they situate themselves within the action under study (Scollon, S.W. &amp; de Saint-Georges, 2013). This methodological approach is one wherein the researcher cannot be a passive observer since their presence within the moment is entangled in the nexus. Once engaged, researchers will navigate the nexus as they examine, and make visible three concepts: historical bodies (e.g. engrained expectations), discourses in place (identity, Gee 2004), and interaction orders (e.g. social relationships, Goffman 1983)  Within the nexus, the action/issue under study, the researcher makes visible the invisible ways in which historical bodies, discourses in the place, and interaction orders collide and coalesce.  Thus, nexus analysis studies are largely situated within social issues (Scollon &amp; Scollon, 2004; Scollon &amp; Scollon, 2007; Wohlwend &amp; Medina, 2012).</span></p><p data-dcnode-id="481"><span data-dcnode-id="485" instrument_node="">This research guide provides a broad-brush overview of nexus analysis with an emphasis on key scholarly work (Scollon &amp; Scollon, 2004; Scollon &amp; Scollon, 2007; Scollon, S.W. &amp; de Saint-Georges, 2013). </span><span class="pullquote-right" data-dcnode-id="483"><span data-dcnode-id="484" instrument_node="">Within the nexus, the action/issue under study, the researcher makes visible the invisible ways in which historical bodies, discourses in the place, and interaction orders collide and coalesce. </span></span><span data-dcnode-id="482" instrument_node=""> With relationship to the key scholars and writings, we provide examples of how nexus analysis, as a methodological tool, is taken up in three dissertations.  Each dissertation discussed in the guide provide strong theoretical and methodological engagements with the nexus analysis for emerging scholars. Additionally, this guide offers internet resources, in the hopes, for scholars to further engage and contribute to this growing methodological field.</span></p><h2 data-dcnode-id="479" style="text-align: center"><span data-dcnode-id="480" instrument_node="">References</span></h2><p data-dcnode-id="449"><span data-dcnode-id="478" instrument_node="">Gee, J. P. (2004). </span><em data-dcnode-id="476"><span data-dcnode-id="477" instrument_node="">An introduction to discourse analysis: Theory and method</span></em><span data-dcnode-id="475" instrument_node="">. Routledge.</span><br data-dcnode-id="474"><span data-dcnode-id="473" instrument_node="">
Goffman, E. (1983). The interaction order: American Sociological Association, 1982 presidential address. </span><em data-dcnode-id="471"><span data-dcnode-id="472" instrument_node="">American Sociological Review</span></em><span data-dcnode-id="470" instrument_node="">, 48(1), 1-17.</span><br data-dcnode-id="469"><span data-dcnode-id="468" instrument_node="">
Scollon, R., &amp; Scollon, S. W. (2007). Nexus analysis: Refocusing ethnography on action. </span><em data-dcnode-id="466"><span data-dcnode-id="467" instrument_node="">Journal of Sociolinguistics</span></em><span data-dcnode-id="465" instrument_node="">, 11(5), 608-625.</span><br data-dcnode-id="464"><span data-dcnode-id="463" instrument_node="">
Scollon, S. W. (2004). </span><em data-dcnode-id="461"><span data-dcnode-id="462" instrument_node="">Nexus analysis: Discourse and the emerging internet</span></em><span data-dcnode-id="460" instrument_node="">. London: Routledge.</span><br data-dcnode-id="459"><span data-dcnode-id="458" instrument_node="">
Scollon, S. W., &amp; de Saint-Georges, I. (2013). Mediated discourse analysis. In J. Gee &amp; M. Handford (Eds.). </span><em data-dcnode-id="456"><span data-dcnode-id="457" instrument_node="">Routledge handbook of discourse analysis</span></em><span data-dcnode-id="455" instrument_node=""> (pp. 92-104). London: Routledge.</span><br data-dcnode-id="454"><span data-dcnode-id="453" instrument_node="">
Wohlwend, K. E., &amp; Medina, C. L. (2012). Media as nexus of practice: remaking identities in What Not to Wear. </span><em data-dcnode-id="451"><span data-dcnode-id="452" instrument_node="">Discourse: Studies in the Cultural Politics of Education</span></em><span data-dcnode-id="450" instrument_node="">, 33(4), 545-560.</span></p></div><h1 class="section-header" data-collapsed="true" data-dcnode-id="433" id="chapter-433-section-2"><span data-dcnode-id="447" instrument_node="">

</span><div data-dcnode-id="321" hidden=""><p data-dcnode-id="401"><strong data-dcnode-id="402"><span data-dcnode-id="406" instrument_node="">Scollon, R., &amp; Scollon, S. B. (2004). </span><em data-dcnode-id="404"><span data-dcnode-id="405" instrument_node="">Nexus analysis: Discourse and the emerging Internet</span></em><span data-dcnode-id="403" instrument_node="">. London: Routledge.</span></strong></p><p data-dcnode-id="399"><span data-dcnode-id="400" instrument_node="">The Scollon’s book is a theoretical piece that accounts for how people, places, discourses, concepts, and objects cycle and circulate together to create social action and social change (Scollon, 2004). This book will serve as a helpful guide and resource for researchers who are interested in learning more about the theoretical and methodological underpinnings of nexus analysis.  Tucked nicely into the book are empirical examples of how the Scollon’s used nexus analysis across various ethnographic studies and data sets throughout the late 1970’s and early 1980’s in Alaska.  Their primary example draws from empirical research that examined technology-mediated classes in regard to the social problem of “discrimination and consequent lack of access to the educational, legal, medical, and other services to which Alaska natives were entitled” (p. 59).  </span></p><p data-dcnode-id="397"><span data-dcnode-id="398" instrument_node="">Scollon and Scollon formulated their theory of nexus analysis in this text. In doing so,  they use their own ethnographic research to demonstrate both the theory and methodology of nexus analysis. They provide useful examples of “nexus” and of the “cycles”.  Their examples pull from biological ecosystems, events of intercultural communication, and genres of computer-mediated discourse. They demonstrate how social action takes place as a nexus of practice or a nexus of the following three bodies of discourse (1) discourses in place (i.e. educational talk, the way we order a drink at Starbucks, or how we behave at a library) (2) interaction order, which is the ways that people come together in social groups (i.e. a meeting, conversation or chance encounter) and (3) the historical bodies or life experiences of the social actors. These three discourses are the primary concern of nexus analysis, however, it is through three main activities that one can do nexus analysis, the activities include; engaging in the nexus of practice, navigating the nexus of practice and ultimately changing the nexus of practice.  </span></p><p data-dcnode-id="395"><span data-dcnode-id="396" instrument_node="">The reader of Nexus analysis: Discourse and the emerging Internet will feel drawn into the ethnographic spaces due to the ease of the writing style presented in the work. The Scollon’s maintain a positive tone with a social justice edge that comes through in their work and in the book.  Ultimately this nexus analysis is about understanding the “taken for granted” discourses that cycle,Gee and about changing the world for the better.  At the end, there is a practical field guide for researchers to use when engaging, navigating and changing the nexus of practice within their own studies.  It contains useful questions, tasks and guidelines but doesn’t go into specifics about exactly how to do nexus analysis in educational contexts.  While this book lays some great foundation for doing nexus analysis, it assumes that the reader has experience with Critical Discourse Analysis (CDA) and many other underlying theories including P. Bourdieu’s habitus (1977, 1998) and Nishida’s historical body (1958), Gee’s big D Discourse (1999), Goffman’s interaction order (1983), and Wertsch’s mediated action (1991).</span></p><p data-dcnode-id="393"><span data-dcnode-id="394" instrument_node="">&nbsp;</span></p><p data-dcnode-id="387"><strong data-dcnode-id="388"><span data-dcnode-id="392" instrument_node="">Scollon, R., &amp; Scollon, S. W. (2007). Nexus analysis: Refocusing ethnography on action. </span><em data-dcnode-id="390"><span data-dcnode-id="391" instrument_node="">Journal of Sociolinguistics</span></em><span data-dcnode-id="389" instrument_node="">, 11(5), 608-625.</span></strong></p><p data-dcnode-id="385"><span data-dcnode-id="386" instrument_node="">Scollon &amp; Scollon’s (2007) Nexus Analysis: Refocusing ethnography on action is both a historical undertaking and a call for ethnographers to examine action. To begin, the Scollon’s claim that nexus analysis is their “response to Hyme’s call three decades ago for each of us to reinvent anthropology as a ‘personal general anthropology, whose function is the advancement of knowledge and the welfare of mankind” (p. 608).  As such, they conceptualize nexus analysis as a shift away from social groups and languages as the problems to be examined and make the move towards ethnographers to examine action as the prime unit of analysis (p. 608, emphasis added). Thus, nexus analysis primary focus is on human action rather than language or culture (p. 608).</span></p><p data-dcnode-id="383"><span data-dcnode-id="384" instrument_node="">The evolution of nexus analysis is situated within 20th century American History. The Scollon’s provide an overview of American history: homesteaders seizing Indigenous lands; WWI and WWII; McCarthyism as well as technology suspicion born of out the 2001 terrorists attacks.  Nexus analysis is entangled in American politics. As an entanglement example, the authors provide general overviews of two research studies situated in Alaska where actions were primary: Alaskan Natives in college and Alaskan Natives in the justice system.  They found in both cases that the historical bodies, discourses and interaction orders of one’s history (or identity group’s history) collides with dominant—white—historical bodies, discourses and interaction orders which produce grossly unjust and discriminatory practices. </span></p><p data-dcnode-id="381"><span data-dcnode-id="382" instrument_node="">The Scollon’s provide a broad-brush stroke about nexus analysis’ evolution from the early 20th century to current wherein they call for anthropologists and ethnographers to examine action first. In reading this article, one will need a strong background of 20th century American history background in order to understand the nuances of nexus analysis’ development and evolution. </span></p><p data-dcnode-id="379"><span data-dcnode-id="380" instrument_node="">&nbsp;</span></p><p data-dcnode-id="373"><strong data-dcnode-id="374"><span data-dcnode-id="378" instrument_node="">Scollon, S. W., &amp; de Saint-Georges, I. (2013). Mediated discourse analysis. In J. Gee &amp; M. Handford (Eds.). </span><em data-dcnode-id="376"><span data-dcnode-id="377" instrument_node="">The Routledge handbook of discourse analysis</span></em><span data-dcnode-id="375" instrument_node=""> (pp. 92-104). London: Routledge.</span></strong></p><p data-dcnode-id="371"><span data-dcnode-id="372" instrument_node="">Suzie Scollon &amp; Ingrid de Saint-Georges (2013) Mediated Discourse Analysis offers the historical background and theoretical underpinnings at the crux of MDA and thus nexus analysis. The authors share that MDA is an interdisciplinary methodological tool and theoretical framework which calls upon varying frameworks such as: “interactional sociolinguistics, conversation analysis, anthropological linguistics, or the ethnography of communication, critical discourse analysis, social semiotics, multimodal discourse analysis, the New Literacies Studies, and, more recently, cultural geography” (Jensen, 2007 cited in SW Scollon &amp; de Saint Georges, 2012). Scollon &amp; de Saint-Georges highlight that MDA and  nexus analysis focus on human, social interaction mediated by bodies, discourses and interaction orders which can be messy and complicated.  Therefore this type of methodological engagement and untangling requires researchers to draw upon varying disciplines and methodological frameworks to examine and locate linkages among mediated actions and actors within a moment (p. 8)</span></p><p data-dcnode-id="369"><span data-dcnode-id="370" instrument_node="">In order to do a Mediated Discourse Analysis study, Scollon &amp; de Saint-Georges write that nexus analysis is a methodological approach and tool. They describe nexus analysis as “opening up the circumference of analysis around moments of human action to begin to see the lines, sometimes visible and sometimes obscured, of historical and social processes by which discourses come together at particular  moments of human action as well as to make visible the ways in which outcomes such as transformations in those discourses, social actors, and mediational means emanate from those moments of action” (p. 16). To do this, there are three components to consider: Engaging the nexus; Navigating the nexus of practice; and Changing the nexus of practice (p. 20). The authors describe engaging the nexus as the “zone of identification” wherein the researcher must place themselves as part of the nexus of practice of study (p. 18). Once identified, the researcher then must navigate the nexus of practice which goes “beyond identifying the key site and action” but examines the “backstory of the characters (i.e. social actors)” (p. 18). Here researchers analyze and aggregate the discourses in the place, the bodies or social actors, and the history of sociocultural processes (p. 19). The researcher then changes the nexus of practice through a re-engagement with the analysis and back into the original practice/moment/or mediated action.  Meaning that researchers make the “visible links and connections among many trajectories of the historical bodies, discourses in place, and the interaction order” (p. 20).</span></p><p data-dcnode-id="367"><span data-dcnode-id="368" instrument_node="">Scollon and de Saint-Georges provide multiple examples of how researcher can engage in nexus analysis as a methodological tool and approach.  The authors highlight Ron Scollon’s exacerbation with his colleagues on Hawaii’s island where missiles were heard flying over head during the Vietnam war, but this colleagues did not believe that the war was being escalated, but only believe the escalation once the news reports came out that Hanoi had been bombed. Ron Scollon saw the mediated action (e.g the missiles), the historical bodies, discourse in place and the interaction orders as a way to analyze how his colleagues refused to believe in the war’s escalation. The authors begin with this anecdote as an origination of how Ron Scollon began thinking about entanglements. In addition to this anecdote, they also provide concretized examples of how Ron Scollon engaged in nexus analysis by examining discourses in place, interaction orders, historical bodies through one mediated action—the US census. Their concreteness in an abstract approach makes this article one to read before moving onto other key and seminal pieces as it provides a strong background, historical underpinnings of MDA as well as examples of how to engage in a nexus analysis study. </span></p><p data-dcnode-id="365"><span data-dcnode-id="366" instrument_node="">&nbsp;</span></p><p data-dcnode-id="359"><strong data-dcnode-id="360"><span data-dcnode-id="364" instrument_node="">Scollon, R. (2001). Action and text: towards an integrated understanding of the place of text in social (inter)action, mediated discourse analysis and the problem of social action. In R. Wodak &amp; M. Meyer (Eds.). </span><em data-dcnode-id="362"><span data-dcnode-id="363" instrument_node="">Methods of critical discourse analysis</span></em><span data-dcnode-id="361" instrument_node=""> (pp. 139-183). Thousand Oaks, CA: Sage.</span></strong></p><p data-dcnode-id="357"><span data-dcnode-id="358" instrument_node="">This is also a foundational source for mediated discourse analysis theory, in which ideas around Nexus of Practice were developed.  Between the years of 2001 and 2004 the Scollon’s thinking about nexus of practice and mediated discourse analysis continued to evolve toward its present form seen as nexus analysis. </span></p><p data-dcnode-id="355"><span data-dcnode-id="356" instrument_node="">&nbsp;</span></p><p data-dcnode-id="352"><strong data-dcnode-id="353"><span data-dcnode-id="354" instrument_node="">Further Readings</span></strong></p><p data-dcnode-id="347"><span data-dcnode-id="351" instrument_node="">Bourdieu, P. (1977). </span><em data-dcnode-id="349"><span data-dcnode-id="350" instrument_node="">Outline of a theory of practice</span></em><span data-dcnode-id="348" instrument_node="">. New York: Cambridge University Press. </span></p><p data-dcnode-id="342"><span data-dcnode-id="346" instrument_node="">Bourdieu, P. (1998).  </span><em data-dcnode-id="344"><span data-dcnode-id="345" instrument_node="">Practical reason: On the theory of action</span></em><span data-dcnode-id="343" instrument_node="">. Stanford, CA: Stanford University Press. </span></p><p data-dcnode-id="337"><span data-dcnode-id="341" instrument_node="">Gee, J. P. (1999). </span><em data-dcnode-id="339"><span data-dcnode-id="340" instrument_node="">An introduction to discourse analysis: Theory and method</span></em><span data-dcnode-id="338" instrument_node="">. London: Routledge. </span></p><p data-dcnode-id="332"><span data-dcnode-id="336" instrument_node="">Goffman, E. (1983). The interaction ritual. </span><em data-dcnode-id="334"><span data-dcnode-id="335" instrument_node="">American Sociological Review</span></em><span data-dcnode-id="333" instrument_node="">, 48, 1-19. </span></p><p data-dcnode-id="327"><span data-dcnode-id="331" instrument_node="">Nishida, Kitaroo. (1958). </span><em data-dcnode-id="329"><span data-dcnode-id="330" instrument_node="">Intelligibility and the philosophy of nothingness</span></em><span data-dcnode-id="328" instrument_node="">. Tokyo: Maruzen Co. Ltd. </span></p><p data-dcnode-id="322"><span data-dcnode-id="326" instrument_node="">Wertsch (1991). </span><em data-dcnode-id="324"><span data-dcnode-id="325" instrument_node="">Voices of the mind: Sociocultural approach to mediated action</span></em><span data-dcnode-id="323" instrument_node="">. Cambridge, MA: Harvard University Press.</span></p></div><h1 class="section-header" data-collapsed="true" data-dcnode-id="306" id="chapter-433-section-3"><span data-dcnode-id="320" instrument_node="">
</span><button aria-expanded="false" class="button--text" data-dcnode-id="307"><span data-dcnode-id="319" instrument_node="">
</span><span data-dcnode-id="316"><span data-dcnode-id="317" style="text-decoration: underline"><span data-dcnode-id="318" instrument_node="">Recent dissertations that exemplify the use of nexus analysis</span></span></span><span data-dcnode-id="315" instrument_node="">
</span><svg aria-hidden="true" data-dcnode-id="309" focusable="false" viewBox="0 0 10 10"></svg><span data-dcnode-id="314" instrument_node="">

</span><span data-dcnode-id="290" instrument_node="">
</span><div data-dcnode-id="247" hidden=""><p data-dcnode-id="284"><strong data-dcnode-id="285"><span data-dcnode-id="289" instrument_node="">Rish, R. M. (2011). </span><em data-dcnode-id="287"><span data-dcnode-id="288" instrument_node="">Engaging adolescents’ interests, literacy practices, and identities: Digital collaborative writing of fantasy fiction in a high school english elective class</span></em><span data-dcnode-id="286" instrument_node="">. Retrieved from ProQuest Dissertations &amp; Theses Global. (Order Number 349336)</span></strong></p><p data-dcnode-id="282"><span data-dcnode-id="283" instrument_node="">Rish’s dissertation employs new literacy studies, mediated discourse theory, and positioning theory to investigate a high school elective English class, in which students collectively read and collaboratively wrote fantasy fiction. The culminating project was entitled The Building Worlds Project and involved students’ collaborative writing on a digital platform called wiki. Rish focused on the social practice of collaboration within writing. He asked three research questions including; (1) How do the teacher, his students, and I engage, navigate, and attempt to change the nexus of practice that constituted the Building Worlds Project? (2) How do the students’ social practices, mediational means, and social interaction shape how and why they coordinated their collaborative writing? (3) How are the teacher and his students’ positional identities related to how and why they wrote collaboratively for the Building Worlds Project? </span></p><p data-dcnode-id="280"><span data-dcnode-id="281" instrument_node="">Rish utilized an adapted version of Scollon’s Data Filtering Process (Scollon, 2001) that involves a series of four filters to organize and prioritize data collection. His extensive corpus of data consisted of classroom observations, field notes, focus group interviews, scene surveys with video of class sessions, student profile interviews, student wiki discussion page posts, and student’s online responses to classmates, audio and video recordings of focus groups, and teacher interviews. Methodologies used for data analysis were two-fold and grounded in mediated discourse analysis (Scollon, 2001a; Scollon &amp; Scollon, 2004). Rish chose to draw from nexus analysis to show how social practices were linked within a nexus of practice. Nexus analysis demonstrated that the students’ writing was not only shaped by social practices associated with out-of-school domains but also social practices related to writing that were associated with the contexts of their other high school classes. </span></p><p data-dcnode-id="278"><span data-dcnode-id="279" instrument_node="">&nbsp;</span></p><p data-dcnode-id="272"><strong data-dcnode-id="273"><span data-dcnode-id="277" instrument_node="">Tierney, J. D. (2013). </span><em data-dcnode-id="275"><span data-dcnode-id="276" instrument_node="">“It wasn’t like we were serious”: Laughter in the mediated action of race talk</span></em><span data-dcnode-id="274" instrument_node="">. Retrieved from ProQuest Dissertations &amp; Theses Global. (Order No. 3567482)</span></strong></p><p data-dcnode-id="270"><span data-dcnode-id="271" instrument_node="">Tierney’s dissertation pulls from new literacy studies, sociocultural literacies, identity theories, Mediated Discourse Analysis—more specifically nexus analysis (Scollon &amp; Scollon, 2004), Multiliteracies, and sociocultural theories with an emphasis on media literacies and critical engagement. She entered the site with these research questions: How did students in this diverse school and classroom address questions of race, particularly given the critical bend of the course? How were interactions “raced” in the digital media classroom, and how did those raced interactions shape learning? And what, overall, could I learn from students if I simply listened as they talked about race with each other? (p. 5). She came into the site with these questions in mind, but quickly found that laughter and joking mediated the conversations students were engaging with around race and racism. Therefore, the focus of her study became to examine how laughter mediates discussions about race and racism among students, and she situates her study in a high school that “is battling to stay alive,” and where conversations about race and diversity are welcomed (p. 87).  She is a researcher-participant in one filmmaking class where a group of three male students are crafting a documentary film about immigration.  She opens with her positionality which is an initial step in engaging the nexus of practice. She situates herself as a white, middle class woman in largely diverse minority-majority school.</span></p><p data-dcnode-id="268"><span data-dcnode-id="269" instrument_node="">Tierney engages the nexus of practice as she establishes “the social issue under study, locating crucial actors, observing the interaction order, and determining the most significant cycles of discourse” (p. 86).  She is part of the nexus of practice and analysis. To analyze her data, she “coded for patterns related to race study and diversity in the documentary film class and identified the social issue under study that [she] called ‘raced relations’… and in particular, raced interactions mediated by joking and laughter” (p. 86).  Once engaged, she navigates the nexus of practice as she examines key discourse patterns of the school, as a whole, and then more specifically the discourses and interaction orders within the documentary film classroom. </span></p><p data-dcnode-id="266"><span data-dcnode-id="267" instrument_node="">Tierney examined three mediated engagements where the students mediate uncomfortable and politically charged conversations about race. She examined the discourses in place (e.g. school-wide conversations about race and diversity) historical bodies (e.g. laughter and jokes as part of masculinity and kinship) and interaction orders (e.g. banter). She found that while the school was open to talking about race and diversity, the overall discourse in place was simplified and felt as an implicit construct.  She found that students engaged in raced interactions through jokes and laughter as a way to embed a missing piece of raced talks: “laughing about the ridiculousness of racism and the structures it produces’ (p. 195). In the filmmaking process, the students engaged in “hybridized and playful ways of knowing” (p. 203). The student’s critical engagement in media literacies “hinged on the intensity and surprise they generated through humor” (p. 204). She concluded with knowing she could not untangle herself from the nexus. “Discourses are submerged in the historical bodies and practices of all the participants—including me—and those discourses are significant to how I interact with participants in the nexus and to how I characterize the research here” (p. 192). AS the researcher-participant, she could not untangle herself from the nexus—her historical body, interaction order, and discourses all interacted and collided with the students as laughter and jokes mediated raced talks. She came into the research project looking for how students engaged in nuances and complex conversations about race and found how laughter could mediate such conversations. </span></p><p data-dcnode-id="264"><span data-dcnode-id="265" instrument_node="">&nbsp;</span></p><p data-dcnode-id="258"><strong data-dcnode-id="259"><span data-dcnode-id="263" instrument_node="">Kargin, T. (2016). </span><em data-dcnode-id="261"><span data-dcnode-id="262" instrument_node="">Literacy in a new playground: Young children’s literacy practices in commercially designed virtual play worlds</span></em><span data-dcnode-id="260" instrument_node="">. Retrieved from ProQuest Dissertations &amp; Theses Global. (Order Number 10164249)</span></strong></p><p data-dcnode-id="256"><span data-dcnode-id="257" instrument_node="">This ethnographic study examines children’s collaborative play and digital literacy practices in the commercially designed virtual play world of Club Penguin.  The researcher was particularly interested in the children’s participation and literacy practices, as well as observations when children changed from basic membership accounts to paid accounts and back again.  The theoretical framing derives from mediated discourse analysis (MDA) with a focus on two main theories including Mediation in cultural historical Activity Theory (Vygotsky, 1978; Wertsch, 1991), and Capital and Habitus in Practice Theory (Bourdieu, 1977;1986). </span></p><p data-dcnode-id="254"><span data-dcnode-id="255" instrument_node="">Kargin’s research questions employ the three elements of nexus analysis, historical bodies, interaction order, and discourses in place: “RQ 1, the change in children’s perceptions about Club Penguin and preferred activities is about their historical bodies; RQ 2, the children’s participation in the Club Penguin club peer culture is more about their interaction orders; and RQ 3, the literacy practices of children is more about discourse in place” (pg. 255).</span></p><p data-dcnode-id="252"><span data-dcnode-id="253" instrument_node="">Data was collected from 14 active participants that included children ages 5-8 in an after-school setting using a four-phase approach. Phase 1 involved participant observation and field notes covering interactions during Club Penguin play, accompanied by video of pairs of children interacting while working within the club penguin platform.  In phase 2, the researcher employed cyber-ethnography methodology, this entailed using an avatar and visiting the Club Penguin virtual world. During this time, the researcher took field notes and screenshots of online players interactions.  Phase 3 involved changing the nexus of practice. During this phase, children received upgraded memberships from free to paid memberships.  This change was documented through student interviews that were also videotaped. The final phase involved one-on-one sessions in which students were guided to take a critical stance and respond to Club Penguin with their critiques. These one-on-one sessions were video-taped. All video was analyzed using a video analysis software called Studio Code.</span></p><p data-dcnode-id="250"><span data-dcnode-id="251" instrument_node="">This study utilized Scollon and Scollon’s (2004) Nexus Analysis, and with that the associated tasks of engaging the nexus, navigating the nexus, in which, the researcher located nexus of practice and transformative events for micro-analysis. For analysis, these tasks were combined with Wohlwend’s MDA filter model (Wohlwend, 2009) and then one more section was added to the filters which was a critical literacy phase.  This created a new highbred of nexus analysis methodological model that melded nexus analysis, MDA, and critical literacy.</span></p><p data-dcnode-id="248"><span data-dcnode-id="249" instrument_node="">&nbsp;</span></p></div><h1 class="section-header" data-collapsed="true" data-dcnode-id="232" id="chapter-433-section-4" style="text-align: center"><span data-dcnode-id="246" instrument_node="">

</span><div data-dcnode-id="178" hidden=""><p data-dcnode-id="213"><strong data-dcnode-id="214"><span data-dcnode-id="219" instrument_node="">Nexus Analysis Research Network. Retrieved from </span><a data-dcnode-id="217" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.discoursehub.fi/engaging-nexus-analysis/nexus-analysis-research-network/"><span data-dcnode-id="218" instrument_node="">http://www.discoursehub.fi/engaging-nexus-analysis/nexus-analysis-research-network/</span></a><br data-dcnode-id="216"><span data-dcnode-id="215" instrument_node="">
</span></strong></p><p data-dcnode-id="211"><span data-dcnode-id="212" instrument_node="">This is a resource that is important for anyone who may want to connect with a community of researchers that are using nexus analysis. It is part of a larger platform that is called the Jyvaskyla Discourse Hub (JDH).  It is described as a “stimulating and interactive space for sharing and developing new ideas, on-going research and best practices related to discourse studies, multilingualism and minority languages” (JDH, website: http://www.discoursehub.fi/jyvaskyla-discourse-hub/) and is maintained by a small group of scholars in Finland. The nexus analysis segment of the site includes links to the following: a nexus analysis researcher network site, reading groups, a Q &amp;A network, and a resources section. </span></p><p data-dcnode-id="209"><span data-dcnode-id="210" instrument_node="">&nbsp;</span></p><p data-dcnode-id="204"><strong data-dcnode-id="205"><span data-dcnode-id="208" instrument_node="">Suzie Scollon’s Linkedin Profile. Retrieved from </span><a data-dcnode-id="206" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.linkedin.com/in/suzie-scollon-6040712a"><span data-dcnode-id="207" instrument_node="">https://www.linkedin.com/in/suzie-scollon-6040712a</span></a></strong></p><p data-dcnode-id="202"><span data-dcnode-id="203" instrument_node="">LinkedIn is a professional social media network, where users create profiles highlighting current and prior work experience. Suzie Scollon’s site not only has professional information, it has a way to contact her via the app.  This may be helpful if you are doing nexus analysis and have a question.  As it is a newer methodology, there are not that many experts, so having a way to contact the direct source of nexus analysis may prove to be very helpful. </span></p><p data-dcnode-id="200"><span data-dcnode-id="201" instrument_node="">&nbsp;</span></p><p data-dcnode-id="194"><strong data-dcnode-id="195"><span data-dcnode-id="199" instrument_node="">Wigham, C.R. (2011, April 6th). Nexus Analysis: Discourse and the Emerging Internet Scollon &amp; Scollon (2004). Retrieved from </span><a data-dcnode-id="197" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.slideserve.com/zihna/nexus-analysis-discourse-and-the-emerging-internet-scollon-and-scollon-2004"><span data-dcnode-id="198" instrument_node="">https://www.slideserve.com/zihna/nexus-analysis-discourse-and-the-emerging-internet-scollon-and-scollon-2004</span></a><span data-dcnode-id="196" instrument_node=""> </span></strong></p><p data-dcnode-id="192"><span data-dcnode-id="193" instrument_node="">This Powerpoint presentation provides a concise overview of the seminal work; Nexus Analysis: discourse and the emerging internet.  Scollon and Scollon (2004). It was put together by Ciara R. Wigham, Associate Professor at Clermont Auvergne University. This powerpoint stays very true to the book and doesn’t offer any synthesis or critique.  Rather, it is a basic outline of the Scollon’s book introducing nexus theory.</span></p><p data-dcnode-id="190"><span data-dcnode-id="191" instrument_node="">&nbsp;</span></p><p data-dcnode-id="181"><strong data-dcnode-id="182"><span data-dcnode-id="189" instrument_node="">Audiopedia, T. (2018, August 7th). </span><em data-dcnode-id="187"><span data-dcnode-id="188" instrument_node="">What is Mediated Discourse Analysis? What does Mediated Discourse Analysis mean?</span></em><span data-dcnode-id="186" instrument_node=""> Retrieved from </span><a data-dcnode-id="184" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.youtube.com/watch%3Fv%3DtvXdR9sPG3A"><span data-dcnode-id="185" instrument_node="">https://www.youtube.com/watch?v=tvXdR9sPG3A</span></a><span data-dcnode-id="183" instrument_node=""> </span></strong></p><p data-dcnode-id="179"><span data-dcnode-id="180" instrument_node="">This link connects to a two-minute Audiopedia informational session on Youtube.   The Audiopedia aims to help visually-challenged people by providing a reading service to Wikipedia contents and articles in a simple, concise, and abridged manner. This particular audio segment provides a brief explanation of Scollon’s Mediated Discourse Analysis with a focus on Nexus Analysis. </span></p></div></section><span data-dcnode-id="176" instrument_node="">
