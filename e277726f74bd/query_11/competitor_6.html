</span><li data-dcnode-id="396"><strong data-dcnode-id="397"><span data-dcnode-id="398" instrument_node="">Approaches in Discourse Analysis</span></strong></li><span data-dcnode-id="395" instrument_node="">
</span></ul><span data-dcnode-id="393" instrument_node="">
</span><p data-dcnode-id="391"><span data-dcnode-id="392" instrument_node="">So, let’s get started with knowing, what is discourse analysis?</span></p><span data-dcnode-id="390" instrument_node="">
</span><h2 data-dcnode-id="388"><span data-dcnode-id="389" instrument_node="">1) Discourse Analysis Definition(DA)</span></h2><span data-dcnode-id="387" instrument_node="">
</span><h3 data-dcnode-id="385"><span data-dcnode-id="386" instrument_node="">Discourse Meaning</span></h3><span data-dcnode-id="384" instrument_node="">
</span><p data-dcnode-id="382"><span data-dcnode-id="383" instrument_node="">Before moving on to the whole process, let’s first start with the meaning of Discourse. The term “Discourse” denotes spoken and written language. It is a concept which depicts context of communication and interaction between each modality.</span></p><span data-dcnode-id="381" instrument_node="">
</span><p data-dcnode-id="379"><span data-dcnode-id="380" instrument_node="">Discourse showcases “a body of series, of signs.” They are enouncements, i.e., statements, in a conversation. Discourse is a stable construct which allows the semiotic signs to assign different meanings. It also allows them to communicate to and between different subjects, objects, and statements.</span></p><span data-dcnode-id="378" instrument_node="">
</span><p data-dcnode-id="376"><span data-dcnode-id="377" instrument_node="">A discourse is thus, a composition of semiotic series among and between different subjects, objects, and statements. There are interrelations amongst the content of a given discourse so, similarly, there exist interrelations amongst discourses.</span></p><span data-dcnode-id="375" instrument_node="">
</span><p data-dcnode-id="373"><span data-dcnode-id="374" instrument_node="">The discourse within researchers, highlights the questions and answers of What is not? And What is? They are conducted according to the meanings of the concepts which are used in the given field of inquiry.</span></p><span data-dcnode-id="372" instrument_node="">
</span><p data-dcnode-id="370"><span data-dcnode-id="371" instrument_node="">So, this was the meaning of discourse. Now, let’s see what discourse analysis is?</span></p><span data-dcnode-id="369" instrument_node="">
</span><h3 data-dcnode-id="367"><span data-dcnode-id="368" instrument_node="">Discourse Analysis</span></h3><span data-dcnode-id="366" instrument_node="">
</span><p data-dcnode-id="364"><span data-dcnode-id="365" instrument_node="">Discourse analysis(DA), is also known as discourse studies. It is a general term used for some approaches to analyze vocal, written or sign language use or any semiotic event.</span></p><span data-dcnode-id="363" instrument_node="">
</span><p data-dcnode-id="361"><span data-dcnode-id="362" instrument_node="">All these are objects of discourse analysis like writing, and communication are defined concerning rational sequences. These sequences include courses of speech, sentences, prepositions or turns at talk.</span></p><span data-dcnode-id="360" instrument_node="">
</span><p data-dcnode-id="358"><span data-dcnode-id="359" instrument_node="">In discourse analysis, you not only study the use of language but, you also analyze ‘naturally occurring’ language use. It aims at showcasing socio-psychological characteristics of a person rather than its text structure.</span></p><span data-dcnode-id="357" instrument_node="">
</span><h4 data-dcnode-id="355"><span data-dcnode-id="356" instrument_node="">Following are the disciplines under humanities &amp; Social sciences, in which discourse analysis is taken up:</span></h4><span data-dcnode-id="354" instrument_node="">
</span><ul data-dcnode-id="337"><span data-dcnode-id="353" instrument_node="">
</span><li data-dcnode-id="351"><span data-dcnode-id="352" instrument_node="">Linguistics, anthropology, sociology</span></li><span data-dcnode-id="350" instrument_node="">
</span><li data-dcnode-id="348"><span data-dcnode-id="349" instrument_node="">Education, social work, social psychology</span></li><span data-dcnode-id="347" instrument_node="">
</span><li data-dcnode-id="345"><span data-dcnode-id="346" instrument_node="">Cognitive psychology, area studies, international relations</span></li><span data-dcnode-id="344" instrument_node="">
</span><li data-dcnode-id="342"><span data-dcnode-id="343" instrument_node="">Area studies, cultural studies, human geography</span></li><span data-dcnode-id="341" instrument_node="">
</span><li data-dcnode-id="339"><span data-dcnode-id="340" instrument_node="">Biblical studies, communication studies and translation studies.</span></li><span data-dcnode-id="338" instrument_node="">
</span></ul><span data-dcnode-id="336" instrument_node="">
</span><p data-dcnode-id="334"><span data-dcnode-id="335" instrument_node="">Each of these is subject to its own methodologies, dimensions of analysis, and assumptions.</span></p><span data-dcnode-id="333" instrument_node="">
</span><h3 data-dcnode-id="331"><span data-dcnode-id="332" instrument_node="">Following things are covered under Discourse Analysis:</span></h3><span data-dcnode-id="330" instrument_node="">
</span><ul data-dcnode-id="307"><span data-dcnode-id="329" instrument_node="">
</span><li data-dcnode-id="327"><span data-dcnode-id="328" instrument_node="">Genres of discourse like discourse in the media, politics, business, science, education, etc.</span></li><span data-dcnode-id="326" instrument_node="">
</span><li data-dcnode-id="324"><span data-dcnode-id="325" instrument_node="">Different dimensions or levels of discourse like sounds, syntax, style, meanings, turns, speech acts, moves, etc.</span></li><span data-dcnode-id="323" instrument_node="">
</span><li data-dcnode-id="321"><span data-dcnode-id="322" instrument_node="">The connection between discourse and the emergence of syntactic structure.</span></li><span data-dcnode-id="320" instrument_node="">
</span><li data-dcnode-id="318"><span data-dcnode-id="319" instrument_node="">Relationship of discourse and power.</span></li><span data-dcnode-id="317" instrument_node="">
</span><li data-dcnode-id="315"><span data-dcnode-id="316" instrument_node="">The relation between text and context.</span></li><span data-dcnode-id="314" instrument_node="">
</span><li data-dcnode-id="312"><span data-dcnode-id="313" instrument_node="">Relationship between discourse and interaction.</span></li><span data-dcnode-id="311" instrument_node="">
</span><li data-dcnode-id="309"><span data-dcnode-id="310" instrument_node="">The relations among discourse and memory and cognition.</span></li><span data-dcnode-id="308" instrument_node="">
</span></ul><span data-dcnode-id="306" instrument_node="">
</span><h4 data-dcnode-id="304"><span data-dcnode-id="305" instrument_node="">Importance of studying Discourse Analysis</span></h4><span data-dcnode-id="303" instrument_node="">
</span><ul data-dcnode-id="286"><span data-dcnode-id="302" instrument_node="">
</span><li data-dcnode-id="288" style="list-style-type: none;"><span data-dcnode-id="301" instrument_node="">
</span><ul data-dcnode-id="290"><span data-dcnode-id="300" instrument_node="">
</span><li data-dcnode-id="298"><span data-dcnode-id="299" instrument_node="">If you are a linguist, then it helps you to find out the functioning of language.</span></li><span data-dcnode-id="297" instrument_node="">
</span><li data-dcnode-id="295"><span data-dcnode-id="296" instrument_node="">Being an educator, it will help you in finding out that how good texts work. It will help you in educating your students better about writing or speaking strategies.</span></li><span data-dcnode-id="294" instrument_node="">
</span><li data-dcnode-id="292"><span data-dcnode-id="293" instrument_node="">If you are a critical analyst, then it helps you to discover meanings in the text those are not obvious on the surface. For example, if you analyzing someone’s speech to see their preconceptions.</span></li><span data-dcnode-id="291" instrument_node="">
</span></ul><span data-dcnode-id="289" instrument_node="">
</span></li><span data-dcnode-id="287" instrument_node="">
</span></ul><span data-dcnode-id="285" instrument_node="">
</span><h3 data-dcnode-id="283"><span data-dcnode-id="284" instrument_node="">Discourse analysis example</span></h3><span data-dcnode-id="282" instrument_node="">
</span><ul data-dcnode-id="262"><span data-dcnode-id="281" instrument_node="">
</span><li data-dcnode-id="264" style="list-style-type: none;"><span data-dcnode-id="280" instrument_node="">
</span><ul data-dcnode-id="266"><span data-dcnode-id="279" instrument_node="">
</span><li data-dcnode-id="268" style="list-style-type: none;"><span data-dcnode-id="278" instrument_node="">
</span><ol data-dcnode-id="270"><span data-dcnode-id="277" instrument_node="">
</span><li data-dcnode-id="275"><span data-dcnode-id="276" instrument_node="">Language which is above the clause or the sentence. Example: One day his father said to him, “Come, Sam, take this fruit basket and bring them to your grandfather.”</span></li><span data-dcnode-id="274" instrument_node="">
</span><li data-dcnode-id="272"><span data-dcnode-id="273" instrument_node="">Discourse in social practice. Example: Discourse of peace, medical discourses, discourses of food, etc.</span></li><span data-dcnode-id="271" instrument_node="">
</span></ol><span data-dcnode-id="269" instrument_node="">
</span></li><span data-dcnode-id="267" instrument_node="">
</span></ul><span data-dcnode-id="265" instrument_node="">
</span></li><span data-dcnode-id="263" instrument_node="">
</span></ul><span data-dcnode-id="261" instrument_node="">
</span><h2 data-dcnode-id="259"><span data-dcnode-id="260" instrument_node="">2) Discourse Analysis Methodology</span></h2><span data-dcnode-id="258" instrument_node="">
</span><p data-dcnode-id="256"><img alt="steps-discourse-analysis" class="aligncenter size-full wp-image-1151" data-dcnode-id="257" height="2000" loading="lazy" sizes="(max-width: 800px) 100vw, 800px" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.allassignmenthelp.co.uk/blog/wp-content/uploads/2018/01/steps-discourse-analysis.png&amp;raw" srcset="https://www.allassignmenthelp.co.uk/blog/wp-content/uploads/2018/01/steps-discourse-analysis.png 800w, https://www.allassignmenthelp.co.uk/blog/wp-content/uploads/2018/01/steps-discourse-analysis-120x300.png 120w, https://www.allassignmenthelp.co.uk/blog/wp-content/uploads/2018/01/steps-discourse-analysis-768x1920.png 768w, https://www.allassignmenthelp.co.uk/blog/wp-content/uploads/2018/01/steps-discourse-analysis-410x1024.png 410w" width="800"></p><span data-dcnode-id="255" instrument_node="">
</span><p data-dcnode-id="251"><em data-dcnode-id="252"><strong data-dcnode-id="253"><span data-dcnode-id="254" instrument_node="">Following are the ten steps to perform a Discourse analysis:</span></strong></em></p><span data-dcnode-id="250" instrument_node="">
</span><h3 data-dcnode-id="248"><span data-dcnode-id="249" instrument_node="">i. Build up the Context</span></h3><span data-dcnode-id="247" instrument_node="">
</span><p data-dcnode-id="245"><span data-dcnode-id="246" instrument_node="">Start by checking that, where your source material is from? Check that, in what context the source is produced? Jot down its historical and social context. Write down the language in which your source material is written.</span></p><span data-dcnode-id="244" instrument_node="">
</span><p data-dcnode-id="242"><span data-dcnode-id="243" instrument_node="">Then there is a lot to find out like the country and place where your source is from and who wrote, published it and when? Try to maintain the record of your sources like, when and why you used the sources. It is essential for you to find out the history of your source material.</span></p><span data-dcnode-id="241" instrument_node="">
</span><h3 data-dcnode-id="239"><span data-dcnode-id="240" instrument_node="">ii. Review the production process.</span></h3><span data-dcnode-id="238" instrument_node="">
</span><p data-dcnode-id="236"><span data-dcnode-id="237" instrument_node="">There is a requirement of an in-depth background check. Try to find information about the producer of your source and their personal and educational background. You need to have a broader range of research. Search, are they known for their journalism style or any other such thing?</span></p><span data-dcnode-id="235" instrument_node="">
</span><p data-dcnode-id="233"><span data-dcnode-id="234" instrument_node="">Find out, who the general audience is of their publications. If you can, then go for a personal interview with the editor of that magazine. With this, you will get some close information regarding the production backgrounds.</span></p><span data-dcnode-id="232" instrument_node="">
</span><p data-dcnode-id="230"><span data-dcnode-id="231" instrument_node="">Now, you need to identify that where your source material has been published. Reading it online is not that useful. It is not the same as, reading directly from a book. Try to make sure that, you have identified all the media types on which your source was published. Try to be clear about the version, which you are analyzing yourself.</span></p><span data-dcnode-id="229" instrument_node="">
</span><p data-dcnode-id="227"><span data-dcnode-id="228" instrument_node="">It will also reveal the quality of the source material which you have. You should also keep in check the technical quality and readability of your source. All these background checks will help you later during the further stages of the analyses.</span></p><span data-dcnode-id="226" instrument_node="">
</span><h3 data-dcnode-id="224"><span data-dcnode-id="225" instrument_node="">iii. Arrange your material for analysis</span></h3><span data-dcnode-id="223" instrument_node="">
</span><p data-dcnode-id="221"><span data-dcnode-id="222" instrument_node="">To analyze the actual text, it is preferable to arrange and prepare everything that allows you to work with ease. If you have a hard copy, then make copies of it and then start marking down essential features.</span></p><span data-dcnode-id="220" instrument_node="">
</span><p data-dcnode-id="218"><span data-dcnode-id="219" instrument_node="">You can also do it digitally by arranging a digital copy. You can then add references which others can use who will follow your work.</span></p><span data-dcnode-id="217" instrument_node="">
</span><h3 data-dcnode-id="215"><span data-dcnode-id="216" instrument_node="">iv. Coding the material you have</span></h3><span data-dcnode-id="214" instrument_node="">
</span><p data-dcnode-id="212"><span data-dcnode-id="213" instrument_node="">Coding is merely an academic version of online tagging process. When you have to code data, that means you are distributing attributes to particular units of analysis. It includes sentences, paragraphs or single words.</span></p><span data-dcnode-id="211" instrument_node="">
</span><p data-dcnode-id="209"><span data-dcnode-id="210" instrument_node="">To start coding, you first need to bring out your coding categories. The first step is to theoretically outline such types based on the kind of question in your mind. Because of this, you will be able to develop few themes in mind which you expect to find.</span></p><span data-dcnode-id="208" instrument_node="">
</span><p data-dcnode-id="206"><span data-dcnode-id="207" instrument_node="">An in-depth review of the secondary literature on your topic will outcast inspiration. Now, you need to write down the topics which will relate to these key themes.</span></p><span data-dcnode-id="205" instrument_node="">
</span><p data-dcnode-id="203"><span data-dcnode-id="204" instrument_node="">You might need to break the categories into sub-categories. There are various ways to code in which you can quickly highlight text sections in different colours or jot down specific parts, etc.</span></p><span data-dcnode-id="202" instrument_node="">
</span><h3 data-dcnode-id="200"><span data-dcnode-id="201" instrument_node="">v. Study the structure of the text</span></h3><span data-dcnode-id="199" instrument_node="">
</span><p data-dcnode-id="197"><span data-dcnode-id="198" instrument_node="">There are many questions which get raised when we talk about examining the structure of the text. Are there ways where different discourse strands overlap each other in the text? Are there sections which deal with one discourse? Can you identify that, how the argument is structured?</span></p><span data-dcnode-id="196" instrument_node="">
</span><p data-dcnode-id="194"><span data-dcnode-id="195" instrument_node="">You need to analyze all these things. Consider the headers and the other layout features. The most important thing is to check the overall role of the introduction and conclusion.</span></p><span data-dcnode-id="193" instrument_node="">
</span><h3 data-dcnode-id="191"><span data-dcnode-id="192" instrument_node="">vi. Gather and Examine digressive statements</span></h3><span data-dcnode-id="190" instrument_node="">
</span><p data-dcnode-id="188"><span data-dcnode-id="189" instrument_node="">Till now, you know all the features of your text. It’s time to work bigger and reach on the individual statements which are also called discourse fragments.</span></p><span data-dcnode-id="187" instrument_node="">
</span><p data-dcnode-id="185"><span data-dcnode-id="186" instrument_node="">The best way to do this is to collect all the statements with particular codes and then examine that, what they have to say. It will help you to find out what “Truths” the text is establishing on each major topic.</span></p><span data-dcnode-id="184" instrument_node="">
</span><h3 data-dcnode-id="182"><span data-dcnode-id="183" instrument_node="">vii. Find out the cultural references</span></h3><span data-dcnode-id="181" instrument_node="">
</span><p data-dcnode-id="179"><span data-dcnode-id="180" instrument_node="">Now you need to think about that, how the context responds to the argument. Find out, whether your material contains references to other sources? What meaning does the text assign to other sources? Answers to these questions will help you figure out the proper functioning of the intertextuality.</span></p><span data-dcnode-id="178" instrument_node="">
</span><h3 data-dcnode-id="176"><span data-dcnode-id="177" instrument_node="">viii. Identifying rhetorical and linguistic mechanisms</span></h3><span data-dcnode-id="175" instrument_node="">
</span><p data-dcnode-id="173"><span data-dcnode-id="174" instrument_node="">This step will take most of your time, but it’s satisfying too as you will come to know the detail working of discourse. You will need to find out that how various statements function at the language level.</span></p><span data-dcnode-id="172" instrument_node="">
</span><p data-dcnode-id="168"><span data-dcnode-id="171" instrument_node="">Following are some of the things you should look out for:</span><br data-dcnode-id="170"><span data-dcnode-id="169" instrument_node="">
Word groups, Rhetorical and literary figures, Grammar features, Modalities, Direct and indirect speech and Evidentiality.</span></p><span data-dcnode-id="167" instrument_node="">
</span><h3 data-dcnode-id="165"><span data-dcnode-id="166" instrument_node="">ix. Understanding and explaining the data</span></h3><span data-dcnode-id="164" instrument_node="">
</span><p data-dcnode-id="162"><span data-dcnode-id="163" instrument_node="">Now that you have collected all the elements of your analysis, the next step is to understand what it means. You need to tie all the results together and then explain them.</span></p><span data-dcnode-id="161" instrument_node="">
</span><p data-dcnode-id="159"><span data-dcnode-id="160" instrument_node="">It also means that you need to understand and then explain that what the discourse is about and how does it work? It requires your knowledge of individual statements and structural features. You need to place the findings into the broader context.</span></p><span data-dcnode-id="158" instrument_node="">
</span><p data-dcnode-id="156"><span data-dcnode-id="157" instrument_node="">You need to keep in mind the following questions: Who created your analysis material? What is their position according to the topic which you are examining? Most important is that, who is benefiting from the discourse that your source materials construct?</span></p><span data-dcnode-id="155" instrument_node="">
</span><h3 data-dcnode-id="153"><span data-dcnode-id="154" instrument_node="">x. Presentation</span></h3><span data-dcnode-id="152" instrument_node="">
</span><p data-dcnode-id="150"><span data-dcnode-id="151" instrument_node="">Now you have the answer to your initial question. It’s time to get your results in front of your target audience. If you have analyzed as per the steps, you now have many notes from which you can quickly build your thesis or presentation paper.</span></p><span data-dcnode-id="149" instrument_node="">
</span><p data-dcnode-id="147"><span data-dcnode-id="148" instrument_node="">You need to present a relevant data to your audience which is related to the raised issue. Try not to make it much theoretical and instead you can add examples to illustrate things. After doing all this, you are good to go.</span></p><span data-dcnode-id="146" instrument_node="">
</span><h2 data-dcnode-id="144"><span data-dcnode-id="145" instrument_node="">3) Approaches to Discourse Analysis</span></h2><span data-dcnode-id="143" instrument_node="">
</span><p data-dcnode-id="141"><img alt="approaches-discourse-analysis" class="aligncenter size-full wp-image-1149" data-dcnode-id="142" height="332" loading="lazy" sizes="(max-width: 623px) 100vw, 623px" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.allassignmenthelp.co.uk/blog/wp-content/uploads/2018/01/approaches-discourse-analysis.png&amp;raw" srcset="https://www.allassignmenthelp.co.uk/blog/wp-content/uploads/2018/01/approaches-discourse-analysis.png 623w, https://www.allassignmenthelp.co.uk/blog/wp-content/uploads/2018/01/approaches-discourse-analysis-300x160.png 300w" width="623"></p><span data-dcnode-id="140" instrument_node="">
</span><p data-dcnode-id="135"><span data-dcnode-id="139" instrument_node="">There are mainly three approaches to discourse analysis.</span><em data-dcnode-id="136"><strong data-dcnode-id="137"><span data-dcnode-id="138" instrument_node=""> Following are the main approaches with their descriptions:</span></strong></em></p><span data-dcnode-id="134" instrument_node="">
</span><h3 data-dcnode-id="132"><span data-dcnode-id="133" instrument_node="">Speech Act Theory</span></h3><span data-dcnode-id="131" instrument_node="">
</span><p data-dcnode-id="129"><span data-dcnode-id="130" instrument_node="">It focuses on communicative acts that are performed using speech. The speech act theory applies to discourse analysis. It helps you by providing a framework.</span></p><span data-dcnode-id="128" instrument_node="">
</span><p data-dcnode-id="126"><span data-dcnode-id="127" instrument_node="">With this, you can identify the conditions which are underlying the productions. You are also able to understand an utterance which is a kind of linguistically realized action.</span></p><span data-dcnode-id="125" instrument_node="">
</span><h3 data-dcnode-id="123"><span data-dcnode-id="124" instrument_node="">Ethnography of communication</span></h3><span data-dcnode-id="122" instrument_node="">
</span><p data-dcnode-id="120"><span data-dcnode-id="121" instrument_node="">It is an approach to discourse, based on anthropology and linguistics. This approach tries to study patterns of communicative practices. Such practices are a central part of what one does and knows as a member of a specific culture.</span></p><span data-dcnode-id="119" instrument_node="">
</span><h3 data-dcnode-id="117"><span data-dcnode-id="118" instrument_node="">Pragmatics</span></h3><span data-dcnode-id="116" instrument_node="">
</span><p data-dcnode-id="114"><span data-dcnode-id="115" instrument_node="">It is a study of the use of context to build inferences about meaning. It is another broad approach to discourse analysis. These days, pragmatics has a broader discussion range.</span></p><span data-dcnode-id="113" instrument_node="">
</span><h3 data-dcnode-id="111"><span data-dcnode-id="112" instrument_node="">Conclusion</span></h3><span data-dcnode-id="110" instrument_node="">
</span><p data-dcnode-id="108"><span data-dcnode-id="109" instrument_node="">So, guys, this article was about Discourse analysis. It is a study of how the language used in communication assume purpose, meaning, and unity for their users. I hope you liked this article and if you did, then do let me know through your comments below and do subscribe to my Blog to read such informative articles.</span></p><span data-dcnode-id="107" instrument_node="">
</span><p data-dcnode-id="104"><span data-dcnode-id="106" instrument_node="">Also, for any query regarding this article or for any online assignment help, you can email us on the id given on our website. We would love to help you. Thank you for reading. </span><img alt="🙂" class="emoji" data-dcnode-id="105" draggable="false" role="img" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//s.w.org/images/core/emoji/13.1.0/svg/1f642.svg&amp;raw"></p><span data-dcnode-id="103" instrument_node="">
