ment_node=""> </span><a class="category" data-dcnode-id="1721" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.fxcm.com/markets/insights/c/forex/" rel="category"><span data-dcnode-id="1722" instrument_node="">Forex</span></a><span data-dcnode-id="1720" instrument_node=""> </span></div><span data-dcnode-id="1718" instrument_node=""> </span><h1 data-dcnode-id="1716" itemprop="headline"><span data-dcnode-id="1717" instrument_node="">What Is Historical Data Analysis?</span></h1><span data-dcnode-id="1715" instrument_node=""> </span><div class="post-meta" data-dcnode-id="1708"><span data-dcnode-id="1714" instrument_node=""> </span><time class="txt-no-wrap" data-dcnode-id="1710" datetime="Fri, 27 Jan 2017 14:46:21 +0000" itemprop="datePublished" title="27 January 2017, 2:46 pm"><svg data-dcnode-id="1712" height="24" viewBox="0 0 24 24" width="24" xmlns="https://www.w3.org/2000/svg"><path d="M12 2c5.514 0 10 4.486 10 10s-4.486 10-10 10-10-4.486-10-10 4.486-10 10-10zm0-2c-6.627 0-12 5.373-12 12s5.373 12 12 12 12-5.373 12-12-5.373-12-12-12zm1 12v-6h-2v8h7v-2h-5z" data-dcnode-id="1713"></path></svg><span data-dcnode-id="1711" instrument_node=""> 27 January 2017, 2:46 pm</span></time><span data-dcnode-id="1709" instrument_node=""> </span></div><span data-dcnode-id="1707" instrument_node=""> </span><div class="tags-wrapper" data-dcnode-id="1699" itemprop="articleSection"><span data-dcnode-id="1706" instrument_node=""> </span><a class="tag" data-dcnode-id="1704" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.fxcm.com/markets/insights/t/advanced-trading/" rel="tag"><span data-dcnode-id="1705" instrument_node="">Advanced Trading</span></a><span data-dcnode-id="1703" instrument_node=""> </span><a class="tag" data-dcnode-id="1701" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.fxcm.com/markets/insights/t/forex-terms/" rel="tag"><span data-dcnode-id="1702" instrument_node="">Forex Terms</span></a><span data-dcnode-id="1700" instrument_node=""> </span></div><span data-dcnode-id="1698" instrument_node=""> </span></header><span data-dcnode-id="1696" instrument_node=""> </span><div class="widget" data-dcnode-id="1674" id="table-of-contents"><span data-dcnode-id="1695" instrument_node=""> </span><h4 data-dcnode-id="1693"><span data-dcnode-id="1694" instrument_node="">Article Contents </span></h4><span data-dcnode-id="1692" instrument_node=""> </span><ul data-dcnode-id="1676"><li data-dcnode-id="1689"><a class="smoothScroll invert" data-dcnode-id="1690" href="#financial-data-mining"><span data-dcnode-id="1691" instrument_node="">Financial Data Mining</span></a></li><li data-dcnode-id="1686"><a class="smoothScroll invert" data-dcnode-id="1687" href="#market-data-price"><span data-dcnode-id="1688" instrument_node="">Market Data: Price</span></a></li><li data-dcnode-id="1683"><a class="smoothScroll invert" data-dcnode-id="1684" href="#backtesting"><span data-dcnode-id="1685" instrument_node="">Backtesting</span></a></li><li data-dcnode-id="1680"><a class="smoothScroll invert" data-dcnode-id="1681" href="#challenges-and-pitfalls"><span data-dcnode-id="1682" instrument_node="">Challenges And Pitfalls</span></a></li><li data-dcnode-id="1677"><a class="smoothScroll invert" data-dcnode-id="1678" href="#summary"><span data-dcnode-id="1679" instrument_node="">Summary</span></a></li></ul><span data-dcnode-id="1675" instrument_node=""> </span></div><span data-dcnode-id="1673" instrument_node=""> </span><div class="body-content" data-dcnode-id="1401"><span data-dcnode-id="1672" instrument_node=""> </span><p data-dcnode-id="1666"><span data-dcnode-id="1671" instrument_node="">In the arena of active trading, market participants dedicate substantial time and effort to gaining insight into how a market's past behaviour relates to its future. The acquisition of timely market data and relevant news garners large capital allocations, with firms around the world spending nearly US$27 billion on market-related information annually.</span><a class="smoothScroll" data-dcnode-id="1668" href="#footnote-1" id="footnote-sup-1"><sup data-dcnode-id="1669"><span data-dcnode-id="1670" instrument_node="">[1]</span></sup></a><span data-dcnode-id="1667" instrument_node=""> No matter if one's approach to the marketplace is rooted in fundamental or technical analysis, profitability depends on the recognition of future opportunities and the elimination of past mistakes.</span></p><p data-dcnode-id="1664"><span data-dcnode-id="1665" instrument_node="">Historical data analysis is the study of market behaviour over a given period of time. The phrase "market behaviour" is used in reference to the many different facets of the market and their interactions. Recorded market-related data such as price, volatility and volume are able to be quantified and studied over a defined period.</span></p><p data-dcnode-id="1662"><span data-dcnode-id="1663" instrument_node="">Through detailed examination of a market's past behaviour, traders and investors can gain perspective on the inner workings of that market. The information obtained over the course of the process may prove useful in developing a viable trading plan or improving an existing methodology.</span></p><p data-dcnode-id="1660"><span data-dcnode-id="1661" instrument_node="">Historical data analysis pertaining to an individual security or market can be useful in several ways:</span></p><ul data-dcnode-id="1644"><li data-dcnode-id="1656"><strong data-dcnode-id="1658"><span data-dcnode-id="1659" instrument_node="">Market insight</span></strong><span data-dcnode-id="1657" instrument_node="">: Extensive study of the past behaviour of a financial instrument or market can provide the trader with an idea of which exhibited characteristics are normal and which are extraordinary.</span></li><li data-dcnode-id="1649"><strong data-dcnode-id="1654"><span data-dcnode-id="1655" instrument_node="">System development</span></strong><span data-dcnode-id="1653" instrument_node="">: A clear definition of when, what, and how to trade a given market are the starting points for the creation of a </span><a class="insight-system-trading fxcm-link" data-dcnode-id="1651" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.fxcm.com/markets/insights/system-trading/"><span data-dcnode-id="1652" instrument_node="">trading system</span></a><span data-dcnode-id="1650" instrument_node="">. Through historical data analysis, a statistical "edge" may be identified and developed for active trade.</span></li><li data-dcnode-id="1645"><strong data-dcnode-id="1647"><span data-dcnode-id="1648" instrument_node="">Consistency</span></strong><span data-dcnode-id="1646" instrument_node="">: The selection of trades with a predefined expectation can give the trader confidence in the potential outcome. Through understanding how a given trade has performed over time, unexpected results can be reduced.</span></li></ul><p data-dcnode-id="1643"></p><p data-dcnode-id="1641"><span data-dcnode-id="1642" instrument_node="">It has been said that those who do not understand history are doomed to repeat it. The discipline of historical data analysis aspires to not only avoid the mistakes of the past, but establish a working advantage moving into the future.</span></p><h2 data-dcnode-id="1639" id="financial-data-mining"><span data-dcnode-id="1640" instrument_node="">Financial Data Mining</span></h2><p data-dcnode-id="1638"></p><p data-dcnode-id="1636"><span data-dcnode-id="1637" instrument_node="">Data mining is the process of analysing large, and sometimes-unrelated, data sets for useful information. As technology has evolved, the ability to conduct a data mining operation has become readily accessible to anyone with computing power and a database. This ability to quickly sift through large amounts of information in an attempt to identify relationships and patterns hidden within the data is extremely valuable in the financial markets.</span></p><div class="shared-content type-cta forex-why-trade-with-fxcm" data-dcnode-id="1613" data-shared-content-alias="forex-why-trade-with-fxcm"><span data-dcnode-id="1635" instrument_node=""> </span><div class="cta-wrapper type-cta" data-dcnode-id="1614"><span data-dcnode-id="1634" instrument_node=""> </span><div class="content" data-dcnode-id="1623"><span data-dcnode-id="1633" instrument_node=""> </span><h3 class="title" data-dcnode-id="1631" id="why-trade-with-fxcm"><span data-dcnode-id="1632" instrument_node="">Why Trade with FXCM</span></h3><span data-dcnode-id="1630" instrument_node=""> </span><div class="subtext" data-dcnode-id="1625"><span data-dcnode-id="1629" instrument_node=""> </span><p data-dcnode-id="1627"><span data-dcnode-id="1628" instrument_node="">Commission free with fast, efficient execution.</span></p><span data-dcnode-id="1626" instrument_node=""> </span></div><span data-dcnode-id="1624" instrument_node=""> </span></div><span data-dcnode-id="1622" instrument_node=""> </span><div class="link" data-dcnode-id="1616"><span data-dcnode-id="1621" instrument_node=""> </span><p data-dcnode-id="1618"><a class="btn btn-primary" data-dcnode-id="1619" data-track-cta="what-is-historical-data-analysis|cta|forex-why-trade-with-fxcm" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.fxcm.com/markets/open-account/" target="_self"><span data-dcnode-id="1620" instrument_node="">Start Trading Today</span></a></p><span data-dcnode-id="1617" instrument_node=""> </span></div><span data-dcnode-id="1615" instrument_node=""> </span></div></div><p data-dcnode-id="1612"></p><p data-dcnode-id="1610"><span data-dcnode-id="1611" instrument_node="">Historical data analysis is essentially a data mining project that focuses on data sets related to the past behaviour of a specific market or financial instrument. Recorded market-related statistics such as price, volume, open interest and assorted volatility measures are a few types of market data that can provide cause and context for seemingly erratic market moves.</span></p><p data-dcnode-id="1608"><span data-dcnode-id="1609" instrument_node="">In order to conduct a data mining operation with focus upon a specific market or security, the following inputs are required:</span></p><ul data-dcnode-id="1592"><li data-dcnode-id="1604"><strong data-dcnode-id="1606"><span data-dcnode-id="1607" instrument_node="">Computing power</span></strong><span data-dcnode-id="1605" instrument_node="">: Access to a personal computer with an adequate processor, hard-drive space and RAM is required. For instance, use of trading platforms such as Metatrader4 and Trading Station require a minimum of a 300 MHz processor, 256MB of RAM and 60 MB of available hard-drive space. Hardware requirements vary depending upon the trading software package, but as a general rule, the more power the better.</span></li><li data-dcnode-id="1597"><strong data-dcnode-id="1602"><span data-dcnode-id="1603" instrument_node="">Data set</span></strong><span data-dcnode-id="1601" instrument_node="">: Selection of a specific time period, or quantity of data to be analysed, is a key element of a useful study. Many broker-provided software packages furnish </span><a class="page-market-data fxcm-link" data-dcnode-id="1599" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.fxcm.com/markets/algorithmic-trading/market-data/"><span data-dcnode-id="1600" instrument_node="">complimentary market data</span></a><span data-dcnode-id="1598" instrument_node=""> to the user, in addition the ability to purchase specialised data sets.</span></li><li data-dcnode-id="1593"><strong data-dcnode-id="1595"><span data-dcnode-id="1596" instrument_node="">Query</span></strong><span data-dcnode-id="1594" instrument_node="">: Basic questions, typically in the form of customised algorithms, are necessary to begin deciphering data.</span></li></ul><p data-dcnode-id="1591"></p><p data-dcnode-id="1589"><span data-dcnode-id="1590" instrument_node="">A study of historical data pertaining to a security or market may prove to have predictive value. Concealed patterns, relationships and tendencies within the data may be identified and capitalised upon by future trading activities.</span></p><h2 data-dcnode-id="1587" id="market-data-price"><span data-dcnode-id="1588" instrument_node="">Market Data: Price</span></h2><p data-dcnode-id="1586"></p><p data-dcnode-id="1584"><span data-dcnode-id="1585" instrument_node="">Market-relevant data comes in many different varieties. As mentioned earlier, volatility measures, volume and open interest are all examples of market data. However, the most referenced form of any market-related information is pricing data.</span></p><p data-dcnode-id="1578"><span data-dcnode-id="1583" instrument_node="">Pricing data, or simply price, is the exact value at which both the buyer and seller of a security agree to conduct an exchange. By law, pricing data must be factual and independently verifiable.</span><a class="smoothScroll" data-dcnode-id="1580" href="#footnote-2" id="footnote-sup-2"><sup data-dcnode-id="1581"><span data-dcnode-id="1582" instrument_node="">[2]</span></sup></a><span data-dcnode-id="1579" instrument_node=""> Because traders and investors are largely concerned with pricing fluctuations as they pertain to a specific market or security, historical pricing data is meticulously inspected for information useful in the prediction of future price variances.</span></p><p data-dcnode-id="1576"><span data-dcnode-id="1577" instrument_node="">There are two major classifications of pricing data:</span></p><ul data-dcnode-id="1567"><li data-dcnode-id="1572"><strong data-dcnode-id="1574"><span data-dcnode-id="1575" instrument_node="">End-of-day (EOD) data</span></strong><span data-dcnode-id="1573" instrument_node="">: This data is gathered and reported at the trading session's end. It is used by long-term investors, swing traders and true day traders to gain perspective on a trading session's action. EOD data can be grouped in terms of weeks, months and years.</span></li><li data-dcnode-id="1568"><strong data-dcnode-id="1570"><span data-dcnode-id="1571" instrument_node="">Intraday data</span></strong><span data-dcnode-id="1569" instrument_node="">: The traded prices of a security over the course of a trading session are known as intraday data. It focuses on the pricing fluctuations occurring within a single trading session. It may be obtained in real-time, or in historical context using time-based increments or tick-by-tick format (known as tick data). Typically, intraday data is more costly than EOD data, and its availability varies depending upon the instrument or market desired.</span></li></ul><p data-dcnode-id="1566"></p><p data-dcnode-id="1564"><span data-dcnode-id="1565" instrument_node="">For chart-based technical analysts and traders, pricing data is deciphered through the use of automated charting software applications. No matter which classification of pricing data one selects, the software program commissioned with deciphering the data will use predefined parameters to sort and compile the data set. Each desired parameter—delineated in terms of days, minutes, or number of ticks—will represent a unique period.</span></p><p data-dcnode-id="1562"><span data-dcnode-id="1563" instrument_node="">For each period, there are four key aspects of price that prove valuable in the analysis of historical data:</span></p><ul data-dcnode-id="1545"><li data-dcnode-id="1558"><strong data-dcnode-id="1560"><span data-dcnode-id="1561" instrument_node="">Open</span></strong><span data-dcnode-id="1559" instrument_node="">: The open is the first price traded at the beginning of a given period.</span></li><li data-dcnode-id="1554"><strong data-dcnode-id="1556"><span data-dcnode-id="1557" instrument_node="">Close</span></strong><span data-dcnode-id="1555" instrument_node="">: The close is the last price traded at the end of a given period.</span></li><li data-dcnode-id="1550"><strong data-dcnode-id="1552"><span data-dcnode-id="1553" instrument_node="">High</span></strong><span data-dcnode-id="1551" instrument_node="">: The high is the greatest price traded during a given period.</span></li><li data-dcnode-id="1546"><strong data-dcnode-id="1548"><span data-dcnode-id="1549" instrument_node="">Low</span></strong><span data-dcnode-id="1547" instrument_node="">: The low is the smallest price traded during a given period.</span></li></ul><p data-dcnode-id="1544"></p><p data-dcnode-id="1542"><span data-dcnode-id="1543" instrument_node="">The open, close, high and low price values often play an important role in chart construction and analysis, and serve as the basis for many trading strategies.</span></p><p data-dcnode-id="1540"><span data-dcnode-id="1541" instrument_node="">It is important to remember that any historical data study needs to have a defined time horizon. The trading approach itself has great bearing upon which time parameters are most relevant to the data analysis.</span></p><p data-dcnode-id="1532"><span data-dcnode-id="1539" instrument_node="">For instance, if one is looking to invest in blue-chip stocks for retirement, then a 20-year study of </span><a class="insight-sp-500 fxcm-link" data-dcnode-id="1537" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.fxcm.com/markets/insights/sp-500/"><span data-dcnode-id="1538" instrument_node="">S&amp;P 500</span></a><span data-dcnode-id="1536" instrument_node=""> daily closing prices based upon EOD data may be the most appropriate. Likewise, if one is involved in the </span><a class="insight-what-is-scalping fxcm-link" data-dcnode-id="1534" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.fxcm.com/markets/insights/what-is-scalping/"><span data-dcnode-id="1535" instrument_node="">scalping</span></a><span data-dcnode-id="1533" instrument_node=""> of currencies on the forex, study of a currency's intraday price action in increments of 5, 15, and 30 minutes, will prove much more useful than its weekly closing prices.</span></p><p data-dcnode-id="1530"><span data-dcnode-id="1531" instrument_node="">In the current electronic marketplace, the availability of historical market data has improved greatly. Trading service companies and brokerage firms offer different types of market data at varying costs to the trader. FXCM currently offers up to 10 years of complimentary historical data, in addition to premium data services compatible with Metatrader4, NinjaTrader and other platforms.</span></p><h2 data-dcnode-id="1528" id="backtesting"><span data-dcnode-id="1529" instrument_node="">Backtesting</span></h2><p data-dcnode-id="1527"></p><p data-dcnode-id="1522"><span data-dcnode-id="1526" instrument_node="">Perhaps the most commonly implemented form of historical data analysis is backtesting. Backtesting is the application of a trading method or strategy to a selected historical data set. </span><a class="insight-basics-of-automated-trading fxcm-link" data-dcnode-id="1524" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.fxcm.com/markets/insights/basics-of-automated-trading/"><span data-dcnode-id="1525" instrument_node="">Automated trading systems</span></a><span data-dcnode-id="1523" instrument_node="">, algorithmic trading and more traditional trading approaches often rely upon statistical data compiled through an extensive backtesting study.</span></p><p data-dcnode-id="1520"><span data-dcnode-id="1521" instrument_node="">In order to conduct a backtest, one must have a defined trading strategy and access to a relevant data set. After both are in place, the strategy is used as an overlayment upon the data, and a simulation of the strategy's performance is conducted. Backtesting studies can be simple or intricate, and largely depend upon the sophistication of the trading approach.</span></p><p data-dcnode-id="1518"><span data-dcnode-id="1519" instrument_node="">Upon completion of the testing, performance metrics can be applied to the results and used to determine the viability of the strategy. Several key statistics are quantified through a comprehensive backtesting study:</span></p><ul data-dcnode-id="1505"><li data-dcnode-id="1514"><strong data-dcnode-id="1516"><span data-dcnode-id="1517" instrument_node="">Number of opportunities</span></strong><span data-dcnode-id="1515" instrument_node="">: The extent and frequency of trade setups created by a strategy over a specified period of time is a crucial piece of information.</span></li><li data-dcnode-id="1510"><strong data-dcnode-id="1512"><span data-dcnode-id="1513" instrument_node="">Success rate</span></strong><span data-dcnode-id="1511" instrument_node="">: A strategy's win/loss percentage, or probability of success, can be useful in determining whether it is a suitable means of trade for a given product or market. It can also shed some light upon the optimal time and product to engage.</span></li><li data-dcnode-id="1506"><strong data-dcnode-id="1508"><span data-dcnode-id="1509" instrument_node="">Risk vs reward</span></strong><span data-dcnode-id="1507" instrument_node="">: A backtesting study can determine the necessary amount of capital needed to properly execute a trading approach upon a market or product. The diagnosis of a market's inherent volatility can be useful in identifying the degree of risk facing the trading strategy.</span></li></ul><p data-dcnode-id="1504"></p><p data-dcnode-id="1502"><span data-dcnode-id="1503" instrument_node="">In earlier days, backtesting was an arduous task performed manually with pencil and paper. Fortunately for modern-day traders, automation has streamlined the procedure, exponentially improving efficiency. Trading platforms provide software functionality capable of executing detailed strategy backtesting operations.</span></p><h2 data-dcnode-id="1500" id="challenges-and-pitfalls"><span data-dcnode-id="1501" instrument_node="">Challenges And Pitfalls</span></h2><p data-dcnode-id="1499"></p><p data-dcnode-id="1497"><span data-dcnode-id="1498" instrument_node="">Although historical data analysis is a powerful tool in both system development and strategic fine-tuning, there are also a few pitfalls of which to be aware:</span></p><ul data-dcnode-id="1477"><li data-dcnode-id="1493"><strong data-dcnode-id="1495"><span data-dcnode-id="1496" instrument_node="">Hindsight bias</span></strong><span data-dcnode-id="1494" instrument_node="">: Hindsight bias can be a major problem affecting the accuracy of a backtesting study. Also known as the "I knew it all along" bias, it is the tendency for individuals to assume that unpredictable events can be forecasted ahead of time. Hindsight bias is severely detrimental to historical data analysis because certain results may be perceived avoidable and disregarded. It actively compromises the objectivity of the study, thereby producing skewed results.</span></li><li data-dcnode-id="1489"><strong data-dcnode-id="1491"><span data-dcnode-id="1492" instrument_node="">Data omissions and errors</span></strong><span data-dcnode-id="1490" instrument_node="">: The physical accuracy of the historical data set is of paramount importance to the backtesting study. Even a relatively small number of data errors can impact a study's results greatly over time. This factor is especially important in the examination of intraday data. When considering small time frames or tick-by-tick intervals, precision in the recording of pricing data can be elusive. The quality of the historical data set is crucial to the accuracy of the backtest, and small mistakes can compromise the integrity of study results.</span></li><li data-dcnode-id="1485"><strong data-dcnode-id="1487"><span data-dcnode-id="1488" instrument_node="">Software performance</span></strong><span data-dcnode-id="1486" instrument_node="">: A software "glitch" can destroy the credibility of test results. Strategy testing software is the filter by which market data is sifted. If there is any discrepancy between the software's desired function and its actual function, the results of the backtest are inaccurate. It can be extremely difficult to spot software errors. Manual checks and automated diagnostics are both needed to ensure accuracy.</span></li><li data-dcnode-id="1478"><strong data-dcnode-id="1483"><span data-dcnode-id="1484" instrument_node="">Underestimation of randomness</span></strong><span data-dcnode-id="1482" instrument_node="">: Random chance plays an important role in the marketplace. A trading strategy may produce outstanding results during a backtest, yet struggle in live market conditions. Factors such as </span><a class="insight-what-is-slippage-and-why-does-it-happen fxcm-link" data-dcnode-id="1480" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.fxcm.com/markets/insights/what-is-slippage-and-why-does-it-happen/"><span data-dcnode-id="1481" instrument_node="">slippage</span></a><span data-dcnode-id="1479" instrument_node="">, enhanced volatility and periodic fundamental changes in market structure can be impossible to account for, serving to compromise the viability of a trading strategy.</span></li></ul><p data-dcnode-id="1476"></p><p data-dcnode-id="1474"><span data-dcnode-id="1475" instrument_node="">Human psychology and technological failure can affect the relevance of any backtest or study of market history. Inevitably, it serves the trader well to be aware of the old axiom: "past performance does not guarantee future results."</span></p><h2 data-dcnode-id="1472" id="summary"><span data-dcnode-id="1473" instrument_node="">Summary</span></h2><p data-dcnode-id="1471"></p><p data-dcnode-id="1469"><span data-dcnode-id="1470" instrument_node="">Historical data analysis is a common method of placing the sometimes "irrational" behaviour exhibited by markets into context. Through an extensive review of the past, traders and investors alike can eliminate many mistakes while preserving future opportunities.</span></p><p data-dcnode-id="1467"><span data-dcnode-id="1468" instrument_node="">However, it is important to be cognisant in regards to the quality, sources and reliability of the historical market data itself. Errors are sometimes unavoidable, but through the proper due diligence, exercises such as financial data mining and backtesting can provide invaluable information to the trader.</span></p><p data-dcnode-id="1465"><span data-dcnode-id="1466" instrument_node="">As with most aspects of trading, historical data analysis can contribute to a trader's long-term success when used in concert with other analytical tools and proper risk-management principles.</span></p><p data-dcnode-id="1463"><span data-dcnode-id="1464" instrument_node="">Any opinions, news, research, analyses, prices, other information, or links to third-party sites are provided as general market commentary and do not constitute investment advice. FXCM will not accept liability for any loss or damage including, without limitation, to any loss of profit which may arise directly or indirectly from use of or reliance on such information.</span></p><span data-dcnode-id="1462" instrument_node=""> </span><div class="share-this-post" data-dcnode-id="1453"><span data-dcnode-id="1461" instrument_node=""> </span><div class="social-sharing ss-social-sharing" data-dcnode-id="1455"><span data-dcnode-id="1460" instrument_node=""> </span><a class="ss-button-facebook" data-dcnode-id="1459" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.facebook.com/sharer/sharer.php%3Fu%3Dhttps%253A%252F%252Fwww.fxcm.com%252Fmarkets%252Finsights%252Fwhat-is-historical-data-analysis%252F" onclick="return ss_plugin_loadpopup_js(this);" rel="external nofollow" target="_blank"></a><a class="ss-button-twitter" data-dcnode-id="1458" href="https://chatno
