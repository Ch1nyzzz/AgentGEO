</span><h2 data-dcnode-id="744"><span class="ez-toc-section" data-dcnode-id="747" id="What_are_historical_reasoning_skills"></span><span data-dcnode-id="746" instrument_node="">What are historical reasoning skills?</span><span class="ez-toc-section-end" data-dcnode-id="745"></span></h2><span data-dcnode-id="743" instrument_node="">
</span><p data-dcnode-id="741"><span data-dcnode-id="742" instrument_node="">Historical thinking involves the ability to identify, analyze, and evaluate the relationships among multiple historical causes and effects, distinguishing between those that are long-term and proximate, and among coincidence, causation, and correlation.</span></p><span data-dcnode-id="740" instrument_node="">
</span><h2 data-dcnode-id="736"><span class="ez-toc-section" data-dcnode-id="739" id="What_do_historians_do_when_using_historical_thinking_skill_of_analyzing_historical_sources"></span><span data-dcnode-id="738" instrument_node="">What do historians do when using historical thinking skill of analyzing historical sources?</span><span class="ez-toc-section-end" data-dcnode-id="737"></span></h2><span data-dcnode-id="735" instrument_node="">
</span><p data-dcnode-id="733"><span data-dcnode-id="734" instrument_node="">Historians use the historical thinking skill of chronological thinking to determine which events could have influenced others later in history. So, in order to determine which events could have influenced others later in history, Historians use the historical thinking skill of chronological thinking.</span></p><span data-dcnode-id="732" instrument_node="">
</span><h2 data-dcnode-id="728"><span class="ez-toc-section" data-dcnode-id="731" id="How_can_historical_thinking_skills_and_processes_allow_you_to_build_a_persuasive_argument"></span><span data-dcnode-id="730" instrument_node="">How can historical thinking skills and processes allow you to build a persuasive argument?</span><span class="ez-toc-section-end" data-dcnode-id="729"></span></h2><span data-dcnode-id="727" instrument_node="">
</span><p data-dcnode-id="725"><span data-dcnode-id="726" instrument_node="">Historical thinking skills and processes allow you to build a persuasive argument because A plausible and persuasive argument requires a clear, comprehensive, and analytical thesis, supported by relevant historical evidence which you can get from historical thinking skills and processes.</span></p><span data-dcnode-id="724" instrument_node="">
</span><h2 data-dcnode-id="720"><span class="ez-toc-section" data-dcnode-id="723" id="What_are_the_6_historical_thinking_skills"></span><span data-dcnode-id="722" instrument_node="">What are the 6 historical thinking skills?</span><span class="ez-toc-section-end" data-dcnode-id="721"></span></h2><span data-dcnode-id="719" instrument_node="">
</span><p data-dcnode-id="717"><span data-dcnode-id="718" instrument_node="">1. Analyzing Evidence: Content and Sourcing 2. Interpretation 3. Comparison 4. Contextualization 5. Synthesis</span></p><span data-dcnode-id="716" instrument_node="">
</span><ul data-dcnode-id="690"><span data-dcnode-id="715" instrument_node="">
</span><li data-dcnode-id="713"><span data-dcnode-id="714" instrument_node="">Analyzing Evidence: Content and Sourcing.</span></li><span data-dcnode-id="712" instrument_node="">

</span><li data-dcnode-id="707"><span data-dcnode-id="708" instrument_node="">Comparison.</span></li><span data-dcnode-id="706" instrument_node="">
</span><li data-dcnode-id="704"><span data-dcnode-id="705" instrument_node="">Contextualization.</span></li><span data-dcnode-id="703" instrument_node="">

</span><h2 data-dcnode-id="685"><span class="ez-toc-section" data-dcnode-id="688" id="What_are_the_five_historical_skills"></span><span data-dcnode-id="687" instrument_node="">What are the five historical skills?</span><span class="ez-toc-section-end" data-dcnode-id="686"></span></h2><span data-dcnode-id="684" instrument_node="">
</span><p data-dcnode-id="682"><span data-dcnode-id="683" instrument_node="">Those critical historical thinking skills are:</span></p><span data-dcnode-id="681" instrument_node="">
</span><ul data-dcnode-id="664"><span data-dcnode-id="680" instrument_node="">
</span><li data-dcnode-id="678"><span data-dcnode-id="679" instrument_node="">Contextualization.</span></li><span data-dcnode-id="677" instrument_node="">
</span><li data-dcnode-id="675"><span data-dcnode-id="676" instrument_node="">Continuity and change over time.</span></li><span data-dcnode-id="674" instrument_node="">
</span><li data-dcnode-id="672"><span data-dcnode-id="673" instrument_node="">Causation.</span></li><span data-dcnode-id="671" instrument_node="">

</span><li data-dcnode-id="666"><span data-dcnode-id="667" instrument_node="">Argumentation.</span></li><span data-dcnode-id="665" instrument_node="">

</span><h2 data-dcnode-id="659"><span class="ez-toc-section" data-dcnode-id="662" id="What_are_the_5_aspects_of_historical_thinking"></span><span data-dcnode-id="661" instrument_node="">What are the 5 aspects of historical thinking?</span><span class="ez-toc-section-end" data-dcnode-id="660"></span></h2><span data-dcnode-id="658" instrument_node="">
</span><p data-dcnode-id="656"><span data-dcnode-id="657" instrument_node="">What are the 5 aspects of historical thinking?</span></p><span data-dcnode-id="655" instrument_node="">
</span><ul data-dcnode-id="638"><span data-dcnode-id="654" instrument_node="">
</span><li data-dcnode-id="652"><span data-dcnode-id="653" instrument_node="">Chronological Thinking.</span></li><span data-dcnode-id="651" instrument_node="">
</span><li data-dcnode-id="649"><span data-dcnode-id="650" instrument_node="">Historical Comprehension.</span></li><span data-dcnode-id="648" instrument_node="">

</span><li data-dcnode-id="643"><span data-dcnode-id="644" instrument_node="">Historical Research Capabilities.</span></li><span data-dcnode-id="642" instrument_node="">
</span><li data-dcnode-id="640"><span data-dcnode-id="641" instrument_node="">Historical Issues-Analysis and Decision-Making.</span></li><span data-dcnode-id="639" instrument_node="">

</span><h2 data-dcnode-id="633"><span class="ez-toc-section" data-dcnode-id="636" id="What_are_the_three_components_of_historical_thinking"></span><span data-dcnode-id="635" instrument_node="">What are the three components of historical thinking?</span><span class="ez-toc-section-end" data-dcnode-id="634"></span></h2><span data-dcnode-id="632" instrument_node="">
</span><p data-dcnode-id="630"><span data-dcnode-id="631" instrument_node="">Theoretical Background. Historical thinking is a complex metacognitive activity associated with processing various types of evidence from the past. As noted, the three heuristics include sourcing, corroboration, and contextualization (Wineburg 1991a).</span></p><span data-dcnode-id="629" instrument_node="">
</span><h2 data-dcnode-id="625"><span class="ez-toc-section" data-dcnode-id="628" id="What_are_the_four_historical_thinking_concepts"></span><span data-dcnode-id="627" instrument_node="">What are the four historical thinking concepts?</span><span class="ez-toc-section-end" data-dcnode-id="626"></span></h2><span data-dcnode-id="624" instrument_node="">
</span><p data-dcnode-id="622"><span data-dcnode-id="623" instrument_node="">The historical thinking framework promoted by The Historical Thinking Project revolves around six historical thinking concepts: historical significance, cause and consequence, historical perspective-taking, continuity and change, the use of primary source evidence, and the ethical dimension of history.</span></p><span data-dcnode-id="621" instrument_node="">
</span><h2 data-dcnode-id="617"><span class="ez-toc-section" data-dcnode-id="620" id="What_are_the_7_historical_concepts"></span><span data-dcnode-id="619" instrument_node="">What are the 7 historical concepts?</span><span class="ez-toc-section-end" data-dcnode-id="618"></span></h2><span data-dcnode-id="616" instrument_node="">
</span><p data-dcnode-id="614"><span data-dcnode-id="615" instrument_node="">The seven key concepts in History are: perspectives • continuity and change • cause and effect • evidence • empathy • significance • contestability. The concept of perspectives is an important part of historical inquiry.</span></p><span data-dcnode-id="613" instrument_node="">
</span><h2 data-dcnode-id="609"><span class="ez-toc-section" data-dcnode-id="612" id="What_are_key_historical_ideas"></span><span data-dcnode-id="611" instrument_node="">What are key historical ideas?</span><span class="ez-toc-section-end" data-dcnode-id="610"></span></h2><span data-dcnode-id="608" instrument_node="">
</span><p data-dcnode-id="606"><span data-dcnode-id="607" instrument_node="">The key historical ideas are: Significance. Continuity and change….</span></p><span data-dcnode-id="605" instrument_node="">
</span><ul data-dcnode-id="591"><span data-dcnode-id="604" instrument_node="">
</span><li data-dcnode-id="602"><span data-dcnode-id="603" instrument_node="">Significance. </span></li><span data-dcnode-id="601" instrument_node="">
</span><li data-dcnode-id="599"><span data-dcnode-id="600" instrument_node="">Continuity and change. </span></li><span data-dcnode-id="598" instrument_node="">
</span><li data-dcnode-id="596"><span data-dcnode-id="597" instrument_node="">Cause and effect. </span></li><span data-dcnode-id="595" instrument_node="">
</span><li data-dcnode-id="593"><span data-dcnode-id="594" instrument_node="">Perspectives.</span></li><span data-dcnode-id="592" instrument_node="">
</span></ul><span data-dcnode-id="590" instrument_node="">
</span><h2 data-dcnode-id="586"><span class="ez-toc-section" data-dcnode-id="589" id="What_are_key_concepts"></span><span data-dcnode-id="588" instrument_node="">What are key concepts?</span><span class="ez-toc-section-end" data-dcnode-id="587"></span></h2><span data-dcnode-id="585" instrument_node="">
</span><p data-dcnode-id="583"><span data-dcnode-id="584" instrument_node="">‘Key’ concepts are ones judged to be particularly important in a certain context. A similar term is ‘big’ concepts. This includes a sense of scale and range, as well as importance, within the subject. Often, the concepts chosen as ‘key’ are complex and abstract, such as ‘place’, ‘chronology’ or ‘grammar’.</span></p><span data-dcnode-id="582" instrument_node="">
</span><h2 data-dcnode-id="578"><span class="ez-toc-section" data-dcnode-id="581" id="What_is_the_primary_goal_of_history"></span><span data-dcnode-id="580" instrument_node="">What is the primary goal of history?</span><span class="ez-toc-section-end" data-dcnode-id="579"></span></h2><span data-dcnode-id="577" instrument_node="">
</span><p data-dcnode-id="575"><span data-dcnode-id="576" instrument_node="">While chronology and knowledge of the basic facts of history are necessary, the study of history involves sorting out those facts to create coherent systems of understanding the human experience. 2) Enhance writing and communication skills.</span></p><span data-dcnode-id="574" instrument_node="">
</span><h2 data-dcnode-id="570"><span class="ez-toc-section" data-dcnode-id="573" id="Why_do_we_study_history"></span><span data-dcnode-id="572" instrument_node="">Why do we study history?</span><span class="ez-toc-section-end" data-dcnode-id="571"></span></h2><span data-dcnode-id="569" instrument_node="">
</span><p data-dcnode-id="567"><span data-dcnode-id="568" instrument_node="">Studying history enables us to develop better understanding of the world in which we live. Building knowledge and understanding of historical events and trends, especially over the past century, enables us to develop a much greater appreciation for current events today.</span></p><span data-dcnode-id="566" instrument_node="">
</span><h2 data-dcnode-id="562"><span class="ez-toc-section" data-dcnode-id="565" id="What_are_the_learning_objectives_of_history"></span><span data-dcnode-id="564" instrument_node="">What are the learning objectives of history?</span><span class="ez-toc-section-end" data-dcnode-id="563"></span></h2><span data-dcnode-id="561" instrument_node="">
</span><p data-dcnode-id="559"><span data-dcnode-id="560" instrument_node="">Critical Thinking. Students will learn to apply historical methods to evaluate critically the record of the past and how historians and others have interpreted it. Research Skills. Students will acquire basic historical research skills, including (as appropriate) the effective use of libraries, archives, and databases.</span></p><span data-dcnode-id="558" instrument_node="">
</span><h2 data-dcnode-id="554"><span class="ez-toc-section" data-dcnode-id="557" id="What_are_the_two_types_of_history"></span><span data-dcnode-id="556" instrument_node="">What are the two types of history?</span><span class="ez-toc-section-end" data-dcnode-id="555"></span></h2><span data-dcnode-id="553" instrument_node="">
</span><p data-dcnode-id="551"><span data-dcnode-id="552" instrument_node="">What Are The Different Types Of History?</span></p><span data-dcnode-id="550" instrument_node="">

</span><li data-dcnode-id="547"><span data-dcnode-id="548" instrument_node="">Medieval History.</span></li><span data-dcnode-id="546" instrument_node="">
</span><li data-dcnode-id="544"><span data-dcnode-id="545" instrument_node="">Modern History.</span></li><span data-dcnode-id="543" instrument_node="">
</span><li data-dcnode-id="541"><span data-dcnode-id="542" instrument_node="">Art History.</span></li><span data-dcnode-id="540" instrument_node="">

</span><h2 data-dcnode-id="534"><span class="ez-toc-section" data-dcnode-id="537" id="What_are_3_types_of_history"></span><span data-dcnode-id="536" instrument_node="">What are 3 types of history?</span><span class="ez-toc-section-end" data-dcnode-id="535"></span></h2><span data-dcnode-id="533" instrument_node="">
</span><p data-dcnode-id="531"><span data-dcnode-id="532" instrument_node="">Materials used to study history can be classified into three types: primary, secondary and tertiary sources. Print sources, such as books or journals, are commonly used sources, but a source could also be recorded music or video, Internet sites or physical objects.</span></p><span data-dcnode-id="530" instrument_node="">
</span><h2 data-dcnode-id="526"><span class="ez-toc-section" data-dcnode-id="529" id="What_are_two_main_sources_of_history"></span><span data-dcnode-id="528" instrument_node="">What are two main sources of history?</span><span class="ez-toc-section-end" data-dcnode-id="527"></span></h2><span data-dcnode-id="525" instrument_node="">
</span><p data-dcnode-id="523"><span data-dcnode-id="524" instrument_node="">There are two main types of historical sources: primary sources and secondary sources. A primary source is something that originates from the past.</span></p><span data-dcnode-id="522" instrument_node="">
</span><h2 data-dcnode-id="518"><span class="ez-toc-section" data-dcnode-id="521" id="What_are_the_four_branches_of_history"></span><span data-dcnode-id="520" instrument_node="">What are the four branches of history?</span><span class="ez-toc-section-end" data-dcnode-id="519"></span></h2><span data-dcnode-id="517" instrument_node="">

</span><li data-dcnode-id="514"><span data-dcnode-id="515" instrument_node="">What is History? The discipline of history concerns itself with the study and analysis of events in the past. </span></li><span data-dcnode-id="513" instrument_node="">

</span><h2 data-dcnode-id="449"><span class="ez-toc-section" data-dcnode-id="452" id="Does_history_have_a_direction"></span><span data-dcnode-id="451" instrument_node="">Does history have a direction?</span><span class="ez-toc-section-end" data-dcnode-id="450"></span></h2><span data-dcnode-id="448" instrument_node="">
</span><p data-dcnode-id="446"><span data-dcnode-id="447" instrument_node="">Does human history have a clear direction or not? Dr Harari stated right at the beginning that the answer is very simply yes.</span></p><span data-dcnode-id="445" instrument_node="">
</span><h2 data-dcnode-id="441"><span class="ez-toc-section" data-dcnode-id="444" id="What_we_learn_from_history_is_that_we_learn_nothing_from_history"></span><span data-dcnode-id="443" instrument_node="">What we learn from history is that we learn nothing from history?</span><span class="ez-toc-section-end" data-dcnode-id="442"></span></h2><span data-dcnode-id="440" instrument_node="">
</span><p data-dcnode-id="438"><span data-dcnode-id="439" instrument_node="">“We learn from history that we do not learn from history.” “To be independent of public opinion is the first formal condition of achieving anything great.” “What experience and history teaches us is that people and governments have never learned anything from history, or acted on principles deduced from it.”</span></p><span data-dcnode-id="437" instrument_node="">
</span><h2 data-dcnode-id="433"><span class="ez-toc-section" data-dcnode-id="436" id="Is_history_dependent_on_past_knowledge"></span><span data-dcnode-id="435" instrument_node="">Is history dependent on past knowledge?</span><span class="ez-toc-section-end" data-dcnode-id="434"></span></h2><span data-dcnode-id="432" instrument_node="">
</span><p data-dcnode-id="430"><span data-dcnode-id="431" instrument_node="">History, its object of study and its methodology. The fact that history is by its very nature not present anymore, makes this area of knowledge quite unique. Historians cannot observe anything from the past in real time. This makes it much more difficult to claim something with certainty when we talk about the past.</span></p><span data-dcnode-id="429" instrument_node="">

</span><p data-dcnode-id="396"><span data-dcnode-id="397" instrument_node="">“History is an area of knowledge that studies the recorded past. It raises knowledge questions such as whether it is possible to talk meaningfully about a historical fact and what such a fact might be, or how far we can speak with certainty about anything in the past.</span></p><span data-dcnode-id="395" instrument_node="">
</span><h2 data-dcnode-id="391"><span class="ez-toc-section" data-dcnode-id="394" id="How_do_we_gain_knowledge_about_history"></span><span data-dcnode-id="393" instrument_node="">How do we gain knowledge about history?</span><span class="ez-toc-section-end" data-dcnode-id="392"></span></h2><span data-dcnode-id="390" instrument_node="">
</span><p data-dcnode-id="388"><span data-dcnode-id="389" instrument_node="">The Historians and their Sources The first way in which we gain knowledge of the past is through historical evidence (“sources”).</span></p><span data-dcnode-id="387" instrument_node="">
</span><h2 data-dcnode-id="383"><span class="ez-toc-section" data-dcnode-id="386" id="What_are_the_three_most_important_reasons_for_studying_history"></span><span data-dcnode-id="385" instrument_node="">What are the three most important reasons for studying history?</span><span class="ez-toc-section-end" data-dcnode-id="384"></span></h2><span data-dcnode-id="382" instrument_node="">
</span><p data-dcnode-id="380"><span data-dcnode-id="381" instrument_node="">Why It’s Important That We Study History</span></p><span data-dcnode-id="379" instrument_node="">
</span><ul data-dcnode-id="359"><span data-dcnode-id="378" instrument_node="">
</span><li data-dcnode-id="376"><span data-dcnode-id="377" instrument_node="">History helps us develop a better understanding of the world. </span></li><span data-dcnode-id="375" instrument_node="">
</span><li data-dcnode-id="373"><span data-dcnode-id="374" instrument_node="">History helps us understand ourselves. </span></li><span data-dcnode-id="372" instrument_node="">
</span><li data-dcnode-id="370"><span data-dcnode-id="371" instrument_node="">History helps us learn to understand other people. </span></li><span data-dcnode-id="369" instrument_node="">
</span><li data-dcnode-id="367"><span data-dcnode-id="368" instrument_node="">History teaches a working understanding of change. </span></li><span data-dcnode-id="366" instrument_node="">
</span><li data-dcnode-id="364"><span data-dcnode-id="365" instrument_node="">History gives us the tools we need to be decent citizens. </span></li><span data-dcnode-id="363" instrument_node="">
