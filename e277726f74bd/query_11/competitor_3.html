</span><div class="article__content" data-dcnode-id="2061" itemprop="text"><span data-dcnode-id="2327" instrument_node="">
</span><p data-dcnode-id="2325"><span data-dcnode-id="2326" instrument_node="">The credibility and accuracy of any historically account depends on the type of approach that the historians use in the course of their work. Historians must be conversant with available methodologies and approaches in order for them to handle evidence collection and interpretation in the best way possible (Green, 1999). Historical research and analysis is not an easy task as it seems due to the technicalities involved.</span></p><div class="bn bn--white bn--shadow-pulse bn--white-with-hover" data-dcnode-id="2276" id="cb-id10-default"><span data-dcnode-id="2324" instrument_node=""> </span><a class="bn__body" data-dcnode-id="2278" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//service.ivypanda.com/writing-help%3Fet%3Da1058o9p100%26referrer%3Dhttps%3A//ivypanda.com/essays/historical-methodologies/%26assignment%3Dessay%257CEssay%26level%3DCollege%26deadline%3Dd14%26numpages%3D1" rel="nofollow sponsored noopener" target="_blank" title="Learn More"><span data-dcnode-id="2323" instrument_node=""> </span><div data-dcnode-id="2294"><span data-dcnode-id="2322" instrument_node=""> </span><p class="bn__text" data-dcnode-id="2309"><span data-dcnode-id="2321" instrument_node=""> We will write a custom </span><b data-dcnode-id="2319"><span data-dcnode-id="2320" instrument_node="">Term Paper on Historical Methodologies</span></b><span data-dcnode-id="2318" instrument_node=""> specifically for you </span><br data-dcnode-id="2317"><span data-dcnode-id="2316" instrument_node="">for only </span><s data-dcnode-id="2314"><span data-dcnode-id="2315" instrument_node="">$16.05</span></s><span data-dcnode-id="2313" instrument_node=""> </span><b class="bn__text-focused" data-dcnode-id="2311"><span data-dcnode-id="2312" instrument_node="">$11/page</span></b><span data-dcnode-id="2310" instrument_node=""> </span></p><span data-dcnode-id="2308" instrument_node=""> </span><p class="bn__text mb-0" data-dcnode-id="2296"><span data-dcnode-id="2307" instrument_node=""> </span><span class="bn__writers-online" data-dcnode-id="2298"><span data-dcnode-id="2306" instrument_node=""> </span><span class="bn__writers-slider lazy-bg-image bn__writers-slider--lazy" data-bgloading="bn__writers-slider--lazy" data-dcnode-id="2305"></span><span data-dcnode-id="2304" instrument_node=""> </span><span data-dcnode-id="2300"><span class="bn__writers-count" data-dcnode-id="2302"><span data-dcnode-id="2303" instrument_node="">807</span></span><span data-dcnode-id="2301" instrument_node=""> certified writers online</span></span><span data-dcnode-id="2299" instrument_node=""> </span></span><span data-dcnode-id="2297" instrument_node=""> </span></p><span data-dcnode-id="2295" instrument_node=""> </span></div><span data-dcnode-id="2293" instrument_node=""> </span><div class="bn__btn" data-dcnode-id="2280"><span data-dcnode-id="2292" instrument_node=""> </span><div class="ivy-button ivy-button--orange-simple ivy-button--animate-arrow w-auto mb-0" data-dcnode-id="2282" title="Learn More"><span data-dcnode-id="2291" instrument_node=""> </span><span class="ivy-button__content" data-dcnode-id="2284"><span data-dcnode-id="2290" instrument_node=""> </span><span class="ivy-button__text text-capitalize" data-dcnode-id="2288"><span data-dcnode-id="2289" instrument_node="">Learn More</span></span><span data-dcnode-id="2287" instrument_node=""> </span><span class="ivy-button__icon ivy-button__icon--arrow-white" data-dcnode-id="2286"></span><span data-dcnode-id="2285" instrument_node=""> </span></span><span data-dcnode-id="2283" instrument_node=""> </span></div><span data-dcnode-id="2281" instrument_node=""> </span></div><span data-dcnode-id="2279" instrument_node=""> </span></a><span data-dcnode-id="2277" instrument_node=""> </span></div><span data-dcnode-id="2275" instrument_node=""> </span><p data-dcnode-id="2273"><span data-dcnode-id="2274" instrument_node="">Historical methodologies and approaches consist of concepts and techniques used by historians to explore and highlight different types of historical events (Green, 1999). Each historical approach tends to challenge previous approaches as it attempts to improve historical research and analysis. This paper will discuss different types of types of historical approaches used by historians and the contribution that each approach makes to the general field of historical studies.</span></p><span data-dcnode-id="2272" instrument_node=""> </span><p data-dcnode-id="2270"><span data-dcnode-id="2271" instrument_node="">Empiricism is a historical methodology that is based on the theory that human knowledge is gained through knowledge and experience. This approach refutes the argument that human beings possess some innate ideas that can not be imparted through experience (Green, 1999).</span></p><span data-dcnode-id="2269" instrument_node=""> </span><p data-dcnode-id="2267"><span data-dcnode-id="2268" instrument_node="">According to the empiricism approach, history can only be retrieved through sensory perception and scientific experiments. The empiricism historical approach emphasizes the fact that historians must test their theories and hypotheses through physical observation of events and other natural phenomena rather than mere intuition. The empiricism approach is widely used in philosophy and history when conducting a theoretical inquiry.</span></p><span data-dcnode-id="2266" instrument_node=""> </span><p data-dcnode-id="2264"><span data-dcnode-id="2265" instrument_node="">The hypotheses used in this approach must be testable using scientific methods. Empiricism completely opposes rationalism which emphasizes on intuition and reason as definite sources of knowledge. The use of human senses to perceive and conceive historical knowledge and other types of knowledge is what the empiricism approach focuses on (Green, 1999). The Empiricism approach was widely developed by Aristotle and is among the early historical approaches.</span></p><span data-dcnode-id="2263" instrument_node=""> </span><p data-dcnode-id="2261"><span data-dcnode-id="2262" instrument_node="">Historical materialism is a concept developed by Karl Marx and has become a very important methodological approach in the conception of history. This approach is used in the study of economic history and the general society.</span></p><span data-dcnode-id="2260" instrument_node=""> </span><p data-dcnode-id="2258"><span data-dcnode-id="2259" instrument_node="">The historical materialism approach emphasizes the fact that the economic activities that human beings engage in give rise to the non-economic features of the society (Howell, 2001). Political structures and social classes come as result of economic activity. The original argument of the materialism approach was that human beings have to produce the fundamental necessities of life to guarantee survival.</span></p><div class="bn bn--white bn--shadow-pulse bn--white-with-hover" data-dcnode-id="2228" id="cb-id2-group2"><span data-dcnode-id="2257" instrument_node=""> </span><a class="bn__body" data-dcnode-id="2230" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//service.ivypanda.com/writing-help%3Fet%3Da1058o9p97%26referrer%3Dhttps%3A//ivypanda.com/essays/historical-methodologies/%26assignment%3Dessay%257CEssay%26level%3DCollege%26deadline%3Dd14%26numpages%3D1" rel="nofollow sponsored noopener" target="_blank" title="Learn More"><span data-dcnode-id="2256" instrument_node=""> </span><div class="bn__text p m-0" data-dcnode-id="2246"><span data-dcnode-id="2255" instrument_node=""> Get your </span><b data-dcnode-id="2253"><span data-dcnode-id="2254" instrument_node="">100% original paper on any topic</span></b><span data-dcnode-id="2252" instrument_node=""> done </span><br data-dcnode-id="2251"><span data-dcnode-id="2250" instrument_node="">in as little as </span><b class="bn__text-focused" data-dcnode-id="2248"><span data-dcnode-id="2249" instrument_node="">3 hours</span></b><span data-dcnode-id="2247" instrument_node=""> </span></div><span data-dcnode-id="2245" instrument_node=""> </span><div class="bn__btn" data-dcnode-id="2232"><span data-dcnode-id="2244" instrument_node=""> </span><div class="ivy-button ivy-button--orange-simple ivy-button--animate-arrow w-auto mb-0" data-dcnode-id="2234" title="Learn More"><span data-dcnode-id="2243" instrument_node=""> </span><span class="ivy-button__content" data-dcnode-id="2236"><span data-dcnode-id="2242" instrument_node=""> </span><span class="ivy-button__text text-capitalize" data-dcnode-id="2240"><span data-dcnode-id="2241" instrument_node="">Learn More</span></span><span data-dcnode-id="2239" instrument_node=""> </span><span class="ivy-button__icon ivy-button__icon--arrow-white" data-dcnode-id="2238"></span><span data-dcnode-id="2237" instrument_node=""> </span></span><span data-dcnode-id="2235" instrument_node=""> </span></div><span data-dcnode-id="2233" instrument_node=""> </span></div><span data-dcnode-id="2231" instrument_node=""> </span></a><span data-dcnode-id="2229" instrument_node=""> </span></div><span data-dcnode-id="2227" instrument_node=""> </span><p data-dcnode-id="2225"><span data-dcnode-id="2226" instrument_node="">Despite this methodological approach being used to understand historical developments and the society in general, it also emphasizes on the importance of production relations in sustaining economic production. Division of labor is key to maintaining the production network where human beings perform different duties in the production of the various necessities of life (Howell, 2001).</span></p><span data-dcnode-id="2224" instrument_node=""> </span><p data-dcnode-id="2222"><span data-dcnode-id="2223" instrument_node="">The ability to use means of production such as human knowledge and raw materials characterize the success of the Marxist ideology. The materialism approach tries to highlight the modes of production that the society has employed over time. This approach sets to highlight the economic history of the society by examining the modes of production used in the society through time (Howell, 2001). In the course of interacting with nature, human beings are able to produce their material needs in different ways.</span></p><span data-dcnode-id="2221" instrument_node=""> </span><p data-dcnode-id="2219"><span data-dcnode-id="2220" instrument_node="">According to Marx, the productive forces in the society determine the mode of production to be adopted by that society. Some of the modes of production that Marx came up with include communism, feudalism and capitalism as they follow each other in chronological order (Green, 1999). Materialism is a methodological approach that helps historians to fully comprehend the basis of change that constantly takes place in the human society.</span></p><span data-dcnode-id="2218" instrument_node=""> </span><p data-dcnode-id="2216"><span data-dcnode-id="2217" instrument_node="">According to Marx, the human history is coherent in the manner that productive forces and modes of production are inherited from one generation to another as they continue to be improved and developed in tandem with technological advances and changing human needs. The struggle between different social classes for economic resources is what makes history (Green, 1999).</span></p><span data-dcnode-id="2215" instrument_node=""> </span><p data-dcnode-id="2213"><span data-dcnode-id="2214" instrument_node="">The materialism approach is against the idea of human history being perceived as a series of accidents. The materialism approach emphasizes the fact that the present can only be understood by studying the past. Past events and activities shape the present both socially and economically.</span></p><span data-dcnode-id="2212" instrument_node=""> </span><p data-dcnode-id="2210"><span data-dcnode-id="2211" instrument_node="">There are various observations through which history can be developed using the Marxist ideologies. To begin with, the social development of a society is entirely dependent on the amount of productive forces that the society has (Green, 1999). Social relationships within the society stem from production relations which human beings have no choice but to get involved.</span></p><span data-dcnode-id="2209" instrument_node=""> </span><p data-dcnode-id="2207"><span data-dcnode-id="2208" instrument_node="">Productive forces determine whether production relationships develop or not. The mode of production plays a critical role in determining the rate at which the production forces develop. According to Marxist beliefs, the society is founded on its relations of production and modes of production. Economic exploitation in the society is brought about by a particular social class that uses the state as an instrument of forming and protecting their production relations (Green, 1999).</span></p><div class="bn bn--white bn--shadow-pulse bn--white-with-hover" data-dcnode-id="2177" id="cb-id11-default"><span data-dcnode-id="2206" instrument_node=""> </span><a class="bn__body" data-dcnode-id="2179" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//service.ivypanda.com/writing-help%3Fet%3Da1058o9p101%26referrer%3Dhttps%3A//ivypanda.com/essays/historical-methodologies/%26assignment%3Dessay%257CEssay%26level%3DCollege%26deadline%3Dd14%26numpages%3D1" rel="nofollow sponsored noopener" target="_blank" title="Learn More"><span data-dcnode-id="2205" instrument_node=""> </span><div class="bn__text p m-0" data-dcnode-id="2195"><span data-dcnode-id="2204" instrument_node=""> We will write a custom </span><b data-dcnode-id="2202"><span data-dcnode-id="2203" instrument_node="">Term Paper on Historical Methodologies</span></b><span data-dcnode-id="2201" instrument_node=""> specifically for you! </span><br data-dcnode-id="2200"><span data-dcnode-id="2199" instrument_node="">Get your first paper with </span><b class="bn__text-focused" data-dcnode-id="2197"><span data-dcnode-id="2198" instrument_node="">15% OFF</span></b><span data-dcnode-id="2196" instrument_node=""> </span></div><span data-dcnode-id="2194" instrument_node=""> </span><div class="bn__btn" data-dcnode-id="2181"><span data-dcnode-id="2193" instrument_node=""> </span><div class="ivy-button ivy-button--orange-simple ivy-button--animate-arrow w-auto mb-0" data-dcnode-id="2183" title="Learn More"><span data-dcnode-id="2192" instrument_node=""> </span><span class="ivy-button__content" data-dcnode-id="2185"><span data-dcnode-id="2191" instrument_node=""> </span><span class="ivy-button__text text-capitalize" data-dcnode-id="2189"><span data-dcnode-id="2190" instrument_node="">Learn More</span></span><span data-dcnode-id="2188" instrument_node=""> </span><span class="ivy-button__icon ivy-button__icon--arrow-white" data-dcnode-id="2187"></span><span data-dcnode-id="2186" instrument_node=""> </span></span><span data-dcnode-id="2184" instrument_node=""> </span></div><span data-dcnode-id="2182" instrument_node=""> </span></div><span data-dcnode-id="2180" instrument_node=""> </span></a><span data-dcnode-id="2178" instrument_node=""> </span></div><span data-dcnode-id="2176" instrument_node=""> </span><p data-dcnode-id="2174"><span data-dcnode-id="2175" instrument_node="">The materialism approach also disputes the fact that the historical process is predetermined. Social classes within the society struggle and in the process form the actual historical process. The society goes through various stages of economic transformation as a natural way of sustaining itself.</span></p><span data-dcnode-id="2173" instrument_node=""> </span><p data-dcnode-id="2171"><span data-dcnode-id="2172" instrument_node="">The social science approach is one of the major methodologies used by sociology historians in an attempt to try and understand the sociological history of a particular society. Social science uses scientific method to analyze and understand the past social life. The field of social science is very wide and handles a lot of disciplines including historical research and analysis of social history (Howell, 2001).</span></p><span data-dcnode-id="2170" instrument_node=""> </span><p data-dcnode-id="2168"><span data-dcnode-id="2169" instrument_node="">This approach does not deal with natural sciences but it employs the same methods used in studying natural science to explain and analyze the social life of a particular society. The social science approach uses both quantitative and qualitative techniques to interpret and come up with a definite historical account of the social life in a particular society. According to this approach, history can just be studied the same way mathematics and other natural sciences are studied.</span></p><span data-dcnode-id="2167" instrument_node=""> </span><p data-dcnode-id="2165"><span data-dcnode-id="2166" instrument_node="">The social science approach was largely influenced by the industrial revolution that emphasized moral philosophy (Howell, 2001). This methodology employs the use of data and theory depending on what discipline the historian intents to study. Empirical observations and logic are the major components of the social science historical methodology. This approach differs with the materialism theory in the sense that the evidence collected is thoroughly studied using scientific methods.</span></p><span data-dcnode-id="2164" instrument_node=""> </span><p data-dcnode-id="2162"><span data-dcnode-id="2163" instrument_node="">The social actions of a particular society are studied using statistical techniques such as open-ended interviews and questionnaires that are administered to a sample population. This approach is very comprehensive compared to the previous methodologies in the sense that it explains and describes historical findings rather than just predicting (Howell, 2001). The social science approach tests all hypotheses to establish the truth in them. All the possible explanations of a particular social action are provided by this approach.</span></p><span data-dcnode-id="2161" instrument_node=""> </span><p data-dcnode-id="2159"><span data-dcnode-id="2160" instrument_node="">The study of social and cultural issues of the society has led to the development of new methodologies and approaches in order to increase the chances of coming up with more accurate results (Tosh, 2000). Social history has been replaced by cultural history due to the fact that the culture of the society preserves all the aspects of a particular society. Anthropology is a social science discipline that tends to explain the cultural orientation of different societies.</span></p><span data-dcnode-id="2158" instrument_node=""> </span><p data-dcnode-id="2156"><span data-dcnode-id="2157" instrument_node="">The study of social and cultural histories of a particular community is very vital in the sense that it helps give a particular sense of identity to the community. Anthropology uses scientific and statistical methods to explain how the society is set up socially and culturally.</span></p><span data-dcnode-id="2155" instrument_node=""> </span><p data-dcnode-id="2153"><span data-dcnode-id="2154" instrument_node="">This new approach aims at describing the society in detail since the social science approach only deals with social life. This new approach bases it explanations on real facts rather than predictions and imagination. Social trends in the society are what forms social history which is established by using scientific methods.</span></p><div class="bn bn--white bn--shadow-pulse bn--white-with-hover" data-dcnode-id="2120" id="cb-id4-group2"><span data-dcnode-id="2152" instrument_node=""> </span><a class="bn__body" data-dcnode-id="2122" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//service.ivypanda.com/writing-help%3Fet%3Da1058o9p95%26referrer%3Dhttps%3A//ivypanda.com/essays/historical-methodologies/%26assignment%3Dessay%257CEssay%26level%3DCollege%26deadline%3Dd14%26numpages%3D1" rel="nofollow sponsored noopener" target="_blank" title="Learn More"><span data-dcnode-id="2151" instrument_node=""> </span><div class="bn__text p m-0" data-dcnode-id="2138"><span data-dcnode-id="2150" instrument_node=""> Not sure if you can write </span><b data-dcnode-id="2148"><span data-dcnode-id="2149" instrument_node="">a paper on Historical Methodologies</span></b><span data-dcnode-id="2147" instrument_node=""> by yourself? We can help you </span><br data-dcnode-id="2146"><span data-dcnode-id="2145" instrument_node="">for only </span><s data-dcnode-id="2143"><span data-dcnode-id="2144" instrument_node="">$16.05</span></s><span data-dcnode-id="2142" instrument_node=""> </span><b class="bn__text-focused" data-dcnode-id="2140"><span data-dcnode-id="2141" instrument_node="">$11/page</span></b><span data-dcnode-id="2139" instrument_node=""> </span></div><span data-dcnode-id="2137" instrument_node=""> </span><div class="bn__btn" data-dcnode-id="2124"><span data-dcnode-id="2136" instrument_node=""> </span><div class="ivy-button ivy-button--orange-simple ivy-button--animate-arrow w-auto mb-0" data-dcnode-id="2126" title="Learn More"><span data-dcnode-id="2135" instrument_node=""> </span><span class="ivy-button__content" data-dcnode-id="2128"><span data-dcnode-id="2134" instrument_node=""> </span><span class="ivy-button__text text-capitalize" data-dcnode-id="2132"><span data-dcnode-id="2133" instrument_node="">Learn More</span></span><span data-dcnode-id="2131" instrument_node=""> </span><span class="ivy-button__icon ivy-button__icon--arrow-white" data-dcnode-id="2130"></span><span data-dcnode-id="2129" instrument_node=""> </span></span><span data-dcnode-id="2127" instrument_node=""> </span></div><span data-dcnode-id="2125" instrument_node=""> </span></div><span data-dcnode-id="2123" instrument_node=""> </span></a><span data-dcnode-id="2121" instrument_node=""> </span></div><span data-dcnode-id="2119" instrument_node=""> </span><p data-dcnode-id="2117"><span data-dcnode-id="2118" instrument_node="">Social history explores how ordinary people within a society live (Tosh, 2000). Both political and intellectual histories are justified by the findings in the social field. The new social history approach explores the social history of a society in detail including labor history, family history, ethnic history, educational history together with demographic history. The new social approach is extended by the cultural approach that was established recently.</span></p><span data-dcnode-id="2116" instrument_node=""> </span><p data-dcnode-id="2114"><span data-dcnode-id="2115" instrument_node="">The new cultural approach focuses more on cultural traditional customs, arts, languages and cultural interpretation of historical experiences (Tosh, 2000). The new cultural approach challenges the materialism approach which only highlights economic changes as a source of history. The cultural approach takes a lot of time because of the many cultural elements explored during research and analysis.</span></p><span data-dcnode-id="2113" instrument_node=""> </span><p data-dcnode-id="2111"><span data-dcnode-id="2112" instrument_node="">Gender history is another type of historical approach that specifically explores the past from the gender perspective. This method tends to focus on the history of women and their changing roles in the society (Tosh, 2000).</span></p><span data-dcnode-id="2110" instrument_node=""> </span><p data-dcnode-id="2108"><span data-dcnode-id="2109" instrument_node="">This type of historical approach has only been in place for a very short time but the impact it has made to the general field of history can not be underestimated. The gender approach faced a lot of challenges in its initial stages as many people were reluctant to accept women history as a historical discipline. This made the proponents of this approach to change its name from women history to gender history.</span></p><span data-dcnode-id="2107" instrument_node=""> </span><p data-dcnode-id="2105"><span data-dcnode-id="2106" instrument_node="">This approach has gained a lot of support because many women are now getting interested in the historical profession. Women historians have been accused of being biased as they tend to highlight feminine issues rather than the general gender issues (Howell, 2001). The gender approach is categorized under supplementary history because women were conspicuously missing in the majority of previous historical recordings.</span></p><span data-dcnode-id="2104" instrument_node=""> </span><p data-dcnode-id="2102"><span data-dcnode-id="2103" instrument_node="">This approach focuses on highlighting and position and role of women in history. Women play a very important role in the history of any community and the fact other historical methodologies do not highlight their contribution; the supporters of the gender approach have always challenged the credibility of previous historical approaches (Howell, 2001).</span></p><span data-dcnode-id="2101" instrument_node=""> </span><p data-dcnode-id="2099"><span data-dcnode-id="2100" instrument_node="">The post modern historical approach includes both post-structural and post-colonial histories. The postmodern historical approach completely challenges all other traditional approaches by stating that there is a very thin line between facts and fiction. Postmodernists perceive all historical accounts as fiction. The postmodern approach encourages historians to use history as a way of promoting an ideology (Tosh, 2000).</span></p><span data-dcnode-id="2098" instrument_node=""> </span><p data-dcnode-id="2096"><span data-dcnode-id="2097" instrument_node="">This methodology focuses on revising recorded history with an aim protecting social minorities from oppression. Postmodern history plays a major role in exposing past injustices with an aim of correcting them. The post-modern approach is always criticized for being radical and generalizing all historical events as fiction. Some of the injustices exposed by postmodern history include slavery, colonialism and other forms of oppression.</span></p><span data-dcnode-id="2095" instrument_node=""> </span><p data-dcnode-id="2093"><span data-dcnode-id="2094" instrument_node="">The postmodern approach retells histories so that the oppressed groups in the society are empowered (Tosh, 2000). According to postmodernists, there is no way that the society can correct past mistakes if in the first place the people are not aware of the mistakes that were committed in the past. Postmodern historians argue that it is inevitable to avoid bias in history (Tosh, 2000).</span></p><span data-dcnode-id="2092" instrument_node=""> </span><p data-dcnode-id="2090"><span data-dcnode-id="2091" instrument_node="">In conclusion, historical methodologies help historians a great deal in exploring the past. New historical approaches have been developed in order too explore the past in detail. The discovery of many historical disciplines has contributed to the changes experienced in historical approaches.</span></p><span data-dcnode-id="2089" instrument_node=""> </span><p data-dcnode-id="2087"><span data-dcnode-id="2088" instrument_node="">Each historical approach has got its theories and ideologies which gives historians the freedom to choose an approach that is relevant to their areas of specialization. Historical methodologies have completely change the way historical studies are conducted and as a result enabling the society to understand its past and at the same time use the historical knowledge to shape the present and the future.</span></p><span data-dcnode-id="2086" instrument_node=""> </span><h2 data-dcnode-id="2084"><span data-dcnode-id="2085" instrument_node="">References</span></h2><span data-dcnode-id="2083" instrument_node=""> </span><p data-dcnode-id="2078"><span data-dcnode-id="2082" instrument_node="">Green, A. (1999). </span><em data-dcnode-id="2080"><span data-dcnode-id="2081" instrument_node="">The houses of history: a critical reader in the twentieth century history and theory</span></em><span data-dcnode-id="2079" instrument_node="">. Manchester: Manchester University Press.</span></p><span data-dcnode-id="2077" instrument_node=""> </span><p data-dcnode-id="2072"><span data-dcnode-id="2076" instrument_node="">Howell, M. (2001). </span><em data-dcnode-id="2074"><span data-dcnode-id="2075" instrument_node="">From reliable sources: an introduction to historical methods</span></em><span data-dcnode-id="2073" instrument_node="">. New York, NY: Cornell University Press.</span></p><span data-dcnode-id="2071" instrument_node=""> </span><p data-dcnode-id="2063"><span data-dcnode-id="2070" instrument_node="">Tosh, J. (2000). </span><em data-dcnode-id="2068"><span data-dcnode-id="2069" instrument_node="">The pursuit of history: aims, methods and new directions in the study of modern history</span></em><span data-dcnode-id="2067" instrument_node=""> (5</span><sup data-dcnode-id="2065"><span data-dcnode-id="2066" instrument_node="">th</span></sup><span data-dcnode-id="2064" instrument_node=""> ed.). London: Longman.</span></p><span data-dcnode-id="2062" instrument_node=""> </span></div><span data-dcnode-id="2060" instrument_node="">
