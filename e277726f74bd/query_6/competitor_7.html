</span></div><span class="marker before-article" data-dcnode-id="8931"></span><div class="md-sentinel--spy-target" data-dcnode-id="8930"></div><section data-dcnode-id="8895" data-has-spy="true" data-level="1" id="ref1"><p class="topic-paragraph" data-dcnode-id="8902"><strong data-dcnode-id="8927"><span data-dcnode-id="8929" id="ref73250"></span><span data-dcnode-id="8928" instrument_node="">Pulitzer Prize</span></strong><span data-dcnode-id="8926" instrument_node="">,  any of a series of annual prizes awarded by </span><a class="md-crosslink" data-dcnode-id="8924" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.britannica.com/topic/Columbia-University"><span data-dcnode-id="8925" instrument_node="">Columbia University</span></a><span data-dcnode-id="8923" instrument_node="">, </span><a class="md-crosslink autoxref" data-dcnode-id="8921" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.britannica.com/place/New-York-City"><span data-dcnode-id="8922" instrument_node="">New York City</span></a><span data-dcnode-id="8920" instrument_node="">, for outstanding public service and achievement in American </span><span data-dcnode-id="8919" id="ref73251"></span><a class="md-crosslink" data-dcnode-id="8917" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.britannica.com/topic/journalism"><span data-dcnode-id="8918" instrument_node="">journalism</span></a><span data-dcnode-id="8916" instrument_node="">, letters, and </span><a class="md-crosslink autoxref" data-dcnode-id="8914" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.britannica.com/art/music"><span data-dcnode-id="8915" instrument_node="">music</span></a><span data-dcnode-id="8913" instrument_node="">. Fellowships are also awarded. The prizes, originally </span><a class="md-dictionary-link md-dictionary-tt-off eb" data-dcnode-id="8911" data-term="endowed" data-type="EB" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.britannica.com/dictionary/endowed"><span data-dcnode-id="8912" instrument_node="">endowed</span></a><span data-dcnode-id="8910" instrument_node=""> with a gift of $500,000 from the </span><a class="md-crosslink autoxref" data-dcnode-id="8908" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.britannica.com/topic/newspaper"><span data-dcnode-id="8909" instrument_node="">newspaper</span></a><span data-dcnode-id="8907" instrument_node=""> magnate </span><span data-dcnode-id="8906" id="ref73252"></span><a class="md-crosslink" data-dcnode-id="8904" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.britannica.com/biography/Joseph-Pulitzer"><span data-dcnode-id="8905" instrument_node="">Joseph Pulitzer</span></a><span data-dcnode-id="8903" instrument_node="">, are highly esteemed and have been awarded each May since 1917. The awards are made by Columbia University on the recommendation of the Pulitzer Prize Board, composed of judges appointed by the university. The prizes have varied in number and category over the years but currently number 14 prizes in the field of journalism, 6 prizes in letters, and 1 prize in music.</span></p><span class="marker p1" data-dcnode-id="8900"></span><span class="marker AM1 am-inline" data-dcnode-id="8898"></span><span class="marker MOD1 mod-inline" data-dcnode-id="8896"></span></section><span data-dcnode-id="8894" instrument_node="">
