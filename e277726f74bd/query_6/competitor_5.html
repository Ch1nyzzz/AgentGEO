</span><p data-dcnode-id="8362"><span data-dcnode-id="8383" instrument_node="">The </span><b data-dcnode-id="8381"><span data-dcnode-id="8382" instrument_node="">Pulitzer Prize for Fiction</span></b><span data-dcnode-id="8380" instrument_node=""> is one of the seven American </span><a data-dcnode-id="8378" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Pulitzer_Prize" title="Pulitzer Prize"><span data-dcnode-id="8379" instrument_node="">Pulitzer Prizes</span></a><span data-dcnode-id="8377" instrument_node=""> that are annually awarded for Letters, Drama, and Music. It recognizes distinguished fiction by an American author, preferably dealing with American life, published during the preceding calendar year. As the </span><b data-dcnode-id="8375"><span data-dcnode-id="8376" instrument_node="">Pulitzer Prize for the Novel,</span></b><span data-dcnode-id="8374" instrument_node=""> it was one of the original Pulitzers; the program was </span><a data-dcnode-id="8372" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Inauguration" title="Inauguration"><span data-dcnode-id="8373" instrument_node="">inaugurated</span></a><span data-dcnode-id="8371" instrument_node=""> in 1917 with seven prizes, four of which were awarded that year.</span><sup class="reference" data-dcnode-id="8368" id="cite_ref-1"><a data-dcnode-id="8369" href="#cite_note-1"><span data-dcnode-id="8370" instrument_node="">[1]</span></a></sup><span data-dcnode-id="8367" instrument_node=""> (No Novel prize was awarded in 1917; the first was awarded in 1918.)</span><sup class="reference" data-dcnode-id="8364" id="cite_ref-prize_2-0"><a data-dcnode-id="8365" href="#cite_note-prize-2"><span data-dcnode-id="8366" instrument_node="">[2]</span></a></sup><span data-dcnode-id="8363" instrument_node="">
</span></p><p data-dcnode-id="8356"><span data-dcnode-id="8361" instrument_node="">Finalists have been announced since 1980, usually a total of three.</span><sup class="reference" data-dcnode-id="8358" id="cite_ref-prize_2-1"><a data-dcnode-id="8359" href="#cite_note-prize-2"><span data-dcnode-id="8360" instrument_node="">[2]</span></a></sup><span data-dcnode-id="8357" instrument_node="">
</span></p><span data-dcnode-id="8355" instrument_node="">

</span><h2 data-dcnode-id="8265"><span class="mw-headline" data-dcnode-id="8273" id="Definition"><span data-dcnode-id="8274" instrument_node="">Definition</span></span><span class="mw-editsection" data-dcnode-id="8266"><span class="mw-editsection-bracket" data-dcnode-id="8271"><span data-dcnode-id="8272" instrument_node="">[</span></span><a data-dcnode-id="8269" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/w/index.php%3Ftitle%3DPulitzer_Prize_for_Fiction%26action%3Dedit%26section%3D1" title="Edit section: Definition"><span data-dcnode-id="8270" instrument_node="">edit</span></a><span class="mw-editsection-bracket" data-dcnode-id="8267"><span data-dcnode-id="8268" instrument_node="">]</span></span></span></h2><span data-dcnode-id="8264" instrument_node="">
</span><p data-dcnode-id="8246"><span data-dcnode-id="8263" instrument_node="">As defined in the original Plan of Award, the prize was given "Annually, for the American novel published during the year which shall best present the wholesome atmosphere of American life, and the highest standard of American manners and manhood," although there was some struggle over whether the word </span><i data-dcnode-id="8261"><span data-dcnode-id="8262" instrument_node="">wholesome</span></i><span data-dcnode-id="8260" instrument_node=""> should be used instead of </span><i data-dcnode-id="8258"><span data-dcnode-id="8259" instrument_node="">whole</span></i><span data-dcnode-id="8257" instrument_node="">, the word Pulitzer had written in his will.</span><sup class="reference" data-dcnode-id="8254" id="cite_ref-Chronicle_of_the_Pulitzer_Prizes_3-0"><a data-dcnode-id="8255" href="#cite_note-Chronicle_of_the_Pulitzer_Prizes-3"><span data-dcnode-id="8256" instrument_node="">[3]</span></a></sup><span data-dcnode-id="8253" instrument_node=""> In 1927, the advisory board quietly instituted Pulitzer's word choice, replacing </span><i data-dcnode-id="8251"><span data-dcnode-id="8252" instrument_node="">wholesome</span></i><span data-dcnode-id="8250" instrument_node=""> with </span><i data-dcnode-id="8248"><span data-dcnode-id="8249" instrument_node="">whole</span></i><span data-dcnode-id="8247" instrument_node="">.
</span></p><p data-dcnode-id="8237"><span data-dcnode-id="8245" instrument_node="">With 1929 came the first of several much more substantive changes. The board changed the wording to "preferably one which shall best present the whole atmosphere of American life" and deleted the insistence that the novel portray "the highest standard of American manners and manhood". In 1936, emphasis was changed again, with the award going to "a distinguished novel published during the year by an American author, preferably dealing with American life". In 1948, the advisory board widened the scope of the award with the wording "For distinguished fiction published in book form during the year by an American author, preferably dealing with American life."</span><sup class="reference" data-dcnode-id="8242" id="cite_ref-Chronicle_of_the_Pulitzer_Prizes_3-1"><a data-dcnode-id="8243" href="#cite_note-Chronicle_of_the_Pulitzer_Prizes-3"><span data-dcnode-id="8244" instrument_node="">[3]</span></a></sup><span data-dcnode-id="8241" instrument_node=""> This change allowed the prize to go to a collection of short stories for the first time, James Michener's </span><i data-dcnode-id="8239"><span data-dcnode-id="8240" instrument_node="">Tales of the South Pacific</span></i><span data-dcnode-id="8238" instrument_node="">.
</span></p><span data-dcnode-id="8236" instrument_node="">
</span><h2 data-dcnode-id="8226"><span class="mw-headline" data-dcnode-id="8234" id="Winners"><span data-dcnode-id="8235" instrument_node="">Winners</span></span><span class="mw-editsection" data-dcnode-id="8227"><span class="mw-editsection-bracket" data-dcnode-id="8232"><span data-dcnode-id="8233" instrument_node="">[</span></span><a data-dcnode-id="8230" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/w/index.php%3Ftitle%3DPulitzer_Prize_for_Fiction%26action%3Dedit%26section%3D2" title="Edit section: Winners"><span data-dcnode-id="8231" instrument_node="">edit</span></a><span class="mw-editsection-bracket" data-dcnode-id="8228"><span data-dcnode-id="8229" instrument_node="">]</span></span></span></h2><span data-dcnode-id="8225" instrument_node="">
</span><p data-dcnode-id="8204"><span data-dcnode-id="8224" instrument_node="">In 31 years under the "Novel" name, the prize was awarded 27 times; in its first 69 years to 2016 under the "</span><a data-dcnode-id="8222" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Fiction" title="Fiction"><span data-dcnode-id="8223" instrument_node="">Fiction</span></a><span data-dcnode-id="8221" instrument_node="">" name, 62 times. There have been 11 years during which no title received the award. It has never been shared by two authors.</span><sup class="reference" data-dcnode-id="8218" id="cite_ref-prize_2-2"><a data-dcnode-id="8219" href="#cite_note-prize-2"><span data-dcnode-id="8220" instrument_node="">[2]</span></a></sup><span data-dcnode-id="8217" instrument_node=""> Four writers have won two prizes each in the Fiction category: </span><a data-dcnode-id="8215" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Booth_Tarkington" title="Booth Tarkington"><span data-dcnode-id="8216" instrument_node="">Booth Tarkington</span></a><span data-dcnode-id="8214" instrument_node="">, </span><a data-dcnode-id="8212" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/William_Faulkner" title="William Faulkner"><span data-dcnode-id="8213" instrument_node="">William Faulkner</span></a><span data-dcnode-id="8211" instrument_node="">, </span><a data-dcnode-id="8209" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/John_Updike" title="John Updike"><span data-dcnode-id="8210" instrument_node="">John Updike</span></a><span data-dcnode-id="8208" instrument_node="">, and </span><a data-dcnode-id="8206" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Colson_Whitehead" title="Colson Whitehead"><span data-dcnode-id="8207" instrument_node="">Colson Whitehead</
