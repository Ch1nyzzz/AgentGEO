</span><p data-dcnode-id="670"><span data-dcnode-id="676" instrument_node="">Quiet little towns like </span><b data-dcnode-id="674"><span data-dcnode-id="675" instrument_node="">Cross Creek </span></b><span data-dcnode-id="672" style="font-weight: normal;"><span data-dcnode-id="673" instrument_node="">a</span></span><span data-dcnode-id="671" instrument_node="">re getting harder to find in the fast growing state of Florida.&nbsp;</span></p><p data-dcnode-id="661"><span data-dcnode-id="669" instrument_node="">Cross Creek is on SR-325 between </span><a data-dcnode-id="667" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.florida-backroads-travel.com/gainesville-florida.html"><span data-dcnode-id="668" instrument_node="">Gainesville</span></a><span data-dcnode-id="666" instrument_node=""> and </span><a data-dcnode-id="664" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.florida-backroads-travel.com/ocala-florida.html"><span data-dcnode-id="665" instrument_node="">Ocala</span></a><span data-dcnode-id="663" instrument_node="">.&nbsp; It rests quietly between US-301 and US-441, major north-south Florida highways.</span><br data-dcnode-id="662"></p><span data-dcnode-id="660" instrument_node="">
</span><span data-dcnode-id="657" instrument_node="">
</span><div class="ImageBlock ImageBlockCenter" data-dcnode-id="643"><img alt="Road into Cross Creek in 1965" class="ss-lazy error" data-dcnode-id="656" data-pin-media="https://www.florida-backroads-travel.com/images/CrossCreek1965.jpg" data-src="https://www.florida-backroads-travel.com/images/CrossCreek1965.jpg" data-was-processed="true" height="514.795" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.florida-backroads-travel.com/images/CrossCreek1965.jpg&amp;raw" style="width: 691px; height: auto" title="Road into Cross Creek in 1965" width="691"><span class="Caption CaptionCenter" data-dcnode-id="651" style="max-width:691px"><span data-dcnode-id="655" instrument_node="">Road into Cross Creek in 1965</span><br data-dcnode-id="654"><small data-dcnode-id="652"><span data-dcnode-id="653" instrument_node="">Florida Memory</span></small></span><div class="pinit" data-dcnode-id="644"><span data-dcnode-id="650" instrument_node="">
</span><a class="PIN_1650831359432_button_pin PIN_1650831359432_beside PIN_1650831359432_save PIN_1650831359432_padded" data-dcnode-id="646" data-pin-href="https://www.pinterest.com/pin/create/button/?guid=Q3sGMetQdQDy-3&amp;url=http%3A%2F%2Fwww.florida-backroads-travel.com%2Fcross-creek-florida.html&amp;media=https%3A%2F%2Fwww.florida-backroads-travel.com%2Fimages%2FCrossCreek1965.jpg&amp;description=Road%20into%20Cross%20Creek%20in%201965" data-pin-log="button_pinit" data-pin-x="483" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.pinterest.com/pin/create/button/%3Fguid%3DQ3sGMetQdQDy-3%26url%3Dhttp%253A%252F%252Fwww.florida-backroads-travel.com%252Fcross-creek-florida.html%26media%3Dhttps%253A%252F%252Fwww.florida-backroads-travel.com%252Fimages%252FCrossCreek1965.jpg%26description%3DRoad%2520into%2520Cross%2520Creek%2520in%25201965"><span class="PIN_1650831359432_count" data-dcnode-id="648" data-pin-href="https://www.pinterest.com/pin/create/button/?guid=Q3sGMetQdQDy-3&amp;url=http%3A%2F%2Fwww.florida-backroads-travel.com%2Fcross-creek-florida.html&amp;media=https%3A%2F%2Fwww.florida-backroads-travel.com%2Fimages%2FCrossCreek1965.jpg&amp;description=Road%20into%20Cross%20Creek%20in%201965" data-pin-log="button_pinit" data-pin-x="483"><span data-dcnode-id="649" instrument_node="">483</span></span><span data-dcnode-id="647" instrument_node="">Save</span></a><span data-dcnode-id="645" instrument_node="">
</span></div></div><span data-dcnode-id="642" instrument_node="">
</span><p data-dcnode-id="639"><span data-dcnode-id="641" instrument_node="">You'll enjoy the rustic drive through old canopied oaks draped with Spanish Moss. You will come to the community of Cross Creek, nestled on the creek between Orange Lake and Lockloosa Lake.</span><br data-dcnode-id="640"></p><p data-dcnode-id="636"><span data-dcnode-id="638" instrument_node="">You will be in the heart of Old Florida and among some of the neatest country Florida back roads in the entire state.</span><br data-dcnode-id="637"></p><p data-dcnode-id="634"><span data-dcnode-id="635" instrument_node="">Most Florida tourists don't get off the major highways to poke around in Cross Creek or other small Florida towns. They are missing a treasure.</span></p><span data-dcnode-id="633" instrument_node="">
</span><div class="text_image_block text_image_right text_image_both_cleared text_image_floated" data-dcnode-id="612"><span data-dcnode-id="632" instrument_node="">
</span><div class="ImageBlock ImageBlockCenter" data-dcnode-id="630"><img class="ss-lazy error" data-dcnode-id="631" data-pin-media="https://www.florida-backroads-travel.com/images/MarjorieKinnanRawlingsAsStudent.jpg" data-src="https://www.florida-backroads-travel.com/images/MarjorieKinnanRawlingsAsStudent.jpg" data-was-processed="true" height="371.952941176471" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.florida-backroads-travel.com/images/MarjorieKinnanRawlingsAsStudent.jpg&amp;raw" style="width: 228px; height: auto" width="228"></div><span data-dcnode-id="629" instrument_node="">
</span><p data-dcnode-id="624"><span data-dcnode-id="628" instrument_node="">Cross Creek is famous far beyond other small Florida places because author&nbsp;</span><a data-dcnode-id="626" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.florida-backroads-travel.com/marjorie-kinnan-rawlings.html" onclick="return FIX.track(this);"><span data-dcnode-id="627" instrument_node="">Marjorie Kinnan Rawlings</span></a><span data-dcnode-id="625" instrument_node="">&nbsp;lived there for many years.</span></p><p data-dcnode-id="619"><span data-dcnode-id="623" instrument_node="">She wrote many of her stories while living there, including the Pulitzer Prize winning novel&nbsp;</span><b data-dcnode-id="621"><span data-dcnode-id="622" instrument_node="">"The Yearling"</span></b><span data-dcnode-id="620" instrument_node="">.</span></p><p data-dcnode-id="617"><span data-dcnode-id="618" instrument_node="">Marjorie Kinnan Rawlings immortalized Cross Creek and its people.</span></p><p data-dcnode-id="614"><span data-dcnode-id="616" instrument_node="">She moved to Cross Creek in 1928. She was a graduate of the University of Wisconsin, and had been living in New York.&nbsp;</span><br data-dcnode-id="615"></p><span data-dcnode-id="613" instrument_node="">
</span></div><span data-dcnode-id="611" instrument_node="">
</span><div class="ImageBlock ImageBlockCenter" data-dcnode-id="593"><img alt="Sign at Marjorie Kinnan Rawlings Park in Cross Creek" class="ss-lazy error" data-dcnode-id="610" data-pin-media="https://www.florida-backroads-travel.com/images/CrossCreekMJKMarker.jpg" data-src="https://www.florida-backroads-travel.com/images/CrossCreekMJKMarker.jpg" data-was-processed="true" height="800" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.florida-backroads-travel.com/images/CrossCreekMJKMarker.jpg&amp;raw" style="width: 800px; height: auto" title="Sign at Marjorie Kinnan Rawlings Park in Cross Creek" width="800"><span class="Caption CaptionCenter" data-dcnode-id="601" style="max-width:800px"><span data-dcnode-id="609" instrument_node="">Sign at Marjorie Kinnan Rawlings Park in Cross Creek</span><br data-dcnode-id="608"><span data-dcnode-id="607" instrument_node=""> </span><small data-dcnode-id="602"><small data-dcnode-id="603"><small data-dcnode-id="604"><a data-dcnode-id="605" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//flic.kr/p/dZ7KkA"><span data-dcnode-id="606" instrument_node="">Flickr/Paul Comstock</span></a></small></small></small></span><div class="pinit" data-dcnode-id="594"><span data-dcnode-id="600" instrument_node="">
</span><a class="PIN_1650831359432_button_pin PIN_1650831359432_beside PIN_1650831359432_save PIN_1650831359432_padded" data-dcnode-id="596" data-pin-href="https://www.pinterest.com/pin/create/button/?guid=Q3sGMetQdQDy-2&amp;url=http%3A%2F%2Fwww.florida-backroads-travel.com%2Fcross-creek-florida.html&amp;media=https%3A%2F%2Fwww.florida-backroads-travel.com%2Fimages%2FCrossCreekMJKMarker.jpg&amp;description=Sign%20at%20Marjorie%20Kinnan%20Rawlings%20Park%20in%20Cross%20Creek" data-pin-log="button_pinit" data-pin-x="483" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.pinterest.com/pin/create/button/%3Fguid%3DQ3sGMetQdQDy-2%26url%3Dhttp%253A%252F%252Fwww.florida-backroads-travel.com%252Fcross-creek-florida.html%26media%3Dhttps%253A%252F%252Fwww.florida-backroads-travel.com%252Fimages%252FCrossCreekMJKMarker.jpg%26description%3DSign%2520at%2520Marjorie%2520Kinnan%2520Rawlings%2520Park%2520in%2520Cross%2520Creek"><span class="PIN_1650831359432_count" data-dcnode-id="598" data-pin-href="https://www.pinterest.com/pin/create/button/?guid=Q3sGMetQdQDy-2&amp;url=http%3A%2F%2Fwww.florida-backroads-travel.com%2Fcross-creek-florida.html&amp;media=https%3A%2F%2Fwww.florida-backroads-travel.com%2Fimages%2FCrossCreekMJKMarker.jpg&amp;description=Sign%20at%20Marjorie%20Kinnan%20Rawlings%20Park%20in%20Cross%20Creek" data-pin-log="button_pinit" data-pin-x="483"><span data-dcnode-id="599" instrument_node="">483</span></span><span data-dcnode-id="597" instrument_node="">Save</span></a><span data-dcnode-id="595" instrument_node="">
</span></div></div><span data-dcnode-id="592" instrument_node="">
</span><p data-dcnode-id="589"><span data-dcnode-id="591" instrument_node="">She immediately fell in love with the isolation of Cross Creek. She felt like she was home for the first time in her life.</span><br data-dcnode-id="590"></p><p data-dcnode-id="584"><span data-dcnode-id="588" instrument_node="">The&nbsp;</span><a data-dcnode-id="586" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.florida-backroads-travel.com/florida-cracker.html" onclick="return FIX.track(this);"><span data-dcnode-id="587" instrument_node="">Florida Crackers&nbsp;</span></a><span data-dcnode-id="585" instrument_node="">who lived in the area became not just her friends, but the subjects of her books.</span></p><span data-dcnode-id="583" instrument_node="">
</span><p data-dcnode-id="571"><span data-dcnode-id="582" instrument_node="">Her personal memoir,&nbsp;</span><b data-dcnode-id="580"><span data-dcnode-id="581" instrument_node="">"Cross Creek"</span></b><span data-dcnode-id="579" instrument_node="">, was made into the 1983 film of the same name starring&nbsp;</span><b data-dcnode-id="577"><span data-dcnode-id="578" instrument_node="">Mary Steenburgen</span></b><span data-dcnode-id="576" instrument_node="">&nbsp;and&nbsp;</span><b data-dcnode-id="574"><span data-dcnode-id="575" instrument_node="">Rip Torn</span></b><span data-dcnode-id="573" instrument_node="">.&nbsp;&nbsp;</span><br data-dcnode-id="572"></p><p data-dcnode-id="563"><span data-dcnode-id="570" instrument_node="">Her Pulitzer Prize winning novel, "The Yearling" was made into the 1946 film of the same name. It starred&nbsp;</span><b data-dcnode-id="568"><span data-dcnode-id="569" instrument_node="">Gregory Peck, Jane Wyman</span></b><span data-dcnode-id="567" instrument_node="">&nbsp;and&nbsp;</span><b data-dcnode-id="565"><span data-dcnode-id="566" instrument_node="">Claude Jarman, Jr</span></b><span data-dcnode-id="564" instrument_node="">.</span></p><span data-dcnode-id="562" instrument_node="">
</span><div class="ImageBlock ImageBlockCenter" data-dcnode-id="545"><img alt="Tenants House at Rawlings Home in Cross Creek" class="ss-lazy error" data-dcnode-id="561" data-pin-media="https://www.florida-backroads-travel.com/images/CrossCreekTenantsHouse.jpg" data-src="https://www.florida-backroads-travel.com/images/CrossCreekTenantsHouse.jpg" data-was-processed="true" height="507" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.florida-backroads-travel.com/images/CrossCreekTenantsHouse.jpg&amp;raw" style="width: 799px; height: auto" title="Tenants House at Rawlings Home in Cross Creek" width="799"><span class="Caption CaptionCenter" data-dcnode-id="553" style="max-width:799px"><span data-dcnode-id="560" instrument_node="">Tenants House at Rawlings Home in Cross Creek</span><br data-dcnode-id="559"><span data-dcnode-id="558" instrument_node=""> </span><small data-dcnode-id="554"><small data-dcnode-id="555"><small data-dcnode-id="556"><span data-dcnode-id="557" instrument_node="">Flickr/Denise Olson</span></small></small></small></span><div class="pinit" data-dcnode-id="546"><span data-dcnode-id="552" instrument_node="">
</span><a class="PIN_1650831359432_button_pin PIN_1650831359432_beside PIN_1650831359432_save PIN_1650831359432_padded" data-dcnode-id="548" data-pin-href="https://www.pinterest.com/pin/create/button/?guid=Q3sGMetQdQDy-1&amp;url=http%3A%2F%2Fwww.florida-backroads-travel.com%2Fcross-creek-florida.html&amp;media=https%3A%2F%2Fwww.florida-backroads-travel.com%2Fimages%2FCrossCreekTenantsHouse.jpg&amp;description=Tenants%20House%20at%20Rawlings%20Home%20in%20Cross%20Creek" data-pin-log="button_pinit" data-pin-x="483" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.pinterest.com/pin/create/button/%3Fguid%3DQ3sGMetQdQDy-1%26url%3Dhttp%253A%252F%252Fwww.florida-backroads-travel.com%252Fcross-creek-florida.html%26media%3Dhttps%253A%252F%252Fwww.florida-backroads-travel.com%252Fimages%252FCrossCreekTenantsHouse.jpg%26description%3DTenants%2520House%2520at%2520Rawlings%2520Home%2520in%2520Cross%2520Creek"><span class="PIN_1650831359432_count" data-dcnode-id="550" data-pin-href="https://www.pinterest.com/pin/create/button/?guid=Q3sGMetQdQDy-1&amp;url=http%3A%2F%2Fwww.florida-backroads-travel.com%2Fcross-creek-florida.html&amp;media=https%3A%2F%2Fwww.florida-backroads-travel.com%2Fimages%2FCrossCreekTenantsHouse.jpg&amp;description=Tenants%20House%20at%20Rawlings%20Home%20in%20Cross%20Creek" data-pin-log="button_pinit" data-pin-x="483"><span data-dcnode-id="551" instrument_node="">483</span></span><span data-dcnode-id="549" instrument_node="">Save</span></a><span data-dcnode-id="547" instrument_node="">
</span></div></div><span data-dcnode-id="544" instrument_node="">
</span><p data-dcnode-id="542"><span data-dcnode-id="543" instrument_node="">Marjorie liked visiting nearby Gainesville and St. Augustine, and had a cottage on the ocean in Crescent Beach south of St. Augustine Beach. </span></p><p data-dcnode-id="537"><span data-dcnode-id="541" instrument_node="">She married </span><b data-dcnode-id="539"><span data-dcnode-id="540" instrument_node="">Norton Baskin</span></b><span data-dcnode-id="538" instrument_node=""> and they owned a hotel in the Ancient City.</span></p><p data-dcnode-id="533"><b data-dcnode-id="535"><span data-dcnode-id="536" instrument_node="">Ripley's Believe or Not</span></b><span data-dcnode-id="534" instrument_node=""> is now in the building.  Believe it or not.</span></p><span data-dcnode-id="532" instrument_node="">
</span><h2 data-dcnode-id="530"><span data-dcnode-id="531" instrument_node="">My Personal Cross Creek Story</span></h2><span data-dcnode-id="529" instrument_node="">
</span><p data-dcnode-id="527"><span data-dcnode-id="528" instrument_node="">I have been to Cross Creek many times, but the trip I remember most clearly was on July 20, 1969. That was when the Crew of Apollo 11 made their historic landing on the moon.</span></p><p data-dcnode-id="525"><span data-dcnode-id="526" instrument_node="">I had been returning to Tampa from Jacksonville on a business trip, and parked my car by the side of the road among huge old oaks draped with Spanish moss. &nbsp;</span></p><p data-dcnode-id="523"><span data-dcnode-id="524" instrument_node="">The historic moon landing was being broadcast from my car radio. &nbsp;I stood next to my car and listened to the voices on the radio.</span></p><p data-dcnode-id="521"><span data-dcnode-id="522" instrument_node="">The full moon was in the eastern sky. The darkness of this Florida place made the lunar surface seem eerily bright and close. &nbsp;</span></p><p data-dcnode-id="510"><span data-dcnode-id="520" instrument_node="">The moonlight bathed the old Florida cracker house across the road, the house where Marjorie Kinnan Rawlings lived when she wrote&nbsp;</span><b data-dcnode-id="518"><span data-dcnode-id="519" instrument_node="">South Moon Under</span></b><span data-dcnode-id="517" instrument_node="">,&nbsp;</span><b data-dcnode-id="515"><span data-dcnode-id="516" instrument_node="">The Yearling</span></b><span data-dcnode-id="514" instrument_node="">&nbsp;and&nbsp;</span><b data-dcnode-id="512"><span data-dcnode-id="513" instrument_node="">Cross Creek</span></b><span data-dcnode-id="511" instrument_node="">.</span></p><span data-dcnode-id="509" instrument_node="">
</span><div class="ImageBlock ImageBlockCenter" data-dcnode-id="498"><img alt="Cross Creek, Florida.  Marjorie Kinnan Rawlings House" class="ss-lazy error" data-dcnode-id="508" data-pin-media="https://www.florida-backroads-travel.com/images/MarjorieKinnanRawlingsHome.jpg" data-src="https://www.florida-backroads-travel.com/images/MarjorieKinnanRawlingsHome.jpg" data-was-processed="true" height="585.833333333333" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.florida-backroads-travel.com/images/MarjorieKinnanRawlingsHome.jpg&amp;raw" style="width: 740px; height: auto" title="Cross Creek, Florida.  Marjorie Kinnan Rawlings House" width="740"><span class="Caption CaptionCenter" data-dcnode-id="506" style="max-width:740px"><span data-dcnode-id="507" instrument_node="">Marjorie Kinnan Rawlings Home In Cross Creek, Florida</span></span><div class="pinit" data-dcnode-id="499"><span data-dcnode-id="505" instrument_node="">
</span><a class="PIN_1650831359432_button_pin PIN_1650831359432_beside PIN_1650831359432_save PIN_1650831359432_padded" data-dcnode-id="501" data-pin-href="https://www.pinterest.com/pin/create/button/?guid=Q3sGMetQdQDy-6&amp;url=http%3A%2F%2Fwww.florida-backroads-travel.com%2Fcross-creek-florida.html&amp;media=https%3A%2F%2Fwww.florida-backroads-travel.com%2Fimages%2FMarjorieKinnanRawlingsHome.jpg&amp;description=Marjorie%20Kinnan%20Rawlings%20home%20in%20Cross%20Creek%2C%20Florida%2C%20has%20been%20restored%20and%20is%20now%20part%20of%20a%20state%20park%20and%20open%20to%20the%20public." data-pin-log="button_pinit" data-pin-x="483" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.pinterest.com/pin/create/button/%3Fguid%3DQ3sGMetQdQDy-6%26url%3Dhttp%253A%252F%252Fwww.florida-backroads-travel.com%252Fcross-creek-florida.html%26media%3Dhttps%253A%252F%252Fwww.florida-backroads-travel.com%252Fimages%252FMarjorieKinnanRawlingsHome.jpg%26description%3DMarjorie%2520Kinnan%2520Rawlings%2520home%2520in%2520Cross%2520Creek%252C%2520Florida%252C%2520has%2520been%2520restored%2520and%2520is%2520now%2520part%2520of%2520a%2520state%2520park%2520and%2520open%2520to%2520the%2520public."><span class="PIN_1650831359432_count" data-dcnode-id="503" data-pin-href="https://www.pinterest.com/pin/create/button/?guid=Q3sGMetQdQDy-6&amp;url=http%3A%2F%2Fwww.florida-backroads-travel.com%2Fcross-creek-florida.html&amp;media=https%3A%2F%2Fwww.florida-backroads-travel.com%2Fimages%2FMarjorieKinnanRawlingsHome.jpg&amp;description=Marjorie%20Kinnan%20Rawlings%20home%20in%20Cross%20Creek%2C%20Florida%2C%20has%20been%20restored%20and%20is%20now%20part%20of%20a%20state%20park%20and%20open%20to%20the%20public." data-pin-log="button_pinit" data-pin-x="483"><span data-dcnode-id="504" instrument_node="">483</span></span><span data-dcnode-id="502" instrument_node="">Save</span></a><span data-dcnode-id="500" instrument_node="">
</span></div></div><span data-dcnode-id="497" instrument_node="">
</span><p data-dcnode-id="495"><span data-dcnode-id="496" instrument_node="">As I looked at the moon and heard the crackling words of Neil 
Armstrong, I imagined I could hear the faint clicking of Marjorie's 
typewriter coming from the front porch of her house.

</span></p><p data-dcnode-id="493"><span data-dcnode-id="494" instrument_node="">The throaty croaking of frogs and the squawking of fishing night birds drifted in the sultry night air.

</span></p><p data-dcnode-id="491"><span data-dcnode-id="492" instrument_node="">The contrast between the modern accomplishments of the space 
program and the unchanged old natural feeling of Cross Creek has 
remained in my mind as the turning point in Florida's headlong rush into
 development and over population.

</span></p><p data-dcnode-id="489"><span data-dcnode-id="490" instrument_node="">These beautiful little old Florida towns and places are a vanishing species. &nbsp;Cross Creek remains Old Florida.  A place of fish camps and cypress trees, oaks and Spanish Moss.</span></p><span data-dcnode-id="488" instrument_node="">

</span></div></div><span data-dcnode-id="469" instrument_node="">
</span><p data-dcnode-id="463"><span data-dcnode-id="468" instrument_node="">Marjories's house is still the big attraction in Cross Creek. It is lovingly preserved by dedicated people and looks much like it did in Marjorie's time. It has been preserved forever as&nbsp;</span><b data-dcnode-id="466"><span data-dcnode-id="467" instrument_node="">Marjorie Kinnan Rawlings Historic State Park</span></b><span data-dcnode-id="465" instrument_node="">.</span><br data-dcnode-id="464"></p><span data-dcnode-id="462" instrument_node="">
</span><h2 data-dcnode-id="459"><b data-dcnode-id="460"><span data-dcnode-id="461" instrument_node="">CROSS CREEK FLORIDA MOTELS</span></b></h2><span data-dcnode-id="458" instrument_node="">

</span><h3 data-dcnode-id="385"><span data-dcnode-id="386" instrument_node="">MARJORIE KINNAN RAWLINGS GRAVE</span></h3><span data-dcnode-id="384" instrument_node="">
</span><p data-dcnode-id="376"><span data-dcnode-id="383" instrument_node="">Mrs. Rawlings and her husband, </span><b data-dcnode-id="381"><span data-dcnode-id="382" instrument_node="">Norton Baskin</span></b><span data-dcnode-id="380" instrument_node="">, are buried in the old Antioch Cemetery just northeast of </span><b data-dcnode-id="378"><span data-dcnode-id="379" instrument_node="">Island Grove</span></b><span data-dcnode-id="377" instrument_node="">. &nbsp;Her fans keep putting deer statues on her grave to memorialize "The Yearling."</span></p><p data-dcnode-id="374"><span data-dcnode-id="375" instrument_node="">Some of her Florida Cracker neighbors are also there, including ones mentioned in her books. These include Zelma Cason, Tom Morrison, Chet Crosby and Berney Bass.</span></p><span data-dcnode-id="373" instrument_node="">
</span><div class="ImageBlock ImageBlockCenter" data-dcnode-id="369"><img class="ss-lazy error" data-dcnode-id="372" data-pin-media="https://www.florida-backroads-travel.com/images/MapMicanopyCrossCreek.png" data-src="https://www.florida-backroads-travel.com/images/MapMicanopyCrossCreek.png" data-was-processed="true" height="382.333333333333" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.florida-backroads-travel.com/images/MapMicanopyCrossCreek.png&amp;raw" style="width: 740px; height: auto" width="740"><span class="Caption CaptionCenter" data-dcnode-id="370" style="max-width:740px"><span data-dcnode-id="371" instrument_node="">Micanopy, Evinston, Cross Creek, Antioch Cemetery</span></span></div><span data-dcnode-id="368" instrument_node="">
</span><p data-dcnode-id="366"><span data-dcnode-id="367" instrument_node="">To get to the cemetery leave Cross Creek and go east to US-301 and cross over to SE 219 Avenue. &nbsp;</span></p><p data-dcnode-id="364"><span data-dcnode-id="365" instrument_node="">Continue east on SE 219 Avenue for about 2 miles to SE 225 Drive, an unpaved road that can be pretty rough sometimes. Especially in small cars like the ones I drive.</span></p><p data-dcnode-id="361"><span data-dcnode-id="363" instrument_node="">Keep following this road until you reach SE 189 Avenue. &nbsp;The cemetery is just to your right.</span><br data-dcnode-id="362"></p><span data-dcnode-id="360" instrument_node="">
</span><div class="ImageBlock ImageBlockCenter" data-dcnode-id="349"><img alt="Majorie Kinnan Rawlings Grave Near Cross Creek, Florida" class="ss-lazy loaded" data-dcnode-id="359" data-pin-media="https://www.florida-backroads-travel.com/images/marjoriekinnanrawlingsgrave.jpg" data-src="https://www.florida-backroads-travel.com/images/marjoriekinnanrawlingsgrave.jpg" data-was-processed="true" height="555" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.florida-backroads-travel.com/images/marjoriekinnanrawlingsgrave.jpg&amp;raw" style="width: 740px; height: auto" title="Marjorie Kinnan Rawlings Grave, Antioch Cemetery, Island Grove, Florida" width="740"><span class="Caption CaptionCenter" data-dcnode-id="357" style="max-width:740px"><span data-dcnode-id="358" instrument_node="">Marjorie Kinnan Rawlings Grave, Antioch Cemetery, Island Grove, Florida</span></span><div class="pinit" data-dcnode-id="350"><span data-dcnode-id="356" instrument_node="">

</span><p data-dcnode-id="306" style="text-align: center;"><b data-dcnode-id="308"><span data-dcnode-id="313" instrument_node="">14501 East County Road 325</span><br data-dcnode-id="312"><span data-dcnode-id="311" instrument_node="">Hawthorne, Florida 32640</span><br data-dcnode-id="310"><span data-dcnode-id="309" instrument_node="">Tel: 352-466-3999</span></b><br data-dcnode-id="307"></p><span data-dcnode-id="305" instrument_node="">

</span><div class="ImageBlock ImageBlockCenter" data-dcnode-id="290"><img class="ss-lazy" data-dcnode-id="300" data-pin-media="https://www.florida-backroads-travel.com/images/theyearlingexterior.jpg" data-src="https://www.florida-backroads-travel.com/images/theyearlingexterior.jpg" height="555" src="data:image/svg+xml,%3Csvg%20xmlns='http://www.w3.org/2000/svg'%20viewBox='0%200%20740%20555'%3E%3C/svg%3E" style="width: 740px; height: auto" width="740"><span class="Caption CaptionCenter" data-dcnode-id="298" style="max-width:740px"><span data-dcnode-id="299" instrument_node="">The Yearling Restaurant, Cross Creek</span></span><div class="pinit" data-dcnode-id="291"><span data-dcnode-id="297" instrument_node="">

</span><p data-dcnode-id="287"><span data-dcnode-id="288" instrument_node="">This rustic old place has been a Florida dining legend since 1952.</span></p><p data-dcnode-id="285"><span data-dcnode-id="286" instrument_node=""> For many years, with some interruptions, this quaint dining place served thousands of hungry Florida Gator fans, including me.&nbsp;</span></p><p data-dcnode-id="279"><span data-dcnode-id="284" instrument_node="">It was a tradition for many of us Gator faithful who would stop in after a&nbsp;</span><b data-dcnode-id="282"><span data-dcnode-id="283" instrument_node="">University of Florida</span></b><span data-dcnode-id="281" instrument_node="">&nbsp;football game in Gainesville on our separate ways back to Orlando, Tampa, and other Florida towns south of Gainesville.</span><br data-dcnode-id="280"></p><span data-dcnode-id="278" instrument_node="">
</span><p data-dcnode-id="274" style="text-align: center;"><b data-dcnode-id="275"><a data-dcnode-id="276" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.florida-backroads-travel.com/the-yearling-restaurant.html"><span data-dcnode-id="277" instrument_node="">READ MORE ABOUT THE YEARLING RESTAURANT</span></a></b></p><span data-dcnode-id="273" instrument_node="">
