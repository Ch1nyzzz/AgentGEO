</span><h1 class="entry-title" data-dcnode-id="1157"><span data-dcnode-id="1158" instrument_node="">Authors: Toni Morrison</span></h1><span data-dcnode-id="1156" instrument_node=""> </span><ul class="post-time" data-dcnode-id="1149"><span data-dcnode-id="1155" instrument_node="">
</span><li data-dcnode-id="1151"><span data-dcnode-id="1154" instrument_node="">Last updated on </span><span data-dcnode-id="1152"><span data-dcnode-id="1153" instrument_node="">December 10, 2021</span></span></li><span data-dcnode-id="1150" instrument_node="">
</span></ul><span data-dcnode-id="1148" instrument_node="">
</span><div class="entry-content" data-dcnode-id="427"><span data-dcnode-id="1147" instrument_node="">
</span><sec data-dcnode-id="1140" sec-type="reviewed"><p data-dcnode-id="1145"><span data-dcnode-id="1146" instrument_node=""> </span></p><span data-dcnode-id="1144" instrument_node=""> </span><p data-dcnode-id="1142"><span data-dcnode-id="1143" instrument_node="">Last reviewed:&nbsp;June&nbsp;2017</span></p><span data-dcnode-id="1141" instrument_node=""> </span></sec><span data-dcnode-id="1139" instrument_node=""> </span><sec data-dcnode-id="1132" indexed="true" sec-type="a_head"><p data-dcnode-id="1137"><span data-dcnode-id="1138" instrument_node=""> </span></p><span data-dcnode-id="1136" instrument_node=""> </span><p data-dcnode-id="1134"><span data-dcnode-id="1135" instrument_node="">Pulitzer Prize and Nobel Prize–winning American author, editor, and professor.</span></p><span data-dcnode-id="1133" instrument_node=""> </span></sec><span data-dcnode-id="1131" instrument_node=""> </span><sec data-dcnode-id="1106" indexed="true" sec-type="quickreference"><p data-dcnode-id="1129"><span data-dcnode-id="1130" instrument_node=""> </span></p><span data-dcnode-id="1128" instrument_node=""> </span><list data-dcnode-id="1108" id="AN0562200" list-content="bio_meta"><span data-dcnode-id="1127" instrument_node=""> </span><list-item data-dcnode-id="1119"><span data-dcnode-id="1126" instrument_node=""> </span><label data-dcnode-id="1124"><span data-dcnode-id="1125" instrument_node="">Born: </span></label><span data-dcnode-id="1123" instrument_node=""> </span><p data-dcnode-id="1121"><span data-dcnode-id="1122" instrument_node="">February 18, 1931</span></p><span data-dcnode-id="1120" instrument_node=""> </span></list-item><span data-dcnode-id="1118" instrument_node=""> </span><list-item data-dcnode-id="1110"><span data-dcnode-id="1117" instrument_node=""> </span><label data-dcnode-id="1115"><span data-dcnode-id="1116" instrument_node="">Birthplace: </span></label><span data-dcnode-id="1114" instrument_node=""> </span><p data-dcnode-id="1112"><span data-dcnode-id="1113" instrument_node="">Lorain, Ohio</span></p><span data-dcnode-id="1111" instrument_node=""> </span></list-item><span data-dcnode-id="1109" instrument_node=""> </span></list><span data-dcnode-id="1107" instrument_node=""> </span></sec><p data-dcnode-id="1104"><span data-dcnode-id="1105" instrument_node=""> </span></p><p data-dcnode-id="1102"><span data-dcnode-id="1103" instrument_node=""> </span></p><span data-dcnode-id="1101" instrument_node=""> </span><sec data-dcnode-id="921" indexed="true" sec-type="bodytext"><span data-dcnode-id="1100" instrument_node=""> </span><title data-dcnode-id="1098">Biography</title><span data-dcnode-id="1097" instrument_node=""> </span><p data-dcnode-id="1095"><span data-dcnode-id="1096" instrument_node="">Toni Morrison greatly advanced the American literary canon by producing unselfconscious works about the experiences of African Americans, often focusing in particular on black females, and with a black audience in mind. Yet her novels, many of which have been translated into other languages, have earned heartfelt popular and critical approval through their universal appeal.</span></p><p data-dcnode-id="1093"><span data-dcnode-id="1094" instrument_node=""> </span></p><span data-dcnode-id="1092" instrument_node=""> </span><p data-dcnode-id="1085"><span data-dcnode-id="1091" instrument_node="">Morrison, the second of four children, was born Chloe Anthony Wofford into a poor but loving household composed of siblings, parents, grandparents, and sometimes friends. Both of her parents, George and Ramah (née Willis) Wofford, emigrated to her native Lorain, Ohio, from the South, her mother at age six coming from Alabama with parents, her father as a teenager from Georgia. Overall, Morrison’s formative years were rich with experiences specific to African Americans and black communities, and her novels often include attempts to recapture in words that universe and time which she and the rest of the world have left behind. Growing up during the Great Depression in that multiethnic, blue-collar steel town just west of Cleveland, Ohio, on Lake Erie, Morrison learned early the dynamics of familial relations, sexuality, marriage, segregation, and racism. Hers was a world unified by pain and violence as much as by love and respect, and it is the world of pain and violence for poor black girls that she presents in her first novel, </span><i data-dcnode-id="1089"><span data-dcnode-id="1090" instrument_node="">The Bluest Eye</span></i><span data-dcnode-id="1088" instrument_node="">. The story of Pecola Breedlove is not autobiographical, but there is a connection between the book and what Morrison remembered of the loneliness and struggle of other black girls whom she saw or knew. She would claim that her first novel, narrated by a little girl, gives voice to black female children’s wonder of and response to a hostile universe that discredits and abuses them.</span><fig data-dcnode-id="1086" fig-type="elec_use" position="margin"><span data-dcnode-id="1087" instrument_node=""> </span></fig></p><p data-dcnode-id="1083"><span data-dcnode-id="1084" instrument_node="">Toni Morrison, Miami Book Fair International, 1986</span></p><span data-dcnode-id="1082" instrument_node=""> </span><ext-link <p="" data-dcnode-id="922" xmlns:xlink="http://www.w3.org/1999/xlink"><span data-dcnode-id="1081" instrument_node="">                               ext-link-type="db-image"</span><p data-dcnode-id="1080"></p><p data-dcnode-id="1078"><span data-dcnode-id="1079" instrument_node="">                               xlink:href="cwa-25749810000961-150729.jpg"/&gt;</span></p><span data-dcnode-id="1077" instrument_node=""> </span><permissions data-dcnode-id="1072"><span data-dcnode-id="1076" instrument_node=""> </span><copyright-statement data-dcnode-id="1074"><span data-dcnode-id="1075" instrument_node="">By MDCarchives (Own work) [CC-BY-SA-3.0 (http://creativecommons.org/licenses/by-sa/3.0) or GFDL (http://www.gnu.org/copyleft/fdl.html)], via Wikimedia Commons</span></copyright-statement><span data-dcnode-id="1073" instrument_node=""> </span></permissions><span data-dcnode-id="1071" instrument_node=""> </span><fig data-dcnode-id="1054" fig-type="elec_use" position="margin"><span data-dcnode-id="1070" instrument_node=""> </span><p data-dcnode-id="1068"><span data-dcnode-id="1069" instrument_node="">Toni Morrison speaking at "A Tribute to Chinua Achebe - 50 Years Anniversary of 'Things Fall Apart'". The Town Hall, New York City, February 26th, 2008.</span></p><span data-dcnode-id="1067" instrument_node=""> </span><ext-link <p="" data-dcnode-id="1055" xmlns:xlink="http://www.w3.org/1999/xlink"><span data-dcnode-id="1066" instrument_node="">                               ext-link-type="db-image"</span><p data-dcnode-id="1065"></p><p data-dcnode-id="1063"><span data-dcnode-id="1064" instrument_node="">                               xlink:href="cwa-25749810000961-150728.jpg"/&gt;</span></p><span data-dcnode-id="1062" instrument_node=""> </span><permissions data-dcnode-id="1057"><span data-dcnode-id="1061" instrument_node=""> </span><copyright-statement data-dcnode-id="1059"><span data-dcnode-id="1060" instrument_node="">By derivative work: Entheta (talk) Toni_Morrison_2008.jpg: Angela Radulescu (Toni_Morrison_2008.jpg) [CC-BY-SA-2.0 (http://creativecommons.org/licenses/by-sa/2.0) or CC-BY-SA-2.0 (http://creativecommons.org/licenses/by-sa/2.0)], via Wikimedia Commons</span></copyright-statement><span data-dcnode-id="1058" instrument_node=""> </span></permissions><span data-dcnode-id="1056" instrument_node=""> </span></ext-link></fig><p data-dcnode-id="1052"><span data-dcnode-id="1053" instrument_node=""> </span></p><span data-dcnode-id="1051" instrument_node=""> </span><p data-dcnode-id="1050"></p><span data-dcnode-id="1049" instrument_node=""> </span><p data-dcnode-id="1047"><span data-dcnode-id="1048" instrument_node="">Morrison knew segregation as a habit and physical beauty as superficial, so she cultivated the serious habits inherited from her parents. In her first-grade class, she was the only African American and the only child who could read. Her adolescence was studious and industrious; she read Fyodor Dostoevski, Gustave Flaubert, and Jane Austen, and she worked cleaning houses from age thirteen. Her goal was to become a dancer and do some acting. Having graduated from high school with honors in 1949, Morrison enrolled at Howard University in Washington, DC, expecting to be immersed in learning and progress alongside serious, involved young black people like herself. Her disappointment with the typical college scene, where appearances rule and values are suspended, was assuaged by her studies as an English major with a minor in classics. She also acted with the Howard University Players and with a repertory troupe that spent summers performing in the South. While an undergraduate, she began to go by the nickname Toni. Having earned an undergraduate degree in 1953 and feeling unsure about what to do next, Morrison proceeded to Cornell University in upstate New York for a master’s degree in English. Her thesis (in 1955) was concerned with suicide in the works of William Faulkner and Virginia Woolf, and she later published criticism on Faulkner.</span></p><span data-dcnode-id="1046" instrument_node=""> </span><p data-dcnode-id="1041"><span data-dcnode-id="1045" instrument_node="">Morrison taught English courses for two years at Texas Southern University in Houston, followed by a return to Howard University to teach English and the humanities there until 1964. While she was at Howard the second time, many important developments occurred for Morrison: She married in 1958, began writing in 1961, bore a child, and separated from her husband during her second pregnancy. She returned to her hometown with her three-year-old son, Harold, and soon gave birth to another son, Slade. She would generally refrain from publicly discussing her former husband, Harold Morrison, but did disclose that in the marriage she had lost feelings of purpose, self-worth, and autonomy. In 1967 Morrison and her two sons moved to Syracuse, New York, where she took a job editing textbooks for a subsidiary of Random House. While there she wrote </span><i data-dcnode-id="1043"><span data-dcnode-id="1044" instrument_node="">The Bluest Eye</span></i><span data-dcnode-id="1042" instrument_node="">, which grew out of a short story written half-seriously when she was part of a creative writing group. The loneliness accompanying the rearing of two small boys in a strange place needed to be pacified, and writing the novel was her way of connecting her present situation with a satisfying past and establishing continuity.</span></p><span data-dcnode-id="1040" instrument_node=""> </span><p data-dcnode-id="1032"><span data-dcnode-id="1039" instrument_node="">The distance between past and present life grew larger when Morrison was transferred to New York City in the early 1970s, to assume the position of book editor at Random House. The conflict between the woman from small-town Ohio and the woman who left for the big city emerges in </span><i data-dcnode-id="1037"><span data-dcnode-id="1038" instrument_node="">Sula</span></i><span data-dcnode-id="1036" instrument_node=""> as the conflict between Nel Wright and Sula Peace—that is, the conflict between two childhood friends who are reunited years later only to betray each other. Significantly, it is Nel, the woman who stays in the small town (Medallion, Ohio), who survives the conflict, although the author endorses Sula’s point of view. Like Sula, Morrison educated herself and expanded her wisdom of people by moving on; as Sula returns to Medallion and applies what the world has taught her, so Morrison when writing returns to rural heartlands to reinterpret her past. At the same time, she shares the flavor and texture of her culture with a public that has either never seen or forgotten it. Morrison indeed triumphed in the big city, as she had in writing: </span><i data-dcnode-id="1034"><span data-dcnode-id="1035" instrument_node="">Sula</span></i><span data-dcnode-id="1033" instrument_node=""> was nominated for the National Book Award in 1974. She also found success as an editor, with some of the better-known books she edited including the autobiographies by Muhammad Ali and Angela Davis, as well as fiction by writers such as Toni Cade Bambara and Gayl Jones.</span></p><span data-dcnode-id="1031" instrument_node=""> </span><p data-dcnode-id="1023"><span data-dcnode-id="1030" instrument_node="">The search for continuity of existence and heritage makes itself felt in Morrison’s three following novels and her work on a musical. This theme works most strongly in her third novel, </span><i data-dcnode-id="1028"><span data-dcnode-id="1029" instrument_node="">Song of Solomon</span></i><span data-dcnode-id="1027" instrument_node="">. Here she focuses on male characters, one of whom is tortured by the past and one who wants simply to find his past. There is an interesting parallel between Morrison’s father and the character Guitar Baines. George Wofford believed that white people are inherently evil (by their methods and position of dominance), while black people are the only truly humane race. Guitar’s belief is the same as George Wofford’s; in fact, he belongs to an underground group that executes a white person whenever an African American is lynched by whites. </span><i data-dcnode-id="1025"><span data-dcnode-id="1026" instrument_node="">Song of Solomon</span></i><span data-dcnode-id="1024" instrument_node=""> challenges extreme racist thinking, with an eye toward neither integration nor segregation but toward definition and identification. The odyssey of the character Milkman Dead is that of the black Everyman, capable of owning houses but lacking a home, and Morrison’s message is that people must find value in themselves as humans, not in reaction to what is inhuman.</span></p><span data-dcnode-id="1022" instrument_node=""> </span><p data-dcnode-id="1014"><span data-dcnode-id="1021" instrument_node=""> </span><i data-dcnode-id="1019"><span data-dcnode-id="1020" instrument_node="">Tar Baby</span></i><span data-dcnode-id="1018" instrument_node="">, Morrison's 1981 best-seller, looks at the social stratification among African Americans and poses the young, European-educated American black woman Jadine as a rising star. The epitome of social success and beauty in a white-defined cosmos, she feels troubled, as if something is missing in her identity and values because she does not fit into the black society she considers home. She tries to recapture a familiar identity through a relationship with a chance acquaintance she met while in the Caribbean. The man, Son, is the archetypal outsider whose identity changes continuously as he moves from place to place. Submitting to the hardships of the male-dominated life of a rural village does not suit Jadine; she has grown beyond familiar black female identities. Jadine represents the problems accompanying black women who are educated and thus alienate themselves from their root culture, problems Morrison herself experienced as a rising professional who was black, female, and urban. There is a parallel between fiction and author: Morrison created Jadine after the enormous success of </span><i data-dcnode-id="1016"><span data-dcnode-id="1017" instrument_node="">Song of Solomon</span></i><span data-dcnode-id="1015" instrument_node=""> and after she had become a visiting lecturer at Yale University in 1976.</span></p><span data-dcnode-id="1013" instrument_node=""> </span><p data-dcnode-id="1002"><span data-dcnode-id="1012" instrument_node="">While editing </span><i data-dcnode-id="1010"><span data-dcnode-id="1011" instrument_node="">The Black Book: Three Hundred Years of African American Life</span></i><span data-dcnode-id="1009" instrument_node=""> in 1974, Morrison came across the story of a Kentucky slave woman who tried to kill her children in order to save them from lives of slavery. This woman became Morrison’s inspiration for the character of Sethe in her fifth novel. </span><i data-dcnode-id="1007"><span data-dcnode-id="1008" instrument_node="">Beloved</span></i><span data-dcnode-id="1006" instrument_node=""> provides an unexpected view of the horrors of black heritage. It again explores complex notions of identity, race, and family. As a dual-purpose work, </span><i data-dcnode-id="1004"><span data-dcnode-id="1005" instrument_node="">Beloved</span></i><span data-dcnode-id="1003" instrument_node=""> was arguably Morrison’s most political book at the time of its release, but it builds on themes raised in the earlier four novels, such as mother-daughter conflicts and questions concerning the strength of the female community and the supernatural. Set in the early aftermath of slave times, the story suggests that a community of women can be strong even under racial and sexual oppression. In this book, Morrison wrestles with metaphysical aspects of black experience. For her, female power has not sprung up in the late twentieth century; rather, it has always existed, even during slavery. Sethe and her friends triumph over tyranny as much as Jadine does.</span></p><span data-dcnode-id="1001" instrument_node=""> </span><p data-dcnode-id="978"><span data-dcnode-id="1000" instrument_node="">By this time Morrison was established as a critical and commercial success, winning various awards and other recognition. </span><i data-dcnode-id="998"><span data-dcnode-id="999" instrument_node="">The Bluest Eye</span></i><span data-dcnode-id="997" instrument_node=""> appeared in the </span><i data-dcnode-id="995"><span data-dcnode-id="996" instrument_node="">Norton Anthology of Literature by Women: The Tradition in English</span></i><span data-dcnode-id="994" instrument_node="">, edited by Sandra M. Gilbert and Susan Gubar, 1985; a condensed version of </span><i data-dcnode-id="992"><span data-dcnode-id="993" instrument_node="">Sula</span></i><span data-dcnode-id="991" instrument_node=""> was published in </span><i data-dcnode-id="989"><span data-dcnode-id="990" instrument_node="">Redbook</span></i><span data-dcnode-id="988" instrument_node=""> magazine in 1974; </span><i data-dcnode-id="986"><span data-dcnode-id="987" instrument_node="">Song of Solomon</span></i><span data-dcnode-id="985" instrument_node=""> won the National Book Critics Circle Award for fiction in 1977 and was a selection for the Book-of-the-Month Club; and </span><i data-dcnode-id="983"><span data-dcnode-id="984" instrument_node="">Tar Baby</span></i><span data-dcnode-id="982" instrument_node=""> quickly became a nationwide best-seller. The highly acclaimed </span><i data-dcnode-id="980"><span data-dcnode-id="981" instrument_node="">Beloved</span></i><span data-dcnode-id="979" instrument_node=""> won for Morrison the prestigious Pulitzer Prize in fiction in 1988.</span></p><span data-dcnode-id="977" instrument_node=""> </span><p data-dcnode-id="966"><span data-dcnode-id="976" instrument_node="">In 1990 Morrison was asked to participate in a photographic exhibit at the Museum of African American History in Detroit. She had reservations, however, asking if young black women really have a greater need for role models than young women of different races. Remaining committed to both writing and teaching, in 1989 she accepted the Robert F. Goheen Professorship in the Humanities at Princeton University, breaking racial and gender barriers by becoming the first African American woman to hold such a prestigious position in an Ivy League university. In 1992 she published </span><i data-dcnode-id="974"><span data-dcnode-id="975" instrument_node="">Playing in the Dark: Whiteness and the Literary Imagination</span></i><span data-dcnode-id="973" instrument_node="">, which examines the impact that racial separation has had, and continues to have, on writers. In this book, Morrison considers writers such as Herman Melville, Nathaniel Hawthorne, Willa Cather, and Edgar Allan Poe, discussing their character roles and central themes. Also in 1992, Morrison’s novel </span><i data-dcnode-id="971"><span data-dcnode-id="972" instrument_node="">Jazz</span></i><span data-dcnode-id="970" instrument_node=""> was published as a follow-up to </span><i data-dcnode-id="968"><span data-dcnode-id="969" instrument_node="">Beloved</span></i><span data-dcnode-id="967" instrument_node=""> and the second book in a planned trilogy.</span></p><span data-dcnode-id="965" instrument_node=""> </span><p data-dcnode-id="957"><span data-dcnode-id="964" instrument_node="">The next year, 1993, Morrison became the first African American and only the eighth woman to be awarded the Nobel Prize in Literature, primarily for </span><i data-dcnode-id="962"><span data-dcnode-id="963" instrument_node="">Beloved</span></i><span data-dcnode-id="961" instrument_node="">. She was later awarded the National Book Foundation Medal for Distinguished Contribution to American Letters (1996) and the National Humanities Medal (2001). Her first novel after winning the Nobel Prize, </span><i data-dcnode-id="959"><span data-dcnode-id="960" instrument_node="">Paradise</span></i><span data-dcnode-id="958" instrument_node="">, begins with the murder by nine men of four women—women whose individual races are never made entirely clear—at a convent outside of the all-black town of Ruby, Oklahoma. Morrison explores the ways in which the oppressed can become oppressors, the victims victimizers, by laying out the long history of Ruby and its families, from the freed slaves who founded the town after the Civil War to the turbulent social changes set in motion by the Civil Rights movement.</span></p><span data-dcnode-id="956" instrument_node=""> </span><p data-dcnode-id="933"><span data-dcnode-id="955" instrument_node="">Morrison continued publishing into the twenty-first century. Her novel </span><i data-dcnode-id="953"><span data-dcnode-id="954" instrument_node="">Love</span></i><span data-dcnode-id="952" instrument_node=""> (2003) focused on an examination of the titular theme, through the lens of the family experience. She also collaborated with her son Slade on a series of books for children, including </span><i data-dcnode-id="950"><span data-dcnode-id="951" instrument_node="">The Ant or the Grasshopper</span></i><span data-dcnode-id="949" instrument_node=""> (2003) and </span><i data-dcnode-id="947"><span data-dcnode-id="948" instrument_node="">The Lion or the Mouse?</span></i><span data-dcnode-id="946" instrument_node=""> (2003). She also continued to develop nonfiction works, including </span><i data-dcnode-id="944"><span data-dcnode-id="945" instrument_node="">Remember: The Journey to School Integration</span></i><span data-dcnode-id="943" instrument_node=""> (2004), again using a unique approach to take a fresh look at a historical chapter of the African American experience. Morrison also branched into new literary territory in writing the libretto to the opera </span><i data-dcnode-id="941"><span data-dcnode-id="942" instrument_node="">Margaret Garner</span></i><span data-dcnode-id="940" instrument_node=""> (2005), which tells the tale of the slave woman that served as the basis for </span><i data-dcnode-id="938"><span data-dcnode-id="939" instrument_node="">Beloved</span></i><span data-dcnode-id="937" instrument_node=""> The well-reviewed novel </span><i data-dcnode-id="935"><span data-dcnode-id="936" instrument_node="">A Mercy</span></i><span data-dcnode-id="934" instrument_node="">, about early slavery in the Americas, followed in 2008.</span></p><span data-dcnode-id="932" instrument_node=""> </span><p data-dcnode-id="924"><span data-dcnode-id="931" instrument_node="">Awards also continued to stream in for Morrison. She was named to France's Legion of Honour in 2010, and in 2012 she received the US Presidential Medal of Freedom from President Barack Obama. 2012 also saw the publication of her novel </span><i data-dcnode-id="929"><span data-dcnode-id="930" instrument_node="">Home</span></i><span data-dcnode-id="928" instrument_node="">, which shows the effects of racism and post-traumatic stress disorder on a war veteran. Morrison's next novel was </span><i data-dcnode-id="926"><span data-dcnode-id="927" instrument_node="">God Help the Child</span></i><span data-dcnode-id="925" instrument_node=""> (2015), which tackled issues of child abuse along with familiar themes of race and identity. She was presented with the PEN/Saul Bellow Award for Achievement in American Fiction in 2016.</span></p><span data-dcnode-id="923" instrument_node=""> </span></ext-link></sec><p data-dcnode-id="919"><span data-dcnode-id="920" instrument_node=""> </span></p><span data-dcnode-id="918" instrument_node=""> </span><sec data-dcnode-id="580" id="litworks" indexed="true" sec-type="bodytext"><span data-dcnode-id="917" instrument_node=""> </span><title data-dcnode-id="915">Author Works</title><span data-dcnode-id="914" instrument_node=""> </span><ref-list data-dcnode-id="810"><span data-dcnode-id="913" instrument_node=""> </span><title data-dcnode-id="911">Long Fiction:</title><span data-dcnode-id="910" instrument_node=""> </span><ref data-dcnode-id="902"><span data-dcnode-id="909" instrument_node=""> </span><citation data-dcnode-id="904"><span data-dcnode-id="908" instrument_node=""> </span><i data-dcnode-id="906"><span data-dcnode-id="907" instrument_node="">The Bluest Eye</span></i><span data-dcnode-id="905" instrument_node="">, 1970</span></citation><span data-dcnode-id="903" instrument_node=""> </span></ref><span data-dcnode-id="901" instrument_node=""> </span><ref data-dcnode-id="893"><span data-dcnode-id="900" instrument_node=""> </span><citation data-dcnode-id="895"><span data-dcnode-id="899" instrument_node=""> </span><i data-dcnode-id="897"><span data-dcnode-id="898" instrument_node="">Sula</span></i><span data-dcnode-id="896" instrument_node="">, 1973</span></citation><span data-dcnode-id="894" instrument_node=""> </span></ref><span data-dcnode-id="892" instrument_node=""> </span><ref data-dcnode-id="884"><span data-dcnode-id="891" instrument_node=""> </span><citation data-dcnode-id="886"><span data-dcnode-id="890" instrument_node=""> </span><i data-dcnode-id="888"><span data-dcnode-id="889" instrument_node="">Song of Solomon</span></i><span data-dcnode-id="887" instrument_node="">, 1977</span></citation><span data-dcnode-id="885" instrument_node=""> </span></ref><span data-dcnode-id="883" instrument_node=""> </span><ref data-dcnode-id="875"><span data-dcnode-id="882" instrument_node=""> </span><citation data-dcnode-id="877"><span data-dcnode-id="881" instrument_node=""> </span><i data-dcnode-id="879"><span data-dcnode-id="880" instrument_node="">Tar Baby</span></i><span data-dcnode-id="878" instrument_node="">, 1981</span></citation><span data-dcnode-id="876" instrument_node=""> </span></ref><span data-dcnode-id="874" instrument_node=""> </span><ref data-dcnode-id="866"><span data-dcnode-id="873" instrument_node=""> </span><citation data-dcnode-id="868"><span data-dcnode-id="872" instrument_node=""> </span><i data-dcnode-id="870"><span data-dcnode-id="871" instrument_node="">Beloved</span></i><span data-dcnode-id="869" instrument_node="">, 1987</span></citation><span data-dcnode-id="867" instrument_node=""> </span></ref><span data-dcnode-id="865" instrument_node=""> </span><ref data-dcnode-id="857"><span data-dcnode-id="864" instrument_node=""> </span><citation data-dcnode-id="859"><span data-dcnode-id="863" instrument_node=""> </span><i data-dcnode-id="861"><span data-dcnode-id="862" instrument_node="">Jazz</span></i><span data-dcnode-id="860" instrument_node="">, 1992</span></citation><span data-dcnode-id="858" instrument_node=""> </span></ref><span data-dcnode-id="856" instrument_node=""> </span><ref data-dcnode-id="848"><span data-dcnode-id="855" instrument_node=""> </span><citation data-dcnode-id="850"><span data-dcnode-id="854" instrument_node=""> </span><i data-dcnode-id="852"><span data-dcnode-id="853" instrument_node="">Paradise</span></i><span data-dcnode-id="851" instrument_node="">, 1998</span></citation><span data-dcnode-id="849" instrument_node=""> </span></ref><span data-dcnode-id="847" instrument_node=""> </span><ref data-dcnode-id="839"><span data-dcnode-id="846" instrument_node=""> </span><citation data-dcnode-id="841"><span data-dcnode-id="845" instrument_node=""> </span><i data-dcnode-id="843"><span data-dcnode-id="844" instrument_node="">Love</span></i><span data-dcnode-id="842" instrument_node="">, 2003</span></citation><span data-dcnode-id="840" instrument_node=""> </span></ref><span data-dcnode-id="838" instrument_node=""> </span><ref data-dcnode-id="830"><span data-dcnode-id="837" instrument_node=""> </span><citation data-dcnode-id="832"><span data-dcnode-id="836" instrument_node=""> </span><i data-dcnode-id="834"><span data-dcnode-id="835" instrument_node="">A Mercy</span></i><span data-dcnode-id="833" instrument_node="">, 2008</span></citation><span data-dcnode-id="831" instrument_node=""> </span></ref><span data-dcnode-id="829" instrument_node=""> </span><ref data-dcnode-id="821"><span data-dcnode-id="828" instrument_node=""> </span><citation data-dcnode-id="823"><span data-dcnode-id="827" instrument_node=""> </span><i data-dcnode-id="825"><span data-dcnode-id="826" instrument_node="">Home</span></i><span data-dcnode-id="824" instrument_node="">, 2012</span></citation><span data-dcnode-id="822" instrument_node=""> </span></ref><span data-dcnode-id="820" instrument_node=""> </span><ref data-dcnode-id="812"><span data-dcnode-id="819" instrument_node=""> </span><citation data-dcnode-id="814"><span data-dcnode-id="818" instrument_node=""> </span><i data-dcnode-id="816"><span data-dcnode-id="817" instrument_node="">God Help the Child</span></i><span data-dcnode-id="815" instrument_node="">, 2015</span></citation><span data-dcnode-id="813" instrument_node=""> </span></ref><span data-dcnode-id="811" instrument_node=""> </span></ref-list><span data-dcnode-id="809" instrument_node=""> </span><ref-list data-dcnode-id="786"><span data-dcnode-id="808" instrument_node=""> </span><title data-dcnode-id="806">Drama:</title><span data-dcnode-id="805" instrument_node=""> </span><ref data-dcnode-id="797"><span data-dcnode-id="804" instrument_node=""> </span><citation data-dcnode-id="799"><span data-dcnode-id="803" instrument_node=""> </span><i data-dcnode-id="801"><span data-dcnode-id="802" instrument_node="">Dreaming Emmett</span></i><span data-dcnode-id="800" instrument_node="">, pr. 1986</span></citation><span data-dcnode-id="798" instrument_node=""> </span></ref><span data-dcnode-id="796" instrument_node=""> </span><ref data-dcnode-id="788"><span data-dcnode-id="795" instrument_node=""> </span><citation data-dcnode-id="790"><span data-dcnode-id="794" instrument_node=""> </span><i data-dcnode-id="792"><span data-dcnode-id="793" instrument_node="">Desdemona</span></i><span data-dcnode-id="791" instrument_node="">, pr. 2011</span></citation><span data-dcnode-id="789" instrument_node=""> </span></ref><span data-dcnode-id="787" instrument_node=""> </span></ref-list><span data-dcnode-id="785" instrument_node=""> </span><ref-list data-dcnode-id="735"><span data-dcnode-id="784" instrument_node=""> </span><title data-dcnode-id="782">Nonfiction:</title><span data-dcnode-id="781" instrument_node=""> </span><ref data-dcnode-id="773"><span data-dcnode-id="780" instrument_node=""> </span><citation data-dcnode-id="775"><span data-dcnode-id="779" instrument_node=""> </span><i data-dcnode-id="777"><span data-dcnode-id="778" instrument_node="">Playing in the Dark: Whiteness and the Literary Imagination</span></i><span data-dcnode-id="776" instrument_node="">, 1992</span></citation><span data-dcnode-id="774" instrument_node=""> </span></ref><span data-dcnode-id="772" instrument_node=""> </span><ref data-dcnode-id="764"><span data-dcnode-i larence Thomas, and the Construction of Social Reality</span></i><span data-dcnode-id="620" instrument_node="">, 1992</span></citation><span data-dcnode-id="618" instrument_node=""> </span></ref><span data-dcnode-id="616" instrument_node=""> </span><ref data-dcnode-id="608"><span data-dcnode-id="615" instrument_node=""> </span><citation data-dcnode-id="610"><span data-dcnode-id="614" instrument_node=""> </span><i data-dcnode-id="612"><span data-dcnode-id="613" instrument_node="">Deep Sightings and Rescue Missions: Fiction, Essays, and Conversations</span></i><span data-dcnode-id="611" instrument_node="">, 1996 (of Toni Cade Bambara)</span></citation><span data-dcnode-id="609" instrument_node=""> </span></ref><span data-dcnode-id="607" instrument_node=""> </span><ref data-dcnode-id="599"><span data-dcnode-id="606" instrument_node=""> </span><citation data-dcnode-id="601"><span data-dcnode-id="605" instrument_node=""> </span><i data-dcnode-id="603"><span data-dcnode-id="604" instrument_node="">Burn This Book</span></i><span data-dcnode-id="602" instrument_node="">, 2009</span></citation><span data-dcnode-id="600" instrument_node=""> </span></ref><span data-dcnode-id="598" instrument_node=""> </span></ref-list><span data-dcnode-id="596" instrument_node=""> </span><ref-list data-dcnode-id="582"><span data-dcnode-id="595" instrument_node=""> </span><title data-dcnode-id="593">Miscellaneous:</title><span data-dcnode-id="592" instrument_node=""> </span><ref data-dcnode-id="584"><span data-dcnode-id="591" instrument_node=""> </span><citation data-dcnode-id="586"><span data-dcnode-id="590" instrument_node=""> </span><i data-dcnode-id="588"><span data-dcnode-id="589" instrument_node="">Margaret Garner</span></i><span data-dcnode-id="587" instrument_node="">, 2005 (libretto)</span></citation><span data-dcnode-id="585" instrument_node=""> </span></ref><span data-dcnode-id="583" instrument_node=""> </span></ref-list><span data-dcnode-id="581" instrument_node=""> </span></sec><span data-dcnode-id="579" instrument_node=""> </span><sec data-dcnode-id="433" indexed="true" sec-type="hangindent"><span data-dcnode-id="578" instrument_node=""> </span><title data-dcnode-id="576">Bibliography</title><span data-dcnode-id="575" instrument_node=""> </span><ref-list data-dcnode-id="435"><span data-dcnode-id="574" instrument_node=""> </span><ref data-dcnode-id="566"><span data-dcnode-id="573" instrument_node=""> </span><citation citation-type="booksimple" data-dcnode-id="568" xlink:type="simple"><span data-dcnode-id="572" instrument_node="">Bloom, Harold, ed. </span><i data-dcnode-id="570"><span data-dcnode-id="571" instrument_node="">Toni Morrison</span></i><span data-dcnode-id="569" instrument_node="">. New York: Chelsea House, 1990. A selection of criticism on Morrison, with an introduction by Bloom and an extensive bibliography.</span></citation><span data-dcnode-id="567" instrument_node=""> </span></ref><span data-dcnode-id="565" instrument_node=""> </span><ref data-dcnode-id="557"><span data-dcnode-id="564" instrument_node=""> </span><citation citation-type="booksimple" data-dcnode-id="559" xlink:type="simple"><span data-dcnode-id="563" instrument_node="">Conner, Marc C., ed. </span><i data-dcnode-id="561"><span data-dcnode-id="562" instrument_node="">The Aesthetics of Toni Morrison: Speaking the Unspeakable</span></i><span data-dcnode-id="560" instrument_node="">. Jackson: University Press of Mississippi, 2000. A collection of essays concentrating on the imagery and stylistics of Morrison’s writings and her ability to convey the "unspeakable" aspects of African American experience.</span></citation><span data-dcnode-id="558" instrument_node=""> </span></ref><span data-dcnode-id="556" instrument_node=""> </span><ref data-dcnode-id="548"><span data-dcnode-id="555" instrument_node=""> </span><citation citation-type="booksimple" data-dcnode-id="550" xlink:type="simple"><span data-dcnode-id="554" instrument_node="">Fultz, Lucille P. </span><i data-dcnode-id="552"><span data-dcnode-id="553" instrument_node="">Toni Morrison: Playing with Difference</span></i><span data-dcnode-id="551" instrument_node="">. Urbana: University of Illinois Press, 2003. An examination of Morrison’s approach to differences (for example, black and white, male and female, wealth and poverty) in her intricate narratives.</span></citation><span data-dcnode-id="549" instrument_node=""> </span></ref><span data-dcnode-id="547" instrument_node=""> </span><ref data-dcnode-id="539"><span data-dcnode-id="546" instrument_node=""> </span><citation citation-type="booksimple" data-dcnode-id="541" xlink:type="simple"><span data-dcnode-id="545" instrument_node="">Furman, Jan. </span><i data-dcnode-id="543"><span data-dcnode-id="544" instrument_node="">Toni Morrison’s Fiction</span></i><span data-dcnode-id="542" instrument_node="">. Columbia: University of South Carolina Press, 1996. Part of the Understanding Contemporary American Literature series, this book addresses such topics as black womanhood, male consciousness, and community and cultural identity in Morrison’s novels. Includes bibliography and index.</span></citation><span data-dcnode-id="540" instrument_node=""> </span></ref><span data-dcnode-id="538" instrument_node=""> </span><ref data-dcnode-id="530"><span data-dcnode-id="537" instrument_node=""> </span><citation citation-type="booksimple" data-dcnode-id="532" xlink:type="simple"><span data-dcnode-id="536" instrument_node="">Furman, Jan, ed. </span><i data-dcnode-id="534"><span data-dcnode-id="535" instrument_node="">Toni Morrison’s "Song of Solomon."</span></i><span data-dcnode-id="533" instrument_node=""> New York: Oxford University Press, 2003. The essays collected in this volume represent the major critical responses to Morrison’s novel; intended as a starting point for students first encountering the book.</span></citation><span data-dcnode-id="531" instrument_node=""> </span></ref><span data-dcnode-id="529" instrument_node=""> </span><ref data-dcnode-id="521"><span data-dcnode-id="528" instrument_node=""> </span><citation citation-type="website" data-dcnode-id="523" xlink:type="simple"><span data-dcnode-id="527" instrument_node="">Ghansah, Rachel Kaadzi. "The Radical Vision of Toni Morrison." </span><i data-dcnode-id="525"><span data-dcnode-id="526" instrument_node="">The New York Times</span></i><span data-dcnode-id="524" instrument_node="">, 8 Apr. 2015, https:/www.nytimes.com/2015/04/12/magazine/the-radical-vision-of-toni-morrison.html. Accessed 23 Mar. 2017. Provides an overview of Morrison's life and career, focusing on her vision of African American literature.</span></citation><span data-dcnode-id="522" instrument_node=""> </span></ref><span data-dcnode-id="520" instrument_node=""> </span><ref data-dcnode-id="512"><span data-dcnode-id="519" instrument_node=""> </span><citation citation-type="booksimple" data-dcnode-id="514" xlink:type="simple"><span data-dcnode-id="518" instrument_node="">Harris, Trudier. </span><i data-dcnode-id="516"><span data-dcnode-id="517" instrument_node="">Fiction and Folklore: The Novels of Toni Morrison</span></i><span data-dcnode-id="515" instrument_node="">. Knoxville: University of Tennessee Press, 1991. A collection of essays that examine Morrison’s novels from an African and African American mythological and folkloric perspective and examine the archetypes and antiheroes that pervade her stories. An important scholarly guide to understanding the subtext of Morrison’s work.</span></citation><span data-dcnode-id="513" instrument_node=""> </span></ref><span data-dcnode-id="511" instrument_node=""> </span><ref data-dcnode-id="503"><span data-dcnode-id="510" instrument_node=""> </span><citation citation-type="booksimple" data-dcnode-id="505" xlink:type="simple"><span data-dcnode-id="509" instrument_node="">Kubitschek, Missy Dehn. </span><i data-dcnode-id="507"><span data-dcnode-id="508" instrument_node="">Toni Morrison: A Critical Companion</span></i><span data-dcnode-id="506" instrument_node="">. Westport, Conn.: Greenwood Press, 1998. An excellent source of literary criticism. Contains bibliography and index.</span></citation><span data-dcnode-id="504" instrument_node=""> </span></ref><span data-dcnode-id="502" instrument_node=""> </span><ref data-dcnode-id="494"><span data-dcnode-id="501" instrument_node=""> </span><citation citation-type="booksimple" data-dcnode-id="496" xlink:type="simple"><span data-dcnode-id="500" instrument_node="">McKay, Nellie Y., ed. </span><i data-dcnode-id="498"><span data-dcnode-id="499" instrument_node="">Critical Essays on Toni Morrison</span></i><span data-dcnode-id="497" instrument_node="">. Boston: G. K. Hall, 1988. This volume, part of a series on American literature, firmly places Morrison on the list as one of the "most important writers in America." A compilation of reprinted essays by various authors, nine of which are original and written specifically for this publication. Also includes reviews, interviews, and literary criticism of Morrison’s first four novels. No bibliography.</span></citation><span data-dcnode-id="495" instrument_node=""> </span></ref><span data-dcnode-id="493" instrument_node=""> </span><ref data-dcnode-id="485"><span data-dcnode-id="492" instrument_node=""> </span><citation citation-type="booksimple" data-dcnode-id="487" xlink:type="simple"><span data-dcnode-id="491" instrument_node="">Middleton, David L. </span><i data-dcnode-id="489"><span data-dcnode-id="490" instrument_node="">Toni Morrison: An Annotated Bibliography</span></i><span data-dcnode-id="488" instrument_node="">. New York: Garland, 1987. The articles and essays by Morrison and the interviews with her listed here are arranged chronologically to present clearly the evolution of her ideas. Includes critical reviews of her fiction and a listing of honors and awards. Subject index provided.</span></citation><span data-dcnode-id="486" instrument_node=""> </span></ref><span data-dcnode-id="484" instrument_node=""> </span><ref data-dcnode-id="476"><span data-dcnode-id="483" instrument_node=""> </span><citation citation-type="booksimple" data-dcnode-id="478" xlink:type="simple"><span data-dcnode-id="482" instrument_node="">Otten, Terry. </span><i data-dcnode-id="480"><span data-dcnode-id="481" instrument_node="">The Crime of Innocence in the Fiction of Toni Morrison</span></i><span data-dcnode-id="479" instrument_node="">. Columbia: University of Missouri Press, 1989. In this groundbreaking study of Morrison’s first five novels, Otten explores the mythic substance in her writings by tracing the motif of the biblical fall, with close attention to the historical and literary backdrop.</span></citation><span data-dcnode-id="477" instrument_node=""> </span></ref><span data-dcnode-id="475" instrument_node=""> </span><ref data-dcnode-id="467"><span data-dcnode-id="474" instrument_node=""> </span><citation citation-type="booksimple" data-dcnode-id="469" xlink:type="simple"><span data-dcnode-id="473" instrument_node="">Peach, Linden, ed. </span><i data-dcnode-id="471"><span data-dcnode-id="472" instrument_node="">Toni Morrison</span></i><span data-dcnode-id="470" instrument_node="">. New York: St. Martin’s Press, 1998. Focuses on interpretation and criticism of Morrison’s works and examines African American women in literature. Provides bibliography and index.</span></citation><span data-dcnode-id="468" instrument_node=""> </span></ref><span data-dcnode-id="466" instrument_node=""> </span><ref data-dcnode-id="455"><span data-dcnode-id="465" instrument_node=""> </span><citation citation-type="booksimple" data-dcnode-id="457" xlink:type="simple"><span data-dcnode-id="464" instrument_node="">Samuels, Wilfred D., and Clenora Hudson-Weems. </span><i data-dcnode-id="462"><span data-dcnode-id="463" instrument_node="">Toni Morrison</span></i><span data-dcnode-id="461" instrument_node="">. Boston: Twayne, 1990. This study analyzes five of Morrison’s novels, including </span><i data-dcnode-id="459"><span data-dcnode-id="460" instrument_node="">Beloved</span></i><span data-dcnode-id="458" instrument_node="">. The authors explore common themes such as black folklore and mysticism in Morrison’s writings. Contains excerpts from interviews.</span></citation><span data-dcnode-id="456" instrument_node=""> </span></ref><span data-dcnode-id="454" instrument_node=""> </span><ref data-dcnode-id="446"><span data-dcnode-id="453" instrument_node=""> </span><citation citation-type="booksimple" data-dcnode-id="448" xlink:type="simple"><span data-dcnode-id="452" instrument_node="">Tally, Justine, ed. </span><i data-dcnode-id="450"><span data-dcnode-id="451" instrument_node="">The Cambridge Companion to Toni Morrison</span></i><span data-dcnode-id="449" instrument_node="">. Cambridge: Cambridge University, 2007. Morrison’s novels and short stories are discussed in this collection of essays, which delves into questions of gender, race, and class. This volume also offers readers a comprehensive look at the author’s political views and how they manifested themselves in her writing.</span></citation><span data-dcnode-id="447" instrument_node=""> </span></ref><span data-dcnode-id="445" instrument_node=""> </span><ref data-dcnode-id="437"><span data-dcnode-id="444" instrument_node=""> </span><citation citation-type="booksimple" data-dcnode-id="439" xlink:type="simple"><span data-dcnode-id="443" instrument_node="">Tate, Claudia, ed. </span><i data-dcnode-id="441"><span data-dcnode-id="442" instrument_node="">Black Women Writers at Work</span></i><span data-dcnode-id="440" instrument_node="">. New York: Continuum, 1983. This book is made up of interviews with Morrison and other black women writers. The Morrison interview contains some of her most cogent and forthright expressions of her commitment to politics in writing and a black or Afrocentric aesthetic.</span></citation><span data-dcnode-id="438" instrument_node=""> </span></ref><span data-dcnode-id="436" instrument_node=""> </span></ref-list><span data-dcnode-id="434" instrument_node=""> </span></sec><p data-dcnode-id="431"><span data-dcnode-id="432" instrument_node=""> </span></p><p data-dcnode-id="429"><span data-dcnode-id="430" instrument_node=""> </span></p><span data-dcnode-id="428" instrument_node=""> </span></div><span data-dcnode-id="426" instrument_node="">
