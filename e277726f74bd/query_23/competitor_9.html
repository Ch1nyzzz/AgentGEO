</span><div data-dcnode-id="5762"><img alt="" class="alignleft nwbl-author" data-dcnode-id="5763" height="150" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//nwbooklovers.org/wp-content/uploads/2011/02/Dabujaber-150x150.jpg&amp;raw" title="Diana Abu-Jaber" width="150"></div><span data-dcnode-id="5761" instrument_node="">
</span><h3 class="store-name" data-dcnode-id="5759"><span data-dcnode-id="5760" instrument_node="">Diana Abu-Jaber</span></h3><span data-dcnode-id="5758" instrument_node="">
</span><a data-dcnode-id="5756" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.dianaabujaber.com/"><span data-dcnode-id="5757" instrument_node="">www.dianaabujaber.com</span></a><span data-dcnode-id="5755" instrument_node="">
</span><p data-dcnode-id="5721"><span data-dcnode-id="5754" instrument_node="">Diana Abu-Jaber is the author of four novels and numerous short stories, essays and articles published in </span><em data-dcnode-id="5752"><span data-dcnode-id="5753" instrument_node="">Salon</span></em><span data-dcnode-id="5751" instrument_node="">, </span><em data-dcnode-id="5749"><span data-dcnode-id="5750" instrument_node="">The Washington Post</span></em><span data-dcnode-id="5748" instrument_node="">, </span><em data-dcnode-id="5746"><span data-dcnode-id="5747" instrument_node="">Gourmet </span></em><span data-dcnode-id="5745" instrument_node="">and </span><em data-dcnode-id="5743"><span data-dcnode-id="5744" instrument_node="">The New York Times</span></em><span data-dcnode-id="5742" instrument_node="">. Her novels include </span><em data-dcnode-id="5739"><a data-dcnode-id="5740" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.indiebound.org/book/9780393342598/diana-abu-jaber/birds-paradise"><span data-dcnode-id="5741" instrument_node="">Birds of Paradise</span></a></em><span data-dcnode-id="5738" instrument_node="">; </span><em data-dcnode-id="5735"><a data-dcnode-id="5736" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.indiebound.org/book/9780393331554"><span data-dcnode-id="5737" instrument_node="">Origin</span></a></em><span data-dcnode-id="5734" instrument_node="">; </span><em data-dcnode-id="5731"><a data-dcnode-id="5732" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.indiebound.org/book/9780393325546"><span data-dcnode-id="5733" instrument_node="">Crescent</span></a></em><span data-dcnode-id="5730" instrument_node="">, winner of the 2004 PEN Center USA Award for Literary Fiction and the American Book Award; and </span><em data-dcnode-id="5727"><a data-dcnode-id="5728" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.indiebound.org/book/9780393324228"><span data-dcnode-id="5729" instrument_node="">Arabian Jazz</span></a></em><span data-dcnode-id="5726" instrument_node="">, winner of the 1994 Oregon Book Award. Her memoir, </span><em data-dcnode-id="5723"><a data-dcnode-id="5724" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.indiebound.org/book/9781400077762"><span data-dcnode-id="5725" instrument_node="">The Language of Baklava</span></a></em><span data-dcnode-id="5722" instrument_node="">, was honored with a 2006 award from the independent booksellers of the Northwest. A frequent contributor to NPR, she teaches at Portland State University and divides her time between Portland and Miami.</span></p><span data-dcnode-id="5720" instrument_node="">
</span></div><span data-dcnode-id="5717" instrument_node="">
</span><div class="directory-entry" data-dcnode-id="5699"><span data-dcnode-id="5716" instrument_node="">
</span><div data-dcnode-id="5714"><img alt="" class="alignleft nwbl-author" data-dcnode-id="5715" height="150" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//nwbooklovers.org/wp-content/uploads/2014/01/Alcala-150x150.jpg&amp;raw" title="Kathleen Alcalá" width="150"></div><span data-dcnode-id="5713" instrument_node="">
</span><h3 class="store-name" data-dcnode-id="5711"><span data-dcnode-id="5712" instrument_node="">Kathleen Alcalá</span></h3><span data-dcnode-id="5710" instrument_node="">
</span><a data-dcnode-id="5708" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.kathleenalcala.com/"><span data-dcnode-id="5709" instrument_node="">www.kathleenalcala.com</span></a><span data-dcnode-id="5707" instrument_node="">
</span><p data-dcnode-id="5701"><span data-dcnode-id="5706" instrument_node="">Kathleen Alcalá is the author of a short story collection, three novels set in 19th Century Mexico and the Southwest, and a collection of essays based on her family history. Ursula K. Le Guin said of her first collection, “This is a book of wonders … The kingdom of Borges and García Marquez lie just over the horizon, but this landscape of desert towns and dreaming hearts … is Alcalá-land. It lies just across the border between Mexico and California, across the border between the living and the dead, across all the borders – a true new world.” Alcalá’s novel </span><em data-dcnode-id="5703"><a data-dcnode-id="5704" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.indiebound.org/book/9780156005685"><span data-dcnode-id="5705" instrument_node="">Spirits of the Ordinary: A Tale of Casas Grandes</span></a></em><span data-dcnode-id="5702" instrument_node=""> was honored in 1998 by the independent booksellers of the Northwest. She teaches fiction at the Northwest Institute of Literary Arts on Whidbey Island.</span></p><span data-dcnode-id="5700" instrument_node="">
</span></div><span data-dcnode-id="5697" instrument_node="">
</span><div class="directory-entry" data-dcnode-id="5667"><span data-dcnode-id="5696" instrument_node="">
</span><div data-dcnode-id="5694"><img alt="" class="alignleft nwbl-author" data-dcnode-id="5695" height="150" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//nwbooklovers.org/wp-content/uploads/2014/01/Alcosser-150x150.jpg&amp;raw" title="Sandra Alcosser" width="150"></div><span data-dcnode-id="5693" instrument_node="">
</span><h3 class="store-name" data-dcnode-id="5691"><span data-dcnode-id="5692" instrument_node="">Sandra Alcosser</span></h3><span data-dcnode-id="5690" instrument_node="">
</span><p data-dcnode-id="5669"><span data-dcnode-id="5689" instrument_node="">Sandra Alcosser grew up in South Bend, Indiana and moved to Montana thirty years ago to work with the Montana Arts Council. She is the author of </span><em data-dcnode-id="5686"><a data-dcnode-id="5687" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.indiebound.org/book/9781555972738"><span data-dcnode-id="5688" instrument_node="">Except by Nature</span></a></em><span data-dcnode-id="5685" instrument_node="">, which was honored in 1999 with the William Stafford Memorial Poetry Award from the independent booksellers of the Northwest. The booksellers called her poems “full of life lived just a little on the wild side.” Poems from Alcosser’s seven books have appeared in </span><em data-dcnode-id="5683"><span data-dcnode-id="5684" instrument_node="">The American Poetry Review</span></em><span data-dcnode-id="5682" instrument_node="">, </span><em data-dcnode-id="5680"><span data-dcnode-id="5681" instrument_node="">The New Yorker</span></em><span data-dcnode-id="5679" instrument_node="">, </span><em data-dcnode-id="5677"><span data-dcnode-id="5678" instrument_node="">The Paris Review</span></em><span data-dcnode-id="5676" instrument_node="">, </span><em data-dcnode-id="5674"><span data-dcnode-id="5675" instrument_node="">The Yale Review</span></em><span data-dcnode-id="5673" instrument_node=""> and </span><em data-dcnode-id="5671"><span data-dcnode-id="5672" instrument_node="">The Pushcart Prize Anthology</span></em><span data-dcnode-id="5670" instrument_node="">. She is a professor of poetry, fiction and feminist poetics at San Diego State University and divides her time between San Diego and Florence, Montana. She was Montana’s Poet Laureate from 2005 – 2007.</span></p><span data-dcnode-id="5668" instrument_node="">
</span></div><span data-dcnode-id="5665" instrument_node="">
</span><div class="directory-entry" data-dcnode-id="5643"><span data-dcnode-id="5664" instrument_node="">
</span><div data-dcnode-id="5662"><img alt="" class="alignleft nwbl-author" data-dcnode-id="5663" height="150" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//nwbooklovers.org/wp-content/uploads/2011/02/Alexie-150x150.jpg&amp;raw" title="Sherman Alexie" width="150"></div><span data-dcnode-id="5661" instrument_node="">
</span><h3 class="store-name" data-dcnode-id="5659"><span data-dcnode-id="5660" instrument_node="">Sherman Alexie</span></h3><span data-dcnode-id="5658" instrument_node="">
</span><a data-dcnode-id="5656" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.fallsapart.com/"><span data-dcnode-id="5657" instrument_node="">www.fallsapart.com</span></a><span data-dcnode-id="5655" instrument_node="">
</span><p data-dcnode-id="5645"><span data-dcnode-id="5654" instrument_node="">Sherman Alexie grew up on the Spokane Indian Reservation in Wellpinit, WA, about 50 miles northwest of Spokane, WA. As a teenager, Alexie decided to attend high school off the reservation in nearby Reardan. At Reardan High he was the only Indian, except for the school mascot. This experience inspired his first young adult novel,</span><em data-dcnode-id="5650"><span data-dcnode-id="5653" instrument_node=""> </span><a data-dcnode-id="5651" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.indiebound.org/book/9780316013697"><span data-dcnode-id="5652" instrument_node="">The Absolutely True Diary of a Part-time Indian</span></a></em><span data-dcnode-id="5649" instrument_node="">, which won a PNBA Award in 2008 and was a 2007 National Book Award Winner. A recipient of numerous awards for his work as a poet, novelist, short story writer and performer, </span><em data-dcnode-id="5647"><span data-dcnode-id="5648" instrument_node="">The New York Times Book Review</span></em><span data-dcnode-id="5646" instrument_node=""> called Alexie “one of the major lyric voices of our time.” Alexie lives in Seattle with his wife and two sons.</span></p><span data-dcnode-id="5644" instrument_node="">
</span></div><span data-dcnode-id="5641" instrument_node="">
</span><div class="directory-entry" data-dcnode-id="5608"><span data-dcnode-id="5640" instrument_node="">
</span><div data-dcnode-id="5638"><img alt="" class="alignleft nwbl-author" data-dcnode-id="5639" height="150" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//nwbooklovers.org/wp-content/uploads/2014/01/Baker-150x150.jpg&amp;raw" title="Keith Baker" width="150"></div><span data-dcnode-id="5637" instrument_node="">
</span><h3 class="store-name" data-dcnode-id="5635"><span data-dcnode-id="5636" instrument_node="">Keith Baker</span></h3><span data-dcnode-id="5634" instrument_node="">
</span><a data-dcnode-id="5632" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.keithbakerbooks.com/"><span data-dcnode-id="5633" instrument_node="">www.keithbakerbooks.com</span></a><span data-dcnode-id="5631" instrument_node="">
</span><p data-dcnode-id="5610"><span data-dcnode-id="5630" instrument_node="">Keith Baker grew up in Oregon and graduated from Eastern Oregon State College. After seven years of teaching elementary school, he returned to school to study illustration. Baker’s honors and awards include Parents’ Choice Awards for illustration for </span><em data-dcnode-id="5627"><a data-dcnode-id="5628" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.indiebound.org/book/9780152241346"><span data-dcnode-id="5629" instrument_node="">The Dove’s Letter</span></a></em><span data-dcnode-id="5626" instrument_node=""> and </span><em data-dcnode-id="5623"><a data-dcnode-id="5624" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.indiebound.org/book/9780152001223"><span data-dcnode-id="5625" instrument_node="">Who is the Beast?</span></a></em><span data-dcnode-id="5622" instrument_node="">; a Golden Kite Award for </span><em data-dcnode-id="5619"><a data-dcnode-id="5620" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.indiebound.org/book/9780152019518"><span data-dcnode-id="5621" instrument_node="">Big Fat Hen</span></a></em><span data-dcnode-id="5618" instrument_node="">; and an award from the independent booksellers of the Northwest for </span><em data-dcnode-id="5615"><a data-dcnode-id="5616" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.indiebound.org/book/9780152009830"><span data-dcnode-id="5617" instrument_node="">The Magic Fan</span></a></em><span data-dcnode-id="5614" instrument_node=""> (1990), which was also a </span><em data-dcnode-id="5612"><span data-dcnode-id="5613" instrument_node="">School Library Journal</span></em><span data-dcnode-id="5611" instrument_node=""> best book of the year. A recipient of a UNICEF-Ezra Jack Keats International Award for excellence in children’s illustration, Baker lives in Seattle.</span></p><span data-dcnode-id="5609" instrument_node="">
</span></div><span data-dcnode-id="5606" instrument_node="">
</span><div class="directory-entry" data-dcnode-id="5567"><span data-dcnode-id="5605" instrument_node="">
</span><div data-dcnode-id="5603"><img alt="" class="alignleft nwbl-author" data-dcnode-id="5604" height="150" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//nwbooklovers.org/wp-content/uploads/2014/01/Barnes-150x150.jpg&amp;raw" title="Kim Barnes" width="150"></div><span data-dcnode-id="5602" instrument_node="">
</span><h3 class="store-name" data-dcnode-id="5600"><span data-dcnode-id="5601" instrument_node="">Kim Barnes</span></h3><span data-dcnode-id="5599" instrument_node="">
</span><a data-dcnode-id="5597" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.kimbarnes.com/"><span data-dcnode-id="5598" instrument_node="">www.kimbarnes.com</span></a><span data-dcnode-id="5596" instrument_node="">
</span><p data-dcnode-id="5569"><span data-dcnode-id="5595" instrument_node="">Kim Barnes spent the majority of her childhood in the isolated settlements and cedar camps along the North Fork of Idaho’s Clearwater River. </span><em data-dcnode-id="5592"><a data-dcnode-id="5593" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.indiebound.org/book/9780385478212"><span data-dcnode-id="5594" instrument_node="">In the Wilderness: Coming of Age in Unknown Country</span></a></em><span data-dcnode-id="5591" instrument_node="">, her first memoir, was nominated for the Pulitzer Prize, received a PEN/Jerard Fund Award and a PNBA Award. Barnes is the author of three novels: </span><em data-dcnode-id="5588"><a data-dcnode-id="5589" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.indiebound.org/book/9780399149672"><span data-dcnode-id="5590" instrument_node="">Finding Caruso</span></a></em><span data-dcnode-id="5587" instrument_node="">; </span><em data-dcnode-id="5584"><a data-dcnode-id="5585" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//nwbooklovers.org/authors/%253Ca%2520href%3D"><span data-dcnode-id="5586" instrument_node="">A Country Called Home</span></a></em><span data-dcnode-id="5583" instrument_node="">, winner of the 2009 PEN Center USA Literary Award in Fiction and named a Best Book of 2008 by </span><em data-dcnode-id="5581"><span data-dcnode-id="5582" instrument_node="">The Oregonian</span></em><span data-dcnode-id="5580" instrument_node="">; and </span><em data-dcnode-id="5577"><a data-dcnode-id="5578" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.indiebound.org/book/9780307474698"><span data-dcnode-id="5579" instrument_node="">In the Kingdom of Men</span></a></em><span data-dcnode-id="5576" instrument_node="">, a story set in 1960s Saudi Arabia, listed among the Best Books of 2012 by </span><em data-dcnode-id="5574"><span data-dcnode-id="5575" instrument_node="">San Francisco Chronicle</span></em><span data-dcnode-id="5573" instrument_node=""> and </span><em data-dcnode-id="5571"><span data-dcnode-id="5572" instrument_node="">The Seattle Times</span></em><span data-dcnode-id="5570" instrument_node="">. Her essays, stories, and poems have appeared in a number of journals and anthologies. She teaches writing at the University of Idaho and lives with her husband, the poet Robert Wrigley, on Moscow Mountain.</span></p><span data-dcnode-id="5568" instrument_node="">
</span></div><span data-dcnode-id="5565" instrument_node="">
</span><div class="directory-entry" data-dcnode-id="5531"><span data-dcnode-id="5564" instrument_node="">
</span><div data-dcnode-id="5562"><img alt="" class="alignleft nwbl-author" data-dcnode-id="5563" height="150" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//nwbooklovers.org/wp-content/uploads/2014/01/berger-150x150.jpg&amp;raw" title="Barbara Berger" width="150"></div><span data-dcnode-id="5561" instrument_node="">
</span><h3 class="store-name" data-dcnode-id="5559"><span data-dcnode-id="5560" instrument_node="">Barbara Berger</span></h3><span data-dcnode-id="5558" instrument_node="">
</span><a data-dcnode-id="5556" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//bhberger.com/"><span data-dcnode-id="5557" instrument_node="">bhberger.com</span></a><span data-dcnode-id="5555" instrument_node="">
</span><p data-dcnode-id="5533"><span data-dcnode-id="5554" instrument_node="">Barbara Helen Berger grew up in Seattle loving to draw and paint. For ten years, she worked as a painter with gallery shows in Seattle and in 1980 she turned her focus to children’s books. She’s the author and illustrator of ten books and the recipient of numerous awards including twice a Washington State Governor’s Writers Award. </span><em data-dcnode-id="5551"><a data-dcnode-id="5552" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.indiebound.org/book/9780698113947"><span data-dcnode-id="5553" instrument_node="">Grandfather Twilight</span></a></em><span data-dcnode-id="5550" instrument_node="">, her best-known picture book, has been called a goodnight classic and </span><em data-dcnode-id="5547"><a data-dcnode-id="5548" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.indiebound.org/book/9780698118638"><span data-dcnode-id="5549" instrument_node="">A Lot of Otters</span></a></em><span data-dcnode-id="5546" instrument_node=""> won a 1998 PNBA Award. Berger’s personal essays and memoir have appeared in </span><em data-dcnode-id="5544"><span data-dcnode-id="5545" instrument_node="">Exhibition</span></em><span data-dcnode-id="5543" instrument_node="">, </span><em data-dcnode-id="5541"><span data-dcnode-id="5542" instrument_node="">Crone Chronicles</span></em><span data-dcnode-id="5540" instrument_node="">, </span><em data-dcnode-id="5538"><span data-dcnode-id="5539" instrument_node="">Snowy Egret</span></em><span data-dcnode-id="5537" instrument_node=""> and in two anthologies. In recent years she’s been a frequent contributor to </span><em data-dcnode-id="5535"><span data-dcnode-id="5536" instrument_node="">Parabola</span></em><span data-dcnode-id="5534" instrument_node="">. Berger lives on Bainbridge Island.</span></p><span data-dcnode-id="5532" instrument_node="">
</span></div><span data-dcnode-id="5529" instrument_node="">
</span><div class="directory-entry" data-dcnode-id="5481"><span data-dcnode-id="5528" instrument_node="">
</span><div data-dcnode-id="5526"><img alt="" class="alignleft nwbl-author" data-dcnode-id="5527" height="150" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//nwbooklovers.org/wp-content/uploads/2011/02/Bespiel-150x150.jpg&amp;raw" title="David Biespiel" width="150"></div><span data-dcnode-id="5525" instrument_node="">
</span><h3 class="store-name" data-dcnode-id="5523"><span data-dcnode-id="5524" instrument_node="">David Biespiel</span></h3><span data-dcnode-id="5522" instrument_node="">
</span><a data-dcnode-id="5520" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//davidbiespielbooks.wordpress.com/"><span data-dcnode-id="5521" instrument_node="">davidbiespielbooks.wordpress.com</span></a><span data-dcnode-id="5519" instrument_node="">
</span><p data-dcnode-id="5483"><span data-dcnode-id="5518" instrument_node="">David Biespiel is the founder and executive director of the Attic Writers’ Workshop in Portland. His books include </span><em data-dcnode-id="5515"><a data-dcnode-id="5516" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.indiebound.org/book/9781880238349"><span data-dcnode-id="5517" instrument_node="">Shattering Air</span></a></em><span data-dcnode-id="5514" instrument_node="">, </span><em data-dcnode-id="5511"><a data-dcnode-id="5512" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.indiebound.org/book/9780295983516"><span data-dcnode-id="5513" instrument_node="">Wild Civility</span></a></em><span data-dcnode-id="5510" instrument_node="">, </span><em data-dcnode-id="5507"><a data-dcnode-id="5508" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.indiebound.org/book/9780295992839"><span data-dcnode-id="5509" instrument_node="">The Book of Men and Women</span></a></em><span data-dcnode-id="5506" instrument_node=""> and </span><em data-dcnode-id="5503"><a data-dcnode-id="5504" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.indiebound.org/book/9780870710988"><span data-dcnode-id="5505" instrument_node="">Long Journey: Contemporary Northwest Poets</span></a></em><span data-dcnode-id="5502" instrument_node="">, for which he was honored with a 2007 award from the independent booksellers of the Northwest. He currently divides his teaching among three universities: Wake Forest University, Oregon State University and Pacific Lutheran University. Biespiel is a contributor to </span><em data-dcnode-id="5500"><span data-dcnode-id="5501" instrument_node="">American Poetry Review</span></em><span data-dcnode-id="5499" instrument_node="">, </span><em data-dcnode-id="5497"><span data-dcnode-id="5498" instrument_node="">Parnassus, Poetry</span></em><span data-dcnode-id="5496" instrument_node="">, </span><em data-dcnode-id="5494"><span data-dcnode-id="5495" instrument_node="">Slate</span></em><span data-dcnode-id="5493" instrument_node="">, </span><em data-dcnode-id="5491"><span data-dcnode-id="5492" instrument_node="">The New York Times Book Review</span></em><span data-dcnode-id="5490" instrument_node=""> and </span><em data-dcnode-id="5488"><span data-dcnode-id="5489" instrument_node="">The New Republic</span></em><span data-dcnode-id="5487" instrument_node="">. Since 2002 he has been a poetry columnist for </span><em data-dcnode-id="5485"><span data-dcnode-id="5486" instrument_node="">The Oregonian</span></em><span data-dcnode-id="5484" instrument_node="">.</span></p><span data-dcnode-id="5482" instrument_node="">
</span></div><span data-dcnode-id="5479" instrument_node="">
</span><div class="directory-entry" data-dcnode-id="5457"><span data-dcnode-id="5478" instrument_node="">
</span><div data-dcnode-id="5476"><img alt="" class="alignleft nwbl-author" data-dcnode-id="5477" height="150" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//nwbooklovers.org/wp-content/uploads/2014/01/Blew-150x150.jpg&amp;raw" title="Mary Clearman Blew" width="150"></div><span data-dcnode-id="5475" instrument_node="">
</span><h3 class="store-name" data-dcnode-id="5473"><span data-dcnode-id="5474" instrument_node="">Mary Clearman Blew</span></h3><span data-dcnode-id="5472" instrument_node="">
</span><p data-dcnode-id="5459"><span data-dcnode-id="5471" instrument_node="">Mary Clearman Blew grew up on a small cattle ranch in Montana, on the site of her great-grandfather’s 1882 homestead. Her memoir </span><em data-dcnode-id="5468"><a data-dcnode-id="5469" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.indiebound.org/book/9780806133218"><span data-dcnode-id="5470" instrument_node="">All But the Waltz: A Memoir of Five Generations in the Life of a Montana Family</span></a></em><span data-dcnode-id="5467" instrument_node=""> and her short story collection, </span><em data-dcnode-id="5465"><span data-dcnode-id="5466" instrument_node="">Runaway</span></em><span data-dcnode-id="5464" instrument_node="">, were both honored by the independent booksellers of the Northwest (in 1992 and 1991, respectively). A novel, </span><em data-dcnode-id="5461"><a data-dcnode-id="5462" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.indiebound.org/book/9780803215887"><span data-dcnode-id="5463" instrument_node="">Jackalope Dreams</span></a></em><span data-dcnode-id="5460" instrument_node="">, released in 2008, won the Western Heritage Center’s prize for fiction. Other awards include the Mahan Award for contributions to Montana literature, the Idaho Humanities Council’s 2001 Award for Outstanding Achievement in the Humanities, a Handcart Award for Biography, and the Western Literature Association’s Lifetime Achievement Award. She has taught creative writing at the University of Idaho since 1994.</span></p><span data-dcnode-id="5458" instrument_node="">
</span></div><span data-dcnode-id="5455" instrument_node="">
</span><div class="directory-entry" data-dcnode-id="5427"><span data-dcnode-id="5454" instrument_node="">
</span><div data-dcnode-id="5452"><img alt="" class="alignleft nwbl-author" data-dcnode-id="5453" height="150" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//nwbooklovers.org/wp-content/uploads/2013/01/blomgren150x150.jpg&amp;raw" title="Jennifer Blomgren" width="150"></div><span data-dcnode-id="5451" instrument_node="">
</span><h3 class="store-name" data-dcnode-id="5449"><span data-dcnode-id="5450" instrument_node="">Jennifer Blomgren</span></h3><span data-dcnode-id="5448" instrument_node="">
</span><p data-dcnode-id="5429"><span data-dcnode-id="5447" instrument_node="">Jennifer Blomgren is a native Pacific Northwesterner who as a child continually bedeviled her mother by tackling large and very messy art projects in the kitchen. Blomgren worked as a registered nurse before becoming a full-time author and artist. She has a greeting card business and has written four children’s books: </span><em data-dcnode-id="5444"><a data-dcnode-id="5445" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.indiebound.org/book/9781564778338"><span data-dcnode-id="5446" instrument_node="">The Tale of Alice’s Quilt</span></a></em><span data-dcnode-id="5443" instrument_node="">, </span><em data-dcnode-id="5440"><a data-dcnode-id="5441" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.indiebound.org/book/9781570617539"><span data-dcnode-id="5442" instrument_node="">Where Would I Be in an Evergreen Tree?</span></a></em><span data-dcnode-id="5439" instrument_node="">, </span><em data-dcnode-id="5436"><a data-dcnode-id="5437" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.indiebound.org/book/9781570618451"><span data-dcnode-id="5438" instrument_node="">Why Do I Sing?: Animal Songs of the Pacific Northwest</span></a></em><span data-dcnode-id="5435" instrument_node=""> and </span><em data-dcnode-id="5431"><a data-dcnode-id="5433" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.indiebound.org/book/9781570615931"><span data-dcnode-id="5434" instrument_node="">Where Do I Sleep? A Pacific Northwest Lullaby</span></a><span data-dcnode-id="5432" instrument_node="">,</span></em><span data-dcnode-id="5430" instrument_node=""> which was illustrated by Andrea Gabriel and honored in 2002 by the independent booksellers of the Northwest.</span></p><span data-dcnode-id="5428" instrument_node="">
</span></div><span data-dcnode-id="5425" instrument_node="">
</span><div class="directory-entry" data-dcnode-id="5398"><span data-dcnode-id="5424" instrument_node="">
</span><div data-dcnode-id="5422"><img alt="" class="alignleft nwbl-author" data-dcnode-id="5423" height="150" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//nwbooklovers.org/wp-content/uploads/2011/01/Boling-150x150.jpg&amp;raw" title="Dave Boling" width="150"></div><span data-dcnode-id="5421" instrument_node="">
</span><h3 class="store-name" data-dcnode-id="5419"><span data-dcnode-id="5420" instrument_node="">Dave Boling</span></h3><span data-dcnode-id="5418" instrument_node="">
</span><a data-dcnode-id="5416" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.daveboling.com/"><span data-dcnode-id="5417" instrument_node="">www.daveboling.com</span></a><span data-dcnode-id="5415" instrument_node="">
</span><p data-dcnode-id="5400"><span data-dcnode-id="5414" instrument_node="">A native of the Chicago area, Dave Boling is a novelist and sports columnist in Washington. According to the </span><em data-dcnode-id="5412"><span data-dcnode-id="5413" instrument_node="">Tacoma News Tribune</span></em><span data-dcnode-id="5411" instrument_node="">, he wrote portions of his debut novel, </span><em data-dcnode-id="5409"><span data-dcnode-id="5410" instrument_node="">Guernica</span></em><span data-dcnode-id="5408" instrument_node="">, in airports during layovers, on long flights and in hotel rooms. A work of historical fiction set during the Spanish Civil War, </span><em data-dcnode-id="5405"><a data-dcnode-id="5406" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.indiebound.org/book/9781400108732"><span data-dcnode-id="5407" instrument_node="">Guernica</span></a></em><span data-dcnode-id="5404" instrument_node=""> won a PNBA Award in 2009 and was also a finalist for a Washington State Book Award. “Boling writes with a reporter’s eye and a novelist’s heart and imagination,” says </span><em data-dcnode-id="5402"><span data-dcnode-id="5403" instrument_node="">The Oregonian</span></em><span data-dcnode-id="5401" instrument_node="">.</span></p><span data-dcnode-id="5399" instrument_node="">
</span></div><span data-dcnode-id="5396" instrument_node="">
</span><div class="directory-entry" data-dcnode-id="5367"><span data-dcnode-id="5395" instrument_node="">
</span><div data-dcnode-id="5393"><img alt="" class="alignleft nwbl-author" data-dcnode-id="5394" height="150" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//nwbooklovers.org/wp-content/uploads/2014/01/braasch-150x150.jpg&amp;raw" title="Gary Braasch" width="150"></div><span data-dcnode-id="5392" instrument_node="">
</span><h3 class="store-name" data-dcnode-id="5390"><span data-dcnode-id="5391" instrument_node="">Gary Braasch</span></h3><span data-dcnode-id="5389" instrument_node="">
</span><p data-dcnode-id="5369"><span data-dcnode-id="5388" instrument_node="">Gary Braasch is a nature and environmental photojournalist who was awarded the Ansel Adams Award for conservation photography by the Sierra Club and named Outstanding Nature Photographer by the North American Nature Photography Association. Braasch may be best known for </span><em data-dcnode-id="5385"><a data-dcnode-id="5386" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.indiebound.org/book/9780520260252"><span data-dcnode-id="5387" instrument_node="">Earth Under Fire: How Global Warming is Changing the World</span></a></em><span data-dcnode-id="5384" instrument_node="">, for which he traveled to 22 nations on seven continents. Braasch wrote a multiple-award winning companion book for middle school kids with Lynne Cherry, about climate science and citizen science, </span><em data-dcnode-id="5381"><a data-dcnode-id="5382" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.indiebound.org/book/9781584691037"><span data-dcnode-id="5383" instrument_node="">How We Know What We Know About Our Changing Climate</span></a></em><span data-dcnode-id="5380" instrument_node="">. His other books include </span><em data-dcnode-id="5377"><a data-dcnode-id="5378" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.indiebound.org/book/9780817454418"><span data-dcnode-id="5379" instrument_node="">Photographing the Patterns of Nature</span></a></em><span data-dcnode-id="5376" instrument_node="">; </span><em data-dcnode-id="5374"><span data-dcnode-id="5375" instrument_node="">Entering the Grove</span></em><span data-dcnode-id="5373" instrument_node="">, with essays by Kim Stafford; and </span><em data-dcnode-id="5371"><span data-dcnode-id="5372" instrument_node="">Secrets of the Old Growth Forest</span></em><span data-dcnode-id="5370" instrument_node="">, with David Kelly, which was honored by the independent booksellers of the Northwest in 1989. Braasch lives in Portland.</span></p><span data-dcnode-id="5368" instrument_node="">
</span></div><span data-dcnode-id="5365" instrument_node="">
</span><div class="directory-entry" data-dcnode-id="5350"><span data-dcnode-id="5364" instrument_node="">
</span><div data-dcnode-id="5362"><img alt="" class="alignleft nwbl-author" data-dcnode-id="5363" height="150" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//nwbooklovers.org/wp-content/uploads/2014/01/Brown-150x150.jpg&amp;raw" title="Rebecca Brown" width="150"></div><span data-dcnode-id="5361" instrument_node="">
</span><h3 class="store-name" data-dcnode-id="5359"><span data-dcnode-id="5360" instrument_node="">Rebecca Brown</span></h3><span data-dcnode-id="5358" instrument_node="">
</span><p data-dcnode-id="5352"><span data-dcnode-id="5357" instrument_node="">Seattle’s Rebecca Brown has 11 books to her credit, but she also is well known for her teaching, activism and outreach. Brown has taught in academic and community settings for more than 30 years. She was the first writer in residence at Richard Hugo House and has taught there frequently ever since. She is the co-founder of the Jack Straw Writers Program and served as the creative director of literature at Centrum in Port Townsend. Brown’s best-known work is </span><em data-dcnode-id="5354"><a data-dcnode-id="5355" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.indiebound.org/book/9780060926533"><span data-dcnode-id="5356" instrument_node="">The Gifts of the Body</span></a></em><span data-dcnode-id="5353" instrument_node="">, a haunting novel about an AIDS caregiver. It was honored in 1995 by the independent booksellers of the Northwest.</span></p><span data-dcnode-id="5351" instrument_node="">
</span></div><span data-dcnode-id="5348" instrument_node="">
</span><div class="directory-entry" data-dcnode-id="5309"><span data-dcnode-id="5347" instrument_node="">
</span><div data-dcnode-id="5345"><img alt="" class="alignleft nwbl-author" data-dcnode-id="5346" height="150" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//nwbooklovers.org/wp-content/uploads/2011/02/Caletti-150x150.jpg&amp;raw" title="Deb Caletti" width="150"></div><span data-dcnode-id="5344" instrument_node="">
</span><h3 class="store-name" data-dcnode-id="5342"><span data-dcnode-id="5343" instrument_node="">Deb Caletti</span></h3><span data-dcnode-id="5341" instrument_node="">
</span><a data-dcnode-id="5339" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//debcaletti.com/"><span data-dcnode-id="5340" instrument_node="">debcaletti.com</span></a><span data-dcnode-id="5338" instrument_node="">
</span><p data-dcnode-id="5311"><span data-dcnode-id="5337" instrument_node="">Deb Caletti is the award-winning young adult author of a dozen books, including </span><em data-dcnode-id="5334"><a data-dcnode-id="5335" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.indiebound.org/book/9781416957812"><span data-dcnode-id="5336" instrument_node="">The Queen of Everything</span></a></em><span data-dcnode-id="5333" instrument_node="">;</span><em data-dcnode-id="5329"><span data-dcnode-id="5332" instrument_node=""> </span><a data-dcnode-id="5330" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.indiebound.org/book/9781416957836"><span data-dcnode-id="5331" instrument_node="">Honey, Baby, Sweetheart</span></a></em><span data-dcnode-id="5328" instrument_node="">, which was honored with an award from the independent booksellers of the Northwest in 2005; </span><em data-dcnode-id="5325"><a data-dcnode-id="5326" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.indiebound.org/book/9781416957829"><span data-dcnode-id="5327" instrument_node="">Wild Roses</span></a></em><span data-dcnode-id="5324" instrument_node="">; </span><em data-dcnode-id="5321"><a data-dcnode-id="5322" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.indiebound.org/book/9781416910060"><span data-dcnode-id="5323" instrument_node="">The Nature of Jade</span></a></em><span data-dcnode-id="5320" instrument_node="">; </span><em data-dcnode-id="5317"><a data-dcnode-id="5318" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.indiebound.org/book/9781416910084"><span data-dcnode-id="5319" instrument_node="">The Fortunes of Indigo Skye</span></a></em><span data-dcnode-id="5316" instrument_node="">; and </span><em data-dcnode-id="5313"><a data-dcnode-id="5314" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.indiebound.org/book/9781416959410"><span data-dcnode-id="5315" instrument_node="">The Secret Life of Prince Charming</span></a></em><span data-dcnode-id="5312" instrument_node="">. Caletti grew up in the San Francisco Bay area and earned her journalism degree from the University of Washington in Seattle. When Caletti is not writing books or reading them, she is a painter and a lyricist and speaks widely to audiences on writing and life as an author. Caletti lives with her family in Seattle.</span></p><span data-dcnode-id="5310" instrument_node="">
</span></div><span data-dcnode-id="5307" instrument_node="">
</span><div class="directory-entry" data-dcnode-id="5220"><span data-dcnode-id="5306" instrument_node="">
</span><div data-dcnode-id="5304"><img alt="" class="alignleft nwbl-author" data-dcnode-id="5305" height="150" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//nwbooklovers.org/wp-content/uploads/2014/01/Canty-150x150.jpg&amp;raw" title="Kevin Canty" width="150"></div><span data-dcnode-id="5303" instrument_node="">
</span><h3 class="store-name" data-dcnode-id="5301"><span data-dcnode-id="5302" instrument_node="">Kevin Canty</span></h3><span data-dcnode-id="5300" instrument_node="">
</span><a data-dcnode-id="5298" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.kevincanty.net/"><span data-dcnode-id="5299" instrument_node="">www.kevincanty.net</span></a><span data-dcnode-id="5297" instrument_node="">
</span><p data-dcnode-id="5222"><span data-dcnode-id="5296" instrument_node="">Kevin Canty is the author of three collections of short stories (</span><em data-dcnode-id="5293"><a data-dcnode-id="5294" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.indiebound.org/book/9780307389213"><span data-dcnode-id="5295" instrument_node="">Where the Money Went</span></a></em><span data-dcnode-id="5292" instrument_node="">, </span><em data-dcnode-id="5289"><a data-dcnode-id="5290" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.indiebound.org/book/9780375708008"><span data-dcnode-id="5291" instrument_node="">Honeymoon: And Other Stories</span></a></em><span data-dcnode-id="5288" instrument_node=""> and </span><em data-dcnode-id="5285"><a data-dcnode-id="5286" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.indiebound.org/book/9780679763949"><span data-dcnode-id="5287" instrument_node="">A Stranger In This World</span></a></em><span data-dcnode-id="5284" instrument_node="">) and four novels (</span><em data-dcnode-id="5281"><a data-dcnode-id="5282" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.indiebound.org/book/9780385533300"><span data-dcnode-id="5283" instrument_node="">Everything</span></a></em><span data-dcnode-id="5280" instrument_node="">, </span><em data-dcnode-id="5277"><a data-dcnode-id="5278" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.indiebound.org/book/9780375707995"><span data-dcnode-id="5279" instrument_node="">Nine Below Zero</span></a></em><span data-dcnode-id="5276" instrument_node="">, </span><em data-dcnode-id="5273"><a data-dcnode-id="5274" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.indiebound.org/book/9780679776529"><span data-dcnode-id="5275" instrument_node="">Into the Great Wide Open</span></a></em><span data-dcnode-id="5272" instrument_node=""> and </span><em data-dcnode-id="5269"><a data-dcnode-id="5270" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.indiebound.org/book/9781400078554"><span data-dcnode-id="5271" instrument_node="">Winslow in Love</span></a></em><span data-dcnode-id="5268" instrument_node="">). His short stories have appeared in the </span><em data-dcnode-id="5266"><span data-dcnode-id="5267" instrument_node="">The New Yorker,</span></em><span data-dcnode-id="5265" instrument_node=""> </span><em data-dcnode-id="5263"><span data-dcnode-id="5264" instrument_node="">Esquire</span></em><span data-dcnode-id="5262" instrument_node="">, </span><em data-dcnode-id="5260"><span data-dcnode-id="5261" instrument_node="">Tin House</span></em><span data-dcnode-id="5259" instrument_node="">, </span><em data-dcnode-id="5257"><span data-dcnode-id="5258" instrument_node="">GQ</span></em><span data-dcnode-id="5256" instrument_node="">, </span><em data-dcnode-id="5254"><span data-dcnode-id="5255" instrument_node="">Glimmer Train</span></em><span data-dcnode-id="5253" instrument_node="">, </span><em data-dcnode-id="5251"><span data-dcnode-id="5252" instrument_node="">Story</span></em><span data-dcnode-id="5250" instrument_node="">, </span><em data-dcnode-id="5248"><span data-dcnode-id="5249" instrument_node="">New England Review</span></em><span data-dcnode-id="5247" instrument_node=""> and elsewhere; essays and articles in </span><em data-dcnode-id="5245"><span data-dcnode-id="5246" instrument_node="">Vogue</span></em><span data-dcnode-id="5244" instrument_node="">, </span><em data-dcnode-id="5242"><span data-dcnode-id="5243" instrument_node="">Details</span></em><span data-dcnode-id="5241" instrument_node="">, </span><em data-dcnode-id="5239"><span data-dcnode-id="5240" instrument_node="">The New York Times </span></em><span data-dcnode-id="5238" instrument_node="">and the </span><em data-dcnode-id="5236"><span data-dcnode-id="5237" instrument_node="">Oxford American</span></em><span data-dcnode-id="5235" instrument_node="">, among others. Canty won a Pacific Northwest Book Award in 1997 for </span><em data-dcnode-id="5233"><span data-dcnode-id="5234" instrument_node="">Into the Great Wide Open</span></em><span data-dcnode-id="5232" instrument_node="">, and three of his books have been named as notable books by the </span><em data-dcnode-id="5230"><span data-dcnode-id="5231" instrument_node="">New York Times Book Review</span></em><span data-dcnode-id="5229" instrument_node="">. He teaches fiction at the University of Montana. </span><em data-dcnode-id="5227"><span data-dcnode-id="5228" instrument_node="">NW Book Lovers</span></em><span data-dcnode-id="5226" instrument_node=""> reprinted </span><a data-dcnode-id="5224" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//nwbooklovers.org/2011/05/25/we-expect-great-things-from-you-and-other-stories-a-graduation-speech-by-kevin-canty/"><span data-dcnode-id="5225" instrument_node="">a graduation speech</span></a><span data-dcnode-id="5223" instrument_node=""> he gave at the University of Montana.</span></p><span data-dcnode-id="5221" instrument_node="">
</span></div><span data-dcnode-id="5218" instrument_node="">
</span><div class="directory-entry" data-dcnode-id="5199"><span data-dcnode-id="5217" instrument_node="">
</span><div data-dcnode-id="5215"><img alt="" class="alignleft nwbl-author" data-dcnode-id="5216" height="150" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//nwbooklovers.org/wp-content/uploads/2014/01/carver-150x150.jpg&amp;raw" title="Raymond Carver" width="150"></div><span data-dcnode-id="5214" instrument_node="">
</span><h3 class="store-name" data-dcnode-id="5212"><span data-dcnode-id="5213" instrument_node="">Raymond Carver</span></h3><span data-dcnode-id="5211" instrument_node="">
</span><p data-dcnode-id="5201"><span data-dcnode-id="5210" instrument_node="">One of the great fiction writers of our time, Raymond Carver published five collections of short stories, including </span><em data-dcnode-id="5207"><a data-dcnode-id="5208" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.indiebound.org/book/9780679723691"><span data-dcnode-id="5209" instrument_node="">Cathedral</span></a></em><span data-dcnode-id="5206" instrument_node="">, which won a PNBA Award in 1984, eight collections of poetry and numerous compilations. Known as a writer of “astonishing compassion and honesty,” Carver described himself as “inclined toward brevity and intensity” in the foreword of his collection of short stories </span><em data-dcnode-id="5203"><a data-dcnode-id="5204" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.indiebound.org/book/9780679722311"><span data-dcnode-id="5205" instrument_node="">Where I’m Calling From</span></a></em><span data-dcnode-id="5202" instrument_node="">. He was a Guggenheim Fellow in 1979 and was twice awarded grants from the National Endowment of the Arts. In 1988, the American Academy and Institute of Arts and Letters awarded him a fellowship to write full-time. He died of cancer in 1988 and is survived by his wife, the poet Tess Gallagher.</span></p><span data-dcnode-id="5200" instrument_node="">
</span></div><span data-dcnode-id="5197" instrument_node="">
</span><div class="directory-entry" data-dcnode-id="5158"><span data-dcnode-id="5196" instrument_node="">
</span><div data-dcnode-id="5194"><img alt="" class="alignleft nwbl-author" data-dcnode-id="5195" height="150" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//nwbooklovers.org/wp-content/uploads/2014/01/Clark-150x150.jpg&amp;raw" title="Robert Clark" width="150"></div><span data-dcnode-id="5193" instrument_node="">
</span><h3 class="store-name" data-dcnode-id="5191"><span data-dcnode-id="5192" instrument_node="">Robert Clark</span></h3><span data-dcnode-id="5190" instrument_node="">
</span><p data-dcnode-id="5160"><span data-dcnode-id="5189" instrument_node="">Robert Clark spent many years as a freelance journalist and editor specializing in travel, food and wine. His career in this area culminated with his first book, </span><em data-dcnode-id="5186"><a data-dcnode-id="5187" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.indiebound.org/book/9781883642044"><span data-dcnode-id="5188" instrument_node="">The Solace of Food: A Life of James Beard</span></a></em><span data-dcnode-id="5185" instrument_node="">. His other nonfiction books include </span><em data-dcnode-id="5183"><span data-dcnode-id="5184" instrument_node="">River of the West: Stories from the Columbia</span></em><span data-dcnode-id="5182" instrument_node="">, </span><em data-dcnode-id="5179"><a data-dcnode-id="5180" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.indiebound.org/book/9780312243142"><span data-dcnode-id="5181" instrument_node="">My Grandfather’s House: A Genealogy of Doubt and Faith</span></a></em><span data-dcnode-id="5178" instrument_node="">and </span><em data-dcnode-id="5176"><span data-dcnode-id="5177" instrument_node="">Bayham House: Essays in Longing</span></em><span data-dcnode-id="5175" instrument_node="">. Clark’s several novels include </span><em data-dcnode-id="5172"><a data-dcnode-id="5173" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.indiebound.org/book/9780312181147"><span data-dcnode-id="5174" instrument_node="">In the Deep Midwinter</span></a></em><span data-dcnode-id="5171" instrument_node="">, </span><em data-dcnode-id="5169"><span data-dcnode-id="5170" instrument_node="">Lives of the Artists</span></em><span data-dcnode-id="5168" instrument_node="">, </span><em data-dcnode-id="5166"><span data-dcnode-id="5167" instrument_node="">Love Among the Ruins</span></em><span data-dcnode-id="5165" instrument_node="">, and </span><em data-dcnode-id="5162"><a data-dcnode-id="5163" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.indiebound.org/book/9780312428129"><span data-dcnode-id="5164" instrument_node="">Mr. White’s Confession</span></a></em><span data-dcnode-id="5161" instrument_node="">, which was honored by the independent booksellers of the Northwest in 1999. Clark lives in Seattle with his wife, Caroline, and children. He teaches in the MFA program at Seattle Pacific University and at conferences and workshops.</span></p><span data-dcnode-id="5159" instrument_node="">
</span></div><span data-dcnode-id="5156" instrument_node="">
</span><div class="directory-entry" data-dcnode-id="5131"><span data-dcnode-id="5155" instrument_node="">
</span><div data-dcnode-id="5153"><img alt="" class="alignleft nwbl-author" data-dcnode-id="5154" height="150" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//nwbooklovers.org/wp-content/uploads/2014/01/Cody-150x150.jpg&amp;raw" title="Robin Cody" width="150"></div><span data-dcnode-id="5152" instrument_node="">
</span><h3 class="store-name" data-dcnode-id="5150"><span data-dcnode-id="5151" instrument_node="">Robin Cody</span></h3><span data-dcnode-id="5149" instrument_node="">
</span><a data-dcnode-id="5147" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.robincody.net/"><span data-dcnode-id="5148" instrument_node="">www.robincody.net</span></a><span data-dcnode-id="5146" instrument_node="">
</span><p data-dcnode-id="5133"><span data-dcnode-id="5145" instrument_node="">An Oregon native, Robin Cody is the author of the novel</span><em data-dcnode-id="5142"><a data-dcnode-id="5143" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.indiebound.org/book/9781932010046"><span data-dcnode-id="5144" instrument_node="">Ricochet River</span></a></em><span data-dcnode-id="5141" instrument_node=""> and the nonfiction title</span><em data-dcnode-id="5138"><a data-dcnode-id="5139" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.indiebound.org/book/9780870716614"><span data-dcnode-id="5140" instrument_node="">Voyage of a Summer Sun: Canoeing the Columbia River</span></a></em><span data-dcnode-id="5137" instrument_node="">, both of which appear on the Oregon State Library’s “150 Oregon Books for the Oregon Sesquicentennial” list. </span><em data-dcnode-id="5135"><span data-dcnode-id="5136" instrument_node="">Voyage of a Summer Sun</span></em><span data-dcnode-id="5134" instrument_node=""> won the Oregon Book Award for literary nonfiction and a 1996 PNBA Award. Cody has worked as an English teacher, a dean of college admissions, a baseball umpire, and a school bus driver. He lives in Portland.</span></p><span data-dcnode-id="5132" instrument_node="">
</span></div><span data-dcnode-id="5129" instrument_node="">
</span><div class="directory-entry" data-dcnode-id="5101"><span data-dcnode-id="5128" instrument_node="">
</span><div data-dcnode-id="5126"><img alt="" class="alignleft nwbl-author" data-dcnode-id="5127" height="150" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//nwbooklovers.org/wp-content/uploads/2013/01/collins150x150.jpg&amp;raw" title="Michael Collins" width="150"></div><span data-dcnode-id="5125" instrument_node="">
</span><h3 class="store-name" data-dcnode-id="5123"><span data-dcnode-id="5124" instrument_node="">Michael Collins</span></h3><span data-dcnode-id="5122" instrument_node="">
</span><a data-dcnode-id="5120" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.michaelcollinsauthor.net/"><span data-dcnode-id="5121" instrument_node="">www.michaelcollinsauthor.net</span></a><span data-dcnode-id="5119" instrument_node="">
</span><p data-dcnode-id="5103"><span data-dcnode-id="5118" instrument_node="">Michael Collins is author of eight novels and the screenplay for “Julia,” a French film starring Tilda Swinton. His novels include </span><em data-dcnode-id="5115"><a data-dcnode-id="5116" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.indiebound.org/book/9781596913066"><span data-dcnode-id="5117" instrument_node="">Death of a Writer</span></a></em><span data-dcnode-id="5114" instrument_node="">, </span><em data-dcnode-id="5110"><a data-dcnode-id="5112" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.indiebound.org/book/9780743218030"><span data-dcnode-id="5113" instrument_node="">The Keepers of Truth</span></a><span data-dcnode-id="5111" instrument_node="">,</span></em><span data-dcnode-id="5109" instrument_node=""> and </span><em data-dcnode-id="5105"><a data-dcnode-id="5107" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.indiebound.org/book/9780143038221"><span data-dcnode-id="5108" instrument_node="">The Resurrectionists</span></a><span data-dcnode-id="5106" instrument_node="">,</span></em><span data-dcnode-id="5104" instrument_node=""> which was honored in 2003 by the independent booksellers of the Northwest. Collins is related to the Irish Nationalist hero of the same name and most of his work deals with the social and economic inequality that he witnessed while growing up in Ireland and after immigrating to America. Collins is also an ultra-runner and has run the Himalayan 100-Mile Stage Race, the Mt. Everest Challenge Marathon and in 2006 he won the North Pole Marathon and Sahara Half, just five weeks apart.</span></p><span data-dcnode-id="5102" instrument_node="">
</span></div><span data-dcnode-id="5099" instrument_node="">
</span><div class="directory-entry" data-dcnode-id="5073"><span data-dcnode-id="5098" instrument_node="">
</span><div data-dcnode-id="5096"><img alt="" class="alignleft nwbl-author" data-dcnode-id="5097" height="150" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//nwbooklovers.org/wp-content/uploads/2014/01/Cook-150x150.jpg&amp;raw" title="Langdon Cook" width="150"></div><span data-dcnode-id="5095" instrument_node="">
</span><h3 class="store-name" data-dcnode-id="5093"><span data-dcnode-id="5094" instrument_node="">Langdon Cook</span></h3><span data-dcnode-id="5092" instrument_node="">
</span><a data-dcnode-id="5090" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//langdoncook.com/"><span data-dcnode-id="5091" instrument_node="">langdoncook.com</span></a><span data-dcnode-id="5089" instrument_node="">
</span><p data-dcnode-id="5075"><span data-dcnode-id="5088" instrument_node="">Langdon Cook is a writer, instructor and lecturer on wild foods and the outdoors. His books include </span><em data-dcnode-id="5085"><a data-dcnode-id="5086" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.indiebound.org/book/9781594850073"><span data-dcnode-id="5087" instrument_node="">Fat of the Land: Adventures of a 21st Century Forager</span></a></em><span data-dcnode-id="5084" instrument_node=""> and </span><em data-dcnode-id="5081"><a data-dcnode-id="5082" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.indiebound.org/book/9780345536259"><span data-dcnode-id="5083" instrument_node="">The Mushroom Hunters: On the Trail of an Underground America</span></a></em><span data-dcnode-id="5080" instrument_node="">, which won a PNBA award in 2014. The booksellers described Cook as “marvelous company–bright, inquisitive, and up for an adventure.” He wrote about his award-winning book on </span><em data-dcnode-id="5077"><a data-dcnode-id="5078" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//nwbooklovers.org/2014/01/07/where-books-come-to-life/"><span data-dcnode-id="5079" instrument_node="">NW Book Lovers</span></a></em><span data-dcnode-id="5076" instrument_node="">. He lives in Seattle with his wife, the poet Martha Silano, and their two children.</span></p><span data-dcnode-id="5074" instrument_node="">
</span></div><span data-dcnode-id="5071" instrument_node="">
</span><div class="directory-entry" data-dcnode-id="5036"><span data-dcnode-id="5070" instrument_node="">
</span><div data-dcnode-id="5068"><img alt="" class="alignleft nwbl-author" data-dcnode-id="5069" height="150" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//nwbooklovers.org/wp-content/uploads/2014/01/Cosgrove-150x150.jpg&amp;raw" title="Stephen Cosgrove" width="150"></div><span data-dcnode-id="5067" instrument_node="">
</span><h3 class="store-name" data-dcnode-id="5065"><span data-dcnode-id="5066" instrument_node="">Stephen Cosgrove</span></h3><span data-dcnode-id="5064" instrument_node="">
</span><p data-dcnode-id="5038"><span data-dcnode-id="5063" instrument_node="">Stephen Cosgrove is the international children’s author of the Serendipity book series featuring, with illustrator Robin James: </span><em data-dcnode-id="5060"><a data-dcnode-id="5061" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.indiebound.org/book/9781939011565"><span data-dcnode-id="5062" instrument_node="">Leo the Lop</span></a></em><span data-dcnode-id="5059" instrument_node="">, </span><em data-dcnode-id="5056"><a data-dcnode-id="5057" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.indiebound.org/book/9781939011558"><span data-dcnode-id="5058" instrument_node="">Flutterby</span></a></em><span data-dcnode-id="5055" instrument_node="">, </span><em data-dcnode-id="5052"><a data-dcnode-id="5053" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.indiebound.org/book/9781570616280"><span data-dcnode-id="5054" instrument_node="">Wheedle on the Needle</span></a></em><span data-dcnode-id="5051" instrument_node=""> and 65 other titles. Cosgrove founded Serendipity Press in 1974 when he couldn’t find a suitable publisher for his books. Within four years, the series sold two million copies. He then merged his company with P/S/S-Penguin Putnam so he could focus on writing. Cosgrove has authored more than 325 titles, including </span><em data-dcnode-id="5049"><span data-dcnode-id="5050" instrument_node="">Ira Wordworthy</span></em><span data-dcnode-id="5048" instrument_node="">, with illustrator Wendy Edelson, which was honored by the independent booksellers of the Northwest in 1990. In addition to his children’s books, he has written a variety of middle grade readers and young adult novels including the </span><em data-dcnode-id="5046"><span data-dcnode-id="5047" instrument_node="">Bump in the Night</span></em><span data-dcnode-id="5045" instrument_node="">, </span><em data-dcnode-id="5043"><span data-dcnode-id="5044" instrument_node="">The Snuffin Chronicles</span></em><span data-dcnode-id="5042" instrument_node="">, and </span><em data-dcnode-id="5040"><span data-dcnode-id="5041" instrument_node="">Tradin’ Trolls</span></em><span data-dcnode-id="5039" instrument_node="">. Born and raised in the Northwest, Cosgrove now makes his home in Austin, Texas.</span></p><span data-dcnode-id="5037" instrument_node="">
</span></div><span data-dcnode-id="5034" instrument_node="">
</span><div class="directory-entry" data-dcnode-id="4997"><span data-dcnode-id="5033" instrument_node="">
</span><div data-dcnode-id="5031"><img alt="" class="alignleft nwbl-author" data-dcnode-id="5032" height="150" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//nwbooklovers.org/wp-content/uploads/2013/01/crutcher150x150.jpg&amp;raw" title="Chris Crutcher" width="150"></div><span data-dcnode-id="5030" instrument_node="">
</span><h3 class="store-name" data-dcnode-id="5028"><span data-dcnode-id="5029" instrument_node="">Chris Crutcher</span></h3><span data-dcnode-id="5027" instrument_node="">
</span><a data-dcnode-id="5025" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.chriscrutcher.com/"><span data-dcnode-id="5026" instrument_node="">www.chriscrutcher.com</span></a><span data-dcnode-id="5024" instrument_node="">
</span><p data-dcnode-id="4999"><span data-dcnode-id="5023" instrument_node="">Chris Crutcher grew up in Cascade, Idaho, a logging town north of Boise. His 13 novels and two collections of short stories are informed by his years as a teacher, as director of a K-12 alternative school and as a therapist specializing in abuse and neglect. He’s also written an autobiography, </span><em data-dcnode-id="5020"><a data-dcnode-id="5021" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.indiebound.org/book/9780060502515"><span data-dcnode-id="5022" instrument_node="">King of the Mild Frontier</span></a></em><span data-dcnode-id="5019" instrument_node="">, that </span><em data-dcnode-id="5017"><span data-dcnode-id="5018" instrument_node="">Publishers Weekly</span></em><span data-dcnode-id="5016" instrument_node=""> called “the YA book most adults would have read if they knew it existed.” Five of Crutcher’s books appeared on an American Library Association’s list of the 100 Best Books for Teens of the 20th Century.</span><em data-dcnode-id="5013"><a data-dcnode-id="5014" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.indiebound.org/book/9780756913687"><span data-dcnode-id="5015" instrument_node=""> Whale Talk</span></a></em><span data-dcnode-id="5012" instrument_node=""> was honored in 2002 by the independent booksellers of the Northwest and won numerous other awards including a Washington State Book Award. Crutcher is a popular columnist (</span><em data-dcnode-id="5010"><span data-dcnode-id="5011" instrument_node="">Voices from the Middle</span></em><span data-dcnode-id="5009" instrument_node="">, </span><em data-dcnode-id="5007"><span data-dcnode-id="5008" instrument_node="">Family Energy Magazine</span></em><span data-dcnode-id="5006" instrument_node="">, </span><em data-dcnode-id="5004"><span data-dcnode-id="5005" instrument_node="">the Signal Journal</span></em><span data-dcnode-id="5003" instrument_node="">, </span><em data-dcnode-id="5001"><span data-dcnode-id="5002" instrument_node="">iParenting</span></em><span data-dcnode-id="5000" instrument_node="">) and makes his home in Spokane.</span></p><span data-dcnode-id="4998" instrument_node="">
</span></div><span data-dcnode-id="4995" instrument_node="">
</span><div class="directory-entry" data-dcnode-id="4974"><span data-dcnode-id="4994" instrument_node="">
</span><div data-dcnode-id="4992"><img alt="" class="alignleft nwbl-author" data-dcnode-id="4993" height="150" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//nwbooklovers.org/wp-content/uploads/2011/02/Cyrus-150x150.jpg&amp;raw" title="Kurt Cyrus" width="150"></div><span data-dcnode-id="4991" instrument_node="">
</span><h3 class="store-name" data-dcnode-id="4989"><span data-dcnode-id="4990" instrument_node="">Kurt Cyrus</span></h3><span data-dcnode-id="4988" instrument_node="">
</span><a data-dcnode-id="4986" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.kurtcyrus.com/"><span data-dcnode-id="4987" instrument_node="">www.kurtcyrus.com</span></a><span data-dcnode-id="4985" instrument_node="">
</span><p data-dcnode-id="4976"><span data-dcnode-id="4984" instrument_node="">Children’s author Kurt Cyrus has worked as a fruit picker, forklift driver, respiratory therapist, rock drill operator, picture framer and concrete mixer for burial vaults. He has written and illustrated eight picture books and has illustrated another ten that were written by other authors. His </span><em data-dcnode-id="4981"><a data-dcnode-id="4982" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.indiebound.org/book/9780152167714"><span data-dcnode-id="4983" instrument_node="">Hotel Deep: Light Verse from Dark Water</span></a></em><span data-dcnode-id="4980" instrument_node="">, a poetic adventure in the underwater world of the ocean, was honored with a 2006 award from the independent booksellers of the Northwest. Cyrus has done interior illustrations for M.T. Anderson’s Thrilling Tales series and cover art for various titles, including a version of </span><em data-dcnode-id="4978"><span data-dcnode-id="4979" instrument_node="">Rootabaga Stories</span></em><span data-dcnode-id="4977" instrument_node=""> by Carl Sandburg. He lives in Cottage Grove, Oregon with his partner, Linnea, and a pet dog.</span></p><span data-dcnode-id="4975" instrument_node="">
</span></div><span data-dcnode-id="4972" instrument_node="">
</span><div class="directory-entry" data-dcnode-id="4942"><span data-dcnode-id="4971" instrument_node="">
</span><div data-dcnode-id="4969"><img alt="" class="alignleft nwbl-author" data-dcnode-id="4970" height="150" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//nwbooklovers.org/wp-content/uploads/2017/04/carmela_damico.jpg&amp;raw" title="Carmela D’Amico" width="150"></div><span data-dcnode-id="4968" instrument_node="">
</span><h3 class="store-name" data-dcnode-id="4966"><span data-dcnode-id="4967" instrument_node="">Carmela D’Amico</span></h3><span data-dcnode-id="4965" instrument_node="">
</span><p data-dcnode-id="4944"><span data-dcnode-id="4964" instrument_node="">Carmela D’Amico completed her first children’s book when she was just five and has been writing ever since. Working with illustrator Steve D’Amico, D’Amico has introduced readers to an engaging animal character in the children’s books </span><em data-dcnode-id="4960"><a data-dcnode-id="4962" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.indiebound.org/book/9780439627924"><span data-dcnode-id="4963" instrument_node="">Ella the Elegant Elephant</span></a><span data-dcnode-id="4961" instrument_node="">,</span></em><span data-dcnode-id="4959" instrument_node=""> which was honored by independent booksellers of the Northwest in 2005, </span><em data-dcnode-id="4955"><a data-dcnode-id="4957" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.indiebound.org/book/9780439627948"><span data-dcnode-id="4958" instrument_node="">Ella Takes the Cake</span></a><span data-dcnode-id="4956" instrument_node="">,</span></em><span data-dcnode-id="4954" instrument_node=""> </span><em data-dcnode-id="4950"><a data-dcnode-id="4952" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.indiebound.org/book/9780439831529"><span data-dcnode-id="4953" instrument_node="">Ella Sets the Stage</span></a><span data-dcnode-id="4951" instrument_node="">,</span></em><span data-dcnode-id="4949" instrument_node=""> and </span><em data-dcnode-id="4945"><a data-dcnode-id="4947" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.indiebound.org/book/9780439831550"><span data-dcnode-id="4948" instrument_node="">Ella Sets Sail</span></a><span data-dcnode-id="4946" instrument_node="">.</span></em></p><span data-dcnode-id="4943" instrument_node="">
</span></div><span data-dcnode-id="4940" instrument_node="">
</span><div class="directory-entry" data-dcnode-id="4900"><span data-dcnode-id="4939" instrument_node="">
</span><div data-dcnode-id="4937"><img alt="" class="alignleft nwbl-author" data-dcnode-id="4938" height="150" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//nwbooklovers.org/wp-content/uploads/2011/02/JDaniel-150x150.jpg&amp;raw" title="John Daniel" width="150"></div><span data-dcnode-id="4936" instrument_node="">
</span><h3 class="store-name" data-dcnode-id="4934"><span data-dcnode-id="4935" instrument_node="">John Daniel</span></h3><span data-dcnode-id="4933" instrument_node="">
</span><a data-dcnode-id="4931" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.johndaniel-author.net/"><span data-dcnode-id="4932" instrument_node="">www.johndaniel-author.net</span></a><span data-dcnode-id="4930" instrument_node="">
</span><p data-dcnode-id="4902"><span data-dcnode-id="4929" instrument_node="">Born in South Carolina and raised in the suburbs of Washington, D.C., John Daniel has lived in the West since 1966. He has worked as a logger, railroad inspector, rock climbing instructor, hod carrier and poet-in-the-schools. His books include </span><em data-dcnode-id="4925"><a data-dcnode-id="4927" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.indiebound.org/book/9781887178594"><span data-dcnode-id="4928" instrument_node="">Looking After: A Son’s Memoir</span></a><span data-dcnode-id="4926" instrument_node="">; </span></em><em data-dcnode-id="4921"><a data-dcnode-id="4923" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.indiebound.org/book/9781571312662"><span data-dcnode-id="4924" instrument_node="">Winter Creek: One Writer’s Natural History</span></a><span data-dcnode-id="4922" instrument_node="">; </span></em><span data-dcnode-id="4920" instrument_node="">and three books of poetry, Of Earth: New and Selected Poems;</span><em data-dcnode-id="4915"><span data-dcnode-id="4919" instrument_node=""> </span><a data-dcnode-id="4917" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.indiebound.org/book/9789176527382"><span data-dcnode-id="4918" instrument_node="">Common Ground</span></a><span data-dcnode-id="4916" instrument_node="">; </span></em><span data-dcnode-id="4914" instrument_node="">and </span><em data-dcnode-id="4912"><span data-dcnode-id="4913" instrument_node="">All Things Touched By Wind</span></em><span data-dcnode-id="4911" instrument_node="">. </span><em data-dcnode-id="4908"><a data-dcnode-id="4909" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.indiebound.org/book/9781619022843"><span data-dcnode-id="4910" instrument_node="">Rogue River Journal: A Winter Alone</span></a></em><span data-dcnode-id="4907" instrument_node="">, a blend of three nonfiction narratives, was honored with a 2006 award from the independent booksellers of the Northwest. </span><em data-dcnode-id="4904"><a data-dcnode-id="4905" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.indiebound.org/book/9781582434933"><span data-dcnode-id="4906" instrument_node="">The Far Corner: Northwestern Views on Land, Life, and Literature</span></a></em><span data-dcnode-id="4903" instrument_node=""> won a 2011 Oregon Book Award. Daniel lives with his wife in the Coast Range foothills west of Eugene and works as a writer and workshop teacher.</span></p><span data-dcnode-id="4901" instrument_node="">
</span></div><span data-dcnode-id="4898" instrument_node="">
</span><div class="directory-entry" data-dcnode-id="4879"><span data-dcnode-id="4897" instrument_node="">
</span><div data-dcnode-id="4895"><img alt="" class="alignleft nwbl-author" data-dcnode-id="4896" height="150" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//nwbooklovers.org/wp-content/uploads/2013/01/danner150x150.jpg&amp;raw" title="Craig Joseph Danner" width="150"></div><span data-dcnode-id="4894" instrument_node="">
</span><h3 class="store-name" data-dcnode-id="4892"><span data-dcnode-id="4893" instrument_node="">Craig Joseph Danner</span></h3><span data-dcnode-id="4891" instrument_node="">
</span><a data-dcnode-id="4889" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.himalayandhaba.com/"><span data-dcnode-id="4890" instrument_node="">www.himalayandhaba.com</span></a><span data-dcnode-id="4888" instrument_node="">
</span><p data-dcnode-id="4881"><span data-dcnode-id="4887" instrument_node="">Craig Joseph Danner is a native Oregonian who earned a degree in creative writing from Evergreen State College. His debut novel, </span><em data-dcnode-id="4883"><a data-dcnode-id="4885" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.indiebound.org/book/9780970640598"><span data-dcnode-id="4886" instrument_node="">Himalayan Dhaba</span></a><span data-dcnode-id="4884" instrument_node="">,</span></em><span data-dcnode-id="4882" instrument_node=""> was first published in 2001, and quickly became a bookseller favorite, winning a 2002 award from the independent booksellers of the Northwest. He is a Physician Assistant, and has spent over ten years as a rural volunteer firefighter and emergency medical responder. A full-time novelist, he spends his non-writing time with his family and works on-call as a medico-legal death investigator.</span></p><span data-dcnode-id="4880" instrument_node="">
</span></div><span data-dcnode-id="4877" instrument_node="">
</span><div class="directory-entry" data-dcnode-id="4828"><span data-dcnode-id="4876" instrument_node="">
</span><div data-dcnode-id="4874"><img alt="" class="alignleft nwbl-author" data-dcnode-id="4875" height="150" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//nwbooklovers.org/wp-content/uploads/2018/09/Davies-Tod.jpg&amp;raw" title="Tod Davies" width="150"></div><span data-dcnode-id="4873" instrument_node="">
</span><h3 class="store-name" data-dcnode-id="4871"><span data-dcnode-id="4872" instrument_node="">Tod Davies</span></h3><span data-dcnode-id="4870" instrument_node="">
</span><a data-dcnode-id="4868" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//exterminatingangel.com/"><span data-dcnode-id="4869" instrument_node="">exterminatingangel.com</span></a><span data-dcnode-id="4867" instrument_node="">
</span><p data-dcnode-id="4850"><span data-dcnode-id="4866" instrument_node="">TOD DAVIES is the author of The History of Arcadia series: </span><a data-dcnode-id="4863" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.amazon.com/Snotty-Saves-Day-History-Arcadia-ebook/dp/B005EFWT1E/ref%3Dasap_bc%3Fie%3DUTF8" rel="noopener" target="_blank"><em data-dcnode-id="4864"><span data-dcnode-id="4865" instrument_node="">Snotty Saves the Day</span></em></a><span data-dcnode-id="4862" instrument_node="">, </span><a data-dcnode-id="4858" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.amazon.com/Lily-Silent-History-Tod-Davies-ebook/dp/B009G1TERE/ref%3Dasap_bc%3Fie%3DUTF8" rel="noopener" target="_blank"><em data-dcnode-id="4860"><span data-dcnode-id="4861" instrument_node="">Lily the Silent</span></em><span data-dcnode-id="4859" instrument_node="">, </span></a><a data-dcnode-id="4855" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.amazon.com/Lizard-Princess-History-Arcadia/dp/1935259296/ref%3Dasap_bc%3Fie%3DUTF8" rel="noopener" target="_blank" title="http://www.amazon.com/Lizard-Princess-History-Arcadia/dp/1935259296/ref=asap_bc?ie=UTF8"><em data-dcnode-id="4856"><span data-dcnode-id="4857" instrument_node="">The Lizard Princess</span></em></a><span data-dcnode-id="4854" instrument_node=""> and now </span><a data-dcnode-id="4852" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.amazon.com/gp/product/1935259318/ref%3Ddbs_a_def_rwt_bibl_vppi_i5" rel="noopener" target="_blank"><span data-dcnode-id="4853" instrument_node="">Report to Megalopolis: The Post-modern Prometheus</span></a><span data-dcnode-id="4851" instrument_node="">, which Kirkus Reviews called “A philosophical fable.”</span></p><span data-dcnode-id="4849" instrument_node="">
</span><p data-dcnode-id="4841"><span data-dcnode-id="4848" instrument_node="">Tod Davies is also the editor/publisher of </span><a data-dcnode-id="4846" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//exterminatingangel.com/" rel="noopener" target="_blank"><span data-dcnode-id="4847" instrument_node="">Exterminating Angel Press</span></a><span data-dcnode-id="4845" instrument_node=""> and </span><a data-dcnode-id="4843" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//exterminatingangel.com/" rel="noopener" target="_blank"><span data-dcnode-id="4844" instrument_node="">Exterminating Angel Magazine</span></a><span data-dcnode-id="4842" instrument_node="">. She lives with her husband, the filmmaker Alex Cox, and their dogs in Colestin, Oregon.</span></p><span data-dcnode-id="4840" instrument_node="">
</span><p data-dcnode-id="4830"><span data-dcnode-id="4839" instrument_node="">Tod is also the author two cooking memoirs </span><a data-dcnode-id="4836" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.amazon.com/Jam-Today-Diary-Cooking-Youve/dp/1935259040/ref%3Dasap_bc%3Fie%3DUTF8" rel="noopener" target="_blank"><em data-dcnode-id="4837"><span data-dcnode-id="4838" instrument_node="">Jam Today: A Diary of Cooking With What You’ve Got</span></em></a><span data-dcnode-id="4835" instrument_node=""> and </span><a data-dcnode-id="4832" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.amazon.com/Jam-Today-Too-Revolution-Catered-ebook/dp/B00IHGWK9I/ref%3Dsr_1_1%3Fs%3Ddigital-text%26ie%3DUTF8%26qid%3D1440279848%26sr%3D1-1%26keywords%3Dtod%2Bdavies" rel="noopener" target="_blank"><em data-dcnode-id="4833"><span data-dcnode-id="4834" instrument_node="">Jam Today Too: The Revolution Will Not Be Catered</span></em></a><span data-dcnode-id="4831" instrument_node="">.</span></p><span data-dcnode-id="4829" instrument_node="">
</span></div><span data-dcnode-id="4826" instrument_node="">
</span><div class="directory-entry" data-dcnode-id="4798"><span data-dcnode-id="4825" instrument_node="">
</span><div data-dcnode-id="4823"><img alt="" class="alignleft nwbl-author" data-dcnode-id="4824" height="150" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//nwbooklovers.org/wp-content/uploads/2014/01/Davis-150x150.jpg&amp;raw" title="Claire Davis" width="150"></div><span data-dcnode-id="4822" instrument_node="">
</span><h3 class="store-name" data-dcnode-id="4820"><span data-dcnode-id="4821" instrument_node="">Claire Davis</span></h3><span data-dcnode-id="4819" instrument_node="">
