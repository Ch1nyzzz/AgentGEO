</span><p data-dcnode-id="2925"><span data-dcnode-id="2940" instrument_node="">Charleston, South Carolina native Kezi Matthews lived much of her adult life in Portland, Oregon. She was a cloth doll designer before she became a writer. Her young adult fiction includes </span><a data-dcnode-id="2937" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.indiebound.org/book/9780812628906"><em data-dcnode-id="2938"><span data-dcnode-id="2939" instrument_node="">Scorpio’s Child</span></em></a><span data-dcnode-id="2936" instrument_node="">, </span><a data-dcnode-id="2933" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.indiebound.org/book/9780812626711"><em data-dcnode-id="2934"><span data-dcnode-id="2935" instrument_node="">Flying Lessons</span></em></a><span data-dcnode-id="2932" instrument_node=""> and </span><em data-dcnode-id="2930"><span data-dcnode-id="2931" instrument_node="">John Riley’s Daughter</span></em><span data-dcnode-id="2929" instrument_node="">, which was honored by the independent booksellers of the Northwest in 2001. “Children’s writers should never ever underestimate the intelligence and emotional depth of children,” Matthews said in an interview with </span><em data-dcnode-id="2927"><span data-dcnode-id="2928" instrument_node="">Writing For Children</span></em><span data-dcnode-id="2926" instrument_node="">. Matthews passed away in 2010.</span></p><span data-dcnode-id="2924" instrument_node="">
</span></div><span data-dcnode-id="2921" instrument_node="">
</span><div class="directory-entry" data-dcnode-id="2906"><span data-dcnode-id="2920" instrument_node="">
</span><div data-dcnode-id="2918"><img alt="" class="alignleft nwbl-author" data-dcnode-id="2919" height="150" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//nwbooklovers.org/wp-content/uploads/2010/05/Nikki-150x150.jpg&amp;raw" title="Nikki McClure" width="150"></div><span data-dcnode-id="2917" instrument_node="">
</span><h3 class="store-name" data-dcnode-id="2915"><span data-dcnode-id="2916" instrument_node="">Nikki McClure</span></h3><span data-dcnode-id="2914" instrument_node="">
</span><p data-dcnode-id="2908"><span data-dcnode-id="2913" instrument_node="">Olympia artist Nikki McClure is known for her painstakingly intricate and beautiful paper cuts. Armed with an X-acto knife, she cuts out her images from a single sheet of paper and creates a language that translates the complex poetry of motherhood, nature and activism into a simple and endearing picture. She regularly produces her own posters, books, cards, T-shirts and a beloved yearly calendar as well as designs covers for countless records and books. </span><a data-dcnode-id="2910" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.indiebound.org/book/9780810983212/Cynthia-Rylant/All-Day"><em data-dcnode-id="2911"><span data-dcnode-id="2912" instrument_node="">All In a Day</span></em></a><span data-dcnode-id="2909" instrument_node="">, a children’s book she illustrated, won an award from the independent booksellers of the Northwest in 2010.</span></p><span data-dcnode-id="2907" instrument_node="">
</span></div><span data-dcnode-id="2904" instrument_node="">
</span><div class="directory-entry" data-dcnode-id="2872"><span data-dcnode-id="2903" instrument_node="">
</span><div data-dcnode-id="2901"><img alt="" class="alignleft nwbl-author" data-dcnode-id="2902" height="150" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//nwbooklovers.org/wp-content/uploads/2014/01/McManus-150x150.jpg&amp;raw" title="Patrick F. McManus" width="150"></div><span data-dcnode-id="2900" instrument_node="">
</span><h3 class="store-name" data-dcnode-id="2898"><span data-dcnode-id="2899" instrument_node="">Patrick F. McManus</span></h3><span data-dcnode-id="2897" instrument_node="">
</span><p data-dcnode-id="2874"><span data-dcnode-id="2896" instrument_node="">Patrick F. McManus has written many hundreds of humor pieces, which have been collected in thirteen books and featured in “The Last Laugh” column for </span><em data-dcnode-id="2894"><span data-dcnode-id="2895" instrument_node="">Outdoor Life Magazine</span></em><span data-dcnode-id="2893" instrument_node="">. His </span><a data-dcnode-id="2890" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.indiebound.org/book/9780805000313"><em data-dcnode-id="2891"><span data-dcnode-id="2892" instrument_node="">Never Sniff a Gift Fish</span></em></a><span data-dcnode-id="2889" instrument_node=""> was honored with a PNBA Award in 1984. McManus has also written a children’s book, </span><em data-dcnode-id="2887"><span data-dcnode-id="2888" instrument_node="">Kid Camping from Aaaiii! To Zip!</span></em><span data-dcnode-id="2886" instrument_node="">, and three mystery novels, </span><a data-dcnode-id="2883" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.indiebound.org/book/9780743280488"><em data-dcnode-id="2884"><span data-dcnode-id="2885" instrument_node="">The Blight Way</span></em></a><span data-dcnode-id="2882" instrument_node="">, </span><em data-dcnode-id="2880"><span data-dcnode-id="2881" instrument_node="">Avalanche</span></em><span data-dcnode-id="2879" instrument_node="">, and </span><a data-dcnode-id="2876" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.indiebound.org/book/9781439131367"><em data-dcnode-id="2877"><span data-dcnode-id="2878" instrument_node="">The Double-Jack Murders</span></em></a><span data-dcnode-id="2875" instrument_node="">. McManus lives in Spokane and his wife, Darlene. They have four daughters, nine grandchildren and three great grandchildren.</span></p><span data-dcnode-id="2873" instrument_node="">
</span></div><span data-dcnode-id="2870" instrument_node="">
</span><div class="directory-entry" data-dcnode-id="2833"><span data-dcnode-id="2869" instrument_node="">
</span><div data-dcnode-id="2867"><img alt="" class="alignleft nwbl-author" data-dcnode-id="2868" height="150" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//nwbooklovers.org/wp-content/uploads/2014/01/Mcnamer-150x150.jpg&amp;raw" title="Deirdre McNamer" width="150"></div><span data-dcnode-id="2866" instrument_node="">
</span><h3 class="store-name" data-dcnode-id="2864"><span data-dcnode-id="2865" instrument_node="">Deirdre McNamer</span></h3><span data-dcnode-id="2863" instrument_node="">
</span><a data-dcnode-id="2861" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.deirdre-mcnamer.com/"><span data-dcnode-id="2862" instrument_node="">www.deirdre-mcnamer.com</span></a><span data-dcnode-id="2860" instrument_node="">
</span><p data-dcnode-id="2835"><span data-dcnode-id="2859" instrument_node="">Deirdre McNamer grew up in small towns not far from the Canadian border. After working as a daily journalist for more than a decade, she studied at the University of Michigan as a recipient of a National Endowment for the Humanities fellowship. After getting her MFA in fiction from the University of Montana, her first novel, </span><em data-dcnode-id="2857"><span data-dcnode-id="2858" instrument_node="">Rima in the Weeds</span></em><span data-dcnode-id="2856" instrument_node="">, won a PNBA Award in 1992. Her next two novels, </span><a data-dcnode-id="2853" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.indiebound.org/book/9781477807644"><em data-dcnode-id="2854"><span data-dcnode-id="2855" instrument_node="">One Sweet Quarrel</span></em></a><span data-dcnode-id="2852" instrument_node=""> and </span><em data-dcnode-id="2850"><span data-dcnode-id="2851" instrument_node="">My Russian</span></em><span data-dcnode-id="2849" instrument_node="">, were New York Times Book Review Notable Books of the Year. Her fourth novel, </span><a data-dcnode-id="2846" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.indiebound.org/book/9780143113546"><em data-dcnode-id="2847"><span data-dcnode-id="2848" instrument_node="">Red Rover</span></em></a><span data-dcnode-id="2845" instrument_node="">, which was named a Best Book of 2007 by </span><em data-dcnode-id="2843"><span data-dcnode-id="2844" instrument_node="">Artforum</span></em><span data-dcnode-id="2842" instrument_node="">, </span><em data-dcnode-id="2840"><span data-dcnode-id="2841" instrument_node="">The Washington Post</span></em><span data-dcnode-id="2839" instrument_node="">, and the </span><em data-dcnode-id="2837"><span data-dcnode-id="2838" instrument_node="">LA Times</span></em><span data-dcnode-id="2836" instrument_node="">. She’s been on the faculty of the University of Montana’s creative writing program since 1998.</span></p><span data-dcnode-id="2834" instrument_node="">
</span></div><span data-dcnode-id="2831" instrument_node="">
</span><div class="directory-entry" data-dcnode-id="2812"><span data-dcnode-id="2830" instrument_node="">
</span><div data-dcnode-id="2828"><img alt="" class="alignleft nwbl-author" data-dcnode-id="2829" height="150" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//nwbooklovers.org/wp-content/uploads/2014/01/minatoya-150x150.jpg&amp;raw" title="Lydia Minatoya" width="150"></div><span data-dcnode-id="2827" instrument_node="">
</span><h3 class="store-name" data-dcnode-id="2825"><span data-dcnode-id="2826" instrument_node="">Lydia Minatoya</span></h3><span data-dcnode-id="2824" instrument_node="">
</span><p data-dcnode-id="2814"><span data-dcnode-id="2823" instrument_node="">Lydia Minatoya was born in Albany, New York in 1950. Her memoir, </span><a data-dcnode-id="2820" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.indiebound.org/book/9780060923723"><em data-dcnode-id="2821"><span data-dcnode-id="2822" instrument_node="">Talking to Monks in High Snow: An Asian-American Odyssey</span></em></a><span data-dcnode-id="2819" instrument_node="">, about coming to terms with her Japanese heritage, won a PNBA Award in 1993. Minatoya has also published a novel, </span><a data-dcnode-id="2816" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.indiebound.org/book/9780393321401"><em data-dcnode-id="2817"><span data-dcnode-id="2818" instrument_node="">The Strangeness of Beauty</span></em></a><span data-dcnode-id="2815" instrument_node="">, “a quietly daring exploration of art, family, culture, and conscience” about several generations of Japanese Americans who return to Japan just before World War II. Minatoya has a Ph.D. in psychology and works as a counselor at North Seattle Community College.</span></p><span data-dcnode-id="2813" instrument_node="">
</span></div><span data-dcnode-id="2810" instrument_node="">
</span><div class="directory-entry" data-dcnode-id="2768"><span data-dcnode-id="2809" instrument_node="">
</span><div data-dcnode-id="2807"><img alt="" class="alignleft nwbl-author" data-dcnode-id="2808" height="150" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//nwbooklovers.org/wp-content/uploads/2014/01/Mones-150x150.jpg&amp;raw" title="Nicole Mones" width="150"></div><span data-dcnode-id="2806" instrument_node="">
</span><h3 class="store-name" data-dcnode-id="2804"><span data-dcnode-id="2805" instrument_node="">Nicole Mones</span></h3><span data-dcnode-id="2803" instrument_node="">
</span><a data-dcnode-id="2801" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.nicolemones.com/"><span data-dcnode-id="2802" instrument_node="">www.nicolemones.com</span></a><span data-dcnode-id="2800" instrument_node="">
</span><p data-dcnode-id="2770"><span data-dcnode-id="2799" instrument_node="">A textile business took Nicole Mones to China for the first time in 1977. As an individual she traded textiles with China for 18 years before she turned to writing. Her novels </span><a data-dcnode-id="2796" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.indiebound.org/book/9780547516172"><em data-dcnode-id="2797"><span data-dcnode-id="2798" instrument_node="">Night in Shanghai</span></em></a><span data-dcnode-id="2795" instrument_node="">, </span><a data-dcnode-id="2792" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.indiebound.org/book/9780547053738"><em data-dcnode-id="2793"><span data-dcnode-id="2794" instrument_node="">The Last Chinese Chef</span></em></a><span data-dcnode-id="2791" instrument_node="">, </span><a data-dcnode-id="2788" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.indiebound.org/book/9780385319447"><em data-dcnode-id="2789"><span data-dcnode-id="2790" instrument_node="">Lost in Translation</span></em></a><span data-dcnode-id="2787" instrument_node=""> (honored by PNBA in 1999) and </span><a data-dcnode-id="2784" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.indiebound.org/book/9780385319454"><em data-dcnode-id="2785"><span data-dcnode-id="2786" instrument_node="">A Cup of Light</span></em></a><span data-dcnode-id="2783" instrument_node=""> have received multiple prizes, including the Kafka Prize (year’s best work of fiction by any American woman) and Kiriyama Prize (finalist; for the work of fiction that best enhances understanding of a Pacific Rim Culture). Mones’ nonfiction writing has appeared in the </span><em data-dcnode-id="2781"><span data-dcnode-id="2782" instrument_node="">New York Times Magazine</span></em><span data-dcnode-id="2780" instrument_node="">, </span><em data-dcnode-id="2778"><span data-dcnode-id="2779" instrument_node="">Gourmet</span></em><span data-dcnode-id="2777" instrument_node="">, the </span><em data-dcnode-id="2775"><span data-dcnode-id="2776" instrument_node="">Los Angeles Times</span></em><span data-dcnode-id="2774" instrument_node="">, and the </span><em data-dcnode-id="2772"><span data-dcnode-id="2773" instrument_node="">Washington Post</span></em><span data-dcnode-id="2771" instrument_node="">. She is a member of the National Committee on U.S.-China Relations.</span></p><span data-dcnode-id="2769" instrument_node="">
</span></div><span data-dcnode-id="2766" instrument_node="">
</span><div class="directory-entry" data-dcnode-id="2733"><span data-dcnode-id="2765" instrument_node="">
</span><div data-dcnode-id="2763"><img alt="" class="alignleft nwbl-author" data-dcnode-id="2764" height="150" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//nwbooklovers.org/wp-content/uploads/2014/01/Moody-150x150.jpg&amp;raw" title="Fred Moody" width="150"></div><span data-dcnode-id="2762" instrument_node="">
</span><h3 class="store-name" data-dcnode-id="2760"><span data-dcnode-id="2761" instrument_node="">Fred Moody</span></h3><span data-dcnode-id="2759" instrument_node="">
</span><p data-dcnode-id="2735"><span data-dcnode-id="2758" instrument_node="">A frequent chronicler of Seattle, Fred Moody wrote the 1996 PNBA Award-winning </span><em data-dcnode-id="2756"><span data-dcnode-id="2757" instrument_node="">I Sing the Body Electronic: A Year with Microsoft on the Multimedia Frontier. His other books include </span></em><a data-dcnode-id="2753" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.indiebound.org/book/9780312334000"><em data-dcnode-id="2754"><span data-dcnode-id="2755" instrument_node="">Seattle and the Demons of Ambition: From Boom to Bust in the Number One City of the Future</span></em></a><span data-dcnode-id="2752" instrument_node="">; </span><a data-dcnode-id="2749" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.indiebound.org/book/9780812928525"><em data-dcnode-id="2750"><span data-dcnode-id="2751" instrument_node="">The Visionary Position: The Inside Story of the Digital Dreamers Who Are Making Virtual Reality a Reality</span></em></a><span data-dcnode-id="2748" instrument_node="">, and </span><em data-dcnode-id="2746"><span data-dcnode-id="2747" instrument_node="">Fighting Chance: An NFL Season With the Seattle Seahawks</span></em><span data-dcnode-id="2745" instrument_node="">. The former managing editor of </span><em data-dcnode-id="2743"><span data-dcnode-id="2744" instrument_node="">Seattle Weekly</span></em><span data-dcnode-id="2742" instrument_node="">, his journalism has appeared in numerous publications, including </span><em data-dcnode-id="2740"><span data-dcnode-id="2741" instrument_node="">The New York Times</span></em><span data-dcnode-id="2739" instrument_node=""> and </span><em data-dcnode-id="2737"><span data-dcnode-id="2738" instrument_node="">The Wall Street Journal</span></em><span data-dcnode-id="2736" instrument_node="">. Moody and his wife, Anne, have three daughters and live on an island in the Puget Sound.</span></p><span data-dcnode-id="2734" instrument_node="">
</span></div><span data-dcnode-id="2731" instrument_node="">
</span><div class="directory-entry" data-dcnode-id="2709"><span data-dcnode-id="2730" instrument_node="">
</span><div data-dcnode-id="2728"><img alt="" class="alignleft nwbl-author" data-dcnode-id="2729" height="150" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//nwbooklovers.org/wp-content/uploads/2014/01/Moore-150x150.jpg&amp;raw" title="Kathleen Dean Moore" width="150"></div><span data-dcnode-id="2727" instrument_node="">
</span><h3 class="store-name" data-dcnode-id="2725"><span data-dcnode-id="2726" instrument_node="">Kathleen Dean Moore</span></h3><span data-dcnode-id="2724" instrument_node="">
</span><a data-dcnode-id="2722" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.riverwalking.com/"><span data-dcnode-id="2723" instrument_node="">www.riverwalking.com</span></a><span data-dcnode-id="2721" instrument_node="">
</span><p data-dcnode-id="2711"><span data-dcnode-id="2720" instrument_node="">Kathleen Dean Moore is best known as a nature writer whose essays “question and celebrate our cultural and spiritual connections to the Earth.” She won a PNBA Award for </span><a data-dcnode-id="2717" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.indiebound.org/book/9780156004619"><em data-dcnode-id="2718"><span data-dcnode-id="2719" instrument_node="">Riverwalking: Reflections on Moving Water</span></em></a><span data-dcnode-id="2716" instrument_node=""> in 1996 and an Oregon Book Award for </span><a data-dcnode-id="2713" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.indiebound.org/book/9781571312815"><em data-dcnode-id="2714"><span data-dcnode-id="2715" instrument_node="">The Pine Island Paradox: Making Connections in a Disconnected World</span></em></a><span data-dcnode-id="2712" instrument_node=""> in 2006. Moore is a Distinguished Professor of Philosophy and University Writer Laureate at Oregon State University in Corvallis, where she lives with her husband, a biologist, and writes in the WaterShed, a tiny writers’ studio that her daughter designed. In the summers, she writes in her family’s cabin in Southeast Alaska.</span></p><span data-dcnode-id="2710" instrument_node="">
</span></div><span data-dcnode-id="2707" instrument_node="">
</span><div class="directory-entry" data-dcnode-id="2684"><span data-dcnode-id="2706" instrument_node="">
</span><div data-dcnode-id="2704"><img alt="" class="alignleft nwbl-author" data-dcnode-id="2705" height="150" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//nwbooklovers.org/wp-content/uploads/2014/01/Morgan-150x150.jpg&amp;raw" title="Clay Morgan" width="150"></div><span data-dcnode-id="2703" instrument_node="">
</span><h3 class="store-name" data-dcnode-id="2701"><span data-dcnode-id="2702" instrument_node="">Clay Morgan</span></h3><span data-dcnode-id="2700" instrument_node="">
</span><p data-dcnode-id="2686"><span data-dcnode-id="2699" instrument_node="">Born and raised “a free-range child” in the Pacific Northwest, Clay Morgan has worked as a teacher, a commentator for National Public Radio, and as a U.S. Forest Service smokejumper. His books include </span><a data-dcnode-id="2696" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.indiebound.org/book/9780142403433"><em data-dcnode-id="2697"><span data-dcnode-id="2698" instrument_node="">The Boy Who Spoke Dog</span></em></a><span data-dcnode-id="2695" instrument_node="">, </span><em data-dcnode-id="2691"><a data-dcnode-id="2693" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.indiebound.org/book/9780142413951"><span data-dcnode-id="2694" instrument_node="">The Boy Who Returned From the Sea</span></a><span data-dcnode-id="2692" instrument_node=""> </span></em><span data-dcnode-id="2690" instrument_node="">and </span><em data-dcnode-id="2688"><span data-dcnode-id="2689" instrument_node="">Santiago and the Drinking Party</span></em><span data-dcnode-id="2687" instrument_node="">, honored in 1993 by the independent booksellers of the Northwest. Morgan lives with his wife, Barbara, an astronaut and teacher, and their two sons in McCall, Idaho. He is currently a creative writing professor at Boise State University.</span></p><span data-dcnode-id="2685" instrument_node="">
</span></div><span data-dcnode-id="2682" instrument_node="">
</span><div class="directory-entry" data-dcnode-id="2660"><span data-dcnode-id="2681" instrument_node="">
</span><div data-dcnode-id="2679"><img alt="" class="alignleft nwbl-author" data-dcnode-id="2680" height="150" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//nwbooklovers.org/wp-content/uploads/2011/02/Mortenson-150x150.jpg&amp;raw" title="Greg Mortenson" width="150"></div><span data-dcnode-id="2678" instrument_node="">
</span><h3 class="store-name" data-dcnode-id="2676"><span data-dcnode-id="2677" instrument_node="">Greg Mortenson</span></h3><span data-dcnode-id="2675" instrument_node="">
</span><p data-dcnode-id="2662"><span data-dcnode-id="2674" instrument_node="">Greg Mortenson was a humanitarian, a mountaineer and an author. Mortenson was the co-founder and director of the non-profit Central Asia Institute as well as founder of the educational charity, Pennies for Peace. He was the co-author, with David Oliver Relin, of </span><a data-dcnode-id="2671" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.indiebound.org/book/9780143038252/Greg-Mortenson/Three-Cups-Tea"><em data-dcnode-id="2672"><span data-dcnode-id="2673" instrument_node="">Three Cups of Tea: One Man’s Mission to Promote Peace … One School at a Time</span></em></a><span data-dcnode-id="2670" instrument_node="">, which was honored by the independent booksellers of the Northwest in 2007. As of 2010, Mortenson had established or significantly supported 171 schools in rural and often volatile regions of Pakistan and Afghanistan. The sequel to </span><em data-dcnode-id="2668"><span data-dcnode-id="2669" instrument_node="">Three Cups of Tea</span></em><span data-dcnode-id="2667" instrument_node="">, </span><a data-dcnode-id="2664" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.indiebound.org/book/9780143118237"><em data-dcnode-id="2665"><span data-dcnode-id="2666" instrument_node="">Stones Into Schools: Promoting Peace Through Education in Afghanistan and Pakistan</span></em></a><span data-dcnode-id="2663" instrument_node=""> was released in 2009.</span></p><span data-dcnode-id="2661" instrument_node="">
</span></div><span data-dcnode-id="2658" instrument_node="">
</span><div class="directory-entry" data-dcnode-id="2647"><span data-dcnode-id="2657" instrument_node="">
</span><h3 class="store-name" data-dcnode-id="2655"><span data-dcnode-id="2656" instrument_node="">James E. Murphy</span></h3><span data-dcnode-id="2654" instrument_node="">
</span><p data-dcnode-id="2649"><span data-dcnode-id="2653" instrument_node="">James E. Murphy was born in 1910 and was an attorney for most of his life. He retired from his law practice to write </span><em data-dcnode-id="2651"><span data-dcnode-id="2652" instrument_node="">Half Interest in a Silver Dollar: The Saga of Charles E. Conrad</span></em><span data-dcnode-id="2650" instrument_node="">, which won a PNBA Award in 1984. He lived in Kalispell, Montana until his death in 1990.</span></p><span data-dcnode-id="2648" instrument_node="">
</span></div><span data-dcnode-id="2645" instrument_node="">
</span><div class="directory-entry" data-dcnode-id="2619"><span data-dcnode-id="2644" instrument_node="">
</span><div data-dcnode-id="2642"><img alt="" class="alignleft nwbl-author" data-dcnode-id="2643" height="150" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//nwbooklovers.org/wp-content/uploads/2020/03/Christina-Suzann-Nelson-2.png&amp;raw" title="Christina Suzann Nelson" width="150"></div><span data-dcnode-id="2641" instrument_node="">
</span><h3 class="store-name" data-dcnode-id="2639"><span data-dcnode-id="2640" instrument_node="">Christina Suzann Nelson</span></h3><span data-dcnode-id="2638" instrument_node="">
</span><a data-dcnode-id="2636" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.christinasuzannnelson.com/"><span data-dcnode-id="2637" instrument_node="">www.christinasuzannnelson.com</span></a><span data-dcnode-id="2635" instrument_node="">
</span><p data-dcnode-id="2621"><span data-dcnode-id="2634" instrument_node="">Christina Suzann Nelson’s first novel, </span><strong data-dcnode-id="2631"><em data-dcnode-id="2632"><span data-dcnode-id="2633" instrument_node="">If We Make It Home</span></em></strong><span data-dcnode-id="2630" instrument_node="">, was released by Kregel Publications in 2017. Her second novel, </span><em data-dcnode-id="2627"><strong data-dcnode-id="2628"><span data-dcnode-id="2629" instrument_node="">Swimming in the Deep End</span></strong></em><span data-dcnode-id="2626" instrument_node="">, was published in 2019. Look for </span><em data-dcnode-id="2623"><strong data-dcnode-id="2624"><span data-dcnode-id="2625" instrument_node="">More Than We Remember</span></strong></em><span data-dcnode-id="2622" instrument_node=""> releasing February 18, 2020. She was named the 2017 Writer of Promise by The Oregon Christian Writers.</span></p><span data-dcnode-id="2620" instrument_node="">
</span></div><span data-dcnode-id="2617" instrument_node="">
</span><div class="directory-entry" data-dcnode-id="2578"><span data-dcnode-id="2616" instrument_node="">
</span><div data-dcnode-id="2614"><img alt="" class="alignleft nwbl-author" data-dcnode-id="2615" height="150" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//nwbooklovers.org/wp-content/uploads/2014/01/Nelson-150x150.jpg&amp;raw" title="Richard Nelson" width="150"></div><span data-dcnode-id="2613" instrument_node="">
</span><h3 class="store-name" data-dcnode-id="2611"><span data-dcnode-id="2612" instrument_node="">Richard Nelson</span></h3><span data-dcnode-id="2610" instrument_node="">
</span><p data-dcnode-id="2580"><span data-dcnode-id="2609" instrument_node="">Richard Nelson is a cultural anthropologist and creative nonfiction writer whose work focuses on human relationships to the natural world. Nelson has lived in Alaska since 1961, where he has recorded the cultural traditions and intellectual achievements of Inupiaq Eskimo and Athabaskan Indian people. Based on these experiences, he wrote </span><em data-dcnode-id="2607"><span data-dcnode-id="2608" instrument_node="">Hunters of the Northern Ice</span></em><span data-dcnode-id="2606" instrument_node="">, </span><a data-dcnode-id="2603" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.indiebound.org/book/9780226571812"><em data-dcnode-id="2604"><span data-dcnode-id="2605" instrument_node="">Hunters of the Northern Forest</span></em></a><span data-dcnode-id="2602" instrument_node="">, </span><em data-dcnode-id="2600"><span data-dcnode-id="2601" instrument_node="">Shadow of the Hunter</span></em><span data-dcnode-id="2599" instrument_node="">, </span><em data-dcnode-id="2595"><a data-dcnode-id="2597" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.indiebound.org/book/9780226571638"><span data-dcnode-id="2598" instrument_node="">Make Prayers to the Raven</span></a><span data-dcnode-id="2596" instrument_node=""> </span></em><span data-dcnode-id="2594" instrument_node="">and </span><em data-dcnode-id="2592"><span data-dcnode-id="2593" instrument_node="">The Athabaskans</span></em><span data-dcnode-id="2591" instrument_node="">. Nelson has also written more broadly about people and the environment, including </span><em data-dcnode-id="2589"><span data-dcnode-id="2590" instrument_node="">The Island Within</span></em><span data-dcnode-id="2588" instrument_node="">, honored in 1990 by the independent booksellers of the Northwest; </span><em data-dcnode-id="2586"><span data-dcnode-id="2587" instrument_node="">Heart and Blood: Living with Deer in America</span></em><span data-dcnode-id="2585" instrument_node="">; and </span><a data-dcnode-id="2582" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.indiebound.org/book/9780913098615"><em data-dcnode-id="2583"><span data-dcnode-id="2584" instrument_node="">Patriotism and the American Land</span></em></a><span data-dcnode-id="2581" instrument_node="">, which he co-authored with Barry Lopez and Terry Tempest Williams. He lives in Sitka, where he follows his passion for the outdoors and volunteers for a community conservation group.</span></p><span data-dcnode-id="2579" instrument_node="">
</span></div><span data-dcnode-id="2576" instrument_node="">
</span><div class="directory-entry" data-dcnode-id="2552"><span data-dcnode-id="2575" instrument_node="">
</span><div data-dcnode-id="2573"><img alt="" class="alignleft nwbl-author" data-dcnode-id="2574" height="150" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//nwbooklovers.org/wp-content/uploads/2010/05/newJack-150x150.jpg&amp;raw" title="Jack Nisbet" width="150"></div><span data-dcnode-id="2572" instrument_node="">
</span><h3 class="store-name" data-dcnode-id="2570"><span data-dcnode-id="2571" instrument_node="">Jack Nisbet</span></h3><span data-dcnode-id="2569" instrument_node="">
</span><p data-dcnode-id="2554"><span data-dcnode-id="2568" instrument_node="">Jack Nisbet is a teacher and naturalist whose 2009 book </span><em data-dcnode-id="2564"><a data-dcnode-id="2566" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.indiebound.org/book/9781570616679"><span data-dcnode-id="2567" instrument_node="">The Collector: David Douglas and the Natural History of the Northwest</span></a><span data-dcnode-id="2565" instrument_node=""> </span></em><span data-dcnode-id="2563" instrument_node="">won a PNBA Award. Other titles include </span><a data-dcnode-id="2560" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.indiebound.org/book/9780874222852"><em data-dcnode-id="2561"><span data-dcnode-id="2562" instrument_node="">The Mapmaker’s Eye: David Thompson on the Columbia Plateau</span></em></a><span data-dcnode-id="2559" instrument_node=""> and </span><a data-dcnode-id="2556" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.indiebound.org/book/9781570615221"><em data-dcnode-id="2557"><span data-dcnode-id="2558" instrument_node="">Sources of the River: Tracking David Thompson Across Western North America</span></em></a><span data-dcnode-id="2555" instrument_node="">, which won the Idaho Library Book of the year and the Washington Governor’s Award in 1995. He lives in Spokane.</span></p><span data-dcnode-id="2553" instrument_node="">
</span></div><span data-dcnode-id="2550" instrument_node="">
</span><div class="directory-entry" data-dcnode-id="2521"><span data-dcnode-id="2549" instrument_node="">
</span><div data-dcnode-id="2547"><img alt="" class="alignleft nwbl-author" data-dcnode-id="2548" height="150" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//nwbooklovers.org/wp-content/uploads/2014/01/Noethe-150x150.jpg&amp;raw" title="Sheryl Noethe" width="150"></div><span data-dcnode-id="2546" instrument_node="">
</span><h3 class="store-name" data-dcnode-id="2544"><span data-dcnode-id="2545" instrument_node="">Sheryl Noethe</span></h3><span data-dcnode-id="2543" instrument_node="">
</span><a data-dcnode-id="2541" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.sherylnoethe.com/"><span data-dcnode-id="2542" instrument_node="">www.sherylnoethe.com</span></a><span data-dcnode-id="2540" instrument_node="">
</span><p data-dcnode-id="2523"><span data-dcnode-id="2539" instrument_node="">Born and raised in Minnesota, poet Sheryl Noethe now lives at the foot of Mt. Jumbo in Missoula, Montana. Her first collection of poetry was </span><em data-dcnode-id="2537"><span data-dcnode-id="2538" instrument_node="">The Descent of Heaven Over the Lake</span></em><span data-dcnode-id="2536" instrument_node=""> and was followed by </span><em data-dcnode-id="2534"><span data-dcnode-id="2535" instrument_node="">The Ghost Openings</span></em><span data-dcnode-id="2533" instrument_node="">, which was honored by the independent booksellers of the Northwest with a William Stafford Memorial Award in 2001. The booksellers called her work “haunting, light and always full of life.” Noethe’s work has been included in numerous anthologies, including </span><em data-dcnode-id="2531"><span data-dcnode-id="2532" instrument_node="">Poems Across the Big Sky</span></em><span data-dcnode-id="2530" instrument_node="">, </span><em data-dcnode-id="2528"><span data-dcnode-id="2529" instrument_node="">Montana Women Writers: A Geography of the Heart</span></em><span data-dcnode-id="2527" instrument_node=""> and </span><em data-dcnode-id="2525"><span data-dcnode-id="2526" instrument_node="">I Go To the Ruined Place: Contemporary Poems in Defense of Global Human Rights</span></em><span data-dcnode-id="2524" instrument_node="">. From 2011-2013, Noethe served as Montana’s Poet Laureate.</span></p><span data-dcnode-id="2522" instrument_node="">
</span></div><span data-dcnode-id="2519" instrument_node="">
</span><div class="directory-entry" data-dcnode-id="2489"><span data-dcnode-id="2518" instrument_node="">
</span><div data-dcnode-id="2516"><img alt="" class="alignleft nwbl-author" data-dcnode-id="2517" height="150" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//nwbooklovers.org/wp-content/uploads/2013/01/oschner150x150.jpg&amp;raw" title="Gina Ochsner" width="150"></div><span data-dcnode-id="2515" instrument_node="">
</span><h3 class="store-name" data-dcnode-id="2513"><span data-dcnode-id="2514" instrument_node="">Gina Ochsner</span></h3><span data-dcnode-id="2512" instrument_node="">
</span><a data-dcnode-id="2510" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.ginaochsner.com/"><span data-dcnode-id="2511" instrument_node="">www.ginaochsner.com</span></a><span data-dcnode-id="2509" instrument_node="">
</span><p data-dcnode-id="2491"><span data-dcnode-id="2508" instrument_node="">Gina Ochsner lives in Keizer, Oregon and divides her time between writing and teaching with the Seattle Pacific Low-Residency MFA program. Her stories have appeared in </span><em data-dcnode-id="2506"><span data-dcnode-id="2507" instrument_node="">The New Yorker, Tin House, Glimmertrain</span></em><span data-dcnode-id="2505" instrument_node=""> and the </span><em data-dcnode-id="2503"><span data-dcnode-id="2504" instrument_node="">Kenyon Review.</span></em><span data-dcnode-id="2502" instrument_node=""> She is the author of the short story collection </span><em data-dcnode-id="2498"><a data-dcnode-id="2500" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.indiebound.org/book/9780820334233"><span data-dcnode-id="2501" instrument_node="">The Necessary Grace to Fall</span></a><span data-dcnode-id="2499" instrument_node="">,</span></em><span data-dcnode-id="2497" instrument_node=""> which was honored in 2003 by the independent booksellers of the Northwest, and the story collection </span><em data-dcnode-id="2493"><a data-dcnode-id="2495" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.indiebound.org/book/9780618563722"><span data-dcnode-id="2496" instrument_node="">People I Wanted to Be</span></a><span data-dcnode-id="2494" instrument_node="">.</span></em><span data-dcnode-id="2492" instrument_node=""> Both books received the Oregon Book Award.</span></p><span data-dcnode-id="2490" instrument_node="">
</span></div><span data-dcnode-id="2487" instrument_node="">
</span><div class="directory-entry" data-dcnode-id="2467"><span data-dcnode-id="2486" instrument_node="">
</span><div data-dcnode-id="2484"><img alt="" class="alignleft nwbl-author" data-dcnode-id="2485" height="150" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//nwbooklovers.org/wp-content/uploads/2012/04/Jean-Davies-Okimoto.jpg&amp;raw" title="Jean Davies Okimoto" width="150"></div><span data-dcnode-id="2483" instrument_node="">
</span><h3 class="store-name" data-dcnode-id="2481"><span data-dcnode-id="2482" instrument_node="">Jean Davies Okimoto</span></h3><span data-dcnode-id="2480" instrument_node="">
</span><a data-dcnode-id="2478" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.jeandaviesokimoto.com/"><span data-dcnode-id="2479" instrument_node="">www.jeandaviesokimoto.com</span></a><span data-dcnode-id="2477" instrument_node="">
</span><p data-dcnode-id="2469"><span data-dcnode-id="2476" instrument_node="">Jean Davies Okimoto is an author and playwright whose books and short stories have been translated into Japanese, Italian, Chinese, Korean, German and Hebrew. She is the recipient of numerous awards including </span><i data-dcnode-id="2474"><span data-dcnode-id="2475" instrument_node="">Smithsonian</span></i><span data-dcnode-id="2473" instrument_node=""> Notable Book, the American Library Association Best Book for Young Adults, the Washington Governor’s Award, and the International Reading Association Readers Choice Award. Her picture book, </span><i data-dcnode-id="2471"><span data-dcnode-id="2472" instrument_node="">Blumpoe the Grumpoe Meets Arnold the Cat</span></i><span data-dcnode-id="2470" instrument_node=""> was adapted by Shelly Duvall for the HBO and Showtime television series “Bedtime Stories.” She has appeared on CNN, Oprah and The Today Show. Jeanie began writing for adults when she and her husband Joe retired to Vashon Island in 2004.</span></p><span data-dcnode-id="2468" instrument_node="">
</span></div><span data-dcnode-id="2465" instrument_node="">
</span><div class="directory-entry" data-dcnode-id="2404"><span data-dcnode-id="2464" instrument_node="">
</span><div data-dcnode-id="2462"><img alt="" class="alignleft nwbl-author" data-dcnode-id="2463" height="150" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//nwbooklovers.org/wp-content/uploads/2014/01/olsen-150x150.jpg&amp;raw" title="Jack Olsen" width="150"></div><span data-dcnode-id="2461" instrument_node="">
</span><h3 class="store-name" data-dcnode-id="2459"><span data-dcnode-id="2460" instrument_node="">Jack Olsen</span></h3><span data-dcnode-id="2458" instrument_node="">
</span><p data-dcnode-id="2406"><span data-dcnode-id="2457" instrument_node="">Described as “the dean of true crime authors” by the </span><em data-dcnode-id="2455"><span data-dcnode-id="2456" instrument_node="">Washington Post</span></em><span data-dcnode-id="2454" instrument_node="">, Jack Olsen wrote thirty-three books, including </span><a data-dcnode-id="2451" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.indiebound.org/book/9780440216469"><em data-dcnode-id="2452"><span data-dcnode-id="2453" instrument_node="">The Misbegotten Son</span></em></a><span data-dcnode-id="2450" instrument_node="">, </span><em data-dcnode-id="2448"><span data-dcnode-id="2449" instrument_node="">The Bridge at Chappaquiddick</span></em><span data-dcnode-id="2447" instrument_node="">, </span><a data-dcnode-id="2444" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.indiebound.org/book/9780943972480"><em data-dcnode-id="2445"><span data-dcnode-id="2446" instrument_node="">Night of the Grizzlies</span></em></a><span data-dcnode-id="2443" instrument_node="">, </span><em data-dcnode-id="2441"><span data-dcnode-id="2442" instrument_node="">Silence on Monte Sole</span></em><span data-dcnode-id="2440" instrument_node=""> and </span><em data-dcnode-id="2438"><span data-dcnode-id="2439" instrument_node="">Son: A Psychopath and His Victims</span></em><span data-dcnode-id="2437" instrument_node="">, which won a PNBA Award in 1984. A former </span><em data-dcnode-id="2435"><span data-dcnode-id="2436" instrument_node="">Time</span></em><span data-dcnode-id="2434" instrument_node=""> bureau chief, Olsen wrote for </span><em data-dcnode-id="2432"><span data-dcnode-id="2433" instrument_node="">Vanity Fair</span></em><span data-dcnode-id="2431" instrument_node="">, </span><em data-dcnode-id="2429"><span data-dcnode-id="2430" instrument_node="">People</span></em><span data-dcnode-id="2428" instrument_node="">, </span><em data-dcnode-id="2426"><span data-dcnode-id="2427" instrument_node="">Paris Match</span></em><span data-dcnode-id="2425" instrument_node="">, </span><em data-dcnode-id="2423"><span data-dcnode-id="2424" instrument_node="">Readers Digest</span></em><span data-dcnode-id="2422" instrument_node="">, </span><em data-dcnode-id="2420"><span data-dcnode-id="2421" instrument_node="">Playboy</span></em><span data-dcnode-id="2419" instrument_node="">, </span><em data-dcnode-id="2417"><span data-dcnode-id="2418" instrument_node="">Life</span></em><span data-dcnode-id="2416" instrument_node="">, </span><em data-dcnode-id="2414"><span data-dcnode-id="2415" instrument_node="">Sports Illustrated</span></em><span data-dcnode-id="2413" instrument_node="">, </span><em data-dcnode-id="2411"><span data-dcnode-id="2412" instrument_node="">Fortune</span></em><span data-dcnode-id="2410" instrument_node=""> and </span><em data-dcnode-id="2408"><span data-dcnode-id="2409" instrument_node="">New York Times Book Review </span></em><span data-dcnode-id="2407" instrument_node="">. He lived on an island in Puget Sound and died in 2002 at the age of 77.</span></p><span data-dcnode-id="2405" instrument_node="">
</span></div><span data-dcnode-id="2402" instrument_node="">
</span><div class="directory-entry" data-dcnode-id="2376"><span data-dcnode-id="2401" instrument_node="">
</span><h3 class="store-name" data-dcnode-id="2399"><span data-dcnode-id="2400" instrument_node="">Carol Orlock</span></h3><span data-dcnode-id="2398" instrument_node="">
</span><p data-dcnode-id="2378"><span data-dcnode-id="2397" instrument_node="">Carol Orlock is author of </span><em data-dcnode-id="2395"><span data-dcnode-id="2396" instrument_node="">The Goddess Letters</span></em><span data-dcnode-id="2394" instrument_node="">, honored by the independent booksellers of the Northwest in 1988, and </span><em data-dcnode-id="2392"><span data-dcnode-id="2393" instrument_node="">The Hedge, The Ribbon</span></em><span data-dcnode-id="2391" instrument_node="">, which won the Western States Book Award. Her stories and poems have appeared in </span><em data-dcnode-id="2389"><span data-dcnode-id="2390" instrument_node="">Ms. Magazine</span></em><span data-dcnode-id="2388" instrument_node="">, </span><em data-dcnode-id="2386"><span data-dcnode-id="2387" instrument_node="">Calyx</span></em><span data-dcnode-id="2385" instrument_node="">, </span><em data-dcnode-id="2383"><span data-dcnode-id="2384" instrument_node="">Women of Darkness </span></em><span data-dcnode-id="2382" instrument_node="">and </span><em data-dcnode-id="2380"><span data-dcnode-id="2381" instrument_node="">Fine Madness</span></em><span data-dcnode-id="2379" instrument_node="">, among others, and she has written two nonfiction books. She teaches fiction writing and composition at Shoreline Community College and also teaches fiction writing for the University of Washington Extension Program.</span></p><span data-dcnode-id="2377" instrument_node="">
</span></div><span data-dcnode-id="2374" instrument_node="">
</span><div class="directory-entry" data-dcnode-id="2339"><span data-dcnode-id="2373" instrument_node="">
</span><div data-dcnode-id="2371"><img alt="" class="alignleft nwbl-author" data-dcnode-id="2372" height="150" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//nwbooklovers.org/wp-content/uploads/2014/01/Ozeki-150x150.jpg&amp;raw" title="Ruth Ozeki" width="150"></div><span data-dcnode-id="2370" instrument_node="">
</span><h3 class="store-name" data-dcnode-id="2368"><span data-dcnode-id="2369" instrument_node="">Ruth Ozeki</span></h3><span data-dcnode-id="2367" instrument_node="">
</span><a data-dcnode-id="2365" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.ruthozeki.com/"><span data-dcnode-id="2366" instrument_node="">www.ruthozeki.com</span></a><span data-dcnode-id="2364" instrument_node="">
</span><p data-dcnode-id="2341"><span data-dcnode-id="2363" instrument_node="">Ruth Ozeki is a novelist, filmmaker, and Zen Buddhist priest. Her novels include </span><a data-dcnode-id="2360" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.indiebound.org/book/9780140280463"><em data-dcnode-id="2361"><span data-dcnode-id="2362" instrument_node="">My Year of Meats</span></em></a><span data-dcnode-id="2359" instrument_node="">, </span><a data-dcnode-id="2356" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.indiebound.org/book/9780142003893"><em data-dcnode-id="2357"><span data-dcnode-id="2358" instrument_node="">All Over Creation</span></em></a><span data-dcnode-id="2355" instrument_node="">, and </span><a data-dcnode-id="2352" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.indiebound.org/book/9780143124870"><em data-dcnode-id="2353"><span data-dcnode-id="2354" instrument_node="">A Tale for the Time Being</span></em></a><span data-dcnode-id="2351" instrument_node="">, which was shortlisted for the Man Booker Prize and won a 2014 PNBA Award. “The stories I like are the ones that emerge from the edges, the rich and fecund areas where things meet,” she writes in </span><a data-dcnode-id="2349" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//nwbooklovers.org/2014/01/17/ruth-ozeki-on-a-tale-for-the-time-being-by-ruth-ozeki/"><span data-dcnode-id="2350" instrument_node="">an essay</span></a><span data-dcnode-id="2348" instrument_node=""> on </span><em data-dcnode-id="2346"><span data-dcnode-id="2347" instrument_node="">NW Book Lovers</span></em><span data-dcnode-id="2345" instrument_node="">. “The Pacific Northwest, set on the edge of a continent, an ocean, and an ecosystem, is just such a place. Here, ideas and cultures meet and intermingle, and in that regard, I like to think of </span><em data-dcnode-id="2343"><span data-dcnode-id="2344" instrument_node="">A Tale for the Time Being </span></em><span data-dcnode-id="2342" instrument_node="">as being a particularly Pacific Northwest kind of book.”</span></p><span data-dcnode-id="2340" instrument_node="">
</span></div><span data-dcnode-id="2337" instrument_node="">
</span><div class="directory-entry" data-dcnode-id="2276"><span data-dcnode-id="2336" instrument_node="">
</span><div data-dcnode-id="2334"><img alt="" class="alignleft nwbl-author" data-dcnode-id="2335" height="150" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//nwbooklovers.org/wp-content/uploads/2013/01/NicholasOConnell-150x150.jpeg&amp;raw" title="Nick O’Connell" width="150"></div><span data-dcnode-id="2333" instrument_node="">
</span><h3 class="store-name" data-dcnode-id="2331"><span data-dcnode-id="2332" instrument_node="">Nick O’Connell</span></h3><span data-dcnode-id="2330" instrument_node="">
</span><p data-dcnode-id="2278"><span data-dcnode-id="2329" instrument_node="">Nicholas O’Connell, M.F.A, Ph.D., is the author of </span><em data-dcnode-id="2325"><a data-dcnode-id="2327" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.indiebound.org/book/9781602231849"><span data-dcnode-id="2328" instrument_node="">The Storms of Denali</span></a><span data-dcnode-id="2326" instrument_node="">; </span></em><em data-dcnode-id="2321"><a data-dcnode-id="2323" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.indiebound.org/book/9780295983462"><span data-dcnode-id="2324" instrument_node="">On Sacred Ground: The Spirit of Place in Pacific Northwest Literature</span></a><span data-dcnode-id="2322" instrument_node="">; </span></em><em data-dcnode-id="2319"><span data-dcnode-id="2320" instrument_node="">Beyond Risk: Conversations with Climbers</span></em><span data-dcnode-id="2318" instrument_node=""> and </span><em data-dcnode-id="2316"><span data-dcnode-id="2317" instrument_node="">At the Field’s End: Interviews with 22 Pacific Northwest Writers</span></em><span data-dcnode-id="2315" instrument_node="">, which won a PNBA Award in 1988. O’Connell has contributed to </span><em data-dcnode-id="2313"><span data-dcnode-id="2314" instrument_node="">Newsweek</span></em><span data-dcnode-id="2312" instrument_node="">, </span><em data-dcnode-id="2310"><span data-dcnode-id="2311" instrument_node="">Gourmet</span></em><span data-dcnode-id="2309" instrument_node="">, </span><em data-dcnode-id="2307"><span data-dcnode-id="2308" instrument_node="">Saveur</span></em><span data-dcnode-id="2306" instrument_node="">, </span><em data-dcnode-id="2304"><span data-dcnode-id="2305" instrument_node="">Outside</span></em><span data-dcnode-id="2303" instrument_node="">, </span><em data-dcnode-id="2301"><span data-dcnode-id="2302" instrument_node="">National Geographic Adventure</span></em><span data-dcnode-id="2300" instrument_node="">, </span><em data-dcnode-id="2298"><span data-dcnode-id="2299" instrument_node="">Condé Nast Traveler</span></em><span data-dcnode-id="2297" instrument_node="">, </span><em data-dcnode-id="2295"><span data-dcnode-id="2296" instrument_node="">Food &amp; Wine</span></em><span data-dcnode-id="2294" instrument_node="">, </span><em data-dcnode-id="2292"><span data-dcnode-id="2293" instrument_node="">The New York Times</span></em><span data-dcnode-id="2291" instrument_node="">, </span><em data-dcnode-id="2289"><span data-dcnode-id="2290" instrument_node="">The Wall Street Journal</span></em><span data-dcnode-id="2288" instrument_node="">, </span><em data-dcnode-id="2286"><span data-dcnode-id="2287" instrument_node="">Sierra</span></em><span data-dcnode-id="2285" instrument_node="">, </span><em data-dcnode-id="2283"><span data-dcnode-id="2284" instrument_node="">Commonweal</span></em><span data-dcnode-id="2282" instrument_node=""> and many other publications. He is the publisher/editor of The Writer’s Workshop Review and the founder of the online and Seattle-based writing program, </span><a data-dcnode-id="2280" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.thewritersworkshop.net/"><span data-dcnode-id="2281" instrument_node="">www.thewritersworkshop.net</span></a><span data-dcnode-id="2279" instrument_node="">.</span></p><span data-dcnode-id="2277" instrument_node="">
</span></div><span data-dcnode-id="2274" instrument_node="">
</span><div class="directory-entry" data-dcnode-id="2231"><span data-dcnode-id="2273" instrument_node="">
</span><div data-dcnode-id="2271"><img alt="" class="alignleft nwbl-author" data-dcnode-id="2272" height="150" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//nwbooklovers.org/wp-content/uploads/2013/01/palahniuk150x150.jpg&amp;raw" title="Chuck Palahniuk" width="150"></div><span data-dcnode-id="2270" instrument_node="">
</span><h3 class="store-name" data-dcnode-id="2268"><span data-dcnode-id="2269" instrument_node="">Chuck Palahniuk</span></h3><span data-dcnode-id="2267" instrument_node="">
</span><a data-dcnode-id="2265" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//chuckpalahniuk.net/"><span data-dcnode-id="2266" instrument_node="">chuckpalahniuk.net</span></a><span data-dcnode-id="2264" instrument_node="">
</span><p data-dcnode-id="2233"><span data-dcnode-id="2263" instrument_node="">Bestselling cult author Chuck Palahniuk’s first novel was </span><em data-dcnode-id="2259"><a data-dcnode-id="2261" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.indiebound.org/book/9780393327342"><span data-dcnode-id="2262" instrument_node="">Fight Club</span></a><span data-dcnode-id="2260" instrument_node="">,</span></em><span data-dcnode-id="2258" instrument_node=""> which went on to become a popular movie. This success was followed by almost a book a year since 1999, including </span><em data-dcnode-id="2245"><a data-dcnode-id="2256" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.indiebound.org/book/9780393338072"><span data-dcnode-id="2257" instrument_node="">Survivor</span></a><span data-dcnode-id="2255" instrument_node="">, </span><a data-dcnode-id="2253" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.indiebound.org/book/9780393319293"><span data-dcnode-id="2254" instrument_node="">Invisible Monsters</span></a><span data-dcnode-id="2252" instrument_node="">, </span><a data-dcnode-id="2250" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.indiebound.org/book/9781400032815"><span data-dcnode-id="2251" instrument_node="">Diary</span></a><span data-dcnode-id="2249" instrument_node="">, </span><a data-dcnode-id="2247" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.indiebound.org/book/9780307275837"><span data-dcnode-id="2248" instrument_node="">Rant</span></a><span data-dcnode-id="2246" instrument_node=""> </span></em><span data-dcnode-id="2244" instrument_node="">and </span><em data-dcnode-id="2240"><a data-dcnode-id="2242" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.indiebound.org/book/9780385722193"><span data-dcnode-id="2243" instrument_node="">Lullaby</span></a><span data-dcnode-id="2241" instrument_node="">,</span></em><span data-dcnode-id="2239" instrument_node=""> which was honored in 2003 by the independent booksellers of the Northwest. </span><em data-dcnode-id="2235"><a data-dcnode-id="2237" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.indiebound.org/book/9780385720922"><span data-dcnode-id="2238" instrument_node="">Choke</span></a><span data-dcnode-id="2236" instrument_node="">,</span></em><span data-dcnode-id="2234" instrument_node=""> published in 2001, became Palahniuk’s first New York Times bestseller. He currently divides his time between two homes, one in Oregon and one in Washington, both of which he shares with his partner and their two dogs.</span></p><span data-dcnode-id="2232" instrument_node="">
</span></div><span data-dcnode-id="2229" instrument_node="">
</span><div class="directory-entry" data-dcnode-id="2200"><span data-dcnode-id="2228" instrument_node="">
</span><div data-dcnode-id="2226"><img alt="" class="alignleft nwbl-author" data-dcnode-id="2227" height="150" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//nwbooklovers.org/wp-content/uploads/2011/01/NPearl-150x150.jpg&amp;raw" title="Nancy Pearl" width="150"></div><span data-dcnode-id="2225" instrument_node="">
</span><h3 class="store-name" data-dcnode-id="2223"><span data-dcnode-id="2224" instrument_node="">Nancy Pearl</span></h3><span data-dcnode-id="2222" instrument_node="">
</span><a data-dcnode-id="2220" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.nancypearl.com/"><span data-dcnode-id="2221" instrument_node="">www.nancypearl.com</span></a><span data-dcnode-id="2219" instrument_node="">
</span><p data-dcnode-id="2202"><span data-dcnode-id="2218" instrument_node="">First as a librarian, then as an author, reviewer, lecturer and radio and television personality, Nancy Pearl has spent her adult life championing the best books. In 1998, she developed the program “If All of Seattle Read the Same Book,” which spread across the country. The former Executive Director of the Washington Center for the Book, Pearl celebrates the written word by speaking at bookstores and libraries across the country and on her monthly television program Book Lust with Nancy Pearl on the Seattle Channel. Pearl’s books include </span><em data-dcnode-id="2214"><a data-dcnode-id="2216" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.indiebound.org/book/9781570613814"><span data-dcnode-id="2217" instrument_node="">Book Lust: Recommended Reading for Every Mood, Moment, and Reason</span></a><span data-dcnode-id="2215" instrument_node=""> </span></em><span data-dcnode-id="2213" instrument_node="">(2003), </span><em data-dcnode-id="2209"><a data-dcnode-id="2211" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.indiebound.org/book/9781570615009"><span data-dcnode-id="2212" instrument_node="">Book Crush: For Kids and Teens</span></a><span data-dcnode-id="2210" instrument_node=""> </span></em><span data-dcnode-id="2208" instrument_node="">(2007) and </span><a data-dcnode-id="2204" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.indiebound.org/book/9781570616501"><em data-dcnode-id="2206"><span data-dcnode-id="2207" instrument_node="">Book Lust To Go: Recommended Reading for Travelers, Vagabonds, and Dreamers</span></em><span data-dcnode-id="2205" instrument_node=""> </span></a><span data-dcnode-id="2203" instrument_node="">(2010), all from Sasquatch Books. In recognition of her books and efforts in support of books, booksellers, libraries and librarians, the independent booksellers of the Pacific Northwest honored her with a Lifetime Achievement Award in 2011. She lives in Seattle with her husband, Joe.</span></p><span data-dcnode-id="2201" instrument_node="">
</span></div><span data-dcnode-id="2198" instrument_node="">
</span><div class="directory-entry" data-dcnode-id="2162"><span data-dcnode-id="2197" instrument_node="">
</span><div data-dcnode-id="2195"><img alt="" class="alignleft nwbl-author" data-dcnode-id="2196" height="150" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//nwbooklovers.org/wp-content/uploads/2014/01/Perillo-150x150.jpg&amp;raw" title="Lucia Perillo" width="150"></div><span data-dcnode-id="2194" instrument_node="">
</span><h3 class="store-name" data-dcnode-id="2192"><span data-dcnode-id="2193" instrument_node="">Lucia Perillo</span></h3><span data-dcnode-id="2191" instrument_node="">
</span><a data-dcnode-id="2189" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.luciaperillo.com/"><span data-dcnode-id="2190" instrument_node="">www.luciaperillo.com</span></a><span data-dcnode-id="2188" instrument_node="">
</span><p data-dcnode-id="2164"><span data-dcnode-id="2187" instrument_node="">Lucia Perillo published a collection of essays, a collection of stories and six books of poetry, including </span><a data-dcnode-id="2184" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.indiebound.org/book/9781400063239"><em data-dcnode-id="2185"><span data-dcnode-id="2186" instrument_node="">Luck is Luck</span></em></a><span data-dcnode-id="2183" instrument_node="">, which was a finalist for the LA Times Book Prize and</span><a data-dcnode-id="2179" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.indiebound.org/book/9781556592959"><span data-dcnode-id="2182" instrument_node=""> </span><em data-dcnode-id="2180"><span data-dcnode-id="2181" instrument_node="">Inseminating the Elephant</span></em></a><span data-dcnode-id="2178" instrument_node="">, a Pulitzer finalist. Of </span><a data-dcnode-id="2175" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.indiebound.org/book/9781556594151"><em data-dcnode-id="2176"><span data-dcnode-id="2177" instrument_node="">On the Spectrum of Possible Deaths</span></em></a><span data-dcnode-id="2174" instrument_node="">, which was one of the NYT’s 100 notable books of 2012 and won a 2013 PNBA Book Award, PNBA booksellers said: “Fearless, wise, humorous and touching, the poems in this volume are a bracing tonic.” Perillo celebrated the award with </span><a data-dcnode-id="2172" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//nwbooklovers.org/2013/03/15/that-smell/"><span data-dcnode-id="2173" instrument_node="">this essay</span></a><span data-dcnode-id="2171" instrument_node=""> for </span><em data-dcnode-id="2169"><span data-dcnode-id="2170" instrument_node="">NW Book Lovers</span></em><span data-dcnode-id="2168" instrument_node="">. We also recommend her </span><a data-dcnode-id="2166" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//nwbooklovers.org/2012/12/24/poetry-wildlife-management-and-the-inescapable-a-conversation-with-lucia-perillo/%29"><span data-dcnode-id="2167" instrument_node="">interview</span></a><span data-dcnode-id="2165" instrument_node=""> with poet/bookseller Christine Deavel. Perillo lived in Olympia. She died in 2016.</span></p><span data-dcnode-id="2163" instrument_node="">
</span></div><span data-dcnode-id="2160" instrument_node="">
</span><div class="directory-entry" data-dcnode-id="2132"><span data-dcnode-id="2159" instrument_node="">
</span><div data-dcnode-id="2157"><img alt="" class="alignleft nwbl-author" data-dcnode-id="2158" height="150" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//nwbooklovers.org/wp-content/uploads/2013/02/barbara-pope-150x150.jpg&amp;raw" title="Barbara Corrado Pope" width="150"></div><span data-dcnode-id="2156" instrument_node="">
</span><h3 class="store-name" data-dcnode-id="2154"><span data-dcnode-id="2155" instrument_node="">Barbara Corrado Pope</span></h3><span data-dcnode-id="2153" instrument_node="">
</span><a data-dcnode-id="2151" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.barbaracpope.com/"><span data-dcnode-id="2152" instrument_node="">www.barbaracpope.com</span></a><span data-dcnode-id="2150" instrument_node="">
</span><p data-dcnode-id="2134"><span data-dcnode-id="2149" instrument_node="">Barbara Corrado Pope is the author of three historical novels set in late-19th-century France. Her first novel, </span><em data-dcnode-id="2145"><a data-dcnode-id="2147" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.indiebound.org/book/9781605980607"><span data-dcnode-id="2148" instrument_node="">Cezanne’s Quarry</span></a><span data-dcnode-id="2146" instrument_node="">,</span></em><span data-dcnode-id="2144" instrument_node=""> was nominated for an Oregon Book Award; her second, </span><a data-dcnode-id="2141" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.indiebound.org/book/9781605981901"><em data-dcnode-id="2142"><span data-dcnode-id="2143" instrument_node="">The Blood of Lorraine</span></em></a><span data-dcnode-id="2140" instrument_node=""> received a starred review from Publishers Weekly. Her third, </span><em data-dcnode-id="2136"><a data-dcnode-id="2138" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.indiebound.org/book/9781605984087"><span data-dcnode-id="2139" instrument_node="">The Missing Italian Girl</span></a><span data-dcnode-id="2137" instrument_node="">,</span></em><span data-dcnode-id="2135" instrument_node=""> arrived in February 2013. Pope has a Ph.D. in the Social and Intellectual History of Europe from Columbia University and has taught history and women’s studies in places as diverse as Hungary, Tuscany, the University of New Mexico, and Harvard Divinity School. Her longest stint was at the University of Oregon, where she was the founding director of women’s studies. Born and raised in Cleveland, Ohio, Pope now resides in Oregon. She is married and has one daughter.</span></p><span data-dcnode-id="2133" instrument_node="">
</span></div><span data-dcnode-id="2130" instrument_node="">
</span><div class="directory-entry" data-dcnode-id="2106"><span data-dcnode-id="2129" instrument_node="">
</span><div data-dcnode-id="2127"><img alt="" class="alignleft nwbl-author" data-dcnode-id="2128" height="150" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//nwbooklovers.org/wp-content/uploads/2014/01/Prcic-150x150.jpg&amp;raw" title="Ismet Prcic" width="150"></div><span data-dcnode-id="2126" instrument_node="">
</span><h3 class="store-name" data-dcnode-id="2124"><span data-dcnode-id="2125" instrument_node="">Ismet Prcic</span></h3><span data-dcnode-id="2123" instrument_node="">
</span><a data-dcnode-id="2121" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.ismetprcic.com/"><span data-dcnode-id="2122" instrument_node="">www.ismetprcic.com</span></a><span data-dcnode-id="2120" instrument_node="">
</span><p data-dcnode-id="2108"><span data-dcnode-id="2119" instrument_node="">Ismet Prcic was born in Tuzla, Bosnia-Herzegovina in 1977 and immigrated to America in 1996. He holds an MFA from the University of California, Irvine, and was the recipient of a 2010 NEA Award for fiction and a 2012 PNBA Award from the independent booksellers of the Northwest for his novel </span><a data-dcnode-id="2116" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.indiebound.org/book/9780802170811"><em data-dcnode-id="2117"><span data-dcnode-id="2118" instrument_node="">Shards</span></em></a><span data-dcnode-id="2115" instrument_node=""> (“Powerful, gorgeous writing—complicated without a hint of intellectual grandstanding. This novel is a difficult treasure.”—PNBA booksellers). Prcic is a 2011 Sundance Screenwriting Labfellow. He lives in Portland with his wife. Read his essay </span><a data-dcnode-id="2113" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//nwbooklovers.org/2012/01/11/11922/"><span data-dcnode-id="2114" instrument_node="">One More Rescue</span></a><span data-dcnode-id="2112" instrument_node=""> on </span><em data-dcnode-id="2110"><span data-dcnode-id="2111" instrument_node="">NW Book Lovers</span></em><span data-dcnode-id="2109" instrument_node="">.</span></p><span data-dcnode-id="2107" instrument_node="">
</span></div><span data-dcnode-id="2104" instrument_node="">
</span><div class="directory-entry" data-dcnode-id="2056"><span data-dcnode-id="2103" instrument_node="">
</span><div data-dcnode-id="2101"><img alt="" class="alignleft nwbl-author" data-dcnode-id="2102" height="150" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//nwbooklovers.org/wp-content/uploads/2010/06/cheriepriestnew-150x150.jpg&amp;raw" title="Cherie Priest" width="150"></div><span data-dcnode-id="2100" instrument_node="">
</span><h3 class="store-name" data-dcnode-id="2098"><span data-dcnode-id="2099" instrument_node="">Cherie Priest</span></h3><span data-dcnode-id="2097" instrument_node="">
</span><a data-dcnode-id="2095" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.cheriepriest.com/"><span data-dcnode-id="2096" instrument_node="">www.cheriepriest.com</span></a><span data-dcnode-id="2094" instrument_node="">
</span><p data-dcnode-id="2058"><span data-dcnode-id="2093" instrument_node="">Cherie Priest is the author of more than a dozen novels, including six in her Clockwork Century Universe series. The first in the series, </span><em data-dcnode-id="2089"><a data-dcnode-id="2091" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.indiebound.org/book/9780765318411"><span data-dcnode-id="2092" instrument_node="">Boneshaker</span></a><span data-dcnode-id="2090" instrument_node="">, </span></em><span data-dcnode-id="2088" instrument_node="">won a 2010 award from the independent booksellers of the Northwest, was nominated for both the Hugo Award and the Nebula Award, and was a Locus Award finalist. Her other books include </span><a data-dcnode-id="2085" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.indiebound.org/book/9780765313089"><em data-dcnode-id="2086"><span data-dcnode-id="2087" instrument_node="">Four and Twenty Blackbirds</span></em></a><span data-dcnode-id="2084" instrument_node="">, </span><a data-dcnode-id="2081" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.indiebound.org/book/9780765321220"><em data-dcnode-id="2082"><span data-dcnode-id="2083" instrument_node="">Fathom</span></em></a><span data-dcnode-id="2080" instrument_node="">, </span><a data-dcnode-id="2077" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.indiebound.org/book/9780765313096"><em data-dcnode-id="2078"><span data-dcnode-id="2079" instrument_node="">Wings to the Kingdom</span></em></a><span data-dcnode-id="2076" instrument_node="">, and the Endeavour-nominated book </span><a data-dcnode-id="2073" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.indiebound.org/book/9780765313102"><em data-dcnode-id="2074"><span data-dcnode-id="2075" instrument_node="">Not Flesh Nor Feathers</span></em></a><span data-dcnode-id="2072" instrument_node="">. Her short novels </span><a data-dcnode-id="2069" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.indiebound.org/book/9781596061910"><em data-dcnode-id="2070"><span data-dcnode-id="2071" instrument_node="">Dreadful Skin</span></em></a><span data-dcnode-id="2068" instrument_node=""> and </span><em data-dcnode-id="2066"><span data-dcnode-id="2067" instrument_node="">Those Who Went Remain There Still</span></em><span data-dcnode-id="2065" instrument_node=""> are published by Subterranean Press. She lives in Seattle with her husband and a fat black cat. Read </span><em data-dcnode-id="2063"><span data-dcnode-id="2064" instrument_node="">NW Book Lovers</span></em><span data-dcnode-id="2062" instrument_node="">‘ interview with Priest, </span><a data-dcnode-id="2060" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//nwbooklovers.org/2012/12/31/new-from-the-clockwork-century-a-conversation-with-cherie-priest/"><span data-dcnode-id="2061" instrument_node="">New from the Clockwork Century</span></a><span data-dcnode-id="2059" instrument_node="">.</span></p><span data-dcnode-id="2057" instrument_node="">
</span></div><span data-dcnode-id="2054" instrument_node="">
</span><div class="directory-entry" data-dcnode-id="2035"><span data-dcnode-id="2053" instrument_node="">

</span><h3 class="store-name" data-dcnode-id="2048"><span data-dcnode-id="2049" instrument_node="">Dawn Prince-Hughes</span></h3><span data-dcnode-id="2047" instrument_node="">
</span><p data-dcnode-id="2037"><span data-dcnode-id="2046" instrument_node="">Dawn Prince-Hughes is the author of </span><a data-dcnode-id="2043" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.indiebound.org/book/9781400082155"><em data-dcnode-id="2044"><span data-dcnode-id="2045" instrument_node="">Songs of the Gorilla Nation</span></em></a><span data-dcnode-id="2042" instrument_node="">, a memoir about growing up with Asperger’s Sydrome, which was honored with a 2005 award from the independent booksellers of the Northwest. Prince-Hughes is also the author of </span><a data-dcnode-id="2039" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.indiebound.org/book/9780816521500"><em data-dcnode-id="2040"><span data-dcnode-id="2041" instrument_node="">Gorillas Among Us: A Primate Ethnographer’s Book of Days</span></em></a><span data-dcnode-id="2038" instrument_node=""> and three other books. She received her M.A. and Ph.D. in interdisciplinary anthropology from the Universität Herisau in Switzerland and is an adjunct professor of anthropology at Western Washington University. She is on the advisory board of ApeNet, a nonprofit organization.</span></p><span data-dcnode-id="2036" instrument_node="">
</span></div><span data-dcnode-id="2033" instrument_node="">

</span><div data-dcnode-id="2030"><img alt="" class="alignleft nwbl-author" data-dcnode-id="2031" height="150" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//nwbooklovers.org/wp-content/uploads/2014/01/Pyle-150x150.jpg&amp;raw" title="Robert Michael Pyle" width="150"></div><span data-dcnode-id="2029" instrument_node="">
</span><h3 class="store-name" data-dcnode-id="2027"><span data-dcnode-id="2028" instrument_node="">Robert Michael Pyle</span></h3><span data-dcnode-id="2026" instrument_node="">
</span><p data-dcnode-id="1989"><span data-dcnode-id="2025" instrument_node="">Robert Michael Pyle is the author of hundreds of papers, essays, stories and poems in many magazines and journals. His fourteen books include the </span><em data-dcnode-id="2023"><span data-dcnode-id="2024" instrument_node="">The Thunder Tree</span></em><span data-dcnode-id="2022" instrument_node="">; </span><em data-dcnode-id="2020"><span data-dcnode-id="2021" instrument_node="">Where Bigfoot Walks: Crossing the Dark Divide</span></em><span data-dcnode-id="2019" instrument_node="">; </span><a data-dcnode-id="2016" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.indiebound.org/book/9780300203875"><em data-dcnode-id="2017"><span data-dcnode-id="2018" instrument_node="">Chasing Monarchs: Migrating with the Butterflies of Passage</span></em></a><span data-dcnode-id="2015" instrument_node="">; </span><em data-dcnode-id="2011"><span data-dcnode-id="2014" instrument_node="">the </span><a data-dcnode-id="2012" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.indiebound.org/book/9780394519142"><span data-dcnode-id="2013" instrument_node="">National Audubon Society Field Guide to North American Butterflies</span></a></em><span data-dcnode-id="2010" instrument_node="">; </span><a data-dcnode-id="2007" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.indiebound.org/book/9780395616291"><em data-dcnode-id="2008"><span data-dcnode-id="2009" instrument_node="">Handbook for Butterfly Watchers</span></em></a><span data-dcnode-id="2006" instrument_node="">; </span><a data-dcnode-id="2003" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.indiebound.org/book/9780914516132"><em data-dcnode-id="2004"><span data-dcnode-id="2005" instrument_node="">Butterflies of Cascadia</span></em></a><span data-dcnode-id="2002" instrument_node="">; </span><a data-dcnode-id="1999" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.indiebound.org/book/9781571312426"><em data-dcnode-id="2000"><span data-dcnode-id="2001" instrument_node="">Walking the High Ridge: Life as Field Trip</span></em></a><span data-dcnode-id="1998" instrument_node="">; </span><a data-dcnode-id="1995" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.indiebound.org/book/9780618919796"><em data-dcnode-id="1996"><span data-dcnode-id="1997" instrument_node="">Sky Time in Gray’s River: Living for Keeps in a Forgotten Place</span></em></a><span data-dcnode-id="1994" instrument_node="">; and </span><a data-dcnode-id="1991" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.indiebound.org/book/9781570613104"><em data-dcnode-id="1992"><span data-dcnode-id="1993" instrument_node="">Wintergreen: Rambles in a Ravaged Land</span></em></a><span data-dcnode-id="1990" instrument_node="">, which was honored by PNBA in 1987. Pyle founded the Xerces Society for invertebrate conservation and later chaired its Monarch Project. He lives in the rural community of Gray’s River, on a tributary of the Lower Columbia in southwest Washington.</span></p><span data-dcnode-id="1988" instrument_node="">
</span></div><span data-dcnode-id="1985" instrument_node="">
