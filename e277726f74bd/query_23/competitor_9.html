</span><p data-dcnode-id="4800"><span data-dcnode-id="4818" instrument_node="">Claire Davis is the author of </span><em data-dcnode-id="4815"><a data-dcnode-id="4816" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.indiebound.org/book/9780312425647"><span data-dcnode-id="4817" instrument_node="">Season of the Snake</span></a></em><span data-dcnode-id="4814" instrument_node=""> and </span><em data-dcnode-id="4811"><a data-dcnode-id="4812" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.indiebound.org/book/9780312284251"><span data-dcnode-id="4813" instrument_node="">Winter Range</span></a></em><span data-dcnode-id="4810" instrument_node="">, which was honored by the independent booksellers of the Northwest in 2001 (it also received an award from the Mountains and Plains Booksellers Association). Her stories have appeared in </span><em data-dcnode-id="4808"><span data-dcnode-id="4809" instrument_node="">The Southern Review</span></em><span data-dcnode-id="4807" instrument_node="">, </span><em data-dcnode-id="4805"><span data-dcnode-id="4806" instrument_node="">The Gettysburg Review</span></em><span data-dcnode-id="4804" instrument_node="">, and </span><em data-dcnode-id="4802"><span data-dcnode-id="4803" instrument_node="">Ploughshares</span></em><span data-dcnode-id="4801" instrument_node="">, have been read on National Public Radio’s Selected Shorts program, and have been selected for the Best American Short Stories and Pushcart Price anthologies. Davis lives in Lewiston, Idaho where she teaches creative writing at Lewis-Clark State College. She also teaches for Pacific University.</span></p><span data-dcnode-id="4799" instrument_node="">
</span></div><span data-dcnode-id="4796" instrument_node="">

</span><div data-dcnode-id="4793"><img alt="" class="alignleft nwbl-author" data-dcnode-id="4794" height="150" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//nwbooklovers.org/wp-content/uploads/2011/01/Day-150x150.jpg&amp;raw" title="Alexandra Day" width="150"></div><span data-dcnode-id="4792" instrument_node="">
</span><h3 class="store-name" data-dcnode-id="4790"><span data-dcnode-id="4791" instrument_node="">Alexandra Day</span></h3><span data-dcnode-id="4789" instrument_node="">
</span><a data-dcnode-id="4787" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.gooddogcarl.com/"><span data-dcnode-id="4788" instrument_node="">www.gooddogcarl.com</span></a><span data-dcnode-id="4786" instrument_node="">
</span><p data-dcnode-id="4780"><span data-dcnode-id="4785" instrument_node="">Alexandra Day is the pen name for children’s book author and illustrator Sandra Louise Woodward Darling. Darling and her husband, Harold, whom Darling credits with writing and conceiving many of Day’s books, have produced more than twenty titles, including the </span><em data-dcnode-id="4782"><a data-dcnode-id="4783" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.indiebound.org/book/9780689817717"><span data-dcnode-id="4784" instrument_node="">Good Dog, Carl</span></a></em><span data-dcnode-id="4781" instrument_node=""> series, which was honored with a 2009 Lifetime Achievement Award by the independent booksellers of the Northwest. Darling, who once said that “Genuinesness is the one essential ingredient in a children’s book,” lives with her husband in Seattle.</span></p><span data-dcnode-id="4779" instrument_node="">
</span></div><span data-dcnode-id="4776" instrument_node="">

</span><div data-dcnode-id="4773"><img alt="" class="alignleft nwbl-author" data-dcnode-id="4774" height="150" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//nwbooklovers.org/wp-content/uploads/2014/01/deWitt-150x150.jpg&amp;raw" title="Patrick deWitt" width="150"></div><span data-dcnode-id="4772" instrument_node="">
</span><h3 class="store-name" data-dcnode-id="4770"><span data-dcnode-id="4771" instrument_node="">Patrick deWitt</span></h3><span data-dcnode-id="4769" instrument_node="">
</span><a data-dcnode-id="4767" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//patrickdewitt.net/"><span data-dcnode-id="4768" instrument_node="">patrickdewitt.net</span></a><span data-dcnode-id="4766" instrument_node="">
</span><p data-dcnode-id="4750"><span data-dcnode-id="4765" instrument_node="">Patrick deWitt was born in British Columbia in 1975. He is the author of two novels, </span><em data-dcnode-id="4762"><a data-dcnode-id="4763" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.indiebound.org/book/9780547335711"><span data-dcnode-id="4764" instrument_node="">Ablutions: Notes for a Novel</span></a></em><span data-dcnode-id="4761" instrument_node="">and </span><em data-dcnode-id="4758"><a data-dcnode-id="4759" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.indiebound.org/book/9780062041289/patrick-dewitt/sisters-brothers"><span data-dcnode-id="4760" instrument_node="">The Sisters Brothers</span></a></em><span data-dcnode-id="4757" instrument_node="">, which was shortlisted for the 2011 Man Booker Prize and won a 2012 Award from the Pacific Northwest Booksellers Association (“With off-kilter wit and the kind of charm that should leave the Coen Brothers tickled, deWitt has crafted a Western novel for people who think they don’t like Westerns.”—PNBA booksellers). He celebrated the award with </span><a data-dcnode-id="4755" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//nwbooklovers.org/2012/02/15/when-a-bookstore-was-hell-on-earth-and-then-it-wasnt-an-essay-by-2012-pnba-award-winner-patrick-dewitt/"><span data-dcnode-id="4756" instrument_node="">this post </span></a><span data-dcnode-id="4754" instrument_node=""> for </span><em data-dcnode-id="4752"><span data-dcnode-id="4753" instrument_node="">NW Book Lovers</span></em><span data-dcnode-id="4751" instrument_node="">. He lives with his wife and son in Portland.</span></p><span data-dcnode-id="4749" instrument_node="">
</span></div><span data-dcnode-id="4746" instrument_node="">
</span><div class="directory-entry" data-dcnode-id="4706"><span data-dcnode-id="4745" instrument_node="">
</span><div data-dcnode-id="4743"><img alt="" class="alignleft nwbl-author" data-dcnode-id="4744" height="150" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//nwbooklovers.org/wp-content/uploads/2014/01/Dietrich-150x150.jpg&amp;raw" title="William Dietrich" width="150"></div><span data-dcnode-id="4742" instrument_node="">
</span><h3 class="store-name" data-dcnode-id="4740"><span data-dcnode-id="4741" instrument_node="">William Dietrich</span></h3><span data-dcnode-id="4739" instrument_node="">
</span><a data-dcnode-id="4737" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.williamdietrich.com/"><span data-dcnode-id="4738" instrument_node="">www.williamdietrich.com</span></a><span data-dcnode-id="4736" instrument_node="">
</span><p data-dcnode-id="4708"><span data-dcnode-id="4735" instrument_node="">William Dietrich grew up near the Puget Sound in the shadow of Mount Rainier and has returned to live nearby. The Pulitzer-winning journalist has written about the eruption of Mt. Saint Helens, the Arctic, and the Exxon Valdez oil spill. “The influence of dramatic landscapes on people infuses not only my nonfiction but my novels, set in Antarctica, the Australian Outback, the barbarian fringes of the Roman Empire, the sands of the Middle East, Tibet, the Caribbean …” he writes. Dietrich’s first book, </span><em data-dcnode-id="4732"><a data-dcnode-id="4733" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.indiebound.org/book/9780295990620"><span data-dcnode-id="4734" instrument_node="">The Final Forest: Big Trees, Forks and the Pacific Northwest</span></a></em><span data-dcnode-id="4731" instrument_node="">, grew out of his reporting on the spotted owl and old growth forest debate and was honored by the independent booksellers of the Northwest in 1993. Other books include </span><em data-dcnode-id="4729"><span data-dcnode-id="4730" instrument_node="">Northwest Passage</span></em><span data-dcnode-id="4728" instrument_node="">, an environmental and cultural history of the Columbia River inspired by its imperiled salmon runs and epic pioneer past;</span><em data-dcnode-id="4725"><a data-dcnode-id="4726" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.indiebound.org/book/9780295982939"><span data-dcnode-id="4727" instrument_node="">Natural Grace: The Charm, Wonder, and Lessons of Pacific Northwest Animals and Plants</span></a></em><span data-dcnode-id="4724" instrument_node="">;</span><em data-dcnode-id="4721"><a data-dcnode-id="4722" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.indiebound.org/book/9780060735081"><span data-dcnode-id="4723" instrument_node="">The Scourge of God</span></a></em><span data-dcnode-id="4720" instrument_node="">; </span><em data-dcnode-id="4718"><span data-dcnode-id="4719" instrument_node="">Napoleon’s Pyramids</span></em><span data-dcnode-id="4717" instrument_node="">; </span><em data-dcnode-id="4714"><a data-dcnode-id="4715" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.indiebound.org/book/9780062191434"><span data-dcnode-id="4716" instrument_node="">The Dakota Cipher</span></a></em><span data-dcnode-id="4713" instrument_node="">; and </span><em data-dcnode-id="4710"><a data-dcnode-id="4711" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//nwbooklovers.org/authors/William%2520Dietrich" title="http://www.indiebound.org/book/9780062191410"><span data-dcnode-id="4712" instrument_node="">The Barbary Pirates</span></a></em><span data-dcnode-id="4709" instrument_node="">.</span></p><span data-dcnode-id="4707" instrument_node="">
</span></div><span data-dcnode-id="4704" instrument_node="">
</span><div class="directory-entry" data-dcnode-id="4668"><span data-dcnode-id="4703" instrument_node="">
</span><div data-dcnode-id="4701"><img alt="" class="alignleft nwbl-author" data-dcnode-id="4702" height="150" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//nwbooklovers.org/wp-content/uploads/2014/01/Dixon-150x150.jpg&amp;raw" title="Ann Dixon" width="150"></div><span data-dcnode-id="4700" instrument_node="">
</span><h3 class="store-name" data-dcnode-id="4698"><span data-dcnode-id="4699" instrument_node="">Ann Dixon</span></h3><span data-dcnode-id="4697" instrument_node="">
</span><p data-dcnode-id="4670"><span data-dcnode-id="4696" instrument_node="">Ann Dixon is a writer, librarian and the author of nine books for children, including </span><em data-dcnode-id="4693"><a data-dcnode-id="4694" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.indiebound.org/book/9780882405193"><span data-dcnode-id="4695" instrument_node="">Blueberry Shoe</span></a></em><span data-dcnode-id="4692" instrument_node="">, </span><em data-dcnode-id="4689"><a data-dcnode-id="4690" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.indiebound.org/book/9780882408361"><span data-dcnode-id="4691" instrument_node="">Alone Across the Arctic: One Woman’s Epic Journey by Dog Team</span></a></em><span data-dcnode-id="4688" instrument_node=""> and </span><em data-dcnode-id="4685"><a data-dcnode-id="4686" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.indiebound.org/book/9780882404950"><span data-dcnode-id="4687" instrument_node="">The Sleeping Lady</span></a></em><span data-dcnode-id="4684" instrument_node="">, honored with an award from the independent booksellers of the Northwest in 1995. Her poetry for children appears in the anthology </span><em data-dcnode-id="4681"><a data-dcnode-id="4682" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.indiebound.org/book/9781590781746"><span data-dcnode-id="4683" instrument_node="">Once Upon Ice and Other Frozen Poems</span></a></em><span data-dcnode-id="4680" instrument_node="">, as well as </span><em data-dcnode-id="4678"><span data-dcnode-id="4679" instrument_node="">Cricket</span></em><span data-dcnode-id="4677" instrument_node=""> and </span><em data-dcnode-id="4675"><span data-dcnode-id="4676" instrument_node="">Ladybug</span></em><span data-dcnode-id="4674" instrument_node=""> magazines. Dixon is director of the Homer Public Library. She blogs about Alaska books and writing for children at </span><a data-dcnode-id="4672" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.kidlitnorth.blogspot.com/"><span data-dcnode-id="4673" instrument_node="">Kid Lit North</span></a><span data-dcnode-id="4671" instrument_node="">.</span></p><span data-dcnode-id="4669" instrument_node="">
</span></div><span data-dcnode-id="4666" instrument_node="">
</span><div class="directory-entry" data-dcnode-id="4633"><span data-dcnode-id="4665" instrument_node="">
</span><div data-dcnode-id="4663"><img alt="" class="alignleft nwbl-author" data-dcnode-id="4664" height="150" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//nwbooklovers.org/wp-content/uploads/2011/01/adoerr-1-150x150.jpg&amp;raw" title="Anthony Doerr" width="150"></div><span data-dcnode-id="4662" instrument_node="">
</span><h3 class="store-name" data-dcnode-id="4660"><span data-dcnode-id="4661" instrument_node="">Anthony Doerr</span></h3><span data-dcnode-id="4659" instrument_node="">
</span><a data-dcnode-id="4657" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.anthonydoerr.com/"><span data-dcnode-id="4658" instrument_node="">www.anthonydoerr.com</span></a><span data-dcnode-id="4656" instrument_node="">
</span><p data-dcnode-id="4635"><span data-dcnode-id="4655" instrument_node="">Anthony Doerr is the author of </span><em data-dcnode-id="4652"><a data-dcnode-id="4653" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.indiebound.org/book/9781439190050"><span data-dcnode-id="4654" instrument_node="">The Shell Collector</span></a></em><span data-dcnode-id="4651" instrument_node="">, </span><em data-dcnode-id="4648"><a data-dcnode-id="4649" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.indiebound.org/book/9780143036166"><span data-dcnode-id="4650" instrument_node="">About Grace</span></a></em><span data-dcnode-id="4647" instrument_node="">, </span><em data-dcnode-id="4644"><a data-dcnode-id="4645" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.indiebound.org/book/9781416573166"><span data-dcnode-id="4646" instrument_node="">Four Seasons in Rome: On Twins, Insomnia and the Biggest Funeral in the History of the World</span></a></em><span data-dcnode-id="4643" instrument_node="">, and </span><em data-dcnode-id="4640"><a data-dcnode-id="4641" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.indiebound.org/book/9781439182840"><span data-dcnode-id="4642" instrument_node="">Memory Wall</span></a></em><span data-dcnode-id="4639" instrument_node="">, which won a 2011 Award from the independent booksellers of the Pacific Northwest Booksellers Association. Doerr’s short fiction has won four O. Henry Prizes and has been widely anthologized. He was won many awards, including a Guggenheim Fellowship, an NEA Fellowship, the National Magazine Award for Fiction, three Pushcart Prizes and the 2010 Story Prize. He teaches now and then in the low-residency MFA program at Warren Wilson College in North Carolina. Doerr lives in Boise with his wife and two sons. Read his essay for NW Book Lovers, </span><a data-dcnode-id="4637" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//nwbooklovers.org/authors/%28https%3A//nwbooklovers.org/2011/01/07/anthony-doerr-on-books-memory-and-the-twelve-bright-stars-scratched-across-page-302/"><span data-dcnode-id="4638" instrument_node="">On Books, Memory and the Twelve Bright Stars Scratched Across Page 302</span></a><span data-dcnode-id="4636" instrument_node="">.</span></p><span data-dcnode-id="4634" instrument_node="">
</span></div><span data-dcnode-id="4631" instrument_node="">
</span><div class="directory-entry" data-dcnode-id="4588"><span data-dcnode-id="4630" instrument_node="">
</span><div data-dcnode-id="4628"><img alt="" class="alignleft nwbl-author" data-dcnode-id="4629" height="150" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//nwbooklovers.org/wp-content/uploads/2010/05/Doig-150x150.jpg&amp;raw" title="Ivan Doig" width="150"></div><span data-dcnode-id="4627" instrument_node="">
</span><h3 class="store-name" data-dcnode-id="4625"><span data-dcnode-id="4626" instrument_node="">Ivan Doig</span></h3><span data-dcnode-id="4624" instrument_node="">
</span><a data-dcnode-id="4622" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.ivandoig.com/"><span data-dcnode-id="4623" instrument_node="">www.ivandoig.com</span></a><span data-dcnode-id="4621" instrument_node="">
</span><p data-dcnode-id="4590"><span data-dcnode-id="4620" instrument_node="">Ivan Doig holds the distinction of having won more PNBA awards than any other Northwest author (</span><em data-dcnode-id="4617"><a data-dcnode-id="4618" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.indiebound.org/book/9780156899826"><span data-dcnode-id="4619" instrument_node="">This House of Sky: Landscapes of a Western Mind</span></a></em><span data-dcnode-id="4616" instrument_node="">, 1978; </span><em data-dcnode-id="4613"><a data-dcnode-id="4614" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.indiebound.org/book/9780743271271"><span data-dcnode-id="4615" instrument_node="">English Creek</span></a></em><span data-dcnode-id="4612" instrument_node="">, 1985; </span><em data-dcnode-id="4609"><a data-dcnode-id="4610" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.indiebound.org/book/9780684831053"><span data-dcnode-id="4611" instrument_node="">Dancing at the Rascal Fair</span></a></em><span data-dcnode-id="4608" instrument_node="">, 1988; </span><em data-dcnode-id="4605"><a data-dcnode-id="4606" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.indiebound.org/book/9780156031080"><span data-dcnode-id="4607" instrument_node="">Heart Earth</span></a></em><span data-dcnode-id="4604" instrument_node="">, 1994; and </span><em data-dcnode-id="4601"><a data-dcnode-id="4602" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.indiebound.org/book/9780156031646"><span data-dcnode-id="4603" instrument_node="">The Whistling Season</span></a></em><span data-dcnode-id="4600" instrument_node="">, 2007). This Montana-born former newspaperman and ranch hand lovingly wrote the American West in both fiction and non-fiction. We like the way he described his “literary begats” </span><a data-dcnode-id="4598" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.ivandoig.com/notes.html"><span data-dcnode-id="4599" instrument_node="">here</span></a><span data-dcnode-id="4597" instrument_node="">. He passed away in 2015 and is survived by his wife, Carol, who has taught the literature of the American West. Read his </span><a data-dcnode-id="4595" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//nwbooklovers.org/2012/08/15/ivan-doig-on-craft-character-and-trout-fishing-in-the-presbyterian-after-life/"><span data-dcnode-id="4596" instrument_node="">interview</span></a><span data-dcnode-id="4594" instrument_node=""> with bookseller René Kirkpatrick on </span><em data-dcnode-id="4592"><span data-dcnode-id="4593" instrument_node="">NW Book Lovers</span></em><span data-dcnode-id="4591" instrument_node="">.</span></p><span data-dcnode-id="4589" instrument_node="">
</span></div><span data-dcnode-id="4586" instrument_node="">
</span><div class="directory-entry" data-dcnode-id="4558"><span data-dcnode-id="4585" instrument_node="">
</span><div data-dcnode-id="4583"><img alt="" class="alignleft nwbl-author" data-dcnode-id="4584" height="150" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//nwbooklovers.org/wp-content/uploads/2011/02/djd-150x150.jpg&amp;raw" title="David James Duncan" width="150"></div><span data-dcnode-id="4582" instrument_node="">
</span><h3 class="store-name" data-dcnode-id="4580"><span data-dcnode-id="4581" instrument_node="">David James Duncan</span></h3><span data-dcnode-id="4579" instrument_node="">
</span><p data-dcnode-id="4560"><span data-dcnode-id="4578" instrument_node="">Novelist and essayist David James Duncan is best known for his two bestselling novels,</span><em data-dcnode-id="4574"><span data-dcnode-id="4577" instrument_node=""> </span><a data-dcnode-id="4575" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.indiebound.org/book/9781578050840"><span data-dcnode-id="4576" instrument_node="">The River Why</span></a></em><span data-dcnode-id="4573" instrument_node=""> and </span><em data-dcnode-id="4570"><a data-dcnode-id="4571" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.indiebound.org/book/9780553378498"><span data-dcnode-id="4572" instrument_node="">The Brothers K</span></a></em><span data-dcnode-id="4569" instrument_node="">, both about flyfishing, baseball, and family. The two, as well as his discourse about Christian convservatives, </span><em data-dcnode-id="4566"><a data-dcnode-id="4567" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.indiebound.org/book/9780977717019"><span data-dcnode-id="4568" instrument_node="">God Laughs &amp; Plays: Churchless Sermons in Response to the Preachments of the Fundamentalist Right</span></a></em><span data-dcnode-id="4565" instrument_node="">, have been honored by the independent booksellers of the Northwest. His recent book, </span><em data-dcnode-id="4562"><a data-dcnode-id="4563" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.indiebound.org/book/9780615425931"><span data-dcnode-id="4564" instrument_node="">The Heart of the Monster: Why the Pacific Northwest &amp; Northern Rockies Must Not Become an ExxonMobil Conduit to the Alberta Tar Sands</span></a></em><span data-dcnode-id="4561" instrument_node="">, co-authored with Rick Bass, is a protest against the construction of a permanent industrial corridor on rural roads in the Northwest and Northern Rockies. Duncan was born in Portland and now lives with his family in southwestern Montana, where he works with the American Rivers Association toward removing four dams on the Snake River.</span></p><span data-dcnode-id="4559" instrument_node="">
</span></div><span data-dcnode-id="4556" instrument_node="">
</span><div class="directory-entry" data-dcnode-id="4529"><span data-dcnode-id="4555" instrument_node="">
</span><div data-dcnode-id="4553"><img alt="" class="alignleft nwbl-author" data-dcnode-id="4554" height="150" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//nwbooklovers.org/wp-content/uploads/2010/05/newEgan-150x150.jpg&amp;raw" title="Timothy Egan" width="150"></div><span data-dcnode-id="4552" instrument_node="">
</span><h3 class="store-name" data-dcnode-id="4550"><span data-dcnode-id="4551" instrument_node="">Timothy Egan</span></h3><span data-dcnode-id="4549" instrument_node="">
</span><p data-dcnode-id="4531"><span data-dcnode-id="4548" instrument_node="">Timothy Egan describes himself as “one of the many insignificant bi peds systematically trying to create my own slice of nirvana here on earth.” Pretty humble stuff for a guy who has won both a Pulitzer Prize and a National Book Award—not to mention two PNBA Book Awards (for the </span><em data-dcnode-id="4544"><a data-dcnode-id="4546" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.indiebound.org/book/9780679734857"><span data-dcnode-id="4547" instrument_node="">The Good Rain: Across Time &amp; Terrain in the Pacific Northwest</span></a><span data-dcnode-id="4545" instrument_node="">, </span></em><span data-dcnode-id="4543" instrument_node="">1991, and </span><em data-dcnode-id="4539"><a data-dcnode-id="4541" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.indiebound.org/book/9780547394602"><span data-dcnode-id="4542" instrument_node="">The Big Burn: Teddy Roosevelt and the Fire that Saved America</span></a><span data-dcnode-id="4540" instrument_node="">, </span></em><span data-dcnode-id="4538" instrument_node="">2009). He lives in Seattle, where he contributes </span><a data-dcnode-id="4536" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//opinionator.blogs.nytimes.com/category/timothy-egan/"><span data-dcnode-id="4537" instrument_node="">opinion columns</span></a><span data-dcnode-id="4535" instrument_node=""> to </span><em data-dcnode-id="4533"><span data-dcnode-id="4534" instrument_node="">The New York Times </span></em><span data-dcnode-id="4532" instrument_node="">as the paper’s Pacific Northwest correspondent.</span></p><span data-dcnode-id="4530" instrument_node="">
</span></div><span data-dcnode-id="4527" instrument_node="">
</span><div class="directory-entry" data-dcnode-id="4513"><span data-dcnode-id="4526" instrument_node="">
</span><h3 class="store-name" data-dcnode-id="4524"><span data-dcnode-id="4525" instrument_node="">Keith Ervin</span></h3><span data-dcnode-id="4523" instrument_node="">
</span><p data-dcnode-id="4515"><span data-dcnode-id="4522" instrument_node="">Keith Ervin has been a staff reporter for </span><em data-dcnode-id="4520"><span data-dcnode-id="4521" instrument_node="">The Seattle Times</span></em><span data-dcnode-id="4519" instrument_node=""> since 1990. He covers King County government, Seattle public schools and suburban cities. His popular science book, </span><em data-dcnode-id="4517"><span data-dcnode-id="4518" instrument_node="">Fragile Majesty: The Battle for North America’s Last Great Forest</span></em><span data-dcnode-id="4516" instrument_node="">, was honored by the independent booksellers of the Northwest in 1990. Ervin lives in Seattle.</span></p><span data-dcnode-id="4514" instrument_node="">
</span></div><span data-dcnode-id="4511" instrument_node="">
</span><div class="directory-entry" data-dcnode-id="4473"><span data-dcnode-id="4510" instrument_node="">
</span><div data-dcnode-id="4508"><img alt="" class="alignleft nwbl-author" data-dcnode-id="4509" height="150" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//nwbooklovers.org/wp-content/uploads/2014/01/Evison-150x150.jpg&amp;raw" title="Jonathan Evison" width="150"></div><span data-dcnode-id="4507" instrument_node="">
</span><h3 class="store-name" data-dcnode-id="4505"><span data-dcnode-id="4506" instrument_node="">Jonathan Evison</span></h3><span data-dcnode-id="4504" instrument_node="">
</span><a data-dcnode-id="4502" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.jonathanevison.net/"><span data-dcnode-id="4503" instrument_node="">www.jonathanevison.net</span></a><span data-dcnode-id="4501" instrument_node="">
</span><p data-dcnode-id="4475"><span data-dcnode-id="4500" instrument_node="">Jonathan Evison has won two PNBA book awards so far, for novels </span><em data-dcnode-id="4498"><span data-dcnode-id="4499" instrument_node="">West of Here</span></em><span data-dcnode-id="4497" instrument_node=""> (in 2012) and </span><em data-dcnode-id="4495"><span data-dcnode-id="4496" instrument_node="">The Revised Fundamentals of Caregiving</span></em><span data-dcnode-id="4494" instrument_node=""> (2013), and his debut novel, </span><em data-dcnode-id="4492"><span data-dcnode-id="4493" instrument_node="">All About Lulu</span></em><span data-dcnode-id="4491" instrument_node="">, won a Washington State Book Award in 2008. We like the bio he wrote </span><a data-dcnode-id="4489" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.revisedfundamentals.com/about-jonathan-evison.html"><span data-dcnode-id="4490" instrument_node="">here</span></a><span data-dcnode-id="4488" instrument_node=""> and you can read an essay he wrote for </span><em data-dcnode-id="4486"><span data-dcnode-id="4487" instrument_node="">NW Book Lovers</span></em><span data-dcnode-id="4485" instrument_node=""> </span><a data-dcnode-id="4483" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//nwbooklovers.org/2012/01/25/why-we-endure-by-2012-pnba-award-winner-jonathan-evison/"><span data-dcnode-id="4484" instrument_node="">here</span></a><span data-dcnode-id="4482" instrument_node="">. In an introduction to </span><a data-dcnode-id="4480" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//nwbooklovers.org/2012/08/28/jonathan-evison-talks-loss-humor-survival-in-revised-fundamentals/"><span data-dcnode-id="4481" instrument_node="">an interview</span></a><span data-dcnode-id="4479" instrument_node=""> on </span><em data-dcnode-id="4477"><span data-dcnode-id="4478" instrument_node="">NW Book Lovers</span></em><span data-dcnode-id="4476" instrument_node="">, bookseller Lindsey McGuirk writes: “Jonathan Evison has become a bit of a darling in the book world, and it’s no wonder why. Indie booksellers love him because he’s an advocate for indie bookstores. His publisher, Algonquin Books, loves him because he’s charismatic and willing to get out there among booksellers and readers. And readers love him because, well, he knows how to write a book that’s worth reading.”</span></p><span data-dcnode-id="4474" instrument_node="">
</span></div><span data-dcnode-id="4471" instrument_node="">
</span><div class="directory-entry" data-dcnode-id="4451"><span data-dcnode-id="4470" instrument_node="">
</span><div data-dcnode-id="4468"><img alt="" class="alignleft nwbl-author" data-dcnode-id="4469" height="150" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//nwbooklovers.org/wp-content/uploads/2014/01/Farr-150x150.jpg&amp;raw" title="William E. Farr" width="150"></div><span data-dcnode-id="4467" instrument_node="">
</span><h3 class="store-name" data-dcnode-id="4465"><span data-dcnode-id="4466" instrument_node="">William E. Farr</span></h3><span data-dcnode-id="4464" instrument_node="">
</span><p data-dcnode-id="4453"><span data-dcnode-id="4463" instrument_node="">William E. Farr holds the A. B. Hammond Chair in Western History at The University of Montana, where he specializes in the environmental and cultural history of the West. He is the author of eight books, most recently </span><em data-dcnode-id="4461"><span data-dcnode-id="4462" instrument_node="">Horizontal Yellow</span></em><span data-dcnode-id="4460" instrument_node="">, </span><em data-dcnode-id="4458"><span data-dcnode-id="4459" instrument_node="">The Natural West</span></em><span data-dcnode-id="4457" instrument_node="">, and </span><em data-dcnode-id="4455"><span data-dcnode-id="4456" instrument_node="">Reservation Blackfeet, 1882-1945: A Photographic History of Cultural Survival</span></em><span data-dcnode-id="4454" instrument_node="">, which was honored by the independent booksellers of the Northwest in 1985. His work on the environment, art and culture of the West also appears in magazines.</span></p><span data-dcnode-id="4452" instrument_node="">
</span></div><span data-dcnode-id="4449" instrument_node="">
</span><div class="directory-entry" data-dcnode-id="4438"><span data-dcnode-id="4448" instrument_node="">
</span><h3 class="store-name" data-dcnode-id="4446"><span data-dcnode-id="4447" instrument_node="">Brenda Lena Fazio</span></h3><span data-dcnode-id="4445" instrument_node="">
</span><p data-dcnode-id="4440"><span data-dcnode-id="4444" instrument_node="">Brenda Lena Fazio is a children’s book author and illustrator who lives in Gig Harbor, Washington. </span><em data-dcnode-id="4442"><span data-dcnode-id="4443" instrument_node="">Grandfather’s Story</span></em><span data-dcnode-id="4441" instrument_node=""> was honored in 1997 by the independent booksellers of the Northwest. It’s about a grandfather who thinks he’s too old to be useful and then has a dream that teaches him better.</span></p><span data-dcnode-id="4439" instrument_node="">
</span></div><span data-dcnode-id="4436" instrument_node="">
</span><div class="directory-entry" data-dcnode-id="4417"><span data-dcnode-id="4435" instrument_node="">
</span><div data-dcnode-id="4433"><img alt="" class="alignleft nwbl-author" data-dcnode-id="4434" height="150" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//nwbooklovers.org/wp-content/uploads/2013/01/ferguson150x150.jpg&amp;raw" title="Gary Ferguson" width="150"></div><span data-dcnode-id="4432" instrument_node="">
</span><h3 class="store-name" data-dcnode-id="4430"><span data-dcnode-id="4431" instrument_node="">Gary Ferguson</span></h3><span data-dcnode-id="4429" instrument_node="">
</span><a data-dcnode-id="4427" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.wildwords.net/"><span data-dcnode-id="4428" instrument_node="">www.wildwords.net</span></a><span data-dcnode-id="4426" instrument_node="">
</span><p data-dcnode-id="4419"><span data-dcnode-id="4425" instrument_node="">Gary Ferguson believes that strong writing grows out of strong experience. Hence, Ferguson has hiked and skied thousands of miles through high deserts and forests, canoed countless miles of wild rivers, and explored some of the remotest corners of the Earth. He is the author of 16 books on nature, science and history. His recent work, </span><em data-dcnode-id="4421"><a data-dcnode-id="4423" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.indiebound.org/book/9780792268918"><span data-dcnode-id="4424" instrument_node="">Hawks Rest: A Season in the Remote Heart of Yellowstone</span></a><span data-dcnode-id="4422" instrument_node="">,</span></em><span data-dcnode-id="4420" instrument_node=""> became the first book in history to win nonfiction Book of The Year from both the independent booksellers of the Northwest, as well Mountains and Plains booksellers associations. Ferguson’s nature and science-based essays can be heard on National Public Radio affiliates throughout the country.</span></p><span data-dcnode-id="4418" instrument_node="">
</span></div><span data-dcnode-id="4415" instrument_node="">
</span><div class="directory-entry" data-dcnode-id="4400"><span data-dcnode-id="4414" instrument_node="">
</span><div data-dcnode-id="4412"><img alt="" class="alignleft nwbl-author" data-dcnode-id="4413" height="150" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//nwbooklovers.org/wp-content/uploads/2014/01/Fobes-150x150.jpg&amp;raw" title="Natalie Fobes" width="150"></div><span data-dcnode-id="4411" instrument_node="">
</span><h3 class="store-name" data-dcnode-id="4409"><span data-dcnode-id="4410" instrument_node="">Natalie Fobes</span></h3><span data-dcnode-id="4408" instrument_node="">
</span><p data-dcnode-id="4402"><span data-dcnode-id="4407" instrument_node="">Photographer Natalie Fobes has three books under her belt, was a Pulitzer Prize finalist in a writing category, has a traveling museum exhibit and is a popular wedding and portrait photographer in Seattle. Her book, with co-authors Tom Jay and Brad Matsen, </span><em data-dcnode-id="4404"><a data-dcnode-id="4405" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.indiebound.org/book/9780882404493"><span data-dcnode-id="4406" instrument_node="">Reaching Home: Pacific Salmon, Pacific People</span></a></em><span data-dcnode-id="4403" instrument_node="">, was honored in 1995 by the independent booksellers of the Northwest. When not on assignment Fobes lives with her family on a bluff overlooking Puget Sound and wishes she was sailing.</span></p><span data-dcnode-id="4401" instrument_node="">
</span></div><span data-dcnode-id="4398" instrument_node="">
</span><div class="directory-entry" data-dcnode-id="4369"><span data-dcnode-id="4397" instrument_node="">
</span><div data-dcnode-id="4395"><img alt="" class="alignleft nwbl-author" data-dcnode-id="4396" height="150" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//nwbooklovers.org/wp-content/uploads/2014/01/Ford-150x150.jpg&amp;raw" title="Richard Ford" width="150"></div><span data-dcnode-id="4394" instrument_node="">
</span><h3 class="store-name" data-dcnode-id="4392"><span data-dcnode-id="4393" instrument_node="">Richard Ford</span></h3><span data-dcnode-id="4391" instrument_node="">
</span><p data-dcnode-id="4371"><span data-dcnode-id="4390" instrument_node="">Richard Ford is the author of six novels and four collections of stories. He was awarded the Pulitzer Prize and the PEN/Faulkner Award for </span><em data-dcnode-id="4387"><a data-dcnode-id="4388" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.indiebound.org/book/9780679735182"><span data-dcnode-id="4389" instrument_node="">Independence Day</span></a></em><span data-dcnode-id="4386" instrument_node="">; it was the first time the same book had won both prizes. After publishing two modestly successful novels he turned away from literature and tried sportswriting, working for </span><em data-dcnode-id="4384"><span data-dcnode-id="4385" instrument_node="">Inside Sports</span></em><span data-dcnode-id="4383" instrument_node=""> magazine until it ceased publication in 1982. When </span><em data-dcnode-id="4381"><span data-dcnode-id="4382" instrument_node="">Sports Illustrated</span></em><span data-dcnode-id="4380" instrument_node=""> failed to offer a position he turned back to fiction. The result was </span><em data-dcnode-id="4377"><a data-dcnode-id="4378" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.indiebound.org/book/9780679762102"><span data-dcnode-id="4379" instrument_node="">The Sportswriter</span></a></em><span data-dcnode-id="4376" instrument_node="">. Soon after came </span><em data-dcnode-id="4373"><a data-dcnode-id="4374" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.indiebound.org/book/9780802144577"><span data-dcnode-id="4375" instrument_node="">Rock Springs</span></a></em><span data-dcnode-id="4372" instrument_node="">, which contains several widely anthologized short stories and was honored by the independent booksellers of the Northwest in 1988. Ford lives in New York and Maine.</span></p><span data-dcnode-id="4370" instrument_node="">
</span></div><span data-dcnode-id="4367" instrument_node="">
</span><div class="directory-entry" data-dcnode-id="4348"><span data-dcnode-id="4366" instrument_node="">
</span><div data-dcnode-id="4364"><img alt="" class="alignleft nwbl-author" data-dcnode-id="4365" height="150" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//nwbooklovers.org/wp-content/uploads/2013/01/freeman-toole150x150.jpg&amp;raw" title="Louise Freeman-Toole" width="150"></div><span data-dcnode-id="4363" instrument_node="">
</span><h3 class="store-name" data-dcnode-id="4361"><span data-dcnode-id="4362" instrument_node="">Louise Freeman-Toole</span></h3><span data-dcnode-id="4360" instrument_node="">
</span><p data-dcnode-id="4350"><span data-dcnode-id="4359" instrument_node="">Louise Freeman-Toole is the author of </span><em data-dcnode-id="4355"><a data-dcnode-id="4357" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.indiebound.org/book/9780803269101"><span data-dcnode-id="4358" instrument_node="">Standing Up to the Rock</span></a><span data-dcnode-id="4356" instrument_node="">,</span></em><span data-dcnode-id="4354" instrument_node=""> a memoir of life on a historic cattle ranch in Idaho’s Hells Canyon. </span><em data-dcnode-id="4352"><span data-dcnode-id="4353" instrument_node="">Standing Up to the Rock</span></em><span data-dcnode-id="4351" instrument_node=""> was honored with a 2002 award from the independent booksellers of the Northwest. She has been writer in residence at the Klondike Gold Rush National Historical Park in Skagway, Alaska, and the Island Institute, in Sitka, Alaska. Louise Freeman Toole lives in a remote village on the Alaska-Yukon border.</span></p><span data-dcnode-id="4349" instrument_node="">
</span></div><span data-dcnode-id="4346" instrument_node="">
</span><div class="directory-entry" data-dcnode-id="4313"><span data-dcnode-id="4345" instrument_node="">
</span><div data-dcnode-id="4343"><img alt="" class="alignleft nwbl-author" data-dcnode-id="4344" height="150" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//nwbooklovers.org/wp-content/uploads/2013/01/fromm150x150.jpg&amp;raw" title="Pete Fromm" width="150"></div><span data-dcnode-id="4342" instrument_node="">
</span><h3 class="store-name" data-dcnode-id="4340"><span data-dcnode-id="4341" instrument_node="">Pete Fromm</span></h3><span data-dcnode-id="4339" instrument_node="">
</span><a data-dcnode-id="4337" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.petefromm.com/"><span data-dcnode-id="4338" instrument_node="">www.petefromm.com</span></a><span data-dcnode-id="4336" instrument_node="">
</span><p data-dcnode-id="4315"><span data-dcnode-id="4335" instrument_node="">Pete Fromm’s fiction and nonfiction books have won awards from the independent booksellers of the Pacific Northwest an impressive four times for </span><em data-dcnode-id="4325"><a data-dcnode-id="4333" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.indiebound.org/book/9780312307769"><span data-dcnode-id="4334" instrument_node="">As Cool As I Am</span></a><span data-dcnode-id="4332" instrument_node="">, </span><a data-dcnode-id="4330" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.indiebound.org/book/9780312276973"><span data-dcnode-id="4331" instrument_node="">How All This Started</span></a><span data-dcnode-id="4329" instrument_node="">, </span><a data-dcnode-id="4327" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.indiebound.org/book/9780312422721"><span data-dcnode-id="4328" instrument_node="">Indian Creek Chronicles: A Winter Alone in the Wilderness</span></a><span data-dcnode-id="4326" instrument_node=""> </span></em><span data-dcnode-id="4324" instrument_node="">and </span><em data-dcnode-id="4320"><a data-dcnode-id="4322" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.indiebound.org/book/9780312263638"><span data-dcnode-id="4323" instrument_node="">Night Swimming</span></a><span data-dcnode-id="4321" instrument_node="">.</span></em><span data-dcnode-id="4319" instrument_node=""> </span><em data-dcnode-id="4317"><span data-dcnode-id="4318" instrument_node="">As Cool As I Am</span></em><span data-dcnode-id="4316" instrument_node=""> is also a feature film starring Claire Danes, James Marsden and Sarah Bolger, and Dry Rain is a short film starring James LeGros and Nathan Gamble. Fromm has published more than 200 short stories in magazines. He is on the faculty of Pacific University’s low-residency MFA writing program and lives in Great Falls, Montana, with his wife and two children.</span></p><span data-dcnode-id="4314" instrument_node="">
</span></div><span data-dcnode-id="4311" instrument_node="">
</span><div class="directory-entry" data-dcnode-id="4285"><span data-dcnode-id="4310" instrument_node="">
</span><div data-dcnode-id="4308"><img alt="" class="alignleft nwbl-author" data-dcnode-id="4309" height="150" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//nwbooklovers.org/wp-content/uploads/2014/01/Fulghum-150x150.jpg&amp;raw" title="Robert Fulghum" width="150"></div><span data-dcnode-id="4307" instrument_node="">
</span><h3 class="store-name" data-dcnode-id="4305"><span data-dcnode-id="4306" instrument_node="">Robert Fulghum</span></h3><span data-dcnode-id="4304" instrument_node="">
</span><p data-dcnode-id="4287"><span data-dcnode-id="4303" instrument_node="">Robert Fulghum has published eight best-selling books of nonfiction, including </span><em data-dcnode-id="4300"><a data-dcnode-id="4301" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.indiebound.org/book/9780804105828"><span data-dcnode-id="4302" instrument_node="">It Was On Fire When I Lay Down On It</span></a></em><span data-dcnode-id="4299" instrument_node="">; </span><em data-dcnode-id="4296"><a data-dcnode-id="4297" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.indiebound.org/book/9780804111157"><span data-dcnode-id="4298" instrument_node="">Maybe (Maybe Not): Second Thoughts from a Secret Life</span></a></em><span data-dcnode-id="4295" instrument_node="">; </span><em data-dcnode-id="4293"><span data-dcnode-id="4294" instrument_node="">From Beginning To End – The Rituals of Our Lives</span></em><span data-dcnode-id="4292" instrument_node=""> and </span><em data-dcnode-id="4289"><a data-dcnode-id="4290" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.indiebound.org/book/9780345466396"><span data-dcnode-id="4291" instrument_node="">All I Really Need To Know I Learned in Kindergarten</span></a></em><span data-dcnode-id="4288" instrument_node="">, honored by the independent booksellers of the Northwest in 1989. Fulghum, a Grammy nominee for the Spoken Word Award, served as a Unitarian parish minister for 22 years. He has four children and nine grandchildren and divides his time between Seattle and the Moab, Utah.</span></p><span data-dcnode-id="4286" instrument_node="">
</span></div><span data-dcnode-id="4283" instrument_node="">
</span><div class="directory-entry" data-dcnode-id="4250"><span data-dcnode-id="4282" instrument_node="">
</span><div data-dcnode-id="4280"><img alt="" class="alignleft nwbl-author" data-dcnode-id="4281" height="150" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//nwbooklovers.org/wp-content/uploads/2014/01/Gibson-150x150.jpg&amp;raw" title="William Gibson" width="150"></div><span data-dcnode-id="4279" instrument_node="">
</span><h3 class="store-name" data-dcnode-id="4277"><span data-dcnode-id="4278" instrument_node="">William Gibson</span></h3><span data-dcnode-id="4276" instrument_node="">
</span><a data-dcnode-id="4274" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.williamgibsonbooks.com/"><span data-dcnode-id="4275" instrument_node="">www.williamgibsonbooks.com</span></a><span data-dcnode-id="4273" instrument_node="">
</span><p data-dcnode-id="4252"><span data-dcnode-id="4272" instrument_node="">Science fiction author William Gibson has written more than 20 short stories and ten critically acclaimed novels, and has contributed articles to several major publications as well as collaborated extensively with performance artists, filmmakers and musicians. His books include </span><em data-dcnode-id="4269"><a data-dcnode-id="4270" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.indiebound.org/book/9780399156823"><span data-dcnode-id="4271" instrument_node="">Zero History</span></a></em><span data-dcnode-id="4268" instrument_node="">, </span><em data-dcnode-id="4265"><a data-dcnode-id="4266" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.indiebound.org/book/9780425226711"><span data-dcnode-id="4267" instrument_node="">Spook Country</span></a></em><span data-dcnode-id="4264" instrument_node="">, </span><em data-dcnode-id="4261"><a data-dcnode-id="4262" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.indiebound.org/book/9780441569595"><span data-dcnode-id="4263" instrument_node="">Neuromancer</span></a></em><span data-dcnode-id="4260" instrument_node="">, and </span><em data-dcnode-id="4257"><a data-dcnode-id="4258" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.indiebound.org/book/9780553281743"><span data-dcnode-id="4259" instrument_node="">Mona Lisa Overdrive</span></a></em><span data-dcnode-id="4256" instrument_node="">, which was honored by the independent booksellers of the Northwest in 1989. Gibson is credited with launching the cyberpunk subgenre of science fiction and with coining the term “cyberspace.” He writes his story</span><a data-dcnode-id="4254" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//nwbooklovers.org/authors/%28http%3A//www.williamgibsonbooks.com/source/source.asp"><span data-dcnode-id="4255" instrument_node=""> here</span></a><span data-dcnode-id="4253" instrument_node="">. Gibson lives in Vancouver, B.C.</span></p><span data-dcnode-id="4251" instrument_node="">
</span></div><span data-dcnode-id="4248" instrument_node="">
</span><div class="directory-entry" data-dcnode-id="4219"><span data-dcnode-id="4247" instrument_node="">
</span><div data-dcnode-id="4245"><img alt="" class="alignleft nwbl-author" data-dcnode-id="4246" height="150" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//nwbooklovers.org/wp-content/uploads/2014/01/Gloss-150x150.jpg&amp;raw" title="Molly Gloss" width="150"></div><span data-dcnode-id="4244" instrument_node="">
</span><h3 class="store-name" data-dcnode-id="4242"><span data-dcnode-id="4243" instrument_node="">Molly Gloss</span></h3><span data-dcnode-id="4241" instrument_node="">
</span><a data-dcnode-id="4239" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.mollygloss.com/"><span data-dcnode-id="4240" instrument_node="">www.mollygloss.com</span></a><span data-dcnode-id="4238" instrument_node="">
</span><p data-dcnode-id="4221"><span data-dcnode-id="4237" instrument_node="">Molly Gloss is a fourth-generation Oregonian whose novel </span><em data-dcnode-id="4234"><a data-dcnode-id="4235" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.indiebound.org/book/9780544310650"><span data-dcnode-id="4236" instrument_node="">The Jump-Off Creek</span></a></em><span data-dcnode-id="4233" instrument_node=""> was a PEN/Faulkner finalist, a winner of the Oregon Book Award and a PNBA Award (1990). William Kittredge called it “a truly beautiful piece of American storytelling.” Her novel </span><em data-dcnode-id="4230"><a data-dcnode-id="4231" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.indiebound.org/book/9780312864378"><span data-dcnode-id="4232" instrument_node="">The Dazzle of Day</span></a></em><span data-dcnode-id="4229" instrument_node=""> was a New York Times Notable Book and </span><em data-dcnode-id="4226"><a data-dcnode-id="4227" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.indiebound.org/book/9780618131570"><span data-dcnode-id="4228" instrument_node="">Wild Life</span></a></em><span data-dcnode-id="4225" instrument_node=""> won the James Tiptree Award and was the 2002 selection for “If All Seattle Read the Same Book.” Twice a recipient of a Whiting Foundation Award, Gloss lives in Portland. She writes </span><a data-dcnode-id="4223" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//mollygloss.com/writer.html"><span data-dcnode-id="4224" instrument_node="">here</span></a><span data-dcnode-id="4222" instrument_node=""> about becoming a writer.</span></p><span data-dcnode-id="4220" instrument_node="">
</span></div><span data-dcnode-id="4217" instrument_node="">
</span><div class="directory-entry" data-dcnode-id="4202"><span data-dcnode-id="4216" instrument_node="">
</span><div data-dcnode-id="4214"><img alt="" class="alignleft nwbl-author" data-dcnode-id="4215" height="150" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//nwbooklovers.org/wp-content/uploads/2014/01/Guterson-150x150.jpg&amp;raw" title="David Guterson" width="150"></div><span data-dcnode-id="4213" instrument_node="">
</span><h3 class="store-name" data-dcnode-id="4211"><span data-dcnode-id="4212" instrument_node="">David Guterson</span></h3><span data-dcnode-id="4210" instrument_node="">
</span><p data-dcnode-id="4204"><span data-dcnode-id="4209" instrument_node="">A former high school English teacher, David Guterson is a novelist, short story writer, poet, journalist and essayist who is best known for his best-selling novel </span><em data-dcnode-id="4206"><a data-dcnode-id="4207" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.indiebound.org/book/9780679764021"><span data-dcnode-id="4208" instrument_node="">Snow Falling on Cedars</span></a></em><span data-dcnode-id="4205" instrument_node="">, which won a PNBA Award and a PEN/Faulkner Award in 1995. The book was adapted as a screenplay for the 1999 film of the same title. A Guggenheim Fellow, Guterson lives on Bainbridge Island with his wife and four children and is co-founder of Field’s End, an organization for writers.</span></p><span data-dcnode-id="4203" instrument_node="">
</span></div><span data-dcnode-id="4200" instrument_node="">
</span><div class="directory-entry" data-dcnode-id="4166"><span data-dcnode-id="4199" instrument_node="">
</span><div data-dcnode-id="4197"><img alt="" class="alignleft nwbl-author" data-dcnode-id="4198" height="150" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//nwbooklovers.org/wp-content/uploads/2014/01/haines-150x150.jpg&amp;raw" title="John Haines" width="150"></div><span data-dcnode-id="4196" instrument_node="">
</span><h3 class="store-name" data-dcnode-id="4194"><span data-dcnode-id="4195" instrument_node="">John Haines</span></h3><span data-dcnode-id="4193" instrument_node="">
</span><p data-dcnode-id="4168"><span data-dcnode-id="4192" instrument_node="">Born in Norfolk, Virginia, in 1924, John Haines is the author of more than ten collections of poetry, including </span><em data-dcnode-id="4189"><a data-dcnode-id="4190" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.indiebound.org/book/9780295981451"><span data-dcnode-id="4191" instrument_node="">For the Century’s End: Poems 1990-1999</span></a></em><span data-dcnode-id="4188" instrument_node="">, </span><em data-dcnode-id="4185"><a data-dcnode-id="4186" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.indiebound.org/book/9781556590795"><span data-dcnode-id="4187" instrument_node="">At the End of This Summer: Poems 1948-1954</span></a></em><span data-dcnode-id="4184" instrument_node=""> and </span><em data-dcnode-id="4181"><a data-dcnode-id="4182" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.indiebound.org/book/9781555971847"><span data-dcnode-id="4183" instrument_node="">The Owl in the Mask of the Dreamer</span></a></em><span data-dcnode-id="4180" instrument_node="">, which was honored by the independent booksellers of the Northwest in 1994. He also published a book of essays entitled </span><em data-dcnode-id="4177"><a data-dcnode-id="4178" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.indiebound.org/book/9781555972271"><span data-dcnode-id="4179" instrument_node="">Fables and Distances: New and Selected Essays</span></a></em><span data-dcnode-id="4176" instrument_node="">, and a memoir, </span><em data-dcnode-id="4173"><a data-dcnode-id="4174" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.indiebound.org/book/9780671725266"><span data-dcnode-id="4175" instrument_node="">The Stars, the Snow, the Fire: Twenty-five Years in the Northern Wilderness</span></a></em><span data-dcnode-id="4172" instrument_node="">. Haines spent more than twenty years homesteading in Alaska, and taught at Ohio University, George Washington University, and the University of Cincinnati. </span><em data-dcnode-id="4170"><span data-dcnode-id="4171" instrument_node="">Harper’s</span></em><span data-dcnode-id="4169" instrument_node=""> critic Hayden Carruth once described Haines as “one of our best nature poets, or for that matter one of the best nature writers of any kind.” He died in 2011 in Fairbanks, Alaska.</span></p><span data-dcnode-id="4167" instrument_node="">
</span></div><span data-dcnode-id="4164" instrument_node="">
</span><div class="directory-entry" data-dcnode-id="4136"><span data-dcnode-id="4163" instrument_node="">
</span><div data-dcnode-id="4161"><img alt="" class="alignleft nwbl-author" data-dcnode-id="4162" height="150" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//nwbooklovers.org/wp-content/uploads/2013/01/hamill150x150.jpg&amp;raw" title="Sam Hamill" width="150"></div><span data-dcnode-id="4160" instrument_node="">
</span><h3 class="store-name" data-dcnode-id="4158"><span data-dcnode-id="4159" instrument_node="">Sam Hamill</span></h3><span data-dcnode-id="4157" instrument_node="">
</span><p data-dcnode-id="4138"><span data-dcnode-id="4156" instrument_node="">Hamill is the author of more than a dozen collections of poetry, including </span><em data-dcnode-id="4146"><a data-dcnode-id="4154" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.indiebound.org/book/9781877727559"><span data-dcnode-id="4155" instrument_node="">Destination Zero: Poems 1970–1995</span></a><span data-dcnode-id="4153" instrument_node="">, </span><a data-dcnode-id="4151" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.indiebound.org/book/9781590301845"><span data-dcnode-id="4152" instrument_node="">Almost Paradise: New and Selected Poems and Translations</span></a><span data-dcnode-id="4150" instrument_node="">, and </span><a data-dcnode-id="4148" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.indiebound.org/book/9781929918256"><span data-dcnode-id="4149" instrument_node="">Dumb Luck</span></a><span data-dcnode-id="4147" instrument_node="">,</span></em><span data-dcnode-id="4145" instrument_node=""> which was honored in 2003 by the independent booksellers of the Northwest. Hamill has also published several collections of essays and numerous translations, including </span><em data-dcnode-id="4143"><span data-dcnode-id="4144" instrument_node="">Crossing the Yellow River: 300 Poems from the Chinese.</span></em><span data-dcnode-id="4142" instrument_node=""> When First Lady Laura Bush invited Hamill to a 2003 White House symposium on poetry, he declined in protest of the impending war in Iraq, and instead launched the website </span><a data-dcnode-id="4140" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//poetsagainstthewar.org/"><span data-dcnode-id="4141" instrument_node="">poetsagainstthewar.org,</span></a><span data-dcnode-id="4139" instrument_node=""> an online anthology that has collected over 20,000 poems of protest and spawned an international movement.</span></p><span data-dcnode-id="4137" instrument_node="">
</span></div><span data-dcnode-id="4134" instrument_node="">
</span><div class="directory-entry" data-dcnode-id="4123"><span data-dcnode-id="4133" instrument_node="">
</span><h3 class="store-name" data-dcnode-id="4131"><span data-dcnode-id="4132" instrument_node="">Alex Hancock</span></h3><span data-dcnode-id="4130" instrument_node="">
</span><p data-dcnode-id="4125"><span data-dcnode-id="4129" instrument_node="">Alex Hancock’s book </span><em data-dcnode-id="4127"><span data-dcnode-id="4128" instrument_node="">Into the Light</span></em><span data-dcnode-id="4126" instrument_node="">, about a dying man’s love for his grandson, was honored by the independent booksellers of the Northwest in 1987.</span></p><span data-dcnode-id="4124" instrument_node="">
</span></div><span data-dcnode-id="4121" instrument_node="">
</span><div class="directory-entry" data-dcnode-id="4093"><span data-dcnode-id="4120" instrument_node="">
</span><div data-dcnode-id="4118"><img alt="" class="alignleft nwbl-author" data-dcnode-id="4119" height="150" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//nwbooklovers.org/wp-content/uploads/2014/01/Hanson-150x150.jpg&amp;raw" title="Thor Hanson" width="150"></div><span data-dcnode-id="4117" instrument_node="">
</span><h3 class="store-name" data-dcnode-id="4115"><span data-dcnode-id="4116" instrument_node="">Thor Hanson</span></h3><span data-dcnode-id="4114" instrument_node="">
</span><a data-dcnode-id="4112" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.thorhanson.net/Home.html"><span data-dcnode-id="4113" instrument_node="">www.thorhanson.net/Home.html</span></a><span data-dcnode-id="4111" instrument_node="">
</span><p data-dcnode-id="4095"><span data-dcnode-id="4110" instrument_node="">Thor Hanson is an author and conservation biologist, a Switzer Environmental fellow, a teacher and a sought-after public speaker. His first nonfiction book, </span><em data-dcnode-id="4107"><a data-dcnode-id="4108" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.indiebound.org/book/9781933698199"><span data-dcnode-id="4109" instrument_node="">The Impenetrable Forest: My Gorilla Years in Uganda</span></a></em><span data-dcnode-id="4106" instrument_node="">, won the 2008 USA Book News Award for nature writing, and his second, </span><em data-dcnode-id="4103"><a data-dcnode-id="4104" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.indiebound.org/book/9780465028788"><span data-dcnode-id="4105" instrument_node="">Feathers: The Evolution of a Natural Miracle</span></a></em><span data-dcnode-id="4102" instrument_node="">, won a PNBA Award in 2012 (“Hanson’s well-researched book is like sitting down for a lively chat with a particularly bright friend.”—PNBA booksellers). Read his </span><a data-dcnode-id="4100" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//nwbooklovers.org/2012/02/01/associations-an-essay-by-2012-pnba-award-winner-thor-hanson/"><span data-dcnode-id="4101" instrument_node="">celebratory essay</span></a><span data-dcnode-id="4099" instrument_node=""> for </span><em data-dcnode-id="4097"><span data-dcnode-id="4098" instrument_node="">NW Book Lovers</span></em><span data-dcnode-id="4096" instrument_node="">. Hanson was born and raised in the Pacific Northwest, where he now lives on an island with his wife and son.</span></p><span data-dcnode-id="4094" instrument_node="">
</span></div><span data-dcnode-id="4091" instrument_node="">
</span><div class="directory-entry" data-dcnode-id="4047"><span data-dcnode-id="4090" instrument_node="">
</span><div data-dcnode-id="4088"><img alt="" class="alignleft nwbl-author" data-dcnode-id="4089" height="150" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//nwbooklovers.org/wp-content/uploads/2011/02/JHarrison-150x150.jpg&amp;raw" title="Jim Harrison" width="150"></div><span data-dcnode-id="4087" instrument_node="">
</span><h3 class="store-name" data-dcnode-id="4085"><span data-dcnode-id="4086" instrument_node="">Jim Harrison</span></h3><span data-dcnode-id="4084" instrument_node="">
</span><p data-dcnode-id="4049"><span data-dcnode-id="4083" instrument_node="">The author of more than 30 books, Jim Harrison is known for his poetry, fiction, essays and reviews, and his work has appeared in </span><em data-dcnode-id="4081"><span data-dcnode-id="4082" instrument_node="">The New Yorker</span></em><span data-dcnode-id="4080" instrument_node="">, </span><em data-dcnode-id="4078"><span data-dcnode-id="4079" instrument_node="">Esquire</span></em><span data-dcnode-id="4077" instrument_node="">, </span><em data-dcnode-id="4075"><span data-dcnode-id="4076" instrument_node="">Sports Illustrated</span></em><span data-dcnode-id="4074" instrument_node="">, </span><em data-dcnode-id="4072"><span data-dcnode-id="4073" instrument_node="">Rolling Stone</span></em><span data-dcnode-id="4071" instrument_node="">, </span><em data-dcnode-id="4069"><span data-dcnode-id="4070" instrument_node="">Outside</span></em><span data-dcnode-id="4068" instrument_node="">, </span><em data-dcnode-id="4066"><span data-dcnode-id="4067" instrument_node="">Playboy</span></em><span data-dcnode-id="4065" instrument_node=""> and </span><em data-dcnode-id="4063"><span data-dcnode-id="4064" instrument_node="">Men’s Journal</span></em><span data-dcnode-id="4062" instrument_node="">. In a 2010 profile on </span><a data-dcnode-id="4059" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.thedailybeast.com/articles/2010/09/23/jim-harrison-interview.html"><em data-dcnode-id="4060"><span data-dcnode-id="4061" instrument_node="">Book Beast</span></em></a><span data-dcnode-id="4058" instrument_node="">, the author John Avlon calls Harrison “arguably America’s greatest living author—and certainly our earthiest.” Harrison’s novella </span><em data-dcnode-id="4055"><a data-dcnode-id="4056" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.indiebound.org/book/9780385285964"><span data-dcnode-id="4057" instrument_node="">Legends of the Fall</span></a></em><span data-dcnode-id="4054" instrument_node=""> was made into a film. </span><em data-dcnode-id="4051"><a data-dcnode-id="4052" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.indiebound.org/book/9780802143310"><span data-dcnode-id="4053" instrument_node="">Returning to Earth</span></a></em><span data-dcnode-id="4050" instrument_node=""> was Harrison’s ninth novel and was honored with a 2008 award from the independent booksellers of the Northwest. Harrison divides his time between residences in Patagonia, Arizona and Livingston, Montana, where he still writes in longhand, at the dining room table.</span></p><span data-dcnode-id="4048" instrument_node="">
</span></div><span data-dcnode-id="4045" instrument_node="">
</span><div class="directory-entry" data-dcnode-id="4001"><span data-dcnode-id="4044" instrument_node="">
</span><div data-dcnode-id="4042"><img alt="" class="alignleft nwbl-author" data-dcnode-id="4043" height="150" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//nwbooklovers.org/wp-content/uploads/2014/01/Hegi-150x150.jpg&amp;raw" title="Ursula Hegi" width="150"></div><span data-dcnode-id="4041" instrument_node="">
</span><h3 class="store-name" data-dcnode-id="4039"><span data-dcnode-id="4040" instrument_node="">Ursula Hegi</span></h3><span data-dcnode-id="4038" instrument_node="">
</span><p data-dcnode-id="4003"><span data-dcnode-id="4037" instrument_node="">Ursula Hegi lived in West Germany until she was 18 before coming to the United States. Her books include </span><em data-dcnode-id="4034"><a data-dcnode-id="4035" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.indiebound.org/book/9780684844770"><span data-dcnode-id="4036" instrument_node="">Stones from the River</span></a></em><span data-dcnode-id="4033" instrument_node="">, a best-selling Oprah’s Book Club novel; </span><em data-dcnode-id="4030"><a data-dcnode-id="4031" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.indiebound.org/book/9780684844817"><span data-dcnode-id="4032" instrument_node="">Intrusions</span></a></em><span data-dcnode-id="4029" instrument_node="">; </span><em data-dcnode-id="4026"><a data-dcnode-id="4027" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.indiebound.org/book/9780684846118"><span data-dcnode-id="4028" instrument_node="">Tearing the Silence: On Growing Up German in America</span></a></em><span data-dcnode-id="4025" instrument_node="">; </span><em data-dcnode-id="4022"><a data-dcnode-id="4023" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.indiebound.org/book/9780743255998"><span data-dcnode-id="4024" instrument_node="">Sacred Time</span></a></em><span data-dcnode-id="4021" instrument_node="">; and </span><em data-dcnode-id="4018"><a data-dcnode-id="4019" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.indiebound.org/book/9781416543763"><span data-dcnode-id="4020" instrument_node="">The Worst Thing I’ve Done</span></a></em><span data-dcnode-id="4017" instrument_node="">. Her novel </span><em data-dcnode-id="4014"><a data-dcnode-id="4015" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.indiebound.org/book/9780684854755"><span data-dcnode-id="4016" instrument_node="">Floating in My Mother’s Palm</span></a></em><span data-dcnode-id="4013" instrument_node=""> was honored by the independent booksellers of the Northwest in 1991. She has also written reviews for </span><em data-dcnode-id="4011"><span data-dcnode-id="4012" instrument_node="">The New York Times</span></em><span data-dcnode-id="4010" instrument_node="">, the </span><em data-dcnode-id="4008"><span data-dcnode-id="4009" instrument_node="">Los Angeles Times</span></em><span data-dcnode-id="4007" instrument_node="">, and </span><em data-dcnode-id="4005"><span data-dcnode-id="4006" instrument_node="">The Washington Post</span></em><span data-dcnode-id="4004" instrument_node="">. For many years, she taught creative writing at Eastern Washington University. She teaches writing at Stonybrook’s Southhampton Campus and is the recipient of more than thirty grants and awards.</span></p><span data-dcnode-id="4002" instrument_node="">
</span></div><span data-dcnode-id="3999" instrument_node="">
</span><div class="directory-entry" data-dcnode-id="3972"><span data-dcnode-id="3998" instrument_node="">
</span><div data-dcnode-id="3996"><img alt="" class="alignleft nwbl-author" data-dcnode-id="3997" height="150" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//nwbooklovers.org/wp-content/uploads/2014/01/heynen-150x150.jpg&amp;raw" title="Jim Heynen" width="150"></div><span data-dcnode-id="3995" instrument_node="">
</span><h3 class="store-name" data-dcnode-id="3993"><span data-dcnode-id="3994" instrument_node="">Jim Heynen</span></h3><span data-dcnode-id="3992" instrument_node="">
</span><a data-dcnode-id="3990" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.jimheynen.com/"><span data-dcnode-id="3991" instrument_node="">www.jimheynen.com</span></a><span data-dcnode-id="3989" instrument_node="">
</span><p data-dcnode-id="3974"><span data-dcnode-id="3988" instrument_node="">Best known for his short-short stories about “the boys,” Jim Heynen has published widely as a writer of poems, novels, nonfiction, and short fiction. His stories about “the boys” have been featured often on National Public Radio’s All Things Considered, and Minnesota astronaut George Pinky Nelson took a taped collection for bedtime listening on his last space mission. Heynen’s collection </span><em data-dcnode-id="3986"><span data-dcnode-id="3987" instrument_node="">You Know What is Right</span></em><span data-dcnode-id="3985" instrument_node=""> was honored in 1986 by the independent booksellers of the Northwest. He wrote </span><a data-dcnode-id="3983" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//nwbooklovers.org/2012/09/25/defining-the-landscape-how-writers-change-where-we-live/"><span data-dcnode-id="3984" instrument_node="">an essay</span></a><span data-dcnode-id="3982" instrument_node=""> for </span><em data-dcnode-id="3980"><span data-dcnode-id="3981" instrument_node="">NW Book Lovers</span></em><span data-dcnode-id="3979" instrument_node=""> after the publication of his first novel, </span><em data-dcnode-id="3976"><a data-dcnode-id="3977" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.indiebound.org/book/9781571310897"><span data-dcnode-id="3978" instrument_node="">The Fall of Alice K</span></a></em><span data-dcnode-id="3975" instrument_node="">. Heynen lives in St. Paul, Minnesota.</span></p><span data-dcnode-id="3973" instrument_node="">
</span></div><span data-dcnode-id="3970" instrument_node="">
</span><div class="directory-entry" data-dcnode-id="3933"><span data-dcnode-id="3969" instrument_node="">
</span><div data-dcnode-id="3967"><img alt="" class="alignleft nwbl-author" data-dcnode-id="3968" height="150" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//nwbooklovers.org/wp-content/uploads/2014/01/Hugo-150x150.jpg&amp;raw" title="Richard Hugo" width="150"></div><span data-dcnode-id="3966" instrument_node="">
</span><h3 class="store-name" data-dcnode-id="3964"><span data-dcnode-id="3965" instrument_node="">Richard Hugo</span></h3><span data-dcnode-id="3963" instrument_node="">
</span><p data-dcnode-id="3935"><span data-dcnode-id="3962" instrument_node="">Though a poet of the Pacific Northwest, Richard Hugo was widely admired nationally and inspired many beginning poets in his classes at the University of Montana and through his book </span><em data-dcnode-id="3959"><a data-dcnode-id="3960" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.indiebound.org/book/9780393338720"><span data-dcnode-id="3961" instrument_node="">The Triggering Town: Lectures and Essays on Poetry and on Writing</span></a></em><span data-dcnode-id="3958" instrument_node="">, which is “directed toward helping [the writer] with that silly, absurd, maddening, futile, enormously rewarding activity: writing poems.” Among his most well-known books are </span><em data-dcnode-id="3956"><span data-dcnode-id="3957" instrument_node="">Death of the Kapowsin Tavern</span></em><span data-dcnode-id="3955" instrument_node="">, </span><em data-dcnode-id="3953"><span data-dcnode-id="3954" instrument_node="">Good Luck in Cracked Italian</span></em><span data-dcnode-id="3952" instrument_node="">, </span><em data-dcnode-id="3949"><a data-dcnode-id="3950" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.indiebound.org/book/9780393044171"><span data-dcnode-id="3951" instrument_node="">What Thou Lovest Well, Remains American</span></a></em><span data-dcnode-id="3948" instrument_node="">, </span><em data-dcnode-id="3945"><a data-dcnode-id="3946" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.indiebound.org/book/9780393044904"><span data-dcnode-id="3947" instrument_node="">31 Letters and 13 Dreams</span></a></em><span data-dcnode-id="3944" instrument_node="">, </span><em data-dcnode-id="3941"><a data-dcnode-id="3942" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.indiebound.org/book/9780393009828"><span data-dcnode-id="3943" instrument_node="">The Right Madness on Skye</span></a></em><span data-dcnode-id="3940" instrument_node="">, and </span><em data-dcnode-id="3937"><a data-dcnode-id="3938" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.indiebound.org/book/9780393307849"><span data-dcnode-id="3939" instrument_node="">Making Certain It Goes On: The Collected Poems</span></a></em><span data-dcnode-id="3936" instrument_node="">, honored by the independent booksellers of the Northwest in 1985. Hugo died in 1982 at the age of fifty-eight.</span></p><span data-dcnode-id="3934" instrument_node="">
</span></div><span data-dcnode-id="3931" instrument_node="">
</span><div class="directory-entry" data-dcnode-id="3915"><span data-dcnode-id="3930" instrument_node="">
</span><div data-dcnode-id="3928"><img alt="" class="alignleft nwbl-author" data-dcnode-id="3929" height="150" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//nwbooklovers.org/wp-content/uploads/2013/01/lhunt150x150.jpg&amp;raw" title="Linda Lawrence Hunt" width="150"></div><span data-dcnode-id="3927" instrument_node="">
</span><h3 class="store-name" data-dcnode-id="3925"><span data-dcnode-id="3926" instrument_node="">Linda Lawrence Hunt</span></h3><span data-dcnode-id="3924" instrument_node="">
</span><p data-dcnode-id="3917"><span data-dcnode-id="3923" instrument_node="">Linda Lawrence Hunt is the author of </span><em data-dcnode-id="3919"><a data-dcnode-id="3921" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.indiebound.org/book/9781400079933"><span data-dcnode-id="3922" instrument_node="">Bold Spirit: Helga Estby’s Forgotten Walk Across Victorian America</span></a><span data-dcnode-id="3920" instrument_node="">,</span></em><span data-dcnode-id="3918" instrument_node=""> which was honored in 2004 by the independent booksellers of the Northwest. Hunt researched Helga Estby’s epic walk across Victorian America for her Ph.D. dissertation at Gonzaga University. She traveled throughout America and in Norway to reconstruct Helga’s silenced story and the tapestry of a transitional era between Victorian assumptions and the “new woman” emerging at the turn-of-the-century. Hunt now directs the Krista Foundation for Global Citizenship, which encourages other young adults engaged in global service. Linda lives in Spokane, Washington with her husband and daughters.</span></p><span data-dcnode-id="3916" instrument_node="">
</span></div><span data-dcnode-id="3913" instrument_node="">
</span><div class="directory-entry" data-dcnode-id="3885"><span data-dcnode-id="3912" instrument_node="">
</span><div data-dcnode-id="3910"><img alt="" class="alignleft nwbl-author" data-dcnode-id="3911" height="150" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//nwbooklovers.org/wp-content/uploads/2014/01/Hyde-150x150.jpg&amp;raw" title="Dayton O. Hyde" width="150"></div><span data-dcnode-id="3909" instrument_node="">
</span><h3 class="store-name" data-dcnode-id="3907"><span data-dcnode-id="3908" instrument_node="">Dayton O. Hyde</span></h3><span data-dcnode-id="3906" instrument_node="">
</span><a data-dcnode-id="3904" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.daytonohyde.com/"><span data-dcnode-id="3905" instrument_node="">www.daytonohyde.com</span></a><span data-dcnode-id="3903" instrument_node="">
</span><p data-dcnode-id="3887"><span data-dcnode-id="3902" instrument_node="">Dayton O. Hyde is a rancher, photographer, essayist and author of 17 books, including </span><em data-dcnode-id="3899"><a data-dcnode-id="3900" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.indiebound.org/book/9780870714863"><span data-dcnode-id="3901" instrument_node="">Sandy: The Sandhill Crane Who Joined Our Family</span></a></em><span data-dcnode-id="3898" instrument_node="">, </span><em data-dcnode-id="3896"><span data-dcnode-id="3897" instrument_node="">Don Coyote</span></em><span data-dcnode-id="3895" instrument_node="">, </span><em data-dcnode-id="3892"><a data-dcnode-id="3893" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.indiebound.org/book/9780870715228"><span data-dcnode-id="3894" instrument_node="">Yamsi: A Year in the Life of a Wilderness Ranch</span></a></em><span data-dcnode-id="3891" instrument_node="">, and </span><em data-dcnode-id="3889"><span data-dcnode-id="3890" instrument_node="">The Major, The Poacher, and the Wonderful One-Trout River</span></em><span data-dcnode-id="3888" instrument_node="">, honored by the independent booksellers of the Northwest in 1986. He is a self-trained naturalist and now runs The Black Hills Wild Horse Sanctuary, an 11,000-acre ranch in Western South Dakota.</span></p><span data-dcnode-id="3886" instrument_node="">
