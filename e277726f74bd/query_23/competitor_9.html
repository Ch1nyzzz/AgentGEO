</span><div data-dcnode-id="1051"><img alt="" class="alignleft nwbl-author" data-dcnode-id="1052" height="150" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//nwbooklovers.org/wp-content/uploads/2011/01/Stein-150x150.jpg&amp;raw" title="Garth Stein" width="150"></div><span data-dcnode-id="1050" instrument_node="">
</span><h3 class="store-name" data-dcnode-id="1048"><span data-dcnode-id="1049" instrument_node="">Garth Stein</span></h3><span data-dcnode-id="1047" instrument_node="">
</span><a data-dcnode-id="1045" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.garthstein.com/"><span data-dcnode-id="1046" instrument_node="">www.garthstein.com</span></a><span data-dcnode-id="1044" instrument_node="">
</span><p data-dcnode-id="1030"><span data-dcnode-id="1043" instrument_node="">Garth Stein is the author of three novels:</span><a data-dcnode-id="1040" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.indiebound.org/book/9780061806384"><em data-dcnode-id="1041"><span data-dcnode-id="1042" instrument_node=""> Raven Stole the Moon</span></em></a><span data-dcnode-id="1039" instrument_node="">, </span><a data-dcnode-id="1036" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.indiebound.org/book/9780061537967/Garth-Stein/Art-Racing-Rain"><em data-dcnode-id="1037"><span data-dcnode-id="1038" instrument_node="">The Art of Racing in the Rain</span></em></a><span data-dcnode-id="1035" instrument_node="">, honored with a 2009 award from the independent booksellers of the Northwest, and </span><a data-dcnode-id="1032" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.indiebound.org/book/9781616954314"><em data-dcnode-id="1033"><span data-dcnode-id="1034" instrument_node="">How Evan Broke His Head and Other Secrets</span></em></a><span data-dcnode-id="1031" instrument_node="">, which received the same award in 2006 (The booksellers called it a “beautifully un-shiny novel of passion, forgiveness and the life force that is fatherhood.”) Stein has also written a full-length play, Brother Jones. Stein worked as a documentary film maker in New York for several years. He grew up in Seattle, where he currently lives with his family.</span></p><span data-dcnode-id="1029" instrument_node="">
</span></div><span data-dcnode-id="1026" instrument_node="">
</span><div class="directory-entry" data-dcnode-id="988"><span data-dcnode-id="1025" instrument_node="">
</span><div data-dcnode-id="1023"><img alt="" class="alignleft nwbl-author" data-dcnode-id="1024" height="150" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//nwbooklovers.org/wp-content/uploads/2014/01/Strayed-150x150.jpg&amp;raw" title="Cheryl Strayed" width="150"></div><span data-dcnode-id="1022" instrument_node="">
</span><h3 class="store-name" data-dcnode-id="1020"><span data-dcnode-id="1021" instrument_node="">Cheryl Strayed</span></h3><span data-dcnode-id="1019" instrument_node="">
</span><a data-dcnode-id="1017" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.cherylstrayed.com/"><span data-dcnode-id="1018" instrument_node="">www.cherylstrayed.com</span></a><span data-dcnode-id="1016" instrument_node="">
</span><p data-dcnode-id="990"><span data-dcnode-id="1015" instrument_node="">Cheryl Strayed is the author of the #1 New York Times bestseller </span><a data-dcnode-id="1012" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.indiebound.org/book/9780307592736/cheryl-strayed/wild"><em data-dcnode-id="1013"><span data-dcnode-id="1014" instrument_node="">Wild: From Lost to Found on the Pacific Crest Trail</span></em></a><span data-dcnode-id="1011" instrument_node="">, the New York Times bestseller </span><a data-dcnode-id="1008" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.indiebound.org/book/9780307949332"><em data-dcnode-id="1009"><span data-dcnode-id="1010" instrument_node="">Tiny Beautiful Things: Advice on Love and Life from Dear Sugar</span></em></a><span data-dcnode-id="1007" instrument_node="">, and the novel </span><a data-dcnode-id="1004" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.indiebound.org/book/9780345805614"><em data-dcnode-id="1005"><span data-dcnode-id="1006" instrument_node="">Torch</span></em></a><span data-dcnode-id="1003" instrument_node="">. In addition to winning a PNBA Award (2013) and an Oregon Book Award, </span><em data-dcnode-id="1001"><span data-dcnode-id="1002" instrument_node="">Wild</span></em><span data-dcnode-id="1000" instrument_node=""> was chosen by Oprah Winfrey as her first selection for Oprah’s Book Club 2.0, and a film adaptation is in the works. The praise for </span><em data-dcnode-id="998"><span data-dcnode-id="999" instrument_node="">Wild</span></em><span data-dcnode-id="997" instrument_node=""> was uniformly ecstatic. We like what Andi at the Literary Duck said in an early review: “It is the kind of book that makes you want to call the author up on the phone and say: ‘Thank you, thank you, thank you for being so brave and so honest in this book.” Read </span><em data-dcnode-id="995"><span data-dcnode-id="996" instrument_node="">NW Book Lovers</span></em><span data-dcnode-id="994" instrument_node="">‘ interview with Strayed </span><a data-dcnode-id="992" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//nwbooklovers.org/2012/03/14/digging-into-whats-true-an-interview-with-cheryl-strayed/"><span data-dcnode-id="993" instrument_node="">here</span></a><span data-dcnode-id="991" instrument_node="">. She lives in Portland with her husband and two children.</span></p><span data-dcnode-id="989" instrument_node="">
</span></div><span data-dcnode-id="986" instrument_node="">
</span><div class="directory-entry" data-dcnode-id="964"><span data-dcnode-id="985" instrument_node="">
</span><div data-dcnode-id="983"><img alt="" class="alignleft nwbl-author" data-dcnode-id="984" height="150" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//nwbooklovers.org/wp-content/uploads/2013/01/swofford150x150.jpg&amp;raw" title="Anthony Swofford" width="150"></div><span data-dcnode-id="982" instrument_node="">
</span><h3 class="store-name" data-dcnode-id="980"><span data-dcnode-id="981" instrument_node="">Anthony Swofford</span></h3><span data-dcnode-id="979" instrument_node="">
</span><a data-dcnode-id="977" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//anthonyhswofford.com/"><span data-dcnode-id="978" instrument_node="">anthonyhswofford.com</span></a><span data-dcnode-id="976" instrument_node="">
</span><p data-dcnode-id="966"><span data-dcnode-id="975" instrument_node="">Anthony Swofford served in a U.S. Marine Corps Surveillance and Target Acquisition/Scout-Sniper platoon during the Gulf War.His memoir </span><em data-dcnode-id="971"><a data-dcnode-id="973" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.indiebound.org/book/9780743287210"><span data-dcnode-id="974" instrument_node="">Jarhead: A Marine’s Chronicle of the Gulf War and Other Battles</span></a><span data-dcnode-id="972" instrument_node=""> </span></em><span data-dcnode-id="970" instrument_node="">was honored by the independent booksellers of the Northwest in 2006. After the war, he was educated at American River College; the University of California, Davis; and the University of Iowa Writers’ Workshop. He has taught at the University of Iowa and Lewis and Clark College. His fiction and nonfiction have appeared in </span><em data-dcnode-id="968"><span data-dcnode-id="969" instrument_node="">The New York Times, Harper’s, Men’s Journal, The Iowa Review</span></em><span data-dcnode-id="967" instrument_node=""> and other publications. A Michener-Copernicus Fellowship recipient, he lives in New York.</span></p><span data-dcnode-id="965" instrument_node="">
</span></div><span data-dcnode-id="962" instrument_node="">
</span><div class="directory-entry" data-dcnode-id="921"><span data-dcnode-id="961" instrument_node="">
</span><div data-dcnode-id="959"><img alt="" class="alignleft nwbl-author" data-dcnode-id="960" height="150" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//nwbooklovers.org/wp-content/uploads/2014/01/Thompson-150x150.jpg&amp;raw" title="Craig Thompson" width="150"></div><span data-dcnode-id="958" instrument_node="">
</span><h3 class="store-name" data-dcnode-id="956"><span data-dcnode-id="957" instrument_node="">Craig Thompson</span></h3><span data-dcnode-id="955" instrument_node="">
</span><a data-dcnode-id="953" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.dootdootgarden.com/"><span data-dcnode-id="954" instrument_node="">www.dootdootgarden.com</span></a><span data-dcnode-id="952" instrument_node="">
</span><p data-dcnode-id="923"><span data-dcnode-id="951" instrument_node="">Craig Thompson’s first graphic novel, </span><a data-dcnode-id="948" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.indiebound.org/book/9780375714764"><em data-dcnode-id="949"><span data-dcnode-id="950" instrument_node="">Goodbye, Chunky Rice</span></em></a><span data-dcnode-id="947" instrument_node="">, debuted when he was twenty-three. His sophomore novel, </span><a data-dcnode-id="944" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.indiebound.org/book/9781603090964"><em data-dcnode-id="945"><span data-dcnode-id="946" instrument_node="">Blankets</span></em></a><span data-dcnode-id="943" instrument_node="">, won several industry awards and has been published in almost twenty languages. </span><a data-dcnode-id="940" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.indiebound.org/book/9780375424144"><em data-dcnode-id="941"><span data-dcnode-id="942" instrument_node="">Habibi</span></em></a><span data-dcnode-id="939" instrument_node=""> won a 2012 PNBA Award (“The appeal of this book will reach far beyond comics fans. </span><em data-dcnode-id="937"><span data-dcnode-id="938" instrument_node="">Habibi</span></em><span data-dcnode-id="936" instrument_node=""> should take its place alongside groundbreaking classics, such as </span><em data-dcnode-id="934"><span data-dcnode-id="935" instrument_node="">Maus</span></em><span data-dcnode-id="933" instrument_node=""> and </span><em data-dcnode-id="931"><span data-dcnode-id="932" instrument_node="">Persepolis</span></em><span data-dcnode-id="930" instrument_node="">.”—PNBA booksellers.) Thompson lives in Portland. He wrote and illustrated a graphic essay, </span><a data-dcnode-id="928" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//nwbooklovers.org/2012/02/08/where-the-story-lives-a-graphic-essay-by-2012-pnba-award-winner-craig-thompson/"><span data-dcnode-id="929" instrument_node="">Where the Story Lives</span></a><span data-dcnode-id="927" instrument_node="">, for </span><em data-dcnode-id="925"><span data-dcnode-id="926" instrument_node="">NW Book Lovers</span></em><span data-dcnode-id="924" instrument_node="">.</span></p><span data-dcnode-id="922" instrument_node="">
</span></div><span data-dcnode-id="919" instrument_node="">
</span><div class="directory-entry" data-dcnode-id="901"><span data-dcnode-id="918" instrument_node="">
</span><div data-dcnode-id="916"><img alt="" class="alignleft nwbl-author" data-dcnode-id="917" height="150" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//nwbooklovers.org/wp-content/uploads/2014/01/Toedtemeier-150x150.jpg&amp;raw" title="Terry Toedtemeier" width="150"></div><span data-dcnode-id="915" instrument_node="">
</span><h3 class="store-name" data-dcnode-id="913"><span data-dcnode-id="914" instrument_node="">Terry Toedtemeier</span></h3><span data-dcnode-id="912" instrument_node="">
</span><a data-dcnode-id="910" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//blog.oregonlive.com/visualarts/2008/12/obituary_terry_toedtemeier_cur.html"><span data-dcnode-id="911" instrument_node="">blog.oregonlive.com/visualarts/2008/12/obituary_terry_toedtemeier_cur.html</span></a><span data-dcnode-id="909" instrument_node="">
</span><p data-dcnode-id="903"><span data-dcnode-id="908" instrument_node="">Terry Toedtemeier was a gifted photographer, historian, curator, and scientist who died in 2008 after giving a talk about his last curatorial project, what’s been called his defining, crowning achievement, </span><a data-dcnode-id="905" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.indiebound.org/book/9780870714184"><em data-dcnode-id="906"><span data-dcnode-id="907" instrument_node="">Wild Beauty: Photographs of the Columbia River Gorge, 1867-1957</span></em></a><span data-dcnode-id="904" instrument_node="">. Six years in the making, the project was first a book and then a show at the Portland Art Museum, where Toedtemeier had been photography curator since 1985. “The colossal undertaking was a serious work of cultural history that explained the evolution of the Columbia Gorge area,” said his obituary in The Oregonian. “But it was also, by extension, a partial history of photography that reminded the public of the importance of some of Western photography’s early and underappreciated practitioners.” The project’s many threads mirrored Toedtemeier’s interests and dimensions. “He was trying to find that special place of beauty,” said his wife, Prudence Fenwick Roberts.</span></p><span data-dcnode-id="902" instrument_node="">
</span></div><span data-dcnode-id="899" instrument_node="">
</span><div class="directory-entry" data-dcnode-id="877"><span data-dcnode-id="898" instrument_node="">
</span><div data-dcnode-id="896"><img alt="" class="alignleft nwbl-author" data-dcnode-id="897" height="150" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//nwbooklovers.org/wp-content/uploads/2014/01/Tyau-150x150.jpg&amp;raw" title="Kathleen Tyau" width="150"></div><span data-dcnode-id="895" instrument_node="">
</span><h3 class="store-name" data-dcnode-id="893"><span data-dcnode-id="894" instrument_node="">Kathleen Tyau</span></h3><span data-dcnode-id="892" instrument_node="">
</span><p data-dcnode-id="879"><span data-dcnode-id="891" instrument_node="">Kathleen Tyau was raised in Hawaii and began writing at the age of 13 with the publication of an essay in the </span><em data-dcnode-id="889"><span data-dcnode-id="890" instrument_node="">Honolulu Star Bulletin</span></em><span data-dcnode-id="888" instrument_node="">. She plays bluegrass guitar and mandolin and is the author of the novels </span><a data-dcnode-id="885" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.indiebound.org/book/9780807083451"><em data-dcnode-id="886"><span data-dcnode-id="887" instrument_node="">Makai</span></em></a><span data-dcnode-id="884" instrument_node=""> and </span><a data-dcnode-id="881" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.indiebound.org/book/9780393315592"><em data-dcnode-id="882"><span data-dcnode-id="883" instrument_node="">A Little Too Much Is Enough</span></em></a><span data-dcnode-id="880" instrument_node="">, which was honored in 1996 by the independent booksellers of the Northwest. Tyau has taught creative writing at Pacific University and Fishtrap and currently lives on 52 acre evergreen forest near Gaston, Oregon.</span></p><span data-dcnode-id="878" instrument_node="">
</span></div><span data-dcnode-id="875" instrument_node="">
</span><div class="directory-entry" data-dcnode-id="837"><span data-dcnode-id="874" instrument_node="">
</span><div data-dcnode-id="872"><img alt="" class="alignleft nwbl-author" data-dcnode-id="873" height="150" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//nwbooklovers.org/wp-content/uploads/2011/01/BUdall-150x150.jpg&amp;raw" title="Brady Udall" width="150"></div><span data-dcnode-id="871" instrument_node="">
</span><h3 class="store-name" data-dcnode-id="869"><span data-dcnode-id="870" instrument_node="">Brady Udall</span></h3><span data-dcnode-id="868" instrument_node="">
</span><a data-dcnode-id="866" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//bradyudall.com/"><span data-dcnode-id="867" instrument_node="">bradyudall.com</span></a><span data-dcnode-id="865" instrument_node="">
</span><p data-dcnode-id="839"><span data-dcnode-id="864" instrument_node="">Brady Udall is the author of </span><a data-dcnode-id="861" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.indiebound.org/book/9780393335545"><em data-dcnode-id="862"><span data-dcnode-id="863" instrument_node="">Letting Loose the Hounds</span></em></a><span data-dcnode-id="860" instrument_node="">, </span><a data-dcnode-id="857" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.indiebound.org/book/9780393020366"><em data-dcnode-id="858"><span data-dcnode-id="859" instrument_node="">The Miracle Life of Edgar Mint</span></em></a><span data-dcnode-id="856" instrument_node=""> and the </span><a data-dcnode-id="853" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.indiebound.org/book/9780393339710/brady-udall/lonely-polygamist"><em data-dcnode-id="854"><span data-dcnode-id="855" instrument_node="">The Lonely Polygamist</span></em></a><span data-dcnode-id="852" instrument_node="">, which won a 2011 PNBA Award from the independent booksellers of the Northwest. His work has appeared in </span><em data-dcnode-id="850"><span data-dcnode-id="851" instrument_node="">The Paris Review</span></em><span data-dcnode-id="849" instrument_node="">, </span><em data-dcnode-id="847"><span data-dcnode-id="848" instrument_node="">Playboy</span></em><span data-dcnode-id="846" instrument_node="">, </span><em data-dcnode-id="844"><span data-dcnode-id="845" instrument_node="">GQ</span></em><span data-dcnode-id="843" instrument_node=""> and </span><em data-dcnode-id="841"><span data-dcnode-id="842" instrument_node="">Esquire</span></em><span data-dcnode-id="840" instrument_node="">, and his stories and essays have been featured on National Public Radio’s This American Life. He teaches in the MFA program at Boise State University and lives in Boise, Idaho and Teasdale, Utah with his wife and children.</span></p><span data-dcnode-id="838" instrument_node="">
</span></div><span data-dcnode-id="835" instrument_node="">
</span><div class="directory-entry" data-dcnode-id="811"><span data-dcnode-id="834" instrument_node="">
</span><div data-dcnode-id="832"><img alt="" class="alignleft nwbl-author" data-dcnode-id="833" height="150" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//nwbooklovers.org/wp-content/uploads/2014/01/unger-150x150.jpg&amp;raw" title="Douglas Unger" width="150"></div><span data-dcnode-id="831" instrument_node="">
</span><h3 class="store-name" data-dcnode-id="829"><span data-dcnode-id="830" instrument_node="">Douglas Unger</span></h3><span data-dcnode-id="828" instrument_node="">
</span><p data-dcnode-id="813"><span data-dcnode-id="827" instrument_node="">Douglas Unger is the author of four novels, including Pulitzer finalist </span><a data-dcnode-id="824" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.indiebound.org/book/9780803295605"><em data-dcnode-id="825"><span data-dcnode-id="826" instrument_node="">Leaving the Land</span></em></a><span data-dcnode-id="823" instrument_node="">, which was honored by PNBA in 1985, and </span><em data-dcnode-id="821"><span data-dcnode-id="822" instrument_node="">Voices from Silence</span></em><span data-dcnode-id="820" instrument_node="">, a year’s end selection by </span><em data-dcnode-id="818"><span data-dcnode-id="819" instrument_node="">The Washington Post Book World</span></em><span data-dcnode-id="817" instrument_node="">. His most recent book is a collection of short stories, </span><em data-dcnode-id="815"><span data-dcnode-id="816" instrument_node="">Looking for War and Other Stories</span></em><span data-dcnode-id="814" instrument_node="">. He is a co-founder of the MFA in Creative Writing International program and the Schaeffer Fellowship Ph.D. with Creative Dissertation at the University of Nevada, Las Vegas. In addition to teaching and writing, Unger is the Interim Chair of the Department of English at the University of Nevada, Las Vegas, and travels extensively in support of literary activism around the world.</span></p><span data-dcnode-id="812" instrument_node="">
</span></div><span data-dcnode-id="809" instrument_node="">
</span><div class="directory-entry" data-dcnode-id="791"><span data-dcnode-id="808" instrument_node="">
</span><div data-dcnode-id="806"><img alt="" class="alignleft nwbl-author" data-dcnode-id="807" height="150" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//nwbooklovers.org/wp-content/uploads/2014/01/wagoner-150x150.jpg&amp;raw" title="David Wagoner" width="150"></div><span data-dcnode-id="805" instrument_node="">
</span><h3 class="store-name" data-dcnode-id="803"><span data-dcnode-id="804" instrument_node="">David Wagoner</span></h3><span data-dcnode-id="802" instrument_node="">
</span><p data-dcnode-id="793"><span data-dcnode-id="801" instrument_node="">“David Wagoner is recognized as the leading poet of the Pacific Northwest, often compared to his early mentor Theordor Roethke, and highly praised for his skillful, insightful and serious body of work,” says The Poetry Foundation. Wagoner has won many literary awards including the Ruth Lilly Poetry Prize, two Pushcart Prizes and the Academy of Arts and Letters Award, and has twice been nominated for the National Book Award. Wagoner is the author of ten novels, including </span><em data-dcnode-id="799"><span data-dcnode-id="800" instrument_node="">The Escape Artist</span></em><span data-dcnode-id="798" instrument_node="">, which was adapted into a movie by Francis Ford Coppola, though he is best known for his poetry and his teaching. </span><a data-dcnode-id="795" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.indiebound.org/book/9780252068034"><em data-dcnode-id="796"><span data-dcnode-id="797" instrument_node="">Traveling Light: Collected and New Poems</span></em></a><span data-dcnode-id="794" instrument_node=""> was honored by the independent booksellers of the Northwest in 2000. Wagoner lives in Bothell and teaches in the low-residency MFA program of the Northwest Institute of Literary Arts on Whidbey Island</span></p><span data-dcnode-id="792" instrument_node="">
</span></div><span data-dcnode-id="789" instrument_node="">
</span><div class="directory-entry" data-dcnode-id="766"><span data-dcnode-id="788" instrument_node="">
</span><div data-dcnode-id="786"><img alt="" class="alignleft nwbl-author" data-dcnode-id="787" height="150" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//nwbooklovers.org/wp-content/uploads/2014/01/Wallis-150x150.jpg&amp;raw" title="Velma Wallis" width="150"></div><span data-dcnode-id="785" instrument_node="">
</span><h3 class="store-name" data-dcnode-id="783"><span data-dcnode-id="784" instrument_node="">Velma Wallis</span></h3><span data-dcnode-id="782" instrument_node="">
</span><p data-dcnode-id="768"><span data-dcnode-id="781" instrument_node="">Velma Wallis is an Athabaskan Indian who grew up in a remote Alaskan village. Wallis dropped out of school at 13 in order to care for her siblings after their father’s death. Years later, she moved into an old trapping cabin and survived for almost twelve years on what she gathered from hunting, fishing and trapping. Her first book, </span><a data-dcnode-id="778" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.indiebound.org/book/9780062244987"><em data-dcnode-id="779"><span data-dcnode-id="780" instrument_node="">Two Old Women: An Alaskan Legend of Betrayal, Courage and Survival</span></em></a><span data-dcnode-id="777" instrument_node="">, won a PNBA Award (1994) and a Western States Book Award. Highly praised by readers and critics from around the world, the novel has sold more than 250,000 copies and has been optioned by Fox Searchlight Pictures for a major feature film. Wallis has written two additional books, </span><a data-dcnode-id="774" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.indiebound.org/book/9780060977283"><em data-dcnode-id="775"><span data-dcnode-id="776" instrument_node="">Bird Girl and the Man Who Followed the Sun</span></em></a><span data-dcnode-id="773" instrument_node=""> and </span><a data-dcnode-id="770" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.indiebound.org/book/9780972494472"><em data-dcnode-id="771"><span data-dcnode-id="772" instrument_node="">Raising Ourselves: -A Gwich’in Coming of Age Story from the Yukon River</span></em></a><span data-dcnode-id="769" instrument_node="">. She divides her time between Fort Yukon and Fairbanks.</span></p><span data-dcnode-id="767" instrument_node="">
</span></div><span data-dcnode-id="764" instrument_node="">
</span><div class="directory-entry" data-dcnode-id="684"><span data-dcnode-id="763" instrument_node="">
</span><div data-dcnode-id="761"><img alt="" class="alignleft nwbl-author" data-dcnode-id="762" height="150" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//nwbooklovers.org/wp-content/uploads/2011/02/walter-150x150.jpg&amp;raw" title="Jess Walter" width="150"></div><span data-dcnode-id="760" instrument_node="">
</span><h3 class="store-name" data-dcnode-id="758"><span data-dcnode-id="759" instrument_node="">Jess Walter</span></h3><span data-dcnode-id="757" instrument_node="">
</span><a data-dcnode-id="755" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.jesswalter.com/"><span data-dcnode-id="756" instrument_node="">www.jesswalter.com</span></a><span data-dcnode-id="754" instrument_node="">
</span><p data-dcnode-id="686"><span data-dcnode-id="753" instrument_node="">Jess Walter’s essays, short fiction, criticism and journalism have been published in </span><em data-dcnode-id="751"><span data-dcnode-id="752" instrument_node="">Details</span></em><span data-dcnode-id="750" instrument_node="">,</span><em data-dcnode-id="748"><span data-dcnode-id="749" instrument_node=""> Playboy</span></em><span data-dcnode-id="747" instrument_node="">, </span><em data-dcnode-id="745"><span data-dcnode-id="746" instrument_node="">Newsweek</span></em><span data-dcnode-id="744" instrument_node="">, the </span><em data-dcnode-id="742"><span data-dcnode-id="743" instrument_node="">Washington Post</span></em><span data-dcnode-id="741" instrument_node="">, the </span><em data-dcnode-id="739"><span data-dcnode-id="740" instrument_node="">Los Angeles Times</span></em><span data-dcnode-id="738" instrument_node="">, and the </span><em data-dcnode-id="736"><span data-dcnode-id="737" instrument_node="">Boston Globe</span></em><span data-dcnode-id="735" instrument_node="">, among others. His award-winning books include </span><a data-dcnode-id="732" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.indiebound.org/book/9780061916052"><em data-dcnode-id="733"><span data-dcnode-id="734" instrument_node="">The Financial Lives of The Poets</span></em></a><span data-dcnode-id="731" instrument_node="">, </span><a data-dcnode-id="728" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.indiebound.org/book/9780061577659"><em data-dcnode-id="729"><span data-dcnode-id="730" instrument_node="">Citizen Vince</span></em></a><span data-dcnode-id="727" instrument_node="">,</span><a data-dcnode-id="724" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.indiebound.org/book/9780061712838"><em data-dcnode-id="725"><span data-dcnode-id="726" instrument_node=""> Over Tumbled Graves</span></em></a><span data-dcnode-id="723" instrument_node=""> and </span><a data-dcnode-id="720" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.indiebound.org/book/9780061189432"><em data-dcnode-id="721"><span data-dcnode-id="722" instrument_node="">The Zero</span></em></a><span data-dcnode-id="719" instrument_node="">, which was a National Book Award finalist and a PNBA Award winner in 2007. Walter won a PNBA Award again in 2014 for his story collection </span><em data-dcnode-id="715"><a data-dcnode-id="717" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.indiebound.org/book/9780061926624/jess-walter/we-live-water"><span data-dcnode-id="718" instrument_node="">We Live in Water</span></a><span data-dcnode-id="716" instrument_node=""> </span></em><span data-dcnode-id="714" instrument_node="">(he celebrates the award with </span><a data-dcnode-id="712" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//nwbooklovers.org/2014/01/31/addendum-to-statistical-abstract-for-my-hometown-spokane-washington/"><span data-dcnode-id="713" instrument_node="">this essay</span></a><span data-dcnode-id="711" instrument_node=""> for</span><em data-dcnode-id="709"><span data-dcnode-id="710" instrument_node=""> NW Book Lovers</span></em><span data-dcnode-id="708" instrument_node="">.)</span><em data-dcnode-id="706"><span data-dcnode-id="707" instrument_node=""> </span></em><span data-dcnode-id="705" instrument_node="">Walter talked with </span><a data-dcnode-id="702" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//nwbooklovers.org/2012/06/01/how-to-insult-in-italian-and-other-beautiful-stories-an-interview-with-jess-walter-by-lindsey-mcguirk/"><em data-dcnode-id="703"><span data-dcnode-id="704" instrument_node="">NW Book Lovers</span></em></a><span data-dcnode-id="701" instrument_node=""> after the publication of his seventh book, </span><em data-dcnode-id="697"><a data-dcnode-id="699" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.indiebound.org/book/9780061928178"><span data-dcnode-id="700" instrument_node="">Beautiful Ruins</span></a><span data-dcnode-id="698" instrument_node="">, </span></em><span data-dcnode-id="696" instrument_node="">which was named a best book of the year by more than a dozen publications including </span><em data-dcnode-id="694"><span data-dcnode-id="695" instrument_node="">GQ</span></em><span data-dcnode-id="693" instrument_node="">, </span><em data-dcnode-id="691"><span data-dcnode-id="692" instrument_node="">Esquire</span></em><span data-dcnode-id="690" instrument_node=""> and </span><em data-dcnode-id="688"><span data-dcnode-id="689" instrument_node="">The New York Times</span></em><span data-dcnode-id="687" instrument_node="">. He lives with his wife and children in his hometown, Spokane, Washington.</span></p><span data-dcnode-id="685" instrument_node="">
</span></div><span data-dcnode-id="682" instrument_node="">
</span><div class="directory-entry" data-dcnode-id="648"><span data-dcnode-id="681" instrument_node="">
</span><div data-dcnode-id="679"><img alt="" class="alignleft nwbl-author" data-dcnode-id="680" height="150" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//nwbooklovers.org/wp-content/uploads/2014/01/Welch-150x150.jpg&amp;raw" title="James Welch" width="150"></div><span data-dcnode-id="678" instrument_node="">
</span><h3 class="store-name" data-dcnode-id="676"><span data-dcnode-id="677" instrument_node="">James Welch</span></h3><span data-dcnode-id="675" instrument_node="">
</span><p data-dcnode-id="650"><span data-dcnode-id="674" instrument_node="">Born in Browning, Montana to a father who was a member of the Blackfeet tribe and a mother who was a member of the Gros Ventre tribe, James Welch attended schools on the Blackfeet and Fort Belknap reservations. Although Welch began his career as a poet, he became famous for fiction and is considered a founding author of the Native American Renaissance literary movement. His first novel was </span><a data-dcnode-id="671" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.indiebound.org/book/9780143105220"><em data-dcnode-id="672"><span data-dcnode-id="673" instrument_node="">Winter in the Blood</span></em></a><span data-dcnode-id="670" instrument_node="">, of which a reviewer in </span><em data-dcnode-id="668"><span data-dcnode-id="669" instrument_node="">The New York Times Book Review</span></em><span data-dcnode-id="667" instrument_node=""> said, ”Few books in any year speak so unanswerably, make their own local terms so throughly ours.” </span><a data-dcnode-id="664" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.indiebound.org/book/9780143106517"><em data-dcnode-id="665"><span data-dcnode-id="666" instrument_node="">Fool’s Crow</span></em></a><span data-dcnode-id="663" instrument_node="">, </span><em data-dcnode-id="659"><a data-dcnode-id="661" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.indiebound.org/book/9780393329384"><span data-dcnode-id="662" instrument_node="">The Indian Lawyer</span></a><span data-dcnode-id="660" instrument_node=""> </span></em><span data-dcnode-id="658" instrument_node="">and </span><a data-dcnode-id="655" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.indiebound.org/book/9780385496759"><em data-dcnode-id="656"><span data-dcnode-id="657" instrument_node="">The Heartsong of Charging Elk</span></em></a><span data-dcnode-id="654" instrument_node=""> were all honored with awards from the independent booksellers of the Northwest. Welch was a visiting professor at the University of Washington and at Cornell University and served on the Montana State Board of Pardons. He toured in Europe, where his books were popular (He was made a Chevalier of the Order of Arts and Letters in France.). After Welch passed away in 2003, his friend Ivan Doig told the </span><em data-dcnode-id="652"><span data-dcnode-id="653" instrument_node="">Seattle Post-Intelligencer</span></em><span data-dcnode-id="651" instrument_node=""> that he wrote about what it means to be an Indian in modern American society and about the people of the West “without glorification, without cliche in an honest, clear voice from an intimate perspective.”</span></p><span data-dcnode-id="649" instrument_node="">
</span></div><span data-dcnode-id="646" instrument_node="">
</span><div class="directory-entry" data-dcnode-id="633"><span data-dcnode-id="645" instrument_node="">
</span><h3 class="store-name" data-dcnode-id="643"><span data-dcnode-id="644" instrument_node="">Ellen Wheat</span></h3><span data-dcnode-id="642" instrument_node="">
</span><p data-dcnode-id="635"><span data-dcnode-id="641" instrument_node="">Ellen Harkins Wheat is the author of </span><em data-dcnode-id="637"><a data-dcnode-id="639" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.indiebound.org/book/9780295970110"><span data-dcnode-id="640" instrument_node="">Jacob Lawrence, American Painter</span></a><span data-dcnode-id="638" instrument_node="">,</span></em><span data-dcnode-id="636" instrument_node=""> for which she received the Washington State Governor’s Writers’ Award and was honored by the independent booksellers of the Northwest in 1987. She has also written Jacob Lawrence’s “Frederick Douglass” and “Harriet Tubman” series (1939–40), and numerous articles about Jacob Lawrence’s work. She has a Ph.D. in art history, and has taught art history and writing at the University of Washington and Western Washington University. She lives in Indianola, Washington, and Pleasanton, California, and is a freelance editor.</span></p><span data-dcnode-id="634" instrument_node="">
</span></div><span data-dcnode-id="631" instrument_node="">
</span><div class="directory-entry" data-dcnode-id="613"><span data-dcnode-id="630" instrument_node="">
</span><div data-dcnode-id="628"><img alt="" class="alignleft nwbl-author" data-dcnode-id="629" height="150" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//nwbooklovers.org/wp-content/uploads/2014/01/Whittaker-150x150.jpg&amp;raw" title="Jim Whittaker" width="150"></div><span data-dcnode-id="627" instrument_node="">
</span><h3 class="store-name" data-dcnode-id="625"><span data-dcnode-id="626" instrument_node="">Jim Whittaker</span></h3><span data-dcnode-id="624" instrument_node="">
</span><a data-dcnode-id="622" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.jimwhittaker.com/"><span data-dcnode-id="623" instrument_node="">www.jimwhittaker.com</span></a><span data-dcnode-id="621" instrument_node="">
</span><p data-dcnode-id="615"><span data-dcnode-id="620" instrument_node="">In 1963, Jim Whittaker was the first American to summit Mount Everest. Whittaker grew up in Seattle, where he got his start climbing Mount Rainier. He was the first full-time employee at REI, retiring as its CEO and president after 25 years with the company. He and his wife, Dianne Roberts, along with their two sons, made a four-year, 20,000-mile sailing journey to Australia and back to their home in Port Townsend, aboard their 54-foot steel ketch, Impossible. Whittaker’s memoir, </span><a data-dcnode-id="617" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.indiebound.org/book/9781594856662"><em data-dcnode-id="618"><span data-dcnode-id="619" instrument_node="">A Life On the Edge: Memoirs of Everest and Beyond</span></em></a><span data-dcnode-id="616" instrument_node="">, was honored in 2000 by the independent booksellers of the Northwest.</span></p><span data-dcnode-id="614" instrument_node="">
</span></div><span data-dcnode-id="611" instrument_node="">
</span><div class="directory-entry" data-dcnode-id="558"><span data-dcnode-id="610" instrument_node="">
</span><div data-dcnode-id="608"><img alt="" class="alignleft nwbl-author" data-dcnode-id="609" height="150" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//nwbooklovers.org/wp-content/uploads/2018/12/Richard-Wiley.jpg&amp;raw" title="Richard Wiley" width="150"></div><span data-dcnode-id="607" instrument_node="">
</span><h3 class="store-name" data-dcnode-id="605"><span data-dcnode-id="606" instrument_node="">Richard Wiley</span></h3><span data-dcnode-id="604" instrument_node="">
</span><a data-dcnode-id="602" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.richardwileyauthor.com/"><span data-dcnode-id="603" instrument_node="">www.richardwileyauthor.com</span></a><span data-dcnode-id="601" instrument_node="">
</span><p data-dcnode-id="563"><span data-dcnode-id="600" instrument_node="">Richard Wiley is the author of numerous stories and the novels&nbsp;</span><em data-dcnode-id="597"><strong data-dcnode-id="598"><span data-dcnode-id="599" instrument_node="">Soldiers In Hiding</span></strong></em><span data-dcnode-id="596" instrument_node="">&nbsp;(winner of the PEN/Faulkner Award for Best American Fiction),</span><em data-dcnode-id="593"><strong data-dcnode-id="594"><span data-dcnode-id="595" instrument_node="">&nbsp;Fools’ Gold</span></strong></em><span data-dcnode-id="592" instrument_node="">,&nbsp;</span><em data-dcnode-id="589"><strong data-dcnode-id="590"><span data-dcnode-id="591" instrument_node="">Festival for Three Thousand Maidens</span></strong></em><span data-dcnode-id="588" instrument_node="">,&nbsp;</span><em data-dcnode-id="585"><strong data-dcnode-id="586"><span data-dcnode-id="587" instrument_node="">Indigo</span></strong></em><span data-dcnode-id="584" instrument_node="">,&nbsp;</span><em data-dcnode-id="581"><strong data-dcnode-id="582"><span data-dcnode-id="583" instrument_node="">Ahmed’s Revenge</span></strong></em><span data-dcnode-id="580" instrument_node="">&nbsp;(winner of the Maria Thomas Fiction Award),&nbsp;</span><em data-dcnode-id="577"><strong data-dcnode-id="578"><span data-dcnode-id="579" instrument_node="">Commodore Perry’s Minstrel Show</span></strong></em><span data-dcnode-id="576" instrument_node="">,&nbsp;</span><em data-dcnode-id="573"><strong data-dcnode-id="574"><span data-dcnode-id="575" instrument_node="">The Book of Important Moments</span></strong></em><span data-dcnode-id="572" instrument_node="">,&nbsp;</span><em data-dcnode-id="569"><strong data-dcnode-id="570"><span data-dcnode-id="571" instrument_node="">Bob Stevenson</span></strong></em><span data-dcnode-id="568" instrument_node="">, and </span><strong data-dcnode-id="565"><em data-dcnode-id="566"><span data-dcnode-id="567" instrument_node="">Tacoma Stories</span></em></strong><span data-dcnode-id="564" instrument_node="">.</span></p><span data-dcnode-id="562" instrument_node="">
</span><p data-dcnode-id="560"><span data-dcnode-id="561" instrument_node="">Wiley is professor emeritus of English and a board member of Black Mountain Institute at the University of Nevada, Las Vegas. He divides his time between his hometown of Tacoma, WA and Los Angeles, CA.</span></p><span data-dcnode-id="559" instrument_node="">
</span></div><span data-dcnode-id="556" instrument_node="">
</span><div class="directory-entry" data-dcnode-id="513"><span data-dcnode-id="555" instrument_node="">
</span><div data-dcnode-id="553"><img alt="" class="alignleft nwbl-author" data-dcnode-id="554" height="150" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//nwbooklovers.org/wp-content/uploads/2014/01/Wilson-150x150.jpg&amp;raw" title="G. Willow Wilson" width="150"></div><span data-dcnode-id="552" instrument_node="">
</span><h3 class="store-name" data-dcnode-id="550"><span data-dcnode-id="551" instrument_node="">G. Willow Wilson</span></h3><span data-dcnode-id="549" instrument_node="">
</span><a data-dcnode-id="547" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//gwillowwilson.com/"><span data-dcnode-id="548" instrument_node="">gwillowwilson.com</span></a><span data-dcnode-id="546" instrument_node="">
</span><p data-dcnode-id="515"><span data-dcnode-id="545" instrument_node="">G. Willow Wilson began her writing career at 17, when she freelanced as a DJ critic for Boston’s </span><em data-dcnode-id="543"><span data-dcnode-id="544" instrument_node="">Weekly Dig</span></em><span data-dcnode-id="542" instrument_node=""> magazine. Since then, she’s written the Eisner Award-nominated comic book series </span><a data-dcnode-id="539" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.indiebound.org/book/9781401221539"><em data-dcnode-id="540"><span data-dcnode-id="541" instrument_node="">Air</span></em></a><span data-dcnode-id="538" instrument_node=""> and </span><a data-dcnode-id="535" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.indiebound.org/book/9780785156086"><em data-dcnode-id="536"><span data-dcnode-id="537" instrument_node="">Mystic: The Tenth Apprentice</span></em></a><span data-dcnode-id="534" instrument_node="">, the graphic novel </span><a data-dcnode-id="531" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.indiebound.org/book/9781401217341"><em data-dcnode-id="532"><span data-dcnode-id="533" instrument_node="">Cairo</span></em></a><span data-dcnode-id="530" instrument_node=""> and the memoir </span><a data-dcnode-id="527" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.indiebound.org/book/9780802145338"><em data-dcnode-id="528"><span data-dcnode-id="529" instrument_node="">The Butterfly Mosque: A Young American Woman’s Journey to Love and Islam</span></em></a><span data-dcnode-id="526" instrument_node="">, a Seattle Times best book of 2010. Her first novel, </span><a data-dcnode-id="523" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.indiebound.org/book/9780802120205/g-willow-wilson/alif-unseen"><em data-dcnode-id="524"><span data-dcnode-id="525" instrument_node="">Alif the Unseen</span></em></a><span data-dcnode-id="522" instrument_node="">, was a New York Times notable book (“an exuberant fable that has thrills, chills and—even more remarkably—universal appeal.”—Janet Maslin) and a PNBA Award winner. Read Wilson’s essay for </span><em data-dcnode-id="520"><span data-dcnode-id="521" instrument_node="">NW Book Lovers</span></em><span data-dcnode-id="519" instrument_node="">, </span><a data-dcnode-id="517" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//nwbooklovers.org/2013/01/16/khomeini-on-the-rain-coast/"><span data-dcnode-id="518" instrument_node="">Khomeini on the Rain Coast</span></a><span data-dcnode-id="516" instrument_node="">.</span></p><span data-dcnode-id="514" instrument_node="">
</span></div><span data-dcnode-id="511" instrument_node="">
</span><div class="directory-entry" data-dcnode-id="478"><span data-dcnode-id="510" instrument_node="">
</span><div data-dcnode-id="508"><img alt="" class="alignleft nwbl-author" data-dcnode-id="509" height="150" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//nwbooklovers.org/wp-content/uploads/2013/01/wolff150x150.jpg&amp;raw" title="Virginia Euwer Wolff" width="150"></div><span data-dcnode-id="507" instrument_node="">
</span><h3 class="store-name" data-dcnode-id="505"><span data-dcnode-id="506" instrument_node="">Virginia Euwer Wolff</span></h3><span data-dcnode-id="504" instrument_node="">
</span><a data-dcnode-id="502" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.virginiaeuwerwolff.com/"><span data-dcnode-id="503" instrument_node="">www.virginiaeuwerwolff.com</span></a><span data-dcnode-id="501" instrument_node="">
</span><p data-dcnode-id="480"><span data-dcnode-id="500" instrument_node="">Virginia Euwer Wolff was born in Portland, Oregon. Her family lived on an apple and pear orchard near Mount Hood. Wolff was almost fifty years old when she started writing children books. Her books include </span><a data-dcnode-id="497" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.indiebound.org/book/9780590898003"><em data-dcnode-id="498"><span data-dcnode-id="499" instrument_node="">Bat 6</span></em></a><span data-dcnode-id="496" instrument_node="">, </span><em data-dcnode-id="487"><a data-dcnode-id="494" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.indiebound.org/book/9780805080704"><span data-dcnode-id="495" instrument_node="">Make Lemonade</span></a><span data-dcnode-id="493" instrument_node="">, </span><a data-dcnode-id="491" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.indiebound.org/book/9780312367459"><span data-dcnode-id="492" instrument_node="">The Mozart Season</span></a><span data-dcnode-id="490" instrument_node="">, </span><a data-dcnode-id="488" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.indiebound.org/book/9780689852268"><span data-dcnode-id="489" instrument_node="">Probably Still Nick Swansen</span></a></em><span data-dcnode-id="486" instrument_node=""> and </span><em data-dcnode-id="482"><a data-dcnode-id="484" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.indiebound.org/book/9780689852886"><span data-dcnode-id="485" instrument_node="">True Believer</span></a><span data-dcnode-id="483" instrument_node="">,</span></em><span data-dcnode-id="481" instrument_node=""> which was honored by a 2002 award from the independent booksellers of the Northwest. In an interview with Children’s Literature Network she says, “I think we kids’ authors still start out with hope every morning. We honor our audience.” She lives in a cottage in Oregon, where she has a studio in the middle of the woods. An accomplished violinist, she is a member of the Chamber Music Society of Oregon.</span></p><span data-dcnode-id="479" instrument_node="">
</span></div><span data-dcnode-id="476" instrument_node="">
</span><div class="directory-entry" data-dcnode-id="455"><span data-dcnode-id="475" instrument_node="">
</span><div data-dcnode-id="473"><img alt="" class="alignleft nwbl-author" data-dcnode-id="474" height="150" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//nwbooklovers.org/wp-content/uploads/2014/01/Woody-150x150.jpg&amp;raw" title="Elizabeth Woody" width="150"></div><span data-dcnode-id="472" instrument_node="">
</span><h3 class="store-name" data-dcnode-id="470"><span data-dcnode-id="471" instrument_node="">Elizabeth Woody</span></h3><span data-dcnode-id="469" instrument_node="">
</span><p data-dcnode-id="457"><span data-dcnode-id="468" instrument_node="">An enrolled member of the Confederate Tribes of Warm Springs in Oregon, Elizabeth Woody is a critically praised poet, educator and lecturer. Woody’s collections of poetry include </span><em data-dcnode-id="466"><span data-dcnode-id="467" instrument_node="">Hand into Stone</span></em><span data-dcnode-id="465" instrument_node=""> and </span><em data-dcnode-id="463"><span data-dcnode-id="464" instrument_node="">Luminaries of the Humble</span></em><span data-dcnode-id="462" instrument_node="">, honored with the William Stafford Memorial Prize for Poetry from the Pacific Northwest Booksellers Association in 1995. A practicing artist, Woody illustrated Sherman Alexie’s poetry collection </span><a data-dcnode-id="459" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.indiebound.org/book/9780935626360"><em data-dcnode-id="460"><span data-dcnode-id="461" instrument_node="">Old Shirts and New Skins</span></em></a><span data-dcnode-id="458" instrument_node="">. She works as a program coordinator for the National Science Foundation’s Center for Coastal Margin Observation and Prediction and is a founding member of the Northwest Native American Writers Association.</span></p><span data-dcnode-id="456" instrument_node="">
</span></div><span data-dcnode-id="453" instrument_node="">
</span><div class="directory-entry" data-dcnode-id="429"><span data-dcnode-id="452" instrument_node="">
</span><div data-dcnode-id="450"><img alt="" class="alignleft nwbl-author" data-dcnode-id="451" height="150" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//nwbooklovers.org/wp-content/uploads/2014/01/Wrigley-150x150.jpg&amp;raw" title="Robert Wrigley" width="150"></div><span data-dcnode-id="449" instrument_node="">
</span><h3 class="store-name" data-dcnode-id="447"><span data-dcnode-id="448" instrument_node="">Robert Wrigley</span></h3><span data-dcnode-id="446" instrument_node="">
</span><a data-dcnode-id="444" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.poetryfoundation.org/bio/robert-wrigley"><span data-dcnode-id="445" instrument_node="">www.poetryfoundation.org/bio/robert-wrigley</span></a><span data-dcnode-id="443" instrument_node="">
</span><p data-dcnode-id="431"><span data-dcnode-id="442" instrument_node="">Robert Wrigley was honored by PNBA in 2014 for his ninth collection of poetry, </span><a data-dcnode-id="439" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.indiebound.org/book/9780143123071"><em data-dcnode-id="440"><span data-dcnode-id="441" instrument_node="">Anatomy of Melancholy and Other Poems</span></em></a><span data-dcnode-id="438" instrument_node="">. The first male in his family for generations who escaped coal mine work, Wrigley explores rural Western landscapes and the human place in nature in his poems. He says he aims to “tell all the truth, but make it sing.” In an </span><a data-dcnode-id="436" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//nwbooklovers.org/2014/01/21/the-tribe-of-the-book/"><span data-dcnode-id="437" instrument_node="">essay</span></a><span data-dcnode-id="435" instrument_node=""> on </span><em data-dcnode-id="433"><span data-dcnode-id="434" instrument_node="">NW Book Lovers</span></em><span data-dcnode-id="432" instrument_node="">, he writes that “part of me believes that talking about a book of poems is like talking about a piano: far better to sit down and play it, to hear it played.” Wrigley has won five Pushcart prizes and has been awarded fellowships from the National Endowment for the Arts, the Rockefeller Foundation, the Guggenheim Foundation and the Idaho Commission on the Arts. He lives in Idaho with his wife, the writer Kim Barnes.</span></p><span data-dcnode-id="430" instrument_node="">
</span></div><span data-dcnode-id="427" instrument_node="">
</span><div class="directory-entry" data-dcnode-id="381"><span data-dcnode-id="426" instrument_node="">
</span><div data-dcnode-id="424"><img alt="" class="alignleft nwbl-author" data-dcnode-id="425" height="150" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//nwbooklovers.org/wp-content/uploads/2014/01/Yuknavitch-150x150.jpg&amp;raw" title="Lidia Yuknavitch" width="150"></div><span data-dcnode-id="423" instrument_node="">
</span><h3 class="store-name" data-dcnode-id="421"><span data-dcnode-id="422" instrument_node="">Lidia Yuknavitch</span></h3><span data-dcnode-id="420" instrument_node="">
</span><a data-dcnode-id="418" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.lidiayuknavitch.net/"><span data-dcnode-id="419" instrument_node="">www.lidiayuknavitch.net</span></a><span data-dcnode-id="417" instrument_node="">
</span><p data-dcnode-id="383"><span data-dcnode-id="416" instrument_node="">A lifelong swimmer and former Olympic hopeful, Lidia Yuknavitch uses the metaphor of water to tell the story of a childhood of abuse, her early adulthood and the loss of her first child in her debut, </span><a data-dcnode-id="413" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.indiebound.org/book/9780979018831"><em data-dcnode-id="414"><span data-dcnode-id="415" instrument_node="">The Chronology of Water</span></em></a><span data-dcnode-id="412" instrument_node="">. The memoir was honored by PNBA in 2012 (“If you love memoir or poetry or Ken Kesey or have ever spent time on the planet Sorrow, you’ll want to read </span><em data-dcnode-id="410"><span data-dcnode-id="411" instrument_node="">The Chronology of Water</span></em><span data-dcnode-id="409" instrument_node="">.”—</span><em data-dcnode-id="405"><a data-dcnode-id="407" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//nwbooklovers.org/2012/03/06/how-a-swimmer-resuscitated-herself-lidia-yuknavitch-talks-about-her-stunning-new-memoir/"><span data-dcnode-id="408" instrument_node="">NW Book Lovers</span></a><span data-dcnode-id="406" instrument_node="">). </span></em><span data-dcnode-id="404" instrument_node=""> Yuknavitch is the author of </span><a data-dcnode-id="401" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.indiebound.org/book/9780983477570"><em data-dcnode-id="402"><span data-dcnode-id="403" instrument_node="">Dora: a Headcase</span></em></a><span data-dcnode-id="400" instrument_node="">; </span><em data-dcnode-id="398"><span data-dcnode-id="399" instrument_node="">Her Other Mouths; </span></em><em data-dcnode-id="394"><a data-dcnode-id="396" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.indiebound.org/book/9781573660846"><span data-dcnode-id="397" instrument_node="">Liberty’s Excess</span></a><span data-dcnode-id="395" instrument_node="">;</span></em><span data-dcnode-id="393" instrument_node=""> </span><em data-dcnode-id="389"><a data-dcnode-id="391" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.indiebound.org/book/9781573661072"><span data-dcnode-id="392" instrument_node="">Real to Reel</span></a><span data-dcnode-id="390" instrument_node="">, </span></em><span data-dcnode-id="388" instrument_node="">a finalist for the Oregon Book Award; and </span><a data-dcnode-id="385" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.indiebound.org/book/9780415936378"><em data-dcnode-id="386"><span data-dcnode-id="387" instrument_node="">Allegories of Violence: Tracing the Writings of War in Late Twentieth Century Fiction</span></em></a><span data-dcnode-id="384" instrument_node="">. She teaches writing, literature, film and women’s studies in Oregon.</span></p><span data-dcnode-id="382" instrument_node="">

</span><h3 class="store-name" data-dcnode-id="376"><span data-dcnode-id="377" instrument_node="">Teri Zipf</span></h3><span data-dcnode-id="375" instrument_node="">
</span><p data-dcnode-id="352"><span data-dcnode-id="374" instrument_node="">Teri Zipf’s first book, </span><em data-dcnode-id="372"><span data-dcnode-id="373" instrument_node="">Outside the School of Theology</span></em><span data-dcnode-id="371" instrument_node="">, won the 1998 William Stafford Memorial Poetry Award from the independent booksellers of the Northwest. “We found this poetry to be magical, pragmatic and sublime; sensuous, visceral, knowing and joyous,” the Awards Committee wrote. Zipf’s short stories, poetry and essays have been published in </span><em data-dcnode-id="369"><span data-dcnode-id="370" instrument_node="">Salon</span></em><span data-dcnode-id="368" instrument_node="">, </span><em data-dcnode-id="366"><span data-dcnode-id="367" instrument_node="">Left Bank</span></em><span data-dcnode-id="365" instrument_node="">, </span><em data-dcnode-id="363"><span data-dcnode-id="364" instrument_node="">Northern Lights</span></em><span data-dcnode-id="362" instrument_node="">, </span><em data-dcnode-id="360"><span data-dcnode-id="361" instrument_node="">Kinesis</span></em><span data-dcnode-id="359" instrument_node="">, </span><em data-dcnode-id="357"><span data-dcnode-id="358" instrument_node="">Rain City Review</span></em><span data-dcnode-id="356" instrument_node="">, </span><em data-dcnode-id="354"><span data-dcnode-id="355" instrument_node="">Calapooya Collage</span></em><span data-dcnode-id="353" instrument_node="">, and many others. Zipf has received a number of fellowships and grants. She lives in Walla Walla.</span></p><span data-dcnode-id="351" instrument_node="">
