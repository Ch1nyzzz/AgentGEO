</span></div><span data-dcnode-id="3883" instrument_node="">
</span><div class="directory-entry" data-dcnode-id="3856"><span data-dcnode-id="3882" instrument_node="">
</span><div data-dcnode-id="3880"><img alt="" class="alignleft nwbl-author" data-dcnode-id="3881" height="150" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//nwbooklovers.org/wp-content/uploads/2014/01/Ivey-150x150.jpg&amp;raw" title="Eowyn Ivey" width="150"></div><span data-dcnode-id="3879" instrument_node="">
</span><h3 class="store-name" data-dcnode-id="3877"><span data-dcnode-id="3878" instrument_node="">Eowyn Ivey</span></h3><span data-dcnode-id="3876" instrument_node="">
</span><a data-dcnode-id="3874" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//eowynivey.com/"><span data-dcnode-id="3875" instrument_node="">eowynivey.com</span></a><span data-dcnode-id="3873" instrument_node="">
</span><p data-dcnode-id="3858"><span data-dcnode-id="3872" instrument_node="">Eowyn Ivey is a bookseller (Fireside Books) and author, whose “quiet, magical, unmistakably Alaskan” debut novel, </span><em data-dcnode-id="3869"><a data-dcnode-id="3870" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.indiebound.org/book/9780316175661"><span data-dcnode-id="3871" instrument_node="">The Snow Child</span></a></em><span data-dcnode-id="3868" instrument_node="">, won a PNBA Award in 2014. Hailed as “if Willa Cather and Gabriel García Marquéz had collaborated on a book,” the novel was a Pulitzer Prize finalist for fiction. </span><em data-dcnode-id="3866"><span data-dcnode-id="3867" instrument_node="">NW Book Lovers</span></em><span data-dcnode-id="3865" instrument_node=""> interviewed Ivey about her double life as an author/bookseller </span><a data-dcnode-id="3863" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//nwbooklovers.org/2011/08/25/good-books-bad-coffee-great-company-eowyn-iveys-wondrous-alaska/"><span data-dcnode-id="3864" instrument_node="">here</span></a><span data-dcnode-id="3862" instrument_node=""> and published her essay </span><a data-dcnode-id="3860" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//nwbooklovers.org/2013/01/23/how-a-bookstore-changed-my-world/"><span data-dcnode-id="3861" instrument_node="">How a Bookstore Changed my World</span></a><span data-dcnode-id="3859" instrument_node="">. Ivey lives in Palmer, Alaska with her husband and two daughters.</span></p><span data-dcnode-id="3857" instrument_node="">
</span></div><span data-dcnode-id="3854" instrument_node="">
</span><div class="directory-entry" data-dcnode-id="3836"><span data-dcnode-id="3853" instrument_node="">
</span><div data-dcnode-id="3851"><img alt="" class="alignleft nwbl-author" data-dcnode-id="3852" height="150" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//nwbooklovers.org/wp-content/uploads/2014/01/Jay-150x150.jpg&amp;raw" title="Tom Jay" width="150"></div><span data-dcnode-id="3850" instrument_node="">
</span><h3 class="store-name" data-dcnode-id="3848"><span data-dcnode-id="3849" instrument_node="">Tom Jay</span></h3><span data-dcnode-id="3847" instrument_node="">
</span><a data-dcnode-id="3845" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.thelateralline.com/"><span data-dcnode-id="3846" instrument_node="">www.thelateralline.com</span></a><span data-dcnode-id="3844" instrument_node="">
</span><p data-dcnode-id="3838"><span data-dcnode-id="3843" instrument_node="">Tom Jay has been an active member of the Northwest Art Community since 1966, when he built the first bronze casting facility for Seattle University. He went on to supervise and construct casting facilities at the University of Washington. He established Riverdog Fine Arts Foundry which cast, in addition to his own work, for notable Northwest sculptors. His book, with co-authors Natalie Fobes and Brad Matsen, </span><em data-dcnode-id="3840"><a data-dcnode-id="3841" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.indiebound.org/book/9780882404493"><span data-dcnode-id="3842" instrument_node="">Reaching Home: Pacific Salmon, Pacific People</span></a></em><span data-dcnode-id="3839" instrument_node="">, was honored in 1995 by the independent booksellers of the Northwest.</span></p><span data-dcnode-id="3837" instrument_node="">
</span></div><span data-dcnode-id="3834" instrument_node="">
</span><div class="directory-entry" data-dcnode-id="3818"><span data-dcnode-id="3833" instrument_node="">
</span><h3 class="store-name" data-dcnode-id="3831"><span data-dcnode-id="3832" instrument_node="">Elizabeth Johns</span></h3><span data-dcnode-id="3830" instrument_node="">
</span><p data-dcnode-id="3820"><span data-dcnode-id="3829" instrument_node="">Artist Elizabeth Johns is the illustrator of </span><em data-dcnode-id="3826"><a data-dcnode-id="3827" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.indiebound.org/book/9780807576632"><span data-dcnode-id="3828" instrument_node="">Sunflower Sal</span></a></em><span data-dcnode-id="3825" instrument_node=""> and </span><em data-dcnode-id="3822"><a data-dcnode-id="3823" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.indiebound.org/book/9780882404950"><span data-dcnode-id="3824" instrument_node="">The Sleeping Lady</span></a></em><span data-dcnode-id="3821" instrument_node="">, which was honored with an award from the independent booksellers of the Northwest in 1995. She has been painting and showing her work for nearly 40 years, both in the Pacific Northwest, where she lived for many years, and in the Blue Ridge Mountains of east Tennessee, where she lives with her husband and works from a studio in their home.</span></p><span data-dcnode-id="3819" instrument_node="">
</span></div><span data-dcnode-id="3816" instrument_node="">
</span><div class="directory-entry" data-dcnode-id="3801"><span data-dcnode-id="3815" instrument_node="">
</span><div data-dcnode-id="3813"><img alt="" class="alignleft nwbl-author" data-dcnode-id="3814" height="150" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//nwbooklovers.org/wp-content/uploads/2014/01/Johnson-150x150.jpg&amp;raw" title="Charles Johnson" width="150"></div><span data-dcnode-id="3812" instrument_node="">
</span><h3 class="store-name" data-dcnode-id="3810"><span data-dcnode-id="3811" instrument_node="">Charles Johnson</span></h3><span data-dcnode-id="3809" instrument_node="">
</span><p data-dcnode-id="3803"><span data-dcnode-id="3808" instrument_node="">Charles Johnson is the author of four novels, two collections of short stories and several screenplays. His historical novel </span><em data-dcnode-id="3805"><a data-dcnode-id="3806" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.indiebound.org/book/9780684855882"><span data-dcnode-id="3807" instrument_node="">Middle Passage</span></a></em><span data-dcnode-id="3804" instrument_node=""> was honored by the independent booksellers in 1992 and received the 1990 National Book Award, making Johnson the first African-American male to win this prize since Ralph Ellison in 1953. Among many other honors, Johnson, a Ph.D. in philosophy, was a 1998 MacArthur fellow and a 2002 recipient of an American Academy of Arts and Letters Award for Literature. He is a former director of the creative writing program at the University of Washington, where he currently teaches fiction.</span></p><span data-dcnode-id="3802" instrument_node="">
</span></div><span data-dcnode-id="3799" instrument_node="">
</span><div class="directory-entry" data-dcnode-id="3777"><span data-dcnode-id="3798" instrument_node="">
</span><div data-dcnode-id="3796"><img alt="" class="alignleft nwbl-author" data-dcnode-id="3797" height="150" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//nwbooklovers.org/wp-content/uploads/2011/02/Johnson-150x150.jpg&amp;raw" title="Denis Johnson" width="150"></div><span data-dcnode-id="3795" instrument_node="">
</span><h3 class="store-name" data-dcnode-id="3793"><span data-dcnode-id="3794" instrument_node="">Denis Johnson</span></h3><span data-dcnode-id="3792" instrument_node="">
</span><p data-dcnode-id="3779"><span data-dcnode-id="3791" instrument_node="">Denis Johnson has produced poetry, non-fiction, plays and ten books of fiction, including </span><em data-dcnode-id="3788"><a data-dcnode-id="3789" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.indiebound.org/book/9780312428747"><span data-dcnode-id="3790" instrument_node="">Jesus’ Son</span></a></em><span data-dcnode-id="3787" instrument_node="">, which was made into a 1999 award-winning movie, and </span><em data-dcnode-id="3784"><a data-dcnode-id="3785" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.indiebound.org/book/9780312427740"><span data-dcnode-id="3786" instrument_node="">Tree of Smoke</span></a></em><span data-dcnode-id="3783" instrument_node="">, for which he was honored with a 2008 award from the independent book sellers of the Northwest and with a 2007 National Book Award. In a 2007 article for the </span><em data-dcnode-id="3781"><span data-dcnode-id="3782" instrument_node="">New York Times</span></em><span data-dcnode-id="3780" instrument_node="">, Johnson said his influences include Dr. Seuss, Jimi Hendrix and T. S. Eliot. “Those I admire the most and those I admired the earliest … have something to say in every line I write,” he said. Johnson was born in 1949 in Munich, West Germany and now lives in Northern Idaho.</span></p><span data-dcnode-id="3778" instrument_node="">
</span></div><span data-dcnode-id="3775" instrument_node="">
</span><div class="directory-entry" data-dcnode-id="3743"><span data-dcnode-id="3774" instrument_node="">
</span><div data-dcnode-id="3772"><img alt="" class="alignleft nwbl-author" data-dcnode-id="3773" height="150" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//nwbooklovers.org/wp-content/uploads/2014/01/Jones-150x150.jpg&amp;raw" title="Thom Jones" width="150"></div><span data-dcnode-id="3771" instrument_node="">
</span><h3 class="store-name" data-dcnode-id="3769"><span data-dcnode-id="3770" instrument_node="">Thom Jones</span></h3><span data-dcnode-id="3768" instrument_node="">
</span><p data-dcnode-id="3745"><span data-dcnode-id="3767" instrument_node="">Thom Jones worked as a copywriter and a janitor until he was discovered, well into his 40s, by the fiction editors of </span><em data-dcnode-id="3765"><span data-dcnode-id="3766" instrument_node="">The New Yorker</span></em><span data-dcnode-id="3764" instrument_node="">, who published a series of his short stories. One of these, </span><em data-dcnode-id="3761"><a data-dcnode-id="3762" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.indiebound.org/book/9780316473040"><span data-dcnode-id="3763" instrument_node="">The Pugilist at Rest</span></a></em><span data-dcnode-id="3760" instrument_node=""> was later published in a collection of the same name and was honored by the independent booksellers of the Northwest in 1994. His story </span><em data-dcnode-id="3758"><span data-dcnode-id="3759" instrument_node="">I Want To Live!</span></em><span data-dcnode-id="3757" instrument_node=""> was included in the anthology </span><em data-dcnode-id="3755"><span data-dcnode-id="3756" instrument_node="">The Best American Short Stories of the Century</span></em><span data-dcnode-id="3754" instrument_node="">. His other books include short story collections </span><em data-dcnode-id="3751"><a data-dcnode-id="3752" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.indiebound.org/book/9780316472579"><span data-dcnode-id="3753" instrument_node="">Cold Snap</span></a></em><span data-dcnode-id="3750" instrument_node=""> and </span><em data-dcnode-id="3747"><a data-dcnode-id="3748" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.indiebound.org/book/9780316472401"><span data-dcnode-id="3749" instrument_node="">Sonny Liston Was a Friend of Mine</span></a></em><span data-dcnode-id="3746" instrument_node="">. Recently he has written scripts for feature films. Jones currently resides in Olympia, Washington and has temporal lobe epilepsy and suffers from diabetes, as do many of his characters.</span></p><span data-dcnode-id="3744" instrument_node="">
</span></div><span data-dcnode-id="3741" instrument_node="">
</span><div class="directory-entry" data-dcnode-id="3719"><span data-dcnode-id="3740" instrument_node="">
</span><div data-dcnode-id="3738"><img alt="" class="alignleft nwbl-author" data-dcnode-id="3739" height="150" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//nwbooklovers.org/wp-content/uploads/2011/02/StevieK-150x150.jpg&amp;raw" title="Stephanie Kallos" width="150"></div><span data-dcnode-id="3737" instrument_node="">
</span><h3 class="store-name" data-dcnode-id="3735"><span data-dcnode-id="3736" instrument_node="">Stephanie Kallos</span></h3><span data-dcnode-id="3734" instrument_node="">
</span><a data-dcnode-id="3732" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.stephaniekallos.com/"><span data-dcnode-id="3733" instrument_node="">www.stephaniekallos.com</span></a><span data-dcnode-id="3731" instrument_node="">
</span><p data-dcnode-id="3721"><span data-dcnode-id="3730" instrument_node="">Stephanie Kallos’s debut novel, </span><em data-dcnode-id="3727"><a data-dcnode-id="3728" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.indiebound.org/book/9780802142108"><span data-dcnode-id="3729" instrument_node="">Broken for You</span></a></em><span data-dcnode-id="3726" instrument_node="">, was honored by a 2005 award by the independent booksellers of the Northwest. Her second novel, </span><em data-dcnode-id="3723"><a data-dcnode-id="3724" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.indiebound.org/book/9780802144133/Stephanie-Kallos/Sing-Them-Home"><span data-dcnode-id="3725" instrument_node="">Sing Them Home</span></a></em><span data-dcnode-id="3722" instrument_node="">, was published in 2009. Kallos lives with her family in a north Seattle neighborhood that has no sidewalks and looks very much like a small town. Happily distracting her from writing are numerous unfinished knitting projects, a doe-eyed Labrador named Mr. Nick Tumnus, a pair of extremely vocal tabby cats, two adolescent boys who play brass instruments, and an eighty-voice Intergenerational Choir of Unitarians which she serves as conductor. She is currently working on her third novel.</span></p><span data-dcnode-id="3720" instrument_node="">
</span></div><span data-dcnode-id="3717" instrument_node="">
</span><div class="directory-entry" data-dcnode-id="3687"><span data-dcnode-id="3716" instrument_node="">
</span><div data-dcnode-id="3714"><img alt="" class="alignleft nwbl-author" data-dcnode-id="3715" height="150" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//nwbooklovers.org/wp-content/uploads/2014/01/Kalpakian-150x150.jpg&amp;raw" title="Laura Kalpakian" width="150"></div><span data-dcnode-id="3713" instrument_node="">
</span><h3 class="store-name" data-dcnode-id="3711"><span data-dcnode-id="3712" instrument_node="">Laura Kalpakian</span></h3><span data-dcnode-id="3710" instrument_node="">
</span><p data-dcnode-id="3689"><span data-dcnode-id="3709" instrument_node="">Laura Kalpakian has published 10 books, including </span><em data-dcnode-id="3706"><a data-dcnode-id="3707" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.indiebound.org/book/9780936085395"><span data-dcnode-id="3708" instrument_node="">Graced Land</span></a></em><span data-dcnode-id="3705" instrument_node=""> and </span><em data-dcnode-id="3703"><span data-dcnode-id="3704" instrument_node="">Dark Continent and Other Stories</span></em><span data-dcnode-id="3702" instrument_node="">, which were honored with awards from the independent booksellers of the Northwest, in 1993 and 1990 respectively. Her collection </span><em data-dcnode-id="3700"><span data-dcnode-id="3701" instrument_node="">Fair Augusto and Other Stories</span></em><span data-dcnode-id="3699" instrument_node=""> won the PEN/West Award for Best Short Fiction. Her work has been praised by </span><em data-dcnode-id="3697"><span data-dcnode-id="3698" instrument_node="">The New Yorker</span></em><span data-dcnode-id="3696" instrument_node="">, </span><em data-dcnode-id="3694"><span data-dcnode-id="3695" instrument_node="">The Observer</span></em><span data-dcnode-id="3693" instrument_node=""> and the </span><em data-dcnode-id="3691"><span data-dcnode-id="3692" instrument_node="">The Washington Post</span></em><span data-dcnode-id="3690" instrument_node="">, which raved “Whatever happened to old-fashioned stories, with fleshed-out characters, well-crafted plots, strong themes, and palpable atmosphere? Laura Kalpakian, for one, still is writing them.” Kalpakian lives in Bellingham.</span></p><span data-dcnode-id="3688" instrument_node="">
</span></div><span data-dcnode-id="3685" instrument_node="">
</span><div class="directory-entry" data-dcnode-id="3645"><span data-dcnode-id="3684" instrument_node="">
</span><div data-dcnode-id="3682"><img alt="" class="alignleft nwbl-author" data-dcnode-id="3683" height="150" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//nwbooklovers.org/wp-content/uploads/2011/02/Kantner-150x150.jpg&amp;raw" title="Seth Kantner" width="150"></div><span data-dcnode-id="3681" instrument_node="">
</span><h3 class="store-name" data-dcnode-id="3679"><span data-dcnode-id="3680" instrument_node="">Seth Kantner</span></h3><span data-dcnode-id="3678" instrument_node="">
</span><a data-dcnode-id="3676" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//sethkantner.com/"><span data-dcnode-id="3677" instrument_node="">sethkantner.com</span></a><span data-dcnode-id="3675" instrument_node="">
</span><p data-dcnode-id="3647"><span data-dcnode-id="3674" instrument_node="">Seth Kantner is a commercial fisherman, author and wildlife photographer. He was born and raised in northern Alaska. His writing and photographs have appeared in </span><em data-dcnode-id="3672"><span data-dcnode-id="3673" instrument_node="">Outside</span></em><span data-dcnode-id="3671" instrument_node="">, </span><em data-dcnode-id="3669"><span data-dcnode-id="3670" instrument_node="">Alaska Geographic</span></em><span data-dcnode-id="3668" instrument_node="">, </span><em data-dcnode-id="3666"><span data-dcnode-id="3667" instrument_node="">The New York Times</span></em><span data-dcnode-id="3665" instrument_node="">, </span><em data-dcnode-id="3663"><span data-dcnode-id="3664" instrument_node="">Prairie Schooner</span></em><span data-dcnode-id="3662" instrument_node="">, among other magazines, literary journals and anthologies. He’s a former columnist for the </span><em data-dcnode-id="3660"><span data-dcnode-id="3661" instrument_node="">Anchorage Daily News</span></em><span data-dcnode-id="3659" instrument_node=""> and writes a bi-monthly dispatch on climate change in the Arctic for </span><em data-dcnode-id="3657"><span data-dcnode-id="3658" instrument_node="">Orion</span></em><span data-dcnode-id="3656" instrument_node=""> magazine. His debut novel, </span><em data-dcnode-id="3653"><a data-dcnode-id="3654" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.indiebound.org/book/9781571310477"><span data-dcnode-id="3655" instrument_node="">Ordinary Wolves</span></a></em><span data-dcnode-id="3652" instrument_node="">, was honored with a 2005 award from the independent booksellers of the Northwest. His most recent book, </span><em data-dcnode-id="3649"><a data-dcnode-id="3650" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.indiebound.org/book/9781571313119"><span data-dcnode-id="3651" instrument_node="">Shopping for Porcupine: A Life in Arctic Alaska</span></a></em><span data-dcnode-id="3648" instrument_node="">, was released in 2006. He lives in northwest Alaska with his wife, Stacey, and his daughter, China.</span></p><span data-dcnode-id="3646" instrument_node="">
</span></div><span data-dcnode-id="3643" instrument_node="">
</span><div class="directory-entry" data-dcnode-id="3626"><span data-dcnode-id="3642" instrument_node="">
</span><h3 class="store-name" data-dcnode-id="3640"><span data-dcnode-id="3641" instrument_node="">David Kelly</span></h3><span data-dcnode-id="3639" instrument_node="">
</span><p data-dcnode-id="3628"><span data-dcnode-id="3638" instrument_node="">David Kelly is a freelance writer and editor whose background includes positions as managing editor of </span><em data-dcnode-id="3636"><span data-dcnode-id="3637" instrument_node="">Oregon Magazine</span></em><span data-dcnode-id="3635" instrument_node="">, staff writer for </span><em data-dcnode-id="3633"><span data-dcnode-id="3634" instrument_node="">Willamette Week</span></em><span data-dcnode-id="3632" instrument_node="">, and English instructor at Northwestern University. He received his bachelor’s degree in English from Brown University and presently lives in Portland, Oregon. His book </span><em data-dcnode-id="3630"><span data-dcnode-id="3631" instrument_node="">Secrets of the Old Growth Forest</span></em><span data-dcnode-id="3629" instrument_node="">, with co-author Gary Braasch, was honored by the independent booksellers of the Northwest in 1989.</span></p><span data-dcnode-id="3627" instrument_node="">
</span></div><span data-dcnode-id="3624" instrument_node="">
</span><div class="directory-entry" data-dcnode-id="3604"><span data-dcnode-id="3623" instrument_node="">
</span><h3 class="store-name" data-dcnode-id="3621"><span data-dcnode-id="3622" instrument_node="">Richard Kennedy</span></h3><span data-dcnode-id="3620" instrument_node="">
</span><p data-dcnode-id="3606"><span data-dcnode-id="3619" instrument_node="">Richard Kennedy is an author and an illustrator of children’s books and young adult books. His books include </span><em data-dcnode-id="3617"><span data-dcnode-id="3618" instrument_node="">The Boxcar at the Center of the Universe</span></em><span data-dcnode-id="3616" instrument_node="">, </span><em data-dcnode-id="3614"><span data-dcnode-id="3615" instrument_node="">The Porcelain Man</span></em><span data-dcnode-id="3613" instrument_node="">, </span><em data-dcnode-id="3611"><span data-dcnode-id="3612" instrument_node="">The Parrot and the Thief</span></em><span data-dcnode-id="3610" instrument_node=""> and </span><em data-dcnode-id="3608"><span data-dcnode-id="3609" instrument_node="">Amy’s Eyes</span></em><span data-dcnode-id="3607" instrument_node="">, honored by the independent booksellers of the Northwest in 1986.</span></p><span data-dcnode-id="3605" instrument_node="">
</span></div><span data-dcnode-id="3602" instrument_node="">
</span><div class="directory-entry" data-dcnode-id="3547"><span data-dcnode-id="3601" instrument_node="">
</span><div data-dcnode-id="3599"><img alt="" class="alignleft nwbl-author" data-dcnode-id="3600" height="150" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//nwbooklovers.org/wp-content/uploads/2011/02/LaurenK-150x150.jpg&amp;raw" title="Lauren Kessler" width="150"></div><span data-dcnode-id="3598" instrument_node="">
</span><h3 class="store-name" data-dcnode-id="3596"><span data-dcnode-id="3597" instrument_node="">Lauren Kessler</span></h3><span data-dcnode-id="3595" instrument_node="">
</span><a data-dcnode-id="3593" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//laurenkessler.com/"><span data-dcnode-id="3594" instrument_node="">laurenkessler.com</span></a><span data-dcnode-id="3592" instrument_node="">
</span><p data-dcnode-id="3549"><span data-dcnode-id="3591" instrument_node="">Lauren Kessler is the author of seven works of narrative nonfiction, including </span><em data-dcnode-id="3588"><a data-dcnode-id="3589" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.indiebound.org/book/9780670038596"><span data-dcnode-id="3590" instrument_node="">Dancing With Rose: Finding Life in the Land of Alzheimer’s</span></a></em><span data-dcnode-id="3587" instrument_node="">, for which she was honored with a 2008 award from the independent booksellers of the Northwest. Kessler’s other award-winning books include: </span><em data-dcnode-id="3583"><a data-dcnode-id="3585" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.indiebound.org/book/9781609613471"><span data-dcnode-id="3586" instrument_node="">Counterclockwise: My Year of Hypnosis, Hormones, Dark Chocolate and Other Adventures in the World of Anti-Aging</span></a><span data-dcnode-id="3584" instrument_node="">;</span></em><span data-dcnode-id="3582" instrument_node=""> </span><em data-dcnode-id="3578"><a data-dcnode-id="3580" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.indiebound.org/book/9780143119456"><span data-dcnode-id="3581" instrument_node="">My Teenage Werewolf: A Mother, A Daughter, A Journey Through the Thicket of Adolescence</span></a><span data-dcnode-id="3579" instrument_node="">; </span></em><span data-dcnode-id="3577" instrument_node=""> </span><em data-dcnode-id="3573"><a data-dcnode-id="3575" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.indiebound.org/book/9780060959739"><span data-dcnode-id="3576" instrument_node="">Clever Girl: Elizabeth Bentley, the Spy Who Ushered in the McCarthy Era</span></a><span data-dcnode-id="3574" instrument_node="">; </span></em><em data-dcnode-id="3570"><a data-dcnode-id="3571" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.indiebound.org/book/9780812992526"><span data-dcnode-id="3572" instrument_node="">The Happy Bottom Riding Club: The Life and Times of Pancho Barnes</span></a></em><span data-dcnode-id="3569" instrument_node="">, </span><em data-dcnode-id="3567"><span data-dcnode-id="3568" instrument_node="">Full Court Press: A Season in the Life of a Winning Basketball Team and the Women Who Made It Happen</span></em><span data-dcnode-id="3566" instrument_node=""> and </span><em data-dcnode-id="3563"><a data-dcnode-id="3564" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//wwworg/book/9780870714177"><span data-dcnode-id="3565" instrument_node="">Stubborn Twig: Three Generations in the Life of a Japanese American Family</span></a></em><span data-dcnode-id="3562" instrument_node="">. Kessler’s journalism has appeared in </span><em data-dcnode-id="3560"><span data-dcnode-id="3561" instrument_node="">The New York Times Magazine</span></em><span data-dcnode-id="3559" instrument_node="">, </span><em data-dcnode-id="3557"><span data-dcnode-id="3558" instrument_node="">Los Angeles Times Magazine</span></em><span data-dcnode-id="3556" instrument_node="">, </span><em data-dcnode-id="3554"><span data-dcnode-id="3555" instrument_node="">O Magazine</span></em><span data-dcnode-id="3553" instrument_node="">, </span><em data-dcnode-id="3551"><span data-dcnode-id="3552" instrument_node="">Utne Reader</span></em><span data-dcnode-id="3550" instrument_node=""> and Salon. Kessler directs the graduate program in multimedia narrative journalism at the University of Oregon.</span></p><span data-dcnode-id="3548" instrument_node="">
</span></div><span data-dcnode-id="3545" instrument_node="">
</span><div class="directory-entry" data-dcnode-id="3516"><span data-dcnode-id="3544" instrument_node="">
</span><div data-dcnode-id="3542"><img alt="" class="alignleft nwbl-author" data-dcnode-id="3543" height="150" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//nwbooklovers.org/wp-content/uploads/2010/05/newjane-150x150.jpg&amp;raw" title="Jane Kirkpatrick" width="150"></div><span data-dcnode-id="3541" instrument_node="">
</span><h3 class="store-name" data-dcnode-id="3539"><span data-dcnode-id="3540" instrument_node="">Jane Kirkpatrick</span></h3><span data-dcnode-id="3538" instrument_node="">
</span><p data-dcnode-id="3518"><span data-dcnode-id="3537" instrument_node="">Jane Kirkpatrick is a retired social worker and teacher who has written 16 books, both fiction and non-fiction, about or based on the lives of people in the American West. Her first novel, </span><em data-dcnode-id="3535"><span data-dcnode-id="3536" instrument_node="">A Sweetness to the Soul</span></em><span data-dcnode-id="3534" instrument_node="">, won the Wrangler Award from the Western Heritage Center. </span><em data-dcnode-id="3532"><span data-dcnode-id="3533" instrument_node="">A Tendering in the Storm</span></em><span data-dcnode-id="3531" instrument_node=""> won the 2007 WILLA Literary Award for Best Original Paperback, and </span><em data-dcnode-id="3529"><span data-dcnode-id="3530" instrument_node="">A Flickering Light</span></em><span data-dcnode-id="3528" instrument_node="">, a story based on her grandmother’s life as a turn of the century photographer, was named to Library Journal’s Best Books of 2009. Her work has also appeared in more than 50 publications, including </span><em data-dcnode-id="3526"><span data-dcnode-id="3527" instrument_node="">Decision</span></em><span data-dcnode-id="3525" instrument_node="">, </span><em data-dcnode-id="3523"><span data-dcnode-id="3524" instrument_node="">Private Pilot</span></em><span data-dcnode-id="3522" instrument_node=""> and </span><em data-dcnode-id="3520"><span data-dcnode-id="3521" instrument_node="">Daily Guideposts</span></em><span data-dcnode-id="3519" instrument_node="">. Kirkpatrick now lives in Central Oregon (between Bend and Redmond) after homesteading for 26 years with her husband, Jerry, in a remote part of Oregon known as Starvation Point.</span></p><span data-dcnode-id="3517" instrument_node="">
</span></div><span data-dcnode-id="3514" instrument_node="">
</span><div class="directory-entry" data-dcnode-id="3495"><span data-dcnode-id="3513" instrument_node="">
</span><div data-dcnode-id="3511"><img alt="" class="alignleft nwbl-author" data-dcnode-id="3512" height="150" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//nwbooklovers.org/wp-content/uploads/2014/01/krakauer-150x150.jpg&amp;raw" title="Jon Krakauer" width="150"></div><span data-dcnode-id="3510" instrument_node="">
</span><h3 class="store-name" data-dcnode-id="3508"><span data-dcnode-id="3509" instrument_node="">Jon Krakauer</span></h3><span data-dcnode-id="3507" instrument_node="">
</span><p data-dcnode-id="3497"><span data-dcnode-id="3506" instrument_node="">Jon Krakauer is a journalist, author and mountaineer best known for his writing about the outdoors. Krakauer grew up in Corvallis, where his father introduced him to mountaineering as an 8-year-old. In 1996 Krakauer reached the top of Mt. Everest, but during the descent a storm engulfed the peak, taking the lives of four of the five teammates who climbed to the summit with him. </span><a data-dcnode-id="3503" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.indiebound.org/book/9780385486804"><em data-dcnode-id="3504"><span data-dcnode-id="3505" instrument_node="">Into Thin Air</span></em></a><span data-dcnode-id="3502" instrument_node="">, his account of that experience, became a #1 New York Times bestseller and won a PNBA Award in 1998. </span><a data-dcnode-id="3499" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.indiebound.org/book/9780385486804"><em data-dcnode-id="3500"><span data-dcnode-id="3501" instrument_node="">Into the Wild</span></em></a><span data-dcnode-id="3498" instrument_node="">, his story about a young man from a wealthy family who walked alone into the Alaskan wilderness where he died of starvation four months later, was honored by PNBA in 1997. A former Seattlite, Krakauer lives in Colorado.</span></p><span data-dcnode-id="3496" instrument_node="">
</span></div><span data-dcnode-id="3493" instrument_node="">
</span><div class="directory-entry" data-dcnode-id="3475"><span data-dcnode-id="3492" instrument_node="">
</span><div data-dcnode-id="3490"><img alt="" class="alignleft nwbl-author" data-dcnode-id="3491" height="150" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//nwbooklovers.org/wp-content/uploads/2014/01/Kruckeberg-150x150.jpg&amp;raw" title="Arthur Kruckeberg" width="150"></div><span data-dcnode-id="3489" instrument_node="">
</span><h3 class="store-name" data-dcnode-id="3487"><span data-dcnode-id="3488" instrument_node="">Arthur Kruckeberg</span></h3><span data-dcnode-id="3486" instrument_node="">
</span><a data-dcnode-id="3484" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.artkruckeberg.com/"><span data-dcnode-id="3485" instrument_node="">www.artkruckeberg.com</span></a><span data-dcnode-id="3483" instrument_node="">
</span><p data-dcnode-id="3477"><span data-dcnode-id="3482" instrument_node="">Arthur Kruckeberg was born in 1920 in Los Angeles and fell in love with the plant world at an early age. In 1950, he began working as an instructor at the University of Washington, where he would work for 50 years, eventually becoming an emeritus professor of botany. Kruckeberg helped Washington state establish a Natural Area Program and served on boards of The Nature Conservancy and other conservation groups. He has written several books, including </span><a data-dcnode-id="3479" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.indiebound.org/book/9780295974774"><em data-dcnode-id="3480"><span data-dcnode-id="3481" instrument_node="">The Natural History of Puget Sound Country</span></em></a><span data-dcnode-id="3478" instrument_node="">, honored by the independent booksellers of the Northwest in 1992.</span></p><span data-dcnode-id="3476" instrument_node="">
</span></div><span data-dcnode-id="3473" instrument_node="">
</span><div class="directory-entry" data-dcnode-id="3442"><span data-dcnode-id="3472" instrument_node="">
</span><div data-dcnode-id="3470"><img alt="" class="alignleft nwbl-author" data-dcnode-id="3471" height="150" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//nwbooklovers.org/wp-content/uploads/2011/02/Kyle-150x150.jpg&amp;raw" title="Aryn Kyle" width="150"></div><span data-dcnode-id="3469" instrument_node="">
</span><h3 class="store-name" data-dcnode-id="3467"><span data-dcnode-id="3468" instrument_node="">Aryn Kyle</span></h3><span data-dcnode-id="3466" instrument_node="">
</span><p data-dcnode-id="3444"><span data-dcnode-id="3465" instrument_node="">Aryn Kyle was born in Peoria, Illinois, and grew up in Grand Junction, Colorado. Her debut novel, </span><a data-dcnode-id="3462" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.indiebound.org/book/9781416533252"><em data-dcnode-id="3463"><span data-dcnode-id="3464" instrument_node="">The God of Animals</span></em></a><span data-dcnode-id="3461" instrument_node="">, was an international bestseller and was honored by the independent booksellers of the Northwest in 2008. Her short story collection, </span><a data-dcnode-id="3458" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.indiebound.org/book/9781416594819"><em data-dcnode-id="3459"><span data-dcnode-id="3460" instrument_node="">Boys and Girls Like You and Me</span></em></a><span data-dcnode-id="3457" instrument_node="">, was published by Scribner in April, 2010. Kyle’s short fiction has appeared in </span><em data-dcnode-id="3455"><span data-dcnode-id="3456" instrument_node="">The Atlantic Monthly</span></em><span data-dcnode-id="3454" instrument_node="">, </span><em data-dcnode-id="3452"><span data-dcnode-id="3453" instrument_node="">Ploughshares</span></em><span data-dcnode-id="3451" instrument_node="">, </span><em data-dcnode-id="3449"><span data-dcnode-id="3450" instrument_node="">Best American Short Stories 2007</span></em><span data-dcnode-id="3448" instrument_node="">, </span><em data-dcnode-id="3446"><span data-dcnode-id="3447" instrument_node="">Best New American Voices 2005</span></em><span data-dcnode-id="3445" instrument_node="">, and elsewhere. She’s the recipient of a Rona Jaffe Award and a National Magazine Award in fiction. She lives in New York City.</span></p><span data-dcnode-id="3443" instrument_node="">
</span></div><span data-dcnode-id="3440" instrument_node="">
</span><div class="directory-entry" data-dcnode-id="3402"><span data-dcnode-id="3439" instrument_node="">
</span><div data-dcnode-id="3437"><img alt="" class="alignleft nwbl-author" data-dcnode-id="3438" height="150" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//nwbooklovers.org/wp-content/uploads/2010/11/Larson-150x150.jpg&amp;raw" title="Erik Larson" width="150"></div><span data-dcnode-id="3436" instrument_node="">
</span><h3 class="store-name" data-dcnode-id="3434"><span data-dcnode-id="3435" instrument_node="">Erik Larson</span></h3><span data-dcnode-id="3433" instrument_node="">
</span><a data-dcnode-id="3431" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//eriklarsonbooks.com/"><span data-dcnode-id="3432" instrument_node="">eriklarsonbooks.com</span></a><span data-dcnode-id="3430" instrument_node="">
</span><p data-dcnode-id="3404"><span data-dcnode-id="3429" instrument_node="">Erik Larson is the bestselling author of the National Book Award finalist and PNBA Award-winning </span><a data-dcnode-id="3425" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.indiebound.org/book/9780375725609"><em data-dcnode-id="3427"><span data-dcnode-id="3428" instrument_node="">The Devil in the White City: Murder, Magic, and Madness at the Fair that Changed America</span></em><span data-dcnode-id="3426" instrument_node=""> </span></a><span data-dcnode-id="3424" instrument_node="">(2004) and the PNBA Award-winning </span><a data-dcnode-id="3421" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.indiebound.org/book/9780375708275"><em data-dcnode-id="3422"><span data-dcnode-id="3423" instrument_node="">Isaac’s Storm: A Man, a Time, and the Deadliest Hurricane in History</span></em></a><span data-dcnode-id="3420" instrument_node=""> (2000). His journalism has appeared in </span><em data-dcnode-id="3418"><span data-dcnode-id="3419" instrument_node="">The Wall Street Journal</span></em><span data-dcnode-id="3417" instrument_node="">, </span><em data-dcnode-id="3415"><span data-dcnode-id="3416" instrument_node="">Time</span></em><span data-dcnode-id="3414" instrument_node="">, </span><em data-dcnode-id="3412"><span data-dcnode-id="3413" instrument_node="">The New Yorker</span></em><span data-dcnode-id="3411" instrument_node="">, </span><em data-dcnode-id="3409"><span data-dcnode-id="3410" instrument_node="">The Atlantic</span></em><span data-dcnode-id="3408" instrument_node="">, </span><em data-dcnode-id="3406"><span data-dcnode-id="3407" instrument_node="">Harper’s</span></em><span data-dcnode-id="3405" instrument_node=""> and other publications. He lives in Seattle with his wife, three daughters, and a dog named Molly.</span></p><span data-dcnode-id="3403" instrument_node="">
</span></div><span data-dcnode-id="3400" instrument_node="">
</span><div class="directory-entry" data-dcnode-id="3376"><span data-dcnode-id="3399" instrument_node="">
</span><div data-dcnode-id="3397"><img alt="" class="alignleft nwbl-author" data-dcnode-id="3398" height="150" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//nwbooklovers.org/wp-content/uploads/2014/01/Larson-150x150.jpg&amp;raw" title="Gary Larson" width="150"></div><span data-dcnode-id="3396" instrument_node="">
</span><h3 class="store-name" data-dcnode-id="3394"><span data-dcnode-id="3395" instrument_node="">Gary Larson</span></h3><span data-dcnode-id="3393" instrument_node="">
</span><a data-dcnode-id="3391" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.thefarside.com/"><span data-dcnode-id="3392" instrument_node="">www.thefarside.com</span></a><span data-dcnode-id="3390" instrument_node="">
</span><p data-dcnode-id="3378"><span data-dcnode-id="3389" instrument_node="">Cartoonist and author Gary Larson is famous for his syndicated cartoon, The Far Side, hailed as “unearthly and wonderful” by </span><em data-dcnode-id="3387"><span data-dcnode-id="3388" instrument_node="">Time</span></em><span data-dcnode-id="3386" instrument_node=""> and “sinister, perhaps, and perfect” by </span><em data-dcnode-id="3384"><span data-dcnode-id="3385" instrument_node="">The New York Times</span></em><span data-dcnode-id="3383" instrument_node="">. The daily panel thrived for fourteen years until Larson retired in 1995. His 23 books of collected cartoons have combined sales of more than 45 million copies. His book </span><a data-dcnode-id="3380" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.indiebound.org/book/9780836211498"><em data-dcnode-id="3381"><span data-dcnode-id="3382" instrument_node="">Beyond The Far Side</span></em></a><span data-dcnode-id="3379" instrument_node=""> won a PNBA Award in 1984. Larson has also completed two animated films, Gary Larson’s Tales From The Far Side I and II. He lives in Seattle.</span></p><span data-dcnode-id="3377" instrument_node="">
</span></div><span data-dcnode-id="3374" instrument_node="">
</span><div class="directory-entry" data-dcnode-id="3328"><span data-dcnode-id="3373" instrument_node="">
</span><div data-dcnode-id="3371"><img alt="" class="alignleft nwbl-author" data-dcnode-id="3372" height="150" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//nwbooklovers.org/wp-content/uploads/2011/02/Laskin-150x150.jpg&amp;raw" title="David Laskin" width="150"></div><span data-dcnode-id="3370" instrument_node="">
</span><h3 class="store-name" data-dcnode-id="3368"><span data-dcnode-id="3369" instrument_node="">David Laskin</span></h3><span data-dcnode-id="3367" instrument_node="">
</span><p data-dcnode-id="3330"><span data-dcnode-id="3366" instrument_node="">David Laskin has written books and articles on a wide range of subjects, including history, weather, travel, gardens and the natural world. </span><a data-dcnode-id="3363" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.indiebound.org/book/9780060520762"><em data-dcnode-id="3364"><span data-dcnode-id="3365" instrument_node="">The Children’s Blizzard</span></em></a><span data-dcnode-id="3362" instrument_node="">, about a horrific storm that took the lives of more than 500 people in 1888, was honored in 2005 with a PNBA Award. Laskin’s other titles include </span><em data-dcnode-id="3358"><a data-dcnode-id="3360" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.indiebound.org/book/9780385469562"><span data-dcnode-id="3361" instrument_node="">Braving the Elements: The Stormy History of American Weather</span></a><span data-dcnode-id="3359" instrument_node="">; </span></em><em data-dcnode-id="3354"><a data-dcnode-id="3356" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.indiebound.org/book/9780226468938"><span data-dcnode-id="3357" instrument_node="">Partisans: Marriage, Politics and Betrayal Among the New York Intellectuals</span></a><span data-dcnode-id="3355" instrument_node="">; </span></em><em data-dcnode-id="3350"><a data-dcnode-id="3352" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.indiebound.org/book/9781416576068"><span data-dcnode-id="3353" instrument_node="">A Common Life: Four Generations of American Literary Friendship and Influence</span></a><span data-dcnode-id="3351" instrument_node="">; and Artists in their Gardens</span></em><span data-dcnode-id="3349" instrument_node=""> (co-authored with Valerie Easton). A frequent contributor to </span><em data-dcnode-id="3347"><span data-dcnode-id="3348" instrument_node="">The New York Times </span></em><span data-dcnode-id="3346" instrument_node="">Travel Section, Laskin also writes for the </span><em data-dcnode-id="3344"><span data-dcnode-id="3345" instrument_node="">Washington Post</span></em><span data-dcnode-id="3343" instrument_node="">, </span><em data-dcnode-id="3341"><span data-dcnode-id="3342" instrument_node="">The Seattle Times</span></em><span data-dcnode-id="3340" instrument_node="">, and </span><em data-dcnode-id="3338"><span data-dcnode-id="3339" instrument_node="">Seattle Metropolitan</span></em><span data-dcnode-id="3337" instrument_node="">. He and his wife, Kate O’Neill, have three grown daughters and live in Seattle. Read his essay </span><a data-dcnode-id="3335" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//nwbooklovers.org/2013/11/18/the-voice-in-my-head-ivan-doig-as-neighbor-friend-and-mentor/" title="The Voice in My Head: Ivan Doig as Neighbor, Friend, and Mentor"><span data-dcnode-id="3336" instrument_node="">The Voice in My Head: Ivan Doig as Neighbor, Friend and Mentor</span></a><span data-dcnode-id="3334" instrument_node=""> on </span><em data-dcnode-id="3332"><span data-dcnode-id="3333" instrument_node="">NW Book Lovers</span></em><span data-dcnode-id="3331" instrument_node="">.</span></p><span data-dcnode-id="3329" instrument_node="">
</span></div><span data-dcnode-id="3326" instrument_node="">
</span><div class="directory-entry" data-dcnode-id="3305"><span data-dcnode-id="3325" instrument_node="">
</span><div data-dcnode-id="3323"><img alt="" class="alignleft nwbl-author" data-dcnode-id="3324" height="150" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//nwbooklovers.org/wp-content/uploads/2011/01/Laursen-150x150.jpg&amp;raw" title="John Laursen" width="150"></div><span data-dcnode-id="3322" instrument_node="">
</span><h3 class="store-name" data-dcnode-id="3320"><span data-dcnode-id="3321" instrument_node="">John Laursen</span></h3><span data-dcnode-id="3319" instrument_node="">
</span><a data-dcnode-id="3317" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.northwestphotography.org/"><span data-dcnode-id="3318" instrument_node="">www.northwestphotography.org</span></a><span data-dcnode-id="3316" instrument_node="">
</span><p data-dcnode-id="3307"><span data-dcnode-id="3315" instrument_node="">“We tried to make the best book that’s ever been made in Oregon,” John Laursen said in an interview with</span><em data-dcnode-id="3313"><span data-dcnode-id="3314" instrument_node=""> The Oregonian</span></em><span data-dcnode-id="3312" instrument_node="">. Laursen, a book designer and editor, was referring to </span><a data-dcnode-id="3309" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.indiebound.org/book/9780870714184"><em data-dcnode-id="3310"><span data-dcnode-id="3311" instrument_node="">Wild Beauty: Photographs of the Columbia River Gorge, 1867-1957</span></em></a><span data-dcnode-id="3308" instrument_node="">, which he co-authored with his longtime friend Terry Toedtemeier, curator of photography at the Portland Art Museum, who died in 2008. Toedtemeier and Laursen formed a nonprofit, the Northwest Photography Archive, to publish books of historically and artistically significant photographs. Their book was honored in 2009 by the independent booksellers of the Northwest. In 2011, Oregon’s Literary Arts presented Laursen with the Stewart H. Holbrook Literary Legacy Award, presented annually to “a person or organization in recognition of significant contributions that have enriched Oregon’s literary community.”</span></p><span data-dcnode-id="3306" instrument_node="">
</span></div><span data-dcnode-id="3303" instrument_node="">
</span><div class="directory-entry" data-dcnode-id="3272"><span data-dcnode-id="3302" instrument_node="">
</span><div data-dcnode-id="3300"><img alt="" class="alignleft nwbl-author" data-dcnode-id="3301" height="150" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//nwbooklovers.org/wp-content/uploads/2011/02/Lawrence-150x150.jpg&amp;raw" title="Iain Lawrence" width="150"></div><span data-dcnode-id="3299" instrument_node="">
</span><h3 class="store-name" data-dcnode-id="3297"><span data-dcnode-id="3298" instrument_node="">Iain Lawrence</span></h3><span data-dcnode-id="3296" instrument_node="">
</span><a data-dcnode-id="3294" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//iainlawrence.com/"><span data-dcnode-id="3295" instrument_node="">iainlawrence.com</span></a><span data-dcnode-id="3293" instrument_node="">
</span><p data-dcnode-id="3274"><span data-dcnode-id="3292" instrument_node="">Iain Lawrence is a bestselling author for children and young adults. A former journalist, his books include </span><a data-dcnode-id="3289" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.indiebound.org/book/9780440415459"><em data-dcnode-id="3290"><span data-dcnode-id="3291" instrument_node="">The Wreckers</span></em></a><span data-dcnode-id="3288" instrument_node="">, </span><a data-dcnode-id="3285" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.indiebound.org/book/9780440239710"><em data-dcnode-id="3286"><span data-dcnode-id="3287" instrument_node="">The Giant-Slayer</span></em></a><span data-dcnode-id="3284" instrument_node="">, </span><em data-dcnode-id="3280"><a data-dcnode-id="3282" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.indiebound.org/book/9780440416715"><span data-dcnode-id="3283" instrument_node="">The Buccaneers</span></a><span data-dcnode-id="3281" instrument_node=""> </span></em><span data-dcnode-id="3279" instrument_node="">and </span><a data-dcnode-id="3276" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.indiebound.org/book/9780385730891"><em data-dcnode-id="3277"><span data-dcnode-id="3278" instrument_node="">Gemini Summer</span></em></a><span data-dcnode-id="3275" instrument_node="">, for which he won a 2007 award from the independent booksellers of the Northwest. In an interview with BookBrowse, Lawrence said he strives to create a feeling for his readers that, “The story is utterly true at the time of its reading—that if you so much as move, you’ll scare the bird away.” Lawrence now lives in British Columbia’s Gulf Islands with his partner, Kristin; his dog, Misty; and his cat, Sailor Sam.</span></p><span data-dcnode-id="3273" instrument_node="">
</span></div><span data-dcnode-id="3270" instrument_node="">
</span><div class="directory-entry" data-dcnode-id="3252"><span data-dcnode-id="3269" instrument_node="">
</span><div data-dcnode-id="3267"><img alt="" class="alignleft nwbl-author" data-dcnode-id="3268" height="150" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//nwbooklovers.org/wp-content/uploads/2011/01/SLawrence-150x150.jpg&amp;raw" title="Sarahlee Lawrence" width="150"></div><span data-dcnode-id="3266" instrument_node="">
</span><h3 class="store-name" data-dcnode-id="3264"><span data-dcnode-id="3265" instrument_node="">Sarahlee Lawrence</span></h3><span data-dcnode-id="3263" instrument_node="">
</span><a data-dcnode-id="3261" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.sarahleelawrence.com/"><span data-dcnode-id="3262" instrument_node="">www.sarahleelawrence.com</span></a><span data-dcnode-id="3260" instrument_node="">
</span><p data-dcnode-id="3254"><span data-dcnode-id="3259" instrument_node="">As a girl growing up in remote central Oregon, Sarahlee Lawrence dreamed of leaving her small town in search of adventure. By the age of twenty-one, she had rafted some of the most dangerous rivers in the world as an accomplished river guide. But living her dream as a guide and advocate led her back to the place she least expected to find herself—her family’s ranch in Terrebonne. Her memoir, </span><a data-dcnode-id="3256" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.indiebound.org/book/9780982569139"><em data-dcnode-id="3257"><span data-dcnode-id="3258" instrument_node="">River House</span></em></a><span data-dcnode-id="3255" instrument_node="">, chronicles her return home. It won a 2011 award from the independent booksellers of the Northwest.</span></p><span data-dcnode-id="3253" instrument_node="">
</span></div><span data-dcnode-id="3250" instrument_node="">
</span><div class="directory-entry" data-dcnode-id="3210"><span data-dcnode-id="3249" instrument_node="">
</span><div data-dcnode-id="3247"><img alt="" class="alignleft nwbl-author" data-dcnode-id="3248" height="150" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//nwbooklovers.org/wp-content/uploads/2011/07/UrsulaK-150x150.jpg&amp;raw" title="Ursula K. Le Guin" width="150"></div><span data-dcnode-id="3246" instrument_node="">
</span><h3 class="store-name" data-dcnode-id="3244"><span data-dcnode-id="3245" instrument_node="">Ursula K. Le Guin</span></h3><span data-dcnode-id="3243" instrument_node="">
</span><a data-dcnode-id="3241" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.ursulakleguin.com/"><span data-dcnode-id="3242" instrument_node="">www.ursulakleguin.com</span></a><span data-dcnode-id="3240" instrument_node="">
</span><p data-dcnode-id="3212"><span data-dcnode-id="3239" instrument_node="">Ursula K. Le Guin has published twenty-two novels, eleven volumes of short stories, three collections of essays, twelve books for children, six volumes of poetry and four of translation, and has received many awards: Hugo, Nebula, National Book Award, PEN-Malamud, the Pacific Northwest Booksellers Award (in 1986 for </span><a data-dcnode-id="3236" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.indiebound.org/book/9780520227354"><em data-dcnode-id="3237"><span data-dcnode-id="3238" instrument_node="">Always Coming Home</span></em></a><span data-dcnode-id="3235" instrument_node=""> and a Lifetime Achievement Award in 2001) and others. Her recent publications include a volume of poetry, </span><a data-dcnode-id="3232" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.indiebound.org/book/9781590304228"><em data-dcnode-id="3233"><span data-dcnode-id="3234" instrument_node="">Incredible Good Fortune</span></em></a><span data-dcnode-id="3231" instrument_node="">; the novel </span><a data-dcnode-id="3228" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.indiebound.org/book/9780156033688"><em data-dcnode-id="3229"><span data-dcnode-id="3230" instrument_node="">Lavinia</span></em></a><span data-dcnode-id="3227" instrument_node="">; an essay collection, </span><a data-dcnode-id="3224" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.indiebound.org/book/9781933500270"><em data-dcnode-id="3225"><span data-dcnode-id="3226" instrument_node="">Cheek by Jowl</span></em></a><span data-dcnode-id="3223" instrument_node="">; and </span><a data-dcnode-id="3220" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.indiebound.org/book/9781604864038"><em data-dcnode-id="3221"><span data-dcnode-id="3222" instrument_node="">The Wild Girls</span></em></a><span data-dcnode-id="3219" instrument_node="">, which packages a short story and an essay that was originally published in </span><em data-dcnode-id="3217"><span data-dcnode-id="3218" instrument_node="">Harpers</span></em><span data-dcnode-id="3216" instrument_node="">. Le Guin lives in Portland. Northwest Book Lovers was fortunate to publish her essay, </span><a data-dcnode-id="3214" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//nwbooklovers.org/2011/05/18/riding-the-avalanche-by-ursula-k-le-guin/"><span data-dcnode-id="3215" instrument_node="">Riding the Avalanche</span></a><span data-dcnode-id="3213" instrument_node="">, about the publishing industry.</span></p><span data-dcnode-id="3211" instrument_node="">
</span></div><span data-dcnode-id="3208" instrument_node="">
</span><div class="directory-entry" data-dcnode-id="3175"><span data-dcnode-id="3207" instrument_node="">
</span><div data-dcnode-id="3205"><img alt="" class="alignleft nwbl-author" data-dcnode-id="3206" height="150" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//nwbooklovers.org/wp-content/uploads/2014/01/lesley-150x150.jpg&amp;raw" title="Craig Lesley" width="150"></div><span data-dcnode-id="3204" instrument_node="">
</span><h3 class="store-name" data-dcnode-id="3202"><span data-dcnode-id="3203" instrument_node="">Craig Lesley</span></h3><span data-dcnode-id="3201" instrument_node="">
</span><a data-dcnode-id="3199" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.craiglesley.com/"><span data-dcnode-id="3200" instrument_node="">www.craiglesley.com</span></a><span data-dcnode-id="3198" instrument_node="">
</span><p data-dcnode-id="3177"><span data-dcnode-id="3197" instrument_node="">Craig Lesley is the author of four novels and a memoir, along with numerous other works. </span><a data-dcnode-id="3193" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.indiebound.org/book/9780312152444"><em data-dcnode-id="3195"><span data-dcnode-id="3196" instrument_node="">Winterkill</span></em><span data-dcnode-id="3194" instrument_node=""> </span></a><span data-dcnode-id="3192" instrument_node="">(1985) and </span><a data-dcnode-id="3189" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.indiebound.org/book/9780312147389"><em data-dcnode-id="3190"><span data-dcnode-id="3191" instrument_node="">The Sky Fisherman</span></em></a><span data-dcnode-id="3188" instrument_node=""> (1996) were honored by the independent booksellers of the Northwest, and in 1992, Lesley received a PNBA award for </span><a data-dcnode-id="3185" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.indiebound.org/book/9780385312721"><em data-dcnode-id="3186"><span data-dcnode-id="3187" instrument_node="">Talking Leaves: Contemporary Native American Short Stories</span></em></a><span data-dcnode-id="3184" instrument_node="">, which he edited. </span><em data-dcnode-id="3182"><span data-dcnode-id="3183" instrument_node="">The Sky Fisherman</span></em><span data-dcnode-id="3181" instrument_node=""> and </span><em data-dcnode-id="3179"><span data-dcnode-id="3180" instrument_node="">Storm Riders</span></em><span data-dcnode-id="3178" instrument_node="">, an Oregon Book Award winner, were nominated for the Pulitzer Prize. Currently the Senior Writer-in-Residence at Portland State University, Lesley lives with his wife and two daughters in Portland, Oregon.</span></p><span data-dcnode-id="3176" instrument_node="">
</span></div><span data-dcnode-id="3173" instrument_node="">
</span><div class="directory-entry" data-dcnode-id="3152"><span data-dcnode-id="3172" instrument_node="">
</span><div data-dcnode-id="3170"><img alt="" class="alignleft nwbl-author" data-dcnode-id="3171" height="150" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//nwbooklovers.org/wp-content/uploads/2014/01/Lewis-150x150.jpg&amp;raw" title="Paul Owen Lewis" width="150"></div><span data-dcnode-id="3169" instrument_node="">
</span><h3 class="store-name" data-dcnode-id="3167"><span data-dcnode-id="3168" instrument_node="">Paul Owen Lewis</span></h3><span data-dcnode-id="3166" instrument_node="">
</span><p data-dcnode-id="3154"><span data-dcnode-id="3165" instrument_node="">Author and artist Paul Owen Lewis is best known for his children’s books </span><em data-dcnode-id="3163"><span data-dcnode-id="3164" instrument_node="">Davy’s Dream</span></em><span data-dcnode-id="3162" instrument_node=""> and </span><em data-dcnode-id="3160"><span data-dcnode-id="3161" instrument_node="">Storm Boy</span></em><span data-dcnode-id="3159" instrument_node="">, both of which feature a child’s interaction with wild killer whales, in dream, and in myth. </span><a data-dcnode-id="3156" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.indiebound.org/book/9781582460574"><em data-dcnode-id="3157"><span data-dcnode-id="3158" instrument_node="">Storm Boy</span></em></a><span data-dcnode-id="3155" instrument_node=""> was honored in 1996 by the independent booksellers of the Northwest. Lewis lives in the San Juan Islands “surrounded by water and the amazing creatures that live in it.”</span></p><span data-dcnode-id="3153" instrument_node="">
</span></div><span data-dcnode-id="3150" instrument_node="">
</span><div class="directory-entry" data-dcnode-id="3124"><span data-dcnode-id="3149" instrument_node="">
</span><div data-dcnode-id="3147"><img alt="" class="alignleft nwbl-author" data-dcnode-id="3148" height="150" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//nwbooklovers.org/wp-content/uploads/2014/01/Lippi-150x150.jpg&amp;raw" title="Rosina Lippi" width="150"></div><span data-dcnode-id="3146" instrument_node="">
</span><h3 class="store-name" data-dcnode-id="3144"><span data-dcnode-id="3145" instrument_node="">Rosina Lippi</span></h3><span data-dcnode-id="3143" instrument_node="">
</span><a data-dcnode-id="3141" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//rosinalippi.com/weblog/"><span data-dcnode-id="3142" instrument_node="">rosinalippi.com/weblog</span></a><span data-dcnode-id="3140" instrument_node="">
</span><p data-dcnode-id="3126"><span data-dcnode-id="3139" instrument_node="">Rosina Lippi was born and raised in Chicago, but she has lived for longer periods in the Austrian alps, on the East coast and in Michigan, where she was a professor at UM/Ann Arbor for ten years. An academic linguist, an editor and a researcher, Lippi is the author of novels </span><a data-dcnode-id="3136" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.indiebound.org/book/9780425225912"><em data-dcnode-id="3137"><span data-dcnode-id="3138" instrument_node="">The Pajama Girls of Lambert Square</span></em></a><span data-dcnode-id="3135" instrument_node="">, </span><a data-dcnode-id="3132" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.indiebound.org/book/9780425215326"><em data-dcnode-id="3133"><span data-dcnode-id="3134" instrument_node="">Tied to the Tracks</span></em></a><span data-dcnode-id="3131" instrument_node=""> and </span><a data-dcnode-id="3128" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.indiebound.org/book/9780395977712"><em data-dcnode-id="3129"><span data-dcnode-id="3130" instrument_node="">Homestead</span></em></a><span data-dcnode-id="3127" instrument_node="">, which in 1999 won a PNBA Award, a 1999 Hemingway Foundation/PEN Award and was shortlisted for the Orange Prize. With linked stories, the novel chronicles six generations of women in an isolated Austrian village. Lippi has also published a series of six books under the name Sara Donati. As the last book in the series was published in January 2010, Donati is now on sabbatical.</span></p><span data-dcnode-id="3125" instrument_node="">
</span></div><span data-dcnode-id="3122" instrument_node="">
</span><div class="directory-entry" data-dcnode-id="3098"><span data-dcnode-id="3121" instrument_node="">
</span><div data-dcnode-id="3119"><img alt="" class="alignleft nwbl-author" data-dcnode-id="3120" height="150" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//nwbooklovers.org/wp-content/uploads/2011/02/Jim-Lynch-150x150.jpg&amp;raw" title="Jim Lynch" width="150"></div><span data-dcnode-id="3118" instrument_node="">
</span><h3 class="store-name" data-dcnode-id="3116"><span data-dcnode-id="3117" instrument_node="">Jim Lynch</span></h3><span data-dcnode-id="3115" instrument_node="">
</span><a data-dcnode-id="3113" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.jimlynchbooks.com/"><span data-dcnode-id="3114" instrument_node="">www.jimlynchbooks.com</span></a><span data-dcnode-id="3112" instrument_node="">
</span><p data-dcnode-id="3100"><span data-dcnode-id="3111" instrument_node="">Jim Lynch began writing as a reporter in an Alaskan fishing village. As a journalist, he has received the Livingston Award for Young Journalists, among other national honors. His first novel,</span><a data-dcnode-id="3107" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.indiebound.org/book/9781582346298"><span data-dcnode-id="3110" instrument_node=""> </span><em data-dcnode-id="3108"><span data-dcnode-id="3109" instrument_node="">The Highest Tide</span></em></a><span data-dcnode-id="3106" instrument_node="">, was honored by the independent booksellers of the Northwest in 2006, and his second novel,</span><a data-dcnode-id="3102" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.indiebound.org/book/9780307456267/jim-lynch/border-songs"><span data-dcnode-id="3105" instrument_node=""> </span><em data-dcnode-id="3103"><span data-dcnode-id="3104" instrument_node="">Border Songs</span></em></a><span data-dcnode-id="3101" instrument_node="">, won a 2010 Washington State Book Award. Lynch lives with his wife and their daughter in Olympia, Washington. He says, “I remain inspired by where I live, overlooking this bay at the southern bottom of Puget Sound …”</span></p><span data-dcnode-id="3099" instrument_node="">
</span></div><span data-dcnode-id="3096" instrument_node="">
</span><div class="directory-entry" data-dcnode-id="3067"><span data-dcnode-id="3095" instrument_node="">
</span><div data-dcnode-id="3093"><img alt="" class="alignleft nwbl-author" data-dcnode-id="3094" height="150" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//nwbooklovers.org/wp-content/uploads/2014/01/Manning-150x150.jpg&amp;raw" title="Richard Manning" width="150"></div><span data-dcnode-id="3092" instrument_node="">
</span><h3 class="store-name" data-dcnode-id="3090"><span data-dcnode-id="3091" instrument_node="">Richard Manning</span></h3><span data-dcnode-id="3089" instrument_node="">
</span><p data-dcnode-id="3069"><span data-dcnode-id="3088" instrument_node="">Richard Manning is an award-winning environmental author and journalist, with particular interest in the history and future of the American prairie, agriculture and poverty. He writes frequently about trauma and poverty for the National Native Children’s Trauma Center based at the University of Montana, where he is a senior research associate. He is the author of eight books, including </span><em data-dcnode-id="3086"><span data-dcnode-id="3087" instrument_node="">One Round River: The Curse of Gold and the Fight for the Big Blackfoot</span></em><span data-dcnode-id="3085" instrument_node="">, which was honored in 1999 by the independent booksellers of the Northwest. His articles have been published in </span><em data-dcnode-id="3083"><span data-dcnode-id="3084" instrument_node="">Harper’s Magazine</span></em><span data-dcnode-id="3082" instrument_node="">, </span><em data-dcnode-id="3080"><span data-dcnode-id="3081" instrument_node="">The New York Times</span></em><span data-dcnode-id="3079" instrument_node="">, </span><em data-dcnode-id="3077"><span data-dcnode-id="3078" instrument_node="">The Los Angeles Times</span></em><span data-dcnode-id="3076" instrument_node="">, </span><em data-dcnode-id="3074"><span data-dcnode-id="3075" instrument_node="">Audubon</span></em><span data-dcnode-id="3073" instrument_node=""> and </span><em data-dcnode-id="3071"><span data-dcnode-id="3072" instrument_node="">The Bloomsbury Review</span></em><span data-dcnode-id="3070" instrument_node="">. He lives in Helena, Montana with his wife, Tracy Stone-Manning.</span></p><span data-dcnode-id="3068" instrument_node="">
</span></div><span data-dcnode-id="3065" instrument_node="">
</span><div class="directory-entry" data-dcnode-id="3050"><span data-dcnode-id="3064" instrument_node="">
</span><div data-dcnode-id="3062"><img alt="" class="alignleft nwbl-author" data-dcnode-id="3063" height="150" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//nwbooklovers.org/wp-content/uploads/2011/01/KMarlantes-150x150.jpg&amp;raw" title="Karl Marlantes" width="150"></div><span data-dcnode-id="3061" instrument_node="">
</span><h3 class="store-name" data-dcnode-id="3059"><span data-dcnode-id="3060" instrument_node="">Karl Marlantes</span></h3><span data-dcnode-id="3058" instrument_node="">
</span><p data-dcnode-id="3052"><span data-dcnode-id="3057" instrument_node="">A graduate of Yale University and a Rhodes Scholar at Oxford University, Karl Marlantes served as a Marine in Vietnam, where he was awarded the Navy Cross, the Bronze Star, two Navy Commendation Medals for valor, two Purple Hearts, and ten air medals. His debut novel, </span><a data-dcnode-id="3054" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.indiebound.org/book/9780802145314/karl-marlantes/matterhorn"><em data-dcnode-id="3055"><span data-dcnode-id="3056" instrument_node="">Matterhorn</span></em></a><span data-dcnode-id="3053" instrument_node="">, was written over the course of thirty years and has been widely hailed as the definitive Vietnam novel. It won a 2011 award from the independent booksellers of the Northwest. Marlantes lives in rural Washington.</span></p><span data-dcnode-id="3051" instrument_node="">
</span></div><span data-dcnode-id="3048" instrument_node="">
</span><div class="directory-entry" data-dcnode-id="3015"><span data-dcnode-id="3047" instrument_node="">
</span><div data-dcnode-id="3045"><img alt="" class="alignleft nwbl-author" data-dcnode-id="3046" height="150" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//nwbooklovers.org/wp-content/uploads/2014/01/Martin-150x150.jpg&amp;raw" title="Emily Winfield Martin" width="150"></div><span data-dcnode-id="3044" instrument_node="">
</span><h3 class="store-name" data-dcnode-id="3042"><span data-dcnode-id="3043" instrument_node="">Emily Winfield Martin</span></h3><span data-dcnode-id="3041" instrument_node="">
</span><a data-dcnode-id="3039" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.emilywinfieldmartin.com/"><span data-dcnode-id="3040" instrument_node="">www.emilywinfieldmartin.com</span></a><span data-dcnode-id="3038" instrument_node="">
</span><p data-dcnode-id="3017"><span data-dcnode-id="3037" instrument_node="">Emily Winfield Martin is the author and illustrator of </span><a data-dcnode-id="3034" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.indiebound.org/book/9780385376709"><em data-dcnode-id="3035"><span data-dcnode-id="3036" instrument_node="">Day Dreamers</span></em></a><span data-dcnode-id="3033" instrument_node="">, </span><a data-dcnode-id="3030" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.indiebound.org/book/9780375870941"><em data-dcnode-id="3031"><span data-dcnode-id="3032" instrument_node="">Oddfellow’s Orphanage</span></em></a><span data-dcnode-id="3029" instrument_node="">, </span><a data-dcnode-id="3026" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.indiebound.org/book/9780307586568"><em data-dcnode-id="3027"><span data-dcnode-id="3028" instrument_node="">The Black Apple’s Paper Doll Primer: Activities and Amusements for the Curious Paper Artist</span></em></a><span data-dcnode-id="3025" instrument_node=""> and </span><a data-dcnode-id="3022" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.indiebound.org/book/9780449810804"><em data-dcnode-id="3023"><span data-dcnode-id="3024" instrument_node="">Dream Animals: A Bedtime Journey</span></em></a><span data-dcnode-id="3021" instrument_node="">, for which she was honored by PNBA booksellers in 2014 (“Like </span><em data-dcnode-id="3019"><span data-dcnode-id="3020" instrument_node="">Goodnight, Moon</span></em><span data-dcnode-id="3018" instrument_node=""> or any number of childhood favorites, this is a book you’ll still love after the umpteenth reading,” they said.) Martin lives in Portland, where her work is inspired by “fairy tales, music, myths, carnivals, children’s books from late the 19th through mid 20th century, her favorite films, and autobiography.”</span></p><span data-dcnode-id="3016" instrument_node="">
</span></div><span data-dcnode-id="3013" instrument_node="">
</span><div class="directory-entry" data-dcnode-id="2988"><span data-dcnode-id="3012" instrument_node="">
</span><div data-dcnode-id="3010"><img alt="" class="alignleft nwbl-author" data-dcnode-id="3011" height="150" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//nwbooklovers.org/wp-content/uploads/2013/01/martin150x150.jpg&amp;raw" title="Nora Martin" width="150"></div><span data-dcnode-id="3009" instrument_node="">
</span><h3 class="store-name" data-dcnode-id="3007"><span data-dcnode-id="3008" instrument_node="">Nora Martin</span></h3><span data-dcnode-id="3006" instrument_node="">
</span><a data-dcnode-id="3004" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//noramartin.net/"><span data-dcnode-id="3005" instrument_node="">noramartin.net</span></a><span data-dcnode-id="3003" instrument_node="">
</span><p data-dcnode-id="2990"><span data-dcnode-id="3002" instrument_node="">Nora Martin is an Adjunct Professor at Montana State University teaching courses in children’s and young adult literature. She earned a teaching degree at the University of Alaska and taught in several rural schools, including one in the Tlingit village of Klukwan. She is the author of </span><em data-dcnode-id="2997"><span data-dcnode-id="3001" instrument_node="">The Stone Dancers, The Eagle’s Shadow, </span><a data-dcnode-id="2999" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.indiebound.org/book/9781582348148"><span data-dcnode-id="3000" instrument_node="">Flight of the Fisherbird</span></a><span data-dcnode-id="2998" instrument_node="">,</span></em><span data-dcnode-id="2996" instrument_node=""> and </span><em data-dcnode-id="2992"><a data-dcnode-id="2994" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.indiebound.org/book/9781582349251"><span data-dcnode-id="2995" instrument_node="">A Perfect Snow</span></a><span data-dcnode-id="2993" instrument_node="">,</span></em><span data-dcnode-id="2991" instrument_node=""> which was honored in 2003 with an award from the independent booksellers of the Northwest. Martin now lives in Gallatin Gateway, Montana, with her husband, Andrew, and their sons, Winslow and Haynes.</span></p><span data-dcnode-id="2989" instrument_node="">
</span></div><span data-dcnode-id="2986" instrument_node="">
</span><div class="directory-entry" data-dcnode-id="2950"><span data-dcnode-id="2985" instrument_node="">
</span><div data-dcnode-id="2983"><img alt="" class="alignleft nwbl-author" data-dcnode-id="2984" height="150" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//nwbooklovers.org/wp-content/uploads/2014/01/Matsen-150x150.jpg&amp;raw" title="Brad Matsen" width="150"></div><span data-dcnode-id="2982" instrument_node="">
</span><h3 class="store-name" data-dcnode-id="2980"><span data-dcnode-id="2981" instrument_node="">Brad Matsen</span></h3><span data-dcnode-id="2979" instrument_node="">
</span><p data-dcnode-id="2952"><span data-dcnode-id="2978" instrument_node="">Brad Matsen is the author of </span><a data-dcnode-id="2975" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.indiebound.org/book/9780307275424"><em data-dcnode-id="2976"><span data-dcnode-id="2977" instrument_node="">Jacques Cousteau: The Sea King</span></em></a><span data-dcnode-id="2974" instrument_node="">, </span><em data-dcnode-id="2972"><span data-dcnode-id="2973" instrument_node="">Titanic’s Last Secrets</span></em><span data-dcnode-id="2971" instrument_node="">, </span><em data-dcnode-id="2967"><span data-dcnode-id="2970" instrument_node="">Descent: </span><a data-dcnode-id="2968" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.indiebound.org/book/9781400075010"><span data-dcnode-id="2969" instrument_node="">The Heroic Discovery of the Abyss</span></a></em><span data-dcnode-id="2966" instrument_node="">, and many other books about the sea and its inhabitants. He was a creative producer for the television series The Shape of Life, and his articles on marine science and the environment have appeared in </span><em data-dcnode-id="2964"><span data-dcnode-id="2965" instrument_node="">Mother Jones</span></em><span data-dcnode-id="2963" instrument_node="">, </span><em data-dcnode-id="2961"><span data-dcnode-id="2962" instrument_node="">Audubon</span></em><span data-dcnode-id="2960" instrument_node="">, and </span><em data-dcnode-id="2958"><span data-dcnode-id="2959" instrument_node="">Natural History</span></em><span data-dcnode-id="2957" instrument_node="">, among other publications. His book, with co-authors Natalie Fobes and Tom Jay, </span><em data-dcnode-id="2954"><a data-dcnode-id="2955" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.indiebound.org/book/9780882404493"><span data-dcnode-id="2956" instrument_node="">Reaching Home: Pacific Salmon, Pacific People</span></a></em><span data-dcnode-id="2953" instrument_node="">, was honored in 1995 by the independent booksellers of the Northwest. Matsen lives on Vashon Island.</span></p><span data-dcnode-id="2951" instrument_node="">
</span></div><span data-dcnode-id="2948" instrument_node="">
</span><div class="directory-entry" data-dcnode-id="2923"><span data-dcnode-id="2947" instrument_node="">
</span><div data-dcnode-id="2945"><img alt="" class="alignleft nwbl-author" data-dcnode-id="2946" height="150" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//nwbooklovers.org/wp-content/uploads/2014/01/Matthews-150x150.jpg&amp;raw" title="Kezi Matthews" width="150"></div><span data-dcnode-id="2944" instrument_node="">
</span><h3 class="store-name" data-dcnode-id="2942"><span data-dcnode-id="2943" instrument_node="">Kezi Matthews</span></h3><span data-dcnode-id="2941" instrument_node="">
