</span><div data-dcnode-id="1982"><img alt="" class="alignleft nwbl-author" data-dcnode-id="1983" height="150" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//nwbooklovers.org/wp-content/uploads/2014/01/Quammen-150x150.jpg&amp;raw" title="David Quammen" width="150"></div><span data-dcnode-id="1981" instrument_node="">
</span><h3 class="store-name" data-dcnode-id="1979"><span data-dcnode-id="1980" instrument_node="">David Quammen</span></h3><span data-dcnode-id="1978" instrument_node="">
</span><p data-dcnode-id="1936"><span data-dcnode-id="1977" instrument_node="">David Quammen is an award-winning science, nature and travel writer and author whose twelve books include </span><a data-dcnode-id="1974" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.indiebound.org/book/9780684827124"><em data-dcnode-id="1975"><span data-dcnode-id="1976" instrument_node="">The Song of the Dodo: Island Biogeography in an Age of Extinctions</span></em></a><span data-dcnode-id="1973" instrument_node=""> and </span><a data-dcnode-id="1970" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.indiebound.org/book/9780393329957"><em data-dcnode-id="1971"><span data-dcnode-id="1972" instrument_node="">The Reluctant Mr. Darwin: An Intimate Portrait of Charles Darwin and the Making of His Theory of Evolution</span></em></a><span data-dcnode-id="1969" instrument_node="">. His recent book, </span><a data-dcnode-id="1966" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.indiebound.org/book/9780393346619"><em data-dcnode-id="1967"><span data-dcnode-id="1968" instrument_node="">Spillover: Animal Infections and the Next Human Pandemic</span></em></a><span data-dcnode-id="1965" instrument_node="">, about the science, history, and human impacts of emerging diseases, was short-listed for seven national and international awards. He writes about </span><a data-dcnode-id="1962" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//nwbooklovers.org/2012/10/22/considering-spillover-david-quammen-shares-the-story-behind-his-gruesome-new-book/"><em data-dcnode-id="1963"><span data-dcnode-id="1964" instrument_node="">Spillover</span></em></a><span data-dcnode-id="1961" instrument_node=""> in an essay for </span><em data-dcnode-id="1959"><span data-dcnode-id="1960" instrument_node="">NW Book Lovers</span></em><span data-dcnode-id="1958" instrument_node="">. Quammen has been honored with an Academy Award from the American Academy of Arts and Letters and is a three-time recipient of the National Magazine Award. Quammen’s articles have appeared in </span><em data-dcnode-id="1956"><span data-dcnode-id="1957" instrument_node="">National Geographic</span></em><span data-dcnode-id="1955" instrument_node="">, </span><em data-dcnode-id="1953"><span data-dcnode-id="1954" instrument_node="">Outside</span></em><span data-dcnode-id="1952" instrument_node="">, </span><em data-dcnode-id="1950"><span data-dcnode-id="1951" instrument_node="">Harper’s</span></em><span data-dcnode-id="1949" instrument_node="">, </span><em data-dcnode-id="1947"><span data-dcnode-id="1948" instrument_node="">Rolling Stone</span></em><span data-dcnode-id="1946" instrument_node="">, and </span><em data-dcnode-id="1944"><span data-dcnode-id="1945" instrument_node="">The New York Times Book Review</span></em><span data-dcnode-id="1943" instrument_node="">. He wrote a column, called Natural Acts, for </span><em data-dcnode-id="1941"><span data-dcnode-id="1942" instrument_node="">Outside</span></em><span data-dcnode-id="1940" instrument_node=""> magazine for fifteen years. His</span><a data-dcnode-id="1938" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.indiebound.org/book/9780393333602"><span data-dcnode-id="1939" instrument_node=""> book by the same name</span></a><span data-dcnode-id="1937" instrument_node=""> was honored in 1986 by the independent booksellers of the Northwest. Quammen lives in Bozeman, Montana.</span></p><span data-dcnode-id="1935" instrument_node="">
</span></div><span data-dcnode-id="1932" instrument_node="">

</span><div data-dcnode-id="1929"><img alt="" class="alignleft nwbl-author" data-dcnode-id="1930" height="150" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//nwbooklovers.org/wp-content/uploads/2014/01/Raban-150x150.jpg&amp;raw" title="Jonathan Raban" width="150"></div><span data-dcnode-id="1928" instrument_node="">
</span><h3 class="store-name" data-dcnode-id="1926"><span data-dcnode-id="1927" instrument_node="">Jonathan Raban</span></h3><span data-dcnode-id="1925" instrument_node="">
</span><a data-dcnode-id="1923" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.jonathanraban.com/"><span data-dcnode-id="1924" instrument_node="">www.jonathanraban.com</span></a><span data-dcnode-id="1922" instrument_node="">
</span><p data-dcnode-id="1900"><span data-dcnode-id="1921" instrument_node="">Jonathan Raban is a British-born travel writer and novelist who has has received numerous awards including the National Book Critics Circle Award, the Heinemann Award for Literature, the Thomas Cook Award, the PEN West Creative Nonfiction Award and a 1997 PNBA Award for </span><em data-dcnode-id="1917"><a data-dcnode-id="1919" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.indiebound.org/book/9780679759065"><span data-dcnode-id="1920" instrument_node="">Bad Land: An American Romance</span></a><span data-dcnode-id="1918" instrument_node="">. </span></em><span data-dcnode-id="1916" instrument_node="">His books </span><em data-dcnode-id="1914"><span data-dcnode-id="1915" instrument_node="">Bad Land</span></em><em data-dcnode-id="1912"><span data-dcnode-id="1913" instrument_node="">, </span></em><a data-dcnode-id="1909" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.indiebound.org/book/9780679776147"><em data-dcnode-id="1910"><span data-dcnode-id="1911" instrument_node="">Passage to Juneau: A Sea and Its Meanings</span></em></a><span data-dcnode-id="1908" instrument_node=""> and </span><a data-dcnode-id="1905" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.indiebound.org/book/9780375709050"><em data-dcnode-id="1906"><span data-dcnode-id="1907" instrument_node="">Waxwings</span></em></a><span data-dcnode-id="1904" instrument_node=""> form “a loose trilogy” about the Pacific Northwest. Raban is “curious, funniest when he’s miserable, and quick to put himself in uncomfortable situations, to be at a loss, to see what happens” says </span><em data-dcnode-id="1902"><span data-dcnode-id="1903" instrument_node="">The Stranger</span></em><span data-dcnode-id="1901" instrument_node=""> in a 2006 profile. Raban has lived in Seattle since 1990.</span></p><span data-dcnode-id="1899" instrument_node="">
</span></div><span data-dcnode-id="1896" instrument_node="">
</span><div class="directory-entry" data-dcnode-id="1878"><span data-dcnode-id="1895" instrument_node="">
</span><div data-dcnode-id="1893"><img alt="" class="alignleft nwbl-author" data-dcnode-id="1894" height="150" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//nwbooklovers.org/wp-content/uploads/2010/05/rakha-150x150.jpg&amp;raw" title="Naseem Rakha" width="150"></div><span data-dcnode-id="1892" instrument_node="">
</span><h3 class="store-name" data-dcnode-id="1890"><span data-dcnode-id="1891" instrument_node="">Naseem Rakha</span></h3><span data-dcnode-id="1889" instrument_node="">
</span><a data-dcnode-id="1887" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.naseemrakha.com/"><span data-dcnode-id="1888" instrument_node="">www.naseemrakha.com</span></a><span data-dcnode-id="1886" instrument_node="">
</span><p data-dcnode-id="1880"><span data-dcnode-id="1885" instrument_node="">Naseem Rakha is a geologist turned journalist turned novelist whose debut novel, </span><a data-dcnode-id="1882" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.indiebound.org/book/9780767931748/naseem-rakha/crying-tree"><em data-dcnode-id="1883"><span data-dcnode-id="1884" instrument_node="">The Crying Tree</span></em></a><span data-dcnode-id="1881" instrument_node="">, won a PNBA Award in 2010. Her stories have been heard on NPR’s All Things Considered, Morning Edition, Marketplace Radio and Living on Earth. She lives in Oregon with her husband, son and many animals.</span></p><span data-dcnode-id="1879" instrument_node="">
</span></div><span data-dcnode-id="1876" instrument_node="">
</span><div class="directory-entry" data-dcnode-id="1859"><span data-dcnode-id="1875" instrument_node="">
</span><div data-dcnode-id="1873"><img alt="" class="alignleft nwbl-author" data-dcnode-id="1874" height="150" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//nwbooklovers.org/wp-content/uploads/2014/01/Rand-150x150.jpg&amp;raw" title="Ted Rand" width="150"></div><span data-dcnode-id="1872" instrument_node="">
</span><h3 class="store-name" data-dcnode-id="1870"><span data-dcnode-id="1871" instrument_node="">Ted Rand</span></h3><span data-dcnode-id="1869" instrument_node="">
</span><p data-dcnode-id="1861"><span data-dcnode-id="1868" instrument_node="">Ted Rand was “a prolific and energetic artist who made his mark in portraiture, teaching and advertising art before entering the children’s book field at an age when most people are collecting Social Security,” says the </span><em data-dcnode-id="1866"><span data-dcnode-id="1867" instrument_node="">Seattle Post-Intelligencer</span></em><span data-dcnode-id="1865" instrument_node="">. Rand illustrated more than 78 children’s books with authors such as Bill Martin Jr., Eve Bunting, Jean Craighead George, and his wife, Gloria Rand. The Rands picture books include the </span><a data-dcnode-id="1863" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.indiebound.org/book/9780805018479"><span data-dcnode-id="1864" instrument_node="">Salty Dog</span></a><span data-dcnode-id="1862" instrument_node=""> series. Rand also co-founded the long-running Graphic Studios and taught illustration at the University of Washington in Seattle before he died in 2005 at the age of 89. “Seattle lost its dean of children’s book illustrators — one of the gentlemen of the industry,” a bookseller told the Seattle P-I after he died. Rand was honored by PNBA with a General Achievement Award in 1989.</span></p><span data-dcnode-id="1860" instrument_node="">
</span></div><span data-dcnode-id="1857" instrument_node="">
</span><div class="directory-entry" data-dcnode-id="1836"><span data-dcnode-id="1856" instrument_node="">
</span><div data-dcnode-id="1854"><img alt="" class="alignleft nwbl-author" data-dcnode-id="1855" height="150" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//nwbooklovers.org/wp-content/uploads/2011/02/d.o.relin_-150x150.jpg&amp;raw" title="David Oliver Relin" width="150"></div><span data-dcnode-id="1853" instrument_node="">
</span><h3 class="store-name" data-dcnode-id="1851"><span data-dcnode-id="1852" instrument_node="">David Oliver Relin</span></h3><span data-dcnode-id="1850" instrument_node="">
</span><a data-dcnode-id="1848" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.davidoliverrelin.com/"><span data-dcnode-id="1849" instrument_node="">www.davidoliverrelin.com</span></a><span data-dcnode-id="1847" instrument_node="">
</span><p data-dcnode-id="1838"><span data-dcnode-id="1846" instrument_node="">David Oliver Relin was the co-author (with Greg Mortenson) of the #1 New York Times bestseller </span><a data-dcnode-id="1843" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.indiebound.org/book/9780143038252/Greg-Mortenson/Three-Cups-Tea"><em data-dcnode-id="1844"><span data-dcnode-id="1845" instrument_node="">Three Cups of Tea: One Man’s Mission to Promote Peace … One School at a Time</span></em></a><span data-dcnode-id="1842" instrument_node="">, for which he won 2007 award from the independent booksellers of the Northwest. Relin was a graduate of Vassar and was awarded the prestigious Teaching/Writing Fellowship at the Iowa Writer’s Workshop. For two decades, Relin focused on reporting about social issues and their effect on children, both in the United States, and around the world. His interviews with child soldiers (including a profile of teenager Ishmael Beah, who would later write the bestseller </span><em data-dcnode-id="1840"><span data-dcnode-id="1841" instrument_node="">A Long Way Gone</span></em><span data-dcnode-id="1839" instrument_node="">) have been included in Amnesty International reports. His investigation into the way the INS abused children in its custody contributed to the reorganization of that agency. He died in 2012.</span></p><span data-dcnode-id="1837" instrument_node="">
</span></div><span data-dcnode-id="1834" instrument_node="">
</span><div class="directory-entry" data-dcnode-id="1790"><span data-dcnode-id="1833" instrument_node="">
</span><div data-dcnode-id="1831"><img alt="" class="alignleft nwbl-author" data-dcnode-id="1832" height="150" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//nwbooklovers.org/wp-content/uploads/2011/02/SRinella-150x150.jpg&amp;raw" title="Steven Rinella" width="150"></div><span data-dcnode-id="1830" instrument_node="">
</span><h3 class="store-name" data-dcnode-id="1828"><span data-dcnode-id="1829" instrument_node="">Steven Rinella</span></h3><span data-dcnode-id="1827" instrument_node="">
</span><a data-dcnode-id="1825" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.stevenrinella.com/"><span data-dcnode-id="1826" instrument_node="">www.stevenrinella.com</span></a><span data-dcnode-id="1824" instrument_node="">
</span><p data-dcnode-id="1792"><span data-dcnode-id="1823" instrument_node="">Steven Rinella is the host of the Travel Channel’s The Wild Within and the author of </span><em data-dcnode-id="1820"><a data-dcnode-id="1821" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.indiebound.org/book/9780385529822"><span data-dcnode-id="1822" instrument_node="">Meat Eater: Adventures from the Life of an American Hunter</span></a></em><span data-dcnode-id="1819" instrument_node="">, </span><a data-dcnode-id="1816" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.indiebound.org/book/9781401352370"><em data-dcnode-id="1817"><span data-dcnode-id="1818" instrument_node="">The Scavenger’s Guide to Haute Cuisine</span></em></a><span data-dcnode-id="1815" instrument_node=""> and </span><a data-dcnode-id="1812" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.indiebound.org/book/9780385521697/Steven-Rinella/American-Buffalo"><em data-dcnode-id="1813"><span data-dcnode-id="1814" instrument_node="">American Buffalo: In Search of a Lost Icon</span></em></a><span data-dcnode-id="1811" instrument_node="">, which was honored by the independent booksellers of the Northwest in 2009. He has written for </span><em data-dcnode-id="1809"><span data-dcnode-id="1810" instrument_node="">Outside</span></em><span data-dcnode-id="1808" instrument_node="">, </span><em data-dcnode-id="1806"><span data-dcnode-id="1807" instrument_node="">New York Times</span></em><span data-dcnode-id="1805" instrument_node="">, </span><em data-dcnode-id="1803"><span data-dcnode-id="1804" instrument_node="">The New Yorker</span></em><span data-dcnode-id="1802" instrument_node="">, Salon.com, O</span><em data-dcnode-id="1800"><span data-dcnode-id="1801" instrument_node=""> the Oprah Magazine</span></em><span data-dcnode-id="1799" instrument_node="">, and the anthologies </span><em data-dcnode-id="1797"><span data-dcnode-id="1798" instrument_node="">Best American Travel Writing</span></em><span data-dcnode-id="1796" instrument_node=""> and </span><em data-dcnode-id="1794"><span data-dcnode-id="1795" instrument_node="">Best Food Writing</span></em><span data-dcnode-id="1793" instrument_node="">. A native of Twin Lake, Michigan, he has an apartment in Brooklyn, New York, and a moldy fishing and hunting shack on an island in Alaska.</span></p><span data-dcnode-id="1791" instrument_node="">
</span></div><span data-dcnode-id="1788" instrument_node="">
</span><div class="directory-entry" data-dcnode-id="1767"><span data-dcnode-id="1787" instrument_node="">
</span><div data-dcnode-id="1785"><img alt="" class="alignleft nwbl-author" data-dcnode-id="1786" height="150" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//nwbooklovers.org/wp-content/uploads/2012/03/Roe-150x150.jpg&amp;raw" title="JoAnn Roe" width="150"></div><span data-dcnode-id="1784" instrument_node="">
</span><h3 class="store-name" data-dcnode-id="1782"><span data-dcnode-id="1783" instrument_node="">JoAnn Roe</span></h3><span data-dcnode-id="1781" instrument_node="">
</span><a data-dcnode-id="1779" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.joannroe.com/"><span data-dcnode-id="1780" instrument_node="">www.joannroe.com</span></a><span data-dcnode-id="1778" instrument_node="">
</span><p data-dcnode-id="1769"><span data-dcnode-id="1777" instrument_node="">A lifetime journalist beginning as a UCLA magazine staff member, JoAnn Roe writes features for magazines and newspapers worldwide on topics that range from western cowboys to city profiles. Roe has published 16 books, most recently </span><a data-dcnode-id="1774" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.indiebound.org/book/9780870045042"><em data-dcnode-id="1775"><span data-dcnode-id="1776" instrument_node="">The San Juan Islands: Into the 21st Century</span></em></a><span data-dcnode-id="1773" instrument_node=""> from Caxton Press. She has been awarded the Governor’s Award, two Mayor’s awards, the Japan-America Society Award and a 1981 PNBA award for </span><em data-dcnode-id="1771"><span data-dcnode-id="1772" instrument_node="">Frank Matsura, Frontier Photographer</span></em><span data-dcnode-id="1770" instrument_node="">.</span></p><span data-dcnode-id="1768" instrument_node="">
</span></div><span data-dcnode-id="1765" instrument_node="">
</span><div class="directory-entry" data-dcnode-id="1735"><span data-dcnode-id="1764" instrument_node="">
</span><div data-dcnode-id="1762"><img alt="" class="alignleft nwbl-author" data-dcnode-id="1763" height="150" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//nwbooklovers.org/wp-content/uploads/2014/01/Rose-150x150.jpg&amp;raw" title="Joanna Rose" width="150"></div><span data-dcnode-id="1761" instrument_node="">
</span><h3 class="store-name" data-dcnode-id="1759"><span data-dcnode-id="1760" instrument_node="">Joanna Rose</span></h3><span data-dcnode-id="1758" instrument_node="">
</span><p data-dcnode-id="1737"><span data-dcnode-id="1757" instrument_node="">Joanna Rose is the author of the award-winning novel </span><a data-dcnode-id="1754" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.indiebound.org/book/9780684847412"><em data-dcnode-id="1755"><span data-dcnode-id="1756" instrument_node="">Little Miss Strange</span></em></a><span data-dcnode-id="1753" instrument_node="">, which was honored by the independent booksellers of the Pacific Northwest in 1998. Her short story </span><em data-dcnode-id="1751"><span data-dcnode-id="1752" instrument_node="">If Your Hands Would be Like That</span></em><span data-dcnode-id="1750" instrument_node=""> was recently published in </span><em data-dcnode-id="1748"><span data-dcnode-id="1749" instrument_node="">Artisan Journal,</span></em><span data-dcnode-id="1747" instrument_node=""> and her essay </span><em data-dcnode-id="1745"><span data-dcnode-id="1746" instrument_node="">Paisley Afternoon</span></em><span data-dcnode-id="1744" instrument_node=""> is in the Oregon anthology </span><em data-dcnode-id="1742"><span data-dcnode-id="1743" instrument_node="">Citadel of the Spirit</span></em><span data-dcnode-id="1741" instrument_node="">. She is also known to readers of </span><em data-dcnode-id="1739"><span data-dcnode-id="1740" instrument_node="">The Oregonian</span></em><span data-dcnode-id="1738" instrument_node=""> as a regular reviewer on the books page. She and her teaching partner Stevan Allred host the regular Pinewood Table prose critique group, and she teaches in schools in Oregon and Washington.</span></p><span data-dcnode-id="1736" instrument_node="">
</span></div><span data-dcnode-id="1733" instrument_node="">
</span><div class="directory-entry" data-dcnode-id="1707"><span data-dcnode-id="1732" instrument_node="">
</span><div data-dcnode-id="1730"><img alt="" class="alignleft nwbl-author" data-dcnode-id="1731" height="150" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//nwbooklovers.org/wp-content/uploads/2019/08/Roxanna-Rose.jpeg&amp;raw" title="Roxanna Rose" width="150"></div><span data-dcnode-id="1729" instrument_node="">
</span><h3 class="store-name" data-dcnode-id="1727"><span data-dcnode-id="1728" instrument_node="">Roxanna Rose</span></h3><span data-dcnode-id="1726" instrument_node="">
</span><a data-dcnode-id="1724" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//roxannarose.com/"><span data-dcnode-id="1725" instrument_node="">https://roxannarose.com</span></a><span data-dcnode-id="1723" instrument_node="">
</span><p data-dcnode-id="1709"><span data-dcnode-id="1722" instrument_node="">Roxanna Rose lives with her family and a menagerie of animals. Fascinated by myths and legends from cultures around the world, she uses them as a base for Young Adult paranormal and fantasy novels: </span><strong data-dcnode-id="1719"><em data-dcnode-id="1720"><span data-dcnode-id="1721" instrument_node="">Desires</span></em></strong><span data-dcnode-id="1718" instrument_node="">, </span><em data-dcnode-id="1715"><strong data-dcnode-id="1716"><span data-dcnode-id="1717" instrument_node="">Malevolence</span></strong></em><span data-dcnode-id="1714" instrument_node="">, and </span><em data-dcnode-id="1711"><strong data-dcnode-id="1712"><span data-dcnode-id="1713" instrument_node="">Sacrifices</span></strong></em><span data-dcnode-id="1710" instrument_node="">. Her Legacy Novel series is based on Celtic legends. Roxanna divides most of her time between her writing and her career as a veterinary technician and rehabilitating native wildlife.</span></p><span data-dcnode-id="1708" instrument_node="">
</span></div><span data-dcnode-id="1705" instrument_node="">
</span><div class="directory-entry" data-dcnode-id="1669"><span data-dcnode-id="1704" instrument_node="">
</span><div data-dcnode-id="1702"><img alt="" class="alignleft nwbl-author" data-dcnode-id="1703" height="150" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//nwbooklovers.org/wp-content/uploads/2011/02/Ruff-150x150.jpg&amp;raw" title="Matt Ruff" width="150"></div><span data-dcnode-id="1701" instrument_node="">
</span><h3 class="store-name" data-dcnode-id="1699"><span data-dcnode-id="1700" instrument_node="">Matt Ruff</span></h3><span data-dcnode-id="1698" instrument_node="">
</span><p data-dcnode-id="1671"><span data-dcnode-id="1697" instrument_node="">Seattle author Matt Ruff’s first novel was bought by a New York publisher when he was still studying under novelist Alison Lurie at Cornell University. </span><a data-dcnode-id="1694" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.indiebound.org/book/9780802135353"><em data-dcnode-id="1695"><span data-dcnode-id="1696" instrument_node="">Fool on the Hill</span></em></a><span data-dcnode-id="1693" instrument_node=""> was followed by </span><em data-dcnode-id="1689"><a data-dcnode-id="1691" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.indiebound.org/book/9780802141552"><span data-dcnode-id="1692" instrument_node="">Sewer, Gas &amp; Electric: The Public Works Trilogy</span></a><span data-dcnode-id="1690" instrument_node=""> </span></em><span data-dcnode-id="1688" instrument_node="">and </span><a data-dcnode-id="1685" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.indiebound.org/book/9780060954857"><em data-dcnode-id="1686"><span data-dcnode-id="1687" instrument_node="">Set This House in Order: A Romance of Souls</span></em></a><span data-dcnode-id="1684" instrument_node="">, which won an award from the independent booksellers of the Northwest in 2004. His received his second award from PNBA for </span><a data-dcnode-id="1681" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.indiebound.org/book/9780061240423"><em data-dcnode-id="1682"><span data-dcnode-id="1683" instrument_node="">Bad Monkeys</span></em></a><span data-dcnode-id="1680" instrument_node=""> in 2008 (Neal Stephenson called it “Fast. Wicked. Scarily clever and equally fun for those who like thrillers and those who don’t.”) Ruff talked with </span><a data-dcnode-id="1677" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//nwbooklovers.org/2012/02/29/matt-ruff-and-the-rules-of-mirage-world-an-interview-by-lindsey-mcguirk-of-village-books/"><em data-dcnode-id="1678"><span data-dcnode-id="1679" instrument_node="">NW Book Lovers</span></em></a><span data-dcnode-id="1676" instrument_node=""> about his recent novel, </span><a data-dcnode-id="1673" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.indiebound.org/book/9780061976230"><em data-dcnode-id="1674"><span data-dcnode-id="1675" instrument_node="">The Mirage</span></em></a><span data-dcnode-id="1672" instrument_node="">. He lives with his wife, Lisa, a rare-book dealer, in Seattle.</span></p><span data-dcnode-id="1670" instrument_node="">
</span></div><span data-dcnode-id="1667" instrument_node="">
</span><div class="directory-entry" data-dcnode-id="1641"><span data-dcnode-id="1666" instrument_node="">
</span><div data-dcnode-id="1664"><img alt="" class="alignleft nwbl-author" data-dcnode-id="1665" height="150" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//nwbooklovers.org/wp-content/uploads/2010/05/cynthia-150x150.jpg&amp;raw" title="Cynthia Rylant" width="150"></div><span data-dcnode-id="1663" instrument_node="">
</span><h3 class="store-name" data-dcnode-id="1661"><span data-dcnode-id="1662" instrument_node="">Cynthia Rylant</span></h3><span data-dcnode-id="1660" instrument_node="">
</span><a data-dcnode-id="1658" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.kidsreads.com/authors/au-rylant-cynthia.asp"><span data-dcnode-id="1659" instrument_node="">www.kidsreads.com/authors/au-rylant-cynthia.asp</span></a><span data-dcnode-id="1657" instrument_node="">
</span><p data-dcnode-id="1643"><span data-dcnode-id="1656" instrument_node="">Cynthia Rylant is the author of more than a hundred books for children, including the 2010 PNBA Award-winning </span><a data-dcnode-id="1653" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.indiebound.org/book/9780810983212/Cynthia-Rylant/All-Day"><em data-dcnode-id="1654"><span data-dcnode-id="1655" instrument_node="">All In a Day</span></em></a><span data-dcnode-id="1652" instrument_node="">. She won the Newbery Medal for </span><a data-dcnode-id="1649" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.indiebound.org/book/9780439613835"><em data-dcnode-id="1650"><span data-dcnode-id="1651" instrument_node="">Missing May</span></em></a><span data-dcnode-id="1648" instrument_node=""> and the Newbery Honor for </span><a data-dcnode-id="1645" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.indiebound.org/book/9780689840876"><em data-dcnode-id="1646"><span data-dcnode-id="1647" instrument_node="">A Fine White Dust</span></em></a><span data-dcnode-id="1644" instrument_node="">. If you didn’t immediately recognize Rylant’s name, you will probably recognize some of her characters: Poppleton, Henry and Mudge, and Mr. Putter and Tabby, for instance. Rylant lives in Lake Oswego, Oregon.</span></p><span data-dcnode-id="1642" instrument_node="">
</span></div><span data-dcnode-id="1639" instrument_node="">
</span><div class="directory-entry" data-dcnode-id="1601"><span data-dcnode-id="1638" instrument_node="">
</span><div data-dcnode-id="1636"><img alt="" class="alignleft nwbl-author" data-dcnode-id="1637" height="150" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//nwbooklovers.org/wp-content/uploads/2014/01/Sacco-150x150.jpg&amp;raw" title="Joe Sacco" width="150"></div><span data-dcnode-id="1635" instrument_node="">
</span><h3 class="store-name" data-dcnode-id="1633"><span data-dcnode-id="1634" instrument_node="">Joe Sacco</span></h3><span data-dcnode-id="1632" instrument_node="">
</span><p data-dcnode-id="1603"><span data-dcnode-id="1631" instrument_node="">Though </span><em data-dcnode-id="1629"><span data-dcnode-id="1630" instrument_node="">The Economist</span></em><span data-dcnode-id="1628" instrument_node=""> called Joe Sacco “the heir to R. Crumb and Art Spiegelman,” he writes in an essay for </span><a data-dcnode-id="1625" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//nwbooklovers.org/2014/01/24/candid-thoughts/"><em data-dcnode-id="1626"><span data-dcnode-id="1627" instrument_node="">NW Book Lovers</span></em></a><span data-dcnode-id="1624" instrument_node=""> that he has “never quite accommodated myself gracefully to the mainstream acceptance of what I do.” His acclaimed books include </span><a data-dcnode-id="1621" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.indiebound.org/book/9781560974321"><em data-dcnode-id="1622"><span data-dcnode-id="1623" instrument_node="">Palestine</span></em></a><span data-dcnode-id="1620" instrument_node="">; </span><a data-dcnode-id="1617" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.indiebound.org/book/9781560974703"><em data-dcnode-id="1618"><span data-dcnode-id="1619" instrument_node="">Safe Area Gorazde</span></em></a><span data-dcnode-id="1616" instrument_node="">; </span><a data-dcnode-id="1613" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.indiebound.org/book/9780805092776"><em data-dcnode-id="1614"><span data-dcnode-id="1615" instrument_node="">Footnotes in Gaza</span></em></a><span data-dcnode-id="1612" instrument_node="">; a best-selling collaboration with Chris Hedges, </span><a data-dcnode-id="1609" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.indiebound.org/book/9781568586434"><em data-dcnode-id="1610"><span data-dcnode-id="1611" instrument_node="">Days of Destruction, Days of Revolt</span></em></a><span data-dcnode-id="1608" instrument_node="">; and </span><a data-dcnode-id="1605" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.indiebound.org/book/9780393088809"><em data-dcnode-id="1606"><span data-dcnode-id="1607" instrument_node="">The Great War: July 1, 1916: The First Day of the Battle of the Somme</span></em></a><span data-dcnode-id="1604" instrument_node="">, a 24-sheet foldout illustration which won a PNBA award in 2014. Reviewers have called the book “gorgeous and haunting” and “unique, devastating, indelible.”</span></p><span data-dcnode-id="1602" instrument_node="">
</span></div><span data-dcnode-id="1599" instrument_node="">
</span><div class="directory-entry" data-dcnode-id="1575"><span data-dcnode-id="1598" instrument_node="">
</span><div data-dcnode-id="1596"><img alt="" class="alignleft nwbl-author" data-dcnode-id="1597" height="150" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//nwbooklovers.org/wp-content/uploads/2014/01/Satterfield-150x150.jpg&amp;raw" title="Archie Satterfield" width="150"></div><span data-dcnode-id="1595" instrument_node="">
</span><h3 class="store-name" data-dcnode-id="1593"><span data-dcnode-id="1594" instrument_node="">Archie Satterfield</span></h3><span data-dcnode-id="1592" instrument_node="">
</span><p data-dcnode-id="1577"><span data-dcnode-id="1591" instrument_node="">When Archie Satterfield decided he wanted to write a book about canoeing on the Yukon River, he packed up his wife and four small children and headed north, says his obituary in </span><a data-dcnode-id="1588" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//seattletimes.com/html/obituaries/2016889610_satterfieldobit30m.html"><em data-dcnode-id="1589"><span data-dcnode-id="1590" instrument_node="">The Seattle Times</span></em></a><span data-dcnode-id="1587" instrument_node="">. Described as “totally fearless about taking us places” by his son, Satterfield was a journalist and author who worked for both </span><em data-dcnode-id="1585"><span data-dcnode-id="1586" instrument_node="">The Seattle Times</span></em><span data-dcnode-id="1584" instrument_node=""> and </span><em data-dcnode-id="1582"><span data-dcnode-id="1583" instrument_node="">The Seattle Post-Intelligencer</span></em><span data-dcnode-id="1581" instrument_node=""> before he retired to write full time. He wrote 40 books, many set in Alaska. They include books on the Chilkoot Pass, Klondike Park, the Yukon River and back roads in Washington. </span><em data-dcnode-id="1579"><span data-dcnode-id="1580" instrument_node="">Seattle: An Asahel Curtis Portfolio </span></em><span data-dcnode-id="1578" instrument_node="">was honored by the independent booksellers of the Northwest in 1986. He died in 2011 at the age of 78.</span></p><span data-dcnode-id="1576" instrument_node="">
</span></div><span data-dcnode-id="1573" instrument_node="">
</span><div class="directory-entry" data-dcnode-id="1544"><span data-dcnode-id="1572" instrument_node="">
</span><div data-dcnode-id="1570"><img alt="" class="alignleft nwbl-author" data-dcnode-id="1571" height="150" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//nwbooklovers.org/wp-content/uploads/2014/01/savage-150x150.jpg&amp;raw" title="Thomas Savage" width="150"></div><span data-dcnode-id="1569" instrument_node="">
</span><h3 class="store-name" data-dcnode-id="1567"><span data-dcnode-id="1568" instrument_node="">Thomas Savage</span></h3><span data-dcnode-id="1566" instrument_node="">
</span><p data-dcnode-id="1546"><span data-dcnode-id="1565" instrument_node="">Montana author Thomas Savage was born in 1915 in Salt Lake City. His literary career spans five decades and thirteen novels, most notably </span><em data-dcnode-id="1561"><a data-dcnode-id="1563" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.indiebound.org/book/9780316610902"><span data-dcnode-id="1564" instrument_node="">The Sheep Queen</span></a><span data-dcnode-id="1562" instrument_node=""> </span></em><span data-dcnode-id="1560" instrument_node="">and </span><a data-dcnode-id="1557" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.indiebound.org/book/9780316610896"><em data-dcnode-id="1558"><span data-dcnode-id="1559" instrument_node="">The Power of the Dog</span></em></a><span data-dcnode-id="1556" instrument_node="">, named “the year’s best novel” by the </span><em data-dcnode-id="1554"><span data-dcnode-id="1555" instrument_node="">San Francisco Chronicle</span></em><span data-dcnode-id="1553" instrument_node="">. </span><em data-dcnode-id="1551"><span data-dcnode-id="1552" instrument_node="">The Corner of Rife and Pacific</span></em><span data-dcnode-id="1550" instrument_node=""> was nominated for the PEN/Faulkner Award, selected by </span><em data-dcnode-id="1548"><span data-dcnode-id="1549" instrument_node="">Publishers Weekly</span></em><span data-dcnode-id="1547" instrument_node=""> as one of the fifteen best novels of 1988 and was honored by the independent booksellers of the Northwest. Savage was the recipient of a Guggenheim Fellowship in 1980.</span></p><span data-dcnode-id="1545" instrument_node="">
</span></div><span data-dcnode-id="1542" instrument_node="">
</span><div class="directory-entry" data-dcnode-id="1525"><span data-dcnode-id="1541" instrument_node="">
</span><div data-dcnode-id="1539"><img alt="" class="alignleft nwbl-author" data-dcnode-id="1540" height="150" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//nwbooklovers.org/wp-content/uploads/2014/01/Scherer-150x150.jpg&amp;raw" title="Migael Scherer" width="150"></div><span data-dcnode-id="1538" instrument_node="">
</span><h3 class="store-name" data-dcnode-id="1536"><span data-dcnode-id="1537" instrument_node="">Migael Scherer</span></h3><span data-dcnode-id="1535" instrument_node="">
</span><a data-dcnode-id="1533" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.migaelscherer.com/"><span data-dcnode-id="1534" instrument_node="">www.migaelscherer.com</span></a><span data-dcnode-id="1532" instrument_node="">
</span><p data-dcnode-id="1527"><span data-dcnode-id="1531" instrument_node="">Migael Scherer is the author of four books and numerous essays that range from the literary to the practical. Her first book, </span><em data-dcnode-id="1529"><span data-dcnode-id="1530" instrument_node="">Still Loved by the Sun: A Rape Survivor’s Journal</span></em><span data-dcnode-id="1528" instrument_node="">, won a PNBA Award and received a 1993 PEN/Martha Albrand Special Citation for distinguished nonfiction. The PEN judges described it as “one of the first of its kind … With the skill of a novelist Scherer has written a poignant exploration of one woman’s evolving reactions to being victimized by random violence.” Scherer served for more than a decade as a lecturer and program consultant to the Dart Center for Journalism and Trauma at the University of Washington in Seattle, teaching journalists how to cover traumatic events. An experienced mariner, Scherer wrote the first comprehensive cruising guide to the Puget Sound and the San Juan Islands. Scherer and her husband lived aboard a sailboat for more than thirty-five years, cruising the Pacific Northwest, Southeast Alaska and the 1,500-mile Inside Passage.</span></p><span data-dcnode-id="1526" instrument_node="">
</span></div><span data-dcnode-id="1523" instrument_node="">
</span><div class="directory-entry" data-dcnode-id="1508"><span data-dcnode-id="1522" instrument_node="">
</span><div data-dcnode-id="1520"><img alt="" class="alignleft nwbl-author" data-dcnode-id="1521" height="150" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//nwbooklovers.org/wp-content/uploads/2014/01/Schlick-150x150.jpg&amp;raw" title="Mary Dodds Schlick" width="150"></div><span data-dcnode-id="1519" instrument_node="">
</span><h3 class="store-name" data-dcnode-id="1517"><span data-dcnode-id="1518" instrument_node="">Mary Dodds Schlick</span></h3><span data-dcnode-id="1516" instrument_node="">
</span><p data-dcnode-id="1510"><span data-dcnode-id="1515" instrument_node="">Mary Dodds Schlick is author of </span><a data-dcnode-id="1512" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.indiebound.org/book/9780295972893"><em data-dcnode-id="1513"><span data-dcnode-id="1514" instrument_node="">Columbia River Basketry: Gift of the Ancestors, Gift of the Earth</span></em></a><span data-dcnode-id="1511" instrument_node="">, which is based on a study of the distinctive baskets of the region and was honored by the independent booksellers of the Northwest in 1995. Schlick, who serves as adjunct curator at the Maryhill Museum of Art in Goldendale, Washington, has been an important contributor to preserving the cultural heritage of Native Americans in the Pacific Northwest and is one of the nation’s authorities on native arts of the interior Northwest. She lives in Mount Hood.</span></p><span data-dcnode-id="1509" instrument_node="">
</span></div><span data-dcnode-id="1506" instrument_node="">
</span><div class="directory-entry" data-dcnode-id="1488"><span data-dcnode-id="1505" instrument_node="">
</span><div data-dcnode-id="1503"><img alt="" class="alignleft nwbl-author" data-dcnode-id="1504" height="150" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//nwbooklovers.org/wp-content/uploads/2014/01/schwantes-150x150.jpg&amp;raw" title="Carlos A. Schwantes" width="150"></div><span data-dcnode-id="1502" instrument_node="">
</span><h3 class="store-name" data-dcnode-id="1500"><span data-dcnode-id="1501" instrument_node="">Carlos A. Schwantes</span></h3><span data-dcnode-id="1499" instrument_node="">
</span><p data-dcnode-id="1490"><span data-dcnode-id="1498" instrument_node="">Carlos Schwantes is the St. Louis Mercantile Library Professor of Transportation and the West. He holds a doctorate in American History from the University of Michigan. In total he has authored or edited fifteen books about various facets of the American West and transportation, including </span><a data-dcnode-id="1495" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.indiebound.org/book/9780803292284"><em data-dcnode-id="1496"><span data-dcnode-id="1497" instrument_node="">The Pacific Northwest: An Interpretive History</span></em></a><span data-dcnode-id="1494" instrument_node=""> and </span><em data-dcnode-id="1492"><span data-dcnode-id="1493" instrument_node="">Railroad Signatures Across the Pacific Northwest</span></em><span data-dcnode-id="1491" instrument_node="">, honored by the independent booksellers of the Northwest in 1994. He is an avid landscape photographer and teaches at the University of Missouri-St. Louis.</span></p><span data-dcnode-id="1489" instrument_node="">
</span></div><span data-dcnode-id="1486" instrument_node="">
</span><div class="directory-entry" data-dcnode-id="1459"><span data-dcnode-id="1485" instrument_node="">
</span><h3 class="store-name" data-dcnode-id="1483"><span data-dcnode-id="1484" instrument_node="">Barbara Scot</span></h3><span data-dcnode-id="1482" instrument_node="">
</span><p data-dcnode-id="1461"><span data-dcnode-id="1481" instrument_node="">Barbara Scot, a public school teacher for twenty-five years, began to write after a tour with the Peace Corps in Nepal in 1991. She has published five books: </span><a data-dcnode-id="1478" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.indiebound.org/book/9780870717406"><em data-dcnode-id="1479"><span data-dcnode-id="1480" instrument_node="">The Nude Beach Notebook</span></em></a><span data-dcnode-id="1477" instrument_node="">; </span><a data-dcnode-id="1474" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.indiebound.org/book/9780870712975"><em data-dcnode-id="1475"><span data-dcnode-id="1476" instrument_node="">Child of Steens Mountain</span></em></a><span data-dcnode-id="1473" instrument_node=""> (with Eileen McVicker); </span><a data-dcnode-id="1470" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.indiebound.org/book/9780877457381"><em data-dcnode-id="1471"><span data-dcnode-id="1472" instrument_node="">Prairie Reunion</span></em></a><span data-dcnode-id="1469" instrument_node=""> (a New York Times Notable Book); </span><em data-dcnode-id="1467"><span data-dcnode-id="1468" instrument_node="">The Stations of Still Creek</span></em><span data-dcnode-id="1466" instrument_node="">; and </span><a data-dcnode-id="1463" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.indiebound.org/book/9780934971362"><em data-dcnode-id="1464"><span data-dcnode-id="1465" instrument_node="">The Violet Shyness of Their Eyes: Notes from Nepal</span></em></a><span data-dcnode-id="1462" instrument_node="">, which won a PNBA Award in 1994. An avid fan of the outdoors, she has spent much of her life climbing mountains, backpacking, running, and bird watching. She and her husband live in a houseboat on the Willamette River.</span></p><span data-dcnode-id="1460" instrument_node="">
</span></div><span data-dcnode-id="1457" instrument_node="">
</span><div class="directory-entry" data-dcnode-id="1434"><span data-dcnode-id="1456" instrument_node="">
</span><div data-dcnode-id="1454"><img alt="" class="alignleft nwbl-author" data-dcnode-id="1455" height="150" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//nwbooklovers.org/wp-content/uploads/2014/01/Sexson-150x150.jpg&amp;raw" title="Lynda Sexson" width="150"></div><span data-dcnode-id="1453" instrument_node="">
</span><h3 class="store-name" data-dcnode-id="1451"><span data-dcnode-id="1452" instrument_node="">Lynda Sexson</span></h3><span data-dcnode-id="1450" instrument_node="">
</span><p data-dcnode-id="1436"><span data-dcnode-id="1449" instrument_node="">Lynda Sexson is Professor of Humanities at Montana State University in Bozeman and the co-director of Corona Productions, a series of projects and events promoting interdisciplinary events and reflections. She is the author of </span><a data-dcnode-id="1446" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.indiebound.org/book/9780814207192"><em data-dcnode-id="1447"><span data-dcnode-id="1448" instrument_node="">Hamlet’s Planets</span></em></a><span data-dcnode-id="1445" instrument_node="">, </span><a data-dcnode-id="1441" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.indiebound.org/book/9780813914169"><em data-dcnode-id="1443"><span data-dcnode-id="1444" instrument_node="">Ordinarily Sacred</span></em><span data-dcnode-id="1442" instrument_node=""> </span></a><span data-dcnode-id="1440" instrument_node="">and </span><em data-dcnode-id="1438"><span data-dcnode-id="1439" instrument_node="">Margaret of the Imperfections</span></em><span data-dcnode-id="1437" instrument_node="">, which was honored by the independent booksellers of the Northwest in 1989. Among her awards, honors and affiliations, Sexson received Humanities Montana grants for the planning and production of My Book and Heart Shall Never Part, a film she wrote and directed in 2008.</span></p><span data-dcnode-id="1435" instrument_node="">
</span></div><span data-dcnode-id="1432" instrument_node="">
</span><div class="directory-entry" data-dcnode-id="1410"><span data-dcnode-id="1431" instrument_node="">
</span><div data-dcnode-id="1429"><img alt="" class="alignleft nwbl-author" data-dcnode-id="1430" height="150" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//nwbooklovers.org/wp-content/uploads/2020/12/Seth-Sjostrom.png&amp;raw" title="Seth Sjostrom" width="150"></div><span data-dcnode-id="1428" instrument_node="">
</span><h3 class="store-name" data-dcnode-id="1426"><span data-dcnode-id="1427" instrument_node="">Seth Sjostrom</span></h3><span data-dcnode-id="1425" instrument_node="">
</span><a data-dcnode-id="1423" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//sethsjostrom.com/"><span data-dcnode-id="1424" instrument_node="">https://sethsjostrom.com</span></a><span data-dcnode-id="1422" instrument_node="">
</span><p data-dcnode-id="1412"><span data-dcnode-id="1421" instrument_node="">Seth Sjostrom began writing thrillers,&nbsp;</span><strong data-dcnode-id="1418"><em class="x-el x-el-span c1-20 c1-21 c1-91 c1-2g c1-2d c1-92 c1-93 c1-b" data-dcnode-id="1419"><span data-dcnode-id="1420" instrument_node="">Blood in the Snow</span></em></strong><span data-dcnode-id="1417" instrument_node="">&nbsp;being his first completed and published novel. He was surprised when his first holiday romance sprang from his mind and keyboard tapping fingertips, releasing&nbsp;</span><strong data-dcnode-id="1414"><em class="x-el x-el-span c1-20 c1-21 c1-91 c1-2g c1-2d c1-92 c1-93 c1-b" data-dcnode-id="1415"><span data-dcnode-id="1416" instrument_node="">Finding Christmas</span></em></strong><span data-dcnode-id="1413" instrument_node="">. He has since written thirteen titles and counting, including completing &nbsp;the Sean Kendall thriller series, the Dark Chase supernatural thriller series, multiple romances and holiday romances as well as five children’s books awaiting illustration. He lives in Camas, WA.</span></p><span data-dcnode-id="1411" instrument_node="">
</span></div><span data-dcnode-id="1408" instrument_node="">
</span><div class="directory-entry" data-dcnode-id="1359"><span data-dcnode-id="1407" instrument_node="">
</span><div data-dcnode-id="1405"><img alt="" class="alignleft nwbl-author" data-dcnode-id="1406" height="150" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//nwbooklovers.org/wp-content/uploads/2011/02/floydskloot-150x150.jpg&amp;raw" title="Floyd Skloot" width="150"></div><span data-dcnode-id="1404" instrument_node="">
</span><h3 class="store-name" data-dcnode-id="1402"><span data-dcnode-id="1403" instrument_node="">Floyd Skloot</span></h3><span data-dcnode-id="1401" instrument_node="">
</span><a data-dcnode-id="1399" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.floydskloot.com/"><span data-dcnode-id="1400" instrument_node="">www.floydskloot.com</span></a><span data-dcnode-id="1398" instrument_node="">
</span><p data-dcnode-id="1361"><span data-dcnode-id="1397" instrument_node="">Floyd Skloot is a poet, novelist and essayist whose work has received three Pushcart Prizes, a PEN USA Literary Award, two Oregon Book Awards and two PNBA Awards. Born in Brooklyn, he has been an Oregonian since 1984. He and his wife, Beverly, lived in a cedar yurt in rural Amity before moving back to Portland, where they currently live. His wife’s paintings grace the covers of many of Skloot’s books, which include </span><a data-dcnode-id="1394" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.indiebound.org/book/9780807131176"><em data-dcnode-id="1395"><span data-dcnode-id="1396" instrument_node="">The End of Dreams</span></em></a><span data-dcnode-id="1393" instrument_node="">,</span><a data-dcnode-id="1390" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.indiebound.org/book/9780807133392"><em data-dcnode-id="1391"><span data-dcnode-id="1392" instrument_node=""> The Snow’s Music</span></em></a><span data-dcnode-id="1389" instrument_node="">, </span><a data-dcnode-id="1386" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.indiebound.org/book/9781932195255"><em data-dcnode-id="1387"><span data-dcnode-id="1388" instrument_node="">Approximately Paradise</span></em></a><span data-dcnode-id="1385" instrument_node="">, honored in 2006 by PNBA and </span><a data-dcnode-id="1382" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.indiebound.org/book/9781932195590"><em data-dcnode-id="1383"><span data-dcnode-id="1384" instrument_node="">Selected Poems: 1970-2005</span></em></a><span data-dcnode-id="1381" instrument_node="">, which won the same award in 2009. Skloot has taught at the Mid-Atlantic Creative Nonfiction Summer Writers Conference at Goucher College and the Paris Writers Workshop, and he contributes book reviews to </span><em data-dcnode-id="1379"><span data-dcnode-id="1380" instrument_node="">The New York Times Book Review</span></em><span data-dcnode-id="1378" instrument_node="">, </span><em data-dcnode-id="1376"><span data-dcnode-id="1377" instrument_node="">Boston Globe</span></em><span data-dcnode-id="1375" instrument_node=""> and </span><em data-dcnode-id="1373"><span data-dcnode-id="1374" instrument_node="">Harvard Review</span></em><span data-dcnode-id="1372" instrument_node="">, among others. He wrote </span><a data-dcnode-id="1370" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//nwbooklovers.org/2011/10/05/reading-mayhem-my-two-year-sentence-to-current-fiction-by-floyd-skloot/"><span data-dcnode-id="1371" instrument_node="">Reading Mayhem: My Two-Year Sentence to Current Fiction</span></a><span data-dcnode-id="1369" instrument_node=""> for </span><em data-dcnode-id="1367"><span data-dcnode-id="1368" instrument_node="">NW Book Lovers</span></em><span data-dcnode-id="1366" instrument_node="">. Skloot’s daughter, Rebecca Skloot, is the bestselling author of </span><a data-dcnode-id="1363" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.indiebound.org/book/9781400052189/rebecca-skloot/immortal-life-henrietta-lacks"><em data-dcnode-id="1364"><span data-dcnode-id="1365" instrument_node="">The Immortal Life of Henrietta Lacks</span></em></a><span data-dcnode-id="1362" instrument_node="">.</span></p><span data-dcnode-id="1360" instrument_node="">
</span></div><span data-dcnode-id="1357" instrument_node="">
</span><div class="directory-entry" data-dcnode-id="1342"><span data-dcnode-id="1356" instrument_node="">
</span><div data-dcnode-id="1354"><img alt="" class="alignleft nwbl-author" data-dcnode-id="1355" height="150" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//nwbooklovers.org/wp-content/uploads/2014/01/DSmith-150x150.jpg&amp;raw" title="Diane Smith" width="150"></div><span data-dcnode-id="1353" instrument_node="">
</span><h3 class="store-name" data-dcnode-id="1351"><span data-dcnode-id="1352" instrument_node="">Diane Smith</span></h3><span data-dcnode-id="1350" instrument_node="">
</span><p data-dcnode-id="1344"><span data-dcnode-id="1349" instrument_node="">Diane Smith is a writer specializing in science and the environment. Her first novel, </span><a data-dcnode-id="1346" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.indiebound.org/book/9780140291810"><em data-dcnode-id="1347"><span data-dcnode-id="1348" instrument_node="">Letters from Yellowstone</span></em></a><span data-dcnode-id="1345" instrument_node="">, was honored with a 2000 award from the independent booksellers of the Northwest and was the One Book Montana book of 2006. The novel uses letters to tell the story of the lone woman on a botanical research expedition to Yellowstone National Park in 1898. Smith has lived most of her adult life in Montana, and in her free time, she visits national parks, volunteers on archaeological and paleontological digs, explores back roads and tries to learn all she can about the natural history of the West. Smith is a PhD student in history at Montana State University.</span></p><span data-dcnode-id="1343" instrument_node="">
</span></div><span data-dcnode-id="1340" instrument_node="">
</span><div class="directory-entry" data-dcnode-id="1313"><span data-dcnode-id="1339" instrument_node="">
</span><div data-dcnode-id="1337"><img alt="" class="alignleft nwbl-author" data-dcnode-id="1338" height="150" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//nwbooklovers.org/wp-content/uploads/2014/01/RSmith-150x150.jpg&amp;raw" title="Roland Smith" width="150"></div><span data-dcnode-id="1336" instrument_node="">
</span><h3 class="store-name" data-dcnode-id="1334"><span data-dcnode-id="1335" instrument_node="">Roland Smith</span></h3><span data-dcnode-id="1333" instrument_node="">
</span><a data-dcnode-id="1331" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.rolandsmith.com/"><span data-dcnode-id="1332" instrument_node="">www.rolandsmith.com</span></a><span data-dcnode-id="1330" instrument_node="">
</span><p data-dcnode-id="1315"><span data-dcnode-id="1329" instrument_node="">Roland Smith was born and raised in Portland, where he worked at a zoo until becoming a full-time writer. He is the author of six picturebooks (from </span><em data-dcnode-id="1327"><span data-dcnode-id="1328" instrument_node="">B is for Beaver</span></em><span data-dcnode-id="1326" instrument_node=""> to </span><em data-dcnode-id="1324"><span data-dcnode-id="1325" instrument_node="">W is for Waves</span></em><span data-dcnode-id="1323" instrument_node="">), several nonfiction books about animals and more than a dozen young adult novels, including </span><a data-dcnode-id="1320" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.indiebound.org/book/9780152026967"><em data-dcnode-id="1321"><span data-dcnode-id="1322" instrument_node="">The Captain’s Dog: My Journey with the Lewis and Clark Tribe</span></em></a><span data-dcnode-id="1319" instrument_node="">, which was honored by the independent booksellers of the Northwest in 2000. </span><em data-dcnode-id="1317"><span data-dcnode-id="1318" instrument_node="">School Library Journal</span></em><span data-dcnode-id="1316" instrument_node=""> called the novel “[An] entertaining introduction to an episode of American history rarely celebrated in fiction.” Smith spends his days visiting schools, traveling, and writing about animals. Smith lives on a small farm south of Portland with his wife, Marie.</span></p><span data-dcnode-id="1314" instrument_node="">
</span></div><span data-dcnode-id="1311" instrument_node="">
</span><div class="directory-entry" data-dcnode-id="1277"><span data-dcnode-id="1310" instrument_node="">
</span><div data-dcnode-id="1308"><img alt="" class="alignleft nwbl-author" data-dcnode-id="1309" height="150" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//nwbooklovers.org/wp-content/uploads/2014/01/Snyder-150x150.jpg&amp;raw" title="Gary Snyder" width="150"></div><span data-dcnode-id="1307" instrument_node="">
</span><h3 class="store-name" data-dcnode-id="1305"><span data-dcnode-id="1306" instrument_node="">Gary Snyder</span></h3><span data-dcnode-id="1304" instrument_node="">
</span><p data-dcnode-id="1279"><span data-dcnode-id="1303" instrument_node="">“Gary Snyder is a rarity in the United States: an immensely popular poet whose work is taken seriously by other poets,” says an interviewer in </span><a data-dcnode-id="1301" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.theparisreview.org/interviews/1323/the-art-of-poetry-no-74-gary-snyder"><span data-dcnode-id="1302" instrument_node="">The Paris Review</span></a><span data-dcnode-id="1300" instrument_node="">. “He is America’s primary poet-celebrant of the wilderness, poet-exponent of environmentalism and Zen Buddhism, and poet-citizen of the Pacific Rim …” Snyder has published eighteen books of poetry and prose, including </span><a data-dcnode-id="1297" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.indiebound.org/book/9781619020627"><em data-dcnode-id="1298"><span data-dcnode-id="1299" instrument_node="">The Gary Snyder Reader: Prose, Poetry and Translations</span></em></a><span data-dcnode-id="1296" instrument_node="">; </span><a data-dcnode-id="1293" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.indiebound.org/book/9780679742524"><em data-dcnode-id="1294"><span data-dcnode-id="1295" instrument_node="">No Nature: New and Selected Poems</span></em></a><span data-dcnode-id="1292" instrument_node="">, which was a finalist for the National Book Award; </span><a data-dcnode-id="1289" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.indiebound.org/book/9781582436388"><em data-dcnode-id="1290"><span data-dcnode-id="1291" instrument_node="">The Practice of the Wild</span></em></a><span data-dcnode-id="1288" instrument_node="">, honored by the independent booksellers of the Northwest in 1991; </span><a data-dcnode-id="1285" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.indiebound.org/book/9781593760571"><em data-dcnode-id="1286"><span data-dcnode-id="1287" instrument_node="">Axe Handles</span></em></a><span data-dcnode-id="1284" instrument_node="">, for which he received an American Book Award; and </span><a data-dcnode-id="1281" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.indiebound.org/book/9780811205450"><em data-dcnode-id="1282"><span data-dcnode-id="1283" instrument_node="">Turtle Island</span></em></a><span data-dcnode-id="1280" instrument_node="">, which won the Pulitzer Prize for poetry. Among many honors, he has received an American Academy of Arts and Letters award and the Robert Kirsch Lifetime Achievement Award from the Los Angeles Times. He lives in the foothills of the Sierra Nevada and has taught at the University of California, Davis since 1985.</span></p><span data-dcnode-id="1278" instrument_node="">
</span></div><span data-dcnode-id="1275" instrument_node="">
</span><div class="directory-entry" data-dcnode-id="1232"><span data-dcnode-id="1274" instrument_node="">
</span><div data-dcnode-id="1272"><img alt="" class="alignleft nwbl-author" data-dcnode-id="1273" height="150" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//nwbooklovers.org/wp-content/uploads/2014/01/sonneman-150x150.jpg&amp;raw" title="Toby F. Sonneman" width="150"></div><span data-dcnode-id="1271" instrument_node="">
</span><h3 class="store-name" data-dcnode-id="1269"><span data-dcnode-id="1270" instrument_node="">Toby F. Sonneman</span></h3><span data-dcnode-id="1268" instrument_node="">
</span><a data-dcnode-id="1266" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.tobysonneman.com/"><span data-dcnode-id="1267" instrument_node="">www.tobysonneman.com</span></a><span data-dcnode-id="1265" instrument_node="">
</span><p data-dcnode-id="1234"><span data-dcnode-id="1264" instrument_node="">Toby Sonneman is the author of </span><a data-dcnode-id="1261" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.indiebound.org/book/9781780230344"><em data-dcnode-id="1262"><span data-dcnode-id="1263" instrument_node="">Lemon: A Global History</span></em></a><span data-dcnode-id="1260" instrument_node="">; </span><a data-dcnode-id="1257" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.indiebound.org/book/9781902806105"><em data-dcnode-id="1258"><span data-dcnode-id="1259" instrument_node="">Shared Sorrows: A Gypsy Family Remembers the Holocaust</span></em></a><span data-dcnode-id="1256" instrument_node="">; and </span><em data-dcnode-id="1254"><span data-dcnode-id="1255" instrument_node="">Fruit Fields in My Blood: Okie Migrants in the West</span></em><span data-dcnode-id="1253" instrument_node="">, honored in 1993 by the independent booksellers of the Northwest. She has written personal essays and articles for a variety of publications, including </span><em data-dcnode-id="1251"><span data-dcnode-id="1252" instrument_node="">Salon</span></em><span data-dcnode-id="1250" instrument_node="">, </span><em data-dcnode-id="1248"><span data-dcnode-id="1249" instrument_node="">The Christian Science Monitor</span></em><span data-dcnode-id="1247" instrument_node="">, </span><em data-dcnode-id="1245"><span data-dcnode-id="1246" instrument_node="">The New York Times</span></em><span data-dcnode-id="1244" instrument_node="">, </span><em data-dcnode-id="1242"><span data-dcnode-id="1243" instrument_node="">Reform Judaism Magazine</span></em><span data-dcnode-id="1241" instrument_node="">, </span><em data-dcnode-id="1239"><span data-dcnode-id="1240" instrument_node="">Tikkun</span></em><span data-dcnode-id="1238" instrument_node=""> and </span><em data-dcnode-id="1236"><span data-dcnode-id="1237" instrument_node="">Northwest Palate</span></em><span data-dcnode-id="1235" instrument_node="">. Sonneman picked fruit for sixteen years and currently teaches journalism and writing at Whatcom Community College in Bellingham, Washington.</span></p><span data-dcnode-id="1233" instrument_node="">
</span></div><span data-dcnode-id="1230" instrument_node="">
</span><div class="directory-entry" data-dcnode-id="1208"><span data-dcnode-id="1229" instrument_node="">
</span><div data-dcnode-id="1227"><img alt="" class="alignleft nwbl-author" data-dcnode-id="1228" height="150" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//nwbooklovers.org/wp-content/uploads/2014/01/Soos-150x150.jpg&amp;raw" title="Frank Soos" width="150"></div><span data-dcnode-id="1226" instrument_node="">
</span><h3 class="store-name" data-dcnode-id="1224"><span data-dcnode-id="1225" instrument_node="">Frank Soos</span></h3><span data-dcnode-id="1223" instrument_node="">
</span><p data-dcnode-id="1210"><span data-dcnode-id="1222" instrument_node="">Frank Soos has published several books including the essay collection </span><a data-dcnode-id="1219" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.indiebound.org/book/9780820328355"><em data-dcnode-id="1220"><span data-dcnode-id="1221" instrument_node="">Bamboo Fly Rod Suite: Reflections on Fishing and the Geography of Grace</span></em></a><span data-dcnode-id="1218" instrument_node=""> and the short story collections </span><em data-dcnode-id="1216"><span data-dcnode-id="1217" instrument_node="">Early Yet</span></em><span data-dcnode-id="1215" instrument_node=""> and </span><a data-dcnode-id="1212" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.indiebound.org/book/9780393319880"><em data-dcnode-id="1213"><span data-dcnode-id="1214" instrument_node="">Unified Field Theory</span></em></a><span data-dcnode-id="1211" instrument_node="">, which was honored by the independent booksellers of the Northwest in 1999. The recipient of grants from the National Endowment for the Arts and the Alaska State Council on the Arts and the winner of a Flannery O’ Connor Award for Short Fiction, he taught English and creative writing at the University of Alaska Fairbanks from 1986-2004. He lives in Fairbanks with the artist Margo Klass.</span></p><span data-dcnode-id="1209" instrument_node="">
</span></div><span data-dcnode-id="1206" instrument_node="">
</span><div class="directory-entry" data-dcnode-id="1167"><span data-dcnode-id="1205" instrument_node="">
</span><div data-dcnode-id="1203"><img alt="" class="alignleft nwbl-author" data-dcnode-id="1204" height="150" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//nwbooklovers.org/wp-content/uploads/2014/01/Spanbauer-150x150.jpg&amp;raw" title="Tom Spanbauer" width="150"></div><span data-dcnode-id="1202" instrument_node="">
</span><h3 class="store-name" data-dcnode-id="1200"><span data-dcnode-id="1201" instrument_node="">Tom Spanbauer</span></h3><span data-dcnode-id="1199" instrument_node="">
</span><a data-dcnode-id="1197" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.tomspanbauer.com/"><span data-dcnode-id="1198" instrument_node="">www.tomspanbauer.com</span></a><span data-dcnode-id="1196" instrument_node="">
</span><p data-dcnode-id="1169"><span data-dcnode-id="1195" instrument_node="">Tom Spanbauer is the critically acclaimed author and founder of Dangerous Writing, a writing workshop and community of writers that has formed around him and is dedicated to the proposition that “fiction is the lie that tells the truth truer.” His five published novels, </span><em data-dcnode-id="1191"><a data-dcnode-id="1193" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.indiebound.org/book/9780976631187"><span data-dcnode-id="1194" instrument_node="">Faraway</span></a><span data-dcnode-id="1192" instrument_node=""> Places</span></em><span data-dcnode-id="1190" instrument_node="">, </span><a data-dcnode-id="1187" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.indiebound.org/book/9780802136633"><em data-dcnode-id="1188"><span data-dcnode-id="1189" instrument_node="">The Man Who Fell In Love With The Moon</span></em></a><span data-dcnode-id="1186" instrument_node="">, </span><a data-dcnode-id="1183" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.indiebound.org/book/9780802138989"><em data-dcnode-id="1184"><span data-dcnode-id="1185" instrument_node="">In The City Of Shy Hunters</span></em></a><span data-dcnode-id="1182" instrument_node="">, </span><a data-dcnode-id="1179" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.indiebound.org/book/9780618872640"><em data-dcnode-id="1180"><span data-dcnode-id="1181" instrument_node="">Now Is The Hour</span></em></a><span data-dcnode-id="1178" instrument_node="">, and </span><a data-dcnode-id="1175" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.indiebound.org/book/9780986000782"><em data-dcnode-id="1176"><span data-dcnode-id="1177" instrument_node="">I Loved You More</span></em></a><span data-dcnode-id="1174" instrument_node="">, are notable for their “combination of a fresh and lyrical prose style with solid storytelling.” Spanbauer won a PNBA Award in 1992 for </span><a data-dcnode-id="1171" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.indiebound.org/book/9780802138989"><em data-dcnode-id="1172"><span data-dcnode-id="1173" instrument_node="">In the City of Shy Hunters</span></em></a><span data-dcnode-id="1170" instrument_node="">. He lives, writes and teaches in Portland Oregon.</span></p><span data-dcnode-id="1168" instrument_node="">
</span></div><span data-dcnode-id="1165" instrument_node="">
</span><div class="directory-entry" data-dcnode-id="1153"><span data-dcnode-id="1164" instrument_node="">
</span><h3 class="store-name" data-dcnode-id="1162"><span data-dcnode-id="1163" instrument_node="">Martin Stadius</span></h3><span data-dcnode-id="1161" instrument_node="">
</span><p data-dcnode-id="1155"><span data-dcnode-id="1160" instrument_node="">Portland author Martin Stadius was honored by the independent booksellers of the Northwest in 2000 for </span><a data-dcnode-id="1157" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.indiebound.org/book/9780870043932"><em data-dcnode-id="1158"><span data-dcnode-id="1159" instrument_node="">Dreamers: On the Trail of the Nez Perce</span></em></a><span data-dcnode-id="1156" instrument_node="">. Stadius follows the route of the Nez Perce National History Trail in his VW van, describing the trail today. He tells the story of the tragic retreat of the Nez Perce from Wallowa Lake, Oregon to Bear Paw, Montana from the perspective of the Nez Perce, their pursuers and those who found themselves in the path of the chase. Stadius is a native of the West with more than twenty years experience in the book business.</span></p><span data-dcnode-id="1154" instrument_node="">
</span></div><span data-dcnode-id="1151" instrument_node="">
</span><div class="directory-entry" data-dcnode-id="1111"><span data-dcnode-id="1150" instrument_node="">
</span><div data-dcnode-id="1148"><img alt="" class="alignleft nwbl-author" data-dcnode-id="1149" height="150" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//nwbooklovers.org/wp-content/uploads/2013/01/stafford150x150.jpg&amp;raw" title="Kim Stafford" width="150"></div><span data-dcnode-id="1147" instrument_node="">
</span><h3 class="store-name" data-dcnode-id="1145"><span data-dcnode-id="1146" instrument_node="">Kim Stafford</span></h3><span data-dcnode-id="1144" instrument_node="">
</span><a data-dcnode-id="1142" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.kim-stafford.com/"><span data-dcnode-id="1143" instrument_node="">www.kim-stafford.com</span></a><span data-dcnode-id="1141" instrument_node="">
</span><p data-dcnode-id="1113"><span data-dcnode-id="1140" instrument_node="">Kim Stafford is a writer and teacher living in Portland, Oregon. He is the founding director of the Northwest Writing Institute, a zone for exploratory writing at Lewis &amp; Clark College. His books include </span><em data-dcnode-id="1130"><a data-dcnode-id="1138" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.indiebound.org/book/9781570610974"><span data-dcnode-id="1139" instrument_node="">Having Everything Right: Essays of Place</span></a><span data-dcnode-id="1137" instrument_node="">; </span><a data-dcnode-id="1135" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.indiebound.org/book/9780820324968"><span data-dcnode-id="1136" instrument_node="">The Muses Among Us: Eloquent Listening and Other Pleasures of the Writer’s Craft</span></a><span data-dcnode-id="1134" instrument_node="">; </span><a data-dcnode-id="1132" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.indiebound.org/book/9780887484438"><span data-dcnode-id="1133" instrument_node="">A Thousand Friends of Rain: New &amp; Selected Poems</span></a><span data-dcnode-id="1131" instrument_node="">,</span></em><span data-dcnode-id="1129" instrument_node=""> and </span><em data-dcnode-id="1125"><a data-dcnode-id="1127" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.indiebound.org/book/9781555973896"><span data-dcnode-id="1128" instrument_node="">Early Morning: Remembering My Father, William Stafford</span></a><span data-dcnode-id="1126" instrument_node="">,</span></em><span data-dcnode-id="1124" instrument_node=""> which was honored in 2003 with an award from the independent booksellers of the Northwest. He wrote </span><a data-dcnode-id="1122" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//nwbooklovers.org/2012/09/19/how-a-book-can-set-you-free/"><span data-dcnode-id="1123" instrument_node="">How a Book Can Set You Free</span></a><span data-dcnode-id="1121" instrument_node=""> for </span><em data-dcnode-id="1119"><span data-dcnode-id="1120" instrument_node="">NW Book Lovers</span></em><span data-dcnode-id="1118" instrument_node=""> after the publication of his memoir </span><a data-dcnode-id="1115" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.indiebound.org/book/9781595341365"><em data-dcnode-id="1116"><span data-dcnode-id="1117" instrument_node="">100 Tricks Every Boy Can Do</span></em></a><span data-dcnode-id="1114" instrument_node="">.</span></p><span data-dcnode-id="1112" instrument_node="">
</span></div><span data-dcnode-id="1109" instrument_node="">
</span><div class="directory-entry" data-dcnode-id="1081"><span data-dcnode-id="1108" instrument_node="">
</span><div data-dcnode-id="1106"><img alt="" class="alignleft nwbl-author" data-dcnode-id="1107" height="150" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//nwbooklovers.org/wp-content/uploads/2014/01/WStafford-150x150.jpg&amp;raw" title="William Stafford" width="150"></div><span data-dcnode-id="1105" instrument_node="">
</span><h3 class="store-name" data-dcnode-id="1103"><span data-dcnode-id="1104" instrument_node="">William Stafford</span></h3><span data-dcnode-id="1102" instrument_node="">
</span><a data-dcnode-id="1100" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.williamstafford.org/"><span data-dcnode-id="1101" instrument_node="">www.williamstafford.org</span></a><span data-dcnode-id="1099" instrument_node="">
</span><p data-dcnode-id="1083"><span data-dcnode-id="1098" instrument_node="">Poet and pacifist William Stafford was born in Hutchinson, Kansas, in 1914. During the Second World War, Stafford was a conscientious objector and worked in the civilian public service camps—an experience he recorded in the prose memoir </span><a data-dcnode-id="1095" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.indiebound.org/book/9780870710971"><em data-dcnode-id="1096"><span data-dcnode-id="1097" instrument_node="">Down in My Heart: Peace Witness in War Time</span></em></a><span data-dcnode-id="1094" instrument_node="">. In 1948 Stafford moved to Oregon to teach at Lewis and Clark College, where he worked until his retirement in 1980. His first major collection of poems, </span><em data-dcnode-id="1092"><span data-dcnode-id="1093" instrument_node="">Traveling Through the Dark</span></em><span data-dcnode-id="1091" instrument_node="">, won the National Book Award in 1963. He went on to publish more than sixty-five volumes of poetry and prose, including </span><em data-dcnode-id="1089"><span data-dcnode-id="1090" instrument_node="">An Oregon Message</span></em><span data-dcnode-id="1088" instrument_node="">, which was honored by PNBA in 1988. Stafford died of a heart attack in 1993, having written a poem that morning containing the lines, “‘You don’t have to / prove anything,’ my mother said. ‘Just be ready / for what God sends.'” In 2008, the Stafford family gave his papers, including the 20,000 pages of daily writing, to the Special Collections Department at Lewis &amp; Clark College. Stafford’s son, Kim, wrote a memoir, </span><a data-dcnode-id="1085" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.indiebound.org/book/9781555973896"><em data-dcnode-id="1086"><span data-dcnode-id="1087" instrument_node="">Early Morning: Remembering My Father, William Stafford</span></em></a><span data-dcnode-id="1084" instrument_node="">, for which he won a PNBA Award in 2003.</span></p><span data-dcnode-id="1082" instrument_node="">
</span></div><span data-dcnode-id="1079" instrument_node="">
</span><div class="directory-entry" data-dcnode-id="1056"><span data-dcnode-id="1078" instrument_node="">
</span><div data-dcnode-id="1076"><img alt="" class="alignleft nwbl-author" data-dcnode-id="1077" height="150" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//nwbooklovers.org/wp-content/uploads/2014/01/Starck-150x150.jpg&amp;raw" title="Clemens Starck" width="150"></div><span data-dcnode-id="1075" instrument_node="">
</span><h3 class="store-name" data-dcnode-id="1073"><span data-dcnode-id="1074" instrument_node="">Clemens Starck</span></h3><span data-dcnode-id="1072" instrument_node="">
</span><a data-dcnode-id="1070" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.clemensstarck.com/"><span data-dcnode-id="1071" instrument_node="">www.clemensstarck.com</span></a><span data-dcnode-id="1069" instrument_node="">
</span><p data-dcnode-id="1058"><span data-dcnode-id="1068" instrument_node="">Clemens Starck is the author of several books of poetry, including </span><em data-dcnode-id="1066"><span data-dcnode-id="1067" instrument_node="">China Basin</span></em><span data-dcnode-id="1065" instrument_node=""> and </span><em data-dcnode-id="1063"><span data-dcnode-id="1064" instrument_node="">Traveling Incognito</span></em><span data-dcnode-id="1062" instrument_node="">. His debut work, </span><em data-dcnode-id="1060"><span data-dcnode-id="1061" instrument_node="">Journeyman’s Wages</span></em><span data-dcnode-id="1059" instrument_node="">, won an Oregon Book Award and PNBA’s William Stafford Memorial Poetry Award in 1996. Born in Rochester, N.Y., in 1937, Starck has worked as a construction foreman, a carpenter, a merchant seaman, a door-to-door salesman, a ranch hand and a newspaper reporter. He lives on forty-some acres in the country outside of Dallas, Oregon.</span></p><span data-dcnode-id="1057" instrument_node="">
</span></div><span data-dcnode-id="1054" instrument_node="">
</span><div class="directory-entry" data-dcnode-id="1028"><span data-dcnode-id="1053" instrument_node="">
