</span><b data-dcnode-id="6796"><span data-dcnode-id="6800" instrument_node="">The Pulitzer Prize­–winning American classic of the American West that follows two aging Texas Rangers embarking on one last adventure. An epic of the frontier, </span><i data-dcnode-id="6798"><span data-dcnode-id="6799" instrument_node="">Lonesome Dove</span></i><span data-dcnode-id="6797" instrument_node=""> is the grandest novel ever written about the last defiant wilderness of America.</span></b><br data-dcnode-id="6795"><br data-dcnode-id="6794"><span data-dcnode-id="6793" instrument_node="">Journey to the dusty little Texas town of Lonesome Dove and meet an unforgettable assortment of heroes and outlaws, whores and ladies, Indians and settlers. Richly authentic, beautifully written, always dramatic, </span><i data-dcnode-id="6791"><span data-dcnode-id="6792" instrument_node="">Lonesome Dove </span></i><span data-dcnode-id="6790" instrument_node="">is a book to make us laugh, weep, dream, and remember.</span></div><span data-dcnode-id="6788" instrument_node="">

</span><b data-dcnode-id="4901"><b data-dcnode-id="4902"><span data-dcnode-id="4903" instrument_node="">1.</span></b></b><br data-dcnode-id="4900"><br data-dcnode-id="4899"><span data-dcnode-id="4898" instrument_node="">WHENAUGUSTUS CAME OUT on the porch the blue pigs were eating a rat-tlesnake—not a very big one. It had probably just been crawling around looking for shade when it ran into the pigs. They were having a fine tug-of-war with it, and its rattling days were over. The sow had it by the neck, and the shoat had the tail.</span><br data-dcnode-id="4897"><br data-dcnode-id="4896"><span data-dcnode-id="4895" instrument_node="">“You pigs git,” Augustus said, kicking the shoat. “Head on down to the creek if you want to eat that snake.” It was the porch he begrudged them, not the snake. Pigs on the porch just made things hotter, and things were already hot enough. He stepped down into the dusty yard and walked around to the springhouse to get his jug. The sun was still high, sulled in the sky like a mule, but Augustus had a keen eye for sun, and to his eye the long light from the west had taken on an encouraging slant.</span><br data-dcnode-id="4894"><br data-dcnode-id="4893"><span data-dcnode-id="4892" instrument_node="">Evening took a long time getting to Lonesome Dove, but when it came it was a comfort. For most of the hours of the day—and most of the months of the year—the sun had the town trapped deep in dust, far out in the chaparral flats, a heaven for snakes and horned toads, roadrunners and stinging lizards, but a hell for pigs and Tennesseans. There was not even a respectable shade tree within twenty or thirty miles; in fact, the actual location of the nearest decent shade was a matter of vigorous debate in the offices—if you wanted to call a roofless barn and a couple of patched-up corrals offices—of the Hat Creek Cattle Company, half of which Augustus owned.</span><br data-dcnode-id="4891"><br data-dcnode-id="4890"><span data-dcnode-id="4889" instrument_node="">His stubborn partner, Captain W. F. Call, maintained that there was excellent shade as close as Pickles Gap, only twelve miles away, but Augustus wouldn’t allow it. Pickles Gap was if anything a more worthless community than Lonesome Dove. It had only sprung up because a fool from north Georgia named Wesley Pickles had gotten himself and his family lost in the mesquites for about ten days. When he finally found a clearing, he wouldn’t leave it, and Pickles Gap came into being, mainly attracting travelers like its founder, which is to say people too weak-willed to be able to negotiate a few hundred miles of mesquite thicket without losing their nerve.</span><br data-dcnode-id="4888"><br data-dcnode-id="4887"><span data-dcnode-id="4886" instrument_node="">The springhouse was a little lumpy adobe building, so cool on the inside that Augustus would have been tempted to live in it had it not been for its popularity with black widows, yellow jackets and centipedes. When he opened the door he didn’t immediately see any centipedes but he did immediately hear the nervous buzz of a rattlesnake that was evidently smarter than the one the pigs were eating. Augustus could just make out the snake, coiled in a corner, but decided not to shoot it; on a quiet spring evening in Lonesome Dove, a shot could cause complications. Everybody in town would hear it and conclude either that the Comanches were down from the plains or the Mexicans up from the river. If any of the customers of the Dry Bean, the town’s one saloon, happened to be drunk or unhappy—which was very likely—they would probably run out into the street and shoot a Mexican or two, just to be on the safe side.</span><br data-dcnode-id="4885"><br data-dcnode-id="4884"><span data-dcnode-id="4883" instrument_node="">At the very least, Call would come stomping up from the lots, only to be annoyed to discover it had just been a snake. Call had no respect whatsoever for snakes, or for anyone who stood aside for snakes. He treated rattlers like gnats, disposing of them with one stroke of whatever tool he had in hand. “A man that slows down for snakes might as well walk,” he often said, a statement that made about as much sense to an educated man as most of the things Call said.</span><br data-dcnode-id="4882"><br data-dcnode-id="4881"><span data-dcnode-id="4880" instrument_node="">Augustus held to a more leisurely philosophy. He believed in giving creatures a little time to think, so he stood in the sun a few minutes until the rattler calmed down and crawled out a hole. Then he reached in and lifted his jug out of the mud. It had been a dry year, even by the standards of Lonesome Dove, and the spring was just springing enough to make a nice mud puddle. The pigs spent half their time rooting around the springhouse, hoping to get into the mud, but so far none of the holes in the adobe was big enough to admit a pig.</span><br data-dcnode-id="4879"><br data-dcnode-id="4878"><span data-dcnode-id="4877" instrument_node="">The damp burlap the jug was wrapped in naturally appealed to the centipedes, so Augustus made sure none had sneaked under the wrapping before he uncorked the jug and took a modest swig. The one white barber in Lonesome Dove, a fellow Tennessean named Dillard Brawley, had to do his barbering on one leg because he had not been cautious enough about centipedes. Two of the vicious red-legged variety had crawled into his pants one night and Dillard had got up in a hurry and had neglected to shake out the pants. The leg hadn’t totally rotted off, but it had rotted sufficiently that the family got nervous about blood poisoning and persuaded he and Call to saw it off.</span><br data-dcnode-id="4876"><br data-dcnode-id="4875"><span data-dcnode-id="4874" instrument_node="">For a year or two Lonesome Dove had had a real doctor, but the young man had lacked good sense. A </span><i data-dcnode-id="4872"><span data-dcnode-id="4873" instrument_node="">vaquero</span></i><span data-dcnode-id="4871" instrument_node=""> with a loose manner that everybody was getting ready to hang at the first excuse anyway passed out from drink one night and let a blister bug crawl in his ear. The bug couldn’t find its way out, but it could move around enough to upset the </span><i data-dcnode-id="4869"><span data-dcnode-id="4870" instrument_node="">vaquero,</span></i><span data-dcnode-id="4868" instrument_node=""> who persuaded the young doctor to try and flush it. The young man was doing his best with some warm salt water, but the </span><i data-dcnode-id="4866"><span data-dcnode-id="4867" instrument_node="">vaquero</span></i><span data-dcnode-id="4865" instrument_node=""> lost his temper and shot him. It was a fatal mistake on the </span><i data-dcnode-id="4863"><span data-dcnode-id="4864" instrument_node="">vaquero’s</span></i><span data-dcnode-id="4862" instrument_node=""> part: someone blasted his horse out from under him as he was racing away, and the incensed citizenry, most of whom were nearby at the Dry Bean, passing the time, hung him immediately.</span><br data-dcnode-id="4861"><br data-dcnode-id="4860"><span data-dcnode-id="4859" instrument_node="">Unfortunately no medical man had taken an interest in the town since, and Augustus and Call, both of whom had coped with their share of wounds, got called on to do such surgery as was deemed essential. Dillard Brawley’s leg had presented no problem, except that Dillard screeched so loudly that he injured his vocal cords. He got around good on one leg, but the vocal cords had never fully recovered, which ultimately hurt his business. Dillard had always talked too much, but after the trouble with the centipedes, what he did was whisper too much. Customers couldn’t relax under their hot towels for trying to make out Dillard’s whispers. He hadn’t really been worth listening to, even when he had two legs, and in time many of his customers drifted off to the Mexican barber. Call even used the Mexican, and Call didn’t trust Mexicans </span><i data-dcnode-id="4857"><span data-dcnode-id="4858" instrument_node="">or</span></i><span data-dcnode-id="4856" instrument_node=""> barbers.</span><br data-dcnode-id="4855"><br data-dcnode-id="4854"><span data-dcnode-id="4853" instrument_node="">Augustus took the jug back to the porch and placed his rope-bottomed chair so as to utilize the smidgin of shade he had to work with. As the sun sank, the shade would gradually extend itself across the porch, the wagon yard, Hat Creek, Lonesome Dove and, eventually, the Rio Grande. By the time the shade had reached the river, Augustus would have mellowed with the evening and be ready for some intelligent conversation, which usually involved talking to himself. Call would work until slap dark if he could find anything to do, and if he couldn’t find anything he would make up something—and Pea Eye was too much of a corporal to quit before the Captain quit, even if Call would have let him.</span><br data-dcnode-id="4852"><br data-dcnode-id="4851"><span data-dcnode-id="4850" instrument_node="">The two pigs had quietly disregarded Augustus’s orders to go to the creek, and were under one of the wagons, eating the snake. That made good sense, for the creek was just as dry as the wagon yard, and farther off. Fifty weeks out of the year Hat Creek was nothing but a sandy ditch, and the fact that the two pigs didn’t regard it as a fit wallow was a credit to their intelligence. Augustus often praised the pigs’ intelligence in a running argument he had been having with Call for the last few years. Augustus maintained that pigs were smarter than all horses and most people, a claim that galled Call severely.</span><br data-dcnode-id="4849"><br data-dcnode-id="4848"><span data-dcnode-id="4847" instrument_node="">“No slop-eating pig is as smart as a horse,” Call said, before going on to say worse things.</span><br data-dcnode-id="4846"><br data-dcnode-id="4845"><span data-dcnode-id="4844" instrument_node="">As was his custom, Augustus drank a fair amount of whiskey as he sat and watched the sun ease out of the day. If he wasn’t tilting the rope-bottomed chair, he was tilting the jug. The days in Lonesome Dove were a blur of heat and as dry as chalk, but mash whiskey took some of the dry away and made Augustus feel nicely misty inside—foggy and cool as a morning in the Tennessee hills. He seldom got downright drunk, but he did enjoy feeling misty along about sundown, keeping his mood good with tasteful swigs as the sky to the west began to color up. The whiskey didn’t damage his intellectual powers any, but it did make him more tolerant of the raw sorts he had to live with: Call and Pea Eye and Deets, young Newt, and old Bolivar, the cook.</span><br data-dcnode-id="4843"><br data-dcnode-id="4842"><span data-dcnode-id="4841" instrument_node="">When the sky had pinked up nicely over the western flats, Augustus went around to the back of the house and kicked the kitchen door a time or two. “Better warm up the sowbelly and mash a few beans,” he said. Old Bolivar didn’t answer, so Augustus kicked the door once or twice more, to emphasize his point, and went back to the porch. The blue shoat was waiting for him at the corner of the house, quiet as a cat. It was probably hoping he would drop something—a belt or a pocketknife or a hat—so he could eat it.</span><br data-dcnode-id="4840"><br data-dcnode-id="4839"><span data-dcnode-id="4838" instrument_node="">“Git from here, shoat,” Augustus said. “If you’re that hungry go hunt up another snake.” It occurred to him that a leather belt couldn’t be much tougher or less palatable than the fried goat Bolivar served up three or four times a week. The old man had been a competent Mexican bandit before he ran out of steam and crossed the river. Since then he had led a quiet life, but it </span><i data-dcnode-id="4836"><span data-dcnode-id="4837" instrument_node="">was</span></i><span data-dcnode-id="4835" instrument_node=""> a fact that goat kept turning up on the table. The Hat Creek Cattle Company didn’t trade in them, and it was unlikely that Bolivar was buying them out of his own pocket—stealing goats was probably his way of keeping up his old skills. His old skills did not include cooking. The goat meat tasted like it had been fried in tar, but Augustus was the only member of the establishment sensitive enough to raise a complaint. “Bol, where’d you get the tar you fried this goat in?” he asked regularly, his quiet attempt at wit falling as usual on deaf ears. Bolivar ignored all queries, direct or indirect.</span><br data-dcnode-id="4834"><br data-dcnode-id="4833"><span data-dcnode-id="4832" instrument_node="">Augustus was getting about ready to start talking to the sow and the shoat when he saw Call and Pea Eye walking up from the lots. Pea Eye was tall and lank, had never been full in his life, and looked so awkward that he appeared to be about to fall down even when he was standing still. He looked totally helpless, but that was another case of looks deceiving. In fact, he was one of the ablest men Augustus had ever known. He had never been an outstanding Indian fighter, but if you gave him something he could work at deliberately, like carpentering or blacksmithing, or well-digging or harness repair, Pea was excellent. If he had been a man to do sloppy work, Call would have run him off long before.</span><br data-dcnode-id="4831"><br data-dcnode-id="4830"><span data-dcnode-id="4829" instrument_node="">Augustus walked down and met the men at the wagons. “It’s a little early for you two to be quittin’, ain’t it, girls?” he said. “Or is this Christmas or what?”</span><br data-dcnode-id="4828"><br data-dcnode-id="4827"><span data-dcnode-id="4826" instrument_node="">Both men had sweated their shirts through so many times during the day that they were practically black. Augustus offered Call the jug, and Call put a foot on a wagon tongue and took a swig just to rinse the dry out of his mouth. He spat a mouthful of perfectly good whiskey in the dust and handed the jug to Pea Eye.</span><br data-dcnode-id="4825"><br data-dcnode-id="4824"><span data-dcnode-id="4823" instrument_node="">“Girls yourself,” he said. “It ain’t Christmas.” Then he went on to the house, so abruptly that Augustus was a little taken aback. Call had never been one for fine manners, but if the day’s work had gone to his satisfaction he would usually stand and pass the time a minute.</span><br data-dcnode-id="4822"><br data-dcnode-id="4821"><span data-dcnode-id="4820" instrument_node="">The funny thing about Woodrow Call was how hard he was to keep in scale. He wasn’t a big man—in fact, was barely middle-sized—but when you walked up and looked him in the eye it didn’t seem that way. Augustus was four inches taller than his partner, and Pea Eye three inches taller yet, but there was no way you could have convinced Pea Eye that Captain Call was the short man. Call had him buffaloed, and in that respect Pea had plenty of company. If a man meant to hold his own with Call it was necessary to keep in mind that Call wasn’t as big as he seemed. Augustus was the one man in south Texas who could usually keep him in scale, and he built on his advantage whenever he could. He started many a day by pitching Call a hot biscuit and remarking point-blank, “You know, Call, you ain’t really no giant.”</span><br data-dcnode-id="4819"><br data-dcnode-id="4818"><span data-dcnode-id="4817" instrument_node="">A simple heart like Pea could never understand such behavior. It gave Augustus a laugh sometimes to consider that Call could hoodwink a man nearly twice his size, getting Pea to confuse the inner with the outer man. But of course Call himself had such a single-track mind that he scarcely realized he was doing it. He just did it. What made it a fascinating trick was that Call had never noticed that he had a trick. The man never wasted five minutes appreciating himself; it would have meant losing five minutes off whatever job he had decided he wanted to get done that day.</span><br data-dcnode-id="4816"><br data-dcnode-id="4815"><span data-dcnode-id="4814" instrument_node="">“It’s a good thing I ain’t scairt to be lazy,” Augustus told him once.</span><br data-dcnode-id="4813"><br data-dcnode-id="4812"><span data-dcnode-id="4811" instrument_node="">“You may think so. I don’t,” Call said.</span><br data-dcnode-id="4810"><br data-dcnode-id="4809"><span data-dcnode-id="4808" instrument_node="">“Hell, Call, if I worked as hard as you, there’d be no thinking done at all around this outfit. You stay in a lather fifteen hours a day. A man that’s always in a lather can’t think nothin’ out.”</span><br data-dcnode-id="4807"><br data-dcnode-id="4806"><span data-dcnode-id="4805" instrument_node="">“I’d like to see you think the roof back on that barn,” Call said.</span><br data-dcnode-id="4804"><br data-dcnode-id="4803"><span data-dcnode-id="4802" instrument_node="">A strange little wind had whipped over from Mexico and blown the roof off clean as a whistle, three years before. Fortunately it only rained in Lonesome Dove once or twice a year, so the loss of the roof didn’t result in much suffering for the stock, when there was stock. It mostly meant suffering for Call, who had never been able to locate enough decent lumber to build a new roof. Unfortunately a rare downpour had occurred only about a week after the wind dropped the old roof in the middle of Hat Creek. It had been a real turd-floater, and also a lumber-floater, washing much of the roof straight into the Rio Grande.</span><br data-dcnode-id="4801"><br data-dcnode-id="4800"><span data-dcnode-id="4799" instrument_node="">“If you think so much, why didn’t you think of that rain?” Call asked. Ever since, he had been throwing the turd-floater up to Augustus. Give Call a grievance, however silly, and he would save it like money.</span><br data-dcnode-id="4798"><br data-dcnode-id="4797"><span data-dcnode-id="4796" instrument_node="">Pea Eye wasn’t spitting out any mash whiskey. He had a skinny neck— his Adam’s apple bulged so when he drank that it reminded Augustus of a snake with a frog stuck in its gullet.</span><br data-dcnode-id="4795"><br data-dcnode-id="4794"><span data-dcnode-id="4793" instrument_node="">“Call looks mad enough to kick the stump,” Augustus said, when Pea finally stopped to breathe.</span><br data-dcnode-id="4792"><br data-dcnode-id="4791"><span data-dcnode-id="4790" instrument_node="">“She bit a hunk out of him, that’s why,” Pea said. “I don’t know why the Captain wants to keep her.”</span><br data-dcnode-id="4789"><br data-dcnode-id="4788"><span data-dcnode-id="4787" instrument_node="">“Fillies are his only form of folly,” Augustus said. “What’s he doing letting a horse bite him? I thought you boys were digging the new well?”</span><br data-dcnode-id="4786"><br data-dcnode-id="4785"><span data-dcnode-id="4784" instrument_node="">“Hit rock,” Pea said. “Ain’t room for but one man to swing a pick down in that hole, so Newt swung it while I shod horses. The Captain took a ride. I guess he thought he had her sweated down. He turned his back on her and she bit a hunk out.”</span><br data-dcnode-id="4783"><br data-dcnode-id="4782"><span data-dcnode-id="4781" instrument_node="">The mare in question was known around town as the Hell Bitch. Call had bought her in Mexico, from some </span><i data-dcnode-id="4779"><span data-dcnode-id="4780" instrument_node="">caballeros</span></i><span data-dcnode-id="4778" instrument_node=""> who claimed to have killed an Indian to get her—a Comanche, they said. Augustus doubted that part of the story: it was unlikely one Comanche had been riding around by himself in that part of Mexico, and if there had been two Comanches the </span><i data-dcnode-id="4776"><span data-dcnode-id="4777" instrument_node="">caballeros</span></i><span data-dcnode-id="4775" instrument_node=""> wouldn’t have lived to do any horse trading. The mare was a dapple gray, with a white muzzle and a white streak down her forehead, too tall to be pure Indian pony and too short-barreled to be pure thoroughbred. Her disposition did suggest some time spent with Indians, but which Indians and how long was anybody’s guess. Every man who saw her wanted to buy her, she was that stylish, but Call wouldn’t even listen to an offer, though Pea Eye and Newt were both anxious to see her sold. They had to work around her every day and suffered accordingly. She had once kicked Newt all the way into the blacksmith’s shop and nearly into the forge. Pea Eye was at least as scared of her as he was of Comanches, which was saying a lot.</span><br data-dcnode-id="4774"><br data-dcnode-id="4773"><span data-dcnode-id="4772" instrument_node="">“What’s keeping Newt?” Augustus asked.</span><br data-dcnode-id="4771"><br data-dcnode-id="4770"><span data-dcnode-id="4769" instrument_node="">“He may have went to sleep down in that well,” Pea Eye said.</span><br data-dcnode-id="4768"><br data-dcnode-id="4767"><span data-dcnode-id="4766" instrument_node="">Then Augustus saw the boy walking up from the lots, so tired he was barely moving. Pea Eye was half drunk by the time Newt finally made the wagons.</span><br data-dcnode-id="4765"><br data-dcnode-id="4764"><span data-dcnode-id="4763" instrument_node="">“’I god, Newt, I’m glad you got here before fall,” Augustus said. “We’d have missed you during the summer.”</span><br data-dcnode-id="4762"><br data-dcnode-id="4761"><span data-dcnode-id="4760" instrument_node="">“I been throwin’ rocks at the mare,” Newt said, with a grin. “Did you see what a hunk she bit out of the Captain?”</span><br data-dcnode-id="4759"><br data-dcnode-id="4758"><span data-dcnode-id="4757" instrument_node="">Newt lifted one foot and carefully scraped the mud from the well off the sole of his boot, while Pea Eye continued to wash the dust out of his throat.</span><br data-dcnode-id="4756"><br data-dcnode-id="4755"><span data-dcnode-id="4754" instrument_node="">Augustus had always admired the way Newt could stand on one leg while cleaning the other boot. “Look at that, Pea,” he said. “I bet you can’t do that.”</span><br data-dcnode-id="4753"><br data-dcnode-id="4752"><span data-dcnode-id="4751" instrument_node="">Pea Eye was so used to seeing Newt stand on one leg to clean his boot that he couldn’t figure out what it was Gus thought he couldn’t do. A few big swigs of liquor sometimes slowed his thinking down to a crawl. This usually happened at sundown, after a hard day of well-digging or horseshoeing; at such times Pea was doubly glad he worked with the Captain, rather than Gus. The less talk the Captain had to listen to, the better humor he was in, whereas Gus was just the opposite. He’d rattle off five or six different questions and opinions, running them all together like so many unbranded cattle—it made it hard to pick out one and think about it carefully and slowly, the only ways Pea Eye liked to think. At such times his only recourse was to pretend the questions had hit him in his deaf ear, the left one, which hadn’t really worked well since the day of their big fight with the Keechis—what they called the Stone House fight. It had been pure confusion, since the Indians had been smart enough to fire the prairie grass, smoking things up so badly that no one could see six feet ahead. They kept bumping into Indians in the smoke and having to shoot point-blank; a Ranger right next to Pea had spotted one and fired too close to Pea’s ear.</span><br data-dcnode-id="4750"><br data-dcnode-id="4749"><span data-dcnode-id="4748" instrument_node="">That was the day the Indians got away with their horses, which made Captain Call about as mad as Pea had ever seen him. It meant they had to walk down the Brazos for nearly two hundred miles, worrying constantly about what would happen if the Comanches discovered they were afoot. Pea Eye hadn’t noticed he was half deaf until they had walked most of the way out.</span><br data-dcnode-id="4747"><br data-dcnode-id="4746"><span data-dcnode-id="4745" instrument_node="">Fortunately, while he was worrying the question of what it was he couldn’t do, old Bolivar began to whack the dinner bell, which put an end to discussion. The old dinner bell had lost its clapper, but Bolivar had found a crowbar that somebody had managed to break, and he laid into the bell so hard that you couldn’t have heard the clapper if there had been one.</span><br data-dcnode-id="4744"><br data-dcnode-id="4743"><span data-dcnode-id="4742" instrument_node="">The sun had finally set, and it was so still along the river that they could hear the horses swishing their tails, down in the lots—or they could until Bolivar laid into the bell. Although he probably knew they were standing around the wagons, in easy hearing distance, Bolivar continued to pound the bell for a good five minutes. Bolivar pounded the bell for reasons of his own; even Call couldn’t control him in that regard. The sound drowned out the quiet of sunset, which annoyed Augustus so much that at times he was tempted to go up and shoot the old man, just to teach him a lesson.</span><br data-dcnode-id="4741"><br data-dcnode-id="4740"><span data-dcnode-id="4739" instrument_node="">“I figure he’s calling bandits,” Augustus said, when the ringing finally stopped. They started for the house, and the pigs fell in with them, the shoat eating a lizard he had caught somewhere. The pigs liked Newt even better than Augustus—when he didn’t have anything better to do he would feed them scraps of rawhide and scratch their ears.</span><br data-dcnode-id="4738"><br data-dcnode-id="4737"><span data-dcnode-id="4736" instrument_node="">“If them bandits were to come, maybe the Captain would let me start wearing a gun,” Newt said wistfully. It seemed he would never get old enough to wear a gun, though he was well into his teens.</span><br data-dcnode-id="4735"><br data-dcnode-id="4734"><span data-dcnode-id="4733" instrument_node="">“If you was to wear a gun somebody would just mistake you for a gunfighter and shoot you,” Augustus said, noting the boy’s wistful look. “It ain’t worth it. If Bol ever calls up any bandits I’ll lend you my Henry.”</span><br data-dcnode-id="4732"><br data-dcnode-id="4731"><span data-dcnode-id="4730" instrument_node="">“That old man can barely cook,” Pea Eye remarked. “Where would he get any bandits?”</span><br data-dcnode-id="4729"><br data-dcnode-id="4728"><span data-dcnode-id="4727" instrument_node="">“Why, you remember that greasy bunch he had,” Augustus said. “We used to buy horses from ’em. That’s the only reason Call hired him to cook. In the business we’re in, it don’t hurt to know a few horsethieves, as long as they’re Mexicans. I figure Bol’s just biding his time. As soon as he gains our trust his bunch will sneak up some night and murder us all.”</span><br data-dcnode-id="4726"><br data-dcnode-id="4725"><span data-dcnode-id="4724" instrument_node="">He didn’t believe anything of the kind—he just liked to stimulate the boy once in a while, and Pea too, though Pea was an exceptionally hard man to stimulate, being insensitive to most fears. Pea had just sense enough to fear Comanches—that didn’t require an abundance of sense. Mexican bandits did not impress him.</span><br data-dcnode-id="4723"><br data-dcnode-id="4722"><span data-dcnode-id="4721" instrument_node="">Newt had more imagination. He turned and looked across the river, where a big darkness was about to settle. Every now and then, about sundown, the Captain and Augustus and Pea and Deets would strap on guns and ride off into that darkness, into Mexico, to return about sunup with thirty or forty horses or perhaps a hundred skinny cattle. It was the way the stock business seemed to work along the border, the Mexican ranchers raiding north while the Texans raided south. Some of the skinny cattle spent their lives being chased back and forth across the Rio Grande. Newt’s fondest hope was to get old enough to be taken along on the raids. Many a night he lay in his hot little bunk, listening to old Bolivar snore and mumble below him, peering out the window toward Mexico, imagining the wild doings that must be going on. Once in a while he even heard gunfire, though seldom more than a shot or two, from up or down the river—it got his imagination to working all the harder.</span><br data-dcnode-id="4720"><br data-dcnode-id="4719"><span data-dcnode-id="4718" instrument_node="">“You can go when you’re grown,” the Captain said, and that was all he said. There was no arguing with it, either—not if you were just hired help. Arguing with the Captain was a privilege reserved for Mr. Gus.</span><br data-dcnode-id="4717"><br data-dcnode-id="4716"><span data-dcnode-id="4715" instrument_node="">They no sooner got in the house than Mr. Gus began to exercise the privilege. The Captain had his shirt off, letting Bolivar treat his mare bite. She had got him just above the belt. Enough blood had run down into his pants that one pants leg was caked with it. Bol was about to pack the bite with his usual dope, a mixture of axle grease and turpentine, but Mr. Gus made him wait until he could get a look at the wound himself.</span><br data-dcnode-id="4714"><br data-dcnode-id="4713"><span data-dcnode-id="4712" instrument_node="">“’I god, Woodrow,” Augustus said. “As long as you’ve worked around horses it looks like you’d know better than to turn your back on a Kiowa mare.”</span><br data-dcnode-id="4711"><br data-dcnode-id="4710"><span data-dcnode-id="4709" instrument_node="">Call was thinking of something and didn’t answer for a minute. What he was thinking was that the moon was in the quarter—what they called the rustler’s moon. Let it get full over the pale flats and some Mexicans could see well enough to draw a fair bead. Men he’d ridden with for years were dead and buried, or at least dead, because they’d crossed the river under a full moon. No moon at all was nearly as bad: then it was too hard to find the stock, and too hard to move it. The quarter moon was the right moon for a swing below the border. The brush country to the north was already thick with cattlemen, making up their spring herds and getting trail crews together; it wouldn’t be a week before they began to drift into Lonesome Dove. It was time to go gather cattle.</span><br data-dcnode-id="4708"><br data-dcnode-id="4707"><span data-dcnode-id="4706" instrument_node="">“Who said she was Kiowa?” he said, looking at Augustus.</span><br data-dcnode-id="4705"><br data-dcnode-id="4704"><span data-dcnode-id="4703" instrument_node="">“I’ve reasoned it out,” Augustus said. “You could have done the same if you ever stopped working long enough to think.”</span><br data-dcnode-id="4702"><br data-dcnode-id="4701"><span data-dcnode-id="4700" instrument_node="">“I can work and think too,” Call said. “You’re the only man I know whose brain don’t work unless it’s in the shade.”</span><br data-dcnode-id="4699"><br data-dcnode-id="4698"><span data-dcnode-id="4697" instrument_node="">Augustus ignored the remark. “I figure it was a Kiowa on his way to steal a woman that lost that mare,” he said. “Your Comanche don’t hunger much after señoritas. White women are easier to steal, and don’t eat as much besides. The Kiowa are different. They fancy señoritas.”</span><br data-dcnode-id="4696"><br data-dcnode-id="4695"><span data-dcnode-id="4694" instrument_node="">“Can we eat or do we have to wait till the argument’s over?” Pea Eye asked.</span><br data-dcnode-id="4693"><br data-dcnode-id="4692"><span data-dcnode-id="4691" instrument_node="">“We starve if we wait for that,” Bolivar said, plunking a potful of sowbelly and beans down on the rough table. Augustus, to the surprise of no one, was the first to fill his plate.</span><br data-dcnode-id="4690"><br data-dcnode-id="4689"><span data-dcnode-id="4688" instrument_node="">“I don’t know where you keep finding these Mexican strawberries,” he said, referring to the beans. Bolivar managed to find them three hundred and sixty-five days a year, mixing them with so many red chilies that a spoonful of beans was more or less as hot as a spoonful of red ants. Newt had come to think that only two things were certain if you worked for the Hat Creek Cattle Company. One was that Captain Call would think of more things to do than he and Pea Eye and Deets could get done, and the other was that beans would be available at all meals. The only man in the outfit who didn’t fart frequently was old Bolivar himself—he never touched beans and lived mainly on sourdough biscuits and chickory coffee, or rather cups of brown sugar with little puddles of coffee floating on top. Sugar cost money, too, and it irked the Captain to spend it, but Bolivar could not be made to break a habit. Augustus claimed the old man’s droppings were so sugary that the blue shoat had taken to stalking him every time he went to shit, which might have been true. Newt had all he could do to keep clear of the shoat, and his own droppings were mostly bean.</span><br data-dcnode-id="4687"><br data-dcnode-id="4686"><span data-dcnode-id="4685" instrument_node="">By the time Call got his shirt on and came to the table, Augustus was reaching for a second helping. Pea and Newt were casting nervous glances at the pot, hoping for seconds themselves but too polite to grab before everyone had been served. Augustus’s appetite was a kind of natural calamity. Call had watched it with amazement for thirty years and yet it still surprised him to see how much Augustus ate. He didn’t work unless he had to, and yet he could sit down night after night and out-eat three men who had put in a day’s labor.</span><br data-dcnode-id="4684"><br data-dcnode-id="4683"><span data-dcnode-id="4682" instrument_node="">In their rangering days, when things were a little slow the boys would sit around and swap stories about Augustus’s eating. Not only did he eat a lot, he ate it fast. The cook that wanted to hold him at the grub for more than ten minutes had better have a side of beef handy.</span><br data-dcnode-id="4681"><br data-dcnode-id="4680"><span data-dcnode-id="4679" instrument_node="">Call pulled out a chair and sat down. As Augustus was ladling himself a big scoop of beans, Call stuck his plate under the ladle. Newt thought it such a slick move that he laughed out loud.</span><br data-dcnode-id="4678"><br data-dcnode-id="4677"><span data-dcnode-id="4676" instrument_node="">“Many thanks,” Call said. “If you ever get tired of loafing I guess you could get a job waiting tables.”</span><br data-dcnode-id="4675"><br data-dcnode-id="4674"><span data-dcnode-id="4673" instrument_node="">“Why, I had a job waiting tables once,” Augustus said, pretending he had meant to serve Call the beans. “On a riverboat. I wasn’t no older than Newt when I had that job. The cook even wore a white hat.”</span><br data-dcnode-id="4672"><br data-dcnode-id="4671"><span data-dcnode-id="4670" instrument_node="">“What for?” Pea Eye asked.</span><br data-dcnode-id="4669"><br data-dcnode-id="4668"><span data-dcnode-id="4667" instrument_node="">“Because it’s what real cooks are supposed to wear,” Augustus said, looking at Bolivar, who was stirring a little coffee into his brown sugar. “Not so much a hat as a kind of big white cap—it looked like it could have been made out of a bedsheet.”</span><br data-dcnode-id="4666"><br data-dcnode-id="4665"><span data-dcnode-id="4664" instrument_node="">“I’d be damned if I’d wear one,” Call said.</span><br data-dcnode-id="4663"><br data-dcnode-id="4662"><span data-dcnode-id="4661" instrument_node="">“Nobody would be loony enough to hire you to cook, Woodrow,” Augustus said. “The cap is supposed to keep the cook’s old greasy hairs from falling into the food. I wouldn’t be surprised if some of Bol’s hairs have found their way into this sow bosom.”</span><br data-dcnode-id="4660"><br data-dcnode-id="4659"><span data-dcnode-id="4658" instrument_node="">Newt looked at Bolivar, sitting over by the stove in his dirty serape. Bolivar’s hair looked like it had had a can of secondhand lard poured over it. Once every few months Bol would change clothes and go visit his wife, but his efforts at improving his appearance never went much higher than his mustache, which he occasionally tried to wax with grease of some kind.</span><br data-dcnode-id="4657"><br data-dcnode-id="4656"><span data-dcnode-id="4655" instrument_node="">“How come you to quit the riverboat?” Pea Eye asked.</span><br data-dcnode-id="4654"><br data-dcnode-id="4653"><span data-dcnode-id="4652" instrument_node="">“I was too young and pretty,” Augustus said. “The whores wouldn’t let me alone.”</span><br data-dcnode-id="4651"><br data-dcnode-id="4650"><span data-dcnode-id="4649" instrument_node="">Call was sorry it had come up. He didn’t like talk about whores—not anytime, but particularly not in front of the boy. Augustus had little shame, if any. It had long been a sore spot between them.</span><br data-dcnode-id="4648"><br data-dcnode-id="4647"><span data-dcnode-id="4646" instrument_node="">“I wish they’d drownt you then,” Call said, annoyed. Conversation at the table seldom led to any good.</span><br data-dcnode-id="4645"><br data-dcnode-id="4644"><span data-dcnode-id="4643" instrument_node="">Newt kept his eyes on his plate, as he usually did when the Captain grew annoyed.</span><br data-dcnode-id="4642"><br data-dcnode-id="4641"><span data-dcnode-id="4640" instrument_node="">“Drown me?” Augustus said. “Why, if anybody had tried it, those girls would have clawed them to shreds.” He knew Call was mad, but wasn’t much inclined to humor him. It was his dinner table as much as Call’s, and if Call didn’t like the conversation he could go to bed.</span><br data-dcnode-id="4639"><br data-dcnode-id="4638"><span data-dcnode-id="4637" instrument_node="">Call knew there was no point in arguing. That was what Augustus wanted: argument. He didn’t really care what the question was, and it made no great difference to him which side he was on. He just plain loved to argue, whereas Call hated to. Long experience had taught him that there was no winning arguments with Augustus, even in cases where there was a simple right and wrong at issue. Even in the old days, when they were in the thick of it, with Indians and hardcases to worry about, Augustus would seize any chance for a dispute. Practically the closest call they ever had, when the two of them and six Rangers got surprised by the Comanches up the Prairie Dog Fork of the Red and were all digging holes in the bank that could have turned out to be their graves if they hadn’t been lucky and got a cloudy night and sneaked away, Augustus had kept up a running argument with a Ranger they called Ugly Bobby. The argument was entirely about coon dogs, and Augustus had kept it up all night, though most of the Rangers were so scared they couldn’t pass water.</span><br data-dcnode-id="4636"><br data-dcnode-id="4635"><span data-dcnode-id="4634" instrument_node="">Of course the boy lapped up Augustus’s stories about riverboats and whores. The boy hadn’t been anywhere, so it was all romance to him.</span><br data-dcnode-id="4633"><br data-dcnode-id="4632"><span data-dcnode-id="4631" instrument_node="">“Listening to you brag about women don’t improve the taste of my food,” he said, finally.</span><br data-dcnode-id="4630"><br data-dcnode-id="4629"><span data-dcnode-id="4628" instrument_node="">“Call, if you want better food you have to start by shooting Bolivar,” Augustus said, reminded of his own grievance against the cook.</span><br data-dcnode-id="4627"><br data-dcnode-id="4626"><span data-dcnode-id="4625" instrument_node="">“Bol, I want you to quit whackin’ that bell with that crowbar,” he said. “You can do it at noon if you want to but let off doin’ it at night. A man with any sense can tell when it’s sundown. You’ve spoilt many a pretty evening for me, whackin’ that bell.”</span><br data-dcnode-id="4624"><br data-dcnode-id="4623"><span data-dcnode-id="4622" instrument_node="">Bolivar stirred his sugary coffee and held his peace. He whacked the dinner bell because he liked the sound, not because he wanted anybody to come and eat. The men could eat when they liked—he would whack the bell when </span><i data-dcnode-id="4620"><span data-dcnode-id="4621" instrument_node="">he</span></i><span data-dcnode-id="4619" instrument_node=""> liked. He enjoyed being a cook—it was a good deal more relaxing than being a bandit—but that didn’t mean that he intended to take orders. His sense of independence was undiminished.</span><br data-dcnode-id="4618"><br data-dcnode-id="4617"><span data-dcnode-id="4616" instrument_node="">“Gen-eral Lee freed the slaves,” he remarked in a surly tone.</span><br data-dcnode-id="4615"><br data-dcnode-id="4614"><span data-dcnode-id="4613" instrument_node="">Newt laughed. Bol never had been able to get the war straight, but he had been genuinely sorry when it ended. In fact, if it had kept going he would probably have stayed a bandit—it was a safe and profitable profession with most of the Texans gone. But the ones who came back from the war were mostly bandits themselves, and they had better guns. The profession immediately became overcrowded. Bolivar knew it was time to quit, but once in a while he got the urge for a little shooting.</span><br data-dcnode-id="4612"><br data-dcnode-id="4611"><span data-dcnode-id="4610" instrument_node="">“It wasn’t General Lee, it was Abe Lincoln who freed the slaves,” Augustus pointed out.</span><br data-dcnode-id="4609"><br data-dcnode-id="4608"><span data-dcnode-id="4607" instrument_node="">Bolivar shrugged. “No difference,” he said.</span><br data-dcnode-id="4606"><br data-dcnode-id="4605"><span data-dcnode-id="4604" instrument_node="">“A big difference,” Call said. “One was a Yankee and one wasn’t.”</span><br data-dcnode-id="4603"><br data-dcnode-id="4602"><span data-dcnode-id="4601" instrument_node="">Pea Eye got interested for a minute. The beans and sowbelly had revived him. He had been very interested in the notion of emancipation and had studied over it a lot while he went about his work. It was obviously just pure luck that he himself hadn’t been born a slave, but if he had been unlucky Lincoln would have freed him. It gave him a certain admiration for the man.</span><br data-dcnode-id="4600"><br data-dcnode-id="4599"><span data-dcnode-id="4598" instrument_node="">“He just freed Americans,” he pointed out to Bolivar.</span><br data-dcnode-id="4597"><br data-dcnode-id="4596"><span data-dcnode-id="4595" instrument_node="">Augustus snorted. “You’re in over your head, Pea,” he said. “Who Abe Lincoln freed was a bunch of Africans, no more American than Call here.”</span><br data-dcnode-id="4594"><br data-dcnode-id="4593"><span data-dcnode-id="4592" instrument_node="">Call pushed back his chair. He was not about to sit around arguing slavery after a long day, or after a short one either.</span><br data-dcnode-id="4591"><br data-dcnode-id="4590"><span data-dcnode-id="4589" instrument_node="">“I’m as American as the next,” he said, taking his hat and picking up a rifle.</span><br data-dcnode-id="4588"><br data-dcnode-id="4587"><span data-dcnode-id="4586" instrument_node="">“You was born in Scotland,” Augustus reminded him. “I know they brought you over when you was still draggin’ on the tit, but that don’t make you no less a Scot.”</span><br data-dcnode-id="4585"><br data-dcnode-id="4584"><span data-dcnode-id="4583" instrument_node="">Call didn’t reply. Newt looked up and saw him standing at the door, his hat on and his Henry in the crook of his arm. A couple of big moths flew past his head, drawn to the light of the kerosene lamp on the table. With nothing more said, the Captain went out the door.</span><br data-dcnode-id="4582"><br data-dcnode-id="4581"><span data-dcnode-id="4580" instrument_node="">© 1985 Larry McMurtry</span></p><span data-dcnode-id="4578" ins </span><div class="text--center text--medium mb-m" data-dcnode-id="4547"><b data-dcnode-id="4548"><span data-dcnode-id="4549" instrument_node="">From the Publisher</span></b></div><span data-dcnode-id="4546" instrument_node="">
</span><p class="text--center" data-dcnode-id="4539"><span data-dcnode-id="4545" instrument_node="">
“If you read only one western novel in your life, read </span><i data-dcnode-id="4543"><span data-dcnode-id="4544" instrument_node="">Lonesome Dove</span></i><span data-dcnode-id="4542" instrument_node="">.”—</span><i data-dcnode-id="4540"><span data-dcnode-id="4541" instrument_node="">USA Today</span></i></p><p data-dcnode-id="4532"><span data-dcnode-id="4538" instrument_node="">“Everything about </span><i data-dcnode-id="4536"><span data-dcnode-id="4537" instrument_node="">Lonesome Dove</span></i><span data-dcnode-id="4535" instrument_node=""> feels true . . . These are real people, and they are still larger than life.”—Nicholas Lemann, </span><i data-dcnode-id="4533"><span data-dcnode-id="4534" instrument_node="">The New York Times Book Review</span></i></p><p data-dcnode-id="4525"><span data-dcnode-id="4531" instrument_node="">“</span><i data-dcnode-id="4529"><span data-dcnode-id="4530" instrument_node="">Lonesome Dove</span></i><span data-dcnode-id="4528" instrument_node=""> is Larry McMurtry’s loftiest novel."—</span><i data-dcnode-id="4526"><span data-dcnode-id="4527" instrument_node="">Los Angeles Times</span></i></p><p data-dcnode-id="4521"><span data-dcnode-id="4524" instrument_node="">"A marvelous novel . . . moves with joyous energy . . . amply imagined and crisply, lovingly written. I haven't enjoyed a book more this year . . . a joyous epic."—</span><i data-dcnode-id="4522"><span data-dcnode-id="4523" instrument_node="">Newsweek</span></i></p><p data-dcnode-id="4514"><span data-dcnode-id="4520" instrument_node="">"The finest novel that McMurtry has yet accomplished . . . </span><i data-dcnode-id="4518"><span data-dcnode-id="4519" instrument_node="">Lonesome Dove</span></i><span data-dcnode-id="4517" instrument_node=""> has all the action anyone could possibly imagine . . . [and] both in general and in details, the authority of exact authenticity . . . superb."—</span><i data-dcnode-id="4515"><span data-dcnode-id="4516" instrument_node="">Chicago Tribune</span></i></p><span data-dcnode-id="4513" instrument_node="">
