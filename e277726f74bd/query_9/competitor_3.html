</span><p data-dcnode-id="4050"><span data-dcnode-id="4054" instrument_node="">The earliest version of the Equal Rights Amendment guaranteeing equal rights under the Constitution regardless of sex was proposed in 1923. However, it was not until 1972 that a version of the amendment was passed by Congress and sent to the states for ratification. In conjunction with the </span><em data-dcnode-id="4052"><span data-dcnode-id="4053" instrument_node="">Beyond the Vote</span></em><span data-dcnode-id="4051" instrument_node=""> exhibit, Dr. Jennifer Koslow, Associate Professor of History at Florida State University, will discuss the history of the Equal Rights Amendment and the effort to ratify the amendment nationally and in Florida.</span></p><span data-dcnode-id="4049" instrument_node="">
</span><p data-dcnode-id="4047"><span data-dcnode-id="4048" instrument_node="">This program is free and open to the public. Florida's History Shop and the Museum galleries are open until 7:30 p.m.</span></p><span data-dcnode-id="4046" instrument_node="">

</span><p data-dcnode-id="4007"><span data-dcnode-id="4008" instrument_node="">What type of government did Mission San Luis have? There was a blended one! &nbsp;The Apalachee and Spanish residents of the village had different ideas about the many things that a government should do, like how to run the village and how to interact with neighbors. At Mission San Luis, both the Apalachee and the Spanish brought parts of their governmental systems to the village. Come find out how on November 17!</span></p><span data-dcnode-id="4006" instrument_node="">
</span><p data-dcnode-id="4004"><span data-dcnode-id="4005" instrument_node="">Enjoy activities and a craft on your journey through political history! No Pre-Registration is required. Allow 2 or more hours to complete the activities so start by 1 pm or earlier.</span></p><span data-dcnode-id="4003" instrument_node="">

</span><p data-dcnode-id="3947"><span data-dcnode-id="3948" instrument_node="">Pine needle basketry is one of the oldest-known coiled basketry techniques, and one which many cultures have practiced. In this workshop, participants will learn the basic techniques of making coils from pine needles and stitching them together to make a simple basket. Enjoy the scent of a pine forest and the meditative act of coiling with us!</span></p><span data-dcnode-id="3946" instrument_node="">

</span><p data-dcnode-id="2626"><strong data-dcnode-id="2629"><span data-dcnode-id="2630" instrument_node="">History at High Noon—Two Regimes, </span></strong><strong data-dcnode-id="2627"><span data-dcnode-id="2628" instrument_node="">Museum of Florida History</span></strong></p><span data-dcnode-id="2625" instrument_node="">
</span><p data-dcnode-id="2621"><strong data-dcnode-id="2623"><span data-dcnode-id="2624" instrument_node="">Time:&nbsp;</span></strong><span data-dcnode-id="2622" instrument_node="">12:00 p.m.</span></p><span data-dcnode-id="2620" instrument_node="">
</span><p data-dcnode-id="2618"><span data-dcnode-id="2619" instrument_node="">Kelly Bowen, curator of the Two Regimes Collection, will discuss the Two Regimes exhibit currently on display in the R. A. Gray Building’s Gallery for Innovation and the Arts. Two Regimes is the life's work of two women: a mother, Teodora Verbitskaya (author) and her daughter, Nadia Werbitzky (professional artist). Teodora wrote about her family's life from 1927 to 1945 while living under the two regimes of Stalin and Hitler. Mother and daughter were survivors and witnesses of two genocides: that of the Holodomor (man-made Famine 1932- 33 under Stalin) and the Holocaust (1933-1945 under Hitler) while living in Mariupol, Soviet Ukraine. The Two Regimes Collection contains 118 paintings, 150 sketches and a manuscript - now a book published posthumously titled "Two Regimes ... A Mother's Memoir of Wartime Survival" by Teodora Verbitskaya.</span></p><span data-dcnode-id="2617" instrument_node="">

</span><p data-dcnode-id="2596"><strong data-dcnode-id="2598"><span data-dcnode-id="2599" instrument_node="">Time:&nbsp;</span></strong><span data-dcnode-id="2597" instrument_node="">10:00 a.m.- 12:00 p.m.</span></p><span data-dcnode-id="2595" instrument_node="">
</span><p data-dcnode-id="2593"><span data-dcnode-id="2594" instrument_node="">Join us for our most popular workshop: Pine-Needle Basket Making!</span></p><span data-dcnode-id="2592" instrument_node="">
</span><p data-dcnode-id="2590"><span data-dcnode-id="2591" instrument_node="">Pine needle basketry is one of the oldest-known coiled basketry techniques, and one which many cultures have practiced. In this workshop, participants will learn the basic techniques of making coils from pine needles and stitching them together to make a simple basket. Enjoy the scent of a pine forest and the meditative act of coiling with us!</span></p><span data-dcnode-id="2589" instrument_node="">

</span><p data-dcnode-id="2089"><span data-dcnode-id="2090" instrument_node="">Taylor County lies in the heart of Florida's Big Bend, a section of the Gulf still relatively untouched by large-scale development. Don't let its rural character fool you, however--the county's history is packed with as much excitement as you'll find in any other part of the state. In this program, local author Dr. Josh Goodman will discuss some highlights from his recently-published book, Forest Capital: A History of Taylor County Florida, looking especially at some unique aspects of Taylor County's past that are also crucial to understanding the broader history of Florida.</span></p><span data-dcnode-id="2088" instrument_node="">

</span><p data-dcnode-id="1842"><span data-dcnode-id="1843"><span data-dcnode-id="1844" instrument_node="">The Yamato Colony was a unique community founded at the turn of the twentieth century in southern Florida. Hoping to bring in new farming methods, and widely supported by government and railroad officials, a group of Japanese settlers established the community in what is now Boca Raton, Florida. To commemorate Asian American and Pacific Islander Month, we will be looking into the history and legacy of this Japanese community in Florida. We will also learn about and create origami Koinobori (carp streamers) in honor of Japan’s Children’s Day.</span></span></p><span data-dcnode-id="1841" instrument_node="">

</span><p data-dcnode-id="1737"><span data-dcnode-id="1738" instrument_node="">By the 1930s, millions of acres of Florida land were devastated by clear-cutting, poor farming practices, and phosphate mining. Many small farmers were destitute, and unemployment was widespread. Senior curator Michelle Hearn discusses the role of the Civilian Conservation Corps in massive reforestation efforts, the establishment of the Florida state park system, and infrastructure projects. About 40,000 young men would serve in Florida’s CCC units, allowing them to support their families during the Depression.</span></p><span data-dcnode-id="1736" instrument_node="">

</span><p data-dcnode-id="1661"><strong data-dcnode-id="1665"><u data-dcnode-id="1666"><span data-dcnode-id="1667" instrument_node="">The People of Territorial Florida Lecture Series,&nbsp;</span></u></strong><strong data-dcnode-id="1662"><u data-dcnode-id="1663"><span data-dcnode-id="1664" instrument_node="">Museum of Florida History</span></u></strong></p><span data-dcnode-id="1660" instrument_node="">

</span><p data-dcnode-id="1655"><span data-dcnode-id="1656" instrument_node="">This year marks the bicentennial of Florida becoming a U.S. Territory. To commemorate this important historical event, the Museum of Florida History is presenting a virtual lecture series that focuses on the diverse peoples living in Florida leading up to and during the Territorial Period and how their lives were affected by the transition from Spanish to American governance and policies.</span></p><span data-dcnode-id="1654" instrument_node="">
</span><p data-dcnode-id="1652"><span data-dcnode-id="1653" instrument_node="">Dr. Nashid Madyun, Director of the Meek-Eaton Black Archives at Florida A&amp;M University, discusses how for centuries Africans and their descendants held a precarious place in Florida society where freedom and slavery often existed side by side. Previously, runaways from British colonies, and later American states, sought the protection of the Spaniards and Catholicism. When Spain ceded Florida to the U.S. this protection disappeared. With the new government, a society built on slavery and plantation economics took firm hold on the territory ending the hope of freedom for Black communities for generations.</span></p><span data-dcnode-id="1651" instrument_node="">

</span><p data-dcnode-id="1623"><span data-dcnode-id="1624" instrument_node="">The virtual homeschool day lesson will identify some of the prominent Native Communities that were neighbors to the Apalachee and discuss their unique histories and cultures. Special attention will be given to language, pottery, clothing, and traditions that might vary from tribe to tribe. The lesson will cover the similarities and differences between the Native Communities and how they might have interacted with the Apalachee. Activities will include a worksheet, a language matching game, and a craft. Join our time traveling educators for this video adventure that will be posted on YouTube!</span></p><span data-dcnode-id="1622" instrument_node="">

</span><p data-dcnode-id="861"><strong data-dcnode-id="863"><span data-dcnode-id="866" instrument_node="">Virtual Homeschool: Spiritual Traditions at Mission San Luis, Mission San Luis</span><br data-dcnode-id="865"><br data-dcnode-id="864"></strong><span data-dcnode-id="862" instrument_node="">Time: 12:00 p.m. to conclusion</span></p><span data-dcnode-id="860" instrument_node="">
</span><p data-dcnode-id="857"><strong data-dcnode-id="858"><span data-dcnode-id="859" instrument_node="">Description:</span></strong></p><span data-dcnode-id="856" instrument_node="">
</span><p data-dcnode-id="854"><span data-dcnode-id="855" instrument_node="">Homeschool Lesson: "Spiritual Traditions at Mission San Luis"</span></p><span data-dcnode-id="853" instrument_node="">
</span><p data-dcnode-id="851"><span data-dcnode-id="852" instrument_node="">Materials will be available online indefinitely after February 17, 2021.</span></p><span data-dcnode-id="850" instrument_node="">
</span><p data-dcnode-id="848"><span data-dcnode-id="849" instrument_node="">-- Video with staff in period costume</span></p><span data-dcnode-id="847" instrument_node="">
</span><p data-dcnode-id="845"><span data-dcnode-id="846" instrument_node="">-- Lesson pdf with history and craft</span></p><span data-dcnode-id="844" instrument_node="">
</span><p data-dcnode-id="842"><span data-dcnode-id="843" instrument_node="">Mission San Luis was a Catholic Mission established by Spanish Franciscan Friars. The Apalachee Native Americans who lived in North Florida also had traditional belief systems and important ceremonies.</span></p><span data-dcnode-id="841" instrument_node="">
</span><p data-dcnode-id="839"><span data-dcnode-id="840" instrument_node="">How did religion and spiritual beliefs affect the daily lives of the Spanish and Apalachee people who lived at this 17th century Mission? Learn more about the San Luis community’s traditions!&nbsp;</span></p><span data-dcnode-id="838" instrument_node="">
</span><p data-dcnode-id="835"><a data-dcnode-id="836" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.facebook.com/events/544760673161553"><span data-dcnode-id="837" instrument_node="">https://www.facebook.com/events/544760673161553</span></a></p><span data-dcnode-id="834" instrument_node="">

</span><p data-dcnode-id="818"><strong data-dcnode-id="819"><span data-dcnode-id="820" instrument_node="">The People of Territorial Florida Lecture Series, Museum of Florida History</span></strong></p><span data-dcnode-id="817" instrument_node="">
</span><p data-dcnode-id="815"><span data-dcnode-id="816" instrument_node="">Time: 7:00 p.m.- conclusion</span></p><span data-dcnode-id="814" instrument_node="">
</span><p data-dcnode-id="812"><span data-dcnode-id="813" instrument_node="">Description:</span></p><span data-dcnode-id="811" instrument_node="">
</span><p data-dcnode-id="809"><span data-dcnode-id="810" instrument_node="">This year marks the bicentennial of the transfer of Florida from Spanish rule to U.S. control and becoming a U.S. Territory.&nbsp; To commemorate this important historical event, the Museum of Florida History is presenting a virtual lecture series that focuses on the diverse peoples living in Florida leading up to and during the Territorial Period and how their lives were affected by the transition from Spanish to American governance and policies.</span></p><span data-dcnode-id="808" instrument_node="">
</span><p data-dcnode-id="806"><span data-dcnode-id="807" instrument_node="">Marty Bowers, Education Coordinator at the Ah-Tah-Thi-Ki Museum and member of the Seminole Tribe, examines the struggle of Florida’s Native tribes which intensified following Florida becoming a U.S. Territory.&nbsp; Tribes like the Seminoles resisted and adapted as more settlers moved to the territory but ultimately, they were forced to retreat to undeveloped and undesirable parts of Florida to survive.</span></p><span data-dcnode-id="805" instrument_node="">
</span><p data-dcnode-id="802"><a data-dcnode-id="803" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.facebook.com/events/2848330235494628"><span data-dcnode-id="804" instrument_node="">https://www.facebook.com/events/2848330235494628</span></a></p><span data-dcnode-id="801" instrument_node="">
</span></td><td data-dcnode-id="797" style="width: 15.6671%; height: 434px;"><span data-dcnode-id="798" instrument_node="">DHR Event</span></td></tr><tr data-dcnode-id="761" style="height: 308px;"><td data-dcnode-id="791" style="width: 13.5602%; height: 308px;"><span data-dcnode-id="792" instrument_node="">02/16/21</span></td><td data-dcnode-id="766" style="width: 70.7726%; height: 308px;"><span data-dcnode-id="789" instrument_node="">
</span><p data-dcnode-id="786"><strong data-dcnode-id="787"><span data-dcnode-id="788" instrument_node="">Poetry in the Jazz Age, 6:30 p.m., Knott House Museum</span></strong></p><span data-dcnode-id="785" instrument_node="">
</span><p data-dcnode-id="783"><span data-dcnode-id="784" instrument_node="">Time: 6:30 p.m. to conclusion</span></p><span data-dcnode-id="782" instrument_node="">
</span><p data-dcnode-id="779"><strong data-dcnode-id="780"><span data-dcnode-id="781" instrument_node="">Description:</span></strong></p><span data-dcnode-id="778" instrument_node="">
</span><p data-dcnode-id="776"><span data-dcnode-id="777" instrument_node="">In 1928, Luella Knott wrote lovely metered poems with careful rhymes and musical works with similar precision. Elsewhere, free verse and musical improvisation were popular, reflecting the influence of the Jazz Poetry movement. To celebrate this vibrant era, "Poetry-in the Jazz Age" highlights literary and musical traditions of the period, with performer Yolanda J. Franklin reading from the classic jazz poets and her original work.</span></p><span data-dcnode-id="775" instrument_node="">

</span><p data-dcnode-id="742"><span data-dcnode-id="743" instrument_node="">Pine needle basketry is one of the oldest-known coiled basketry techniques, and one which many cultures have practiced. In this workshop participants will learn the basic techniques of making coils from pine needles and stitching them together with natural fibers to make a simple basket.</span></p><span data-dcnode-id="741" instrument_node="">
</span><p data-dcnode-id="739"><span data-dcnode-id="740" instrument_node="">When you register for the class, you will be provided with:</span></p><span data-dcnode-id="738" instrument_node="">
</span><ul data-dcnode-id="729"><span data-dcnode-id="737" instrument_node="">
</span><li data-dcnode-id="731"><span data-dcnode-id="736" instrument_node="">An introductory video on the history of pine needle basket making and collecting the necessary materials.</span><br data-dcnode-id="735"><span data-dcnode-id="734" instrument_node="">• Access to a Zoom meeting link for the “interactive” portion of the class with the instructor on February 13th. The interactive portion will focus on the technique of making the baskets.</span><br data-dcnode-id="733"><span data-dcnode-id="732" instrument_node="">• Materials for the class, which will be available at Mission San Luis the day before the course (February 12) for those who have registered.</span></li><span data-dcnode-id="730" instrument_node="">
</span></ul><span data-dcnode-id="728" instrument_node="">
</span><p data-dcnode-id="726"><span data-dcnode-id="727" instrument_node="">To register for the class, please call 850-245-6484. We will be able to process the $10 payment over the phone. THE DEADLINE for registering is FEB 10th.</span></p><span data-dcnode-id="725" instrument_node="">
