Design: An analysis of the issues surrounding the poor attention paid to the history of public health by its current practitioners.

Setting: The paper is written from the perspective of practitioners in the UK but has wide applicability.

Main results: The paper makes the case that the current neglect of public health history is to the detriment of public health practice.

</span><div class="pane-content" data-dcnode-id="1863"><span data-dcnode-id="1874" instrument_node="">
</span><div class="highwire-list-wrapper" data-dcnode-id="1865"><div class="highwire-list" data-dcnode-id="1866"><ul data-dcnode-id="1867"><li data-dcnode-id="1871"><a class="button linked_art_jump" data-dcnode-id="1872" data-hide-link-title="0" data-icon-position="" href="#linked-articles"><span data-dcnode-id="1873" instrument_node="">Linked Articles</span></a></li><li data-dcnode-id="1868"><a class="button rp_jump" data-dcnode-id="1869" data-hide-link-title="0" data-icon-position="" href="#request-permissions"><span data-dcnode-id="1870" instrument_node="">Request Permissions</span></a></li></ul></div></div><span data-dcnode-id="1864" instrument_node=""> </span></div><span data-dcnode-id="1862" instrument_node="">
</span></div><span data-dcnode-id="1860" instrument_node="">
</span><div class="panel-separator" data-dcnode-id="1859"></div><div class="panel-pane pane-highwire-markup" data-dcnode-id="692"><span data-dcnode-id="1858" instrument_node="">
</span><div class="pane-content" data-dcnode-id="694"><span data-dcnode-id="1857" instrument_node="">
</span><div class="highwire-markup" data-dcnode-id="696"><div class="content-block-markup" data-dcnode-id="699" xmlns="http://www.w3.org/1999/xhtml" xmlns:xhtml="http://www.w3.org/1999/xhtml"><div class="article fulltext-view" data-dcnode-id="701"><span class="highwire-journal-article-marker-start" data-dcnode-id="1856"></span><ul class="kwd-group KWD" data-dcnode-id="1846"><li class="kwd" data-dcnode-id="1853"><a class="hw-term hw-article-keyword hw-article-keyword-history" data-dcnode-id="1854" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//jech.bmj.com/search/%2520text_abstract_title%253Ahistory%2520text_abstract_title_flags%253Amatch-phrase%2520sort%253Apublication-date" rel="nofollow"><span data-dcnode-id="1855" instrument_node="">history</span></a></li><li class="kwd" data-dcnode-id="1850"><a class="hw-term hw-article-keyword hw-article-keyword-public-health" data-dcnode-id="1851" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//jech.bmj.com/keyword/public-health" rel="nofollow"><span data-dcnode-id="1852" instrument_node="">public health</span></a></li><li class="kwd" data-dcnode-id="1847"><a class="hw-term hw-article-keyword hw-article-keyword-professional-development" data-dcnode-id="1848" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//jech.bmj.com/search/%2520text_abstract_title%253Aprofessional%252Bdevelopment%2520text_abstract_title_flags%253Amatch-phrase%2520sort%253Apublication-date" rel="nofollow"><span data-dcnode-id="1849" instrument_node="">professional development</span></a></li></ul><div class="section" data-dcnode-id="1831" id="sec-1"><span data-dcnode-id="1845" instrument_node="">
</span><p data-dcnode-id="1840" id="p-6"><span data-dcnode-id="1844" instrument_node="">
</span><q data-dcnode-id="1842" id="disp-quote-1"><span data-dcnode-id="1843" instrument_node="">“The only thing new in the world is the history you don’t know.” (Harry S Truman 1884–1972)</span></q><span data-dcnode-id="1841" instrument_node="">
</span></p><span data-dcnode-id="1839" instrument_node="">
</span><p data-dcnode-id="1833" id="p-8"><span data-dcnode-id="1838" instrument_node="">It is quite possible for public health practitioners in Britain to go through their professional training and spend their working lives without developing an understanding of the history of public health. In recent years the 150th anniversary in Britain of the passage into law of the 1848 Public Health Acts has raised awareness of the sanitary revolution and its background in the squalor of Victorian Britain. Nevertheless, while many practitioners will have gained some knowledge of stories about public health ‘heroes’ such as John Snow, it is unusual for practitioners to have the opportunity to develop an understanding of the broad sweep of public health history. Indeed the preoccupation with the acts of great individuals (almost inevitably men) produces a distorted view. As the historian E H Carr said when he delivered the George Macaulay Trevelyan lectures in 1961: “…we shall arrive at no real understanding either of the past or of the present if we attempt to operate with the concept of an abstract individual standing outside society”.</span><a class="xref-ref" data-dcnode-id="1835" href="#ref-1" id="xref-ref-1-1"><sup data-dcnode-id="1836"><span data-dcnode-id="1837" instrument_node="">1</span></sup></a><span data-dcnode-id="1834" instrument_node=""> This unsatisfactory situation is reflected in that public health history is also rarely represented as a strand within the content of professional journals or programmes of continuing professional development.</span></p><span data-dcnode-id="1832" instrument_node="">
</span></div><div class="section" data-dcnode-id="1814" id="sec-2"><span data-dcnode-id="1830" instrument_node="">
</span><h2 data-dcnode-id="1828"><span data-dcnode-id="1829" instrument_node="">WHY ARE WE A HISTORIC?</span></h2><span data-dcnode-id="1827" instrument_node="">
</span><p data-dcnode-id="1825" id="p-9"><span data-dcnode-id="1826" instrument_node="">There would seem to be three factors that might explain the limited attention paid to the history of public health by its specialist practitioners in Britain.</span></p><span data-dcnode-id="1824" instrument_node="">
</span><p data-dcnode-id="1822" id="p-10"><span data-dcnode-id="1823" instrument_node="">Firstly, and perhaps most significantly, is the degree of discontinuity in the organisational and professional arrangements for public health medicine. The changes in title from public health to community medicine and back to public health, added to the removal in the 1970s of the medical aspects of public health from local government to the NHS, have contributed to a loss of professional memory and tradition.</span></p><span data-dcnode-id="1821" instrument_node="">
</span><p data-dcnode-id="1819" id="p-11"><span data-dcnode-id="1820" instrument_node="">Secondly, as a result of the shift from local government, public health practitioners in the NHS have been orientated towards issues surrounding the provision of personal health services rather than towards the broad economic, environmental, and social determinants of health. It is these broad determinants of health and their effects upon the health of the population that form a substantial backdrop to the history of public health. With a professional engagement that deals mostly with issues involving the provision of personal health services, it is not surprising that public health history that is largely, but not completely, located outside personal health services issues is neglected.</span></p><span data-dcnode-id="1818" instrument_node="">
</span><p data-dcnode-id="1816" id="p-12"><span data-dcnode-id="1817" instrument_node="">Thirdly, the rapid turnover in the public health workforce that has been provoked by multiple NHS organisational changes has meant that many practitioners whose professional lives have spanned several eras have taken early retirement. This loss of personal knowledge has not been compensated for in the production of written and documented historical analysis.</span></p><span data-dcnode-id="1815" instrument_node="">
</span></div><div class="section" data-dcnode-id="1628" id="sec-3"><span data-dcnode-id="1813" instrument_node="">
</span><h2 data-dcnode-id="1811"><span data-dcnode-id="1812" instrument_node="">IS IT IMPORTANT TO POSSESS A HISTORICAL PERSPECTIVE?</span></h2><span data-dcnode-id="1810" instrument_node="">
</span><h3 data-dcnode-id="1808"><span data-dcnode-id="1809" instrument_node="">Improving our mastery over the present</span></h3><span data-dcnode-id="1807" instrument_node="">
</span><p data-dcnode-id="1795" id="p-13"><span data-dcnode-id="1806" instrument_node="">According to Carr history offers a dual function, to enable men and women to understand the society of the past and to increase their mastery over the society of the present.</span><a class="xref-ref" data-dcnode-id="1803" href="#ref-1" id="xref-ref-1-2"><sup data-dcnode-id="1804"><span data-dcnode-id="1805" instrument_node="">1</span></sup></a><span data-dcnode-id="1802" instrument_node=""> Historian John Tosh in </span><em data-dcnode-id="1800"><span data-dcnode-id="1801" instrument_node="">The Pursuit of History</span></em><span data-dcnode-id="1799" instrument_node=""> wrote, “To know about the past is to know that things have not always been as they are now, and by implication that they need not remain the same in future”.</span><a class="xref-ref" data-dcnode-id="1796" href="#ref-2" id="xref-ref-2-1"><sup data-dcnode-id="1797"><span data-dcnode-id="1798" instrument_node="">2</span></sup></a></p><span data-dcnode-id="1794" instrument_node="">
</span><p data-dcnode-id="1788" id="p-14"><span data-dcnode-id="1793" instrument_node="">One of the characteristics of public health practice is that the timescale within which ill or beneficial health effects are seen, is often protracted. There are, of course, exceptions to this, such as with some acute communicable diseases. However, if we are to improve our mastery over the present it should not be forgotten that there are historical changes in the nature and ecology of communicable diseases that are of relevance to planning for the future.</span><a class="xref-ref" data-dcnode-id="1790" href="#ref-3" id="xref-ref-3-1"><sup data-dcnode-id="1791"><span data-dcnode-id="1792" instrument_node="">3</span></sup></a><span data-dcnode-id="1789" instrument_node=""> In general the observation of population health over a substantial period of time is a pre-requisite for the evaluation of progress, or lack of it, in improving health.</span></p><span data-dcnode-id="1787" instrument_node="">
</span><p data-dcnode-id="1785" id="p-15"><span data-dcnode-id="1786" instrument_node="">The re-examination and updating of historical datasets has been used as a means of elucidating the effect of early life events on long term health experience. Such epidemiological archaeology may, however, lead to a concentration on individual orientated causative factors of separate diseases and ignore the social and political content in which human communities exist. While not denying the importance of “risk factorology” the science of public health practice requires as much attention as the science of epidemiology.</span></p><span data-dcnode-id="1784" instrument_node="">
</span><p data-dcnode-id="1782" id="p-16"><span data-dcnode-id="1783" instrument_node="">The understanding of how public health practitioners can influence the health of human communities requires a knowledge of how public health practice has evolved, its successes and failures, its highs and lows. The design of interventions such as health action zones, projects aimed at improving the health status of the population in the most deprived areas, in England has strong parallels with the innovative approaches introduced by the 1848 Public Health Acts, the first national public health legislation in Britain, and there are many other historical parallels to contemporary public health initiatives.</span></p><span data-dcnode-id="1781" instrument_node="">
</span><p data-dcnode-id="1775" id="p-17"><span data-dcnode-id="1780" instrument_node="">Carr highlighted the way history recognises what he called “delayed achievement”, the apparent failures of today may turn out to have made a vital contribution to the achievement of tomorrow, “prophets born before their time”.</span><a class="xref-ref" data-dcnode-id="1777" href="#ref-1" id="xref-ref-1-3"><sup data-dcnode-id="1778"><span data-dcnode-id="1779" instrument_node="">1</span></sup></a><span data-dcnode-id="1776" instrument_node=""> Historical awareness helps us to be alert to the resurgence of practice that has held sway in the past but been out of fashion in more recent times.</span></p><span data-dcnode-id="1774" instrument_node="">
</span><p data-dcnode-id="1769" id="p-18"><span data-dcnode-id="1773" instrument_node="">When “partnership working” was introduced in 1997 by the newly elected Labour government in Britain the idea seemed radical to those who had operated a market led system for the past decade. Yet the notion of a network of organisations collaborating to promote health, prevent ill health, and provide health services was not new—there was simply a fresh emphasis being placed on its importance. Before the introduction of the NHS in 1948, a network of services existed that relied on their interaction with each other and included: the private sector in the form of voluntary hospitals, private medical practitioners and commercial organisations; the public sector in the form of municipal hospitals and community health services run by local government alongside sanitary and environmental health services; and the voluntary sector that provided health services.</span><a class="xref-ref" data-dcnode-id="1770" href="#ref-4" id="xref-ref-4-1"><sup data-dcnode-id="1771"><span data-dcnode-id="1772" instrument_node="">4</span></sup></a></p><span data-dcnode-id="1768" instrument_node="">
</span><p data-dcnode-id="1766" id="p-19"><span data-dcnode-id="1767" instrument_node="">The complexity of the pre-NHS era in Britain is a reminder that while the political, social, legislative, and organisational landscape may look considerably different now, taking action on the determinants of health still requires negotiating a complex network of organisational and political structures. We can look back and learn from some of what worked or didn’t in previous collaborations.</span></p><span data-dcnode-id="1765" instrument_node="">
</span><p data-dcnode-id="1760" id="p-20"><span data-dcnode-id="1764" instrument_node="">In chronic disease epidemiology greater attention has been paid in recent years to possible risk factors in childhood rather than solely concentrating on adult risk factors, particularly aspects of lifestyle such as smoking, diet, and lack of physical exercise. This development of “life course epidemiology” is a return to a concept prevalent in the first half of the 20th century that early life experiences influence adult vitality and mortality risk. The rise of the “epidemics” of coronary heart disease and lung cancer in the interwar period shifted attention to the aetiology of specific chronic diseases. In the early post-war period adult risk factors tended to be emphasised because of the interests of cardiologists and physiologists initiating cardiovascular epidemiology.</span><a class="xref-ref" data-dcnode-id="1761" href="#ref-5" id="xref-ref-5-1"><sup data-dcnode-id="1762"><span data-dcnode-id="1763" instrument_node="">5</span></sup></a></p><span data-dcnode-id="1759" instrument_node="">
</span><p data-dcnode-id="1757" id="p-21"><span data-dcnode-id="1758" instrument_node="">An appreciation of what has gone before enables us to see why similar approaches lost favour in the past and assess the validity and appropriateness of revisiting old approaches and using them to stimulate new innovations.</span></p><span data-dcnode-id="1756" instrument_node="">
</span><p data-dcnode-id="1754" id="p-22"><span data-dcnode-id="1755" instrument_node="">An understanding of the rich and diverse history of public health cannot only support contemporary innovation but can help reduce the risk of public health practice being too narrowly focused on specific influences on the health of individuals rather than maintaining an overview of the full range of factors at work across a population. It is, however, important to remember that what history provides is a useful benchmark and knowledge base rather than a fit for purpose solution.</span></p><span data-dcnode-id="1753" instrument_node="">
</span><h3 data-dcnode-id="1751"><span data-dcnode-id="1752" instrument_node="">Strengthening the identity of public health</span></h3><span data-dcnode-id="1750" instrument_node="">
</span><p data-dcnode-id="1741" id="p-23"><span data-dcnode-id="1749" instrument_node="">A sobering thought for public health professionals is Carr’s view that “A society which has lost belief in its capacity to progress in the future will quickly cease to concern itself with its progress in the past”.</span><a class="xref-ref" data-dcnode-id="1746" href="#ref-1" id="xref-ref-1-4"><sup data-dcnode-id="1747"><span data-dcnode-id="1748" instrument_node="">1</span></sup></a><span data-dcnode-id="1745" instrument_node=""> Tosh also saw the importance of history in building social identity when he wrote, “History is a collective memory, the storehouse of experience through which people develop a sense of their social identity and their future prospects. People who profess to ignore history are nevertheless compelled to make historical assumptions at every turn”.</span><a class="xref-ref" data-dcnode-id="1742" href="#ref-2" id="xref-ref-2-2"><sup data-dcnode-id="1743"><span data-dcnode-id="1744" instrument_node="">2</span></sup></a></p><span data-dcnode-id="1740" instrument_node="">
</span><p data-dcnode-id="1735" id="p-24"><span data-dcnode-id="1739" instrument_node="">Jane Lewis has put forward a view that during the first three quarters of the 20th century public health was characterised by its failure to define its fundamental identity and purpose and its tendency to call whatever activities it undertook “public health”. She has portrayed a field of endeavour buffeted by political and structural changes, undergoing rapid changes of title and suffering from a lack of professional status.</span><a class="xref-ref" data-dcnode-id="1736" href="#ref-6" id="xref-ref-6-1"><sup data-dcnode-id="1737"><span data-dcnode-id="1738" instrument_node="">6</span></sup></a></p><span data-dcnode-id="1734" instrument_node="">
</span><p data-dcnode-id="1729" id="p-25"><span data-dcnode-id="1733" instrument_node="">Berridge has highlighted the tension between the duality of the role of public health with its focus on prevention and health promotion and its inability to escape from its link to planning and management of personal health services.</span><a class="xref-ref" data-dcnode-id="1730" href="#ref-7" id="xref-ref-7-1"><sup data-dcnode-id="1731"><span data-dcnode-id="1732" instrument_node="">7</span></sup></a></p><span data-dcnode-id="1728" instrument_node="">
</span><p data-dcnode-id="1726" id="p-26"><span data-dcnode-id="1727" instrument_node="">Understanding the factors behind this duality and placing current practice, organisational structures, political and public health philosophies within a historical framework can help us to resolve the tensions that exist within our field and increase our sense of identity and purpose. Increasing our understanding of public health history can improve our insight into the way in which we fit into the wider picture and serve to embolden us in our navigation of the political and organisational structures that exist today.</span></p><span data-dcnode-id="1725" instrument_node="">
</span><p data-dcnode-id="1720" id="p-27"><span data-dcnode-id="1724" instrument_node="">Action on Smoking and Health is a UK based public health advocacy organisation with a strong sense of the importance of practitioners understanding the history of the campaign to reduce smoking related deaths. Its web site contains a wealth of documents, including a useful chronology, that gives practitioners a sense of their contribution to a historic struggle while also providing practical information to enable them to learn from the efforts of others.</span><a class="xref-ref" data-dcnode-id="1721" href="#ref-8" id="xref-ref-8-1"><sup data-dcnode-id="1722"><span data-dcnode-id="1723" instrument_node="">8</span></sup></a></p><span data-dcnode-id="1719" instrument_node="">
</span><p data-dcnode-id="1713" id="p-28"><span data-dcnode-id="1718" instrument_node="">Hamlin and Sheard have identified that among the hardest of a historian’s jobs is to understand how people move from hope for a different future to practical actions that secure it.</span><a class="xref-ref" data-dcnode-id="1715" href="#ref-9" id="xref-ref-9-1"><sup data-dcnode-id="1716"><span data-dcnode-id="1717" instrument_node="">9</span></sup></a><span data-dcnode-id="1714" instrument_node=""> Public health professional training is steeped in analysis and practical action, what is sometimes missing is a shared hope or vision. Deepening professional understanding of the past can assist the process of developing such a vision for the future.</span></p><span data-dcnode-id="1712" instrument_node="">
</span><h3 data-dcnode-id="1710"><span data-dcnode-id="1711" instrument_node="">Understanding public health in a political context</span></h3><span data-dcnode-id="1709" instrument_node="">
</span><p data-dcnode-id="1699" id="p-29"><span data-dcnode-id="1708" instrument_node="">Health historians Berridge</span><a class="xref-ref" data-dcnode-id="1705" href="#ref-7" id="xref-ref-7-2"><sup data-dcnode-id="1706"><span data-dcnode-id="1707" instrument_node="">7</span></sup></a><span data-dcnode-id="1704" instrument_node=""> and Porter</span><a class="xref-ref" data-dcnode-id="1701" href="#ref-10" id="xref-ref-10-1"><sup data-dcnode-id="1702"><span data-dcnode-id="1703" instrument_node="">10</span></sup></a><span data-dcnode-id="1700" instrument_node=""> have both called for greater attention to be paid to the asking of broader questions when looking at the history of public health with the object of generating a greater depth of understanding of issues. Porter, in particular, has highlighted the need to consider population health as a political phenomenon in different periods. It is interesting to look back at chronologies of public health history and then explore the political and social factors at work behind surges in legislative activity, action on a particular issue and swings in public opinion that have translated into health improvements. Understanding the factors at work behind significant developments can teach us a great deal about the many influences we need to consider and the timescale of change that we may face in delivering health improvements. From a 21st century standpoint, there often seem to be long gaps between advances in knowledge or shifts in public opinion and the taking of action that results in health improvement.</span></p><span data-dcnode-id="1698" instrument_node="">
</span><p data-dcnode-id="1681" id="p-30"><span data-dcnode-id="1697" instrument_node="">If we take the issue of health inequalities in Britain as an example, the time between McGonigle and Kirby’s publication of </span><em data-dcnode-id="1695"><span data-dcnode-id="1696" instrument_node="">Poverty and Public Health</span></em><span data-dcnode-id="1694" instrument_node=""> in 1936, which showed that poverty inevitably led to malnutrition, Titmuss’s </span><em data-dcnode-id="1692"><span data-dcnode-id="1693" instrument_node="">Poverty and Population: A Factual Study of Contemporary Social Waste,</span></em><span data-dcnode-id="1691" instrument_node=""> which used disease and mortality figures to calculate the excess of disease and death in the poorer regions in 1938, and the Black Report, famous for being published tardily by the Department of Health in 1980, seems vast. Again we have to wait another 15 years before the Department produced </span><em data-dcnode-id="1689"><span data-dcnode-id="1690" instrument_node="">Variations in Health: What Can the Department of Health Do?</span></em><span data-dcnode-id="1688" instrument_node="">, which proposed setting specific objectives for reducing variations. In recent years things have moved on considerably in terms of action to tackle health inequalities with the publication of </span><em data-dcnode-id="1686"><span data-dcnode-id="1687" instrument_node="">Our Healthier Nation: A Contract for Health</span></em><span data-dcnode-id="1685" instrument_node=""> in 1998, which acknowledged the influence of adverse social, economic, and environmental factors as causes of health.</span><a class="xref-ref" data-dcnode-id="1682" href="#ref-11" id="xref-ref-11-1"><sup data-dcnode-id="1683"><span data-dcnode-id="1684" instrument_node="">11</span></sup></a></p><span data-dcnode-id="1680" instrument_node="">
</span><p data-dcnode-id="1669" id="p-31"><span data-dcnode-id="1679" instrument_node="">Similarly if you look at key dates in the history of anti-tobacco campaigning, the length of gaps between significant developments can seem extraordinary for those of us in a hurry to tackle the continuing “epidemic” of smoking related disease. London physician John Hill performed possibly the first clinical study of tobacco effects and warned snuff users that they were vulnerable to cancers of the nose as far back as 1761. The </span><em data-dcnode-id="1677"><span data-dcnode-id="1678" instrument_node="">Lancet</span></em><span data-dcnode-id="1676" instrument_node=""> was debating the health effects of tobacco in 1856 and UK parliament passed the Railway Bill mandating smoke free carriages to prevent injury to non-smokers in 1868. Adler made the first strong connection between lung cancer and smoking in 1912 but then we skip to Doll and Bradford Hill’s first large scale epidemiological study of the relation between smoking and lung cancer in 1951. A landmark was the 1962 Royal College of Physician’s report </span><em data-dcnode-id="1674"><span data-dcnode-id="1675" instrument_node="">Smoking and Health</span></em><span data-dcnode-id="1673" instrument_node=""> and its recommendations for the restriction of tobacco advertising, more restrictions on their sale to children and smoking in public places, and more information on the tar/nicotine content of cigarettes. Yet the second half of the 20th century is a story of real strides being made by anti-tobacco activists through new evidence, innovative and well organised campaigning, changes in public opinion but still the inability to deliver end goals because of the power, influence, and global reach of the tobacco industry. The highs and lows of this story are as gripping as any in public health but the message for today’s practitioners is to consider the timescale and effort entailed in continually chipping away at vested interests.</span><a class="xref-ref" data-dcnode-id="1670" href="#ref-12" id="xref-ref-12-1"><sup data-dcnode-id="1671"><span data-dcnode-id="1672" instrument_node="">12</span></sup></a></p><span data-dcnode-id="1668" instrument_node="">
</span><p data-dcnode-id="1663" id="p-32"><span data-dcnode-id="1667" instrument_node="">Most public health campaigns entail overcoming the resistance of vested interests whether political, commercial, or social. History provides many important examples of the factors that contribute to policy change including seat belts and the car industry, and silicosis and asbestos and industry. The history of silicosis and environmental disease policy highlights the impact of public health philosophy and practice of the time—that is, the shift in attention from infectious to chronic disease in the 20th century, the role of organised labour and their judgements about the importance of workers health vis a vis jobs, the affects of different economic climates, the role of key reformers and statisticians, the impact of particular “disasters”, and the role of the media in bringing the issue to public attention. It also highlights the different approach taken to health issues affecting a particular population group such as industrial workers and that taken by an issue relating to a broader population such as asbestos.</span><a class="xref-ref" data-dcnode-id="1664" href="#ref-13" id="xref-ref-13-1"><sup data-dcnode-id="1665"><span data-dcnode-id="1666" instrument_node="">13</span></sup></a></p><span data-dcnode-id="1662" instrument_node="">
</span><p data-dcnode-id="1649" id="p-33"><span data-dcnode-id="1661" instrument_node="">Although, as noted above, communicable diseases declined in importance in western countries in the 20th century the problems did not disappear and the lessons learned are of contemporary relevance. Perdiguero and colleagues have used the examples of malaria and influenza in Spain to argue that the use of history can improve epidemiology and the design of causality models.</span><a class="xref-ref" data-dcnode-id="1658" href="#ref-14" id="xref-ref-14-1"><sup data-dcnode-id="1659"><span data-dcnode-id="1660" instrument_node="">14</span></sup></a><span data-dcnode-id="1657" instrument_node=""> The problem of HIV and AIDS is an enormous challenge in terms of the global burden of ill health. This is particularly true for the continent of Africa where the problem is devastating. In South Africa the issues of causation and treatment have been at the centre of political debate.</span><a class="xref-ref" data-dcnode-id="1654" href="#ref-15" id="xref-ref-15-1"><sup data-dcnode-id="1655"><span data-dcnode-id="1656" instrument_node="">15</span></sup></a><span data-dcnode-id="1653" instrument_node=""> An attempt to understand the reasons why the issues have developed in the way they have in South Africa is unlikely to be successful without an understanding of how sexually transmitted diseases, and syphilis in particular, have in the past played a key part in the creation of the infamous pass laws and the development of apartheid.</span><a class="xref-ref" data-dcnode-id="1650" href="#ref-16" id="xref-ref-16-1"><sup data-dcnode-id="1651"><span data-dcnode-id="1652" instrument_node="">16</span></sup></a></p><span data-dcnode-id="1648" instrument_node="">
</span><p data-dcnode-id="1643" id="p-34"><span data-dcnode-id="1647" instrument_node="">The ability to learn from domestic and international historical examples has been explored by political scientists in relation to health policy reform. One of the ways they overcome the challenges of comparative historical studies is to focus on a limited number of variables. The conclusion drawn by Marmor is that there are two benefits from this sort of comparison, what can be learned from countries where conditions are comparable and policy generalisation that holds over many divergent cases where there is some powerful factor at work.</span><a class="xref-ref" data-dcnode-id="1644" href="#ref-17" id="xref-ref-17-1"><sup data-dcnode-id="1645"><span data-dcnode-id="1646" instrument_node="">17</span></sup></a></p><span data-dcnode-id="1642" instrument_node="">
</span><p data-dcnode-id="1640" id="p-35"><span data-dcnode-id="1641" instrument_node="">If we look at the history of public health campaigns common factors emerge, which need to inform our own work. The key ingredients for any policy change that leads to improvements in health are: dissatisfaction, reformers, political support, and public awareness. But to learn from the history of these campaigns they need to be captured in a way that is accessible to practitioners so that historical scoping exercises can become embedded into the early stages of practitioners’ work planning. Historians also need to consider the policy considerations occupying the attentions of practitioners to assist them in learning from the past.</span></p><span data-dcnode-id="1639" instrument_node="">
</span><p data-dcnode-id="1630" id="p-36"><span data-dcnode-id="1638" instrument_node="">The USA has a strong tradition of public health history thanks to the efforts of Henry E Sigerist and George Rosen during the 20th century. As editor of the </span><em data-dcnode-id="1636"><span data-dcnode-id="1637" instrument_node="">American Journal of Public Health</span></em><span data-dcnode-id="1635" instrument_node="">, Rosen urged public health workers to play a political part and to collaborate with social scientists while Sigerist also tried to inspire doctors to be activists to improve social conditions.</span><a class="xref-ref" data-dcnode-id="1632" href="#ref-18" id="xref-ref-18-1"><sup data-dcnode-id="1633"><span data-dcnode-id="1634" instrument_node="">18</span></sup></a><span data-dcnode-id="1631" instrument_node=""> The importance of practitioners understanding their political role is essential if they are to lobby more forcefully for the changes that will have real impact on the health of their communities.</span></p><span data-dcnode-id="1629" instrument_node="">
</span></div><div class="section" data-dcnode-id="1539" id="sec-7"><span data-dcnode-id="1627" instrument_node="">
</span><h2 data-dcnode-id="1625"><span data-dcnode-id="1626" instrument_node="">HOW SHOULD WE REDRESS THE BALANCE?</span></h2><span data-dcnode-id="1624" instrument_node="">
</span><p data-dcnode-id="1622" id="p-37"><span data-dcnode-id="1623" instrument_node="">The history of public health provides a very useful vehicle for teaching the principles of public health. An understanding of the broad sweep of that history should be a component of the basic training of all health professionals. This is particularly so in respect of those who will have a population and preventative aspect to their work, such as environmental health officials, general practitioners, health visitors, school nurses, and midwives. Considering the interplay of fact and interpretation in history provides good training for analysing currently accepted belief and practice, which can assist professionals in challenging that which is no longer appropriate or relevant.</span></p><span data-dcnode-id="1621" instrument_node="">
</span><p data-dcnode-id="1615" id="p-38"><span data-dcnode-id="1620" instrument_node="">Marx and Engels held that “History does nothing, it possesses no immense wealth, fights no battles. It is rather man, real living man, who does everything, who possesses and fights”.</span><a class="xref-ref" data-dcnode-id="1617" href="#ref-19" id="xref-ref-19-1"><sup data-dcnode-id="1618"><span data-dcnode-id="1619" instrument_node="">19</span></sup></a><span data-dcnode-id="1616" instrument_node=""> History consigned to the margins may be able to do nothing, but public health practitioners equipped with insight and understanding about the impact of political and social developments on the evolution of public health practice are better armed to fight the many skirmishes that still lay ahead in the battle to improve population health.</span></p><span data-dcnode-id="1614" instrument_node="">
</span><p data-dcnode-id="1612" id="p-39"><span data-dcnode-id="1613" instrument_node="">For those intending to pursue a long term career in public health, history should be an important component of postgraduate academic training.</span></p><span data-dcnode-id="1611" instrument_node="">
</span><p data-dcnode-id="1609" id="p-40"><span data-dcnode-id="1610" instrument_node="">The history of public health should be:</span></p><span data-dcnode-id="1608" instrument_node="">
</span><p data-dcnode-id="1606"><span data-dcnode-id="1607" instrument_node="">
</span></p><ul class="list-unord" data-dcnode-id="1580" id="list-1"><li data-dcnode-id="1601" id="list-item-1"><span data-dcnode-id="1605" instrument_node="">
</span><p data-dcnode-id="1603" id="p-42"><span data-dcnode-id="1604" instrument_node="">Included in the undergraduate curriculums of health professionals;</span></p><span data-dcnode-id="1602" instrument_node="">
</span></li><li data-dcnode-id="1596" id="list-item-2"><span data-dcnode-id="1600" instrument_node="">
</span><p data-dcnode-id="1598" id="p-43"><span data-dcnode-id="1599" instrument_node="">An important component of masters level public health courses;</span></p><span data-dcnode-id="1597" instrument_node="">
</span></li><li data-dcnode-id="1591" id="list-item-3"><span data-dcnode-id="1595" instrument_node="">
</span><p data-dcnode-id="1593" id="p-44"><span data-dcnode-id="1594" instrument_node="">Part of the curriculum for examinations of professional bodies in the public health field;</span></p><span data-dcnode-id="1592" instrument_node="">
</span></li><li data-dcnode-id="1586" id="list-item-4"><span data-dcnode-id="1590" instrument_node="">
</span><p data-dcnode-id="1588" id="p-45"><span data-dcnode-id="1589" instrument_node="">A regular strand in public health journals;</span></p><span data-dcnode-id="1587" instrument_node="">
</span></li><li data-dcnode-id="1581" id="list-item-5"><span data-dcnode-id="1585" instrument_node="">
</span><p data-dcnode-id="1583" id="p-46"><span data-dcnode-id="1584" instrument_node="">The subject of specialised postgraduate programmes, available for those with a particular interest.</span></p><span data-dcnode-id="1582" instrument_node="">
</span></li></ul><p data-dcnode-id="1578"><span data-dcnode-id="1579" instrument_node="">
</span></p><span data-dcnode-id="1577" instrument_node="">
</span><p data-dcnode-id="1575" id="p-47"><span data-dcnode-id="1576" instrument_node="">Those privileged to have been taught by the late Sidney Chave at the London School of Hygiene and Tropical Medicine as part of masters level programmes will be aware of how interesting and informative such teaching can be. His engaging style and fund of detailed knowledge impressed students from successive generations. However, the provision of such excellent teaching needs to be universal if masters level programmes are to fulfil their role in producing educated practitioners.</span></p><span data-dcnode-id="1574" instrument_node="">
</span><p data-dcnode-id="1572" id="p-48"><span data-dcnode-id="1573" instrument_node="">There should be an expectation of those responsible for the setting of curriculums for public health professional examinations that they will include a historical component. It is regrettable that none of the mainstream public health journals based in the UK contain a regular strand of papers on public health history.</span></p><span data-dcnode-id="1571" instrument_node="">
</span><p data-dcnode-id="1559" id="p-49"><span data-dcnode-id="1570" instrument_node="">During his tenure as editor of the </span><em data-dcnode-id="1568"><span data-dcnode-id="1569" instrument_node="">American Journal of Public Health</span></em><span data-dcnode-id="1567" instrument_node=""> George Rosen routinely included papers on public health. He introduced the strand “Public Health Then and Now” in an attempt to develop a sense of professional solidarity among public health professionals by providing them with evidence of a common heritage.</span><a class="xref-ref" data-dcnode-id="1564" href="#ref-18" id="xref-ref-18-2"><sup data-dcnode-id="1565"><span data-dcnode-id="1566" instrument_node="">18</span></sup></a><span data-dcnode-id="1563" instrument_node=""> Other historical strands within the </span><em data-dcnode-id="1561"><span data-dcnode-id="1562" instrument_node="">American Journal of Public Health</span></em><span data-dcnode-id="1560" instrument_node=""> include “Voices From the Past”, which presents brief historical extracts from the works of public health pioneers that are republished with an accompanying biographical sketch and “Images of Health”, which uses a visual reference to make the link between past and present health issues.</span></p><span data-dcnode-id="1558" instrument_node="">
</span><p data-dcnode-id="1547" id="p-50"><span data-dcnode-id="1557" instrument_node="">The </span><em data-dcnode-id="1555"><span data-dcnode-id="1556" instrument_node="">Journal of the Royal Society for the Promotion of Health</span></em><span data-dcnode-id="1554" instrument_node=""> is a rare example of a UK public health journal that carries historical material and the themed issue of the </span><em data-dcnode-id="1552"><span data-dcnode-id="1553" instrument_node="">British Medical Journal</span></em><span data-dcnode-id="1551" instrument_node=""> that marked the anniversary of the 1848 Public Health Acts showed how informative and stimulating public health history can be.</span><a class="xref-ref" data-dcnode-id="1548" href="#ref-20" id="xref-ref-20-1"><sup data-dcnode-id="1549"><span data-dcnode-id="1550" instrument_node="">20</span></sup></a></p><span data-dcnode-id="1546" instrument_node="">
</span><p data-dcnode-id="1541" id="p-51"><span data-dcnode-id="1545" instrument_node="">There needs to be a greater appreciation of history as an academic discipline within the broad field of public health. Awareness of the principles of historiography would also serve to encourage professionals to consider how the present skews our view of the past and question the objectivity of different sources of information. The history of occupational disease policy is a good illustration of the way historians place different weights of responsibility on vested interests and political and economic factors. Tosh neatly summed up the value of studying history writing, “…a historical education achieves a number of goals at once: it trains the mind, enlarges the sympathies and provides a much-needed historical perspective on some of the most pressing problems of our time”.</span><a class="xref-ref" data-dcnode-id="1542" href="#ref-2" id="xref-ref-2-3"><sup data-dcnode-id="1543"><span data-dcnode-id="1544" instrument_node="">2</span></sup></a></p><span data-dcnode-id="1540" instrument_node="">
</span></div><div class="section" data-dcnode-id="1521" id="sec-8"><span data-dcnode-id="1538" instrument_node="">
</span><h2 data-dcnode-id="1536"><span data-dcnode-id="1537" instrument_node="">THE ROLE OF HISTORIANS</span></h2><span data-dcnode-id="1535" instrument_node="">
</span><p data-dcnode-id="1529" id="p-52"><span data-dcnode-id="1534" instrument_node="">It is rare for historians to be working within a public health organisation. More often it is an individual public health practitioner or academic who develops an interest in the history of their professional field. While there is no doubt whatsoever that we owe a collective debt to such individuals, the application of the professional skills of a professional historian would better place the historical analysis in a broader social political and economic context. It has been argued that there are real advantages in having a professional historian integrated with public health practitioners and academics.</span><a class="xref-ref" data-dcnode-id="1531" href="#ref-7" id="xref-ref-7-3"><sup data-dcnode-id="1532"><span data-dcnode-id="1533" instrument_node="">7</span></sup></a><span data-dcnode-id="1530" instrument_node=""> This concept of “living among the tribe” can enable not only a historical perspective to be brought to bear on current issues but also allow the history of the present to be better captured for future analysis.</span></p><span data-dcnode-id="1528" instrument_node="">
</span><p data-dcnode-id="1523" id="p-53"><span data-dcnode-id="1527" instrument_node="">The tensions between the different disciplines of public health practice and historical inquiry need to be recognised with one focused on delivering change in the present and the other focused on identifying the barriers to change in the form of economic or political structures. A historic perspective does, however, provide practitioners with the insight that over a longer time frame change of some sort is inevitable.</span><a class="xref-ref" data-dcnode-id="1524" href="#ref-21" id="xref-ref-21-1"><sup data-dcnode-id="1525"><span data-dcnode-id="1526" instrument_node="">21</span></sup></a></p><span data-dcnode-id="1522" instrument_node="">
</span></div><div class="section" data-dcnode-id="1382" id="sec-9"><span data-dcnode-id="1520" instrument_node="">
</span><h2 data-dcnode-id="1518"><span data-dcnode-id="1519" instrument_node="">DEVELOPING AN INTEREST</span></h2><span data-dcnode-id="1517" instrument_node="">
</span><p data-dcnode-id="1505" id="p-54"><span data-dcnode-id="1516" instrument_node="">It may be that involvement in a particular aspect of contemporary public health practice stimulates an interest in the history of that particular topic. On the other hand a desire to acquire an overall picture of the health of the population down the centuries and the public health response to problems of ill health may be the starting point. There are only a small number of books that provide the broad perspective. Outstanding among the available tracts is George Rosen’s </span><em data-dcnode-id="1514"><span data-dcnode-id="1515" instrument_node="">History of Public Health</span></em><span data-dcnode-id="1513" instrument_node="">.</span><a class="xref-ref" data-dcnode-id="1510" href="#ref-22" id="xref-ref-22-1"><sup data-dcnode-id="1511"><span data-dcnode-id="1512" instrument_node="">22</span></sup></a><span data-dcnode-id="1509" instrument_node=""> Although Rosen’s book, falters when it comes to the 20th century, the account of public health progress stretching back to 4000</span><span class="sc" data-dcnode-id="1507"><span data-dcnode-id="1508" instrument_node="">bc</span></span><span data-dcnode-id="1506" instrument_node=""> is engaging and well informed.</span></p><span data-dcnode-id="1504" instrument_node="">
</span><p data-dcnode-id="1480" id="p-55"><span data-dcnode-id="1503" instrument_node="">The other classic, internationally recognised public health history text is by the Belgian author René Sand.</span><a class="xref-ref" data-dcnode-id="1500" href="#ref-23" id="xref-ref-23-1"><sup data-dcnode-id="1501"><span data-dcnode-id="1502" instrument_node="">23</span></sup></a><span data-dcnode-id="1499" instrument_node=""> From a British perspective </span><em data-dcnode-id="1497"><span data-dcnode-id="1498" instrument_node="">A Short History of Public Health</span></em><span data-dcnode-id="1496" instrument_node=""> by Frazer Brockington is a readable introduction but lacks the international sweep that the above texts provide.</span><a class="xref-ref" data-dcnode-id="1493" href="#ref-24" id="xref-ref-24-1"><sup data-dcnode-id="1494"><span data-dcnode-id="1495" instrument_node="">24</span></sup></a><span data-dcnode-id="1492" instrument_node=""> A modern and analytical text by Porter has been an imortant addition to the field.</span><a class="xref-ref" data-dcnode-id="1489" href="#ref-25" id="xref-ref-25-1"><sup data-dcnode-id="1490"><span data-dcnode-id="1491" instrument_node="">25</span></sup></a><span data-dcnode-id="1488" instrument_node=""> A useful resource from the perspective of those with an interest in the history of public health in Britain has been the production of a detailed chronology by Michael Warren.</span><a class="xref-ref" data-dcnode-id="1485" href="#ref-11" id="xref-ref-11-2"><sup data-dcnode-id="1486"><span data-dcnode-id="1487" instrument_node="">11</span></sup></a><span data-dcnode-id="1484" instrument_node=""> The full text of this chronology is available on the web (</span><a data-dcnode-id="1482" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.chronology.org.uk/"><span data-dcnode-id="1483" instrument_node="">http://www.chronology.org.uk</span></a><span data-dcnode-id="1481" instrument_node="">) and the example could be replicated usefully internationally.</span></p><span data-dcnode-id="1479" instrument_node="">
</span><p data-dcnode-id="1462" id="p-56"><span data-dcnode-id="1478" instrument_node="">An important site for those interested in finding out more will be the Wellcome Trust and its Library for the History and Understanding of Medicine (</span><a data-dcnode-id="1476" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.wellcome.ac.uk/"><span data-dcnode-id="1477" instrument_node="">http://www.wellcome.ac.uk</span></a><span data-dcnode-id="1475" instrument_node="">). Membership will give practitioners access to a wealth of resources and its MedHist function provides a guide to medicine resources on the internet, including public health. Specialist journals such as </span><em data-dcnode-id="1473"><span data-dcnode-id="1474" instrument_node="">Addiction</span></em><span data-dcnode-id="1472" instrument_node=""> run regular historical articles and the Action on Smoking and Health web site (</span><a data-dcnode-id="1470" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.ash.org.uk/"><span data-dcnode-id="1471" instrument_node="">http://www.ash.org.uk</span></a><span data-dcnode-id="1469" instrument_node="">) provides considerable insight into the history of the anti-tobacco campaign. When announcing that the journal </span><em data-dcnode-id="1467"><span data-dcnode-id="1468" instrument_node="">Addiction</span></em><span data-dcnode-id="1466" instrument_node=""> was going to launch a new occasional series called Addiction History, Professor Berridge explained why it was felt that history would be of use to practitioners reading the journal: “History is not here as some kind of antiquarian peep show. Nor is it here to massage the preconceptions of the present…..historical writing has a wider purpose—to examine the complexities of the interaction between culture and institutions, between differing perceptions of substance use, between the construction of science and the formation of policy, at a national level, but in cross-national perspective, all within the framework of change over time…This perspective alone can induce a more thoughtful and curious response, a realization that our current preconceptions do not necessarily have the status of timeless ‘fact’. Nor does change occur to some type of predetermined and rational policy master plan”.</span><a class="xref-ref" data-dcnode-id="1463" href="#ref-26" id="xref-ref-26-1"><sup data-dcnode-id="1464"><span data-dcnode-id="1465" instrument_node="">26</span></sup></a></p><span data-dcnode-id="1461" instrument_node="">
</span><p data-dcnode-id="1459" id="p-57"><span data-dcnode-id="1460" instrument_node="">
</span></p><div class="boxed-text" data-dcnode-id="1432" id="boxed-text-1"><span data-dcnode-id="1458" instrument_node="">
</span><h3 data-dcnode-id="1455"><strong data-dcnode-id="1456"><span data-dcnode-id="1457" instrument_node="">Key points</span></strong></h3><span data-dcnode-id="1454" instrument_node="">
</span><p data-dcnode-id="1452"><span data-dcnode-id="1453" instrument_node="">
</span></p><ul class="list-unord" data-dcnode-id="1436" id="list-2"><li data-dcnode-id="1447" id="list-item-6"><span data-dcnode-id="1451" instrument_node="">
</span><p data-dcnode-id="1449" id="p-59"><span data-dcnode-id="1450" instrument_node="">Public health practitioners neglect the history of public health.</span></p><span data-dcnode-id="1448" instrument_node="">
</span></li><li data-dcnode-id="1442" id="list-item-7"><span data-dcnode-id="1446" instrument_node="">
</span><p data-dcnode-id="1444" id="p-60"><span data-dcnode-id="1445" instrument_node="">A better understanding of the history of their subject would improve the practice of public health professionals.</span></p><span data-dcnode-id="1443" instrument_node="">
</span></li><li data-dcnode-id="1437" id="list-item-8"><span data-dcnode-id="1441" instrument_node="">
</span><p data-dcnode-id="1439" id="p-61"><span data-dcnode-id="1440" instrument_node="">Educators and journal editors should include more historical content in courses and journals.</span></p><span data-dcnode-id="1438" instrument_node="">
</span></li></ul><p data-dcnode-id="1434"><span data-dcnode-id="1435" instrument_node="">
</span></p><span data-dcnode-id="1433" instrument_node="">
</span></div><span data-dcnode-id="1431" instrument_node="">
</span><p data-dcnode-id="1430"></p><span data-dcnode-id="1429" instrument_node="">
</span><p data-dcnode-id="1427" id="p-62"><span data-dcnode-id="1428" instrument_node="">
</span></p><div class="boxed-text" data-dcnode-id="1405" id="boxed-text-2"><span data-dcnode-id="1426" instrument_node="">
</span><h3 data-dcnode-id="1423"><strong data-dcnode-id="1424"><span data-dcnode-id="1425" instrument_node="">Policy implications</span></strong></h3><span data-dcnode-id="1422" instrument_node="">
</span><p data-dcnode-id="1420"><span data-dcnode-id="1421" instrument_node="">
</span></p><ul class="list-unord" data-dcnode-id="1409" id="list-3"><li data-dcnode-id="1415" id="list-item-9"><span data-dcnode-id="1419" instrument_node="">
</span><p data-dcnode-id="1417" id="p-64"><span data-dcnode-id="1418" instrument_node="">Curriculum revision is required at undergraduate and postgraduate levels.</span></p><span data-dcnode-id="1416" instrument_node="">
</span></li><li data-dcnode-id="1410" id="list-item-10"><span data-dcnode-id="1414" instrument_node="">
</span><p data-dcnode-id="1412" id="p-65"><span data-dcnode-id="1413" instrument_node="">The contemporary history of public health should be captured so as to facilitate future study.</span></p><span data-dcnode-id="1411" instrument_node="">
</span></li></ul><p data-dcnode-id="1407"><span data-dcnode-id="1408" instrument_node="">
</span></p><span data-dcnode-id="1406" instrument_node="">
</span></div><span data-dcnode-id="1404" instrument_node="">
</span><p data-dcnode-id="1403"></p><span data-dcnode-id="1402" instrument_node="">
</span><p data-dcnode-id="1390" id="p-66"><span data-dcnode-id="1401" instrument_node="">Building up a specialist library, whether of current or historic texts and documents, can be one of the most intriguing and fascinating aspects of developing a historical interest. Although it is now dated, the list of important public health texts provided as an appendix to Sidney Chave’s important book </span><em data-dcnode-id="1399"><span data-dcnode-id="1400" instrument_node="">Recalling the Medical Officer of Health</span></em><span data-dcnode-id="1398" instrument_node=""> represents a valuable checklist.</span><a class="xref-ref" data-dcnode-id="1395" href="#ref-27" id="xref-ref-27-1"><sup data-dcnode-id="1396"><span data-dcnode-id="1397" instrument_node="">27</span></sup></a><span data-dcnode-id="1394" instrument_node=""> Borrowing a copy of most of these from a library, usually via interlibrary loan, is not usually a problem. Acquiring a personal copy of a book that is perhaps over a 100 years old or is long out of print has been greatly facilitated by the internet. There are several computer linked international networks of second hand and antiquarian booksellers. Using one meta search engine (</span><a data-dcnode-id="1392" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.bookfinder.com/"><span data-dcnode-id="1393" instrument_node="">http://www.bookfinder.com</span></a><span data-dcnode-id="1391" instrument_node="">) several of these networks can be searched simultaneously. Regular searching over time will often locate a rare and sought after book, perhaps on the other side of the world. More dedicated collectors may seek to possess copies of all editions or reprints of a particular book. There is however the ever present danger of the books becoming more valued than their contents.</span></p><span data-dcnode-id="1389" instrument_node="">
</span><p data-dcnode-id="1384" id="p-67"><span data-dcnode-id="1388" instrument_node="">If a more formal approach to study is required, the London School of Hygiene and Tropical Medicine runs a History and Health study module. It aims to help students develop their ability to take a critical and long term perspective in analysing current health issues. The Masters in Public Health is regarded as the basic qualification for those seeking a career in public health and the Mailman School of Public Health at Columbia University in New York provides a MPH course that specialises in the history of public health and medicine (</span><a data-dcnode-id="1386" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.healthsciences.columbia.edu/dept/sph/degree-offerings.html"><span data-dcnode-id="1387" instrument_node="">http://www.healthsciences.columbia.edu/dept/sph/degree-offerings.html</span></a><span data-dcnode-id="1385" instrument_node="">). This two year programme provides competency in both public health and historical analysis.</span></p><span data-dcnode-id="1383" instrument_node="">
</span></div><div class="section" data-dcnode-id="1371" id="sec-10"><span data-dcnode-id="1381" instrument_node="">
</span><h2 data-dcnode-id="1379"><span data-dcnode-id="1380" instrument_node="">INTERNATIONAL NETWORK</span></h2><span data-dcnode-id="1378" instrument_node="">
</span><p data-dcnode-id="1373" id="p-68"><span data-dcnode-id="1377" instrument_node="">An international network of those interested in public health history has been developed in recent years. It brings together both the professional historians and public health practitioners from 43 countries, organises regular conferences, and publishes an online journal. Details of the International Network for the History of Public Health can be found at their web site (</span><a data-dcnode-id="1375" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.liu.se/tema/inhph/"><span data-dcnode-id="1376" instrument_node="">http://www.liu.se/tema/inhph/</span></a><span data-dcnode-id="1374" instrument_node="">).</span></p><span data-dcnode-id="1372" instrument_node="">
</span></div><div class="section" data-dcnode-id="1363" id="sec-11"><span data-dcnode-id="1370" instrument_node="">
</span><h2 data-dcnode-id="1368"><span data-dcnode-id="1369" instrument_node="">CONCLUSION</span></h2><span data-dcnode-id="1367" instrument_node="">
</span><p data-dcnode-id="1365" id="p-69"><span data-dcnode-id="1366" instrument_node="">The history of public health has important implications for how we should react to the challenges of contemporary public health practice. Its study and teaching are both neglected and deserve to be given more attention as we invest in the development of the public health workforce. Similarly, the editors of professional journals in the field of public health should give serious consideration to the inclusion of a strand of papers relating to public health history. In our current public health activities we need to be conscious of how our recording of contemporary events will help or hinder the understanding of those events by future students of public health history.</span></p><span data-dcnode-id="1364" instrument_node="">
