</span><table border="0" cellpadding="5" cellspacing="0" data-dcnode-id="768" name="" width="100%"><tbody data-dcnode-id="769"><tr align="" data-dcnode-id="771" valign=""><td align="" colspan="1" data-dcnode-id="773" rowspan="1" valign="top" width="100%"><font color="#000000" data-dcnode-id="776" editor_id="mce_editor_0" face="'trebuchet ms', tahoma, sans-serif" size="3"><strong data-dcnode-id="783" editor_id="mce_editor_0"><span data-dcnode-id="784" instrument_node="">EARLY DAYS</span></strong><br data-dcnode-id="782"><br data-dcnode-id="781"><span data-dcnode-id="780" instrument_node="">The earliest settlers were primarily big game hunters, leaving archeological evidence of stone and simple weapons. Between 1100 and 1300 AD, Native American people settled the area. The Mandan tribe moved up the Missouri River to the Heart River where they established their villages. The first white men to the area were European explorers. The French Canadians came in 1738 “up” the Red River from what is now the Pembina area searching for a water route to the Pacific Ocean. While unsuccessful in finding a Northwest Passage, they noted the abundance of fur-bearing animals. They developed friendships with and lived among the peaceful, agricultural Mandan Indians who had settlements throughout the area including the On-A-Slant Villages south of present-day Mandan.</span><br data-dcnode-id="779"><br data-dcnode-id="778"><span data-dcnode-id="777" instrument_node="">Representatives from the Northwest Company established a fur trading expedition post at the junction of the Heart and Missouri Rivers in 1780.</span></font><br data-dcnode-id="775"><span data-dcnode-id="774" instrument_node="">

</span></td></tr></tbody></table></td><td align="" colspan="1" data-dcnode-id="728" rowspan="1" valign="top" width="59%"><p data-dcnode-id="731"><font data-dcnode-id="732" editor_id="mce_editor_0" face="trebuchet ms,geneva" size="3"><font color="#000000" data-dcnode-id="734"><span data-dcnode-id="735" instrument_node="">From 1763 to 1800, the claim to the Louisiana Territory passed from France to Spain and back again to France.&nbsp;&nbsp;&nbsp;In 1803, France sold the territory, including the Mandan area, to the United States in what we know today as the Louisiana Purchase.</span></font><span data-dcnode-id="733" instrument_node=""> </span></font></p><br data-dcnode-id="730"><span data-dcnode-id="729" instrument_node="">

</span><span data-dcnode-id="715" instrument_node="">
</span><span data-dcnode-id="714" instrument_node="">
</span><span data-dcnode-id="651" instrument_node="">
</span><span data-dcnode-id="649" instrument_node="">
</span><table border="0" cellpadding="5" cellspacing="0" data-dcnode-id="647" name="" width="100%"><tbody data-dcnode-id="648"><tr align="" data-dcnode-id="650" valign=""><td align="" colspan="1" data-dcnode-id="652" rowspan="1" valign="top" width="100%"><div data-dcnode-id="655"><span color="#000000" data-dcnode-id="709" face="'trebuchet ms', tahoma, sans-serif" size="3" style="color: #000000; font-family: 'trebuchet ms', tahoma, sans-serif; font-size: medium;"><span data-dcnode-id="713" instrument_node="">Lewis and Clark and their Corps of Discovery followed the Missouri River to explore the territory. The expedition wintered at Fort Mandan (1804-5) in the Mandan Native American villages located&nbsp;35 miles to the north.&nbsp; After reaching the Pacific Coast, they returned via the Missouri River&nbsp;in 1806.&nbsp; The designation of the State highway along the western bank of the river (ND Hwy 1806) recognizes the event.</span><br data-dcnode-id="712"><br data-dcnode-id="711"><span data-dcnode-id="710" instrument_node="">Fort Clark was founded as an American Fur Company trading post in 1831. Located on the west bank of the Missouri River and north of present-day Mandan, the post was named to honor General William Clark (of the Lewis and Clark Expedition). But by the 1840s, the fur-bearing animal population was being exhausted which reduced the major source of food and income for many tribes. Many native people resented the incursions onto their homelands and the prior peaceful relationships began to falter. Meanwhile, white settlers continued to&nbsp;slowly immigrate to the area hindered in part by the challenging climate, the remote location and increasing Indian uprisings.</span></span><br data-dcnode-id="708"><span data-dcnode-id="702" face="trebuchet ms,geneva" size="3" style="font-family: trebuchet ms,geneva; font-size: medium;"><br data-dcnode-id="707"><span color="#000000" data-dcnode-id="703" style="color: #000000;"><span data-dcnode-id="706" instrument_node="">In 1864 Congress provided a major boost to settling the West by establishing the Northern Pacific Railroad and associated land grants to help finance the venture. Some stability was brought by a treaty in 1868, in which the U.S. pledged to keep settlers out of specified areas. In return some of the Sioux, but not all, agreed to remain on reservations west of the Missouri River. &nbsp;However railroad expansion and the discovery of gold would re-ignite open warfare.</span><br data-dcnode-id="705"><br data-dcnode-id="704"></span></span><span data-dcnode-id="656" face="trebuchet ms,geneva" style="font-family: trebuchet ms,geneva;"><span data-dcnode-id="657" face="trebuchet ms,geneva" style="font-family: trebuchet ms,geneva;"><span data-dcnode-id="658" face="trebuchet ms,geneva" style="font-family: trebuchet ms,geneva;"><span data-dcnode-id="659" face="trebuchet ms,geneva" style="font-family: trebuchet ms,geneva;"><span color="#000000" data-dcnode-id="673" style="color: #000000;"><span data-dcnode-id="696" face="trebuchet ms,geneva" style="font-family: trebuchet ms,geneva;"><span data-dcnode-id="697" size="3" style="font-size: medium;"><strong data-dcnode-id="698"><span data-dcnode-id="701" instrument_node="">MILITARY FORTS</span><br data-dcnode-id="700"><br data-dcnode-id="699"></strong></span></span><span data-dcnode-id="674" editor_id="mce_editor_0" face="trebuchet ms,geneva" size="3" style="font-family: trebuchet ms,geneva; font-size: medium;"><span data-dcnode-id="695" instrument_node="">The first permenant military presence in the region was&nbsp;Fort Rice established in July 1864 approximately 25 miles south of present day Mandan.&nbsp;&nbsp;Among its many successes was the rescue of&nbsp;the&nbsp;Fisk Expedition enroute to the gold fields in Montana from "hostiles" near&nbsp;Marmarth ND.&nbsp; The fort hosted a major peace council in 1868.&nbsp; This gathering led to the Laramie Treaty which defined Sioux lands as those west of the Missouri River in Dakota Territory.</span><br data-dcnode-id="694"><br data-dcnode-id="693"><span data-dcnode-id="692" instrument_node="">To provide protection for the approaching rail line from the east and the homesteaders&nbsp;who would surely follow, the US army established two outposts in 1872 and 1873.&nbsp; Fort Greeley (later renamed Fort Hancock) was founded first on the east side of the river.&nbsp; On the west side, an infanty post named Fort McKeen was constructed on bluffs above the former fur-trading post. Later in 1873 Congress authorized the addition of a cavalry post and changed its designation to Fort Abraham Lincoln when foot soldiers were deemed ineffective against their mounted adversaries. A permanent civilian settlement known as "Lincoln" was adjacent to the north side of the fort</span><span color="#000000" data-dcnode-id="687" face="trebuchet ms" size="3" style="color: #000000; font-family: trebuchet ms; font-size: medium;"><span data-dcnode-id="691" instrument_node="">.</span><br data-dcnode-id="690"><br data-dcnode-id="689"><span data-dcnode-id="688" instrument_node="">After&nbsp;</span></span><span data-dcnode-id="686" instrument_node="">the establishment of Fort Abraham Lincoln and later Fort Yates, Fort Rice was abandoned and dismantled in 1878.&nbsp; The greater portion of the fort in combination of a total of four acres of land were deeded to the State of North Dakota in July 1913 and remains a state park today.&nbsp; Fort Lincoln received its abandonment orders in June 1891.&nbsp; The former fort has also been converted into a North Dakota state park.</span><br data-dcnode-id="685"><br data-dcnode-id="684"><strong data-dcnode-id="682"><span data-dcnode-id="683" instrument_node="">MORTON BEGINS</span></strong><br data-dcnode-id="681"><br data-dcnode-id="680"><span data-dcnode-id="679" instrument_node="">Morton County was created by the 1872-1873 territorial legislature. It is named for Oliver Hazard Perry Throck Morton, Governor of Indiana during the civil war and a </span><span data-dcnode-id="675" editor_id="mce_editor_0" style="color: black; font-family: 'trebuchet ms'; mso-bidi-font-family: arial;"><span data-dcnode-id="678" instrument_node="">US Senator at the time the county was established.</span><br data-dcnode-id="677"><br data-dcnode-id="676"></span></span></span><span color="#000000" data-dcnode-id="668" style="color: #000000;"><span data-dcnode-id="671" style="font-size: 12pt; font-family: 'trebuchet ms';"><span data-dcnode-id="672" instrument_node="">Once the Northern Pacific Railroad announced the location for its western approach to its </span></span><span data-dcnode-id="669" style="font-size: 12pt; font-family: 'trebuchet ms';"><span data-dcnode-id="670" instrument_node="">Missouri River</span></span></span><span data-dcnode-id="664" style="font-size: 12pt; font-family: 'trebuchet ms';"><span color="#000000" data-dcnode-id="665" editor_id="mce_editor_0" style="color: #000000;"><span data-dcnode-id="667" instrument_node=""> bridge crossing, a new settlement appeared there in December 1878 approximately 5 miles north of Fort Abraham Lincoln. The city was also to serve as base camp for the westward survey of the rail line.&nbsp; </span><br data-dcnode-id="666"></span></span><span data-dcnode-id="660" style="font-size: 12pt; font-family: 'trebuchet ms';"><br data-dcnode-id="663"><span color="#000000" data-dcnode-id="661" style="color: #000000;"><span data-dcnode-id="662" instrument_node="">The first attempt at industrial development started with the establishment of a lignite mine at Sims also in 1873.&nbsp; However its operation eventually failed.</span></span></span></span></span></span></span></div><br data-dcnode-id="654"><span data-dcnode-id="653" instrument_node="">

</span><table border="0" cellpadding="5" cellspacing="0" data-dcnode-id="570" name="" width="100%"><tbody data-dcnode-id="571"><tr align="" data-dcnode-id="573" valign=""><td align="" colspan="1" data-dcnode-id="575" rowspan="1" valign="top" width="100%"><font data-dcnode-id="578" face="'trebuchet ms', tahoma, sans-serif"><font data-dcnode-id="579" size="3"><font color="#000000" data-dcnode-id="580"><strong data-dcnode-id="587"><span data-dcnode-id="588" instrument_node="">POSTAL APPOINTMENTS AND THE NAME GAME</span></strong><br data-dcnode-id="586"><br data-dcnode-id="585"><span data-dcnode-id="584" instrument_node="">Postal service had initially been provided to what is today Morton County at Fort Rice from 1866 to 1870. A post office was operated at Fort Abraham Lincoln from 1873 through 1894.</span><br data-dcnode-id="583"><br data-dcnode-id="582"><span data-dcnode-id="581" instrument_node="">Until civil service reforms in the 20th century, thousands of political supporters were rewarded with appointments as postmasters and given broad power. Four different postmasters coincided with four separate designations for area's post office. The city's first post office in 1878 was known as "Morton." The name "Mandan" stuck for only eight (8) days in March 1879 before becoming "Cushman." Ultimately in September 1879, the post office returned to its current designation of "Mandan."</span></font></font></font><br data-dcnode-id="577"><span data-dcnode-id="576" instrument_node="">

</span><table border="0" cellpadding="5" cellspacing="0" data-dcnode-id="496" name="" width="100%"><tbody data-dcnode-id="497"><tr align="" data-dcnode-id="499" valign=""><td align="" colspan="1" data-dcnode-id="501" rowspan="1" valign="top" width="100%"><div data-dcnode-id="504"><span color="#000000" data-dcnode-id="505" face="'trebuchet ms', tahoma, sans-serif" size="3" style="color: #000000; font-family: 'trebuchet ms',tahoma,sans-serif; font-size: medium;"><span data-dcnode-id="522" instrument_node="">The Morton County government was formally organized March 23, 1878. However the 1879 legislature later attached the eastern portion of Morton County to Burleigh County. This reassignment of authority effectively nullified the organization of the Morton County government. The Dakota Territory's 1881 legislature returned the detached portion to Morton County and the government was reorganized on February 18 of that year.</span><br data-dcnode-id="521"><br data-dcnode-id="520"><span data-dcnode-id="519" instrument_node="">The City of Mandan was incorporated one week later on February 24, 1881 and was named for the Mantani Indians, or "people of the bank." It became the county seat for the replatted Morton County. The City of Lincoln had been county seat from 1878 through 1879.</span><br data-dcnode-id="518"><br data-dcnode-id="517"><span data-dcnode-id="516" instrument_node="">Upon completion of the railroad to Montana in 1881, Fort Abraham Lincoln had fulfilled its primary purpose and gradually declined until abandoned in 1894. The City of Lincoln eventually dwindled into obscurity.</span><br data-dcnode-id="515"><br data-dcnode-id="514"><strong data-dcnode-id="512"><span data-dcnode-id="513" instrument_node="">THE GOLD RUSH YEARS</span></strong><br data-dcnode-id="511"><br data-dcnode-id="510"><span data-dcnode-id="509" instrument_node="">While the railroad was critical to area development, other modes of transportation also impacted early growth, spurred by gold discoveries. In 1873, four steamboats were traversing the Missouri River working to supply the gold fields in Montana and included the "Montana," the "Dakota" plus two smaller versions known as the "Rosebud" and "Bighorn." The riverfront dock, originally known as "Bellows Landing" and later renamed "Rock Haven" was located north of the city, and is near the present day MDU Heskett power generating station north of the refinery.</span><br data-dcnode-id="508"><br data-dcnode-id="507"><span data-dcnode-id="506" instrument_node="">Colonel George Custer led a survey expedition from Fort Lincoln in 1874 to the Black Hills to confirm the existance of gold there. Whites were settling west of the Missouri in 1875, contrary to the Laramie Treaty. This development led to multiple Indian uprisings.</span></span></div><br data-dcnode-id="503"><span data-dcnode-id="502" instrument_node="">

</span><table border="0" cellpadding="5" cellspacing="0" data-dcnode-id="85" name="" width="100%"><tbody data-dcnode-id="86"><tr align="" data-dcnode-id="88" valign=""><td align="" colspan="1" data-dcnode-id="90" rowspan="1" valign="top" width="100%"><div data-dcnode-id="93"><span color="#000000" data-dcnode-id="94" editor_id="mce_editor_0" face="'trebuchet ms', tahoma, sans-serif" size="3" style="color: #000000; font-family: 'trebuchet ms',tahoma,sans-serif; font-size: medium;"><span data-dcnode-id="121" instrument_node="">Heart River flooding had been a common occurrence. Major floods were noted in 1881, 1887,&nbsp;1910, 1929, 1937 and 1943 and repeatedly caused extensive damage. Flood control projects began as early as the 1920s. Completion of the Garrison Dam on the Missouri River in 1954 was instrumental in controlling the damage. Other projects throughout the southeastern part of the city along the Heart River continued into the 1980s.</span><br data-dcnode-id="120"><br data-dcnode-id="119"><strong data-dcnode-id="117" editor_id="mce_editor_0"><span data-dcnode-id="118" instrument_node="">COMMERICAL &amp; INDUSTRIAL GROWTH</span></strong><br data-dcnode-id="116"><br data-dcnode-id="115"><span data-dcnode-id="114" instrument_node="">Hebron Fire and Pressbrick Factory was founded in 1904. The factory was one of at least 18 ND brick factories in the early 1900s offering an alternative to prairie sod for homes and buildings. The company has survived two world wars, a major fire in 1926, and the Great Depression. After over a hundred years of existence, Hebron Brick is not only the only surviving brick factory in the state, it is also the oldest manufacturing company of any kind in North Dakota. </span><br data-dcnode-id="113"><br data-dcnode-id="112"><span data-dcnode-id="111" instrument_node="">With the continued growth in the agricultural sector, the area was was ready for the addition of agricultural processing operations.&nbsp; In 1915, Hoy Russell with his partner George Schultz established the Mandan Produce and Creamery in Mandan.&nbsp;&nbsp;&nbsp;Pork&nbsp;processing was added in the&nbsp;1950s.&nbsp; While the food service business was sold off in the mid-1990s, the Cloverdale Meat Company remains on of the largest businesses in the area.</span><br data-dcnode-id="110"><br data-dcnode-id="109"><span data-dcnode-id="108" instrument_node="">In February 1952, Standard Oil of Indiana announced plans to build a 15,000 barrel per day refinery north of Mandan. In 1953, construction began on a crude oil pipeline from Tioga to Mandan. In June 1952, Service Pipeline announced it would build an outbound product pipeline. By September, Standard Oil of Indiana announced it would double the capacity to 30,000 barrels of oil per day. The refinery was dedicated in 1954. Its current owner, Tesoro Refining and Marketing, boasts a stream day capacity of 72,000 barrels.</span><br data-dcnode-id="107"><br data-dcnode-id="106"><span data-dcnode-id="105" instrument_node="">The R. M. Heskett Electrical Generation Station at Mandan is owned and operated by Montana Dakota Utilities and went into service in 1954; an addition to this plant was energized in 1963.</span><br data-dcnode-id="104"><br data-dcnode-id="103"><span data-dcnode-id="102" instrument_node="">By 1959, the city boasted five elevators, with a combined capacity of over 760,000 bushels.&nbsp; Occident Elevator had two facilities, one located in the "Syndicate" area of town - in the vicinity of current day Mary Stark Elementary School and the second along Main Street.&nbsp; The other grain storage and handling businesses included&nbsp;Slope Grain and Feed Company; the Farmers Union Grain Association and the Mandan Farmers Co-Op Elevator.</span><br data-dcnode-id="101"><br data-dcnode-id="100"><strong data-dcnode-id="97"><span data-dcnode-id="99" instrument_node="">OUR AREA TODAY</span><br data-dcnode-id="98"></strong><br data-dcnode-id="96"><span data-dcnode-id="95" instrument_node="">Morton County is home to 33,291 residents, of which 24,206 live in Mandan, per the 2020 census. The city remains tied to railroad operation with a major rail equipment maintenance facility operated here by Burlington Northern Santa Fe (BNSF) Railway. The city remains a distribution center for grain, livestock, and dairy operations aided by its rail connections and proximity to Interstate Highway 94. The city has a large cattle market and food-processing plant. Other industries include iron and fabricated metal, wood, concrete and tile products in addition to oil refinery and coal-fired electrical power generation. Service industries are represented by a state-wide trade association and a data entry center. Technology is represented by a software development company and a USDA agricultural research center.</span></span></div><br data-dcnode-id="92"><span data-dcnode-id="91" instrument_node="">
