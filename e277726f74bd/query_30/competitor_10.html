 to preserve their heritage and culture for future generations.</span></blockquote><span data-dcnode-id="1543" instrument_node="">
</span><p data-dcnode-id="1540"><span data-dcnode-id="1542" instrument_node="">“The Killing of George Birdwell: A Reconsideration,” by William W. Savage, Jr., 231–237

</span><img alt=" " class="icon" data-dcnode-id="1541" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.okhistory.org/images/publications/Chronicles003.jpg&amp;raw"></p><h2 data-dcnode-id="1538" id="v81"><span data-dcnode-id="1539" instrument_node="">Volume 81, No. 1 (Sping 2003)</span></h2><span data-dcnode-id="1537" instrument_node="">
</span><p data-dcnode-id="1535"><span data-dcnode-id="1536" instrument_node="">“L. L. Culver: A Naked Warrior in the Second World War,” by Brad Agnew, 4–33</span></p><blockquote data-dcnode-id="1533"><span data-dcnode-id="1534" instrument_node="">After reaching Algeria in 1943, Ens. L. L. Culver of Tahlequah, Oklahoma,
 joined the Scouts and Raiders, a joint army-navy unit whose members were
 trained to direct amphibious assaults. In the second section of a two-part
 article, Brad Agnew follows Culver’s service in World War II to its
 conclusion, including his meritorious actions in the invasions of Sicily, Anzio,
 and southern France before being transferred to the Pacific Theater at war’s
 end.</span></blockquote><span data-dcnode-id="1532" instrument_node="">
</span><p data-dcnode-id="1530"><span data-dcnode-id="1531" instrument_node="">“Inside the Store, Inside the Past: A Cultural Analysis of McAlester’s General Store,” by Linda C. English, 34–53</span></p><blockquote data-dcnode-id="1528"><span data-dcnode-id="1529" instrument_node=""> James J. McAlester carved out a prominent niche for himself in the Choctaw
 Nation in the late nineteenth and early twentieth centuries as a successful
 captain of commerce. To learn more about the society in which he lived and
 worked, Linda English delves into the records of his general store, an
 invaluable resource for historians of the Indian Territory frontier.</span></blockquote><span data-dcnode-id="1527" instrument_node="">
</span><p data-dcnode-id="1525"><span data-dcnode-id="1526" instrument_node="">“A Faithful Public Servant: J. George Wright and the Five Civilized Tribes,” by Kent Carter, 54–79</span></p><blockquote data-dcnode-id="1523"><span data-dcnode-id="1524" instrument_node="">As Indian inspector, J. George Wright was a key figure in implementing
 controversial federal policies relating to the Five Civilized Tribes during the
 allotment era, but his career has received scant scholarly attention. Kent
 Carter remedies that oversight with a careful study of one of the few men to
 emerge from that turbulent period with his reputation intact.</span></blockquote><span data-dcnode-id="1522" instrument_node="">
</span><p data-dcnode-id="1520"><span data-dcnode-id="1521" instrument_node="">“The Lingering Shadow: The Grapes of Wrath and Oklahoma Leaders in the Post-Depression Era,” by Jennifer J. Collins, 80–103</span></p><blockquote data-dcnode-id="1518"><span data-dcnode-id="1519" instrument_node="">The publication of the 1939 novel, The Grapes of Wrath, contributed to a
 long-standing, widely-held negative stereotype of the state of Oklahoma and
 its people. Jennifer Collins examines the several efforts of government 
 officials and civic and business leaders to change the way Oklahomans were
 perceived nationally and the way Oklahomans viewed themselves.</span></blockquote><span data-dcnode-id="1517" instrument_node="">
</span><p data-dcnode-id="1515"><span data-dcnode-id="1516" instrument_node="">“President Hayes and the Poncas,” by Quentin Taylor, 104–111</span></p><blockquote data-dcnode-id="1513"><span data-dcnode-id="1514" instrument_node=""> When he took office in 1877, Pres. Rutherford B. Hayes knew little about 
 the forced relocation of the Indian tribes in the United States, but with new
 knowledge gained from the plight of the Poncas, Hayes ended the policy of
 removal before leaving office. Prefacing the full text of Hayes’s message to
 Congress, Quentin Taylor briefly describes the Poncas’ removal to Indian
 Territory and their efforts to obtain compensation and a degree of
 self-determination.</span></blockquote><span data-dcnode-id="1512" instrument_node="">
</span><img alt=" " class="icon" data-dcnode-id="1511" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.okhistory.org/images/publications/Chronicles012.jpg&amp;raw"><h2 data-dcnode-id="1509" id="issue2002"><span data-dcnode-id="1510" instrument_node="">Volume 80, No. 4 (Winter 2002–03) </span></h2><p class="backtotop" data-dcnode-id="1506"><a data-dcnode-id="1507" href="#top"><span data-dcnode-id="1508" instrument_node="">Back to top</span></a></p><span data-dcnode-id="1505" instrument_node="">
</span><p data-dcnode-id="1503"><span data-dcnode-id="1504" instrument_node="">“Ensign L. L. Culver: ‘You can call me salty now,’” by Brad Agnew, 388–409</span></p><blockquote data-dcnode-id="1501"><span data-dcnode-id="1502" instrument_node="">From Tahlequah undertaker to navy ensign in the early years of World 
 War II, Oklahoman L. L. Culver made a transition that required all the 
 physical and intellectual stamina he could muster. In part one of a two-part 
 story, Brad Agnew recounts Culver’s transformation, tracing the undercurrents 
 and crests of his training experience, which led to an important decision when 
 he reached the Algerian port of Arzew in April 1943.</span></blockquote><span data-dcnode-id="1500" instrument_node="">
</span><p data-dcnode-id="1498"><span data-dcnode-id="1499" instrument_node="">“‘Yakni Achukma, The School with a Soul’: A History of the Goodland Indian Orphanage,” by Ruby Wile, 410–435</span></p><blockquote data-dcnode-id="1496"><span data-dcnode-id="1497" instrument_node=""> The Presbyterian sponsors of Goodland Indian Orphanage challenged 
 common practice of mid-nineteenth century Indian schools by promoting 
 assimilation through respect for Native culture and affection for children. 
 In Ruby Wile’s study of “Yakni Achukma,” proof abounds that their 
 philosophy produced citizens of distinction who honor both their Indian and Goodland heritages.</span></blockquote><span data-dcnode-id="1495" instrument_node="">
</span><p data-dcnode-id="1493"><span data-dcnode-id="1494" instrument_node="">“Joseph Pierre Foucart: Man of Art and Mystery,” by Louis Cozby, 436–445</span></p><blockquote data-dcnode-id="1491"><span data-dcnode-id="1492" instrument_node="">During seventeen years as an architect in Guthrie, Oklahoma, Joseph Foucart had unprecedented influence on the city’s streetscape with fanciful architecture combining elements of many styles. He then seemed to disappear, much to the frustration of state historians. Louis Cozby reports on the efforts of two Guthrie historians to trace Foucart’s subsequent career and, more important, the date and place of his death.</span></blockquote><span data-dcnode-id="1490" instrument_node="">
</span><p data-dcnode-id="1488"><span data-dcnode-id="1489" instrument_node="">“Bygone Spas: The Rise and Decay of Oklahoma’s Radium Water,” by Marjorie Malley, 446–466</span></p><blockquote data-dcnode-id="1486"><span data-dcnode-id="1487" instrument_node="">For many years radium water baths and bottled radium water provided the major economic base for several towns in northeastern Oklahoma. In tracing the history of the industry through a variety of historical and scientific sources, Marjorie Malley focuses both on the myth and the physical reality of the water’s properties to determine if it was “magic elixir” or “poisonous apple.”</span></blockquote><span data-dcnode-id="1485" instrument_node="">
</span><p data-dcnode-id="1483"><span data-dcnode-id="1484" instrument_node="">“‘Klanspiracy’ or Despotism?: The Rise and Fall of Governor Jack Walton, featuring W. D. McBee,” by Brad L. Duren, 468–485</span></p><blockquote data-dcnode-id="1481"><span data-dcnode-id="1482" instrument_node="">The meteoric rise and downfall of Oklahoma governor John C. “Jack” Walton in 1923 captivated political experts and ordinary citizens alike. Brad Duren provides a fascinating accounts of a man who was controversial from the start and whose despotic nature and clashes with the Ku Klux Klan led Duncan legislator W. D. McBee to fight for Walton’s impeachment.</span></blockquote><span data-dcnode-id="1480" instrument_node="">
</span><p data-dcnode-id="1478"><span data-dcnode-id="1479" instrument_node="">“Pepper Martin: The Wild Horse of the Osage,” by Joe D. Haines, Jr., 486–485</span></p><blockquote data-dcnode-id="1476"><span data-dcnode-id="1477" instrument_node="">In the 1930s and early 1940s John Leonard Roosevelt “Pepper” Martin thrilled baseball fans the world over with his aggressive style of play and his antics on and off the field. The Oklahoman’s .500 batting average in the 1931 World Series remains one of baseball’s most remarkable achievements. Joe D. Haines explores the career of the Wild Horse of the Osage during and beyond his years with the St. Louis Cardinals.</span></blockquote><span data-dcnode-id="1475" instrument_node="">
</span><img alt=" " class="icon" data-dcnode-id="1474" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.okhistory.org/images/publications/Chronicles033.jpg&amp;raw"><h2 data-dcnode-id="1472"><span data-dcnode-id="1473" instrument_node="">Volume 80, No. 3 (Fall 2002)</span></h2><span data-dcnode-id="1471" instrument_node="">
</span><p data-dcnode-id="1469"><span data-dcnode-id="1470" instrument_node="">“From Petroleum to Pigs: The Oklahoma Panhandle in the Last Half of the Twentieth Century,” by Richard Lowitt, 260–283</span></p><blockquote data-dcnode-id="1467"><span data-dcnode-id="1468" instrument_node="">The Oklahoma Panhandle and its people made a strong recovery from the dust, drought, and depression of the 1930s through diversification of its economic base. Richard Lowitt continues the panhandle’s story over the last fifty years with a study of the rise of the oil and gas industry, improvements in agriculture and ranching, and the development of pork production facilities.</span></blockquote><span data-dcnode-id="1466" instrument_node="">
</span><p data-dcnode-id="1464"><span data-dcnode-id="1465" instrument_node="">“Canvas and Caissons: Early Aviation at Fort Sill, 1914–1939,” by Stacy Webb Reaves, 284–301</span></p><blockquote data-dcnode-id="1462"><span data-dcnode-id="1463" instrument_node="">In the early twentieth century Fort Sill, Oklahoma became the site of experimentation and training for the new United States Aeronautics Corps as a division of the Army Signal Corps. As a result, Henry Post Field played a key role in the early development of army aviation. Stacy Reaves recounts the history of the men and the machines that were critical components of the aviation section working in conjunction with the field artillery.</span></blockquote><span data-dcnode-id="1461" instrument_node="">
</span><p data-dcnode-id="1459"><span data-dcnode-id="1460" instrument_node="">“Protecting His Race: A. J. Smitherman and the Tulsa Star,” by Larry O’Dell, 302–313</span></p><blockquote data-dcnode-id="1457"><span data-dcnode-id="1458" instrument_node="">In addition to leaving numerous deaths and widespread physical destruction in its wake, the Tulsa race riot ended the Oklahoma career of one of the black community’s strongest voices. Larry O’Dell focuses on the efforts of A. J. Smitherman, publisher of the Tulsa Star, to educate members of his race about their responsibility to protect themselves from lynchings and mob violence—advice that would have dire consequences in May, 1921.</span></blockquote><span data-dcnode-id="1456" instrument_node="">
</span><p data-dcnode-id="1454"><span data-dcnode-id="1455" instrument_node="">“Cherokee Emigration: Reconstructing Reality,” by Lathel F. Duffield, 314–347</span></p><blockquote data-dcnode-id="1452"><span data-dcnode-id="1453" instrument_node="">The story of the forced removal of the Cherokees from the southeastern United States is widely known, but details of the ordeal are still unfolding. The removal itself and the intervening years have produced a plethora of documents and histories. Lathel Duffield looks at the interpretations of several historians and authors, questionable “eyewitness” accounts, early newspaper reports, and original documents to provide a clearer picture of that dark period.</span></blockquote><span data-dcnode-id="1451" instrument_node="">
</span><p data-dcnode-id="1449"><span data-dcnode-id="1450" instrument_node="">“‘The Best Our Country Has To Offer’: Peace Corps Training at the University of Oklahoma,” by Richard H. Hancock, 348–369</span></p><blockquote data-dcnode-id="1447"><span data-dcnode-id="1448" instrument_node="">Between 1963 and the mid-1980s, the University of Oklahoma provided language, technical, and cultural training for 1,500 Peace Corps volunteers for overseas duty. Richard Hancock directed the international training program at OU and now recalls the memorable stories associated with the training of men and women he considered “the best our country has to offer.”</span></blockquote><span data-dcnode-id="1446" instrument_node="">
</span><img alt=" " class="icon" data-dcnode-id="1445" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.okhistory.org/images/publications/Chronicles034.jpg&amp;raw"><h2 data-dcnode-id="1443"><span data-dcnode-id="1444" instrument_node="">Volume 80, No. 2 (Summer 2002)</span></h2><span data-dcnode-id="1442" instrument_node="">
</span><p data-dcnode-id="1440"><span data-dcnode-id="1441" instrument_node="">“Oklahoma’s Rising Star: The Election of Mike Monroney to the United States Senate,” by Philip A. Grant, Jr., 132–141</span></p><blockquote data-dcnode-id="1438"><span data-dcnode-id="1439" instrument_node="">By 1950 Americans looked forward to economic prosperity after decades of hard times and world war. In that vein, voters began to elect an increasing number of younger, progressive men to national office. Philip Grant analyzes and describes the 1950 U. S. Senate race in Oklahoma, in which a young rising star, Mike Monroney, unseated veteran Senator Elmer Thomas.</span></blockquote><span data-dcnode-id="1437" instrument_node="">
</span><p data-dcnode-id="1435"><span data-dcnode-id="1436" instrument_node="">“Judge John Martin: His Origins, His Paternity,” by Patricia W. Lockwood, 142–157</span></p><blockquote data-dcnode-id="1433"><span data-dcnode-id="1434" instrument_node="">The facts about the origin and paternity of John Martin, the first chief justice 
 of the first supreme court of the Cherokee Nation in Indian Territory, have been distorted or lost over the years. Patricia Lockwood, a descendant of John Martin, clears the record through discovery and investigation of centuries-old records that shed light on his ancestry and early life in the Cherokee Nation East.</span></blockquote><span data-dcnode-id="1432" instrument_node="">
</span><p data-dcnode-id="1430"><span data-dcnode-id="1431" instrument_node="">“Profile of a Prairie Radical: Judge Orville Enfield of Ellis County,” by R. O. Joe Cassity, Jr., 158–175</span></p><blockquote data-dcnode-id="1428"><span data-dcnode-id="1429" instrument_node="">Most assessments of Oklahoma radicalism are cast in a statistical framework of vote tallies and membership totals. However, after the party’s decline, most Oklahoma Socialists remained in the state and lived their lives much 
 as before. Joe Cassity traces the historical development and shifting sands of Oklahoma radicalism through the life and career of Orville Enfield of Ellis County.</span></blockquote><span data-dcnode-id="1427" instrument_node="">
</span><p data-dcnode-id="1425"><span data-dcnode-id="1426" instrument_node="">“Oklahoma College for Women: Oklahoma’s Only State-Supported Women’s School,” by Cynthia Savage, 176–203</span></p><blockquote data-dcnode-id="1423"><span data-dcnode-id="1424" instrument_node=""> The Oklahoma College for Women in Chickasha opened in 1911 as one of only eight schools in the nation founded as a state-supported women’s college. Although the educational focus changed over the years, Cynthia Savage shows, the physical growth of the campus over the next fifty years reflected the aspirations of the college and the growth of women’s education in the state.</span></blockquote><span data-dcnode-id="1422" instrument_node="">
</span><p data-dcnode-id="1420"><span data-dcnode-id="1421" instrument_node="">“Oklahoma’s ‘Greatest’ Hero?: A Review of the Military Record of Joseph Oklahombi, by Louis Coleman, 204–215</span></p><blockquote data-dcnode-id="1418"><span data-dcnode-id="1419" instrument_node="">Joseph Oklahombi has been cited as the state’s “greatest hero of World War I” and recipient of numerous medals and awards, including the Medal of Honor, for his exploits in France. Louis Coleman acknowledges that Oklahombi may have been a hero, but military records on two continents show that the soldier received only the Silver Star Citation and the French croix de guerre.</span></blockquote><span data-dcnode-id="1417" instrument_node="">
</span><img alt=" " class="icon" data-dcnode-id="1416" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.okhistory.org/images/publications/Chronicles035.jpg&amp;raw"><h2 data-dcnode-id="1414" id="v80"><span data-dcnode-id="1415" instrument_node="">Volume 80, No. 1 (Sping 2002)</span></h2><span data-dcnode-id="1413" instrument_node="">
</span><p data-dcnode-id="1411"><span data-dcnode-id="1412" instrument_node="">“The Northern Cheyenne Exodus and the 1878 Battle of Turkey Springs,” by Stan Hoig, 4–19</span></p><blockquote data-dcnode-id="1409"><span data-dcnode-id="1410" instrument_node="">The battle of Turkey Springs, a decisive Indian victory over U.S. troops as part of the Northern Cheyenne exodus from Indian Territory in 1878, has received little scholarly attention. Stan Hoig remedies that oversight with a description of the harsh conditions that precipitated the exodus and of the military’s response, one that was ill-planned and led and one that ultimately failed.</span></blockquote><span data-dcnode-id="1408" instrument_node="">
</span><p data-dcnode-id="1406"><span data-dcnode-id="1407" instrument_node="">“‘If It Rains’: Life in the Oklahoma Panhandle in the 1930s and 1940s,” by Richard Lowitt, 20–43</span></p><blockquote data-dcnode-id="1404"><span data-dcnode-id="1405" instrument_node="">The Oklahoma Panhandle enjoyed a degree of prosperity in the 1920s that disappeared as the Southern Great Plains suffered depression, drought, and dust storms throughout the 1930s. Richard Lowitt explores how panhandle residents coped with the crises, how they used available resources, and what they learned about land use in the effort to restore a profitable economy.</span></blockquote><span data-dcnode-id="1403" instrument_node="">
</span><p data-dcnode-id="1401"><span data-dcnode-id="1402" instrument_node="">“Forgotten Founder: Charles G. “Gristmill” Jones and the Growth of Oklahoma City, 1889–1911,” by Aaron Bachhofer II, 44–61

</span></p><blockquote data-dcnode-id="1399"><span data-dcnode-id="1400" instrument_node="">Charles Gasham“Gristmill” Jones was one of the most important men in the first two decades of Oklahoma City’s development, but he has remained an enigmatic figure and a forgotten founder. Aaron Bachhofer focuses on the myriad ways in which Jones left his mark on the struggling community through political and civic activity and industrial development.</span></blockquote><span data-dcnode-id="1398" instrument_node="">
</span><p data-dcnode-id="1396"><span data-dcnode-id="1397" instrument_node="">“Main Street, Stillwater OK, Growing Up with Hollywood CA: An Oklahoma Town’s Movie Theaters,” by Deborah Carmichael, 62–83</span></p><blockquote data-dcnode-id="1394"><span data-dcnode-id="1395" instrument_node="">The history of movie theaters in small communities often reflects many of the characteristics, problems, and growing pains of the film industry in Hollywood. Using Stillwater, Oklahoma, as a case study, Deborah Carmichael provides a careful analysis of the local theater businesses and how they grew from small beginnings and large dreams to corporate mergers and takeovers.</span></blockquote><span data-dcnode-id="1393" instrument_node="">
</span><p data-dcnode-id="1391"><span data-dcnode-id="1392" instrument_node="">“Galela Leona Walkingstick: A Life of Service as an Indian School Social Worker,” by James G. McCullagh, 84–101</span></p><blockquote data-dcnode-id="1389"><span data-dcnode-id="1390" instrument_node="">Galela Walkingstick, one of the first Indian social workers employed by the Indian Service in the 1930s, has lived her entire life among the state’s non-Indian majority society while upholding her Cherokee heritage. James McCullagh shows that through education and career choice Walkingstick dedicated herself to helping Indian families and children, her community, and her church.</span></blockquote><span data-dcnode-id="1388" instrument_node="">
</span><img alt=" " class="icon" data-dcnode-id="1387" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.okhistory.org/images/publications/Chronicles042.jpg&amp;raw"><h2 data-dcnode-id="1385" id="issue2001"><span data-dcnode-id="1386" instrument_node="">Volume 79, No. 4 (Winter 2001–02) </span></h2><p class="backtotop" data-dcnode-id="1382"><a data-dcnode-id="1383" href="#top"><span data-dcnode-id="1384" instrument_node="">Back to top</span></a></p><span data-dcnode-id="1381" instrument_node="">
</span><p data-dcnode-id="1379"><span data-dcnode-id="1380" instrument_node="">“Reminiscences of a Redleg: An Oklahoma Artilleryman in the Korean War,” by Denzil D. Garrison, 388–407</span></p><blockquote data-dcnode-id="1377"><span data-dcnode-id="1378" instrument_node="">In 1950 a young Oklahoman found himself bound for Korea with the Forty-fifth Infantry Division. When Denzil Garrison returned home two years later, he had amassed a sobering collection of memories of a conflict with an implacable enemy on unforgiving terrain. Garrison recalls those poignant experiences, albeit some of them humorous, and the valiant men with whom he served.</span></blockquote><span data-dcnode-id="1376" instrument_node="">
</span><p data-dcnode-id="1374"><span data-dcnode-id="1375" instrument_node="">“‘America, Love It or Leave It’: Some Native American Initiatives to Move to Mexico, 1890–1940,” by Steven Crum, 408–429</span></p><blockquote data-dcnode-id="1372"><span data-dcnode-id="1373" instrument_node="">Between 1890 and 1940 some members of several Oklahoma Indian tribes explored the possibility of moving to Mexico in response to the federal government’s reduction of their traditional land bases and eventually their sovereignty. Steven Crum discusses their efforts within the context of a phrase from the 1960s, “America, Love It or Leave It.”</span></blockquote><span data-dcnode-id="1371" instrument_node="">
</span><p data-dcnode-id="1369"><span data-dcnode-id="1370" instrument_node="">“‘She Has Surely Done Her Share’: Miss Bessie Huff and the Muskogee Junior College,” by Dana Eversole, 430–439</span></p><blockquote data-dcnode-id="1367"><span data-dcnode-id="1368" instrument_node="">After graduating from Muskogee’s Central High School in 1911, Bessie Huff left Oklahoma to study and teach in Kansas. Her hometown drew her back, however, and she began a long career as instructor of English and journalism and dean of Muskogee Junior College. Using tributes from former students, Dana
 Eversole salutes a dedicated teacher who always put them first.</span></blockquote><span data-dcnode-id="1366" instrument_node="">
</span><p data-dcnode-id="1364"><span data-dcnode-id="1365" instrument_node="">The Life of Littleton Horace Davis: Pistol Packin’ Preacher and Railroad Man,” by Frank W. Davis, 440–453</span></p><blockquote data-dcnode-id="1362"><span data-dcnode-id="1363" instrument_node="">In 1901 L. H. Davis moved his family to Francis, Oklahoma, to take a job with the railroad. Combining that sometimes dangerous assignment, especially during the strikes of 1922, with his work as a minister and farmer, Davis became a leader in the community and a man seemingly afraid of nothing. Frank Davis explores the life of his grandfather, the pistol packin’ preacher.</span></blockquote><span data-dcnode-id="1361" instrument_node="">
</span><p data-dcnode-id="1359"><span data-dcnode-id="1360" instrument_node="">“Celebrating the Library Spirit: A Look Back at the Carnegie Libraries in Oklahoma,” by Tanya D. Finchum and G. Allen Finchum, 454–475</span></p><blockquote data-dcnode-id="1357"><span data-dcnode-id="1358" instrument_node="">In the early twentieth century, Andrew Carnegie funded the construction of twenty-four libraries in Oklahoma, providing places for residents to learn, to read, and to be entertained. Tanya Finchum and Allen Finchum invite readers to celebrate 100 years of Carnegie’s presence in Oklahoma and to honor the communities’ commitment to the library spirit.</span></blockquote><span data-dcnode-id="1356" instrument_node="">
</span><img alt=" " class="icon" data-dcnode-id="1355" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.okhistory.org/images/publications/Chronicles067.jpg&amp;raw"><h2 data-dcnode-id="1353"><span data-dcnode-id="1354" instrument_node="">Volume 79, No. 3 (Fall 2001)</span></h2><span data-dcnode-id="1352" instrument_node="">
</span><p data-dcnode-id="1350"><span data-dcnode-id="1351" instrument_node="">“From Lee to Reba and Beyond: Oklahoma Women in American Popular Music,” by George O. Carney, 260–277</span></p><blockquote data-dcnode-id="1348"><span data-dcnode-id="1349" instrument_node="">Music is one of Oklahoma’s most important cultural resources, and the state has produced a number of talented performers, composers, institutions, and songs. However, the contributions of Oklahoma-born women in American popular music have often been overlooked. George Carney rectifies that in an interesting demographic profile of twenty-four Oklahoma women artists.</span></blockquote><span data-dcnode-id="1347" instrument_node="">
</span><p data-dcnode-id="1345"><span data-dcnode-id="1346" instrument_node="">“Cultural Conservation and Revival: The Caddo and Hasinai Post-Removal Era, 1860–1902,” by Howard Meredith, 278–287</span></p><blockquote data-dcnode-id="1343"><span data-dcnode-id="1344" instrument_node="">The Caddos and Hasinais faced a watershed in their history during the removal crisis in 1859, but the period following removal has received little scholarly attention. In a time of great change, Howard Meredith shows, the people and their leaders conserved and revived the best elements of their culture through tribal tradition and solidarity.</span></blockquote><span data-dcnode-id="1342" instrument_node="">
</span><p data-dcnode-id="1340"><span data-dcnode-id="1341" instrument_node="">“Bisque Dolls in the Archaeological Record: A Collection from the Town of Ingersoll,” by Robert L. Brooks, 288–297</span></p><blockquote data-dcnode-id="1338"><span data-dcnode-id="1339" instrument_node="">Archeologists frequently find and study artifacts that reveal hunting and farming practices, household work, and economic activities, but the record provides few studies relating to recreational and leisure activities. Robert Brooks analyzed a collection of bisque dolls from the abandoned town of Ingersoll and provides insight into their use in the early statehood period.</span></blockquote><span data-dcnode-id="1337" instrument_node="">
</span><p data-dcnode-id="1335"><span data-dcnode-id="1336" instrument_node="">“Anatomy of an Oklahoma Lynching: Bryan County, August 12–13, 1911,” by Lowell L. Blaisdell, 298–313</span></p><blockquote data-dcnode-id="1333"><span data-dcnode-id="1334" instrument_node="">In August, 1911, a black man named John Lee attacked and killed a woman alone with her children on their farm north of Durant. A large crowd tracked down and shot Lee, then burned his body. Lowell Blaisdell describes the events of August 12–13 within the context of the area’s social and cultural milieu and how they compare with patterns of lynching behaviors nationwide.</span></blockquote><span data-dcnode-id="1332" instrument_node="">
</span><p data-dcnode-id="1330"><span data-dcnode-id="1331" instrument_node="">“Cherokee Treaty Party Moves West: The Bell-Deas Overland Journey, 1838–1839,” by Wayne Dell Gibson, 314–335</span></p><blockquote data-dcnode-id="1328"><span data-dcnode-id="1329" instrument_node="">In 1838 the Cherokees were preparing for the trek to a new home in what is now Oklahoma. Most detachments were led by men of John Ross’s anti-treaty party. Amid much controversy, John Adair Bell and the Treaty Party also won the right to conduct their own emigration. Wayne Gibson reconstructs their journey using the records o the disbursing officer, Lt. Edward Deas.</span></blockquote><span data-dcnode-id="1327" instrument_node="">
</span><p data-dcnode-id="1324"><span data-dcnode-id="1326" instrument_node="">“The Green Corn Rebellion, Oklahoma, August, 1917: A Descriptive Bibliography of Secondary Sources,” by Daniel Hanne, 343–357

</span><img alt=" " class="icon" data-dcnode-id="1325" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.okhistory.org/images/publications/Chronicles038.jpg&amp;raw"></p><h2 data-dcnode-id="1322"><span data-dcnode-id="1323" instrument_node="">Volume 79, No. 2 (Summer 2001)</span></h2><span data-dcnode-id="1321" instrument_node="">
</span><p data-dcnode-id="1319"><span data-dcnode-id="1320" instrument_node="">“Emperor Haile Selassie in Stillwater: The First Visit to Oklahoma by a Reigning Foreign Head of State,” by Theodore M. Vestal, 132–157</span></p><blockquote data-dcnode-id="1317"><span data-dcnode-id="1318" instrument_node="">Oklahoma A&amp;M College in 1954 hosted the first visit to Oklahoma by a foreign head of state, Emperor Haile Selassie of Ethiopia. The biggest social event in the college’s history marked the school’s top standing in technical assistance and education and an international connection that continues today. Theodore Vestal provides a fascinating study of the times, the visit, and the man.</span></blockquote><span data-dcnode-id="1316" instrument_node="">
</span><p data-dcnode-id="1314"><span data-dcnode-id="1315" instrument_node="">“History Underfoot: The Search for Physical Evidence of the 1868 Attack on Black Kettle’s Village,” by William B. Lees, Douglas D. Scott, and C. Vance Haynes, 158–181</span></p><blockquote data-dcnode-id="1312"><span data-dcnode-id="1313" instrument_node="">For more than a century, scholars, Native Americans, and an interested public have both studied and commemorated events that took place on the Washita River on a fateful day in 1868. As William Lees, Douglas Scott, and Vance Haynes show, archaeological/ geological surveys in 1995 and 1997 exposed new evidence and added much to an understanding of place and event.</span></blockquote><span data-dcnode-id="1311" instrument_node="">
</span><p data-dcnode-id="1309"><span data-dcnode-id="1310" instrument_node="">“The Creek Draft Rebellion of 1918: Wartime Hysteria and Indian-Baiting in WWI Oklahoma,” by Thomas A. Britten, 200–215</span></p><blockquote data-dcnode-id="1307"><span data-dcnode-id="1308" instrument_node="">A national outcry arose in the spring of 1918 after the public read reports of an Indian “uprising” in eastern Oklahoma. At the heart of the story was an unlikely revolutionary, a Creek woman called Ellen Perryman. Thomas Britten explores the prevailing stereotypes and the wartime hysteria that precipitated a nationwide investigation into a seemingly benign protest.</span></blockquote><span data-dcnode-id="1306" instrument_node="">
</span><p data-dcnode-id="1304"><span data-dcnode-id="1305" instrument_node="">“There is No Place like The Home: A Brief History of the Tulsa Boy’s Home,” by Michael Lail, 216–227</span></p><blockquote data-dcnode-id="1302"><span data-dcnode-id="1303" instrument_node="">Like other cities in the late teens, Tulsa had many homeless or neglected boys living in its streets. The Tulsa Rotary Club and the First Presbyterian Church intervened in behalf of many of them when they founded the Tulsa Boys’ Home in 1918. Michael Lail details The Home’s long tradition of providing opportunity and hope for wayward youth.</span></blockquote><span data-dcnode-id="1301" instrument_node="">
</span><img alt=" " class="icon" data-dcnode-id="1300" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.okhistory.org/images/publications/Chronicles041.jpg&amp;raw"><h2 data-dcnode-id="1298" id="v79"><span data-dcnode-id="1299" instrument_node="">Volume 79, No. 1 (Sping 2001)</span></h2><span data-dcnode-id="1297" instrument_node="">
</span><p data-dcnode-id="1295"><span data-dcnode-id="1296" instrument_node="">“Will Rogers Field: The Life and Death of a World War II Airbase,” by Keith Tolman, 4–17</span></p><blockquote data-dcnode-id="1293"><span data-dcnode-id="1294" instrument_node="">Because of its climate and geographic location, the state of Oklahoma was well situated to be the site of primary and basic flight training during World War II. The Oklahoma City municipal airport that became Will Rogers Field in the 1940s also eventually provided a base to train aircrews in advance aerial bombardment and photographic reconnaissance. Keith Tolman examines the efforts of local and military officials to develop and operate the base.</span></blockquote><span data-dcnode-id="1292" instrument_node="">
</span><p data-dcnode-id="1290"><span data-dcnode-id="1291" instrument_node="">“Major Andrew Drumm: Cowman, Businessman, and Visionary,” by Bonnie Haas and Joyce J. Bender, 18–35</span></p><blockquote data-dcnode-id="1288"><span data-dcnode-id="1289" instrument_node="">In the late nineteenth century, Andrew Drumm, the founder and owner of the U Ranch in the Cherokee Outlet, had become one of the nation’s most successful businessmen. Over his lifetime, his experiences and interests ranged from mining and ranching to slaughter houses and banking. However, as Bonnie Haas and Joyce Bender show, his most enduring legacy is the Drumm Institute in Missouri, a home for indigent and orphaned youth.</span></blockquote><span data-dcnode-id="1287" instrument_node="">
</span><p data-dcnode-id="1285"><span data-dcnode-id="1286" instrument_node="">“‘Almost Hopeless in the Wake of the Storm’: The 1918 Spanish Flu Epidemic in Oklahoma,” by Nigel Anthony Sellars, 36–61</span></p><blockquote data-dcnode-id="1283"><span data-dcnode-id="1284" instrument_node="">In the Spanish flu epidemic of 1918–1919, more than 550,000 Americans, including 7,350 Oklahomans, died from the disease. Communities and health professionals battled a contagion against which normal public health measures proved futile. Nigel Sellars provides a fascinating study, in human terms, of an outbreak that left everyone “almost hopeless in the wake of the storm.”</span></blockquote><span data-dcnode-id="1282" instrument_node="">
</span><p data-dcnode-id="1280"><span data-dcnode-id="1281" instrument_node="">“Humanitarian Rhetoric and Andrew Jackson’s Indian Removal Policy,” by Henry E. Fritz, 62–91</span></p><blockquote data-dcnode-id="1278"><span data-dcnode-id="1279" instrument_node="">The effort to remove the Five Tribes from the southeastern United States in the early nineteenth century provided a great deal of discussion on both sides of the issue. Henry Fritz reviews the rhetoric of President Andrew Jackson’s policy to argue that Jackson was neither an Indian hater nor a statesman whose foremost concerns were justice and fair treatment for the Indians.</span></blockquote><span data-dcnode-id="1277" instrument_node="">
</span><p data-dcnode-id="1275"><span data-dcnode-id="1276" instrument_node="">“Oklahoma Republican: Dennis Thomas Flynn and His Letters to William Howard Taft,” by Leonard C. Schlup, 92–107</span></p><blockquote data-dcnode-id="1273"><span data-dcnode-id="1274" instrument_node="">During a political career in which he served as delegate to Congress from Oklahoma Territory, Dennis T. Flynn established a close friendship with William Howard Taft both before and after his presidency. Drawing the sources in Taft’s papers, Leonard Schlup reconstructs the career of the Oklahoma Republican to reveal his characteristics as an individual and as a politician.</span></blockquote><span data-dcnode-id="1272" instrument_node="">
</span><p data-dcnode-id="1269"><span data-dcnode-id="1271" instrument_node="">“Into the West: Oklahoma Remembered,” by Walter Nugent, 112–121

</span><img alt=" " class="icon" data-dcnode-id="1270" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.okhistory.org/images/publications/Chronicles043.jpg&amp;raw"></p><h2 data-dcnode-id="1267" id="issue2000"><span data-dcnode-id="1268" instrument_node="">Volume 78, No. 4 (Winter 2000–01) </span></h2><p class="backtotop" data-dcnode-id="1264"><a data-dcnode-id="1265" href="#top"><span data-dcnode-id="1266" instrument_node="">Back to top</span></a></p><span data-dcnode-id="1263" instrument_node="">
</span><p data-dcnode-id="1261"><span data-dcnode-id="1262" instrument_node="">“For Society’s Sake: The Wichita Mountains, Wildlife, and Identity in Oklahoma’s Early Environmental History,” by S. Matthew DeSpain, 388–411</span></p><blockquote data-dcnode-id="1259"><span data-dcnode-id="1260" instrument_node="">The creation of the Wichita Mountains Wildlife Refuge in southwestern Oklahoma reflected society’s expectation that it could revive its spirit through nature. Matthew S. DeSpain provides a fascinating account of the American mindset in the early twentieth century and how human interests, not wilderness preservation per se, dictated the state’s early environmental history.</span></blockquote><span data-dcnode-id="1258" instrument_node="">
</span><p data-dcnode-id="1256"><span data-dcnode-id="1257" instrument_node="">“Tams Bixby: Doing Government Business in the Gilded Age,” by Kent Carter, 412–443

</span></p><blockquote data-dcnode-id="1254"><span data-dcnode-id="1255" instrument_node="">In the late nineteenth and early twentieth centuries the Dawes Commission had the almost impossible task of enrolling and allotting land to members of the Five Civilized Tribes, a process marked by controversy and charges of corruption. Kent Carter takes a close look at the troubled tenure of commissioner Tams Bixby, who apparently found nothing wrong with making money while doing the government’s business.</span></blockquote><span data-dcnode-id="1253" instrument_node="">
</span><p data-dcnode-id="1251"><span data-dcnode-id="1252" instrument_node="">“A Place of Coming Together: The Historic Jacobson House,” by Carol Whitney, 444–467</span></p><blockquote data-dcnode-id="1249"><span data-dcnode-id="1250" instrument_node="">Oscar Jacobson arrived at the University of Oklahoma in 1915 as director of the School of Art. By the time of his death in 1966, he had sparked a revolution in art education and a renaissance in Indian painting on the Southern Plains. Carol Whitney reviews Jacobson’s life and work in the context of a group of passionate individuals determined to preserve and restore his house as a Native American Arts Center.</span></blockquote><span data-dcnode-id="1248" instrument_node="">
</span><p data-dcnode-id="1246"><span data-dcnode-id="1247" instrument_node="">“H. L. Mencken and the ‘Oklahoma Style’ of Literature,” by Lawrence R. Rodgers, 468–483</span></p><blockquote data-dcnode-id="1244"><span data-dcnode-id="1245" instrument_node="">In the 1930s two popular novels, Cimarron and The Grapes of Wrath, came to be recognized as dominant literary portraits of the state. But nearly a decade earlier, national audiences had received an introduction to an “Oklahoma Style” of literature through the works of several writers of serious poetry. Lawrence Rodgers focuses on the young Oklahoma authors who received almost unprecedented promotion by the Sage of Baltimore, H. L. Mencken.</span></blockquote><span data-dcnode-id="1243" instrument_node="">
</span><p data-dcnode-id="1241"><span data-dcnode-id="1242" instrument_node="">“Inside the School Yard Gate: ‘Alfalfa Bill’ Murray and Education in Oklahoma,” by Karen McKellips, 484–499</span></p><blockquote data-dcnode-id="1239"><span data-dcnode-id="1240" instrument_node="">Throughout his long career, William H. Murray wielded great influence in public and political spheres. Nowhere was that more evident than in the field of education. Through an examination of the state constitution, early statutes, and his own policies and practice, Karen McKellips explores Murray’s legacy in the characteristics of public education that bear his imprint.</span></blockquote><span data-dcnode-id="1238" instrument_node="">
</span><img alt=" " class="icon" data-dcnode-id="1237" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.okhistory.org/images/publications/Chronicles068.jpg&amp;raw"><h2 data-dcnode-id="1235"><span data-dcnode-id="1236" instrument_node="">Volume 78, No. 3 (Fall 2000)</span></h2><span data-dcnode-id="1234" instrument_node="">
</span><p data-dcnode-id="1232"><span data-dcnode-id="1233" instrument_node="">“Brothers of Influence: Auguste and Pierre Chouteau and the Osages before 1804,” by Douglas A. Hurt, 260–277</span></p><blockquote data-dcnode-id="1230"><span data-dcnode-id="1231" instrument_node="">In the late eighteenth century, the Osages used their geographical position to become one of the most influential tribes of the Southern Plains, but their success had its price as European influences radically altered Osage social structure. In this issue’s lead article, Douglas A. Hurt explores the pivotal role of Auguste and Pierre Chouteau in that transformation.</span></blockquote><span data-dcnode-id="1229" instrument_node="">
</span><p data-dcnode-id="1227"><span data-dcnode-id="1228" instrument_node="">“Tinker’s Twin Twisters of 1948 and the Birth of Tornado Forecasting,” by James L. Crowder, 278–295</span></p><blockquote data-dcnode-id="1225"><span data-dcnode-id="1226" instrument_node="">On March 20 and March 25, 19948, tornadoes struck Tinker Air Force Base causing millions of dollars in damage. Two base weathermen successfully predicted the second twister. After describing the destructive path of the storms, James L. Crowder pays tribute to Robert C. Miller and Earnest J. Fawbush, who forever changed the field of weather forecasting.</span></blockquote><span data-dcnode-id="1224" instrument_node="">
</span><p data-dcnode-id="1222"><span data-dcnode-id="1223" instrument_node="">“Consorting with Blood and Violence: The Decline of the Oklahoma Ku Klux Klan,” by Michael M. Jessup, 296–315</span></p><blockquote data-dcnode-id="1220"><span data-dcnode-id="1221" instrument_node="">The Oklahoma Ku Klux Klan in the 1920s was one of the state’s most powerful political and social organizations, numbering almost 100,000 members, but its downfall was as dramatic at its growth. In dramatic fashion, Michael M. Jessup shows how excessive violence, external opposition, and internal factionalism led to the Klan’s decline.</span></blockquote><span data-dcnode-id="1219" instrument_node="">
</span><p data-dcnode-id="1217"><span data-dcnode-id="1218" instrument_node="">“‘An anxiety to do right’: The Life of Judge John Hazelton Cotteral, 1864–1933,” by Kevin C. Leitch, 316–345</span></p><blockquote data-dcnode-id="1215"><span data-dcnode-id="1216" instrument_node="">John H. Cotteral came to Guthrie, Oklahoma, in 1899 to make his mark in the new country. His hopes were fulfilled as he became the first federal judge for the Western District of Oklahoma and the first Oklahoman to occupy the bench of the circuit court of appeals. Kevin C. Leitch provides a fascinating portrait of both the man and the legal opinions he wrote during a forty-year career.</span></blockquote><span data-dcnode-id="1214" instrument_node="">
</span><p data-dcnode-id="1212"><span data-dcnode-id="1213" instrument_node="">The Removal of the Southeastern Indians: Historians Respond to the 1960s and the Trail of Tears,” by Michael Kelleher, 346–353

</span></p><blockquote data-dcnode-id="1210"><span data-dcnode-id="1211" instrument_node="">The politics and culture of the 1960s and 1970s played a role in shaping popular conceptions of Indian America as scholars increasingly began to re-investigate Indian history. Michael Kelleher looks at the work of several historian to analyze how that turbulent time affected their interpretations of a seminal event in Indian-white relations, the removal of the southeastern Indians.</span></blockquote><span data-dcnode-id="1209" instrument_node="">
</span><p data-dcnode-id="1206"><span data-dcnode-id="1208" instrument_node="">“Development and Use of the Oklahoma Landmarks Inventory,” by Melvena Thurman Heisch, 358–363

</span><img alt=" " class="icon" data-dcnode-id="1207" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.okhistory.org/images/publications/Chronicles036.jpg&amp;raw"></p><h2 data-dcnode-id="1204"><span data-dcnode-id="1205" instrument_node="">Volume 78, No. 2 (Summer 2000)</span></h2><span data-dcnode-id="1203" instrument_node="">
</span><p data-dcnode-id="1201"><span data-dcnode-id="1202" instrument_node="">“Love Gifts for the Bishop: James J. Stewart v. Bishop W. Angie Smith, Part II,” by A. W. Martin, Jr., 132–159 </span></p><blockquote data-dcnode-id="1199"><span data-dcnode-id="1200" instrument_node="">In the 1950s an Albuquerque minister in an unprecedented move filed charges against Methodist bishop W. Angie Smith for what he considered abuse of episcopal power. In the second installment of a well-annotated, two-part study, A. W. Martin, Jr., discusses the procedures followed by the church investigating committee and analyses each of the charges a maverick Methodist minister filed against a powerful bishop.</span></blockquote><span data-dcnode-id="1198" instrument_node="">
</span><p data-dcnode-id="1196"><span data-dcnode-id="1197" instrument_node="">“Kate Barnard: The Story of a Woman Politician,” by Linda Edmondson and Margaret Larason, 160–181 </span></p><blockquote data-dcnode-id="1194"><span data-dcnode-id="1195" instrument_node="">In 1907 Kate Barnard won election as the state’s first commissioner of charities and corrections as a champion of working women, children, labor unions, prisoners, and the handicapped and mentally ill. Her downfall, however, came as a result of her investigation of Indian estate and guardianship fraud cases. Linda Edmondson and Margaret Larason provide a fascinating account of a skillful but little-known “woman politician” whose dedication to social causes has not been equaled.</span></blockquote><span data-dcnode-id="1193" instrument_node="">
</span><p data-dcnode-id="1191"><span data-dcnode-id="1192" instrument_node="">“‘You Have the Land. I Have the Cattle’: Intermarried Whites and the Chickasaw Range Lands,” by Wendy St. Jean, 182–195 </span></p><blockquote data-dcnode-id="1189"><span data-dcnode-id="1190" instrument_node="">In the late nineteenth century the Chickasaw Nation, along with much of the region, experienced a tremendous boom in the cattle industry. Although the tribal government strengthened laws to protect is public domain, intermarried whites easily transgressed them. Wendy St. Jean explores the methods by which cattlemen amassed large grazing pastures and describes how the Chickasaw government responded. </span></blockquote><span data-dcnode-id="1188" instrument_node="">
</span><p data-dcnode-id="1186"><span data-dcnode-id="1187" instrument_node="">“Western Oklahoma’s Regiment: The 179th Infantry,” by Penn V. Rabb, Jr., 196–215</span></p><blockquote data-dcnode-id="1184"><span data-dcnode-id="1185" instrument_node="">In the early years of the new century, communities and individuals across the nation will commemorate the fiftieth anniversary of the Korean War. Many of the unites engaged in the conflict were federalized state national guards. Penn V. Rabb, Jr., looks back at the organization and history of western Oklahoma’s regiment, the 179th Infantry, and at the men who proudly and honorably served the people of the state, the nation, and the world in times of peace and times of war. </span></blockquote><span data-dcnode-id="1183" instrument_node="">
</span><p data-dcnode-id="1181"><span data-dcnode-id="1182" instrument_node="">“The Park Hill Mission: Letters from a Missionary Family,” by Kristina L. Southwell, 216–229</span></p><blockquote data-dcnode-id="1179"><span data-dcnode-id="1180" instrument_node="">The Reverend Joseph Leiper, his wife, Fanny Leiper, and his aunt, Margaret McCarrell, moved to the Park Hill Mission near Tahlequah in 1889 to served as Presbyterian missionaries among the Cherokees. Using letters found nearly 100 years later by Joseph Leiper’s granddaughter, which are supplemented by photographs the Leipers took in Indian Territory, Kristina L. Southwell reconstructs their experiences during the first year of missionary work.</span></blockquote><span data-dcnode-id="1178" instrument_node="">
</span><img alt=" " class="icon" data-dcnode-id="1177" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.okhistory.org/images/publications/Chronicles069.jpg&amp;raw"><h2 data-dcnode-id="1175" id="v78"><span data-dcnode-id="1176" instrument_node="">Volume 78, No. 1 (Sping 2000)</span></h2><span data-dcnode-id="1174" instrument_node="">
</span><p data-dcnode-id="1172"><span data-dcnode-id="1173" instrument_node="">“Love Gifts for the Bishop: James J. Stewart v. Bishop W. Angie Smith, Part I,” by A. W. Martin, Jr., 4–27 </span></p><blockquote data-dcnode-id="1170"><span data-dcnode-id="1171" instrument_node="">In the 1950s an Albuquerque minister in an unprecedented move filed charges against Methodist bishop W. Angie Smith for what he considered abuse of episcopal power. In the first part of a well-annotated, two-part study, A. W. Martin, Jr., discusses the events leading up to one of three judicial climaxes–a meeting of the church investigating committee, then details the proceedings of the meeting itself. </span></blockquote><span data-dcnode-id="1169" instrument_node="">
</span><p data-dcnode-id="1167"><span data-dcnode-id="1168" instrument_node="">“Fort Sill, the Chiricahua Apaches, and the Government’s Promise of Permanent Residence,” by Brenda L. Haes, 28–43 </span></p><blockquote data-dcnode-id="1165"><span data-dcnode-id="1166" instrument_node="">The Chiricahua Apaches spent nineteen years (1894–1913) as prisoners of war at Fort Sill in southwestern Oklahoma believing they had been promised permanent residency there. Before addressing the rationale behind the government’s decision to remove the Apaches from the post, Brenda Haes explores the record to show why the Apaches and others held that view. </span></blockquote><span data-dcnode-id="1164" instrument_node="">
</span><p data-dcnode-id="1162"><span data-dcnode-id="1163" instrument_node="">“The Fear of ‘Negro Domination’: The Rise of Segregation and Disfranchisement in Oklahoma,” by Murray R. Wickett, 44–65 </span></p><blockquote data-dcnode-id="1160"><span data-dcnode-id="1161" instrument_node="">Although historians have analyzed the rise of disfranchisement and segregation in the South after the Civil War, they have paid little attention to those processes in the West. Murray Wickett looks closely at the sociopolitical climate in Oklahoma to answer important questions about the opportunity blacks found in the state and how white politicians became emboldened by the fear of “Negro domination.”</span></blockquote><span data-dcnode-id="1159" instrument_node="">
</span><p data-dcnode-id="1157"><span data-dcnode-id="1158" instrument_node="">“The Milton Co-Operative Colony: From Utopia to Ghost town, 1913–1916,” by Norma Jane Bumgarner, 66–83</span></p><blockquote data-dcnode-id="1155"><span data-dcnode-id="1156" instrument_node="">Civil War and intertribal factionalism in the Cherokee Nation left one0third of women as widows and one-fourth of the children as orphans by 1863. The conflict also strained conventional definitions of gender. In a careful examination of the lives of many Cherokee women, Carolyn Johnston concludes that while the crisis may have empowered women, it also led to a crisis of identity for elite women.</span></blockquote><span data-dcnode-id="1154" instrument_node="">
</span><img alt=" " class="icon" data-dcnode-id="1153" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.okhistory.org/images/publications/Chronicles046.jpg&amp;raw"><h2 data-dcnode-id="1151" id="issue1999"><span data-dcnode-id="1152" instrument_node="">Volume 77, No. 4 (Winter 1999–2000) </span></h2><p class="backtotop" data-dcnode-id="1148"><a data-dcnode-id="1149" href="#top"><span data-dcnode-id="1150" instrument_node="">Back to top</span></a></p><span data-dcnode-id="1147" instrument_node="">
</span><p data-dcnode-id="1145"><span data-dcnode-id="1146" instrument_node="">“‘Dear Miss Deco’: The Correspondence of E. E. Dale and Angie Debo,” by Richard Lowitt, 372–405</span></p><blockquote data-dcnode-id="1143"><span data-dcnode-id="1144" instrument_node="">Beginning in 1925 and continuing over the course of nearly fifty years, historians Edward Everett Dale and Angie Debo produced a voluminous correspondence that details the relationship between an established professor of history and one of his students. Through letters that illuminate the character and talents of both individuals, Richard Lowitt reconstructs both the academic world and the professional development of an independent and confident scholar who in the end became the better historian. </span></blockquote><span data-dcnode-id="1142" instrument_node="">
</span><p data-dcnode-id="1140"><span data-dcnode-id="1141" instrument_node="">“Moral Reform for the ‘Magic City’: Temperance in Guthrie, Oklahoma, 1889–1907,” by Jay R. Dew, 406–427 </span></p><blockquote data-dcnode-id="1138"><span data-dcnode-id="1139" instrument_node="">Throughout the territorial period Guthrie, Oklahoma, remained a divided city, especially as it concerned the city’s alcohol policies. While some factions viewed the saloons and breweries as a great economic benefit, reform factions framed the debate in the simple terms of good and evil. Jay R. Dew sorts through the rhetoric of the various anti-liquor groups to show that, despite their lack of unity in the great case of providing moral direction for a growing community, the will of the minority eventually prevailed. </span></blockquote><span data-dcnode-id="1137" instrument_node="">
</span><p data-dcnode-id="1135"><span data-dcnode-id="1136" instrument_node="">“Baffles, Bridges, and Bermuda: Oklahoma Indians and the Civilian Conservation Corps-Indian Division,” by Carolyn G. Hanneman, 428–449 </span></p><blockquote data-dcnode-id="1133"><span data-dcnode-id="1134" instrument_node="">
In the midst of the Great Depression, the federal government instituted a number of programs aimed at recovery and relief. The Civilian Conservation Corps proved to be one of the most enduring as it provided thousands of jobs in conservation work on the American landscape. Carolyn G. Hanneman explores the work of the CCC-Indian Division in Oklahoma in its effort to relieve the poverty of Indian tribes, advance educational reforms, and improve conservation of natural resources on Indian land. </span></blockquote><span data-dcnode-id="1132" instrument_node="">
</span><p data-dcnode-id="1130"><span data-dcnode-id="1131" instrument_node="">“A Special Kind of Man: The Autobiography of Dr. Lindsey L. Long,” by Ben Blackstock, 450–461 </span></p><blockquote data-dcnode-id="1128"><span data-dcnode-id="1129" instrument_node="">In 1898 Dr. Lindsey L. Long, a new graduate of the University Medical College in Kansas City, Missouri, moved to northwestern Oklahoma to establish his practice. The young physician tended patients for several years in Alva before moving his office and family to Beaver in the Oklahoma panhandle. Drawing from the reminiscences Long penned many years later, Ben Blackstock describes some of the experiences Long faced in providing medical care to a rural community. </span></blockquote><span data-dcnode-id="1127" instrument_node="">
</span><img alt=" " class="icon" data-dcnode-id="1126" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.okhistory.org/images/publications/Chronicles037.jpg&amp;raw"><h2 data-dcnode-id="1124"><span data-dcnode-id="1125" instrument_node="">Volume 77, No. 3 (Fall 1999)</span></h2><span data-dcnode-id="1123" instrument_node="">
</span><p data-dcnode-id="1121"><span data-dcnode-id="1122" instrument_node="">“Strange Bedfellows: Progressivism, Radicalism, and the Oklahoma Constitutional in Historical Perspective,” by Aaron Bachhofer II, 244–271 </span></p><blockquote data-dcnode-id="1119"><span data-dcnode-id="1120" instrument_node="">Over the years, a number of historians have described the Oklahoma constitution as a “radical” and “progressive” document. In an insightful examination, Aaron Bachhofer takes a fresh look at contemporary accounts and reactions, and the constitution itself, to conclude that it was neither; preservation of the existing order motivated the “politicians” who wrote it. </span></blockquote><span data-dcnode-id="1118" instrument_node="">
</span><p data-dcnode-id="1116"><span data-dcnode-id="1117" instrument_node="">“‘The Most Ferocious of Monsters’: The Story of Outlaw Crawford Goldsby, alias ‘Cherokee Bill,’” by Jon D. May, 272–289 </span></p><blockquote data-dcnode-id="1114"><span data-dcnode-id="1115" instrument_node="">Crawford Goldsby grew up a “good kid” in the small community of Fort Gibson, but before he reached the age of twenty, he was known as “Cherokee Bill,” one of the most wanted men in Indian Territory. Jon May provides a fascinating and vivid portrait of an outlaw who terrorized the citizens of the territory for several years before his death on the gallows at Fort Smith in 1896.</span></blockquote><span data-dcnode-id="1113" instrument_node="">
</span><p data-dcnode-id="1111"><span data-dcnode-id="1112" instrument_node="">“The Daughter of Dawn: An Original Silent Film with an Oklahoma Indian Cast,” by Leo Kelley, 290–299 </span></p><blockquote data-dcnode-id="1109"><span data-dcnode-id="1110" instrument_node="">One of the earliest silent motion pictures filmed within the state, The Daughter of Dawn also featured an entire cast of Native American actors and actresses, including a son and daughter of Quanah Parker. Although the 1920 film itself has apparently been lost to time, Leo Kelley reconstructs the motion picture using a collection of still photographs and the director’s script.</span></blockquote><span data-dcnode-id="1108" instrument_node="">
</span><p data-dcnode-id="1106"><span data-dcnode-id="1107" instrument_node="">“Laying Groundwork for the Future: The Oklahoma Territorial Superintendency and Superintendents of Public Instruction,” by A. Kenneth Stern, 300–321 </span></p><blockquote data-dcnode-id="1104"><span data-dcnode-id="1105" instrument_node="">The system of education in Oklahoma Territory changed dramatically as the government organized school districts, established standards and qualifications for teachers, and created a means of funding schools. As Kenneth Stern shows in this biographical study, the seven men who served as superintendents of public instruction laid the groundwork for the future. </span></blockquote><span data-dcnode-id="1103" instrument_node="">
</span><p data-dcnode-id="1101"><span data-dcnode-id="1102" instrument_node="">“William P. ‘Bill’ Atkinson: The Father of Midwest City, Oklahoma,” by Susan M. Lee, 322–341 </span></p><blockquote data-dcnode-id="1099"><span data-dcnode-id="1100" instrument_node="">Although he failed to win the state’s highest office, W. P. Atkinson achieved a legacy of another sort as the father of Midwest City, a planned community he constructed near the installation that became Tinker Air Force Base. Susan Lee examines the colorful life of a man who taught journalism, started a newspaper, and built the nation’s first city founded on the aviation industry. </span></blockquote><span data-dcnode-id="1098" instrument_node="">
</span><img alt=" " class="icon" data-dcnode-id="1097" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.okhistory.org/images/publications/Chronicles070.jpg&amp;raw"><h2 data-dcnode-id="1095"><span data-dcnode-id="1096" instrument_node="">Volume 77, No. 2 (Summer 1999)</span></h2><span data-dcnode-id="1094" instrument_node="">
</span><p data-dcnode-id="1092"><span data-dcnode-id="1093" instrument_node="">“Recounting the Removal: Recent Native American Literary Reconstructions of the Trail of Tears,” by Frederick Hale, 132–149 </span></p><blockquote data-dcnode-id="1090"><span data-dcnode-id="1091" instrument_node="">Until 1972 very few Native American authors had described the period of Five Tribes’ history that encompassed the Trail of Tears, and even that merited little scholarly attention. Frederick Hale remedies that oversight with an analysis of four novels about the Cherokee removal written between 1972 and 1996 by native writers. </span></blockquote><span data-dcnode-id="1089" instrument_node="">
</span><p data-dcnode-id="1087"><span data-dcnode-id="1088" instrument_node="">“With Folded Arms? or With Squirrel Guns?: The IWW and the Green Corn Rebellion,” by Nigel Sellars, 150–169 </span></p><blockquote data-dcnode-id="1085"><span data-dcnode-id="1086" instrument_node="">In 1917 resistance to a new federal conscription law and the formation of a radical tenant farmers’ organization, the Working Class Union, resulted in Oklahoma in what became known as the Green Corn Rebellion. Nigel Sellars explores conditions that led to the uprising and how little it had to do with the Industrial Workers of the World. </span></blockquote><span data-dcnode-id="1084" instrument_node="">
</span><p data-dcnode-id="1082"><span data-dcnode-id="1083" instrument_node="">“‘For our sake do all you can’: The Indian Captivity and Death of Clara and Willie Blinn,” by Joe D. Haines, Jr., 170–183 </span></p><blockquote data-dcnode-id="1080"><span data-dcnode-id="1081" instrument_node="">Among the many tragedies that occurred on the Washita River in 1868 when the Seventh Cavalry attacked Cheyenne Chief Black Kettle’s village was the death of captives Clara Blinn and her two-year-old son Willie. Joe Haines, Jr., describes the events leading to their capture, the efforts to secure their release, and the inquiry into their deaths. </span></blockquote><span data-dcnode-id="1079" instrument_node="">
</span><p data-dcnode-id="1077"><span data-dcnode-id="1078" instrument_node="">“Gleanings from the Coulter School Memoirs: Recollections of Pioneering in Logan County,” by Leslie Hewes, 184–195 </span></p><blockquote data-dcnode-id="1075"><span data-dcnode-id="1076" instrument_node="">The pioneering experience has remained a popular field of study for professional historians and genealogists who often find treasures in unexpected places. In tracing his own roots, the late Dr. Leslie Hewes found the Coulter School Memoirs from which he reconstructed life in a small rural community in Logan County using its residents’ fondest memories.</span></blockquote><span data-dcnode-id="1074" instrument_node="">
</span><p data-dcnode-id="1072"><span data-dcnode-id="1073" instrument_node="">“Mrs. Oliver O. ‘Mamie’ Hammonds: The ‘She-svengali’ of Oklahoma,” by Janel A. Mattingly, 196–207 </span></p><blockquote data-dcnode-id="1070"><span data-dcnode-id="1071" instrument_node="">In the late 1920s news and rumors coming out of the governor’s office rocked state government after Governor Henry S. Johnston hired Mamie Hammonds as confidential secretary. Janel Mattingly examines the two eccentric personalities and a relationship that eventually led to the “ewe lamb rebellion” and to Johnston’s removal from office. </span></blockquote><span data-dcnode-id="1069" instrument_node="">
</span><img alt=" " class="icon" data-dcnode-id="1068" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.okhistory.org/images/publications/Chronicles071.jpg&amp;raw"><h2 data-dcnode-id="1066" id="v77"><span data-dcnode-id="1067" instrument_node="">Volume 77, No. 1 (Sping 1999) </span></h2><span data-dcnode-id="1065" instrument_node="">
</span><p data-dcnode-id="1063"><span data-dcnode-id="1064" instrument_node="">“The Julius Rosenwald Fund: Northern Philanthropy in Oklahoma’s Separate Schools,” by Cynthia J. Savage, 4–21</span></p><blockquote data-dcnode-id="1061"><span data-dcnode-id="1062" instrument_node="">After statehood, educational opportunities for African American schoolchildren were stifled by racism, a shortage of money, and inadequate facilities. That changed to some degree with assistance from the Julius Rosenwald Fund. Cynthia J. Savage recounts the condition of Oklahoma’s separate schools in the first half of the twentieth century and how northern philanthropy aided the construction of nearly 200 buildings.</span></blockquote><span data-dcnode-id="1060" instrument_node="">
</span><p data-dcnode-id="1058"><span data-dcnode-id="1059" instrument_node="">“William Penn Adair: Cherokee Slaveholder and Indian Freedom Advocate,” by Paul Kelton 22–53 </span></p><blockquote data-dcnode-id="1056"><span data-dcnode-id="1057" instrument_node="">In his time, the mixed-blood Cherokee William Penn Adair was the most passionate defender of American Indian freedom by lobbying against efforts to create an Indian territory. Paul Kelton provides a fascinating portrait of a man whose life as a slaveholder before the Civil War suited him especially well to lead native peoples in their fight to retain control over their own destiny. </span></blockquote><span data-dcnode-id="1055" instrument_node="">
</span><p data-dcnode-id="1053"><span data-dcnode-id="1054" instrument_node="">“In the Midst of Adversity: The City, the Governor, and the FERA, Part II,” by William H. Mullins, 54–73 </span></p><blockquote data-dcnode-id="1051"><span data-dcnode-id="1052" instrument_node="">As a predominantly rural state, Oklahoma, and especially Oklahoma City, exhibited a strong individualistic approach in its response to the Great Depression. That ethic was manifested in the personage of Governor William H. Murray, a “fierce apostle of agrarianism.” In the second of a two-part essay, William H. Mullins details the ways in which the city and the governor attempted to meet the challenges of providing relief. </span></blockquote><span data-dcnode-id="1050" instrument_node="">
</span><p data-dcnode-id="1048"><span data-dcnode-id="1049" instrument_node="">“John G. Chapin and the Struggle for Dover,” by John L. Lillibridge, 74–101 </span></p><blockquote data-dcnode-id="1046"><span data-dcnode-id="1047" instrument_node="">Today, the town of Dover struggles to survive with only a few businesses, boarded-up storefronts, and declining population. A century ago, its residents also faced an uncertain future, when earliest resident John G. Chapin, a townsite company, and others struggled to develop the site. Using case records from the U. S. Land Office, John L. Lillibridge describes the complex birth of a small Oklahoma community. </span></blockquote><span data-dcnode-id="1045" instrument_node="">
</span><img alt=" " class="icon" data-dcnode-id="1044" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.okhistory.org/images/publications/Chronicles072.jpg&amp;raw"><h2 data-dcnode-id="1042" id="issue1998"><span data-dcnode-id="1043" instrument_node="">Volume 76, No. 4 (Winter 1998–1999) </span></h2><p class="backtotop" data-dcnode-id="1039"><a data-dcnode-id="1040" href="#top"><span data-dcnode-id="1041" instrument_node="">Back to top</span></a></p><span data-dcnode-id="1038" instrument_node="">
</span><p data-dcnode-id="1036"><span data-dcnode-id="1037" instrument_node="">“William Box Hancock: Trail Driver and Cattleman,” by Richard H. Hancock, 356–373</span></p><blockquote data-dcnode-id="1034"><span data-dcnode-id="1035" instrument_node="">Between 1879 and 1884, a young Texas cowboy, William Box Hancock, helped move several herds of cattle to the “feeding grounds of the Northwest.” His journeys took him along the Great Western Trail through western Indian Territory. Using his grandfather’s reminiscences dictated fifty years later, Richard H. Hancock provides a fascinating annotated account of that era and the man who was a small actor in a great drama.</span></blockquote><span data-dcnode-id="1033" instrument_node="">
</span><p data-dcnode-id="1031"><span data-dcnode-id="1032" instrument_node="">“In the Midst of Adversity: The City, the Governor, and the FERA, Part I,” by William H. Mullins, 374–391</span></p><blockquote data-dcnode-id="1029"><span data-dcnode-id="1030" instrument_node="">As a predominantly rural state, Oklahoma, and especially Oklahoma City, exhibited a strong individualistic approach in its response to the Great Depression. That ethic was manifested in the personage of Governor William H. Murray, a “fierce apostle of agrarianism.” In the first of a two-part essay, William H. Mullins details the ways in which the city and the governor attempted to meet the challenges of providing relief.</span></blockquote><span data-dcnode-id="1028" instrument_node="">
</span><p data-dcnode-id="1026"><span data-dcnode-id="1027" instrument_node="">“An Experiment in Education: The Osage Manual Training School, Views from Letters,” by Barbara Speas Havira, 392–415 </span></p><blockquote data-dcnode-id="1024"><span data-dcnode-id="1025" instrument_node="">In the mid-1840s the Osages formally petitioned for a school of their own near their villages in Kansas. Over the next twenty-five years, the Osage Manual Training School struggled to provide instruction for their children. Drawing from the letters of Jesuits and Sisters of Loretto who staffed the school, Barbara Speas Havira reconstructs life at the school and the problems inherent in “an experiment in education.” </span></blockquote><span data-dcnode-id="1023" instrument_node="">
</span><p data-dcnode-id="1021"><span data-dcnode-id="1022" instrument_node="">“The Repeal of Prohibition: The End of Oklahoma’s Noble Experiment,” by Vincent T. Lyon, 416–435 </span></p><blockquote data-dcnode-id="1019"><span data-dcnode-id="1020" instrument_node="">Oklahoma is the only state to have entered the union with prohibition of alcohol written into its constitution, but those who dared found ways to circumvent the laws. Vincent T. Lyon recounts the efforts by politicians, interest groups, and voters to deal with the repeal issue over a fifty-year period before a new young governor finally brought an end to the “Noble Experiment” in 1959 through stringent enforcement. </span></blockquote><span data-dcnode-id="1018" instrument_node="">
</span><p data-dcnode-id="1016"><span data-dcnode-id="1017" instrument_node="">“Remembering Stonewall, Pontotoc County, Chickasaw Nation,” by Bill Tinsley, 436–449 </span></p><blockquote data-dcnode-id="1014"><span data-dcnode-id="1015" instrument_node="">Following the Civil War, the Chickasaw Nation gradually rebuilt its devastated landscape, including towns and schools. Out of that regeneration, the town of Stonewall came into existence on Clear Boggy Creek near the Cochran Trading Post. Mining old records, maps, gazetteers, and the memories of former and longtime residents, Bill Tinsley recaptures the glory days of a thriving community and its prosperous residents.</span></blockquote><span data-dcnode-id="1013" instrument_node="">
</span><img alt=" " class="icon" data-dcnode-id="1012" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.okhistory.org/images/publications/Chronicles073.jpg&amp;raw"><h2 data-dcnode-id="1010"><span data-dcnode-id="1011" instrument_node="">Volume 76, No. 3 (Fall 1998) </span></h2><span data-dcnode-id="1009" instrument_node="">
</span><p data-dcnode-id="1007"><span data-dcnode-id="1008" instrument_node="">“The Washita Trail: The Seventh U.S. Cavalry’s Route of March to and from the Battle of the Washita,” by Bob Rea, 244–261 </span></p><blockquote data-dcnode-id="1005"><span data-dcnode-id="1006" instrument_node="">The Seventh U.S. Cavalry’s 1868 campaign against tribes of the Southern Plains included an attack on Black Kettle’s sleeping Cheyenne village on the Washita River. Today, that military action continues to draw attention from scholars and history buffs alike. Using primary source materials, physical reconnaissance, and modern USGS maps, Bob Rea retraces the Seventh’s approximate route for the interested modern traveler.</span></blockquote><span data-dcnode-id="1004" instrument_node="">
</span><p data-dcnode-id="1002"><span data-dcnode-id="1003" instrument_node="">“‘Wholly Occupied with my Special Work’: Reverend William Graham’s Stay at Fort Coffee and New Hope, 1845–1847,” by Donald L. Parman, 262–281</span></p><blockquote data-dcnode-id="1000"><span data-dcnode-id="1001" instrument_node="">Reverend William Graham, a Methodist minister sent to take God’s word to the frontier, spent two years as a missionary-teacher at Fort Coffee and New Hope schools in the Choctaw Nation in the mid-nineteenth century. He considered those years one of the highlights of his career. Donald L. Parman brings that episode, and Graham, to life in a carefully annotated excerpt from Graham’s autobiography. </span></blockquote><span data-dcnode-id="999" instrument_node="">
</span><p data-dcnode-id="997"><span data-dcnode-id="998" instrument_node="">“The Undesirable Oklahomans: Black Immigration to Western Canada,” by D. Chongo Mundende, 282–297 </span></p><blockquote data-dcnode-id="995"><span data-dcnode-id="996" instrument_node="">Lured by the promise of economic opportunities they believed they could not receive in the states, many black Oklahomans immigrated to Canada before and after the turn of the twentieth century. From a thorough study of her immigration policies, D. Chongo Mundende illustrates how Canada vigorously sought new settlers, but came to consider blacks as undesirable and instituted restrictive measures to keep them out. </span></blockquote><span data-dcnode-id="994" instrument_node="">
</span><p data-dcnode-id="992"><span data-dcnode-id="993" instrument_node="">“‘Standing Out for Their Rights’: Industrial Strikes in Oklahoma in the 1930s,” by James Paul Bailey, 298–317 </span></p><blockquote data-dcnode-id="990"><span data-dcnode-id="991" instrument_node="">The United States suffered an unprecedented number of industrial strikes in the already hard times of the 1930s. Organized labor enjoyed a revitalized position of influence and made significant inroads in labor relations in Oklahoma. Focusing on major strikes in the mining, textile, meatpacking, and oil industries, James Paul Bailey details the intense and sometimes violent attempts to empower workers. </span></blockquote><span data-dcnode-id="989" instrument_node="">
</span><p data-dcnode-id="987"><span data-dcnode-id="988" instrument_node="">“Edward W. Sweeney, ‘89er: ’A Legend in his Time,’” by Pamela G. Jordan, 318–335</span></p><blockquote data-dcnode-id="985"><span data-dcnode-id="986" instrument_node="">Edward W. Sweeney came to Oklahoma Territory at the time of the land run of 1889 and stayed to carve out a distinguished career as a public servant and friend of the Kickapoos. In the process he helped establish Oklahoma City and the town of Harrah. Pamela G. Jordan recognizes a little-known figure in Oklahoma history, a man who never sought notoriety, but who nonetheless became a “legend in his time.”</span></blockquote><span data-dcnode-id="984" instrument_node="">
</span><img alt=" " class="icon" data-dcnode-id="983" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.okhistory.org/images/publications/Chronicles074.jpg&amp;raw"><h2 data-dcnode-id="981"><span data-dcnode-id="982" instrument_node="">Volume 76, No. 2 (Summer 1998) </span></h2><span data-dcnode-id="980" instrument_node="">
</span><p data-dcnode-id="978"><span data-dcnode-id="979" instrument_node="">“‘The Best City in the Best County’: Enid’s Golden Era, 1916–1941,” by Alvin O. Turner and Vicky L. Gailey, 116–139 </span></p><span data-dcnode-id="977" instrument_node="">
</span><blockquote data-dcnode-id="975"><span data-dcnode-id="976" instrument_node="">Following the 1893 land run, the city of Enid emerged as the largest town in the former Cherokee Outlet, and the people who stayed helped shape the modern character of the region. Alvin Turner and Vicky Gailey explore the many cultural and economic opportunities between 1916 and World War II that allowed Enid to enjoy almost unprecedented prosperity and economic diversity.</span></blockquote><span data-dcnode-id="974" instrument_node="">
</span><p data-dcnode-id="972"><span data-dcnode-id="973" instrument_node="">“‘Peculiarly situated between rebellion and loyalty’: Civilized Tribes, Savagery, and the American Civil War,” by Tom L. Franzmann, 140–159</span></p><span data-dcnode-id="971" instrument_node="">
</span><blockquote data-dcnode-id="969"><span data-dcnode-id="970" instrument_node="">Scholars increasingly have focused on how different cultures perceive and interpret “savagism.” In this insightful essay focusing on the Five Civilized Tribes in the Civil War, Tom Franzmann discusses the major interpretations dominating historiography, what the term meant to Americans in the 1860s, why certain perspectives are worthy of reassessment, and the limitations of such studies. </span></blockquote><span data-dcnode-id="968" instrument_node="">
</span><p data-dcnode-id="966"><span data-dcnode-id="967" instrument_node="">“‘I Should Have Been a Mule’: Cotton Pickin’ Blues in Southwestern Oklahoma,” by Leo Kelley, 160–172 </span></p><span data-dcnode-id="965" instrument_node="">
</span><blockquote data-dcnode-id="963"><span data-dcnode-id="964" instrument_node="">Within a few years of its settlement, cotton became the most important agricultural product in southwestern Oklahoma. The industry especially dominated the economy of Jackson County. Leo Kelley describes the vagaries of cotton farming from “plantin’ to pickin’,” the growth and decline of the industry in Jackson County, and how the cotton farmer kept an eye on the bottom line, but not without a sense of humor. </span></blockquote><span data-dcnode-id="962" instrument_node="">
</span><p data-dcnode-id="960"><span data-dcnode-id="961" instrument_node="">“Architecture and Hospitality: Ceremonial Ground Camps and Foodways of the Yuchi Indians,” by Jason Baird Jackson, 172–189 </span></p><span data-dcnode-id="959" instrument_node="">
