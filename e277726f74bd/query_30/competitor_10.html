</span><p data-dcnode-id="2768"><span data-dcnode-id="2769" instrument_node="">“Our Place: The One-Hundred-Year-Old Family Farm,” by Tanya Finchum and Juliana Nykolaiszyn</span></p><blockquote data-dcnode-id="2766"><span data-dcnode-id="2767" instrument_node="">The Centennial Farm and Ranch Program began in 1989 to celebrate the one hundredth anniversary of the Land Run of 1889. The librarians of the Oklahoma Oral History Research Program at Oklahoma State University began interviewing these families in 2008 to preserve their stories. Tanya Finchum and Juliana Nykolaiszyn analyze their interviews of the owners of Centennial Farms and Ranches to understand the bond between these places and the families who continue to hold on to the land.</span></blockquote><span data-dcnode-id="2765" instrument_node="">
</span><p data-dcnode-id="2763"><span data-dcnode-id="2764" instrument_node="">“Gridiron Pioneers at the Cherokee National Male Seminary, 1896–1909,” by James G. McCullagh and Stephanie Schmidt</span></p><blockquote data-dcnode-id="2761"><span data-dcnode-id="2762" instrument_node="">Football became an integral part of the experience at the Cherokee National Male Seminary when the first team was formed in 1896. James G. McCullagh and Stephanie Schmidt tell the story of the school’s football teams and the players who shaped the legacy of those teams and the future of the Cherokee Nation.</span></blockquote><span data-dcnode-id="2760" instrument_node="">
</span><p data-dcnode-id="2758"><span data-dcnode-id="2759" instrument_node="">“‘One Who Was Trusted’: E. L. Mitchell of Western Oklahoma, Part One,” by Paul F. Lambert
</span></p><blockquote data-dcnode-id="2756"><span data-dcnode-id="2757" instrument_node="">Elza Leon “E. L.” Mitchell was a Democratic newspaper editor and publisher in western Oklahoma who became a fixture in the political life of that region. In part one of his two-part work, Paul F. Lambert begins a thorough biography of Mitchell and relates his significance in western Oklahoma politics and journalism.</span></blockquote><span data-dcnode-id="2755" instrument_node="">
</span><img alt=" " class="icon" data-dcnode-id="2754" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.okhistory.org/images/publications/Chronicles092.2.jpg&amp;raw"><span data-dcnode-id="2753" instrument_node="">
</span><h2 data-dcnode-id="2751"><span data-dcnode-id="2752" instrument_node="">Volume 92, No. 2 (Summer 2014)</span></h2><span data-dcnode-id="2750" instrument_node="">
</span><p data-dcnode-id="2748"><span data-dcnode-id="2749" instrument_node="">“Oklahoma in James Bryce’s The American Commonwealth,” by Quentin Taylor</span></p><blockquote data-dcnode-id="2746"><span data-dcnode-id="2747" instrument_node="">European intellectuals, such as Alexis de Tocqueville, have commented on life and politics in the United States since the country’s beginning. Victorian jurist, historian, and politician James Bryce wrote extensively about the political system in the United States. Quentin Taylor’s analysis of Bryce’s discussion of the Oklahoma Constitution provides a new perspective on the political climate of the statehood era.</span></blockquote><span data-dcnode-id="2745" instrument_node="">
</span><p data-dcnode-id="2743"><span data-dcnode-id="2744" instrument_node="">“Camp Fire Girls versus Boy Scouts: A Friendly Game of Urban Forest-Building,” by Darin Nelson</span></p><blockquote data-dcnode-id="2741"><span data-dcnode-id="2742" instrument_node="">From the early days of Oklahoma City city planners and private citizens understood the need for parks. Efforts to plant trees in local parks were supported by civic organizations, including youth groups. Darin Nelson explains the friendly rivalry between the Camp Fire Girls and the Boy Scouts as the groups worked to improve the urban landscape. </span></blockquote><span data-dcnode-id="2740" instrument_node="">
</span><p data-dcnode-id="2738"><span data-dcnode-id="2739" instrument_node="">“Dean A. McGee: Genius with Guts,” by JA Pryse</span></p><blockquote data-dcnode-id="2736"><span data-dcnode-id="2737" instrument_node="">Dean A. McGee made a name for himself as a skilled geologist and partner in the Kerr-McGee Corporation. He was also known for his civic pride and desire to give back to his community. JA Pryse’s examination of McGee’s contributions to Oklahoma City and Oklahoma in general shows the legacy of McGee’s philanthropic efforts.</span></blockquote><span data-dcnode-id="2735" instrument_node="">
</span><p data-dcnode-id="2733"><span data-dcnode-id="2734" instrument_node="">“Harnessing Nature: Flood Control in Oklahoma,” by D. Chongo Mundende</span></p><blockquote data-dcnode-id="2731"><span data-dcnode-id="2732" instrument_node="">Oklahoma is a national leader in the development of small watershed dams. Before the construction of these dams began in 1948, destructive floods were common across the state. D. Chongo Mundende describes how the development of flood control structures in Oklahoma has positively impacted the citizens of Oklahoma.</span></blockquote><span data-dcnode-id="2730" instrument_node="">
</span><img alt=" " class="icon" data-dcnode-id="2729" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.okhistory.org/images/publications/Chronicles092.1.jpg&amp;raw"><span data-dcnode-id="2728" instrument_node="">
</span><h2 data-dcnode-id="2726" id="v92"><span data-dcnode-id="2727" instrument_node="">Volume 92, No. 1 (Spring 2014)</span></h2><span data-dcnode-id="2725" instrument_node="">
</span><p data-dcnode-id="2723"><span data-dcnode-id="2724" instrument_node="">“The Dust Bowl: The Blame Game, the Facts, the Problem that Remains,” by Alvin O. Turner</span></p><blockquote data-dcnode-id="2721"><span data-dcnode-id="2722" instrument_node="">In 2012 Ken Burns’s The Dust Bowl espoused the view that farming practices led to the creation of Dust Bowl conditions. In his article, Alvin O. Turner disagrees with Burns and asserts that there is no evidence to support a direct connection between agricultural practices and the Dust Bowl.</span></blockquote><span data-dcnode-id="2720" instrument_node="">
</span><p data-dcnode-id="2718"><span data-dcnode-id="2719" instrument_node="">“‘A Romantic Modernist’: William Wayne Caudill and the Work of Caudill Rowlett Scott in Oklahoma,” by Susan Allen Kline and Cynthia Savage</span></p><blockquote data-dcnode-id="2716"><span data-dcnode-id="2717" instrument_node="">Oklahoma-born architect William Wayne Caudill and his firm, Texas-based Caudill Rowlett Scott (CRS), had a reputation as a leader in the utilitarian design of schools in the post-World War II era. Susan Allen Kline and Cynthia Savage describe Caudill’s career and his contributions to architecture in Oklahoma.</span></blockquote><span data-dcnode-id="2715" instrument_node="">
</span><p data-dcnode-id="2713"><span data-dcnode-id="2714" instrument_node="">“‘The Golden Days’: Taylor and Mary Ealy, Citizenship, and the Freedmen of Chickasaw Indian Territory, 187477” by Ellen Cain</span></p><blockquote data-dcnode-id="2711"><span data-dcnode-id="2712" instrument_node="">In fall 1874 Presbyterian missionaries Taylor and Mary Ealy moved to Indian Territory to teach Chickasaw freedmen at Fort Arbuckle. By studying Ealy and the context of the period, Ellen Cain explores the freedmen’s struggle for identity in Indian Territory during Reconstruction through the impressions and observations of the Ealys.</span></blockquote><span data-dcnode-id="2710" instrument_node="">
</span><p data-dcnode-id="2708"><span data-dcnode-id="2709" instrument_node="">“Building and Promoting Their Place: The Clegerns of ‘89,” by Wayne M. Clegern</span></p><blockquote data-dcnode-id="2706"><span data-dcnode-id="2707" instrument_node="">William Clegern and his son, Harry, were entrepreneurs who found opportunity in the 1889 Land Run. In addition to Oklahoma City, they influenced the development of Edmond and Henryetta. In discussing the history of one family, Wayne M. Clegern sheds light on a crucial time in the growth of three different Oklahoma cities.</span></blockquote><span data-dcnode-id="2705" instrument_node="">
</span><img alt=" " class="icon" data-dcnode-id="2704" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.okhistory.org/images/publications/Chronicles091.4.jpg&amp;raw"><span data-dcnode-id="2703" instrument_node="">
</span><h2 data-dcnode-id="2701" id="issue2013"><span data-dcnode-id="2702" instrument_node="">Volume 91, No. 4 (Winter 2013–14)</span></h2><span data-dcnode-id="2700" instrument_node="">
</span><p data-dcnode-id="2698"><span data-dcnode-id="2699" instrument_node="">“D. R. Miller: A Man Who Brought the Circus to Town,” by Juliana Nykolaiszyn and Tanya Finchum</span></p><blockquote data-dcnode-id="2696"><span data-dcnode-id="2697" instrument_node="">D. R. Miller was a colorful character in the history of the circus world and of Hugo, Oklahoma. Through their oral history project “Big Top” Show Goes On: An Oral History of Occupations Inside and Outside the Canvas Circus Tent, Juliana Nykolaiszyn and Tanya Finchum pieced together the life of this influential showman. </span></blockquote><span data-dcnode-id="2695" instrument_node="">
</span><p data-dcnode-id="2693"><span data-dcnode-id="2694" instrument_node="">“Governor Lee Cruce and the Creation of the Office of County Assessor: A Hundred Year Retrospective,” by Jeff Spelman</span></p><blockquote data-dcnode-id="2691"><span data-dcnode-id="2692" instrument_node="">Shortly after the 1889 Land Run, the territorial legislature set up a system of township assessors to determine ad valorem tax rates. As the population of Oklahoma grew, this system gave way to a more efficient system of county assessors. Jeff Spelman describes the history of ad valorem taxation in Oklahoma and the legislative fight for the change to the county assessor system.</span></blockquote><span data-dcnode-id="2690" instrument_node="">
</span><p data-dcnode-id="2688"><span data-dcnode-id="2689" instrument_node="">“‘Bold Adventures, Fraught with Many Interesting Incidents’: The Scouting Career of Black Beaver,” by Mike Tower</span></p><blockquote data-dcnode-id="2686"><span data-dcnode-id="2687" instrument_node="">Black Beaver was a Delaware scout who accompanied white explorers, such as Captain Randolph B. Marcy, on their journeys through what would become Indian Territory. He also served as an interpreter for his tribe and a representative to Washington, DC. Mike Tower depicts Black Beaver’s life and explains the importance of his role in American Indian and white society.</span></blockquote><span data-dcnode-id="2685" instrument_node="">
</span><p data-dcnode-id="2683"><span data-dcnode-id="2684" instrument_node="">“The Legacy of US Army Flight Training in Oklahoma, 1941–45,” by Thomas A. Wikle</span></p><blockquote data-dcnode-id="2681"><span data-dcnode-id="2682" instrument_node="">The entry of the United States into World War II prompted an increase in the need for trained pilots. Because of its relatively flat terrain and favorable weather, Oklahoma became a prime location for the training of these pilots. Thomas A. Wikle investigates Oklahoma’s role in the surge of pilot training programs, and how those programs led to the development of aviation facilities in the state.</span></blockquote><span data-dcnode-id="2680" instrument_node="">
</span><img alt=" " class="icon" data-dcnode-id="2679" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.okhistory.org/images/publications/Chronicles091.3.jpg&amp;raw"><span data-dcnode-id="2678" instrument_node="">
</span><h2 data-dcnode-id="2676"><span data-dcnode-id="2677" instrument_node="">Volume 91, No. 3 (Fall 2013)</span></h2><span data-dcnode-id="2675" instrument_node="">
</span><p data-dcnode-id="2670"><span data-dcnode-id="2674" instrument_node="">“Shipwrecked in Oklahoma: The Last Voyage of the Steamboat </span><em data-dcnode-id="2672"><span data-dcnode-id="2673" instrument_node="">Heroine</span></em><span data-dcnode-id="2671" instrument_node="">, 1838,” by Kevin Crisman, Nina Chick, and John Davis</span></p><blockquote data-dcnode-id="2668"><span data-dcnode-id="2669" instrument_node="">The steamboat Heroine was shipwrecked on the Red River while on a voyage to deliver supplies to Fort Towson in Indian Territory. Kevin Crisman, Nina Chick, and John Davis explore the history of that voyage based on the archaeological evidence left behind.</span></blockquote><span data-dcnode-id="2667" instrument_node="">
</span><p data-dcnode-id="2665"><span data-dcnode-id="2666" instrument_node="">“‘The Indian Character’: Cross-cultural Relations in Indian Territory after the Civil War” by K. D. Motes</span></p><blockquote data-dcnode-id="2663"><span data-dcnode-id="2664" instrument_node="">After the Civil War, the white settlers moving into Indian Territory had various motivations. While hostility between white settlers and American Indian residents has been emphasized in the past, Kevin D. Motes uses the Indian-Pioneer Papers to show a more congenial relationship between the groups.</span></blockquote><span data-dcnode-id="2662" instrument_node="">
</span><p data-dcnode-id="2660"><span data-dcnode-id="2661" instrument_node="">“Building 3001: Home of the ‘Gooney Bird,’” by Lawrence Carroll Allin</span></p><blockquote data-dcnode-id="2658"><span data-dcnode-id="2659" instrument_node="">During World War II, Building 3001 at Tinker Air Force Base produced more than five thousand C-47 aircraft in its Douglas Aircraft Company manufacturing facility. Lawrence Allin describes how the building was utilized for the war effort, the workers who were hired to build the planes, and what happened to some of the planes that were produced.</span></blockquote><span data-dcnode-id="2657" instrument_node="">
</span><p data-dcnode-id="2655"><span data-dcnode-id="2656" instrument_node="">“Red Panic: The Drumright Telephone Operators’ Strike of 1919,” by Michael Molina</span></p><blockquote data-dcnode-id="2653"><span data-dcnode-id="2654" instrument_node="">In the wake of World War I, the United States plunged into a period of fear and suspicion known as the Red Scare. This nationwide paranoia infiltrated the small Oklahoma town of Drumright in 1919, when a telephone operators’ strike turned into a sensational story of Bolshevik influence and Communist treachery. Michael Molina relates the story of the strike and how it was portrayed in media across the nation.</span></blockquote><span data-dcnode-id="2652" instrument_node="">
</span><img alt=" " class="icon" data-dcnode-id="2651" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.okhistory.org/images/publications/Chronicles091.2.jpg&amp;raw"><span data-dcnode-id="2650" instrument_node="">
</span><h2 data-dcnode-id="2648"><span data-dcnode-id="2649" instrument_node="">Volume 91, No. 2 (Summer 2013)</span></h2><span data-dcnode-id="2647" instrument_node="">
</span><p data-dcnode-id="2645"><span data-dcnode-id="2646" instrument_node="">“Same Traditions, New Reasons: Experiences of American Indian Women in Pawnee Bill’s Wild West Shows,” by Alyce Vigil</span></p><blockquote data-dcnode-id="2643"><span data-dcnode-id="2644" instrument_node="">Wild West shows, such as the ones organized by G. W. “Pawnee Bill” Lillie, featured acts that entertained audiences and showed white Americans a version of life in the West. Alyce Vigil describes how American Indian women in the cast worked to maintain their traditions in this new context.</span></blockquote><span data-dcnode-id="2642" instrument_node="">
</span><p data-dcnode-id="2640"><span data-dcnode-id="2641" instrument_node="">“The Life and Times of the First Applicants to Platt National Park, 1906–10,” by J. Justin Castro and Lindsay Compton</span></p><blockquote data-dcnode-id="2638"><span data-dcnode-id="2639" instrument_node="">The applications for employment at Platt National Park are an interesting and previously underutilized source of information on early Oklahoma. By exploring these applications J. Justin Castro and Lindsay Compton paint a picture of the first years of Platt National Park and show how politics and personality affected federal hiring practices.</span></blockquote><span data-dcnode-id="2637" instrument_node="">
</span><p data-dcnode-id="2635"><span data-dcnode-id="2636" instrument_node="">“A Brief History of the Oklahoma Poets Laureate,” by Shawn Holliday</span></p><blockquote data-dcnode-id="2633"><span data-dcnode-id="2634" instrument_node="">Oklahoma was the fifth state to appoint a poet laureate, a position created to celebrate Oklahoma’s traditions and values, promote tourism, and provide cultural outreach to the people of the state. Shawn Holliday explains the importance of the position of poet laureate and evaluates the contributions of the individuals who held that post in Oklahoma.</span></blockquote><span data-dcnode-id="2632" instrument_node="">
</span><p data-dcnode-id="2630"><span data-dcnode-id="2631" instrument_node="">“Rex Brinlee: The Man and His Escape,” by Jack Anthony Reavis</span></p><blockquote data-dcnode-id="2628"><span data-dcnode-id="2629" instrument_node="">Rex Brinlee was a hardened criminal who described himself as a “rattlesnake.” He is notable, however, for his multiple escapes from the Oklahoma State Penitentiary in McAlester. Jack A. Reavis tells Brinlee’s story, interweaving the details of his crimes with larger state events, including the McAlester Prison Riot.</span></blockquote><span data-dcnode-id="2627" instrument_node="">
</span><img alt=" " class="icon" data-dcnode-id="2626" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.okhistory.org/images/publications/Chronicles91a.jpg&amp;raw"><span data-dcnode-id="2625" instrument_node="">
</span><h2 data-dcnode-id="2623" id="v91"><span data-dcnode-id="2624" instrument_node="">Volume 91, No. 1 (Spring 2013)</span></h2><span data-dcnode-id="2622" instrument_node="">
</span><p data-dcnode-id="2620"><span data-dcnode-id="2621" instrument_node="">“The Enigma of Mike Monroney,” by Richard Lowitt</span></p><blockquote data-dcnode-id="2618"><span data-dcnode-id="2619" instrument_node="">Almer Stillwell “Mike” Monroney served the people of Oklahoma in the US House of Representatives and US Senate from 1939 until 1966. In this overview of Monroney’s political career, Richard Lowitt characterizes the politician as a level-headed moderate attempting to continue his tenure in office amidst a shift to the conservative right in Oklahoma politics.</span></blockquote><span data-dcnode-id="2617" instrument_node="">
</span><p data-dcnode-id="2615"><span data-dcnode-id="2616" instrument_node="">“One Succeeded, One Did Not: Bacone College and the Oklahoma Presbyterian College, 1910–80,” by Steven J. Crum</span></p><blockquote data-dcnode-id="2613"><span data-dcnode-id="2614" instrument_node="">Two of the colleges existing in Oklahoma in the early twentieth century were Bacone College and Oklahoma Presbyterian College. While Bacone still serves students in the twenty-first century, Oklahoma Presbyterian College closed in the 1960s. Steven J. Crum explores the success and failure of these two American Indian institutions of higher education.</span></blockquote><span data-dcnode-id="2612" instrument_node="">
</span><p data-dcnode-id="2610"><span data-dcnode-id="2611" instrument_node="">“Park Hill’s Ross Cemetery,” by Lois E. Wilson Albert</span></p><blockquote data-dcnode-id="2608"><span data-dcnode-id="2609" instrument_node="">The Ross Cemetery at Park Hill contains the mortal remains of members of one of the most prominent Cherokee families of the nineteenth century. In fall 2000 and spring 2001, Lois E. Wilson Albert and members of the Oklahoma Anthropological Society thoroughly documented the cemetery for inclusion on the National Register of Historic Places. This article relates the results of that survey.</span></blockquote><span data-dcnode-id="2607" instrument_node="">
</span><p data-dcnode-id="2605"><span data-dcnode-id="2606" instrument_node="">“48 Hours in Atoka,” by Cindy Donovan-Wallis</span></p><blockquote data-dcnode-id="2603"><span data-dcnode-id="2604" instrument_node="">48 Hours in Atoka in 1975 was Oklahoma’s answer to Woodstock and other music festivals across the country. Many music historians consider the concert in Atoka to be the beginning of outlaw country music movement popularized by Waylon Jennings and Willie Nelson. In her article, Cindy Donovan-Wallis describes the concert and the impact this concert had on the local Atoka community.</span></blockquote><span data-dcnode-id="2602" instrument_node="">
</span><img alt=" " class="icon" data-dcnode-id="2601" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.okhistory.org/images/publications/Chronicles90d.jpg&amp;raw"><span data-dcnode-id="2600" instrument_node="">
</span><h2 data-dcnode-id="2598" id="issue2012"><span data-dcnode-id="2599" instrument_node="">Volume 90, No. 4 (Winter 2012–13)</span></h2><span data-dcnode-id="2597" instrument_node="">
</span><p data-dcnode-id="2595"><span data-dcnode-id="2596" instrument_node="">“A Separate People: A History of the Oklahoma Amish,” by Marvin E. Kroeker</span></p><blockquote data-dcnode-id="2593"><span data-dcnode-id="2594" instrument_node="">The Oklahoma Amish are the direct heirs of the Anabaptist religious tradition that began during the Protestant Reformation. Marvin E. Kroeker describes how these resilient people have maintained their lifestyle in Oklahoma through 120 years of environmental and technological change.</span></blockquote><span data-dcnode-id="2592" instrument_node="">
</span><p data-dcnode-id="2590"><span data-dcnode-id="2591" instrument_node="">“Unforgotten Trailblazer: Nancy O. Randolph Davis,” by Gloria J. Pollard</span></p><blockquote data-dcnode-id="2588"><span data-dcnode-id="2589" instrument_node="">In her roles as a student, a teacher, and a NAACP Youth Council sponsor, Nancy O. Randolph Davis fought for equality for African American young people. Her behind-the-scenes work made possible the advancement of Oklahoma’s civil rights movement. Based on conversations with Davis, Gloria J. Pollard has written an insightful biography of this icon of equal education and civil rights.</span></blockquote><span data-dcnode-id="2587" instrument_node="">
</span><p data-dcnode-id="2585"><span data-dcnode-id="2586" instrument_node="">“Custer’s Last Campaign of Sheridan’s 1868–69 Winter Offensive,” by Rod Beemer</span></p><blockquote data-dcnode-id="2583"><span data-dcnode-id="2584" instrument_node="">In winter 1868–69 George Armstrong Custer was under the command of General Philip Sheridan in what would become western Oklahoma. The route followed by Custer and his men in search of Cheyenne camps on the headwaters of the Red River has remained a mystery to this day. Rod Beemer explores the written accounts of this campaign and provides prospective answers to this nearly 150-year-old question.</span></blockquote><span data-dcnode-id="2582" instrument_node="">
</span><p data-dcnode-id="2580"><span data-dcnode-id="2581" instrument_node="">“Oklahoma City’s McKinley Park: The Little Park that Raised a Ruckus,” by Darin Nelson</span></p><blockquote data-dcnode-id="2578"><span data-dcnode-id="2579" instrument_node="">The site of McKinley Park in Oklahoma City began as an environmental eyesore, but was transformed over several years into a haven in a sprawling metropolis. Darin Nelson recounts how the relationship between the public and private sectors, while not always harmonious, led to the creation of a recreational area to benefit the surrounding community.</span></blockquote><span data-dcnode-id="2577" instrument_node="">
</span><img alt=" " class="icon" data-dcnode-id="2576" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.okhistory.org/images/publications/Chronicles90c.jpg&amp;raw"><span data-dcnode-id="2575" instrument_node="">
</span><h2 data-dcnode-id="2573"><span data-dcnode-id="2574" instrument_node="">Volume 90, No. 3 (Fall 2012)</span></h2><span data-dcnode-id="2572" instrument_node="">
</span><p data-dcnode-id="2570"><span data-dcnode-id="2571" instrument_node="">“Murder in Custer County: A Case Study and Legal Analysis of Herd Law versus Free Range in Oklahoma Territory,” by W. Edward Rolison</span></p><blockquote data-dcnode-id="2568"><span data-dcnode-id="2569" instrument_node="">In the early years of Oklahoma, the cattlemen and farmers of western Oklahoma battled over the laws that allowed stock to run free over the land. By examining the case of the 1900 murder of Julius Roesch, W. Edward Rolison describes the attitudes of the time toward the debate over herd law versus free range.</span></blockquote><span data-dcnode-id="2567" instrument_node="">
</span><p data-dcnode-id="2565"><span data-dcnode-id="2566" instrument_node="">“‘It Would Break Our Hearts Not to Have Our Kiowas’: War Dancing, Tourism, and the Rise of Powwows in the Early Twentieth Century,” by Benjamin R. Kracht</span></p><blockquote data-dcnode-id="2563"><span data-dcnode-id="2564" instrument_node="">From 1883 to 1933 federal policies prohibited the practice of certain American Indian rituals and dances. Benjamin R. Kracht discusses the evolution of these dances from prohibited practices to tourist attractions.</span></blockquote><span data-dcnode-id="2562" instrument_node="">
</span><p data-dcnode-id="2560"><span data-dcnode-id="2561" instrument_node="">“Boomers and Boomtowns: Oil Patch Songs from Oklahoma,” by Joe W. Specht
</span></p><blockquote data-dcnode-id="2558"><span data-dcnode-id="2559" instrument_node="">The oil industry is inexorably linked with the state of Oklahoma. An outgrowth of the industry is a rich history of petroleum-related songs. These songs describe life in boomtowns and after busts. Joe W. Specht gives an overview of the oilfield songs written and performed by Oklahoma songwriters and singers from the 1920s to today.</span></blockquote><span data-dcnode-id="2557" instrument_node="">
</span><p data-dcnode-id="2555"><span data-dcnode-id="2556" instrument_node="">“Okie Folkies: The Singer, the Song, and the Coffeehouse,” by Rodger Harris and Baxter Taylor III</span></p><blockquote data-dcnode-id="2553"><span data-dcnode-id="2554" instrument_node="">Folk music has been a part of the Oklahoma landscape since before statehood. From cowboy songs to string bands, these musical expressions helped to shape a sense of pride in the traditions of Oklahoma people. By the 1950s and 1960s this folk music was embodied in the coffeehouse movement. Rodger Harris and Baxter Taylor III describe the people and places involved in this continuation of the folk tradition.</span></blockquote><span data-dcnode-id="2552" instrument_node="">
</span><img alt=" " class="icon" data-dcnode-id="2551" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.okhistory.org/images/publications/Chronicles90b.jpg&amp;raw"><span data-dcnode-id="2550" instrument_node="">
</span><h2 data-dcnode-id="2548"><span data-dcnode-id="2549" instrument_node="">Volume 90, No. 2 (Summer 2012)</span></h2><span data-dcnode-id="2547" instrument_node="">
</span><p data-dcnode-id="2545"><span data-dcnode-id="2546" instrument_node="">“Quanah Parker’s Star House: A Comanche Home Along the White Man’s Road,” by Larry C. Floyd</span></p><blockquote data-dcnode-id="2543"><span data-dcnode-id="2544" instrument_node="">Completed in 1890, Star House was the stately home of Comanche legend Quanah Parker. He entertained politicians, generals, and wealthy cattlemen at Star House. Larry C. Floyd explains the importance of this landmark to the Parker family and to southwestern history.</span></blockquote><span data-dcnode-id="2542" instrument_node="">
</span><p data-dcnode-id="2540"><span data-dcnode-id="2541" instrument_node="">“Communists, Poetry, and Oklahoma History: The Life of Zoe Agnes Stratton Tilghman,” by Mallory Newell</span></p><blockquote data-dcnode-id="2538"><span data-dcnode-id="2539" instrument_node="">Zoe Tilghman possessed a passion for writing about Oklahoma and for encouraging budding writers. Mallory Newel describes Tilghman’s career and works, giving particular attention to the difficulties she encountered during her time with the Federal Writers Project.</span></blockquote><span data-dcnode-id="2537" instrument_node="">
</span><p data-dcnode-id="2535"><span data-dcnode-id="2536" instrument_node="">“Republican Justices of the Oklahoma Supreme Court and Republican Judges of the Oklahoma Criminal Court of Appeals, 1907–66,” by Von Russell Creel</span></p><blockquote data-dcnode-id="2533"><span data-dcnode-id="2534" instrument_node="">Early Oklahoma politics were characterized by strict partisan voting. Von Russell Creel creates an election reference guide as he explores the election of Republican justices and judges at a time when Oklahoma was dominated by the Democratic Party.</span></blockquote><span data-dcnode-id="2532" instrument_node="">
</span><p data-dcnode-id="2530"><span data-dcnode-id="2531" instrument_node="">“Penn Square: The Shopping Center Bank that Shook the World, Part 2 Bust,” by Michael J. Hightower</span></p><blockquote data-dcnode-id="2528"><span data-dcnode-id="2529" instrument_node="">After exponential growth, the irresponsible practices of Penn Square Bank came to light, leading to the bank’s failure. In part two of his study, Michael J. Hightower explores the reasons for Penn Square Bank’s fall and describes the reactions of the banking community and the oil industry.</span></blockquote><span data-dcnode-id="2527" instrument_node="">
</span><img alt=" " class="icon" data-dcnode-id="2526" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.okhistory.org/images/publications/Chronicles90a.jpg&amp;raw"><span data-dcnode-id="2525" instrument_node="">
</span><h2 data-dcnode-id="2523" id="v90"><span data-dcnode-id="2524" instrument_node="">Volume 90, No. 1 (Spring 2012)</span></h2><span data-dcnode-id="2522" instrument_node="">
</span><p data-dcnode-id="2520"><span data-dcnode-id="2521" instrument_node="">“From Bard to Speculator: Alexander Lawrence Posey and the Muscogee Nation, 1902–08,” by Jeffrey M. Widener
</span></p><blockquote data-dcnode-id="2518"><span data-dcnode-id="2519" instrument_node="">Muscogee Indian Alexander Posey is well known for his literary career, but he also spent time as a speculator and a member of one of the Dawes Commission enrollment parties. Jeffrey M. Widener explores these less recognized and somewhat unflattering aspects of Posey’s character.</span></blockquote><span data-dcnode-id="2517" instrument_node="">
</span><p data-dcnode-id="2515"><span data-dcnode-id="2516" instrument_node="">“‘A Joyful Privileged Burden’: The Life of Father Stanley Rother,” by Ariana Quezada</span></p><blockquote data-dcnode-id="2513"><span data-dcnode-id="2514" instrument_node="">The Catholic Church in Oklahoma led the way in providing relief to victims of the political unrest in Central America in the 1980s and 1990s. Father Stanley Rother exemplified this relief movement. Ariana Quezada describes Father Rother’s work in Guatemala and analyzes the effect of his brutal murder on the Catholic Ministry to Hispanics in Oklahoma.</span></blockquote><span data-dcnode-id="2512" instrument_node="">
</span><p data-dcnode-id="2510"><span data-dcnode-id="2511" instrument_node="">“Vilona P. Cutler: Humanitarian, Activist, and Educator,” by Gregory N. Pierson</span></p><blockquote data-dcnode-id="2508"><span data-dcnode-id="2509" instrument_node="">When Vilona P. Cutler was young, she thought she would become a renowned scientist. Instead, Cutler became a driving force in the movement to stop racism and sexism in Oklahoma. As a leader in the Young Women’s Christian Association, Cutler fought injustice by providing opportunities for young women. Gregory N. Pierson tells the story of Cutler’s achievements as executive secretary of the YWCA in Oklahoma City.</span></blockquote><span data-dcnode-id="2507" instrument_node="">
</span><p data-dcnode-id="2505"><span data-dcnode-id="2506" instrument_node="">“Penn Square: The Shopping Center Bank that Shook the World, Part 1 Boom,” by Michael J. Hightower</span></p><blockquote data-dcnode-id="2503"><span data-dcnode-id="2504" instrument_node=""> The repercussions of the rise and failure of Penn Square Bank still can be felt in the banking and oil industries today. In Part 1, Michael J. Hightower chronicles the rise of Penn Square Bank and explains how a small bank in Oklahoma City became a powerhouse in the oil banking community, which foreshadowed its demise.</span></blockquote><span data-dcnode-id="2502" instrument_node="">
</span><img alt=" " class="icon" data-dcnode-id="2501" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.okhistory.org/images/publications/Chronicles89d.jpg&amp;raw"><span data-dcnode-id="2500" instrument_node="">
</span><h2 data-dcnode-id="2498" id="issue2011"><span data-dcnode-id="2499" instrument_node="">Volume 89, No. 4 (Winter 2011–12) </span></h2><span data-dcnode-id="2497" instrument_node="">
</span><p class="backtotop" data-dcnode-id="2494"><a data-dcnode-id="2495" href="#top"><span data-dcnode-id="2496" instrument_node="">Back to top</span></a></p><span data-dcnode-id="2493" instrument_node="">
</span><p data-dcnode-id="2491"><span data-dcnode-id="2492" instrument_node="">“Early Cinema and Oklahoma,” by Gary D. Rhodes</span></p><blockquote data-dcnode-id="2489"><span data-dcnode-id="2490" instrument_node="">Oklahoma became the backdrop for many films during the early era of cinema. The films focused on the wild west aspects of the new state, including stories starring real life outlaws and lawmen. Gary D. Rhodes illuminates the early, largely unknown history of cinema in Oklahoma.</span></blockquote><span data-dcnode-id="2488" instrument_node="">
</span><p data-dcnode-id="2486"><span data-dcnode-id="2487" instrument_node="">“Frank Vlasak and the Beginnings of Prague, Oklahoma,” by Philip D. Smith</span></p><blockquote data-dcnode-id="2484"><span data-dcnode-id="2485" instrument_node="">Across Oklahoma, ethnic communities grew as immigrants settled in the territory. These communities strove to maintain their identity while becoming active in the majority native-born society. Philip D. Smith explores the relationship between ethnicity and political power through the person of Frank Vlasak, a Bohemian-born farmer and businessman in early Prague, Oklahoma.</span></blockquote><span data-dcnode-id="2483" instrument_node="">
</span><p data-dcnode-id="2481"><span data-dcnode-id="2482" instrument_node="">“Bringing Nature into Focus: The Travertine Nature Center at Platt National Park,” by Cynthia Savage</span></p><blockquote data-dcnode-id="2479"><span data-dcnode-id="2480" instrument_node="">Incorporated into the National Park Service in the early twentieth century, Platt National Park was a popular destination for visitors from the surrounding region. Because of its popularity, the National Park Service added the Travertine Nature Center to the park in the 1960s. Cynthia Savage describes the process undertaken to bring the center to Platt National Park.</span></blockquote><span data-dcnode-id="2478" instrument_node="">
</span><p data-dcnode-id="2476"><span data-dcnode-id="2477" instrument_node="">“Farm Crisis in Oklahoma, Part 2,” by Richard Lowitt</span></p><blockquote data-dcnode-id="2474"><span data-dcnode-id="2475" instrument_node="">During the 1970s and 1980s cattlemen and grain producers felt great financial hardship because of falling prices for their products and rising costs for needed equipment and supplies. In part two of a two-part article Richard Lowitt continues his examination of the effect that economic distress and political policies had on Oklahoma farmers and ranchers.</span></blockquote><span data-dcnode-id="2473" instrument_node="">
</span><img alt=" " class="icon" data-dcnode-id="2472" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.okhistory.org/images/publications/Chronicles89c.jpg&amp;raw"><span data-dcnode-id="2471" instrument_node="">
</span><h2 data-dcnode-id="2469"><span data-dcnode-id="2470" instrument_node="">Volume 89, No. 3 (Fall 2011)</span></h2><span data-dcnode-id="2468" instrument_node="">
</span><p data-dcnode-id="2466"><span data-dcnode-id="2467" instrument_node="">“James Cash Penney: The Impact of a Main Street Merchant on Oklahoma,” by David D. Kruger</span></p><blockquote data-dcnode-id="2464"><span data-dcnode-id="2465" instrument_node="">Although not from the Sooner State, J. C. Penney made his mark on Oklahoma and its people through his retail empire based on his golden rule principles. By visiting his store locations in the state, Penney influenced a new generation of company leadership to grow from the small towns in Oklahoma. David D. Kruger explains the impact of Penney the man and J.C. Penney the company on the culture of retail shopping in Oklahoma.</span></blockquote><span data-dcnode-id="2463" instrument_node="">
</span><p data-dcnode-id="2461"><span data-dcnode-id="2462" instrument_node="">“A. J. Smitherman: Pen Warrior,” by Barbara A. Seals Nevergold</span></p><blockquote data-dcnode-id="2459"><span data-dcnode-id="2460" instrument_node="">Newspaper publisher A. J. Smitherman is best known for his role in the Tulsa Race Riot of 1921. But before that he used the power of the press to fight social injustice against African Americans, first in Muskogee and then in Tulsa. Barbara A. Seals Nevergold traces Smitherman’s tumultuous career in the Oklahoma press defending African American causes.</span></blockquote><span data-dcnode-id="2458" instrument_node="">
</span><p data-dcnode-id="2456"><span data-dcnode-id="2457" instrument_node="">“‘Educate or We Perish’: The Armstrong Academy’s History as Part of the Choctaw Educational System,” by Dennis Miles</span></p><blockquote data-dcnode-id="2454"><span data-dcnode-id="2455" instrument_node="">Armstrong Academy near Bokchito in the Choctaw Nation was a boarding school for American Indian boys. Students were instructed in traditional school subjects as well as in agricultural and vocational training. Dennis Miles explores the evolution of the school under various superintendents from its opening in 1845 to its untimely closing in 1920.</span></blockquote><span data-dcnode-id="2453" instrument_node="">
</span><p data-dcnode-id="2451"><span data-dcnode-id="2452" instrument_node="">“Farm Crisis in Oklahoma, Part 1,” by Richard Lowitt</span></p><blockquote data-dcnode-id="2449"><span data-dcnode-id="2450" instrument_node="">During the 1970s and 1980s cattlemen and grain producers felt great financial hardship because of falling prices for their products and rising costs for needed equipment and supplies. In part one of a two-part article Richard Lowitt examines the effect that economic distress and political policies had on Oklahoma farmers and ranchers.</span></blockquote><span data-dcnode-id="2448" instrument_node="">
</span><img alt=" " class="icon" data-dcnode-id="2447" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.okhistory.org/images/publications/Chronicles89b.jpg&amp;raw"><span data-dcnode-id="2446" instrument_node="">
</span><h2 data-dcnode-id="2444"><span data-dcnode-id="2445" instrument_node="">Vol 89, No. 2 (Summer 2011)</span></h2><span data-dcnode-id="2443" instrument_node="">
</span><p data-dcnode-id="2441"><span data-dcnode-id="2442" instrument_node="">“Class, Race, and Jack Walton’s Mayoralty of Oklahoma City,” by Quincy R. Lehr</span></p><blockquote data-dcnode-id="2437"><span data-dcnode-id="2440" instrument_node="">
</span><p data-dcnode-id="2438"><span data-dcnode-id="2439" instrument_node=""> Before his turbulent time as Oklahoma’s governor, John C. “Jack” Walton served as the mayor of Oklahoma City. Quincy R. Lehr describes the politics surrounding Walton’s election and how he gathered a base of support as mayor among African Americans and labor leaders despite the racial and labor unrest during his one term in office.</span></p></blockquote><span data-dcnode-id="2436" instrument_node="">
</span><p data-dcnode-id="2434"><span data-dcnode-id="2435" instrument_node="">“Oklahoma’s African American Rodeo Performers,” by Roger D. Hardaway</span></p><blockquote data-dcnode-id="2432"><span data-dcnode-id="2433" instrument_node="">The cattle industry became a booming business in the nineteenth century. Many African Americans took advantage of this growth and became ranch hands and cowboys. Cowboys became performers on various ranches and then in rodeos, and Roger D. Hardaway shows how African American cowboys were a vital part of this transition. </span></blockquote><span data-dcnode-id="2431" instrument_node="">
</span><p data-dcnode-id="2429"><span data-dcnode-id="2430" instrument_node="">“The Riverboat Frontier: Early-Day Commerce in the Arkansas and Red River Valleys,” by Michael J. Hightower</span></p><blockquote data-dcnode-id="2425"><span data-dcnode-id="2428" instrument_node="">
</span><p data-dcnode-id="2426"><span data-dcnode-id="2427" instrument_node="">From the French trade of the Chouteaus to the military forts of the frontier, commerce on the rivers of Oklahoma has driven settlement. People traveled on riverboats for business or pleasure, and Michael J. Hightower argues that those travels left indelible marks on the landscape of Indian Territory. </span></p></blockquote><span data-dcnode-id="2424" instrument_node="">
</span><p data-dcnode-id="2422"><span data-dcnode-id="2423" instrument_node="">“Tubbee and His Nieces: Choctaw-White Intermarriage and ‘Indianness’ in the Choctaw Intelligencer,” by Richard Mize</span></p><blockquote data-dcnode-id="2420"><span data-dcnode-id="2421" instrument_node="">Views on intermarriage between American Indians and white settlers were numerous in Indian Territory. Through letters to the editor, Richard Mize presents one story of intermarriage and identity in the Choctaw Nation. </span></blockquote><span data-dcnode-id="2419" instrument_node="">
</span><img alt=" " class="icon" data-dcnode-id="2418" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.okhistory.org/images/publications/Chronicles89a.jpg&amp;raw"><h2 data-dcnode-id="2416" id="v89"><span data-dcnode-id="2417" instrument_node="">Volume 89, No. 1 (Spring 2011)</span></h2><span data-dcnode-id="2415" instrument_node="">
</span><p data-dcnode-id="2413"><span data-dcnode-id="2414" instrument_node="">“Doctor Forrest Pitt Baker and the History of the Eastern Oklahoma Tuberculosis Sanatorium,” by Glen R. Roberson
</span></p><blockquote data-dcnode-id="2411"><span data-dcnode-id="2412" instrument_node=""> At one time the diagnosis of tuberculosis was a terrifying prospect. The advances made at the Eastern Oklahoma Tuberculosis Sanatorium under the direction of Dr. Forrest Pitt Baker improved the lives of Oklahomans afflicted with this dreaded disease. Glen Roberson shows how the sanatorium in Talihina became a haven for people who not only needed a specific type of care but also needed a home away from home.</span></blockquote><span data-dcnode-id="2410" instrument_node="">
</span><p data-dcnode-id="2408"><span data-dcnode-id="2409" instrument_node="">“The Latino Impress in Oklahoma City,” by Jeffrey M. Widener
 </span></p><blockquote data-dcnode-id="2404"><span data-dcnode-id="2407" instrument_node="">From the earliest days of Oklahoma City following the Land Run of 1889, immigrants</span><br data-dcnode-id="2406"><span data-dcnode-id="2405" instrument_node="">
 from Latin American countries have settled in the area. They created communities within Oklahoma City that thrive today. Jeffrey Widener explores the history of Latino influence in Oklahoma City as well as the continuing growth of the vibrant Hispanic cultural landscape.</span></blockquote><span data-dcnode-id="2403" instrument_node="">
</span><p data-dcnode-id="2401"><span data-dcnode-id="2402" instrument_node="">“Judge Royce H. Savage,” by William Kellough</span></p><blockquote data-dcnode-id="2399"><span data-dcnode-id="2400" instrument_node=""> Royce Savage’s contemporaries included Alfred P. Murrah, Josh Lee, and Carl Albert. When he was seated on the federal bench in 1940, he was known for his logic and administrative efficiency. William Kellough asserts that despite the controversy surrounding Judge Savage’s retirement from the Northern District court the judge’s reputation for case management and dedication to pretrial conferences remains intact.</span></blockquote><span data-dcnode-id="2398" instrument_node="">
</span><p data-dcnode-id="2396"><span data-dcnode-id="2397" instrument_node="">“Jesse “Cab” Renick: In Search of an Indian Identity,” by Paul Putz</span></p><blockquote data-dcnode-id="2394"><span data-dcnode-id="2395" instrument_node="">Only three American Indian athletes have earned gold medals at Olympic Games between 1896 and 2010. One of those athletes was Jesse “Cab” Renick, a basketball player with the 1948 U.S. Olympic team. Although he was Choctaw and Chickasaw, he did not grow up with a prominent American Indian identity and did not identify himself as such. Author Paul Putz argues that Renick’s Indian identity and his contribution to sports should be reexamined.</span></blockquote><span data-dcnode-id="2393" instrument_node="">
</span><img alt=" " class="icon" data-dcnode-id="2392" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.okhistory.org/images/publications/Chronicles88d.jpg&amp;raw"><span data-dcnode-id="2391" instrument_node="">
</span><h2 data-dcnode-id="2389" id="issue2010"><span data-dcnode-id="2390" instrument_node="">Volume 88, No. 4 (Winter 2010–11) </span></h2><p class="backtotop" data-dcnode-id="2386"><a data-dcnode-id="2387" href="#top"><span data-dcnode-id="2388" instrument_node="">Back to top</span></a></p><span data-dcnode-id="2385" instrument_node="">
</span><p data-dcnode-id="2383"><span data-dcnode-id="2384" instrument_node="">“Brother Bankers: Frank P. and Hugh M. Johnson, Founders of the First National Bank and Trust Company of Oklahoma City,” by Michael J. Hightower</span></p><blockquote data-dcnode-id="2381"><span data-dcnode-id="2382" instrument_node="">Brothers F. P. and H. M. Johnson came from Mississippi to Oklahoma looking for opportunity. They made names for themselves in their own banking ventures across the state before teaming up to create the First National Bank and Trust Company in Oklahoma City. Michael Hightower explores their parallel paths in Oklahoma banking history.</span></blockquote><span data-dcnode-id="2380" instrument_node="">
</span><p data-dcnode-id="2378"><span data-dcnode-id="2379" instrument_node="">“Planting the ‘Long-Rooted Grass’: The Eufaula Boarding School for Girls, 1910–1962,” by Linda Ford Wendel
</span></p><blockquote data-dcnode-id="2376"><span data-dcnode-id="2377" instrument_node="">While most tales of American Indian boarding schools recount abuse and loss of identity, the story of the Eufaula Boarding School for Girls includes times of celebration of Creek culture and care for the students. As Linda Ford Wendel shows, hard work was a part of daily life, but music, family visits, and Creek cultural activities were also encouraged.</span></blockquote><span data-dcnode-id="2375" instrument_node="">
</span><p data-dcnode-id="2373"><span data-dcnode-id="2374" instrument_node="">“Friends of the Osages: John Joseph Mathews’s Wah’Kon-Tah and Osage-Quaker Cross-Cultural Collaboration,” by Michael Snyder</span></p><blockquote data-dcnode-id="2371"><span data-dcnode-id="2372" instrument_node="">John Joseph Mathews described the relationship between Quaker Indian agents, like Laban J. Miles, and Osage tribal members in Wah’Kon-Tah, his first book. Michael Snyder analyzes this text to demonstrate its historical and biographical value as well as to show its relevance to understanding the Quaker influence that still exists in the Osage community.</span></blockquote><span data-dcnode-id="2370" instrument_node="">
</span><p data-dcnode-id="2368"><span data-dcnode-id="2369" instrument_node="">“The 1969 Oklahoma City Garbage Strike,” by Richard Lowitt</span></p><blockquote data-dcnode-id="2366"><span data-dcnode-id="2367" instrument_node="">What appeared to the Oklahoma City authorities as a city workers’ strike quickly became a hotbed of racial tension in 1969 when the sanitation workers, most African Americans, went on strike for higher wages and better working conditions. Richard Lowitt expounds on the reasons for the strike, the attention it received locally and nationally from African American politicians and organizations, and the results of the resolve of the strikers and their supporters.</span></blockquote><span data-dcnode-id="2365" instrument_node="">
</span><h2 data-dcnode-id="2362"><span data-dcnode-id="2364" instrument_node="">Volume 88, No. 3 (Fall 2010)</span><img alt=" " class="icon" data-dcnode-id="2363" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.okhistory.org/images/publications/Chronicles88c.jpg&amp;raw"></h2><span data-dcnode-id="2361" instrument_node="">
</span><p data-dcnode-id="2359"><span data-dcnode-id="2360" instrument_node="">“Bringing Back the Big Game: The Reintroduction of Elk to the Wichita Mountains,” by Matthew Allen Pearce</span></p><blockquote data-dcnode-id="2357"><span data-dcnode-id="2358" instrument_node="">In 1911 starving Rocky Mountain elk were transferred from Jackson Hole, Wyoming, to the Wichita Mountains National Forest and Game Preserve in southwestern Oklahoma. Matthew Allen Pearce explores the circumstances surrounding the decision to move the elk to Oklahoma and the Progressive conservation ideals behind bringing the elk to Oklahoma.</span></blockquote><span data-dcnode-id="2356" instrument_node="">
</span><p data-dcnode-id="2354"><span data-dcnode-id="2355" instrument_node="">“The Rise and Fall and Rise and Fall of Edwin (“Daddy”) DeBarr,” by David W. Levy</span></p><blockquote data-dcnode-id="2352"><span data-dcnode-id="2353" instrument_node="">Edwin DeBarr was one of the founding faculty members of the University of Oklahoma and made lasting contributions to the school. DeBarr also possessed some objectionable traits that would lead to two distinct falls, one of his careers at the university and one of his legacies at the university. David Levy uses DeBarr’s life to show the change in social, political, and racial attitudes over time at the university, ultimately leading to the removal of DeBarr’s name from the Chemistry Building.</span></blockquote><span data-dcnode-id="2351" instrument_node="">
</span><p data-dcnode-id="2349"><span data-dcnode-id="2350" instrument_node="">“Preaching in the ‘'Open Air’: The Ministries of Early Pentecostal Women Preachers in Oklahoma,” by Kristen D. Welch</span></p><blockquote data-dcnode-id="2347"><span data-dcnode-id="2348" instrument_node="">Women may not have been able to hold official positions in the International Pentecostal Holiness Church (IPHC), but the four women described by Kristen D. Welch had a great amount of influence over the people to whom they preached. Welch profiles Dollie York, Lucy Hargis, Grace Curtis, and Ruth Moore, all itinerate preachers for the IPHC who used the outdoors as their pulpit for saving souls.</span></blockquote><span data-dcnode-id="2346" instrument_node="">
</span><p data-dcnode-id="2344"><span data-dcnode-id="2345" instrument_node="">“Restoring the Ravages of Time: The Knox Building of Enid, OK,” by Jennifer Jones</span></p><blockquote data-dcnode-id="2342"><span data-dcnode-id="2343" instrument_node="">The Knox Building in Enid was built to house the Masons of Garfield County. Although it was created for their specific needs, it had the potential to be converted into an acoustically-pleasing concert hall. Jennifer Jones relates the story of the Knox Building from its origins to the rift that led to years of disrepair, ultimately leading to a restoration project that was truly a community effort.</span></blockquote><span data-dcnode-id="2341" instrument_node="">
</span><img alt=" " class="icon" data-dcnode-id="2340" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.okhistory.org/images/publications/Chronicles88b.jpg&amp;raw"><span data-dcnode-id="2339" instrument_node="">
</span><h2 data-dcnode-id="2337"><span data-dcnode-id="2338" instrument_node="">Volume 88, No. 2 (Summer 2010)</span></h2><span data-dcnode-id="2336" instrument_node="">
</span><p data-dcnode-id="2334"><span data-dcnode-id="2335" instrument_node="">“Transcontinental Crossroads: Oklahoma’s Lighted Airways in the 1930s,” by Thomas A. Wikle
 </span></p><blockquote data-dcnode-id="2332"><span data-dcnode-id="2333" instrument_node="">After World War I, the Post Office Department of the United States felt the need to reduce mail delivery times. This desire led to experiments with daytime and nighttime airmail routes. Thomas A. Wikle describes how Oklahoma became a crossroads in the coast-to-coast lighted airmail delivery system and the social, technological, and cultural developments that accompanied this advancement.</span></blockquote><span data-dcnode-id="2331" instrument_node="">
</span><p data-dcnode-id="2329"><span data-dcnode-id="2330" instrument_node="">“Forgotten Hero: Oklahoma Naval Commander Ernest E. Evans’s Gallant Sacrifice at Leyte Gulf,” by Larry Floyd</span></p><blockquote data-dcnode-id="2327"><span data-dcnode-id="2328" instrument_node="">Commander Ernest E. Evans, an Oklahoma native, bravely fought and died in the Battle of Leyte Gulf in World War II, earning multiple honors for his heroism. Larry Floyd explores the question of why Evans’s memory is virtually forgotten in his native state while so honored by the U.S. Navy.</span></blockquote><span data-dcnode-id="2326" instrument_node="">
</span><p data-dcnode-id="2324"><span data-dcnode-id="2325" instrument_node="">“Chitto Harjo and the Snake Rebellion,” by Leslie Jones</span></p><blockquote data-dcnode-id="2322"><span data-dcnode-id="2323" instrument_node="">Chitto Harjo, a full-blooded Muscogee Indian opposed to the allotment of tribal lands, led a group of like-minded Indians in rebellions against the authorities in the early 1900s. These rebellions, however, were portrayed differently by newspapers across the country and were remembered uniquely by the people who witnessed them. Leslie Jones compares newspapers in Oklahoma to newspapers nationwide to discover the impact of the Snake Rebellion.</span></blockquote><span data-dcnode-id="2321" instrument_node="">
</span><p data-dcnode-id="2319"><span data-dcnode-id="2320" instrument_node="">“Fred Harris’s New Populism and the Demise of Heartland Liberalism,” by Jeff Bloodworth</span></p><blockquote data-dcnode-id="2317"><span data-dcnode-id="2318" instrument_node="">Oklahoma Democrat Fred Harris attempted in the 1970s to revive the memory of the Populist movement of the late nineteenth century. Jeff Bloodworth uses the failure of Harris’s New Populism to show twentieth century liberalism’s accommodation of corporate power as well as the racial climate of the 1970s.</span></blockquote><span data-dcnode-id="2316" instrument_node="">
</span><img alt=" " class="icon" data-dcnode-id="2315" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.okhistory.org/images/publications/Chronicles88a.jpg&amp;raw"><h2 data-dcnode-id="2313" id="v88"><span data-dcnode-id="2314" instrument_node="">Vol 88, No. 1 (Spring 2010)</span></h2><span data-dcnode-id="2312" instrument_node="">
</span><p data-dcnode-id="2310"><span data-dcnode-id="2311" instrument_node="">“Boom and Bust in the Cultural Psychology of Oklahoma: An Interpretive Essay,” by Howard F. Stein, 4–23</span></p><blockquote data-dcnode-id="2306"><span data-dcnode-id="2309" instrument_node="">
</span><p data-dcnode-id="2307"><span data-dcnode-id="2308" instrument_node="">Since the mid-nineteenth century cycles of boom and bust have characterized Oklahoma history. Howard Stein proposes that after a century or more both the causes and the results of “boom and bust” have become ingrained in Oklahomans’ attitudes and beliefs about themselves and about life. His research adds an anthropological layer of “metadata” to the now-standard story of the Sooner State. </span></p></blockquote><span data-dcnode-id="2305" instrument_node="">
</span><p data-dcnode-id="2300"><span data-dcnode-id="2304" instrument_node="">“‘A Few Hundred People Can’t Do Anything with 75 Million!’ The </span><i data-dcnode-id="2302"><span data-dcnode-id="2303" instrument_node="">Cherokee Advocate</span></i><span data-dcnode-id="2301" instrument_node=""> and the Inevitability of Allotment,” by Robert D. Miller, 24–47</span></p><span data-dcnode-id="2299" instrument_node="">
</span><blockquote data-dcnode-id="2294"><span data-dcnode-id="2298" instrument_node="">Allotment was coming despite the tribe’s opposition. The </span><i data-dcnode-id="2296"><span data-dcnode-id="2297" instrument_node="">Cherokee Advocate</span></i><span data-dcnode-id="2295" instrument_node=""> struggled to inform readers about the benefits and perils of assigning land to individuals. Robert D. Miller chronicles the newspaper’s effort to help Cherokees understand that allotment could save their Nation from annihilation.</span></blockquote><span data-dcnode-id="2293" instrument_node="">
</span><p data-dcnode-id="2291"><span data-dcnode-id="2292" instrument_node="">“Witness on Trial: Bishop W. Angie Smith at the Church Trial of James J. Stewart,” by A. W. Martin, Jr., 48–75</span></p><span data-dcnode-id="2290" instrument_node="">
</span><blockquote data-dcnode-id="2288"><span data-dcnode-id="2289" instrument_node="">In the third of a three-part article, A. W. Martin, Jr., adds a new perspective to his ongoing study of Bishop W. Angie Smith of The Methodist Church. Martin evaluates the bishop’s testimony in his own behalf during the trial of James J. Stewart, the minister who accused him of wrongdoing.</span></blockquote><span data-dcnode-id="2287" instrument_node="">
</span><p data-dcnode-id="2285"><span data-dcnode-id="2286" instrument_node="">“Antisuffragist. Antifeminist! Pro-women? The Anomalous Alice Mary Robertson,” by Deah Caldwell, 76–99</span></p><span data-dcnode-id="2284" instrument_node="">
</span><blockquote data-dcnode-id="2282"><span data-dcnode-id="2283" instrument_node="">Like most youngsters, Alice Mary Robertson, Oklahoma’s first woman representative in the United States Congress, learned much from her mother’s example. Robertson’s formative years and her beliefs about “woman’s place” have been neglected by historians. Deah Caldwell examines Robertson’s attitudes toward suffrage, feminism, and women at home and in politics.</span></blockquote><span data-dcnode-id="2281" instrument_node="">
</span><img alt=" " class="icon" data-dcnode-id="2280" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.okhistory.org/images/publications/Chronicles87d.jpg&amp;raw"><span data-dcnode-id="2279" instrument_node="">
</span><h2 data-dcnode-id="2277" id="issue2009"><span data-dcnode-id="2278" instrument_node="">Vol 87, No. 4 (Winter 2009–2010) </span></h2><span data-dcnode-id="2276" instrument_node="">
</span><p data-dcnode-id="2274"><span data-dcnode-id="2275" instrument_node="">“From the Tennessee River to Tahlequah: A Brief History of Cherokee Fiddling,” by J. Justin Castro, 388–407</span></p><span data-dcnode-id="2273" instrument_node="">
</span><blockquote data-dcnode-id="2271"><span data-dcnode-id="2272" instrument_node="">The Cherokee adopted the fiddle as their primary musical instrument early in the nineteenth century. They brought it to the Cherokee Nation of Indian Territory on the Trail of Tears and made it an important part of their culture. J. Justin Castro traces the history of fiddle playing among the Cherokee and illustrates the importance of that musical genre for the people.</span></blockquote><span data-dcnode-id="2270" instrument_node="">
</span><p data-dcnode-id="2268"><span data-dcnode-id="2269" instrument_node="">“Willard Johnston, Homesteader and Frontier Banker, 1881–1904,” by Michael J. Hightower, 408–431</span></p><span data-dcnode-id="2267" instrument_node="">
</span><blockquote data-dcnode-id="2265"><span data-dcnode-id="2266" instrument_node="">The Oklahoma land rushes brought thousands of settlers to central Oklahoma. Among them, Willard Johnston took his place as both homesteader and business promoter. Michael J. Hightower studies the development of frontier banking as exemplified in Johnston’s interests, which began in Shawnee and expanded to include numerous financial institutions in communities around the state. </span></blockquote><span data-dcnode-id="2264" instrument_node="">
</span><p data-dcnode-id="2262"><span data-dcnode-id="2263" instrument_node=""> “‘A Nomad in White Man’s Jungle’: An Introduction to the Works of Louis Oliver,” by Carsten Schmidtke, 432–459</span></p><span data-dcnode-id="2261" instrument_node="">
</span><blockquote data-dcnode-id="2259"><span data-dcnode-id="2260" instrument_node="">Louis Oliver’s literary talents remained hidden for most of his life. Inspired by other American Indian writers and poets, in the 1980s he began to compose essays and verse to express his personal philosophy. Carsten Schmidtke analyzes Oliver’s work and finds it to be a jewel within the American Indian literature of the late twentieth century. </span></blockquote><span data-dcnode-id="2258" instrument_node="">
</span><p data-dcnode-id="2256"><span data-dcnode-id="2257" instrument_node="">“Enigma and Battleground: The Development of Oklahoma’s Public Two-Year Colleges,” by Michael W. Simpson, 460–483</span></p><span data-dcnode-id="2255" instrument_node="">
</span><blockquote data-dcnode-id="2253"><span data-dcnode-id="2254" instrument_node="">Oklahoma’s public two-year colleges began to impact the state’s educational system in the 1920s. By the 1930s many cities and towns offered postsecondary education in municipal or state-supported junior colleges. While the junior college movement’s chronology is well known, Michael W. Simpson details the effects of philosophical and political issues on the course of its history.</span></blockquote><span data-dcnode-id="2252" instrument_node="">
</span><img alt=" " class="icon" data-dcnode-id="2251" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.okhistory.org/images/publications/Chronicles88.jpg&amp;raw"><span data-dcnode-id="2250" instrument_node="">
</span><h2 data-dcnode-id="2248"><span data-dcnode-id="2249" instrument_node="">Vol 87, No. 3 (Fall 2009)</span></h2><br data-dcnode-id="2247"><span data-dcnode-id="2246" instrument_node="">
</span><p data-dcnode-id="2244"><span data-dcnode-id="2245" instrument_node="">“Power for the People: Developing the Grand River Dam Authority, Part 2, 1945–1964,”
by Richard Lowitt, 260–293</span></p><span data-dcnode-id="2243" instrument_node="">
</span><blockquote data-dcnode-id="2241"><span data-dcnode-id="2242" instrument_node="">Continuing his study of the Grand River Dam Authority, Richard Lowitt analyzes the state agency’s history after World War II. Only one-third complete in 1945, the GRDA operated only Pensacola Dam. Over the next three decades Senators Elmer Thomas and Robert S. Kerr guided the federal legislation that would allow the Authority to complete its flood control dams and power generation/distribution facilities in the watershed of the Grand River.</span></blockquote><span data-dcnode-id="2240" instrument_node="">
</span><p data-dcnode-id="2238"><span data-dcnode-id="2239" instrument_node="">“Jake Hamon: ‘The Man Who Made Harding President,’” by Larry C. Floyd, 294–319</span></p><span data-dcnode-id="2237" instrument_node="">
</span><blockquote data-dcnode-id="2235"><span data-dcnode-id="2236" instrument_node="">Jacob “Jake” Hamon, legendary Oklahoma oilman and politician, had his heyday in the years after World War I. An ambitious, opportunistic man in search of a presidential cabinet appointment, Hamon used money and influence to manipulate the selection of Warren G. Harding as the Republican Party’s nominee in 1920. At the height of his career, Hamon lost his life when he was shot and killed by his long-time mistress three weeks after the election.</span></blockquote><span data-dcnode-id="2234" instrument_node="">
</span><p data-dcnode-id="2232"><span data-dcnode-id="2233" instrument_node="">“Shortchanged: Uncovering the Value of Pre-Removal Cherokee Property,”
by Matthew T. Gregg, 320–335</span></p><span data-dcnode-id="2231" instrument_node="">
</span><blockquote data-dcnode-id="2229"><span data-dcnode-id="2230" instrument_node="">In 1838 Cherokee Chief John Ross estimated the value of the Cherokees’ land and other property that was lost due to the tribe’s removal to Indian Territory. Economist Matthew Gregg has performed a detailed mathematical analysis of land sale records in Tennessee, North Carolina, Alabama, and Georgia around the time of removal. He arrives at an assessment that is consonant with Ross’s 1838 figure. </span></blockquote><span data-dcnode-id="2228" instrument_node="">
</span><p data-dcnode-id="2226"><span data-dcnode-id="2227" instrument_node="">“‘Forget the Cowboys—We’ll Take the Indians’: The Red Earth Festival Movement, 1985–1987,”
by Felicia Barker Harrison, 336–359</span></p><span data-dcnode-id="2225" instrument_node="">
</span><blockquote data-dcnode-id="2223"><span data-dcnode-id="2224" instrument_node="">Since its inception in 1987 the Red Earth Festival has been a staple of Oklahoma City’s tourism scene. The festival owes its genesis to the dedication of a small cadre of local civic, arts, and political leaders who envisioned a multi-tribal exposition of American Indian dance, arts, and crafts.</span></blockquote><span data-dcnode-id="2222" instrument_node="">
</span><img alt=" " class="icon" data-dcnode-id="2221" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.okhistory.org/images/publications/Chronicles087b.jpg&amp;raw"><span data-dcnode-id="2220" instrument_node="">
</span><h2 data-dcnode-id="2218"><span data-dcnode-id="2219" instrument_node="">Vol 87, No. 2 (Summer 2009)</span></h2><br data-dcnode-id="2217"><span data-dcnode-id="2216" instrument_node="">
</span><p data-dcnode-id="2214"><span data-dcnode-id="2215" instrument_node="">“Water and Power: Developing the Grand River Dam Authority,
Part 1, 1935–1944,” by Richard Lowitt, 132–165</span></p><blockquote data-dcnode-id="2212"><span data-dcnode-id="2213" instrument_node="">
The Grand River Dam Authority, created in 1935 by the Oklahoma Legislature,
facilitated the development of the Pensacola Dam, a federal project to harness
the Grand River for electric power and flood control. In Part 1 of a two-part article
Richard Lowitt outlines the eight-year campaign by Representative Wesley
Disney and Senator Elmer Thomas to make the GRDA a reality. </span></blockquote><span data-dcnode-id="2211" instrument_node="">
</span><p data-dcnode-id="2209"><span data-dcnode-id="2210" instrument_node="">“Writ Large and Small: State and Local Race Relations and the
Meridian ‘Race Riot’ of 1926,” 
by James E. Klein, 166–185
</span></p><blockquote data-dcnode-id="2205"><span data-dcnode-id="2208" instrument_node="">
</span><p data-dcnode-id="2206"><span data-dcnode-id="2207" instrument_node="">In 1925 and 1926 two incidents in Meridian, Oklahoma, between black citizens
and white law enforcement authorities led to an investigation by the Office of
the Oklahoma Attorney General. James E. Klein examines the events leading
to the designation of the encounters as a “race riot” and evaluates the episode’s
meaning within the context of statewide race relations.</span></p></blockquote><span data-dcnode-id="2204" instrument_node="">
</span><p data-dcnode-id="2202"><span data-dcnode-id="2203" instrument_node="">“Latinos in Oklahoma: A History of Four and a Half Centuries,” 
by Michael M. Smith, 186–223
</span></p><blockquote data-dcnode-id="2200"><span data-dcnode-id="2201" instrument_node="">From the sixteenth-century expedition led by Spanish explorer Coronado, to
the twenty-first century immigration of Central and South Americans, Latinos
have always been present in Oklahoma’s history. Providing extensive research
data, Michael Smith analyzes the impact of Latino groups and individuals on
the state’s development. </span></blockquote><span data-dcnode-id="2199" instrument_node="">
</span><p data-dcnode-id="2197"><span data-dcnode-id="2198" instrument_node="">“Eliza Jane Ross: A Pioneer Cherokee Educator,” by James G. McCullagh, 224–243
</span></p><blockquote data-dcnode-id="2195"><span data-dcnode-id="2196" instrument_node="">In the Cherokee Nation of the nineteenth century, education offered an avenue
of personal improvement and self-realization. For almost half of that century,
Eliza Jane Ross, niece of Cherokee Chief John Ross, served as a teacher in the
nation’s schools. James McCullagh provides a biography of Jane Ross and her
career as a pioneer educator. </span></blockquote><span data-dcnode-id="2194" instrument_node="">
</span><img alt=" " class="icon" data-dcnode-id="2193" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.okhistory.org/images/publications/Chronicles087.jpg&amp;raw"><h2 data-dcnode-id="2191" id="v87"><span data-dcnode-id="2192" instrument_node="">Volume 87, No. 1 (Spring 2009)</span></h2><span data-dcnode-id="2190" instrument_node="">
</span><p data-dcnode-id="2188"><span data-dcnode-id="2189" instrument_node="">“‘An’ the west jes’ smiled’: Oklahoma Banking and the Panic of
1907,” by Loren C. Gatch, 4–33</span></p><blockquote data-dcnode-id="2186"><span data-dcnode-id="2187" instrument_node="">
Oklahoma’s banking institutions remained generally unaffected as the Panic of
1907 struck Wall Street and the nation’s other financial centers. Loren Gatch
relates the ways in which the Oklahoma Bankers Association and each community’s
banks responded to the crisis. They calmed public fears of bank insolvency
and developed ingenious ways to make currency flow in the economy. As
a result, Oklahoma created a bank deposit guaranty law, the nation‘s first.</span></blockquote><span data-dcnode-id="2185" instrument_node="">
</span><p data-dcnode-id="2183"><span data-dcnode-id="2184" instrument_node="">“Ragtown: Wirt, Oklahoma, and the Healdton Boom,” by Elizabeth E. Freeman, 34–55</span></p><blockquote data-dcnode-id="2181"><span data-dcnode-id="2182" instrument_node="">The untamed Oklahoma oil-boom towns of the 1920s included Wirt, also called
Ragtown, in Carter County. Emerging overnight in the center of the Healdton Field, Ragtown provided shelter and work for hundreds of assorted oil-field characters. Elizabeth Freeman describes the community’s growth and the problems
of fire and police protection created by the lifestyles of people attracted to
labor and play in the oil field.</span></blockquote><span data-dcnode-id="2180" instrument_node="">
</span><p data-dcnode-id="2178"><span data-dcnode-id="2179" instrument_node="">“Bad Water and Epidemics: The Wages of Neglect at the Seneca Indian School,” by Christina Bieloh, 56–75</span></p><blockquote data-dcnode-id="2176"><span data-dcnode-id="2177" instrument_node="">Measles and typhoid killed dozens at Seneca Indian School in 1927. Founded in
1872 for Seneca, Wyandot, and Quapaw children, by the 1920s Seneca School
served as a boarding facility for Cherokee youths. Christina Bieloh analyzes
the issues of bad federal management and general neglect of health and sanitation
that put Indian students’ lives in jeopardy at Seneca and at the nation’s
other Indian schools in the early twentieth century. </span></blockquote><span data-dcnode-id="2175" instrument_node="">
</span><p data-dcnode-id="2173"><span data-dcnode-id="2174" instrument_node="">“Frontier Freedom: Seeking the Underground Railroad in Indian Territory,” by Diane Miller, 76–93</span></p><blockquote data-dcnode-id="2171"><span data-dcnode-id="2172" instrument_node="">As an avenue of escape for slaves, the Underground Railway was not limited to
the actions of whites in the Southern and Northern states. Diane Miller summarizes
the ways in which the nations of Indian Territory offered safe harbor
for runaway slaves and other African Americans seeking freedom.</span></blockquote><span data-dcnode-id="2170" instrument_node="">
</span><img alt=" " class="icon" data-dcnode-id="2169" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.okhistory.org/images/publications/Chronicles086b.jpg&amp;raw"><span data-dcnode-id="2168" instrument_node="">
</span><h2 data-dcnode-id="2166" id="issue2008"><span data-dcnode-id="2167" instrument_node="">Volume 86, No. 4 (Winter 2008–09) </span></h2><p class="backtotop" data-dcnode-id="2163"><a data-dcnode-id="2164" href="#top"><span data-dcnode-id="2165" instrument_node="">Back to top</span></a></p><span data-dcnode-id="2162" instrument_node="">
</span><p data-dcnode-id="2160"><span data-dcnode-id="2161" instrument_node="">“Sustaining the Cherokees’ Lamp of Enlightenment: The Establishment of Northeastern State Normal School,” by Brad Agnew, 388–409</span></p><blockquote data-dcnode-id="2158"><span data-dcnode-id="2159" instrument_node="">The Cherokee Nation considered education to be very important, and this belief was exemplified in the Cherokee Female Seminary in Tahlequah. The region’s education tradition continued, reflected in the political and social process of convincing the legislature to place one of the state’s normal schools, or teachers’ colleges, in Tahlequah. Brad Agnew describes the process by which local citizens secured Northeastern State Normal School for their town.
</span></blockquote><span data-dcnode-id="2157" instrument_node="">
</span><p data-dcnode-id="2155"><span data-dcnode-id="2156" instrument_node="">“A Modern Response to the Cold War: Paul Harris and the Lawton National Guard Armory,” by Cynthia Savage, 410–427</span></p><blockquote data-dcnode-id="2153"><span data-dcnode-id="2154" instrument_node="">Challenged to design a new home for the Lawton-based contingent of the Forty-fifth Infantry Division of the Oklahoma National Guard, architect Paul Harris stepped outside the 1930s tradition of militaristic armory buildings. Cynthia Savage delineates the conceptualization and design of a Modern architectural masterpiece to serve Lawton’s local citizen soldiers. 
</span></blockquote><span data-dcnode-id="2152" instrument_node="">
</span><p data-dcnode-id="2150"><span data-dcnode-id="2151" instrument_node="">“Broken Thread: The Choctaw Spinning Association, 1937–1943,” by Christina Petty, 428–445</span></p><blockquote data-dcnode-id="2148"><span data-dcnode-id="2149" instrument_node="">Out of the Great Depression of the 1930s came a movement led by the Indian Arts and Crafts Board of the Bureau of Indian Affairs. Two dedicated employees of the IACB came to southeastern Oklahoma to carry out an ambitious project to increase the income of Choctaw women through traditional native craft. Christina Petty details the process of reinstituting the art of spinning wool among the Choctaw and analyzes the program’s unfortunate demise.</span></blockquote><span data-dcnode-id="2147" instrument_node="">
</span><p data-dcnode-id="2145"><span data-dcnode-id="2146" instrument_node="">“Amazing Grace: The Influence of Christianity in Nineteenth-Century Oklahoma Ozark Music and Society,” by J. Justin Castro, 446–468</span></p><blockquote data-dcnode-id="2143"><span data-dcnode-id="2144" instrument_node="">Music and religion have commonly been inseparable for Indian and white Oklahomans living on the fringe of the Ozarks in eastern Oklahoma. J. Justin Castro analyzes the effect of religious culture on the development of that region’s music, as expressed in hymn singing, temperance songs, instruments, and play-parties.
</span></blockquote><span data-dcnode-id="2142" instrument_node="">
</span><img alt=" " class="icon" data-dcnode-id="2141" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.okhistory.org/images/publications/Chronicles082.jpg&amp;raw"><h2 data-dcnode-id="2139"><span data-dcnode-id="2140" instrument_node="">Volume 86, No. 3 (Fall 2008)</span></h2><span data-dcnode-id="2138" instrument_node="">
</span><p data-dcnode-id="2136"><span data-dcnode-id="2137" instrument_node="">“Constructing Segregation: Race Politics in the Territorial Legislature, 1890–1907,” by R. Darcy, 260–289</span></p><blockquote data-dcnode-id="2132"><span data-dcnode-id="2135" instrument_node="">
</span><p data-dcnode-id="2133"><span data-dcnode-id="2134" instrument_node="">During the territorial era the Legislative Assembly dealt with many matters relating to the lives and livelihoods of their constituents, some of whom were African Americans. Republican solons supported civil rights and racial equality, but Democrats favored separation of the races. R. Darcy relates the story of the gradual construction of segregation through the medium of separate-school legislation and ballot manipulation.</span></p></blockquote><span data-dcnode-id="2131" instrument_node="">
</span><p data-dcnode-id="2129"><span data-dcnode-id="2130" instrument_node="">“Unfinished Choctaw Justice: The Murder of Charles Wilson and the Execution of Jackson Crow,” by Devon Abbott Mihesuah, 290–315</span></p><blockquote data-dcnode-id="2127"><span data-dcnode-id="2128" instrument_node="">In August 1884 Choctaw politician and U.S. Deputy Marshal Charles Wilson was murdered on election day. Devon Mihesuah relates the events surrounding the arrest, trial, and acquittal of Wilson’s political rival, Robert Benton, and Benton’s friends, in Choctaw court. Jackson Crow, a non-Choctaw also accused of the crime, was convicted in federal court and executed in 1888. </span></blockquote><span data-dcnode-id="2126" instrument_node="">
</span><p data-dcnode-id="2124"><span data-dcnode-id="2125" instrument_node="">“William Meredith Cunningham: An Oklahoma Proletarian Novelist,” by Larry O’Dell, 316–327</span></p><blockquote data-dcnode-id="2122"><span data-dcnode-id="2123" instrument_node="">In the 1920s and 1930s a new social and political atmosphere fostered literary creativity throughout the nation as well as in Oklahoma. Within that stimulating milieu emerged William Cunningham. Larry O’Dell offers Cunningham’s biography and reveals the ways in which his novels, poetry, and other writings championed the industrial-agricultural working class of his native state. </span></blockquote><span data-dcnode-id="2121" instrument_node="">
