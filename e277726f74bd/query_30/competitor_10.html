</span><p data-dcnode-id="2119"><span data-dcnode-id="2120" instrument_node="">“Stereotypes, Lies, and Crass Humor: When Men Write About Women Homesteaders in Oklahoma Land Runs,” by Douglas Werden, 328–348</span></p><blockquote data-dcnode-id="2117"><span data-dcnode-id="2118" instrument_node="">During the opening of Oklahoma Territory to settlement, thousands of individuals took part in a series of land runs from 1889 through 1895. Women, as well as men, participated in them. Examining the literature of and about the era, Douglas Werden shows that men who wrote about women land seekers often satirized and belittled them in order to discourage them from competing.</span></blockquote><span data-dcnode-id="2116" instrument_node="">
</span><img alt=" " class="icon" data-dcnode-id="2115" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.okhistory.org/images/publications/Chronicles081.jpg&amp;raw"><span data-dcnode-id="2114" instrument_node="">
</span><h2 data-dcnode-id="2112"><span data-dcnode-id="2113" instrument_node="">Volume 86, No. 2 (Summer 2008)</span></h2><span data-dcnode-id="2111" instrument_node="">
</span><p data-dcnode-id="2109"><span data-dcnode-id="2110" instrument_node="">“Oklahoma’s Air Ace: William T. Ponder and World War I,” by Bill Moore, 132–157</span></p><blockquote data-dcnode-id="2107"><span data-dcnode-id="2108" instrument_node="">William T. Ponder revealed his World War I aviation exploits to his mother in a series of letters that were printed in the Mangum Star. This little-known hero served with the French Aviation Service as part of the Lafayette Flying Corps. After transferring to the U.S. Air Service, he shot down six enemy planes and became Oklahoma’s first air ace. Against the backdrop of World War I aviation history, Bill Moore chronicles Ponder’s training and his testing in battle.</span></blockquote><span data-dcnode-id="2106" instrument_node="">
</span><p data-dcnode-id="2104"><span data-dcnode-id="2105" instrument_node="">“Fifteen Men in Ermine: Judges of the United States Court for the Indian Territory, 1889–1907,” by Von Russell Creel, 158–185</span></p><blockquote data-dcnode-id="2102"><span data-dcnode-id="2103" instrument_node="">The fifteen men who dispensed justice to the residents of Indian Territory had varied backgrounds, social beliefs, and careers. In this collective biography Von Russell Creel examines each judge’s family history, education, politics, appointment to the bench, pattern of judicial decision making, and postjudicial professional life. </span></blockquote><span data-dcnode-id="2101" instrument_node="">
</span><p data-dcnode-id="2099"><span data-dcnode-id="2100" instrument_node="">“Counting Sioux: American Indian Journalism and the Proposed Lakota Removal to Indian Territory,” by Richard Mize, 186–211</span></p><blockquote data-dcnode-id="2097"><span data-dcnode-id="2098" instrument_node="">In 1876, as the Indian Wars ended, the United States Army mourned the death of George Armstrong Custer and planned to control the Lakota Sioux by placing them within a reservation. Richard Mize chronicles the reaction of American Indian newspaper editors of Indian Territory to plans to relocate the Sioux to a portion of the Creek Nation’s lands. </span></blockquote><span data-dcnode-id="2096" instrument_node="">
</span><p data-dcnode-id="2094"><span data-dcnode-id="2095" instrument_node="">“‘An American Tragedy’: Oklahomans React to Martin Luther King’s Assassination,” by Kerri A. Shadid, 212–232</span></p><blockquote data-dcnode-id="2092"><span data-dcnode-id="2093" instrument_node="">When Martin Luther King, Jr., met an untimely end on April 4, 1968, Americans mourned. Newspaper reporters talked to hundreds of Oklahomans during that week, gauging their grief, their fears, and their hopes for the future. Kerri Shadid uses these newspaper interviews to analyze the reactions of black and white Oklahoma citizens to the death of the noted civil rights leader. </span></blockquote><span data-dcnode-id="2091" instrument_node="">
</span><img alt=" " class="icon" data-dcnode-id="2090" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.okhistory.org/images/publications/Chronicles086.jpg&amp;raw"><h2 data-dcnode-id="2088" id="v86"><span data-dcnode-id="2089" instrument_node="">Volume 86, No. 1 (Sping 2008) </span></h2><span data-dcnode-id="2087" instrument_node="">
</span><p data-dcnode-id="2085"><span data-dcnode-id="2086" instrument_node="">“The Businessman’s Frontier: C. C. Hightower, Commerce, and Old Greer County, 1891–1903,” by Michael J. Hightower, 4–</span></p><blockquote data-dcnode-id="2083"><span data-dcnode-id="2084" instrument_node="">C. C. Hightower, a native Georgian, brought his considerable entrepreneurial skills to the frontier in 1890. He was instrumental in the founding of Altus, in Old Greer County, at a time when its ownership was still disputed by Texas. Michael J. Hightower delineates C. C. Hightower’s role in a changing economy and chronicles his rise to prominence in business and civic affairs in prestatehood Oklahoma.</span></blockquote><span data-dcnode-id="2082" instrument_node="">
</span><p data-dcnode-id="2080"><span data-dcnode-id="2081" instrument_node="">“From Termination to Self-Determination: Indian Health in Oklahoma, 1954–1980, Part 2,” by Richard Lowitt, 32–63</span></p><blockquote data-dcnode-id="2078"><span data-dcnode-id="2079" instrument_node="">For American Indians in Oklahoma, the health care problem after 1970 was linked to a new federal policy of tribal self-determination. In the second of a two-part article Richard Lowitt continues his evaluation of the problems of Indian health care and the campaign led by Senators Fred Harris and Dewey Bartlett to correct a record of neglect. </span></blockquote><span data-dcnode-id="2077" instrument_node="">
</span><p data-dcnode-id="2075"><span data-dcnode-id="2076" instrument_node="">“Thrice Purchased: Acquisition and Allotment of the Citizen Potawatomi Reservation,” by Lisa Kraft, 64–87</span></p><blockquote data-dcnode-id="2073"><span data-dcnode-id="2074" instrument_node="">As the Citizen Potawatomi people emerged as a separate group in the middle nineteenth century, they were pushed out of their communally held Kansas reserve and into the Indian Territory. Lisa Kraft explores the arrival of the Potawatomi in central Oklahoma, the acquisition of a new reservation, and the means used to force them to own land as individuals.</span></blockquote><span data-dcnode-id="2072" instrument_node="">
</span><p data-dcnode-id="2070"><span data-dcnode-id="2071" instrument_node="">“‘Touch the Bottom and Lift’: Black Women Home Extension Agents in Oklahoma, 1912–1935,” by Cecelia Brooks, 88–108</span></p><blockquote data-dcnode-id="2068"><span data-dcnode-id="2069" instrument_node="">Self-help and education, the two pillars of advancement for African Americans in the post–Civil War era, led to the founding of agricultural and mechanical schools and the building of a cadre of black women extension agents. Traveling the back roads of Oklahoma, they brought home economics education to thousands of rural African American women and their families.</span></blockquote><span data-dcnode-id="2067" instrument_node="">
</span><img alt=" " class="icon" data-dcnode-id="2066" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.okhistory.org/images/publications/Chronicles085.jpg&amp;raw"><span data-dcnode-id="2065" instrument_node="">
</span><h2 data-dcnode-id="2063" id="issue2007"><span data-dcnode-id="2064" instrument_node="">Volume 85, No. 4 (Winter 2007–08) </span></h2><p class="backtotop" data-dcnode-id="2060"><a data-dcnode-id="2061" href="#top"><span data-dcnode-id="2062" instrument_node="">Back to top</span></a></p><span data-dcnode-id="2059" instrument_node="">
</span><p data-dcnode-id="2057"><span data-dcnode-id="2058" instrument_node="">“Will Rogers High School: The Public Works Administration, Progressive Education, and a Modern School,” by Cathy Ambler, 388–411</span></p><blockquote data-dcnode-id="2055"><span data-dcnode-id="2056" instrument_node="">The Public Works Administration, a New Deal program of the 1930s, provided funds for the construction of Tulsa’s Will Rogers High School. Modern in every way, the building and its experimental curriculum implemented the ideals of the progressive education movement. Cathy Ambler details the pedagogical planning and architectural design of one of Tulsa’s educational and Art Deco showplaces. </span></blockquote><span data-dcnode-id="2054" instrument_node="">
</span><p data-dcnode-id="2052"><span data-dcnode-id="2053" instrument_node="">“‘Civilization May Be a Hoax’: Oklahomans in the Old World, 1907–1939,” by K. Dirk Voss, 412–435</span></p><blockquote data-dcnode-id="2050"><span data-dcnode-id="2051" instrument_node="">Between the two world wars middle-class Oklahomans toured Europe and examined that continent’s claim as the cradle of “civilization” and culture. Their observations of Old World customs and living conditions, coupled with the ravages of World War I, convinced many that the New World—America and Oklahoma—were superior in all respects. </span></blockquote><span data-dcnode-id="2049" instrument_node="">
</span><p data-dcnode-id="2047"><span data-dcnode-id="2048" instrument_node="">“From Termination to Self-Determination: Indian Health in Oklahoma, 1954–1980, Part 1,” by Richard Lowitt, 436–467</span></p><blockquote data-dcnode-id="2045"><span data-dcnode-id="2046" instrument_node="">For American Indians in Oklahoma and elsewhere, obtaining adequate health care in the second half of the twentieth century has been a pressing problem, one aggravated by the federal policy of tribal termination. In this two-part article Richard Lowitt evaluates the problems of Indian health care and the campaign led by Senator Fred Harris and others to correct a record of neglect. </span></blockquote><span data-dcnode-id="2044" instrument_node="">
</span><p data-dcnode-id="2042"><span data-dcnode-id="2043" instrument_node="">“‘With Great Difficulty and Labour’: The Emigration of the McIntosh Party of Creek Indians, 1827–1828,” by Christopher Haveman, 468–490</span></p><blockquote data-dcnode-id="2040"><span data-dcnode-id="2041" instrument_node="">Fleeing from the Southeastern United States, parties of Creek Indians, adherents of William McIntosh and his family, made their way over land and water after selecting new homes in part of the trans-Mississippi region that is now Oklahoma. Christopher Haveman carefully outlines the travails of these first Creek emigrants, whose journey preceded removal of the Creek Nation. </span></blockquote><span data-dcnode-id="2039" instrument_node="">
</span><img alt=" " class="icon" data-dcnode-id="2038" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.okhistory.org/images/publications/Chronicles080.jpg&amp;raw"><span data-dcnode-id="2037" instrument_node="">
</span><h2 data-dcnode-id="2035"><span data-dcnode-id="2036" instrument_node="">Volume 85, No. 3 (Fall 2007)</span></h2><span data-dcnode-id="2034" instrument_node="">
</span><p data-dcnode-id="2032"><span data-dcnode-id="2033" instrument_node="">“A Reluctant Heir: Carl Albert, Watergate, and the American Presidency,” by A. Heath Anderson. 260–279</span></p><blockquote data-dcnode-id="2030"><span data-dcnode-id="2031" instrument_node="">Speaker of the U.S. House of Representatives Carl Bert Albert of Oklahoma stood on the brink of assuming the office of vice president of the United States after Spiro T. Agnew resigned in disgrace in 1973. Heath Anderson details Speaker Albert’s decision to eschew the ultimate leadership role and to recommend Rep. Gerald R. Ford as Agnew’s successor.</span></blockquote><span data-dcnode-id="2029" instrument_node="">
</span><p data-dcnode-id="2027"><span data-dcnode-id="2028" instrument_node="">“Setbacks and Successes: Cameron University’s Library, 1909–2000,” by Sheridan Eleanor Young, 280–307</span></p><blockquote data-dcnode-id="2025"><span data-dcnode-id="2026" instrument_node="">Cameron’s Library began in 1909 as a few shelves of books. Over a century, by efforts of administrators and librarians, the library played a singular role in the school’s quest for accreditation. Sheridan Young examines the library’s policies for collections development and materials access and constant improvement of buildings that helped this important regional institution reach full university status.</span></blockquote><span data-dcnode-id="2024" instrument_node="">
</span><p data-dcnode-id="2022"><span data-dcnode-id="2023" instrument_node="">“‘We Complacently Drink the Fruit of the Lotus Bow’: Deciding on the Oklahoma City Floodway, 1946–1953,” by Adam A. Payne, 308–323</span></p><blockquote data-dcnode-id="2020"><span data-dcnode-id="2021" instrument_node="">In the first half of the twentieth century North Canadian River floods devastated parts of Oklahoma City. Two inundations in 1923 engendered a thirty-year struggle for federal funds to straighten and safely channel the river through the growing urban area. Designed and planned from 1946 to 1953, the Oklahoma City Floodway was dedicated on March 31, 1958. </span></blockquote><span data-dcnode-id="2019" instrument_node="">
</span><p data-dcnode-id="2017"><span data-dcnode-id="2018" instrument_node="">“So That a Nation May Live: The Pawnee Ghost Dance and Cultural Renaissance,” by Todd E. Leahy, 324–341</span></p><blockquote data-dcnode-id="2015"><span data-dcnode-id="2016" instrument_node="">When the Pawnee people were forced into Indian Territory in the mid-1870s, they had already begun to lose aspects of their culture. In 1891 and 1892 the Ghost Dance, a regeneration ceremony devised by Paiute “prophet” Wovoka in Nevada, gave the Pawnees a unifying experience. Todd Leahy describes the early development of the Ghost Dance among the Pawnees and traces the ceremony’s continuance into the twenty-first century. </span></blockquote><span data-dcnode-id="2014" instrument_node="">
</span><img alt=" " class="icon" data-dcnode-id="2013" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.okhistory.org/images/publications/Chronicles083.jpg&amp;raw"><span data-dcnode-id="2012" instrument_node="">
</span><h2 data-dcnode-id="2010"><span data-dcnode-id="2011" instrument_node="">Volume 85, No. 2 (Summer 2007)</span></h2><span data-dcnode-id="2009" instrument_node="">
</span><p data-dcnode-id="2007"><span data-dcnode-id="2008" instrument_node="">“An Exercise in Pride: Celebrating the Oklahoma Semi-centennial,” by Bill Mullins, 132–157</span></p><blockquote data-dcnode-id="2005"><span data-dcnode-id="2006" instrument_node="">The year of Oklahoma’s Semi-centennial of Statehood, 1957, promised the opportunity to commemorate the state’s colorful history and to promote travel and tourism. The Semi-centennial Commission planned in advance, but the year’s events proved more spectacular than educational. Major expositions in Oklahoma City and Tulsa were mirrored in events in many communities. </span></blockquote><span data-dcnode-id="2004" instrument_node="">
</span><p data-dcnode-id="2002"><span data-dcnode-id="2003" instrument_node="">“Hoorah for Integration!’ The Adoption of the 1955 Better Schools Amendment” by D. Keith Lough, 158–175</span></p><blockquote data-dcnode-id="2000"><span data-dcnode-id="2001" instrument_node="">Since 1907, and until the Supreme Court decision in Brown v. Board of Education (1954), Oklahoma’s African American children had to attend segregated schools. After a lengthy campaign led by Governor Raymond D. Gary, Oklahomans adopted a constitutional amendment ending the time-honored special tax for separate schools, and the process of integration became reality.</span></blockquote><span data-dcnode-id="1999" instrument_node="">
</span><p data-dcnode-id="1997"><span data-dcnode-id="1998" instrument_node="">“Dark Spot on the Sunbelt: Economic Stagnation and Political Corruption in 1950s Oklahoma,” by Matthew G. McCoy, 176–197</span></p><blockquote data-dcnode-id="1995"><span data-dcnode-id="1996" instrument_node="">In the 1950s Oklahoma’s economic health was failing. The state lagged behind Texas, New Mexico, and the rest of the “Sunbelt,” where rapid industrialization and population growth came from federal defense spending. Searching for the reasons for sluggish performance, Matthew McCoy examines the roles of negative self-image and political corruption in retarding progress. </span></blockquote><span data-dcnode-id="1994" instrument_node="">
</span><p data-dcnode-id="1992"><span data-dcnode-id="1993" instrument_node="">“‘Little Buzz Buggies’: Midget Auto Racing in Oklahoma City, 1946–1964,” by Galen Kurth, 198–220</span></p><blockquote data-dcnode-id="1990"><span data-dcnode-id="1991" instrument_node="">In the first decade after World War II the entertainment industry rapidly expanded in the United States and also in Oklahoma. Midget auto racing, held in Oklahoma City’s Taft Stadium, drew huge crowds and gave several race-car drivers the experiences that took them onward to the Indianapolis 500 and other major races.</span></blockquote><span data-dcnode-id="1989" instrument_node="">
</span><img alt=" " class="icon" data-dcnode-id="1988" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.okhistory.org/images/publications/Chronicles030.jpg&amp;raw"><h2 data-dcnode-id="1986" id="v85"><span data-dcnode-id="1987" instrument_node="">Volume 85, No. 1 (Sping 2007)</span></h2><span data-dcnode-id="1985" instrument_node="">
</span><p data-dcnode-id="1983"><span data-dcnode-id="1984" instrument_node="">“Sooner State Civil Liberties in Perilous Times, 1940–1941, Part 2: Oklahoma’s Little Dies Committee,” by Wayne A. Wiegand and Shirley A. Wiegand, 4–33 </span></p><blockquote data-dcnode-id="1981"><span data-dcnode-id="1982" instrument_node="">As the Communist scare spread in the pre–World War II years, both houses of the Oklahoma Legislature set up “Un-American activities” committees. In Part 2 of the Civil Liberties story, the Oklahoma Senate Committee on Elections and Privileges turns its attention to a legislatively mandated investigation of alleged Communist activity in Oklahoma colleges and universities.</span></blockquote><span data-dcnode-id="1980" instrument_node="">
</span><p data-dcnode-id="1978"><span data-dcnode-id="1979" instrument_node="">“Education for Successful Living: University School at the University of Oklahoma, 1917–1973,” by Steven Wade Mackie, 34–51</span></p><blockquote data-dcnode-id="1976"><span data-dcnode-id="1977" instrument_node="">The Progressive Era and its educational leaders, such as John Dewey and William H. Kilpatrick, inspired the creation of schools designed to focus on the child, on socialization, on practical subjects, and on problem solving. At the University of Oklahoma in 1917 Ellsworth Collings founded University School, a junior high and later high school. For fifty-six years it was to be a nexus of experimentation, observation, and practice exemplifying the ideals of Progressive Education.</span></blockquote><span data-dcnode-id="1975" instrument_node="">
</span><p data-dcnode-id="1973"><span data-dcnode-id="1974" instrument_node="">“A Meeting of Conquerors: Art Goebel and Charles Lindbergh in Tulsa, 1927,” by Thomas L. Hedglen, 52–71</span></p><blockquote data-dcnode-id="1971"><span data-dcnode-id="1972" instrument_node="">Aviator and Phillips Petroleum pilot Art Goebel of Oklahoma, “The Conqueror of the Pacific,” met his counterpart, Charles A. Lindbergh, popular idol and “The Conqueror of the Atlantic,” in Tulsa in September 1927. Their meeting and their behavior toward Oklahomans revealed much about each man’s character and personality and about the American practice of hero making.</span></blockquote><span data-dcnode-id="1970" instrument_node="">
</span><p data-dcnode-id="1968"><span data-dcnode-id="1969" instrument_node="">“Twixt Scylla and Charybdis: Environmental Pressure on the Choctaw to Ally with the Confederacy,” by Kevin Sweeney, 72–93</span></p><blockquote data-dcnode-id="1966"><span data-dcnode-id="1967" instrument_node="">A mid-nineteenth-century drought suffered by residents of the Choctaw Nation imperiled the ability of families to survive. Pressed by the need for cash to buy supplies, the Choctaw struggled to make the United States government live up to its treaty promises. Failing that, the nation’s leaders made the fateful decision to ally with the Confederate States of America, which promised aid.</span></blockquote><span data-dcnode-id="1965" instrument_node="">
</span><img alt=" " class="icon" data-dcnode-id="1964" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.okhistory.org/images/publications/Chronicles029.jpg&amp;raw"><h2 data-dcnode-id="1962" id="issue2006"><span data-dcnode-id="1963" instrument_node="">Volume 84, No. 4 (Winter 2006–07) </span></h2><p class="backtotop" data-dcnode-id="1959"><a data-dcnode-id="1960" href="#top"><span data-dcnode-id="1961" instrument_node="">Back to top</span></a></p><span data-dcnode-id="1958" instrument_node="">
</span><p data-dcnode-id="1956"><span data-dcnode-id="1957" instrument_node="">“Forty Feet Under: Kaw City and the Kaw Project on the Arkansas River, 1957–1976,” by Richard Lowitt, 388–426 </span></p><blockquote data-dcnode-id="1954"><span data-dcnode-id="1955" instrument_node="">From the mid-1950s the inhabitants of Kaw City, founded in 1902 in Kay County, anticipated the construction of Kaw Dam and Reservoir on the Arkansas River. As the bureaucratic process dragged on for decades, the project divided the community. Ultimately, the residents rebuilt on a new site, and by 1977 “Old” Kaw City lay forty feet under Kaw Lake. </span></blockquote><span data-dcnode-id="1953" instrument_node="">
</span><p data-dcnode-id="1951"><span data-dcnode-id="1952" instrument_node="">“A Few Unreasonable Proposals: Some Rejected Ideas from the Cherokee Allotment Negotiations,” by Andrew Denson, 426–443</span></p><blockquote data-dcnode-id="1949"><span data-dcnode-id="1950" instrument_node="">Facing allotment of their tribal land in severalty, the Cherokee Nation strove to preserve several important elements of their political culture. Their proposals for land ownership, judicial administration, and representation in the United States Congress were summarily rejected by the members of the Dawes Commission during the 1898–99 talks.</span></blockquote><span data-dcnode-id="1948" instrument_node="">
</span><p data-dcnode-id="1946"><span data-dcnode-id="1947" instrument_node="">“Sooner State Civil Liberties in Perilous Times, 1940–1941, Part 1: The Oklahoma Federation for Constitutional Rights,” by Wayne A. Wiegand and Shirley A. Wiegand, 444–463</span></p><blockquote data-dcnode-id="1944"><span data-dcnode-id="1945" instrument_node="">The rise of Communism in Europe alarmed many Americans in the pre–World War II era, and the FBI investigated Oklahomans, including university professors and religious leaders, for suspected subversive activities. Determined to preserve and defend freedom of speech, a group of concerned citizens formed the Oklahoma Federation for Constitutional Rights and later faced investigation by the legislature.</span></blockquote><span data-dcnode-id="1943" instrument_node="">
</span><p data-dcnode-id="1941"><span data-dcnode-id="1942" instrument_node="">“J. A. Webb, Early-Day Cotton Breeder from Union City, Oklahoma,” by M. Reneé Albers Nelson and Laval M. Verhalen, 464–492 </span></p><blockquote data-dcnode-id="1939"><span data-dcnode-id="1940" instrument_node="">In 1928 a cotton farmer discovered strange cotton plants growing in his field near Union City in Canadian County. The leaves were purple, and the bolls were set in clusters. A talented amateur agronomist, J. A. Webb diligently worked for the next three decades to perfect a better variety, and he marketed the seed as Webb’s Purple cot ton. </span></blockquote><span data-dcnode-id="1938" instrument_node="">
</span><img alt=" " class="icon" data-dcnode-id="1937" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.okhistory.org/images/publications/Chronicles028.jpg&amp;raw"><span data-dcnode-id="1936" instrument_node="">
</span><h2 data-dcnode-id="1934"><span data-dcnode-id="1935" instrument_node="">Volume 84, No. 3 (Fall 2006)</span></h2><span data-dcnode-id="1933" instrument_node="">
</span><p data-dcnode-id="1931"><span data-dcnode-id="1932" instrument_node="">“Money Matters: The Stamp Scrip Movement in Depression–Era Oklahoma,” by Loren Gatch, 260–287 </span></p><blockquote data-dcnode-id="1929"><span data-dcnode-id="1930" instrument_node="">Expanding his 2004 article on Oklahoma’s reaction to the Depression-era banking crisis of early 1933, Loren Gatch ties the origin of the scrip movement to the writings of Yale University’s Professor Irving Fisher, traces the implementation of scrip schemes in nearly three dozen Oklahoma towns, and explains the reasons for scrip’s early successes and rapid demise. </span></blockquote><span data-dcnode-id="1928" instrument_node="">
</span><p data-dcnode-id="1926"><span data-dcnode-id="1927" instrument_node="">“Sobering News: Choctaw Temperance Reporting and Civic Journalism,” by Richard Mize, 288–307 </span></p><blockquote data-dcnode-id="1924"><span data-dcnode-id="1925" instrument_node="">Comparing modern “civic journalism” with its nineteenth-century counterpart, Richard Mize examines editorial positions on the temperance movement, as printed in the pages of the Choctaw Telegraph and the Choctaw Intelligencer. The two journals campaigned against alcohol in the Choctaw Nation. </span></blockquote><span data-dcnode-id="1923" instrument_node="">
</span><p data-dcnode-id="1921"><span data-dcnode-id="1922" instrument_node="">“A Reading Room of Their Own: Library Services for African Americans in Oklahoma, 1907–1946,” by R. O. Joe Cassity, Jr., 308–321 </span></p><blockquote data-dcnode-id="1917"><span data-dcnode-id="1920" instrument_node="">
</span><p data-dcnode-id="1918"><span data-dcnode-id="1919" instrument_node="">Despite Jim Crow Laws and a Supreme Court–mandated doctrine of “separate but equal,” African American Oklahomans struggled for access to public library services. The first forty years of statehood brought few successes, and by mid-century only eleven communities provided a public library facility for the state’s black citizens. </span></p></blockquote><span data-dcnode-id="1916" instrument_node="">
</span><p data-dcnode-id="1914"><span data-dcnode-id="1915" instrument_node="">“‘Revolution for the Hell of It’: Abbie Hoffman Visits Oklahoma State University in 1971,” by Erica John son, 322–335</span></p><blockquote data-dcnode-id="1912"><span data-dcnode-id="1913" instrument_node="">In 1970 and 1971 a group of OSU student activists demanded to be allowed to engage Abbie Hoffman, Yippie leader and would-be revolutionary, to lecture on the Stillwater campus. Conservative students, faculty, university administrators, and even legislators attempted, unsuccessfully, to thwart the prospect of radical action, fearing that a Kent State–like incident might erupt. </span></blockquote><span data-dcnode-id="1911" instrument_node="">
</span><img alt=" " class="icon" data-dcnode-id="1910" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.okhistory.org/images/publications/Chronicles051.jpg&amp;raw"><h2 data-dcnode-id="1908"><span data-dcnode-id="1909" instrument_node="">Volume 84, No. 2 (Summer 2006)</span></h2><span data-dcnode-id="1907" instrument_node="">
</span><p data-dcnode-id="1905"><span data-dcnode-id="1906" instrument_node="">“‘Practically a Military School’: The University of Oklahoma and World War I,” by David W. Levy, 132–161</span></p><blockquote data-dcnode-id="1903"><span data-dcnode-id="1904" instrument_node="">When the United States entered the First World War in April 1917, the University of Oklahoma’s administration, faculty, and students sprang into action to support the war effort. The revamped campus now included barracks and military training facilities. A Student Army Training Corps, precursor to ROTC, was born, and numerous students and faculty entered the armed services. </span></blockquote><span data-dcnode-id="1902" instrument_node="">
</span><p data-dcnode-id="1900"><span data-dcnode-id="1901" instrument_node="">“On the Gallows’ Edge: Capital Punishment, Appeals, and Presidential Clemency in Indian Territory, 1896–1907,” by Von Russell Creel, 162–187 </span></p><blockquote data-dcnode-id="1898"><span data-dcnode-id="1899" instrument_node="">Continuing his study of the administration of justice in Indian Territory courts, and expanding upon the application of capital punishment, Von Creel details the cases of nine individuals who were convicted of capital crimes but who escaped hanging. Their stories involve the complicated legal processes of appeal, application for presidential clemency, commutation of sentence, and postverdict motions. </span></blockquote><span data-dcnode-id="1897" instrument_node="">
</span><p data-dcnode-id="1895"><span data-dcnode-id="1896" instrument_node="">“Earning Their Spurs in the Oil Patch: The Cinematic FBI, the Osage Murders, and the Test of the American West,” by Andrew L. Warren, 188–209</span></p><blockquote data-dcnode-id="1893"><span data-dcnode-id="1894" instrument_node="">In the early 1920s a lengthy series of murders occurred in Osage County. The victims, members of the Osage tribe, all held headrights that entitled them to oil royalties. After some bumbling, the Federal Bureau of Investigation eventually solved the murders, but for years afterward FBI Director J. Edgar Hoover used the story to promote his agency’s efficiency as crime fighters. In the 1950s the crimes were featured in a book and a movie, both titled The FBI Story.</span></blockquote><span data-dcnode-id="1892" instrument_node="">
</span><p data-dcnode-id="1890"><span data-dcnode-id="1891" instrument_node="">“A New Frontier in Science: Robert S. Kerr, James E. Webb, and Oklahoma in the Space Age,” by Bill Moore, 210–232 </span></p><blockquote data-dcnode-id="1886"><span data-dcnode-id="1889" instrument_node="">
</span><p data-dcnode-id="1887"><span data-dcnode-id="1888" instrument_node="">Oklahoma’s U.S. Senator Robert S. Kerr and Frontiers of Science Foundation Director James E. Webb collaborated in bringing the space age to Oklahoma in the 1950s and 1960s. In concert with other state leaders they promoted a National Conference on the Peaceful Uses of Space, encouraged science education in public schools, and brought to the state nationally prominent space-race advocates such as Werner von Braun and Edward R. Murrow. </span></p></blockquote><span data-dcnode-id="1885" instrument_node="">
</span><img alt=" " class="icon" data-dcnode-id="1884" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.okhistory.org/images/publications/Chronicles027.jpg&amp;raw"><h2 data-dcnode-id="1882" id="v84"><span data-dcnode-id="1883" instrument_node=""> Volume 84, No. 1 (Sping 2006)</span></h2><span data-dcnode-id="1881" instrument_node="">
</span><p data-dcnode-id="1879"><span data-dcnode-id="1880" instrument_node="">“‘Any Woman That Could Ride a Horse Could Fly’: Dorothy K. Pressler Morgan, 1930s Oklahoma Aviatrix,” by Tally D. Fugate, 4–21</span></p><blockquote data-dcnode-id="1877"><span data-dcnode-id="1878" instrument_node="">In 1930 Dorothy Pressler Morgan became the second woman pilot licensed in Oklahoma by the U.S. Department of Commerce. The intrepid Pressler Morgan was a stunt pilot, a barn stormer, and an altitude-record setter as well as the nation’s first woman airport manager. </span></blockquote><span data-dcnode-id="1876" instrument_node="">
</span><p data-dcnode-id="1874"><span data-dcnode-id="1875" instrument_node="">“Building the Grady County Courthouse: The Public Works Administration Amidst Local Politics,” by Cynthia Savage, 22–43 </span></p><blockquote data-dcnode-id="1872"><span data-dcnode-id="1873" instrument_node="">Designed by the prestigious architectural firm of Layton, Hicks and Forsyth and completed in 1935 using monies provided by the Federal Emergency Administration of Public Works, or PWA, the Grady County Court house stands as a classic example of 1930s Art Deco architecture. </span></blockquote><span data-dcnode-id="1871" instrument_node="">
</span><p data-dcnode-id="1869"><span data-dcnode-id="1870" instrument_node="">“Capital Versus Labor in Tulsa: The Mid-Continent Refinery Strike of 1938–1940,” by Diane M. Rubey,” 44–63</span></p><blockquote data-dcnode-id="1867"><span data-dcnode-id="1868" instrument_node="">On December 22, 1938, members of the Oil Worker’s International Union, representing labor in the petroleum industry at Tulsa’s Mid-Continent Refinery, shut down the plant and walked off the job. The bitter, protracted, and occasionally violent fight involved two years of investigations and negotiations. </span></blockquote><span data-dcnode-id="1866" instrument_node="">
</span><p data-dcnode-id="1864"><span data-dcnode-id="1865" instrument_node="">“Looking for Adventure: Ponca Warriors of the Forty-fifth Infantry Division in the Korean War,” by Mark van de Logt, 64–77 </span></p><blockquote data-dcnode-id="1862"><span data-dcnode-id="1863" instrument_node="">In the summer of 1950, at the Poncas’ annual pow wow, sixteen young Ponca men signed up to serve in the Oklahoma National Guard. Their thirst for adventure led them to Louisiana and Japan before their unit, the 279th Infantry Regiment of the Forty-fifth Infantry Division, fought in Korea. </span></blockquote><span data-dcnode-id="1861" instrument_node="">
</span><p data-dcnode-id="1859"><span data-dcnode-id="1860" instrument_node="">“Heaven to Hell: Samuel Robert Cassius and Black Life in Oklahoma, 1891–1923,” by Edward J. Robinson, 78–99</span></p><blockquote data-dcnode-id="1857"><span data-dcnode-id="1858" instrument_node="">In 1891 teacher and preacher Samuel Robert Cassius came to Oklahoma Territory, believing it to be a haven of freedom and opportunity for black people. Like his hero, Booker T. Washington, he established a school. Nature and human nature conspired against Cassius, and, beset by tragedy and betrayal, he left Oklahoma in disgust in 1923.</span></blockquote><span data-dcnode-id="1856" instrument_node="">
</span><img alt=" " class="icon" data-dcnode-id="1855" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.okhistory.org/images/publications/Chronicles026.jpg&amp;raw"><h2 data-dcnode-id="1853" id="issue2005"><span data-dcnode-id="1854" instrument_node="">Volume 83, No. 4 (Winter 2005–06) </span></h2><p class="backtotop" data-dcnode-id="1850"><a data-dcnode-id="1851" href="#top"><span data-dcnode-id="1852" instrument_node="">Back to top</span></a></p><span data-dcnode-id="1849" instrument_node="">
</span><p data-dcnode-id="1847"><span data-dcnode-id="1848" instrument_node="">“Fort Sill Enters the Missile Age,” by Rich ard Lowitt, 388–431</span></p><blockquote data-dcnode-id="1845"><span data-dcnode-id="1846" instrument_node="">In the 1950s Fort Sill was designated the nation’s Artillery and Guided Missile Center as the army expanded its arsenal to include nuclear warheads and weapons of long-range accuracy. Richard Lowitt explores all sides of the controversy that developed when Fort Sill announced its plans to expand into the Wichita Mountains Wildlife Refuge and into thousands of acres under private ownership in Comanche County.</span></blockquote><span data-dcnode-id="1844" instrument_node="">
</span><p data-dcnode-id="1842"><span data-dcnode-id="1843" instrument_node="">“Jess Willard and Carl Morris: Heavyweight Boxing in Oklahoma,” by Arly Allen, 432–451</span></p><blockquote data-dcnode-id="1840"><span data-dcnode-id="1841" instrument_node="">A segregated America was outraged in 1910 when black boxer Jack Johnson defeated Jim Jeffries to capture the heavy weight championship. Promoters across the country and internationally began looking for the “Great White Hope” who would return the crown to the white race. Arly Allen focuses on the efforts of Carl Morris and Jess Willard, Oklahomans who seemingly came out of nowhere to try to “make the world right again.” </span></blockquote><span data-dcnode-id="1839" instrument_node="">
</span><p data-dcnode-id="1837"><span data-dcnode-id="1838" instrument_node="">“Missionary and Mother: Jerusha Swain’s Transformation in the Cherokee Nation, 1852–1861,” by Meg Devlin O’Sullivan, 452–465</span></p><blockquote data-dcnode-id="1835"><span data-dcnode-id="1836" instrument_node="">In the early 1850s Jerusha Swain left her New Eng land home to serve as missionary teacher and surrogate mother at Dwight Mission in the Cherokee Nation, a tenure marked by isolation and challenge. Meg Devlin O’Sullivan examines Swain’s life at Dwight to show that she not only found new opportunities for independence but also trans formation in her conceptions of race.</span></blockquote><span data-dcnode-id="1834" instrument_node="">
</span><p data-dcnode-id="1832"><span data-dcnode-id="1833" instrument_node="">“Businessman or Rogue?: C. C. Julian in the Oklahoma Oil Fields,” by William H. Mullins, 466–489 </span></p><blockquote data-dcnode-id="1830"><span data-dcnode-id="1831" instrument_node="">After a measure of success as an oil promoter in California, C. C. Julian moved his operation to Oklahoma in 1929 shortly after the booming Oklahoma City field opened. William Mullins follows the trail of a flamboyant man who soon be came embroiled in the pro-ration controversy and more serious charges of reloading, mail and investor fraud, bankruptcy, and flight from justice.</span></blockquote><span data-dcnode-id="1829" instrument_node="">
</span><p data-dcnode-id="1827"><span data-dcnode-id="1828" instrument_node="">“‘Beef Instead of Bayonets’: Cultural Mores and the Failure of Assimilation on the Kiowa-Comanche Reservation,” by Todd Leahy, 490–499</span></p><blockquote data-dcnode-id="1825"><span data-dcnode-id="1826" instrument_node="">The federal government attempted many programs to assimilate American Indians but met resistance on most fronts because Indian culture was not easily subsumed. Todd Leahy describes the efforts of agents and army officials to establish Indian-operated cattle ranching among the Kiowas and Comanches, who proved unwilling to give up certain aspects of their culture.</span></blockquote><span data-dcnode-id="1824" instrument_node="">
</span><img alt=" " class="icon" data-dcnode-id="1823" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.okhistory.org/images/publications/Chronicles025.jpg&amp;raw"><h2 data-dcnode-id="1821"><span data-dcnode-id="1822" instrument_node="">Volume 83, No. 3 (Fall 2005)</span></h2><span data-dcnode-id="1820" instrument_node="">
</span><p data-dcnode-id="1818"><span data-dcnode-id="1819" instrument_node="">“Remembering an Exceptional Team: Jerome Tiger and Nettie Wheeler,” by Peggy Tiger, 260–283 </span></p><blockquote data-dcnode-id="1814"><span data-dcnode-id="1817" instrument_node="">
</span><p data-dcnode-id="1815"><span data-dcnode-id="1816" instrument_node="">Creek artist Jerome Tiger electrified the art world in the 1960s with his colorful, emotional paintings. Discovered by art collector Nettie Wheeler of Muskogee, Tiger grew to rely on Wheeler to guide his career before his untimely death at twenty-six. Tiger’s widow Peggy Tiger recounts the unique relationship that nurtured and preserved the work of this important artist. </span></p></blockquote><span data-dcnode-id="1813" instrument_node="">
</span><p data-dcnode-id="1811"><span data-dcnode-id="1812" instrument_node="">“From Menagerie to Modern Zoo: Nature, Society, and the Beginning of the Oklahoma City Zoo,” by S. Matthew Despain, 284–307 </span></p><blockquote data-dcnode-id="1809"><span data-dcnode-id="1810" instrument_node="">The Oklahoma City Zoo had its beginning at Wheeler Park in the southwest section of the city in 1903. In its early years, it evolved with the growing city as part of the back-to-nature movement. Matthew Despain explores the zoo’s first decades, its place in Oklahoma City and the region, the events that forced its relocation, and how zoos in general reflect the societies that create them. </span></blockquote><span data-dcnode-id="1808" instrument_node="">
</span><p data-dcnode-id="1806"><span data-dcnode-id="1807" instrument_node="">“‘We Bind Our selves Together’: A History of the Oklahoma Student Librarians Association,” by Jeffrey M. Wilhite, 308–325</span></p><blockquote data-dcnode-id="1804"><span data-dcnode-id="1805" instrument_node="">Over a period of about forty years in mid-twentieth century, student library clubs flourished across the United States. Jeffrey Wilhite pro vides a thorough discussion of the Oklahoma Student Librarians Association, as it brought recognition to students and libraries, provided training in the workings of a library, and promoted interest in the field of librarianship.</span></blockquote><span data-dcnode-id="1803" instrument_node="">
</span><p data-dcnode-id="1801"><span data-dcnode-id="1802" instrument_node="">“The Land Is Al ways With Us”: Removal, Allotment, and Industrial Development and Their Effects on Ponca Tribalism,” by Mark van de Logt, 326–341</span></p><blockquote data-dcnode-id="1799"><span data-dcnode-id="1800" instrument_node="">Over centuries the Ponca Indians identified closely with the land; it sustained them physically and spiritually. However, three major developments threatened the very essence of Ponca life and tribalism. Mark van de Logt examines the effects of removal in 1877, allotment in the 1890s, and the development of the oil and gas industry on Ponca land in the twentieth century. </span></blockquote><span data-dcnode-id="1798" instrument_node="">
</span><p data-dcnode-id="1796"><span data-dcnode-id="1797" instrument_node="">“Lela L. Barnett: An Oklahoma WAC in World War II Italy,” by Ralph Gregory Beil, 342-361</span></p><blockquote data-dcnode-id="1794"><span data-dcnode-id="1795" instrument_node="">Lela Barnett grew up in north western Oklahoma and in Oklahoma City, but the most remarkable chapter of her life took place in Italy as one of the first members of the Women’s Army Corps during World War II. Drawing from the more than 300 letters she wrote to her mother, Barnett’s nephew Ralph Gregory Beil reconstructs the adventures of an Oklahoma girl in service to her country and the free world. </span></blockquote><span data-dcnode-id="1793" instrument_node="">
</span><img alt=" " class="icon" data-dcnode-id="1792" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.okhistory.org/images/publications/Chronicles024.jpg&amp;raw"><h2 data-dcnode-id="1790"><span data-dcnode-id="1791" instrument_node="">Volume 83, No. 2 (Summer 2005)</span></h2><span data-dcnode-id="1789" instrument_node="">
</span><p data-dcnode-id="1787"><span data-dcnode-id="1788" instrument_node="">“Change the Stars: The Story of the Youngblood Hotel of Enid, Oklahoma,” by Jennifer Jones, 132–143</span></p><blockquote data-dcnode-id="1785"><span data-dcnode-id="1786" instrument_node="">For several decades the Youngblood Hotel was a beacon for travelers to and through Enid, as its stylish decor and amenities provided luxurious comforts to guests. Jennifer Jones relates the story of the hotel’s builders, Lawrence S. Youngblood and his partners, the lavish interiors, and the causes of its decline and eventual rehabilitation as an office building.</span></blockquote><span data-dcnode-id="1784" instrument_node="">
</span><p data-dcnode-id="1782"><span data-dcnode-id="1783" instrument_node="">“Origins and Development of State Politics: The Oklahoma Territorial Legislature, 1890–1905,” by R. Darcy, 144–177</span></p><blockquote data-dcnode-id="1780"><span data-dcnode-id="1781" instrument_node="">Operating for a period of seventeen years, the Oklahoma territorial legislatures created the framework for much of the legal and administrative structure inherited by the state in 1907. Recognizing the lack of a comprehensive, accurate account of the legislators and their politics, R. Darcy provides a meticulous documentation of the complex makeup of the assembles.</span></blockquote><span data-dcnode-id="1779" instrument_node="">
</span><p data-dcnode-id="1777"><span data-dcnode-id="1778" instrument_node="">“The ‘Come-As-You-Are’ War: Fort Sill and the Persian Gulf Crisis of 1990–1991,” by Boyd L. Dastrup, 178–193</span></p><blockquote data-dcnode-id="1775"><span data-dcnode-id="1776" instrument_node="">Fort Sill played a key role in the large mobilization of American military forces in 1990–1991 during Operations Desert Shield and Desert Storm. Post historian Boyd Dastrup explains how army officials and soldiers at all levels had to adjust rapidly and effectively to constantly changing circumstances and demands, while meeting daily operational requirements at the same time.</span></blockquote><span data-dcnode-id="1774" instrument_node="">
</span><p data-dcnode-id="1772"><span data-dcnode-id="1773" instrument_node="">“‘The Indian Home is Undone’: Anglo Intrusion, Colonization, and the Creek Nation, 1867–1907,” by Douglas A. Hurt, 194–217</span></p><blockquote data-dcnode-id="1770"><span data-dcnode-id="1771" instrument_node="">In the nineteenth century Native Americans in the Indian Territory faced dispossession, forced re-settlement, and interference in tribal customs and politics. Douglas Hurt explores the case of the Creek Nation as its members dealt with Anglo intrusion and colonization through resistance, modification, and development of a sense of place centered on community and ceremonies.</span></blockquote><span data-dcnode-id="1769" instrument_node="">
</span><p data-dcnode-id="1767"><span data-dcnode-id="1768" instrument_node="">“A Strong and Sturdy Vessel: A History of Bristow Junior College,” by Letha Caudle, 218–231</span></p><blockquote data-dcnode-id="1765"><span data-dcnode-id="1766" instrument_node="">Between 1928 and 1951 Bristow Junior College operated within the Bristow Public Schools System through the efforts of a dedicated and well-educated faculty and a supportive community. Letha Caudle examines the founding of the institution, its leaders and teachers, and a curriculum that provided career development for hundreds of students. </span></blockquote><span data-dcnode-id="1764" instrument_node="">
</span><img alt=" " class="icon" data-dcnode-id="1763" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.okhistory.org/images/publications/Chronicles023.jpg&amp;raw"><h2 data-dcnode-id="1761" id="v83"><span data-dcnode-id="1762" instrument_node="">Volume 83, No. 1 (Sping 2005)</span></h2><span data-dcnode-id="1760" instrument_node="">
</span><p data-dcnode-id="1758"><span data-dcnode-id="1759" instrument_node="">“National Liberal, Hometown Radical, and New Populist Politician: The Life of Fred Harris,” by Amy L. Scott, 4–33</span></p><blockquote data-dcnode-id="1756"><span data-dcnode-id="1757" instrument_node="">Growing up on a dry-land farm in southwestern Oklahoma, young Fred Harris determined early on to escape and to make something of himself. That he has done in three successive careers—lawyer, politician, and professor. Amy Scott explores Harris’s life and the personal and professional journey that transformed him from a liberal to a New Populist politician.</span></blockquote><span data-dcnode-id="1755" instrument_node="">
</span><p data-dcnode-id="1753"><span data-dcnode-id="1754" instrument_node="">“An Indian Shall Not Spill an Indian’s Blood;’: The Confederate-Indian Conference at Camp Napoleon, 1865,” by Brad R. Clampitt, 34–53</span></p><blockquote data-dcnode-id="1751"><span data-dcnode-id="1752" instrument_node="">As the Civil War drew to a close, the Five Civilized Tribes, most of them allies of the Confederacy, realized that as a matter of self-preservation they had to negotiate separate surrender agreements and make peace with the several Plains tribes. Brad Clampitt provides a thorough discussion of their efforts undertaken during one of the largest intertribal gatherings in Indian Territory.</span></blockquote><span data-dcnode-id="1750" instrument_node="">
</span><p data-dcnode-id="1748"><span data-dcnode-id="1749" instrument_node="">“Alex Howat versus John Wilkinson: Power, Personality, and Ideological Battles in the United Mine Workers,” by Steven L. Sewell, 54–67</span></p><blockquote data-dcnode-id="1746"><span data-dcnode-id="1747" instrument_node="">As the United Mine Workers prepared to strike in 1922, Oklahoma became a stage for the factional in-fighting that tore apart the union’s solidarity. Steven Sewell examines the ideological battle that pitted craft unionists against socialists, a struggle in Oklahoma that starred John Wilkinson and “renegade radical” Alex Howat and featured an appearance by Oscar Ameringer.</span></blockquote><span data-dcnode-id="1745" instrument_node="">
</span><p data-dcnode-id="1743"><span data-dcnode-id="1744" instrument_node="">“Researching Tom Joad: John Steinbeck, Journalist, 1936,” by Paul Bailey, 68–83</span></p><blockquote data-dcnode-id="1741"><span data-dcnode-id="1742" instrument_node="">Tom Joad, dispossessed Okies, and The Grapes of Wrath are forever etched in the canon of American literature and in the hearts and minds of Oklahomans. John Steinbeck compiled material for his fictional portrayal of migrant farm workers during an assignment for a California newspaper. Paul Bailey travels back in time to accompany the journalist as he created public awareness of a real crisis and found inspiration for his greatest literary work.</span></blockquote><span data-dcnode-id="1740" instrument_node="">
</span><img alt=" " class="icon" data-dcnode-id="1739" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.okhistory.org/images/publications/Chronicles022.jpg&amp;raw"><span data-dcnode-id="1738" instrument_node="">
</span><h2 data-dcnode-id="1736" id="issue2004"><span data-dcnode-id="1737" instrument_node="">Volume 82, No. 4 (Winter 2004–05) </span></h2><p class="backtotop" data-dcnode-id="1733"><a data-dcnode-id="1734" href="#top"><span data-dcnode-id="1735" instrument_node="">Back to top</span></a></p><span data-dcnode-id="1732" instrument_node="">
</span><p data-dcnode-id="1730"><span data-dcnode-id="1731" instrument_node="">“Socialism from the Bottom Up: Local Activists and the Socialist Party of Oklahoma, 1900–1920,” by Jim Bissett, 388–411</span></p><blockquote data-dcnode-id="1728"><span data-dcnode-id="1729" instrument_node=""> A century ago, the Socialist Party of Oklahoma ranked among the top three in the nation. Most studies of the party have focused on generalizations and
 state-level organization, but it was the local activists who gave the party its strength and changed the balance of power in Oklahoma politics through two
 difficult decades. Using information found in socialist newspapers and the manuscript census, Jim Bissett uncovers the lives and experiences of local party
 members with a focus on Marshall and Roger Mills Counties. </span></blockquote><span data-dcnode-id="1727" instrument_node="">
</span><p data-dcnode-id="1725"><span data-dcnode-id="1726" instrument_node="">“In Defense of Sovereignty: Cherokee Soldiers, White Officers, and Discipline in the Third Indian Home Guard,” by Trevor Jones, 412–427</span></p><blockquote data-dcnode-id="1723"><span data-dcnode-id="1724" instrument_node="">During the Civil War, Cherokees loyal to Chief John Ross joined the Union army to reconquer the Cherokee Nation from the Confederate forces of Stand
 Watie and reestablish what they saw as the legitimate Cherokee government. Although white officers filled the highest ranks of command, Cherokee officers
 and soldiers modified the military system to fit their own needs. Trevor Jones explores the ways in which Cherokees managed discipline in the Third Indian
 Home Guard to achieve their ultimate goal of sovereignty.</span></blockquote><span data-dcnode-id="1722" instrument_node="">
</span><p data-dcnode-id="1720"><span data-dcnode-id="1721" instrument_node="">“Dr. Anna Lewis: Historian at the Oklahoma College for Women,” by Linda Reese, 428–449</span></p><blockquote data-dcnode-id="1718"><span data-dcnode-id="1719" instrument_node="">Angie Debo and Muriel Wright stand as the two most recognizable women historians in the state of Oklahoma. However, neither of them held a long-term
 association with an institution of higher learning. That distinction belongs to Dr. Anna Lewis, who enjoyed a long and stellar career at the Oklahoma College for
 Women but whose accomplishments have been overlooked. Linda Reese corrects the record with an account of Lewis’s life as she struggled to obtain the
 terminal degree in history, build a sound academic program at the college, and teach and write about Oklahoma history. </span></blockquote><span data-dcnode-id="1717" instrument_node="">
</span><p data-dcnode-id="1715"><span data-dcnode-id="1716" instrument_node="">“The Sexual Color Line in Red and Black: Antimiscegenation and the Sooner State,” by Charles F. Robinson II, 450–475</span></p><blockquote data-dcnode-id="1713"><span data-dcnode-id="1714" instrument_node="">Throughout much of its history, the state of Oklahoma enacted legislation that mandated some form of sexual separateness between the races. However,
 interracial couples openly defied the law and officials spent little effort in enforcement. After providing an overview of antimiscegenation laws dating from
 the time of slavery into the statehood period, Charles Robinson examines the eleven cases that reached the highest state or the federal courts, most of them
 civil cases involving blacks and Indians. </span></blockquote><span data-dcnode-id="1712" instrument_node="">
</span><p data-dcnode-id="1710"><span data-dcnode-id="1711" instrument_node="">“Jack C. Montgomery: A Little Big Man,” by Christopher B. Bean, 476–495

</span></p><blockquote data-dcnode-id="1708"><span data-dcnode-id="1709" instrument_node="">American Indians served with distinction during World War II and in greater
 proportion to their numbers than the general population. Among them, two
 Oklahomans, Jack C. Montgomery and Ernest Childers, received the Medal of
 Honor for their actions during the war. Realizing that many Oklahomans have
 overlooked or are unaware of their important contributions, Christopher Bean
 documents Jack Montgomery’s life before and after the war and recalls his
 service with the Forty-fifth Infantry Division and the campaigns in which he took
 part. </span></blockquote><span data-dcnode-id="1707" instrument_node="">
</span><img alt=" " class="icon" data-dcnode-id="1706" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.okhistory.org/images/publications/Chronicles021.jpg&amp;raw"><h2 data-dcnode-id="1704"><span data-dcnode-id="1705" instrument_node="">Volume 82, No. 3 (Fall 2004)</span></h2><span data-dcnode-id="1703" instrument_node="">
</span><p data-dcnode-id="1701"><span data-dcnode-id="1702" instrument_node="">“‘A Model Fruit Ranch’: The Housholder Fruit Farm of Guthrie, Oklahoma,” by Joe G. Bax, 260–299</span></p><blockquote data-dcnode-id="1699"><span data-dcnode-id="1700" instrument_node="">Thousands of land seekers arrived in Guthrie on April 22, 1889, among them
 Frank Housholder and his four-year-old son, Glen Dana. Their efforts to find a
 homestead and make a living in the new land eventually resulted in the
 Housholder Fruit Farm, one of the largest fruit-growing businesses in the state.
 Joe Bax, Glen Housholder’s grandson, provides a loving portrait and a poignant
 tale of the family’s tremendous successes amid struggles against railroads,
 commission merchants, and Oklahoma’s sometime fickle weather. </span></blockquote><span data-dcnode-id="1698" instrument_node="">
</span><p data-dcnode-id="1696"><span data-dcnode-id="1697" instrument_node="">“‘Stand Fast’: The Story of Surry Eaton ‘White Sut’ Beck,” by Pamela White, 300–325</span></p><blockquote data-dcnode-id="1694"><span data-dcnode-id="1695" instrument_node=""> White Sut Beck’s place in history has been defined by what came to be known
 as the Going Snake massacre, a shoot-out during the 1872 trail of Zeke Proctor
 for the murder of Beck’s sister. In truth, White Sut lived a full life of adventure
 and service to his family, his community, and the Cherokee Nation. Beck’s
 great-granddaughter, Pamela White, examines Beck’s life as soldier, husband
 and father, deputy sheriff and solicitor of Delaware District, and defender of
 Cherokee sovereignty and traditions during particularly troublesome times in the
 Cherokee Nation. </span></blockquote><span data-dcnode-id="1693" instrument_node="">
</span><p data-dcnode-id="1691"><span data-dcnode-id="1692" instrument_node="">“‘Your Enemies May Attract Unwanted Friends’: Gerald L. K. Smith, Patrick Hurley, and the 1948 New Mexico Senate Race,” by Russell D. Buhite, 326–341</span></p><blockquote data-dcnode-id="1689"><span data-dcnode-id="1690" instrument_node="">In the mid-twentieth century, several individuals rose to prominence on the
 fringes of American political life through demagogic behavior or force of
 personality. Gerald L. K. Smith became one of the best known, for the
 viciousness of his views, his bigotry, and his extremism. Russell Buhite explores
 Smith’s intrusion into the 1948 United States Senate race in New Mexico, in
 which native Oklahoman Patrick J. Hurley was the Republican candidate. At
 the same time, he illuminated Hurley’s post-World War II behavior and
 anti-Zionism.</span></blockquote><span data-dcnode-id="1688" instrument_node="">
</span><p data-dcnode-id="1686"><span data-dcnode-id="1687" instrument_node="">“The National Register of Historic Places and St. Paul Baptist Church and Cemetery: The 1,000th Listing in Oklahoma,” by Cynthia Savage, 342–351</span></p><blockquote data-dcnode-id="1684"><span data-dcnode-id="1685" instrument_node="">In the fall of 2002, the Oklahoma State Historic Preservation Office achieved
 the goal of listing the 1,000th Oklahoma property on the National Register of
 Historic Places—St. Paul Baptist Church and Cemetery in Lincoln County.
 Cynthia Savage explains the process of listing properties on the Register, then
 describes the history of an African-American community in Oklahoma as it
 established and exercised control over the one area of its life unaffected by
 segregation, the practice of religion. </span></blockquote><span data-dcnode-id="1683" instrument_node="">
</span><p data-dcnode-id="1681"><span data-dcnode-id="1682" instrument_node="">“Tulsa (1949) as an Oil Field Film: A Study in Ecological Ambivalence,” by Peter C. Rollins, 352–368</span></p><blockquote data-dcnode-id="1679"><span data-dcnode-id="1680" instrument_node="">Americans have always displayed a degree of ambivalence about technological
 development, believing in progress on the one hand and exhibiting deep anxiety
 about despoiling “nature’s garden” on the other. American writers, artists,
 historians, and others have all warned about the dangers of industrial growth at
 the expense of nature. Using the 1949 oil field film, Tulsa, as an example, Peter
 C. Rollins reveals Hollywood’s take on that dynamic—celebrating the oil
 industry’s rewards while chastising those driven by market forces alone. </span></blockquote><span data-dcnode-id="1678" instrument_node="">
</span><img alt=" " class="icon" data-dcnode-id="1677" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.okhistory.org/images/publications/Chronicles019.jpg&amp;raw"><h2 data-dcnode-id="1675"><span data-dcnode-id="1676" instrument_node="">Volume 82, No. 2 (Summer 2004)</span></h2><span data-dcnode-id="1674" instrument_node="">
</span><p data-dcnode-id="1672"><span data-dcnode-id="1673" instrument_node="">“‘No Home on the Range’: The Miller Family’s Great Swindle of Indian Lands,” by Jo L. Wetherilt Behrens, 132–167</span></p><blockquote data-dcnode-id="1670"><span data-dcnode-id="1671" instrument_node="">Following the Civil War, the grasslands of the Cherokee Outlet provided a lush
 pasture for longhorns driven north from Texas to Kansas railheads. When the
 government later moved smaller tribes to the Outlet and provided for the leasing
 of their land, greedy entrepreneurs found ways to acquire the land to the
 detriment of the Indians. In a convincing indictment of the owners of the 101
 Ranch and a government that ignore the Indians’ welfare, Jo Behrens follows a
 shadowy paper trail through evidence of fraud and manipulation. </span></blockquote><span data-dcnode-id="1669" instrument_node="">
</span><p data-dcnode-id="1667"><span data-dcnode-id="1668" instrument_node="">“‘This is Not United States Currency’: Oklahoma’s Emergency Scrip Issues during the Banking Crisis of 1933,” by Loren Gatch, 168–199

</span></p><blockquote data-dcnode-id="1665"><span data-dcnode-id="1666" instrument_node=""> During the Great Depression, enterprising communities and business leaders
 experimented with various kinds of local currency to meet the demands for
 solvency. In the state of Oklahoma during the banking holiday of 1933, issues of
 emergency scrip helped residents, retailers, and governmental entities meet the
 payroll, feed the family, and regain confidence. Loren Gatch details the
 arrangements established in seven Oklahoma communities and places them with
 the broader setting of the state’s response to the crisis. </span></blockquote><span data-dcnode-id="1664" instrument_node="">
</span><p data-dcnode-id="1662"><span data-dcnode-id="1663" instrument_node="">“Where Angels Belong: The Oklahoma Antisuffrage Movement,” by Tally Fugate, 200–221</span></p><blockquote data-dcnode-id="1660"><span data-dcnode-id="1661" instrument_node="">The women’s suffrage issue reached Oklahoma in 1907 when delegates met to
 write a constitution for the new state. Following arduous debate, antisuffragists
 and others successfully defeated an amendment to extend the vote to women,
 and “antis” continued the fight when the national women’s suffrage movement
 gained momentum after World War I. Recognizing that most scholarly attention
 has focused on those who favored women’s suffrage, Tally Fugate offers a
 thoughtful study of the Oklahoma antisuffrage movement and the key players
 who worked to keep women “in the place.” </span></blockquote><span data-dcnode-id="1659" instrument_node="">
</span><p data-dcnode-id="1657"><span data-dcnode-id="1658" instrument_node="">“Black, White, and Read: The Muskogee Daily Phoenix’s Coverage of the Sequoyah Statehood Convention of 1905,” by Richard Mize, 222–239</span></p><blockquote data-dcnode-id="1655"><span data-dcnode-id="1656" instrument_node="">In 1905 leaders of the Five Civilized Tribes convened to write a constitution for
 the proposed State of Sequoyah, a single state separate from Oklahoma
 Territory. The Sequoyah Statehood Convention garnered national attention, but
 historians generally have provided no detailed study of its work. Richard Mize
 combs the pages of the Muskogee Daily Phoenix to reconstruct the historic
 convention and to shed light on the interpretation the newspaper’s white editor
 gave to the proceedings. </span></blockquote><span data-dcnode-id="1654" instrument_node="">
</span><img alt=" " class="icon" data-dcnode-id="1653" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.okhistory.org/images/publications/Chronicles018.jpg&amp;raw"><h2 data-dcnode-id="1651" id="v82"><span data-dcnode-id="1652" instrument_node="">Volume 82, No. 1 (Sping 2004)</span></h2><span data-dcnode-id="1650" instrument_node="">
</span><p data-dcnode-id="1648"><span data-dcnode-id="1649" instrument_node="">“Saving the Land: Soil and Water Conservation in Oklahoma,” by D. Chongo Mundende, 4–31</span></p><blockquote data-dcnode-id="1646"><span data-dcnode-id="1647" instrument_node="">Over many years, Oklahoma has experienced a wide variety of climate-related
 problems—bare soils and dust storms, uncontrolled runoff, soil erosion, and
 floods. From those harsh lessons of history, the federal and state governments,
 working in cooperation with the farmers and ranchers of Oklahoma, have
 instituted a number of practices designed to save the precious resources of soil
 and water. Chongo Mundende describes the history and establishment of those
 programs in the context of their times and explains why Oklahoma’s story is the
 story of conservation in the nation. </span></blockquote><span data-dcnode-id="1645" instrument_node="">
</span><p data-dcnode-id="1643"><span data-dcnode-id="1644" instrument_node="">“Oklahoma’s ‘First Black Governor’: Dr. Isaac William Young,” by Cecelia Brooks, 32–63</span></p><blockquote data-dcnode-id="1641"><span data-dcnode-id="1642" instrument_node="">In 1911 a prominent and wealthy African-American physician from Louisiana,
 Dr. Isaac William Young, moved to Oklahoma to begin a new life. After making
 numerous progressive contributions to the small all-black town of Boley, Young
 moved to Oklahoma City and eventually entered politics working the mayoral
 and gubernatorial campaigns of Democrat John C. Walton. Cecelia Brooks
 explores Young’s appointment to the presidency of the Colored Agricultural and
 Normal University at Langston and how he used his powerful position to
 become the state’s “first black governor.” </span></blockquote><span data-dcnode-id="1640" instrument_node="">
</span><p data-dcnode-id="1638"><span data-dcnode-id="1639" instrument_node="">“Moses or Aaron?: William Jennings Bryan and Oklahoma Politics,” by Danny M. Adkison, 64–81</span></p><blockquote data-dcnode-id="1636"><span data-dcnode-id="1637" instrument_node="">As Oklahoma prepared for statehood in the early twentieth century, it seemed 
 to adopt Nebraska politician William Jennings Bryan as one of its own, and
 historians have generally accepted that Bryan had a strong and direct influence
 on the state constitution. In exploring the relationship between the two, Danny
 Adkison asks if Bryan served as Moses to lead Oklahoma to accept his favorite
 policies, or if Oklahoma used the eloquent Bryan as an Aaron to give voice to its
 own agenda. </span></blockquote><span data-dcnode-id="1635" instrument_node="">
</span><p data-dcnode-id="1633"><span data-dcnode-id="1634" instrument_node="">“The Tale of Sergeant Webber: Nativism in Northern Oklahoma in 1923,” by Jim Showalter, 82–99</span></p><blockquote data-dcnode-id="1631"><span data-dcnode-id="1632" instrument_node="">In the early 1920s the Ku Klux Klan enjoyed a resurgence in popularity in
 Oklahoma. Nowhere was that more evident than in Payne County, where the
 Klan appeared parades, held grand initiations, and boasted a membership of
 1,800. Jim Showalter examines Klan activity and the career of one Sergeant
 Webber to conclude that the Klan was popular because its ideas were
 recognizable and already wide held, there was a general “joining frenzy” in the
 area, and the Klan produced great spectacles. </span></blockquote><span data-dcnode-id="1630" instrument_node="">
</span><p data-dcnode-id="1627"><span data-dcnode-id="1629" instrument_node="">“A Final Historical Footnote to the Life of Territorial Secretary Robert Martin,” by Robert L. Chada, 102–105 

</span><img alt=" " class="icon" data-dcnode-id="1628" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.okhistory.org/images/publications/Chronicles017.jpg&amp;raw"></p><h2 data-dcnode-id="1625" id="issue2003"><span data-dcnode-id="1626" instrument_node="">Volume 81, No. 4 (Winter 2003–04) </span></h2><p class="backtotop" data-dcnode-id="1622"><a data-dcnode-id="1623" href="#top"><span data-dcnode-id="1624" instrument_node="">Back to top</span></a></p><span data-dcnode-id="1621" instrument_node="">
</span><p data-dcnode-id="1619"><span data-dcnode-id="1620" instrument_node="">“Tea Kettle on a Raft: A History of Navigation on the Upper Red River,” by Keith Tolman, 388–435</span></p><blockquote data-dcnode-id="1617"><span data-dcnode-id="1618" instrument_node="">Few people appreciate the significant role of riverine navigation in the
 development of the state of Oklahoma. Keith Tolman provides a comprehensive
 account of steamboating on the Upper Red River, a sometimes temperamental
 stream that was closed for decades by the Great Raft, but that nonetheless
 bound together diverse peoples, cultures, and economies.</span></blockquote><span data-dcnode-id="1616" instrument_node="">
</span><p data-dcnode-id="1614"><span data-dcnode-id="1615" instrument_node="">“‘And The Skies Are Not Cloudy All Day’: Drought and the Cherokee Outlet Land Run,” by Kevin Z. Sweeney, 436–457</span></p><blockquote data-dcnode-id="1612"><span data-dcnode-id="1613" instrument_node="">For many home seekers, the late-season date for the opening of the Cherokee
 Outlet in 1893 coincided with a major drought on the Southern Plains.
 Moreover, other environmental and economic factors contributed to their
 success or failure. Kevin Sweeney focuses on the difficulties settlers faced and
 how they coped with adverse conditions in the various sections of the Outlet. </span></blockquote><span data-dcnode-id="1611" instrument_node="">
</span><p data-dcnode-id="1609"><span data-dcnode-id="1610" instrument_node="">“‘United With Use to Rescue the Kiowas’: The Five Civilized Tribes and Warfare on the Southern Plains,” by Andrew Denson, 458–479</span></p><blockquote data-dcnode-id="1607"><span data-dcnode-id="1608" instrument_node=""> In the early 1870s a delegation from the Five Civilized Tribes met with
 representatives of Southern Plains tribes in an attempt to ease longstanding
 tensions between the tribes and the United States government. Andrew Denson
 reconstructs the efforts of the Indian Peace Commission to find an alternative
 Indian affairs in a semi-independent, multi-tribal confederation. </span></blockquote><span data-dcnode-id="1606" instrument_node="">
</span><p data-dcnode-id="1604"><span data-dcnode-id="1605" instrument_node="">“Mehan Memories: A Croquet Diamond was the Social Center,” by D. Earl Newsom, 480–491</span></p><blockquote data-dcnode-id="1602"><span data-dcnode-id="1603" instrument_node="">Founded near the turn of the twentieth century, Mehan remained a small, quiet
 village until an oil boom brought an influx of people to Payne County in the
 1920s. Prosperity lasted only until the 1950s, however, when population loss, 
 a devastating flood, and the loss of the railroad initiated Mehan’s decline. Earl
 Newsom describes the town’s history, its founding families and businesses, and
 the town’s unique social center—a croquet field. </span></blockquote><span data-dcnode-id="1601" instrument_node="">
</span><p data-dcnode-id="1599"><span data-dcnode-id="1600" instrument_node="">“The Choctaw Chief’s House: Oral Tradition and Historical Inaccuracies,” by Louis Coleman, 492–501</span></p><blockquote data-dcnode-id="1597"><span data-dcnode-id="1598" instrument_node=""> For decades, the “Choctaw Chief’s House” near Swink has been touted as the
 home built for Chief Thomas LeFlore under an 1830 treaty. Louis Coleman
 introduces credible witness reports and documentary evidence, including
 construction specifications, to support his conclusion that LeFlore’s house near
 Wheelock Mission was the structure built according to the treaty. </span></blockquote><span data-dcnode-id="1596" instrument_node="">
</span><img alt=" " class="icon" data-dcnode-id="1595" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.okhistory.org/images/publications/Chronicles002.jpg&amp;raw"><h2 data-dcnode-id="1593"><span data-dcnode-id="1594" instrument_node="">Volume 81, No. 3 (Fall 2003)</span></h2><span data-dcnode-id="1592" instrument_node="">
</span><p data-dcnode-id="1590"><span data-dcnode-id="1591" instrument_node="">“George Catlin and Archaeology: Data Drawn from the Canvas,” by Cinnamon Catlin-Legutko, 260–273</span></p><blockquote data-dcnode-id="1588"><span data-dcnode-id="1589" instrument_node="">Archaeologists traditionally use a variety of artifacts and documents to interpret
 historic occupations. However, non-textual and non-artifactual materials also
 may contribute to the analysis. Comparing the paintings of George Catlin to
 objects recovered from several sites, Cinnamon Catlin-Legutko seeks answers
 to questions regarding gender and acculturation among American Indians during
 the removal period. </span></blockquote><span data-dcnode-id="1587" instrument_node="">
</span><p data-dcnode-id="1585"><span data-dcnode-id="1586" instrument_node="">“The Trials of Will Johnson: Race-blind Justice in the First Year of Oklahoma Statehood,” by Thomas Hedglen, 274–297</span></p><blockquote data-dcnode-id="1583"><span data-dcnode-id="1584" instrument_node="">In 1907 race relations in Oklahoma were in a state of flux from the nearly equal
 status of African Americans during the territorial period to the more rigidly
 defined era of Jim Crow after statehood. In the benchmark case of Will
 Johnson, a black man executed in 1908 for the murder of a white woman,
 Thomas Hedglen explores how well justice and the highest ideals of society
 were served. </span></blockquote><span data-dcnode-id="1582" instrument_node="">
</span><p data-dcnode-id="1580"><span data-dcnode-id="1581" instrument_node="">“The Poor Red Man and the Great Father: Choctaw Rhetoric, 1540–1860,” by Stephen P. Van Hoak, 298–315</span></p><blockquote data-dcnode-id="1578"><span data-dcnode-id="1579" instrument_node="">Some historians have asserted that, in the years after contact, Choctaws
 became increasingly dependent upon Euro-Americans. Stephen Van Hoak
 closely examines the speeches of Choctaw leaders in the post-contact era to
 show that the Choctaws used a diplomatic language that was rhetorical rather
 than reflective of their actual condition. </span></blockquote><span data-dcnode-id="1577" instrument_node="">
</span><p data-dcnode-id="1575"><span data-dcnode-id="1576" instrument_node="">“From Tramp Reporting to Pulitzer Prize: Enid’s Own Marquis James,” by Paul S. Vickery, 316–333</span></p><blockquote data-dcnode-id="1573"><span data-dcnode-id="1574" instrument_node="">Marquis James grew up in and around Enid, moved out into the world as a
 tramp reporter, and eventually found his calling writing historical biographies.
 Paul Vickery provides a fascinating account of a man who found his muse in the
 Cherokee Strip and produced a body of work that garnered him worldwide
 acclaim and two Pulitzer Prizes. </span></blockquote><span data-dcnode-id="1572" instrument_node="">
</span><p data-dcnode-id="1570"><span data-dcnode-id="1571" instrument_node="">“‘She Would Raise Hens to Aid War’: The Contributions of Oklahoma Women during World War I,” by Melanie Rich, 334–355</span></p><blockquote data-dcnode-id="1568"><span data-dcnode-id="1569" instrument_node="">When historians write about great wars, they often record only the actions of
 men, leaving women completely out of the picture. However, women’s
 contributions and achievements have often equaled those of men. Melanie Rich
 recounts the activities of Oklahoma women, often outside the domestic sphere,
 and the sacrifices they made to win a world war.</span></blockquote><span data-dcnode-id="1567" instrument_node="">
</span><img alt=" " class="icon" data-dcnode-id="1566" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.okhistory.org/images/publications/Chronicles032.jpg&amp;raw"><h2 data-dcnode-id="1564"><span data-dcnode-id="1565" instrument_node="">Volume 81, No. 2 (Summer 2003)</span></h2><span data-dcnode-id="1563" instrument_node="">
</span><p data-dcnode-id="1561"><span data-dcnode-id="1562" instrument_node="">“Did They Really Sing Opera in the Opera Houses?: Public Entertainment in Oklahoma and Indian Territories, 1895–1907,” by Susan Booker, 132–153</span></p><blockquote data-dcnode-id="1559"><span data-dcnode-id="1560" instrument_node=""> In the territorial period in cities and towns across Oklahoma and Indian
 Territories, citizens constructed spaces large and small as venues for public
 entertainment. Some were specially designed grand “opera houses,” while 
 others were simply upper-floor spaces above retail establishments. Susan
 Booker examines a variety of historical records to discover the types of
 structures Oklahomans built, the kinds of entertainment they enjoyed, and
 how these activities help spread popular culture to the hinterland. </span></blockquote><span data-dcnode-id="1558" instrument_node="">
</span><p data-dcnode-id="1556"><span data-dcnode-id="1557" instrument_node="">“‘The Lost Shepherds’: Methodist Missionaries among the Ponca Indian Tribe of Oklahoma, 1888–1940,” by Mark van de Logt, 154–171</span></p><blockquote data-dcnode-id="1554"><span data-dcnode-id="1555" instrument_node="">The agents to the Ponca Indians of Oklahoma believed their “heathenish” moral state prevented them from fully realizing the “advantages” of the white
 man’s road. To induce the Indians to give up practices such as the Sun Dance
 and polygamy, the agents asked for help from the missionary field. Mark van 
 deLogt focuses on the work of the Methodist Episcopal Church on the Ponca
 Agency, the methods the missionaries used, and the reasons for their ultimate
 failure in transforming the Poncas.</span></blockquote><span data-dcnode-id="1553" instrument_node="">
</span><p data-dcnode-id="1551"><span data-dcnode-id="1552" instrument_node="">“Capital Punishment and the United States Court for the Indian Territory,” by Von Russell Creel, 172–205</span></p><blockquote data-dcnode-id="1549"><span data-dcnode-id="1550" instrument_node="">Throughout much of the nineteenth century, the Indian Territory was attached
 to Arkansas Territory for judicial purposes, including capital cases notably 
 under the jurisdiction of Judge Isaac C. Parker. That changed in 1889 with the
 creation of a “resident court” in Indian Territory. Von Creel traces the evolution
 of the United States Court for the Indian Territory and its several districts, 
 details the capital cases of the nine men and one woman who came before it,
 and provided biographical information about the presiding judges.</span></blockquote><span data-dcnode-id="1548" instrument_node="">
</span><p data-dcnode-id="1546"><span data-dcnode-id="1547" instrument_node="">“Building a New Life: The Polish Settlers of Harrah, Oklahoma,” by Agnieszka Kemerley, 206–227</span></p><blockquote data-dcnode-id="1544"><span data-dcnode-id="1545" instrument_node="">The history of Polish settlers in Oklahoma reveals a struggle to build a new life and a determination to preserve their heritage. Harrah became the oldest and
 largest Polish settlement in the state when Poles began moving to the area
 following the land opening of 1891; most of them came to the United States in
 the 1870s and moved to Harrah from other states. Agnieszka Kemerley
 explores the political and economic hardships that forced many Poles to leave
 their native land, the hardships they faced in their new homes, and their efforts
