</span><blockquote data-dcnode-id="310"><span data-dcnode-id="311" instrument_node="">Political interference in administrative and academic affairs at Oklahoma’s colleges was commonplace in the state’s early years. James C. Milligan and L. David Norris explore how the practice affected Southeastern State Teachers College in Durant and the dramatic changes instituted in the late 1930s by Kate Galt Zaneis, the first woman in the state and nation to head a state institution of higher learning</span></blockquote><span data-dcnode-id="309" instrument_node="">
</span><p data-dcnode-id="307"><span data-dcnode-id="308" instrument_node="">“Lights, Camera, Action!: Newsreel Cameramen of Oklahoma, 1910–1940,” by Bill Moore, 302–321</span></p><span data-dcnode-id="306" instrument_node="">
</span><blockquote data-dcnode-id="304"><span data-dcnode-id="305" instrument_node="">Oklahoma’s status as a young state has had certain advantages for those destined to document its history. This is especially true in regard to motion picture filming, developed shortly before Oklahoma entered the union. Bill Moore provides a fascinating glimpse at the principal newsreel photographers to capture Oklahoma’s history as it happened. He gives special attention to the man who added sound, Arthur B. Ramsey.</span></blockquote><span data-dcnode-id="303" instrument_node="">
</span><p data-dcnode-id="301"><span data-dcnode-id="302" instrument_node="">“Friendly Persuasions: Gifts and Reciprocity in Comanche-Euroamerican Relations,” by David LaVere, 322–337</span></p><span data-dcnode-id="300" instrument_node="">
</span><blockquote data-dcnode-id="298"><span data-dcnode-id="299" instrument_node="">Throughout centuries of contact, Comanche-Euroamerican relations have been marked by both conflict and friendship. The foundation of either, and particularly for Euroamericans, often lay in their understanding or perception of Comanche society. David L. LaVere describes Comanche kinship bonds as they relate to gift giving and their crucial role in facilitating alliances on the Southern Plains.</span></blockquote><span data-dcnode-id="297" instrument_node="">
</span><img alt=" " class="icon" data-dcnode-id="296" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.okhistory.org/images/publications/Chronicles055.jpg&amp;raw"><h2 data-dcnode-id="294"><span data-dcnode-id="295" instrument_node="">Volume 71, No. 2 (Summer 1993)</span></h2><span data-dcnode-id="293" instrument_node="">
</span><p data-dcnode-id="291"><span data-dcnode-id="292" instrument_node="">“The Opening of the Cherokee Outlet,” Introductory Essay by Mary Ann Blochowiak, 116–117</span></p><span data-dcnode-id="290" instrument_node="">
</span><p data-dcnode-id="288"><span data-dcnode-id="289" instrument_node="">“Cherokee Sovereignty in the Gilded Age: The Outlet Question,” by H. Craig Miner, 118–137</span></p><span data-dcnode-id="287" instrument_node="">
</span><blockquote data-dcnode-id="285"><span data-dcnode-id="286" instrument_node="">The story of the Cherokee Outlet must begin from the perspective of the Cherokee Nation whose land it was. Assaulted on all sides by powerful corporate interests, the Cherokees struggled to maintain the last vestiges of tribal integrity that the Outlet seemed to signify. H. Craig Miner discusses these Gilded Age issues and formulates important analogies about their meaning for twentieth-century Oklahomans.</span></blockquote><span data-dcnode-id="284" instrument_node="">
</span><p data-dcnode-id="282"><span data-dcnode-id="283" instrument_node="">“Of Cattle and Corporations: The Rise, Progress, and Termination of the Cherokee Strip Live Stock Association,” by William W. Savage, Jr., 138–153</span></p><span data-dcnode-id="281" instrument_node="">
</span><blockquote data-dcnode-id="279"><span data-dcnode-id="280" instrument_node="">Of all the groups expressing interest in the largely unoccupied lands of the Cherokee Outlet, the cattlemen of the 1870s and 1880s formed the fairest and strongest relationship with the Cherokees. The partnership resulted in the formation of the Cherokee Strip Live Stock Association. William W. Savage, Jr., traces the association’s brief history and the factors affecting its success and eventual demise.</span></blockquote><span data-dcnode-id="278" instrument_node="">
</span><p data-dcnode-id="276"><span data-dcnode-id="277" instrument_node="">“Order and Disorder: The Opening of the Cherokee Outlet,” by Alvin O. Turner, 154–173</span></p><span data-dcnode-id="275" instrument_node="">
</span><blockquote data-dcnode-id="273"><span data-dcnode-id="274" instrument_node="">Maintaining law and order in the 6-million-acre Cherokee Outlet prior to and during the land run of 1893 proved a formidable task for officials in charge—something they had not achieved in three previous land runs. Alvin O. Turner discusses the unique circumstances existent in the Outlet and how the government measured up in terms of providing order and safety in this biggest race of all. </span></blockquote><span data-dcnode-id="272" instrument_node="">
</span><p data-dcnode-id="270"><span data-dcnode-id="271" instrument_node="">“Building a Life: Culture, Society, and Leisure in the Cherokee Outlet,” by Kenny L. Brown, 174–201</span></p><span data-dcnode-id="269" instrument_node="">
</span><blockquote data-dcnode-id="267"><span data-dcnode-id="268" instrument_node="">Staking claim to a quarter-section of land or a town lot was only the first step for the homesteader in the Outlet. His struggle to build a home and community and then to enjoy the fruits of his labor remains the strongest legacy of that historic event. Focusing on the diverse elements that define a culture, Kenny L. Brown describes life in the Outlet immediately following the run and its evolution and growth over time. </span></blockquote><span data-dcnode-id="266" instrument_node="">
</span><p data-dcnode-id="264"><span data-dcnode-id="265" instrument_node="">“Economic Beginnings: Making a Living in the Cherokee Outlet,” by Norbert R. Mahnken, 202–223 </span></p><span data-dcnode-id="263" instrument_node="">
</span><blockquote data-dcnode-id="261"><span data-dcnode-id="262" instrument_node="">The opening of the Cherokee Outlet coincided with a national economic depression and a regional drought. Homesteaders and city dwellers not only faced the immediate challenges of making a living but those of erecting permanent institutions for economic growth. Norbert R. Mahnken explores the problems associated with economic beginnings in agriculture, banking and credit, and transportation.</span></blockquote><span data-dcnode-id="260" instrument_node="">
</span><p data-dcnode-id="255"><span data-dcnode-id="259" instrument_node="">Articles in this issue of </span><em data-dcnode-id="257"><span data-dcnode-id="258" instrument_node="">The Chronicles of Oklahoma</span></em><span data-dcnode-id="256" instrument_node=""> were originally presented in a lecture series sponsored by the Oklahoma Historical Society, the Sons and Daughters of the Cherokee Strip Pioneers, Enid, and Phillips University, Enid. The lecture series was funded in part by the Oklahoma Foundation for the Humanities and the National Endowment for the Humanities.</span></p><span data-dcnode-id="254" instrument_node="">
</span><img alt=" " class="icon" data-dcnode-id="253" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.okhistory.org/images/publications/Chronicles048.jpg&amp;raw"><h2 data-dcnode-id="251" id="v71"><span data-dcnode-id="252" instrument_node="">Volume 71, No. 1 (Sping 1993) </span></h2><span data-dcnode-id="250" instrument_node="">
</span><p data-dcnode-id="248"><span data-dcnode-id="249" instrument_node="">“Destined for Duty: The Life and Diary of Bishop Theophile Meerschaert,” by James D. White, 4–41</span></p><span data-dcnode-id="247" instrument_node="">
</span><blockquote data-dcnode-id="245"><span data-dcnode-id="246" instrument_node="">The appointment of Theophile Meerschaert as bishop in 1891 signified a benchmark for the Catholic Church in the Twin Territories. Meerschaert went on to serve Oklahoma for thirty-two years, a period that witnessed remarkable growth in number of priests, churches and schools, and laity. In this well-annotated article, Rev. James D. White explores the life and diary of the Belgian priest “destined” for duty in Oklahoma.</span></blockquote><span data-dcnode-id="244" instrument_node="">
</span><p data-dcnode-id="242"><span data-dcnode-id="243" instrument_node="">“‘No Oklahoman Lost a Penny’: Oklahoma’s State Bank Guarantee Law, 1907–1923,” by Norbert R. Mahnken, 42–63</span></p><span data-dcnode-id="241" instrument_node="">
</span><blockquote data-dcnode-id="239"><span data-dcnode-id="240" instrument_node="">After statehood in 1907 Oklahoma’s Progressive legislators established the Bank Guarantee Fund in an attempt to bring some order to the chaotic and irregular banking practices then in place. The measure even served as a model for laws in several other states. In this fast-paced article Norbert R. Mahnken reviews the fund’s colorful history—its innovation and successes along with its weaknesses and ultimate failure.</span></blockquote><span data-dcnode-id="238" instrument_node="">
</span><p data-dcnode-id="236"><span data-dcnode-id="237" instrument_node="">“‘Now the Wolf Has Come’: The Civilian Civil War in the Indian Territory,” by Mary Jane Warde, 64–87 </span></p><span data-dcnode-id="235" instrument_node="">
</span><blockquote data-dcnode-id="231"><span data-dcnode-id="234" instrument_node="">
</span><p data-dcnode-id="232"><span data-dcnode-id="233" instrument_node="">Most studies of the Civil War in Indian Territory deal exclusively with military strategy, political issues, or tribal factionalism, with little attention to its effect on ordinary citizens. Using diaries, letters, and interviews of those who witnessed this “white man’s war,” Mary Jane Warde describes the shattering, immediate, and indiscriminate nature of a conflict that forever changed the men, women, and children of the territory.</span></p></blockquote><span data-dcnode-id="230" instrument_node="">
</span><p data-dcnode-id="228"><span data-dcnode-id="229" instrument_node="">“Where is Main Street?: The Commercial Landscape of Four Oklahoma Small Towns,” by Brian L. Schulz, 88–103</span></p><span data-dcnode-id="227" instrument_node="">
</span><blockquote data-dcnode-id="225"><span data-dcnode-id="226" instrument_node="">Since the 1920s improved highways, the impact of the automobile, and the decline of the railroads, among other reasons, have led to a decline in the types and distribution of retail and service activities in rural towns. Asking “Where is Main Street?,” Brian L. Schulz investigates four Oklahoma small towns to determine their change over time and describes a program that may offer hope for restructuring these rural trade centers.</span></blockquote><span data-dcnode-id="224" instrument_node="">
</span><img alt=" " class="icon" data-dcnode-id="223" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.okhistory.org/images/publications/Chronicles054.jpg&amp;raw"><h2 data-dcnode-id="221" id="issue1992"><span data-dcnode-id="222" instrument_node="">Volume 70, No. 4 (Winter 1992–1993) </span></h2><p class="backtotop" data-dcnode-id="218"><a data-dcnode-id="219" href="#top"><span data-dcnode-id="220" instrument_node="">Back to top</span></a></p><span data-dcnode-id="217" instrument_node="">
</span><p data-dcnode-id="215"><span data-dcnode-id="216" instrument_node="">“Battle Cry for History: The First Century of the Oklahoma Historical Society,” by Bob L. Blackburn, 356–390</span></p><span data-dcnode-id="214" instrument_node="">
</span><blockquote data-dcnode-id="212"><span data-dcnode-id="213" instrument_node="">For 100 years the Oklahoma Historical Society has led the battle cry for preserving and perpetuating the state’s history. Drawing from a variety of institutional and statutory sources, Bob L. Blackburn provides a critical look at how well the society has met the challenges of growth and describes the processes that will give it direction into the second century.</span></blockquote><span data-dcnode-id="211" instrument_node="">
</span><p data-dcnode-id="209"><span data-dcnode-id="210" instrument_node="">“The Reception of The Grapes of Wrath in Oklahoma: A Reappraisal,” by Marsha L. Weisiger, 394–415</span></p><span data-dcnode-id="208" instrument_node="">
</span><blockquote data-dcnode-id="206"><span data-dcnode-id="207" instrument_node="">More than fifty years after John Steinbeck’s The Grapes of Wrath was released, the debate continues over its treatment of and reception by the people of Oklahoma. In this fast-paced but thoughtful essay Marsha L. Weisiger examines both the historical record and contemporary reaction for an analysis of Steinbeck’s work and its meaning for Oklahomans.</span></blockquote><span data-dcnode-id="205" instrument_node="">
</span><p data-dcnode-id="203"><span data-dcnode-id="204" instrument_node="">“Searching for the Hearth: Culture Areas of Oklahoma Territory,” by Michael Roark, 416–431</span></p><span data-dcnode-id="202" instrument_node="">
</span><blockquote data-dcnode-id="200"><span data-dcnode-id="201" instrument_node="">What is an Oklahoman? Scholars and citizens alike have tried to answer this question about Oklahoma’s culture in the 100-plus years since the first permanent non-Indian settlement of the state began. Geographer Michael Roark analyses 1900 federal census data and other published material on migrants to Oklahoma in search of Oklahoma’s cultural hearth.</span></blockquote><span data-dcnode-id="199" instrument_node="">
</span><p data-dcnode-id="197"><span data-dcnode-id="198" instrument_node="">“Culture Mixing: Everyday Life on Missions among the Choctaws,” by Christopher J. Huggard, 432–449</span></p><span data-dcnode-id="196" instrument_node="">
</span><blockquote data-dcnode-id="194"><span data-dcnode-id="195" instrument_node="">For all that has been written about Native Americans’ acceptance of certain aspects of the dominant white culture in the nineteenth century, surprisingly little literature describes the reciprocal relationship that existed among the two peoples. Using the missions to the Choctaws as a basis for study, Christopher J. Huggard explores the impact of Indian culture on whites.</span></blockquote><span data-dcnode-id="193" instrument_node="">
</span><p data-dcnode-id="191"><span data-dcnode-id="192" instrument_node="">“The African Lion: George Napier Perkins, Lawyer, Politician, Editor,” by Nudie E. Williams, 450–465</span></p><span data-dcnode-id="190" instrument_node="">
</span><blockquote data-dcnode-id="188"><span data-dcnode-id="189" instrument_node="">Blacks migrating to Oklahoma Territory before and after the turn of the century found not the land of opportunity for which they hoped, but one replete with social and political barriers. Nudie E. Williams examines the life of the “African Lion,” George Napier Perkins, who through example and newspaper editorials became the champion of black civil rights.</span></blockquote><span data-dcnode-id="187" instrument_node="">
</span><img alt=" " class="icon" data-dcnode-id="186" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.okhistory.org/images/publications/Chronicles049.jpg&amp;raw"><h2 data-dcnode-id="184"><span data-dcnode-id="185" instrument_node="">Volume 70, No. 3 (Fall 1992)</span></h2><span data-dcnode-id="183" instrument_node="">
</span><p data-dcnode-id="181"><span data-dcnode-id="182" instrument_node="">“‘More Valuable than Oil’: The Establishment and Development of Tinker Air Force Base, 1940–1949,” by James L. Crowder, Jr., 228–257</span></p><span data-dcnode-id="180" instrument_node="">
</span><blockquote data-dcnode-id="178"><span data-dcnode-id="179" instrument_node="">In early 1940 as the United States geared up for world war, leaders of the Oklahoma City Chamber of Commerce worked behind the scenes to obtain a military air depot for their city. James L. Crowder describes the military and civilian efforts that led to the formation of the giant complex now known as Tinker Air Force Base and highlights the first ten years of its history.</span></blockquote><span data-dcnode-id="177" instrument_node="">
</span><p data-dcnode-id="175"><span data-dcnode-id="176" instrument_node="">“Socialists in the House: The Oklahoma Experience, Part II,” by Von Russell Creel, 258–301</span></p><span data-dcnode-id="174" instrument_node="">
</span><blockquote data-dcnode-id="172"><span data-dcnode-id="173" instrument_node="">The first serious challenge to Democratic supremacy in the Oklahoma House of Representatives occurred in 1914 when voters elected five Socialists from western Oklahoma. In the second of a two-part series, Von Russell Creel continues the discussion of the Socialists’ response to legislation introduced by their colleagues, their reelection campaigns, and their activities after leaving the legislature.</span></blockquote><span data-dcnode-id="171" instrument_node="">
</span><p data-dcnode-id="169"><span data-dcnode-id="170" instrument_node="">“Alice’s Restaurant: Expanding a Woman’s Sphere,” by Maitreyi Mazumdar, 302–325</span></p><span data-dcnode-id="168" instrument_node="">
</span><blockquote data-dcnode-id="166"><span data-dcnode-id="167" instrument_node="">In 1920 Oklahoma sent Alice Mary Robertson, its first and only congresswoman, to Washington. Robertson’s entire personal and political life was a contradiction to the era’s traditional women’s roles. Maitreyi Mazumdar analyzes the life of a unique woman forced by circumstances beyond her control to live a “man’s life,” but nonetheless believing she was protecting a “woman’s sphere” by entering politics.</span></blockquote><span data-dcnode-id="165" instrument_node="">
</span><p data-dcnode-id="160"><span data-dcnode-id="164" instrument_node="">“‘Our Rights, Our Country, Our Race’: W.P. Ross and the </span><i data-dcnode-id="162"><span data-dcnode-id="163" instrument_node="">Cherokee Advocate</span></i><span data-dcnode-id="161" instrument_node="">, 1844–1848,” by Doug Tattershall, 326–338</span></p><span data-dcnode-id="159" instrument_node="">
</span><blockquote data-dcnode-id="154"><span data-dcnode-id="158" instrument_node="">After their forced removal from the southeastern United States, the Cherokees began the difficult task of rebuilding their nation, including publication of a new tribal newspaper, the </span><i data-dcnode-id="156"><span data-dcnode-id="157" instrument_node="">Cherokee Advocate</span></i><span data-dcnode-id="155" instrument_node="">. Doug Tattershall focuses on the efforts of the paper’s first editor, William P. Ross, to uplift his people through a uniquely Cherokee publication, a tradition maintained long after his tenure.</span></blockquote><span data-dcnode-id="153" instrument_node="">
</span><p data-dcnode-id="151"><span data-dcnode-id="152" instrument_node="">“The Braden Site: An Update,” by Robert L. Brooks, 338–339</span></p><span data-dcnode-id="150" instrument_node="">
</span><blockquote data-dcnode-id="145"><span data-dcnode-id="149" instrument_node="">In the Summer, 1992, issue of </span><em data-dcnode-id="147"><span data-dcnode-id="148" instrument_node="">The Chronicles of Oklahoma</span></em><span data-dcnode-id="146" instrument_node="">, Brooks reported on WPA excavations at the Braden Site, a Southern Plains Village settlement in south-central Oklahoma. One point emphasized was the unfortunate loss of a substantial portion of the collections. In this update, Brooks summarizes the nature and extent of two boxes of material and the original catalog sheets returned to the Oklahoma Museum of Natural History after being lost for twenty-five years.</span></blockquote><span data-dcnode-id="144" instrument_node="">
</span><img alt=" " class="icon" data-dcnode-id="143" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.okhistory.org/images/publications/Chronicles052.jpg&amp;raw"><h2 data-dcnode-id="141"><span data-dcnode-id="142" instrument_node="">Volume 70, No. 2 (Summer 1992)</span></h2><span data-dcnode-id="140" instrument_node="">
</span><p data-dcnode-id="138"><span data-dcnode-id="139" instrument_node="">“Journey to Sainthood: David Pendleton Oakerhater’s Better Way,” by Alvin O. Turner, 116–143</span></p><span data-dcnode-id="137" instrument_node="">
</span><blockquote data-dcnode-id="135"><span data-dcnode-id="136" instrument_node="">David Pendleton Oakerhater’s path along the white man’s road led him from the plains of western Oklahoma to imprisonment at Fort Marion and back to the land of his childhood to begin a fifty-year ministry among his people. In 1986 his name was added to the Episcopal Church’s calendar of saints. Alvin O. Turner describes the journey that took a Cheyenne Indian to sainthood.</span></blockquote><span data-dcnode-id="134" instrument_node="">
</span><p data-dcnode-id="132"><span data-dcnode-id="133" instrument_node="">“Socialists in the House: The Oklahoma Experience, Part I,” by Von Russell Creel, 144–183</span></p><span data-dcnode-id="131" instrument_node="">
</span><blockquote data-dcnode-id="129"><span data-dcnode-id="130" instrument_node="">The first serious challenge to Democratic supremacy in the Oklahoma House of Representatives occurred in 1914 when voters elected five Socialists from western Oklahoma. In the first of a two-part series, Von Russell Creel focuses on the men, the campaigns, and the political and social agenda they hoped would bring a “proletarian perspective to the rural movement” in Oklahoma.</span></blockquote><span data-dcnode-id="128" instrument_node="">
</span><p data-dcnode-id="126"><span data-dcnode-id="127" instrument_node="">“The Braden Site: WPA Excavations at a Plains Village,” by Robert L. Brooks, 184–193</span></p><span data-dcnode-id="125" instrument_node="">
</span><blockquote data-dcnode-id="123"><span data-dcnode-id="124" instrument_node="">For hundreds of years the village of an ancient people lay buried along the Washita River in southern Oklahoma. During the worst years of the Great Depression, archaeologists and WPA workers carefully removed and cataloged the remains of that Southern Plains Village now called the Braden Site. Robert L. Brooks reports on the lessons learned from the physical remains of Oklahoma’s last prehistoric people.</span></blockquote><span data-dcnode-id="122" instrument_node="">
</span><p data-dcnode-id="120"><span data-dcnode-id="121" instrument_node="">“Oklahoma’s Art in the 1930s: A Remembrance,” by Leonard Good, 194–209</span></p><span data-dcnode-id="119" instrument_node="">
</span><blockquote data-dcnode-id="117"><span data-dcnode-id="118" instrument_node="">By 1930 Oklahoma’s cultural scene enjoyed a degree of maturity that belied the state’s late transition from frontier to settled land. Prominent artists and art centers flourished in both the public and private sectors and held their own in the larger art world. Artist Leonard Good looks back fondly across a career of seventy years to remember Oklahoma’s art in the 1930s and offer a kindly critique of its best and brightest.</span></blockquote><span data-dcnode-id="116" instrument_node="">
</span><img alt=" " class="icon" data-dcnode-id="115" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.okhistory.org/images/publications/Chronicles053.jpg&amp;raw"><span data-dcnode-id="114" instrument_node="">
</span><h2 data-dcnode-id="112" id="v70"><span data-dcnode-id="113" instrument_node="">Volume 70, No. 1 (Sping 1992) </span></h2><span data-dcnode-id="111" instrument_node="">
</span><p data-dcnode-id="109"><span data-dcnode-id="110" instrument_node="">“‘Cathedrals of the Plains’: The Grain Elevators of Western Oklahoma,” by W. David Baird, 4–25</span></p><span data-dcnode-id="108" instrument_node="">
</span><blockquote data-dcnode-id="106"><span data-dcnode-id="107" instrument_node="">Grain elevators, from simple wooden structures to mammoth concrete giants, are enduring symbols of agricultural development in the American West. David Baird describes the history and inner workings of these “Cathedrals of the Plains” and explains why these giants have become such an important part of the Oklahoma landscape.</span></blockquote><span data-dcnode-id="105" instrument_node="">
</span><p data-dcnode-id="103"><span data-dcnode-id="104" instrument_node="">“Crisis of Command: The Hindman/Pike Controversy over the Defense of the Trans-Mississippi District,” by Thomas W. Kremm and Diane Neal, 26–45 </span></p><span data-dcnode-id="102" instrument_node="">
</span><blockquote data-dcnode-id="100"><span data-dcnode-id="101" instrument_node="">Confederate General Thomas C. Hindman’s assignment to the Trans-Mississippi District during the Civil War included oversight and protection of the Indian Territory. Thomas Kremm and Diane Neal document his bitter conflict with General Albert Pike, an old political foe who considered the Indian Territory his special command.</span></blockquote><span data-dcnode-id="99" instrument_node="">
</span><p data-dcnode-id="97"><span data-dcnode-id="98" instrument_node="">“Minor Leagues, Major Dreams: Professional Baseball in Oklahoma,” by Leo Kelley, 46–65</span></p><span data-dcnode-id="96" instrument_node="">
</span><blockquote data-dcnode-id="92"><span data-dcnode-id="95" instrument_node="">Baseball—that great American sport—was played in Indian Territory before the land openings and grew in popularity after statehood. Some of the nation’s greatest players have hailed from Oklahoma. Leo Kelley focuses on some of the early teams and players who were “minor leaguers, major dreamers.” </span><p data-dcnode-id="94"></p><span data-dcnode-id="93" instrument_node="">
</span></blockquote><span data-dcnode-id="91" instrument_node="">
</span><p data-dcnode-id="89"><span data-dcnode-id="90" instrument_node="">“Amongst the Damp: The Dangerous Profession of Coal Mining in Oklahoma, 1870–1935,” by Steve Sewell, 66–83</span></p><span data-dcnode-id="88" instrument_node="">
</span><blockquote data-dcnode-id="84"><span data-dcnode-id="87" instrument_node="">The coal mines of southeastern Oklahoma were among the most dangerous in the world before and after the turn of the century. Steve Sewell describes the working conditions that cost thousands of lives and the measures eventually taken to provide safety “amongst the damp.”</span><p data-dcnode-id="86"></p><span data-dcnode-id="85" instrument_node="">
</span></blockquote><span data-dcnode-id="83" instrument_node="">
