</span><img alt=" " class="icon" data-dcnode-id="3443" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.okhistory.org/images/publications/Chronicles097.4.jpg&amp;raw" width="75"><span data-dcnode-id="3442" instrument_node="">
</span><h2 data-dcnode-id="3440" id="v97"><span data-dcnode-id="3441" instrument_node="">Volume 97, No. 4 (Winter 2019–20)</span></h2><span data-dcnode-id="3439" instrument_node="">
</span><p data-dcnode-id="3437"><span data-dcnode-id="3438" instrument_node="">“On the Cutting Edge of Public Education: The Frontiers of Science Foundation of Oklahoma,” by Ricki J. Moore and Pamela Unruh Brown</span></p><span data-dcnode-id="3436" instrument_node="">
</span><blockquote data-dcnode-id="3431"><span data-dcnode-id="3435" instrument_node="">
</span><p data-dcnode-id="3433"><span data-dcnode-id="3434" instrument_node="">In the mid-1950s, Oklahoma’s business community realized that the future of the state’s economy was dependent on careers in math and science, but Oklahoma’s schools did not provide advanced classes in these subjects. Ricki J. Moore and Pamela Unruh Brown explain the work of the Frontiers of Science Foundation of Oklahoma, a group dedicated to improving the teaching of math and science in Oklahoma’s schools. </span></p><span data-dcnode-id="3432" instrument_node="">
</span></blockquote><span data-dcnode-id="3430" instrument_node="">
</span><p data-dcnode-id="3428"><span data-dcnode-id="3429" instrument_node="">“Birthday of the Klan: The Tulsa Outrage of 1917,” by Randy Hopkins</span></p><span data-dcnode-id="3427" instrument_node="">
</span><blockquote data-dcnode-id="3422"><span data-dcnode-id="3426" instrument_node="">
</span><p data-dcnode-id="3424"><span data-dcnode-id="3425" instrument_node="">As the United States entered World War I, Governor Robert L. Williams established an Oklahoma Council of Defense and similar county groups, which were extralegal committees empowered to maintain patriotism and order. The Tulsa Council of Defense was particularly active in promoting Liberty Bond drives and suppressing dissent from the International Workers of the World and other labor organizations. Randy Hopkins describes the actions of the Tulsa Council of Defense, shows how its vigilante violence led directly to the emergence of the Ku Klux Klan in the city, and foreshadows the horrors of the Tulsa Race Massacre of 1921.</span></p><span data-dcnode-id="3423" instrument_node="">
</span></blockquote><span data-dcnode-id="3421" instrument_node="">
</span><p data-dcnode-id="3419"><span data-dcnode-id="3420" instrument_node="">“A Terrible Truth: The Tonkawa Massacre of 1862,” by Joseph Connole</span></p><span data-dcnode-id="3418" instrument_node="">
</span><blockquote data-dcnode-id="3413"><span data-dcnode-id="3417" instrument_node="">
</span><p data-dcnode-id="3415"><span data-dcnode-id="3416" instrument_node="">During the nineteenth century, the Tonkawa people were moved to several different reservation areas in Texas and Oklahoma. Through the course of these moves, they made alliances with different groups of Anglo-Americans—Texans, the US government, and the Confederacy—which served to alienate them from the American Indian tribes that surrounded them. Joseph Connole relates the story of the Tonkawa Massacre of 1862, faulting Union and Confederate forces for not honoring treaty obligations in defending their Tonkawa allies. </span></p><span data-dcnode-id="3414" instrument_node="">
</span></blockquote><span data-dcnode-id="3412" instrument_node="">
</span><p data-dcnode-id="3410"><span data-dcnode-id="3411" instrument_node="">“The Rough Riders Three,” by Joe Cummings</span></p><span data-dcnode-id="3409" instrument_node="">
</span><blockquote data-dcnode-id="3404"><span data-dcnode-id="3408" instrument_node="">
</span><p data-dcnode-id="3406"><span data-dcnode-id="3407" instrument_node="">In April 1898 the United States went to war with Spain, and men volunteered from all walks of life to become “Rough Riders” in Theodore Roosevelt’s regiment in Cuba. Joe Cummings weaves together the stories of three Rough Riders—Roosevelt, Frank Frantz, and Walter Cook—to illustrate how the common experience of war can unite even the most dissimilar of Americans and change their lives.</span></p><span data-dcnode-id="3405" instrument_node="">
</span></blockquote><span data-dcnode-id="3403" instrument_node="">
</span><img alt=" " class="icon" data-dcnode-id="3402" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.okhistory.org/images/publications/Chronicles097.3.jpg&amp;raw" width="75"><span data-dcnode-id="3401" instrument_node="">
</span><h2 data-dcnode-id="3399"><span data-dcnode-id="3400" instrument_node="">Volume 97, No. 3 (Fall 2019)</span></h2><span data-dcnode-id="3398" instrument_node="">
</span><p data-dcnode-id="3396"><span data-dcnode-id="3397" instrument_node="">“How America’s Destiny Became Manifest,” by Clara Sue Kidwell</span></p><span data-dcnode-id="3395" instrument_node="">
</span><blockquote data-dcnode-id="3390"><span data-dcnode-id="3394" instrument_node="">
</span><p data-dcnode-id="3392"><span data-dcnode-id="3393" instrument_node="">John Gast’s 1872 painting American Progress is a picture of the concept of Manifest Destiny—railroads and settlers as symbols of progress pushing American Indians and bison herds out of the way. To fulfill this destiny, explorers created trails to facilitate the movement of greater numbers of white pioneers. Clara Sue Kidwell discusses the implications of the Whipple Expedition, particularly the imagery created by the group’s artist, Heinrich Möllhausen.</span></p><span data-dcnode-id="3391" instrument_node="">
</span></blockquote><span data-dcnode-id="3389" instrument_node="">
</span><p data-dcnode-id="3387"><span data-dcnode-id="3388" instrument_node="">“An Unflinching Call for Freedom: Clara Luper’s Pedagogy at the Center of Sit-Ins,” by Rachel E. Watson</span></p><span data-dcnode-id="3386" instrument_node="">
</span><blockquote data-dcnode-id="3381"><span data-dcnode-id="3385" instrument_node="">
</span><p data-dcnode-id="3383"><span data-dcnode-id="3384" instrument_node="">Clara Luper served on the front lines of the battle to integrate Oklahoma City’s public accommodations. As a teacher and the adviser for the NAACP Youth Council, she taught countless children and teenagers how to demonstrate peacefully as they fought for their civil rights. Rachel E. Watson focuses on Luper’s pedagogy, and how her classroom engagement raised a group of activists calling for freedom.</span></p><span data-dcnode-id="3382" instrument_node="">
</span></blockquote><span data-dcnode-id="3380" instrument_node="">
</span><p data-dcnode-id="3378"><span data-dcnode-id="3379" instrument_node="">“Reading Prestatehood Muskogee: Racial-Political Discourse in American Indian, African American, and White Newspapers, 1905–07,” by Angela M. Person</span></p><span data-dcnode-id="3377" instrument_node="">
</span><blockquote data-dcnode-id="3372"><span data-dcnode-id="3376" instrument_node="">
</span><p data-dcnode-id="3374"><span data-dcnode-id="3375" instrument_node="">Prestatehood Muskogee was home to American Indians, African Americans, and white settlers. Four newspapers were established in the town to cater to the different racial groups and political leanings of the citizens. Angela M. Person analyzes the discourse in these four local newspapers, and how that discourse reflected an erosion in African American rights. </span></p><span data-dcnode-id="3373" instrument_node="">
</span></blockquote><span data-dcnode-id="3371" instrument_node="">
</span><p data-dcnode-id="3369"><span data-dcnode-id="3370" instrument_node="">“Aunt Maggie and the Child Welfare Special,” by Dan Lawrence</span></p><span data-dcnode-id="3368" instrument_node="">
</span><blockquote data-dcnode-id="3363"><span data-dcnode-id="3367" instrument_node="">
</span><p data-dcnode-id="3365"><span data-dcnode-id="3366" instrument_node="">In the early twentieth century, rural communities often lacked access to healthcare. Dr. Maggie Koenig was one of the members of a traveling health caravan known as the Child Welfare Special, which brought public health programs to rural populations. Dan Lawrence describes the work of the Child Welfare Special, and the contributions of Koenig to public health and her community at large. </span></p><span data-dcnode-id="3364" instrument_node="">
</span></blockquote><span data-dcnode-id="3362" instrument_node="">
</span><img alt=" " class="icon" data-dcnode-id="3361" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.okhistory.org/images/publications/Chronicles097.2.jpg&amp;raw" width="75"><span data-dcnode-id="3360" instrument_node="">
</span><h2 data-dcnode-id="3358"><span data-dcnode-id="3359" instrument_node="">Volume 97, No. 2 (Summer 2019)</span></h2><span data-dcnode-id="3357" instrument_node="">
</span><p data-dcnode-id="3352"><span data-dcnode-id="3356" instrument_node="">“</span><em data-dcnode-id="3354"><span data-dcnode-id="3355" instrument_node="">The Daughter of Dawn</span></em><span data-dcnode-id="3353" instrument_node=""> and the Promotion of American Indian Culture,” by Wendi M. Bevitt</span></p><span data-dcnode-id="3351" instrument_node="">
</span><blockquote data-dcnode-id="3346"><span data-dcnode-id="3350" instrument_node="">
</span><p data-dcnode-id="3348"><span data-dcnode-id="3349" instrument_node="">In 1920 Norbert Myles directed a group of Kiowa and Comanche tribal members as they acted in a film entitled The Daughter of Dawn. The significance of the casting and content of this film has been studied in recent years due to its rerelease by the Oklahoma Historical Society. Wendi M. Bevitt posits that The Daughter of Dawn was used as a tool to preserve and promote aspects of American Indian culture to a broad, movie-going audience.</span></p><span data-dcnode-id="3347" instrument_node="">
</span></blockquote><span data-dcnode-id="3345" instrument_node="">
</span><p data-dcnode-id="3343"><span data-dcnode-id="3344" instrument_node="">“The Victory Loan Flying Circus in Oklahoma City and Tulsa, May 2–3, 1919,” by Alan L. Roesler</span></p><span data-dcnode-id="3342" instrument_node="">
</span><blockquote data-dcnode-id="3337"><span data-dcnode-id="3341" instrument_node="">
</span><p data-dcnode-id="3339"><span data-dcnode-id="3340" instrument_node="">The Victory Loan Flying Circus, Mid-West Flight, was part of the final war bond campaign associated with World War I. The campaign brought mock air battles, passenger rides, and aerial photography to Oklahoma City and Tulsa as part of the show. Alan L. Roesler chronicles the two days that the Flying Circus spent in those cities, and emphasizes the impact of its exhibitions on the future of aviation in the state.</span></p><span data-dcnode-id="3338" instrument_node="">
</span></blockquote><span data-dcnode-id="3336" instrument_node="">
</span><p data-dcnode-id="3334"><span data-dcnode-id="3335" instrument_node="">“West Edwards Days: African Americans in Territorial Edmond,” by Christopher P. Lehman</span></p><span data-dcnode-id="3333" instrument_node="">
</span><blockquote data-dcnode-id="3328"><span data-dcnode-id="3332" instrument_node="">
</span><p data-dcnode-id="3330"><span data-dcnode-id="3331" instrument_node="">Before statehood, Edmond was home to a small but vibrant African American neighborhood. African American families saw Oklahoma Territory as a land of opportunity, free from the codified Jim Crow of the surrounding states. As the territory moved toward statehood, however, it became clear that segregation and restrictions on voting rights would come with it. Christopher P. Lehman describes the nearly forgotten African American community centered around West Edwards Street in territorial Edmond.</span></p><span data-dcnode-id="3329" instrument_node="">
</span></blockquote><span data-dcnode-id="3327" instrument_node="">
</span><p data-dcnode-id="3325"><span data-dcnode-id="3326" instrument_node="">“Sooner State Civil Defense: Oklahoma Community and College Campus Cold War Preparedness, 1960–68,” by Landry Brewer</span></p><span data-dcnode-id="3324" instrument_node="">
</span><blockquote data-dcnode-id="3319"><span data-dcnode-id="3323" instrument_node="">
</span><p data-dcnode-id="3321"><span data-dcnode-id="3322" instrument_node="">As the Cold War between the United States and the Soviet Union escalated in the 1960s, Americans responded to the threat of nuclear attack with the creation of community fallout shelters. Landry Brewer discusses this atmosphere of anxiety that bred a need for preparedness in local communities and college campuses across western Oklahoma.</span></p><span data-dcnode-id="3320" instrument_node="">
</span></blockquote><span data-dcnode-id="3318" instrument_node="">
</span><p data-dcnode-id="3316"><span data-dcnode-id="3317" instrument_node="">“That Man Stone Photography: ‘Anything, Any time, Anywhere,’” by Phil Sutton</span></p><span data-dcnode-id="3315" instrument_node="">
</span><blockquote data-dcnode-id="3310"><span data-dcnode-id="3314" instrument_node="">
</span><p data-dcnode-id="3312"><span data-dcnode-id="3313" instrument_node="">That Man Stone Company captured the early days of Oklahoma through the lens of its cameras. Phil Sutton describes the origins of this company and how it flourished, recording four decades of state history.</span></p><span data-dcnode-id="3311" instrument_node="">
</span></blockquote><span data-dcnode-id="3309" instrument_node="">
</span><img alt=" " class="icon" data-dcnode-id="3308" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.okhistory.org/images/publications/Chronicles097.1.jpg&amp;raw" width="75"><span data-dcnode-id="3307" instrument_node="">
</span><h2 data-dcnode-id="3305"><span data-dcnode-id="3306" instrument_node="">Volume 97, No. 1 (Spring 2019)</span></h2><span data-dcnode-id="3304" instrument_node="">
</span><p data-dcnode-id="3302"><span data-dcnode-id="3303" instrument_node="">“Fort Sill and the Birth of US Combat Aviation,” by Thomas A. Wikle</span></p><span data-dcnode-id="3301" instrument_node="">
</span><blockquote data-dcnode-id="3296"><span data-dcnode-id="3300" instrument_node="">
</span><p data-dcnode-id="3298"><span data-dcnode-id="3299" instrument_node="">Fort Sill is known for its Artillery Training Center, but few remember its legacy in military aviation. The first military aircraft arrived at Fort Sill in July of 1915. During both World War I and World War II, the base was home to pilot training programs. It also was a center for observation balloon training. Thomas A. Wikle explains the importance of Fort Sill and Henry Post Army Airfield to the early days of military aviation.</span></p><span data-dcnode-id="3297" instrument_node="">
</span></blockquote><span data-dcnode-id="3295" instrument_node="">
</span><p data-dcnode-id="3290"><span data-dcnode-id="3294" instrument_node="">“Thurgood Marshall’s “Broom Closet”: The Structure of Segregation in </span><em data-dcnode-id="3292"><span data-dcnode-id="3293" instrument_node="">McLaurin v. Oklahoma State Regents</span></em><span data-dcnode-id="3291" instrument_node="">,” by Eric Lomazoff and Bailie Gregory</span></p><span data-dcnode-id="3289" instrument_node="">
</span><blockquote data-dcnode-id="3284"><span data-dcnode-id="3288" instrument_node="">
</span><p data-dcnode-id="3286"><span data-dcnode-id="3287" instrument_node="">George McLaurin was admitted to the University of Oklahoma College of Education in 1948, but he was required to sit in an anteroom, segregated from his classmates. Through a close analysis of building diagrams, Eric Lomazoff and Bailie Gregory show the evolution of the classroom that would become the focal point of a landmark US Supreme Court case. </span></p><span data-dcnode-id="3285" instrument_node="">
</span></blockquote><span data-dcnode-id="3283" instrument_node="">
</span><p data-dcnode-id="3281"><span data-dcnode-id="3282" instrument_node="">“Marking the Butterfield: Retracing the Indian Territory Segment of the 1858–61 Butterfield Overland Mail Stagecoach Road,” by Susan Penn Dragoo</span></p><span data-dcnode-id="3280" instrument_node="">
</span><blockquote data-dcnode-id="3275"><span data-dcnode-id="3279" instrument_node="">
</span><p data-dcnode-id="3277"><span data-dcnode-id="3278" instrument_node="">In 2018 the National Park Service recommended that the Butterfield Overland Mail Stagecoach Road be designated a National Historic Trail. Sixty years earlier, OHS staff marked this important trade and transit route with historical markers. Susan Penn Dragoo retraces this road, describing the landmarks as they appeared on the 1958 trek as well as their present conditions.</span></p><span data-dcnode-id="3276" instrument_node="">
</span></blockquote><span data-dcnode-id="3274" instrument_node="">
</span><p data-dcnode-id="3272"><span data-dcnode-id="3273" instrument_node="">“Sooner State “Boy Wonder”: The Oklahoma Roots of Willmoore Kendall’s Thought,” by Christopher H. Owen</span></p><span data-dcnode-id="3271" instrument_node="">
</span><blockquote data-dcnode-id="3266"><span data-dcnode-id="3270" instrument_node="">
</span><p data-dcnode-id="3268"><span data-dcnode-id="3269" instrument_node="">In 1909 child prodigy Willmoore Kendall was born in Oklahoma. As an adult, he worked as an intelligence analyst and a college professor while honing political thought that would influence the likes of William F. Buckley Jr., with whom he cofounded National Review. Christopher H. Owen explores the influence of Kendall’s Oklahoma upbringing on his conservative political theory.</span></p><span data-dcnode-id="3267" instrument_node="">
</span></blockquote><span data-dcnode-id="3265" instrument_node="">
</span><img alt=" " class="icon" data-dcnode-id="3264" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.okhistory.org/images/publications/Chronicles096.4.jpg&amp;raw" width="75"><span data-dcnode-id="3263" instrument_node="">
</span><h2 data-dcnode-id="3261" id="v96"><span data-dcnode-id="3262" instrument_node="">Volume 96, No. 4 (Winter 2018–19)</span></h2><span data-dcnode-id="3260" instrument_node="">
</span><p data-dcnode-id="3258"><span data-dcnode-id="3259" instrument_node="">“Bad Men and Good Bad Men: Outlaws in the Twin Territories and Their Influence on the Hollywood Outlaw,” by Clinton Girkin</span></p><span data-dcnode-id="3257" instrument_node="">
</span><blockquote data-dcnode-id="3255"><span data-dcnode-id="3256" instrument_node="">
Oklahoma and Indian Territories were havens for outlaws in the late nineteenth century. Despite the Hollywood portrayal of outlaws as heroic “Robin Hood” characters, the vast majority of the bandits in the Twin Territories did not display those characteristics. Clinton Girkin tells the stories of notable Oklahoma outlaws and the public’s mixed reactions to their nefarious deeds.
</span></blockquote><span data-dcnode-id="3254" instrument_node="">
</span><p data-dcnode-id="3252"><span data-dcnode-id="3253" instrument_node="">“Colorblind Proletarian Brotherhood: African Americans, American Indians, and Racial Inclusivity in the Oklahoma Socialist Party,” by Matthew F. Simmons</span></p><span data-dcnode-id="3251" instrument_node="">
</span><blockquote data-dcnode-id="3249"><span data-dcnode-id="3250" instrument_node="">
Throughout the nineteenth century, American Indian tribes were removed to Indian Territory. After the Civil War, many African Americans came to Oklahoma and Indian Territories looking for opportunity. In the early twentieth century, the Socialist Party became active in the politics of the newly formed state of Oklahoma. Matt Simmons explores the attitude of the Oklahoma Socialist Party toward these two marginalized groups in Oklahoma, and how party leaders did or did not reach out to them.</span></blockquote><span data-dcnode-id="3248" instrument_node="">
</span><p data-dcnode-id="3246"><span data-dcnode-id="3247" instrument_node="">“Better Royalties: Federal Policy, the Quapaw Tribe, and Self-Determination, 1900–70,” by Raymond Anthony Nolan</span></p><span data-dcnode-id="3245" instrument_node="">
</span><blockquote data-dcnode-id="3243"><span data-dcnode-id="3244" instrument_node="">Northeastern Oklahoma was a rich mining region in the late nineteenth and early twentieth centuries. The Quapaw Tribe was removed to this area, and many of these minerals were discovered on their land. Federal policy affected the awarding of mining leases, and thus the payouts to individual Quapaws. Raymond Anthony Nolan describes how the Quapaw Tribe navigated the paternalistic mining lease terms of the US federal government in the early twentieth century.</span></blockquote><span data-dcnode-id="3242" instrument_node="">
</span><p data-dcnode-id="3240"><span data-dcnode-id="3241" instrument_node="">“Cherokee National Female Seminary Principal Teacher Etta Jane Rider and Her Assistant Teachers, 1901–04” by James G. McCullagh and James S. Davis</span></p><span data-dcnode-id="3239" instrument_node="">
</span><blockquote data-dcnode-id="3237"><span data-dcnode-id="3238" instrument_node="">Etta Jane Rider, a teacher from Iowa, served as the principal teacher of the Cherokee National Female Seminary from 1901 to 1904. James G. McCullagh and James S. Davis highlight this short period in the career of Etta Jane Rider, and name the teachers who assisted her in educating the young women of the Cherokee Nation.</span></blockquote><span data-dcnode-id="3236" instrument_node="">
</span><p data-dcnode-id="3234"><span data-dcnode-id="3235" instrument_node="">“McClintic Collection: An Oklahoma Congressman’s Adventure in Europe,” by Michael Bell</span></p><span data-dcnode-id="3233" instrument_node="">
</span><blockquote data-dcnode-id="3231"><span data-dcnode-id="3232" instrument_node="">
James V. McClintic was a congressman from Oklahoma who served ten terms from 1915 to 1935. Oklahoma History Center curator Michael Bell describes a trip McClintic took to Europe shortly after the end of World War I, and the artifacts he brought home and eventually donated to the OHS.
</span></blockquote><span data-dcnode-id="3230" instrument_node="">
</span><img alt=" " class="icon" data-dcnode-id="3229" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.okhistory.org/images/publications/Chronicles096.3.jpg&amp;raw" width="75"><span data-dcnode-id="3228" instrument_node="">
</span><h2 data-dcnode-id="3226"><span data-dcnode-id="3227" instrument_node="">Volume 96, No. 3 (Fall 2018)</span></h2><span data-dcnode-id="3225" instrument_node="">
</span><p data-dcnode-id="3223"><span data-dcnode-id="3224" instrument_node="">“Sundown on the Prairie: The Extralegal Campaigns and Efforts from 1889 to 1967 to Exclude African Americans from Norman, Oklahoma,” by Michael S. Givel</span></p><span data-dcnode-id="3222" instrument_node="">
</span><blockquote data-dcnode-id="3220"><span data-dcnode-id="3221" instrument_node="">
While there were no ordinances on the books in Norman, Oklahoma, that precluded African Americans from settling within the city limits, the city remained a “sundown town,” a place where African Americans were not welcome after dark, well into the mid-twentieth century. Michael S. Givel depicts how Norman used extralegal means to maintain its sundown status.
</span></blockquote><span data-dcnode-id="3219" instrument_node="">
</span><p data-dcnode-id="3217"><span data-dcnode-id="3218" instrument_node="">“German-American Immigrants Encounter World War I: A Cautionary Tale,” by Dalton Reimer</span></p><span data-dcnode-id="3216" instrument_node="">
</span><blockquote data-dcnode-id="3214"><span data-dcnode-id="3215" instrument_node="">
Wars are fought both on the battle front and the home front. In the heat of World War I, German immigrants in the United States were vulnerable to the suspicions of their American neighbors. Dalton Reimer reveals the story of one family of German-American immigrants who were conscientious objectors during World War I, and how their story reflects the larger narrative of immigrant religious expression in wartime. 
</span></blockquote><span data-dcnode-id="3213" instrument_node="">
</span><p data-dcnode-id="3211"><span data-dcnode-id="3212" instrument_node="">“Curious Links: Unorthodox Ideas from Antediluvian Speculation to New Thought and Utopian Hopes in Early Oklahoma Politics,” by Alvin O. Turner</span></p><span data-dcnode-id="3210" instrument_node="">
</span><blockquote data-dcnode-id="3208"><span data-dcnode-id="3209" instrument_node="">
The founding fathers of the state of Oklahoma brought various ideas and influences, ranging from socialism to alternative religions, to bear when designing what they thought to be the ideal state. Alvin O. Turner recounts the early days of Oklahoma through the lens of the Populist thought of Samuel Crocker, I. N. Terrill, William H. Murray, and Henry S. Johnston.
</span></blockquote><span data-dcnode-id="3207" instrument_node="">
</span><p data-dcnode-id="3205"><span data-dcnode-id="3206" instrument_node="">“The Politics of Cherokee Removal,” by Steve Byas</span></p><span data-dcnode-id="3204" instrument_node="">
</span><blockquote data-dcnode-id="3202"><span data-dcnode-id="3203" instrument_node="">
A series of conflicts between the Cherokee Nation and the US government, as well as internally between various factions in the federal government and the tribal government, created a politically charged environment that fostered the eventual reality of Cherokee Removal. Steve Byas describes the political climate that ultimately led to the dispossession of the Cherokee Nation.
</span></blockquote><span data-dcnode-id="3201" instrument_node="">
</span><img alt=" " class="icon" data-dcnode-id="3200" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.okhistory.org/images/publications/Chronicles096.2.jpg&amp;raw" width="75"><span data-dcnode-id="3199" instrument_node="">
</span><h2 data-dcnode-id="3197"><span data-dcnode-id="3198" instrument_node="">Volume 96, No. 2 (Summer 2018)</span></h2><span data-dcnode-id="3196" instrument_node="">
</span><p data-dcnode-id="3194"><span data-dcnode-id="3195" instrument_node="">“How W. K. Maxfield and the Doughboys from Southwest Oklahoma Helped Bring an End to the First World War,” by Phil Neighbors</span></p><span data-dcnode-id="3193" instrument_node="">
</span><blockquote data-dcnode-id="3191"><span data-dcnode-id="3192" instrument_node="">
Men from southwest Oklahoma were eager to volunteer for service in World War I, and many were assigned to the 36th Infantry Division. Phil Neighbors uses the story of his uncle W. K. Maxfield to share the exploits of the 36th Infantry Division at the Battle of Saint-Étienne, France.
</span></blockquote><span data-dcnode-id="3190" instrument_node="">
</span><p data-dcnode-id="3188"><span data-dcnode-id="3189" instrument_node="">“Maurice Halperin: From Sooner Subversive to Soviet Spy,” by Landry Brewer</span></p><span data-dcnode-id="3187" instrument_node="">
</span><blockquote data-dcnode-id="3185"><span data-dcnode-id="3186" instrument_node="">
Maurice Halperin taught at the University of Oklahoma (OU) in the 1930s and 1940s at a time when the state legislature was actively pursuing Communists. After an investigation, Halperin left OU for a job with the Office of Strategic Services. Landry Brewer chronicles the investigation into Halperin and other suspected Communist spies, and the eventual release of information proving Halperin’s guilt.
</span></blockquote><span data-dcnode-id="3184" instrument_node="">
</span><p data-dcnode-id="3182"><span data-dcnode-id="3183" instrument_node="">“The Evans and Clark Families: Borderlands Legacies in Western Oklahoma, 1875–1950,” by John Truden</span></p><span data-dcnode-id="3181" instrument_node="">
</span><blockquote data-dcnode-id="3179"><span data-dcnode-id="3180" instrument_node="">
Neal Evans and Ben Clark built their lives on the rugged landscape of western Oklahoma—Evans as a storekeeper and Clark as a guide. John Truden uses the lives of the Evans and Clark families to demonstrate evolving systems of racial discrimination in the emerging state.
</span></blockquote><span data-dcnode-id="3178" instrument_node="">
</span><p data-dcnode-id="3176"><span data-dcnode-id="3177" instrument_node="">“Simon Ralph ‘S. R.’ Walkingstick: A Cherokee Leader,” by James G. McCullagh</span></p><span data-dcnode-id="3175" instrument_node="">
</span><blockquote data-dcnode-id="3173"><span data-dcnode-id="3174" instrument_node="">
Simon Ralph “S. R.” Walkingstick was born in the Goingsnake District of the Cherokee Nation in 1868. He practiced law, raised a family, and became a leader in Cherokee politics protesting the passage of the Curtis Act of 1898. James G. McCullagh traces the life and genealogy of S. R. Walkingstick to show the ways in which one Cherokee family contributed to the tribal and state community.
</span></blockquote><span data-dcnode-id="3172" instrument_node="">
</span><img alt=" " class="icon" data-dcnode-id="3171" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.okhistory.org/images/publications/Chronicles096.1.jpg&amp;raw" width="75"><span data-dcnode-id="3170" instrument_node="">
</span><h2 data-dcnode-id="3168"><span data-dcnode-id="3169" instrument_node="">Volume 96, No. 1 (Spring 2018)</span></h2><span data-dcnode-id="3167" instrument_node="">
</span><p data-dcnode-id="3165"><span data-dcnode-id="3166" instrument_node="">“Battle Cry for History: The First 125 Years of the Oklahoma Historical Society,” by Bob L. Blackburn</span></p><span data-dcnode-id="3164" instrument_node="">
</span><blockquote data-dcnode-id="3159"><span data-dcnode-id="3163" instrument_node="">
In the face of many challenges over the years, the Oklahoma Historical Society has collected, preserved, and shared the history and culture of Oklahoma. To celebrate the 125th anniversary of the founding of the OHS, Bob L. Blackburn updates his article from the Winter 1992–93 issue of </span><em data-dcnode-id="3161"><span data-dcnode-id="3162" instrument_node="">The Chronicles of Oklahoma</span></em><span data-dcnode-id="3160" instrument_node=""> to include the past twenty-five years of the Oklahoma Historical Society’s achievements.
</span></blockquote><span data-dcnode-id="3158" instrument_node="">
</span><p data-dcnode-id="3156"><span data-dcnode-id="3157" instrument_node="">“Washita River Flood of 1934,” by Rhonda Shephard</span></p><span data-dcnode-id="3155" instrument_node="">
</span><blockquote data-dcnode-id="3153"><span data-dcnode-id="3154" instrument_node="">
The night of April 3–4, 1934, a rainstorm turned the Washita River Valley into a raging flood zone. Homes were destroyed, livestock were lost, and residents were killed by the rising waters. In the midst of the Great Depression, recovery was difficult. Rhonda Shephard describes the horrible toll that the flood took on the affected communities and the impact this natural disaster had on the people of the area for years after its immediate aftermath had ended.
</span></blockquote><span data-dcnode-id="3152" instrument_node="">
</span><p data-dcnode-id="3150"><span data-dcnode-id="3151" instrument_node="">“Banking in Oklahoma’s Smallest Certified City: Alva State Bank and Trust Company, Freedom Branch,” by Michael J. Hightower</span></p><span data-dcnode-id="3149" instrument_node="">
</span><blockquote data-dcnode-id="3147"><span data-dcnode-id="3148" instrument_node="">
The independent people who live in western Oklahoma have adapted to the harsh environment surrounding them, and Freedom, Oklahoma, is no exception. Bankers have helped build these towns by financing community and economic development. Michael J. Hightower utilizes oral history research to discuss the challenges of small-town banking in a western Oklahoma city.
</span></blockquote><span data-dcnode-id="3146" instrument_node="">
</span><p data-dcnode-id="3144"><span data-dcnode-id="3145" instrument_node="">“Fitting In and Sitting In: Phillip Henry Porter and Memories of Integration Efforts in Enid, 1955–58,” by Aaron Preston</span></p><span data-dcnode-id="3143" instrument_node="">
</span><blockquote data-dcnode-id="3141"><span data-dcnode-id="3142" instrument_node="">
In the 1950s, efforts to combat segregation in public life were taking shape. When Phillips University in Enid wanted to integrate its student body in 1956, the leadership turned to a local student named Phillip Porter. Aaron Preston recounts the struggle for civil rights in Enid and how students stood on the front lines of the battle both inside and outside of the classroom.
</span></blockquote><span data-dcnode-id="3140" instrument_node="">
</span><p data-dcnode-id="3138"><span data-dcnode-id="3139" instrument_node="">“Oklahoma Through the Lens of Z. P. Meyers,” by Jerry L. Cornelius and Phil Sutton</span></p><span data-dcnode-id="3137" instrument_node="">
</span><blockquote data-dcnode-id="3135"><span data-dcnode-id="3136" instrument_node="">
Jerry L. Cornelius and Phil Sutton tell the story of Z. P. Meyers, an Oklahoma City photographer who captured life in the first half of the twentieth century. His collection is a part of the Oklahoma Historical Society’s holdings.
</span></blockquote><span data-dcnode-id="3134" instrument_node="">
</span><img alt=" " class="icon" data-dcnode-id="3133" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.okhistory.org/images/publications/Chronicles095.4.jpg&amp;raw" width="75"><span data-dcnode-id="3132" instrument_node="">
</span><h2 data-dcnode-id="3130"><span data-dcnode-id="3131" instrument_node="">Volume 95, No. 4 (Winter 2017–18)</span></h2><span data-dcnode-id="3129" instrument_node="">
“World War II and the Story of Douglas Aircraft Plants in Tulsa and Midwest City,” by Thomas A. Wikle</span><p data-dcnode-id="3128"></p><span data-dcnode-id="3127" instrument_node="">
</span><blockquote data-dcnode-id="3125"><span data-dcnode-id="3126" instrument_node=""> During World War II, it was essential to keep the military supplied with the tools necessary for the war effort, including the various aircraft used to prosecute the war. Thomas A. Wikle describes the types of aircraft built in the Tulsa and Midwest City Douglas Aircraft plants and the impact these facilities had on the local communities.</span></blockquote><span data-dcnode-id="3124" instrument_node="">
</span><p data-dcnode-id="3122"><span data-dcnode-id="3123" instrument_node="">“Nationhood Defined and Defended: A Slice of Miami History Revealed Through the Thomas F. Richardville Papers,” by Brian Hosmer</span></p><span data-dcnode-id="3121" instrument_node="">
</span><blockquote data-dcnode-id="3119"><span data-dcnode-id="3120" instrument_node="">Through its interactions with the US government, the Miami Nation developed strategies to ensure that it could survive. Brian Hosmer uses the papers of Thomas F. Richardville, a Miami leader, to illuminate the history of the tribe as it struggled to preserve its nationhood.</span></blockquote><span data-dcnode-id="3118" instrument_node="">
</span><p data-dcnode-id="3116"><span data-dcnode-id="3117" instrument_node="">“Taking Care of Their Own: History of the Masonic Children’s Home in Guthrie, Oklahoma,” by Pamela Webb</span></p><span data-dcnode-id="3115" instrument_node="">
</span><blockquote data-dcnode-id="3113"><span data-dcnode-id="3114" instrument_node="">During territorial days, Masons began to discuss plans to create facilities to care for orphans, widows, and the elderly. By 1907 they had opened their first facility for children. Pamela Webb explains how the Masonic Children’s Home came to be, and portrays the life of the children who were nurtured in that environment.</span></blockquote><span data-dcnode-id="3112" instrument_node="">
</span><p data-dcnode-id="3110"><span data-dcnode-id="3111" instrument_node="">“Will Rogers in South Africa, 1902–03,” by Joseph H. Carter Sr. and Michelle Lefebvre-Carter</span></p><span data-dcnode-id="3109" instrument_node="">
</span><blockquote data-dcnode-id="3107"><span data-dcnode-id="3108" instrument_node="">Early in his career as a cowboy showman, Will Rogers spent time in South Africa with a traveling Wild West Show. Joseph H. Carter Sr. and Michelle Lefebvre-Carter retraced the steps of Will Rogers as he made that formative trek through South Africa to better understand the impact it had on the vocation of Oklahoma’s Favorite Son.</span></blockquote><span data-dcnode-id="3106" instrument_node="">
</span><p data-dcnode-id="3104"><span data-dcnode-id="3105" instrument_node="">“Mennonite Missionary S. S. Haury’s Account of the Running Buffalo Shooting, 1884,” translated by Levi Wilkins and edited by John Truden</span></p><span data-dcnode-id="3103" instrument_node="">
</span><blockquote data-dcnode-id="3101"><span data-dcnode-id="3102" instrument_node="">The relationships between Indigenous peoples, cowboys, missionaries, and the US Army can be seen through the lens of an 1884 shooting that was recorded in a German-language newspaper. John Truden annotates this newspaper story, translated by Levi Wilkins, and places the events in the context of pre-1892 Land Run western Oklahoma.</span></blockquote><span data-dcnode-id="3100" instrument_node="">
</span><img alt=" " class="icon" data-dcnode-id="3099" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.okhistory.org/images/publications/Chronicles095.3.jpg&amp;raw" width="75"><span data-dcnode-id="3098" instrument_node="">
</span><h2 data-dcnode-id="3096"><span data-dcnode-id="3097" instrument_node="">Volume 95, No. 3 (Fall 2017)</span></h2><span data-dcnode-id="3095" instrument_node="">
“The Missiles of Oklahoma: Southwest Oklahoma’s Role in the American Cold War Nuclear Arsenal, 1960–65,” by Landry Brewer</span><p data-dcnode-id="3094"></p><span data-dcnode-id="3093" instrument_node="">
</span><blockquote data-dcnode-id="3091"><span data-dcnode-id="3092" instrument_node="">In the midst of the Cold War threat of nuclear conflict with the Soviet Union, the United States began a project to create intercontinental ballistic missiles capable of reaching the Soviet Union. Landry Brewer highlights southwestern Oklahoma’s role in the Atlas missile project and the Cold War program of nuclear deterrence.</span></blockquote><span data-dcnode-id="3090" instrument_node="">
</span><p data-dcnode-id="3088"><span data-dcnode-id="3089" instrument_node="">“Seaborn Hill: Trader in the Creek Nation and Frontier Businessman, 1808–44,” by John W. Siebold</span></p><span data-dcnode-id="3087" instrument_node="">
</span><blockquote data-dcnode-id="3085"><span data-dcnode-id="3086" instrument_node="">On July 8, 1844, Creek Indian Agent James L. Dawson murdered trader Seaborn Hill. The interesting tale of the search for justice in the case has been told, but the story of the man who was killed and how both parties ended up in Indian Territory has not been told. John W. Siebold explores newspapers, letters, and other records of the time to create a profile of Seaborn Hill and the events surrounding his murder.</span></blockquote><span data-dcnode-id="3084" instrument_node="">
</span><p data-dcnode-id="3082"><span data-dcnode-id="3083" instrument_node="">“Fort Blunt Civil War Fortifications,” by Robert L. Cole</span></p><span data-dcnode-id="3081" instrument_node="">
</span><blockquote data-dcnode-id="3079"><span data-dcnode-id="3080" instrument_node="">Recent field surveys and archaeological investigations at Fort Gibson have turned up physical evidence of Civil War fortifications at Fort Blunt. Robert L. Cole analyzed the terrain at Fort Gibson and compared his observations with the plans for fortifications at Fort Blunt to better understand the ways in which the US Army protected the fort.</span></blockquote><span data-dcnode-id="3078" instrument_node="">
</span><p data-dcnode-id="3076"><span data-dcnode-id="3077" instrument_node="">“Cyrus Avery, the Ozark Trail, and the Birth of Route 66” by Jen Jones</span></p><span data-dcnode-id="3075" instrument_node="">
</span><blockquote data-dcnode-id="3073"><span data-dcnode-id="3074" instrument_node="">While Route 66 is synonymous with automobile culture, it owes its origins to the Good Roads Associations created to make roads more suitable for bicycling. Cyrus Avery, along with leaders from other states, pushed for the national highway system, and Avery made certain its most famous byway passed through Oklahoma. Jen Jones describes the dramatic process by which Oklahoma obtained the iconic Mother Road.</span></blockquote><span data-dcnode-id="3072" instrument_node="">
</span><img alt=" " class="icon" data-dcnode-id="3071" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.okhistory.org/images/publications/Chronicles095.2.jpg&amp;raw" width="75"><span data-dcnode-id="3070" instrument_node="">
</span><h2 data-dcnode-id="3068"><span data-dcnode-id="3069" instrument_node="">Volume 95, No. 2 (Summer 2017)</span></h2><span data-dcnode-id="3067" instrument_node="">
“Leon C. Phillips and the Drive to Balance Oklahoma’s Budget,” by Eric E. Beu</span><p data-dcnode-id="3066"></p><span data-dcnode-id="3065" instrument_node="">
</span><blockquote data-dcnode-id="3063"><span data-dcnode-id="3064" instrument_node="">Governor Leon C. Phillips campaigned on promises to make state agencies adhere to strict budgets. His ultimate goal was to pass an amendment to the Oklahoma Constitution mandating a balanced budget. Eric E. Beu describes the debate in the Oklahoma Legislature over this amendment, and the campaign for popular passage of the measure.</span></blockquote><span data-dcnode-id="3062" instrument_node="">
</span><p data-dcnode-id="3060"><span data-dcnode-id="3061" instrument_node="">“Thomas Wildcat Alford,” by Rebecca A. Kyes</span></p><span data-dcnode-id="3059" instrument_node="">
</span><blockquote data-dcnode-id="3057"><span data-dcnode-id="3058" instrument_node="">The life of Thomas Wildcat Alford spanned a crucial time in the history of his people, the Absentee Shawnee Tribe. Trained by his father to be a leader and educated at Hampton Institute, Alford aspired to be a chief, but instead assisted in the process of allotment and assimilation. Rebecca A. Kyes portrays the life of this man trapped between two worlds, who not only sought advancement for the tribe in the white man’s world but also clung to tribal identity.</span></blockquote><span data-dcnode-id="3056" instrument_node="">
</span><p data-dcnode-id="3054"><span data-dcnode-id="3055" instrument_node="">“When the Cherokee Nation was a Mormon Sanctuary,” by Allen LeBaron</span></p><span data-dcnode-id="3053" instrument_node="">
</span><blockquote data-dcnode-id="3051"><span data-dcnode-id="3052" instrument_node="">In the mid-1800s, Mormons from Texas made the long and arduous trek to their new homeland in Utah. On this journey, many of the migrants passed through the Cherokee Nation, and some stayed for a few years before continuing on their way. Allen LeBaron tells the story of their migration and the time they spent in the Cherokee Nation along the way.</span></blockquote><span data-dcnode-id="3050" instrument_node="">
</span><p data-dcnode-id="3048"><span data-dcnode-id="3049" instrument_node="">“Oscar B. Jacobson: Early Life of an Oklahoma Artist, 1882–1916,” by Chelsea Herrod</span></p><span data-dcnode-id="3047" instrument_node="">
</span><blockquote data-dcnode-id="3045"><span data-dcnode-id="3046" instrument_node="">Oscar B. Jacobson was the director of the University of Oklahoma School of Art from 1915 until his retirement in 1954. Jacobson’s love of artistic depictions of the American West influenced both his position as a professor and his personal artistic pursuits. Chelsea Herrod explores the artists and landscapes that influenced Jacobson, and how he used his knowledge as a working artist to teach future generations of Western artists.</span></blockquote><span data-dcnode-id="3044" instrument_node="">
</span><img alt=" " class="icon" data-dcnode-id="3043" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.okhistory.org/images/publications/Chronicles095.1.jpg&amp;raw" width="75"><span data-dcnode-id="3042" instrument_node="">
</span><h2 data-dcnode-id="3040" id="v95"><span data-dcnode-id="3041" instrument_node="">Volume 95, No. 1 (Spring 2017)</span></h2><span data-dcnode-id="3039" instrument_node="">
“Sooner Doughboys: University of Oklahoma Students Describe Their Experiences in the Great War,” by David W. Levy</span><p data-dcnode-id="3038"></p><span data-dcnode-id="3037" instrument_node="">
</span><blockquote data-dcnode-id="3035"><span data-dcnode-id="3036" instrument_node="">Just before the end of World War I, University of Oklahoma President Stratton D. Brooks sent letters to students and alumni who were serving in the military. The responses he received describe the experiences of these men with humor and pathos. David W. Levy places these letters in the context of the war, allowing the reader to better understand the impact of the war on individual soldiers.</span></blockquote><span data-dcnode-id="3034" instrument_node="">
</span><p data-dcnode-id="3032"><span data-dcnode-id="3033" instrument_node="">“‘That I Might Render Account of Myself and People’: Cherokees and World War I,” by Jason Herbert</span></p><span data-dcnode-id="3031" instrument_node="">
</span><blockquote data-dcnode-id="3029"><span data-dcnode-id="3030" instrument_node="">A large percentage of American Indian men joined the military to serve in World War I, including the nearly 50 percent of eligible Cherokee men who enlisted. Jason Herbert describes the contributions of Cherokees both overseas and on the home front, and analyzes the ways in which the war affected tribal members’ self-identity as Americans and Cherokees.</span></blockquote><span data-dcnode-id="3028" instrument_node="">
</span><p data-dcnode-id="3026"><span data-dcnode-id="3027" instrument_node="">“‘Getting Our Equipment Soon—I Hope So Anyway’: Camp Doniphan, Fort Sill, and American Artillery in World War I” by Justin Prince</span></p><span data-dcnode-id="3025" instrument_node="">
</span><blockquote data-dcnode-id="3023"><span data-dcnode-id="3024" instrument_node="">Camp Doniphan, located on the Fort Sill Reservation in southwestern Oklahoma, was not prepared for the soldiers who would descend upon it for training before crossing the Atlantic to join the fighting in World War I. Justin Prince depicts life for the new recruits at Camp Doniphan and explains how their training left them ill-prepared for modern warfare.</span></blockquote><span data-dcnode-id="3022" instrument_node="">
</span><p data-dcnode-id="3020"><span data-dcnode-id="3021" instrument_node="">“Artifacts from American Indian World War I Soldiers,” by Matt Reed</span></p><span data-dcnode-id="3019" instrument_node="">
</span><blockquote data-dcnode-id="3017"><span data-dcnode-id="3018" instrument_node="">Matt Reed, curator of American Indian and military history collections at the Oklahoma History Center, describes artifacts in the Oklahoma Historical Society collections used by American Indian troops in World War I.&nbsp; </span></blockquote><span data-dcnode-id="3016" instrument_node="">
</span><img alt=" " class="icon" data-dcnode-id="3015" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.okhistory.org/images/publications/Chronicles094.4.jpg&amp;raw"><span data-dcnode-id="3014" instrument_node="">
</span><h2 class="" data-dcnode-id="3012"><span data-dcnode-id="3013" instrument_node="">Volume 94, No. 4 (Winter 2016–17)</span></h2><span data-dcnode-id="3011" instrument_node="">
</span><p data-dcnode-id="3009"><span data-dcnode-id="3010" instrument_node="">“A Will of Iron: Dr. M. L. Peter and the Oklahoma City-County Health Department,” by Stephen B. Peter</span></p><blockquote data-dcnode-id="3007"><span data-dcnode-id="3008" instrument_node="">M. L. Peter served for fifteen years as director of the Oklahoma City-County Health Department, bringing polio vaccination clinics and improved sanitation practices to the Oklahoma City area. Stephen B. Peter explores his career in public health and contributions to the community.</span></blockquote><span data-dcnode-id="3006" instrument_node="">
</span><p data-dcnode-id="3004"><span data-dcnode-id="3005" instrument_node="">“‘They Could Tell What the Weather Was to be in Advance’: Native Oklahoma Weather and Climate Insights from the Archive,” by Randy A. Peppler</span></p><blockquote data-dcnode-id="3002"><span data-dcnode-id="3003" instrument_node="">Stories about the causes of weather phenomena are found in the oral histories of American Indian tribes. Randy A. Peppler mines the Doris Duke Collection of American Indian Oral History to share these insights about weather and climate as told by tribal elders.</span></blockquote><span data-dcnode-id="3001" instrument_node="">
</span><p data-dcnode-id="2999"><span data-dcnode-id="3000" instrument_node="">“The Horseless Carriage Rolls into Oklahoma,” by Gene Allen with Don Boulton and Ted R. Davis</span></p><blockquote data-dcnode-id="2997"><span data-dcnode-id="2998" instrument_node="">Oklahomans began producing automobiles before statehood. In fact, by 1907 there were six companies building cars across the state. Gene Allen, Don Boulton, and Ted R. Davis describe the vibrant automobile manufacturing scene in Oklahoma during the first decades of the twentieth century and explain how that industry eventually died.</span></blockquote><span data-dcnode-id="2996" instrument_node="">
</span><p data-dcnode-id="2994"><span data-dcnode-id="2995" instrument_node="">“Reverend Theodore Mannaseh Rights, His Sons, and the Cherokee National Male Seminary,” by James G. McCullagh</span></p><blockquote data-dcnode-id="2992"><span data-dcnode-id="2993" instrument_node="">The Cherokee Male Seminary allowed the sons of Moravian missionary Theodore M. Rights to enroll as students during his time in Indian Territory. James G. McCullagh investigates whether or not one of his sons was awarded a diploma, and how that affected the family.</span></blockquote><span data-dcnode-id="2991" instrument_node="">
</span><p data-dcnode-id="2989"><span data-dcnode-id="2990" instrument_node="">“Spreading the Gospel in Indian Territory and Early Oklahoma: The Reverend F. F. Dobson and Anna (Truan) Dobson,” by Greg Olds</span></p><blockquote data-dcnode-id="2987"><span data-dcnode-id="2988" instrument_node="">F. F. Dobson arrived in Indian Territory in May 1893 as a Presbyterian missionary, and served in the area intermittently for the rest of his life. Greg Olds presents the story of F. F. Dobson to show the unusual daily life and the sacrifices made by missionaries in Indian Territory and early Oklahoma.</span></blockquote><span data-dcnode-id="2986" instrument_node="">
</span><img alt=" " class="icon" data-dcnode-id="2985" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.okhistory.org/images/publications/Chronicles094.3.jpg&amp;raw"><span data-dcnode-id="2984" instrument_node="">
</span><h2 data-dcnode-id="2982"><span data-dcnode-id="2983" instrument_node="">Volume 94, No. 3 (Fall 2016)</span></h2><span data-dcnode-id="2981" instrument_node="">
</span><p data-dcnode-id="2979"><span data-dcnode-id="2980" instrument_node="">“The Historic Preservation Movement in Oklahoma,” by LeRoy H. Fischer</span></p><blockquote data-dcnode-id="2974"><span data-dcnode-id="2978" instrument_node="">Historic preservation began in Oklahoma as a result of public interest in historic and prehistoric sites. Systematic identification of historic sites in Oklahoma began in earnest in the 1920s and continues today. LeRoy H. Fischer describes the early days of historic preservation in Oklahoma, chronicling the time before the passage of the National Historic Preservation Act of 1966 and a few years after its passage. This article first appeared in </span><em data-dcnode-id="2976"><span data-dcnode-id="2977" instrument_node="">The Chronicles of Oklahoma</span></em><span data-dcnode-id="2975" instrument_node=""> 57, no. 1 (Spring 1979).</span></blockquote><span data-dcnode-id="2973" instrument_node="">
</span><p data-dcnode-id="2971"><span data-dcnode-id="2972" instrument_node="">“Development of the Historic Preservation Movement in Oklahoma, 1966–2016,” by Melvena Thurman Heisch and Glen R. Roberson</span></p><blockquote data-dcnode-id="2969"><span data-dcnode-id="2970" instrument_node="">To celebrate the fiftieth anniversary of the National Historic Preservation Act of 1966, Melvena Thurman Heisch and Glen R. Roberson continue the story of historic preservation in Oklahoma. The authors discuss not only the programs administered by the Oklahoma State Historic Preservation Office to fulfill the mandates set forth in the act, but also the work of American Indian tribes and preservation organizations.</span></blockquote><span data-dcnode-id="2968" instrument_node="">
</span><p data-dcnode-id="2966"><span data-dcnode-id="2967" instrument_node="">“The Legacy of Oklahoma Architecture,” by Lynda Schwan Ozan</span></p><blockquote data-dcnode-id="2964"><span data-dcnode-id="2965" instrument_node="">Oklahoma architecture reflects both the aesthetic tastes and pragmatism of Oklahomans. The environment, technology, and culture have influenced architectural design since the first shelters were built in present-day Oklahoma. Lynda Schwan Ozan illustrates the importance of Oklahoma’s architectural legacy through examples of buildings and structures saved for future generations, the impact of prominent architects, and cases of structures threatened or lost.</span></blockquote><span data-dcnode-id="2963" instrument_node="">
</span><p data-dcnode-id="2961"><span data-dcnode-id="2962" instrument_node="">“The National Historic Preservation Act and its Impact on Oklahoma Archaeology After Fifty Years,” by Robert L. Brooks</span></p><blockquote data-dcnode-id="2959"><span data-dcnode-id="2960" instrument_node="">The idea of preserving and documenting archaeological sites was established long before the passage of the National Historic Preservation Act of 1966, as the destruction and looting of significant sites led interested parties to call for their protection. Robert L. Brooks assesses the impact of the 1966 act on the field of archaeology, noting both its successes and the dilemmas that have arisen from its passage.</span></blockquote><span data-dcnode-id="2958" instrument_node="">
</span><p data-dcnode-id="2956"><span data-dcnode-id="2957" instrument_node="">“Cultural Diversity and Historic Preservation in Oklahoma,” by Cynthia Savage and Susan Allen Kline</span></p><blockquote data-dcnode-id="2954"><span data-dcnode-id="2955" instrument_node="">Historic preservation can play a large role in the creation and perpetuation of identity. As the population of Oklahoma becomes more diverse, the properties listed in the National Register of Historic Places reflect the cultures, ethnicities, and organizations represented in the state. Cynthia Savage and Susan Allen Kline show how the variety of properties associated with different groups of people intersect to showcase the unique cultural identity of the state of Oklahoma.</span></blockquote><span data-dcnode-id="2953" instrument_node="">
</span><img alt=" " class="icon" data-dcnode-id="2952" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.okhistory.org/images/publications/Chronicles094.2.jpg&amp;raw"><span data-dcnode-id="2951" instrument_node="">
</span><h2 data-dcnode-id="2949"><span data-dcnode-id="2950" instrument_node="">Volume 94, No. 2 (Summer 2016)</span></h2><span data-dcnode-id="2948" instrument_node="">
</span><p data-dcnode-id="2946"><span data-dcnode-id="2947" instrument_node="">“Waynoka and the Birth of Transcontinental Air Service,” by Thomas A. Wikle and Dale R. Lightfoot</span></p><blockquote data-dcnode-id="2944"><span data-dcnode-id="2945" instrument_node="">When early aviators created a transcontinental airline, Waynoka became a stop on the line where passengers transferred from airplanes to railcars for night travel. Thomas A. Wikle and Dale R. Lightfoot discuss the creation of the TAT line and the impact of its successes and failures on the community and the future of coast-to-coast air travel.</span></blockquote><span data-dcnode-id="2943" instrument_node="">
</span><p data-dcnode-id="2941"><span data-dcnode-id="2942" instrument_node="">“Oklahoma’s Cherokee Outlet and the Development of Cowboy Music and Poetry,” by Shawn Holliday</span></p><blockquote data-dcnode-id="2939"><span data-dcnode-id="2940" instrument_node="">Cowboys in the Cherokee Outlet used songs and poetry to calm nervous herds of cattle. By the 1920s and 1930s these songs were exploited to promote a romanticized version of cowboy life. Shawn Holliday gives examples of poetry and songs created by cowboys, and describes the Cherokee Outlet’s influence on cowboy music and poetry over time.</span></blockquote><span data-dcnode-id="2938" instrument_node="">
</span><p data-dcnode-id="2936"><span data-dcnode-id="2937" instrument_node="">“Political Machinations, Texan Intimidations: The Choctaw Nation Enters the Civil War,” by Zachery C. Cowsert</span></p><blockquote data-dcnode-id="2934"><span data-dcnode-id="2935" instrument_node="">The Civil War deepened intratribal divides, particularly among the Five Tribes in Indian Territory. Missionaries in the Choctaw Nation recorded events surrounding the Confederate-Choctaw alliance in their correspondence. Zachery C. Cowsert analyzes Presbyterian missionary accounts to illustrate that many Choctaws desired neutrality but agreed to a Confederate alliance in the face of violence.</span></blockquote><span data-dcnode-id="2933" instrument_node="">
</span><p data-dcnode-id="2931"><span data-dcnode-id="2932" instrument_node="">“4-H and the 1928 State Fair of Oklahoma: Making the Best Better,” by Darin Nelson</span></p><blockquote data-dcnode-id="2929"><span data-dcnode-id="2930" instrument_node="">At the 1928 State Fair of Oklahoma, the boys and girls of 4-H presented new demonstration booths with a focus on improving the lives of farm families. 4-H Clubs were essential to the rural education efforts in the 1920s. Darin Nelson illustrates the importance of these 4-H booths in preparing a generation for the hardships of the 1930s.</span></blockquote><span data-dcnode-id="2928" instrument_node="">
</span><img alt=" " class="icon" data-dcnode-id="2927" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.okhistory.org/images/publications/Chronicles094.1.jpg&amp;raw"><span data-dcnode-id="2926" instrument_node="">
</span><h2 data-dcnode-id="2924" id="v94"><span data-dcnode-id="2925" instrument_node="">Volume 94, No. 1 (Spring 2016)</span></h2><span data-dcnode-id="2923" instrument_node="">
</span><p data-dcnode-id="2921"><span data-dcnode-id="2922" instrument_node="">“‘Cyclone’ Jones: Dr. Herbert L. Jones and the Origins of Tornado Research in Oklahoma,” by Nani Pybus</span></p><blockquote data-dcnode-id="2919"><span data-dcnode-id="2920" instrument_node="">Because of its location in the heart of Tornado Alley, Oklahoma has been a leader in tornado research. Nani Pybus describes the early days of severe weather research in Oklahoma through the work of Dr. Herbert L. “Cyclone” Jones, a professor at Oklahoma State University, one of the first well-known storm chasers, and an advocate for early warning systems.</span></blockquote><span data-dcnode-id="2918" instrument_node="">
</span><p data-dcnode-id="2916"><span data-dcnode-id="2917" instrument_node="">“‘I Can Come Into Your World But You Can’t Come Into Mine’: John Swanton and Southeastern Oral Narratives” by Brady DeSanti</span></p><blockquote data-dcnode-id="2914"><span data-dcnode-id="2915" instrument_node="">Southeastern Native American societies passed their historical knowledge to the next generation through oral tradition. John Reed Swanton was an anthropologist in the early twentieth century who applied an interdisciplinary approach to the study of Native peoples, and included their stories in his research. Brady DeSanti compares Swanton’s methods with those of more recent anthropologists to show how innovative Swanton’s practices were in comparison to his contemporaries.</span></blockquote><span data-dcnode-id="2913" instrument_node="">
</span><p data-dcnode-id="2911"><span data-dcnode-id="2912" instrument_node="">“The YWCA’s Y-Chapel of Song and the Central Plate,” by Patrick H. Salkeld</span></p><blockquote data-dcnode-id="2909"><span data-dcnode-id="2910" instrument_node=""> In March 1941 the Young Women’s Christian Association (YWCA) proposed the building of a chapel on the campus of Central State College, now the University of Central Oklahoma. Patrick H. Salkeld recounts the fundraising efforts undertaken and design decisions made during the process of constructing the Y-Chapel of Song.</span></blockquote><span data-dcnode-id="2908" instrument_node="">
</span><p data-dcnode-id="2906"><span data-dcnode-id="2907" instrument_node="">“Don’t Knock It: The Holding Company, the Funeral of the Hammer, and the Transformation of Enid, Oklahoma, 1907–12,” by Aaron Preston</span></p><blockquote data-dcnode-id="2904"><span data-dcnode-id="2905" instrument_node=""> In the early twentieth century the Enid Industrial &amp; Holding Company, a committee of the Enid Chamber of Commerce, began a campaign to bring industrial business to the town. Aaron Preston explains the successes and failures of the Holding Company’s efforts.</span></blockquote><span data-dcnode-id="2903" instrument_node="">
</span><img alt=" " class="icon" data-dcnode-id="2902" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.okhistory.org/images/publications/Chronicles093.4.jpg&amp;raw"><h2 data-dcnode-id="2900"><span data-dcnode-id="2901" instrument_node="">Volume 93, No. 4 (Winter 2015–16)</span></h2><span data-dcnode-id="2899" instrument_node="">
</span><p data-dcnode-id="2897"><span data-dcnode-id="2898" instrument_node="">“Turning to the Right: More Oil Patch Songs from Oklahoma,” by Joe W. Specht</span></p><blockquote data-dcnode-id="2895"><span data-dcnode-id="2896" instrument_node="">The rhythm of the Oklahoma oil patch has inspired songwriters from the earliest days of the industry. Songs about labor disputes, hard work in the field, and financial trouble brought attention to life in the oil field and made the everyday lives of oil patch workers relatable. In his article, Joe W. Specht analyzes the music of the oil patch and its impact on the oil industry and society as a whole.</span></blockquote><span data-dcnode-id="2894" instrument_node="">
</span><p data-dcnode-id="2892"><span data-dcnode-id="2893" instrument_node="">“Mummers Theatre: Oklahoma City’s Tinker Toy Building,” by Cynthia Savage</span></p><blockquote data-dcnode-id="2890"><span data-dcnode-id="2891" instrument_node="">The Mummers Theatre group was founded in 1949 as a community theater, and by the 1960s began transitioning to a professional theater company with a new building. The building itself was made possible by Oklahoma City’s urban renewal, and would become an architectural landmark in the city until its 2014 demolition. In this article adapted from her Historic American Buildings Survey documentation, Cynthia Savage chronicles the life of the Mummers Theatre building.</span></blockquote><span data-dcnode-id="2889" instrument_node="">
</span><p data-dcnode-id="2887"><span data-dcnode-id="2888" instrument_node="">“Promises of a Honey Pond and a Fritter Tree: Western Oklahoma Pioneers, 1900–10,” by Cheryl Chesebrough-Caffee</span></p><blockquote data-dcnode-id="2885"><span data-dcnode-id="2886" instrument_node="">The pioneers of western Oklahoma came to the territory seeking opportunities for economic advancement. By leaving mortgaged farms to relocate on free land, these settlers experienced hardships with the promise of prosperity in the future. Cheryl Chesebrough-Caffee details the experiences of homesteaders as they established new communities.</span></blockquote><span data-dcnode-id="2884" instrument_node="">
</span><p data-dcnode-id="2882"><span data-dcnode-id="2883" instrument_node="">“‘All In’: The Rise of Tribal Gaming,” by Kathy Dickson</span></p><blockquote data-dcnode-id="2880"><span data-dcnode-id="2881" instrument_node=""> The roots of tribal gaming reach back to traditional Native games of dexterity and chance. Today’s American Indian casinos generate funds that provide for the general welfare of tribal members. Kathy Dickson describes the struggle over jurisdiction that resulted in compacts to govern tribal gaming.</span></blockquote><span data-dcnode-id="2879" instrument_node="">
</span><img alt=" " class="icon" data-dcnode-id="2878" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.okhistory.org/images/publications/Chronicles093.3.jpg&amp;raw"><h2 data-dcnode-id="2876"><span data-dcnode-id="2877" instrument_node="">Volume 93, No. 3 (Fall 2015)</span></h2><span data-dcnode-id="2875" instrument_node="">
</span><p data-dcnode-id="2873"><span data-dcnode-id="2874" instrument_node="">“Nede Wade ‘Ned’ Christie and the Outlaw Mystique,” by Devon A. Mihesuah</span></p><blockquote data-dcnode-id="2871"><span data-dcnode-id="2872" instrument_node="">The name Ned Christie is familiar in Indian Territory history. The last five years of Nede Wade “Ned” Christie’s life, however, are subject to various interpretations based on scurrilous claims included in newspapers. Devon A. Mihesuah examines court records, family stories, and outlaw literature to paint a portrait of Christie as a wrongly accused man whose reputation suffered long after his death.</span></blockquote><span data-dcnode-id="2870" instrument_node="">
</span><p data-dcnode-id="2868"><span data-dcnode-id="2869" instrument_node="">“Carl Albert: Little Giant of Native America,” by David W. Clark</span></p><blockquote data-dcnode-id="2866"><span data-dcnode-id="2867" instrument_node="">Carl Albert represented Oklahoma’s Third Congressional District from 1947 until 1977, serving six years as Speaker of the US House of Representatives. During his career, he worked as an advocate for American Indians in his district, the state, and the nation by proposing and supporting legislation that would benefit tribes. David W. Clark describes Albert’s years of work on behalf of tribal members, including opposing the policy of tribal termination and embracing the idea of self-determination.</span></blockquote><span data-dcnode-id="2865" instrument_node="">
</span><p data-dcnode-id="2863"><span data-dcnode-id="2864" instrument_node="">“The Twilight of Route 66: Transitioning from Highway to Freeway, 1956–84,” by Frank Norris</span></p><blockquote data-dcnode-id="2861"><span data-dcnode-id="2862" instrument_node="">To many people, the interstate highway system was seen as a harbinger of the demise of the iconic Route 66 and the towns and businesses on the highway. Frank Norris argues that the slow transition to the interstate system on Route 66 was not unique to that roadway, but a template for what took place along other highways at the time.</span></blockquote><span data-dcnode-id="2860" instrument_node="">
</span><p data-dcnode-id="2858"><span data-dcnode-id="2859" instrument_node="">“Did Quanah Parker Lie?,” by Tom Crum and Paul H. Carlson</span></p><blockquote data-dcnode-id="2856"><span data-dcnode-id="2857" instrument_node="">The whereabouts of Quanah Parker, his father Peta Nocona, and his brother on the day of the battle of Pease River, and whether or not Peta Nocona survived the battle, have been debated for decades. By analyzing sources used for both sides of the argument, Tom Crum and Paul H. Carlson present evidence that none of these men were present for the fight, and therefore Peta Nocona could not have been killed in the battle.</span></blockquote><span data-dcnode-id="2855" instrument_node="">
</span><img alt=" " class="icon" data-dcnode-id="2854" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.okhistory.org/images/publications/Chronicles093.2.jpg&amp;raw"><span data-dcnode-id="2853" instrument_node="">
</span><h2 data-dcnode-id="2851"><span data-dcnode-id="2852" instrument_node="">Volume 93, No. 2 (Summer 2015)</span></h2><span data-dcnode-id="2850" instrument_node="">
</span><p data-dcnode-id="2848"><span data-dcnode-id="2849" instrument_node="">“Civilized Captivity: Camp Gruber’s Prisoner of War Camp,” by Trent Riley</span></p><blockquote data-dcnode-id="2846"><span data-dcnode-id="2847" instrument_node="">In May 1943 the first German prisoners of war arrived at Camp Gruber, located near Braggs, Oklahoma. Despite their incarceration, life at the camp was an improvement over conditions in the German army for many of the PWs. Trent Riley describes life in the PW camp at Camp Gruber, as recorded in oral histories by the men who experienced it.</span></blockquote><span data-dcnode-id="2845" instrument_node="">
</span><p data-dcnode-id="2843"><span data-dcnode-id="2844" instrument_node="">“The Early Chisholm Trail to Abilene, Kansas, 1867–71,” by Gary and Margaret Kraisinger</span></p><blockquote data-dcnode-id="2841"><span data-dcnode-id="2842" instrument_node="">The cattle drive from Texas to railheads in Kansas is an indelible part of the memory of the American West. The Chisholm Trail was an important route from southern Texas to Abilene, Kansas, but the route changed over time. Gary and Margaret Kraisinger demonstrate that what would be called the Chisholm Trail followed a more easterly route from 186771.</span></blockquote><span data-dcnode-id="2840" instrument_node="">
</span><p data-dcnode-id="2838"><span data-dcnode-id="2839" instrument_node="">“‘This Faithfulness Destroyed Them’: The Failure of Grant’s Peace Policy Among the Kiowas and Comanches,” by Wayne A. White</span></p><blockquote data-dcnode-id="2836"><span data-dcnode-id="2837" instrument_node="">In his attempts to remove corruption from the Office of Indian Affairs, President Ulysses S. Grant involved Christian denominations, including the Society of Friends, in the execution of American Indian policy. Wayne A. White argues that the Quaker’s Peace Policy not only failed, but never had a chance of success among the Kiowas and Comanches.</span></blockquote><span data-dcnode-id="2835" instrument_node="">
</span><p data-dcnode-id="2833"><span data-dcnode-id="2834" instrument_node="">“The Cherokee Male Seminary Baseball Team, 1876–1908,” by James G. McCullagh</span></p><blockquote data-dcnode-id="2831"><span data-dcnode-id="2832" instrument_node="">The first reported baseball game played by the men of the Cherokee Male Seminary occurred on June 24, 1876. The seminary fielded teams until 1908. James G. McCullagh traces the history of baseball at the Cherokee Male Seminary, chronicling the names of the men who played and the successes and failures of the teams.</span></blockquote><span data-dcnode-id="2830" instrument_node="">
</span><img alt=" " class="icon" data-dcnode-id="2829" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.okhistory.org/images/publications/Chronicles093.1.jpg&amp;raw"><span data-dcnode-id="2828" instrument_node="">
</span><h2 data-dcnode-id="2826" id="v93"><span data-dcnode-id="2827" instrument_node="">Volume 93, No. 1 (Spring 2015)</span></h2><span data-dcnode-id="2825" instrument_node="">
</span><p data-dcnode-id="2823"><span data-dcnode-id="2824" instrument_node="">“The ‘Rise and Fall’ of Indian Colleges in Indian Territory: Indian University, Henry Kendall College, and Other Colleges, 1880–1907,” by Steven J. Crum</span></p><blockquote data-dcnode-id="2821"><span data-dcnode-id="2822" instrument_node="">In the late nineteenth and early twentieth centuries, several colleges for American Indian students were created by missionary groups in the eastern half of Indian Territory. Steven Crum chronicles the rise of these institutions and their decline with the coming of statehood in 1907.</span></blockquote><span data-dcnode-id="2820" instrument_node="">
</span><p data-dcnode-id="2818"><span data-dcnode-id="2819" instrument_node="">“Rooted in the Plains: Oklahoma Women, Community, and the Dust Bowl,” by Shelly Lemons and Steven Knoche Kite</span></p><blockquote data-dcnode-id="2816"><span data-dcnode-id="2817" instrument_node="">To cope with the hard times brought on by the Dust Bowl and the Great Depression, women in the Oklahoma Panhandle fostered a sense of community that bonded them for life. As a part of the Dust Bowl Oral History Project at Oklahoma State University, Shelly Lemons and Steven Knoche Kite investigate the lives of ordinary women in extraordinarily difficult circumstances, and explain why these women remained in this harsh environment.</span></blockquote><span data-dcnode-id="2815" instrument_node="">
</span><p data-dcnode-id="2813"><span data-dcnode-id="2814" instrument_node="">“Short Tenures on the Supreme Court of Oklahoma,” by Von Russell Creel</span></p><blockquote data-dcnode-id="2811"><span data-dcnode-id="2812" instrument_node="">Until after the elections of 1966, justices of the Supreme Court of Oklahoma were elected in partisan elections. For various reasons during this time period, some justices served abnormally short tenures on the supreme court. Von Russell Creel describes these justices and their contributions to the legal history of Oklahoma.</span></blockquote><span data-dcnode-id="2810" instrument_node="">
</span><p data-dcnode-id="2808"><span data-dcnode-id="2809" instrument_node="">“Did Oklahoma African Americans Vote Between 1910 and 1943?,” by R. Darcy</span></p><blockquote data-dcnode-id="2806"><span data-dcnode-id="2807" instrument_node="">African Americans in Oklahoma in the early twentieth century had to overcome institutional racism in their attempts to be heard at the ballot box. In his analysis of election results, Robert Darcy posits that African Americans voted at a higher rate than could be surmised from the legal obstacles placed before them by the Oklahoma Legislature.</span></blockquote><span data-dcnode-id="2805" instrument_node="">
</span><img alt=" " class="icon" data-dcnode-id="2804" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.okhistory.org/images/publications/Chronicles092.4.jpg&amp;raw"><span data-dcnode-id="2803" instrument_node="">
</span><h2 data-dcnode-id="2801" id="issue2014"><span data-dcnode-id="2802" instrument_node="">Volume 92, No. 4 (Winter 2014–15)</span></h2><span data-dcnode-id="2800" instrument_node="">
</span><p data-dcnode-id="2798"><span data-dcnode-id="2799" instrument_node="">“Mary Alice Hearrell Murray: A Chickasaw Girl in Indian Territory,” by Linda Williams Reese</span></p><blockquote data-dcnode-id="2796"><span data-dcnode-id="2797" instrument_node="">The influence of wives of notable men is often underestimated. Mary Alice Hearrell Murray was an educated, well-connected young woman when she married attorney and future Oklahoma Governor William “Alfalfa Bill” Murray. As part of an ongoing study, Linda Williams Reese examines the early life of Alice Hearrell Murray and her impact on the beginning of her husband’s career.</span></blockquote><span data-dcnode-id="2795" instrument_node="">
</span><p data-dcnode-id="2793"><span data-dcnode-id="2794" instrument_node="">“John Aaron: Oklahoma’s Legendary Steely-Eyed Missile Man,” by Andrew L. Warren</span></p><blockquote data-dcnode-id="2791"><span data-dcnode-id="2792" instrument_node="">Since the establishment of the National Aeronautics and Space Administration (NASA), Oklahomans have played a significant role in the agency’s exploration of space. John Aaron was a mainstay in Mission Control for many years, securing his legacy as a “steely-eyed missile man” during the Apollo XIII crisis. In his article, Andrew L. Warren describes how the hardscrabble boy from southwestern Oklahoma became a NASA legend.</span></blockquote><span data-dcnode-id="2790" instrument_node="">
</span><p data-dcnode-id="2788"><span data-dcnode-id="2789" instrument_node="">“Hamlin Garland’s Oklahoma, 1900–05,” by Lonnie E. Underhill</span></p><blockquote data-dcnode-id="2786"><span data-dcnode-id="2787" instrument_node="">Pulitzer Prize-winning author and social reformer Hamlin Garland spent much time visiting the Southern Cheyenne and Arapaho Reservation under the guidance of John Seger. During his visits, Garland gathered anecdotes about the American Indians to include in his collections of stories. Lonnie E. Underhill relates the ways in which Garland’s travels in the area that would become Oklahoma influenced his view of American Indians and changed his ideas about farming and ranching.</span></blockquote><span data-dcnode-id="2785" instrument_node="">
</span><p data-dcnode-id="2783"><span data-dcnode-id="2784" instrument_node="">“‘One Who Was Trusted’: E. L. Mitchell of Western Oklahoma, Part Two,” by Paul F. Lambert</span></p><blockquote data-dcnode-id="2781"><span data-dcnode-id="2782" instrument_node="">Elza Leon “E. L.” Mitchell was a newspaper editor and publisher in western Oklahoma who became a fixture in the political life of that region. In part two of his work, Paul F. Lambert discusses Mitchell’s political career and legacy as a staunch Democrat.</span></blockquote><span data-dcnode-id="2780" instrument_node="">
</span><img alt=" " class="icon" data-dcnode-id="2779" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.okhistory.org/images/publications/Chronicles092.3.jpg&amp;raw"><span data-dcnode-id="2778" instrument_node="">
</span><h2 data-dcnode-id="2776"><span data-dcnode-id="2777" instrument_node="">Volume 92, No. 3 (Fall 2014)</span></h2><span data-dcnode-id="2775" instrument_node="">
</span><p data-dcnode-id="2773"><span data-dcnode-id="2774" instrument_node="">“Rodeo in Oklahoma is Women’s Business: How Lucille Mulhall’s Fame Created Opportunity in Rodeo,” by Tracey Hanshew</span></p><blockquote data-dcnode-id="2771"><span data-dcnode-id="2772" instrument_node="">Today rodeo accounts for a significant portion of Oklahoma’s equine industry. The transformation of rodeo into a business can, in part, be traced to the career of Lucille Mulhall, the “Cowpuncher Queen of Oklahoma Territory.” In her article, Tracey Hanshew describes Mulhall’s contributions to the business of rodeo in Oklahoma and beyond.</span></blockquote><span data-dcnode-id="2770" instrument_node="">
