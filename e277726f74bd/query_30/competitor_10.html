</span><blockquote data-dcnode-id="957"><span data-dcnode-id="958" instrument_node="">Although the Yuchi tribe was politically incorporated into the larger Muscogee Nation after removal, the people maintain an autonomous existence as a socially encompassed community in three ceremonial grounds south and west of Tulsa. Jason Jackson explores the community organizations and ritual practices of the Yuchis as they continue to preserve their culture, history, and values in ground camps and foodways. </span></blockquote><span data-dcnode-id="956" instrument_node="">
</span><p data-dcnode-id="954"><span data-dcnode-id="955" instrument_node="">“Fred Tecumseh Waite: The Outlaw Statesman,” by Michael Tower, 190–217 </span></p><span data-dcnode-id="953" instrument_node="">
</span><blockquote data-dcnode-id="951"><span data-dcnode-id="952" instrument_node="">Fred Tecumseh Waite grew up as a mixed-blood Chickasaw in southern Indian Territory near present Pauls Valley. But as a young man, he left the territory for points west and became involved in the Lincoln County War in New Mexico Territory. Michael Tower recounts Waite’s actions in the most lawless range war ever recorded, and how he turned his life around when he returned home to become active in Chickasaw politics. </span></blockquote><span data-dcnode-id="950" instrument_node="">
</span><img alt=" " class="icon" data-dcnode-id="949" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.okhistory.org/images/publications/Chronicles075.jpg&amp;raw"><h2 data-dcnode-id="947" id="v76"><span data-dcnode-id="948" instrument_node="">Volume 76, No. 1 (Sping 1998) </span></h2><span data-dcnode-id="946" instrument_node="">
</span><p data-dcnode-id="944"><span data-dcnode-id="945" instrument_node="">“‘Softened as into a Dream’: The Letters of Robert B. Huston, Oklahoma Rough Rider,” by Joe L. Todd, 4–19</span></p><span data-dcnode-id="943" instrument_node="">
</span><blockquote data-dcnode-id="941"><span data-dcnode-id="942" instrument_node="">Robert Bell Huston left his wife and young son behind when he answered the call to arms after the United States declared war on Spain in 1898. The Guthrie attorney fought in Cuba and the Philippines as captain of Troop D of the First United States Volunteers. Using excerpts from the poignant letters Huston and his family exchanged, Joe Todd describes the wartime experience of the Oklahoma Rough Rider.</span></blockquote><span data-dcnode-id="940" instrument_node="">
</span><p data-dcnode-id="938"><span data-dcnode-id="939" instrument_node="">“The Closing of Cordell Christian College: A Microcosm of American Intolerance during World War I,” by Michael W. Casey, 20–37</span></p><span data-dcnode-id="937" instrument_node="">
</span><blockquote data-dcnode-id="933"><span data-dcnode-id="936" instrument_node="">During World War I Oklahoma was the scene for numerous attacks on those who opposed the war. Nowhere was that more evident than in Cordell, where the Washita County Council of Defense targeted the Cordell Christian College for closure because of perceived dissension and pacifist teachings. Michael Casey explores the events that in effect produced a “microcosm of American intolerance.” </span><p data-dcnode-id="935"></p><span data-dcnode-id="934" instrument_node="">
</span></blockquote><p data-dcnode-id="931"><span data-dcnode-id="932" instrument_node="">“‘We are making history’: The Execution of William Going,” by Louis Coleman, 38–47 </span></p><span data-dcnode-id="930" instrument_node="">
</span><blockquote data-dcnode-id="928"><span data-dcnode-id="929" instrument_node="">Previous scholarship holds that the last Choctaw execution took place in 1894. That distinction, however, goes instead to that of William Going on July 13, 1899, a case adjudicated in the waning days of Choctaw sovereignty. Louis Coleman explains the issues involved in the dispute between confident Choctaw officials and the United States government which attempted to intervene.</span></blockquote><span data-dcnode-id="927" instrument_node="">
</span><p data-dcnode-id="925"><span data-dcnode-id="926" instrument_node="">“Occupying the Middle Ground: African Creeks in the First Indian Home Guard, 1862–1865,” by Gary Zellar, 48–71 </span></p><span data-dcnode-id="924" instrument_node="">
</span><blockquote data-dcnode-id="922"><span data-dcnode-id="923" instrument_node="">Free blacks and former slaves from the Creek and Seminole nations in the Indian Territory were the first African Americans mustered into the United States Army during the Civil War. They served as soldiers, interpreters, negotiators, clerks, orderlies, and scouts. Gary Zellar focuses on the brave men who were essential elements and cultural bridges in the tri-racial First Indian Home Guard Regiment. </span></blockquote><span data-dcnode-id="921" instrument_node="">
</span><p data-dcnode-id="919"><span data-dcnode-id="920" instrument_node="">“Learning from Oklahoma: Who We Are and Where We Are,” by Fred Wiemer, 72–86 </span></p><span data-dcnode-id="918" instrument_node="">
</span><blockquote data-dcnode-id="916"><span data-dcnode-id="917" instrument_node="">In the early 1990s Fred Wiemer returned to his native state to “discover the nineteenth century” in Oklahoma. Drawing on lessons learned from two important books on architecture, Wiemer studied and photographed the state’s built environment. In this thoughtful essay Wiemer explains why Oklahoma’s architectural future must celebrate its earthly setting and be linked to the best of the past. </span></blockquote><span data-dcnode-id="915" instrument_node="">
</span><img alt=" " class="icon" data-dcnode-id="914" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.okhistory.org/images/publications/Chronicles076.jpg&amp;raw"><h2 data-dcnode-id="912" id="issue1997"><span data-dcnode-id="913" instrument_node="">Volume 75, No. 4 (Winter 1997–1998) </span></h2><p class="backtotop" data-dcnode-id="909"><a data-dcnode-id="910" href="#top"><span data-dcnode-id="911" instrument_node="">Back to top</span></a></p><span data-dcnode-id="908" instrument_node="">
</span><p data-dcnode-id="906"><span data-dcnode-id="907" instrument_node="">“Otto Gray and his Oklahoma Cowboys: The Country’s First Commercial Western Band,” by Carla Chlouber, 356–383</span></p><span data-dcnode-id="905" instrument_node="">
</span><blockquote data-dcnode-id="903"><span data-dcnode-id="904" instrument_node="">Today the cowboy image is firmly established as a part of country and western music. The roots of its popularity can be found in the success and recognition enjoyed by Otto Gray and his Oklahoma Cowboys in the 1920s and 1930s. Carla Chlouber traces the evolution of the first band to wear western clothing, perform on the radio, and tour the country, one that set the stage for all that followed.</span></blockquote><span data-dcnode-id="902" instrument_node="">
</span><p data-dcnode-id="900"><span data-dcnode-id="901" instrument_node="">“Snakes and Scribes: The Dawes Commission and the Enrollment of the Creeks,” by Kent Carter, 384–413 </span></p><span data-dcnode-id="899" instrument_node="">
</span><blockquote data-dcnode-id="897"><span data-dcnode-id="898" instrument_node="">In 1893 the United States government appointed three commissioners to negotiate with the Five Civilized Tribes to bring about the allotment of their land. The so-called Dawes Commission spent more than a decade in the Creek Nation trying to develop a correct role of members eligible for allotment. Kent Carter describes the almost impossible task facing a large bureaucracy and a resistant Indian people. </span></blockquote><span data-dcnode-id="896" instrument_node="">
</span><p data-dcnode-id="894"><span data-dcnode-id="895" instrument_node="">“Helen Churchill Candee: Author of An Oklahoma Romance,” by Linda D. Wilson, 414–425 </span></p><span data-dcnode-id="893" instrument_node="">
</span><blockquote data-dcnode-id="891"><span data-dcnode-id="892" instrument_node="">Helen Churchill Candee came to Guthrie, Oklahoma Territory, in 1895 to obtain a divorce from her husband. While resident in Guthrie, Candee cast a discerning eye on the new territory and its people and later reported her observations in four magazine articles and a novel. Linda Wilson paints a lively portrait of the privileged woman who became the young territory’s most important woman writer. </span></blockquote><span data-dcnode-id="890" instrument_node="">
</span><p data-dcnode-id="888"><span data-dcnode-id="889" instrument_node="">“The Politics of History: Tinker Air Force Base and the Enola Gay,” by James L. Crowder, 426–439 </span></p><span data-dcnode-id="887" instrument_node="">
</span><blockquote data-dcnode-id="885"><span data-dcnode-id="886" instrument_node="">For decades former civilian and military personnel at Tinker Air Force Base have proudly and steadfastly claimed they helped modify the famous plane known as the Enola Gay for its historic bombing mission over Hiroshima in 1945. Believing that the politics of history often create intriguing myths, James Crowder takes a new and closer look at the official records to separate fact from fiction. </span></blockquote><span data-dcnode-id="884" instrument_node="">
</span><p data-dcnode-id="882"><span data-dcnode-id="883" instrument_node="">“William Fremont Harn: Maverick or Mystery?” by Trina Medley, 440–456 </span></p><span data-dcnode-id="881" instrument_node="">
</span><blockquote data-dcnode-id="879"><span data-dcnode-id="880" instrument_node="">The manner in which the Unassigned Lands were opened to settlement in 1889 resulted in years of litigation over land claims. William Harn joined the mix of settlers, speculators, and sooners as a special agent to sort out the legal tangles. Trina Medley explores those and subsequent endeavors of an enigmatic man who made Oklahoma City his home, but never became quite the mover and shaker he wanted to be. </span></blockquote><span data-dcnode-id="878" instrument_node="">
</span><img alt=" " class="icon" data-dcnode-id="877" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.okhistory.org/images/publications/Chronicles077.jpg&amp;raw"><h2 data-dcnode-id="875"><span data-dcnode-id="876" instrument_node="">Volume 75, No. 3 (Fall 1997) </span></h2><span data-dcnode-id="874" instrument_node="">
</span><p data-dcnode-id="872"><span data-dcnode-id="873" instrument_node="">“River Rock Resort: Medicine Park’s Landscape and Wichita Mountain Vernacular Architecture,” by Peter J. McCormick, 244–261 </span></p><span data-dcnode-id="871" instrument_node="">
</span><blockquote data-dcnode-id="869"><span data-dcnode-id="870" instrument_node="">A thriving summer resort in the early twentieth century, Medicine Park today resembles little of its former self. Peter McCormick describes the area’s landscape, its unique cobblestone architecture, and the resort’s history in the context of a nationwide health spa/resort movement. He concludes by relating past and current efforts to restore Medicine Park and revitalize the community.</span></blockquote><span data-dcnode-id="868" instrument_node="">
</span><p data-dcnode-id="866"><span data-dcnode-id="867" instrument_node="">“A Taxing Matter: The Dispute over the Estate of Tom Slick, 1930–1932,” by Ray Miles, 262–279</span></p><span data-dcnode-id="865" instrument_node="">
</span><blockquote data-dcnode-id="863"><span data-dcnode-id="864" instrument_node="">When oil man Thomas B. Slick died in the summer of 1930, he left an estate estimated at $35–100 million. Oklahoma hoped to cash in on its share of inheritance taxes by proving Slick was an Oklahoma resident. As Ray Miles points out, the ensuing two-year battle pitted the state’s governor against other state officials and the estate’s trustees for what in the end was a mere pittance.</span></blockquote><span data-dcnode-id="862" instrument_node="">
</span><p data-dcnode-id="860"><span data-dcnode-id="861" instrument_node="">“‘Stars in a Dark Night’: The Education of Indian Youth at Choctaw Academy,” by Marjorie Hall Young, 280–305 </span></p><span data-dcnode-id="859" instrument_node="">
</span><blockquote data-dcnode-id="857"><span data-dcnode-id="858" instrument_node="">Between 1825 and the mid-1840s, many of the brightest and most promising leaders of the Choctaw Nation and other Indian tribes received their education at the Choctaw Academy established by Richard Mentor Johnson on his Kentucky farm. Marjorie Hall Young recounts the history of the enterprise that was a potent force in advancing the welfare and prosperity of many young American Indians. </span></blockquote><span data-dcnode-id="856" instrument_node="">
</span><p data-dcnode-id="854"><span data-dcnode-id="855" instrument_node="">“Altus Air Force Base: Sentinel of Southwest Oklahoma,” by Leo Kelley, 306–319</span></p><span data-dcnode-id="853" instrument_node="">
</span><blockquote data-dcnode-id="851"><span data-dcnode-id="852" instrument_node="">When the United States entered World War II, the Army Air Corps clearly faced a critical shortage of aircraft and trained pilots. Altus officials successfully lobbied for a training facility which opened as Altus Army Air Field in 1943. Leo Kelley provides a brief history of the installation, its continuing importance to the city of Altus, and its role today in the nation’s overall defense mission.</span></blockquote><span data-dcnode-id="850" instrument_node="">
</span><p data-dcnode-id="848"><span data-dcnode-id="849" instrument_node="">“William Shorey Coodey: The Cherokee Statesman,” by Tiffany Coodey, 320–331 </span></p><span data-dcnode-id="847" instrument_node="">
</span><blockquote data-dcnode-id="845"><span data-dcnode-id="846" instrument_node="">W. S. Coodey came of age during the immediate pre-removal period, and under the tutelage of his uncle, Cherokee Chief John Ross, he served as delegate to Washington on several occasions in an attempt to forestall removal. Tiffany Coodey provides a telling portrait of an ancestor who devoted his life to his people, including writing the 1839 Cherokee Constitution and serving as first president of the National Committee. </span></blockquote><span data-dcnode-id="844" instrument_node="">
</span><img alt=" " class="icon" data-dcnode-id="843" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.okhistory.org/images/publications/Chronicles078.jpg&amp;raw"><h2 data-dcnode-id="841"><span data-dcnode-id="842" instrument_node="">Volume 75, No. 2 (Summer 1997) </span></h2><span data-dcnode-id="840" instrument_node="">
</span><p data-dcnode-id="838"><span data-dcnode-id="839" instrument_node="">“New Deal Building Programs: The FERA, the WPA, and the Mangum Community Building,” by Cynthia J. Savage, 116–127 </span></p><span data-dcnode-id="837" instrument_node="">
</span><blockquote data-dcnode-id="835"><span data-dcnode-id="836" instrument_node="">As the nationwide depression deepened in the 1930s, the Roosevelt administration initiated a number of agencies to stimulate the economy and assist citizens. Cynthia Savage provides an account of the depression’s effect on southwestern Oklahoma and how two federal programs combined with local and state workers to provide relief and jobs in the construction of the Mangum Community Building. </span></blockquote><span data-dcnode-id="834" instrument_node="">
</span><p data-dcnode-id="832"><span data-dcnode-id="833" instrument_node="">“Forgotten Challengers to Severalty: The National Indian Defense Association and Council Fire,” by Jo Lea Wetherilt Behrens, 128–159</span></p><span data-dcnode-id="831" instrument_node="">
</span><blockquote data-dcnode-id="829"><span data-dcnode-id="830" instrument_node="">In the 1880s the issue of immediate allotment in severalty for Native Americans found fervent support among many reform groups. The National Indian Defense Association alone took a more conservative approach by calling for gradual assimilation and retention of tribal government. Jo Behrens explores the NIDA’s philosophy and strategy as expressed by Thomas Bland and others in the pages of Council Fire.</span></blockquote><span data-dcnode-id="828" instrument_node="">
</span><p data-dcnode-id="826"><span data-dcnode-id="827" instrument_node="">“Painted Red: The Coal Strike of 1919,” by Steven L. Sewell, 160–181</span></p><span data-dcnode-id="825" instrument_node="">
</span><blockquote data-dcnode-id="823"><span data-dcnode-id="824" instrument_node="">In the fall of 1919 coal miners in Oklahoma joined a nationwide strike that coincided with collective paranoia about perceived radicals and foreigners taking over government and industry. Steven Sewell recounts events as they played out in Oklahoma, a scenario that included a sometimes confrontational governor, deployment of the National Guard, martial law, and volunteer “green men” working in the mines. </span></blockquote><span data-dcnode-id="822" instrument_node="">
</span><p data-dcnode-id="820"><span data-dcnode-id="821" instrument_node="">“From Rackets to Ranches: Al Capone and the 101 Ranch,” by Glen A. Phillips, Jr., 182–195 </span></p><span data-dcnode-id="819" instrument_node="">
</span><blockquote data-dcnode-id="817"><span data-dcnode-id="818" instrument_node="">In late summer, 1932, Oklahomans learned the imprisoned Chicago gangster Al Capone and his brothers had expressed interest in buying the world-famous Miller Brothers 101 Ranch near Ponca City. Glen Phillips describes efforts by showman Zack Miller to court the Capones’ favor and the actions of an opportunistic go-between who undoubtedly ruined Miller’s opportunity to revitalize his family’s operation.</span></blockquote><span data-dcnode-id="816" instrument_node="">
</span><p data-dcnode-id="814"><span data-dcnode-id="815" instrument_node="">“Mary Rice Greenfield: Pioneer Educator of Oklahoma Territory,” by Joyce Waggoner, 196–217 </span></p><span data-dcnode-id="813" instrument_node="">
</span><blockquote data-dcnode-id="811"><span data-dcnode-id="812" instrument_node="">Mary Rice Greenfield began her teaching career in 1893 in a small community near Watonga, Oklahoma, then served on the faculty at Southwestern State Normal School in Weatherford during its infancy before moving on to a long career at Friends University in Kansas. Joyce Waggoner summarizes the life and times of a pioneer Oklahoman whose legacy lives well beyond her lifetime.</span></blockquote><span data-dcnode-id="810" instrument_node="">
</span><img alt=" " class="icon" data-dcnode-id="809" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.okhistory.org/images/publications/Chronicles079.jpg&amp;raw"><h2 data-dcnode-id="807" id="v75"><span data-dcnode-id="808" instrument_node="">Volume 75, No. 1 (Sping 1997)</span></h2><span data-dcnode-id="806" instrument_node="">
</span><p data-dcnode-id="804"><span data-dcnode-id="805" instrument_node="">“Past and Future: The Life of the Oklahoma Jewish Community,” by Amy Hill Shevitz, 4–19 </span></p><span data-dcnode-id="803" instrument_node="">
</span><blockquote data-dcnode-id="801"><span data-dcnode-id="802" instrument_node="">Very little has been written about the Jews who settled in and contributed to Oklahoma communities. Amy Shevitz candidly explores the development of the Oklahoma Jewish community in the context of national trends and the state’s history of boom-and-bust economy, and concludes with important questions about the future of Oklahoma Jewry. </span></blockquote><span data-dcnode-id="800" instrument_node="">
</span><p data-dcnode-id="798"><span data-dcnode-id="799" instrument_node="">“‘I Want You All to Come’: John C. Walton and America’s Greatest Barbecue,” by William Warren Rogers, 20–31</span></p><span data-dcnode-id="797" instrument_node="">
</span><blockquote data-dcnode-id="793"><span data-dcnode-id="796" instrument_node="">One of the most unique gubernatorial inaugurations in the nation occurred in Oklahoma in 1923. Governor-elect John C. Walton invited all Oklahomans to a large barbecue and an old-fashioned square dance at the state fairgrounds. William Rogers, an admitted barbecue devotee, describes a culinary event of historic proportions when thousands of Oklahomans enjoyed “the barbecue of all barbecues.” </span><p data-dcnode-id="795"></p><span data-dcnode-id="794" instrument_node="">
</span></blockquote><p data-dcnode-id="791"><span data-dcnode-id="792" instrument_node="">“Lowell Mason, Samuel A. Worcester, and The Cherokee Singing Book,” by William R. Lee, 32–51 </span></p><span data-dcnode-id="790" instrument_node="">
</span><blockquote data-dcnode-id="788"><span data-dcnode-id="789" instrument_node="">As early as 1829 Reverend Samuel Worcester and others developed a text-only hymn book for the Cherokees printed in the Sequoyan syllabary, but they lacked the means of providing fundamental musical instruction. William Lee provides a fascinating account of efforts by Worcester and New England evangelical Lowell Mason to compile The Cherokee Singing Book (1846) which included musical notation. </span></blockquote><span data-dcnode-id="787" instrument_node="">
</span><p data-dcnode-id="785"><span data-dcnode-id="786" instrument_node="">“‘Fortunate Enough and Plucky Enough’: The Unattached Women of the Cherokee Outlet,” by Debbie Kindt Michalke, 52–69</span></p><span data-dcnode-id="784" instrument_node="">
</span><blockquote data-dcnode-id="782"><span data-dcnode-id="783" instrument_node="">Among the thousands of would-be settlers who rushed for land during the opening of the Cherokee Outlet in 1893 were a number of unattached women determined to match their mettle with others making the run. Debbie Michalke relates the experiences of single women such as Laura Crews who successfully staked claims and stayed to make significant contributions to the development of present-day Oklahoma.</span></blockquote><span data-dcnode-id="781" instrument_node="">
</span><p data-dcnode-id="779"><span data-dcnode-id="780" instrument_node="">“‘Oklahomy Folks Says ’em Different’: Axes of Linguistic Variation in Oklahoma,” by Thomas Wikle and Guy Bailey, 70–81 </span></p><span data-dcnode-id="778" instrument_node="">
</span><blockquote data-dcnode-id="776"><span data-dcnode-id="777" instrument_node="">A character in John Steinbeck’s The Grapes of Wrath remarked that “Ever’body says words different.” Non-Oklahomans, especially, recognize that the speech of Oklahomans is distinctive. Tom Wikle and Guy Bailey explain why in an interesting and thought-provoking study of various linguistic differences based on factors such as age, education, ethnicity, and residence location and size. </span></blockquote><span data-dcnode-id="775" instrument_node="">
</span><img alt=" " class="icon" data-dcnode-id="774" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.okhistory.org/images/publications/Chronicles063.jpg&amp;raw"><h2 data-dcnode-id="772" id="issue1996"><span data-dcnode-id="773" instrument_node="">Volume 74, No. 4 (Winter 1996–1997) </span></h2><p class="backtotop" data-dcnode-id="769"><a data-dcnode-id="770" href="#top"><span data-dcnode-id="771" instrument_node="">Back to top</span></a></p><span data-dcnode-id="768" instrument_node="">
</span><p data-dcnode-id="766"><span data-dcnode-id="767" instrument_node="">“Organizing Wide-awake Farmers: John A. Simpson and the Oklahoma Farmers’ Union,” by James C. Milligan and L. David Norris, 356–383 </span></p><span data-dcnode-id="765" instrument_node="">
</span><blockquote data-dcnode-id="763"><span data-dcnode-id="764" instrument_node="">In 1907 the Oklahoma Farmers’ Union was one of only a few public voices for the state’s farmers, but it became almost defunct after statehood because of poor leadership. James Milligan and David Norris chronicle the efforts of state president John A. Simpson to revitalize the union between 1916 and 1934 into a viable cooperative and educational organization.</span></blockquote><span data-dcnode-id="762" instrument_node="">
</span><p data-dcnode-id="760"><span data-dcnode-id="761" instrument_node="">“Toll Roads and Railroads: A Case of Economic Conflict in the Choctaw Nation, 1870–1876,” by David Bowden, 384–397</span></p><span data-dcnode-id="759" instrument_node="">
</span><blockquote data-dcnode-id="757"><span data-dcnode-id="758" instrument_node="">The Missouri, Kansas, and Texas Railroad received authorization to construct a line through eastern Indian Territory in the early 1870s. The Five Tribes, however, received little benefit from the intrusion of an impersonal, often greedy corporation. David Bowden recounts the problems one Choctaw citizen-by-marriage encountered when he sought compensation for damage the railroad caused to his toll road and bridge.</span></blockquote><span data-dcnode-id="756" instrument_node="">
</span><p data-dcnode-id="754"><span data-dcnode-id="755" instrument_node="">“Oklahoma’s Exiles: William H. Murray and Friends in the Bolivian Chaco, 1924–1929,” by Aaron Bachhofer II, 398–425</span></p><span data-dcnode-id="753" instrument_node="">
</span><blockquote data-dcnode-id="751"><span data-dcnode-id="752" instrument_node="">After World War I many Americans became disillusioned with the processes that were turning the nation into an increasingly urbanized giant. As a result, many of them, including Oklahoma’s own William H. Murray, sought better fortune in Europe and elsewhere. Aaron Bachhofer describes the experiences of Murray and his followers at Murray’s Bolivian colony in the 1920s and the causes of its ultimate failure.</span></blockquote><span data-dcnode-id="750" instrument_node="">
</span><p data-dcnode-id="748"><span data-dcnode-id="749" instrument_node="">“‘Not An Upright Stick Remained’: Oklahoma, Home of the Real Twisters,” by Leo Kelley, 426–435</span></p><span data-dcnode-id="747" instrument_node="">
</span><blockquote data-dcnode-id="745"><span data-dcnode-id="746" instrument_node="">Movie audiences across the nation experienced Hollywood’s version of a “twister” in 1996 in a film loaded with special effects. For Oklahomans who live in tornado alley, however, the reality of the deadly storms has been death and destruction. Leo Kelley focuses on the 1897 Chandler tornado and the 1905 Snyder storm to demonstrate the potential fury residents face almost daily during tornado season. </span></blockquote><span data-dcnode-id="744" instrument_node="">
</span><p data-dcnode-id="742"><span data-dcnode-id="743" instrument_node="">“‘Until the Mothers are Reached’: Field Matrons on the Cheyenne and Arapaho Reservation,” by Joel J. Schmidt, 436–445</span></p><span data-dcnode-id="741" instrument_node="">
</span><blockquote data-dcnode-id="739"><span data-dcnode-id="740" instrument_node="">The Office of Indian Affairs in the late nineteenth century created several programs designed to dismantle traditional Indian culture. Among them was the field matron who would “Americanize” the tribe by educating the Indian women. Joel Schmidt explores the experiences of a dozen matrons on the Cheyenne-Arapaho Reservation in western Oklahoma and how their attitudes and Indian resistance doomed the program. </span></blockquote><span data-dcnode-id="738" instrument_node="">
</span><img alt=" " class="icon" data-dcnode-id="737" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.okhistory.org/images/publications/Chronicles064.jpg&amp;raw"><h2 data-dcnode-id="735"><span data-dcnode-id="736" instrument_node="">Volume 74, No. 3 (Fall 1996)</span></h2><span data-dcnode-id="734" instrument_node="">
</span><p data-dcnode-id="732"><span data-dcnode-id="733" instrument_node="">“Gaudy, Swift, and Reckless: The Victory Flying Circus Comes to Oklahoma,” by Lawrence Carroll Allin, 244–263 </span></p><span data-dcnode-id="731" instrument_node="">
</span><blockquote data-dcnode-id="729"><span data-dcnode-id="730" instrument_node="">In 1919 the Army Air Service’s Victory Flying Circus appeared in Oklahoma to raise revenues to pay off war debts from the first world war. Onlookers also witnessed exciting aerial maneuvers by some of the nation’s best pilots. Lawrence Carroll Allin provides a fascinating account of the circus’s performances and discusses Oklahomans’ contributions to the Victory Loan Drive.</span></blockquote><span data-dcnode-id="728" instrument_node="">
</span><p data-dcnode-id="726"><span data-dcnode-id="727" instrument_node="">“A Reexamination of WPA Excavations at Novotny Site: Adaptations by Early Removal Chickasaws,” by Robert L. Brooks, 264–283</span></p><span data-dcnode-id="725" instrument_node="">
</span><blockquote data-dcnode-id="723"><span data-dcnode-id="724" instrument_node="">The removal of southeastern Indian tribes to the Indian Territory represents an excellent research opportunity for archaeologists, but unfortunately little study of the immediate postremoval period has been conducted. Robert L. Brooks reopens the investigation of one of four Chickasaw sites begun by WPA workers in the 1930s to analyze the tribe’s adaptive responses to removal.</span></blockquote><span data-dcnode-id="722" instrument_node="">
</span><p data-dcnode-id="720"><span data-dcnode-id="721" instrument_node="">“Chinese Exclusion in Oklahoma: A Case of Overt Discrimination,” by Jay R. Dew, 284–291 </span></p><span data-dcnode-id="719" instrument_node="">
</span><blockquote data-dcnode-id="717"><span data-dcnode-id="718" instrument_node="">Oklahoma never had a large Chinese population or suffered anti-Chinese riots, but the state used the same legal measures as the rest of the nation to exclude and deport Chinese residents. Jay R. Dew briefly explains how those laws worked against all Chinese, then describes the several cases of Chinese exclusion in Oklahoma in the late territorial period.</span></blockquote><span data-dcnode-id="716" instrument_node="">
</span><p data-dcnode-id="714"><span data-dcnode-id="715" instrument_node="">“Woodward’s William E. ‘Billy’ Bolton: Good Citizen, Hard Worker, Deep Thinker,” by William D. Welge, 292–301 </span></p><span data-dcnode-id="713" instrument_node="">
</span><blockquote data-dcnode-id="711"><span data-dcnode-id="712" instrument_node="">William E. “Billy” Bolton moved to Woodward, Oklahoma, in 1894, a year after the opening of the Cherokee Outlet, to establish a newspaper. He became one of the town’s leading citizens and expanded his involvement to prominent state organizations. William D. Welge explores the life and times of a man who helped build one of the premier towns of northwest Oklahoma.</span></blockquote><span data-dcnode-id="710" instrument_node="">
</span><p data-dcnode-id="708"><span data-dcnode-id="709" instrument_node="">“Oklahoma and the Medal of Honor,” by John C. Powell, 302–331 </span></p><span data-dcnode-id="707" instrument_node="">
</span><blockquote data-dcnode-id="705"><span data-dcnode-id="706" instrument_node="">Oklahomans have always had a strong presence in the nation’s armed services and among them are nineteen Medal of Honor recipients, more than any other state with comparable population. Following a brief history of the nation’s highest military award, John C. Powell chronicles Oklahoma’s Roll of Honor along with the military situation and text of each citation. </span></blockquote><span data-dcnode-id="704" instrument_node="">
</span><img alt=" " class="icon" data-dcnode-id="703" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.okhistory.org/images/publications/Chronicles065.jpg&amp;raw"><h2 data-dcnode-id="701"><span data-dcnode-id="702" instrument_node="">Volume 74, No. 2 (Summer 1996)</span></h2><span data-dcnode-id="700" instrument_node="">
</span><p data-dcnode-id="698"><span data-dcnode-id="699" instrument_node="">“‘Let’s Make It Happen’: W.W. Keeler and Cherokee Renewal,” by Marjorie J. Lowe, 116–129 </span></p><span data-dcnode-id="697" instrument_node="">
</span><blockquote data-dcnode-id="695"><span data-dcnode-id="696" instrument_node="">Between 1949 and 1975 William Wayne Keeler served both as appointed and elected chief of the Cherokee Nation and as chief executive officer of Phillips Petroleum Company. During that time the tribe instituted a number of social and cultural projects. Marjorie Lowe, herself a Cherokee, details Keeler’s personal and professional leadership, which enabled the Cherokees to achieve unprecedented reconstruction and renewal.</span></blockquote><span data-dcnode-id="694" instrument_node="">
</span><p data-dcnode-id="692"><span data-dcnode-id="693" instrument_node="">“The Search for Fountain Camp: Locating Washington Irving’s October 20, 1832, Encampment in Oklahoma,” by Carla Chlouber, 130–145</span></p><span data-dcnode-id="691" instrument_node="">
</span><blockquote data-dcnode-id="689"><span data-dcnode-id="690" instrument_node="">In 1832 writer Washington Irving joined the first official United States expedition through the central part of Indian Territory. Historians have identified several of the places where the party camped, but not the location of the encampment for October 20 in what is now Payne County. Carla Chlouber reviews the primary documents and the landscape to determine the probable site of the famous author’s encampment.</span></blockquote><span data-dcnode-id="688" instrument_node="">
</span><p data-dcnode-id="686"><span data-dcnode-id="687" instrument_node="">“A Saloon on Every Corner: Whiskey Towns of Oklahoma Territory, 1889–1907,” by Blake Gumprecht, 146–173</span></p><span data-dcnode-id="685" instrument_node="">
</span><blockquote data-dcnode-id="683"><span data-dcnode-id="684" instrument_node="">Prior to statehood, dozens of towns sprang up in Oklahoma Territory along the border with Indian Territory to provide services to residents of both areas. Many owed their existence and livelihood to one commodity, liquor, which was legal in Oklahoma Territory but not in Indian Territory. Blake Gumprecht provides a graphic account of the whiskey towns, their colorful, ingenious, sometimes dangerous inhabitants, and their eventual demise.</span></blockquote><span data-dcnode-id="682" instrument_node="">
</span><p data-dcnode-id="680"><span data-dcnode-id="681" instrument_node="">“Heyday in the Texas League: Oklahoma City-Tulsa Baseball, 1933–1957,” by Max J. Nichols, 174–197</span></p><span data-dcnode-id="679" instrument_node="">
</span><blockquote data-dcnode-id="677"><span data-dcnode-id="678" instrument_node="">The Tulsa Oilers and the Oklahoma City Indians baseball teams dominated the Texas League from 1933 to 1957. Both established reputations as highly competitive organizations which provided thrilling games for fans and training for major league stars. Max Nichols describes the history of the two teams, the differences in baseball then and now, and the players and managers who comprised the golden age of the Texas League.</span></blockquote><span data-dcnode-id="676" instrument_node="">
</span><p data-dcnode-id="674"><span data-dcnode-id="675" instrument_node="">“Milton W. Reynolds (Kicking Bird): The Man Who Named Oklahoma ’Land of the Fair God,’” by D. Earl Newsom, 198–217</span></p><span data-dcnode-id="673" instrument_node="">
</span><blockquote data-dcnode-id="671"><span data-dcnode-id="672" instrument_node="">Shortly before his death in 1890, newspaper editor Milton W. Reynolds, who used the pen name Kicking Bird, described Oklahoma as “a goodly land . . . the Land of the Fair God.” Earl Newsom explores Reynolds’ career, his early and strong interest in the Indian Territory, his efforts to see the area opened to non-Indian settlement decades before the boomer movement, and his contributions to a nascent Oklahoma Territory.</span></blockquote><span data-dcnode-id="670" instrument_node="">
</span><img alt=" " class="icon" data-dcnode-id="669" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.okhistory.org/images/publications/Chronicles066.jpg&amp;raw"><h2 data-dcnode-id="667" id="v74"><span data-dcnode-id="668" instrument_node="">Volume 74, No. 1 (Sping 1996)</span></h2><span data-dcnode-id="666" instrument_node="">
</span><p data-dcnode-id="664"><span data-dcnode-id="665" instrument_node="">“Hoxie and Acord: ‘Reel’ Oklahoma Cowboys,” by Leo Kelley, 4–15 </span></p><span data-dcnode-id="663" instrument_node="">
</span><blockquote data-dcnode-id="661"><span data-dcnode-id="662" instrument_node="">Jack Hoxie and Art Acord, two Oklahoma boys born about the time of the land run of 1889, gained early experience in the West working as cowhands and competing on the rodeo circuit. Their skills soon led to starring roles in silent western films and Wild West shows. Leo Kelley briefly describes the early motion picture industry, then follows Hoxie’s and Acord’s successes and failures, both on and off the set.</span></blockquote><span data-dcnode-id="660" instrument_node="">
</span><p data-dcnode-id="658"><span data-dcnode-id="659" instrument_node="">“‘Now Let Him Enforce It’: Exploring the Myth of Andrew Jackson’s Response to Worcester v. Georgia (1832),” by Mark R. Scherer, 16–29</span></p><span data-dcnode-id="657" instrument_node="">
</span><blockquote data-dcnode-id="653"><span data-dcnode-id="656" instrument_node="">
</span><p data-dcnode-id="654"><span data-dcnode-id="655" instrument_node="">Most historians traditionally have accepted Andrew Jackson’s famous remark, “John Marshall has made his decision; now let him enforce it,” as proof the president defied and ignored the U.S. Supreme Court in the famous case involving the Cherokee Nation and the state of Georgia. Mark Scherer takes a new look at Jackson’s response by analyzing the motivations and legal issues that affected his attitude and the outcome of the controversy.</span></p></blockquote><span data-dcnode-id="652" instrument_node="">
</span><p data-dcnode-id="650"><span data-dcnode-id="651" instrument_node="">“From Ponies to Planes: Marc Andrew ‘Oklahoma Pete’ Mitscher,” by Paolo E. Coletta, 50–75 </span></p><span data-dcnode-id="649" instrument_node="">
</span><blockquote data-dcnode-id="645"><span data-dcnode-id="648" instrument_node="">In 1904 Marc Mitscher left Oklahoma Territory to accept an appointment to the U.S. Naval Academy, where he had trouble with academics and discipline. Nevertheless, his obsession with aviation led eventually to his becoming one of the twentieth century’s greatest naval strategists and tacticians. Paolo Coletta provides a fascinating life portrait of “Oklahoma Pete” Mitscher, WWII’s “preeminent fast carrier task force commander.”</span><p data-dcnode-id="647"></p><span data-dcnode-id="646" instrument_node="">
</span></blockquote><span data-dcnode-id="644" instrument_node="">
</span><p data-dcnode-id="642"><span data-dcnode-id="643" instrument_node="">“A Lettered Portrait of William McIntosh: Leader of the Creek Nation,” by Warrick Lane Jones, 76–95</span></p><span data-dcnode-id="641" instrument_node="">
</span><blockquote data-dcnode-id="639"><span data-dcnode-id="640" instrument_node="">Related by blood or marriage to several prominent Creek, Cherokee, and white families in the southeastern United States, William McIntosh tried throughout his life to attain high positions in the Creek Nation. In a review of the several facets of McIntosh’s life, Warrick Jones argues that his fierce determination to attain wealth and power led McIntosh to manipulate events and people, and eventually to his own death.</span></blockquote><span data-dcnode-id="638" instrument_node="">
</span><img alt=" " class="icon" data-dcnode-id="637" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.okhistory.org/images/publications/Chronicles062.jpg&amp;raw"><h2 data-dcnode-id="635" id="issue1995"><span data-dcnode-id="636" instrument_node="">Volume 73, No. 4 (Winter 1995–1996) </span></h2><p class="backtotop" data-dcnode-id="632"><a data-dcnode-id="633" href="#top"><span data-dcnode-id="634" instrument_node="">Back to top</span></a></p><span data-dcnode-id="631" instrument_node="">
</span><p data-dcnode-id="629"><span data-dcnode-id="630" instrument_node="">“The Rare Woman, Indeed: Jerrie Cobb, An Aviation Pioneer,” by Debbie Michalke, 372–385 </span></p><span data-dcnode-id="628" instrument_node="">
</span><blockquote data-dcnode-id="626"><span data-dcnode-id="627" instrument_node="">In the early 1960s Oklahoma pilot Jerrie Cobb became the first woman accepted by NASA to undergo astronaut testing and training. Debbie Michalke traces the Oklahoma roots and early career of a determined and record-setting aviator who now flies humanitarian missions to the jungles of Amazonia.</span></blockquote><span data-dcnode-id="625" instrument_node="">
</span><p data-dcnode-id="623"><span data-dcnode-id="624" instrument_node="">The Last Choctaw Execution: A Case of Law and Disorder,” by James C. Milligan and L. David Norris, 386–403</span></p><span data-dcnode-id="622" instrument_node="">
</span><blockquote data-dcnode-id="620"><span data-dcnode-id="621" instrument_node="">The Choctaw election of 1892 turned violent when Silon Lewis and a band of men belonging to the National Party killed a county sheriff, resulting in the last Choctaw execution. James Milligan and David Norris examine Lewis’s case as well as the broader aspects of law enforcement in the Choctaw Nation. </span></blockquote><span data-dcnode-id="619" instrument_node="">
</span><p data-dcnode-id="617"><span data-dcnode-id="618" instrument_node="">“The Case of the Wandering Wobblie: The State of Oklahoma v. Arthur Berg,” by Von Russell Creel, 404–423</span></p><span data-dcnode-id="616" instrument_node="">
</span><blockquote data-dcnode-id="612"><span data-dcnode-id="615" instrument_node="">Arthur Berg’s involvement with the Industrial Workers of the World in the early 1920s led to his arrest and trial under Oklahoma’s criminal syndicalism statutes. Von Creel provides a fascinating account of Berg’s trial which exemplified the public’s “growing fear of domestic radicalism.” </span><p data-dcnode-id="614"></p><span data-dcnode-id="613" instrument_node="">
</span></blockquote><span data-dcnode-id="611" instrument_node="">
</span><p data-dcnode-id="609"><span data-dcnode-id="610" instrument_node="">“Butternut and Blue: Confederate Uniforms in the Trans-Mississippi,” by Whit Edwards, 424–437 </span></p><span data-dcnode-id="608" instrument_node="">
</span><blockquote data-dcnode-id="606"><span data-dcnode-id="607" instrument_node="">Although the Confederate government issued regulations for proper uniforms for its army, it had great difficulty supplying rank-and-file soldiers in the field. Using a variety of personal accounts, Whit Edwards describes efforts to clothe Southern fighting men in the Trans-Mississippi West. </span></blockquote><span data-dcnode-id="605" instrument_node="">
</span><p data-dcnode-id="603"><span data-dcnode-id="604" instrument_node="">“The Selling of America in Oklahoma: The First and Second Liberty Bond Drives,” by Charles W. Smith, 438–453</span></p><span data-dcnode-id="602" instrument_node="">
</span><blockquote data-dcnode-id="600"><span data-dcnode-id="601" instrument_node="">In 1917 the government asked Oklahomans, like Americans everywhere, to contribute their share to finance U.S. participation in World War I. Charles Smith analyzes the Liberty Bond program and the Councils of Defense whose methods sometimes promoted intolerance and violated personal liberties.</span></blockquote><span data-dcnode-id="599" instrument_node="">
</span><img alt=" " class="icon" data-dcnode-id="598" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.okhistory.org/images/publications/Chronicles047.jpg&amp;raw"><h2 data-dcnode-id="596"><span data-dcnode-id="597" instrument_node="">Volume 73, No. 3 (Fall 1995) </span></h2><span data-dcnode-id="595" instrument_node="">
</span><p data-dcnode-id="593"><span data-dcnode-id="594" instrument_node="">“‘Proud of What It Means’: Route 66, Oklahoma’s Mother Road,” by Jim Ross, 260–277 </span></p><span data-dcnode-id="592" instrument_node="">
</span><blockquote data-dcnode-id="590"><span data-dcnode-id="591" instrument_node="">Like no other highway before or since, Route 66 has captured the imagination of the American public, those who traveled it in good times and bad and those who work today for its revival. Jim Ross takes a sentimental journey down a “remarkable ribbon of road,” providing an evocative overview of the highway’s history and the connections that make Oklahoma a premier Route 66 state. </span></blockquote><span data-dcnode-id="589" instrument_node="">
</span><p data-dcnode-id="587"><span data-dcnode-id="588" instrument_node="">“‘Let the People Rule’: William Jennings Bryan and the Oklahoma Constitution,” by Robert D. Lewallen, 278–307</span></p><span data-dcnode-id="586" instrument_node="">
</span><blockquote data-dcnode-id="584"><span data-dcnode-id="585" instrument_node="">Many sections of the Oklahoma Constitution, widely recognized as one of the lengthiest of all state constitutions, were drawn from the ideals of William Jennings Bryan, the common man’s most vocal supporter. Robert D. Lewallen explores the philosophy of the Great Commoner, his influence on Oklahomans, and the document that most exemplified the reform era in the early twentieth century.</span></blockquote><span data-dcnode-id="583" instrument_node="">
</span><p data-dcnode-id="581"><span data-dcnode-id="582" instrument_node="">“Politics and Greed?: Allotments and Town Building Schemes in the Cherokee Outlet,” Karen Dye, 308–321</span></p><span data-dcnode-id="580" instrument_node="">
</span><blockquote data-dcnode-id="578"><span data-dcnode-id="579" instrument_node="">Prior to the land run of 1893, the government awarded allotments to seventy Cherokee citizens in the Cherokee Outlet and designated sites as the seats of government for future counties. Almost immediately, speculators began town building schemes that undermined officials’ best intentions. Karen Dye describes the men and methods by which towns in “K” County came into existence and the effect on their development.</span></blockquote><span data-dcnode-id="577" instrument_node="">
</span><p data-dcnode-id="575"><span data-dcnode-id="576" instrument_node="">“The Site of Camp Comanche: Dragoon Expedition of 1834,” by Gillett Griswold, 322–339 </span></p><span data-dcnode-id="574" instrument_node="">
</span><blockquote data-dcnode-id="572"><span data-dcnode-id="573" instrument_node="">In 1834 the U.S. Dragoons traveled to what is now southwest Oklahoma to make contact with the Comanches and other tribes, but the sites of their camps and exact routes have long been a source of confusion for historians and the general public. Gillett Griswold reviews the participants’ accounts and other published literature and reports on his own investigation to set the record straight about these important sites. </span></blockquote><span data-dcnode-id="571" instrument_node="">
</span><p data-dcnode-id="569"><span data-dcnode-id="570" instrument_node="">“Sallie Rogers McSpadden: A Take-Charge Cherokee in Lace and Pearls,” by Reba Neighbors Collins, 340–357 </span></p><span data-dcnode-id="568" instrument_node="">
</span><blockquote data-dcnode-id="566"><span data-dcnode-id="567" instrument_node="">Sallie McSpadden may have been Will Rogers’s “big sister,” but she did not rely on his fame to define her life. Rather she was a sophisticated lady from Chelsea, Oklahoma, who became the family matriarch. Reba Neighbors Collins paints a lovely portrait of a take-charge woman who rose above personal tragedies to impart her knowledge, determination, and philosophy to several generations of Rogers and McSpadden families.</span></blockquote><span data-dcnode-id="565" instrument_node="">
</span><img alt=" " class="icon" data-dcnode-id="564" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.okhistory.org/images/publications/Chronicles060.jpg&amp;raw"><h2 data-dcnode-id="562"><span data-dcnode-id="563" instrument_node="">Volume 73, No. 2 (Summer 1995) </span></h2><span data-dcnode-id="561" instrument_node="">
</span><p data-dcnode-id="559"><span data-dcnode-id="560" instrument_node="">“Mollie Shepherd: Indian Columnist,” by Carol J. Woitchek, 132–149 </span></p><span data-dcnode-id="558" instrument_node="">
</span><blockquote data-dcnode-id="556"><span data-dcnode-id="557" instrument_node="">During the 1960s Mollie Shepherd, a Kingfisher, Oklahoma, newspaper columnist of Cheyenne descent, chronicled the events of the Native American community. Sometimes flavored with Indian legends, social commentary, and personal observation, her column reached a wide and appreciative audience. Carol Woitchek discusses Mollie’s life and her place in contemporary Native American writing.</span></blockquote><span data-dcnode-id="555" instrument_node="">
</span><p data-dcnode-id="553"><span data-dcnode-id="554" instrument_node="">“Regionalism at the University of Oklahoma,” by Richard Lowitt, 150–171</span></p><span data-dcnode-id="552" instrument_node="">
</span><blockquote data-dcnode-id="550"><span data-dcnode-id="551" instrument_node="">Many of America’s intellectuals fled to Europe during the 1920s, but other artists and scholars established themselves on college campuses across the nation to foster a new appreciation of regional heritage, history, and literature. Richard Lowitt spotlights the University of Oklahoma’s role in the development of a Southwest regionalism during the tenure of President William Bennett Bizzell.</span></blockquote><span data-dcnode-id="549" instrument_node="">
</span><p data-dcnode-id="547"><span data-dcnode-id="548" instrument_node="">“Homesteading in Roger Mills County: The Wilcox Family,” by Margaret E. Brown, 172–191</span></p><span data-dcnode-id="546" instrument_node="">
</span><blockquote data-dcnode-id="544"><span data-dcnode-id="545" instrument_node="">The George Wilcox family believed they understood the perils of pioneering when they homesteaded in the Snakey Bend of the South Canadian River in western Oklahoma’s Roger Mills County in 1902. Margaret Brown records their personal tragedies, then views the family in a historical context as she considers the effect of undercapitalization on the early settlers as well as their reliance on the production of primary crops. </span></blockquote><span data-dcnode-id="543" instrument_node="">
</span><p data-dcnode-id="541"><span data-dcnode-id="542" instrument_node="">“The Osage Plea for Freedom Revisited,” by James D. White, 192–225 </span></p><span data-dcnode-id="540" instrument_node="">
</span><blockquote data-dcnode-id="538"><span data-dcnode-id="539" instrument_node="">In the nineteenth century, with their traditional tribal life in disarray, the Osages felt themselves disconnected from the spiritual forces so helpful in the past. That sense of loss deepened when they moved to Indian Territory away from their Catholic priests. Father James White sorts out the tangled conversion attempts among the Osages by various denominations, often at the whim of ill-conceived and vacillating government policies. </span></blockquote><span data-dcnode-id="537" instrument_node="">
</span><p data-dcnode-id="535"><span data-dcnode-id="536" instrument_node="">“Influences on Commercial Architecture: Stillwater, O.T., 1889–1907,” by Carol Bormann, 226–239</span></p><span data-dcnode-id="534" instrument_node="">
</span><blockquote data-dcnode-id="532"><span data-dcnode-id="533" instrument_node="">Following the dramatic run of 1889, the people of Stillwater, Oklahoma Territory, quickly converted their community of tents and wagons to a town of permanent structures. Architecture followed then-popular trends modified by the availability of materials and the cultural preferences of residents. Carol Bormann reflects on Stillwater’s first two decades and describes the changes in its commercial buildings, both inside and out. </span></blockquote><span data-dcnode-id="531" instrument_node="">
</span><img alt=" " class="icon" data-dcnode-id="530" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.okhistory.org/images/publications/Chronicles061.jpg&amp;raw"><h2 data-dcnode-id="528" id="v73"><span data-dcnode-id="529" instrument_node="">Volume 73, No. 1 (Sping 1995)</span></h2><span data-dcnode-id="527" instrument_node="">
</span><p data-dcnode-id="525"><span data-dcnode-id="526" instrument_node="">“Super Chief, Humble Man: The Life of Allie P. Reynolds,” by Max J. Nichols, 4–31</span></p><span data-dcnode-id="524" instrument_node="">
</span><blockquote data-dcnode-id="522"><span data-dcnode-id="523" instrument_node="">His pitching prowess propelled the late Allie Reynolds to national prominence as a star pitcher for the New York Yankees, but Oklahomans also will remember him for his business acumen, civic outreach, and devotion to family. Max Nichols reviews Reynolds’ brilliant baseball career and traces his growing awareness and appreciation of his Native American heritage, including his work with Oklahoma City’s Red Earth Festival.</span></blockquote><span data-dcnode-id="521" instrument_node="">
</span><p data-dcnode-id="519"><span data-dcnode-id="520" instrument_node="">“Herman F.C. Ten Kate, Jr.: An Adventurous Dutch Ethnologist in Indian Territory, 1883,” by Augustus J. Veenendaal, Jr., 32–51</span></p><span data-dcnode-id="518" instrument_node="">
</span><blockquote data-dcnode-id="516"><span data-dcnode-id="517" instrument_node="">Among the ethnologists who studied the Indians of the American Southwest in the 1880s was an educated and adventurous young Dutchman, Herman Ten Kate, Jr., who visited Indian Territory in 1883 collecting artifacts and recording his impressions of rapidly changing cultures. Augustus Veenendaal, Jr., distills from Ten Kate’s journals his personal commentary on cross-country travel, tribal interaction, personalities both historical and obscure, and the forces destined to affect the region.</span></blockquote><span data-dcnode-id="515" instrument_node="">
</span><p data-dcnode-id="513"><span data-dcnode-id="514" instrument_node="">“‘No Sound I Will Ever Forget’: The Antlers Tornado of 1945,” by Make Males, 52–65 </span></p><span data-dcnode-id="512" instrument_node="">
</span><blockquote data-dcnode-id="510"><span data-dcnode-id="511" instrument_node="">The devastating Antlers tornado of April 12, 1945, still resonates in the memories of those who survived, but received little notice outside Oklahoma. Fifty years later, Mike Males graphically recreates the disaster from the recollections of those involved and then places this tornado in a historical and scientific context. His comprehensive assessment raises questions about the vulnerability of Oklahomans to such powerful storms and discusses what is being done to lessen the risks.</span></blockquote><span data-dcnode-id="509" instrument_node="">
</span><p data-dcnode-id="507"><span data-dcnode-id="508" instrument_node="">“Cimarron Territory: Comedy and Tragedy,” by Joy Schnabel, 66–79</span></p><span data-dcnode-id="506" instrument_node="">
</span><blockquote data-dcnode-id="504"><span data-dcnode-id="505" instrument_node="">What is now the Oklahoma Panhandle seemed for a time the land everyone disclaimed either by design or oversight. But the implacable demands of settlers eventually brought the area to the attention of a diverse group of individuals with differing agendas. Joy Schnabel details the history of the area and along the way strives to balance seemingly outrageous activities in a lawless land with historical development patterns prevalent throughout the period of western expansion.</span></blockquote><span data-dcnode-id="503" instrument_node="">
</span><p data-dcnode-id="501"><span data-dcnode-id="502" instrument_node="">“Deadly Currents: John Ross’s Decision of 1861,” by Ari Kelman, 80–103 </span></p><span data-dcnode-id="500" instrument_node="">
</span><blockquote data-dcnode-id="498"><span data-dcnode-id="499" instrument_node="">Throughout his long tenure as principal chief of the Cherokees, John Ross faced complex challenges from factions within the tribe and the federal government. In 1861 the approaching Civil War added “deadly currents” to the difficulty of maintaining tribal unity and sovereignty. Ari Kelman considers Ross’s options as he initially aligned the Cherokees with the Confederacy and later shifted their support to the Union. </span></blockquote><span data-dcnode-id="497" instrument_node="">
</span><img alt=" " class="icon" data-dcnode-id="496" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.okhistory.org/images/publications/Chronicles044.jpg&amp;raw"><h2 data-dcnode-id="494" id="issue1994"><span data-dcnode-id="495" instrument_node="">Volume 72, No. 4 (Winter 1994–1995) </span></h2><p class="backtotop" data-dcnode-id="491"><a data-dcnode-id="492" href="#top"><span data-dcnode-id="493" instrument_node="">Back to top</span></a></p><span data-dcnode-id="490" instrument_node="">
</span><p data-dcnode-id="488"><span data-dcnode-id="489" instrument_node="">“Camille Nixdorf Phelan: Oklahoma Quiltmaker,” by Dorothy Cozart, 356–367</span></p><span data-dcnode-id="487" instrument_node="">
</span><blockquote data-dcnode-id="485"><span data-dcnode-id="486" instrument_node="">Nearly sixty years ago Camille Nixdorf Phelan presented to the Oklahoma Historical Society a quilt that portrayed events and personalities of Oklahoma history in embroidered pictures. Since then little has been written about Phelan or other needlework she created. After several years of research, during which she also located another important Phelan quilt, Dorothy Cozart details the life and work of an artist who painted with needle and thread.</span></blockquote><span data-dcnode-id="484" instrument_node="">
</span><p data-dcnode-id="482"><span data-dcnode-id="483" instrument_node="">“A Lasting New Deal Legacy: The Civilian Conservation Corps, the National Park Service, and the Development of the Oklahoma State Park System,” by Suzanne H. Schrems, 368–395 </span></p><span data-dcnode-id="481" instrument_node="">
</span><blockquote data-dcnode-id="479"><span data-dcnode-id="480" instrument_node="">One of President Franklin Roosevelt’s solutions to economic and humanitarian distress in the 1930s was the Civilian Conservation Corps. Designed to furnish employment and training for young men, as well as to revitalize overworked agricultural and forest land, the CCC played a significant role in the development of outdoor recreational facilities. Suzanne Schrems describes the CCC’s legacy in Oklahoma—seven state parks still enjoyed by millions of visitors annually.</span></blockquote><span data-dcnode-id="478" instrument_node="">
</span><p data-dcnode-id="476"><span data-dcnode-id="477" instrument_node="">“Dusty Apocalypse and Socialist Salvation: A Study of Woody Guthrie’s Dust Bowl Imagery,” by Brad Lookingbill, 396–413</span></p><span data-dcnode-id="475" instrument_node="">
</span><blockquote data-dcnode-id="473"><span data-dcnode-id="474" instrument_node="">In the late 1930s Woody Guthrie emerged as a visionary folk musician with a message of socialist salvation for working Americans. He saw their struggle with dust and depression as the abject failure of capitalism to cure the nation’s ills. In this fascinating portrait of the Dust Bowl balladeer, Brad Lookingbill analyzes Guthrie’s background and music and the spiritual and intellectual journey that led the entertainer to social criticism.</span></blockquote><span data-dcnode-id="472" instrument_node="">
</span><p data-dcnode-id="470"><span data-dcnode-id="471" instrument_node="">“‘There Are So Many Things Needed’: Establishing the Rainy Mountain Boarding School, 1891–1900,” by Clyde Ellis, 414–439</span></p><span data-dcnode-id="469" instrument_node="">
</span><blockquote data-dcnode-id="467"><span data-dcnode-id="468" instrument_node="">Reformers and policymakers in the late nineteenth century envisioned that schools would mold Indian youths into a new race that more closely reflected white society. The Kiowas in southwestern Oklahoma received their school in the 1890s. With particular emphasis on Cora Dunn, the school’s principal for sixteen years, Clyde Ellis explores Rainy Mountain Boarding School’s early history in a revealing study of frustrations, limitations, and too often, neglect.</span></blockquote><span data-dcnode-id="466" instrument_node="">
</span><p data-dcnode-id="464"><span data-dcnode-id="465" instrument_node="">“Hanging Judge Parker and the Gunfight at Alexander’s Store: Opportunities for Research in the Records of the U.S. Court at Fort Smith,” by Kent Carter, 440–455 </span></p><span data-dcnode-id="463" instrument_node="">
</span><blockquote data-dcnode-id="461"><span data-dcnode-id="462" instrument_node="">From 1875 to 1896 Isaac Parker, the “Hanging Judge,” worked to maintain law and order in the Indian Territory. Until recently, historians and genealogists interested in studying Parker’s court confronted massive volumes of paper with seemingly little organization. Kent Carter describes the types of records the court created, the large database and cross-reference index recently produced by volunteers, and, in two case studies, the problems associated with using the official records.</span></blockquote><span data-dcnode-id="460" instrument_node="">
</span><img alt=" " class="icon" data-dcnode-id="459" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.okhistory.org/images/publications/Chronicles057.jpg&amp;raw"><h2 data-dcnode-id="457"><span data-dcnode-id="458" instrument_node="">Volume 72, No. 3 (Fall 1994) </span></h2><span data-dcnode-id="456" instrument_node="">
</span><p data-dcnode-id="454"><span data-dcnode-id="455" instrument_node="">“Comanche Captives: People Between Two Worlds,” by Michael L. Tate, 228–263</span></p><span data-dcnode-id="453" instrument_node="">
</span><blockquote data-dcnode-id="451"><span data-dcnode-id="452" instrument_node="">For 150 years the trade in human captives played a major role in the economic and social lives of Southern Plains Indians, particularly the Comanches. Using a wide variety of primary sources, including the accounts of the captives themselves, Michael Tate provides a fascinating and evocative narrative that explores the rise and fall of this activity.</span></blockquote><span data-dcnode-id="450" instrument_node="">
</span><p data-dcnode-id="448"><span data-dcnode-id="449" instrument_node="">“Alice Lee Elliott Memorial Academy: A School for Choctaw Freedmen,” by Joy McDougal Smith, 264–279</span></p><span data-dcnode-id="447" instrument_node="">
</span><blockquote data-dcnode-id="445"><span data-dcnode-id="446" instrument_node="">Oak Hill Industrial Academy or Elliott Memorial Academy as it came to be called provided educational and vocational opportunities for Choctaw freedmen and their descendants and other black children in the Valliant vicinity for nearly fifty years. Joy Smith describes the history of a unique boarding school that was the only institution of its kind in the Choctaw Nation</span></blockquote><span data-dcnode-id="444" instrument_node="">
</span><p data-dcnode-id="442"><span data-dcnode-id="443" instrument_node="">“From Corn Field to Corporation: A Short History of St. Anthony Hospital,” by Leslie R. Tucker, 280–291 </span></p><span data-dcnode-id="441" instrument_node="">
</span><blockquote data-dcnode-id="439"><span data-dcnode-id="440" instrument_node="">Founded in 1898 by the Sisters of St. Francis, St. Anthony Hospital today is one of Oklahoma City’s largest and most progressive health care institutions. Leslie Tucker traces its development from rather humble beginning in a corn field to leading health care corporation with particular emphasis on the growth of the physical plant and the hospital’s many firsts.</span></blockquote><span data-dcnode-id="438" instrument_node="">
</span><p data-dcnode-id="436"><span data-dcnode-id="437" instrument_node="">“Struggle in the Choctaw Nation: The Coal Miners Strike of 1894,” by Don F. Badinelli, 292–311 </span></p><span data-dcnode-id="435" instrument_node="">
</span><blockquote data-dcnode-id="433"><span data-dcnode-id="434" instrument_node="">When Choctaw Nation coal companies announced a wage reduction in 1894, area coal miners saw the action as a threat to their very survival. They found strength and a means of resistance in their union, but their efforts brought little relief and much suffering. Don Badinelli explores the origin, evolution, and result of the first major labor confrontation in Indian Territory.</span></blockquote><span data-dcnode-id="432" instrument_node="">
</span><p data-dcnode-id="430"><span data-dcnode-id="431" instrument_node="">“Goin’ West: Kate May’s Trip to Old Greer County,” by Henry Kilian Goetz, 312–331 </span></p><span data-dcnode-id="429" instrument_node="">
</span><blockquote data-dcnode-id="427"><span data-dcnode-id="428" instrument_node=""> After the death of her husband, Kate May found herself head of a family and responsible for its livelihood. To improve her family’s lot in life, she participated in a land run, ran a restaurant, and moved to a new country for her child’s health. Henry Goetz provides a loving portrait of his indomitable grandmother and the May family’s journey to Old Greer County. </span></blockquote><span data-dcnode-id="426" instrument_node="">
</span><img alt=" " class="icon" data-dcnode-id="425" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.okhistory.org/images/publications/Chronicles058.jpg&amp;raw"><h2 data-dcnode-id="423"><span data-dcnode-id="424" instrument_node="">Volume 72, No. 2 (Summer 1994)</span></h2><span data-dcnode-id="422" instrument_node="">
</span><p data-dcnode-id="420"><span data-dcnode-id="421" instrument_node="">“Agriculture in the Oklahoma Panhandle, 1898–1942,” by W. David Baird, 116–137</span></p><span data-dcnode-id="419" instrument_node="">
</span><blockquote data-dcnode-id="417"><span data-dcnode-id="418" instrument_node="">Agricultural activity in the Oklahoma Panhandle dates back several centuries and today represents its most important industry. W. David Baird describes the history of settlement patterns and agriculture in the three-county area with particular emphasis on the types of buildings associated with farming and ranching between 1885 and 1942.</span></blockquote><span data-dcnode-id="416" instrument_node="">
</span><p data-dcnode-id="414"><span data-dcnode-id="415" instrument_node="">“Oklahoma City’s First Mass Transit System: Who Brought the Streetcars for People to Ride?” by Kim K. Bender, 138–159</span></p><span data-dcnode-id="413" instrument_node="">
</span><blockquote data-dcnode-id="411"><span data-dcnode-id="412" instrument_node="">The development of Oklahoma City’s electric railway system at the turn of the century coincided with the city’s phenomenal expansion. Kim K. Bender explores the corporate records of city land developers and the railway and construction companies to show how leading businessmen often controlled the direction and rate of growth to favor their own holdings.</span></blockquote><span data-dcnode-id="410" instrument_node="">
</span><p data-dcnode-id="408"><span data-dcnode-id="409" instrument_node="">“On Our Way to the Promised Land: Black Migration from Arkansas to Oklahoma, 1889–1893,” by Lori Bogle, 160–177 </span></p><span data-dcnode-id="407" instrument_node="">
</span><blockquote data-dcnode-id="405"><span data-dcnode-id="406" instrument_node="">Until the late 1880s, blacks in Arkansas found conditions favorable for their active participation in state government. When that began to change, black leaders looked to opportunities in Oklahoma. Lori Bogle analyses the political, social, and cultural ramifications of the migration from Arkansas and gives special attention to James A. Rouce who settled near Hitchcock.</span></blockquote><span data-dcnode-id="404" instrument_node="">
</span><p data-dcnode-id="402"><span data-dcnode-id="403" instrument_node="">“First Sooner Senator: Ernest W. McFarland’s Oklahoma Years, 1894–1919,” by James E. McMillan, 178–199</span></p><span data-dcnode-id="401" instrument_node="">
</span><blockquote data-dcnode-id="399"><span data-dcnode-id="400" instrument_node="">During his long career in public service, Ernest W. McFarland served in the U.S. Senate and as governor, supreme court justice, and attorney and businessman in Arizona. He also held the distinction of being the first native-born Sooner senator. James E. McMillan provides a fascinating account of McFarland’s early life in Oklahoma and his rise to political prominence.</span></blockquote><span data-dcnode-id="398" instrument_node="">
</span><p data-dcnode-id="396"><span data-dcnode-id="397" instrument_node="">“Lu tsa ka Le Ah ke ho ‘Can’t Go Beyond’: Allotting the Osage Reservation, 1906–1909,” by Louis F. Burns, 200–211 </span></p><span data-dcnode-id="395" instrument_node="">
</span><blockquote data-dcnode-id="393"><span data-dcnode-id="394" instrument_node="">By 1893 the Osage Nation found itself surrounded by intruders anxious to claim their “surplus” land. Fearing the fraud associated with the Cherokee allotment, the Osages wrote their own allotment act and gained a measure of control of the dissolution of their reserve. Louis F. Burns describes the provisions that made it unique among tribal allotments in Indian Territory. </span></blockquote><span data-dcnode-id="392" instrument_node="">
</span><img alt=" " class="icon" data-dcnode-id="391" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.okhistory.org/images/publications/Chronicles059.jpg&amp;raw"><h2 data-dcnode-id="389" id="v72"><span data-dcnode-id="390" instrument_node="">Volume 72, No. 1 (Sping 1994)</span></h2><span data-dcnode-id="388" instrument_node="">
</span><p data-dcnode-id="386"><span data-dcnode-id="387" instrument_node="">“Oklahoma Jazz: Deep Second to 52nd Street,” by George O. Carney, 4–21</span></p><span data-dcnode-id="385" instrument_node="">
</span><blockquote data-dcnode-id="383"><span data-dcnode-id="384" instrument_node="">Oklahomans are justly proud of the state’s country music stars and the varied music of ethnic groups. But an often overlooked aspect of Oklahoma’s heritage is the contribution of jazz artists who hailed from Oklahoma. Most left the state to find fame and fortune elsewhere. Using a wide variety of statistical information, George O. Carney provides a fascinating profile of the origins and development of Oklahoma jazz artists, a vital component of the state’s musical mosaic.</span></blockquote><span data-dcnode-id="382" instrument_node="">
</span><p data-dcnode-id="380"><span data-dcnode-id="381" instrument_node="">“Printing Ink and Flyingwires: Oklahoma Journalism and the Promotion of Aviation,” by Keith Tolman, 22–35</span></p><span data-dcnode-id="379" instrument_node="">
</span><blockquote data-dcnode-id="377"><span data-dcnode-id="378" instrument_node="">Like many people around the world after the turn of the century, Oklahomans held little confidence in man’s ability to fly in heavier-than-air machines. The fledgling aviation industry clearly required help in selling the potential benefits of flight. In an unexpected turn of events, newspapermen jumped in the planes and onto the proverbial bandwagon. Keith Tolman explores the efforts of some of the state’s leading journalists to promote aviation to the general public.</span></blockquote><span data-dcnode-id="376" instrument_node="">
</span><p data-dcnode-id="374"><span data-dcnode-id="375" instrument_node="">“Deadly Games: The Struggle for a Quarter-section of Land,” by Carol H. Welsh, 36–51</span></p><span data-dcnode-id="373" instrument_node="">
</span><blockquote data-dcnode-id="371"><span data-dcnode-id="372" instrument_node="">The land run that opened the Unassigned Lands of Indian Territory in 1889 to non-Indian settlement produced a series of claims contests in what became downtown Oklahoma City. Some lasted well into the twentieth century. On one quarter-section of land, seven individuals and a nearly 600-member townsite organization vied for ownership. Carol H. Welsh investigates the original land office townsite cases to recreate the struggle that cost one individual his life. </span></blockquote><span data-dcnode-id="370" instrument_node="">
</span><p data-dcnode-id="368"><span data-dcnode-id="369" instrument_node="">“Black Brush of Hatred: The KKK on Trial in Altus,” by Leo Kelley, 52–65</span></p><span data-dcnode-id="367" instrument_node="">
</span><blockquote data-dcnode-id="365"><span data-dcnode-id="366" instrument_node="">After World War I many Americans, including Oklahomans, found their world turned upside down in the revolt against the mores of the Victorian and Edwardian eras. To many, society seemed headed for “moralistic degradation.” Clandestine organizations such as the Ku Klux Klan sprang up to counter the hedonism they believed would lead to the downfall of society. Leo Kelley describes one incident in Altus that illuminates the KKK’s abuse of individual civil rights. </span></blockquote><span data-dcnode-id="364" instrument_node="">
</span><img alt=" " class="icon" data-dcnode-id="363" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.okhistory.org/images/publications/Chronicles056.jpg&amp;raw"><h2 data-dcnode-id="361" id="issue1993"><span data-dcnode-id="362" instrument_node="">Volume 71, No. 4 (Winter 1993–1994) </span></h2><p class="backtotop" data-dcnode-id="358"><a data-dcnode-id="359" href="#top"><span data-dcnode-id="360" instrument_node="">Back to top</span></a></p><span data-dcnode-id="357" instrument_node="">
</span><p data-dcnode-id="355"><span data-dcnode-id="356" instrument_node="">“Sorey Hill and Sorey: Architects with a Civic Conscience,” by Tom Sorey, Jr., 356–375</span></p><span data-dcnode-id="354" instrument_node="">
</span><blockquote data-dcnode-id="352"><span data-dcnode-id="353" instrument_node="">Some of the state’s most striking buildings, especially in Oklahoma City, Stillwater, and Norman, were designed by one firm whose practice incorporated three distinct styles in commercial and residential designs. Drawing on his lifelong association with the firm, Tom Sorey, Jr., describes Sorey Hill and Sorey’s major work and the partners’ individual contributions to their community and profession.</span></blockquote><span data-dcnode-id="351" instrument_node="">
</span><p data-dcnode-id="349"><span data-dcnode-id="350" instrument_node="">“A Jurisdictional Imbroglio: The Case of E.C. Boudinot’s Hotel,” by Thomas Burnell Colbert, 376–391</span></p><span data-dcnode-id="348" instrument_node="">
</span><blockquote data-dcnode-id="346"><span data-dcnode-id="347" instrument_node="">The complex status of jurisdiction and authority in the Indian nations of Indian Territory disturbed E.C. Boudinot, an influential mixed-blood Cherokee. Circumstances led him to advocate for dividing tribal lands into personal holdings and making Indians U.S. citizens subject to federal law. Thomas Burnell Colbert focuses on one of Boudinot’s own convoluted business deals that tested the very issue of tribal sovereignty.</span></blockquote><span data-dcnode-id="345" instrument_node="">
</span><p data-dcnode-id="343"><span data-dcnode-id="344" instrument_node="">“Miss Mallory’s Children: The Oklahoma Orphanage and the Founding of Bethany,” by Charles Edwin Jones, 392–422</span></p><span data-dcnode-id="342" instrument_node="">
</span><blockquote data-dcnode-id="340"><span data-dcnode-id="341" instrument_node="">Mattie Mallory, a holiness worker and astute businesswoman, came to Oklahoma in the 1890s to care for neglected and orphaned children. The foundation she laid remains today as the City of Bethany, the Children’s Center, and Southern Nazarene University. Charles Edwin Jones provides a fascinating study of Mallory’s work, her association with other groups, and her use of land speculation as an adjunct to ministry.</span></blockquote><span data-dcnode-id="339" instrument_node="">
</span><p data-dcnode-id="337"><span data-dcnode-id="338" instrument_node="">“The Carl Albert Collection: Resources Relating to Indian Policy, 1963–1968,” by W. Dale Mason, 422–437</span></p><span data-dcnode-id="336" instrument_node="">
</span><blockquote data-dcnode-id="334"><span data-dcnode-id="335" instrument_node="">Indian policy during Lyndon B. Johnson’s presidency, according to most observers, was one of transition from termination to self-determination. W. Dale Mason inventories and describes the papers of Oklahoma’s Third District congressman, Carl Albert, who served in important House leadership positions during those years. Albert’s papers reflect not only administrative policy but his own efforts on behalf of Oklahoma Indians.</span></blockquote><span data-dcnode-id="333" instrument_node="">
</span><p data-dcnode-id="331"><span data-dcnode-id="332" instrument_node="">“The Oklahoma Rural News: Roots of an Electric Cooperative Newspaper,” by Stephen F. Lalli, 438–449</span></p><span data-dcnode-id="330" instrument_node="">
</span><blockquote data-dcnode-id="328"><span data-dcnode-id="329" instrument_node="">Rural electrification was a major issue for Oklahoma farmers in the 1930s and 1940s. It gained even greater importance and validity with the creation of a newspaper by the network of Oklahoma rural electric cooperatives. Stephen F. Lalli analyses the ability of the Oklahoma Rural News to rally voters and describes the political clout it came to wield by 1950 in the struggle between private and public power companies.</span></blockquote><span data-dcnode-id="327" instrument_node="">
</span><img alt=" " class="icon" data-dcnode-id="326" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.okhistory.org/images/publications/Chronicles050.jpg&amp;raw"><h2 data-dcnode-id="324"><span data-dcnode-id="325" instrument_node="">Volume 71, No. 3 (Fall 1993)</span></h2><span data-dcnode-id="323" instrument_node="">
</span><p data-dcnode-id="321"><span data-dcnode-id="322" instrument_node="">“All That Glitters . . .: Assaying S.H. Logan’s ’Trip to the Gold Fields,’” by Stephen H. Dew, 244–275</span></p><span data-dcnode-id="320" instrument_node="">
</span><blockquote data-dcnode-id="316"><span data-dcnode-id="319" instrument_node="">In 1941 S.H. Logan published a series of articles in the Arkansas Gazette which purported to be a transcription of the journal kept by an emigrant in the caravan of goldseekers Captain R.B. Marcy escorted across Indian Territory in 1849. In this lively article, Stephen H. Dew analyses Logan’s “Trip to the Gold Fields,” compares it to other primary sources, and separates the “gold” from the “glitter.”</span><p data-dcnode-id="318"></p><span data-dcnode-id="317" instrument_node="">
</span></blockquote><span data-dcnode-id="315" instrument_node="">
</span><p data-dcnode-id="313"><span data-dcnode-id="314" instrument_node="">“The First Lady of Education: Oklahoman Kate Galt Zaneis,” by James C. Milligan and L. David Norris, 276–301</span></p><span data-dcnode-id="312" instrument_node="">
