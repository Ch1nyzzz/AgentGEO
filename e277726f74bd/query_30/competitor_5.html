</span><li data-dcnode-id="3237"><strong data-dcnode-id="3250"><span data-dcnode-id="3251" instrument_node="">1910:</span></strong><span data-dcnode-id="3249" instrument_node=""> </span><span data-dcnode-id="3238" style="font-weight: 400;"><span data-dcnode-id="3248" instrument_node="">The </span><strong data-dcnode-id="3246"><span data-dcnode-id="3247" instrument_node="">Munn Park statue</span></strong><span data-dcnode-id="3245" instrument_node=""> was constructed after the </span><strong data-dcnode-id="3243"><span data-dcnode-id="3244" instrument_node="">United Daughters of the Confederacy</span></strong><span data-dcnode-id="3242" instrument_node=""> </span><a data-dcnode-id="3240" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//lakelandpubliclibrary.contentdm.oclc.org/digital/collection/p15809coll20/id/275/rec/1" target="_blank"><span data-dcnode-id="3241" instrument_node="">received permission from the Lakeland City Council</span></a><span data-dcnode-id="3239" instrument_node="">.&nbsp;</span></span></li><span data-dcnode-id="3236" instrument_node="">
</span><li data-dcnode-id="3211"><strong data-dcnode-id="3234"><span data-dcnode-id="3235" instrument_node="">1911: </span></strong><span data-dcnode-id="3233" instrument_node="">What was known to be </span><strong data-dcnode-id="3231"><span data-dcnode-id="3232" instrument_node="">the best hotel in Central Florida</span></strong><span data-dcnode-id="3230" instrument_node=""> –</span><em data-dcnode-id="3225"><span data-dcnode-id="3229" instrument_node=""> the Tremont Hotel (built </span><a data-dcnode-id="3226" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.lakelandgov.net/departments/library/lakeland-history-room/brief-history-of-lakeland/" target="_blank"><span data-dcnode-id="3227" style="font-weight: 400;"><span data-dcnode-id="3228" instrument_node="">in 1885</span></span></a></em><span data-dcnode-id="3212" style="font-weight: 400;"><em data-dcnode-id="3223"><span data-dcnode-id="3224" instrument_node="">)</span></em><span data-dcnode-id="3222" instrument_node=""> – was </span><strong data-dcnode-id="3220"><span data-dcnode-id="3221" instrument_node="">moved from the location</span></strong><span data-dcnode-id="3219" instrument_node=""> of the site of Terrace Hotel </span><strong data-dcnode-id="3217"><span data-dcnode-id="3218" instrument_node="">to another block</span></strong><span data-dcnode-id="3216" instrument_node="">, and e</span><strong data-dcnode-id="3214"><span data-dcnode-id="3215" instrument_node="">nlarged in 1911</span></strong><span data-dcnode-id="3213" instrument_node="">.&nbsp;</span></span></li><span data-dcnode-id="3210" instrument_node="">
</span><li data-dcnode-id="3197"><strong data-dcnode-id="3208"><span data-dcnode-id="3209" instrument_node="">1912: </span></strong><span data-dcnode-id="3207" instrument_node="">Lakelanders were able to </span><strong data-dcnode-id="3205"><span data-dcnode-id="3206" instrument_node="">send their mail for free</span></strong><span data-dcnode-id="3204" instrument_node="">, </span><em data-dcnode-id="3202"><span data-dcnode-id="3203" instrument_node="">starting this year</span></em><span data-dcnode-id="3201" instrument_node="">, as </span><a data-dcnode-id="3199" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.lakelandgov.net/departments/library/lakeland-history-room/brief-history-of-lakeland/" target="_blank"><span data-dcnode-id="3200" instrument_node="">free mail delivery</span></a><span data-dcnode-id="3198" instrument_node=""> was finally inaugurated.</span></li><span data-dcnode-id="3196" instrument_node="">
</span><li data-dcnode-id="3178"><strong data-dcnode-id="3187"><span data-dcnode-id="3195" instrument_node="">1913: The former 1913 landmark,&nbsp;</span><a data-dcnode-id="3191" data-saferedirecturl="https://www.google.com/url?q=https://6amcity.us18.list-manage.com/track/click?u%3D97f9dc6ad028c29fb9248a95c%26id%3D25fe8f8277%26e%3Deab6cc5bcc&amp;source=gmail&amp;ust=1609531921140000&amp;usg=AFQjCNEL8hTQiE3EuS92Yk8y1ITJVb3K1g" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//6amcity.us18.list-manage.com/track/click%3Fu%3D97f9dc6ad028c29fb9248a95c%26id%3D25fe8f8277%26e%3Deab6cc5bcc" rel="noopener noreferrer" target="_blank"><span data-dcnode-id="3194" instrument_node="">Hotel&nbsp;</span><span class="il" data-dcnode-id="3192"><span data-dcnode-id="3193" instrument_node="">Thelma</span></span></a><span data-dcnode-id="3190" instrument_node="">, was built at </span><a data-dcnode-id="3188"><span data-dcnode-id="3189" instrument_node="">313 + 321 N. Massachusetts Ave.</span></a></strong><a data-dcnode-id="3185"><span data-dcnode-id="3186" instrument_node=""> The hotel once </span></a><strong data-dcnode-id="3183"><span data-dcnode-id="3184" instrument_node="">hosted Cleveland Indians</span></strong><span data-dcnode-id="3182" instrument_node=""> while baseball spring training was held at </span><strong data-dcnode-id="3180"><span data-dcnode-id="3181" instrument_node="">Adair Field in the 1920s</span></strong><span data-dcnode-id="3179" instrument_node="">.</span></li><span data-dcnode-id="3177" instrument_node="">
</span><li data-dcnode-id="3163"><strong data-dcnode-id="3175"><span data-dcnode-id="3176" instrument_node="">1914: </span></strong><a data-dcnode-id="3173" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//lakelandpubliclibrary.contentdm.oclc.org/digital/collection/p15809coll7/id/189" target="_blank"><span data-dcnode-id="3174" instrument_node="">A welcome arch</span></a><span data-dcnode-id="3172" instrument_node=""> was constructed in 1914 to </span><strong data-dcnode-id="3170"><span data-dcnode-id="3171" instrument_node="">welcome Civil War Confederate veterans</span></strong><span data-dcnode-id="3169" instrument_node=""> to Lakeland. </span><em data-dcnode-id="3164"><span data-dcnode-id="3168" instrument_node="">The arch </span><strong data-dcnode-id="3166"><span data-dcnode-id="3167" instrument_node="">stayed there until mid-1920</span></strong><span data-dcnode-id="3165" instrument_node="">.&nbsp;</span></em></li><span data-dcnode-id="3162" instrument_node="">
</span><li data-dcnode-id="3152"><strong data-dcnode-id="3160"><span data-dcnode-id="3161" instrument_node="">1915:&nbsp;</span></strong><span data-dcnode-id="3159" instrument_node="">The city started construction on its first hospital and in 1916, </span><b data-dcnode-id="3157"><span data-dcnode-id="3158" instrument_node="">Polk County’s oldest hospital</span></b><span data-dcnode-id="3156" instrument_node="">, </span><a data-dcnode-id="3154" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.theledger.com/article/LK/20110206/news/608072877/LL%23%3A~%3Atext%3DLakeland%2520Regional%2520Medical%2520Center%252C%2520Polk%2Cto%2520the%2520city%2520in%25201914." target="_blank"><span data-dcnode-id="3155" instrument_node="">opened its doors on S. Missouri Ave.</span></a><span data-dcnode-id="3153" instrument_node=""> The building cost $15,000 + had 65 beds.</span></li><span data-dcnode-id="3151" instrument_node="">
</span><li data-dcnode-id="3141"><strong data-dcnode-id="3149"><span data-dcnode-id="3150" instrument_node="">1916: </span></strong><span data-dcnode-id="3148" instrument_node="">With an influx of tourists due to its </span><strong data-dcnode-id="3146"><span data-dcnode-id="3147" instrument_node="">national recognition for road construction</span></strong><span data-dcnode-id="3145" instrument_node="">, the city </span><a data-dcnode-id="3143" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//npgallery.nps.gov/GetAsset/007e0d43-583c-4b2b-ba7b-660b0ab42ad0" target="_blank"><span data-dcnode-id="3144" instrument_node="">created its first tourism center</span></a><span data-dcnode-id="3142" instrument_node=""> in 1916.</span></li><span data-dcnode-id="3140" instrument_node="">
</span><li data-dcnode-id="3127"><strong data-dcnode-id="3138"><span data-dcnode-id="3139" instrument_node="">1917: The Federal Building</span></strong><span data-dcnode-id="3137" instrument_node=""> was constructed in </span><strong data-dcnode-id="3135"><span data-dcnode-id="3136" instrument_node="">1917,</span></strong><span data-dcnode-id="3134" instrument_node=""> and became </span><strong data-dcnode-id="3132"><span data-dcnode-id="3133" instrument_node="">Lakeland’s first separate post office building</span></strong><span data-dcnode-id="3131" instrument_node="">. The building itself is of “</span><strong data-dcnode-id="3129"><span data-dcnode-id="3130" instrument_node="">Roman architectural elements</span></strong><span data-dcnode-id="3128" instrument_node="">.”</span></li><span data-dcnode-id="3126" instrument_node="">
</span><li data-dcnode-id="3120"><strong data-dcnode-id="3124"><span data-dcnode-id="3125" instrument_node="">1918: Lakelanders + Polk County </span></strong><span data-dcnode-id="3123" instrument_node="">residents alike were </span><a data-dcnode-id="3121" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//viste.org/" target="_blank"><span data-dcnode-id="3122" instrument_node="">impacted by the Spanish Flu of 1918.</span></a></li><span data-dcnode-id="3119" instrument_node="">
</span><li data-dcnode-id="3101"><strong data-dcnode-id="3117"><span data-dcnode-id="3118" instrument_node="">1919: </span></strong><span data-dcnode-id="3116" instrument_node="">In April of 1919, Polk County </span><strong data-dcnode-id="3114"><span data-dcnode-id="3115" instrument_node="">phosphate workers</span></strong><span data-dcnode-id="3113" instrument_node=""> went on strike, </span><strong data-dcnode-id="3111"><span data-dcnode-id="3112" instrument_node="">demanding an increased pay</span></strong><span data-dcnode-id="3110" instrument_node=""> + </span><strong data-dcnode-id="3108"><span data-dcnode-id="3109" instrument_node="">eight-hour days</span></strong><span data-dcnode-id="3107" instrument_node="">. </span><em data-dcnode-id="3102"><span data-dcnode-id="3106" instrument_node="">The strike was finally </span><strong data-dcnode-id="3104"><span data-dcnode-id="3105" instrument_node="">called off in December</span></strong><span data-dcnode-id="3103" instrument_node=""> of the same year, as an agreement had been met.&nbsp;</span></em></li><span data-dcnode-id="3100" instrument_node="">
</span></ul><span data-dcnode-id="3098" instrument_node="">
</span><h2 data-dcnode-id="3094"><span class="ez-toc-section" data-dcnode-id="3097" id="The_1920s"></span><span data-dcnode-id="3096" instrument_node="">The 1920s</span><span class="ez-toc-section-end" data-dcnode-id="3095"></span></h2><span data-dcnode-id="3093" instrument_node="">
</span><ul data-dcnode-id="2866"><span data-dcnode-id="3092" instrument_node="">
</span><li data-dcnode-id="3069"><strong data-dcnode-id="3090"><span data-dcnode-id="3091" instrument_node="">1920:</span></strong><b data-dcnode-id="3086"><span data-dcnode-id="3089" instrument_node=""> </span><a data-dcnode-id="3087" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.lakelandgov.net/departments/library/lakeland-history-room/brief-history-of-lakeland/" rel="noopener noreferrer" target="_blank"><span data-dcnode-id="3088" instrument_node="">The Florida Land Boom</span></a></b><span data-dcnode-id="3085" instrument_node="">&nbsp;was a time that </span><a data-dcnode-id="3083" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//laltoday.6amcity.com/presidents-lakeland-fl/"><span data-dcnode-id="3084" instrument_node="">sparked some of&nbsp;the city’s&nbsp;most significant developments&nbsp;</span></a><span data-dcnode-id="3082" instrument_node="">–&nbsp;including </span><strong data-dcnode-id="3080"><span data-dcnode-id="3081" instrument_node="">The Terrace Hotel</span></strong><span data-dcnode-id="3079" instrument_node="">,&nbsp;</span><strong data-dcnode-id="3077"><span data-dcnode-id="3078" instrument_node="">The Polk Theatre</span></strong><span data-dcnode-id="3076" instrument_node="">, and </span><strong data-dcnode-id="3074"><span data-dcnode-id="3075" instrument_node="">The New Florida Hotel</span></strong><span data-dcnode-id="3073" instrument_node="">&nbsp;</span><i data-dcnode-id="3071"><span data-dcnode-id="3072" instrument_node="">(now Lake Mirror Tower Apartments)</span></i><span data-dcnode-id="3070" instrument_node="">,&nbsp;among others.</span></li><span data-dcnode-id="3068" instrument_node="">
</span><li data-dcnode-id="3056"><strong data-dcnode-id="3066"><span data-dcnode-id="3067" instrument_node="">1921:&nbsp;</span></strong><span data-dcnode-id="3065" instrument_node="">From 1895-1921, there were an estimated </span><strong data-dcnode-id="3063"><span data-dcnode-id="3064" instrument_node="">20 lynchings of Black men</span></strong><span data-dcnode-id="3062" instrument_node=""> in Polk County. </span><em data-dcnode-id="3057"><span data-dcnode-id="3061" instrument_node="">Read more about this from The Ledger, </span><a data-dcnode-id="3059" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.theledger.com/news/20180505/lynchings-klan-activity-part-of-polks-history" target="_blank"><span data-dcnode-id="3060" instrument_node="">here</span></a><span data-dcnode-id="3058" instrument_node="">.&nbsp;</span></em></li><span data-dcnode-id="3055" instrument_node="">
</span><li data-dcnode-id="3027"><strong data-dcnode-id="3053"><span data-dcnode-id="3054" instrument_node="">1922: </span></strong><span data-dcnode-id="3052" instrument_node="">Home to the world’s largest single-site collection of&nbsp;</span><b data-dcnode-id="3050"><span data-dcnode-id="3051" instrument_node="">Frank Lloyd Wright architecture</span></b><span data-dcnode-id="3049" instrument_node="">, FSC moved from Southerland to Lakeland in 1922. The college is the </span><b data-dcnode-id="3047"><span data-dcnode-id="3048" instrument_node="">oldest, private comprehensive college in Florida</span></b><span data-dcnode-id="3046" instrument_node="">&nbsp;and was even&nbsp;</span><b data-dcnode-id="3044"><span data-dcnode-id="3045" instrument_node="">designated a</span></b><span data-dcnode-id="3043" instrument_node="">&nbsp;</span><b data-dcnode-id="3041"><span data-dcnode-id="3042" instrument_node="">National Historic Landmark in 2012</span></b><span data-dcnode-id="3040" instrument_node="">. Browse the archives –&nbsp;</span><b data-dcnode-id="3037"><i data-dcnode-id="3038"><span data-dcnode-id="3039" instrument_node="">Freshmen proverbs</span></i></b><i data-dcnode-id="3035"><span data-dcnode-id="3036" instrument_node="">&nbsp;to an&nbsp;</span></i><b data-dcnode-id="3032"><i data-dcnode-id="3033"><span data-dcnode-id="3034" instrument_node="">oral history project</span></i></b><span data-dcnode-id="3031" instrument_node="">&nbsp;–&nbsp;</span><a data-dcnode-id="3029" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.flsouthern.edu/library/archives/fsc-history.aspx" rel="noopener noreferrer" target="_blank"><span data-dcnode-id="3030" instrument_node="">here</span></a><span data-dcnode-id="3028" instrument_node="">.</span></li><span data-dcnode-id="3026" instrument_node="">
</span><li data-dcnode-id="3016"><strong data-dcnode-id="3024"><span data-dcnode-id="3025" instrument_node="">1923:</span></strong><span data-dcnode-id="3023" instrument_node=""> The Cleveland Indians </span><a data-dcnode-id="3021" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.lakelandgov.net/departments/library/lakeland-history-room/brief-history-of-lakeland/" target="_blank"><span data-dcnode-id="3022" instrument_node="">held spring training in Lakeland</span></a><span data-dcnode-id="3020" instrument_node=""> from </span><strong data-dcnode-id="3018"><span data-dcnode-id="3019" instrument_node="">1923-1927</span></strong><span data-dcnode-id="3017" instrument_node="">.</span></li><span data-dcnode-id="3015" instrument_node="">
</span><li data-dcnode-id="2975"><strong data-dcnode-id="3013"><span data-dcnode-id="3014" instrument_node="">1924:</span></strong><span data-dcnode-id="3012" instrument_node=""> The Lakeland Ledger </span><a data-dcnode-id="3010" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//laltoday.6amcity.com/oldest-businesses-in-lakeland-fl/%231900s"><span data-dcnode-id="3011" instrument_node="">was established in 1924</span></a><span data-dcnode-id="3009" instrument_node="">. </span><b data-dcnode-id="3007"><span data-dcnode-id="3008" instrument_node="">Originally published as The&nbsp;</span></b><b data-dcnode-id="3004"><i data-dcnode-id="3005"><span data-dcnode-id="3006" instrument_node="">Lakeland Evening Ledger&nbsp;</span></i></b><i data-dcnode-id="3002"><span data-dcnode-id="3003" instrument_node="">(created by&nbsp;</span></i><b data-dcnode-id="2999"><i data-dcnode-id="3000"><span data-dcnode-id="3001" instrument_node="">Sam Farabee</span></i></b><i data-dcnode-id="2997"><span data-dcnode-id="2998" instrument_node="">),</span></i><span data-dcnode-id="2996" instrument_node="">&nbsp;the paper has had multiple owners and&nbsp;</span><b data-dcnode-id="2994"><span data-dcnode-id="2995" instrument_node="">even merged with another local news outlet</span></b><span data-dcnode-id="2993" instrument_node="">, the&nbsp;</span><i data-dcnode-id="2991"><span data-dcnode-id="2992" instrument_node="">Lakeland Star-Telegram</span></i><span data-dcnode-id="2990" instrument_node="">. This</span><b data-dcnode-id="2988"><span data-dcnode-id="2989" instrument_node="">&nbsp;award-winning publication&nbsp;</span></b><span data-dcnode-id="2987" instrument_node="">has a long history in connection with&nbsp;</span><b data-dcnode-id="2985"><span data-dcnode-id="2986" instrument_node="">top state awards&nbsp;</span></b><span data-dcnode-id="2984" instrument_node="">given by the&nbsp;</span><b data-dcnode-id="2982"><span data-dcnode-id="2983" instrument_node="">Florida Society of News Editors&nbsp;</span></b><span data-dcnode-id="2981" instrument_node="">+ the&nbsp;</span><b data-dcnode-id="2979"><span data-dcnode-id="2980" instrument_node="">South Florida chapter of the Society of Professional Journalists</span></b><span data-dcnode-id="2978" instrument_node="">.</span><i data-dcnode-id="2976"><span data-dcnode-id="2977" instrument_node="">&nbsp;</span></i></li><span data-dcnode-id="2974" instrument_node="">
</span><li data-dcnode-id="2948"><span data-dcnode-id="2949" style="font-weight: 400;"><strong data-dcnode-id="2972"><span data-dcnode-id="2973" instrument_node="">1925:</span></strong><span data-dcnode-id="2971" instrument_node=""> </span><a data-dcnode-id="2969" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//laltoday.6amcity.com/historic-theatres-polk-county-fl/"><span data-dcnode-id="2970" instrument_node="">The Palace Theatre opened in 1925</span></a><span data-dcnode-id="2968" instrument_node="">. This small downtown theatre once featured an </span><b data-dcnode-id="2966"><span data-dcnode-id="2967" instrument_node="">orchestra pit</span></b><span data-dcnode-id="2965" instrument_node="">&nbsp;+ a full stage, with curved&nbsp;</span><b data-dcnode-id="2963"><span data-dcnode-id="2964" instrument_node="">opera-style windows</span></b><span data-dcnode-id="2962" instrument_node=""> doning it. In its heyday, </span><b data-dcnode-id="2960"><span data-dcnode-id="2961" instrument_node="">moviegoers</span></b><span data-dcnode-id="2959" instrument_node="">&nbsp;could catch flicks like&nbsp;</span><a data-dcnode-id="2957" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.imdb.com/title/tt0038347/" rel="noopener noreferrer" target="_blank"><span data-dcnode-id="2958" instrument_node="">The Shadow Behind the Mask</span></a><span data-dcnode-id="2956" instrument_node="">&nbsp;+&nbsp;</span><a data-dcnode-id="2954" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.imdb.com/title/tt0040489/%3Fref_%3Dfn_al_tt_1" rel="noopener noreferrer" target="_blank"><span data-dcnode-id="2955" instrument_node="">Jinx Money</span></a><span data-dcnode-id="2953" instrument_node="">&nbsp;and would&nbsp;</span><b data-dcnode-id="2951"><span data-dcnode-id="2952" instrument_node="">wait in line for double features</span></b><span data-dcnode-id="2950" instrument_node="">.</span></span></li><span data-dcnode-id="2947" instrument_node="">
</span><li data-dcnode-id="2916"><strong data-dcnode-id="2945"><span data-dcnode-id="2946" instrument_node="">1927:</span></strong><span data-dcnode-id="2944" instrument_node=""> </span><strong data-dcnode-id="2942"><span data-dcnode-id="2943" instrument_node="">Two Lakeland residents</span></strong><span data-dcnode-id="2941" instrument_node=""> </span><span data-dcnode-id="2935" data-rendering-method="js" data-taxi-style-rich-style-link="{&quot;href&quot;:&quot;https://laltoday.6amcity.com/ruth-elder-lakeland-aviatrix/?omhide=true&quot;,&quot;taxi-raw-href&quot;:null}"><em data-dcnode-id="2939"><span data-dcnode-id="2940" instrument_node="">nearly</span></em><span data-dcnode-id="2938" instrument_node=""> </span><strong data-dcnode-id="2936"><span data-dcnode-id="2937" instrument_node="">made aviation history</span></strong></span><span data-dcnode-id="2934" instrument_node="">. On </span><span data-dcnode-id="2932" data-rendering-method="normal" data-taxi-style-rich-style-bold="{}"><span data-dcnode-id="2933" instrument_node="">October 11, 1927</span></span><span data-dcnode-id="2931" instrument_node="">,</span><strong data-dcnode-id="2929"><span data-dcnode-id="2930" instrument_node=""> Ruth Elder</span></strong><span data-dcnode-id="2928" instrument_node=""> and </span><strong data-dcnode-id="2926"><span data-dcnode-id="2927" instrument_node="">George William Haldeman Sr.</span></strong><span data-dcnode-id="2925" instrument_node=""> left from Long Island, NY in their </span><strong data-dcnode-id="2923"><span data-dcnode-id="2924" instrument_node="">Stinson Detroiter monoplane</span></strong><span data-dcnode-id="2922" instrument_node=""> in an attempt to </span><a data-dcnode-id="2918" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//laltoday.6amcity.com/ruth-elder-lakeland-aviatrix/%3Fomhide%3Dtrue"><span data-dcnode-id="2920" data-rendering-method="normal" data-taxi-style-rich-style-bold="{}"><span data-dcnode-id="2921" instrument_node="">make Elder the first woman</span></span><span data-dcnode-id="2919" instrument_node=""> to fly across the Atlantic</span></a><span data-dcnode-id="2917" instrument_node="">.</span></li><span data-dcnode-id="2915" instrument_node="">
</span><li data-dcnode-id="2888"><strong data-dcnode-id="2913"><span data-dcnode-id="2914" instrument_node="">1928:</span></strong><span data-dcnode-id="2912" instrument_node=""> Built during the golden age, </span><b data-dcnode-id="2910"><span data-dcnode-id="2911" instrument_node="">The Polk Theatre has served as a place for community interaction throughout the years</span></b><span data-dcnode-id="2909" instrument_node="">.&nbsp;</span><a data-dcnode-id="2907" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.polktheatre.org/history" rel="noopener noreferrer" target="_blank"><span data-dcnode-id="2908" instrument_node="">The theatre began thriving in its early years</span></a><span data-dcnode-id="2906" instrument_node="">&nbsp;and&nbsp;</span><b data-dcnode-id="2904"><span data-dcnode-id="2905" instrument_node="">on opening day, the matinee sold out</span></b><span data-dcnode-id="2903" instrument_node="">&nbsp;</span><i data-dcnode-id="2901"><span data-dcnode-id="2902" instrument_node="">within an hour of the box office’s opening</span></i><span data-dcnode-id="2900" instrument_node="">. During the 60s and 70s, the theatre faced the possibility of shutting down, but in 1982, it was purchased through borrowed money and a state grant, </span><b data-dcnode-id="2898"><span data-dcnode-id="2899" instrument_node="">saved by Lakelanders who didn’t want to see the theatre go</span></b><span data-dcnode-id="2897" instrument_node="">.&nbsp;</span><i data-dcnode-id="2895"><span data-dcnode-id="2896" instrument_node="">The&nbsp;</span></i><a data-dcnode-id="2892" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.polktheatre.org/our-sponsors" rel="noopener noreferrer" target="_blank"><i data-dcnode-id="2893"><span data-dcnode-id="2894" instrument_node="">nonprofit theatre</span></i></a><i data-dcnode-id="2890"><span data-dcnode-id="2891" instrument_node=""> continues to rely on grants, donations, and shows revenue</span></i><span data-dcnode-id="2889" instrument_node="">.</span></li><span data-dcnode-id="2887" instrument_node="">
</span><li data-dcnode-id="2868"><span data-dcnode-id="2869" style="font-weight: 400;"><strong data-dcnode-id="2885"><span data-dcnode-id="2886" instrument_node="">1929:</span></strong><span data-dcnode-id="2884" instrument_node=""> In </span><b data-dcnode-id="2882"><span data-dcnode-id="2883" instrument_node="">1929</span></b><span data-dcnode-id="2881" instrument_node="">, President Coolidge was the&nbsp;</span><b data-dcnode-id="2879"><span data-dcnode-id="2880" instrument_node="">first president to visit Polk County</span></b><span data-dcnode-id="2878" instrument_node="">. He spoke at the&nbsp;</span><a data-dcnode-id="2876" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//boktowergardens.org/tower-gardens/the-singing-tower/" rel="noopener noreferrer" target="_blank"><span data-dcnode-id="2877" instrument_node="">dedication of Bok Tower Gardens</span></a><span data-dcnode-id="2875" instrument_node="">&nbsp;and signed the guest register, which can still be seen today. At the&nbsp;</span><b data-dcnode-id="2873"><span data-dcnode-id="2874" instrument_node="">bottom of the gardens’ sundial</span></b><span data-dcnode-id="2872" instrument_node="">, visitors can read a line from his speech,</span><i data-dcnode-id="2870"><span data-dcnode-id="2871" instrument_node=""> “…dedicated and presented for the visitation of the American people.”&nbsp;&nbsp;</span></i></span></li><span data-dcnode-id="2867" instrument_node="">
</span></ul><span data-dcnode-id="2865" instrument_node="">
</span><h2 data-dcnode-id="2861"><span class="ez-toc-section" data-dcnode-id="2864" id="The_1930s"></span><span data-dcnode-id="2863" instrument_node="">The 1930s</span><span class="ez-toc-section-end" data-dcnode-id="2862"></span></h2><span data-dcnode-id="2860" instrument_node="">
</span><ul data-dcnode-id="2674"><span data-dcnode-id="2859" instrument_node="">
</span><li data-dcnode-id="2842"><span data-dcnode-id="2843" style="font-weight: 400;"><strong data-dcnode-id="2857"><span data-dcnode-id="2858" instrument_node="">1930: </span></strong><span data-dcnode-id="2856" instrument_node="">In September of 1930, </span><strong data-dcnode-id="2854"><span data-dcnode-id="2855" instrument_node="">Mr. George Jenkins</span></strong><span data-dcnode-id="2853" instrument_node=""> </span><a data-dcnode-id="2851" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//corporate.publix.com/about-publix/culture/history" target="_blank"><span data-dcnode-id="2852" instrument_node="">opened the very first Publix</span></a><span data-dcnode-id="2850" instrument_node=""> in </span><strong data-dcnode-id="2848"><span data-dcnode-id="2849" instrument_node="">Winter Haven, Florida</span></strong><span data-dcnode-id="2847" instrument_node=""> – which he named “</span><strong data-dcnode-id="2845"><span data-dcnode-id="2846" instrument_node="">The Publix Food Store</span></strong><span data-dcnode-id="2844" instrument_node="">.”&nbsp;</span></span></li><span data-dcnode-id="2841" instrument_node="">
</span><li data-dcnode-id="2822"><strong data-dcnode-id="2839"><span data-dcnode-id="2840" instrument_node="">1931: While it may sound a little odd, children in Lakeland in 1931 are very similar to the children residing in the city today. </span></strong><span data-dcnode-id="2838" instrument_node="">The </span><a data-dcnode-id="2836" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//laltoday.6amcity.com/weird-old-photos-in-lakeland-fl/"><span data-dcnode-id="2837" instrument_node="">little boy pictured here</span></a><span data-dcnode-id="2835" instrument_node=""> looks </span><strong data-dcnode-id="2833"><span data-dcnode-id="2834" instrument_node="">a little less than thrilled&nbsp;to don his costume</span></strong><span data-dcnode-id="2832" instrument_node="">. Here’s hoping&nbsp;</span><strong data-dcnode-id="2830"><span data-dcnode-id="2831" instrument_node="">he got a basket of candy in 1931</span></strong><span data-dcnode-id="2829" instrument_node="">&nbsp;to make up for it.&nbsp;</span><i data-dcnode-id="2827"><span data-dcnode-id="2828" instrument_node="">We salute you, little clown. We salute </span></i><strong data-dcnode-id="2823"><i data-dcnode-id="2825"><span data-dcnode-id="2826" instrument_node="">you</span></i><span data-dcnode-id="2824" instrument_node="">.&nbsp;</span></strong></li><span data-dcnode-id="2821" instrument_node="">
</span><li data-dcnode-id="2808"><strong data-dcnode-id="2819"><span data-dcnode-id="2820" instrument_node="">1932: </span></strong><a data-dcnode-id="2817" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//templeemanuellakeland.com/our-history/" target="_blank"><span data-dcnode-id="2818" instrument_node="">Temple Emmanuel</span></a><span data-dcnode-id="2816" instrument_node=""> – </span><strong data-dcnode-id="2813"><em data-dcnode-id="2814"><span data-dcnode-id="2815" instrument_node="">Lakeland’s first Jewish synagogue</span></em></strong><span data-dcnode-id="2812" instrument_node=""> – opened in 1932,</span><strong data-dcnode-id="2810"><span data-dcnode-id="2811" instrument_node=""> after the Florida Boom</span></strong><span data-dcnode-id="2809" instrument_node=""> brought more Jews to Central Florida.</span></li><span data-dcnode-id="2807" instrument_node="">
</span><li data-dcnode-id="2798"><strong data-dcnode-id="2805"><span data-dcnode-id="2806" instrument_node="">1933: Canadian tourism&nbsp;</span></strong><a data-dcnode-id="2803" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//lakelandpubliclibrary.contentdm.oclc.org/digital/collection/p15809coll71/id/77" target="_blank"><span data-dcnode-id="2804" instrument_node="">was dipping in 1933</span></a><span data-dcnode-id="2802" instrument_node=""> according to the </span><strong data-dcnode-id="2800"><span data-dcnode-id="2801" instrument_node="">Lakeland Tourist Club Annual Report</span></strong><span data-dcnode-id="2799" instrument_node="">.</span></li><span data-dcnode-id="2797" instrument_node="">
</span><li data-dcnode-id="2781"><strong data-dcnode-id="2795"><span data-dcnode-id="2796" instrument_node="">1934: </span></strong><span data-dcnode-id="2794" instrument_node="">The </span><strong data-dcnode-id="2792"><span data-dcnode-id="2793" instrument_node="">first airmail flight</span></strong><span data-dcnode-id="2791" instrument_node=""> came to the city in</span><strong data-dcnode-id="2789"><span data-dcnode-id="2790" instrument_node=""> October of 1934</span></strong><span data-dcnode-id="2788" instrument_node="">. The day was commemorated with a photo, where “</span><strong data-dcnode-id="2786"><span data-dcnode-id="2787" instrument_node="">Lakeland Postmaster Ferrell Smith</span></strong><span data-dcnode-id="2785" instrument_node="">, at left in the</span><strong data-dcnode-id="2783"><span data-dcnode-id="2784" instrument_node=""> dark sport coat and light pants</span></strong><span data-dcnode-id="2782" instrument_node="">, accepts the delivery.”</span></li><span data-dcnode-id="2780" instrument_node="">
</span><li data-dcnode-id="2760"><strong data-dcnode-id="2778"><span data-dcnode-id="2779" instrument_node="">1935: </span></strong><span data-dcnode-id="2777" instrument_node="">The </span><strong data-dcnode-id="2775"><span data-dcnode-id="2776" instrument_node="">New Florida Hotel at 128 S. Massachusetts Ave.</span></strong><span data-dcnode-id="2774" instrument_node=""> </span><a data-dcnode-id="2772" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//npgallery.nps.gov/GetAsset/007e0d43-583c-4b2b-ba7b-660b0ab42ad0" target="_blank"><span data-dcnode-id="2773" instrument_node="">was officially completed in 1935</span></a><span data-dcnode-id="2771" instrument_node="">. </span><em data-dcnode-id="2769"><span data-dcnode-id="2770" instrument_node="">At its completion</span></em><span data-dcnode-id="2768" instrument_node="">, the hotel featured </span><strong data-dcnode-id="2766"><span data-dcnode-id="2767" instrument_node="">arched windows</span></strong><br data-dcnode-id="2765"><span data-dcnode-id="2764" instrument_node="">
a</span><strong data-dcnode-id="2762"><span data-dcnode-id="2763" instrument_node=""> bell tower</span></strong><span data-dcnode-id="2761" instrument_node="">, and bracketed, pent tile roof.</span></li><span data-dcnode-id="2759" instrument_node="">
</span><li data-dcnode-id="2734"><strong data-dcnode-id="2757"><span data-dcnode-id="2758" instrument_node="">1936: James J. Braddock</span></strong><span data-dcnode-id="2756" instrument_node=""> – </span><em data-dcnode-id="2751"><span data-dcnode-id="2755" instrument_node="">a </span><strong data-dcnode-id="2753"><span data-dcnode-id="2754" instrument_node="">heavyweight boxing champion</span></strong><span data-dcnode-id="2752" instrument_node=""> from Florida</span></em><span data-dcnode-id="2750" instrument_node=""> </span><em data-dcnode-id="2745"><span data-dcnode-id="2749" instrument_node="">(known as </span><a data-dcnode-id="2747" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.jamesjbraddock.com/" target="_blank"><span data-dcnode-id="2748" instrument_node="">the Cinderella Man</span></a><span data-dcnode-id="2746" instrument_node="">)</span></em><span data-dcnode-id="2744" instrument_node=""> – </span><a data-dcnode-id="2742" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//lakelandpubliclibrary.contentdm.oclc.org/digital/collection/p15809coll10/id/168" target="_blank"><span data-dcnode-id="2743" instrument_node="">refereed a match in Lakeland</span></a><span data-dcnode-id="2741" instrument_node=""> in 1936 between </span><strong data-dcnode-id="2739"><span data-dcnode-id="2740" instrument_node="">Billy Hood</span></strong><span data-dcnode-id="2738" instrument_node=""> and </span><strong data-dcnode-id="2736"><span data-dcnode-id="2737" instrument_node="">Texas Joe Dundee</span></strong><span data-dcnode-id="2735" instrument_node="">.</span></li><span data-dcnode-id="2733" instrument_node="">
</span><li data-dcnode-id="2714"><strong data-dcnode-id="2731"><span data-dcnode-id="2732" instrument_node="">1937:</span></strong><span data-dcnode-id="2730" instrument_node=""> Before the&nbsp;</span><a data-dcnode-id="2728" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.lakelandairport.com/" rel="noopener noreferrer" target="_blank"><span data-dcnode-id="2729" instrument_node="">Lakeland Linder International Airport</span></a><span data-dcnode-id="2727" instrument_node="">&nbsp;came to be&nbsp;</span><i data-dcnode-id="2725"><span data-dcnode-id="2726" instrument_node="">(aka the other LAL)&nbsp;</span></i><span data-dcnode-id="2724" instrument_node="">the </span><strong data-dcnode-id="2722"><span data-dcnode-id="2723" instrument_node="">Lakeland Municipal Airport was the city’s headquarter airfield</span></strong><span data-dcnode-id="2721" instrument_node="">. To meet Lakeland’s transportation demands, in 1937 the airport </span><strong data-dcnode-id="2719"><span data-dcnode-id="2720" instrument_node="">brought its first commercial airline service</span></strong><span data-dcnode-id="2718" instrument_node=""> and soon became</span><strong data-dcnode-id="2716"><span data-dcnode-id="2717" instrument_node=""> the stomping&nbsp;grounds for WWII cadet training</span></strong><span data-dcnode-id="2715" instrument_node="">.</span></li><span data-dcnode-id="2713" instrument_node="">
</span><li data-dcnode-id="2690"><strong data-dcnode-id="2711"><span data-dcnode-id="2712" instrument_node="">1938: </span></strong><span data-dcnode-id="2710" instrument_node="">DYK the&nbsp;Frank Lloyd Wright architecture&nbsp;at Florida Southern College was&nbsp;built in part </span><strong data-dcnode-id="2708"><span data-dcnode-id="2709" instrument_node="">by students who couldn’t afford to go to college</span></strong><span data-dcnode-id="2707" instrument_node="">? In 1938, FSC president Dr. Spivey </span><strong data-dcnode-id="2705"><span data-dcnode-id="2706" instrument_node="">reached out to Wright about re-energizing + expanding the campus</span></strong><span data-dcnode-id="2704" instrument_node="">. Their </span><strong data-dcnode-id="2702"><span data-dcnode-id="2703" instrument_node="">collaborated solution</span></strong><span data-dcnode-id="2701" instrument_node=""> involved having students </span><strong data-dcnode-id="2699"><span data-dcnode-id="2700" instrument_node="">work their way through school</span></strong><span data-dcnode-id="2698" instrument_node=""> by helping build Wright’s designs. </span><i data-dcnode-id="2696"><span data-dcnode-id="2697" instrument_node="">See the full story&nbsp;</span></i><a data-dcnode-id="2693" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//gardenandgun.com/slideshow/frank-lloyd-wright-florida/list/%3Futm_source%3DLALtoday%2BMaster%26utm_campaign%3D2fa351f9f9-EMAIL_CAMPAIGN_2018_12_28_02_59_COPY_16%26utm_medium%3Demail%26utm_term%3D0_36372d48fb-2fa351f9f9-41894997" rel="noopener noreferrer" target="_blank"><i data-dcnode-id="2694"><span data-dcnode-id="2695" instrument_node="">here</span></i></a><i data-dcnode-id="2691"><span data-dcnode-id="2692" instrument_node="">.</span></i></li><span data-dcnode-id="2689" instrument_node="">
</span><li data-dcnode-id="2676"><strong data-dcnode-id="2687"><span data-dcnode-id="2688" instrument_node="">1939:</span></strong><span data-dcnode-id="2686" instrument_node=""> The Lakeland, Francis Beach Pavilion –</span><em data-dcnode-id="2684"><span data-dcnode-id="2685" instrument_node=""> developed + named by a FL businessman</span></em><span data-dcnode-id="2683" instrument_node=""> – </span><a data-dcnode-id="2681" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//lakelandpubliclibrary.contentdm.oclc.org/digital/collection/p15809coll7/id/389" target="_blank"><span data-dcnode-id="2682" instrument_node="">was officially torn down in 1939</span></a><span data-dcnode-id="2680" instrument_node="">, after being the</span><strong data-dcnode-id="2678"><span data-dcnode-id="2679" instrument_node=""> one-shop-stop for Lakeside entertainment since 1915</span></strong><span data-dcnode-id="2677" instrument_node="">.</span></li><span data-dcnode-id="2675" instrument_node="">
</span></ul><span data-dcnode-id="2673" instrument_node="">
</span><h2 data-dcnode-id="2669"><span class="ez-toc-section" data-dcnode-id="2672" id="The_1940s"></span><span data-dcnode-id="2671" instrument_node="">The 1940s</span><span class="ez-toc-section-end" data-dcnode-id="2670"></span></h2><span data-dcnode-id="2668" instrument_node="">
</span><ul data-dcnode-id="2493"><span data-dcnode-id="2667" instrument_node="">
</span><li data-dcnode-id="2648"><strong data-dcnode-id="2665"><span data-dcnode-id="2666" instrument_node="">1940:</span></strong><span data-dcnode-id="2664" instrument_node=""> Between 1940–1945, the Lodwick school trained more than </span><a data-dcnode-id="2662" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.theledger.com/news/20110206/flight-cadets-attended-lakeland-school-of-aeronautics" rel="noopener noreferrer" target="_blank"><span data-dcnode-id="2663" instrument_node="">8,000 Army Air Corps cadets</span></a><span data-dcnode-id="2661" instrument_node="">, with more than&nbsp;</span><a data-dcnode-id="2659" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.theledger.com/news/20110206/flight-cadets-attended-lakeland-school-of-aeronautics" rel="noopener noreferrer" target="_blank"><span data-dcnode-id="2660" instrument_node="">6,000 graduates</span></a><span data-dcnode-id="2658" instrument_node="">. In 1941 the facilities also trained </span><strong data-dcnode-id="2656"><span data-dcnode-id="2657" instrument_node="">1,327 British Royal Air Force cadets</span></strong><span data-dcnode-id="2655" instrument_node="">. The Lodwick School of Aeronautics </span><strong data-dcnode-id="2653"><span data-dcnode-id="2654" instrument_node="">closed in 1945</span></strong><span data-dcnode-id="2652" instrument_node=""> having offered</span><strong data-dcnode-id="2650"><span data-dcnode-id="2651" instrument_node=""> insurmountable historic contributions to our country and the war</span></strong><span data-dcnode-id="2649" instrument_node="">.</span></li><span data-dcnode-id="2647" instrument_node="">
</span><li data-dcnode-id="2634"><strong data-dcnode-id="2645"><span data-dcnode-id="2646" instrument_node="">1941:</span></strong><span data-dcnode-id="2644" instrument_node=""> People in Polk County could </span><a data-dcnode-id="2642" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//lakelandpubliclibrary.contentdm.oclc.org/digital/collection/p15809coll9/id/2" target="_blank"><span data-dcnode-id="2643" instrument_node="">hitch rides on The Tamiami Champion</span></a><span data-dcnode-id="2641" instrument_node="">, as it “provided r</span><strong data-dcnode-id="2639"><span data-dcnode-id="2640" instrument_node="">egular passenger service from New York City</span></strong><span data-dcnode-id="2638" instrument_node=""> to St. Petersburg, Florida, with a number of stops along the way,</span><strong data-dcnode-id="2636"><span data-dcnode-id="2637" instrument_node=""> including Lakeland, Florida</span></strong><span data-dcnode-id="2635" instrument_node="">.”</span></li><span data-dcnode-id="2633" instrument_node="">
</span><li data-dcnode-id="2618"><strong data-dcnode-id="2631"><span data-dcnode-id="2632" instrument_node="">1942:</span></strong><span data-dcnode-id="2630" instrument_node=""> Lakelanders –</span><em data-dcnode-id="2628"><span data-dcnode-id="2629" instrument_node=""> far + wide</span></em><span data-dcnode-id="2627" instrument_node=""> – were </span><a data-dcnode-id="2625" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//lakelandpubliclibrary.contentdm.oclc.org/digital/collection/p15809coll10/id/777" target="_blank"><span data-dcnode-id="2626" instrument_node="">collecting scrap metal</span></a><span data-dcnode-id="2624" instrument_node=""> like</span><strong data-dcnode-id="2622"><span data-dcnode-id="2623" instrument_node=""> aluminum pots + pans</span></strong><span data-dcnode-id="2621" instrument_node=""> to </span><strong data-dcnode-id="2619"><span data-dcnode-id="2620" instrument_node="">support the war effort.</span></strong></li><span data-dcnode-id="2617" instrument_node="">
</span><li data-dcnode-id="2601"><strong data-dcnode-id="2615"><span data-dcnode-id="2616" instrument_node="">1943: </span></strong><span data-dcnode-id="2614" instrument_node="">As Lakelanders continued </span><strong data-dcnode-id="2612"><span data-dcnode-id="2613" instrument_node="">their involvement in WWII</span></strong><span data-dcnode-id="2611" instrument_node="">, the General Federation of Women’s Clubs initiated a “</span><a data-dcnode-id="2609" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//lakelandpubliclibrary.contentdm.oclc.org/digital/collection/p15809coll7/id/512" target="_blank"><span data-dcnode-id="2610" instrument_node="">Buy A Bomber</span></a><span data-dcnode-id="2608" instrument_node="">” campaign to </span><strong data-dcnode-id="2606"><span data-dcnode-id="2607" instrument_node="">raise funds to help the purchase of bombers</span></strong><span data-dcnode-id="2605" instrument_node="">. The Lakeland’s women’s clubs </span><strong data-dcnode-id="2603"><span data-dcnode-id="2604" instrument_node="">ended up collecting enough funds to secure two bombers</span></strong><span data-dcnode-id="2602" instrument_node="">.</span></li><span data-dcnode-id="2600" instrument_node="">
</span><li data-dcnode-id="2590"><strong data-dcnode-id="2598"><span data-dcnode-id="2599" instrument_node="">1944: </span></strong><span data-dcnode-id="2597" instrument_node="">Lakeland residents, </span><a data-dcnode-id="2595" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.theledger.com/news/20051224/1944-an-unforgettable-21st-birthday" target="_blank"><span data-dcnode-id="2596" instrument_node="">like Charlie Yaist</span></a><span data-dcnode-id="2594" instrument_node="">, were </span><strong data-dcnode-id="2592"><span data-dcnode-id="2593" instrument_node="">fighting in WWII</span></strong><span data-dcnode-id="2591" instrument_node="">.</span></li><span data-dcnode-id="2589" instrument_node="">
</span><li data-dcnode-id="2569"><strong data-dcnode-id="2586"><strong data-dcnode-id="2587"><span data-dcnode-id="2588" instrument_node="">1945: </span></strong></strong><span data-dcnode-id="2585" instrument_node="">The City of Lakeland secured its spot as</span><strong data-dcnode-id="2583"><span data-dcnode-id="2584" instrument_node=""> the headquarters for Publix</span></strong><span data-dcnode-id="2582" instrument_node=""> when </span><strong data-dcnode-id="2580"><span data-dcnode-id="2581" instrument_node="">Mr. George Jenkins</span></strong><span data-dcnode-id="2579" instrument_node=""> </span><a data-dcnode-id="2577" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//lakelandpubliclibrary.contentdm.oclc.org/digital/collection/p15809coll24/id/21" target="_blank"><span data-dcnode-id="2578" instrument_node="">purchased the Lakeland Grocery Company</span></a><span data-dcnode-id="2576" instrument_node=""> (</span><em data-dcnode-id="2574"><span data-dcnode-id="2575" instrument_node="">with its chain of All American grocery stores). </span></em><span data-dcnode-id="2573" instrument_node="">Part of this deal came with an office + warehouses, </span><strong data-dcnode-id="2571"><span data-dcnode-id="2572" instrument_node="">creating Publix’s distribution system</span></strong><span data-dcnode-id="2570" instrument_node="">.</span></li><span data-dcnode-id="2568" instrument_node="">
</span><li data-dcnode-id="2551"><strong data-dcnode-id="2566"><span data-dcnode-id="2567" instrument_node="">1946:</span></strong><span data-dcnode-id="2565" instrument_node=""> To </span><strong data-dcnode-id="2563"><span data-dcnode-id="2564" instrument_node="">commemorate locals that died in the war</span></strong><span data-dcnode-id="2562" instrument_node="">, </span><strong data-dcnode-id="2560"><span data-dcnode-id="2561" instrument_node="">the 1946 Highlander was dedicated to the thirty-four graduates</span></strong><span data-dcnode-id="2559" instrument_node=""> of </span><strong data-dcnode-id="2557"><span data-dcnode-id="2558" instrument_node="">Lakeland High School</span></strong><span data-dcnode-id="2556" instrument_node=""> who passed away during their service. </span><a data-dcnode-id="2553" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//lakelandpubliclibrary.contentdm.oclc.org/digital/collection/p15809coll54/id/576" target="_blank"><em data-dcnode-id="2554"><span data-dcnode-id="2555" instrument_node="">Read about them here</span></em></a><span data-dcnode-id="2552" instrument_node="">.</span></li><span data-dcnode-id="2550" instrument_node="">
</span><li data-dcnode-id="2541"><strong data-dcnode-id="2548"><span data-dcnode-id="2549" instrument_node="">1947: </span></strong><span data-dcnode-id="2547" instrument_node="">Lakeland </span><a data-dcnode-id="2545" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//lakelandpubliclibrary.contentdm.oclc.org/digital/collection/p15809coll10/id/384" target="_blank"><span data-dcnode-id="2546" instrument_node="">started its construction on the Charles Larsen Power Plant on Lake Parker</span></a><span data-dcnode-id="2544" instrument_node=""> in 1947. </span><em data-dcnode-id="2542"><span data-dcnode-id="2543" instrument_node="">The plant went into operation in 1950.&nbsp;</span></em></li><span data-dcnode-id="2540" instrument_node="">
</span><li data-dcnode-id="2509"><strong data-dcnode-id="2538"><span data-dcnode-id="2539" instrument_node="">1948: </span></strong><span data-dcnode-id="2537" instrument_node="">I. Q. Mize and M. G. Waring&nbsp;</span><a data-dcnode-id="2535" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.facebook.com/silvermoondrivein/" target="_blank"><span data-dcnode-id="2536" instrument_node="">opened the&nbsp;first-ever drive-in movie theatre&nbsp;in Lakeland</span></a><span data-dcnode-id="2534" instrument_node=""> – </span><i data-dcnode-id="2532"><span data-dcnode-id="2533" instrument_node="">with an admission fee of only </span></i><strong data-dcnode-id="2530"><span data-dcnode-id="2531" instrument_node="">35 cents per person</span></strong><span data-dcnode-id="2529" instrument_node=""> –and it was deemed in the morning’s paper as “</span><strong data-dcnode-id="2527"><span data-dcnode-id="2528" instrument_node="">FLORIDA’S NEWEST MOST MODERN OUTDOOR THEATRE</span></strong><span data-dcnode-id="2526" instrument_node="">.”&nbsp;&nbsp;In&nbsp;1952,</span><strong data-dcnode-id="2524"><span data-dcnode-id="2525" instrument_node=""> the property was sold to&nbsp;Carl Floyd</span></strong><span data-dcnode-id="2523" instrument_node="">, who added</span><strong data-dcnode-id="2521"><span data-dcnode-id="2522" instrument_node=""> the&nbsp;iconic flashing neon sign</span></strong><span data-dcnode-id="2520" instrument_node="">&nbsp;+&nbsp;marquee&nbsp;that&nbsp;visitors can still </span><strong data-dcnode-id="2518"><span data-dcnode-id="2519" instrument_node="">view&nbsp;from the highway</span></strong><span data-dcnode-id="2517" instrument_node="">, today.&nbsp;</span><i data-dcnode-id="2515"><span data-dcnode-id="2516" instrument_node="">Read the full history&nbsp;</span></i><a data-dcnode-id="2512" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.silvermoondrivein.com/about-us/" rel="noopener noreferrer" target="_blank"><i data-dcnode-id="2513"><span data-dcnode-id="2514" instrument_node="">here</span></i></a><i data-dcnode-id="2510"><span data-dcnode-id="2511" instrument_node="">.</span></i></li><span data-dcnode-id="2508" instrument_node="">
</span><li data-dcnode-id="2495"><strong data-dcnode-id="2506"><span data-dcnode-id="2507" instrument_node="">1949: </span></strong><span data-dcnode-id="2505" instrument_node="">Along Main St. in 1949, </span><strong data-dcnode-id="2503"><span data-dcnode-id="2504" instrument_node="">The Negro Benevolent and Paternal Order of Elks</span></strong><span data-dcnode-id="2502" instrument_node=""> </span><a data-dcnode-id="2500" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//lakelandpubliclibrary.contentdm.oclc.org/digital/collection/p15809coll7/id/25" target="_blank"><span data-dcnode-id="2501" instrument_node="">performed a march</span></a><span data-dcnode-id="2499" instrument_node=""> as part of the organization’s</span><strong data-dcnode-id="2497"><span data-dcnode-id="2498" instrument_node=""> twenty-fifth annual convention</span></strong><span data-dcnode-id="2496" instrument_node="">.</span></li><span data-dcnode-id="2494" instrument_node="">
</span></ul><span data-dcnode-id="2492" instrument_node="">
</span><h2 data-dcnode-id="2488"><span class="ez-toc-section" data-dcnode-id="2491" id="The_1950s"></span><span data-dcnode-id="2490" instrument_node="">The 1950s</span><span class="ez-toc-section-end" data-dcnode-id="2489"></span></h2><span data-dcnode-id="2487" instrument_node="">
</span><ul data-dcnode-id="2305"><span data-dcnode-id="2486" instrument_node="">
</span><li data-dcnode-id="2464"><strong data-dcnode-id="2484"><span data-dcnode-id="2485" instrument_node="">1950: </span></strong><em data-dcnode-id="2482"><span data-dcnode-id="2483" instrument_node="">Dating back to the 1950s</span></em><span data-dcnode-id="2481" instrument_node="">, </span><a data-dcnode-id="2479" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//lakelandpubliclibrary.contentdm.oclc.org/digital/collection/p15809coll14/id/16/rec/14" target="_blank"><span data-dcnode-id="2480" instrument_node="">this family circus act</span></a><span data-dcnode-id="2478" instrument_node=""> known as “</span><strong data-dcnode-id="2476"><span data-dcnode-id="2477" instrument_node="">The Four Bernadinos”</span></strong><span data-dcnode-id="2475" instrument_node=""> performed </span><strong data-dcnode-id="2473"><span data-dcnode-id="2474" instrument_node="">acrobatic, tumbling, and balancing acts</span></strong><span data-dcnode-id="2472" instrument_node="">, throughout Polk County.&nbsp;</span><strong data-dcnode-id="2469"><br data-dcnode-id="2471"><span data-dcnode-id="2470" instrument_node="">
1951: </span></strong><span data-dcnode-id="2468" instrument_node="">“Publix built </span><a data-dcnode-id="2466" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//lakelandpubliclibrary.contentdm.oclc.org/digital/collection/p15809coll24/id/20" target="_blank"><span data-dcnode-id="2467" instrument_node="">a new 125,000-square-foot warehouse</span></a><span data-dcnode-id="2465" instrument_node=""> and office complex in west Lakeland.”</span></li><span data-dcnode-id="2463" instrument_node="">
</span><li data-dcnode-id="2454"><strong data-dcnode-id="2461"><span data-dcnode-id="2462" instrument_node="">1952: </span></strong><a data-dcnode-id="2459" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//lakelandpubliclibrary.contentdm.oclc.org/digital/collection/p15809coll10/id/639/rec/49" target="_blank"><span data-dcnode-id="2460" instrument_node="">Check out this image of a parade float</span></a><span data-dcnode-id="2458" instrument_node="">, sponsored by the </span><strong data-dcnode-id="2456"><span data-dcnode-id="2457" instrument_node="">Engle Electric Company in Downtown Lakeland</span></strong><span data-dcnode-id="2455" instrument_node="">.</span></li><span data-dcnode-id="2453" instrument_node="">
</span><li data-dcnode-id="2427"><strong data-dcnode-id="2451"><span data-dcnode-id="2452" instrument_node="">1953:</span></strong><span data-dcnode-id="2450" instrument_node=""> DYK </span><b data-dcnode-id="2448"><span data-dcnode-id="2449" instrument_node="">swans</span></b><span data-dcnode-id="2447" instrument_node="">&nbsp;</span><b data-dcnode-id="2445"><span data-dcnode-id="2446" instrument_node="">have been around Lakeland for nearly a century</span></b><span data-dcnode-id="2444" instrument_node="">&nbsp;now? The earliest records date back to&nbsp;</span><b data-dcnode-id="2442"><span data-dcnode-id="2443" instrument_node="">1923</span></b><span data-dcnode-id="2441" instrument_node="">&nbsp;</span><i data-dcnode-id="2439"><span data-dcnode-id="2440" instrument_node="">(the same year of the Yankee stadium grand opening + Time Magazine’s first issue)</span></i><span data-dcnode-id="2438" instrument_node="">. In the 1950s, the swans slowly disappeared and Queen Elizabeth received a request to donate two royal swans, after which&nbsp;</span><b data-dcnode-id="2436"><span data-dcnode-id="2437" instrument_node="">Lakeland raised money</span></b><span data-dcnode-id="2435" instrument_node="">&nbsp;to have more swans transported overseas.&nbsp;</span><i data-dcnode-id="2433"><span data-dcnode-id="2434" instrument_node="">Read the full story&nbsp;</span></i><a data-dcnode-id="2430" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//laltoday.6amcity.com/tbt-swans-got/"><i data-dcnode-id="2431"><span data-dcnode-id="2432" instrument_node="">here</span></i></a><i data-dcnode-id="2428"><span data-dcnode-id="2429" instrument_node="">.</span></i></li><span data-dcnode-id="2426" instrument_node="">
</span><li data-dcnode-id="2413"><strong data-dcnode-id="2424"><span data-dcnode-id="2425" instrument_node="">1954: </span></strong><span data-dcnode-id="2423" instrument_node="">The </span><strong data-dcnode-id="2421"><span data-dcnode-id="2422" instrument_node="">Juinor Welfare League of Lakeland</span></strong><span data-dcnode-id="2420" instrument_node=""> brought </span><a data-dcnode-id="2418" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//lakelandpubliclibrary.contentdm.oclc.org/digital/collection/p15809coll33/id/9" target="_blank"><span data-dcnode-id="2419" instrument_node="">the very first bookmobile to the city</span></a><span data-dcnode-id="2417" instrument_node="">.&nbsp;</span><strong data-dcnode-id="2414"><br data-dcnode-id="2416"><span data-dcnode-id="2415" instrument_node="">
</span></strong></li><span data-dcnode-id="2412" instrument_node="">
</span><li data-dcnode-id="2391"><strong data-dcnode-id="2410"><span data-dcnode-id="2411" instrument_node="">1955: </span></strong><span data-dcnode-id="2409" instrument_node="">No&nbsp;</span><strong data-dcnode-id="2407"><span data-dcnode-id="2408" instrument_node="">drive through Dixieland</span></strong><span data-dcnode-id="2406" instrument_node="">&nbsp;is complete without a glance at the </span><strong data-dcnode-id="2404"><span data-dcnode-id="2405" instrument_node="">Southside Cleaner’s&nbsp;quote of the day</span></strong><span data-dcnode-id="2403" instrument_node="">. Though the </span><strong data-dcnode-id="2401"><span data-dcnode-id="2402" instrument_node="">sea-foam green +&nbsp;sunny starburst&nbsp;sign</span></strong><span data-dcnode-id="2400" instrument_node=""> has been around since&nbsp;</span><strong data-dcnode-id="2398"><span data-dcnode-id="2399" instrument_node="">1962</span></strong><em data-dcnode-id="2396"><span data-dcnode-id="2397" instrument_node=""> (and is&nbsp;curated with different phrases on the marquee throughout the week)</span></em><span data-dcnode-id="2395" instrument_node=""> the business first </span><a data-dcnode-id="2393" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//lakelandpubliclibrary.contentdm.oclc.org/digital/collection/p15809coll18/id/39" target="_blank"><span data-dcnode-id="2394" instrument_node="">opened up in 1955 as Florida Drive-In Cleaners</span></a><span data-dcnode-id="2392" instrument_node="">.</span></li><span data-dcnode-id="2390" instrument_node="">
</span><li data-dcnode-id="2358"><strong data-dcnode-id="2388"><span data-dcnode-id="2389" instrument_node="">1956:</span></strong><span data-dcnode-id="2387" instrument_node=""> On August 6, 1956, </span><b data-dcnode-id="2385"><span data-dcnode-id="2386" instrument_node="">Elvis Presley</span></b><span data-dcnode-id="2384" instrument_node="">&nbsp;gave what will be remembered as an iconic performance at the&nbsp;</span><b data-dcnode-id="2382"><span data-dcnode-id="2383" instrument_node="">Polk Theatre</span></b><span data-dcnode-id="2381" instrument_node="">. That night, he&nbsp;</span><b data-dcnode-id="2379"><span data-dcnode-id="2380" instrument_node="">sat in an overheated dressing room</span></b><span data-dcnode-id="2378" instrument_node="">, chatting with a reporter about his “wigglin’ and quiverin’” +&nbsp;</span><b data-dcnode-id="2376"><span data-dcnode-id="2377" instrument_node="">his nickname ‘Elvis the Pelvis.’&nbsp;</span></b><span data-dcnode-id="2375" instrument_node="">The three-part series from TV Guide Magazine is called “He Tells How the Little Wiggle Grew.”&nbsp;</span><a data-dcnode-id="2372" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.tvinsider.com/747175/elvis-presley-pelvis-dance-moves-tv-guide-magazine-1956/" rel="noopener noreferrer" target="_blank"><i data-dcnode-id="2373"><span data-dcnode-id="2374" instrument_node="">Read more</span></i></a><i data-dcnode-id="2370"><span data-dcnode-id="2371" instrument_node="">&nbsp;about what the King of Rock thought of his public reception.&nbsp;</span></i><span data-dcnode-id="2369" instrument_node="">Rumor has it that Elvis also&nbsp;</span><b data-dcnode-id="2367"><span data-dcnode-id="2368" instrument_node="">autographed the dressing room wall</span></b><span data-dcnode-id="2366" instrument_node="">&nbsp;during his visit, which was later damaged by flooding.&nbsp;</span><i data-dcnode-id="2364"><span data-dcnode-id="2365" instrument_node="">Read more about that night&nbsp;</span></i><a data-dcnode-id="2361" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//laltoday.6amcity.com/elvis-presleys-iconic-visit-lkld/%3Fomhide%3Dtrue%26utm_source%3DLALtoday%2BMaster%26utm_campaign%3D39935953b5-EMAIL_CAMPAIGN_2018_09_18_04_21_COPY_01%26utm_medium%3Demail%26utm_term%3D0_36372d48fb-39935953b5-41894997"><i data-dcnode-id="2362"><span data-dcnode-id="2363" instrument_node="">here</span></i></a><i data-dcnode-id="2359"><span data-dcnode-id="2360" instrument_node="">.</span></i></li><span data-dcnode-id="2357" instrument_node="">
</span><li data-dcnode-id="2332"><strong data-dcnode-id="2355"><span data-dcnode-id="2356" instrument_node="">1957: Founder Joe P. Ruthven&nbsp;</span></strong><span data-dcnode-id="2354" instrument_node="">came from S.C. to FL, where he met his wife&nbsp;</span><i data-dcnode-id="2352"><span data-dcnode-id="2353" instrument_node="">(who was from Lakeland).</span></i><span data-dcnode-id="2351" instrument_node="">&nbsp;Joe moved to Lakeland to&nbsp;open and build his tire business.&nbsp;The </span><strong data-dcnode-id="2349"><span data-dcnode-id="2350" instrument_node="">business was carried out by his family</span></strong><span data-dcnode-id="2348" instrument_node=""> and opened several other stores throughout the area. In n</span><strong data-dcnode-id="2346"><span data-dcnode-id="2347" instrument_node="">eed of his own storage for his business</span></strong><span data-dcnode-id="2345" instrument_node="">, he&nbsp;began building spec warehouse space.&nbsp;</span><a data-dcnode-id="2342" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//vimeo.com/109042343" rel="noopener noreferrer" target="_blank"><i data-dcnode-id="2343"><span data-dcnode-id="2344" instrument_node="">Watch this video</span></i></a><i data-dcnode-id="2340"><span data-dcnode-id="2341" instrument_node=""> to learn more about</span></i><span data-dcnode-id="2339" instrument_node="">&nbsp;</span><i data-dcnode-id="2337"><span data-dcnode-id="2338" instrument_node="">this</span></i><i data-dcnode-id="2335"><span data-dcnode-id="2336" instrument_node="">&nbsp;local family business</span></i><i data-dcnode-id="2333"><span data-dcnode-id="2334" instrument_node="">.&nbsp;</span></i></li><span data-dcnode-id="2331" instrument_node="">
