c="{}" style="font-size: 1rem;"><span data-dcnode-id="3816" instrument_node="">Though to us, she doesn’t look a day over 100.</span></span></em><span data-dcnode-id="3811" style="font-size: 1rem;"><span data-dcnode-id="3813" instrument_node=""> </span><img alt="😉" class="emoji" data-dcnode-id="3812" draggable="false" role="img" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//s.w.org/images/core/emoji/13.1.0/svg/1f609.svg&amp;raw"></span></p><span data-dcnode-id="3809" instrument_node="">
</span><p data-dcnode-id="3777"><em data-dcnode-id="3804"><span data-dcnode-id="3807" style="font-size: 1rem;"><span data-dcnode-id="3808" instrument_node="">DYK Lakeland was established all the </span></span><span data-dcnode-id="3805" data-rendering-method="normal" data-taxi-style-rich-style-bold="{}" style="font-size: 1rem;"><span data-dcnode-id="3806" instrument_node="">way back in 1885</span></span></em><span data-dcnode-id="3800" style="font-size: 1rem;"><em data-dcnode-id="3802"><span data-dcnode-id="3803" instrument_node="">?</span></em><span data-dcnode-id="3801" instrument_node=""> That same year </span></span><strong data-dcnode-id="3797"><span data-dcnode-id="3798" data-rendering-method="normal" data-taxi-style-rich-style-bold="{}" style="font-size: 1rem;"><span data-dcnode-id="3799" instrument_node="">Grover Cleaveland</span></span></strong><span data-dcnode-id="3793" style="font-size: 1rem;"><strong data-dcnode-id="3795"><span data-dcnode-id="3796" instrument_node=""> became the 22nd President of the US</span></strong><span data-dcnode-id="3794" instrument_node="">, when the </span></span><strong data-dcnode-id="3790"><span data-dcnode-id="3791" data-rendering-method="normal" data-taxi-style-rich-style-bold="{}" style="font-size: 1rem;"><span data-dcnode-id="3792" instrument_node="">first motorcycle</span></span></strong><span data-dcnode-id="3788" style="font-size: 1rem;"><span data-dcnode-id="3789" instrument_node=""> was unveiled, when Mark Twain’s “</span></span><strong data-dcnode-id="3785"><span data-dcnode-id="3786" data-rendering-method="normal" data-taxi-style-rich-style-bold="{}" style="font-size: 1rem;"><span data-dcnode-id="3787" instrument_node="">Adventures of Huckleberry Finn</span></span></strong><span data-dcnode-id="3783" style="font-size: 1rem;"><span data-dcnode-id="3784" instrument_node="">” was published + the </span></span><strong data-dcnode-id="3780"><span data-dcnode-id="3781" data-rendering-method="normal" data-taxi-style-rich-style-bold="{}" style="font-size: 1rem;"><span data-dcnode-id="3782" instrument_node="">first issue of Good Housekeeping</span></span></strong><span data-dcnode-id="3778" style="font-size: 1rem;"><span data-dcnode-id="3779" instrument_node=""> made its debut.&nbsp;</span></span></p><span data-dcnode-id="3776" instrument_node="">
</span><p data-dcnode-id="3758"><span data-dcnode-id="3775" instrument_node="">To</span><span data-dcnode-id="3773" data-rendering-method="normal" data-taxi-style-rich-style-bold="{}"><span data-dcnode-id="3774" instrument_node=""> celebrate our little Swan City’s big day</span></span><span data-dcnode-id="3772" instrument_node="">, we’ve</span><span data-dcnode-id="3768" data-rendering-method="normal" data-taxi-style-rich-style-bold="{}"><strong data-dcnode-id="3770"><span data-dcnode-id="3771" instrument_node=""> created a timeline of an estimated 136 “historical” events</span></strong><span data-dcnode-id="3769" instrument_node=""> that</span></span><span data-dcnode-id="3767" instrument_node=""> occurred in Lakeland</span><em data-dcnode-id="3765"><span data-dcnode-id="3766" instrument_node=""> (and the surrounding areas)</span></em><span data-dcnode-id="3764" instrument_node="">, from </span><strong data-dcnode-id="3762"><span data-dcnode-id="3763" instrument_node="">1885-2020</span></strong><span data-dcnode-id="3760" data-rendering-method="normal" data-taxi-style-rich-style-italic="{}"><span data-dcnode-id="3761" instrument_node="">. </span></span><img alt="⬇️" class="emoji" data-dcnode-id="3759" draggable="false" role="img" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//s.w.org/images/core/emoji/13.1.0/svg/2b07.svg&amp;raw"></p><span data-dcnode-id="3757" instrument_node="">
</span><p data-dcnode-id="3751"><em data-dcnode-id="3752"><span data-dcnode-id="3756" instrument_node="">*Disclaimer: We know our city has an incredibly rich history + this article by no means covers it all. If we missed something you think we should know about, please email us at </span><a data-dcnode-id="3753" href="mailto:hello@laltoday.com"><span data-dcnode-id="3755" instrument_node="">hello@laltoday.com.</span><span data-dcnode-id="3754" instrument_node="">&nbsp;</span></a></em></p><span data-dcnode-id="3750" instrument_node="">
</span><h2 data-dcnode-id="3746"><span class="ez-toc-section" data-dcnode-id="3749" id="The_1880s"></span><span data-dcnode-id="3748" instrument_node="">The 1880s</span><span class="ez-toc-section-end" data-dcnode-id="3747"></span></h2><span data-dcnode-id="3745" instrument_node="">
</span><ul data-dcnode-id="3631"><span data-dcnode-id="3744" instrument_node="">
</span><li data-dcnode-id="3714"><b data-dcnode-id="3742"><span data-dcnode-id="3743" instrument_node="">1885</span></b><span data-dcnode-id="3740" style="font-weight: 400;"><span data-dcnode-id="3741" instrument_node="">: This was the year The City of Lakeland </span></span><a data-dcnode-id="3737" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.lakelandgov.net/departments/library/lakeland-history-room/brief-history-of-lakeland/%23%3A~%3Atext%3DLakeland%252C%2520Florida%2520was%2520incorporated%2520January%2Ca%2520resident%2520of%2520Louisville%252C%2520Kentucky." target="_blank"><span data-dcnode-id="3738" style="font-weight: 400;"><span data-dcnode-id="3739" instrument_node="">was incorporated</span></span></a><span data-dcnode-id="3732" style="font-weight: 400;"><span data-dcnode-id="3736" instrument_node="">. DYK before the </span><strong data-dcnode-id="3734"><span data-dcnode-id="3735" instrument_node="">townsfolk of 1885</span></strong><span data-dcnode-id="3733" instrument_node=""> drew inspiration from the city’s 38 lakes, they </span></span><a data-dcnode-id="3729" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//laltoday.6amcity.com/tbt-lakeland-got-name/"><span data-dcnode-id="3730" style="font-weight: 400;"><span data-dcnode-id="3731" instrument_node="">kicked around a couple of other naming suggestions</span></span></a><span data-dcnode-id="3715" style="font-weight: 400;"><span data-dcnode-id="3716" style="font-weight: 400;"><span data-dcnode-id="3717" style="font-weight: 400;"><span data-dcnode-id="3718" style="font-weight: 400;"><span data-dcnode-id="3728" instrument_node="">? Interestingly enough, after the </span><strong data-dcnode-id="3726"><span data-dcnode-id="3727" instrument_node="">neighboring town of Acton</span></strong><span data-dcnode-id="3725" instrument_node=""> experienced a </span><strong data-dcnode-id="3723"><span data-dcnode-id="3724" instrument_node="">mysterious fire to their railroad depot</span></strong><span data-dcnode-id="3722" instrument_node="">, a more modern depot was built in Lakeland + </span><a data-dcnode-id="3720" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.lakelandgov.net/departments/library/lakeland-history-room/brief-history-of-lakeland/" target="_blank"><span data-dcnode-id="3721" instrument_node="">the town of Acton diminished entirely</span></a><span data-dcnode-id="3719" instrument_node="">.</span></span></span></span></span></li><span data-dcnode-id="3713" instrument_node="">
</span><li data-dcnode-id="3683"><strong data-dcnode-id="3711"><span data-dcnode-id="3712" instrument_node="">1886:</span></strong><span data-dcnode-id="3710" instrument_node=""> </span><em data-dcnode-id="3708"><span data-dcnode-id="3709" instrument_node="">To combat crime</span></em><span data-dcnode-id="3707" instrument_node="">, city officials decided that there was to be no “</span><strong data-dcnode-id="3705"><span data-dcnode-id="3706" instrument_node="">straggling around town</span></strong><span data-dcnode-id="3704" instrument_node="">” allowed in Lakeland, and an ordinance deeming it prohibited was passed in 1886. </span><span data-dcnode-id="3684" style="font-weight: 400;"><span data-dcnode-id="3685" style="font-weight: 400;"><span data-dcnode-id="3686" style="font-weight: 400;"><span data-dcnode-id="3687" style="font-weight: 400;"><span data-dcnode-id="3703" instrument_node="">The second half of the year, after the ordinance was put in place, there were </span><strong data-dcnode-id="3701"><span data-dcnode-id="3702" instrument_node="">30+ arrests</span></strong><span data-dcnode-id="3700" instrument_node=""> – including charges that involved gambling, swearing, </span><strong data-dcnode-id="3698"><span data-dcnode-id="3699" instrument_node="">public drinking</span></strong><span data-dcnode-id="3697" instrument_node="">, sanitary violation + </span><strong data-dcnode-id="3695"><span data-dcnode-id="3696" instrument_node="">peddling without proper licenses</span></strong><span data-dcnode-id="3694" instrument_node="">. </span><strong data-dcnode-id="3692"><span data-dcnode-id="3693" instrument_node="">McDermont House</span></strong><span data-dcnode-id="3691" instrument_node=""> – </span><em data-dcnode-id="3689"><span data-dcnode-id="3690" instrument_node="">the city’s first jail, named after it’s initial occupant –</span></em><span data-dcnode-id="3688" instrument_node="">&nbsp;was built shortly after.</span></span></span></span></span></li><span data-dcnode-id="3682" instrument_node="">
</span><li data-dcnode-id="3666"><strong data-dcnode-id="3680"><span data-dcnode-id="3681" instrument_node="">1887: The Marsh Grapefruit&nbsp;</span></strong><span data-dcnode-id="3679" instrument_node="">was </span><strong data-dcnode-id="3677"><span data-dcnode-id="3678" instrument_node="">born on a tree in North Lakeland</span></strong><span data-dcnode-id="3676" instrument_node="">, thought to have been originated by </span><a data-dcnode-id="3674" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.lakelandgov.net/departments/library/lakeland-history-room/brief-history-of-lakeland/" target="_blank"><span data-dcnode-id="3675" instrument_node="">Lakeland nursery owner Ed Tison</span></a><span data-dcnode-id="3673" instrument_node="">. The nursey owner perfected his fruit and thereafter </span><strong data-dcnode-id="3671"><span data-dcnode-id="3672" instrument_node="">sold his nurseries to C .M. Marsh</span></strong><span data-dcnode-id="3670" instrument_node="">, </span><em data-dcnode-id="3668"><span data-dcnode-id="3669" instrument_node="">who named the citrus after his family</span></em><span data-dcnode-id="3667" instrument_node="">.</span></li><span data-dcnode-id="3665" instrument_node="">
</span><li data-dcnode-id="3633"><strong data-dcnode-id="3663"><span data-dcnode-id="3664" instrument_node="">1889: I</span></strong><span data-dcnode-id="3662" instrument_node="">n 1889, </span><strong data-dcnode-id="3653"><a data-dcnode-id="3659" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Fort_Meade%2C_Florida" target="_blank"><span data-dcnode-id="3660" style="font-weight: 400;"><span data-dcnode-id="3661" instrument_node="">Our neighbors in Fort Meade</span></span></a><span data-dcnode-id="3654" style="font-weight: 400;"><span data-dcnode-id="3658" instrument_node=""> were building Fort Meade’s Christ Church (Episcopal) in the city’s historic district. The church itself was inspired by the </span><strong data-dcnode-id="3656"><span data-dcnode-id="3657" instrument_node="">Gothic Revival</span></strong><span data-dcnode-id="3655" instrument_node=""> + </span></span></strong><strong data-dcnode-id="3634"><span data-dcnode-id="3635" style="font-weight: 400;"><strong data-dcnode-id="3651"><span data-dcnode-id="3652" instrument_node="">designed by architect J. H. Weddell</span></strong><span data-dcnode-id="3650" instrument_node="">. The Episcopal church was even once </span><a data-dcnode-id="3648" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Judgment_%281990_film%29" target="_blank"><span data-dcnode-id="3649" instrument_node="">used for an HBO movie</span></a><span data-dcnode-id="3647" instrument_node="">, titled </span><strong data-dcnode-id="3645"><span data-dcnode-id="3646" instrument_node="">Judgement</span></strong><span data-dcnode-id="3644" instrument_node="">.</span><em data-dcnode-id="3642"><span data-dcnode-id="3643" instrument_node=""> Interested in learning about the history of more local churches?</span></em><span data-dcnode-id="3641" instrument_node=""> </span><em data-dcnode-id="3637"><span data-dcnode-id="3640" instrument_node="">Read on </span><a data-dcnode-id="3638" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//laltoday.6amcity.com/7-historic-lakeland-churches/"><span data-dcnode-id="3639" instrument_node="">here</span></a></em><span data-dcnode-id="3636" instrument_node="">.&nbsp;</span></span></strong></li><span data-dcnode-id="3632" instrument_node="">
</span></ul><span data-dcnode-id="3630" instrument_node="">
</span><p data-dcnode-id="3627"><span data-dcnode-id="3628" style="color: #333333; font-family: Gotham, sans-serif; font-size: 22px; font-weight: bold;"><span data-dcnode-id="3629" instrument_node="">The 1890s</span></span></p><span data-dcnode-id="3626" instrument_node="">
</span><ul data-dcnode-id="3506"><span data-dcnode-id="3625" instrument_node="">
</span><li data-dcnode-id="3612"><strong data-dcnode-id="3623"><span data-dcnode-id="3624" instrument_node="">1890: 50+ men</span></strong><span data-dcnode-id="3622" instrument_node=""> joined the</span><strong data-dcnode-id="3620"><span data-dcnode-id="3621" instrument_node=""> Bartow Rifles Battillion Company</span></strong><span data-dcnode-id="3619" instrument_node=""> + </span><a data-dcnode-id="3617" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.floridamemory.com/items/show/344671%3Fid%3D1" target="_blank"><span data-dcnode-id="3618" instrument_node="">had their names added to a muster roll</span></a><span data-dcnode-id="3616" instrument_node="">, no doubt to gear up for the </span><strong data-dcnode-id="3614"><span data-dcnode-id="3615" instrument_node="">Spanish–American War</span></strong><span data-dcnode-id="3613" instrument_node="">.</span></li><span data-dcnode-id="3611" instrument_node="">
</span><li data-dcnode-id="3590"><strong data-dcnode-id="3609"><span data-dcnode-id="3610" instrument_node="">1891: Lakeland lit up the sky, as t</span></strong><span data-dcnode-id="3608" instrument_node="">he Lakeland Light and Power Company </span><a data-dcnode-id="3606" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.lakelandgov.net/departments/library/lakeland-history-room/brief-history-of-lakeland/" target="_blank"><span data-dcnode-id="3607" instrument_node="">constructed a light plant</span></a><span data-dcnode-id="3605" instrument_node=""> near </span><strong data-dcnode-id="3603"><span data-dcnode-id="3604" instrument_node="">what is now Massachusetts Ave.</span></strong><span data-dcnode-id="3602" instrument_node=""> in 1891. That spring, plant officials turned on a switch to</span><strong data-dcnode-id="3600"><span data-dcnode-id="3601" instrument_node=""> light up Lakeland for the very first time</span></strong><span data-dcnode-id="3599" instrument_node=""> – making it </span><strong data-dcnode-id="3597"><span data-dcnode-id="3598" instrument_node="">only the third town in Florida</span></strong><em data-dcnode-id="3595"><span data-dcnode-id="3596" instrument_node=""> (Jacksonville + Tampa being the other two)</span></em><span data-dcnode-id="3594" instrument_node=""> to </span><strong data-dcnode-id="3592"><span data-dcnode-id="3593" instrument_node="">have electric lights</span></strong><span data-dcnode-id="3591" instrument_node="">.</span></li><span data-dcnode-id="3589" instrument_node="">
</span><li data-dcnode-id="3576"><strong data-dcnode-id="3587"><span data-dcnode-id="3588" instrument_node="">1892: </span></strong><span data-dcnode-id="3586" instrument_node="">Polk County’s </span><strong data-dcnode-id="3584"><span data-dcnode-id="3585" instrument_node="">topography obviously looked very different</span></strong><span data-dcnode-id="3583" instrument_node=""> than it does today. In 1892, the county </span><strong data-dcnode-id="3581"><span data-dcnode-id="3582" instrument_node="">was littered with various railroad lines</span></strong><span data-dcnode-id="3580" instrument_node="">, running from Plant City, </span><a data-dcnode-id="3578" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//fcit.usf.edu/florida/maps/pages/10900/f10984/f10984.htm" target="_blank"><span data-dcnode-id="3579" instrument_node="">all the way up to Kississimme</span></a><span data-dcnode-id="3577" instrument_node="">.</span></li><span data-dcnode-id="3575" instrument_node="">
</span><li data-dcnode-id="3563"><strong data-dcnode-id="3573"><span data-dcnode-id="3574" instrument_node="">1893: </span></strong><em data-dcnode-id="3571"><span data-dcnode-id="3572" instrument_node="">According to the National Register of Historic Places</span></em><span data-dcnode-id="3570" instrument_node="">, by this year, the City of Lakeland&nbsp;had become </span><a data-dcnode-id="3568" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//npgallery.nps.gov/GetAsset/007e0d43-583c-4b2b-ba7b-660b0ab42ad0" target="_blank"><span data-dcnode-id="3569" instrument_node="">an important shipping and rail yard site</span></a><span data-dcnode-id="3567" instrument_node=""> with </span><strong data-dcnode-id="3565"><span data-dcnode-id="3566" instrument_node="">around 20 locomotives arriving and departing daily</span></strong><span data-dcnode-id="3564" instrument_node="">.</span></li><span data-dcnode-id="3562" instrument_node="">
</span><li data-dcnode-id="3547"><strong data-dcnode-id="3560"><span data-dcnode-id="3561" instrument_node="">1894: </span></strong><span data-dcnode-id="3559" instrument_node="">After a brittle winter in the late 1880s, one local grower learned the resilience of strawberries + swapped out his crop – </span><strong data-dcnode-id="3557"><span data-dcnode-id="3558" instrument_node="">eliciting $600 per acre</span></strong><span data-dcnode-id="3556" instrument_node="">. By 1894, </span><strong data-dcnode-id="3554"><span data-dcnode-id="3555" instrument_node="">Lakeland was the no. 1 strawberry shipper</span></strong><span data-dcnode-id="3553" instrument_node=""> in Florida. </span><em data-dcnode-id="3548"><em data-dcnode-id="3549"><a data-dcnode-id="3551" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//laltoday.6amcity.com/guide-plant-city-florida/"><span data-dcnode-id="3552" instrument_node="">Plant City</span></a><span data-dcnode-id="3550" instrument_node="">, who?</span></em></em></li><span data-dcnode-id="3546" instrument_node="">
</span><li data-dcnode-id="3530"><strong data-dcnode-id="3544"><span data-dcnode-id="3545" instrument_node="">1895-1897:</span></strong><span data-dcnode-id="3543" instrument_node=""> </span><strong data-dcnode-id="3541"><span data-dcnode-id="3542" instrument_node="">Railroads stole the center stage</span></strong><span data-dcnode-id="3540" instrument_node=""> in the mid-1890s + </span><strong data-dcnode-id="3538"><span data-dcnode-id="3539" instrument_node="">because of the city’s railroad service</span></strong><span data-dcnode-id="3537" instrument_node="">, </span><strong data-dcnode-id="3535"><span data-dcnode-id="3536" instrument_node="">forward-thinking outlook</span></strong><span data-dcnode-id="3534" instrument_node="">, and location,</span><strong data-dcnode-id="3532"><span data-dcnode-id="3533" instrument_node=""> the community grew + prospered</span></strong><span data-dcnode-id="3531" instrument_node="">.</span></li><span data-dcnode-id="3529" instrument_node="">
</span><li data-dcnode-id="3508"><strong data-dcnode-id="3527"><span data-dcnode-id="3528" instrument_node="">1898-1899: </span></strong><span data-dcnode-id="3526" instrument_node="">In preparation for the&nbsp;</span><strong data-dcnode-id="3524"><span data-dcnode-id="3525" instrument_node="">Spanish-American War</span></strong><span data-dcnode-id="3523" instrument_node="">, training camps accommodating</span><strong data-dcnode-id="3521"><span data-dcnode-id="3522" instrument_node=""> 9,000 troops</span></strong><span data-dcnode-id="3520" instrument_node=""> were set up across cities in FL,&nbsp;</span><a data-dcnode-id="3518" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.usgennet.org/usa/ne/topic/military/SpanishAmericanWar/span_am_camps/pg9.htm" rel="noopener noreferrer" target="_blank"><span data-dcnode-id="3519" instrument_node="">five of which were in Lakeland</span></a><span data-dcnode-id="3517" instrument_node="">. It is known that</span><strong data-dcnode-id="3515"><span data-dcnode-id="3516" instrument_node="">&nbsp;Camp Morton&nbsp;was located at the northeast corner of Tennessee Ave. + Walnut St.</span></strong><span data-dcnode-id="3514" instrument_node="">, and&nbsp;</span><strong data-dcnode-id="3512"><span data-dcnode-id="3513" instrument_node="">Camp Massachusetts&nbsp;</span></strong><span data-dcnode-id="3511" instrument_node="">was at the northeast corner of Massachusetts Ave. + </span><strong data-dcnode-id="3509"><span data-dcnode-id="3510" instrument_node="">Lake Morton Dr.&nbsp;</span></strong></li><span data-dcnode-id="3507" instrument_node="">
</span></ul><span data-dcnode-id="3505" instrument_node="">
</span><h2 data-dcnode-id="3501"><span class="ez-toc-section" data-dcnode-id="3504" id="The_1900s"></span><span data-dcnode-id="3503" instrument_node="">The 1900s</span><span class="ez-toc-section-end" data-dcnode-id="3502"></span></h2><span data-dcnode-id="3500" instrument_node="">
</span><ul data-dcnode-id="3259"><span data-dcnode-id="3499" instrument_node="">
</span><li data-dcnode-id="3476"><strong data-dcnode-id="3497"><span data-dcnode-id="3498" instrument_node="">1900: </span></strong><span data-dcnode-id="3496" instrument_node="">At the start of 1900, </span><strong data-dcnode-id="3494"><span data-dcnode-id="3495" instrument_node="">Wilbur Bert Talley</span></strong><span data-dcnode-id="3493" instrument_node=""> – </span><strong data-dcnode-id="3490"><em data-dcnode-id="3491"><span data-dcnode-id="3492" instrument_node="">a leading architect in the state</span></em></strong><span data-dcnode-id="3489" instrument_node=""> – helped build some of </span><strong data-dcnode-id="3487"><span data-dcnode-id="3488" instrument_node="">Lakeland’s most important buildings</span></strong><span data-dcnode-id="3486" instrument_node=""> of the time. Wilbur worked in Lakeland from 1900-1906 + </span><strong data-dcnode-id="3484"><span data-dcnode-id="3485" instrument_node="">was responsible for the design</span></strong><span data-dcnode-id="3483" instrument_node=""> of the </span><a data-dcnode-id="3481" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//npgallery.nps.gov/GetAsset/007e0d43-583c-4b2b-ba7b-660b0ab42ad0" target="_blank"><span data-dcnode-id="3482" instrument_node="">district’s Kentucky Building</span></a><strong data-dcnode-id="3479"><span data-dcnode-id="3480" instrument_node=""> –</span></strong><em data-dcnode-id="3477"><span data-dcnode-id="3478" instrument_node="">which was owned by Munn’s Lakeland Improvement Company.</span></em></li><span data-dcnode-id="3475" instrument_node="">
</span><li data-dcnode-id="3450"><strong data-dcnode-id="3473"><span data-dcnode-id="3474" instrument_node="">1901:</span></strong><span data-dcnode-id="3472" instrument_node=""> Lakeland experienced </span><a data-dcnode-id="3470" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.lakelandgov.net/departments/library/lakeland-history-room/brief-history-of-lakeland/" target="_blank"><span data-dcnode-id="3471" instrument_node="">its first bond election</span></a><span data-dcnode-id="3469" instrument_node=""> and racked up</span><strong data-dcnode-id="3467"><span data-dcnode-id="3468" instrument_node=""> $110,000 for a local school</span></strong><span data-dcnode-id="3466" instrument_node="">. The same year, </span><a data-dcnode-id="3464" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//dos.myflorida.com/florida-facts/florida-history/florida-governors/park-trammell/" target="_blank"><span data-dcnode-id="3465" instrument_node="">Park Trammell</span></a><span data-dcnode-id="3463" instrument_node="">, a</span><strong data-dcnode-id="3461"><span data-dcnode-id="3462" instrument_node=""> local lawyer</span></strong><span data-dcnode-id="3460" instrument_node="">, became </span><strong data-dcnode-id="3458"><span data-dcnode-id="3459" instrument_node="">Lakeland’s very first mayor</span></strong><span data-dcnode-id="3457" instrument_node=""> – and soon after, </span><strong data-dcnode-id="3455"><span data-dcnode-id="3456" instrument_node="">a senato</span></strong><span data-dcnode-id="3454" instrument_node="">r + </span><strong data-dcnode-id="3452"><span data-dcnode-id="3453" instrument_node="">Florida governor</span></strong><span data-dcnode-id="3451" instrument_node="">.</span></li><span data-dcnode-id="3449" instrument_node="">
</span><li data-dcnode-id="3436"><strong data-dcnode-id="3447"><span data-dcnode-id="3448" instrument_node="">1902:</span></strong><span data-dcnode-id="3446" instrument_node=""> The</span><strong data-dcnode-id="3444"><span data-dcnode-id="3445" instrument_node=""> telephone switchboard</span></strong><span data-dcnode-id="3443" instrument_node=""> </span><em data-dcnode-id="3441"><span data-dcnode-id="3442" instrument_node="">(or exchange)</span></em><span data-dcnode-id="3440" instrument_node=""> was </span><strong data-dcnode-id="3438"><span data-dcnode-id="3439" instrument_node="">first introduced to Lakelanders</span></strong><span data-dcnode-id="3437" instrument_node=""> this year.</span></li><span data-dcnode-id="3435" instrument_node="">
</span><li data-dcnode-id="3411"><strong data-dcnode-id="3433"><span data-dcnode-id="3434" instrument_node="">1903: </span></strong><em data-dcnode-id="3428"><span data-dcnode-id="3432" instrument_node="">You know that </span><strong data-dcnode-id="3430"><span data-dcnode-id="3431" instrument_node="">castle-looking building</span></strong><span data-dcnode-id="3429" instrument_node="">, located in Downtown Lakeland?</span></em><span data-dcnode-id="3427" instrument_node=""> That’s the </span><a data-dcnode-id="3425" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//lakelandpubliclibrary.contentdm.oclc.org/digital/collection/p15809coll20/id/40/" target="_blank"><span data-dcnode-id="3426" instrument_node="">Clonts Building</span></a><span data-dcnode-id="3424" instrument_node=""> – </span><em data-dcnode-id="3422"><span data-dcnode-id="3423" instrument_node="">located n Kentucky Ave. and Pine St.</span></em><span data-dcnode-id="3421" instrument_node=""> – and it was constructed in 1903. The structure has seen </span><strong data-dcnode-id="3419"><span data-dcnode-id="3420" instrument_node="">a collection of businesses</span></strong><span data-dcnode-id="3418" instrument_node="">, still r</span><strong data-dcnode-id="3416"><span data-dcnode-id="3417" instrument_node="">emains today</span></strong><span data-dcnode-id="3415" instrument_node="">, and is </span><strong data-dcnode-id="3413"><span data-dcnode-id="3414" instrument_node="">considered to be a city landmark</span></strong><span data-dcnode-id="3412" instrument_node="">.</span></li><span data-dcnode-id="3410" instrument_node="">
</span><li data-dcnode-id="3380"><strong data-dcnode-id="3408"><span data-dcnode-id="3409" instrument_node="">1904: </span></strong><span data-dcnode-id="3407" instrument_node="">After</span><strong data-dcnode-id="3405"><span data-dcnode-id="3406" instrument_node=""> a fire burned an entire block </span></strong><span data-dcnode-id="3404" instrument_node="">east of Munn park, many </span><a data-dcnode-id="3402" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//npgallery.nps.gov/GetAsset/007e0d43-583c-4b2b-ba7b-660b0ab42ad0" target="_blank"><span data-dcnode-id="3403" instrument_node="">adopted masonry construction</span></a><span data-dcnode-id="3401" instrument_node="">. After the fire, </span><strong data-dcnode-id="3399"><span data-dcnode-id="3400" instrument_node="">business owners had to set up makeshift outside shelters</span></strong><span data-dcnode-id="3398" instrument_node="">. Also, in 1904, ss the&nbsp;</span><strong data-dcnode-id="3396"><span data-dcnode-id="3397" instrument_node="">third-largest</span></strong><span data-dcnode-id="3395" instrument_node="">&nbsp;</span><strong data-dcnode-id="3393"><span data-dcnode-id="3394" instrument_node="">public power utility in Florida</span></strong><span data-dcnode-id="3392" instrument_node="">, Lakeland Electric started operations in 1904, making the municipal utility&nbsp;</span><strong data-dcnode-id="3390"><span data-dcnode-id="3391" instrument_node="">over a century-year-old</span></strong><span data-dcnode-id="3389" instrument_node="">.&nbsp;Lakeland Electric was built on core values of providing&nbsp;</span><strong data-dcnode-id="3387"><span data-dcnode-id="3388" instrument_node="">affordable</span></strong><span data-dcnode-id="3386" instrument_node="">, dependable, and sustainable electricity for their customers – something they still continue to this day. </span><em data-dcnode-id="3381"><span data-dcnode-id="3385" instrument_node="">Read more about the history&nbsp;</span><a data-dcnode-id="3383" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//lakelandelectric.com/AboutUs" rel="noopener noreferrer" target="_blank"><span data-dcnode-id="3384" instrument_node="">here</span></a><span data-dcnode-id="3382" instrument_node="">.&nbsp;</span></em></li><span data-dcnode-id="3379" instrument_node="">
</span><li data-dcnode-id="3364"><strong data-dcnode-id="3377"><span data-dcnode-id="3378" instrument_node="">1905:</span></strong><span data-dcnode-id="3376" instrument_node=""> </span><em data-dcnode-id="3374"><span data-dcnode-id="3375" instrument_node="">When the circus first visited the city</span></em><span data-dcnode-id="3373" instrument_node="">, performers </span><strong data-dcnode-id="3371"><span data-dcnode-id="3372" instrument_node="">would march in a parade to persuade people</span></strong><a data-dcnode-id="3369" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//lakelandpubliclibrary.contentdm.oclc.org/digital/collection/p15809coll14/id/20/rec/8" target="_blank"><span data-dcnode-id="3370" instrument_node=""> to buy tickets</span></a><span data-dcnode-id="3368" instrument_node="">. This includes performers </span><a data-dcnode-id="3366" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//lakelandpubliclibrary.contentdm.oclc.org/digital/collection/p15809coll14/id/19/rec/7" target="_blank"><span data-dcnode-id="3367" instrument_node="">like sword swallower, Ajax</span></a><span data-dcnode-id="3365" instrument_node="">.</span></li><span data-dcnode-id="3363" instrument_node="">
</span><li data-dcnode-id="3332"><strong data-dcnode-id="3361"><span data-dcnode-id="3362" instrument_node="">1906:</span></strong><span data-dcnode-id="3360" instrument_node=""> Rev. H.R.Morehead became the </span><strong data-dcnode-id="3358"><span data-dcnode-id="3359" instrument_node="">pastor of Lakeland’s St. Johns Church</span></strong><span data-dcnode-id="3357" instrument_node=""> + it is believed that the </span><em data-dcnode-id="3355"><span data-dcnode-id="3356" instrument_node="">(now-defunct)</span></em><span data-dcnode-id="3354" instrument_node="">&nbsp; </span><a data-dcnode-id="3352" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//fl-genweb.org/decole/Polk/AfriAmer/MoreHead.html" target="_blank"><span data-dcnode-id="3353" instrument_node="">Moorehead Community</span></a><span data-dcnode-id="3351" instrument_node=""> </span><strong data-dcnode-id="3349"><span data-dcnode-id="3350" instrument_node="">was named after him</span></strong><span data-dcnode-id="3348" instrument_node="">.</span><em data-dcnode-id="3346"><span data-dcnode-id="3347" instrument_node=""> According to a plaque in the area</span></em><span data-dcnode-id="3345" instrument_node="">, “</span><strong data-dcnode-id="3343"><span data-dcnode-id="3344" instrument_node="">thousands of African-Americans lived in Moorehead</span></strong><span data-dcnode-id="3342" instrument_node=""> at one time or another </span><strong data-dcnode-id="3340"><span data-dcnode-id="3341" instrument_node="">until 1971</span></strong><span data-dcnode-id="3339" instrument_node=""> when </span><strong data-dcnode-id="3337"><span data-dcnode-id="3338" instrument_node="">the city of Lakeland acquired this land</span></strong><span data-dcnode-id="3336" instrument_node=""> in order to built </span><strong data-dcnode-id="3334"><span data-dcnode-id="3335" instrument_node="">The Lakeland Center</span></strong><span data-dcnode-id="3333" instrument_node="">.”</span></li><span data-dcnode-id="3331" instrument_node="">
</span><li data-dcnode-id="3303"><strong data-dcnode-id="3329"><span data-dcnode-id="3330" instrument_node="">1907:</span></strong><span data-dcnode-id="3328" instrument_node=""> Located at 110 S. Kentucky Ave., </span><a data-dcnode-id="3326" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//lakelandpubliclibrary.contentdm.oclc.org/digital/collection/p15809coll20/id/93" target="_blank"><span data-dcnode-id="3327" instrument_node="">the Munn Annex was constructed in 1907</span></a><span data-dcnode-id="3325" instrument_node=""> + once housed the </span><strong data-dcnode-id="3323"><span data-dcnode-id="3324" instrument_node="">Postal Telegraph Office</span></strong><span data-dcnode-id="3322" instrument_node="">. </span><em data-dcnode-id="3317"><span data-dcnode-id="3321" instrument_node="">In the</span><strong data-dcnode-id="3319"><span data-dcnode-id="3320" instrument_node=""> mid-1980s</span></strong><span data-dcnode-id="3318" instrument_node="">, the structure was renovated.&nbsp;</span></em><span data-dcnode-id="3316" instrument_node="">Also happening in 1907, R.M. Marler </span><a data-dcnode-id="3314" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//laltoday.6amcity.com/historic-theatres-polk-county-fl/"><span data-dcnode-id="3315" instrument_node="">opened the Electric Theater</span></a><span data-dcnode-id="3313" instrument_node="">,&nbsp;</span><b data-dcnode-id="3311"><span data-dcnode-id="3312" instrument_node="">Lakeland’s first movie house.&nbsp;</span></b><span data-dcnode-id="3310" instrument_node="">Though the&nbsp;</span><b data-dcnode-id="3308"><span data-dcnode-id="3309" instrument_node="">silent film era</span></b><span data-dcnode-id="3307" instrument_node="">&nbsp;was in full swing in the days of the Electric, watching a movie wasn’t always a pleasant experience.&nbsp;</span><b data-dcnode-id="3305"><span data-dcnode-id="3306" instrument_node="">The theater smelled of banana oil&nbsp;</span></b><span data-dcnode-id="3304" instrument_node="">that was used to fix the film when it broke in the projector.</span></li><span data-dcnode-id="3302" instrument_node="">
</span><li data-dcnode-id="3281"><strong data-dcnode-id="3300"><span data-dcnode-id="3301" instrument_node="">1908:</span></strong><span data-dcnode-id="3299" instrument_node=""> </span><span data-dcnode-id="3282" style="font-weight: 400;"><span data-dcnode-id="3298" instrument_node="">The city’s f</span><a data-dcnode-id="3296" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.lakelandgov.net/departments/lakeland-fire-department/about-us/history/" target="_blank"><span data-dcnode-id="3297" instrument_node="">irst fire department was organized in 1908</span></a><span data-dcnode-id="3295" instrument_node="">. During this year, </span><strong data-dcnode-id="3293"><span data-dcnode-id="3294" instrument_node="">major investments were made to the department</span></strong><span data-dcnode-id="3292" instrument_node=""> + by 1909, the fire department was granted “</span><strong data-dcnode-id="3290"><span data-dcnode-id="3291" instrument_node="">horses</span></strong><span data-dcnode-id="3289" instrument_node="">, </span><strong data-dcnode-id="3287"><span data-dcnode-id="3288" instrument_node="">wagons</span></strong><span data-dcnode-id="3286" instrument_node="">, and the</span><strong data-dcnode-id="3284"><span data-dcnode-id="3285" instrument_node=""> best available firefighting equipment</span></strong><span data-dcnode-id="3283" instrument_node=""> by the city commission.”</span></span></li><span data-dcnode-id="3280" instrument_node="">
</span><li data-dcnode-id="3261"><strong data-dcnode-id="3278"><span data-dcnode-id="3279" instrument_node="">1909: </span></strong><span data-dcnode-id="3277" instrument_node="">The ffsons’ became </span><a data-dcnode-id="3275" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//web.archive.org/web/20110727183406/http%3A//www.polkcountyhistory.org/pdf/sept02.pdf" target="_blank"><span data-dcnode-id="3276" instrument_node="">the first-known pioneer Jewish family</span></a><span data-dcnode-id="3274" instrument_node=""> in Lakeland after </span><strong data-dcnode-id="3272"><span data-dcnode-id="3273" instrument_node="">Cy Wolfson</span></strong><span data-dcnode-id="3271" instrument_node=""> moved from </span><strong data-dcnode-id="3269"><span data-dcnode-id="3270" instrument_node="">northeastern Lithuania</span></strong><span data-dcnode-id="3268" instrument_node="">. Cy eventually </span><strong data-dcnode-id="3266"><span data-dcnode-id="3267" instrument_node="">opened a suit manufacturing store</span></strong><span data-dcnode-id="3265" instrument_node=""> in the city on </span><strong data-dcnode-id="3263"><span data-dcnode-id="3264" instrument_node="">Kentucky Ave</span></strong><span data-dcnode-id="3262" instrument_node="">.</span></li><span data-dcnode-id="3260" instrument_node="">
