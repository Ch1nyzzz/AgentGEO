alink" data-dcnode-id="2862" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.zippia.com/accessioner-phoenix-az-jobs/"><span data-dcnode-id="2863" instrument_node="">Accessioner Jobs In Phoenix, AZ</span></a></li><li class="z-mb-8" data-dcnode-id="2858"><a class="alink" data-dcnode-id="2859" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.zippia.com/accessioner-hicksville-ny-jobs/"><span data-dcnode-id="2860" instrument_node="">Accessioner Jobs In Hicksville, NY</span></a></li><li class="z-mb-8" data-dcnode-id="2855"><a class="alink" data-dcnode-id="2856" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.zippia.com/accessioner-salt-lake-city-ut-jobs/"><span data-dcnode-id="2857" instrument_node="">Accessioner Jobs In Salt Lake City, UT</span></a></li><li class="z-mb-8" data-dcnode-id="2852"><a class="alink" data-dcnode-id="2853" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.zippia.com/accessioner-edison-nj-jobs/"><span data-dcnode-id="2854" instrument_node="">Accessioner Jobs In Edison, NJ</span></a></li></ol><button class="text-capitalize max-w-responsive zpButton_button__GFNgA zpButton_super-primary__BLJac zpButton_big__JyAoM" data-dcnode-id="2847" type="button"><div class="zpButton_content__2B6W0" data-dcnode-id="2848"><div class="zpButton_text__AKuLv" data-dcnode-id="2849"><span data-dcnode-id="2850" instrument_node="">Find A High Paying Accessioner Job Near Me</span></div></div></button></div><section class="skill-out-container mt-68" data-dcnode-id="2364"><section class="topTenSkillsSection" data-dcnode-id="2365" id="skillTopSection"><section data-dcnode-id="2385"><h2 class="brandonH2 mb-0" data-dcnode-id="2844"><span data-dcnode-id="2845" instrument_node="">15 Essential Accessioner Skills For Your Resume And Career</span></h2><div class="topSkillContainer z-pt-68" data-dcnode-id="2817" id="specimen-collection"><div class="row" data-dcnode-id="2822"><div class="col-12 w-635" data-dcnode-id="2823"><div class="skillHeader" data-dcnode-id="2841"><h3 class="skillNameText" data-dcnode-id="2842"><span data-dcnode-id="2843" instrument_node="">1. Specimen Collection</span></h3></div><p class="career-skill-card-brief-description" data-dcnode-id="2838"></p><div class="newContentBlurbContainer" data-dcnode-id="2839"><span data-dcnode-id="2840" instrument_node="">Specimen collection refers to process of collecting any tissue or fluid like substance in order to be analyzed and tested in a laboratory. Specimen collection is the initial necessary step for the diagnosis of a problem, providing a pathway to the eventual treatment.</span></div><p></p><div class="content-blurb-container newContentBlurbContainer" data-dcnode-id="2824"><span class="d-block mb-3" data-dcnode-id="2836"><span data-dcnode-id="2837" instrument_node="">Here's how specimen collection is used on accessioner resumes:</span></span><ul class="topSkillSnippets" data-dcnode-id="2825"><li class="z-pl-10" data-dcnode-id="2834"><span data-dcnode-id="2835" instrument_node="">Cross training in test specimen preparation for LC/MS/MS testing.</span></li><li class="z-pl-10" data-dcnode-id="2832"><span data-dcnode-id="2833" instrument_node="">Demonstrate professionalism interacting with athletic directors, sports medicine staff and athletes prior to and during specimen collection process.</span></li><li class="z-pl-10" data-dcnode-id="2830"><span data-dcnode-id="2831" instrument_node="">Maintain effective laboratory operations by adhering to standards of specimen collection, preparation, or laboratory safety.</span></li><li class="z-pl-10" data-dcnode-id="2828"><span data-dcnode-id="2829" instrument_node="">Explained specimen collection procedure and specimen requirements to other laboratories from incoming phone calls to the laboratory.</span></li><li class="z-pl-10" data-dcnode-id="2826"><span data-dcnode-id="2827" instrument_node="">Answer telephone and provide information concerning proper specimen collection, patient results, normal values and problem identification.</span></li></ul></div></div></div><div class="row" data-dcnode-id="2818" data-jobcontainer="specimen-collection"><div class="col-12" data-dcnode-id="2819"><a class="secondary-button-small topSkillRequireLink" data-dcnode-id="2820"><span data-dcnode-id="2821" instrument_node="">5,324 Specimen Collection Jobs</span></a></div></div></div><div class="topSkillContainer z-pt-68" data-dcnode-id="2791" id="laboratory-departments"><div class="row" data-dcnode-id="2796"><div class="col-12 w-635" data-dcnode-id="2797"><div class="skillHeader" data-dcnode-id="2814"><h3 class="skillNameText" data-dcnode-id="2815"><span data-dcnode-id="2816" instrument_node="">2. Laboratory Departments</span></h3></div><p class="career-skill-card-brief-description" data-dcnode-id="2813"></p><div class="content-blurb-container newContentBlurbContainer" data-dcnode-id="2798"><span class="d-block mb-3" data-dcnode-id="2811"><span data-dcnode-id="2812" instrument_node="">Here's how laboratory departments is used on accessioner resumes:</span></span><ul class="topSkillSnippets" data-dcnode-id="2799"><li class="z-pl-10" data-dcnode-id="2809"><span data-dcnode-id="2810" instrument_node="">Prepared all specimens received for testing in designated laboratory departments or locations such as staging of urine specimens.</span></li><li class="z-pl-10" data-dcnode-id="2807"><span data-dcnode-id="2808" instrument_node="">Prepared all specimens received for testing in designated laboratory departments.</span></li><li class="z-pl-10" data-dcnode-id="2805"><span data-dcnode-id="2806" instrument_node="">Separated specimens according to appropriate laboratory departments.</span></li><li class="z-pl-10" data-dcnode-id="2803"><span data-dcnode-id="2804" instrument_node="">Receive, process, unload, and unpack all specimens for testing in the appropriate laboratory departments.</span></li><li class="z-pl-10" data-dcnode-id="2801"><span data-dcnode-id="2802" instrument_node="">Headed laboratory department during weekends, able to work well independently with little to no supervision.</span></li><span data-dcnode-id="2800" instrument_node=""></span></ul></div></div></div><div class="row" data-dcnode-id="2792" data-jobcontainer="laboratory-departments"><div class="col-12" data-dcnode-id="2793"><a class="secondary-button-small topSkillRequireLink" data-dcnode-id="2794"><span data-dcnode-id="2795" instrument_node="">309 Laboratory Departments Jobs</span></a></div></div></div><div class="topSkillContainer z-pt-68" data-dcnode-id="2766" id="diagnostic-tests"><div class="row" data-dcnode-id="2771"><div class="col-12 w-635" data-dcnode-id="2772"><div class="skillHeader" data-dcnode-id="2788"><h3 class="skillNameText" data-dcnode-id="2789"><span data-dcnode-id="2790" instrument_node="">3. Diagnostic Tests</span></h3></div><p class="career-skill-card-brief-description" data-dcnode-id="2787"></p><div class="content-blurb-container newContentBlurbContainer" data-dcnode-id="2773"><span class="d-block mb-3" data-dcnode-id="2785"><span data-dcnode-id="2786" instrument_node="">Here's how diagnostic tests is used on accessioner resumes:</span></span><ul class="topSkillSnippets" data-dcnode-id="2774"><li class="z-pl-10" data-dcnode-id="2783"><span data-dcnode-id="2784" instrument_node="">Accessioned and labeled specimens for diagnostic testing.</span></li><li class="z-pl-10" data-dcnode-id="2781"><span data-dcnode-id="2782" instrument_node="">Prepare and ship infectious agents in accordance with CDC and DOT guidelines for immediate diagnostic testing.</span></li><li class="z-pl-10" data-dcnode-id="2779"><span data-dcnode-id="2780" instrument_node="">Prepare and interpret various diagnostic testing and accompanying assays.</span></li><li class="z-pl-10" data-dcnode-id="2777"><span data-dcnode-id="2778" instrument_node="">Prepared incoming specimens for diagnostic testing.</span></li><li class="z-pl-10" data-dcnode-id="2775"><span data-dcnode-id="2776" instrument_node="">Performed routine diagnostic tests as well as worked closely with Medical Lab Technicians and Pathologists for more complex diagnostics.</span></li></ul></div></div></div><div class="row" data-dcnode-id="2767" data-jobcontainer="diagnostic-tests"><div class="col-12" data-dcnode-id="2768"><a class="secondary-button-small topSkillRequireLink" data-dcnode-id="2769"><span data-dcnode-id="2770" instrument_node="">1,712 Diagnostic Tests Jobs</span></a></div></div></div><div class="z-mt-24" data-dcnode-id="2743"><p class="z-font-600" data-dcnode-id="2764"><span data-dcnode-id="2765" instrument_node="">And if you’re looking for a job, here are the five top employers hiring now:</span></p><ol class="z-pl-30 z-mb-24" data-dcnode-id="2748"><li class="z-mb-8" data-dcnode-id="2761"><a class="alink" data-dcnode-id="2762" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.zippia.com/quest-diagnostics-careers-9545/jobs/"><span data-dcnode-id="2763" instrument_node="">Quest Diagnostics Jobs (3)</span></a></li><li class="z-mb-8" data-dcnode-id="2758"><a class="alink" data-dcnode-id="2759" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.zippia.com/davita-careers-3282/jobs/"><span data-dcnode-id="2760" instrument_node="">DaVita Jobs (3)</span></a></li><li class="z-mb-8" data-dcnode-id="2755"><a class="alink" data-dcnode-id="2756" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.zippia.com/clinical-reference-laboratory-careers-19391/jobs/"><span data-dcnode-id="2757" instrument_node="">Clinical Reference Laboratory Jobs (2)</span></a></li><li class="z-mb-8" data-dcnode-id="2752"><a class="alink" data-dcnode-id="2753" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.zippia.com/antech-diagnostics-careers-15023/jobs/"><span data-dcnode-id="2754" instrument_node="">Antech Diagnostics Jobs (5)</span></a></li><li class="z-mb-8" data-dcnode-id="2749"><a class="alink" data-dcnode-id="2750" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.zippia.com/laboratory-corporation-of-america-holdings-careers-6613/jobs/"><span data-dcnode-id="2751" instrument_node="">Laboratory Corporation of America Holdings Jobs (111)</span></a></li></ol><button class="text-capitalize max-w-responsive zpButton_button__GFNgA zpButton_super-primary__BLJac zpButton_big__JyAoM" data-dcnode-id="2744" type="button"><div class="zpButton_content__2B6W0" data-dcnode-id="2745"><div class="zpButton_text__AKuLv" data-dcnode-id="2746"><span data-dcnode-id="2747" instrument_node="">Find an Accessioner Job Near Me</span></div></div></button></div><div class="topSkillContainer z-pt-68" data-dcnode-id="2715" id="lab-tests"><div class="row" data-dcnode-id="2720"><div class="col-12 w-635" data-dcnode-id="2721"><div class="skillHeader" data-dcnode-id="2740"><h3 class="skillNameText" data-dcnode-id="2741"><span data-dcnode-id="2742" instrument_node="">4. Lab Tests</span></h3></div><p class="career-skill-card-brief-description" data-dcnode-id="2737"></p><div class="newContentBlurbContainer" data-dcnode-id="2738"><span data-dcnode-id="2739" instrument_node="">A laboratory test is a practice in which a health care provider uses a sample of urine, blood, and other bodily fluid/tissue to get information about an individual's health. Lab tests lay a solid foundation for the diagnostics, screening, or monitoring specific diseases or conditions. Tests can help determine a treatment plan, access if a designated treatment is working, or monitor the situation of acute diseases.</span></div><p></p><div class="content-blurb-container newContentBlurbContainer" data-dcnode-id="2722"><span class="d-block mb-3" data-dcnode-id="2735"><span data-dcnode-id="2736" instrument_node="">Here's how lab tests is used on accessioner resumes:</span></span><ul class="topSkillSnippets" data-dcnode-id="2723"><li class="z-pl-10" data-dcnode-id="2733"><span data-dcnode-id="2734" instrument_node="">Entered Lab tests into computer Labeled and Packaged specimens Provided General clerical support</span></li><li class="z-pl-10" data-dcnode-id="2731"><span data-dcnode-id="2732" instrument_node="">Work in a lab processing lab tests from Different facilities work from 6:30pm-4am Monday-Friday and alternating Saturdays 5pm-11pm</span></li><li class="z-pl-10" data-dcnode-id="2729"><span data-dcnode-id="2730" instrument_node="">Verified insurance and chart scrubbed to assist physician in finding the appropriate lab tests to be ran at the appropriate times.</span></li><li class="z-pl-10" data-dcnode-id="2727"><span data-dcnode-id="2728" instrument_node="">Collect information from patients, educate them about their tests and the processes of lab concerning their lab tests and results.</span></li><li class="z-pl-10" data-dcnode-id="2725"><span data-dcnode-id="2726" instrument_node="">Order lab tests off of Physician requisitions and label the tubes, process and batch specimens.</span></li><span data-dcnode-id="2724" instrument_node=""></span></ul></div></div></div><div class="row" data-dcnode-id="2716" data-jobcontainer="lab-tests"><div class="col-12" data-dcnode-id="2717"><a class="secondary-button-small topSkillRequireLink" data-dcnode-id="2718"><span data-dcnode-id="2719" instrument_node="">514 Lab Tests Jobs</span></a></div></div></div><div class="topSkillContainer z-pt-68" data-dcnode-id="2688" id="blood-samples"><div class="row" data-dcnode-id="2693"><div class="col-12 w-635" data-dcnode-id="2694"><div class="skillHeader" data-dcnode-id="2712"><h3 class="skillNameText" data-dcnode-id="2713"><span data-dcnode-id="2714" instrument_node="">5. Blood Samples</span></h3></div><p class="career-skill-card-brief-description" data-dcnode-id="2709"></p><div class="newContentBlurbContainer" data-dcnode-id="2710"><span data-dcnode-id="2711" instrument_node="">A blood sample is a specimen of blood extracted from the body of an organism to run laboratory tests on it. Lab tests are conducted to determine if a person has optimum mineral content and has no illness. Blood is extracted from the vein with the help of a hypodermic needle. The blood is then analyzed to perform multiple tests such as; glucose tests, cholesterol tests, hemoglobin tests, blood count tests.</span></div><p></p><div class="content-blurb-container newContentBlurbContainer" data-dcnode-id="2695"><span class="d-block mb-3" data-dcnode-id="2707"><span data-dcnode-id="2708" instrument_node="">Here's how blood samples is used on accessioner resumes:</span></span><ul class="topSkillSnippets" data-dcnode-id="2696"><li class="z-pl-10" data-dcnode-id="2705"><span data-dcnode-id="2706" instrument_node="">Scan, label, and file blood samples into our medical database and around the laboratory.</span></li><li class="z-pl-10" data-dcnode-id="2703"><span data-dcnode-id="2704" instrument_node="">Processed urine and oral fluid samples delivered to the laboratory daily.</span></li><li class="z-pl-10" data-dcnode-id="2701"><span data-dcnode-id="2702" instrument_node="">Entered and submitted blood samples of patients draws for test.</span></li><li class="z-pl-10" data-dcnode-id="2699"><span data-dcnode-id="2700" instrument_node="">Transport specimens or fluid samples from collection sites to departments.</span></li><li class="z-pl-10" data-dcnode-id="2697"><span data-dcnode-id="2698" instrument_node="">Completed all requisitions and prepared blood samples for testing.</span></li></ul></div></div></div><div class="row" data-dcnode-id="2689" data-jobcontainer="blood-samples"><div class="col-12" data-dcnode-id="2690"><a class="secondary-button-small topSkillRequireLink" data-dcnode-id="2691"><span data-dcnode-id="2692" instrument_node="">1,905 Blood Samples Jobs</span></a></div></div></div><div class="topSkillContainer z-pt-68 position-relative" data-dcnode-id="2660" id="data-entry"><div class="row" data-dcnode-id="2665"><div class="col-12 w-635" data-dcnode-id="2666"><div class="skillHeader" data-dcnode-id="2685"><h3 class="skillNameText" data-dcnode-id="2686"><span data-dcnode-id="2687" instrument_node="">6. Data Entry</span></h3></div><p class="career-skill-card-brief-description" data-dcnode-id="2682"></p><div class="newContentBlurbContainer" data-dcnode-id="2683"><span data-dcnode-id="2684" instrument_node="">Data entry means entering data into a company's system with the help of a keyboard. A person responsible for entering data may also be asked to verify the authenticity of the data being entered. A person doing data entry must pay great attention to tiny details.</span></div><p></p><div class="content-blurb-container newContentBlurbContainer" data-dcnode-id="2667"><span class="d-block mb-3" data-dcnode-id="2680"><span data-dcnode-id="2681" instrument_node="">Here's how data entry is used on accessioner resumes:</span></span><ul class="topSkillSnippets" data-dcnode-id="2668"><li class="z-pl-10" data-dcnode-id="2678"><span data-dcnode-id="2679" instrument_node="">Conducted intensive data entry, utilizing various software programs, in accordance with Hospital/Laboratory protocol and HIPAA regulations.</span></li><li class="z-pl-10" data-dcnode-id="2676"><span data-dcnode-id="2677" instrument_node="">Perform accurate and efficient data entry of donor information into the laboratory's computer system.</span></li><li class="z-pl-10" data-dcnode-id="2674"><span data-dcnode-id="2675" instrument_node="">Detailed data entry based on patients requisitions and assist with various administrative functions.</span></li><li class="z-pl-10" data-dcnode-id="2672"><span data-dcnode-id="2673" instrument_node="">Performed data entry by updating client information via company intranet and software.</span></li><li class="z-pl-10" data-dcnode-id="2670"><span data-dcnode-id="2671" instrument_node="">Performed necessary data entry tasks required for patient specimen information.</span></li><span data-dcnode-id="2669" instrument_node=""></span></ul></div></div></div><div class="row" data-dcnode-id="2661" data-jobcontainer="data-entry"><div class="col-12" data-dcnode-id="2662"><a class="secondary-button-small topSkillRequireLink" data-dcnode-id="2663"><span data-dcnode-id="2664" instrument_node="">2,332 Data Entry Jobs</span></a></div></div></div><div class="topSkillContainer z-pt-68" data-dcnode-id="2630" id="hipaa"><div class="row" data-dcnode-id="2635"><div class="col-12 w-635" data-dcnode-id="2636"><div class="skillHeader" data-dcnode-id="2657"><h3 class="skillNameText" data-dcnode-id="2658"><span data-dcnode-id="2659" instrument_node="">7. Hipaa</span></h3></div><p class="career-skill-card-brief-description" data-dcnode-id="2651"></p><div class="newContentBlurbContainer" data-dcnode-id="2652"><span data-dcnode-id="2656" instrument_node="">HIPAA stands for Health Insurance Portability and </span><a class="alink" data-dcnode-id="2654" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.zippia.com/advice/what-is-accountability/"><span data-dcnode-id="2655" instrument_node="">Accountability</span></a><span data-dcnode-id="2653" instrument_node=""> Act. It is a federal law imposed in 1996 by the 104th U.S Congress in 1996. This act was created to implement privacy standards to protect a patient's sensitive information like medical information and other healthcare records from being disclosed without consent. To keep the data safe healthcare organizations must work effectively in three areas of security namely: administrative, physical, and technical.</span></div><p></p><div class="content-blurb-container newContentBlurbContainer" data-dcnode-id="2637"><span class="d-block mb-3" data-dcnode-id="2649"><span data-dcnode-id="2650" instrument_node="">Here's how hipaa is used on accessioner resumes:</span></span><ul class="topSkillSnippets" data-dcnode-id="2638"><li class="z-pl-10" data-dcnode-id="2647"><span data-dcnode-id="2648" instrument_node="">Verified patient information and entered ordered tests into the medical database in compliance with HIPAA regulations.</span></li><li class="z-pl-10" data-dcnode-id="2645"><span data-dcnode-id="2646" instrument_node="">Recorded HIPAA patient information in electronic health system.</span></li><li class="z-pl-10" data-dcnode-id="2643"><span data-dcnode-id="2644" instrument_node="">Complete necessary documentation accurately maintaining proper chain of custody procedures &amp; abiding by HIPAA Regulations.</span></li><li class="z-pl-10" data-dcnode-id="2641"><span data-dcnode-id="2642" instrument_node="">Ensured HIPAA compliance and maintained patient privacy and confidential information.</span></li><li class="z-pl-10" data-dcnode-id="2639"><span data-dcnode-id="2640" instrument_node="">Handled and processed laboratory specimens as per HIPAA regulations.</span></li></ul></div></div></div><div class="row" data-dcnode-id="2631" data-jobcontainer="hipaa"><div class="col-12" data-dcnode-id="2632"><a class="secondary-button-small topSkillRequireLink" data-dcnode-id="2633"><span data-dcnode-id="2634" instrument_node="">691 Hipaa Jobs</span></a></div></div></div><div class="topSkillContainer z-pt-68" data-dcnode-id="2602" id="osha"><div class="row" data-dcnode-id="2607"><div class="col-12 w-635" data-dcnode-id="2608"><div class="skillHeader" data-dcnode-id="2627"><h3 class="skillNameText" data-dcnode-id="2628"><span data-dcnode-id="2629" instrument_node="">8. Osha</span></h3></div><p class="career-skill-card-brief-description" data-dcnode-id="2624"></p><div class="newContentBlurbContainer" data-dcnode-id="2625"><span data-dcnode-id="2626" instrument_node="">Osha stands for Occupational Safety and Health Administration that is a large regulatory agency based in the USA. This agency was created in 1971 and its basic aim is to ensure safe and healthy working conditions for working men and women. Osha had the authority of doing surprise visits to inspect and examine the working conditions in workplaces. They have been successful in reducing injury rates and improving worker conditions.</span></div><p></p><div class="content-blurb-container newContentBlurbContainer" data-dcnode-id="2609"><span class="d-block mb-3" data-dcnode-id="2622"><span data-dcnode-id="2623" instrument_node="">Here's how osha is used on accessioner resumes:</span></span><ul class="topSkillSnippets" data-dcnode-id="2610"><li class="z-pl-10" data-dcnode-id="2620"><span data-dcnode-id="2621" instrument_node="">Adhered to OSHA regulations, safety policies, and blood borne pathogen guidelines.</span></li><li class="z-pl-10" data-dcnode-id="2618"><span data-dcnode-id="2619" instrument_node="">Followed company policies and procedures, including OSHA guidelines.</span></li><li class="z-pl-10" data-dcnode-id="2616"><span data-dcnode-id="2617" instrument_node="">Operated BD BACTEC 9240 Blood Culture System Ensured compliance with all PPE requirements and OSHA laboratory safety regulations.</span></li><li class="z-pl-10" data-dcnode-id="2614"><span data-dcnode-id="2615" instrument_node="">Complete paperwork pertaining to issues including TIQ's, NSR's, and OSHA compliance.</span></li><li class="z-pl-10" data-dcnode-id="2612"><span data-dcnode-id="2613" instrument_node="">Maintain compliance with CLIA, OSHA, safety and risk-management guidelines.</span></li><span data-dcnode-id="2611" instrument_node=""></span></ul></div></div></div><div class="row" data-dcnode-id="2603" data-jobcontainer="osha"><div class="col-12" data-dcnode-id="2604"><a class="secondary-button-small topSkillRequireLink" data-dcnode-id="2605"><span data-dcnode-id="2606" instrument_node="">2,362 Osha Jobs</span></a></div></div></div><div class="topSkillContainer z-pt-68" data-dcnode-id="2577" id="medical-records"><div class="row" data-dcnode-id="2582"><div class="col-12 w-635" data-dcnode-id="2583"><div class="skillHeader" data-dcnode-id="2599"><h3 class="skillNameText" data
