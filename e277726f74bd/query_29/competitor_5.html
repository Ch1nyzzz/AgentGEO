</span><h1 class="page-header row" data-dcnode-id="846"><span data-dcnode-id="847" instrument_node="">Develop your skills as an historian</span></h1><span data-dcnode-id="845" instrument_node="">
</span></div><span data-dcnode-id="843" instrument_node="">
</span></div><span data-dcnode-id="841" instrument_node="">
</span></div><span data-dcnode-id="839" instrument_node="">
</span><div class="region region-content" data-dcnode-id="477"><span data-dcnode-id="838" instrument_node="">
</span><div class="block block-system clearfix" data-dcnode-id="479" id="block-system-main"><span data-dcnode-id="837" instrument_node="">
</span><div class="panelizer-view-mode node node-full node-oxdrupal-basic-page node-1194776" data-dcnode-id="481"><span data-dcnode-id="836" instrument_node="">
</span><div class="bootstrap-twocol-stacked" data-dcnode-id="483"><span data-dcnode-id="835" instrument_node="">
</span><div class="row" data-dcnode-id="485"><span data-dcnode-id="834" instrument_node="">
</span><div class="panel-panel left col-xs-12 col-sm-12 col-md-9 col-lg-9" data-dcnode-id="631"><div class="panel-pane pane-entity-field pane-node-field-region-2" data-dcnode-id="633"><span data-dcnode-id="833" instrument_node="">
</span><div class="pane-content" data-dcnode-id="635"><span data-dcnode-id="832" instrument_node="">
</span><div class="paragraphs-items paragraphs-items-field-region-2 paragraphs-items-field-region-2-full paragraphs-items-full" data-dcnode-id="637"><span data-dcnode-id="831" instrument_node="">
</span><div class="field field-name-field-region-2 field-type-paragraphs field-label-hidden" data-dcnode-id="639"><span data-dcnode-id="830" instrument_node="">

</span><div about="" class="entity entity-paragraphs-item paragraphs-item-wysiwyg-content-area margin-bottom widget-width-12-columns widget-style-main paragraphs-item-2084666" data-dcnode-id="645" typeof=""><span data-dcnode-id="827" instrument_node="">

</span><div class="widget-header" data-dcnode-id="819"><span data-dcnode-id="823" instrument_node="">
</span><h2 class="widget-title" data-dcnode-id="821"><span data-dcnode-id="822" instrument_node="">
        Top tips to develop your skills      </span></h2><span data-dcnode-id="820" instrument_node="">
</span></div><span data-dcnode-id="818" instrument_node="">
</span><div class="field field-name-field-content field-type-text-with-summary field-label-hidden" data-dcnode-id="649"><span data-dcnode-id="817" instrument_node="">
</span><div class="field-items" data-dcnode-id="651"><span data-dcnode-id="816" instrument_node="">
</span><div class="field-item private-show even" data-dcnode-id="653"><span data-dcnode-id="815" instrument_node="">
</span><p data-dcnode-id="812"><strong data-dcnode-id="813"><span data-dcnode-id="814" instrument_node="">1) Read books &amp; journal articles</span></strong></p><span data-dcnode-id="811" instrument_node="">
</span><p data-dcnode-id="809"><span data-dcnode-id="810" instrument_node="">Read, think, write and talk about whatever you find interesting about the past.</span></p><span data-dcnode-id="808" instrument_node="">
</span><p data-dcnode-id="806"><span data-dcnode-id="807" instrument_node="">Work out what you think about what you read. For instance, ask yourself: what is the author’s argument? Is it convincing? Why (or why not)? What evidence does the author use to make their argument? What is missing from their approach to the past? What else do historians need to find out? What primary sources would enable historians to understand this topic better?</span></p><span data-dcnode-id="805" instrument_node="">
</span><p data-dcnode-id="803"><span data-dcnode-id="804" instrument_node="">You might find history books that inspire you by asking your history teacher for recommendations, visiting your local public library, or finding out about books that have just been published in history podcasts or newspaper book reviews. You can also look at:</span></p><span data-dcnode-id="802" instrument_node="">
</span><ul data-dcnode-id="781"><li data-dcnode-id="793"><span data-dcnode-id="801" instrument_node="">
</span><p data-dcnode-id="795" style="margin-bottom:16px"><strong data-dcnode-id="799"><span data-dcnode-id="800" instrument_node="">Access to Research</span></strong><span data-dcnode-id="798" instrument_node=""> - provides free access to many academic journal articles, so that you can search for the latest research on whatever aspect of history interests you. -</span><a data-dcnode-id="796" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//accesstoresearch.org.uk/search"><span data-dcnode-id="797" instrument_node="">https://accesstoresearch.org.uk/search</span></a></p><span data-dcnode-id="794" instrument_node="">
</span></li><span data-dcnode-id="792" instrument_node="">
</span><li data-dcnode-id="783"><span data-dcnode-id="791" instrument_node="">
</span><p data-dcnode-id="785"><strong data-dcnode-id="789"><span data-dcnode-id="790" instrument_node="">JSTOR </span></strong><span data-dcnode-id="788" instrument_node="">- a searchable digital library of journal articles and books. If your school or local library doesn’t have access, you can normally register for an individual researcher account to read 6 free articles per month. -</span><a data-dcnode-id="786" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.jstor.org/"><span data-dcnode-id="787" instrument_node="">https://www.jstor.org/</span></a></p><span data-dcnode-id="784" instrument_node="">
</span></li><span data-dcnode-id="782" instrument_node="">
</span></ul><p data-dcnode-id="779"><span data-dcnode-id="780" instrument_node="">Write about your ideas and talk with other people about whatever you find interesting.</span></p><span data-dcnode-id="778" instrument_node="">
</span><p data-dcnode-id="776"><span data-dcnode-id="777" instrument_node="">Apply these same critical skills to everything you watch, listen to, or visit.</span></p><span data-dcnode-id="775" instrument_node="">
</span><p data-dcnode-id="773"><span data-dcnode-id="774" instrument_node="">&nbsp;</span></p><span data-dcnode-id="772" instrument_node="">
</span><p data-dcnode-id="769"><strong data-dcnode-id="770"><span data-dcnode-id="771" instrument_node="">2) Listen to history podcasts</span></strong></p><span data-dcnode-id="768" instrument_node="">
</span><ul data-dcnode-id="725"><li data-dcnode-id="765"><a data-dcnode-id="766" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.history.ox.ac.uk/podcasts"><span data-dcnode-id="767" instrument_node="">Faculty of History Recordings</span></a></li><span data-dcnode-id="764" instrument_node="">
</span><li data-dcnode-id="762"><span data-dcnode-id="763" instrument_node="">BBC podcasts - Radio 4 ‘In Our Time’, ‘The Long View’, ‘Document’; BBC World Service ‘Witness’; Radio 3 ‘Free Thinking’, all available via BBC Sounds.</span></li><span data-dcnode-id="761" instrument_node="">
