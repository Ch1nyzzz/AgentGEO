</span><h1 class="entry-title" data-dcnode-id="524" itemprop="headline"><span data-dcnode-id="525" instrument_node="">Characteristics of a Historian – What Makes a Good Historian</span></h1><div class="entry-meta" data-dcnode-id="520"><span class="cat-links" data-dcnode-id="521"><a data-dcnode-id="522" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//centurypast.org/category/books/" rel="category tag"><span data-dcnode-id="523" instrument_node="">Books</span></a></span></div><span data-dcnode-id="519" instrument_node=""> </span></div><span data-dcnode-id="517" instrument_node="">
</span></header><span data-dcnode-id="514" instrument_node="">
</span><div class="entry-content clear" data-dcnode-id="434" itemprop="text"><span data-dcnode-id="513" instrument_node="">
</span><div class="wp-block-columns are-vertically-aligned-center" data-dcnode-id="488"><span data-dcnode-id="512" instrument_node="">
</span><div class="wp-block-column is-vertically-aligned-center" data-dcnode-id="504" style="flex-basis:80%"><span data-dcnode-id="511" instrument_node="">
</span><p class="has-medium-font-size" data-dcnode-id="509"><span data-dcnode-id="510" instrument_node="">Writing of the essential characteristics of a historian, or what makes a good historian, digital historian and teacher T. Mills Kelly wrote that,</span></p><span data-dcnode-id="508" instrument_node="">
</span><p class="has-medium-font-size" data-dcnode-id="506"><span data-dcnode-id="507" instrument_node=""> “Almost every historian has his or her own personal list of the characteristics of historical thinking, but abilities that come up again and again are:” </span></p><span data-dcnode-id="505" instrument_node="">
</span></div><span data-dcnode-id="503" instrument_node="">
</span><div class="wp-block-column is-vertically-aligned-center" data-dcnode-id="490" style="flex-basis:20%"><span data-dcnode-id="502" instrument_node="">
</span><div class="wp-block-image is-style-default" data-dcnode-id="492"><figure class="aligncenter size-full" data-dcnode-id="493"><a data-dcnode-id="498" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//centurypast.org/90dd209e_original_m-2/" rel="noopener" target="_blank"><img alt="Characteristics of a historian - what makes a good historian" class="wp-image-38508 entered lazyloaded" data-dcnode-id="501" data-lazy-src="https://centurypast.org/wp-content/uploads/2021/08/90dd209e_original_M.webp" data-ll-status="loaded" height="190" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//centurypast.org/wp-content/uploads/2021/08/90dd209e_original_M.webp&amp;raw" width="127"><noscript data-dcnode-id="499"><span data-dcnode-id="500" instrument_node="">&lt;img width="127" height="190" src="https://centurypast.org/wp-content/uploads/2021/08/90dd209e_original_M.webp" alt="Characteristics of a historian - what makes a good historian" class="wp-image-38508"/&gt;</span></noscript></a><figcaption data-dcnode-id="494"><span data-dcnode-id="497" instrument_node="">See more </span><a data-dcnode-id="495" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//coehlus.carrd.co/" rel="noreferrer noopener" target="_blank"><span data-dcnode-id="496" instrument_node="">art by Coehlus</span></a></figcaption></figure></div><span data-dcnode-id="491" instrument_node="">
</span></div><span data-dcnode-id="489" instrument_node="">
</span></div><span data-dcnode-id="487" instrument_node="">
</span><p class="has-medium-font-size" data-dcnode-id="457"><span data-dcnode-id="486" instrument_node="">1. The ability to tell the difference between a primary and a secondary source.</span><br data-dcnode-id="485"><span data-dcnode-id="484" instrument_node="">2. The ability to “source the source”; that is, figure out who created the source, when it was created, and so on.</span><br data-dcnode-id="483"><span data-dcnode-id="482" instrument_node="">3. The ability to obtain information about the authority of the source and to assess that authority in light of other evidence.</span><br data-dcnode-id="481"><span data-dcnode-id="480" instrument_node="">4. The ability to set sources in their proper chronological order and to understand why that ordering is important.</span><br data-dcnode-id="479"><span data-dcnode-id="478" instrument_node="">5. The ability to construct an original argument based upon evidence from various sources.</span><br data-dcnode-id="477"><span data-dcnode-id="476" instrument_node="">6. The ability to recognize the strangeness of the past without being put off by that strangeness.</span><br data-dcnode-id="475"><span data-dcnode-id="474" instrument_node="">7. The ability to make comparative judgments about evidence.</span><br data-dcnode-id="473"><span data-dcnode-id="472" instrument_node="">8. The ability to recognize what one does not or cannot know from the evidence at hand.</span><br data-dcnode-id="471"><span data-dcnode-id="470" instrument_node="">9. The ability to understand that events are understood differently by different people.</span><br data-dcnode-id="469"><span data-dcnode-id="468" instrument_node="">10. The ability to triangulate between and among sources.</span><br data-dcnode-id="467"><span data-dcnode-id="466" instrument_node="">11. The ability to ask probing questions—not just what happened, but why did it happen this way and why didn’t it happen that way?</span><br data-dcnode-id="465"><span data-dcnode-id="464" instrument_node="">12. The ability to recognize the role of causality.</span><br data-dcnode-id="463"><span data-dcnode-id="462" instrument_node="">13. The ability to critique evidence both on its own terms and in terms of its value to a larger analytical project.</span><br data-dcnode-id="461"><span data-dcnode-id="460" instrument_node="">14. The ability to recognize lines of argument in historical thought.</span><br data-dcnode-id="459"><span data-dcnode-id="458" instrument_node="">15. The ability to present the past in clear ways, whether in writing or in other media, saying what can be said and not saying what cannot.”</span></p><span data-dcnode-id="456" instrument_node="">
</span><h4 class="has-medium-font-size" data-dcnode-id="450"><span data-dcnode-id="455" instrument_node="">Kelly, T. Mills, </span><strong data-dcnode-id="452"><a data-dcnode-id="453" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//muse.jhu.edu/book/22708"><span data-dcnode-id="454" instrument_node="">Teaching History in the Digital Age</span></a></strong><span data-dcnode-id="451" instrument_node="">, University of Michigan Press 2013, pp 22-23.</span></h4><span data-dcnode-id="449" instrument_node="">
</span><h3 class="has-text-align-center has-text-color has-medium-font-size" data-dcnode-id="447" style="color:#000080"><span data-dcnode-id="448" instrument_node="">Qualities of a Good Historian – What Makes a Good Historian – Characteristics of a Historian</span></h3><span data-dcnode-id="446" instrument_node="">
</span><p data-dcnode-id="436"><span data-dcnode-id="445" instrument_node="">You may also like our collection of </span><strong data-dcnode-id="442"><a data-dcnode-id="443" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//centurypast.org/century-past-history-resources/practice-of-history/" rel="noreferrer noopener" target="_blank"><span data-dcnode-id="444" instrument_node="">articles on the practice of history</span></a></strong><span data-dcnode-id="441" instrument_node="">, or our </span><strong data-dcnode-id="438"><a data-dcnode-id="439" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//centurypast.org/century-past-history-resources/teaching-history/" rel="noreferrer noopener" target="_blank"><span data-dcnode-id="440" instrument_node="">articles about teaching history</span></a></strong><span data-dcnode-id="437" instrument_node="">.</span></p><span data-dcnode-id="435" instrument_node="">
</span></div><span data-dcnode-id="432" instrument_node="">
