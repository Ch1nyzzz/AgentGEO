ata-dcnode-id="742"><a class="ez-toc-link ez-toc-heading-13" data-dcnode-id="743" href="#Which_skill_is_called_as_the_master_skill_in_language" title="Which skill is called as the master skill in language?"><span data-dcnode-id="744" instrument_node="">Which skill is called as the master skill in language?</span></a></li><li class="ez-toc-page-1 ez-toc-heading-level-2" data-dcnode-id="739"><a class="ez-toc-link ez-toc-heading-14" data-dcnode-id="740" href="#What_are_the_skills_of_reading" title="What are the skills of reading?"><span data-dcnode-id="741" instrument_node="">What are the skills of reading?</span></a></li><li class="ez-toc-page-1 ez-toc-heading-level-2" data-dcnode-id="736"><a class="ez-toc-link ez-toc-heading-15" data-dcnode-id="737" href="#What_is_the_first_step_in_learning_language" title="What is the first step in learning language?"><span data-dcnode-id="738" instrument_node="">What is the first step in learning language?</span></a></li><li class="ez-toc-page-1 ez-toc-heading-level-2" data-dcnode-id="733"><a class="ez-toc-link ez-toc-heading-16" data-dcnode-id="734" href="#What_are_the_five_steps_to_learning_new_words" title="What are the five steps to learning new words?"><span data-dcnode-id="735" instrument_node="">What are the five steps to learning new words?</span></a></li><li class="ez-toc-page-1 ez-toc-heading-level-2" data-dcnode-id="730"><a class="ez-toc-link ez-toc-heading-17" data-dcnode-id="731" href="#Who_has_the_largest_vocabulary" title="Who has the largest vocabulary?"><span data-dcnode-id="732" instrument_node="">Who has the largest vocabulary?</span></a></li><li class="ez-toc-page-1 ez-toc-heading-level-2" data-dcnode-id="727"><a class="ez-toc-link ez-toc-heading-18" data-dcnode-id="728" href="#What_word_does_Eminem_use_the_most" title="What word does Eminem use the most?"><span data-dcnode-id="729" instrument_node="">What word does Eminem use the most?</span></a></li><li class="ez-toc-page-1 ez-toc-heading-level-2" data-dcnode-id="724"><a class="ez-toc-link ez-toc-heading-19" data-dcnode-id="725" href="#What_was_Shakespeares_vocabulary" title="What was Shakespeare’s vocabulary?"><span data-dcnode-id="726" instrument_node="">What was Shakespeare’s vocabulary?</span></a></li></ul></nav></div><span data-dcnode-id="720" instrument_node="">
</span><h2 data-dcnode-id="716"><span class="ez-toc-section" data-dcnode-id="719" id="What_are_the_qualities_of_a_good_historian"></span><span data-dcnode-id="718" instrument_node="">What are the qualities of a good historian?</span><span class="ez-toc-section-end" data-dcnode-id="717"></span></h2><span data-dcnode-id="715" instrument_node="">
</span><p data-dcnode-id="713"><span data-dcnode-id="714" instrument_node="">An excelent knowledge and understanding of people, events, and contexts from a range of historical periods and of historical concepts and processes. A respect for historical evidence and the ability to make robust and critical use of it to support their explanations and judgments.</span></p><span data-dcnode-id="712" instrument_node="">
</span><h2 data-dcnode-id="708"><span class="ez-toc-section" data-dcnode-id="711" id="What_are_the_five_historical_skills"></span><span data-dcnode-id="710" instrument_node="">What are the five historical skills?</span><span class="ez-toc-section-end" data-dcnode-id="709"></span></h2><span data-dcnode-id="707" instrument_node="">
</span><p data-dcnode-id="705"><span data-dcnode-id="706" instrument_node="">Those critical historical thinking skills are:</span></p><span data-dcnode-id="704" instrument_node="">
</span><ul data-dcnode-id="687"><span data-dcnode-id="703" instrument_node="">
</span><li data-dcnode-id="701"><span data-dcnode-id="702" instrument_node="">Contextualization.</span></li><span data-dcnode-id="700" instrument_node="">
</span><li data-dcnode-id="698"><span data-dcnode-id="699" instrument_node="">Continuity and change over time.</span></li><span data-dcnode-id="697" instrument_node="">
</span><li data-dcnode-id="695"><span data-dcnode-id="696" instrument_node="">Causation.</span></li><span data-dcnode-id="694" instrument_node="">
</span><li data-dcnode-id="692"><span data-dcnode-id="693" instrument_node="">Synthesis.</span></li><span data-dcnode-id="691" instrument_node="">
</span><li data-dcnode-id="689"><span data-dcnode-id="690" instrument_node="">Argumentation.</span></li><span data-dcnode-id="688" instrument_node="">
</span></ul><span data-dcnode-id="686" instrument_node="">
</span><h2 data-dcnode-id="682"><span class="ez-toc-section" data-dcnode-id="685" id="What_are_the_4_historical_thinking_skills"></span><span data-dcnode-id="684" instrument_node="">What are the 4 historical thinking skills?</span><span class="ez-toc-section-end" data-dcnode-id="683"></span></h2><span data-dcnode-id="681" instrument_node="">
</span><p data-dcnode-id="679"><span data-dcnode-id="680" instrument_node="">The Four Historical Thinking Skills</span></p><span data-dcnode-id="678" instrument_node="">
</span><ul data-dcnode-id="664"><span data-dcnode-id="677" instrument_node="">
</span><li data-dcnode-id="675"><span data-dcnode-id="676" instrument_node="">Crafting Historical Arguments from Historical Evidence. </span></li><span data-dcnode-id="674" instrument_node="">
</span><li data-dcnode-id="672"><span data-dcnode-id="673" instrument_node="">Chronological Reasoning. </span></li><span data-dcnode-id="671" instrument_node="">
</span><li data-dcnode-id="669"><span data-dcnode-id="670" instrument_node="">Comparison and Contextualization. </span></li><span data-dcnode-id="668" instrument_node="">
</span><li data-dcnode-id="666"><span data-dcnode-id="667" instrument_node="">Historical Interpretation and Synthesis.</span></li><span data-dcnode-id="665" instrument_node="">
</span></ul><span data-dcnode-id="663" instrument_node="">
</span><h2 data-dcnode-id="659"><span class="ez-toc-section" data-dcnode-id="662" id="What_are_the_9_historical_thinking_skills"></span><span data-dcnode-id="661" instrument_node="">What are the 9 historical thinking skills?</span><span class="ez-toc-section-end" data-dcnode-id="660"></span></h2><span data-dcnode-id="658" instrument_node="">
</span><p data-dcnode-id="656"><span data-dcnode-id="657" instrument_node="">The 9 APUSH Historical Thinking Skills</span></p><span data-dcnode-id="655" instrument_node="">
</span><ul data-dcnode-id="629"><span data-dcnode-id="654" instrument_node="">
</span><li data-dcnode-id="652"><span data-dcnode-id="653" instrument_node="">Analyzing Evidence: Content and Sourcing. The first of the nine APUSH historical thinking skills deals with how well you can analyze primary sources. </span></li><span data-dcnode-id="651" instrument_node="">
</span><li data-dcnode-id="649"><span data-dcnode-id="650" instrument_node="">Interpretation. </span></li><span data-dcnode-id="648" instrument_node="">
</span><li data-dcnode-id="646"><span data-dcnode-id="647" instrument_node="">Comparison. </span></li><span data-dcnode-id="645" instrument_node="">
</span><li data-dcnode-id="643"><span data-dcnode-id="644" instrument_node="">Contextualization. </span></li><span data-dcnode-id="642" instrument_node="">
</span><li data-dcnode-id="640"><span data-dcnode-id="641" instrument_node="">Synthesis. </span></li><span data-dcnode-id="639" instrument_node="">
</span><li data-dcnode-id="637"><span data-dcnode-id="638" instrument_node="">Causation. </span></li><span data-dcnode-id="636" instrument_node="">
</span><li data-dcnode-id="634"><span data-dcnode-id="635" instrument_node="">Patterns of Continuity and Change Over Time. </span></li><span data-dcnode-id="633" instrument_node="">
</span><li data-dcnode-id="631"><span data-dcnode-id="632" instrument_node="">Periodization.</span></li><span data-dcnode-id="630" instrument_node="">
</span></ul><span data-dcnode-id="628" instrument_node="">
</span><h2 data-dcnode-id="624"><span class="ez-toc-section" data-dcnode-id="627" id="What_are_the_skills_of_a_historian"></span><span data-dcnode-id="626" instrument_node="">What are the skills of a historian?</span><span class="ez-toc-section-end" data-dcnode-id="625"></span></h2><span data-dcnode-id="623" instrument_node="">
</span><p data-dcnode-id="621"><span data-dcnode-id="622" instrument_node="">Historians should also possess the following specific qualities:</span></p><span data-dcnode-id="620" instrument_node="">
</span><ul data-dcnode-id="603"><span data-dcnode-id="619" instrument_node="">
</span><li data-dcnode-id="617"><span data-dcnode-id="618" instrument_node="">Analytical skills. </span></li><span data-dcnode-id="616" instrument_node="">
</span><li data-dcnode-id="614"><span data-dcnode-id="615" instrument_node="">Communication skills. </span></li><span data-dcnode-id="613" instrument_node="">
</span><li data-dcnode-id="611"><span data-dcnode-id="612" instrument_node="">Problem-solving skills. </span></li><span data-dcnode-id="610" instrument_node="">
</span><li data-dcnode-id="608"><span data-dcnode-id="609" instrument_node="">Research skills. </span></li><span data-dcnode-id="607" instrument_node="">
</span><li data-dcnode-id="605"><span data-dcnode-id="606" instrument_node="">Writing skills.</span></li><span data-dcnode-id="604" instrument_node="">
</span></ul><span data-dcnode-id="602" instrument_node="">
</span><h2 data-dcnode-id="598"><span class="ez-toc-section" data-dcnode-id="601" id="What_are_the_skills_in_history"></span><span data-dcnode-id="600" instrument_node="">What are the skills in history?</span><span class="ez-toc-section-end" data-dcnode-id="599"></span></h2><span data-dcnode-id="597" instrument_node="">
</span><p data-dcnode-id="595"><span data-dcnode-id="596" instrument_node="">What Skills Should You Have When You Leave a History Class?</span></p><span data-dcnode-id="594" instrument_node="">
</span><ul data-dcnode-id="577"><span data-dcnode-id="593" instrument_node="">
</span><li data-dcnode-id="591"><span data-dcnode-id="592" instrument_node="">Chronological Thinking. Chronological thinking is at the heart of historical reasoning. </span></li><span data-dcnode-id="590" instrument_node="">
</span><li data-dcnode-id="588"><span data-dcnode-id="589" instrument_node="">Historical Comprehension. </span></li><span data-dcnode-id="587" instrument_node="">
</span><li data-dcnode-id="585"><span data-dcnode-id="586" instrument_node="">Historical Analysis and Interpretation. </span></li><span data-dcnode-id="584" instrument_node="">
</span><li data-dcnode-id="582"><span data-dcnode-id="583" instrument_node="">Historical Research Skills. </span></li><span data-dcnode-id="581" instrument_node="">
</span><li data-dcnode-id="579"><span data-dcnode-id="580" instrument_node="">Historical Issues–Analysis and Decision-Making.</span></li><span data-dcnode-id="578" instrument_node="">
</span></ul><span data-dcnode-id="576" instrument_node="">
</span><h2 data-dcnode-id="572"><span class="ez-toc-section" data-dcnode-id="575" id="What_are_the_six_historical_thinking_skills"></span><span data-dcnode-id="574" instrument_node="">What are the six historical thinking skills?</span><span class="ez-toc-section-end" data-dcnode-id="573"></span></h2><span data-dcnode-id="571" instrument_node="">
</span><p data-dcnode-id="569"><span data-dcnode-id="570" instrument_node="">The six “historical thinking concepts” are: historical significance, primary source evidence, continuity and change, cause and consequence, historical perspectives and ethical dimensions. Together, these concepts form the basis of historical inquiry.</span></p><span data-dcnode-id="568" instrument_node="">
</span><h2 data-dcnode-id="564"><span class="ez-toc-section" data-dcnode-id="567" id="What_skills_do_languages_give_you"></span><span data-dcnode-id="566" instrument_node="">What skills do languages give you?</span><span class="ez-toc-section-end" data-dcnode-id="565"></span></h2><span data-dcnode-id="563" instrument_node="">
</span><p data-dcnode-id="561"><span data-dcnode-id="562" instrument_node="">Language learning helps develop strong cognitive skills, such as a better concept formation, mental flexibility, multitasking, listening skills and problem-solving, in addition to improving social interaction and encouraging connection between peers.</span></p><span data-dcnode-id="560" instrument_node="">
</span><h2 data-dcnode-id="556"><span class="ez-toc-section" data-dcnode-id="559" id="What_are_the_4_skills_of_language"></span><span data-dcnode-id="558" instrument_node="">What are the 4 skills of language?</span><span class="ez-toc-section-end" data-dcnode-id="557"></span></h2><span data-dcnode-id="555" instrument_node="">
</span><p data-dcnode-id="553"><span data-dcnode-id="554" instrument_node="">Another way to describe language is in terms of the four basic language skills: listening, speaking, reading, and writing. In your teaching, you will need to address each of these skills.</span></p><span data-dcnode-id="552" instrument_node="">
</span><h2 data-dcnode-id="548"><span class="ez-toc-section" data-dcnode-id="551" id="Is_language_a_skill_or_ability"></span><span data-dcnode-id="550" instrument_node="">Is language a skill or ability?</span><span class="ez-toc-section-end" data-dcnode-id="549"></span></h2><span data-dcnode-id="547" instrument_node="">
</span><p data-dcnode-id="545"><span data-dcnode-id="546" instrument_node="">A proficient language skill refers to an ability to speak, write, and read a language without much difficulty at all. You don’t foresee yourself having an issue using the languages listed in your role, however, you’re not fluent.</span></p><span data-dcnode-id="544" instrument_node="">
</span><h2 data-dcnode-id="540"><span class="ez-toc-section" data-dcnode-id="543" id="How_can_I_improve_my_language_skills"></span><span data-dcnode-id="542" instrument_node="">How can I improve my language skills?</span><span class="ez-toc-section-end" data-dcnode-id="541"></span></h2><span data-dcnode-id="539" instrument_node="">
</span><p data-dcnode-id="537"><span data-dcnode-id="538" instrument_node="">7 Ways to Quickly Improve Your English Language Skills</span></p><span data-dcnode-id="536" instrument_node="">
</span><ol data-dcnode-id="513"><span data-dcnode-id="535" instrument_node="">
</span><li data-dcnode-id="533"><span data-dcnode-id="534" instrument_node="">Watch movies in English. </span></li><span data-dcnode-id="532" instrument_node="">
</span><li data-dcnode-id="530"><span data-dcnode-id="531" instrument_node="">Immerse yourself in English language news. </span></li><span data-dcnode-id="529" instrument_node="">
</span><li data-dcnode-id="527"><span data-dcnode-id="528" instrument_node="">Start a vocabulary book of useful words. </span></li><span data-dcnode-id="526" instrument_node="">
</span><li data-dcnode-id="524"><span data-dcnode-id="525" instrument_node="">Have conversations in English. </span></li><span data-dcnode-id="523" instrument_node="">
</span><li data-dcnode-id="521"><span data-dcnode-id="522" instrument_node="">Practice, practice, practice. </span></li><span data-dcnode-id="520" instrument_node="">
</span><li data-dcnode-id="518"><span data-dcnode-id="519" instrument_node="">Curiosity doesn’t always kill the cat. </span></li><span data-dcnode-id="517" instrument_node="">
</span><li data-dcnode-id="515"><span data-dcnode-id="516" instrument_node="">Don’t forget to have fun while you learn.</span></li><span data-dcnode-id="514" instrument_node="">
</span></ol><span data-dcnode-id="512" instrument_node="">
</span><h2 data-dcnode-id="508"><span class="ez-toc-section" data-dcnode-id="511" id="How_do_you_master_language_skills"></span><span data-dcnode-id="510" instrument_node="">How do you master language skills?</span><span class="ez-toc-section-end" data-dcnode-id="509"></span></h2><span data-dcnode-id="507" instrument_node="">
</span><p data-dcnode-id="505"><span data-dcnode-id="506" instrument_node="">Here are a few tips both from experts which can help you become fluent.</span></p><span data-dcnode-id="504" instrument_node="">
</span><ol data-dcnode-id="481"><span data-dcnode-id="503" instrument_node="">
</span><li data-dcnode-id="501"><span data-dcnode-id="502" instrument_node="">Know why you’re studying a language. </span></li><span data-dcnode-id="500" instrument_node="">
</span><li data-dcnode-id="498"><span data-dcnode-id="499" instrument_node="">Learn core words first. </span></li><span data-dcnode-id="497" instrument_node="">
</span><li data-dcnode-id="495"><span data-dcnode-id="496" instrument_node="">Practice. </span></li><span data-dcnode-id="494" instrument_node="">
</span><li data-dcnode-id="492"><span data-dcnode-id="493" instrument_node="">Watch foreign-language media. </span></li><span data-dcnode-id="491" instrument_node="">
</span><li data-dcnode-id="489"><span data-dcnode-id="490" instrument_node="">Don’t be scared of mistakes. </span></li><span data-dcnode-id="488" instrument_node="">
</span><li data-dcnode-id="486"><span data-dcnode-id="487" instrument_node="">Speak with native speakers. </span></li><span data-dcnode-id="485" instrument_node="">
</span><li data-dcnode-id="483"><span data-dcnode-id="484" instrument_node="">Look into the foreign culture.</span></li><span data-dcnode-id="482" instrument_node="">
</span></ol><span data-dcnode-id="480" instrument_node="">
</span><h2 data-dcnode-id="476"><span class="ez-toc-section" data-dcnode-id="479" id="Which_skill_is_called_as_the_master_skill_in_language"></span><span data-dcnode-id="478" instrument_node="">Which skill is called as the master skill in language?</span><span class="ez-toc-section-end" data-dcnode-id="477"></span></h2><span data-dcnode-id="475" instrument_node="">
</span><p data-dcnode-id="473"><span data-dcnode-id="474" instrument_node="">In order to become fluent in a language, you need to master these four basic skills: Listening. Reading. Writing.</span></p><span data-dcnode-id="472" instrument_node="">
</span><h2 data-dcnode-id="468"><span class="ez-toc-section" data-dcnode-id="471" id="What_are_the_skills_of_reading"></span><span data-dcnode-id="470" instrument_node="">What are the skills of reading?</span><span class="ez-toc-section-end" data-dcnode-id="469"></span></h2><span data-dcnode-id="467" instrument_node="">
</span><p data-dcnode-id="465"><span data-dcnode-id="466" instrument_node="">Here are six essential skills needed for reading comprehension , and tips on what can help kids improve this skill.</span></p><span data-dcnode-id="464" instrument_node="">
</span><ul data-dcnode-id="444"><span data-dcnode-id="463" instrument_node="">
</span><li data-dcnode-id="461"><span data-dcnode-id="462" instrument_node="">Decoding. Decoding is a vital step in the reading process. </span></li><span data-dcnode-id="460" instrument_node="">
</span><li data-dcnode-id="458"><span data-dcnode-id="459" instrument_node="">Fluency. </span></li><span data-dcnode-id="457" instrument_node="">
</span><li data-dcnode-id="455"><span data-dcnode-id="456" instrument_node="">Vocabulary. </span></li><span data-dcnode-id="454" instrument_node="">
</span><li data-dcnode-id="452"><span data-dcnode-id="453" instrument_node="">Sentence construction and cohesion. </span></li><span data-dcnode-id="451" instrument_node="">
</span><li data-dcnode-id="449"><span data-dcnode-id="450" instrument_node="">Reasoning and background knowledge. </span></li><span data-dcnode-id="448" instrument_node="">
</span><li data-dcnode-id="446"><span data-dcnode-id="447" instrument_node="">Working memory and attention.</span></li><span data-dcnode-id="445" instrument_node="">
</span></ul><span data-dcnode-id="443" instrument_node="">
</span><h2 data-dcnode-id="439"><span class="ez-toc-section" data-dcnode-id="442" id="What_is_the_first_step_in_learning_language"></span><span data-dcnode-id="441" instrument_node="">What is the first step in learning language?</span><span class="ez-toc-section-end" data-dcnode-id="440"></span></h2><span data-dcnode-id="438" instrument_node="">
</span><p data-dcnode-id="436"><span data-dcnode-id="437" instrument_node="">Try FluentU for FREE!</span></p><span data-dcnode-id="435" instrument_node="">
</span><ol data-dcnode-id="409"><span data-dcnode-id="434" instrument_node="">
</span><li data-dcnode-id="432"><span data-dcnode-id="433" instrument_node="">Set language-learning goals. The first step to learning a new language fast is to set goals for what you want to achieve. </span></li><span data-dcnode-id="431" instrument_node="">
</span><li data-dcnode-id="429"><span data-dcnode-id="430" instrument_node="">Learn the “right” words. </span></li><span data-dcnode-id="428" instrument_node="">
</span><li data-dcnode-id="426"><span data-dcnode-id="427" instrument_node="">Study smart. </span></li><span data-dcnode-id="425" instrument_node="">
</span><li data-dcnode-id="423"><span data-dcnode-id="424" instrument_node="">Start using the language all day, every day. </span></li><span data-dcnode-id="422" instrument_node="">
</span><li data-dcnode-id="420"><span data-dcnode-id="421" instrument_node="">Seek out real-life practice. </span></li><span data-dcnode-id="419" instrument_node="">
</span><li data-dcnode-id="417"><span data-dcnode-id="418" instrument_node="">Learn about the culture. </span></li><span data-dcnode-id="416" instrument_node="">
</span><li data-dcnode-id="414"><span data-dcnode-id="415" instrument_node="">Test yourself. </span></li><span data-dcnode-id="413" instrument_node="">
</span><li data-dcnode-id="411"><span data-dcnode-id="412" instrument_node="">Have fun!</span></li><span data-dcnode-id="410" instrument_node="">
</span></ol><span data-dcnode-id="408" instrument_node="">
</span><h2 data-dcnode-id="404"><span class="ez-toc-section" data-dcnode-id="407" id="What_are_the_five_steps_to_learning_new_words"></span><span data-dcnode-id="406" instrument_node="">What are the five steps to learning new words?</span><span class="ez-toc-section-end" data-dcnode-id="405"></span></h2><span data-dcnode-id="403" instrument_node="">
</span><p data-dcnode-id="401"><span data-dcnode-id="402" instrument_node="">The Original Five Steps.</span></p><span data-dcnode-id="400" instrument_node="">
</span><ul data-dcnode-id="383"><span data-dcnode-id="399" instrument_node="">
</span><li data-dcnode-id="397"><span data-dcnode-id="398" instrument_node="">Read. Okay, this step doesn’t require too much adjustment – it is absolutely true that the more you read, the more your vocabulary (and your imagination!) will grow. </span></li><span data-dcnode-id="396" instrument_node="">
</span><li data-dcnode-id="394"><span data-dcnode-id="395" instrument_node="">Listen. </span></li><span data-dcnode-id="393" instrument_node="">
</span><li data-dcnode-id="391"><span data-dcnode-id="392" instrument_node="">Write Down Words You Don’t Know. </span></li><span data-dcnode-id="390" instrument_node="">
</span><li data-dcnode-id="388"><span data-dcnode-id="389" instrument_node="">Maintain a Vocabulary Notebook. </span></li><span data-dcnode-id="387" instrument_node="">
</span><li data-dcnode-id="385"><span data-dcnode-id="386" instrument_node="">Use New Words in Conversation.</span></li><span data-dcnode-id="384" instrument_node="">
</span></ul><span data-dcnode-id="382" instrument_node="">
</span><h2 data-dcnode-id="378"><span class="ez-toc-section" data-dcnode-id="381" id="Who_has_the_largest_vocabulary"></span><span data-dcnode-id="380" instrument_node="">Who has the largest vocabulary?</span><span class="ez-toc-section-end" data-dcnode-id="379"></span></h2><span data-dcnode-id="377" instrument_node="">
</span><p data-dcnode-id="375"><span data-dcnode-id="376" instrument_node="">Marshall Mathers III</span></p><span data-dcnode-id="374" instrument_node="">
</span><h2 data-dcnode-id="370"><span class="ez-toc-section" data-dcnode-id="373" id="What_word_does_Eminem_use_the_most"></span><span data-dcnode-id="372" instrument_node="">What word does Eminem use the most?</span><span class="ez-toc-section-end" data-dcnode-id="371"></span></h2><span data-dcnode-id="369" instrument_node="">
</span><p data-dcnode-id="367"><span data-dcnode-id="368" instrument_node="">Eminem topped the list with 8,818 unique words used, followed by Jay Z with 6,899, the late Tupac Shakur with 6,569 and West with 5,069. Legendary singer-songwriter Dylan came in fifth with 4,883. Perhaps the top four was to be expected, as rap is by nature dense, given the focus on lyricism.</span></p><span data-dcnode-id="366" instrument_node="">
</span><h2 data-dcnode-id="362"><span class="ez-toc-section" data-dcnode-id="365" id="What_was_Shakespeares_vocabulary"></span><span data-dcnode-id="364" instrument_node="">What was Shakespeare’s vocabulary?</span><span class="ez-toc-section-end" data-dcnode-id="363"></span></h2><span data-dcnode-id="361" instrument_node="">
</span><p data-dcnode-id="359"><span data-dcnode-id="360" instrument_node="">This, with his manifest vocabulary of 31,000 words, added up to a well-supportable estimated total vocabulary of at least 66,000 words – or perhaps something closer to 64,000, if added to Shakespeare’s corrected manifest vocabulary of 29,000 words per Spevack’s 1974 count.</span></p><span data-dcnode-id="358" instrument_node="">
