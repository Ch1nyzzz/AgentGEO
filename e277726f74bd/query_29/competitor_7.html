</span><p data-dcnode-id="874"><span data-dcnode-id="878" instrument_node="">Many people think of history as merely "the past"—or at most, information </span><em data-dcnode-id="876"><span data-dcnode-id="877" instrument_node="">about</span></em><span data-dcnode-id="875" instrument_node=""> the past. But the real work of a historian is to listen to the voices of those who have gone before and humbly remember the flesh and blood on the other side of the evidence. What is their story? How does it become part of our own?</span></p><p data-dcnode-id="869"><span data-dcnode-id="873" instrument_node="">In </span><em data-dcnode-id="871"><span data-dcnode-id="872" instrument_node="">A Little Book for New Historians</span></em><span data-dcnode-id="870" instrument_node=""> veteran historian Robert Tracy McKenzie offers a concise, clear, and beautifully written introduction to the study of history. In addition to making a case for the discipline in our pragmatic, "present-tense" culture, McKenzie lays out necessary skills, methods, and attitudes for historians in training. Loaded with concrete examples and insightful principles, this primer shows how the study of history, faithfully pursued, can shape your heart as well as your mind.</span></p><span data-dcnode-id="868" instrument_node="">
</span></div><span data-dcnode-id="866" instrument_node="">

</span><h3 data-dcnode-id="860"><a data-dcnode-id="861" name="reviews"><span data-dcnode-id="862" instrument_node="">REVIEWS</span></a></h3><span data-dcnode-id="859" instrument_node="">
</span></div><span data-dcnode-id="857" instrument_node="">
</span><div class="reviews-body ivp-collapse collapse" data-dcnode-id="800" id="reviews-body"><span data-dcnode-id="856" instrument_node="">
</span><div class="endorsement" data-dcnode-id="853"><p data-dcnode-id="854"><span data-dcnode-id="855" instrument_node="">"This slim volume will challenge everything you've learned about studying the past. Put names and dates to the side and buckle your seatbelts for a ride that engages your heart as much as your mind. New historians—and old—will benefit mightily from the wisdom of this little book."</span></p></div><div class="endorsement-author" data-dcnode-id="851"><span data-dcnode-id="852" instrument_node="">Sam Wineburg, Margaret Jacks Professor of Education and (by courtesy) History, Stanford University</span></div><div class="endorsement" data-dcnode-id="848"><p data-dcnode-id="849"><span data-dcnode-id="850" instrument_node="">"This book makes an outstanding contribution—for students of history, readers of history, history classes in college or high school, and discussions of history in church groups. It explains clearly what historians do, how historical study can promote the right kind of intellectual discipline, and why history means so much for Christian faith. The book is as powerfully effective as it is accessibly succinct."</span></p></div><div class="endorsement-author" data-dcnode-id="846"><span data-dcnode-id="847" instrument_node="">Mark Noll, author of In the Beginning Was the Word: The Bible and American Public Life, 1492-1783</span></div><div class="endorsement" data-dcnode-id="843"><p data-dcnode-id="844"><span data-dcnode-id="845" instrument_node="">"Beautifully written and thought provoking. Tracy McKenzie reminds us that history is so much more than knowledge about the past. He invites us to understand history as a Christian vocation; he equips us to develop historical habits of the mind, and he challenges us to be transformed by our historical consciousness. Just as history is foundational to Christian faith, McKenzie shows us that historical understanding is also foundational to being a faithful Christian. His book will enrich both the college and church classroom."</span></p></div><div class="endorsement-author" data-dcnode-id="841"><span data-dcnode-id="842" instrument_node="">Beth Allison Barr, associate professor of history, associate dean of the graduate school at Baylor University</span></div><div class="endorsement" data-dcnode-id="838"><p data-dcnode-id="839"><span data-dcnode-id="840" instrument_node="">"If we take McKenzie's warnings about American 'present-tense culture' seriously and apply his lessons of history as the remembered past, the solutions for many of our contemporary racial problems would soon become clear. This book provides practical reflection and instruction on the development of historical thinking skills and growth of historical consciousness. I wish I had it when I was a new historian."</span></p></div><div class="endorsement-author" data-dcnode-id="836"><span data-dcnode-id="837" instrument_node="">Robert Chao Romero, historian, UCLA Cesar E. Chavez Department of Chicana/o Studies</span></div><div class="endorsement" data-dcnode-id="833"><p data-dcnode-id="834"><span data-dcnode-id="835" instrument_node="">"More than a how-to for beginning history students, this book is a tonic for our times. When many on the left and right clamor for history instructors to teach 'what really happened,' McKenzie lays bare the prideful arrogance behind such a desire and reminds us what a mature historical consciousness can provide—a discerning eye for the situation in which one has to act. Brimming with valuable insights culled from decades of classroom instruction by a master teacher, reading this book is both an intellectual pleasure and a practicum for spiritual formation. One can hope that the author's awe and humility before the task of making sense of the past will rub off on everyone who takes up this book."</span></p></div><div class="endorsement-author" data-dcnode-id="831"><span data-dcnode-id="832" instrument_node="">Lendol Calder, professor of history, Augustana College</span></div><div class="endorsement" data-dcnode-id="828"><p data-dcnode-id="829"><span data-dcnode-id="830" instrument_node="">"This primer for new historians is full of Christian wisdom about the study of the past. Written by a seasoned veteran who has taught history majors for more than thirty years—in both secular and Christian academic institutions—it will instruct and transform you with profound historical thinking about the world in which we live and the people we should love. Read it and join the conversation!"</span></p></div><div class="endorsement-author" data-dcnode-id="826"><span data-dcnode-id="827" instrument_node="">Douglas A. Sweeney, distinguished professor of church history and the history of Christian thought, Trinity Evangelical Divinity School</span></div><div class="endorsement" data-dcnode-id="820"><p data-dcnode-id="821"><span data-dcnode-id="825" instrument_node="">"Tracy McKenzie writes that we are living in a 'present-tense culture.' This observation will come as no surprise to history teachers on the frontlines, whose students tend to see the study of history as an exercise in memorizing arcane facts and hence place little value on learning history. In this concise and accessible book, McKenzie shows a way out of the tyranny of the present, explaining both how and why to learn from the past. He shows how to develop habits of inquiry and reflection that allow engagement with the past as a life-changing moral inquiry rather than the dry recital of facts. The wisdom he offers for new historians can be fruitful for more experienced scholars as well. This small book should be on </span><em data-dcnode-id="823"><span data-dcnode-id="824" instrument_node="">every</span></em><span data-dcnode-id="822" instrument_node=""> historian's reading list."</span></p></div><div class="endorsement-author" data-dcnode-id="818"><span data-dcnode-id="819" instrument_node="">Rob Sorensen, history department chair, The Bear Creek School</span></div><div class="endorsement" data-dcnode-id="812"><p data-dcnode-id="813"><span data-dcnode-id="817" instrument_node="">"In engaging and accessible prose, Tracy McKenzie provides an excellent introduction to the historian's craft for the undergraduate student—I know of none better. </span><em data-dcnode-id="815"><span data-dcnode-id="816" instrument_node="">A Little Book for New Historians</span></em><span data-dcnode-id="814" instrument_node=""> offers a compelling rationale for the study of history along with helpful practical guidelines on how to do so. But, above all, it challenges students to view history as an essential part of an education that endeavors to form mind and spirit in humane and holy ways. Deeply informed by Christian faith, this work summons the student to seek a 'heart of wisdom' through the careful investigation of the past."</span></p></div><div class="endorsement-author" data-dcnode-id="810"><span data-dcnode-id="811" instrument_node="">Ronald K. Rittgers, Erich Markel Chair of German Reformation Studies, professor of history and theology, Valparaiso University</span></div><div class="endorsement" data-dcnode-id="804"><p data-dcnode-id="805"><span data-dcnode-id="809" instrument_node="">"</span><em data-dcnode-id="807"><span data-dcnode-id="808" instrument_node="">A Little Book for New Historians</span></em><span data-dcnode-id="806" instrument_node=""> is short on words and long on wisdom. In it, Tracy McKenzie proves once again to be a sure and reliable guide for Christian students and faculty on what it means to do history well and why it is worth it. Like the past itself, his work offers us lots of gifts to be received."</span></p></div><div class="endorsement-author" data-dcnode-id="802"><span data-dcnode-id="803" instrument_node="">Richard Pointer, Westmont College</span></div><span data-dcnode-id="801" instrument_node="">
