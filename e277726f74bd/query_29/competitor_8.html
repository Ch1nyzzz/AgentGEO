</span><div data-dcnode-id="899"><p data-dcnode-id="905"><span data-dcnode-id="908" instrument_node="">Reading Like A Historian: Sourcing</span><br data-dcnode-id="907"><span data-dcnode-id="906" instrument_node="">
Program Transcript</span></p><span data-dcnode-id="904" instrument_node="">
</span><p data-dcnode-id="900"><span data-dcnode-id="903" instrument_node="">Valerie Ziegler (Interveiw):</span><br data-dcnode-id="902"><span data-dcnode-id="901" instrument_node="">
Most lessons are structured the same way, in that you pose                    </span></p></div><span data-dcnode-id="898" instrument_node="">
</span><div class="clearfix" data-dcnode-id="892"><a class="transcript-more view-more text-uppercase float-left" data-dcnode-id="893" href="javascript:void(0)"><span data-dcnode-id="896"><span data-dcnode-id="897" instrument_node="">View More</span></span><span data-dcnode-id="895" instrument_node=""> </span><i class="fa fa-chevron-right arrow-down" data-dcnode-id="894"></i></a></div><span data-dcnode-id="891" instrument_node="">

Program Transcript</span></p><span data-dcnode-id="883" instrument_node="">
</span><p data-dcnode-id="879"><span data-dcnode-id="882" instrument_node="">Valerie Ziegler (Interveiw):</span><br data-dcnode-id="881"><span data-dcnode-id="880" instrument_node="">
Most lessons are structured the same way, in that you pose a question to the class for the day. That’s, sort of, the grabber: this is why we’re here today. Then in posing that question, there’s usually a set of historical documents that you’re reading. For some lessons, there might only be two documents; for some, there could be as many as five. Then you being using the skills of Reading Like A Historian, so we always begin with sourcing it: trying to understand who wrote this document and what was their intent in it.</span></p><span data-dcnode-id="878" instrument_node="">
</span><p data-dcnode-id="874"><span data-dcnode-id="877" instrument_node="">Ziegler:</span><br data-dcnode-id="876"><span data-dcnode-id="875" instrument_node="">
Today we’re going to talk about something called the Gulf of Tonkin. And most historians point to this as, sort of, the U.S.’s formal entry into the Vietnam War. And we’re going to ask ourselves today, with our question—is that, “Was the U.S. planning to go to war before the Gulf of Tonkin incident, or was this really the beginning of the U.S.’s entry into Vietnam?” So what happens at the Gulf of Tonkin incident? You’ll notice on your timeline, it shows both August 2nd and 4th of 1964, North Vietnamese attack two U.S. destroyers in international waters, which became known as the Gulf of Tonkin. And I’ll show you that on a map. So what’s happening there that something is destroyed—well, there is a U.S. ship there, the U.S.S. Maddox, and it was a destroyer, and it was basically using electronic spying techniques, and they were trying to figure out, “What’s going on?” Historians debate what really happened on these two dates, but there was incidence of firing on the Maddox on August 2nd. August 4th, sometimes historians disagree as to what really happened, but we know that it happens on August 2nd, and as a result, President Johnson asks Congress to take action.</span></p><span data-dcnode-id="873" instrument_node="">
</span><p data-dcnode-id="869"><span data-dcnode-id="872" instrument_node="">Valerie Ziegler (Interview):</span><br data-dcnode-id="871"><span data-dcnode-id="870" instrument_node="">
The question for that day was, “Was the U.S. planning to go to war before the Gulf of Tonkin incident?” And the intent with that lesson was to introduce Vietnam, in the sense that I wanted students to already start grappling, “Wow we’re in a war? How did we get there, and why are we there? And people were questioning that?” And so the intent was to use documents to analyze that question.</span></p><span data-dcnode-id="868" instrument_node="">
</span><p data-dcnode-id="864"><span data-dcnode-id="867" instrument_node="">Ziegler:</span><br data-dcnode-id="866"><span data-dcnode-id="865" instrument_node="">
And we’re going to begin with the Gulf of Tonkin Resolution. That’s going to be our first document. And I am going to source and close read it for you. Alright, on your timeline, I’d like you to write today’s question, so we make sure we’re constantly coming back to this as we look at it. And the question is: “Was the U.S. planning to go to war with Vietnam before the Gulf of Tonkin?” What’s the first thing that I’m going to do?</span></p><span data-dcnode-id="863" instrument_node="">
</span><p data-dcnode-id="855"><span data-dcnode-id="862" instrument_node="">Students:</span><br data-dcnode-id="861"><span data-dcnode-id="860" instrument_node="">
Source.</span><br data-dcnode-id="859"><span data-dcnode-id="858" instrument_node="">
Ziegler:</span><br data-dcnode-id="857"><span data-dcnode-id="856" instrument_node="">
I’m going to source it.</span></p><span data-dcnode-id="854" instrument_node="">
</span><p data-dcnode-id="850"><span data-dcnode-id="853" instrument_node="">Valerie Ziegler (Interview):</span><br data-dcnode-id="852"><span data-dcnode-id="851" instrument_node="">
For the sourcing, I give them a handout, and they place it next to them. And say the first question is “Who wrote it?” Easy, we can answer that together. “When was it written? Why was it written? And I would say in the beginning I model that.</span></p><span data-dcnode-id="849" instrument_node="">
</span><p data-dcnode-id="845"><span data-dcnode-id="848" instrument_node="">Ziegler:</span><br data-dcnode-id="847"><span data-dcnode-id="846" instrument_node="">
So, what’s the first thing I’m going to do when I source it?</span></p><span data-dcnode-id="844" instrument_node="">
</span><p data-dcnode-id="840"><span data-dcnode-id="843" instrument_node="">Student:</span><br data-dcnode-id="842"><span data-dcnode-id="841" instrument_node="">
Who wrote it?</span></p><span data-dcnode-id="839" instrument_node="">
</span><p data-dcnode-id="835"><span data-dcnode-id="838" instrument_node="">Ziegler:</span><br data-dcnode-id="837"><span data-dcnode-id="836" instrument_node="">
Who wrote it. Okay. So, here’s my ‘who.’ It says, “The 88th Congress of the United States of America.” So the author, literally in the case, is Congress. So we know that Congress passes laws, and a resolution looks a lot like a law, right? This is their statement. According to your timeline, what year is this? August… what?</span></p><span data-dcnode-id="834" instrument_node="">
</span><p data-dcnode-id="830"><span data-dcnode-id="833" instrument_node="">Student:</span><br data-dcnode-id="832"><span data-dcnode-id="831" instrument_node="">
Seven.</span></p><span data-dcnode-id="829" instrument_node="">
</span><p data-dcnode-id="825"><span data-dcnode-id="828" instrument_node="">Ziegler:</span><br data-dcnode-id="827"><span data-dcnode-id="826" instrument_node="">
…7, 1964. Okay? So this is when this happens, right? What do I know has already happened when they pass this resolution?</span></p><span data-dcnode-id="824" instrument_node="">
</span><p data-dcnode-id="820"><span data-dcnode-id="823" instrument_node="">Student:</span><br data-dcnode-id="822"><span data-dcnode-id="821" instrument_node="">
The incident.</span></p><span data-dcnode-id="819" instrument_node="">
</span><p data-dcnode-id="815"><span data-dcnode-id="818" instrument_node="">Ziegler:</span><br data-dcnode-id="817"><span data-dcnode-id="816" instrument_node="">
The incident! The Gulf of Tonkin incident. So, again, as I’m thinking about this—this context, right?—it’s after the Gulf of Tonkin incident. Is there anything else that I would want to pull from the sourcing here? Marcel?</span></p><span data-dcnode-id="814" instrument_node="">
</span><p data-dcnode-id="810"><span data-dcnode-id="813" instrument_node="">Student:</span><br data-dcnode-id="812"><span data-dcnode-id="811" instrument_node="">
At the second session?</span></p><span data-dcnode-id="809" instrument_node="">
</span><p data-dcnode-id="805"><span data-dcnode-id="808" instrument_node="">Ziegler:</span><br data-dcnode-id="807"><span data-dcnode-id="806" instrument_node="">
Yeah, the second session. So that does tell me that—this part here means it’s the second part of Congress, and actually, what’s interesting that a lot of people don’t think about this, is again we’re talking about sessions of Congress: this is going into an election year when this takes place. Why does that matter, there’s going to be an election?</span></p><span data-dcnode-id="804" instrument_node="">
</span><p data-dcnode-id="800"><span data-dcnode-id="803" instrument_node="">Student:</span><br data-dcnode-id="802"><span data-dcnode-id="801" instrument_node="">
Every party’s trying to get their guy in.</span></p><span data-dcnode-id="799" instrument_node="">
</span><p data-dcnode-id="795"><span data-dcnode-id="798" instrument_node="">Ziegler:</span><br data-dcnode-id="797"><span data-dcnode-id="796" instrument_node="">
Everybody’s trying to get—so members of Congress are trying to get elected. And who else is trying to get elected?</span></p><span data-dcnode-id="794" instrument_node="">
</span><p data-dcnode-id="790"><span data-dcnode-id="793" instrument_node="">Student:</span><br data-dcnode-id="792"><span data-dcnode-id="791" instrument_node="">
The president.</span></p><span data-dcnode-id="789" instrument_node="">
</span><p data-dcnode-id="785"><span data-dcnode-id="788" instrument_node="">Ziegler:</span><br data-dcnode-id="787"><span data-dcnode-id="786" instrument_node="">
The president! And so that asks the question, Who’s the president at the time?</span></p><span data-dcnode-id="784" instrument_node="">
</span><p data-dcnode-id="780"><span data-dcnode-id="783" instrument_node="">Student:</span><br data-dcnode-id="782"><span data-dcnode-id="781" instrument_node="">
A white guy.</span></p><span data-dcnode-id="779" instrument_node="">
</span><p data-dcnode-id="775"><span data-dcnode-id="778" instrument_node="">Ziegler:</span><br data-dcnode-id="777"><span data-dcnode-id="776" instrument_node="">
A white guy, yes. [students laugh] Who’s the one that was questioning in that domino theory?</span></p><span data-dcnode-id="774" instrument_node="">
</span><p data-dcnode-id="770"><span data-dcnode-id="773" instrument_node="">Student:</span><br data-dcnode-id="772"><span data-dcnode-id="771" instrument_node="">
LBJ.</span></p><span data-dcnode-id="769" instrument_node="">
</span><p data-dcnode-id="765"><span data-dcnode-id="768" instrument_node="">Ziegler:</span><br data-dcnode-id="767"><span data-dcnode-id="766" instrument_node="">
LBJ. So, at this time, LBJ is the president, right? And we know it’s an election year. And so, I’m thinking, as a historian, “Hmm, does that mean that they’re going to pass this because this is what the American people want, so they can get elected? Because, ‘Oh, they fired on our ships, we must go to war!’ Or are they doing this to make things seem better?”</span></p><span data-dcnode-id="764" instrument_node="">
</span><p data-dcnode-id="760"><span data-dcnode-id="763" instrument_node="">Valerie Ziegler (Interview):</span><br data-dcnode-id="762"><span data-dcnode-id="761" instrument_node="">
So the idea was that I wanted them to look at the documents, in that every document could answer the question both ways: every document could say, ‘yes, they were planning to go to war,’ and every document you could say ‘no.’ And so the intent was, “I can take the Gulf of Tonkin Resolution and say, ‘this is proof they were planning to go to war,’ or ‘this is proof they were not planning to go to war.’” And so that was the focus: to really get the kids to think about the sourcing of that document and the document itself.</span></p><span data-dcnode-id="759" instrument_node="">
</span><p data-dcnode-id="755"><span data-dcnode-id="758" instrument_node="">Student:</span><br data-dcnode-id="757"><span data-dcnode-id="756" instrument_node="">
So we know that this is a memorandum. And the person who wrote it is an advisor from Foreign Affairs.</span></p><span data-dcnode-id="754" instrument_node="">
</span><p data-dcnode-id="750"><span data-dcnode-id="753" instrument_node="">Ziegler:</span><br data-dcnode-id="752"><span data-dcnode-id="751" instrument_node="">
So, what did you notice about this, Estaphani?</span></p><span data-dcnode-id="749" instrument_node="">
</span><p data-dcnode-id="745"><span data-dcnode-id="748" instrument_node="">Student:</span><br data-dcnode-id="747"><span data-dcnode-id="746" instrument_node="">
That it was before the Gulf of Tonkin was attacked.</span></p><span data-dcnode-id="744" instrument_node="">
</span><p data-dcnode-id="740"><span data-dcnode-id="743" instrument_node="">Ziegler:</span><br data-dcnode-id="742"><span data-dcnode-id="741" instrument_node="">
Okay. So, what does that make you think, before you even start reading it? Do you think it means they wanted to go to war, or they hadn’t planned on it?</span></p><span data-dcnode-id="739" instrument_node="">
</span><p data-dcnode-id="735"><span data-dcnode-id="738" instrument_node="">Student:</span><br data-dcnode-id="737"><span data-dcnode-id="736" instrument_node="">
They hadn’t planned on it.</span></p><span data-dcnode-id="734" instrument_node="">
</span><p data-dcnode-id="730"><span data-dcnode-id="733" instrument_node="">Ziegler:</span><br data-dcnode-id="732"><span data-dcnode-id="731" instrument_node="">
Okay. Why do you think that?</span></p><span data-dcnode-id="729" instrument_node="">
</span><p data-dcnode-id="725"><span data-dcnode-id="728" instrument_node="">Student:</span><br data-dcnode-id="727"><span data-dcnode-id="726" instrument_node="">
Because the incident, like, it didn’t occur yet.</span></p><span data-dcnode-id="724" instrument_node="">
</span><p data-dcnode-id="720"><span data-dcnode-id="723" instrument_node="">Ziegler:</span><br data-dcnode-id="722"><span data-dcnode-id="721" instrument_node="">
Okay.</span></p><span data-dcnode-id="719" instrument_node="">
</span><p data-dcnode-id="715"><span data-dcnode-id="718" instrument_node="">Student:</span><br data-dcnode-id="717"><span data-dcnode-id="716" instrument_node="">
It’s not like—not even the Gulf of Tonkin has happened yet, and it’s already saying to use military force against Vietnam. I think that this whole document’s going to be about going to war.</span></p><span data-dcnode-id="714" instrument_node="">
</span><p data-dcnode-id="710"><span data-dcnode-id="713" instrument_node="">Student:</span><br data-dcnode-id="712"><span data-dcnode-id="711" instrument_node="">
But I would say “without,” so that would be a “not.”</span></p><span data-dcnode-id="709" instrument_node="">
</span><p data-dcnode-id="705"><span data-dcnode-id="708" instrument_node="">Student:</span><br data-dcnode-id="707"><span data-dcnode-id="706" instrument_node="">
“…that without a decision to resort to military action if necessary, the present prospect is not hopeful.” They don’t want to use military force, but they might have to.</span></p><span data-dcnode-id="704" instrument_node="">
</span><p data-dcnode-id="700"><span data-dcnode-id="703" instrument_node="">Student:</span><br data-dcnode-id="702"><span data-dcnode-id="701" instrument_node="">
I think—that was just an excuse.</span></p><span data-dcnode-id="699" instrument_node="">
</span><p data-dcnode-id="695"><span data-dcnode-id="698" instrument_node="">Ziegler:</span><br data-dcnode-id="697"><span data-dcnode-id="696" instrument_node="">
What’s some evidence from the sourcing that they were? Look at the bottom of the source. What kind of document is this?</span></p><span data-dcnode-id="694" instrument_node="">
</span><p data-dcnode-id="690"><span data-dcnode-id="693" instrument_node="">Student:</span><br data-dcnode-id="692"><span data-dcnode-id="691" instrument_node="">
Top secret.</span></p><span data-dcnode-id="689" instrument_node="">
</span><p data-dcnode-id="681"><span data-dcnode-id="688" instrument_node="">Ziegler:</span><br data-dcnode-id="687"><span data-dcnode-id="686" instrument_node="">
Super top secret—it was, like, somebody drafted it, somebody cleared it, and somebody approved it. So what does that make us think before we read it? Did they want anybody to see this?</span><br data-dcnode-id="685"><span data-dcnode-id="684" instrument_node="">
Student:</span><br data-dcnode-id="683"><span data-dcnode-id="682" instrument_node="">
No.</span></p><span data-dcnode-id="680" instrument_node="">
</span><p data-dcnode-id="676"><span data-dcnode-id="679" instrument_node="">Ziegler:</span><br data-dcnode-id="678"><span data-dcnode-id="677" instrument_node="">
No. So, I think we can make the case that this is probably ‘we’re going to go to war,’ based on that.</span></p><span data-dcnode-id="675" instrument_node="">
</span><p data-dcnode-id="671"><span data-dcnode-id="674" instrument_node="">Valerie Ziegler (Interview):</span><br data-dcnode-id="673"><span data-dcnode-id="672" instrument_node="">
The use of documents obviously is fundamental to Reading Like A Historian. I like to use a variety of documents so—the text documents that I often use: a speech, a testimony, a journal entry, a newspaper article, historians’ writing–– those are all different types. But I also love to use images, because they are, you know, a source of history, or a video, or a song. And the importance of that to me is that all of those things come together to tell the story.</span></p><span data-dcnode-id="670" instrument_node="">
