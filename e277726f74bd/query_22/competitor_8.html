e-id="5214" instrument_node=""> </span></ul><span data-dcnode-id="5212" instrument_node=""> </span></aside><span data-dcnode-id="5210" instrument_node=""> </span></article></li><li class="card search-results__record" data-dcnode-id="5131"><span data-dcnode-id="5207" instrument_node=""> </span><article class="row" data-dcnode-id="5132"><span data-dcnode-id="5206" instrument_node=""> </span><div class="col-sm-8 search-results__main" data-dcnode-id="5161"><span data-dcnode-id="5205" instrument_node=""> </span><header data-dcnode-id="5189"><span data-dcnode-id="5204" instrument_node=""> </span><p class="label" data-dcnode-id="5201"><a data-dcnode-id="5202" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//doaj.org/toc/2042-4752" target="_blank"><span data-dcnode-id="5203" instrument_node="">                            Journal of Art Historiography (Jun 2021)                          </span></a></p><span data-dcnode-id="5200" instrument_node=""> </span><h3 class="search-results__heading" data-dcnode-id="5195"><span data-dcnode-id="5199" instrument_node=""> </span><a class="" data-dcnode-id="5197" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//doaj.org/article/edefef32111443018b8aa4aea7d86724" target="_blank"><span data-dcnode-id="5198" instrument_node="">                              Wien oder Salzburg?’: late Sedlmayr as a symptom and cure                            </span></a><span data-dcnode-id="5196" instrument_node=""> </span></h3><span data-dcnode-id="5194" instrument_node=""> </span><ul class="inlined-list" data-dcnode-id="5191"><li data-dcnode-id="5192"><span data-dcnode-id="5193" instrument_node="">Stepan Vaneyan</span></li></ul><span data-dcnode-id="5190" instrument_node=""> </span></header><span data-dcnode-id="5188" instrument_node=""> </span><div class="search-results__body" data-dcnode-id="5163"><span data-dcnode-id="5187" instrument_node=""> </span><h4 data-dcnode-id="5185"><span data-dcnode-id="5186" instrument_node="">Article keywords</span></h4><ul class="inlined-list" data-dcnode-id="5174"><li data-dcnode-id="5183"><span data-dcnode-id="5184" instrument_node="">sedlmayr’s last work,&nbsp;</span></li><li data-dcnode-id="5181"><span data-dcnode-id="5182" instrument_node="">dvořák,&nbsp;</span></li><li data-dcnode-id="5179"><span data-dcnode-id="5180" instrument_node="">‘the new vienna school of art history’,&nbsp;</span></li><li data-dcnode-id="5177"><span data-dcnode-id="5178" instrument_node="">ruins,&nbsp;</span></li><li data-dcnode-id="5175"><span data-dcnode-id="5176" instrument_node="">preservation of monuments</span></li></ul><span data-dcnode-id="5173" instrument_node=""> </span><h4 aria-expanded="false" class="doaj-public-search-abstractaction doaj-public-search-abstractaction-results" data-dcnode-id="5168" rel="edefef32111443018b8aa4aea7d86724" type="button"><span data-dcnode-id="5172" instrument_node="">                            Abstract</span><svg aria-hidden="true" class="feather feather-plus" data-dcnode-id="5169" fill="none" height="24" stroke="currentColor" stroke-linecap="round" stroke-linejoin="round" stroke-width="2" viewBox="0 0 24 24" width="24" xmlns="http://www.w3.org/2000/svg"><line data-dcnode-id="5171" x1="12" x2="12" y1="5" y2="19"></line><line data-dcnode-id="5170" x1="5" x2="19" y1="12" y2="12"></line></svg></h4><span data-dcnode-id="5167" instrument_node=""> </span><p aria-expanded="false" class="collapse doaj-public-search-abstracttext doaj-public-search-abstracttext-results" data-dcnode-id="5165" rel="edefef32111443018b8aa4aea7d86724"><span data-dcnode-id="5166" instrument_node="">                            he collapse of the Austro-Hungarian Empire in 1918 accelerated the ‘atomization’ of the Vienna School of Art History, which had started with the discussion ‘Orient oder Rom’. This process eventually resulted in the interdisciplinary of ‘The New Vienna School of Art History’, where Sedlmayr was one of the central figures. His scheme of four-level interpretation of works of art, in which the eschatological level is also considered, can be applied to his own work. This allows for the better understanding of both his method and the logic of his writings as whole entities.  Considering the importance of ‘ruins’ for Sedlmayr, the author pays special attention to his text on preservation of monuments, ‘Die demolierte Schönheit…’ (1965), created in Salzburg, a cultural-historical parallel to Vienna, where Sedlmayr spent the last twenty years of his life.                          </span></p><span data-dcnode-id="5164" instrument_node=""> </span></div><span data-dcnode-id="5162" instrument_node=""> </span></div><span data-dcnode-id="5160" instrument_node=""> </span><aside class="col-sm-4 search-results__aside" data-dcnode-id="5134"><span data-dcnode-id="5159" instrument_node=""> </span><ul data-dcnode-id="5136"><span data-dcnode-id="5158" instrument_node=""> </span><li data-dcnode-id="5150"><span data-dcnode-id="5157" instrument_node=""> </span><a data-dcnode-id="5151" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//arthistoriography.files.wordpress.com/2021/05/vaneyan-doc.pdf" rel="noopener" target="_blank"><span data-dcnode-id="5156" instrument_node=""> Read online </span><svg aria-hidden="true" class="feather feather-external-link" data-dcnode-id="5152" fill="none" height="24" stroke="currentColor" stroke-linecap="round" stroke-linejoin="round" stroke-width="2" viewBox="0 0 24 24" width="24" xmlns="http://www.w3.org/2000/svg"><path d="M18 13v6a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V8a2 2 0 0 1 2-2h6" data-dcnode-id="5155"></path><polyline data-dcnode-id="5154" points="15 3 21 3 21 9"></polyline><line data-dcnode-id="5153" x1="10" x2="21" y1="14" y2="3"></line></svg></a></li><span data-dcnode-id="5149" instrument_node=""> </span><li data-dcnode-id="5144"><span data-dcnode-id="5148" instrument_node=""> </span><a data-dcnode-id="5146" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//doaj.org/toc/2042-4752" rel="noopener" target="_blank"><span data-dcnode-id="5147" instrument_node="">About the journal</span></a><span data-dcnode-id="5145" instrument_node=""> </span></li><span data-dcnode-id="5143" instrument_node=""> </span><li data-dcnode-id="5138"><span data-dcnode-id="5142" instrument_node="">                            Published by </span><em data-dcnode-id="5140"><span data-dcnode-id="5141" instrument_node="">Department of Art History, University of Birmingham</span></em><span data-dcnode-id="5139" instrument_node=""> </span></li><span data-dcnode-id="5137" instrument_node=""> </span></ul><span data-dcnode-id="5135" instrument_node=""> </span></aside><span data-dcnode-id="5133" instrument_node=""> </span></article></li><li class="card search-results__record" data-dcnode-id="5044"><span data-dcnode-id="5130" instrument_node=""> </span><article class="row" data-dcnode-id="5045"><span data-dcnode-id="5129" instrument_node=""> </span><div class="col-sm-8 search-results__main" data-dcnode-id="5074"><span data-dcnode-id="5128" instrument_node=""> </span><header data-dcnode-id="5112"><span data-dcnode-id="5127" instrument_node=""> </span><p class="label" data-dcnode-id="5124"><a data-dcnode-id="5125" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//doaj.org/toc/2042-4752" target="_blank"><span data-dcnode-id="5126" instrument_node="">                            Journal of Art Historiography (Jun 2021)                          </span></a></p><span data-dcnode-id="5123" instrument_node=""> </span><h3 class="search-results__heading" data-dcnode-id="5118"><span data-dcnode-id="5122" instrument_node=""> </span><a class="" data-dcnode-id="5120" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//doaj.org/article/15207a99f8594c998372c827873aca7d" target="_blank"><span data-dcnode-id="5121" instrument_node="">                              ‘Sidelight on an unwilling grey eminence – Schlosser as “Schlüsselfigur”’. A paper originally presented at the conference Viennese Art Historiography 1854-1938, University of Glasgow, 1-4 October 2009                            </span></a><span data-dcnode-id="5119" instrument_node=""> </span></h3><span data-dcnode-id="5117" instrument_node=""> </span><ul class="inlined-list" data-dcnode-id="5114"><li data-dcnode-id="5115"><span data-dcnode-id="5116" instrument_node="">Karl Johns</span></li></ul><span data-dcnode-id="5113" instrument_node=""> </span></header><span data-dcnode-id="5111" instrument_node=""> </span><div class="search-results__body" data-dcnode-id="5076"><span data-dcnode-id="5110" instrument_node=""> </span><h4 data-dcnode-id="5108"><span data-dcnode-id="5109" instrument_node="">Article keywords</span></h4><ul class="inlined-list" data-dcnode-id="5087"><li data-dcnode-id="5106"><span data-dcnode-id="5107" instrument_node="">julius von schlosser,&nbsp;</span></li><li data-dcnode-id="5104"><span data-dcnode-id="5105" instrument_node="">institut für geschichtsforschung,&nbsp;</span></li><li data-dcnode-id="5102"><span data-dcnode-id="5103" instrument_node="">vienna school of art historians,&nbsp;</span></li><li data-dcnode-id="5100"><span data-dcnode-id="5101" instrument_node="">franz wickhoff,&nbsp;</span></li><li data-dcnode-id="5098"><span data-dcnode-id="5099" instrument_node="">kunstgeschichtliche anzeigen,&nbsp;</span></li><li data-dcnode-id="5096"><span data-dcnode-id="5097" instrument_node="">kunsthistorisches museum,&nbsp;</span></li><li data-dcnode-id="5094"><span data-dcnode-id="5095" instrument_node="">cimabue,&nbsp;</span></li><li data-dcnode-id="5092"><span data-dcnode-id="5093" instrument_node="">kunstsprache,&nbsp;</span></li><li data-dcnode-id="5090"><span data-dcnode-id="5091" instrument_node="">the language of art,&nbsp;</span></li><li data-dcnode-id="5088"><span data-dcnode-id="5089" instrument_node="">anschluß</span></li></ul><span data-dcnode-id="5086" instrument_node=""> </span><h4 aria-expanded="false" class="doaj-public-search-abstractaction doaj-public-search-abstractaction-results" data-dcnode-id="5081" rel="15207a99f8594c998372c827873aca7d" type="button"><span data-dcnode-id="5085" instrument_node="">                            Abstract</span><svg aria-hidden="true" class="feather feather-plus" data-dcnode-id="5082" fill="none" height="24" stroke="currentColor" stroke-linecap="round" stroke-linejoin="round" stroke-width="2" viewBox="0 0 24 24" width="24" xmlns="http://www.w3.org/2000/svg"><line data-dcnode-id="5084" x1="12" x2="12" y1="5" y2="19"></line><line data-dcnode-id="5083" x1="5" x2="19" y1="12" y2="12"></line></svg></h4><span data-dcnode-id="5080" instrument_node=""> </span><p aria-expanded="false" class="collapse doaj-public-search-abstracttext doaj-public-search-abstracttext-results" data-dcnode-id="5078" rel="15207a99f8594c998372c827873aca7d"><span data-dcnode-id="5079" instrument_node="">                            While Riegl, Dvořák, Sedlmayr and Pächt have each of them aroused widespread enthusiasm at one point or another, the same cannot be said of Julius Schlosser (1866-1938). To speak in general terms about his intellectual trajectory and its significance, one meets two questions, the first rather obvious, and the other quite opaque. Although he wrote and lectured in a style that was difficult, his arguments were consistent and perhaps predictable – a continuation of Wickhoff’s approach, and the principles upheld by the Institut für Geschichtsforschung, as well as something later called structure and system, which is most apparent today in his thoughts about what he called the language and grammar of art, but also in his study from 1889 of the original architectural layout of western European abbeys which is a very early example of a functional analysis. In the last decade or two of his life he seems by contrast to have made some generalizations apparently difficult to reconcile with his earlier devotion to the particularity of historical sources.                          </span></p><span data-dcnode-id="5077" instrument_node=""> </span></div><span data-dcnode-id="5075" instrument_node=""> </span></div><span data-dcnode-id="5073" instrument_node=""> </span><aside class="col-sm-4 search-results__aside" data-dcnode-id="5047"><span data-dcnode-id="5072" instrument_node=""> </span><ul data-dcnode-id="5049"><span data-dcnode-id="5071" instrument_node=""> </span><li data-dcnode-id="5063"><span data-dcnode-id="5070" instrument_node=""> </span><a data-dcnode-id="5064" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//arthistoriography.files.wordpress.com/2021/05/johns-doc.pdf" rel="noopener" target="_blank"><span data-dcnode-id="5069" instrument_node=""> Read online </span><svg aria-hidden="true" class="feather feather-external-link" data-dcnode-id="5065" fill="none" height="24" stroke="currentColor" stroke-linecap="round" stroke-linejoin="round" stroke-width="2" viewBox="0 0 24 24" width="24" xmlns="http://www.w3.org/2000/svg"><path d="M18 13v6a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V8a2 2 0 0 1 2-2h6" data-dcnode-id="5068"></path><polyline data-dcnode-id="5067" points="15 3 21 3 21 9"></polyline><line data-dcnode-id="5066" x1="10" x2="21" y1="14" y2="3"></line></svg></a></li><span data-dcnode-id="5062" instrument_node=""> </span><li data-dcnode-id="5057"><span data-dcnode-id="5061" instrument_node=""> </span><a data-dcnode-id="5059" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//doaj.org/toc/2042-4752" rel="noopener" target="_blank"><span data-dcnode-id="5060" instrument_node="">About the journal</span></a><span data-dcnode-id="5058" instrument_node=""> </span></li><span data-dcnode-id="5056" instrument_node=""> </span><li data-dcnode-id="5051"><span data-dcnode-id="5055" instrument_node="">                            Published by </span><em data-dcnode-id="5053"><span data-dcnode-id="5054" instrument_node="">Department of Art History, University of Birmingham</span></em><span data-dcnode-id="5052" instrument_node=""> </span></li><span data-dcnode-id="5050" instrument_node=""> </span></ul><span data-dcnode-id="5048" instrument_node=""> </span></aside><span data-dcnode-id="5046" instrument_node=""> </span></article></li><li class="card search-results__record" data-dcnode-id="4969"><span data-dcnode-id="5043" instrument_node=""> </span><article class="row" data-dcnode-id="4970"><span data-dcnode-id="5042" instrument_node=""> </span><div class="col-sm-8 search-results__main" data-dcnode-id="4999"><span data-dcnode-id="5041" instrument_node=""> </span><header data-dcnode-id="5025"><span data-dcnode-id="5040" instrument_node=""> </span><p class="label" data-dcnode-id="5037"><a data-dcnode-id="5038" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//doaj.org/toc/2042-4752" target="_blank"><span data-dcnode-id="5039" instrument_node="">                            Journal of Art Historiography (Jun 2021)                          </span></a></p><span data-dcnode-id="5036" instrument_node=""> </span><h3 class="search-results__heading" data-dcnode-id="5031"><span data-dcnode-id="5035" instrument_node=""> </span><a class="" data-dcnode-id="5033" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//doaj.org/article/3709836696da46c99fcdeb7b88e88b15" target="_blank"><span data-dcnode-id="5034" instrument_node="">                              Four colours and the visual separation of adjacent areas: lessons from mapping and ancient paintings                            </span></a><span data-dcnode-id="5032" instrument_node=""> </span></h3><span data-dcnode-id="5030" instrument_node=""> </span><ul class="inlined-list" data-dcnode-id="5027"><li data-dcnode-id="5028"><span data-dcnode-id="5029" instrument_node="">G. D. Schott </span></li></ul><span data-dcnode-id="5026" instrument_node=""> </span></header><span data-dcnode-id="5024" instrument_node=""> </span><div class="search-results__body" data-dcnode-id="5001"><span data-dcnode-id="5023" instrument_node=""> </span><h4 data-dcnode-id="5021"><span data-dcnode-id="5022" instrument_node="">Article keywords</span></h4><ul class="inlined-list" data-dcnode-id="5012"><li data-dcnode-id="5019"><span data-dcnode-id="5020" instrument_node="">four colours,&nbsp;</span></li><li data-dcnode-id="5017"><span data-dcnode-id="5018" instrument_node="">visual separation,&nbsp;</span></li><li data-dcnode-id="5015"><span data-dcnode-id="5016" instrument_node="">mapping,&nbsp;</span></li><li data-dcnode-id="5013"><span data-dcnode-id="5014" instrument_node="">ancient paintings</span></li></ul><span data-dcnode-id="5011" instrument_node=""> </span><h4 aria-expanded="false" class="doaj-public-search-abstractaction doaj-public-search-abstractaction-results" data-dcnode-id="5006" rel="3709836696da46c99fcdeb7b88e88b15" type="button"><span data-dcnode-id="5010" instrument_node="">                            Abstract</span><svg aria-hidden="true" class="feather feather-plus" data-dcnode-id="5007" fill="none" height="24" stroke="currentColor" stroke-linecap="round" stroke-linejoin="round" stroke-width="2" viewBox="0 0 24 24" width="24" xmlns="http://www.w3.org/2000/svg"><line data-dcnode-id="5009" x1="12" x2="12" y1="5" y2="19"></line><line data-dcnode-id="5008" x1="5" x2="19" y1="12" y2="12"></line></svg></h4><span data-dcnode-id="5005" instrument_node=""> </span><p aria-expanded="false" class="collapse doaj-public-search-abstracttext doaj-public-search-abstracttext-results" data-dcnode-id="5003" rel="3709836696da46c99fcdeb7b88e88b15"><span data-dcnode-id="5004" instrument_node="">                            That four colours were sufficient to differentiate adjacent countries on a map was a 19th century conjecture which has taken 150 years to prove mathematically.  In a different sphere, and two and a half millennia earlier in Ancient Greece, many painters including Apelles favoured the use of four colours.  A story recounted by Pliny in which three or four colours were used to differentiate thin lines, however, serves to link these seemingly disparate observations of the mathematical and the artistic.  Furthermore, the use of such few colours to achieve differentiation of adjacent areas can thus be seen to date back to classical times, if not beyond.                          </span></p><span data-dcnode-id="5002" instrument_node=""> </span></div><span data-dcnode-id="5000" instrument_node=""> </span></div><span data-dcnode-id="4998" instrument_node=""> </span><aside class="col-sm-4 search-results__aside" data-dcnode-id="4972"><span data-dcnode-id="4997" instrument_node=""> </span><ul data-dcnode-id="4974"><span data-dcnode-id="4996" instrument_node=""> </span><li data-dcnode-id="4988"><span data-dcnode-id="4995" instrument_node=""> </span><a data-dcnode-id="4989" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//arthistoriography.files.wordpress.com/2021/05/schott.pdf" rel="noopener" target="_blank"><span data-dcnode-id="4994" instrument_node=""> Read online </span><svg aria-hidden="true" class="feather feather-external-link" data-dcnode-id="4990" fill="none" height="24" stroke="currentColor" stroke-linecap="round" stroke-linejoin="round" stroke-width="2" viewBox="0 0 24 24" width="24" xmlns="http://www.w3.org/2000/svg"><path d="M18 13v6a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V8a2 2 0 0 1 2-2h6" data-dcnode-id="4993"></path><polyline data-dcnode-id="4992" points="15 3 21 3 21 9"></polyline><line data-dcnode-id="4991" x1="10" x2="21" y1="14" y2="3"></line></svg></a></li><span data-dcnode-id="4987" instrument_node=""> </span><li data-dcnode-id="4982"><span data-dcnode-id="4986" instrument_node=""> </span><a data-dcnode-id="4984" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//doaj.org/toc/2042-4752" rel="noopener" target="_blank"><span data-dcnode-id="4985" instrument_node="">About the journal</span></a><span 4955" instrument_node=""> </span><ul class="inlined-list" data-dcnode-id="4952"><li data-dcnode-id="4953"><span data-dcnode-id="4954" instrument_node="">Raphael Rosenberg</span></li></ul><span data-dcnode-id="4951" instrument_node=""> </span></header><span data-dcnode-id="4949" instrument_node=""> </span><div class="search-results__body" data-dcnode-id="4920"><span data-dcnode-id="4948" instrument_node=""> </span><h4 data-dcnode-id="4946"><span data-dcnode-id="4947" instrument_node="">Article keywords</span></h4><ul class="inlined-list" data-dcnode-id="4931"><li data-dcnode-id="4944"><span data-dcnode-id="4945" instrument_node="">julius von schlosser,&nbsp;</span></li><li data-dcnode-id="4942"><span data-dcnode-id="4943" instrument_node="">albert dresdner,&nbsp;</span></li><li data-dcnode-id="4940"><span data-dcnode-id="4941" instrument_node="">art literature,&nbsp;</span></li><li data-dcnode-id="4938"><span data-dcnode-id="4939" instrument_node="">art discourse,&nbsp;</span></li><li data-dcnode-id="4936"><span data-dcnode-id="4937" instrument_node="">art criticism,&nbsp;</span></li><li data-dcnode-id="4934"><span data-dcnode-id="4935" instrument_node="">literary genres,&nbsp;</span></li><li data-dcnode-id="4932"><span data-dcnode-id="4933" instrument_node="">treatises on the arts</span></li></ul><span data-dcnode-id="4930" instrument_node=""> </span><h4 aria-expanded="false" class="doaj-public-search-abstractaction doaj-public-search-abstractaction-results" data-dcnode-id="4925" rel="69e3567b2f6e4e14963ae07bf2600600" type="button"><span data-dcnode-id="4929" instrument_node="">                            Abstract</span><svg aria-hidden="true" class="feather feather-plus" data-dcnode-id="4926" fill="none" height="24" stroke="currentColor" stroke-linecap="round" stroke-linejoin="round" stroke-width="2" viewBox="0 0 24 24" width="24" xmlns="http://www.w3.org/2000/svg"><line data-dcnode-id="4928" x1="12" x2="12" y1="5" y2="19"></line><line data-dcnode-id="4927" x1="5" x2="19" y1="12" y2="12"></line></svg></h4><span data-dcnode-id="4924" instrument_node=""> </span><p aria-expanded="false" class="collapse doaj-public-search-abstracttext doaj-public-search-abstracttext-results" data-dcnode-id="4922" rel="69e3567b2f6e4e14963ae07bf2600600"><span data-dcnode-id="4923" instrument_node="">                            Julius von Schlosser’s Die Kunstliteratur (1924) is a monumental handbook that has been used by generations of art historians. The present paper provides the first systematic analysis of its genesis alongside Schlosser’s biography from 1891 on – his objectives, his path and his doubts. Schlosser redefined the study of written sources in art history by shifting the focus to literary texts. He distanced himself from the study of archival documents (which tended to serve the histories of individual artworks) and instead sought to gain broader knowledge of the ‘spirit’ of each epoch. Around 1922 he envisioned a more modern ‘theory and history of art historiography’, although nothing ever came of it. The second part of the paper shows that, even before 1924, there were attempts to write histories of art literature with sources organised by literary genres and not, as with Schlosser, according to epochs. It argues that the following categories had a major impact on the artistic discourse in early modern Europe: treatises on the arts, artist biographies, histories of artistic monuments, monographs on single artworks, poetry about artworks, topographical works, collection and exhibition catalogues, and art criticism.                          </span></p><span data-dcnode-id="4921" instrument_node=""> </span></div><span data-dcnode-id="4919" instrument_node=""> </span></div><span data-dcnode-id="4917" instrument_node=""> </span><aside class="col-sm-4 search-results__aside" data-dcnode-id="4891"><span data-dcnode-id="4916" instrument_node=""> </span><ul data-dcnode-id="4893"><span data-dcnode-id="4915" instrument_node=""> </span><li dat gency in art. Works of art are said to have agency, primarily through their impact on the affectivity of the spectator. This turn is an inflection of a wider phenomenon in the humanities, motivated by interest in the theory of affect. Although it has only recently gained visibility, one can trace an art historical interest in affect back to Aby Warburg, whose work emphasised the non-rational, emotional engagement with works of art. This article explores some of the claims that have been made in relation to affect and agency in art, but it also subjects them to critical scrutiny. What does it mean to talk about art having agency? What is its purported significance for art historical inquiry? To what extent does affect theory provide a convincing theoretical basis for the idea of artistic agency? Indeed, what is understood by the idea of agency in such accounts? The article argues that while there are many attested historical cases in which works of art are said to act as if they were agents, these have to be understood in terms of culturally framed attributions of agency, rather than a general theory of affect, which may have a purely tangential significance for art historical analysis.                          </span></p><span data-dcnode-id="4832" instrument_node=""> </span></div><span data-dcnode-id="4830" instrument_node=""> </span></div><span data-dcnode-id="4828" instrument_node=""> </span><aside class="col-sm-4 search-results__aside" data-dcnode-id="4802"><span data-dcnode-id="4827" instrument_node=""> </span><ul data-dcnode-id="4804"><span data-dcnode-id="4826" instrument_node=""> </span><li data-dcnode-id="4818"><span data-dcnode-id="4825" instrument_node=""> </span><a data-dcnode-id="4819" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//arthistoriography.files.wordpress.com/2021/05/rampley.pdf" rel="noopener" target="_blank"><span data-dcnode-id="4824" instrument_node=""> Read online </span><svg aria-hidden="true" class="feather n></li><li data-dcnode-id="4762"><span data-dcnode-id="4763" instrument_node="">connoisseurship</span></li></ul><span data-dcnode-id="4760" instrument_node=""> </span><h4 aria-expanded="false" class="doaj-public-search-abstractaction doaj-public-search-abstractaction-results" data-dcnode-id="4755" rel="d967365c388645e5b4e28b554ff8fd25" type="button"><span data-dcnode-id="4759" instrument_node="">                            Abstract</span><svg aria-hidden="true" class="feather feather-plus" data-dcnode-id="4756" fill="none" height="24" stroke="currentColor" stroke-linecap="round" stroke-linejoin="round" stroke-width="2" viewBox="0 0 24 24" width="24" xmlns="http://www.w3.org/2000/svg"><line data-dcnode-id="4758" x1="12" x2="12" y1="5" y2="19"></line><line data-dcnode-id="4757" x1="5" x2="19" y1="12" y2="12"></line></svg></h4><span data-dcnode-id="4754" instrument_node=""> </span><p aria-expanded="false" class="collapse doaj-public-search-abstracttext doaj-public-search-abstracttext-results" data-dcnode-id="4752" rel="d967365c388645e5b4e28b554ff8fd25"><span data-dcnode-id="4753" instrument_node="">                            The taxonomic arrangement Adam von Bartsch (1757-1821) devised for the print cabinet at the Imperial Court Library in Vienna fostered the historical analysis of prints by compelling visitors to associate the location of each print impression with the circumstance of its creation. His organizational system facilitated research by placing prints in a rational order. Similar to Linnaean classification, the rigid structure of Bartsch’s system described the relationships between prints, specifically their attributions and their creators’ places in a national tradition. By engaging with Bartsch’s taxonomy, the scholars and collectors who visited the Imperial Library absorbed his ideas about authorship, historical development, and national identity.                          </span></p><span data-dcnode-id="4751" instrument_node=""> </span></div><span data-dcnode-id="4749" instrument_node=""> </span></div><span data-dcnode-id="4747" instrument_node=""> </span><aside class="col-sm-4 search-results__aside" data-dcnode-id="4721"><span data-dcnode-id="4746" instrument_node=""> </span><ul data-dcnode-id="4723"><span data-dcnode-id="4745" instrument_node=""> </span><li data-dcnode-id="4737"><span data-dcnode-id="4744" instrument_node=""> </span><a data-dcnode-id="4738" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//arthistoriography.files.wordpress.com/2021/05/feiman.pdf" rel="noopener" target="_blank"><span data-dcnode-id="4743" instrument_node=""> Read online </span><svg aria-hidden="true" class="feather feather-external-link" data-dcnode-id="4739" fill="none" height="24" stroke="currentColor" stroke-linecap="round" stroke-linejoin="round" stroke-width="2" viewBox="0 0 24 24" width="24" xmlns="http://www.w3.org/2000/svg"><path d="M18 13v6a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V8a2 2 0 0 1 2-2h6" data-dcnode-id="4742"></path><polyline data-dcnode-id="4741" points="15 3 21 3 21 9"></polyline><line data-dcnode-id="4740" x1="10" x2="21" y1="14" y2="3"></line></svg></a></li><span data-dcnode-id="4736" instrument_node=""> </span><li data-dcnode-id="4731"><span data-dcnode-id="4735" instrument_node=""> </span><a data-dcnode-id="4733" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//doaj.org/toc/2042-4752" rel="noopener" target="_blank"><span data-dcnode-id="4734" instrument_node="">About the journal</span></a><span data-dcnode-id="4732" instrument_node=""> </span></li><span data-dcnode-id="4730" instrument_node=""> </span><li data-dcnode-id="4725"><span data-dcnode-id="4729" instrument_node="">                            Published by </span><em data-dcnode-id="4727"><span data-dcnode-id="4728" instrument_node="">Department of Art History, University of Birmingham</span></em><span data-dcnode-id="4726" instrument_node=""> </span></li><span data-dcnode-id="4724" instrument_node=""> </span></ul><span data-dcnode-id="4722" instrument_node=""> </span></aside><span data-dcnode-id="4720" instrument_node=""> </span></article></li><li class="card search-results__record" data-dcnode-id="4639"><span data-dcnode-id="4717" instrument_node=""> </span><article class="row" data-dcnode-id="4640"><span data-dcnode-id="4716" instrument_node=""> </span><div class="col-sm-8 search-results__main" data-dcnode-id="4669"><span data-dcnode-id="4715" instrument_node=""> </span><header data-dcnode-id="4699"><span data-dcnode-id="4714" instrument_node=""> </span><p class="label" data-dcnode-id="4711"><a data-dcnode-id="4712" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//doaj.org/toc/2042-4752" target="_blank"><span data-dcnode-id="4713" instrument_node="">                            Journal of Art Historiography (Jun 2021)                          </span></a></p><span data-dcnode-id="4710" instrument_node=""> </span><h3 class="search-results__heading" data-dcnode-id="4705"><span data-dcnode-id="4709" instrument_node=""> </span><a class="" data-dcnode-id="4707" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//doaj.org/article/7acbfb0110384c1fb18be51e28a43ea2" target="_blank"><span data-dcnode-id="4708" instrument_node="">                              “Il più bello gabinetto delle stampe che esiste”: a (failed) project for the Ortalli collection of prints at the Biblioteca Palatina in Parma                            </span></a><span data-dcnode-id="4706" instrument_node=""> </span></h3><span data-dcnode-id="4704" instrument_node=""> </span><ul class="inlined-list" data-dcnode-id="4701"><li data-dcnode-id="4702"><span data-dcnode-id="4703" instrument_node="">Silvia Massa</span></li></ul><span data-dcnode-id="4700" instrument_node=""> </span></header><span data-dcnode-id="4698" instrument_node=""> </span><div class="search-results__body" data-dcnode-id="4671"><span data-dcnode-id="4697" instrument_node=""> </span><h4 data-dcnode-id="4695"><span data-dcnode-id="4696" instrument_node="">Article keywords</span></h4><ul class="inlined-list" data-dcnode-id="4682"><li data-dcnode-id="4693"><span data-dcnode-id="4694" instrument_node="">print collections,&nbsp;</span></li><li data-dcnode-id="4691"><span data-dcnode-id="4692" instrument_node="">print rooms,&nbsp;</span></li><li data-dcnode-id="4689"><span data-dcnode-id="4690" instrument_node="">public libraries and museums,&nbsp;</span></li><li data-dcnode-id="4687"><span data-dcnode-id="4688" instrument_node="">paul j. kristeller,&nbsp;</span></li><li data-dcnode-id="4685"><span data-dcnode-id="4686" instrument_node="">biblioteca palatina,&nbsp;</span></li><li data-dcnode-id="4683"><span data-dcnode-id="4684" instrument_node="">parma</span></li></ul><span data-dcnode-id="4681" instrument_node=""> </span><h4 aria-expanded="false" class="doaj-public-search-abstractaction doaj-public-search-abstractaction-results" data-dcnode-id="4676" rel="7acbfb0110384c1fb18be51e28a43ea2" type="button"><span data-dcnode-id="4680" instrument_node="">                            Abstract</span><svg aria-hidden="true" class="feather feather-plus" data-dcnode-id="4677" fill="none" height="24" stroke="currentColor" stroke-linecap="round" stroke-linejoin="round" stroke-width="2" viewBox="0 0 24 24" width="24" xmlns="http://www.w3.org/2000/svg"><line data-dcnode-id="4679" x1="12" x2="12" y1="5" y2="19"></line><line data-dcnode-id="4678" x1="5" x2="19" y1="12" y2="12"></line></svg></h4><span data-dcnode-id="4675" instrument_node=""> </span><p aria-expanded="false" class="collapse doaj-public-search-abstracttext doaj-public-search-abstracttext-results" data-dcnode-id="4673" rel="7acbfb0110384c1fb18be51e28a43ea2"><span data-dcnode-id="4674" instrument_node="">                            After having been valued mainly as conveyors of visual information, prints in nineteenth-century western Europe came to be recognised as works of art. In some cases this led to a reconsideration of the location of print collections in public institutions, but moving them was not always easy. This article reconstructs Paul J. Kristeller’s (failed) project to hand over Ortalli albums of prints from the Biblioteca Palatina to the royal art museum in Parma (1893–1898) by tracing arguments used to support or oppose the relocation. By studying local events in the context of a national plan designed to reorganise print collections following foreign examples, the article shows the extent to which the status of prints and print collections grounded the Palatina director’s opposition to the project, and how this contributed to the preservation of the collection’s historical memory and the shaping of current frameworks of public print collections in Italy.                          </span></p><span data-dcnode-id="4672" instrument_node=""> </span></div><span data-dcnode-id="4670" instrument_node=""> </span></div><span data-dcnode-id="4668" instrument_node=""> </span><aside class="col-sm-4 search-results__aside" data-dcnode-id="4642"><span data-dcnode-id="4667" instrument_node=""> </span><ul data-dcnode-id="4644"><span data-dcnode-id="4666" instrument_node=""> </span><li data-dcnode-id="4658"><span data-dcnode-id="4665" instrument_node=""> </span><a data-dcnode-id="4659" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//arthistoriography.files.wordpress.com/2021/05/massa.pdf" rel="noopener" target="_blank"><span data-dcnode-id="4664" instrument_node=""> Read online </span><svg aria-hidden="true" class="feather feather-external-link" data-dcnode-id="4660" fill="none" height="24" stroke="currentColor" stroke-linecap="round" stroke-linejoin="round" stroke-width="2" viewBox="0 0 24 24" width="24" xmlns="http://www.w3.org/2000/svg"><path d="M18 13v6a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V8a2 2 0 0 1 2-2h6" data-dcnode-id="4663"></path><polyline data-dcnode-id="4662" points="15 3 21 3 21 9"></polyline><line data-dcnode-id="4661" x1="10" x2="2 s://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//doaj.org/article/7796f9cb8bf748fdb8a5206b8ed9b93e" target="_blank"><span data-dcnode-id="4629" instrument_node="">                              Rodolfo Lanciani’s revenge                            </span></a><span data-dcnode-id="4627" instrument_node=""> </span></h3><span data-dcnode-id="4625" instrument_node=""> </span><ul class="inlined-list" data-dcnode-id="4622"><li data-dcnode-id="4623"><span data-dcnode-id="4624" instrument_node="">Susan M. Dixon</span></li></ul><span data-dcnode-id="4621" instrument_node=""> </span></header><span data-dcnode-id="4619" instrument_node=""> </span><div class="search-results__body" data-dcnode-id="4594"><span data-dcnode-id="4618" instrument_node=""> </span><h4 data-dcnode-id="4616"><span data-dcnode-id="4617" instrument_node="">Article keywords</span></h4><ul class="inlined-list" data-dcnode-id="4605"><li data-dcnode-id="4614"><span data-dcnode-id="4615" instrument_node="">rodolfo lanciani,&nbsp;</span></li><li data-dcnode-id="4612"><span data-dcnode-id="4613" instrument_node="">19th-century italian archaeology,&nbsp;</span></li><li data-dcnode-id="4610"><span data-dcnode-id="4611" instrument_node="">biblioteca apostolica vaticana (history),&nbsp;</span></li><li data-dcnode-id="4608"><span data-dcnode-id="4609" instrument_node="">accademia dei lincei (history),&nbsp;</span></li><li data-dcnode-id="4606"><span data-dcnode-id="4607" instrument_node="">forma urbis romae</span></li></ul><span data-dcnode-id="4604" instrument_node=""> </span><h4 aria-expanded="false" class="doaj-public-search-abstractaction doaj-public-search-abstractaction-results" data-dcnode-id="4599" rel="7796f9cb8bf748fdb8a5206b8ed9b93e" type="button"><span data-dcnode-id="4603" instrument_node="">                            Abstract</span><svg aria-hidden="true" class="feather feather-plus" data-dcnode-id="4600" fill="none" height="24" stroke="currentColor" stroke-linecap="round" stroke-linejoin="round" stroke-width="2" viewBox="0 0 24 24" width="24" xmlns="http://www.w3.org/2000/svg"><line data-dcnode-id="4602" x1="12" x2="12" y1="5" y2="19"></line><line data-dcnode-id="4601" x1="5" x2="19" y1="12" y2="12"></line></svg></h4><span data-dcnode-id="4598" instrument_node=""> </span><p aria-expanded="false" class="collapse doaj-public-search-abstracttext doaj-public-search-abstracttext-results" data-dcnode-id="4596" rel="7796f9cb8bf748fdb8a5206b8ed9b93e"><span data-dcnode-id="4597" instrument_node="">                            Among the Biblioteca Apostolica Vaticana’s manuscripts are the notes that Rodolfo Lanciani (1845–1929) created while serving in the state archaeological service in Rome from 1871 to 1889. Given that during this time, many discoveries about ancient Roman monuments and topography were made and then destroyed, his on-site notes and sketches contain irreplaceable information. Because Lanciani felt his state employer had disrespected him, the archaeologist retained the notes in his personal possession for nearly all his life, refusing to cede them to the state archives. Instead, just before his death, he donated them to the Vatican library. This article explores the personal and historical circumstances that led Lanciani to this decision, one which has allowed scholars of ancient Rome’s built environment easy access to this invaluable material.                          </span></p><span data-dcnode-id="4595" instrument_node=""> </span></div><span data-dcnode-id="4593" instrument_node=""> </span></div><span data-dcnode-id="4591" instrument_node=""> </span><aside class="col-sm-4 search-results__aside" data-dcnode-id="4565"><span data-dcnode-id="4590" instrument_node=""> </span><ul data-dcnode-id="4567"><span data-dcnode-id="4589" instrument_node=""> </span><li data-dcnode-id="4581"><span data-dcnode-id="4588" instrument_node=""> </span><a data-dcnode-id="4582" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//arthistoriography.files.wordpress.com/2021/05/dixon.pdf" rel="noopener" target="_blank"><span data-dcnode-id="4587" instrument_node=""> Read online </span><svg aria-hidden="true" class="feather feather-external-link" data-dcnode-id="4583" fill="none" height="24" stroke="currentColor" stroke-linecap="round" stroke-linejoin="round" stroke-width="2" viewBox="0 0 24 24" width="24" xmlns="http://www.w3.org/2000/svg"><path d="M18 13v6a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V8a2 2 0 0 1 2-2h6" data-dcnode-id="4586"></path><polyline data-dcnode-id="4585" points="15 3 21 3 21 9"></polyline><line data-dcnode-id="4584" x1="10" x2="21" y1="14" y2="3"></line></svg></a></li><span data-dcnode-id="4580" instrument_node=""> </span><li data-dcnode-id="4575"><span data-dcnode-id="4579" instrument_node=""> </span><a data-dcnode-id="4577" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//doaj.org/toc/2042-4752" rel="noopener" target="_blank"><span data-dcnode-id="4578" instrument_node="">About the journal</span></a><span data-dcnode-id="4576" instrument_node=""> </span></li><span data-dcnode-id="4574" instrument_node=""> </span><li data-dcnode-id="4569"><span data-dcnode-id="4573" instrument_node="">                            Published by </span><em data-dcnode-id="4571"><span data-dcnode-id="4572" instrument_node="">Department of Art History, University of Birmingham</span></em><span data-dcnode-id="4570" instrument_node=""> </span></li><span data-dcnode-id="4568" instrument_node=""> </span></ul><span data-dcnode-id="4566" instrument_node=""> </span></aside><span data-dcnode-id="4564" instrument_node=""> </span></article></li><li class="card search-results__record" data-dcnode-id="4481"><span data-dcnode-id="4561" instrument_node=""> </span><article class="row" data-dcnode-id="4482"><span data-dcnode-id="4560" instrument_node=""> </span><div class="col-sm-8 search-results__main" data-dcnode-id="4511"><span data-dcnode-id="4559" instrument_node=""> </span><header data-dcnode-id="4541"><span data-dcnode-id="4558" instrument_node=""> </span><p class="label" data-dcnode-id="4555"><a data-dcnode-id="4556" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//doaj.org/toc/2042-4752" target="_blank"><span data-dcnode-id="4557" instrument_node="">                            Journal of Art Historiography (Jun 2021)                          </span></a></p><span data-dcnode-id="4554" instrument_node=""> </span><h3 class="search-results__heading" data-dcnode-id="4549"><span data-dcnode-id="4553" instrument_node=""> </span><a class="" data-dcnode-id="4551" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//doaj.org/article/acd3be36f1b4410db76d4992e12d1f71" target="_blank"><span data-dcnode-id="4552" instrument_node="">                              ‘Art history scholarship between the 1820s and 1870s: contextualising the Eastlake library at the National Gallery, London                            </span></a><span data-dcnode-id="4550" instrument_node=""> </span></h3><span data-dcnode-id="4548" instrument_node=""> </span><ul class="inlined-list" data-dcnode-id="4543"><li data-dcnode-id="4546"><span data-dcnode-id="4547" instrument_node="">Katie Lissamore,&nbsp;</span></li><li data-dcnode-id="4544"><span data-dcnode-id="4545" instrument_node="">Jonathan Franklin</span></li></ul><span data-dcnode-id="4542" instrument_node=""> </span></header><span data-dcnode-id="4540" instrument_node=""> </span><div class="search-results__body" data-dcnode-id="4513"><span data-dcnode-id="4539" instrument_node=""> </span><h4 data-dcnode-id="4537"><span data-dcnode-id="4538" instrument_node="">Article keywords</span></h4><ul class="inlined-list" data-dcnode-id="4524"><li data-dcnode-id="4535"><span data-dcnode-id="4536" instrument_node="">eastlake,&nbsp;</span></li><li data-dcnode-id="4533"><span data-dcnode-id="4534" instrument_node="">cicognara,&nbsp;</span></li><li data-dcnode-id="4531"><span data-dcnode-id="4532" instrument_node="">libraries,&nbsp;</span></li><li data-dcnode-id="4529"><span data-dcnode-id="4530" instrument_node="">bibliography,&nbsp;</span></li><li data-dcnode-id="4527"><span data-dcnode-id="4528" instrument_node="">catalogues,&nbsp;</span></li><li data-dcnode-id="4525"><span data-dcnode-id="4526" instrument_node="">national gallery</span></li></ul><span data-dcnode-id="4523" instrument_node=""> </span><h4 aria-expanded="false" class="doaj-public-search-abstractaction doaj-public-search-abstractaction-results" data-dcnode-id="4518" rel="acd3be36f1b4410db76d4992e12d1f71" type="button"><span data-dcnode-id="4522" instrument_node="">                            Abstract</span><svg aria-hidden="true" class="feather feather-plus" data-dcnode-id="4519" fill="none" height="24" stroke="currentColor" stroke-linecap="round" stroke-linejoin="round" stroke-width="2" viewBox="0 0 24 24" width="24" xmlns="http://www.w3.org/2000/svg"><line data-dcnode-id="4521" x1="12" x2="12" y1="5" y2="19"></line><line data-dcnode-id="4520" x1="5" x2="19" y1="12" y2="12"></line></svg></h4><span data-dcnode-id="4517" instrument_node=""> </span><p aria-expanded="false" class="collapse doaj-public-search-abstracttext doaj-public-search-abstracttext-results" data-dcnode-id="4515" rel="acd3be36f1b4410db76d4992e12d1f71"><span data-dcnode-id="4516" instrument_node="">                            Sir Charles Lock Eastlake (1793-1865), the first Director of the National Gallery in London, was a figure of crucial significance in the shaping of art historical understanding in Britain between the 1820s and 1860s. His library, consisting of approximately 2,000 volumes, reflects his interests in the fields of attribution, provenance and the history of artistic techniques. This paper contextualises the Eastlake library by comparing its contents to the Catalogo ragionato dei libri d’arte e d’antichità posseduti dal conte Cicognara (1821), a watershed art bibliography. Eastlake’s library demonstrates his pragmatic and diligent approach to his work and echoes how Leopoldo Cicognara (1767-1834) constructed his collection.  The comparative approach sheds light on how these collections intersected on a scholarly level and underlines points of divergence as they developed according to their owner’s aims. It is also hoped that this comparative approach will be applied to other collections, as mentioned within the article.                          </span></p><span data-dcnode-id="4514" instrument_node=""> </span></div><span data-dcnode-id="4512" instrument_node=""> </span></div><span data-dcnode-id="4510" instrument_node=""> </span><aside class="col-sm-4 search-results__aside" data-dcnode-id="4484"><span data-dcnode-id="4509" instrument_node=""> </span><ul data-dcnode-id="4486"><span data-dcnode-id="4508" instrument_node=""> </span><li data-dcnode-id="4500"><span data-dcnode-id="4507" instrument_node=""> </span><a data-dcnode-id="4501" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//arthistoriography.files.wordpress.com/2021/05/franklin__lissamore.pdf" rel="noopener" target="_blank"><span data-dcnode-id="4506" instrument_node=""> Read online </span><svg aria-hidden="true" class="feather feather-external-link" data-dcnode-id="4502" fill="none" height="24" stroke="currentColor" stroke-linecap="round" stroke-linejoin="round" stroke-width="2" viewBox="0 0 24 24" width="24" xmlns="http://www.w3.org/2000/svg"><path d="M18 13v6a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V8a2 2 0 0 1 2-2h6" data-dcnode-id="4505"></path><polyline data-dcnode-id="4504" points="15 3 21 3 21 9"></polyline><line data-dcnode-id="4503" x1="10" x2="21" y1="14" y2="3"></line></svg></a></li><span data-dcnode-id="4499" instrument_node=""> </span><li data-dcnode-id="4494"><span data-dcnode-id="4498" instrument_node=""> </span><a data-dcnode-id="4496" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//doaj.org/toc/2042-4752" rel="noopener" target="_blank"><span data-dcnode-id="4497    </span></a><span data-dcnode-id="4469" instrument_node=""> </span></h3><span data-dcnode-id="4467" instrument_node=""> </span><ul class="inlined-list" data-dcnode-id="4464"><li data-dcnode-id="4465"><span data-dcnode-id="4466" instrument_node="">Claire Dupin de Beyssat</span></li></ul><span data-dcnode-id="4463" instrument_node=""> </span></header><span data-dcnode-id="4461" instrument_node=""> </span><div class="search-results__body" data-dcnode-id="4428"><span data-dcnode-id="4460" instrument_node=""> </span><h4 data-dcnode-id="4458"><span data-dcnode-id="4459" instrument_node="">Article keywords</span></h4><ul class="inlined-list" data-dcnode-id="4439"><li data-dcnode-id="4456"><span data-dcnode-id="4457" instrument_node="">art historiography,&nbsp;</span></li><li data-dcnode-id="4454"><span data-dcnode-id="4455" instrument_node="">library history,&nbsp;</span></li><li data-dcnode-id="4452"><span data-dcnode-id="4453" instrument_node="">jacques doucet,&nbsp;</span></li><li data-dcnode-id="4450"><span data-dcnode-id="4451" instrument_node="">networks,&nbsp;</span></li><li data-dcnode-id="4448"><span data-dcnode-id="4449" instrument_node="">readership,&nbsp;</span></li><li data-dcnode-id="4446"><span data-dcnode-id="4447" instrument_node="">prosopography,&nbsp;</span></li><li data-dcnode-id="4444"><span data-dcnode-id="4445" instrument_node="">paris,&nbsp;</span></li><li data-dcnode-id="4442"><span data-dcnode-id="4443" instrument_node="">social history,&nbsp;</span></li><li data-dcnode-id="4440"><span data-dcnode-id="4441" instrument_node="">institutions</span></li></ul><span data-dcnode-id="4438" instrument_node=""> </span><h4 aria-expanded="false" class="doaj-public-search-abstractaction doaj-public-search-abstractaction-results" data-dcnode-id="4433" rel="9fd9088c409344169b85d6c77837c39e" type="button"><span data-dcnode-id="4437" instrument_node="">                            Abstract</span><svg aria-hidden="true" class="feather feather-plus" data-dcnode-id="4434" fill="none" height="24" stroke="currentColor" stroke-linecap="round" stroke-linejoin="round" stroke-width="2" viewBox="0 0 24 24" width="24" xmlns="http://www.w3.org/2000/svg"><line data-dcnode-id="4436" x1="12" x2="12" y1="5" y2="19"></line><line data-dcnode-id="4435" x1="5" x2="19" y1="12" y2="12"></line></svg></h4><span data-dcnode-id="4432" instrument_node=""> </span><p aria-expanded="false" class="collapse doaj-public-search-abstracttext doaj-public-search-abstracttext-results" data-dcnode-id="4430" rel="9fd9088c409344169b85d6c77837c39e"><span data-dcnode-id="4431" instrument_node="">                            In 1909, the grand couturier Jacques Doucet opened a library dedicated to art history and archaeology. Soon this library, although the result of a private initiative, gained a reputation for scholarly depth and utility, reflected in its reader’s register. The nearly 1,500 individual registration cards that survive from its early years provide documentation of the public that patronized the first art history library in France. Geolocation of the individual readers provides information on their socio-cultural backgrounds, while network analysis reveals personal and institutional relationships between the library and other institutions such as museums, libraries and universities. A more precise focus on selected readers helps to establish a prosopography that establishes their proximity or heterogeneity. This paper aims to demonstrate the unique role of this institution in the scientific and institutional landscape, both national and international, at a time when art history was emerging as a scientific field.                          </span></p><span data-dcnode-id="4429" instrument_node=""> </span></div><span data-dcnode-id="4427" instrument_node=""> </span></div><span data-dcnode-id="4425" instrument_node=""> </span><aside class="col-sm-4 search-results__aside" data-dcnode-id="4399"><span data-dcnode-id="4424" instrument_node=""> </span><ul data-d ad a profound impact on the history of science, leading disciplines such as physics, astronomy, and biology to a major experimental and visual revolution. The introduction of such instruments in the field of connoisseurship has, strangely enough, attracted less scholarly attention. Yet, as Watteau’s famous Enseigne de Gersaint (1720) testifies, the practice of looking through a lens to scrutinise artworks was already well-established at the beginning of the eighteenth century and considered an important tool of expertise. The present article focuses on the beginning of this tradition, aiming to examine the changes it generated in the reception of artworks as well as to explore its repercussions on early modern art theory. In this context, the role played by vision aids in the art expert’s discourse will be a part                          </span></p><span data-dcnode-id="4277" instrument_node=""> </span></div><span data-dcnode-id="4275" instrument_node=""> </span></div><span data-dcnode-id="4273" instrument_node=""> </span><aside class="col-sm-4 search-results__aside" data-dcnode-id="4247"><span data-dcnode-id="4272" instrument_node=""> </span><ul data-dcnode-id="4249"><span data-dcnode-id="4271" instrument_node=""> </span><li data-dcnode-id="4263"><span data-dcnode-id="4270" instrument_node=""> </span><a data-dcnode-id="4264" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//arthistoriography.files.wordpress.com/2021/05/kobi.pdf" rel="noopener" target="_blank"><span data-dcnode-id="4269" instrument_node=""> Read online </span><svg aria-hidden="true" class="feather feather-external-link" data-dcnode-id="4265" fill="none" height="24" stroke="currentColor" stroke-linecap="round" stroke-linejoin="round" stroke-width="2" viewBox="0 0 24 24" width="24" xmlns="http://www.w3.org/2000/svg"><path d="M18 13v6a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V8a2 2 0 0 1 2-2h6" data-dcnode-id="4268"></path><polyline data-dcnode-id="4267" points="15 3 21 3 21 9"></polyline  class="" data-dcnode-id="4233" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//doaj.org/article/f6263e89d8144ffa94d283c8fe21b71e" target="_blank"><span data-dcnode-id="4234" instrument_node="">                              Digital images and art historical knowledge: Connoisseurship today between “top-down design” and “bottom-up’ capabilities                            </span></a><span data-dcnode-id="4232" instrument_node=""> </span></h3><span data-dcnode-id="4230" instrument_node=""> </span><ul class="inlined-list" data-dcnode-id="4225"><li data-dcnode-id="4228"><span data-dcnode-id="4229" instrument_node="">Thomas Ketelsen,&nbsp;</span></li><li data-dcnode-id="4226"><span data-dcnode-id="4227" instrument_node="">Uwe Golle</span></li></ul><span data-dcnode-id="4224" instrument_node=""> </span></header><span data-dcnode-id="4222" instrument_node=""> </span><div class="search-results__body" data-dcnode-id="4199"><span data-dcnode-id="4221" instrument_node=""> </span><h4 data-dcnode-id="4219"><span data-dcnode-id="4220" instrument_node="">Article keywords</span></h4><ul class="inlined-list" data-dcnode-id="4210"><li data-dcnode-id="4217"><span data-dcnode-id="4218" instrument_node="">attributions,&nbsp;</span></li><li data-dcnode-id="4215"><span data-dcnode-id="4216" instrument_node="">digitisation,&nbsp;</span></li><li data-dcnode-id="4213"><span data-dcnode-id="4214" instrument_node="">materiality,&nbsp;</span></li><li data-dcnode-id="4211"><span data-dcnode-id="4212" instrument_node="">technical aids</span></li></ul><span data-dcnode-id="4209" instrument_node=""> </span><h4 aria-expanded="false" class="doaj-public-search-abstractaction doaj-public-search-abstractaction-results" data-dcnode-id="4204" rel="f6263e89d8144ffa94d283c8fe21b71e" type="button"><span data-dcnode-id="4208" instrument_node="">                            Abstract</span><svg aria-hidden="true" class="feather feather-plus" data-dcnode-id="4205" fill="none" height="24" stroke="currentColor" stroke-linecap="round" stroke-linejoin="round" stroke-width="2" viewBox="0 0 24 24" width="24" xmlns="http://www.w3.org/2000/svg"><line data-dcnode-id="4207" x1="12" x2="12" y1="5" y2="19"></line><line data-dcnode-id="4206" x1="5" x2="19" y1="12" y2="12"></line></svg></h4><span data-dcnode-id="4203" instrument_node=""> </span><p aria-expanded="false" class="collapse doaj-public-search-abstracttext doaj-public-search-abstracttext-results" data-dcnode-id="4201" rel="f6263e89d8144ffa94d283c8fe21b71e"><span data-dcnode-id="4202" instrument_node="">                            It is yet unknown if, in the foreseeable future, thanks to rapid increases in artificial intelligence capabilities, databases will take over standard tasks of art historians, such as the stylistic classification of drawings into centuries and schools and the attribution of works to specific artists. However, the digital availability of an almost unimaginably huge volume of pictorial material has already led to major changes in art historical work with Old Master drawings. In an initial step, this paper proposes using the terms ‘top-down design’ and ‘bottom-up processes’, borrowed from the book The Evolution of Minds by American philosopher Daniel C. Dennett, to describe the re-positioning of the concept of connoisseurship in light of the digitisation of nearly all collections of drawings in the world. A second step highlights the particular insights that a digital approach to the object can generate in terms of the materiality of the drawing, which will make it necessary to modify the traditional concept of connoisseurship and art historical expertise.                          </span></p><span data-dcnode-id="4200" instrument_node=""> </span></div><span data-dcnode-id="4198" instrument_node=""> </span></div><span data-dcnode-id="4196" instrument_node=""> </span><aside class="col-sm-4 search-results__aside" data-dcnode-id="4170"><span data-dcnode-id="4195" instrument_node=""> focusing on reoccurring and recontextualised expressions, phrases, and notions used by Heinrich Wölfflin, Bernard Berenson, Max Friedländer, and Bernhard Degenhart, I will argue how drawings were either used to describe painting as a stepping stone for an epochal style or as a quasi-semiotic and graphological approach toward the genre that, in turn, favoured a specific aesthetic ascribed to the artist’s assumed personality. Moreover, the two genres were tied to a set of vocabulary that highlighted both their individual function and aesthetic, yet unfolded a methodologically problematic narrative.                          </span></p><span data-dcnode-id="4117" instrument_node=""> </span></div><span data-dcnode-id="4115" instrument_node=""> </span></div><span data-dcnode-id="4113" instrument_node=""> </span><aside class="col-sm-4 search-results__aside" data-dcnode-id="4087"><span data-dcnode-id="4112" instrument_node=""> </span><ul data-dcnode-id="4089"><span data-dcnode-id="4111" instrument_node=""> </span><li data-dcnode-id="4103"><span data-dcnode-id="4110" instrument_node=""> </span><a data-dcnode-id="4104" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//arthistoriography.files.wordpress.com/2021/05/bojilova.pdf" rel="noopener" target="_blank"><span data-dcnode-id="4109" instrument_node=""> Read online </span><svg aria-hidden="true" class="feather feather-external-link" data-dcnode-id="4105" fill="none" height="24" stroke="currentColor" stroke-linecap="round" stroke-linejoin="round" stroke-width="2" viewBox="0 0 24 24" width="24" xmlns="http://www.w3.org/2000/svg"><path d="M18 13v6a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V8a2 2 0 0 1 2-2h6" data-dcnode-id="4108"></path><polyline data-dcnode-id="4107" points="15 3 21 3 21 9"></polyline><line data-dcnode-id="4106" x1="10" x2="21" y1="14" y2="3"></line></svg></a></li><span data-dcnode-id="4102" instrument_node=""> </span><li data-dcnode-id="4097"><span data-dcnode-id="4101" instrument_node=""> </span sseurship. Yesterday, today, tomorrow. Introductory remarks                            </span></a><span data-dcnode-id="3997" instrument_node=""> </span></h3><span data-dcnode-id="3995" instrument_node=""> </span><ul class="inlined-list" data-dcnode-id="3992"><li data-dcnode-id="3993"><span data-dcnode-id="3994" instrument_node="">Joris Corin Heyder</span></li></ul><span data-dcnode-id="3991" instrument_node=""> </span></header><span data-dcnode-id="3989" instrument_node=""> </span><div class="search-results__body" data-dcnode-id="3962"><span data-dcnode-id="3988" instrument_node=""> </span><h4 data-dcnode-id="3986"><span data-dcnode-id="3987" instrument_node="">Article keywords</span></h4><ul class="inlined-list" data-dcnode-id="3973"><li data-dcnode-id="3984"><span data-dcnode-id="3985" instrument_node="">connoisseurship,&nbsp;</span></li><li data-dcnode-id="3982"><span data-dcnode-id="3983" instrument_node="">practices,&nbsp;</span></li><li data-dcnode-id="3980"><span data-dcnode-id="3981" instrument_node="">comparing,&nbsp;</span></li><li data-dcnode-id="3978"><span data-dcnode-id="3979" instrument_node="">judging,&nbsp;</span></li><li data-dcnode-id="3976"><span data-dcnode-id="3977" instrument_node="">practice theory,&nbsp;</span></li><li data-dcnode-id="3974"><span data-dcnode-id="3975" instrument_node="">methodology</span></li></ul><span data-dcnode-id="3972" instrument_node=""> </span><h4 aria-expanded="false" class="doaj-public-search-abstractaction doaj-public-search-abstractaction-results" data-dcnode-id="3967" rel="5e9f91bb74f04f79909fac1ec517989b" type="button"><span data-dcnode-id="3971" instrument_node="">                            Abstract</span><svg aria-hidden="true" class="feather feather-plus" data-dcnode-id="3968" fill="none" height="24" stroke="currentColor" stroke-linecap="round" stroke-linejoin="round" stroke-width="2" viewBox="0 0 24 24" width="24" xmlns="http://www.w3.org/2000/svg"><line data-dcnode-id="3970" x1="12" x2="12" y1="5" y2="19 s just short of sensational.  The thesis, written for the Faculty of Philosophy of the University of Hamburg in 1919-20, ambitiously sets out to define the fundamental design principles of Michelangelo’s art, especially as they can be articulated in contradistinction to the art of Raphael.  The thesis, published in a luxurious facsimile German edition in 2014, now appears in an English translation permitting Anglo-Saxon readers the welcome opportunity to observe the maturing of one of the great figures of Art and Intellectual History.                          </span></p><span data-dcnode-id="3803" instrument_node=""> </span></div><span data-dcnode-id="3801" instrument_node=""> </span></div><span data-dcnode-id="3799" instrument_node=""> </span><aside class="col-sm-4 search-results__aside" data-dcnode-id="3773"><span data-dcnode-id="3798" instrument_node=""> </span><ul data-dcnode-id="3775"><span data-dcnode-id="3797" instrument_node=""> </span><li data-dcnode-id="3789"><span data-dcnode-id="3796" instrument_node=""> </span><a data-dcnode-id="3790" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//arthistoriography.files.wordpress.com/2020/09/wallace-rev.pdf" rel="noopener" target="_blank"><span data-dcnode-id="3795" instrument_node=""> Read online </span><svg aria-hidden="true" class="feather feather-external-link" data-dcnode-id="3791" fill="none" height="24" stroke="currentColor" stroke-linecap="round" stroke-linejoin="round" stroke-width="2" viewBox="0 0 24 24" width="24" xmlns="http://www.w3.org/2000/svg"><path d="M18 13v6a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V8a2 2 0 0 1 2-2h6" data-dcnode-id="3794"></path><polyline data-dcnode-id="3793" points="15 3 21 3 21 9"></polyline><line data-dcnode-id="3792" x1="10" x2="21" y1="14" y2="3"></line></svg></a></li><span data-dcnode-id="3788" instrument_node=""> </span><li data-dcnode-id="3783"><span data-dcnode-id="3787" instrument_node=""> </span><a data-dcnode-id="3785" href="https://chatnoir-webcontent. nism. Review of: Marta Filipová, Modernity, History, and Politics in Czech Art, Series: Routledge Research in Art and Politics, New York: Routledge, 2019                            </span></a><span data-dcnode-id="3758" instrument_node=""> </span></h3><span data-dcnode-id="3756" instrument_node=""> </span><ul class="inlined-list" data-dcnode-id="3753"><li data-dcnode-id="3754"><span data-dcnode-id="3755" instrument_node="">Cynthia Paces</span></li></ul><span data-dcnode-id="3752" instrument_node=""> </span></header><span data-dcnode-id="3750" instrument_node=""> </span><div class="search-results__body" data-dcnode-id="3725"><span data-dcnode-id="3749" instrument_node=""> </span><h4 data-dcnode-id="3747"><span data-dcnode-id="3748" instrument_node="">Article keywords</span></h4><ul class="inlined-list" data-dcnode-id="3736"><li data-dcnode-id="3745"><span data-dcnode-id="3746" instrument_node="">bohemian lands,&nbsp;</span></li><li data-dcnode-id="3743"><span data-dcnode-id="3744" instrument_node="">czechoslovakia,&nbsp;</span></li><li data-dcnode-id="3741"><span data-dcnode-id="3742" instrument_node="">nationalism,&nbsp;</span></li><li data-dcnode-id="3739"><span data-dcnode-id="3740" instrument_node="">modernism,&nbsp;</span></li><li data-dcnode-id="3737"><span data-dcnode-id="3738" instrument_node="">art history</span></li></ul><span data-dcnode-id="3735" instrument_node=""> </span><h4 aria-expanded="false" class="doaj-public-search-abstractaction doaj-public-search-abstractaction-results" data-dcnode-id="3730" rel="4cab502b3db24b01a7edc850e09188c5" type="button"><span data-dcnode-id="3734" instrument_node="">                            Abstract</span><svg aria-hidden="true" class="feather feather-plus" data-dcnode-id="3731" fill="none" height="24" stroke="currentColor" stroke-linecap="round" stroke-linejoin="round" stroke-width="2" viewBox="0 0 24 24" width="24" xmlns="http://www.w3.org/2000/svg"><line data-dcnode-id="3733" x1="12" x2="12" y1="5" y2="19"></line><line data-dcnode-id="3732" x1="5" x2="19" y1="12" y2="12"></line></svg></h4><span data-dcnode-id="3729" instrument_node=""> </span><p aria-expanded="false" class="collapse doaj-public-search-abstracttext doaj-public-search-abstracttext-results" data-dcnode-id="3727" rel="4cab502b3db24b01a7edc850e09188c5"><span data-dcnode-id="3728" instrument_node="">                            This monograph investigates Czech modernism from the late nineteenth century to 1938. Rather than viewing modernism as a rejection of nationalism, art historian Marta Filipová argues that many Czech artists and art critics sought ways to ‘nationalise modernism’. Because modernism’s development coincided with Czech nation-building and state formation, artists and critics used modernist forms to demonstrate their nation’s progressiveness. Filipová focuses on the intellectual history of the relationship between nationalism and modernism, by examining Czech art journals and other art writing. She takes a thematic approach and investigates various modernisms, considering regionalism, social class, gender, political differences, and ethnic diversity.                          </span></p><span data-dcnode-id="3726" instrument_node=""> </span></div><span data-dcnode-id="3724" instrument_node=""> </span></div><span data-dcnode-id="3722" instrument_node=""> </span><aside class="col-sm-4 search-results__aside" data-dcnode-id="3696"><span data-dcnode-id="3721" instrument_node=""> </span><ul data-dcnode-id="3698"><span data-dcnode-id="3720" instrument_node=""> </span><li data-dcnode-id="3712"><span data-dcnode-id="3719" instrument_node=""> </span><a data-dcnode-id="3713" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//arthistoriography.files.wordpress.com/2020/06/paces-rev.pdf" rel="noopener" target="_blank"><span data-dcnode-id="3718" instrument_node=""> Read online </span><svg aria-hidden="true" class="feather feather-external-link" data-dcnode-id="3714" fill="none" height="24 e-id="3659" instrument_node="">paolo coen,&nbsp;</span></li><li data-dcnode-id="3656"><span data-dcnode-id="3657" instrument_node="">thomas jenkins,&nbsp;</span></li><li data-dcnode-id="3654"><span data-dcnode-id="3655" instrument_node="">daniela gallo,&nbsp;</span></li><li data-dcnode-id="3652"><span data-dcnode-id="3653" instrument_node="">pio-clementino museum</span></li></ul><span data-dcnode-id="3650" instrument_node=""> </span><h4 aria-expanded="false" class="doaj-public-search-abstractaction doaj-public-search-abstractaction-results" data-dcnode-id="3645" rel="b8d2413ab0924004acafe5048de62d34" type="button"><span data-dcnode-id="3649" instrument_node="">                            Abstract</span><svg aria-hidden="true" class="feather feather-plus" data-dcnode-id="3646" fill="none" height="24" stroke="currentColor" stroke-linecap="round" stroke-linejoin="round" stroke-width="2" viewBox="0 0 24 24" width="24" xmlns="http://www.w3.org/2000/svg"><line data-dcnode-id="3648" x1="12" x2="12" y1="5" y2="19"></line><line data-dcnode-id="3647" x1="5" x2="19" y1="12" y2="12"></line></svg></h4><span data-dcnode-id="3644" instrument_node=""> </span><p aria-expanded="false" class="collapse doaj-public-search-abstracttext doaj-public-search-abstracttext-results" data-dcnode-id="3642" rel="b8d2413ab0924004acafe5048de62d34"><span data-dcnode-id="3643" instrument_node="">                            This anthology, edited by Paolo Coen, contains contributions on various aspects of the creation, marketing, display, sale, and subsequent circulation of works of art (primarily paintings, drawings, and antique sculpture) in Rome from the early seventeenth through the early nineteenth centuries. By providing new detail on the ways Italian, British, German, and French artists, dealers, and collectors took part in the Roman art market, broadly conceived, the volume helps pick up where Francis Haskell left off in Painters and Patrons: A Study in the Relations between Italian Art and Society in the Age of the Baroque (1963). Of particular interest are essays by Coen on a set of copy drawings after Old Master pictures prepared for the 9th Earl of Exeter under the direction of Thomas Jenkins, and by Daniela Gallo on the prices paid for ancient sculpture acquired for the Pio-Clementino Museum and the economic repercussions for Rome’s antiquities market.                          </span></p><span data-dcnode-id="3641" instrument_node=""> </span></div><span data-dcnode-id="3639" instrument_node=""> </span></div><span data-dcnode-id="3637" instrument_node=""> </span><aside class="col-sm-4 search-results__aside" data-dcnode-id="3611"><span data-dcnode-id="3636" instrument_node=""> </span><ul data-dcnode-id="3613"><span data-dcnode-id="3635" instrument_node=""> </span><li data-dcnode-id="3627"><span data-dcnode-id="3634" instrument_node=""> </span><a data-dcnode-id="3628" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//arthistoriography.files.wordpress.com/2020/09/collins-rev.pdf" rel="noopener" target="_blank"><span data-dcnode-id="3633" instrument_node=""> Read online </span><svg aria-hidden="true" class="feather feather-external-link" data-dcnode-id="3629" fill="none" height="24" stroke="currentColor" stroke-linecap="round" stroke-linejoin="round" stroke-width="2" viewBox="0 0 24 24" width="24" xmlns="http://www.w3.org/2000/svg"><path d="M18 13v6a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V8a2 2 0 0 1 2-2h6" data-dcnode-id="3632"></path><polyline data-dcnode-id="3631" points="15 3 21 3 21 9"></polyline><line data-dcnode-id="3630" x1="10" x2="21" y1="14" y2="3"></line></svg></a></li><span data-dcnode-id="3626" instrument_node=""> </span><li data-dcnode-id="3621"><span data-dcnode-id="3625" instrument_node=""> </span><a data-dcnode-id="3623" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//doaj.org/toc/2042-4752" rel="noopener" target="_blank"><span data-dcnode-id="3624" instrument_node="">About the journal</span></
