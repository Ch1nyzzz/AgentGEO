roke-linecap="round" stroke-linejoin="round" stroke-width="2" viewBox="0 0 24 24" width="24" xmlns="http://www.w3.org/2000/svg"><line data-dcnode-id="8701" x1="12" x2="12" y1="5" y2="19"></line><line data-dcnode-id="8700" x1="5" x2="19" y1="12" y2="12"></line></svg></h4><span data-dcnode-id="8697" instrument_node=""> </span><p aria-expanded="false" class="collapse doaj-public-search-abstracttext doaj-public-search-abstracttext-results" data-dcnode-id="8695" rel="09a0c528e5574ad3924649d4ca7a9bb7"><span data-dcnode-id="8696" instrument_node="">                            This book review discusses the lavishly illustrated catalogue raisonné of the work of Mary Warburg, nee Hertz. Warburg is undoubtedly best known as the wife of art historian Aby Warburg. This catalogue aims to highlight, for the first time, Warburg’s independent achievements as an artist. The review highlights the merits of the book, in particular its in-depth contextualization of Warburg’s work within the social and cultural history of Hamburg. The review also reflects more broadly on the merits of such large-scale cataloguing endeavours today, especially when ‘minor figures’ such as Mary Warburg are concerned.                          </span></p><span data-dcnode-id="8694" instrument_node=""> </span></div><span data-dcnode-id="8692" instrument_node=""> </span></div><span data-dcnode-id="8690" instrument_node=""> </span><aside class="col-sm-4 search-results__aside" data-dcnode-id="8664"><span data-dcnode-id="8689" instrument_node=""> </span><ul data-dcnode-id="8666"><span data-dcnode-id="8688" instrument_node=""> </span><li data-dcnode-id="8680"><span data-dcnode-id="8687" instrument_node=""> </span><a data-dcnode-id="8681" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//arthistoriography.files.wordpress.com/2021/06/hones-rev.pdf" rel="noopener" target="_blank"><span data-dcnode-id="8686" instrument_node=""> Read online </span><svg aria-hidden="true" class="feather feather al and postcolonial history of the twelfth century Khmer monument, Angkor Wat. Covering the 150 years (1860 to 2010) history of the temple, spanning Europe and Asia, it sets out to show how the monument and its reputation were made, unmade and re-made in Europe as well as in Asia during the nineteenth and twentieth centuries as culture, science and politics became entwined. In Falser’s words, ‘This book project investigates the temple’s material traces and architectural forms as well as the literary and visual representations of the structure, with a view to analysing global processes of transfer and translation as well as the recent proliferation of hybrid forms of art, architecture and cultural heritage.’                          </span></p><span data-dcnode-id="8530" instrument_node=""> </span></div><span data-dcnode-id="8528" instrument_node=""> </span></div><span data-dcnode-id="8526" instrument_node=""> </span><aside class="col-sm-4 search-results__aside" data-dcnode-id="8500"><span data-dcnode-id="8525" instrument_node=""> </span><ul data-dcnode-id="8502"><span data-dcnode-id="8524" instrument_node=""> </span><li data-dcnode-id="8516"><span data-dcnode-id="8523" instrument_node=""> </span><a data-dcnode-id="8517" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//arthistoriography.files.wordpress.com/2021/06/swati-chemburkar-rev.pdf" rel="noopener" target="_blank"><span data-dcnode-id="8522" instrument_node=""> Read online </span><svg aria-hidden="true" class="feather feather-external-link" data-dcnode-id="8518" fill="none" height="24" stroke="currentColor" stroke-linecap="round" stroke-linejoin="round" stroke-width="2" viewBox="0 0 24 24" width="24" xmlns="http://www.w3.org/2000/svg"><path d="M18 13v6a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V8a2 2 0 0 1 2-2h6" data-dcnode-id="8521"></path><polyline data-dcnode-id="8520" points="15 3 21 3 21 9"></polyline><line data-dcnode-id="8519" x1="10" x2="21" y1="14" y2="3"></line></svg></a></li><span data g/article/3f3ead66d09440a5af1fbbf65360a199" target="_blank"><span data-dcnode-id="8011" instrument_node="">                              Studying gestures in art                            </span></a><span data-dcnode-id="8009" instrument_node=""> </span></h3><span data-dcnode-id="8007" instrument_node=""> </span><ul class="inlined-list" data-dcnode-id="8004"><li data-dcnode-id="8005"><span data-dcnode-id="8006" instrument_node="">Eckart Marchand</span></li></ul><span data-dcnode-id="8003" instrument_node=""> </span></header><span data-dcnode-id="8001" instrument_node=""> </span><div class="search-results__body" data-dcnode-id="7970"><span data-dcnode-id="8000" instrument_node=""> </span><h4 data-dcnode-id="7998"><span data-dcnode-id="7999" instrument_node="">Article keywords</span></h4><ul class="inlined-list" data-dcnode-id="7981"><li data-dcnode-id="7996"><span data-dcnode-id="7997" instrument_node="">gestures,&nbsp;</span></li><li data-dcnode-id="7994"><span data-dcnode-id="7995" instrument_node="">julius lange,&nbsp;</span></li><li data-dcnode-id="7992"><span data-dcnode-id="7993" instrument_node="">j.j. tikkanen,&nbsp;</span></li><li data-dcnode-id="7990"><span data-dcnode-id="7991" instrument_node="">fritz saxl,&nbsp;</span></li><li data-dcnode-id="7988"><span data-dcnode-id="7989" instrument_node="">aby warburg,&nbsp;</span></li><li data-dcnode-id="7986"><span data-dcnode-id="7987" instrument_node="">ernst h. gombrich,&nbsp;</span></li><li data-dcnode-id="7984"><span data-dcnode-id="7985" instrument_node="">michael baxandall,&nbsp;</span></li><li data-dcnode-id="7982"><span data-dcnode-id="7983" instrument_node="">pathos formula</span></li></ul><span data-dcnode-id="7980" instrument_node=""> </span><h4 aria-expanded="false" class="doaj-public-search-abstractaction doaj-public-search-abstractaction-results" data-dcnode-id="7975" rel="3f3ead66d09440a5af1fbbf65360a199" type="button"><span data-dcnode-id="7979" instrument_node="">                            Abstract</span><svg aria-hidden="true" class="feather feather-plus" data-dcnode-id="7976" fill="none" height="24" stroke="currentColor" stroke-linecap="round" stroke-linejoin="round" stroke-width="2" viewBox="0 0 24 24" width="24" xmlns="http://www.w3.org/2000/svg"><line data-dcnode-id="7978" x1="12" x2="12" y1="5" y2="19"></line><line data-dcnode-id="7977" x1="5" x2="19" y1="12" y2="12"></line></svg></h4><span data-dcnode-id="7974" instrument_node=""> </span><p aria-expanded="false" class="collapse doaj-public-search-abstracttext doaj-public-search-abstracttext-results" data-dcnode-id="7972" rel="3f3ead66d09440a5af1fbbf65360a199"><span data-dcnode-id="7973" instrument_node="">                            In 1887, when art history was concerned with aethetics and the study of individual artist, Lange, like Warburg after him, encouraged the discussion of broader issues of representation, positioning his study of the representation of a human gesture at the intersection of psychology and art history. Lange inspired J.J. Tikkanen and others to conduct more thorough histories of individual gestures, while the enquiry in the formation and tradition of human expressive gestures in art was continued by Warburg, Saxl and Gombrich. My introduction traces these developments from the viewpoint of a more recent, Baxandallian, approach that defines gesture as entirely conventional.                          </span></p><span data-dcnode-id="7971" instrument_node=""> </span></div><span data-dcnode-id="7969" instrument_node=""> </span></div><span data-dcnode-id="7967" instrument_node=""> </span><aside class="col-sm-4 search-results__aside" data-dcnode-id="7941"><span data-dcnode-id="7966" instrument_node=""> </span><ul data-dcnode-id="7943"><span data-dcnode-id="7965" instrument_node=""> </span><li data-dcnode-id="7957"><span data-dcnode-id="7964" instrument_node=""> </span><a data-dcnode-id="7958" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//arthistoriogra  instrument_node="">pointing</span></li></ul><span data-dcnode-id="7903" instrument_node=""> </span><h4 aria-expanded="false" class="doaj-public-search-abstractaction doaj-public-search-abstractaction-results" data-dcnode-id="7898" rel="1a36db335cb1454093861cd01a2947b5" type="button"><span data-dcnode-id="7902" instrument_node="">                            Abstract</span><svg aria-hidden="true" class="feather feather-plus" data-dcnode-id="7899" fill="none" height="24" stroke="currentColor" stroke-linecap="round" stroke-linejoin="round" stroke-width="2" viewBox="0 0 24 24" width="24" xmlns="http://www.w3.org/2000/svg"><line data-dcnode-id="7901" x1="12" x2="12" y1="5" y2="19"></line><line data-dcnode-id="7900" x1="5" x2="19" y1="12" y2="12"></line></svg></h4><span data-dcnode-id="7897" instrument_node=""> </span><p aria-expanded="false" class="collapse doaj-public-search-abstracttext doaj-public-search-abstracttext-results" data-dcnode-id="7895" rel="1a36db335cb1454093861cd01a2947b5"><span data-dcnode-id="7896" instrument_node="">                            In an insightful 1887 essay, the Danish art historian Julius Lange explored the many meanings of a common but overlooked gesture—that of bringing a hand to one’s chest. Through a close study of how this motif changed across centuries of European art, he raised questions about the nature of bodily meaning, its multiplicity, and the forces that shape it—questions that contemporary gesture researchers still grapple with. His essay also raised questions—tantalizing if perhaps unanswerable—about how gesture in art compares to gesture in life.                          </span></p><span data-dcnode-id="7894" instrument_node=""> </span></div><span data-dcnode-id="7892" instrument_node=""> </span></div><span data-dcnode-id="7890" instrument_node=""> </span><aside class="col-sm-4 search-results__aside" data-dcnode-id="7864"><span data-dcnode-id="7889" instrument_node=""> </span><ul data-dcnode-id="7866"><span data-dcnode-id ticle class="row" data-dcnode-id="7783"><span data-dcnode-id="7859" instrument_node=""> </span><div class="col-sm-8 search-results__main" data-dcnode-id="7812"><span data-dcnode-id="7858" instrument_node=""> </span><header data-dcnode-id="7842"><span data-dcnode-id="7857" instrument_node=""> </span><p class="label" data-dcnode-id="7854"><a data-dcnode-id="7855" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//doaj.org/toc/2042-4752" target="_blank"><span data-dcnode-id="7856" instrument_node="">                            Journal of Art Historiography (Dec 2021)                          </span></a></p><span data-dcnode-id="7853" instrument_node=""> </span><h3 class="search-results__heading" data-dcnode-id="7848"><span data-dcnode-id="7852" instrument_node=""> </span><a class="" data-dcnode-id="7850" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//doaj.org/article/63af348851194509939b1c5633bf72b5" target="_blank"><span data-dcnode-id="7851" instrument_node="">                              Julius Lange (19 June 1838-20 August 1896)                            </span></a><span data-dcnode-id="7849" instrument_node=""> </span></h3><span data-dcnode-id="7847" instrument_node=""> </span><ul class="inlined-list" data-dcnode-id="7844"><li data-dcnode-id="7845"><span data-dcnode-id="7846" instrument_node=""> Karl Johns</span></li></ul><span data-dcnode-id="7843" instrument_node=""> </span></header><span data-dcnode-id="7841" instrument_node=""> </span><div class="search-results__body" data-dcnode-id="7814"><span data-dcnode-id="7840" instrument_node=""> </span><h4 data-dcnode-id="7838"><span data-dcnode-id="7839" instrument_node="">Article keywords</span></h4><ul class="inlined-list" data-dcnode-id="7825"><li data-dcnode-id="7836"><span data-dcnode-id="7837" instrument_node="">michelangelo,&nbsp;</span></li><li data-dcnode-id="7834"><span data-dcnode-id="7835" instrument_node="">grave stellae,&nbsp;</span></li><li data-dcnode-id="7832"><span data-dcnode-id="7833" instrument_node="">gestures,&nbsp;</span></li><li data-dcnode-id="7830"><span data-dcnode-id="7831" instrument_node="">hand on chest,&nbsp;</span></li><li data-dcnode-id="7828"><span data-dcnode-id="7829" instrument_node="">heavenward gaze,&nbsp;</span></li><li data-dcnode-id="7826"><span data-dcnode-id="7827" instrument_node="">straddling stance</span></li></ul><span data-dcnode-id="7824" instrument_node=""> </span><h4 aria-expanded="false" class="doaj-public-search-abstractaction doaj-public-search-abstractaction-results" data-dcnode-id="7819" rel="63af348851194509939b1c5633bf72b5" type="button"><span data-dcnode-id="7823" instrument_node="">                            Abstract</span><svg aria-hidden="true" class="feather feather-plus" data-dcnode-id="7820" fill="none" height="24" stroke="currentColor" stroke-linecap="round" stroke-linejoin="round" stroke-width="2" viewBox="0 0 24 24" width="24" xmlns="http://www.w3.org/2000/svg"><line data-dcnode-id="7822" x1="12" x2="12" y1="5" y2="19"></line><line data-dcnode-id="7821" x1="5" x2="19" y1="12" y2="12"></line></svg></h4><span data-dcnode-id="7818" instrument_node=""> </span><p aria-expanded="false" class="collapse doaj-public-search-abstracttext doaj-public-search-abstracttext-results" data-dcnode-id="7816" rel="63af348851194509939b1c5633bf72b5"><span data-dcnode-id="7817" instrument_node="">                            A brief biography and survey of the writings of Julius Lange, an art historian and brother of Carl Lange, the psychologist, who was best known in connection with the James-Lange theory of emotion. Aside from his lecture about Michelangelo’s idiosyncratic relation to his marble blocks, written after the Michelangelo celebrations of 1875, we present the English-speaking audience with a review of the publications of Greek grave stelae and three lectures tracing the history of human gestures as they appear and then disappear within the history of art. These are the hand laid on the chest, the heavenward gaze, and the unusual straddling stance. The latter was then further expanded by Johan Jakob Tikkanen in his immortal, unforgotten ‘Studien über den Ausdruck in der Kunst’.                          </span></p><span data-dcnode-id="7815" instrument_node=""> </span></div><span data-dcnode-id="7813" instrument_node=""> </span></div><span data-dcnode-id="7811" instrument_node=""> </span><aside class="col-sm-4 search-results__aside" data-dcnode-id="7785"><span data-dcnode-id="7810" instrument_node=""> </span><ul data-dcnode-id="7787"><span data-dcnode-id="7809" instrument_node=""> </span><li data-dcnode-id="7801"><span data-dcnode-id="7808" instrument_node=""> </span><a data-dcnode-id="7802" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//arthistoriography.files.wordpress.com/2021/11/johns-intro-lange.pdf" rel="noopener" target="_blank"><span data-dcnode-id="7807" instrument_node=""> Read online </span><svg aria-hidden="true" class="feather feather-external-link" data-dcnode-id="7803" fill="none" height="24" stroke="currentColor" stroke-linecap="round" stroke-linejoin="round" stroke-width="2" viewBox="0 0 24 24" width="24" xmlns="http://www.w3.org/2000/svg"><path d="M18 13v6a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V8a2 2 0 0 1 2-2h6" data-dcnode-id="7806"></path><polyline data-dcnode-id="7805" points="15 3 21 3 21 9"></polyline><line data-dcnode-id="7804" x1="10" x2="21" y1="14" y2="3"></line></svg></a></li><span data-dcnode-id="7800" instrument_node=""> </span><li data-dcnode-id="7795"><span data-dcnode-id="7799" instrument_node=""> </span><a data-dcnode-id="7797" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//doaj.org/toc/2042-4752" rel="noopener" target="_blank"><span data-dcnode-id="7798" instrument_node="">About the journal</span></a><span data-dcnode-id="7796" instrument_node=""> </span></li><span data-dcnode-id="7794" instrument_node=""> </span><li data-dcnode-id="7789"><span n data-dcnode-id="7767" instrument_node="">Susanna Avery-Quash,&nbsp;</span></li><li data-dcnode-id="7764"><span data-dcnode-id="7765" instrument_node="">Elizabeth Goodall</span></li></ul><span data-dcnode-id="7762" instrument_node=""> </span></header><span data-dcnode-id="7760" instrument_node=""> </span><div class="search-results__body" data-dcnode-id="7733"><span data-dcnode-id="7759" instrument_node=""> </span><h4 data-dcnode-id="7757"><span data-dcnode-id="7758" instrument_node="">Article keywords</span></h4><ul class="inlined-list" data-dcnode-id="7744"><li data-dcnode-id="7755"><span data-dcnode-id="7756" instrument_node="">southampton city art gallery,&nbsp;</span></li><li data-dcnode-id="7753"><span data-dcnode-id="7754" instrument_node="">the national gallery,&nbsp;</span></li><li data-dcnode-id="7751"><span data-dcnode-id="7752" instrument_node="">learning,&nbsp;</span></li><li data-dcnode-id="7749"><span data-dcnode-id="7750" instrument_node="">community engagement,&nbsp;</span></li><li data-dcnode-id="7747"><span data-dcnode-id="7748" instrument_node="">leadership,&nbsp;</span></li><li data-dcnode-id="7745"><span data-dcnode-id="7746" instrument_node="">collaboration</span></li></ul><span data-dcnode-id="7743" instrument_node=""> </span><h4 aria-expanded="false" class="doaj-public-search-abstractaction doaj-public-search-abstractaction-results" data-dcnode-id="7738" rel="f9ac520c539447e7ae4b0857aa4c9b22" type="button"><span data-dcnode-id="7742" instrument_node="">                            Abstract</span><svg aria-hidden="true" class="feather feather-plus" data-dcnode-id="7739" fill="none" height="24" stroke="currentColor" stroke-linecap="round" stroke-linejoin="round" stroke-width="2" viewBox="0 0 24 24" width="24" xmlns="http://www.w3.org/2000/svg"><line data-dcnode-id="7741" x1="12" x2="12" y1="5" y2="19"></line><line data-dcnode-id="7740" x1="5" x2="19" y1="12" y2="12"></line></svg></h4><span data-dcnode-id="7737" instrument_node=""> </span><p aria-expanded="false" class="collapse doaj-public-search-abstracttext doaj-public-search-abstracttext-results" data-dcnode-id="7735" rel="f9ac520c539447e7ae4b0857aa4c9b22"><span data-dcnode-id="7736" instrument_node="">                            Southampton City Art Gallery is a much admired place of energy and activity. This article investigates the ambitious educational provision developed by Southampton’s art gallery for three decades from the appointment of its first Keeper of Education in 1974. It aims to record a significant moment in the history of UK museum education and to consider approaches that may be useful for museums today as they seek to re-connect audiences with art after a testing period of non-physical access due to the global pandemic. It shares new research undertaken for the exhibition, Creating a National Collection: The Partnership between Southampton City Art Gallery and The National Gallery (Southampton, 28 May-5 September 2021), the major outcome of an Art Fund Curatorial Traineeship project between the two institutions (2019–21).                          </span></p><span data-dcnode-id="7734" instrument_node=""> </span></div><span data-dcnode-id="7732" instrument_node=""> </span></div><span data-dcnode-id="7730" instrument_node=""> </span><aside class="col-sm-4 search-results__aside" data-dcnode-id="7704"><span data-dcnode-id="7729" instrument_node=""> </span><ul data-dcnode-id="7706"><span data-dcnode-id="7728" instrument_node=""> </span><li data-dcnode-id="7720"><span data-dcnode-id="7727" instrument_node=""> </span><a data-dcnode-id="7721" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//arthistoriography.files.wordpress.com/2021/11/avery-quash-and-goodall-1.pdf" rel="noopener" target="_blank"><span data-dcnode-id="7726" instrument_node=""> Read online </span><svg aria-hidden="true" class="feather feather-external-link" data-dcnode-id="7722" fill="none" height="24" stroke="currentColor" stroke-linecap="round" s -dcnode-id="7665" instrument_node="">media histories</span></li></ul><span data-dcnode-id="7662" instrument_node=""> </span><h4 aria-expanded="false" class="doaj-public-search-abstractaction doaj-public-search-abstractaction-results" data-dcnode-id="7657" rel="18739f1f1d2d40938c0546b19b2fe99a" type="button"><span data-dcnode-id="7661" instrument_node="">                            Abstract</span><svg aria-hidden="true" class="feather feather-plus" data-dcnode-id="7658" fill="none" height="24" stroke="currentColor" stroke-linecap="round" stroke-linejoin="round" stroke-width="2" viewBox="0 0 24 24" width="24" xmlns="http://www.w3.org/2000/svg"><line data-dcnode-id="7660" x1="12" x2="12" y1="5" y2="19"></line><line data-dcnode-id="7659" x1="5" x2="19" y1="12" y2="12"></line></svg></h4><span data-dcnode-id="7656" instrument_node=""> </span><p aria-expanded="false" class="collapse doaj-public-search-abstracttext doaj-public-search-abstracttext-results" data-dcnode-id="7654" rel="18739f1f1d2d40938c0546b19b2fe99a"><span data-dcnode-id="7655" instrument_node="">                            This article explores histories of how the visual arts and art history have been covered in the Australian popular media. Focusing on popular magazines of the mid-twentieth century (such as Pix and The Australian Women’s Weekly) it analyses under-considered examples of how these magazines presented art history to broad Australian audiences, as well as how these magazines facilitated and revealed diverse audience engagement with the arts. Through these case studies the article argues for the benefits of using intermedial methodologies of popular art historiography, in order to trace and analyse histories of cultural value and popular arts engagement in Australia.                          </span></p><span data-dcnode-id="7653" instrument_node=""> </span></div><span data-dcnode-id="7651" instrument_node=""> </span></div><span data-dcnode-id="7649" instrument_node=""> </span><aside class="col- span></article></li><li class="card search-results__record" data-dcnode-id="7541"><span data-dcnode-id="7619" instrument_node=""> </span><article class="row" data-dcnode-id="7542"><span data-dcnode-id="7618" instrument_node=""> </span><div class="col-sm-8 search-results__main" data-dcnode-id="7571"><span data-dcnode-id="7617" instrument_node=""> </span><header data-dcnode-id="7601"><span data-dcnode-id="7616" instrument_node=""> </span><p class="label" data-dcnode-id="7613"><a data-dcnode-id="7614" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//doaj.org/toc/2042-4752" target="_blank"><span data-dcnode-id="7615" instrument_node="">                            Journal of Art Historiography (Dec 2021)                          </span></a></p><span data-dcnode-id="7612" instrument_node=""> </span><h3 class="search-results__heading" data-dcnode-id="7607"><span data-dcnode-id="7611" instrument_node=""> </span><a class="" data-dcnode-id="7609" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//doaj.org/article/9f1023c08d2d4a6aa632353735858329" target="_blank"><span data-dcnode-id="7610" instrument_node="">                              Panofsky’s Antinomies                            </span></a><span data-dcnode-id="7608" instrument_node=""> </span></h3><span data-dcnode-id="7606" instrument_node=""> </span><ul class="inlined-list" data-dcnode-id="7603"><li data-dcnode-id="7604"><span data-dcnode-id="7605" instrument_node="">Daniel Spaulding</span></li></ul><span data-dcnode-id="7602" instrument_node=""> </span></header><span data-dcnode-id="7600" instrument_node=""> </span><div class="search-results__body" data-dcnode-id="7573"><span data-dcnode-id="7599" instrument_node=""> </span><h4 data-dcnode-id="7597"><span data-dcnode-id="7598" instrument_node="">Article keywords</span></h4><ul class="inlined-list" data-dcnode-id="7584"><li data-dcnode-id="7595"><span data-dcnode-id="7596" instrument_node="">erwin panofsky,&nbsp;</span></li><li data-dcnode-id="7593"><span data-dcnode-id="7594" instrument_node="">ernst cassirer,&nbsp;</span></li><li data-dcnode-id="7591"><span data-dcnode-id="7592" instrument_node="">györgy lukács,&nbsp;</span></li><li data-dcnode-id="7589"><span data-dcnode-id="7590" instrument_node="">gillian rose,&nbsp;</span></li><li data-dcnode-id="7587"><span data-dcnode-id="7588" instrument_node="">iconography,&nbsp;</span></li><li data-dcnode-id="7585"><span data-dcnode-id="7586" instrument_node="">neo-kantianism</span></li></ul><span data-dcnode-id="7583" instrument_node=""> </span><h4 aria-expanded="false" class="doaj-public-search-abstractaction doaj-public-search-abstractaction-results" data-dcnode-id="7578" rel="9f1023c08d2d4a6aa632353735858329" type="button"><span data-dcnode-id="7582" instrument_node="">                            Abstract</span><svg aria-hidden="true" class="feather feather-plus" data-dcnode-id="7579" fill="none" height="24" stroke="currentColor" stroke-linecap="round" stroke-linejoin="round" stroke-width="2" viewBox="0 0 24 24" width="24" xmlns="http://www.w3.org/2000/svg"><line data-dcnode-id="7581" x1="12" x2="12" y1="5" y2="19"></line><line data-dcnode-id="7580" x1="5" x2="19" y1="12" y2="12"></line></svg></h4><span data-dcnode-id="7577" instrument_node=""> </span><p aria-expanded="false" class="collapse doaj-public-search-abstracttext doaj-public-search-abstracttext-results" data-dcnode-id="7575" rel="9f1023c08d2d4a6aa632353735858329"><span data-dcnode-id="7576" instrument_node="">                            This article reconstructs the Neo-Kantian framework of Erwin Panofsky’s theoretical essays of the 1910s and 1920s, demonstrating that the schematic subject/object relation developed in these publications is also implicitly at work in Panofsky’s Perspective as Symbolic Form as well as early iconographic studies such as Hercules am Scheidewege. The article then draws on György Lukács and Gillian Rose to argue that there is a circularity in Panofsky’s method whereby the empirically given assumes the role of a ‘quasitranscendental’ a priori object, and furthermore that Ernst Cassirer’s philosophy of culture (with which Panofsky was in close dialog) shares this circularity. The aim of this article is not primarily to expose inconsistencies in Panofsky’s method, but rather to suggest that the impasses that art history encountered in its attempts to formalize itself as a discipline may serve as the point of departure for a future materialist art history.                          </span></p><span data-dcnode-id="7574" instrument_node=""> </span></div><span data-dcnode-id="7572" instrument_node=""> </span></div><span data-dcnode-id="7570" instrument_node=""> </span><aside class="col-sm-4 search-results__aside" data-dcnode-id="7544"><span data-dcnode-id="7569" instrument_node=""> </span><ul data-dcnode-id="7546"><span data-dcnode-id="7568" instrument_node=""> </span><li data-dcnode-id="7560"><span data-dcnode-id="7567" instrument_node=""> </span><a data-dcnode-id="7561" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//arthistoriography.files.wordpress.com/2021/11/spaulding.pdf" rel="noopener" target="_blank"><span data-dcnode-id="7566" instrument_node=""> Read online </span><svg aria-hidden="true" class="feather feather-external-link" data-dcnode-id="7562" fill="none" height="24" stroke="currentColor" stroke-linecap="round" stroke-linejoin="round" stroke-width="2" viewBox="0 0 24 24" width="24" xmlns="http://www.w3.org/2000/svg"><path d="M18 13v6a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V8a2 2 0 0 1 2-2h6" data-dcnode-id="7565"></path><polyline data-dcnode-id="7564" points="15 3 21 3 21 9"></polyline><line data-dcnode-id="7563" x1="10" x2="21" y1="14" y2="3"></line></svg></a></li><span data-dcnode-id="7559" instrument_node=""> </span><li data-dcnode-id="7554"><span data-dcnode-id="7558" instrument_node=""> </span><a data-dcnode-id="7556" href="https://chatnoir-webcontent.chatnoir.eu/?index=c icle class="row" data-dcnode-id="7372"><span data-dcnode-id="7450" instrument_node=""> </span><div class="col-sm-8 search-results__main" data-dcnode-id="7401"><span data-dcnode-id="7449" instrument_node=""> </span><header data-dcnode-id="7433"><span data-dcnode-id="7448" instrument_node=""> </span><p class="label" data-dcnode-id="7445"><a data-dcnode-id="7446" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//doaj.org/toc/2042-4752" target="_blank"><span data-dcnode-id="7447" instrument_node="">                            Journal of Art Historiography (Dec 2021)                          </span></a></p><span data-dcnode-id="7444" instrument_node=""> </span><h3 class="search-results__heading" data-dcnode-id="7439"><span data-dcnode-id="7443" instrument_node=""> </span><a class="" data-dcnode-id="7441" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//doaj.org/article/af7a06819cec4a458633ceb4bd596d75" target="_blank"><span data-dcnode-id="7442" instrument_node="">                              Today as history: Vasari’s Naples Resurrection and visual memory                            </span></a><span data-dcnode-id="7440" instrument_node=""> </span></h3><span data-dcnode-id="7438" instrument_node=""> </span><ul class="inlined-list" data-dcnode-id="7435"><li data-dcnode-id="7436"><span data-dcnode-id="7437" instrument_node="">Allison Kim</span></li></ul><span data-dcnode-id="7434" instrument_node=""> </span></header><span data-dcnode-id="7432" instrument_node=""> </span><div class="search-results__body" data-dcnode-id="7403"><span data-dcnode-id="7431" instrument_node=""> </span><h4 data-dcnode-id="7429"><span data-dcnode-id="7430" instrument_node="">Article keywords</span></h4><ul class="inlined-list" data-dcnode-id="7414"><li data-dcnode-id="7427"><span data-dcnode-id="7428" instrument_node="">vasari,&nbsp;</span></li><li data-dcnode-id="7425"><span data-dcnode-id="7426" instrument_node="">painting,&nbsp;</span></li><li data-dcnode-id="7423"><span data-dcnode-id="7424" instrument_node="">renaissance,&nbsp;</span></li><li data-dcnode-id="7421"><span data-dcnode-id="7422" instrument_node="">italy,&nbsp;</span></li><li data-dcnode-id="7419"><span data-dcnode-id="7420" instrument_node="">imitation,&nbsp;</span></li><li data-dcnode-id="7417"><span data-dcnode-id="7418" instrument_node="">invention,&nbsp;</span></li><li data-dcnode-id="7415"><span data-dcnode-id="7416" instrument_node="">memory</span></li></ul><span data-dcnode-id="7413" instrument_node=""> </span><h4 aria-expanded="false" class="doaj-public-search-abstractaction doaj-public-search-abstractaction-results" data-dcnode-id="7408" rel="af7a06819cec4a458633ceb4bd596d75" type="button"><span data-dcnode-id="7412" instrument_node="">                            Abstract</span><svg aria-hidden="true" class="feather feather-plus" data-dcnode-id="7409" fill="none" height="24" stroke="currentColor" stroke-linecap="round" stroke-linejoin="round" stroke-width="2" viewBox="0 0 24 24" width="24" xmlns="http://www.w3.org/2000/svg"><line data-dcnode-id="7411" x1="12" x2="12" y1="5" y2="19"></line><line data-dcnode-id="7410" x1="5" x2="19" y1="12" y2="12"></line></svg></h4><span data-dcnode-id="7407" instrument_node=""> </span><p aria-expanded="false" class="collapse doaj-public-search-abstracttext doaj-public-search-abstracttext-results" data-dcnode-id="7405" rel="af7a06819cec4a458633ceb4bd596d75"><span data-dcnode-id="7406" instrument_node="">                            Giorgio Vasari’s (1511-74) literary contributions to the discipline of art history are incontestable. Rarely has scholarly literature given commensurate weight to his paintings. This article examines one of Vasari’s mid-career works, the Naples Resurrection (1545), and argues that the paintingsimultaneously typifies and singularly challenges the traditions of artistic production of its time through explicit and implicit references to Vasari’s contemporaries, namely Rosso Fiorentino, Michelangelo Buonarroti, and Raphael. A careful reading of these borrowings, some of which have long gone unnoticed, provides a new perspective on this often-overlooked painting and offers a deeper understanding of Vasari’s deliberate attempts at self-promotion and his relationship to the art of his time. This article considers how Vasari’s artistic practice embodied sixteenth-century themes of imitation and invention and had larger impacts on individual artistic identities and broader visual memory.                          </span></p><span data-dcnode-id="7404" instrument_node=""> </span></div><span data-dcnode-id="7402" instrument_node=""> </span></div><span data-dcnode-id="7400" instrument_node=""> </span><aside class="col-sm-4 search-results__aside" data-dcnode-id="7374"><span data-dcnode-id="7399" instrument_node=""> </span><ul data-dcnode-id="7376"><span data-dcnode-id="7398" instrument_node=""> </span><li data-dcnode-id="7390"><span data-dcnode-id="7397" instrument_node=""> </span><a data-dcnode-id="7391" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//arthistoriography.files.wordpress.com/2021/11/kim.pdf" rel="noopener" target="_blank"><span data-dcnode-id="7396" instrument_node=""> Read online </span><svg aria-hidden="true" class="feather feather-external-link" data-dcnode-id="7392" fill="none" height="24" stroke="currentColor" stroke-linecap="round" stroke-linejoin="round" stroke-width="2" viewBox="0 0 24 24" width="24" xmlns="http://www.w3.org/2000/svg"><path d="M18 13v6a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V8a2 2 0 0 1 2-2h6" data-dcnode-id="7395"></path><polyline data-dcnode-id="7394" points="15 3 21 3 21 9"></polyline><line data-dcnode-id="7393" x1="10" x2="21" y1="14" y2="3"></line></svg></a></li><span data-dcnode-id="7389" instrument_node=""> </span><li data-dcnode-id="7384"><span data-dcnode-id="7388" instrument_node=""> </span><a data-dcnode-id="7386" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;u ovakia, and the broken dream of a borderless Europe (1918–45)                            </span></a><span data-dcnode-id="7359" instrument_node=""> </span></h3><span data-dcnode-id="7357" instrument_node=""> </span><ul class="inlined-list" data-dcnode-id="7352"><li data-dcnode-id="7355"><span data-dcnode-id="7356" instrument_node="">Ivan Foletti,&nbsp;</span></li><li data-dcnode-id="7353"><span data-dcnode-id="7354" instrument_node="">Adrien Palladino</span></li></ul><span data-dcnode-id="7351" instrument_node=""> </span></header><span data-dcnode-id="7349" instrument_node=""> </span><div class="search-results__body" data-dcnode-id="7322"><span data-dcnode-id="7348" instrument_node=""> </span><h4 data-dcnode-id="7346"><span data-dcnode-id="7347" instrument_node="">Article keywords</span></h4><ul class="inlined-list" data-dcnode-id="7333"><li data-dcnode-id="7344"><span data-dcnode-id="7345" instrument_node="">russian emigration,&nbsp;</span></li><li data-dcnode-id="7342"><span data-dcnode-id="7343" instrument_node="">nomadic art,&nbsp;</span></li><li data-dcnode-id="7340"><span data-dcnode-id="7341" instrument_node="">eurasia,&nbsp;</span></li><li data-dcnode-id="7338"><span data-dcnode-id="7339" instrument_node="">czechoslovakia,&nbsp;</span></li><li data-dcnode-id="7336"><span data-dcnode-id="7337" instrument_node="">interwar period,&nbsp;</span></li><li data-dcnode-id="7334"><span data-dcnode-id="7335" instrument_node="">byzantine studies</span></li></ul><span data-dcnode-id="7332" instrument_node=""> </span><h4 aria-expanded="false" class="doaj-public-search-abstractaction doaj-public-search-abstractaction-results" data-dcnode-id="7327" rel="609963017f0a44c186f345f6d1430477" type="button"><span data-dcnode-id="7331" instrument_node="">                            Abstract</span><svg aria-hidden="true" class="feather feather-plus" data-dcnode-id="7328" fill="none" height="24" stroke="currentColor" stroke-linecap="round" stroke-linejoin="round" stroke-width="2" viewBox="0 0 24 24" width="24" xmlns="http://www.w3.org/2000/svg"><line data-dcnode-id="7330" x1="12" x2="12" y1="5" y2="19"></line><line data-dcnode-id="7329" x1="5" x2="19" y1="12" y2="12"></line></svg></h4><span data-dcnode-id="7326" instrument_node=""> </span><p aria-expanded="false" class="collapse doaj-public-search-abstracttext doaj-public-search-abstracttext-results" data-dcnode-id="7324" rel="609963017f0a44c186f345f6d1430477"><span data-dcnode-id="7325" instrument_node="">                            In 1925, Nikodim Kondakov died in emigration in Prague. During his last years in Czechoslovakia, the Byzantinist had been asked to teach on nomadic art, a topic to which he had devoted only his early career. This essay aims to understand why Kondakov returned to these interests. Kondakov was indeed not the only scholar drawn to the material culture of nomadic peoples, a topic which became fundamental in Czechoslovakia, a new “nation-state” seeking its identity. This movement was further fostered by the presence of numerous Russian émigrés in Czechoslovakia, who developed the idea of “Eurasia”. These notions came to be explored by scholars from diverse backgrounds, living in Mitteleuropa, a space then shattered by the rise of totalitarianisms and WWII.                          </span></p><span data-dcnode-id="7323" instrument_node=""> </span></div><span data-dcnode-id="7321" instrument_node=""> </span></div><span data-dcnode-id="7319" instrument_node=""> </span><aside class="col-sm-4 search-results__aside" data-dcnode-id="7293"><span data-dcnode-id="7318" instrument_node=""> </span><ul data-dcnode-id="7295"><span data-dcnode-id="7317" instrument_node=""> </span><li data-dcnode-id="7309"><span data-dcnode-id="7316" instrument_node=""> </span><a data-dcnode-id="7310" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//arthistoriography.files.wordpress.com/2021/11/foletti_palladino.pdf" rel="noopener" target="_blank"><span data-dcnode-id="7315" es</span></li></ul><span data-dcnode-id="7255" instrument_node=""> </span><h4 aria-expanded="false" class="doaj-public-search-abstractaction doaj-public-search-abstractaction-results" data-dcnode-id="7250" rel="e8f61d0c64234ea6a65933f80b833ec3" type="button"><span data-dcnode-id="7254" instrument_node="">                            Abstract</span><svg aria-hidden="true" class="feather feather-plus" data-dcnode-id="7251" fill="none" height="24" stroke="currentColor" stroke-linecap="round" stroke-linejoin="round" stroke-width="2" viewBox="0 0 24 24" width="24" xmlns="http://www.w3.org/2000/svg"><line data-dcnode-id="7253" x1="12" x2="12" y1="5" y2="19"></line><line data-dcnode-id="7252" x1="5" x2="19" y1="12" y2="12"></line></svg></h4><span data-dcnode-id="7249" instrument_node=""> </span><p aria-expanded="false" class="collapse doaj-public-search-abstracttext doaj-public-search-abstracttext-results" data-dcnode-id="7247" rel="e8f61d0c64234ea6a65933f80b833ec3"><span data-dcnode-id="7248" instrument_node="">                            Netherlandish carved altarpieces have attracted much new scholarly attention over the last decades. The objective of this article is first to provide a comprehensive historiography of the existing body of research, and second to outline the main research trends from the late nineteenth century until now. Even though Sweden still houses no less than thirty-eight late medieval Netherlandish carved altarpieces, about ten retable fragments, and two wooden Malines statuettes,and much has already been written on the pieces preserved there, an extensive description of this research field is currently lacking. The third aim of this paper is to fill the remaining gap by providing an extensive status quaestionis of the research on Netherlandish carved altarpieces in Sweden.                          </span></p><span data-dcnode-id="7246" instrument_node=""> </span></div><span data-dcnode-id="7244" instrument_node=""> </span></div><span data-dcnode-id="7242" instrument_node=""> </span><aside class="col-sm-4 search-results__aside" data-dcnode-id="7216"><span data-dcnode-id="7241" instrument_node=""> </span><ul data-dcnode-id="7218"><span data-dcnode-id="7240" instrument_node=""> </span><li data-dcnode-id="7232"><span data-dcnode-id="7239" instrument_node=""> </span><a data-dcnode-id="7233" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//arthistoriography.files.wordpress.com/2021/11/de-moor.pdf" rel="noopener" target="_blank"><span data-dcnode-id="7238" instrument_node=""> Read online </span><svg aria-hidden="true" class="feather feather-external-link" data-dcnode-id="7234" fill="none" height="24" stroke="currentColor" stroke-linecap="round" stroke-linejoin="round" stroke-width="2" viewBox="0 0 24 24" width="24" xmlns="http://www.w3.org/2000/svg"><path d="M18 13v6a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V8a2 2 0 0 1 2-2h6" data-dcnode-id="7237"></path><polyline data-dcnode-id="7236" points="15 3 21 3 21 9"></polyline><line data-dcnode-id="7235" x1="10" x2="21" y1="14" y2="3"></line></svg></a></li><span data-dcnode-id="7231" instrument_node=""> </span><li data-dcnode-id="7226"><span data-dcnode-id="7230" instrument_node=""> </span><a data-dcnode-id="7228" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//doaj.org/toc/2042-4752" rel="noopener" target="_blank"><span data-dcnode-id="7229" instrument_node="">About the journal</span></a><span data-dcnode-id="7227" instrument_node=""> </span></li><span data-dcnode-id="7225" instrument_node=""> </span><li data-dcnode-id="7220"><span data-dcnode-id="7224" instrument_node="">                            Published by </span><em data-dcnode-id="7222"><span data-dcnode-id="7223" instrument_node="">Department of Art History, University of Birmingham</span></em><span data-dcnode-id="7221" instrument_node=""> </span></li><span data-dcnode-id="7219" instrument_node=""> </span></ul><span data-dcnode-id="7217" instrument_node=""> </span></aside><span data-dcnode-id="7215" instrument_node=""> </span></article></li><li class="card search-results__record" data-dcnode-id="7136"><span data-dcnode-id="7212" instrument_node=""> </span><article class="row" data-dcnode-id="7137"><span data-dcnode-id="7211" instrument_node=""> </span><div class="col-sm-8 search-results__main" data-dcnode-id="7166"><span data-dcnode-id="7210" instrument_node=""> </span><header data-dcnode-id="7194"><span data-dcnode-id="7209" instrument_node=""> </span><p class="label" data-dcnode-id="7206"><a data-dcnode-id="7207" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//doaj.org/toc/2042-4752" target="_blank"><span data-dcnode-id="7208" instrument_node="">                            Journal of Art Historiography (Dec 2021)                          </span></a></p><span data-dcnode-id="7205" instrument_node=""> </span><h3 class="search-results__heading" data-dcnode-id="7200"><span data-dcnode-id="7204" instrument_node=""> </span><a class="" data-dcnode-id="7202" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//doaj.org/article/bf6e9cb5f5524039b553046df2920f35" target="_blank"><span data-dcnode-id="7203" instrument_node="">                              Bernard Smith and Robert Hughes: A Critical Dialogue                            </span></a><span data-dcnode-id="7201" instrument_node=""> </span></h3><span data-dcnode-id="7199" instrument_node=""> </span><ul class="inlined-list" data-dcnode-id="7196"><li data-dcnode-id="7197"><span data-dcnode-id="7198" instrument_node="">Jim Berryman</span></li></ul><span data-dcnode-id="7195" instrument_node=""> </span></header><span data-dcnode-id="7193" instrument_node=""> </span><div class="search-results__body" data-dcnode-id="7168"><span data-dcnode-id="7192" instrument_node=""> </span><h4 data-dcnode-id="7190"><span data-dcnode-id="7191" instrument_node="">Article keywords</span></h4><ul class="inlined-list" data-dcnode-id="7179"><li data-dcnode-id="7188"><span data-dcnode-id="7189" instrument_node="">bernard smith (1916-2011),&nbsp;</span></li><li data-dcnode-id="7186"><span data-dcnode-id="7187" instrument_node="">robert hughes (1938-2012),&nbsp;</span></li><li data-dcnode-id="7184"><span data-dcnode-id="7185" instrument_node="">australian art history,&nbsp;</span></li><li data-dcnode-id="7182"><span data-dcnode-id="7183" instrument_node="">modernism,&nbsp;</span></li><li data-dcnode-id="7180"><span data-dcnode-id="7181" instrument_node="">art criticism</span></li></ul><span data-dcnode-id="7178" instrument_node=""> </span><h4 aria-expanded="false" class="doaj-public-search-abstractaction doaj-public-search-abstractaction-results" data-dcnode-id="7173" rel="bf6e9cb5f5524039b553046df2920f35" type="button"><span data-dcnode-id="7177" instrument_node="">                            Abstract</span><svg aria-hidden="true" class="feather feather-plus" data-dcnode-id="7174" fill="none" height="24" stroke="currentColor" stroke-linecap="round" stroke-linejoin="round" stroke-width="2" viewBox="0 0 24 24" width="24" xmlns="http://www.w3.org/2000/svg"><line data-dcnode-id="7176" x1="12" x2="12" y1="5" y2="19"></line><line data-dcnode-id="7175" x1="5" x2="19" y1="12" y2="12"></line></svg></h4><span data-dcnode-id="7172" instrument_node=""> </span><p aria-expanded="false" class="collapse doaj-public-search-abstracttext doaj-public-search-abstracttext-results" data-dcnode-id="7170" rel="bf6e9cb5f5524039b553046df2920f35"><span data-dcnode-id="7171" instrument_node="">                            This paper explores the origins and development of the public dialogue between Bernard Smith (1916-2011) and Robert Hughes (1938-2012). Smith and Hughes were giants of Australian art history of the twentieth century. Both, however, followed very different career paths: Smith’s readership was primarily academic and local, while Hughes’s audience was popular and international. And yet, despite their differences, a considerable amount of exchange existed between the two. After first locking horns in 1961, Smith and Hughes engaged in public debate intermittently for more than four decades. This dialogue, which transpired in the pages of published sources, especially their reviews and books, was characterised by acrimony and bitterness, as well as moments of conciliation and mutual respect. When contesting issues of common interest, both writers played to their natural strengths. Smith was dominant in the field of art history, while Hughes had the upper hand in art criticism. Each, however, encroached upon the other’s area of expertise: Smith wrote art criticism and Hughes wrote art history. Conflict was greatest in areas where their respective spheres of authority overlapped. Although tensions receded after 1964, when Hughes left Australia, they did not end. Key topics of debate included abstract art and modernism; provincialism and internationalism; and most importantly the vexed issue of Australian cultural isolation, which was defined in terms of Australian art and its relationship to European art history (or, as Smith termed it, ‘Renaissance tradition’).                          </span></p><span data-dcnode-id="7169" instrument_node=""> </span></div><span data-dcnode-id="7167" instrument_node=""> </span></div><span data-dcnode-id="7165" instrument_node=""> </span><aside class="col-sm-4 search-results__aside" data-dcnode-id="7139"><span data-dcnode-id="7164" instrument_node=""> </span><ul data-dcnode-id="7141"><span data-dcnode-id="7163" instrument_node=""> </span><li data-dcnode-id="7155"><span data-dcnode-id="7162" instrument_node=""> </span><a data-dcnode-id="7156" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//arthistoriography.files.wordpress.com/2021/11/berryman.pdf" rel="noopener" target="_blank"><span data-dcnode-id="7161" instrument_node=""> Read online </span><svg aria-hidden="true" class="feather feather-external-link" data-dcnode-id="7157" fill="none" height="24" stroke="currentColor" stroke-linecap="round" stroke-linejoin="round" stroke-width="2" viewBox="0 0 24 24" width="24" xmlns="http://www.w3.org/2000/svg"><path d="M18 13v6a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V8a2 2 0 0 1 2-2h6" data-dcnode-id="7160"></path><polyline data-dcnode-id="7159" points="15 3 21 3 21 9"></polyline><line data-dcnode-id="7158" x1="10" x2="21" y1="14" y2="3"></line></svg></a></li><span data-dcnode-id="7154" instrument_node=""> </span><li data-dcnode-id="7149"><span data-dcnode-id="7153" instrument_node=""> </span><a data-dcnode-id="7151" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//doaj.org/toc/2042-4752" rel="noopener" target="_blank"><span data-dcnode-id="7152" instrument_node="">About the journal</span></a><span data-dcnode-id="7150" instrument_node=""> </span></li><span data-dcnode-id="7148" instrument_node=""> </span><li data-dcnode-id="7143"><span data-dcnode-id="7147" instrument_node="">                            Published by </span><em data-dcnode-id="7145"><span data-dcnode-id="7146" instrument_node="">Department of Art History, University of Birmingham</span></em><span data-dcnode-id="7144" instrument_node=""> </span></li><span data-dcnode-id="7142" instrument_node=""> </span></ul><span data-dcnode-id="7140" instrument_node=""> </span></aside><span data-dcnode-id="7138" instrument_node=""> </span></article></li><li class="card search-results__record" data-dcnode-id="7061"><span data-dcnode-id="7135" instrument_node=""> </span><article class="row" data-dcnode-id="7062"><span data-dcnode-id="7134" instrument_node=""> </span><div class="col-sm-8 search-results__main" data-dcnode-id="7091"><span data-dcnode-id="7133" instrument_node=""> </span><header data-dcnode-id="7117"><span data-dcnode-id="7132" instrument_node=""> </span><p class="label" data-dcnode-id="7129"><a data-dcnode-id="7130" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//doaj.org/toc/2042-4752" target="_blank"><span data-dcnode-id="7131" instrument_node="">                            Journal of Art Historiography (Dec 2021)                          </span></a></p><span data-dcnode-id="7128" instrument_node=""> </span><h3 class="search-results__heading" data-dcnode-id="7123"><span data-dcnode-id="7127" instrument_node=""> </span><a class="" data-dcnode-id="7125" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//doaj.org/article/978afbbe94ff4b0d9a79acd617e23411" target="_blank"><span data-dcnode-id="7126" instrument_node="">                              The Mannerist “revolution”, Dvořák and Soviet Art History                            </span></a><span data-dcnode-id="7124" instrument_node=""> </span></h3><span data-dcnode-id="7122" instrument_node=""> </span><ul class="inlined-list" data-dcnode-id="7119"><li data-dcnode-id="7120"><span data-dcnode-id="7121" instrument_node="">Stefaniia Demchuk</span></li></ul><span data-dcnode-id="7118" instrument_node=""> </span></header><span data-dcnode-id="7116" instrument_node=""> </span><div class="search-results__body" data-dcnode-id="7093"><span data-dcnode-id="7115" instrument_node=""> </span><h4 data-dcnode-id="7113"><span data-dcnode-id="7114" instrument_node="">Article keywords</span></h4><ul class="inlined-list" data-dcnode-id="7104"><li data-dcnode-id="7111"><span data-dcnode-id="7112" instrument_node="">mannerism,&nbsp;</span></li><li data-dcnode-id="7109"><span data-dcnode-id="7110" instrument_node="">max dvořák,&nbsp;</span></li><li data-dcnode-id="7107"><span data-dcnode-id="7108" instrument_node="">the vienna school of art history,&nbsp;</span></li><li data-dcnode-id="7105"><span data-dcnode-id="7106" instrument_node="">soviet art historiography</span></li></ul><span data-dcnode-id="7103" instrument_node=""> </span><h4 aria-expanded="false" class="doaj-public-search-abstractaction doaj-public-search-abstractaction-results" data-dcnode-id="7098" rel="978afbbe94ff4b0d9a79acd617e23411" type="button"><span data-dcnode-id="7102" instrument_node="">                            Abstract</span><svg aria-hidden="true" class="feather feather-plus" data-dcnode-id="7099" fill="none" height="24" stroke="currentColor" stroke-linecap="round" stroke-linejoin="round" stroke-width="2" viewBox="0 0 24 24" width="24" xmlns="http://www.w3.org/2000/svg"><line data-dcnode-id="7101" x1="12" x2="12" y1="5" y2="19"></line><line data-dcnode-id="7100" x1="5" x2="19" y1="12" y2="12"></line></svg></h4><span data-dcnode-id="7097" instrument_node=""> </span><p aria-expanded="false" class="collapse doaj-public-search-abstracttext doaj-public-search-abstracttext-results" data-dcnode-id="7095" rel="978afbbe94ff4b0d9a79acd617e23411"><span data-dcnode-id="7096" instrument_node="">                            Max Dvořák is widely recognized as a key contributor to the tectonic change in the perception of Mannerism amongst art historians. Soviet scholars could not ignore this shift. In this paper, I trace the impact of Dvořák’s writings on Mannerism in Italian and Northern art on generations of Soviet scholars, who had been working on Renaissance/Baroque topics and methodological issues. One can distinguish three periods in the reception of Max Dvořák’s ideas in Soviet art history. The first clash of methodologies occurred in the 1930s when an abridged collection of Dvořák’s essays was translated into Russian. The beginning of the Cold War marked the second period (the 1940s – 1960s), with its enforcement of ideological boundaries and the use of specific vocabulary; and yet, this period was ambivalent – the first efforts at rehabilitation were followed by the new outbreaks of dogmatic austerity. Lastly, I christened the third period, which lasted from the 1970s until the 1990s a ‘Dvořák Revival’ for it flourished with the new positive evaluations of his works and concepts.                          </span></p><span data-dcnode-id="7094" instrument_node=""> </span></div><span data-dcnode-id="7092" instrument_node=""> </span></div><span data-dcnode-id="7090" instrument_node=""> </span><aside class="col-sm-4 search-results__aside" data-dcnode-id="7064"><span data-dcnode-id="7089" instrument_node=""> </span><ul data-dcnode-id="7066"><span data-dcnode-id="7088" instrument_node=""> </span><li data-dcnode-id="7080"><span data-dcnode-id="7087" instrument_node=""> </span><a data-dcnode-id="7081" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//arthistoriography.files.wordpress.com/2021/11/demchuk.pdf" rel="noopener" target="_blank"><span data-dcnode-id="7086" instrument_node=""> Read online </span><svg aria-hidden="true" class="feather feather-external-link" data-dcnode-id="7082" fill="none" height="24" stroke="currentColor" stroke-linecap="round" stroke-linejoin="round" stroke-width="2" viewBox="0 0 24 24" width="24" xmlns="http://www.w3.org/2000/svg"><path d="M18 13v6a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V8a2 2 0 0 1 2-2h6" data-dcnode-id="7085"></path><polyline data-dcnode-id="7084" points="15 3 21 3 21 9"></polyline><line data-dcnode-id="7083" x1="10" x2="21" y1="14" y2="3"></line></svg></a></li><span data-dcnode-id="7079" instrument_node=""> </span><li data-dcnode-id="7074"><span data-dcnode-id="7078" instrument_node=""> </span><a data-dcnode-id="7076" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//doaj.org/toc/2042-4752" rel="noopener" target="_blank"><span data-dcnode-id="7077" instrument_node="">About the journal</span></a><span data-dcnode-id="7075" instrument_node=""> </span></li><span data-dcnode-id="7073" instrument_node=""> </span><li data-dcnode-id="7068"><span data-dcnode-id="7072" instrument_node="">                            Published by </span><em data-dcnode-id="7070"><span data-dcnode-id="7071" instrument_node="">Department of Art History, University of Birmingham</span></em><span data-dcnode-id="7069" instrument_node=""> </span></li><span data-dcnode-id="7067" instrument_node=""> </span></ul><spa <ul class="inlined-list" data-dcnode-id="7027"><li data-dcnode-id="7036"><span data-dcnode-id="7037" instrument_node="">max dvořák (1874-1921),&nbsp;</span></li><li data-dcnode-id="7034"><span data-dcnode-id="7035" instrument_node="">history of ideas,&nbsp;</span></li><li data-dcnode-id="7032"><span data-dcnode-id="7033" instrument_node="">history of art history,&nbsp;</span></li><li data-dcnode-id="7030"><span data-dcnode-id="7031" instrument_node="">marxism,&nbsp;</span></li><li data-dcnode-id="7028"><span data-dcnode-id="7029" instrument_node="">1960s</span></li></ul><span data-dcnode-id="7026" instrument_node=""> </span><h4 aria-expanded="false" class="doaj-public-search-abstractaction doaj-public-search-abstractaction-results" data-dcnode-id="7021" rel="627f281d974945b7aec35df8037da0b2" type="button"><span data-dcnode-id="7025" instrument_node="">                            Abstract</span><svg aria-hidden="true" class="feather feather-plus" data-dcnode-id="7022" fill="none" height="24" stroke="currentColor" stroke-linecap="round" stroke-linejoin="round" stroke-width="2" viewBox="0 0 24 24" width="24" xmlns="http://www.w3.org/2000/svg"><line data-dcnode-id="7024" x1="12" x2="12" y1="5" y2="19"></line><line data-dcnode-id="7023" x1="5" x2="19" y1="12" y2="12"></line></svg></h4><span data-dcnode-id="7020" instrument_node=""> </span><p aria-expanded="false" class="collapse doaj-public-search-abstracttext doaj-public-search-abstracttext-results" data-dcnode-id="7018" rel="627f281d974945b7aec35df8037da0b2"><span data-dcnode-id="7019" instrument_node="">                            The impact of Max Dvořák is habitually considered to consist of reading his texts. I would like to argue that the key aspect is rather an interpretation and representation and that their mode depends on specific conditions of time and place. A recapitulation of renewed interest in Dvořák in Czech art historiography during the 1960s recognizes the strategies that were used to adapt his “idealistic” methodology for the use of the period Marxist-Leninist scholarship. It was only due to success of this re-interpretation campaign that Dvořák was able to fill the position of the “father of Czech art history”.                          </span></p><span data-dcnode-id="7017" instrument_node=""> </span></div><span data-dcnode-id="7015" instrument_node=""> </span></div><span data-dcnode-id="7013" instrument_node=""> </span><aside class="col-sm-4 search-results__aside" data-dcnode-id="6987"><span data-dcnode-id="7012" instrument_node=""> </span><ul data-dcnode-id="6989"><span data-dcnode-id="7011" instrument_node=""> </span><li data-dcnode-id="7003"><span data-dcnode-id="7010" instrument_node=""> </span><a data-dcnode-id="7004" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//arthistoriography.files.wordpress.com/2021/11/bartlova.pdf" rel="noopener" target="_blank"><span data-dcnode-id="7009" instrument_node=""> Read online </span><svg aria-hidden="true" class="feather feather-external-link" data-dcnode-id="7005" fill="none" height="24" stroke="currentColor" stroke-linecap="round" stroke-linejoin="round" stroke-width="2" viewBox="0 0 24 24" width="24" xmlns="http://www.w3.org/2000/svg"><path d="M18 13v6a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V8a2 2 0 0 1 2-2h6" data-dcnode-id="7008"></path><polyline data-dcnode-id="7007" points="15 3 21 3 21 9"></polyline><line data-dcnode-id="7006" x1="10" x2="21" y1="14" y2="3"></line></svg></a></li><span data-dcnode-id="7002" instrument_node=""> </span><li data-dcnode-id="6997"><span data-dcnode-id="7001" instrument_node=""> </span><a data-dcnode-id="6999" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//doaj.org/toc/2042-4752" rel="noopener" target="_blank"><span data-dcnode-id="7000" instrument_node="">About the journal</span></a><span data-dcnode-id="6998" instrument_node=""> </span></li><span data-dcnode-id="6996" instrument_node=""> </span><li data-dcnode-id="6991"><span data-dcnode-id="6995" instrument_node="">                            Published by </span><em data-dcnode-id="6993"><span data-dcnode-id="6994" instrument_node="">Department of Art History, University of Birmingham</span></em><span data-dcnode-id="6992" instrument_node=""> </span></li><span data-dcnode-id="6990" instrument_node=""> </span></ul><span data-dcnode-id="6988" instrument_node=""> </span></aside><span data-dcnode-id="6986" instrument_node=""> </span></article></li><li class="card search-results__record" data-dcnode-id="6907"><span data-dcnode-id="6983" instrument_node=""> </span><article class="row" data-dcnode-id="6908"><span data-dcnode-id="6982" instrument_node=""> </span><div class="col-sm-8 search-results__main" data-dcnode-id="6937"><span data-dcnode-id="6981" instrument_node=""> </span><header data-dcnode-id="6965"><span data-dcnode-id="6980" instrument_node=""> </span><p class="label" data-dcnode-id="6977"><a data-dcnode-id="6978" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//doaj.org/toc/2042-4752" target="_blank"><span data-dcnode-id="6979" instrument_node="">                            Journal of Art Historiography (Dec 2021)                          </span></a></p><span data-dcnode-id="6976" instrument_node=""> </span><h3 class="search-results__heading" data-dcnode-id="6971"><span data-dcnode-id="6975" instrument_node=""> </span><a class="" data-dcnode-id="6973" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//doaj.org/article/d390eb58c5684a04be70682cfd25c10a" target="_blank"><span data-dcnode-id="6974" instrument_node="">                              Identity built on myth. Fact and fiction in the foundational narrative of the ‘Cracow School of Art History’ and its relations to Vienna                            </span></a><span data-dcnode-id="6972" instrument_node=""> </span></h3><span data-dcnode-id="6970" instrument_node=""> </span><ul class="inlined-list" data-dcnode-id="6967"><li data-dcnode-id="6968"><span data-dcnode-id="6969" instrument_node="">Magdalena Kunińska </span></li></ul><span data-dcnode-id="6966" instrument_node=""> </span></header><span data-dcnode-id="6964" instrument_node=""> </span><div class="search-results__body" data-dcnode-id="6939"><span data-dcnode-id="6963" instrument_node=""> </span><h4 data-dcnode-id="6961"><span data-dcnode-id="6962" instrument_node="">Article keywords</span></h4><ul class="inlined-list" data-dcnode-id="6950"><li data-dcnode-id="6959"><span data-dcnode-id="6960" instrument_node="">marian sokołowski,&nbsp;</span></li><li data-dcnode-id="6957"><span data-dcnode-id="6958" instrument_node="">vienna school,&nbsp;</span></li><li data-dcnode-id="6955"><span data-dcnode-id="6956" instrument_node="">art historiograhy,&nbsp;</span></li><li data-dcnode-id="6953"><span data-dcnode-id="6954" instrument_node="">adam małkiewicz,&nbsp;</span></li><li data-dcnode-id="6951"><span data-dcnode-id="6952" instrument_node="">cracow school of art history</span></li></ul><span data-dcnode-id="6949" instrument_node=""> </span><h4 aria-expanded="false" class="doaj-public-search-abstractaction doaj-public-search-abstractaction-results" data-dcnode-id="6944" rel="d390eb58c5684a04be70682cfd25c10a" type="button"><span data-dcnode-id="6948" instrument_node="">                            Abstract</span><svg aria-hidden="true" class="feather feather-plus" data-dcnode-id="6945" fill="none" height="24" stroke="currentColor" stroke-linecap="round" stroke-linejoin="round" stroke-width="2" viewBox="0 0 24 24" width="24" xmlns="http://www.w3.org/2000/svg"><line data-dcnode-id="6947" x1="12" x2="12" y1="5" y2="19"></line><line data-dcnode-id="6946" x1="5" x2="19" y1="12" y2="12"></line></svg></h4><span data-dcnode-id="6943" instrument_node=""> </span><p aria-expanded="false" class="collapse doaj-public-search-abstracttext doaj-public-search-abstracttext-results" data-dcnode-id="6941" rel="d390eb58c5684a04be70682cfd25c10a"><span data-dcnode-id="6942" instrument_node="">                            Widely acknowledged as the creator of the first coherent model of art historical practice and theory in Poland, Marian Sokolowski played an essential role in shaping the identity of the discipline. This article explores Sokolowski’s connections to the Vienna School and the impact of his choice of methodological identity on the development of the ‘Cracow School’.

In a curriculum vitae submitted in 1876 to the Jagiellonian University, Sokołowski, soon to be appointed as the first chair of art history in Poland, stated that he had studied ‘art history in Vienna under the supervision of Rudolf Eitelberger and Moritz Thausing’. While unsupported by the archival sources, this alleged mentorship has great symbolic significance. The highly institutionalised character of the ‘Cracow School’, as analysed by Stefan Muthesius, ensured that the founder’s choice of methodological affiliation would remain crucial for the identity of this research environment. The longue durée of relations with Vienna, present sometimes only in the sphere of myth (initiated by Sokołowski), would prove vital in determining the normative characteristics of the self-proclaimed ‘school’.                          </span></p><span data-dcnode-id="6940" instrument_node=""> </span></div><span data-dcnode-id="6938" instrument_node=""> </span></div><span data-dcnode-id="6936" instrument_node=""> </span><aside class="col-sm-4 search-results__aside" data-dcnode-id="6910"><span data-dcnode-id="6935" instrument_node=""> </span><ul data-dcnode-id="6912"><span data-dcnode-id="6934" instrument_node=""> </span><li data-dcnode-id="6926"><span data-dcnode-id="6933" instrument_node=""> </span><a data-dcnode-id="6927" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//arthistoriography.files.wordpress.com/2021/11/kuninska.pdf" rel="noopener" target="_blank"><span data-dcnode-id="6932" instrument_node=""> Read online </span><svg aria-hidden="true" class="feather feather-external-link" data-dcnode-id="6928" fill="none" height="24" stroke="currentColor" stroke-linecap="round" stroke-linejoin="round" stroke-width="2" viewBox="0 0 24 24" width="24" xmlns="http://www.w3.org/2000/svg"><path d="M18 13v6a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V8a2 2 0 0 1 2-2h6" data-dcnode-id="6931"></path><polyline data-dcnode-id="6930" points="15 3 21 3 21 9"></polyline><line data-dcnode-id="6929" x1="10" x2="21" y1="14" y2="3"></line></svg></a></li><span data-dcnode-id="6925" instrument_node=""> </span><li data-dcnode-id="6920"><span data-dcnode-id="6924" instrument_node=""> </span><a data-dcnode-id="6922" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//doaj.org/toc/2042-4752" rel="noopener" target="_blank"><span data-dcnode-id="6923" instrument_node="">About the journal</span></a><span data-dcnode-id="6921" instrument_node=""> </span></li><span data-dcnode-id="6919" instrument_node=""> </span><li data-dcnode-id="6914"><span data-dcnode-id="6918" instrument_node="">                            Published by </span><em data-dcnode-id="6916"><span data-dcnode-id="6917" instrument_node="">Department of Art History, University of Birmingham</span></em><span data-dcnode-id="6915" instrument_node=""> </span></li><span data-dcnode-id="6913" instrument_node=""> </span></ul><span data-dcnode-id="6911" instrument_node=""> </span></aside><span data-dcnode-id="6909" instrument_node=""> </span></article></li><li class="card search-results__record" data-dcnode-id="6830"><span data-dcnode-id="6906" instrument_node=""> </span><article class="row" data-dcnode-id="6831"><span data-dcnode-id="6905" instrument_node=""> </span><div class="col-sm-8 search-results__main" data-dcnode-id="6860"><span data-dcnode-id="6904" instrument_node=""> </span><header data-dcnode-id="6888"><span data-dcnode-id="6903" instrument_node=""> </span><p class="label" data-dcnode-id="6900"><a data-dcnode-id="6901" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//doaj.org/toc/2042-4752" target="_blank"><span data-dcnode-id="6902" instrument_node="">                            Journal of Art Historiography (Dec 2021)                          </span></a></p><span data-dcnode-id="6899" instrument_node=""> </span><h3 class="search-results__heading" data-dcnode-id="6894"><span data-dcnode-id="6898" instrument_node=""> </span><a class="" data-dcnode-id="6896" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//doaj.org/article/8367b23aec6c4ad5982601f0f86d52f0" target="_blank"><span data-dcnode-id="6897" instrument_node="">                              Max Dvořák, Rudolf Carnap and the question of Weltanschauung vs. Weltauffassung                            </span></a><span data-dcnode-id="6895" instrument_node=""> </span></h3><span data-dcnode-id="6893" instrument_node=""> </span><ul class="inlined-list" data-dcnode-id="6890"><li data-dcnode-id="6891"><span data-dcnode-id="6892" instrument_node="">Barbara Czwik</span></li></ul><span data-dcnode-id="6889" instrument_node=""> </span></header><span data-dcnode-id="6887" instrument_node=""> </span><div class="search-results__body" data-dcnode-id="6862"><span data-dcnode-id="6886" instrument_node=""> </span><h4 data-dcnode-id="6884"><span data-dcnode-id="6885" instrument_node="">Article keywords</span></h4><ul class="inlined-list" data-dcnode-id="6873"><li data-dcnode-id="6882"><span data-dcnode-id="6883" instrument_node="">max dvořák,&nbsp;</span></li><li data-dcnode-id="6880"><span data-dcnode-id="6881" instrument_node="">wilhelm dilthey,&nbsp;</span></li><li data-dcnode-id="6878"><span data-dcnode-id="6879" instrument_node="">rudolf carnap,&nbsp;</span></li><li data-dcnode-id="6876"><span data-dcnode-id="6877" instrument_node="">weltanschauung,&nbsp;</span></li><li data-dcnode-id="6874"><span data-dcnode-id="6875" instrument_node="">wissenschaftliche weltauffassung</span></li></ul><span data-dcnode-id="6872" instrument_node=""> </span><h4 aria-expanded="false" class="doaj-public-search-abstractaction doaj-public-search-abstractaction-results" data-dcnode-id="6867" rel="8367b23aec6c4ad5982601f0f86d52f0" type="button"><span data-dcnode-id="6871" instrument_node="">                            Abstract</span><svg aria-hidden="true" class="feather feather-plus" data-dcnode-id="6868" fill="none" height="24" stroke="currentColor" stroke-linecap="round" stroke-linejoin="round" stroke-width="2" viewBox="0 0 24 24" width="24" xmlns="http://www.w3.org/2000/svg"><line data-dcnode-id="6870" x1="12" x2="12" y1="5" y2="19"></line><line data-dcnode-id="6869" x1="5" x2="19" y1="12" y2="12"></line></svg></h4><span data-dcnode-id="6866" instrument_node=""> </span><p aria-expanded="false" class="collapse doaj-public-search-abstracttext doaj-public-search-abstracttext-results" data-dcnode-id="6864" rel="8367b23aec6c4ad5982601f0f86d52f0"><span data-dcnode-id="6865" instrument_node="">                            This paper takes a comparative approach to the later work of Max Dvořák (Czechia 1874–1921) and the early writings of Rudolf Carnap (Germany 1891–USA 1970). The texts will be viewed in their context, with a particular eye to the historical conditions that shaped the problems tackled by both thinkers. My  starting point is the dispute around the concepts of Weltanschauung (world-view) and wissenschaftliche Weltauffassung (scientific world-conception) that took place in the 1920s. On the basis of this dispute, it would be easy to conclude that Dvořák’s Geistesgeschichte (often translated as “history of ideas” or “intellectual history”) is the direct opposite of Carnap’s Wissenschaftstheorie (theory of science). However, as this study will prove, such a view is inadequate.

The first section concerns the intellectual starting situation of the two thinkers under discussion. The situation in which Dvořák and Carnap operated was shaped by currents rooted in the Enlightenment and in Romanticism. The second section will address what is usually called the nineteenth-century German Bildungstradition (roughly, “educational tradition”; see below), which is relevant to both Dvořák and Carnap, approaching it as a variant of Enlightenment culture. The third section will describe those aspects of the philosophy of Wilhelm Dilthey—whose own work was rooted in this specifically German tradition—which was a common source of inspiration for both thinkers, and forms a connection between their respective bodies of work. Building on this, the fourth section will look in detail at Dilthey’s reception in Dvořák and Carnap. Finally, I will demonstrate that Carnap and Dvořák’s approaches are not opposed at all. Rather, they complement and complete one another.                          </span></p><span data-dcnode-id="6863" instrument_node=""> </span></div><span data-dcnode-id="6861" instrument_node=""> </span></div><span data-dcnode-id="6859" instrument_node=""> </span><aside class="col-sm-4 search-results__aside" data-dcnode-id="6833"><span data-dcnode-id="6858" instrument_node=""> </span><ul data-dcnode-id="6835"><span data-dcnode-id="6857" instrument_node=""> </span><li data-dcnode-id="6849"><span data-dcnode-id="6856" instrument_node=""> </span><a data-dcnode-id="6850" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//arthistoriography.files.wordpress.com/2021/11/czwik.pd" rel="noopener" target="_blank"><span data-dcnode-id="6855" instrument_node=""> Read online </span><svg aria-hidden="true" class="feather feather-external-link" data-dcnode-id="6851" fill="none" height="24" stroke="currentColor" stroke-linecap="round" stroke-linejoin="round" stroke-width="2" viewBox="0 0 24 24" width="24" xmlns="http://www.w3.org/2000/svg"><path
